body:
  text: 卷第一百七十二小兒天瘹論曰小兒猝然驚悸眼目翻騰壯熱不已四肢抽掣上仰如釣縛之狀名曰天瘹乍作乍止此風熱痰涎之所發也良由乳母恣啖五辛熱酒之類毒熱氣流入乳中因即乳兒兒飲熱乳腑臟生熱脾胃生涎痰涎既生心肺壅滯不得宣通致令心神不安為天瘹之病治小兒驚風天瘹急風雄黃散方雄黃研牛黃研蚱蟬各一兩乾蠍七枚去土炒上四味搗研為散一二歲兒每服一字匕薄荷湯調下三四歲半錢匕空心日午臨臥各一服更量兒大小加減治小兒驚風天瘹麝香散方麝香研膩粉研乾蠍去土炒白附子炮各一分上五味搗研極細每服一字匕薄荷汁調下早晚各一服治小兒天瘹手腳掣動眼目不定或笑或啼或喜或怒爪甲青色龍齒飲方龍齒鉤藤赤茯苓去黑皮各半兩蟬殼二七枚去土鉛丹研甘草炙大黃銼炒鐵粉別研丹砂別研各一分上九味粗搗篩一二歲兒每服半錢匕水半盞煎至三分溫服更量兒大小加減治小兒急慢驚風天瘹撮口搐搦奶癇壯熱困重定命丸方乾蠍全者七枚生用天南星末一分生白附子末半分生青黛半錢蟾酥一分酒浸一宿麝香一錢上六味細研令勻以粟米糊丸如緑豆大更用青黛為衣新生兒用膩粉二捻生油一兩點新汲水數滴藥一米許化破與服取下胎中所受驚熱即無諸驚如小兒患重用荊芥薄荷湯化下一粒治小兒天瘹驚風天漿子散方天漿子蠍梢犀角屑丹砂研雄黃研附子炮裂去皮臍天南星炮白附子半夏湯洗去滑與生薑汁同搗捏作餅子曝乾水銀黑鉛結成沙子乳香研白花蛇酒浸炙用肉白殭蠶炒各一分膩粉牛黃研各一錢麝香一字金箔銀箔各三片上一十八味除別研外搗羅為散入研藥和勻每服一字匕薄荷湯調下日三更量兒大小加減治小兒天瘹驚風潮搐項筋緊強手足厥冷再生散方烏蛇酒炙取肉天麻天南星炮乾蠍炒各一分麝香研一錢匕膩粉半錢匕研丹砂研二錢牛黃研白附子各一錢上九味除別研外搗羅為散入研藥和勻每服半錢匕煎金銀湯調下早晚各一服更量兒大小加減治小兒天瘹癇病急慢諸風赤靈丸方丹砂研水飛過人參為末各一兩酸棗仁研二兩乳香研半兩白麵二錢上五味和研令勻用生蜜和膏入新竹筒內以油紙封札定坐飯甑上炊候飯熟為度分作三十丸每一丸分四服薄荷湯化下更量兒大小加減治小兒天瘹殭蠶散方白殭蠶炒馬牙硝研鬱金乾蠍去土炒各半兩上四味搗研為散每服一字匕乳汁調服甚者半錢匕不拘時候治小兒天瘹天南星散方天南星大者一枚掘地作坑安磚子一片先用火燒赤後放天南星於熱磚上用酒半升傾天南星上即以盞子覆之候冷銼上一味搗羅為散每服一字匕溫酒調下二歲以下以乳汁調治小兒天瘹備急塗頂膏方烏頭末蕓薹子末各二錢匕上二味合研令勻每用一錢匕新水調敷兒頂上治小兒天瘹客忤五疳八痢十二驚癇青黛丸方青黛研天竺黃研干蝦蟆一枚黃泥裹燒赤去泥研干蝸牛殼洗炒研黃連去須地龍炒人參鉤藤炙龍膽各一分蘆薈研熊膽研各半兩牛黃研麝香研雄黃研丹砂研各一錢夜明砂胡黃連各三分上一十七味搗羅七味為末與十味研者和勻以燒飯丸如麻子大一歲一丸至二丸粥飲下一歲以上以意加減小兒胎風論曰子在胞胎稟受不足肝心經虛及其始生乳養無法觸冒外邪或因斷臍瘡痂未斂風邪一入則令臟腑虛弱經絡不通蘊結為熱蓋風善行而數變入於榮衛氣血間則令兒壯熱吐唄精神不寧睡臥饒驚手足抽掣故名胎風縱而弗治則成癇疾治小兒胎風犀角丸方生犀角尖鎊牛黃研黃連去須代赭各一分上四味搗研為末拌勻煉蜜和丸如麻子大一二歲兒每服三丸用乳汁研化服三四歲兒每服五丸次服後方虎睛丸量兒大小以意加減治小兒胎風服犀角丸後宜服虎睛丸方虎睛微炙研一對代赭搗研丹砂研各一分蘆薈研三分麝香研一分牛黃研三分桃仁二七枚湯退去皮尖雙仁麩炒當歸切焙為末一分上八味搗研為末煉蜜和丸如麻子大一二歲兒每服三丸三四歲兒每服五丸並溫水下日再治小兒胎風發驚搐搦乾蠍散方乾蠍去土炒楓香脂研各一分白芥子五十粒阿魏研一錢白殭蠶直者十五枚炒上五味搗研為散再和勻每服一字匕不計時候煎薄荷湯調下量兒大小加減服治小兒胎風久為驚癇時愈斷癇丸方蛇蛻微炙三寸蟬蛻去土炒四枚黃耆銼細辛去苗葉鉤藤鉤子甘草炙銼各半兩牛黃研半錢上七味搗研為末再同和勻煮麵糊和丸如小豆大百晬內小兒服三兩丸二三歲兒十丸至十五丸人參湯下不計時候治小兒胎風及慢驚眼澀多睡化涎解熱龍腦散方龍腦研麝香研白附子微炮牛黃研天麻白殭蠶直者炒乾蠍炒烏蛇肉酒浸焙各一分麻黃去節半兩天南星微炒二錢上一十味除龍腦麝香牛黃同研令勻外余搗碎不羅用新水一盞浸一復時冬月浸兩復時生絹濾藥汁和寒食白麵為丸如大皂子大陰乾搗羅為散入前三味再同研勻每服一字匕薄荷湯調下量兒大小加減治小兒胎風心熱驚癇丹砂散方丹砂牛黃天竺黃鐵粉各一分麝香半分上五味研令勻細每服半錢匕以竹瀝調下不計時候量兒大小以意加減治小兒胎風驚熱牛黃散方牛黃研一分天竺黃研鉛霜研各半兩馬牙硝研一兩人參半兩丹砂研一分上六味搗研為散再同研勻每服半錢匕薄荷湯調下量兒大小加減治小兒初生至百晬前後驚癇連發不醒及胎中感風體冷麵青筋急反張葛根湯方葛根銼微炒麻黃去節羌活去蘆頭甘草炙銼枳殼去瓤麩炒各半兩杏仁湯浸去皮尖雙仁炒一分升麻黃芩去黑心大黃銼炒各一兩柴胡去苗芍藥各三分鉤藤一分蛇蛻微炙三寸蚱蟬二枚去翅微炒石膏碎一兩半上一十五味粗搗篩每服一錢匕水半盞煎至三分入竹瀝少許更煎一兩沸去滓分溫三服隨兒大小以意增減治小兒胎驚及乳癇心熱牛黃散方牛黃研半兩馬牙硝研鐵粉研龍齒研各一分上四味再同研細和勻每服一字匕熟水調下早晨午間臨臥各一隨兒大小以意加減治小兒胎風虎睛丸方虎睛研牛黃研各一字乾蠍去土炒七枚墨一棗大青黛研一分使君子十枚燒存性丹砂研龍腦研麝香研各半錢金箔銀箔各十片上一十一味搗研為末用水浸炊餅心為丸如櫻桃大煎金銀薄荷湯磨下半丸如疾重服一丸更量兒大小加減服治小兒胞胎氣虛既生觸冒外邪名曰胎風令兒壯熱神昏多驚掣縱定命丸方蟾酥一錢乾者酒浸一宿乾蠍七枚炒全者天南星炮為末一分白附子炮為末半分麝香青黛各半錢研上六味同研勻細以粟米粥和丸如緑豆大別以青黛為衣如新生兒用膩粉二捻生油一兩點新汲水牛茶腳化藥一粒服取下胎受之驚熱即更不驚患重者荊芥薄荷湯化下一粒服藥後困睡無疑但有患者先化半丸滴入鼻中急嚏者必瘥治小兒胎風壯熱瘛瘲天南星丸方天南星炮二枚白附子炮十枚乾蠍全者炒一分牛黃研龍腦研各一錢丹砂研一錢半雄黃研一分天漿子一十枚去皮上八味搗研為細末煉蜜和丸如皂子大以丹砂為衣三二歲兒每服一丸至十歲服三丸煎金銀薄荷湯化下空心臨臥小兒驚疳論曰驚疳之病本於心臟實熱小兒在襁褓中氣血未調腑臟微弱乳哺不節則生壅滯熱積於內不得宣通心神不寧病為驚疳其狀遍身壯熱頰赤面黃胸膈煩滿口舌生瘡發枯皮燥吐利無常時有盜汗或發虛驚故名驚疳也治小兒驚疳壯熱嘔吐頰赤面黃口鼻生瘡或時下利虛汗多驚乳香丸方乳香研木香白芷各半兩麝香研一分豶豬膽乾者去膜研一枚上五味搗研為末粳米飯丸如麻子大每服三丸至五丸米飯下空心服量兒大小加減治小兒驚疳腹大項細鉤藤飲方鉤藤甘草炙人參栝蔞根各一分上四味粗搗篩每用一錢匕水一小盞煎取五分去滓分溫二服空心午後服隨兒大小加減治小兒一切疳瀉驚風天瘹胡黃連丸方胡黃連半兩木香蛤蚧酥炙各一分蝸牛子去殼二七枚人參雄黃研各半兩牛黃研丹砂研各一分乾地龍炒三分青黛研乾蟾燒灰黃連去須檳榔銼當歸切焙天麻犀角鎊乾蠍炒蟬蛻炙蘆薈研羌活去蘆頭獨活去蘆頭蕪荑仁麝香研驢胎耳炙各一分蜣螂炙五枚赤石脂研代赭搗研各半兩豬牙皂莢二挺炙去皮子別搗末上二十八味搗研為末豬膽汁丸如黍米大每服二丸三丸空心米飲下量兒大小加減治小兒一切疳痢驚風天瘹胡黃連丸方胡黃連半兩肉豆蔻去殼一枚檳榔煨銼訶黎勒煨去核紅雪密陀僧丁香各半兩上七味搗羅為末麵糊丸如麻子大每服三丸五丸空心米飲下心疳黃連湯肺疳米飲脾疳羸瘦干棗湯食疳吐血生薑湯驚疳瀉血鹽湯肝疳目中生瘡甘草湯骨疳冷地臥食泥土紫筍茶湯氣疳肚脹橘皮湯下治小兒驚疳心忪驚悸面黃肌瘦口舌生瘡多困目澀退疳丸方胡黃連黃連去須大黃各半錢陳橘皮湯浸去白焙苦楝根各一分五味同為末用豬膽汁和藥卻入膽內線縫定水二碗煮水盡取藥出青黛研使君子去殼丹砂研蘆薈研各一分麝香研半錢上一十味將後五味別研為末用前豬膽內藥和勻為丸如緑豆大每服十丸米飲下不拘時候量兒大小加減治小兒驚疳保童丸方鐵粉研一分鱉甲去裙襴醋炙半兩蝦蟆炙一枚黃連去須半兩麝香研一分上五味搗研為末飯丸如緑豆大每服二丸空心米飲下更量兒大小加減治小兒驚疳蘆薈丸方蘆薈研黃連去須使君子去殼雷丸鶴蝨藿香葉細辛去苗葉蓬莪朮煨蠍梢炒青橘皮湯浸去白焙陳橘皮湯浸去白焙蟾酥各半兩十三味同為末分一半入豬膽煮熟留末一半龍腦丹砂牛黃麝香四味同研各一分肉豆蔻去殼煨水銀一分上一十八味先將前十二味為末一半入豬膽內每枚膽內入巴豆仁兩枚以粟米飲煮熟去巴豆不用次入前一半末並龍腦等六味同研丸如黍米大每服十丸至十五丸更量兒大小加減空心米飲下治小兒驚疳馬牙硝丸方馬牙硝研一分天南星炮一枚丹砂研黃連去須各一分半上四味搗研為末軟飲為丸如緑豆大每服三丸五丸加減薄荷湯下治小兒一切驚疳積熱交奶疳氣胡黃連丸方胡黃連天竺黃各一分蘆薈黃連半兩去須與蘆薈同為末入豬膽內鍋中垂煮熟陰乾去皮膜研金箔八片銀箔五片青黛一分丹砂一錢牛黃半錢麝香半錢真珠一錢龍腦半錢八味同研犀角鎊二錢上一十三味搗研為末粳米飲丸如黍米大每服三丸五丸溫水下鼻下赤化一丸塗之治小兒驚疳瘦弱頭髮作穗面黃腹脹臟腑不調保童丸方胡黃連黃連去須青橘皮湯浸去白焙龍膽蕪荑仁炒蟬蛻苦楝根五倍子夜明砂炒蝸牛研細新瓦上攤陰乾天漿子去皮炒各半兩乾蟾頭酥炙焦三枚青黛蘆薈熊膽雄黃麝香丹砂六味同研各半兩上一十八味搗研為末麵糊丸如黍米大一歲兒二丸三丸二歲以上加減食前米飲下治小兒驚疳蠍梢丸方蠍梢炒半兩天麻附子炮裂去皮臍木香蓬莪朮煨銼各一分青黛一兩丹砂麝香膩粉四味同研各半分上九味搗研為末煉蜜丸如緑豆大每服一丸薄荷湯或柳枝湯下量兒加減治小兒心疳身體壯熱毛髮焦目常有淚口瘡腳手細弱腹肋鼓脹睡好合面飲水不休麝香丸方麝香牛黃丹砂青黛四味同研夜明砂瓜蒂熊膽研蟾酥乾者湯浸去赤水焙乾胡黃連各半兩上九味搗研為末燒粟米飯為丸如黃米大每服一歲二丸二歲以上四五丸量兒加減溫水下治小兒驚疳五心壯熱肌肉黃瘦好食泥土黃連丸方黃連去須鬱金銼羌活去蘆頭青黛研苦楝根各一錢上