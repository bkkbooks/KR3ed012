龍膽黃芩去黑心枳殼去瓤麩炒木香赤芍藥豬苓去黑皮海蛤研各一分紫參黃耆銼大黃銼炒各半兩郁李仁炒研一兩一分上一十二味搗羅為末煉蜜丸如緑豆大每服五七丸溫湯下微利即止量兒大小加減治小兒疳渴不止及急慢驚風胸膈有涎天瘹疳風並皆治療蟾酥丸方蟾酥麝香研犀角鎊牛黃研丹砂研蘆薈研天竺黃各半兩益智去皮十枚青黛研半兩干蝸牛五枚全者白花蛇一寸去皮骨炙上一十一味搗研為末用豶豬膽汁和丸如米粒大丹砂為衣每服五丸至七丸煎薄荷湯下驚風用剪刀股研薄荷湯下慢驚風煎荊芥湯下疳氣麝香湯下驚風搐搦目睛上視煎金銀酒化下此藥兼利胸膈墜涎壓心臟積熱順氣進奶食開胃小兒諸疾皆治量兒大小加減治小兒宿有疳氣心肺壅熱內亡津液煩渴不止人參散方人參白茯苓去黑皮各一兩葛根銼二兩木香藿香葉甘草炙各一分上六味搗羅為細散每服一錢匕水半盞煎三五沸溫服治小兒疳渴不止調中補虛草豆蔻散方草豆蔻五枚和皮用人參白茯苓去黑皮防風去叉藿香各半兩陳橘皮去白焙一分上六味搗羅為散每服一錢匕生薑米飲調下量兒大小加減服治小兒久疳多渴不美乳食大棗湯方大棗去核焙人參白朮白茯苓去黑皮陳曲炒各一兩甘草炙檀香銼各一分上七味粗搗篩一歲兒一錢匕水半盞入棗一枚擘煎至三分去滓溫服日三量兒大小加減服治小兒疳痢發渴方椿根白皮上一味曝乾搗末粟米煮作糊和丸如緑豆大每服五丸若下部開以乾末頻吹之
