熱水下不拘時候小兒急疳論曰急疳謂疳勢急暴其狀唇口勿變青白齒齦腮頰疼痛或赤或黑朽爛膿血俱出速宜針去惡血點烙死肌此蓋養護無方甘肥過度致風熱內積五臟俱虛蟲因虛動上蝕口齒攻注齦頰不早治之死於旬日俗謂之走馬疳者是也治小兒牙齒急疳蟲蝕齒床及口面腫開口不得臭爛疼痛不可忍白礬煮散方白礬燒灰防風去叉細辛去苗葉附子生用乾薑炮白朮甘草炙各半兩蛇床子微炒一分藜蘆去蘆頭蜀椒去目並開口者炒出汗各一分上一十味搗羅為細散每用一錢匕以無灰酒一盞水半盞煎十餘沸熱含冷吐日三以瘥為度治小兒齒損爛及走馬急疳麝香膏方麝香研一分豬牙皂莢三挺燒存性白礬一兩緑礬一兩半與白礬同杵碎入銚子內燒令枯研膩粉研水銀各半兩黃柏去粗皮苦楝根白皮密陀僧各一兩上九味搗研為細末用無灰酒三升熬成膏先淨漱口塗之如久患者取藥半匙並砒霜粉霜末各少許拌勻使有津吐之治小兒急疳蝕口唇鼻三礬散方黃礬青礬各半兩燒令枯白礬燒枯研麝香研石膽研莨菪子微炒人糞燒灰莽草雄黃研白狗糞燒灰地龍各一分上一十一味搗研為細散每用半錢匕摻患處有涎吐之治小兒急疳蝕唇口鼻白楊皮湯方白楊皮銼一握地骨皮一兩蜀椒去閉口者並目炒出汗三十粒杏仁湯浸去皮尖雙仁炒蒼耳子各一分高良薑炒生乾地黃切焙細辛去苗葉各半兩上八味銼如麻豆大每服五錢匕水二盞煎十餘沸去滓熱含冷吐以瘥為度治小兒牙疳出血牙齦臭爛風牙走馬疳蚛牙等酸漿膏方酸漿草根生者一握細銼以水淨洗亂髮纏裹成一團酸漿草成小窠子結實紅色似梔子中心有子如櫻桃又名苦聃也皂莢二挺不蚛者椎銼附子去皮臍生為末半兩白礬研一錢麝香一皂子大研留在乳鉢內上五味先用米醋一碗入酸漿草根及皂莢兩味慢火煎至半碗去滓入附子白礬末更熬成膏取出候冷刮入麝香乳鉢內研勻以瓷合收盛患者先用鹽湯漱剔牙縫令淨然後以指蘸藥膏揩之如齦爛以帛子攤藥貼治小兒走馬疳蟾蜍散方蟾蜍一枚去頭足及腸胃燒灰龍柏花地骨皮各一分無食子兩枚麝香研一錢上五味搗羅為細散每先以鹽漿水淨漱口後以硝石末少許先貼一上次以此藥一錢匕貼之日三治小兒疳蟲蝕唇口鼻黃龍散方銷金銀鍋下黃龍灰細研一兩麝香研一分銀末小豆大蟾蜍一枚一半燒灰一半炙乾搗末上四味搗羅為細散但有蟲蝕處瘡上敷之治小兒急疳蟲蝕唇鼻齒口硫黃散方硫黃研半兩乾漆炒煙盡一兩文蛤燒灰二兩上三味搗羅為細散每用半錢匕入麝香少許研令細取故綿拭去瘡上惡血然後用藥敷之治小兒走馬疳膽礬散方膽礬飛乳香研鉛丹飛各一錢上三味同研為細散每用紙拈子點少許貼患處如肉紫爛臭藥到便紅治小兒急疳蝕唇鼻附子丸方附子炮裂去皮臍黃蠟各半兩上二味搗附子為末銷蠟為丸納蟲孔中治小兒走馬疳代赭石散方代赭石丁頭者上一味不拘多少用炭火燒赤醋淬七遍濕地上以物蓋出火毒搗研為散患者不拘大人小兒射破唇上下如針眼子者先用溫漿水漱口剪好紙作細條子薄蘸藥於疳牙齦上貼隔宿即生肌如石榴子甚者不過再上尋常牙齒宣露亦用藥貼之治小兒急疳及蝕唇鼻巴豆丸方巴豆十七枚上一味冷水浸一宿去皮研與蠟為丸如梧桐子大每用一丸含之仍吐其汁若誤咽在喉中喉腫閉塞吐利者急煎黃連湯及藍葉汁等解之治小兒急疳蟲蝕口內生瘡腹大羸瘦蟾灰丸方蟾灰地龍炒蝸牛殼炒狗頭灰人糞灰蘭香根灰麝香各一分上七味同研為細散用漿水調在紙上時用貼瘡如鼻中有瘡綿裹藥安鼻中如疳入腹以水浸蒸餅丸如緑豆大不計時候以粥飲下五丸日三服量兒大小以意加減治小兒急疳蟲蝕口鼻及下部皆赤爛方大蒜二兩甜葶藶半兩干蝦蟆一兩地龍去土炒二枚亂髮灰一分上五味粗搗篩相和入竹筒內置瓦中以煻灰火燒之取瀝少許塗兒口鼻囟頂及穀道等處治小兒急疳唇口臭爛齒宣腫護命散方乾蟾一枚五月五日取燒存性白龍骨搗研雄黃麝香石膽蘆薈各一分研上六味同研為細散每用少許敷瘡上治小兒急疳口生瘡及諸疳熊膽膏方熊膽蚺蛇膽蘆薈龍腦牛黃麝香各一分研上六味合研令細以井華水一盞攪和令勻瓷器內盛重湯緩火煎數沸以篦攪盞四畔勿令藥干煮盛欲吹鼻時先七日乳母及孩子斷食生冷醬豆諸葷辛熱面魚肉等兼少食鹽然後取二豆許漸漸吹鼻及塗口瘡上治小兒急疳蝦蟆丸方蝦蟆一枚去爪燒作灰熊膽研麝香研豬牙皂莢去皮子炙白蕪荑各一分上五味搗研為末煉蜜丸如緑豆大每服五丸至七丸米飲或溫水下日三服如急疳曾退落牙齒者以倒流水化五七丸塗齦上治小兒走馬疳四物散方粉霜麝香石灰鉛丹炒紫色各一分上四味先研前三味細為散後入鉛丹再研勻如桃花紅用雞翎掃之立瘥治小兒急疳牙齦腐爛惡血口臭牙齒脫落立驗麝香散方麝香研銅緑研各一錢黃連去須三錢上三味搗研為散以棗肉一枚水銀一錢研如泥入前末共研令勻患處敷少許以蘭香葉覆之立瘥內消者可待肉生治小兒急疳及脾毒骨槽風蝕動唇口雄黃散方雄黃一分水銀半錢與雄黃同研令星盡銅緑一錢麝香一字上四味研勻以瓷合盛每先以新綿搵去血甚者剪去惡肉貼之一日三敷之治小兒走馬疳蝕透損骨及小可攻蝕天南星散方天南星大者一枚皂子大雄黃上二味先用天南星當心剜作坑子次安雄黃一塊在內用大麥麵裹合炭火內燒令煙盡取出候冷入麝香一字同研為細末先以新綿搵血然後於瘡上摻藥一日三次敷之治小兒急疳蟲蝕口內齒齦作瘡熊膽散方熊膽細研甜葶藶微炒莨