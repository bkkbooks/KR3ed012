body:
  text: 卷第二十五傷寒乾嘔論曰傷寒乾嘔者嘔而無所出也此因邪熱在胃或發汗解後胃中不和尚有蓄熱氣熏上焦心下痞結故令乾嘔且諸邪氣在胃胃氣上逆皆發為嘔冷即寒痰凝滯嘔出涎沫熱即津液消鑠獨其氣逆故乾嘔而已拯療者不可不察治傷寒乾嘔不止葛根湯方葛根銼一兩茯苓去黑皮半兩半夏湯洗七遍炒乾三分白朮半兩黃耆三分銼人參一兩麥門冬去心焙一兩甘草半兩炙銼上八味粗搗篩每服三錢匕水一盞生薑半分拍碎棗二枚劈破同煎至六分去滓溫服治傷寒胃氣虛熱乾嘔不止竹茹湯方淡竹茹半兩人參一兩前胡去蘆頭三分甘草半兩炙蘆根一兩葛根三分半夏半兩湯洗七遍切焙乾上七味銼如麻豆每服五錢匕水一盞半入生薑一分拍碎同煎至八分去滓溫服不計時候治傷寒脾胃有熱乾嘔煩滿茯苓湯方白茯苓去黑皮一兩人參一兩半夏湯洗七遍切炒乾麥門冬去心焙各二兩粳米二合甘草半兩炙銼上六味粗搗篩每服五錢匕用水一盞半生薑一分拍碎棗三枚劈破竹葉三七片同煎至八分去滓溫服日再治傷寒心脾虛熱乾嘔煩渴不下食蘆根湯方蘆根銼二兩人參一兩半赤茯苓去黑皮一兩淡竹茹一兩甘草炙銼半兩上五味粗搗篩每服五錢匕水一盞半入小麥半匙生薑半分拍碎同煎至一盞去滓溫服日再治傷寒乾嘔煩渴不止枇杷葉湯方枇杷葉去毛薑汁炙麥門冬去心焙葛根人參各三分白茯苓去黑皮半兩甘草炙銼一分上六味粗搗篩每服三錢匕用水一盞入生薑半分拍碎同煎至七分去滓不計時候溫服治傷寒乾嘔不止手足逆冷薑橘湯方生薑切焙陳橘皮湯浸去白焙上二味等分粗搗篩每服三錢匕水一盞煎至七分去滓不拘時候溫服治傷寒中風五六日以上胸中煩乾嘔栝蔞實湯方栝蔞實一兩柴胡去苗八兩黃芩去黑心三兩甘草三兩炙上四味銼如麻豆每服五錢匕水一盞半煎取一盞去滓溫服治傷寒熱病乾嘔蘆根飲方蘆根銼半兩冬瓜皮半兩切焙上二味粗搗篩用水三盞煎至一盞半去滓分溫二服不計時候治傷寒後胃中虛熱乾嘔不下食人參湯方人參三分生薑切焙半兩陳橘皮去白焙半兩甘草炙銼一兩上四味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服治傷寒後胃氣虛熱乾嘔不止煩渴陳橘皮湯方陳橘皮去白焙一兩半甘草炙銼半兩枇杷葉拭去毛一兩半薑汁炙粟米三合上四味粗搗篩每服五錢匕水一盞半生薑半分拍碎同煎至一盞去滓溫服不計時候治傷寒乾嘔不下食半夏湯方半夏湯洗七遍切焙乾蘆根淡竹茹麥門冬去心焙人參白茯苓去黑皮各一兩上六味粗搗篩每服五錢匕水一盞半生薑一分拍碎同煎至一盞去滓溫服日再治傷寒後胃間餘熱乾嘔不止半夏木通湯方半夏半兩湯洗七遍切焙乾木通銼一兩蘆根銼一兩半陳橘皮去白焙半兩柴胡去苗一兩麥門冬去心焙半兩枇杷葉拭去毛半兩薑汁炙上七味粗搗篩每服五錢匕水一盞半入生薑一分拍碎同煎至一盞去滓食前溫服治傷寒胃氣虛冷乾嘔不止人參煮散方人參一兩芍藥白朮各三分陳橘皮湯浸去白焙乾薑炮杏仁湯浸去皮尖雙仁麩炒甘草炙銼枳殼去瓤麩炒各半兩高良薑一分上九味搗為粗散每服二錢匕水一盞入生薑五片棗二枚劈破煎至七分去滓熱服並三服以稀粥投之汗出即瘥治傷寒風邪在胃乾嘔不止飲食不下人參丸方人參茯苓去黑皮茯神去木丁香半夏湯洗去滑焙白萹豆各等分上六味搗羅為細末滴水為丸如梧桐子大每服二十丸生薑湯下治傷寒邪熱雖退胃中不和乾嘔不已甚則吐逆白朮飲方白朮蘆根厚朴去粗皮生薑汁炙各一兩枇杷葉去毛炙半兩上四味粗搗篩每服三錢匕水一盞入生薑五片煎至七分去滓溫服不拘時傷寒嘔噦論曰傷寒嘔噦者病在足陽明胃之經也足陽明之脈厥而上行即令人氣逆氣逆故嘔噦仲景云嘔多雖有陽明證慎不可下蓋為此也又傷寒嘔噦有因熱結胸中邪氣之高所致有因吐下後虛熱在內及飲水停積所致證既不同治亦隨異不可不察治傷寒後胃氣逆冷食已嘔噦即欲吐半夏湯方半夏一兩湯洗七遍炒乾白茯苓去黑皮一兩枳殼去瓤麩炒人參各半兩白朮一兩半上五味粗搗篩每服三錢匕水一盞生薑一分拍碎煎至七分去滓溫服日二治傷寒嘔噦不止橘皮湯方陳橘皮湯浸去白炒前胡去蘆頭甘草炙銼各一兩白朮半兩上四味粗搗篩每服三錢匕水一盞生薑半分拍碎煎至七分去滓溫服日二治傷寒後胸膈氣滿嘔噦不納飲食茯苓湯方白茯苓去黑皮一兩陳橘皮湯浸去白炒枳實去瓤麩炒各半兩人參白朮五味子各三分半夏湯洗七遍一分上七味粗搗篩每服五錢匕水一盞半生薑半分拍碎棗三枚劈破煎至一盞去滓溫服治傷寒後服冷藥過多胃寒嘔噦不下飲食人參湯方人參白朮白茯苓去黑皮附子炮裂去皮臍陳橘皮湯浸去白炒各一兩桂去粗皮乾薑炮各半兩丁香一分上八味粗搗篩每服五錢匕水一盞半生薑半分拍碎粳米半匙煎至一盞去滓溫服不拘時治傷寒嘔噦不止飲食不下藿香湯方藿香葉一兩丁香白豆蔻去皮各一分高良薑炒陳橘皮湯浸去白焙各半兩上五味粗搗篩每服三錢匕水一盞煎至七分去滓食前熱呷服治傷寒脾胃虛冷嘔噦不思飲食厚朴湯方厚朴去粗皮生薑汁炙人參各一兩枇杷葉炙拭去毛肉豆蔻去殼各半兩白茯苓去黑皮一兩半上五味粗搗篩每服三錢匕水一盞生薑三片煎至七分去滓溫服空心食前治傷寒嘔噦不止胸滿煩躁藿香人參湯方藿香葉三分人參一兩陳橘皮湯浸去白焙甘草炙銼各半兩上四味粗搗篩每服三錢匕水一盞入生薑三片同煎至六分去滓溫服不拘時治傷寒四五日嘔噦有痰胸膈不利人參丸方人參厚朴去粗皮生薑汁炙白茯苓去黑皮各一兩半夏湯洗七遍二兩上四味搗羅為末用薑汁作麵糊丸如梧桐子大每服三十丸生薑湯下治傷寒時多嘔噦不止定氣散方高良薑半兩草豆蔻去皮一枚甘草炙木香炮各一分上四味用酒浸紙裹煨令香熟焙乾搗羅為散每服二錢匕醋湯調下治傷寒噦逆嘔吐虛氣妄行通正散方丁香乾柿蒂各一兩蓮子肉五十枚去心上三味搗羅為細散每服二錢匕溫酒調下飯飲亦得治傷寒嘔噦不止或吐酸水丁香湯方丁香三分厚朴去粗皮生薑汁炙乾薑炮各一兩高良薑一分上四味粗搗篩每服三錢匕水一盞煎至五分去滓熱服不拘時兼治一切冷氣吐逆治傷寒嘔噦不止柿蒂湯方乾柿蒂七枚白梅三枚上二味粗搗篩只作一服用水一盞煎至半盞去滓溫服不拘時治傷寒嘔噦日夜不止蓽澄茄湯方蓽澄茄高良薑各三分上二味粗搗篩每服三錢匕水一盞煎十餘沸入醋少許攪勻去滓熱服不拘時治傷寒瘥後嘔噦不止者有餘熱在胃脘也竹葉加生薑湯方淡竹葉半把石膏碎四兩半夏湯洗七遍三分麥門冬去心焙二兩甘草炙銼人參各半兩上六味粗搗篩每服五錢匕水一盞半入粳米半匙生薑一分切煎至八分去滓溫服治傷寒少陰證嘔噦者四逆湯加生薑方甘草炙銼一兩乾薑炮三分附子炮裂去皮臍半枚生薑切焙一兩半上四味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服治傷寒脾胃不和嘔逆寒熱和氣五積散方蒼朮二十兩桔梗銼炒十兩陳橘皮湯浸去白焙六兩白芷甘草炙銼各三兩當歸切焙二兩芎藭一兩半芍藥白茯苓去黑皮半夏湯洗七遍各一兩麻黃去根節春夏二兩秋冬三兩乾薑炮春夏一兩半秋冬二兩枳殼麩炒去瓤四兩以下三物別搗桂去粗皮春夏三兩秋冬四兩厚朴去粗皮生薑汁炙二兩上一十五味將前十二味粗搗篩分作六分大鍋內微火炒令香熟即止不可過焦取出淨板床上候冷入後三物和之和氣每服三錢匕水一盞入薑棗煎至六分去滓溫服傷寒手足逆冷虛汗不止脈沉細面青嘔逆加順元散一錢匕同煎熱服産婦經三兩日不生或胎死腹中或氣乏委頓産道乾澀加順元散水七分酒三分同煎相繼兩服氣血和順即産胎死者不過三服當下其順元散多少量産母虛實傷寒發熱而內挾冷者加蔥白二寸豉七粒同煎相繼兩三服當以汗解順元散方見陰毒門治傷寒嘔噦心腹冷疼痰逆不消高良薑湯方高良薑甘草炙銼各半兩桂去粗皮半夏湯洗七遍炒黃各一兩上四味粗搗篩每服三錢匕水一盞入生薑三片同煎至五分去滓食前溫服兼治一切冷氣心腹疼痛傷寒心悸論曰傷寒心下悸者謂悸動不定也傷寒飲水過多水停心下腎氣乘心則心氣虛弱故為之悸動也此皆由發汗以後又下之津液燥少若內生虛熱熱則飲水水氣停積故必振寒而心下悸也治傷寒厥心下悸宜先治水當服茯苓甘草湯卻治其厥不爾水漬入胃必作利也茯苓甘草湯方赤茯苓去黑皮桂去粗皮各二兩甘草炙銼一兩上三味粗搗篩每服五錢匕水一盞半入生薑一棗大拍碎煎取七分去滓溫服治傷寒發汗不解發熱心忪驚悸頭眩目瞤真武湯方赤茯苓去黑皮一兩芍藥一兩附子炮裂去皮臍半兩白朮一兩甘草炙半兩上五味銼如麻豆大每服五錢匕用水一盞半入生薑半分切同煎至七分去滓溫服治傷寒發汗過多其人叉手自冒沁心下悸欲得按者桂枝甘草湯方桂枝去粗皮四兩甘草炙三兩上二味銼如麻豆大每服五錢匕水一盞半煎取七分去滓溫服治傷寒脈結心悸動炙甘草湯方甘草炙一兩人參半兩桂去粗皮三分麥門冬去心焙一兩麻仁一合生地黃四兩上六味㕮咀如麻豆大每服五錢匕水一盞半酒半盞入生薑半分切大棗二枚劈破煎取八分去滓入阿膠一片令煬盡溫服日三服治傷寒水在心下心悸動欲得人按桂枝湯方桂去粗皮二兩赤茯苓去黑皮一兩半白朮一兩甘草炙銼三分陳橘皮湯浸去白焙半兩上五味粗搗篩每服五錢匕水一盞半煎取七分去滓溫服不拘時候治傷寒飲水過多心下悸動不定赤茯苓湯方赤茯苓去黑皮二兩陳橘皮湯浸去白焙二兩半夏湯洗七遍切焙二兩枳殼麩炒去瓤半兩人參一兩白朮三分上六味粗搗篩每服五錢匕水一盞半入生薑半分拍碎同煎取八分去滓溫服不拘時候治傷寒嘔噦心下悸動胸膈有滯水往往頭眩茯苓半夏湯方赤茯苓去黑皮二兩半夏湯洗七遍炒乾三兩陳橘皮湯浸去白焙一兩上三味粗搗篩每服五錢匕水一盞半入生薑一分拍碎同煎至七分去滓溫服晚再服治傷寒吐後心下逆滿忪悸不定起即頭眩茯苓白朮湯方赤茯苓去黑皮一兩白朮三分桂去粗皮三分甘草炙銼半兩芎藭一兩上五味粗搗篩每服三錢匕水一盞煎至六分去滓溫服治傷寒發汗後引飲過多心下悸動茯苓桂枝湯方赤茯苓去黑皮桂去粗皮半夏湯洗七遍炒乾各一兩甘草炙銼半兩上四味粗搗篩每服三錢匕水一盞入生薑半分拍碎同煎至七分去滓溫服治傷寒心下有飲悸動不定桂心湯方桂去粗皮一兩檳榔銼半夏湯洗七遍炒各半兩上三味㕮咀如麻豆大每服四錢匕水一盞半入生薑五片同煎至七分去滓食前溫服如人行三五里再服傷寒痞滿論曰傷寒病發於陰而醫誤下之邪氣入里胃中虛客氣上逆心下滿不痛按之不堅此為痞也法宜瀉心唯表未解者未可攻之當先解表然後攻痞若表解而里未和或瀉心而痞不解其人口燥煩渴皆隨證處治其眩冒而經脈動惕者久則成痿若表裡俱虛之人有氣痞陰陽氣並竭無陽則陰獨復加火針因而致煩面青黃膚瞤者難治其脈微浮而氣上衝咽喉不能息者非痞有寒在胸中故也治屬吐法治傷寒心下痞但滿不痛者半夏瀉心湯方