膕如結腨如別其法治以苦熱佐以酸淡以苦燥之以淡泄之歲運之火紀曰赫曦是謂蕃茂陰氣內化陽氣外榮炎暑施化物得以昌其化長其氣高其政動其令鳴顯其動炎灼妄擾其德暄暑鬱蒸其變炎烈沸騰其化兼其所勝其病笑瘧瘡瘍血流狂妄目赤上見太陽水抑運火是謂上羽與正徵同其收齊其病痓其治宜以甘和初之氣自丁酉年大寒日申初至是歲春分日午初凡六十日八十七刻半主位少角木客氣少陽火中見火運氣與運同地氣遷氣乃大溫草乃早榮民乃厲溫病乃作身熱頭痛嘔吐肌腠瘡瘍宜調少陽之客以咸補之以甘瀉之以咸耎之歲谷宜玄間谷宜豆則火不為邪是氣也無犯司氣之熱二之氣自春分日午正至小滿日辰正凡六十日有奇主位太徵火客氣陽明金中見火運歲運得位陽明客之燥熱相遇大涼反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始宜調陽明之客以酸補之以辛瀉之以苦泄之歲谷宜玄間谷宜黍則燥不為邪三之氣自小滿日巳初至大暑日卯初凡六十日有奇主位太徵火客氣太陽水中見火運火當其位天政布寒氣行民病寒反熱中癰疽注下心熱瞀悶不治者死宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜玄間谷宜稷則寒不為邪四之氣自大暑日卯正至秋分日醜正凡六十日有奇主位少宮土客氣厥陰木中見火運土木相刑風濕交爭風化為雨乃長乃化乃成民病大熱少氣肌肉萎足痿注下赤白宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜黅間谷宜稻則風不為邪五之氣自秋分日寅初至小雪日子初凡六十日有奇主位太商金客氣少陰火中見火運氣與運同不司氣化時令至此陽復化草乃長乃化乃成民乃舒宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜黅間谷宜豆則熱不為邪終之氣自小雪日子正至大寒日戌正凡六十日有奇主位少羽水客氣太陰土中見火運地氣正濕令行陰凝太虛埃昏郊野民乃慘淒寒風以至反者孕乃死宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜黅間谷宜麻則濕不為邪此六氣之化也歲半之前有勝氣者歲半之後必有復氣水勝則太陰復之土勝則厥陰復之治各以其勝復之法己亥歲圖厥陰風木司天少陽相火在泉中見少宮土運歲土不及氣化運行後天風化為天氣灼化左藏化右故天氣擾而其政撓苦化為地氣清化左黅化右故地氣正而其令速風生高遠炎熱從之云趨雨府濕化乃行風火同德上應歲星熒惑其谷蒼丹間谷言太商者其耗文角品羽風化清化勝復同所謂邪氣化日也風化三濕化五火化七所謂正化日也毛蟲靜羽蟲育是謂歲物之宜介蟲耗寒毒不生是皆地氣所制風燥火熱勝復更作熱病行於下風病行於上風燥勝復形於中陰在上陽在下天氣虛當資化源以助木氣歲土不及上角與正角同其邪乃微必贊其運氣無使邪勝歲宜以辛調上以咸調下畏火之氣無妄犯之故曰其化上辛涼中甘和下鹹寒藥食宜也歲半之前厥陰風化主之若風淫所勝則太虛埃昏雲物以擾寒生春氣流水不冰民病胃脘當心而痛上支兩脅鬲咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉蟄蟲不去病本於脾診在足衝陽之脈法宜平以辛涼佐以苦甘以甘緩之以酸瀉之歲半之後少陽相火生之若火淫於內則焰明郊野寒熱更至民病注泄赤白少腹痛溺赤甚則血便法宜治以鹹冷佐以苦辛以酸收之以苦發之歲運之化紀曰卑監是謂減化化氣不令生政獨彰長氣整雨乃愆收氣平風寒並興草木榮美秀而不實成而秕也其氣散其用靜定其動瘍湧分潰癰腫其發濡滯其化兼所不勝風化盛行四維有埃云潤澤之化則春有鳴條鼓拆之政四維發振拉飄騰之變則秋有肅殺霖霪之復其眚四維其藏脾其病內舍心腹外在肌肉四肢上臨厥陰氣同正角民病飧泄邪傷脾也法宜治以甘和初之氣自戊戌年大寒日亥初至是歲春分日酉初凡六十日八十七刻半主位少角木客氣陽明金中見土運土生金清化行寒始肅殺氣方至民病寒於右之下宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜蒼間谷宜黍制其燥邪弗能為害二之氣自春分日酉正至小滿日未正凡六十日有奇主位太徵火客氣太陽水中見土運濕寒合氣以行舒榮之化寒不去華雪水冰殺氣施化霜乃降名草上焦寒雨數至陽復化民病熱於中宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜蒼間谷宜稷制其寒邪弗能為害三之氣自小滿日申初至大暑日午初凡六十日有奇主位太徵火客氣厥陰木中見土運木勝土天政布風乃時舉民病泣出耳鳴掉眩宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜蒼間谷宜稻制其風邪莫能為害四之氣自大暑日午正至秋分日辰正凡六十日有奇主位少宮土客氣少陰火中見土運土居其位少陰居之溽暑至濕熱相搏爭於左之上民病黃疸而為胕腫宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆制其邪熱莫能為害五之氣自秋分日巳初至小雪日卯初凡六十日有奇主位太商金客氣太陰土中見土運氣與運同燥濕更勝沉陰乃布寒氣及體風雨乃行宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜丹間谷宜麻制其濕邪莫能為害是氣也無犯司氣終之氣自小雪日卯正至大寒日醜正凡六十日有奇主位少羽水客氣少陽火中見土運火土相得畏火司令陽乃大化蟄蟲出見流水不冰地氣大發草乃生人乃舒其病溫厲宜治少陽之客以咸補之以甘瀉之以咸軟之歲谷宜丹間谷宜豆制其火邪莫能為害歲氣大法風勝則有陽明之復火勝則有太陽之復觀氣所至各以其法治之庚子歲圖少陽君火司天陽明燥金在泉中見太商金運歲金太過氣化運行先天堅成之紀紀曰上徵與正商同又曰太商下加陽明太過而加同天符天符為執法是謂平氣之化命曰審平之紀收而不爭殺而無犯五化宣明其氣潔其性剛其用散落其化堅斂其政徑肅其候清切其令燥其類金其應秋其谷稻其果桃其實殼其蟲介其畜雞其物外堅其色白其味辛其音商其數九其在人也在藏為肺在竅為鼻在體為皮毛在病為咳此歲運所主也天地之氣熱化在上左柔化右動化故天政所布其氣明辛化在下左藏化右明化故地氣肅而其令切二歲交司之氣寒交暑天地相應之氣熱加燥云馳雨府濕化乃行時雨乃降金火合德上應熒惑太白其谷丹白熱化七清化九燥化九所謂正化之日羽蟲靜介蟲育是謂歲物所宜毛蟲耗濕毒不生是謂地氣所制水火寒熱持於氣交而為病始熱病生於上清病生於下寒熱相犯而爭於中民病咳喘血溢血泄鼽嚏目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上歲半之前少陰君火以司天氣少陰之化有本標之異寒熱得中其氣乃和而無熱淫之勝歲半之後陽明燥金以司地氣陽明不從標本以中氣為化燥濕相兼其化乃平而無燥淫之勝是歲平金無勝復不取化源惟資歲勝折其鬱氣無使暴過而生其病歲宜以鹹寒調其上以酸溫安其下以辛溫調其中食丹白之谷以全真氣食間氣之谷以闢虛邪運同地氣宜多溫熱化司氣以涼用涼遠涼此其道也初之氣自己亥年大寒日寅初至是歲春分日子初凡六十日八十七刻半主位少角木客氣太陽水中見金運風寒燥三氣同奉少陰之政以行春令地氣遷燥將去寒乃始蟄復藏水乃冰霜復降風乃至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷用丹間谷用稷乃無寒邪之害二之氣自春分日子正至小滿日戌正凡六十日有奇主位太徵火客氣厥陰木中見金運風火燥三氣同奉少陰之政以行舒榮之化木火相得陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目瞑目赤氣鬱於上而熱宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷用丹間谷用稻乃無風邪之害三之氣自小滿日亥初至大暑日酉初凡六十日有奇主位太徵火客氣少陰火中見金運二火勝運又為天政所布故大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤宜治少陰之客以咸補之以甘瀉之以酸收之歲谷用丹間谷用豆乃無熱邪之害四之氣自大暑日酉正至秋分日未正凡六十日有奇主位少宮土客氣太陰土中見金運土得其位以生運金二氣相得以行陽明之令溽暑至大雨時行寒熱互至民病寒熱嗌乾黃疸鼽衄飲發宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷用白間谷用麻乃無濕邪之害五之氣自秋分日申初至小雪日午初凡六十日有奇主位太商金客氣少陽火中見金運歲金雖得位客氣少陽用事清化乃抑畏火臨暑反至陽乃化萬物乃生乃長榮民乃康其病溫宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷用白間谷用豆乃無火邪之害終之氣自小雪日午正至大寒日辰正凡六十日有奇主位少羽水客氣陽明金中見金運金氣相符水氣生之又為歲之司氣金氣乃平故燥令行餘火內格民病腫於上咳喘甚則血溢寒氣數舉則霧霿翳病生皮腠內舍於脅下連少腹而作寒中宜調陽明之客以酸補之以辛瀉之以苦泄之歲谷用白間谷用黍乃無燥邪之害是氣也司氣以涼用涼無犯是謂至治辛丑歲圖太陰濕土司天太陽寒水在泉中見少羽水運歲水不及氣化運行後天涸流之紀曰上宮與正宮同是歲天氣平又少羽下加太陽不及而加同歲會凡歲會為行令此運化亦平也諸同正歲氣化運行同天歲運既平命曰靜順之紀藏而勿害治而善下五化咸整其氣明其性下其用沃衍其化凝堅其政流演其候凝肅其令寒其類水其應冬其谷豆其果栗其實濡其蟲鱗其畜彘其色黑其味鹹其音羽其數六其在人也其藏為腎其主二陰其養骨髓其病厥此歲運之化也天地之氣濕化在上明化左灼化右故地氣上騰而其政肅咸化在下動化左清化右故天氣下降而其令寂陰專其政陽氣退闢大風時起原野昏霿白埃四起云奔南極寒雨數至物成於差夏濕寒合德黃黑埃昏流行氣交上應鎮星辰星其谷黅玄故陰凝於上寒積於下寒水勝火則為冰雹陽光不治殺氣乃行民病寒濕腹滿身䐜膹胕腫痞逆寒厥拘急故有餘宜高不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之間谷命太徵太商之谷歲氣既平不取化源唯折其水鬱之氣無使邪勝食黅玄之谷以全其真食間氣之谷以保其精歲宜以苦熱調上以苦熱調下以苦和調中燥之溫之歲半之前天氣太陰主之太陰所至為雲雨其化從本當其時多行雨濕化者太陰之政也歲半之後地氣太陽主之太陽所至為寒霧其化從本從標當其時寒氣至而熱氣應者地氣之平也初之氣自庚子歲大寒日巳初至是年春分日卯初凡六十日八十七刻半主位少角木客氣厥陰木中見水運木當其位水運統之奉太陰之政而行春令地氣遷寒乃去春氣正風乃來生布萬物以榮民氣條舒風濕相搏雨乃後民病血溢筋絡拘強關節不利身重筋痿宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷用黅間谷用稻乃無客風之害二之氣自春分日卯正至小滿日醜正凡六十日有奇主位太徵火客氣少陰火中見水運火當其位陰精承之寒熱二氣奉太陰之政以行舒榮之化太火正物承化民乃和其病溫厲盛行遠近咸若濕蒸相搏雨乃時降宜治少陰之客以咸補之以甘瀉之以酸收之歲谷用黅間谷用豆乃無客熱之害三之氣自小滿日寅初至大暑日子初凡六十日有奇主位太徵火客氣太陰土中見水運天政所布濕氣降地氣騰雨乃時降寒乃隨之感於寒濕民病身重胕腫胸腹滿宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷用黅間谷用麻乃無濕邪之害四之氣自大暑日子正至秋分日戌正凡六十日有奇主位少宮土客氣少陽火中見水運火土相得奉太陽之令畏火臨溽蒸化地氣騰天氣否隔寒風曉暮蒸熱相搏草木凝煙濕化不流則白露陰布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫宜治少陽之客以咸補之以甘瀉之以咸軟之歲谷用玄間谷用豆乃無熱邪之害五之氣自秋分日亥初至小雪日酉初凡六十日有奇主位太商金客氣陽明金中見水運金當其位與水運相得慘令已行寒露下霜乃早降草木黃落寒氣及體君子周密民病皮腠宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷用玄間谷用黍乃無客燥之害終之氣自小雪日酉正至大寒日未正凡六十日有奇主位少羽水客氣太陽水中見水運氣與運符會寒大舉濕大化霜乃積陰乃凝水堅冰陽光不治感於寒則病人關節禁固腰脽痛寒濕持於氣交而為疾也宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷用玄間谷用稷乃無客寒之害是歲行平氣之化歲會為行令無淫氣勝復唯行德化政令然土為天氣水為地氣水土雖睦而運化不及濕土在上土氣刑之或有濕邪其氣亦微內經所謂中行令者其病徐而持也壬寅歲圖少陽相火司天厥陰風木在泉中見太角木運歲木太過氣化運行先天太角下加厥陰太過而加同天符天符為執法平木之化也命曰敷和之紀木德周行陽舒陰布五化宣平其氣端其性隨其用曲直其化生榮其政發散其候溫和其類草木其物中堅其令風其應春其谷麻其果李其實核其蟲毛其畜犬其色蒼其味酸其音角其數八其在人也其藏肝其主目其養筋其病裡急支滿此歲運所主也天地之氣火化在上左清化右柔化故天氣正而其政嚴酸化在下左灼化右藏化故地氣擾而其令撓風乃暴舉木偃沙飛炎火乃流陰行陽化雨乃時應火木同德上應熒惑歲星其谷丹蒼風熱參布雲物沸騰太陰橫流寒乃時至涼雨並起民病寒中外發瘡瘍內為泄滿聖人遇之和而不爭往復之作民病寒熱瘧泄聾瞑嘔吐上怫腫色變歲半之前天氣少陽主之少陽所至為炎暑其化從本當其時火化盛行風氣應之候乃和歲半之後地氣厥陰主之厥陰所至為風府其化不從標本而以中氣為化當其時風從火化者厥陰之中也是歲運化既平不取化源惟贊所不勝則暴過不生苛疾不起歲宜以鹹寒調上以辛涼調下以酸和調中滲之泄之漬之發之運同風熱宜多寒化司氣以溫用溫遠溫治之常也初之氣自辛丑年大寒日申初至是歲春分日午初凡六十日八十七刻半主位太角木客氣少陰火中見木運木火相得運當其位以奉少陽之政而行春令地氣遷風勝乃搖寒乃去候乃大溫草木早榮寒來不殺溫病乃起其病氣怫於上血溢目赤咳逆頭痛血傷脅滿膚腠中瘡宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆則熱不為邪二之氣自春分日午正至小滿日辰正凡六十日有奇主位少徵火客氣太陰土中見木運風濕之氣奉畏火之政以行舒榮之化火反郁白埃四起云趨雨府風不勝濕雨乃零民乃康其病熱鬱於上咳逆嘔吐瘡發於中胸嗌不利頭痛身熱昏憒膿瘡宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜丹間谷宜麻則濕不為邪三之氣自小滿日巳初至大暑日卯初凡六十日有奇主位少徵火客氣少陽火中見木運火當其位與木運之氣相得天政布炎暑至少陽臨上雨乃涯民病熱中聾瞑血溢膿瘡咳嘔鼽衄渴嚏欠喉痹目赤善暴死宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜丹間谷宜豆則火不為邪是歲木氣適平自無暴死四之氣自大暑日卯正至秋分日醜正凡六十日有奇主位太宮土客氣陽明金中見木運風燥之氣下應在泉厥陰之令而為天地交司秋氣早行涼乃至炎暑間化白露降民氣和平其病滿身重宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜蒼間谷宜黍則燥不為邪五之氣自秋分日寅初至小雪日子初凡六十日有奇主位少商金客氣太陽水中見木運水木相和與金相得當此一氣寒化早至陽乃去寒乃來雨乃降氣門乃閉剛木早雕民避寒邪君子周密宜治太陽之客以辛補之以咸瀉之以苦堅之以辛潤之歲谷宜蒼間谷宜稷則寒不為邪終之氣自小雪日子正至大寒日戌正凡六十日有奇主位太羽水客氣厥陰木中見木運太角下加厥陰之時運與氣符其化和平又居水位水木相得其化乃順地氣正風乃至萬物反生霿霧以行其病關閉不禁心痛陽氣不藏而咳氣平之時不應有疾或有疾者氣有所承不能無侮所謂邪中執法也經曰中執法者其病速而危宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜蒼間谷宜稻則風不為邪此一氣司氣以溫用溫無犯癸卯歲圖陽明燥金司天少陰君火在泉中見少徵火運歲火不及氣化運行後天伏明之紀曰上商與正商同言天氣平也六元正紀曰少徵下加少陰不及而加同歲會言歲運平也諸同正歲氣化運行同天上見天氣平下見運火平火氣之平命曰升明之紀正陽而治德施周普五化均衡其氣高其性速其用燔灼其化蕃茂其政明曜其候炎暑其類火其應夏其穀麥其果杏其實絡其蟲羽其畜馬其色赤其味苦其物脈其音徵其數七其在人也其藏心其主舌其養血其病瞤瘛此歲運所主也天地之氣燥化在上左藏化右丹化故天氣急而其政切苦化在下左柔化右動化故地氣明而其令暴陽專其令炎暑盛行物燥以堅淳風乃治風燥橫運流於氣交多陽少陰云趨雨府濕化乃敷燥極而澤其谷白丹間谷命太者其耗白甲品羽金火合德上應太白熒惑清熱之氣持於氣交民病咳溢塞寒熱發暴振栗癃閟清先而徑毛蟲乃死熱後而暴介蟲乃殃歲運熱寒化雨化勝復同所謂邪氣化日也燥化四熱化二所謂正化日也歲半之前天氣陽明主之陽明以中氣為化當其時燥濕相半者陽明得中也歲半之後地氣少陰主之少陰有本標之化當其時寒熱得中者少陰之氣和也歲火適平不資化源唯安運氣無使受邪歲宜以苦小溫調上以鹹寒調下以鹹溫調中食白丹之谷以安其氣食間氣之谷以去其邪運同熱氣宜多天化治之常也初之氣自壬寅年大寒日亥初至是歲春分日酉初凡六十日八十七刻半主位太角木客氣太陰土中見火運奉陽明之政而行春令地氣遷陰始凝氣始肅水乃冰寒雨化其病中熱脹面目浮腫善眠鼽衄嚏欠嘔小便黃赤甚則淋宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜白間谷宜麻乃無濕邪之害二之氣自春分日酉正至小滿日未正凡六十日有奇主位少徵火客氣少陽火中見火運三火相符以行舒榮之化陽乃布民乃舒物乃生榮厲大至民善暴死是歲火氣適平厲無暴死宜治少陽之客以咸補之以甘瀉之以咸沃之歲谷用白間谷用豆乃無火邪之害是氣也司氣以熱用熱無犯三之氣自小滿日申初至大暑日午初凡六十日有奇主位少徵火客氣陽明金中見火運金居火位天政布涼乃行燥熱交合燥極而澤民病寒熱宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷用白間谷用黍乃無燥邪之害四之氣自大暑日午正至秋分日辰正凡六十日有奇主位太宮土客氣太陽水中見火運寒濕之氣下奉少陰之令寒雨降病暴僕振栗譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿血便宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷用丹間谷用稷乃無寒邪之害五之氣自秋分日巳初至小雪日卯初凡六十日有奇主位少商金客氣厥陰木中見火運春令反行草乃生榮民氣和宜調厥陰之客以辛補之以酸瀉之以甘緩之歲谷用丹間谷用稻自無風邪之害終之氣自小雪日卯正至大寒日醜正凡六十日有奇主位太羽水客氣少陰火中見火運火氣符會陽氣布候反溫蟄蟲來見流水不冰民乃康平其病溫宜治少陰之客以咸補之以甘瀉之以酸收之歲谷用丹間谷用豆乃無熱邪之害是歲氣運適平若有邪氣則中行令其病徐而持也甲辰歲圖太陽寒水司天太陰濕土在泉中見太宮土運歲土太過氣化運行先天太宮下加太陰太過而加同天符又土運臨辰是謂歲會氣之平也平土之歲命日備化之紀氣協天休德流四政五化齊修其氣平其性順其用高下其化豐滿其政安靜其候溽蒸其令濕其類土其應長夏其谷稷其果棗其實肉其蟲倮其畜牛其物膚其色黃其味甘其音宮其數五其在人也其藏脾其主口其養肉其病否此歲運所主也天地之氣寒化在上左動化右清化故天政所布其氣肅寒化在下左明化右灼化故地氣靜而其令徐水土合德上應辰星鎮星其谷玄黅寒臨太虛其政大舉陽氣不令澤無陽焰則火發待時少陽中治時雨乃涯止極雨散還於太陰云朝北極濕化乃布澤流萬物寒敷於上雷動於下寒濕之氣持於氣交民病寒濕發肌肉萎足痿不收濡瀉血溢歲半之前太陽主之太陽有本標之化寒政大舉熱氣時應者天氣得中也歲半之後太陰主之太陰之化從本雨濕甚者地氣之應也寒化六濕化五是為正化之日倮蟲育鱗蟲靜是為歲物所宜鱗蟲不成燥毒不生是為地氣所制平土之歲本不資化源以運與地氣臨於戌歲有三土天令甚虛宜先資化源以助於水所謂抑其運氣扶其不勝無使暴過而生其疾也食玄黅之谷以全其真避歲之虛邪以安其正以苦熱調上以苦溫調下運土在中亦以苦溫調之運同寒濕化宜燥熱治之常也初之氣自癸卯年大寒日寅初至是歲春分日子初凡六十日八十七刻半主位太角木客氣少陽火中見土運少陽中治以行春令地氣遷氣乃大溫草乃早榮民乃厲溫病乃作身熱頭痛嘔吐肌腠瘡瘍宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜玄間谷宜豆則火不為邪二之氣自春分日子正至小滿日戌正凡六十日有奇主位少徵火客氣陽明金中見土運金土相和大涼反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜玄間谷宜黍則燥不為邪三之氣自小滿日亥初至大暑日酉初凡六十日有奇主位少徵火客氣太陽水中見土運天政布寒氣行雨乃降民病寒反熱中癰疽注下心熱瞀悶不治者死宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜玄間谷宜稷則寒不為邪四之氣自大暑日酉正至秋分日未正凡六十日有奇主位太宮土客氣厥陰木中見土運歲土得位風氣居之風濕交爭風化為雨乃長乃化乃成民病大熱少氣肌肉萎足痿注下赤白宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜黅間谷宜稻則風不為邪五之氣自秋分日申初至小雪日午初凡六十日有奇主位少商金客氣少陰火中見土運火能生土土能生金氣位相和陽復化草乃長乃化乃成民乃舒宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜黅間谷宜豆則熱不為邪終之氣自小雪日午正至大寒日辰正凡六十日有奇主位太羽水客氣太陰土中見土運氣與運符地氣正濕令行陰凝太虛埃昏郊野民乃慘淒寒風以至反者孕乃死宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜黅間谷宜麻則濕不為邪是氣也不可犯涼司氣以涼故也歲氣雖平或有邪氣則中執法經日中執法者其病速而危也乙巳歲圖厥陰風木司天少陽相火在泉中見少商金運歲金不及氣化運行後天上角與正角同諸同正歲氣化運行同天風化行於上左灼化右藏化故天氣