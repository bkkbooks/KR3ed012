body:
  text: 卷第二運氣甲午歲圖少陰君火司天陽明燥金在泉中見太宮土運歲土太過氣化運行先天熱化在上左黅化司氣右動化厥陰故天政所布其氣明辛化在下左藏化太陽右明化少陽故地氣肅而其令切寒交暑熱加燥云馳雨府濕化乃行時雨乃降金火合德上應熒惑太白其谷白丹熱化二雨化五燥化四所謂正化日也羽蟲靜介蟲育藏物之宜也毛蟲耗濕毒不生地氣所制也寒熱持於氣交而為病始熱病生於上清病生於下寒熱相犯而爭於中民病咳喘血溢血泄鼽嚏目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上是歲火為天氣金為地氣火勝金天氣盈宜於年前先取化源以平火氣土運在中天氣生運運生地氣三氣相得而行順化其邪乃微必抑其運土資其歲勝無使暴過而生其病食丹白之谷以全真氣食間氣之谷以闢虛邪歲宜以咸軟之而調其上甚則以苦發之以酸收之而安其下甚則以苦泄之適氣異同而多少之運同地氣以溫熱化其化上鹹寒中苦熱下酸熱藥食宜也歲半之前少陰主之少陰之化熱若熱淫所勝即怫熱至火行其政民病胸中煩熱嗌乾右胠滿皮膚痛寒熱咳喘大雨且至唾血血泄鼽衄嚏嘔溺色變甚則瘡瘍胕腫肩背臂臑及缺盆中痛心痛肺䐜腹大滿膨膨而喘咳病本於肺診在手尺澤之脈其法平以鹹寒佐以苦甘以酸收之歲半之後陽明主之陽明之氣燥若燥淫於內即霿霿清瞑民病喜嘔嘔有苦善太息心脅痛不能反側甚則嗌乾面塵身無膏澤足外反熱其法治以苦溫佐以甘辛以苦下之氣交之中土運主之敦阜之紀是謂廣化厚德清靜順長以盈至陰內實物化充成煙埃朦郁見於厚土大雨時行濕氣乃用燥政乃闢其化圓其氣豐其政靜其令周備其動濡積並稸其德柔潤重淖其變震驚飄驟其化兼其所勝其病腹滿四肢不舉故曰歲土太過雨濕流行腎水受邪民病腹滿清厥意不樂體重煩冤甚則肌肉萎足痿不收行善瘛腳下痛飲發中滿食減四肢不舉變生得位藏氣伏化氣獨治之泉湧河衍涸澤生魚風雨大至土潰鱗見於陸病腹滿溏泄腸鳴反下甚而太溪絶者死不治初之氣自癸巳年大寒日申初至是歲春分日午初凡六十日八十七刻半主位太角木客氣太陽水中見土運地氣遷燥將去寒乃始蟄復藏水乃冰霜復降風乃至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜丹間谷宜稷雖有寒邪不能為害二之氣自春分日午正至小滿日辰正凡六十日有奇主位少徵火客氣厥陰木中見土運木勝土陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目瞑目赤氣鬱於上而熱宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜丹間谷宜稻雖有風邪不能為害三之氣自小滿日巳初至大暑日卯初凡六十日有奇主位少徵火客氣少陰火中見土運二火相加天政布大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤宜治少陰之客以酸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆雖有熱邪不能為害四之氣自大暑日卯正至秋分日醜正凡六十日有奇主位太宮土客氣太陰土中見土運氣與運同又當其位是謂司氣溽暑至大雨時行寒熱互至民病寒熱嗌乾黃疸鼽衄飲發宜調太陰之客以甘補之以苦瀉之以甘緩之歲谷宜白間谷宜麻雖有濕化不能為邪是氣也無犯司氣五之氣自秋分日寅初至小雪日子初凡六十日有奇主位少商金客氣少陽火中見土運畏火臨暑反至陽乃化萬物乃生乃長榮民乃康其病溫宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜白間谷宜豆雖有火邪不能為害終之氣自小雪日子正至大寒日戌正凡六十日有奇主位太羽水客氣陽明金中見土運土生金燥令行餘火內格腫於上咳喘甚則血溢寒氣數舉則霧霿翳病生皮腠內舍於脅下連少腹而作寒中地將易也宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜白間谷宜黍雖有燥邪不能為害是歲火勝則水復金勝則火復氣之勝也微者隨之甚者制之氣之復也稍者平之暴者奪之皆隨勝氣安其屈伏無問其數以平為期乙未歲圖太陰濕土司天太陽寒水在泉中見少商金運歲金不及氣化運行後天濕化在上地氣上騰左少陽明化右少陰灼化其政肅咸化在下天氣下降左厥陰動化右司氣素化其令寂陰專其政陽氣退闢大風時起原野昏霿白埃四起云奔南極寒雨數至物成於差夏濕寒合德黃黑埃昏流行氣交上應鎮星辰星其谷黅玄間谷命太角者熱化寒化勝復同所謂邪氣化日也濕化五清化四寒化六所謂正化日也倮蟲靜鱗蟲育是謂歲物所宜羽蟲耗熱毒不生是乃地氣所制故陰凝於上寒積於下寒水勝火則為冰雹陽光不治殺氣乃行有餘宜高不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之其病寒濕腹滿身䐜憤胕腫痞逆寒厥拘急土為天氣水為地氣土勝水天氣盈地氣虛當取化源以平土氣金運在中天氣生運運生地氣三氣相得其化順邪氣乃微必益其歲氣無使邪勝食黅玄之谷以全其真食間氣之谷以保其精歲宜以苦燥之溫之甚者發之泄之不發不泄則濕氣外溢肉潰皮拆而水血交流必贊其陽火令御甚寒歲運同寒宜以熱化其化上苦熱中酸和下甘熱所謂藥食宜也歲半以前太陰主之若濕淫所勝則沉陰且布雨變枯稿胕腫骨痛陰痹陰痹者按之不得腰脊頭項痛時眩大便難陰氣不用飢不欲食咳唾則有血心如懸病本於腎診在足太溪之脈其法平以苦熱佐以酸辛以苦燥之以淡泄之歲半以後太陽主之若寒淫於內則凝肅慘栗民病少腹控睪引腰脊上衝心痛血見嗌痛頷腫其法治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之歲運之化金不及紀曰從革是謂折收收氣乃後生氣乃揚長化合德火政乃宣庶類以蕃其氣揚其用躁切其動鏗禁瞀厥其發咳喘其化兼所不勝其病嚏咳鼽衄候其氣者夏有光顯鬱蒸之令則冬有嚴凝整肅之應若夏有炎爍燔燎之變則秋有冰雹霜雪之復其眚西其藏肺其病內舍膺脅肩背外在皮毛所謂歲金不及民病肩背瞀重鼽嚏血便注下收氣乃後復則寒雨暴至乃零冰雹霜雪殺物陰厥且格陽反上行頭腦戶痛延及囟頂發熱口瘡甚則心痛初之氣自甲午年大寒日亥初至是歲春分日酉初凡六十日八十七刻半主位太角木客氣厥陰木中見金運木當其位地氣遷寒乃去春氣正風乃來生布萬物以榮民氣條舒風濕相搏雨乃後民病血溢筋絡拘強關節不利身重筋痿宜調厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜黅間谷宜稻雖有風化不能為邪二之氣自春分日酉正至小滿日未正凡六十日有奇主位少徵火客氣少陰火中見金運二火得位而勝金運大火正物承化民乃和其病溫厲盛行遠近咸若濕蒸相搏雨乃時降宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜黅間谷宜豆雖有熱化不能為邪三之氣自小滿日申初至大暑日午初凡六十日有奇主位少徵火客氣太陰土中見金運火生土天政布濕氣降地氣騰雨乃時降寒乃隨之感於寒濕民病身重胕腫胸腹滿宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜黅間谷宜麻雖有濕邪不能為害四之氣自大暑日午正至秋分日辰正凡六十日有奇主位太宮土客氣少陽火中見金運火勝金畏火臨溽蒸化地氣騰天氣否隔寒風曉暮蒸熱相搏草木凝煙濕化不流則白露陰布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜玄間谷宜豆雖有火邪不能為害五之氣自秋分日巳初至小雪日卯初凡六十日有奇主位少商金客氣陽明金中見金運氣與運同又得其位慘令已行寒露下霜乃早降草木黃落寒氣及體君子周密民病皮腠宜調陽明之客以酸補之以辛瀉之以苦泄之歲谷宜玄間谷宜黍雖有燥化不能為邪是氣也司氣以涼用涼無犯終之氣自小雪日卯正至大寒日醜正凡六十日有奇主位太羽水客氣太陽水中見金運金生水寒大舉濕大化霜乃積陰乃凝水堅冰陽光不治感於寒則病人關節禁固腰脽痛寒濕持於氣交而為疾也宜調太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜玄間谷宜稷雖有寒化不能為邪歲氣之交濕勝則厥陰復之寒勝則太陰復之觀其氣至而致其治濕者燥之寒者熱之溫者清之其氣乃平治之大體也丙申歲圖少陽相火司天厥陰風木在泉中見太羽水運歲水太過氣化運行先天相火在上左陽明右太陰故天氣正而其政嚴厥陰在下左少陰右太陽故地氣擾而其令撓風乃暴舉木偃沙飛炎火乃流陰行陽化雨乃時應風熱參布雲物沸騰太陰橫流寒乃時至涼雨並起火木同德上應熒惑歲星其谷丹蒼火化二寒化六風化八所謂正化日也羽蟲靜毛蟲育是謂歲物所宜倮蟲耗清毒不生是皆地氣所制民病寒熱瘧泄聾瞑嘔吐上怫腫色變是歲陽為天氣陰為地氣天氣盈當於年前取火之化源水運在中制火而生木其邪乃微必抑其運水贊所不勝則暴過不生苛疾不起歲宜咸宜辛宜酸滲之泄之漬之發之觀氣寒溫以調其過運異風熱宜少寒化食宜同法此其道也故曰其化上鹹寒中鹹溫下辛溫所謂藥食宜也歲半之前少陽相火主之若火淫所勝則溫氣流行金政不平民病頭痛發熱惡寒而瘧熱上皮膚痛色變黃赤傳而為水身面胕腫腹滿仰息泄注赤白瘡瘍咳唾血煩心胸中熱甚則鼽衄病本於肺診在手天府之脈其法平以鹹冷佐以苦甘以酸收之以苦發之以酸復之歲半之後厥陰風木主之若風淫於內則地氣不明平野昧草乃早秀民病灑灑振寒善伸數欠心痛支滿兩脅裡急飲食不下鬲咽不通食則嘔腹脹善噫得後與氣則快然如衰身體皆重其法治以辛涼佐以苦以甘緩之以辛散之歲運之化水運太過紀曰流衍是謂封藏寒司物化天地嚴凝藏政以布長令不揚其化凜其氣堅其政謐其令流注其動漂泄沃湧其德凝慘寒霧其變冰雪霜雹其病脹其化兼其所勝故曰歲水太過寒氣流行邪害心火民病身熱煩心躁悸陰厥上下中寒譫妄心痛甚則腹大脛腫喘咳寢汗出憎風診在手神門之脈其法治以鹹溫初之氣自乙未年大寒日寅初至是歲春分日子初凡六十日八十七刻半主位太角木客氣少陰火中見水運木生火水運承之地氣遷風勝乃搖寒乃去候乃大溫草木早榮寒來不殺溫病乃起其病氣怫於上血溢目赤咳逆頭痛血傷脅滿膚腠中瘡宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆二之氣自春分日子正至小滿日戌正凡六十日有奇主位少徵火客氣太陰土中見水運土勝水火乃反郁白埃四起云趨雨府風不勝濕雨乃零民乃康其病熱鬱於上咳逆嘔吐瘡發於中胸嗌不利頭痛身熱昏憒膿瘡宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜丹間谷宜麻三之氣自小滿日亥初至大暑日酉初凡六十日有奇主位少徵火客氣少陽火中見水運火居其位水運承之天政布炎暑至少陽臨上雨乃涯民病熱中聾瞑血溢膿瘡咳嘔鼽衄渴嚏欠喉痹目赤善暴死宜調少陽之客以咸補之以甘瀉之以咸耎之歲谷宜丹間谷宜豆四之氣自大暑日酉正至秋分日未正凡六十日有奇主位太宮土客氣陽明金中見水運土生金涼乃至炎暑間化白露降民氣和平其病滿身重宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜蒼間谷宜黍五之氣自秋分日申初至小雪日午初凡六十日有奇主位少商金客氣太陽水中見水運水金相和又氣與運同歲之司氣是為