虛水運在中水能生木邪乃微也必贊歲運之水扶其不足調上用辛調下用鹹畏火之氣慎無妄犯歲半之前厥陰為主若風淫所勝則太虛埃昏雲物以擾寒生春氣流水不冰民病胃脘當心而痛上支兩脅鬲咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉病本於脾診在足衝陽之脈其法平以辛涼佐以苦甘以甘緩之以酸瀉之歲半之後少陽主之火淫所勝則焰明郊野寒熱更至民病注泄赤白少腹痛溺赤甚則血便其法治以鹹冷佐以苦辛以酸收之以苦發之是歲水運不及紀曰涸流是謂反陽藏令不舉化氣乃昌長氣宣布蟄蟲不藏土潤水泉減草木條茂榮秀滿盛其氣滯其用滲泄其動堅止其發燥稿其果棗杏其實濡肉其谷黍稷其味甘鹹其色黅玄其畜彘牛其蟲鱗倮其皮埃郁昏翳其聲羽宮其在人也病為痿厥堅下從土化也病為癃閟邪傷腎也法宜以苦和調之也初之氣自庚戌年大寒日亥初至是歲春分日酉初凡六十日八十七刻半主位少角木客氣陽明金中見水運金勝木水運間之寒始肅殺氣方至民病寒於右之下宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜蒼間谷宜黍二之氣自春分日酉正至小滿日未正凡六十日有奇主位太徵火客氣太陽水中見水運氣與運同寒不去華雪水冰殺氣旋化霜乃降名草上焦寒雨數至陽復化民病熱於中宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜蒼間谷宜稷是氣也慎無犯寒三之氣自小滿日申初至大暑日午初凡六十日有奇主位太徵火客氣厥陰木中見水運天政布風乃時舉民病泣出耳鳴掉眩宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜蒼間谷宜稻四之氣自大暑日午正至秋分日辰正凡六十日有奇主位少宮土客氣少陰火中見水運溽暑濕熱相搏爭於左之上民病黃疸而為胕腫宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆五之氣自秋分日巳初至小雪日卯初凡六十日有奇主位太商金客氣太陰土中見水運燥濕更勝沉陰乃布寒氣及體風雨乃行宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜丹間谷宜麻終之氣自小雪日卯正至大寒日醜正凡六十日有奇主位少羽水客氣少陽火中見水運畏火司令陽乃大化蟄蟲出見流水不冰地氣大發草乃生人乃舒其病溫厲宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜丹間谷宜豆此六氣之化也歲氣之交司天氣勝則陽明覆之在泉氣勝則太陽復之治勝復者各以其法壬子歲圖少陰君火司天陽明燥金在泉中見太角木運歲木太過氣化運行先天君火在上左太陰右厥陰燥金在下左太陽右少陽故天政所布其氣明地氣肅而其令切寒交暑熱加燥云馳雨府濕化乃行時雨乃降金火合德上應熒惑太白其谷丹白熱化二風化八清化四正化度也羽蟲靜介蟲育歲物之宜也毛蟲耗濕毒不生地氣制之也寒熱之氣持於氣交而為病始熱病生於上清病生於下寒熱相犯而爭於中民病咳喘血溢血泄鼽嚏目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上是歲火為天氣金為地氣木運在中火勝金木生火天氣盈宜先取火之化源必抑其運木資其歲勝無使暴過而生其病食丹白之谷以全真氣食間氣之谷以闢虛邪歲宜咸以耎之而調其上甚則以苦發之以酸收之而安其下甚則以苦泄之運同天氣宜以寒清化其化上鹹寒中酸涼下酸溫藥食宜也歲半之前熱化主之熱淫所勝則怫熱至火行其政民病胸中煩熱嗌乾右胠滿皮膚痛寒熱咳喘大雨且至唾血血泄鼽衄嚏嘔溺色變甚則瘡瘍胕腫肩背臂臑及缺盆中痛心痛肺䐜腹大滿膨膨而喘咳病本於肺診在手尺澤之脈法宜平以鹹寒佐以苦甘以酸收之歲半之後燥化主之燥淫所勝則霿霧清暝民病喜嘔嘔有苦善太息心脅痛不能反側甚則嗌乾面塵身無膏澤足外反熱法宜治以苦溫佐以甘辛以苦下之歲運之化紀曰發生是謂啓敕土疏泄蒼氣達陽和布化陰氣乃隨生氣淳化萬物以榮其化生其氣美其政散其令條舒其動掉眩巔疾其德鳴靡啓拆其變振拉摧拔其化兼其所勝其病怒上徵則其氣逆其病吐利故曰歲木太過風氣流行脾土受邪民病飧泄食減體重煩冤腸鳴腹支滿甚則忽忽善怒眩冒巔疾化氣不政生氣獨治雲物飛動草木不寧甚而搖落反脅痛而吐甚診在足衝陽之脈味宜以酸涼調之也初之氣自辛亥年大寒日寅初至是歲春分日子初凡六十日八十七刻半主位太角木客氣太陽水中見木運地氣遷燥將去寒乃始蟄復藏水乃冰霜復降風乃至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍宜調太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜丹間谷宜稷則寒氣不能為害二之氣自春分日子正至小滿日戌正凡六十日有奇主位少徵火客氣厥陰木中見木運氣與運同是謂司氣陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目瞑目赤氣鬱於上而熱宜調厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜丹間谷宜稻則風氣不能為害是氣也無犯司氣之溫三之氣自小滿日亥初至大暑日酉初凡六十日有奇主位少徵火客氣少陰火中見木運木生火火當其位天政布大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆則熱邪不能為害四之氣自大暑日酉正至秋分日未正凡六十日有奇主位太宮土客氣太陰土中見木運土居其位溽暑至大雨時行寒熱互至民病寒熱嗌乾黃疸鼽衄飲發宜調太陰之客以甘補之以苦瀉之以甘緩之歲谷宜白間谷宜麻則濕氣不能為害五之氣自秋分日申初至小雪日午初凡六十日有奇主位少商金客氣少陽火中見木運木生火畏火臨暑反至陽乃化萬物乃生乃長榮民乃康其病溫宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜白間谷宜豆則火氣不能為害終之氣自小雪日午正至大寒日辰正凡六十日有奇主位太羽水客氣陽明金中見木運金勝木燥令行餘火內格腫於上咳喘甚則血溢寒氣數舉則霧霿翳病生皮腠內舍於脅下連少腹而作寒中地將易也宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜曰間谷宜黍則燥氣不能為害歲氣之交天氣勝則太陽復之地氣勝則少陽復之觀其氣至以法為治熱者寒之寒者熱之清者溫之無翼其勝無贊其復此治之大體也癸丑歲圖太陰濕土司天太陽寒水在泉中見少徵火運歲火不及氣化運行後天太陰在上左少陽右少陰故地氣上騰陰專其政而其政肅太陽在下左厥陰右陽明故天氣下降陽氣退闢而其令寂大風時起原野昏霿白埃四起云奔南極寒雨數至物成於差夏濕寒合德黃黑埃昏流行氣交上應鎮星辰星其谷黅玄間谷命太角之谷寒化雨化勝復同是謂邪氣化度也雨化五火化二寒化六是謂正化度也陰凝於上寒積於下寒水勝火則為冰雹陽光不治殺氣乃行倮蟲靜鱗蟲育是為歲物所宜羽蟲耗熱毒不生是為地氣所制有餘宜高不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之其病寒濕腹滿身䐜憤胕腫痞逆寒厥拘急是歲濕土在上寒水在下土能制水天氣盈地氣虛宜取化源以平土氣益其歲氣無使邪勝食黅玄之谷以全其真食間氣之谷以保其精歲宜以苦燥之溫之甚者發之泄之不發不泄則濕氣外溢肉潰皮拆而水血交流必贊其陽火令御甚寒運異寒濕燥熱宜少故藥食之宜其化上苦溫中鹹溫下甘熱歲半之前太陰主之濕淫所勝沉陰且布雨變枯稿民病胕腫骨痛陰痹陰痹者按之不得腰脊頭項痛時眩大便難陰氣不用飢不欲食咳唾則有血心如懸病本於腎診在足太溪當平以苦熱佐以酸辛以苦燥之以淡泄之歲半之後太陽主之寒淫於內凝肅慘栗民病少腹控睪引腰脊上衝心痛血見嗌痛頷腫宜治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之運火不及命曰伏明之紀是謂勝長長氣不宣藏氣反布收氣自政化令乃衡寒清數舉暑令乃薄承化物生生而不長成實而稚遇化巳老陽氣屈伏蟄蟲早藏其氣鬱其用暴其動彰伏變易其發痛其病昏惑悲忘其化兼所不勝夏有炳明光顯之化則冬有嚴肅霜寒之政若夏有慘淒凝冽之勝則不時有埃昏大雨之復其眚南其藏心其病內舍鷹脅外在經絡故曰歲火不及寒乃盛行長政不用物榮而下凝慘而甚則陽氣不化乃折榮美民病胸中痛脅支滿兩脅痛膺背肩胛間及兩臂內痛甚則屈不能伸髖髀如別復則埃郁大雨且至黑氣乃辱民病泄注其法悉以鹹溫調中初之氣自壬子年大寒日巳初至是歲春分日卯初凡六十日八十七刻半主位太角木客氣厥陰木中見火運風木得位地氣遷寒乃去春氣正風乃來生布萬物以榮民氣條舒風濕相搏雨乃後民病血溢筋絡拘強關節不利身重筋痿宜調厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜黅間谷宜稻則風不為邪二之氣自春分日卯正至小滿日醜正凡六十日有奇主位少徵火客氣少陰火中見火運君火自居其位不司氣化是謂灼化大火正物承化民乃和其病溫厲盛行遠近咸若濕蒸相搏雨乃時降宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜黅間谷宜豆則熱不為邪三之氣自小滿日寅初至大暑日子初凡六十日有奇主位少徵火客氣太陰土中見火運歲火當位濕化郁之天政布濕氣降地氣騰雨乃時降寒乃隨之感於寒濕則民病身重胕腫胸腹滿宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜黅間谷宜麻則濕不為邪四之氣自大暑日子正至秋分日戌正凡六十日有奇主位太宮土客氣少陽火中見火運氣與運同畏火臨溽蒸化地氣騰天氣否隔寒風曉暮蒸熱相搏草木凝煙濕化不流則白露陰布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜玄間谷宜豆則火不為邪是氣也無犯司氣之熱五之氣自秋分日亥初至小雪日酉初凡六十日有奇主位少商金客氣陽明金中見火運氣與運同燥令已行寒露下霜乃早降草木黃落寒氣及體君子周密民病皮腠宜調陽明之客以酸補之以辛瀉之以苦泄之歲谷宜玄間谷宜黍則燥不為邪終之氣自小雪日酉正至大寒日未正凡六十日有奇主位太羽水客氣太陽水中見火運水當其位而能勝火寒大舉濕大化霜乃積陰乃凝水堅冰陽光不治感於寒則病人關節禁固腰脽痛寒濕持於氣交而為疾也宜調太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜玄間谷宜稷則寒不為邪此六節之氣也氣交之化天氣勝者則有厥陰之復地氣勝者則有太陰之復各以其勝復法治之甲寅歲圖少陽相火司天厥陰風木在泉中見太宮土運歲土太過氣化運行先天火化在上清化左黅化右酸化在下灼化左藏化右故天氣正而其政嚴地氣擾而其令撓風乃暴舉木偃沙飛炎火乃流陰行陽化雨乃時應風熱參布雲物沸騰太陰橫流寒乃時至涼雨並起火化二雨化五風化八正化度也火木同德上應熒惑歲星其谷丹蒼羽蟲靜毛蟲育是謂歲物所宜倮蟲耗清毒不生是皆地氣所制民病寒中外發瘡瘍內為泄滿聖人遇之和而不爭往復之作民病寒熱瘧泄聾瞑嘔吐上怫腫色變是歲陽為天氣陰為地氣天氣盈地氣虛宜先取化源以平火氣抑其運土贊所不勝則暴過不生苛疾不起歲宜咸宜辛宜酸滲之泄之漬之發之觀氣寒溫以調其過運異風熱宜少用寒化其化上鹹寒中咸和下辛涼藥食宜也歲行土運天氣生運歲半之前天氣主之火淫所勝則溫氣流行金政不平民病頭痛發熱惡寒而瘧熱上皮膚痛色變黃赤傳而為水身面胕腫腹滿仰息泄注赤白瘡瘍咳唾血煩心胸中熱甚則鼽衄病本於肺診在手天府之脈其法平以鹹冷佐以苦甘以酸收之以苦發之以酸復之歲半之後地氣主之風淫所勝則地氣不明平野昧草乃早秀民病灑灑振寒善伸數欠心痛支滿兩脅裡急飲食不下鬲咽不通食則嘔腹脹善噫得後與氣則快然如衰身體皆重其法治以辛涼佐以苦以甘緩之以辛散之歲運之化紀曰敦阜是謂廣化厚德清靜順長以盈至陰內實物化充成煙埃朦郁見於厚土大雨時行濕氣乃用燥政乃闢其化圓其氣豐其政靜其令周備其動濡積並稸其德柔潤重淖其變震驚飄驟其化兼其所勝其病腹滿四肢不舉故曰歲土太過雨濕流行腎水受邪民病腹滿清厥意不樂體重煩冤甚則肌肉萎足痿不收行善瘛腳下痛飲發中滿食減四肢不舉變生得位藏氣伏化氣獨治之泉湧河衍涸澤生魚風雨大至土潰鱗見於陸病腹滿溏泄腸鳴反下甚而大溪脈絶者不治其法宜以咸和調中初之氣自癸丑年大寒日申初至是歲春分日午初凡六十日八十七刻半主位太角木客氣少陰火中見土運木生火地氣遷風勝乃搖寒乃去候乃大溫草木早榮寒來不殺溫病乃起其病氣怫於上血溢目赤咳逆頭痛脅滿膚腠中瘡宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆雖有熱邪不能為害二之氣自春分日午正至小滿日辰正凡六十日有奇主位少徵火客氣太陰土中見土運氣與運同司氣為黅化火反郁白埃四起云趨雨府風不勝濕雨乃零民乃康其病熱鬱於上咳逆嘔吐瘡發於中胸嗌不利頭痛身熱昏憒膿瘡宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜丹間谷宜麻雖有濕邪不能為害是氣也無犯司氣三之氣自小滿日巳初至大暑日卯初凡六十日有奇主位少徵火客氣少陽火中見土運火居其位天政布炎暑至少陽臨上雨乃涯民病熱中聾瞑血溢膿瘡咳嘔鼽衄渴嚏欠喉痹目赤善暴死宜調少陽之客以咸補之以甘瀉之以咸耎之歲谷宜丹間谷宜豆雖有火化不能為邪四之氣自大暑日卯正至秋分日醜正凡六十日有奇主位太宮土客氣陽明金中見土運歲土當位涼乃至炎暑間化白露降民氣和平其病滿身重宜調陽明之客以酸補之以辛瀉之以苦泄之歲谷宜蒼間谷宜黍雖有燥邪不能為害五之氣自秋分日寅初至小雪日子初凡六十日有奇主位少商金客氣太陽水中見土運寒清相交陽乃去寒乃來雨乃降氣門乃閉剛木早雕民避寒邪君子周密宜調太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜蒼間谷宜稷雖有寒邪不能為害終之氣自小雪日子正至大寒日戌正凡六十日有奇主位太羽水客氣厥陰木中見土運木製土地氣正風乃至萬物反生霿霧以行其病關閉不禁心痛陽氣不藏而咳宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜蒼間谷宜稻雖有風邪不能為害歲氣之交天氣勝者太陽復之地氣勝者陽明覆之觀其復至無翼其勝無贊其復依法為治寒者熱之清者溫之各安其氣則邪氣衰去歸其所宗此治之大體也乙卯歲圖陽明燥金司天少陰君火在泉中見少商金運歲金不及氣化運行後天少商上臨陽明上商與正商同不及而同天化是謂天符氣之平也平金之歲命曰審平之紀收而不爭殺而無犯五化宣明其氣潔其性剛其用散落其化堅斂其政徑肅其候清切其令燥其類金其應秋其谷稻其果桃其實殼其蟲介其畜雞其色白其味辛其音商其數九其物外堅其在人也其藏肺其主鼻其養皮毛其病咳此歲運之化也天地之氣陽明在上左太陽右少陽故天氣急而其政切少陰在下左太陰右厥陰故地氣明而其令暴陽專其令炎暑盛行物燥以堅淳風乃治風燥橫運流於氣交多陽少陰云趨雨府濕化乃敷燥極而澤蟄蟲乃見流水不冰金火合德上應太白熒惑其谷白丹間谷命太者其耗白甲品羽故熱化寒化勝復同邪氣化度也燥化四清化四熱化二正化度也歲物之宜介蟲靜羽蟲育地氣所制介蟲耗寒毒不生清熱之氣持於氣交清先而徑毛蟲乃死熱後而暴介蟲乃殃其發躁民病咳嗌塞寒熱發暴振栗癃閟歲半以前清氣主之其化燥者天之政也歲半以後熱氣主之其化熱者地之令也金為天氣火為地氣火勝金天氣虛當資金之化源是歲金氣平不資化源惟安其運金無使受邪食白丹之谷以安其氣食間氣之谷以去其邪歲宜以咸以苦以辛汗之清之散之其運與清化同宜多地化經曰其化上苦小溫中苦和下鹹寒藥食之宜也初之氣自甲寅年大寒日亥初至是歲春分日酉初凡六十日八十七刻半主位太角木客氣太陰土中見金運地氣遷陰始凝氣始肅水乃冰寒雨化其病中熱脹面目浮腫善眠鼽衄嚏欠嘔小便黃赤甚則淋宜調太陰之客以甘補之以苦瀉之以甘緩之歲谷宜白間谷宜麻則濕不為邪二之氣自春分日酉正至小滿日未正凡六十日有奇主位少徵火客氣少陽火中見金運二火相加火勝金陽乃布民乃舒物乃生榮厲大至民善暴死歲運和平其邪乃微宜調少陽之客以咸補之以甘瀉之以咸耎之歲谷宜白間谷宜豆則火不為邪三之氣自小滿日申初至大暑日午初凡六十日有奇主位少徵火客氣陽明金中見金運氣運相符天政布涼乃行燥熱交合燥極而澤民病寒熱宜調陽明之客以酸補之以辛瀉之以苦泄之歲谷宜白間谷宜黍則燥不為邪是氣也用涼遠涼無犯司氣四之氣自大暑日午正至秋分日辰正凡六十日有奇主位太宮土客氣太陽水中見金運金生水寒雨降病暴僕振栗譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿血便宜調太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜丹間谷宜稷則寒不為邪五之氣自秋分日巳初至小雪日卯初凡六十日有奇主位少商金客氣厥陰木中見金運風木用事春令反行草乃生榮民乃和宜調厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜丹間谷宜稻則風不為邪終之氣自小雪日卯正至大寒日醜正凡六十日有奇主位太羽水客氣少陰火中見金運火勝金陽氣布候反溫蟄蟲來見流水不冰民乃康平其病溫宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆則熱不為邪此六氣之常也是歲天符為執法若有邪氣則民病卒急經曰邪中執法者其病速而危丙辰歲圖太陽寒水司天太陰濕土在泉中見太羽水運歲水太過氣化運行先天太過而同天化是謂天符平水之歲也水運平者命曰靜順之紀藏而勿害治而善下五化咸整其氣明其性下其用沃衍其化凝堅其政流演其候凝肅其令寒其類水其應冬其谷豆其果栗其實濡其蟲鱗其畜彘其色黑其味鹹其音羽其數六其物濡其在人也其藏腎其主二陰其養骨髓其病厥此歲運之化也天地之氣太陽在上左厥陰右陽明故天政所布其氣肅太陰在下左少陽右少陰故地氣靜而其令徐寒臨太虛其政大舉陽氣不令澤無陽焰則火發待時少陽中治時雨乃涯止極雨散還於太陰云朝北極濕化乃布澤流萬物寒化六雨化五正化度也鱗蟲靜倮蟲育歲物之宜也鱗蟲不成燥毒不生地氣制之也寒敷於上雷動於下水土合德上應辰星鎮星其谷玄黅寒濕之氣持於氣交民病寒濕發肌肉萎足痿不收濡瀉血溢是歲水在上土在下土勝水天氣虛水運符天其氣自平不資化源惟抑運水扶其不勝無使暴過而生其疾歲宜以苦燥之溫之食玄黅之谷以全其真避虛邪之氣以安其正運與寒同宜燥熱化故曰其化上苦熱中鹹溫下甘熱藥食宜也歲半之前太陽主之太陽有本標之化當其時寒熱得中者天之和氣至也歲半之後太陰主之太陰之化從本當其時濕化應者地之令也初之氣自乙卯年大寒日寅初至是歲春分日子初凡六十日八十七刻半主位太角木客氣少陽火中見水運少陽中治地氣遷氣乃大溫草乃早榮民乃厲溫病乃作身熱頭痛嘔吐肌腠瘡瘍宜調少陽之客以咸補之以甘瀉之以咸耎之歲谷宜玄間谷宜豆則火不為邪二之氣自春分日子正至小滿日戌正凡六十日有奇主位少徵火客氣陽明金中見水運大涼反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始宜調陽明之客以酸補之以辛瀉之以苦泄之歲谷宜玄間谷宜黍則燥不為邪三之氣自小滿日亥初至大暑日酉初凡六十日有奇主位少徵火客氣太陽水中見水運氣與運相符而布天政寒氣行雨乃降民病寒反熱中癰疽注下心熱瞀悶不治者死宜調太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜玄間谷宜稷則寒不為邪是氣也用寒遠寒無犯司氣之寒四之氣自大暑日酉正至秋分日未正凡六十日有奇主位太宮土客氣厥陰木中見水運水生木風濕交爭風化為雨乃長乃化乃成民病大熱少氣肌肉萎足痿注下赤白宜調厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜黅間谷宜稻則風不為邪五之氣自秋分日申初至小雪日午初凡六十日有奇主位少商金客氣少陰火中見水運大火所居陽復化草乃長乃化乃成民乃舒宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜黅間谷宜豆則熱不為邪終之氣自小雪日午正至大寒日辰正凡六十日有奇主位太羽水客氣太陰土中見水運水運得位濕土居之地氣正濕令行陰凝太虛埃昏郊野民乃慘淒寒風以至反者孕乃死宜調太陰之客以甘補之以苦瀉之以甘緩之歲谷宜黅間谷宜麻則濕不為邪此六氣之化也歲行平水之化天符為執法邪或中之民有卒急之病故經曰中執法者其病速而危丁巳歲圖厥陰風木司天少陽相火在泉中見少角木運歲木不及上角與正角同又木不及而同天化氣化運行同天氣與天符木氣適平命曰敷和之紀木德周行陽舒陰布五化宣平其氣端其性隨其用曲直其化生榮其政發散其候溫和其令風其類草木其應春其谷麻其果李其實核其蟲毛其畜犬其色蒼其味酸其音角其數八其物中堅其在人也其藏肝其主目其養筋其病裡急支滿此歲運之化也天地之化風化在上左灼化右藏化故天氣擾而其政撓苦化在下左清化右柔化故地氣正而其令速風生高遠炎熱從之云趨雨府濕化乃行風火同德上應歲星熒惑其谷蒼丹間谷言太商之谷其耗文角品羽清化熱化勝復同邪氣化度也風化三火化七正化度也毛蟲靜羽蟲育是乃歲物所宜介蟲耗寒毒不生是皆地氣所制故風燥火熱勝復更作蟄蟲來見流水不冰熱病行於下風病行於上風燥勝復形於中是歲陰為天氣陽為地氣天氣虛木運符之又木火同德其氣專不資化源惟贊運木無使邪勝歲宜以辛調上以咸調下畏火之氣無妄犯之故曰其化上辛涼中辛和下鹹寒藥食宜也歲半之前天氣主之天布厥陰之政其令風歲半之後地氣主之地行少陽之令其化火氣化之常也初之氣自丙辰年大寒日巳初至是歲春分日卯初凡六十日八十七刻半主位少角木客氣陽明金中見木運歲運得位金燥客之寒始肅殺氣方至民病寒於右之下宜調陽明之客以酸補之以辛瀉之以苦泄之歲谷宜蒼間谷宜黍則燥不為邪二之氣自春分日卯正至小滿日醜正凡六十日有奇主位太徵火客氣太陽水中見木運寒不去華雪水冰殺氣施化霜乃降名草上焦寒雨數至陽復化民病熱於中宜調太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜蒼間谷宜稷則寒不為邪三之氣自小滿日寅初至大暑日子初凡六十日有奇主位太徵火客氣厥陰木中見木運木與天符天政布風乃時舉民病泣出耳鳴掉眩宜調