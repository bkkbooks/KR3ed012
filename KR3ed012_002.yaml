氣厥陰木金運統之金本刑木水反生之地氣正風乃至萬物反生霧霿以行其病關閉不禁心痛陽氣不藏而咳宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜蒼間谷宜稻歲氣之交大氣火勝即太陽來復地氣木勝即陽明來復觀其氣至治以勝復之法寒者熱之清者溫之無翼其勝無贊其復是謂至治辛酉歲圖陽明燥金司天少陰君火在泉中見少羽水運歲水不及氣化運行後天陽明在上太陽左少陽右故天氣急而其政切少陰在下太陰左厥陰右故地氣明而其令暴陽專其令炎暑盛行物燥以堅淳風乃治風燥橫運流於氣交多陽少陰云趨雨府濕化乃敷燥極而澤金火合德上應太白熒惑其谷白丹間谷命太徵者其耗白甲品羽雨化風化勝復同邪氣化度也清化九寒化一熱化七正化度也介蟲靜羽蟲育是乃歲物之宜介蟲耗寒毒不生是皆地氣所制蟄蟲出見流水不冰清熱之氣持於氣交民病咳嗌塞寒熱發暴振栗癃閉清先而徑毛蟲乃死熱後而暴介蟲乃殃其發躁是歲金在上火在下水運在中水勝火火勝金天氣虛水能制火而生金其邪乃微宜資其化源以助金氣安其運水無使受邪折其火氣之郁食白丹之谷以安其氣食間氣之谷以去其邪歲宜以咸以苦以辛汗之清之散之運化同清宜多地化其化上苦小溫中苦和下鹹寒藥食宜也候其氣者歲半之前陽明主之燥淫所勝則木乃晚榮草乃晚生筋骨內變民病左胠脅痛寒清於中感而瘧大涼革候咳腹中鳴注泄鶩溏名木斂生菀於下草焦上首心脅暴痛不可反側嗌乾面塵腰痛目眛眥瘍瘡痤癰病本於肝診在足太衝之脈法宜平以苦溫佐以酸辛以苦下之歲半之後少陰主之熱淫於內則焰浮川澤陰處反明民病腹中常鳴氣上衝胸喘不能久立寒熱皮膚痛目瞑齒痛䪼腫惡寒發熱如瘧少腹中痛腹大法宜治以鹹寒佐以甘苦以酸收之以苦發之氣交之間水運統之涸流之紀是謂反陽藏令不舉化氣乃昌長氣宣布蟄蟲不藏土潤水泉減草木條茂榮秀滿盛其氣滯其用滲泄其動堅止其發燥稿其藏腎其化兼所不勝其病癃閟邪傷腎也候其氣者四維有湍潤埃云之化則不時有和風生髮之應若四維發埃昏驟注之變則不時有飄蕩振拉之復其眚北其病內舍腰脊骨髓外在溪谷踹膝故曰歲水不及濕乃盛行長氣反用其化乃速暑雨數至民病腹滿身重濡泄寒瘍流水腰股痛發膕腨股膝不便煩冤足痿清厥腳下痛甚則胕腫藏氣不政腎氣不衡復則大風暴發草偃木零生長不鮮面色時變筋骨並闢肉瞤瘛目視䀮䀮肌肉疹發氣並膈中痛於心腹黃氣乃損其谷不登初之氣自庚申年大寒日巳初至是歲春分日卯初凡六十日八十七刻半主位少角木客氣太陰土中見水運土勝水地氣遷陰始凝氣始肅水乃冰寒雨化其病中熱脹面目浮腫善眠鼽衄嚏欠嘔小便黃赤甚則淋宜治太陰之客以甘補之以苦瀉之以甘緩之歲食白谷間谷用麻雖有濕邪莫之能害二之氣自春分日卯正至小滿日醜正凡六十日有奇主位太徵火客氣少陽火中見水運陽乃布民乃舒物乃生榮厲大至民善暴死水運承之其邪亦微宜治少陽之客以咸補之以甘瀉之以咸耎之歲食白谷間谷用豆雖有火邪莫之能害三之氣自小滿日寅初至大暑日子初凡六十日有奇主位太徵火客氣陽明金中見水運天政布涼乃行燥熱交合燥極而澤民病寒熱宜治陽明之客以酸補之以辛瀉之以苦泄之歲食白谷間谷用黍雖有燥邪莫之能害四之氣自大暑日子正至秋分日戌正凡六十日有奇主位少宮土客氣太陽水中見水運氣與運同是謂司氣寒雨降病暴僕振栗譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿血便宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲食丹谷間谷用稷雖有寒邪莫之能害是氣也用寒遠寒無犯司氣之寒五之氣自秋分日亥初至小雪日酉初凡六十日有奇主位太商金客氣厥陰木中見水運水生木春令反行草乃生榮民氣和宜調厥陰之客以辛補之以酸瀉之以甘緩之歲食丹谷間谷用稻雖有風邪莫之能害終之氣自小雪日酉正至大寒日未正凡六十日有奇主位少羽水客氣少陰火中見水運水運得位少陰居之陽氣布候反溫蟄蟲來見流水不冰民乃康平其病溫宜治少陰之客以咸補之以甘瀉之以酸收之歲食丹谷間谷用豆雖有熱邪莫之能害此六氣之化也歲氣之交天氣勝者少陽復之地氣勝者太陽復之詳察陰陽所在而調之以正為期壬戌歲圖太陽寒水司天太陰濕土在泉中見太角木運歲木太過氣化運行先天太陽為天氣左厥陰右陽明故天政所布其氣肅太陰為地氣左少陽右少陰故地氣靜而其令徐寒臨太虛其政大舉則火發待時少陽中治時雨乃涯云朝北極濕化乃布澤流萬物寒化六風化八雨化五正化度也鱗蟲靜倮蟲育歲物之宜也鱗蟲不成燥毒不生地氣制之也寒敷於上雷動於下寒濕之氣持於氣交民病寒濕發肌肉萎足痿不收濡瀉血溢是歲水為天氣土為地氣土勝水當資化源以助天氣又歲遇木運木能制土地氣乃郁其邪亦微必折郁土抑其運木扶其不勝無使暴過而生其疾食玄黅之谷以全其真避虛邪之氣以安其正運與寒濕異宜以燥濕化其化上苦溫中酸和下甘溫藥食宜也歲半之前太陽主之寒淫所勝則寒氣乃至水且冰血變於中發為癰瘍民病厥心痛鼽衄善悲時眩僕病本於心診在神門之脈其法平以辛熱佐以甘苦以咸瀉之歲半之後太陰主之濕淫於內則埃昏岩谷黃反見黑至陰之交民病飲積心痛耳聾渾渾焞焞嗌腫喉痹少腹痛腫病沖頭痛目項腰髀膕腨皆痛其法宜治以苦熱佐以酸淡以苦燥之以淡泄之氣交之間木運太過命曰發生之紀是謂啓陳土疏泄蒼氣達陽和布化陰氣乃隨生氣淳化萬物以榮其化生其氣美其政散其令條舒其動掉眩巔疾其德鳴靡啓拆其象春其變振拉摧拔其谷麻稻其果李桃其畜雞犬其蟲毛介其物中堅外堅其色青黃白其味酸甘辛其經足厥陰少陽其藏肝脾其病怒故曰歲木太過風氣流行脾土受邪民病飧泄食減體重煩冤腸鳴腹支滿甚則忽忽善怒眩冒巔疾診在衝陽之脈其法治以酸和初之氣自辛酉歲大寒日申初至是年春分日午初凡六十日八十七刻半主位太角木客氣少陽火中見木運歲木當位相火居之地氣遷氣乃大溫草乃早榮民乃厲溫病乃作身熱頭痛嘔吐肌腠瘡瘍宜治少陽之客以咸補之以甘瀉之以咸耎之歲谷宜玄間谷宜豆雖有火邪不能為害二之氣自春分日午正至小滿日辰正凡六十日有奇主位少徵火客氣陽明金中見木運金勝木大涼乃至草乃遇寒火氣遂抑民病氣鬱中滿寒乃始宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜玄間谷宜黍雖有燥邪不能為害三之氣自小滿日巳初至大暑日卯初凡六十日有奇主位少徵火客氣太陽水中見木運天政布寒氣行雨乃降民病寒反熱中癰疽注下心熱瞀悶宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜玄間谷宜稷雖有寒邪不能為害四之氣自大暑日卯正至秋分日醜正凡六十日有奇主位太宮土客氣厥陰木中見木運氣與運同是謂司氣風濕交爭風化為雨乃長乃化乃成民病大熱少氣肌肉萎足痿注下赤白宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜黅間谷宜稻雖有風邪不能為害是氣也用溫遠溫無犯司氣之溫五之氣自秋分日寅初至小雪日子初凡六十日有奇主位少商金客氣少陰火中見木運木生火火勝金陽復化草乃長乃化乃成民乃舒宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜黅間谷宜豆雖有熱邪不能為害終之氣自小雪日子正至大寒日戌正凡六十日有奇主位太羽水客氣太陰土中見木運地氣正濕令行陰凝太虛寒風以至宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜黅間谷宜麻雖有濕邪不能為害此六氣之化也歲氣之交天氣勝則有太陰之復地氣勝則有厥陰之復依其復法治之所謂濕者燥之溫者清之故其氣乃平也癸亥歲圖厥陰風木司天少陽相火在泉中見少徵火運歲火不及氣化運行後天不及而同地化是謂同歲會氣之平也諸同正歲氣化運行同天平火之歲命曰升明之紀正陽而治德施周普五化均衡其氣高其性速其用燔灼其化蕃茂其政明曜其候炎暑其令熱其類火其應夏其穀麥其果杏其實絡其蟲羽其畜馬其色赤其味苦其物脈其音徵其數七其在人也其藏心其主舌其養血其病瞤瘛此歲運之化也天地之氣上見厥陰左少陰右太陽故天氣擾而其政撓下見少陽左陽明右太陰故地氣正而其令速風生高遠炎熱從之云趨雨府濕化乃行風火同德上應歲星熒惑其谷蒼丹間谷言太宮太羽者其耗文角品羽寒化雨化勝復同邪氣化度也風化八火化二正化度也歲物之宜則毛蟲靜羽蟲育地氣所制則介蟲耗寒毒不生風燥火熱勝復更作蟄蟲來見流水不冰熱病行於下風病行於上風燥勝復形於中是歲陰為天氣陽為地氣天氣虛火運適平不資化源惟贊其運火無使邪勝歲宜以辛調上以咸調下畏火之氣無妄犯之其化上辛涼中咸和下鹹寒藥食宜也歲半之前厥陰主之多風化者厥陰之政也歲半之後少陽主之多火化者少陽之令也初之氣自壬戌歲大寒日亥初至是年春分日酉初凡六十日八十七刻半主位太角木客氣陽明金中見火運寒始肅殺氣方至民病寒於右之下運行平火其邪乃微宜調陽明之客以酸補之以辛瀉之以苦泄之歲谷宜蒼間谷宜黍二之氣自春分日酉正至小滿日未正凡六十日有奇主位少徵火客氣太陽水中見火運火居其位寒水承之寒不去華雪水冰殺氣施化霜乃降名草上焦寒雨數至陽復化民病熱於中宜調太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜蒼間谷宜稷三之氣自小滿日申初至大暑日午初凡六十日有奇主位少徵火客氣厥陰木中見火運火當其位風木客之天政布風乃時舉民病泣出耳鳴掉眩宜調厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜蒼間谷宜稻四之氣自大暑日午正至秋分日辰正凡六十日有奇主位太宮土客氣少陰火中見火運氣與運同灼化所居溽暑濕熱相搏爭於左之上民病黃疸而為胕腫宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆五之氣自秋分日巳初至小雪日卯初凡六十日有奇主位少商金客氣太陰土中見火運火生土燥濕更勝沉陰乃布寒氣及體風雨乃行宜調太陰之客以甘補之以苦瀉之以甘緩之歲谷宜丹間谷宜麻終之氣自小雪日卯正至大寒日醜正凡六十日有奇主位太羽水客氣少陽火中見火運火氣符會畏火司令陽乃大化蟄蟲出見流水不冰地氣大發草乃生人乃舒其病溫厲宜調少陽之客以咸補之以甘瀉之以咸耎之歲谷宜丹間谷宜豆是氣也用熱遠熱無犯司氣之熱歲氣之化其氣專其化淳又遇火氣平與歲會同是謂行令邪氣乘之其病持久經曰中行令者其病徐而持也右六氣司歲五運統歲五六相合三十年一周六十年再周凡千四百四十氣而天地之氣數備焉終而復始時立氣布如環無端守其數稽其化若合符節可謂悉矣此特定期之紀氣化之常也不能無變變不可以常拘推考其要或因本標不同謂太陽為寒陽明為燥少陽為火太陰為濕少陰為熱厥陰為風所謂本也本之下為中之見見之下為氣之標太陽之中見少陰時或為暄太陰之中見陽明時或為燥以至燥濕相交暄寒相應風火相值其本標不同有如此者或因積數之差若春溫夏暑秋涼冬寒時令之常也或春夏秋冬各差其分應在四維後皆三十度有奇其積數之差有如此者或因有勝有復謂六氣之化行各有次止各有位隨六節以觀其應或至而太過者六氣之勝也若有非常之氣應在歲半之前者名為歲氣淫勝應在歲半之後者名為六氣來復其勝復有如此者或因氣位相勝謂天有常政地有常令應各有時當其時各以其化來報至而甚者客勝也若臨在反勝之位則司歲之氣不得其應是為主勝其氣位相勝有如此者或因氣運之郁謂氣運各有所制屈而不伸也天氣勝運則運化郁運勝在泉則地氣鬱或六氣臨勝己之位則六氣亦郁凡有所郁則進退升降皆不能也其氣鬱有如此者或因鬱而必發謂五氣之郁乘時而發也木發則飄驟其應無時火發則曛昧應在四氣土發則昏潰應在長夏金髮而毀折應在秋水發而雹雪應在二火前後其鬱氣之發有如此者或因邪氣反勝謂天政布於夏地令行於冬至其時或當寒而熱當熱而寒當溫而清當燥而熱當濕而燥其邪氣反勝有如此者夫定期之外猶有是者則不拘於常數也茲造化密移所以新新不窮歟
