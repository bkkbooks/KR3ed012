body:
  text: 卷第一百三十癰疽潰後蝕惡肉論曰癰疽已潰久而良肉不生者由氣血未平惡肉有以害之也惡肉雖得於風氣外搏亦以餘毒未盡故死肌敗壞侵蝕良肉治宜以藥蝕去之治發背癰疽及諸惡瘡生惡肉麝香膏方麝香研雄黃研真珠研各一兩豬脂量用上四味研勻豬脂調如糊塗敷惡肉上日再治癰疽諸瘡惡肉藜蘆散方藜蘆去蘆頭䕡茹各半兩馬齒礬研石硫黃研雄黃研麝香研各三分上六味除研者外搗羅為散再和勻每用少許敷瘡日三五次以惡肉盡為度治癰疽瘡大黃蝕肉膏方大黃附子炮裂去皮臍莽草芎藭雄黃雌黃研真珠研白蘞白礬研黃芩去黑心䕡茹各一兩豬脂二斤上十二味除研者並豬脂外銼碎先熬脂令沸下諸藥煎候赤黑色綿濾去滓下研者藥攪勻傾出瓷器盛每日塗瘡日三五次以惡肉盡為度治發背癰疽及惡瘡不生肌肉敗壞其色黑蝕惡肉白礬散方白礬研半兩䕡茹末一兩膩粉研一分雄黃研當歸末各一兩上五味合研勻取少許敷瘡日三次治癰疽瘡蝕惡肉硫黃散方硫黃研馬齒礬研䕡茹末丹砂研各半兩麝香研一錢雄黃研雌黃研白礬研各半兩上八味合研勻每用少許敷瘡日三兩次以惡肉盡為度治癰疽敗壞生肉生地黃膏方生地黃四兩辛夷獨活去蘆頭當歸切焙大黃芎藭黃耆白芷芍藥黃芩去黑心各半兩續斷一兩豬脂二斤薤白二七莖上十三味除豬脂外並銼碎先熬脂令沸下諸藥煎候白芷赤黑色以綿絞去滓瓷合盛塗瘡日三兩次治癰疽始作便壞熱毒發瘡羊髓膏方羊髓一兩甘草胡粉各二兩大黃一兩半豬脂一斤上五味除羊髓豬脂胡粉外銼碎先熬羊髓豬脂令沸下甘草大黃煎令赤黑色綿濾去滓下胡粉攪令勻瓷合盛每用塗敷瘡日三四次治癰疽敗壞生肉莽草膏方莽草當歸薤白黃芩去黑心甘草白芷大黃續斷各一兩豬脂二斤上九味除豬脂外銼碎先熬脂令沸下諸藥煎候白芷赤黑色以綿絞去滓瓷合盛塗瘡日三次治癰疽惡肉瘡蝕盡生肌芍藥膏方芍藥大黃黃耆獨活去蘆頭白芷當歸各一兩薤白三兩生地黃一兩半椎碎豬脂一斤半上九味將八味銼碎先熬脂令沸下諸藥煎候白芷赤黑色綿濾去滓每取少許塗敷瘡日三五度治癰疽發背後生肉膏方生地黃一斤辛夷二兩獨活去蘆頭當歸焙大黃炒黃耆銼芎藭白芷芍藥黃芩去黑心續斷各一兩薤白五兩上十二味㕮咀以臘月豬脂煎膏敷瘡立瘥治癰疽發背去惡肉麝香膏方麝香研雄黃研白礬燒汁枯研䕡茹各一兩上四味搗研細羅為末以豬蹄煎膏調如泥敷之惡肉盡為止癰疽大小便不通論曰癰疽之人經絡壅閼氣血結聚營衛津液因以虧燥邪熱內鼓流注於大小腸氣不疏通故大小便俱不通治法宜通其閉塞導去邪毒使勢無深入穿通腑臟茲治之要也治發背一切惡瘡及乳癰結聚腫硬熱痛臟腑餘毒閉澀可服通泄調氣解毒木香丸方木香一兩檳榔生銼三分芎藭羌活去蘆頭各半兩大黃銼炒一兩附子炮裂去皮臍人參各半兩枳殼去瓤麩炒三分牽牛一兩半炒半生陳橘皮湯去白焙半兩上十味搗羅為細末煉蜜為丸如梧桐子大以瓷合內盛之每日空心粥飲下三十丸通利一兩行如不利加至四十丸五十丸以通疏為度甚者夜臥時更服二十五丸治發背諸癰腫丹石藥毒頭痛壯熱大小便不利玄參丸方玄參一兩升麻梔子仁黃芩去黑心各半兩黃耆細銼三分大黃銼炒一兩半吳藍半兩犀角鎊屑三分木通銼二兩連翹三分朴硝研一兩半上十一味先以十味搗羅為細末再同朴硝研勻煉蜜和丸梧桐子大每日空心米飲下十五丸如不利加至二十丸取快利三兩行為度瀉下膿化為黃水即瘥治年未及四十氣血強壯常苦癰疽無定大小便不通五利大黃湯方大黃銼微炒升麻各二兩黃芩去黑心一兩梔子十枚去皮上四味粗搗篩每服五錢匕用水一盞半煎至八分去滓下芒硝一錢匕空心溫服快利三兩行為度未利再服治癰疽瘡發大小便祕澀不通朴硝丸方朴硝研大黃銼炒杏仁湯浸去皮尖雙仁炒研葶藶子微炒各二兩上四味先以三味搗羅為細末入朴硝和勻煉蜜為丸如梧桐子大每食後煎黃耆湯下二十丸以通利為度未利再服治表裡俱熱三焦不通發背疽瘡及癰癤大小便不利山梔子湯方山梔子仁十五枚大黃銼微炒二兩黃芩去黑心一兩半知母焙甘草炙銼各一兩上五味粗搗篩每服五錢匕用水一盞半煎至一盞去滓下芒硝一錢匕空心溫服日再治發背癰疽及乳癰毒氣攻臟腑大小便不通木通湯方木通銼黃芩去黑心各一兩山梔子去皮漏蘆根王瓜根大黃銼炒甘草炙銼各三分上七味粗搗篩每服五錢匕用水一盞半煎至一盞去滓下朴硝一錢匕再煎三兩沸空心溫服未利再服治癰疽取利下後熱微退小便不利小麥湯方小麥三合人參甘草炙銼芍藥石膏碎生乾地黃焙黃耆細銼木通銼升麻黃芩去黑心前胡去蘆頭各半兩麥門冬去心焙三分上十二味粗搗篩每服五錢匕用水一盞半入竹葉七片大棗二枚擘破同煎至一盞去滓空心溫服日晚再服治發背癰疽排膿止痛利小便瞿麥散方瞿麥穗芍藥桂去粗皮赤小豆芎藭白蘞黃耆細銼當歸切焙各半兩麥門冬去心一分上九味搗羅為細散每服二錢匕溫酒調下空心日晚各一服諸癰疽托裡法論曰癰疽諸瘡氣血虛微肌寒肉冷膿汁清稀毒氣不出瘡久不合或聚腫不赤結硬無膿外證不見者並宜托裡邪氣外散膿汁早成毒有所泄而不內攻也治癰疽諸瘡潰後膿出多內虛托裡黃耆湯方黃耆細銼白茯苓去黑皮桂去粗皮麥門冬去心焙當歸切焙人參甘草炙遠志去心各一兩五味子一兩半上九味粗搗篩每服四錢匕水一盞半煎取一盞去滓溫服不計時候日二治發背癰疽久冷不瘥托裡生肌芎藭散方芎藭二兩黃耆細銼一兩白芷半兩赤芍藥一兩桂去粗皮三分人參丁香當歸切焙各半兩上八味搗羅為細散每服二錢匕粥飲調下空心日晚再服以瘥為度治癰疽發背膿血穿潰疼痛托裡止痛當歸湯方當歸切焙黃耆細銼人參各一兩桂去粗皮赤芍藥甘草炙銼生乾地黃焙各三分上七味粗搗篩每服五錢匕以水一盞半煎取一盞去滓溫服不拘時候日二夜一治發背癰疽一切瘡腫托裡排膿木香散方木香黃耆細銼白蘞木占斯芎藭當歸切焙細辛去苗葉桔梗炒赤芍藥檳榔生銼敗醬甘草炙桂去粗皮羌活去蘆頭白芷各一兩上十五味搗羅為細散每服二錢匕甘草煎酒調下空心午時日晚各一服以瘥為度治一切瘡內托散方甘草炒人參甘菊花一半生一半炒玄參各一兩上四味搗羅為細散每服二錢匕煎緑豆湯調下治諸瘡熱退膿不止托裡內補防風散方防風去叉白茯苓去黑皮白芷桔梗炒遠志去心甘草炙人參芎藭當歸切焙黃耆銼各一兩附子炮裂去皮臍二枚厚朴去粗皮薑汁炙透二兩赤小豆酒浸一宿焙半升桂去粗皮半兩上十四味搗羅為細散每服一錢匕溫酒調下日二夜一治癰疽潰後膿血太多托裡除虛熱黃耆茯苓湯方黃耆細銼麥門冬去心焙各三兩芎藭白茯苓去黑皮桂去粗皮各二兩五味子二兩半上六味粗搗篩每服三錢匕以水一盞入生薑棗煎取七分去滓溫服不拘時候治癰疽托裡六倍散方黃耆細銼一兩一分膿多倍之赤小豆三分口乾倍之芎藭半兩若肉末生倍之白蘞三分瘡口不合倍之栝蔞去皮三分小便不利倍之當歸切焙一兩若疼倍之上六味搗羅為細散溫酒服方寸匕日三夜二凡癰疽大堅者未有膿半堅半有膿當上薄皮都有膿便可破之所破之法宜下逆上破之令膿易出膿深難見上肉厚宜火針之若外不別有膿可當上按之內便隱痛中央堅者未有膿按之更疼於前者已熟也治癰疽內攻五臟煩悶不安排毒托裡五香散方沉香銼乳香研丁香木香藿香各一兩上五味以四味搗羅為細散入乳香和勻先以清酒五升黃耆五兩寸截瓶內封閉浸一宿旋取一盞微溫調下一錢匕日三夜二不可犯鐵器治癰疽日漸焮長內塞散方熟乾地黃焙續斷人參芍藥附子炮裂去皮臍枳殼去瓤麩炒甘草炙銼芎藭細辛去苗葉桂去粗皮各一兩檳榔銼一兩半黃耆銼當歸切焙各二兩蜀椒去目併合口者炒出汗半兩肉蓯蓉酒浸切焙三分上十五味搗羅為散每服三錢匕空心溫酒調下日再服治諸癰疽疏轉後宜補虛助氣飲方黃耆銼二兩人參白茯苓去黑皮甘草炙銼五味子芎藭獨活去蘆頭桂去粗皮青橘皮湯浸去白焙各一兩麥門冬去心焙當歸切焙杏仁去皮尖雙仁炒黃熟乾地黃焙各一兩半上十三味粗搗篩每服五錢匕水一盞半生薑三片大棗二枚去核煎至八分去滓不拘時溫服治癰腫瘡癤排膿連翹飲方連翹防風去叉玄參白芍藥薺苨黃芩去黑心各二兩桑根白皮銼炒二兩半前胡去蘆頭人參甘草炙銼桔梗銼炒白茯苓去黑皮各一兩黃耆銼四兩上十三味粗搗篩每服五錢匕以水一盞半煎取八分去滓溫服日二癰疽等瘡內消法論曰治病必先求其本而後治其標癰疽諸瘡雖發於外而本乎中熱之所出始覺經絡壅滯氣血悶郁有瘡瘍之證則熱氣初作營衛未礙肌肉未腫腫而未腐之時特可疏滌風熱通導而去之逮其毒氣已結則不可論內消法恐熱毒不出反以內攻適所以傷之先後遲速之用不可不審治發背癰疽腫毒痛苦不可忍者內消散方車螯一枚背上紫色光厚者是用黃泥裹定火煅通赤放冷去泥搗為末上一味以栝蔞一枚打碎用酒一碗於銀石鍋內慢火熬及一盞濾去滓入膩粉一錢匕同以酒調晚後服之取下如魚涎為驗治發背癰腫腸癰乳癰一切毒腫內消化毒犀角丸方犀角屑一兩半升麻黃芩去黑心大黃銼炒防風去叉人參當歸切焙黃耆銼藜蘆去蘆頭黃連去須甘草炙梔子仁各半兩巴豆十二枚去皮心炒令黃細研上十三味除巴豆外搗羅為末入研了巴豆和勻煉蜜為丸如梧桐子大每日空心粥飲下五丸以利為度未利加至七八丸利下黃沫惡物為效治瘡腫久不愈內消散方皂莢刺皮一兩為末乳香研二錢上二味末和勻每服二錢匕酒一盞煎七分溫服其毒內消或微利是效治瘡癤癰腫內消漏蘆煮散方漏蘆去綿白蘞黃芩去黑心麻黃去根節白薇洗枳實麩炒升麻芍藥大黃銼炒甘草炙各一兩上十味搗羅為散每服二錢匕水一盞煎至七分溫服治癰疽始發未變膿令內消花蕊石散方花蕊石火煅黃蜀葵花龍骨去土研烏賊魚骨去甲梔子仁草龍膽去土鬱金銼胡粉大黃銼各一兩上九味搗羅為散量多少以津唾調成稀膏敷之頻以唾潤日一易治諸癰腫初發及火灼乳癰令內消乳香散方乳香半兩水銀粉一分黃柏一兩半白芨一分白蘞鉛丹大黃各一兩上七味搗羅為細散水調貼之有膿時乾摻治癰疽發背一切熱毒氣結腫疼痛腑臟壅滯疏轉枳殼丸方枳殼去瓤麩炒青橘皮去白焙各半兩牽牛子一半生一半炒共三分木香一分甘草炙大黃銼炒各一兩皂莢不蚛者三梃椎碎以酒一升浸挼取汁絹濾去滓上七味除皂莢外搗羅為末先以皂莢汁於火上煎成膏即入藥末搜和為丸如梧桐子大空心服二十丸蔥茶下以利為度未利再服治癰疽內消防風散方防風去叉升麻白蘞黃芩去黑心豬苓去黑皮黃耆銼瞿麥穗各一兩薏苡仁一兩半當歸切焙甘草炙各半兩人參三分赤小豆一合醋炒七遍上十二味搗羅為散每服二錢匕空心溫酒調下日晚再服治癰腫內消升麻湯方升麻大黃炒黃芩去黑心當歸切焙枳殼去瓤麩炒各一兩甘草炙半兩芍藥一兩半上七味粗搗篩每服五錢匕以水二盞煎至一盞去滓空心溫服日晚再服治癰疽已成膿水內消木占斯散方木占斯桂去粗皮人參細辛去苗葉敗醬乾薑炮厚朴去粗皮生薑汁炙防風去叉桔梗銼炒甘草炙各一兩上十味搗羅為散每服三錢匕溫酒調下食前服未成膿即去敗醬一味治癰疽始作赤焮熱長甚速木香搭方木香犀角屑大黃升麻黃芩去黑心梔子仁黃連去須甘草芒硝射干黃柏去粗皮炙紫檀香羚羊角屑白蘞各一兩地黃汁五合麝香一分研入上十六味㕮咀以水二升煮取一升用故帛兩重納湯中蘸搭腫上干即又蘸搭之日夜數百度治腫毒癰疽未潰令內消已潰令速愈草烏頭散方上取草烏頭末水調雞羽掃腫上有瘡者先以膏藥貼定無令藥著人初塗病人覺冷如水瘡乃不痛治一切癰疽瘡癤焮腫未穴先疏通臟腑牽牛子散方牽牛子二兩一半生一半炒木香青橘皮湯浸去白焙陳曲炒各半兩上四味搗羅為散每服三錢匕五更初以生薑茶調下至天明通轉三兩行自止後以薤白粥補之一切癰疽諸瘡膏藥論曰諸瘡之證成腫或潰或硬或久不瘥者皆借膏劑以去臭腐排惡汁化死肌生良肉者正以此也附方於後治一切瘡腫及傷折雲母膏方雲母硝石細研甘草各四兩槐枝柏葉柳枝桑根白皮各二兩桔梗防風去叉桂去粗皮蒼朮菖蒲高良薑黃芩去黑心柴胡厚朴去粗皮松脂蜀椒去目並閉口者芍藥龍膽白芷白芨白蘞黃耆芎藭白茯苓去黑皮夜合花附子去皮臍各半兩鹽花人參當歸切焙木香騏驎竭沒藥麝香乳香各半兩橘皮去白一兩鉛丹一十四兩水銀二兩上三十九味依次第用各粗銼勿令太細免煎易焦黑先以清油四十兩於鐺內煉令香熟下雲母用柳篦不住手攪候十數沸即以罩籬漉出次下硝石亦准前法次下柏葉焦黃色為度亦漉出一味味煎相次下柳槐枝次下鹽花及人參諸藥候藥盡後提鐺離火候微冷以綿濾過再入鐺內便下鉛丹急以柳篦子攪須臾色變即止卻將鐺火上加火煎之黑色稠以柳篦取少許滴於水上凝結不黏手是藥已成先須炙一瓷器令熱即傾藥在內候膏藥如人體溫方入麝香仍以絹袋子盛水銀以手彈膏藥上如針頭細再以柳篦攪勻此是養藥母也如人收此藥防身以蠟紙裹不令風乾可三二十年並無損動若發背先以敗蒲二斤用水三升煮三五十沸將蒲湯洗瘡拭乾貼藥又以藥一兩分為三服溫酒下未成膿者立瘥乳癰瘰癧骨疽毒穿至骨者用藥一兩分作三服溫酒下甚者即瀉出惡物兼外貼瘥腸癰以藥半兩分為五服用甘草湯下未成膿者當時便消已成膿者膿隨藥下膿出後每日酒下五丸如梧桐子大膿止即止風眼貼兩太陽穴一切惡蟲咬外貼留瘡口發腦發髭鬢髮眉發耳臍癰牙疼並外貼腎癰馬墜傷筋骨疼不可忍者但以酒下半兩老少臨時加減外更膏藥包裹當時痛止箭頭在內不出者外貼每日吃少爛緑豆箭頭自出虎豹所傷先以甘草湯洗然後貼膏每旦換不過三貼狗咬蛇咬外貼又以生油下十丸如梧桐子大難産二日三日不分娩者溫酒下一分血運欲死以薑汁和小便半升溫酒下十丸死胎在腹以榆白皮湯下半兩小腸氣炒蘹香子溫酒下婦人血氣當歸酒下中毒藥者洗襪酒下各一分許中毒之人即吐瀉出惡物瘥一切腫癤瘤贅藥利即瘥只忌羊血治一切瘡腫保安膏方當歸切焙附子去皮臍芎藭防風去叉白蘞升麻細辛去苗葉側柏萆薢各一兩桃仁去皮甘草桑根白皮垂柳枝白芨黃耆白芷白殭蠶各半兩鉛丹研五兩雄黃研麝香研硫黃研各半兩杏仁去皮三分丹砂研一分上二十三味㕮咀以麻油二斤於新瓷器內浸藥一宿次日納鐺中文武火煉候稀稠得所以綿濾去滓入雄黃鉛丹丹砂麝香硫黃等物再煎須臾息火別入黃蠟四兩候藥凝稍過傾入熱瓷器內盛之勿令塵汙發背酒調兩匙日兩服外貼二日一換瘰癧瘻瘡疽瘡風腫乾癬奶癬腎癬髮鬢發腦發牙蛇蟲咬皆貼之折傷筋骨酒服半匙箭入骨貼之自出喉閉含之即通難産並胎死腹中並酒化下半兩血氣衝心生薑自然汁加小便同煎溫酒化下一匙但諸惡瘡數年不痊者以鹽湯先洗然後貼之治一切惡瘡瘰癧癰疽發背陰瘡灸瘡湯火瘡閃撲損烏犀膏方白芷板藍根苦參芎藭並細銼各一兩半鉛丹六兩清麻油一十五兩上六味先將油並前四味藥用慢火同煎令藥焦黑用綿濾去滓再入鍋內亦用文武火煎沸下鉛丹在內用柳木篦子攪勻滴水內成珠為度即傾在瓷器內密收如用以無灰紙攤貼所患處治一切瘡腫紫金膏方皂莢不蚛者一梃去皮蔥五莖去根二味於清油內煎令焦黃以綿濾去滓鉛丹研四兩糰粉研四兩松脂研二兩上五味用清油半斤先煎前二味去滓次下鉛丹又下糰粉松脂以柳木篦不住攪滴水中成珠為度隨瘡大小貼之治一切惡瘡腫烏金膏方麻油一斤鉛丹四兩冬月六兩蠟四兩頭髮雞子大一團上四味先炒鉛丹令黑即下油及發以柳木篦不住攪滴水中候可丸即止便下蠟更煎蠟銷後即盛瓷器內隨瘡大小貼之治一切瘡腫傷損湯火燒摩風止痛癢用薄絹攤貼之口瘡含化一豆大風毒氣眼瞼赤爛疼痛不可忍者用藥塗之口面風癬以藥塗擦熱徹為度耳鼻中肉鈴用紙拈點一豆大一月取下並不疼痛仍除瘢痕退䵟𪒟等神應膏方栝蔞一枚去皮零陵香藿香芍藥甘草黃耆杏仁去皮各一分白芷三分龍腦麝香並研各一錢黃蠟一兩半清油六兩上十二味除龍腦麝香外並細銼於臘日用油浸七日卻出藥將油煉令香熟放冷稱六兩卻再入諸藥煎令黃用夾絹袋濾去滓再入鍋內旋旋下蠟攪勻滴水中成珠即止去火候溫入龍腦麝香打勻傾出熱瓷合內依前病用之治一切惡瘡三仙膏方麻黃四兩鉛丹定粉各研一兩上三味先煉油熟將鉛丹定粉同羅過同煎用槐枝攪勻候稀稠得所滴水內如珠即止每用隨瘡大小貼之治一切癰腫瘡癤乳香膏方清油一斤皂莢五握去皮銼蔥白五握銼鉛丹糰粉各六兩松脂四兩乳香一兩當歸一兩桂心一錢上九味先將清油於銚子內慢火煎熱入皂莢蔥白桂心以煎令黃赤色濾去滓後下松脂乳香沸下粉鉛丹當歸同熬成膏滴在水碗中成珠子於瓷合內盛以故帛上攤每日早晚換之治一切癰疽發背疼痛不止木通膏方木通二兩黃丹五兩細辛一兩茵陳一兩琥珀半兩細研硃砂一兩細研清麻油十兩上七味先煎油令沸即下細辛木通茵陳煎五七沸去滓即入琥珀硃砂末更煎用柳木篦攪候滴於水中成珠子膏成收於瓷閣中每用攤膏於故帛上貼日二易之治一切癰疽發背疼痛不可忍丁香膏方丁香半兩末麻油一斤黃丹七兩丈夫頭髮一兩蠟一兩桂心半兩末當歸半兩末上七味先煉油令香下發煎令發盡次下蠟以綿濾過卻入鐺中下黃丹不住手攪候色黑滴在水內如珠子即下丁香桂心當歸等末攪令勻以瓷合盛用帛上攤貼日二易之治一切癰疽發背日夜發歇疼痛不止胡粉膏方胡粉四兩油半斤蠟二兩半乳香半兩細研麝香一錢細研沒藥半兩細研上六味以文火煎令油熟下胡粉後下蠟臨成下麝香乳香沒藥攪勿住手待似星花上來即住以瓷器內盛於故帛上塗貼日二易之治一切癰疽發背潰後肌肉不生宜用此排膿生肌神效膏方當歸二兩白芷一兩半乳香三分細研松脂一兩芎藭一兩白蘞一兩半緋帛灰半兩細研亂髮灰半兩細研甘草一兩半黃丹十兩木鱉子三十枚去殼杏仁一兩湯浸去皮尖雙仁木香一兩半黃蠟二兩麻油二升上十五味先取油安鐺內煉令香熟將八味藥細銼下油中浸一宿以文火煎白芷色黑赤濾去滓下松脂蠟乳香緋帛發灰等更煎令消以綿濾去滓入鐺內下黃丹不住手攪變黑光色滴在水中為珠子膏成用瓷器盛每用以故帛攤貼日二易之治一切癰腫潰後肌肉不生宜用此排膿生肌乳香膏方乾死鼠一箇中形者大黃一兩杏仁半兩去皮尖雞子黃一兩亂髮如雞子一團鉛丹六兩蠟一兩水銀半兩油一斤乳香半兩上十味先熬油令沸下亂髮並鼠大黃煎候鼠焦色綿布絞去滓再下鉛丹蠟杏仁煎以柳篦攪令黑色即下雞子黃水銀乳香等攪令勻滴水中成珠得所以瓷合盛用故帛攤貼治一切惡瘡發背毒腫烏金膏方油半斤鹽花一兩黃蠟三兩柳枝二兩銼上四味先熬油令沸下柳枝煎候焦黃漉出綿布絞去滓再煎下蠟鹽花以柳篦攪令稀稠得所以瓷合盛用故帛上攤貼若三日內未成膿便消已成膿頭未破者即潰不須針灸其瘡變痛成癢是藥力也色如猶皮孔濈濈有黃水若是惡瘡發背用藥貼出膿血及黃水赤小豆汁貼膏令出盡以瘥為度治一切瘡癤腫毒至聖膏方夜合花白皮蒴藋大黃當歸白蘞槐白皮白芷細辛去苗葉杏仁天麻芎藭槐枝柳枝敗龜虎骨附子去皮臍各半兩乳香細研一兩麝香細研二錢砒霜細研半分自然銅細研一分膩粉研半分牛黃細研二錢定粉研半兩鉛丹十二兩清油二斤半上二十五味除研藥丹粉外細銼先熬油令沸次下諸藥煎候白芷赤黑以綿絞去滓再煎下丹柳篦攪候變黑色滴水中成珠軟硬得所次下乳香等研藥更攪令勻以瓷合盛發背魚臍瘰癧並以膏貼日二上以瘥為度治一切瘡毒無名異膏方無名異細研騏驎竭細研各一分柳枝銼三兩蠟一兩鉛丹五兩油十二兩上六味先熬油令沸下柳枝煎候赤黑色以綿濾過再煎下丹蠟攪候變黑色滴水中成珠得所下騏驎竭無名異末更攪令勻瀉冷水中捻作挺子一切惡瘡發背諸毒瘡並宜塗貼以瘥為度治諸瘡一切打損腫毒走馬膏方皂莢豬牙者十梃去皮椎碎芫花五兩生薑五兩取自然汁生地黃一斤取自然汁上四味先以米醋一斗入諸藥煎至三升絞去滓再煎以柳篦攪候稀稠得所如膏以瓷合盛埋地內五日取出以故帛上塗貼日二上以瘥為度治一切瘡腫癤毒佛手膏方清麻油半斤鉛丹三兩柳白皮二兩銼皂莢刺四十九枚銼當歸半兩末白芨一分末黃蠟半兩硃紅一分生緋帛五寸燒灰細研上九味先熬油令沸下柳皮皂莢刺煎候赤黑色以綿濾過下丹煎以柳篦攪候變黑色即下諸藥末攪令勻滴水中成珠得所以瓷合盛用故帛塗貼日二上以瘥為度治一切惡瘡癤毒如聖膏方薔薇根銼乳香研阿魏研各一兩鉛丹六兩柳枝三兩銼長一寸清油一斤上六味先熬油令沸下柳枝薔薇根煎候黃黑色以綿濾過下丹煎攪候變黑色次下乳香阿魏更攪令勻一切瘡腫並用故帛上塗貼之如患赤眼頭痛眼澀貼太陽兩穴驢傷馬墜婦人血氣並當歸酒下三丸如梧桐子大癬瘡先抓破取膏塗貼以瘥為度治癰疽及諸種瘡腫應痛膏方當歸秦艽何首烏敗龜白蘞白芨白朮白芷杏仁去皮尖木鱉子去殼芎藭延胡索密陀僧煅研各半兩用麻油八兩熬前藥令杏仁黃黑色為度漉出藥滓入後藥乳香研麒麟竭研沒藥研楓香脂研各一分鉛丹三兩上十八味先用油煎前十三味去滓入後五味再熬用柳枝子攪勻令黑色成膏為度如是發背加附子末一分同熬勻用紙花子貼瘡上治癰疽惡瘡生肌引膿排毒氣蝕惡肉除死肌雄黃膏方雄黃細研半兩巨勝油七兩丹砂細研密陀僧煅研各半兩鉛丹三兩蠟一兩蛇黃半兩煅醋淬七遍搗末牡蠣煅研三分上八味研和令勻先熬油令沸下蠟熔盡次下丹以柳篦攪候變黑色即下諸藥末攪令勻滴水中成珠子以瓷合盛故帛上塗貼日二上以瘥為度治一切瘡腫垂柳膏方垂柳枝白皮二兩銼蒴藋根四兩銼丹砂一分細研熟雞子黃一枚熊膽半兩研故青帛七寸燒灰研蠟一兩鉛丹四兩清油一斤上九味先熬油令沸下柳皮蒴藋根煎候赤黑色漉出以綿濾去滓下丹蠟煎以柳篦攪候變黑色下四味研藥更攪令勻滴水中成珠子以瓷合盛用故帛上攤貼日二上腸癰以綿裹半棗許含化咽津以瘥為度眼暗捏作餅子以針刺作孔三五十個貼眼上便瘥耳聾作挺子當中刺為孔塞耳中日二換即瘥打損取膏塗貼疼痛處以瘥為度治發背瘡口未合大聖膏方當歸切柳根白皮切各二兩桂銼一分槐實白蘞銼白芨銼沒藥柏皮去粗皮銼各一兩用臘月豬脂半斤黃蠟四兩清油半斤同熬藥焦色去滓再入後藥鉛丹研乳香研各半兩麝香研一分蘆薈半兩上十二味先煎前八味去滓再入後四味熬成膏以瓷瓶盛入地內七七日取出將熟絹片留眼貼膏在瘡口上去盡惡物瘡口自合治發背癰腫惡瘡楸葉膏方楸葉銼十斤馬齒莧銼一斤烏犀角末二兩沉香末一兩上四味先取馬齒莧楸葉以水五斗煎至一斗濾去滓更煎至一升半下二味藥末以柳篦攪候稀稠得所以故帛上塗貼日二上即瘥治癰疽瘡癤能舒筋脈消腫毒止疼痛黃耆膏方黃耆銼半兩零陵香一分赤芍藥銼芎藭銼天麻銼防風去叉銼生乾地黃銼各一錢黃蠟二兩半清油半斤上九味除蠟外都一處用銀石器內以油浸七日用文武火煎焦黃色以綿濾去滓下黃蠟再煎令蠟化盛於瓷器中每用以軟帛薄攤貼之如皮膚瘙癢筋脈緊急用少許塗摩尤效治癰瘡久不瘥百靈膏方槐花子炒焦為末松柏各一兩乳香膩粉各一分上四味細研拌勻用清油黃蠟各一兩瓷器內慢火熬成膏貼之治一切癰疽及上攻下注風毒瘻瘡疼痛焮腫等疾敗毒膏方巴豆和殼椎碎六兩麻油十二兩鉛丹炒令紫三兩上三味先將油煮巴豆慢火養一二日滴入水中成珠則止濾去滓卻將其滓在一長瓶內搘起瓶一頭令高下以火燒逼得巴豆內膏油流下以器盛併入前藥油內同煎攪勻入鉛丹更熬令色紫去火令冷入瓷合內密封地孔藏七日出火毒並以故絹攤貼之治一切癰疽惡瘡生肌長肉膏方清油十兩龍骨研二兩木香檳榔黃連去須各三分三味同為末取細上五味先將油入鍋內慢火熬滴水成珠子下龍骨末更熬如稀膏則止去火候稍溫即下三味藥末不得住手攪候冷以瓷合內收隨瘡大小貼之治癰疽發背及一切瘡腫乳香膏方乳香二兩附子生用五兩烏頭生用木鱉子去殼各二兩當歸秦艽各一兩紫草去苗三兩蘇枋木銼五兩頭髮灰一兩清油二十兩各細銼入油慢火熬候諸藥焦黑色為度去滓入後藥楓香脂五兩松脂二兩三味同研黃蠟五兩鉛丹二兩沒藥一兩半研上十五味先煎前九味候色黑去滓次下乳香等六味依次等逐味下用慢火熬用柳木篦不住手攪候熬成膏滴水中成珠為度攤紙花子上看瘡大小用之治瘡腫疼痛闢風斂瘡紫金挺方當歸續斷骨碎補桂去粗皮附子澤蘭芍藥白芨牛膝羌活芎藭木香騏驎竭生乾地黃白殭蠶白附子各一兩沉香丁香各半兩栝蔞二枚大者烏蛇肉白蘞白芷玄參二十三味一處搗篩各一兩杏仁桃仁二味去皮細研各三分上二十五味都一處入麻油四斤豬脂一斤半野駝脂三兩用文武火鍋內煎黑去滓再入乳香末三兩松脂六兩更煎煬後又濾去滓細羅鉛丹三斤別炒令紫色旋旋入藥油內煎柳杖子攪令紫色去火滴水內成珠即傾入瓷器內盛每使時看瘡大小用之治一切瘡腫烏賊骨膏方烏賊魚骨去甲研末舊船灰研末各一兩鉛丹研三兩清油十二兩上四味先熬油令沸下鉛丹以柳木篦攪候黑色即將前二味藥末再攪令勻滴水內成珠子得所以瓷合盛故帛上攤貼日二上以瘥為度治一切癰疽瘡腫玄參散方玄參黃芩去黑心羊蹄根芍藥白芷丁香木香硝石碎半夏湯洗七遍白蘞木鱉子去殼莽草各一兩上十二味搗羅為散醋調塗瘡上日三四次腫消為度又方甜葶藶半兩木通半兩銼川大黃半兩生銼莽草半兩上四味搗羅為細散以水和如稀膏塗腫上干即更塗以瘥為度治一切癰疽發背熱毒猛異攻肌肉赤色腫痛不可忍欲成膿及已成膿並風毒熱在關節欲結成癰便令內消寒水石膏方寒水石二兩羊蹄根一兩銼硝石一兩川大黃一兩白蘞二分木香三分附子三分去皮臍黃連一兩去須丁香三兩榆白皮三分銼莽草三分赤小豆一合漢防己一兩半夏三分玄參一兩甘草一兩生銼上十六味搗羅為細散每用時以生蜜一合地黃汁一合旋調以成膏攤於生絹上貼干即易腫消為度治一切瘡癤癰腫及瘻瘡杖痕等並宜貼不髮直至較白膏方定粉三兩清油四兩煉熟取三兩鉛丹二錢商陸根三分曝乾稱蠟四兩白柳枝半兩青白而葉大者是二月採去粗皮取內白皮切作片子曝乾稱上六味先以熟油熬商陸柳枝令色變後入粉蠟丹攪之不住手直至滴水內為珠子膏成攤帛上貼之熬時始則色微紅次微青乃熟也取出久而色白冬色愈白治諸瘡腫四時可用若未成膿即消已成膿即破木通膏方春用木通三兩白芷細辛去苗葉摩勒香各二兩夏用木通續斷三兩白芷二兩半黃耆芍藥各二兩秋用木通薰陸香各三兩黃耆二兩白芷一兩半冬用木通黃耆木香各三兩當歸銼焙二兩芎藭一兩半摩勒香三兩薰陸香一兩上各依四時並㕮咀以清麻油二升煎候白芷黃色即去滓絞取油放冷下黃蠟五兩候消盡更入鉛丹十兩先下六七兩看硬軟得所即止亦不須入盡十兩以急火煎用柳篦攪勿令住手點物上其色如漆即膏成欲用藥先嚼少鹽擦瘡上次貼之治初患癰腫瘡癤熱焮疼痛消腫毒清涼膏方上搗大黃為末漿水調攤貼之醋摩亦得又方上取地龍屎以小便和塗貼之干即易又方上取井底泥塗瘡上干即易又方上搗惡實根貼之干即易又方上搗地黃貼之日再易又方上搗馬齒菜貼之干即易又方上搗龍葵菜貼之又方上搗車前葉貼之又方上搗蔓荊根貼之又方上搗雞腸草貼之又方上搗芭蕉根貼之
