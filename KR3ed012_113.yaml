body:
  text: 卷第一百一十三目眵䁾論曰目者腑臟之精華肝之外候津液之道也若腑臟挾熱內熏於肝沖發於目使液道熱澀結滯於眥瞼則成眵䁾治臟腑挾熱沖發於目津液結滯而成眵䁾澤瀉丸方澤瀉茺蔚子菟絲子酒浸別搗石斛去根地膚子五味子生乾地黃焙各一兩山芋一兩半細辛去苗葉半兩上九味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心溫熱水下臨臥再服治風熱沖肝上熏於目結成眵䁾羚羊角散方羚羊角鎊二兩犀角鎊一兩防風去叉牛膝去苗羌活去蘆頭桑根白皮銼五味子生乾地黃焙白蒺藜炒去角芍藥各三分上一十味搗羅為散每服二錢匕水一盞煎至六分不去滓食後臨臥溫服治目生眵䁾淋洗秦皮湯方秦皮去粗皮柴胡去苗黃柏去粗皮黃連去須蛇銜各二兩苦竹葉二握細辛去苗葉一兩上七味粗搗篩拌勻每用二兩以水六盞煎取三盞去滓熱淋冷即再暖治目生眵䁾曾青散點方曾青水精各一兩龍腦真珠各等分琥珀半兩上五味研如粉以銅器收盛臨臥用銅箸點如黍米許治目生眵䁾蕤仁膏點方蕤仁研馬蹄決明搗末黃連去須搗末各一兩黃柏去粗皮搗末三分上四味各為細末用白蜜清者二升和勻入銅器中以油單密封於飯上蒸之飯熟為度取出以綿絞去滓後入輕粉二錢龍腦末一分攪和再入銅器中以蠟封口旋取如麻子大點眥頭日再治風熱沖目多生眵䁾黃柏膏點方黃柏去粗皮銼一兩蕤仁半兩大棗青州者三枚劈上三味以水三升同內瓷器中慢火煎至一升去滓取清汁再以淨瓷瓶子收每用銅箸點眼日三五度治目多眵䁾黃連膏點方黃連去須為末蕤仁研各三分乾薑為末膩粉各一分上四味除膩粉外以牛乳三合漬之一宿明旦於微火上煎取一合去滓取清汁入膩粉攪和每用銅箸點如黍米許安眥頭日三眯目論曰眯目者簸粳飛塵等物入於目中也治宜亟出之久不出著於瞼眥因而傷動則為澀痛淚出古方初眯時令以綿裹箸撩去之或以墨汁或以雞血浮出之皆良治飛塵眯目因此生翳暈車前子散方車前子洗焙五味子炒芍藥各一兩半細辛去苗葉白茯苓去黑皮玄參人參大黃銼炒桔梗銼炒各一兩上九味搗羅為散每服三錢匕食後臨臥溫米泔調服治沙土入眼痛不可忍腫赤者龍鹽膏方鹽龍腦硼砂研馬牙硝研硇砂研飛過蕤仁各一分杏仁去皮尖雙仁二七枚上七味各研細再同研勻以生蜜和稀稠得所新瓷合盛用竹箸臥點之治眯目不出生膚翳瞿麥散方瞿麥穗乾薑炮各半兩上二味搗羅為細散食後以井華水調服二錢匕日二治雜物眯目不出方蠶砂揀令淨上空心用新汲水吞下十枚勿嚼破治稻芒等物入目方生蠐螬上一味取新布覆目上將蠐螬於布上摩之芒即出著布治雜物眯目不出方桑根白皮上一味取新者一片如箸大削一頭薄椎令軟滑漸漸入目中撥之須臾自出又方新大麥半合上一味煮汁漸注目中即出又方豬脂一分上一味取塞鼻隨左右用之出又方白蘘荷根上一味取心搗絞汁滴入眼中立出又方甑帶燒灰上一味細研每服二錢匕水調服之即出又方東牆上馬齒莧燒灰上一味細研少許點眥頭即出又方生粟米七顆上一味爛嚼並唾洗之即出治雲母等入眼方好墨上一味研為細末用新筆蘸點眼大小眥頭即時隨墨出又方雞肝中血少許上一味取滴目中即出又方衣中白魚上一味曝乾研為末點眥中即出又方豉三七粒上一味以水浸洗目視之即出又方羊筋上一味取粗者椎開梢頭口中熟嚼過輕挼瞼上來往開眼拭二七遍眯隨手出以平旦日未出時用又方酥上一味以少許內鼻中隨眯目左右垂頭臥少時令流入目中淚與眯物同出針眼論曰針眼者以邪熱搏於血脈上攻眼目發於瞼眥結焮腫痛赤根白頭包裹膿汁痛如針刺治法當詳其外證隨宜砭刺決泄邪毒後以消腫敗熱之劑斷其根本治熱客目眥結成腫疱俗呼偷針者半夏湯方半夏湯洗七遍去滑細辛去苗葉各一兩前胡去蘆頭枳殼去瓤麩炒各二兩烏梅肉半兩上五味粗搗篩每服五錢匕水一盞半入生薑一棗大拍碎同煎至六分去滓食後臨臥溫服治熱氣客目內眥腫起前胡湯方前胡去蘆頭二兩芍藥青葙子決明子微炒細辛去苗葉車前子梔子仁各一兩上七味銼如麻豆大每服五錢匕水一盞半入竹葉七片煎至七分去滓入芒硝末一錢匕再煎一沸食後臨臥溫服微利為度治目內眥成疱三五日間生膿汁者麥門冬湯方麥門冬去心焙旋覆花木通銼大青各一兩半茯神去木黃連去須各一兩上六味粗搗篩每服五錢匕水一盞半煎至七分去滓入生地黃汁半合芒硝末半錢匕更煎三二沸食後臨臥溫服治熱毒攻目眥目腫起有膿汁者芍藥湯方赤芍藥一兩半羚羊角鎊玄參防風去叉黃芩去黑心各一兩蔓荊實甘菊花各三錢上七味粗搗篩每服五錢匕水一盞半煎至七分去滓入馬牙硝一錢匕食後臨臥溫服治眼暴熱痛眥頭腫起大黃湯方大黃銼炒枳殼去瓤麩炒芍藥各三兩山梔子仁黃芩去黑心各二兩上五味粗搗篩每服五錢匕水一盞半煎至七分去滓食後臨臥服治針眼暴腫痛不得開點眼石膽散方石膽研如粉一分黃連去須搗黃柏去粗皮搗各三分蕤仁去皮研銅青研芒硝各半兩上六味末更入乳鉢中重研令極細勻每取如黍米大點目眥頭治熱毒攻注目眥腫結赤痛點眼蕤仁煎方蕤仁去皮研秦皮去粗皮黃柏去粗皮青竹茹洗切各一兩梔子仁半兩上五味銼碎拌勻以水三升入銅器內煎取一升以綿濾取清汁點眼日三五度治眼忽結腫洗眼石膽散方石膽煅令白去火毒滑石研各一兩秦皮半兩為末膩粉二錢匕上四味同研勻每用一字湯浸候溫閉目洗兩眥頭以冷為度鉤割針鐮論曰內經曰血實宜決之難經曰腫熱宜砭射之蓋邪毒結聚其勢盛實有藥力所未能去者決射之法不可廢也凡目生息肉腫核黃膜之類皆以臟腑風熱毒氣熏發於肝血氣結滯所成也治宜先鉤割鐮洗去惡毒次以湯散蕩滌膏劑點敷之鉤割針鐮法凡兩眥頭有赤脈及息肉者宜鉤起以鈹針割去令盡未盡更割以盡為度或以縫衣細針穿線口銜線頭牽起別以鈹針向目中割之割了以火針尉之使斷其根不爾三二年間恐能復發復發則黏睛難療其絶厚者侵入水輸宜以曲頭篦子折起勿使掣損瞳仁蓋瞳仁甚薄易損故也凡鉤割及用針不宜在旦旦則腹空五臟皆虛令人頭運悶倒又鉤割不宜欲速欲緩緩為之凡眼上腫瞼皮里有核如米豆大漸長如梅李大者內有物如膿或似桃膠此皆風熱所致也可針破捏去之即瘥仍翻眼皮向里針之恐引風毒又恐瞼外成痕凡風毒熱腫結於兩瞼內妨痛日久漸大往往隱損瞳仁宜用針刀去之乃瘥又脾風熱壅上攻眼瞼熱痛不止其眼腫合者宜翻眼瞼視其黑睛上下有黃翳根腳連瞼則以法針去之次以藥敷又風瞼毒熱結成腫如捨世俗呼為眼捨其風熱毒氣常在瞼下唇邊緣瞼唇中空卷遇肝肺熱即依前結成宜針去結膿凡目赤腫硬淚出難開疼痛不可忍先患一目次相牽引漸生翳膜不能見物此是膈中積熱肝臟風毒上衝故也宜先鐮洗除去毒血次服藥攻治凡目赤兼黑睛中忽從下向上生黃氣疼痛者是脾胃熱毒氣熏攻如此宜先鐮上下瞼散去瘀血次服諸藥凡目生頑翳者可用火燒銅針輕點傳波斯國銀礦名悉藺脂點之不痛勿用別法凡目生黃膜上直復瞳仁者初患之時疼痛赤澀發歇不定淚出難開漸生翳膜直復黑睛不辨人物蓋因脾臟風熱熏發於目其證如此宜先鉤割鐮洗次服蕩滌脾臟風熱之藥凡目忽然赤澀淚出痛癢漸生障翳赤膜下垂直復睛珠如朝霞之色者宜急鐮洗去其瘀血次用點藥及服諸藥凡目胞內膠凝者是脾胃積熱膈內風沖入於胞瞼初如麻米久則漸長狀如桃李摩隱瞳仁後必生翳宜針破出血次鐮洗去瘀血加湯藥攻治凡目風牽瞼者初患之時乍好乍惡發歇不定淚出不止此是胃氣受風肝膈積熱風熱毒氣熏發瞼眥甚者目皮翻出急宜鐮之散去瘀血及尉烙服藥治療凡瞼生風粟者因心肺壅毒肝家有風故令瞼皮上下有肉如粟粒淚出澀痛久生翳膜宜鐮出惡血除去根本凡目痛如針刺者初患之時微覺頭目眩目系常急夜臥澀痛淚出難開久則發痛時如針刺此是心臟潛伏毒熱風壅在於膈中久則漸生障翳兩目俱損急宜鐮洗出血及針陽白穴凡目忽被物撞打睛出但眼帶未斷者當時內入瞼中勿令驚觸四畔摩闢風膏及搗生地黃敷之其竅內有惡血以針引之尉烙論曰血氣得溫則宣流得寒則凝泣肝藏血上注於目若肝經虛寒則目多昏暗淚出之候古方用溫尉之法蓋欲發散血氣使之宣流爾若翳膜頑厚尉法所不能去者又宜烙之尉烙法治目赤腫貼尉地黃膏方生地黃粟米飯澱極酸者上二味等分爛研如膏勻攤於薄絹上方圓二寸許貼尉目上干即易之治目淚出或有膿出者馬齒尉方馬齒子人莧子各半合上二味搗羅為末入銅器中於飯上蒸熟以綿裹尉大眥頭膿水出處仍乘熱尉之令透睛每尉三五十度膿水自絶治熱病後失明或生白膜極厚者燒針烙法上取平頭針可翳大小者燒赤當翳中烙之須輕下手若烙後翳已破即少敷除翳藥治目昏暗中指尉法上東向坐不息再過以兩手中指口唾之二七相摩拭尉目眥佳治目暗掌心尉法上雞鳴時以兩手相摩極熱尉目三遍仍以指甲掐兩眥頭覺有神光妙治目赤癢澀及一切目疾湯器尉方上盛熱湯滿器銅器尤佳用以尉目乃閉目勿開亦勿以手揉目次掬器中湯淋目候稍冷即止一日三四次為之若無目疾者亦可間用此法治逆順翳法凡五臟虛勞風熱上衝於肝從上生向下名曰逆翳從下生向上名曰順翳此疾宜用尉烙法
