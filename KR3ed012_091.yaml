body:
  text: 卷第九十一虛勞失精論曰內經曰腎者主蟄封藏之本精之處也蓋腎受五臟六腑之精而藏之氣盛則輸瀉有常虛勞之人精氣已虧邪氣乘之則藏者不固或於夢寐或於便溺而漏失無常也其證少腹強急陰頭寒目痛發落其脈數而散芤動微緊者是也治虛勞傷損小便失精及夢泄韭子散方韭子炒麥門冬去心焙菟絲子酒浸一宿別搗各一兩車前子一合芎藭白龍骨各三分上六味搗羅為散每服二錢匕溫酒調下日二服不知稍稍加之甚者夜加一服治虛勞喜夢失精桂枝牡蠣湯方桂去粗皮牡蠣燒芍藥龍骨甘草炙各三分上五味粗搗篩每服三錢匕水一盞入生薑半分拍碎棗二枚劈煎至七分去滓空心溫服日晚再服治虛勞失精多睡目視𥉂𥉂羊骨湯方羊骨三兩銼碎白朮一兩桂去粗皮二兩麥門冬去心焙人參芍藥各三分白茯苓去黑皮一兩甘草炙半兩厚朴去粗皮薑汁炙阿膠炙桑根白皮各一兩上一十一味除羊骨外粗搗篩每服三錢匕先以水三盞煎羊骨至一盞半去骨下藥並生地黃一分生薑一分拍碎棗兩枚劈煎至八分去滓下飴糖少許再煎令沸空心溫服夜臥再服治虛勞失精便溺白濁形體枯瘦腰腳疼重人參湯方人參芍藥桂去粗皮各三分黃耆銼甘草銼白茯苓去黑皮白龍骨牡蠣煅各半兩半夏湯洗去滑焙乾二兩澤瀉酸棗仁各一分上一十一味粗搗篩每服三錢匕水一盞入生薑半分拍碎煎至七分去滓空腹溫服治虛勞漏精韭子丸方韭子炒一兩鹿茸去毛酒浸炙桑螵蛸炙各三分龍骨車前子天雄炮裂去皮臍各一兩乾薑炮三分菟絲子酒浸一宿別搗一兩上八味搗羅為末煉蜜丸如梧桐子大每服二十丸空腹用黃耆湯下治虛勞元氣虛弱精滑不禁腰脊疼痛白龍骨丸方白龍骨一兩韭子炒半兩補骨脂炒肉蓯蓉酒浸切焙各一兩菟絲子酒浸別搗半兩上五味搗羅為末酒煮麵糊丸如梧桐子大每服二十丸至三十丸空心食前溫酒下治虛勞腎臟衰憊夢寐失精補骨脂散方補骨脂炒一兩蘹香子舶上者炒三分上二味搗羅為散每服二錢匕溫酒或鹽湯調下空心食前服兼治腎虛腰疼治陽氣虛損下元冷極精泄不禁小便頻數腰腳無力飲食減少正陽丸方鹿茸去毛酥炙二兩肉蓯蓉酒浸切焙石楠各一兩五味子葫蘆巴炒各三分木香一兩半石槲去根韭子炒牛膝酒浸切焙各半兩巴戟天去心附子炮裂去皮臍各一兩白馬莖塗酥炙乾二兩上一十二味搗羅為末煉蜜丸如梧桐子大每服二十丸食前溫酒或鹽湯下治虛勞漏精補益附子丸方附子炮裂去皮臍龍骨牛膝酒浸切焙肉蓯蓉酒浸切焙巴戟天去心等分上五味搗羅為末煉蜜丸如梧桐子大每服二十丸空心日午溫酒鹽湯任下以知為度治虛勞失精補骨髓去腎邪金鎖丸方巴戟天去心二兩龍骨山茱萸各一兩韭子炒四兩上四味搗羅為末煉蜜丸如梧桐子大每服二十丸至三十丸空心溫酒下治腎臟虛憊小便遺精陰痿濕癢莖中痛硇砂丸方硇砂一兩細研湯浸濾清附子五兩炮裂去皮臍為末生薑一斤半取汁入前二味慢火煎熬成煎肉蓯蓉酒浸二兩遠志去心沉香銼山茱萸巴戟天去心鹿茸酒炙去毛石槲去根各一兩蘹香子炒石亭脂別研各半兩上一十二味除煎外搗羅為末用前煎和丸如梧桐子大每服三十丸溫酒下加至四十丸治虛勞元臟衰弱精氣滑泄或夢中遺瀝固氣不二丸方乾柿切焙雞頭舌焙乾雞頭纂上尖也金櫻子焙乾狀似黃薔薇子蓮花蕊焙乾上四味等分搗羅為末以烏雞於汁和丸如梧桐子大每服十丸溫酒下治五勞七傷失精腰痛少氣面目萎黃手足𤸷冷不思飲食龍骨散方龍骨人參遠志去心各一兩一分白茯苓去黑皮肉蓯蓉酒浸切焙各一兩半蛇床子炒桂去粗皮菟絲子酒浸搗焙巴戟天去心石槲去根各一兩上一十味搗羅為散每服三錢匕溫酒調下日三服治虛勞夢泄日漸羸劣韭子丸方韭子炒一合大棗去核焙五枚黃耆銼人參乾薑焙當歸切焙白龍骨半夏湯洗七遍去滑赤芍藥甘草炙各一兩上一十味搗羅為末煉蜜丸如梧桐子大每服三十丸暖酒下空心日午服治虛勞失精小腹弦急隱隱頭冷目痛發落人參丸方人參菟絲子酒浸一宿搗末各一兩半桂去粗皮牡蠣粉山芋黃柏去粗皮細辛去苗葉附子炮裂去皮臍各二兩澤瀉苦參麥門冬去心焙乾薑炮熟乾地黃焙各三兩上一十三味搗羅為末煉蜜丸如梧桐子大每服三十丸暖酒下空心日午服治虛勞腎氣乏弱失精腰腳無力小便數鹿茸丸方鹿茸去毛酥炙補骨脂微炒各二兩牛膝酒浸切焙杜仲去粗皮炙銼菟絲子酒浸一宿別搗末山芋桂去粗皮黃耆銼桑螵蛸微炒附子炮裂去皮臍熟乾地黃焙各一兩牡蠣粉澤瀉防風去叉乾薑炮龍骨研各三分肉蓯蓉酒浸去皴皮切焙遠志去心各一兩上一十八味搗羅為末煉蜜和丸如梧桐子大每服空心溫酒下二十丸治虛勞失精天雄散方天雄炮裂去皮臍一兩白朮四兩桂去粗皮一兩上三味搗羅為散每服二錢匕空心煨酒調下虛勞脫營論曰脫營之病虛勞之類也非由外邪病從內作其人或嘗貴後賤心切戀慕志懷憂慘又富而遽貧樂而暴苦皆傷精神外耗於衛內耗於營營泣衛除氣虛無精形體日減灑灑然時驚甚則精氣竭絶形體毀沮皮焦筋屈痿躄拘攣是其候也治虛勞脫營氣血消奪形體日減少氣失精多驚健忘服之倍筋力令人能食充肌膚益顏色麋茸丸方麋茸酒浸去毛炙黃色一兩半肉蓯蓉酒浸去皴皮焙乾一兩半菟絲子酒浸一宿別搗三分巴戟天去心半兩牛膝去苗酒浸銼碎三分桂去粗皮三分甘草炙銼一兩山茱萸半兩枸杞子三分五味子三分乾薑炮三分人參三分赤石脂一兩柏子仁微炒三分澤瀉三分細辛去苗葉半兩白茯苓去黑皮三分遠志去心一兩半枳殼麩炒去瓤半兩厚朴去粗皮生薑汁炙一兩熟乾地黃焙三分石槲去根三分山芋三分白朮三分上二十四味搗羅為末煉蜜丸如梧桐子大每服二十丸空心溫酒下漸加至三十丸治虛勞脫營氣血耗奪形體毀沮失精少氣灑灑然時驚補虛益精血除百疾天門冬散方天門冬去心焙石菖蒲遠志去心熟乾地黃焙山茱萸桂去粗皮石葦去毛白朮各一兩白茯苓去黑皮二兩上九味搗羅為細散每服一錢匕熟水調下服藥至三十日後筋力倍加至百日後耳目聰明久服駐顏益壽老少皆可服治虛勞脫營失精少氣形體日減補益鎮心強志地黃煎丸方地黃汁一升煎成煎鹿茸去毛酥炙黃色半兩人參一兩半茯神去木半兩防風去叉半兩甘草炙銼一兩上六味搗羅五味為末以地黃煎丸梧桐子大每日空心溫酒下三十丸治虛勞脫營真氣不足形體毀沮四肢沉重咽乾口燥飲食無味氣乏少力遠視𥉂𥉂驚悸不安五臟虛損病從內生大琥珀散方琥珀研二兩乾薑炮石葦去毛滑石研牡丹皮白茯苓去黑皮芎藭石槲去根續斷當歸切焙遠志去心人參牛膝去苗各三兩桂去粗皮二兩半肉蓯蓉酒浸去皴皮焙松脂煉了者牡蒙陳橘皮湯浸去白焙各四兩荏子松實和皮用柏子仁各三升車前子菟絲子酒浸別搗焙菴䕡子枸杞子胡麻子蕪菁子麥門冬去心焙各一升木通十四兩蛇床子炒半升上三十味搗羅為細散每服三錢匕以牛乳半盞水一盞同煎少時和滓溫熱服如久服此藥令人強盛輕身益氣消穀能食耐寒暑百病不侵駐顏潤肌膚力倍常人治虛勞脫營血氣傷憊羸瘦少氣畏恐多驚久服強筋骨長肌肉令人肥盛光澤顏色除解百病安精神少夢寐強氣血倍力留年益氣長神松實丸方松實去皮白茯苓去黑皮麥門冬去心焙柏子仁微炒別研甘草炙銼山芋枸杞子肉蓯蓉酒浸去皴皮炙乾五味子去莖葉桂去粗皮熟乾地黃焙陳橘皮湯浸去白焙乾薑研澤瀉遠志去心石槲去根黑者女貞實絡石杜仲去粗皮塗酥炙上一十九味等分搗羅為細末煉蜜丸梧桐子大每服食前溫酒下十丸食後再服不知稍增之可二十丸治虛勞脫營失精多驚營衛耗奪形體毀沮大補益石斛散方石槲去根黑者肉蓯蓉酒洗去皴皮切焙令乾各二兩遠志去心菟絲子酒浸一宿別搗續斷各一兩一分天雄炮裂去皮臍三分熟乾地黃焙枸杞子各二兩半棗肉研二兩上九味先以八味搗羅為細散再入研棗肉和勻每服二錢匕空腹溫酒調下食後再服治虛勞脫營羸瘦少氣精神毀減強神益氣甘草丸方甘草炙銼當歸切焙芍藥各一兩乾薑炮芎藭人參黃芩去黑心各半兩上七味搗羅為末煉蜜丸彈丸大每服一丸溫酒化下空腹夜臥服治虛勞脫營營衛耗奪陽氣乏少少氣時驚飲食不為肌膚四肢疼痛並治婦人諸病五牡丸方牡蒙二兩牡桂去粗皮二兩牡荊子二兩牡丹皮二兩牡蠣熬二兩人參天雄炮裂去皮臍大者二枚桑寄生二兩狗脊去毛二兩雷丸炮二兩石長生一兩萹蓄一兩小豆三兩貫衆二兩東門雞頭末二兩上一十五味搗羅為末煉蜜丸梧桐子大每服七丸空腹溫酒下夜食後再服漸增之以知為度治虛勞耗竭形體日減氣虛時驚病名脫營蓯蓉湯方肉蓯蓉酒洗去皴皮焙白茯苓去粗皮各二兩五味子牛膝去苗銼焙令乾五加皮銼地骨皮防風去叉黃耆細銼澤瀉桂去粗皮各一兩磁石燒通赤醋淬五遍三兩上一十一味粗搗篩每五錢匕用水一盞半入羊腎一分細切煎至一盞去滓空腹分溫二服如人行四五里再服治虛勞脫營氣血傷憊四肢痿瘁腿膝無力黃耆湯方黃耆細銼一兩山芋一兩白茯苓去黑皮一兩人參半兩厚朴去粗皮生薑汁炙三分白朮半兩五味子一分熟乾地黃焙一兩半桂去粗皮一分上九味粗搗篩每服三錢匕以水一盞入生薑半分拍碎棗三枚去核煎至七分去滓空腹溫服食後再服治虛勞脫營始富後貧痿躄為攣伏牛花丸方伏牛花五兩女葳三兩細辛去苗葉卷柏威靈仙去土各一兩附子炮裂去皮臍羖羊角鎊炒木虻炒焦去翅足硇砂醇酒研令稀各一兩上九味先搗羅八味為細末煮硇砂酒麵糊丸梧桐子大於平旦時及初更後各用溫酒下十五丸稍增至三十丸以知為度虛勞口乾燥論曰水性潤下陽與之升故津液相成神乃自生今腎居下焦膀胱為表膀胱者津液之府若其人勞傷陰陽斷隔不能升降下焦虛寒上焦生熱熱即水不勝火津液涸竭致有口舌乾燥之候治五勞七傷小腹拘急臍下膨脹兩脅脹滿腰脊引痛鼻口乾燥目視𥉂𥉂忽忽不樂胸中氣逆不下飲食莖中痛小便赤黃而有餘瀝夜夢失精驚恐虛乏建中湯方黃耆銼遠志去心芍藥龍骨各一兩甘草炙銼半兩上五味粗搗篩每用六錢匕水一盞半棗二枚劈破同煎至一盞去滓下飴糖少許分溫二服空腹日午各一治虛勞腹中痛夢寐失精四肢痠痛手足煩熱咽乾口燥並婦人小腹痛桂心湯方桂去粗皮一兩半芍藥三兩甘草炙銼半兩上三味粗搗篩每服三錢匕水一盞生薑一棗大切棗二枚劈破煎至七分去滓下飴糖一分溫服空心日午夜臥各一治虛勞骨肉痠疼吸吸少氣少腹拘急腰背強痛心中虛悸咽乾唇燥面無顏色飲食無味陰陽廢弱悲憂慘戚多臥少起枸杞湯方枸杞根銼黃耆銼各三分甘草炙銼麥門冬去心焙桂去粗皮各半兩上五味粗搗篩每服五錢匕水一盞半生薑一棗大切粳米一匙煎至一盞去滓溫服空心夜臥各一治虛勞不足少腹拘急腰脊引痛口燥咽乾目視𥉂𥉂心中憒憒小便餘瀝夜夢交通大建中黃耆湯方黃耆銼遠志去心當歸切焙澤瀉各一兩半芍藥二兩人參龍骨甘草炙銼各一兩上八味粗搗篩每服三錢匕水一盞生薑一棗大切棗二枚劈破煎至七分去滓入飴糖少許空腹食前溫服治大虛不足小腹裡急氣上衝胸