痛或時下痢兼治婦人冷病帶下艾葉煎丸方艾葉四兩炒當歸一兩切焙乾薑一兩炮上三味搗羅為末用米醋二升藥末一半熬成煎入余藥末相和丸如梧桐子大每服三十丸溫粥飲下空心食前服治冷勞氣痢等疾乾薑丸方乾薑炮二兩上一味搗羅為末熔黃蠟拌和為丸梧桐子大每服空腹粥飲下二十丸未瘥日再服虛勞裡急論曰沖之為病逆氣而裡急又衝脈者起於氣衝挾臍上行至胸中而散虛勞之人腎氣不足傷於衝脈其證腹裡拘急臍上至心下引痛不能食身寒而怢栗也治虛勞裡急少腹發痛氣引胸脅或心痛短氣芍藥湯方芍藥三兩黃耆去蘆頭乾薑炮裂各二兩甘草炙銼桂去粗皮各一兩當歸去蘆頭切焙二兩上六味粗搗篩每服三錢匕水一盞入生薑一分拍碎棗兩枚去核煎至七分去滓入飴糖一分再煎令沸空腹溫服日午夜臥再服治虛勞裡急諸不足黃耆建中湯方黃耆銼甘草炙銼各三兩桂去粗皮二兩芍藥五兩上四味粗搗篩每服五錢匕水一盞半入生薑一分拍碎棗兩枚劈破煎至八分去滓入飴糖一分再煎令沸空腹溫服日午夜臥再服若嘔者加生薑腹滿者去棗加白茯苓一兩治虛勞裡急腹中疼痛夜夢失精四肢痠疼手足煩熱咽乾口燥並婦人小腹痛小建中湯方桂去粗皮一兩半芍藥三兩甘草炙銼半兩上三味粗搗篩每服五錢匕水一盞半入生薑一分拍碎棗二枚劈煎至八分去滓下飴糖一分再煎令沸空腹溫服日午夜臥再服治虛勞腹中拘急食不生肌肉面色黑黃手足疼痛小便不利石斛散方石斛去稍黑者一兩山茱萸五味子萆薢各一兩肉蓯蓉酒洗去皴皮切炙一兩半遠志去心人參桂去粗皮各一兩菟絲子一兩半酒浸一宿別搗秦艽去苗土一兩一分赤茯苓去黑皮三分蜀椒去目並閉口炒出汗一兩上一十二味搗羅為散每服二錢匕空腹溫酒調下日午夜臥再服治虛勞五臟六腑虛損腸鳴風濕營衛不調黃耆湯方黃耆銼陳橘皮湯浸去白焙當歸切焙桂去粗皮前胡去蘆頭芍藥麥門冬去心焙甘草炙銼白茯苓去黑皮各三分人參半夏湯洗去滑切焙細辛去苗葉各一兩上一十二味粗搗篩每服三錢匕水一盞入生薑一分拍碎棗兩枚劈煎至七分去滓空腹溫服日午夜臥再服治虛勞腎氣不足腹內拘急目暗耳鳴四肢困倦行步乏力腳如石沉肌瘦羸弱面色萎黃臍下緊痛心忪盜汗小便滑數蓯蓉丸方肉蓯蓉酒浸一宿切作片子焙乾二兩磁石三兩燒醋淬七遍研鹿茸酥炙去毛桂去粗皮熟乾地黃焙巴戟天去心各一兩附子炮裂去皮臍遠志去心地骨皮各半兩黃耆銼一兩牛膝酒浸一宿切焙二兩五味子炒白茯苓去黑皮各一兩晚蠶蛾炒半兩上一十四味除磁石外搗羅為細末同研勻煉蜜和丸如梧桐子大每服二十丸溫酒下空心食前治虛勞裡急腰腳𤸷痹筋骨疼痛或攻刺脅肋久服潤肌肉填骨髓去風氣鹿角丸方鹿角一斤洗淨酥炙令香巴戟天去心二兩熟乾地黃焙四兩黃耆銼牛膝酒浸切焙各一兩半獨活去蘆頭萆薢白茯苓去黑皮桂去粗皮肉蓯蓉酒浸去皴皮切焙附子炮裂去皮臍澤瀉銼續斷芎藭檳榔銼防風去叉甘草炙銼秦艽去苗土細辛去苗葉當歸切焙芍藥白蒺藜炒去角枳殼去瓤麩炒人參鹿角膠炙令燥杏仁湯浸去皮尖雙仁炒研各半兩上二十六味除杏仁別研外搗羅為末同拌勻煉蜜為丸如梧桐子大每服空心溫酒下二十丸虛勞浮腫論曰腎氣不化則二陰不通故小便不利胃氣不足則肌肉開疏故皮膚浮腫脾者土也脾虛既不能制水腎者胃之關也關閉不利是以水氣流溢於皮膚為胕腫也治虛勞四肢發腫飲食不進百節無力多臥少起人參湯方人參赤茯苓去黑皮桑根白皮銼炒芍藥秦艽去苗土半夏湯洗去滑七遍各一兩鱉甲去裙襴醋炙三兩柴胡去苗大腹炮木香各一兩京三稜醋浸炮椎碎二兩甘草炙銼三分枳殼去瓤麩炒一分上一十三味粗搗篩每服三錢匕水一盞入生薑三片棗二枚同煎至五分去滓溫服不拘時候治虛勞四肢浮腫氣急大小便不利坐臥不安五味子湯方五味子炒黃耆銼枳殼去瓤麩炒大腹皮微煨銼桑根白皮炙銼白朮桂去粗皮檳榔煨陳橘皮湯浸去白炒各一兩厚朴去粗皮生薑汁炙熟防己各一兩半上一十一味粗搗篩每服三錢匕水一盞半煎至七分去滓空心溫服日晚再服微利即止治虛勞脾腎不足身面浮腫臥即脹滿喘急痰嗽胸膈痞悶大小便不利漸成水氣防己丸方防己二兩半杏仁去皮尖雙仁麩炒三分苦葶藶炒香三兩一分陳橘皮湯浸去白焙一兩赤茯苓去黑皮郁李仁湯浸去皮尖麩炒紫蘇葉各一兩一分上七味搗羅為末煉蜜和丸如梧桐子大空心食前溫酒下三十丸治虛勞身體浮腫上氣喘促小便不利大腹皮湯方大腹皮銼檳榔煨銼前胡去蘆頭赤茯苓去黑皮防己陳橘皮湯浸去白焙赤芍藥各一兩甘草炙銼半兩桑根白皮銼木通銼各二兩上一十味粗搗篩每服三錢匕水一盞煎至五分去滓溫服日二治虛勞遍身浮腫心腹氣脹大小便澀赤茯苓湯方赤茯苓去黑皮防己檳榔煨銼甜葶藶隔紙炒令紫色桑根白皮銼木通銼陳橘皮湯浸去白焙乾郁李仁湯浸去皮炒各一兩上八味粗搗篩每服三錢匕水一盞半煎至七分去滓食前溫服以大小便利為度治虛勞腳氣臍腹及面目浮腫人參飲方人參一兩鱉甲醋浸去裙襴炙黃二兩柴胡去苗當歸切焙枳殼去瓤麩炒甘草炙銼各一兩桃仁七十枚湯浸去皮尖別研白檳榔一枚銼上八味粗搗篩每服三錢匕童子小便一盞浸一宿平旦煎至七分去滓空心溫服若女人病加牛膝一兩治虛勞脾腎氣弱水液妄行四肢浮腫小便不利桑白皮湯方桑根白皮炙銼豬苓去黑皮滑石碎木通銼郁李仁湯浸去皮尖炒赤茯苓去黑皮各一兩半陳橘皮湯浸去白半兩檳榔微煨銼三枚澤瀉三分上九味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服
