body:
  text: 卷第一十七風頭旋論曰風頭旋者以氣體虛怯所稟不充陽氣不能上至於腦風邪易入與氣相鼓致頭暈而旋也又有胸膈之上痰水結聚復犯大寒陰氣逆上風痰相結上衝於頭亦令頭旋治風頭旋肩背拘急肢節疼痛鼻塞耳鳴面赤咽乾心忪痰逆眼見黑花當風淚出松香散方松實去殼白芷當歸切焙芎藭甘草炙各三兩甜瓜子洗一升上六味搗羅為細散每服二錢匕食後以荊芥薄荷茶清調下治風頭旋目黑肩背拘急恍惚忪悸肢節疼痛麝香天麻丸方麝香研一錢半天麻天南星炮白附子炮羌活去蘆頭赤茯苓去黑皮乾蠍去土炒丹砂研防風去叉桂去粗皮蟬蛻洗炒各半兩烏蛇酒浸去皮骨炙二兩鉛霜研一分上一十三味除研者外搗羅為末再同研勻煉蜜和丸如梧桐子大每服二十丸溫酒下荊芥湯亦得不拘時治風頭旋眩暈肩背拘急發熱惡寒肢節疼痛防風丸方防風去叉甘草炙各一兩羌活去蘆頭獨活去蘆頭桔梗去蘆頭炒各半兩芎藭白芷各三分上七味搗羅為末煉蜜丸如櫻桃大每服一丸食後荊芥湯嚼下治暗風頭旋眼黑昏眩倦怠痰涎壅盛骨節疼痛羚犀湯方羚羊角鎊石膏碎甘草炙銼旋覆花紫菀去苗各一兩前胡去蘆頭三分細辛去苗葉半兩犀角鎊一分上八味粗搗篩每服三錢匕水一盞入生薑一棗大拍碎煎至七分去滓食後溫服治風頭旋目痛眩肢體拘急手足少力荊芥丸方荊芥穗四兩細辛去苗葉芎藭白殭蠶炒各一兩天麻一兩半羌活去蘆頭防風去叉蒺藜子炒去角各二兩上八味搗羅為末煉蜜丸如雞頭大每服一丸食後細嚼荊芥茶下溫酒亦得治風頭旋眼目昏痛眩運倦怠心忪芎藭散方芎藭人參前胡去蘆頭白殭蠶炒各一兩防風去叉蔓荊實天麻酒浸一宿焙各半兩上七味搗羅為散每服二錢匕食後溫酒調下治風頭旋目暈痰逆噁心不思飲食藿香散方藿香葉零陵香莎草根炒去毛等分上三味搗羅為散每服二錢匕食後臘茶清調下日三治風邪在胃頭旋不止復加嘔逆白朮飲方白朮厚朴去粗皮生薑汁炙甘菊花各半兩人參白芷防風去叉各一兩上六味㕮咀如麻豆大每服五錢匕水一盞半入生薑五片煎至一盞去滓食前溫服治風頭旋目眩痰逆噁心胸膈痞滯咳嗽痰涎喘滿嘔逆不欲飲食人參丸方人參甘草炙銼白朮旋覆花微炒各一兩麥門冬去心焙前胡去蘆頭枳殼去瓤麩炒各二兩木香半兩上八味搗羅為細末以湯浸炊餅和丸如梧桐子大每服二十丸食後溫生薑湯下治風頭旋目暗昏眩肢節疼痛手足麻木上膈壅滯或發寒熱八風散方荊芥穗芎藭防風去叉獨活去蘆頭甘草炙銼麻黃去根節各一兩人參二兩上七味搗羅為散每服二錢匕水一盞入生薑三片薄荷三葉煎至七分去滓溫服治諸陽受風頭目旋暈目視昏暗肝氣不清芎菊散方芎藭甘菊花擇各一兩羌活去蘆頭三錢防風去叉三分細辛去苗葉白殭蠶炒各三兩草決明旋覆花擇蟬蛻洗焙各一錢密蒙花擇天麻荊芥穗甘草炙各半兩上一十三味搗羅為細散每服二錢匕水一盞煎至七分食後溫服湯點亦得治風頭旋目暈痰逆白蒺藜丸方蒺藜子炒去角旋覆花擇皂莢去皮子燒為灰惡實炒各一兩龍腦研二錢麝香研一錢菊花擇二兩上七味為細末煉蜜和搗三百杵丸如雞頭大每服一丸嚼細溫酒下食後服治風頭旋痰逆噁心咽膈不利祛痰丸方天南星生半夏生赤茯苓去黑皮乾薑炮陳橘皮湯浸去白焙各等分上五味為細末稀麵糊丸如梧桐子大每服三十丸加至四十丸溫米飲下不拘時治風頭旋目運欲倒胸中痰逆兼治筋骨疼痛菊花丸方甘菊花擇枸杞子擇天麻酒浸切焙獨活去蘆頭蔓荊實去皮木香芎藭防風去叉羌活去蘆頭天竺黃研赤茯苓去黑皮藁本去土各等分上一十二味為細末煉蜜和搗三百杵丸如梧桐子大每服十丸荊芥湯下不拘時治熱毒風上攻頭旋欲倒或嘔吐不止惡見日光不思飲食旋覆花湯方旋覆花前胡去蘆頭菊花防風去叉熟乾地黃焙羌活去蘆頭杏仁去皮尖雙仁炒令黃各二兩玄參白殭蠶炒黃芩去黑心半夏為末薑汁製作餅曝乾白朮藁本去苗土甘草炙銼當歸切焙人參赤茯苓去黑皮各一兩上一十七味粗搗篩每服五錢匕水一盞半生薑五片煎至八分去滓食後溫服治熱毒風上攻頭旋目暈耳內虛鳴或身體癮疹麻痹羚羊角湯方羚羊角鎊二兩菊花三兩防風去叉羌活去蘆頭前胡去蘆頭藁本去苗土玄參黃芩去黑心杏仁去皮尖雙仁炒令黃菖蒲甘草炙銼各一兩上一十一味粗搗篩每服五錢匕水一盞半煎至八分去滓食後溫服治頭旋心悶發即欲倒蛇蛻飲方蛇蛻去土炙皮二兩蚱蟬去頭翅足炙四十枚柴胡去苗赤芍藥沙參葛根各二兩杏仁去皮尖雙仁炒黃石膏碎各三兩牛黃如大豆粒十枚研湯成下麻黃去根節三分上一十味除牛黃外粗搗篩每服五錢匕水一盞半煎至八分入蜜竹瀝牛黃各少許更煎三兩沸去滓溫服治頭旋腦悶鼻塞眼運貼頂膏方萆麻子去殼研杏仁去皮研食鹽芎藭搗末松脂研等分上五味先搗食鹽次下四味杵勻即塗於蠟紙上有病者先灸百會三壯訖將蠟紙藥於灸處貼之日一易得膿血出效頭面風論曰頭面風之狀頭面多汗惡風頭痛是也蓋諸陽之脈皆上至頭面若運動勞役陽氣發泄腠理開疏汗多不止陽氣虛弱風邪乘之上攻於頭面故惡風而痛也治頭面風狀如蟲行或頭目風眩目中淚出防風散方防風去叉二兩半桂去粗皮天雄炮裂去臍皮細辛去苗葉丹砂別研乾薑炮烏頭炮裂去臍皮各一兩半莽草用葉白茯苓去黑皮人參去蘆頭各半兩附子炮裂去皮臍當歸切焙各一兩上一十二味搗羅為散每服一錢匕食前溫酒調下日三治頭面遊風如細針所刺忽忽煩悶菊花散方菊花擇半兩細辛去苗葉附子炮裂去皮臍白朮桂去粗皮乾薑炮巴戟天去心人參去蘆頭防風去叉石南葉天雄炮裂去皮臍白茯苓去黑皮蜀椒去目並閉口炒出汗秦艽去苗土防己各一兩山茱萸山芋各一兩半上一十七味搗羅為散每服二錢匕食前溫酒調下日再治頭面遊風巴戟天散方巴戟天去心二兩菊花擇芎藭乾薑炮防風去叉石南葉白朮烏頭炮裂去皮臍附子炮裂去皮臍細辛去苗葉蜀椒去目並閉口者炒出汗山芋人參去蘆頭桔梗去蘆頭炒秦艽去土栝蔞實切焙乾澤瀉甘草炙銼天雄炮裂去皮臍羌活去蘆頭山茱萸熟乾地黃焙各一兩上二十二味搗羅為散每服一錢半加至二錢匕食前溫酒調下日再治頭面風皮膚瘙癢或生瘡不已防風散方防風去叉芎藭荊芥穗黃耆銼蒺藜子炒各一兩人參去蘆頭惡實炒甘草炙銼各半兩上八味搗羅為散每服一錢匕食後沸湯調下治頭面風生瘡久不已芎藭丸方芎藭黃耆銼防風去叉山梔子去皮枳殼麩炒去瓤各一兩生乾地黃焙羌活去蘆頭白芷苦參各三分白附子炮半兩上一十味搗羅為末煉蜜和丸如梧桐子大每服二十丸食後溫水下治頭面風目眩頭痛痰涎壅滯心膈煩滿旋覆花湯方旋覆花菊花擇桑根白皮各三分石膏碎研一兩一分甘草炙銼半兩蒺藜子炒去角地骨皮各一兩上七味粗搗篩每服二錢匕水一盞煎至七分食後溫服治頭面風頭目昏痛羌活丸方羌活去蘆頭蒺藜子炒去角芎藭薄荷葉乾者各二兩白殭蠶炒一兩上五味搗羅為末入龍腦麝香各少許煉蜜和丸彈子大每服一丸細嚼臘茶或溫酒下治頭面風頭目昏眩甘菊散方甘菊花擇旋覆花防風去叉石膏碎研等分上四味搗羅為散每服二錢匕臘茶調服如煎此藥沐發大去白屑治頭面風頭目昏眩筋脈拘急痰涎壅滯肢節煩痛羌活湯方羌活去蘆頭菊花擇麻黃去根節煎掠去沫焙芎藭細辛去苗葉防風去叉石膏碎研生用前胡去蘆頭黃芩去黑心甘草炙銼枳殼麩炒去瓤白茯苓去黑皮蔓荊實各一兩上一十三味粗搗篩每服二錢匕水一盞入生薑三片薄荷三葉煎至六分去滓溫服不拘時治頭面風頭目疼痛昏眩不止利膈化痰獨活丸方獨活去蘆頭芎藭甘草炙銼各一兩乾蠍去土炒一分半夏湯洗七遍去滑防風去叉各一兩上六味搗羅為末用生薑汁和丸如梧桐子大每服七丸加至十丸荊芥薄荷湯下治頭面風頭目昏眩肩背疼痛頭皮腫癢頸項拘急檀香散方白檀香銼半兩甘菊花擇三兩芎藭二兩甘草生用一兩上四味搗羅為散每服一錢匕溫薄荷湯調下茶清或沸湯調亦得治頭面風面熱煩躁皮肉如亂針刺痛麻黃湯方麻黃去根節杏仁去皮尖雙仁炒研桔梗去蘆頭炒秦艽去苗土薄荷葉牡丹去心防風去叉芍藥升麻黃芩去黑心紫菀去苗土各一分半夏湯洗去滑半分羌活去蘆頭半兩上一十三味粗搗篩每服二錢匕水一盞入生薑三片煎至七分去滓食後臨臥熱服治頭面風惡風多汗頭痛身熱羌活散方羌活去蘆頭人參蔓荊實去皮菊花石膏白朮前胡去蘆頭防風去叉地骨皮芎藭枳殼去瓤麩炒荊芥穗桔梗炒白茯苓去黑皮麻黃去根節各一兩上一十五味粗搗篩每服三錢匕水一盞入生薑二片薄荷五葉同煎至七分去滓溫服一方更入甘草三分治頭面諸風羌活湯方羌活去蘆頭黃連去須桂去粗皮羚羊角鎊枳殼去瓤麩炒萆薢白朮各一兩芎藭當歸切焙天雄炮裂去皮臍麻黃去根節煎掠去沫焙石膏各一兩半黃芩去黑心旋覆花各半兩杏仁十枚去皮尖雙仁研上一十五味粗搗篩每服五錢匕水一盞半入生薑半分切煎至八分去滓溫服治頭面風及暗風倒僕天麻丸方天麻酒浸一宿切焙附子炮裂去皮臍白附子新羅者炮芎藭當歸切焙烏藥天台者各一兩荊芥穗六兩上七味搗羅為末煉蜜和搗三千杵丸如彈子大每服一丸薄荷酒嚼下日三如不喜酒薄荷茶嚼下亦得治頭面多汗惡風頭痛身熱煩悶芎術散方芎藭白朮天麻各一兩防風去叉荊芥穗各半兩細辛去苗葉一錢甘草炙銼一分上七味搗羅為散每服二錢匕沸湯點服或煉蜜和丸如櫻桃大每服一丸茶清嚼下亦得不拘時候治頭面風眼黑及面腫羌活散方羌活去蘆頭獨活去蘆頭芎藭桂去粗皮乾薑炮附子炮裂去皮臍等分上六味搗羅為散每服夜臥煎豉汁調下二錢匕立瘥風痰論曰風痰之病得於氣脈閉塞水飲積聚其狀雖有冷熱之異至於心胸痞隔飲食不化則一也蓋風壅氣滯三焦不和則水飲易為停積風能生熱壅亦成痰是故有頭目不利神思昏濁之候其或嘔逆不納飲食者則因於胃冷而得之其治固不可一概也治風痰心腹煩滿嘔吐不欲飲食半夏飲方半夏湯洗去滑大腹皮銼麥門冬去心焙赤茯苓去黑皮白朮桔梗青橘皮湯浸去白焙前胡去蘆頭各三分厚朴去粗皮塗薑汁炙令香一兩防風去叉枇杷葉拭去毛炙各半兩上一十一味粗搗篩每服三錢匕水一盞入生薑一棗大拍碎煎至六分去滓不拘時候稍熱服治風痰心胸不利頭目昏疼嘔吐痰涎木香湯方木香枳殼去瓤麩炒旋覆花白朮桑根白皮銼半夏曲各半兩人參一兩赤茯苓去黑皮檳榔銼前胡去蘆頭甘草炙各三分細辛去苗葉一分上一十二味粗搗篩每服三錢匕水一盞入生薑一棗大拍碎同煎至六分去滓不拘時候稍熱服治風痰氣逆嘔吐不止心腹刺痛不思飲食枇杷葉湯方枇杷葉拭去毛炙二兩半夏湯洗七度杵為末用生薑汁和作餅子焙乾人參訶黎勒去核甘草炙桂去粗皮各一兩赤茯苓去黑皮枳殼去瓤麩炒各一兩半上八味粗搗篩每服二錢匕入生薑三片水一盞煎至七分去滓溫服不拘時候治風痰頭目昏痛心胸煩滿香芎湯方芎藭二兩細辛去苗葉旋覆花各一兩甘草炙獨活去蘆頭羌活去蘆頭各半兩皂莢三挺燒存性上七