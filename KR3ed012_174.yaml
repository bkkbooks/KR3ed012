上五味粗搗篩一二歲兒每服一錢匕水一盞煎至五分去滓分溫二服發時並吃更量兒大小加減治小兒心痛紫沉消積丸方沉香銼硇砂各四兩阿魏巴豆霜各一兩以上各研別為末用蜜一斤酒化熬成膏丹砂研丁香乾薑炮各二兩硫黃研青橘皮湯浸去白焙高良薑檳榔銼木香人參胡椒桂去粗皮各四兩上一十五味除前膏外一十一味搗研為細末入前膏和搗丸如綠豆大以瓷合收密封每服二丸食前橘皮湯下更量度加減治小兒積氣冷氣心痛硇砂丸方硇砂二錢乾漆微炒五靈脂胡椒桂去粗皮京三稜炮銼莪朮炮各一分巴豆二十一枚去皮心膜醋煮令出油研斑蝥二十一枚去翅足炒上九味搗羅為末研令勻醋煮麵糊和丸如黃米大一二歲兒每服五丸三四歲兒每服七丸橘皮湯下余以意加減治小兒嘔逆心腹疼痛化水穀消積聚沉香煎丸方沉香銼丁香木香胡椒沒藥研丹砂研水飛高良薑檳榔麵裹煨熟去面銼硇砂揀淨水飛慢火熬干青橘皮湯浸去白焙硫黃研水飛各一兩縮砂去皮吳茱萸湯浸焙乾阿魏醋浸研澄去沙和麵作餅子炙焦各半兩巴豆去皮心膜研出油盡一分上一十五味各搗研為末和勻煉蜜丸如綠豆大以瓷合收密封每服二丸食前臨臥生薑橘皮湯下量虛實大小加減治小兒心痛胡椒丸方胡椒四十九粒檳榔一枚銼斑蝥七枚去翅足上三味搗羅為細末燒粟米飯為丸黃米大一二歲兒每服三丸三歲以上五丸煎菖蒲湯下治小兒心痛薑黃散方薑黃檳榔銼上二味等分搗羅為散溫酒調下一二歲兒每服半錢匕以下余以意加減治小兒蛔蟲攻心腹痛楝根湯方楝根皮有子者酸石榴根槐根各一握切碎用東引者上三味以水三盞煎取一盞去滓空心頓服以藥盞合之即瀉蟲出仰之即吐蟲出神驗兒小分減服治小兒疳蟲不時咬心痛日夜不睡人參湯方人參桂去粗皮桃柳枝銼焙狼牙乳香研青橘皮去白焙炒吳茱萸湯浸焙炒各一分古老錢四文火燒醋淬上八味粗搗篩每服一錢匕水六分煎至四分去滓溫服量兒大小加減
