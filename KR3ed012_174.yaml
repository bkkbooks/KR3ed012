body:
  text: 卷第一百七十四小兒傷寒論曰小兒傷寒之病有冬時冒犯嚴寒而得之者有傷四時非節之氣而得之者所感雖不同然皆名傷寒大率與大人傷寒症狀無異惟用藥分劑瘥少爾治法兼見傷寒門中治小兒傷寒身熱頭痛咳嗽喘鳴鼻乾不得臥十味湯方前胡去蘆頭柴胡去苗人參甘草炙銼獨活去蘆頭桔梗炒赤茯苓去黑皮枳殼去瓤麩炒芎藭羌活去蘆頭各半兩上一十味粗搗篩每服二錢匕水一盞入生薑三片大棗二枚擘破同煎至七分去滓分溫三服治小兒傷寒頭痛肌熱喘粗白朮湯方白朮人參麻黃去根節甘草炙銼葛根銼藿香去梗桔梗炒各半兩上七味粗搗篩每服一錢匕水半盞煎至三分去滓不計時候溫服治小兒傷寒外證身熱脈浮人參湯方人參麻黃去根節赤茯苓去黑皮白朮乾葛銼甘草炙各半兩上六味粗搗篩每服二錢匕水一小盞入蔥白少許同煎至六分去滓分溫二服治小兒傷寒口孜啀喘粗肌熱煩躁作渴茯苓湯方白茯苓一兩烏梅肉半兩微炒乾木瓜一兩上三味搗篩為粗末每服一錢匕以水一小盞入生薑錢子一片煎至五分去滓溫服不計時候量兒大小加減治小兒傷寒壯熱頭痛煩渴栝蔞根散方栝蔞根半兩苦參一分銼人參一分去蘆頭寒水石半兩甘草一分炙微赤銼石膏半兩上六味搗篩為粗散每服一錢匕以水一小盞煎至五分去滓不計時候溫服量兒大小以葛根散治小兒傷寒四肢煩熱心躁口乾多渴葛根散方葛根半兩銼麻黃半兩去根節人參半兩去蘆頭甘草一分炙微赤銼桂心一分上五味搗羅為粗散每服一大錢匕以水一小盞入生薑錢子一片棗一枚擘去核煎至三分去滓溫服不拘時治小兒傷寒頭痛肌熱喘粗口孜啀石膏湯方石膏碎一錢白朮半兩麻黃去根節桔梗炒甘草炙水萍曝乾杏仁湯浸去皮尖雙仁炒各一分上七味粗搗篩每服一錢匕水半盞蔥白少許煎至三分去滓溫服不拘時候治小兒傷寒體熱面赤口乾或咳嗽黃芩湯方黃芩去黑心二兩麻黃去根節一兩桂去粗皮甘草炙石膏碎芍藥各半兩杏仁十枚湯去皮尖雙仁炒上七味粗搗篩每服一錢匕水半盞生薑三片煎至三分去滓量兒大小加減治小兒傷寒四物湯方芍藥黃芩去黑心升麻葛根各半兩上四味粗搗篩每服一錢匕水半盞煎取三分去滓溫服量兒大小以意加減治小兒四五歲傷寒取汗射干湯方射干甘草炙銼升麻芍藥石膏搗研各半兩杏仁二十枚湯退去皮尖雙仁麩炒麻黃去根節三分桂去粗皮一分上八味粗搗篩每服一錢匕水一小盞煎至五分去滓溫服後以衣蓋復出汗更量兒大小加減治小兒傷寒葛根飲方葛根淡竹瀝各三合上二味相和煎三五沸二三歲兒分三服百日兒斟酌服之治小兒傷寒胃氣不和解肌蒼朮散方蒼朮厚朴去粗皮生薑汁炙銼陳橘皮湯浸去白焙各一兩乾薑炮三分甘草炙半兩上五味搗羅為散每服一錢匕水一小盞入生薑大棗各少許同煎至六分熱服小兒中風論曰風者百病之長善行而數變小兒氣血未定肌肉脆弱腠理虛疏為邪風所中以春甲乙得之則中於肝以夏丙丁得之則中於心以季夏戊己得之則中於脾以秋庚辛得之則中於肺以冬壬癸得之則中於腎各隨其腑臟之俞所中則為腑臟之風或客於皮膚肌肉營衛或留於筋膜骨髓隨其變化為病不一各有間甚之狀大率與大人所得證候皆同特小兒之治分劑多寡瘥殊宜消息以調之治小兒猝中風狀如欲絕增損續命長理石湯方長理石碎石膏碎赤石脂碎白脂石碎滑石碎桂去粗皮大黃銼炒令香麻黃去根節先煎掠去沫焙防風去叉牡蠣燒碎龍骨碎栝蔞根銼各半兩甘草炙一兩寒水石一分上一十四味粗搗篩一二歲兒每服一錢匕水半盞煎至三分去滓溫服服後汗出以粉敷之若有熱者增大黃不汗者加麻黃無寒水石以朴硝代之日三服量兒大小加減服之治小兒猝中風惡毒及久風四肢不隨並嚲躄不能行步續命湯方麻黃去根節先煎掠去沫焙二兩甘草炙半兩黃芩去黑心一兩石膏一分芎藭半兩桂去粗皮半兩杏仁十枚湯退去皮尖雙仁麩炒令熟葛根銼半兩升麻半兩當歸切焙半兩獨活去蘆頭半兩人參一分上一十二味粗搗篩三四歲兒每服一錢匕水七分煎至四分去滓連夜三四服量兒大小加減服之汗出以粉敷之避風治小兒風痱不能語口眼喎斜四肢不隨石膏湯方石膏碎一兩麻黃去根節先煎掠去沫焙一兩甘草炙半兩射干半兩桂去粗皮半兩芍藥半兩細辛去苗葉一分當歸切焙半兩上八味粗搗篩一二歲兒每服一錢匕水半盞煎至三分去滓溫服日三量兒大小加減服治小兒中風手足拘急石膏湯方石膏研三分真珠末水飛過一兩上二味同研勻細為末三四歲兒每服一錢匕水七分煎至四分去滓溫服日三量兒大小以意加減治小兒中風筋脈拘急或手足瘛瘲等羌活散方羌活去蘆頭三分芎藭三分防風去叉三分天麻半兩白附子一分麻黃去根節先煎掠去沫焙半兩當歸炙乾切焙三分甘草炙一兩上八味搗羅為散一二歲兒每服半錢匕乳汁調服三四歲兒服一錢匕日三服如無乳熟水調服亦得量兒大小加減服之乳母亦用暖酒調下一錢匕治小兒新生肌膚嫩弱喜為風邪所中身體熱或中大風手足驚掣甘草摩膏方甘草炙防風去叉各一兩白朮桔梗各三分雷丸二兩半上五味搗羅為粗末用不入水豬脂一斤鍋內火上先煉過去滓入諸藥末更煎令成膏新綿濾去滓入瓷合內貯之每用特取少許炙手以膏摩之百度效小兒無病每日以膏摩囟上及手足心良闢風寒也治小兒中風蓖麻散方蓖麻子二十枚去皮別研天漿子去殼一十枚生蠍三十枚石榴一枚取卻石榴子及七分盛三味藥在內作泥裘固濟燒令通赤候藥香氣出即熟取出打破裘便搗羅為末入後藥三味天南星半夏白附子各一分半上七味將後藥三味並生用搗羅為散與前藥相和研令勻酒調下一字重者不過兩服治小兒汗出中風一日兒頭頸腰背熱二日即腹熱手足不屈宜服慎火草散方慎火草乾者半兩景天草是也丹參麻黃去根節先煎掠去沫焙白朮各一分上四味搗羅為散一二歲兒每服半錢匕漿水調服三四歲兒服一錢匕日三服量兒大小加減治新生小兒中風麝香散方麝香細研一分驢鬐頭毛手大指大一把上二味以乳汁和驢毛令得所於銅器中微火炒令焦取出與麝香同研令如粉每服一字乳汁調下連夜三服治小兒中風口眼牽急丹砂丸方丹砂研乾蠍去足微炒白殭蠶微炒天南星炮裂各半兩白附子一分上五味搗羅四味為末入丹砂研令勻麵糊和丸如綠豆大一歲兒服一丸薄荷湯下治小兒中風四肢拘攣心神煩亂不得睡臥獨活湯方獨活去蘆頭一分黃耆銼一兩防風去叉三分白蘚皮三分茯神去木一兩羚羊角屑三分桂去粗皮半兩酸棗仁一兩甘草炙半兩上九味粗搗篩每服一錢匕水七分煎至四分去滓量兒大小以意加減服之治小兒中風口眼喎斜發歇不定神識昏昧紫金丹方草烏頭一分炭火內燒存性天南星一分炭火內燒存一半性丹砂研三錢蜈蚣一條赤足全者炙白花蛇生取肉焙乾蠍梢炒牛黃研麝香研乳香盞子內熔過研各一錢上九味先將五味搗羅為細末入研者藥合研勻用酒煮麵糊和丸如麻子黍米大量兒大小每服三丸至五丸煎桃符湯下急驚風研服治小兒中風痙身背強直牙關緊急螳螂丸方螳螂一枚大者去翅足炒乾棘剛子去皮三十枚烏頭炮裂去皮臍二枚天南星中者炮一枚防風去叉一分細辛去苗葉一錢乾蠍炒一錢白附子大者一枚丹砂研一分麝香研半錢上一十味搗研為細末用石腦油為丸如綠豆大每服一丸至二丸薄荷水化下不計時候如小兒目睛上視口噤不開用醋化一丸灌入鼻中男左女右灌之治小兒中風痙頸項強直及風癇潮發牛黃丸方牛黃研丹砂研天竺黃研蠍梢白殭蠶天南星白附子各一分上七味並生用搗研令細煉蜜丸如梧桐子大每服金銀薄荷湯化下一丸至二丸服之治小兒中風天瘹驚邪風癇白殭蠶丸方白殭蠶炒一兩乾蠍炒一分白附子炮一兩天南星炮裂半兩烏蛇酒炙令香熟去骨半兩上五味搗羅為末粳米飯為丸如麻子大一二歲兒每服三丸以溫酒下連夜三服隨兒歲數以意加減服之小兒發黃論曰小兒瘀熱在胃或濕熱相搏熏散肌肉其證目黃身或疼痛肌肉如橘色或得之傷寒或得之時氣或得之風溫皆脾胃氣虛邪熱與穀氣相搏所為也利其小便則愈又小兒百日以上非因傷寒溫病身體微黃者此由將息過度胃熱所致慎不可灸唯宜薄衣裳兼粉之自愈其證不可不辨治小兒發黃升麻湯方升麻黃芩去黑心山茵陳柴胡去苗瓜蒂知母焙藍葉各一兩山梔子仁一兩一分大黃銼炒石膏搗碎各一兩半甘草炙芍藥各半兩羚羊角鎊三分上一十三味粗搗篩三四歲兒每服一錢匕水七分煎至四分去滓溫服早晨午後近夜各一服量大小加減治小兒黃病山茵陳丸方山茵陳半兩山梔子仁秦艽去苗土大黃銼炒各三分朴硝研郁李仁湯去皮別研各一兩上六味除郁李仁外搗羅為末與郁李仁和勻煉蜜和丸如綠豆大每服溫水下三丸至五丸日再服量兒大小以意加減治小兒發黃桑白皮湯方桑根白皮銼麻黃去根節湯煮掠去沫秦艽去苗土各一分大黃銼炒半兩上四味粗搗篩每服一錢匕水七分牛乳一合同煎至五分去滓分溫食前日三服量兒大小加減治小兒黃疸身體目睛小便並黃茵陳湯方山茵陳一分大黃銼炒半兩山梔子仁五枚上三味粗搗篩五六歲兒每服一錢匕水七分煎至四分入朴硝半錢更煎一兩沸去滓分溫日三服量大小加減治小兒天行發黃心腹脹急三黃湯方大黃銼炒黃芩去黑心各一兩半山梔子仁三分上三味粗搗篩三四歲兒每服一錢匕水七分煎至四分去滓溫服取利為度治小兒黃病青麥汁方青麥自然汁上一味一二歲兒取半雞子殼分二服三四歲兒取一雞子殼分二服早晨午後各一服治小兒忽發黃面目皮肉並黃栝蔞根飲方生栝蔞根上一味搗取汁二大合蜜一大匙和勻火暖分三服治小兒黃病土瓜根汁方土瓜根汁上一味一二歲兒取半雞子殼分二服三四歲兒取一雞子殼分二服早晨晚後各一治小兒身目俱黃秦艽湯方秦艽三分上一味粗搗篩每一錢匕入牛乳一合同煎至五分去滓分溫日三服量兒大小加減治小兒諸黃瓜蒂散方瓜蒂一十四枚小豆二十粒糯米四十粒上三味搗羅為散吹少許入鼻中即瘥治小兒黃病韭根汁方韭根汁上一味滴少許入鼻中出黃水即瘥治小兒胃熱身體微黃除熱粉方寒水石碎芒硝滑石碎石膏碎赤石脂碎木香大黃銼甘草銼黃芩去黑心防風去叉芎藭麻黃根等分上一十二味搗羅為末以蛤粉一升藥末三合相和再篩粉兒日三小兒瘧論曰夏傷於暑秋成痎瘧小兒血氣壅盛內挾實熱因犯暑邪客於皮膚分肉之間至秋為風冷所折陽盛於外陰長於內陰陽相搏發而成瘧先寒後熱者寒瘧也先熱後寒者溫瘧也熱而不寒者癉瘧也若汗出過多亡陽而渴當節其飲多飲而小便澀則變為飲澼矣治小兒瘧發作不定多渴心煩烏梅湯方烏梅肉炒常山各半兩甘草炙三分上三味粗搗篩每服一錢匕水一盞入竹葉五片小麥三十粒同煎至四分去滓溫服量兒大小加減不拘時候治小兒溫瘧常山湯方常山淡竹葉各一兩小麥一合上三味粗搗篩分為四劑每劑以水二盞煎至一盞去滓分溫三服一日令盡以瘥為度更量兒大小加減治小兒諸瘧大青湯方大青鱉甲醋炙去裙襴赤芍藥各半兩當歸切焙茵陳蒿