body:
  text: 卷第一十六風頭眩論曰風頭眩之狀頭與目俱運是也五臟六腑之精華皆見於目上注於頭風邪鼓於上腦轉而目系急使真氣不能上達故虛則眩而心悶甚則眩而倒僕也治風頭暈倒眼旋腦項急痛枳實湯方枳實去瓤麩炒防風去叉麻黃去根節先煎掠去沫焙乾芎藭各一兩半杏仁去皮尖雙仁炒一兩半夏為末生薑汁和作餅曝乾細辛去苗葉各二兩上七味粗搗篩每服五錢匕以水一盞半煎至一盞去滓入竹瀝半合更煎沸早晚食前溫服治風頭眩旋暈欲倒防風散方防風去叉芎藭山芋人參白朮遠志去心獨活去蘆頭桂去粗皮茯神去木各三分莽草去根酒灑焙天雄炮裂去皮臍各半兩上一十一味為細散每服一錢半匕至二錢匕食前浸菊花酒調下日再夜一治風頭眩但覺地屋俱轉目閉不開人參湯方人參防風去叉白朮當歸酒灑切焙麥門冬去心焙各一兩獨活去蘆頭桂去粗皮黃耆薄切芍藥各一兩半上九味粗搗篩每服五錢匕水一盞半煎至一盞去滓食前溫服日再夜一治風頭眩目痛犀角湯方犀角鎊甘菊花擇玄參各三分茯神去木石膏研各一兩半防風去叉升麻葛根各一兩上八味粗搗篩每服三錢匕水一盞入芒硝末半錢匕竹葉十片煎至七分去滓溫服不拘時治風頭眩仆倒屋轉嘔吐痰涎惡聞人聲獨活湯方獨活去蘆頭茯神去木各半兩甘草炙當歸酒灑切焙牡蠣煅白朮附子炮裂去皮臍肉蓯蓉酒浸切焙各一兩黃耆薄切一兩半防風去叉遠志去心三分人參二兩半上一十二味銼如麻豆每服五錢匕水一盞半生薑三片棗一枚去核煎至一盞去滓溫服不拘時治風眩厥逆身體疼痛骨節沉重目痛心亂獨活白朮散方獨活去蘆頭二兩白朮一兩半防風去叉細辛去苗葉人參各一兩乾薑炮半兩天雄炮裂去皮臍一分栝蔞三分上八味為細散每服二錢匕食前溫酒調下日三不拘時治風頭眩悶起即欲倒頭痛眼疼視屋轉動菊花湯方甘菊花去梗細辛去苗葉各半兩防風去叉前胡去蘆頭茯神去木白朮麻黃去根節各一兩芎藭杏仁湯浸去皮尖雙仁各三分上九味粗搗篩每服五錢匕水一盞半煎至一盞去滓入竹瀝半合更煎沸食前溫服日再夜一治風頭眩飲食不下前胡湯方前胡去蘆頭旋覆花黃耆薄切防己桂去粗皮竹茹防風去叉各三分甘草炙銼半兩赤茯苓去黑皮石膏研碎一兩上一十味粗搗篩每服五錢匕水一盞半煎至一盞去滓早晚食後臨臥溫服治風眩暗倒眼旋屋轉腦痛芍藥湯方芍藥防風去叉石膏研碎木通麻黃去根節各一兩甘菊花擇葛根各半兩甘草炙銼前胡去蘆頭各三分上九味粗搗篩每服五錢匕水一盞半生薑三片棗一枚去核煎至一盞去滓入荊瀝半合重煎令沸早晚食後臨臥溫服治風眩目疼耳聾附子散方附子炮裂去皮臍乾薑炮細辛去苗葉防風去叉各一兩山茱萸一兩山芋一兩半上六味為細散每服一錢匕空心溫酒調下治頭風目眩眼痛耳聾山芋散方山芋甘草炙銼五味子甘菊花擇各半兩細辛去苗葉山茱萸升麻蔓荊實各三分防風去叉一兩上九味為細散每服三錢匕空心溫酒調下治風頭眩欲倒眼旋腦痛防風湯方防風去叉赤茯苓去黑皮芎藭各二兩枳殼去瓤麩炒麻黃去根節先煎掠去沫焙各一兩半前胡去蘆頭一兩半細辛去苗葉一兩石膏研碎二兩半上八味粗搗篩每服五錢匕水一盞半煎至一盞入竹瀝半合再煎令沸去滓溫服日三不拘時治風頭眩轉耳聾山芋散方山芋二兩防風去叉二兩半升麻山茱萸各一兩半細辛去苗葉甘菊花擇各一兩蔓荊實一兩一分上七味為細散每服三錢匕食前溫酒調下日再治風頭眩摩頭附子膏方附子炮裂去皮臍鹽花各半兩上二味為細末以麻油和如稀餳洗頭摩之日三治風頭眩欲倒眼旋屋轉腦痛葛根湯方葛根木通銼芍藥防風去叉各二兩甘菊花擇去梗一兩麻黃去根節先煮掠去沫焙一兩一分石膏研碎五兩前胡一兩半上八味粗搗篩每服五錢匕水一盞半生薑二片棗一枚去核煎至一盞去滓溫服不拘時治風頭眩目昏痛防風散方防風去叉羌活去蘆頭甘菊花擇去梗白附子炮山芋藁本洗切焙附子炮裂去皮臍蒺藜子炒去角各半兩麝香研一分上九味為細散每服一錢匕食後茶清調下或煉蜜丸如梧桐子大每服二十丸茶酒任下亦得治風頭眩筋脈拘急痰涎壅滯肢節煩疼羌活湯方羌活去蘆頭甘菊花擇去梗麻黃去根節煮掠去沫焙芎藭防風去叉石膏碎研前胡去蘆頭黃芩去黑心細辛去苗葉甘草炙銼枳殼去瓤麩炒白茯苓去黑皮蔓荊實各一兩上一十三味粗搗篩每服三錢匕水一盞入生薑三片雞蘇三葉煎至七分去滓溫服不拘時治風頭眩涕唾稠黏心胸煩悶人參湯方人參柴胡去苗羌活去蘆頭荊芥穗旋覆花甘菊花擇去梗桑根白皮銼各等分上七味粗搗篩每服三錢匕水一盞煎至七分去滓早晚食後臨臥溫服治風頭眩暈倒僕不定四神湯方獨活去蘆頭六兩石膏四兩碎枳實去瓤麩炒麻黃去根節先煮掠去沫焙各三兩上四味粗搗篩每服五錢匕水一盞酒半盞同煎至一盞去滓溫服日三治風邪鼓作頭目眩暈目系急痛甚則倒雞蘇羌活丸方雞蘇葉二兩羌活去蘆頭芎藭各一兩半羚羊角鎊防風去叉天麻人參丹砂研各一兩白殭蠶微炒天南星炮乾蠍去土微炒牛黃研麝香研龍腦研各半兩犀角鎊一兩上一十五味搗研為末再同研勻煉蜜和丸梧桐子大每服二十丸臘茶清下食後臨臥服治頭目風眩邪氣鼓作時或旋暈天麻羌活丸方天麻羌活去蘆頭白芷芎藭藁本去苗土芍藥細辛去苗葉麻黃去根節各二兩麝香研牛黃研各一分上一十味搗羅為末煉蜜和丸如皂子大每服一丸研薄荷酒下治風頭眩腦轉目系急忽然倒僕守中丸方白茯苓去黑皮十兩麥門冬去心焙三兩白朮人參甘菊花擇去梗山芋枸杞子各二兩生地黃二十斤絞取汁上八味將七味搗羅為末先用生地黃汁於銀器內入酥三兩白蜜三兩同煎逐旋掠取汁上金花令盡得五升許於銀器內拌炒前七味藥漸漸令盡候乾入白蜜同搗數千杵丸如梧桐子大每日空心或食後清酒下五十丸服百日後五臟充滿肌膚潤滑修合須擇四季王相日或甲子日此藥亦名五芝地仙金髓丸治風邪注頭頭目俱暈輕則心悶重則倒僕菊花丸方甘菊花擇去梗羌活去蘆頭枳殼去瓤麩炒芎藭防風去叉桂去粗皮各半兩細辛去苗葉一兩檳榔銼一枚上八味搗羅為末以生薑汁煮薄麵糊丸如梧桐子大每服二十丸空心酒下日再服治風邪上攻頭目眩暈心隔煩悶薄荷散方薄荷葉甘菊花擇去梗甘草炙銼白芷石膏碎芎藭上六味等分搗羅為散每服一錢匕荊芥茶調下治風眩煩悶頭暈轉不止六神散方芎藭羌活去蘆頭防風去叉甘草炙銼各一兩荊芥穗雞蘇乾者各一兩半上六味搗羅為細散米飲溫水調下一錢匕不計時候風頭痛論曰風頭痛之病由風邪客於陽經循風府而上至於頭腦令人頭重疼痛心隔煩熱上焦壅滯頭面虛汗診其脈左手寸口浮緊者是也治頭風頭旋四肢拘急偏正頭痛羌活湯方羌活去蘆頭菊花擇麻黃去根節先煎掠去沫焙防風去叉石膏碎前胡去蘆頭細辛去苗葉甘草炙枳殼去瓤麩炒白茯苓去黑皮蔓荊實芎藭各半兩黃芩去黑心一分上一十三味粗搗篩每服三錢匕水一盞半入生薑二片薄荷三葉同煎至一盞去滓熱服不拘時治風壅頭痛眉骨疼石膏散方石膏研芎藭旋覆花各一兩白附子炮細辛去苗葉甘草炙各一分上六味搗羅為散每服半錢匕臘茶調下不拘時候治風頭痛石膏湯方石膏碎枳殼去瓤麩炒薺苨防風去叉菊花旋覆花芎藭各半兩上七味粗搗篩每服四錢匕水一盞入生薑三片薄荷五葉同煎取七分去滓食後溫服治風頭痛旋覆花湯方旋覆花菊花芎藭甘草炙各半兩皂莢酥炙去皮子一兩上五味粗搗篩每服三錢匕水一盞荊芥穗三莖茶末一錢同煎至七分去滓溫服治頭目昏眩肢體煩倦芎藭散方芎藭菊花荊芥穗石膏研細甘草等分上五味各生用搗研為細散每服一錢匕熱湯調下治頭痛石膏湯方石膏碎莎草根炒去毛天麻藿香葉各一兩上四味粗搗篩每服三錢匕水一盞入臘茶半錢匕煎至七分去滓溫服不拘時治頭痛神朱石膏丸方石膏燒二兩芎藭一兩龍腦少許研上三味搗為細末用麵糊和丸櫻桃大丹砂為衣細嚼一丸茶酒任下食後服治風頭痛清頭目化風痰槐實散方槐實炒八兩荊芥穗四兩甘草炙一兩防風去叉三兩上四味搗羅為散每服一錢匕茶酒任調下食後服治頭痛清氣香芎湯方芎藭五兩細辛去苗葉二兩半人參一兩半半夏曲一分用生薑和半夏末作曲用甘草炙三分上五味㕮咀如麻豆每服三錢匕水一盞入生薑三片薄荷五葉同煎七分溫服不拘時治風頭疼菊花湯方菊花石膏各一兩碎芎藭半兩甘草炙一兩上四味粗搗篩每服三錢匕水一盞煎至七分去滓熱服不拘時治風頭痛芎藭散方芎藭莎草根炒去毛各一兩藿香葉荊芥穗各一兩石膏碎一兩半上五味搗羅為散每服二錢匕荊芥湯調下食後服治風頭痛面赤煩悶咽乾八風丸方半夏湯煮透切生薑汁浸一宿焙二兩白殭蠶炒半兩滑石碎一兩白附子炮半兩龍腦研麝香研各一分天麻一兩凝水石燒通赤水飛研半斤上八味除研外搗羅為末和勻煉蜜丸如櫻桃大每服一丸食後茶清或荊芥湯嚼下治風痰頭痛咽膈壅悶甘菊荊芥湯方甘菊擇防風去叉旋覆花芎藭各半兩皂莢酥炙去皮子石膏碎各一兩枳殼去瓤麩炒甘草炙荊芥穗各三分上九味粗搗篩每服三錢匕水一盞入生薑三片煎至六分去滓食後熱服治風頭痛化痰涎天南星丸方天南星牛膽內者白附子炮各一兩石膏三兩碎研犀角屑一分甘草炙半兩丹砂研一兩龍腦研一分上七味除研外搗羅為末次入研者和勻以生雞蘇莖葉搗取汁和蜜煉熟丸和雞頭大每服一丸茶清嚼下食後臨臥服治風頭痛蘆薈散方蘆薈防風去叉各半兩白附子炮白朮天麻白芷各一兩丹砂研龍腦研各半分上八味搗為細散每服半錢匕蔥白薄荷茶調下食後服治風盛痰壅頭痛不止石膏丸方石膏煅通赤淨地出火毒以器覆之一兩白附子炮一分半鉛霜研丹砂研龍腦研各一分上五味搗研如粉薄荷汁煮麵糊和丸如梧桐子大丹砂為衣每服二丸好茶嚼下治風頭痛皂莢散方皂莢豬牙者七挺燒灰烏頭一枚炮裂去皮臍莎草根七枚生上三味搗羅為散每服一錢匕臘茶調下並三兩服治諸風頭痛不可忍者丹砂丸方丹砂別研水飛石膏燒通赤地上出火毒研白附子炮為末各一兩龍腦少許研上四味同研令勻粟米飯丸如緑豆大更以丹砂為衣每服五丸食後細嚼薄荷茶下治風熱頭痛痰涎壅悶旋暈昏倦龍腦芎辛丸方芎藭二兩細辛去苗葉甘草炙各半兩龍腦研一分天南星炮秦艽去苗土丹砂研各一兩上七味搗研為末煉蜜和丸如櫻桃大每服一丸食後嚼以茶清或荊芥湯下治風壅頭痛目眩生犀雞蘇丸方犀角屑半兩雞蘇葉荊芥穗天麻各一兩細辛去苗葉半兩獨活去蘆頭一兩甘草炙人參芎藭各一兩上九味搗羅為末煉蜜和丸如雞頭大每服一丸食後茶清嚼下治風頭痛地龍散方地龍去土炒半夏生薑汁搗作餅焙令乾再搗為末赤茯苓去黑皮各半兩上三味搗羅為散每服一字至半錢匕生薑荊芥湯調下兼治産後頭痛治風頭痛偏正頭痛不可忍者通頂散方龍腦研地龍去土炒瓜蒂赤小豆炒馬牙硝研上五味等分搗研為散每用一小豆許食後含水㗜入兩鼻內治頭痛眼睛痛六神散方雞蘇芎藭馬牙硝研各二錢石膏研乳香研各一錢龍腦研一字上六味搗研為細散每用一字含水㗜於鼻中治一切風痰及頭痛不可忍方藜蘆一兩雄黃一分研上二味搗研為散研勻每服半錢至一錢匕溫水調服取吐一方只單搗藜蘆取細末每㗜少許作嚏藥亦妙治風邪客陽經頭目重痛及頭面虛汗連腦疼痛荊芥散方荊芥穗半兩烏頭尖一分雄黃研一錢白殭蠶直者炒一分上四味搗研為散每服一錢匕荊芥茶調下每服藥訖臥少時治風客陽經頭重疼痛及偏湊一邊繞額角痛藿香散方藿香半兩草烏頭半兩炮去皮臍烏頭一兩炮裂去皮臍乳香三皂子許研上四味搗研極細每服一字至半錢好茶調下發時服治風毒上攻頭痛石膏丸方石膏研菊花防風去叉葛根銼各二兩上四味搗羅為末煉蜜和丸梧桐子大每服二十丸加至三十丸食後臨臥熟水下治風頭痛痰逆煩滿筋脈拘急手足麻痹天南星丸方天南星漿水煮切焙半夏漿水煮焙天麻酒浸切焙石膏各半兩白附子生一兩滑石二兩上六味搗研為細末麵糊和丸如梧桐子大每服十丸食後荊芥湯下治風頭痛心膈煩熱上焦壅滯頭面虛汗天南星散方天南星半夏各一兩二味為末水八升浸兩復時逐日換水日足陰乾附子生末六錢烏頭生末七錢上四味同研勻大人半錢小兒一字生蔥薄荷茶調下治傷風頭目昏痛吐逆不下食羌活散方羌活去蘆頭一兩防風去叉茯神去木藁本各一兩半甘菊花擇去梗桂去粗皮各一兩上六味粗搗篩每服三錢匕水一盞半入生薑五片煎至一盞去滓食前溫服如人行五里再服治風頭痛防風湯方防風去叉柴胡去苗黃連去須當歸炙枳殼去瓤麩炒大黃銼熬天雄炮裂去皮臍地骨皮各一兩桑根白皮銼炒羌活去蘆頭芎藭各一兩半石膏椎碎一兩旋覆花桂去粗皮菊花各半兩上一十五味銼如麻豆每服五錢匕以水一盞半入生薑半分切煎取八分去滓溫服治頭痛頭旋眼花及喉痹纏喉風等龍腦丸方龍腦研丹砂研馬牙硝研各一分麝香研半錢上四味再同研令勻細於碟內盛用羊膽滴汁入藥中旋和成丸如黑豆大以淨合盛每用一粒以蘆管吹入鼻中以手小指送近上兩鼻皆如此去枕仰臥少時候藥溶入腦涎唾從喉內出其病立瘥治頭痛不可忍馬牙硝方馬牙硝研半兩蘆薈研少許瓜蒂三枚為末大羊膽一枚臘月收上三味入膽內線縛暗處陰乾細研瓷合盛左痛吹右鼻右痛吹左鼻三兩度愈治頭痛不可忍方羊膽入玄精石末陰乾上一味水調一字匕吹鼻中立止治諸風頭旋額角偏痛肢體拘蜷痰盛氣壅鼻塞聲重咽膈不利清爽神志解利四時邪氣太白丸方舊名太白丹天麻一兩半細辛去苗葉二兩芎藭一兩半白附子五兩天南星二十兩半夏煮軟焙乾一十五兩蠍梢一兩炒寒水石燒熟五十兩附子炮裂去皮臍二兩白殭蠶三兩炒阿膠三分炙令燥人參半兩上一十二味同搗羅為末水煮麵糊為丸如梧桐子大每服三十丸生薑湯下不拘時候治頭痛口乾煩悶寒熱知母湯方知母焙升麻子芩葛根銼麥門冬去心焙各半兩甘草炙一分石膏研一兩上七味粗搗篩每服三錢匕水一盞煎至七分去滓溫服食後治頭痛不可忍吹鼻麝香散方藜蘆和州者一莖上一味曝乾搗羅為散入麝香麻子許研勻吹鼻中治頭痛鼻塞腦悶通頂散方藜蘆研半兩黃連去須三分上二味搗研為散每用少許㗜入鼻中治風頭痛上焦壅滯心膈煩熱及治偏頭痛二聖散方細辛去苗葉華陰者硝石各一分上二味搗研為細散每用半字發時㗜入不痛邊鼻內如未已方㗜痛邊鼻內或用紙拈子蘸藥納鼻中治鼻塞及頭痛風痰通頂散方馬牙硝研細半兩地黃汁一合上二味相和於銅器中用慢火煎令乾硬取出研細每挑少許入鼻㗜上吐痰即瘥治風頭痛及偏頭痛吹鼻方萊蔔子半兩生薑汁半合上二味相和研極細絞取汁入麝香少許滴鼻中㗜入立定偏痛隨左右用之治頭痛目暈及喉痹纏喉風等龍珠丸方長蚯蚓不拘多少上五月五日取以龍腦麝香相和研勻丸如麻子大每用以生薑汁塗鼻中逐邊各內一丸立愈偏頭痛論曰偏頭痛之狀由風邪客於陽經其經偏虛者邪氣湊於一邊痛連額角故謂之偏頭痛也治偏頭痛至靈散方雄黃研細辛去苗葉為末等分上二味再同研勻每服一字左邊疼㗜入右鼻右邊疼㗜入左鼻治偏頭痛不可忍乳香散方乳香如皂子大高良薑如指頭大上二味於火上燒迎煙燻鼻隨痛左右用之治偏頭痛不可忍龍香散方地龍去土炒為末乳香研等分上二味再同研勻滲在紙上作紙拈於燈上燒令煙出即迎煙燻鼻隨患左右用之治久患偏頭疼烏豆散方草烏頭尖一分生用赤小豆三十五粒麝香一字研上三味除麝香外搗羅為細散再研勻每服半錢匕煎薄荷茶清放冷調下更於痛處一邊鼻內㗜藥少許治偏頭疼連牙齒風痛不可忍細辛散方細辛去苗葉夏枯草各三錢蓽茇高良薑各一錢上四味搗羅為細散每用少許隨痛左右㗜入鼻內如牙疼用時須開口流涎不得噴候涎盡以冷水點臘茶飲之其痛立止治偏頭痛不可忍神聖散方乾蠍去土炒霍香葉麻黃去根節細辛去苗葉等分上四味搗羅為細散每服一錢匕用薄荷酒調下治偏頭痛天南星散方天南星酸漿水煮透心軟切曝乾一兩菊花三分自然銅燒赤醋淬一兩防風半兩用水一碗同菊花自然銅防風三味煮水盡為度去防風自然銅不用只用菊花芎藭一兩上五味除二味不用外搗羅為細散每服半錢匕臘茶清少許調只作一口呷盡分作三咽每咽點頭一點治偏頭痛不可忍者神妙方萊蔔洗切上一味絞取汁每用少許㗜入鼻內隨痛左右用之治偏頭痛丁香散方丁香一粒大者研棘針倒鉤者四十九枚燒灰存性為末麝香一皂子大研上三味再同研勻以紙拈搵藥隨痛左右㗜之治偏頭痛立效散方地龍去土炒為末一兩麝香研少許上二味再同研勻每服半錢匕滲紙上作紙拈於燈上燒隨痛左右熏鼻治偏頭痛四神散方地龍去土炒干蝦蟆燒灰存性各一錢藜蘆半錢龍腦研少許上四味除龍腦外搗羅為細散再研勻每用半字許先滿口含水男左女右㗜半字入鼻內揉痛處良久痛定治偏頭疼蓽茇散方蓽茇上一味搗羅為細散每用一字先令病人滿口含溫水隨病左右㗜入鼻中治偏頭疼方芫花不以多少上一味以釅醋浸一宿焙乾搗羅為末或左邊疼即於左鼻吸藥或右邊疼即於右鼻吸藥一字入藥時先含水一口防藥入喉內候鼻中涕泗出即瘥
