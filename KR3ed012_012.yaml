body:
  text: 卷第一十二蠱風論曰蠱風之狀在皮膚間一身盡痛若劃若刺淫淫躍躍如中蠱毒故名蠱風皆由體虛受風侵傷正氣也治體虛風邪所中攻走皮膚狀如刺劃薏苡仁湯方薏苡仁二兩獨活去蘆頭茵芋細辛去苗葉桂去粗皮側子炮裂去皮臍防風去叉酸棗仁微炒麻黃去根節先煮去沫焙五加皮羚羊角鎊各一兩甘草炙銼半兩上一十二味銼如麻豆每服四錢匕水一盞入生薑半分拍破煎至七分去滓溫服不計時候治蠱風皮膚如刺劃天麻丸方天麻銼焙躑躅花獨活去蘆頭附子炮裂去皮臍白附子炮原蠶蛾炒防風去叉蒼耳蒺藜子炒去角桂去粗皮當歸切焙烏頭炮裂去皮臍各一兩麻黃去根節烏蛇肉酒浸去皮骨炙各二兩麝香研半兩上一十五味除研者外搗羅為末入麝香再研勻煉蜜和搗三二百下丸如梧桐子大每服二十丸溫酒下不拘時候如有汗出即宜避風治蠱風四白散方白花蛇酒浸去皮骨炙一兩半白附子炮白殭蠶微炒白蒺藜炒去角各一兩上四味搗羅為散空心溫酒調下二錢匕晚食前再服治六十四種風注走入皮膚中如蟲行痛如刺劃狀似蠱毒及卒風面目腫起手不及頭口噤不能言石南湯方石南乾薑炮黃芩去黑心細辛去苗葉人參各一兩桂去粗皮麻黃去根節當歸切焙芎藭各一兩半乾地黃三分甘草炙二兩食茱萸一兩一分上一十二味㕮咀如麻豆大每服六錢匕以水一盞酒一盞煎至一盞去滓溫服得汗為度治蠱風身痛如刀劃白花蛇煎方白花蛇烏蛇並用酒浸皮去骨焙乾各二兩白蜜三十兩生薑汁六兩薄荷汁六兩白殭蠶炒乾蠍去土炒苦參各一兩白附子炮三分上九味搗羅六味為末先下蜜並生薑汁薄荷汁次下諸藥末拌和勻銀器中重湯熬成煎以無灰酒調下半匙匕久服身體滑膩治蠱風何首烏散方何首烏去黑皮威靈仙去土各一兩苦參半兩麒麟竭一分上四味並生搗羅為散入乳缽內研三五百遍每服一錢匕用荊芥湯調下每日三服酒服尤妙治蠱風皮膚盡痛淫淫如有蠱啄搔之生瘡甚者如刀劃茵芋酒方茵芋烏頭炮裂去皮臍石南防風去叉女葳蜀椒去目及合口者炒出汗附子炮裂去皮臍細辛去苗葉獨活去蘆頭卷柏桂去粗皮天雄炮裂去皮臍秦艽去苗土防己各一兩躑躅二兩上一十五味㕮咀如麻豆大少壯人無用熬虛老人薄熬之清酒二斗漬冬七日夏三日春秋五日初服一合不知加至二合治蠱風皮膚盡痛如刀劃狀及頭目不利風痰等疾薄荷丸方干薄荷葉一斤天麻四兩威靈仙去苗土三兩羌活去蘆頭四兩山梔子仁二兩蔓荊實去白皮三兩白芷桔梗炒防風去叉各二兩大黃濕紙裹煨令紙幹一兩人參赤茯苓去黑皮各三兩龍腦研半兩上一十三味搗研為末再和勻煉蜜丸如雞頭實大每服一丸食後細嚼茶酒任下治蠱風皮膚盡痛身體若劃若刺烏頭五靈脂丸方烏頭生去皮臍五靈脂各五兩附子炮裂去皮臍二兩狼毒炮一兩防風去叉地龍不去土桂去粗皮虎骨沙瓶中鹽泥固濟煅存性海桐皮銼自然銅煅醋淬三五遍各二兩乳香研沒藥研各一兩麝香研三分龍腦研一錢亂髮存性燒灰好墨煅過各半兩上一十六味各銼研日中曝七日搗羅為末以生薑自然汁和搗熟為丸如彈子大每一丸分作四服用溫酒入生薑汁少許磨化服此藥亦治癱瘓急慢中風痰涎壅塞胸中不利眼口喎斜半身不遂神昏恍惚及血風走注並依前湯使日二三服偏正頭疼夾腦風疾以臘茶清和少薑汁磨下即枕臥少時腫痛處磨一丸塗之產後諸疾備急用薑汁磨化入童子小便並酒各半盞稍熱服血風勞及敗血攻四肢或攻刺腹肋痛用當歸酒下顛撲損傷乳香酒下病深者三丸取效合時不得見雞貓犬及婦女孝服人刺風論曰刺風者以氣血為風寒所侵不得宣利則蘊滯而生熱寒熱相搏於皮膚之間淫躍不能發泄故遍身如針刺也其痛甚若刀劃者謂之蠱風與刺風相似不可不辨也治體虛腠開為風邪所中遍身淫躍如針刺天麻散方天麻白花蛇酒浸去皮骨炙槐實子微炒羌活去蘆頭防風去叉蔓荊實白蘚皮晚蠶砂微炒枳殼去瓤麩炒威靈仙去苗土甘草炙各一兩上一十一味搗羅為散每服二錢匕溫酒調下不計時候治氣血不和為風寒所侵不得宣泄蘊結皮膚間寒熱相搏如針刺防風丸方防風去叉二兩酸棗仁炒一兩檳榔煨過一兩半薏苡仁炒熟二兩獨活去蘆頭甘菊花芎藭各一兩藁本去苗土二兩大麻仁別研如粉一兩半上九味搗羅八味為末和大麻仁粉重羅煉蜜丸梧桐子大每服二十丸溫酒下不計時候治體虛受風侵傷氣血遍身刺痛或因寒邪未解食熱物亦能致此何首烏散方何首烏三兩蔓荊實威靈仙去土菖蒲九節者苦參荊芥穗蒺藜子炒去尖各一兩甘草炙半兩上八味搗羅為散每服二錢匕薄荷茶或酒調下不計時候治刺風遊風惡實根酒方惡實根洗去土控干生蒴藋根洗去土控干各一斤上二味細銼以酒一斗浸七日後每溫飲一盞日三四飲治刺風枳殼酒方枳殼去瓤麩炒柏白皮各半斤五葉草一斤上三味細銼生絹袋盛以酒一斗浸七日每溫飲一盞並服不妨常令有酒力佳治刺風遍身刺痛及中風破傷風等疾牛膝散方牛膝酒浸切焙白芷當歸切焙芎藭甘草微炙銼生乾地黃焙槐子炒厚朴去粗皮生薑汁炙漏蘆去蘆頭青橘皮湯浸去白焙各半兩何首烏去黑皮沒藥防風去叉虎脛骨酒浸一宿炙各一兩芍藥四兩墨燒令赤酒內蘸三遍半兩上一十六味搗羅為散每服二錢匕溫酒調下破傷骨不折以童子小便和酒調服婦人血風肢節痠痛薄荷酒調下治刺風遍身如針刺乳香犀角丸方乳香研犀角生鎊屑自然銅煅醋淬附子生去皮臍各一分沒藥研蔓荊實草烏頭略炮去皮尖木香人參針沙水洗十遍用醋一小盞煮乾銚內火出煙盡即傾出丹砂研莎草根去毛炒各半分上一十二味搗研為末再同和研勻用酒糊杵為丸如梧桐子大每服十五丸米飲下臨臥服治氣血內虛風寒蘊滯寒熱相搏遍身如針刺名曰刺風宜服黃耆丸方黃耆細銼蘹香子烏頭生用去皮臍烏藥銼楝實銼炒防風去叉蒺藜炒去角赤小豆揀地龍去土以上各一兩上九味搗羅為細末煮麵糊和丸如梧桐子大每服十丸至十五丸空心臨臥溫酒或鹽湯下治刺風遍身刺痛芎枳丸方芎藭米泔浸一宿銼焙枳殼米泔浸三宿逐日換水去瓤再浸一宿控干麩炒各四兩上二味搗羅為末煉蜜和丸如梧桐子大每服三十丸溫熟水下食後服至月餘見效風氣論曰風氣之狀有冷有熱冷則厥逆熱則煩惋蓋肺者五臟之華蓋而為氣之本主通行陽氣循於皮膚分肉之間熏於肓膜散於胸腹以拒外而溫內若其氣虛弱則風邪因而傷之其傷之也或遇陰氣盛則四肢厥逆而為風冷或遇陽氣盛則心神煩惋而為風熱二者皆因體虛受風氣能鼓作故均謂之風氣也治風氣凝滯身體疼痛四肢拘急腰腳沉重仙茅丸方仙茅米泔浸去赤汁焙威靈仙去土羌活去蘆頭青橘皮湯浸去白焙白牽牛炒白茯苓去黑皮各一兩薑黃白朮蒼朮米泔浸一宿竹刀切作片子焙各半兩上九味搗羅為末煉蜜和丸如綠豆大每服十丸空心鹽湯下治風氣身體疼痛胸膈煩滿化痰涎利頭目防風半夏丸方防風去叉三兩半夏湯洗七遍切焙一兩半天麻二兩芎藭半兩白芷一兩獨活去蘆頭半兩人參三分茯苓去黑皮半兩上八味搗羅為末酒煮麵糊和丸如梧桐子大每服二十丸不計時候荊芥湯下加至三十丸治一切風氣烏蛇散方烏蛇酒浸去皮骨炙三兩檳榔五枚肉豆蔻五枚去皮桂去粗皮人參白茯苓去黑皮當歸切焙牛膝酒浸切焙甘草炙銼麻黃去根節白附子炮天麻芎藭羌活去蘆頭藁本去苗土附子炮裂去皮臍各半兩細辛去苗葉一分乾蠍去土炒一兩白芷半兩防風去叉半兩白蘚皮一分木香半兩丹砂研一分麝香研二錢上二十四味除研者外搗羅為末再同研令勻細每服一錢匕蔥白臘茶清調下大治諸風氣上攻兼進飲食常服只用臘茶調下大段風涎手足不隨𤸷麻用溫薄荷酒調下治風氣肢節疼痛遍身瘙癢麻木頭目昏痛咽膈煩滿槐膠丸方槐膠二兩天麻牛膝酒浸切焙各一兩蔓荊實半兩何首烏去黑皮一兩甘草生銼半兩人參半兩生乾地黃焙防風去叉各一兩槐花炒菊花各三分上一十一味搗羅為末用麵糊和丸如梧桐子大以丹砂為衣每服十五丸至二十丸荊芥薄荷湯下不計時候服治風氣肢節疼痛四肢少力頭痛煩悶防風丸方防風去叉桔梗銼炒丹砂研各二兩天麻細辛去苗葉獨活去蘆頭秦艽去苗土芎藭木香各一兩天南星用牛膽制者由跋炮各一兩半甘草炙銼茯苓去黑皮各半兩藿香葉三分上一十四味搗研為末煉蜜和丸如雞頭大每服一丸荊芥湯嚼下食後臨臥服治風氣威靈仙丸方威靈仙去土蔓荊實何首烏去黑皮苦參上四味等分搗羅為末用酒煮麵糊為丸如梧桐子大每服三十丸溫酒或溫熟水下治風氣調營衛利胸膈清頭目化痰涎明視聽化積滯檳榔丸方檳榔銼大黃銼炒各二兩陳橘皮湯浸去白焙木香附子炮裂去皮臍各一兩芎藭羌活去蘆頭獨活去蘆頭桂去粗皮各半兩人參一兩京三稜煨半兩肉豆蔻六枚去皮上一十二味搗羅為末每用此末二兩別搗牽牛子取細末一兩和勻煉蜜為丸如梧桐子大每服十丸至十五丸臨臥生薑橘皮湯下治風氣頭目昏眩化痰涎利胸膈槐實丸方槐實四兩乾肥者揀令淨水洗過放干慢火上麩炒令焦微似黑色皂莢六兩不蚛者銼長參四寸用長流水五升黑豆一升同煮令豆香熟為度去黑豆不用取皂莢焙乾刮去黑皮塗酥慢火炙令焦木香半兩芎藭枳殼去瓤麩炒菊花各一兩牽牛子二兩慢火炒令微焦黑色別搗羅取末一兩用檳榔三分雞心者銼上八味搗羅為末煉蜜成劑再入臼內搗令熟丸如梧桐子大每服二十丸食後臨臥荊芥湯下治風氣利胸膈及心腹諸疾香枳丸方木香枳殼去瓤麩炒羌活去蘆頭獨活去蘆頭乾薑炮桂去粗皮人參陳橘皮湯浸去白焙芎藭甘草炙銼白朮附子炮裂去皮臍京三稜煨銼大黃蒸過切焙各半兩肉豆蔻去皮一分檳榔銼一兩牽牛子淨淘揀焙乾一斤取粉半斤別入用上一十七味除牽牛子外搗羅為末瓷合收勿泄氣每要使時旋秤藥末一兩牽牛子粉半兩合和研勻煉蜜和丸如梧桐子大每服二十丸至三十丸蔥白臘茶下生薑湯溫酒亦可臨時更看虛實加減服婦人血風勞氣心腹脹痛小兒疳痢時疫癥瘕皆宜服治三焦風壅五臟虛弱遍身風氣勞悶手腳風毒氣寒熱煩躁通心肺健脾胃益腎臟正元氣止逆進食枇杷飲方枇杷葉炙去皮木香木通銼大腹皮銼訶黎勒皮各三兩桔梗銼炒五味子厚朴去粗皮生薑汁炙鱉甲去裙襴醋炙白芷防風去叉茯苓去黑皮當歸切焙澤瀉京三稜煨銼各半兩白朮藿香葉人參各一兩一分芍藥甘草炙銼枳殼去瓤麩炒牡丹皮知母焙各一分半夏湯洗七遍切焙一兩前胡去蘆頭三兩上二十五味粗搗篩每服四錢匕水一盞半入生薑三片大棗一枚劈破煎至八分去滓熱服空心食前服治體虛受風因氣鼓作名為風氣冷則厥逆熱則煩惋紫蘇木通湯方紫蘇莖銼焙木通銼焙桑根白皮銼焙青橘皮湯去白焙各一兩荊芥穗焙獨活去蘆頭銼木瓜去瓤切焙蘹香子根銼炒羌活去蘆頭銼各半兩枳殼去瓤麩炒二兩大腹銼二十枚並皮子用上一十一味粗搗篩每服五錢匕水二盞生薑一分蔥二寸同煎至一盞去滓溫服空心日午臨臥各一治風氣有熱煩惋頭面生瘡黃耆丸方黃耆銼防風去叉地骨皮枳實去瓤麩炒一兩羌活去蘆頭苦參當歸切炒升麻大黃銼