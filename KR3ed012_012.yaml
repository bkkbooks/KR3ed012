盞煎至七分去滓食後臨臥服治風熱煩躁祛風利小腸犀角湯方犀角鎊黃芩去黑心山梔子仁升麻葛根銼山茵陳擇生乾地黃焙甘草炙銼各等分上八味粗搗篩每服三錢匕水一盞入麥門冬十粒竹葉十片煎至七分去滓溫服治一切風熱龍腦玉壺丸方人參防風去叉各二錢赤茯苓去黑皮一錢半乾蠍去土炒半錢白殭蠶炒硼砂研各一錢白附子炮天麻麝香研天南星炮玄明粉研各一分甘草炙銼龍腦研各半兩凝水石煅通赤水浸出火毒後研十兩七兩入藥三兩為衣上一十四味為細末煉蜜丸雞頭大用凝水石粉為衣每服一丸食後細嚼以荊芥湯下茶清亦得治風熱上焦煩滿化風丸方荊芥穗雞酥葉羌活去蘆頭各一兩乾蠍十四枚全者去土炒上四味為細末煉蜜丸雞頭大每服一丸薄荷湯化下治風熱心胸壅滯煩躁羌活湯方羌活去蘆頭人參連翹防風去叉鉤藤各一兩甘草炙銼三分上六味粗搗篩每服三錢匕水一盞煎至七分去滓溫服治風熱上焦壅盛頭目眩暈煩躁飲水小腸結澀茯苓散方赤茯苓去黑皮茯神去木各一兩人參遠志去心海金砂各半兩上五味為細散每服二錢匕煎瞿麥湯調下食後臨臥服治風熱上攻頭面生瘡及腫痛獨活湯方獨活去蘆頭羌活去蘆頭防風去叉柴胡去苗白朮甘草炙銼麻黃去根節煎掠去沫焙乾各一兩甘菊花半兩上八味粗搗篩每服三錢匕水一盞入荊芥五穗同煎取七分去滓食後溫服治風熱心肺氣壅多渴天門冬丸方天門冬去心焙三分防風去叉赤茯苓去黑皮麥門冬去心焙知母焙桑根白皮銼炒黃耆銼細黃連去須栝蔞根別搗碎炒升麻生乾地黃焙各半兩甘草炙銼一分上一十二味為細末煉蜜丸梧桐子大每服十五丸生薑湯下日午臨臥各一服治風熱上膈煩滿疏氣羚羊角湯方羚羊角屑威靈仙去苗土黃連去須白檳榔郁李仁去皮尖炒甘草炙大黃銼炒枳殼去瓤麩炒各一兩桑根白皮銼炒車前子決明子炒防風去叉萆薢各一兩半桂去粗皮旋覆花炒各半兩上一十五味㕮咀如麻豆每服五錢匕以水一盞半煎取八分去滓溫服食後日二治風熱攻頭面虛浮心下滿悶煩躁熱渴腰胯痠疼咳逆咽乾小便赤澀茯苓丸方白茯苓去黑皮一兩半赤芍藥柴胡去苗百合訶黎勒皮羚羊角鎊陳橘皮湯浸去白焙防風去叉菊花各一兩郁李仁去皮炒一兩半大麻仁研四兩生乾地黃焙三兩上一十二味搗羅為末煉蜜丸如梧桐子大每服三十丸煎麥門冬湯下治風熱痰壅面發熱皮膚痛涼心膈潤肺臟皂莢丸方皂莢實肥者半斤甘草一兩同皂莢於罐器內燒不令煙出芎藭四兩惡實微炒蒺藜子炒去角各二兩菊花微炒馬牙硝研各四兩玄參曝乾一兩甘松去土藿香葉零陵香各一兩龍腦研一錢上一十二味搗研為末煉蜜和丸如櫻桃大每服一丸嚼破茶酒任下食後臨臥治風熱氣秘疏風順氣牽牛子丸方牽牛子不限多少淨洗飯上炊氣才透便出攤微冷搗為末青橘皮去白焙陳橘皮去白焙木通銼桑根白皮銼芍藥焙各一兩栝蔞根洗焙二兩上七味搗羅六味為末每牽牛子末一斤入余藥末四兩拌合令勻以煉蜜和杵三五千下丸如梧桐子大每服二十丸隨病具湯使瘰癧茶湯下婦人血氣芍藥酒下血風瘙癢枳殼酒下五淋榆白皮酒下癱瘓風豆淋酒下腸風瀉血葳蕤酒下肺氣訶黎勒酒下傷寒蔥白酒下風秘蔥薑茶下治風熱頭面生瘡羌活散方羌活去蘆頭防風去叉芎藭荊芥穗麻黃去根節甘草炙銼木通銼惡實炒各等分上八味搗羅為散每服二錢匕茶酒調下不拘時治風熱上焦痰毒大黃丸方大黃銼如骰子樣三兩青橘皮去白不銼半夏洗去滑各一兩上三味一處炒熟搗羅為末水浸蒸餅丸如梧桐子大每服食後臨臥溫水下二十丸加至三十丸中風發熱論曰中風發熱者身體無汗肢節煩疼腹急大小便不利蓋風邪所客則皮膚閉密內不得通外不得泄蘊滯發而為熱熱盛則內燥津液虛少故無汗也汗不出則氣不舒肢節煩疼而腹滿急大小腸不利緣風邪流傳心肺之經外干於腑不愈則加頭疼面赤而渴燥也治中風發熱無汗肢節煩疼腹內急痛大小便秘澀防風飲方防風去叉當歸切焙麻黃去根節先煎掠去沫焙白朮赤茯苓去黑皮附子炮裂去皮臍山茱萸黃芩去黑心各一兩人參甘草炙大黃銼炒各三分熟乾地黃焙一兩上一十二味銼如麻豆每服五錢匕水一盞半大棗二枚劈破生薑半分切煎至八分去滓溫服空心日晚各一治中風發熱頭目昏疼失音不語喘息粗大口偏吐涎手足不遂麻黃飲方麻黃去根節先煎掠去沫焙二兩防風去叉赤芍藥各一兩半石膏碎三兩羌活去蘆頭杏仁去皮尖雙仁炒甘草炙各一兩上七味粗搗篩每服五錢匕水一盞半煎至八分去滓空心溫服日再若牙頷冷痹舌強加附子一枚去皮臍䈽竹瀝少許若渴加麥門冬去心一兩半犀角屑一兩治中風頭痛面赤熻熻發熱惡風煩悶身痛如碎防風湯方防風去叉白朮桂去粗皮各一兩細辛去苗葉半兩赤芍藥黃芩去黑心甘草炙各一兩麻黃去根節煮掠去沫三兩石膏碎二兩上九味粗搗篩每服五錢匕水一盞半大棗二枚劈破煎至八分去滓空心溫服日再治中風頭痛煩熱口乾小便赤石膏湯方石膏碎三分滑石半兩白茅根銼萹蓄銼各三分上四味粗搗篩每服三錢匕水一盞煎至七分去滓食後熱服治中風發熱頭痛目眩喉咽干舌本強胸背痛悶心膈痞滿腰脊強急葳蕤湯方葳蕤青木香白薇焙麻黃去根節煎去沫焙獨活去蘆頭杏仁湯浸去白尖雙仁炒芎藭各二兩甘草炙三兩麝香研一分石膏碎三分上一十味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服空心臨臥並二服取汗若一寒一熱者加朴硝一分燒令白於濕地紙襯出火毒大黃一兩銼醋炒量人虛實用之得下後即