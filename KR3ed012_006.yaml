傳之令追風速愈治破傷風奪命散方天南星防風各一兩上二味搗羅為末先用童子小便洗瘡口後以此藥末酒調貼之治破傷風項頸緊硬身體強直定命散方蜈蚣一條全者烏蛇項後取白花蛇項後取各二寸先酒浸去骨並酒炙上三味為細散每服二錢至三錢匕煎酒小沸調服治破傷風獨聖散方蘇枋木不拘多少上一味搗羅為細散每服三錢匕酒調服之立效治破傷風身項強硬不知人事必效散方鰾膠白色者不拘多少炙令焦黃上一味搗羅為細散每服三錢匕熱酒調下如不醒灌之治破傷風腰背反折項強直牙關緊急急風散方草烏頭不拘多少用釅醋煮十餘沸漉出曝乾如此十遍為度上一味搗羅為細散每服一字溫酒調下治破傷風身體強直牙關緊急目直視赤箭散方赤箭天南星炮當歸切焙白殭蠶炒芎藭白附子炮麻黃去根節烏頭炮裂去皮臍羌活去蘆頭桂去粗皮各一兩蟬蛻去土乾蠍去土炒各半兩丹砂研烏蛇肉酒炙各三分麝香研一分膩粉研三錢上一十六味將十三味搗羅為末與別研三味和勻每服一錢匕溫酒調下不拘時治破傷風牙關緊急失音不語口吐涎沫喉中作聲六味追風散方附子生用白附子去尖烏頭去尖天南星半夏湯洗七遍去滑薑製用各半兩乾蠍全者炒一分上六味搗羅為散入膩粉一分研勻每服一字至半錢匕豆淋酒調下不拘時瘡口用藥末乾摻封裹治破傷風身如角弓反張守宮丸方守宮炙乾去足七枚天南星一兩酒浸三日曝乾以上二味搗為末膩粉半分上三味同研勻細薄麵糊丸如緑豆大每服斡口開以酒灌下七丸有頃汗出得解更與一服再汗即瘥治破傷風身腫牙關不開白殭蠶散方白殭蠶直者不拘多少上一味生研為末每用生薑自然汁調以雞翎於瘡口掃之勿令乾斯須腫塌皮皺為效仍用生薑汁調半錢匕服治破傷風發熱頭痛噁心煩悶烏頭散方草烏頭去蘆頭生用白礬生用蜀椒去目並閉口生用各一分上三味搗研為細末瘡口未合以津唾調塗覺清水出是效仍服後三味追風散烏頭生去皮臍一枚雄黃研一分麝香研一字上三味搗研為細散每服一錢匕溫酒調下治破傷風身體強直口噤不開黑神丸方硫黃研丹砂研雄黃研各一兩水銀二兩以上四味同結砂子鉛丹研硝石研定粉研各二兩烏蛇肉藿香葉乾蠍去土炒白殭蠶炒麻黃去根節天麻天南星炮去皮白附子炮白芷附子炮裂去皮臍麝香研各一兩上一十八味將前四味先結砂子研末次入鉛丹硝石定粉三味同炒黑色住火次十味並用酒浸一宿焙乾搗羅為末與前藥並後麝香合研令勻用頭醋煎膏和丸如皂子大每服一丸傷寒生薑蔥酒磨下中風豆淋酒磨下一切風痰荊芥薄荷湯磨下治破傷風寒熱煩悶狀似傷寒追風白丸子方蜈蚣赤足者薑汁浸一宿白花蛇項肉酒浸一宿炙乳香研麝香研附子尖生用各一分上五味搗研為末煉蜜丸如蘿蔔子大量人大小用薄荷熟水研下一丸至五丸或十丸要汗出以桃柳湯浴後熱米飲投汗出瘥治破傷風打撲內損銀花散方天南星大者半生半炮白附子半生半炮防風去叉等分上三味為細散每服二錢匕重者童子小便調下稍輕熱酒調下如外傷用此藥貼瘡口仍依法服之如破傷風先以小便溫洗瘡口次用藥干貼追出風毒立愈勢稍惡口噤者以童子小便調斡開口灌之如斗打至死但心頭微暖者並灌三服即活常須合下以備急用
