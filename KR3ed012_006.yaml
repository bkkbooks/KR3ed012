body:
  text: 卷第六急風論曰急風中人乃毒厲之氣非天地陰陽橐籥之常也其證筋脈緊急身背強直面黑鼻乾口噤不語須臾風入五臟與清氣相引則通身壯熱汗出如油直視唇青痰涎結聚咽嗌壅塞如拽鋸聲診兩手脈陰陽俱細緩者生或沉微浮數者難治治中急風天竺黃丸方天竺黃研牛黃研雄黃研龍腦研犀角鎊麝香研各一分水銀一分丹砂半兩研為末一半內銚子中入前水銀更入一半丹砂熱熔攪勻下火刮取西甘石研天麻烏蛇酒浸去皮骨炙乾蠍酒炒白殭蠶炒蟬殼微炙桑螵蛸炙羚羊角鎊莎草根炒去毛附子炮裂去皮臍白附子炮羌活去蘆頭獨活去蘆頭蔓荊實去白皮麻黃去根節先煎掠去沫焙各半兩狐肝一具炙乾上二十四味除研藥外為細末再入研藥拌勻煉蜜和丸梧桐子大每以豆淋薄荷酒下二丸至三丸加至五丸後以熱稀薑粥投之日夜可三四服汗出多即減服數治中急風龍腦丸方龍腦研白花蛇酒浸去皮骨炙白附子炮白殭蠶炒半夏湯浸生布挼洗七遍為末薑汁作餅暴天麻乾薑炮裂乾蠍酒炒麻黃去根節先煎掠去沫焙膩粉麝香入龍腦膩粉同研各半兩上一十一味除研藥外為細末與研藥和勻酒煎槐膠和丸麻子大豆淋酒下五丸至十丸日三夜一不拘時候治中急風防風丸方防風去叉白殭蠶炒乾蠍酒炒白附子炮五靈脂研丹砂研羌活去蘆頭天麻天漿子去殼入藥末研各一分牛黃研一錢上一十味搗研為細末拌勻糯米煮糊和丸麻子大薄荷酒下五丸加至七丸或口噤研化灌下小兒急驚風荊芥薄荷湯下二丸至三丸治中急風牛黃丸方牛黃研半兩硇砂研丹砂研水銀硫黃入銚子熔入水銀攪勻焰起下火以濕布撲滅膩粉研龍腦研麝香研各一分金薄三十片研雄黃研一分以上十味同再研勻細天麻麻黃去根節先煎掠去沫焙芎藭獨活去蘆頭人參茯苓去黑皮牛膝酒浸切焙升麻白芷桂去粗皮芍藥縮砂仁龍骨細辛去苗葉枳殼去瓤麩炒桔梗銼炒葛根銼當歸切焙柴胡去苗杜仲去粗皮切炒黃耆銼木香犀角鎊遠志去心防風去叉紫菀乾蠍酒炒烏蛇酒浸去皮骨炙肉豆蔻去殼蟬蛻微炒厚朴去粗皮生薑汁炙五遍附子炮裂去皮臍白殭蠶炒藁本去苗土青葙子羌活去蘆頭各半兩上四十六味除研藥外搗羅為細末與研藥拌勻炊大棗取肉並同煉蜜和搗三千杵丸如麻子大每日空心熱酒下二丸加至三丸才覺中風便取熱豆淋酒研化三丸服良久以熱生薑酒粥投之衣蓋汗出即瘥患者只服二丸至三丸不得多凡合藥取臘日及四時王相日天德月德合之日仍忌慎勿令婦人孝子小兒雞犬等見凡入臼時先吸王氣即吞陽氣三口入臼若理四時中風傷寒加一丸麻黃杏仁湯下小兒驚風一丸如黍粒大荊芥薄荷湯下大人癱瘓風天麻酒下三丸空心午時夜臥各一服治中急風烏蛇丸方烏蛇酒浸去皮骨炙半兩天麻白附子炮天南星炮半夏湯洗生布挼洗七遍入生薑一兩同搗焙各一兩犀角鎊白殭蠶酒炒乾薑炮羌活去蘆頭晚蠶砂炒各半兩麝香研一分上一十一味除研藥外搗羅為細末與研藥拌勻煉蜜為丸如緑豆大每服二丸加至三丸若風口噤研化七丸熱酒灌下再用五丸投之治中急風七寶丸方丹砂研玳瑁鎊於沙盆內同丹砂研細安息香揀去砂石各三兩雄黃研龍腦研麝香研琥珀搗碎別研各半兩上七味以六味合和同研一日取安息香以無灰酒五合別入胡桃瓤二兩同研以葛袋子貯碗盛於飯甑上蒸三升粟米飯熟為度更研如稠糊和前六味若硬即更入煉蜜丸如雞頭大每服生薑汁合童子小便二合化下半丸或一丸此人行五里再服汗出清利即愈孕婦不可服治中急風天南星丸方天南星炮白附子炮乾蠍酒炒白花蛇酒浸去皮骨炙桂去粗皮附子炮裂去皮臍各半兩上六味搗羅為末煉蜜和丸如梧桐子大用膩粉半兩滾為衣以粉盡為度每服熱酒下三丸衣復出汗避外風治中急風狐肝丸方臘月狐肝一具臘月朴觜鴉一隻去觜爪藿香二兩桑螵蛸白附子地骨皮各一兩半麥門冬一兩以上五味次入罐子內狐肝鴉上同焙乾蠍炒烏蛇酒浸去皮骨炙白花蛇酒浸去皮骨炙白殭蠶生用天門冬去心生用人參檳榔生用天南星炮各一兩半麝香研半兩五靈脂天麻生用羌活去蘆頭各一兩以上並麝香同搗羅細膩粉一分上二十味將前七味先下狐肝鴉次下五味藥入罐子內團瓦一片蓋口上仍留一眼如錢竅大出煙黃泥封定慢火先燒令乾漸加火燒青煙出即泥合竅子住火以灰培候冷取出研細同餘藥一十三味再同研令勻重羅煉蜜為丸如緑豆大每服溫酒下三丸至五丸微嚼不得多服每空心並二服如人行五里再一服午時夜深各一服汗出即瘥治急風涎潮稍退風留四肢變為癱瘓手足不遂口眼喎斜龍腦牛黃丸方龍腦別研牛黃別研槐膠通明者阿膠炒令燥膩粉水銀以棗肉同研無星用乾蠍去足真酥酒炒白花蛇酒浸去皮骨炙麝香別研各一分阿魏半分麵裹燒令面熟去面不用鉛白霜別研半兩上一十一味先將槐膠阿膠蠍白花蛇搗羅為細末再入諸藥研勻煉蜜和丸如皂子大新病者每服一丸細嚼生薑湯下更以酒少許衝下常於密室內避風服藥後覺病處汗出氣息上膈涎痰出或暴利一兩行腹內鳴轉三服後即覺減退後三日再一服治一切急風角弓反張四肢抽掣牙關緊急骨節疼痛及破傷風追風散方烏頭去皮臍附子去皮臍天南星去臍白附子白花蛇酒浸去皮骨焙丹砂研各一兩蠍梢麝香研各三分膩粉研一分上九味並生用搗羅六味為細散入研藥合研勻瓷合收每服半錢至一錢豆淋酒或煎蔥白酒調下口噤者用少藥揩牙即開治急風口噤手足搐搦涎潮作聲不得出分涎散方藿香葉蠍梢白附子炮各一分天南星炮半兩丹砂研膩粉研粉霜研各一兩上七味先將四味搗羅為末次入丹砂膩粉粉霜同研勻每服一錢匕至二錢薄荷茶調下未吐利再服治中急風牙關緊不能轉舌語澀礬蝴蝶散方礬蝴蝶密陀僧各三錢上二味同研勻每服半錢匕溫水調灌之若牙緊不能下藥即鼻中灌之治中急風天麻丸方天麻白附子炮天南星炮各半兩半夏一分湯浸生布挼洗七遍入薑一分同搗焙乾蠍酒炒一分上五味搗羅為末用獖豬膽一枚搜和為丸如小豆大每服空心薄荷酒下五丸至七丸小兒如大麻粒大薄荷湯下一丸至兩丸治急風如聖散方狐心肝三副烏鴉二隻去觜爪翅並臘月者已上二味用大新藏瓶一枚斡開口子內之瓦蓋合留一眼子外以紙筋泥固濟泥干以火燒令赤候煙細無香氣去火蓋定眼子候冷取出以絹帛裹地坑內碗復出火毒一復時取出研細丹砂研龍腦研麝香研各二錢牛黃研半錢犀角鎊琥珀各一字真珠麻子大者五顆小者十顆細研金薄銀薄各十片上一十一味搗研極細同前藥研勻每服一錢匕薄荷自然汁入酒少許調下空心日午臨臥各一服治急風涎盛口眼喎斜言語謇澀銀星丸方天南星為末牛乳拌炒乾細研四兩白附子為末生薑自然汁拌炒乾細研二兩灶突中煤細研蠍梢炒麝香研水銀各一兩鉛一兩與水銀結砂子研牛黃研半兩上八味合研令勻煉蜜和丸如緑豆大每服十丸至十五丸煎甘草黑豆湯下小兒慢風痰涎不利服三五丸欲利者以龍腦膩粉薄荷汁調下治中急風蛜𧌴散方乾蠍炒白附子炮附子炮裂去皮臍天南星湯浸令軟銼作小塊子以生薑自然汁炒各半兩上四味搗羅為散每服一錢匕生薑汁調下治中急風天麻散方天麻天竺黃天南星乾蠍並生用等分上四味搗羅為散每服半錢匕溫酒調下小兒半字治急風吐痰方薺苨防風各二兩銼生薑汁二合上三味將前二味以水五盞煎取三盞每一盞入生薑汁半合空心服之良久即吐痰並惡物等治急風吐痰方桂去粗皮為末發灰研各一兩上二味和勻為散以好酒一升調灌之取吐凡中風人口噤或不咽藥即用黑豆三二升以青布裹於醋湯鐺內蘸及熱尉前後心並胸膈令風氣散即得藥下或炒鹽醋灰亦得治急風中人身背強直面黑鼻乾口噤不語歸命丸方蛇黃紫色者火煅令通赤取出以紙襯地上出火毒一宿杵羅為末研如面四兩鐵粉一兩豶豬糞用瓶子固濟燒才煙盡為度候冷研細二兩丹砂研半兩麝香研一錢上五味同研極細糯米粥和丸如雞頭大一切風用薄荷酒磨下一丸小兒半丸疳熱冷水磨一丸分作四服合時忌婦人雞犬見如有大人小兒中風口噤反張涎滿者灌下一服立省小兒被驚及發熱並以薄荷湯磨下少許此藥又名神穴丸合子排漆盤中日內曬之及干翻看每丸下有一小穴通丸內其藥中空也舊法須端午及甲午日合急即不須治中急風昏亂不識人丹砂丸方丹砂研牛黃研阿魏研龍腦研水銀天麻防風去叉芎藭細辛去苗葉羌活去蘆頭各一分麝香研二分烏雞血一兩烏蛇酒浸去皮骨炙二兩上一十三味各別為末先以酒二升煎蛇末令濃和前藥又以鹽米醋白礬末合研勻候色光白入銚內煮令熱下丹砂同煎結成砂子研和前藥丸如梧桐子大每服十丸熱酒下汗出即瘥治中急風營衛痹滯頭目昏暈額角偏痛手足無力舉動戰掉言語謇澀心神不寧透關丸方乳香研一兩麝香研半兩天麻半兩沒藥一兩研地榆一兩玄參一兩烏頭生去皮臍一兩甜瓜子一兩麻黃去根節二兩上九味同為末以酒一升慢火熬為膏更量入煉熟蜜同和為丸如梧桐子大每服三十丸溫荊芥湯下不計時候治急風不語兼注氣攻刺背痛方白附子炮白殭蠶炒天麻乾蠍酥炙各一兩白花蛇肉半兩酥炙胡粉一錢上六味搗研為末煉蜜和丸如梧桐子大每服二丸冷酒下再用熱酒投汗出即瘥治急風筋脈緊急身背強直面黑鼻乾口噤不語甚者壯熱汗出直視唇青涎盛咽塞紫金丸方烏頭生去皮尖四兩地龍去土炒木鱉子去殼各二兩白膠香研一兩乳香研沒藥研丹砂研各半兩五靈脂附子炮裂去皮臍白花蛇酒浸去皮骨炙天麻當歸切焙各一兩龍腦麝香研各一錢上一十四味搗研為末用辰月日時於辰方上取東流水和杵三千下丸如彈子大每服半丸生薑自然汁和酒磨下一切風隨證或乳香龍腦麝香薄荷茶酒臨時作湯使治急風手足拳攣不得屈伸大小便澀百節痛不能行大黃丸方大黃煨乾薑炮白殭蠶炒天麻白附子炮天南星炮附子炮裂去皮臍半夏湯洗去滑各一兩牛黃研半兩膩粉一分麝香研半分上一十一味搗研為末煉蜜和丸如雞頭大每服一丸冷酒化下卒中風論曰內經謂邪風之至疾如風雨言邪之迅速如此卒中風之人由陰陽不調腑臟久虛氣血衰弱營衛乏竭故風之毒邪尤易乘間而入卒致仆倒悶亂語言謇澀痰涎壅塞肢體𤸷痹不識人事者此其證也治卒中風暗風旋暈痰厥頭痛胸膈涎壅言語謇澀等疾牛黃丸方牛黃研一錢烏頭炮令開坼去皮臍一兩粉霜研半兩半夏湯洗七遍焙乾一分麝香研一錢丹砂研細一分上六味搗研和令勻生薑自然汁旋抄入臼內同前藥杵和為丸如梧桐子大每服一丸研薄荷自然汁少許和溫酒下疾甚者每服三丸研灌之治卒中風白殭蠶丸方白殭蠶炒白附子炮天南星炮桑螵蛸中劈破炒藿香葉乾蠍去土酒炒天麻烏蛇酒浸去皮骨炙麝香別研各一分天雄炮裂去臍皮一枚上一十味先將九味搗入麝香再拌令勻用糯米粥研如糊為丸如大麻粒別以膩粉為衣每服酒下七丸至十丸日二夜一治卒中風涎潮神靈散方粉霜一兩白麵少許滴水和作餅子炙令黃色為度丹砂研一錢硼砂研一錢牛黃研半錢龍腦一字細研上五味同研勻細每服一字匕煎陳粟米飲調下治卒中風昏昏若醉心神瞀悶四肢不收或倒僕不省或口角似斜微有涎出斯須不治便致殞絶此由風涎潮於上膈痹氣不通宜用救急稀涎散方皂莢如豬牙肥實不蚛者削去黑皮四挺白礬一兩通瑩者上二味為細末再研極細為散如有患者可服半錢重者三字匕溫水調灌下不大嘔吐只有微涎稀冷而出或一升二升當時省覺次緩而調治不可便大攻之過則傷人治卒中風諸風天麻丸方天麻一分蠍梢一分炒天南星生去臍白殭蠶炒白附子炮烏蛇酒浸去皮骨炙各半兩丹砂別研麝香各一分別研上八味搗研為細末煉蜜和劑丸如雞頭大每服一丸嚼破茶酒任下如牙關緊急用少許揩牙即開治卒中風口眼喎斜手足不遂白丸子方天南星半夏各半兩白殭蠶乾蠍去土胡粉膩粉麝香各一分研上七味並生用搗研如粉用糯米粥和劑丸如緑豆大每服二丸至三丸嚼破溫酒下荊芥薄荷湯下亦得如中風口噤研化灌服之治中風卒倒不省人事口面喎斜失音不語但吐涎沫或口噤不開目瞑垂死一切風疾奪命散方黑豆一合烏雞糞馬牙硝研龍膽去蘆頭銼碎各一分上四味先將雞糞及豆同炒熟次入龍膽馬牙硝拌勻以酒三盞煎二盞去滓分三服不拘時溫服治丈夫婦人卒中惡風熱涎潮壅手足麻痹齒噤不開語言不得或暴風搏於腠理渾身壯熱頭目昏眩心躁煩熱及小兒急慢驚風等疾天麻丸方天麻地榆木香防風去叉烏頭去皮生用丁香各半兩丹砂二錢研麝香研龍腦研牛黃各一錢半研自然銅半兩火煅紅以米醋浸又煅凡十餘次水洗去灰研上一十一味除丹砂自然銅麝香龍腦牛黃別研外六味焙乾搗羅為細末同前藥拌勻煉蜜和丸搗治得所新瓦合盛貯旋丸大人如櫻桃大小兒如豆大加減每服一丸日午晚後用薄荷熟水嚼下治卒中風四肢不仁芎藭湯方芎藭一兩半黃芩去黑心一兩乾薑炮一兩當歸切焙一兩半桂去粗皮二兩杏仁去皮尖雙仁炒三分秦艽去苗土一兩甘草炙銼一兩黃連去須一兩麻黃去節煎掠去沫焙乾一兩上一十味粗搗篩每服五錢匕水一盞半煎取八分去滓溫服日三夜二治卒中風精神悶絶及中惡不省人事返魂丹方玳瑁鎊丹砂別研雄黃作皂子大醋煮三復時各半兩白芥子一分上四味同研極細瓷器中熔安息香和丸緑豆大若重五日丸之益妙此丹兼治一切風卒中風不語狀如中惡或因上廁得惡風倒僕或暴卒者若不是暑月或經宿未致臭敗者以丹二丸木尺斡開口令人扶起頭熱醋湯灌下此丹入口後以手輕輕椎拍亡人背上至項但得此丹入口過咽喉良久氣來即眼開十可救八九返還再活凡常中風但以酒下二丸至重者十丸立瘥小兒熱毒風小便下二丸治卒中風涎潮精神昏塞青金丸方半夏生薑水洗七遍焙乾取末三錢滑石三錢研膩粉一分研水銀鉛結作沙子皂莢子大研續隨子一百粒去殼研青黛二錢研龍腦一錢研麝香一錢研上八味研勻滴水和丸如豌豆大煎蔥白湯化下五丸至七丸治卒中風救生散方白礬半夏湯洗去滑焙天南星三味等分生用上三味為細散每服以好酒一盞藥末二錢匕生薑三片煎七分通溫灌之當吐涎扶令正坐經一復時不得令臥如臥則涎難出良久再依法煎藥一錢後常服只半錢治卒中風山梔子丸方山梔子去皮山茱萸地榆洗銼桔梗炒細辛去苗葉炒羌活去蘆頭獨活去蘆頭麻黃去節煎掠去沫焙甘草炙銼鹿茸酒浸炙去毛虎骨塗酥炙令黃色紫菀去苗土白芷微炒藁本去苗土紅藍花微炒防風去叉烏蛇酒浸去皮骨炙桂去粗皮各半兩胡椒乾薑炮各一分上二十味搗羅為末一半為散余煉蜜和丸如梧桐子大不論破傷風急風慢風癱瘓風洗頭沐浴中風口眼喎斜及妊娠産後風並得服之所患深重日久以生薑薄荷荊芥酒內調下散半錢下藥三丸至五丸立效甚者豆淋薄荷酒調散半錢至二錢匕下七丸至十丸日三夜一治卒中風涎潮發搐金虎丹方天竺黃末雄黃研水飛白礬研各二兩丹砂研水飛天雄炮裂去皮臍膩粉研各一兩龍腦半錢研牛黃一分研上八味為細末煉蜜和得所稱一兩二錢為十丸大人中風用藥一丸入膩粉少許新汲水化下常服每丸分四服小兒分八服新汲水化下治卒中風倒悶口噤不語昏不知人針灸不知痛處䈽竹瀝飲方䈽竹瀝五合防風去叉甘草炙桂去粗皮各一兩防己麻黃去根節白朮人參黃芩去黑心細辛去苗葉茵芋秦艽去土附子炮裂去皮臍各一兩生薑三兩切焙乾上一十四味除竹瀝外銼如麻豆每服五錢匕水一盞半竹瀝一合同煎至一盞去滓溫服不拘時治卒中惡風口噤不能言肢體緩軟心神恍惚防風湯方防風去叉赤芍藥獨活去蘆頭黃芩去黑心枸杞根芎藭防己白朮烏頭炮裂去皮臍甘草炙銼茵芋各二兩麻黃去根節生薑切焙各三兩細辛去苗葉桂去粗皮白茯苓去黑皮各一兩上一十六味銼如麻豆每服三錢匕水一盞研石膏一錢匕同煎至七分去滓溫服不拘時治卒中風悶亂語言謇澀牙關緊急羌活湯方羌活去蘆頭桑根白皮麻黃去根節天雄炮裂去皮臍當歸切焙各二兩桂去粗皮旋覆花微炒遠志去心各一兩大腹皮銼甘草炙銼芎藭威靈仙去苗土枳殼去瓤麩炒菖蒲各一兩半杏仁湯浸去皮尖雙仁炒二十一枚上一十五味銼如麻豆每服五錢匕水一盞半入生薑三片煎至八分去滓溫服不拘時治卒中風忽然仆倒悶亂言語謇澀痰涎壅塞透羅丸方水銀用煉淨者黑錫一分結為沙子粉霜乾蠍全者炒各一分天南星半分生用膩粉一錢龍腦麝香各半錢上七味先杵天南星乾蠍細羅了同前五味入乳鉢細研入石腦油和丸如梧桐子大每服三丸溫薄荷水化下大段即加二丸小兒十歲以上兩丸一丸臨時相度虛實與吃治腑臟久虛氣血衰弱卒中風邪及癱瘓等疾阿膠