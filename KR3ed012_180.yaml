body:
  text: 卷第一百八十小兒鼻齆塞論曰肺氣通於鼻鼻和則知香臭小兒鼻齆塞者肺氣不利也肺主氣諸陽之氣上榮頭面其氣不和風冷乘虛客於腦與氣停滯搏於津液鼻道壅遏故為鼻齆塞治小兒齆鼻黃連丸方黃連去須一兩一分艾葉炒升麻各三分防風去叉半兩朴硝二兩大黃銼炒三分上六味搗為細末煉蜜和更搗一二百下丸如綠豆大每服三五丸溫水下食後臨臥服隨兒大小加減治小兒鼻塞不通利丹參膏方丹參細辛去苗葉芎藭當歸銼焙桂去粗皮防風去叉各一兩蜀椒去目並閉口者炒出汗乾薑炮各半兩上八味銼如麻豆大豬脂五兩羊髓五兩與藥相和入銚子內慢火熬候藥黃色取下絞去滓貯瓷器中每以大豆許納鼻中日三治小兒囟氣虛腫鼻塞不通白芷膏方白芷細辛去苗葉木通銼當歸切焙各半兩上四味銼如麻豆大以羊髓四兩與藥同入銚子內慢火熬候白芷黃成膏絞去滓貯瓷器中每用少許敷囟上兼納鼻中治小兒鼻塞不通細辛膏方細辛去苗葉木通銼辛夷各一分杏仁湯浸去皮尖雙仁炒半兩上四味銼如麻豆大以羊髓豬脂各三合同藥入銚子內慢火熬候色黃絞去滓瓷器中貯之塗鼻內治小兒鼻齆不聞香臭龍腦散方龍腦研一字瓜蒂十四枚赤小豆七粒黃連去須半錢上四味先以三味為細散入研者藥和勻臨臥粟米許吹入鼻中少頃有清水出治小兒鼻塞不通不能乳木香膏方木香零陵香各一兩上二味為細末用醍醐三合與藥末同入銚子內煎成膏用塗頭上及鼻中如小豆許日再治小兒鼻塞生肉細辛散方細辛去苗葉木通銼各一兩上二味為細散以綿纏裹大豆許納鼻中日再治小兒鼻塞不通羊髓膏方羊髓薰陸香各三兩上二味於銚子中慢火熬成膏去滓入瓷器中盛貯以膏摩背候鼻通為效小兒鼻多濁涕論曰人之津液涕唾得熱則燥涸得冷則流溢小兒因解脫不時風冷傷於肺經或冷中囟戶皆令兒涕液不收蓋肺氣通於鼻腦液下通於鼻故也治小兒鼻多濁涕菊花湯方甘菊花擇甘草炙各一分防風去叉半兩山茱萸七枚上四味粗搗篩每服一錢匕水一盞煎至六分去滓分溫三服早晨日午晚後各一更量大小加減治小兒肺傷冷鼻流濁涕前胡橘皮湯方前胡去蘆頭陳橘皮湯浸去白焙各半兩白茯苓去黑皮桂去粗皮白朮人參細辛去苗葉甘草炙各一分上八味粗搗篩每服一錢匕水一盞煎至五分去滓溫服日三隨兒大小加減治小兒腦戶傷風冷鼻多濁涕精神昏悶防風湯方防風去叉甘菊花擇白朮人參細辛去苗葉白茯苓去黑皮甘草炙銼各一分上七味粗搗篩每服一錢匕水一盞入生薑少許同煎至五分去滓溫服不拘時更量大小加減治小兒鼻塞多涕杏仁膏方杏仁湯浸去皮尖雙仁炒半兩蜀椒去目並閉口者炒出汗附子炮裂去皮臍細辛去苗葉各一分上四味除椒外銼如麻豆大以醋五合漬藥一宿明旦以豬脂半斤與藥相和入銚子內慢火同熬候附子黃成膏去滓取出貯瓷器內放冷取塗鼻中兼摩頂上日三五度治小兒肺寒鼻多濁涕精神不爽不思乳食通肺湯方人參前胡去蘆頭細辛去苗葉杏仁湯浸去皮尖雙仁麩炒黃桂去粗皮甘草炙各一分上六味粗搗篩每服一錢匕水一盞入生薑少許棗一枚擘破煎至五分去滓溫服不拘時量大小加減治小兒風冷傷囟鼻塞多涕細辛膏塗方細辛末一兩麻油二合上二味以油煎細辛令微黑入蠟半兩候消令凝每日薄塗囟上日三易小兒腦熱鼻乾無涕論曰肺氣通於鼻鼻上通於腦腦髓下滲而為涕故涕為肺之液而其出從鼻小兒肺臟壅滯內有積熱上攻於腦津液內涸故令鼻乾無涕也治小兒腦熱鼻乾無涕升麻丸方升麻防風去叉梔子仁各半兩上三味搗羅為末青羊腦髓和丸如麻子大一二歲每服三丸溫熟水研化下食後午時臨臥各一量兒大小加減治小兒腦熱鼻乾燥常閉目黃芩湯方黃芩去黑心青葙子大黃銼炒各半兩蜀漆甘草炙各一兩上五味粗搗篩五六歲兒每服一錢匕水一盞煎至五分去滓放溫食後日二服量大小加減治小兒腦熱鼻乾無涕茯神湯方茯神去木栝蔞根麥門冬去心各一兩黃耆銼一兩半生乾地黃洗焙三兩酸棗仁炒半兩羌活去蘆頭葛根銼羚羊角鎊各一分上九味粗搗篩每服一錢匕水七分浸藥良久煎至四分去滓放溫服日三食後良久治小兒腦熱鼻乾無涕藁本湯方藁本去苗土銼一分羚羊角鎊防風去叉各一兩芎藭菊花去萼爁細辛去苗葉白朮人參柴胡去苗白蒺藜微炒山梔子仁白茯苓去黑皮各半兩甘草炙黃芩去黑心各一分上一十四味粗搗篩每服一錢匕水七分入青竹葉五片同煎至四分去滓澄清放溫細呷食後日再治小兒腦熱鼻乾無涕犀角散方犀角鎊半兩升麻惡實微炒各一兩麥門冬去心焙茯神去木百合桑根白皮炙銼大黃銼炒柴胡去苗山梔子仁枳殼去瓤麩炒各半兩甘草炙銼桔梗炒黃芩去黑心各一分上一十四味粗搗篩每服一錢匕水七分煎至四分去滓放溫食後臨臥服治小兒腦熱肺壅鼻乾無涕喘息不得柴胡煎方柴胡去苗麻黃去根節湯煮掠去沫甘草炙木通銼紫菀去苗土五味子大青干百合各一兩半款冬花藍葉人參赤茯苓去黑皮各三分大黃銼炒半兩酥一斤蜜煉熟去白沫一斤上一十五味除酥蜜外細銼水七升慢火煎至三升去滓入酥蜜同熬成煎瓷器盛五六歲兒食後溫熟水調下一錢匕日三看病輕重量大小加減治小兒腦熱鼻乾無涕大黃湯方大黃銼炒柴胡去苗防風去叉甘草炙各一分上四味粗搗篩每服一錢匕水七分煎至三分去滓放溫食後臨臥各一服量兒大小加減治小兒腦熱黃瘦黃連汁方黃連半兩上一味粗搗為末童子小便一盞浸一宿每日取清汁半合服之量大小加減治小兒鼻乾身熱韭根汁方韭根上一味搗取汁澄清兩鼻孔各滴如黑豆許勿多多則有毒治小兒腦熱鼻乾白礬塗方白礬生末黃米粉各一兩上二味每用一錢匕清水半合調如泥塗腦上日三兒多涕論曰鼻之氣有出有入入則畀內已而復出出則畀外已而復入肺開竅於鼻肺氣不和風冷乘之使氣道遏而不通則風冷與氣上畀蒸而為液其液復畀於上故令鼻多涕治小兒肺寒鼻多清涕精神不爽減乳食人參湯方人參前胡去蘆頭細辛去苗葉杏仁湯浸去皮尖雙仁麩炒桂去粗皮甘草炙銼各一分上六味粗搗篩每服一錢匕水半盞入生薑少許棗一枚擘破煎至三分去滓溫服不拘時更量兒大小加減治小兒肺臟傷冷鼻流清涕前胡湯方前胡去蘆頭陳橘皮湯浸去白焙各半兩白茯苓去黑皮桂去粗皮白朮人參甘草炙銼細辛去苗葉各一分上八味粗搗篩每服一錢匕水半盞煎至三分去滓溫服日三更隨兒大小加減治小兒腦戶傷於風冷鼻內多涕精神昏悶甘菊花湯方甘菊花白朮細辛去苗葉白茯苓去黑皮防風去叉人參甘草炙銼各一兩上七味粗搗篩每服一錢匕水半盞入生薑少許煎至三分去滓溫服不拘時更量大小加減治小兒風傷囟門致鼻塞不通塗囟方麻油二合細辛末一兩上二味同煎微黑色入蠟半兩熔化停凝每日三度薄塗之小兒喉痹論曰喉痹之病喉中腫塞痹痛水飲不下呼吸有妨寒熱往來得之風熱客於脾肺熏發咽喉小兒純陽尤多是疾若不速治毒邪入心則煩悶懊憹立致危殆治小兒喉痹由脾肺蘊熱血氣結塞慎勿刺破但以此方治之木通湯方木通銼一兩升麻一分大黃銼炒一分麻黃去根節一分犀角鎊一分石膏碎半兩甘草炙一分上七味粗搗篩每服二錢匕水一盞煎至七分去滓下朴硝末一錢匕攪勻再煎一二沸分溫二服早食後臨臥各一服五歲以上以意加之治喉痹水漿不下備急三物丸方大黃銼炒乾薑炮巴豆去皮心別搗如脂上三味等分先搗二味為細末入巴豆再研煉蜜丸如綠豆大每服三丸溫水下取利為度治小兒喉痹咽喉傍腫如癧子身體壯熱如不作顆結空氣急喉中噎塞即是肺脹犀角湯方犀角鎊屑一分射干一兩桔梗炒絡石升麻甘草炙山梔子仁各一分上七味粗搗篩每服二錢匕以水一盞煎至六分去滓下朴硝末半錢匕攪令勻分溫三服早晨日午臨臥各一治小兒喉痹咽喉傍腫如癧子身體壯熱如不作顆結空氣急喉中噎塞即是肺脹射干湯方射干升麻百合木通銼桔梗炒甘草炙各一分上六味粗搗篩每用一錢匕以水七分煎至四分去滓下馬牙硝末半錢匕攪勻食後細細溫呷治小兒喉痹痛咽塞不利羚羊角湯方羚羊角鎊屑一分升麻三分射干陳橘皮湯浸去白焙各一分白藥半兩上五味粗搗篩每服一錢匕以水七分煎至四分去滓分溫二服早晨日午夜臥各一五歲以上以意加減治小兒喉痹上焦積熱壅毒天竺散方天竺黃馬牙硝甘草炙各半兩蛤粉白者二兩丹砂研一分上五味搗研為細散每服半錢匕取新汲水揉薄荷相和入龍腦少許量兒大小湯化服之食後臨臥治小兒喉痹咽喉傍腫喉中噎塞麻黃湯方麻黃去根節半兩桂去粗皮一分射干一分杏仁湯浸去皮尖雙仁炒一分上四味粗搗篩每服一錢匕以水七分煎至四分去滓食後分溫二服治小兒走馬喉痹白礬散方白礬煅焙研一兩硝石研雄黃研各一分苦參末半兩上四味同研為細散每服半錢匕冷水調下並三服治小兒喉痹馬蘭湯方馬蘭子炒升麻各一分上二味粗搗篩每服一錢匕水半盞煎至三分去滓下白蜜少許攪勻分溫二服如無馬蘭子即用根少許入水搗絞取汁細呷治小兒喉痹方葛蔓上一味燒為灰水服一錢匕治小兒喉痹方棘刺上一味燒灰水調服半錢匕又方魚膽二七枚上一味以灶下黃土同研塗吹喉中立瘥小兒重舌論曰小兒童舌者舌本之下或如臥蠶亦如小舌之狀此由心脾二臟壅熱所致蓋心主舌脾之絡脈連舌本散舌下故二臟有熱熱隨脈上至於舌本之下血脈脹起變生重舌宜急治之刺法中論刺舌下兩邊出血後以藥治之不然即滿口塞喉便致危殆治心脾經為邪熱所客重舌腫脹語聲不出水飲不下三物備急丸方大黃銼炒乾薑炮巴豆去皮心膜各等分上三味搗研為末煉蜜丸如綠豆大每服五丸溫水下大便利為度治小兒重舌強不能收唾鹿角散方鹿角末一兩上一味每用少許敷舌上日三度治小兒重舌口中生瘡涎出桂礬敷方桂去粗皮一分白礬燒令汁盡半分上二味搗研為末干敷舌上日三又方蒲黃露蜂房各一分白魚燒灰一錢上三味都研令勻用酒少許調敷重舌上日三治小兒重舌蛇蛻皮方上取蛇蛻皮燒作灰塗舌下一法以醋調鵝毛掠舌下愈又方上以烏賊魚骨燒灰和雞子黃塗喉及舌上瘥又方上取黃柏以竹瀝漬取汁細細點口中良又方上以嚼粟哺之瘥治重舌衣魚散方上取衣魚燒作灰敷舌上治小兒重舌口中瘡涎出蒲黃敷方上以蒲黃敷舌上不過三次愈治小兒重舌欲死者方上取亂髮燒灰敷舌下良治小兒重舌木蘭皮方上取木蘭皮一尺廣四寸削去粗皮細銼以苦酒一升煮取半升適寒溫漬兩手食頃間小渴須臾干復漬兩足出干復漬大良治小兒重舌方上燒甑帶灰敷之又方上取桑汁塗乳飲之小兒木舌論曰小兒木舌者以心氣蘊熱熱氣隨脈上至於舌則血脈脹起漸漸腫大滿口塞喉若不急治便致危殆經云蓄則腫熱砭射之也先宜砭射後以藥治之治小兒木舌腫脹滿塞口中三物備急丸方大黃銼炒巴豆去心皮研乾薑炮各等分上三味搗研為末煉蜜為丸如綠豆大每服五丸溫水下大便利為度治小兒木舌紫雪散方紫雪細研一分竹瀝上二味每用紫雪一字竹瀝少許調服一日四五服治小兒木舌方衣中白魚五枚朴硝研一分鹽半錢上三味搗研