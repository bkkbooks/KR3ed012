body:
  text: 卷第一百一十六鼻門鼻統論論曰肺為五臟華蓋開竅於鼻肺氣和則鼻亦和肺感風冷則為清涕為齆為息肉為不聞香臭肺實熱則為瘡為痛膽移熱於腦則濁涕不已謂之鼻淵惟證候不同故治療亦異鼻塞氣息不通論曰鼻塞氣息不通者以肺感風寒其氣搏結不得宣快窒塞既甚而息不能出入也巢氏謂息肉生長致氣窒塞不通蓋有末嘗生息肉而氣息不通者宜析而治之治鼻塞氣息不通蜀椒湯方蜀椒去目及閉口者炒出汗半兩乾薑炮一分附子炮裂去皮臍半兩桂去粗皮一分山芋三分細辛去苗葉半兩石斛去根一分山茱萸半兩杏仁五十粒去皮尖雙仁炒研麻黃去根節白附子炮甘草炙各半兩上一十二味銼如麻豆每服二錢匕水一盞煎至七分空心去滓溫服治肺風上攻鼻塞不通人參湯方人參白茯苓去黑皮黃芩去黑心陳橘皮湯浸去白炒麻黃去根節蜀椒去目及閉口者炒出汗羌活去蘆頭各半兩上七味粗搗篩每服三錢匕水一盞半煎至七分去滓食後溫服治肺傷寒氣咳嗽唾痰聲重鼻塞補肺杏仁煎方杏仁去皮尖雙仁二兩研棗肉煮去皮核一升白蜜酥生薑汁各半升餳一升上六味合和於銀石器中微火煎攪候熟每服一匙頭溫酒調下食後治肺風上攻鼻塞不通人參丸方人參防風去叉細辛去苗葉黃耆銼沙參木通銼甘菊花微炒各半兩上七味搗羅為末煉蜜和丸如梧桐子大每服十丸溫水下日再治鼻窒塞氣息不通鐺墨散方鐺墨半兩上一味研羅為散每服二錢匕溫水調下治鼻窒塞氣息不通小薊湯方小薊一把淨洗上一味細銼以水二盞煎至八分去滓溫服治鼻中窒塞氣不通利木香膏方木香細辛去苗葉當歸切焙芎藭木通蕤仁研白芷各半兩上七味細銼內銀石器中入羊髓微火煎候白芷色黃膏成去滓澄凝每取小豆大內鼻中日再以瘥為度治鼻塞不通皂莢散方皂莢炙去皮並子細辛去苗葉辛夷蜀椒去目及閉口者炒出汗附子炮裂去皮臍各一分上五味搗羅為散每以少許吹入鼻中治鼻塞不利當歸膏方當歸切焙地燻草木通細辛去苗葉蕤仁研各三分芎藭白芷各半兩上七味細銼以羊髓四兩同內銀石器中入諸藥微火煎候白芷黃色去滓傾入閣中澄凝每以小豆大綿裹塞入鼻中日三熱者以黃芩梔子代當歸細辛治鼻窒塞不得喘息菖蒲散方菖蒲皂莢炙去皮並子各一分上二味搗羅為散每用一錢匕以綿裹時塞鼻中仰臥少頃治鼻窒塞氣息不通瓜蒂散方瓜蒂二十七枚上一味搗羅為散以少許吹入鼻中瘥治鼻窒塞氣息不通槐葉湯方槐葉一兩上一味以水三盞煮取二盞去槐葉下蔥白二寸豉一合更煎五七沸去滓分溫三服不拘時鼻塞不聞香臭論曰鼻有生息肉不知香臭者亦有無息肉不知香臭者生息肉不知香臭已列方劑此姑論鼻塞不聞香臭蓋鼻之窒塞或冷風乘肺或肺經壅熱冷熱固異其塞則一皆肺臟不和氣不宣通故也治塞者當審其冷熱治鼻塞不聞香臭款冬花丸方款冬花檳榔銼百合麥門冬去心焙桔梗炒天門冬去心焙地骨皮羚羊角鎊貝母去心山梔子仁大黃銼炒黃芩去黑心防風去叉杏仁去皮尖雙仁炒郁李仁去皮炒各二兩人參山芋柴胡去苗各一兩半百部甘草炙苦參各一兩桑根白皮銼旋覆花各四兩牛黃研木香各半兩蛤蚧一對全者酥炙上二十六味搗研為末煉蜜丸如梧桐子大每服二十丸至三十丸食後溫漿水下治頭旋鼻塞不知香臭蓯蓉丸方肉蓯蓉酒浸一宿切焙石鐘乳研成粉五味子菟絲子酒浸別搗蛇床子炒山芋各一兩澤瀉石斛去根甘菊花細辛去苗葉續斷鹿茸去毛酒浸炙防風去叉秦艽去苗土黃耆銼乾薑炮柏子仁別研各三分上一十七味除別研外搗羅為末同和勻煉蜜丸如梧桐子大每服二十丸空心溫酒下日再不飲酒棗湯下服藥三日後灸百會穴三七壯即貼如神膏如神膏方萆麻子去殼杏仁去皮尖印子鹽芎藭防風去叉松脂各一分蠟半兩油一升上八味先入油於銀器中次將諸藥作粗散入油中微火上煎成膏濾去滓瓷器盛每用約大小貼之日一換治鼻塞不聞香臭天門冬丸方天門冬去心焙白茯苓去黑皮各五兩人參枳實去瓤麩炒甘草炙各三兩檳榔銼二兩上六味搗羅為末煉蜜丸如梧桐子大每服二十丸食後漿水下日再暑月以牛乳下治肺實鼻塞不聞香臭百部散方百部二兩款冬花貝母去心白薇各一兩上四味搗羅為散每服一錢匕米飲調下治鼻塞不聞香臭防風湯方防風去叉半兩梔子去皮七枚升麻一兩石膏碎三兩麻黃去根節三分桂去粗皮半兩木通銼一兩一分上七味粗搗篩每服三錢匕水一盞煎至七分去滓空心溫服日再治鼻塞不通不聞香臭或生息肉生瘡排風散方防風去叉秦艽去苗土山芋吳茱萸湯浸焙炒天雄炮裂去皮臍各一兩羌活去蘆頭半兩上六味搗羅為散每服二錢匕空心溫酒調下治鼻中不利窒塞不聞香臭通氣膏方木通當歸切焙芎藭蕤仁桂去粗皮各半兩細辛去苗葉白芷各三分上七味細銼與羊髓三兩同於銀石器中微火煎候白芷黃色去滓澄凝每取小豆大塞鼻中日再治鼻塞不聞香臭甘遂散方甘遂細辛去苗葉附子炮裂去皮臍木通銼各一分上四味搗羅為散每以少許綿裹塞鼻中當有清水出病重者或清水下一二升臥時安藥若微痛當忍之勿觸風冷治鼻塞不聞香臭芎藭散方芎藭辛荑各一兩細辛去苗葉三分木通銼半兩上四味搗羅為散每以少許綿裹塞鼻中濕即易之五七日瘥治鼻塞不聞香臭通頂散方滑石研胡黃連末各一分瓜蒂為末七枚麝香研半兩蟾酥研一錢上五味同研勻每以少許吹入鼻中即瘥治鼻塞不聞香臭瓜蒂散方瓜蒂藜蘆各一分上二味搗羅為散每以一錢匕綿裹塞鼻中日三易治鼻塞不聞香臭細辛散方細辛去苗葉瓜蒂各一分上二味搗羅為散以少許吹鼻中齆鼻論曰鼻和則知香臭夫鼻為肺之竅非能自和也必肺氣流通然後鼻為用而香臭可知若心經移熱於肺致肺臟不和則其竅亦無以宣達故為齆鼻此乃內經所謂心肺有病則鼻為之不利者也治肺氣壅塞鼻齆不聞香臭茯神散方茯神去木一兩半山芋人參各二兩赤茯苓去黑皮防風去叉防己各一兩半蜀椒去目併合口者炒出汗一兩山茱萸一兩半甘菊花桂去粗皮細辛去苗葉芎藭貫衆白朮米泔浸一宿銼碎炒各一兩一分乾薑炮一兩甘草炙一兩半上一十六味搗羅為散每服二錢匕空心溫酒調下日再治齆鼻順肺氣四時服食黃耆散方黃耆銼人參防風去叉防己生乾地黃焙桔梗炒芍藥黃芩去黑心澤瀉石南葉紫菀去苗土桂去粗皮白朮米泔浸一宿銼甘草炙牛膝酒浸一宿切焙赤茯苓去黑皮各三兩上一十六味搗羅為散每服一錢匕溫酒調下如要丸煉蜜丸如梧桐子大每服三十丸亦溫酒下治齆鼻山茱萸丸方山茱萸菊花大黃銼炒各一兩一分獨活去蘆頭三分甘草炙銼防風去叉蔓荊實去白皮各一兩秦艽去苗土一兩半梔子去皮炒一兩附子炮裂去皮臍三分朴硝三兩三分上一十一味搗羅為末煉蜜丸如梧桐子大每服二十丸空心溫水下老人亦宜服妊娠人去附子加細辛半分治齆鼻雄黃丸方雄黃研一錢甘草炙銼附子炮裂去皮臍細辛去苗葉各一分上四味搗羅為末用羊膽汁和丸如棗核大以綿裹內鼻中移時出惡物即瘥治齆鼻方瓜蒂半兩細辛一分上二味搗羅為末以綿裹如棗核大塞鼻中須臾即透治齆鼻不聞香臭甘遂丸方甘遂細辛去苗葉木通銼附子炮裂去皮臍各一分上四味搗羅為末以羊膽汁和如棗核大以綿裹臥內鼻中覺微痛眼淚出鼻清涕流即通利慎風冷治齆鼻不聞香臭宜塞鼻細辛散方細辛去苗葉甘草炙木通銼附子炮裂去皮臍各一分上四味搗羅為散以羊膽汁和如棗核大塞鼻中治齆鼻不聞香臭窒塞氣不宣通塞鼻瓜蒂散方瓜蒂一分上一味搗羅為散以半錢匕綿裹夜臥塞鼻中旦即去之治齆鼻氣息不通煩悶灌鼻蒺藜苗汁方蒺藜子苗一把車輾過者無車輾過者採取令車輾之上一味搗碎以水濃煎濾去滓將汁入鼻中或已有息肉者因噴嚏出如赤蛹子瘥治齆鼻法伏面臨床以新汲水淋玉枕上即瘥治齆鼻吹鼻乾薑散方乾薑炮半兩上一味搗羅為散以少許吹入鼻中治齆鼻吹鼻皂莢散方皂莢一挺炙刮去皮子上一味搗羅為散以一字匕吹入鼻即瘥鼻中生息肉論曰鼻者肺之竅鼻和而知香臭風寒客於肺經則鼻氣不利致津液壅遏血氣搏結附著鼻間生若贅疣有害於息故名息肉治鼻中息肉羊肺散方羊肺一具薄切去筋膜炙令乾木通銼半兩白朮米泔浸一宿銼碎炒黃四兩肉蓯蓉酒浸一宿切焙乾薑炮裂芎藭各半兩上六味搗羅為散每服一錢匕食後米飲調下日二治鼻中息肉敷鼻雄黃散方雄黃研細辛去苗葉木通銼蕤仁研皂莢炙刮去皮並子各一分白礬煅過半兩礜石黃泥包煅過半兩藜蘆炙地膽瓜蒂地榆洗去泥土䕡茹各三分巴豆十粒去皮殼炒黃上一十三味搗羅為散煎細辛白芷湯和塗敷息肉上以膠清和塗之亦得取瘥為度治鼻中息肉吹鼻細辛散方細辛去苗葉瓜蒂等分上二味搗羅為散吹半錢入鼻中須臾嚏出頻吹取瘥治鼻生息肉礬石丸方礬石熬令汁枯四兩木通銼細辛去苗葉各半兩丹砂研一分上四味搗研為末和勻麵糊為丸如小豆大每用一丸綿裹內鼻中一日一易取下息肉則止治鼻中息肉敷鼻地膽膏方生地膽細辛去苗葉白芷上三味等分先搗羅白芷細辛為散將地膽壓取汁和成膏用少許塗敷息肉上治鼻中息肉敷鼻地龍散方地龍去土炒一分豬牙皂莢一挺上二味燒灰羅細先洗鼻內令淨以蜜塗之敷藥少許在內出清水盡即息肉自除治鼻中息肉不通敷鼻胡粉膏方胡粉炒白礬燒令汁盡等分上二味搗羅為末用青羊脂和成膏以少許塗敷息肉上治鼻中息肉敷鼻瓜蒂膏方陳瓜蒂一分上一味搗羅為末以羊脂和時以少許敷息肉上治鼻中息肉不通利敷鼻地膽汁方生地膽一枚上一味取汁塗息肉上一宿當消無生者搗乾者為末酒漬敷之治鼻生息肉不得息灌鼻藜蘆散方藜蘆微炙一分礬石燒令汁枯一分瓜蒂二十七枚附子炮裂去皮臍半兩上四味搗羅為散以酒調半錢內小竹筒中灌入鼻孔以綿塞之日三易佳治鼻中息肉雄黃散方雄黃五兩置沙鍋中以醋煮三復時取出薄醋洗過夜露曉收三度細研如粉上一味每服二錢匕溫水調下日再不出半月息肉自出神效治鼻塞息肉不通方上以細辛末少許吹入鼻中自通治鼻有息肉齆鼻氣息不通煩悶灌鼻蒺藜苗汁方蒺藜子苗一把車輾過者無車輾過者採取令車輾上一味搗碎以水濃煎濾去滓將汁入鼻中息肉因噴嚏出如赤蛹子瘥鼻痛論曰九竅氣所通也或塞之斯痛矣況鼻之為竅肺氣所恃以出納若肺受風邪與正氣相搏熱氣加之不得宣通則為出納者窒矣其竅既窒而氣之鼓作無已所以乾燥而痛也治風熱壅塞鼻乾痛腦悶頭重不知香臭五參散方人參沙參丹參玄參苦參山芋茯神去木各一兩半獨活去蘆頭細辛去苗葉麻黃去根節木通銼羚羊角鎊防風去叉白蘚皮各一兩一分山茱萸甘菊花芎藭各一兩上一十七味搗羅為散每服三錢匕米飲調下早晚各一治鼻痛沒藥散方沒藥研一分烏蛇酒浸去皮骨炙半兩乾蠍去土炒天南星炮雄黃別研當歸切焙白附子炮丹砂別研牛黃別研胡黃連白芷麝香別研丁香炒甘草炙桂去粗皮各一分上一十五味除別研外搗羅為散再同研勻每服半錢匕溫酒調下早晚食後服治肺壅氣促四肢痠疼鼻塞及痛桑白皮湯方桑根白皮切升麻甘草炙秦艽去苗土大黃銼炒各一兩半石膏碎葛根各三兩上七味粗搗篩每服五錢匕水一盞半入竹瀝一合煎至一盞去滓早晚食後臨臥溫服治肺受風面色枯白頰時赤皮膚乾燥鼻塞干痛此為虛風白蘚皮湯方白蘚皮麥門冬去心焙白茯苓去黑皮白芷各一兩半桑根白皮切石膏碎各二兩細辛去苗葉杏仁去皮尖雙仁炒研各一兩半上八味粗搗篩每服三錢匕水三盞煮大豆三合取汁一盞去豆下藥煎取七分去滓早晚食後臨臥溫服治因高聲呼吸冷風或因哀哭傷氣或飲食熱氣所沖皆致傷肺使氣喘促皮膚風癢四肢痠疼鼻塞干痛秦艽湯方秦艽去苗土石膏碎桑根白皮銼甘草炙升麻大黃銼炒各一兩枳殼去瓤麩炒葛根各三分上八味粗搗篩每服三錢匕水一盞入淡竹瀝半合煎至七分去滓溫服治肺風面色乾白鼻燥塞痛羚羊角湯方羚羊角鎊桂去粗皮白茯苓去黑皮細辛去苗葉杏仁去皮尖雙仁炒研麻黃去根節防風去叉防己麥門冬去心焙各一兩上九味粗搗篩每服三錢匕以水一盞煎至七分去滓溫服治鼻塞干痛油塗方生油一盞上一味常以雞羽掃塗鼻中酥亦得治鼻塞疼痛腦悶方苦葫蘆子碎上一味以醇酒半升浸之夏一日冬七日少少內鼻中鼻淵論曰內經謂膽移熱於腦則辛頞鼻淵者濁涕下不止也夫腦為髓海藏於至陰故藏而不瀉今膽移邪熱上入於腦則陰氣不固而藏者瀉矣故腦液下滲於鼻其證濁涕出不已若水之有淵源也治或失時傳為衄衊瞑目治腦熱鼻淵下濁涕不止防風散方防風去叉一兩半黃芩去黑心人參甘草炙銼芎藭天門冬去心焙各一兩上六味搗羅為散每服二錢匕食後沸湯調下日三治腦熱鼻塞多涕前胡湯方前胡去蘆頭木通銼石膏各二兩黃芩去黑心甘草炙銼各一兩半大黃銼炒一兩上六味粗搗篩每服三錢匕水一盞入蔥白一寸豉二十粒生薑一棗大切煎至七分去滓溫服不拘時治腦熱肺壅鼻淵多涕雞蘇丸方雞蘇葉乾者麥門冬去心焙桑根白皮銼芎藭黃耆炙銼甘草炙銼各一兩生乾地黃切焙二兩上七味搗羅為末煉蜜和丸如梧桐子大每服二十丸食後臨臥人參湯下治腦熱鼻淵多涕芎藭散方芎藭莎草根炒各二兩石膏研水飛一兩龍腦研一分上四味搗研為散每服二錢匕食後荊芥臘茶清調下治肺壅腦熱鼻淵不止荊芥散方荊芥穗藿香葉各一兩芎藭莎草根炒去毛各二兩石膏研如粉一兩半龍腦研一錢上六味搗研為散每服二錢匕食後荊芥湯調下治肺熱鼻塞多涕辛夷膏方辛夷一分白芷三錢藁本去苗土甘草當歸各半兩上五味細銼以清酒二盞羊髓十兩銀器內微火煎五七沸傾入閣中澄凝每取豆許內鼻中日夜各一鼻流清涕論曰五臟化液遇熱則乾燥遇寒則流衍鼻流清涕至於不止以肺臟感寒寒氣上達故其液不能收制如此且涕泗洟皆鼻液也以繼泣則曰涕以生於肺則曰泗涕甚曰洟此獨言涕與宣明五氣言肺為涕同意治鼻出清涕五味子湯方五味子山芋各一兩半夏湯洗去滑三分鹿茸酒浸一宿酥炙白朮米泔浸一宿銼炒各一分附子炮裂去皮臍牛膝酒浸切焙甘草炙銼檳榔銼熟乾地黃焙乾薑炮裂各半兩白豆蔻去皮木香丁香各一分白茯苓去黑皮三分上一十五味粗搗篩每服二錢匕水一盞煎至七分去滓空心溫服治腦冷鼻塞時出清涕細辛丸內鼻方細辛去苗葉桂去粗皮甘遂炒芎藭附子炮裂去皮臍各一分辛夷半兩木通銼二兩上七味搗羅為末煉蜜和拈如棗核大以綿裹內鼻中勿令氣泄覺小痛搗生薑汁和拈即愈一方用狗膽和丸治鼻多清涕甘遂丸內鼻方甘遂一兩細辛去苗葉一兩半附子炮裂去皮臍木通銼各一兩一分乾薑炮裂吳茱萸湯浸焙乾炒桂去粗皮各一兩上七味搗羅為末煉蜜和拈如棗核大以綿裹內鼻中仰臥即涕出日三易之避風以瘥為度治鼻多清涕細辛膏方細辛去苗葉蜀椒去目及閉口者炒出汗桂去粗皮芎藭吳茱萸湯洗焙炒各三分皂莢炙刮去皮並子半兩附子炮裂去皮臍二兩上七味細銼以醋浸一宿入豬脂於銀器中微火煎候附子色黃去滓傾入閣中澄凝以綿裹少許內鼻中兼以摩頂上治鼻塞多清涕芎藭膏方芎藭吳茱萸湯洗焙乾炒細辛去苗葉蜀椒去目及閉口者炒出汗乾薑炮裂皂莢炙刮去皮並子各三分上六味細銼以醋浸一宿內豬脂於銀器中煎候五七沸去滓傾入閣中澄凝以綿裹少許內鼻中治鼻久塞清涕不止杏仁膏方杏仁湯浸去皮尖雙仁二兩附子炮裂去皮臍一兩半細辛去苗葉蜀椒去目及閉口者炒出汗各一兩上四味細銼以醋浸一宿用煉成豬脂一斤銀器盛微火煎之候附子黃色去滓傾入閣中澄凝以綿裹少許內鼻中治鼻塞多年清水出不止灌鼻黃連汁方黃連去須二兩蒺藜苗二握上二味細銼水二升煎至一升取一合灌鼻中不過再灌大嚏即瘥治鼻塞清水久不止灌鼻蒺藜汁方蒺藜苗一握上一味細銼以水三盞煮至一盞去滓仰面先滿口含飯取汁一合灌鼻中不過再灌嚏出息肉瘥鼻中生瘡論曰心肺有病鼻為之不利蓋心肺在膈上肺開竅於鼻心肺壅熱氣熏於鼻間蘊積不散其證乾燥而痛甚則成瘡也惟能平調心火以利肺經則瘡可已治鼻中生瘡烏犀丸方烏犀細鎊一兩羚羊角細鎊一兩胡黃連半兩貝母微炒去心半兩知母焙三分麥門冬去心焙三分天門冬去心焙半兩甘草炙一分黃芩去黑心一分人參半兩牛黃一兩別研丹砂半兩別研柴胡去苗一兩上一十三味除別研外搗羅為末入別研藥更同細羅煉蜜和丸如梧桐子大每服二十丸空心溫酒下治鼻中生瘡咽喉閉塞及乾嘔頭痛食飲不下前胡湯方前胡去蘆頭三分升麻一兩木通銼一兩黃柏微炙一兩玄參一兩大青三分麥門冬去心焙三分芒硝一兩青竹茹三分上九味粗搗篩每服三錢匕以水一盞煎至七分去滓食後溫服日再治肺風虛熱氣脹鼻中生瘡喘息促急時復寒熱白蘚皮湯方白蘚皮玄參葛根銼白前大黃銼碎微炒各二兩知母焙鱉甲醋浸炙去裙襴秦艽去苗土各一兩半上八味粗搗篩每服三錢匕以水一盞入童子小便少許同煎至七分去滓溫服如人行四五里再服治鼻乾癢生瘡乾嘔不下飲食升麻湯方升麻桔梗炒黃芩去黑心犀角細鎊貝母微炮去心龍膽各半兩甘草炙一分上七味粗搗篩每服三錢匕以水一盞煎至七分去滓溫服不拘時候日三治鼻中生瘡辛夷膏方辛夷一分白芷半兩藁本去苗土甘草當歸去蘆頭各三分上五味細銼以清酒六合羊髓十二兩銀石器盛火上煎三五沸去滓傾入閣中澄凝以大豆許內鼻中日夜各一治鼻生瘡癢痛不止地黃煎方生地黃汁一合苦參銼一兩酥三合鹽花二錢後入生薑汁一合上五味先以地黃生薑汁浸苦參一宿以酥和於銅石器中煎九上九下候汁入酥盡去滓傾入閣中每以少許滴於瘡上諸風熱瘡亦佳其鹽花至半即下治肺氣風熱鼻內生瘡梔子煎方山梔子去皮殼苦參木通各三兩上三味細銼以四兩酥同煎令香濾去滓傾入閣中每以少許滴入鼻中治鼻中熱氣生瘡有膿臭兼有蟲滴鼻礬石煎方礬石一兩熬枯苦參生地黃洗令淨研絞取汁三合上三味粗搗二味為末以地黃汁並水二盞煎至三合綿濾去滓少少滴鼻中三五度瘥治鼻中生瘡敷鼻祀灶飯散方祀灶飯不限多少燒為灰上一味細羅為散以生油調塗敷之治鼻中生瘡敷鼻馬絆繩散方馬絆繩一條上一味燒為灰研細羅以少許糝敷瘡上治鼻中熱氣生瘡有膿臭兼有蟲黃柏飲方黃柏二兩去粗皮上一味以冷水浸一兩日絞取濃汁一盞服之疳蟲蝕鼻生瘡論曰五臟皆有蟲蟲得風則化肺開竅於鼻肺經既虛風熱乘之鼻氣壅塞不得宣通則疳蟲因得侵蝕瘡生鼻間治鼻疳瘡侵蝕鼻柱烏香散方草烏頭燒灰麝香研等分上二味同研細以少許貼瘡上治鼻中疳瘡有蟲礬石湯方礬石燒令汁枯研苦參各一兩生地黃三兩上三味銼二味如麻豆大與礬石拌勻以水八合煎取三合新綿濾過瓷器收盛時點鼻內治疳蟲蝕鼻生瘡方銅箸一隻上燒赤投醋中以醋少少塗之治疳熱蟲蝕鼻生瘡黃柏湯方黃柏去粗皮二兩上一味細銼以新水浸二日絞取濃汁一盞煎一沸溫服治鼻中疳瘡杏仁膏杏仁去皮尖不拘多少上一味研如膏以乳汁和塗瘡上治鼻中疳瘡方烏牛耳中垢上一味取少許敷瘡上治鼻中疳瘡方牛鼻津上一味取塗瘡上治疳蟲蝕人口鼻椿根湯方椿根切一升去皮鹽半合蔥白切半升豉半升椒去目及閉口者炒出汗一合上五味合和以醋及清泔各三升煎十數沸去滓約及一升分作三服有惡物下即效小兒量大小加減治疳蟲蝕人口鼻唇頰作瘡穿透者洗瘡銀屑方銀屑十兩上以水三升煎取一升一日三四度洗瘡仍於銅器中煎用治疳蟲蝕鼻生瘡及鼻下赤爛如聖散方胡粉半兩麝香研一字甜瓜蒂七枚為末入粉內同研上三味再同研勻用蟾酥少許水浸一宿次日取蟾水先和胡粉次同和丸如緑豆大每用二丸水化敷瘡上鼻下赤爛者塗赤爛處小兒每用一丸治疳蟲蝕鼻生瘡及鼻涕淹潰青金散方銅青白礬生研等分上二味同研為散每用少許敷瘡上小兒亦可用
