body:
  text: 卷第七十八下痢裡急後重論曰下痢裡急後重者有瘕聚也經所謂大瘕泄者裡急後重數至圊而不能便莖中痛是矣法當和氣而祛蘊滯則脾胃和平飲食腐化其膿血自消大腸自固也治裡急後重下痢赤白及下部㽲痛當歸散方當歸切焙黃連去須炒乾薑炮黃柏去粗皮蜜炙各一兩上四味搗羅為散每服三錢匕濃煎烏梅汁調下空心食前日二服若腹中㽲痛加當歸下赤加黃連下白加乾薑治後重下痢赤白滯下腹內結痛當歸黃連湯方當歸切焙三分黃連去須炒一兩半赤茯苓去黑皮三分地榆犀角屑三分甘草炙銼半兩厚朴去粗皮生薑汁炙一兩上七味粗搗篩每服五錢匕水一盞半入生薑一棗大拍碎同煎至八分去滓空心溫服日再治大病後重下赤白痢腹中㽲痛石鐘乳湯方石鐘乳別研半兩黃連去須炒一兩防風去叉附子炮裂去臍皮黃柏去粗皮蜜炙當歸切焙乾薑炮各一兩蜀椒去目並閉口者炒出汗半兩上八味除鍾乳外銼如麻豆再同和勻每服四錢匕水一盞半煎至八分去滓溫服空心食前日二服治冷熱不和下痢赤白臍腹作痛裡急後重聖功散方乾薑炮五倍子各一兩訶黎勒煨去核甘草炙銼各半兩上四味搗羅為細散每服二錢匕食前米飲調下治腸虛冷熱不和赤白下痢裡急後重訶黎勒湯方訶黎勒煨去核草豆蔻去皮炒延胡索各半兩乾薑炮一分上四味粗搗篩每服三錢匕水一盞煎至七分去滓食前溫服治後重下膿血如聖散方臭橘萆薢各一兩上二味同搗碎炒令煙出放冷搗羅為細末每服二錢至三錢匕茶清調下治臟氣不調裡急後重勻氣湯方蒼朮米泔浸一宿去皮切曝乾厚朴去粗皮生薑汁炙各四兩甘草生銼三兩乾薑生銼三分上四味粗搗篩每服三錢匕水一盞煎至六分去滓食前溫服夏末秋初最宜服治熱痢下重者白頭翁湯方白頭翁二兩黃柏去粗皮銼黃連去須秦皮銼各三兩上四味粗搗篩每服三錢匕水一盞煎至六分去滓食前溫服日二治冷痢裡急後重當歸丸方當歸切焙半兩胡椒炒一兩黃連去須厚朴去粗皮生薑汁炙各二兩阿膠炙燥一兩別為末乾薑炮一兩半上六味除阿膠搗羅為末用好醋調阿膠為膏和劑丸如梧桐子大每服十五丸食前橘皮湯下加至二十丸治腹痛虛滑裡急後重心胸痞悶逆滿或傷冷暴瀉手足厥冷脈息沉伏訶黎勒丸方訶黎勒炮去核一兩肉豆蔻去殼半兩白礬熬令汁枯一兩木香半兩龍骨二兩烏頭炮裂去皮臍縮沙仁各一兩上七味搗羅為末粟米粥和為丸如梧桐子大每服二十丸食前粟米飲下治臟寒下痢臍腹撮痛腸鳴脹滿裡急後重不思飲食日漸羸瘦勝金丸方黃連去須五兩龍骨四兩草豆蔻去皮赤芍藥當歸切焙乾薑炮地榆橡實各三兩干桑葉木香各二兩赤石脂代赭煅赤研各四兩上一十二味搗羅為細末醋煮麵糊和丸如梧桐子大每服二十丸至三十丸煎艾醋湯下空心食前服治洞泄飧泄裡急後重薑桂散方乾薑炮三兩甘草一兩銼二味用沙糖二兩水微化開同炒乾桂去粗皮一分上三味搗羅為散每服二錢匕白湯調下兼治腹痛止虛渴治膿血雜痢後重疼痛日久不瘥通神丸方沒藥五靈脂乳香各一錢巴豆霜半錢上四味各研細再同研勻滴水丸如黃米大每服七丸煎生木瓜湯下小兒三丸隨歲數加減空心食前服治下痢赤白日久不瘥裡急後重取冷積玉粉丸方白丁香直者研一兩粉霜研三分硫黃研膩粉研硇砂研各半兩乳香熔過研一分上六味再同研勻用生薑自然汁煮棗肉研和作劑每服旋丸如豌豆大臨臥煎生薑棗湯下七丸未動次夜服十丸老少以意加減治下痢赤白裡急後重大腸虛滑丹砂丸方丹砂研草烏頭末乳香研各一錢匕巴豆大者去皮心研七枚上四味再同研令勻細用醋煮麵糊和丸如梧桐子大每服一丸冷乳香湯下不拘時候治下痢腹脹裡急後重木瓜飲方乾木瓜焙白芷厚朴去粗皮生薑汁炙白朮銼炒木香各一兩桂去粗皮黃連去須當歸炙銼縮砂蜜去皮龍骨訶黎勒皮煨各一兩半陳橘皮去白焙三分杏仁去皮尖雙仁炒十五枚赤石脂三兩上一十四味粗搗篩每服五錢匕以水一盞半煎取八分去滓溫服痢兼渴論曰痢不瘥則腸胃虛弱津液減耗不能上潤於咽嗌故口舌焦乾而內煩使人引飲飲多則濕氣淫溢肌肉虛浮而痢亦不瘥也治下痢冷熱相沖臟腑氣不和順本來下虛津液耗少口乾咽燥常思飲水人初不許飲水毒氣更增煩躁轉甚宜急與湯飲救之不得令至過度止渴栝蔞根湯方栝蔞根銼甘草炙銼白茯苓去黑皮各半兩上三味粗搗篩每服五錢匕水一盞半麥門冬一分去心棗二枚劈破同煎至七分去滓不拘時溫服治久痢食即嘔吐煩渴不可忍烏梅湯方烏梅肉炒半兩黃連去須炒三分白茯苓去黑皮黃芩去黑心龍骨各半兩訶黎勒炮去核三分厚朴去粗皮生薑汁炙銼一兩阿膠炙令燥半兩上八味粗搗篩每服五錢匕漿水一盞生薑三片同煎至七分去滓空心溫服日午再服治痢後渴不止石膏丸方石膏別研入麥門冬去心焙栝蔞根茯神去木知母焙黃連去須枸杞根皮白茯苓去黑皮各一兩胡粉炒黃色半兩上九味搗研為末煉蜜丸如梧桐子大每服三十丸空心米飲下晚食前再服或作散冷熟水調二錢匕服亦得治下痢臟腑虛煩躁渴不止黃芩湯方黃芩三分去黑心稱石膏碎甘草炙銼枳殼去瓤麩炒黃柏去粗皮銼女萎栝蔞根銼白茯苓去黑皮各半兩櫸皮去粗皮銼淡竹葉各三分切上一十味粗搗篩每服五錢匕水一盞半煎至一盞去滓空心溫服未止再服小兒量大小服之治泄痢上膈虛熱煩渴引飲口瘡不下食困劣人參湯方人參白茯苓去黑皮木香麥門冬去心焙葛根銼前胡去蘆頭梔子仁黃耆銼陳橘皮湯浸去白焙訶黎勒炮去核各一兩半夏湯洗七遍焙二兩甘草炙銼半兩上一十二味粗搗篩每服四錢匕水一盞半生薑三片陳米一合同煎至七分去滓空心溫服日晚再服治下痢煩渴黃連丸方黃連去須炒二兩當歸切焙一兩烏梅肉炒半兩上三味搗羅為末煉蜜丸如梧桐子大每服三十丸空心米飲下日晚再服痢甚者熔蠟為丸服治熱痢黃膿發渴四肢煩悶黃連丸方黃連去須一兩半黃芩去黑心黃柏去粗皮各二兩熟艾葉炒一兩上四味搗羅為末煉蜜為丸如梧桐子大每服二十丸空心飯飲下日晚再服治痢兼渴麥門冬湯方麥門冬去心一兩半烏梅碎七枚上二味用水二盞煎取一盞去滓分溫二服空心晚食前服治吐痢後大渴飲水不止陳米湯方陳廩米水淘淨二合上一味用水二盞煎至一盞去滓空心溫服晚食前再煎服治痢後渴糯米汁方糯米二合上一味以水一盞半同研絞取汁空心頓服之痢兼腫論曰下痢身體浮腫者久痢所致也痢久則胃氣弱而腸虛胃者土也所以化水穀而充肌肉若胃土氣衰不能勝濕則水氣妄行流溢皮膚故痢而兼腫也得小便利者乃愈治夏月暴冷或壯熱泄痢引飲變遍身浮腫脈沉細小數澤漆湯方澤漆炒一兩半吳茱萸湯洗焙乾炒赤茯苓去黑皮白朮桔梗銼炒當歸切焙犀角鎊青木香海藻洗去咸焙芍藥大黃炒各二兩上一十一味銼如麻豆每服以水二盞煎藥五錢匕取八分去滓溫服下後休息五六日可與女曲散治利後虛腫水腫者服此藥小便利腫亦消女曲散方女曲二兩乾薑炮細辛去苗葉椒目微炒附子炮裂去皮臍桂去粗皮各一兩上六味搗羅為散酒服一錢匕不知加至三錢匕日三若婦人産後虛滿服此大良治痢後腫滿氣急喘嗽小便如血澤漆湯方澤漆葉微炒五兩桑根白皮炙令黃色銼郁李仁湯浸去皮尖炒熟各三兩杏仁湯浸去皮尖及雙仁者炒香人參各一兩半白朮銼炒陳橘皮湯浸去白焙乾各一兩上七味粗搗篩每服五錢匕水一盞入生薑三片煎取八分去滓溫服後半時辰再服取下黃水數升或小便利為度治下痢後脾胃虛弱不能制輸水氣致身腫脹滿桑白皮湯方桑根白皮炙令黃色銼赤茯苓去黑皮郁李仁湯浸去皮尖麩炒研各二兩陳橘皮湯浸去白焙一兩海藻洗去咸炙一兩半赤小豆炒半升上六味粗搗篩每服五錢匕用水一盞半煎取八分去滓溫服日三治痢後遍身浮腫茯苓湯方赤茯苓去黑皮白朮銼微炒各一兩防己黃芩去黑心射干澤瀉各三兩桑根白皮炙黃色銼三兩澤漆葉切微炒一兩上八味粗搗篩每用五錢匕先以水三盞煮大豆一合取二盞去滓內藥煎取一盞分為二服未瘥頻服兩料治下痢身腫香菽散方大豆炒熟撻去黑皮用一合上一味搗羅為散用粥清調一錢匕服日二治虛勞下痢心胸壅悶喘促四肢腫滿細辛飲方細辛去苗葉防己桂去粗皮當歸切炒各半兩枳殼去瓤麩炒白朮赤茯苓去黑皮赤芍藥各三分黃耆銼一兩上九味粗搗篩每服三錢匕以水一盞入生薑三片煎至七分去滓溫服不拘時治痢後四肢浮腫喘息促急坐臥不安小便不利防己湯方防己豬苓去黑皮桑根白皮銼赤茯苓去黑皮各三分海蛤陳橘皮湯浸去白焙檳榔煨銼紫蘇用莖葉木通銼各一兩木香白朮各半兩上一十一味粗搗篩每服三錢匕以水一盞入生薑三片煎至七分去滓溫服不拘時治下痢後虛損臍下痛四肢浮腫木香湯方木香五加皮銼桑根白皮銼檳榔煨銼桃仁湯浸去皮尖及雙仁微炒郁李仁湯去皮尖微炒各一兩松節銼二兩薏苡仁陳橘皮湯浸去白焙各三分上九味粗搗篩每服三錢匕以水一盞煎至六分去滓不拘時候稍熱服治痢後四肢浮腫麻仁湯方大麻仁商陸防風去叉附子炮裂去皮臍陳橘皮湯浸去白焙防己各一兩上六味銼如麻豆每服五錢匕以水一盞半入赤小豆一百粒同煎至八分去滓食前服痢後脫肛論曰下痢脫肛者因大腸虛弱冷氣淹滯至圊不能便極力於下肛門脫出故謂之脫肛溫其臟則愈古方有坐湯溫尉之療皆良法也治肛門不收裡急後重磁石散方磁石火煅醋淬四兩桂去粗皮一兩蝟皮一枚炙令黃熟上三味搗羅為末每服二錢匕米飲調下慎舉重及急衣帶斷房室周年乃佳治痢後脫肛蝸牛散方蝸牛三七枚燒灰細研磁石火煅醋淬一兩細研上二味重合研如粉每服二錢匕空心米飲調下日午再服治痢後脫肛莨菪散方莨菪子炒黃半兩鱉頭二枚燒灰鐵精半兩研上三味搗羅為末每服二錢匕空心米飲調下日晚再服仍將藥末少許裛肛上炙故麻履底挼入即不出治瀉痢日久脫肛疼痛黑聖散方大蜘蛛一枚用瓠子葉兩重裹以線系定合子內燒令黑色勿太過上一味細研入黃丹少許研勻每先用白礬蔥椒煎湯洗浴拭乾後將藥滲在軟帛子上將手掌挼托上肛頭即不下治冷熱不和下部痛裡急後重虛滑或結澀腸頭脫出硇砂丸方硇砂飛一兩硫黃研白礬研各一分以上三味同研勻用萊蔔一枚重五兩者割開留元蓋子剜作坑子填上件末在內將元蓋用竹籤定以面劑十五兩裹了開地坑子一枚方一尺鋪馬糞厚三寸安面球在上更以馬糞蓋之上發火燒候面黑即止去面將萊蔔藥爛搗如膏更入後藥肉豆蔻去殼葫蘆巴各半兩訶黎勒皮附子炮裂去皮臍補骨脂炒各一兩蘹香子一分炒上六味搗羅為末通前藥膏同搗滴少好酒搗令勻丸如梧桐子大每服十五丸至二十丸空心食前溫米飲下治洞泄肛門脫出豬肝散方豬肝一片切慢火熬干黃連去須阿膠炒令燥芎藭各一兩烏梅取肉二兩半熬艾葉半兩醋炒上六味搗羅為散每服二錢匕溫酒調下白米飲亦可食前日再服治肛門脫出壁土散方故屋東壁上土五合皂莢三挺各長一尺者上二味搗羅土為細末敷肛頭取皂莢炙暖更互尉入則止治脫肛不收蒲黃敷方上用蒲黃一味以豬脂和敷肛上手按抑令入日二三愈治積冷下痢脫肛枳實尉方上用枳實一枚石上磨令滑澤鑽安柄子蜜塗炙令暖尉之冷更易之肛縮入即止疳䘌論曰疳有五種久變為蟲䘌一曰白疳令人皮膚乾燥而無潤澤之氣二曰赤疳令人毛髮焦枯三曰蟯疳令人腰脊強重四曰疳䘌令人下部攣急背強不能俯仰五曰黑疳患者必死令人五臟俱損或下瘀血此蓋腸胃虛弱嗜甘味過度致脾氣緩弱穀氣衰微榮衛虛損腸間諸蟲因虛而動蟲蝕於上則手足煩疼心中懊憹默默不欲飲食腰脊無力食不知味精神恍惚夜夢顛倒喉咽生瘡齒齦黯黑損爛膿血俱出胃氣逆則變嘔噦下蝕腸胃便痢膿血或下瘀黑久不已則肛門爛開漸至危殆治久患疳痢不瘥兀子礬散方兀子礬燒研黃連去須各二兩白礬燒研龍骨研雲母粉研各一兩半桂去粗皮麝香研各半兩無食子燒七顆上八味搗研為散空心生薑汁調下三錢匕日再服治積年疳痢羸瘦面色萎黃方硫黃研黃連去須艾各一兩蜜一合上四味以水二升先煮黃連艾取半升後內硫黃末更煮三五沸絞去滓又內蜜更煮三五沸分三服治疳痢久不瘥羸瘦欲死方新出羊糞一升上一味以水一升漬經宿明旦絞汁頓服之日午唯食煮飯極重者不過三服瘥治久痢赤白疳濕諸疾五皮湯方槐皮桃皮樗根白皮柳皮棗皮各以患人手把外截一握上五味細銼用水二盞煎至一盞去滓空心溫服未止再服治久痢變疳下部生惡瘡惡寒壯熱二白湯方桃白皮槐白皮各切一升苦參切五合熟艾三月三日者五合大棗十枚劈上五味以水五升煮取二升半去滓內熊膽一棗許大攪令勻取二升灌下部余分三服治久痢成疳灌洗方樗根白皮一握搗絞取汁三合取時勿令見風日大麻油熬如車脂酢泔澱各二合椒四兩去合口及目炒出汗豉二合上五味以水五升先取椒豉煎絞取汁二升和樗汁麻油泔澱等三味分為兩分用一分灌下部隔一日更取余者復灌其藥溫用唯得食煮飯蔥白爛煮蔓菁芥等五六十日外以鹿鋪下飯治丈夫婦人小兒久痢成疳百方不瘥方丁香麝香研黃連去須各一分上三味搗研為散每以一錢匕取竹筒吹入下部小兒量度減之不過三四上瘥治疳痢不止方苦參甘草銼雄黃各二兩上三味搗羅為細末先以水五升煮蔥白五寸豉一合蜀椒三十粒至三升入藥末三撮於汁中候冷熱得所先飲少許豉汁食一口飯乃側臥徐徐灌下部訖臥多時不出為佳大急乃出之於淨地當有疳濕蟲如白馬尾頭黑是其效也若重者肛大難瘥當取桃枝綿裹頭浸前件藥汁適寒溫烙之近脊點烙一上三十度乃瘥治久痢成疳便下白色食不為肌膚石榴丸方石榴皮焙銼橡實附子炮裂去皮臍各二兩無食子四枚厚朴去粗皮生薑汁炙銼乾薑炮各一兩半上六味搗羅為末米飲和衆手丸如梧桐子大每服三十丸食前生薑湯下日再濕䘌論曰凡下痢不止或時氣之餘為水濕所乘客於腸胃令九蟲皆動侵蝕腑臟故為濕䘌之病所謂䘌者蟲動於匿而難知故也謂其蟲因濕而動故名濕䘌其證上則蝕唇口下則蝕肛門上唇生瘡是蟲蝕五臟令人心煩懊憹下唇生瘡是蟲蝕下部令人肛門傷爛若胃虛氣逆則變為嘔噦甚即腑臟被傷齒上下齦皆生瘡齒色黯黑是其候也下痢出瘀血者不可治治濕䘌痢不止芫荑丸方蕪荑仁微炒吳茱萸湯洗焙炒乾薑炮各半兩枳殼去瓤麩炒黃連去須炒各三分上五味搗羅為末煮漿水飯和丸如梧桐子大每服二十丸空心日午米飲下治濕䘌痢不止蕪荑黃連丸方蕪荑仁微炒半兩黃連去須炒一兩上二味搗羅為末煉蜜和丸如梧桐子大每服五丸空心食前暖米飯下加至七丸治疳䘌蝕下部苦參湯方苦參青葙子各一兩甘草炙銼熊膽研各半兩上四味除熊膽外粗搗篩每服四錢匕水一盞半煎至八分去滓入膽半分攪和空心頓服日午再煎服之治疳濕䘌痢蟲蝕下部參連湯方苦參一兩半黃連去須炒二兩阿膠炙令燥一兩上三味粗搗篩每服五錢匕水一盞半煎至八分去滓空心溫服日晚再服治疳濕䘌蝕口齒及下部青葙子散方青葙子苦參甘草生銼各一兩上三味搗羅為散每服一錢匕食前暖生地黃汁調下治疳濕䘌下部瘡爛黃連湯方黃連去須四兩熟艾炒二兩苦參槐白皮各三兩上四味細銼如麻豆大每服五錢匕水二盞煎至八分去滓溫服重者不過三劑治疳䘌蝕人下部通見五臟痢下膿血舉體不安遍身疼痛面無顏色手足虛腫苦參散方苦參礬石熬令汁盡青葙子各半兩藜蘆一分上四味搗羅為散每用二錢匕置竹筒中吹下部日三二度小兒只一錢匕治疳䘌下部上攻移熱殺蟲豬膽煎方豬膽一枚米醋五合上二味煎醋令百沸入膽汁更三五沸滿口飲之蟲死即瘥治疳䘌無問所在皆治之方上取死蝦蟆燒灰研末以油和塗瘡上治疳蝕赤血痢久不瘥用之即瘥方蝦蟆一枚五月五日採燒灰研金銀土鍋人屎灰一方云發灰各五兩麝香研一分銀末小豆許錯上五味搗研為末每用少許敷瘡上即瘥痢者吹入下部治疳䘌蝕下部生瘡膿血雜下身面有浮氣雄黃散方雄黃研青葙子各二兩苦參三兩礬石熬令汁枯雌黃研藜蘆鐵衣各一兩麝香研半兩上八味搗研為散每和酸棗大以竹管送內下部中日一小兒以大豆許此方能救死治疳濕䘌下赤黑血肛門蟲蝕赤爛日夜疼痛熏黃散方雄黃研丹砂研食鹽研青黛研丁香礬石熬令汁枯研鐵衣梔子仁麝香研各一分莨菪子細辛去苗葉土瓜根乾薑炮甜葶藶紙上炒菖蒲蝦蟆燒灰研蜀椒去目及閉口炒出汗故靴底燒灰研各一錢天靈蓋枯腐者一分炙上一十九味搗研為散每用一錢匕以綿裹內下部中日再易有瘡即敷其上治疳濕䘌洗尉下部丁香散方丁香一分麝香研一錢犀角鎊甘草銼各三分上四味搗研為散以鹽椒各三合豉二合水三升都煎至一升去滓乘熱用綿蘸洗尉下部冷即再暖用
