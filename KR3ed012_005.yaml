而腰疼不可俯仰或為冷痹或為偏枯耳鳴聲濁志意昏沉善恐多忘皆腎風證也治腎中風踞而腰痛腳腫疼重耳鳴面黑志意不樂海桐皮散方海桐皮銼五加皮去粗皮銼萆薢炒薏苡仁炒各一兩虎骨塗酥炙令黃枳殼麩炒去瓤赤芍藥牛膝去苗酒浸切焙各一兩半惡實炒半兩防風去叉續斷杜仲去粗皮銼炒郁李仁湯退去皮尖雙仁炒熟乾地黃焙各一兩上一十四味搗羅為散每服二錢匕溫酒調下漸加至三錢匕空腹食前各一治腎中風腰腳不遂骨節痠疼筋脈拘急行履艱難兩脅牽痛杜仲丸方杜仲去粗皮銼炒三分牛膝去苗酒浸切焙一兩萆薢微炒一兩半酸棗仁炒一兩當歸切焙三分防風去叉一兩丹參微炙三分赤芍藥三分桂去粗皮半兩肉蓯蓉酒浸切焙一兩一分石斛去根銼三分附子炮裂去皮臍半兩郁李仁湯浸去皮尖炒三分檳榔煨一兩上一十四味搗羅為末煉蜜和丸如梧桐子大每空腹用溫酒下三十丸治腎中風腰胯重疼腳膝無力胸中氣滿兩脅膨脹防風丸方防風去叉一兩一分白茯苓去黑皮三分酸棗仁炒三分肉蓯蓉酒浸切焙一兩一分五味子三分桂去粗皮半兩石斛去根銼三分人參三分山茱萸三分檳榔銼三分熟乾地黃焙半兩上一十一味搗羅為末煉蜜和丸如梧桐子大每空腹煎棗湯下二十丸至三十丸治腎中風腰膝骨髓疼痛轉動不得白花蛇丸方白花蛇酒浸去皮骨炙半兩羌活去蘆頭半兩白附子炮一分麻黃去節煎掠去沫焙半兩桂去粗皮半兩芎藭半兩乾蠍去土酒炒一分防己半兩附子炮裂去皮臍半兩乾薑炮一分蜀椒去目並閉口炒出汗烏頭炮裂去皮臍各一分上一十二味搗羅為末煉蜜和丸如梧桐子大每服空心溫酒下十丸至十五丸如要出汗先浴後服藥熱酒或蔥酒下汗出避風凡風病皆治之治腎中風腰腳𤸷痹不仁骨髓痠疼不能久立漸覺消瘦防風湯方防風去叉一兩半羌活去蘆頭一兩黃耆炙銼二兩半五加皮銼一兩半牛膝去苗酒浸切焙一兩半丹參一兩一分酸棗仁炒一合桂去粗皮一兩半赤芍藥一兩半麻黃去節煎掠去沫焙一兩一分檳榔煨銼一兩當歸切焙一兩木通銼一兩半上一十三味粗搗篩每服三錢匕以水一盞煎至七分去滓空心溫服及晚食前再服治腎中風腰脊疼強不得俯仰言語謇澀志意不定牛黃天麻散方牛黃研一兩天麻一兩天雄三分生枸杞子三分人參一兩白附子一兩乾薑半兩生羌活去蘆頭一兩上八味搗羅為散每日三服食前溫酒調下一錢匕治腎中風筋急兩膝不得屈伸手不為用起居增劇惡風寒通身流腫生瘡凡風冷疾病在腰膝攣急緩縱悉理之天雄浸酒方天雄炮裂去皮臍三兩蜀椒去目並閉口炒汗出一兩半烏頭炮裂去皮臍二兩茵芋去粗莖三兩乾薑炮一兩附子炮裂去皮臍二兩防風去叉一兩半羊躑躅炒一兩半上八味銼如麻豆用生絹囊貯以酒一斗五升浸之春夏五日秋冬七日開取每服一合漸加至一合半空心臨臥各一服盡酒將滓曝令乾搗細羅為散每服半錢漸加至一錢匕服時候如前治腎中風下注腰腳痹弱利關節堅筋骨除頭面遊風補虛勞益氣力石斛浸酒方石斛去根二十四兩黃耆炙一兩半丹參微炙二兩牛膝去苗二兩人參一兩半杜仲去粗皮銼炒二兩五味子二兩白茯苓去黑皮二兩枸杞子微炒一升半山茱萸二兩山芋二兩萆薢微炒二兩防風去叉一兩半天門冬去心焙三兩細辛去苗葉輕炒一兩生薑三兩薏苡仁炒半升上一十七味細銼如麻豆用生絹囊盛以酒五斗於淨瓷器中浸七宿初溫服三合日三夜一漸加至六七合一升許令常有酒氣不至大醉治腎中風惡風多汗面浮腫腰脊痛不能正立面色枯黑吳茱萸丸方吳茱萸一分湯浸焙乾炒山茱萸牛膝去苗酒浸切焙石斛去根半兩細辛去苗一分芎藭附子炮裂去皮臍各一分菟絲子酒浸別搗半兩白茯苓去黑皮一分羌活去蘆頭獨活去蘆頭木香各一分萆薢半兩上一十三味搗羅為末用醇酒半盞煉蜜半盞拌和丸如梧桐子大空心日午臨臥鹽湯或鹽酒下三十丸
