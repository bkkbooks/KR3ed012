body:
  text: 卷第五諸風門諸風統論論曰易曰撓萬物者莫疾乎風夫以吹噓鼓舞巽而易入枯者榮甲者坼成物之功實在於是然而分四時位八方適應其時則為正弗循其方則為邪人惟萬物之靈能察諸此觀冬至之日有從南方來必曰賊風其他可以類推矣感之淺者留於肌膚感之深者達於骨髓而況倉卒頃刻之間大可畏懼固有治療所不逮者蓋禍患之機藏於細微非常人所豫見及其著也雖智者不能善其後是以上古聖人之教下皆謂之虛邪賊風避之有時乃向福威極之意也不然何以言風者百病之始風者百病之長風者善行而數變中風論曰風邪中人以春甲乙得之為肝風以夏丙丁得之為心風以季夏戊己得之為脾風以秋庚辛得之為肺風以冬壬癸得之為腎風若中其五臟六腑之俞則各隨其證而治之治諸中風靈寶丹方人生自幼稚至於老耄率多因風而致疾或嗜食傷飽或不食失飢或渴而失飲或飲而過量或因五味之傷或冒熱衝風或大寒近火或暴露寒濕或刺損肌膚撲傷肢體或失節宣或多嗜欲緣此風趨諸竅或留一偏遂使手足不遂言語謇澀或痛連骨髓或痹襲皮膚瘙癢如蟲行𤸷痹如鐵石或多痰好睡或健忘多嗔血脈不行肉色乾瘦久在床枕起便須人語澀面浮精神困耗皆其證也若積歲不愈肢節不能運動者但如法服十數粒即效亦有中風卒斃者但心頭未冷取藥五粒以醋調摩臍中一千餘遍當從臍四面漸暖待眼開後以熱醋研下十丸入口即活凡病不問輕重年月深淺先以紅雪通中散三錢茶調下須臾更以熱茶投令宣瀉一兩行便依法煎姜豆湯下三粒當以他人熱手更摩所患處須臾熱徹當覺肉內有物如火至病所一二百日內及一年內風疾不能下床者一服三粒十服後便可行步如患至重者每利一度後隔日服五粒又住三五日即更利不過三十粒平復如故若打撲傷損多年每遇天陰疼痛舉動不能者可五七服服此藥多者疾去後藥力常在具方如後丹砂一兩半研如皂子大絹袋盛以蕎麥灰下汁煮三復時取出研如粉自然銅一兩先搗碎更研如粉硫黃一兩研碎如皂子大絹袋盛以無灰酒煮三復時取出研如粉雄黃一兩碎如皂子大絹袋盛以米醋煮三復時取出研如粉四味用有蓋瓶子先以金薄三片鋪瓶底上便入硫黃又以金薄兩片蓋之次入雄黃又以金薄兩片蓋之次入丹砂又以金薄兩片蓋之次入自然銅又以金薄三片蓋之以瓶蓋合卻不用固濟於灰內坐瓶子令穩以火養三日三夜第一日用熟炭火半斤圍瓶子去瓶子三寸第二日用熟火十兩去瓶子二寸半第三日用火一斤去瓶子二寸以火盡為度候冷取藥出以紙三重裹藥於淨濕土中培至來旦取出更研令細磁石煅醋淬一七遍搗研如粉陽起石研如粉理石研如粉紫石英研如粉四味各三分用有蓋瓷瓶子先入磁石次入陽起石次入理石次入紫石英其所入金薄一依前法以蓋合之不用固濟用火養三日三夜第一日用熟火一斤去瓶子三寸第二日用火三斤去瓶子二寸半第三日用火半稱去瓶子二寸一日至夜任火自銷候冷取出藥用紙裹入濕土中培至來旦取出更研令細牛黃龍腦麝香膃肭臍酒刷炙龍齒虎腦骨酒塗炙六味各一兩搗羅為末更研如粉石鐘乳十兩以絹袋盛先以長流水煮半日後棄水別用水五斗煎取一斗留煮後草藥外更留鍾乳水三合磨生犀角三分苦參遠志去心巴戟天去心烏蛇酒浸去皮骨炙仙靈脾天麻各一兩一分六味搗羅為末以前鍾乳水一斗煎至七升用生絹濾去滓澄清木香肉豆蔻去殼鹿茸去毛塗酥炙桂去粗皮各一兩半延胡索胡桐淚各三分六味搗羅為末以前鍾乳汁七升煎至四升以生絹濾去滓澄清半夏湯洗七遍去滑當歸切焙各一兩二味搗羅為末以前鍾乳汁四升煎至二升以生絹濾去滓澄清皂子仁一兩半搗羅為末芒硝一兩細研生地黃汁一升無灰酒一升童子小便一升上三十四味以地黃汁等通前三升計六升貯鍋中於靜室內以文火養至一升下金石藥末在內以柳木篦攪勿令住手稀稠得所去火然後入牛黃等六味攪令極勻即下皂子仁末及磨下犀角水以綿濾過入在藥內研於鉢內以乳椎研三五千轉此藥黏如膠須用力研之研訖分為三分納一分入上件芒硝別更研令勻並丸如梧桐子大此藥三名一名歸命丹一名返魂丹入芒硝者名破棺丹如有中一切風牙關緊急及尸厥暴亡者以熱醋研三兩丸灌在口中下得咽喉即活如要常服空心溫酒下二丸紅雪通中散方大青別研一兩硝石五斤煎藥後下丹砂別研半兩桑根白皮一兩羚羊角鎊半兩蘇枋木二兩梔子仁一十五枚槐花一兩升麻一兩半淡竹葉一握訶黎勒一十五枚去核大腹檳榔各五枚銼上一十三味別研丹砂大青外余並粗搗篩用水一斗浸一宿煎至五升去滓入銀石鍋即下硝石丹砂大青不住手攪候減盡水即成紅雪置瓷器中三日取出搗羅為末卻用瓷瓶子盛不得泄氣有患風疾及一切滯悶不通臨臥用溫水調下二錢匕小兒半錢匕亦治傷寒治中風神仙大驗備急黑神丸方雄黃研硇砂研丹砂研硫黃研水銀先以慢火生鐵銚內熔硫黃銷始傾入水銀急以火箸攪恐焰起即離火以濕布搭滅候冷刮取與上三件同搗研此五味各一兩取一湖南燒藥罐子先用六一泥固濟待乾入上件研者末都入罐子中實按令平連蓋子泥四縫只留一寸縫不泥合慢火勻養一復時加火近罐子燒令通赤縫中有煙焰出急抽火令人按蓋子急泥合縫周遍用淨篩土窨定藥罐子不得令露透出藥氣上以大盆合之次日取出藥搗羅用濕重帛包裹以淨濕土內窨盆合出火毒三日三夜逐日起盆微灑水日滿取藥再研如粉入後藥末犀角鎊鹿茸酥炙去毛各一兩牛黃研半兩天竺黃研升麻天麻乾蠍酒炒各一兩木香半兩阿膠慢火炙燥二兩天南星牛膽煮一復時曝乾一兩上一十五味將後十味除研外搗羅為末次入牛黃天竺黃並前研五味再同研勻用青州大棗蒸熟去皮核研如膏和藥搗一千杵丸如梧桐子大中風急風牙關急口噤不開用豆淋酒生薑汁去滓研二丸至三丸斡開口灌下如人行五里更一服連三服汗出解宜食生薑酒粟米粥合此藥宜三月三日五月五日或臘日於淨室中焚香齊沐修合切忌禽獸並婦人等見治中風大通水銀丸方水銀鉛丹研丹砂研胡粉研鉛霜別研候藥成入雄黃研硫黃先以銚子銷熔熟帛捩入水銀柳杖子急攪結沙子搗研硇砂以水銀硫黃雄黃丹砂同研曾青各一兩別研次以曾青鉛丹胡粉同研上九味先將水銀沙子雄黃丹砂硇砂研入湖南瓶子中實築次下曾青鉛丹胡粉實築用蓋子蓋訖用六一泥固濟留縫一寸不泥合火炙令乾先用文火養一日夜後用武火從午時燒至申時通赤縫中有煙焰藥氣起即抽火向後急泥合縫用篩了淨灰蓋窨瓶子候至來日冷即開取藥出搗羅下用篩入濕淨沙土攤開上以重抄紙三重襯置藥在上上更以三重抄紙蓋細勻灑濕土以盆合蓋經三日夜每日微灑水日滿取藥再入鉢與鉛霜一味同研細用爛蒸青州大棗取肉研如膏拌和丸如梧桐子大每服一丸至兩丸用豆淋酒下空心午時夜臥服得出慎外風未汗用熱生薑稀粥投之汗出即瘥治中風大通青金丹方曾青三分螺髻者為上研金薄四十九片丹砂別研硫黃研胡粉研紫石英研各一兩水銀三分與硫黃結沙子研鉛霜研鉛丹與曾青末紫石英末定粉鉛霜再同研雄黃各三分與沙子丹砂同研上一十味取一湖南燒藥瓶子並蓋用六一泥固濟火熁令乾先下金薄二十片次下沙子同研四味末實按平又下金薄二十片次下曾青同研五味末又實按令平次又下金薄九片始用蓋子六一泥泥合蓋子只留縫一寸不泥合用火法並再搗羅出火毒及再研法並與前方大通水銀丸同用槐膠濃煮湯去滓停令溫入白麵煮作稠糊丸如梧桐子大凡中風癱瘓風手足攣急風口面喎斜風癲癇風狂風邪風並用溫酒下五丸至七丸空心日午夜臥各一服治中風癱瘓半身不遂口眼喎斜語言謇澀形神如醉驚悸狂言夜臥不安或周身麻痹皮膚不知痛癢四肢不舉身重如石腰膝強硬或筋脈拘攣瘛瘲不能行步百關壅閼痰涎痞滯或卒急中惡客忤尸注鬼氣邪魘尸厥暴亡不省人事等疾至聖太一散方犀角鎊仙靈脾真珠末滑石研胡黃連惡實炒人參地丁草去根白茯苓去皮蠶砂炒甜硝研板藍根鬱金各一兩大黃銼牛黃研血竭研木通銼梔子仁馬牙硝研蒼朮削去黑皮荊芥穗芍藥延胡索玳瑁鎊琥珀研各半兩甘草炙二兩半上二十六味並搗研為末如中風不語用新水調下一錢匕如口噤即灌下若能咳嗽夜半當省人事灌藥四服後不咳嗽者必不可救卒中惡風涎不止用白礬末半錢匕太一散一錢匕和勻以新水調下慢慢灌之即活治中急慢風硫黃大黑神丸方硫黃研丹砂研水銀各一兩雄黃研半兩此四味各細研用銚子先下硫黃銷後下丹砂水銀雄黃文武火結成沙子待冷刮取搗羅為末先取一瓷瓶上磨瓦一小片作蓋鑽一竅可度得菜豆用六一泥固濟瓶子火熁令乾卻入沙子末在瓶內按令平實然後下蓋子泥合縫留竅子候乾用火半稱四面約四寸許候燒至一食頃更加火漸近瓶子待黑氣出盡後取濕紙搭瓶竅上如紙才幹便易之至三十易為止待冷取出細研以酒浸潤一宿再焙為末入後藥麻黃去根節先煎掠去沫焙乾二兩天麻一兩半白附子炮烏蛇酒浸去皮骨炙白花蛇酒浸去皮骨炙白殭蠶炒桂去粗皮天南星炮各半兩乾漆炒令煙出乾蠍酒炒人參白茯苓去黑皮各一分上一十六味前四味先煅研為末次將後一十二味搗羅為末各頓一處每石藥末一兩入後藥末二兩同研取勻煉蜜丸如雞頭實大中風者以豆淋酒研下一丸至二丸以厚衣復出汗未汗更服用熱生薑稀粥投汗出慎外風治五臟中風偏風賊風偏枯手足不遂八瓊丹方硫黃水銀二味同炮作沙子曾青丹砂雄黃白石英紫石英鉛丹玄精石胡粉各一兩硝石二兩以上十一味各細研入瓷合盛合上留一眼子外用六一泥固濟畢候乾以文火養一復時後閉合眼子用大火燒令通赤去火放冷取出以紙裹藥地內培三日去火毒取出研令極細入後藥龍腦麝香牛黃琥珀天竺黃並細研烏蛇酒浸三日去皮骨炙虎骨酥炙甘草炙天南星炮白附子炮天麻麻黃去根節乾蠍炒桂去粗皮木香檳榔銼獨活去蘆頭細辛去苗葉白朮附子炮裂去皮臍白殭蠶炒犀角鎊羚羊角鎊芎藭阿膠打碎炒燥各一兩蟬蛻去土膩粉研各半兩上三十八味除前煅研外余搗研為末再同研勻煉蜜和搗一二千下丸如小彈子大每服一丸細嚼以豆淋酒下輕病只溫酒嚼下治卒中惡風涎潮昏重口眼喎斜四肢嚲曳口噤不省延壽丹方丹砂研膩粉研鐵粉研白附子各二兩蛇黃煅醋淬附子炮裂去皮臍各九兩巴豆打碎用新水浸七日逐日換水日足以紙裹壓出油生金生銀並錯末各一分麝香別研牛黃別研各一兩一分羌活去蘆頭牛膝去苗酒浸切焙蠍梢炒天南星生用各三兩上一十五味搗研為末煉蜜和粟米飯丸如雞頭實大中惡風嚲曳及諸癇疾薄荷酒磨下一丸年老半丸小兒驚癇十歲以上一丸分四服四歲以下一丸分五服新生兒一丸分七服並用蜜水磨下如中風發直面如桃花色口眼俱閉喉中作聲汗出如油及汗出不流多要下泄或瀉血者並是惡候更不用服唯口噤眼開者藥下立瘥纏喉風壅塞氣息不通用生薑薄荷酒急化一丸治中風不計緩急涎潮昏悶不知人事七寶丸方丹砂牛黃水銀龍腦膩粉麝香並細研各一分金薄大者二十一片