body:
  text: 卷第一百五十三婦人經血暴下兼帶下論曰婦人臟腑久冷素有赤白帶下復因衝任氣虛不能制約經血以致暴下二病兼作故謂經血暴下兼帶下也治婦人經血暴下兼帶下積久不瘥面目萎黃困倦羸瘦地榆湯方地榆當歸切焙阿膠炙燥黃耆銼各一兩半艾葉三分龍骨碎二兩上六味㕮咀如麻豆大每服三錢匕水一盞生薑三片煎至七分去滓食前溫服治婦人經血暴傷兼帶下久不止牛角䚡丸方牛角䚡灰赤石脂各一兩半白龍骨三兩艾葉三分桑耳炙鹿茸去毛酥炙阿膠炙燥乾薑炮各一兩上八味搗羅為末煉蜜和丸如梧桐子大每服三十丸空心食前煎黃耆湯或溫酒下治婦人經血暴傷及帶下經久不止寄生湯方桑寄生雞蘇淡竹茹各一兩芍藥地榆各一兩半白龍骨二兩上六味㕮咀如麻豆大每服三錢匕水一盞煎至七分去滓食前溫服一方用附子三分無淡竹茹治婦人血傷兼赤白帶下不止蒲黃丸方蒲黃龍骨各三兩上二味搗研為末煉蜜和丸如梧桐子大每服三十丸食前黃耆湯下治婦人血傷兼赤白帶下芍藥浸酒方芍藥黃耆生地黃各三兩艾葉一兩上四味㕮咀如麻豆大以絹袋盛浸酒一斗經宿後每食前隨量溫飲之治婦人血傷兼帶下不止黃耆丸方黃耆銼芍藥各三兩赤石脂四兩當歸切焙附子炮裂去皮臍熟乾地黃焙各二兩上六味搗羅為末煉蜜和丸如梧桐子大每服三十丸溫酒下一方有乾薑無地黃治婦人血傷兼帶下積久不止面黃體瘦漸成虛勞腰腳沉重茯苓散方白茯苓去黑皮木香杜仲去粗皮炙菖蒲熟乾地黃焙柏子仁研秦艽去苗土訶黎勒皮菟絲子酒浸別搗青橘皮去白焙赤石脂五加皮銼牛角䚡灰烏賊魚骨去甲艾葉燒灰當歸切焙各一兩上一十六味搗羅為散每服二錢匕溫酒調下糯米飲亦得治婦人血傷兼赤白帶下日久不止羸困人參散方人參五味子地榆艾葉燒灰牡蠣煅白茯苓去黑皮熟乾地黃焙龍骨煅續斷芎藭甘草炙銼各一兩上一十一味搗羅為散每服二錢匕溫酒調下水一盞煎至七分溫服亦得空心日午臥時各一治婦人血海冷敗脫血帶下諸虛冷疾陽起石湯方陽起石二兩別搗白茯苓去黑皮人參甘草炙銼赤石脂龍骨各三兩伏龍肝五兩生地黃細切焙一附子炮裂去皮臍一兩續斷三兩上一十味㕮咀每服三錢匕水一盞煎至七分去滓溫服早晨日午晚後各一治婦人血傷帶下漸成勞疾鹿茸丸方鹿茸去毛酥炙白薇去苗覆盆子細辛去苗葉庵䕡子熟乾地黃焙山芋蛇床子炒白茯苓去黑皮各三分乾薑炮遠志去心當歸切焙芎藭桂去粗皮續斷牡丹皮人參卷柏龍骨蒲黃各半兩上二十味搗羅為末煉蜜和丸如梧桐子大每服三十丸空腹溫酒下米飲亦得治婦人衝任久虛下血不時及赤白帶下連年不止盜汗咳嗽肢節痠疼血海虛冷臍腹刺痛不進飲食日漸瘦弱乾柿煎丸方乾柿十枚去蓋細切沉香銼一兩杵末好酒三升同乾柿浸半日文武火熬成膏研細入諸藥禹餘糧四兩紫色者燒赤醋淬十度研細白朮吳茱萸湯浸一宿去浮者慢火炒陳橘皮去白焙烏頭酒浸一宿炮裂去皮臍各一兩乾薑炮半兩地龍去土二兩瓦上慢火炒上九味搗研七味為末入前膏和搗一二千杵丸如梧桐子大每服二十丸至三十丸溫酒或醋湯下治婦人血傷兼赤白帶下牛角䚡散方黃牛角䚡酒炙側柏葉艾葉炒當歸切焙續斷炒地榆炒赤石脂研伏龍肝各一兩上八味搗研為散每服三錢匕食前米飲或溫酒調下治婦人血傷兼赤白帶下菟絲丸方菟絲子酒浸一宿別搗龍骨牡蠣炒艾葉炒赤石脂烏賊魚骨燒蘹香子微炒附子炮裂去皮臍各一兩上八味搗羅為末醋煮麵糊和丸如梧桐子大每服二十丸至三十丸空心食前醋湯下治婦人血傷不止兼赤白帶下不絶面黃體瘦漸成勞疾鹿茸丸方鹿茸去毛酥炙白芷白馬鬐毛燒灰蒲黃微炒小薊根續斷禹餘糧煅醋淬各二兩伏龍肝熟艾各一兩白馬蹄鎊三兩人參熟乾地黃焙烏賊魚骨去甲柏子仁微炒肉蓯蓉酒浸切焙當歸切焙黃耆炙銼白茯苓去黑皮各一兩半上一十八味搗羅為末煉蜜和丸如梧桐子大每服二十丸至三十丸溫酒或米飲下不拘時治婦人血傷赤白帶下麒麟竭湯麒麟竭地榆黃柏去粗皮炙各一兩禹餘糧煅赤醋淬五遍赤芍藥銼炒各一兩半熟乾地黃切炒四兩上六味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治婦人血傷不止兼帶下赤白腰背痛虛乏困倦牛角地黃散方牛角䚡一枚燒灰熟乾地黃焙桑耳銼碎人參續斷赤石脂白礬燒白朮禹餘糧煅赤醋淬五遍乾薑炮蒲黃微炒防風去叉各一兩附子炮裂去皮臍一兩半龍骨當歸切焙各二兩上一十五味搗羅為散每服二錢匕食前溫酒調下米飲亦得治婦人血傷不止兼五色帶下牡丹皮湯方牡丹皮熟乾地黃焙槲葉脈銼炒艾葉微炒各一兩半禹餘糧煅赤醋淬五遍芎藭龍骨各二兩柏葉炙芍藥銼炒厚朴去粗皮生薑汁炙白芷伏龍肝青竹茹地榆銼各一兩阿膠炙令燥半兩上一十五味粗搗篩每服三錢匕水一盞煎至七分去滓空心日午臥時服治婦人血傷兼赤白帶日夜不止悶絶熟布湯方熟布皮切刮取一把蟹爪銼二合甘草炙銼白茯苓去黑皮熟乾地黃焙桂去粗皮阿膠炙令燥芍藥銼炒當歸銼炒伏龍肝各一兩淡竹茹一把蒲黃輕炒二兩上一十二味粗搗篩每服三錢匕水一盞半煎一盞去滓服不拘時治婦人血傷不止兼帶下不斷虛羸困倦補血益氣澤蘭散方澤蘭葉炙人參蜀椒去目並閉口炒出汗各一兩厚朴去粗皮生薑汁炙桂去粗皮細辛去苗葉蕪荑仁微炒藁本去苗上當歸切焙乾薑炮代赭山茱萸防風去叉各半兩柏子仁炒芎藭牡蠣粉熟乾地黃焙甘草炙銼龍骨各三分上一十九味搗羅為散每服二錢匕溫酒調下米飲亦得治婦人血傷兼帶下日久不止頭旋目眩心煩身熱腰腳痠重肢體瘦瘁茯神丸方茯神去木當歸切焙白芷桑耳炙芎藭赤石脂卷柏去土乾薑炮各一兩牡蠣粉白龍骨地榆各一兩半上一十一味搗羅為末煉蜜和丸如梧桐子大每服三十丸溫酒或米飲下空心日午臨臥各一治婦人血海虛血敗兼帶下積久不止日漸困瘁肢體煩熱頭目旋運口舌乾澀烏賊魚丸方烏賊魚骨鹿茸去毛酥炙訶黎勒當歸切炒白芍藥山茱萸黃耆銼酸棗仁地榆芎藭覆盆子去梗玄參白茯苓去黑皮熟乾地黃焙各一兩半蓽澄茄一兩上十五味搗羅為末煉蜜和丸如梧桐子大每服三十丸米飲或酒下空心日午夜臥各一治婦人血傷兼帶下臍腹冷痛腰腳痠疼肢體倦怠心煩渴躁黃耆丸方黃耆銼熟乾地黃焙當歸切焙鹿茸去毛酥炙地榆卷柏去土茯神去木各一兩半木香代赭白石脂艾葉芎藭桑寄生赤石脂沙參白龍骨訶黎勒皮各一兩上一十七味搗羅為末煉蜜和丸如梧桐子大每服三十丸米飲下空心日午臥時各一治婦人經血暴下兼帶下赤白不止黃芩湯方黃芩去黑心當歸切焙柏葉焙蒲黃微炒各半兩艾葉炒一分生乾地黃焙二兩上六味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日三治婦人血傷帶下地黃湯方地黃銼炒當歸切焙黃耆銼阿膠炙令燥各一兩艾葉炒焙三分上五味粗搗篩每服三錢匕水一盞生薑三片煎至七分去滓溫服日三治婦人血傷不止兼赤白帶下地黃益母湯方生地黃汁益母草汁各半碗上二味各取半盞同煎至七分日三五服治婦人傷中血不止兼赤白帶下龍骨丸方龍骨三分烏賊魚骨炙二分芍藥三分鹿茸酒炙三分熟乾地黃焙三分側柏葉三分上六味搗羅為末煉蜜和丸如梧桐子大每服二十丸乾薑米飲下又方芍藥炒一兩乾薑炒三分牛角䚡醋炙焦半兩上三味搗羅為散研勻每服二錢匕米飲調下治經血暴下兼帶下車前湯方車前子淡竹葉黃芩去黑心阿膠炙燥杵碎生地黃各一分上五味將四味㕮咀以水二盞煎至一盞下膠攪煬頓服又方蒲黃二兩鬱金熟乾地黃焙各三分上三味搗羅為散每服三錢匕空心米飲調下治帶下兼經水過多或暴下片血不限年月遠近牡蠣散方牡蠣龍骨肉蓯蓉酒浸切焙赤石脂石斛去根烏賊魚骨去甲黃耆銼各一兩半芍藥炒阿膠炒燥熟乾地黃焙牛角䚡灰各二兩乾薑炮裂當歸切焙白朮人參桑耳炙各一兩一分桂去粗皮艾葉炒芎藭附子炮裂去皮臍各一兩上二十味搗羅為散每服三錢匕平旦米飲調服日再治傷中無問赤白漏下桑耳散方桑耳炒丹參各一兩一分續斷芎藭柏葉炙熟艾炒鹿茸酒浸去毛各一兩半阿膠炙燥牡蠣熬地榆銼小薊根龜甲酥炙黃各二兩赤石脂當歸銼焙各一兩三分熟乾地黃焙槲葉脈牛角䚡燒灰各二兩半上一十七味搗羅為細散每日溫酒調下二錢匕二七日未效稍稍加至四錢匕治婦人衝任氣虛經血暴下兼帶下地龍散方地龍炒鬱金棕櫚燒令存性柏葉地黃汁胎髮泥裹燒過去泥上六味各等分搗羅為散每服三錢匕溫地黃汁酒調下不拘時治傷中赤白帶下蘆薈丸方蘆薈半兩赤石脂樗皮生薑汁炙地榆銼各一兩牛角䚡炙三分禹餘糧醋淬阿膠炙燥各一兩半側柏一兩一分上八味搗羅為末研勻煉蜜和丸如梧桐子大每服二十丸陳米飲下治傷中血下兼帶或白或赤臍下㽱痛柏葉散方側柏葉芍藥艾各三分熟乾地黃焙禹餘糧醋淬麒麟竭各一兩當歸銼焙牛角䚡炙各三分上八味搗羅為細末研勻每服二錢匕生薑米飲調下治婦人經血暴下兼赤白帶下不止龍骨散方龍骨一兩烏賊魚骨去甲鹿茸去毛酥炙續斷芍藥銼炒赤石脂肉蓯蓉酒浸切焙各三分乾地黃炒一兩半上八味搗羅為散每服二錢匕空腹米飲調下日再治婦人血傷兼帶下不止阿膠散方阿膠炙燥柏葉焙乾當歸去蘆頭焙龍齒別搗細研各半兩禹餘糧醋淬細研一兩上五味搗羅為細散每服二錢匕用米飲調下早晨午時各一服治血傷兼帶下不止杉節散方杉木節燒灰存性楮皮紙燒灰各等分上二味研令勻細每服二錢匕米飲調下婦人血積氣痛論曰血積氣痛者惡血久積而成痛也其狀隱隱㽱痛或成塊攻築或聚或散或沉或浮蓋氣通則血行氣澀則血滯若月水不通産後惡露不盡或因他病使血不行皆致氣血凝滯血因氣聚蘊而成積積久不去則為氣痛治婦人血氣血積堅癖血瘕發歇攻刺疼痛嘔逆噎塞迷悶及血蠱脹滿經水不行沒藥丸方沒藥研一兩芫花一兩用米醋三升煎至一升半濾去滓不用將醋入石器內入硇砂霜一兩巴豆肉七粒研細入醋內煎成膏入後藥末附子生去皮臍一兩檳榔銼一分肉豆蔻二枚炮去皮木香當歸銼焙桂去粗皮蓽茇各一兩斑蝥三七枚糯米炒令黃焦去米翅足別研細上一十味搗羅七味為末斑蝥沒藥研勻入前膏內和搗千百杵丸如梧桐子大初服三丸以醋炒薤白令焦黑以酒浸煎一兩沸吞下漸加至五丸七丸為度如急猝血氣攻心脾以酒醋共一盞煎沸吞下血瘕堅癖結塊攻心疼痛悶絶久醫不效者即入禹餘糧一兩火煅醋淬七遍為末和入為丸每服五丸蘇木節二兩銼細酒三升煎至七合去滓分作三服每服下丸子三丸並服三服即血瘕隨大小腸逐下治婦人年久血氣結積氣塊攻刺疼痛不可忍或嘔吐不進飲食面黃怠惰硇砂丸方硇砂去夾石者沒藥當歸切焙芫花醋煮炒微焦各一分蓬莪朮炮半兩木香一分巴豆三十粒去皮心膜出油盡上七味先研硇砂巴豆沒藥如粉用米醋三升同煎為稀膏後將四味搗羅為細末入在前膏內搜成劑瓷合盛用時丸如梧桐子大每服七丸看患人虛實臨時加減用酒醋各半盞同煎數沸通口服不得嚼仍須飲盡酒醋立瘥治婦人血氣血積腹