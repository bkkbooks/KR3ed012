蒲微炒桂去粗皮葶藶隔紙炒甘遂微煨苦參大黃銼碎醋炒柴胡去苗當歸切焙羚羊角鎊各一兩龍骨燒三分上一十六味搗羅為末煉蜜和丸如小豆大每服十丸至十五丸食前溫水下日三服如一二服內水通利即減丸數及間日服治婦人水分浮腫不退經脈不利葶藶丸方葶藶隔紙炒二兩木香陳橘皮湯浸去白焙枳殼去瓤麩炒楮根白皮炙銼乾薑炮檳榔煨銼防己馬兜鈴去皮微炒朴硝別研蓬莪朮煨銼各三分甘遂微煨一兩上一十二味搗羅為末煉蜜為丸如梧桐子大空心日午夜臥時用桑根白皮煎湯下二十丸加至三十丸取利為度如水利即減丸數治婦人水分腫滿不消經水斷絶大腹皮丸方連皮大腹一兩半防己澤瀉木香蓬莪朮煨銼枳殼去瓤麩炒各一兩檳榔煨銼陳橘皮湯浸去白焙牽牛子微炒各三分上九味搗羅為末煉蜜和丸如梧桐子大每服空心日午夜臥生薑湯下三十丸至四十丸如減即少服治婦人水病腫滿小便澀經水斷絶豬苓散方豬苓去黑皮防己各一兩桑根白皮炙銼百合郁李仁湯浸去皮炒瞿麥穗各三分甘遂半兩上七味搗羅為末每服三錢匕用水一盞煎至七分去滓早食前夜臥各一服如疏利即減服治婦人水分遍身浮腫煩悶喘渴經水不利黃耆散方黃耆銼赤茯苓去黑皮木香各一兩半草豆蔻去皮桂去粗皮當歸切焙桑根白皮銼防風去叉紫薇根炙銼凌霄花根是也甘草炙銼續斷澤瀉各三分甘遂半兩上一十三味搗羅為末每服三錢匕水一盞半入小豆半匙生薑一塊拍碎煎至七分去滓溫服空心日午臨臥各一治婦人水氣在皮膚浮腫經水不通赤茯苓丸方赤茯苓去黑皮一兩豬苓去黑皮一兩半澤瀉一兩小海蛤一兩半陳橘皮湯浸去白焙桂去粗皮各三分防己澤漆微炒各一兩木通炙銼一分赤芍藥一兩上一十味搗羅為末煉蜜和丸如梧桐子大每服二十丸煎桑白皮湯下日三治婦人水病浮腫因經水斷絶名曰水分防己飲方防己一兩葶藶隔紙炒赤茯苓去黑皮各半兩陳橘皮湯浸去白焙玄參黃芩去黑心澤漆炒各一兩杏仁湯浸去皮尖雙仁炒豬苓去黑皮白朮銼大豆炒各一兩半桑根白皮銼二兩上一十二味粗搗篩每服三錢匕水一盞煎至七分去滓空心日午臨臥各一服治婦人水分面目身體浮腫胸滿短氣小便不利芍藥湯方赤芍藥銼炒桑根白皮銼各三分木通銼一兩百合三分大腹碎五枚郁李仁湯浸去皮炒三分甘遂半兩上七味粗搗篩每服三錢匕水一盞煎至七分去滓空心日午臨臥服水通即止治婦人水分四肢浮腫經水斷絶甘遂丸方甘遂微煨一兩一分葶藶隔紙炒二兩黃連去須天門冬去心焙各一兩半苦葫蘆一枚取瓤上五味搗羅為末煉蜜和丸如小豆大每服十丸至十五丸空心溫酒下得水利即疏服治婦人水分先病水腫日久不消致經水斷絶木通飲方木通銼一兩桑根白皮銼澤瀉防己赤茯苓去黑皮石葦去毛各三分大腹銼四枚上七味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服日三如水通利即疏服婦人血枯論曰內經曰有病胸脅支滿者妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名血枯此得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不來也夫肝藏血受天一之氣以為滋榮者也其經上貫膈布脅肋今脫血失精肝氣已傷故血枯涸而不榮胸脅支滿以經絡所貫然也妨於食則以肝病傳於脾胃病至則先聞腥臊臭出清液以肝病而肺乘之先唾血四肢清目眩時時前後血皆肝病血傷之證也治婦人血枯胸脅支滿妨於食飲病至即聞腥臊之氣先唾血出清液或前後泄血四肢清目眩轉月事衰少不來烏賊魚骨丸方烏賊魚骨去甲四兩䕡茹一兩上二味搗羅為末用雀卵不拘數和成劑令得所丸如小豆大每服五丸加至十丸以鮑魚湯下後以飯食壓之治婦人胸脅支滿聞腥臊氣唾血目眩不進飲食泄血不已日久使血枯燥肉蓯蓉丸方肉蓯蓉酒浸切焙熟乾地黃焙白茯苓去黑皮各一兩人參半兩菟絲子酒浸別搗為末一兩半白石英五味子烏賊魚骨去甲各一兩上八味搗羅為末煉蜜為丸如梧桐子大每服二十丸至三十丸溫酒或米飲下空心日午夜臥各一治婦人先有所脫血或醉中房勞傷肝致使月事不來血枯燥干地黃湯方熟乾地黃澤蘭葉白茯苓去黑皮人參五味子附子炮裂去皮臍當歸切炒禹餘糧火煅醋淬各一兩上八味粗搗篩每服三錢匕才一盞煎至七分去滓溫服空心日午夜臥日三治婦人陰氣衰弱血枯不榮月事不來磁石丸方磁石火煅醋淬三七遍白茯苓去黑皮附子炮裂去皮臍各一兩人參當歸切炒乾地黃焙各一兩上六味搗羅為末煉蜜為丸如梧桐子大每服二十丸至三十丸溫酒或米飲下空心日午夜臥日三服婦人無子論曰婦人所以無子者衝任不足腎氣虛寒也內經謂女子二七天癸至任脈通太衝脈盛陰陽和故能有子若衝任不足腎氣虛寒不通系胞故令無子亦有本於夫病者當原其所因而調之治婦人子宮虛冷胎孕不成或經水不調血氣積冷朴硝蕩胞湯方朴硝牡丹皮當歸切炒大黃銼炒桃仁湯浸去皮尖雙仁炒細辛去苗葉厚朴去粗皮生薑汁炙銼芍藥人參各一兩半桔梗銼炒白茯苓去黑皮桂去粗皮甘草炙銼牛膝酒浸一日切焙各一兩陳橘皮湯浸去白切炒一兩半虻蟲去翅足微炒六十枚附子炮裂去皮臍一兩半上一十七味粗搗篩每服三錢匕水一盞酒半盞同煎至八分去滓溫服食前治婦人下焦三十六疾不孕絶産承澤丸方澤蘭辛夷去根蒂藁本去苗土各一兩葛上亭長七枚炒溲疏銼梅核仁湯去皮尖研各半兩上六味搗羅為末煉蜜和丸如梧桐子大每服五十丸溫酒下日再服治婦人久無子小腹冷疼氣不調乾地黃湯方熟乾地黃淨洗焙當歸切炒各二兩牛膝酒浸一日切焙半兩桂去粗皮牽牛子炒熟各半兩芎藭卷柏炙銼各一兩防風去叉一兩半上八味粗搗篩每服三錢匕水兩盞煎至一盞去滓服食久再服快利為度次服後方禹餘糧湯治婦人胞胎寒冷絶産無子禹餘糧湯方禹餘糧煅淬七遍白殭蠶去黑者微炒烏賊魚骨去甲皮各一兩龍骨碎研桂去粗皮灶下黃土無灰者石葦去毛乾薑炮滑石研赤芍藥半夏漿水浸一宿生絹袋子揉洗去滑切開生薑汁炒黃代赭丁頭者研各半兩上一十二味粗搗篩每服三錢匕水一盞入生薑三片煎至六分去滓食前溫服日再治婦人久無子白薇丸方白薇去土銼當歸銼炒附子炮裂去皮臍芎藭藁本去苗土人參禹餘糧燒醋淬各一兩石斛去根熟乾地黃焙桂去粗皮薑黃切炒紫參柏子仁炒蜀椒去合口並目炒出汗五味子炒防風去叉吳茱萸浸半日炒甘草炙牛膝銼酒浸一宿焙桑寄生炙銼各半兩上二十味搗羅為末煉蜜杵丸如梧桐子大溫酒下二十丸加至三十丸空心食前服治婦人月水不利閉塞絶産白薇人參丸方白薇去土一兩半人參紫菀去苗土紫參銼防風去叉牛膝切酒浸焙細辛去苗葉半夏湯浸去滑七遍切厚朴去粗皮生薑汁炙沙參去蘆頭白殭蠶微炒乾薑炮銼秦艽去苗土蜀椒去目併合口炒出汗當歸微炒各一兩附子炮裂去皮臍二兩杜蘅半兩上一十七味搗羅為末煉蜜和搗丸如梧桐子大每服三十丸溫酒下食前日再服治婦人久無子斷緒杜蘅丸方杜蘅三月三日採根洗曝乾銼半夏湯洗二十遍碎用生薑炒白薇桔梗銼炒附子炮裂去皮臍牛膝切酒浸經宿各一兩石菖蒲蜀椒去合口並目炒出汗細辛去苗葉厚朴去粗皮生薑汁炙沙參去蘆頭防風去叉乾薑炮銼桂去粗皮各半兩上一十四味搗羅為末煉蜜和勻丸如梧桐子大溫酒下二十丸漸加三十丸早晨日午各一服治婦人斷緒無子鍾乳丸方鍾乳研一復時白礬燒令汁盡各一兩阿膠炙令燥紫石英研細蜀椒去目及閉口者炒出汗生乾地黃焙五味子炒蛇床子炒原蠶蛾炒石亭脂研極細各半兩上一十味除石藥別研外余藥搗羅為末同和勻煉蜜和搗丸如梧桐子大每日空心暖酒下二十丸漸加至三十丸治婦人久無子澤蘭丸方澤蘭去根陳橘皮去白焙白龍骨碎研禹餘糧燒赤醋淬七遍紫石英研細遠志去心當歸銼炒芎藭蒲黃炒桃仁浸去皮尖雙仁炒藁本去苗土卷柏微炙銼白芷各一兩覆盆子去梗庵䕡子炒麥門冬去心焙人參桂去粗皮蛇床子炒細辛去苗葉乾薑炮熟乾地黃焙蜀椒去目及閉口者炒出汗白茯苓去黑皮石膏碎研車前子白薇赤石脂研各半兩上二十八味搗羅為末煉蜜和勻丸如梧桐子大每服二十丸溫酒下治婦人月水不利結積無子大黃湯方大黃銼炒一兩桃仁湯浸去皮尖雙仁四十九枚虻蟲去翅足微炒三十枚水蛭糯米內炒候米黃即止三十枚上四味銼如麻豆每服一錢匕酒一盞煎至七分去滓空腹溫服如無結積不可服
