body:
  text: 卷第一十一風腲腿論曰風腲腿之狀四肢不收身體疼痛肌肉虛滿骨節懈怠腰腳緩弱不自覺知也蓋風邪侵於分肉流於血脈營衛稽留澀而不行致身體骨節肌肉腰腳痹滯無力不能用也久不瘥氣體虛羸則變成水病治風腲腿四肢緩弱骨節疼痛皮膚不仁肌肉虛滿腰腳沉重舉止無力五加皮湯方五加皮萆薢獨活去蘆頭防己牛膝酒浸切焙各二兩桂去粗皮赤茯苓去黑皮防風去叉附子炮裂去皮臍薏苡仁當歸切焙秦艽去苗土茵芋海桐皮赤芍藥各一兩羌活去蘆頭麻黃去根節丹參各三分上一十八味銼如麻豆每服五錢匕水一盞半入生薑一棗大拍碎同煎至七分去滓溫服不拘時治風腲腿四肢不收身面浮腫筋骨怠惰皮膚不仁獨活湯方獨活去蘆頭防風去叉赤茯苓去黑皮防己赤芍藥桂去粗皮各二兩芎藭當歸切焙白朮各一兩半人參秦艽去苗土麻黃去根節細辛去苗葉各半兩甘草炙一兩上一十四味㕮咀如麻豆大每服五錢匕水一盞半入生薑一棗大拍碎大棗二枚劈破同煎取七分去滓溫服日二夜一治風腲腿肌肉虛滿四肢不收骨節疼痛防風湯方防風去叉五加皮銼附子炮裂去皮臍萆薢薏苡仁桂去粗皮各一兩牛膝酒浸切焙獨活去蘆頭赤茯苓去黑皮當歸切焙杜仲去粗皮炙海桐皮各一兩半木香枳殼去瓤麩炒仙靈脾各半兩上一十五味㕮咀如麻豆大每服五錢匕水一盞半入生薑一棗大拍碎同煎至一盞去滓溫服不拘時治風腲腿四肢不收蒼耳湯浸淋方蒼耳五升苗亦得羊桃四升二合細銼蒴藋切二升半赤小豆二升半食鹽二升顆塊者上五味以水一石五斗煮取一石去滓適寒溫浸所患腳勿過絶骨每浸一炊頃出勿令湯冷可將湯更番添換令熱若遍身汗出瘥每隔三日一度浸淋避外風治風腲腿肢體不收失音不語萆麻酒方萆麻子油一升酒一斗上二味同於銀石器中盛攪令勻重湯煮一日不住攪候熟每服三合空心日午夜臥各一服初服吐風涎勿怪不吐即涎不出治風腲腿四肢不收失音不語杏仁醞酒方杏仁湯浸去皮尖雙仁三斗糯米一石簸去粳麥曲二十斤焙令乾搗為末上三味先取杏仁二斗搗更入砂盆內爛研漸入水八斗旋研旋絞取汁令盡去滓煎取四斗嘗之若香滑則熟傾入不津甕中如法蓋復作三料醞酒第一醞取糯米六斗炊作飯用曲末一十二斤拌和又取杏仁四升爛研漸以水一斗六升煎取八升寒溫適宜投入前藥甕中醞之令米糜潰第二醞取糯米二斗炊飯用曲末四斤拌和又取杏仁三升爛研漸以水一斗一升煎取六升寒溫適宜投入前藥甕中第三醞用米曲杏仁水汁一切依第二醞法上三醞既畢用臘紙密封莫令氣泄於靜處安候香熟每服取五合不拘時相續飲之常令半醺無至醉吐為妙風不仁論曰風不仁之狀皮膚搔之如隔衣是也由營氣虛衛氣實風寒入於肌肉血氣不相與凝痹結滯皮膚𤸷厚無所覺知內經曰皮膚不營故為不仁此之謂也治風皮膚麻痹不仁積年疥癬補諸不足苦參散方苦參粉一兩羚羊角用上一半鎊及二兩用蒺藜子炒去角石南葉酒醋微炙芎藭細辛去苗葉白朮秦艽去苗土白蘞防己芍藥甘草炙遠志去心沙參白茯苓去黑皮人參石膏搗研如粉前胡去蘆頭當歸切焙獨活去蘆頭黃耆銼乾薑炮山茱萸各一兩附子炮裂去皮臍防風去叉各二兩蜀椒去目並閉口炒出汗半兩上二十六味搗羅別研後拌和再羅為散每服一錢半至二錢匕漸加至三錢匕空腹酒調下須臾以食壓之日再以知為度治風虛皮膚不仁頭目昏痛利咽膈解昏倦烏鴉丸方烏鴉一隻燒為灰麝香別研一分虎骨酥炙白殭蠶炒乾蠍去土炒防風去叉烏蛇酒浸去皮骨炙白附子炮藿香葉各半兩上九味除別研者外搗羅為末入研者拌勻煉蜜丸如梧桐子大每服十丸加至十五丸溫酒下茶清亦得不拘時治風不仁手足𤸷麻及婦人血風頭面虛腫遍身風疥一字散方芎藭烏頭生用去皮臍麻黃去根節地龍炒防風去叉羌活去蘆頭白附子炮天麻各半兩草烏頭去皮尖半錢上九味為細散每服一字食後蔥白薄荷茶調下溫酒亦得治風不仁膝脛𤸷痹兼治皮肉身體諸風烏頭丸方烏頭炮裂去皮臍半兩附子炮裂去皮臍一兩半麻黃去根節先煎掠去沫焙乾二兩防風去叉一兩上四味為細末煉蜜丸如梧桐子大每服五丸加至七丸溫酒下空心午時夜臥各一服若不用防風只生用三味為末麵糊丸如大麻粒大每服三丸至五丸酒下服後未可熱食治風不仁營衛滯澀筋脈緩縱追風丸方萆薢馬蘭花骨碎補去毛狗脊去毛各一兩半黃耆銼五靈脂炒楓香脂研地龍去土炒各一兩草烏頭生用二兩半乳香研兩半沒藥一分上一十一味搗羅為末米醋煮麵糊丸如梧桐子大每服十丸加至十五丸茶酒任下初服五六丸漸加之治風不仁皮膚𤸷痹氣血虛風邪濕痹牛膝散方牛膝酒浸切焙白殭蠶生用天南星生用海桐皮銼附子炮裂去皮臍各一兩麝香研丹砂研各一分狼毒醋煮銼焙半兩上八味各搗研為散和勻再研每服二錢匕熱豆淋酒調下不拘時治風冷營衛不行四肢疼痛皮膚不仁乳香丸方乳香一分熔過研乾蠍青色緊小者去土炒三分烏頭生去皮臍二兩黑豆同炒以豆汗出為度去豆不用上三味搗羅二味為末用醋半升慢火熬成膏下乳香末攪勻候可丸丸如緑豆大每服十丸溫酒下不拘時治風不仁皮膚𤸷麻手足攣急烏蛇散方烏蛇酒浸去皮骨炙防風去叉青葙子各一兩一分羌活去蘆頭一兩獨活去蘆頭麻黃去根節先煎掠去沫焙桔梗炒秦艽去土各二兩一分當歸切焙細辛去苗葉桂去粗皮各三分芎藭白芷微炒附子炮裂去皮臍各二兩半白芍藥蒺藜子炒去角人參天麻各二兩上一十八味搗羅極細每服二錢匕空心溫酒調下日三微汗為度治風不仁手腳𤸷麻疼痛羌活散方羌活去蘆頭獨活去蘆頭防風去叉蔓荊實人參蒺藜子炒去角白茯苓去黑皮芍藥枳殼去瓤麩炒芎藭木天蓼阿膠炙令燥威靈仙去苗土各半兩上一十三味搗羅極細每服二錢匕空心豆淋酒調下溫酒亦得或煉蜜丸如梧桐子大豆淋薄荷酒下十五丸至二十丸治風不仁皮膚𤸷厚搔之如隔衣白花蛇丸方白花蛇酒浸去皮骨炙乾蠍去土炒仙靈脾天雄炮裂去皮臍天麻桂去粗皮麻黃去根節鹿角膠炙令燥萆薢各一兩桑螵蛸炒茵芋烏頭炮裂去皮臍天南星炮各半兩雄黃研麝香研各一分上一十五味為細末外又用大麻仁三兩為細末入無灰酒慢火熬成膏與前末和搗五百杵丸如梧桐子大每服二十丸薄荷酒下不拘時治風不仁皮膚𤸷麻繞腰遍身似蛇皮黑癮旋生旋沒通身𤸷痹五參散方人參沙參丹參苦參玄參堅者各一兩白花蛇酒浸去皮骨炙一兩半上六味為細散每服二錢匕食後夜臥溫酒調下加至三錢匕治風不仁遍身𤸷麻皮膚瘙癢頭痛昏倦牛膝天麻丸方牛膝酒浸切焙一兩天麻酒浸切焙一兩半麝香研桂去粗皮各一分乾蠍炒去土白花蛇肉酒炙各半兩檳榔銼獨活去蘆頭各三分防風去叉一兩上九味為末煉蜜和丸如梧桐子大每服十五丸薄荷酒下荊芥湯亦得不拘時治榮氣虛為不仁皮膚搔之如隔衣狀秦艽湯方秦艽去土連翹升麻芍藥防風去叉羚羊角鎊屑木香枳殼去瓤麩炒薏苡仁各半兩上九味細銼分為六服每服以水二盞入生薑五片煎取一盞去滓緩緩溫服治皮膚𤸷痹不知痛癢去風毒摩風膏方龍骨二兩虎骨酒炙三兩當歸切焙桂去粗皮各一兩四味同為末苦酒二升皂莢去黑皮炙為末八兩上六味除酒外搗羅為末先將酒別取皂莢十挺挼取汁去滓入鐺中煎減半即入皂莢末熬次入前四味候如稀餳入瓷盒盛患者旋取揩摩身體風瘙癢論曰風瘙癢者表虛衛氣不足風邪乘之血脈留滯中外鼓作變而生熱熱則瘙癢久不瘥淫邪散溢搔之則成瘡治遍身發癢如蟲行藁本散方藁本去苗土蒺藜子炒土角人參白花蛇酒浸去皮骨炙各三分枳殼去瓤麩炒防風去叉威靈仙各半兩防己一分上八味搗羅為細散每服一錢匕食後溫酒或荊芥湯調下治脾肺風毒攻皮膚瘙癢或生瘡癬威靈仙散方威靈仙去土防風去叉羌活去蘆頭甘草炙各一兩紫參半兩荊芥穗一分上六味搗羅為細散每服二錢匕蜜湯調下不拘時治皮膚風癢晝夜不止五白散方白附子炮白殭蠶炒白蒺藜炒白蘚皮各一兩白花蛇酒浸去皮骨炙三兩上五味搗羅為細散每服一錢匕空心臨臥溫酒調下治風客皮膚瘙癢麻痹天麻丸方天麻附子炮裂去皮臍芎藭烏藥白附子生用各一兩荊芥穗八兩龍腦別研麝香別研各一錢上八味除別研外搗羅為細末拌勻煉蜜丸如雞頭大每服一丸空心臨臥溫酒嚼下治皮膚風癢瘡癬𤸷麻冷痹熱毒癰癤四生丸方草烏頭半兩白殭蠶苦參黑牽牛各一兩並生用上四味搗羅為細末酒煮麵糊丸如梧桐子大每服十五丸溫酒下日三治風皮膚瘙癢麻痹枳殼散方枳殼去瓤麩炒二兩苦參蒺藜子炒去角蔓荊實各一兩上四味為細散每服二錢匕溫酒調下不拘時治風瘙癢搔之成瘡荊芥散方荊芥穗麻黃去根節湯煮掠去沫焙羌活去蘆頭獨活去蘆頭各等分上四味搗羅為細散每服二錢匕臘茶或溫酒調下食後臨臥服治風瘡癢搔之成瘡丹麥丸方丹參苦參升麻各一兩黃芩去黑心防風去叉各半兩枳殼去瓤麩炒烏頭炮裂去皮臍各一兩上七味搗羅為細末煉蜜丸如梧桐子大每服三十丸食後溫漿水下治肺風皮膚瘙癢或生癮疹疥癬苦參丸方苦參一斤白莢去皮並子椎碎二斤以水一斗浸揉取濃汁濾去滓熬成膏上二味搗苦參為細末白莢膏和丸如梧桐子大每服三十丸荊芥薄荷酒下治風瘙癢枳殼湯方枳殼去瓤麩炒三兩上一味粗搗篩每服三錢匕水一盞煎至七分去滓溫服治肺風熱皮膚瘡癬瘙癢秦艽丸方秦艽烏蛇酒浸去皮骨炙苦參升麻枳殼去瓤麩炒黃芩去黑心防風去叉各一兩半惡實二合大黃銼炒二兩上九味搗羅為細末煉蜜和丸如梧桐子大每服三十丸食後以溫漿水下治熱毒風攻遍體瘙癢癮疹皮膚𤸷痹肢節疼痛大腸不利天麻散方天麻防風去叉羌活去蘆頭甘菊花杏仁去皮尖雙仁炒令黃各二兩甘草炙銼一兩上六味搗羅為散每服三錢匕空心蜜酒調下日再服治風熱皮膚瘙癢癮疹生瘡如水疥或如粟粒天門冬丸方天門冬去心焙二兩枳殼去瓤麩炒三兩白朮銼人參各一兩半獨活去蘆頭苦參各一兩一分上六味搗羅為末煉蜜丸如梧桐子大每食後米飲下三十丸日二服治遍身瘡疥皮破肉痛或瘙癢膿水八味散塗傅方蜀椒去目吳茱萸湯洗焙乾炒青鹽研石硫黃研膩粉研白殭蠶炒柏皮各一兩麝香少許研上八味搗研為散豬膽汁調塗之濕則干敷治風瘙癢如蟲行或𤸷痹不仁防風湯淋洗方防風去叉益母草苦參各三兩蒺藜子炒五兩荊芥穗蔓荊實枳殼去瓤麩炒二兩上七味粗搗篩每用三兩水一斗煎至八升乘熱淋洗患處治風皮膚𤸷麻疼痛瘙癢莽草湯淋洗方莽草藁本去土桔梗去蘆頭炒地榆穀精草生乾地黃枳殼去瓤麩炒各一兩蜂窩一枚大者細銼上八味粗搗篩每用三兩水一斗煎至八升乘熱淋患處風㾦癗論曰風㾦癗者由腠理不密陽氣外泄發而為汗汗出未已為風邪所搏風熱相併不得流行故結為㾦癗狀如麻豆甚者漸長搔之成瘡治風癮疹㾦癗腫起時癢時痛獨活丸方獨活去蘆頭天門冬去心焙防風去叉蒺藜子炒去角桔梗去蘆頭炒各一兩一分薏苡仁炒黃連去須各一兩桂去粗皮半兩枳實去瓤麩炒一兩半上九味搗羅為細末煉蜜和丸如梧桐子大每服二十丸空