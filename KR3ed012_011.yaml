為散每服二錢匕溫酒調下日三不拘時治風瘙癮疹紫威散方紫威去心瓦上焙一兩凌霄花是也附子炮裂去皮臍半兩上二味搗羅為散每服一錢匕蜜酒調下日二治風瘙癮疹皮膚腫癢茵陳蒿散方茵陳蒿一兩荷葉半兩上二味搗羅為散每服一錢匕冷蜜水調下食後服治風遍身癮疹搔癢麻木醉仙散方胡麻惡實炒枸杞子蔓荊實四味同炒煙出蒺藜子炒苦參栝蔞根防風去叉各半兩上八味搗羅為細散入輕粉一分和勻每服一錢匕食前茶清調下日二夜一治風瘙皮膚癮疹癢痛或有細瘡蒺藜子散方蒺藜子炒去角二兩枳殼去瓤麩炒荊芥穗羌活去蘆頭防風去叉各一兩蒼朮米泔浸一宿刮皮銼炒四兩上六味搗羅為散每服一錢匕溫酒或臘茶調下不拘時治風癮疹經旬不解石南酒方石南葉去粗莖生用三兩上一味搗羅為末每服半錢至一錢匕用酒三合煎一沸空心溫服治風瘙癮疹三十年不瘥松葉酒方松葉一斤上一味細切以酒一斗煮取三升日夜服盡處溫室中衣復出汗即瘥治風癮疹搔癢不止白蜜酒方白蜜一合酒二合上二味相和煎暖食前服治風瘙癢癮疹時時發動麻黃湯方麻黃去根節煎掠去沫焙桂去粗皮黃連去須當歸切焙羌活去蘆頭白芷各一兩王不留行甘草炙防風去叉芎藭白蒺藜天雄炮裂去皮臍各一兩半桑根白皮石膏各二兩紅藍花炒半兩上一十五味銼如麻豆每服三錢匕水一盞入生薑三片煎至七分去滓溫服治風疹發歇不瘥或赤或白瘙癢至甚蒺藜子湯方蒺藜子炒去角二兩仙靈脾防風去叉芎藭萆薢白石脂枳殼去瓤麩炒各一兩半桂去粗皮黃芩去黑心各半兩白朮麻黃去根節羌活去蘆頭天雄炮裂去皮臍羚羊角屑黃連去須各一兩旋覆花炒三分上一十六味銼如麻豆大每服五錢匕水一盞半入生薑二片烏梅肉半棗大同煎至八分去滓溫服治皮膚中如蟲行口噤語澀腰脊強直手足拘攣及身體癮疹抓之作瘡石南湯方石南乾薑炮黃芩去黑心細辛去苗土人參各一兩桂去粗皮麻黃去根節當歸切焙芎藭食茱萸各一兩半生乾地黃三兩焙甘草炙銼二兩上一十二味粗搗篩每服五錢匕水一盞酒一盞同煎至一盞去滓空心熱服日二治風瘙癮疹心中煩悶天雄丸方天雄炮裂去皮臍一兩防風去叉一兩半牛膝酒浸切焙桂去粗皮乾薑炮細辛去苗葉人參各三分栝蔞根五分白朮二兩上九味搗羅為末煉蜜和丸如梧桐子大每服二十丸空腹米飲下日二治風熱頭面身體瘙癢癮疹枳實丸方枳實去瓤麩炒一兩半天門冬去心焙獨活去蘆頭黃連去須防風去叉蒺藜子炒去角桔梗炒各一兩一分薏苡仁一兩桂去粗皮一分上九味搗羅為末煉蜜和丸如梧桐子大每服二十丸空腹米飲下日二治風癮疹久不瘥每發或先心腹痛痰噦麻痹筋脈不仁小朱散方成塊赤土有砂石者不可用當歸切焙上二味等分搗羅為散冷酒調下二錢匕兼用塗藥方慎火草大葉者亦名景天花生薑和皮不洗等分研鹽量少許上三味塗摩癢處如遍身癮疹塗發甚處自消治風癮疹蒴藋湯淋洗方蒴藋一兩切上一味以水三碗煎五七沸冷暖得所洗患處治風瘙癮疹皮膚苦癢搔之血出蒴藋膏方蒴藋根切蒺藜子白者茺蔚草切各一升附子去皮臍獨活去苗犀角鎊薔薇根銼白芷防風去叉苦參銼升麻漏蘆防己銼各三兩木香二兩蛇銜草二兩枳殼去瓤五枚茵芋去粗莖一兩半蜀椒去目併合口者一兩上一十八味並生用粗搗篩以頭醋浸令浥浥一宿先用銅石或銀器於炭火上煎豬膏五斤去滓膜入藥煎令小沸約自辰至申待白芷色黃膏成停溫去滓內不津器中取摩病處治風癮疹色赤蛇銜草敷之蛇銜草不拘多少上一味取新者爛搗敷之治風癮疹芒硝湯洗方芒硝研上一味以熱湯和拭病上治風癮疹癢痛難任芎藭粉摩方芎藭白芷麻黃根各二兩藿香一兩米粉二升上五味搗羅為粉摩病上治風赤白癮疹積年不愈每發遍身腫久恐入腹傷人礬石塗方礬石生搗末三兩清酒三升上二味先煮酒令沸次入礬石末同煮如稀糊塗之治風赤疹景天塗方景天生用一斤慎火草是也上一味搗研絞取汁塗疹上熱炙手尉之瘥治風白疹枳實尉方枳實生用八兩上一味搗碎以醋浸令浥浥炒熱用熟帛包裹尉疹上冷即易分作兩包子更相炒尉尤佳治丹毒癮疹升麻膏方升麻白薇漏蘆去蘆頭連翹芒硝黃芩去黑心蛇銜枳殼去瓤麩炒各三兩山梔子仁四十枚蒴藋四兩上一十味細銼以水三升豬脂三升煎候水涸去滓干瓷器中盛遇有疾塗之治身體赤癮疹起搔之成瘡莽草膏方莽草半兩當歸銼炒芎藭躑躅花大戟細辛去苗葉赤芍藥芫花附子炮裂去皮臍蜀椒去目併合口者炒出汗各一兩豬脂二升上一十一味以豬脂煎候附子色黃膏成塗之治癮疹馬藺浴湯方馬藺花蒴藋茺蔚子礬石燒令汁枯蒺藜子炒去角茵芋羊桃根萹蓄各二兩上八味細銼以漿水二斗煎至一斗去滓淋洗治癮疹諸療未瘥白朮浴湯方白朮三兩戎鹽礬石椎碎各半兩黃連去須黃芩去黑心細辛去苗葉芎藭茵芋各一兩上八味細銼以水二斗煮取一斗去滓淋洗治風疹鬼箭湯方鬼箭白蘞白朮礬石熬令汁枯甘草銼炙各一兩防風去叉二兩上六味粗搗篩每服五錢匕水一盞半粟米粉二錢匕同煎至七分去滓食後溫服兼用粉身治風瘙癮疹烏頭粉方烏頭炮裂去皮臍桔梗炒細辛去苗葉白朮各一兩鉛丹研一兩半上五味搗研極細和勻時用少許粉身體瘙癢處
