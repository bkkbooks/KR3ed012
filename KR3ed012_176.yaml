body:
  text: 卷第一百七十六小兒咳逆上氣論曰小兒咳逆上氣者肺經有寒也肺者氣之主處於膈上小兒啼呼未定因以飲乳與氣相併停滯胸膈引乳射肺令咳而氣逆故謂之咳逆或由肺挾風冷乳哺不節難經云形寒飲冷則傷肺此之謂也治小兒咳逆上氣杏仁煎丸方杏仁去皮尖雙仁研紫菀去苗土款冬花炒各一兩麻黃去根節八兩五味子桂去粗皮各半兩甘草炙銼乾薑炮各二兩上八味除麻黃杏仁外搗羅為末以水一斗先煎麻黃至六升去滓下杏仁更煎至三升乃納諸藥及飴糖四兩蜜八兩於慢火上攪不停手熬令可丸即丸如大豆大五六歲兒每服三丸食後溫熟水化下日三治小兒咳逆吳茱萸湯方吳茱萸湯洗五遍炒二兩桂去粗皮半兩款冬花炒射干紫菀去苗土各一兩上五味粗搗篩每用一錢匕水一盞生薑一棗大拍碎煎至五分去滓分溫三服更量兒大小加減治小兒咳逆喘息如水雞聲麻黃湯方麻黃去根篩煎去沫焙射干紫菀去苗土甘草炙銼各一兩桂去粗皮半兩半夏五枚生薑湯洗十遍炒上六味粗搗篩五六歲兒每服一錢匕水一盞棗一枚生薑少許煎至五分去滓納蜜半錢匕更煎一二沸食後溫服日三量兒大小加減治小兒上氣咳逆不止七味半夏湯方半夏湯洗十遍炒二兩紫菀去苗土桂去粗皮阿膠炙令燥甘草炙銼各一兩細辛去苗葉款冬花各半兩上七味粗搗篩每服一錢匕水一盞生薑少許煎至五分去滓投蜜一匙攪化食後服日三更量兒大小加減治小兒咳逆上氣五味半夏湯方半夏生薑湯洗十遍炒紫菀去苗土細辛去苗葉阿膠炙令燥桂去粗皮各二兩上五味粗搗篩每用一錢匕水一盞煎至六分去滓分溫三服空心午間日晚各一更量兒大小加減治小兒咳逆上氣喉中有聲不通利紫菀散方紫菀去苗土一兩杏仁去皮尖雙仁炒細辛去苗葉款冬花各一分上四味搗羅為散二三歲兒每服半錢匕米飲調下日三更量大小加減治小兒上氣喘息如水雞聲射干湯方射干半夏湯浸洗七遍焙各一兩桂去粗皮一兩半上三味粗搗篩五六歲兒每服一錢匕水一盞生薑少許煎至四分去滓溫服治小兒咳逆上氣杏蜜煎方杏仁去尖皮雙仁生研如膏蜜各二兩上二味和勻於銀石鍋內慢火熬成煎旋丸一二歲兒每服如綠豆大一丸溫水化下更量兒大小加減治小兒上氣咳嗽不得安臥桔梗飲方桔梗銼炒一兩桑根白皮銼貝母去心白茯苓去黑皮大青五味子吳藍人參各三分甘草炙銼一兩半上九味粗搗篩每服一錢匕水八分煎至四分去滓食後溫服量大小加減治小兒咳逆上氣喘滿氣促調順胃氣進益飲食前胡丸方前胡去苗人參半夏湯浸去滑七遍切焙白朮各一兩丁香一分上五味搗羅為細末生薑自然汁煮麵糊丸如綠豆大每服五丸至七丸食後臨臥生薑湯下治小兒咳嗽氣急紫菀湯方紫菀去苗土二兩貝母去心洗款冬花各一兩上三味細銼每服一錢匕以水七分煎取四分去滓溫服食後小兒嘔吐論曰小兒嘔吐者脾胃不和也或因啼呼未定而遽飲乳或因乳中傷冷令兒飲之皆致嘔吐蓋兒啼未定氣息未調遽令飲乳其氣尚逆乳不得下停滯胸膈胸滿氣急故令嘔吐乳母乘涼冷氣入乳乳汁變壞不捻除之因以飲兒壞乳入胃則令腹脹氣逆故亦變嘔吐又有小兒沐浴不避風冷風冷與血氣相搏胃生蘊熱亦為嘔吐當審其形證冷熱依法治之治小兒嘔吐膈上有冷橘皮湯方陳橘皮湯浸去白焙細辛去苗葉乾薑炮裂各一分大黃銼炒甘草炙各三分上五味粗搗篩每服一錢匕水七分煎至四分去滓分溫三服一日令盡更量兒大小以意加減治小兒嘔吐不止厚朴湯方厚朴去粗皮生薑汁炙人參各一分粟米炒一合上三味粗搗篩每服一錢匕水七分入生薑二片同煎至四分去滓分溫二服早晨日晚各一服更看兒大小以意加減治小兒吐逆丁香湯方丁香半分桂去粗皮一分人參半兩甘草炙半兩藿香葉一分乾薑炮裂半兩白茯苓去黑皮一分上七味粗搗篩每服半錢匕水五分同煎至三分去滓溫服入棗煎更妙治小兒吐逆不定丁香湯方丁香花桑葉如無枇杷葉代人參白茅根銼藿香用葉各一分上五味粗搗篩每服一錢匕水七分入生薑一片煎至四分去滓量兒大小加減服之治小兒脾胃不和吐逆不止訶黎勒丸方訶黎勒皮煨去核二枚丁香一錢陳橘皮湯浸去白焙一分半夏湯洗去滑炮一分人參一分上五味搗羅為末用生薑汁煮麵糊丸如綠豆大每服七丸生薑湯下乳食前治小兒吐逆不止石亭脂散方石亭脂一分白滑石二錢上二味細研為散煎竹葉糯米湯調下一字匕立止治小兒胃氣虛弱多痰吐逆乳食難停丁香溫胃丸方丁香二錢天南星一分漿水煮透軟切作片子焙令乾半夏一分漿水煮令軟切作片子焙令乾水銀一分黑鉛半分與水銀結成沙子白豆蔻去皮一分上六味搗羅為末用黃蠟一兩熔和成煎丸如綠豆大每服二丸或三丸丁香湯下治小兒胃虛不思乳食噦逆膈悶肉豆蔻丸方肉豆蔻去皮一枚生薑切焙乾一錢木香一錢人參一分青橘皮湯浸去白焙一分白朮一分上六味搗羅為末白麵糊丸如綠豆大每服五丸米飲下不拘時服治小兒吐逆不定木瓜湯方木瓜生者生薑不去皮上二味各半兩切作片子水一盞煎至五分去滓量兒大小分減溫服治小兒一切吐逆不止水銀丸方水銀結沙子半錢丁香葛根各一兩半夏湯浸七遍焙一錢上四味搗研為末用生薑汁和麵煮糊為丸如黃米大每服三丸煎金銀湯下更量兒大小加減治小兒吐逆麥門冬散方麥門冬去心焙一兩石膏生用半兩甘草一分炮上三味搗羅為散每服半錢匕量兒大小加減煎茅香根生薑湯調下治小兒吐逆木香丸方木香末黑犬膽各一分上二味以膽汁和木香末丸如大豆大每服二歲以下粥飲化一丸治小兒吐逆滑石散方白滑石二錢鯉魚膽乾者五枚上二味搗研為散每服半字匕倒流水調下治小兒胃熱吐逆妙聖丸方龍腦粉霜膩粉滑石上四味各等分研為細末麵糊丸如綠豆大每服一丸煎乾柿湯下不拘時服治小兒心膈伏熱生涎霍亂躁悶身體多熱乳食難停吐逆不定大戟丸方大戟漿水煮過切焙乾搗羅取末三錢膩粉粉霜各一錢半水銀鉛各一分二味結沙子乳香研丁香為末各一錢龍腦半錢上八味研令勻熔黃蠟一分和為膏旋丸如麻子大每服三丸至五丸量兒大小加減如煩躁研生脂麻馬齒莧水下吐逆煎馬齒莧丁香湯下治小兒冷氣吐逆不止心胸痞滿金針丸方陽起石研一分杏仁十五枚湯浸去皮尖雙仁炒不灰木生研半兩阿魏半錢巴豆去皮膜十二枚上五味除巴豆杏仁別研外搗為細末後入二味再研令勻用糯米飯丸如雞頭大火焙乾每服一丸用針穿燈焰上燎透為度入鹽少許同研細冷生薑湯調下量兒大小分減與之治小兒風熱吐不止甜硝散方甜硝一錢滑石白膩者半兩上二味同研為散每服半錢匕用漿水半盞以下入生油一點打勻調下立止治小兒脾胃不和腹脹氣逆變成嘔吐人參散方人參白茯苓去黑皮各一兩葛根銼二兩木香藿香取葉甘草炙銼各一分上六味搗羅為散每服一錢匕水一盞煎至六分溫服治小兒吐逆不定乳香丸方乳香研丹砂研麝香研各一錢半夏半兩湯洗七次生薑汁炒黃上四味搗研為末麵糊和丸如綠豆大每服五丸米飲下量兒大小加減服治小兒胃氣虛寒嘔吐不止不下乳食丁香湯方丁香二錢胡椒一錢檳榔一枚銼上三味粗搗篩每服半錢匕水半盞入白茅根少許同煎至三分去滓溫服不計時候量兒大小加減服治小兒吐逆不止麝香湯方麝香一錢研五靈脂一兩為末上二味拌勻每一錢匕水酒各半盞煎至半盞去滓溫分二服量兒大小加減小兒噦論曰小兒氣弱不能勝乳致乳滿胃中氣既不得傳導復遇呼吸風冷則使胃氣上逆故令噦能節其乳仍溫胃氣則噦自愈治小兒噦逆麝沉散方麝香研沉香銼各一分上二味搗研為散拌勻每服半錢或一錢匕沸湯點服量兒大小加減治小兒噦逆不止訶黎勒散方訶黎勒皮一分人參檳榔銼甘草炙陳橘皮湯浸去白切炒沉香銼各半兩上六味搗羅為散每服一字或半錢至一錢匕量兒大小煎麥糵湯調下治小兒噦牛乳飲方牛乳生薑自然汁各一合上二味於銀器中慢火煎沸一歲兒飲二分盞更量大小加減治小兒噦不止羊乳飲方羊乳一升上一味慢火於銀器中煎令減半分作五服更量兒大小加減治小兒胃氣虛噦逆丁香補胃丸方丁香一錢藿香一分附子炮裂去皮臍二錢定粉炒研檳榔銼各一分上五味搗研為末滴水丸如梧桐子大每服一丸至二丸米飲下不計時量大小加減治小兒胃氣虛冷噦逆不止枇杷葉散方枇杷葉炙去毛丁香各一錢白茅根人參各一分上四味搗羅為細散每服半錢或一錢匕煎馬齒莧湯調下不計時量兒大小加減治小兒噦逆不止乳食不進遂愈散方滑石末一錢丁香二七粒為末藿香末半錢上三味同研勻細每服一字或半錢匕生油調下量兒大小加減治小兒噦逆腹脹消乳進食丸方陳橘皮湯浸去白焙乾生薑去皮切二味同炒黃色各一兩上二味同搗羅為末水浸炊餅心和丸如麻子大每服一二歲兒橘皮湯下七丸量兒大小加減服治小兒脾胃虛寒噦逆不止木香丸方木香草豆蔻去皮檳榔銼青橘皮去白焙陳橘皮去白焙各一分肉豆蔻去殼一顆京三稜炮銼一兩上七味搗羅為末麵糊和丸如綠豆大每服五丸溫生薑湯下量兒大小加減服治小兒脾胃虛寒噦逆不入乳食人參丸方人參白茯苓去黑皮各一分白朮木香山芋丁香各一錢上六味搗羅為細末白麵糊和丸如綠豆大每服七丸生薑湯下奶食前服量兒大小加減服治小兒胃寒多噦人參丸方人參白茯苓去黑皮陳橘皮去白焙白朮半夏湯洗去滑各半分甘草炙銼乾薑炮各一分上七味搗羅為末麵糊和丸如黃米大每服十丸或十五丸煎藿香湯下量兒大小加減服小兒吐哯論曰小兒飲乳後忽吐逆乳汁者名曰吐哯蓋由乳哺冷熱不調停在胸膈復因飲乳舊乳未消新乳又入氣不通宣新陳相壓所以吐哯當節乳則愈治小兒吐哯胸中痞滿乳飲停積麝香湯方麝香研木香人參沉香銼赤茯苓去黑皮各一分丁香半分上六味粗搗篩每半錢匕水半盞煎數沸去滓分溫二服治小兒吐哯胸中冷氣停結黃耆湯方黃耆人參各三分當歸切焙芍藥甘草炙銼芎藭各半兩細辛去苗葉一分上七味粗搗篩每一錢匕水七分煎至四分去滓分溫二服早晚各一更量兒大小加減治小兒初生吐不止鹽黃散方鹽兩黃米大牛黃兩粟米大研人參白茯苓各一小豆大甘草兩小豆大炙上五味先搗研四味為末以乳汁半合煎三五沸入牛黃末攪勻分減服之治小兒吐乳麝香丸方麝香一錢研丁香搗末杏仁去皮尖雙仁炒研各一分上三味研搗為細末以粟米飯丸如麻子大每服五丸人參湯研下更量兒大小加減治小兒飲乳後吐哯不止丁香丸方丁香一分藿香葉半兩人參三分上三味搗為細末煉蜜丸如綠豆大每服三丸粥飲下治小兒吐哯不定枇杷葉散方枇杷葉去毛炙丁香各一分上二味搗羅為散兒小者於乳頭上塗一字令兒咂之兒大者煎棗湯調下不拘時更量大小加減治小兒吐奶不止妙功散方藜蘆洗焙上一味搗為細散以少許吹入鼻中嚏三兩次立止治小兒吐乳莎草根散方莎草根炒去毛香附子是也甘草炙銼各半兩上二味搗羅為散每一錢匕水七分煎至四分去滓溫分二服早晚各一細細呷之更量大小加減治小兒吐哯乳母服人參湯方人參陳橘皮去白焙各二兩上二味搗羅為散每一錢匕水七分生薑半棗大拍破煎至四分去滓分溫二服服後與兒乳吃治小兒嘔吐不止人參散方人參一兩為末丹砂半兩研上二味同研令勻每服半錢匕熟米飲調下更量大小加減治小兒吐不止雙石散方石亭脂一錢白滑石三錢上二味研為細散每服一字匕煎竹葉糯米湯調下更量大小加減治小兒吐逆不止丁香散方丁香半分桂去粗皮藿香葉各一分人參甘草炙銼乾薑炮各半兩白茯苓去黑皮一錢上七味搗羅為細散每服半錢匕水七分煎至四分溫服更量大小加減治小兒吐逆不止二生湯方生木瓜生薑不去皮上二味等分切作薄片量兒大小以水煎熱去滓與服小兒乳癖論曰小兒脾胃氣弱保養不慎則令三焦不調乳飲不化聚而成痰流於脅下寒氣乘之遂成癖聚久不消橫連少腹上至心下按之苦痛肌膚漸弱面色青黃多睡目澀寒熱往來嘔吐咳嗽故謂之乳癖世呼為奶癖是也治小兒乳癖積氣散方粉霜研一錢半訶黎勒皮為末四錢硫黃研一錢半京三稜為末七錢密陀僧研五錢白丁香研二錢上六味搗研為散再同研勻每服一錢匕用生薑漿水調下後於五更服青靈丸治小兒乳癖青靈丸方粉霜丹砂研膩粉各一錢水銀二錢用鉛少許結沙子麝香研半錢青黛二錢巴豆三十粒去皮心膜出油盡研上七味各細研再同和勻用麵糊為丸如黃米大薄荷湯下五丸至七丸新水亦得治小兒乳癖二香散方白丁香直者四十九粒丁香二十一枚為末石燕子一枚搗研硫黃研三錢膩粉抄一錢匕研密陀僧研硇砂研各三錢上七味同研勻為細散每服一歲半錢匕二歲一錢匕十歲以上二錢匕用麵湯調下如左肋下病臥左邊如右肋下病臥右邊至曉取下癖積是驗治小兒乳癖食癖每至午後時作寒熱微有咳嗽脅肋癖硬燒青丸方輕粉二錢太陰玄精石研一分粉霜硇砂研各一兩白麵三錢上五味再同研細滴水和為餅子以文武火燒熟為度再研滴水和為丸如黃米大三歲以上每服五丸漿水下三歲以下以意增減治乳癖硇砂丸方硇砂礞石粉霜鷹屎無食子京三稜各用末一錢匕膩粉三字龍腦研一字上八味再同研勻以麵裹大棗燒熟取棗肉和藥丸如綠豆大每服三丸或五丸煎古老錢湯下量兒大小加減兼治久積面燒棗不燒藥次用外貼藥治乳癖外貼散方蕓薹子末三錢寒食麵一錢半上二味再同研勻用新水調如糊紙上攤貼乳癖上頻以水潤之治小兒乳癖脅下結塊不消膩粉丸方膩粉白丁香微炒各一分上二味再同研勻以棗肉和丸如黍米大每服一丸新汲水下取下黏滯惡物效量兒大小加減不計時候治小兒乳癖神效金花散方白丁香直者微炒七十粒丁香二十五粒二味為末密陀僧研硫黃研黃鷹屎白研各半錢上五味再合研勻每服三歲以下一字匕三歲以上半錢至一錢匕並用奶汁調下臨臥服至來日取下青黑稠黏物即愈未盡不過再服治小兒乳癖方獨窠蒜一頭上一味將蒜搗爛看兒癖大小候兒睡著隨病大小貼聽兒腹內作聲便急取去不用治虛中挾積並乳癖聖餅子方石燕子末二錢粉霜三錢膩粉硇砂研各二錢延胡索一分為末鷹屎白研一錢白麵四錢丹砂研一錢上八味用雞子清和丸如雞頭大作餅子煻灰火內微燒過每服米飲化下半餅子治小兒乳癖積塊消癖丸方牽牛子一兩半生半炒皂莢肥者三挺燒令煙盡為度巴豆去皮心研出油夏秋半兩春冬一兩上三味除巴豆外搗羅為末後入巴豆再同研勻用粟米飯丸如綠豆大每服三丸橘皮湯下如常服丸如粟米大茶下三丸量兒大小加減治小兒乳癖攻脅肋緊痛如神散方獨頭蒜一顆研樓蔥一寸研膩粉半錢凌霄花末一錢上四味再同研勻調塗脅肋上硬處用醋麵餅子貼蓋之候口內聞蒜氣急用溫湯洗去治小兒奶癖腹脅緊硬時作寒熱牽牛丸方白牽牛末二錢粉霜一錢膩粉三錢硇砂研一錢半黃鷹屎末一錢白丁香為末一錢延胡索大者七枚搗末石燕子搗研一枚白滑石末一錢沒藥研一錢白麵五錢上一十一味研為細末拌和勻滴水和作餅子先於火上炙乾次入灰火煨熟為度放冷細研更入硫黃一錢同研勻滴水和為丸如綠豆大看兒大小每服三丸至五丸煎柳枝幹柿湯下臨睡服治小兒乳癖肌瘦寒熱脅下硬痛化癖丸方生薑切片子曝乾為末丹砂研各二錢巴豆霜一字硇砂研白滑石搗研各二錢上五味再同研勻粟米飯和為丸如黃米大每服二丸薄荷湯下奶食後臨臥服治小兒乳癖脅肋堅硬喘粗時作疼痛水銀丸方水銀一錢硫黃二錢同研密陀僧二錢搗研膩粉三錢巴豆二粒去皮膜心研出油盡硇砂研半錢上六味再同研勻白麵糊為丸如黃米大每服三丸煎槐葉湯下奶食後臨臥服更量兒大小加減治小兒乳癖滴水丸方黃柏去粗皮銼輕粉研丹砂研天南星炮半夏生薑汁浸一宿湯洗去滑焙各一錢巴豆十粒去心皮出油盡水銀結沙子半皂子大上七味搗羅研為末再同研勻滴水和丸如綠豆大每服二丸或三丸煎生薑蔥白湯下量兒大小加減治小兒虛積乳癖軟金丸方膩粉二錢蓬砂研皂子大硇砂研半皂子大黃連去須半錢太陰玄精石研半錢黃鷹屎半錢巴豆一枚半生半燒粉霜半錢上八味搗研為末再同研勻棗肉和用面劑裹文武火中煨以面熟為度去面取藥旋丸如黃米大每服一二丸甘草薄荷湯下量兒大小加減治小兒乳癖硫黃散方硫黃研密陀僧別搗研膩粉研訶黎勒皮為末各一錢上四味和令勻每服一錢匕奶汁調下更量大小加減治小兒乳癖大黃丸方大黃銼炒桔梗銼炒木香銼陳橘皮去白焙各一分馬牙硝研郁李仁去皮各三分訶黎勒皮一枚烏梅肉炒半分上八味搗羅為末煉蜜和丸如黃米大一歲兒每服七丸米飲下更量大小加減治小兒初生至百日周晬腹內有氣衝心喉及壯熱頭疼嘔逆腹痛寒熱乳癖宣下胎中宿物大黃丸方大黃銼炒一兩丹砂研人參枳殼去瓤麩炒白茯苓去黑皮各一分半柴胡去苗桂去粗皮半分木香一分上八味搗研為末煉蜜丸如綠豆大每服五丸乳汁下日三大者加至二十丸治小兒乳癖積聚按之苦痛肌膚漸瘦面色青黃妙應丸方檳榔銼二枚陳橘皮湯浸去白焙青橘皮湯浸去白焙各半兩木香黃連去須炒莪朮煨銼桂去粗皮各一分上七味搗羅為末每抄一錢匕入巴豆一粒去皮心膜醋煮令黑色並杏仁一粒去皮尖燈上燒作黑灰同研令細與藥末再合研令勻用白麵糊和丸如粟米大每服二丸食後生薑湯下量兒大小加減治小兒脾胃氣弱乳食不化乳飲留於脅下因寒成癖莪朮散方莪朮炮切半兩阿魏一錢水化開浸莪朮一宿慢火炒乾上二味搗羅為細散每服半錢匕紫蘇米飲調下量兒大小加減小兒癥瘕癖結論曰小兒腹中脅下結聚之病有形可驗按之不動者症也假結有形推之浮移者瘕也僻在左右者癖也諸症本於食諸癖本於飲諸瘕本於氣皆由腑臟不和三焦不調又為寒濕之氣所乘故令乳哺不化食飲結聚而為癥瘕癖結之病治小兒陰陽氣不順虛痞脹滿嘔逆腹痛成癥瘕癖結等病萬應丸方檳榔二枚銼陳橘皮去白焙青橘皮去白焙各半兩木香黃連去須莪朮煨銼桂去粗皮各一分上七味搗羅為末每用一錢匕入巴豆一粒去皮心膜醋煮紫色研杏仁一枚去皮尖燈上燒黑研將前藥末同二味合研勻細用白麵糊和丸如粟米大每服二丸食後生薑湯下更量大小加減治小兒癖氣手腳心熱面色黃不下食日漸羸瘦往往復臥久不治變成惡病入夏即瀉痢木香丸方木香茯神去木人參白朮枳殼去瓤麩炒當歸切炒京三稜煨銼知母焙各一兩鱉甲醋炙去裙襴三分大黃銼炒生薑切焙檳榔煨銼桂去粗皮各一分上一十三味搗羅為末煉蜜和丸如麻子大一二百日兒每服一丸二三歲兒二丸至三丸並空腹日晚米飲下微利下惡物為度更隨兒大小增減治小兒症癖大鱉甲丸方鱉甲醋炙去裙襴犀角鎊丹砂研桂去粗皮各半兩大黃銼炒當歸切焙萆薢炒代赭搗研巴豆去皮心膜研如膏各一兩枳殼去瓤麩炒牛黃研麝香研各一分上一十二味搗研為末煉蜜和丸如麻子大三四歲兒每服二丸至三丸空心新汲水下瘥即止更隨兒大小加減治小兒食癖本於腸胃氣弱吃食不化結聚不散腹中隱隱成塊按之即痛芍藥丸方芍藥大黃銼炒鱉甲醋炙去裙襴麻仁研各三分防葵陳曲炒白朮各一分上七味搗研為末煉蜜和丸如綠豆大一歲兒每服三丸三歲至五歲五丸並溫熟水下日再更量兒大小加減治小兒脾積氣三稜丸方京三稜銼石三稜銼雞爪三稜銼莪朮銼各半兩木香一分上五味並生杵羅為末酒煮麵糊和丸如麻子大膩粉為衣每服五丸烏梅生薑湯下量兒大小加減治小兒癥瘕食癖京三稜散方京三稜煨銼鱉甲醋炙去裙襴枳殼去瓤麩炒陳曲炒大腹子銼訶黎勒皮半生半熟厚朴去粗皮生薑汁炙麥糵炒莪朮煨銼青橘皮去白焙各一分上一十味搗羅為散六七歲兒每服半錢匕空腹米飲調下日三更量兒大小加減治小兒食疳長肌膚益顏色化宿食治腹脹破積聚和氣調中檳榔丸方檳榔銼丹砂研阿魏麵裹煨熟代赭研乳香研木香五靈脂炒肉豆蔻去殼各一兩巴豆去皮心膜出油盡半兩蟾頭一枚炙焦上一十味杵研勻細麵糊和丸如黍米大每服二丸溫生薑湯下更量兒大小加減治小兒脾積氣肌瘦膽礬丸方石膽礬研蘆薈研各半兩龍腦研麝香研各一錢丹砂研胡黃連末各一分黃連末一兩用豶豬膽一枚入末在內以好醋煮十餘沸取出掛候乾研為末上七味同研勻細醋煮麵糊和丸如綠豆大每服十丸早晨臨臥溫米飲下更量兒大小加減治小兒奶癖食癖每至午後時作寒熱微有咳嗽脅肋癖硬煉青丸方太陰玄精石一分粉霜硇砂各一錢輕粉二錢白麵三錢上五味同研極細滴水和成餅子文武火燒熟再研滴水丸如黃米大每服七丸漿水下三歲以下五丸更量兒加減治小兒癖氣發即腹脅㽲痛減食黃瘦鱉甲丸方鱉甲去裙襴醋炙二兩防葵人參各五分訶黎勒皮七枚大黃蒸一兩桑菌三分郁李仁去皮炒一兩半上七味搗羅為末煉蜜丸如綠豆大每服三丸至五丸空腹米飲下更量大小加減治小兒癥瘕腹痛脹滿或作塊或皮膚浮腫不能食雄鼠粥方雄鼠肉五兩切炙陳橘皮去白焙半兩鱉甲醋炙去裙襴京三稜煨銼郁李仁去皮研各三分生薑切焙半兩上六味粗搗篩作三帖每帖以水一升煎去滓取半升入粳米一合五味煮作粥空腹食之治小兒氣癖上下左右移動不常木香丸方木香一分白檳榔銼三分大黃蒸焙銼枳實麩炒各三分附子炮裂去皮臍乾薑炮各半分朴硝一兩上七味搗研為末煉蜜和丸如綠豆子大每服三丸至五丸空腹溫湯下更量大小加減治小兒水癖按之作聲牽牛子丸方牽牛子炒枳殼去瓤麩炒各半兩柏皮去粗皮炙甘遂炒桂去粗皮牡丹皮各一分大黃銼三分上七味搗羅為末蜜和丸如綠豆子大每服五丸空腹溫湯下量大小加減
