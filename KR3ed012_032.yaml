body:
  text: 卷第三十二傷寒後身體虛腫論曰血氣滋榮外濡於腠理則形體充實傷寒汗下之後血氣不足腑臟虛寒營衛澀滯津液不通肌肉無以充榮故令身體虛腫若脾與腎臟俱虛不能約制於水水氣流溢於皮膚則變水氣腫滿治傷寒後身體腫滿心胸壅悶喘促氣滿黃耆湯方黃耆一兩枳殼去瓤麩炒微黃三分防己半兩桂去粗皮半兩細辛去苗葉半兩白朮三分赤茯苓去黑皮三分赤芍藥三分當歸切焙半兩上九味粗搗篩每服三錢匕水一盞入生薑半分切煎至六分去滓不計時候溫服治傷寒後身體浮腫喘息促小便不利坐臥不安防己湯方防己三分豬苓去黑皮三分海蛤一兩陳橘皮湯浸去白焙一兩木香半兩白朮半兩桑根白皮銼三分赤茯苓去黑皮三分檳榔銼一兩紫蘇莖葉一兩木通銼一兩半上一十一味粗搗篩每服三錢匕水一盞入生薑半分切煎至六分去滓不計時候溫服治病後脾腎不足水道不利腰腳浮腫木通湯方木通銼一兩桑根白皮炙黃色澤瀉防己赤茯苓去黑皮石葦去毛各三分大腹微煨銼四枚上七味粗搗篩每服五錢匕水一盞半煎至八分去滓食前溫服日二治病後氣虛津液不通皮膚虛滿防己湯下防己黃耆銼桂去粗皮各一兩半赤茯苓去黑皮三兩甘草炙令赤銼一兩上五味粗搗篩每服五錢匕水一盞半煎取七分去滓溫服日再服治傷寒病後脾腎氣虛欲成水病四肢面目浮腫小便澀喘急檳榔湯方檳榔並皮銼五枚桑根白皮炙令黃色銼一兩陳橘皮湯浸去白焙乾三分吳茱萸水浸一宿炒乾一分防己一兩木通銼碎一兩一分郁李仁湯浸去皮微炒一兩上七味粗搗篩每服三錢匕水一盞半煎取七分去滓溫服日二治傷寒後身體浮腫心胸滿悶不欲飲食前胡丸方前胡去蘆頭一兩旋覆花半兩人參三分檳榔銼一兩木香半兩陳橘皮湯浸去白焙半兩訶黎勒皮一兩赤茯苓去黑皮三分桑根白皮銼三分郁李仁湯浸去皮尖微炒一兩桂去粗皮半兩上一十一味搗羅為末煉蜜和搗三二百杵丸如梧桐子大每服煎生薑棗湯下三十丸日三服治傷寒後通體浮腫腹滿堅脹喘急不能飲食郁李仁湯方郁李仁湯浸去皮尖微炒大黃銼碎微炒各一兩柴胡去苗桑根白皮銼澤瀉赤芍藥豬苓去黑皮桔梗炒麻黃去根節各三分杏仁湯浸去皮尖雙仁麩炒微黃鱉甲去裙襴醋炙赤茯苓去黑皮各半兩上一十二味粗搗篩每服三錢匕水一盞入生薑半分切煎至六分去滓不計時候溫服治傷寒病後遍身浮腫木香丸方木香肉豆蔻去殼青橘皮湯浸去白焙檳榔微炒銼各一兩上四味搗羅為末煉蜜為丸如小豆大每服空心溫酒下二十丸漸加至三十丸傷寒後不思食論曰傷寒後不思食者脾胃虛弱故也由汗下之後邪氣已除穀氣未復脾胃虛弱故不思飲食治傷寒後脾胃虛弱不思飲食人參丸方人參白朮厚朴去粗皮薑汁炙各半兩五味子細辛去苗葉各一分陳橘皮湯浸去白焙一兩上六味搗羅為末煮棗肉和丸梧桐子大每服生薑湯下十五丸食前服治傷寒後脾胃氣虛不嗜食及新虛不勝穀氣消食丸方小麥糵曲各一斤乾薑炮烏梅肉各四兩上四味搗羅為末煉蜜丸如梧桐子大每服十五丸溫湯下日再稍加至四十丸治傷寒後脾胃氣虛四肢乏力骨節煩疼口苦舌乾不思飲食茯苓煮散方白茯苓去黑皮柴胡去苗陳橘皮湯浸去白焙訶黎勒去核炮桔梗炒人參各一兩甘草炙半夏湯洗去滑七遍焙各半兩枇杷葉去毛薑汁炙二兩枳殼去瓤麩炒三分上一十味搗羅為散每服五錢匕水一盞半入生薑一分拍碎同煎至七分去滓食前溫服治傷寒後脾胃虛冷不飲食理中丸方人參白朮乾薑炮甘草炙上四味等分搗羅為末煉蜜丸如彈丸大每服一丸沸湯化破食前服治傷寒後胃氣冷不思飲食人參煮散方人參厚朴去粗皮薑汁炙白茯苓去黑皮各一兩柴胡去苗三分半夏湯浸去滑七遍焙枇杷葉去毛薑汁炙草豆蔻去皮各半兩上七味搗羅為散每服五錢匕水一盞半入生薑一分拍碎同煎至七分去滓食前溫服治傷寒瘥後胃虛不思食白朮湯方白朮陳橘皮湯浸去白焙各三分甘草炙一分白豆蔻去皮高良薑各半兩茯神去木一兩上六味粗搗篩每服五錢匕水一盞半入生薑半分拍碎棗二枚劈破同煎至七分去滓食前溫服治傷寒後胃氣未和嘔吐不下食藿香湯方藿香竹茹陳橘皮湯浸去白焙麥門冬去心焙枇杷葉去毛薑汁炙各半兩人參三分上六味粗搗篩每服五錢匕水一盞半入生薑半分拍碎同煎至七分去滓溫服治傷寒後脾胃氣虛全不思食腹臟不調參樸湯方人參厚朴去粗皮薑汁炙各一兩陳橘皮湯浸去白焙訶黎勒炮去核桂去粗皮木香枳殼去瓤麩炒黃耆銼各半兩甘草炙一分白朮三分上一十味粗搗篩每服三錢匕水一盞入生薑半分拍碎棗二枚劈破同煎至半盞去滓食前溫服日再治傷寒後虛羸不思飲食六神湯方人參白朮黃耆茯苓枳實甘草銼各一兩上六味粗搗篩每服五錢匕水一盞半入生薑半分拍碎棗三枚劈破粳米少許同煎至七分去滓食前溫服治傷寒後脾肺未和痰壅欲吐不思飲食參橘湯方人參陳橘皮湯浸去白焙各一兩前胡去蘆頭白朮杏仁湯浸去皮尖雙仁炒枇杷葉去毛薑汁炙各半兩甘草炙一分上七味粗搗篩每服五錢匕水一盞半煎至七分去滓食前溫服治傷寒後胃虛不思食白朮飲方白朮人參生薑切各半兩甘草炙一分上四味銼如麻豆以水三盞煎至一盞半去滓食前分溫二服治傷寒後脾胃有餘熱氣滿不能食百合飲方百合一分人參一分半豉熬粳米淘各半合陳橘皮湯浸去白焙半兩薤白切五莖生薑切半兩上七味銼如麻豆以水五盞煎至二盞半去滓食後分溫三服治傷寒後脾胃虛冷嘔逆不下食薤白飲方薤白切五莖生薑切一兩附子炮裂去臍皮銼一分上三味以水一盞半煎至七分去滓再煎沸入雞子白一枚攪勻空心溫服傷寒後宿食不消論曰胃受谷脾播而消之傷寒發汗吐下之後腑臟俱虛氣血未復脾胃弱不能克化飲食故令宿食不消也其狀煩熱如瘧心胸滿脹噫氣酸臭者是也治傷寒後胃氣虛冷宿食不消麥糵人參丸方大麥糵炒黃人參枳殼去瓤麩炒白朮各一兩甘草炙半兩木香乾薑炮裂各三分上七味搗羅為末煉蜜和搗三五百杵丸如梧桐子大每服食前溫酒下十五丸加至二十丸日再治傷寒後飲食不消腹脅虛滿堅筋倍力大麥糵丸方大麥糵炒黃一兩白朮人參各一兩半枳殼去瓤麩炒檳榔銼半夏湯洗七遍焙陳橘皮湯浸去白焙薏苡仁炒乾薑炮大黃細銼醋炒厚朴去粗皮生薑汁炙各一兩甘草炙三分上一十二味搗羅為末煉蜜和搗三五百杵丸如梧桐子大每服空心米飲下十五丸加至二十丸日再治傷寒後腸胃虛冷食不能化陳曲丸方陳曲搗炒黃一兩乾薑炮白朮人參各一兩半甘草炙枳殼去瓤麩炒大麥糵炒黃厚朴去粗皮生薑汁炙杏仁湯浸去皮尖雙仁炒黃別研各一兩桂去粗皮三分上一十味除杏仁外搗羅為末入杏仁同研勻煉蜜和搗三五百杵丸如梧桐子大每服空心溫酒下二十丸日再治傷寒後新虛穀食不化消食丸方小麥糵炒陳曲各一升乾薑炮烏梅肉各四兩上四味搗羅為末煉蜜和丸如梧桐子大每服十五丸溫水下日再稍加至四十丸治傷寒後胃氣不和不能食縱食不消平胃丸方白豆蔻去皮枳殼去瓤麩炒白朮人參大麥糵炒黃各一兩乾薑炮三分甘草炙半兩上七味搗羅為末煉蜜和搗三五百杵丸如梧桐子大每服空心煎生薑棗湯下二十丸日再治傷寒後宿食不消心腹氣脹參朮丸方人參白朮各一兩半木香陳橘皮湯浸去白焙乾薑炮桂去粗皮赤茯苓去黑皮各一兩檳榔銼半兩枳殼去瓤麩炒一兩上九味搗羅為末煉蜜和搗三五百杵丸如梧桐子大每服空心溫酒下五丸日再治傷寒後脾胃虛冷胸膈氣滯和五臟消宿食木香丸方木香人參白茯苓去黑皮檳榔銼白朮乾薑炮陳橘皮湯浸去白焙訶黎勒炮去核桂去粗皮郁李仁微炒去皮各一兩甘草炙三分吳茱萸湯洗三遍炒乾半兩上一十二味搗羅為末煉蜜和搗三五百杵丸如梧桐子大每服空心米飲下二十丸治傷寒後宿食不消調中丸方白朮高良薑各一兩半桂去粗皮甘草炙人參京三稜炮各一兩紅豆蔻乾薑炮各半兩枳殼去瓤麩炒三分上九味搗羅為末煉蜜和搗三五百杵丸如梧桐子大每服空心溫酒下二十丸加至三十丸日再治傷寒後宿食不化助胃丸方縮砂仁白朮茯苓去黑皮各一兩紅豆蔻甘草炙人參枳殼去瓤麩炒各半兩上七味搗羅為末煉蜜和搗三五百杵丸如梧桐子大每服空心米飲下五丸日再治傷寒後宿食不消心腹妨悶大腸不利疏氣丸方京三稜炮銼二兩牽牛子微炒四兩乾薑炮半兩陳橘皮湯浸去白焙一兩上四味搗羅為末煉蜜和搗三五百杵丸如梧桐子大每服空心生薑湯下二十丸微利為度未利稍加至三十丸治傷寒後宿食不消大腸氣滯大黃丸方大黃二兩細銼醋炒葶藶微炒杏仁湯浸去皮尖雙仁朴硝各一兩上四味搗羅為末煉蜜和搗三五百杵丸如梧桐子大每服食前米飲下十丸以利為度傷寒後不得眠論曰營衛之氣晝行於陽則寤夜行於陰則寐傷寒瘥後臟腑皆虛營衛出入不能循常緣熱邪未散與陽氣並衛氣獨行於陽不得入於陰則陽實陰虛故不得眠治傷寒發汗後虛煩不得眠劇者必反復顛倒心中懊憹梔子豉湯方梔子十四枚香豉四合上二味㕮咀如麻豆大每服三錢匕水一盞煎至七分去滓溫服一二服得吐止後服治傷寒後虛煩不得眠心中懊憹梔子烏梅湯方梔子仁甘草炙黃芩去黑心各半兩烏梅去核炒十四枚柴胡去苗一兩上五味㕮咀如麻豆大每服四錢匕水一盞半生薑三片豉五十粒竹葉二七片同煎至七分去滓溫服治傷寒吐下後心煩氣乏晝夜不得眠酸棗仁湯方酸棗仁炒一兩麥門冬去心焙二兩甘草炙一兩知母切焙半兩白茯苓去黑皮芎藭乾薑炮各三兩上七味㕮咀如麻豆大每服四錢匕水一盞半煎至一盞去滓溫服治傷寒後勞損煩躁不得眠酸棗仁甘草湯方酸棗仁微炒四兩甘草炙銼當歸切焙桂去粗皮人參白茯苓去黑皮石膏碎芎藭各半兩遠志去心一分上九味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服不拘時治傷寒汗後虛煩不得眠睡酸棗仁湯方酸棗仁微炒二兩人參一兩石膏碎半兩赤茯苓去黑皮三分桂去粗皮半兩知母切焙甘草炙各半兩上七味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服不拘時治傷寒後餘熱未散不得眠睡酸棗仁黃芩湯方酸棗仁微炒二兩黃芩去黑心麥門冬去心焙各半兩遠志去心一分人參切一兩桂去粗皮三分茯神去木一兩甘草炙半兩萆薢一分上九味粗搗篩每服五錢匕水一盞半生薑五片煎至一盞去滓食前溫服日再治傷寒後虛煩不得眠睡嘔逆梔子仁湯方梔子仁一分芎藭半兩酸棗仁炒一兩陳橘皮去白炒人參白茯苓去黑皮各半兩豉炒一分上七味粗搗篩每服三錢匕水一大盞生薑三片煎至七分去滓食前溫服日再治傷寒後虛勞不得眠煩悶四肢乏力人參湯方人參一兩酸棗仁微炒三兩當歸切焙芎藭銼桂去粗皮甘草炙銼柴胡去苗赤茯苓去黑皮石膏碎各一兩上九味粗搗篩每服五錢匕水一盞半生薑三片煎至一盞去滓食前溫服治傷寒後虛勞煩熱驚悸不得眠睡柴胡湯方柴胡去苗半兩酸棗仁微炒二兩遠志去心一分當歸切焙防風去叉甘草炙銼茯神去木豬苓去黑皮桂去粗皮黃耆銼人參生乾地黃芎藭麥門冬去心焙各半兩上一十四味粗搗篩每服三錢匕水一大