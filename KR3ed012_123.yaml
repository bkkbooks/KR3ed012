body:
  text: 卷第一百二十三喉中生谷賊論曰喉中生谷賊者喉中結腫疼痛不通飲食妨悶此由禾中有短穗誤作米食之澀搏咽喉如魚鯁不上不下風熱加之則結腫不消若不急療亦能殺人治咽喉生谷賊咽物妨悶升麻湯方升麻木通銼黃柏去粗皮塗蜜炙玄參麥門冬去心焙各一兩竹茹前胡去蘆頭大青各三分芒硝別研湯成下上九味除芒硝外粗搗篩每服三錢匕水一盞煎至六分去滓下芒硝末半錢匕攪令勻食後溫服日三治咽喉生谷賊咽物妨悶射干湯方射干升麻各三分桔梗銼炒一兩玄參木通銼各三分甘草炙銼半兩上六味粗搗篩每服三錢匕水一盞入竹葉七片煎至六分去滓食後溫服如要通利加大黃一兩以利為度治喉中生谷賊若不急治亦能殺人乳香丸方乳香半分硇砂一分琥珀松脂各半兩上四味各研為末再同和勻熔白蠟為丸如雞頭大每服一丸含化咽津以瘥為度治谷賊沖咽喉兩頰上齶舌下暴腫咽物妨悶疼痛方礬石生用上一味研為末少少敷腫處以瘥為度有涎即吐之又方馬牙硝研上一味為末以綿裹半錢匕含化咽津以瘥為度又方上以針刺破令黑血出後含馬牙硝一小塊咽津即瘥治喉中生谷賊結腫疼痛飲食妨悶茯苓散方赤茯苓去黑皮貫衆縮砂仁甘草炙各一兩上四味搗羅為細散每用一錢匕摻喉中以水送下立效治咽喉中生谷賊如鯁狀不上不下疼痛妨悶象牙散方象牙末一分甘草大者一寸滑石半分緑豆粉二兩鬱金小者半塊乳香研硼砂研麝香研各半分上八味搗研為散每服半錢匕新汲水調下治咽喉中生谷賊結腫疼痛妨害飲食五味子湯方五味子炒一兩半乾薑炮麥門冬去心焙桂去粗皮各一兩桑根白皮銼炒三兩粳米炒一合上六味粗搗篩每服三錢匕水一盞煎至五分去滓溫服日三不計時候咽喉腫痛語聲不出論曰咽喉腫痛語聲不出者風邪壅熱客於脾肺之經邪熱隨經上摶於咽喉則血脈壅遏故令喉間腫痛甚則氣道窒塞語聲不出也治咽喉腫痛不得語卒中風毒入於喉間舌強頭面身體疼痛咽喉閉塞氣欲絶者沉香湯方沉香銼木香射干防風去叉升麻甘草炙當歸切焙黃芩去黑心薰陸香藿香葉雞舌香各一兩獨活去蘆頭三兩麻黃去根節先煎掠去沫焙三分大黃銼生用二兩上十四味粗搗篩每服三錢匕水一盞煎至六分去滓食後溫服日三治喉中如有物噎塞聲氣不出竹皮湯方竹皮甘草炙各一兩人參赤茯苓去黑皮麻黃去根節先煎掠去沫焙桂去粗皮五味子木通銼各三分上八味粗搗篩每服三錢匕水一盞入生薑半分拍破煎至六分去滓放溫不計時候服日三治咽喉中腫癢微嗽聲不出黃耆湯方黃耆銼二兩人參一兩桂去粗皮半兩甘草炙一兩赤茯苓去黑皮一兩半上五味粗搗篩每服三錢匕水一盞生薑半分拍破棗二枚擘煎至五分去滓空腹食前各一服治咽喉腫痛語聲不出菖蒲丸方菖蒲二兩孔公孽細研一兩木通銼二兩皂莢一挺長一尺者去黑皮塗酥炙令焦黃去子上四味搗研為末煉蜜和丸如梧桐子大每服二十丸至三十丸煎鬼箭羽湯下不計時候治咽喉噎塞咳嗽杏仁丸方杏仁湯浸去皮尖雙仁炒三分研桂去粗皮一分上二味搗研為末煉蜜和丸如杏仁大每服含化一丸細細咽津治喉痹腫盛語聲不出方馬藺根汁三合上一味入白蜜一合相和慢火煎成煎徐徐咽之日可五七度治喉痹腫盛語聲不出桔梗湯方桔梗炒一兩上一味粗搗篩每服三錢匕水一盞煎至六分去滓溫服不計時候日三治喉痹腫盛語聲不出方生薑汁五合蜜三合上二味相和慢火煎成煎每服取半匙尖含化服咽喉卒腫痛論曰咽喉卒腫痛者脾肺暴熱胸膈壅滯上攻咽喉故發腫痛也亦有服餌丹石過度毒氣在胃多嗜五辛酒面衝於脾肺皆致斯疾源雖不同其為熱則一治咽喉卒腫痛龍腦散方龍腦研一分犀角鎊丹砂研白藥子各三分真珠研黃耆銼甘草炙各半兩牙硝研一兩上八味搗研為散拌勻再羅每服二錢匕新汲水調下不拘時候治風熱毒氣攻咽喉卒腫痛頭面腫塗敷方杏仁湯浸去皮尖雙仁半兩雞子一枚去殼上二味同研勻敷腫處即消若濃黃汁出者醋調伏龍肝塗之治咽喉卒腫痛不下食方薤根一把切上一味炒至焦搗爛於腫處貼以帛子系之治咽喉卒腫痛不下食方附子半枚生搗上一味細羅為散入竹管內吹入喉中治咽喉卒腫痛不下食方生地龍十四枚上一味爛搗塗喉外以帛系之兼治癰發喉中治咽喉卒腫痛不下食方雞子一枚去殼上攪令黃白勻服之治咽喉卒腫痛不下食方白麵不計多少上一味以苦酒和塗喉外腫處治咽喉卒腫痛不下食方大豆一合上一味以水一大盞煮取七分去滓含咽一方用豉治咽喉卒腫痛不下食方桂去粗皮半兩上一味搗羅為散綿裹一錢放舌下咽津即瘥治咽喉卒腫痛不下食方白礬少許上一味研碎以綿裹含咽津即瘥治上焦壅熱咽喉卒腫疼痛不利惡實散方惡實微炒令香一兩甘草炙一分荊芥去梗半兩上三味搗羅為細散每服二錢匕水五分一盞煎令沸溫服沸湯點服亦得咽喉生癰論曰肺氣上通於喉嚨胃經外連於咽嗌其氣和平則呼吸咽納無所妨礙若脾肺壅熱熏發上焦攻於咽喉結聚腫痛不得消散熱氣熾盛致結成癰妨害吐納古方論一寸為癤二寸至五寸為癰其候使人寒戰咳唾稠濁善用針者辨其可刺宜速破之仍施以點餌之劑治喉癰咽嗌不利天門冬煎方生天門冬汁二升人參一兩生麥門冬汁一升生薑汁一升生地黃汁一升桂去粗皮一兩赤苓去黑皮三兩甘草炙三分牛黃研半兩半夏湯洗七遍曝乾一兩上十味除四味汁外餘六味為末先以天門冬麥門冬汁煎減半次入生薑汁又煎減半次又入地黃汁並餘六味末同煎汁欲盡即入白蜜一斤酥四兩同煎成煎以瓷合盛不拘時以溫水調下一匙以瘥為度治喉癰咽嗌腫塞及心腫熱極吐納不利射干湯方射干半兩升麻大黃銼生用惡實生用各一兩馬藺子炒半兩木通銼三分上六味粗搗篩每服三錢匕水一盞竹葉七片煎至七分去滓下馬牙硝半錢匕攪令勻不拘時細細溫服治喉癰及咽喉垂倒等防風散方防風去叉一兩白附子三分地骨皮半兩真麝香研三分丹砂研膩粉研白朮馬牙硝研桂去粗皮各一分赤茯苓去黑皮一兩上十味搗研為散每服半錢匕溫酒調下治喉癰及懸癰等鹽花散方鹽花白礬燒令汁盡各一兩上二味同研細以箸頭點在癰上治喉癰及傷寒熱病後咽痛閉塞不通毒氣上衝馬牙硝散方馬牙硝半兩上一味細研為散每服一錢匕綿裹含咽津以通為度咽喉生瘡論曰咽喉生瘡或白或赤痰唾稠濁喉中腥臭疼痛此蓋上焦有熱脾肺不和熱摶其經熏發咽喉故也治咽喉疼痛生瘡黃耆湯方黃耆炙銼甘草炙麥門冬去心焙山梔子仁各半兩黃芩去黑心人參赤茯苓去黑皮檳榔煨銼貝母去心麩炒紫菀去苗各一分上十味粗搗篩每服二錢匕水一盞煎至六分去滓溫服食後日三治喉中瘡並口瘡龍膽煎方龍膽黃連去須黃柏去皮蜜炙升麻去土苦竹葉切槐白皮大青各一兩白蜜半合酥半合上九味細銼七味如麻豆以水三升半煮取七合絞去滓納蜜及酥再煎五六沸每服一匙頭含化咽津日可五六服瘥治喉中生瘡咽嗌痛咽物有妨桃紅散方金箔十片銀箔十片丹砂研馬牙硝研甘草炙搗末各一兩鉛白霜研少許凝水石四兩太陰玄精石二兩二味推碎入一合於內煅令通赤取出黃土內埋一宿上八味同研令細每服一字甘草水調下如要丸以稀糯米粥和為丸如豌豆大含化咽津治咽喉中生瘡唾血不下食地黃湯方生地黃細切二兩半竹茹玄參雞蘇苗各一兩赤茯苓去黑皮升麻麥門冬去心焙各一兩半上七味除地黃外粗搗篩入地黃拌勻每服三錢匕水一盞煎至五分去滓溫服食後臨臥如不能多服細細含咽治咽喉生瘡嗽唾如鯁語聲不出半夏湯方半夏湯浸去滑七遍二兩射干乾薑炮紫菀去苗土桂去粗皮當歸切焙陳橘皮湯浸去白焙獨活去蘆頭各一兩上十一味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服初病一二日可發汗病久者可加大黃一兩半初秋夏月暴雨冷及天行暴熱喜怒伏於內宜加生薑二兩乾薑茱萸枳實各一兩修制如前法治喉中有瘡咳嗽白藥丸方白藥子黃藥子玄參射干甘草炙桔梗炒各半兩上六味搗羅為末煉蜜為丸如彈子大綿裹含化咽津治咽中生瘡語聲不出苦酒湯方半夏五枚湯洗七度去滑切焙雞子一枚敲破瀉去黃上二味以苦酒並半夏納於雞子殼中於火上煎三五沸候溫去半夏就殼分為二服飲之瘥治咽喉及舌生瘡爛杏仁丸方杏仁湯浸去皮尖炒半兩研黃連去須為末甘草炙為末各一分上三味搗研和勻綿裹如棗大含之瘥又方白礬熬令汁盡二兩黃連去須一分上二味搗羅為末每服一錢匕綿裹含化咽津瘥治風熱毒氣上攻咽喉舌頰腫痛生瘡噎悶化涎解躁牛黃金露丸方牛黃研龍腦研各一錢人參末二兩甘草生為末半兩丹砂研水飛一兩甜硝研半兩上六味同研細以軟糯米飯和丸如雞頭實大每服一丸含化咽津治脾胃熱毒上攻心肺喉咽有瘡並纏喉風救命散方大黃銼炒黃連去須白殭蠶直者炒甘草生各半兩膩粉三錢匕五倍子一分上六味搗研為細散每服一字大人以竹筒子吸之小兒以竹筒子吹之如餘毒攻心肺咽有瘡用孩兒奶汁調藥一字以雞翎探之嘔者生不嘔者死治喉咽生瘡連舌頰痛不可忍者薔薇根飲方薔薇根皮一兩升麻三分生乾地黃黃柏各半兩鉛白霜研一錢上五味搗羅四味為末入鉛霜研勻每服二錢匕水一盞入蜜半匙煎至七分稍通口熱漱咽嗌冷即吐之及時用藥末摻瘡上治咽喉生瘡升麻湯方升麻銼甘草炙石膏研牡丹皮各一兩上四味粗搗篩每服三錢匕以水一盞煎至六分去滓細細服治喉中生瘡久患積勞不下食日漸羸瘦黃連湯方黃連去須半分豉半合薤白切四莖豬膽半個上四味先以童子小便八合煎黃連豉薤白取四合去滓下豬膽煎至三合空腹頓服每隔日依法再服治咽喉內生瘡疼痛桔梗湯方桔梗銼炒甘草生惡實微炒各一兩上三味粗搗篩每服三錢匕水一盞入竹葉十片煎至六分去滓不計時溫服治咽喉生瘡腫痛方硇砂半錢上一味以綿裹細細咽汁瘥又方臘月豬尾一枚上一味燒灰細研為散每服半錢匕水調服不計時治上焦有熱咽喉生瘡赤根白頭痰唾稠濁口中腥臭化涎生津去毒玫瑰丸方五倍子紅雪研各一兩馬勃升麻礬蝴蝶研硼砂研各半兩丹砂研麝香研龍腦研各一分甘草生用三分上十味搗研為細末糯米飯和丸如雞頭實大每服一丸含化不計時候治咽喉生瘡腥臭疼痛硼砂散方硼砂研一分馬牙硝研半兩人參半兩甘草炙銼一分上四味搗羅二味為細末入研藥二味和勻每用半錢匕不以時候含化咽津懸癰腫論曰喉嚨者呼吸之道路氣之所上下也懸癰為音聲之關臟腑有伏熱氣上攻衝喉咽氣血壅遏結於懸癰毒氣不散故腫痛妨悶甚者或長數寸隨喉出入不得食息宜急治之治懸癰腫生息肉乾薑散方乾薑炮裂半夏湯洗七遍各一分上二味搗羅為散鹽豉和塗所患處治懸癰咽中妨悶懸長白礬散方白礬燒令汁盡鹽花別研過各半兩上二味同研極細箸頭點懸癰上治懸癰腫長生息肉及舌腫方羊蹄草上一味煮汁含之或以鹽豉和塗之又方鹽豉各等分上二味以鹽和豉塗患處日三五次又方童子小便四五歲者一合上一味並銅錢二文含之治懸癰腫長數寸隨喉出入不得食方上令病人大開口以箸按舌下燒小烙針於竹管中烙之令破即愈少根不盡漸更烙之即以鹽塗烙處又方鹽上一味搗令細綿裹箸頭搵鹽點之日六七次治風熱客搏上焦懸癰腫痛啓關散方惡實炒甘草生各一兩上二味搗羅為散每服二錢匕水一盞煎六分旋含之良久咽下尸咽喉論曰道家服藥務先去三蟲者以其為人害也尸咽之病亦本於此巢氏謂腹中尸蟲上蝕咽喉能令生瘡或癢或痛如𧈟之候者是也善攝生者儻未能除去亦當服藥治之勿使妄動則善矣治尸咽喉閉塞出瘡及乾嘔頭痛食不下黃柏湯方黃柏去粗皮炙半兩升麻木通銼各一兩竹茹三分麥門冬去心焙一兩半玄參一兩前胡去蘆頭大青各三分上八味粗搗篩每服三錢匕水一盞煎至七分去滓入芒硝末一錢攪令勻溫服如鼻中有瘡以地黃汁少許滴於鼻中日三五服不計時候要通利加芒硝不欲利去之治尸咽及走馬喉閉或咽內生癰一捻金散方雄黃研藜蘆豬牙皂莢去皮並子各一分上三味搗研為散先含水一口用藥一米許搐鼻內即吐去水少時立效治尸咽喉疼痛蛇蛻散方蛇蛻皮白梅肉甘草生用各一分惡實半兩炒上四味搗羅為散每用綿裹一錢匕湯浸潤含化咽津不計時治尸咽喉內痛欲失聲杏仁散方杏仁湯浸去皮尖雙仁炒研桂去粗皮各二兩蕪荑仁炒一兩上三味搗研為散每服一錢匕綿裹含化咽津消盡再用日三五服治尸咽喉痛方杏仁湯浸去皮尖雙仁研桂去粗皮各二兩蕪荑仁炒一兩棐實去皮半兩上四味搗羅為末煉蜜為丸如彈丸大含化咽津消盡再用日二三服治尸咽喉閉塞喘息不通須臾欲絶方桃皮一握切上一味以水一盞煎至五分去滓溫服治尸咽喉中痛癢如得蠱毒方生薑切如半棗大上一味含化咽津液以瘥為度又方麻黃不拘多少上一味以青衣裹納竹筒中燒乘煙燻咽中愈又方麻子上一味燒取脂酒調一錢匕服之瘥又方故鞋鼻繩上一味燒作灰每服一錢匕溫水調服狗咽論曰狗咽者喉中忽覺結塞不通如喉痹狀是也陰陽之氣出於肺循喉嚨而上下若風熱毒氣客於喉間氣結蘊積而生熱故有結塞之候俗云此疾由誤咽狗毛所致治法亦有將飯與狗分食取瘥者禳去之法也治咽喉中壅悶氣塞不通狀如喉痹者昆布丸方昆布洗去鹹味一兩訶藜勒皮二兩檳榔銼一兩松羅乾薑炮裂銼桂去粗皮海藻洗去鹹味一兩木通銼二兩上八味搗羅為末煉蜜為丸如梧桐子大每服溫酒下二十丸食後臨臥服治狗咽氣塞腫痛氣欲絶者馬牙硝煎方馬牙硝木通銼升麻瞿麥穗犀角屑馬藺子各一兩半射干玄參各一兩上八味細銼以水五盞煎至一盞半去滓下白蜜二兩再煎成煎每服一匙頭含化咽津治狗咽氣塞玄參散方玄參杏仁湯浸去皮尖雙仁炒甘草炙赤茯苓去黑皮白朮桔梗炒人參各半兩上七味搗羅為散每服二錢匕熱湯調下日三五服治狗咽喉中忽覺結塞丹砂酒方丹砂桂去粗皮絳礬各半錢上三味為末綿裹用好酒少許浸良久含之即瘥治風熱上攻喉咽忽覺結塞不通附子散方附子一枚生去皮臍切四片塗蜜炙令黃馬藺子生用惡實生用各一兩上三味搗羅為散每服一錢匕溫水調下日三五服治纏喉風及狗咽二灰散方燈心燒灰炭上白灰白殭蠶直者炒各等分上三味同研為散生薑蜜水調下一錢匕治狗咽及咽喉緊急如聖散方赤芍藥一兩防風去叉三分天麻半兩上三味搗羅為散每服一錢匕冷茶調下不拘時服治狗咽黃白散方芒硝研一兩半硫黃研一兩上二味先將芒硝於銚子內熬令沸澄清下硫黃末於銚子內攪令焰出絶傾在新碗內放冷細研如粉每服半錢匕新汲水調下治纏喉風及狗咽石膽散方石膽一錢半燒研白芷一錢為末上二味再研勻細每服半錢匕溫漿水調下取出涎後轉一兩行差治狗咽雞子法半夏一錢末薑汁搜為餅子焙乾研細雞子一枚上二味先開雞子頭去黃又盛苦酒一半入半夏末殼中攪令勻安雞子於煻灰火中慢煎沸熟取出後稍冷就殼分溫三服治狗咽喉方粟飯三合上一味以手團為一塊與狗分而食之即愈治咽喉忽覺氣塞喘息不通須臾欲絶方獨顆蒜一枚上一味削去兩頭可塞鼻竅患左塞右鼻患右塞左鼻喉口中膿血出立效治風熱閉塞咽喉惡實散方惡實一合半生半炒上一味搗羅為散酒調下一錢匕立瘥治喉中忽然結塞不通如神丸方蝸牛二七枚白礬末馬勃末陳白梅肉大黃末各一分上五味於端午日午時同研和丸如苦楝子大每遇患人開口不得者取一丸以水磨用竹管子吹下入喉中即瘥輕只可以綿裹含化一丸
