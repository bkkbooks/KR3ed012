body:
  text: 卷第九十八諸淋門諸淋統論論曰膀胱者州都之官津液藏焉氣化則能出矣位處下焦與腎為表裡分別清濁主出而不內若腑臟氣虛寒熱不調使氣不化而水道不宣故為淋閟之病矣諸淋之證大體緣腎氣虛膀胱有熱唯冷淋為異善治此者當熟察之卒淋論曰卒淋者緣下焦有熱傳入膀胱其候卒然少腹急痛小便淋數澀痛故謂之卒淋蓋下焦在臍下當膀胱上口主分別清濁主出而不主內以傳導也今熱在下焦故其病如此治卒淋瀝祕澀不通木通飲方木通銼黃芩滑石碎各一兩甘草炙一分漏蘆去蘆頭三分甜葶藶紙上炒一分上六味粗搗篩每服三錢匕水一盞煎七分去滓溫服取小便利為度未利再一二服食前治卒淋通利小腸瞿麥湯方瞿麥去梗半兩木通銼赤茯苓去黑皮陳橘皮湯去白焙各一兩滑石碎一兩半冬葵子炒一合甘草炙銼桑根白皮銼各半兩上八味粗搗篩每服三錢匕水一盞入蔥白二寸煎七分去滓溫服不拘時治卒淋結澀不通利茅根飲方茅根銼木通銼各三兩石葦拭去毛黃芩去黑心當歸洗切焙芍藥冬葵子打碎滑石碎各二兩亂髮雞子大兩枚燒灰上九味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時治卒淋小便不通祕澀疼痛地膚飲方地膚子三兩知母焙豬苓去黑皮瞿麥去梗黃芩去黑心升麻木通銼各二兩冬葵子一兩半海藻洗去咸焙一兩上九味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治膀胱虛熱小便卒暴淋澀黃耆飲方黃耆細銼人參白茯苓去黑皮旱蓮子滑石研各一兩桑根白皮銼三分黃芩去黑心枳殼去瓤麩炒芒硝各半兩上九味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時治小便卒暴淋澀不通榆皮飲方榆白皮洗銼瞿麥取穗赤茯苓去黑皮雞蘇梔子仁木通銼郁李仁湯浸去皮尖炒各半兩上七味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時治卒淋不通黑金散方好細墨燒一兩上一味為細散每服一錢匕溫水調下不拘時服治卒小便淋澀不通鬱金散方鬱金一兩滑石研半兩甘草上三味搗羅為散每服一錢匕熱湯調下不拘時服治卒淋石葦湯方石葦去毛瞿麥取穗冬葵子炒車前子各一兩上四味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治小便卒淋澀不通海蛤丸方海蛤半兩白瓷定州者研水飛過一兩滑石研商陸切焙漏蘆去蘆頭各半兩上五味搗研為細末取生何首烏自然汁一升煮麵糊和丸如梧桐子大每服二十丸燈心湯下食前服治卒淋木通飲方木通銼茅根銼瞿麥去梗芍藥各二兩滑石碎三兩亂髮雞子大兩枚燒灰上六味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治小便卒淋澀茯苓湯方赤茯苓去黑皮三兩滑石碎四兩石葦去毛瞿麥穗蒲黃各二兩榆白皮切三兩冬葵子二合上七味粗搗篩每服五錢匕水一盞半煎至八分去滓食前溫服冷淋論曰腎與膀胱為表裡下通於胞宣行水道腎臟虛弱冷氣客於下焦邪正交爭滿於胞內水道不宣故其狀先寒顫然後便溺成淋謂之冷淋也治冷淋小便澀榆皮湯方榆皮桂去粗皮芎藭各半兩木通瞿麥穗各一兩人參三分上六味銼如麻豆大每服五錢匕水一盞半煎至八分去滓溫服不拘時治冷淋寒顫小便澀痛茅根飲方茅根菝葜䈽竹葉五味子各一兩半烏梅去核焙十五枚石膏五兩人參二兩上七味銼如麻豆大每服五錢匕水一盞半煎至一盞去滓溫服不拘時治冷淋寒顫澀痛菝葜飲方菝葜土瓜根黃耆銼地骨皮五味子各二兩人參牡蠣煅各一兩半石膏碎四兩上八味粗搗篩每服五錢匕水一盞半煎至七分去滓溫服不拘時治冷淋溲便冷澀菟絲子散方菟絲子酒浸別搗肉蓯蓉酒浸切焙各一兩五味子黃耆銼雞膍胵黃皮蒲黃各一兩半硝石研半兩上七味搗羅為散每服二錢匕溫酒調下不拘時治冷淋肉蓯蓉丸方肉蓯蓉酒浸切焙熟乾地黃焙山芋石槲去根牛膝酒浸切焙桂去粗皮各半兩黃耆銼附子炮裂去皮臍各一兩黃連去須三分甘草炙細辛去苗葉各一分檳榔銼五枚上一十二味搗羅為末煉蜜丸如梧桐子大每服二十丸鹽酒下不拘時治腎虛膀胱冷淋瀝不利黃耆丸方黃耆銼黃連去須土瓜根銼各二兩半玄參三兩地骨皮銼菝葜銼鹿茸去毛酥炙各二兩牡蠣熬一兩人參桑螵蛸炒五味於各一兩半上一十一味搗羅為末煉蜜丸如梧桐子大每服二十丸鹽酒下不拘時治冷淋菟絲石脂散方菟絲子酒浸別搗白石脂牡蠣煅研各二兩桂去粗皮土瓜根銼各一兩上五味搗研為散每服二錢匕煮大麥粥飲調下空心食前治冷淋諸方不瘥者麝香散方麝香不拘多少上一味細研每服半錢匕空心溫酒調下治冷淋小便澀痛澤瀉散方澤瀉雞蘇赤茯苓去黑皮石葦去毛炙當歸切炒蒲黃檳榔銼琥珀研各一兩桂去粗皮三分桑螵蛸炒枳殼去瓤麩炒各半兩上一十一味搗研為散每服二錢匕煎冬葵子湯調下木通湯亦得不拘時治冷淋小便多或不禁宜服菟絲子散方菟絲子酒浸一宿別搗一兩蒲黃黃連去須各一兩半硝石半兩肉蓯蓉酒浸去皴皮切焙一兩五味子一兩半雞膍胵黃皮炙一兩半上七味搗羅為細散每空腹溫酒調三錢匕服日二治陰汗小便多冷淋等蜀椒丸方蜀椒去目及閉口者炒出汗三兩杏仁湯去皮尖雙仁炒黃研四兩上二味先以醇酒一升半熬令酒盡取椒焙為末杏仁別搗相和為丸如梧桐子大每日空心鹽湯下二十丸晚再服熱淋論曰三焦者水穀之道路也三焦壅盛移熱於膀胱流傳胞內熱氣並結故水道不利而成淋也其狀溲便赤澀或如血汁故謂之熱淋治熱淋小便赤澀疼痛滑石散方滑石研二兩栝蔞根銼三兩石葦炙去毛半兩上三味搗羅為散每服二錢匕煎小麥湯調下不拘時候治熱淋結