白日夜數拾行頻服良治虛熱四肢羸乏渴熱不止止渴補虛茯神煮散方茯神肉蓯蓉去鱗切細酒浸三日取出焙乾稱葳蕤各四兩生石斛去苗黃連去須栝蔞根丹參各一兩甘草炙五味子知母人參當歸切焙各三分大麥蘖炒七合半上一十三味粗搗篩每服五錢匕水一盞半煎至一盞去滓食前溫服治消渴後氣乏體羸腿脛細瘦蓯蓉丸方肉蓯蓉酒浸切焙黃耆銼牛膝去苗酒浸切焙車前子萆薢白茯苓去黑皮地骨皮黃連去須檳榔煨各一兩半山芋菟絲子酒浸別搗蒺藜子炒去角人參白芍藥各一兩一分澤瀉桑螵蛸炒各一兩枳殼去瓤麩炒三分生乾地黃焙二兩上一十八味搗羅為末煉蜜丸如梧桐子大每服空心粟米飲下三十丸治消渴後虛乏鍾乳丸方煉成鍾乳粉續斷熟乾地黃焙石葦去毛各一兩杜仲去粗皮銼炒三兩三分天雄炮裂去皮臍半兩山茱萸蛇床子各一兩遠志去心肉蓯蓉酒浸切焙一兩三分防風去叉山芋石斛去根赤石脂各一兩三分甘草炙銼牛膝酒浸切焙各一兩上一十六味搗羅為末煉蜜丸如梧桐子大每服三十丸溫酒下治消渴後虛乏填骨煎方白茯苓去黑皮菟絲子酒浸焙別搗山茱萸當歸切焙各二兩半肉蓯蓉三兩酒浸切焙大豆炒去皮三合石葦去毛一兩三分牛膝酒浸切焙巴戟天去心麥門冬去心各二兩半天門冬去心三兩三分五味子人參遠志去心各二兩半桂去粗皮一兩三分附子炮裂去皮臍石斛去根各二兩半上一十七味搗羅為末用生地黃生栝蔞根各三斤搗絞取汁以銀石器慢水煎減半然後內藥並下白蜜十兩牛髓五兩再煎令如糜食如雞子黃大米飲下日三藥末不必盡入惟看稀稠得所佳治消渴羸瘦小便不禁鉛丹散方鉛丹研一兩栝蔞根三兩黃連去須白石脂各一兩半上四味搗羅為散每服二錢匕食後以漿水調下治消渴肌膚羸瘦或轉筋小便利甚栝蔞根散方栝蔞根黃連去須防己鉛丹研各一兩半上四味搗羅前三味入研鉛丹和勻每食後良久煎醋一合水二合調三錢匕日二服消渴小便白濁論曰消渴飲水過多久則滲漏脂膏脫耗精液下流胞中與水液渾濁隨小便利下膏凝故謂之消渴小便白濁也治消渴小便白濁如脂腎瀝湯方白羊腎一具去脂膜切黃耆銼杜仲銼炒五味子生薑切各一兩半生乾地黃焙一兩人參半兩棗五枚去核磁石三兩椎碎綿裹上九味除羊腎磁石外銼碎分為二劑先以水四升煎腎與磁石及二升去腎然後下諸藥再煎取八合去滓分二服食前治消渴腑臟枯燥口乾引飲小便如脂鐵粉丸方鐵粉研水飛過干稱三兩再研雞膍胵陰乾五枚炙熟黃連去須三兩牡蠣炒研如面二兩上四味先搗二味細羅為末再與鐵粉牡蠣研勻煉蜜和劑以酥塗杵熟搗丸如梧桐子大每服三十丸食前煎粟米飲下漸加至四十丸治消渴小便濃濁如面汁此為腎冷金牙石湯方金牙石搗碎研厚朴去粗皮塗生薑汁炙熟石菖蒲各一兩半貝母煨去心一兩烏梅去核微炒葶藶子炒別搗如膏各三分桂去粗皮高良薑菟絲子酒浸兩宿曝乾微炒別搗各半兩上九味先搗八味為粗末次入金牙石再研勻每服三錢匕水一盞入棗二枚去核煎七分去滓早晚食前溫服治消渴能食而飲水多小便如脂麩片日夜無度冬瓜飲方冬瓜一枚黃連去須十兩別搗為細末上二味先取冬瓜剖開去瓤淨滲黃連末在瓜內卻用瓜頂蓋於熱灰中煨熟去皮細切爛研布絞取汁每服一盞至二盞食前服日三夜二治消渴飲水不知休小便中如脂舌乾口渴黃連丸方黃連去須栝蔞根各五兩上二味搗羅為末生地黃汁和劑石臼內用木杵塗酥搗勻熟丸如梧桐子大每服三十丸食後牛乳下日二治消渴下冷小便濃白如泔嘔逆不下食葶藶丸方葶藶子慢火炒別搗如膏一兩半枳殼去瓤麩炒桂去粗皮羚羊角鎊白茯苓去黑皮柴胡去苗鱉甲去裙襴醋浸炙防風去叉菟絲子酒浸兩宿焙乾炒別搗牛膝去苗安息香各三分陳橘皮湯浸去白焙一兩上一十二味搗羅為末煉蜜和劑酥塗杵搗勻熟丸如梧桐子大每服三十丸空腹酒下治消渴飲水極多肢體羸弱小便如米泔腰膝冷痛諸方不能治者山茱萸丸方山茱萸栝蔞根銼土瓜根銼苦參龍骨細研各一兩半黃連去須三兩半上六味先搗羅五味次入龍骨再研勻用生栝蔞汁和劑酥塗杵搗勻熟丸如梧桐子大每服三十丸食後煎白茅根飲下日三治消渴尿脂小便如泔肉蓯蓉丸方肉蓯蓉去皴皮酒浸切焙澤瀉五味子巴戟天去心當歸切焙地骨皮各一兩磁石煨醋淬七遍人參赤石脂各一兩半韭子炒白龍骨甘草炙銼牡丹皮各一兩熟乾地黃焙一兩禹餘糧煅三分桑蛸螵炙四十枚上一十六味搗羅為末煉蜜丸如梧桐子大每服二十丸以牛乳下日三
