body:
  text: 卷第五十八消渴門消渴統論論曰消疸者膏梁之疾也肥美之過積為脾疸疸病既成乃為消中皆單陽無陰邪熱偏勝故也養生之士全真煉氣濟其水火底於適平若乃以欲竭其精以耗散其真所受乎天一者既已微矣復飫肥甘或醉醇醴貪餌金石以補益引溫熱以自救使熱氣熏蒸虛陽暴悍腎水燥涸無以上潤於心肺故內外消鑠飲食不能滋榮原其本則一推其標有三一曰消渴以渴而不利引飲過甚言之二曰消中以不渴而利熱氣內消言之三曰腎消以渴而復利腎燥不能制約言之此久不愈能為水腫癰疽之病慎此者服藥之外當以絶嗜欲薄滋味為本消渴論曰消渴者渴而引飲乃復溲少是也得之五石之氣內燥津液腎氣不化故渴甚而溲少也久不治則經絡壅澀留於肌肉變為癰疽治三消渴疾硝石散方硝石茜根鉛霜各一兩上三味搗羅為散每服一錢匕冷水調下治三消渴疾桃紅散方赤石脂石膏各研栝蔞根銼白石脂鉛丹各一兩甘草炙半兩上六味搗羅為散冷水調下二錢匕治三消渴疾鉛黃丸方鉛丹黃連去須各半兩乾葛粉栝蔞根各三分上四味搗羅為末煉蜜丸梧桐子大冷水下二十丸治消渴香墨散方墨一兩栝蔞根三兩鉛丹半兩上三味搗羅為散拌勻第一日服藥末二錢匕新水一盞調下次日一服水調藥末一錢匕不計時候服藥時不得忌水任意飲三兩盞後自然怕水服三五日見效治消渴飲水無度沃焦散方泥鰌魚一十頭陰乾去頭尾燒灰碾細為末乾荷葉碾細為末上二味末等分每服各二錢匕新汲水調下遇渴時服日三候不思水即止治消渴日飲水數斗不止葛根丸方葛根銼栝蔞根銼附子炮裂去皮臍鉛丹炒令紫研各一兩上四味先將三味搗羅為散入鉛丹同研令勻煉蜜和丸如梧桐子大每服二十丸煎茅根湯下日三治消渴飲水無休菝葜飲方菝葜銼炒湯瓶內鹼各一兩烏梅二兩並核椎碎焙乾上三味粗搗篩每服二錢匕水一盞於石器中煎至七分去滓稍熱細呷治消渴飲水不休神應散方滑石研寒水石研各半兩上二味碎研為散用生雞子一枚鑿破去黃留清調和藥末令如稠膏卻納在雞殼內以紙封口用鹽泥固濟曝乾炭火內燒令通赤放冷去土並殼取藥研令絶細為度每服大人二錢匕小兒半錢匕米飲調下治消渴銀寶丸方水銀一兩用鉛結為沙子栝蔞根一兩半苦參牡蠣煅為粉知母焙密陀僧各一兩鉛丹半兩上七味搗羅為末若陽人患用未曾生長雌豬肚一枚若陰人患用雄豬肚一枚貯藥在內以線縫合用索子十字系在一新磚上不令走轉又別用栝蔞根半斤細切入在水中一處同煮自平旦煮至午時取出候冷細切肚子及藥同搗為膏丸如梧桐子大陰乾每服五丸溫水下治消渴殊勝散方烏賊魚骨去甲海浮石桔梗銼炒葛根銼丹砂研水飛虎杖燒過各一分上六味搗羅為散渴時煎麥門冬湯調下二錢匕空心日午夜臥各一服治消渴飲水不止栝蔞根丸方栝蔞根銼黃連去須知母焙麥門冬去心各五兩上四味搗羅為末煉蜜為丸如梧桐子大每服三十丸米飲下治消渴飲水日夜不止生津丸方青蛤粉白滑石各一兩上二味研為細末用黃顙魚涎和為丸如梧桐子大每服三十丸煎陳粟米飲下不拘時候治消渴纍年不愈者莎草根散方莎草根去毛一兩白茯苓去黑皮半兩上二味搗羅為散每服三錢匕陳粟米飲調下不計時候治消渴減食飲水不休楮葉丸方干楮葉炒桑根白皮銼炒人參白茯苓去黑皮定粉各一兩上五味為細末取楮汁和丸如梧桐子大每服二十丸煎人參湯下不計時候治消渴疾久不愈楮葉散方蝸牛焙乾半兩蛤粉龍膽去土桑根白皮銼炒各一分上四味搗羅為散每服一錢匕煎楮葉湯調下不拘時候治渴疾澄水飲方銀湯瓶內鹼水萍焙乾葛根銼上三味各等分粗搗篩每服五錢匕水一盞半同煎至一盞去滓溫服治消渴亥骨飲方豬脊骨五寸棗二十枚劈碎甘草微炙銼乾薑炮各半分上四味㕮咀以水三升同煎至二升發時量意加熟水服治消渴竹龍散方五靈脂黑豆生去皮各半兩上二味搗羅為散每服二錢匕煎冬瓜湯調下無冬瓜即用冬瓜苗葉子煎湯俱可一日二服小可渴只一服瘥渴定後不可服熱藥唯宜服八味丸仍更宜用五味子代附子治消渴後八味丸方熟乾地黃焙四兩桂去粗皮牡丹皮山芋白茯苓去黑皮山茱萸各一兩澤瀉五味子各一兩上八味搗羅為末煉蜜和丸如梧桐子大每服三十丸薄鹽湯下治消渴金英丸方鉛丹麥門冬去心焙牡蠣煅研如粉知母焙各一兩黃連去須栝蔞根苦參各二兩金薄一百片銀薄一百片生栝蔞根二兩研如膏上一十味搗羅為末用生栝蔞根和為丸如梧桐子大每服四十丸食後米飲下日再夜一當日渴止十日已來漸覺減即一日兩服服三十五丸一月外每日一服服三十丸夏月即用蜜為丸服藥之次腹中忽冷痛即取厚朴二兩去粗皮薑汁炙陳橘皮三分去白焙生薑二兩切以水二升煎取半升去滓分溫二服服訖良久以飯壓之如腹中不痛即止治消渴及諸渴不止冬瓜飲方大冬瓜一枚黃連去須半斤上二味先搗黃連為末將冬瓜三停中截去一停取二停淨去瓤子內黃連末於冬瓜中卻取截下一頭蓋卻搜白麵厚裹冬瓜令遍即更以黃土硬泥裹一重候微干坐瓜在灰火中四面簇炭火燒令泥赤即止候冷打去泥土並剝去面揭開瓜頭裡面有黃連汁不限多少濾過每服一盞渴即飲之立瘥未瘥更作一服治因好食熱面炙肉及服補治壅熱藥並乳石三焦氣隔心肺乾熱口乾舌焦飲水無度小便日夜不知斗數心欲狂亂服此救急止渴栝蔞飲方栝蔞一枚黃熟者去皮用瓤並子冬瓜一枚中樣者割破頭邊內栝蔞瓤子在冬瓜心內上二味用黃土泥裹冬瓜令勻可半指厚候乾簇炭火燒令泥通赤即止去泥取瓜就熱碎切爛研布絞取汁約七八合更入白蜜兩匙頭攪令調勻候稍冷即分三度服臟腑熱歇即不思水自無小便如不是栝蔞熟時節即獨燒冬瓜服之治消渴疾人參煎方人參一兩葛根銼二兩上二味搗羅為末每發時須得燖豬湯一升已來入藥末三錢匕又入蜜二兩都一處於鐺子內慢火熬之至三合已來似稠黑餳便取出貯於新瓷器內每夜飯後取一匙頭含化咽津重者不過三服治消渴口乾煩躁飲水無度鉛霜丸方鉛霜半兩青黛栝蔞根末各一兩龍腦少許上四味細研令勻煉蜜和丸如梧桐子大每服二十丸微嚼煎竹葉湯下新汲水下亦得食後日三治積年消渴好食冷物竹葉湯方青竹葉銼碎白茯苓去黑皮地骨皮銼栝蔞根各一兩桂去粗皮甘草炙銼各半兩麥門冬去心焙二兩上七味粗搗篩每服五錢匕水一盞半入小麥一撮煎至八分去滓食後溫服日二治消渴膈熱煩躁生津液梅蘇丸方白梅肉紫蘇葉烏梅肉各半兩人參一分麥門冬去心三分百藥煎三兩甘草炙銼一兩半訶黎勒炮去核一分上八味搗羅為末煉黃蠟汁拌和為丸如雞頭實大每服一丸含化咽津不計時候路行解渴治消渴不止下元虛損牛膝丸方牛膝酒浸切焙五兩生地黃汁五升上二味先細搗羅牛膝為末入地黃汁浸夜浸晝曝復浸汁盡為度煉蜜丸如梧桐子大空心溫酒下三十丸久服壯筋骨駐顏黑髮治消渴不止鉛黃散方鉛一斤水銀二兩先熔鉛旋投入水銀候鉛面上有花暈上便以鐵匙掠取於乳鉢內研細皂莢一挺不蚛者塗酥炙令黃去皮子入麝香一錢同研為末上三味為散每抄皂莢末一錢匕以水一中盞煎至六分去滓放溫食後調下鉛黃散半錢匕服之治消渴方冬瓜一枚削去皮上一味埋在濕地中一月將出破開取清汁飲之踰二三料遂愈治渴疾飲水不止甘露散方干豬胞十枚上剪破出卻氣去卻系著處用干盆子一隻燒胞煙盡取出研令極細每服一錢匕溫酒調下不拘時候治消渴飲水不止薑魚丸方乾生薑末一兩上一味用鯽魚膽汁和丸如梧桐子大每服七丸米飲下不拘時候治消渴飲水不止水骨丸方湯瓶內水鹼一兩上一味研為細末燒粟米飯和丸如梧桐子大每服十五丸人參湯下不拘時候治消渴發作有時心脾有熱飲水無度人參湯方人參桑根白皮銼炒各二兩麥門冬去心焙知母枇杷葉拭去毛炙黃連去須微炒葛根銼白茯苓去黑皮地骨皮淡竹根各一兩上一十味細銼如麻豆每服五錢匕用水一盞半煎取八分去滓溫服治消渴飲水過多心腹脹滿桑白皮湯方桑根白皮銼炒人參黃耆銼炒草豆蔻去皮各一兩枳殼去瓤麩炒青木香芍藥半夏湯洗去滑檳榔銼各半兩桂去粗皮三分枇杷葉拭去毛蜜塗炙半兩上一十一味粗搗篩每服五錢匕用水一盞半入生薑五片煎取八分去滓溫服治久渴旬日見效膍胵散方雞膍胵黃皮雞腸各五具炙乾鹿角膠炙燥白龍骨白石脂漏蘆去蘆頭炙各一兩土瓜根三兩黃連去須苦參牡蠣粉各二兩半桑螵蛸三七個炙上一十一味為散每服一錢匕至二錢匕米飲調下日三夜一治消渴飲水過多麥門冬丸方麥門冬去心焙栝蔞根大麻仁研大黃蒸二度切炒苦參粉鐵粉各三兩雞膍胵黃皮炙七枚黃芩去黑心澤瀉各一兩半龍齒研土瓜根知母焙石膏研各二兩銀薄二百片和龍齒石膏研入上一十四味搗研為末煉蜜丸如梧桐子大每食後煎生地黃湯下二十五丸日二服治消渴黃連牛乳丸方黃連去須一斤為末麥門冬去心二兩爛研牛乳地黃汁葛汁並一合上五味合研衆手丸如梧桐子大每服二十丸空心粥飲下日再漸加至四十丸治消渴小便數少虛極羸瘦黃耆丸方黃耆銼鹿茸去毛酥炙各二兩牡蠣煅一復時土瓜根黃連去須白茯苓去黑皮各一兩人參一兩半上七味搗羅為末研令細煉蜜為丸如梧桐子大每服三十丸用何首烏湯下治消渴飲水不止麥門冬丸方麥門冬去心焙升麻黃連去須黃柏去粗皮黃芩去黑心各五兩生乾地黃焙人參各三兩栝蔞根七兩苦參八兩上九味搗羅為末以牛乳和衆手丸如梧桐子大每服三十丸食前米飲下治消渴飲水不輟多至數斗竹葉湯方甘竹葉切大麻仁炒赤秫米各一升淘淨鹿腳四隻湯浸去皮毛骨細研肉白茯苓去黑皮一兩薤白二兩切上六味銼如麻豆分作八服每服先以水三盞煎麻仁竹葉取二盞去滓澄清入諸藥鹿腳又煎去滓取一盞微微飲之渴止為度治消渴小便數少菝葜飲方菝葜土瓜根各二兩半黃耆銼焙地骨皮五味子各二兩人參牡蠣熬粉各一兩半石膏碎四兩上八味粗搗篩每服五錢匕水一盞半煎至八分去滓空腹溫服治消渴及小便無度鉛丹散方鉛丹白石脂研赤石脂研胡粉各半兩石膏碎甘草如手指大者生澤瀉各一兩一分栝蔞根二兩半上八味搗研為散每服三錢匕新汲水調下日三更量虛實加減若渴甚夜二服勿用酒合劑一方可救數人鉛丹久服腸痛宜減之小兒每服一二錢匕亦療酒渴治消渴初因酒得人參湯方人參甘草半生半炙各一兩上二味粗搗篩以燖豬水去滓澄清取五升同煎至二升半去滓渴即飲之永瘥治消渴黃連丸方黃連去須一兩苦參一斤麝香一錢上三味搗羅為末煉蜜丸如梧桐子大每服六十丸空腹茶下日再任意吃茶不限多少止渴備急方大豆芽上以嫩者三五莖塗酥炙令黃熟搗羅為散每服二錢匕煎人參湯調下消渴煩躁論曰消渴煩躁者陽氣不藏津液內燥故令煩渴而引飲且躁也內經謂諸躁狂越皆屬於火蓋以心腎氣衰水火不相濟故也治消渴熱盛煩躁恍惚麥門冬飲方生麥門冬去心三兩甘竹瀝三合小麥二合知母一兩半蘆根二兩生地黃三兩上六味銼如麻豆每用半兩水三盞煎至二盞去滓入竹瀝少許分二服食後治消渴心脾