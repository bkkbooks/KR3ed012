body:
  text: 卷第八十九虛勞盜汗論曰眠寢之間汗出盜人氣血久則津液枯耗謂之盜汗此蓋虛勞之人陽氣外虛風在肌表腠理虛疏心氣不足故也不治則營衛衰損肌肉消悴變為羸瘠治虛勞營衛不調夜多盜汗四肢煩疼飲食進退肌瘦面黃麥煎湯方鱉甲淨去裙襴用好醋炙柴胡去蘆頭各二兩玄參三兩乾漆炒令煙出秦艽去土人參白茯苓去黑皮葛根烏頭炮裂去皮臍各一兩上九味銼如麻豆每服三錢匕先用水一盞半小麥三七粒煎至一盞去麥入藥煎至七分去滓溫服食後臨臥服之久患後亦宜服此退勞倦調順經絡治虛勞夜多虛汗肌體瘦弱減食困劣咳嗽不止蒜煎湯方甘草炙秦艽去土當歸洗切焙玄參洗焙延胡索各二兩常山四兩山梔子去皮二兩鱉甲九肋者去裙襴酥炙令黃三兩黃耆銼烏梅去核炒芎藭各二兩上一十一味銼如麻豆瓷合收勿泄氣每服二錢匕水八分一盞入蒜一瓣去兩頭煎至六分去滓溫服日三治虛勞盜汗日晡潮熱竹茹湯方青竹茹人參續斷桔梗炒五味子紫菀去土桑根白皮銼前胡去蘆頭麥門冬去心焙赤小豆甘草炙銼熟乾地黃焙各一兩上一十二味粗搗篩每服三錢匕水一盞煎至七分去滓溫服治虛勞夜多盜汗面色萎黃四肢無力不思飲食咳嗽不止柴胡鱉甲湯方柴胡去苗鱉甲去裙襴醋炙令熱各一兩地骨皮一兩半知母焙一兩上四味粗搗篩每服三錢匕水一盞烏梅半個青蒿少許同煎至六分去滓溫服食後臨臥服之治虛勞羸瘦營衛不順體熱盜汗筋骨疼痛多困少力飲食進退柴胡湯方柴胡去苗鱉甲去裙襴醋浸一宿炙令黃各二兩甘草炙一兩秦艽去土一兩半知母焙一兩上五味粗搗篩每服二錢匕水一盞入棗二枚劈煎至六分去滓熱服治虛勞盜汗不止麻黃根湯方麻黃根銼牡蠣煅黃耆銼等分上三味粗搗篩每服三錢匕水一盞蔥白三寸同煎至半盞去滓溫服治虛勞盜汗不止及陽虛自汗黃耆湯方黃耆銼一兩麻黃根二兩牡蠣粉三兩人參一分地骨皮半兩上五味粗搗篩每服三錢匕水一盞入棗一枚劈煎七分去滓溫服治虛勞盜汗不止黃耆散方黃耆銼人參地骨皮上三味等分搗羅為散每服一錢匕煎陳小麥湯調下不計時候溫服治虛勞盜汗不止續斷湯方續斷黃耆銼人參牡蠣粉五味子微炒各一兩陳橘皮湯浸去白焙取半兩甘草炙銼半兩桂去粗皮一分上八味粗搗篩每服三錢匕水一盞入麥門冬二十粒生薑三片同煎至六分去滓溫服不拘時候治虛勞盜汗不止咳嗽潮熱秦艽湯方秦艽去土柴胡去苗知母焙甘草炙銼上四味等分粗搗篩每服三錢匕水一盞煎至七分去滓溫服不計時候治虛勞盜汗不止車前子散方車前子炒半兩木賊銼炒菟絲子酒浸一宿別搗各一分椒目一兩微炒上四味搗羅為散每服用生精豬肉一兩滲藥散二錢匕在肉上炙熟臨臥嚼吃以溫水漱口治虛勞陽氣外虛腠理不密營衛發泄盜汗不止骨節熱痛柴胡湯方柴胡去苗鱉甲去裙襴醋炙枳殼去瓤麩炒人參烏梅肉炒白茯苓去黑皮各半兩桂去粗皮白朮銼款冬花紫菀去土桔梗炒甘草炙各一分檳榔大者銼一枚上一十三味粗搗篩每服三錢匕水一盞生薑二片青蒿少許同煎至七分去滓溫服不拘時治虛勞骨節煩熱盜汗不止梔子湯方梔子仁地骨皮麥門冬去心焙柴胡去苗各半兩上四味粗搗篩每服三錢匕水一盞入竹茹小麥各少許煎七分去滓溫服虛勞體痛論曰勞傷之人營衛俱虛氣血衰弱經絡凝滯致邪氣乘之與正氣相搏逢寒則身體痛值熱則皮膚癢診其脈緊濡相搏者是也治虛勞身體疼痛咳嗽發熱柴胡秦艽湯方柴胡去苗一兩秦艽去苗土白芷藿香去梗各半兩桔梗銼炒甘草炙銼莎草根炒沉香銼麻黃去根節各一兩上九味粗搗篩每服三錢匕水一盞半入小麥五十粒同煎至七分去滓不拘時候溫服治虛勞身體疼痛發熱羸瘦石槲湯方石槲去根銼二兩蒼朮四兩米泔浸一宿切麩炒桔梗銼炒陳橘皮去白焙甘草炙銼麻黃去節骨碎補去毛桂去粗皮各二兩上八味粗搗篩每服三錢匕水一盞半烏梅半個生薑二片棗一枚劈同煎至八分去滓稍熱服治虛勞四肢煩倦百節痠疼吃食減少心胸不快涕唾稠黏多臥少力面黃肌瘦沉香鱉甲煮散方沉香銼鱉甲去裙襴醋炙桂去粗皮木香人參黃耆炙銼牛膝去苗酒浸焙巴戟天去心白茯苓去皮當歸切焙秦艽去苗土柴胡去苗半夏薑汁浸二宿炒令黃荊芥去梗附子炮裂去皮臍各一兩熟乾地黃焙羌活去蘆頭各三分乾蠍生一分肉豆蔻四枚去殼炮上一十九味搗篩為散每服三錢匕水一盞蔥白二寸生薑三片棗一枚劈煎七分空心日午夜臥去滓溫服治虛勞體痛手足疼心熱腹滿胸中少氣客熱頭痛欲吐恍惚多忘小便赤澀或多餘瀝臥不安席桂心湯方桂去粗皮黃耆去蘆頭銼炒各三分芍藥甘草炙銼人參各一兩上五味粗搗篩每服五錢匕以水一盞半入生薑三片棗二枚劈煎至七分去滓空心日午夜臥溫服治虛勞傷損骨節痠疼肌熱咳嗽桑白皮湯方桑根白皮銼炒一兩青橘皮去白炒半夏湯浸洗去滑薑汁製各半兩沉香柴胡去苗貝母去心附子炮裂去皮臍乾薑炮白茯苓去黑皮赤芍藥白芷甘草炙銼白朮鱉甲去裙襴醋浸炙細辛去苗葉麻黃去節各一兩大黃煨木通烏梅炒去核黃耆銼炒玄參石槲去根陳橘皮去白炒常山各半兩上二十四味㕮咀如麻豆每服三錢匕水一盞半同煎至一盞去滓溫服不計時候治五勞骨節痠疼五心煩熱口苦舌乾不思飲食咳嗽虛汗漸瘦無力天仙藤湯方天仙藤洗銼鱉甲去裙襴醋浸慢火炙黃耆銼炒牛膝酒浸切焙柴胡去苗甘草炙各三兩烏藥六兩銼五加皮銼芍藥各二兩木香一兩上一十味粗搗篩每服三錢匕水一盞半烏梅大棗各半枚煎至七分去滓熱服不拘時治虛勞身體氣刺疼痛日漸瘦弱心下氣滿不思飲食三香鱉甲飲方鱉甲去裙襴醋炙二兩大黃濕紙煨三分人參附子炮裂去皮臍枳殼湯浸去瓤麩炒牛膝切焙各二兩半桂去粗皮銼半兩熟乾地黃一兩半炒厚朴刮去粗皮用生薑汁炙五味子炒木香丁香當歸切炒白朮芍藥白茯苓去黑皮肉豆蔻去皮沉香銼京三稜炮羌活去蘆頭檳榔煨各一兩上二十一味㕮咀如麻豆每服三錢匕以水一盞棗一枚劈生薑三片同煎至七分不拘時去滓溫服治虛勞身體倦怠百節痠疼羸瘦發熱神昏不爽輕骨湯方知母焙人參天仙藤洗銼白朮秦艽去土柴胡去苗洗銼焙鱉甲去裙襴醋炙各一兩黃耆洗打破手劈如絲以鹽少許和水揉猛火焙乾常山當歸切炙前胡去蘆頭芎藭紫菀洗焙白茯苓去黑皮甘草生各半兩上一十五味粗搗篩每服三錢匕水一盞半烏梅半個同煎至八分去滓溫服治虛勞四肢煩疼拘急潮熱盜汗心忪麥煎湯方鱉甲去裙襴醋炙黃柴胡去苗木香炮秦艽去苗土乾漆炒令煙出葛根黃連去須石槲去根沉香石菖蒲各一兩桂去粗皮附子炮裂去皮臍烏頭炮裂去皮臍各半兩上一十三味㕮咀如麻豆每服三錢匕以水一盞半用小麥半合同煎至八分去滓溫服治虛勞身體疼痛四肢煩熱不思飲食胸膈妨悶香甲煮散方沉香半兩鱉甲去裙襴醋炙木香人參白茯苓去黑皮柴胡去苗檳榔煨銼熟乾地黃桂去粗皮黃耆銼炙厚朴去粗皮薑汁炙山芋白朮甘草炙銼赤芍藥各一兩乾薑炮半兩上一十六味搗羅為散每服三錢匕水一盞生薑三片大棗一枚劈同煎至七分去滓不拘時溫服治虛勞身體煩疼潮熱盜汗多驚頭痛四肢拘倦人參湯方人參柴胡去苗石膏碎甘草炙銼當歸切炒各一兩常山炒半兩大黃濕紙裹略炮一分乾漆半兩炒煙出鱉甲去裙襴醋炙三分上九味粗搗篩每服二錢匕水一盞半烏梅半個小麥一百粒同煎至八分去滓不拘時溫服治虛勞肢節疼痛頭目昏眩怠惰少力飲食無味心忪煩渴口苦咽乾夜多盜汗地骨皮湯方地骨皮細辛去苗葉各半兩柴胡去苗一兩甘草炙銼人參白茯苓去黑皮各半兩上六味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日三治虛勞營衛俱傷遍身疼痛虎骨散方虎骨醋炙猴孫骨醋炙自然銅燒醋淬骨碎補去毛赤芍藥補骨脂炒金牙燒醋淬蒼朮切炒當歸切炒芎藭牛膝切酒浸焙桂去粗皮人參柴胡去苗敗龜醋炙沉香各一兩上一十六味搗羅為細散每服二錢匕溫酒調下空心日午近夜服治虛勞骨節疼痛筋脈拘急寒熱進退發作如瘧眠夢不安精神怯弱夜多盜汗日漸萎黃不能飲食天靈蓋湯方天靈蓋醋炙半兩鱉甲生使柴胡去苗檳榔銼各三分青蒿一握桃仁三七粒去皮尖雙仁炒豉四十九粒甘草一中指節生用蔥白七莖如中指長知母一分阿魏一豆許醋化去沙石麵裹炙豬牙皂莢五挺酥炙上一十二味細銼拌勻分作二貼每貼用童子小便一升從午時浸至明日五更煎取三合去滓溫服服訖蓋復穩臥候日出審看十指節間有毛如藕絲拔燒之極臭毛白色必瘥毛黑色即死或瀉下五色糞並蟲為驗治男子婦人五勞七傷四肢無力手足疼痛飲食無味鱉甲湯方鱉甲去裙襴酥炙柴胡去苗附子炮裂去皮臍白茯苓去黑皮芍藥各一兩沉香黃耆桔梗人參芎藭桂去粗皮木香黃芩去黑心五味子半夏湯洗七遍去滑焙防風去叉枳殼去瓤麩炒當歸切焙麻黃去根節湯煮掠去沫焙羌活去蘆頭秦艽去苗土各半兩檳榔一枚甘草炙一兩半銼陳橘皮湯浸去白焙一分上二十四味㕮咀如麻豆每服三錢匕水一盞入生薑二片棗一枚劈破同煎至七分去滓溫服治風虛勞倦四肢拘急不思飲食遍身疼痛鱉甲柴胡湯方鱉甲醋炙去裙襴柴胡去苗烏梅去核人參各一兩半夏湯洗七遍去滑陳橘皮湯浸去白焙獨活去蘆頭芎藭附子炮裂去皮臍芍藥炒各三分桂去粗皮酸棗仁甘草炙銼黃耆各半兩上一十四味銼如麻豆每服五錢匕水一盞半入生薑五片煎取七分去滓溫服治勞氣攻注背脊拘急肩膊煩疼目昏瘦弱飲食無味豬膽丸方豬膽五十枚焙乾柴胡去苗黃連去須各四兩秦艽去苗土三兩蒼朮米泔浸切焙一兩青蒿頭八兩小便五升慢煎乾上六味搗羅為末煉蜜丸如梧桐子每日空心冷茶下三十丸虛勞羸瘦論曰虛勞羸瘦者五臟之氣傷損也經所謂一損損於皮毛皮聚而毛落二損損於血脈血脈虛少不能榮於五臟六腑也三損損於肌肉肌肉消瘦飲食不為肌膚四損損於筋筋緩不能自收持五損損於骨骨痿不能起於床然治損之法奈何損其肺者益其氣損其心者調其營衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精此治損之法也治虛勞羸瘦面體少色麥門冬散方麥門冬去心焙石葦去毛五味子白茯苓去黑皮菟絲子酒浸一宿別搗生乾地黃焙各一兩桂去粗皮半兩上七味搗羅為散每服二錢匕空腹溫酒調下日午夜食後再服久服令人老壽身輕治虛勞羸瘦悅澤顏色益精補氣乾漆丸方乾漆以醋炒令煙出三兩牛膝銼酒浸焙乾三分桂去粗皮甘草炙銼肉蓯蓉酒浸去皴皮切焙令乾菟絲子酒浸別搗蛇床子炒令香白朮各半兩上八味搗羅七味為末入菟絲子相和令勻煉蜜為丸如梧桐子大每服十五丸空腹以溫酒下夜食後再服治勞瘦豬肚黃連丸方豬肚一具以童子小便一斗煮令爛切研如泥黃連去須一兩一分柴胡去苗一兩半白朮一兩鱉甲醋浸炙令黃一兩半紫菀去苗土一兩半杏仁湯浸去皮尖雙仁生研一兩半桂去粗皮一兩陳橘皮去白皮一兩乾薑炮裂三分人參一兩一分蕪荑仁炒令香三分上一十二味除豬肚外搗羅為末入豬肚更搗一千杵即以煉蜜相和調勻得所丸如梧桐子大每日空腹溫酒下三十丸