勞身體羸瘦寒熱時作咳嗽喘滿四肢無力百節痠疼盜汗心忪恍惚驚悸全不思食山茱萸散方山茱萸桑螵蛸炙麥門冬去心焙白薇熟乾地黃焙當歸切焙各一兩三分石槲去根二兩一分栝蔞根銼白茯苓去黑皮甘草炙銼各一兩一分桂去粗皮鐵粉研厚朴去粗皮生薑汁炙銼各三分吳茱萸炒一分大黃銼炒一兩半上一十五味搗羅為散以白蜜一斤棗膏一斤研勻同蒸以溫湯化開和藥曝乾又取牛膝酒浸切焙五兩肉蓯蓉酒浸切焙六兩附子炮裂去皮臍三兩搗為細末內諸藥中再拌勻每服五錢匕以溫酒調服日三未知稍增之虛勞腰痛論曰虛勞腰痛者勞傷於腎也腎主腰腳若其氣不足風邪乘之故令人腰痛引少腹不可以仰息診其脈尺沉者是也治虛勞傷憊腰腳疼痛精神不爽飲食減退駐顏益氣鹿茸丸方鹿茸去毛酥炙二兩防風去叉桂去粗皮羌活去蘆頭萆薢銼酸棗仁微炒木香白蒺藜炒去角各三分巴戟天去心石槲去根補骨脂微炒桃仁湯浸去皮尖雙仁炒研附子炮裂去皮臍白茯苓去黑皮當歸切焙牛膝酒浸切焙肉蓯蓉酒浸切焙各一兩上一十七味搗研為末煉蜜和丸如梧桐子大每服二十丸空心食前溫酒下治虛勞腰痛利腰膝石斛丸方石槲去根肉蓯蓉酒浸切焙桂去粗皮山茱萸五味子白茯苓去黑皮山芋澤瀉石龍芮人參木香牛膝酒浸切焙覆盆子去梗柏子仁菟絲子酒浸別搗熟乾地黃焙鹿茸茄子者去毛酥炙附子炮裂去皮臍蘹香子舶上者炒枳殼去瓤麩炒巴戟天去心續斷木瓜各一兩檳榔銼肉豆蔻仁防風去叉蒺藜子炒去角蛇床子各半兩上二十八味搗羅為末煉蜜丸如梧桐子大每服三十丸空心煎薑棗湯或鹽湯溫酒任下治虛勞腰腳疼痛腫滿沉重行步艱難羌活丸方羌活去蘆頭天雄炮裂去皮臍蘹香子炒木香天麻硫黃生研各一兩干艾葉四兩硇砂一兩水飛過上八味搗羅五味為末用木瓜一枚切下頂去子入硫黃艾葉硇砂在內再以元頂密蓋就飯甑蒸熟研爛與羌活等末和丸如梧桐子大每服二十丸溫酒或鹽湯下治虛勞腰膝無力元氣虛憊行步艱難腿股疼痛寸金丸方吳茱萸湯洗焙乾炒青橘皮湯浸去白焙牛膝酒浸切焙肉蓯蓉酒浸切焙蘹香子舶上者炒各一兩附子一枚重半兩炮裂去皮臍上六味搗羅為末煉蜜和丸如梧桐子大每服二十丸至三十丸空心鹽湯下治元臟氣虛臍腹緊痛腰腳少力行步艱難面黃肌瘦耳內虛鳴精神不爽肉蓯蓉丸方肉蓯蓉酒浸一宿切焙磁石煅醋淬威靈仙去土各一兩檳榔三枚炮銼肉豆蔻去殼木香桂去粗皮蜀椒去目及閉口者炒出汗牛膝酒浸一宿切焙遠志去心黃耆銼補骨脂炒蘹香子炒硇砂別研附子炮裂去皮臍各半兩生薑二兩切焙沉香一分上一十七味搗研為末煉蜜和丸如梧桐子大每服十五丸空心食前溫酒下治虛勞腰腳疼痛羸瘦不能食乾地黃丸方熟乾地黃焙一兩細辛去苗葉附子炮裂去皮臍各一分白茯苓去黑皮山芋澤瀉乾薑炮山茱萸牡丹皮各半兩上九味搗羅為末煉蜜和丸如梧桐子大每服三十丸空腹夜臥溫酒下漸加至五十丸治虛勞腎氣不足腰痛無力手腳痠疼狀似骨蒸羊腎湯方磁石三兩煅醋淬桂去粗皮甘草炙銼各一兩五味子白茯苓去黑皮各二兩牛膝酒浸切焙一兩半上六味粗搗篩每服五錢匕水二盞先取羊腎一隻細切煎三五沸次下藥煎至一盞去滓空腹溫服良久再服治虛勞腎氣內傷腰痛不能轉側壯筋骨暖腎臟養精神潤顏色鹿茸丸方鹿茸去毛酥炙五兩石槲去根山茱萸遠志去心杜仲去粗皮炙巴戟天去心牛膝酒浸切焙各一兩上七味搗羅為末麵糊和丸如梧桐子大每服二十丸空心溫酒下治下元久虛腰腳無力步履甚艱或發疼痛飲食進退久服諸藥未成痊效附子木瓜丸方附子重半兩者十枚以黑豆一升水三碗銀石器慢火煮之候豆熟附子軟切焙乾牛膝酒浸切焙六兩羌活去蘆頭四兩蘹香子舶上者炒青橘皮湯浸去白焙巴戟天去心各二兩木瓜宣州者去皮核六兩蒸軟用新砂盆研成膏和前藥如干加薄麵糊少許上七味搗羅六味為末將木瓜膏和丸如梧桐子大每服二十丸至三十丸空心食前鹽湯下中病即止不必常服治腎風勞兩腿冷疼腰脊不可俯仰行履不得酸棗仁湯方酸棗仁生研羌活去蘆頭杜仲去粗皮酥炙五加皮各一兩半萆薢桂去粗皮各一兩茯神去木三兩上七味粗搗篩每服五錢匕水一盞半入竹瀝一合煎至一盞去滓空心溫服治虛勞腰腳疼痛下元冷憊陽氣衰弱牛膝酒方牛膝山芋芎藭各三兩附子炮裂去皮臍巴戟天去心五味子黃耆山茱萸人參各二兩五加皮肉蓯蓉酒洗生薑防風去叉各二兩半桂去粗皮茵芋生地黃各一兩蜀椒去目並閉口炒出汗半兩磁石醋煅淬一兩上一十八味㕮咀貯以生絹袋用無灰酒三斗浸之秋冬七日春夏三日每服半盞不拘時頻溫飲之常令有酒氣治五勞七傷腰膝疼痛鬢髮早白面色萎黃水臟久冷疝氣下墜耳聾眼暗痔漏腸風凡百疾病悉能療除兼治女人子臟久冷頭鬢疏薄面生皯𪒟風勞血氣産後諸疾赤白帶下大補益摩膏方木香丁香零陵香附子炮裂沉香吳茱萸乾薑炮舶上硫黃研桂去粗皮白礬燒灰研各一兩麝香研膩粉研各一分上一十二味搗羅八味為末與四味研者和勻煉蜜丸如雞頭實大每先取生薑自然汁一合煎沸投水一盞藥一丸同煎良久化破以指研之就溫室中蘸藥摩腰上藥盡為度仍加綿裹肚系之有頃腰上如火久用之血脈舒暢容顏悅澤治五勞虛損腰膝疼痛五味子丸方五味子菟絲子酒浸別搗肉蓯蓉酒浸切焙各二兩白茯苓去黑皮一兩車前子二兩半巴戟天去心三兩上六味搗羅為末煉蜜和搗三百杵丸如梧桐子大每服三十丸食前溫酒下治虛勞腰膝痛蘹香鱉甲丸方蘹香子舶上者炒鱉甲去裙襴醋炙各一兩附子大者一枚炮裂去皮臍葫蘆巴一分柴胡去苗黃連去須各半兩楝實十枚炮上七味為細末麵糊和丸如梧桐子大每服十丸至二十丸食前溫酒下治虛勞腰痛四肢無力山芋丸方山芋熟乾地黃焙各二兩黃耆銼巴戟天去心各一兩遠志去心牛膝酒浸切焙五味子各半兩柏子仁桂去粗皮各三分上九味為細末煉蜜和搗三百杵丸如梧桐子大每服三十丸食前溫酒下治虛勞腰痛不能運動及男子五勞七傷下元虛損令人肥健覆盆子丸方覆盆子去萼巴戟天去心山芋澤瀉附子炮裂去皮臍各一兩半白朮炒桂去粗皮菟絲子酒浸別搗牛膝酒浸切焙人參白茯苓去黑皮厚朴去粗皮生薑汁炙乾薑炮裂山茱萸細辛去苗葉遠志去心甘草炙銼五味子陳橘皮去白炒龍骨石槲去根青木香檳榔銼芎藭熟乾地黃焙赤石脂陳曲炒柏子仁地骨皮蛇床子各一兩肉蓯蓉去皴皮酒浸切焙黃耆銼各二兩上三十二味搗羅為末煉蜜和丸如梧桐子大每服空心食前溫酒下四十丸治虛勞腰痛補益經脈安和臟腑除心中伏熱強筋骨輕身明目去冷除風蓯蓉丸方肉蓯蓉酒浸去皴皮切焙四兩山芋五味子各二兩半杜仲去粗皮炙銼三兩牛膝酒浸切焙菟絲子酒浸別搗赤石脂白茯苓去黑皮澤瀉熟乾地黃焙山茱萸巴戟天去心各二兩上一十二味搗羅為末煉蜜和丸如梧桐子大每日空心溫酒下三十丸治五勞七傷陽氣不足腰腳痠痛補益乾地黃丸方熟乾地黃焙四兩五味子鹿茸去毛酥炙桂去粗皮巴戟天去心遠志去心各一兩肉蓯蓉酒浸切焙二兩菟絲子酒浸別搗二兩半上八味搗羅為末煉蜜和丸如梧桐子大每服三十丸食前棗湯或黃耆湯下治腎勞腰腳疼痛及脾胃極冷豬肚丸方豬肚一枚淨洗附子炮裂去皮臍澤瀉肉蓯蓉去皴皮酒浸切焙乾薑炮裂青蒿陳橘皮去白炒各二兩桃仁去皮尖雙仁炒蜀椒去目並閉口炒出汗檳榔銼黃連去須炒柴胡去苗木香桂去粗皮各一兩上一十四味除豬肚外搗羅為末將豬肚入熟艾十兩以米醋一斗爛煮取出搗研令細入諸藥末及余醋和硬軟得所杵數千下衆手為丸如梧桐子大每服空心米飲下三十丸加至四十丸治虛勞腹內冷氣補腰膝填骨髓令人悅澤四味地黃丸方熟乾地黃焙白朮白茯苓去黑皮菟絲子酒浸兩宿別搗等分上四味搗羅為末煉蜜丸梧桐子大溫酒下三十丸日再服空腹服
