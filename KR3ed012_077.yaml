body:
  text: 卷第七十七氣痢論曰氣痢者由冷氣停於腸胃間致冷熱不調脾胃不和腹脅虛滿腸鳴腹痛便痢赤白名為氣痢治法宜厚腸胃調冷熱補脾氣則痢當自愈治氣痢久不止氣力困弱赤石脂散方赤石脂三分乾薑炮三分厚朴去粗皮生薑汁炙一兩龍骨三分黃連去須一兩白茯苓去黑皮三分無食子二枚炒令煙出當歸切焙三分上八味搗羅為散每服三錢匕空心米飲調下日晚再服治氣痢胃與大腸虛不能制晝夜無度漸令人黃瘦食不為肌肉困重無力眼目昏澀十年不愈縮砂蜜丸方縮砂蜜去皮一兩肉豆蔻去殼半兩黃連去須二兩當歸切焙赤石脂陳橘皮去白酒浸一宿曝乾各一兩上六味搗羅為末煉蜜為丸如梧桐子大每服二十丸空心溫漿水下日晚再服老人及妊娠人並可服治久氣痢不止或差或劇黃連丸方黃連去須微炒當歸切焙烏梅肉微炒乾訶黎勒炮去核各一兩上四味搗羅為末煉蜜和丸如梧桐子大每服三十丸空心用薑製過厚朴煎湯下日晚再服治氣痢久不止木香丸方木香一兩訶黎勒炮去核二兩上二味搗羅為末用粥飲和丸如梧桐子大每服二十丸空心溫漿水下日午再服治氣痢久不瘥桃仁丸方桃仁去皮尖雙仁炒令香一分別研入安息香半兩別研入木香半兩訶黎勒炮去核一兩上四味將木香訶黎勒搗羅為末與二味研了藥相和重細研入少許米飲為丸如梧桐子大每服三十丸空心用暖漿水下日晚再服治積年冷痢日三五行脹悶腸鳴食不消化面黃漸瘦厚朴丸方厚朴去粗皮生薑汁炙令紫乾薑炮陳橘皮湯浸去白焙訶黎勒炮去核白茯苓去黑皮蕪荑微炒香阿膠炙令燥熟艾微炒別搗胡粉炒黃黃石脂赤石脂亦可烏梅去核炒乾當歸切焙蜀椒去目並閉口炒出汗各一兩上一十三味除膠艾二味外搗羅為末先以米醋一升半於無風處煮艾水減約八分絞去艾次下阿膠候消盡乘熱入藥末和勻杵千百下並手丸如梧桐子大曝乾每服空心用溫漿水下五十丸日午再服治氣痢年深不瘥陳橘皮丸方陳橘皮酒浸去白焙一兩白茯苓去黑皮三分陟釐微炒半兩麥糵炒熟三分白石脂一兩赤石脂三分無食子三枚燒令煙出龍骨一兩酸石榴皮炙黃一兩上九味搗羅為末用麵糊和丸梧桐子大每服二十五丸空心以溫漿水下日午再服治冷勞氣痢久不瘥豬肝丸方獖豬肝一具去筋膜切作柳葉片以醋一升煎醋令盡大蒜煮令熟去殼研二兩烏梅肉炒乾一兩桂去粗皮一兩厚朴去粗皮生薑汁炙令紫二兩乾薑炮一兩陳橘皮湯浸去白焙一兩訶黎勒煨去核一兩黃連去須炒二兩當歸切焙一兩上一十味除豬肝蒜外搗羅為末將豬肝與蒜細研如麵糊入藥末和勻搗數百下丸如梧桐子大每服二十丸空心用熱麵湯下日午再服治氣滯止瀉痢霍亂厚朴散方厚朴去粗皮生薑汁炙令紫三兩甘草炮白芷乾薑炮蘹香子略炒各半兩陳橘皮去白焙乾一兩吳茱萸湯洗焙乾炒三分上七味搗羅為散每服二錢匕凡氣不和鹽湯調下霍亂吐瀉煎木瓜紫蘇湯調下泄瀉米飲調下赤白痢甘豆湯調下並食前治氣痢泄瀉心腹㽲痛木香散方木香沉香銼桂去粗皮沒藥胡椒各一分肉豆蔻仁一枚當歸切焙一分龍骨半兩赤石脂半兩乾薑炮一分附子炮裂去皮臍一分甘草炙銼一分蜜陀僧一分上一十三味搗羅為散每服一錢匕米飲調下食前服治諸積瀉痢及暴氣瀉紅蠟丸方丹砂研令極細粉霜硫黃各一分三味同研巴豆去皮取半兩不破者微用油炒熱湯洗去油拭乾上四味同研如膏熔黃蠟一兩半劑勻旋丸黍米大米飲下二三丸暴瀉水下赤痢甘草湯下白痢乾薑湯下赤白甘草乾薑湯下婦人血氣紅花酒下治氣瀉不止木香丸方木香丁香縮砂仁肉豆蔻去殼各一兩訶黎勒皮藿香葉赤石脂各半兩上七味搗羅為末用麵糊和丸梧桐子大空心食前米飲下十五丸治冷勞氣痢腹脅疼痛水穀不消神驗丸方陳曲炒吳茱萸湯浸焙乾炒各一兩黃連去須炮蕪荑炒各三分上四味搗羅為末薑汁和丸梧桐子大每服十五丸溫米飲下食前治諸氣痢不止木香丸方木香肉豆蔻仁縮砂仁赤石脂各半兩上四味搗羅為末以棗肉和丸梧桐子大每服二十丸溫米飲下食前服治氣痢腹痛睡臥不安香艾丸方艾葉炒陳橘皮湯浸去白焙等分上二味搗羅為末酒煮爛飯和丸如梧桐子大每服二十丸空心鹽湯下治氣痢腹內虛鳴日久不瘥龍骨散方龍骨黃連去須黃柏去粗皮乾薑炮阿膠炙燥人參厚朴去粗皮生薑汁炙各二兩上七味搗羅為散每服二錢匕空腹粥飲下日再治脾毒氣痢下血如鵝鴨肝腹痛不止地榆湯方地榆訶黎勒皮各一兩甘草炙當歸切焙各半兩柏葉茜根芍藥赤茯苓去黑皮各三分上八味細銼每服三錢匕水一盞煎取六分去滓溫服食前又方胡黃連末用雞子白調作餅子炙令黃研為末入樗皮汁和再作餅用蜜塗炙令黃上一味不拘多少搗羅為散米飲調下二錢匕治氣痢瘦弱諸療不效者蒼朮丸方蒼朮厚朴去粗皮生薑汁炙黃連去須當歸焙訶黎勒皮炒乾薑炮各一兩半吳茱萸湯洗炒乾稱一兩艾葉炒三分龍骨附子炮裂去皮臍各二兩上一十味搗羅為末米飲和衆手丸如梧桐子大每服三十丸食前生薑湯下日再治氣痢不瘥疲劣變成冷勞痢烏梅丸方烏梅肉炒一兩豬肝一大葉以醋煮令爛研如糊草豆蔻去皮厚朴去粗皮生薑汁炙各一兩甘草炙銼一分肉豆蔻去殼當歸切焙乾薑炮蓽茇訶黎勒皮炒各三分桂去粗皮半兩上一十一味搗羅十味為末用豬肝煎和丸如梧桐子大每服二十丸米飲下陳曲湯亦得治氣痢腹脅虛滿腸鳴腹痛便下赤白地榆飲方地榆樗皮當歸切炒黃連去須炒陳橘皮湯浸去白炒枳殼去瓤麩炒桔梗桂去粗皮大腹去皮銼甘草炙銼各一兩上一十味粗搗篩每服五錢匕水一盞半生薑一棗大拍碎煎至八分去滓空心服治氣痢腹脹腹中虛鳴木香縮砂散方木香二兩縮砂仁一兩半枳殼去瓤麩炒訶黎勒皮各三兩上四味搗羅為細散每服一錢匕空心以陳米飲調下良久以食壓之治脾胃虛冷兼腸間泄瀉變成氣痢蓽茇丸方蓽茇檳榔銼一兩一分乾薑炮附子炮裂去皮臍各一兩半訶黎勒皮蕪荑仁各二兩白朮黃連去須各三兩阿魏三兩以水四合煎五六沸同蜜和藥枳殼去瓤麩炒一兩三分上一十味搗羅為末煉蜜丸如梧桐子大每服三十丸空腹生薑湯下日再漸加至四十丸治氣痢並休息痢人參湯方人參陳橘皮湯浸去白焙黃連去須炒赤茯苓去黑皮樗皮地榆當歸切炒五味子黃芩去黑心枳殼去瓤麩炒白朮炒甘草炙銼桂去粗皮大腹銼各一兩上一十四味粗搗篩每服五錢匕水一盞半入生薑一棗大拍碎煎至八分去滓空心頓服治氣痢腹脹不下食肉豆蔻散方肉豆蔻一半生一半炮訶黎勒皮一半生一半煨木香一半生一半炮各一兩白朮銼炒三分甘草銼一半生一半炙蓽茇乾薑炮各半兩上七味搗羅為散每服二錢匕米飲調下治氣痢赤白不止下冷上熱橘皮丸方陳橘皮湯浸去白焙三兩乾薑木香枳殼去瓤麩炒芍藥各三兩桂去粗皮大黃各一兩上七味搗羅為末煉蜜丸如梧桐子大每服三十丸空腹煎生薑湯下日再治氣痢久不瘥及諸痢困弱者蓽茇煎方蓽茇為末三錢匕牛乳半升上二味同於銀石器中慢火煎令減半空腹頓服神效休息痢論曰腸中宿挾痼滯每遇飲食不節停飲不消即乍瘥乍發故取名為休息痢治療當加之以治飲消削陳寒痼滯之劑則愈治休息痢阿膠湯方阿膠炙令燥黃連去須炒龍骨各一兩艾葉微炒半兩倉米二合炒上五味粗搗篩每服五錢匕以水一盞半煎至八分去滓空心溫服日午再服治休息氣痢久不瘥肉豆蔻丸方肉豆蔻去殼訶黎勒煨去核烏梅肉炒乾各一兩黃連去須炒一兩半白礬熬令汁枯半兩上五味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心用粥飲下或煎白梅生薑湯下亦得更加丸數服治休息痢不能食及羸瘦麥糵丸方大麥糵炒附子炮裂去皮臍陳曲炒桂烏梅肉炒人參白茯苓以上各一兩上七味搗羅細末煉蜜為丸如梧桐子大每服三十丸煮棗粥飲下不計時候治休息痢諸藥無效黃丹散方黃丹三兩炒令紫色棗肉三十枚搗為一塊用紙緊裹大火燒令赤候冷取出枳殼半兩麩炒微黃去瓤黃連半兩去須微炒上四味搗羅為末每服一錢空心粥飲調下忌油膩冷物治休息痢立效栝蔞散方栝蔞一枚出卻一半瓤白礬一兩白石英一兩上二味入栝蔞中濕紙裹燒赤為度候冷搗細杵為散每服一錢匕食前粥飲調下治休息痢日夜頻並白茯苓丸方白茯苓半兩黃連二兩半黃柏羚羊角各一兩半上四味搗羅為末煉蜜和丸如梧桐子大每服空心以米飲下三十丸日午再服治休息痢縮砂丸方縮砂蜜去皮一兩為末肉豆蔻去殼半兩為末羊肝去筋膜半具細切上三味拌和令勻用面和作餅子裹又以濕紙三重裹於煻灰火內煨令香熟去焦面紙研細為丸如梧桐子大每服三十丸空心用米飲下日再服治休息痢及赤白痢附子丸方附子炮裂去皮臍半兩雞子二枚去黃取白上二味先將附子搗羅為末以雞子白和為丸如梧桐子大一時傾入沸湯內煮數沸漉出分作兩服米飲下空心日午各一服治休息痢黃連湯方黃連去須炒龍骨各半兩艾葉一握微炒阿膠炙令燥半兩上四味細銼三味以水三盞先煎黃連等三味至一盞半去滓次下阿膠再煎至一盞分為二服空心一服如人行十里再一服每服藥後濃煎乾艾葉湯飲之亦佳治休息痢玉液丹方白礬二兩熬令汁枯硫黃硝石各半兩上三味於乳鉢內相和研作末即入砂瓶子內以炭火熔成汁取出候冷更研令細用麵糊為丸如緑豆大每服十丸空心米飲下兼治腸風痔漏諸疾治休息痢紫金散方定粉研鉛丹各一兩大棗二兩去核莨菪子一兩半訶黎勒炮去核一兩上五味相和搗成一團以面重裹於火中燒令煙盡取出去灰土令淨搗羅為散每服三錢匕空心米飲調下日晚再服治休息痢脾胃氣虛冷大腸轉泄或發或止飲食減少四肢無力沒石子散方沒石子半兩肉豆蔻半兩桂心半兩訶黎勒一兩煨用皮厚朴一兩半去粗皮塗生薑汁炙令香熟龍骨一兩麝香一分細研上七味搗羅為末每服一錢匕粥飲半盞調下食前服之治休息痢發歇不定經久不瘥硫黃丸方硫黃一兩砒黃一兩何首烏一兩末白礬一兩上四味相和研令勻入瓷瓶子中五月五日取不食井水和六一泥固濟封頭候乾安瓶子向火中燒令通赤候冷取藥細研以麵糊和丸如緑豆大患近者黃連湯下久者橘皮湯下一丸治休息痢久不瘥四霜丸方巴豆霜半錢匕百草霜二錢匕粉霜一錢匕砒霜半錢匕乳香末二錢匕上五味再研細令勻用黃蠟半兩熔汁和為丸如緑豆大每服一丸新汲水下食前服治一切休息痢日夜不止四體倦怠黃芩丸方黃芩去黑心半兩砒霜煅研三分烏梅肉炒乾黃柏銼各一分上四味搗研為末煉蜜和丸如緑豆大每服五丸冷水下治冷氣腹痛不止休息氣痢勞損消化水穀溫暖脾胃及治冷滑下痢不禁虛羸縮砂丸方縮砂蜜去皮附子炮裂去皮臍乾薑炮厚朴去粗皮生薑汁炙陳橘皮湯浸去白焙肉豆蔻去殼各半兩上六味搗羅為末煉蜜和丸如梧桐子大每服三十丸米飲下食前服治下痢乍瘥乍發病名休息丹粉丸方丹砂研半兩粉霜三錢膩粉鉛丹各四錢白礬灰三錢硝石研砒霜研各二錢伏火者上七味再同研勻用水浸炊餅心為丸如豌豆大每服三丸冷麵湯下看虛實加減治多年休息痢疾四神丸方當歸切焙半兩烏梅七枚去核黃連去須微炒一兩龍骨半兩