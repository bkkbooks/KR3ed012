豆就內揀取一七粒好者去谷先將丹砂硇砂於乳鉢內同研令細後方入剝了巴豆共研令勻用煎者蠟一小塊更同熬令勻作一劑如有患者旋丸如黍米大先用艾湯下三丸取出積聚溏轉一兩行並不搜攪疼痛後以冷水空心下三丸即瘥治泄痢久不止方生薑切沙糖各一分上二味以三重濕紙裹煨五更初都作一服以臘茶嚼下治久痢不止沉困怠惰訶黎勒散方訶黎勒炮取皮木香黃連去須地榆各半兩吳茱萸湯浸焙炒一分上五味搗羅為散每服三錢匕沸湯調下食前服治久痢不瘥將變疳䘌虛積丸方硫黃水銀二味同結沙子巴豆去皮心不去油與沙子同研各一兩礞石搗碎細研硇砂研各半兩上五味再同研勻以好醋和令得所先作一地坑如茶盞大深四指淨火煅通赤去灰火用醋紙襯攤藥在內碗蓋上焙一宿取出候乾麵糊為丸如小豆大每服二丸或三丸生薑棗湯下治久痢不止或赤或白煨姜莧方馬齒莧細切一握生薑細切二兩上二味和勻用濕紙裹煨熟不拘多少細嚼米飲咽下治新久瀉痢龍骨湯方龍骨桑根白皮赤石脂天雄炮裂去皮臍厚朴去粗皮生薑汁炙麻黃去節根各一兩半白芷黃連去須地榆桂去粗皮當歸切焙木香白朮訶黎勒皮煨各一兩黃芩去黑心半兩肉豆蔻去殼二枚上一十六味銼如麻豆每服三錢匕水一盞入生薑一棗大切煎至六分去滓溫服
