body:
  text: 卷第五十一腎臟門腎臟統論論曰腎足少陰經膀胱足太陽經相為表裡其王冬其象水其脈沉其養骨髓其神精與志其候耳其聲呻其臭腐其味鹹其液唾其色黑其氣閉藏是故早臥晚起必待日光去寒就溫無擾乎陽為養藏之道逆冬氣則少陰不藏腎氣獨沉其證少腹脹滿小便黃赤末有餘瀝數而痛者此腎實也若關格塞腰背強直飲食減少氣力疲乏者此腎虛也虛則補之實則瀉之以平為期此治之大略也腎虛論曰腎主水受五臟六腑之精而藏之若腎氣虛弱則足少陰之經不利故其證腰背痠痛小便滑利臍腹痛耳鳴四肢逆冷骨枯髓寒足脛力劣不能久立故曰診左手尺中神門以後陰脈虛者為少陰經病令心悶下重足腫不可按蓋足少陰腎之經也治腎經虛憊四肢無力面體少色惡風寒手足冷骨節痛耳內蟬鳴磁石丸方磁石火煅醋淬研附子炮裂去皮臍補骨脂炒肉蓯蓉酒浸去皴皮焙桂去皮各一兩續斷柴胡去苗巴戟天去心桃仁湯浸去雙仁尖白苓去黑皮人參山芋木香厚朴去皮汁炙遠志去心當歸切焙牛膝酒浸一宿切焙黃耆銼各三分羊腎一對去筋膜鹽水煮熟切焙白蒺藜炒去角蜀椒去目並閉口者炒出汗枳殼去瓤麩炒各半兩檳榔一枚銼上二十三味搗羅為末煉蜜和丸如梧桐子大每服二十丸溫酒下空心午前各一服治男子腎臟虛損腰腳弱氣不足體煩倦面色黑小便數鹿茸丸方鹿茸一對酒浸去毛炙肉蓯蓉酒浸一宿去皴皮焙附子炮裂去皮臍牛膝酒浸一宿焙天雄炮裂去皮臍五味子巴戟天去心葫蘆巴山芋菟絲子酒浸別搗熟乾地黃焙桂去皮桑螵蛸炙楮實木香肉豆蔻去殼紅豆蜀椒去目並閉口者炒出汗沒藥沉香人參白茯苓去黑皮羌活去蘆頭白蒺藜炒去角各一兩上二十四味搗羅為末煉蜜和丸如梧桐子大每服二十丸溫酒下空心午前臨臥各一服治腎虛冷補益元臟漏蘆丸方漏蘆去蘆頭生蓽茇生木香乾蠍頭尾足全者炒各半兩阿魏一分用醋化面和作餅子慢炙硇砂一分別研上六味搗羅研為末煉蜜和丸如雞頭大每服一丸煨蔥白酒下不拘時候治腎臟虛冷攻注四肢煩熱多汗肢節痛耳內鳴補腎丸方羊腎一對去筋膜黃耆蜜炙銼麻黃根當歸切焙蜀椒去目並閉口炒出汗杏仁湯浸去皮尖雙仁炒各一兩上六味除羊腎外搗研為末煮羊腎爛細研酒煮麵糊和丸如梧桐子大每服二十丸鹽酒下空心午前各一服治男子腎臟虛憊遺泄不時黑瘦鹿茸丸方鹿茸去毛炙三兩菟絲子酒浸別搗紫菀去苗土蛇床子黃蜜炙銼桂去皮白蒺藜炒去角白茯苓去黑皮肉蓯蓉酒浸去皴皮切焙陽起石研桑螵蛸燒灰存性附子炮裂去皮臍各一兩上一十二味搗羅為末煉蜜和丸如梧桐子大每服二十丸溫酒或鹽湯下空心午前各一服治腎臟虛損精氣衰竭陽道痿弱腰膝無力五心煩熱肉蓯蓉散方肉蓯蓉湯浸去皴皮切焙鍾乳粉鹿茸去毛酥炙各二兩菟絲子酒浸三宿別搗一兩半蛇床子遠志去心續斷天雄炮裂去皮臍石龍芮各一兩上九味除鍾乳粉外搗羅為細末入鍾乳粉合研勻空心食前溫酒調下二錢匕治腎臟虛憊陽氣虧乏真元失禁精自流出五味子丸方五味子龍骨牡蠣火煅牛膝酒浸切焙桂去皮山茱萸萆薢白茯苓去黑皮巴戟天去心山芋續斷石斛去根銼附子炮裂去皮臍各半兩吳茱萸湯洗焙乾炒一分上一十四味搗羅為末煉蜜和丸如梧桐子大空心日午夜臥鹽湯下四十丸治腎臟虛冷陽氣萎弱嘔逆多唾體瘦精神不爽不思飲食腰腳沉重臍腹急痛小便頻數菟絲子丸方菟絲子酒浸別搗萆薢各半兩補骨脂炒防風去叉硫黃各一分續斷巴戟天去心各一兩細辛去苗葉蜀椒去目並閉口炒出汗各五錢上九味搗羅為末煉蜜和丸如梧桐子大空心鹽湯下三十丸治腎虛寒耳鳴多唾羊骨飲方羊脊骨一具椎碎磁石二兩半碎白朮一兩半黃耆乾薑炮白茯苓去黑皮桂去皮各半兩上七味除羊骨外銼如麻豆大先以水五升煮骨取二升去骨內藥煎取一升去滓空腹分溫三服治腎虛厥寒面黑耳枯臍腹冷痛倦怠補腎湯方磁石綿裹二兩半五味子防風去叉白茯苓去黑皮黃耆生薑桂去皮甘草炙人參當歸切焙玄參各半兩羊腎一具去脂上一十二味細銼如麻豆分作五劑每劑以水五盞煎取三盞去滓分溫三服治腎虛寒耳鳴好睡日漸痿損羊骨補腎湯方羊脛骨五兩炙黃銼磁石火煅醋淬二七遍白朮各二兩黃耆銼乾薑炮白茯苓去黑皮各一兩桂去皮三分上七味粗搗篩每五錢匕水一盞半煎至一盞去滓分溫二服空腹夜臥各一治腎虛寒關格塞煩熱腰背強直飲食減少氣力漸羸人參補腎湯方人參甘草炙銼桂去皮陳橘皮湯浸去白焙白茯苓去黑皮各半兩杜仲去皮酥炙銼白朮各二兩上七味粗搗篩每五錢匕水三盞入豬羊腎各半兩生薑半分拍碎薤白一莖煎至一盞半去滓分二服空腹日夜各一治腎臟虛損勞傷諸病黃耆湯方黃耆銼一兩乾薑炮半兩當歸切焙甘草炙銼黃芩去黑心遠志去心五味子芍藥人參白茯苓去黑皮麥門冬去心焙防風去叉澤瀉熟乾地黃焙桂去皮各一兩上一十五味粗搗篩每以水一盞半先煮羊腎一隻取一盞去腎入藥三錢匕棗二枚劈破煎至七分去滓空腹溫服日午夜臥再服治腎臟久虛體熱疼倦遺精形瘦色昏臍腹疼痛耳常聞鐘磬風雨聲補腎磁石丸方磁石火煅酒淬五遍鹿茸去毛酥炙各一兩五味子枳實去瓤麩炒各半兩楮實炒一兩半附子炮裂去皮臍牡蠣煅肉蓯蓉酒浸去皴皮切焙山芋巴戟天去心各三分上一十味搗羅為末煉蜜和丸如梧桐子大空腹浸牛膝酒下二十丸漸加三十丸治腎臟虛冷勞瘦蓯蓉丸方肉蓯蓉酒浸去皴皮切焙木香羌活去蘆頭芎藭桂去皮青橘皮湯浸去白焙白茯苓去黑皮當歸切焙黃耆銼防風去叉白朮各半兩五味子蘹香子微炒膃肭臍酒浸炙切各三分檳榔銼人參附子炮裂去皮臍各一兩上一十七味搗羅為末煉蜜和丸如梧桐子大空心溫酒下二十丸治腎氣虛損目視𥅻𥅻耳無所聞及五勞七傷諸虛不足黃耆丸方黃耆銼乾薑炮當歸酒浸切焙羌活去蘆頭芎藭甘草炙銼白茯苓去黑皮細辛去苗葉防風去叉桂去皮烏頭炮裂去皮臍附子炮裂去皮臍人參芍藥石斛去根銼熟乾地黃焙肉蓯蓉酒浸切焙各二兩羊腎一具煨熟切研膏大棗煮去皮核研膏五合上一十九味除羊腎棗膏外搗羅為末入二膏和勻更入少煉蜜和杵丸如梧桐子大每服二十丸加至三十丸溫酒下治腎虛寒陰痿腰脊痛身重緩弱言語混濁陽氣頓絶乾地黃散方生乾地黃一斤焙肉蓯蓉酒浸切焙白朮巴戟天去心麥門冬去心焙白茯苓去黑皮甘草炙銼牛膝酒浸切焙五味子杜仲去皮炙各八兩車前子乾薑炮各五兩上一十二味搗羅為散每服二錢匕溫酒調下日進三服治腎氣不足胸脅時痛骨節痠疼目常茫茫耳不審聽背膂拘急體重嗜臥宜服熟乾地黃散方熟乾地黃一兩天門冬一兩去心五味子一兩附子一兩炮裂去皮臍當歸三分銼微炒芎藭三分黃耆三分銼桂心三分山茱萸三分石斛三分去苗沉香一兩磁石一兩搗碎水淘去赤汁上一十二味搗篩為散每服四錢匕水一中盞入生薑半分煎至六分去滓空心食前溫服日三治腎勞虛冷乾枯憂恚內傷久坐濕地則損秦艽酒方秦艽牛膝芎藭防風桂獨活茯苓各一兩杜仲丹參各八兩側子炮裂去皮臍石斛去梢黑者乾薑炮麥門冬去心地骨皮各一兩半五加皮五兩薏苡仁一兩大麻仁一合炒上一十七味細銼以生絹袋盛酒一斗浸春秋七日夏三日冬十日成每日空腹溫服半盞日再治腎虛忪悸恍惚眼花耳聾肢節疼痛皮膚搔癢小腹拘急面色常黑黃疸消渴補腎湯方磁石煅醋淬七遍研一兩五味子炒附子炮裂去皮臍防風去叉黃耆銼炒牡丹皮桂去皮甘草炙銼桃仁去皮尖雙仁炒令黃各二兩上九味㕮咀如麻豆每服五錢匕以水一盞半入生薑半分切煎取八分去滓空心頓服治腎虛小便無度陰囊癢濕五石丸方鍾乳研紫石英研石膏脂研白礬燒研白石英研各半兩肉蓯蓉酒浸去皴皮切焙甘草炙銼天雄炮裂去皮臍熟乾地黃焙各一兩龍骨碎研三分上一十味搗羅為末煉蜜和丸如梧桐子大空心酒下一十丸日再服治腎臟勞傷磁石湯方磁石醋淬肉蓯蓉酒浸焙乾各二兩沉香一兩半五味子附子炮裂去皮臍覆盆子狗脊去毛白茯苓去黑皮各一兩豬腎一隻檳榔三分上一十味除腎外㕮咀如麻豆大每服五錢匕以水二盞先煮豬腎取一盞半去腎入藥再煎取八分去滓溫服食前治腎氣虛損陽氣痿弱葫蘆巴丸方葫蘆巴微炒巴戟天紫者去心炒肉蓯蓉酒浸切焙各二兩楝實去皮醋浸一宿焙桂去皮補骨脂炒蛇床子酒浸一宿焙牛膝酒浸一宿切焙各一兩莪朮醋浸一宿煨銼三分附子炮裂去皮臍蘹香子炒各一兩半上一十一味搗羅為末煉蜜和丸如小豆大常服二十丸空心炒鹽生薑湯下酒下亦得治腎虛小腹急滿骨肉乾枯陰囊濕癢沉香飲方沉香半兩大腹炮銼三分木香半兩羌活去蘆頭半兩萆薢三分牛膝去苗酒浸三分黃耆細銼半兩澤瀉半兩熟乾地黃焙半兩桑螵蛸炒半兩當歸焙一分芍藥炒一分磁石醋淬一分天雄炮裂去皮臍一兩續斷一兩上一十五味㕮咀如麻豆每服五錢匕水一盞半入生薑半分切煎至八分去滓食前溫服日二治腎臟虛冷遺泄韭子散方韭子醋煮炒香二兩附子炮裂去皮臍桑螵蛸銼炒澤瀉各三分蜀椒去目及合口者炒出汗各三分赤石脂研龍骨椎碎各一兩甘草炙銼一分上八味搗羅為散每服三錢匕空心溫酒調下日再服治腎臟虛冷腰胯膀胱間忽冷如人吹及手足膝蓋冷如水或莖中痛小便無節宜服蓯蓉獨活散方肉蓯蓉酒浸去皴皮切焙二兩獨活去蘆頭附子炮裂去皮臍蜀椒去目並閉口者炒出汗各一兩半澤瀉黃耆細銼各二兩五味子蒺藜炒去角防風去叉杏仁湯浸去皮尖雙仁炒黃木香乾薑炮牡蠣熬赤石脂黃芩去黑心甘草炙銼桂去粗皮桃仁湯浸去皮尖雙仁炒黃細辛去苗葉續斷各一兩上二十味搗羅為細散每服三錢匕空心酒調下日再服治腎虛耳聾脹滿腰脊強直小便黃赤螵蛸丸方桑螵蛸炒半兩菖蒲三分山茱萸微炒半兩磁石煅醋淬研半兩附子炮裂去皮臍三枚續斷三分五味子肉蓯蓉酒浸去皴皮炙山芋當歸切焙沉香各半兩蘹香子炒一分上一十二味搗羅為末煉蜜和丸如梧桐子大每服二十丸溫酒下荊芥鹽湯亦得治丈夫陽氣不足腎虛精乏不能施化慶雲散方菟絲子酒浸別搗五兩天門冬去心焙九兩桑寄生天雄炮裂去皮臍各一兩石斛去根白朮銼炒各三兩紫石英研二兩覆盆子十兩五味子七兩上九味搗研為散每服三錢匕溫酒調下食前服氣寒者去寄生用細辛去苗葉四兩腎實論曰足少陰腎之經其氣實為有餘則舌燥咽腫上氣嗌乾咳喘汗出腰背強急體重內熱小便黃赤腰脊引痛足脛腫滿此由足少陰經實或為邪濕所加故有是證治宜瀉之治腎臟實熱心胸煩滿腹脅脹急腰重不利地黃湯方生乾地黃焙一兩半麥門冬去心焙羚羊角鎊檳榔銼牛膝切焙黃芩去黑心甘草炙銼丹參枳殼去瓤麩炒赤茯苓去黑皮各一兩上一十味粗搗篩每服三錢匕水一盞煎至七分去滓不拘時候溫服治腎臟實熱小腹䐜脹足下熱痛耳聾胯離解夢伏水中瀉腎大黃湯方大黃二兩銼蜜水半盞浸一宿焙赤茯苓去黑皮黃芩去黑皮澤瀉菖蒲甘草銼玄參五加皮銼羚羊角鎊各一兩磁石火煅醋淬三七遍生乾地黃切焙各二兩上一十一味粗搗篩每服三錢匕水一盞煎至七分去滓