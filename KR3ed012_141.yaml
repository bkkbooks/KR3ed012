body:
  text: 卷第一百四十一痔瘻門痔瘻統論論曰內經謂因而飽食筋脈橫解腸澼為痔夫痔病之候亦多矣此獨舉飽食一端者蓋飲食人之大欲存焉推此則它可觸類而知也巢元方能拾其說而備論之故曰諸痔皆由傷風房室不慎醉飽合陰陽故勞擾血氣而經脈流溢滲漏腸間沖發下部所致也曰牡痔者肛邊生鼠乳乳出在外時出膿血是也曰牝痔者肛邊腫生瘡而出血者是也曰脈痔者肛邊生瘡癢而復痛出血是也曰腸痔者肛邊腫核痛發寒熱而血出是也曰血痔者因便而清血隨出是也孫思邈有所謂氣痔者寒溫勞濕即發亦憂患勞傷所致也集驗方有所謂酒痔者乃牝痔別名也治法禁忌唯孫思邈之論為詳諸痔論曰痔有五名一曰牡痔二曰牝痔三曰脈痔四曰腸痔五曰血痔證雖小異大率皆飲食飽甚情欲過度之所致也飲食飽則腸胃傷情欲過則氣血耗毒氣乘虛流入下部所以澼積而為痔也治五痔腫痛下血不止或榮衛滯澀身體疼痛大便風秘不通能消丸方威靈仙去苗土十兩木香防風去叉各二兩上三味搗羅為末煉蜜為丸如梧桐子大每服五十丸荊芥湯下不計時候治五種痔疾槐實丸方槐實一兩黃耆銼枳實去瓤麩炒黃貫眾白朮肉豆蔻仁防風去叉荊芥穗樗莢去皮炒紫色苦參各一分厚朴去粗皮生薑汁炙銼麝香別研木香芎藭皂莢子黃炒各半兩上一十五味搗羅為末麵糊丸梧桐子大食前米飲下三十丸晚再服治五種腸風瀉血痔瘻抵聖枳殼丸方枳殼去瓤麩炒威靈仙去苗土陳橘皮去白焙續斷各二兩生乾地黃焙連翹槐實炒附子炮裂去皮臍當歸切焙乾薑炒白礬煅過人參羌活去蘆頭地骨皮各一兩何首烏用米泔浸一宿竹刀刮去皮切二兩上一十五味搗羅為末煉蜜和丸梧桐子大每服三十丸空心溫陳米飲下疼痛者當日見效治五痔及腸風下血立聖丸方枳殼去瓤麩炒二兩半五倍子去灰土黃耆蜜炙黃銼槐花槐莢各二兩豬垂蹄甲二十一枚以上並各炒焦揀會淨木賊二兩半何首烏米泔浸軟以竹刀切作片子焙乾於石臼內搗末秤和入諸藥皂子各三兩殠橘一百枚刺蝟皮一枚皂莢針四兩榓藤子三枚以上四味各用藏瓶一枚盛用鹽泥固濟各留一穴出煙以炭火燒守候逐件煙盡退火各放冷取出研細上一十三味搗羅為末煉蜜和丸梧桐子大每服五十丸至百丸溫酒下空心服治諸痔如聖散方白蝟皮二枚燒雞冠花炒皂莢針炙各二兩栝蔞一枚燒胡桃十枚燒槐花二兩炒不蚛皂莢二梃酥炙黃耆炙銼枳殼去瓤麩炒各二兩白礬綠礬各一兩半三味飛過上一十一味搗羅為散每服二錢匕酒調下或作丸服治五種痔疾如聖丸方枳殼去瓤麩炒威靈仙去土陳橘皮去白各一兩續斷炒白礬飛過當歸去蘆頭炒乾薑炮裂附子炮裂去皮臍生乾地黃焙連翹炒槐莢子各半兩炒香為度取莢內子上一十一味搗羅為末煉蜜和丸梧桐子大每服十丸陳粟米飲下空心食前日二服如年深者加丸數疼痛甚者當日見效此藥能療積年患二十年以上只可十服新患三兩服便止更不再發治腸風痔疾黑神散方羌活去蘆頭黃耆銼黃荊實蔓荊實狗脊火燎去毛枳殼去瓤麩炒檳榔銼栝蔞以盛盡藥為度不拘枚數去子留瓤上八味除栝蔞外等分搗羅為末入栝蔞中盛於沙合或瓦罐子內鹽泥固濟火煅通赤候冷取出藥末更別用藥如後荊芥子白蕪荑二味與前等分木香比前減半上一十一味搗羅為散每服一錢匕空心茶酒調下日三治痔誥敕丸方連翹附子炮裂去皮臍桂去粗皮槐莢白礬飛枯杜仲去粗皮銼炒枳殼去瓤麩炒黃耆銼當歸切焙藁本去土上一十味等分搗羅為末煉蜜丸梧桐子大每服十丸米飲下空心食前日三此方曾有人於誥敕後偶見屢效故以為名治五痔蝟皮丸方蝟皮一枚細銼炒令黃色續斷槐莢子黃耆銼當歸切焙乾薑炮連翹附子炮裂去皮臍白礬枯過各二兩生乾地黃五兩上一十味搗羅為末煉蜜丸梧桐子大每服二十丸空心黍米酒下再服加至三十丸若重者尤宜服此藥治腸風五痔如神丸方烏蛇酒浸去皮骨炙大黃濕紙裹煨防風去叉各二兩黃耆銼枳殼去瓤麩炒刺蝟皮炙黑焦陳橘皮浸去白焙土蒺藜炒去角秦艽去苗土各一兩半上九味搗羅為末煉蜜丸梧桐子大每日空心溫酒下三十丸夜臥更服當日血止痛定治五痔三香丸方乳香半兩研安息香密陀僧研各一分巴豆七粒去皮油丹砂研麝香研砒霜研各半錢蝟皮一枚炙搗為細末上八味各研細一處和勻用水化炊餅丸綠豆大每服一丸空心冷茶清下治一切痔疾面色萎黃密陀僧丸方密陀僧燒令赤白礬灰各一兩槐子仁微炒雞冠花鐺墨各半兩皂莢灰一分上六味搗羅為末以麵糊丸梧桐子大每服二十丸煎柏葉湯下食前空心服治痔疾蝟皮散方蝟皮一枚黃牛角䚡一對鯪鯉甲二兩豬牙皂莢野豬肉各一兩舊箬葉四兩上六味用新瓶一隻盛新瓦子蓋口紙泥封干後煅通赤放冷取出研為細散入麝香少許每服二錢匕用胡桃仁一枚分作二服研細溫酒調下久患不過五七服瘥夜臥更深服治痔疾神驗散方當歸切焙一兩白礬二兩桑蛾二兩黃紫色者木耳二兩上四味搗羅為散每服一錢匕粟米粥調下空心食前服治五種痔疾腸風瀉血外痔內痔及脫肛下部四邊有胬肉如乳並皆治之異功散方黃牛角䚡一枚碎蛇蛻皮一條白者豬牙皂莢五梃銼鯪鯉甲半兩上四味入瓷瓶內黃泥封固候乾先以小火燒令煙出後用大火煅令通赤為度取出攤冷搗羅為散先用胡桃肉一枚分作四分取一分臨臥時細研如糊溫酒調下便睡先引出蟲至五更時用溫酒服藥散二錢匕至辰時更一服雖患年久不過三服瘥治痔木瓜丸方木瓜一兩切作片曬乾為末三分中留一分下藥檳榔二枚為末白礬一兩為末甜硝一分上四味用生面旋起酵作一烝餅料拍勻裹藥置火上炙其餅香熟乃去餅搗藥二百杵如藥干即以麵糊潤之為丸梧桐子大每服二十丸空心木瓜湯下其藥仍不可復犯火治痔疾勝金丸方雌黃半兩研白礬一兩研麝香一大錢研上三味再研勻釅醋半盞銀石器中慢火熬至一半傾乳缽內研勻再傾入銚內熬成膏更入麝香少許研更入蒸餅心少許和丸綠豆大每服夜臥溫漿水下十丸仍用一丸手心中漿水化開塗痔上三年者三五服瘥治痔疾烏雞子膏方沒藥半兩研麝香一錢研上二味用烏雞子一枚略取破頂頭傾出卻用雞子黃入雞卵內續入藥末同黃一處調勻用紙糊合頂於飯上炊令熟為度分作四服細嚼用麥門冬湯下食前服治痔能消丸方威靈仙淨洗麩炒蟬殼淨洗去土足焙乾各一兩上二味搗羅為末醋麵糊丸梧桐子大每服二十丸至三十丸米飲下治痔疾百中散方萆薢不計多少上一味搗羅為散每服二錢匕精羊肉四兩批作四片摻藥卻合如𩛩子於炭火上炙熟細嚼以酒半升送下候腹痛如人行五七里方上廁取下膿血及蟲只一服治痔疾殠橘散方殠橘不拘多少上一味用瓷瓶子一枚紙數重磚一片壓口次用炭火籠作火爐燒殠橘候煙去九分存性只置瓶內急以紙並磚子壓口候冷為細散每服二錢匕麝香溫酒或陳米飲調下治五痔小香連丸方黃連麩炒焦黃色不拘多少上一味搗羅為末以雞子清和丸梧桐子大陰乾每服十五丸於雞鳴時聲未絕間溫酒下十服取效永不復發治痔疾地膚子散方地膚子上一味不拘多少新瓦上焙乾搗羅為散每服三錢匕用陳粟米飲調下日三洗痔藜蘆湯方藜蘆附子銼莽草蛇床子羌活獨活當歸苦參芍藥各一兩蜀椒去目半兩上一十味粗搗篩每用兩撮生絹袋盛桑松柏枝各一握生薑一塊拍破銀石器中以水三碗煎熟去滓傾入器中乘熱熏候溫洗之熏痔七物湯方干蝦蟆一枚銼碎皂莢三梃銼碎艾一握鱉甲二枚碎雄黃一兩麝香一錢草烏頭一枚上七味粗搗篩拌勻穿地坑納著熟火一斤方磚一片中心鑽孔子蓋坑口旋入藥一撮披衣坐上熏熏洗痔疾神妙湯方萆薢栝蔞根甘草銼五倍子豉蔥白切上六味等分銼碎每用一二兩以水兩碗煎數沸盆盛坐熏痔候通手洗之治五痔消毒沒藥散方沒藥一兩研黃礬白礬溺垽火煅各半兩麝香一錢研上五味並研令勻每用時先以蔥湯洗拭淨以藥干敷治五痔花乳石散方花乳石一兩煅研乳香去石研夜明沙研膽礬研地龍去土為細末上五味等分共研令勻每用時先以甘草湯洗拭令淨以藥干敷令痔消釋塗痔黃柏散方黃柏鉛丹黃連膩粉白礬上五味等分搗羅為散先煎蔥湯洗後用藥散一錢匕塗之久患不過三度治一切痔疾應痛散方荊芥穗桑根白皮地榆各一兩上三味搗羅為散每用三錢匕水一碗同殠橘二枚拍破一處煎三五沸傾出就熏瘡極痛候下得手時方可淋渫仍服後藥治一切痔疾至聖丸方殠橘一百枚去核瓤銼枳殼去瓤銼半斤黃連去須五兩上三味用麩五升同於銀石器內慢火炒令麩黑為度於地上去火毒不用麩將藥為細末用皂子一百枚去黃以水一升於銀石器內煮令熟爛如膏與前藥末同拌和丸梧桐子大每服二十丸溫米飲下不拘時日三熏洗諸痔五物散方莨菪子二兩白礬一兩通明者半兩生用半兩鐵器內盛慢火煅過硼砂馬牙硝各一分以上四味一處先碾碎朴硝五兩同前四味一處碾上五味用百沸湯一大碗藥末五錢匕浸熏洗痔痛處食後夜臥用先以衣覆護只留痔瘡處仍避風敷貼諸痔木香散方木香檳榔大者銼黃連各一分莽草葉半兩上四味搗羅為散每用五錢匕水二碗煎三二沸熏洗後用溫水調勻以紙花子貼之治蓮花痔瘻及雞冠痔等貼痔四妙散方白芨白蘞木鱉子桑螵蛸各半兩上四味搗羅為散湯磨乳香調令稀稠得所攤故帛上貼之次日連皮拆下更無瘡瘢甚妙治丈夫婦人久患痔不論有瘡無瘡四香湯方莎草根一兩黑狗脊半兩甘松黃熟香上好極香者各一分上四味粗搗篩每用五錢匕水一碗煎五七沸盛在深盆中便令患者於上面坐圍衣被熏之勿透氣候下得手便淋渫患處直候藥冷即止不得揩拭便蓋復臥一時許若渫了臨臥將被以火焙稍暖更妙治痔疾已用藥淋渫了貼痔綠雲湯方卷柏樗根白皮貫眾樸消地骨皮各一兩上五味粗搗篩每用十五錢匕蔥二枝水五升煮至四升去滓乘熱渫之塗痔二黃散方黃柏一兩黃蜀葵花一分白芨二錢生乾地黃半兩青黛二塊上五味搗羅為散先渫了用樸消水調塗之貼痔苦楝散方苦楝子二十枚白礬一兩上二味炒焦為散入麝香研勻臨臥貼之空心吃嫩豬肥肉一頓永差熏痔丸方白鱔魚骨韭子等分上二味搗羅為末麵糊丸彈子大火燒熏之治痔疾駝糞熏方駝糞上一味不拘多少陰乾不得見日用慢火煨成煙燻候癢甚別用後方渫洗治痔疾淋渫方惡實一名牛蒡子上一味不拘多少淘去浮者每用一兩以水兩碗濃煎乘熱熏之候通手淋渫治痔疾殠橘散方殠橘皂莢子上二味不拘多少每一臭橘札眼子七個每眼子內安皂子一枚放在藏瓶內燒存性取出於土內培出火毒一宿細研入麝香少許食前米飲調下一錢匕治痔疾枸杞散方枸杞根地龍搗上二味枸杞根旋取新者刮去浮赤皮只取第二重薄白皮曝乾搗羅為末每秤一兩別入地龍末一錢和勻先以熱齏汁洗渫患處用藥乾摻日可三次用治痔疾下部發腫如梅李大痛硬不能行者即時取效神白散方半夏齊州者上一味每用一枚研令極細入龍腦一小皂子許同研勻用津唾於手心調令稀稠得所攤軟紙上貼之即冷如冰良久有清水出漸消矣如未全愈再貼去根本尤妙治痔疾熏敷立效散方蜣螂七枚夜飛撲落者尤妙上一味入瓷