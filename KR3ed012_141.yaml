有頭痛楚不可忍或有瘡漏濕天靈膏方天靈蓋酥炙熏陸香各半兩葵根李根蔥根各一分細銼麝香一錢研上六味搗研為末以豬脂或膠水調和如膏攤故帛上貼之日三易即瘥治牡痔有頭痛楚不可忍當歸餅方當歸四兩杏仁去皮尖雙仁研半兩白芷桂去粗皮各三分蕓薹子研二兩上五味搗羅三味為末與杏仁蕓薹子和勻以醋面調捻作餅子如錢大坐之藥干頻易以瘥為度治牡痔熏洗蔥桃湯方蔥根桃葉各一握上二味切搗以水三升煎數沸去滓入盆內乘熱熏洗日三兩度治牡痔生鼠乳肛門癢痛觸著有膿血出不絕豬蹄灰丸方豬懸蹄殼火焰上燒成灰研一兩水銀三大豆許上二味先取水銀用蒸棗肉二枚研勻次入蹄殼灰拌和為丸如雞頭實大先以鹽湯洗下部內一丸夜臥時再用以瘥為度治牡痔䘌蟲馬蹄灰方馬蹄一兩燒灰研上一味以豬脂調和塗綿上納部中日三五易即瘥治牡痔出膿血疼痛不可忍礬香膏方白礬灰半兩木香炮搗末一分上二味用雞子白調成膏敷之治牡痔因醉飽筋脈橫懈腸澼成痔每下鮮血槐子丸方槐實微炒三兩蝟皮炙焦當歸切焙附子炮裂去皮臍連翹乾薑炮續斷黃耆炙銼各二兩上八味搗羅為末煉蜜和丸如梧桐子大每服十五丸空心米飲下日晚再服稍加至三十丸牝痔論曰牝痔者由熱居肺經傳注大腸又大腸久虛風熱留滯故令肛邊生瘡而出血也此皆酒食過度毒氣攻注所為故又謂之酒痔治風氣稽留下部結成牝痔生瘡下血腫痛檳榔散方檳榔銼炒瞿麥穗澤瀉酒浸防己甜葶藶隔紙炒各半兩藁本去苗土滑石碎各半兩木香芫花醋浸炒令焦黃各一兩乾漆炒令煙盡半分陳橘皮湯浸去白炒郁李仁各半兩與橘皮同炒去皮上一十二味搗羅為細散每服二錢匕溫酒調下不拘時候日三治牝痔下血黃耆丸方黃耆細銼枳實去瓤麩炒各三兩烏蛇酒浸炙去皮骨當歸切焙赤石脂蝟皮炙焦各二兩上六味搗羅為細末煉蜜丸如梧桐子大每服二十丸空腹酒下日二治牝痔肛邊生瘡腫痛出血乳香丸方乳香研芫青麩炒鶴蝨炒大黃銼炒牡蠣煅研取粉枳殼去瓤麩炒蓽澄茄各半兩白丁香研一分上八味搗羅為細末用粟米粥和丸梧桐子大每服十五丸腸風下血臘茶下五痔煎薤白湯下血瘻煎鐵屑湯下空腹服治牝痔下血黃連散方黃連去須二兩陳曲一兩上二味搗羅為細散每服一錢匕入蜜少許溫水調服日三治牝痔下血不止白礬丸方白礬炭火燒令汁盡候冷研為末一兩黃耆細銼枳實去瓤麩炒各二兩上三味先搗羅黃耆枳實為細末入礬末拌勻煉蜜和丸如梧桐子大每服二十丸溫酒下加至三十丸日再治嗜欲失節或醉飽過度肛門腫痛生痔下血露蜂房煎方露蜂房槐皮各三兩楝實五十枚桃仁去皮尖雙仁五十枚白芷二兩赤小豆搗碎二合豬脂一斤上七味除豬脂外銼碎以醋半升拌一宿先熬脂令沸下諸藥煎候白芷赤黑色綿絞去滓瓷合盛空心溫酒調下一棗許大晚再服更以綿裹如棗核大納下部中日二換即瘥治牝痔下血艾葉散方艾葉炒黃半兩黃耆細銼一兩半龍骨地榆枳實去瓤麩炒白芍藥熟乾地黃焙各一兩上七味搗羅為細散每服三錢匕水一盞煎取六分去滓食前溫服治風毒痔瘡腫痛出血名牝痔者乳香散方乳香豬牙皂莢鯪鯉甲各一兩箬葉去梗頭粗硬者四兩黃牛角尖一對可長二寸許蛇蛻一條頭尾全者上六味都入在砂罐子內蓋口鹽泥固濟曝乾用炭火十斤煅候碧焰出放冷取出細研每服二錢匕用胡桃肉一枚細研以酒半盞入藥同調服空心食前治牝痔下血不止疼痛椿根散方臭椿根銼地榆銼黃耆銼伏龍肝研各一兩當歸切焙三分上五味搗羅為細散每服食前以粥飲調下二錢匕治牝痔及一切內外痔瘡疼痛不可忍者栝蔞麝香散方栝蔞新黃大者一枚上一味以刀開下頂子不去瓤選不蚛皂莢子填滿卻取開下頂子蓋別用紙筋泥固濟約三指厚以炭火簇合燒令紅放一地坑內出火毒一宿取出入麝香末一錢研令極細入瓷合盛每服一錢匕米飲調下溫酒亦得服一劑永除根本治牝痔下血肛邊生瘡百寶丸方枳實去瓤麩炒一兩上一味搗羅為細末煉蜜和丸分作二十五丸與後散藥同服治牝痔百寶散方皂莢不蚛者四梃燒灰去皂子不用研為末入麝香半錢同研皂莢刺針生杵為末上二味取皂莢末抄一錢匕入皂莢刺針末半錢匕以水一盞同煎至七分放溫服發痛時嚼百寶丸一丸以此散送下治牝痔下血日久不止皂莢子散方皂莢子仁一百枚麩炒黃槐蛾炙牛角尖屑炒露蜂房炒各一兩上四味搗羅為細散每服二錢匕粥飲調下治牝痔生瘡腫痛有血嘉穀散方陳粟米炒焦半升上一味為細末每服一錢匕空心白湯點下次服藤子散治牝痔藤子散方榓藤子一枚雞冠花一兩鯪鯉甲鱗七片上三味都入藏瓶內鹽泥固濟留一小眼子用炭火燒煙絕為度入麝香少許同研細每服一錢匕溫酒調下日三不拘時候與前藥相間服治牝痔肛邊生瘡下血不止地榆湯方地榆銼黃耆細銼枳殼去瓤麩炒檳榔銼當歸切焙黃芩去黑心赤芍藥各一兩上七味粗搗篩每服四錢匕以水一盞煎取七分去滓食前溫服治牝痔生瘡熏洗穀精湯方穀精草白礬荊芥穗臭橘各半兩上四味同銼碎用水三升煎五七沸去滓乘熱先熏候溫和洗之治牝痔淋洗白礬湯洗方白礬火上燒枯一兩上一味研為末每用半錢匕沸湯浸如人體溫淋洗
