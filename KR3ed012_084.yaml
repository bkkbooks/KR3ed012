body:
  text: 卷第八十四腳氣大小便不通論曰腳氣大小便不通者由風濕之氣搏於腳膝上攻胸腹脅肋填滿營衛痞隔三焦之氣升而不降所以傳導變化皆不能出而大小便不通蓋腎氣化則二陰通而腳膝者腎之候今腳氣上攻則腎氣不得化腎氣不化此大小便所以不通也治風毒腳氣大小便不通檳榔丸方檳榔銼牽牛子炒各五兩木香肉豆蔻去殼桂去粗皮柏子仁炒羌活去蘆頭芎藭當歸切炒青橘皮去白炒人參赤茯苓去黑皮各半兩陳曲炒三分上一十三味搗羅為末煉蜜丸如梧桐子大每服二十五丸空心臨臥生薑湯下以利為度更量虛實加減牽牛子治男子婦人風毒腳氣及遍身拘急刺痛大小便赤澀不思飲食嘔逆或寒熱桑白皮湯方桑根白皮銼紫蘇莖葉木通銼青橘皮去白各一兩荊芥穗羌活去蘆頭蘹香子根銼乾木瓜獨活各半兩枳殼麩炒去瓤二兩大腹大者二十枚並子用上一十一味粗搗篩每服三錢匕水一盞生薑一棗大切蔥白二寸並根煎至七分去滓空心日午夜臥各一服治腳弱浮腫大小便赤澀硇砂煎丸方硇砂半兩研如粉入後皂莢汁中同煎至一升下酒五升再煎至一升下童子小便三升不住手攪煎至半升住火皂莢十挺內五挺以水五升浸一宿去皮每挺為三截用生薑五兩取自然汁蘸炙薑汁盡為度去子搗內五挺灰火煨熟去皮椎碎於前浸皂莢水中揉洗生絹濾去滓入鐺內煎檳榔生用附子炮裂去皮臍白附子生用地龍去土炒各一兩天麻半兩生用半夏二兩湯洗七遍焙乾生用上八味將七味搗羅為末入硇砂煎中於火上攪勻硬軟得所取出搗三五百杵丸如梧桐子大稍硬更入熟蜜和丸焙乾用瓷器盛勿令透氣每服十五丸至二十丸男子忽腳膝軟頭旋噁心不思飲食心間脹滿行履不得用豆淋酒並童子小便下男子忽腳膝風痛行履不得口乾舌澀只豆淋酒下並空心日午兩服男子乾腳氣發動腳膝煩疼腰腳痠心躁悶乾渴見粥藥皆嘔逆及汗出氣喘此是乾腳氣衝心人多不辨乃為傷寒候若見此疾先取牽牛子一兩生用陳橘皮一錢同為末取黑豆二合炒半熟以童子小便八合浸後濾去豆入生薑自然汁二合攪勻分為三盞調牽牛橘皮末一錢匕當日進三服共六十丸立瘥男子手腳拘急背髆煩疼身心躁悶此是風毒欲發溫酒下男子鼻塞耳聾腰腳重滯此是腎臟風毒氣蔥酒下婦人血氣悶亂刺心欲絶者煎當歸酒下産後手腳攣急口乾不食爛研芥子酒下婦人血海不通煎紅花酒去滓下婦人血氣諸疾荊芥酒下婦人血風諸疾薄荷酒下有娠婦人不得服常服通百脈暖下元解風結潤身體暢四肢墜痰涎明耳目更加麝香龍腦為丸亦妙治腳氣腫滿坐臥不得氣上衝心大小便祕澀檳榔湯方檳榔七枚銼木香郁李仁湯浸去皮尖炒研各二兩木通銼桑根白皮炙銼各三兩上五味粗搗篩每服三錢匕水一盞煎至七分去滓入牽牛子末一錢匕攪勻空心服之大小便通利氣快為度治腳氣兩脛疼痛腫滿時發寒熱或大便不利毒氣上攻獨活散方獨活去蘆頭附子炮裂去皮臍各一兩牽牛子二兩微炒上三味搗羅為散每服二錢匕炒蔥酒調下溫蜜湯亦得日三不拘時以利為度治腳氣兩脛疼痛腫滿時發寒熱或大小便不利毒氣上攻青橘皮丸方青橘皮湯浸去白焙木香各一兩牽牛子四兩生上三味搗羅為末煉蜜丸如梧桐子大每服二十丸至三十丸溫鹽湯下不拘時治腳氣大腸結澀不通麻仁湯方麻子仁二合半炒升麻三兩豉二兩射干大黃銼炒甘草炙銼各一分半陳橘皮湯浸去白炒一兩上七味粗搗篩每服五錢匕水一盞半生薑一棗大拍破煎至八分去滓下芒硝末半錢匕更煎一兩沸空腹溫服治腳氣大便堅硬結澀而不渴麻仁丸方麻子仁炒芍藥各二兩枳實去瓤麩炒杏仁湯浸去皮尖雙仁炒各一兩大黃三兩銼炒厚朴去粗皮酥炙一兩半上六味搗羅為末煉蜜丸如梧桐子大每服五丸空心米飲下日三漸加至十丸治腳氣大便祕澀麻仁大黃丸方大麻子仁二兩研大黃五兩銼炒上二味先將大黃搗羅為末入麻子仁研勻煉蜜丸如梧桐子大每服十丸食前溫酒下薑湯亦得日再以大腸溏滑為度未瘥加至二十丸兼消腫下氣破宿癖疏風壅治腳氣心腹妨痛坐臥不安大腸澀滯吳茱萸湯方吳茱萸湯洗炒乾三分鱉甲去裙襴醋炙芍藥木香桂去粗皮桔梗各一兩半檳榔銼三枚上七味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日再治腳氣虛腫小便少桑楮湯方桑根白皮楮白皮各細銼淨洗取一升上二味粗搗篩每服三錢匕水一盞半煎至八分去滓空腹溫服日二治腳氣喘急咳嗽浮腫小腸澀硝石湯方硝石研三分葶藶紙上炒二兩上二味搗研為末煉蜜丸如梧桐子大每服十丸至十五丸食前桑楮枝煎湯下治腳氣小便少四肢腫黑豆湯方黑豆一升半淘洗檳榔銼五枚桑根白皮銼炒一升上三味粗搗篩每服五錢匕水一盞半生薑一棗大連皮切煎至八分去滓空腹日午近晚各一服當利小便即腫氣消治腳氣臌脹大小便不通氣急浮腫鱉甲丸方鱉甲去裙襴醋炙三分食茱萸銼半兩檳榔銼一兩半牽牛子炒熟三兩上四味搗羅為末煉蜜和丸如梧桐子大食前以郁李仁五十顆水一小盞研取汁煎湯下三十丸以大便通心神快為度未效加至四十丸治腳氣大小便祕澀不通牽牛子丸方黑牽牛淘洗令淨炊令氣透便取出攤令微冷便杵取末三兩青橘皮焙和白用陳橘皮焙和白用木通銼桑根白皮銼炒芍藥焙各一兩栝蔞根二兩上七味搗羅為末煉蜜搜和杵約三五千下丸如梧桐子大每服十五丸加至二十丸茶酒任下江東嶺南瘴毒腳氣論曰內經謂南方者其地下水土弱霧露之所聚也江東嶺南大率如此春夏之交山水蒸郁風濕毒氣為甚足或感之遂成瘴毒腳氣其候則腳先屈弱漸至痹疼膝脛微腫小腹不仁頭痛煩心痰壅吐逆時作寒熱便溲不通甚者攻心而勢迫治之誠不可緩支法存所以留意經方偏善斯術者豈非江左嶺表此疾得之為多歟治江東腳氣小欲動作漸覺心悶腳脛痠疼煩熱不止犀角湯方犀角鎊木香前胡去蘆頭各一兩青竹茹三分麥門冬去心一兩半大腹三顆連皮子銼上六味粗搗篩每服五錢匕水一盞半煎至一盞去滓不拘時服治江東腳氣發動頭旋吐痰心悶氣膈見食噁心心下拘急旋覆花湯方旋覆花一兩赤茯苓去黑皮桑根白皮銼半夏湯浸七遍去滑各二兩紫蘇莖細銼一兩大腹皮五枚連皮子銼上六味粗搗篩每服五錢匕水一盞半大棗二枚劈煎取一盞去滓內生薑汁一合空腹服之如要疏利入檳榔末二錢湯成下治江東腳氣已發兼宿冷氣衝心煩痛大便祕澀腹脹如鼓漸至悶亂吳茱萸湯方吳茱萸湯浸焙炒一兩一分木香厚朴去粗皮薑汁炙各二兩大腹連皮子銼五枚牽牛子一兩別搗末湯成下上五味除牽牛子外粗搗篩每服三錢匕水一盞半生薑一分拍碎煎取七分去滓內牽牛子末一錢匕攪令勻空心服之以大小便通利為度治江東腳氣盛發兩腳浮腫小便赤澀心腹妨滿氣急坐臥不得茯苓湯方赤茯苓去皮桑根白皮銼防己木香黃芩去黑心各三兩郁李仁湯浸去皮研二兩半木通細銼二兩大腹七顆連皮子銼上八味粗搗篩每服五錢匕水一盞半生薑一分拍碎煎取七分去滓早晚食前服治江東腳氣盛發上衝脾胃胸膈妨悶噫氣不暢煩熱口乾眼暗不識人羚羊角湯方羚羊角鎊犀角鎊各一兩半升麻旋覆花木香各一兩大腹五顆連皮子銼枳殼去瓤麩炒麥門冬去心焙前胡去蘆頭各一兩一分上九味粗搗篩每服五錢匕水一盞半煎至一盞去滓空腹服之以快利為度服前羚羊角湯得快利後微熱未除氣復嘔逆不下飲食胸膈有痰腹常如空虛大腹湯方大腹七顆連皮子銼犀角鎊木香各二兩前胡去蘆頭一兩半旋覆花一兩半夏湯浸七遍去滑焙赤茯苓去黑皮各二兩上七味粗搗篩每服五錢匕水一盞半生薑一分拍碎煎至七分去滓空腹服日再服前二方氣退客熱未定乾渴不止胸膈尚悶腳疼升麻湯方升麻白茯苓去黑皮各二兩青竹茹一兩木香一兩一分黃芩去黑心一兩半桑根白皮銼二兩石膏三兩麥門冬去心焙二兩上八味粗搗篩每服五錢匕水一盞半生薑一分拍碎棗二枚劈破煎至八分去滓溫服日再治江東春夏暑濕鬱蒸毒氣攻擊腳氣發動兩腳痠疼或浮熱腫滿或皮毛焦乾或腳疼不能久立筋急抽痛時衝心悶胸膈痰積噁心欲吐四肢𤸷痹十指不仁腹脹氣妨頭旋目眩眼暗茯苓湯方白茯苓去黑皮三兩薏苡仁炒四兩丹參獨活去蘆頭防風去叉各二兩半牛膝酒浸切焙防己五加皮黃耆枳殼去瓤麩炒升麻各三兩麻黃去根節四兩羚羊角鎊二兩桂去粗皮一兩半石膏研如粉一十兩上一十五味除石膏外銼如小豆大每服五錢匕以水一盞半浸一宿來晨煎取八分去滓空腹溫服之日二內消其病不吐不利如心腹氣脹每服加連皮大腹一顆心胸虛熱加麥門冬去心一分小腹痛加芍藥黃芩各一兩心胸有痰加旋覆花一分肺氣咳嗽加杏仁去皮尖十四枚桑根白皮一分小便數加杜仲末一分言語謇澀加附子一錢小便澀加木通一分腎虛耳聾加磁石末一錢匕不睡加酸棗仁末一錢煩湯不止加栝蔞一分治江東初患腳氣不識其候始腳脛酸重噁心頭旋嘔吐腹中刺痛胸中塞悶時憎寒壯熱如瘧狀皆腳氣所為半夏湯方半夏湯洗去滑薑汁製黃芩去黑心各二兩旋覆花三分赤茯苓去黑皮麥門冬去心桑根白皮各二兩大腹連皮子銼五顆上七味粗搗篩每服五錢匕水一盞半入大棗二枚劈破生薑一分拍碎煎取七分去滓空腹服治乍處江嶺未伏水土食飲不宜兼卑濕腳氣發動時復心悶面目腳膝浮腫氣乏唇口青黑胸膈煩熱見食吐嘔心腹妨痛冷氣結聚如有此候急服旋覆花飲方旋覆花一兩赤茯苓去黑皮二兩吳茱萸湯浸焙炒三分前胡去蘆頭一兩一分木香一兩半郁李仁去皮炒一皮半夏湯洗七遍去滑薑汁製二兩大腹五顆連皮子銼上八味粗搗篩每服五錢匕水一盞半生薑一分拍碎煎取七分去滓早晚食前服或要疏利別入檳榔末二錢匕服之治腳氣之疾先起嶺南稍來江東皆由脾濕得之或微覺疼痹或兩脛腫滿行起痹弱或上入腹不仁或時冷熱皆其候也若先覺此證食嘔不下氣上逆者宜急服犀角湯方犀角鎊旋覆花各一兩陳橘皮去白炒赤茯苓去黑皮各一兩半紫蘇莖葉銼半握上五味粗搗篩每服五錢匕水一盞半入生薑半分拍破豉一合棗二枚劈破煎至七分去滓空腹溫服以氣下為度治嶺南腳氣卒發衝心悶亂木香湯方木香郁李仁湯浸去皮炒各四兩防己一兩半紫蘇莖細切一兩桑根白皮銼赤茯苓去皮各二兩大腹四顆連皮子銼上七味粗搗篩每服五錢匕水一盞入生薑一分拍碎煎至一盞去滓不拘時溫服如倉卒不及者只以檳榔末三錢水一盞煎至七分服之亦效又方檳榔湯方檳榔末大腹皮末陳橘皮末各為粗末三錢上三味先以童子小便並水各一盞煎大腹陳橘皮末至一盞半次下檳榔末再煎取沸去滓旋旋溫服未退再服治嶺南腳氣攻心痛悶亂厚朴湯方厚朴去粗皮生薑汁炙木香檳榔各一兩上三味各搗為粗末先以水三盞入生薑一分厚朴末三錢匕煎取濃汁二盞下檳榔末木香末各二錢再煎一兩沸去滓不拘早晚溫服當快利一兩行為效治嶺南瘴癘疫氣腳氣等病金牙散方金牙研一兩一分牛黃研一分天雄炮裂去皮臍萆薢銼黃芩去黑心麝香研烏頭炮裂去皮臍各半兩細辛去苗葉葳蕤桂去粗皮莽草炙犀角鎊乾薑炮各三分蜈蚣炙一枚黃連去須一兩上一十