一兩去目及合口者炒出汗腳弱痛甚者作散每服三錢匕酒調下治腳氣二味獨活酒方獨活去蘆頭附子炮裂去皮臍各五兩上二味細銼用生絹袋盛內淨瓷甕中以清酒二斗浸密封頭春夏五日秋冬七日量性飲服常令酒力相續以瘥為度治初覺似有腳氣宜服此蒜酒方蒜二升去心切炒桃仁一升去皮尖雙仁炒研豉一升炒香上三味以生絹袋盛內淨瓷甕中用好酒一斗浸密封頭春夏三日秋冬七日初服半盞加至一盞量性飲之日三四服常令有酒色若酒盡更入酒五升加好椒一二合良治腳氣豉酒方豉三升三蒸三曝令乾每蒸以米熟為度上一味以生絹袋裹內淨瓷瓶中用好酒五升浸之密封頭春夏五日秋冬七日初服半盞漸加至一盞日三四服常令有酒氣治腳氣痹弱筋骨疼痛石筋槲酒方石槲四兩去根丹參二兩芎藭二兩杜仲二兩去粗皮防風二兩去蘆頭白朮二兩人參二兩去蘆頭桂心二兩五味子二兩白茯苓二兩陳橘皮二兩湯浸去白焙黃耆二兩乾薑三兩炮裂甘草一兩炙微赤銼薯蕷二兩牛膝三兩去苗當歸二兩上一十七味細銼以生絹袋盛用清酒五斗於甕中漬七日開初溫服三合日再服漸加至一盞為度治腳氣骨節疼痛松葉浸酒方新松葉二十斤銼碎洗淨漉干清酒一碩上二味都入於不津甕中密封七七日熟量力飲之治腳氣疼痛天門冬酒延年不老方天門冬五升去心搗絞取汁慢火煎如稀餳濕荊二十五束每束三尺圍各長二尺五寸當中心以火燒兩頭盛取瀝一升半煎取七合青竹三十束每束三尺圍各長二尺五寸當中心以火燒兩頭盛取瀝三升煎取一升半生地黃銼五升粗大者洗淨控干搗取汁三升煎取一升半生五加皮三十斤淨洗控干銼大釜內以水四石煮至五斗去滓澄清取汁以銅器盛入大釜內重湯煎之至三斗五升盛煎與前四味汁合勻白糯米一石五斗曲八斤曝乾搗末以上藥汁取六升浸曲末五日曲中沸起第一酘將米七斗淨淘二十遍置淨席上以生布挼干然後內甑中蒸之為饙即以前藥汁內淨盆中拌飯令勻候冷熱如常醞酒法入淨甕中密封經三日後入第二酘更淨淘米四斗一如前法蒸炊後放令冷熱得所投入前酒甕中封頭又經三日即入後藥桂去粗皮甘草炙白芷當歸切焙芎藭麻黃去根節各六兩乾薑炮五加皮炙各一斤附子炮裂去皮臍五兩牛膝去苗銼九兩白糯米四斗淨淘控干上一十一味除米外並銼搗如米粒入米拌勻同內甑中久蒸極熟傾出攤候似人體冷暖投入煎酒甕中三日後可服少許嘗之若得中即密封甕頭更候二七日後壓取清酒入不津器中盛之每服四合溫飲之日再漸加至半盞以知為度飲此酒只可微溫不可過熱治腳氣屈弱積年腰脊攣痹及腹內堅結者菝葜酒方菝葜銼碎五斗以水一石五斗煮取七斗五升去滓澄清曲十斤搗碎將藥汁減二斗五升浸曲二日沸起白糯米一石上三味將糯米淨淘控干炊飯候熟傾出如人體冷暖入前藥汁五斗並曲末拌勻甕中盛之春夏五七日秋冬十餘日熟後量人性飲日五六服常令酒力相續不過三五劑皆平復治腳氣蒼耳湯方蒼耳子炒搗鹽赤小豆各三升上三味內釜中以水一石二斗煮至七斗五斗去滓用淨瓦甕一口可容五斗者以板子橫著甕底將藥汁乘熱傾入甕中候冷暖得所入腳踏甕中板子頻以藥汁從骭面淋之其汁只可離腳面三寸不可過腳踝仍於密室中避風以得汗為度湯冷即內釜中入滓更煎三五沸後去滓一依前法治腳氣蘸腳椒湯方蜀椒六升未經蒸者用生細作袋子兩枚每枚長八九寸內椒入袋中實築之仍縫袋口上一味將椒袋內釜中以酸漿水四斗五升入鹽二升煮五七沸用淨瓦甕子一口可容五斗者將所煮椒袋一枚及一半煮椒汁乘熱入甕中候其湯冷暖通腳即以腳入甕中踏椒袋上蘸仍以湯頻頻從骭面淋之若甕中椒袋覺冷即換釜中熱者其湯或冷亦換釜中熱湯其使了湯並椒袋卻內釜中以微火溫之常令熱亦須於密室中勿令風吹若兩腳覺痹牽風如蟲行頭項肢體皆有汗出腹中鳴此是氣下即止若汗後覺心氣悶可取冷飯吃三五口以鹿脯下之若覺微利此是病狀通泄也若未愈即隔日或三日取舊湯袋等依前法踏蘸還以得汗及腹鳴為度其蘸腳湯只可離腳面三四寸不可過踝宜食酥蜜薑湯並鹿肉治腳氣蘸腳椒礬湯方蜀椒白礬碎各三兩蔥白一握並須洗淨大豆五升揀淨鹽生薑切各二兩上六味內釜中以漿水三斗煮至二斗五升用新瓦甕子一口可容五斗者用板子闊三寸於壅子近底橫著之將煎得汁去滓乘熱投入甕中候冷暖得所即入腳踏甕中板上蘸腳頻頻以湯從骭面淋之其湯只可離腳面三二寸不可過腳踝或湯冷即依前內釜中入前藥滓煎三四沸後去滓一依前法蘸之其滓只可重煎三四度若有汗出甚者乃止得汗後須衣被蓋復候定吃薑湯茶一碗兼治腸風退癮疹去眼昏鼻衄耳聾等疾治腳氣蘸腳杉木節湯方杉木節半斤銼柳蠹蚛末半升蒴藋枝五兩銼上三味內釜中以水二斗煎至一斗入鹽四兩漿水一斗更煎三五沸後用淨瓦甕子一口可容五斗者以板子橫著甕底將煎得汁去滓乘熱傾入甕中候冷暖得所入腳踏甕中板頻頻以湯從骭面淋之其湯只可離腳面三四寸不可過腳踝仍於密室中避風以得汗甚為度湯冷即內釜中入滓更煎三五沸後去滓一依前法蘸腳治腳氣初發蘸腳薏苡根湯方薏苡根銼枳殼根銼各三兩蒴藋枝二兩銼吳茱萸一兩湯洗過綿裹上四味內釜中以水二斗煎至一斗二升入漿水二斗鹽三兩更煎五七沸去滓用新淨瓦甕子一口可容五斗者以板子闊三寸橫著於甕底將煎得汁乘熱傾入甕中候冷暖得所於密室中就甕蘸腳頻頻以湯從骭面淋之甕外以糠火微溫其甕中湯只可離腳面三寸更互換湯以得汗甚為度若汗不多可盡日蘸了用生薑木瓜各一兩半銼碎同研如膏塗於腳心以蠟紙裹纏縛定厚衣被蓋復取汗更吃後木香湯木香湯方木香別搗白檳榔別搗各半兩紅雪一兩末上三味先將木香末三錢匕以水一盞半生薑一棗大拍碎蔥白三莖同煎至一盞去滓入檳榔末二錢匕童子小便一合紅雪末二錢匕更煎一二沸去滓溫服治腳氣蘸腳黃櫨湯方黃櫨木三斤銼碎白礬二兩為末上二味先將黃櫨木以水二斗煎十餘沸去滓入白礬末攪轉用瓦甕子一口可容四斗五升者以闊三寸板子橫著甕底將煎得湯乘熱傾入甕中於密室內坐腳踏甕中橫木上頻蘸以湯從骭面淋之甕外以糠火微溫得汗甚為度其湯只可離腳面三二寸若蘸了以綿衣裹兩腳勿令風吹其殘湯留取隔日溫過一依前法用如覺得汗甚心中悶極即取紅雪末二錢匕以冷漿水調服治腳氣湯腳散方地椒蒺藜子莽草荊芥穗上四味等分為末煎湯淋浸治腳氣二豆湯方大豆五升赤小豆三升吳茱萸一升鹽三合上四味取一新杉木桶先將大豆布在桶底次下小豆次下茱萸次下鹽以漿水二斗於鍋內煮沸傾入於杉桶其沸漿令與藥齊勿過之即以腳於桶中踏藥上候溫漸踏至底唯露出腳趾覺冷即續添沸漿以盡為度密蓋復忌風漸淋至膝候湯冷收腳撲米粉治腳氣發過心膈悶者宜用此方上取新磚兩口鑿中心作孔如球子大勿令透過即將炭火燒令通紅用米醋潑之便內蜀椒於磚孔中以物蓋上看溫暖即去襪以腳踏磚上立愈治久蘊風濕足多冷麻隱痛難行夜常轉筋如風所吹此皆是腳氣之候麻黃裹足方上以麻黃二斤銼碎炒令極熱以帛包貯纏裹二足不得透氣良久腳上有汗候麻黃溫即不用卻著綿夾襪無令風吹如此三五次永除病本治腳氣腫滿痛連骨髓足踏丸方烏頭三兩去皮臍生搗末樟腦二兩細研上二味再研令勻釅醋煮糊和丸如彈子大置藥一丸於爐子中心踏之衣被蓋復汗出如涎為效爐子法掘地爐子一個闊一尺深二尺三寸掃拭令淨置新磚半頭在爐子中心用細莖炭十斤燒令通赤候炭消及一半為度取去炭用釅醋一升灑之仍用釅醋四升同白馬通八斤和成泥固濟地爐子四圍俱遍將藥丸一粒置磚上伸腳踏之被蓋復三二時辰汗盡方出腳然後用藥淋洗淋洗藥三節湯方兼治偏風歷節風手足不遂疼痛等患石楠節杉木節松木節茵芋蒴藋原蠶砂麻黃根萆麻葉柳蚛糞煮絮桶中灰上一十味各三兩細銼用水一斗五升煮至一斗乘熱淋洗治腳氣風痹手足疼弱鼠漏惡瘡風毒所中腹中㽲痛百病摩之皆愈牡丹膏方牡丹皮芫花生用皂莢去皮炙各半兩藜蘆生附子炮裂去皮臍莽草葉各三分大黃銼炒蜀椒去目並閉口炒出汗各一兩上八味搗羅以新綿裹內淨器中苦酒三升浸經一宿取臘月豬膏三升內鍋中煉去筋膜後同藥裹入前酒中慢火煎之候變色稀稠得所即濾去藥裹頻攪成膏傾入通油瓷器中密封旋取揩摩患處合此藥勿令婦人雞犬等見治腳氣內須服藥攻擊外須以膏摩火灸發泄等此治腳氣之要術若有攣急及有不仁處常用此膏摩之兼治江南風毒先從手腳上腫痹及上頸痹面部卻入腹即殺人者野葛膏方野葛銼蛇銜銼防風去叉各三兩犀角鎊烏頭炮裂去皮臍桔梗去蘆頭茵芋葉蜀椒去目並閉口炒出汗乾薑炮巴豆去皮心膜研如膏升麻細辛揀淨各二兩雄黃研一兩鱉甲醋炙去裙襴一兩上一十四味搗研為末用酒四升浸經一宿先取臘月豬膏五斤內淨鍋中煉成油濾去筋膜將前酒浸藥末以新綿裹內豬膏鍋中慢火煎之候變色去藥裹頻攪勿令焦黑量稀稠得所絞濾去滓傾入通油瓷器中盛密封頭旋取塗摩患處合藥勿令婦人雞犬見治腳根痛不問左右但覺隱隱疼痛並是風毒氣此皆凝寒之月人多忍冷血聚不散宜先用暖水淋洗後干拭遂以火灸覺痛處令人點藥揩摩直候藥氣透熱揉紙拭去藥如常蓋復麥皮膏方麥皮熊白上二味等分相和以微火炒更入甲煎口脂少許調勻如膏旋旋取摩痛處即瘥治腳氣連腿腫滿久不瘥附子散方附子一兩去皮臍生用上一味搗羅為散用生薑汁調如膏塗腫上藥干再塗以腫消為度治風濕腳氣腫疼無力芥子膏方白芥子蕓薹子萆麻子木鱉子去殼白膠香各一兩胡桃五個去殼上六味一處搗三千杵成膏每用皂子大摩疼處治腳氣赤小豆煎方赤小豆二升半杏仁湯浸去皮尖雙仁炒桑根白皮銼各一兩生薑切一兩半上四味粗搗篩以水三升煎至一升半去滓更入吳茱萸末半分蜀椒末半分再煎一兩沸令如膏密器收每服一匙頭許空心以酒調服治腳氣黑豆煎方黑豆五升桑根白皮銼五兩以水二升同豆煮候豆爛濾取汁羌活去蘆頭蒺藜子炒去角海桐皮銼吳茱萸湯洗焙乾炒各半兩上六味除前汁外搗羅為末入前汁中以文武火煎成膏每服一匙頭溫酒化下空心食前服治腳氣不能食牛膝散方牛膝酒浸焙乾別搗細辛去苗葉硇砂研各一兩上三味搗研為散每服二錢匕溫酒調下隔日一服治一切腳氣半夏湯方半夏一兩湯洗去滑上一味㕮咀如麻豆以生薑汁一升煎取四合空心頓服間日服一劑
