body:
  text: 卷第一百三十六氣腫論曰內經謂因於氣為腫四維相代則腫毒之作蓋有因於氣者以諸氣屬於肺肺主皮毛為風邪所搏則鬱而不通腫見於皮毛之中然氣虛無形故狀如癰無頭虛腫而色不變皮上雖急動之乃痛治毒氣在肌肉之中腫痛寒熱急者數日殺人若心腹悶當急服大五香湯方雞舌香沉香藿香各五兩薰陸香麝香研一錢甘草炙吳茱萸湯洗焙炒各三分細辛去苗葉桂去粗皮各半兩升麻一兩一分上一十味除麝香外粗搗篩入麝拌勻每服五錢匕水一盞半煎至一盞去滓溫服日三治氣腫走注疼痛不可忍者虎骨丸方虎脛骨去筋肉刷洗淨塗酥炙黃黃耆銼杜仲去粗皮附子炮裂去皮臍各二兩麝香別研乳香別研各半兩上六味將四味搗羅為細末入麝香乳香再研令勻酒煮麵糊丸如梧桐子大每服二十丸空心溫酒下加至三十丸治氣腫不消犀角湯方犀角鎊獨活去蘆頭生麥門冬去心焙大黃銼炒各二兩枳殼去瓤麩炒木香沉香白蘞各三兩丁香一兩半玄參九兩連翹六兩漏蘆半兩木通銼甘草炙朴硝各一兩上一十五味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服以利為度治氣腫行走無定或起如蚌或大如甌或著腹背或著臂腳海藻浸酒方海藻洗去咸赤茯苓去黑皮防風去叉獨活去蘆頭附子炮裂去皮臍白朮各三兩鬼箭去莖用羽當歸切焙各二兩大黃銼醋炒四兩上九味銼如麻豆生絹囊貯以酒二斗浸之春夏五日秋冬七日初服三合空心午時臨臥各一服若頻利即減未利加至四五合以瘥為度治氣毒腫疼痛變走諸處或牽引小腹及腰臍痛桃仁酒方桃仁一升湯浸去雙仁皮尖炒酒三升上二味先乘熱搗桃仁如膏漸入酒研絞去滓每服五合空心夜臥溫服治毒氣腫當頭上如刺痛甘草酒方甘草炙升麻沉香銼麝香別研各半兩豉一兩半上五味除麝香外粗搗篩入麝香拌勻每服五錢匕酒一盞半煎至八分去滓早晚食前各一服其滓熱敷腫上甚者取豉半升梔子仁十四枚葵菜二兩三味用水二升半煎至一升濾去滓溫分三服空心日午晚間服盡為度治一切毒腫或癢或痛檳榔散方檳榔銼凝水石煅過各一兩烏頭大者一枚去臍皮生用吳茱萸一錢半生用硫黃半兩研上五味為細末用生油調敷之治氣腫其狀如癰虛腫色不變皮上急痛蒺藜塗敷方蒺藜子炒去角赤小豆各一兩上二味搗羅為散用雞子白調如糊塗敷腫上干即易之治氣攻腫痛坐臥不得獨頭蒜塗方獨頭蒜上一味去殼入油少許同研如泥塗敷腫上日三次治一切腫馬齒莧塗方生馬齒莧上一味不以多少入水搗熟於銅器中用新汲水沉令冷敷腫上熱即易如無以慎火草代之治氣腫痛狀如瘤無頭但虛腫色不變皮急痛白薇散方白薇防風去叉射干術各一兩當歸切焙防己木香天門冬去心焙烏頭炮裂去皮臍枳殼去瓤麩炒獨活去蘆頭山茱萸葳蕤各一兩麻黃去根節湯煮掠去沫一兩一分柴胡去苗白芷莽草椒各半兩秦艽去苗土二兩上一十九味搗羅為散漿水服方寸匕日三加至二寸匕仍以五香湯瀉之次以蒺藜散敷之本方並在前風腫論曰風腫之證不痛不赤一身浮腫起如吹胞但覺體冷如石煩滿短氣骨節沉重此蓋陽氣不足腠理虛疏為風邪所乘久而不去復為寒濕所搏壅塞不通結盛生熱致令身體浮腫內經謂熱勝則腫是也久不愈則風熱積肌肉潰為肉泥之類便致危殆治與水腫不同宜以通營衛去風濕之劑調之治一切風毒頭面虛腫𤸷麻遍身風瘙生瘡風氣走注骨肉疼痛攻刺胸膊頭項熱疼冷痹白虎風腳手干小腎臟風拘急四肢轉動不得流灌腳膝上衝眼目昏暗澀淚赤腫女人血風鑽刺四肢瞤麻發落頭疼男子腎臟風下注變為腳氣瘡紫黑脹爛等疾龍沙丸方天麻芎藭附子炮裂去皮臍狗脊去毛躑躅花藿香葉紫葳凌霄花是也乾蠍去土炒地龍去土炒藁本去苗土白芷乳香研楓香脂研白殭蠶炒蒺藜子炒去角獨活去蘆頭各半兩白花蛇酒浸去皮骨炙麻黃去根節萆薢敗龜醋炙各一兩烏頭炮裂去皮臍二兩上二十一味搗羅一十九味為末與二味研者和勻煉蜜丸如彈子大別以丹砂一分龍腦麝香各二錢同研為衣每服一丸空心薄荷溫酒嚼下治諸風腫犀角飲方犀角鎊玄參連翹柴胡去苗各半兩沉香甘草炙銼檀香射干去須各一分芒硝生用麥門冬去心焙各一兩升麻木通銼各三分上一十二味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服食後良久及夜食後各一服利多即減治風毒腫滿黃耆丸方黃耆銼枳殼麩炒去瓤威靈仙米泔浸洗焙乾木石臼中搗各一兩上三味為細末以軟飲和丸如梧桐子大每服三十丸溫酒下不拘時治諸風毒氣身體疼痛面目暴腫腫連手足生犀湯生犀角鎊三分貝齒生用先搗後研一兩羚羊角鎊一兩半升麻一兩三分生用上四味粗搗篩每服三錢匕水一盞煎至六分食後去滓服日二夜一治風氣攻頭面浮腫煩渴心中躁悶肚腹脹滿小便秘澀茯苓散方赤茯苓去黑皮郁李仁去皮赤芍藥各一兩半大腹二枚並子百合柴胡去苗桑根白皮銼陳橘皮湯浸去白焙枳殼去瓤麩炒知母銼焙各一兩上一十味粗搗篩每服五錢匕水二盞煎至一盞去滓入芒硝末一錢匕更煎沸分溫二服空心夜臥各一治諸風腫欲成膿射干湯方射干去須玄參堅者各二兩連翹犀角鎊紫檀香沉香銼升麻各一兩上七味粗搗篩每服五錢匕水一盞半煎至八分去滓入芒硝末半錢匕更煎沸食後夜臥溫服若利即減治風毒攻衝頭面虛腫羚羊角飲方羚羊角鎊犀角鎊羌活去蘆頭檳榔銼人參各一分當歸切焙半分上六味粗搗篩分作四服每服用水二盞煎至一盞去滓空心臨臥溫服余滓重煎治風腫當歸湯方當歸切焙二兩半甘草炙銼一兩半上二味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服空心午時夜臥各一治風腫祛風散塗方天南星白礬草烏頭去皮臍上三味等分並生為細末每看腫處用酒調雞翎刷之如風毒腫甚者生薑自然汁調刷之立消治風腫木香散敷方木香楓香脂各半兩生菖蒲一兩上三味搗研細羅為散醋調敷之治風腫大麻仁敷方大麻仁生用赤小豆生用各二合上二味搗研極細冷水調敷之治風毒攻肌肉皮膚浮腫忽在腳忽在手蛇床湯洗方蛇床子一升生用上一味以水一斗煮至五升去滓通手淋洗治風毒腫蝙蝠糞塗方蝙蝠糞上一物研細以冷水調塗之治卒風腫蕓薹膏方蕓薹子一升上一味以米醋二升略煎三五沸漉出爛研漸入醋調絹絞取汁又取桂二寸搗末杏仁四十九粒生用湯退去皮尖雙仁亦爛研生薑三兩搗汁相和然後取天靈蓋兩片各如掌大洗去土燒灰搗羅如粉與諸藥和勻以火養成膏旋取貼於風腫上不過三兩次其腫自消治風毒腫紫檀塗方紫檀香二兩銼芒硝半兩上二味水磨每用濃者三合塗腫處干即易治風毒攻肌肉皮膚浮腫或在腳或在手桑枝湯洗方桑枝切槐枝切各一升上二味以水一斗煮取七升去滓淋洗治風毒攻肌肉皮膚浮腫或在腳或在手芎藭湯洗方芎藭二兩苦參三兩上二味細銼以水一斗煮取七升去滓淋洗治風腫蠶砂熨方晚蠶砂食鹽等分上二味相和炒熟布裹熨之冷即再炒或入少許醋尤佳治風腫杏仁膏方杏仁生用五合上一味燒令煙出罯滅細研取駝脂二兩熬濾去筋膜和勻成膏敷腫上點燭遙炙治風腫蒴藋煎方蒴藋根洗切八斤上一味爛研以水三斗浸絞取汁熬如稠膏取豬脂一斤熔去滓下火停冷與前膏和勻更煮三五十沸每服一匙至二匙空心臨臥熱酒調下又取塗摩患處治卒得風腫磨桂塗方桂不拘多少去粗皮上一味以醋於砂盆內磨塗風腫上火炙乾又塗之治風毒攻肌肉皮膚浮腫或在腳或在手附子湯洗浸方附子生去皮臍銼四兩上一味用水一斗煮至七升去滓熱洗余滓更煮洗治風毒攻肌肉皮膚浮腫馬藍湯洗方上一味以水一斗五升煮取八升淋腫處治風毒攻肌肉皮膚浮腫蒴藋湯蒴藋苗切五升上一味以水一斗煮取七升去滓淋洗治風毒攻肌肉皮膚浮腫白楊湯洗方白楊皮取東南面皮去地三尺以來去蒼皮勿令見風細切半斤上一味用水一升煎至七分去滓熱洗以腫消為度疔腫論曰疔腫者由風邪毒氣入於肌肉所生也凡有十種一者瘡頭烏而強凹二者瘡頭白而腫實三者瘡頭如豆垽色四者瘡似葩紅色五者瘡頭內有黑脈六者瘡頭亦紅而浮虛七者瘡頭葩而黃八者瘡頭如金箔九者瘡頭如茱萸十者瘡頭如石榴子亦有初如風疹搔破青黃汁出里有赤黑脈而小腫亦有全不令人知忽衣觸手摸著則痛若故取便不知處亦有肉突起如魚眼之狀赤黑磣痛徹骨久結皆變至爛瘡瘡下深孔如大針穿之狀初作時突起如丁蓋故謂之疔瘡令人惡寒四支強痛兼忉忉然牽疼一二日瘡便變焦黑腫大光起根硬不可近犯之則痠痛其發於手足頭面骨節間為氣血所會尤宜速治不然毒氣入腹煩悶恍惚如醉人則治法無所施矣治紫靨疔瘡不疼硬腫腋下有根如雞卵白石脂散方白石脂燒赤石脂各半兩雄黃一分乳香二錢上四味研為末未破者用朴硝水調貼已破有膿者干貼治疔腫方河東柳宗元元和十一年得疔瘡凡四十日他藥敷之皆莫能去長樂賈宣伯教用蜣螂心一夕而穴百苦皆已明年正月因食羊肉又大作再用之亦如神蜣螂心腹下度取之其肉稍白者是也以此貼瘡半日許可穴再易血盡根出愈矣治疔瘡日本國敷巴豆塗方巴豆十粒半夏一枚附子半枚蜣螂一枚上四味各為末以人糞相和看瘡大小作紙圈子圍瘡口以藥泥瘡上絹貼之一日三易治疔腫地骨皮散方地骨皮搗末半兩小麥麻子各十粒燒灰緋帛方五寸燒灰曲頭棘刺二七枚燒灰半夏七枚炒黃搗末亂髮一團如雞子燒灰上七味研和令勻每服二錢匕空心溫酒調下至晚再服治疔腫牛黃散方牛黃一粒如大豆緋帛方一尺亂髮二團如雞子大曲頭棘刺二十枚赤小豆二七枚地骨皮二兩末上六味將四味以緋帛裹於熨斗內燒灰細研為散入地骨皮末和勻每服二錢匕空心溫酒調下日晚再服治疔腫癰疽等丁香散方丁香七枚緋帛方一尺曲頭棘刺臘月大豆黃各一兩母豬屎三塊如雞子大鹽一分亂髮一團如雞子大蒼耳子半兩上八味將七味以緋帛裹於熨斗內火燒令煙盡細研為散每服二錢匕空心溫酒調下蓋復取汗若汗不出任意飲酒以汗為度治疔腫蛇蛻散方蛇蛻皮一兩半白者露蜂房半兩亂髮一團如雞子大童子者妙上三味銼碎於熨斗內燒灰細研為散每服二錢匕空心米飲調下蓋復出汗更服治疔腫塗敷諸藥後如犯觸者服蒼耳散方蒼耳子二七粒露蜂房一兩曲頭棘刺二七枚緋帛方五寸亂髮一團如雞子大青蒿二七莖丹砂一分研別入上七味將六味銼碎於熨斗內燒灰細研為散入丹砂末和勻每服二錢匕空心溫酒調下日晚再服治疔腫露蜂房散方露蜂房亂髮蛇蛻棘針各三兩上四味以緋帛裹於熨斗內燒灰細研為散空心溫酒調下一錢匕晚再服根自出治疔腫毒氣白牙塗敷方白馬牙燒研附子搗為末雄黃研半夏搗為末各半兩豬脂四兩熬去滓上五味將四味搗研為末以豬脂調如糊先以針刺瘡頭即塗敷日三五上瘡根爛再塗以瘥為度治疔腫大黃散敷方大黃銼炒秦艽去苗土藜蘆去蘆頭石硫黃研硇砂研各一兩上五味將前三味搗羅為散與後二味研者和勻水調塗敷日三五次以瘥為度又方曲頭棘刺二百枚銼陳橘皮湯浸去白切二兩上二味以水五升煎至一升半去滓分溫三服空心日午晚間各一以瘥為度治一切疔腫蒼耳膏方蒼耳根莖葉不拘多少上一味燒灰研細以醋泔澱調如糊塗敷干即再塗以瘥為度又方鐵漿不限多少上一味每日食後飲一盞即瘥治疔腫斑蝥敷方斑蝥一枚捻破蒜皮一片上二味取針撥破瘡頭納斑蝥於瘡口中以蒜皮蓋定日一度根出瘥治疔腫白殭蠶散敷方白殭蠶半兩炒為末上一味刮開瘡頭上敷之日三根爛即出治疔腫胡麻塗敷方胡麻燒灰針砂各半兩上二味和研令細用醋調如糊塗敷腫上日三易瘥又方雄黃研一分上一味細研為散每日三五度敷腫上如干用醋塗以瘥為度治疔腫內消棘針散方棘針倒勾多年者三十二枚大豆黃生用四十枚緋帛巾三條每條闊一寸亂髮如雞子大三團上四味分作三分各將緋帛一片裹棘針豆了用發一團纏裹令周匝牢固各於炭火上燒令煙盡先研兩團令細溫酒半盞調下候覺瘡四邊軟即瘥過半日未效更服一團必瘥瘥後犯之當有三五頭赤黑膿出不經犯者十八日瘥慎勿忽治療腫方乾薑炮胡椒炒龍骨碎斑蝥皂莢去皮炙各一兩上五味搗篩為末以酒和封貼日一度更服後藥治療腫毒氣二灰散塗方棘針倒勾爛者三枚丁香七枚上二味同於瓶內燒令煙斷研細以未滿月孩子糞和塗腫上日三兩度諸疥論曰字書以疥有介守之義言雖微小介然守形體而難治也是以疥有五名皆因風熱邪氣客於肌膚之間久則化而為蟲時作痛癢故作為瘡膿焮赤痛癢者謂之大疥皮肉隱起結根搔之不痛謂之馬疥搔癢皮起謂之乾疥三者為重以風熱深在肌肉故也若水疥㾦癗如瘭漿濕疥瘡小而汁出特風熱淫於皮膚之間故淺而輕也然皆風熱之客故皆有蟲或以謂蟯蟲內出理或然也治宜疏風滌熱當以熏浴敷塗之法與湯液並行則善矣治遍身瘡疥風毒瘙癢苦參散方苦參白花蛇酒浸去皮骨炙各一兩黃連去須當歸切焙各三分人參玄參丹參沙參芍藥蒺藜子炒去角防風去叉各半兩上一十一味為細散每日不拘早晚溫酒調二錢匕日二治遍身疥瘡不瘥快肌丸方威靈仙去土一兩半為細末豬膽三枚上二味取膽汁和末丸如梧桐子大每服二十丸荊芥湯下不拘時候治一切風瘡疥癬皮膚瘙癢搔成癮疹防風丸方防風去叉蟬殼豬牙皂莢酥炙去皮子各一兩半天麻二兩上四味搗為細末用精羊肉煮熟搗爛以酒熬為膏丸如綠豆大每服三十丸荊芥酒或茶湯下治風毒疥癬加減八風散方獨活去蘆頭防風去叉黃耆銼甘草炙令赤色銼各一兩一分玄參苦參芎藭秦艽去苗土各一兩白朮炒令紫色松脂各一兩一分蛇床子三分黃連去須芥子天門冬去心焙一兩半丹參人參防己芍藥白蘞細辛去苗葉桂去粗皮蒴藋各一兩蒺藜子炒杵去尖楓香脂各一兩一分麻黃去根節杏仁去皮尖雙仁炒木通銼甘菊花白芷各一兩山茱萸一兩一分生乾地黃焙二兩地骨皮菖蒲各一兩一分磁石三兩以火燒通赤入酒中淬十遍遠志去心一兩上三十五味搗羅為散每服二錢匕空心用生薑蜜湯調下晚再服漸加至三服治遍身瘡疥風毒或癢或痛苦參散方苦參三兩人參丹參沙參玄參各一兩秦艽去苗土一兩半白蘚皮升麻各一兩一分枳殼去瓤銼炒令黃色一兩梔子仁三分犀角屑一兩黃芩去黑心芍藥各一兩一分當歸切焙一兩半蒺藜子炒杵去尖一兩防風去叉一兩一分白花蛇炙令黃色去皮骨二兩黃連去須一兩半上一十八味搗羅為散每服二錢匕用溫酒一盞調下日晚再服治疥瘡癢痛不止大黃丸方大黃銼炒二兩半防風去叉黃耆銼黃連去須各一兩半漏蘆去蘆頭一兩秦艽去苗土苦參烏蛇酒浸炙黃去皮骨各二兩上八味搗羅為末煉蜜為丸如梧桐子大空心溫酒下二十丸晚再服治諸瘡苦參丸方苦參四兩玄參梔子仁獨活去蘆頭各二兩黃連去須一兩半大黃銼碎炒香熟甘菊花防風去叉枳殼去瓤麩炒黃芩去黑心各一兩上一十味搗羅為末煉蜜為丸如梧桐子大每日空心以溫酒下二十丸日晚再服以瘥為度治疥癬久不瘥烏蛇散方烏蛇酒浸炙黃色去皮骨二兩漏蘆去蘆頭一兩半大黃銼碎炒令香熟羌活去蘆頭丹參沙參玄參五加皮銼甘草炙赤色銼白殭蠶炒乾蠍炒去土各一兩麻黃去根節二兩附子炮裂去皮臍半兩上一十三味搗羅為散每服食後薄荷湯調下二錢匕至晚再服以瘥為度治諸疥風虛惡瘡五參散方人參玄參丹參沙參苦參各一兩蒺藜子炒杵去尖秦艽去苗土各半兩梔子仁枳殼去瓤銼炒令黃色各三分黃芩去黑心半兩烏蛇酒浸炙去皮骨一兩獨活去蘆頭茯神去木山芋麻黃去根節細辛去苗葉防風去叉各半兩上一十七味搗羅為散每服三錢匕空心熟水調下日晚再服以瘥為度治乾溼疥赤小豆散方赤小豆三合炒乾納醋中如此七遍人參甘草炙令赤色銼瞿麥穗白蘞當歸切焙黃芩去黑心豬苓去黑皮防風去叉各半兩黃耆銼薏苡仁升麻各三分上一十二味搗羅為細散每服三錢匕空心以粥飲調下日二夜一治乾疥瘙癢久不瘥黃耆丸方黃耆二兩銼烏蛇四兩酒浸去皮骨炙令黃川烏頭三兩炮裂去皮臍附子二兩炮裂去皮臍茵芋二兩石南一兩秦艽二兩去苗上七味搗羅為末煉蜜和搗三二百杵丸如梧桐子大每服三十丸食後以荊芥湯下以瘥為度治遍身生疥干癢搔之皮起秦艽丸方秦艽二兩去苗黃耆二兩銼烏蛇四兩酒浸去皮骨炙令微黃漏蘆一兩半防風一兩半去蘆頭黃連一兩半去須苦參二兩銼川大黃二兩銼碎微炒麻黃二兩去根節上九味搗羅為末煉蜜和搗三二百杵丸如梧桐子大每服三十丸食後溫酒下日進二服治風毒瘡疥一切風壅等檳榔煎丸方檳榔銼羌活去蘆頭獨活去蘆頭枳殼去瓤麩炒白牽牛略炒黑牽牛略炒各半兩上六味同杵羅為末用大皂莢一尺以上者一梃挼汁煎膏和丸如梧桐子大臨臥溫酒或熟水下三十丸量人虛實加減久患瘡疥服之立愈治一切風熱疥瘡攻注牽牛子丸方牽牛子一兩一半瓦上炒一半生用蘹香子一兩微炒陳橘皮二兩水浸於瓦上去白焙乾上三味為細末用生薑汁煮麵糊為丸如綠豆大每服空心臨臥用炒鹽湯下十丸治瘡疥歲久不愈烏龍丸方牽牛子不拘多少瓦上鋪下慢火逼不得攪待其香即時取下半生半熟放冷作細末上以皂莢二大梃水一大碗揉取汁濾過銀石器內熬成膏入牽牛末同和丸如梧桐子大食後臨臥溫酒下二十丸或覺微利便不須服所患瘡疥立止不過三五服治乾溼疥滿身作瘡不可療者何首烏洗湯方何首烏艾等分細銼上二味相度瘡多少用藥並水煎令濃於盆內盛洗之治疥及風瘙苦癢丹參洗湯方丹參苦參蛇床子半兩上三味銼以水一斗煎取六升濾去滓溫洗瘡上用故帛拭過以藥塗摩日三五度即瘥治諸疥瘡神捷散方吳茱萸一兩赤小豆四十九粒白蒺藜一兩白蕪荑仁半兩輕粉五錢匕石硫黃少許研上六味搗研為散令勻每用生油調藥半錢匕於手心內摩熱後遍揩周身有疥處便睡睡覺其疥自愈治諸疥砒黃熏方砒黃研雄黃研石硫黃研各半兩熟艾五兩上四味同研和令勻將藥鋪在紙上令勻緊卷如餅餤樣用麵糊黏卻切為四段患人早食及大小便了當仰臥安藥於四口瓦內兩腋下兩骽下以火燒煙出先用舊布單蓋上以厚衣復不令通風候汗出至晚藥煙盡即去藥瓦以瘥為度治諸疥烏頭散方烏頭吳茱萸石硫黃莨菪子各一兩上四味搗羅為散用生油調如糊塗患處日三五度即瘥治惡疥瘡雞子塗方雞子七枚煮熟取黃鐺中熬成膏膩粉亂髮灰白礬灰各一分石硫黃半兩研上五味除雞子外研為末入雞子膏和研令勻塗敷患處日三五度即瘥治瘡疥藜蘆膏方藜蘆去蘆頭一兩半石硫黃研豬牙皂莢乳香各半兩研附子一分杏仁去皮研半兩膩粉一分巴豆去殼研半分豬膽二枚酥二兩白礬灰研一分豬脂五兩上一十二味搗研九味為末先熬脂酥膽汁令沸即下諸藥末攪令勻以瓷合盛每日塗摩三五度治諸疥硫黃塗敷方石硫黃一錢研蜀椒去目及合口者吳茱萸黃柏各一兩上四味搗研為散用生油調如糊塗敷疥上日二三治乾疥久不瘥皮膚瘙癢方水銀一分並胡粉點少水研令星盡胡粉一兩蛇床子半兩搗為末黃連三分去須搗為末上四味細研令勻以生麻油和如稀膏每用藥時先以鹽漿水洗後以藥塗之干即更換不過三五度瘥治皮膚風熱生疥干癢宜塗皂莢膏方豬牙皂莢膩粉硫黃細研臭黃細研白礬灰黃蠟巴豆去皮烏頭生用吳茱萸以上各一分上九味搗羅為末再研令勻先入麻油三二合以慢火銷蠟盡攪和令勻日二塗之又方白礬一兩燒灰硫黃一兩細研黃連一兩半去須末雌黃一兩細研蛇床子三分末上五味細研令勻煉豬脂油和如餳每用先以鹽漿水洗令淨拭乾塗之治疥瘡生干痂癢不止方皂莢一兩臭黃一兩上二味搗羅為細末以醋二升熬成膏塗之日二三易又方豬脂一斤巴豆半兩去皮研爛蠟半兩疏黃一分末上四味先煎豬脂令沸入巴豆煎候變色次下蠟令熔又下硫黃末攪令勻盛於瓷合內日三五度塗之又方硫黃一兩硝石半兩上二味細研如粉以生麻油調塗之治一切疥風癢瘑瘡等烏蛇散方烏蛇酒塗炙去皮骨二兩羌活去蘆頭白蘚皮苦參枳實去瓤麩炙蒺藜子炒去角人參黃芩去黑心山茱萸漏蘆牡蠣熬附子炮裂去皮臍白殭蠶炒玄參甘草炙銼秦艽去苗土防風去叉甘菊花擇各一兩上一十八味搗羅為細散每服五錢匕空心酒調下治一切癬疥癩瘡祛風丸方槐牙焙乾皂莢牙焙乾各一斤苦參三兩防風去叉羌活去蘆頭各一兩三分烏蛇一條酒炙去皮骨使君子一兩半上七味搗羅為末煉蜜和丸梧桐子大每服三十丸空心酒下夜蜜湯下治脾肺風毒攻衝生疥癬方升麻桃白皮苦參各半兩上三味細銼用水二斗煎取一斗去滓候溫洗之治癬疥方白礬灰石硫黃上二味等分搗為末和生油調塗之治一切惡疥瘡方黃柏末石灰研上二味等分研令極細以生麻油和如薄麵糊淨洗瘡塗四五遍瘥治瘡疥甚者烏豆煎方烏頭一兩每枚四破之大豆一兩半上二味同入沙瓶煮極爛每服烏頭一片豆少許空腹酒下
