body:
  text: 卷第七十一積聚門積聚統論論曰積者五臟所生氣之所積名曰積其始發有根本其痛不離其部由陰氣所生也聚者六腑所成氣之所聚名曰聚其始發無根本其痛無常處由陽氣所生也然又有癥瘕癖結者積聚之異名也證狀不一原其病本大略相類但從其所得或診其證狀以立名爾且症者為隱見腹內按之形證可驗也瘕者為瘕聚推之流移不定也癖者僻側在於脅肋結者沉伏結強於內然有得之於食有得之於水有得之於憂思有得之於風寒凡使血氣沉滯留結而為病者治須漸磨潰削使血氣流通則病可愈矣積聚論曰經曰病有積有聚何以別之積者陰氣也聚者陽氣也陰沉而伏陽浮而動氣之所積名曰積氣之所聚名曰聚故積者五臟所生聚者六腑所生積之為病其始發有常處其痛不離其部上下有所終始左右有所窮處聚之為病其始發無根本上下無所留止其病無常處此積聚之別也治腹內積聚心肋急滿時吐清水不能食時惡寒鱉甲丸方鱉甲去裙襴醋炙一兩半防葵銼人參前胡去蘆頭桔梗炒枳殼去瓤麩炒當歸切焙附子炮裂去皮臍乾薑炮白朮各一兩檳榔銼大黃銼炒各二兩厚朴去粗皮生薑汁炙食茱萸各三兩甘草炙銼一兩一分上一十五味搗羅為末煉蜜丸如梧桐子大每服二十九溫酒下早晚各一服漸加至三十丸治積聚結實腹滿刺痛泄利不止檳榔湯方檳榔細辛去苗葉各一兩半夏陳者湯洗七遍焙乾五兩紫蘇甘草炙銼大黃銼炒陳橘皮湯浸去白焙各二兩生薑切焙紫菀去苗土柴胡去苗各三兩附子一枚炮裂去皮臍赤茯苓去黑皮四兩上一十二味銼如麻豆每服三錢匕水一盞煎至七分去滓溫服若有癥瘕癖結加鱉甲去裙襴醋炙並防葵各二兩上氣加桑根白皮銼三兩枳殼去瓤麩炒厚朴去粗皮生薑汁炙各二兩治五臟積聚癖氣或有墜損腹滿大黃丸方大黃銼炒檳榔煅銼桃仁去皮尖雙仁炒研如膏各三兩鱉甲去裙襴醋炙京三稜煨銼乾薑炮烏頭炮裂去皮臍各二兩桂去粗皮吳茱萸陳者湯洗炒乾各一兩上九味搗羅八味為末與桃仁膏研勻煉蜜丸如梧桐子大每服三十丸空腹日午夜臥煎橘皮湯下治五臟寒熱積聚腹脹腸鳴而噫食不作肌膚甚者嘔逆若傷寒瘧狀已愈令不復發三合丸方大黃銼炒硝石研杏仁去皮尖雙仁炒研如膏葶藶子隔紙炒前胡去蘆頭各二兩半夏湯洗七遍焙附子炮裂去皮臍各一兩赤茯苓去黑皮半兩細辛去苗葉一兩半上九味除研外搗羅為末與硝石杏仁研勻煉蜜丸如梧桐子大每服五丸食後米飲下常服令人大便調和長肌肉治積聚留飲宿食寒熱煩結長肌膚補不足通神丸方蜀椒去目並閉口炒出汗附子炮裂去皮臍厚朴去粗皮生薑汁炙半夏湯洗七遍焙各一兩杏仁湯浸去皮尖雙仁炒研如膏葶藶子紙上炒各三兩芒硝研五兩大黃銼炒九兩上八味除研外搗羅為末與杏仁芒硝研勻煉蜜丸如梧桐子大每服二十丸米飲下治積聚暖血海女子諸疾補益桑黃丸方桑黃半斤牛膝酒浸切焙一斤桃仁去皮尖雙仁炒研如膏麥糵炒白朮陳曲炒當歸切焙大黃銼炒各半斤生地黃十斤絞自然汁生薑十斤絞自然汁上一十味搗羅七味為末與桃仁膏同入二汁內拌勻瓷器盛甑內蒸一日取出焙乾搗羅為末煉蜜丸如梧桐子大每服二十丸空腹溫酒下漸加至三十丸治心腹積聚脹滿繞臍疼痛按之有形寒中有水上氣女人産後余病大人風癲小兒驚癇百病烏頭丸方烏頭炮裂去皮臍菖蒲米泔浸一宿切焙柴胡去苗人參桔梗炒黃連去須厚朴去粗皮生薑汁炙赤茯苓去黑皮各三兩蜀椒去目並閉口炒出汗乾薑炮桂去粗皮吳茱萸陳者湯洗焙皂莢去皮子酥炙各一兩上一十三味搗羅為末煉蜜丸如梧桐子大每服十丸空心日午晡時米飲下漸加至十五丸治積聚癖氣不能飲食心肋下滿四肢骨節痠疼盜汗不絶白朮丸方白朮黃耆銼人參赤茯苓去黑皮烏頭炮裂去皮臍乾薑炮當歸切焙甘草炙銼檳榔銼各一兩半牡蠣熬芍藥麥門冬去心焙細辛去苗葉前胡去蘆頭鱉甲去裙襴醋炙各一兩防葵銼紫菀去苗土桔梗炒桂去粗皮各三分上一十九味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心日晚溫酒下漸加至三十丸治積聚不消纍有傷滯食已腹痛飲食不化嘔噦噁心胸脅脹悶大便祕利不定磨滯丸方木香青橘皮湯浸去白焙桂去粗皮各一兩吳茱萸湯洗焙乾炒三兩硇砂醋熬成霜研末一錢匕巴豆霜半錢匕上六味搗羅四味為細末入硇砂巴豆霜拌勻醋煮麵糊丸如緑豆大每服三丸至五丸早晚食後臨寢服大便溏利即減丸數治積聚不消心腹脹滿化氣消積硇砂丸方硇砂一分別研沒藥別研桂去粗皮當歸切焙烏頭去皮臍大黃銼炒各半兩乾漆炒煙出青橘皮去白焙芫花別搗末巴豆去皮心膜出油盡芎藭京三稜煨銼蓬莪朮煨銼鱉甲去裙襴醋炙各一分上一十四味搗羅十味為末用釅醋半升於銅石器內下芫花硇砂巴豆三味慢火熬漸添醋一升即入十味並沒藥末同熬成膏放冷別入陳曲末一兩半拌和丸如緑豆大每服三丸至五丸茶酒生薑湯任下治五積氣心腹脹悶噫氣吞酸不思飲食五積丸方酸石榴二枚巴豆和皮椎碎甘遂大戟芫花各半兩京三稜大黃杏仁去皮尖雙仁五靈脂豉甜葶藶各一兩烏梅和核一兩半上一十二味細銼用水一升煮令水盡炒過勿太焦搗為細末醋煮麵糊丸如緑豆大每服五丸食後溫水下治一切積滯痰逆噁心霍亂吐瀉膈氣痞滿脅肋積塊胸膈膨悶嘔噦心疼泄利不止積氣丸方代赭石煅醋淬研礞石研各一兩桂去粗皮硇砂研赤茯苓去黑皮青橘皮去白焙各半兩胡椒四十九粒巴豆去皮心膜研四錢上八味搗羅四味為末與四味研者和勻酒煮麵糊丸如梧桐子大每服一丸至三丸食後木香湯下治積聚留結心腹脹滿胸膈痞悶丁香丸方丁香木香沉香銼安息香乳香淨帛裹用沸湯急漉過研硇砂丹砂肉豆蔻去殼桂去粗皮京三稜煨銼當歸切焙陳橘皮去白焙檳榔銼蓽澄茄各一分附子炮裂去皮臍一分半巴豆十粒去皮心膜炒研如膏上一十六味先將安息香硇砂乳香三味細研用少許酒浸良久別研巴豆丹砂並十一味搗羅為末合研令勻用前三味酒煮麵糊丸如麻子大常服五丸至七丸熟水下若氣痛甚即加至十丸生薑湯下亦得取積聚透膜丸方硝石礞石各一分二味同研勻細熔作汁用皂子三枚旋旋入煙絶為度放冷研每料用末三錢硇砂乳香粉霜硫黃膩粉白丁香蜜陀僧京三稜末各一錢巴豆二十一粒去皮心膜醋煮紫色研上一十一味為末研令勻用棗肉丸如緑豆大每服七丸至十丸煎生薑橘皮湯下小兒皂子湯下治積聚留滯胸膈痞悶嘔噦吐逆心腹刺痛脅肋脹滿噫氣吞酸宿食不消痃癖結塊四肢倦怠不思飲食妙香丸方檳榔一分銼桂去粗皮丹砂研桃仁去皮尖雙仁炒研各半兩麝香半兩研巴豆二十五粒去皮心膜研出油附子炮裂去皮臍一兩上七味搗研為末湯浸炊餅和丸如梧桐子大每服一丸食後溫米湯下生薑湯亦得更量虛實加減治積聚滯氣胸膈痞悶心腹刺痛萬靈丸方雄黃研大黃銼炒陳橘皮去白焙白牽牛末各一兩京三稜煨銼肉蓯蓉酒浸切焙青橘皮湯浸去白焙杏仁去皮尖雙仁炒乾漆炒煙出巴豆去皮心膜出油各半兩訶黎勒炮去核三分木香藿香葉白朮天南星炮各一分胡椒半分上一十六味搗研為末用薄荷汁煮麵糊丸如緑豆大傷飲食生薑湯下三丸至五丸傷酒嚼燒生薑下十丸婦人血氣心痛酒煎當歸調沒藥末一錢匕下十丸治五積氣胸膈痞悶腹脅脹滿宿飲不消積氣成塊心腹㽲痛不能飲食大五積丸方硇砂芫花乾漆炒出煙各一兩巴豆半兩去皮心膜研出油豬牙皂莢去皮子炙烏頭炮裂去皮臍各三分以上六味搗羅四味為末入硇砂巴豆拌勻用米醋三升於銀石器內慢火熬成膏大黃蒸熟焙銼鱉甲去裙襴醋炙青橘皮湯浸去白焙京三稜煨銼陳曲炒當歸切焙各一分桂去粗皮木香各三分上一十四味搗羅八味為末入前膏和丸如緑豆大每服二丸至三丸茶酒任下如要取積量虛實加減服治五積氣結面色萎黃心腹疼痛口吐酸水發歇有時積年不已沉香丸方沉香銼丁香木香各半兩硇砂一分研巴豆霜半錢蓬莪朮煨銼桂去粗皮乾漆炒煙出乾薑炮青橘皮去白焙京三稜煨銼白豆蔻去皮各一兩大黃一兩生為末用醋一升慢火熬成膏上一十三味搗研十二味為末入大黃膏和丸如梧桐子大每服五丸食後臨臥生薑湯下治五積氣嘔吐酸水心腹脹悶不思飲食十味五積丸方沉香銼青橘皮去白焙京三稜煨銼甘松各半兩薑黃木香甘遂炒芫花醋炒焦大戟炒各一分牽牛子炒一兩上一十味搗羅為末湯浸炊餅和丸如梧桐子大每服七丸至十丸食後臨臥橘皮湯下治積滯寬利膈脘思飲食消積丸方牽牛子一兩取末半兩青橘皮去白焙一兩丁香木香硇砂研沉香銼各一兩檳榔二枚銼桂去粗皮乾薑炮各半兩巴豆十粒去皮心膜出油研上一十味搗研為末煉蜜和丸如豌豆大每服一丸至二丸食後臨臥橘皮湯下治五積六聚血瘕氣塊聚散不定及一切氣疾京三稜煎丸方京三稜煨銼蓬莪朮煨銼芫花醋炒焦半夏湯洗七遍焙青橘皮去白焙各一兩硇砂去石研附子炮裂去皮臍桂去粗皮延胡索醋炒大戟膩粉調酒炙乾漆炒煙出豬牙皂莢去皮子炙五靈脂醋炒各半兩上一十三味搗研為末用好醋三升入藥二停熬成膏再入一停和丸如緑豆大每服五丸食後生薑湯下治冷積滯氣心胸痞悶冷氣上攻臟腑疼痛木香丸方木香桂去粗皮京三稜煨銼蓬莪朮煨銼胡椒炒青橘皮去白焙各一兩檳榔銼訶黎勒炮去核大黃銼炒各半兩白牽牛炒一兩取末半兩上一十味搗羅為末醋煮麵糊丸如緑豆大每服七丸至十丸食後生薑湯下治一切積滯痰逆噁心吐瀉霍亂膈氣痞滿脅肋積塊胸膈膨悶嘔噦心疼泄瀉下痢積氣丸方大戟龍膽木香各半兩杏仁去皮尖雙仁炒研代赭煅醋淬赤石脂水飛研各一兩巴豆去皮心膜研出油一錢一字上七味搗研為末合研極細以麵糊丸如梧桐子大陰乾經十日方可服每服三丸至五丸木香湯下溫湯熟水亦得治食積隱見時作攻心脅㽲刺疼痛乙丑丸方硇砂細研湯內飛過去沙石熬取霜烏頭生去皮臍為末各一兩沉香末五靈脂末桂去粗皮為末胡椒末乾薑末巴豆去皮心膜研各半兩乾漆末三分上九味除巴豆外同研勻次入巴豆再研極細取熟棗肉和作一塊用濕紙裹三五重用紙筋黃土泥固濟約厚半指許熁干用熟炭火十斤於乙丑日早漸進火燒令香為度以新盆器合候冷取出去泥及焦紙灰不用搗爛看硬軟再入熟棗肉和搗千餘杵得所丸如梧桐子大每服三丸溫木瓜酒下木瓜湯下亦得不計時候服如大段癖積塊及諸冷氣㽲刺疼痛或泄痢膿血食前服五丸至七丸看虛實加減治腑臟積聚症癖氣塊腹多㽲痛按或有形肢節煩熱腰腳痠疼及婦人血癖經候不調赤白帶下等疾溫白丸方柴胡去苗紫菀去苗土吳茱萸湯浸焙乾炒菖蒲桔梗銼炒京三稜煨銼赤茯苓去黑皮人參黃連去須炒乾薑炮桂去粗皮蜀椒去目併合口者炒出汗巴豆去皮心膜研出油盡皂莢去皮炙黃鱉甲去裙襴醋炙各一兩厚朴去粗皮生薑汁炙當歸切焙烏頭炮裂去皮臍黃耆銼各二兩上一十九味搗研為末煉蜜和搗一千下丸如梧桐子大每服一二丸加至三四丸溫酒下利下惡物為度治五種積聚成塊木香丸方木香訶黎勒炮用皮人參檳榔銼大黃銼炒郁李仁生研仁各三兩赤茯苓去黑皮枳殼去瓤麩