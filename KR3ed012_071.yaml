同炒以黑豆熟為度用童子小便一升浸少頃煎至六合去滓分三服空心日午夜臥各一治久積賁豚氣時攻膀胱切痛四味丸方蜀椒去目及閉口炒出汗蘹香子炒附子炮裂去皮臍肉蓯蓉酒浸切焙各一兩上四味搗羅為末煉蜜丸如梧桐子大每服十五丸空心溫酒下治腎積頻發小腹急脹疼痛唇口青黑木香硫黃丸方木香硫黃研青橘皮湯浸去白焙乾薑炮桂去粗皮沉香銼肉豆蔻去殼蘹香子炒附子炮裂去皮臍銅青研檳榔銼各一兩上一十一味將九味搗羅為末與別研二味和勻搗研糯米飯為丸如梧桐子大每服十丸加至二十丸蘹香酒下治腎虛積氣桃仁丸方桃仁湯浸去皮尖雙仁炒二兩研以酒二升煎成膏木香桂去粗皮青橘皮湯浸去白焙蘹香子炒各半兩乾薑炮一分檳榔銼三分上七味搗羅六味為末入桃仁煎丸如梧桐子大每服十五丸至二十丸空心溫酒下治腎臟久積氣在膀胱虛脹上攻膨滿㽲痛蘹香子丸方蘹香子三兩微炒為末以米醋二升熬如餳附子炮裂去皮臍一兩青橘皮湯浸去白焙木香狼毒炒當歸切焙各三分阿魏一兩研以酒一升煎取半硇砂一兩半研沸湯化澄熬取霜入阿魏煎中同熬如餳入蘹香煎攪勻自然銅煅醋淬研各一兩半上九味除煎研外搗羅為末同入煎內和搗丸如梧桐子大如硬入煉蜜少許每服十五丸至二十丸空心溫酒下治腎積化氣沉香湯方沉香黃耆人參各三分蘹香子炒甘草炙木香桂去粗皮烏藥附子炮裂去皮臍石斛去根牛膝酒浸切焙五味子炒巴戟天去心陳橘皮湯浸去白焙高良薑各半兩上一十五味銼如麻豆每服三錢匕水一盞生薑一分拍碎煎至七分去滓溫服空心日午食前各一治賁豚氣成塊上衝腹脅滿痛蘹香檳榔散方蘹香子炒檳榔銼京三稜煨銼青橘皮湯浸去白切鹽炒各半兩木香一分上五味搗羅為散每服二錢匕熱湯調服不拘時治賁豚氣上衝心腹三神煎方桃仁去皮尖雙仁四兩湯浸研細取汁三升京三稜煨銼二兩鱉甲去裙襴醋炙三兩上三味搗二味為末先煎桃仁汁至二升次下藥末不住手攪良久更入好醋一升同煎如餳以瓷合收每服半匙空心溫酒調下治賁豚氣衝心吸吸短氣發作有時李根皮湯方李根白皮銼焙八兩半夏湯洗七遍焙七兩乾薑炮桂去粗皮各四兩赤茯苓去黑皮三兩人參甘草炙各二兩附子炮裂去皮臍一兩上八味㕮咀如麻豆大每服五錢匕水一盞半煎至八分去滓溫服治賁豚氣上衝胸心逆滿吳茱萸湯方吳茱萸湯浸焙炒一兩半夏湯洗七遍四兩桂去粗皮三兩人參甘草炙各二兩上五味粗搗篩每服五錢匕水一盞半入生薑一棗大拍碎煎至八分去滓溫服不拘時治一切風及腎臟賁豚氣上衝心胸悶亂木香散方木香一兩青橘皮湯浸去白焙白芷炒沉香銼蘹香子炒桂去粗皮蓬莪朮炮銼杉木節各半兩枳殼去瓤麩炒木瓜焙各三分上一十味搗羅為散每服二錢匕炒生薑鹽湯調下治賁豚冷氣上衝昏亂四肢軟弱不收磁石散方磁石燒醋淬研肉豆蔻去殼木香檳榔銼各一兩上四味搗研為散每服三錢匕以生蔥一莖細切熱酒調下治賁豚氣從少腹奔衝上心昏亂嘔吐痛甚木香郁李仁丸方木香一兩郁李仁去皮生用三兩沉香銼檳榔銼桂去粗皮青橘皮去白焙附子炮裂去皮臍蘹香子炒各一兩上八味搗羅為末煉蜜和丸如梧桐子大蘹香子或薄荷酒下二十丸一日三服臍下有塊服一月永除治腎積氣賁豚從少腹上衝心昏亂嘔吐疼痛檳榔丸方檳榔一兩一半煨一半生木香微炒半兩吳茱萸湯洗焙安息香研各一分桂去粗皮青橘皮去白麩炒各半兩上六味搗羅為末以豬膽二十枚水煮如餳和前六味末搗二千下丸如小豆大每服空心嚼破七丸暖酒下治賁豚氣上下攻走疼痛天雄丸方天雄生去皮臍一兩桃仁去皮尖雙仁炒黃桂去粗皮蘹香子炒蜀椒去目併合口炒出汗乾蠍炒各半兩上六味搗羅為末用狗裡外腎並膽細切就銀石器中以無灰酒一升煎成膏入藥末杵丸如梧桐子大每服二十丸空心生薑鹽湯下治賁豚氣臍腹左右堅硬橫連如臂若弓弦急痛木香丸方木香鱉甲去裙襴醋炙訶黎勒皮桂去粗皮各二兩吳茱萸湯浸焙炒一兩半牽牛子炒二兩上六味搗羅為末煉蜜丸如梧桐子大每服三十丸溫酒下加至四十丸治賁豚氣自少腹上至心下若豚狀腰腹疼痛或衝心滿悶七氣湯方桂去粗皮赤茯苓去黑皮高良薑炒訶黎勒皮各一兩半大腹連皮銼一兩吳茱萸湯洗焙炒三分牽牛子炒半兩上七味粗搗篩每服三錢匕水一盞煎至七分去滓溫服微利兩三行為度治賁豚氣上衝胸膈壓氣木香丸方木香丁香白豆蔻去皮肉豆蔻去殼吳茱萸醋浸一宿炒令黃色各半兩沉香三分青橘皮湯浸去白焙一分麝香別研二錢上八味除麝香外搗羅為末入麝香研勻用硇砂煎豬膽汁和丸如梧桐子大每服溫酒下二十丸治賁豚氣上衝脅肋㽲痛七寶丸方丁香沉香銼硇砂湯浸綿濾澄入陳曲同煎成膏丸諸藥各半兩蒺藜子炒去角木香各三分附子炮裂去皮臍一兩麝香一分研上七味除煎外搗研為末同前煎搜和丸如梧桐子大每服十丸炒生薑酒或炒生薑黑豆小便下治腎臟積冷賁豚氣攻少腹疼痛上衝胸脅沉香石斛湯方沉香銼石斛去根陳曲炒各一兩人參赤茯苓去黑皮五味子微炒巴戟天去心炒桂去粗皮白朮芎藭各三分木香肉豆蔻仁各半兩上一十二味粗搗篩每服三錢匕水一盞姜三片棗三枚劈煎至六分去滓食前熱服治腎臟氣發動築人心腹面黑胸悶欲絶及諸氣賁豚喘甚婦人傷冷血氣發攻心等疾應急撞氣丸方鉛二兩石亭脂為末二兩丁香為末一兩木香為末一兩麝香研一分上五味先將鉛於銚子內慢火炒令乾入石亭脂末急手炒轉莫令焰起以水微噴之慢火再炒令乾傾於淨地坑子內以盞子復之候冷取出細研如面次入諸藥相和研之以粟米飯丸如雞頭大每用時研破二丸熱酒浸之頓服或汗或下氣或通轉即愈如祕不通每一丸入玄明粉半兩如氣滿胸膈服藥皆吐即以炒豆炒鹽等尉令氣下便服此藥無不驗治積氣不散結伏賁豚發即上衝心胸令人喘逆骨痿少氣木香檳榔散方木香檳榔煨銼沉香銼磁石煅醋淬訶黎勒去核蘹香子炒芎藭白芷炒牡蠣煅各半兩桂去粗皮陳橘皮湯浸去白焙各三分上一十一味搗羅為散每服二錢匕炒生薑鹽湯調下
