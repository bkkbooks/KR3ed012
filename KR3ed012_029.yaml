body:
  text: 卷第二十九傷寒壞病論曰傷寒大陽病三日已發汗吐下若溫針仍不解者多變為壞病轉入少陽已吐下發汗少陽證罷此為壞病知犯何逆以法治之此皆由傷寒病在諸經絡發汗吐下而病證不除又感客氣氣有寒暑燥濕風不同病亦隨變故謂之壞病又有傷寒過經再受熱邪留蓄臟腑病後多變者及傷寒解後虛羸少氣餘證未除者皆謂之壞病也治傷寒壞病瘥後或十數日或半月二十日終不惺惺精神昏語言錯又無寒熱醫或作鬼祟或作風疾多端治療弗效或朝夕潮熱頰赤或似瘧皆由發汗不盡餘毒在心包絡間所致知母麻黃湯方知母焙一兩半麻黃去根節煎掠去沫甘草炙銼芍藥黃芩去黑心各半兩桂去粗皮半兩盛暑中可減半上六味銼如麻豆大每服五錢匕水一盞半煎至八分去滓溫服半日內可相次三服溫覆取汗未汗再服若心煩不眠欲飲水者當稍稍與之令胃中和即愈治傷寒壞病經數日未瘥諸藥不能除升麻湯方升麻鱉甲醋炙去裙襴枳殼去瓤麩炒犀角鎊葛根黃芩去黑心各三分甘草炙銼前胡去蘆頭烏頭炮裂去皮臍各半兩上九味銼如麻豆每服五錢匕水一盞半煎至八分去滓下地黃汁二合攪勻食後溫服治傷寒壞病醫所不能治熱在胸中不能言語麥奴丸方麥奴釜底墨灶突墨梁上塵大黃銼炒黃芩去黑心朴硝研各半兩麻黃去根節一兩上八味搗研為末煉蜜和搗三五百杵丸如彈丸大每服一丸新汲水研下如渴當極飲水不欲水亦強飲之須臾必寒寒已汗出瘥治傷寒壞病冷熱相搏心下結胸滿氣急大便不利體變黃青黑如桃枝色四肢逆冷熱結在內者不可服湯飲宜麝香丸方麝香研豬苓去黑皮朴硝研蕘花炒芫花醋炒各一分大黃銼炒商陸甘遂炮各半兩上八味粗搗研為末煉蜜和搗三五百杵丸如緑豆大每服十丸食前溫湯下良久必利未利再服治傷寒壞病頭與骨肉俱痛狂言妄語醫所不療者黑奴丸方麻黃去根節一兩半黃芩去黑心甘草炙銼灶突墨芒硝各一兩豉一合炒上六味搗羅為末煉蜜和搗三五百杵丸如彈子大每服一丸新汲水研下不拘時候治傷寒壞病大效丸方烏頭附子各一兩二味去皮臍為末用醋一升煎盡為度又入好酒一升再煎成膏後入諸藥烏蛇酒浸去皮骨炙細辛去苗葉厚朴去粗皮薑汁炙人參赤茯苓去黑皮桂去粗皮乾蠍炒木香乳香研草豆蔻去皮硇砂研胡桐淚檳榔銼膩粉不灰木各一分上一十七味將一十五味搗研為末入二味膏子內和搗丸如梧桐子大每服十丸如陽盛研牛黃膩粉水下如陰盛發厥心胸結痞煎柳枝湯下治傷寒壞病經久不瘥潮熱不退身體沉重昏憒煩悶麥門冬湯方麥門冬去心焙赤茯苓去黑皮各一兩鱉甲去裙襴醋炙二兩甘草炙銼半兩上四味粗搗篩每服三錢匕水一盞烏梅一個小麥五十粒同煎至七分去滓溫服不拘時候治傷寒壞病潮熱頰赤口乾煩躁神思昏塞經久不瘥前胡湯方前胡去蘆頭二兩柴胡去苗常山人參葛根銼各一兩甘草炙銼三分上六味粗搗篩每服三錢匕水一大盞烏梅一個椎碎生薑三片煎至七分去滓溫服不拘時候傷寒狐惑論曰狐惑之病或初得狀似傷寒或因傷寒而變皆蟲證也蟲食其喉為惑使人生嗄蟲食其下部為狐使人咽乾其候皆默默欲眠不得臥起居不安惡飲食面目乍白乍黑是也此由傷寒病腹內熱飲食少腸胃空虛而蟲為之不安故隨所食上下部而病名狐惑也治傷寒變成狐惑其脈數無熱微煩默默但欲臥汗出初得之三四日眼赤得之七八日目四眥黑能食者膿已成也宜赤小豆當歸散方赤小豆一升水浸令芽生焙乾當歸切焙一兩上二味搗羅為細散每服二錢匕漿水一盞煎五七沸和滓溫服不拘時治傷寒不發汗十日以上成狐惑病腹脹面赤惡聞食臭羚羊角湯方羚羊角鎊大腹並皮子用銼柴胡去苗朴硝各半兩葳蕤三分石膏碎桑根白皮銼各一兩上七味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服不拘時治傷寒不發汗後變成狐惑脈數無熱微煩目赤但欲眠睡咽乾不能食黃芩湯方黃芩去黑心射干各一兩黃連去須炒三分甘草炙銼前胡去蘆頭青竹茹知母焙各半兩上七味粗搗篩每服五錢匕水一盞半煎至八分去滓食後溫服治傷寒發汗後變成狐惑毒氣發盛惡聞飲食咽中干痛胸脅滿悶犀角湯方犀角鎊三分黃連去須炒芍藥木通銼木香枳實去瓤麩炒射干人參半夏湯洗七遍炒乾各半兩上九味粗搗篩每服五錢匕水一盞半生薑一棗大拍碎煎至八分去滓食前溫服治傷寒狐惑𧈟病桃仁湯方桃仁去皮尖雙仁炒槐子艾各一兩上三味㕮咀如麻豆大每服五錢匕水一盞半棗三枚劈破煎至八分去滓溫服治傷寒狐惑咽喉澀痛唇口破唾膿血知母湯方知母焙一兩石膏二兩黃芩去黑心甘草炙銼各三分上四味粗搗篩每服五錢匕水一盞半糯米一匙煎至八分去滓食前溫服治傷寒病後有瘡出下部黃連犀角湯方黃連去須半兩犀角鎊一兩如無以升麻代之烏梅七枚木香一分上四味㕮咀如麻豆大每服三錢匕水一盞煎至六分去滓溫服治傷寒陰陽不和變成狐惑目如鳩赤面色斑紋如錦木通湯方木通銼一兩吳茱萸湯洗三遍炒乾桂去粗皮細辛去苗葉各半兩甘草三分銼炙上五味粗搗篩每服五錢匕水一盞半棗二枚劈破蔥白五寸煎至八分去滓食前溫服治傷寒不發汗成狐惑六七日不解寒熱未去胸脅滿痛默默欲睡臥不欲食心煩善嘔腹痛前胡湯方前胡去蘆頭一兩半夏一兩半湯洗七遍炒乾黃芩去黑心甘草炙銼各三分人參一兩上五味粗搗篩每服五錢匕水一盞半生薑一棗大拍碎棗三枚劈破煎至八分去滓空心溫服治傷寒發汗不解變成狐惑寒熱無常心中躁悶不欲飲食半夏湯方半夏湯洗七遍炒乾木通銼桃仁湯浸去皮尖雙仁炒附子炮裂去皮臍桂去粗皮葛根枳殼去瓤麩炒黃芩去黑心各半兩羚羊角鎊一分升麻一分半麻黃去根節三分上一十一味銼如麻豆每服五錢匕水一盞半生薑一棗大拍碎煎至八分去滓溫服治傷寒不發汗變成狐惑病在陽曰惑在陰曰狐其狀默默眠睡起則不安喉中乾燥惡聞食臭其面或赤或白語聲微弱先宜服此薰草湯方零陵香黃連去須炒各一兩上二味銼如麻豆大分二服每服用漿水二盞浸藥一宿煎至一盞去滓食前溫服日再治傷寒狐惑下部𧈟瘡雄黃導氣散方雄黃研青葙子苦參黃連各半兩桃仁去皮尖雙仁炒研一分上五味搗研為散以生艾搗汁和如棗子大綿裹導下部萹蓄汁和更佳冬月無艾只用散綿裹亦得治傷寒發汗下利不解心中躁悶復發壯熱大腸不通咽中干痛變成狐惑皂莢丸方皂莢二挺去皮子慢火炙黑大黃半兩生用檳榔銼木香各一分上四味搗羅為末煉蜜和搗三五百杵丸如梧桐子大每服二十丸生薑茶清下不拘時日再治傷寒狐惑微煩默默欲臥毒氣上攻咽乾聲嗄下蝕濕𧈟或便膿血雄黃丸方雄黃研當歸銼炒各三分蘆薈研麝香研各一分檳榔銼半兩上五味搗研為末煮麵糊和丸如梧桐子大每服十五丸至二十丸食前溫粥飲下日三治傷寒狐惑神思昏悶大便難肌膚熱柴胡散方柴胡去苗大黃銼炒赤芍藥檳榔銼枳實麩炒去瓤各一兩半夏半兩薑汁浸令透焙上六味搗羅為散每服二錢匕濃煎苦楝根湯調下米飲亦得治傷寒狐惑蟲蝕上部則聲嗄甘草瀉心湯方甘草炙四兩黃芩去黑心人參乾薑炮各三兩黃連去須一兩半夏湯洗去滑七遍曝乾二兩上六味㕮咀如麻豆大每服五錢匕水一盞半生薑二棗大拍碎煎取八分去滓溫服日再治傷寒不發汗變成狐惑毒氣上攻喉咽疼痛下利不止地榆湯方地榆黃連去須木香各半兩白朮一分半甘草炙銼阿膠炙燥各一分上六味粗搗篩每服五錢匕水一盞半生薑一棗大拍碎煎至八分去滓食前溫服治傷寒狐惑病在上焦撩膈湯方苦參一兩甘草半兩生用上二味細銼用漿水一盞半煎至八分去滓五更初服良久即吐治傷寒狐惑毒攻下部肛內生瘡熏洗四皮湯方槐白皮柳白皮桑白皮桃白皮上四味等分各細銼每用四兩以漿水一斗煎至七升去滓熏洗下部治傷寒不發汗變成狐惑毒氣下蝕肛門癢甚不已或下膿血檳榔丸方檳榔半兩生搗末杏仁四十九粒湯浸去皮尖雙仁研丹砂半兩別研麝香一錢研上四味同研勻細用餳和丸如棗核大先用椿根槐白皮各二兩以水一斗煎十餘沸熏洗肛門後將藥內之治傷寒狐惑毒蝕下部肛外如𧈟痛癢不止雄黃熏方雄黃研半兩上一味先用瓶一隻口稍大者入灰半瓶灰上放火將雄黃燒之候煙出坐瓶口熏之傷寒百合論曰傷寒百合病者謂百脈一宗悉致其病也其狀意欲食復不能食常默默欲得臥復不能臥欲出行復不能行食飲有時美如有寒又如無寒如有熱復如無熱口苦小便赤黃得藥則吐利者是也此皆由傷寒及虛勞大病後腑臟虛營衛耗弱不能平復變成斯疾也然以百脈一宗悉致其病又無復經絡故其病證變異而治之者亦宜各隨其證治傷寒百合已經下後百合滑石代赭湯方百合七枚劈破滑石一兩碎代赭如彈丸大一枚碎上三味先以水洗百合漬一宿白沫出去其水更以新汲水二盞煎取一盞去滓別用新汲水二盞煮滑石代赭取一盞去滓後合和重煎取一盞半分溫再服治百合傷寒病吐之後者百合雞子湯方百合七枚劈雞子黃一枚上二味先以水洗百合漬一宿當白沫出去其水更以新汲水二盞煎取一盞去滓納雞子黃攪勻分溫再服治百合傷寒已經汗後百合知母湯方百合七枚劈知母一兩上二味先將百合劈碎用新汲水二盞浸一宿當有白沫出去卻沫水了卻用新汲水二盞煮百合取汁一盞去滓盛於淨器中又將知母亦用新汲水二盞煮取一盞去滓後將百合知母汁相和同煎取一盞半不計時候分溫作二服治百合傷寒病變發熱百合滑石湯方百合一兩滑石三兩上二味搗羅為散更入乳鉢研如粉每服空心米飲調下二錢匕日二服當微利即住服治百合傷寒病已經吐下發汗病形如初者百合地黃湯方百合七枚劈生地黃汁一盞上二味先以水洗百合漬一宿白沫出去其水更以新汲水二盞煮取一盞去滓納地黃汁再煎取一盞半分溫再服中病服大便當如漆治百合傷寒病不瘥不思食欲成勞百合半夏湯方百合二兩半夏湯洗七遍炒令乾人參赤茯苓去黑皮黃連去須銼微炒知母各一兩生乾地黃焙一兩半上七味粗搗篩每服五錢匕用水一盞半入生薑一分拍碎同煎至八分去滓食後溫服日二治傷寒百合病久不瘥不思食欲成勞百合柴胡湯方百合二兩柴胡去苗知母焙黃連去須銼微炒秦艽去苗土栝蔞根各一兩甘草半兩炙赤上七味粗搗篩每服五錢匕水一盞半生薑半分拍碎煎至七分去滓食前溫服日三治傷寒百合病似勞形狀如瘧百合紫菀湯方百合紫菀去苗土柴胡去苗杏仁湯浸去皮尖雙仁炒令黃白茯苓去黑皮甘草炙令微赤上六味等分粗搗篩每服五錢匕水一盞半生薑半分拍碎煎至七分去滓空心溫服日晚再服治傷寒百合病補陰養陽厚朴散方厚朴去粗皮薑汁炙令紫黑色桃仁去皮尖雙仁炒黃別研杏仁去皮尖雙仁炒令黃別研各一兩紫石英別研白蘚皮五加皮銼桑根白皮銼各半兩上七味搗研為散更入乳鉢一處研如粉每服食前用蔥白糯米煎湯調下二錢匕日二治傷寒瘥後已經二七日潮熱不解將變成百合病身體沉重無力昏如醉狀百合前胡湯方生百合三枚劈洗前胡去蘆頭麻黃去節各一兩半葛根銼二兩生麥門冬去心半兩石膏三兩碎上六味㕮咀如麻豆大每服五錢匕