body:
  text: 卷第一百六墜睛論曰墜睛者眼因賊風所吹血脈受寒貫沖瞳仁風寒氣隨眼帶牽拽睛瞳向下名曰墜睛也日久不治瞳仁損陷遂致失明治墜睛眼時發疼痛視物散亂犀角散方犀角鎊羚羊角鎊各半兩青羊膽一枚槐實五味子青葙子惡實茺蔚子蘆薈研胡黃連地骨皮各三錢兔肝炙乾一具上一十二味除膽外搗研為散以膽汁拌勻每服二錢匕食後煎槐子湯調下臨臥再服忌發熱毒物治眼白睛腫脹日夜疼痛心胸多悶洗肺利肝羚羊角散方羚羊角屑一兩赤茯苓三兩木通三分甜葶藶半兩隔紙炒令紫色郁李仁一兩去皮防風三分去蘆頭桑根白皮一兩銼甘草半兩炙銼赤芍藥三分黃芩三分枳殼三分炒黃去瓤漢防己一兩川大黃一兩銼杏仁三分湯浸去皮尖炒黃上一十四味搗篩為粗散每服三錢匕水一盞煎至六分去滓食後臨臥溫服治眼白睛腫起赤澀疼痛宜點硃砂煎方硃砂一分細研馬牙硝半兩細研黃連末半兩杏仁一分湯浸去皮尖青鹽一分上五味研勻綿裹用雪水三合浸一宿濾過入瓷閣中銅箸蘸少許點之治墜睛失明眼睛牽陷槐實丸方槐實羖羊角鎊獨活去蘆頭天麻地膚子沙參人參各一兩半防風去叉甘菊花枳殼去瓤麩炒各一兩決明子二兩上一十一味搗羅為末煉蜜和搗五百杵丸如梧桐子大每服三十丸空心臨臥淡漿水下治墜睛視物失明洗眼決明湯方決明子柴胡去苗秦皮防風去叉蛇銜草各一兩生乾地黃二兩上六味銼令勻細每用一兩以水三盞煎取二盞去滓再用綿濾過每暖適溫熱洗訖避風即瘥治墜睛風毒所攻點眼蕤仁煎方蕤仁去皮研二兩黃連去須銼地骨皮取白者用曾青研如粉各一兩青鹽一分古錢十文蜜二盞上七味以新綿裹六味安新瓷瓶中與蜜相和煮一復時後以重綿濾去滓令盡依前安瓶子中著露地兩宿去毒日點黍米大日三五次蟹目論曰臟腑壅滯肝經積熱上衝於目令人目痛睛疼若毒氣結聚甚則黑睛上生黑珠子如蟹目狀故以名之或有如豆者名曰損翳或曰離睛又曰蟹睛病極難治不可鉤割及敷諸毒藥唯宜服宣泄之劑使邪熱退即瘥治蟹目疼痛瀉肝補膽防風湯方防風去叉一兩半遠志去心黃芩去黑心人參桔梗銼炒細辛去苗葉芍藥各一兩上七味粗搗篩每服五錢匕水一盞半煎至八分去滓食後臨臥溫服治眼生蟹目黑睛疼痛葳蕤犀角散方葳蕤犀角鎊蕤仁湯浸去赤皮黃連去須黃芩去黑心梔子仁甘草炙銼升麻各等分上八味搗羅為散每服三錢匕水一盞煎至六分不去滓食後臨臥溫服治蟹睛疼痛瀉肝黃芩羊角湯方黃芩去黑心羚羊角鎊赤芍藥細辛去苗葉桔梗銼炒人參遠志去心甘草炙銼各半兩防風去叉一兩半上九味粗搗篩每服五錢匕水一盞半煎至八分去滓食後溫服日再治目生蟹眼黑睛疼痛木通飲方木通銼羚羊角鎊旋覆花蘆根桑根白皮銼各一兩半黃連去須赤芍藥大黃銼炒各一兩甘草炙銼半兩上九味粗搗篩每服五錢匕水一盞半入竹葉七片切煎至七分去滓食後臨臥溫服治眼中生蟹目及胬肉杏仁龍腦膏方杏仁去皮尖雙仁七粒龍腦二錢研朴硝煉成一錢獖豬膽陰乾用一棗許上四味先研杏仁如膏次下三味同研極細以瓷合收密復勿見風每用銅箸取點眥中淚出則瘥目珠子突出論曰人因風熱痰飲攻漬腑臟陰陽不和肝氣蘊積熱毒之氣上衝於目使目睛疼痛甚者突出治宜先服寒藥以瀉肝氣然後調治勿求卒效惟漸治之仍須微針引出惡汁也治眼睛突起桔梗湯方桔梗銼炒大黃銼炒玄參芍藥防風去叉黃芩去黑心各一兩茺蔚子二兩上七味粗搗篩每服五錢匕水一盞半煎至七分去滓入芒硝末半錢匕食後臨臥溫服治風熱攻目赤痛目睛欲凸出者麥冬茺蔚飲方麥門冬去心焙茺蔚子各二兩桔梗銼炒防風去叉玄參知母焙各一兩黃芩去黑心麥門冬去心焙各一兩半上八味粗搗篩每服五錢匕水一盞半煎至八分去滓食後臨臥溫服治目珠子卒脫出並有青翳點眼丹砂膏方丹砂研乾薑炮搗越燕屎研各一分上三味合研如粉以人乳調點目中日三又一方用乾薑燕屎之半無丹砂治風毒沖眼赤腫睛欲突出洗眼黃連湯方黃連去須秦皮去粗皮黃柏去粗皮各一兩蕤仁三分干棗十枚去核上五味㕮咀如麻豆拌勻每用一兩半以水四盞煎至二盞半去滓稍熱抄洗冷即重暖日三度治眼睛忽然突出一二寸者冷水灌方上急取冷水灌眼中數數換水須臾睛當自收白睛腫脹論曰白睛腫脹者肝肺之候也目者肝之外候白睛者肺氣之所主也若肺氣壅滯肝經不利為邪熱所乘不得宣泄則毒氣上攻於目故白睛腫起或疼痛也治宜宣利臟腑外敷熁腫藥及鐮去惡血無不瘥也治肝肺風熱白睛腫脹侵蓋黑睛犀角湯方犀角生者鎊黃芩去黑心葳蕤防風去叉地膚子羚羊角鎊甘草炙銼各半兩麥門冬去心焙黃連去須各三分上九味粗搗篩每服五錢匕水一盞半煎至七分去滓入馬牙硝末半錢匕食後臨臥溫服治肝肺熱毒攻眼白睛腫起羚羊角湯方羚羊角鎊桑根白皮銼木通銼旋覆花葳蕤升麻各一兩半茯神去木一兩上七味粗搗篩每服五錢匕水一盞半煎至七分下芒硝末半錢匕食後臨臥溫服治白睛腫脹痛不可忍大黃丸方大黃銼炒蔓荊實去皮丹參吳藍土瓜根銼防風去叉甘菊花秦皮去粗皮黃連去須葳蕤陳橘皮去白焙前胡去蘆頭各一兩決明子微炒冬瓜子青葙子地膚子車前子各一兩半上一十七味搗羅為末煉蜜和丸如梧桐子大每服三十丸食前溫酒下日再治白睛腫起如水泡者木通犀角散方木通銼犀角鎊桑根白皮銼黃芩去黑心大黃銼炒玄參茯神去木旋覆花各一兩甘菊花半兩甘草炙銼一分上一十味搗羅為散每服三錢匕水一盞煎至六分不去滓食後溫服治肝肺熱甚上攻白睛覆蓋瞳仁大青散方大青梔子仁羖羊角鎊大黃銼炒桑根白皮銼各一兩上五味搗羅為粗散每服三錢匕水一盞煎至五分去滓入生地黃汁半合服之治眼忽然白睛腫脹如水泡者宜服桑根白皮散方桑根白皮銼木通銼犀角屑黃芩旋覆花茯神玄參川大黃銼碎炒以上各一兩甘菊花半兩甘草一分炙赤銼上一十味搗篩為粗散每服三錢匕水一盞煎至六分去滓食後溫服治肝肺大熱白睛腫脹蓋復瞳仁疼痛宜服大黃散方川大黃銼碎炒黃連各一兩羖羊角屑一兩上三味搗篩為粗散每服三錢匕水一盞煎至六分去滓食後溫服日二目暴腫論曰風勝則動熱勝則腫目暴腫者風熱邪氣客於臟腑蓋五臟六腑之精氣皆上注於目既為風熱邪氣所客氣血不得宣通使毒氣衝發於目是為暴腫治目暴腫生翳前胡湯方前胡去蘆頭赤芍藥青葙子各一兩半山梔子仁細辛去苗葉車前子各一兩淡竹葉洗朴硝湯成下柴胡去苗一兩半甘草微炙銼三分上一十味除硝竹葉外粗搗篩每服四錢匕水一盞半竹葉五片煎至八分去滓入硝一錢匕放溫食後臨臥服治目暴赤腫心躁風熱壅玄參湯方玄參一兩菊花三分防風去叉一兩羚羊角鎊三分蔓荊實三分芍藥三分馬牙硝湯成下黃芩去黑心一兩上八味除硝外粗搗篩每服五錢匕水一盞半煎取七分去滓入硝一錢匕食後臨臥溫服如利即去硝治目暴赤毒痛欲生翳決明子湯方決明子一升石膏研四兩升麻四兩山梔子仁肥者一升地膚子茺蔚子各一升苦竹葉切二升干藍葉切一升芒硝二兩車前草汁一升二合冬瓜子為末三升上一十一味以水二斗煎竹葉取七升二合去滓內諸藥煮取四升分為四服每服相去可兩食間再服為度小兒減藥以意裁之治目暴腫痛竹葉湯方苦竹葉切一升柴胡去苗二兩蛇銜二兩黃連去須芒硝研細辛去苗葉各一兩上六味銼如麻豆每服五錢匕水二盞煎至一盞去滓食後溫服治目暴腫痛秦皮洗眼方秦皮黃連去須各一兩苦竹葉切一升上三味銼如麻豆以水三升煮取八合濾去滓洗眼治目暴腫痛細辛湯方細辛去苗葉蕤仁戎鹽各一兩決明子二兩上四味銼如麻豆以地骨皮汁一升半更以蜜一升半合煎取一升半濾去滓洗之治時行目暴腫癢痛地骨皮湯方地骨皮切三斤上一味以水三斗煮取三升絞去滓更內鹽二兩煎取一升洗目或加乾薑一兩治時行後目暴腫前胡湯方前胡去蘆頭三兩芍藥青葙子各二兩決明子五合細辛去苗葉二兩車前子五合山梔子三枚芒硝三兩淡竹葉切一升上九味銼如麻豆每用五錢匕水二盞煎取一盞去滓食後溫服日三治目暴腫癢痛半夏湯方半夏湯洗七遍焙五兩前胡去蘆頭四兩枳實炒二兩細辛去苗葉一兩烏梅七枚上五味銼如麻豆每用五錢匕水二盞入生薑五片煎取一盞去滓食後溫服日三治目暴腫蘆根湯方蘆根五兩甘草炙一兩粟米三合甜竹茹雞子大上四味銼如麻豆每服五錢匕水二盞煎取一盞去滓食後溫服日三治兩目暴熱痛二黃湯方大黃銼炒四兩芍藥五兩細辛去苗葉甘草炙各四兩黃芩去黑心二兩上五味銼如麻豆每用五錢匕水二盞煎取一盞去滓食後溫服日三治目熱痛大黃湯方大黃蒸過上一味銼如麻豆每用五錢匕水二盞漬之一宿明旦絞汁服之以利為度治目暴腫疼痛決明丸方石決明半兩車前子黃連去須各二兩上三味搗羅為末煉蜜丸如梧桐子大每服十五丸米飲下食後日二服目風腫論曰肝氣有熱沖發瞼眥則令人瞼肉暴腫風冷乘之則凝結不散甚則長大腫若梅李核故謂之風腫治一切目風腫痛茵陳蒿散方茵陳蒿荊芥穗羌活去蘆頭木賊銼旋覆花蔓荊實甘草炙銼芎藭蒼朮米泔浸一宿切焙蒺藜子微炒去角石決明草決明等分上一十二味搗羅為散每服一錢匕新汲水調下不拘時日三治目風腫痛防風丸方防風去叉二兩細辛去苗葉一兩半五味子一兩半茺蔚子二兩黃芩去黑心一兩桔梗銼炒一兩車前子二兩知母二兩人參一兩玄參一兩上一十味搗羅為末煉蜜和丸梧桐子大每服三十丸米飲下食後服治眼目風腫兼生翳膜等疾蟬殼散方蟬殼地骨皮黃連宣州者去須牡丹去心白朮蒼朮米泔浸一宿切焙菊花各一兩龍膽半兩甜瓜子半升上九味搗羅為散每服一錢半匕荊芥煎湯調下食後臨臥各一服大治時疾後餘毒上攻眼目治風熱毒氣忽沖眼腫白睛似水泡疼痛不可睡臥梔子湯方山梔子仁升麻決明子微炒黃芩去黑心各三分黃連去須干藍葉大黃銼炒各一兩上七味粗搗篩每服五錢匕以水一盞半煎至八分去滓入朴硝末半錢匕再煎沸放溫服臨臥再服治眼風腫熱痛大黃湯方大黃銼炒四兩麻黃去根節二兩旋覆花二兩甘草炙銼一兩山梔子仁二兩上五味粗搗篩每服五錢匕以水一盞半煎取八分去滓入朴硝末半錢匕食後服臨臥再服治目風腫赤脹痛大毒熱淚出枳實湯方枳實去瓤麩炒苦參車前子各一兩黃連去須半兩上四味粗搗篩每服五錢匕以水一盞半煎取八分去滓食後臨臥再服治熱風目腫豉心丸方豉心二兩黃連去須三兩上二味搗羅為末煉蜜和丸梧桐子大每服三十丸食後溫水下治眼風腫吹鼻散方枸杞白皮雞子白皮等分上二味搗羅為散又研令極細每日三上吹鼻內治風熱攻眼羚羊角丸方羚羊角鎊蔓荊實去皮甘菊花微炒山梔子仁各一兩半防風去叉二兩半蕤仁去殼赤芍藥大麻子仁研麥門冬去心焙朴硝研各三兩上一十味搗研為末煉蜜和丸如梧桐子大每服三十丸熟水下食後治風熱目赤腫痛洗眼秦皮湯方秦皮蕤仁甘草各一兩半細辛去苗葉一兩梔子仁七枚苦竹葉五十片青鹽少許上七味㕮咀如麻豆大以淡漿水四升煎取二升去滓微溫一合