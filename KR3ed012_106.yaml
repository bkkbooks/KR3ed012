花羌活去蘆頭木賊荊芥穗芎藭各四兩甘草炙銼防風酒浸一宿黃耆切附子炮過用蟬殼洗蛇蛻一條卷在青竹上炙白蒺藜去角旋覆花石決明泥裹燒令通赤別研以上各一兩上十四味內除附子蛇蛻決明外余皆銼碎於新瓦上烙令燥一時搗羅為細散每服二錢匕用第二米泔煎熟後調下空心日午夜臥各一服此藥神效無比治眼目澀痛諸疾大效光明散方蒼朮一斤米泔浸七日去皮切焙乾蛤粉四兩膩者木賊四兩上三味搗羅為末每服一錢匕茶酒調下治眼赤澀疼痛不開黃連膏點眼方黃連一兩去須黃柏半兩川升麻半兩蕤仁一兩去赤皮研細辛一兩石膽一豆大別研上六味五味細銼水三大盞煎至一盞半綿濾去滓入白蜜四兩相和煎令汁稠入研了石膽拌令極勻每日點少許於兩目眥上治風毒上攻眼目赤澀或胬肉侵睛頭旋心悶前胡湯方前胡去蘆頭旋覆花各二兩桔梗銼炒犀角鎊羌活去蘆頭杏仁去皮尖雙仁炒黃玄參生乾地黃焙半夏為末生薑汁製作餅曝乾黃芩去黑心甘草炙銼防風去叉各一兩上一十二味粗搗篩每服五錢匕水一盞半生薑一分拍碎煎至八分去滓食後溫服治肝臟有熱血脈壅滯津液不榮目中乾澀磣痛點眼金華水方黃連末一分杏仁七枚去皮尖雙仁細研硇砂豌豆大一塊研乳香黑豆大一塊研銅緑一字煅過膩粉一錢匕研青古老錢三文與諸藥同浸龍腦半錢匕研滑石半錢匕研艾灰半錢匕研上一十味細研九味令勻與古老錢入在綿子內用井華水浸三七日後點目眥頭治目赤澀痛青葙子丸方青葙子蕤仁人參地骨皮麥門冬去心焙赤茯苓去黑皮各半兩澤瀉前胡去蘆頭枳殼去瓤麩炒甘草炙銼菊花防風去叉各一兩半黃連去須二兩上一十三味搗羅為末煉蜜和搗一千下丸如梧桐子大每服三十丸食後溫湯下治肝臟熱壅目赤澀痛石決明散方石決明井泉石石膏碎各一兩黃連去須菊花各二兩甘草生銼一兩上六味搗羅為散每服二錢匕濃煎竹葉熟水調下治肝熱目澀磣痛昏暗視物不明密蒙花散方密蒙花一兩楮實蒺藜子炒去角甘菊花防風去叉蛇蛻各半兩甘草炙銼一分上七味搗羅為散每服一錢匕臨臥食後溫水調下日三治肝熱目赤乾澀磣痛點眼黃連煎方黃連去須半兩上一味銼如麻豆分作二分一分瓷器內炒紫色一分生用同和別以木炭灰二錢匕與黃連同用沸湯半盞浸良久以細熟絹濾過取汁瓷器盛就冷水內沉令極冷點眼中或更細研少龍腦相和尤佳治眼多淚磣痛洗眼玉明散方秦艽刮銼作片子溫水中浴四十九遍搗二千杵白滑石打碎青鹽二味同研如粉上三味等分再同研勻每用一字熱湯浸放溫洗眼切避風少時治眼赤澀玄精石散方玄精石半兩研如粉無以馬牙硝代之黃柏去粗皮炙搗末一兩上二味和研令極細點兩眥頭
