六味粗搗篩一月及百日兒每服一錢匕用水半盞煎至三分去滓分溫二服兒大以意增之連夜三五服治小兒夜啼腹痛狀如鬼祟桂心湯方桂去粗皮一分五味子半兩當歸切焙一分枳殼去瓤麩炒半兩甘草炙一分上五味粗搗篩一月及百日兒每服錢匕用水半盞煎至三分去滓分溫二服半年至一歲兒準前煎作一服不計時候治小兒夜啼前胡丸方前胡去蘆頭二分上一味搗羅為末煉蜜丸如麻子大一月及百日兒每服三丸用乳汁下半年至一歲兒每服五丸日三夜一治小兒夜啼不止面青腹脹是中客忤麝香散方麝香一分上一味研細每服一字匕清水調服之治小兒夜啼至明即安寐芎藭散方芎藭防己各半兩人參一分上三味搗羅為散二十日兒未能服者以乳汁和之如麻子大一丸以乳汁下兒大能服散者每服一字匕米飲調下一日三兩服治小兒夜啼伏龍肝丸方伏龍肝一分丹砂一錢麝香一字上三味搗研為末煉蜜丸如緑豆大每服五丸量兒大小加減俟夜深煎桃符湯下治小兒夜啼立效散方乳香一錢燈花七枚上二味同研為散每服半字塗奶母乳頭上令服治小兒夜啼蓮心散方石蓮心半兩人耳塞半錢乳香一分別研人參半兩燈花一字丹砂一分別研上六味搗研為散每服半字匕薄荷湯調下不拘時候治小兒夜啼不止腹中療痛黃耆丸方黃耆甘草炙當歸切焙芍藥附子炮裂去臍皮乾薑炮各一分上六味搗羅為末用乳汁和丸如難丸更入少許麵糊丸如黍米大一月及百日兒每服三丸用乳汁下半年至一歲兒每服五丸一日三五服量兒大小加減服之治小兒夜啼雞鳴即止代赭丸方代赭醋淬七遍別研牡丹皮芍藥麝香別研各一分上四味搗研為末煉蜜丸如麻子大一月及百日兒每服三丸用薄荷湯下半年至一歲兒每服五丸連夜三四服治小兒夜啼硫丹丸方硫黃一分鉛丹炒過一兩上二味同研如粉以小合子內盛不固濟大火煅令煙盡候冷以竹筒中盛紙單子封口埋在地下七日取出更研細用飯丸如黍米大一月及百日兒每服兩丸用冷水下半年至一歲兒每服五丸連夜三四服治小兒腹中猝痛啼呼悶絶半夏丸方半夏生薑汁洗去滑曝乾一分上一味搗羅為末用酒麵糊丸如黍米大一月及百日兒每服三丸用薄荷湯下半年至一歲兒每服五丸一日三五服治小兒夜啼方上用燈花塗乳母乳上與服治小兒夜啼豬屎浴方上取豬屎燒灰以沸湯淋汁浴兒並與少許服之又方上取母妊娠時食飲偏有所思之物以哺兒愈又方交道中土伏龍肝各半兩上二味研羅為末水和少許服之又方上取死人朽棺木燒明照之即止又方上取犬頸下毛以絳囊盛系兒兩手立止又方上以日未出時及日午時仰臥於臍上橫紋中屏氣朱書作血字其夜即斷聲又方上取敗甑帶懸於戶上瘥又方上取明鑑挂於床腳上瘥又方上於臍下書田字瘥治小兒夜啼方上取敗草垂戶上瘥又方上取牛糞灰安母臥床下勿令母知之又方盜取車輞安母臥床勿令知治小兒夜啼不止方劉寄奴半兩甘草一指節許地龍炒一分上三味㕮咀以水二盞煎至一盞去滓時時與服
