body:
  text: 卷第一百七十小兒慢驚風論曰小兒慢驚者癇病發於陰也由在胎時稟受不足心氣虛弱外中風邪入於腑臟其發則手足瘛瘲頭目搖動牙關噤緊神情如醉休作有時潮搐不定者謂之陰癇其治療也外以灸法內以藥餌臨機制變可謂上工若證見息高魚口泄汗遺尿者皆所不治治小兒慢驚體熱忽發吐逆夜多啼叫或泄或祕變成慢驚或為疳疾定搐搦墜痰涎鎮心療疳如聖青金丸方龍腦一錢香墨一錢半使君子兩枚麵裹慢火煨熟膩粉麝香各一分白麵三錢青黛二錢金箔銀薄各一十片上九味同研勻細滴井華水和丸如雞頭實大每服一丸慢驚者用冷薄荷水化下服訖即睡睡覺取下涎從大便出立愈後更與三兩服如些小驚及急驚只服半丸治小兒慢驚虛困痰涎不利羌活丸方羌活一兩白殭蠶炒半兩二味搗末硫黃水銀各一分二味結沙子研上四味合研勻細煉蜜和丸如豌豆大四五歲每服二丸三歲以下一丸煎金銀荊芥薄荷湯化下治慢驚風琥珀丸方琥珀犀角末各一錢真珠末天南星酒浸麩炒各二錢牛黃龍腦研麝香研各一字丹砂研一分乾蠍七枚全者炒上九味搗研為細末煉蜜丸如雞頭實大每服一丸煎菊花湯化下治小兒慢驚風回魂煎方天南星一枚重三錢者燒地坑子令赤用醋潑下天南星以碗子合定勿透氣去皮臍取二錢白附子三枚生用烏蛇四寸用酒浸去皮骨炙蜈蚣一條酒炙棘剛子三十枚乾蠍全者七枚炒水銀沙子兩皂子大丹砂膩粉各一分麝香犀角末乳香各一錢金薄三片共炒於一處研牛黃龍腦各半錢研上一十五味搗研勻細用石腦油為膏旋丸如豌豆大每服一丸薄荷湯化下治小兒慢驚風天南星煎丸方天南星一兩細銼水二盞微火熬至半盞去滓重熬成膏白附子半兩炮天麻一兩乾蠍一分炒上四味搗羅三味入天南星膏內和丸如緑豆大三五歲兒每服二丸薄荷湯下五六歲兒三丸日再服更量兒大小加減不拘時治小兒慢驚風天漿子散方天漿子白殭蠶炒乾蠍炒各三枚上三味搗羅為散每服一字匕煎麻黃湯調下日三服汗出為效更量兒大小加減不拘時治小兒慢驚風潮發搐搦項筋緊強紫霜散方白花蛇酒浸一宿去皮骨炙一兩鐵粉半兩研丹砂研白附子炮蠍梢各一分麝香一錢研上六味搗研為細散每服半錢匕薄荷湯調下不拘時治小兒慢驚風乾蠍散方乾蠍五枚全者炒細辛去苗葉乳香研各一分青黛研白附子炮各半兩上五味搗研為細散每服半錢匕煎冬瓜子湯調下不拘時治小兒慢驚風兼內外俱虛羌活煎方羌活去蘆頭防風去叉桂去粗皮獨活去蘆頭人參各一分白附子半兩乾蠍全者炒白殭蠶炒各一錢水銀硫黃研各二錢上一十味搗羅八味為末次熔硫黃成汁次入水銀為沙子放冷細研入衆藥末用棗肉蜜和成煎每服一大豆許煎防風湯化下紫參人參湯亦得一方去白殭蠶加茯苓一分治小兒慢驚風搖頭閉目歸魂丸方金箔十五片研丹砂研膩粉研牛黃研青黛研白殭蠶炒蟬殼去土白附子炮乾蠍全者炒防風去叉犀角鎊天南星炮各一分天麻半兩棘剛子十二枚上一十四味為細末煉蜜和丸如梧桐子大每服一丸薄荷湯化下奶食後臨睡服治小兒慢驚風墜涎真珠丸方真珠牛黃丹砂雄黃膩粉各一分研上五味合研勻細用粳米飯和丸如黃米大一二歲兒每服三丸薄荷湯下日三更量兒大小加減治小兒慢驚風吐逆不定胃虛生涎多驚饒睡丁香丸方丁香一分為末半夏三枚湯洗十遍焙乾為末水銀鉛各一分二味結砂子蠍梢四十九枚炒為末上五味合研勻細用熟棗肉和丸如緑豆大每服五丸至七丸量兒大小加減並用荊芥薄荷湯下大人虛風痰涎丸如梧桐子大一服七丸至十丸治小兒慢驚風四肢搐搦五靈脂丸方五靈脂白附子生天南星生乾蠍各一兩蟬殼半兩生去土上五味搗羅為末釅醋一盞藥末一兩同熬成膏入余藥末和丸如緑豆大未滿月兒奶汁化破一丸二歲以下二丸漸大以意加減用金銀薄荷煎湯化下鼻上汗出即愈治小兒慢驚風心神悶亂煩懊不安筋脈拘急胃虛蟲動反折啼叫乳香丸方乳香盞子內熔過研半錢胡粉一錢上二味合研勻細用白頸蚯蚓生捏去土爛研和就為丸如麻子大每服七丸至十丸煎蔥白湯下更量兒大小加減治小兒慢驚風乾蠍天麻散方乾蠍全者十枚炒曼陀羅七朵天麻乳香研天南星炮丹砂研各一分上六味搗研為細散每服半錢匕薄荷湯調下不拘時治小兒慢驚風因轉瀉虛極多睡善欠醫所不能療麻黃散方麻黃七節以兒中指節比薄荷全者七葉乾蠍全者一枚上三味各炒黃色合搗研為細散每服半錢匕溫薄荷水調下更量兒大小加減服後略以衣被蓋之汗出立瘥治慢驚罷搐煎方丹砂研水銀天南星炮膩粉研薄荷白附子炮乾蠍全者炒各一分上七味為細末用石腦油和成煎每服一大豆許薄荷湯化下治小兒慢驚風多涎腹脹潮熱發渴搐搦萬靈丹方牛黃一錢細研麝香半錢細研熊膽半錢細研膩粉半錢細研乾蠍五枚微炒硃砂一分細研巴豆三枚去皮心生研木香半錢白附子三枚炮裂蟬殼七枚微炒上一十味先搗羅四味為細末次入六味都研令勻煉蜜為丸如黍米大每服三丸煎薄荷荊芥湯下量兒大小加減治小兒慢驚風搐搦煩熱犀角丸方犀角屑一分蟬殼二七枚微炙天漿子二七枚麩炒去殼牛黃一分細研青黛一分細研烏蛇半兩酒浸去皮骨炙令黃地龍一分微炒蟾酥半錢鐵器上焙過研硃砂半兩細研水飛防風半兩去叉蠶紙一張燒灰麝香一分細研上一十二味先搗七味為細末次入五味都研令勻煉蜜為丸如黍米大每服兩丸煎荊芥湯下大人風癇取活蠼螋蟲不拘多少研如泥生面和丸如雞頭實大捏作餅子煻灰火煨熟每嚼一餅子煎荊芥湯下前藥十丸更量大小虛實加減治小兒慢驚風潮發磨化龍腦丸方龍腦麝香蘆薈熊膽膩粉各半錢研胡黃連使君子青黛研各一錢香墨半兩研上九味搗羅胡黃連使君子為末余研極細滴水和丸如梧桐子大每服二丸煎金銀薄荷湯磨下經宿取惡物便安治小兒慢驚風胸膈痰涎咽喉壅塞身體壯熱筋脈拘急時或發渴蘆薈散方蘆薈研龍骨雄黃研麝香研各半分胡黃連青黛研木香丁香牛黃研天竺黃熊膽研乾蠍炒膩粉研丹砂研犀角鎊附子炮裂去皮臍人參沉香各一分上一十八味搗研為散每服半錢匕薄荷湯調下治小兒虛風慢驚搐搦項筋緊強手足逆冷腰背拘急再生丸方蜈蚣一條酒浸一宿炙乾蠍全者七枚炒蠶蛾十枚炒白殭蠶直者炒丹砂研各一分天南星炮白附子炮麝香當門子各一枚薄荷心七枚龍腦研水銀錫結沙子各一錢棘剛子二十枚炒上一十二味搗研為細末研勻以石腦油和劑油單裹每服旋作一丸如黍米大冷水化下鬚髮前服三服必效後服睡脾散治小兒慢驚風睡脾散方桑螵蛸四枚干薄荷葉乾蠍全者炒人參干山芋天南星炮半夏生薑汁浸透切焙各一分上七味搗羅為細散每服半錢匕麝香粟米飲調下治小兒虛風鉤藤煎方鉤藤防風去叉芎藭天麻酒浸切焙麻黃去根節各一分荊芥穗蟬殼去土蠍梢炒各半兩白殭蠶十四枚炒薄荷心二十六枚酒浸焙龍腦麝香各一字研上一十二味搗研為細末煉蜜和成煎每服皂子大荊芥紫參湯化下治小兒慢驚風涎塞咽喉服利藥過度者麝香餅子方麝香研膩粉各三錢匕澱粉二錢匕上三味研令勻細以香墨研濃汁和丸捏如扁豆大每服一餅薄荷湯化下治小兒慢驚神識昏塞時發時省手足搐搦目睛直視天麻丸方天麻白殭蠶炒乾蠍去土炒白附子各二錢牛黃研丹砂研麝香研各半錢雄黃研一錢上八味搗研為末煉蜜和丸如雞頭實大每服一丸薄荷湯化下量兒大小加減服治小兒慢驚風手足瘛瘲神情如醉桃紅散方天南星炮烏頭炮裂去皮臍白附子炮天麻各半兩乾蠍微炒二十一枚丹砂研一分上六味搗研為細散每服一字或半錢匕旋入牛黃龍腦各少許煎麻黃湯調下日三治小兒慢驚風久不瘥天竺黃散方天竺黃人參胡黃連使君子炮各一分半夏三枚生薑汁浸炒藿香半分丹砂研麝香研各半錢蠍梢炒甘草炙各一分上一十味將八味搗為細散入丹砂麝香研勻每服一字匕冷蜜湯調下熟水亦得量兒大小加減服小兒驚悸論曰心藏神而惡熱小兒體性多熱若感風邪則風熱搏於腑臟其氣鬱憤內乘於心令兒神志不寧故發為驚若驚甚不已則悸動不寧是為驚悸之病治小兒驚悸不安紫金散方鐵粉龍齒石膏牛黃並研如粉甘草生末各一分上五味先搗龍齒石膏為末與諸藥同研如粉每服半錢匕用淡竹瀝調服三四歲兒每服一錢匕日三服早晨午間日晚各一量兒大小以意加減治小兒壯熱驚悸並熱瘡出人參湯方人參三分茯神去木半兩龍齒研如粉一兩鉤藤一分蚱蟬去足頭翅微炙二枚麥門冬去心焙一兩杏仁去雙仁皮尖麩炒令熟一兩半蛇蛻皮微炙令黃二寸上八味粗搗篩一二歲兒每服一錢匕水半盞煎至三分去滓入牛黃一豆許大分溫二服空心午後各一量兒大小以意加減治小兒壯熱時氣驚悸並熱瘡出鉤藤湯方鉤藤一兩人參一兩蚱蟬微炙去翅足一兩黃芩去黑心一兩蛇蛻皮微炙令黃色三寸龍齒研如粉一兩防風去叉半兩澤瀉半兩上八味粗搗篩一二歲兒每服一錢匕水半盞入竹瀝半合石蜜少許同煎至四分去滓分溫二服空心午後各一更量兒大小以意加減治小兒心熱驚悸牛黃散方牛黃研一分天竺黃研半兩鉛白霜研半兩玄明粉研一兩玄明粉研一兩人參半兩白茯苓去黑皮半兩上六味搗羅人參茯苓為末同牛黃等研為散一二歲兒每服半錢匕用薄荷湯調服三四歲兒每服一錢匕日三服早晨午間日晚各一量兒大小以意加減鎮心神涼咽膈壓驚悸退壯熱化風涎大丹砂丸方丹砂研水飛過甘草炙白茯苓去黑皮各二兩人參一兩馬牙硝研一分硼砂研三錢牛黃研半錢龍腦研麝香研各一錢上九味搗研為末煉蜜和丸如雞頭大每服一丸用竹葉湯化下食後臨睡服大小以意加減之治驚悸退壯熱止涎嗽利咽膈除眠睡不穩丹砂丸方丹砂二兩細研水飛半夏湯洗七遍二兩乳香研半錢人參白茯苓去黑皮各半兩天南星炮裂一兩牛黃研二錢龍腦研一錢上八味搗研為末用白麵糊和丸如麻子大三歲兒服十丸至十五丸不拘時用竹葉乳香湯下量兒大小加減治小兒驚熱筋脈抽掣夜臥驚悸四肢煩熱天竺黃散方天竺黃研半兩鬱金漿水煮一分粉霜研一分鉛白霜研一分山梔子仁半兩上五味搗研為散一二歲兒每服半錢匕用新汲水調服三四歲兒每服一錢匕日二早晨日晚各一更量兒大小以意加減治小兒虛熱驚悸睡中時叫麥門冬湯方麥門冬去心焙一兩半人參半兩龍骨一兩茯神去木三分甘草炙一分犀角屑半兩上六味粗搗篩一二歲兒每服一錢匕水七分入生地黃汁少許同煎至四分去滓溫服日三四服量兒大小以意加減治小兒風熱驚掣心忪恐悸茯神湯方茯神去木一分龍齒半兩寒水石研一分升麻三分石膏研一兩麥門冬去心焙三分上六味粗搗篩一二歲兒每服一錢匕水七分入竹瀝少許煎至四分去滓溫服日三夜一量兒大小以意加減治小兒風熱心神驚悸睡臥不安真珠丸方真珠末羌活去蘆頭防風去叉鉤藤龍膽天竺黃研升麻牛黃研各一分茯神去木人參羚羊角屑犀角屑各一兩鉛霜龍腦麝香各一錢研上一十五味搗研為末煉蜜丸如緑豆大每服用荊芥薄荷湯研下五丸日三四服常服化一切驚涎治小兒精神不爽寢寐多驚心忪恐悸四肢戰抖