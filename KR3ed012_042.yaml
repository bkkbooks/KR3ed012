body:
  text: 卷第四十二肝病筋急論曰肝病筋急者肝與筋合也蓋足厥陰之經不足則脈弗營脈弗營則風邪易侵搏於筋脈故令筋急而攣縮也治肝臟風毒氣注手臂頭項肩髆腰足筋脈拳急攻刺疼痛或四肢虛腫頭目旋運黑花昏暗嘔逆減食天麻湯方天麻酒炙附子炮裂去皮臍各一兩半乾蠍去土炒羌活去蘆頭芎藭白附子炮牛膝去苗酒浸切焙麻黃去根節白花蛇酒浸去皮骨炙焦枸杞白芷人參萆薢海桐皮防風去叉桂去粗皮酸棗仁炒白蒺藜炒當歸切焙甘草炙各一兩乳香研一兩半上二十一味除研者外銼如麻豆每服五錢匕水一盞半生薑三片煎取八分去滓溫服其煎藥水每用桃柳桑枝嫩者各一兩淨洗細銼甘菊葉半兩如無葉以花代用水二升煎取一升去滓若冬月十日為一料夏月逐日修事服之治肝臟風毒流注腳膝筋脈拘急疼痛行履不得石南丸方石南烏蛇酒浸去皮骨炙各一兩牛膝去苗酒浸切焙防風去叉石斛去根桂去粗皮萆薢麻黃去根節羌活去蘆頭海桐皮赤茯苓去黑皮茵芋去粗莖獨活去蘆頭天麻酒炙當歸切焙附子炮裂去皮臍各半兩黑豆一升淨淘以醇酒五升煮去豆滓熬成膏和諸藥上一十七味除黑豆膏外搗羅為細末以豆膏和丸如梧桐子大每服二十丸至三十丸早晚食前溫酒下治肝虛血不足肢節拘急筋脈攣痛地黃丸方生乾地黃切焙熟乾地黃切焙各一斤杏仁去皮尖雙仁麩炒細研半斤防風去叉石斛去根枳殼去瓤麩炒牛膝去苗酒浸切焙各四兩上七味除杏仁外搗羅為細末入杏仁和勻煉蜜和丸如梧桐子大每服三十丸炒黑豆淋酒下日三不計時治肝元虛風上攻頭目昏悶及背項緊急筋脈拘攣羚羊角散方羚羊角鎊芎藭各半兩羌活去蘆頭獨活去蘆頭各三分人參防風去叉白蒺藜炒各半兩上七味搗羅為細散每服二錢匕溫酒調下不拘時治肝虛勞損關節疼痛筋脈攣急虎骨酒方虎骨酒塗炙三兩乾薑炮二兩芎藭地骨皮白朮銼豬椒根銼洗五加皮各二兩枳殼去瓤麩炒一兩半丹參四兩熟乾地黃切焙三兩上一十味粗搗篩用生絹袋貯以清酒三斗浸四宿每日空腹服一盞加至二盞治肝臟風氣四肢筋脈攣急身體強直薏苡仁湯方薏苡仁芎藭石膏碎研各一兩羌活去蘆頭三分柏子仁研酸棗仁炒各一兩附子炮裂去皮臍三分上七味除研者銼如麻豆每服三錢匕水一盞生薑三片煎至七分去滓溫服不計時候治肝臟風氣攻注四肢筋急疼痛及腳膝少力行步艱難木瓜丸方木瓜去皮子薄切焙乾二兩牛膝去苗酒浸切焙芎藭羌活去蘆頭各一兩半附子炮裂去皮臍二兩上五味搗羅為末煉蜜丸如梧桐子大每服三十丸煎牛膝酒下漸加丸數空心食前治肝風筋脈拘急背髆勞倦及頭昏項頸緊急疼痛獨活湯方獨活去蘆頭甘菊花擇蔓荊實芎藭各一兩上四味粗搗篩每服三錢匕水一盞入酸棗仁惡實各五十粒研碎同煎至七分去滓溫服不計時治筋急轉筋舒展不能烏頭丸方草烏頭半斤用鹽水浸三日取出洗切麩炒麩焦為度去麩用荊芥穗半斤上二味搗羅為細末別用宣州木瓜二枚炒熟去皮瓤入前件藥杵令勻用酒煮麵糊和丸如梧桐子大每服三十丸加至五十丸食前木瓜湯下日三疹筋論曰人有尺脈數甚筋急而見病名疹筋是人腹必急白色黑色見則病甚夫熱則筋緩寒則筋急今肝氣內虛虛則生寒故筋急而見其尺脈數甚者蓋尺裡以候腹中其人腹急則尺脈見數數亦為虛以腹內氣虛故也其證筋急而見為疹筋視其色白黑為病甚者氣既寒而筋急其色又見白黑是為寒甚之證治肝虛筋脈不利腹急筋見脅肋脹滿薏苡仁湯方薏苡仁防風去叉桂去粗皮當歸切焙各一兩酸棗仁炒三分白茯苓去黑皮海桐皮萆薢各半兩芎藭三分上九味㕮咀如麻豆大每服三錢匕水一盞半煎取八分去滓溫服不拘時候治肝氣虛寒筋脈急見於外成疹不已補肝湯方防風去叉二兩細辛去苗葉半兩白茯苓去黑皮二兩柏子仁一兩桃仁去皮尖雙仁炒半兩桂去粗皮甘草炙銼山茱萸蔓荊實各一兩上九味粗搗篩每服五錢匕水一盞半大棗三枚劈破煎至一盞去滓空心頓服晚食前再煎服治肝虛生寒脈數筋急腹脅妨悶筋見於外柏子仁飲方柏子仁茯苓去黑皮防風去叉細辛去苗葉各三分當歸銼微炒檳榔各半兩銼白朮桂去粗皮各三分附子炮裂去臍皮半兩芎藭枳殼去瓤麩炒各三分上一十一味銼如麻豆大每服三錢匕水一盞入生薑三片棗二枚同煎至七分去滓溫服不計時候治肝虛寒筋急腹滿䐜脹柏子仁丸方柏子仁黃耆銼白茯苓去黑皮楮實覆盆子五味子附子炮裂去皮臍石斛去根酸棗仁炒鹿茸酥炙去毛桂去粗皮白朮沉香銼枳實麩炒熟乾地黃焙各一兩上一十五味搗羅為末煉蜜和搗三二百杵丸如梧桐子大每服三十丸溫酒下空心及晚食前服治肝風筋脈成疹腹肋急痛羌活湯方羌活去蘆頭白朮麻黃去根節煮掠去沫焙側子炮裂去皮臍丹參當歸銼炒防風去叉羚羊角鎊屑各三分白茯苓去黑皮萆薢桂去粗皮各半兩上一十一味銼如麻豆每服三錢匕以水一盞入生薑三片煎至七分去滓溫服不拘時候治肝氣不足筋脈急見心腹壅滯左肋妨脹不思飲食茯苓湯方白茯苓去黑皮前胡去蘆頭白朮鱉甲塗醋炙黃去裙襴沉香銼黃耆銼各一兩桂去粗皮枳實麩炒微黃各半兩生乾地黃五味子各三分上一十味粗搗篩每服三錢匕以水一盞入生薑三片煎至七分去滓溫服不拘時膽門膽虛論曰足少陽經不足者膽虛也虛則生寒寒則其病恐畏不能獨臥口苦善太息嘔宿汁心下淡淡如人將捕之嗌中介介數唾頭眩痿躃足指不能搖坐不能起僵仆目視䀮䀮蓋膽虛則精神不守其氣上溢循其所在而生病也治膽氣不足常多恐懼頭眩痿厥四肢不利僵仆目黃中正湯方茯神去木酸棗仁微炒黃耆銼羌活去蘆頭各一兩熟乾地黃切焙甘菊花柏子仁防風去叉各三分人參白芍藥當歸切焙甘草炙銼各半兩上一十二味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治膽經虛冷不能獨臥心下淡淡如人將捕頭眩痿厥目黃失精遠志湯方遠志去心熟乾地黃切焙各一兩防風去叉人參甘菊花白朮桂去粗皮茯神去木細辛去苗葉前胡去蘆頭各三分枳殼去瓤麩炒半兩上一十一味粗搗篩每服三錢匕水一盞入生薑三片煎至七分去滓溫服不拘時治膽虛生寒氣溢胸膈頭眩口苦常喜太息多嘔宿水天雄丸方天雄炮裂去臍皮人參山芋桂去粗皮各一兩黃耆銼白茯苓去黑皮防風去叉柏子仁研細山茱萸酸棗仁炒各三分上一十味除柏子仁外搗羅為細末與柏子仁和勻煉蜜為劑杵五百下丸如梧桐子每服三十丸溫酒下空心食前治肝虛膽寒心神不安臥即驚覺目昏心躁四肢不利黃耆湯方黃耆銼三分人參檳榔銼白朮百合酸棗仁微炒白茯苓去黑皮麥門冬去心焙桂去粗皮附子炮裂去皮臍各半兩上一十味銼如麻豆每服五錢匕水一盞半入薑五片煎至一盞去滓溫服空心食前日二治足少陽經不足目眩痿厥口苦太息嘔水多唾沉香湯方沉香銼白茯苓去黑皮黃耆銼白朮各一兩芎藭熟乾地黃切焙五味子各三分枳實去瓤麩炒桂去粗皮各半兩上九味粗搗篩每服三錢匕水一盞入生薑二片同煎至七分去滓溫服不計時治膽虛勞煩精神不守奔氣在胸眠睡多恐人參湯方人參桂去粗皮各一兩酸棗仁微炒白茯苓去黑皮知母焙石膏碎各一兩半甘草炙銼八錢上七味粗搗篩每服五錢匕用水一盞半生薑五片煎至一盞去滓溫服不計時治膽受冷精神不安眼目昏暗臥起不定犀角飲方犀角鎊屑一兩羌活去蘆頭一兩酸棗仁炒三分茯神去木三分甘菊花一兩防風去叉三分人參三分柴胡去苗一兩上八味粗搗篩每服五錢匕水一盞半煎至八分去滓食後溫服日三膽實論曰膽實則為有餘有餘則生熱故其證若腹中氣滿飲食不下咽乾心脅痛不能轉側足外反熱是為陽厥及頭痛目鋭眥痛缺盆中腫痛腋下腫馬刀俠癭皆謂膽氣實足少陽經壅滯故也治膽經有餘腹中冒冒氣滿不安咽乾頭重枳殼湯方枳殼去瓤麩炒一兩人參葵子甘草炙銼各半兩赤茯苓去黑皮黃芩去黑心各三分上六味粗搗篩每服三錢匕水一盞入生薑三片煎至七分去滓溫服不計時治足少陽經伏熱積久腹中氣滿睡臥不安頭昏口苦小便不利升麻湯方升麻麥門冬去心焙黃芩去黑心茯神去木大黃銼炒地骨皮銼焙羚羊角鎊甘草炙銼各等分上八味粗搗篩每服三錢匕水一盞入青竹茹少許煎至七分去滓溫服食後臥服治膽經實熱心神驚悸小便不利楝實丸方楝實三兩以童子小便浸一宿文火煮爛去核焙乾大黃銼炒梔子仁炒各一兩人參赤茯苓去黑皮酸棗仁半炒用半生用別研蛇黃燒令赤酒中淬五度別研各一兩金牙石搗碎一兩一分上八味除別研者外搗羅為末再一處拌勻煉蜜丸如梧桐子大每日早食後及夜臥用熟水下十五丸至二十丸治邪熱干膽神思不寧喜怒狂躁口苦舌乾山梔子飲方山梔子仁一兩半甜竹茹微炒一兩豉一升大青八錢陳橘皮湯浸去白焙一兩上五味粗搗篩每服三錢匕水一盞入蜜少許煎至七分去滓溫服食後夜臥各一治膽實生熱腹中氣滿飲食不下咽乾頭重灑灑惡寒兩脅脹痛半夏東流水湯方半夏湯洗七遍去滑炒一兩半酸棗仁二兩別研入黃芩去黑心半兩遠志去心赤茯苓去黑皮各一分生地黃切焙二兩上六味除別研外粗搗篩再拌勻每五錢匕用東流水二盞入秫米半合生薑五片煎至一盞去滓分溫二服空腹食後各一服治膽實熱口苦冒冒氣滿食飲不下咽乾心脅痛不能轉側頭目連缺盆皆痛半夏湯方半夏為末生薑汁和作餅曝乾酸棗仁各一兩半黃芩去黑心半兩遠志去心山梔子去皮赤茯苓去黑皮各一兩秫米三大合上七味粗搗篩每服五錢匕水一盞半生薑五片生地黃半分切煎至八分去滓食後溫服治膽熱精神不安臥起不定口中常苦胡黃連丸方胡黃連一兩青羊角鎊屑一兩熊膽一分蛇黃火煅去火毒半兩青黛別研一分上五味搗羅為末研令勻用黃牛膽搜和為丸如緑豆大每服七丸煎竹葉湯下晚間再服無牛膽以羊膽代治膽伏熱精神驚悸不安菊花散方甘菊花一兩牛黃研半兩犀角鎊屑三分鐵粉半兩麥門冬去心焙半兩黃連去須三分鉛霜半兩獨活去蘆頭一兩白附子炮半兩上九味搗羅為細散研和勻每服二錢匕食後淡竹瀝調下或金銀煎湯下亦得治膽實熱精神不安瀉熱湯方龍骨酸棗仁微炒黃芩去黑心茯神去木伏龍肝升麻竹茹甘草炙各等分上八味粗搗篩每服三錢匕水一盞煎至七分去滓食後溫服日三膽虛不眠論曰膽虛不得眠者膽為中正之官足少陽其經也若其經不足復受風邪則膽寒故虛煩而寢臥不安也治肝虛膽寒夜間少睡睡即驚覺心悸神思不安目昏心躁肢節痿弱補肝去膽寒和氣五補湯方黃耆三分附子炮裂去皮臍人參檳榔白朮百合酸棗仁微炒研白茯苓去粗皮麥門冬湯浸去心焙乾桂去粗皮各半兩上一十味除酸棗仁外細銼分為十帖每帖水兩盞入生薑五片同煎至一盞去滓空心溫服日二治膽寒虛煩不得眠溫膽湯方半夏湯洗七遍焙乾竹茹枳實去瓤麩炒各二兩陳橘皮湯浸去白焙三兩甘草炙一兩上五味粗搗篩每服五錢匕以水一盞半入生薑半分切煎取七分去滓溫服治膽寒虛煩不得眠千里流水湯方半夏湯洗七遍焙乾麥門冬去心焙各三兩白茯苓去黑皮四兩酸棗仁炒甘草炙銼桂去粗皮黃芩去黑心遠志去心萆薢人