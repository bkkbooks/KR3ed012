body:
  text: 卷第一百九目見黑花飛蠅論曰腎水也肝木也木得水而盛其理明矣腎水既虛肝無以滋養故見於目者始則䀮䀮不能矚遠久則昏暗時見黑花飛蠅其證如此腎虛可知也治宜以益腎水去肝風之劑則標本兩得矣治一切風毒眼見黑花攀睛翳暈瘀肉侵暗撥雲散方蔓荊實三升煮一遍炒一遍苘實炒羌活去蘆頭蒺藜子炒去角青葙子惡實炒各一兩防風去叉菊花旋覆花甘草炙各二兩穀精草石決明地骨皮蟬殼木通銼牡蠣燒各四兩淡竹葉烏賊魚骨去甲白花蛇酒浸去骨炙木賊龍膽細辛去苗葉密蒙花各三兩蒼朮去皮米泔浸一宿切焙半兩上二十四味搗羅為散丈夫生椒湯調下二錢匕婦人茶調下小兒疳眼雀目生米泔調下一錢匕腎臟風毒眼即加胡桃仁四兩治目視茫茫或見黑花蠅翅羌活散方羌活去蘆頭甘草炙石決明生研石膏泥裹煅通赤冷研密蒙花蒼朮去皮防風去叉蒺藜子炒去角木賊各半兩蔓荊子威靈仙去土干桑葉荊芥穗原蠶砂炒各一分上一十四味搗羅為散每服一錢匕早晚食後溫熟水調下眼赤澀沙糖水調下臨臥再服治眼見黑花視物不明昨葉何草丸方昨葉何草去土焙蒺藜子炒去角各一兩半薄荷葉羌活去蘆頭荊芥穗附子黑豆一升同煮附子令軟透去皮臍切焙各一兩上六味除黑豆外搗羅為末將黑豆爛研和丸如梧桐子大每服十丸空心溫熟水下一方加羌活半兩服此藥後更合蕤仁散間服之治眼見黑花昏暗蕤仁散方蕤仁去皮一兩半羌活去蘆頭天麻槐子山梔子各一兩黃芩去黑心黃連去須菊花各半兩上八味搗羅為散每服一錢匕溫熟水調下食後日二服有人患眼見黑花或如大白環當目前漸如小蟲樣後又變如粉點只見三二分物服此藥二十餘日頓愈更不復發一方加細辛甘草各一兩治肝腎氣虛眼生翳暈及見黑花宿鳩丸方宿鳩一隻去毛羽嘴足腸胃炙黃羊肝一具清油煉定血去筋膜批作片子焙蔓荊子半升淘淨生絹袋盛飯上炊三遍焙蜀椒去目及閉口者炒出汗楮實仙靈脾木賊羌活去蘆頭蟬殼去土各一兩甘菊花去萼荊芥穗蒼朮米泔浸去皮蒺藜子炒去角各二兩上一十三味搗羅為末煉蜜和丸如梧桐子大每服三十丸溫酒或鹽湯下不拘時候治腎虛眼見黑花診右手尺脈當沉而數乾地黃丸方熟乾地黃焙石斛去根銼黃耆銼菟絲子酒浸三日曝別末防風去叉車前子茺蔚子覆盆子肉蓯蓉酒浸一宿去皴皮焙磁石醋淬七遍細研水飛地膚子各一兩兔肝一兩半炙上一十二味搗羅為末煉蜜和勻再杵五百下丸如梧桐子大空心晚食前鹽酒下三十丸治肝腎虛風上攻眼生黑花或如水浪摩頂膏方空青研青鹽研各半兩槐子木香附子各一兩牛酥二兩鵝脂四兩龍腦半錢丹砂研一分旱蓮草自然汁一升上一十味將草藥搗羅為末先以蓮草汁牛酥鵝脂銀器中熬三五沸下諸藥末煎減一半即止盛瓷器中臨臥用舊鏵鐵一片重二三兩蘸藥於項上摩三二十遍令人發竅中次服決明丸忌鐵器治眼見黑花決明丸方決明子甘菊花各一兩車前子防風半兩去蘆頭蔓荊子半兩芎藭半兩生乾地黃二分梔子仁半兩細辛半兩白茯苓半兩玄參半兩薯蕷半兩上一十二味搗羅為末煉蜜和搗三二百杵丸如梧桐子大食後煎桑枝湯下二十丸日三治肝腎風虛眼生黑花宜服此方磁石二兩燒醋淬七遍細研水飛神麯四兩炒硃砂一兩研細水飛上三味搗羅為末煉蜜和搗一二百杵丸如梧桐子大食後溫酒下二十丸治肝腎虛風上攻眼生黑花頭目不利能通神延年服椒方川椒一斤上一味揀淨去目及閉口者於銚內炒令透於地上鋪淨紙二重用新盆合定周回用黃土培之半日去毒出汗然後取之曝乾為度只取椒於瓷合子內收每日空心新汲水下十粒治眼見黑花或頭旋目暗欲變青盲眼瞳微開羚羊角湯方羚羊角鎊決明子人參升麻玄參車前子各一兩羌活去蘆頭防風去叉各一兩半細辛去苗葉半兩上九味細銼如麻豆大每服五錢匕以水一盞半煎至八分去滓溫服不拘時候治肝腎虛風上攻眼生黑花頭目不利及內外障翳睛疼隱澀芎藭丸方芎藭細辛去苗葉蟬殼去土甘菊花荊芥穗蒼朮米泔浸透去皮切焙蕤仁去皮各一兩犀角鎊羚羊角鎊各一錢上九味搗羅為末煉蜜和丸如小彈丸大每服一丸茶酒或鹽湯嚼下不拘時候治眼見黑花或眼暗漸變青盲防風湯方防風去叉羚羊角鎊車前子細辛去苗葉各三分羌活去蘆頭黃芩去黑心人參決明子玄參甘草炙甘菊花各半兩上一十一味粗搗篩每服三錢匕水一盞煎至七分去滓食後溫服治眼見黑花去翳明目五倍丸方巴戟天去心一兩枸杞子揀淨二兩甘菊花揀淨三兩旋覆花揀淨四兩蜀椒去目及閉口者揀淨五兩上五味將椒入銀石器中入青鹽四兩醋三升慢火煮乾如器物小旋添醋煮候醋盡只將椒與前四味焙乾杵為末煉蜜和丸如梧桐子大每服三十丸至四十丸空心日午夜臥溫酒或鹽湯下治腎臟虛風上攻頭旋腦痛眼生翳或有黃黑花起如飛蠅及腰胯痠疼腳膝冷痹蓯蓉散方肉蓯蓉湯浸去皴皮焙一兩巴戟天去心檳榔煨銼萆薢麥門冬去心焙犀角鎊羚羊角鎊陟釐炒各半兩黃芩去黑心茺蔚子枸杞子人參玄參木香菟絲子酒浸一宿槐子決明子微炒丹參各三分上一十八味搗羅為散每服二錢匕空心溫酒調下臨臥又用梔子湯調下二錢匕治眼見黑花蜀椒丸方蜀椒揀去目及閉口者一斤用鹽一斤拌淹三宿三次換鹽焙去鹽玄參銼半斤上二味搗羅為末煉蜜和丸如梧桐子大每服鹽湯下三十丸食後臨臥服治眼見黑花赤痛昏暗甘露湯方葳蕤焙四兩上一味為粗末每服二錢匕水一盞入薄荷二葉生薑一片蜜少許同煎至七分去滓食後臨臥服治眼生黑花漸成內障及鬥睛偏視風毒攻眼腫痛澀癢短視倒睫雀目煮肝散方羌活去蘆頭獨活去蘆頭青葙子款冬花各一兩上四味搗羅為散每服三錢匕羊子肝一葉細銼淡竹葉數片同裹如粽子別用雄黑豆四十九粒米泔一盞銀石器內同煮黑豆爛泔干為度取肝細嚼溫酒下又將豆食盡空心日午夜臥服治肝腎風氣上攻眼生黑花枸杞丸方枸杞子九炊九曝二兩巴戟天穿心紫色者去心旋覆花擇淨蜀椒去目及閉口炒出汗各一兩上四味搗羅為末煉蜜和丸如梧桐子大每服三十丸臘茶清下不拘時候治一切眼時見黑花經年不愈羞明神效散方石決明黃連去須密蒙花各一兩上三味搗羅為散每服二錢匕食後臨臥熟水調下治眼見黑花昏暗還睛散方獨活去蘆頭麻黃去根節白茯苓去黑皮厚朴去粗皮生薑汁炙五味子蒺藜子炒去角槐子枸杞子菥蓂子麥門冬去心焙人參細辛去細葉白芷決明子車前子茺蔚子覆盆子地膚子丹參芎藭防風去叉黃芩去黑心升麻黃連去須各一兩一分遠志去心木通銼柏子仁各二兩上二十七味搗羅為散以米飲調服方寸匕食後服日再或因飲熱酒食五辛致黑風入眼或因重病後昏暗或因赤眼不見物或因虛損視物不明但瞳子不破者皆可愈治脾腎風虛下元久冷眼生黑花或時昏暗補諸不足磁石湯方磁石五兩杵搗生絹袋盛用水五升煎取二升半後去瓷石方下諸藥煎之黃耆人參沉香芎藭桂去粗皮菖蒲當歸焙補骨脂炒熟乾地黃焙肉蓯蓉酒浸去皴皮炙附子炮裂去皮臍羌活去蘆頭五味子乾薑炮覆盆子各一兩上十六味除磁石外銼如麻豆大拌令勻每劑一兩半用大羊腎一對去脂膜細切用磁石水三盞煮羊腎令熟次下藥煎取一盞半去滓分作二服治肝腎毒風攻衝眼生黑花昏暗視物不明兔肝丸方兔肝去筋膜薄切焙羌活去蘆頭黃連去須菊花各三分地骨皮龍齒車前子青葙子防風去叉柴胡去苗葳蕤白附子各半兩上一十二味搗羅為末煉蜜為丸梧桐子大每服二十丸食後竹葉熟水下治腎毒風攻衝眼生黑花風淚不止羌菊丸方羌活去蘆頭菊花焙各一兩白茯苓去黑皮蒺藜子炒搗去角枳殼去瓤麩炒附子炮裂去皮臍肉蓯蓉酒浸切焙黃耆銼各三分沉香銼兔肝炙萆薢各半兩上一十一味搗羅為末煉蜜和丸梧桐子大每服三十丸空心食前薄荷鹽湯下治肝腎氣虛眼目昏暗時見黑花飛蠅通明丸方石決明刮洗芍藥桔梗銼炒車前子各一兩茺蔚子熟乾地黃焙各二兩細辛去苗葉一兩半上七味搗羅為末煉蜜為丸如梧桐子大每服二十丸鹽湯下臨臥加至三十丸治一切眼疾青盲黑花赤脈熱淚黃連丸方黃連去須甘菊花車前子羚羊角鎊芒硝各一兩上五味搗羅為末煉蜜和丸如梧桐子大食後溫漿水下二十丸加至三十丸治眼看物如兩般或如蠅翅或似遊絲黃柏漿方黃柏一兩鵝梨三顆黃連去須一兩一分黃芩去黑心三分竹葉半兩上五味㕮咀如麻豆大以水二升煎至半升去滓內新瓷瓶中入龍腦半分調和每夜以銅箸點眼治風毒攻眼黑花不見物點眼白蜜黃連膏方白蜜半合黃連去須一兩大棗五枚淡竹葉一握洗上四味用水二升先煎竹葉取一升去滓下棗及黃連白蜜煎取三合去滓重湯煎如稀餳逐夜取少許點眼中三兩滴蓋復勿令塵灰入治腎臟風虛眼生黑花磁石丸方磁石細研水飛二兩丹砂研陳曲為末各一兩上三味除曲末外搗研為末用曲末煮糊和丸如梧桐子大每服二十丸鹽湯下空心食前治眼中赤脈癢痛時見黑花杏子膏方上取初生杏子仁一升古五銖錢七文入瓶盛密封埋門限下經一百日化為水每夕點兩眥頭息肉淫膚論曰脾肺有熱蘊積不散傳播肝經流注血脈上衝於目發於瞼眥息肉脹起攀系白睛隱澀妨悶故謂之息肉淫膚治眼赤膜不見物或生息肉前胡湯方前胡去蘆頭決明子炒黃連去須芍藥大黃銼炒升麻各二兩山梔子仁枳殼去瓤麩炒各一兩上八味粗搗篩每服五錢匕水一盞半苦竹葉十片煎至一盞去滓下芒硝末一錢匕食後臨臥溫服治眼赤息肉生翳膜漠不見物柴胡湯方柴胡去苗大黃銼炒各一兩半決明子炒澤瀉升麻芍藥白茯苓去黑皮枳殼去瓤麩炒梔子仁黃芩去黑心黃連去須細辛去苗葉杏仁湯浸去皮尖雙仁各一兩甘草炙銼二兩上一十四味粗搗篩每服五錢匕水一盞半苦竹葉十片煎至一盞去滓投芒硝末一錢匕食後臨臥溫服治眼生息肉淫膚葳蕤湯方葳蕤升麻黃連去須各一兩半秦皮去粗皮三分地骨皮山梔子仁甘草炙銼各一兩上七味粗搗篩每服五錢匕水一盞半煎至一盞去滓投芒硝末一錢匕食後臨臥溫服治眼眥生赤脈息肉澀痛不開熱勢不歇及目睛昏黃干藍湯方干藍車前子秦皮去粗皮細辛去苗葉決明子炒山梔子仁升麻芍藥甘草炙銼各一兩蕤仁一兩半上一十味粗搗篩每服五錢匕水一盞半苦竹葉十片煎至一盞去滓食後臨臥溫服治眼生赤脈息肉急痛不開如芥在眼磣痛大棗膏方大棗五枚取肉竹葉二握洗黃連去須搗末半兩上三味以水三盞於銅器中煎取一盞澄濾極清又煎取半盞瓷器盛旋取以銅箸點之治眼赤風淚出癢爛久積生翳息肉點眼石膽丸方石膽研銅青研硇砂去石研乾薑炮龍腦研戎鹽研各一分石決明七孔者刮洗焙搗末烏賊魚骨去甲秦皮去粗皮細辛去苗葉雞舌香各半兩決明子炒三分黃連去須一兩上一十三味搗研為末合和重研煉蜜丸如麻子大臨臥內大眥頭各一丸治目生雞冠蜆肉桔梗湯方桔梗去蘆頭大黃銼炒細辛去苗葉黃芩去黑心玄參芒硝煉過者各一兩防風去叉車前子各一兩半上八味粗搗篩每服三錢匕水一盞煎至六分食後臨臥溫服治目赤生翳玄參湯方玄參柴胡去苗決明子炒石膏羌活去蘆頭細辛去苗葉各