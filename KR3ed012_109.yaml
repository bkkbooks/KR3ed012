羅為細散每服二錢匕臘茶調下食後臨臥服治風赤眼胬肉癢痛點眼黃連膏方黃連去須黃柏去粗皮密炙升麻蕤仁去皮各一兩細辛去苗葉三分石膽末半錢研極細龍腦研細一兩蜜一兩上八味除龍腦石膽外粗搗篩以水二升煎至一升濾去滓兩遍澄清次下白蜜一兩煎令稀稠得所後入石膽龍腦攪勻內瓷閣中密封每點如黍米大治眼生翳膜赤脈胬肉隱澀癢痛有淚通神膏方蜜四兩青鹽一字麝香一字乳香半兩硇砂半字當歸切焙為末半錢白礬飛過半字黃連去須為末一錢上八味合研細青竹筒內煮半日綿濾去滓瓷合內收每點眼了瞑目少時以溫湯洗翳膜等並退下治風熱眼生胬肉沖貫黑睛及有花翳宜點真珠散方真珠末一分龍腦半分琥珀一分硃砂半分硇砂小豆大上五味同細研如粉每日三五度以銅箸取少許點大眥上治肝臟壅熱目中生胬肉沖貫黑睛赤痛不可止宜點黃連煎方黃連一分搗羅為末研白礬灰一分膩粉一錢井鹽半兩研硇砂一錢研胡黃連半兩搗羅為末研白龍腦一分細研上七味除龍腦外以淡漿水一大盞古錢二十文同內瓷瓶中封閉懸於淨舍內經二七日綿濾去滓入龍腦在藥中每日三五度以銅箸取少許點之黃連膏方黃連去須搗二兩竹葉二握淨洗切棗一兩焙乾為末上三味先將竹葉以水三盞煎至一盞半去竹葉下黃連棗末入白蜜半合煎至一盞綿濾去滓重煎如稀餳內瓷瓶中每以箸點目眥頭日夜三五次治肝肺熱盛目赤生胬肉胡黃連點眼方胡黃連去須銼如豆大一兩密陀僧研半兩蜜四兩重湯煮上三味先將黃連於蜜內浸一宿次日入密陀僧末和勻用白瓷碗盛卻用黑豆一斗於鍋內以水煮候熱卻將藥碗放在豆上勿令豆汁入內候豆熟為度取出用綿濾過入龍腦半錢匕以銀石器盛三日後點眼不拘時治目生胬肉點眼艾熏散方蕤仁去皮研細一兩膩粉一錢牛酥一兩熟艾如雞子許大上四味將三味入乳鉢中研令極細攤開次取艾火燒將乳鉢和藥復煙燻之候燒盡艾煙以槐木椎細研令煙氣勻入然後少少點眼眥日三五度治目生胬肉風翳障點眼杏仁膏方杏仁湯浸去皮尖雙仁研如膏半兩黃連去須半兩銼青鹽半兩膩粉一錢匕上四味先以水一盞半煎杏仁黃連至半盞濾去滓入鹽及膩粉更煎五七沸入閣中盛候冷每日點三次治風毒卒生胬肉欲滿及生浮膜點眼貝齒散方貝齒燒研一分鉛丹再研一分上二味更同入乳鉢中研令極細內瓷閣中盛每以銅箸點少許治一切眼疾昏澀熱淚赤脈胬肉遮蔽光明及風痛癢不止乳香散方乳香研二錢銅緑研馬牙硝研各一兩龍腦研半錢輕粉研半錢上五味各別研了更同研勻每用半錢匕新汲井水調洗之治一切內外翳膜遮障磣澀疼痛羞明怕日胬肉攀睛及冷熱淚椒黃丸方蜀椒去目及閉口者炒出汗一兩熟乾地黃洗切焙三兩上二味搗羅為細末煉蜜和丸如梧桐子大每服二十丸米飲下食後臨臥服治目生胬肉或癢或痛不可忍白龍散方馬牙硝光精者一兩龍腦一字上二味用紙一張裹迭牙硝按實常在著肉衣下養一百二十日為度取出細研如粉取四錢龍腦同研令細不計年歲深遠眼內或生翳膜漸漸昏暗遠視不明即瞳仁破散者並可治之每用兩米大點之治目生胬肉澀痛鯽魚貼方鯽魚鮮者上一味去皮骨取肉一片中央開一竅正貼眼上日三五度易之治風毒攻眼漸生胬肉磣澀疼痛甘草湯方甘草炙銼防風去叉羚羊角鎊羌活去蘆頭生乾地黃焙細辛去苗葉菊花玄參杏仁去皮尖雙仁炒令黃地膚子梔子仁青葙子當歸切焙決明子蜀椒去目併合口炒出汗各一兩上一十五味粗搗篩每服五錢匕水一盞半煎至一盞去滓食後溫服治目生胬肉或癢或痛息肉漸長侵復瞳仁點眼杏仁膏方杏仁湯浸去皮尖雙仁一分膩粉半錢上二味合研細如膏以綿纏箸頭點胬肉上不過四五遍即瘥
