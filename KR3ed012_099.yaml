body:
  text: 卷第九十九九蟲門九蟲統論論曰蟲與人俱生而藏於幽隱其為害也蓋本於正氣虧弱既食生冷復感風邪所以種種變化以至蕃息初若不足畏而其甚可以殺人善攝生者薄滋味節嗜欲蚤去三尸防患於未然彼九蟲亦將銷鑠於冥冥之中惟未進此道則攘孽剔蠹無使滋蔓蓋有藥存焉九蟲論曰九蟲一名伏蟲長四分二名蛔蟲長一尺三名白蟲長一寸四名肉蟲狀如爛杏五名肺蟲狀如蠶六名胃蟲狀如蝦蟆七名弱蟲狀如瓜瓣八名赤蟲狀如生肉九名蟯蟲狀如菜蟲至微細也是九蟲皆依乎腸胃之間若腑臟氣實則不能為害及其虛也發動變化侵蝕氣血浸成諸病不可不察治九蟲動作變生諸病貫衆丸方貫衆石蠶微炒各一兩一分狼牙銼雚蘆微炒蜀漆白殭蠶微炒厚朴去粗皮薑汁炙銼各三分雷丸炮一兩半白蕪荑炒一兩上九味搗羅為末煉蜜和為劑更於臼內入酥少許杵令勻熟丸如梧桐子大每服十丸空心溫漿水下午時臨臥再服治九蟲雞子丸方雞子去殼兩枚好漆綿濾過四兩蠟三兩粳米粉半升上四味先取漆蠟入銅鐺中用慢火煎攪令得所次入粳米粉又攪令勻煎令凝候可丸即取鐺置生黃土堆上才候稍溫即下雞子又擇令得所再置火上煎令可丸丸如小豆大隔宿勿食於空腹煎粟米飲下二十丸小兒五丸治九蟲麝香丸方黃連去須一兩白蕪荑炒二兩干蝦蟆一枚酥炙令黃焦乾漆炒令煙出一兩雷丸炮半兩定粉研一兩半上六味搗研為末入麝香少許再研羅勻用醋煮麵糊和丸梧桐子大每服溫水下十丸空心食前服治九蟲動作腹中刺痛口吐清水面色黑黃及蟲心痛者石榴枝湯方東引石榴枝三兩木香陳橘皮湯浸去白焙吳茱萸湯洗焙炒各一兩半大黃煨芍藥各二兩薏苡根二兩半上七味㕮咀如麻豆大每服五錢匕水一盞半煎至八分去滓溫服空心治大人小兒腹中蟲動痛發不止漆香散方乾漆炒令煙出二兩雄黃研五錢麝香研一錢上三味先搗乾漆為細末次入雄黃麝香再同研勻以密器盛之每服一錢匕煎苦楝根湯調下食前小兒以意加減治諸蟲痛乾漆散方乾漆炒令煙出半兩雄黃研一分檳榔一枚銼訶黎勒煨去核一分上四味搗研為散每服半錢匕入麝香少許用蔥汁生油調下空心服治諸蟲發動上連心痛青橘丸方青橘皮湯浸去白焙蕪荑微炒貫衆雷丸炮等分上四味搗羅為末煉蜜和丸如梧桐子大每服二十丸食前橘皮湯下加至三十丸蟲下為度治腹中諸蟲令人腹痛多食泥土及油者南粉散方南粉二錢細研上五更初用生油調下至食時蟲出盡治諸蟲痛砒黃丸方砒黃細研一兩上一味用水浸炊餅心為丸如小豆大每服二丸用煮肉湯下空心食前治諸蟲發動咬心痛蕪荑丸方白蕪荑微炒一兩上一味為末用砂糖和丸如梧桐子大每服十丸米飲下不計時服蛔蟲論曰蛔即九蟲敘所謂長蟲者今此析而治之蓋較之它蟲害人為多觀其發作冷氣臍腹撮痛變為嘔逆以至心中痛甚如錐刺昔人謂蛔厥貫心能殺人則所以治之不可緩也治蛔蟲貫衆散方貫衆去須一兩檳榔炮銼三兩當歸切焙一兩半鶴蝨去土微炒一兩白蕪荑微炒陳橘皮湯去白炒各一兩半雷丸炮一兩上七味搗羅為散每服一錢半煎大棗湯空心調服以利為度治蛔蟲心痛心中如錐刺時吐白蟲當歸湯方當歸切焙一兩桔梗銼炒一兩半陳橘皮去白微炒桂去粗皮人參各半兩赤芍藥三分鶴蝨去土微炒二分檳榔炮銼一分朴硝別研三分上九味除朴硝外粗搗篩入朴硝拌勻每服三錢匕水一盞煎至七分去滓空心服後半時辰再服治蛔蟲痛發作冷氣先從兩肋連胸背撮痛欲變吐逆當歸散方當歸切焙鶴蝨去土微炒各二兩陳橘皮去白微炒人參各一兩半檳榔炮銼三兩枳殼去瓤炒黃色芍藥各一兩半桂去粗皮一兩一分上八味搗羅為散每服二錢匕空心煎棗湯調下至晚再服治九種心痛蟲痛為先雷丸散方雷丸炮一兩貫衆去須一兩半狼牙去蘆頭並土銼一兩當歸切焙一兩半檳榔炮銼一兩桂去粗皮一兩半鶴蝨去土炒一兩陳橘皮去白炒一兩上八味搗羅為散每服二錢匕空心煎粟米飲調下晚食前再服以大下蛔蟲為度治蟲心痛柴胡湯方柴胡去苗一兩半當歸切焙食茱萸去枝莖各一兩芍藥一兩半厚朴去粗皮塗生薑汁炙熟銼一兩檳榔炮銼三枚郁李仁湯浸去皮三分上七味粗搗篩每服三錢匕水一盞煎至六分去滓食前溫服日三治蛔蟲攻心痛桔梗散方桔梗銼炒當歸切焙芍藥各三分橘皮去白微炒半兩檳榔煨銼鶴蝨去土微炒萆薢銼炒各一兩上七味搗羅為散每服二錢匕空心煎生薑棗湯調下至晚再服治蛔蟲心痛桑根白皮湯方桑根白皮細銼三兩醋石榴皮乾者一兩白蕪荑微炒檳榔炮銼厚朴去幹粗皮塗生薑汁炙熟各半兩上五味粗搗篩每服三錢匕水一盞入生薑一小塊拍破同煎至六分去滓空心服至晚再服治蛔蟲心痛腹中㽱刺痛不可忍往往吐醋水石榴皮湯方酸石榴皮三分檳榔炮銼一分桃符一兩半碎銼分為五度用胡粉一分微炒別研上四味先粗搗篩前二味後以胡粉拌勻分為五服煎每服水一盞入桃符一分酒半盞同煎至七分去滓空心溫服至晚再服治蛔蟲發作萆薢散方萆薢銼炒白蕪荑微炒狗脊去毛銼各一分上三味搗羅為散每服二錢匕溫酒調下欲服藥先隔宿吃牛肉乾脯一片次日空心服藥蟲下即瘥治疳蛔寸白蛔蟲等發作心腹㽱痛鶴蝨散方鶴蝨去土微炒三分檳榔炮銼一兩二分楝根皮結子東南引者以石灰如拳大水兩碗浸兩宿曝乾二兩半陳橘皮去白微炒半兩大麥糵炒一兩半牽牛子一半生用一半炒熟三兩糯米一合上七味搗羅為散每服二錢匕空腹煎粟米飲調下如未轉瀉即更服仍時時煎薑蜜湯熱投之治大人及小兒疳蛔腹中虛脹面目萎黃麝香散方麝香別研一分干蚯蚓慢火炙黃半兩干蝦蟆一枚塗酥炙黃赤色淨剔去骨並腹中惡物上三味先搗蚯蚓等細羅為散與麝香同研令勻細每服一錢匕空腹煎薏苡根湯調下治蟲蝕下部癢穀道中生瘡阿膠湯方阿膠炙燥當歸切焙青葙子炒各一兩上三味粗搗篩每服五錢匕水一盞半入艾葉十餘片同煎至一盞去滓空腹服午食前近晚各一治蛔蟲高良薑湯方高良薑銼一分苦楝根皮乾者銼二兩胡椒三十粒上三味粗搗篩每服三錢匕水一盞煎至六分去滓空心服服訖臥少時未得吃食或吐或瀉即瘥治蛔蟲懊憹雚蘆散方雚蘆炙黃碎銼乾漆搗碎炒令煙絶各二兩萹蓄去根及土乾者三分上三味搗羅為散每服一錢匕煎粟米飲調食前服日三治蛔蟲蟯蟲在胃令人漸漸羸瘦漆煎丸方清漆綿濾過白蜜清酒各半升上三味同攪令勻內於銅鍋中微火煎常令沸不住手攪候如膏可丸即止丸如雀卵大每服一丸隔宿不食空心溫酒化破服之蟲即下不下再服亦可丸如梧桐子大空心酒下二十丸治蛔蟲薏苡根湯方薏苡根一握去土碎銼上一味粗搗篩水三盞煎至一盞半去滓分二服空心先吃餳少許然後溫服治蛔蟲檳榔煎方檳榔炮銼五枚酸石榴根皮入土五寸東引者去土細銼一升上二味先將檳榔粗搗與石榴根各均分作三度用每度用水二升半煎至一升半絞去滓入粟米一合煮如粥平旦空心頓吃利下蟲即效治蛔蟲蠶蛹汁方蠶蛹上取繅絲蠶蛹兩合爛研生布絞取汁空心頓飲之非繅絲時即須依時收取蠶蛹曝乾搗羅為末用時以意斟酌多少和粥飲服之治大便忽見蟲是腹中蟲已多宜服桑根白皮湯方桑根白皮細銼二兩上一味粗搗篩分三服每服用水一盞半煎至八分去滓空腹頓服寸白蟲論曰寸白蟲乃九蟲之一種狀似絹邊葫蘆子因臟氣虛風寒濕冷伏於腸胃又好食生膾乾肉等所以變化滋多難於蠲治説者謂食牛肉飲白酒所致特一端爾亦未必皆緣此治寸白蟲密陀僧丸方密陀僧煅一兩硫黃研木香各半兩附子一枚生去皮臍別為末上四味先以釅醋一升煎附子末為膏次入三味藥和丸如緑豆大每服二十丸空心晚食前冷茶下不過數服蟲化為水永除根本治葫蘆蟲香附丸方木香為末一分附子生去皮臍為末硫黃研各半兩上三味先用密陀僧末半兩入醋熬成膏然後入三味藥末一處和丸如小豆大每服十五丸溫酒下食前服治蛔蟲寸白蟲檳榔散方檳榔銼一兩半當歸切焙鶴蝨各三分貫衆銼雷丸炮各半兩蕪荑仁微炒陳橘皮湯浸去白焙各三分上七味搗羅為散每服二錢匕空心煎棗湯調下至晚再服漸加至三錢匕治寸白蟲石榴根散方酸石榴根東行者去土五兩碎銼水二碗煎至一小碗去滓檳榔一顆生銼為末膩粉研半錢匕鉛丹炒半錢匕上四味先取檳榔末等三味細研令勻再溫石榴根汁調藥末五更頓服凡欲服藥侵早先食肥豬肉次便服藥治寸白蟲檳榔散方石榴根銼陳橘皮湯浸去白焙桑根白皮各一兩上三味細銼分作三服每服水一盞半煎取一盞去滓五更初調生檳榔末二錢匕至天欲明不瀉至曉又一服如蟲母未下再服或瀉不止吃冷粥止之治寸白蟲令人羸瘦石榴根湯方酸石榴根東行者一大握銼蕪荑微炒二兩牽牛子微炒別搗末半兩上三味前二味粗搗篩每服五錢匕水一盞半煎至一盞去滓下牽牛子末半錢匕煎沸空心溫服如人行十里再服以快利蟲下為度治寸白蟲食棐實方生棐實四十九枚去皮上一味於清旦空腹食七枚七日食盡其蟲即化成水治寸白蟲橘皮丸方陳橘皮湯浸去白焙乾二兩蕪荑仁炒狼牙去苗銼各一兩半上三味搗羅為末煉蜜和為劑更杵令勻丸如梧桐子大每服三十丸食前溫漿水下日三服治寸白蟲檳榔散方檳榔銼二兩陳橘皮湯浸去白焙桑根白皮銼各三分蕪荑炒一分上四味搗羅為散每服一錢半濃煎酸石榴根湯調空腹服欲服藥隔宿勿食侵早先取干脯一片細嚼咽汁少頃即服藥至晚蟲未下煮桑白皮汁服之治寸白蟲檳榔湯方檳榔銼一十四枚薤白細切一盞許鹽豉一盞許上三味先將檳榔粗搗篩與余物各分為三分煎每分以水三盞煎至一盞半去滓分三服隔宿勿食侵早空心一服如人行六七里一服蟲未下再服治寸白蟲干脯湯方干脯一片如手大石榴根東行者一握上二味並細銼以水四片浸一宿明日平旦煎至一升去滓分三服空腹先嚼干脯一片即服藥如人行十里許又一服每服藥後以手按患人腹上藥力易行其蟲自下凡服藥取月一日至五日以前蟲頭向上服良治寸白蟲檳榔散方檳榔一枚銼酸石榴皮一分銼焙上二味搗羅為散分作三分先用二分以淡豬肉汁調下五更初服候半時辰再將一分服之即時取下蟲永去根本治寸白蟲纍取不盡久令人面黃心中如飢黑鉛散方黑鉛沙子畫家銀塗是也上一味研極細每服二大錢匕五更初肉汁調頓服至平明取下蟲立瘥治寸白蟲雷丸散方雷丸不拘多少浸軟去皮切焙上一味搗為散每服五更初先吃炙肉少許次用藥一錢匕稀粥半盞調服之治寸白蟲玉粉散方定粉一兩上一味研細每服二錢匕用生麻油調於五更時頓服至晚逐下蟲永瘥治寸白蟲水銀丸方水銀錫白鑞與上二味結沙子各一分上三味熟研以糯米粥丸如皂子大每服溫酒夜臥嚼下一丸次日食前取下蟲母瘥治寸白蟲檳榔散方檳榔如雞心者一枚為末上一味欲服藥隔宿不吃晚食放飢睡先用鹽醋等炙雜肉脯一片香熟次日五更令病人空腹嚼脯咽津卻吐出肉用溫米飲調檳榔末一錢匕頓服即睡至午前取下蟲方可食甚者不過再服月一至初五以前服尤佳治寸白蟲石榴根湯方酸石榴根一握楝皮一兩檳榔三枚銼搗為末上三味除檳榔末外各細銼以水三盞煎至一盞半去滓入檳榔末攪勻分溫二服空心相斷服盡當有蟲出次煮薤粥補之治寸白蟲年月深久蟲類滋蔓者方錫沙作銀塗者無即以黃丹代油和如梧桐子大蕪荑仁檳榔二物等分為散上煎石榴根濃汁半升調散三錢匕下五丸中夜早晨皆可服治寸白蟲石榴根湯方上以酸石榴根東引者一握細銼用水半碗均作三分煎取二分更入冷水半盞同煎去滓取汁來日雞鳴時將檳榔一顆用冷熟水磨一分餘二分為末更入朴硝半錢同入研檳榔汁內拌勻即入前石榴汁內溫過先嚼干脯一片咽汁少頃頓服此藥八分一盞坐良久待藥行後方睡睡覺腹痛蟲即出蟯蟲論曰蟯蟲甚微細若不足慮者然其生化衆多攻心刺痛時吐清水在胃中侵蝕不已日加羸瘦甚則成痔瘻疥癬癰疽諸癩害人若此絶其本根勿使能殖則毒而治之所不可忽治蟯蟲芫花散方芫花擇醋浸一宿炒令黃黑色狼牙去苗土雷丸煨桃仁去皮尖雙仁炒研各一兩上四味搗羅為散每服一錢匕宿不食平旦煎粟米飲調下治蟯蟲蛔蟲及痔蟲蝕下部生瘡桃皮湯方桃木皮乾者去粗皮銼槐子微炒各一兩半艾葉半兩上三味粗搗篩每服三錢匕水一盞棗一枚劈破煎至六分去滓空心食前夜臥各一服治蟯蟲蜜香丸方密陀僧煅一兩麝香研半錢硫黃研一分定粉研半兩上四味搗研為細末醋煮麵糊丸如梧桐子大每服十丸空心蕪荑湯下治蟯蟲巴豆桃仁丸方巴豆五枚和皮燒令煙斷去皮心桃仁去皮尖雙仁炒二十枚上二味同研極細丸如大麻子大每旦空心服溫漿水下大人兩丸小兒一丸蟲未下再服治蟯蟲石榴散方酸石榴根銼乾漆碎炒煙出狼牙去苗土鶴蝨檳榔銼各一兩上五味搗羅為細散每服一錢匕空心溫酒調下治蟯蟲攻心如刺吐清水艾汁方生艾葉並嫩心切二升上一味搗研絞取汁兩盞許宿不食平旦先嚼干脯少許後頓飲汁不能盡即兩日服又方雚蘆一兩微炒上一味搗羅為散每服一錢匕空心煮羊肉汁調下治蟯蟲蒺藜散方蒺藜子並苗葉上一味七月七日採陰乾燒存性細研每服二錢匕食後煎蕪荑酒調下日三治蟯蟲在胃漸加羸弱槐皮丸方槐皮乾者銼桃仁去皮尖雙仁生用楝實去核生用各半兩上三味搗羅為末煉豬膏丸如人指大以綿裹導下部中治蟯蟲咬人下部癢方水銀一兩上一味用蒸棗膏和丸如人指大綿裹臨臥內下部中一宿內藥時常留綿帶子在外治蟯蟲在胃令人漸羸熬漆丸方好漆醇酒白蜜各半升上三味於銅器中和勻微火熬令可丸丸如雞頭大每服一丸宿勿食空腹溫酒下蟲未下再服治腎熱四肢腫急腹中有蟯蟲貫衆散方貫衆三枚炒乾漆炒煙出二兩吳茱萸湯洗焙乾炒一兩半蕪荑炒胡粉研槐白皮各一兩杏仁四十枚去雙仁皮尖炒上七味搗羅為散每服三錢匕空心井華水調下日二服五臟蟲論曰五臟蟲者緣臟真衰弱熱氣熏蒸而成之傳所謂肉腐出蟲魚枯生蠹理固如此其名狀之異見於九蟲敘可辨而察也治心臟勞熱傷心有長蟲名曰蠱長一尺貫心為病雷丸丸方雷丸灰火炮過陳橘皮湯浸去白焙桃仁去雙仁皮尖麩炒各一兩一分狼牙去連苗處淨刷去土銼一兩半貫衆大者去須半兩白蕪荑炒青葙子炒乾漆炒令煙出各一兩亂髮如雞子大一團燒為灰上九味除亂髮燒灰外八味搗羅為末然後與亂髮灰同研令勻煉蜜和更於鐵臼內塗酥杵令勻熟丸如梧桐子大每服空心溫酒下十五丸至晚再服米飲亦得治肺勞熱生蟲其形如蠶令人咳逆氣喘或謂憂隔氣隔恚隔寒隔熱隔皆從勞氣所生名曰膏肓病針灸不至麥門冬丸方麥門冬去心焙十兩蜀椒去目及閉口者炒出汗一兩人參一兩一分遠志去心附子炮裂去皮臍細辛去苗葉各一兩半甘草炙一兩半乾薑炮一兩桂去粗皮百部焙白朮黃耆銼細各一兩一分杏仁去雙仁皮尖焙乾麩炒令黃半兩上一十三味搗羅為末煉蜜和更於鐵臼內塗酥杵令勻熟丸如酸棗子大含化稍稍咽津治肺勞熱生蟲在肺為病桑根白皮酒方桑根白皮東引者取一升狼牙去連苗處淨刷去土三兩吳茱萸根皮東引者淨刷去土五兩上三味細銼用酒七升煮至二升去滓分作三服每日空腹一服治肝勞生長蟲為病恐畏不安眼中赤茱萸根丸方東行吳茱萸根去土銼三兩蠟三兩雞子五枚去殼取黃用粳米一盞上四味除蠟並雞子外各搗羅為末先以銅鍋內煎蠟熔即下茱萸根末米粉雞子黃煎令可丸即丸如小豆大早晨煎粟米飲下五十丸小兒服二十丸蟲出即瘥治脾勞有白蟲長一寸在脾為病令人好嘔胸中咳咳即嘔而不出前胡湯方前胡去蘆頭白朮銼赤茯苓去黑皮枳殼去瓤麩炒細辛去苗葉旋覆花去枝葉炒常山銼松蘿各一兩半龍膽去苗杏仁去雙仁皮尖麩炒各一兩上一十味粗搗篩每服五錢匕水二盞入竹葉十片淨洗細切同煎至一盞去滓空心服吐之即瘥若腹中熱滿入芒硝半錢匕梔子仁一兩黃芩一兩半苦參一兩治脾勞熱有白蟲在脾中為病令人好嘔茱萸根浸酒方吳茱萸根東引者一尺銼麻子八升淨揀陳橘皮湯浸去白炒二兩上三味先搗碎橘皮麻子如泥然後拌茱萸根用酒一斗浸一宿慢火上微煎絞去滓分作五服每服空心溫服蟲即下凡欲合藥時忌言合殺蟲藥治腎勞熱四肢腫急有蟯蟲如菜中蟲生於腎中貫衆散方貫衆大者三枚去須乾漆炒令煙絶二兩吳茱萸水洗七遍焙乾炒一兩半白蕪荑炒槐白皮乾者各一兩銼杏仁去雙仁皮尖麩炒令黃色半兩胡粉炒令黃色研一兩上七味除別研胡粉外搗羅為散更與胡粉同研令細每服二錢匕空腹用井華水調服日晚再服三蟲論曰三蟲亦九蟲之數曰蛔曰赤曰蟯是也其發動諸病較之它種為甚蛔蟲又曰長蟲長一尺動則吐清水心痛貫心則死赤蟲狀似生肉動則腸鳴蟯蟲至細微形如菜蟲居胴腸間多則為痔極則為癩或生諸癰疽癬瘻瘑疥而其變甚多三蟲為患如此古人必析而治之意亦深矣治三蟲發動心痛等疾白蘞丸方白蘞碎銼狼牙去蓮苗處及土銼碎雚蘆微炙桃花貫衆擇去心須陳橘皮湯去白焙乾炒各三分白蕪荑微炒半兩上七味搗羅為細末煉蜜和為劑更於鐵臼內入酥杵令勻熟丸如小豆大每服二十丸隔宿勿食空腹漿水下至晚再服漸加至三十丸妊娠婦人勿服治三蟲發痛面目黃不下食鱉甲丸方鱉甲去裙襴醋炙黃二兩白朮一兩半陳橘皮湯去白焙一兩木香狗脊去毛各一兩半檳榔炮四兩吳茱萸水浸二宿每日三次換水洗去涎焙乾微炒一兩上七味搗羅為細末煉蜜和為劑置臼內入酥杵令勻熟丸如梧桐子大每日空腹煎青橘皮湯下三十丸晚食前再服治三蟲芎藭散方芎藭白芷雷丸煨桔梗炒各一兩上四味同搗羅為細散每服二錢匕用蜜並醋各少許解勻調服或米泔汁調服亦可每日空腹日午近晚各一亦可蜜丸服之治三蟲雚蘆散方雚蘆炙黃四兩乾漆炒令煙盡二兩吳茱萸水浸兩日每三次換水洗去涎焙乾微炒半兩上三味搗羅為細散每服二錢匕煎粟米稀粥調空心服治三蟲保定肺氣去寒熱養肌膚益氣力利小便及諸暴中偏風濕痹強骨髓天門冬煎方天門冬去心生用十斤白蜜七兩上二味先取天門冬細切爛研如泥用酒一斗如絞取汁並蜜攪令勻銅器中重湯上煎仍用竹篦攪候如餳每服如彈丸大空腹溫湯服之或用生地黃汁一盞同煎妙治三蟲亂髮灰散方亂髮淨洗如雞子大燒灰丹砂研如面水飛過一兩上二味同研極細每服一錢匕醋調空腹服之治三蟲雷丸散方雷丸炮一兩芎藭一兩上二味搗羅為細散每服一錢匕空腹煎粟飲調下日午近晚各一服治三蟲鶴蝨散方鶴蝨微炒二兩雚蘆微炒一兩上二味搗羅為細散每服一錢匕用豬羊肉臛汁調服空腹日午近夜各一服治臟腑內一切蟲令人偏好食生物及面黃嘔吐或時心腹發痛但是蟲病悉治白金散方狼毒不拘多少上一味搗羅為細散每服一錢匕用餳一皂子大砂糖少許以溫水同化下臨臥後腹空時服之服藥時先服微動氣食藥一服來日早取下蟲為效治大人小兒諸蟲為病及骨蒸熱勞羸瘦飛尸遁尸鬼疰室女經脈不行五心煩熱怠惰少力寸金散方乾漆不拘多少炒令煙出上一味搗羅為細散每服一錢匕以生油溫水攪勻調服若治小兒每一斤再入白蕪荑仁三兩搗羅取細末更研雄黃半兩合研勻量兒大小亦用生油溫水調服清米飲亦得如是室女經脈不行服之必行其餘蛔蟲寸白蟲服無不效者治三蟲神效雚蘆散方雚蘆微炙二兩上一味搗羅為細散每服二錢匕隔宿勻食於清旦用羊肉臛汁調服之蟲自下治三蟲檳榔湯方檳榔三枚灰火煨過上一味粗搗篩用水三盞煎至一盞半去滓分三服空腹日午前近夜各一服其蟲盡下或和蔥白鹽豉同煮飲之亦佳治三蟲鶴蝨散方鶴蝨微炒一兩半上一味搗羅為細散每服一錢匕用豬肉肉臛汁調空心服之
