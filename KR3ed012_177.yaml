body:
  text: 卷第一百七十七小兒骨蒸論曰水為陰火為陽水者精氣也火者陽氣也小兒精氣未盛體性多熱若衣裘傷厚過食熱物或患時氣大病之後重亡津液陽氣偏盛水不勝火腑臟積熱熏灼肌體甚則銷鑠骨髓是為骨熱之病久不已變成骨蒸也治小兒十五歲以下骨蒸熱勞盜汗體熱咳嗽煩躁發渴長肌肉退熱桃仁青蒿煎丸方桃仁湯浸去皮尖研半兩麝香研一分柴胡去苗丹砂研紫菀去苗土鱉甲去裙襴醋炙各一兩上六味除麝香丹砂外並搗羅為末共研勻用青蒿汁童子小便生地黃汁各一盞於銀石器內熬汁入藥末一半慢火再熬攪得所余藥末盡和勻杵三二百下丸如緑豆大每服五七丸至十丸空心食前煎陳粟米飲下日三服治小兒不生肌膚羸瘦骨熱小便黃赤麥門冬丸方麥門冬去心焙一兩人參黃耆銼青蒿子黃連去須桑根白皮銼地骨皮枳殼去瓤麩炒各半兩柴胡去苗三分上九味搗羅為末煉蜜丸如緑豆大每服五丸至七丸溫熟水下量兒大小加減治小兒骨熱生風龍膽丸方龍膽一兩熊膽研一分馬牙硝研朴硝研山梔子去皮玄參人參枳殼去瓤麩炒柴胡去苗當歸切焙陳橘皮去白焙各半兩麝香研半錢沉香半兩甘草炙銼赤茯苓去黑皮各一兩上一十五味除研外搗羅為末共研勻煉蜜丸如梧桐子大一歲一丸溫水化下治小兒骨熱日晚發熱面赤五心煩躁四肢無力飲食減少夜多盜汗面色萎黃犀角湯方犀角鎊柴胡去苗枳殼去瓤麩炒麥門冬去心焙赤茯苓去黑皮芍藥大黃銼炒桑根白皮銼黃耆銼人參各一分鱉甲去裙襴醋炙半兩上一十一味粗搗篩每一錢匕水一盞入桃仁七枚去皮尖漿水煮過麥門冬四十九粒去心煎至七分去滓分溫三服食後臨臥治小兒潮熱骨蒸羸瘦久嗽咳喘犀角湯下生犀角鎊半兩柴胡去苗秦艽去苗土各一兩白朮人參赤茯苓去黑皮木香各半兩甘草炙一分上八味粗搗篩每服一錢匕水七分一盞入小麥三七粒同煎至六分去滓溫服日三治小兒肌瘦五心潮熱解骨熱長肌肉益氣保童丸方丹砂研一分大黃銼炒赤芍藥梔子仁各半兩知母切焙鱉甲去裙襴醋浸炙各一兩人參胡黃連各半兩上八味除研外搗為細末入丹砂同研浸蒸餅為丸如小緑豆大每服五丸至十丸溫蜜湯或人參湯下治小兒骨熱勞疾面黃肌瘦發熱夜臥有汗胡黃連丸方胡黃連夜明砂五靈脂各半兩柴胡去苗一兩麝香研半錢鱉甲去裙襴醋炙人參各半兩上七味搗羅為末用豬膽汁煮麵糊丸如緑豆大每服十丸至十五丸米飲下不拘時治小兒骨熱皮膚瘡肌體瘦弱身熱連翹湯方連翹山梔子去皮甘草炙黃芩去黑心秦艽去苗土防風去叉麥門冬去心焙各一兩知母焙荊芥穗各半兩上九味粗搗篩每服一錢匕水七分煎至四分去滓食後臨臥溫服治小兒骨蒸潮熱瘦瘁頰赤煩躁盜汗食不生肌病後餘毒久不解羚羊角湯方羚羊角鎊地骨皮秦艽去苗土麥門冬去心焙枳殼去瓤麩炒大黃銼炒柴胡去苗赤茯苓去黑皮芍藥桑根白皮銼黃耆銼人參鱉甲去裙襴醋炙各一兩上一十三味粗搗篩每服一錢匕水一盞入青蒿少許煎至六分去滓食後溫服量兒大小加減治小兒骨熱十五歲以下骨蒸熱勞遍身如火日漸黃瘦夜臥多汗咳嗽煩渴丹砂丸方丹砂二兩飛研柴胡去苗為末四兩上二味研勻用獖豬膽汁拌和飯甑上蒸一次候冷丸如緑豆大每服十丸用桃仁烏梅煎湯下日三服小兒痰實論曰小兒乳食不下吐涎沫而微壯熱者痰實也此因乳哺冷熱不調停積胸膈或水飲留滯氣不升降致令痰熱壅滯壯熱煩悶心神不寧不瘥則變驚癇之病治小兒痰實壯熱頭痛石膏湯方石膏別搗研一兩一分大黃銼炒一兩半柴胡去苗一兩一分升麻知母焙黃芩去黑心芍藥枳實去瓤麩炒各三分甘草炙一兩半大青半兩上一十味粗搗篩每二錢匕水一盞入生薑少許同煎至六分去滓分溫三服量大小加減治小兒八歲以上熱結痰實不能食大黃湯方大黃銼炒一兩柴胡去苗升麻黃芩去黑心知母焙芍藥梔子仁各三分枳實去瓤麩炒黃半兩細辛去苗葉一分上九味粗搗篩每二錢匕水一盞入竹葉十片同煎至六分去滓分溫三服早晚各一量兒大小加減治小兒百日以來痰實柴胡湯方柴胡去苗三分當歸切焙一分赤茯苓去黑皮大黃銼炒各半兩甘草炙一分上五味粗搗篩每一錢匕水半盞煎至三分去滓分溫三服早晚各一量兒大小以意加減治小兒百日以來痰實壯熱兼驚龍齒湯方龍齒大黃銼炒各一分枳殼大者一枚去瓤麩炒黃朴硝甘草炙銼各一分上五味粗搗篩每服一錢匕水半盞煎至三分去滓食前溫服日二量兒大小加減治小兒百日以來痰實人參飲方人參半兩赤芍藥一分上二味粗搗篩每一錢匕水半盞入生薑一片同煎至三分去滓分溫三服量兒大小加減治小兒痰實壯熱茯苓湯方赤茯苓去黑皮人參黃芩去黑心大黃銼炒各半兩上四味粗搗篩八九歲兒每服二錢匕水一盞煎至半盞去滓溫服日再更量兒大小加減治小兒痰壅結實四通湯方桔梗炒大黃銼炒各半兩陳橘皮湯浸去白焙紫菀去苗土各一分上四味粗搗篩每服一錢匕水八分煎至四分去滓食後溫服日再更量兒大小加減小兒客忤論曰小兒無故吐下青黃赤白色水穀解離腹痛夭矯反倒面變五色其狀似癇但眼不上戴者名曰客忤此由小兒血氣未充精神未定忽見非常之物或見未識之人或為異類觸犯暴然發作故名客忤診其脈弦急數者忤也若乳母醉後及房勞喘困氣乏即便乳兒最為切忌劇則不可救矣治小兒客忤猝痛及氣滿常腹痛麝香湯方半夏湯洗十遍生薑汁炙黃耆各一兩甘草炒乾薑炮桂去粗皮各半兩上五味粗搗篩一二歲兒每一錢匕水七分煎至四分去滓納麝香少許分溫二服不拘時候更隨兒大小加減治小兒客忤吐利白石脂湯方白石脂一兩蜀漆半兩附子炮製去皮臍一分牡蠣煅一兩上四味銼如麻豆一二歲兒每一錢匕水七分煎至四分去滓分溫二服空心午後更量兒大小加減治小兒客忤驚啼壯熱犀角散方犀角鎊麥門冬去心焙鉤藤丹砂研各一分牛黃研半分麝香研三大豆許上六味搗研為散每服半錢匕煎金銀湯調下不計時候治小兒客忤腹滿痛大便不通人參湯方人參龍膽鉤藤柴胡去苗黃芩去黑心桔梗炒赤芍藥茯神去木當歸切焙各半兩蜣螂去足炙二枚大黃銼炒一兩上一十一味粗搗篩每一錢匕水一盞煎至五分去滓分溫二服更量兒大小加減治小兒客忤驚啼方牛黃末一字豬乳一栗殼許上二味相和漸漸滴兒口中治小兒猝忤躽啼腹堅滿雀屎丸方雀屎一兩一分當歸切焙半兩上二味搗羅為末煉蜜丸如麻子大五十日兒每服一丸以奶汁下空心午後服更量兒大小加減治小兒中忤欲死心腹痛雄黃散方雄黃麝香各一分上二味細研為散周晬兒每服一字用刺雞冠血調灌之空心午後服更量兒大小加減治小兒客忤驚邪鬼魅安神犀角丸方犀角鎊車前子白茯苓去黑皮人參各半兩雄黃研一兩上五味搗研為末取桃白皮十兩桃符十兩水三升煎一升去滓煎成膏和前藥丸如麻子大每服三丸桃柳湯下治小兒中客忤吐青白沫及食飲皆出腹中痛氣欲絶桂參湯方桂去粗皮一兩人參一分上二味粗搗篩一二百日兒每半錢匕水半盞煎至三分去滓分溫三服兒大以意增之治小兒猝中客忤驚啼大叫伏龍肝膏方伏龍肝研二兩雞子去殼一枚地龍糞研一兩上三味相和研勻或干更入少水調如膏先用桃柳湯浴兒後將藥塗兒五心及頂門上治小兒中客忤吐青白沫及食飲皆出腹中痛氣欲絶桂枝湯方桂去粗皮一兩上一味粗搗篩一二百日兒每半錢匕以水半盞煎至三分去滓分溫三服空心午後更量兒大小加減治客忤桂湯塗之方上取桂濃煎去滓塗兒五心常令濕治小兒猝客忤銅鑑鼻飲方銅鑑鼻上一味燒令赤淬酒中以酒少許灌兒若兒小未能飲者令含之亦愈治小兒客忤浴方上取馬糞三升燒令煙絶以酒煎三五沸去滓溫溫浴兒即愈治小兒客忤壯熱浴方上取李葉煎湯去滓溫溫洗浴兒瘥治小兒被客氣忤犯狀似驚癇但眼不上戴耳後脈急數龍膽飲方龍膽鉤藤銼柴胡去苗黃芩去黑心桔梗銼炒赤芍藥茯神去木各一分蜣螂二枚炙去足頭甲大黃蒸三度炒一兩上九味粗搗篩每服二錢匕水一小盞煎取四分量兒大小加減分數服治小兒客忤吐沫如癇方上青錢十四文以水一斗五升煎取一斗浴兒立瘥小兒中惡論曰小兒無故猝然心腹刺痛悶亂欲絶者中惡也由兒陰陽氣血不調神守不強故鬼毒惡氣得以中之凡腹大而滿脈緊大而浮者死緊細而微者生若余勢久留再發則變為注治小兒中惡心腹猝痛鬼箭羽湯方鬼箭羽半兩真珠末一分羚羊角鎊桔梗炒朴硝細研升麻芍藥柴胡去苗各一兩桃仁三十枚去雙仁皮尖麩炒黃芩去黑心大黃銼炒鬼臼各一兩半上一十二味粗搗篩一二歲兒每一錢匕以水一小盞煎至六分去滓分溫二服空心午後各一服量兒大小以意加減治小兒中惡心痛辟邪氣雄黃丸方雄黃研真珠研各一兩麝香研半錢牛黃如棗大研巴豆四十枚去皮膜心研去油盡大棗十四枚蒸熟去皮核研膏上六味除棗外同研為末入棗膏和少許蜜塗臼中搗一千杵丸如粟米大一二歲兒每服三丸薄荷湯下空心午後各一服量兒大小以意加減治小兒中惡心腹堅脹痛顏色青黑大便不通芍藥湯方芍藥桔梗炒桃仁七枚去皮尖雙仁炒黃芩去黑心柴胡去苗升麻各一兩大黃銼炒二兩鬼臼一兩甘草炙半兩杏仁四十枚湯浸去皮尖雙仁炒麝香半錢研上一十一味納十味粗搗篩入麝香和勻一二歲兒每一錢匕以水一小盞煎至六分去滓分溫二服空心午後各一服以利為度隨兒大小加減小兒中蠱論曰人有聚毒蟲為蠱者隨飲食入腹能變惑食入五臟小兒時有中之者遂心腹刺痛懊悶急者即死緩者涉歷年月漸至羸困若注易傍人則為蠱注之病治小兒中蠱毒腹內堅如石面目青黃小便淋瀝變易無常羚羊角湯方羖羊角屑蘘荷各一兩梔子仁七枚黃連去須赤芍藥牡丹皮各一分犀角屑半兩上七味粗搗篩每服二錢匕水一小盞煎至六分去滓分溫二服日三更量兒大小加減治小兒初中蠱毒升麻湯方升麻桔梗銼炒栝蔞根各半兩上三味粗搗篩每服一錢匕水半盞煎至三分去滓溫服日三量兒大小加減治小兒中蠱腹內堅痛鼓皮湯方敗鼓皮三分炙令黃銼苦參銼蘘荷根各一兩上三味粗搗篩每服二錢匕以水一盞煎至六分去滓分溫二服日三更量兒大小加減治小兒飛蠱狀如鬼氣雄黃散方雄黃研麝香研犀角鎊搗為細末各半兩上三味同研令勻每服以溫水調下半錢匕日四服更量兒大小加減治小兒五種蠱毒比聖湯方馬蔸鈴根上一味粗搗篩每服二錢匕水一小盞煎至五分去滓空腹頓服當時隨吐蠱出未快吐再服又方敗鼓皮一斤燒灰上一味細研如粉空心粥飲調服一錢匕須臾病兒呼蠱主姓名病即愈又方薺苨一兩上一味搗羅為末以粥飲調下一錢匕更量兒大小加減治小兒中蠱毒腹內堅痛面目青黃羸瘦骨立病變無常神功散方桃上寄生二兩上一味搗羅為散每服半錢匕如茶點服日三又方麝香上一味研細每服一字匕空腹溫水調下即吐出蠱毒未效再服治小兒中蠱危急再造湯方甘草半兩生銼上一味粗搗篩水一中盞煎至五分去滓分溫二服當吐蠱出若預防蠱者宜熟炙甘草煮汁服之即內消不吐神效小兒尸注論曰人有三尸能為人患無問老幼但精神衰弱氣血不足者率多被害小