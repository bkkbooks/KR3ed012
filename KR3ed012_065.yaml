body:
  text: 卷第六十五咳嗽門咳嗽統論論曰內經謂肺寒則外內合邪因而客之則為肺咳微則為咳甚則為痛為泄然腑臟皆有咳非獨肺也蓋肺合皮毛故先受之肺咳之狀咳而喘息有音甚則唾血心咳之狀咳而心痛喉中介介如梗狀甚則咽腫喉痹肝咳之狀咳而兩脅下痛甚則不可以轉轉則兩胠下滿脾咳之狀咳而右胠下痛陰引肩背甚則不可以動動則咳劇腎咳之狀咳而腰背相引痛甚則咳涎五臟之咳久而不已各以其合移於六腑故脾移於胃肝移於膽肺移於大腸心移於小腸腎移於膀胱其終則又移之於三焦胃咳之狀咳而嘔甚則長蟲出是也膽咳之狀咳而嘔膽汁是也大腸咳之狀咳而遺失是也小腸咳之狀咳而失氣氣與咳俱失是也膀胱咳之狀咳而遺溺是也至於三焦之咳則咳而腹滿不欲食飲使人多涕唾而面目浮腫又有所謂十咳者其證雖各不同要之不離於五臟六腑而已診其手陽明之經其脈浮則為陽實病腹滿善喘咳古人又云咳嗽脈浮喘者生小沉匿者死脈浮直者生沉𩊅者死各以其脈別之也咳嗽論曰肺主皮毛皮毛先受寒邪乃為咳嗽五臟六腑又皆稟氣於肺故各以其時感寒而受病亦能為咳形證不同治亦隨異學者審之治咳嗽胸滿氣急桑白皮湯方桑根白皮銼紫蘇連莖葉知母焙貝母去心炒款冬花半夏湯洗七遍焙乾五味子各一兩厚朴去粗皮生薑汁炙甘草炙銼人參各半兩上一十味粗搗篩每服三錢匕水一盞生薑三片同煎至七分去滓溫服日三治咳嗽上膈煩滿貝母丸方貝母去心炒白茯苓去黑皮麥門冬去心焙山芋百合各一分甘草炙銼阿膠炙燥各半兩五味子一兩上八味搗羅為細末用黃蠟一兩二錢熔作汁入末拌和丸如彈子大每服一丸水一盞煎至七分和津溫服細呷治咳嗽咽嗌不利蛤蚧散方蛤蚧一對雌雄頭尾全者不得有蛀蚛水洗淨焙乾枇杷葉拭去毛三分柴胡去苗半兩紫菀淨洗焙乾三兩貝母去心炒一兩人參半兩鹿角膠炙燥三分上七味搗羅為細散每用梨一顆去皮細切淨器研之生絹濾自然汁於銀器內用藥末半錢匕入梨汁中以慢火熬三五沸取出每食後臨臥服之去枕仰臥一飯頃治咳嗽不拘日近年深皆效黑靈丸方羌活去蘆頭獨活去蘆頭各一分巴豆三十枚不去皮半夏三十枚同入瓶子內鹽泥固濟炭火三斤煅過取出入前二味上三味搗羅為細末煉蜜丸梧桐子大每服一丸以後馬兜鈴飲下之馬兜鈴飲方馬兜鈴半兩桂去粗皮一分甜葶藶微炒半兩上三味粗搗篩每服一錢匕水一盞煎至八分去滓服前丸藥其餘飲時時呷令藥氣常在咽喉中妙治咳嗽阿膠湯方阿膠炒令燥桑根白皮銼炒甘草炙銼各一兩五靈脂炒貝母去心炒知母銼焙各半兩上六味粗搗篩每服三錢匕水一盞烏梅一枚生薑三片同煎至七分去滓通口服治咳嗽久不已百部煎方生百部汁生地黃汁生薑汁生百合汁如無以藕汁代蜜各一盞棗四兩去皮核上六味同熬成煎每服一匙溫麥門冬熟水半盞化開空心日午臨臥各一服治咳嗽不拘日月遠近杏仁煎方杏仁湯浸去皮尖雙仁炒麻黃不去根節大黃銼炒柴胡去苗甘草炙銼桂去粗皮各二兩上六味搗研為細末先用水一斗煎藥末水盡後旋再添五升煎令得所以生絹濾去滓再熬成煎瓷器中盛每服一皂子大臨臥含化咽津治咳嗽不計新久防己丸方防己杏仁湯浸去皮尖雙仁炒貝母去心焙甘草炙銼各二兩甜葶藶炒四兩上五味搗羅為細末麵糊丸綠豆大每服二十丸生薑湯下治咳嗽百部丸方百部新瓦上炒紫菀去苗土款冬花擇洗各一兩半桔梗炒貝母去心炒各一兩上五味搗羅為細末煉蜜丸梧桐子大每服二十丸煎甘草烏梅湯下食後臨臥服治肺伏冷氣咳嗽溫肺丸方乾薑炮一兩半皂莢去皮炙令黃陳橘皮湯浸去白焙白茯苓去黑皮各半兩上四味搗羅為細末煉蜜丸梧桐子大每服二十丸生薑湯下不拘時治咳嗽桃仁丸方桃仁杏仁二味各湯浸去皮尖雙仁細研一兩款冬花貝母二味各一兩搗細末與前研藥和勻上四味先以沙糖一兩入銚子內銷熔後入藥同熬黃熟入臼搗丸如彈子大每服一丸含化咽津治氣弱痰涎咳嗽沉香湯方沉香阿膠炙燥各半兩人參桑根白皮銼炒各一兩上四味粗搗篩每服二錢匕水一盞入生薑三片煎至七分去滓食後服小兒減半服治咳嗽貝母散方貝母十枚大者去心麩炒令黃阿膠炙燥甘草炙銼各半兩上三味搗羅為細散每服二錢匕臨臥煎糯米飲調下服後去枕仰臥治咳嗽去痰涎利胸膈玉液湯方天南星炮半夏湯洗七遍去滑各一兩上二味粗搗篩每服二錢匕水一盞生薑五片同煎至七分去滓放溫食後夜臥細細呷之治咳嗽石葦散方石葦去毛檳榔銼等分上二味搗羅為細散生薑湯調下二錢匕治肺虛咳嗽日久款冬花熏方款冬花木鱉子各一兩上二味細銼每服二錢匕燒香餅慢火焚之吸菸良久吐出涎凡如是熏五六次每次以茶清潤喉次服補肺藥治咳嗽經久不瘥者膠豉湯方牛皮膠黃明者炙燥為末人參為細末上二味每用膠末一錢匕人參末二錢匕用薄豉汁一盞入蔥白一寸煎一二沸去滓常令溫暖遇嗽時呷三五呷後依前溫之候嗽時再服治咳嗽訶黎勒散方訶黎勒不拘多少緊實者炮熟去核上一味為細散每服二錢匕用豬𦚠一枚去脂膏劈開滲藥在內更入打破烏梅一枚合定以芭蕉葉包之外以濕紙重裹煨令香熟去紙葉烏梅只將藥並𦚠慢慢嚼吃日三兩服治咳嗽晝減夜加不得眠睡食即吐逆五味子湯方五味子蒺藜子炒去角麻黃去根節炒掠去沫焙桑根白皮銼白石脂杏仁去皮尖雙仁炒百合各一兩半貝母煨去心款冬花枳殼去瓤麩炒紫菀去苗土柴胡去苗各一兩旋覆花桂去粗皮各半兩上一十四味粗搗篩每服五錢匕水一盞半入生薑五片粳米五十粒煎取八分去滓溫服不拘時候治咳嗽鼻塞清涕顫掉緩弱少氣不足時時欲嘔五味子散方五味子黃耆細銼各三分甘草炙銼一分人參桂去粗皮羌活去蘆頭乾薑炮細辛去苗葉附子炮裂去皮臍白朮各半兩上一十味搗羅為散每服二錢匕生薑烏梅湯調下治肺胃虛寒咳嗽痰盛呀呷有聲嘔吐停飲咽喉干痛上氣喘滿面目虛浮自汗惡風語聲嘶破背寒中冷心下悸動噦逆噁心全不入食肺寒湯方款冬花紫菀去土甘草炙桂去粗皮麻黃去節乾薑炮五味子杏仁湯浸去皮尖炒半夏湯煮軟焙乾各二兩細辛去苗葉一兩上一十味粗搗篩每服三錢匕水一盞生薑五片大棗三枚劈破同煎至七分去滓溫服不計時候治咳嗽喘急蛤蚧丸方蛤蚧酥炙一對葶藶子紙上炒別研杏仁湯浸去皮尖雙仁炒各二兩款冬花貝母去心訶黎勒皮各一兩甘草炙銼半兩上七味除葶藶杏仁外搗羅為末別研二味再研勻煉蜜和丸如梧桐子大食後煎桑白皮湯下二十丸曉嗽論曰肺感於寒微者即成咳嗽蓋肺主皮毛寒傷膚腠則肺先受之其狀咳嗽語聲嘶破咽喉不利也治暴感風邪咳嗽感通湯方甘草炙銼麻黃去根節芎藭馬兜鈴防風去叉各一兩黃明膠炙燥三錢上六味粗搗篩每服二錢匕水一盞煎至七分去滓早晚食後溫服治大人小兒中冷暴嗽或上氣喘逆或惡寒鼻出清涕杏仁湯方杏仁去皮尖雙仁麩炒研紫菀去苗土黃芩去黑心當歸切焙甘草炙銼麻黃去根節桂去粗皮陳橘皮湯浸去白焙各半兩木香一分大黃銼炒一兩半上一十味粗搗篩每服三錢匕水一盞煎至七分溫服小兒以意加減治傷風暴得咳嗽貝母湯方貝母去心三分款冬花麻黃去根節杏仁湯浸去皮尖雙仁炒研各一兩甘草炙銼三分上五味粗搗篩每服三錢匕水一盞生薑三片煎至七分去滓溫服不拘時治暴發咳嗽款冬花湯方款冬花二兩桑根白皮銼貝母去心五味子甘草炙銼各半兩知母一分杏仁去皮尖雙仁炒研三分上七味粗搗篩每服三錢匕水一盞煎至七分去滓溫服治暴發咳嗽胸膈不利痰涎喘急貝母煎方貝母去心紫菀去苗土杏仁去皮尖雙仁麩炒研桑根白皮各一兩五味子百部甘草炙白前各半兩上八味並細銼以水七盞煎至四盞去滓入生地黃汁五合生麥門冬汁三合白蜜三合酥二兩於銀石器內以慢火煎成煎收於不津器中每服一匙頭不拘時含化治暴嗽飴糖煎方飴糖乾薑炮為末各一兩半豉二兩上三味分作兩劑每劑先以水二盞煮豉取沸去滓次入飴糖待消後入乾薑末攪勻以瓷器盛分為五七服沸湯化下治大人小兒暴嗽太白丸方石灰一兩蛤粉四錢上二味為細末湯浸蒸餅和丸如豌豆大焙乾每服三十丸溫韭汁下小兒七丸至十丸早晚食後臨臥服治暴嗽伏龍肝丸方伏龍肝半兩豉一兩半上二味同炒搗羅為末煉蜜丸如梧桐子每服二十丸米飲下治暴嗽訶黎勒含化方訶黎勒生去核一枚上一味拍破含之咽津次煎檳榔湯一盞投之治暴嗽百部根酒方百部根四兩上一味以酒一斗漬之經宿每服半盞慢火溫飲日三服治肺感寒邪暴嗽喘逆三拗湯方杏仁不去皮尖麻黃不去根節甘草生上三味等分粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時久嗽論曰肺主皮毛皮毛易感於寒邪寒邪傷於肺則為咳嗽五臟各以其時受之為五臟之咳久不已傳於六腑六腑不已三焦受之是為久咳其人咳而腹滿不欲食多唾面腫氣逆乃其證也治久咳嗽及勞嗽阿膠散方阿膠二兩如無以黃明膠四兩代並炒燥人參半兩杏仁二十粒去皮尖雙仁炒黃蜀葵花款冬花各一分甘草炙銼二錢上六味搗羅為散每服二錢匕空心熱糯米飲調下晚食前再服治積年咳嗽人參煎方人參末一兩栝蔞取肉搗研酥蜜各二兩上四味調勻盞子盛於飯上蒸九度每服一匙溫水化下日三治久咳嗽貝母丸方貝母去心炒紫色四兩款冬花三兩紫菀去苗土二兩上三味搗羅為末煉蜜和丸如梧桐子大每服二十丸食後生薑湯下日再治久咳嗽異功散方陳粳米一升生薑半斤搗自然汁浸焙乾厚朴去粗皮塗生薑汁蜜炙二兩訶黎勒煨三枚小者檳榔銼一枚甘草半兩半生半炙銼上五味搗羅為散每服一錢匕米飲調下食後日三治久咳嗽喘息黑金散方豬蹄合子黑者四十九枚水浸洗淨天南星一枚大者銼款冬花帶蕊者末半兩上三味用瓶子一枚鋪豬蹄合子在內上以天南星勻蓋之合了鹽泥赤石脂固濟火煅白煙出為度候冷取出入款冬花末並麝香一分龍腦少許同研每服一錢匕食後煎桑根白皮湯調下若年少即用生犀角中年即用羚羊角末各半兩代豬蹄合子治久咳嗽款冬花散方款冬花去梗阿膠炒燥各一兩天南星銼炒三分惡實炒一分甘草炙銼半兩上五味搗羅為散每服三錢匕水一盞煎至六分食後臥溫服治久咳嗽蛤蚧丸方蛤蚧一對雌雄頭尾全者酥炙人參半兩半夏湯洗七遍切焙一分杏仁湯浸去皮尖雙仁蜜拌炒黃研一兩栝蔞大者二枚去皮子取肉蒸熟研阿膠炙燥半兩青橘皮湯浸去白焙一分干棗煮熟去皮核研二兩上八味除研外搗羅為末合研勻入生蜜少許和丸如梧桐子大每服十丸糯米飲或熟水下空心臨臥服治久咳嗽阿膠散方阿膠炙燥人參杏仁湯浸去皮尖雙仁炒甘草炙銼黃耆半炙半生銼紫菀去苗土桔梗銼麩炒桑根白皮炙銼各一兩上八味搗羅為散每服用豬𦚠一枚蔥白三寸細切滲藥二錢匕入鹽花少許濕紙裹煨熟細嚼溫酒下空心服治久咳嗽紫菀散方紫菀去苗土款冬花各一兩百部半兩上三味搗羅為散每服二錢匕煎生薑烏梅湯調下食後臨臥服治久咳嗽乳石散方鍾乳粉款冬花去梗甘草炙銼各半兩杏仁湯浸去皮尖雙仁麩炒研桂去粗皮各一兩栝蔞一枚