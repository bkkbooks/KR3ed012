body:
  text: 卷第九十四諸疝門諸疝統論論曰疝者痛也陰氣積於內復為寒氣所加使營衛不調血氣虛弱故風冷入腹而成疝也或少腹痛而不得大小便或手足厥繞臍痛白汗出或冷氣逆上搶心令腹心痛或裡急腹痛又有五疝七疝其證非一故云諸疝當診其脈弦而急者是謂疝也皆由腑臟虛弱飲食不節血氣不和寒溫不調之所生也寒疝論曰寒疝為病陰冷內積衛氣不行結於腹內故遇寒則發其狀惡寒不欲食手足逆冷繞臍痛白汗出治寒疝四肢逆冷氣弱汗出蓬莪朮湯方蓬莪朮一兩炮乾薑半兩炮附子炮裂去皮臍一兩芎藭三分桂去粗皮一兩白朮三分檳榔一兩芍藥一兩上八味銼如麻豆每服三錢匕水一盞煎七分去滓溫服不拘時治寒疝攻注胸脅滿痛汗出木香湯方木香三分檳榔銼細辛去苗葉赤茯苓去黑皮人參芍藥當歸切焙桂去粗皮前胡去蘆頭青橘皮湯浸去白焙以上各一兩上一十味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時治寒疝手足逆冷身體疼痛冷汗自出烏頭湯方烏頭炮裂去皮臍二兩桂去粗皮一兩細辛去苗葉三分上三味銼如麻豆每服三錢匕水一盞煎七分去滓溫服治寒疝來去腰腹攻痛茱萸湯方吳茱萸湯浸焙炒三分生薑切焙微炒豉微炒桂去粗皮各半兩上四味粗搗篩每服三錢匕水一盞酒少許同煎七分去滓溫服治寒疝冷痛氣弱汗自出不欲食人參湯方人參白茯苓去黑皮各一兩蜀椒去目並閉口者炒出汗乾薑炮各半兩附子炮裂去皮臍檳榔白朮青橘皮湯浸去白焙各一兩上八味銼如麻豆每服三錢匕水一盞煎七分去滓溫服治寒疝亦治陰疝走馬湯方巴豆二枚去皮心膜炒杏仁二枚去皮尖雙仁炒上二味取綿裹椎令極碎投熱湯二合絞取白汁服之未瘥更一服治寒疝來去疼痛冷汗出牡丹丸方牡丹皮桂去粗皮各二兩烏頭炮裂去皮臍二枚上三味搗羅為末煉蜜丸如梧桐子大每服二十丸溫酒下空心日午臥時服治寒疝胸脅支滿食飲不化臍腹㽱痛桂心丸方桂去粗皮五分吳茱萸湯洗焙乾炒三兩白薇一分乾薑炮一兩烏頭炮裂去皮臍半兩蜀椒去目並閉口者炒三分芎藭一兩防葵半兩白芷三分上九味搗羅為末煉蜜丸如梧桐子大每服十丸溫酒下食前治寒疝滿逆手足不溫遍身疼痛烏頭湯方烏頭實大者五枚去皮臍生切白蜜一斤桂去粗皮二兩上三味先以慢火煎蜜及烏頭候蜜減半濾去烏頭別就一處以水三盞煮桂候減半濾去桂將桂汁並前蜜汁共和別煎取二盞許每服半盞溫服未知再服其知如醉狀得吐為中病也治寒疝繞臍痛結硬不消木香丸方木香附子炮裂去皮臍硇砂飛研各一兩上三味搗羅為末酒煮麵糊和丸如梧桐子大每服三十丸溫酒下空心食前治寒疝卒痛積聚不散上衝心腹與陰相引痛則汗出高良薑湯方高良薑炒檳榔生銼木香當歸切焙各一兩半吳茱萸湯浸焙乾炒一兩上五味粗搗篩每服三錢匕水一盞煎至七分去滓溫服心疝論曰內經謂診得心脈而急病名心疝少腹當有形也心為牡臟小腸為之使故曰少腹當有形也夫臟病必傳於腑今心不受邪病傳於腑故小腸受之為疝而痛少腹當有形也世之醫者以疝為寒濕之疾不知心氣之厥亦能為疝心疝者當兼心氣以治之治心疝心痛悶絶木香散方木香炮陳橘皮湯浸去白炒各一兩高良薑乾薑炮訶黎勒皮赤芍藥枳殼去瓤麩焙赤茯苓去黑皮各半兩草豆蔻去皮芎藭牽牛子炒各三分上一十一味搗羅為散每服二錢匕水一盞煎至七分溫服不拘時治心疝心痛虛冷煩悶當歸湯方當歸切炒乾薑炮赤芍藥黃耆蜀椒去目並閉口炒出汗半夏為末薑汁作餅曝乾人參青橘皮湯浸去白炒附子炮裂去皮臍甘草炙銼各一兩厚朴去粗皮生薑汁炙二兩桂去粗皮半兩上一十二味㕮咀如麻豆每服三錢匕水一盞煎至七分去滓溫服不拘時治心疝心痛如錐所刺牡丹丸方牡丹皮桂去粗皮芍藥烏頭炮裂去皮臍細辛去苗葉甘草炙銼木香吳茱萸湯浸焙炒檳榔各一兩上九味搗羅為末煉蜜丸如梧桐子大每服二十丸溫酒下不拘時治心疝心痛不可忍木香散方木香羌活去蘆頭檳榔生銼牡丹皮當歸切炒桂去粗皮青橘皮湯浸去白切炒蓬莪朮煨各一兩上八味搗羅為散每服二錢匕沸湯或溫酒調下不拘時治心疝心脅痛及繞臍痛芍藥丸方芍藥桔梗去蘆頭炒細辛去苗葉蜀椒去目並閉口炒出汗桂去粗皮乾薑炮各三分附子炮裂去皮臍半兩上七味搗羅為末煉蜜丸如梧桐子大每服二十丸溫酒或米飲下不拘時治心疝心痛肢體虛冷蓬莪朮煮散方蓬莪朮煨檳榔生銼附子炮裂去皮臍甘草炙銼桂去粗皮各一兩胡椒半兩芎藭白朮各三分上八味搗羅為散每服二錢匕水一盞煎至七分溫服不拘時治痼冷在內陰氣交攻心痛如刺橘皮益智湯方青橘皮湯浸去白焙益智去皮烏頭炮裂去皮臍威靈仙去土各一兩上四味銼如麻豆每服三錢匕水一盞生薑三片鹽少許煎至六分去滓食前溫服日三治陰冷交攻心疝疼痛紫桂丸方桂去粗皮半兩當歸焙三分吳茱萸湯浸焙炒一兩上三味為細末醋煮麵糊丸如梧桐子大每服二十丸炒生薑鹽酒下米飲亦得日三治心疝冷痛不可忍三溫散方附子炮裂去皮臍蓬莪朮煨銼各一兩胡椒半兩上三味為細散每服一錢匕熱酒調下不拘時婦人醋湯下厥疝論曰內經謂黃脈之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風夫疝藏疾言隱而難見陰沉而伏也今脾虛風寒客於腹膜之間不能與胃通行水穀之氣結而成積使氣道厥逆而痛故謂之厥疝治厥疝腹中陰冷痛積氣上逆吳茱萸湯方吳茱萸湯洗焙乾炒二兩烏頭炮裂去皮臍細辛去苗葉各三分高良薑銼炒當歸切焙乾薑炮桂去粗皮各一兩上七味銼如麻豆大每服五錢匕以水二盞煎取一盞去滓溫服日二治厥疝上攻腹痛無時蘹香丸方蘹香子炒吳茱萸湯洗焙乾炒桂去粗皮胡椒楝實銼碎麩炒延胡索各半兩木香虻蟲去翅足炒海蛤芫花醋炒焦硇砂研木通各一分上一十二味搗羅為細末酒煮麵糊和丸如梧桐子大每服十丸鹽酒下食前服治厥疝上搶心腹冷痛山茱萸丸方山茱萸吳茱萸湯洗焙乾炒食茱萸楝實銼碎麩炒馬藺花蘹香子炒青橘皮湯去白焙陳橘皮湯去白焙乾薑炮京三稜炮各三分附子一枚重半兩者炮裂去皮臍上一十一味搗羅為細末醋煮麵糊和丸如梧桐子大每服二十丸酒或鹽湯下空心服治厥疝腹中冷痛當歸乾薑湯方當歸切焙乾薑炮附子炮裂去皮臍人參甘草炙銼細辛去苗葉芍藥各一兩上七味㕮咀如麻豆每服三錢匕水一盞煎七分去滓溫服不拘時治厥疝逆上攻腹冷痛木香湯方木香檳榔生銼烏頭炮裂去皮臍細辛去苗葉當歸切焙吳茱萸湯洗焙乾炒枳殼去瓤麩炒甘草炙各一兩上八味㕮咀如麻豆每服三錢匕水一盞煎七分去滓溫服不拘時治厥疝冷逆攻心腹痛細辛丸方細辛去苗葉芍藥吳茱萸湯洗焙乾炒人參白朮桂去粗皮乾薑炮甘草炙銼當歸切焙附子炮裂去皮臍各一兩上一十味搗羅為細末稀麵糊丸如梧桐子大空心米飲下三十丸日三寒疝心腹痛論曰疝者痛也本由寒氣內積陽衰陰盛不得散釋寒邪因得攻擊或上搶心或腹內㽱刺發即俱痛故名寒疝心腹痛也治寒疝心腹痛胸脅支滿不下食汗出嘔逆人參湯方人參白茯苓去黑皮檳榔銼木香芍藥芎藭當歸切焙桂去粗皮青橘皮湯浸去白焙各一兩上九味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治寒疝心腹痛柴胡湯方柴胡去苗四兩大棗去核焙六枚黃芩去心人參甘草炙銼半夏湯洗去滑生薑汁製桂去粗皮芍藥各一兩半上八味粗搗篩每服三錢匕水一盞生薑一棗大切煎至七分去滓溫服不拘時治寒疝心腹痛或逆搶心煩滿不得臥惡風驚惕不食變發寒熱吳茱萸丸方吳茱萸湯洗焙炒一兩細辛去苗葉芍藥柴胡去苗旋覆花黃芩去黑心紫菀去苗土人參白朮白茯苓去黑皮乾薑炮桂去粗皮附子炮裂去皮臍甘草炙銼半夏湯洗七遍去滑當歸切焙各半兩上一十六味搗羅為末煉蜜丸如梧桐子大每服二十丸至三十丸溫酒下不拘時治寒疝心腹痛不可忍汗出悶絶椒附湯方蜀椒去目並閉口炒出汗二百粒附子炮裂去皮臍一枚粳米半盞乾薑炮半兩半夏湯洗七遍去滑切十二枚甘草炙銼一兩上六味㕮咀如麻豆每服五錢匕水一盞半入生薑半分切棗二枚劈破煎至一盞去滓溫服空心食前治寒疝心腹痛附子丸方附子炮裂去皮臍二兩桃仁去皮尖雙仁別研膏三兩蒺藜子炒去角一升上三味搗研為末煉蜜丸如梧桐子大每服二十丸溫酒下不拘時治寒疝心腹痛汗出厥冷地黃湯方生乾地黃焙三兩甘草炙白茯苓去黑皮人參當歸切焙各二兩羊肉去脂切三斤上六味前五味細銼將羊肉用水二斗煮取汁一斗去羊肉入諸藥煮取七升入蔥白一把切棗十四枚劈破再煮取六升絞去滓每溫服一盞不拘時治寒疝心腹痛裡急當歸湯方當歸切三兩生薑切五兩羊肉去脂膜切作片一斤上三味以水一斗煮取五升去滓每溫服一盞不拘時日三夜二寒疝積聚論曰氣之所積名曰積氣之所聚名曰聚蓋積者陰也陰沉而伏發則不離其部聚者陽也陽浮而動上下無所留止其痛無定處令人灑淅惡寒飲食不為肌膚或吐利脹滿或心下如覆杯腹中如人臂所橫皆寒疝積聚之證也治寒疝邪氣往來堅固積聚不散多寒不得臥苦汗出大小便不利桔梗丸方桔梗銼炒半兩葶藶子紙上熬一兩一分藜蘆去蘆頭炙半兩厚朴去粗皮生薑汁塗炙銼一兩一分杏仁去皮尖雙仁炒五十枚桂去粗皮人參沙參各三分特生礜石一兩燒半日許附子炮裂去皮臍一兩一分上一十味搗羅為末煉蜜和丸如梧桐子大每服五丸或七丸米飲或溫酒下日三治寒疝積聚大如鱉形小如杯狀乍來乍去腸胃脹滿寒則腸鳴心下寒氣上搶胸脅支滿芫花丸方芫花醋炒蜀椒去目並閉口炒出汗各一分大黃銼炒一兩半細辛去苗葉一兩半桔梗炒一兩一分烏頭炮裂去皮臍一兩吳茱萸湯洗焙乾炒芍藥白茯苓去黑皮各三分龍膽半兩半夏湯洗七遍去滑一分上一十一味搗羅為末煉蜜和丸如梧桐子大每服十丸米飲或溫酒下日三利下毒物為效治寒疝積聚邪氣往來厥逆搶心痛羸瘦少氣胸脅滿不嗜食績命丸方食茱萸二兩半炒芍藥細辛去苗葉前胡去蘆頭各一兩一分乾薑炮烏頭炮裂去皮臍各二兩半紫菀去苗土黃芩去黑心白朮白薇芎藭人參生乾地黃焙各一兩一分蜀椒去目並閉口炒出汗桂去粗皮各二兩半上一十五味搗羅為末煉蜜和丸如梧桐子大每服七丸米飲或溫酒下食前服治寒疝積聚來去攻擊疼痛不欲飲食木香湯方木香訶黎勒皮炮檳榔銼厚朴去粗皮塗生薑汁炙銼青橘皮湯浸去白焙各半兩白朮人參桂去粗皮各一分赤茯苓去黑皮三分上九味粗搗篩每服三錢匕水一盞生薑三片煎七分去滓溫服不拘時治寒疝積聚胸腹堅急脹滿不食檳榔湯方檳榔生銼桃仁去皮尖雙仁炒郁李仁炒去皮木香京三稜炮各一兩桂去粗皮青橘皮湯浸去白焙各半兩上七味粗搗篩每服三錢匕水一盞生薑三片煎至七分去滓溫服不拘時治寒疝積聚心腹結痛飲食不下鱉甲湯方鱉甲醋炙去裙襴京三稜炮銼大黃銼炒各一兩當歸切焙桂去粗皮赤芍藥木香枳殼去瓤麩炒訶黎勒炮取皮檳榔銼各半兩上一十味粗搗篩每服三錢匕水一盞生薑三片煎至七分去滓溫服不拘時治寒疝凝結積聚不散攻注腹內疼痛