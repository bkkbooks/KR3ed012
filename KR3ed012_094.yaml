心食前以紙裹蔥白一寸煨熟細嚼溫酒下治控睪上而不下痛引少腹小腸受寒丁香丸方丁香木香狼毒蜀椒去目並閉口炒出汗各一兩附子炮裂去皮臍芍藥桔梗炒乾薑炮各半兩細辛去苗葉一兩半上九味搗羅為末煉蜜和丸梧桐子大每服三十丸食前炒蘹香子酒下治控睪小腸氣痛硇砂丸方硇砂一兩別研細水飛蓬莪朮炮銼楝實麩炒青橘皮湯浸去白焙木香丁香蓽澄茄肉豆蔻去殼炮檳榔銼附子炮裂去皮臍巴戟天去心蘹香子炒各半兩上一十二味除硇砂外搗羅為末以酒一升先取硇砂並飛硇砂水一盞同熬及一入升諸藥再熬頻攪候得所丸如梧桐子大每服二十丸空心溫酒下加至三十丸治控睪痛引少腹烏藥散方烏藥木香蘹香子微炒青橘皮湯浸去白焙高良薑炒各半兩檳榔銼二枚楝實十枚巴豆七十枚微炒敲破同楝實二味用麩一升炒候麩黑色揀去巴豆並麩不用上八味除炒巴豆不用外搗羅為散每服一錢匕溫酒調下空心食前服痛甚炒生薑熱酒調下治小腸受邪睪丸控引上下臍腹痛乳香丸方丹砂研半兩硇砂研一分胡椒半兩海蛤一分楝實麩炒去核半兩當歸切焙半兩蘹香子銼一兩木通銼半兩馬藺子炒半兩上九味搗研為細末用乳香一分研細以酒煮糊和諸藥末丸如梧桐子大每服二十丸溫酒下鹽湯亦得空心食前治小腸受邪控睪引少腹痛楝實丸方楝實麩炒去核蘹香子炒山茱萸食茱萸吳茱萸湯洗焙乾炒青橘皮湯浸去白焙陳橘皮湯浸去白焙馬藺花醋炒各一兩芫花醋炒半兩上九味為細末醋煮麵糊和丸如梧桐子大每服二十丸溫酒下空心食前
