body:
  text: 卷第一百一十九重舌論曰重舌者以心脾二經蘊伏熱氣循緣經絡上衝舌本遂令舌下血脈脹起如小舌狀故謂之重舌蓋心開竅於舌足太陰之脈屬脾絡胃上膈俠咽連舌本散舌下故也治心脾有熱生重舌紅雪煎方羚羊角鎊升麻吳藍黃芩去黑心芍藥人參大青淡竹葉切各一兩檳榔為末三兩木香為末二兩木通銼山梔子去皮丹砂研葛根蘇枋木椎碎別煎各一兩朴硝研一斤桑根白皮一兩枳殼去瓤麩炒三分麝香研半兩甘草炙二兩上二十味除朴硝蘇枋木丹砂木香麝香檳榔外銼如麻豆大以水二斗五升煎至九升濾去滓再煎沸下朴硝不住手以柳萆攪候水腳欲盡下蘇枋木汁更煎三五沸於新砂盆中次下木香檳榔麝香丹砂等末攪令勻每服一錢匕綿裹咽津甚者蜜水調下一錢匕食後服治心脾積熱生重舌及時行陰黃丹石發動一切熱毒石膏煎方石膏凝水石滑石並碎各一斤鬱金研犀角鎊屑各一兩黃芩去黑心五兩山梔子去皮二兩升麻三兩黃連去須三兩芒硝研各一斤馬牙硝研半兩上一十一味先以石膏凝水石滑石等用水三斗入金十兩無金入銀十兩亦得先煎金石藥汁至一斗五升澄清次入犀角鬱金草藥等再煎至七升去滓再煎先下芒硝煎三兩沸次下馬牙硝攪令化不住手攪良久用一新瓦盆盛一兩日凝結每服一錢匕用蜜水調下大人小兒以意加減服治重舌牛黃散方牛黃研人參各半兩白茯苓去黑皮三分大黃銼炒半兩當歸切焙一分甘草炙半兩丹砂研一分麝香研半兩上八味搗羅為細散每服半錢匕溫水調下甚者加至一錢匕食後服治重舌及天行陰黃丹石發動一切熱毒朴麝散方朴硝研五兩麝香研一分黃芩去黑心半兩山梔子去皮一兩甘草炙一分淡竹葉一握蘆根銼一兩上七味銼五味如麻豆大入研者二味以新汲水三升將藥入鐺中煎約半升以來去滓澄清取瓷瓶一個傾藥汁在內以物蓋定瓶口用鹽泥固濟慢火煅一復時去火放冷卻將瓶安在水中無令水至瓶口浸經一宿至明日打破瓶子取藥如金色研為細散每服半錢匕冷水調服綿裹咽津亦得治舌腫及重舌黃藥湯方黃藥甘草炙銼各一兩上二味粗搗篩每服三錢匕以水一盞煎至七分去滓食後溫服舌腫強論曰心氣通於舌脾脈俠咽連舌本散舌下心脾二經受風邪則舌本強不能卷舒又或熱氣加之則腫腫則筋脈脹急勢連咽喉礙於呼吸法宜刺之泄去惡血及餌以藥治舌腫強白茯苓湯方白茯苓去黑皮牛黃研各三分犀角屑一分甘草炙人參羚羊角屑熟乾地黃焙白朮桂去粗皮各半兩上九味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日三治木舌腫強及天行病丹石發動一切熱毒射干湯方射干木通銼大黃銼炒馬藺子各一兩半漏蘆去蘆頭升麻當歸切焙桂去粗皮甘草炙各一兩上九味粗搗篩每用五錢匕水一盞半煎至八分去滓分溫服日三夜二治傷寒舌腫黃連湯方黃連去須大黃生用各一兩大青去根升麻黃藥各半兩甘草炙三分上六味粗搗篩每服五錢匕水二盞入黑豆一撮同煎至一盞去滓分溫二服病未退每服更加芒硝末半錢匕湯成下以微利為度治牙疼連牙關急口眼相引木舌腫強不能轉牡蠣散方牡礪煅研伏龍肝附子炮裂去皮臍白礬煅研各半兩上四味搗研為散以酒和如泥每用一錢於患處塗貼吐津治舌本強兩邊痛柴胡散方柴胡去苗升麻各一兩梔子仁半兩上三味搗羅為散每服一錢匕熟水調下日三治舌忽緊硬逡巡能塞殺人者塗百草霜方百草霜好鹽各半兩上二味同研勻表裡塗之立效治舌強不能語礬石散方白礬研桂去粗皮各一兩上二味搗羅為散每用一錢匕或半錢匕安舌下治舌腫滿口言語不得䗪蟲散方䗪蟲五枚炙鹽半兩上二味細研為散以水二盞煎十餘沸去滓熱含冷吐以瘥為度治舌強不語麝香散方麝香皂莢各半兩上二味研搗為散每用半錢滲舌腫上吐津又方蛇膽一枚焙乾上一味碾為末敷舌上有涎吐之治木舌腫強螵蛸散方桑螵蛸十二月者炙黃上一味為散每服半錢匕萊蔔汁調下治舌腫滿口氣息不通須臾殺人急以手指刺破潰去惡血亦可用微針決破次用半夏酒方半夏十枚上一味以苦酒一升煮取八合稍稍漱口熱含冷吐半夏動人咽喉以薑汁解之治舌腫滿塞喉欲死蚯蚓塗方蚯蚓一條上一味以少許鹽花化為水以塗咽喉舌上良久漸消治舌卒腫起滿口塞喉氣息不通頃刻殺人以針決舌下兩邊第一大脈出血以銅箸燒令赤尉瘡數遍令血絶仍以甘草湯治之方甘草不拘多少上一味濃煎湯熱含冷吐未瘥更以釜底炲煤和苦酒調塗舌上下脫去更塗須臾即消牙齒歷蠹論曰牙齒歷蠹者腎氣虛弱骨髓不固氣血衰耗不能榮潤於牙齒故令牙齒黯黑謂之歷蠹治牙齒歷蠹黯黑皂鹽散方皂莢一挺酥炙去皮子鹽花槐白皮各半兩升麻白礬麩令汁枯甘松香細辛去苗葉各一分上七味為細散先以鹽揩齒後用藥半錢匕勻敷之治齒歷蠹穀精草散方穀精草燒灰白礬灰一分蟾酥一片炙乾麝香少許上四味細研為散於宣露處貼之治齒歷蠹柳枝膏方柳枝銼一握防風去叉銼細辛去苗葉銼鹽花各一分上四味用水三盞煎至一盞半去滓更煎成膏以瓷器收每用薄紙剪如柳葉塗藥貼齒上治歷齒蠹麝香散方麝香一字定粉一錢黃蠟半兩上先細研前二味後熔蠟調之攤在紙上每臨臥時剪作片子貼所患齒齦上治牙齒歷蠹脆壞欲盡方白礬不拘多少上一味新綿裹之以所患齒咬定有涎即吐治牙齒歷蠹齒根黯黑升麻散方升麻槐枝灰各半兩白附子炮密陀僧煅露蜂房各一分上五味為細散入地黃汁一合和勻陰乾每用揩齒治牙齒歷蠹齒根黯黑胡桐淚散方胡桐淚一兩丹砂半兩麝香一分上三味同研極細常用揩齒牙齒疼痛論曰牙齒疼痛有二手陽明脈虛風冷乘之而痛者謂之風痛蟲居齒根侵蝕不已傳受余齒而痛者謂之蟲痛二者不同古方有塗敷漱泄之藥治風去蟲用之各有法也治牙痛藁本湯方藁本去苗土芎藭防風去叉蔓荊實去皮細辛去苗葉羌活去蘆頭升麻木通銼各三兩楊白皮細切二兩露蜂房炙劈碎狼牙草切莽草去梗鹽各半兩大豆炒令香熟二合上一十四味粗搗篩每用五錢匕水一盞入生地黃汁少許煎十餘沸去滓熱漱冷吐治牙齒疼痛芎藭湯方芎藭三分莽草去枝半兩獨活去蘆頭銼一兩防風去叉三分細辛去苗葉半兩郁李仁微炒去皮三分莨菪子炒令熟一分上七味粗搗篩每用五錢匕以酒一升煎三五沸去滓熱漱冷吐治牙齒疼痛茯神散方茯神去木一分白茯苓去黑皮一分松脂一分熬青葙子半兩炒令焦白礬一兩熬令汁枯丹砂一分研麝香半兩研乳香一分研上八味搗羅為散貼於牙齒疼痛處治牙齒痛丁香膏方丁香三兩好者以水三升煎至半升黃蠟三兩沉香二兩水煎至半升麝香一兩別研松脂一兩煉黃耆銼一分丹砂半兩研如粉細辛三兩去苗葉水三升煎至半升硫黃一兩研如粉鉛丹三兩上一十味先以銀器中煎丁香沉香汁次入細辛汁煎一半以來次入松脂又煎次下諸藥末候藥無水氣即入好麻油五兩以柳木篦子攪不得住手候膏成即入銀器中盛之如牙齒疼痛以塗絹可牙齒大小貼之立效貼藥後或齦腫出膿血並是病蟲出也治牙齒痛定愈散方乳香半兩白礬一兩燒灰松脂一兩熬汁盡青葙子一兩熬令熟不得焦麝香三分好者丹砂半兩研如粉黃耆半兩銼琥珀一兩上八味搗研為散更別搗乳香煉熟為汁入前藥中如有疼痛蟲孔之處干貼之不用諸物貼藥之時不得用水其痛立止治牙齒疼痛草烏頭散方草烏頭米泔浸一宿去皮切作片炒一兩高良薑半兩細辛去苗葉半兩蓽茇半兩白殭蠶半兩五靈脂半兩乳香一錢上七味搗羅為散凡用一字揩牙合口少時去涎盡以鹽湯漱口治牙齒痛塞鼻乳香丸方乳香雄黃硫黃砒霜各一分阿魏麝香各半分上六味研羅為末炊餅皮丸如雞頭實大如左邊痛即用藥一丸以薄綿裹塞左鼻竅內痛止即去之右邊亦然治牙齒疼痛生齦肉去熱毒解外風升麻散方升麻當歸切焙防風去叉各一兩藁本去苗土甘草炙白芷細辛去苗葉芎藭各半兩木香一分上九味搗羅為散更於乳鉢中研令細塗貼齒齦粗者以水二盞藥五錢匕煎三五沸去滓熱漱冷吐即瘥治牙齒疼痛防風湯方防風去叉當歸切焙芎藭細辛去苗葉各一兩附子炮裂半兩上五味㕮咀如麻豆每用藥五錢匕以水一盞入生薑五片煎十餘沸去滓熱漱冷吐治牙齒疼痛頭面浮腫吃冷熱物不得細辛散方細辛去苗葉芎藭藁本去苗土獨活去蘆頭各一兩地骨皮半兩蒺藜子三分上六味搗羅為散綿裹如豇豆大含化咽津每日三五度易之去膈間風熱若患頭風鼻塞先以油塗頂心以手摩一二百遍次用散一錢匕又摩頂心依前摩數遍必瘥治牙齒疼痛吃物不得地骨皮湯方地骨皮一兩細辛去苗葉半兩生乾地黃切一兩戎鹽研二分上四味粗搗篩每用五錢匕以水二盞煎三五沸去滓熱漱冷吐以瘥為度治牙齒疼痛槐枝湯方槐枝五握銼升麻莽草胡桐淚各一兩上四味粗搗篩分三服每服水三盞煎三兩沸通口漱泄大止牙痛治牙齒疼痛鉛丹丸方鉛丹一兩蜀椒去目並閉口者炒一分莽草半兩附子半生半熟一枚上四味搗羅為末以麵糊丸如芥子大用綿裹一丸納蟲孔中即瘥治牙齒疼痛桃白皮湯方桃白皮槐白皮柳白皮各二兩上三味銼如麻豆分為六帖每帖以酒一升浸一宿煎三五沸去滓熱漱冷吐治牙齒疼痛藜蘆散方藜蘆去蘆頭半兩附子炮裂去皮臍一分麝香一分研上三味搗羅為散每用半錢匕糝於齒上如牙有蟲孔即以綿裹少許納之治牙齒疼痛地龍散方地龍去土延胡索蓽茇上三味等分搗羅為散如左牙疼用藥一字入左耳內右牙疼入右耳內治牙齒疼痛蜀椒湯方蜀椒去目並閉口炒出汗鹽研土蜂房各一分上三味粗搗篩每服五錢匕以水三盞入蔥白三寸拍破煎十餘沸熱漱冷吐日三五度治牙齒疼痛乳香丸方乳香一塊如豌豆大白礬一塊如皂莢子大上二味以鐵匙先於炭火中熔白礬成汁次下乳香安心中急以手就丸乳香在礬內以綿裹疼處牙咬之有涎即吐卻治牙齒疼風腫時復發歇青鹽散方青鹽研烏頭粗銼各二兩上二味一處入銚子內文武火炒候皆紫色即住火待冷卻入臼中搗羅為散瓷器中盛臨睡如常揩齒溫水漱口久患者不過五七遍永瘥治牙齒疼吳茱萸散方吳茱萸湯洗焙炒白芷上二味等分搗羅為散用沸湯浸藥一錢匕漱疼處治牙齒痛不可忍乳香散方乳香半錢研蜀椒輕炒取紅為細末一錢上二味合研為散每用半字一字揩貼痛處良久溫荊芥渴漱口立效治牙齒疼痛蓽茇丸方蓽茇胡椒上二味等分搗羅為末化蠟丸如麻子大每用一丸納蚛孔中治牙齒痛久不瘥細辛湯方細辛去苗葉蓽茇上二味等分粗搗篩每用錢匕水一盞煎十數沸熱漱冷吐治牙齒痛乾地黃湯方生乾地黃焙三兩獨活去蘆頭一兩上二味㕮咀如麻豆每用五錢匕以酒一盞浸一宿煎十餘沸去滓熱漱冷吐以瘥為度治牙齒痛地龍丸方地龍末麝香各一分上二味於乳鉢中細研為末熔蠟為丸如粟米大每用一丸納蟲孔中即瘥治牙齒痛細辛湯方細辛去苗葉苦參各一兩上二味銼如麻豆以水一盞藥五錢匕煎五七沸去滓熱漱冷吐治牙齒痛蒼耳湯方蒼耳子一合用根亦佳上一味粗搗篩以水二盞煎十餘沸入鹽少許去滓熱漱冷吐治牙齒痛地黃餅方地黃五斤上一味淨擇去苗後於甑內蒸先鋪布一重以土一層密閉令熟出曝之當日干如此經三度以生地黃汁二升灑之卻曝乾然後搗為餅子含化一治齒二生津液三變白髭鬢其功極妙治牙齒疼痛無食子散方無食子不拘多少上一味搗羅為散以綿裹一錢當痛處咬之即定有涎吐之治牙齒疼痛槐枝烙方槐枝燒令熱上於痛處齒縫中烙之即瘥治牙齒痛李木皮方李木皮不拘多少上取細嚼汁浸痛處不過三五次即瘥治牙齒痛白楊醋方白楊皮一握細銼上以醋二升煎十餘沸去滓熱漱即吐治牙齒痛松節湯方松節細銼如麻豆一合上一味以水三盞煎藥二盞許去滓漱牙立止治牙齒痛瓜蒂散方瓜蒂七枚上一味炒黃碾散以麝香相和新綿裹病牙處咬之治牙齒疼久不瘥橘針湯方臭橘針不拘多少上一味銼如麻豆每用一合水一碗煎五七沸熱漱牙疼處立效治齒痛舌癢食物不得防風飲方防風去叉升麻桂去粗皮白石脂研當歸切焙檳榔銼桑根白皮銼炒乾木瓜人參黃連去須羌活去蘆頭芎藭銼天雄炮裂去皮臍各二兩黃芩去黑心一兩遠志去心半兩上一十五味粗搗篩每服三錢七以水一盞生薑五片煎取七分去滓溫服治齒痛連牙頜疼柳枝湯方柳枝切槐枝切黑豆各一合蜀椒去目併合口炒出汗半兩鹽細辛去苗葉羌活去蘆頭各一分上七味除椒鹽外並粗搗篩先以水六盞煎取二盞去滓入椒鹽再煎取一盞通口漱之不拘時以瘥為度治牙齒疼痛升麻散方川升麻半兩莽草一分桑寄生一分地骨皮半兩槐白皮半兩銼防風半兩去蘆頭藁本一分柳枝一握銼上八味搗篩為散每用五錢匕以水二大盞入鹽末一錢荊芥五穗煎至一盞去滓熱含冷吐日三用治牙齒疼痛方槐白皮一握荊芥穗半兩上二味以醋一升煎至五合入鹽少許熱含冷吐以瘥為度又方豬牙皂莢一梃炙去皮子川椒七粒上二味搗羅為細散每用一錢匕綿裹於痛處咬之有涎即吐齒䘌論曰齒䘌謂如疳䘌蟲蝕之證齒根宣露壞爛膿血俱出口內氣息蓋緣臟腑壅滯熏發上焦攻衝齒牙又有嗜肥甘過多或宿食在齒根不能漱去致腐臭之氣淹潰而成者治齒䘌蟲蝕牙齒雄黃膏方雄黃別研半兩牛酥五兩黃蠟白蜜各一兩丹砂別研一分藁本去苗土三分藜蘆去蘆頭一分杏仁湯浸去皮尖雙仁焙升麻芎藭白芷各半兩上一十一味除別研藥並蜜蠟外余細銼先於鐺中以酥煎所銼藥候杏仁赤黑色濾去滓下蜜蠟煎一二十沸候膏成續下別研藥攪勿住手候凝成膏於瓷器中盛每以少許塗齒病處或點蟲孔中大驗治䘌齒齒齦紫黑皴癢臭爛附子散方附子炮裂去皮臍升麻桂去粗皮細辛去苗葉麻黃去根節人參乾薑炮黃芩去黑心甘草炙銼當歸切焙各一分上一十味搗羅為散每用少許貼齒齦上日三五遍咽津不妨治齒䘌麝香散方麝香研一分白礬研蒲黃細辛去苗葉丁香各半兩附子炮裂去皮臍一分青蒲一兩上七味搗羅為散綿裹一錢匕於患處咬之咽津不妨日三五遍治風䘌口瘡白礬散方白礬燒灰研半兩升麻一兩細辛去苗葉一兩丹砂研一分麝香研半錢甘草炙銼一分上六味搗研為散先以鹽漿水洗漱後用熟水調藥雞毛塗之日三五遍治齒䘌薔薇根膏方薔薇根二兩地骨皮一兩蔥根一兩胡粉一兩蠟一分上五味前三味都銼以水二大盞煎至半盞以重抄紙半張浸之曝乾更浸汁盡為度幹了以粉蠟塗之於上剪作條子夜臥貼之神效治齒䘌齒根腐爛細辛散方細辛二兩川升麻二兩地骨皮二兩角蒿二兩牛膝三兩去苗生地黃五兩上六味都燒為灰細研每夜臨臥敷齒根或以蠟紙上貼之至旦即去治齒䘌日夜疼痛不止青黛散方青黛一兩柑子皮一兩干蝦蟆一枚五月五日者燒上三味搗羅為細散以生地黃汁調貼齦上日二換之治疳䘌齒根宣露黃礬散方黃礬燒研一分麝香研一錢干蛤殼燒灰研一分防風去叉獨活去蘆頭各一兩上五味除別研外搗羅為散再和勻以暖漿水漱口後用藥貼齒根上有涎即吐出日再貼即瘥治齒疳風䘌皂莢散方皂莢不蚛者二兩升麻一兩二味入瓶子內固濟留一孔燒令煙絶取出細研杏仁去皮尖雙仁研一兩凝水石搗末二兩上四味共研勻每用一錢匕患處貼之治齒䘌細辛散方細辛去苗葉蟾酥炙乾瓜蒂黃連去須各一分上四味搗羅為散每用一錢匕塗貼齒齦上日三五度治齒疳風䘌疼痛不止藜蘆散方藜蘆去蘆頭蜀椒去目並閉口炒出汗附子炮裂去皮臍各一分麝香研一錢上四味先將三味搗羅為散次入麝香和勻每用一錢匕綿裹置所患處有涎吐之治齒疳及口生瘡眼澀體重蟲蝕臟腑苦參湯方苦參切桃白皮切槐白皮切各一兩上三味粗搗篩每用五錢匕以水二盞煎十餘沸去滓熱含漱冷吐日三五度治疳䘌齒根血出白礬散方白礬燒灰研三分蚺蛇膽研一錢上二味同研勻先以布揩齒令血盡每用半錢匕滲於患處勿咽津
