body:
  text: 卷第四十八肺臟門肺臟統論論曰五臟設位肺獨居上故內經曰天氣通於肺又曰肺主皮毛為五臟之華蓋在五臟為魄魄則並精而出入者也在五性為義義則勝物而斷制者也開竅於鼻故其液為涕涕者繼泣而先泗也在聲為哭故其志為憂憂者陰肅而情慘也其色白者入金故也其味辛者物成故也以至在天為燥在地為金在音為商在臭為腥無非時數氣類之所繫然也嘗以經脈表裡論之手太陰肺之經也手陽明大腸之經也二者之經為臟腑表裡之合手太陰之經起於中焦下絡大腸環循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上循魚際出大指之端其支者從腕後直出次指內廉出其端陰陽適平經絡和順盈虛消息莫睹偏勝一失其平病所由生過為有餘有餘病也不及為不足不足亦病也有餘之病是謂肺實不足之病是謂肺虛肺實之證喘嗽上氣肩背痛汗出陰股膝脛皆痛是也肺虛之證肩背寒痛少氣不能太息胸滿嗌乾是也病之所生凡以其經絡流行之處而見證焉治法之施實者宜瀉虛者宜補有餘則損之不足則益之此其大略也至於論脈則手太陰脈之來浮澀而短為平脈若見他脈皆失其平故肺與脾腎子母也與心肝夫婦也脈得洪大而緩則為母所克得沉濡則滑則為子所克得弦而長則為婦所克得浮大而洪則為夫所克若母克子者為虛邪雖病易治子克母者為實邪雖病自愈婦剋夫者為微邪雖病即瘥夫克婦者為賊邪大逆不治當察其虛實以補以瀉審治之法此其大概也肺虛論曰肺為華蓋復於諸臟若肺虛則生寒寒則陰氣盛陰氣盛則聲嘶語言用力顫掉緩弱少氣不足咽中干無津液虛寒乏氣恐怖不樂咳嗽及喘鼻有清涕皮毛焦枯診其脈沉緩此是肺虛之候虛則宜補也治肺氣不足咳逆短氣寒從背起口中含霜雪語無音聲而渴舌本乾燥甚者咳唾膿血補肺湯方五味子一兩白石英鍾乳各三兩竹葉橘皮桑白皮各二兩杏仁去皮尖雙仁炒研各一兩半白茯苓去黑皮紫菀去苗土桂去粗皮款冬花各一兩紫蘇子炒麥門冬去心焙各二兩上一十三味將十味粗搗篩與杏仁白石英鐘乳同研令勻每服三錢匕水二盞竹茹彈子大粳米半匙生薑一棗大拍碎棗二枚劈破同煎至一盞去滓溫服日再夜一治肺虛短氣咳嗽唾膿血不得臥人參湯方人參桂去粗皮各二兩阿膠炙令燥紫菀去苗土各一兩桑根白皮銼炒八兩熟乾地黃切炒四兩上六味粗搗篩每服五錢匕水一盞半生薑一棗大拍碎飴糖一棗大煎至八分去滓溫服日三夜一治肺虛喘咳少氣補肺丸方鍾乳粉人參白石英各半兩阿膠炙令燥五味子各一兩甘草炙銼三錢細辛去苗葉二錢上七味搗研為末麵糊丸如梧桐子大每服十五丸至二十丸甘草湯下治肺氣不足胸中痛牽背上氣失聲桑白皮湯方桑根白皮銼炒款冬花麥門冬去心焙甘草炙銼乾薑炮各一兩桂去粗皮二兩五味子白石英研各一兩一分上八味將七味粗搗篩與白石英同拌令勻每服三錢匕水一盞棗五枚劈破煎至六分去滓溫服日三不拘時治肺虛失聲胸中痛上氣息鳴鍾乳丸方鍾乳研一兩一分五味子一兩半白石英研款冬花麥門冬去心焙乾薑炮桂去粗皮桑根白皮銼炒各二兩上八味將六味搗羅為末與鍾乳白石英同研令勻以棗肉研膏丸如梧桐子大每服十五丸粥飲下日三不拘時治肺虛寒咳嗽下利少氣補虛湯方半夏湯洗七遍焙乾薑炮各三兩白茯苓去黑皮甘草炙銼厚朴去粗皮生薑汁炙五味子各二兩黃耆二兩半陳橘皮湯浸去白焙一兩半上八味銼如麻豆大每服五錢匕水一盞半煎至八分去滓溫服治肺臟氣虛胸中短氣咳嗽聲微四肢無力補肺阿膠散方阿膠炙令燥山芋人參白朮五味子麥門冬去心焙各一兩乾薑炮半兩杏仁湯浸去皮尖雙仁炒桂去粗皮各三分上九味搗羅為散每服三錢匕粥飲調下不拘時日三治肺氣虛寒咳逆下利少氣人參茯苓丸方人參白茯苓去黑皮白朮各二兩半桂去粗皮乾薑炮當歸切炒甘草炙銼芎藭黃耆銼各二兩陳橘皮湯浸去白焙一兩半上一十味搗羅為末煉蜜丸如梧桐子大每服三十丸空心酒下生薑湯亦得稍加至五十丸日二若利甚加厚朴去粗皮二兩半治脾氣虧乏不能生肺而肺氣不足多感風邪益脾補肺厚朴湯方厚朴去粗皮生薑汁炙一兩人參草豆蔻去皮各半兩乾薑炮一錢半甘草炙銼一分上五味粗搗篩每服三錢匕水一盞煎至八分去滓空心溫服治肺氣虛冷胸中氣微不能太息形體怯寒鼻多清涕九味湯方厚朴去粗皮生薑汁炙陳橘皮湯浸去白焙白朮訶黎勒皮防風去叉甘草炙銼桂去粗皮黃耆銼細辛去苗葉各一分上九味粗搗篩每服三錢匕水一盞生薑三片煎至九分去滓空心溫服治肺臟氣虛觸冒風冷呼吸邪氣喘促痞悶眠睡不得定喘款氣丸方苦葶藶紙上炒二兩馬兜鈴根一兩麻黃去根節桑根白皮銼各一分上四味搗羅為末用蒸棗肉和丸如梧桐子大每服三十丸食後煎阿膠皂子湯下治肺氣虛乏胸喉中干橘皮湯方陳橘皮湯浸去白炒麻黃去根節各一兩上二味粗搗篩每服五錢匕水一盞半小麥半匙煎至小麥熟去滓溫服日三不拘時治肺氣不足咳唾膿血氣短不得臥麻子湯方麻子一升桂去粗皮人參各二兩阿膠炙令燥紫菀去苗土各一兩熟乾地黃四兩桑根白皮銼一斤上七味㕮咀如麻豆大每服五錢匕酒一盞水一盞生薑一棗大拍碎煎至一盞去滓入飴糖少許再煎令沸溫服治肺虛聲嘶氣乏地黃煎方生地黃汁五兩蜜生薑汁各三分沙糖一兩半升麻細銼綿裹同煎杏仁去皮尖雙仁研成膏各二兩人參為末三兩上七味先將六味於銅器中微火煎頻攪以地黃等汁盡為度乃去升麻下人參末攪勻候冷收置瓷閣中密蓋每服一棗大含化日夜各三服治肺虛寒損腰背苦痛難以俯仰短氣唾稠如膿溫中下氣杜仲湯方杜仲去粗皮酥炙銼白朮各一兩一分萆薢桂去粗皮各一分甘草炙銼附子炮裂去皮臍各三分上六味粗搗篩每服五錢匕水一盞半棗二枚劈破生薑一棗大拍碎煎至八分去滓溫服食前後各一治肺虛聲音不出三味丸方桔梗一兩切用蜜拌於飯上蒸三日訶黎勒去核四個二個炮二個生用趁熱搗甘草一兩半生半炙上三味搗羅為末每服二錢匕用馬勃同沙糖少許拌和為丸含化咽津治肺虛通身汗出不止補正湯方白藥二兩甘草炙銼芍藥各一兩上三味粗搗篩每服三錢匕水一盞煎至七分去滓溫服治肺臟虛寒喘嗽氣短五味子湯方五味子馬兜鈴麻黃去根節甘草炙銼各一兩上四味粗搗篩每服三錢匕水一盞沙糖少許同煎至七分去滓食後臨臥溫服治肺臟虛寒痰逆咳嗽胸滿多涕紫菀湯方紫菀去苗土五味子各一兩貝母去心炒三分升麻天門冬去心焙各半兩上五味粗搗篩每服三錢匕水一盞生薑三片棗一枚劈煎至七分去滓溫服不拘時治肺氣不足煩滿喘嗽沖逆上氣唾中有血心自驚恐皮膚粟起嘔逆歌笑心煩不定耳中虛鳴面色常白宜此補肺湯方白石英研鍾乳研各一兩天門冬去心焙款冬花炒桂去粗皮桑根白皮銼炒五味子炒紫菀去苗土人參各二兩上九味粗搗篩每服五錢匕以水一盞半入大棗二枚劈糯米百粒生薑一分切同煎取七分去滓食後頓服治肺虛咳嗽氣喘麥門冬丸方麥門冬去心焙二兩半蜀椒去目併合口者炒出汗一兩遠志去心附子炮裂去皮臍乾薑煨各一兩半人參細辛去苗葉各一兩三分桂去粗皮三兩百部黃耆銼炒各一兩一分杏仁三十枚去雙仁皮尖炒上一十一味搗羅為末煉蜜丸如彈子大每服含化一丸咽津肺實論曰右手關前寸口陰實者肺實也苦上氣胸中滿膨膨與肩相引扁鵲曰肺實熱則喘逆胸憑仰息手太陰經為熱氣所加故為肺實之病甚則口赤張引飲無度體背生瘡以至股膝踹脛皆痛法宜瀉之治肺氣盛實其氣上蒸發嗽多痰心胸煩躁往往咯血黃耆煮散方黃耆銼桑根白皮銼杏仁去皮尖雙仁炒紫菀去苗土黃苓去黑心麻黃去根節麥門冬去心焙升麻貝母去心羌活去蘆頭蛤蚧酥炙各一分胡黃連一錢上一十二味搗羅為散每服三錢匕水一盞生薑一棗大拍碎煎至九分去薑食後臨臥溫服治肺實熱喘逆胸滿仰息氣急麻黃湯方麻黃去根節煎掠去沫焙半夏湯洗七遍焙桑根白皮銼各二兩半杏仁去皮尖雙仁炒三兩石膏碎五兩赤茯苓去黑皮二兩紫菀去土一兩半上七味銼如麻豆大每服五錢匕水一盞半入生薑半分切竹葉二七片煎至八分去滓溫服治肺實熱喘逆胸滿仰息氣急地骨皮湯方地骨皮五兩白前二兩石膏研六兩杏仁去皮尖雙仁炒三兩桑根白皮銼四兩上五味銼如麻豆大每服六錢匕水二盞入竹葉十片煎至一盞去滓溫服治肺臟實熱喘促上氣胸膈不利煩躁鼻乾地骨皮湯方地骨皮二兩桑根白皮銼一兩半甘草炙銼紫蘇莖葉各一兩上四味粗搗篩每服三錢匕水一盞煎至七分去滓食後臨臥溫服治肺臟熱實喘嗽葶藶丸方甜葶藶子紙上炒大黃蒸熟銼各一分杏仁二十七枚去皮尖雙仁燈上燎熟上三味搗研為末用棗肉丸如梧桐子大每服五丸至七丸食後臨臥生薑烏梅湯下治肺氣盛實上焦不通面目浮腫大便燥桔梗湯方桔梗炒大黃銼炒麻黃去根節枳殼去瓤麩炒大腹皮銼柴胡去苗杏仁去皮尖雙仁炒羌活去蘆頭木香各一分上九味粗搗篩每服三錢匕水一盞生薑一棗大拍碎煎至七分去滓食臨臥溫服治肺熱實凡右手寸口氣口以前脈陰實者苦肺脹汗出氣喘逆咽中寒如欲嘔狀名肺實肺實則胸滿仰息泄氣除熱枸杞湯方枸杞根皮銼炒石膏碎各四兩陳橘皮湯浸去白焙白朮各二兩半白前杏仁去皮尖雙仁炒各一兩半上六味粗搗篩每服三錢匕水一盞煎至七分去滓入蜜半匙再煎令沸食後溫服日三治肺熱實咳嗽涕唾稠黏氣促急不思食天門冬煎方生天門冬二兩去心以水一升煮爛候水盡研細紫菀去土一兩貝母去心三兩桔梗白茯苓去黑皮桑根白皮銼木通銼各一兩半生地黃汁四合白蜜二兩藕汁生麥門冬汁各三合牛酥一合上一十二味搗羅六味為末先下地黃麥門冬藕汁煎五六沸次下天門冬並白蜜煎五六沸次下紫菀等末攪勻次下酥慢火煎攪如餳傾於閣中待凝每服一匙食後夜臥細細咽之日三五服治肺熱實猝嗽氣促急妨悶喘息不安馬兜鈴湯方馬兜鈴七個桑根白皮銼三兩升麻一兩甘草炙銼二兩上四味銼如麻豆大每服五錢匕水二盞煎至一盞去滓溫服治肺臟熱實涕唾稠黏喉咽不利黃芩湯方黃芩去黑心黃耆銼柴胡去苗秦艽去土赤茯苓去黑皮人參梔子仁各一兩甘草炙銼升麻地骨皮各半兩上一十葉粗搗篩每服三錢匕水一盞煎至六分去滓食後溫服治肺臟實熱喘嗽鼻塞口乾咽痛百部湯方百部款冬花杏仁去皮尖雙仁炒甘草炙銼各一兩上四味粗搗篩每服三錢匕水一盞入糯米少許煎至七分去滓溫服不拘時肺脹論曰肺脹者手太陰經是動病也邪客於肺脈氣先受之其證氣脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀是為肺脹也脈經謂肺脹者虛而滿喘咳逆倚息目如脫其脈浮是也治肺脹咳逆倚息喘目如脫脈浮大越婢加半夏湯方半夏半升湯洗七遍去滑麻黃去根節湯煮掠去沫六兩石膏碎半斤甘草炙二兩上四味㕮咀如麻豆每服五錢匕水二盞入生薑五片棗二枚劈破同煎至一盞去滓溫服日三治肺脹咳而上氣咽燥而喘脈浮者心下有水麻黃湯方麻黃去根節湯煮掠去沫焙細辛去苗葉芍藥桂去粗皮各三兩半夏湯