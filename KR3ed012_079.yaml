服十丸米飲下日三服水出為度治石水葶藶丸方葶藶隔紙炒桃仁湯浸去皮尖雙仁炒各二兩上二味搗羅為末麵糊和丸如小豆大每服十丸米飲下日三夜一小便利為度大腹水腫論曰內經言水病下為胕腫大腹又曰上下溢於皮膚故為胕腫其證腹大四肢小陰下濕手足逆冷腰痛上氣咳嗽煩疼是也蓋三焦閉塞水道不通流溢皮膚營衛痞澀內連腹膜則至陰內動脹急如鼓得病之本多因大病之後或積虛勞損或新熱食畢入水自漬及浴冷水故令水氣不散理宜然也治大腹水腫口苦幹燥此腸間有水防己丸方防己椒目葶藶炒令紫色大黃銼醋拌炒乾各一兩上四味搗羅為末煉蜜為丸如小豆大每服十丸米飲下日三服稍稍增之口中有津則止勿服渴者加芒硝半兩治大腹水腫氣息不通證候危篤者牛黃丸方牛黃研半兩昆布洗去咸炙海藻洗去咸炙乾各一兩一分牽牛子炒桂去粗皮各一兩椒目葶藶炒令紫色各三分上七味搗羅為末煉蜜為丸如小豆大每服十五丸米飲下日再服稍加之以小便利為度貞觀十九年漢陽王患水疾醫所不療服此藥五六日瘥治水氣大腹腫麝香丸方麝香一錢研甘遂炒芫花醋炒各半兩人參一兩上四味搗羅為末煉蜜為丸如小豆大每服二十丸米飲下治大腹水腫利小便水銀丸方水銀水煮一日一夜研一兩葶藶炒令紫色椒目各一升上三味搗羅為末煉蜜為丸如小豆大每服十丸米飲下日再服治水氣腹大腫甘草丸方甘草炙銼防己葶藶炒令紫色各一兩上三味搗羅為末用酒熬為丸如小豆大每服二十丸至三十丸米飲下治大腹水腫利小便蘇合香丸方蘇合香水銀水煮一復時後入白蘞為末各一兩上三味合研令勻煉蜜為丸如小豆大每服十丸米飲下日三治大腹水腫利小便葶藶散方葶藶炒令紫色一兩杏仁二十枚湯浸去雙仁皮尖麩炒上二味搗令極爛分為十服每服用米飲調下日二服治大腹水腫利小便萆麻飲方萆麻子二十枚成熟者去皮上一味細研以水半盞調勻一服令盡至日中當吐下水汁若水不盡三日後更服三十枚猶未盡者更作瘥後節飲及減食食糜粥以養之治大腹水腫利小便葶藶酒方葶藶一升上一味用酒五升浸三宿每服半盞日二服小便利為度治久患大腹病其狀四肢細腹大有小勞苦則足脛腫滿食則氣急此病服下利藥極不瘥宜用此酒以散除風濕利小水丹參酒方丹參鬼箭羽各一兩半秦艽去苗土知母冬月不用各一兩豬苓去黑皮三分白朮一兩半海藻洗去咸炙三分赤茯苓去黑皮一兩桂去粗皮獨活去蘆頭各三分上一十味以酒九升浸五日急須者置熱灰上一日便可就每服一盞飲酒少者隨意減之日三服
