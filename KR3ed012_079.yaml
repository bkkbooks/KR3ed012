body:
  text: 卷第七十九水腫門水腫統論論曰內經謂腎者胃之關也關閉不利故聚水而從其類上下溢於皮膚而為胕腫胕腫者聚水而生病也其狀目窠上微腫若新臥起然頸脈微動時作咳嗽股冷膚腫口苦舌乾不得正偃偃則咳清水不得臥臥則驚而咳甚則小便黃澀以手按腫處隨手而起如裹水之狀是也以脈別之脈沉者水病也洪大者可治微細者難醫水病有不可治者五唇黑傷肝一也缺盆平傷心二也臍出傷脾三也足下平滿傷腎四也背平傷肺五也蓋脾腎氣虛三焦閉塞至陰之氣內蓄巨陽之氣不得宣通如是則水道不利飲濕攻脾散於肌肉而為水腫之病矣水腫論曰水腫之病以脾腎氣虛不能制水水氣妄行溢於皮膚其證股冷膚腫時作咳嗽不得安臥小便黃澀以手按腫處隨手而起是也治水病不限年月深淺洪腫大喘幾不能度日防己飲方防己一分大戟炒木香赤茯苓去黑皮海蛤犀角鎊胡黃連白朮訶黎勒煨去核防風去叉木通銼桑根白皮銼炒紫蘇去梗陳橘皮去白焙牽牛子葶藶隔紙炒郁李仁各一兩白檳榔煨一兩半大黃銼炒二兩上十九味銼如麻豆大每服二錢匕水一盞半煎至一盞去滓入麝香少許再煎一沸平旦空心服如人行五里再服不可冷服若久病腸胃虛弱至第二服即微利若腸胃實者約至數服亦須轉下惡濁黃水或青黑惡物出三五升此氣化為之也瀉若不甚困更服如覺力乏即以漿水粥止之治水氣服前藥瘥後服此補氣丸方防己犀角鎊葶藶隔紙炒牽牛子半生半熟赤茯苓去黑皮訶黎勒煨去核海蛤芎藭生乾地黃焙各一兩大黃二兩半木通銼桑根白皮銼炒陳橘皮去白焙大戟炒防風去叉郁李仁去皮尖炒木香各一兩上一十七味搗羅為末煉蜜丸如梧桐子大每服空心米飲下十丸若覺氣壅加至十五丸如覺通則減三丸至五丸大小便不通即服三十丸此不獨療水氣但是氣疾皆治之服前防己飲瘥百日內更服五靈湯方葶藶隔紙炒木通銼赤茯苓去黑皮防己陳橘皮去白焙各一兩上五味粗搗篩每服二錢匕水一盞煎三兩沸去滓飲之覺熱即勿服治水腫牽牛湯方牽牛子檳榔煨銼木香赤茯苓去黑皮陳橘皮去白焙各一兩上五味粗搗篩每服二錢匕水一盞煎三兩沸去滓溫服此藥不獨療水病凡肺氣腳氣賁豚氣上築心胸不可忍皆治之治一切水氣四肢腫滿妙香湯方蘹香子炒烏藥生用高良薑湯浸焙乾青橘皮去白各一兩上四味同粗搗篩每服二錢匕酒半盞煎數沸去滓稍熱服治水氣腫滿暖腎散方巴戟天去心麩炒黑甘遂炒黃各一分檳榔一枚生一枚炮木香苦葶藶紙上炒各一分大麥糵芫花醋浸炒黃陳橘皮去白炒各半兩膩粉一錢沉香銼澤瀉各一分上一十一味搗羅為散每服二錢匕用豬腰子一隻以竹刀子割開去筋膜作三片摻藥末在內用濕紙裹慢火煨令香熟先煮蔥白三莖令熟細切將蔥與粟米同煮粥一碗先食粥一半方食腰子藥後再食粥令盡臨臥服如至五更大便並小便下赤黃惡物乃驗治水氣腫滿奪命丸方大戟麩炒甘遂炒各一分苦葶藶半兩一半生一半熟澤瀉一分半上四味搗羅為末煮棗肉和丸梧桐子大若四肢腫者名為順水溫漿水下三丸星月上時服至天曉利下惡物若四肢瘦腹腫者名為逆水煎苦葫蘆子陳曲湯下三丸小便頻快是效三日後服補藥礬石丸治水病補藥礬石丸方白礬半兩雄黃研丹砂研各一分上三味搗羅為末粟米飯和丸緑豆大丹砂為衣每服五丸至七丸食前生薑湯下日二治水氣腫滿檳榔散方檳榔二枚生郁李仁去皮尖炒芫花炒甘遂炒續隨子木通銼各二兩海蛤一錢陳橘皮去白焙商陸各一分上九味搗羅為散每服一錢匕溫酒調下臨臥服至五更取下惡物為驗治水腫久不瘥大戟丸方大戟炒陳橘皮去白焙各一分巴豆七粒去皮大麥內炒熟不用大麥上三味搗羅為末用大麥麵糊丸如梧桐子大每服三丸生薑湯下空心日晚服治水腫腹滿二氣湯方牽牛子半兩生用甘遂一錢微炒上二味粗搗篩分作二服每服水一盞煎至五分放溫細呷不計時治水腫大黃湯方大黃銼碎醋炒二兩桂去粗皮甘草炙銼人參細辛去苗葉各一兩桑根白皮炙黃色銼二兩上六味粗搗篩每服用水三盞藥五錢匕入棗二枚劈破同煎至九分去滓入白餳一匙頭更煎一沸溫服日三利小便三五升即瘥治水腫及肢滿澼飲芫花湯方芫花炒黃色大黃銼碎醋炒甘遂微炒甘草炙銼大戟去皮微炒各一兩上五味粗搗篩每服三錢匕水二盞棗二枚劈破同煎至九分下芒硝半錢匕更煎一沸去滓溫服以利為度治水氣面目浮腫因虛勞腳氣所致鱉甲湯方鱉甲去裙襴醋炙焦二兩人參柴胡去苗當歸切焙枳殼去瓤麩炒各二兩甘草炙半兩桃仁七枚湯浸去皮尖白檳榔煨二枚上八味粗搗篩先用小便二盞浸藥三錢匕經半日煎取七分去滓溫服以瘥為度婦人病狀同者加牛膝半兩治水腫利小便郁李仁丸方郁李仁湯浸去皮尖微炒三分海藻洗去咸炒桂去粗皮各半兩大黃銼碎醋炒葶藶紙上炒令紫色各一兩一分黃連去須半兩木通銼石葦去毛微炙各一分松蘿三分上九味搗羅為末煉蜜丸梧桐子大每服米飲下十五丸日三稍增以知為度治水腫麝香丸方麝香研半分芫花炒黃三分甘遂微炒去皮半兩上三味搗羅為末煉蜜丸梧桐子大強壯人酒下一十五丸老弱人十丸治水腫利小便商陸丸方商陸微炙一兩半芒硝研一兩甘遂微炒大黃銼碎醋炒芫花微炒蕘花微炒各三分麝香研四錢豬苓去黑皮一兩上八味搗羅為末煉蜜丸梧桐子大每服米飲下五丸日三服以微利為度華他方酒客虛熱當風飲冷腹冷脹滿加麝香豬苓各一兩治水腫眠臥不得防己丸方防己海蛤研各一兩葶藶一升蒸熟杏仁六十枚湯浸去皮尖炒別搗甘遂微炒一分上五味先將葶藶杏仁一處拌和後以三味搗羅為末再研勻入棗肉和丸梧桐子大每服米飲下二十丸漸加至二十五丸以微利為度其疾不過五六日即瘥治水腫久不瘥藁本丸方藁本去苗土葶藶炒紫色各一分大戟微炒蜀椒去目及閉口者炒出汗澤漆微炒巴豆去皮心麩炒出油盡赤小豆微炒澤瀉各半兩甘遂微炒一兩牽牛子炒熟一分連翹微炒半兩上一十一味搗羅為末煉蜜丸梧桐子大每日空心溫酒下一丸加至二丸服後小便多白色即住治水腫桑白皮丸方桑根白皮取上有白椹者北陰下根白皮銼炙黃二兩郁李仁湯去皮炒商陸微炙葶藶紙上炒令紫色牽牛子炒熟巴豆清水煮一日去皮心膜出油盡各一兩上六味搗羅為末煉蜜丸梧桐子大每服茶湯下十五丸利三五行見效即止治水腫檳榔丸方檳榔微煨附子炮裂去皮臍吳茱萸水浸曝乾炒厚朴去粗皮塗薑汁炙乾薑炮防己甘草炙各一兩葶藶紙上炒紫色杏仁浸去皮尖雙仁炒椒目微炒赤茯苓去黑皮黃耆銼炒麻黃去根節炒桂去粗皮栝蔞去皮白𠼫銼微炒海藻洗去咸汁各一兩半上一十七味搗羅為末煉蜜丸梧桐子大每服米飲下十丸日三稍增至十五丸未知加至二十五丸得大小便利為驗此方兼療老小虛腫大病後客腫作喘治水氣腫滿服商陸豆方生商陸切如麻豆赤小豆與商陸等分鯽魚三枚去腸存鱗上三味將二味實魚腹中以綿縛之水三升緩煮豆爛去魚只取二味空腹食之以魚汁送下甚者過二日再為之不過三劑治水氣逐氣散方白商陸去粗皮薄切曝乾上一味搗羅為散用黃顙魚三枚大蒜三瓣緑豆一合水一升同煮以豆爛為度先食豆飲汁送下又以汁調下藥散二錢匕水氣內消十水論曰十水之病腫從腳起上氣而咳名為白水其根在肺腫從面目起名為青水其根在肝腫從腹起名為黃水其根在脾腫從腳趺起名為黑水其根在腎腫從心起名為赤水其根在心腫從腹起名為氣水乍實乍虛乍去乍來其根在大腸腫從頭面起至足名為垂水其根在膽腫從內起堅塊四肢小腫名為石水其根在膀胱腫從四肢起腹大名為風水其根在胃腫從腹內起名為里水其根在小腸凡此十水生於臟腑各從其根究其所本則肺與腎而已故內經曰其本在腎其末在肺皆積水也又曰津液充郭其魄獨居精孤於內氣耗於外形不可與衣相保蓋腎氣虛弱水氣脹滿上攻於肺肺氣孤危腎為水害子不救母故陰精損於內陽氣減於外三焦閉溢水道不通水滿皮膚身體痞腫治之之法備見於內經故曰平治權衡去菀陳莝微動四極溫衣繆刺其處以復其形開鬼門潔淨府精以時服五陽已布疏滌五臟故精自生形自盛骨肉相保巨氣乃平也治水腫十水丸方椒目微炒治白水大戟炒治青水甘遂麩炒治黃水玄參治黑水葶藶炒治赤水芫花醋炒治氣水赤小豆治垂水桑根白皮炙銼治石水澤瀉治風水巴豆去心皮膜研出油治里水上一十味等分隨病所在增其所主藥一分巴豆四分去心皮壓去油搗研為末煉蜜丸如梧桐子大每服三丸米飲下以水下為度未下日三服既下當節飲食但得食乾物耳又十水丸方大戟炒治清水葶藶炒治赤水甘遂炒治黃水藁本去苗土治白水連翹去梗治黑水芫花炒令焦治垂水澤漆葉治風水桑根白皮炙銼治石水巴豆去皮心研出油治里水赤小豆治氣水上一十味等分隨證所主倍之搗羅為細末煉蜜丸如小豆大每服三丸至五丸米飲下日三人弱者以意節之治十種水病百方不愈面目四肢俱腫氣息喘急寢臥不得小便漸澀腹脹氣悶水不入口垂命欲死者舊名葶藶散賜名神助散方椒目微炒三兩豬苓去黑皮澤瀉各四兩牽牛炒令香五兩苦葶藶紙上炒六兩上五味搗羅為散每服三錢匕以蔥白三莖漿水一盞煎取半盞入清酒半盞攪勻稍熱調下空心服良久即熟煮漿水蔥白粥二盞更入清酒一盞攪勻面東熱吃令盡至午後小便或大便通利喘定腫減隔日再服百日消盡治十種水氣檳榔丸方檳榔炮銼三個大戟銼炒半兩牽牛子炒滑石碎海蛤瞿麥穗旋覆花甘遂炒各一分上八味搗羅為末用軟飯和丸如緑豆大每服七丸至十丸煎商陸湯下若作散每服一錢匕亦煎商陸湯調下如躁米飲調下如取利後繼服葶藶丸葶藶丸方葶藶炒杏仁不去皮各一分上二味搗研為細末麵糊和丸如小豆大每服十五丸煎杏仁湯下治十種水病三消丸方朴硝色青白者煉熟二兩芒硝色青白者硝石色青白燒之有金色者各一兩同上二味研令極細犀角鎊椒目微炒各一兩搗羅為末合三硝重研令勻葶藶紙上炒莨菪子炒各一兩杏仁去皮尖雙仁炒二兩以上三味別搗末更與諸藥合搗千杵上八味用大棗十一枚煮熟去皮核炒令水盡和為劑或硬即添少許熟蜜杵千下為丸如小豆大每服十五丸空心煎生薑湯下加至二十丸以利為度不宜食飽沖冒霜寒並單衣受風冷雖夏中亦宜就溫禁食鹹味難消之物不宜悲喜憂勞兼不得近生産房室等事惟得吃粳米粟米蔥薤生薑橘皮禁鹽一年永不發動治十種水病大海藻湯方海藻洗去咸焙芫花炒焦豬苓去黑皮連翹澤漆炒郁李仁去皮尖雙仁研陳橘皮湯浸去白焙桑根白皮銼炒白蒺藜炒各一兩藁本去苗土昆布洗去咸焙大戟炒防己葶藶炒朴硝甘遂炒杏仁去皮尖雙仁炒各半兩檳榔煨銼七枚上一十八味粗搗篩每服四錢匕水一盞半生薑一棗大拍碎同煎至八分去滓空服溫服日三以利為度治十種水氣遍身洪腫氣喘小便赤澀檳榔湯方檳榔煨銼三枚牽牛子炒葶藶隔紙炒桑根白皮炙銼各一兩赤小豆炒半合郁李仁去皮尖炒一兩防己豬苓去黑皮各三分上八味粗搗篩每服五錢匕水二盞生薑一棗大拍碎同煎至一盞去滓空心溫服日三以利為度