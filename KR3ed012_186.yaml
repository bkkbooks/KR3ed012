body:
  text: 卷第一百八十六補虛益血論曰氣為陽血為陰陰陽和平諸疾不生一或衰弱則有偏陰偏陽之疾故虛損之人營血不足津液涸少不能充養肌肉枯稿髭發黃瘁手足多寒面顏少色補虛治法當加以益血之劑治腳腰通九竅利三焦及治五勞七傷諸風冷氣安和五臟益血補虛靈宿丹方菟絲子酒浸一宿別搗末五兩覆盆子三兩酒浸焙檳榔煨牛膝去苗酒浸切焙肉蓯蓉去皴皮酒浸切焙天麻酒浸銼焙熟乾地黃酒浸三日焙乾各二兩鹿茸一對塗酥炙桂去粗皮巴戟天紫者去心附子炮裂去皮臍石槲去根青橘皮去白焙楮實炒蘹香子微炒白龍骨碎研杜仲去粗皮切炒補骨脂微炒葫蘆巴石葦去毛枸杞子遠志去心五味子炒沉香銼蛇床子炒山茱萸萆薢山芋搗末各一兩上二十八味搗羅為末用浸藥酒調山芋末煮糊更入酥蜜各一兩和藥三五百杵丸如梧桐子大空心溫酒或鹽湯下二十丸至三十丸補益血脈烏髭發潤肌膚去風冷諸疾地金丸方生地黃十七斤竹刀子切木臼搗爛木香菟絲子酒浸一日蒸過別搗末牛膝酒浸一宿切焙各二兩陳曲一斤搗末何首烏用黑豆蒸一復時曝乾木臼搗末杏仁去皮尖雙仁研紙壓去油各四兩以上七味和勻入瓦罐內盛令平用新油單蓋復縛定以白鹽一兩和灰泥固濟勿令透氣掘坑深廣二尺先用慢火燒熱方安藥罐子在內用粳火細細燒三晝夜開驗藥如豉汁色即住如末更燒一日燒藥及開藥時勿令婦人雞犬觸犯取出研細入後藥鹿茸酥塗炙五味子焙肉蓯蓉酒浸一宿切焙茯苓去黑皮覆盆子焙山茱萸巴戟天去心各二兩半同用木臼搗為末上一十四味和作餅子搗干山芋一斤半於盆內表裡按淹過安在竹棚子上用紙鋪蓋陰乾用新瓦器中盛貯旋取用木臼搗末細羅煉白蜜和更搗一千杵丸如梧桐子大空心溫酒下三十丸食後更一服經一百日後日一服其黏罐子藥用酒洗別以瓶子貯可每日一杯補虛益血調營衛進飲食治手足疼痛肢體倦怠白朮石槲湯方白朮石槲去根銼酒炒各半兩荊芥穗三錢桔梗銼炒秦艽去苗土各一分白芷白芍藥各三錢黃耆銼炒當歸切焙上九味搗篩為粗散每服四錢匕水一盞入生薑五片棗三枚煎至八分去滓食前溫服日三補虛勞不足飲食減少不生肌膚三焦不調五勞丸方大黃一斤前胡二兩茯苓一兩細辛一兩蓯蓉一兩酒浸焙乾銼半夏一兩湯洗七遍去滑當歸去蘆頭一兩銼葶藶一兩炒芍藥一兩上九味搗羅為末煉蜜和丸如梧桐子大每服五七丸食後生薑湯下日三補虛益血調營衛進飲食除五勞七傷手足疼痛肢體倦怠潤肌膚去風冷薯蕷丸方薯蕷一兩石龍芮一兩覆盆子一兩熟乾地黃二兩五味子一兩萆薢一兩銼蛇床子一兩肉蓯蓉一兩酒浸焙乾遠志一兩去心菟絲子二兩酒浸一宿焙乾石槲一兩去根銼桂心一兩杜仲一兩半去皴皮炙微黃銼山茱萸一兩人參一兩去蘆頭防風一兩去蘆頭五加皮三分天雄一兩炮裂去皮臍狗脊一兩黃耆一兩銼秦艽一兩去苗白朮一兩石南一兩麥門冬一兩半去心焙巴戟天一兩上二十五味搗羅為末煉蜜和丸如梧桐子大每服三十丸空心溫酒下補虛壯筋骨論曰人之有身不自愛惜竭情縱欲遂致勞傷筋骨肝腎虛弱精氣不足則骨髓枯竭形體消瘦氣血既虛則百病斯作故為虛損也腎主骨肝主筋補肝養腎使精血氣實則所以筋骨自壯也補虛損除風冷壯筋骨明耳目蘹香丸方蘹香二兩炒川烏頭二兩炮裂去皮臍川楝子二兩陳橘皮二兩去白瓤萆薢二兩地龍二兩去土微炒旋覆花蜀椒去閉口及目炒出汗各二兩上八味搗羅為末煉蜜丸如梧桐子大每服二十丸空心臨臥酒下補虛益血脈補骨脂煎丸方補骨脂微炒別搗二兩附子炮裂去皮臍葫蘆巴微炒巴戟天去心白檳榔炮銼各一兩桃仁一兩去皮尖雙仁以酒一升別研如酪於銀石器中熬五七沸次入蜜二兩又煎五七沸入安息香半兩以酒半盞研細濾入煎內次入補骨脂末熬成膏沉香半兩上七味搗羅五味為末以煎膏為丸梧桐子大每服三十丸生薑鹽湯下補壯筋骨烏潤髭發益血脈助陽氣治一切風攻手足沉重皮膚不仁遍身麻木風勞氣疾何首烏煎丸方何首烏洗淨以竹刀刮去黑皮切一斤與淨黑豆一斤同用新汲水浸一宿炊以豆爛為度取出曝乾牛膝去苗酒浸切焙半兩天南星炮去皮臍菖蒲緊小者去皮毛各四兩上四味搗羅為末以酒四升醋二升慢火熬用竹篦子不住手攪候將藥杵和丸如梧桐子大空心食前溫酒下三十丸通流五臟潤澤血脈反老成少五子丸方余甘子覆盆子酒浸焙菟絲子去浮者酒浸蒸熟焙五味子炒車前子酒浸焙各五兩上五味搗羅為末取二三月間枸杞嫩葉搗研取汁二大升和藥末令汁盡為度又取杏仁一升去皮尖與無灰酒同研取汁五升於銀石器中煎令杏仁無苦味然後下地黃汁半升真酥五兩鹿角膠末五兩同於前汁中略煎過次下五子末以柳枝急攪之慢火熬可丸即並手丸如梧桐子大每日空心溫酒下三十丸如熱任意加減此藥又制金石藥毒壯筋骨益血脈悅顏色椒紅丸方蜀椒去目及閉口者炒出汗取紅三兩牛膝去苗酒浸三宿洗曝乾四兩生地黃五兩取汁熬為膏附子二兩炮裂去皮臍石槲一兩去根桂心二兩肉蓯蓉二兩酒浸去皴皮炙巴戟一兩菟絲子二兩酒浸焙乾為末木香一兩吳茱萸一兩湯浸焙乾炒鹿茸二兩去毛塗酥炙微黃硫黃一兩細研水飛過磁石二兩燒醋淬七遍細研水飛過上十四味搗羅為末入研了藥令勻煉蜜和搗三二百杵丸如梧桐子大每日空心以鹽湯下三十丸治補虛益精髓悅顏色久服輕身倍力耐寒暑壯筋骨暖下元硫黃丸方硫黃四兩酒煮黑色細研雄雀兒五十隻取肉研天雄四兩炮裂去皮臍阿魏二兩面裹煨令面熟為度硇砂二兩細研桂心二兩遠志三兩去心菟絲子二合半酒浸焙乾為末晚蠶砂二兩半醋浸焙乾上九味搗羅為末入研了藥令勻煉蜜和搗三五百杵丸如梧桐子大空心鹽湯或溫酒下二十丸無問老少並得服補虛冷壯腰腳明耳目暖下元巴戟丸方巴戟天去心羌活去蘆頭獨活去蘆頭蘹香子炒白茯苓去黑皮人參枳殼去瓤麩炒木香桂去粗皮檳榔生銼牛膝去苗酒浸焙當歸切焙半夏湯浸七遍焙厚朴去粗皮生薑汁塗炙草豆蔻去皮附子炮裂去皮臍沉香銼白附子炮天麻肉蓯蓉酒浸兩宿焙蓽茇蜀椒去目及閉口者炒出汗京三稜炮銼甘草炙陳橘皮湯去白焙白豆蔻去皮各一兩上二十六味搗羅為細末煉蜜和丸如梧桐子大每日空心溫酒及鹽湯下三十丸補壯筋骨烏頭煎丸方烏頭半斤不去皮尖水浸三兩宿天麻一兩巴戟天去心半兩海桐皮銼一兩補骨脂炒半兩牛膝去苗酒浸切焙一兩半肉豆蔻去殼半兩蘹香子炒一兩萆薢半兩木香一兩石槲去苗半兩沉香銼一兩大棗十五枚爛煮去皮核入膏中上一十三味先用黑豆半升煮烏頭以豆熟為度取出切作片子焙乾用青鹽二兩炒令黃色去鹽搗為細末以醇酒二升先暖酒令滾沸次下烏頭熬成膏然後以諸藥焙乾搗羅為末並棗膏入膏內和納得所丸梧桐子大每服三十丸空心鹽湯下補虛損益氣血壯筋骨五味子丸方五味子熟乾地黃焙補骨脂炒牛膝去苗酒浸切焙各二兩杜仲去粗皮炙銼石槲去根山芋海桐皮銼黃耆細銼各一兩菟絲子六兩淘去浮者酒浸三日別搗取末三兩天雄半兩炮裂去皮臍上一十一味搗羅為細末煉蜜丸梧桐子大每服三十丸空心溫酒下補虛壯筋骨益氣血萆薢丸方萆薢一兩半當歸銼焙厚朴去粗皮生薑汁塗炙乾薑炮京三稜炮銼桂去粗皮附子炮裂去皮臍各一兩陳橘皮湯去白焙六兩上八味搗羅細末酒煮麵糊丸梧桐子大每服三十丸空心食前鹽湯下補元氣壯筋骨明目駐顏補真丸方蘹香子炒一兩附子炮裂去皮臍巴戟天去心各半兩陳橘皮湯浸去白焙一兩青橘皮湯浸去白焙補骨脂炒青鹽研各半兩牛膝去苗酒浸一宿切焙乾蜀椒去目並閉口者炒出汗取紅各一兩上九味搗羅為細末用羊腎一對去筋膜細切於沙盆內研令極細入酒半升煮成糊和丸梧桐子大每服二十丸空心溫酒或鹽湯下補虛壯筋骨治臍下撮痛及小腸氣補氣丸方葫蘆巴炒高良薑炒補骨脂炒烏頭炮裂去皮臍威靈仙去土各半兩蘹香子炒一兩半檳榔生二枚上七味搗羅為細末醋煮麵糊和為丸如梧桐子大每服十五丸空心溫酒下補元氣壯筋骨益精駐顏肉蓯蓉丸方肉蓯蓉酒浸切焙牛膝去苗酒浸一宿切焙葫蘆巴炒蜀椒去目並閉口者炒出汗楝實去核炒蘹香子炒各一兩青鹽炒研半兩上七味搗研為細末用豬腎一隻去筋膜細切將浸藥酒煮熟研爛入前件藥末和勻為丸如梧桐子大每服二十丸稍加至三十丸空心溫酒下補虛益氣血實丹田悅顏色壯筋骨續命丸方干柏葉一斤甘菊花未開者白茯苓去黑皮各半兩山芋三兩熟乾地黃焙四兩松脂一斤用桑柴灰汁二斗煮令白色為度上六味搗羅為細末煉蜜和丸梧桐子大每服三十丸空心溫酒下補壯筋骨肉蓯蓉丸方肉蓯蓉酒浸一宿焙切附子炮裂去皮臍牛膝去苗酒浸一宿切焙菟絲子酒浸二宿別搗末各一兩鹿茸酥微炙去毛半兩上五味搗羅為細末酒煮麵糊丸梧桐子大每服三十丸鹽湯或酒下補益丹田壯筋骨萆薢煎丸方萆薢一斤用新米泔洗淨焙乾入新瓦罐子內以醇酒五升浸用油單密封口放日中曬一七日取焙乾為末補骨脂炒四兩狗脊去毛醋炙巴戟天去心牛膝去苗酒浸切焙蘹香子以鹽一兩同炒各二兩上六味搗羅為細末酒煮麵糊丸梧桐子大每服十五至二十丸空心溫酒或湯下婦人久冷亦可服補元臟壯筋骨益氣力療風寒濕痹身體手足不隨烏頭丸方烏頭一斤河水浸三日竹刀刮去皮臍四破之更浸七日逐日兩次換水切片焙乾半斤青鹽四兩搗碎與烏頭同於銀石器內炒烏頭赤色為度並鹽皆用蘹香子微炒二兩蜀椒去目並閉口者炒過搗篩取末四兩牛膝去苗細切醇酒二升浸七日爛研慢火熬成膏四兩上五味搗羅四味為細末以牛膝膏和劑杵千百下如硬更入少酒丸梧桐子大每服三十丸空心溫酒或米飲下漸加至五十丸治風活血壯筋骨潤肌膚何首烏丸方何首烏一斤米泔浸一宿用竹刀刮去黑皮切作片焙乾赤芍藥牛膝去苗用醇酒浸一宿切焙乾熟乾地黃焙乾各四兩上四味木臼中搗羅為細末以酒煮麵糊丸梧桐子大每服三十丸空心溫酒或米飲下壯元氣治一切筋骨疼痛四生丸方萆薢防風去叉狗脊去毛烏頭去皮臍生用上四味等分先以河水浸烏頭七日七夜切作片每烏頭一兩即用鹽半兩同炒黃次與諸藥同搗羅為細末用米醋麵糊丸如梧桐子大每日空心十丸漸加至三十丸溫酒或鹽湯下補虛強力益志論曰腎在骨故腎憊則力劣心藏神故心虛則多忘強力益志必補心腎心腎得所養則力強而志益矣心腎合德水火相濟則精全神旺無所不通況強力益志哉育神氣強力益志及治風勞氣冷美顏色變髭發枸杞子丸方枸杞子焙覆盆子車前子生乾地黃焙地骨皮續斷何首烏去黑皮巴戟天去心菊花去萼焙白朮菖蒲米泔洗日曝遠志去心細辛去苗葉牛膝酒浸切焙菟絲子酒浸一宿搗爛再焙為末方入前藥以上各一兩上一十五味搗羅為末煉蜜丸如梧桐子大每日空心酒下十丸至二十丸不拘時補心育神強力益志兼止肺嗽及腎臟風冷麥門冬丸方麥門冬去心焙二兩半天門冬去心焙一兩三分茯神去木杜仲去粗皮炙銼柏子仁石菖蒲切焙枸杞子生乾地黃焙百部根去皮各一兩白茯苓去黑皮山