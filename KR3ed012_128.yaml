body:
  text: 卷第一百二十八癰疽門癰疽統論論曰周官瘍醫與疾醫分職而異治凡有瘍者受其藥焉蓋非專門之學不足以深究博識故也人之氣血與天地同流經絡常數與晝夜同度一或壅而不通沮而不行則血老不作汗肉陳不脫垢蒸氣不達癰疽內熱甚於焚溺之患治之不可緩是以喜怒憂樂之不時飲食居處之不節芳草石藥之發動內使陰陽不平而蘊結外使營衛凝澀而腐化輕者起於六腑浮達而為癰外潰膚肉經所謂營衛稽留於經脈之中血澀不行衛氣壅遏不通熱盛則肉腐為膿然不陷肌膚於骨髓骨髓不為焦枯五臟不為傷損其皮薄以澤是也重者發於五臟蘊蓄而為疽內消骨髓經所謂熱毒熾盛下陷肌膚骨髓焦枯五臟涸竭當其病下良肉無餘其皮夭以堅如牛領然是也夫癤腫之患莫大於癰疽明乎二者則凡腫毒丹疹可以類推矣故證有淺深治有輕重若瘡發之初湯液疏其內針石疏其外內外之治不同也五臟內虛則平補內實則快利補瀉之法不同也瘡發於虛處則難瘥發於實處則易愈則生有虛實之辨富貴體逸危殆者多貧賤形苦困篤者少則其形有苦樂之辨淺瘡欲在厚處攻之易平深瘡欲在薄處達之易及則肌肉皮膚有厚薄之辨脈見洪滑粗散其病難治脈見微澀遲緩其病易治則脈之與病有應否之辨凡癰之類其氣浮達宜灸焫而不宜針烙凡疽之類其氣深沉宜針烙而不宜灸焫此灸焫針烙之異也淋射熁貼以消腫毒膏潤溫養以生肌肉此先後終始之序也昔人論癰疽病者惑於人神所在不可妄行針刺見血不知神之與形同為休戚體既不平神烏能定內經謂癰疽不得頃時回恐內爛筋骨穿通臟腑豈有人神之忌耶療疾所向吉凶方三月七月十一月不得向西方治病四月八月十二月不向南方治病正月五月九月不向東方治病二月六月十月不向北方治病凡治病將患人行年本命算與生氣天德福德合者往之必瘥仍須與生氣人看待患者吉占病色候面上法凡患人目中赤脈從上下貫瞳子者一脈一年死二脈二年死若脈下者療之必瘥又曰患人面忽有赤色之多貫上下如脂有赤色從額上下至鼻又黑色出額上大如指及連鼻上至肩又有赤色垂者併為死候不可療論癰疽所生忌穴背面九處不可患瘡第一入髮際為玉枕亦為舌本第二項頸節第三為崇骨第四大椎為五臟第五脊骨兩邊肺俞穴第六夾脊骨兩邊脾俞及肝俞穴第七脊骨兩邊腎俞穴第八後心鳩穴第九鳩尾骨穴正面五處不可患瘡第一喉骨為垂膺第二當胸前為神舍第三為心鳩尾第四當兩乳穴第五臍下二寸為腸屈之間側面三處不可患瘡耳下近耳後牙車尖央陷中為喉脈一穴當髆下一穴為肩骨承山上三寸一穴為腨腸辨癰疽證候美惡法夫癰疽外發其理易明至於內癰內疽隱而不見目既不接治之至難然五臟六腑有俞募雖結固於中而自形於外外察其部內審其源定藥投方若拔芒刺然則癰疽之發有五善七惡之證不可不察也煩躁時嗽腹痛渴甚或泄痢無度或小便如淋一惡也膿血大泄腫焮尤盛膿色敗臭痛不可近二惡也喘粗短氣恍惚嗜睡三惡也目視不正黑睛緊小白睛青赤瞳子上視者四惡也肩項不便四肢沉重五惡也不能下食服藥而嘔食不知味六惡也聲嘶色脫唇鼻青赤面目四肢浮腫七惡也動息自寧食飲知味一善也便利調勻二善也膿潰腫消色鮮不臭三善也神彩精明語聲清亮四善也體氣和平五善也然病有證合七惡皮急緊如善者病有證合五善皮緩虛如惡者非淺識之所知若五善並至則善無以加也若七惡並至則惡為劇矣今載證候並諸俞募以申明之凡五臟六腑募中腑隱隱而痛者肺疽也上肉微起者肺癰也中府在雲門下一寸六分乳肋間動脈應手陷中是巨闕隱隱而痛者心疽也心上肉微起者心癰也巨闕一穴在鳩尾下一寸是期門隱隱而痛者而肝疽也上肉微起者肝癰也期門一穴在第二肋旁一寸半直上兩乳間章門隱隱而痛者脾疽也上肉微起者脾癰也章門二穴在季肋端一名長平一名脅𢨺京門隱隱而痛者腎疽也上肉微起者腎癰也京門二穴在期門下五分是中管隱隱而痛者胃疽也上肉微起者胃癰也中管一穴一名太倉在上管下一寸天樞隱隱而痛者大腸疽也上肉微起者大腸癰也天樞二穴在臍兩傍各二寸陷中是丹田隱隱而痛者三焦疽也上肉微起者三焦癰也丹田一名石門一名精室一名命門一穴在臍下二寸關元隱隱而痛者小腸疽也上肉微起者小腸癰也關元一名液門在臍下三寸上驗其人所募依據此審定癰疽淺深病從何臟腑發先曾食何乳石又驗其氣虛實參詳而療之癰疽攻療諸法凡癰疽癤初生皆只如粟黍粒許大微似有痛癢或觸破之即焮展初覺有之即須速服犀角湯丸及諸冷等藥取通利疏暢臟腑兼以湯水淋射滌其壅滯瘡頭用石藥四畔貼熁藥折其毒勢如此將理覺不退是熱毒稍堅即停用湯水淋射精意辨之定是癰癤便當上灸之若是疽則審按候其淺深燒針烙之於紝上塗止痛引膿膏紝之兼以膏塗帛貼之常令開潤勿令燥也四畔貼熁藥夫血脈喜溫而惡寒若著冷氣過理迫之即滯難瘥若已成大膿者兼瘡中有惡肉即須用豬蹄湯洗之敷䕡茹散等蝕其惡肉候爛肉欲盡即貼生肌膏藥及飲食慎忌寢臥居處觸事抑情剋意將理辨癰疽宜灸不宜灸法凡癰疽發背初生如黍粟粒許或癢或痛覺似有即用湯水淋射兼貼藥熁之經一兩日不退須當上灸之一二百壯如緑豆許大凡灸後卻似焮痛經一宿乃定即火氣下徹腫內熱氣被火導之隨火而出也若能於瘡頭四邊相去各一寸以來更花灸尤妙其瘡若只癢即宜隔豉餅灸之其豉餅須以椒姜鹽蔥相和爛搗捏作餅厚薄如三錢以來當瘡頭豉餅上灸之若覺大熱即微取起少頃再安只灸七壯而已豉餅若干更換新者尤佳瘡若痛即須仍苦灸壯數唯多為妙若是疽即不宜灸夫疽初生形如㾦癗頭白焦枯氣本深沉治者既不精辨亦便灸之或癰癤成膿之後亦令灸之皆能害人初灸三壯不覺痛者為上肉已夭其下膿深及至數壯以後焮痛必倍為熱氣益盛膿伏內攻之火灼其外轉增毒甚不可不知也灸所忌穴具載於後頭維在額角髮際本神旁一寸承光在頭上五處穴後二寸是神庭在髮際直鼻上承泣在目下七分直瞳子陷中是絲竹空在眉後陷中膺窗在胸下一寸六分兩乳中腦戶在枕骨上強間後一寸半風府在腦後髮際一寸大筋旁宛宛中喑門在項後髮際宛宛中脊中在第十一椎節下間三陽絡在臂上大脈溝上一寸下關在耳前動脈是也耳中耳門禁不灸人迎在頸大脈應手挾結喉旁通五臟石門在臍下二寸女子禁不灸伏兔二穴在臍上六寸地五會在足小趾次趾本節後間去俠溪傍一寸五分上件穴據針經並禁不可灸或於上出瘡癤亦不得便灸且以諸方法及湯水注射並用諸藥熁之若已成膿即須針烙出之為其內已有膿縱針烙出之即並無妨其經久瘻即用硫黃灸之灸法上用硫黃一塊隨瘡口大小安之別取少許硫黃於火上燒之以銀叉腳挑之取焰點硫黃上令著三兩遍取膿水以瘡干瘥為度辨癰疽宜針烙不宜針烙法夫癰疽者頭少腫處多出膿不快者宜針烙膿未盛以前不可不以諸藥貼熁救療以安病者之心膿成即當棄藥從針烙也既至膿成即當決意不可疑懼痛頃刻之間以至內潰古今同斃斯疾十有八九深識之士當斷去就夫患癰疽以成結腫須有出處療之無不針針無不瘥未有不針不刺而瘥者未有針刺及時而不瘥者夫痛之極也衆熱聚攻膏膜為之腐爛肌肉為之敗潰內通貫臟腑若不針烙決潰熱毒無從而解膿瘀無從而泄或過時不針即反攻於內內既消敗欲望其生豈可得乎則針烙取瘥實為良法疑而不決為必死之患或隱諱此疾或懼痛不針此神奪其識死期將至癰則皮薄宜針疽則皮厚宜烙古法無烙唯有針刺烙即火也亦謂之燔針劫刺以其有劫病之功也今用烙法多瘥殊隱妙於鈹針法本用鈹針烙法當用火針如似火箸磨頭今尖如棗核團滑用燈焰燒須臾火作炬數蘸油燒令赤皆須近下面烙之一烙不透即再烙之令透若其攻稍廣即須散烙數處並令透則氣疏達膿水易出不假按抑實者拈發為紝虛者出紙為紝塗引膿膏藥紝之兼以膏藥貼之常令開潤勿令急躁若其人羸瘠勿頓出膿徐徐令出癰疽廣大膿潰肌者懼一時之痛不肯四畔多下針烙唯開三兩處而已欲望早愈不亦難乎常見有開腫者不審淺深所烙或當時無膿經宿方潰或下針不出別處生頭或抑擦焮動益加損疼真氣轉傷經云病淺針深則氣血伏沉若病深針淺則毒氣不泄反為大癰也如務求速瘥腫內余膿及膿根未盡便令瘡合後必再發諸發腫都軟而不痛者即並宜針烙若發於背者即須用水角乃得痊愈辨癰疽宜水角不宜水角法凡療癰疽發背腫高堅硬膿稠焮盛色赤者宜水角陷下肉色不變軟慢稀者不用水角角法於寬靜室中不當風處平實地掘一小坑口稍闊於瘡重深一尺以下去此坑二尺外又為一坑子口闊三四寸旁穿兩坑令相通灌水並令去坑面二寸於地上腰背下先鋪油單三兩重闢地氣即以席薦東西鋪坑口兩畔令患者以瘡合坑上無令偏側腰間布氈褥務令安隱則得久角角口兩畔以繒帛遮擁兼蓋復水坑口勿令通泄熱被水引下滲地中臥一炊久為度瘀滯膿血並泄角中熱盛者日夜三四遍腫氣不侵每日或兩度亦得候其毒解熱退水角方止中間以藥熁之熱毒及癰託命在醫宜用意惻怛心機百變如愛己身始可濟人凡看疾之人尤須安靜或有言中旁觸遂使患者驚疑至於庸醫昧於深理就施針艾尤不能精用水角則太早以火攻則稍遲何者疽之萌生而用水角則內熱毒畏冷逼之卻入腠理皮肉堅厚毒氣內堅肉變為膿以致內潰深可哀也疽之已成而乃火攻則火毒相擊令人煩悶加其虛憊可不慎乎或富貴之人遭遇此疾多貯水銀以為水角尤妙用水銀角法上揀穩實地穿一坑口稍闊於瘡腫處深可四五寸先於坑中布紙五六重襯水銀諸餘鋪設一依前方其水銀多至一升以來如無只三五合亦得石癰論曰人之氣血得熱則淖澤得寒則凝結石癰者寒氣凝結致熱氣不得散故其腫毒硬實如石之狀而謂之石癰治宜溫調營衛散其寒邪使氣得陽而外發則膿血出而腫硬自消治石癰久不瘥黃耆當歸散方黃耆銼十兩當歸切焙八兩上二味為散每服三錢匕溫酒調下不計時候治石癰結聚腫硬熱痛臟腑祕澀木香丸方木香一兩檳榔銼三分芎藭羌活去蘆頭各半兩大黃銼炒一兩附子炮裂去皮臍人參各半兩枳殼去瓤麩炒三分牽牛子炒令香一兩半陳橘皮湯浸去白焙半兩上十味搗羅為末煉蜜為丸如梧子大貯以瓷合每服三十丸空心粥飲下通利為度如未利加至四十丸治石癰皮色紫赤惡寒壯熱一二日未成膿者下之升麻湯方升麻連翹大青各一兩生地黃焙二兩大黃銼炒一兩敗醬絡石白蘞各半兩玄參一兩上九味粗搗篩每服五錢匕水一盞半煎至八分更入芒硝末半分去滓空心溫服微利為度治石癰已服前升麻湯後用木香散塗貼方木香大黃銼炒升麻白蘞芒硝赤小豆各半兩上六味搗羅為散以榆白皮汁入水少許調和如糊塗故帛上貼日二治石癰結實已壞未壞占斯散方占斯厚朴去粗皮塗生薑汁炙熟生乾地黃焙栝蔞乾者去皮敗醬防風去叉桔梗銼炒人參細辛去苗葉各一兩桂去粗皮半兩上十味搗羅為散每服食前以溫酒調下二錢匕治石癰腫毒結硬疼痛口乾煩熱四肢拘急不得臥沉香湯方沉香三分