body:
  text: 卷第三十七瘧病發熱身黃小便不利論曰寒熱凌瘧於人名為瘧病瘧而發熱小便不利者身必發黃此蓋熱氣下迫入於小腸水道既澀故小便不利也治瘧病手足苦煩發熱渴燥通身悉黃小便不利常山飲方常山柴胡去苗甘草炙微赤銼梔子仁各一兩赤茯苓去黑皮石膏蜀漆鱉甲塗醋炙令黃去裙襴各二兩上八味粗搗篩每服五錢匕水一盞半入竹葉二七片鼓五十粒煎至八分去滓不計時候溫服治瘧病發熱煩渴咽乾口燥身黃怠惰小水澀滯知母湯方知母地骨皮升麻犀角屑人參麥門冬去心焙柴胡去苗各一兩石膏鱉甲醋炙令黃去裙襴各二兩甘草生銼半兩赤茯苓去黑皮三兩上一十一味粗搗篩每服四錢匕水一盞半入香豉五十粒煎至八分去滓不拘時候溫服治瘧病大渴煩躁引飲不止身體皆黃小便不利柴胡湯方柴胡去苗二兩甘草炙微赤銼半兩知母人參麥門冬去心焙杏仁湯浸去皮尖雙仁麩炒微黃各一兩上六味粗搗篩每服四錢匕水一盞煎至六分去滓不計時候溫服治瘧病發熱煩躁體黃小便不利麥門冬湯方麥門冬去心焙犀角屑杏仁湯浸去皮尖雙仁麩炒微黃常山銼甘草炙微赤銼各半兩糯米八十一粒上六味粗搗篩以水五盞煎至三盞去滓分為五服於發時前溫服治瘧病發熱身體皆黃小便不利升麻湯方升麻柴胡去苗各四兩桂去粗皮人參常山甘草炙各二兩大黃炮半兩上七味粗搗篩每服三錢匕水一盞煎八分去滓溫服治瘧病但熱不寒遍身發黃小便澀滯茯苓散方赤茯苓去黑皮三兩桂去粗皮麻黃去節甘草炙銼各一兩上四味搗羅為散每服三錢匕新汲水調服不拘時治瘧發熱身黃小便不利蜀漆湯方蜀漆常山人參赤茯苓去黑皮桂去粗皮各一兩大黃炮半兩上六味粗搗篩每服三錢匕水一盞入生薑五片棗三枚劈同煎至八分去滓溫服不拘時治瘧病發熱煩躁身面皆黃小便不利茯苓湯方赤茯苓去黑皮桂去粗皮黃芩去黑心各一兩升麻常山蜀漆甘草炙銼各半兩上七味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治瘧病頭痛發熱身面黃色小便不利常山散方常山梔子仁桂去粗皮赤茯苓去黑皮甘草炙銼上五味等分搗羅為散每服二錢匕溫水調下不拘時治瘧病身黃髮熱小便不利常山散方常山鱉甲塗醋炙令黃去裙襴升麻赤茯苓去黑皮梔子仁人參各一兩上六味搗羅為散每服二錢匕溫水調服不拘時治溫瘧發熱身黃咽乾苦渴小便不利鱉甲湯方鱉甲塗醋炙令黃去裙襴甘草生用各一兩冬瓜汁四合車前葉一握無葉取子二合常山半兩上五味粗搗篩四味漿水二盞並冬瓜汁隔宿浸欲發日五更初以急火煎取一盞半去滓分為二服五更一服取快吐三五度至發時又服亦取吐三五度過時便得吃漿水粥補之治溫瘧發熱身面皆黃小便不利常山丸方常山赤茯苓去黑皮各二兩香豉炒乾二合上四味搗羅為末以粟米飯和丸如梧桐子大每服三十丸溫酒下不拘時治瘧病身黃髮熱小便不利升麻湯方升麻一兩常山檳榔各三分鱉甲塗醋炙令黃去裙襴知母生地黃各一兩半上六味銼如麻豆每服五錢匕水一盞半入蔥白三寸豉三十粒同煎至八分去滓溫服不拘時治瘧病發熱身黃小便不利茯苓湯方赤茯苓去黑皮白芍藥瞿麥穗各一兩白朮三分上四味粗搗篩每服五錢匕水一盞半入蔥白五寸生薑一分拍碎同煎至七分去滓食前溫服瘧痢論曰瘧痢者瘧久不瘥寒熱邪氣內傳腸胃也其病寒熱往來利下膿血赤白相雜腸中切痛隨其陰陽而治之治瘧兼痢無問赤白水穀鮮血皆主之黃連犀角丸方黃連去須犀角屑豉炒各二兩龍骨四兩牡蠣熬半兩上五味為細末煉蜜丸如梧桐子大每服三十丸米飲下日三治瘧痢無度赤白相雜黃連丸方黃連去須黃柏去粗皮銼炒羚羊角屑艾葉炒赤芍藥各二兩當歸切焙一兩上六味為細末煉蜜和搗三百杵丸如梧桐子大每服三十丸粥飲下不拘時治瘧痢挾熱下血腹痛地榆湯方地榆銼黃連去須黃芩去黑心犀角屑各一兩升麻茜根各半兩上六味粗搗篩每服四錢匕水一盞半煎至八分去滓溫服不拘時治瘧兼痢不止常山丸方常山黃連去須豉炒各三兩附子炮裂去皮臍二兩上四味為細末煉蜜丸梧桐子大每服四丸米飲下未發前空腹服欲發更服三丸自旦至暮乃食三日勿雜食佳治瘧痢苦渴烏梅飲方烏梅二十枚劈破上一味以水三盞煎至一盞去滓和蜜一匙細細飲之治瘧痢黃連散方黃連去須當歸切焙各一兩乾薑炮半兩上三味為細散每服三錢匕水一盞煎至七分放溫臨發時服如茶點或熱水調服亦得治瘧痢牡蠣散方牡蠣熬常山銼陳橘皮湯浸去白焙桂去粗皮各三分上四味為細散每服一錢匕溫酒調下治瘧氣急黃並痢前胡丸方前胡去蘆頭赤茯苓去黑皮芍藥枳殼去瓤麩炒黃芩去黑心各半兩大黃一兩生大麻仁一兩半細研上七味為細末煉蜜丸如梧桐子大每服十丸午食前以米飲及漿水下令溏利為度不利加至十五丸老小量意服之有痃癖者宜加後藥虻蟲去翅足炒二十枚黃耆薄切天門冬去心焙各一兩鱉甲去裙襴醋炙生乾地黃焙各二兩赤茯苓去黑皮人參各半兩上七味為細末與前藥末相和煉蜜丸如梧桐子大每服二十丸漸加至三十丸空心地黃酒下以瘥為度瘴氣論曰傳言瘴者山川厲毒之氣又云江山霧氣多瘴凡以其氣鬱蒸而然也諸家方論治瘴之法不一或謂其證與傷寒相類有在表可汗者有在裡可下者有在膈可吐者又或以治瘧之法治之者今原廣南山川地形瘴氣所生之因及春夏之交瘴氣所起之時與夫人染瘴氣而拯治之法悉著於篇庶可考焉且陽生於子盛於巳陰生於午盛於亥陽不極則陰不萌陰不極則陽不芽而廣南位當巳午則陰陽之氣蘊積於此可知矣天不滿西北地不滿東南西北方陰也土地高厚東南方陽也土地卑下而廣南方屬東南則土地之卑下可知矣以其土地卑下而陰陽二氣之所蘊積是以四圍之山崇高回環百川之流悉皆歸赴及秋草木不凋瘁當冬蟄蟲不伏藏寒熱之毒蘊積不散霧露之氣易以傷人此正岐伯所謂南方其地下水土弱霧露之所聚者也故瘴氣獨盛於廣南然瘴氣所起其名有二孟夏之時瘴名芳草而終於秋孟冬之時瘴名黃芒而終於春四時皆能傷人而七八月之間山嵐煙霧蛇虺郁毒之氣尤甚故當是時瘴疾大作不論壯老或因飢飽過傷或因榮衛虛弱或沖煙霧或涉溪澗但呼吸斯氣皆成瘴疾其狀頭疼體痛胸膈煩滿寒熱往來咳逆多痰全不思食發渴引飲或身黃腫脹眉須脫落是皆毒癘鬱蒸所致夫生於陵者安於陵其土人宜無所慮矣然且日食檳榔蓋檳榔之為性破堅毒除蘊積故耳治法當先以磁石下收其陰次以丹砂上正其陽陰陽氣正中滿自消然後以檳榔解其餘蘊治瘴收陰磁石丸方磁石三兩煅醋淬一七遍上一味搗羅為末醋煮麵糊丸如梧桐子大每服三十丸新汲水咽下臨臥一服治瘴正陽丹砂散方丹砂三兩水飛研上一味飛研取細每服半錢匕溫蜜水調下平旦一服治瘴氣解蘊毒檳榔湯方檳榔三兩生銼上一味粗搗篩每服二錢匕水一盞煎至七分日午一服凡服此藥隔夜先服磁石丸次早服丹砂散當日午服檳榔湯至夜再依此次第服之三日後病勢減藥減半病勢盡藥即止治山嵐瘴氣安心臟丹砂丸方丹砂研半兩阿魏一分米醋浸令軟研以醋為糊用白朮人參白茯苓去黑皮當歸切焙各半兩上六味搗研五味為末用阿魏醋煮麵糊丸如梧桐子大如常服空心溫酒嚼下七丸遇患者空心桃仁湯嚼下十丸檳榔湯亦得治山嵐瘴氣如瘧秦艽湯方秦艽去苗土柴胡去苗各半分常山一分烏梅肉三枚糯米一撮上五味銼如麻豆即用水二盞煎至一盞半去滓分溫二服未發前服之取吐利治山嵐氣炒桃仁方桃仁一斤吳茱萸青鹽各四兩上三味同入鍋內炒候桃仁熟為度以瓷瓶貯密封七日後取出去茱萸並鹽只將桃仁去皮尖時嚼一二十枚大辟山嵐毒氣治山嵐瘴氣令不著人草豆蔻飲方草豆蔻去皮高良薑甘草炙各半兩上三味粗搗篩每服五錢匕煎作熟水頻飲之治山嵐瘴氣有黑霧起處急服卻毒散方麻黃去根節蜀椒去目併合口炒出汗各一兩烏頭炮裂去皮臍白朮各半兩防風去叉一兩桔梗炒桂去粗皮各半兩乾薑炮一分上八味搗羅為散每服一錢匕溫酒調下每日食前常服治山嵐瘴氣面黃力劣寒熱往來心胸煩悶常山飲方常山二兩乾漆炒煙出三分甘草炙銼一兩豉生用一合上四味粗搗篩每服五錢匕水一盞半同煎八分去滓空心溫服吐出黃痰效治山嵐瘴氣痰滯嘔逆時發寒熱荷葉散湯乾荷葉大者一片砒霜研一分緑豆半兩甘草一分炙上四味搗羅為散每服半錢匕冷水調下吐出痰效治嵐瘴鬼瘧等辟邪丸方緑豆四十粒為末黑豆三十粒為末砒霜半錢研細丹砂兩粒如豆大研鉛丹一錢研留少許為衣上五味同入乳鉢內滴冷水丸如梧桐子大每服一丸以東南桃心七枚取井華水研向日咽下醋水亦得治瘴氣數日寒熱不定鱉甲丸方鱉甲去裙襴醋浸炙常山炒豉炒各半兩上三味搗羅為末入麝香少許再研勻煉蜜丸如梧桐子大每服十丸至二十丸空心臨臥溫米飲下於發前服慎熱物一時久即不吐瀉治嶺南瘴氣頭疼體痛寒熱往來胸滿腹脹煩渴嘔逆咳嗽多痰心躁狂言大便難小便赤露宿湯方常山炒一兩秦艽去苗土梔子仁柴胡去苗青蒿子檳榔生銼甘草炙銼各半兩桂去粗皮一分上八味粗搗篩每服三錢匕水三盞入烏梅二枚黑豆二十粒煎至一盞半去滓露一宿五更初再溫服其滓再入水二盞煎至一盞去滓當夜臨臥時服治瘴氣虛弱面色萎黃不思飲食或困或省心腹脹滿痞氣耳鳴補元氣十補丸方巴戟去心肉蓯蓉酒浸切焙白朮米泔浸一宿切焙五加皮銼石斛去根各一兩鹿茸去毛酥炙半兩人參菟絲子酒浸一宿別搗柏子仁研菊花各三分上一十味等分搗羅為末煉蜜丸如梧桐子大每服二十丸空心臨臥溫酒下鹽湯亦得治嶺南諸瘴豫固丸方丹砂雄黃各一兩並水飛過令乾鬼臼半兩為末阿魏一分法酒半升熬成膏上四味再研勻阿魏膏和丸如雞頭大緋絹袋貯十丸常執手中頻嗅瘴氣內行不著人遇瘴病者並華水嚼下三丸五服可瘥治瘴氣噁心四肢疼痛口吐酸水不思飲食憎寒壯熱發過引飲二廣七閩多山嵐煙霧蛇虺郁毒之氣當秋七八月之間芒華髮時此疾大作謂之黃芒瘴又謂黃茅瘴是也蓋人或因飢飽或由虛怯或沖煙霧或涉溪澗遂得此疾謂之黑腳瘴蝦蟆瘴啞瘴其名不一並皆療之香椿散方香椿嫩葉酒浸焙三兩甘草炙南壁土向日者臘茶各一兩上四味搗羅為散每服二錢匕用酒調下如患久者更入甘遂柴胡各半兩空心臨臥服治瘴疫時氣瘟黃若徒嶺表行此藥常帶隨身茵陳蒿丸方茵陳蒿四兩大黃五兩豉五合熬常山梔子仁熬芒硝研杏仁去皮尖雙仁炒研各三兩鱉甲去裙襴醋浸炙二兩巴豆半兩去皮心熬別研去油上九味搗研為末煉蜜丸如梧桐子大初得時氣三日旦服五丸至半時許或吐或利或汗為效如不吐利不汗更服一二丸即以熱飲投之老小加減凡黃病痰癖時氣傷寒瘧痢小兒熱欲發癇服之皆瘥治瘴氣尤妙治瘴氣久治不瘥者菖蒲散方菖蒲乾者白朮銼炒蒼朮銼焙梔子仁荊芥穗芎藭各一兩甘草炙銼干薄荷側柏炒黃色吳茱萸湯洗焙乾硝石研各半兩上一十一味搗羅為散用薄荷湯調下二錢匕如患熱疾水一盞入生薑五片棗二枚劈破煎至七分溫服治嵐瘴煮豆丸方白朮貫衆去土蒼朮去皮甘草炙等分上四味搗羅為末煉蜜丸如彈子大每一丸先用黑豆一盞銚子內鋪面令平於豆中心安藥丸在豆內添水高豆一指許慢火煮水乾取豆曝乾以絹袋盛豆每服二十粒新水下有瘴處空心一服如涉遠遇飢新水下五十粒至一百粒可充飢餒治瘴木香檳榔丸方檳榔雞心者陳橘皮湯去白焙各二兩木香附子大者炮裂去皮臍人參厚朴去粗皮生薑汁炙桂去粗皮羌活去蘆頭京三稜炮獨活去蘆頭乾薑炮甘草炙銼芎藭大黃銼炒芍藥各半兩牽牛子一斤搗取末四兩肉豆蔻六枚去殼上一十七味搗羅為末瓷器盛密封臨服再用牽牛末二兩藥末一兩同研令勻煉蜜為丸如梧桐子大心腹脹滿一切風勞冷氣臍下刺痛口吐清水白沫醋心痰癖氣塊男子腎臟風毒攻刺四肢及陽毒腳氣目昏頭痛嘔逆及兩脅堅滿臨臥橘皮湯下三十丸以利為度婦人血痢下血刺痛積年血塊胃逆手足心煩熱不思飲食生薑湯下三十丸取利小兒五歲以上疳氣腹脹氣喘空心溫湯下五七丸小者減丸數服凡胸腹飽悶不消脾泄不止臨臥溫酒下取利熱毒癰疽發背山嵐瘴氣才覺頭痛背膊拘緊便宜服之快利為度常服可以不染瘴疾凡瘴疾皆因脾胃實熱所致常以涼藥解膈上壅熱並以此藥通利彌善此藥本治嵐瘴及瘟瘧大效昔人嘗刻石於大庾嶺蒙效者不可勝數皆以快利為度治瘴氣烏藥湯方烏藥銼焙一斤半夏半斤生薑絞汁浸參宿焙乾桂去粗皮一兩馬鞭草焙半斤荊芥穗陳橘皮去白焙乾各四兩甘草炙銼二兩上七味粗搗篩每服二錢匕水一盞入生薑五片煎七分去滓不拘時溫服治初得瘟黃瘴氣憎寒壯熱速宜通轉茵陳丸方茵陳蒿一兩大黃銼鱉甲去裙襴醋浸炙黃常山杏仁湯去皮尖雙仁炒令黃梔子仁各半兩巴豆去皮心膜研出油盡芒硝研各一分上八味搗研為末以豉汁和丸如梧桐子大每服空心茶下五丸得快利以冷粥止之瘴瘧論曰人與天地同流通萬物一氣故有感於山川毒厲之氣而為病者瘴瘧是也以其寒熱時作與瘧同類故謂之瘴瘧傳謂兩山夾水多瘧蓋陰氣多而陽氣少則易為寒熱之疾故也治瘴瘧經百日或一年者白薇湯方白薇蜀漆葉各半兩常山一兩知母切焙半兩鱉甲去裙襴醋炙黃三分甘草炙銼苦參各半兩大黃生一兩升麻半兩石膏碎三分豉一合蒜獨顆者三枚切淡竹葉切三兩赤茯苓去黑皮三分龍膽黃芩去黑心各半兩上一十六味銼如麻豆每服三錢匕水一盞酒半盞同煎至一盞去滓未發前溫一服發時一服仍以藥汁塗手面良治瘴瘧麝香散方麝香研一錢鱉甲去裙襴醋炙黃半兩丹砂研二分甘草炙半兩大黃炒三分常山一兩上六味搗羅為散每服二錢匕未發前溫酒調下臨發時更一服治諸瘴癘及蠱毒瘧等木香丸方木香一分半升麻三分鱉甲去裙襴醋炙黃甘草炙各半兩玄參豬苓去黑皮各三分犀角鎊檳榔銼各半兩豉炒一合上九味搗羅為末煉蜜丸如梧桐子大每服三十丸空腹溫酒下日三服治山嵐瘴瘧或入山早吸毒氣令人寒熱如瘧終日不已頭痛痰逆嘔吐不下食日漸羸瘦砒霜丸方砒霜半兩雄黃丹砂以上三味一處同研玳瑁鎊藜蘆炒椿葉陰乾者各一兩阿魏一兩半別研上七味搗研為末和勻用安息香一兩酒浸重湯煮為糊丸如赤小豆大每用三丸男左女右以緋絹袋盛繫於臂或衣帶上如瘧不已即用醋湯麵東咽下三丸如要吐空心漿水下五丸如吐甚以冷水調緑豆末一二錢匕服即止忌熱物此藥五月五日合勿令婦人雞犬見治瘴瘧白朮丸方白朮丹砂研麝香研丁香訶黎勒皮安息香入胡桃仁研檀香銼蓽茇犀角鎊各半兩熏陸香蘇合香龍腦研各一分莎草根石膏木香各半兩上一十五味搗研為末煉蜜丸如梧桐子大每服十丸空腹井華水下老人小兒三丸仍用紗絹袋盛帶於臂闢鬼氣臘月合以新瓷器盛勿令泄氣治嵐瘴寒瘧兼解邪毒砒霜丸方砒霜一分澱花二兩鐵砧上末四兩淘淨上三味搗研為細末用麝香少許金銀箔四十片以糯米粽子丸如雞頭大每服一丸用酒磨下或吐或瀉為瘥治山嵐瘴瘧寒熱往來或二日或三日一發常山飲方常山銼厚朴去粗皮生薑汁炙熟各一兩草豆蔻去皮肉豆蔻去殼各兩枚烏梅和核七枚檳榔銼甘草炙各半兩上七味粗搗篩每服二錢匕水一盞煎至六分去滓候冷未發前服如熱吃即吐治山嵐瘴瘧寒熱久不瘥保安湯方常山半兩青蒿知母各一兩桃仁湯浸去皮尖雙仁研半兩上四味粗搗篩每服二錢匕水一盞生薑半分同煎至六分去滓稍熱服不拘時治一切瘴瘧常山飲方常山秦艽去苗甘草炙銼麻黃去根節烏頭炮裂去皮臍銼杏仁去皮尖雙仁炒研陳橘皮湯浸去白焙乾薑炮厚朴去粗皮生薑汁炙各半兩上九味銼如麻豆每服五錢匕水一盞半生薑半分棗二枚劈破煎至一盞去滓未發前不拘時溫服治山嵐瘴瘧赤小豆丸方赤小豆三分鬼臼丹砂研雄黃研阿魏研鬼箭羽各半兩上六味先搗研五味為末酒煎阿魏和丸如梧桐子大每服一粒仍用一丸緋絹帛子系中指上男左女右治瘴瘧南方山嶺瘴氣令人寒熱發作無時萎黃腫滿四肢痹弱鯪鯉甲酒方鯪鯉甲炙五枚鱉甲去裙襴醋炙黃烏賊魚骨去甲附子炮裂去皮臍各一分常山半兩上五味細銼以酒二升半漬一宿瘧發前稍稍服之勿絶藥味也兼以酒塗身體服藥良久方可進飲食寒熱往來論曰寒熱往來者陰陽虛實更勝也夫陰實生內寒陽虛生外寒皆為陰勝陽陽實生外熱陰虛生內熱皆為陽勝陰陰陽相勝故寒熱互作而往來治法宜使陰陽和平氣無相勝則病可愈治寒熱往來夜臥盜汗四肢無力飲食口苦上氣咳嗽柴胡湯方柴胡去苗一兩半五味子桔梗炒熟乾地黃焙白茯苓去黑皮麥門冬去心焙紫菀去苗人參地骨皮黃耆銼白朮桂去粗皮牡蠣研粉各一兩半夏去滑湯洗七遍甘草炙各三分上一十五味粗搗篩每服三錢匕水一盞生薑半分拍碎棗三枚劈破煎至六分去滓溫服不拘時候治寒熱往來久成癆瘵地骨皮湯方地骨皮知母焙柴胡去苗枳殼去瓤麩炒各半兩鱉甲去裙襴醋炙三分赤茯苓去黑皮三分虎頭骨一兩酒塗炙焦上七味粗搗篩分為五帖每帖以水三盞煎取一盞下地黃汁一合更煎三五沸去滓分溫二服食後良久相繼服日一帖治寒熱似瘧桔梗湯方桔梗銼炒一兩甘草炙半兩知母焙半兩柴胡去苗一兩半大黃銼炒半兩鱉甲去裙襴醋炙二兩上六味銼如麻豆分為六帖每帖用童子小便二盞蔥白三莖豉半合浸食頃煎取一盞去滓食後分溫二服日一帖治寒熱乍進乍退虎骨湯方虎骨湯一兩酒炙為末甘草炙一分知母焙半兩蔥白七莖鱉甲去裙襴醋炙半兩豉一分上六味細銼如麻豆用水三盞煎取二盞下童子小便半盞和煎數沸去滓食後良久分溫三服治寒熱不能飲食羸瘦少力黃耆湯方黃耆銼二兩人參白茯苓去黑皮各一兩柴胡去苗當歸切焙各半兩白朮一兩桂去粗皮半兩甘草炙半兩枳殼半兩去瓤麩炒桔梗銼炒半兩桃仁半兩湯浸去皮尖雙仁麩炒黃上一十一味粗搗篩每服三錢匕水一盞生薑半分拍碎棗三枚劈破煎至六分去滓不計時候溫服
