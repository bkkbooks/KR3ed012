body:
  text: 卷第一百三十五灸瘡論曰火艾焮毒有不可忍者為穴俞內通臟腑也陶隱居謂灸焫不依穴俞或犯日時禁忌天地不和之氣及灸後食毒不慎房室與夫灸數過多皆令火毒發瘡洪腫痛楚經久不瘥治灸瘡發腫火毒疼痛柏皮膏方柏白皮三兩當歸一兩薤白五兩豬脂一斤上四味除薤白豬脂外細銼熬脂令沸下諸藥煎候薤白赤黑色以綿布絞去滓瓷合盛塗敷瘡上日三五度即瘥治灸瘡焮腫及赤爛黃連散方黃連去須赤小豆馬蹄燒灰大黃楸葉等分上五味搗羅為散每用半錢匕以生麻油調塗之治灸瘡痛不可忍甘草膏方甘草為末半兩乳香少許研蠟少許上三味熔蠟入二藥末成稀膏貼之治灸瘡膿壞久不瘥方豬脂臘月者一斤胡粉研一兩薤白切一握上三味先煎豬脂入薤白令黃去滓傾入瓷合入胡粉攪令勻每取故帛上塗貼日再易治灸瘡止痛抽火毒吮膿黃耆膏方黃耆白芷白芨白薇當歸芍藥防風去叉甘草細辛去苗葉嫩桑枝一分垂柳枝二兩乳香研一分鉛丹六兩清麻油一斤上一十四味除乳香油鉛丹外細銼以油浸一宿次日煎候白芷黃黑色綿濾去滓下鉛丹以柳篦攪候變黑色滴水中為珠子即入乳香末足攪令勻以瓷合盛用薄紙上塗貼瘡日二上或膿水多易藥時用蔥湯軟帛浸洗貼膏以瘥為度治灸瘡當歸膏方當歸切焙甘草銼胡粉研羊脂各二兩豬脂三兩上五味除羊豬脂胡粉外搗羅為末先熬脂令沸下諸藥末粉等以柳篦攪令勻瓷合盛取塗敷瘡上以故帛貼之亦得日一易以瘥為度治灸瘡經久不瘥薤白膏方薤白細切一握生地黃拍碎三兩梔子仁一兩杏仁去皮尖一兩胡粉三兩白芷一兩酥二兩羊腎膒脂一升練成者上八味除酥脂外細銼先以酥脂微火煎烊下薤白等藥候白芷色赤以綿濾去滓用瓷器盛下粉攪令勻塗帛上貼之日三兩上以瘥為度治灸瘡疼不可忍梔子仁塗敷方梔子仁石灰地椒黃柏塗蜜炙鉛丹各半兩上五味搗羅為散塗敷瘡上日三五上即瘥治灸瘡久不瘥癢痛出黃水方楸葉或根皮不拘多少上一味搗羅為末塗瘡上即瘥治灸瘡久不瘥肉爛疼痛方密陀僧煅過研白礬燒令汁枯研上二味等分研勻先煎蓮子草汁洗瘡去痂後以藥敷之治灸瘡不瘥鼠膏塗敷方死鼠一頭燒灰上一味細研為末以豬脂調如糊日三五度塗敷瘡上即瘥治灸瘡末著痂及出膿久不合者四時貼敷方春以柳絮夏以竹膜秋以新綿冬以兔毛上四味依時貼妙治灸瘡止痛綠雲散方柏葉芙蓉葉並重午日午時採上二味不拘多少陰乾搗羅為散每灸瘡黑蓋子脫了即用井水調少許如膏藥攤楮紙上貼之更無痛楚治灸瘡血不止蔥白塗敷方蔥白一握上一味研絞取汁塗敷瘡上日三五度諸瘡生肌肉論曰瘡毒既化膿血而按之內虛肌肉不平者熱氣雖盡寒氣不除經絡不足以溫之故也若不速治則復生惡肉變為冷瘡此宜內溫其氣血外溫其皮肉內外得溫新肌自生惡液盡去無不瘥矣治發背癰疽已潰暖肌生肉芎藭散方芎藭一兩當歸切焙人參防風去叉桂去粗皮各三分厚朴去粗皮生薑汁炙白芷芍藥甘草炙銼黃耆銼桔梗銼炒各半兩上一十一味搗羅為散每服二錢匕溫酒調下日三服治發背癰疽等瘡疼痛肌肉不生鯪鯉甲散方鯪鯉甲炙令焦黑桂去粗皮當歸切焙各半兩上三味搗羅為散每服二錢匕溫酒調下日晚空心服加至三錢匕治癰疽發背一切瘡腫已潰出膿血暖肌生肉王不留行散方王不留行龍骨各二兩野葛皮一分乾薑炮桂去粗皮各三分栝蔞根當歸切焙各一兩上七味搗羅為散每日空心溫酒調下二錢匕候藥力應漸加至三錢匕晚再服取瘥為度治一切瘡生肌肉止疼痛化膿消腫生肌散方黃蜀葵花焙乾半兩乳香研一分不灰木一兩白蘞一分上四味搗羅為散先用溫甘草水洗過瘡乾摻瘡上日三次斂一切瘡口生肌止痛黃連散方黃連去須木香檳榔銼等分上三味搗羅為散干敷瘡上日三次治諸瘡不合生肌地黃膏方生乾地黃三分白芨白蘞甘草生銼各半兩白芷三分豬脂半斤練上六味除脂外搗羅為末入脂內熬成膏候冷日三四上塗之治一切瘡生肌及金瘡不合生肌膏方白芍藥乳香研胡粉乾薑炮各一兩油四兩蠟二兩上六味除油蠟外搗羅為末熔油蠟相和煎如膏候冷貼瘡上日二換之治諸瘡生肌肉桃紅散方鉛丹炒半兩白蘞為末一兩胡粉二兩上三味同研為細散每用少許瘡上乾摻後貼膏藥治瘡止痛生肌肉乳香餅子方乳香麒麟竭沒藥並細研各半分上三味再同研令細勻以狗膽和成膏捏作餅子如榆莢大每用時看瘡大小以餅按瘡上外用膏藥貼定治諸惡瘡瘡口生肌肉頗遲者生肌散方牆上多年白蜆殼火煅通赤去火候冷研草無名異為末密佗僧火煅過各一錢上三味更入麝香少許同研令勻細每用少許摻瘡口上生肌止痛金花散方密佗僧花乳石火煅過龍骨各一兩乳香一錢膩粉三錢匕上五味研為細散每用摻貼瘡上治瘡口不合生肌方雞內金陰乾檳榔銼木香黃連去須等分上四味為末貼之取瘥為度及治金瘡止痛生肌石榴散方上用酸石榴一枚扎作竅子納白礬一兩慢火內深焙燒半日存性為散貼之取瘥為度治諸瘡生肌斂瘡口檳榔散方檳榔生為末寒水石炭火燒紅去灰細研各半兩龍骨研白蘞末白芨末各一分上五味再研勻每用薄摻瘡口內次以諸膏藥貼治瘡生肌烏賊魚骨膏方烏賊魚骨末舊船縫石灰各研一兩鉛丹二兩半麝香研一錢油八兩上五味先熬油令沸次下船灰烏賊骨末鉛丹以柳篦攪候變黑色即入麝香更攪令勻稀稠得所以瓷合盛薄紙上貼日兩次治發背癰疽一切瘡腫排膿血生肌肉薤白膏方薤白細切四兩當歸切焙附子炮去皮臍白芷芎藭續斷各一兩細辛去苗葉半兩黃耆銼一兩半豬脂三斤上九味除豬脂外銼碎以酒半升拌一宿熬脂令沸下諸藥煎候白芷赤黑色以綿濾過瓷合盛每日三兩次取塗瘡上治諸癰疽去膿血後虛困生肌膏方黃耆當歸各三分生地黃一兩半防風去叉大黃芍藥黃芩去黑心芎藭續斷附子生去皮臍白芷甘草細辛去苗葉各半兩豬脂二斤上一十四味除豬脂外並銼碎先以醋半升拌一宿入脂以瓷器盛於甑上蒸半日以綿絞去滓瓷合盛取塗敷瘡上日三兩次用治發背癰疽已潰不生肉暖肌干瘡蓯蓉膏方肉蓯蓉一兩當歸蜀椒去目閉口者炒出汗之細辛去苗葉烏喙各半兩薤白七莖生乾地黃一兩蛇銜草白芷各半兩半夏一兩甘草半兩豬脂二斤桂去粗皮半兩上一十三味除脂外銼碎以醋半升拌藥一宿先熬脂令沸下諸藥煎候白芷赤黑色漉出以綿濾過瓷合盛取塗瘡上日三五度以瘥為度治瘡腫生肌肉定疼痛綿紅散方寒水石火煅如粉二錢定粉龍骨搗研乳香各一錢干胭脂看多少入粉令紅色上五味搗羅為細散敷入瘡口中用紙貼治惡瘡久不合柏皮散方黃柏末三分細瓷末一分甘草末一錢上三味和勻干敷瘻瘡論曰久瘡膿潰不止故謂之瘻內經謂陷脈為瘻留連肉腠即此病也得之諸瘡不瘥毒氣流注經絡及針艾妄施或用力傷折皆能傷脈故脈陷而氣漏是以頸頷四肢及腰脊背脅脈有所傷皆致此病惟肌肉實處治之易愈生於虛處則難平也若遲留歲月或為漏骨疽及偏枯之病蓋營衛環周不息脈有所陷不行必內侵於骨髓而為疽血氣漏於一偏久而虧涸亦或成偏枯也治瘻瘡連年不瘥出膿水不止黃耆丸方黃耆銼牡丹皮各三分犀角鎊甘草炙銼各一兩玄參惡實炒木通銼各一兩半上七味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心溫酒下晚再服治瘻瘡狗骨塗敷方狗頰連齒骨煅鐵屑虎糞鹿角各二兩上四味搗羅為散每用豬脂調納瘡孔中日五六度換以瘥為度治瘻瘡麝香散方麝香研突厥白密佗僧蜣螂石灰研青蒿心膩粉研硫黃研各半兩上八味搗研羅拌勻先以鹽漿水洗瘡用散子填滿瘡口肉以帛縛定三兩日肉若有惡物即除去依前換藥如無不用換不過三兩日即瘥治瘻瘡晝開出膿夜復合附子塗敷方附子一枚搗末鯽魚一頭開去腸肚上二味將附子末納魚肚中滿以泥固濟炭火上燒通赤取出去泥研細為末塗敷瘡口內日用三五次以瘥為度治遠年瘻瘡黍葉裹敷方黍葉上一味爛搗裹敷瘡上日三度又方栝蔞根上一味搗為末塗敷瘡上日三五度治遠年瘻瘡不瘥殭蠶塗敷方白殭蠶炒上一味搗羅為末塗敷瘡口內以熟艾作炷灸之癢痛初惡膿出後清血出更用蠶末塞瘡內以帛裹定治瘻瘡伊蘭草塗敷方伊蘭草七葉狗頭骨燒過二兩上二味搗羅為末塗敷瘡口內日一換以瘥為度治瘻瘡朝生暮落花敷方朝生暮落花陰乾為末上一味取塗敷瘡上日三次治瘻瘡巴豆塗敷方巴豆一分去心皮膜出油盡肥棗十枚去核皮上二味細研以水一升煮稀稠如膏於布中絞取汁塗敷瘡上日一次治瘻瘡麝香丸紝瘡方麝香研石膽研膩粉研杏仁去皮尖雙仁炒各一分香鼠一枚去腸胃洗淨炙乾巴豆一粒去心皮膜出油盡上六味搗研為末用麵糊和丸黍米大紝在瘡內日一二次治下部瘻瘡砒黃敷方砒黃研蛔蟲陰乾為末各半兩上二味研令勻敷瘡口中以帛裹定日二次治諸瘻雞子塗敷方雞子三枚蒸熟去殼白取黃炒黑色上一味先用鹽湯洗瘡後塗敷日三五次又方臘月豬脂上取塗敷瘡口內日三五次用紙貼定以瘥為度又方上取新生兒屎一百日以來者收置密器中取塗敷瘡口內日三五度即瘥熱腫論曰內經謂諸病胕腫皆屬於火故熱勝則腫流走無常若火炙然亦或謂之流腫也此得之風熱搏氣血而作熏爍鼓動四肢而著腹背大則如盤小則如手甚則熠熠然遍於一體之中令人五心煩熱唇口乾燥如注之狀治宜湯液盪滌於內膏敷發泄於外使熱氣得通則腫自消矣治熱腫熱毒升麻犀角丸方升麻黃芩去黑心防風去叉人參當歸切焙黃耆銼干藍甘草炙銼梔子仁黃連去須各一分犀角鎊屑一兩大黃半兩巴豆二十四枚去皮膜心炒焦研細上一十三味搗羅為末煉蜜丸如梧桐子大每服三丸至五丸溫水下以利為度不拘時候治臟腑久有積熱發為毒腫向夜疼痛漏蘆湯方漏蘆去蘆頭升麻大黃銼醋炒黃芩去黑心各一兩藍葉玄參黑堅者各半兩上六味粗搗篩每服十五錢匕水六盞竹葉二十一片同煮至三盞去滓下芒硝半錢匕分溫三服空心日午夜臥各一利即減未利即加服數治熱腫三黃丸方黃連去須大黃銼炒黃芩去黑心各二兩上三味搗羅為末煉蜜丸如梧桐子大每服十五丸至二十丸溫熟水下不拘時候治熱腫懼向暖處周身毒熱蒸人者秦皮湯方秦皮銼一兩半防風去叉三兩車前子微炒二兩黃連去須三分上四味粗搗篩每服五錢匕水一盞半煎至七分去滓溫服食後臨臥各一治熱毒腫防己丸方防己大黃銼醋炒各三兩芍藥檳榔煨各二兩一分牛膝去苗酒浸切焙薏苡仁炒生乾地黃焙枳殼去瓤麩炒各二兩麥門冬去心焙木香各一兩半桂去粗皮一兩一分茯神去木一兩上十二味搗羅為末煉蜜丸如梧桐子大每服二十丸漸增至三十丸食後良久溫酒或生薑湯下日三治熱毒腫或身生瘭漿鉛酒方鉛五兩酒一斗無灰者上二味將鉛熔成汁投入酒中又取鉛熔再投酒中如此十度然後淨濾澄清時飲三合至五合不可過醉醉甚則吐損正氣治熱毒腫或身生瘭漿甘草湯方甘草炙銼二兩上一味粗搗篩每服六錢匕水二盞煎至一盞去滓食後良久及夜臥時各一服治熱毒腫惡實丸方惡實炒二兩山梔子去皮五兩上二味搗羅為末煉蜜丸如梧桐子大每食後良久熟水下十五丸日再夜一治熱毒氣腫楸葉膏方楸葉一秤立秋日採切馬齒莧新者半秤切上二味淨洗控干沙盆內爛研取自然汁重絹濾過慢火熬成膏瓷器收之凡有熱腫先以漿水洗腫處次以甘草水洗然後攤藥於薄紙或絹上隨腫大小貼之日再換治熱毒腫麝粉散方麝香研半錢匕膩粉一錢匕馬兜鈴根一分黃柏半兩上四味搗研為散用油調塗腫處立消治熱腫犀角膏方犀角鎊屑升麻山梔子去皮生用黃芩去黑心芍藥芒硝連翹大黃銼生用蛇銜草白蘞生用各二兩玄參黑堅者三兩蒴藋切四兩干藍葉生用一兩半生地黃十兩研絞取汁漏蘆去蘆頭生用二兩半豬脂四斤不入水者別煎上一十六味內十四味銼如麻豆與地黃汁相和經宿別煎豬脂濾去筋膜停溫入諸藥以微火煎半日去滓膏成用瓷合盛以故帛塗膏貼腫處及瘡上治一切熱腫欲結瘡癤焮疼痛拔毒散方草烏頭去皮臍生搗為細末一兩蚌粉半兩上二味拌勻每看多少臨時用新汲水調攤紙上貼之治熱腫赤痛白龍散方蛤粉白礬各二兩青鹽一兩上三味同研為末用生油調塗腫處治熱毒腫金花散方黃柏二兩雄黑豆一兩緊小者是也大黃半兩上三味搗羅為散浸甘草水調如膏量腫處大小攤貼以紙蓋之治諸熱毒腫痛欲成瘡癤者大黃散方大黃栝蔞根黃芩去黑心百合當歸切焙各半兩葛根一兩銼黃柏根銼芒硝赤小豆各一分粳米一合上一十味銼焙搗羅為散量腫處大小用新汲水化蜜調藥如膏攤於腫處紙蓋之一日一換治一切熱腫毒五倍子散方五倍子大黃黃柏各一兩銼上三味搗羅為散新汲水調如糊日三五度塗敷患處治兩腿或遍體生熱毒瘡爬著清水出腫爛癢痛不可忍方上取水楊枝葉不限多少水煎減一半斛內終日浸洗又方豉炒煙盡黃連去須各一兩上二味同搗為末臘月豬脂和塗之如濕瘡即干敷毒腫論曰毒腫之病風毒結腫於皮膚肌肉之中亦有根於虛軟處邪氣不出入人腹中乃至不救古方謂與風腫不殊蓋以同受於風特輕重之異耳令人壯熱憎風比風腫之證不止為虛浮而已治毒腫初結膿血未潰發熱疼痛宜先服五香連翹湯方連翹射干升麻獨活去蘆頭桑寄生木通沉香木香薰陸香研麝香研各二兩丁香一兩大黃炒三兩上一十二味㕮咀十味如麻豆大再研入研藥和勻每服五錢匕水一盞半煎至一盞入竹瀝三分再煎一沸去滓溫服以微利為度治一切毒腫服之腫化為水犀角丸方犀角鎊三兩升麻黃芩去黑心防風去叉人參銼當歸銼焙黃耆銼乾薑炮蓼藍焙黃連去須甘草炙梔子仁各四兩大黃銼三分巴豆二十枚去皮心膜炒黃上一十四味研巴豆令極細余並搗羅為細末入巴豆和勻煉蜜和丸如梧桐子大每服五丸米飲下加至十丸以利為度得利以溫漿水粥助之常服即減丸數腫消即止治毒氣攻肌肉中腫痛寒熱心煩悶大五香湯方木香雞舌香沉香銼藿香葉犀角薰陸香各一兩甘草炙升麻細辛去苗葉吳茱萸湯洗去涎炒麻黃去節根桂去粗皮各半兩上一十二味粗搗篩每服四錢匕水一盞半煎至一盞去滓溫服不拘時候治毒腫木香湯拓方木香雞舌香鱉甲去裙襴醋炙升麻薰陸香研烏藜根雄黃研吳茱萸湯洗去涎炒甘草炙各半兩上九味研七味如麻豆大入研藥和勻以水三升煎至二升去滓用故帛三五重浸湯中更互拓腫上不計遍數冷再暖用夏月去茱萸解惡毒風腫檀香飲方白檀香沉香各一塊重一分檳榔一枚上三味各於砂盆中以水三盞細磨取盡濾去滓銀石銚內煎沸候溫分作三服治風毒熱結日夜疼痛心煩懊悶大黃丸方大黃切作小塊灑醋微炒三兩甘草炙三兩杏仁去皮尖並雙仁研如膏四兩訶黎勒煨取皮三兩芒硝研五兩上五味先將三味搗羅為末後入芒硝末杏仁膏同和入煉蜜為丸如梧桐子大每服十五丸溫水下初服未利加二十丸腑臟實則三十丸量虛實服之以效為度治腫毒皂莢乳香酒方皂莢刺大者一枚銼作十餘片用乳香一塊雞頭實大銀石器內炒令煙起入皂莢刺同炒候香纏在刺上便入醇酒一盞同煎令沸濾去滓作一服腫未成者便消已成者則膿毒自破治一切毒腫疼痛摩風止痛玉龍膏方栝蔞大者一枚取瓤子細銼爛為度零陵香芍藥藿香葉甘草炙黃耆杏仁湯浸去皮尖雙仁各一分香白芷半兩清油一十兩黃蠟一兩半麝香研一分當歸一分烏蛇酒浸取肉焙半兩生薑切一兩上一十四味除黃蠟麝香外細銼如麻豆大以油浸於銀石器內慢火養一日次日添火熬令黃色用綿濾去滓後入黃蠟攪勻看硬軟欲凝方可下麝香傾在瓷罐子內候冷貼腫處治惡毒風腫及一切腫毒大黃散拓方大黃生銼五兩白蘞生銼三兩寒水石生研紫葛生用木香各一兩硝石研黃芩去黑心大青苦參銼各二兩上九味搗羅七味為細末入研藥和牛乳調如膏塗於故帛拓腫上隨拓即消干復易之治惡毒風腫及白虎風痛蔥熨方釅醋五升取三年者蔥白切三升上二味相和煮沸漉出蔥用熟布帛熱裹當腫上熨之冷即更煮依前熨以瘥為度治惡毒風腫熱痛水銀拓方水銀五十兩上一味以紙分為兩裹密系頭更以熟絹帛重裹勿令走失更互於腫上按拓覺溫即易置水銀裹於濕冷地不住按拓熱毒腫處盡即止治卒得惡毒風腫不消結成堅核莽草散貼方莽草銼附子去皮臍生銼木香白蘞桂去粗皮各一兩上五味搗羅為細末別以榆根銼搗絞取汁調藥於故熟帛上貼開一小竅子出毒干則易之治惡毒風腫塗令消大黃散方大黃生銼木通銼葶藶子各二兩上三味搗羅為細散以水和調塗腫上干則易之治諸腫毒保救膏方楸葉五斤馬齒莧連根三斤各淨洗切焙上二味用水五斗慢火煮時將柳木篦攪至一斗許住火放冷濾去滓將汁再熬令濃以新瓷罐子盛用時以雞翎掃藥如瘡腫痛以軟帛子貼之追風毒消腫散方附子生去皮臍銼石硫黃研天南星生各半兩上三味搗羅為細散醋調塗在腫處干則易之解惡毒風腫或著人陰或偏著一邊疼痛攣急牽引小腹悶亂難忍蘹香草飲方生蘹香草不拘多少上一味搗研絞取汁每服一合用溫酒三合同煎令沸空心晚食前溫服治一切毒腫不問硬軟楸葉貼方楸葉新摘者上一味取十重複腫上以故帛裹之日三度易如冬月葉乾以鹽水浸良久用或取根皮銼搗敷之亦得又方胡蔥上一味熟搗和生油調塗之即瘥治毒腫繁柳散方繁柳焙乾燒灰二兩白蘞一兩赤小豆一合大黃銼一兩上四味搗羅為細散以新汲水調和如糊塗貼腫上干即易以瘥為度治毒腫灶土塗方上取灶底黃土以醋和研塗腫上日三五度治諸毒腫膏方升麻白蘞漏蘆去蘆頭連翹芒硝各二兩黃芩去黑心蛇銜草各三兩蒴藋根四兩山梔子二十枚上九味搗碎酒浸半月以豬膏二升煎之候氣歇膏成濾去滓瓷器盛塗貼腫處治一切熱毒腫並乳癰方木香紫葛檀香銼朴硝各二兩赤小豆二合升麻銼白蘞白礬研各一兩上八味搗研為散入水和如稀麵糊以榆皮汁亦佳可隨腫大小塗貼干即易治熱毒腫方蔓荊根蕓薹苗葉根各三兩上二味搗篩為散以雞子清和貼熁干即易治毒腫無定處或振慄惡寒或心腹刺痛射干飲方射干附子炮裂去皮臍各三兩商陸根薄切二兩赤小豆炒三合麻子一升半上五味㕮咀以水五升先煮麻子取三升去滓研麻子令破以麻子汁煮藥以豆熟為度去滓取二升分溫空腹四服日夜令盡小便利即毒腫消治初覺腫痛令消大黃敷方大黃銼炒一兩木通銼葶藶紙上炒莽草各半兩上四味搗羅為末以水和塗之干即易治一切風熱毒腫忽發頸項胸背才發即封之便不成膿方生地黃切四兩豉三兩芒硝五兩上三味搗令熟爛敷腫上厚二分日五六度敷消盡即止治腫毒蒺藜散貼方蒺藜子一升熬黃去角上一味搗羅為散麻油和如泥炒令焦黑敷故帛上看腫大小貼之勿開孔無蒺藜子者以小豆末和雞子敷之結陽論曰內經謂結陽者腫四肢夫熱勝則腫而四肢為諸陽之本陽結於外不得行於陰則熱菀於四肢故其證為腫況邪在六腑則陽脈不和陽脈不和則氣留之以其氣留故為腫也治結陽四肢腫滿熱菀不散犀角湯方犀角鎊屑玄參連翹柴胡去苗各半兩升麻木通銼各三分沉香銼檀香銼射干去毛甘草炙銼各一分芒硝麥門冬去心各一兩上一十二味粗搗篩每服五錢匕水二盞煎至一盞去滓食後溫服日三治結陽氣壅四肢腫熱大小便秘澀木香丸方木香芎藭羌活去蘆頭桂去粗皮各二兩大黃銼如半慄大醋炒紫色檳榔煨郁李仁湯浸去皮研如膏各四兩上七味先以六味搗羅為末入郁李仁再研勻煉蜜和丸梧桐子大每服二十丸或三十丸生薑湯下空腹臨臥各一服治四肢腫熱氣脈壅滯防己丸方防己銼三兩牛膝去苗酒浸焙薏苡仁炒生乾地黃焙枳殼去瓤麩炒各二兩芍藥去土銼檳榔煨銼各二兩一分茯神去木一兩桂去粗皮一兩一分麥門冬去心木香各一兩半大黃銼如半栗子大醋炒紫色三兩上一十二味搗羅為細末煉蜜和丸梧桐子大每食後生薑湯下三十丸治熱菀四肢腫實不散令人氣壅白蘚皮散方白蘚皮黃芩去黑心升麻玄參白蒺藜微炒去刺桔梗去蘆頭炒防風去叉前胡去蘆頭百合甘草炙梔子仁茯神去木各半兩馬牙硝一兩麥門冬去心一兩半上一十四味搗羅為細散每服三錢匕食後薄荷湯調下治熱毒流於四肢腫痛不消升麻湯方升麻大黃銼如半慄大醋炒紫色各二兩前胡去蘆頭梔子仁射干去毛炙各一兩半黃芩去黑心犀角鎊屑各一兩豉炒半升羚羊角鎊屑半兩上九味粗搗篩每服三錢匕水一盞半煎至一盞去滓食後溫服日三
