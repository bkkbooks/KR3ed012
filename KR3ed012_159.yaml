body:
  text: 卷第一百五十九産難門逆産論曰逆産者蓋因孕婦初覺腹痛産時未至驚動傷兒兒回轉未竟便用力産之即令逆也又或安産之處及坐臥須順四時方向並避五行禁忌若觸犯者多致災禍治難産或經數日或生不以理橫逆艱難百方千計終不平安者急服此藥藥至兒身上立生若妊娠入月便服臨産則易不覺兒出酥膏方真牛酥一斤秋葵子一升白蜜半斤大豆黃卷二兩滑石搗末二兩瞿麥一兩上六味先將藥四味為末次取酥於慢火中煎化後下蜜攪勻將藥投入調和得所以瓷合盛每服一匙溫酒調下加至二匙治橫産及倒生胎斃腹中及衣不出母欲絶半夏散方半夏為末用生薑汁製作餅曝乾半兩白蘞一兩上二味搗羅為散每服二錢匕溫酒調下産難一服橫産二服倒生三服胎斃衣不出四服此方加瞿麥一兩煎服尤佳治逆産不正小麥飲方小麥小豆各揀淨炒上二味等分粗搗篩每服三錢匕水一盞煎至七分去滓溫服治婦人橫産倒生死胎在腹脹爛不出催生柞木葉飲方柞木葉一把圓參寸長寸並細枝子銼甘草一莖長一握如小拇指拍破上二味用水三升半慢火同煎至一升半去滓用瓷瓶盛紙封瓶口於産婦房內慢火煨先服一小盞少頃心頭快更服一小盞不問服數三四盞內惡物下尋常催生甚驗治橫生倒産子死腹中胎衣不下烏金散方當歸酒浸切焙沒藥別研生乾地黃焙蒲黃生用芍藥炒紅藍花炒各一兩鯉魚鱗臘月者佳桂去粗皮各二兩血餘小兒胎髮真者二枚上九味將血餘鯉魚鱗二味用銷銀鍋子先以炭火燒為灰沒藥別研余藥搗羅為末和勻每服二錢匕溫酒調下不拘時治難産經三四日或橫倒不出垂死滑胎煎方瞿麥取穗一兩酥五兩滑石葵子各二兩黑豆皮一合白蜜四兩牛膝去苗一兩上七味除酥蜜外搗羅為末將酥蜜煉熟入諸藥末及牛乳汁五兩煎成汁以瓷器盛每服半匙溫酒或湯化下不拘時治橫産倒生安胎酸漿飲方五葉酸漿草不拘多少上一味取自然汁半盞酒半盞染胭脂末半錢匕和勻溫飲之未效再服治逆産法大蒜七顆去皮生薑半兩蔥白去青三十莖各拍碎上三味置在一盆子中以百沸湯五碗乘熱投於盆中速扶産婦於盆上坐候冷易之凡三易則胎正又法上取灶底心黃土細研五合以生薑汁煎令熱調如糊塗産母臍中以熱帛系之頻換又法上取鹽和胡粉醋調塗兒兩足下即順又法上取蒲黃用水調塗兒足心底又法上取丹砂末半錢匕蜜調塗兒足底又以丹砂筆書兒兩足底左作千字右作里字即順又法上取三家鹽熬令黃研末以津唾調塗兒足底次取三家飯置産婦手中又法上以父名書兒足底即順又法上取車釭中膏書兒足底作出字又法上以針刺兒先出足底兒足痛驚還即順手出如刺足法又法上以中指取釜底墨煤交書兒足下即順治逆産及子死腹中艾葉湯方生艾五兩上一味以清酒一升煮取七合旋服之則順或不飲酒用水煮之又方火麻仁淨揀研爛半兩上一味以水二盞同煎至一盞去滓溫服又方上取牛齝涎絞以溫酒和服之又方上燒錢七枚令赤投一盞酒中去錢飲之又方葵花焙乾葵子亦得三兩上一味搗羅為散每服二錢匕溫酒調服又方上取車輞上土以三指撮溫酒調服又方上取灶屋上黑塵以溫酒服二錢匕又方上取彈子二枚搗羅為散以溫酒調服二錢匕又方上取甑帶燒灰研散溫酒調服二錢又方上取蛇蛻皮燒灰研末溫酒調服一錢匕面東向服一方取蛇皮灰豬脂丸如梧桐子大每服五丸面東吞之又方上取晚蠶子紙一幅燒灰研末米飲調服又方上取夫十指甲燒灰研末以溫酒調服又方上取梁上塵三指撮以暖酒調服之又方上取菟絲子搗為末溫酒調服二錢匕又方上取車前子搗為末溫酒調服二錢匕又方當歸切焙一兩上一味搗羅為末每服二錢匕溫酒調服又方大豆五合上一味以苦酒二升煮減半分溫服之産難論曰臨産或難蓋為和氣動亂心氣不寧所致也古人有預備方法臨月服滑胎散並日行一二千步貴使血氣下順至産無留難之慮欲産先須看産圖及催生湯藥無令喧雜驚忙又須産閣溫暖或遇嚴寒之日四圍燒火及備熱湯爇諸異香常令香火湯氣及身惟諳事人看候産婦才覺腹痛速與食飲令飽無或困乏飢以雌雞煮粥渴以醋蜜煎湯悶以新汲冷水少飲或空痛經日而胎未動者宜安心耐忍以薦席鋪地就上安産免為地氣所侵又就上行三五百匝或困於行暫且扶立須臾又行如血水俱下痛陳及腰此欲産之兆也諸餘法度宜次序行之治難産不下經日車前子散方車前子微炒半兩榆白皮刮淨銼碎一兩滑石半兩當歸切焙半兩瞿麥穗一兩上五味搗羅為散每服二錢匕用酒調下溫湯亦得如血水未下用大黃二錢煎湯一盞分作三服調前藥下治産難催生如意膏方萆麻子三七粒去殼研如膏丹砂半錢研細上二味一處和研勻用油單一片方圓如盞口大將藥攤之當臍下少腹間貼之外以帶帛系令固候産罷並胞衣下畢速去之稍緩即脫人氣血此藥覺腹痛便宜用之治難産經日未生牛酥煎方真牛酥三兩秋葵子一合白蜜二兩滑石瞿麥穗大豆黃卷各一兩上六味先以清酒一升研細葵子納酥蜜中微火令稍後即下諸藥慢火煎常如魚眼沸約強半如膏即將瓷器中以綿濾之用溫酒調初服半匙漸加至一匙治難産車前子煎方車前子一升以布裹於水中熟挼漉出日曝乾又以新布裹熟揉之令光滑不用搗生地黃汁一升白蜜一升好酥五合上四味相和微火煎常令如魚眼沸起即瀉於瓷器中每半匙以沸湯調通口服之治難産數日不下蛇蛻皮丸方蛇蛻皮一條燒灰臘月兔腦髓一枚車脂棗許大曝乾上三味除兔髓外搗羅為末以兔髓搜和為丸如梧桐子大每服二十丸溫酒下治難産滑胎貝母散方貝母一兩半去心稱槐子十月上已日採之佳一兩半上二味搗羅為散每服三錢匕以熟水調服未生更服治難産産乳論云三十後嫁者謂之晚嫁也少嫁則筋骨軟弱易産晚嫁則筋骨堅強所以難産入月宜常服苧麻根飲方干苧麻根新者刮削淨銼碎陳橘皮湯浸去白焙甘草炙生乾地黃焙烏梅去核取肉人參各二兩上六味粗搗篩每服二錢匕以水一盞生薑二片同煎至七分去滓溫服日夜各一治腹痛雖甚二三日不産蒲黃散方蒲黃一合研槐子微炒半兩上二味搗研為細散每服二錢匕以溫酒調服須臾即生治難産如覺痛甚服此散即覺平安馬齒莧散方馬齒莧常莧各曝乾三兩重午日採上二味搗羅為散每服二錢匕新汲水調服宜頻服之治難産燒弓弦散方弓弦五寸銼碎箭竿五寸銼碎上二味同燒作灰研為細散作一服以溫酒調下其子即出未效再燒服治數日不産胎上衝心欲死牛酥飲方牛酥半兩冬葵子淨淘微炒一合滑石三分上三味以二味搗羅為末和牛酥置生絹袋內盛之用酒一升煎至七合去藥袋子令溫每服半盞一二服如未下更服之治難産生地黃飲方生地黃汁一盞生薑汁二分盞上二味同煎至一盞分四服每以湯或酒和服胎即生也治難産催生芍藥散方赤芍藥二兩漚麻頭一握揀擇淨銼碎芎藭當歸切炒茯神去木甘草微炙陳橘皮湯浸去白焙各二兩亂髮灰一分上八味搗羅為散臨臥時溫酒調下二錢匕頻服之立生治難産蟹爪飲方蟹爪銼一合甘草微炒半兩阿膠炙令燥一兩上三味㕮咀如麻豆每服三錢匕以東流水一盞煎至七分去滓溫服如未産更一二服治難産澤瀉湯方澤瀉一兩瞿麥去根銼碎二兩半榆白皮刮淨銼碎二兩甘草炙令赤一兩半桂去粗皮木通銼碎牛膝酒浸半日切焙一兩上七味粗搗篩每服四錢匕以水一盞半入生薑三片同煎至一盞去滓溫服一服未産更服治難産腹痛胎不轉動甘草湯方甘草微炙半兩榆白皮刮淨銼碎一兩桂心一兩半葵子一合滑石三分上五味搗篩為粗末每服四錢匕以水一中盞煎至六分去滓溫服治難産催生抵聖散方紅藍花六月六日取蜀葵花五月五日採桃花三月三日採凌霄花七月七日採大麥七月十五日採各一分上五味依時採取搗羅為細散每服三錢匕以熱酒調下立産又方蛇蛻皮一條全者端午日取置於沙鍋中用紙一張包裹上一味蛇皮用水浸於日下煎之候乾收此紙有難産者剪三小片子如蛇形新汲水吞之立産或每片紙子內拌牛糞中豆與吞亦神效産時男左女右手內把藥出也又方瞿麥半兩桂心二錢半蟹爪半合牛膝酒浸半日切焙半兩上四味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服如未産更服治難産疑胎斃腹中試驗當歸湯方當歸切焙二兩芎藭銼二兩上二味粗搗篩每服五錢匕以水一盞煎至六分去滓溫服如胎活則便安如胎斃即下又一法苦酒調下亦驗治難産數日不出或子死腹中母氣欲絶桂心湯方桂去粗皮一兩半瞿麥取穗木通銼碎牛膝酒浸半日切焙榆白皮刮淨銼碎各二兩上五味粗搗篩每服四錢匕以水一盞半煎至八分去滓溫服如未生更服又一方單煮瞿麥服之亦出治婦人血氣不調心腹㽱痛或月閉不通每有妊娠多難産易生湯方蒼朮淨洗去皮十二兩桔梗六兩枳殼去瓤麩炒麻黃去根節附子炮裂去皮臍陳橘皮湯去白焙各三兩芍藥白芷芎藭當歸切焙甘草銼桂去粗皮半夏湯洗七次赤茯苓去黑皮各一兩半厚朴去粗皮生薑汁炙乾薑炮各二兩上一十六味除桂枳殼二味別為粗末外一十四味同為粗末慢火炒令色轉攤冷次入桂枳殼末令勻每服三錢匕水一盞半醋一合入生薑三片煎至一中盞去滓稍熱服不拘時候治婦人難産及橫逆生神聖散方干豬胎鯉魚皮女人亂髮三味各一兩入瓶子內燒令焦鐺墨伏龍肝細研各半兩墨煅醋淬三兩當歸切焙桂去粗皮芍藥白殭蠶炒白芷白附子炮芎藭各一兩上一十三味搗羅為散再研細每服三錢匕熱酒調下臨産腹痛時便子母俱無恙産後每日空心一服治月內諸血疾治難産滑胎車前子散方車前子滑石各一兩阿膠炙燥一兩半上三味搗羅為散每服二錢匕蜜湯調下不拘時服治難産及已産胞衣不下或墮胎後血不下瞿麥湯方瞿麥穗硝石黃連去須滑石甘草炙各一兩王不留行延胡索當歸切焙大黃銼炒各一兩一分生乾地黃焙連皮大腹銼鬼箭羽射干威靈仙去土雷丸檳榔銼京三稜煨銼郁李仁炒各一兩半吳茱萸湯洗焙炒半兩牽牛子炒二兩上二十味粗搗篩每服五錢匕水一盞半入生薑五片同煎至八分去滓溫服不拘時又方珍珠研半兩伏龍肝一兩上二味搗羅為散每服二錢匕溫酒調下治婦人臨産胞傷風冷腹痛頻並不能分免催生湯方王不留行京三稜煨銼牽牛子炒百合當歸切焙威靈仙各一兩半雷丸大黃銼炒天雄炮裂去皮臍各一兩桂去粗皮甘草炙各三分大腹二兩銼上一十二味㕮咀如麻豆每服五錢匕水一盞半煎至八分去滓溫服治妊娠難産方水銀一分膩粉一分兔腦十二月者上三味研以兔腦和為丸如梧桐子大不計時候以溫水下五丸治難産多時不下垂困宜服此七聖煎方瞿麥滑石各一兩牛乳黑豆黃酥三味各二兩冬葵子一合白蜜二合上四味搗篩為細末以乳酥蜜調藥令勻慢火熬成稀膏每服一匙熱酒調下治難産勝妙寸金散方敗筆頭一枚燒灰上一味細研為散取生藕汁一盞調下立産若産母虛弱者恐藕汁冷動氣即於銀器內重湯溫過與服大妙治難産方上取蓮花葉一片書作人子字吞之立産治婦人諸般惡産滑胎散方槐子炒麥糵炒當歸切焙滑石上四味等分搗羅為散每服二錢匕溫酒調下不拘時服治難産催生二聖丹方丹砂乳香上二味同研如粉用倒