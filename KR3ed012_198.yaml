body:
  text: 卷第一百九十八神仙服餌門神仙統論論曰嵇康之論養生曰世或謂神仙可以學得不死可以力致又曰上壽百二十古今所同過此以往莫非天妄此皆兩失康之大意以謂神仙特受異氣稟之自然非積學所能致至於導養得理以儘性命上獲千歲下數百年可有之耳夫以康論養生則善矣而獨以神仙為不可學何哉黃帝之論天真混元之言道德皆以虛無為宗恬惔為本至於黃庭內景金碧參同其為養生引年之道皆一道也而獨以神仙為不可學則非也昔黃帝問道於廣成子廣成子曰無規無聽抱神以靜形將自正必靜必清無勞汝形無搖汝精乃可長生所謂道者如此而已若夫飛丹煉石導引按蹺與夫服氣辟穀皆神仙之術所不廢者今具列云神仙草木藥上神仙服餌草木必取其柯葉堅固形質不變若松柏茯苓之類其意蓋以延年益壽為本至於其他非具五行之秀則必備四氣之和其意深矣千金謂服餌大法必先去三蟲三蟲既去次服草藥草藥得力次服木藥木藥得力次服石藥精粗相代由粗以至精其序不可紊也採松脂方上常於立夏日代松橫枝東西者圍二三尺長一丈許者倒地以器盛一頭就下日內曝之其脂自流出三四遍取以和藥此脂特與生雄黃相宜若堅硬者更以酒於火上消之汁出者冷酒中引之常以春三月入衡嶽之陰取不見日月之松脂煉而食之煉取為不黏度服之百日耐寒暑二百日益臟腑久則神仙又方上以日入時破其向陰以取其膏破其向陽以取其脂脂膏等分食之可以通神靈鑿其陰陽令方寸深五寸還以皮掩其孔無令風入風入不可服也以春夏取之取訖密封以泥塗之勿泄氣又方上斫取老枯肥松及節細劈長尺許置甑中蒸之滿甑中其脂自流入釜中水內數數取過置冷水中候凝依法煉之又方上松皮中有聚脂者最第一其根下亦有枝傷折處亦有得不見日月處者名陰脂彌良唯衡山東行五百里有大松皆三四十圍其脂甚多又方上夏至日取松脂法河南少室山有大松取陰處斷之其脂膏流出收入器中依法煉之去苦味乃以白蜜煉去沫與脂等分相和得所每日服一升無他物只飲水自足令人不飢長服可以終身不食初服一升三日後只如彈丸大消軟服之渴即飲水令人不老煉松脂方上取松脂不拘多少入釜中添湯煮之一炊久乃取以新綿隔濾入冷水中與人對引之如此三十次則成矣又方松脂一斤桑灰汁一石上二味以灰汁一斗於釜內煮松脂三五沸取接置冷水中候凝復煮之如此十度乃止逐度易灰汁並換冷水其脂白矣取煉成白脂研羅為末每服一匙頭以酒或米飲調下空腹日午近晚服若至十兩以上不飢一年以後夜視目明久服不老又方松脂一斤上一味以水五升煮之候消去濁渣取清好者投冷水中如是百二十遍止不得輒率意便止候四十遍輒一易湯凡三易湯方成以無苦味為度其脂軟白如泥乃用白茯苓一片搗羅為散內煉成脂中拌令得所置冷處候可丸丸如杏仁大日吞三十丸十日止自不欲飲食久當絶谷又方松脂二十斤上為一劑以大釜中著水釜上加甑其甑中先用白茅鋪襯令勻茅上更著生黃土約厚一寸許乃著松脂以物密蓋勿令泄氣其灶下用桑燃之如釜中湯耗添暖水蒸一炊久乃接取脂入冷水中候凝更蒸如前法三蒸畢乃止其脂色如玉狀用以和藥取甘菊花白茯苓等分為細末和丸如梧桐子大以酒下十丸空心日午近晚服每蒸時或酒灑如前法又方松脂十斤煉成者松實去皮三斤柏實三斤甘菊花五升上四味搗研為末煉蜜和丸如梧桐子大每服十丸粥飲下日三服百日以上不復飢又方白松脂十二兩經十三遍煉者白蜜一斤四兩白蠟一斤四兩白茯苓去黑皮十二兩為末上四味都以大器內盛之坐於甑內勿令泄氣蒸之如炊一石米久取出乃丸如梧桐子大每服十丸溫酒下如飢復取十丸服之不得食一切物飲酒不過一合又方松脂二斤煉成者遠志去心炒令微赤七兩上二味搗研為細末煉白蜜和丸如梧桐子大每服三十丸米飲或溫酒下早晨日午近晚各一服十五日後不欲飲食絶谷升仙不食方松實去皮菊花等分上二味搗末以煉了松脂和丸如梧桐子大或煉蜜為丸每服十丸酒下日三服可至二十丸亦可作散服兩錢匕空腹日午近晚服又方松實去皮上於七月採未開口者淘取沉水者控干椎去皮搗末酒服二錢匕日三四服亦可用松脂和丸如梧桐子大每服十丸酒下服經三百日日行五百里益精補腦久服神仙服松根方松根上取東行者剝白皮細銼曝乾搗羅為末可飽食之能絶谷渴即飲水服松葉方松葉上于山澗高原處採葉細切餐之日服三合令人不飢干搗末日服五錢匕酒飲下亦得治百病輕身益氣延年又方松葉向四時隨王方採之可去地一丈者銼如粟粒曝乾五斗上一味搗羅為末以好酒拌作餅子曝乾再搗羅為散每服五錢匕以酒飲調服日三令人輕身延年體香絶谷不飢忌魚菜鹽醬服柏實方柏實上於八月合房取乃曝令拆其子自脫用清水淘取沉者控干輕椎取仁搗羅為細末每服二錢匕酒調下冬月溫酒下早晨日午近晚各一服稍增至四五錢若絶谷者取飽為度渴即飲水令人悅澤一方用煉成松脂及白蜜丸如梧桐子大每服十丸或二十丸日三服又方與松子等分松脂和丸酒下又方加菊花末等分蜜丸如梧桐子大每服十丸二十丸日三服酒下又方柏子雷丸防風等分上三味搗羅為散每服一錢匕酒飲調下日三服令人壯盛辟穀服柏葉方柏葉不拘時採亦不拘多少上一味切置甑中令滿蓋甑蒸約三石米久蒸訖取放淨器以水淋百餘遍訖陰乾搗羅為末每服一合食前酒下日二服漸增至一升令人益氣辟穀不飢此仙人高子良方又方柏葉上取大盆穿作竅以物塞竅著柏葉於盆中水浸日一易水七日以上至二七日乃覆盆內柏葉甑中蒸之令氣徹便止曝乾搗羅為末棗膏和之如作乾飯法再曝再搗每服一錢匕水調下日三服久服不飢渴即飲水又仙人服柏葉減谷方柏葉三十斤勿雜枝上取放不津器內以東流水浸之令水上出三寸新盆覆蓋泥封三七日漉出陰乾勿令塵入候乾搗羅為末又取小麥三升淨揀納柏葉汁中封五六日出之陰乾復納之封五六日又出陰乾搗羅為末更取大豆三升炒熟去皮搗羅為末合三物攪和相得納囊中盛之每服三合酒飲調下空腹日午近晚服食飲無妨治萬病隆冬不寒腸實不食又方柏葉二十斤著甕中以東流水浸二十一日出曝乾微炒納少許鹽小麥一斗納浸柏葉汁中三日出曝乾又納汁中候盡止出曝乾炒令香上二味搗羅為末取豬肚脂二斤細切著末中攪令勻食前服一錢匕酒飲下早晨日午近晚服二十日不飢又方柏葉三斛上熟蒸曝乾搗羅為末取大麥三斗炒令變色磨面合和令勻服多少自在酒飲下又方柏葉末一斤四兩取細枝上及向上側生者每以孟月隨四時生氣方位採於背日處倒垂陰乾白茯苓去黑皮十二兩松葉末一斤四兩採新者長三分銼搗用清水三斗煮取二斗絞去滓令淨上三味先取松葉汁二斗煮茯苓至三四升撥去火待冷漉出茯苓研作粉陰乾為末其餘汁用拌柏葉末於樹陰下或高簷廡下攤陰乾又和茯苓粉搗羅為末以酥四兩拌勻煉白蜜待冷和劑更搗半日分為四五團密器貯之旋丸如梧桐子大每服一百丸加至二百丸經一年白髮盡黑齒落更生兼治百病消皯𪒟展面皺長筋骨勿食豬魚六畜肉生蔥韭蒜陳敗腥臭黏滑米醋等採茯苓方松脂流入地變為茯苓遙望數里其松赤色視其肌理如布棋子斷者有茯苓也仰視松枝所指其上時有菟絲或新雨過後無風雲夜以燭火臨上滅者亦有乃以新布四丈環之明日掘取神物多變化其形如飛鳥走獸龜鱉者佳便令曝乾銼之狀如白牙若只一塊不似鳥獸物形者乃松脂始變不堪服煉茯苓方上取茯苓上黨者去黑皮銼作塊如雞子大任多少置甕中其甕近底鑽作竅以木塞之即下水令沒得藥每兩日一換水七日後數以筋導卻水即取茯苓蒸候熟及熱出之置盤中揉拓拾去脈膜控干乃入盆中以木椎研極細更下熟水攪和先縫生絹為袋以藥汁傾袋中以盆器盛汁瀝盡余滓更研復取前汁攪渾傾袋中如前法候滓盡澄之更傾去清汁取稠汁納帛袋中垂瀝之候水盡取茯苓曝乾是為茯苓粉可入諸藥若不如此即脈膜損人令人夭折或作瘦病還精補腦長生駐顏神仙卻老延年茯苓散方赤茯苓先用水煮三十沸曝乾四兩菊花二兩鍾乳取如鵝管蟬翼光明者先入銀器中放在五六斗釜中乃添水於釜內九分釜底燃火令如魚目沸三復時每一復時換水淨洗刷後添水慢火煎令魚目沸日足取出入乳鉢內研極細入水少許更研如稀糊乃取澄曝乾更研如粉一兩雲母取黃白光明者簇於大方磚上以炭火七斤煅通赤從旦至暮取出去搗羅為末入絹袋於大盆中擺之按揉令水內澄取出曝乾更研加粉一兩菖蒲九節者米泔浸三復時逐日換泔日足切曝乾栝蔞根赤石脂研如粉水飛過曝乾更研山茱萸微炒防風去叉牛膝菟絲子酒浸三日控干搗末熟乾地黃焙續斷杜仲去粗皮炙山芋蛇床子微炒柏子仁天雄炮裂去皮臍桂去粗皮肉蓯蓉酒浸去皴皮切焙特丹皮人參天門冬去心焙石槲去根節白朮石長生去根節微炙牡蒙附子炮裂去皮臍苦參玄參水洗麩炒焦獨活去蘆頭牡荊子狗脊去毛紫菀水洗去土曝乾乾薑炮裂黃耆炙銼澤瀉甘草水蘸炙芍藥巴戟天去心沙參遠志去心焙石南葉暖水流控干炙牡蠣搗末水和作團轉飛取曝乾各半兩上四十四味搗研羅為散每服一錢匕溫酒調下日三服空心日午近晚各一二十日見效四十五日諸疾並瘥一年可還童又方白茯苓去黑皮鍾乳煉成者雲母煉成者澤瀉菊花杜仲去粗皮炙柏子仁石槲去根節山芋熟乾地黃焙天門冬去心焙石南葉暖水洗慢火炙續斷肉蓯蓉酒浸去皴皮切焙各一兩菖蒲九節者米泔浸再宿日換泔淨洗切焙乾天雄炮裂去皮臍菟絲子酒漫三日控干搗末牛膝山茱萸炒五味子蛇床子簸去秕各一兩半上二十味搗研羅為散每服一錢匕酒調下早晨日午近夜服或煉蜜和丸如梧桐子大每服三十丸溫酒下日再服二十日見效四十日萬病悉除忌犬肉牛肉生蔥蒜萊蔔羊血醋等又方白茯苓去黑皮三斤生乾地黃焙天門冬去心焙胡麻炒各一斤上四味各搗羅為末煉蜜拌勻每服一匙酒或漿水調下日五六服或作丸如梧桐子大每服十丸三十日知百日力倍又方白茯苓去黑皮二十兩胡麻一斗二升炒澤瀉八兩上三味各搗羅為末合搗三萬杵每服三錢匕空服日午近夜酒或水下又方白茯苓去黑皮火麻子炒各半斤上二味先取火麻子以水五升研絞濾取汁煮茯苓一炊久令熟取出曝乾搗羅為末每服三錢匕以溫酒調下空心近晚一日兩服如無酒以新汲水調下忌醋又方白茯苓去黑皮三斤銼甘草微炙銼二兩上二味以水六斗先納甘草煎取三斗漉去滓澄清納白蜜三升牛乳九升相和煎茯苓令乳蜜汁入茯苓盡及熱挼令散擇去赤膜又更蒸熟挼令如面陰乾每服二錢匕溫酒下日三四服稍加之又方白茯苓去黑皮龍鬚隴西者各二斤細銼上二味搗羅為散每服方寸匕酒飲調下日三服又方白茯苓去黑皮銼一斤上一味以糯米酒浸三宿取出曝乾搗羅為末收入瓷器中每食時入一兩錢末拌食食之久服精力百倍延年不老輕身不老明耳目強力大茯苓丸方白茯苓去黑皮茯神抱木者去木大棗桂去粗皮各一斤人參白朮遠志去心炒黃細辛去苗葉石菖蒲九節者米泔浸三日日換泔切曝乾各十二兩甘草八兩水蘸劈破炙乾薑十兩炮裂上一十一味搗羅為末煉蜜黃色揀去沫停冷拌和為丸如彈子大每服一丸久服不飢不渴若曾食生菜果子食冷水不消者服之立愈五臟積聚氣逆心腹切痛結氣腹脹吐逆不下食生薑湯下羸瘦飲食無味酒下欲求仙未得諸大丹者皆須服之若不能絶房室不能斷谷者但服之去萬病令人長生不老合時須辰日辰時於空室中衣服潔淨不得令雞犬婦人孝子見之又方白茯苓去黑皮銼碎水浸四十九日七日一易水日足蒸一復時卻入水中安羅子內以手緩緩挼去筋脈令淨澄取曝乾柏葉依四時王方採嫩枝上者蒸令黃色勿採道旁冢墓上者大麻子水浸一宿曝乾炒才聞一兩聲即出之以淨磚兩口磨取之車前子粳米炒大豆黃炒令焦取黃蔓荊子水煮一復時曝乾地骨皮去粗皮各一升人參地膚皮蒸半炊久曝乾各二升黍米炒麥門冬去心焙茯神去木各半升上一十三味搗羅一十一味為末唯麥門冬麻子仁熟搗極細即和諸藥令勻煉蜜六十兩綿濾淨器中令溫和搜諸藥更搗萬杵丸如小酸棗大盛淨器中其藥永不壞若明朝欲服隔夜須先服黍米粥一杯次日平旦服五十丸溫青酒或粥飲下日再服即不飢若三日內腹中不安穩更服之出三日即四肢輕便耳目聰明若勞損者服之氣力強健一年力倍久服治大風諸氣補精髓安魂魄調榮衛去尸蟲通神明耐寒暑合時五月五日七月七日冬臘日尤佳其藥並須大升大斤不得欠少若須食即以葵子湯下之斷谷方中此為最妙又方白茯苓煉成粉柏葉蒸熟曝乾為末車前子淘淨干地骨皮大豆炒取黃蔓荊子煮令苦味盡曝乾各五兩上六味搗羅為末煉蜜和搗三二千杵為丸如梧桐子大欲服時隔夜食黍米粥令飽次日服藥二百丸酒或井華水下三日內不思食亦不困人三日外即不飢飢即更服三五十丸補之覺少疲乏每三五日以少粳米粉作撥刀食一盞許不須鹽醋若虛困每日服蔓荊子末兩匙以白蜜煉和之忌房室又方白茯苓煉成粉雲母煉成粉天門冬粉各二斤羊脂白沙蜜白蠟各五斤麻子油三斤松脂煉成者十斤上八味入銀器中微火煎令勻紫色乃止欲絶谷者先作五日稻糧食五日乃少食三日後方服此藥小彈子大日三丸三日九丸即不飢飢則更服兼食棗脯飲水無苦多若要下去藥取硝石葵子各五兩搗羅為散每服二錢匕水一盞同煎八分去滓日三服藥下食米粥一合三日漸食淡食又方白茯苓五斤銼碎甑中蒸一炊曝乾為末白沙蜜三斤柏脂七斤靜處作灶泥大釜於上加甑取白茅銼令齊整先入甑內襯次安柏脂在上釜內用石灰水蒸之令消入釜中去甑接取釜內脂入冷水中以扇扇之兩人對引之三十過復蒸如前三遍逐遍換釜中石灰水取柏脂再入甑釜中用醋漿水深添又如上法蒸之三遍逐遍換醋漿水滿三遍又以好酒入釜中添深如上法三遍蒸煉了上三味煉白沙蜜和丸如梧桐子大每服十丸酒下冬月溫酒下飢者頻服之不飢為度如飲酒不得只以溫水下欲仙者常取杏仁五枚去皮尖細研以水一小盞同煎三五沸成湯去滓以下丸藥若卻欲去藥食谷者取硝石葵子各一兩熟研為散以粥飲調服一錢匕日再服其藥即出稍稍食谷及葵羹甚良又方白茯苓去黑皮一斤半生乾地黃焙四兩天門冬一斤去心焙澤瀉五兩胡麻一斗炒作聲上五味各搗羅為末和令勻蜜拌旋丸每服如雞子大日五六服漿水或酒下久之氣力自倍一方無澤瀉而地黃與諸藥等分以蜜和為丸酒服如上法又方白茯苓去黑皮天門冬去心焙各一斤棗肉三十枚麻子仁五斤上四味合和於三碩米下蒸一炊久合搗蜜和丸如雞子黃大早晨近晚服一丸渴即飲水神仙服草木藥下吳真君服椒方椒性稟五行其葉青其皮赤其花黃其膜白其實黑暖丹腑通血脈助元氣消酒食毒闢溫邪氣安五臟調三焦而熱不上蒸芳草之中功皆莫及每金州椒一斤揀去浮及合口者並目銀器內炒令透地上鋪紙兩重傾在紙上用新盆合定周回以黃土培半日許其毒成汗自出曬乾木臼內輕杵取紅皮四五兩再入鐵臼杵為末以木蜜為丸如梧桐子大候乾紗袋盛挂通風處每日空心酒下十丸至十五丸半年加至二十丸一年後加至二十五丸張果先生服杏仁方杏仁安五臟補筋骨添血髓益精神強記明目消痰癖久服神仙昔王子晉丁令威服生杏仁皆致神仙蓋生者氣力全熟則減半又其性不與諸藥相妨唯忌不淘者白粳米甜水粥食之少有不安須臾即可若客行逢此粥但放冷任食少多無妨按本草性溫平味苦久即美服之三年更不覺苦唯覺甘美性不下氣能去膈上熱壯腰腳服者當自知之凡服去皮尖雙仁取黃色者尤妙每於平旦空腹未漱口時取生杏仁二七枚口中退皮尖熟嚼令津液半口咽之如行一里任食諸食如欲延年者任食肉及葷辛如欲升騰者即不得食一切肉及葷辛任畜妻子營養庸作肉者易敗之物所以無益於長生之道仙家忌之能斷諸肉即仙道易成或服生杏仁一年百病自除二年身輕目明視徹千里李八伯杏金丹方取肥實杏仁五斗以布袋盛用井華水同浸三日次入甑中以帛復之上布黃沙五寸炊一日去沙取出又於粟中炊一日又於小麥中炊一日又於大麥中炊一日壓取油五升澄清用銀瓶一隻打如水瓶樣入油在內不得滿又以銀圓葉可瓶口大小蓋定銷銀汁灌固口縫入於大釜中煮七復時常撥動看油結打開取藥入器中火消成汁傾出放冷其色如金後入臼中搗之堪丸即丸如黃米大空心旦暮酒下或用津液下二十丸久服保氣延年變白除萬病此處原有符三道今刪輕身延年仙術丸方蒼朮肥者米泔浸不計多少夏秋浸三日春冬浸七日竹刀刮去皮水洗淨甑上蒸半日作片子焙乾石臼內木杵為末煉蜜為丸如梧桐子大每日早晨日午酒下五十丸服至十年後用南燭蒸黑米飯食之能引腹中成術人即神靈矣時燒退發一兩莖若無發氣即術人形具矣去風潤肌壯筋骨進飲食枸杞散方上於正月上寅日採枸杞根洗去土陰乾杵末於二月上卯日服每日空心日午夜臥水調下三錢匕或溫酒亦得服及一季即見奇功又於四月上巳日採苗五月上建日服七月上建日採葉八月上建日服十月上建日採子以水洗去肉只取其實服之十一月上建日服余並同前法明目駐顏壯元氣潤肌膚枸杞煎方採枸杞子不拘多少去蒂清水淨洗淘出控干用夾布袋一枚入枸杞子在內於淨砧上椎壓取自然汁澄一宿去清石器內慢火熬成煎取出瓷器內收每服半匙頭溫酒調下久服大有益如合時天色稍暖其壓下汁更不用經宿其煎熬下三兩年並不損壞如久遠服多煎下亦無妨延年返老補填骨髓保固三田胡麻丸方胡麻半斤上一味揀去土研碎以米醋三升瓷器中煮盡醋後入茯苓人參雲母粉各一兩同丸如梧桐子大每服二十丸甘泉水下不拘時候助氣固精保鎮丹田二精丸方黃精去皮枸杞子各二斤上二味於八九月間採服先用清水洗黃精一味令淨控干細銼與枸杞子相和杵碎拌令勻陰乾再搗羅為細末煉蜜為丸如梧桐子大每服三五十丸空心食前溫酒下常服助氣固精補填丹田活血注顏長生不老延年補益療萬病黃精丸方黃精十斤淨洗蒸令爛熟白蜜三斤天門冬三斤去心蒸令爛熟上三味拌和令勻置於石臼內搗一萬杵再分為四劑每一劑再搗一萬杵過爛取出丸如梧桐子大每服三十丸溫酒下日三不拘時久服神仙矣明目進飲食益精壯下元菟絲子丸方菟絲子一斤酒浸三日控干搗細末甘菊花去土搗細末上二味拌和令勻煉白蜜為丸如梧桐子大每日前晨至晚後食前以溫酒送下二十丸至三十丸進食倍常頻頻泄氣是藥之應若諸般眼疾黑花昏暗甚者並宜服之黃精酒方黃精去皮五斤天門冬去心三斤松葉枸杞根各五斤上四味搗為粗末以水三石入前藥在內煮取二石用糯米一石細曲半稱蒸米同曲入在前藥水中封閉二七日熟任情飲之延年益壽反老還童除萬病神枕方漢武帝東狩至太山下見一老父鋤地道側頭上有白光高數尺怪而問之老父對曰臣年八十有五時頭白齒落有道士教臣絶谷但服術飲水並作神枕枕之中有三十二味藥其二十四味以當二十四氣其八毒以應八風臣行之白髮更黑齒落更生日行三百里臣今年一百八十歲矣帝受其方賜之彩帛老人云當入岱山十年復還鄉里三百年後乃不復還也其法用五月五日七月七日採山陽柏木長一尺二寸高四寸廣三寸五分容一斗二升柏心赤者為蓋悉厚四分密緻鑽蒸上孔如容黍粟三行行四十孔一百二十當歸芎藭白芷辛夷杜仲去粗皮藁本去苗土肉蓯蓉柏實薏苡仁蘼蕪秦椒去目及合口者木蘭皮蜀椒去目及合口者桂去粗皮乾薑飛廉防風去叉款冬花人參桔梗白薇荊實山薊白蘚皮以上應二十四氣烏頭去皮附子去皮尖藜蘆去蘆頭皂莢莽草半夏礬石細辛去苗葉各半兩以上應八風上三十二味並生㕮咀納枕中毒者安下香者安上既滿即用竹丁釘蓋四邊悉用蠟封唯上不用封乃以絳紗三重裹之枕及一百日筋骨強壯身面光澤即去一重紗二百日血氣充實百疾皆愈又去一重三百日又去一重一年一易其藥每起時用蠟紙裹以繒囊盛之每用冬至為首三年後齒髮益壯容色還童矣除百病明耳目延年卻老七精散方茯苓天之精三兩地黃花土之精桑寄生木之精各二兩菊花月之精一兩一分竹實日之精地膚子星之精車前子雷之精各一兩三分上七種上應日月星辰欲合藥者以四時王相日先齋戒九日別於靜室內焚香修合搗羅為細散每服三方寸匕以井華水調下面向陽服之須陽日一服陰日二服滿四十九日即驗地黃花須四月採竹實似小麥生藍田竹林中變白輕身卻老還童除百疾四扇散方松脂煉成者澤瀉白朮乾薑炮雲母粉制如常法桂去粗皮菖蒲石上者生乾地黃焙乾上八味各等分搗羅為散每日兩食前以清酒調下三方寸匕或以蜜丸如梧桐子大清酒服十五丸百日即效長年保命地髓散方生乾地黃四兩莎草根茜根地骨皮洗焙庵䕡子茅根各一分上六味擇日修合春用甲子夏用丙子秋用庚子冬用壬子搗羅為細散每日早晨溫酒調下一錢匕午後再服五十日後諸疾不生身體輕強久服神效輕身延年卻老還童靈仙散方白茯苓去黑皮巨勝子去皮炊一日天門冬去心焙白朮桃仁去皮尖炒干黃精各一兩上六味搗羅為細散每於食前水飲下三方寸匕日二服或以蜜丸如赤小豆大每服三十丸溫水下還年覆命松實丸方松實和皮用柏實淨揀各三斤松脂煉成十斤甘菊花升五上四味同搗羅為細末煉蜜和搗五六百下丸如梧桐子大每日食後午前溫米飲下二十丸漸加至三十丸服至百日不飢顏色光潤益壽延年去客熱胡麻散方胡麻子白茯苓去黑皮生乾地黃焙天門冬去心焙各八兩上四味搗羅為細散每服方寸匕食後溫水調下河上公益壽延年芡實散方乾雞頭實去皮忍冬莖葉揀無蟲汙新肥者干藕各一斤上三味於甑內炊熟曝乾搗羅為細散每日食後新汲水調下一錢匕卻老駐顏治腰腳蒼朮木瓜丸方蒼朮一斤米泔浸五宿切焙乾為末木瓜一枚瓷碟盛飯甑內蒸爛去皮核上取木瓜研如糊拌蒼朮末丸如梧桐子大焙乾用黃蠟不拘多少於銚內熔將藥於蠟內拌勻取出篩子納紙襯滾過每日空心鹽酒任下三十丸蕩穀氣延壽命輕身散方黃耆一斤銼生薑汁煮三十沸焙乾上一味搗羅為散入甘草茯苓人參山芋雲母粉各一錢拌勻每服一錢匕入鹽少許湯點服不拘時候返神歸元助氣於坎室回素散方澤瀉四兩上一味細銼搗羅為散入丹砂雲母粉各一分和之每日服一錢匕米飲調下固守三田接養真氣祕元丹方半夏一斤漿水浸七日切作半破斑蝥四十九枚去翅足薜荔葉二兩糯米一分上四味同於銚內炒候半夏赤黃色先以紙鋪地急傾藥於紙上瓦盆蓋之一宿去三味只取半夏為末酒糊丸如梧桐子大空心溫酒下二十丸久久通靈預知吉凶神應丸方預知子去皮茯神去木各半兩遠志去心桂去粗皮各一分上四味搗羅為末酒糊丸如梧桐子大每月初二日初六日乳香湯下七丸治陰氣太盛五臟昏濁食畢困乏雖未中年衰苶先至消陰保真護命丹方天麻銼牛膝去苗銼各四兩天仙子一斤淘淨炒黃上三味以絹袋盛浸酒中七日七夜取藥炒乾為末用浸藥酒作麵糊丸如梧桐子大每日空心酒下二十丸壯氣海潤五臟益精光和心神野云漿方糯米三升上一味以井水三斗煮熟濾取飲入蜜半升攪勻入雲母粉二兩丹砂末一錢白茯苓人參末各一兩同煎至七升每服半盞溫冷任意太上通神洞視預知吉凶上辨仙真下察鬼魅覽聖丹方紫芝石菖蒲銼焙預知子去皮茯神去木石決明草決明炒密蒙花各二兩鴉睛十四枚陰乾上八味搗羅為末煉蜜和丸如梧桐子大空心淨水下二十丸益壽地仙丸方甘菊三兩枸杞二兩巴戟天去心二兩肉蓯蓉酒浸一宿洗淨切片焙乾四兩上四味搗羅為末煉蜜和丸如梧桐子大每日空心鹽湯或酒下三十丸久服清頭目補益丹田駐顏潤髮春秋枸杞菊花加一倍冬夏蓯蓉巴戟加一倍服餌勿令斷絶神仙辟穀論曰人以胃氣為本水穀所以致養山林之士乃有休糧辟穀者其説悉本神農之書究其性味非養氣而輕身則必堅重而卻老神仙之術有出乎此理或然也真人辟穀雲母丸方雲母粉大豆黃白茯苓去黑皮松脂煉巨勝湯脫皮蒸蠟煉各一斤椒去目及閉口者炒出汗十兩上七味搗研五味為末煉松脂並蠟蜜和劑初服如彈丸大溫酒下日再服辟穀丹砂丸方丹砂研水飛過白蠟各一斤上二味先細切白蠟銅器煮清酒令沸投蠟於酒中候蠟銷置器於冷水中蠟凝復將丹砂末投於酒蠟中拌和令勻再置於銅器中用柳木篦子不住手攪勿令猛火候煎成膏取出放於不津瓷器中可丸即丸如梧桐子大每服十丸溫水下每一服得三七日不飢又一服一月不飢再一服得一百日不飢從此三服以後每百日一服如服藥後覺渴飲冷水一盞服至周歲以外自覺身輕體健延年不老即不飢矣如欲飲食之時先煮淡葵菜吃一次然後每日依常飲食無礙辟穀凝靈膏方茯苓一十八斤為細末松脂一十二斤松子仁六斤為末柏子仁六斤為末上四味先取白蜜七斗納於銅器中微火煎一日一夜次第下藥攪令勻微火再煎七日七夜取出每服如雞子大一丸溫酒下後十日再服一雞子大三十日更服一雞子大滿四劑當得延年不老若治癩病加石硫黃石膽末各半兩辟穀木耳丸方木耳搗末大豆炒熟搗末各八兩大棗煮熟去皮核研一升上三味煉蜜和丸如雞卵大有食日服一丸無食日服二丸逢食即食無食亦不飢矣辟穀松蠟丸方松脂煉一斤十二兩白蠟一斤四兩酥半斤蜜一斤四兩白茯苓去黑皮搗末十兩上五味先取松脂白蠟酥蜜四味入瓷器內盛密封坐於二鬥黍米甑內同蒸候米熟取出納茯苓末以杖攪和之再密封如前經五日即開搗和為丸如梧桐子大每服五丸酒下早晨近晚服十日後即服一丸若飢加至二丸三丸服此藥時不得食一切物服盡即不食亦可延年辟穀金花丸方金箔雄黃油煎九日九夜研如粉丹砂研如粉水飛取浮者曝乾白茯苓去黑皮水淘取浮者曝乾搗末各一錢上四味用白膠香二兩入少酒煎如稀餳汁和之搗一千二百杵丸如緑豆大合時不得見雞犬婦人孝子每服溫水下一丸三七日不飢又服一丸百日不飢從此以後每一百日一丸服時前三四日須先吃淡麵食至平旦日未出時取一粒面東服訖連咽十下叩齒三十六通若此後欲食即食少果子通腸不食即已不得食水果子等永不飢矣辟穀延年天門冬丸方天門冬去心白茯苓去黑皮白蠟白蜜白羊脂去膜各一斤上五味先搗羅天門冬茯苓二味為末次以清酒五升入大鐺中煎三沸納羊脂煎三五沸又納蜜並蠟煎五沸掠去沫次入天門冬茯苓末用柳木篦不住手攪令勻火勿令猛候煎成膏可丸乃丸如櫻桃大又取大杏仁一升湯浸去皮尖雙仁研如膏傾入淨通油瓷瓶內坐慢灰火中納前藥丸子於杏仁膏中養令色白即取離火每服三丸空腹溫酒下辟穀稻米杏仁方稻米三斗水浸一宿曝乾杏仁三升湯去皮尖雙仁細研水三升浸一復時澄去滓上二味以杏仁汁浸米一宿炊之曝乾又浸盡汁乃止搗為末每服一升十日後三日服一升一月後十日服一升即不飢矣辟穀青粱米赤石脂丸方青粱米一升赤石脂三斤為末上二味以水浸令相和置溫處三二日上生衣乃取搗丸如李子大日服三丸即不飢矣如渴當以少水飲之可以遠行辟穀五穀方粳米黍米小麥麻子熬大豆黃各五合上五味搗末以白蜜一斤煎一沸去沫和拌為丸如李子大每服一丸冷水下即不飢矣辟穀山精餅方術一斛淨刮去皮洗攤令浥浥細銼上一味搗碎用水三斛先納術於大釜中次入水一斛五斗文武火煮之水耗旋添盡三斛煮至二日二夜絞去滓取汁用黍米一斗五升淨淘控令浥浥先納汁在釜中次入米煮至六七沸又下飴五斤微火煎至三斗乃熟取出置案上曝乾拌作餅子四方斷之令如梳大陰乾每日食三餅輕身益壽辟穀山精丸方術一斗淨刮去皮洗控令浥浥細銼上一味搗碎以清酒二升淨甕中浸之一日一夜絞去滓納銅器中入釜以重湯煮之又入白蜜一斤阿膠四兩煎之攪令相得候如膏即丸如彈子大放干盛不津器中每服一丸細嚼酒下日三服久服面體光澤百病除去輕身延年辟穀仙術丸方上一味搗碎納淨甕中水二斛浸一宿取出納大釜中煮令減半加清酒五斗煮至一斛絞去滓再納釜中微火煎之又入炒大豆黃天門冬末各二斗更煎攪和令勻候如膏丸如彈子大放干盛不津器中每服三丸細嚼溫水下日三服久服耐風寒延年不老辟穀棗木丸方術一斛淨刮去皮控令浥浥細銼上一味搗碎以水一石五斗納釜中煮之稍益水至三石煮至三斗絞去滓卻納銅器中入白蜜六斤四兩煉成松脂粉二斤半文火煎之攪和令勻候凝如膏丸如彈子大放干盛不津器中每服三丸含化咽之日三服久服長生不老辟穀仙術茯苓丸方術五斤淨刮去皮洗控令浥浥細銼白茯苓三斤去黑皮搗末上二味先將術搗碎以水三斗納釜中煮之至五升絞去滓加茯苓末攪和令勻如膏丸如彈子大放不津瓷器中每服一丸細嚼溫水下日二服久服活血駐顏耐風寒延年不老辟穀駐顏祕妙方白茯苓三斤搗為粉以生絹袋盛於水盆中漬之候水清取粉曝乾粟黃三斤曬乾搗羅為末胡麻五斤九蒸九曝除去皮取三斤末上三味取青州棗三斗以水五斗於大釜中先煮令爛去皮核以布袋絞取瓤卻於煮棗水內慢火熬令稠候冷入諸藥為膏每日空心及晚各服一合酒調下亦得此是神仙所服切在祕密勿傳非人其功不可具述忌食米醋辟穀白朮丸方白朮三斤搗為細末生黃精二斗淨洗控干搗碎絞取汁蜜一斤上三味先將黃精汁一味於釜中用文火煎熬取汁三升再入蜜一斤並將前白朮末卻納汁中煎成膏丸如彈子大令乾盛不津器中每服三丸含化咽之日三服寧少服令有常不須多而中輟渴則飲水久服絶谷輕身長生不老辟穀黃精地黃丸方生黃精一斗淨洗控干搗碎絞取汁生地黃三斗淨洗控干搗碎絞取汁上二味汁合和納釜中文火煎減半入白蜜五斤攪勻更煎成膏停冷丸如彈子大放干盛不津器中每服一丸含化咽之日三服久服長生治猝絶糧飢憊欲死方凡修行家忽到深山無人之地或墮澗谷深井之中無食者便應咽津飲水服氣以代之咽津法開口舌柱上齒取津咽之一日得三百六十咽佳漸習至千咽自然不飢三五日中小疲極過此漸覺輕強飲水法凡遇有水無器即以左手盛水咒曰承掾吏之賜真人之糧中正赤黃行無過城諸醫以自防咒畢三叩齒以右手指三握左手如此三道即飲之後咒如此若有杯器盛取尤佳亦左手執右手以小物扣之如法日飲三升便不飢若人多大器盛水就地持咒扣齒如法向王飲之周行山澤間更食松柏葉助之凡取松柏葉細切一二合嚼之以水咽一日中可食三二升佳又掘取白茅根淨洗並松柏葉等分三物細切曝乾搗羅為末以水嚼咽之又取蠟食如錢大一片一日不飢又取大豆五升挼令先明匝熱以水服半合早晨近晚共服一合服盡此則可度五十日又取赤小豆一升半炒大豆黃一升半焙二味搗末每服一合新水下日三服盡此三升可度十日又取術天門冬黃精葳蕤貝母或生或熟皆可單食及木上耳及檀榆白皮食之並闢飢若遇谷貴絶糧應預合之以授貧者
