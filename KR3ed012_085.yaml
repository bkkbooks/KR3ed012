body:
  text: 卷第八十五腰痛門腰痛統論論曰腰痛有五一陽氣不足足少陰氣衰令人腰痛二風寒著腰風痹腰痛三腎虛勞役傷腎腰痛四墜墮傷腰名䐴腰痛五寢臥濕地腰痛凡此皆本於傷腎蓋腎主腰腳腎傷則腰痛也內經曰腰者腎之府搖轉不能腎將憊矣腰痛論曰腰者一身之要屈伸俯仰無不由之或風寒所客或腎氣損傷使筋脈拘急動搖轉側不得故腰痛也治五種腰痛人參湯方人參三分杜仲去粗皮銼炒桂去粗皮各一兩芍藥三兩熟乾地黃焙白朮木通銼玄參當歸切焙各三分芎藭桑寄生各一兩防風去叉牡丹皮獨活去蘆頭各半兩上一十四味粗搗篩每服三錢匕水一盞煎七分去滓溫服空心日午夜臥服治五種腰痛不能轉側寄生湯方桑寄生附子炮裂去皮臍獨活去蘆頭狗脊去毛桂去粗皮各一兩杜仲去粗皮銼炒一兩一分芎藭一分甘草炙銼人參各半兩芍藥白朮石槲去根牛膝酒浸切焙各三分上一十三味銼如麻豆每服三錢匕水一盞煎至七分去滓空心日午夜臥溫服治腰痛牽引背脊不可俯仰獨活湯方獨活去蘆頭一兩麻黃去根節甘草炙各半兩桂去粗皮葛根芍藥栝蔞根防風去叉各三分杜仲去粗皮炒附子炮裂去皮臍各一兩杏仁去皮尖別研半兩熟乾地黃切焙二兩上一十二味銼如麻豆每服三錢匕水一盞煎至六分去滓空心日午夜臥溫服治五種腰痛腎臟虛冷腳弱不能行步腎瀝湯方桑根白皮銼二兩黃耆銼五味子去梗肉蓯蓉酒浸切焙防風去叉秦艽去苗土澤瀉巴戟天去心桂去粗皮山芋丹參茯神去木牛膝酒浸切焙各三分石槲去根磁石煅醋淬二七遍各一兩杜仲去粗皮銼炒人參各三分上一十七味粗搗篩每服先用水二盞煮羊腎一隻至一盞去腎入藥末三錢匕生薑三片煎至七分去滓空心日午夜臥溫服治五種腰痛澤瀉湯方澤瀉半兩桂去粗皮三分白朮白茯苓去黑皮甘草炙銼各一兩牛膝酒浸切焙乾薑炮各半兩杜仲去粗皮銼炒三分上八味粗搗篩每服三錢匕水一盞煎至七分去滓空心日午夜臥溫服治腰痛沉重腹肚脹不能轉動木香丸方木香半兩檳榔銼桂去粗皮附子炮裂去皮臍萆薢芍藥郁李仁去皮別研如膏各二分上七味搗研為末用煉蜜丸如梧桐子大每服二十丸溫酒下空心日午夜臥服微利為效治腰痛寄生散方桑寄生切焙牡丹皮鹿茸酒浸炙去毛桂去粗皮各半兩上四味搗羅為細散每服二錢匕溫酒調下空心日午夜臥服治腰痛桂心丸方桂去粗皮乾薑炮各半兩丹參杜仲去粗皮銼炒牛膝酒浸切焙續斷各三分上六味搗羅為末煉蜜丸如梧桐子大每服二十丸溫酒下空心日午夜臥服治腰痛動轉艱難似有氣注萆薢湯方萆薢一兩半當歸切焙一兩桔梗炒一兩半牡丹皮一兩杏仁湯浸去皮尖雙仁炒十枚附子炮裂去皮臍二兩黃連去須一兩桑根白皮銼炒一兩半代赭一兩半貫衆一兩大腹一兩半桂去粗皮白茯苓去黑皮覆盆子去梗黃芩去黑心各一兩吳茱萸洗焙炒半兩草豆蔻去皮一枚桃仁湯去皮尖雙仁十枚熟乾地黃焙一兩蛇床子炒一兩半乾薑炮半兩木瓜去皮子焙乾一兩上二十二味銼如麻豆每服五錢匕水一盞半煎至一盞去滓空心溫服治冷氣連腰胯痛食冷物即加劇應痛丸方白朮牛膝酒浸切焙當歸切焙黃耆銼芍藥陳橘皮湯浸去白焙桂去粗皮訶黎勒煨去核厚朴去粗皮生薑汁炙白茯苓去黑皮各等分上一十味搗羅為末煉蜜和丸如梧桐子大每服二十丸溫酒下加至三十丸空心食前日三服治久患腰痛皆由腎冷所致暖腎散方附子炮裂去皮臍一兩澤瀉一兩半桂去粗皮一兩半蜀椒去目並閉口者炒出汗杏仁湯去皮尖雙仁炒黃當歸銼焙各一兩上六味搗羅為細散每服五錢匕空心冷酒調下日再服治久積冷氣腰痛行步無力牛膝丸方牛膝酒浸切焙附子炮裂去皮臍各二兩桂去粗皮吳茱萸湯洗焙乾炒乾薑炮各一兩半牽牛子三兩上六味搗羅為末煉蜜和丸如梧桐子大每服三十丸食前溫灑或橘皮薑湯下治停水腰痛牛膝散方牛膝酒浸切焙防己各一兩半檳榔銼七枚牽牛子生搗取末二兩上四味搗羅為散每服三錢匕溫酒調下利及三兩行即以醋飯止之治腰疼尉方食鹽乾薑生為末杏仁湯浸去皮尖雙仁研醬瓣研上四味等分再同研勻以綿裹內腰間當覺冷氣動下日五六次用瘥即已治多年腰痛乾漆散方乾漆炒令煙出木香桂去粗皮甘草炙銼各一兩一分熟乾地黃焙二兩半上五味搗羅為散每服三錢匕溫酒調下日三服治腎虛腰痛牡丹散方牡丹皮萆薢白朮桂去粗皮等分上四味搗羅為散每服三錢匕溫酒調下治腰痛杜仲酒方杜仲去粗皮丹參各八兩芎藭五兩上三味細銼用酒一斗五升浸五日日滿隨性多少溫飲卒腰痛論曰卒腰痛者謂氣脈凝滯經絡壅澀或舉重傷腰故卒痛也宜通行氣脈調順經絡平補腎臟則病可愈治腰卒痛牡丹湯方牡丹皮桂去粗皮續斷牛膝去苗酒浸一宿焙萆薢銼各一兩上五味粗搗篩每服三錢匕水七分酒三分同煎七分去滓溫服不拘時治勞動傷腰卒痛杜仲湯方杜仲去粗皮酒浸銼炒桂去粗皮羌活去蘆頭椒去目並閉口者炒出汗秦艽去苗土石槲去根栝蔞根續斷五加皮銼焙牡丹皮芍藥當歸銼焙各一兩上一十二味粗搗篩每服三錢匕水一盞酒少許同煎七分去滓溫服不拘時治卒腰痛轉動艱難桂心湯方桂去粗皮牛膝去苗酒浸一宿銼焙芍藥當歸銼焙威靈仙去土杜仲去粗皮酒浸銼炒芎藭大黃銼炒各一兩上八味粗搗篩每服三錢匕水一盞煎至七分去滓溫服空心日午臨臥各一治腎虛勞役腰卒痛芎藭飲方芎藭丹參當歸銼焙細辛去苗葉桂去粗皮牡丹皮銼桃仁去皮尖雙仁炒各一兩大黃銼炒半兩上八味粗搗篩每服三錢匕水一盞半