body:
  text: 卷第一百七十八小兒冷痢論曰凡痢皆由乳食不節傷動胃氣腸胃虛弱清濁不分因虛而泄滯久不散故為痢也虛而冷者則所下青白或如凝脂久不瘥則陳寒結痼或下黑瘀診其脈沉而遲者冷痢也治小兒五歲以下百日以上冷痢龍骨飲方龍骨黃連去須各一兩半人參甘草炙銼乾薑炮裂半夏湯洗十遍焙乾厚朴去粗皮生薑汁炙銼赤石脂各一兩上八味粗搗篩一歲兒每服一錢匕水半盞入棗一枚擘破同煎至三分去滓分溫二服空心午後各一服量兒大小以意加減治小兒秋後大腸挾冷下痢不止訶黎勒散方訶黎勒煨去核半兩肉豆蔻去殼二枚當歸切焙赤石脂密陀僧別研如粉枳殼去瓤麩炒龍骨乾薑炮裂厚朴去粗皮薑汁炙各半兩上九味搗羅為散一二歲兒每服半錢匕米飲調空心午後各一服更量兒大小以意加減治小兒下痢白膿黃耆湯方黃耆銼芎藭乾薑炮裂人參黃芩去黑心當歸切焙甘草炙各半兩桂去粗皮一分上八味粗搗篩一歲兒每服一錢匕水半盞同煎至三分去滓分溫二服空心日晚各一服量兒大小以意加減治小兒冷痢心腹脹滿乾嘔不止陳橘皮湯方陳橘皮湯浸去白焙一分人參一分甘草炙半兩上三味粗搗篩一歲兒每一錢匕水半盞生薑二片同煎至三分去滓分溫三服食前日再隨兒大小以意增減治小兒虛冷臟腑滑泄不止白丸子方硫黃半兩研附子炮裂去皮臍取末稱半兩硝石研鍾乳研白龍骨研寒食麵各一分上六味同研令勻細麵糊丸如麻子大每服三五丸量兒大小加減粥飲下疾愈即止治小兒冷痢腹痛艾香散方艾葉炒木香黃連去須各半兩龍骨研訶黎勒煨取皮當歸切焙各三分乾薑炮裂一分上七味搗研為散每服半錢匕米飲調下食前服治小兒秋深冷痢止腹痛蜀椒丸方蜀椒去目及閉口者炒汗出一兩乾薑炮裂一分上二味搗羅為末煉蜜和丸小豆大一歲兒空心麵湯下五丸未止日午再服量兒大小以意加減治小兒冷痢白膿臍下絞刺痛木香丸方木香一兩訶黎勒煨去核一兩上二味搗羅為末以粳米飯和為丸如麻子大一二歲兒三丸五歲兒五丸米飲下食前服治小兒白痢人參湯方人參二兩半厚朴去粗皮生薑汁炙一兩甘草炙一兩白茯苓去黑皮一兩一分櫸皮炙二兩桔梗炒一兩一分上六味粗搗篩一二歲兒每服一錢匕水半盞煎至三分去滓分溫二服乳食前量兒大小以意加減治小兒冷痢訶黎勒丸方訶黎勒煨去核半兩桂去粗皮一分赤石脂半兩上三味搗羅為末煉蜜和丸更入臼中搗三五百杵丸如麻子大一二歲兒三丸三四歲兒五丸空心午後各一服米飲下治小兒白痢阿膠飲方阿膠炙令燥一兩一分黃芩去黑心一兩黃連去須半兩上三味粗搗篩一二歲兒每一錢匕水半盞煎至三分去滓分溫二服空心日晚各一服量兒大小以意增減治小兒冷痢白膿茯苓飲方白茯苓去黑皮一兩一分人參一兩半厚朴去粗皮生薑汁炙銼一兩半桔梗炒一兩櫸皮炙一兩上五味粗搗篩每服一錢匕水半盞煎至三分去滓分溫二服食前日二量兒大小以意增減治小兒下痢色白小便赤調中人參飲方人參三分龍骨一兩厚朴去粗皮生薑汁炙銼一分當歸切焙乾薑炮裂白茯苓去黑皮甘草炙各一兩上七味粗搗篩一二歲兒每服一錢匕水半盞煎至三分去滓分溫二服空心日晚各一量兒大小以意加減治小兒冷痢腹痛龍骨湯方龍骨甘草炙黃連去須各一兩乾薑炮裂當歸切焙各三分上五味粗搗篩一歲兒每服半錢匕水半盞煎至三分去滓分溫二服日再量兒大小以意加減治小兒冷痢當歸湯方當歸切焙黃連去須赤石脂乾薑炮裂龍骨酸石榴皮微炙厚朴去粗皮生薑汁炙銼各三分上七味粗搗篩每服一錢匕水一盞煎至五分去滓分溫二服食前日一量兒大小以意加減治小兒腸胃虛弱清濁不分痢下青白或如凝脂陳寒痼冷或下黑瘀豆蔻散方肉豆蔻去殼一枚縮砂去皮七枚訶黎勒去核三枚鉛丹炒胡粉炒龍骨各二錢白礬一分天仙子一分與白礬和令勻入在橡斗子內合定用麻線纏定炭火內燒黑存性細研上八味搗研為散再研令勻每服半錢匕米飲調下乳食前服治小兒冷痢心腹痛悶不美乳食嘔逆不止丁香丸方丁香硫黃胡椒桂去粗皮各一錢陳橘皮去白焙附子炮裂去皮臍各一分肉豆蔻去殼一枚上七味搗羅為細末用生薑汁煮麵糊和丸如緑豆大每服五丸生薑艾湯下奶食前服量兒大小加減服治小兒脾胃虛弱清濁不分因成冷痢其色青白甚則色黑厚朴丸方厚朴去粗皮生薑汁炙黃色一兩肉豆蔻麵裹炮裂一兩訶黎勒三枚麵裹炮用皮龍骨半兩木香一兩上五味搗羅為細末水浸炊餅心和丸如麻子大一二歲兒每服十丸溫米飲下日三服治小兒冷痢便下青白或如凝脂或下瘀黑厚朴湯方厚朴去粗皮生薑汁炙銼蒼朮米泔浸切焙陳橘皮去白焙各一兩甘草炙銼半兩乾薑炮三分上五味粗搗篩每服一錢匕水一盞入生薑二片棗一枚劈煎至五分去滓溫服治小兒冷痢或下青白或下瘀黑或如凝脂補脾丸方肉豆蔻炮去殼一枚為末龍骨燒研乳香研蕪荑仁炒研麝香研各一錢上五味同研勻軟飯丸如麻子大每服五七丸陳米飲下治小兒冷痢或下青白或下瘀黑或如凝脂草節丸方烏頭炮裂去皮臍黃連去須吳茱萸湯洗焙炒乾薑焙各一錢上四味搗羅為末醋煮麵糊和丸如黍米大每服七丸草節湯下小兒熱痢論曰小兒挾熱痢此由邪熱在於腸間因胃氣不和乳食傷動故令腹痛腸鳴下痢黃赤名熱痢治小兒熱痢下重或下痢如血汁香連丸方木香黃連去須各半兩上二味搗羅為細末醋浸炊餅和丸如緑豆大每服二十丸米飲下不計時候治小兒赤痢經時不止犀角丸方犀角鎊屑一兩一分黃連去須一兩半女萎一兩白頭翁去蘆頭一兩半茜根三分枳殼去瓤麩炒黃三分甘草炙半兩赤石脂一兩一分黃芩去黑心一兩干藍半兩櫸皮炙三分龍骨一兩黃柏去粗皮炙半兩上一十三味搗羅為細末煉蜜和搗五百杵丸如麻子大一二歲兒每服三丸三歲至六歲兒可四五丸空心午後各一服米飲下治小兒猝下熱痢赤石脂湯方赤石脂一兩黃連去須石膏碎甘草炙龍骨知母焙前胡去蘆頭赤茯苓去黑皮桂去粗皮芍藥各一分上一十味粗搗篩一二歲兒每服半錢匕入棗一枚擘破水七分煎至四分去滓分溫二服空心午後各一服治小兒熱毒下痢如魚腦手足壯熱黃連白頭翁湯方黃連去須一兩白頭翁酸石榴皮炙犀角鎊屑各半兩上四味粗搗篩一二歲兒每服半錢匕水七分煎至四分去滓分溫二服空心午間日晚各一服治小兒熱痢牡蠣丸方牡蠣煅黃連去須黃柏去粗皮炙龍骨赤石脂人參甘草炙各一兩上七味搗羅為末煉蜜和搗千餘杵丸如麻子大一二歲兒每服三丸四歲至六歲兒五丸米飲下空心午後各一服治小兒熱痢不止梔子丸方梔子仁七枚黃柏去粗皮炙三分白礬熬汁枯一兩棗大者四枚燒令黑色上四味搗羅為細末煉蜜和丸如麻子大一二歲兒每服三丸三四歲兒每服五丸米飲下空心午後各一服治小兒熱痢壯熱全不食乳食乳即吐熊膽散方熊膽半兩黃連去須三分馬齒莧乾者炒一兩無食子煨一枚蚺蛇膽半兩犀角鎊屑一兩上六味搗羅為細散一二百日兒每服一字匕新汲水調服空心午後各一服治小兒熱痢不止黃芩知母湯方黃芩去黑心知母焙各一兩葳蕤三分黃柏去粗皮炙半兩甘草炙半兩上五味粗搗篩一二歲兒每服半錢匕水七分煎至四分去滓分溫二服空心午後各一服治小兒熱毒痢下膿血羚羊角湯方羚羊角鎊屑三分地榆一兩吳藍三分黃連去須一兩黃芩去黑心半兩茜根三分當歸切焙阿膠炙燥赤石脂各一兩甘草炙半兩上一十味粗搗篩一二歲兒每服半錢匕水七分煎至四分去滓分溫二服空心午後各一服治小兒熱毒痢下血黃連飲方黃連去須一兩半白蘘荷根一兩犀角鎊屑一兩黃芩去黑心一兩白頭翁去蘆頭三分茜根銼一兩藍青乾者三分甘草炙半兩上八味粗搗篩一二歲兒每服半錢匕水七分煎至四分去滓分溫二服空心午後各一服治小兒熱痢壯熱多渴而痢烏梅湯方烏梅肉去核二枚焙黃連去須藍葉各一分犀角鎊屑阿膠炙燥甘草炙各半兩上六味粗搗篩一二歲兒每服半錢匕水七分煎至四分去滓分溫二服空心午後各一服治小兒赤痢血痢訶黎勒散方訶黎勒煨去核梔子去殼各一兩上二味搗羅為細散一二歲兒每服半錢匕米飲調下空心午後各一服治小兒久熱痢不下乳三物湯方大黃生銼甘草炙銼麥門冬去心焙等分上三味粗搗篩每服二錢匕水一盞煎至五分去滓分溫三服空腹量兒大小加減服小兒赤白痢論曰小兒痢下赤白由脾胃不和乳食所傷留滯腸中與津液相搏腸虛則泄故為痢也虛而有熱則赤虛而有寒則白冷熱不調則赤白相兼膿血雜下故名赤白痢治小兒赤白痢腹肚㽲痛不思飲食羸瘦赤石脂丸方赤石脂白礬燒令汁盡訶黎勒皮白朮黃耆銼厚朴去粗皮生薑汁炙銼乾薑炮一分上一十味搗羅為末煉蜜丸如麻子大每服五丸溫米飲下空心午後服量兒大小加減治小兒赤白痢不止當歸丸方當歸切焙半兩黃連去須龍骨人參各一分無食子炮二枚鹿角鎊豉炒各一分上七味搗羅為末煉蜜丸如麻子大每服五丸溫米飲下空心午後服量兒大小加減治小兒下痢赤白鹿角丸方鹿角鎊蕪荑仁炒附子炮裂去臍皮各一分赤石脂半兩上四味搗羅為末煉蜜和丸如麻子大每服五丸溫米飲下空心日晚各一服量兒大小加減治小兒赤白痢日夜三五十行白朮湯方白朮一兩一分乾薑炮一分白茯苓去黑皮甘草炙各一兩附子炮裂去皮臍半兩上五味粗搗篩每服一錢匕水半盞煎至三分去滓分溫二服空心食前服量兒大小加減治小兒赤白痢人參湯方人參一兩半厚朴去粗皮生薑汁炙一兩白茯苓去黑心桔梗銼炒各一兩一分櫸皮去粗皮炙二兩甘草炙一兩一分上六味粗搗篩每服一錢匕水半盞煎至三分去滓早晨午後服量兒大小加減治小兒赤白痢腹痛日夜頻數厚朴散方厚朴去粗皮生薑汁炙三分人參赤石脂龍骨各一兩地榆乾薑炮當歸切焙各半兩黃連去須一兩上八味搗羅為散每服半錢匕空心米飲調下午後再服量兒大小加減治小兒赤白痢日夜數十行腹痛後重犀角湯方犀角鎊苦參黃連去須地榆黃柏去粗皮炙各一兩上五味粗搗篩每服一錢匕水半盞煎至三分去滓分溫二服空心午後服量兒大小加減治小兒赤白痢久痢成疳黃柏散方黃柏去粗皮炙黃連去須桃白皮炙銼胡粉炒白茯苓去黑皮各一兩丁香一分上六味搗羅為散每服半錢匕米飲調下空心午後服量兒大小加減治小兒赤白痢挾熱多渴宜服藍葉湯方藍葉一分黃連去須半兩白茯苓去黑皮一分冬瓜子炒半兩上四味粗搗篩每服一錢匕入蜜少許水一小盞煎至五分去滓分溫二服空心午後服量兒大小加減治小兒赤白痢鹿茸散方鹿茸去皮毛酥炙甘草炙訶黎勒煨去核各半兩上三味搗羅為散每服半錢匕食前日三米飲調下量兒大小加減治小兒赤白痢黃連散方黃連去須檳榔銼上二味各搗羅為散如患赤痢黃連末二錢匕檳榔末一錢匕白痢黃連末一錢匕檳榔末二錢匕和勻每服半錢匕米飲調下量兒大小加減治小兒赤白痢腹內疼痛煩渴木香黃連散方木香黃連去須各半兩訶黎勒炮去核十二枚肉豆蔻去殼二枚甘草炙半兩上五味搗羅為散每服半錢匕米飲調下治小兒赤白痢及水瀉麝香丸方麝香研半錢巴豆七粒去