服如吐逆入藿香少許治傷寒陰盛四物桂枝湯方桂去粗皮麻黃去根節各三分附子炮裂去皮臍一兩乾薑炮一分上四味㕮咀如麻豆大每服五錢匕用水一盞半入生薑半分切棗三枚劈破同煎至八分去滓不拘時候溫服治傷寒服冷藥過多心腹脹滿腳膝厥冷昏悶不知人桂心湯方桂去粗皮厚朴去粗皮生薑汁炙各三分芍藥一兩乾薑炮檳榔銼各半兩上五味粗搗篩每用五錢匕水一盞半煎取八分去滓入童子小便一合攪勻空腹分溫二服治傷寒四肢厥泠蒸尉方吳茱萸湯洗焙乾三升上一味用溫酒浸令通濕以生絹袋二個盛蒸令極熱取茱萸袋子更互尉四肢前後心及手足心候氣通徹即止又用藥尉氣通暢後宜服此方人參一兩生薑煨切二兩上二味各細銼用水一盞半煎至八分去滓分溫二服如食頃再服傷寒過經不解論曰傷寒為病六經受邪始傳於三陽病在表者可汗其滿三日傳於三陰病入里者可下其不兩感於寒更不傳經不加異氣者至七日太陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太陰病衰腹滿減如故十一日少陰病衰渴止舌乾已而嚏十二日厥陰病衰囊縱少腹微下大氣皆去病人精神爽慧也故傷寒愈者皆在十二日若過此經病猶不解者為邪熱結於裡其狀或譫言妄語或鬱郁微煩或腹滿吐下皆緣治之失宜邪氣稽留故病過經不能解也當隨其證以治若更感異氣變為他疾者當依壞病法療之治傷寒十三日過經譫語者有熱也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯方大黃四兩去皮酒洗甘草二兩炙上二味銼如麻豆每服五錢匕水一盞半煎至七分去滓入芒硝一錢匕更煎一兩沸放溫頓服治傷寒過經不解熱結在裡往來寒熱煩渴躁悶犀角湯方犀角屑一兩柴胡去苗吳藍各三分大青升麻各一兩烏梅去核黃芩去黑心各三分甘草炙銼半兩上八味粗搗篩每服五錢匕水一盞半入竹葉三十片煎取七分去滓食後溫服治傷寒過經半月不解鱉甲湯方鱉甲去裙襴醋炙柴胡去苗升麻各一兩烏梅去核半兩枳實去瓤麩炒犀角屑黃芩去黑心各一兩甘草炙銼半兩上八味粗搗篩每服五錢匕水一盞半煎至七分去滓下地黃汁二合攪勻食後分溫二服治傷寒十三日過經不解臍腹脹滿小便淋澀煩悶燥渴木通湯方木通銼葛根銼青橘皮湯浸去白鹽炒檳榔銼滑石瞿麥穗各一兩上六味粗搗篩每服三錢匕水一盞入蔥白二寸同煎至六分去滓溫服不計時候治傷寒過經心胸痞滿煩躁狂言積熱毒氣及婦人血風血氣經候不調寒熱有積萬應散方甘遂連珠者威靈仙去土五靈脂各一兩上三味搗羅為散每服一錢匕如傷寒日數多有積熱者用雞子清蜜水調下如婦人前件病證者綿灰酒調下尋常熱氣蜜水調下冷即用蔥湯調下陽毒積熱入膩粉白丁香各半錢生薑汁蜜水調下治傷寒發汗下之後過經不解胸脅滿結渴而不嘔但頭汗出往來寒熱小便不通柴胡湯方柴胡去苗二兩桂去粗皮黃芩去黑心各一兩牡蠣生用甘草炙各半兩栝蔞根一兩半木通銼一兩上七味粗搗篩每服五錢匕水一盞半入生薑半分拍碎蔥白五寸同煎至七分去滓食後溫服治傷寒過經不解三焦滯悶身重疼痛保安散方黃耆銼木通銼青橘皮湯浸去白焙桑根白皮銼白朮陳橘皮湯浸去白焙各半兩木香三分黑牽牛一兩炒搗取末半兩上八味搗羅為散每服二錢匕濃煎棗湯調下
