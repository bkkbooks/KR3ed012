body:
  text: 卷第二十一傷寒門傷寒統論論曰風寒暑濕飲食勞倦皆能為病是謂五邪冬傷於寒者春必病溫春傷於風者夏必飧泄夏傷於暑者秋必痎瘧秋傷於濕者冬必咳嗽是乃四時之氣也然五邪所中雖不同本皆外邪大率同類唯冬時嚴寒其毒厲尤甚人或中之病在冬時則正名傷寒若邪毒藏於肌膚至春之時乘溫而發者為溫病若留連日久至夏之時乘盛暑而發者為暑病所謂先夏至日為病溫後夏至日為病暑是也其病傳之次先客於太陽其病令人頭項痛腰脊強其脈尺寸皆浮太陽不已傳於陽明其病體熱目疼鼻乾不得臥其脈尺寸皆大陽明不已傳於少陽其病胸脅痛而耳聾其脈尺寸皆弦少陽不已太陰受之其病腹滿體重其脈尺寸俱微太陰不已少陰受之其病口燥舌乾而渴或背微惡寒其脈尺寸俱沉少陰不已厥陰受之其病煩滿舌卷囊縮其脈尺寸俱緩病之所傳不過三陽三陰而已其未滿三日者邪在陽經未入於裡其病在表宜汗之而愈若經四日者邪入陰經其病在裡宜下之而愈特其大略爾蓋有一日而傳至數經者亦有數日而尚在太陽者陽病雖宜發汗陽明之病反宜下之陰病雖宜下之少陰之病或宜溫之由人之稟受虛盛其傳有遲速又有不傳經者當審其脈證凡此六經受病五邪脈證各不同傷風者必惡風其脈浮緩傷寒者必惡寒其脈浮緊以至傷暑脈虛傷濕脈濡人迎緊盛為傷寒氣口緊盛為傷食診得五邪知其本也診得六經知其標也有病雖在表而不可汗者或在裡而不可下者或若汗之太多則津液燥竭遂致亡陽下之太早則邪氣動膈乃成結胸清濁相干則變為霍亂毒熱內瘀則變為瘀血又或為發黃者濕熱相蒸也或為發斑者陽毒太盛也陽盛之人得之於熱乃為陽毒陰盛之人得之於寒乃為陰毒蟲動則為狐惑壞病之甚則為百合若勞復陰陽易之類雖瘥後猶宜節慎變態多端不可備舉當以類求之皆以適當為良唯二感之病表裡皆受邪為難治其他或陰證似陽陽證似陰或陰盛隔陽陽盛隔陰者在診病者以意詳之傷寒可汗論曰傷寒病汗之而愈者以初得病一日至三日陽經受邪未傳諸陰其邪在表故當發汗此大約也然病數日脈浮太陽證不罷者亦可汗之當以脈證為準凡頭痛發熱惡風振寒是為可汗之證其脈浮者是為可汗之脈陽虛則惡寒脈浮為在表或浮而弱或浮而緊或浮大而數皆宜汗之治傷寒太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯方麻黃去根節三兩桂去粗皮三兩甘草炙銼一兩杏仁去皮尖雙仁七十枚上四味㕮咀如麻豆大每服五錢匕水一盞半煎至八分去滓溫服覆取微汗不須啜粥余如桂枝法將息治傷寒太陽中風脈緊發熱惡寒身痛不汗出而煩躁者大青龍湯方麻黃去根節六兩桂去粗皮甘草炙銼各二兩杏仁去皮尖雙仁四十枚生薑三兩棗大者十枚石膏一雞子大碎上七味㕮咀如麻豆大每服五錢匕水一盞半煎至八分去滓溫服脈微汗出惡風者不可服治傷寒太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黃各半湯方桂枝去粗皮一兩半芍藥生薑切甘草炙麻黃去根節各一兩大棗四枚杏仁二十四枚湯浸去皮尖雙仁上七味㕮咀如麻豆大每服五錢匕水一盞半煎至八分去滓溫服治傷寒太陽病外證未解脈浮弱者當以汗解宜桂枝湯方桂枝去粗皮芍藥生薑各三兩甘草炙二兩大棗十二枚上五味㕮咀如麻豆大每服五錢匕水一盞半煎至八分去滓溫服須臾啜熱稀粥助藥力取微汗治傷寒少陰病得之二三日宜微發汗以二三日無里證故微發汗也麻黃附子甘草湯方麻黃去根節甘草炙各二兩附子一枚炮裂去皮臍上三味㕮咀如麻豆大每服五錢匕水一盞半煎至八分去滓溫服治傷寒初覺一二日頭項腰脊痛惡寒蔥豉湯方蔥白十四莖豉半合炒乾薑炮一分麻黃去根節桂去粗皮芍藥各半兩上六味㕮咀如麻豆大每服五錢匕水二盞煎至一盞去滓溫服良久投蔥豉熱粥蓋覆出汗治傷寒服蔥豉湯後未得汗再服蔥粥方蔥白一十莖並頭切豉三合炒生薑半兩拍碎上三味用水五盞煎至二盞半去滓入白米依常法煮粥入少鹽攪勻任意食之衣覆出汗未汗再服治傷寒初得一二日出汗麻黃葛根湯方麻黃去根節一兩半葛根銼柴胡去苗各一兩芍藥三分上四味粗搗篩每服五錢匕水一盞半豉一百粒開口椒一七粒連須蔥白三寸薄荷二十葉同煎至八分去滓熱服服後蔥豉湯一盞投之衣覆取汗汗未快再服治傷寒初覺煩熱頭疼腳痛解毒湯方柴胡去苗半兩黃芩去黑心荊芥穗各一分上三味銼如麻豆大每服五錢匕水一盞半生薑一棗大拍碎煎至八分去滓入生地黃汁一合白蜜半匙更煎三五沸熱服治傷寒初覺頭痛惡寒壯熱腹內熱脈洪大一二日宜葛根湯方葛根銼黃芩去黑心柴胡去苗各半兩蔥白五莖豉一合炒上五味㕮咀如麻豆大每服五錢匕水二盞生薑一棗大拍碎煎至一盞去滓溫服良久再服得汗即止治傷寒初患一二日體熱頭痛麻黃解肌湯方麻黃去根節一兩石膏碎葛根銼各一兩半甘草炙一分半芍藥杏仁湯浸去皮尖雙仁炒各半兩桂去粗皮三分上七味粗搗篩每服五錢匕水一盞半生薑五片煎至八分去滓溫服治傷寒一二日頭疼壯熱遍身疼痛其脈洪數葛根湯方葛根銼白朮芍藥乾薑炮各半兩麻黃去根節桂去粗皮各三分甘草炙一分半上七味粗搗篩每服五錢匕水一盞半煎至八分去滓熱服如脈微即加附子半兩治傷寒三日發汗神丹丸方人參白茯苓去黑皮半夏湯洗七遍炒各一兩一分附子炮裂去皮臍烏頭炮裂去皮臍各一兩上五味搗羅為末入丹砂一分研勻煉蜜和搗三五百杵丸如大豆大每服三丸薄荷茶下令體中瞤瞤然又以熱粥投之汗出即止治傷寒初得一二日頭痛壯熱惡寒脈浮緊者石膏人參解肌湯方石膏碎麻黃去根節各一兩柴胡去苗人參各半兩桂去粗皮甘草炙各一分葛根銼二兩上七味粗搗篩每服三錢匕水一盞入蔥豉生薑煎至七分去滓熱服不拘時治傷寒三日以前表證不除柴胡湯方柴胡去苗麻黃去根節石膏各一兩甘草半兩炙上四味粗搗篩每服三錢匕水一盞入鹽豉三十粒蔥白二寸煎至六分去滓並三服汗出為度治傷寒初病三日內脈浮有表證芎藭湯方芎藭四兩蒼朮一斤半銼麩炒熟木臼內杵去黑皮取淨者一斤藁本去苗土一兩甘草二兩炙上四味粗搗篩每服三錢匕水一盞生薑五片煎至六分去滓稍熱並三服治傷寒初得一二日至三日頭痛痰逆肢體煩躁惡風身熱憎寒荊芥湯方荊芥穗四兩前胡去蘆頭旋覆花各三兩甘草炙二兩白朮半夏湯洗七遍焙乾麻黃去根不去節芍藥各一兩上八味粗搗篩每服三錢匕水一盞生薑三片棗三枚劈破煎至七分去滓熱服不拘時治傷寒二三日頭痛體疼發表五味桂枝湯方桂去粗皮葛根銼各一兩麻黃去根節一兩半山梔子仁半兩石膏一分上五味粗搗篩每服三錢匕水一盞蔥白一莖切豉三十粒煎至七分去滓熱服良久再服以蔥白稀粥投之微汗即瘥治傷寒三日內表證不解者五解湯方麻黃去根節二兩白朮一兩半葛根銼甘草炙銼山梔子仁桔梗炒石膏碎杏仁湯浸去皮尖雙仁麩炒各一兩上八味粗搗篩每服三錢匕水一盞入蔥白鹽豉同煎至七分去滓連並熱服不拘時汗出為度治傷寒三日頭疼壯熱骨節痠疼白朮湯方白朮五味子甘草石膏各四兩乾薑三兩上五味並生粗搗篩每服三錢匕水一盞鹽一捻煎至八分去滓連並熱服不問有汗無汗自解如傷寒挾冷腹痛加生薑三片棗二枚同煎治傷寒頭痛發熱惡寒解表六味桂枝湯方桂去粗皮麻黃去根節石膏乾薑炮白朮生用蒼朮米泔浸麩炒各一兩上六味粗搗篩每服三錢匕水一盞生薑三片蔥白二寸豉七粒同煎至八分去滓熱服不拘時治傷寒一日至三日頭痛壯熱煩悶其脈洪數人參湯方人參一兩白朮甘草炙各半兩麻黃去根節桂去粗皮各三兩上五味粗搗篩每服三錢匕水一盞生薑三片煎至七分去滓連並溫服不拘時衣覆出汗治傷寒頭痛體疼寒熱不解十味人參湯方人參厚朴去粗皮生薑汁炙桂去粗皮甘草炙銼杏仁湯浸去皮尖雙仁炒白朮乾薑炮白茯苓去黑皮陳橘皮湯浸去白焙各一兩麻黃去根節湯煮掠去沫二兩上一十味粗搗篩每服三錢匕水一盞入生薑二片棗一枚劈破煎至七分去滓熱服才覺傷風並三兩服汗出立瘥治傷寒表不解頭痛體疼發汗羌活湯方羌活去蘆頭獨活去蘆頭柴胡去苗前胡去蘆頭人參白茯苓去黑皮桔梗炒芎藭甘草炙各一兩枳殼去瓤麩炒二兩上一十味粗搗篩每服三錢匕水一盞生薑二片薄荷少許同煎至六分去滓溫服不拘時候治傷寒二三日頭痛肌熱煩躁不解四肢倦痛可汗香術湯方蒼朮米泔浸一宿切焙二兩陳橘皮湯浸去白焙防風麻黃去根節湯煮掠去沫焙乾當歸切焙桂去粗皮甘草炙各一兩白茯苓去黑皮吳茱萸洗焙乾炒人參厚朴去粗皮生薑汁炙羌活去蘆頭各半兩上一十二味除桂外銼碎慢火炒黃入桂同粗搗篩每服三錢匕水一盞入蔥白一寸生薑二片同煎至六分去滓溫服不拘時候治傷寒一日至三日以前身熱脈大肢體疼痛汗不出蔥豉湯方蒼朮米泔浸去皮銼麩炒黃麻黃去根節湯煮掠去沫焙各二兩甘草炙銼桂去粗皮各一兩上四味粗搗篩每服三錢匕水一盞入蔥白三寸鹽豉二十粒同煎至七分去滓熱服不拘時候治傷寒表不解取汗前胡湯方前胡去蘆頭柴胡去苗羌活去蘆頭芎藭人參枳殼去瓤麩炒甘草炙銼芍藥各半兩麻黃去根節湯煮掠去沫焙一兩上九味粗搗篩每服三錢匕水一盞入蔥白三寸煎至七分去滓熱服如耍發汗更入薄荷三五葉同煎服訖以厚被蓋覆如人行五里再服徐令汗透遍身即旋去衣被避風若傷寒後餘毒未解潮熱往來數服即解治傷寒表未解氣脈閉塞津液不通水飲氣停在胸腑結而成痰膈脘痞悶倚息短氣體重多唾頭目旋暈嗜臥好眠額角偏痛腠理開疏體常汗出消飲茯苓湯方白茯苓去黑皮前胡去苗芎藭羌活去蘆頭桔梗炒人參獨活去蘆頭甘草炙柴胡去苗各半斤陳橘皮去白四兩上一十味同搗羅為散每服三錢沸湯點服不計時候或銼如麻豆用前件藥半兩水三盞煎至一盞半去滓分溫二服治傷寒頭痛惡寒發熱肢體疼倦前胡湯方前胡去蘆頭羌活去蘆頭各六兩防風去叉四兩桔梗炒三兩薺苨去蘆頭二兩銼蛇蛻皮一兩剪碎炒令黃陳橘皮湯浸去白焙乾稱半兩蟬殼淨去土一兩甘草炙銼一兩半人參二兩上一十味粗搗篩每服三錢匕水一盞入生薑三片薄荷七葉煎至七分去滓溫服治四時傷寒初覺桂心湯方桂去粗皮芍藥甘草炙銼葛根銼各等分上四味粗搗篩每服四錢匕水一盞半生薑三片棗一枚劈同煎至八分去滓溫服傷寒可下論曰凡傷寒邪入於陰其病在裡法當下之諸腹滿不大便或口燥舌乾而渴或潮熱譫語皆為可下之證諸診得脈沉而實即為可下之脈但脈證已具不必拘以日數急宜攻裡若病雖過經而里證未備者未可下也故經曰陽盛陰虛下之則愈其法謂此陽明病不吐不下心煩者可與調胃承氣湯太陽病三日發汗不解蒸蒸熱者可與調胃承氣湯傷寒吐後腹脹滿者可與調胃承氣湯方甘草炙二兩大黃以清酒洗四兩上二味㕮咀每服五錢匕水一盞半煎至一盞去滓入芒硝一錢匕更煎一二沸