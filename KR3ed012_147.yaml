body:
  text: 卷第一百四十七食牛馬豬犬魚蟹中毒論曰夫禽獸品類有根性本毒者有無毒而食毒物者有雜和相畏相惡相因成毒者人不慎而食之致傷腑臟之和亂腸胃之氣或輕或重各隨其毒而為害今備禽獸雜忌並解毒諸方於後宜預知焉治食牛肉中毒方豬肉煉為油一兩上一味每服一匙頭以溫湯調化服之未瘥更服治食牛肉中毒方豬牙不拘多少燒灰上一味搗為細末每服一錢匕以人乳汁調下治食馬肝或肉中毒方豬骨燒灰上一味研細每服二錢匕冷水調下未瘥再服治食馬肝中毒方雄鼠屎二七枚炒上一味為末冷水和服之未效再服治食豬肉中毒方大黃炒一兩朴硝研一兩杏仁和皮打碎一兩上三味為粗末每服三錢匕水一盞煎七分去滓溫服治食狗肉或食不消化狂躁方杏仁三兩和皮用上一味和皮細研以熱湯投之去滓每服一盞溫服治食自死六畜肉中毒方黃柏去粗皮一兩上一味搗為末每服一錢匕溫水調下治食六畜肝中毒方豆豉一兩上一味以水浸絞取汁旋服之治鳥獸中毒箭其肉有毒解之方藍青三握細切上一味搗取汁每服一盞飲之治食魚中毒面腫煩亂方陳橘皮湯去白焙一兩上一味搗為粗末以水兩盞煎至一盞去滓停冷細細飲之大效治食魚中毒方冬瓜一枚小者洗淨搗絞取汁一大盞上一味旋旋飲之效或甜瓜搗絞取汁飲之亦得治食鱸魚中毒面腫煩亂欲死者方生蘆根搗絞取汁一盞上一味旋旋飲之以瘥為度治食魚鱠中毒煩亂方大黃一兩半朴硝一兩上二味搗令碎每服三錢匕酒一盞煎至六分去滓溫服早晚各一治蟹腹中有毒食之或致死急治之方大黃汁紫蘇汁冬瓜汁上三味汁共一大盞飲之解毒立效治食蟹中毒煩亂欲死者服五蠱黃丸得吐下皆瘥方雄黃一兩以油從旦至夜煎之取出別研莽草取葉水洗曝乾炙一兩蜈蚣赤足大者一條炙令勻鬼臼一兩巴豆二十枚去皮心炒令黃上五味搗羅三味為末別研巴豆雄黃和勻煉蜜為丸如小豆大瓷器中盛每服三丸至五丸米飲下治食蟹中毒方蘆梢細銼研碎三兩上一味以水一盞同研絞捩取濃汁飲之大效治食蟹中毒方生藕汁蒜汁冬瓜汁各一盞上三味各取汁各自飲之或一汁已解別汁不用飲治食蟹中毒方紫蘇新摘者一握上一味搗碎以水煎取濃汁飲之治食魚中毒橘姜丸方陳橘皮湯浸去白焙為末生薑去皮切爛搗研豆豉為末上三味等分同和丸如梧桐子大每服二十丸茶清下解金銀銅鐵石毒論曰五金受五方精氣各有毒性不可謂有利無害也服之適宜足以瘳疾服之非宜徒傷正氣當隨所畏惡以制之服石法亦若是治金毒方鴨血一盞上一味每服半盞和雞子清調下未效再服治銀毒方黃連去須甘草生銼各一兩上二味粗搗篩以水三盞煎取二盞去滓時時飲之治銀毒方石亭脂一兩上一味搗羅為細末煎甘草湯調下二錢匕三服大效治銅毒方鴨屎焙乾無泥土者上一味搗羅為細末用水調下一錢匕三服立解治鐵毒方磁石大火煅醋猝二七遍一兩上一味細搗研如粉醋煮麵糊丸梧桐子大每服二十丸水吞下未瘥更服治丹砂毒方鹽半兩上一味以冷水攪勻令澄旋旋飲之治石鐘乳毒方紫石英一兩上一味搗羅為細散每服一錢匕溫水調下連三服治硫黃毒方細辛去苗葉一兩上一味搗羅為細散每服一錢匕煮豬肉白湯調下冷服又白野鴿肉亦治硫黃毒凡一兩肉可解一兩毒治硝石毒方女菀一兩上一味粗搗篩每服二錢匕水一盞煎七分溫服不拘時治陽起石毒方菟絲子一兩不用酒浸上一味搗羅為細末每服一錢匕溫水調下三服立解治雄黃毒方防己一兩上一味為細末每服二錢匕溫水調下連三服治硇砂毒方生緑豆上一味不計多少研汁飲之治硇砂毒方漿水上一味每服一盞不拘時服之蠱毒論曰千金論曰蠱毒千品種種不同有得三年方死有一月或百日乃死者其為病亦各有異或下鮮血或好臥暗室或心性反常乍嗔乍喜或四肢沉重痠痛緩與急皆有殊也且以五蠱推之有蛇蠱有蜥蜴蠱有蜣螂蠱有蝦蟆蠱有草蠱若蛇蠱者面色青黃其脈洪壯病發之時腹內熱悶胸脅支滿舌本脹強不喜言語身體常痛心腹似蟲行顏色多赤唇口乾燥經年不治肝膈爛而死蜥蜴蠱者面色赤黃其脈浮滑而短病發之時腰背微滿手腳唇口皆習習而喉脈急舌上生瘡二百日不治啖人心肝盡爛下膿血羸瘦顏色枯黑而死蝦蟆蠱者面色青白其脈沉濡發時咽喉塞不欲聞人語腹內鳴喚或上或下若天陰久雨而病轉劇皮肉如蠱行手腳煩熱嗜醋食咳唾膿血顏色乍白乍青腹內脹滿狀如蝦蟆若成蠱吐出成蝌蚪形是蝦蟆蠱經年不治啖人脾胃俱盡唇口裂而死蜣螂蠱者脈緩而散病發之時身體乍冷乍熱手腳煩疼吐逆無時小便黃赤腹內悶胸中痛顏色多青或吐出似蜣螂有足翅是蜣螂蠱經年不治啖人血脈枯盡而死欲知蠱與非當令病人唾於水內沉者是蠱浮者非也又云旦起取井華水未食前當令病人唾於水內唾如柱腳直下沉者是蠱毒沉散不至下者是草蠱毒又云含大豆若是蠱豆脹皮脫若非蠱豆不爛脫又云以鵠皮置病人臥下勿令知若病劇者是蠱又云取新生雞子煮熟去皮留黃白令完全日晚口含以齒微微喼之勿令破作兩炊時夜吐瓦上著霜露內旦看大青是蠱毒也昔有人食新變鯉魚中毒病心腹痛心下鞭發熱煩冤欲得水洗沃身體搖動如魚得水狀有人診云是蠱其家云野間相承無此毒不作蠱治遂死治諸蠱毒注氣變化無常鮫魚皮散方鮫魚皮微炙犀角鎊麝香研白龍骨丹砂研雄黃研蘘荷根鹿角鎊各一分蜈蚣炙去足一枚上九味除研外搗羅為散共和令勻每服二錢匕溫酒調下日三服治中蠱毒腹內堅如石面目青黃小便淋瀝變易無常羚羊角湯方羖羊角鎊五兩蘘荷根四兩半梔子仁七枚牡丹皮赤芍藥黃連去須犀角鎊各一兩上七味粗搗篩每服三錢匕水一盞煎至七分去滓不拘時候治蠱毒喉中如物齧咽之不入吐之不出或下鮮血漸漸羸瘦腹大食飲不下桃白皮散方桃白皮五月五日採陰乾臨用去黑皮一兩半大戟銼炒斑蝥去翅足米炒各三分上三味搗羅為散每服一錢匕空心清粥飲調下良久更吃少粥飲當吐利蠱毒並出若一服未應再服即瘥治蠱毒難愈喉中妨悶瘦瘁化蠱丸方胡燕屎炒一合獨頭蒜五枚上二味同搗如膏丸如杏仁大每日空腹以清粥飲下十丸至十五丸其蠱盡化鮮血下治中蠱毒令人腹內堅痛面目青黃病變無常蜜髓煎方豬骨髓研五兩蜜一碗上二味同煎令熟分為十服日三四服即瘥治中蠱毒令人腹內堅痛面目青黃形露骨立病變無常寄生散方桃上寄生三兩上一味搗羅為散每服二錢匕不計時候如茶點服治食中有蠱毒腹內堅兩目青黃瘦瘁鐵精丸方鐵精不拘多少上一味搗羅為末研生雞肝和丸如梧桐子大曝乾每服五丸至七丸溫酒下治蠱毒雄黃丸方雄黃研丹砂各半兩藜蘆去蘆頭炙鬼臼巴豆去皮心膜研去油各一分上五味搗羅為末煉蜜丸如小豆大每服三丸乾薑湯下逐下惡物並蠱毒為效治初中蠱毒升麻湯方升麻桔梗炒栝蔞根各一兩上三味粗搗篩每服三錢匕水一盞煎至七分去滓不拘時服治蠱毒生商陸汁方生商陸五兩上一味洗細切用生薑半兩和搗取自然汁半盞五更初服之服了坐半時即睡至旦不動即以茶一盞投得利以冷水洗手面便止仍煮薤白粥溫飲之治蠱毒櫸皮湯方櫸木皮薔薇根等分上二味細銼以水並酒共三盞同煮取二盞去滓溫分二服利下蠱物為效治蠱毒土瓜根酒方土瓜根一兩上一味細銼以酒一盞浸一宿次日去滓作一服吐下蠱即瘥治蠱毒皂莢酒方皂莢半梃去皮子生用上一味細銼以酒一盞浸一宿空心去滓服之得利即瘥治蠱毒薺苨散方薺苨二兩上一味搗羅為散每服三錢匕粥飲調下治蠱毒檞皮湯方檞木北陰白皮一大握長五寸細銼上一味以水三盞煎至一盞去滓空腹頓服得吐即愈治中蠱毒胡荽根汁方胡荽根一握洗銼上一味搗取自然汁半盞不計時候服之其蠱立下和酒服亦得治中蠱毒神驗方相思子三七枚上一味搗羅為散每服二錢匕空心溫水調下服後欲吐且忍之勿便吐不可忍即住便取吐其毒即快出少時以稀粥助之治忽中蠱毒方白雞血不拘多少白鴨血亦得上一味取灌口中立解治中蠱心痛方敗鼓皮一片上一味燒灰細研粥飲調二錢匕病人須臾或自呼行蠱人姓名便愈治諸般蠱化蠱丸方硫黃研一兩木香半兩密陀僧煅三分附子炮裂去皮臍別為末一兩上四味除附子別搗外搗羅為末先將附子末用米醋一盞熬成膏入前藥末丸如梧桐子大每服十丸荊芥茶下空心食前服蠱化為水乃愈治諸蠱在臟腑久不瘥檳榔散方檳榔銼半兩上一味搗羅為散每服一錢至二錢匕煎蔥蜜湯調下空心食前服治中蠱毒吐血雄黃散方雄黃研一分伏龍肝研半兩獺肝如棗大炙斑蝥去翅足糯米炒十四枚上四味搗羅為散每服二錢匕空腹以酪漿調下或吐蝦蟆及蛇等出為驗治中蠱毒吐血蘘荷根湯方蘘荷根苦參各一兩敗鼓皮燒存性三分上三味粗搗篩分為四服每以水一盞煎至七分去滓不計時溫服治中蠱吐血麥面散方小麥面二合上一味分為三服以冷水調服半日服盡蠱下即瘥治中蠱吐血桔梗汁方生桔梗不拘多少上一味搗取汁每服一小盞日三服治中蠱吐血桑心湯方桑木心銼二斗上一味於釜中以水五斗煮取二斗澄清再用微火煎取五升夜勿食旦服五合吐出蠱毒即瘥治蠱毒下血蝟皮散方蝟皮一枚燒為灰上一味細研以熟水調下二錢匕日三服治猝中蠱毒下血如雞肝晝夜不止臟腑悉損桔梗散方桔梗伏龍肝等分上二味搗羅為散每服以溫酒調下二錢匕日三不能下藥斡口開灌之心中自定服七日止食豬肝臛補之治蠱毒下血如爛肉片心腹㽲痛如有物齧若不即治蝕人五臟乃死槲皮散方槲木北陰白皮桃根白皮各四兩並細銼蝟皮灰亂髮灰各一兩大麻子汁五升上五味先以水五盞煮槲皮桃根皮取濃汁二盞和麻子汁每服暖汁一盞調亂髮灰蝟皮灰二錢匕令患人少食旦服須臾用水一盆以雞翎引吐於水中如牛涎諸蠱並出治中蠱下血如鴨肝腹中㽲痛急者茜根湯方茜根升麻犀角鎊各一兩地榆銼白蘘荷根各二兩桔梗銼炒柏皮銼黃芩去黑心各半兩上八味粗搗篩每服五錢匕水一盞半煎至七分去滓不計時溫服治蠱毒吐或下血如爛肝茜根湯方茜根蘘荷根各半升上二味細銼以水五盞煎至三盞半去滓空腹分溫三服治蠱毒吐血或下血如爛肝苦瓠湯方苦瓠一枚切上一味以水二大盞煎取一盞去滓空腹分溫二服吐下蠱即愈治五種蠱毒馬兜鈴根湯方馬兜鈴根一兩上一味細銼以水一盞煎至七分去滓空腹頓服當時吐出蠱未吐再服以快為度治五蠱吐血傷心腹中氣寒語聲不出氣悶飲食吐逆身體浮腫煩疼寒戰夢與鬼交及狐貍作魅猝得心痛上叉心胸或痛如刀刺經年不起雄黃丸方雄黃研椒目微炒鬼臼去毛莽草炙芫花醋拌炒焦木香藜蘆去蘆頭礬石燒令汁盡獺肝炙附子炮裂去皮臍各半兩蜈蚣炙一枚斑蝥去翅足米炒十枚上一十二味搗為末煉蜜和搗五七百下丸如梧桐子大每服五丸空心粥飲下以利為度治中五蠱下血喉咽妨悶犀角湯方犀角鎊三兩蘘荷根四兩黃連去須二兩升麻三兩茜根一兩當歸切焙三兩羚羊皮三寸炙焦上七味粗搗篩每服五錢匕水一盞半煎至七分去滓不計時候溫服治五種蠱毒蛇蠱食飲中得之咽中如有物咽之不下吐之不出悶亂不得臥心熱不能食麝香散方麝香研一錢上一味分二服以溫水空腹調下吐出蠱毒為效治五種蠱毒咽中如有物咽吐不出悶亂不臥馬兜鈴根湯方馬兜鈴根一兩蘘荷根半兩上二味粗搗篩每服三錢匕水一盞煎至七分去滓不計時候頓服其蠱並吐出治五蠱及中惡氣心腹脹滿不得喘息心痛積聚及疝瘕宿食不消吐逆嘔噦寒熱瘰癧奪命丸方蜈蚣炙一枚巴豆去皮心膜研去油三十粒附子炮裂去皮臍一枚礬石燒令汁盡半兩藜蘆去蘆頭雄黃研鬼臼去毛各一分上七味搗研為末再研令勻煉蜜和搗三五百杵丸如麻子大每服以溫酒下二丸至三丸
