邪相擊肌內盡痛或皮膚𤸷痹甚則邪氣深入於諸陽之經陽氣行遲不能榮養於筋故機關弛縱筋脈不能收攝而令身體手足不隨也治風濕痹肢節疼痛身體手足不隨仙靈脾丸方仙靈脾三分防風去叉半兩羌活去蘆頭白附子炮犀角屑羚羊角屑乳香細研虎脛骨酥炙黃附子炮裂去皮臍當歸切焙牛膝去苗酒浸切焙鹿茸酥炙去毛石斛去根細銼海桐皮細銼各三分乾蠍去土炒半兩烏蛇酒浸去皮骨炙二兩麝香細研一兩桂去粗皮半兩檳榔銼半兩木香半兩天麻一兩天南星炮半兩白殭蠶微炒半兩上二十三味除研二味外餘二十一味搗羅為末與研者拌和令勻煉蜜和搗五七百杵丸如梧桐子大每服三十丸食前溫酒下治風寒濕痹筋脈攣急身體手足不隨防風湯方防風去叉薏苡仁各二兩麻黃去根節湯煮掠去沫焙乾四兩白朮芎藭細辛去苗葉羌活去蘆頭茵芋去粗莖牛膝去苗酒浸切焙狗脊去毛萆薢側子炮裂去皮臍杏仁去皮尖雙仁炒微黃赤箭桂去粗皮各一兩上一十五味銼如麻豆每服四錢匕水一盞生薑三片同煎至七分去滓溫服不計時候治諸痹身體𤸷麻或多瘙癢筋脈拘急言語謇澀手足不隨天麻散方天麻白附子炮羌活去蘆頭防風去叉芎藭獨活去蘆頭當歸切焙桂去粗皮各半兩白殭蠶炒牛膝去苗酒浸切焙萆薢各三分乾蠍去土炒麻黃去根節各一兩上一十三味搗羅為散每服二錢匕暖竹瀝半盞酒半盞調下不計時治風濕痹身體手足不隨冷疼𤸷痹羌活湯方羌活去蘆頭三分防風去叉一兩五加皮銼半兩赤芍藥一兩薏苡仁炒半兩羚羊角鎊半兩檳榔二枚煨銼磁石煅醋淬二兩半上八味粗搗篩每服六錢匕水二盞入生薑五片煎取一盞去滓空心食前溫服日二夜一治風寒濕痹半身不隨不能語言四肢麻木或不知痛癢防風飲方防風去叉一兩麻黃去節湯煮掠去沫焙一兩半石膏黃芩去黑心芎藭當歸切焙各半兩杏仁去皮尖雙仁炒二十枚桂去粗皮一兩熟乾地黃焙甘草炙各半兩上一十味粗搗篩每服五錢匕以水二盞煎取一盞去滓空心食前溫服日二夜一治風寒濕痹腳膝疼痛行履不得巴戟湯方巴戟天去心一兩半五加皮一兩萆薢微炒牛膝去苗酒浸切焙石斛去根各三分防風去叉白茯苓去黑皮各九錢附子炮裂去皮臍一兩甘草微炙三分上九味銼如麻豆每服五錢匕水二盞煎取一盞去滓空心食前溫服日二夜一治風濕痹身體手足不隨菖蒲散方菖蒲九節者去須節米泔浸細切焙乾生乾地黃焙枸杞根各一兩半銼烏頭炮裂去皮臍一兩商陸一兩半銼生薑切焙四兩上六味㕮咀如麻豆清酒二升浸一宿曝乾復納酒中以酒盡為度曝乾搗羅為散空心溫酒調下一錢匕日再治風寒濕痹肢體腰膝冷痛𤸷痹動不相隨牛膝散方牛膝去苗酒浸切焙半兩桂去粗皮一分山茱萸半兩上三味搗羅為散每服二錢匕溫酒調下空心食前日再痹氣論曰內經謂人身非衣寒也中非有寒氣也寒從中生者何是人多痹氣也陽氣少陰氣多故身寒如從水中出夫陽虛生外寒陰盛生內寒人身陰陽偏勝則自生寒熱不必外傷於邪氣也痹氣內寒者以氣痹而血不能運陽虛而陰自勝也血凝泣而脈不通故其證身寒如從水中出也治陽氣虛陰氣盛痹氣內寒如從水中出溫補鹿茸丸方鹿茸去毛酥炙四兩人參天雄炮裂去皮臍五加皮銼五味子牛膝酒浸切焙防風去叉遠志去心石斛去根山芋狗脊去毛各一兩肉蓯蓉去皴皮酒浸切焙熟乾地黃焙各三兩白茯苓去黑皮菟絲子酒浸別搗各一兩一分覆盆子石龍芮各二兩萆薢石南蛇床子炒去皮白朮各三分巴戟天去心酒浸焙天門冬去心焙杜仲銼炒各一兩半乾薑炮裂桂去粗皮吳茱萸炒附子炮裂去皮臍細辛去苗葉蜀椒去目及閉口者炒出汗各三分上三十味除菟絲子別搗外搗羅為末再拌勻煉蜜丸如梧桐子大每服溫酒下二十丸稍加至三十丸空心食前日三治陽衰陰盛痹氣身寒補益巴戟天丸方巴戟天去心酒浸焙肉蓯蓉去皴皮酒浸切焙白龍骨五味子鹿茸去毛酥炙白茯苓去黑皮天雄炮裂去皮臍續斷山芋白石英各二兩覆盆子菟絲子酒浸別搗各三兩熟乾地黃焙二兩蛇床子炒去皮一兩遠志去心乾薑炮裂各一兩半上一十六味除菟絲子別搗外同搗羅為末入菟絲子拌勻再羅煉蜜丸如梧桐子大每服空心溫酒下二十丸加至三十丸日再治陰盛陽虛痹氣身寒如從水中出補益黃耆丸方黃耆銼鹿茸去毛酥炙白茯苓去黑皮烏頭炮裂去皮臍乾薑炮裂各三分桂去粗皮芎藭當歸切焙熟乾地黃焙各一兩白朮菟絲子酒浸一宿別搗五味子柏子仁枸杞根皮銼各一兩半大棗去核二十枚焙上一十五味除菟絲子別搗外同搗羅再拌勻煉蜜丸如梧桐子大每服空心溫酒下十五丸日三治陽虛陰盛痹氣身寒如從水中肉蓯蓉丸方肉蓯蓉去皴皮酒浸切焙天雄炮裂去皮臍石斛銼當歸切焙桂去粗皮各一兩蜀椒去目及閉口炒出汗牛膝銼酒浸焙陳橘皮湯浸去白乾薑炮裂各一兩半上九味搗羅為末煉蜜丸如梧桐子大每服三十丸空服食前溫酒下日三治陽虛陰盛痹氣身寒如從水中出天雄丸方天雄炮裂去皮臍烏頭炮裂去皮臍石龍芮王孫王不留行蜀椒去目及閉口者炒出汗各一兩肉蓯蓉去皴皮酒浸切焙當歸切焙天麻銼各二兩蛇床子炒半兩上一十味搗羅為末煉蜜丸如梧桐子大每服空心溫酒下三十丸日再治痹氣中寒陽虛陰盛身寒如水中出附子丸方附子炮裂去皮臍烏頭炮裂去皮臍桂去粗皮蜀椒去目及閉口者炒出汗菖蒲去須銼甘草炙各一兩天麻補骨脂炒白朮各二兩上九味搗羅為末煉蜜丸如梧桐子大每服空心溫酒下三十丸日再熱痹論曰內經云其熱者陽氣多陰氣少陽遭陰故為痹熱蓋腑臟壅熱復遇風寒濕三氣至客搏經絡留而不行陽遭其陰故𤸷痹熻然而熱悶也治熱痹肌肉熱極體上如鼠走唇口反壞皮膚色變兼治諸風石南散方石南葉灑醋微炒山芋各一兩黃耆銼三分天雄炮裂去皮臍一兩山茱萸一兩半桃花生用菊花未開者炒各三分真珠別研一分石膏別研升麻各一兩甘草炙銼三分葳蕤銼一兩丹砂一分別研仍與真珠石膏末一處同研極細上一十三味除別研外將十味搗羅為末次入所研者藥拌勻每服一錢匕空心溫酒調下日二夜一漸加至二錢匕治熱痹升麻湯方升麻射干甘草炙銼芎藭人參各二兩赤小豆炒三合生薑薄切焙麥門冬去心焙葳蕤各三兩上九味粗搗篩每服四錢匕以水二盞生地黃汁半合青竹葉十五片同煎至一盞半去滓溫服不拘時候治熱痹防風丸方防風去叉羌活去蘆頭茯神去木牛膝酒浸切焙桂去粗皮人參枳殼去瓤麩炒五加皮銼芍藥丹參薏苡仁玄參麥門冬去心焙生乾地黃焙以上各一兩磁石煅醋淬四兩檳榔銼二兩松子仁大黃銼炒木香各半兩上一十九味搗羅為末煉蜜和丸如梧桐子大每服溫酒下三十丸加至四十丸空心食前治熱痹升麻湯方升麻三兩茯神去木人參防風去叉犀角鎊羚羊角鎊羌活去蘆頭以上各二兩桂去粗皮半兩上八味粗搗篩每服四錢匕水一盞半生薑一塊拍碎竹瀝少許同煎取一盞去滓溫服不計時候治熱痹宜服生地黃湯方生地黃研取汁竹瀝荊瀝各一升羌活去蘆頭防風去叉各三兩附子一枚重者炮去皮臍別破之上六味除前三味外餘三味銼如麻豆每服三錢匕水一盞半地黃汁竹瀝荊瀝各少許同煎數沸去滓取一盞溫服不計時候
