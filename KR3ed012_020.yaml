body:
  text: 卷第二十筋痹論曰內經曰風寒濕三氣雜至合而為痹又曰以春遇此者為筋痹其狀拘急屈而不伸是也筋痹不已復感於邪內舍於肝是為肝痹其狀夜臥則驚飲多數小便上為引如懷蓋淫氣乏竭痹聚在肝治法以筋痹為先筋痹既平則邪弗入於肝矣治筋風四肢攣痹天麻丸方天麻二兩苦參三兩細辛去苗葉二兩菖蒲二兩牛膝去苗酒浸焙二兩赤箭二兩附子炮裂去皮臍一兩地榆二兩人參二兩芎藭一兩桂去粗皮一兩半木香一兩陳橘皮湯浸去白焙乾一兩半當歸切焙赤芍藥酸棗仁微炒威靈仙去土藁本去苗土防風去叉銼獨活去蘆頭各二兩上二十味搗羅為細末煉蜜和杵為丸如梧桐子大每服溫酒下二十丸日二服加至三十丸治筋痹以筋虛為風所傷故筋攣縮腰背不伸強直時痛牛膝湯方牛膝去苗酒浸銼焙防風去叉丹參前胡去蘆頭各二兩石斛去根二兩半杜仲去粗皮塗酥炙銼秦艽去苗土續斷各一兩半陳橘皮湯去白各一兩大麻仁研一合上一十味除大麻仁外粗搗篩每服五錢匕水一盞半煎五七沸別下麻仁末一錢匕煎至一盞去滓空腹服日二治筋痹肢體拘急不得伸展獨活散方獨活去蘆頭三兩附子炮裂去皮臍薏苡仁蒼耳防風去叉蔓荊實芎藭細辛去苗葉秦艽去苗土菖蒲各二兩上一十味搗羅為細散每服一錢匕空腹以溫酒調下日二治肝痹多驚悸神思不安茯神散方茯神去木酸棗仁微炒黃耆銼人參各一兩熟乾地黃焙遠志去心五味子各半兩白茯苓去黑皮一兩丹砂別研半兩上九味除丹砂外搗羅為散入丹砂末再研勻每服一錢匕以溫酒調下不計時候治肝痹兩脅下滿筋急不得太息疝瘕四逆搶心腹痛目不明補肝湯方白茯苓去黑皮一兩二錢烏頭四枚炮裂去皮臍蕤仁研柏子仁研防風去叉細辛去苗葉各二兩山茱萸桂去粗皮三分甘草炙銼半兩上九味銼如麻豆入研藥拌勻每服五錢匕水一盞半入大棗二枚劈開同煎數沸去滓取一盞服不計時治肝虛氣痹兩脅脹滿筋脈拘急不得喘息四肢少力眼目不明細辛湯方細辛去苗葉防風去叉白茯苓去黑皮柏子仁研桃仁湯浸去皮尖雙仁麩炒微黃山茱萸甘草炙銼各三分蔓荊實枳殼去瓤麩炒各半兩上九味粗搗篩每服三錢匕水一盞大棗三枚劈破同煎數沸去滓取七分溫服不計時候治肝痹頭目昏塞四肢不利胸膈虛煩防風湯方防風去叉一兩芎藭黃耆銼五味子人參茯神去木獨活去蘆頭羚羊角鎊屑前胡去蘆頭各三分細辛去苗葉酸棗仁微炒甘草炙各半兩上一十二味粗搗篩每服三錢匕水一盞大棗三枚劈破同煎取七分去滓溫服不計時候治筋痹多悲思顏色蒼白四肢不榮諸筋拘攣伸動縮急腹中轉痛五加皮酒方五加皮枳刺炒豬椒根皮各八兩丹參八兩桂去粗皮三兩當歸切焙三兩甘草炙天雄炮裂去皮臍秦椒去閉口及目炒出汗白蘚皮木通銼各四兩芎藭乾薑炮各五兩薏苡仁半升大麻仁三升上一十五味銼如麻豆大以夾絹囊盛貯清酒三斗漬之春夏三四宿秋冬六七宿初服二三合稍加以知為度骨痹論曰內經謂人有身寒湯火不能熱厚衣不能溫然不凍栗是人者素腎氣勝以水為事太陽氣衰腎脂枯不長一水不能勝兩火腎者水也而生於骨腎不榮則髓不能滿故寒甚至骨也所以不能凍栗者肝一陽也心二陽也腎孤臟也一水不能勝二火故不能凍栗病名曰骨痹是人當攣節也夫骨者腎之餘髓者精之所充也腎水流行則髓滿而骨強逮夫天癸虧而凝澀則腎脂不長腎脂不長則髓涸而氣不行骨乃痹而其證內寒也雖寒不為凍栗則以肝心二氣為陽火一水不能勝之特為骨寒而已外證當攣節則以髓少而筋燥故攣縮而急也補骨髓治寒濕肉蓯蓉丸方肉蓯蓉酒浸切焙一兩獺肝一具塗酥炙切柴胡去苗秦艽去苗土各三分巴戟天去心黃耆銼各一兩人參半兩白茯苓去黑皮三分熟乾地黃切焙半兩澤瀉附子炮裂去皮臍各三分遠志去心一兩山芋蒺藜子炒去角各半兩石斛去根三分厚朴去粗皮薑汁炙五味子桂去粗皮桃仁湯浸去皮尖雙仁炒別研丁香木香各半兩當歸切焙三分芍藥陳橘皮湯浸去白焙赤石脂檳榔白朮乾薑炮郁李仁湯浸去皮尖炒研甘草炙銼牡丹皮蜀椒去目並閉口者炒出汗山茱萸芎藭牡蠣炒各半兩上三十五味搗研為末再和勻煉蜜和杵數百下丸如梧桐子大每服溫酒下三十丸不拘時日三服治腎虛骨痹肌體羸瘦腰腳痠痛飲食無味小便滑數石斛丸方石斛去根牛膝酒浸切焙續斷各三分菟絲子酒浸別搗石龍芮炒桂去粗皮各一兩肉蓯蓉酒浸切焙三分鹿茸去毛酥炙一兩杜仲去粗皮炙銼白茯苓去黑皮熟乾地黃切焙各三分附子炮裂去皮臍一兩巴戟天去心半兩防風去叉三分桑螵蛸炙芎藭各半兩山茱萸三分覆盆子半兩補骨脂微炒蓽澄茄各三分五味子半兩澤瀉一兩沉香蘹香子微炒各三分薏苡仁炒一兩上二十五味搗羅為末煉蜜和杵數百下丸如梧桐子大每服空心以溫酒下三十丸日二服治腎虛骨痹面色萎黑足冷耳鳴四肢羸瘦腳膝緩弱小便滑數補腎熟乾地黃丸方熟乾地黃切焙肉蓯蓉酒浸切焙磁石煅醋淬各二兩山茱萸三分桂去粗皮附子炮裂去皮臍各一兩山芋三分牛膝酒浸切焙一兩石南白茯苓去黑皮澤瀉黃耆銼各三分鹿茸去毛酥炙二兩五味子三分石斛去根銼一兩覆盆子遠志去心各三分補骨脂微炒一兩萆薢銼巴戟天去心各三分杜仲去粗皮炙銼一兩菟絲子二兩酒浸別搗白龍骨一兩上二十三味搗羅為末煉蜜和杵數百下丸如梧桐子大每服空心以溫酒下三十丸日三服治腎臟中風寒濕成骨痹腰脊疼痛不得俯仰兩腳冷𤸷緩弱不遂頭昏耳聾語音渾濁四肢沉重附子獨活湯方附子炮裂去皮臍獨活去蘆頭各一兩防風去叉芎藭丹參萆薢菖蒲各半兩天麻桂去粗皮各一兩黃耆半兩當歸切焙一兩細辛去苗葉山茱萸白朮甘菊花牛膝酒浸切焙枳殼去瓤麩炒甘草炙銼各半兩上一十八味銼如麻豆每服三錢匕以水一盞生薑三片煎至七分去滓不計時候溫服治腎臟氣虛骨痹緩弱腰脊痠痛臍腹虛冷顏色不澤志意昏憒鹿茸天麻丸方鹿茸去毛酥炙二兩天麻一兩半附子炮裂去皮臍巴戟天去心菖蒲各一兩石斛去根銼一兩半乾蠍去土炒萆薢銼桂去粗皮牛膝酒浸切焙天雄炮裂去皮臍獨活去蘆頭丹參當歸切焙杜仲去粗皮炙銼各一兩肉蓯蓉酒浸切焙一兩半磁石煅醋淬細研水飛過一兩上一十七味搗羅為末煉蜜和勻搗三五百下丸如梧桐子大每服二十丸加至三十丸空心及晚食前以溫酒下治腎臟久虛骨疼腰痛足冷少食無力腎瀝湯方磁石煅醋淬二兩肉蓯蓉酒浸切焙黃耆人參白茯苓去黑皮芎藭桂去粗皮菖蒲當歸切焙熟乾地黃切焙石斛去根覆盆子乾薑炮附子炮裂去皮臍五味子各一兩上一十五味銼如麻豆每服三錢匕用羊腎一隻去脂膜先用水二盞煮腎取汁一盞去腎入藥末煎至七分去滓溫服空心日午夜臥共三服腸痹論曰內經曰腸痹者數飲而出不得中氣喘爭時發飧泄夫大腸者傳導之官其所以傳導者皆沖和之氣今風寒濕三氣乘虛客於腸間則邪留而和氣閉矣故其證數飲而出不得中氣喘爭時發飧泄大小腸氣痹水道不通故雖多飲而不得溲便並氣於大腸使糟粕不化故中氣喘爭時發飧泄也治腸痹寒濕內搏腹滿氣急大便飧泄吳茱萸散方吳茱萸湯洗焙乾炒半兩肉豆蔻仁乾薑炮甘草炙各半兩陳橘皮湯浸去白焙厚朴去粗皮生薑汁炙高良薑各二兩縮砂仁陳曲炒白朮各一兩上一十味搗羅為散每服一錢匕粥飲調下食前服治腸虛寒濕內攻腹痛飧泄草豆蔻散方草豆蔻陳橘皮湯浸去白焙各一兩桂去粗皮木香白朮當歸切焙白豆蔻仁丁香肉豆蔻仁高良薑各半兩上一十味搗羅為散每服一錢匕煎生薑棗湯調下食前服治腸痹腹滿喘爭小便不利大便飧泄赤茯苓丸方赤茯苓去黑皮白朮桂去粗皮各二兩木香訶黎勒煨去核陳橘皮湯浸去白焙厚朴去粗皮生薑汁炙各一兩上七味搗羅為末煉蜜和丸梧桐子大每服三十丸米飲下空心食前日二治腸痹飧泄腹脹氣痛飲食不化訶黎勒湯方訶黎勒煨用皮一兩半附子炮裂去皮臍一兩當歸切焙三分桔梗炒半兩肉豆蔻去殼三分木香半兩吳茱萸湯浸七遍焙乾微炒一分陳橘皮湯浸去白焙一兩甘草炙銼一分上九味粗搗篩每服三錢匕水一中盞入生薑半分棗二枚煎至七分去滓食前稍熱服治腸痹腹脹㽱痛時復飧泄食不消化木香丸方木香一兩訶黎勒煨用皮一兩半白朮一兩桂去粗皮一兩附子炮裂去皮臍二兩蕪荑微炒一兩高良薑銼一兩肉豆蔻去殼半兩厚朴去粗皮生薑汁炙過二兩乾薑炮三分甘草炙銼半兩上一十一味搗羅為末以曲末煮作糊和搗三二百杵丸如梧桐子大食前生薑棗湯下二十丸治腸痹飧泄腹脅脹滿訶黎勒丸方訶黎勒煨用皮一兩乾薑炮三分當歸銼微妙一兩黃連去須一兩白朮一兩木香三分厚朴去粗皮生薑汁炙一兩上七味搗羅為末煉蜜和搗三二百下丸如梧桐子大每服三十丸粥飲下不拘時候治腸痹腹脹飧泄小便不利木香散方木香三兩訶黎勒煨用皮半兩附子炮裂去皮臍一兩乾薑炮一兩厚朴去粗皮塗生薑汁炙二兩枳實去瓤麩炒一兩赤茯苓去黑皮一兩甘草炙銼半兩當歸銼微炒一兩上九味搗羅為細末每服二錢匕粥飲調下食前周痹論曰黃帝針經曰周痹者在於血脈之中隨脈以上隨脈以下不能左右各當其所夫風寒濕之為痹本痹而不通今乃能周身上下者以其邪中於血脈之間與脈流通隨氣上下升降無礙也故痛從上下者先刺其下以遏之後刺其上以脫之痛從下上者先刺其上以遏之後刺其下以脫之刺法附於針灸門外以藥治之治周痹身體痿弱不能行履巴戟天散方巴戟天去心半兩芎藭一分附子炮裂去皮臍三分白蘞一分黃耆炙銼桂去粗皮細辛去苗葉炒各半兩桔梗炒一兩人參半兩芍藥一分牡丹實天雄炮裂去皮臍各半兩肉蓯蓉酒浸切焙一分萆薢炒半兩赤茯苓去黑皮牛膝去苗酒浸切焙各一兩山芋菊花未開者微炒秦艽去苗土各半兩烏喙炮裂去皮臍遠志去心各一兩山茱萸黃芩去黑心白朮微炒石斛去根銼白礬研如粉各半兩五味子三分龍膽去苗土蜀椒去目並閉口炒汗出各一分厚朴去粗皮生薑汁炙銼半兩菖蒲九節者去須節先用米泔浸後切焙用一兩上三十一味除白礬別研外將三十味搗羅為末次入白礬末拌勻重羅每服半錢匕漸加至一錢匕溫酒調下日二夜一未覺身唇口痹熱即漸加至一錢半匕如覺大痹心煩以少許豉湯解之治周痹不仁遠志散方遠志去心黃耆炙銼各半兩芍藥一兩五味子黃芩去黑心各一分赤茯苓去黑皮牡荊實輕炒三分秦艽去苗土一兩烏頭炮裂去皮臍天雄炮裂去皮臍細辛去苗葉微炒山茱萸菊花未開者炒各半兩防風去叉三分狗脊去毛桂去粗皮芎藭蕪荑微炒各半兩菖蒲用米泔浸去節皮焙葳蕤去土及須焙各三分白蘞生用山芋附子炮裂去皮臍龍膽去苗土厚朴去粗皮生薑汁炙銼各半兩蜀椒去目並閉口炒出汗巴戟天去心各一分上二十七味搗羅為散每服一錢匕空心溫酒調下漸加至二錢匕日二夜一治周痹身體不仁黃芩湯方黃芩去黑心甘草炙銼防風去叉各半兩秦艽去苗土葛根銼杏仁去皮尖雙仁麩炒各一分桂去粗皮當歸切焙赤茯苓去黑皮各半兩上九味粗搗篩每服六錢匕以水酒各一盞棗二枚劈破生薑一棗大切同煎至一盞去滓溫服日