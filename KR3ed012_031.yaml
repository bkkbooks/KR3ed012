body:
  text: 卷第三十一傷寒後夾勞論曰傷寒瘥後復夾勞者由病人先有風疹因汗下之後營衛虛弱氣不復常形體羸瘦時有盜汗寒熱不常喘咳痰唾鼻中臭氣飲食不消肢體痠痛面黃頰赤不即治之則致危殆治傷寒後夾勞氣四肢無力脾虛胃弱飲食無味向晚潮熱手足心煩漸覺黃瘦木香丸方木香鱉甲去裙襴醋浸炙各一兩羌活去蘆頭三分柴胡去苗一兩半夏湯洗七遍去滑半兩桔梗炒知母焙陳橘皮湯浸去白炒各三分五味子秦艽去苗土天靈蓋酥炙各半兩桃仁湯浸去皮尖雙仁炒研如膏四兩上一十二味搗羅十一味為末與桃仁同研勻煉蜜和丸如梧桐子大每服空心米飲下二十丸晚再服治傷寒後夾勞肢體煩疼早晚虛熱口苦嗌乾夜臥多汗腳手麻痹及風勞等疾羌活散方羌活去蘆頭白朮黃耆銼青橘皮湯浸去白炒桔梗炒甘草炙附子炮裂去皮臍五加皮用茱萸半兩水一碗煎水盡焙乾去茱萸各一兩桂去粗皮乾薑炮各半兩上一十味搗羅為散每服二錢匕溫酒調下或用水一盞生薑三片棗一枚劈同煎至七分溫服不拘時治傷寒後夾勞骨節疼痛渾身壯熱氣力虛乏人參湯方人參桔梗炒白朮芍藥白茯苓去黑皮紫菀去苗土蘹香子炒各一兩秦艽去苗土三分甘草炙一兩半柴胡去苗陳橘皮湯浸去白焙蒼朮米泔浸洗切炒羌活去蘆頭各二兩上一十三味粗搗篩每服三錢匕水一盞生薑三片棗一枚劈同煎七分去滓溫服不拘時治傷寒後勞氣四肢煩痛日漸虛羸唇紅頰赤知母湯方知母焙半兩犀角屑地骨皮前胡去蘆頭白蘚皮柴胡去苗赤茯苓去黑皮人參黃耆銼各一兩上九味粗搗篩每服三錢匕水一盞生薑三片煎至七分去滓食後溫服治傷寒後骨蒸熱日漸黃瘦大便澀小便赤鱉甲湯方鱉甲去裙襴醋浸炙一兩知母切焙半兩大黃銼醋炒桑根白皮銼甘草炙銼各一分木香炒半兩上六味粗搗篩每服三錢匕水一盞童子小便三分蔥白三寸煎至七分去滓早晚食後溫服治傷寒溫病瘥後夾勞形體羸瘠或寒或熱如瘧狀四肢煩疼黃耆鱉甲湯方黃耆銼鱉甲去裙襴醋浸炙各一兩知母焙桑根白皮各半兩甘草炙銼陳橘皮湯浸去白炒白朮各三分上七味粗搗篩每服五錢匕水一盞半蔥白三寸生薑三片煎至一盞去滓食後溫服治傷寒後夾勞五心煩熱背膊疼痛手足無力不能飲食柴胡湯方柴胡去苗黃耆銼赤茯苓去黑皮各一兩秦艽去苗土地骨皮黃芩去黑心葛根銼枳殼去瓤麩炒各半兩人參甘草炙各三分鱉甲去裙襴醋浸炙一兩上一十一味粗搗篩每服三錢匕水一盞生薑三片煎至七分去滓不拘時溫服治傷寒後夾勞寒熱乍進乍退虎骨湯方虎頭骨塗酥炙知母焙各半兩甘草炙鱉甲去裙襴醋浸炙人參黃耆銼各一兩上六味粗搗篩每服三錢匕水一盞童子小便三分生薑三片蔥白三寸煎至七分去滓不拘時溫服治傷寒後夾勞寒熱往來進退不時頭痛體痛口苦咽乾不思飲食人參鱉甲湯方人參鱉甲去裙襴醋浸炙附子炮裂去皮臍柴胡去苗各一兩桃仁去皮尖雙仁炒芍藥知母焙桂去粗皮烏梅去核炒陳橘皮湯浸去白炒當歸切焙秦艽去苗土羌活去蘆頭五味子各半兩上一十四味銼如麻豆每服三錢匕水一盞生薑三片煎至七分去滓早晚食前溫服治傷寒瘥後夾勞四肢無力骨節煩疼不思飲食人參丸方人參前胡去蘆頭各一兩乾薑炮半兩鱉甲去裙襴醋浸炙桔梗銼炒甘草炙各三分上六味搗羅為末煉蜜和丸如梧桐子大每服二十丸生薑棗湯下不拘時服治傷寒後百節疼痛變為勞氣發熱盜汗前胡湯方前胡去蘆頭桔梗各一兩龍膽甘草炙各半兩柴胡去苗二兩烏梅去核炒一兩上六味粗搗篩每服三錢匕水一盞生薑二片同煎至七分去滓溫服不拘時治傷寒後夾勞羸瘦盜汗寒熱不常喘咳痰唾飲食減少當歸湯方當歸切焙代赭研黃連去須各三分桑根白皮銼焙桂去粗皮附子炮裂去皮臍陳橘皮湯浸去白焙黃芩去黑心各半兩白朮厚朴去粗皮生薑汁炙木通微炙銼地榆各一兩桃仁湯浸去皮尖雙仁麩炒二十枚上一十三味銼如麻豆每服五錢匕水一盞半煎至八分去滓溫服傷寒後勞復論曰內經謂熱病少愈食肉則復多食則遺此其禁也蓋傷寒病新瘥之後脾胃尚虛氣血猶弱穀氣未復津液未通若將養失宜輒嗜肉食則脾虛不能消釋或因勞形於事皆令邪熱乘虛還入經絡覆成大病故名勞復當隨其證候或表或里依法治之治傷寒差後因食勞復如初壯熱頭疼柴胡知母湯方柴胡去苗一兩知母焙三分鱉甲去裙襴醋炙一兩石膏搗碎一兩半雄鼠糞炒三七粒秦艽去苗土半兩上六味粗搗篩每服五錢匕水一盞半入豉一百粒同煎至八分去滓食後溫服治傷寒瘥後因飲食動作致勞復如初麻黃梔子湯方麻黃去節一兩山梔子半兩鱉甲去裙襴醋炙一兩雄鼠糞炒三七粒上四味粗搗篩每服五錢匕水一盞半入蔥白五寸豉一百粒同煎至八分去滓食後溫服良久吃蔥豉粥衣被蓋覆取汗治傷寒溫病瘥後或食肉或沐浴或嗔怒動作勞復三物湯方山梔子仁三七枚鱉甲去裙襴醋炙生乾地黃焙各一兩上三味㕮咀如麻豆大每服五錢匕水一盞半入豉一百粒同煎至八分去滓溫服食後日二治傷寒瘥後勞復壯熱頭痛六神湯方鱉甲去裙襴醋炙柴胡去苗人參知母焙黃連去須炒各一兩烏梅肉炒半兩上六味粗搗篩每服五錢匕水一盞半入生薑半分拍碎同煎至八分去滓食後溫服治傷寒新瘥後勞動用力或飲食過傷致勞復知母湯方知母焙鱉甲去裙襴醋炙柴胡去苗各一兩半麻黃去根節葛根銼焙各三分雄鼠糞炒令焦三七枚上六味粗搗篩每服五錢匕水一盞半入蔥白五寸豉一百粒同煎至八分去滓食後溫服服後吃少蔥粥取汗治傷寒溫病瘥後起早及飲食多致勞復紫蘇飲方紫蘇莖葉銼一兩生薑切半兩豉二合上三味用水二盞半煎至一大盞去滓食前分溫二服治傷寒後食肉勞復如初壯熱頭痛心煩欲吐小便赤黃石膏黃芩散方石膏碎一兩黃芩去黑心山梔子仁葛根銼焙知母焙人參黃連去須炒各半兩上七味搗羅為細散每服二錢匕濃煎蔥白竹葉湯調下空心食前日二服以瘥為度治傷寒天行病瘥後食勞加熱異功湯方雄鼠糞炒令煙出二七粒山梔子仁五枚枳殼去瓤麩炒一分上三味細銼用水一盞半煎至八分去滓食後溫服治傷寒後傷食食勞困絶者曲糵湯方陳曲搗碎炒一兩大麥糵炒半兩寒食乾飯半合雄鼠糞三七粒炒令煙盡為末上四味除鼠糞外略搗過拌令勻分作二服每服用水一盞半入蔥白五寸薤白五寸豉一百粒同煎至八分去滓入鼠糞末一半攪勻空心溫服治勞復小腹硬卵縮㽱痛欲死知母湯方知母焙柴胡去苗麥門冬去心焙甘草炙各半分蔥白三莖上五味㕮咀如麻豆大即以水一盞浸一宿次日煎令水欲盡下童子小便二盞豉半合煎五六沸下地黃汁二合更煎微沸去滓空腹頓服微利即瘥傷寒後骨節煩疼論曰傷寒後骨節煩疼者由津液不足血脈皆虛餘毒客於經絡營衛澀滯於骨節之間故令骨節煩疼也診三部脈細而遲澀者乃其候也治傷寒後毒氣未解四肢少力骨節煩疼心腹脹滿葛根湯方葛根銼生乾地黃焙羌活去蘆頭桂去粗皮芍藥芎藭麻黃去根節湯煮掠去沫陳橘皮湯浸去白焙木香各半兩甘草炙銼一分上一十味粗搗篩每服五錢匕水一盞半入生薑半分拍碎棗三枚劈破同煎至七分去滓空心溫服晚食前再服治傷寒後百節疼痛壯熱頭疼柴胡湯方柴胡去苗芍藥知母焙桃仁湯浸去皮尖雙仁炒黃木香山梔子仁升麻大青白芷黃芩去黑心各半兩細辛去苗葉甘草炙銼各一分石膏一兩上一十三味粗搗篩每服五錢匕水一盞半入生薑半分拍碎同煎至七分去滓食後溫服日三治傷寒後骨節疼痛咳嗽不能食口舌乾燥乍寒乍熱唇口生瘡柴胡飲方柴胡去苗升麻茯神去木芍藥犀角鎊百合地骨皮麥門冬去心焙黃芩去黑心人參各半兩鱉甲去裙襴醋炙石膏各一兩甘草炙銼一分上一十三味粗搗篩每服五錢匕水一盞半入生薑半分拍碎竹葉三七片同煎至七分去滓食後溫服日再治傷寒後壯熱骨肉疼痛頭重嘔噦芍藥湯方芍藥柴胡去苗赤茯苓去黑皮人參麥門冬去心焙藿香葉白芷各半兩生蘆根一兩甘草炙一分上九味銼如麻豆大每服五錢匕水一盞半入生薑半分拍碎同煎至七分去滓空心溫服晚食前再服治傷寒後四肢煩熱骨節疼痛百合湯方百合知母焙鱉甲去裙襴醋炙柴胡去苗葛根銼桑根白皮銼各一兩上六味粗搗篩每服五錢匕水一盞半煎至八分去滓入生地黃汁一合攪勻食後溫服日再治傷寒後骨節煩疼乍起眼暗氣衝胸背上氣滿急茯苓湯方白茯苓去黑皮柴胡去苗桔梗炒細辛去苗葉芍藥大腹皮各半兩枳殼去瓤麩炒陳橘皮湯浸去白焙各一兩杏仁湯浸去皮尖雙仁炒三分甘草炙一分上一十味粗搗篩每服五錢匕水一盞半入生薑半分拍碎同煎至八分去滓食後溫服日再治傷寒後骨節煩疼不欲食食即氣脹汗出補氣黃耆湯方黃耆銼芍藥桂去粗皮麥門冬去心焙五味子前胡去蘆頭白茯苓去黑皮當歸切焙人參各半兩甘草炙一分上一十味粗搗篩每服五錢匕水一盞半入生薑半分拍碎棗三枚劈破同煎至七分去滓溫服日三治傷寒後遍身骨節疼痛腳膝無力防風湯方防風去叉白朮附子炮裂去皮臍白蘚皮黃耆桂去粗皮薏苡仁各一兩上七味銼如麻豆每服三錢匕水一盞入生薑半分拍碎同煎至半盞去滓溫服日三治傷寒後下焦風虛骨髓痠痛腰腳頑痹不能久立日漸消瘦羌活湯方羌活去蘆頭防風去叉五加皮銼牛膝去苗酒浸切焙酸棗仁微炒丹參麻黃去根節湯煮掠去沫焙芍藥當歸切焙獨活去蘆頭檳榔銼玄參堅者木通銼各半兩桂去粗皮黃耆銼各三分上一十五味粗搗篩每服五錢匕水一盞半煎至七分去滓空心溫服日晚再服治傷寒熱毒氣攻腎腰背疼痛脊膂強急頭不痛左手尺脈浮微數續斷湯方續斷杜仲去粗皮炙銼麻黃去根節湯煮掠去沫焙羌活去蘆頭芎藭各一兩牽牛一分熟炒上六味粗搗篩每服三錢匕水一盞煎一二沸去滓空心服傷寒後餘熱論曰傷寒病後餘熱不解者蓋陰陽未和邪氣未盡流傳經絡蘊而生熱潮作如瘧鼻衄煩躁面赤目黃腹滿小便不利大便乾澀或即譫言渴欲得水脈沉數者當以里證求之若脈但浮者當消息治其外治傷寒後餘熱脈浮者麻黃湯方麻黃去根節煎掠去沫焙芍藥甘草炙令微赤銼各一兩桂去粗皮細辛去苗葉各半兩上五味粗搗篩每服五錢匕以水一盞半煎取八分去滓溫服日三治傷寒發汗熱已解半日許復發煩脈浮數者可更發汗桂枝湯方桂去粗皮芍藥各三分甘草二兩炙上三味㕮咀如麻豆大每服五錢匕水一盞半入生薑一棗大切棗二枚劈煎取一盞去滓溫服取汗為度治傷寒餘熱汗出如瘧狀日晡發熱脈實者可下宜大柴胡湯方柴胡去苗八兩黃芩去黑心三兩半夏生薑汁製焙乾二兩枳實去瓤麩炒四枚大黃二兩上五味㕮咀每服五錢匕水一盞半生薑半分切煎至八分去滓溫服以下利熱退為度治傷寒瘥後更發熱小柴胡主之脈浮者以汗解脈沉實或緊者以下解小柴胡湯方柴胡去苗四兩黃芩去黑心人參甘草炙各一兩半半夏二兩生薑汁製焙乾上五味㕮咀如麻豆大每服五錢匕水二盞入生薑半分切棗二枚劈煎取八分去滓不拘時溫服治傷寒及天行後頭痛餘熱不解葛根湯方葛根銼柴胡去苗各一兩麻黃去根節煎掠去沫焙三分芍藥黃芩去黑心甘草炙銼桂去粗皮