body:
  text: 卷第五十二腎臟風毒流注腰腳論曰腎臟風毒流注腰腳者其狀腰腳沉重筋脈拘急或作寒熱或為疼痛或發瘡瘍是也蓋腎主腰腳風邪客於腎經久而不去風毒流注發於下部故變腳弱之證治腎臟風毒氣流注腰腳虛腫疼痛或上攻頭目昏眩耳聾生瘡及腳氣上衝心頭迷悶腹肚堅硬冷汗出者羌活散方羌活去蘆頭一兩乾蠍炒三兩楝實銼炒一兩半硇砂飛煉成霜一分桃仁去皮尖雙仁炒研二兩附子炮裂去皮臍天麻白附子炮桂去粗皮檳榔銼芎藭地龍去土炒木香沉香各一兩阿魏用醋化面拌作餅子炙半兩上一十五味搗羅為散每服二錢匕溫酒調下治腎臟風毒腳弱少力腳重疼痹腳腫生瘡腳下隱痛不能蹈地腳膝筋攣不能屈伸腰膝拘急風毒流注等疾石南丸方石南葉薏苡仁杏仁去皮尖雙仁炒牽牛子炒大腹連皮銼芎藭芍藥赤小豆陳橘皮去白焙當歸切焙麻黃去根節各二兩五加皮銼牛膝酒浸切焙各三兩木瓜去瓤切焙獨活去蘆頭杜仲去粗皮銼炒萆薢各四兩上一十七味搗羅為末酒浸蒸餅丸如梧桐子大每服十丸至十五丸木瓜湯下早晨日午夜臥服治腎藏風毒注腳膝筋脈拘急行步艱難骨肉痠痛木瓜煎丸方木瓜去皮瓤切作片稱一斤半牛膝去苗酒潤切焙天麻銼乾蠍去土炒各一斤上四味除木瓜外搗羅為末先將木瓜以瓷器盛甑內蒸令爛並留蒸下汁一處候冷旋入汁沙盆內將木瓜研細為膏次將三味藥末入膏中同和勻更入煉蜜杵千百下丸如梧桐子大每服三十丸空心食前鹽酒或鹽湯下加至五十丸治腎臟風毒攻四肢頭面腰腳生瘡口苦舌乾形容黑瘦痰涎涕唾不時心下滿悶肢節怠惰狀如勞疾木香人參湯方木香人參黃耆銼防風去叉牛膝酒浸切焙甘草炙銼當歸切焙荊芥穗巴戟天去心半夏用薑汁製鱉甲去裙襴醋炙桂去粗皮白茯苓去黑皮秦艽去苗土柴胡去苗各半兩附子炮裂去皮臍羌活去蘆頭枳殼去瓤麩炒乾蠍全者炒肉豆蔻去殼熟乾地黃焙各三分上二十一味㕮咀如麻豆大每服三錢匕水一盞蔥白三寸切生薑三片同煎至七分臨熟入酒少許不吃酒即入童子小便少許去滓不拘時候溫服治腎臟風氣衝注腳膝生瘡蘹香子丸方蘹香子炒肉蓯蓉酒浸切焙附子炮裂去皮臍各二兩五味子一兩上四味細銼用好酒一升並豬腎一對細切和藥都一處浸一宿取出焙乾搗羅為末酒煮麵糊丸如梧桐子大每服二十丸至三十丸好茶或豆淋酒下治腎臟風虛耳鳴腰脊強直小便滑數桑螵蛸丸方桑螵蛸菖蒲山茱萸續斷五味子各三分磁石煅醋淬七遍杵細飛研二兩山芋一分肉蓯蓉酒浸一宿切焙萆薢沉香銼蘹香子炒附子炮裂去皮臍各一兩上一十二味搗羅為末煉蜜和丸如梧桐子大每服空心及晚食前溫酒下三十丸治腎臟風毒氣攻注四肢疼痛及瘡腫煩熱木瓜丸方木瓜切曝乾取二兩附子炮裂去皮臍一兩磁石煅醋淬二七遍研甘遂麩炒白牽牛炒羌活去蘆頭陳橘皮湯浸去白炒防己巴戟天去心蘹香子炒木香地龍炒乾薑炮乾蠍炒防風去叉各半兩上一十五味搗羅為末酒煮麵糊丸如梧桐子大空心溫酒下十五丸微利為效治腎臟風氣攻注腰腳腫痛八斤丸方附子炮裂去皮臍牛膝酒浸切焙天麻酒浸焙當歸切焙烏頭炮裂去皮臍白附子炮烏藥五靈脂各一斤上八味搗羅為末蒸木瓜與酒入藥一處杵一二千下丸如梧桐子大每服溫酒下二十丸至三十丸不拘時治腎臟風毒攻注腰腳生瘡四生丸方烏頭生去皮臍木鱉子去殼研狗脊去毛各半兩苦參一兩上四味搗羅為末爛研豬腎入少許麵糊和丸如梧桐子大每服二十丸溫酒下不拘時治腎臟風上攻頭面下注腳膝黃耆散方黃耆薄切羌活去蘆頭白附子炮蒺藜子炒去角蘹香子炒各一兩上五味搗羅為散每服二錢匕用羊腎一隻批破內入藥濕紙裹煻火煨令熟空心用溫酒嚼下治腎臟風毒攻注腰腳或瘡或腫或痛威靈仙散方威靈仙去苗土防風去叉芎藭何首烏去黑皮黃耆銼白附子炮白花蛇去皮骨酒炙蒺藜子炒去角白殭蠶炒晚蠶砂炒各半兩上一十味搗羅為散每服一錢匕溫酒調下早晨日午臨臥服治腎臟風毒上攻下注行步艱難四靈散方白附子炮牛膝酒浸一宿切焙巴戟天去心黃耆銼各一兩上四味搗羅為散每服用豶豬腎一隻批破去筋膜滲藥一錢匕並椒鹽蒔蘿各少許在內用濕紙裹煨熟為度早晨空心細嚼溫酒下治腎臟風攻注腰腳生瘡或虛腫熱痛行步不得黃耆丸方黃耆銼蘹香子炒烏頭炮裂去皮臍楝實銼炒烏藥防風去叉蒺藜子炒去角赤小豆地龍去土炒各一兩上九味搗羅為末酒煮麵糊丸如梧桐子大每服二十丸鹽湯或鹽酒下治腎臟風毒攻注四肢頭面生瘡遍身搔癢四白散方白花蛇酒浸一宿去皮骨炙白附子炮白殭蠶炒白蒺藜子炒去角各一兩上四味搗羅為散每服二錢匕早晚食前溫酒調下治腎臟風上攻下注頭面腫癢腳膝生瘡防風散方防風去叉黃耆銼旋覆花枳殼去瓤麩炒羌活去蘆頭獨活去蘆頭枇杷葉炙去毛蒺藜子炒去角各一兩上八味搗羅為散每服二錢匕空心晚食前溫酒調下治腎臟風毒氣攻注腰腳或瘡或腫臍腹冷痛豬肚丸方豶豬肚一個淨洗蒔蘿炒硫黃研附子炮裂去皮臍各一兩硇砂半兩上五味除豬肚外搗研為末入盡藥末於豬肚內用線密縫酒煮令爛候酒盡將豬肚切開入木臼中熟搗一二千下候可丸即丸如梧桐子大空心溫酒下三十丸治腎臟風毒流注腰腳疼痛筋脈拘急起動艱難萆薢散方萆薢杜仲去粗皮炙微黃銼牛膝去苗五加皮檳榔當歸去蘆頭洗銼焙酸棗仁防風去蘆頭肉桂去皴皮附子炮裂去皮臍獨活海桐皮羚羊角屑木香枳殼各一兩麩炒黃去瓤上一十五味搗篩為散每服四錢匕以水一中盞入生薑半分煎至六分去滓溫服日三夜一治腎經不足風冷乘之腰痛如折或引背膂俯仰不利轉側艱難或因役用力過多勞傷於腎或因寢臥冷濕地氣傷於腰或因墜墮傷損或因風寒客搏背冷腰痛威靈仙丸方威靈仙去土一兩桂去粗皮當歸去土並蘆頭洗淨銼焙乾白附子炮地龍去土炒赤小豆羌活去蘆頭各半兩上七味搗羅為末酒煮麵糊丸如梧桐子大每服二十丸空心鹽酒或鹽湯下治腎臟風毒上攻壅悶下注沉重乳香丸方乳香研一兩烏頭炮裂去臍皮二兩威靈仙去土一兩上三味搗研為末酒煮麵糊丸如梧桐子大每服二十丸溫酒下早晚服治腎藏風攻注腰腳熱痛或生瘡七聖丸方威靈仙去土烏頭炮裂去皮臍烏藥銼蘹香子炒蜀椒去子併合口者炒地龍去土炒赤小豆各一兩上七味搗羅為末酒煮麵糊丸如梧桐子大每服二十丸空心鹽湯或鹽酒下日晚再服治腎藏風攻注遍體生瘡皮膚搔癢白花蛇散方白花蛇去皮骨酒炙獨活去蘆頭丹參蔓荊實蒺藜子炒去角玄參苦參秦艽去苗土山芋甘草炙銼防風去叉菊花附子炮裂去皮臍天麻牛膝酒浸切焙各半兩上一十五味搗羅為散每服二錢匕溫酒調下治腎藏風下注多生熱瘡或頭目虛腫日漸瘦劣補元散方牛膝酒浸切焙地龍去土炒海桐皮細銼羌活去蘆頭當歸切焙白芷芎藭白附子炮附子炮裂去皮臍巴戟天去心各一兩上一十味搗羅為散每服一錢匕用豶豬腎批開入藥末外更入鹽椒少許煨熟空心細嚼用酒咽下治腎臟虛風上攻頭面耳內生瘡及腰腳重痛燒腎散方磁石煅醋淬七遍細研水飛過附子炮裂去皮臍巴戟天去心蜀椒去目及閉口者炒出汗各一兩上四味搗羅為散每服用豶豬腎一隻去筋膜薄切入蔥白薤白鹽花各少許藥末二錢匕濕紙裹煻灰火內煨熟空心細嚼溫酒咽下治腎臟風虛藏氣不足腰疼耳鳴肢體不遂煩倦無力羚羊角湯方羚羊角鎊鹿茸去毛酒浸炙各三兩五加皮銼茯神去木各二兩酸棗仁炒枳實去瓤麩炒熟乾地黃焙各一兩半上七味粗搗篩每服三錢匕先以水三盞煮羊腎一隻取汁至一盞半去腎下藥再煎至一盞去滓空心溫服治腎臟風毒下注及五勞七傷遍身疼痛兼女人血風勞緩弱四聖丸方烏頭去皮臍地龍去皮赤小豆烏藥各一兩上四味並生搗羅為末醋煮麵糊丸如小豆大每服二十丸鹽湯下治腎臟風攻注生瘡兼療諸般惡瘡止痛生肉檳榔散方檳榔銼一枚甘草生銼黃連去須密陀僧燒各半兩木香一分上五味搗羅為末先以溫鹽漿水洗瘡搵干以津唾調敷治腎藏風虛元氣衰憊膀胱冷痹腰胯注痛腳膝無力內補丸方狼毒濕紙裹煨二兩天麻酒浸炙一兩半附子炮裂去皮臍二兩巴戟天去心一兩半鹿茸酥塗炙去毛二兩補骨脂微炒一兩半石斛去根一兩半乾蠍全者炒一兩萆薢一兩半肉蓯蓉酒浸去皮炙一兩半蒺藜子炒去角一兩天雄炮裂去皮臍一兩獨活去蘆頭一兩乾漆熬煙出一兩沒藥一兩半研桂去粗皮一兩半膃肭臍細銼搗篩為末四兩用酒五升煎成煎上一十七味除膃肭臍外搗羅為細末研令勻用膃肭臍煎搜和為丸或入少煉蜜丸如梧桐子大每服三十丸空心溫酒或鹽湯下治腎藏風虛腰膝疼痛陰痿緩弱言語混濁呼吸短氣安息香丸方安息香四兩銼細入胡桃瓤四枚酒五升半同浸一宿來日漉出入沙盆研如糊用前酒調攪濾去滓入銚子內煎成煎磁石醋淬一兩沉香三分銼肉蓯蓉酒浸去皴皮炙一兩巴戟天去心一兩桂去粗皮三分萆薢三分附子炮裂去皮臍一兩酸棗仁三分蒺藜子炒去角補骨脂微炒各一兩鹿茸酥炙去毛三分桃仁湯去皮尖雙仁炒天麻酒炙各一兩上一十四味以十二味搗羅為末研桃仁同和勻入安息香煎搜為丸如梧桐子大每服三十丸鹽湯下治腎藏風毒流注腰腳疼痛威靈仙丸方威靈仙去苗土四兩牛膝去苗銼一斤天麻銼半斤巴戟天去心四兩以上四味用好酒二斗浸兩宿焙肉蓯蓉二斤洗切以前浸藥酒銀石器慢火熬成膏何首烏一斤米泔浸軟片切於黑豆中蒸爛為度焙乾石斛去根四兩海桐皮銼半斤上八味除蓯蓉外焙乾搗羅為末用蓯蓉膏和搗千杵丸如梧桐子大每服二十丸至三十丸空腹溫酒下不嚼日三性溫無毒久服大治風調營衛順三焦烏髭鬢治肝腎氣虛風邪攻注筋骨緩弱機關不利威靈仙丸方威靈仙去土藿香葉自然銅煨赤醋淬附子炮裂去皮臍狗脊去毛萆薢漏蘆去蘆頭肉蓯蓉酒浸去皴皮焙骨碎補去毛牛膝去苗酒浸一宿焙木鱉子去殼防風去叉地龍去土炒上一十三味等分搗羅為細末酒煮麵糊和丸如梧桐子大每服十五丸加至二十丸荊芥湯下木瓜酒亦得治腎氣發動攻腰腿四肢疼痛暖腎散方蓽澄茄蜀椒去目及合口者炒出汗乾薑炮各半兩附子炮裂去皮臍桃仁去皮尖雙仁炒黃蘹香子炒桂去粗皮蒺藜子炒枳殼去瓤麩炒澤瀉檳榔銼各三分上一十一味搗羅為散空心溫酒調下三錢匕日再服治腎氣發動上攻下注木香散方青木香蘹香子炒桃仁去皮尖雙仁炒令黃各半兩丁香蜀椒去目及合口者炒出汗各一分蒺藜子陳橘皮去白焙檳榔銼各三分上八味搗羅為散空心溫酒調下四錢匕腎臟積冷氣攻心腹疼痛論曰腎藏積冷氣攻心腹疼痛者腎虛冷之氣久積於內陽氣不足其經厥逆上干心絡與正氣交擊故令心腹疼痛也治腎藏虛積冷氣攻心腹疼痛及膀胱氣痛鹿茸丸方鹿茸酒浸炙去毛肉蓯蓉酒浸切焙各二兩人參補骨脂炒石斛去根木香白朮炒厚朴去粗皮生薑汁炙牛膝去苗切酒浸焙續斷蘹香子炒當歸切炒芎藭附子炮裂去皮臍熟乾地黃焙桂去粗皮澤瀉蓽澄茄檳榔銼陳橘皮去白焙桃仁去皮尖雙仁炒巴戟天去心五味子各一兩赤石脂研龍骨研蜀椒去目及合口者炒出