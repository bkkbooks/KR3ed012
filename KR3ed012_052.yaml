苓去黑皮熟乾地黃人參杜仲銼炒盡絲天雄炮裂去皮臍菟絲子酒浸一宿別搗為末各一兩上一十味搗羅為末煉蜜為丸梧桐子大空心日午夜臥溫酒下二十丸至三十丸治腎氣虛損羸瘦飲食不為肌膚骨痿無力腰腳痠痛肉蓯蓉丸方肉蓯蓉酒浸一宿切焙石斛去根磁石火煅醋淬二七遍鹿茸酥炙桂去粗皮巴戟天去心杜仲銼炒盡絲木香覆盆子去莖各一兩上九味搗羅為末煉蜜為丸梧桐子大每服二十丸至三十丸溫酒上鹽湯亦得空心日午臨臥各一治腎臟久虛體瘦骨痿腰腳痠疼臍腹冷痛飲食無味行坐少力夜多夢泄耳內蟬鳴巴戟天丸方巴戟天去心補骨脂炒蘹香子炒各半兩附子去皮臍銼鹽炒一兩上四味搗羅為末用酒熬一半成膏留一半拌和丸如梧桐子大每服二十丸空心食前鹽湯下治腎臟虛損骨痿羸瘦行坐無力短氣不足腰背相引疼痛石鐘乳丸方石鐘乳依法別研為粉菟絲子酒浸別搗為末五味子炒蛇床子洗焙黃耆銼續斷萆薢烏蛇炮裂去皮臍各一兩上八味搗羅為末酒煮麵糊為丸如梧桐子大每服二十丸溫酒下空心日午夜臥服治腎臟虛損精髓枯竭形體瘦瘁骨痿弱晝夜掣痛腰膝冷痹耳內虛聲強直不任轉側菟絲子丸方菟絲子酒浸三日濕搗焙乾肉蓯蓉淨洗酒浸一宿切焙天雄炮裂水浸少時去皮臍各二兩骨碎補去毛一兩銼以鹽半兩同炒令黃去鹽不用薏苡仁炒地龍去土焙乾各一兩石硫黃研半兩上七味搗羅為末酒煮麵糊丸如梧桐之大空心溫酒或鹽湯下二十丸加至三十丸治腎臟虛損肌體羸瘦骨痿無力腰腳痠疼小便濃濁熟乾地黃丸方熟乾地黃焙二兩山茱萸山芋白茯苓去黑皮石斛去根桂去粗皮附子炮裂去皮臍牛膝去苗酒浸焙巴戟天去心五味子炒澤瀉黃耆銼天門冬去心焙柏子仁別研為膏鹿角膠炒菟絲子酒浸別搗為末各一兩肉蓯蓉酒浸切焙二兩上一十七味搗研為末煉蜜為丸如梧桐子大每服三十丸溫酒下治腎臟傷憊腰膝無力形瘦骨痿頭目昏沉時忽旋暈項背疼痛不得俯仰鹿茸丸方鹿茸去毛塗酥炙脆天雄炮裂冷水浸去皮臍白附子大者炮鹿髓去膜別研如膏後入各一兩膃肭臍一對薄切塗鹽炙香上五味搗羅四味為末與鹿髓同研和令勻入煉蜜和丸如梧桐子大溫酒下三十丸日三兩服治腎氣虛損骨痿體瘦無力兩耳䐜䐜鳴甚即成聾短氣不足石斛飲方石斛去根當歸切焙人參肉蓯蓉酒浸一宿切焙附子炮裂去皮臍芎藭桂去粗皮各半兩白茯苓去黑皮熟乾地黃焙白朮米泔浸一宿銼炒令黃桑螵蛸切破炙黃磁石火煅醋淬二七遍各一兩羊腎一對批去筋膜炙令黃上一十三味㕮咀如麻豆每服三錢匕水一盞煎至七分去滓溫服不拘時候治腎臟積冷虛損氣乏羸劣補腎丸方肉蓯蓉酒浸焙三兩黃耆炙銼附子炮裂去皮臍澤瀉巴戟天去心各二兩枳殼去瓤麩炒桃仁去皮尖雙仁炒黃蒺藜子炒去角白朮牡蠣煅過研細牛膝酒浸切焙菟絲子酒浸搗焙乾薑炮蜀椒去目及合口者炒出汗檳榔銼桂去粗皮陳橘皮去白焙各一兩五味子炒一兩半上一十八味搗羅為末煉蜜和丸如梧桐子大空心溫酒下三十丸治腎臟虛損耳作蟬鳴腹痛腰疼補腎湯方黃耆炙銼一兩半人參白茯苓去黑皮獨活去蘆頭芎藭當歸切焙芍藥白朮銼炒蒺藜子炒去角附子炮裂去皮臍澤瀉各一兩蜀椒去目及合口者炒出汗二兩上一十二味銼如麻豆每服五錢匕以水二盞先煎羊腎一隻至一盞半入藥煎取八分去滓空心頓服治腎臟虛損小便多腿脛無力日漸羸瘦名曰消腎肉蓯蓉丸方肉蓯蓉去皴皮酒炙附子炮裂去臍皮白蒺藜炒去角桑螵蛸炒各二兩五味子炒龍骨研各一兩黃耆銼炒菟絲粉石斛去根各一兩半上九味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心鹽湯下
