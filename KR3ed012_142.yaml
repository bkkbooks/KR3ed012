body:
  text: 卷第一百四十二脈痔論曰脈痔者臟腑蘊積風熱不得宣通也風熱之氣乘虛流注下部故肛邊生瘡癢痛血出也蓋實為痛虛為癢今實熱乘虛下攻肛腸故癢且痛又脈者血之腑得熱則妄行故血乃出也治脈痔生瘡下血癢痛槐莢煎丸方槐莢一斤淨洗並子爛研入水半升同研捩取汁白蜜二兩與槐莢汁同熬成膏枳殼去瓤麩炒一兩黃耆銼防風去叉各半兩杏仁湯去皮尖雙仁麩炒研入皂莢子炮去皮各三分上七味除前膏並杏仁外搗羅為末與杏仁和勻以槐莢膏再和杵二三百下丸如梧桐子大每服二十丸清米飲下早晚食前服治脈痔下血大腸腫癢大聖散方枳殼十四枚胡桃十枚荊芥穗木賊炒各一兩延胡索半兩上五味將枳殼胡桃同入藏瓶內用泥固濟燒存性搗後三味為細末再同研勻每服二錢匕米飲調下治脈痔有蟲時或癢痛血不止姜附湯方生薑艾葉各半兩附子炮裂去皮臍枳殼去瓤麩炒各三分生地黃一兩半上五味銼如麻豆大每服五錢匕水一盞半煎至一盞去滓早晚食前溫服治脈痔下部癢痛生瘡血出阿膠湯方阿膠炒艾葉當歸切焙青葙子各一兩上四味粗搗篩每服五錢匕水一盞半煎至一盞去滓早晚食前溫服治脈痔癢痛下血不止樗根散方樗根皮洗切枳殼去瓤麩炒各三兩皂莢子取仁炒二兩上三味搗羅為散每服二錢匕溫米飲調下早晚食前服治脈痔肛邊生瘡癢痛殺蟲散方獺皮上一味燒灰細研空心米飲調下二錢匕日晚再服治脈痔下部癢痛成瘡塗痔槐白皮膏方槐白皮五兩赤小豆五合楝實槐實各五十枚當歸切焙三兩白芷甘草各二兩豬脂三斤上八味銼細七味先煎脂令沸下諸藥同煎候白芷黃赤色綿絞去滓瓷合盛每用塗摩瘡上日三五次治脈痔生瘡癢痛下部如蟲齧熏痔湯方苦桃皮李根皮萹蓄苦參各一兩上四味銼碎以水六升煎至四升去滓乘熱熏洗日三五次治脈痔下部癢痛四沿腫起出血拓痔大豆帛方大豆三升甘草一兩槐白皮三兩上三味除豆外細銼先以水一斗入豆煎汁至二升去豆次下甘草槐皮同煎至一升去滓浸故帛三四重拓下部冷即再暖日三五次治脈痔下部如蟲齧納下部露蜂房散方露蜂房生螺靨各一兩上二味燒灰細研為末以綿裹二錢匕納下部中日晚再易治脈痔有蟲或下膿血熏痔槐白皮湯方槐白皮二斤上一味細銼以水一斗五升煎至一斗去滓傾盆中坐熏冷即再暖蟲當隨便利自出更搗槐白皮末綿裹一錢納下部中治脈痔下部如蟲齧出蟲方桃葉一稱搗研上一味蒸令熱納小口器中布覆熏之蟲即出治脈痔下部如蟲齧癢痛出血滌痔散方白礬末半兩上一味取小便三升入礬末乘熱洗之治脈痔下部如蟲齧敷痔蝟皮散方蝟皮上一味燒灰研為末每用少許生油調敷之血痔論曰血痔者肺熱流毒也肺與大腸為表裡今肺臟蘊熱毒氣流滲入於大腸血性得熱則流散故因便而肛腸重痛清血隨出也治血痔蝟皮散方蝟皮燒灰存性黃耆銼熟乾地黃焙續斷柏葉地榆銼白芷黃連去須各一分上八味搗羅為散每服二錢匕食前溫湯調下治血痔清血隨大便出雷丸丸方雷丸三兩紫參秦艽去苗土藁本去苗土石南葉白芷䗪蟲炒厚朴去粗皮薑汁炙亂髮燒灰貫衆紫菀虻蟲去翅足炒各半兩豬後懸蹄殼炙令焦十四枚上一十三味搗羅為末煉羊髓為丸如梧桐子大空心米飲下十五丸至二十丸日晚再服以瘥為度治血痔因便清血隨出者槐莢子丸方槐莢子麩炒二兩枳殼去瓤麩炒威靈仙去土各一兩乾薑炮白礬燒令汁盡各半兩熟乾地黃焙連翹當歸切焙陳橘皮湯浸去白焙各一兩附子炮裂去皮臍續斷各半兩上一十一味搗羅為末煉蜜丸如梧桐子大陳米飲下十丸至二十丸食前服治痔下血地榆湯方地榆艾葉枳殼去瓤麩炒黃耆銼防風去叉龍骨桑耳各一兩半上七味粗搗篩每服五錢匕水二盞入生地黃一分拍碎同煎至八分去滓空心溫服日晚再服治諸痔下血虛損甚者黃耆湯方黃耆銼一兩當歸切焙芎藭各一兩半龍骨半兩芍藥桂去粗皮各二兩附子炮裂去皮臍甘草炙各一兩上八味銼如麻豆每服五錢匕水一盞半入沙糖半分煎至七分去滓空心溫服日晚再服治諸痔下血蒲黃湯方蒲黃當歸切焙白芷白石脂黃連去須芎藭生乾地黃焙甘草炙各一兩上八味粗搗篩每服五錢匕水一盞半煎至八分去滓空心溫服日晚再服治血痔出膿血及腸風痔瘻比金丸方密陀僧白礬槐實炒為末皂莢燒灰研各一兩上四味將密陀僧白礬搗碎入瓷罐內燒通赤放冷取出搗細為末次入槐實末皂莢灰和勻用糯米飯丸如梧桐子大每服十五丸空心食前米飲下治血痔下血至多赤石脂丸方赤石脂白礬燒令汁盡龍骨各一兩半杏仁湯浸去皮尖雙仁炒研一百枚上四味搗羅為末煉蜜丸如梧桐子大空心棗湯下二十丸日再以差為度治血痔下血黃耆散方黃耆銼枳殼去瓤麩炒各三兩防風去叉一兩半上三味搗羅為散每服二錢匕空心米飲調下日晚再服治痔疾下血枳實散方枳實麩炒槐實炒木賊各半兩上三味搗羅為散每服二錢匕煎皂莢子湯調下不計時候治血痔何首烏丸方何首烏去黑皮威靈仙去苗土枳殼去瓤麩炒等分上三味搗羅為末浸蒸餅丸如梧桐子大每服二十丸溫水下早晚食前服治痔疾下血鹿角丸方鹿角一兩燒紅候冷研蕓薹子炒研半兩上二味搗研為末醋煮麵糊丸如梧桐子大每服十五丸飯飲下溫酒亦得食前服治痔疾下血荊芥散方荊芥穗陳者狗脊去毛銼各一兩上二味搗羅為末每服二錢匕濃煎木賊湯調下若瀉血甚者加酸石榴皮等分為散以淡醋湯調下不拘時服治痔下血黃連散方黃連去須陳曲炙各二兩上二味搗羅為散每服二錢匕用蜜湯空心調下晚再服治血痔地榆散方地榆銼上一味搗羅為散每服二錢匕飯飲調下日三服治血痔便清血熏痔方蝟皮細銼雄黃熟艾各半兩上三味略搗碎先掘地作一坑納藥以炭火燒煙出當上坐熏患處以衣被圍身勿令煙出煙盡即止將息三日再熏不過三五度瘥治血痔坐痔橘皮散方陳橘皮二斤三五年者細搗炒令熱上一味乘熱用絹袋二枚盛橘皮縛定更互坐上冷即易取瘥為度治血痔淋洗桃根湯方桃根半斤上一味細銼用水一斗煎至五升去滓溫洗日三五度治血痔風冷積年難瘥洗痔稻藁洗方稻藁上一味燒灰以湯淋汁洗下部日三五遍取瘥為度治五痔大腸下血烏蛇散方烏蛇酒浸去皮骨炙令黃枳殼去瓤麩炒天麻槐實微炒黃耆炙銼桑黃酒浸炙令赤各一兩桂去粗皮當歸切焙附子炮裂去皮臍赤芍藥各三分白礬燒過蝟皮炙令焦各半兩麝香細研二錢上一十三味搗羅十二味為散入麝香研令勻每服三錢匕空心用陳米飲調下日再溫酒亦得腸痔論曰腸痔者以腸胃有風挾熱二者乘虛入於腸間沖發下部故令肛邊生核腫痛不消病始作令人寒熱時有血出也治腸痔生核腫痛時下膿血蝟皮散方蝟皮炙焦一枚榮實薔薇根是也枳殼去瓤麩炒黃耆銼焙槐豆炒桑耳微炙各一兩人參地榆銼炒當歸切焙烏賊魚骨炙去甲各一兩半上一十味搗羅為散空心煎木賊湯調下三錢匕日晚再服以瘥為度治腸痔腫痛生核或發寒熱枳殼湯方枳殼去瓤麩炒一兩黃耆銼二兩芎藭丹參當歸切焙檳榔銼各一兩半芍藥黃芩去黑心各一兩一分上八味粗搗篩每服五錢匕以水一盞半煎至八分去滓空心食前溫服治腸痔鱉甲散方鱉甲醋炙去裙襴蝟皮炙焦蛇蛻皮銼炒令焦露蜂房銼炒令焦豬懸蹄殼炙焦各半兩上五味搗羅為散每服二錢匕空心以井華水調下日晚再服兼取少許敷瘡上以差為度治腸痔每大便常有血礬附丸方白礬熬令汁枯附子炮裂去皮臍各一兩上二味搗研為末煉蜜和丸梧桐子大每服五丸溫酒下日三服稍增至十丸數日永差治腸痔下血痛腫威靈仙散方威靈仙去土四兩防風去叉二兩枳殼去瓤麩炒黃耆銼各半兩上四味搗羅為散每服二錢匕麝香熱米飲調下日可二服不拘時候常服祛風氣避溫疫消腫滿除五痔等患治腸痔有血方白薔薇根枸杞根曝乾各半兩上二味搗羅為散每服二錢匕溫水調下日三服治腸痔下部腫痛便血後重坐臥不安榓藤子丸方榓藤子半兩威靈仙揀淨銼碎水淘洗過焙乾大黃煨過各二兩上三味搗羅為末煉蜜和丸如梧桐子大每服三十丸溫米飲下空心食前服治腸痔腫痛時有膿血柏葉丸方柏葉烏梅肉曝乾各一兩皂莢一梃去皮並子水浸透搗研取汁上三味除皂莢外搗為末將皂莢汁和丸如梧桐子大每服十丸溫熟水下食前服之治腸痔肛邊腫痛生核下血龍參丸方地龍乾者一兩苦參一兩烏頭去皮臍半兩半生半炮上三味為末以醋糊為丸緑豆大每服七丸至十丸食前米飲下日三治腸痔下部生核腫痛發寒熱出血地榆散方地榆甘草半炙半生陳槐花半炒半生各一兩上三味為散每服二錢匕濃煎枳殼桑根白皮湯調下空心食前服治腸痔下血栝蔞散方栝蔞實大好者一個烏梅肉十個上二味先將栝蔞切下蓋少取瓤以烏梅肉實其中卻蓋定用黃泥固濟候泥干以火煅存性取出去泥細研為散每服二錢匕空心溫酒調下治腸痔下血枳實丸方枳實五兩去瓤麩炒搗為末煉蜜和丸如彈子大皂莢刺燒存性為末三兩上二味每服以水一盞用藥一丸皂莢刺末一錢半同煎至七分入麝香少許放溫服治腸痔生核腫痛發歇不定又名風痔者水梅丸方白殭蠶銼炒微黃二兩上一味為末用水梅肉和丸如梧桐子大每服蜜湯下五丸空心食前服治腸痔肛邊有核痛發寒熱生瘡妙應膏方豬懸蹄殼五枚生梧桐白皮四兩龍膽二兩生桑根白皮半兩蛇蛻皮雄黃研各一兩生青竹皮生柏皮各二兩露蜂房一兩蜀椒去目併合口者炒出汗三分蝟皮附子各一兩杏仁去皮尖雙仁二十枚豬脂一斤上一十四味除雄黃脂外銼碎以醋一升拌一宿先熬脂令沸即下諸藥候桑皮赤黑色以綿絞去滓再煎下雄黃以柳篦攪令勻於瓷合內盛每日空心溫酒調服一棗許日晚再服更取棗核大用綿裹納下部日再換以瘥為度治腸痔淋洗二皮湯方桃皮李皮萹蓄苦參各一兩上四味銼碎以水一斗煮取五升去滓熏洗候冷即止日再用治腸痔生核腫痛熏洗方荊芥穗黑狗脊鯪鯉甲枳殼去瓤麩炒上四味等分為粗末每用一兩以水二升煎數沸去滓乘熱熏候通手淋洗治腸痔腫核疼痛不可忍尉痔枳殼散方枳殼去瓤麩炒四兩訶黎勒皮二兩上二味搗羅為散銚子內炒令熱以帛裹熱尉冷即再炒治腸痔腫痛初覺生核熏之方荊芥穗甘草銼上二味等分為粗末每用兩大匙水一升半煎取一升去滓乘熱熏之候通手淋洗避風蓋復治腸痔方胡粉水銀各一分上二味同研勻以棗肉和得所綿裹納下部中治久積虛冷腸風痔瘻面色萎黃日漸羸瘦虛劣等疾白朮丸方白朮厚朴去粗皮生薑汁炙各三兩陳橘皮湯浸去白焙乾薑炮黃耆銼各一兩半人參甘草炙當歸切焙各一兩上八味搗羅為末煉蜜和丸如梧桐子大空心米飲下十五丸至二十丸治腸風痔疾及風祕疼痛等積年不瘥黃耆地黃丸方黃耆銼生乾地黃焙厚朴去粗皮生薑汁炙各二兩乾薑炮當歸焙各一兩大黃一兩半上六味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心米飲下治腸痔下血如注水久不差方上用市河水每遇更衣罷便冷沃之久沃為佳久患者皆瘥無河水井水亦得氣痔論曰氣痔者因便下血或肛頭腫凸良久乃收風也此由邪毒氣蘊積腸間及恚怒不節酒食過傷令下部氣澀壅結而成治腸風下血及脫肛等疾久不瘥者栝蔞丸方栝蔞大者二枚蝟皮大者二枚以上二味盛於瓶內燒令存性白礬緑礬二味各於火上枯盡汁研細訶黎勒皮炮枳殼去瓤麩炒白附子半夏湯洗去滑生薑同杵爛捏作餅曝乾附子炮裂去皮臍各一兩雞冠花五兩胡桃去皮大者一十五枚瓶內燒存性天南星炮一兩上一十二味搗羅為末以米醋煮麵糊和丸梧桐子大每服二十丸米飲下日三治氣痔大便祕澀下血脫肛烏蛇黃耆丸方烏蛇酒浸炙取肉五兩黃耆一兩半大黃銼炒大麻子仁炒各二兩獨活去蘆頭枳殼去瓤麩炒人參地骨皮各一兩訶黎勒皮一分檳榔銼一兩半羚羊角鎊三兩郁李仁去皮三分上一十二味搗羅為末煉蜜和丸小豆大空心溫酒下二十丸以利為度未快利即加丸數治氣痔下部腫痛生瘡脫肛不收蝟皮丸方蝟皮燒灰三兩續斷槐實微炒黃耆切焙白礬熬令汁盡連翹各三分生乾地黃焙當歸切焙各一兩半乾薑炮附子炮裂去皮臍各半兩上一十味搗羅為末煉蜜和丸梧桐子大每服二十丸陳米飲下日三五服治大腸熱結成氣痔黃耆散方黃耆銼二兩半苦參玄參各三兩附子炮裂去皮臍一兩半大黃銼炒一兩半乾薑炮一兩蝟皮燒焦黃連去須各二兩槐子炒三合豬蹄一具燒焦上一十味搗羅為散每服二錢匕空心米飲調下日晚再服治腸風五痔下鮮血多祕結疼痛成氣痔者槐豆散方槐豆炒二兩皂莢子仁三分炒枳殼去瓤麩炒防風去叉桑耳各一兩上五味搗羅為散每服二錢匕煎樗根湯調下日三治氣痔大便澀威靈仙丸方威靈仙去土乳香研枳殼去瓤麩炒各一兩上三味搗羅為末以粟米飯和丸梧桐子大每服十五丸米飲下日三治因氣成痔瘻卷柏散方卷柏枳殼去瓤麩炒豬牙皂莢各一兩上三味入一小藏瓶內以鹽泥固濟慢火燒透去火和瓶於濕地上用黃土罨一復時取出藥入麝香一錢同研極細每服二錢匕溫酒調下不拘時候治氣痔蝟皮散方蝟皮一枚燒焦桂去粗皮一兩磁石火燒醋淬十遍四兩上三味搗羅為散空心米飲調下二錢匕日晚再服治氣痔下血肛邊疼痛聖功丸方雞冠花焙臭椿皮炙銼各二兩上二味搗羅為末煉蜜和丸梧桐子大每服二十丸黃耆湯下不拘時治氣痔下濃血白礬丸方白礬熬令汁枯附子炮裂去皮臍各一兩上二味搗羅為末煉蜜和丸梧桐子大空心溫酒下十丸日晚再服治氣痔脫肛不收或生鼠乳時復血出久不瘥者必效丸方枳殼去瓤麩炒黃耆銼各一兩上二味搗羅為末以陳米飯和丸梧桐子大空心食前米飲下三十丸治氣痔脫肛熏尉方枳殼去瓤麩炒防風去叉各一兩白礬熬令汁枯一分研上三味除白礬外搗為粗末入白礬拌勻水三碗煎至二碗乘熱熏之仍以軟帛蘸湯尉之通手即淋洗治氣痔脫肛良久乃收摻藥方海螵蛸研染燕脂研各半兩上二味各為末仍同研勻先以溫湯洗略拭乾摻藥少許治大腸風壅積滯不通變成氣痔疼痛黃耆湯方黃耆銼半兩當歸切焙大黃銼焙檳榔煨銼各一兩枳實炒防己木香黃芩去黑心各三分上八味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服
