body:
  text: 卷第三十三傷寒後變成瘧論曰傷寒變成瘧者因病瘥後外邪未散真臟尚虛因為勞事致二氣交爭陰勝則振寒陽勝則發熱陰陽更勝即往來寒熱休作有時也一日再發者得汗必解若傷寒八九日得之熱多寒少其人不嘔清便自調者欲自愈也或陽明證煩熱汗出日晡所發熱者脈浮宜解表脈實宜攻裡又有婦人熱入血室發熱而更作寒者當詳辨之治傷寒後變成瘧病寒熱躁渴知母升麻湯方知母石膏升麻各一兩蜀漆常山甘草炙各一分烏梅去核半兩上七味粗搗篩每服五錢匕水一盞半煎至八分去滓食後溫服治傷寒後變成瘧口乾煩渴二黃湯方麻黃去根節大黃銼炒栝蔞根各一兩甘草炙銼半兩上四味粗搗篩每服五錢匕水一盞半煎至八分去滓食後溫服治傷寒後變成瘧寒熱躁渴升麻前胡湯方升麻前胡去蘆頭各一兩半知母焙芍藥各三兩朴硝山梔子仁木通銼烏梅去核各半兩甘草炙銼一分上九味粗搗篩每服五錢匕水一盞半入生薑一棗大拍碎同煎至七分去滓入生地黃汁二合更煎一沸食後溫服治傷寒後變成瘧痰毒壅脾肺面色萎黃寒熱時作人參常山湯方人參常山各半兩甘草生陳橘皮湯浸去白焙各一分燈心一十莖上五味細銼拌勻用水二盞酒一盞同煎至兩盞去滓入好茶末二錢匕分作兩服溫服取吐即瘥治傷寒後變成勞瘧久不瘥黃芩鱉甲湯方黃芩去黑心柴胡去苗山梔子仁烏梅去核各半兩鱉甲去裙襴醋炙一兩甘草炙一分上六味粗搗篩每服五錢匕用童子小便一盞半入桃柳尖各七個生薑一棗大拍碎豉半合同浸一宿平旦煎至七分去滓入生地黃汁一合攪勻更煎一沸溫服不拘時治傷寒後肝瘧由邪熱客於足厥陰經所成顏色蒼蒼戰掉或似熱勞蜀漆鱉甲丸方鱉甲去裙襴醋炙蜀漆知母焙烏梅去核苦參常山葳蕤各一兩豉一合熬石膏二兩細辛去苗葉甘草炙各三分上一十一味搗羅為末煉蜜和搗數百下丸如梧桐子大每服十五丸空心溫酒下晚再服治傷寒後心瘧令人煩熱不止飲水多常渴常山石膏湯方常山鱉甲去裙襴醋炙犀角屑蜀漆各一兩甘草炙烏梅去核各一分梔山子仁半兩石膏一兩半上八味粗搗篩每服五錢匕水一盞半入豉三七粒淡竹葉二七片生薑一棗大拍碎同煎至八分去滓食後溫服日二治傷寒後脾瘧脾臟受熱或渴或不渴熱氣內傷不得大便腹中熱痛身寒汗出常山丸方常山二兩知母焙鱉甲去裙襴醋炙各一兩甘草炙半兩上四味搗羅為末煉蜜和搗數百下丸如梧桐子大每服十五丸未發前溫酒下發時再服治傷寒後肺瘧痰熱聚於胸膈令人心寒甚則發熱熱則驚如有所見者三味湯方常山一兩秫米半匙甘草炙銼一分上三味粗搗篩每服五錢匕水一盞半入生薑一棗大拍碎同煎至八分去滓臨發時溫服治傷寒後腎瘧令人悽悽腰脊痛而宛轉大便難手足寒常山柴胡湯方常山柴胡去苗麥門冬去心焙各一兩烏梅去核半夏湯洗七遍炒乾檳榔銼枳殼去瓤麩炒各半兩上七味粗搗篩每服三錢匕水一盞入生薑一棗大拍碎淡竹葉二七片豉二七粒同煎至七分去滓臨發時溫服治傷寒後變成瘧疾或陰氣結伏心下成塊或膨滿嘔逆喘促面黑唇青四肢逆冷飲食不下氣結食毒並宜服此太一護命丸方陽起石硫黃附子炮裂去皮臍各一兩金星石銀星石白石英紫石英礞石滑石硝石凝水石燒赤磁石火燒醋淬太陰玄精石坩堝子纍經銷金銀者不灰木各半兩丹砂一分巴豆四十九粒去皮心出油杏仁四十九粒湯去皮尖雙仁上一十八味搗研為末再同研極細用阿魏一分與糯米粥同和勻丸如櫻桃大每服一丸麩炭火內燒赤取出用兩隻盞子合在內候冷細研以生薑米飲下未知再服治傷寒後寒熱不退變瘧時作茯苓飲方赤茯苓去黑皮鱉甲去裙襴醋炙地骨皮各二兩柴胡去苗知母焙各一兩半枳殼去瓤麩炒一兩上六味銼如麻豆大每服五錢匕以水一盞半煎取七分去滓入生地黃汁一合食後良久溫服如人行五六里再服傷寒後腳氣論曰傷寒後腳氣者緣其人腎經本虛風濕毒氣乘虛客搏腎主腰腳故邪氣沉滯則腳弱而痛雖傷寒已瘥邪熱未盡風濕毒氣與熱相搏上衝於心肺其狀令人心胸煩滿上氣息急甚者致死診其脈左手尺脈洪而數者腳氣也服藥後脈沉而緩者愈治傷寒後腳氣上衝心膈煩悶羚羊角湯方羚羊角鎊一兩旋覆花三分茯苓去黑皮一兩黃芩去黑心半夏湯洗七遍焙各三分檳榔銼半兩陳橘皮湯浸去白焙三分吳茱萸半兩湯洗三遍焙乾炒上八味粗搗篩每服五錢匕水一盞半入生薑一分拍碎同煎至七分去滓食前溫服治傷寒後腳氣衝心心神煩亂嘔逆減食腳膝痠疼紫蘇木香湯方紫蘇莖葉一兩木香赤茯苓去黑皮各半兩沉香芍藥木通銼各一兩吳茱萸湯洗三遍焙乾炒檳榔銼陳橘皮湯浸去白焙各一分上九味粗搗篩每服三錢匕用水一盞入生薑半分拍碎同煎至七分去滓食前溫服治傷寒後腳氣攻心悶絶檳榔散方檳榔銼木香各一兩郁李仁微炒去皮桂去粗皮各三分吳茱萸湯洗三遍焙乾炒半兩赤茯苓去黑皮牛膝去苗酒浸焙各三分上七味搗羅為細散每服一錢半匕食前煎桑根白皮木通湯調下日二治傷寒後腳氣胸中滿悶喘息促急陳橘皮散方陳橘皮湯浸去白焙三分檳榔銼一兩桂去粗皮三分牽牛子微炒一兩上四味搗羅為細散每服一錢半匕食前溫酒調下日二治傷寒後腳氣攻心悶亂腹滿如石小便赤澀茯苓湯方赤茯苓去黑皮一兩鱉甲醋炙去裙襴木通銼郁李仁微炒去皮各三分上四味粗搗篩每服三錢匕水一盞煎至七分去滓食前溫服治傷寒後腳氣心煩滿悶不下飲食嘔逆多痰半夏湯方半夏湯洗七遍焙乾枳殼去瓤麩炒茯苓去黑皮前胡去蘆頭木通銼各三分上五味粗搗篩每服三錢匕水一盞入生薑一分拍碎同煎至半盞去滓食前溫服治傷寒後腳膝腫滿氣急大便祕澀赤小豆湯方赤小豆半合桑根白皮半兩紫蘇莖葉一兩檳榔半兩上四味銼三味如麻豆大同小豆用水五盞入生薑一分拍碎煎至二盞半去滓分兩服食前溫服治傷寒後腳氣兩脛腫滿心中煩悶犀角散方犀角鎊一兩檳榔銼半兩陳橘皮湯浸去白焙三分細辛去苗葉半兩吳茱萸湯洗三遍焙乾炒一分上五味搗羅為細散每服一錢半匕食前生薑熱酒調下日二治傷寒後腳氣心腹妨悶脹痛坐臥不安吳茱萸散方吳茱萸湯洗三遍焙乾炒一分檳榔銼當歸切焙木香郁李仁微炒去皮各三分上五味粗搗篩每服三錢匕用水一盞煎至七分去滓食前溫服治傷寒後腳氣攻心腹脹硬小便赤澀大戟丸方大戟炒芫花醋炒令焦苦葶藶炒各半兩續隨子去皮炒巴豆去皮心壓去油盡別研各一分上五味搗羅四味為細末入巴豆和研勻煉蜜和丸如梧桐子大每服三丸至五丸溫米飲下不計時候傷寒後腰腳疼痛論曰腰者腎之腑腎者主水受五臟六腑之精而藏之傷寒病後精血不足腎氣既弱風邪襲虛客搏於足少陰之經留注腰腳凝滯不散故機關不利為腰腳疼痛亦有宿患腎經風濕腰痛因汗下後經氣虛而發者各從其證以方治之治傷寒後風虛邪氣流注腰胯冷疼腳膝無力獨活湯方獨活去蘆頭一兩防風去叉三分五加皮二分附子炮裂去皮臍二兩芍藥一兩乾薑炮裂一兩桂去粗皮一兩牛膝去苗酒浸切焙一兩杜仲去粗皮炙銼一兩五味子炒三分上一十味銼如麻豆每服五錢匕用水一盞半煎至七分去滓食前溫服治傷寒後腰痛或皮肉𤸷痹腿膝疼痛行履艱難不可俯仰防風湯方防風去叉一兩麻黃去根節三分桂去粗皮三分牛膝去苗酒浸切焙一兩丹參半兩五加皮半兩杜仲去粗皮炙銼三分芎藭三分附子炮裂去皮臍一兩細辛去苗葉半兩當歸切焙一兩芍藥一兩羌活去蘆頭一兩續斷一兩上一十四味銼如麻豆每服五錢匕用水一盞半入生薑半分拍碎同煎至七分去滓食前溫服治傷寒後腎臟氣虛腰疼乳香丸方乳香半兩地龍微炒一兩當歸切焙一兩桂去粗皮半兩烏頭去皮臍生用一兩乾蠍微炒去足半兩附子炮裂去皮臍一兩上七味搗羅為末用安息香一兩銼酒浸一宿細研淘濾去滓慢火煎成膏同藥末研令勻煉蜜和丸如緑豆大每服空心溫酒下五丸至十丸治傷寒後風傷腰胯冷疼兼補益元臟杜仲丸方杜仲去粗皮炙銼一兩乾漆炒令煙出一兩半牛膝去苗酒浸切焙一兩巴戟天去心一兩半桂去粗皮一兩五加皮銼一兩狗脊去毛一兩山茱萸一兩防風去叉半兩附子炮裂去皮臍一兩獨活去蘆頭一兩山芋一兩上一十二味搗羅為末煉蜜和丸如梧桐子大每服空心溫酒下二十丸治傷寒後腰痛行履不得敗龜板散方敗龜醋浸炙虎骨塗酥炙補骨脂微炒當歸切焙芍藥各一兩薰陸香桂去粗皮白芷各半兩上八味搗羅為細散每服食前熱酒調下二錢匕日二服治傷寒後腰痛或腰內有冷膿及膀胱氣痛檳榔散方檳榔銼陳橘皮湯去白炒乾桂去粗皮芍藥附子炮裂去皮臍各半兩乾薑炮裂一分牽牛子五兩入糯米百粒同炒米色黃即住搗羅取末三兩其滓不用上七味搗羅六味為散入牽牛子末和令勻每服空心溫酒調下三錢匕服藥了吃少姜粥良久利下腰間積滯物如不利即加至四錢匕以利為度治傷寒後腰間冷痛當歸散方當歸切焙桂去粗皮各一兩牡丹皮附子炮裂去皮臍各半兩上四味搗羅為細散每服空心溫酒調下二錢匕晚再服治傷寒後腰痛不可忍沒藥散方沒藥一兩研地龍微炒一兩桂去粗皮半兩上三味搗研為細散每服空心溫酒調下二錢匕治傷寒後風虛氣滯攻腰胯疼痛坐臥艱難芫花散方芫花二兩吳茱萸一兩半蕓薹子一兩上三味搗羅為散每用散半匙以黃米糟一兩入酒煮如糊攤於蠟紙上貼痛處治傷寒後或中風濕毒氣流注腰脊日夜疼痛牛膝煎方牛膝去苗天麻附子炮裂去皮臍生用羌活去蘆頭各二兩當歸切焙一兩上五味搗羅為末用黑豆二升桑枝三斤細銼生薑四兩切用水二斗煎至二升半去滓入藥末煎成膏每服空心溫酒調下半匙匕日晚再服治傷寒汗出不徹濕毒留客肢體攣急腰腳不得屈伸牛膝散方牛膝麻黃去根節地龍天南星各二兩惡實根十條上五味先將惡實根去皮細銼並諸藥入在沙盆內細研後用法酒一升再研勻爛用新布絞取汁後用炭半稱燒一地坑子令通赤後去火掃淨投藥汁於坑子內再以火燒令黑色取出於乳鉢內研細每服半錢匕溫酒調下日三服並無所忌治傷寒發汗吐下後體虛元臟積冷氣刺腰痛轉動艱難原蠶砂散方原蠶砂半斤糯米半升上二味同炒令米色焦然後搗羅為末每用半兩以米醋調如稀糊入銚子內煎攪令稠及熱攤於蠟紙上貼痛處以帛纏縛冷即易之治傷寒後體虛元臟挾風冷腰膝疼痛行履不得杜仲酒方杜仲去粗皮炙銼二兩獨活去蘆頭半兩附子炮裂去皮臍一兩仙靈脾三分牛膝去苗一兩上五味細銼用生絹袋盛以酒五升浸密封頭經七日後開每日取二三合溫服日可三服未瘥再浸服傷寒後下痢膿血論曰傷寒後變成膿血痢者本病瘥之後熱毒未散乘虛客於腸胃與津液相搏故下痢膿血毒氣甚則壯熱而腹痛濕毒加之則所下如魚腦或如爛肉又傷寒未解少陰病下痢便膿血者亦濕熱相搏故也治傷寒熱毒入胃下利膿血黃連阿膠湯方黃連去須炒二兩梔子仁半兩阿膠炙令燥黃柏去粗皮炙各一兩上四味粗搗篩每服四錢匕水一盞煎七分去滓不拘時溫服治傷寒毒熱不解日晚壯熱腹痛便利膿血地榆湯方地榆銼黃連去須炒犀角鎊茜根黃芩去黑心各一兩梔