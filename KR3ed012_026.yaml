body:
  text: 卷第二十六傷寒霍亂論曰嘔吐而利病名霍亂此由邪氣在中焦使陰陽二氣不能升降則心腹絞痛而作吐利也其候先心痛則先吐先腹痛則先利心腹俱痛則吐利並作古人以其病迅暴揮霍之間便致撩亂故謂之霍亂傷寒霍亂亦由中焦陰陽不和所致故其狀有熱而渴者有寒而不渴者有發熱惡寒汗出厥逆者有病勢已而身體疼痛不休者治之不可概以一法治傷寒後霍亂吐利寒多不喜飲水理中丸方人參乾薑炮裂甘草炙銼白朮各三兩上四味搗羅為末煉蜜丸如雞子黃大每服一丸沸湯化破溫服日三夜二腹中未熱加至三四丸治傷寒霍亂頭痛發熱多欲飲水五苓散方豬苓去黑皮白朮各三分澤瀉赤茯苓去黑皮各一兩桂去粗皮半兩上五味搗羅為散每服二錢匕溫水調下日再治傷寒後霍亂心煩乾嘔蘆參湯方蘆根銼二兩人參麥門冬去心焙赤茯苓去黑皮各一兩枇杷葉拭去毛炙一分上五味粗搗篩每服五錢匕水一盞半薤白三寸煎至一盞去滓溫服日三治傷寒後霍亂心膈不利朴薑湯方朴厚去粗皮生薑汁炙高良薑炒陳橘皮去白炒人參各三分草豆蔻去皮半兩上五味粗搗篩每服三錢匕水一盞生薑三片棗一枚劈破煎至七分去滓溫服日三治傷寒後霍亂吐利不止吃食不消心腹脹悶人參湯方人參厚朴去粗皮生薑汁炙乾木瓜各一兩高良薑炒木香白茯苓去黑皮芍藥白豆蔻去皮桂去粗皮白朮陳橘皮去白炒各半兩上一十一味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日三治傷寒後霍亂轉筋嘔吐不止悶絶藿香湯方藿香葉當歸切焙附子炮裂去皮臍人參桂去粗皮木瓜各一兩上六味銼如麻豆每服三錢匕水一盞生薑三片煎至七分去滓溫服不拘時治傷寒後霍亂吐瀉不止及腳轉筋肉豆蔻湯方肉豆蔻仁高良薑炒枇杷葉拭去毛炙各半兩厚朴去粗皮生薑汁炙銼桂去粗皮各一兩吳茱萸湯洗焙乾炒一分上六味粗搗篩每服三錢匕水一盞棗一枚劈煎至七分去滓溫服日三治傷寒霍亂轉筋風寒客於胃腑吐利不止心腹氣脹不思飲食厚朴湯方厚朴去粗皮生薑汁炙銼乾木瓜各一兩高良薑炒香薷葉陳橘皮去白炒紫蘇莖各半兩上六味粗搗篩每服三錢匕水一盞入生薑三片鹽少許煎至七分去滓溫服不拘時治傷寒後霍亂吐利腹脹轉筋手足冷飲食不消吳茱萸湯方吳茱萸一分湯洗焙乾炒厚朴去粗皮生薑汁炙銼一兩人參三分乾木瓜藿香葉甘草炙銼桂去粗皮丁香炒各半兩上八味粗搗篩每服三錢匕水一盞入生薑三片煎至七分去滓溫服日三治傷寒後霍亂吐利腳轉筋白朮湯方白朮陳橘皮湯浸去白炒各一兩乾木瓜二兩上三味粗搗篩每服三錢匕水一盞入生薑三片煎至七分去滓溫服日再治傷寒霍亂嘔吐不止手足厥逆薑附丸方乾薑炮半兩附子炮裂去皮臍二兩厚朴去粗皮生薑汁炙銼一兩上三味搗羅為末醋煮麵糊丸如梧桐子大每服三十丸食前米飲下治傷寒霍亂後身體疼痛不休桂枝湯方桂去粗皮芍藥各三分甘草炙銼半兩上三味粗搗篩每服五錢匕水一盞半入生薑一棗大拍碎棗二枚去核同煎至一盞去滓溫服不拘時以微汗為度未汗更服仍作生薑稀粥投之以助藥力治傷寒霍亂吐利脈微欲絶或惡寒四肢厥逆小便復利或吐利已定汗出而厥四肢拘急不解通脈四逆湯方甘草炙二兩附子炮裂去皮臍二枚乾薑炮三兩上三味銼如麻豆每服五錢匕水一盞半煎至八分去滓溫服脈出即愈面色赤者加蔥白二莖同煎腹痛去蔥白加芍藥二兩嘔加生薑一分切同煎咽痛去芍藥加桔梗並人參二兩以吐利止手足溫為度傷寒小便不通論曰傷寒小便不通者或因發汗過多津液虛少胃中乾燥或小腸有伏熱氣道不宣皆令小便不通也方論云胃中干則無小便慎不可利蓋言汗後亡津液也若下焦有熱而小便不利又當隨證利之治傷寒後下焦熱小便不通茯苓木通湯方赤茯苓去黑皮木通銼車前子葉滑石各二兩上四味粗搗篩每服五錢匕水一盞半煎至八分去滓空心溫服治傷寒脈浮發熱渴欲飲水小便不利者豬苓湯方豬苓去黑皮赤茯苓去黑皮澤瀉滑石碎上四味等分㕮咀如麻豆大每服五錢匕水一盞半煎至八分去滓入阿膠末一錢匕溫服日三治傷寒後小便赤澀瞿麥湯方瞿麥一兩用穗甘草炙銼冬葵子滑石各二兩石葦去毛一兩上五味粗搗篩每服五錢匕水一盞半煎至八分去滓食前溫服治傷寒發汗後小便不利微熱消渴者五苓散方豬苓去黑皮白朮赤茯苓去黑皮各三分桂去粗皮半兩澤瀉一兩一分上五味搗羅為散每服三錢匕熟水調下治傷寒小便不通腹脹車前子湯方車前子三兩上一味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服治傷寒小腸有伏熱狀如熱淋滲痛滑石湯方滑石碎冬葵子榆白皮銼上三味等分粗搗篩每服四錢匕水一盞半煎至八分去滓食前溫服治傷寒小便赤澀不通葵子湯方冬葵子滑石各二兩朴硝赤茯苓去黑皮木通銼各一兩茅根銼石葦去毛各一兩半上七味粗搗篩每服三錢匕水一盞煎至七分去滓食前溫服治傷寒小腸不通便如血淋血餘散方亂髮灰二錢匕大麻根切一兩上二味先將麻根以水一盞煎至半盞去滓下亂髮灰攪勻食前溫服治傷寒小便赤澀似淋膀胱風熱桑白皮湯方桑根白皮銼冬葵子滑石各一兩甘草炙銼半兩朴硝一兩半青橘皮去白切炒一分上六味粗搗篩每服五錢匕水一盞半蔥白五寸切煎至八分去滓食前溫服治傷寒小腹急痛小便不利雞蘇湯方雞蘇一握木通銼石葦去毛冬葵子杏仁湯浸去皮尖雙仁炒滑石搗碎各一兩生乾地黃焙二兩上七味粗搗篩每服五錢匕水一盞半煎至八分去滓食前溫服治傷寒後小便不通臍腹痛氣脹攻上喘促枳殼湯方枳殼去瓤麩炒滑石大腹皮銼各半兩甘草炙銼青橘皮去白切炒絡石根紫蘇莖葉朴硝麥門冬去心焙冬葵子各三分前胡去蘆頭赤芍藥各一兩上一十二味粗搗篩每服三錢匕水一盞蔥白三寸切煎至六分去滓食前溫服治傷寒熱盛小便不利滑石散方滑石二錢搗羅為末葶藶子半合紙上炒上二味先將葶藶用水一盞煎至半盞去滓下滑石末調勻食前頓服治傷寒壯熱肢節疼痛大小便澀柴胡散方柴胡去苗黃芩去黑心栝蔞根山梔子仁各一兩大黃銼醋炒芒硝各一兩半木香白蘚皮茵陳蒿半兩上九味搗羅為細散每服二錢匕食前新汲水調下治傷寒小便出血竹茹湯方青竹茹木通銼各一兩甘草炙銼一分連翹蘆根銼蒲黃各半兩上六味粗搗篩每服五錢匕水一盞半入燈心少許生薑一棗大拍碎煎至八分去滓食前溫服治傷寒嘔而發熱胸脅滿心下怔忪小便不利小柴胡去黃芩加茯苓湯方柴胡去苗二兩赤茯苓去黑皮一兩人參甘草炙各三分半夏六錢湯洗七遍上五味㕮咀如麻豆大每服五錢匕水一盞半生薑大棗大拍碎棗二枚劈破煎至八分去滓溫服日三治傷寒熻熻發熱頭項強痛小便不利桂枝去桂加茯苓白朮湯方芍藥赤茯苓去黑皮白朮各一兩半甘草炙一兩上四味㕮咀如麻豆大每服五錢匕水一盞半生薑一棗大拍碎棗二枚劈破煎至八分去滓溫服治傷寒少陰證小便不利四逆加茯苓散方甘草炙枳實去瓤麩炒柴胡去苗芍藥各一兩赤茯苓去黑皮半兩上五味搗羅為細散每服二錢匕米飲調下日三治傷寒時行小腹脹滿小便不通滑石湯方滑石二兩葶藶子微炒防己各一兩木香半兩上四味粗搗篩每服三錢匕用水一盞煎至三分去滓空心溫服日晚再服治傷寒發汗後腹下氣滿小便不利茯苓湯方赤茯苓去黑皮二兩桂去粗皮甘草炙各一兩上三味㕮咀如麻豆大每服五錢匕水一盞半入大棗二枚劈煎至八分去滓溫服日三傷寒大便不通論曰傷寒大便不通者胃腑實也蓋因太陽病若發汗若下若利小便亡其津液胃中乾燥因轉屬陽明不更衣內實大便難此陽明證也當下之然有陽明證不可下者當問其小便日幾行若本小便日三四行今日再行故知大便不久出為小便數少津液當還胃中故知不久必大便也如此則傷寒嘔多雖有陽明證其不可下明矣大凡胃中有燥糞法當以湯水和之湯入腹中轉失氣者此所謂有結燥下之無害若不轉失氣者此但初硬後必溏不可下下之則脹滿不能食也治陽明病潮熱若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎也乃可攻之若不轉失氣者此但初頭硬後必溏不可攻攻之必腹脹不能食也欲飲水者與水則噦其後發熱者必大便硬而少也以小承氣湯和之方大黃酒洗四兩厚朴去粗皮二兩枳實三枚麩炒上三味細銼如麻豆大每服五錢匕水一盞半煎至七分去滓溫服當更衣不爾者再服更衣者勿服服後若不轉失氣者慎不可攻也治傷寒不大便五六日繞臍痛煩躁發作有時此有燥屎宜大承氣湯方大黃酒洗四兩厚朴去粗皮炙半斤枳實五枚麩炒上三味細銼如麻豆大每服五錢匕水一盞半煎至八分去滓入芒硝末一錢匕再煎一兩沸溫服仲景又云少陰病六七日不大便者宜大承氣湯治傷寒五六日大便不通壯熱頭疼譫語腸中有結燥厚朴湯方厚朴去粗皮薑汁炙一兩柴胡去苗大黃銼炒各一兩半朴硝二兩枳實去瓤麩炒三分上五味粗搗篩每服五錢匕水一盞入生薑一棗大拍碎煎至七分去滓空心溫服良久再服以通為度未通再服治傷寒大便不通嘔吐厚朴半夏湯方厚朴去粗皮生薑汁炙銼半夏湯洗七遍焙各一兩枳殼去瓤麩炒半兩大黃銼二兩上四味粗搗篩每服五錢匕水一盞半生薑一棗大拍碎煎至八分去滓空心溫服如人行五里再服治傷寒五六日大便不通氣喘桑白皮湯方桑根白皮銼一兩大腹皮銼半兩枳實去瓤麩炒大黃銼炒各二兩上四味粗搗篩每服三錢匕水一盞入生薑一棗大拍碎煎至六分去滓下朴硝末半錢匕空心溫服未通再服以通為度治傷寒熱氣未解惡寒頭痛壯熱四五日大便不通柴胡黃芩湯方柴胡去苗黃芩去黑心土瓜根白蘚皮各一兩木香茵陳蒿各一兩一分山梔子仁三分大黃細銼醋炒一兩半上八味粗搗篩每服三錢匕水一盞煎至六分去滓下朴硝末半錢匕空心溫服如人行五里再服未通以蔥豉粥投之治傷寒伏熱在腸胃大便不通檳榔散方檳榔銼二兩木香枳殼去瓤麩炒陳橘皮湯浸去白炒各一兩白朮大戟銼炒各半兩杏仁湯浸去皮尖炒乾薑炮各三分上八味搗羅為細散每服一錢匕煎生薑湯調下不拘時治傷寒趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏則人便硬其脾為約麻仁丸方麻子仁半升芍藥二兩厚朴二寸半去粗皮薑汁炙透枳實麩炒一兩三分杏仁去皮尖雙仁炒二合半大黃四兩上六味為細末煉蜜丸如梧桐子大每服十丸以飲下未知漸加以知為度日三治傷寒大便不通郁李仁散方郁李仁去皮尖炒研桃仁去皮尖雙仁炒研大黃銼炒檳榔銼各二兩芎藭一兩半木香半兩上六味搗羅四味為細散入二味研者和勻每服三錢匕食前溫湯調下以通為度治傷寒後風氣壅滯胸膈聚痰大便不通牽牛丸方牽牛子一半生一半炒二兩半夏湯洗七遍炒乾木通銼各一兩桑根白皮銼三分青橘皮去白銼炒半兩上五味搗羅為末煉蜜和搗三五百杵丸如梧桐子大每服二十丸空心生薑湯下臨臥再服治傷寒大便五六日不通麻仁湯方麻子仁黃芩去黑心甘草炙銼梔子仁各半兩大黃銼炒一兩上五味粗搗篩每服五錢匕水一盞半煎至八分去滓下朴硝末半錢匕溫服如人行五里再服治傷寒陽明證自汗若發汗小