body:
  text: 卷第二十二中風傷寒論曰中風傷寒三陽三陰候各不同太陽中風其脈陽浮陰弱其證發熱自汗蓋陽浮熱自發陰弱汗自出嗇嗇惡寒淅淅惡風熻熻發熱鼻鳴乾嘔又曰太陽病發熱汗出脈緩者名為中風不可燔灸若以火發其汗邪風為火熱所劫血氣流溢營衛失常兩陽熏灼其身發黃陽盛即衄陰虛即小便難陰陽俱虛竭則身體枯燥但頭汗出齊頸而還腹滿微喘口乾咽爛或不大便久則讝語甚者至噦手足躁擾循衣摸床其小便利者可治陽明中風即陽明病能食為中風其證口苦咽乾腹滿微熱惡寒脈浮若緊下之則腹滿小便難少陽中風兩耳無聞目赤胸中滿而煩不可吐吐之則悸而驚太陰中風四肢煩疼其脈陽微陰澀而長為欲愈少陰中風其脈陽微陰浮為欲愈厥陰中風其脈微浮為欲愈不浮為未愈凡此六經中風之病其狀雖異大抵其脈皆浮經所謂浮為風是也治傷寒太陽中風脈浮緊發熱惡寒身痛不汗出而躁煩者大青龍湯方麻黃去根節煮去沫六兩桂去粗皮甘草炙銼各二兩杏仁去皮尖雙仁四十枚石膏如雞子大碎上五味㕮咀如麻豆大每服五錢匕水一盞半入生薑一棗大拍碎棗二枚去核同煎至八分去滓溫服取微汗汗多者以溫粉粉之治中風傷寒陽浮陰弱陽浮者熱自發陰弱者汗自出惡寒發熱鼻鳴乾嘔等疾桂枝湯方桂去粗皮芍藥各三分甘草炙銼半兩上三味粗搗篩每服五錢匕水一盞半入生薑一棗大拍碎棗二枚去核同煎至一盞去滓溫服不拘時以汗為度未汗更服仍作生薑稀粥投之以助藥力治中風傷寒防風湯方防風去叉麥門冬去心焙山芋大黃銼炒桂去粗皮各一兩白朮白附子炮牛膝去苗酒浸切焙半夏湯洗七遍與生薑等分同搗焙芎藭肉蓯蓉酒浸切焙黃耆銼遠志去心焙乾薑炮各三分甘草炙半兩上一十五味粗搗篩每服五錢匕水一盞半入生薑一棗大拍碎棗二枚去核同煎至八分去滓溫服空心日午臨臥各一治中風傷寒頭痛四肢𤸷痛身體沉重石膏湯方石膏甘草炙麻黃去根節煎掠去沫焙桂去粗皮芍藥各二分上五味粗搗篩每服五錢匕水一盞半入生薑一棗大拍碎煎至八分去滓空心溫服治傷寒巨陽中風項背強嗇嗇惡寒汗不出姜附湯方附子炮裂去皮臍一兩乾薑炮葛根甘草炙銼桂去粗皮各三分芍藥半兩麻黃去根節先煎掠去沫焙一兩半上七味銼如麻豆每服三錢匕水一盞入棗二枚去核同煎至七分去滓食前溫服取汗未汗再服治中風傷寒頭目四肢疼痛惡寒乾嘔桂附湯方桂去粗皮芍藥各一兩半麻黃去根節先煎掠去沫焙甘草炙各一兩附子炮裂去皮臍三分上五味銼如麻豆每服五錢匕水一盞半入生薑一棗大拍碎棗二枚去核同煎至八分去滓食前溫服以熱粥投之取汗避風治中風傷寒脈浮緊發熱惡寒身體疼痛汗不出而煩麻黃桂心湯方麻黃去根節先煎掠去沫焙二兩桂去粗皮甘草炙銼乾薑炮各一兩石膏一兩半干薄荷葉杏仁去皮尖雙仁各半兩上七味粗搗篩每服五錢匕水一盞半入棗二枚去核同煎至八分去滓食前溫服治中風傷寒頭痛沉重麻黃湯方麻黃去根節先煎掠去沫焙二兩附子炮裂去皮臍一兩細辛去苗葉乾薑炮各三分甘草炙銼杏仁去皮尖雙仁各半兩上六味銼如麻豆每服三錢匕水一盞煎至七分去滓食前溫服日三治中風傷寒頭痛發熱胸中氣逆惡寒嘔噦小便難足冷桂心湯方桂去粗皮一兩芍藥附子炮裂去皮臍麻黃去根節先煎掠去沫焙各三分甘草炙銼杏仁去皮尖雙仁半夏湯洗七遍生薑等分同搗焙乾薑炮各半兩上八味銼如麻豆每服三錢匕水一盞入蔥白三寸生薑一棗大拍碎同煎至七分去滓食前溫服日三治中風傷寒初得其外證頭項疼腰背強壯熱語澀恍惚涕唾稠黏偏身拘急桂枝湯方桂去粗皮三分芎藭半夏湯洗七遍生薑等分同搗焙附子炮裂去皮臍菖蒲麻黃去根節先煎掠去沫焙羌活去蘆頭細辛去苗葉各半兩白芷一分上九味銼如麻豆每服三錢匕水一盞入生薑一棗大拍碎煎至七分去滓食前溫服蓋覆取汗治中風傷寒身體反強天麻湯方天麻麻黃去根節煎掠去沫焙羌活去蘆頭附子炮裂去皮臍桂去粗皮各半兩杏仁去皮尖雙仁炒人參細辛去苗葉白朮各一分上九味銼如麻豆每服四錢匕水一盞酒半盞入生薑一棗大拍碎同煎至八分去滓食前溫服治中風傷寒頭痛四肢煩疼二附散方附子炮裂去皮臍白附子炮半夏湯洗七遍炒乾各一分上三味搗羅為散每服半錢匕濃煎生薑湯調下不拘時得汗即止治中風傷寒頭痛惡寒四肢煩疼心躁悶麻黃細辛丸方麻黃去根節煎掠去沫焙一兩細辛去苗葉人參白茯苓去黑皮甘草炙銼白朮各半兩栝蔞根三分上七味搗羅為末煉蜜和搗丸如雞頭大每服一丸食前薄荷蜜湯研下治中風傷寒初受病一日至三日頭痛肢體疼煩躁惡風身熱憎寒白朮湯方白朮石膏各二兩乾薑炮半兩五味子炒甘草炙銼人參芎藭麻黃去根節煎掠去沫焙各一兩上八味粗搗篩每服三錢匕水一盞生薑三片棗二枚同煎至七分去滓稍熱服治中風傷寒壯熱肢節疼痛頭目昏眩咳嗽喘粗石膏芍藥湯方石膏碎芍藥前胡去蘆頭葛根柴胡去苗各一兩升麻半兩桑根白皮銼荊芥穗黃芩各三分上九味粗搗篩每服三錢匕水一盞煎至八分去滓稍熱服治中風傷寒頭目昏眩壯熱肩背拘急疼痛前胡湯方前胡去蘆頭蔓荊實去白皮芎藭麻黃去根節煎掠去沫焙甘菊花防風去叉羌活去蘆頭白茯苓去黑皮石膏碎甘草炙銼各三兩枳殼去瓤麩炒四兩黃芩一兩半上一十二味粗搗篩每服三錢匕水一大盞入生薑二片煎至七分去滓溫服治中風傷寒頭痛體疼發熱惡寒石膏獨活湯方石膏碎一兩麻黃去根節煎掠去沫焙羌活去蘆頭獨活去蘆頭甘草炙銼天南星炮青橘皮去白麩炒枳殼去瓤麩炒乾薑炮柴胡去苗益智去皮桂去粗皮上一十二味粗搗篩每服三錢匕水一盞蔥白二寸豉二七粒煎至一分去滓熱服蓋覆出汗治中風傷寒頭目昏眩憎寒壯熱四肢煩倦荊芥湯方荊芥穗木通各四兩羌活芎藭甘草炙麻黃去根節尖掠去沫獨活各一兩上每服三錢水煎溫服治中風傷寒百節痠疼前胡白朮湯方前胡去蘆頭白朮防風去叉各二兩柴胡去苗薰草白蘚皮各一兩半石膏碎三兩麻黃去根節煎掠去沫焙四兩甘草炙一兩上九味粗搗篩每服三錢匕水一盞入薄荷五葉同煎至七分去滓溫服不拘時治中風傷寒身熱頭痛肢體煩疼百解湯方前胡去蘆頭柴胡去苗甜葶藶微炒半夏湯洗七遍去滑麻黃去根節湯煮掠去沫焙羌活去蘆頭獨活去蘆頭桔梗炒人參陳橘皮湯浸去白焙白朮枳殼去瓤麩炒甘草炙銼白茯苓去黑皮芎藭石膏碎杏仁湯浸去皮尖雙仁等分上一十七味粗搗篩每服三錢匕水一盞入生薑三片同煎至七分去滓溫服不計時候傷寒濕溫論曰傷寒有五其一為中濕蓋風濕之氣中人為病發病與溫病相類故曰濕溫也此因汗出當風或因取冷過度致陰濕氣襲入肌膚流傳經絡其證喜汗出關節疼痛發熱而煩小便不利大便反快是謂中濕若風濕相搏則一身盡疼日晡所劇濕熱相蒸則身必熏黃凡治風濕者欲其微汗即風氣解而濕自去濕甚者當利其小便不可大發汗大汗則風去濕在其病不去亦不可下之下之早則噦下之而利不止即死診其脈當沉而細難經曰濕溫之脈陽濡而弱陰小而急是也治濕溫病一身盡疼發熱日晡即劇此病傷於汗出當風或久傷取冷所致麻黃杏仁薏苡仁甘草湯方麻黃去根節三兩煎掠去沫杏仁去皮尖雙仁三十枚炒薏苡仁一兩甘草炙一兩上四味㕮咀每服五錢匕水一盞半煎取八分去滓溫服治傷寒八九日風濕相搏身體疼痛不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若其人大便堅小便自利者朮附子湯主之桂枝附子湯方桂去粗皮四兩附子炮裂去皮臍三枚甘草炙二兩上三味㕮咀每服五錢匕水一盞半入生薑五片棗二枚劈破同煎取八分去滓熱服朮附子湯方附子炮裂去皮臍三枚白朮四兩甘草炙二兩上三味銼如麻豆大每服五錢匕水一盞半入生薑五片棗二枚劈破煎取七分去滓溫服初一服其人身如痹半日許復服之三服後其人如冒狀勿怪此以附子術並走皮內逐水氣未得除故使之然耳法當加桂四兩此本一方二法以大便堅小便自利故去桂也以大便不堅小便不利當加桂附子三枚恐多也虛弱家及産婦宜減服之治風濕相搏骨節疼煩掣痛不得伸屈近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之方甘草炙二兩附子炮裂去皮臍二枚白朮二兩桂去粗皮四兩上四味㕮咀如麻豆大每服五錢匕以水一盞半煎取七分去滓溫服日三服初服得微汗則解能食汗出復煩者少減服之千金云身腫者加防己四兩悸氣小便不利者加茯苓三兩既有附子今加生薑三兩治濕家身煩疼麻黃湯加朮四兩發其汗為宜慎不可以火攻之方麻黃去根節三兩桂去粗皮二兩甘草炙一兩杏仁去皮尖雙仁七十枚白朮四兩上五味㕮咀如麻豆大每服五錢匕以水一盞半煎取七分去滓溫服取微似汗則解治風濕脈浮身重汗出惡風者防己黃耆湯主之方防己四兩黃耆五兩甘草炙二兩白朮三兩上四味㕮咀如麻豆大每服五錢匕以水一盞半入生薑半分拍碎大棗二枚劈破同煎取七分去滓溫服日三喘者加麻黃胃中不和者加芍藥氣上衝者加桂下有陳寒者加細辛服後當如蟲行皮中腰以下如冰後坐被上又以一被繞腰以下溫令微汗瘥治風濕身體疼痛惡風微腫杏仁湯方杏仁去皮尖雙仁炒二十五枚桂去粗皮麻黃去根節先煮一兩沸焙乾芍藥天門冬去心焙各一兩上五味㕮咀如麻豆大每服五錢匕水一盞半入生薑半分切煎取七分去滓溫服不拘時候治濕溫傷寒身涼脈短逐日有汗者下虛上攻頭目昏痛溫風丸方白附子陽起石滑石各一兩寒水石四兩燒上四味搗研為末用糯米粥飲和丸如梧桐子大每服二十丸用荊芥木香湯下治濕溫傷寒四五日後汗出肢體冷安息香丸方安息香一分五靈脂二兩半麻黃去根節半兩附子尖七個巴豆去皮醋煮半兩上五味搗羅四味為末研巴豆為膏入衆藥丸如彈子大每服一丸麩炭上燒存性生薑湯化下傷寒時氣論曰春溫夏熱秋涼冬寒是為四時正氣非其時有其氣人或感之病無少長率相似者謂之時氣如春時應溫而或寒夏時應熱而或冷以至當秋而熱當冬而溫皆是也其候與傷寒溫病相類但可汗可下之證比傷寒溫病療之宜輕爾治時氣二三日不解頭痛壯熱惡寒葛根湯方葛根銼一兩麻黃去根節煎掠去沫焙二兩陳橘皮湯浸去白焙甘草炙銼黃芩去黑心知母焙杏仁湯浸去皮尖雙仁炒各一兩上七味粗搗篩每服三錢匕水一盞入生薑三片同煎至七分去滓溫服治時氣頭痛壯熱石膏湯方石膏碎二兩葛根銼梔子仁柴胡去苗赤芍藥各一兩甘草炙銼半兩上六味粗搗篩每服五錢匕水一盞半入生薑一棗大拍碎煎至八分去滓溫服不拘時候治時氣壯熱頭痛嘔逆前胡湯方前胡去蘆頭知母焙犀角鎊葛根銼赤芍藥各一兩石膏碎二兩上六味粗搗篩每服五錢匕以水一盞半入生薑半分拍碎蔥白二寸切煎至八分去滓溫服不拘時候治時氣頭痛壯熱肢體煩疼七聖湯方麻黃去根節煎掠去沫焙三兩蒼朮炒二兩橘皮湯洗去白焙木通銼各一兩桔梗炒一兩半山茵陳一兩甘草炙銼二兩上七味粗搗篩每服三錢匕水一盞入生薑三片煎至七分去滓溫服治時氣渾身疼痛壯熱不解人參