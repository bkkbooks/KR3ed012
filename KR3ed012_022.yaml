根銼枳實麩炒去瓤赤茯苓去黑皮牡蠣熬各二兩乾薑炮一兩半上八味搗羅為末煉蜜丸如彈丸大每服一丸熟水化下不歇再服不過五六丸胸中豁然治傷寒結胸毒氣內盛手足逆冷腹脹喘息急大便不通陷胸青龍湯方牽牛子微炒一兩半人參三分陳橘皮湯浸去白焙半兩桂去粗皮檳榔銼各一分大黃銼醋炒半兩朴硝一兩上七味粗搗篩每服五錢匕水一盞半入生薑半分拍碎同煎至七分去滓食前溫服治傷寒熱病飲水結胸硬滿大黃桔梗湯方大黃銼醋炒二兩桔梗炒一兩甘草炙銼朴硝各半兩上四味粗搗篩每服五錢匕水一盞半煎至七分去滓食前溫服治傷寒結胸氣逆手足厥冷嘔逆不定大金針丸方陽起石研不灰木阿魏研各半兩巴豆二十五枚去皮心膜不出油研杏仁二十五枚去皮尖雙仁研上五味搗研為細末用軟粟米飯為丸如小彈丸大每服一丸用針穿燈焰上燒煙絶為末生薑米飯調服以利為效治結胸傷寒心下痛按之實硬泥金丸方木香丁香大戟甘遂麩炒各一分附子炮裂去皮臍一枚紫菀去土三錢黑牽牛三錢半生半炒膩粉三錢硫黃兩皂子大檳榔大者一枚銼水銀沙子三錢巴豆二十粒去皮心膜用胡餅麵裹慢火燒熟去面不用上一十二味各搗研為末再和令勻煉蜜為丸如小雞頭大看虛實每服一丸爛嚼燒生薑一塊子同咽下藥不得嚼治傷寒結胸已轉下不除者大戟散方大戟炒甘遂炒各一兩膩粉半兩硫黃研一分水銀盞子內與硫黃同研作沙子半兩上五味搗研為散再同研勻每服二錢匕溫漿水調下治傷寒結胸逐利熱毒越桃丸方越桃桃花曝乾各一分大黃生銼半兩鬱金二錢白牽牛取末五兩郁李仁去皮研一兩丹砂研一錢巴豆霜研五錢上八味搗研為末滴水丸如小豆大每服一丸蜜水下治傷寒結胸伏陽在裡心下堅硬按之則痛陷胸散方前胡去蘆頭甘遂麩炒甜葶藶隔紙炒大黃銼微炒杏仁湯浸去皮尖雙仁麩炒馬牙硝研各一兩上六味搗研為末每服一錢匕生薑蜜水調下更看虛實加減治傷寒結胸心下堅硬宣毒丸方大黃銼白牽牛炒各一兩滑石朴硝甘遂麩炒郁李仁去皮炒研各半兩大戟麩炒一分續隨子去皮煮研半兩上八味搗研為末煉蜜和丸如彈丸大看虛實以龍腦蜜水化下一丸治傷寒結胸及瘡疹後毒氣攻心咳嗽喘急大通散方甘遂麩炒一分生乾地黃一兩與甘遂一處同搗焙乾檳榔銼二枚麥糵微炒半兩鉛白霜研一分上五味搗研為末看虛實用龍腦漿水調下半錢匕治傷寒陰氣結伏在胸膈虛痞或痛不可忍者金針丸方不灰木二錢陽起石阿魏各一錢白丁香丹砂研乳香膩粉各一錢半硫黃一分巴豆去皮心膜出油二七粒上九味同研勻細糯米粽子和丸如梧桐子大每服五丸至七丸丁香湯下不拘時候治傷寒結胸心下堅痛膈毒丸方郁李仁去皮黑牽牛炒大戟甘遂各一分牛黃研乳香研各一錢麝香研龍腦研各半錢上八味搗研為末再同研勻用白麵糊和丸如梧桐子大每服七丸煎燈心小麥湯下臨臥服治傷寒結胸聖餅子方甘遂大戟去皮各半兩黑牽牛生用一兩半輕粉一錢匕粉霜一錢巴豆去皮醋煮黃十四枚水銀一錢入錫一錢結砂子上七味先將前三味為末入白麵五錢水和作餅子文武火煨焦黃再為末入後四味拌勻水和為丸如緑豆大捏作餅子每服三餅茶清下治傷寒結胸熱氣蘊蓄宣風丸方大黃末牽牛子末郁李仁去皮研各半兩巴豆一分去心皮膜油炸研上四味再同研勻煉蜜為丸小豆大看虛實生薑蜜水下一丸至二丸治傷寒結胸心下堅滿金黃散方黑牽牛末大黃末各一錢匕鬱金末胡黃連末各半錢匕上四味作一服入膩粉一錢匕新水調下傷寒四日五日後結胸可服或吐或瀉或汗出即愈小兒量大小加減
