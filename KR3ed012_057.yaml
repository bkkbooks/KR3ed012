body:
  text: 卷第五十七心腹門心腹痛論曰臟腑氣虛風寒客之邪正相搏故上衝於心絡而為心痛下攻於腹膜而為腹痛上下攻擊則心腹㽲痛其或陰氣凝結久而不散內攻腸胃則變為寒中脹滿泄利之證治心腹徹痛諸虛冷氣脹滿黃耆湯方黃耆銼一兩當歸切焙人參甘草炙銼各一兩乾薑炮二兩芍藥厚朴去粗皮生薑汁炙半夏湯洗去滑桂去粗皮各一兩半蜀椒去目及閉口者炒出汗半兩上一十味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服冷氣多者加附子一枚炮裂去皮臍治心腹冷痛獨活湯方獨活去蘆頭人參白茯苓去黑皮吳茱萸水浸一宿炒甘草炙銼乾薑炮裂陳橘皮湯浸去白焙黃耆銼桂去粗皮芍藥芎藭防風去叉各一兩當歸切焙二兩上一十三味粗搗篩每服水二盞用羊肉二兩先煮至一盞去肉下藥末三錢匕生薑一分切棗二枚劈破煎至七分去滓溫服日三治心腹刺痛五辛湯方蜀椒去目及閉口者炒出汗乾薑炮細辛去苗葉桂去粗皮熟乾地黃炮芍藥防風去叉苦參甘草炙銼當歸切焙吳茱萸水浸一宿炒各一兩梔子去皮烏梅去核各二七枚上一十三味粗搗篩每服三錢匕水一盞棗二枚劈破煎至七分去滓溫服日二治暴冷心腹痛頭面冷汗出霍亂吐下脈沉細及傷寒冷毒下清水及赤白帶下當歸湯方當歸切焙人參乾薑炮白茯苓去黑皮厚朴去粗皮生薑汁塗炙木香桂去粗皮桔梗炒芍藥甘草炙銼各一兩上一十味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日三治心腹痛食冷物即發及吐惡水桔梗散方桔梗炒麥門冬去心焙白茯苓去黑皮檳榔煨銼各一兩半枳殼去瓤麩炒人參厚朴去粗皮生薑汁塗炙芍藥陳橘皮湯浸去白焙各一兩桂去粗皮三分上一十味搗羅為散空心煎薑棗湯調下二錢匕加至三錢匕治心腹冷痛丁香湯方丁香半兩甘草炙銼桂去粗皮乾薑炮各三分厚朴去粗皮生薑汁塗炙赤芍藥銼各一兩一分人參白朮各一兩上八味粗搗篩每服五錢匕水一盞酒半盞同煎至八分去滓空心溫服良久再服治心腹卒痛厚朴湯方厚朴去粗皮生薑汁炙二兩吳茱萸水浸一分炒乾一兩半上二味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日三治心腹疼痛每發時連臍腹刺痛多吐涎沫桑白皮散方桑根白皮酸石榴皮蕪荑各半兩厚朴一兩去粗皮塗生薑汁炙令香熟生薑一分檳榔末二錢上六味搗篩為粗散水二大盞煎至一盞去滓下檳榔末攪令勻稍熱分為三服又方桂心一兩乾薑一兩炮裂銼上二味搗篩為細散每服一錢匕溫酒調下不計時候治心虛寒心中脹滿悲憂不樂或夢山丘平澤半夏補心湯方半夏六兩宿姜五兩茯苓桂心橘皮各三兩白朮四兩防風遠志各二兩枳實三兩上九味銼如麻豆拌勻每服三錢匕水一盞煎取七分去滓溫服不拘時候治一切心腹痛不可忍沉麝丸方沉香銼麝香研沒藥研丹砂研血竭研各一兩木香半兩上六味搗研為末銀石器熬生甘草膏丸皂莢子大生薑鹽湯嚼下一丸端午日午時合治心腹冷氣痛調中丸方乾薑炮四兩人參白茯苓去黑皮甘草炙銼白朮各五兩上五味搗羅為末煉蜜和丸如梧桐子大每服三十丸空心溫棗湯下治冷氣攻衝心腹㽲痛短氣汗出芎藭散方芎藭莎草根炒青橘皮去白焙蓬莪朮炒各一兩烏藥二兩上五味搗羅為散溫酒調下二錢匕甚者三錢匕更飲五合暖酒得吐瘥未退更服只三服止治腹中虛寒心腹切痛補血小建中湯方桂去粗皮三分甘草炙半兩白芍藥一兩半上三味㕮咀如麻豆每服五錢匕水二盞入生薑一分切碎大棗四枚劈破同煎至一盞去滓更入膠飴半兩許再煎令膠飴化溫服甚者日三服此藥偏能治腹中虛寒補血尤止腹痛常人見其藥性溫平未必用然腹痛按之便痛重按卻不甚痛者此止是氣痛重按愈痛而堅者當有積也氣痛不可下下之愈痛此虛寒證也尤宜服此藥外臺治虛勞腹中痛夢失精四肢痠痛手足煩熱咽乾口燥婦人小腹痛亦用此張仲景傷寒論陽脈澀陰脈弦法當腹中急痛先與此不瘥者小柴胡湯主之此二藥皆主腹痛治卒心腹痛桂樸散方桂去粗皮厚朴去粗皮生薑汁炙各三分吳茱萸湯洗焙乾醋炒半兩上三味搗羅為散每服二錢匕溫酒調下心腹卒脹痛論曰胃為水穀之海足陽明之脈也陽明之脈絡屬心心胃不和寒氣乘之則氣聚於胃中令水穀不化胃滿連心故心腹卒脹痛也治心腹卒痛如刺兩脅脹滿高良薑湯方高良薑二兩當歸切焙桂去粗皮各一兩半厚朴去粗皮生薑汁炙一兩上四味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日三治心腹卒脹痛吐痰不止半夏湯方半夏湯洗去滑焙甘草炙銼陳橘皮湯浸去白焙桂去粗皮各半兩人參白朮各一兩大腹皮並子兩枚微煨上七味銼如麻豆大每服三錢匕水一盞半入生薑三片煎至七分去滓空心溫服日再治冷熱相擊心腹卒痛不可忍當歸湯方當歸切焙高良薑厚朴去粗皮生薑汁炙各一兩半桃仁六十粒去皮尖雙仁麩炒研桂去粗皮一兩上五味粗搗篩每服三錢匕水一盞入生薑三片煎至七分去滓溫服日三治心腹卒㽲痛如刺胸脅脹痛厚朴湯方厚朴去粗皮生薑汁炙當歸切焙桂去粗皮高良薑芎藭各一兩上五味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日三治心腹受冷卒脹滿短氣㽲痛吳茱萸丸方吳茱萸湯洗焙乾炒乾薑炮附子炮裂去皮臍各一兩青橘皮湯浸焙乾炒細辛去苗葉人參各半兩上六味搗羅為細末煉蜜和丸如梧桐子大每服二十丸溫酒下不拘時候治心腹卒脹痛胸脅支滿欲死枳實散方枳實去瓤麩炒桂去粗皮各一兩上二味搗羅為細散每服二錢匕米飲調下治心腹卒脹痛桂心丸方桂去粗皮二兩烏頭炮裂去皮臍一兩上二味搗羅為細末煉蜜和丸如梧桐子大每服五丸米飲下漸增至七丸治心腹卒脹痛桃白皮湯方桃白皮銼一兩上一味以水三盞煎取一盞去滓頓服根皮亦佳治心腹氣滯卒脹滿悶柴胡湯方柴胡去苗二兩半赤茯苓去黑皮陳橘皮去白焙各二兩厚朴去粗皮塗生薑汁炙香熟一兩半紫蘇莖葉檳榔各三兩銼生薑去皮薄切焙乾五兩上七味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服如人行五里再服利動即效治心腹卒脹痛檳榔湯方檳榔銼碎十枚生薑去皮薄切焙乾陳橘皮湯浸去白焙枳殼去瓤麩炒甘草炙銼各三兩大黃銼炒木香各二兩上七味粗搗篩每服三錢匕水一盞煎至七分去滓溫服微利即效治心腹卒脹痛膈氣噎塞宿食不消大便秘澀神保丸方木香胡椒各一分巴豆十枚去皮心研乾蠍七枚炒上四味搗研為末湯化蒸餅丸如麻子大丹砂為衣每服三丸心膈痛柿蒂燈心湯下腹痛柿蒂煨姜煎湯下血氣痛炒生薑醋小便下小便不通燈心湯下血痢臟毒楮葉湯下肺氣甚者白礬蚌粉各三分鉛丹一分同研為散煎桑根白皮糯米飲調下二錢腎氣脅下痛蘹香子酒下大便不通蜜湯調檳榔末一錢下氣噎木香湯下宿食不消茶酒漿飲下腹痛論曰臟腑內虛寒氣客之與正氣相擊故令痛也又有冷積不散乍間乍甚為久腹痛者若重遇於寒則致腸鳴下利蓋腹為至陰之所居又為陰邪客搏故也治腹痛㽲刺除寒冷溫脾人參湯方人參附子炮裂去皮臍甘草炙各二兩乾薑炮裂大黃銼碎醋炒當歸切焙各一兩上六味銼如麻豆大每服五錢匕水二盞煎至一盞去滓溫服日三治冷氣腹痛引腰背脅下痛當歸湯方當歸切焙桂去粗皮各一兩半乾薑炮裂三分吳茱萸湯浸焙乾炒二兩半大黃銼碎醋炒人參各半兩甘草炙銼芍藥銼炒各一兩上八味粗搗篩每服三錢匕水一盞半煎至八分去滓溫服不拘時日二治卒寒腹痛拘急芎藭湯方芎藭當歸切焙甘草炙銼黃芩去黑心芍藥銼炒各一兩乾薑炮裂桂去粗皮各半兩杏仁去皮尖雙仁炒三十枚上八味粗搗篩每服三錢匕水一盞半煎至八分去滓空心日午臨臥溫服治氣攻心脅或冷結腹痛不下飲食高良薑湯方高良薑當歸切焙厚朴去粗皮生薑汁炙令煙出各二兩桔梗炒陳橘皮去白焙吳茱萸湯浸焙乾炒各一兩半桃仁去皮尖雙仁麩炒香十枚訶黎勒微煨去核五枚上八味粗搗篩每服五錢匕水二盞入生薑一棗大拍破同煎取一盞去滓溫服日三治腹中冷痛人參丸方人參桂去粗皮茯神去木黃耆銼木香炒牡蠣燒研如粉遠志去心炒甘草炙銼各半兩上八味搗羅為末棗肉丸如小豆大每服二十丸麥門冬湯下加至三十丸治積冷在心腹腹痛短氣胸背痛脅下有冷氣不能食如錐刀刺或如蟲食針灸不瘥狀如鬼神往來赤石脂丸方赤石脂乾薑炮裂附子炮裂去皮臍烏頭炮裂去皮臍人參桂去粗皮細辛去苗葉各一兩真珠研細半兩上八味搗研羅為細末煉蜜丸如小豆大每服七丸米飲下加至十丸日再治寒冷腹痛四物加黃耆芍藥湯方黃耆銼桂去粗皮乾薑炮芍藥銼炒各一兩甘草炙銼當歸切焙各一兩半上六味粗搗篩每服三錢匕水一盞半煎至八分去滓溫服空心日午臨臥各一治寒冷腹痛吳茱萸湯方吳茱萸水浸一宿曝乾人參桂去粗皮半夏湯洗去滑當歸切焙各一兩小麥一合甘草炙銼半兩上七味粗搗篩每服三錢匕水一盞半入生薑一棗大拍破同煎取八分去滓溫服空心晚食前各一治寒中腹痛四物當歸湯方當歸切焙一兩桂去粗皮甘草炙銼乾薑炮裂各一兩半上四味粗搗篩每服二錢匕水一盞煎至六分去滓溫服空心日午臨臥各一治久冷腹痛不止安息香丸方安息香研補骨脂炒各一兩阿魏研二錢上三味搗研羅為細末醋研飯為丸如小豆大每服十丸空心粥飲下腹虛脹論曰胃氣脹則令人腹滿不能食此蓋脾胃虛弱冷氣搏於陰經故胃脹滿塞而不能飲食其氣虛者但虛脹而膨滿於腹肋也治脾胃不和中寒虛脹人參湯方人參白茯苓去黑皮肉豆蔻去殼檳榔銼木香各一分白朮訶黎勒皮半生半炮陳橘皮湯浸去白焙各半兩蓬莪朮煨銼京三稜煨銼各一兩上一十味粗搗篩每服二錢匕水一盞生薑三片木瓜一片同煎至八分去滓熱服治心胸滿悶氣滯腹虛脹大腹湯方大腹子四枚銼檳榔二枚銼陳橘皮湯浸去白焙前胡去蘆頭桔梗銼炒半夏湯洗七遍切焙枳殼去瓤麩炒各一錢赤茯苓去黑皮一兩上八味粗搗篩每服二錢匕水一盞入生薑三片煎至六分去滓溫服不拘時候治腹虛脹分導滯氣分氣散方仙人枯骨一兩檳榔大者一枚銼防己白豆蔻各一分皂子雄者二百七十枚炮萊菔子炒青橘皮湯浸去白焙各半兩麝香研半錢牽牛子瓦上炒焦令作聲為度一兩上九味搗研為細散每服一盞匕煎大腹皮湯調下不拘時候和脾胃治虛脹化久滯進飲食木香三稜散方木香一兩京三稜煨銼四兩甘草炙銼三錢青橘皮湯浸去白焙一兩山芋白茯苓去黑皮各半兩上六味搗羅為細散每服一錢匕入鹽如茶點不拘時候治大瀉後虛氣心腹脹滿木香丸方木香一兩銼蠍梢炒四十九枚胡椒二百粒青橘皮湯浸去白焙陳橘皮湯浸去白焙各半兩萊菔子微炒草豆蔻各一分上七味搗羅為末酒煮麵糊丸如梧桐子大每服七丸煎橘皮湯下空心食前治心腹虛脹兩脅疼痛不欲飲食厚朴三稜丸方厚朴去粗皮為末生薑汁拌和銀器內炒乾六兩京三稜炮銼半夏湯洗七遍去滑炒乾檳榔銼各三兩上四味搗羅為末煮棗肉和丸如梧桐子大每服二十丸空心食前生薑湯下治中焦冷氣腹脹飲食不消吳茱萸丸方吳茱萸湯浸去滑焙乾桂去粗皮各一兩檳榔銼半兩陳橘皮湯浸去白焙三分上四味搗羅為細末醋煮麵糊丸如梧桐子大每服十五丸生薑湯下不拘時候治心