body:
  text: 卷第一百四十九蜂螫論曰蜂有大小故其螫人毒有輕重輕者或疼痛移時或經日而愈重者有至悶絶遍身皆腫當亟用咒禁之術以取速效仍以消毒等藥塗敷之治蜂螫毒不出痛不定蜜脂煎方白蜜臘月豬脂各兩匙許雄黃細研三錢上三味先將蜜並脂煎沸傾在瓷盆中入雄黃攪轉通口旋旋飲之治蜂螫疼痛蜂房膏方蜂房銼蒼耳各半兩上二味搗羅為末用藍青汁調厚塗螫處治蜂螫桑白皮塗方桑根白皮生者上一味搗取汁敷螫處治蜂螫楮皮塗方楮皮生者上一味取汁塗敷螫處治蜂螫定痛香津膏方齒垢上取少許敷痛處治蜂螫角灰散方牛角燒灰二兩上一味為散苦酒調敷痛處治蜂螫青蒿塗方青蒿生者一兩細切上一味搗研厚塗螫處治蜂螫消毒唾方瓦一小片上將就蜂螫處摩之唾二七遍訖其瓦卻安舊處治蜂螫牛灰散方牛屎燒灰上為散醋調敷之治蜂螫地面膏方地面上泥上以醋調敷之蜘蛛蜈蚣傷論曰凡蜘蛛蜈蚣所傷輕者焮腫疼痛甚則潰而成瘡自非外以藥塗敷內以藥疏導未易得愈治蜘蛛咬藍汁飲方藍葉洗切上一味絞取汁每服半盞麝香一字和服之治蜘蛛咬雄麝散方雄黃一分麝香一錢二味同研細上二味每用藍汁調少許塗咬處更飲少藍汁良治蜘蛛咬生瘡諸治不瘥棗柏膏方棗葉柏葉晚蠶沙上三味等分搗羅為末以生油和如泥先炙咬處後用藥塗之良治蜘蛛咬痛四神膏方皂莢蕪荑雄黃青鹽上四味等分為末和勻蜜調塗咬處頻易甚效治蜘蛛咬令人遍身生絲羊乳飲方上羊乳一味飲之愈貞元十二年劉禹錫偶至奚吏部宅中有客刑部崔從質因話此方云目擊有人為蜘蛛所咬腹脹大如有娠遍體生絲其家棄之乞食於道後遇僧教飲羊乳未幾而平復矣此方極妙治蜘蛛咬遍身成瘡立效方上以上好春酒任意飲之取醉使人翻轉身勿令一面臥恐酒毒腐人腸胃須臾蟲於瘡中小如粟米自出盡即瘥又方雄黃二分麝香一錢藍汁一大盞上二味細研令勻投於藍汁中以塗咬處立瘥若是毒蜘蛛咬即更細細服其藍汁神異之極治蜈蚣咬人方膩粉半兩麝香少許上二味相和研勻生薑汁調塗咬處治蜈蚣咬雞冠血塗方上以雄雞冠血塗之立止治蜈蚣咬痛附子膏方附子一枚生去皮臍上一味就沙盆內以醋少許磨濃用少許塗咬處治蜈蚣咬痛雄黃膏方雄黃研細一分上一味用桑根白皮自然汁調敷咬處治蜈蚣咬蒜汁塗方蒜洗切細研上以桑根白皮汁和塗咬處蠼螋尿瘡論曰世傳蠼螋尿人影能使人生瘡其狀如粟粒纍纍一聚磣痛如芒刺大者癗癗如茱萸子四圍赤中有白汁令人皮肉急惡寒壯熱治法或以犀磨塗之或畫蠼螋於地取所畫腹中土作泥塗之或治如火丹法蓋藥劑禳禬世所兼用不可偏廢也治蠼螋尿瘡鹿角膏方鹿角燒灰三兩上一味碾細以苦酒調塗之如瘡有汁者燒弊蒲席為末敷之治蠼螋尿瘡槐皮漿方槐白皮半斤切以苦酒二升浸半日上一味將酒洗瘡上日數次更將赤小豆為末以此酒調塗之治蠼螋尿瘡汁出疼痛茱萸膏方茱萸東行根洗銼上一味搗為末醋調敷之治蠼螋尿瘡汁出疼痛羊須膏方羚羊須不拘多少燒灰上一味研細以臘月豬脂和封之治蠼螋尿初著疼痛茶末敷方好茶末上一味用麻油調敷頻易之治蠼螋尿瘡香豉膏方豉半兩上一味為末醋調敷之瘡上治蠼螋尿瘡楝枝灰方楝枝燒灰上一味為末如瘡濕即干敷瘡乾醋調敷之治蠼螋尿瘡痛汁出小豆末敷方小豆上一味為末敷瘡上頻易治蠼螋尿瘡久不愈皂莢脂方豬牙皂莢上一味炙令脂出乘熱以脂塗之治蠼螋尿瘡大麥敷方大麥一合上一味細嚼塗瘡上治蠼螋尿瘡馬鞭草敷方馬鞭草一兩上一味搗末敷瘡上治蠼螋尿瘡甘草敷方甘草一兩上一味為末韭汁調敷之治蠼螋尿瘡犀角塗方犀角細屑上一味搗末水調塗之治蠼螋尿瘡方上宜畫地作蠼螋形以刀取畫蠼螋腹中土就所取處以唾和成泥塗瘡上即愈中水毒論曰夫中水毒其名有三中水中溪中灑其狀惡寒頭痛目疼心煩懊悶四肢振焮腰背骨節皆強或熻熻發熱神昏喜睡朝輕暮劇手足指冷二三日則生蟲下部生瘡不癢不痛人罕自覺苦不即治則便膿蟲毒上食五臟熱盛煩毒注下不過八九日死若手足指冷至一寸為微至肘膝為劇然治水毒有陰有陽其瘡正赤如截肉者陽毒也其脈緩大而數其瘡如鯉魚齒者陰毒也其脈沉細而遲陽毒雖急而易治法宜發汗陰毒雖緩而難治尤不可忽凡水毒惟山高及山峽溪源繚繞處多有之何者山高水冷日中始得陽氣故陰氣常積而水有毒亦猶廣南山高地下氣不疏通故鬱而為瘴水毒為多陰瘴氣為多陽多陽則熱結於中多陰則指節逆冷二者為病大體與傷寒相類欲辨水毒即以熱湯數斗蒜四升搗碎內湯中去滓洗浴若身體發赤斑者是水毒也此證劇則為洞利及齒間出血心腹煩滿下血如爛肝不食而狂皆熱毒變化而成也土人闢卻之法略與射工相似治中水毒手足指至肘膝下冷茱萸湯方吳茱萸湯洗焙乾五兩烏梅半兩犀角屑升麻陳橘皮湯浸去白焙各二兩上五味粗搗篩每服五錢匕生薑二棗大拍破水一盞半煎至八分去滓空腹溫服日三夜一治中水毒手足指俱冷烏梅湯方烏梅三兩去核熬上一味搗碎每服三錢匕水一盞煎至七分去滓不拘時頻服治中水毒手足指冷至肘膝水萍散方水萍不拘多少上一味曝乾搗羅為散每服二錢匕米飲調下早晨日午近晚各一服治中水毒寒熱升麻湯方升麻三兩龍膽葳蕤大青各一兩上四味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服未瘥頻服治中水毒寒熱水蓼酒方水蓼不拘多少上一味搗取汁每服一合酒半盞調勻服日三治中水毒桃葉飲方新桃葉不拘多少上一味旋搗取汁每服一盞飲之不拘時候治中水毒蒼耳汁方蒼耳不拘多少上一味搗取汁以綿沾汁導下部日三治中水毒桃梅飲方新桃葉新梅葉各半斤上二味洗搗取汁每服半盞飲之不拘時治中水毒溪毒寒熱如傷寒狀五加皮散方五加皮三兩洗切上一味搗羅為散每服一錢匕酒一盞調下日二夜一粥飲調亦得治中水毒溪毒如傷寒狀蔥白湯方蔥白一握切豉半升葛根二兩升麻三分上四味銼如麻豆大每服四錢匕水二盞煎至一盞去滓溫服移時又服治中水毒溪毒下部蟲蝕生瘡牡丹皮散方牡丹皮二兩上一味搗羅為散每服二錢匕酒一盞調下日三治中水毒溪毒下部蟲蝕生瘡葛藤洗方葛藤不拘多少上一味以水煮取濃汁洗下部並導灌入下部良治中水毒寒熱藍根塗方藍根並葉不拘多少上一味洗淨搗爛塗頭面及身上頻用為佳射工中人瘡論曰射工中人初未成瘡但惡風寒熱皮膚如針芒所刺漸漸成瘡始如豆粒痛如火燒證如傷寒或如中惡有不能言者身體苦強四肢拘急頭痛骨瘑口張多缺朝減暮甚三日齒牙出血須急治之過七日則危殆遠不過七日死射工一名蜮一名短狐其色黑狀如大蜚且有雌雄自春至秋常在澗水冬月則入土伏藏口吐溫氣霜雪在上不冰方其在水人因行水及浴則毒中之雨潦水漲隨水流入人家或道上人遇之則含沙射人影所以名射工者謂如蠼螋能射人影工巧必中故也又世傳射工口內有橫骨狀如弓弩以毒射人自此發也治射工中人惡風寒熱葛芋膏方野葛一升茵芋羊躑躅附子去皮臍生用丹砂研各一兩巴豆去皮心膜烏頭去皮臍生銼蜀椒去目各五合雄黃研大黃各二兩上一十味除研外搗為末以不著水豬膏三斤先入藥八味煎至三上三下去滓內丹砂雄黃末攪至凝取棗核大摩痛上勿近眼合此膏勿令婦人雞犬見治射工毒腫生瘡犀角散方犀角鎊甲香射干木香乳香研丁香黃連去須升麻鱉甲醋炙去裙襴牡蠣煅羚羊角鎊甘草炙銼黃芩去黑心各一兩黃柏去粗皮吳茱萸湯浸焙炒各半兩上一十五味除乳香研外搗羅為散和勻每服二錢匕水調下日三兼以雞子白調塗瘡毒良治射工中人寒熱鬼臼漿方鬼臼葉一把上一味細銼以苦酒漬之搗絞取汁一升頓服日三治射工中人生瘡黑如靨子或遍赤如刺痛日晡寒熱或如火灼不治殺人射干飲方射干升麻各二兩上二味細銼以水五盞煎至三盞去滓適寒溫一日盡服之其滓敷瘡上治射工中人狼牙漿方狼牙葉冬用根上一味搗絞取汁半升頓服以滓敷所中處治射工中人生瘡升麻湯方升麻一兩犀角鎊二兩射干一兩半上三味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治射工中人白雞屎塗方白雞屎白者二七塊上一味以湯和研塗所中處治射工傷人茱萸湯方生茱萸莖葉一握上一味細銼熟搗以水二盞煎至一盞去滓頓服治射工毒犀角塗方犀角不拘多少上一味以水磨塗所中處又取為細末與麝香同研水調一錢匕服之治射工傷人敷瘡皂莢膏方皂莢一梃長一尺二寸者上一味椎碎以醋一升煎如餳去滓敷瘡上又方馬齒莧不拘多少上一味爛搗取汁飲一盞又爛搗敷毒上日四五易治射工中人寒熱瘡痛赤莧飲方赤莧不拘多少莖葉都用上一味搗爛絞取汁飲三合日四五服良治射工中人瘡痛芥子塗方芥子五合上一味搗爛醋和厚塗於瘡上半日痛止治射工中人去毒方胡蔥不拘多少上一味細切爛搗以拓瘡上灸十壯即瘥一方云葫蒜治射工中人生瘡方蜈蚣一條上一味燒灰搗羅為末醋和敷瘡上溺水死論曰凡人沉溺水中水入腹則令氣閉暴絶而死救治之法宜泄其水使氣得通則可復活若救之後時水不得出心下不溫者難治古法或經半日及一日猶有可療者謂其氣雖絶心下猶溫則亦可救也治溺水死已經半日方上取大甕覆地以溺死人腹伏甕上以微火於甕下燃之正對死人心下須臾死人心下暖口中水出盡則蘇勿令過熱治溺水死導水方上取皂莢末水丸如胡桃大綿裹納下部中伏面向下須臾水從鼻口中出仍多取灰復借水盡即活治溺死導水方上如經宿取皂莢搗羅為末以棗瓤為丸如彈子大納下部中水即出治溺死松油灌方上取松子油一盞灌入口中即活治溺死蔥汁導水方上取不襴皂莢搗羅為細末以蔥白研絞取汁和丸如棗核大納下部中效治溺死經宿灸之得活方上解死人衣灸臍中治溺死酒灌得活方上倒垂死人以好酒灌鼻中又灌下部或以醋灌鼻中亦得治溺死瀝水得活方上倒背死人兩足負之而走得吐水即活治溺死鹽導得活方上以灶中灰布地令厚五寸以甑側著灰上令死人伏於甑上使頭小垂下抄鹽二方寸匕內管中吹入口中即當吐出水乃去甑下死人著灰中以壅身勿令遮鼻口即活治溺死灰滲得活方上掘地作坑傾數斛灰暖坑中下死人覆灰上濕徹即易之灰勿大熱恐爆人灰冷更易半日即活治忽溺水死者方上倒臥瀝卻水便於肚上多著灰掩了仍以皂莢末吹鼻中即活治溺死取水方上取死人面向甕垂其頭使口水出良治溺死吹耳得活方上解溺人衣去臍中垢極吹兩耳良治溺死沙滲得活方上炒沙復死人上下但出鼻耳沙濕即易之治溺死石灰壅之得活方上取石灰壅之候下部中水出盡即活治冬月落水凍四肢直口噤尚有氣者方上炒灰使暖盛以囊薄其心上冷即易心暖氣通目得轉口乃開溫小便及粥清稍稍灌之即活若不先溫其心便持火炙身冷氣與火氣爭則死治溺死葦火熏之得活方上取大甑以死人伏其上口臨甑口燃葦火二七把燒甑中當死人心下令煙出微入死人鼻口中候水出盡則活火盡復益之令死人心下得暖猝無甑者於岸側削地如甑空下如灶燒令暖以死人著上勿令隱其腹更令死人頭低使水得出為妙並以灰數斛令暖復之冷即易治溺死灰埋得活方上但埋死人暖灰中頭足俱沒唯開七孔自縊欲死論曰仲景云凡自縊死心下微溫者一日猶可活葛氏云心下尚微溫雖久猶可活二家所論必須有暖氣陰陽未盡根本尚存則可以救苟非此雖死未久必不活也大抵自縊以升降出入之氣暴絶不通若解其繩有法者固有復生之理解失其理體雖尚溫不能無害所謂救經引其足也仲景葛氏各有辨證並解繩法宜詳審之辨自縊死解繩法凡自縊若覺才死徐徐抱下其陰陽經絡雖暴壅閉而臟腑真氣尚或未盡所以猶可救療若見其垂掛忽遽截斷其繩則不可救此言氣已壅閉繩忽暴斷其氣雖通而奔迸氣不能還即不復得生又云自縊死旦至暮雖已冷必可活暮至旦則難療謂其晝則陽盛其氣易通也夜則陰盛其氣難通也又云夏則夜短又熱則易活又云氣雖已斷而心下微溫一日以上猶可活也蓋夏時夜短於晝又熱猶應可療心下微溫者一日以上猶可活然皆徐徐抱解不得截繩上下安被臥之一人以腳踏其兩肩手小挽其發常弦弦勿縱之一人以手按據胸上微動之一人摩捋臂脛屈伸之若已僵但漸漸強屈之並按其腹如此一炊頃氣從口出呼吸眼開而猶引按莫置亦勿苦勞之須以少桂心湯及粥清含與之才令濡喉漸漸能咽乃稍止耳兼令兩人各以管吹其兩耳彌好此最善無不活者辨自縊死心下尚微溫雖久猶可活法徐徐抱解其繩不得斷之懸其發令足去地五寸許塞兩鼻孔以蘆管納其口中至咽令人噓之有頃其腹中礱礱轉者是氣通也其舉手撈人當益堅捉持更遞噓之若活了能語乃可置耳若不得掛發可中分發繞兩手牽之治自縊死心頭微溫者吹鼻救之方上用皂莢末蔥葉吹兩鼻孔中逆出復納之治自縊急救之方上急手掩其口鼻勿令內氣稍出二時許氣至即活治自縊急救方上牽起其頭髮以物塞兩耳仍以蔥葉刺鼻中兩人極力痛吹之齧其兩腳跟即活亦可塞鼻而吹其口亦活也治自縊死方上以藍青汁灌之又極須安定身心徐徐緩解慎勿割繩抱取心下猶溫者刺雞冠血滴口中即活男用雌雞女用雄雞治自縊死方上提其頭髮令足才至地一時許即活治自縊松子油方上以松子油納口中令得入咽中便活治自縊死酒灌之方上以雞屎白棗許大酒半盞和灌之口鼻中即活治自縊死救急方上以梁上塵如豆大各納一筒中四人各一筒同時吹兩耳鼻中極力吹之即活治自縊死救之未活以車載之法上以絹急絞身體令堅以牛車載行三十里許使人於車上行踏肩引發如前治自縊心微溫者急救之方上以罽衣若氍㲣厚氈物覆其口鼻抑之令兩人極力吹其兩耳一炊頃可活也
