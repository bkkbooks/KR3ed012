body:
  text: 卷第一百八十四乳石發身體腫論曰石發而身體腫者以食飲過溫不能勞動致熱氣蓄壅於肌肉不得宣散故也亦有外感風濕內有停水與石勢相搏其氣滯塞致浮腫者然食飲過溫不自勞動其為腫也但體熱虛腫而已若風濕停水而發腫則必心中煩滿小便澀不可不辨也治乳石發熱腫初覺壅宜服升麻湯方升麻大黃銼碎微炒黃芩去黑心枳實去瓤麩炒芍藥各二兩甘草炙當歸切焙各一兩上七味粗搗篩每服三錢匕以水一盞煎至七分去滓溫服治乳石熱腫茯苓湯方赤茯苓去黑皮淡竹葉一握切碎白朮甘草炙枳實去瓤麩炒人參梔子仁各一兩大黃銼炒二兩黃芩去黑心三兩上九味粗搗篩每服三錢匕水一盞煎至七分去滓溫服治鍾乳發寒熱胸中壅塞面腫手足煩疼生麥門冬湯方生麥門冬去心焙一兩豉微炒一合上二味粗搗篩每服三錢匕水一盞蔥白三莖拍碎同煎至六分去滓空心溫服治乳石發熱堅腫芍藥湯方芍藥枳實去瓤麩炒大黃銼炒升麻各二兩當歸切焙一兩上五味粗搗篩每服三錢匕水一大盞煎至七分去滓溫服空心食前日午各一服治服石人水氣內積面目骽膝腫硬小便澀木通湯方木通銼桑根白皮炙銼各半兩桔梗銼炒赤芍藥各三分葶藶子隔紙炒白茅根微炒各一兩上六味粗搗篩每服五錢匕水一盞半煎至七分去滓空腹溫服日再治服石人風濕外搏水飲內停身面微腫小便澀紫蘇子丸方紫蘇子微炒一合半陳橘皮去白焙杏仁去皮尖雙仁炒赤茯苓去黑皮防己各一兩葶藶隔紙炒三分上六味搗羅為末煉蜜丸如小豆大每服十五丸加至三十丸空心用桑根白皮赤小豆煎湯下日再治服石人水氣內積面腫赤茯苓散方赤茯苓去黑皮牽牛子炒各一兩半枳殼去瓤麩炒陳橘皮去白炒甘草炙各三分上五味搗羅為散每服二錢匕如茶點服不拘時治乳石發動上攻頭面浮腫硝石湯方硝石萆薢防風去叉黃連去須炒大黃銼炒甘草炙銼枳殼去瓤麩炒各一兩地榆銼羌活去蘆頭龍骨代赭煅桑根白皮銼焙各一兩半桂去粗皮黃芩去黑心各半兩石葦去毛二兩上一十五味粗搗篩每服五錢匕水一盞半入生薑三片同煎至八分去滓溫服治乳石發熱初欲作腫石燕子淋洗方石燕子七枚上一味粗搗篩以水三升煮取二升頻淋洗癰腫處以瘥為度治乳石發動周體患腫不能迴轉者為久坐不行又飲酒藥氣滯在皮膚之內血脈不通也方上宜飲酒冷水洗自勞即瘥若不能行者遣人扶持強行使肢節調暢乃止亦不得過度使反發熱倘反熱者還當洗之治乳石發動四肢面目浮腫者為飲食溫久不自勞力藥與正氣相隔也方上但飲熱酒冷食自勞及洗浴即瘥治乳石發動腹背熱如手如杯如盤許大者方上但以冷石隨熱處熨之乳石發上氣喘嗽論曰乳石之發如火炎上熱氣騰湧熏蒸胸膈入於肺中氣壅不散使人胸滿短氣上喘咳嗽不得安臥治乳石發肺脹氣急呀嗽喘粗不得安臥紫菀湯方紫菀去苗土一兩半甘草炙半兩赤茯苓去黑皮一兩半檳榔銼五枚葶藶子紙上炒一兩上五味粗搗篩每服三錢匕水一盞煎至七分去滓空心溫服治乳石發熱沖頭面口乾喘嗽麥門冬湯方生麥門冬去心焙葳蕤去根石膏碎各二兩葛根銼三兩上四味粗搗篩每服五錢匕水一盞半入蔥白三莖切同煎至一盞去滓入生地黃汁二合更煎三兩沸食後分溫二服日再治乳石發上氣肺熱呀嗽多涕唾貝母湯方貝母去心一兩麥門冬去心焙三兩杏仁湯浸去皮心雙仁炒二十枚生薑切焙石膏碎各一兩黃芩去黑心半兩甘草炙銼一兩五味子白朮銼各半兩淡竹葉一握切上一十味粗搗篩每服五錢匕水一盞半煎至一盞去滓下蜜二錢攪勻空心溫服若取利入芒硝一字湯成下治乳石上氣呀嗽不得臥臥即氣絕葶藶丸方葶藶子紙上微炒半兩蕓薹子揀淨馬兜鈴銼紫菀去苗土人參各一兩杏仁湯去皮尖雙仁炒二十枚皂莢酥炙去黑皮並子半兩白前甘草炙銼防己各一兩上一十味搗羅為末煉蜜和搗令熟丸如梧桐子大空心米飲下二十丸治乳石發定肺氣止喘嗽天門冬煎方天門冬去心絞汁二兩生地黃絞汁四兩生薑去皮絞汁二兩杏仁湯去皮尖雙仁研如膏二兩白蜜二兩牛酥三兩百部款冬花紫菀去苗土麻黃去根節別搗各二兩升麻三兩甘草炙二兩上一十二味將後六味各搗為末先以水五盞煎麻黃末三錢匕去沫下五藥末五錢匕煎至四盞絞去滓澄濾於銅器中以微火煎至三盞次下天門冬汁地黃汁各二合更煎減至二盞下薑汁二合更煎減至一盞下杏仁膏酥蜜等各半合攪令勻稠置不津器中每服取半雞子殼許含化咽津日四五服治乳石發熱喘嗽方豉二合上以水三盞漬取汁分溫三服早晨日午晡時各一服服訖臥少時乳石發嘔逆論曰石性勇悍凡服食過度將適失宜而又脾胃不和谷不能勝則其氣上攻所以發嘔逆也治乳石發動熱氣上攻脾胃不和嘔逆食不下茯苓湯方赤茯苓去黑皮陳橘皮湯浸去白焙黃耆銼枇杷葉拭去毛微炙各三分前胡去蘆頭枳殼去瓤麩炒大黃銼炒蘆根銼各一兩麥門冬去心焙一分甘草炙銼半兩上一十味粗搗篩每服五錢匕水一盞半入生薑五片青竹茹一分煎至八分去滓食後臨臥溫服治乳石發結熱癖心下腫胸中痞塞嘔逆不止雁肪湯方雁肪一具先煮過當歸切焙大黃銼炒桂去粗皮各二兩芍藥一兩半人參石膏碎甘草炙銼各一兩桃仁二十枚湯浸去皮尖雙仁炒研上九味除雁肪外粗搗篩先將雁肪以水七盞煎取汁五盞去雁肪每服用汁二盞藥末四錢匕更入桃仁七枚棗一枚拍碎煎至一盞去滓入芒硝少許更煎三兩沸空心溫服日午再服若熱盛者日四服如無雁以白鴨代之如無白鴨以烏雞代之治乳石發嘔服藥不效三黃湯方豉三合新綿裹線纏作袋子梔子仁半兩枳實去瓤麩炒二兩甘草炙銼前胡去蘆頭大黃銼炒各一兩上六味除豉外粗搗篩每服四錢匕水二盞和豉袋子同煮至一盞後入芒硝一錢匕再煎一二沸去滓空心溫服治乳石發動虛熱痰飲嘔逆飲食不下栝蔞根湯方栝蔞根麥門冬去心焙人參甘草炙黃芩去黑心各半兩半夏湯洗七遍去滑蘆根銼各一兩前胡去蘆頭三分上八味㕮咀如麻豆每服五錢匕水一盞半入生薑五片煎至八分去滓溫服不拘時候治乳石發動煩悶嘔逆人參湯方人參白朮栝蔞根甘草炙銼各二兩黃芩去黑心一兩上五味粗搗篩每服四錢匕水二盞煎至一盞去滓分溫二服早晚食前各一治乳石發熱乾嘔煩熱半夏湯方半夏湯洗去滑切焙一兩白薇炒二兩乾薑炮甘草炙銼各半兩上四味粗搗篩每服三錢匕苦酒一盞煎至五分去滓溫服治乳石發動煩悶嘔逆人參湯方人參甘草炙銼麥門冬去心焙黃芩去黑心蘆根去土銼焙栝蔞銼炒各一兩上六味粗搗篩每服三錢匕水一盞煎至七分去滓空心溫服治乳石發嘔不止食不下薤白飲方豉微炒四合陳橘皮湯浸去白焙一兩麥門冬去心焙二兩粟米半合上四味粗搗篩每服五錢匕水二盞入薤白二莖拍碎煎至一盞去滓溫服早晚各一治乳石發動乾嘔枳殼湯方枳殼去瓤麩炒五兩梔子仁七枚豉微炒二合大黃銼炒二兩上四味粗搗篩每服四錢匕水二盞煎至一盞去滓溫服空心晚後各一強壯者加大黃一兩治乳石發嘔不息方薤白一握上一味碎切以水三盞煎至一盞去滓溫服治乳石發嘔逆咽喉中傷清血出者此因臥溫及食熱所致方上以冷水飲之或以冷石熨咽喉即瘥治乳石發胸脅滿氣上逆此因失飢不食藥氣上衝所致方上速與冷水洗之或以冷飯食之即瘥乳石發霍亂轉筋論曰乳石發霍亂轉筋者以服食失度陰陽不和清濁相干也蓋服石之人腑臟多熱熱即引飲及其飢飽食又過多水穀既傷腸胃不納下為泄利上為吐逆又為䐜脹吐利不止塞氣益甚則為轉筋食飲藥劑當調以溫和使石熱平息氣道下降則病可愈治乳石發霍亂轉筋不止香薷湯方香薷三分木瓜乾者去瓤人參陳橘皮湯浸去白焙厚朴去粗皮生薑汁炙熟各一兩桂去粗皮半兩上六味粗搗篩每服五錢匕水一盞半入生薑半分切煎取八分去滓溫服不計時候治乳石發霍亂吐利轉筋木瓜湯方木瓜大者一枚去瓤薄切倉粳米一合上二味以水二盞煎取一盞去滓時時溫服一合治乳石發霍亂吐利不止及轉筋糯米飲方糯米淘淨三合上一味細研以少許清水攪如乳狀頓服立止治乳石發霍亂轉筋及心腹痛高良薑湯方高良薑銼半兩桂去粗皮一兩木瓜乾者去瓤二兩上三味粗搗篩每服三錢匕以水一盞煎取七分去滓溫服不計時治乳石發霍亂吐利轉筋棠梨木瓜湯方棠梨枝一握木瓜大者一枚去瓤上二味細銼分四服每服以水一盞入生薑五片煎取七分去滓熱服不計時治乳石發轉筋不吐不下氣急桑葉飲方桑葉切二兩上一味以水五盞煎至一盞半去滓分溫二服早晚各一治乳石發吐利轉筋氣急高良薑飲方高良薑銼五兩上一味粗搗篩每服三錢匕以酒一盞煎至六分去滓溫服早晚食前各一亦療暴腹痛惡血氣急治乳石發霍亂轉筋氣急木瓜飲方木瓜一枚去皮子切焙乾上一味銼如麻豆大每服三錢匕以水一盞半煎至八分去滓溫服飲盡更作無木瓜只以枝葉並根代之治乳石發吐利不止轉筋入腹欲死方生薑半兩切上一味以酒一盞煎五七沸去滓頓服之治乳石發動霍亂疼痛不可忍方食茱萸淘淨炒香二兩上一味以酒三盞煎至一盞半分為二服得下利即瘥空腹食前各一治乳石發霍亂轉筋入腹方雞屎白半兩上一味搗羅為末每服二錢匕空腹以溫水半盞調頓服之良乳石發痞結羸瘦論曰陰氣積於下陽氣盛於上升降不時則成痞結羸瘦況服乳石者飲食不節將適失度熱氣熾於上陰陽隔而不通水穀之氣不能潤養肌體則肌肉枯燥胸膈痞塞腸胃脹滿久則正氣衰微日益羸瘦固其宜也治法當升降痞膈調適陰陽如此則痞者通石勢息也治乳石熱盛虛弱痞結羸瘦調順陰陽去熱益氣黃耆湯方黃耆銼人參生乾地黃焙甘草炙銼白芍藥各二兩桂去粗皮黃芩去黑心赤茯苓去黑皮各一兩升麻三兩上九味粗搗篩每服五錢匕水一盞半棗三枚擘破生薑三片同煎數沸次下竹葉七片更煎三二沸去滓取一盞空心溫服日再治乳石發後虛熱羸乏胸膈痞滯心腹脹滿或腰痛腎瀝當歸湯方當歸切焙甘草炙銼芎藭遠志去心麥門冬去心焙芍藥赤茯苓去黑皮各二兩生乾地黃焙四兩黃芩去黑心桂去粗皮各一兩五味子三兩上一十一味粗搗篩每服五錢匕先以水五盞入白羊腎一隻去筋膜切煎至三盞去腎下藥入生薑一棗大拍碎大棗三枚擘破更煎至二盞去滓分溫二服空心食前治乳石發體黃瘦不能飲食心腹痞結起居腰背急痛嗜臥半夏湯方半夏湯浸七遍焙黃芩去黑心土瓜根各二兩赤茯苓去黑皮三兩桂去粗皮枳殼去瓤麩炒白朮各一兩上七味粗搗篩每服五錢匕水二盞生薑一棗大拍碎棗二枚擘煎至八分去滓溫服不拘時治乳石發動心膈痞滿喘息微促腹脅妨悶疼痛大腹湯方大腹皮一兩銼木香枳殼去瓤麩炒赤芍藥甘草炙銼各半兩前胡去蘆頭陳橘皮湯浸去白焙赤茯苓去黑皮各三分上八味粗搗篩每服三錢匕水一盞生薑一棗大拍碎煎至七分去滓溫服不拘時治乳石發動心膈痞滿腹內妨痛不思飲食桔梗湯方桔梗銼炒枳實麩炒白朮各二兩梔子仁一兩甘草炙銼半兩上五味粗搗篩每服五錢匕水一盞半生薑一棗大拍碎煎至八分去滓溫服不拘時乳石發心腹脹滿論曰乳石發心腹脹滿者以飲食居處