李藥物忌烏頭附子天雄蒼耳等悉宜消息以取安平且服石將慎至難不能將息不若勿服蓋背折腦裂髮乳體腫之疾往往因此得之故耳服乳石後將慎紫麵食方上取烏豆不拘多少煮取濃汁代水和麵依常法作麵食還向此豆汁中熱煮干則添豆汁勿加水候熟入豬羊綠豆等臛食之和山芋作面尤佳又水摸餅方上作餅欲上𨫼時以水塗摸生餅上表裡爆之切勿食胡餅燒餅等大壅熱故也又宜食麵餅方上取面拌如常餅法細切如小豆大以面於簸中拌令如丸煮極熟干漉出置冷水中又漉出置盤中以粉再拌麵圓內鐺中煮令極熟乘熱任以五味汁及諸肉臛食之大涼補腰腳於藥無犯又方上取新大麥為面和肉汁及作餅食甚良又大麥熟蒸為餅和黑豆相拌食良夏日冒熱遠行食晚失飢石必發動宜作大麥餅將行飢即食之壓石療飢甚妙治乳石發動寒慄顫掉不自支持者為食少藥氣溢於肌膚五臟失序百脈搖動與正氣相競方上宜強飲熱酒以和其脈藥強食以定其臟強行以調其關節強洗以宣其壅滯乳石發諸藥不治者論曰乳石發動各有方劑以對病證固有疾勢異常諸藥所不能治者乃別敘備用之法治乳石發動諸藥不效宜服葳蕤酒方葳蕤升麻薺苨人參各三兩大黃銼炒二兩黃芩去黑心葛根銼紫草去蘆頭犀角鎊各四兩梔子仁芒硝各二兩銀屑二兩半豬脂臘月者三兩露蜂房五兩甘草炙銼二兩大豆浸一宿曝乾炒去皮一合上一十六味除豬脂銀屑外搗羅為細末以無灰酒二升密封漬經一宿次將豬脂用好酒一升煉開以銀屑相和研入前藥酒內更浸一宿每服取酒一二盞飲之治乳石發動諸藥不治單服豆豉酒方醇酒一升豉五合上二味同煮沸熱澄清旋飲一盞治乳石發諸藥療不瘥方硝石明白者一塊如杏子大上一味不拘時逐旋含化咽津治一切乳石發胡豆汁方胡豆半升上一味以水五盞與胡豆同研生絹絞取汁每服半盞不拘時服治乳石發大麥炒方大麥搗去皮淨以水淘七遍漉出蒸令香熟焙乾更炒令香一升上一味搗羅為細炒每服三錢匕化蜜水調服早晨日午晚後各一治乳石熱氣結滯經年數發胡荽飲方胡荽五月五日採預收陰乾半斤春夏採葉秋冬採根上一味以水七升煮取一升半去滓每服一盞不計時候日三治乳石發動口乾寒熱似鬼為病諸藥不治者麥門冬丸方麥門冬八分去心五加皮犀角屑黃芩各四分葳蕤四兩梔子四分升麻四兩大黃五分芍藥四分大青甘草炙各三分苦參六分上一十二味搗為末煉蜜為丸如梧桐子大每服十五丸至二十丸食後蜜水送下日三以意加減治乳石發熱困諸藥不效者方豬脂五合成煉者芒硝四分蔥白五合切豉心三合上四味以水三升煮蔥豉取一升半濾去滓下豬脂芒硝二味再煎一沸分五服以瘥為度治丹石發方河中石一兩上一味燒令通赤投於童子小便一盞內候溫去石飲之治一切丹石發方寒水石一塊上一味如杏子許大含之以瘥為度治一切丹石發方黃連去須二兩上一味搗羅為細末以水三盞浸經一宿漉去滓每服半盞時時飲之治一切石發方生冬瓜去皮研爛四兩上一味以水五升煮至三升去滓分溫三服早晨日午近晚各一治乳石發枸杞煮汁方枸杞白皮半斤銼碎上一味以水五升煮取三升空心任意飲之治乳石發煮薺苨汁方薺苨半斤細銼上一味以水五升煮取三升空心飲之治諸乳石散發不可忍欲下之方肥豬肉二斤蔥白薤白各四兩上三味切一處蒸令熟空心食盡良未少頃再食
