向上以艾炷灸七壯每日勿絶以瘥為度治久聾滴耳鼠脂方鼠脂半合青鹽一錢蚯蚓一條系頭捻取汁上三味以鼠脂蚯蚓汁調青鹽湯溫以綿蘸側臥捻滴耳中繼塞耳孔即瘥治久聾滴耳水銀方水銀一分蚯蚓生者一條上二味就樓蔥叢內以一莖去尖頭入水銀蚯蚓在內即系卻頭勿令傾出候蚯蚓化為水即取滴耳中立愈治久聾耵聹灌耳桂心膏方桂去粗皮二兩野葛一兩上二味細銼以銅器盛入成煉雞肪五兩微火煎三五沸去滓密貯勿令泄氣以小竹筒盛棗核大火炙令熱仰傾灌耳中十日耵聹自出久聾者不過二十日瘥乃以發裹膏深塞之勿使泄氣五日後去之五聾論曰五聾不同曰風聾曰干聾曰勞聾曰虛聾曰聤聾是也腎氣通於耳足少陰其經也經虛受風邪及勞傷血氣停滯津液皆能致聾惟所受不同故其證各異葛氏所謂風聾者痛掣干聾者生耵聹勞聾者出黃汁虛聾者肅肅作聲聤聾者膿汁出可不辨哉治五聾鳴鬧不聞人聲出黃水黃耆湯方黃耆銼一兩半附子炮裂去皮臍一兩菖蒲米泔浸一宿銼碎焙乾一兩磁石醋淬一七遍三兩木通銼白茯苓去黑皮五味子熟乾地黃焙防風去叉玄參人參各一兩一分杜仲去粗皮炙銼一兩上一十二味銼如麻豆每服五錢匕以水一盞半生薑半分拍碎大棗二枚劈破同煎至一盞去滓溫服續吃羊腎粥助之日四五服不計時候治風聾雄黃散方雄黃半兩研丹砂三分研丁香一分桂去粗皮一分乾蠍去足炒半兩烏蛇酒炙用肉半兩硫黃一分研天麻人參各半兩山芋一分天南星炮三分白附子炮一分麝香三分研檳榔三枚煨銼木香一分麻黃去根節半兩上一十六味搗研為散再羅令勻每服二錢匕溫酒調服治勞聾內神丸方熟乾地黃焙桂去粗皮各一兩山芋一兩半附子炮裂去皮臍一兩柴胡去苗三分遠志半兩去心胡黃連一分鍾乳二兩鵝管者鹿茸去毛酒炙肉蓯蓉酒浸切焙各一兩人參三分白茯苓去黑皮一分細辛去苗葉半兩上一十三味先用甘草水煮鍾乳三日研三日了後方搗諸藥為末卻與鍾乳同研二日用細絹羅過煉蜜和丸梧桐子大每日空心用溫酒下二十丸日再服治干聾生耵聹上都挺下乃挺切耳垢也不可出方蚯蚓不以多少上一味取自死者安蔥葉中面封頭蒸之令熟去面取出搗研如泥取汁灌耳中滿即不過數灌即挑易出瘥後發裹鹽塞之治聤聾有膿散方烏賊骨釜底墨龍骨伏龍肝各半兩附子一兩禹餘糧六銖上六味搗羅為細末取皂莢子大綿裹內耳中日一易取瘥不瘥者必有蟲加麝香一豆大治聤聾膿水不絶宜用此方白礬半兩燒灰麻勃一分木香一分松脂一分花煙脂一分上五味搗羅為細末每用時先以綿子淨拭膿後滿耳填藥效治耳聾氣塞不通時作聲用附子方法生附子尖一枚削作小棗核大上一味以綿裹置耳內耳聾有膿論曰耳聾有膿者蓋腎臟虛勞傷血氣與津液相搏熱氣乘之則結聚於耳中腐化膿汁氣不開竅則致耳聾治耳聾出膿黃耆丸方黃耆銼升麻梔子仁犀角鎊玄參木香黃芩去黑心芒硝各一兩半乾薑炮芍藥人參各一兩大黃銼炒二兩上一十二味搗羅為末煉蜜丸如梧桐子大每服二十丸至三十丸煎枸杞根湯下食後良久服治耳聾出膿疼痛附子丸方附子炮裂去皮臍菖蒲米泔浸一宿銼焙礬石熬令汁枯萆麻子仁研松脂研各一兩杏仁去皮尖雙仁炒二兩染煙脂半兩上七味搗研為末熔黃蠟和拈如棗核大針穿一孔子令透塞耳中日一換之治耳聾有膿禹餘糧散方禹餘糧煅醋淬一分烏賊魚骨去甲伏龍肝龍骨各半兩附子炮裂去皮臍一兩上五味搗研為散每以一錢綿裹塞耳中日一易取瘥為度如有蟲加麝香一黑豆大一方加鐺墨半兩治耳膿久不瘥蠶香散方蠶紙已出者燒灰烏賊魚骨去甲染煙脂各一錢麝香研半錢上四味搗研為散滿塞耳中不動候自落未瘥再用治耳聾有膿水不絶臭穢方肉蓯蓉一兩龍膽一兩白茅根一兩上三味共燒為灰研細以少蜜和令勻後入鯉魚膽汁三枚攪令稀即以絹捩取汁瀝入耳中其捩干滓捻作挺子以薄綿裹塞耳不過三兩上愈治腎熱耳聾有膿血溜日夜不止方鯉魚腦一枚鯉魚腸一具烏麻子一升上三味先搗烏麻令碎次入二味相和微火熬以暖布裹薄耳兩食頃開之當有白蟲出復更作藥若兩耳並膿分藥於兩耳中用若一耳即於一面薄之不過三度瘥治耳聾有膿水不止方麻子一合花煙脂一分上二味共研為細末滿耳塞藥以綿輕搵三兩上愈又方礬石熬令汁枯一兩鉛丹炒一錢上二味同研勻細每用半字滲入耳中又方地骨皮半兩五倍子一分上二味搗為細末每用少許滲入耳中治耳內膿水疼痛不止礬黃散方礬石晉州者熬令汁枯半兩雄黃好者一分上二味同研極細每用手指甲挑半字先以綿枚子拭耳內令乾卻滴生麻油一二點入耳內仍以綿枚子惹藥末在耳中不拘久近只一二度瘥治耳內出膿水二聖散方白附子炮羌活去蘆頭各一兩上二味同為細散用豬羊腎各一隻切開每隻入藥末半錢不得著鹽濕紙裹煨熟五更初溫酒嚼下續吃粥壓治耳聾膿出久不瘥速效散方地龍一條盛在白蔥管內當門挂陰乾上一味同麝香少許研為細散滲在耳中治耳聾出膿或有蟲魚醋膏方鯉魚腸一具切醋三合上二味合搗如膏取少許綿裹塞耳二食頃當悶痛或白蟲出即易之蟲盡乃止治耳聾有膿桂骨散方桂去粗皮魚骨各一兩上二味合搗為散滲入耳中瘥耳虛鳴論曰耳者心之寄竅腎氣所通也腑臟和平則其竅通而無礙腎氣既虛風邪干之復以思慮勞心氣脈內結不得疏通則耳內渾焞與氣相擊而鳴或如鐘磬雷鼓或如蟬噪皆腎虛所致也治腎氣虛弱氣奔兩耳作聲甚則成聾磁石散方磁石煅醋淬七遍熟乾地黃焙菖蒲米泔浸一宿銼焙牡丹皮白朮各一兩附子炮裂去皮臍白茯苓去黑皮人參芎藭大黃銼炒牡荊子微炒桂去粗皮當歸切焙桑螵蛸切破炙各半兩羊腎一對薄切去筋膜炙乾上一十五味搗羅為散每服一錢匕溫酒調下日三加至二錢匕不拘時治耳內虛鳴保命丸方熟乾地黃焙肉蓯蓉酒浸切焙桂去粗皮附子炮裂去皮臍丁香菟絲子酒浸別搗人參各一兩白豆蔻去皮木香檳榔銼甘草炙各半兩鹿茸去毛酒浸一宿酥炙白茯苓去黑皮蒺藜子炒去角各三分上一十四味將十三味搗羅為末入菟絲末再羅煉白蜜丸如梧桐子大每服十五丸空心食前溫酒下漸加丸數治男子患耳內虛鳴腰腎疼痛髀膝風冷食飲無味肉蓯蓉丸方肉蓯蓉酒浸切焙石斛去根白朮五味子桂去粗皮巴戟天去心防風去叉人參各二兩白茯苓去黑皮澤瀉山茱萸各三兩熟乾地黃焙磁石煅醋淬七遍各四兩上一十三味搗羅為末煉蜜丸如梧桐子大每服三十丸空心食前服溫酒下治腎虛耳內作聲或如蟬噪或如風水聲診其左手尺脈微而細右手關脈洪而大是其候也石斛丸方石斛去根黃耆銼鹿茸去毛酒浸一宿酥炙地骨皮附子炮裂去皮臍各一兩菟絲子酒浸別搗山茱萸各一兩一分遠志去心熟乾地黃焙菖蒲米泔浸一宿銼焙防風去叉各三分桂去粗皮半兩玄參一兩上一十三味將十二味搗羅為末入菟絲子末再羅煉蜜丸如梧桐子大每服三十丸空心溫酒下以瘥為度此藥妊娠人去桂附加蜀椒三分丹參半兩治腎虛耳數鳴而聾補腎黃耆湯方黃耆銼人參紫菀去土甘草炙銼防風去叉當歸切焙麥門冬去心焙五味子各一兩乾薑炮桂去粗皮各二兩芎藭一兩半上一十一味粗搗篩每服五錢匕先以水三盞煮羊腎一隻至一盞半去腎下藥入蔥白三寸切大棗三枚劈破煎至八分去滓空心食前溫服治腎氣虛弱氣奔兩耳鳴甚成聾桑螵蛸散方桑螵蛸切破炙附子炮裂去皮臍人參白茯苓去黑皮當歸切焙桂去粗皮各半兩熟乾地黃焙牡丹皮白朮銼炒各一兩羊腎一對薄切去筋膜炙乾上一十味搗羅為散每服一錢匕空心食前溫酒調下日三加至二錢匕治腎勞虛後耳常聞鐘磬風雨之聲補腎鹿茸丸方鹿茸去毛酒浸一宿酥炙磁石煅醋淬七遍枳實去瓤麩炒各二兩附子炮裂去皮臍山芋牡蠣熬肉蓯蓉酒浸切焙各一兩半五味子巴戟天去心各一兩楮實炒別搗末三兩上一十味將九味搗羅為末入楮實末再羅令勻煉蜜丸如梧桐子大每服二十丸至三十丸空心浸牛膝酒下治耳聾及耳鳴菖蒲浸酒方菖蒲米泔浸一宿銼焙三分木通一分銼桂去粗皮磁石碎綿裹各半兩防風去叉羌活去蘆頭各一兩上六味㕮咀以酒一斗浸七日每日空腹溫飲一二盞治腎虛熱毒乘虛攻耳致耳內常鳴如蟬聲不可專服補藥龍齒散方龍齒人參遠志去心白茯苓去黑皮麥門冬去心焙各半兩丹砂研鐵粉研末飛龍腦研牛黃研麝香研各一分上一十味搗研為散再同研勻細每服半錢匕食後夜臥溫熟水調下日三病愈即已治耳鳴並水入耳塞耳菖蒲丸方菖蒲獨活去蘆頭礬石熬令汁枯各一兩木通銼細辛去苗葉桂去粗皮各三分附子炮裂去皮臍一分當歸切焙甘草炙各半兩上九味搗羅為末旋以蔥汁同白鵝膏和丸如棗核大以綿裹內耳中日三易之治耳內晝夜虛鳴塞耳方菖蒲烏頭去皮臍生用各一兩上二味為末綿裹半錢匕塞耳中日再易之治腎氣虛弱風邪干之上攻於耳常作蟬鳴以至重聽牛膝煎丸方牛膝去苗海桐皮二味各半斤搗末用好酒五升與銀石器內熬成膏蘹香子炒當歸切焙赤箭五加皮銼赤芍藥桂去粗皮麻黃去根節地龍炒木香獨活去蘆頭沒藥研乳香研防風去叉骨碎補麒麟竭沉香銼乾蠍炒去土天南星生用各一兩附子炮裂去皮臍烏頭炮裂去皮臍楝實芎藭各二兩麝香研半兩虎腦骨四兩酥炙上二十六味搗研二十四味為末入前膏內和搗三千杵丸如梧桐子大每服十丸至十五丸空心溫酒或鹽湯下治腎虛耳鳴地黃丸方熟乾地黃焙三分黃耆銼焙山茱萸桑根白皮各二兩黃連去須羚羊角屑桂去粗皮當歸切焙代赭各一兩芎藭天雄炮裂去皮臍各一兩半上一十一味搗羅為末煉蜜和丸如梧桐子大每服三十丸空心溫酒下
