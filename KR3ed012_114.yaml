body:
  text: 卷第一百一十四耳門耳統論論曰腎氣通於耳心寄竅於耳氣竅相通若窗牖然音聲之來雖遠必聞若心腎氣虛精神失守氣不宣通內外窒塞斯有聾聵之疾經所謂五臟不知則九竅不通是也耳聾論曰耳聾之證有二有腎虛精脫而聾者腎氣通於耳也有經脈氣厥而聾者經脈絡於耳也腎虛而聾者其候面色黑氣厥搏入於耳而聾者其候耳中渾渾焞焞或耳中氣滿是也輝輝焞焞過在手少陽耳中氣滿過在手太陽以至五絡皆會於耳中各有證候審而治之治腎虛耳聾肉蓯蓉丸方肉蓯蓉酒浸一宿切焙菟絲子酒浸別搗白伏苓去黑皮山芋人參熟乾地黃切焙桂去粗皮防風去叉芍藥銼黃耆銼各半兩羊腎一對薄批去筋膜炙乾附子炮裂去皮臍羌活去蘆頭澤瀉銼各一分上一十四味搗羅為末煉蜜和丸如梧桐子大每服三十丸空心溫酒下治耳聾黃耆丸方黃耆銼梔子仁炒犀角鎊木通銼炒升麻人參玄參木香干藍黃芩去黑心芍藥銼各一兩上一十一味搗羅為末煉蜜和丸如梧桐子大每服二十丸煎枸杞根湯下加至三十丸食後服治腎虛耳聾菖蒲丸方菖蒲蜀椒去目並閉口炒出汁各三分羊腎一對酒一升煮乾取出片切曝乾蔥子炒半兩皂莢一挺去皮子炙上五味搗羅為末煉蜜丸如梧桐子大每服三十丸空心溫酒下日三凡欲服此藥臨睡時先安鐵物於所患耳邊口中以牙硬咬定卻以磁石一小塊安耳內覺氣微通略能聽聲然後服藥治腎氣不足耳聾耳中虛鳴桂心湯方桂去粗皮羌活去蘆頭黃耆銼各一分防風去叉半兩芍藥人參木通銼各一分半磁石煅醋淬七遍二兩上八味粗搗篩每服三錢匕水三盞先煮羊腎一隻去腎取汁一盞然後下藥煎至七分去滓溫服治耳聾耳鳴山芋丸方山芋熟乾地黃切焙磁石煅醋淬七遍菊花微炒黃耆銼茯神去木木通銼各一兩升麻獨活去蘆頭各三分上九味搗羅為末煉蜜和丸如梧桐子大每服二十丸米飲下漸加至三十丸治耳聾菖蒲酒方菖蒲米泔浸一宿銼焙三分木通磁石搗碎綿裹桂去粗皮各半兩防風去叉羌活去蘆頭各一兩上六味㕮咀如麻豆以酒一斗漬寒七日暑三日每日空腹飲三兩盞以瘥為度治耳聾鳴常如風水聲磁石酒方磁石搗碎綿裹半兩木通菖蒲米泔浸一兩日切焙各半斤上三味㕮咀以絹囊盛用酒一斗浸寒七日暑三日每飲三合日再治耳聾牡荊酒方牡荊子微炒一升上一味以酒二升浸寒七日暑三日去滓任性飲之雖久聾亦瘥治耳聾大豆酒方大豆揀一升雞屎白搗炒半升上二味先炒大豆聲絶入雞屎白取酒五升沃之良久去滓分溫三服厚衣蓋取汗治耳聾鐵酒方鐵五兩酒一升上二味燒鐵令赤投酒中去鐵飲之仍以磁石塞耳中治耳鳴耳聾塞耳魚腦膏方鯉魚腦六合當歸防風去叉細辛去苗葉附子去皮臍芎藭白芷各一分上七味除魚腦並銼碎銀器中和魚腦煎成膏去滓傾入閣中澄凝每以棗核大綿裹塞耳中治耳鳴耳聾塞耳木通丸方木通銼細辛去苗葉桂去粗皮菖蒲當歸切焙甘草炙銼獨活去蘆頭各半兩附子炮裂去皮臍礜石研如粉各一分上九味搗研為末旋以蔥汁和丸如棗核綿裹塞耳中治耳鳴耳聾塞耳芎藭膏方芎藭當歸細辛去苗葉白芷各一分上四味細銼以雄魚腦六合和於銀器中煎成膏去滓傾入閣中澄凝以棗核大綿裹塞耳中治耳聾塞耳丹參膏方丹參洗蜀椒去目並閉口炒出汗大黃白朮芎藭附子去皮臍乾薑巴豆去皮心細辛去苗葉桂去粗皮各半兩上一十味㕮咀以醋漬一宿用煉成豬脂三斤同置銀器中微火煎成膏去滓傾入瓷閣中澄凝以綿裹棗核大塞耳中治耳聾塞耳菖蒲丸方菖蒲木通銼磁石煅醋淬研乳香杏仁湯浸去皮尖雙仁炒萆麻子去皮松脂蠟各一分上八味搗研極細入鵝膏同搗一二百杵捻如棗核大以針穿中心作一孔子先挑耳令淨然後內藥耳中日再初著時癢及作聲勿怪治耳聾塞耳乳香丸方乳香杏仁湯浸去皮尖雙仁炒萆麻子去皮附子炮裂去皮臍磁石煅醋淬七遍木通銼桃仁湯浸去皮尖雙仁炒各半兩巴豆去皮心炒一分菖蒲松脂各三分上一十味先搗羅磁石木通菖蒲附子為末其餘搗研為膏入末同搗一二百杵捻如棗核大中心通一孔子以綿裹塞耳中一日三換輕者三日重者十日愈治耳聾塞耳地黃丸方生地黃洗杏仁湯浸去皮尖雙仁炒巴豆去皮心炒食鹽亂髮灰各半兩上五味搗爛如膏捻如棗核以薄發裹塞耳中日一易之當有黃水出即去藥治耳聾塞耳萆麻丸方萆麻子去皮半兩乳香食鹽巴豆去皮炒各一分松脂蠟杏仁湯浸去皮尖雙仁炒各半兩上七味搗爛如膏捻如棗核塞耳中三日一易治耳聾塞耳附子散方附子炮裂去皮臍磁石煅醋淬一七遍龍骨菖蒲藁本去苗土各一分上五味搗羅為散以綿裹一錢匕塞耳中治耳聾塞耳羌活丸方羌活去蘆頭玄參木通銼烏頭炮裂去皮臍防風去叉各一分上五味搗羅為末熔蠟和捻如棗核塞耳中日一易治耳聾燒腎散方磁石一兩醋淬七次細研水飛附子一兩炮裂去皮臍巴戟一兩川椒一兩去目及閉口者微炒去汗上四味搗羅為細散每服用豬腎一隻去筋膜細切蔥白薤白各一切入藥一錢鹽花一字和攪令勻以十重濕紙裹於煻灰火內煨熟空腹細嚼用酒解薄粥送下十日大效治久耳聾方烏驢乳一合皂莢半挺為末蠟一兩上三味相和於銚子內熔成膏堪丸即丸如棗核大用針穿透安耳中一宿至來日看之有物下來在耳門中即便取卻再用一兩度即瘥又方桃仁三分湯浸去皮松脂三分椒目末一分半巴豆三七粒去皮心炒研上四味都研如膏捻如棗核中穿一孔綿裹塞耳中數日一易治耳聾塞耳葶藶膏方葶藶紙上炒爛搗鹽研杏仁湯浸去皮尖雙仁炒研各一兩上三味搗研極爛入豬膏中以銀器盛慢火煎成膏傾入瓷閣中以綿裹棗核大塞耳中治耳聾塞耳菖蒲丸方菖蒲一寸巴豆一粒去皮心炒蠟一分上三味搗爛捻作七丸每一丸中穿一孔子以綿裹塞耳中日一易治耳聾塞耳食鹽丸方食鹽杏仁去皮尖雙仁炒各一分上二味爛搗以純鳥羊屎新濕者和丸如棗核大塞耳中勿令風入干即易之至七日二七日耳中有聲漸入即以葦管長二寸內耳中四畔以面封之勿令氣出以薄面餅子裹筒頭上以艾炷灸三壯耳內即有乾黑膿出須挑卻還依前法一日兩度以後常用亂髮塞之治耳聾塞耳附子丸方附子炮裂去皮臍菖蒲各半兩上二味搗羅為末以醋和如棗核綿裹臨臥時塞耳中夜一易之有黃水出瘥治耳聾塞耳大棗丸方大棗十五枚去核萆麻子一百粒去皮上二味爛搗捻如棗核塞耳中二十日效治耳聾塞耳巴豆丸方巴豆十粒去皮心炒松脂半兩上二味搗爛捻如棗核塞耳中汁出即愈又方蝸牛子一分石膽一分鍾乳一分龍腦上四味除龍腦同研為細末一甕瓶盛之以炭火燒令通赤候冷取出研入龍腦少許每用油調藥一字滴入耳中無不瘥又方雄黃一分硫黃一分上二味同研為末綿裹一字放耳中即瘥治耳聾灌耳方鵝毛翎根筒七莖燈心七莖木通一兩地龍三條上四味相和燒為灰細研每用半錢匕以生油調傾入耳中便用綿子塞耳且側臥良久如此三度治耳聾楓香脂丸方楓香脂半錢巴豆七粒去皮心上二味同研相入捻如棗核綿裹塞耳中治耳聾塞耳牙硝散方馬牙硝半兩龍腦半錢匕蕤仁去皮半分上三味為散入黃蠟二錢熔和綿裹一棗核大塞耳中治耳聾塞耳椒目丸方椒目四十九粒巴豆二粒和皮用上二味同研勻入飯丸如棗核綿裹夜後塞在聾耳內治耳聾塞耳黃瓜根方黃瓜根上一味削如棗核塞耳數日乾耵聹膿血自出盡即瘥治耳聾塞耳醋煮附子方附子上一味以醇醋微火煮一宿削如棗核以綿裹塞耳中治耳聾塞耳真珠粉方真珠末一分上一味研如粉以綿裹一錢匕塞耳中治耳聾塞耳桃仁方桃仁湯浸去皮尖雙仁炒一分上一味搗爛捻如棗核以赤楮皮裹塞耳中又方杏仁去皮尖一分上一味搗爛如棗核大以赤楮皮裹塞耳中治耳聾吸鼻麝香散方麝香細辛去苗葉乾薑炮莙薘根洗淨焙各一分上四味搗羅為散患左耳吸入右鼻患右耳吸入左鼻不拘時治耳聾滴耳雞卵方新雞卵一枚巴豆一粒去皮心膜上二味先於雞卵上開一竅將巴豆內雞卵中以紙兩重面黏貼蓋卻與雞抱以其餘卵雞子出為度取汁滴於耳內日三兩次五七日瘥治耳聾滴身鯽魚膽膏方鯽魚膽一枚烏驢脂少許生油半兩上三味和勻內樓蔥管中七日滴於耳內瘥治耳聾滴耳胡麻油方胡麻油一合木香醋浸一宿焙杵末半兩上二味銀器內微火煎三五沸綿濾去滓旋滴耳中以瘥為度治耳聾滴耳鵝膏方鵝膏一合上一味以少許滴耳中治耳聾滴耳生油方生油一合上一味滴入耳中日三五次候其塞出即瘥治耳聾滴耳蟹汁方生蟹一枚上一味搗絞取汁以少許滴耳中治耳聾滴耳龜尿方龜上一物安於閣中荷葉上養之專看葉上有尿收取滴耳中治耳聾滴耳杏仁方杏仁七粒湯浸去皮尖雙仁炒上一味分三停各以綿裹每裹著鹽一顆如小豆許以器盛於飯甑上蒸之飯熟取出一裹令患人側臥捻汁入耳中久又以一裹捻入耳中取瘥為度治耳聾灌耳益母草汁方益母草一握洗上一味研取汁少灌耳中瘥治耳聾灌耳釅醋方釅醋二合上一味溫灌耳中以綿塞定半日許必有物出即瘥治耳聾灌耳鯽魚腦方鯽魚腦一合上一味以竹筒子盛蒸之冷灌耳中治耳聾灌耳鼠膽方鼠膽上一味取汁滴入耳內令透初益聾半日後便能聽雖久亦瘥治耳聾熏耳雄黃散方雄黃防風去叉菖蒲礜石烏頭去皮臍椒去目並閉口炒出汗各一分大棗核十枚上七味搗羅為散以香爐中安艾一彈子大次著黃柏末半錢匕於艾上復以藥二錢匕著艾上火燃向耳熏之治耳聾蠟紙角方蠟紙一張上一物剪為四片每一片於箸上緊卷抽卻箸以蠟紙卷子安耳中燃之待火欲至耳急除去當有惡物出在殘紙上日一角之角了以蠟塞定治耳聾鐵鐶方鐵鐶上一物口內含之隨聾耳左右以磁石一塊枕之旬餘氣通即止又方以綿裹鐵沙內耳中口含磁石大法本同今併為一方治耳聾方巴豆一枚去皮心膜上一味以黃蠟裹兩頭作孔通氣安耳中治耳卒聾方菖蒲一寸巴豆一枚去心皮上二味搗研分為七丸每取一丸綿裹塞耳中治卒耳聾方上取栝蔞根削可耳孔大以臘月豬脂煎三五沸以塞耳中七日一換良風聾論曰風聾者本於足少陰經虛風邪乘之令氣脈不通風邪內鼓則耳中引痛牽及頭腦甚者聾閉不通故謂之風聾治風聾颼颼如風雨鐘磬聲或時出清水或有膿汁黃耆湯方黃耆銼一兩半附子炮裂去皮臍菖蒲米泔浸一宿切各一兩木通銼二兩磁石火燒醋淬一七遍三兩五味子防風去叉玄參人參杜仲去粗皮銼炒白茯苓去黑皮熟乾地黃焙各一兩一分上一十二味粗搗篩每服三錢匕以水一盞半入生薑三片大棗一枚劈同煎至七分去滓空心溫服日三治風聾菖蒲湯方菖蒲米泔浸一宿切四兩木通銼三兩瞿麥二兩用穗白朮銼碎炒三兩獨活去蘆頭四兩山芋三兩甘草炙銼二兩附子炮裂去皮臍二兩桂去粗皮三兩杏仁去皮尖雙仁炒三兩茯神去木二兩人參三兩前胡去蘆頭三兩石膏二兩磁石火燒醋淬七遍二兩上一十五味銼如麻豆每服三錢匕以水一盞半入竹葉七片生薑一棗大切蔥白一寸同煎至七分去滓溫服治風聾頭目痛天雄散方天雄炮裂去皮臍三兩細辛去苗葉三兩山茱萸五兩乾薑炮二兩山芋七兩上五味搗為散每服一錢匕空心溫酒調下日二服治風聾獨活煮散方獨活去蘆頭一兩