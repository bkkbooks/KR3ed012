body:
  text: 卷第九十七大便祕澀論曰大便祕澀蓋非一證皆營衛不調陰陽之氣相持也若風氣壅滯腸胃乾澀是謂風祕胃蘊客熱口糜體黃是謂熱祕下焦虛冷窘迫後重是謂冷祕或因病後重亡津液或因老弱血氣不足是謂虛祕或腎虛小水過多大腸枯竭渴而多祕者亡津液也或胃實燥結時作寒熱者中有宿食也治法雖宜和順陰陽然疏風散滯去熱除冷導引補虛之法不可偏廢當審其證以治之治大腸祕澀疏風順氣木香丸方木香檳榔生銼羌活去蘆頭桂去粗皮陳橘皮湯浸去白焙各一兩大黃濕紙裹煨二兩牽牛子用半斤取末四兩上七味搗羅為末煉蜜丸如梧桐子大每服十五丸以生薑紫蘇湯下漸加至三十丸治津液燥少腸胃挾風大便祕澀氣道不勻勻氣丸方麻仁別研二兩人參訶黎勒皮枳殼去瓤麩炒桂去粗皮各一兩木香一兩半郁李仁湯去皮別研白檳榔大黃炙微赤各三兩上九味搗羅七味為末入麻仁等再研勻煉蜜為丸如梧桐子大每服三十丸加至五十丸溫熟水下不計時候治大腸風熱祕澀牛黃丸方牛黃細研一分大黃銼炒二兩巴豆去皮心膜麩炒研新瓦上取霜半兩上三味搗研為末酒煮麵糊丸如緑豆大每服五丸臨臥米飲下量虛實加減治大便澀祕牽牛散方牽牛子半生半炒檳榔生銼各半兩上二味搗羅為散每服三錢匕生薑湯調下未利良久以熱茶投疏利為度治胃氣虛弱飲食無味上隔寒壅冷積癥瘕氣食不消化肺氣積聚心胸痰逆喘急卒中風毒腳氣大腸祕澀奔豚氣痛木香檳榔丸方木香檳榔銼羌活去蘆頭芎藭桂去粗皮各一兩郁李仁去皮雙仁研大黃銼炒各二兩上七味搗羅六味為末與郁李仁同研勻煉蜜丸如梧桐子大每服二十丸食前生薑湯下或諸氣痛溫酒下治諸風濕痹筋攣膝痛胃中積熱口瘡煩悶大便祕澀大豆麨方大豆黃卷炒熟搗末一升酥半兩上二味研勻不拘食前後溫水調下一匙治熱毒風大便祕澀及心風健忘肝風眼暗羚羊角丸方羚羊角鎊人參羌活去蘆頭苦參銼防風去叉玄參丹參大黃銼大麻仁別研為膏梔子仁升麻龍齒研麥門冬去心焙各一兩茯神去木枳殼去瓤麩炒黃連去須犀角鎊菊花天門冬去心焙郁李仁去皮雙仁研生乾地黃各三分上二十一味搗羅十八味為末與麻仁龍齒郁李仁膏同研令勻煉蜜和杵丸如梧桐子大每服空腹溫酒下二十丸加至三十丸治風氣壅滯大腸祕澀地龍丸方地龍去土牽牛子半生半炒苦參各一兩烏頭生去皮尖四兩上四味搗羅為末醋煮稀麵糊丸如梧桐子大每服十五丸至二十丸空心夜臥米飲下治大便祕澀五臟風壅膈實不宜桃花湯方桃花乾者二錢甘遂炒一分郁李仁去皮雙仁別研膏海蛤搗碎炒枳實去瓤麩炒大黃銼炒各半兩木香陳橘皮湯浸去白炒各一分上八味先粗搗七味為末與郁李仁和勻每服五錢匕水二盞煎至一盞去滓空腹溫服良久以乾飯一匙壓之覺轉動腹如雷鳴即以熱水洗足宣下諸惡物以糜粥助之治健忘多驚大便難口中生瘡羚羊角飲方羚羊角鎊人參赤茯苓去黑皮羌活去蘆頭附子炮裂去皮臍梔子仁炒牡丹皮黃芩去黑心麥門冬去心炒薔薇根皮大黃炒各一兩防己二兩胡黃連半兩甘草炙三分上一十四味銼如麻豆每服五錢匕水二盞入生薑半分拍破鹽豉四十粒同煎至一盞去滓更入淡竹瀝少許攪令勻食前溫服治胃實腹脹水穀不消溺黃體熱鼻塞衄血口喎唇緊關格不通大便苦難承氣瀉胃厚朴湯方厚朴去粗皮生薑汁炙三分大黃銼炒二兩枳殼去瓤麩炒甘草炙各半兩上四味粗搗篩每服五錢匕水一盞半煎至一盞去滓空心溫服取利為度治大便祕難麻仁丸方大麻仁別研膏大黃銼炒各三兩厚朴去粗皮生薑汁炙二兩枳殼去瓤麩炒一兩半上四味搗羅三味為末與麻仁同研煉蜜和杵令勻丸如梧桐子大每服二十丸空心溫水下以利為度治反胃大便難肌膚乾瘦雞肶骨丸方雞肶骨慢火炙三兩大黃銼炒五兩大麻仁研如膏四兩上三味搗羅二味為末與麻仁同研煉蜜和杵丸如梧桐子大每服二十丸食前米飲下日三治強壯人熱毒流入腸胃骨節疼痛腹中煩滿大便祕澀升麻湯方升麻大黃銼炒各四兩前胡去苗梔子仁炒各三兩上四味粗搗篩每服三錢匕水一盞煎至七分去滓食前溫服未通再服治痃癖注氣刺痛大便祕澀京三稜丸方京三稜煨乘熱椎碎別搗為末木香當歸切焙桂去粗皮肉蓯蓉酒浸切焙牛膝去苗酒浸切焙羌活去蘆頭芎藭赤芍藥銼防風去叉枳殼去瓤麩炒白朮各半兩檳榔生銼大黃銼炒郁李仁去皮雙仁別研如膏各一兩上一十五味除郁李仁外搗羅為末與郁李仁膏同研令勻煉蜜和杵丸如梧桐子大每服二十丸空腹米飲或溫酒下以利為度治三焦不和臟腑虛結胸膈痞悶大便祕澀麻仁丸方大麻仁研膏四兩大黃半生半熟四兩白檳榔生銼桂去粗皮羌活去蘆頭菟絲子酒浸一宿別搗山茱萸山芋枳殼去瓤麩炒車前子防風去叉各一兩半郁李仁去皮研膏四兩木香一兩上一十三味搗研為末煉蜜丸如梧桐子大每服十五丸至二十丸溫水下臨臥服治大腸虛冷風祕凌霄花根丸方凌霄花根去皮洗焙三兩烏藥銼人參各半兩皂莢子五十枚上四味搗羅為末煉蜜丸如緑豆大每服十丸至十五丸溫水下一日二服老人多患此疾服之半月漸調亦不疏利治大腸冷祕威靈仙丸方威靈仙不以多少洗切上一味搗羅為末煉蜜丸如梧桐子大每服十五丸至二十丸生薑清米飲下臨臥服治氣脹滿大便祕澀腹肋刺痛牽牛子丸方牽牛子半生半炒三兩檳榔生銼二兩木香一兩上三味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心溫酒或米飲下治裡急後重大便不快服炒桃仁法桃仁去皮三兩吳茱萸二兩鹽一兩上三味同炒熟去鹽並茱萸只以桃仁空心夜臥不拘時任意嚼五七粒至一二十粒治大便冷祕附子散方附子一枚炮裂去皮臍上一味削去外面留中心如棗大碾為細散蜜水調下一錢匕治年老虛弱大便祕滯蔥膠湯方陳膠十片蔥一握切上二味以水二盞同煎膠令煬取一盞溫服之立效治老人虛祕大腹湯方連皮大腹十五枚木瓜一枚蔥白五莖上三味銼如麻豆以水五盞煎至二盞半去滓分溫五服治人病後重亡津液及老人津液不足大便祕澀平胃煮散加青橘皮方厚朴去粗皮薑汁炙五兩蒼朮去粗皮米泔浸一宿焙八兩陳橘皮湯浸去白焙五兩甘草炙三兩上四味搗羅為散每服三錢匕水一盞半加青橘皮末半錢匕生薑二片棗二枚劈煎至一盞去滓溫服治宿食不消大便難滌中丸方大黃銼炒八兩葶藶隔紙炒二兩杏仁去皮尖雙仁炒研芒硝研各四兩上四味搗研為末煉蜜和杵丸如梧桐子大每服五丸至七丸食後溫水下日三未通加至十丸治脾胃不和內有蟲滯大便祕難大黃丸方大黃銼炒赤芍藥各三兩厚朴去粗皮薑汁炙二兩枳實去瓤麩炒一兩半大麻仁別研如膏五合上五味搗羅四味為末與麻仁同研勻煉蜜和杵丸如梧桐子大每服十丸至十五丸食前溫水下以通利為度治大腸祕澀冷熱相攻寒熱如瘧檳榔丸方檳榔銼一兩羌活去蘆頭一兩郁李仁湯浸去皮別研二兩木香一兩大黃銼炒二兩牽牛子四兩搗細取三兩青橘皮湯去白焙一兩大麻仁別研二兩上八味搗羅六味為末入研藥令勻煉蜜和丸如梧桐子大每服二十丸生薑湯下治大腸風祕結澀不通戟香散方大戟炒木香乾薑炮陳橘皮湯浸去白焙各一兩牽牛子五兩取細末二兩大黃銼微炒羌活去蘆頭芎藭各半兩陳曲微炒訶黎勒皮各一分桂去粗皮三分上一十一味搗羅為散每服二錢匕生薑茶清調下臨臥服治大腸風壅祕澀不通大麻仁丸方大麻仁研如泥五兩芎藭一兩一分附子生去皮臍半兩大黃銼碎酥炒二兩甜硝半兩上五味搗研為末煉蜜和丸如梧桐子大每服三十丸溫酒下治大腸有熱津液竭燥裡急後重大便祕澀三仁丸方松子仁柏子仁大麻子仁各一兩上三味同研勻黃蠟半兩熔汁和丸如梧桐子大每服二十丸食前米飲下未快加丸數服大便不通論曰大腸者傳導之官變化出焉由營衛津液有以滋利也若邪熱相搏津液枯燥致糟粕內結而不得行故腸胃痞塞而大便不通令人腰痛腹滿不能飲食經所謂熱結下焦則便難然又有病後氣血不足內亡津液或年高氣澀冷熱相搏者亦致大便難治宜詳之治大腸壅結不通腹脅脹滿膨悶不下食枳殼湯方枳殼去瓤麩炒甘草炙銼各一分大腹皮三錢銼百合牽牛子炒赤茯苓去黑皮各一兩赤芍藥桑根白皮銼各三分郁李仁湯浸去皮尖雙仁陰乾半兩上九味粗搗篩每服五錢匕水一盞半煎至八分去滓空心食前溫服以通為度治虛熱痰實三焦痞結煩悶壯熱大便不通麥門冬湯方麥門冬去心焙三分赤茯苓去黑皮甘草炙銼黃芩去黑心大黃銼炒各半兩赤芍藥一兩上六味粗搗篩每服五錢匕水一盞半入竹葉十片生薑一棗大拍破煎至八分去滓食前溫服日三治膈氣痰涎食不消化大便不通腹中雷鳴宣氣木香飲方木香桂去粗皮昆布洗去咸焙檳榔一兩生銼一半炮銼大黃銼炒半夏湯洗七遍去滑麩炒各半兩芎藭甘草炙銼各一分訶黎勒煨去核三分上九味粗搗篩每服五錢匕水一盞半生薑一棗大拍碎煎至八分去滓食後溫服日三治大腸祕澀不通風結黑神丸方巴豆一兩麩炒去皮心膜出油硫黃研一分乾薑炮半兩皂莢三挺不蛀者燒令煙絶與硫黃同研上四味搗乾薑為細末與三味同研令勻用蒸餅去皮湯浸搦干紙裹煨透和藥搗勻丸如梧桐子大每服三丸空心生薑湯下加至四丸治大便不通消除痞氣牽牛子丸方牽牛子生搗為末一兩半甘遂銼炒半兩木香一兩京三稜煨銼陳橘皮湯浸去白焙訶黎勒煨去核各三分上六味搗羅為末用生薑四兩研絞取汁白蜜五兩同煎成膏和藥為劑搗五百杵丸如梧桐子大每服二十丸夜臥時煎粟米飲下未利加至三十丸治大便不通麻仁丸方大麻仁研如膏大黃銼炒葛根銼各一兩半桑根白皮銼芒硝生鐵銚子內炒乾紙裹黃土內窨一宿研各一兩一分上五味搗羅三味為末與芒硝麻仁同研令勻煉蜜和劑搗熟丸如梧桐子大每服二十丸空心煎粟米飲下至晚再服治大便不通小腹脹滿芍藥丸方赤芍藥一兩黃芩去黑心大黃銼炒杏仁湯浸去皮尖雙仁炒研芒硝生鐵銚子內炒乾紙裹黃土內窨一宿研各二兩上五味搗羅三味為末與芒硝杏仁同研令勻煉蜜和搗丸如梧桐子大每服十五丸食前熟水下日三加至二十丸以通為度煎粟米飲下亦得治大便不通疏風轉氣下痰半夏丸方半夏湯洗七遍去滑麩炒一兩牽牛子四兩一半生一半炒青橘皮湯浸去白焙木通銼各半兩上五味搗羅為末煉蜜和劑搗熟丸如梧桐子大每服四十丸夜臥時淡生薑湯下治卒大便不通或大腸熱結風祕大黃湯方大黃銼炒黃芩去黑心梔子仁甘草炙銼各一兩上四味粗搗篩每服四錢匕水一盞半煎至八分去滓下硝石半錢匕更煎兩沸空心溫服治大便不通甘遂散方甘遂一兩炒木香一分上二味搗羅為散每服一錢匕溫蜜酒調下不拘時治風熱氣壅大便不通雄黃丸方雄黃研鬱金末各一兩巴豆半兩去皮心膜研如膏生面二兩上四味再同研細滴水丸如梧桐子大每服二丸至三丸食後臨臥生薑湯下量虛實加減治風熱大便不通檳榔散方檳榔二枚銼朴硝研大黃銼炒青橘皮湯浸去白焙各一兩上四味搗研為散每服二錢匕食後臨臥蔥蜜湯調下治大便不通荊芥散方荊芥穗一兩大黃二兩並生用上二味搗羅為散每服二錢匕