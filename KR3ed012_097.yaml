煉蜜和丸如梧桐子大空心米飲下三十丸加至五十丸治臟毒便血不止龍骨餅子方龍骨烏賊魚骨去甲等分上二味搗羅為末每服一錢匕入雞子清一枚用白麵同和捏作餅子三枚煻火內煨熟細嚼用溫米飲送下空心食前服治結陰便血不止疼痛無時雞冠丸方雞冠花椿根皮並銼等分上二味搗羅為末煉蜜和丸如梧桐子大每服三十丸濃煎黃耆湯下空心食前日三服治久下血黑神散方藁本去土烏頭炮裂去皮臍皂莢酥炙去皮子密陀僧搗碎研上四味等分尉斗內用炭火燒黑取出搗羅為散每服二錢匕入膩粉一筒子和勻前胡荽酒調下治結陰瀉血不止石榴散方酸石榴皮陳橘皮湯浸去白甘草微炙銼乾薑炮上四味等分焙乾搗羅為散每服二錢匕陳米飲調下日三服治結陰瀉血地榆散方地榆銼桑耳甘草炙銼赤芍藥各三兩熟乾地黃焙伏龍肝各四兩艾葉炒二兩黃耆銼六兩上八味搗羅為細散每服二錢匕米飲調下食後臨臥服日三治結陰便血至二三升者桂芎湯方桂去粗皮赤芍藥芎藭當歸切焙黃芩去黑心各一兩甘草炙銼半兩上六味粗搗篩每服三錢匕水一盞入竹茹彈子大一塊同煎至七分去滓空心溫服日二服治便血紫參湯方紫參一兩黃芩去黑心三分茜根銼赤芍藥阿膠炙令燥蒲黃各一兩雞蘇葉小薊根去土各三分青竹茹一兩上九味粗搗篩每服三錢匕水一盞入生薑一塊半棗大拍碎同煎至七分去滓食後溫服治下血蕪荑丸方蕪荑仁一兩上一味搗研令細用紙裹壓去油再研為末用雄豬膽為丸如梧桐子每服九丸甘草湯下日五六服連三日可斷根本治便血一切血妄行金屑丸方葉子雌黃不計多少入在棗內滿線系定煎湯用黑鉛一兩半熔成汁傾入湯內同煮自早至晚不住添沸湯取出研令極細其棗以盞盛飯上蒸過上一味以煮藥棗取肉和丸如梧桐子大每服三丸煎黑鉛湯下便血甚者只三服瘥治結陰便血金虎丸方黃柏一兩去粗皮用雞子清塗炙上一味搗羅為末滴水丸緑豆大溫水下七丸治大便下血蝟皮灰散方蝟皮燒灰存性黃耆銼熟乾地黃焙續斷柏葉地榆銼白芷黃連去須各等分上八味搗羅為散每服二錢匕食前溫湯調下
