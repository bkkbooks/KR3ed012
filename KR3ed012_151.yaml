body:
  text: 卷第一百五十一婦人血氣門血氣統論論曰血為榮氣為衛行陰行陽晝夜共五十周內之五臟六腑外之百骸九竅莫不假此而致養矧婦人純陰以血為本以氣為用在上為乳飲在下為月事養之得道則榮衛流行而不乖調之失理則氣血愆期而不應衛生之經不可不察婦人月水不利論曰凡月水不利有因風冷傷於經絡血氣得冷則澀而不利者有因心氣抑滯血氣鬱結不能宣流者二者當審訂而療之治婦人月水不利胸脅痞滿臍腹刺痛手足煩熱薏苡仁丸方薏苡仁二兩乾薑炮裂吳茱萸湯浸七遍焙乾微炒附子炮裂去皮臍大黃銼炒芍藥各一兩黃芩去黑心生乾地黃微炒當歸微炒桂去粗皮白朮各半兩蜀椒去目併合口者炒出汗人參石葦去毛微炙各一分桃仁湯浸去皮尖雙仁麩炒黃色三十枚上一十五味搗羅為末煉蜜和丸如梧桐子大每服二十丸溫酒下日三治婦人經血久寒月水不利吳茱萸湯方吳茱萸湯浸七遍焙乾微炒二兩半小麥淘淨桂去粗皮半夏湯浸七宿炒黃各二兩生薑切炒三兩大棗去核炒十枚人參芍藥各一兩甘草炙水蛭以糯米少許同炒米熟去米䗪蟲微炒䗪蟲去翅足微炒牡丹皮牛膝酒浸切焙各半兩桃仁湯去皮尖雙仁麩炒黃色二十枚上一十五味粗搗篩每服三錢匕酒水各半盞煎七分去滓溫服日三治婦人月水不利或血瘀不通或腹堅硬如石如有妊狀大黃散方大黃銼炒四兩芍藥二兩土瓜根銼一兩上三味搗羅為散每服二錢匕溫酒調下治婦人月水不利臍腹撮痛桃仁湯方桃仁湯浸去皮尖雙仁麩炒黃十枚乾薑炮芍藥當歸微炒芒硝吳茱萸湯浸七遍焙乾微炒各半兩大黃銼炒一兩半甘草炙一分桂去粗皮一兩上九味粗搗篩每服三錢匕水一盞煎七分去滓服血快即止治婦人月水不利腹中滿痛虎掌湯方虎掌銼半兩大黃銼炒二兩桃仁湯浸去皮尖雙仁麩炒黃三十枚水蛭以糯米同炒米熟去米用二十一枚上四味粗搗篩每服二錢匕水一盞煎七分去滓溫服血快即止治婦人月水不利氣血不和臍下㽲痛面色萎黃身體羸瘦飲食不下桃仁丸方桃仁湯浸去皮尖雙仁麩炒黃牡丹皮當歸微炒各三兩芎藭土瓜根去土銼芍藥桂去粗皮牛膝酒浸切焙防風去叉各二兩甘草炙一兩上一十味搗羅為末煉蜜和劑熟搗丸如梧桐子大每服三十丸空心溫酒下漸加至五十丸治婦人月水不利臍腹㽲痛身體疼倦鱉甲丸方鱉甲去裙襴醋炙芎藭貝母各三分去心稱苦參二兩赤芍藥牡丹皮紫蘇子微炒熟乾地黃焙各一兩上八味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心溫酒下漸加至三十丸治婦人月水不利或前或後乍多乍少腰疼腹痛手足煩熱唇口乾燥牡丹丸方牡丹皮一兩一分苦參半兩貝母三分去心稱上三味搗羅為末煉蜜和劑搗熟丸如梧桐子大每服二十丸加至三十丸空腹米飲下日三治婦人虛勞月水不利百節痠痛壯熱少力心躁煩悶秦艽湯方秦艽去苗土馬鞭草甘草炙銼柴胡去苗各一兩芎藭芍藥桂去粗皮各二兩荊芥穗三兩半夏湯洗去滑生薑汁製炒乾半兩白芷三分上一十味粗搗篩每服三錢匕水一盞烏梅一枚拍破生薑三片同煎至七分去滓溫服治婦人月水不利纍月不快身體煩熱骨節沉重日漸羸瘦澤蘭丸方澤蘭葉鍾乳別研細辛去苗葉黃耆銼紫石英別研各三分大黃銼炒遠志去心熟乾地黃焙白芷苦參柏子仁微炒蜀椒去目並閉口者炒出汗白朮芎藭附子炮裂去皮臍吳茱萸湯洗焙乾炒麥糵炒陳曲炮前胡去蘆頭大棗去核炒各半兩丹參枳殼去瓤麩炒芍藥桔梗炒秦艽去苗土當歸切焙沙參桂去粗皮厚朴去粗皮生薑汁炙銼石斛去根麥門冬去心焙各三分人參半兩上三十二味搗羅為末煉蜜和丸如梧桐子大每服二十丸空腹溫酒下漸加至三十丸治婦人血水不利體熱煩悶少腹腰腳沉重疼痛及産後惡露不快大便祕澀金花散方桂去粗皮威靈仙去土白芷上五味等分搗羅為散和勻每服二錢匕煎陳曲湯調下治婦人憂悒心下支滿氣脹腹熱月水不利血氣上攻心痛欲嘔土瓜根丸方土瓜根大黃銼炒令煙盡芍藥當歸切焙各半兩蜀椒去目並閉口炒汗出黃芩去黑心各一分乾漆熬令煙盡一分半上七味搗羅為末煉蜜和丸如梧桐子大空腹服五丸酒下日二服治婦人月水不利臍下撮痛食減羸劣當歸湯方當歸切焙甘草炙銼桂去粗皮木賊大黃銼炒京三稜炮銼各一兩威靈仙去土生乾地黃焙王不留行檳榔延胡索代赭煅醋淬天雄炮裂去皮臍鱉甲去裙襴醋炙各一兩半紅藍花炒三分上一十五味㕮咀如麻豆每服五錢匕水一盞半煎八分去滓溫服不拘時候婦人月水不調論曰月水不調者經血或多或少或清或濁或先期而來或後期而至是也蓋由失於調養而衝任虛損天癸之氣乖於常度故內經曰任脈通衝脈盛月事以時下言其有常度也治婦人月水不調陽起石湯方陽起石別研人參甘草炙乾薑炮桂去粗皮各一兩續斷赤石脂各一兩半伏龍肝二兩半熟乾地黃二兩附子炮裂去皮臍半兩上一十味㕮咀如麻豆大每服三錢匕水一盞半煎至八分去滓溫服日三治婦人月候不調或多或少或先或後腰腳疼痛手心煩熱不思飲食赤芍藥湯方赤芍藥牡丹皮丹參生乾地黃炒各二兩牛膝酒浸切焙土瓜根當歸切焙桂去粗皮黃芩去黑心各一兩半桃仁湯浸去皮尖雙仁麩炒四十枚上一十味粗搗篩每服三錢匕水一盞生薑五片煎至六分去滓下朴消末半錢匕溫服日三治婦人月經不調乾地黃湯方熟乾地黃切焙三兩黃芩去黑心當歸切焙柏葉炙艾葉炒各半兩伏龍肝一兩上六味粗搗篩每服三錢匕水一盞生薑一棗大拍碎煎至七分去滓下蒲黃一錢匕更煎一兩沸溫服日三治婦人月候不調胸中煩躁腰胯痹痛不思飲食鱉甲湯方鱉甲去裙襴醋炙白茯苓去黑皮枳實去瓤麩炒赤芍藥五加皮銼庵䕡子微炒各一兩半黃芩去黑心當歸切焙羌活去蘆頭各一兩上九味粗搗篩每服三錢匕水一盞煎至六分去滓下地黃汁一合好酒一合更煎一兩沸空心服治婦人月水不調臍腹脹滿四肢寒熱不嗜飲食防風湯方防風去叉羚羊角鎊地榆赤芍藥各一兩半茯神去木鱉甲去裙襴醋炙熟乾地黃焙枳殼去瓤麩炒各一兩上八味粗搗篩每服三錢匕水一盞煎至六分去滓溫服治婦人月水不調頭目昏眩心腹氣痛四肢麻痹臍下脹悶茯神湯方茯神去木赤芍藥地榆熟乾地黃焙各一兩半地骨皮白朮甘菊花柴胡去苗各一兩上八味粗搗篩每服三錢匕水一盞煎至六分去滓溫服治婦人月水不調血氣攻刺臍下㽲痛不可忍當歸湯方當歸切焙桂去粗皮甘草炙銼各二兩赤芍藥白茯苓去黑皮各二兩半上五味粗搗篩每服三錢匕水一盞煎至六分去滓溫服相次再服治婦人月水不調或多或少腹中冷痛吳茱萸湯方吳茱萸湯洗焙乾炒一升生薑切炒桂去粗皮各五兩大棗去核炒十枚人參牛膝酒浸切焙芍藥各一兩甘草炙銼半兩小麥牡丹皮各一兩半半夏湯洗七遍二兩半桃仁湯浸去皮尖雙仁炒二十枚上一十二味粗搗篩每服三錢匕水半盞酒半盞煎至七分去滓溫服良久再服如不飲酒只以水煎治婦人月水不調胸膈氣悶臍腹䐃痛頭眩心煩赤芍藥湯方赤芍藥黃耆銼熟乾地黃焙防風五味子各一兩半桔梗炒白茯苓去黑皮羚羊角鎊各一兩上八味粗搗篩每服三錢匕水一盞煎至七分去滓空腹溫服日再治婦人月水不調或不通利發即刺痛鱉甲湯方鱉甲去裙襴醋炙大黃銼炒桂去粗皮羌活去蘆頭枳殼去瓤麩炒當歸切焙芎藭吳茱萸湯浸七遍焙乾炒瞿麥穗牛膝各三分檳榔銼三枚上一十一味粗搗篩每服三錢匕水一盞生薑一棗大拍破煎至六分去滓溫服治婦人月水不調或多或少臍下脹滿疼痛白茯苓丸方白茯苓去黑皮黃耆炙銼薏苡仁萆薢山茱萸赤芍藥各一兩半枳殼去瓤麩炒一兩一分白檳榔炮銼熟乾地黃焙各二兩桃仁湯浸去皮尖雙仁麩炒黃色二兩半當歸切焙一兩上一十一味搗羅為末煉蜜和塗酥搗熟丸如梧桐子大每服四十丸空腹煎棗湯下治婦人月水不調或多或少臍下塊結痛如錐刺不治即成勞疾赤芍藥丸方赤芍藥大黃銼炒吳茱萸湯洗焙炒乾薑炮厚朴去粗皮生薑汁炙銼細辛去苗葉牡丹去心各一兩半芎藭當歸切炒各二兩桃仁湯浸去皮尖雙仁炒二兩半附子炮裂去皮臍一兩上一十一味搗羅為末煉蜜和塗酥搗熟丸如梧桐子大每服二十丸空心酒下漸加至三十丸久冷勞可服至四十丸覺暖即減丸數治婦人月水不調或不通利或一月再來或如豉汁腹痛難任牛膝丸方牛膝酒浸切焙桃仁去皮尖雙仁炒黃牡丹皮庵䕡子各一兩一分桂去粗皮赤芍藥芎藭當歸切炒大黃銼炒各一兩蒲黃三分上一十味搗羅為末煉蜜和丸如梧桐子大每服四十丸空心酒下日二加至五十丸治婦人經候不調臍下㽲痛桂心庵䕡子丸方桂去粗皮芎藭土瓜根桑耳微炒牛膝酒浸切焙大黃銼炒庵䕡子各一兩赤茯苓去黑皮一兩一分熟乾地黃切炒二兩甘草炙銼三分赤芍藥一兩半上一十一味搗羅為末煉蜜和丸如梧桐子大每服二十丸空腹酒下漸加至三十丸治婦人月水不調繞臍腹痛上搶心胸往來寒熱薏苡仁散方薏苡仁代赭丁頭者牛膝酒浸切焙各二兩白茯苓去黑皮一兩大黃銼炒五兩桃仁湯浸去皮尖雙仁炒黃五十枚桂去粗皮半兩䗪蟲微炒五十枚上八味搗羅為散每服二錢匕溫酒調下日三治婦人月水不調臍下㽲痛不思飲食桑耳散方桑耳微炒牛膝酒浸切焙赤芍藥土瓜根白茯苓去黑皮牡丹皮桂去粗皮甘草炙銼芎藭大黃銼炒各一兩半乾地黃焙一兩三分庵䕡子炒一兩上一十二味搗羅為散每服三錢匕空心溫酒調下治婦人血氣不調經水不定腹脅多脹或五六月一來或三二月一來雖來色如煮小豆汁其血復少者庵䕡子散方庵䕡子一兩一分瞿麥穗檳榔銼桂去粗皮牡丹皮芎藭當歸切焙甘草炙銼射干木香吳茱萸湯洗焙炒各三分桃仁湯浸去皮尖雙仁炒黃十二枚鱉甲去裙襴醋炙牛膝酒浸切焙蒲黃赤芍藥大黃銼炒熟乾地黃焙各一兩黃芩去黑心一兩半水蛭微炒一分上二十味搗羅為散每服一錢匕日再稍加至二錢匕溫酒調以效為度治婦人月候不調或一月再來或隔月不來或多或少臍下娼痛面色萎黃四體虛羸不能飲食當歸湯方當歸切焙牛膝酒浸切焙桃仁湯浸去皮尖雙仁炒黃牡丹皮大黃銼炒各一兩半芎藭土瓜根赤芍藥朴消桂去粗皮各一兩虻蟲去翅足糯米同炒米熟去米水蛭微炒各一分上一十二味粗搗篩每服二錢匕水一盞煎至六分去滓溫服日再夜一治婦人月經不調臍下娼痛桑椹湯方桑椹白茯苓去黑皮牡丹皮熟乾地黃焙桂去粗皮芎藭各一兩上六味粗搗篩每服三錢匕水一盞煎至七分去滓空心溫服治婦人月水不調或一月再來或隔月不來或多或少淋瀝不斷腰腹刺痛不可忍四體虛弱不能飲食心腹堅痛不欲行動體重嗜臥好食酸物乾地黃丸方熟乾地黃一兩半蒲黃牛膝酒浸切焙赤芍藥牡丹皮蜀椒去目併合口者炒出汗白芷桑耳炒乾薑炮黃芩去黑心澤蘭葉各半兩又䗪蟲微炒二十枚桃仁去皮尖雙仁炒黃一兩甘草炙銼芎藭當歸切焙人參丹參各三分虻蟲去翅足糯米同炒熟去米水蛭炒各三十五枚上二十味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心溫酒下漸加至二十五丸治婦人月水不調繞臍㽲痛手足煩熱兩腳痠疼乾薑丸方乾薑炮吳茱萸湯洗焙炒附子炮裂去皮臍各一兩半黃芩去黑