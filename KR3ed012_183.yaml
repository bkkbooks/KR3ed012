日遂至於死臨困之時已闊三寸高一寸瘡有數十孔以手按之諸孔皆膿出初有此候宜急取淨土水和為泥捏作餅厚二分闊一寸半大作艾炷灸泥上百壯干即易餅仍服五香連翹湯及鐵漿攻之又發背未作大膿可水箭射之浸石令冷尉之瘥乳石發身體生瘡論曰服石之法覺飢則食坐臥衣服如之則將適有度而石勢不作倘將適失度則其熱壅滯血氣澀結此身體所以生瘡且屨襪至微一過乎溫則足指生瘡況身體履冪周密之至鮮有不為患者治乳石發熱體生細瘡並熱不已黃連湯方黃連去須芒硝各三兩上二味以水七盞先煎黃連至四盞去滓納芒硝末攪勻停溫以手巾蘸藥拓瘡上治乳石發熱遍體生瘡兼氣力弱大黃湯方大黃銼炒三兩梔子仁二七粒黃芩去黑心麥門冬去心焙甘草炙銼各一兩上五味粗搗篩每服五錢匕水二盞煎至一盞去滓納芒硝末一錢匕更煎三兩沸分溫二服早晨夜臥各一服治乳石發熱身體微腫生瘡升麻湯方升麻葳蕤各一兩半黃芩去黑心二兩犀角鎊甘草炙銼各一兩梔子仁一十枚上六味粗搗篩每服五錢匕水三盞煎至一盞半去滓下紫雪一錢匕分溫二服以利下三兩行為度仍用前黃連湯塗瘡腫上治乳石發體熱生瘡麥門冬湯方麥門冬去心焙三兩甘草炙銼桂去粗皮各一兩半人參一兩上四味粗搗篩每五錢匕水三盞入蔥白二莖煎至一盞半去滓納豉二合更煎三兩沸去滓分溫二服早晨午時至晚各一治乳石發動表裡俱熱身體生瘡或發癰癤大小便不利知母芒硝湯方知母焙甘草炙銼各一兩梔子仁二七枚大黃銼炒四兩黃芩去黑心二兩上五味粗搗篩每服五錢匕水三盞煎至一盞半去滓入芒硝末一錢匕更煎三兩沸分溫二服治乳石發兩股生瘡熱癢兼頭痛麥門冬湯方麥門冬去心焙知母焙澤瀉甘草炙銼各一兩粳米五合上五味粗搗篩每服五錢匕先以水五盞煎小麥二合竹葉二十片至三盞去滓下藥末重煎至一盞半去滓分溫二服空心日晚各一治乳石發動體上生瘡結氣腫痛香豉飲方豉半分蔥白一握切上二味以水二盞半煎至一盞去滓溫服至三四劑治乳石發動煩熱脹滿身體生瘡甘草湯方甘草炙銼麻黃去根節各一兩上二味以水二盞酒半盞煎取一盞半先以火遍炙背令熱欲汗出即熱服之以衣覆臥須臾大汗出即瘥治乳石發動生瘡熱氣衝胸蔥白湯方蔥白三莖切梔子仁十四枚擘碎豉二合上三味以水三盞煎至二盞去滓分作三服早晨午時至晚服之治服乳石患瘡腫方上無問大小或如粟米則加意療之或井水淋或鹽湯洗或以指擲破即以指甲細掐旁邊又以唾數塗之或以蒼耳湯浸洗之或以冷石恣意尉之以瘥為度治乳石發動腳指生瘡者為履襪太溫方上當以腳踐冷地以冷水洗之即瘥乳石發口舌瘡爛論曰乳石發口舌瘡爛者以食飲不時穀氣不足石性暴烈其熱乘於心脾也脾主口心主舌熱積而瘡瘡甚而爛復不得食則熱極可知解之之劑不可緩也治乳石發體熱煩悶口中瘡爛表裡如燒痛不能食梔子仁湯方梔子仁十枚黃芩去黑心大黃銼炒各三兩豉二合上四味粗搗篩每服五錢匕水一盞半入香豉一合煎至八分去滓食前溫服治乳石發動口中傷爛舌強而燥不得食味者為食少穀氣不足藥氣積在胃脘故也宜香豉湯方豉半升葳蕤甘草炙銼各半兩黃柏去粗皮蜜炙銼麥門冬去心焙各一兩上五味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服日再治乳石發頭項煩痛胸脅脹滿寒熱手足逆冷或口生瘡爛或乾嘔惡聞食氣上氣欲絶前胡湯方前胡去蘆頭芍藥大黃銼炒甘草炙銼黃芩去黑心各二兩上五味粗搗篩每服五錢匕水一盞半棗五枚擘破煎至八分去滓溫服日再若氣實者加茯苓去黑皮二兩胸滿塞者加枳殼去瓤麩炒一兩吐逆胸中冷者加乾薑炮二兩口燥者加麥門冬去心焙二兩增減以意量之治乳石發食飲失度口中發瘡漱黃芩湯方黃芩去黑心三兩石膏碎五兩甘草炙銼升麻各二兩上四味粗搗篩每服五錢匕水一盞半煎至八分去滓放冷用漱口一日十遍喉咽有瘡稍稍咽之治乳石發動口舌生瘡鉛霜散方鉛霜研白礬燒灰黃柏去粗皮蜜炙各一兩麝香研一錢上四味搗研為散每用半錢匕摻瘡上有涎即吐之治乳石發口瘡黃柏湯方黃柏去粗皮蜜炙二兩龍膽一兩半黃連去須升麻各一兩上四味粗搗篩每服五錢匕水一盞半煎至八分去滓時時含咽治乳石發動口舌生瘡龍腦散方龍腦半錢鉛霜滑石各一分上三味各研為細末和勻每用一字摻瘡上吐涎瘥治乳石發腹內胸中悉有瘡升麻湯方升麻一兩半烏梅十枚去核炒黃芩去黑心黃連去須栝蔞根甘草炙各一兩上六味粗搗篩每服五錢匕水一盞半煎至一盞去滓細細含咽日三四服治乳石發動口舌生瘡連頰腫痛升麻散方升麻防風去叉甘草炙各半兩雞腸草三分芎藭大青各一分上六味搗羅為散每先於瘡腫處針出惡血鹽湯漱後用藥半錢匕貼瘡上日三治乳石發動口舌生瘡浮萍丸方干浮萍草升麻黃藥鉛丹炒研各半兩上四味搗研為末煉蜜丸如雞頭實大每服一丸含化咽津
