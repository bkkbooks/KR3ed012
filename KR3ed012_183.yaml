body:
  text: 卷第一百八十三乳石發動門乳石發動統論論曰內經謂石藥性悍非緩心和人不可服夫聖人垂訓深矣世之服乳石者至於輕生傷性恃毫髮所得不戒夫毒烈之過夭於中道十有七八夫豈知大冶範形精全神固和理均足初無加損也能者養以取福則全生盡年若乃情竇一開嗜欲滋甚方且資剛暴勇猛之劑以蘄補養積之畎澮泄之尾閭果何所賴耶說者乃以益氣補精安五臟通百節利九竅延年益壽利人如此其多謂不可不食其食也乃分少稚強壯之先後又以石精石滓分上士下士所服之優劣夫以其有益於人必欲資是以祛沉痾痼疾可也當氣體調和營衛流通亦何必區區於煉餌哉胡不考服食之後將護多端一失其度發作異態飲食之細則有或熱或溫之過衣服坐臥則有溫衣厚衣久坐久停之患其它六反七急八不可三無疑又須謹畏而力行惝有不慎疾不旋踵與其服食失度自詒伊戚曷若清靜恬淡克保沖和今敘疾疢之由庶幾無輕餌乳石將適失度論曰服餌藥劑皆有常式戒慎將適每務周至矧乳石慓悍尤當謹畏煉食之後宜如何哉飲食衣服居處勞佚溫熱寒涼之度所當究圖者無慮數十一失其度疾疢之孽速於影響蓋精明非華他審治非仲景輕信服食棄是從非動發急難不知解救則有能消息節度專意候察者亦庶幾免於困斃也治乳石發動咽痛鼻塞涕出者此為衣溫近火方上宜速脫衣當風取冷以冷石尉咽鼻即瘥治乳石發動輒安臥不與人語者此為熱盛食少失其性方上宜與熱酒冷洗冷食自勞即瘥治乳石發動耳鳴如風聲又有汗出者此為自勞過度陽事不節氣上方上宜數飲食補之節禁陽事即瘥治乳石發動關節強直不可屈伸者此為久停息不自勞曳藥氣不散漸侵筋血方上宜出力使溫冷水洗之即瘥治乳石發動身體痛楚無常處如遊風者此為犯熱所作方上宜冷洗以冷石尉之即瘥治乳石發動服藥心悶亂者此為服溫藥與疾爭力方上當大吐或不吐病當困斃若吐不絶者可冷食飲即瘥若絶不識人口不開者亦當琢齒以熱酒灌之入咽吐出者更當與之但得酒氣下通不半日即蘇治乳石發動臂腳偏急痛苦者此為久坐臥溫熱不自移轉氣入肺脾胃方上勤以布巾浸冷水拓之覺溫則易三日即瘥治乳石發動似傷寒溫瘧者此為犯熱方上宜以常治傷寒溫瘧藥救之但勿服熱藥耳其傷寒藥等皆除熱破癖不與寒食相妨故通服也凡服寒食雖已熱解而更病者要先以寒食救之終不中冷治乳石發動脫衣便寒著衣便熱此為脫著失度方上小寒自可著衣小溫便可脫衣及冷洗之即爽應洗勿疑若忍之則病成矣治乳石發動脈洪實或斷絶不足似死脈或細數弦駃其所犯非一熱多則弦駃有癖則洪實急痛方上宜寒食自無所苦蓋熱藥發動率常如此治乳石發動夜不得睡者此為食少熱在內方上當服大黃黃芩梔子三黃湯數進冷食自得睡也治乳石發動眩冒欲倒者此為衣厚犯熱方上宜冷水淋頭並洗之即瘥治乳石發動腳疼欲折者此為久坐溫處方上當單床薄衣勿怠行役並以冷水洗浴即瘥治乳石發動食患冷不下者此為久冷食口中不知味方上當作白酒糜多著酥熱食一兩頓若小悶者還令冷飲食即瘥治乳石發動下部臭爛者此為所坐薦席厚熱方上當坐冷水中即瘥治乳石發動百節痠痛者此為臥處太厚又蓋覆被衣溫厚不時脫去方上當單床薄被衣或以冷水洗勿著故垢衣雖冬寒亦須散發受風仍以冷石尉其衣衣勿繫帶若犯此煩悶者急入冷水浴勿忍病而畏冷也治乳石發動遺失大便不自覺者此為熱氣入胃大腸不禁方上當冷水洗之即瘥乳石發動寒熱論曰乳石發動寒熱者以石熱壅積將適失度陰陽之氣不得和平也蓋陽病發熱陰病發寒一於熱則偏於陽一於寒則偏於陰時寒時熱則營衛交爭陰陽相勝若傷寒諸瘧之狀是也治諸石發動口乾時作寒熱似鬼神病麥門冬丸方麥門冬去心焙五兩大黃銼炒苦參葳蕤梔子仁五加皮銼黃芩去黑心犀角鎊芍藥升麻大青各一兩甘草炙三分上一十二味搗羅為末煉蜜搜和更搗勻熟丸如梧桐子大每食後以蜜水下十五丸漸加至二十丸治乳石發動口乾寒熱似鬼神為病犀角丸方犀角屑五加皮銼黃芩去黑心各一兩苦參大黃銼碎微炒芍藥各一兩半大青甘草炙各三分麥門冬去心焙上九味搗羅為末煉蜜和丸如梧桐子大食後以蜜水下十五丸漸加至二十丸早晨日午晚後各一服治乳石發如傷寒寒熱狀兼似瘧前胡湯方前胡去蘆頭黃芩去黑心甘草炙銼知母各二兩牡蠣熬石膏各三兩上六味粗搗篩每服四錢匕以水一盞半入生薑一棗大切棗二枚擘破煎至八分去滓溫服治乳石毒經二三十年發動為寒熱或栗栗似寒中者或欲食或不欲食若服紫石英發熱者熱悶昏昏喜臥起便無力皆腑氣所生臟氣不知礜石熱燥如戰石硫黃熱鬱如熱極者身並破裂華他芍藥湯方芍藥赤茯苓去黑皮人參藍實黃芩去黑心甘草炙赤各一兩薺苨二兩蔓荊子一升上八味除蔓荊子外搗為粗末每服五錢匕用水四盞先煮蔓荊子一合至三盞去滓次下藥末煎至一盞半去滓分溫三服早晨日午晚後各一服治乳石發動兢戰惡寒或發熱如溫瘧此為失食忍飢失洗所致宜此方上宜急食冷食及冷水洗數遍即愈治乳石發若得時氣冷熱不調動乳者皆是寒熱所致其狀似瘧久不療損人性命縱服湯藥必是難瘥宜作生熟湯浴之方上以溫湯半浴盆如過熱投少冷水解之即於湯中坐須臾百節開寒熱之氣皆從毛孔中出變作流汗若心中熱悶者還服少許熱湯即定久乃出湯以衣被覆蓋睡豁然平復如患大重者不過三兩度也乳石發渴論曰石性沉下服之歸腎若發動則腑臟生熱津液枯燥蓋腎惡燥腎燥則渴而引飲不可為量久則變為三消之證治乳石發動虛熱大渴生地黃湯方生地黃銼四兩竹葉切二握小麥半升黃耆銼黃芩去黑心木通銼前胡去蘆頭栝蔞根大黃銼炒各一兩半芍藥升麻甘草炙銼知母焙赤茯苓去黑皮人參當歸切焙各一兩上一十六味銼如麻豆每服五錢匕水二盞同煎至一盞去滓不拘時溫服治乳石發動熱渴口乾黃耆湯方黃耆銼麥門冬去心焙芍藥栝蔞根各三兩生乾地黃焙二兩半梔子仁三十枚升麻二兩黃芩去黑心一兩上八味粗搗篩每服四錢匕水一盞半煎至一盞去滓不拘時溫服治乳石發虛熱上衝口乾頭面熱赤大渴葛根煎方生葛根搗汁白蜜生地黃搗汁各一盞生薑汁三分一盞棗肉研膏二兩生麥門冬去心研膏二兩上六味同於微火上以銀石器煎成如餳用瓷合盛每服半匙頭不拘時含化治乳石發熱渴蔥白飲方蔥白切四兩葫葉切薺苨銼枸杞碎各一兩上四味粗搗篩每取二兩以水二碗煎至一碗去滓分溫三服空心日午近晚各一治乳石發熱渴竹葉湯方淡竹葉切半斤赤茯苓去黑皮石膏碎各二兩栝蔞根一兩半小麥一兩上五味粗搗篩每服五錢匕水一盞半煎至一盞去滓不拘時溫服治服乳石將適失度飲食冷熱不消虛脹吐清水渴悶人參湯方人參枳殼去瓤麩炒甘草炙銼栝蔞根銼白朮各一兩上五味粗搗篩每服四錢匕水一盞半棗二枚擘破同煎至一盞去滓溫服不拘時治乳石發熱盛口乾茯苓湯方白茯苓去黑皮四兩澤瀉二兩白朮乾薑炮桂去粗皮甘草炙銼各一兩半小麥二兩上七味粗搗篩每服三錢匕水一盞煎至七分去滓不拘時溫服治乳石發壅熱煩悶渴躁枳實湯方枳實去瓤麩炒赤茯苓去黑皮石膏研各半兩上三味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服不拘時治乳石發熱盛煩躁口乾桃仁粥丸方桃仁去皮尖並雙仁研二兩白米半升上二味以水一斗煎取五升渴即不拘多少飲之治乳石發渴黃連丸方黃連去須半斤麥門冬去心焙二兩生地黃取汁二合羊乳二合栝蔞根取汁二合上五味先以黃連麥門冬二味搗羅為末次以三味汁和衆手丸如梧桐子大每服二十丸米飲下不拘時治乳石發動大渴方生田螺三升以水洗一二遍上一味又以新汲水一斗浸一復時澄取清汁不拘時飲之其田螺經宿放卻不用更取新者如前法浸之治乳石發渴方竹根洗銼五兩上一味以水五碗濃煮取汁渴即飲之治乳石發渴方青粱米三合上一味以水煮取汁飲之治乳石發渴方大麻仁研一升上一味每取三合以水三升煎取汁二升時時飲之治乳石發渴方黃柏半斤去皮銼上一味每服二兩水五盞煎至三盞渴即飲之乳石發動上衝頭面及身體壯熱論曰乳石發動上衝頭面及身體壯熱者由將適過度臟腑痞塞氣不得宣通也夫服乳石者以能捍風寒逐冷濕導經脈益飲食也然在陰則補其不足在陽則能益其栗悍若陰盛陽虛則石氣發露此所以熱沖頭面身體也治乳石發胸背頭中游熱黃耆湯方黃耆銼芍藥甘草炙赤茯苓去黑皮人參石膏碎生地黃切焙生薑切焙麻黃去根節湯煮掠去沫麥門冬去心焙各二兩桂去粗皮一兩上一十一味粗搗篩每服四錢匕水二盞入竹葉十片棗二枚擘破同煎至八分去滓溫服早晨日午夜臥各一治乳石發動身熱如火黃芩湯方黃芩去黑心枳實去瓤麩炒各二兩梔子仁十四枚栝蔞根厚朴去粗皮生薑汁炙上七味粗搗篩每服四錢匕水二盞煎至一盞去滓溫服早晨日午食前各一治乳石發熱如火頭痛煩悶寒熱嘔逆升麻湯方升麻前胡去蘆頭甘草炙各二兩黃芩去黑心生地黃切焙各三兩枳殼去瓤麩炒上九味粗搗篩每服四錢匕水二盞入豉一合綿裹同煎至一盞去滓溫服早晨日午各一心煩加麥門冬一兩稍冷加生薑一兩治桃花石發即心噤身熱頭痛宜溫清酒隨多少服之酒行即瘥亦可服大麥麩並此麥奴湯方大麥奴陰乾麥門冬去心焙各二兩桂去粗皮一兩半人參甘草炙各一兩上五味粗搗篩每服四錢匕水二盞入蔥白四寸同煎至一盞去滓溫服早晚食前各一治乳石發食訖心煩悶寒熱頭眩胸中不安者茵陳蒿湯方茵陳蒿四兩梔子仁二十枚大黃銼炒二兩上三味粗搗篩每服三錢匕水一盞煎至七分去滓溫服空心早晚食前各一治乳石發動忽大熱多欲就臥冷地又不得食諸熱面熱酒方五加木根葉皮銼曝二兩上一味粗搗篩每服四錢匕水一盞煎至七分去滓溫服治浮石發熱除熱蜂房湯方露蜂房炙三兩上一味銼碎以水三盞煎至一盞去滓頓服若不定隔三五日再服治金石發熱及諸熱暴赤目方冬葵子二合朴硝一合上二味以水二升同煎至一升去滓分三服空心早晚食前各一治金石發熱及諸熱朴硝丸方朴硝煉成半斤上一味研成粉煉蜜丸如梧桐子大每服三十丸食後蜜水下服金石經年覺身中少熱即以此丸壓之每夜臥時服三十至四十丸取胸膈涼為度若有時患及發者即取朴硝粉一匙空心水調服之以利為度凡朴硝取色白而不著風者佳色黃者傷人治乳石心下煩悶內熱不安冷石湯方凝水石半兩上一味以水半盞磨汁服之不瘥再作治乳石發麻黃湯方麻黃去根節湯煮掠去沫二兩石膏碎一兩黃芩去黑心一兩半上三味粗搗篩分作兩帖每帖以水三盞煎至二盞去滓內雞子白二枚芒硝末一錢熱攪令沫出以塗摩瘡上即瘥治石藥發動上衝頭面疼痛浮腫心神恍惚防風湯方防風去叉當歸切焙澤瀉威靈仙去土甘草炙銼黃連去須虎杖各一兩半石葦去毛天門冬去心焙白石脂研槐實炒地榆各二兩石膏椎碎三兩生地黃切焙六兩大黃銼炒黃芩去黑心犀角鎊硝石研各一兩上一十八味㕮咀每服五錢匕以水一盞半入生薑一分拍碎同煎取八分去滓溫服乳石發動吐血