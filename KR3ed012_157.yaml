body:
  text: 卷第一百五十七妊娠胎間水氣肌膚浮腫論曰脾合土候肌肉土氣和平則能制水水自傳化無有停積若妊娠脾胃氣虛經血壅閉則水飲不化濕氣淫溢外攻形體內注胞胎懷妊之始腫滿者必傷胎氣如臨月而腳微腫者利其小便則病可愈治妊娠經氣壅滯身體浮腫喘促大便難小便澀澤瀉湯方澤瀉桑根白皮銼木通銼枳殼去瓤麩炒赤茯苓去黑皮檳榔銼各一兩上六味粗搗篩每服四錢匕水一盞半入生薑半分拍碎煎至八分去滓食前溫服稍利為度日再治妊娠通身浮腫喘息促小便澀防己湯方防己大腹皮銼各三分桑根白皮銼紫蘇莖葉赤茯苓去黑皮各一兩木香一分上六味粗搗篩每服四錢水一盞入生薑半分拍碎煎至六分去滓食前溫服治妊娠身體浮腫心腹脹滿小便不通木通湯方木通銼香薷桑根白皮銼各一兩木香訶黎勒皮黃芩各三分枳殼去瓤麩炒檳榔紫蘇莖葉各半兩上九味粗搗篩每服四錢匕水一盞入生薑半分拍碎煎至六分去滓溫服食前日再治妊娠四肢腫滿小便不利喘促桑白皮湯方桑根白皮銼一兩枳殼去瓤麩炒商陸各半兩澤瀉三分冬葵根赤茯苓去黑皮木通銼各一兩上七味粗搗篩每服四錢匕水一盞半入生薑半分拍碎煎至八分去滓食前溫服以利為度治妊娠四肢浮腫皮肉拘急小便不利商陸湯方商陸羌活去蘆頭各半兩桑根白皮銼一兩上三味粗搗篩每服四錢匕水一盞半入赤小豆一百粒煎至八分去滓食前溫服日再治妊娠身體浮腫心腹急滿小便赤澀赤茯苓湯方赤茯苓去黑皮一兩白朮旋覆花各半兩杏仁湯浸去皮尖雙仁麩炒木通銼黃芩各三分上六味粗搗篩每服三錢匕水一盞入生薑半分拍碎煎至六分去滓食前溫服治妊娠身體腫有水氣心腹脹滿小便澀茯苓丸方赤茯苓去黑皮一兩檳榔銼半兩白朮炒三分郁李仁湯浸去皮研半兩枳殼去瓤麩炒半兩葶藶子炒令黃研三分上六味搗羅四味為末入二味同研令細煉蜜丸如梧桐子大每服二十丸煎桑白皮湯下治妊娠水腫茯苓湯方赤茯苓去黑皮白朮黃芩去黑心杏仁湯浸去皮尖雙仁炒旋覆花各一兩防己二兩上六味粗搗篩每服四錢匕水一盞半煎至七分去滓溫服治妊娠胎間水氣子滿體腫茯苓飲方赤茯苓去黑皮白朮各二兩杏仁去皮尖雙仁炒黃旋覆花各一兩黃芩去黑心一兩半上五味粗搗篩每服五錢匕水一盞半煎七分去滓溫服空心食前日二治妊娠四肢腫皮肉拘急桑白皮飲方桑根白皮銼炒一兩商陸根一兩半赤小豆三合羌活去蘆頭半兩上四味㕮咀如小豆大拌勻用水五盞入生薑七片同煮候豆熟濾去滓渴即飲汁並食豆小便利瘥治妊娠遍身虛腫寄生飲方桑寄生一兩桑根白皮銼炒三分木香半兩紫蘇莖葉一兩大腹二分半上五味細銼如麻豆大拌勻每服三錢匕水一盞煎至七分去滓溫服妊娠小便不通論曰妊娠小腸挾熱熱結胞內使氣道痞澀故小便不通令人腹脅脹滿臍下急痛是其證也治妊娠小便不通及胞轉臍下脹痛木通丸方木通銼黃芩去黑心冬葵子微炒生乾地黃焙各一兩上四味搗羅為末用麵糊和丸如梧桐子大每服二十丸燈心湯下食前服治妊娠小便不通心神悶亂少腹急痛榆白皮散方榆白皮銼王不留行滑石各一兩上三味搗研為細散每服二錢匕煎燈心湯調下治妊娠小便不通臍下鞕痛豬苓湯方豬苓去黑皮木通銼桑根白皮銼一兩上三味粗搗篩每服三錢匕水一盞入燈心同煎至七分去滓食前溫服治妊娠小便不通小腹脹痛冬葵子散方冬葵子微炒榆白皮細銼滑石研阿膠炙令燥各一兩上四味搗羅為散每服二錢匕溫水調服不拘時治妊娠小便不通臍下滿痛四味葵根湯方冬葵根一握洗去土冬即用子車前子木通細銼各三兩阿膠炙令燥二兩上四味粗搗篩每服五錢匕水一盞半煎至八分去滓食前溫服治妊娠子淋小便不通大黃湯方大黃銼炒地膚草豬苓去黑皮知母微炒芍藥枳實去瓤麩炒升麻木通銼甘草炙各一兩黃芩去黑心半兩上一十味粗搗篩每服三錢匕以水一盞煎至七分去滓溫服日再治妊娠子淋小便不通茯苓湯方赤茯苓去黑皮白朮郁李仁湯浸去皮尖杏仁去皮尖雙仁炒旋覆花各一兩檳榔五枚銼上六味粗搗篩每服二錢匕水一盞煎至七分去滓空心溫服治妊娠子淋小便澀不通小腹急水道熱痛冬葵子湯方冬葵子三合黃芩去黑心半兩赤茯苓去黑皮芍藥車前子各一兩上五味粗搗篩每服五錢匕水一盞半煎取八分去滓空心溫服治妊娠小便澀車前子湯方車前子二合冬葵根洗銼二兩半上二味粗搗篩每服五錢匕以水一盞半煎至八分去滓空心溫服治妊娠小便不通快茯苓散方赤茯苓去黑皮冬葵子各一兩上二味搗羅為散每服二錢匕以溫水調服日三治妊娠小便不通利榆白皮湯方榆白皮銼冬葵子各一兩上二味粗搗篩每服三錢匕以水一盆煎至七分去滓空心食前溫服日三治妊娠小便澀不通利蔓荊實散方蔓荊實二兩上一味搗羅為散每服二錢匕溫水調服空心午前各一治妊娠子淋小便數少熱痛手足煩疼地膚湯方地膚草銼二兩上一味粗搗篩每服三錢匕水一盞半煎至八分去滓食前溫服日三治妊娠患子淋豬苓散方豬苓去黑皮三兩上一味搗羅為散每服二錢匕熱湯調不拘時服治妊娠患子淋及小便不通冬葵根湯方葵根一握銼用子一合研亦得上一味以水三盞煎取一盞半去滓分溫二服治妊娠小便不通方葵根切一握榆皮銼半兩上二味以水三盞半煎至一盞半分溫三服又方蔓荊子五合上一味搗羅為散溫水調服方寸匕治妊娠小便澀滑石敷方滑石二兩上一味細研每次用半兩以新汲水調稀稠得所塗於臍下二寸小便即利未利更塗之妊娠小便利論曰腎主水入胞為小便腎氣和平乃能約制溲出以時若妊娠腎虛胞冷不能約制故小便利下而多也其證令人背項憎風少腹急痛治法當加以扶養胎氣之劑治妊娠小便滑數桑螵蛸湯方桑螵蛸炒人參各一兩鹿茸去毛酥炙黃耆銼各二兩牡蠣粉一兩半甘草炙銼半兩上六味粗搗篩每服三錢匕水一盞生薑一棗大切棗二枚擘煎至七分去滓食前溫服治妊娠下焦冷氣少腹疼痛小便利多鹿茸丸方鹿茸去毛酥炙一兩白龍骨燒過三分桑螵蛸炒半兩牡蠣粉二兩上四味搗羅為末酒煮麵糊和丸如梧桐子大每服二十丸空心食前溫湯下治妊娠遺尿雞䏶胵散方雞䏶胵十具炙乾熟乾地黃焙當歸焙各半兩牡蠣粉黃耆銼各一兩厚朴去粗皮生薑汁炙三分上六味搗羅為散每服二錢匕食前溫酒調下治妊娠小便無度白薇散方白薇白芍藥各一兩上二味搗羅為散每服一錢匕食前溫酒調下日三治妊娠小便利日夜無度菟絲子丸方菟絲子酒浸焙乾別搗二兩菖蒲肉蓯蓉酒浸切焙各一兩蛇床子酒浸三日河水淘焙乾五味子洗焙各半兩防風去叉遠志去心各一分上七味搗羅為末煉蜜和搗三百杵丸如梧桐子大每服十丸空心溫酒下治妊娠小便利溫氣除寒補下丸方葫蘆巴酒浸焙龍骨研菖蒲各半兩遠志去心一兩半補骨脂炒益智去皮肉蓯蓉酒浸一宿切焙各一兩上七味搗羅為細末煉蜜和丸如梧桐子大每服三十丸空心溫酒下治妊娠小便利秦椒丸方秦椒去目及閉口炒出汗六兩蘹香子炒一兩黃蠟四兩熬化入地黃汁少許攪勻上三味搗羅二味為末熔蠟和丸如梧桐子大每服二十丸空心溫酒下治妊娠小便利少腹急痛艾葉丸方艾葉炙乾薑生各一兩厚朴去粗皮生薑汁炙益智去皮各半兩上四味搗羅為末煉蜜和丸如梧桐子大每服三十丸米飲下以飯壓之治妊娠小便日夜頻數椒菊丸方蜀椒去目及合口炒取紅二兩甘菊花肉蓯蓉酒浸一宿切焙菖蒲各一兩巴戟天去心遠志去心黃耆銼附子炮裂去皮臍各半兩上八味為細末酒煮麵糊和丸如梧桐子大每服二十丸空心食前溫酒下治妊娠小便不禁臍腹疼痛熟乾地黃丸方熟乾地黃焙巴戟天去心肉蓯蓉酒浸一宿切焙五味子山茱萸醋浸一宿炒蒺藜子炒去角萆薢山芋蜀椒去目及合口者炒取紅續斷各一兩菟絲子酒浸別搗杜仲去粗皮蜜炙各半兩沉香一分上一十三味為細末煉蜜和丸如梧桐子大每服十五丸食前溫酒下妊娠大便不通論曰妊娠腸胃有風加之挾熱津液不足氣道痞澀故令腸胃枯燥大便不通甚則呼吸奔喘腹脹乾嘔治妊娠大便不通腹滿不能食養津液潤腸胃麻仁丸方火麻仁別研如膏四兩人參訶黎勒煨去核各二兩大黃銼炒半兩上四味先搗後三味為末次入麻仁煉蜜和劑更於臼內塗酥杵勻丸如梧桐子大每服三十丸空心溫水下大便通即止治妊娠大便熱結旬日不通檳榔丸方檳榔碎銼一兩木香半兩大黃銼炒二兩青橘皮湯浸去白焙半兩牽牛子二兩一半生用一半炒上五味搗羅為末煉蜜和劑更於臼內塗酥杵勻丸如梧桐子大每服二十丸溫水下空心服治妊娠熱在臟腑大便祕澀羌活丸方羌活去蘆頭二兩半火麻仁別研三兩檳榔五枚銼防風去叉枳殼去瓤麩炒各一兩大黃銼炒一兩半木香一兩上七味搗羅六味為末與麻仁同研勻煉蜜和丸如梧桐子大每服二十丸溫水下食前服日三以微利為度治妊娠大便結塞不通臍腹硬脹不能安臥氣上喘逆枳殼丸方枳殼去瓤麩炒一兩半大黃微炒二兩半上二味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心米飲下未通再服以通為度治妊娠大便不通腹脅堅脹潤腸丸方枳殼去瓤麩炒為末火麻仁別研各一兩上二味再研勻煉蜜和丸如梧桐子大每服三十丸食前溫水下生薑湯亦得治妊娠大便不通蔥膠湯方蔥白一莖切牛皮膠二斤大者椎碎上二味以水一盞半煎令膠煬盡去滓頓服之治妊娠大便不通疏氣黃耆丸方黃耆銼枳殼去瓤麩炒各一兩威靈仙二兩上三味搗羅為末用麵糊和丸如小豆大每服三十丸溫水下不拘時未通稍加之妊娠大小便不通論曰妊娠大小便不通者以臟腑盛實熱氣蘊積不時宣導之所致也若熱結於大腸則大便不通結於小腸則小便不通今大小腸俱有熱則大小便俱不通其候令人煩滿少腹脹急惟能均調腑臟使氣疏達則傳化無所留滯也治妊娠大小便不通臍腹脹痛梔子湯方梔子仁一兩半石膏四兩黃芩去黑心一兩半澤瀉二兩柴胡去苗一兩半赤芍藥二兩葳蕤一兩半車前草切半兩上八味粗搗篩每服四錢匕水一盞半淡竹葉十片同煎至八分去滓食前服治妊娠大小便不通心腹妨悶不欲飲食檳榔湯方檳榔銼赤茯苓去黑皮大腹皮銼木通銼郁李仁湯浸去皮尖微炒各一兩甘草炙桔梗炒桑上寄生各半兩上八味粗搗篩每服四錢匕水一盞煎取七分去滓不計時候溫服治妊娠大小便不通七八日以上腹脹瞀悶冬葵根湯方冬葵根乾者一握洗冬即用子車前草一兩乾者切木通細銼三兩大黃銼炒半兩上四味粗搗篩每服五錢匕水一盞半煎至八分去滓食前溫服治妊娠大小便不通心腹脹悶枳殼散方枳殼去瓤麩炒三分檳榔銼木通銼各一兩大黃銼微炒半兩訶黎勒二枚煨二枚生各取皮用大腹皮三枚銼上六味搗羅為散每服用童子小便一盞入蔥白二寸煎取七分去滓調下二錢匕不拘時候治妊娠大小便不通下焦熱結柴胡通塞湯方柴胡去苗黃芩去黑心陳橘皮湯浸去白微炒澤瀉羚羊角鎊各三分梔子仁一兩石膏一兩大黃銼炒一兩上八味粗搗篩每服四錢匕水一盞入生地黃一分拍破豉半分微炒同煎至七分去滓食前服治妊娠大小便不通木通飲方木通細銼二兩車前子一兩半黃芩去黑心