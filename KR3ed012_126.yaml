body:
  text: 卷第一百二十六瘰癧門瘰癧統論論曰瘰癧者其本多因恚怒氣逆憂思恐懼或飲食有蟲鼠餘毒或風熱邪氣客於肌肉隨虛處停結或在頸項或在胸腋纍纍相連是也詳考方論有風毒氣毒熱毒之異有寒熱結核膿潰之殊然瘰癧又謂之鼠瘻者蓋甲乙經云寒熱瘰癧皆鼠瘻寒熱之氣所生是也瘰癧又通謂之九瘻者蓋孫思邈云九瘻之為病皆寒熱瘰癧在於頸腋是也其治法大要古人皆曰浮於脈中未著肌肉而外為膿血去者急刺去之已潰者治如癰法內服五香連翹湯以蕩滌之外以火針攻結核中及飲食動作悉能忌慎則鮮不瘥者瘰癧結核論曰瘰癧結核者由風熱毒氣蘊積肝經攻注筋脈毒氣鬱而不散故項腋之間瘰癧結聚成核或如梅棗核狀纍纍相連其證令人乍寒乍熱頭項強痛心神煩躁蓋毒氣與血氣相搏則營衛不和使之然也治男女長幼瘰癧結核在項腋下項強背痛連翹湯方連翹玄參木香昆布洗去咸焙枳殼去瓤麩炒犀角鎊各一兩半柴胡去苗甘草炙銼木通銼芍藥黃芩去黑心沉香銼當歸切焙升麻各一兩上十四味粗搗篩每服五錢匕水二盞入生薑一棗大拍碎柳枝二寸長一握細銼煎至一盞去滓溫服空心日午夜臥各一服治瘰癧腫毒結成惡核三黃丸方大黃銼炒當歸切焙各一兩梔子仁一分柴胡去苗三分黃連去須黃芩去黑心赤茯苓去黑皮桂去粗皮乾薑炮芍藥各半兩上十味搗羅為末煉蜜丸如小豆大每服十丸空心溫酒下日三取微利更以意增減治初患瘰癧項邊磊磊如石皮肉寒熱赤腫烏犀湯方犀角鎊惡實炒各三兩沉香三分麝香研半錢丁香半兩玄參三分大黃銼炒木通銼射干連翹各一兩上十味粗搗篩每服五錢匕水一盞半煎至八分去滓空心溫服至晚再服利下為度治惡核犀角丸方犀角鎊木香各一分硇砂研水飛一錢白茯苓去黑皮半兩皂莢去皮子酥炙乾白薄荷大黃銼炒各一兩原蠶蛾何首烏天麻各二兩上十味搗羅為細末用生羊肉精者細切研成膏和丸如黍米大每服七丸茶清下不拘時治瘰癧毒腫沉香湯方沉香銼丁香木香麝香研各一分連翹黃芩去黑心各半兩犀角鎊一兩半升麻一兩上八味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服空心日午夜臥各一服治惡核腫痛連翹散方連翹何首烏米泔浸一宿焙乾白薄荷各一兩麝香研半錢升麻惡實炒白茯苓去黑皮蛇蛻皮酒浸炙各半兩上八味搗羅為細散每服一錢匕食前溫酒調下日三治氣癧結核未破者四香飲方丁香木香沉香銼乳香青橘皮湯浸去白焙各一兩陳橘皮湯浸去白焙半兩枳實去瓤麩炒一分上七味粗搗篩每服三錢匕水一盞煎三四沸去滓食後溫服日三治瘰癧肝中有根桑白皮湯方桑根白皮銼硝石研如粉各二兩紫葛芍藥各三分犀角鎊虎杖各一分上六味將前五味粗搗篩每服五錢匕水一盞半煎至八分去滓入硝石半錢匕打勻空心晚後溫服利根本似筋膜蝦蟆衣之類治丈夫婦人瘰癧結實在項上腋下磊磊如彈丸相連犀角散方犀角鎊人參鹿角鎊赤茯苓男用白女用赤各去黑皮白蘞各一分斑蝥三十個糯米炒熟去米糯米一合上七味搗羅為細散合研令勻看大小斟酌與服每服二十以上二錢匕十歲一錢匕並以蜜二匙水二盞同煎至一盞先調滑石末二錢匕後調此散子夜臥時服至明小便內取下惡物三五日一服取瘥為度治項上瘰癧如棗李核者先服紫葳散方紫葳凌霄花是也海藻洗去咸焙瞿麥穗牡蠣煅研成粉左顧者真甘草炙各一兩上五味搗羅為細散每服一錢半匕食後白湯調下日二治瘰癧腫痛成瘡神妙散方牽牛子炒半生半熟青橘皮湯浸去白焙梔子仁地骨皮玄參上五味等分搗羅為細散每服二錢匕空心糯米飲調下次日服後生犀丸消毒化結聚生犀丸方犀角鎊半錢龍腦麝香研各半分紅娘子二十枚斑蝥二十一枚去頭翅足同紅娘子著豆麵炒焦上五味搗羅為細末用豆麵糊丸如緑豆大每服一丸空心日午夜臥臘茶放溫下服至十日加至二丸治風熱毒氣項下結核及欲作癰疽瘡癤發背等凝冰散方緑豆粉乳香研各一兩上二味合研為散實人分作四服虛人分作八服食後米飲調下就有核處一邊臥盡劑必瘥大消腫痛治瘰癧腫痛不同大人小兒皆能療之不二散牡蠣煅赤一兩蝟皮一枚生銼焙乾上二味搗羅為散每服二錢匕溫酒調下治瘰癧一切結核大效丸方斑蝥一枚黑豆七粒生芽者上二味同研為丸如緑豆大每服五丸茶清下小兒一丸治瘰癧滿項不破及結核腫痛者皂子丸方不蛀皂子三百粒上一味用酒一升半化硇砂一兩同浸七日以慢火熬酒盡為度每服三粒臨臥含化半月必瘥治瘰癧腫結內消方海藻一斤上一味用酒五升浸數日食後少少飲酒又方蝸牛殼不拘多少上一味搗為細散每服二錢匕空心米飲調下日再至四十九日自消又方檞白皮切二合上一味以水四盞煎至一盞去滓頓服當吐惡物治惡肉惡核瘰癧初腫丹參膏方丹參炙銼白芨各二兩升麻蒴藋根各一兩半獨活去蘆頭防己連翹白蘞玄參杏仁去皮尖雙仁各一兩上十味細切以生地黃汁一升淹浸一宿入鐺內微煎十沸入豬膏四升微煎一炊飯久膏成去滓用摩病處日二三度治瘰癧息肉結硬白蘞膏方白蘞莽草玄參木香芍藥大黃生用各三兩上六味搗羅為末旋取以醋和如膏塗帛上貼之干極即易治風熱結硬腫赤疼痛及腮頷下忽結成核消毒塗方大黃二兩景天五兩護火草是也上二味同搗爛塗於患處干即再敷治瘰癧結聚不散硬如石大蒜膏方大蒜三枚搗爛麝香研半錢匕上二味和勻敷於帛上貼之一日二易旋搗最好治瘰癧發腫及結惡核皆不可針及癰未潰方莽草一兩上一味搗末和雞子白塗貼之一日二易治瘰癧已成漏瘡歲久不愈千治千愈紫紅散方信砒一錢礬石二錢鉛丹三錢上三味用瓷罐子先入砒次入礬次入鉛丹勻蓋之鹽泥固濟炭火煅煙盡至紫色取出以紙襯於地上一時辰出火毒研細先以溫水淨洗瘡挹干取藥少許以生蜜調塗日夜五六次塗至五七日瘡漸斂紫黑色即用桃紅散敷之桃紅散方血竭須真好者如無以深色胭脂代之上一味為細末以自津唾調日夜頻塗候瘡成靨即用浴毒湯洗之浴毒湯方黃柏去粗皮黃連去須甘草銼黃芩去黑心各一兩柏枝一把截如箅子長大豆一合上六味粗搗篩每用三四匙以水二升煎至一升乘熱淋洗日三四次候洗下靨子即用平肌散敷之平肌散方黃狗頭骨燒灰鯪鯉甲燒灰各一錢亂髮一團指大燒灰上三味研勻如瘡口已干用自津唾調濕敷之日三四次瘡即平愈治瘰癧在項上結成顆塊及觸處但有結凝似作瘻癰急灸法獨頭蒜一顆上一味截兩頭去心作艾炷大與蒜稱貼癧子灸之勿令破肉但取氣而已覺熱勿畏每七壯易蒜可至七易取消治瘰癧白蠶散方白殭蠶一兩麒麟竭沒藥各半兩上三味搗研為散每服一錢半匕麝香溫酒調下治瘰癧已破未破蝸牛丸方蝸牛半碗雞蘇半斤上二味同研極細水浸宿蒸餅丸如梧桐子大每服十五丸瘡未破漿水下已破薄荷湯下日三治瘰癧瘡口膿水不止罐灰散方糞堆里破瓦罐耳上一味淨洗於灶心掘坑安在坑中燒三日令捻得碎細研乾摻瘡上治瘰癧蛇犀散方白花蛇肉酒浸焙四兩犀角鎊一兩青橘皮去白焙半兩牽牛子一兩半內一兩炒熟半兩生用上四味搗羅為散每服二錢匕別入膩粉二錢匕糯米飲調下五更初服至午前取下惡物如取未盡經半月後再服未成瘡者內消成瘡者瘡自干合治五種瘰癧牡蠣散方牡蠣煅研連翹瓦上炒搗各一兩上二味為細散每服一錢匕臨臥無灰酒調下瘥後更服一兩永不發治瘰癧結核犀角丸方犀角屑吳藍黃芩去黑心山梔子仁巴豆去心皮炒研出油各半兩升麻黃耆銼防風去叉甘草炙銼各三分大黃生銼一兩半連珠草一兩上十一味搗研為末煉蜜和丸如梧桐子大每服三丸米飲下未利加至六七丸取利為度治瘰癧初結纍纍如梅李核日漸不消則破壞頸腋內消丸方人參玄參丹參苦參何首烏各一兩並細銼上五味搗羅為末別用皂莢十梃以麻繩接續穿留索子頭盛在瓶內掘地埋瓶子留口用童子小便浸三七日如值雨下即蓋之勿令著水候日足取出以水淋洗挂陰處令乾用薄荷四兩酒一升童子小便半升共前皂莢同浸一宿取出煎五七沸傾出以手挼取汁細布絞去滓入藥末一分在汁內用文武火熬成膏將二分末入龍腦麝香各半錢同研勻丸如梧桐子大每服二十丸空心日午臨臥時薄荷茶下風毒氣毒熱毒瘰癧論曰瘰癧之候大概有三一曰風毒得之於風二曰氣毒得之於氣三曰熱毒得之於熱蓋風熱氣蘊蓄經脈否澀皆能結於頭項胸腋成瘰癧硬核狀如連珠腫潰生瘡不療則變久瘰癧之證令人寒熱羸瘦治熱風毒氣結為瘰癧惡寒壯熱勞即更甚將成瘻木香丸方木香犀角鎊芍藥連翹各一兩半白蘞一兩一分射干海藻洗去咸焙乾烏蛇酒浸一宿去皮骨炙玄參各二兩大黃銼微炒三兩昆布去咸焙乾二兩上十一味搗羅為散煉蜜丸梧子大每服十丸空心溫酒下至夜再服治熱毒氣毒風毒結成瘰癧連翹丸方連翹一兩芍藥玄參大黃銼炒犀角鎊防己羌活去蘆頭木香山梔子仁各一兩上九味搗羅為末煉蜜丸如梧子大食後米飲下二十丸日再服治風熱氣毒結成瘰癧木通丸方木通銼車前子酒浸炒大黃銼炒連翹去梗玄參知母各一兩上六味搗羅為末煉蜜丸如梧子大每服十丸臘茶下治項下並腋下熱毒氣毒結成瘰癧斑蝥散方斑蝥去頭翅足糯米炒黃色半兩炒豆黃末炒糯米末各一兩甘草一中指節大半生半炙膩粉一分上五味搗羅為散一處重研勻空心米飲調下二錢匕當吐瀉下惡物即煮糯米粥補之如吐不止以炒豆黃末煎湯止之如吐甚不止磨少許雄黃麝香止之將息後再服取吐瀉惡物盡為度治風毒久不解搏於筋脈因成瘰癧結核生頸腋下秦艽湯方秦艽去苗土連翹青橘皮去白焙檳榔煨各半兩犀角鎊三分上五味粗搗篩每服三錢匕水一盞入木通少許同煎至七分去滓溫服治風毒氣毒熱毒瘰癧不破者大黃散方大黃濕紙裹煨微焦色甘草炮白殭蠶去土焙乾各一兩檳榔煨一分上四味搗羅為散每服二錢匕用蜜熟水調下日可三五服取下惡物如魚腦即愈治氣癧疼痛及熱毒結核或多煩悶熱而不寒者雞鳴散方牽牛子末一兩胡粉一錢大黃蒸末二錢朴硝煉成粉三錢上四味搗羅為散雞鳴時以井華水調服三錢匕以利為度不利再服治風熱氣毒瘰癧胡粉丸方胡粉一錢雄黃研一錢雌黃研一錢上三味研令勻用烏雞子三枚取白調藥入淨瓷盞內於飯上炊令硬軟得所丸如梧子大每服三十丸至四十丸溫熱水下轉下惡物為驗治風熱毒氣結瘰癧內消羌活散方羌活去蘆頭一兩半白殭蠶炙一兩上二味搗羅為散每日空心以蜜酒調下四錢匕夜再服治風毒氣毒不順結聚成癧或破或不破內消膏方蝟皮生銼一枚上一味用瓷合盛泥固濟木炭燒為灰酒調頓服之治風毒氣毒瘰癧白梅丸方白殭蠶直者不拘多少炒令黃色上一味搗羅為末用陳白梅肉搗和為丸梧桐子大每服三十丸熟水下空心午後各一治熱毒氣毒結為瘰癧蜂房膏方露蜂房炙蛇蛻皮炙玄參黃耆銼細蛇床子各三分杏仁一兩半亂髮雞子許大鉛丹三兩蠟二兩上九味先將前五味銼細綿裹用酒少許浸一宿勿令酒多用油半斤納杏仁亂髮煎十五沸待發消盡即用綿濾更下鐺中然後下鉛丹蠟又煎五六沸即瀉出於瓷器中盛取貼瘡上一日換治熱毒風毒氣毒瘰