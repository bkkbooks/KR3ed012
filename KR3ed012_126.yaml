州者燒為灰生乾地黃焙半兩別杵為末上三味都細研如粉以津唾調貼瘡上治瘰癧方破比金散方檳榔不以多少上一味端正者為細末先以溫漿洗瘡以軟帛拭乾油調塗日三上用時看多少治瘰癧毒氣鬱結成膿發泄不止去毒散方巴豆一兩去殼薄荷末二兩皂莢末二兩麝香研一錢鯽魚一頭去腸肚上五味研勻四味入在魚腹內用泥固濟以炭火五七斤燒存性候冷取出細研每服一錢匕用荊芥臘茶調下日三服瘰癧久不瘥論曰風熱毒氣蘊積腑臟攻於筋膜則結為瘰癧其毒氣所感深者則沖發肌肉而久不瘥此疾尤忌憂思恚怒氣血勞傷飲食寒冷治瘰癧久不瘥六神散方皂莢刺薄荷昆布洗去咸海藻洗去咸連翹各半兩皂莢子五十枚燒灰上六味搗羅為細散每服三錢匕茶調下食後臨臥服治風熱毒瘰癧久不瘥惡寒壯熱勞動轉甚漸成瘻者射干丸方射干昆布洗去咸海藻洗去咸各二兩木香黃芩去黑心犀角屑各三分芍藥連翹白蘞各半兩大黃銼炒烏蛇酒浸去皮骨各二兩玄參一兩一分上十二味搗羅為末煉蜜丸梧子大食後溫酒下十五丸日三夜一治瘰癧久不瘥或已破膿血甚者丁香丸方丁香母生半兩蒼耳苗炒一兩青葙子生皂子仁各半兩甜葶藶半炒半生一兩厚朴去粗皮薑汁炙一兩丹砂研半兩一分為衣一分入藥上七味搗研為末棗肉為丸如緑豆大丹砂為衣每服十丸至十五丸粟米飲下日三服治瘰癧久不瘥將欲破者漏蘆湯方漏蘆洗焙半兩海藻洗焙半兩連翹一兩沉香銼半兩山梔子仁一分玄參丹參各一兩上七味粗搗篩每服三錢匕水一盞半煎至八分去滓溫服治瘰癧久不瘥何首烏丸方何首烏去黑皮一兩黃耆細銼半兩皂莢去皮子酥炙薄荷各一兩蛇蛻皮燒灰半兩龍腦研一錢麝香研一錢上七味搗研為細末煉蜜和丸梧子大每服十丸薄荷茶下不計時候治瘰癧久不瘥犀角散方犀角鎊屑蕪荑生斑蝥炒各一兩牽牛子炒黑豆生各一分麝香研龍腦研各一錢上七味除龍腦麝香外搗羅為細散再入研藥拌勻每服一錢匕熱酒調下空心服服藥後再飲酒一盞投之下惡物為效治瘰癧久不瘥烏雞丸方烏雞卵一枚錦貝子半兩上二味將錦貝子入在雞卵內用濕紙裹頭七重再用泥固濟火煅過後入地坑內出火毒一宿取出研細入大黃末半兩麝香一錢同研細煉蜜丸緑豆大空心蜜水下五丸不過五服效治瘰癧必效逐邪散方皂莢子不限多少以絹袋盛廁中浸三七日取出淨洗安地坑中碗蓋出毒一宿焙乾為末斑蝥五十枚去頭翅麩炒令黃為末上二味每服用皂子末二錢匕斑蝥末一錢匕水銀粉二錢生雞卵一枚取白傾盞內更入飯飲半盞並藥同攪勻四更初服至五更取下毒物或從小便中下如有些小澀痛不妨或患及五年只三服三年只二服二年只一服治瘰癧瘻瘡久不瘥勝金膏方黃連去須蚛栗子去殼甘草根銼黃蜀葵花龍骨各半兩白芨一分上六味搗羅為細末取榆窠上紅蟲稱三兩半候乾同為末更入粉霜三錢同研勻每用藥三錢匕入膩粉少許取雞清調攤帛上先以口溫漿水洗淨搵干貼之隔日易治頸生瘰癧已針瘡尚不瘥者貫衆湯方貫衆一兩半烏蛇酒浸炙去皮骨一兩連翹生乾地黃焙各二兩鶴蝨炒一兩杏仁湯浸去皮尖雙仁炒桑根白皮銼各二兩白蘞一兩威靈仙去苗土一兩半白芨一兩半大腹皮二兩延胡索一兩半黃耆細銼一兩半木占斯一兩甘草炙一兩黃連去須一兩上十六味粗搗篩每服五錢匕水一盞半入生薑五片煎至八分去滓食後溫服治瘰癧不瘥敗肉生膿連翹湯方連翹犀角鎊各一兩玄參木通銼黃耆銼漏蘆去蘆頭杏仁去皮尖雙仁炒黃各一兩半上七味粗搗篩每服五錢匕水一盞半煎至八分去滓食後溫服日三治瘰癧結核久不瘥異效散方芫青四十九枚麒麟竭一兩上二味同於藏瓶存性燒過地上出火毒研細每服半錢匕米飲調下加至一錢匕
