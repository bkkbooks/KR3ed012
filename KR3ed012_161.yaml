body:
  text: 卷第一百六十一産後惡露不斷論曰産後惡露不斷者蓋由臟腑宿有冷滯氣不調和即産之後惡露乘虛不能制約淋瀝不斷久不已則經血不榮臍腹堅痛面色萎黃氣短不足是其證也治法宜溫補之劑治産後七八日惡露下不絶當歸飲方當歸切焙敗醬續斷各一兩芍藥一兩一分生乾地黃焙一兩半竹茹芎藭各半兩上七味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日三治産後惡露下不絶敗醬飲方敗醬當歸切焙芍藥芎藭各半兩竹茹一兩生乾地黃焙乾一兩上六味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日三治産後惡露不絶心悶氣短艾葉飲方艾葉當歸切焙人參地榆乾薑炮阿膠炙令燥生乾地黃焙一兩上七味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日三治産後惡露不絶阿膠散方阿膠炙令燥用牛角䚡燒灰龍骨煅各一兩上三味搗羅為散每服二錢匕薄粥飲調服治産後惡露不絶腹中㽱痛氣急及産蓐三十六疾阿膠丸方阿膠炙令燥亂髮灰別研各半兩代赭別研乾薑炮一兩馬蹄半個燒令煙盡生乾地黃焙一兩一分牛角䚡炙焦二兩上七味搗羅為末煉蜜和丸如梧桐子大空心粥飲下二十丸日午夜臥再服加四十丸治産後虛冷下血晝夜無度及惡露不絶龍骨丸方龍骨細研四兩乾薑炮甘草炙桂去粗皮各二兩上四味搗羅為末煉蜜和丸如梧桐子大每服二十丸溫酒下早晨日午晚間各一治産後惡露過多心悶氣短無力不能食虎掌飲方虎掌當歸切焙艾葉微炒各一兩人參半兩地榆三分生乾地黃焙一兩一分上六味粗搗篩每服三錢匕以生薑三片水一盞煎至七分去滓溫服治産後惡露下多短氣乏力人參飲方人參半兩當歸切焙一兩半生乾地黃焙二兩地榆一兩上四味粗搗篩每服三錢匕生薑三片水一盞同煎至七分去滓溫服治産後惡露下多心煩氣短減食多倦地榆飲方地榆一兩當歸切焙艾葉人參各二兩生乾地黃焙三兩桂去粗皮一兩上六味粗搗篩每服三錢匕以水一盞入生薑三片同煎至七分去滓空心溫服治産後下血不止桑耳飲方桑耳微炙芍藥地榆茜根牛角䚡燒灰阿膠炙令燥各一兩艾葉雞蘇各三分白龍骨二兩上九味粗搗篩每服二錢匕水一盞煎至七分去滓溫服早晨日午夜臥各一治産後血下不止芍藥丸方芍藥阿膠炙令燥各一兩半烏賊魚骨去皮甲一兩當歸切焙三分上四味搗羅為末煉蜜和丸梧桐子大空心以蔥湯下三十丸日三治産後血不止兼漏下柏葉湯方柏葉炙乾二兩當歸切焙禹餘糧燒醋淬七遍各一兩半上三味粗搗篩每服三錢匕水一盞入薤白二寸細切同煎至七分去滓食前溫服日三治産後血露不斷地黃丸方生乾地黃焙當歸切焙阿膠炙令燥黃耆銼各一兩艾葉炙三分生薑一分切炒上六味搗羅為末醋煮麵糊和丸如梧桐子大每服三十丸溫酒或米飲下不拘時治産後惡露不斷秦艽湯方秦艽去苗土玄參芍藥各一兩艾葉炙白芷續斷當歸切焙各一兩半上七味粗搗篩每服二錢匕水一盞生薑三片煎七分去滓溫服不拘時治産後惡露不斷寄生丸方桑寄生銼炒附子炮裂去皮臍芍藥各一兩地榆銼炒白龍骨各一兩半雞蘇三分上六味搗羅為末煉蜜和丸梧桐子大每服三十丸溫酒或米飲下不拘時治産後血傷不止或下血痢蛇黃散方蛇黃二枚火煅醋淬七遍上一味搗羅為細散每服三錢匕以米飲調下甚者不過再服産後血氣攻腹疼痛論曰婦人産後衝任俱虛氣血離經失於將理氣道行澀惡露卞少則令人煩懊冒悶臍腹堅痛通行敗血升降陰陽則病可愈不治則變産後癥瘕羸瘦之病也治産後血氣不利心腹疼痛或寒或熱或時嘔吐氣乏力倦吳茱萸湯方吳茱萸湯浸微炒一兩防風去叉桔梗炒乾薑炮裂銼碎甘草炙細辛去苗葉各半兩生乾地黃焙當歸切炒各三分上八味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治産後惡血不除與氣相搏腹內㽱痛敗醬湯方敗醬桂去粗皮劉寄奴各三分牡丹皮木香芎藭各半兩上六味粗搗篩每服三錢匕以水一盞入生地黃一分切煎取七分去滓不計時候溫服治産後血氣不散攻心腹刺痛脹滿氣喘鬼箭羽湯方鬼箭羽當歸切焙白朮銼炒桂去粗皮各二兩細辛去苗葉一兩半生乾地黃焙一兩上六味粗搗篩每服三錢匕水酒各半盞煎七分去滓溫服不拘時候治産後血氣不調腹內㽱痛麒麟散方麒麟竭桂去粗皮當歸銼微炒蒲黃紅藍花木香沒藥延胡索乾漆碎炒煙出赤芍藥各半兩上一十味搗羅為散每服二錢匕以熱酒調下不拘時治産後血氣不利心腹急痛上下攻衝氣逆煩悶黃耆湯方黃耆銼碎白朮銼炮當歸切炒甘草炙銼人參各一兩白羊肉一斤去脂膜切碎每服用三兩上六味除羊肉外搗為粗末每服三錢七先以羊肉三兩切用水三盞煮取一盞澄清去滓沫入前藥並生薑三片同煎七分去滓通口服不拘時候治産後血氣不利或感風冷心腹㽱痛肢體虛冷胸膈不快乾地黃湯方生乾地黃焙二兩生薑去皮切碎炒乾甘草炙當歸切炒桂去粗皮各一兩上五味粗搗篩每服三錢匕水一盞煎取七分去滓溫服不拘時候治産後血氣壅滯攻心腹疼痛或拘急脹滿白朮湯方白朮切炒當歸銼炒桑根白皮銼各一兩半大黃銼炒令香細辛去苗葉桂去粗皮各一兩上六味粗搗篩每服三錢匕水一盞生薑三片煎七分去滓溫服不拘時候治産後傷風冷因致血氣不利心腹疼痛或寒或熱頭目昏重芎藭湯方芎藭銼黃芩去黑心防風去叉各一兩當歸切炒芍藥甘草炙各一兩半上六味粗搗篩每服三錢匕水一盞生薑三片煎七分去滓溫服不拘時候治産後因血不快利氣攻心腹疼痛芍藥湯方芍藥二兩黃耆銼白芷人參芎藭當歸切炒生乾地黃焙甘草炙各一兩白茯苓去黑皮一兩半上九味粗搗篩每服三錢匕水一盞煎取七分去滓入酒少許溫服不拘時候治産後血氣虛冷攻心腹痛地黃芍藥湯方生乾地黃焙芍藥當歸銼炒獨活去蘆頭細辛去苗葉各二兩桂去粗皮吳茱萸水浸經宿炒令香乾薑炮裂甘草炙各一兩上九味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時候治産後心腹痛血氣不利芎藭前胡湯方芎藭一兩前胡去蘆頭三分黃芩去黑心半兩芍藥一兩蒲黃微炒一兩半桃仁湯浸去皮尖別研三分當歸銼炒三分桂去粗皮三分甘草炙銼一兩大黃銼炒半兩生乾地黃焙二兩上一十一味粗搗篩每服二錢匕水一盞生薑三片棗一枚擘煎七分去滓溫服不拘時候治産後血氣攻衝心腹冷痛煩滿不食桔梗湯方桔梗炒當歸切炒劉寄奴去根銼碎各一兩半桂去粗皮延胡索陳橘皮湯浸去白炒各一兩芍藥白茯苓去黑皮各二兩上八味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治産後血氣攻心腹痛芍藥湯方芍藥二兩桂去粗皮甘草炙銼各一兩上三味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時候治産後虛羸面色萎黃惡血不盡臍腹冷痛琥珀煎方琥珀研牛膝酒浸切焙當歸切焙防風去叉桃仁去皮尖雙仁炒研蓽茇芎藭各六兩桂去粗皮四兩乾薑炮二兩清酒一升生地黃汁三升酥六兩蜜三合上一十三味以前九味搗羅為散先將地黃汁煎熟即下蜜酒酥攪候熔入衆藥末以柳篦攪不住手候似膏傾出瓷器盛每服一匙溫酒調下不拘時治産後少腹結塊痛不可忍鱉甲當歸散方鱉甲醋炙去裙襴三兩當歸切焙桃仁去皮尖雙仁炒芍藥京三稜炮銼桂去粗皮各一兩上六味搗羅為散每服五錢匕空心溫酒調下日再服治産後血塊攻築心腹㽱痛薑黃散方薑黃桂去粗皮等分上二味搗羅為散每服二錢匕炒生薑酒下産後血塊攻築疼痛論曰産後氣脈不和惡露不盡風冷留滯與正氣相擊故脅腹之間結聚塊痛蓋以新産之後臍腹空虛真氣怯弱寒氣入里與惡血共相為害其痛如物所築故名築痛也治産後血塊攻刺腹脅疼痛或衝心煩悶琥珀散方琥珀細研如粉鯉魚皮燒灰赤芍藥薑黃蒲黃牡丹去心當歸微炙大黃銼碎微炒桂去粗皮蓬莪朮煨熟牛膝去苗酒浸切焙各半兩上一十一味搗羅為散每服一錢匕溫酒調下空心夜臥各一治産後血塊攻築疼痛蓬莪朮散方蓬莪朮煨熟桂去粗皮乾漆搗碎炒煙出各半兩吳茱萸湯洗微炒一分上四味搗羅為散每服二錢匕溫酒調服治産後血塊時攻心腹疼痛不可忍商陸散方商陸乾者當歸切炒各一分紫薇凌霄花是也蒲黃各一兩上四味搗羅為散空腹溫酒調下二錢匕治産後血塊攻心腹㽱刺痛薑黃散方薑黃當歸切炒蒲黃桂去粗皮生乾地黃焙各一兩上五味搗羅為散空心溫酒調下二錢匕日再服治産後血氣不和血塊時攻心腹痛地黃散方生地黃八兩生薑四兩上二味細切同就銀石鍋內慢火炒令半乾取出同焙燥搗羅為散每服二錢匕溫酒調下不拘時服治産後血氣不和血塊時攻心腹痛不可忍薑黃散方薑黃牡丹皮牛膝去苗酒浸切焙烏藥銼生乾地黃焙各一兩上五味搗羅為散每服三錢匕溫酒調下治産後血氣血塊惡露不快攻築疼痛蓬莪朮散方蓬莪朮炮銼紫薇微炒木香炮羌活去蘆頭細辛去苗葉當歸切炒芎藭各一兩上七味搗羅為散每服三錢匕用溫酒調下日再服治産後血氣血塊攻衝心腹痛當歸湯方當歸切炒乾漆炒煙透棕櫚燒灰紅藍花甘草炙鯉魚皮燒灰白芍藥牡丹去心紫薇各半兩芫花醋浸半日炒乾焦色香墨各一分上一十一味粗搗篩每服三錢匕蔥白三寸生薑三片水酒共一盞同煎至七分去滓稍熱服治産後血氣血塊攻臍腹痛紫薇湯方紫薇當歸切炒木香炮各半兩沒藥一分牛膝去苗酒浸切焙三分上五味粗搗篩每服二錢匕水酒共一盞同煎七分去滓溫服未瘥再服治産後血氣血塊惡露不盡攻築刺痛牡丹散方牡丹去心芍藥當歸切炒桂去粗皮漏蘆去蘆頭白芷五靈脂炒陳橘皮湯浸去白微炒芎藭紅藍花乾漆炒煙透各半兩上一十一味搗羅為散每服二錢匕生薑溫酒調下治産後血氣㽱痛血塊作梗吳茱萸丸方吳茱萸微炒木香當歸微炙各一兩桃仁去皮尖雙仁麩炒研半兩硇砂研一分上五味搗羅三味為末入硇砂桃仁和勻煉蜜為丸如梧桐子大每服二十丸檳榔湯下治産後虛冷惡血結塊不散生地黃飲方生地黃汁半盞童子小便半盞生薑一分取汁上三味一處煎三四沸分作兩服溫分服須臾再服惡血下滯氣通立瘥未效再作服治産後血塊攻衝心腹痛薑黃散方薑黃切碎炒乾蒲黃微炒桂去粗皮各一兩上三味搗羅為散每服二錢匕生地黃自然汁調下日三夜一治産後余血不盡結塊上衝心煩腹痛乾地黃散方生乾地黃焙芎藭上二味各等分搗羅為粗散每服三錢匕以酒水各半盞煎至八分去滓溫服食前日三治産後余血不盡結成症塊臍腹㽱刺疼痛硇砂散方硇砂一兩細研芫花半兩醋拌炒乾虻蟲半兩去翅足微炒水蛭半兩微炒琥珀三分乾漆半兩搗碎炒令煙出沒藥三分桂心半兩麝香一分研入上九味搗研羅為細散拌和令勻每服一錢匕溫酒調下食前治産後余血不盡結聚成塊堅硬疼痛腹肋脹滿烏雞飲方雌烏雞一隻去毛羽爪肚鱉甲一兩塗醋炙令黃去裙襴桃仁一兩湯浸去皮尖雙仁麩炒微黃川大黃三分銼碎醋拌炒乾吳茱萸一分湯浸七遍焙乾微炒桂心一兩鬼箭一兩牛膝一兩去苗當歸一兩銼微炒庵䕡一兩甘草微炙芒硝各半兩上一十二味除雞外粗搗篩和勻以水四升將雞全煮取汁以瓷器澄令清每服二錢匕雞清汁一盞煎至七分去滓溫服不拘時治産後血塊攻築心腹痛芎藭散方芎藭當歸