body:
  text: 卷第一百五目赤爛論曰目赤爛者瞼眥俱赤且爛見風益甚又謂之風赤眼此由沖冒風日風熱之氣傷於瞼眥與津液相搏故令赤爛也迎風則作癢淚出遇熱則傷爛眵多治宜鎮平肝氣滌洗瞼膚則清淨之竅自然明瞭矣治眼赤風淚爛癢翳膜硇砂煎方硇砂半分研石決明為末鹽緑研烏賊魚骨為末馬牙硝研石蟹為末龍腦研曾青研硝石研各一分上九味以臘月水兩碗浸二七日每日攪一度候日滿以綿濾去滓用銀石器盛日點三兩度治風毒氣攻眼生瘡爛痛菊花湯方菊花升麻黃連去須防風去叉木通銼白茯苓去黑皮葳蕤地骨皮各一兩上八味粗搗篩每服五錢匕以水一盞半入竹葉十片煎至八分濾去滓放溫空心日午臨臥服治一切風目赤爛怕見風日疼不可忍點眼黃連煎方胡黃連牛黃別研黃柏去粗皮各一兩龍腦別研麝香別研各一錢熊膽別研一分烏豆一合乳梨汁半升上八味先搗胡黃連黃柏烏豆篩為粗散以水三盞就銀器中煎至一半綿濾去滓入梨汁並牛黃龍腦麝香熊膽以文武火煎成煎傾入於瓷器內盛入地埋四十九日取出每點如半米大治眼連瞼赤爛澀痛羞明四物澄波散方膽礬走水洗去沙土四錢乾薑炮裂半兩滑石研秦皮去粗皮各一兩上四味搗研為散每用半錢匕以沸湯浸澄清洗之治風眼兩瞼赤爛蕤仁膏方蕤仁二七枚去皮杏仁十枚湯浸去皮尖雙仁膩粉一錢匕龍腦半錢上四味同研令極細入好酥少許再研成膏每臨臥先以溫漿水洗眼拭乾用藥如面油塗之治眼赤痛微腫眥赤爛多時柴胡洗眼湯方柴胡去苗蕤仁去皮研黃連去須升麻各一兩上四味粗搗篩以水三升煎取一升半濾去滓微熱淋洗如冷再暖洗三兩遍治風毒氣攻眼目連瞼赤爛及暴赤眼疼痛不可忍者當歸散方當歸洗銼焙乾赤芍藥洗銼黃連去須銼各一兩上三味搗羅為散每用一錢匕沸湯浸去滓乘熱洗如冷用石器內再暖洗兩三遍治瞼爛風眼疾整睫散方白善土膽礬各半錢匕上二味生為散沸湯浸洗眼瞼不要洗入眼裡治風毒眼癢痛連瞼赤爛並暴赤眼勝金丸方銅緑白礬各等分上二味以炭火燒令煙盡為度細研如粉用沙糖和為丸如豌豆大於南粉末內滾過每用二丸熱湯半盞浸化洗眼如冷更暖洗三五次治風赤障眼四邊肉爛冷淚常出不止一捻金散方朴硝半兩上一味細研水調點之治瞼眥赤爛迎風淚出或癢或痛金波膏方黃連四兩黃柏皮三兩二味椎碎以水二碗浸一宿於銀器內熬取半碗去滓蕤仁去皮研半兩杏仁去皮尖雙仁炒黃研四十九粒上四味以蕤仁杏仁入前藥汁內同熬及一大盞更濾過入好蜜及藥九分更入麝香一錢白礬硇砂各一字並飛研空青三錢如無只以生青代之略椎碎龍腦二錢以絹袋子盛在藥內又熬及一半箸滴少許於冷水內不散即止用小瓶子密封再於飯甑上蒸三遍逐次於井內沉過令冷銀器內收如常點之治目赤眥爛生瘡衝風淚出黃連散方黃連去須雄黃研各一兩半細辛去苗葉黃柏去粗皮各三分乾薑一分上五味搗羅為散研令至細以密器盛每取二黍米許點兩目眥日二度治目赤眥爛癢痛不可忍白龍散方龍腦一字馬牙硝一兩上二味用紙一張裹迭牙硝按實常在著肉衣下養一百二十日為度取出細研如粉取四錢龍腦同研令細不計年歲深遠眼內或生翳膜漸漸昏暗遠視不明但瞳仁不破散者並皆治之每用兩米大點之治風毒攻眼眥赤爛見風淚出癢痛洗輪散方仙靈脾秦皮銼黃連去須槐花等分犀角鎊少許上五味搗羅為散每用半錢匕以新水調澄清洗之治久患赤眼眥爛癢痛淚下不止視物昏暗點眼方鉛丹研羅過一分朴硝細研半兩蜜五兩上三味於銅器內慢火煎三十沸不住手攪乘熱以綿濾過候冷點眼目積年赤論曰風熱毒氣發於目眥則令目脈赤不治則眥頭爛眵淚磣痛風熱不退雖積年月亦莫能瘥治積年風毒瘀熱攻目赤時痛柴胡湯方柴胡去苗二兩黃芩去黑心一兩芎藭二兩芍藥三兩大黃銼碎炒香二兩石膏五兩羚羊角鎊二兩茯神去木二兩上八味粗搗篩每服五錢匕以水一盞半入竹葉七片煎至一盞去滓投芒硝半字放溫空心頓飲以利為度如利頻去芒硝以粥止之如秋月肝弱時不宜瀉肝宜加補藥即不用此方治積年風毒眼赤痛多熱淚歲月寢久藁本湯方藁本去苗一兩白芷半兩車前子半兩石決明刮洗搗如粉芍藥天麻防風去叉細辛去苗葉各一兩上八味粗搗篩每服五錢匕以水一盞半煎取一盞去滓食後溫服臨臥再服治風毒赤眼無問久新穀精草散方穀精草去根一兩井泉石淨洗研半兩豉焙乾一合井中苔焙乾半兩上四味搗羅為細散每服二錢匕空心以井花水調服治風毒眼赤痛久患不瘥五參散方苦參沙參枳殼去瓤麩炒丹參玄參紫參各一兩蒺藜子炒去角二兩上七味搗羅為細散每服二錢匕空心以溫酒調服疾甚者日可三服治風毒沖眼久赤不瘥菊花丸方甘菊花一兩黃芩去黑心一兩玄參一兩決明子炒一兩半升麻一兩蕤仁去皮一兩半車前子二兩防風去叉二兩黃連去須二兩葳蕤二兩大黃銼炒令香三兩上一十一味搗羅為細末煉蜜丸如梧桐子大每服三十丸食後溫漿水下治風毒眼赤痛久患及虛熱眼暗決明子丸方決明子微炒一兩地膚子麥門冬去心焙玄參車前子各半兩赤茯苓去黑皮遠志去心焙青葙子茺蔚子蔓荊實地骨皮柏子仁山芋人參黃芩去黑心防風去叉大黃細銼炒令香各一兩細辛去苗葉半兩甘草炙銼一兩黃連去須一兩上二十味搗羅為細末煉蜜丸如梧桐子大每服二十丸食後以米飲下加至三十丸治久患風毒眼赤日夜昏暗九子丸方蔓荊子五味子枸杞子地膚子青葙子決明子微炒楮實麩炒黃茺蔚子菟絲子酒浸一宿焙乾別搗為末各一兩上九味搗羅為末煉蜜丸如梧桐子大每服二十丸空心溫酒下夜食前再進一服治風熱久目赤腦中積熱松皮湯洗頭方老松白皮去粗皮白蘚皮甘菊花擇荊芥穗細辛去苗葉蔓荊實防風去叉荷葉蒂玄參苦參桑根白皮各一兩雄黑豆二升上十二味除豆並荊實外細銼同以水三斗煎至一斗五升去滓投朴硝一兩半攪熱洗頭余滓重煎亦入朴硝如此三度洗之治風熱目赤翳積年磣痛決明膏方石決明一兩半蕤仁去皮一兩半蘆薈一兩秦皮搗碎一兩黃柏去粗皮銼一兩鹽緑別研一分馬珂研一兩鯉魚膽四枚生用烏賊魚骨研一兩紫貝燒熟研一兩上一十味以水三升煎決明蕤仁蘆薈秦皮黃柏五味至一升濾淨去滓卻入紫貝魚膽烏賊魚骨馬珂鹽緑更煎約三合於瓷器中盛不令泄氣每取一豆許人乳調勻點眼閉目良久日三兩次治風毒赤痛眥爛生瘡衝風有淚點眼雄黃散方雄黃研一兩半細辛去苗葉三分黃連去須一兩半乾薑炮三分黃柏去粗皮一兩半菊花一兩三月三日日未出時收之上六味搗羅極細於瓷器中盛每取黍米許點目眥閉目良久治風毒久赤痛爛怕風磣痛不可忍胡黃連膏方胡黃連末一分牛黃研一分黃柏去粗皮為末一分龍腦研一錢麝香研一錢熊膽研一分黑豆去皮一分為末梨汁一升上八味除梨汁牛黃龍腦麝香外入銀器中以水二升煎及一半濾去滓入梨汁並牛黃龍腦麝香以文武火煎成膏傾出瓷器內盛密封入地坑內埋四十九日出火毒取出每以少許點眼治風毒積年赤兼翳膜點眼杏仁膏方杏仁湯浸去皮尖雙仁研一分膩粉一錢鹽緑研一分黃連去須為末一分上四味合和重研令勻以真酥調如膏於銅碗中研勻以熟艾如雞子大掘小坑子內艾燒煙出便復銅碗於坑子上熏勿令泄氣候煙盡為度重研每取少許以綿裹用人乳汁浸一宿點眼日三度治風熱上衝目赤痛久患不瘥點眼秦皮湯方秦皮銼碎三兩青五銖錢七文黃連去須一兩蕤仁去皮半兩淡竹葉洗切三十片上五味用水一升半煎至七合去滓臨臥時用淨綿漬點眼中或洗眼亦得治風毒赤爛不以年月久近發歇頻並視物淚出不止點眼小黃連膏方黃連去須搗末蘆薈研各一兩龍腦別研半錢上三味先將黃連蘆薈末以新綿裹用水二盞於銀器中以重火煮取汁三分減二即綿濾去藥入龍腦以瓷瓶子內收每日三兩上點之治風熱上衝目赤痛久不瘥點眼七寶散方珊瑚研細琥珀研細玉屑研細曾青研細紫貝研細硃砂研細雞子殼去白膜以上各半兩上七味研極細點時仰臥以銅箸取如緑豆大點眼日三五上點之治風毒赤眼久不瘥決明丸方石決明一兩研水飛甘菊花一兩細辛半兩熟乾地黃二兩人參一兩去蘆頭地膚子一兩五味子一兩半兔肝一具炙乾防風二兩去蘆頭上九味搗羅為細末煉蜜和再搗三五百杵丸如梧桐子大每日空心及晚後食前煎鹽湯下二十丸或竹葉白湯亦得即漸加至三十丸治積年風熱毒氣不散目眥赤爛磣痛點眼黃連膏方黃連去須椎碎半兩馬牙硝研一錢上二味將黃連用水浸於日內曝令色濃以綿濾過後下硝末於黃連汁中依前日內曝取干細研每以一豆許水調點注目眥目飛血赤脈論曰飛血者謂赤脈散於白睛之上是也由肝臟氣虛為風熱所乘致血飄溢散絡白睛勢若飛馳故謂之飛血治法宜鎮肝氣平心火則飛血自除治風熱上攻眼目飛血赤脈澀痛難開芍藥湯方芍藥白茯苓去黑皮決明子玄參羚羊角鎊前胡去蘆頭葳蕤秦皮甘草炙人參苦參各一兩上一十一味粗搗篩每服三錢匕水一盞煎至七分去滓入生地黃汁少許再煎沸放溫食後臨臥服治風熱攻目飛血赤脈羚羊角湯方羚羊角鎊五味子葳蕤茯神去木遠志去心蔓荊實去白皮黃連去須甘草炙各一兩細辛去苗葉半兩上九味粗搗篩每服三錢匕水一盞煎取七分去滓放溫食後臨臥服治目赤飛血蓯蓉散方肉蓯蓉酒浸切焙一兩滑石一分黃連去須三分井泉石一兩土馬鬃一兩俗呼牆上青衣豉炒半兩上六味搗羅為散每服二錢匕以豬肝半兩爛研相和冷水調下臨臥再服治目飛血赤脈沖貫黑睛視物昏暗隱澀疼痛梔子散方梔子仁一兩木通一兩銼黃芩半兩甘草半兩炙赤銼羚羊角屑一兩決明子半兩上六味搗篩為粗散每服四錢匕水一中盞煎至六分去滓食後溫服忌炙爆熱面物日三治目飛血赤脈沖貫黑睛蕤仁散方蕤仁一兩湯浸去皮甘草半兩炙赤銼黃芩半兩枳殼半兩麩炒黃去瓤地膚子半兩上五味搗篩為粗散每服四錢匕水一中盞煎至六分去滓食後溫服治目飛血赤脈上下衝貫黑睛腑臟壅悶羚羊角散方羚羊角屑一兩黃連一兩去須蘆根二兩銼木通一兩銼旋覆花三分川芒硝二兩桑根白皮一兩銼上七味搗篩為粗散每服三錢匕水一中盞入竹葉二七片煎至六分去滓食後溫服日三治目赤脈衝貫黑睛熱毒腫痛心躁煩亂犀角散方犀角屑一兩黃芩一兩麥門冬一兩半去心焙黃連一兩半去須葳蕤一兩防風一兩去蘆頭地膚子一兩羚羊角一兩鎊甘草一兩炙赤銼馬牙硝一兩上十味搗篩為粗散每服三錢匕水一中盞煎至六分去滓食後溫服治上焦積熱目赤澀痛大黃丸方川大黃二兩銼碎微炒梔子仁二兩黃芩二兩黃連二兩去須車前子二兩上五味搗羅為末煉蜜和丸如梧桐子大每服三十丸食後溫漿水下臨臥再服治熱毒上衝目赤飛血頭旋噁心坐臥不得精神恍惚宜服黃芩丸方黃芩去黑心二兩人參芍藥銼鬱金大黃銼炒甘草炙各一兩上六味搗羅為末煉蜜丸如梧桐子大每服食後煎黃芩湯下三十丸臨臥再服治肝膈風壅上攻眼目飛血赤脈菊花散方菊花一兩蒺藜子炒去角芎藭防風去叉各半兩木香甘草炙各一分上六味搗羅為末每服一錢匕沸