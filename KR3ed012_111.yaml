body:
  text: 卷第一百一十一目生膚翳論曰目生膚翳者以臟腑氣血虛實不調加以風邪痰飲鬱於膈上熏蒸既久沖發於目乃生膚翳其睛上及瞳仁有物如蠅翅狀是為膚翳也治久患膚翳遮覆瞳子決明子丸方決明子炒蕤仁去皮地膚子白茯苓去黑皮防風去叉澤瀉麥門冬去心焙茺蔚子枸杞子五味子青葙子各一兩細辛去苗葉車前子菟絲子酒浸別搗末各三分生乾地黃焙乾二分桂去粗皮半兩黃芩去黑心杏仁湯浸去皮尖雙仁炒各一兩上一十八味搗羅為末煉蜜丸如梧桐子大每服二十丸食後以米飲下臨臥再服九月服此藥加兔肝一兩一分至二月停甚妙治眼熱生暈翳復瞳仁黃連丸方黃連去須一兩車前子地骨皮去土黃芩去黑心沙參人參各一兩半蕤仁去皮二兩茯神去木一兩半秦皮去粗皮一兩決明子微炒一兩半澤瀉瞿麥各一兩甘草微炙一兩半上一十三味並㕮咀焙過搗羅為末煉蜜丸如梧桐子大每服三十丸食後以溫熟水下臨臥再服治眼生膚翳遮覆瞳仁宜服決明湯方決明子微炒地骨皮玄參黃連去須桔梗炒柴胡去苗茯神去木各三分山梔子仁半兩羚羊角屑一兩上九味粗搗篩每服五錢匕以水一盞半入淨洗淡竹葉十片煎至七分去滓放溫食後服臨臥再服治眼生膚翳葳蕤湯方葳蕤去皮地骨皮去土赤芍藥各一兩半犀角屑黃芩去黑心茯神去木甘草炙銼升麻各一兩上八味粗搗篩每服五錢匕以水一盞半煎至一盞去滓放溫食後臨臥再服治眼熱赤痛及生膚翳蘆薈丸方蘆薈半兩研鯉魚膽七枚取汁熊膽研一分牛膽乾者半兩涇者汁一合石決明刮削淨一兩麝香研半分車前子一兩上七味除膽外搗研為細末後入膽汁同和勻煉蜜丸如梧桐子大食後米飲下二十丸漸加至三十丸治目風熱赤生膚翳點眼貝齒散方貝齒七枚燒為末細研珍珠一分搗羅末細研龍腦研半錢上三味合研如粉每點如黍米大於翳膜上日三度治虛熱目赤生膚翳眥癢風淚兼治白翳點眼丹砂散方丹砂研如粉貝齒燒灰各二兩乾薑炮半兩衣內白魚四十枚爆令乾上四味於淨乳缽中研令極細以熟帛三度羅過點時仰臥令人以小指甲點少許治目膚翳睛及瞳仁上有物如蠅翅狀令人視物不明白蘚皮湯方白蘚皮款冬花柴胡去苗車前子枳殼去瓤麩炒黃芩去黑心各一兩甘草炙半兩百合二兩菊花蔓荊實炒各一兩半上一十味粗搗篩每服五錢匕以水一盞半煎至八分去滓食後溫服臨臥再服治脾肺熱熏目赤癢生翳蘆根湯方蘆根木通各一兩半梔子仁桔梗炒黃芩去黑心甘草炙各一兩上六味銼如麻豆大分為二劑每劑以水六盞煎至三盞入生地黃汁半盞再煎至二盞去滓空腹分溫三服食後治眼目膚翳侵及瞳仁如蠅翅狀菊花散方菊花防風去叉木通銼木賊銼仙靈脾銼荊芥去梗甘草炙各一兩上七味搗羅為散每服一錢匕食後用茶半錢匕同點溫服目生丁翳論曰肝心二臟久積毒熱攻發於目能生丁翳狀如銀丁蓋肝木也在竅為目心火也於肝為子今心臟積熱熱乘於肝熏髮結聚故為丁翳治陽氣炎上血脈貫沖目赤腫痛瞼眥生瘡暴生丁翳漸染睛輪視物羞澀緊急難開退膜丸方熊膽半兩研牛膽汁一合豬膽五枚取汁牽牛子一兩炒黃連去須一兩梔子仁一兩車前子半兩決明子半兩炒枸杞半兩甘草一兩炙上一十味除牛膽豬膽汁外八味同為末用二膽汁和丸梧桐子大每服五十丸食後荊芥湯下治肝心毒熱丁翳入黑睛青葙子丸方青葙子藍實枳殼去瓤麩炒大黃銼炒菊花甘草炙各二兩草決明黃連去須茺蔚子細辛去苗葉麻黃去根節車前子各一兩半鯉魚膽雞膽各一枚陰乾羚羊角鎊三兩上一十五味搗羅為末煉蜜丸如梧桐子大每服二十五丸食後溫水下日三兼治內外障一切眼病治內翳風邪丁翳青葙子湯方青葙子蕤仁白茯苓去黑皮車前子葳蕤黃連去須各一兩半秦皮二分山梔子仁秦艽去苗土甘菊花擇黃芩去黑心甘草炙各一兩上一十二味粗搗篩每服三錢匕水二盞煎至八分去滓食後服治白膜暈赤侵黑睛生翳橫衝瞳仁久成丁翳黃芩湯方黃芩去黑心黃連去須木通銼柴胡去苗赤芍藥各二兩地骨皮山梔子仁各一兩半葳蕤甘草炙大黃蒸三度焙各二兩半石膏碎六兩半朴硝研五兩上一十二味粗搗篩每服五錢匕水二盞煎至一盞去滓食後服治丁翳毒熱除熱飲方黃芩去黑心玄參桔梗去蘆頭炒知母芒硝防風去叉茺蔚子大黃各一兩上八味粗搗篩每服二錢匕水一盞煎至七分去滓空心食後溫服治心熱生丁翳鎮心丸方遠志去心人參赤茯苓去黑皮柏子仁細辛去苗葉茺蔚子山芋車前子各一兩上八味搗羅為末煉蜜丸如梧桐子大每服十丸空心茶湯下治膀胱熱肝膈中風毒生丁翳升麻湯方升麻黃耆銼犀角鎊葳蕤玄參各一兩上五味銼如麻豆大每服五錢匕水一盞半煎至八分去滓入芒硝半錢匕竹瀝少許空心溫服治丁翳根腳極厚經久不瘥點眼決明散方石決明搗碎水飛過真珠末琥珀各三分烏賊魚骨半兩龍腦研一錢上五味同研極細每以銅箸取如大豆大點患處日三次治頑翳丁翳眼葳蕤丸方葳蕤青葙子黃連去須防風去叉赤芍藥各一兩半車前子二兩地膚子干藍獨活去蘆頭芎藭黃芩去黑心甘草炙銼各一兩上一十二味搗羅為末煉蜜和丸如梧桐子大食後溫熟水下四十丸日再治目赤並黑睛上生丁翳疼痛葳蕤湯方葳蕤桔梗黃耆銼各一兩半羚羊角鎊一兩上四味粗搗篩每服五錢匕水一盞半煎至八分去滓下芒硝末半錢匕更煎一二沸食後溫服目生花翳論曰目生花翳者點點色白狀如棗花魚鱗之類是也此由肝肺實熱沖發眼目其始則目痛淚出變生白翳宜急治之不爾則致障翳也治目生花翳白點狀如棗花桑白皮湯方桑根白皮銼木通銼各一兩半澤瀉犀角屑黃芩旋覆花茯神玄參川大黃銼炒以上各一兩甘菊花半兩甘草一分炙上十一味搗羅為細散每服二錢匕水一盞煎至六分和滓溫服治目積年生花翳宜點琥珀散方琥珀半兩真珠末一兩珊瑚半兩硃砂半兩硇砂半兩白者馬牙硝半兩烏賊魚骨半兩先於粗石磨去其澀用好者一錢上七味都入乳缽內研三日令極細每日三五上點治目生花翳多年不退宜服蕤仁散方蕤仁一兩湯浸去赤皮赤茯苓一兩半秦艽一兩去苗柴胡一兩去苗川大黃半兩銼炒枳殼一兩半炒黃去瓤車前子三分青葙子三兩赤芍藥三分上九味搗為細散每服三錢匕水一盞煎至六分和滓溫服治花翳黃芩湯方黃芩去黑心木通銼黃連去須各二兩地骨皮葳蕤甘草炙銼各一兩半上六味粗搗篩每服五錢匕水一盞半煎至七分去滓食後溫服日再治眼生白翳如棗花羚羊角湯方羚羊角鎊大黃銼炒桑根白皮銼黃連去須決明子黃芩去黑心甘菊花各一兩甘草炙銼半兩上八味粗搗篩每服三錢匕水一盞煎至六分去滓食後溫服治花翳淚出雞距丸方乾薑炮三分蕤仁細研雞舌香胡粉各半兩黃連末一兩礬石熬研半分上六味搗研為末棗肉丸如雞距注眼大眥日再治花翳不得嚮明點眼馬牙硝散方馬牙硝半兩黃連末一兩硇砂研龍腦各半分蘆薈末真珠末各一分上六味同研如粉每以銅箸取麻子大點眼治花翳摩頂青蓮膏方大青葳蕤朴硝梔子葉長理石研吳藍各一兩半槐子曾青別研如粉各一兩鹽花三兩淡竹葉一握洗切生麻油三升黃牛酥二兩蓮子草汁一升上一十三味取淨鐺先下油酥蓮子草汁三味煮沸後將十味以綿裹入鐺慢火煎半日候草汁盡為度以新綿絞去滓更澄清用通油瓶子盛每臨臥挑一錢匕塗於頂上摩千餘遍令入毛孔中漸覺清輕甚者半月即瘥三五夜一次用兼治腎虛眼暗五臟風毒上衝入腦腦脂流下為內障及能生髭發散風毒八月九月取蓮子草汁修合佳治風熱上攻眼生花翳及有赤脈沖貫黑睛真珠散方真珠末琥珀末各一分丹砂末半分硇砂兩豆大好者研上四味合研極細每日三五次點之治眼生花翳水照丸方烏賊魚骨取白心用生龍腦丹砂飛過各一錢上三味合研極細用蠟和作細餅子安眼中治內外障眼及浮花不見物者夢靈丸方黃連去須太陰玄精石研石決明淨洗焙搗末蕤仁研各一兩羊子肝七枚去膜切曬乾上五味搗研為末粟米粥丸如梧桐子大每服二十丸臨臥茶下治眼生花翳退翳仙術散方蒼朮二兩米泔浸一宿焙木賊甘草炙銼各一兩蟬蛻洗淨穀精草各一分蛇蛻一錢湯洗焙乾滴油搗黃芩去黑心半兩上七味搗羅為散每服一錢匕空心臨臥冷水調下治上膈實熱沖發於目漸生花翳吹鼻去障翳方波斯青黛水上浮者是一分瓜蒂七枚先為末母丁香七枚先為末麝香研龍腦研各一字上五味同研如粉瓶貯蠟封勿令泄氣每用大麻子大吹鼻中早晨兩次臨臥一次七日效翳膜遮障論曰眼生翳膜或新或久皆緣腑臟之間風邪毒熱沖發於上蘊結不散其狀非一是故障有內外翳有浮沉或淺或深可治不治龍木論載之詳矣世之俗工往往以鉤割針鐮熨烙之法取快一時曾不知此法不慎反致盲瞽蓋翳膜之病有可以鉤割針鐮熨烙者有專於服藥者有先服藥及洗點而後用鉤割針鐮熨烙者誠能研究經旨洞考六脈以知腑臟虛實然後心諦目察曰是可以服藥曰是可以點洗曰是可以針鐮鉤割則豈有妄致損傷者乎今姑摭其服餌之良次以點洗之劑云治內外障翳不問年月遠近及眼中一切疾磁石丸方磁石煅醋淬十遍肉蓯蓉酒浸切焙各三兩牛膝酒浸切焙桂去粗皮巴戟天去心遠志去心乾薑炮地骨皮洗附子炮裂去皮臍黃耆銼覆盆子防風去叉柏子仁別研各一兩生乾地黃洗切焙鹿茸去毛酥炙各二兩白茯苓去黑皮一兩半上一十六味搗研為末煉蜜和丸如梧桐子大每服二十丸鹽湯鹽酒下空心日午近夜各一治內外障眼翳膜芎藭散方芎藭菊花荊芥穗石膏各一兩甘草炙銼半兩上五味搗羅為散每服二錢匕食後臨臥溫水調下治眼障翳密蒙花丸方密蒙花黃柏根洗銼各一兩上二味搗羅為末煉蜜和丸如梧桐子大每服十丸至十五丸食後臨臥熟水下或煎餳湯下治風毒熱眼翳膜侵遮不計久新及一切內外障眼八子丸方青葙子決明子炒葶藶子炒車前子五味子枸杞子地膚子茺蔚子麥門冬去心焙生乾地黃洗焙細辛去苗葉桂去粗皮赤茯苓去黑皮澤瀉防風去叉黃芩去黑心各一兩上一十六味搗羅為末煉蜜和丸如梧桐子大每服二十丸至三十丸茶清下溫米飲亦得日三治內外障眼退翳膜去風毒還睛湯方甘菊花蔓荊子蒺藜子炒去角穀精草牡蠣燒芎藭仙靈脾生地黃各半兩蛇蛻五條羌活去蘆頭防風去叉桑葉蟬蛻洗地骨皮洗各一兩上一十四味粗搗篩每服二錢匕水一盞竹葉二片荊芥兩穗煎至七分去滓食後臨臥溫服治內外障翳精明湯方羚羊角鎊二兩當歸切炒黃芩去黑心梔子仁淡竹葉芍藥木賊大黃銼炒荊芥穗石決明上一十味粗搗篩每服四錢匕苦竹葉十片水一盞半煎至七分去滓溫服日三治內外障翳一切眼疾甘菊湯方甘菊花大黃銼炒旋覆花升麻石決明芎藭各半兩羌活去蘆頭地骨皮洗青葙子車前子石膏碎木賊銼炒黃芩去黑心梔子仁草決明炒甘草炙銼荊芥穗防風去叉各一兩黃連去須一分上一十九味粗搗篩每服三錢匕水一盞蜜少許同煎至七分食後夜臥去滓溫服治眼目翳膜遮障昏暗退翳仙術散方蒼朮米泔浸一宿切焙二兩蟬蛻洗穀精草各一分蛇蛻洗焙一錢黃芩去黑心半兩甘草炙銼木賊各一兩上七味搗羅為散每服一錢匕空心臨臥冷水調下治外