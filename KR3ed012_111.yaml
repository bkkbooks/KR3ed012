簟子一片蓋了然後以黃土蓋之七日出淨瓷瓶中收其硇砂不用如患浮翳膜侵瞳仁及一切目疾但臨臥將一餅札在眼眥頭即睡至曉用水一碗向東覷水碗其藥自落在水中浮浴卻用絹帛子裹起安潔淨處臨臥依前再使每餅可用半月候藥力慢時方易一餅如兩目有疾即用兩餅治目生翳膜點眼香連膏方白沙蜜五兩絹濾去滓硇砂五錢通明者研乳香研一錢青鹽一錢研鉛丹一錢黃連去須三兩為細末以上六味除蜜外並用新汲水三大盞於銀石器內同煎至一大盞後入蜜更用慢火熬成膏不住手攪候引之如絲線以重綿絞去滓入瓷瓶內盛水銀半錢輕粉一錢龍腦一錢麝香研一錢上一十味除前膏外將後四味一處細研勻入在藥膏內用油單封三五重系定如春夏秋合時即以麻繩子墜在井底一七日取出若冬月合時即於背陰處封閉二七日出之除打損眼外並可治治熱風上衝頭面及因飧酒面炙爆等物眼生膜者明目防風丸方防風去叉決明子枳殼去瓤麩炒黃連去須槐子赤茯苓去黑皮甘菊花各一兩半細辛去苗葉黃芩去黑心各一兩生乾地黃焙車前子各二兩半上一十一味搗羅為末煉蜜和丸如梧桐子大每服十五丸食後米飲下日再服胬肉昏暗等諸證皆能除之覺愈即止治目障翳胬肉昏暗復明膏方馬牙硝研一兩半酸漿草乾者五兩上二味六月六日入童子小便浸於日中曝之夜或陰雨復之睛即露之小便耗即旋添至七月初去酸漿草只空曝小便令乾收之別以新盆蓋藥埋淨地深可五寸以來至來年夏至前二日收之其霜飛上盆子蓋以烏雞毛掃取患者以一米粒安大眥頭避風治眼疾翳膜遮障但瞳子不破者杏仁膏方杏仁三升湯浸去皮尖雙仁上一味每一升以麵裹於煻灰火中炮熟去面研杏仁壓取油又取銅綠一錢與杏油同研以銅箸點眼瘥遠年障翳論曰障翳之疾本於風熱毒氣蘊積腑臟沖發眼目結搏而成蓋目為五臟精華肝之外候今風邪毒熱在於臟腑不得宣泄上衝於目故為障翳初則隱澀赤痛漸成翳膜遮障久而不退或至黏睛療之難瘥是為遠年障翳治內外障翳不問遠近及一切目疾磁石丸方磁石三兩燒赤醋淬十度研細更飛過曝乾牛膝去苗漿水浸一宿以無灰酒煮五沸曝乾桂去粗皮柏子仁別研用紙裹壓去油巴戟天去心用無灰酒煮五七沸焙乾防風去叉覆盆子去莖葉遠志去心乾薑炮地骨皮附子炮裂去皮臍黃耆銼各一兩白茯苓去黑皮一兩半鹿茸取軟者酒煮十餘沸去毛焙二兩肉蓯蓉三兩用無灰酒浸二日焙生乾地黃焙乾二兩上一十六味搗研為末煉蜜丸如梧桐子大每服二十丸空心溫酒或鹽湯下加至三十丸治自幼久患疳風攻眼生翳久療不瘥凡翳膜遮障但睛不損者皆可治秘金散方黃連去須沙參太陰玄精石研決明子各一兩上四味搗研為散每服半錢匕用羊子肝一具竹刀切作縫子滲藥末在內以線系入瓶中用米泔煮熟分作三服淡吃治久患風毒氣攻眼目昏暗赤澀瘀肉生瘡翳膜遮障不明久患偏正頭疼眼目漸覺細小及夾腦風痛多視黑花羌活丸方羌活去蘆頭天南星炮天麻附子炮裂去皮臍旋覆花芎藭青橘皮湯浸去白焙半夏湯洗十度桑螵蛸炒各一兩牽牛子六兩微炒搗取末二兩藁本去苗土一兩上一十一味搗羅為細末煉蜜和丸如梧桐子大每服二十丸食後溫水下漸加至三十丸治眼生障翳經年不瘥宜點石膽散方石膽半分琥珀一分真珠末一分珊瑚一分紫貝一分馬珂一分硃砂半兩蕤仁半兩湯浸去赤皮決明子一分上九味搗羅為散更入乳缽內研令勻細每用藥一小豆大點大眥頭日二三度妙治眼赤痛生翳障遠視不明癢澀宜點珊瑚散方珊瑚三分龍腦半錢硃砂二分上三味先研珊瑚硃砂如粉次入龍腦研令勻每以銅箸取一米許日三四度點之治心神勞役兩眼生翳膜久昏腫發赤疼痛多淚視物不明夢靈丸方黃連去須太陰玄精石各一兩研羊子肝七枚去膜薄切曝乾石決明一兩洗別搗為末研蕤仁四兩去皮取一兩細研生用上五味搗研為末以粟米粥丸如梧桐子大每服臨臥時茶湯下二十丸翳膜厚者不過一月近者不過十服治黏睛翳秦皮丸方秦皮去粗皮黃柏去粗皮炙黃芩去黑心防風去叉柴胡去苗黃連去須各一兩甘草炙葳蕤木通銼各一兩半上九味銼焙搗羅為末煉蜜丸如梧桐子大每服三十丸食後臨臥溫水下治積年風眼胎赤眼障膜侵黑睛不見物點眼黃連煎方黃連去須曾青研如粉地骨白皮各一兩顆鹽一分古錢十文蜜一升上六味搗碎以蜜漬安新瓷瓶中以重湯煮一復時後取出以綿濾去滓內於瓶子中著地上露雨宿後每以銅箸取少許點目中日三五度治眼生障翳宜服蕤仁散方蕤仁三分決明子三分黃連一兩去須柴胡一兩去苗葳蕤一兩川大黃三分銼碎微炒黃耆一兩銼甘草半兩炙微赤銼上八味搗為粗散每服三錢匕水一盞煎至六分去滓食後溫服治眼遠年翳障不瘥宜點貝齒散方貝齒一分琥珀一分硃砂半兩龍腦半分馬牙硝三分上五味細研如粉每用少許點之治眼生障翳昏暗點大人小兒眼澀腫赤隱痛蕤仁煎方蕤仁去皮尖鋪在銀盂底黃連去須淨洗鋪在蕤仁上各二兩上二味用古老錢四十九文鋪在黃連上以井華水二盞浸不得過錢用七年熟艾四兩緊打成一炷在古老錢上燒密蓋盂口不令出風候燒過艾炷去灰並古老錢黃連蕤仁等取下艾煙在水內入白蜜二兩同煎一盞去滓次用麝香龍腦各二分硼砂一字上三味細研和膏再熬熱密封入井水內浸七日出火毒凡遇障翳先用白湯洗眼燈心點藥入眼內日三勿令見風治眼目一切遠年障翳眥生胬肉赤腫疼痛決明散方石決明草決明青葙子甘草炙銼黃柏去粗皮黃連去須穀精草龍骨白芷枳實麩炒牡蠣煅枸杞子蛇蛻各一兩羌活去蘆頭蒺藜子炒去角蟬蛻白附子炮黃耆銼各半兩魚子活水中生下者半兩其子用硫黃水溫溫洗過虎睛一隻切作七片文武火炙乾每一次杵羅入一片為末上二十味搗羅為散每服三錢匕五更時陳茶清調下日午臨臥再服眥生胬肉赤腫疼痛不可忍者三五日見效赤白翳膜久不見者一七日減二七日其眼好安然眼根枯死者不療活者通治如煩惱傷酒色遇風雨眼中疼痛者即是活眼若或有此無淚不疼痛者為死眼更不用治治眼昏暗及內外障失明等還睛神明酒方黃連去須五兩石決明草決明生薑石膏黃硝石蕤仁秦皮山茱萸當歸黃芩去黑心沙參朴硝甘草炙芍藥澤瀉桂去粗皮薺子車前子淡竹葉柏子仁防風去叉烏頭去皮臍辛夷人參芎藭白芷瞿麥穗桃仁去皮尖雙仁炒細辛去苗葉地膚子各三兩龍腦三錢丁香二錢真珠二十五顆無孔者上三十四味㕮咀絹囊盛用好酒五斗甕中浸之春夏一七日秋冬十四日食後服半合勿使醉吐稍稍增之百日後目明如舊惟不療枯損睛破者但黑白不損服此藥更生瞳子平復如故治目生翳膜久不愈者苘實散方苘實以柳木製磑子磨之馬尾篩篩取黃肉其焦殼棄不用每十兩可得四兩精肉非柳木磑不能去殼上一味為末取獖豬肝薄切裛藥中令相著緩火炙肝熟為散臨臥陳米飲調下二錢匕一法釅醋為丸每服二十丸一法取苘實內囊蒸一次曝乾為末或散或蜜丸溫水下
