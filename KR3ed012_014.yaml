知狂惑妄言悲喜無度乃其證也治風邪入臟心虛氣不足夢寐驚恐紫石英丸方紫石英研一兩海蛤白茯苓去黑皮白石英研菖蒲杏仁去雙仁尖皮熬石硫黃研遠志去心阿膠炙令燥卷柏去土炒鐵精研細辛去苗葉牛黃研各半兩麥門冬去心焙當歸切焙大豆黃卷生銀銼屑大黃蒸三遍炒鍾乳粉肉蓯蓉酒浸切焙乾薑各一兩一分白朮白蘞前胡去蘆頭各一分大棗去核炒乾二十枚人參防風去叉山芋石膏碎研赤芍藥桔梗去蘆頭炒柏子仁烏頭炮裂去皮臍桂去粗皮熟乾地黃焙甘草炙各三分上三十六味搗羅為細末煉蜜和丸如梧桐子大每服空心食前用粥飲下十丸日二服治風邪驚悸恍惚悲傷或夢寐不安鎮心丸方遠志去心一兩一分鐵精杏仁去皮尖雙仁者炒芎藭麥門冬去心焙牡蠣各一兩半龍齒研白茯苓去黑皮各二兩防風去叉當歸切焙人參鬼臼白朮生乾地黃丹參桔梗去蘆頭炒甘草炙各一兩一分紫菀去土卷柏去土山茱萸桂去粗皮乾薑炮防己白蘞羚羊角鎊各一兩牛黃別研半兩麝香別研三分銀箔四百片別研虎睛一對酒浸炙令黃別研上二十九味搗研為細末煉蜜和丸如梧桐子大每食後酒下二十丸稍加至三十丸日再服治風邪夢寐涕泣妄有所見惡聞人聲體中酸削乍寒乍熱腰脊強痛腹中拘急不欲飲食或因疾病後勞動不節婦人產後月經不利時下青黃赤白體羸瘦小便不利頭面發熱鱉甲湯方鱉魚甲七枚炙凝水石碎桂去粗皮白茯苓去黑皮防風去叉白薇知母各四兩麻黃去根節湯煎掠去沫焙一兩半黃芩去黑心三兩甘草炙芍藥白朮各二兩一分貝母去心六兩一分石膏大如雞子一塊碎上一十四味㕮咀每服五錢匕以水一盞半煎取七分去滓適寒溫服日一病與藥相當即下積滯如牛脂榆莢蝌蚪蝦蟆之類為驗治丈夫婦人心風癲邪桑螵蛸丸方桑螵蛸四十九枚醋浸炙令焦黃色酸棗仁菖蒲石上者阿魏研麝香研丹砂研蛇黃煅醋淬研各一分上七味搗研為細末麵糊丸如小豆大每服十五丸至二十丸食後生薑薄荷湯下治風邪入心臟忽心痛驚恐小腸微痛乍寒乍熱心中悶面色青赤虛勞邪氣人參飲方人參乾薑炮麻黃去節煎掠去沫焙乾獨活去蘆頭當歸切焙芎藭石膏碎秦艽去苗土各二兩附子炮裂去臍皮一枚桂去粗皮三分防風去叉一兩一分黃芩去黑心一兩白朮細辛去苗葉各三分杏仁去雙仁皮尖炒四十枚赤芍藥半兩甘草炙二兩上一十七味銼如麻豆每服二錢匕以水一盞煎至六分空心去滓溫服治心經風邪消化痰涎清利頭目人參太乙丹方人參酸棗仁炒山梔子仁阿膠炒令燥各半兩甘草微炙天南星牛膽制者各一兩玄精石研麝香研龍腦研各一分丹砂研三兩上一十味研搗為細末煉蜜和丸如小彈子大以金箔為衣每服一丸食後荊芥湯嚼下治心經風邪化上膈痰涎乳香丹砂煎方乳香鉛白霜牛黃丹砂龍腦各一分並別研犀角鎊別取細末再同上五味研令極細半兩升麻末炒三錢大黃末炒三錢上八味拌勻煉蜜和作劑每服一皂子大用溫薄荷湯化下食後臨臥服治男子女人風邪多夢悲愁憂恚喜怒無常或半年或數月復發寄生散方楊上寄生白朮各三兩桂去粗皮茵芋天雄炮裂去臍皮薊根菖蒲細辛去苗葉附子炮裂去臍皮乾薑炮各一兩上一十味搗羅為散酒調下三錢匕日三服合時勿令婦人雞犬及病者家人見治風邪心熱神不安黃芩湯方黃芩去黑心一兩半麥門冬去心焙白茯苓去黑心各二兩淡竹茹三分羚羊角鎊防風去叉各一兩半石膏碎研三兩上七味各搗研為末每用六錢匕以水二盞煎取一盞半去滓下朴硝一錢匕食後分三服如人行四五里一服治風邪安心志定魂魄調心氣穩眠睡琥珀生犀湯方琥珀研犀角鎊各半兩茯神去木人參生乾地黃焙菖蒲石上者防風去叉各一兩遠志去心甘草微炙各半兩上九味粗搗篩每服三錢匕水一盞煎至六分去滓溫服不計時候治心虛風邪所乘精神恍惚健忘方鏵鐵四斤久經用者上一味用炭火燒令赤投水中如此七遍即堪打碎如棋子大以水二斗浸經二七日每服水一盞日三治風邪入心心背俱痛腹脅脹滿或寒或熱心中煩悶進退無常面色或青或黃續命湯方麻黃去節煎掠去沫焙一兩半大棗十枚去核桂去粗皮防風去叉芎藭細辛去苗葉甘草炙銼芍藥人參秦艽去苗土獨活去蘆頭黃芩去黑心防己銼各一兩乾薑炮一兩一分附子炮裂去皮臍白朮各三分上一十六味銼如麻豆每用十錢匕以水三盞煎取二盞去滓分溫三服要汗並二服相去如人行五里再一服服後更用熱生薑稀米粥投汗出慎外風如常服只空心午時臨臥各一服治中風邪恍惚悲哀或狂走不定如有鬼神或身體強直日夜常痛口噤水漿不下面目變色甚者不認人五邪菖蒲湯方菖蒲九節者去須節米泔浸切焙秦艽去苗土桂去粗皮當歸切焙禹餘糧煅醋淬七遍人參附子炮裂去皮臍黃芩去黑心甘草炙遠志去心防風去叉各半兩龍骨去土赤石脂白茯苓去黑皮芍藥芎藭各一兩防己二兩上一十七味銼如麻豆每用十錢匕以東流清水三盞煎取二盞去滓分三服空心食前日三服服藥後良久方得吃食其藥末密收勿令透氣治中風邪虛悸恍惚悲傷或夢寐不安鎮心當歸湯方當歸切焙羚羊角鎊各二兩龍齒碎三兩茯神去木四兩人參一兩防風去叉芎藭杏仁湯退去皮尖雙仁炒各二兩半夏湯浸洗去滑七遍生薑與半夏同搗炒乾各四兩桔梗炒二兩石膏碎三兩防己銼二兩桂去粗皮一兩半上一十四味粗搗篩每用十錢匕以水三盞煎至二盞去滓入竹瀝一合更煎兩沸分三服每日空心午時夜臥各一服治中風邪狂惑商陸丸方商陸根生去皮秤十二斤半上一味細切以水一石向東鍋灶內煎減半去滓更以緩火煎如膏可丸即丸如梧桐子大每服熟水下十丸加至十五丸合藥時勿令雞犬婦人見未效漸加二十丸至二十五丸治中風驚悸恍惚大豆飲方大豆一升緊小者上一味以水五升煮去豆取汁五合頓服汗出佳治風邪客於五臟精神恍惚不寧牛黃丸方牛黃研一錢地榆三兩白附子炮三兩丁香半兩麝香研半字黃耆細銼二兩雄黃研水飛過一兩天麻羌活去蘆頭芎藭各二兩上一十味將七味搗羅為細末入研者三味和勻以蜜水熬甘草成膏和眾藥丸如櫻桃大每服一丸茶酒嚼下風狂論曰風狂之狀始發則少臥不飢自高自賢自辯自貴蓋人之營衛周身循環晝夜不窮一失其平則有血並於陰而氣並於陽者有血並於陽而氣並於陰者陰陽二氣虛實不調風邪乘虛而入並於陽則謂之重陽故其病妄笑好樂妄行不休甚則棄衣而走登高而歌或至數日不食故曰狂也又肝藏魂魂則隨神往來悲哀動中有傷於魂則為狂妄是亦血氣俱虛風邪乘之陰陽相併也治中風邪狂亂失志心多恐怖牛黃丸方牛黃研一兩鐵精研三分虎睛一對微炙研石膏研龍齒研各二兩銀箔一百片研金箔一百片與牛黃鐵精虎睛石膏龍齒銀薄再同研地骨皮茯神去木升麻玄參人參各二兩麥門冬去心焙三兩枳實去瓤麩炒葳蕤去土赤芍藥各一兩半生乾地黃焙甘草炙銼黃芩去黑心各二兩上一十九味除研外搗羅為末入研藥拌勻煉蜜為丸如梧桐子大食後煎枸杞根皮湯下二十丸日再服漸加至三十丸治風狂妄語心熱狂走不知人真珠散真珠研牛黃研丹砂研各半兩金箔研銀箔研各五十片麝香研一錢鐵粉研天竺黃研人參龍腦研各三分黃芩去黑心一兩防風去叉犀角鎊各半兩茯神去木三錢麥門冬去心焙一兩半遠志去心白蘚皮羚羊角鎊各半兩甘草炙胡黃連甘菊花白附子炮各三分上二十二味除研外搗羅為末入研藥拌勻每服一錢匕加至二錢匕薄荷溫水或梨汁調下治中風邪狂走或自高自賢或悲泣呻吟及卒得驚悸邪魅恍惚心下虛悸麻黃丸方麻黃去根節煎掠去沫焙甘草炙銼半夏湯浸生布挼洗七遍焙各一兩生薑去皮一兩半先與半夏同搗炒乾上四味搗羅為末煉蜜和丸如大豆大生薑湯下三丸加至五丸空心午時各一服漸加至十丸治風狂叫笑不時喜怒無常登高逾垣言語不避人虎睛湯方虎睛一對慢火炙鴟頭並肝一具炙白茯苓去黑皮桂去粗皮各三兩石長生去粗莖一兩楓上寄生去粗莖五兩人參露蜂房炙獨活去蘆頭防風去叉甘草炙銼天雄炮裂去皮臍當歸切焙各一兩上一十三味銼如麻豆每以十八錢匕酒六盞煮取三盞去滓分三服日二夜一每服時須去食稍遠恐藥食相犯也治中風邪發狂及肝心風熱氣虛不足驚恚掣瘲守神丸方金箔一百片膩粉半兩人參為末三分上三味於銀石器內先將金箔逐重用膩粉滲隔布盡入黃牛乳五合於金箔上淋溉用物密蓋定煮盡乳取研如膏以人參末漸漸入同研丸如赤小豆大空心日午臨臥新汲水下三丸漸加至五丸治風邪發狂妄言燥悶白殭蠶丸方白殭蠶炒三分海荊子炒一兩白附子炮半兩乾蠍酒炒二十一枚蒺藜子炒令角黃二兩膩粉半兩一半入藥同羅留一半為衣上六味先搗前五味與膩粉二錢半同羅為末冬用大棗蒸取肉研如膏和丸夏煉白蜜和丸春秋研糯米飯膏為丸並如梧桐子大又於膩粉二錢半內滾令色勻用密器收每日空心日午溫酒下五丸加至十丸治風邪所中驚狂啼哭或歌或笑禹餘糧飲方禹餘糧煅研防風去叉桂去粗皮赤芍藥遠志去心獨活去蘆頭白朮人參牡蠣熬秦艽去苗土石膏椎碎甘草炙銼各二兩雄黃研茯神去木菖蒲蛇蛻炙防己各一兩上一十七味粗搗篩每服五錢匕以水一盞半煎取七分去滓食後服日再治風狂失神少飢笑樂無節棄衣登高茯神湯方茯神去木杏仁湯去皮尖雙仁各三兩龍齒六兩凝水石碎一斤升麻二兩石膏碎二十兩沙參白蘚皮各二兩生麥門冬去心四兩上九味銼如麻豆大每服五錢匕水二盞煎至一盞去滓溫服日三如病甚煎成入竹瀝半合再煎至一盞服治風邪入臟狂言妄語精神錯亂腰疼骨痛白蘚皮湯方白蘚皮一分半麻黃去根節半兩白茯苓去黑皮三分防風去叉獨活去蘆頭杏仁湯去皮尖雙仁研當歸銼焙芍藥各一分半桂去粗皮一分上九味粗搗篩每服三錢匕水一盞半煎至八分去滓空腹溫服服訖取微汗為度日三治風邪發狂守神金箔煎方金箔一百片丹砂研龍腦研牛黃研真珠末琥珀末犀角末各半兩上七味將六味再同研勻以鼎子一個鋪一重金箔了滲一重藥末次第鋪蓋了用牛乳三升於鼎上澆之以慢火煨令乳汁盡成膏為度每服取如皂子大薄荷湯化服之
