body:
  text: 卷第一十四風恍惚論曰風恍惚者以風邪經於五臟其神恍惚而不寧也蓋五臟處於內神之舍也臟氣充足神王而昌則邪不得干藏氣虧損邪能乘之則精神魂魄意志無所持守故恍惚不寧也治風驚悸或憂愁思慮心神恍惚狂言煩悶口眼喎斜化痰涎利咽膈丹砂鎮心丸方丹砂別研一兩牛黃別研龍腦別研麝香別研各一錢鉛白霜別研二錢天麻酒炙二兩天竺黃二錢人參茯苓去黑皮甘草炙銼各半兩上一十味搗研為末和勻煉蜜丸如雞頭大每服三丸煎金銀薄荷湯化下食後夜臥服治風虛安寢寐鎮心神止恍惚化痰滯石菖蒲丸方石菖蒲遠志去心鐵粉別研丹砂別研各一兩白茯苓去黑皮人參各一兩半防風去叉羚羊角鎊各三分金薄五十片三十片入藥二十片為衣上九味搗研為末和勻煉蜜丸如梧桐子大每服十五丸至二十丸煎人參湯下早晚食後服治諸藏虛邪夜臥恍惚精神不安鹿角散丸鹿角鎊三兩上一味搗羅為散每服一錢匕溫酒調下日三服治諸藏虛邪夜臥恍惚神不安羚羊角散方羚羊角鎊微炒一兩上一味搗羅為散每服一錢匕溫酒調下日三服治神志不寧風虛恍惚鎮驚悸補不足丹砂茯神丸方丹砂別研茯神去木人參各一兩乾蠍二十一枚全者去土炒牛黃別研半兩上五味搗研為末和勻煉蜜丸如梧桐子大每服十丸溫金銀薄荷湯下人參湯化亦得治恍惚健忘心神不寧解煩躁清頭目鎮心安神牛黃紫雲丸方牛黃別研麝香別研龍腦別研各一分丹砂別研天竺黃別研黃芩去黑心遠志去心龍齒各三分鐵粉別研茯苓去黑皮甘草炙銼各一兩甘菊花擇馬牙硝別研各半兩銀薄十五片研入藥金薄十片為衣上一十五味以十四味搗研為末和勻煉蜜丸如小彈子大以金薄為衣每服一丸早晚食後荊芥湯嚼下薄荷湯亦得治心神恍惚化痰涎利胸膈丹砂煎方丹砂別研真珠別研犀角鎊玳瑁鎊阿膠炙燥各一兩龍腦別研麝香別研各一錢上七味搗研為末和勻用安息香一兩湯一盞化去滓入蜜二兩於一處重湯內煮令化然後下前五味末熬成煎候冷方入腦麝末攪勻入瓷合內每服一皂子大用溫薄荷湯化下治心虛憂愁不樂驚悸心忪恍惚忘誤神情不寧定心丸方茯苓去黑皮茯神去木各一兩琥珀別研龍齒阿膠炙令燥牛黃別研真珠別研犀角鎊龍腦別研麝香別研各半兩天南星牛膽內匱者甘草炙銼各一兩半遠志去心一分金薄三十片為衣銀薄二十片研入藥菖蒲酸棗仁炒天竺黃別研人參各三分虎睛一對酥炙丹砂別研四兩龍腦半分雄黃別研二兩蘇合香一兩安息香二兩同蘇合香以酒一大盞研化澄去砂腳熬成膏上二十五味除別研外搗羅為末和勻以安息香膏同煉蜜和丸如雞頭大每服一丸麝香湯化下早晚食後臨臥服風驚論曰風驚者心氣不足風邪干之而心不安定也內經曰心為君主之官神明出焉又曰主明則下安今心氣不足風邪相乘陰陽不和情思錯亂神魂散越故動作多驚也治心氣不足風邪所乘驚悸恍惚夢多魘小定心湯方白茯苓去黑皮四兩桂去粗皮三兩甘草炙芍藥乾薑炮遠志去心人參各二兩上七味㕮咀每服五錢匕水二盞入棗兩枚劈破煎至一盞二分去滓溫服日三夜一治心虛中風驚悸恍惚多忘或夢寐驚魘志少不足大定心湯方人參白茯苓去黑皮茯神去木遠志去心龍骨乾薑炮當歸切焙甘草炙白朮芍藥桂去粗皮紫菀去苗土防風去叉赤石脂各二兩上一十四味㕮咀每服五錢匕水二盞入棗二枚劈破煎至一盞去滓溫服日三夜一治風驚鎮心化涎天南星丸方天南星大者逐日換水浸五日慢火煮五七沸切作片子曝乾麩炒令黃香烏蛇酒浸取肉炙乾白殭蠶直者麩炒令黃天麻各一兩乾蠍全者擘破炒黃色白附子炮雄黃研琥珀杵研各三兩麝香一分研牛黃研龍腦研各半兩丹砂一兩半研上一十二味除研者外搗羅為末合研勻干瓷器收密封勿令透氣旋煉蜜和丸如雞頭大每服一丸荊芥人參湯化下治驚風心膈生涎龍腦煎方龍腦研蠍梢炒水銀研麝香研膩粉研丹砂研天南星薄荷汁浸一宿切炒白附子炮裂各等分上八味搗研為末用石腦油和為煎每服一皂子大薄荷湯化下食後臨臥服治風驚鎮心安神化涎牛黃真珠丸方牛黃研真珠研琥珀研麝香研天麻天竺黃研甘草炙銼鉛霜研雄黃研鐵粉研各一錢人參茯神去木天南星牛膽制者各二錢丹砂研半兩龍腦研一錢半金箔銀箔各一十片同研入藥上一十七味搗研為末同拌勻煉蜜和丸如雞頭大別用大金箔五片滾為衣每服一丸細嚼人參薄荷湯化下小兒半丸治心虛風邪驚悸安神清膈化涎小銀箔丸方水銀用錫結砂子半夏湯洗七遍去滑入生薑搗曝乾天南星炮白礬熬令汁枯人參各半兩白茯苓去黑皮鉛霜研各一分膩粉半錢研青黛研一兩銀箔二十片研入藥上一十味搗研為末水煮麵糊和丸如梧桐子大每服十丸食後臨臥人參薄荷湯下治心受風邪鎮驚利頭目化痰壅鉛金丸方鉛霜半兩研金箔一十片研入藥半夏三分湯洗淨生用天南星生用雄黃研各二兩白礬生用防風去叉各半兩白茯苓去黑皮一兩半上八味搗羅為末水煮麵糊和丸如梧桐子大每服十五丸食後臨臥生薑薄荷湯下藥丸了不可見日治因風致驚眼斜反張手足瘛瘲背急發搐雄黃丸方雄黃一分別研細巴豆去皮心膜醋熬令赤黃淨洗壓去油取末二錢鬱金末一兩上三味研勻煉蜜丸如綠豆大每服五七丸荊芥湯下常服臨臥服若當病發煎槐膠薄荷酒調下一錢或半錢當吐利風涎痰涕等小兒每服一丸至二丸冷荊芥湯下以利為效仍節乳食無令兒飽風驚邪論曰風驚邪之狀乍驚乍喜恍惚不寧舉措失常是也蓋心者生之本而藏神今心氣虛則神不寧風邪乘虛而干之故謂之風驚邪也治風驚邪心虛冷熱不調左肋下有氣發即妨脹不能食地黃煎丸方生地黃汁六升生天門冬汁五合牛髓五合生薑汁七合牛酥五合白蜜五合醇酒二升棗肉膏去核五合以上八味先煎地黃汁並酒五分減二分次下天門冬汁薑汁煎二十沸次下牛髓酥蜜棗膏煎如稀糖次下後散藥黃耆銼石斛去根人參山芋茯神去木柏子仁別搗研山茱萸桂去粗皮五味子防風去叉枸杞子枳殼去瓤麩炒厚朴去粗皮生薑汁炙銼白朮各半兩乾薑炮半兩赤石脂別搗研甘草炙銼各一兩遠志去心細辛去苗葉各一分上二十七味除前八味外搗研為末入前煎中攪勻於銀器中重湯煎可丸即丸如梧桐子大每空心早食後溫酒下三十丸日再服治風驚邪及一切風舌強語澀昏迷恍惚化痰益智太一丸方金薄一分同丹砂研真珠一分研丹砂研一兩半同金薄研令勻玳瑁鎊二兩阿膠炙令燥一兩龍腦研半兩雄黃研琥珀搗研各一兩麝香研牛黃研各半兩安息香二兩酒研濾去砂入銀石器中更用蜜二兩於重湯內熬成膏上一十一味除安息香外各細搗研訖再同研令勻細候熬安息香膏稀稠得所即將前藥入在膏內不住以槐枝攪令得所可丸即丸如梧桐子大每服一丸細嚼人參湯下如卒中用童子小便化下三丸如中風用酒化下五丸小兒風痰及驚癇以薄荷湯化下半丸治風驚邪及一切風肢節不利筋脈拘急頭目旋痛恍惚心忪獨活丸方獨活去蘆頭三分防風去叉白茯苓去黑皮各半兩阿膠炙令燥石膏碎研各三分玳瑁鎊一兩人參一兩半甘草炙銼半兩天南星炮一兩細辛去苗葉半兩丹砂研二兩白殭蠶炒半兩丁香一分琥珀搗研一兩牛黃研麝香研各一分天麻龍腦研各半兩上一十八味搗研為末再同研勻別用安息香二兩半搗碎以酒一升研濾去滓於銀器內慢火熬成膏和前藥了臼中杵三五百下丸如雞頭大每服一丸細嚼薄荷茶下不計時甚者加一丸治風驚邪及心虛喜忘風涎不利生犀角丸方犀角鎊一兩天麻半兩敗龜醋炙半兩牛黃研茯神去木遠志去心人參桂去粗皮龍齒酥炙黃丹砂研各一分麝香研半兩龍腦研一分菖蒲細銼九節者半兩金薄五十片研羚羊角鎊半兩銀薄五十片研上一十六味搗研為末再同研令勻細煉蜜丸如梧桐子大食後臨臥溫水化下三丸加至五七丸治風驚邪心中恍惚驚悸恐怖精神不樂化痰潤肌清神快氣茯神丸方茯神去木人參遠志去心麥門冬去心焙熟乾地黃焙青橘皮湯浸去白焙甘草炙銼五味子山芋桔梗去蘆頭切炒枳殼去瓤麩炒檳榔生銼各一兩白朮桂去粗皮芍藥各半兩上一十五味搗羅為末煉蜜和丸如雞頭大每服一丸含化治風痰熱氣安魂定魄鎮心神大丹砂丸方丹砂研半兩牛黃研一分金薄二十片研銀薄二十片研龍腦研一分硼砂研琥珀研各一錢甘草炙銼為末犀角鎊為末羚羊角鎊為末各一分上一十味再同研令勻細煉蜜和丸如雞頭大每服一丸至兩丸熟水嚼下治風驚邪冒郁煩悶伸欠倦怠化風痰涎鎮心丸方銀薄五十片水銀黑錫各半兩同水銀結沙子與銀薄共研龍齒人參遠志去心麝香研丹砂研犀角鎊牛黃切各半兩虎睛一對酒浸一宿炙微黃上一十一味搗研為末再同研勻煉蜜和丸如梧桐子大每服三丸荊芥湯下食後臨臥服治風驚邪分涎利膈安神定志鎮心追風散方乾蠍去土首尾全者四枚去爪生用附子炮裂去皮臍烏頭生去皮臍白附子生天南星生各一分丹砂研一錢半麝香研半錢龍腦研半錢半夏生薑汁浸一宿切焙一分上九味六味搗研為散入龍腦麝香丹砂再同研令勻細入瓷閤中盛每服半字煨蔥白酒調下日二三服漸加至一字覺體麻即減服小兒驚風服半字許治風化痰定心氣銀粉丸方粉霜半兩天南星炮一兩半鉛白霜半兩半夏湯洗七遍丹砂研一兩白礬熬令汁枯半兩水銀半兩鉛半兩二味結砂子上八味搗研為末再和勻用白麵糊為丸如梧桐子大每服五丸薄荷水下小兒丸如麻子大治風驚調心氣安神志化痰止煩渴茯神湯方茯神去木人參各一兩白蘚一分麥門冬去心焙三分枳實麩炒羚羊角屑甘草炙銼龍齒各半兩防風去叉三分黃芩去黑心一分上一十味粗搗篩每服三錢匕水一盞入竹葉十片煎至七分去滓食後臨臥溫服治諸風驚桃花散方麻黃去根節天南星炮白附子炮附子炮裂去皮臍烏頭炮裂去皮臍各一兩丹砂研麝香研各一兩乾蠍去土一兩生用上八味搗研為散每服半錢匕薄荷溫酒調下一切風用蔥酒調下小兒每服一字匕薄荷蜜水調下治驚邪風癇醫所不治者風引湯方大黃銼炒乾薑炮龍骨各四兩桂去粗皮三分甘草炙牡蠣熬各半兩凝水石赤石脂白石脂紫石英滑石各一兩半上一十一味㕮咀如麻豆每服三錢匕水一盞煎至七分去滓溫服日再治昏虛安魂神化風痰定心忪遠志丸方遠志去心人參白茯苓去黑皮山芋凝水石碎研各一兩上五味搗研為末用白麵糊為丸梧桐子大每服二十丸人參湯下加至三十丸治驚邪安神散方丹砂研鐵粉研各半兩白茯苓去黑皮為末一錢上三味同研令極細每服半錢匕鵝梨汁調下磨刀水亦得風驚恐論曰風驚恐之狀神志不寧時發驚恐如人將捕之蓋心者生之本神之變肝者將軍之官謀慮之所從出二臟平調則外邪不侵若正氣不足風邪干之薄於心則怵惕不自安迫於肝則驚恐也治風驚恐夢寐顛錯大鎮心散方紫石英研二兩白茯苓去黑皮防風去叉人參甘草炙銼澤瀉各二兩秦艽去土黃耆炙銼白朮山芋白蘞銼各一兩半麥門冬去心焙當歸切焙各一兩一分桂去粗皮遠志去心柏子仁生用各一兩石膏研三分桔梗去蘆頭炒大黃銼醋炒大豆卷炒各一兩蜀椒去目併合口炒出汗芍藥細辛去苗葉各三分上二