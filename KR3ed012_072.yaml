body:
  text: 卷第七十二積聚心腹脹滿論曰腑臟不和則氣血留滯而成積聚其積聚蘊結氣不宣通與臟氣相搏故令人心腹脹滿煩悶短氣若為寒邪所並則搏於臟腑陰陽相擊而致心腹疼痛甚則泄利也治積聚心腹脹滿食已腹痛飲食不化嘔噦噁心胸脅脹悶大便祕利不定磨滯丸方木香青橘皮湯浸去白焙桂去粗皮各一兩吳茱萸湯浸焙乾炒三兩硇砂醋熬成霜研末一錢匕巴豆霜半錢匕上六味搗羅四味為末與硇砂巴豆霜同拌勻醋煮麵糊為丸如緑豆大每服三丸加至五丸早晚食後臨寢服大便溏利時減丸數治積聚不散心腹脹滿嘔吐酸水惡聞食氣臟腑不調或祕或泄硇砂丸方硇砂一兩以醋一盞半同化入面一匙煮成糊烏梅去核炒三兩巴豆霜一錢匕沒藥研莪朮煨銼丁香木香京三稜煨銼乾漆炒令煙出各半兩上九味搗研八味為末令勻以硇砂糊丸如緑豆大每服二丸至三丸煎丁香烏梅湯下食後服更量虛實加減治積聚心腹脹滿宿食不消㽲刺疼痛噁心嘔吐不思飲食積氣丸方桂去粗皮二兩附子炮裂去皮臍半兩丹砂研四兩桃仁湯浸去皮尖雙仁研一兩半巴豆去皮心膜壓出油一百枚京三稜煨銼乾漆炒煙出鱉甲去裙襴醋炙各一兩硇砂研二兩大黃生用一兩麝香研一兩木香一兩上一十二味搗研為末先以好醋一升熬成膏和前件藥丸如緑豆大每服三丸五丸量虛實加減煎木香湯下食後治積聚心腹脹滿不思飲食沉香煎丸方沉香木香胡椒青橘皮去白焙阿魏醋化面和作餅炙沒藥研檳榔銼丹砂研硫黃研硇砂研高良薑各一兩巴豆霜二錢匕丁香半兩上一十三味除研外搗羅為末一處研勻用重湯煮蜜丸如梧桐子大每服三丸煎橘皮湯下治積聚不消心腹滿㽲刺疼痛嘔逆醋心不思飲食代赭丸方代赭研木香桂去粗皮丹砂研各半兩京三稜煨銼一兩杏仁去皮尖雙仁炒研一分檳榔銼三分巴豆去皮心膜研出盡油三十粒上八味搗研為末以醋煮麵糊丸如梧桐子大每服三丸食後溫橘皮湯或生薑湯下治積聚不消心腹脹滿醋心嘔逆不思飲食木香三稜丸方木香京三稜煨銼檳榔銼各半兩烏梅肉炒二兩縮砂仁一兩青橘皮去白焙一兩半巴豆去皮心膜研出油一分上七味搗研為末用醋煮麵糊丸如麻子大陰乾丹砂為衣每服二十丸食前生薑米飲下治積聚心腹脹滿利胸膈散滯氣消宿食木香乾漆丸方積聚宿食不消論曰飲食入胃脾臟化之若腹內素有積聚攝養乖度食飲不時則脾胃愈弱飲食遲化故為宿食不消之病其狀噫氣食臭胃脹煩滿是也治積聚宿食不消中脘痞滯煩滿氣促腹內刺痛噫氣不思飲食木香丸方木香半兩檳榔銼一兩陳橘皮湯浸去白焙半兩丁香一分京三稜煨一兩乾薑炮一分蓬莪朮煨半兩巴豆去皮心膜出油半錢硇砂水飛研半兩上九味除研外搗羅為末入巴豆硇砂研令勻湯浸蒸餅丸如緑豆大每服二丸至三丸溫生薑橘皮湯下食後服治積聚宿食不消胸膈痞悶腹肚脹滿㽲痛不食丁香丸方丁香一兩青橘皮湯浸去白焙二兩桂去粗皮乾薑炮附子炮裂去皮臍各一兩蓬莪朮煨銼京三稜煨銼乾漆炒煙出各二兩豬牙皂莢酥炙去皮子木香各一兩牽牛子細末二兩墨一兩十二味別搗羅為細末硇砂醋研大黃生為末各二兩巴豆一兩去皮心膜研如膏於新瓦內攤去油取霜上一十五味先將後三味於石鍋內醋煎硇砂令熱先下巴豆霜煎三兩沸次下大黃末熬成膏和前一十二味藥末熟杵丸如緑豆大常服一丸二丸茶湯任下如要取積生薑湯下七丸更量力加減治積聚宿食不化留滯成塊心腹疼痛疲倦多困日漸黃瘦木香丸方木香三分蓬莪朮京三稜二味煨銼各一兩巴豆去皮心膜研出油二十粒丹砂研三分上五味將前三味搗羅為末入巴豆丹砂同研令勻醋煮麵糊丸如緑豆大每服三丸至五丸生薑橘皮湯下食後臨臥服治久積氣塊宿食不消胸膈痞悶痰逆噁心不思飲食臍腹刺痛醋心噎塞小分氣丸方木香一兩檳榔銼陳橘皮湯浸去白焙楝實銼炒乾薑炮青橘皮湯浸去白炒各半兩蓬莪朮醋浸一宿煨一兩巴豆去皮心膜研出油半夏湯洗七遍去滑焙大黃煨銼各一分雄黃研一兩上一十一味搗研為末醋煮麵糊丸如緑豆大每服五丸七丸溫生薑湯下食後臨臥服逐積滯化宿食利胸膈寬中丸方烏頭炮裂去皮臍吳茱萸湯浸焙炒高良薑甘遂麩炒大黃梔子仁各半兩巴豆去皮心膜研出油四十九粒上七味搗研為末用棗肉丸如小緑豆大每服一丸生薑橘皮湯下消積化氣溫胃思食治食後心膈妨悶如意丸方威靈仙去苗土附子生去皮臍二味各半兩同為末用好醋半盞浸一宿硇砂細研一分巴豆二十一粒去皮心膜出油二味同研用酒半升醋半升同煎與前二味同熬成膏蓬莪朮煨銼木香各半兩青橘皮湯浸去白炒一兩大黃銼炒三分陳曲炒半兩丁香一分上一十味將後六味為末以前四味膏和更別熬醋少許研墨汁同丸如緑豆大每服五丸至七丸生薑湯下消積滯化宿食痰飲治胸膈痞悶桂香勻氣丸方桂去粗皮丁香皮縮砂仁益智去皮炒陳橘皮湯浸去白焙青橘皮湯浸去白焙檳榔銼木香蓬莪朮煨各一兩烏梅和核一兩半巴豆去皮心膜研出油六十四粒上一十一味除巴豆外搗羅為末和勻煮麵糊丸如麻子大每服七丸至十丸茶酒任下食後服治一切積滯宿食不消痰逆噁心吐瀉霍亂膈氣痞滿脅肋膨悶嘔噦心疼泄痢宜服積氣丸方代赭研赤石脂研各一分大戟木香龍膽各半兩杏仁湯浸去皮尖四十九粒巴豆去皮心膜研出油為霜三十粒上七味除別研外搗羅為末入杏仁巴豆霜同研勻用麵糊丸如梧桐子大每服三丸至五丸食後臨臥木香湯下治久積伏滯胸膈膨脹心腹刺痛不化飲食及婦人血氣疼痛紫沉消積丸方沉香銼阿魏醋化研巴豆霜各一兩硇砂研四兩四味同研勻用蜜一斤酒二盞共熬成膏以瓷合盛丹砂研二兩硫黃研青橘皮湯浸去白焙高良薑檳榔銼木香人參桂去粗皮胡椒各四兩丁香乾薑炮各二兩上一十五味將前四味蜜酒熬成膏余並搗羅為末用膏和搗千百杵丸如緑豆大每服五丸七丸溫橘皮湯下如心痛溫酒下婦人血氣當歸湯下消積化氣進食黑神丸方木香硇砂研蓬莪朮煨銼京三稜煨銼各半兩桂去粗皮附子炮裂去臍皮乾薑炮乾漆搗碎炒煙出大黃煨別為末青橘皮湯浸去白焙墨燒過巴豆去皮心膜細研出油各一兩上一十二味以好醋一大碗先熬硇砂令沸入巴豆又熬數沸次又入大黃末熬成膏余藥並搗羅為末以膏杵和丸如萊蔔子大每服三丸五丸茶酒任下如消食化氣生薑橘皮湯下小腸疝氣蘹香酒婦人血氣當歸酒下治積聚宿食留飲不消丁香丸方丁香木香沉香銼安息香乳香硇砂別研肉豆蔻去殼桂去粗皮京三稜煨當歸切焙陳橘皮湯浸去白焙檳榔銼蓽澄茄各一兩附子炮裂去皮臍半兩巴豆十枚於煻灰內炮去皮細研上一十五味先將安息香乳香硇砂三味用少許酒浸良久別研如膏更與巴豆研勻余藥並搗羅為末同用酒煮麵糊丸如麻子大每服五丸至七丸熟水下若大段氣痛加至十丸用生薑湯下治積聚氣滯胸膈滿悶心腹㽲痛不化飲食乳香丸方乳香研丁香木香各一兩附子炮裂去皮臍五靈脂為末乾薑炮各半兩桂去粗皮芫花醋拌炒焦黃青橘皮湯浸去白炒各三分豬牙皂莢去皮酥炙一兩巴豆去皮心膜別研如膏新瓦內攤去油取霜一錢上一十一味除乳香五靈脂末巴豆霜外八味搗羅為末入上三味拌勻煮陳曲糊丸如緑豆大每服二丸三丸溫生薑湯下量虛實加減食後臨臥服治積聚癖塊一切所傷吃食減少日漸黃瘦如聖丸方巴豆去皮心膜研出油一兩丁香三錢烏梅去核一兩半乾漆搗碎炒煙出一兩滑石一錢上五味先搗羅四味為末然後入巴豆同研勻用粳米飯同爛搗丸如粟米大每服二丸至三丸隨所傷物下更量虛實加減消食化氣利胸膈及積聚凝滯臟腑刺痛飲食減少木香丸方木香為末丁香為末巴豆去皮心膜研出油各半兩硇砂研半兩大棗去皮核烏梅去核為末各三十枚上六味先將水拌白麵作一薄餅以棗肉鋪餅上次以前四味藥末和勻復上鋪棗肉作饅頭裹就用炭火四圍炙熁候面焦黑約藥透取出地面上出火毒候冷打破去焦面不用將藥與烏梅末同搗稀麵糊丸如黃米大每服二丸三丸食後生薑湯下或隨所傷物湯下消食化氣破積聚治心腹脹滿噫醋噁心八仙丸方京三稜煨銼蓬莪朮煨銼五靈脂各一兩烏梅六十枚和核用縮砂一百枚去皮乾漆半兩炒煙出巴豆四十粒去皮不出油研木香一分上八味搗羅為末用酸粟米飯三兩匙同入臼杵五七百下丸如緑豆大每服五丸至七丸生薑湯下小兒一丸如耍宣轉十五丸更量虛實加減取積聚消宿食檳榔丸方檳榔生銼兩枚巴豆去皮心膜麩炒二十一粒青橘皮湯浸去白焙半兩牽牛子炒大黃濕紙裹煨乾漆炒煙出各一分硇砂研一錢上七味搗研羅為末湯浸蒸餅丸如緑豆大以丹砂為衣每服一丸二丸溫水下如耍宣轉取食積三五丸或七丸十丸量虛實空心煎蔥白湯下宣後服和氣人參湯和氣人參湯方人參白茯苓去黑皮厚朴去粗皮生薑汁炙甘草炙肉豆蔻去殼陳橘皮去白麩炒蘹香子炒木香白朮桂去粗皮各半兩上一十味搗為粗末每服二錢匕水一盞生薑三片棗一枚劈同煎至七分去滓溫服治脾胃虛冷積聚沉結宿食不消益智散方益智去皮炒蓬莪朮煨銼京三稜煨銼青橘皮陳橘皮二味並湯浸去白炒白茯苓去黑皮各一兩人參甘草炙銼各半兩木香一分厚朴去粗皮生薑汁炙一兩一分上一十味搗羅為散每服一錢匕入鹽少許沸湯點服不拘時候治久積聚宿滯不消或翻胃吐逆噁心乾噦及脾寒等疾藿香煮散方藿香葉木香陳橘皮湯浸去白焙肉豆蔻去殼訶黎勒皮人參白茯苓去粗皮甘草炙草豆蔻去皮麥糵炒陳曲炒各一兩乾薑炮高良薑銼炒各半兩厚朴去粗皮生薑汁炙一兩半上一十四味搗羅為散每服二錢匕水一盞生薑一塊拍破同煎至七分入鹽一捻熱服水瀉及腸風藏毒熱陳米飲調下治諸積宿食不消黑虎丸方芫花炒甘遂炒烏頭炮裂去皮臍大戟炒銼京三稜煨銼牽牛子炒乾薑炮陳橘皮去白焙各半兩乾漆二兩炒煙出盡上九味搗羅為末以醋煮麵糊丸如緑豆大每服二丸消食化氣溫水下取積滯米湯下溫病傷寒姜醋湯下氣痛艾湯下本臟氣虛炒蘹香子酒下瘧疾桃枝湯下婦人血氣勞氣醋湯下寸白蟲煎牛肉湯下治一切積滯化氣消食補益真氣逐産後敗血補虛損硇砂煎丸方硇砂揀通明無石者別研如粉當歸酒浸一宿去蘆頭切焙肉蓯蓉酒浸一宿薄切作片焙乾巴戟天酒浸一宿去心焙檳榔生各一兩楝實洗過切破四兩酒浸一宿候軟以刀子刮下瓤去皮核不用二兩蘹香子微炒木香沉香銼附子炮裂去皮臍天雄用酒煮五七百沸候軟刮去皮臍各一兩阿魏半兩米醋磨成膏入諸藥上一十二味搗研為細末以無灰酒煮白麵糊丸如梧桐子大每服三十丸空心日午溫酒下嘗有婦人病蓐中下痢日久甚困篤百方不瘥醫曰蓐中痢與他痢不同常痢可用苦澀藥止之蓐中痢生於血不足投澀藥則血愈不行痢當愈甚産後痢者宜投硇砂丸日三服痢頓減半次日遂愈此藥産後雖無病亦宜服之能養血去積滯治積聚宿食不消脅肋堅硬及心腹刺痛諸病礞石丸方礞石研半兩硇砂一兩米醋三升化巴豆霜一兩半京三稜醋浸一宿煨一兩大黃煨銼一兩半木香檳榔銼肉豆蔻去核豬牙皂莢去皮炒桂去粗皮乾薑炮丁香芫花醋浸一宿