令勻用米醋三升於銀石器內慢火熬成膏大黃一兩蒸熟焙乾鱉甲去裙襴醋炙青橘皮湯浸去白焙京三稜煨銼當歸切焙陳曲炒各一兩木香桂去粗皮各三分上一十四味搗羅八味用前膏和丸如緑豆大每服二丸至三丸茶酒任下如取積量虛實加減治食癥結塊疼痛發歇化氣消酒食硇砂丸方硇砂細研乾漆炒煙出各一分木香丁香蓬莪朮煨銼京三稜煨銼青橘皮湯浸去白焙芫花炒各半兩肉豆蔻五枚大者去殼巴豆一分半去皮心膜壓出油上一十味將米醋一碗浸蓬莪朮芫花三稜一宿後焙乾與五味同搗羅為末入硇砂巴豆拌勻醋煮麵糊和丸如大麻子大每服三二丸如要取轉看虛實加減生薑湯下婦人血氣醋湯下小兒疳氣甘草湯下男子膈氣龍腦湯下瀉痢乾薑湯下治食症氣塊痃癖等疾八靈丸方京三稜煨銼石三稜煨銼雞爪三稜煨銼木香檳榔銼各一兩肉豆蔻去殼半兩巴豆去皮心膜煎黃出油盡硇砂研各一分上八味搗羅六味為末入巴豆霜硇砂末拌勻醋煮麵糊和丸如小豆大每服五七丸丈夫生薑湯下婦人醋湯下痃癖氣煎木香湯下治食症勞氣五積五膈脾胃久冷吃食無味飲食不化四肢少力痰毒氣脹胸膈不利三稜丸方京三稜石三稜雞爪三稜黑三稜蓬莪朮各煨銼巴豆連皮乾薑炮附子炮裂去皮臍各一兩以上八味用釅醋一斗於銀石器中煮令盡除巴豆不用外並切焙乾丁香木香桂去粗皮青橘皮去白炒檳榔銼肉豆蔻去殼各半兩上一十四味搗羅為末每稱一兩末別用巴豆七枚去皮心膜出油細研拌勻更用硇砂一分醋化煮麵糊和丸如大麻子大丹砂末為衣每服三丸至五丸生薑湯下治遠年食症積氣並酒食所傷胸膈脹滿及婦人血塊木香三稜丸方木香京三稜煨銼補骨脂炒牽牛子炒丁香皮銼乾漆炒煙出各一兩陳橘皮湯浸去白焙烏梅肉炒五靈脂末各二兩巴豆霜一分同五靈脂末用醋一升調勻慢火熬成膏沉香半兩上一十一味搗羅九味為末入二味膏子和丸如緑豆大每服五丸至七丸食後臨臥生薑湯下治食症氣堅腹中疼痛丁香丸方丁香乳香研木香肉豆蔻去殼當歸切焙青橘皮去白焙京三稜煨銼各半兩紫菀去苗土乾薑炮附子炮裂去皮臍巴豆去皮心膜出油研各一兩鱉甲去裙襴醋炙二兩丹砂研一分上一十三味搗羅十味為末與丹砂巴豆乳香拌勻又入蕎麥麵一匙旋滴新汲水和搗五千杵衆手丸如緑豆大每服三丸至五丸先煎漿水令沸入藥煮少頃漉出曝乾茶酒任下要轉利以冷茶下熱茶投之治食症氣塊心腹脹滿吐逆酸水小三稜煎丸方京三稜蓬莪朮各四兩芫花一兩上三味同入瓷瓶內用米醋五升浸封瓶口以煻火煨微干取出三稜並蓬莪朮杵碎芫花以余醋炒微焦同焙乾為末米醋煮麵糊和丸如梧桐子大每服三丸至五丸生薑鹽湯下婦人醋湯下諸症論曰積氣在腹中久不瘥牢固推之不移者症也此由寒溫失宜飲食不節致腑臟氣虛弱食飲不消按之其狀如杯盤牢結久不已令人身瘦而腹大至死不消診其脈弦而伏其堅不轉動者死之候也治諸癥結痛起於脅下按之而堅妨痛不能飲食漸加羸瘦當歸煮散方當歸切焙鱉甲用醋頻蘸炙令黃色桂去粗皮木香桔梗炒桃仁湯浸去皮尖雙仁炒別研如膏各一兩半吳茱萸陳者水淘七遍炒乾半兩上七味除桃仁外搗羅為末入桃仁同研令勻每服三錢匕水一盞煎至六分去滓溫服逐日空腹日午夜臥各一治積年症塊京三稜湯方京三稜炮銼一兩青橘皮去白焙半兩桂去粗皮一分大黃銼碎炒半兩木香一分檳榔銼半兩上六味粗搗篩每服五錢匕水一盞半煎至七分去滓溫服空腹日午夜臥各一治症塊衝心氣滿食不下手足煩悶鱉甲丸方鱉甲去裙襴醋蘸炙黃色訶黎勒微煨去核各二兩防葵甘草炙銼人參大黃銼炒各一兩半白朮桂去粗皮郁李仁去皮別研杏仁去皮尖雙仁熬熟別研如膏各一兩上一十味除研外搗羅為末入郁李仁杏仁同研勻煉蜜丸梧桐子大空腹溫酒下二十丸漸加至三十丸以微利為度治積年症塊血氣凝滯木香丸方木香吳茱萸陳者淘七遍炒乾青橘皮去白焙各半兩巴豆去皮九十粒研如膏用紙裹壓出油研硇砂用沸湯化於瓷碗中用慢火熬水盡收霜再研一分上五味除研外搗羅為末入巴豆硇砂研令勻於煻火中煨粟米飯丸緑豆大每服溫酒下三丸至五丸食後服溏利勿怪老小減服治症癖腹滿如鼓坐臥不安食即欲吐氣悶喘急檳榔湯方檳榔二兩微煨銼赤茯苓去黑心芍藥京三稜微煨銼陳橘皮湯浸去白焙各一兩半郁李仁湯浸退出皮一兩食茱萸去葉三分上七味粗搗篩每服三錢匕水一盞煎至七分去滓溫服空腹午後各一治症癖氣脹腹痛脅肋脹滿不思食飲柴胡湯方柴胡去苗赤茯苓去黑皮各三分桔梗炒木通銼各一兩芍藥鱉甲去裙襴醋蘸慢火炙令黃色郁李仁湯浸去皮各半兩上七味粗搗篩每服三錢匕水一盞煎至七分去滓溫服空腹午後各一治症癖氣塊脅肋滿腹脹不能飲食腹痛防葵丸方防葵銼碎柴胡去苗赤茯苓去黑皮各三分桂去粗皮木香各半兩鱉甲去裙襴醋蘸慢火炙黃色檳榔銼各一兩半桔梗炒郁李仁湯浸去皮尖別研如膏各一兩大黃銼碎微炒一兩一分當歸切焙京三稜炮銼五味子各半兩上一十三味除研外搗羅為末入郁李仁同研勻煉蜜丸梧桐子大空腹溫酒下二十丸治症癖食氣食勞五膈痰逆夾食丸方乳香別研如粉木香丁香肉豆蔻去殼當歸切焙青橘皮去白焙京三稜炮銼各半兩紫菀去苗土乾薑炮裂附子炮裂去皮臍巴豆去皮心別研紙裹壓出油各一兩鱉甲去裙襴用醋蘸慢火炙令黃色二兩丹砂一分別研如粉上一十三味除乳香丹砂巴豆外搗羅為末然後入乳香等三味同研令勻都入臼中用蕎麥麵與藥末臨時以意看多少入面徐徐入新汲水搗候可丸即止丸如緑豆大煎淡漿水令沸旋旋入藥煮三五沸漉出於日中曝乾每服五丸食後用茶酒溫水下治症癖氣塊鱉甲丸方鱉甲去裙襴醋蘸炙黃色木香烏頭炮裂去皮臍柴胡去苗各一兩半京三稜炮銼當歸切焙桂去粗皮厚朴去粗皮塗生薑汁炙令微煙出銼陳橘皮湯浸去白焙各二兩甘草炙銼檳榔銼各半兩大黃銼碎炒朴硝研如粉各三兩上一十三味除朴硝外搗羅為末同研令勻煉蜜丸梧桐子大空腹用溫酒下十丸飲下亦得治症塊粉砂餅方粉霜胡粉各一兩硇砂丹砂白丁香膩粉各半兩上六味研為末入面一兩水和捏作餅如棋子大慢火燒熟每服一餅麝香米飲嚼破服治積年血氣症塊往來疼痛吐逆不納飲食保命丸方當歸切炒烏頭炮裂去皮臍芍藥桂去粗皮乾薑炮各半兩大黃銼炒一兩斑蝥二十一枚用糯米炒令黃色為度去翅足上七味搗羅為末醋煮麵糊丸梧桐子大空心食前溫酒下一丸治虛積食氣蠱脹水氣年深症癖五食丸方大戟刮去皮甘遂各半兩生豬牙皂莢生去皮子一兩胡椒一分芫花半兩醋浸一宿炒乾巴豆半兩去皮心膜醋煮三十沸漉出研上六味搗研為末合研勻水煮麵糊和丸如緑豆大每服五丸用米麵緑豆煎湯放溫下量病人大小加至七丸治症塊氣積下結胸一切積滯半夏礞石丸方半夏四十枚湯浸七遍巴豆四十粒去皮心膜杏仁去皮尖雙仁四十枚豬牙皂莢去皮四十挺四味用好醋浸七日取出以布絞取汁熬成膏入衆藥礞石研細炒五錢丁香木香沉香各二錢檳榔半兩膩粉硇砂粉霜各一分上一十二味將後八味搗研為末入在前膏子內一處再搗細令勻丸小豆大看虛實煎棗湯下二丸爛嚼乾柿乾咽下亦得治症塊消食積止心腹疼木香扁丸方木香硇砂通明者各一錢半夏中等者一十枚生薑漿水洗七遍桂去粗皮三錢蓽茇四十九枚中等者杏仁二十一粒去皮心膜出油三二分巴豆二十一粒去油三分上七味先將杏仁巴豆同研如泥以好米醋八分一盞熬至二分以下成稠膏入前藥末和勻再入棗肉丸緑豆大捏扁丸常服食後良久一丸生薑湯下要轉三丸男子婦人心痛炒萊蔔醋湯下治症癖化氣取食積及本臟氣水疾蠱脹大戟丸方大戟半兩芫花醋炒一兩巴豆一百粒去皮以水五升煮水盡為度去心少出油細研甘遂乾薑炮陳橘皮去白焙硇砂薑黃桂去粗皮各一兩上九味搗研為末於銀石器內炒令極熱勿令焦煉蜜丸梧桐子大常服生薑湯下一丸如取轉量臟腑虛實加減治症積五積食氣諸藥無效者沒藥丸方沒藥研硫黃研白丁香生當歸切焙芫花醋浸半白炒硇砂通明者研乳香研丹砂研各一分巴豆四十九粒去皮心不出油研上九味搗研為末合研勻用水浸炊餅和劑搗一千杵丸梧桐子緑豆麻子三等大每服一丸婦人血氣童子小便和酒下心頭高硬當歸酒下遠年症積五積食氣生薑湯下小兒脾積癖氣臘茶清下大人與大丸十五以下與中等十歲以下與第三等者服治積聚症塊及涎積等續隨子丸方續隨子三十枚去皮膩粉二錢青黛炒一錢匕研上三味先研續隨子令爛次下二味合研勻細以燒糯米軟飯和丸如雞頭大每服先燒大棗一枚剝去皮核爛嚼取藥一丸推破並棗同用冷臘茶清下服後便臥至中夜後取下積聚惡物為效破症塊消積氣乾漆丸方乾漆四兩搗為末炒令煙盡五靈脂用瓶子盛地坑子內以火煅煙盡取灰二兩皂莢長五寸許銼以麻纏定用泥固濟火煅煙盡取灰二兩蘹香子炒令香木香雞骨者檳榔結實者銼桂去粗皮附子炮裂去皮臍青橘皮去白炒陳橘皮去白炒白牽牛炒令香熟大黃劈開錦文者炒蓬莪朮炮銼京三稜用醋紙裹銼芫花米醋浸一宿炒乾用各二兩上一十五味搗羅為末煉蜜為丸如梧桐子大生薑湯下二十丸至三十丸忌豬魚熱面等物
