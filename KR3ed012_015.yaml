body:
  text: 卷第一十五風癲論曰風癲之狀發無常時每發則仆地吐涎沫無所覺知蓋由血氣皆虛精神離散魂魄失守風邪入於陰經故也又以胞胎之初其母卒大驚精氣並居能令子發癲其證與風癲大率相似治風邪變成癲癇時時發動不知人事定心神牛黃丸方牛黃別研真珠末別研琥珀別搗羅鐵粉別研天竺黃別研龍齒別研各半兩金箔七十片與水銀同研銀箔七十片與水銀同研水銀與金銀薄同研犀角鎊丹砂與水銀金銀薄同研各半兩露蜂房炙一兩龍膽去土升麻防風去叉黃芩去黑心鉤藤各半兩知母細切焙天門冬去心焙白芍藥茯神去木甘草炙銼菖蒲九節者米泔浸刮去皮切酒炒麥門冬去心焙各一兩乾蠍酒炒一兩麝香別研人參各半兩上二十七味除別研石藥及麝香等一十一味外余藥搗羅與研藥再羅令勻煉蜜拌和得所更搗千杵丸如梧桐子大夜臥及食後煎新竹葉湯下十五丸至二十丸治風癲卒發仆地口吐涎沫不省人事天門冬煎方天門冬淨洗浸兩日去心細切七斤生地黃三十斤肥者淘洗細切上二味細切都於木臼中搗爛卻入大沙盆內爛研壓取汁絞滓干別收將滓更研極爛入湯一斗研攪令勻又壓滓干再研極細入湯八升壓滓又再研入湯六升壓令盡干無味即住取第二第三度研入者汁同煎至一斗次入第一藥汁煎成煎若稠餳即止每服一匙用酒化下或桃柳湯溫水化下食後服治風癲疾時發時省涉歷年月丹砂煎方丹砂細研水飛濾過後焙乾更研如粉三兩石膏五兩研細黃連去須搗篩一斤生地黃不計斤兩研取自然汁二升不得入水上四味以清水一斗先煮石膏黃連取五升淨去滓次下生地黃汁又煎之如稠餳始下火取丹砂粉投入勻攪百餘遍貯於不津器中更攪待冷即住手每日兩度以溫水調服約如半彈丸大服藥後只得吃淡飯蔓菁菜等治風癲如才得病者服藥三日愈間日發者十日愈五日發者二十日愈半年一發者服一月愈莨菪丸方莨菪子淘去浮者三升上一味新汲水淘三十遍浮者盡去生研如膏入酒一升同研絞取酒又研如膏更入酒一升研絞取酒又研如前絞取酒都及三升更濾一遍入無油淨鐵器中煎成煎卻將莨菪滓炒令焦黃干搗羅為末待其煎成即漸漸少入末和煎令可丸即丸如梧桐子大空心午時夜臥各用溫酒下十丸如未覺效加至十五丸額上手中從紋理中赤是覺效也即減藥服之治五癲各有聲牛癲若牛鳴馬癲若馬鳴狗癲若狗鳴羊癲若羊鳴雞癲若雞鳴凡此五癲並宜服之雄黃丸方雄黃丹砂雌黃三味各二兩碎同用生絹夾袋貯之入十兩蜜內重湯煮待蜜赤色滴如珠引若線為度取藥囊出河水洗滌淘漉出曝乾入乳鉢中研如粉為度其蜜即丸藥用黑鉛二兩大火化用鐵匙攪掠去如塵垢者用精者一兩將無油淨器中下水銀及鉛同銷熔攪令勻瀉於熟鐵器內候冷先將前三味石藥乳鉢內研次入鉛同研取勻水銀一兩上五味各如前修制畢便將前煮丹砂雄黃雌黃余蜜再重湯煮散少少點入藥中漸漸和勻為丸如大麻粒每用桃柳柏桑木嫩條各長七寸寸銼以水一升煎至六合去滓分溫下丸藥空心午時臨臥時下三丸至五丸小兒一丸至二丸治風癲狂亂失心安魂定志麥門冬丸方麥門冬去心焙一兩虎睛一對微炙龍齒研一兩金箔研一百片銀箔研一百片石膏研升麻枳實麩炒生薑切焙白茯苓去黑皮人參銼各一兩玄參葳蕤炒芍藥甘草炙銼遠志去心各三分柏子仁生用薤白細切焙乾牛黃別研半兩上一十九味除虎睛並別研六味外余搗羅再與研者同羅為末煉蜜和丸如梧桐子大每服二十丸煎地骨皮湯下日三夜一不拘時治風癲引脅肋牽痛發作吐沫耳中虛鳴茯神丸方茯神去木一兩一分龍骨別研龍角別研各一兩龍膽去土鐵精搗研蔓荊實炒各一兩一分人參遠志去心黃連去須炒大黃銼醋炒各一兩芎藭當歸切焙黃芩去黑心各一兩上一十三味先將一十味搗羅為末入別研者相拌令勻煉蜜丸如梧桐子大食後煎生薑枳殼湯下十丸加至十五丸治癲癇狂悖迷亂心神恍惚四體抽掣吐沫嚼舌龍膽丸方龍膽去土鉤藤升麻犀角鎊黃芩去黑心玄參白茯苓去黑皮防風去叉秦艽去苗土地骨皮銼大麻仁研膏同搗檳榔銼黃連去須炒大黃銼炒天竺黃別研琥珀別研甘草炙銼馬牙硝研麥門冬去心焙龍齒別研真珠末別研各一兩青黛二兩別研蜣螂三十五枚去頭足生用蚱蟬三十五枚去頭足生用金箔七十片與丹砂同研銀箔一百片與金箔丹砂同研鐵粉一兩一分別研虎睛一對酒蘸炙燥去皮搗牛黃研半兩丹砂三分別研入金銀箔同研上三十味除十二味別研外余藥搗羅與研者藥末合研勻煉蜜和丸如緑豆大每服十丸食後煎人參茯苓湯下日三服小兒三丸至五丸治風癲癇羚羊角丸方羚羊角鎊犀角鎊遠志去心焙人參山芋茯神去木各一兩半生乾地黃焙乾冷搗三兩防風去叉一兩三分金箔研銀箔研各一百片麥門冬去心焙鐵粉研天門冬去心焙各三兩水銀一分入金銀薄龍齒鐵粉五件同研水銀星子盡為度龍齒研二兩上一十五味先將一十味搗羅為末入別研者相拌令勻煉蜜和丸如緑豆大用桃柳枝湯下二十丸日二夜一或人參茯苓湯下亦得治風癲邪癇疾等金砂丸方金五兩細銼為屑為藥匱丹砂三兩將金屑置一定州細瓷合子內作一坑子置丹砂於金屑中心上下復襯以合蓋之用六一泥固濟以慢火養七日將出丹砂堀一地坑子同入淨濕土內單帛裹著在土中出火毒七日用上二味去金取砂出火毒後研取粉干控粟米飯爛研拌和得所丸如緑豆大每食後金銀湯下五丸中夜一服桃柳湯亦得其合子用金者為佳治風癲瘛瘲神魂不定茯神丸方茯神去木龍骨龍齒龍角三味去土一處研龍膽去苗土鐵精搗研入前三味同研蔓荊實揉去白皮各一兩乾薑炮人參遠志去心黃連去須炒各三分大黃銼醋炒一兩半芎藭白芷當歸切焙黃芩去黑心桂去粗皮各半兩上一十七味先將一十三味搗羅為末入別研者四味和令勻煉蜜丸如梧桐子大每日空心及日午食前用蜜湯下十五丸漸加至二十丸治風癲瘛瘲飛鴟頭丸方飛鴟頭三枚去毛喙炙焦搗羅為末鉛丹八兩研上二味和研勻煉蜜丸如緑豆大每服三丸至五丸酒下日三夜一治風癲失性欲死並理五驚諸癇雄黃丸方雄黃別研雌黃別研真珠末別研各一兩鉛丹點醋炒水銀各二兩先以蒸熟棗肉二兩研馬尾羅內擦過用柳木椎研令青色水銀星盡為度丹砂別研一兩上六味將五味各研如粉後合研用棗肉膏研不見水銀星為度更入刺棗入臼便搗千杵丸如大麻粒每服二丸至三丸人參茯苓湯下日二夜一食後服之治風癲瘛瘲口眼翻張口吐白沫或喉中作聲不知人麝香丸方麝香別研半兩虎睛一對炙令燥去外皮防風去叉一兩龍齒別研黃芩去黑心鐵粉研鬼臼各三分人參大黃銼醋炒各一兩牛黃別研一分秦艽去苗土雄黃別研各二兩獨活去蘆頭凝水石別研各一兩茯神去木石膏別研天雄炮裂去皮臍各一兩一分升麻三分遠志去心半兩白蘚皮三分露蜂房炙一分細辛去苗葉三分貫衆揉去土末鬼箭羽各十兩蛇蛻炙一分金箔銀箔各四十九片碎上二十七味先將一十八味搗羅為末後入別研九味和勻煉蜜為丸梧桐子大每服十五丸至二十丸空心日午臨夜溫酒下治風癲癇瘛瘲反張口出白沫或作諸聲不知人虎睛丸方虎睛一對酒浸炙令黃入藥搗白茯苓去黑皮龍齒別研各一兩一分防葵銼黃芩去黑心秦艽去苗土升麻防己銼各一兩獨活去蘆頭遠志去心鬼箭羽白蘚皮各三分鐵精搗研防風去叉各一兩鬼臼貫衆揉去土沫細辛去苗葉炒各三分大黃銼醋炒山茱萸人參各一兩白薇炒二兩天雄炮裂去皮臍銀薄別研各三分蛇蛻皮一尺炙凝水石別研石膏別研各一兩一分飛鴉頭三枚去喙毛炙麝香別研牛黃別研乾薑炮芎藭露蜂房炙各半兩上三十二味先將二十六味搗羅為末次將別研等藥入末中拌和令勻煉蜜丸梧桐子大每服二十丸加至三十丸溫酒下日二夜一如心肺覺風熱上衝用竹瀝飲下治卒發風癲狂癇陳蒲飲方三歲陳敗蒲一兩切細上一味以水二升煎至七合去滓溫飲之風癇論曰風癇病者由心氣不足胸中蓄熱而又風邪乘之病間作也其候多驚目瞳子大手足顫掉夢中叫呼身熱瘛瘲搖頭口噤多吐涎沫無所覺知是也然病發於陽者易瘥發於陰者難治故經曰臟病難治腑病易治又云大人曰癲小兒曰癇治風癇卒倒吐沫口噤手足瘛瘲麻黃飲方麻黃去根節煎掠去沫焙大黃銼炒牡蠣熬黃芩去黑心各二兩凝水石碎石膏碎赤芍藥滑石碎紫石英碎白石脂各四兩人參桂去粗皮各一兩蛇蛻炙半兩龍齒研三兩甘草炙一兩半上一十五味粗搗篩用絹囊盛懸於透空處每服五錢匕水一盞半煎至八分去滓食後良久服治風癇發動驚掣無時茯神湯方茯神去木龍齒研防風去叉杏仁去皮尖雙仁炒羌活去蘆頭芎藭人參麥門冬去心焙大黃銼炒鉤藤甘草炙銼各一兩上一十一味將一十味粗搗篩與龍齒拌勻每服六錢匕水二盞煎至一盞去滓空心溫服得利兩三行即止之治少小風癇至大不除發即百脈攣縮行步不正口面喎戾言語無度鉤藤丸方鉤藤鉛丹研茵芋葉石膏研杜蘅防葵炙秦艽去土甘草炙各一兩菖蒲九節者去節焙黃芩去黑心各一兩半松蘿炒蜣螂去翅足炒各半兩上一十二味將十味搗羅為末與別研二味和勻重羅煉蜜丸如小豆大每食後良久服五歲以下五丸十歲以下七丸至十丸十五歲以上及長年並十五丸以意加減用金銀湯下治風癇銅青丸方銅青與水銀同炒研不盡更入少許硫黃同炒研水銀會青研東門上雞頭亦謂之雞棲木錯末炒搗各半兩硫黃研三分犀角鎊卷柏去土各一分雄黃研一兩半石長生研白茯苓去黑皮白芷豬苓去黑皮白薇白蘞生用人參各一兩上一十五味將九味搗羅為末與別研六味和勻重羅用青牛膽相拌入銅器內先布大豆五升於甑中置藥器於上蒸之豆熟藥成丸如麻子大每服二十丸加至三十丸食後溫酒化下日再夜一治風癇因虛羸氣弱驚悸多魔心神不定茯苓飲方白茯苓去黑皮遠志去心各二兩半芍藥防風去叉各一兩半桂去粗皮二兩甘草炙一兩一分上六味粗搗篩每服六錢匕水二盞棗一枚劈生薑一棗大拍碎煎至一盞去滓入鐵粉一字攪勻食後服日二夜一治五種風癇丹砂丸方丹砂研膩粉研蛇蛻炙兔頭灰研銅青研硇砂水少許浸去石各一分古字錢三文燒赤投於硇砂水中淬至水盡搗白礬熬令汁枯研龍骨研老鴉灰研鹽花研鉛丹研各半兩虎睛炙搗一個虎牙炙搗一對發灰研半分金箔研銀箔研各五片上一十七味將四味搗羅為末與別研一十三味和勻再羅用豬血丸如櫻桃大每服二丸發時及晚間溫酒嚼下治風癇多驚手足顫掉口吐涎沫靈烏散方烏鴉一隻臘月取於藏瓶內盛以鹽泥固濟令乾用炭火煅存性候冷取出去肚腸研丹砂研一分細辛去苗葉二兩乾蠍全者十四枚炒上四味將二味搗末與別研二味同羅每服半錢匕午前溫酒調下治男子婦人暗風癇病安息香丸方安息香通明無砂石者鉛丹各一兩上二味為細末入白羊心中血研勻丸如梧桐子大每服十丸空心溫水下治風癇吐涎沫手足瘛瘲心神不定神應丸方狐肝二具烏鴉二隻去觜足腸肚共狐肝入瓶內燒作灰天麻白附子桑螵蛸炒蒺藜子炒去角乾蠍去土炒白殭蠶炒各二兩銀箔研金箔研各十五片麝香研犀角鎊天南星炮蟬蛻炒丹砂研