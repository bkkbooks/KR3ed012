芥子大每用一丸新汲水一滴化開點在兩鼻竅中㗜立效治首風頭痛不可忍黑散方天南星一枚重一兩銼皂莢二挺不蚛者寸截二味同燒令通赤放冷細研稱二兩芎藭末一分荊芥穗末半兩上四味合研令勻重羅每服一錢匕臘茶調服蜜水亦得不拘時治體虛陽經為風所乘上走頭面多汗惡風頭痛及新沐中風失音不語救生丸方天麻附子炮裂去皮臍烏頭炮裂去皮臍白附子炮天南星半夏湯洗七遍生薑汁製作餅焙乾犀角鎊屑以紙裹置懷中令暖方搗丹砂研芎藭藿香葉零陵香葉桂去粗皮木香蠍梢炒白殭蠶炒牛黃研各半兩上一十六味搗研為末煉蜜和劑旋丸如梧桐子大中風不語者每服五丸用漿水半盞取東南柳枝一條長七寸滴生油三滴在漿水中即攪四十九攪便灌之立瘥如小兒中風只用漿水吞下三丸如小豆大治頭風旋暈目昏眩急宣行陽經風寒化導胸膈痰飲療偏正頭痛解身體拘倦清爽神志通利關竅大芎丸方芎藭一斤大者天麻四兩上二味同搗羅為末煉蜜為丸如櫻桃大每服一丸茶酒嚼下荊芥湯嚼下亦得不計時候治首風頭項急痛腦重四肢拘急行步有妨牛黃丸方牛黃別研膩粉各半兩天麻酒炙桂去粗皮白附子炮乾蠍炒去土天南星炮石菖蒲附子炮裂去皮臍麻黃去根節湯煮掠去沫羌活去蘆頭芎藭乾薑炮當歸切焙獨活去蘆頭防風去叉各一兩麝香一分烏蛇酒浸濕紙裹煨取肉三兩上一十八味先將牛黃麝香同研後漸入諸藥末並膩粉一半煉蜜和丸如梧桐子大於一半膩粉內滾為衣每服五丸空心溫酒下治風虛腦重四肢拘急骨節疼痛天雄丸方天雄炮裂去皮臍黃耆銼熟乾地黃焙蒺藜子炒去角各三分白茯苓去黑皮牛膝酒浸切焙防風去叉石斛去根附子炮裂去皮臍獨活去蘆頭山芋白朮桂去粗皮各半兩上一十三味搗羅為末煉蜜和丸如梧桐子大每服十五丸加至二十丸薄荷酒或烏梅湯下治首風頭重嘔噦柴胡飲方柴胡去苗芎藭桑根白皮炙銼各一兩半白檳榔羚羊角鎊人參黃連去須天雄炮裂去皮臍各一兩旋覆花炒桂去粗皮枳殼去瓤麩炒各半兩上一十一味銼如麻豆每服三錢匕以水一盞生薑三片煎取七分去滓溫服治頭風日久諸治不瘥必效丸方巴豆去皮出油一分丹砂研乳香研細辛去苗葉當歸切焙檳榔各半兩丁香桂去粗皮龍腦研各一錢上九味搗研為末蒸餅為丸如梧桐子大每發動日用好茶清下一丸須是當門齒嚼冷茶下之十年只用一粒治首風頭面多汗惡風頭痛芎術湯方芎藭蒼朮米泔浸去粗皮切焙麻黃去根節芍藥甘草炙銼白芷石膏荊芥穗等分上八味粗搗篩每服三錢匕水一盞入薄荷五七葉同煎至七分去滓熱服治首風頭面多汗惡風頭痛芎藭散方芎藭石膏碎細辛去苗葉荊芥穗甘草炙銼草烏頭去皮臍同黑豆炒去豆各一兩上六味搗羅為散每服半錢匕臘茶清調下加至一錢匕空心食前服腦風論曰內經謂風氣循風府而上則為腦風夫風生高遠始自陽經然督脈陽維之會自風府而上至腦戶腦戶者督脈足太陽之會也又太陽之脈起於自內眥上額交巔上入絡腦今風邪客搏其經稽而不行則腦髓內弱故項背怯寒而腦戶多風冷也治腦風邪氣留客頭痛甚者神聖散方麻黃去根節細辛去苗葉乾蠍半生半炒藿香葉各半兩上四味搗羅為散薄荷酒或荊芥湯調下二錢匕日三服荊芥茶下亦得兼治婦人血風治腦風頭痛甚者必捷散方白花蛇酒浸三宿去皮骨炙二兩蒺藜子炒去角蔓荊實酒浸一宿焙各一兩白附子五枚酒浸一宿切作片子炒乾蓽澄茄二十枚上五味搗羅為散每服一錢匕用薄荷自然汁和溫酒半盞調下食後服治腦風邪氣留連頭痛不已石膏散方石膏火煅研天南星炮白殭蠶炒上三味等分搗研為散每服二錢匕蔥白二寸臘茶一錢同煎湯連蔥點頓服良久再服治腦風頭痛連眼目緊急肢體拘急疼痛清神散方芎藭二兩莎草根炒去毛三兩石膏研一兩龍腦研一分上四味搗研為散每服二錢匕用荊芥臘茶清調下食後服治腦風頭痛難任時瘥時發石膏菊花散方石膏研飛過一兩天南星炮一兩半白殭蠶一兩炒甘菊花一兩甘草炙銼三分上五味搗羅為散每服二錢匕臘茶調下食後服治風邪客於腦頭痛至甚太一麝香湯方草烏頭生用一兩細辛去苗葉二兩新茶芽二兩上三味㕮咀如麻豆每服三錢匕水一盞半入真麝香一捻同煎八分去滓熱服治腦風頭痛時作及偏頭痛地骨皮散方地骨皮一分荊芥穗二兩石膏研飛過二兩白花蛇酒浸炙去皮骨天南星漿水煮軟切焙各一兩上五味搗研為散每服一錢匕入臘茶一錢湯點服食後臨臥治腦風頭痛久不瘥桂心羌活丸方桂去粗皮白茯苓去黑皮麻黃去根節白殭蠶炒防風去叉枳殼去瓤麩炒烏蛇酒浸去皮骨炙苦參酸棗仁炒烏頭炮裂去皮臍犀角鎊羌活去蘆頭獨活去蘆頭龍骨郁李仁去皮研人參等分上一十六味搗羅為末煉蜜和丸梧桐子大每服十丸熱酒下治腦風頭痛吹鼻穀精草散方穀精草末銅緑研各一錢硝石半錢研上三味搗研和勻每用一字吹入鼻內或偏頭疼隨病左右吹鼻中治風邪循風府上至腦戶為腦風頭痛白附子散方白附子生用白朮天麻白芷各一兩防風去叉蘆薈各半兩丹砂研一分龍腦研少許麝香研少許上九味先將白附子等搗羅為末次將丹砂等研細同前件藥末拌勻瓷器中盛早晚每服一錢匕用薄荷汁少許溫酒一盞調下治腦風鼻息不通不聞香臭或鼻流清涕多嚏肩項拘急頭目昏痛風府怯寒通關散方原蠶蛾瓦上炒令黃白附子炮苦參益智去皮蒺藜子炒去角干薄荷各一兩上六味搗羅為散每服二錢匕溫酒調下日三服治男子腦風頭腦俱痛及中風語澀手足無力烏金煎方黑豆五合淨淘羌活去蘆頭獨活去蘆頭荊芥去梗各一兩上四味粗搗篩以水一斗煎至一升更入無灰酒半升和令勻再煎令沸去滓盛於瓷器中每服一合溫酒及薄荷茶調下不計時服治腦風邪氣留客頭痛久不已香芎散方芎藭荊芥穗白芷槐蛾莎草根炒去毛甘草炙銼上六味等分搗羅為散茶酒調下一錢匕日三服治腦風頭痛至甚芎香散方芎藭藿香葉黃耆銼焙天麻各一兩槐花炒二兩蔓荊實白芷各半兩木香甘草炙銼各一分上九味搗羅為細散每服二錢匕荊芥茶或溫酒調下治腦風頭痛吹鼻點頭散方細辛去苗葉高良薑瓜蒂各一分硝石半兩上四味搗研為細散每用新水滿含一口㗜藥半字入鼻中良久即定治腦風頭痛吹鼻桂辛散方桂去粗皮蓽茇細辛去苗葉上三味等分搗羅為散每用一字先滿含溫水一口即㗜藥於鼻中偏頭痛隨痛左右用之治腦風頭痛不可忍遠志散方遠志去心不拘多少上一味搗羅為細散每用半字先含水滿口即㗜藥入鼻中仍揉痛處治頭風腫癢腦熱生瘡目暗赤痛摩頂立成膏方青蓮花研二朵青黛研四兩龍腦研一兩半石膏研一兩麝香研一兩半芒硝研硝石研各二兩凝水石研朴硝研各一兩桑寄生五兩蓮子草三兩白楊木皮銼二兩上一十二味以水三升先煎桑寄生蓮子草白楊皮濾去滓再煎下朴硝凝水石硝石減火微煎候凝取出曝乾細研入諸藥等再研令勻以密器盛每用二錢以生麻油研熟下清水五匙更研候如粥用少許於前頂連囟百會兩鬢處塗摩數百遍能引散熱毒氣一方去青蓮花用鹽緑治風痰上壅頭昏時痛鼻出清涕語聲不出咽喉不利咳嗽涎喘頭目熻赤肌肉蠕動癢如蟲走清神志明耳目生犀香芎丸方生犀半兩鎊荊芥穗十五兩細辛去土葉十兩白芷十兩香附子二十兩炒龍腦薄荷葉五兩甘草炙五兩芎藭半兩上八味同搗羅為末水煮麵糊為丸如梧桐子大每服三十丸生薑湯下不計時候治腦風氣鼓或膈痰氣逆上衝於頭令頭旋暈羌活丸方羌活去蘆頭米泔浸一宿切焙二兩半白蒺藜子炒去角芎藭乾雞蘇各二兩白殭蠶去頭觜炒一兩上五味搗羅為細末煉蜜和丸如彈子大荊芥茶嚼下一粒不拘時候入龍腦麝香尤佳治腦風鼻息不通清涕流出及諸風疾何首烏丸方何首烏去黑皮三兩芍藥一兩桂去粗皮烏頭炮裂去皮臍芎藭甘草炙銼藁本去苗土甘松羌活去蘆頭天麻陳橘皮湯浸去白焙縮砂蜜去皮各二兩墨煅存性一分上一十三味搗羅為末煉蜜和丸如櫻桃大每服一丸薄荷蔥酒嚼下治腦風鼻息不通時出清涕項背拘急久成眩暈芎連散方芎藭連翹羌活去蘆頭柴胡去苗防風去叉黃芩去黑心木賊去節荊芥穗甘菊花旋覆花各半兩地骨皮一兩甘草炙銼石膏搗研各二兩上一十三味搗羅為散每服二錢匕淡竹葉湯調下食後臨臥日三服治腦風頭旋噁心昏悶發歇不定摩頂油方蓮子草五六月收梔子葉生麥門冬生地黃吳藍五味並搗取汁各三升連翹秦艽去苗土甘草銼防風去叉細辛去苗葉地骨皮大青紫草茸紫蘇子葉各一兩上一十四味除前五味汁外粗搗篩用絹袋盛同五味汁煎減半去滓澄清後入生麻油一升和勻重煎又減半收入瓶內二七日細研馬牙硝四兩攪勻每用量多少摩頂上治腦風鼻息不通時流清涕多嚏不已白附子丸方白附子三錢龍腦研一錢麝香研一錢蠍梢微炒七枚天南星炮一兩白殭蠶微炒一錢凝水石煅過研一兩半上七味除凝水石外搗研為末再同和勻入白蜜不拘多少研令如稀餳狀入白麵糊半匙頭許然後將凝水石末旋入以干可和丸如雞頭大於凝水石末中留少許為衣慢火焙乾每服一丸細嚼薄荷熟水下茶清亦得食後服治腦風鼻息不通或流清涕多嚏芎藭湯方芎藭二兩細辛去苗葉黃芩去黑心各一兩荊芥穗二兩甘草炙銼半兩上五味粗搗篩每服三錢匕水一盞入薄荷七葉同煎至七分去滓溫服治腦壅頭痛吹鼻散方蘆薈研龍腦研瓜蒂搗硝石研上四味等分為末每用一豆許吹之神驗治腦風頭痛鼻息不通或流清涕多嚏不已勝金散方荊芥穗薄荷葉各四兩木賊去節二兩蛇蛻二條微炙上四味搗羅為散每服二錢匕茶清調下食後日三服
