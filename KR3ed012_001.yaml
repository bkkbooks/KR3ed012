初凡六十日有奇主位少商金客氣少陽火中見水運畏火臨暑反至陽乃化萬物乃生乃長榮民乃康其病溫歲水制之其病乃微宜治少陽之客以咸補之以甘瀉之以咸軟之歲穀食白間穀食豆則火不為邪終之氣自小雪日午正至大寒日辰正凡六十日有奇主位太羽水客氣陽明金中間水運水當其位與金相和燥令行餘火內格腫於上咳喘甚則血溢寒氣數舉則霧霿翳病生皮腠內舍於脅下連少腹而作寒中地將易也宜治陽明之客以酸補之以辛瀉之以苦泄之歲穀食白間穀食黍則燥不為邪是歲也水氣之平由於歲會為行令邪或中之民有持久之病經所謂中行令者其病徐而持也丁丑歲圖太陰濕土司天太陽寒水在泉中見少角木運歲木不及氣化運行後天委和之紀曰上官與正宮同諸同正歲氣化運行同天此言天氣平也天地之氣上見太陰左間少陽右間少陰故地氣上騰而其政肅下見太陽左間厥陰右間陽明故天氣下降而其令寂陰專其政陽氣退闢大風時起原野昏霿白埃四起云奔南極寒雨數至物成於差夏濕寒合德上應鎮星辰星其谷黅玄故陰凝於上寒積於下寒水勝火則為冰雹陽光不治殺氣乃行民病寒濕腹滿身䐜膹胕腫痞逆寒厥拘急清化熱化勝復同邪氣化度也雨化五風化三寒化一正化度也歲物所宜則倮蟲靜鱗蟲育地氣所制則羽蟲耗熱毒不生故有餘宜高不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之間谷命太微太商者然土為天氣水為地氣土勝水天氣盈地氣虛宜取化源以平土氣益其歲氣無使邪勝食黅玄之谷以全其真食間氣之谷以保其精以苦燥之溫之甚則發之泄之不發不泄則濕氣外溢肉潰皮拆而水血交流必贊其陽火令御甚寒從氣之異同多少其判也歲半之前天氣太陰主之太陰所至其令濕若濕淫所勝則沉陰且布雨變枯槁民病胕腫骨痛陰痹陰痹者按之不得腰脊頭項痛時眩大便難陰氣不用飢不欲食咳唾則有血心如懸病本於腎診在足太溪之脈法宜平以苦溫佐以甘辛以汗為故而止所謂丁丑歲其化上苦溫也歲半之後地氣太陽主之太陽所至其令寒若寒淫於內則凝肅慘栗民病少腹控睪引腰脊上衝心痛血見嗌痛頷腫法宜治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之歲運之化木不及是謂勝生生氣不政化氣乃揚長氣自平收令乃早涼雨時降風雲並興草木晚榮蒼干凋落物秀而實膚肉內充其氣斂其用聚其動緛戾拘緩其發驚駭其化兼所不勝春有鳴條律暢之化則秋有霧露清涼之政春有慘淒殘賊之勝則夏有炎暑燔爍之復其眚東其病內舍胠脅外在關節復則炎暑流火民病寒熱瘡瘍痱疹癰痤法宜調以辛溫初之氣自丙子年大寒日巳初至是歲春分日卯初六十日八十七刻半主位少角木客氣厥陰木中見木運歲木當位地氣遷寒乃去春氣正風乃來生布萬物以榮民氣條舒風濕相搏雨乃後民病血溢筋絡拘強關節不利身重筋痿宜調厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜食黅間谷宜食稻則風不為邪是氣也司氣以溫用溫無犯二之氣自春分日卯正至小滿日醜正凡六十日有奇主位太徵火客氣少陰火中見木運火氣當位大火正物承化民乃和其病溫厲盛行遠近咸若濕蒸相搏雨乃時降宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜食黅間谷宜食豆則熱不為邪三之氣自小滿日寅初至大暑日子初凡六十日有奇主位太徵火客氣太陰土中見木運木生火火生土其化順天政布濕氣降地氣騰雨乃時降寒乃隨之感於寒濕則民病身重胕腫胸腹滿宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜食黅間谷宜食麻雖有濕邪不能為害四之氣自大暑日子正至秋分日戌正凡六十日有奇主位少宮土客氣少陽火中見木運地氣交司畏火臨溽蒸化地氣騰天氣否隔寒風曉暮蒸熱相搏草木凝煙濕化不流則白露陰布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫宜治少陽之客以咸補之以甘瀉之以咸軟之歲谷宜食玄間谷宜食豆雖有火邪不能為害五之氣自秋分日亥初至小雪日酉初凡六十日有奇主位太商金客氣陽明金中見木運金氣得位慘令已行寒露下霜乃早降草木黃落寒氣及體君子周密民病皮腠宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜食玄間谷宜食黍則燥不為邪終之氣自小雪日酉正至大寒日未正凡六十日有奇主位少羽水客氣太陽水中見木運水當其位寒大舉濕大化霜乃積陰乃凝水堅冰陽光不治感於寒則病人關節禁固腰脽痛寒濕持於氣交而為疾也宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜食玄間谷宜食稷則寒不為邪此六氣之常也歲氣之交濕勝則有厥陰之復寒勝則有太陰之復其治各依其勝復之法戊寅歲圖少陽相火司天厥陰風木在泉中見太徵火運歲火太過氣化運行先天太徵上臨少陽是謂天符之年平火之歲命曰升明之紀正陽而治德施周普五化均衡其氣高其性速其用燔灼其化蕃茂其政明曜其候炎暑其令熱其類火其應夏其穀麥其果杏其實絡其蟲羽其畜馬其色赤其味苦其物脈其音徵其數七其在人也其髒心其主舌其養血其病瞤瘛此歲運之化也天地之氣上見少陽左間陽明右間太陰故天氣正而其政嚴下見厥陰左間少陰右間太陽故地氣擾而其令撓風乃暴舉木偃沙飛炎火乃流陰行陽化雨乃時應火木同德上應熒惑歲星其谷丹蒼歲氣之化火化七風化三正化度也羽蟲靜毛蟲育歲物所宜也倮蟲耗清毒不生地氣制之也歲半之前天氣少陽主之少陽所至為炎暑其令暄者少陽之政也歲半之後地氣厥陰主之厥陰所至為風府風從火化者厥陰之令也風熱參布雲物沸騰太陰橫流寒乃時至涼雨並起民病寒中外發瘡瘍內為泄滿聖人遇之和而不爭往復之作民病寒熱瘧泄聾瞑嘔吐上怫腫色變是歲火為天氣木為地氣風火相值其氣專其化淳又遇火運統之運與天符火化升明先取化源抑其運火贊其金氣則暴過不生苛疾不起歲宜以鹹寒調上以辛涼調下以甘和調中滲之泄之漬之發之運同風熱宜多寒化治之常也初之氣自丁丑年大寒日申初至是歲春分日午初六十日八十七刻半主位少角木客氣少陰火中見火運氣與運同地氣遷風勝乃搖寒乃去候乃大溫草木早榮寒來不殺溫病乃起其病氣拂於上血溢目赤咳逆頭痛血傷脅滿膚腠中瘡宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆二之氣自春分日午正至小滿日辰正凡六十日有奇主位太徵火客氣太陰土中見火運濕土之客火反郁白埃四起云趨雨府風不勝濕雨乃零民乃康其病熱鬱於上咳逆嘔吐瘡發於中胸嗌不利頭痛身熱昏憒膿瘡宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜丹間谷宜麻三之氣自小滿日巳初至大暑日卯初凡六十日有奇主位太徵火客氣少陽火中見火運歲火當位上為天符下為司氣天政布炎暑至少陽臨上雨乃涯民病熱中聾瞑血溢膿瘡咳嘔鼽衄渴嚏缺喉痹目赤善暴死是歲火氣平若有水氣承之即不至橫暴經曰相火之下水氣承之亢則害承乃制是也宜調少陽之客以咸補之以甘瀉之以咸軟之歲谷宜丹間谷宜豆是氣也司氣以熱用熱遠熱四之氣自大暑日卯正至秋分日醜正凡六十日有奇主位少宮土客氣陽明金中見火運金土相和涼乃至炎暑間化白露降民氣和平其病滿身重宜調陽明之客以酸補之以辛瀉之以苦泄之歲谷宜蒼間谷宜黍五之氣自秋分日寅初至小雪日子初凡六十日有奇主位太商金客氣太陽水中見火運火本勝金水反制之寒氣為客陽乃去寒乃來雨乃降氣門乃閉剛木早凋民避寒邪君子周密宜調太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜蒼間谷宜稷終之氣自小雪日子正至大寒日戌正凡六十日有奇主位少羽水客氣厥陰木中見火運火木同德而行順化地氣正風乃至萬物反生霿霧以行其病關閉不禁心痛陽氣不藏而咳宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜蒼間谷宜稻是歲天符為執法火氣自平若有邪氣則中執法民有急卒之病經所謂中執法者其病速而危也己卯歲圖陽明燥金司天少陰君火在泉中見少宮土運歲土不及氣化運行後天歲之氣化上見陽明左間太陽右間少陽故天氣急而其政切下見少陰左間太陰右間厥陰故地氣明而其令暴陽專其令炎暑盛行物燥以堅淳風乃治風燥橫運流於氣交多陽少陰云趨雨府濕化乃敷燥極而澤其為氣也清熱之氣持於氣交風化清化勝復同是謂邪氣化度也清化九雨化五熱化七是謂正化度也金火合德其在天也上應太白熒惑其在物也歲谷白丹間谷命太徵者歲物所宜則羽蟲育地氣所制則介蟲耗寒毒不生其耗白甲品羽蟄蟲乃見流水不冰民病咳嗌塞寒熱發暴振栗癃閟清先而徑毛蟲乃死熱後而暴介蟲乃殃然金為天氣火為地氣火能勝金土運間之其邪乃微天氣微虛宜資其化源以助金氣兼安其運土無使受邪食白丹之谷以安其氣食間氣之谷以去其邪歲宜以咸以苦以辛汗之清之散之運同清氣宜多地化治之常也歲半之前天氣陽明主之燥淫所勝則木乃晚榮草乃晚生筋骨內變民病左胠脅痛寒清於中感而瘧大涼革候咳腹中鳴注泄鶩溏名木斂生菀於下草焦上首心脅暴痛不可反側嗌乾面塵腰痛目眛眥瘍瘡痤癰病本於肝診在足太衝之脈法宜平以苦溫佐以酸辛以苦下之歲半之後地氣少陰主之熱淫於內則焰浮川澤陰處反明民病腹中常鳴氣上衝胸喘不能久立寒熱皮膚痛目瞑齒痛䪼腫惡寒發熱如瘧少腹中痛腹大法宜治以鹹寒佐以甘苦以酸收之以苦發之歲運之化土不及紀曰卑監是謂減化化氣不令生政獨彰長氣整雨乃愆收氣平風寒並興草木榮美秀而不實成而秕也其氣散其用靜定其動瘍湧分潰癰腫其發濡滯其化兼所不勝四維有埃云潤澤之化則春有鳴條鼓拆之政若四維發振拉飄騰之變則秋有肅殺霖霪之復其眚四維其臟脾其病內舍心腹外在肌肉四肢復則收政嚴峻名木蒼凋胸脅暴痛下引少腹善太息氣客於脾食少失味治宜以甘和調中初之氣自戊寅年大寒日亥初至是歲春分日酉初六十日八十七刻半主位少角木客氣太陰土中見土運氣與運同風不勝濕地氣遷陰始凝氣始肅水乃冰寒雨化其病中熱脹面目浮腫善眠鼽衄嚏缺嘔小便黃赤甚則淋宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜白間谷宜麻雖有濕邪不能為害是氣也司氣以涼用涼無犯二之氣自春化日酉正至小滿日未正凡六十日有奇主位太徵火客氣少陽火中見土運二火同治陽乃布民乃舒物乃生榮厲大至民善暴死宜治少陽之客以咸補之以甘瀉之以咸軟之歲谷宜白間谷宜豆雖有火邪不能為害三之氣自小滿日申初至大暑日午初凡六十日有奇主位太徵火客氣陽明金中見土運火生土土生金下生上天政布涼乃行燥熱交合燥極而澤民病寒熱宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜白間谷宜黍雖有燥邪不能為害四之氣自大暑日午正至秋分日辰正凡六十日有奇主位少宮土客氣太陽水中見土運運土得位太陽居之寒雨降病暴僕振栗譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿血便宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜丹間谷宜稷雖有寒邪不能為害五之氣自秋分日巳初至小雪日卯初凡六十日有奇主位太商金客氣厥陰木中見土運客氣