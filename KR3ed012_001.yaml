body:
  text: 卷第一運氣甲子歲圖少陰君火司天陽明燥金在泉中見太宮土運歲土太過氣化運行先天天地之氣上見少陰左間太陰右間厥陰故天政所布其氣明下見陽明左間太陽右間少陽故地氣肅而其令切交司之氣寒交暑天地之氣熱加燥云馳雨府濕化乃行時雨乃降金火合德上應熒惑太白其谷丹白水火寒熱持於氣交而為病始熱病生於上清病生於下寒熱互作而爭於中民病咳喘血溢血泄鼽嚏目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上是乃歲化之常須候其氣之至與不至然後可名其病是歲火為天氣金為地氣火能勝金天氣盈地氣虛然中見土運天氣生運運生地氣三氣相得地氣雖虛邪勝亦微天氣既盈化源為實當於年前大寒初先取化源使之適平取化源者平火氣也歲宜食白丹之谷以全真氣食間氣之谷以闢虛邪咸以軟之而調其上甚則以苦發之以酸收之而安其下甚則以苦泄之運同地氣當以溫熱化歲半之前天氣少陰主之少陰之化本熱而標陰當是時本標之化應寒熱相半無或偏勝者天紋之平也或熱淫所勝即怫熱至火行其政民病胸中煩熱嗌乾右胠滿皮膚痛寒熱咳喘大雨且至唾血血泄鼽衄嚏嘔溺色變甚則瘡瘍胕腫肩背臂臑及缺盆中痛心痛肺䐜腹大滿膨膨而喘咳病本於肺診其尺澤脈絶者死不治其法平以鹹寒佐以苦甘以酸收之歲半之後地氣陽明主之其化不從標本而從乎太陰之中氣當其時燥濕兼行而無偏勝者陽明之化也或燥淫所勝則霿霧清瞑民病喜嘔嘔有苦善太息心脅痛不能反側甚則嗌乾面塵身無膏澤足外反熱其法治以苦溫佐以甘辛以苦下之運土太過是謂敦阜之紀雨濕流行腎水受邪民病腹痛清厥意不樂體重煩冤甚則肌肉萎足萎不收行善瘛腳下痛飲發中滿食減四肢不舉變生得位藏氣伏化氣獨治之泉湧河衍涸澤生魚風雨大至土潰鱗見於陸病腹滿溏泄腸鳴反下甚而太溪絶者死不治其治宜以苦熱所謂歲氣之藥食宜也初之氣始於癸亥歲十二月中氣大寒日寅初終於是年二月中氣春分日子初凡六十日八十七刻半主位太角木客氣太陽水中見太宮統之風寒濕三氣奉少陰之政而行春令地氣遷燥將去寒乃始蟄復藏水乃冰霜復降風乃至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之開發腠理致津液通氣也食丹谷以全真氣食稷以闢虛邪雖有寒邪不能為害二之氣自春分日子正至小滿日戌正凡六十日有奇主位少徵火客氣厥陰木火木同德中見土運以奉少陰行舒榮之化時令至此陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目瞑目赤氣鬱於上而熱宜治厥陰之客以辛補之以酸瀉之以甘緩之食丹谷以全真氣食稻以闢虛邪雖有風邪不能為害三之氣自小滿日亥初至大暑日酉初凡六十日有奇主位少徵火客氣少陰火中見土運天政之所布也時令至此大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤宜治少陰之客以咸補之以甘瀉之以酸收之食丹谷以全真氣食豆以闢虛邪雖有熱邪不能為害四之氣自大暑日酉正至秋分日未正凡六十日有奇主位太宮土客氣太陰土運與氣同名為司氣溽暑至大雨時行寒熱互作民病寒熱嗌乾黃疸鼽衄飲發宜治太陰之客以甘補之以苦瀉之以甘緩之食白谷以全真氣食麻以闢虛邪雖有虛邪不能為害五之氣自秋分日申初至小雪日午初六十日有奇主位少商金客氣少陽火中見土運客火用事畏火臨暑反至陽乃化物乃生榮民乃康其病溫宜治少陽之客以咸補之以甘瀉之以咸軟之食白谷以全真氣食豆以闢虛邪雖有火邪不能為害終之氣自小雪日午正至大寒日辰正六十日有奇主位太羽水客氣陽明金中見土運土能生金金能生水三氣相得而行順化燥令行餘火內格民病腫於上咳喘甚則血溢寒氣數舉則霜霧翳病生皮腠內舍於脅下連少腹而作寒中宜治陽明之客以酸補之以辛瀉之以苦泄之食白谷以全真氣食黍以闢虛邪雖有燥邪不能為害然初氣終三氣天氣主之勝之常也四氣盡終氣地氣主之復之常也若歲半之前司天少陰之氣勝者必有太陽之復若在泉陽明之氣勝者必有少陽之復其復皆在歲半之後觀其氣勝之早晚以驗復氣之遲速各以勝復之法治之有勝則復無勝則已乙丑歲圖太陰濕土司天太陽寒水在泉中見少商金運歲運不及氣化運行後天上見太陰左間少陽右間少陰故地氣上騰陰專其政而其政肅下見太陽左間厥陰右間陽明故天氣下降陽氣退闢而其令寂大風時起原野昏霿白埃四起云奔南極寒雨數至濕寒合德黃黑埃昏流行氣交上應鎮星辰星其谷黅玄間谷命太角者物成於差夏有餘宜高不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之故陰凝於上寒積於下寒水勝火則為冰雹陽光不治殺氣乃行民病寒濕腹滿身䐜憤胕腫痞逆寒厥拘急是歲土為天氣水為地氣土能勝水天氣盈地氣虛然中見金運天氣生運運生地氣三氣相得而行順化邪氣亦微司天之氣為有餘天氣之盈當取化源之實者平土氣也歲宜食黅玄之谷以全其真食間氣之谷以保其精以苦熱治其上以甘熱治其下以酸和調其中所以燥之溫之甚則發之泄之不發不泄則濕氣外溢肉潰皮坼而水血交流必贊其陽火令御甚寒少商之運與寒化同宜以熱化此藥食宜也然太陰司天之氣本標既同其化從本其氣常主歲半之前當其時雨以時至者天政之和而為雨化若濕淫所勝即沉陰且布雨變枯槁民病胕腫骨痛陰痹陰痹者按之不得腰脊頭項痛時眩大便難陰氣不用飢不欲食咳唾則有血心如懸病本於腎診其足太溪脈絶者死不治其法平以苦熱佐以酸辛以苦燥之以淡泄之歲半之後地氣太陽主之其化從本從標當是之時寒溫適中者本標之化皆應也若寒淫於內即凝肅慘栗民病少腹控睪引腰脊上衝心痛血見嗌痛頷腫其法治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之金運不及是謂從革之紀其運涼熱寒夏有光顯鬱蒸之令則冬有嚴凝整肅之應若夏有炎爍燔燎之變則秋有冰雹霜雪之復火氣勝則炎火乃行民病肩背瞀重鼽嚏血便注下收氣乃後寒氣復則寒雨暴至民病陰厥且格陽反上行頭腦戶痛延及囟頂發熱口瘡甚則心痛初之氣始於甲子年大寒日巳初終於乙丑年春分日卯初凡六十日八十七刻半主位太角木客氣厥陰木中見金運風清同化上奉太陰而行春令時令至此地氣遷寒乃去春氣正風乃來生布萬物以榮民氣條舒風濕相薄雨乃後民病血溢筋絡拘強關節不利身重筋痿宜治厥陰之客以辛補之以酸瀉之以甘緩之食黅谷以全真氣食稻以保其精雖有風化莫能為邪二之氣自春分日卯正至小滿日醜正凡六十日有奇主位少徵火客氣少陰火中見金運歲金不及與少徵同又遇火當其位君火之氣務以德化故大火正物承化民乃和其病溫厲大至遠近咸若濕蒸相薄雨乃時降法當治少陰之客以咸補之以甘瀉之以酸收之食黅谷以全其真食豆以保其精雖有火化莫能為邪三之氣自小滿日寅初至大暑日子初凡六十日有奇主位少徵火客氣太陰土中見金運天政布雨乃時降寒乃隨之民病身重胕腫胸腹滿宜治太陰之客以甘補之以苦瀉之以甘緩之食黅谷以全其真食麻以保其精雖有濕邪莫能為害四之氣自大暑日子正至秋分日戌正凡六十日有奇主位太宮土客氣少陽火中見金運地氣始騰天氣否隔寒風曉暮蒸熱相薄草木凝煙民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫宜治少陽之客以咸補之以甘瀉之以咸軟之食玄谷以全其真食豆以保其精雖有火邪莫能為害五之氣自秋分日亥初至小雪日酉初凡六十日有奇主位少商金客氣陽明金中見金運金居金位與歲運同歲之司氣也是為素化金氣至此秋氣治正慘令已行寒露下霜乃早降草木黃落寒氣及體民病皮腠君子所居宜以周密其法宜治陽明之客以酸補之以辛瀉之以苦泄之食玄谷以全其真食黍以保其精雖有司氣之涼莫能為邪是氣也藥食無犯司氣之涼終之氣自小雪日酉正至大寒日未正凡六十日有奇主位太羽水客氣太陽水中見金運水居水位與金相得以行順化冬令乃正故寒大舉濕大化霜乃積陰乃凝水堅冰陽光不治民感於寒則病關節禁固腰脽痛寒濕持於氣交而為疾也其法宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之食玄谷以全其真食稷以保其精雖有寒化莫能為邪是歲氣之勝復各候其至若太陰氣勝厥陰必復之太陽氣勝太陰必復之其勝常在歲半之前其復常在歲半之後有勝則復無勝則否丙寅歲圖少陽相火司天厥陰風木在泉中見太羽水運歲水太過氣化運行先天相火在上左間陽明右間太陰故天氣正而其政嚴厥陰在下左間少陰右間太陽故地氣擾而其令擾風乃暴舉木偃沙飛炎火乃流陰行陽化雨乃時應火木同德上應熒惑歲星其谷丹蒼風熱參布雲物沸騰太陰橫流寒乃時至涼雨並起民病寒中外發瘡瘍內為泄滿聖人遇之和而不爭往復之作民病寒熱瘧泄聾瞑嘔吐上怫腫色變是歲陽為天氣陰為地氣天氣盈地氣虛當取火之化源然水運在中火氣自抑不必取也唯宜抑其運水則暴過不生苛疾不起歲宜以鹹寒調上以辛溫調下以鹹溫調中滲之泄之漬之發之觀氣寒溫以調其過運異風熱少用寒化食宜同法歲半之前相火主之相火之氣其化從本若火淫所勝則溫氣流行金政不平民病頭痛發熱惡寒而瘧熱上皮膚痛色變黃赤傳而為水身面胕腫腹滿仰息泄注赤白瘡瘍咳唾血煩心胸中熱甚則鼽衄病本於肺診在手天府之脈其法平以鹹冷佐以苦甘以酸收之以苦發之以酸復之歲半之後厥陰主之厥陰之氣不從標本而從乎少陽之中氣當其時風從火化二氣得中其化和也若風淫於內地氣不明平野昧草乃早秀民病灑灑振寒善伸數缺心痛肢滿兩脅裡急飲食不下膈咽不通食則嘔腹脹善噫得後與氣則快然如衰身體皆重其法宜治以辛涼佐以苦以甘緩之以辛散之氣交之中水運統之太過之水紀日流衍寒氣流行邪害心火民病身熱煩心躁悸陰厥上下中寒譫妄心痛寒氣早至上應辰星甚則腹大脛腫喘咳寢汗出憎風大雨至埃霧朦郁齊土化也診在手神門之脈其法調以鹹溫初之氣自乙丑年大寒日申初至是歲春分日午初凡六十日八十七刻半主位太角木客氣少陰火中見水運木火相加以奉司天少陽而行春令地氣遷風勝乃搖寒乃去候乃大溫草木早榮寒來不殺溫病乃起其病氣怫於上血溢目赤咳逆頭痛血崩脅滿膚腠中瘡其法宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆二之氣自春分日午正至小滿日辰正凡六十日有奇主位少徵火客氣太陰土中見水運火土相加上見少陽火反郁白埃四起云趨雨府風不勝濕雨乃零民乃康其病熱鬱於上咳逆嘔吐瘡發於中胸嗌不利頭痛身熱昏憒膿瘡其法宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜丹間谷宜麻三之氣自小滿日巳初至大暑日卯初凡六十日有奇主位少徵火客氣少陽火中見水運火居火位夏氣乃正天政布炎暑至少陽臨上雨乃涯民病熱中聾瞑血溢膿瘡咳嘔鼽衄嚏缺喉痹目赤善暴死其法宜治少陽之客以咸補之以甘瀉之以咸軟之歲谷宜丹間谷宜豆四之氣自大暑日卯正至秋分日醜正凡六十日有奇主位太宮土客氣陽明金中見水運土金水相得以行秋令秋氣正涼乃至炎暑間化白露降民氣和平其病滿身重宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜蒼間谷宜黍五之氣自秋分日寅初至小雪日子初凡六十日有奇主位少商金客氣太陽水中見水運水金相和又氣與運同歲之司氣是為元化時令至此陽乃去寒乃來雨乃降氣門乃閉剛木早雕民避寒邪君子周密其法宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜蒼間谷宜稷是氣也司氣既寒慎無犯寒所謂用寒遠寒也終之氣自小雪日子正至大寒日戌正凡六十日有奇主位太羽水客氣厥陰木中見水運水當其位與木相得以行順化地氣正風乃至萬物反生霿霧以行其病關閉不禁心痛陽氣不藏而咳其法宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜蒼間谷宜稻此六氣之大常也歲氣火木同德其氣專其化淳勝氣自微不必紀其復丁卯歲圖陽明燥金司天少陰君火在泉中見少角木運歲運不及氣化運行後天木運臨卯是謂歲會氣之平也平氣之歲氣化運行同天命曰敷和之紀木德周行陽舒陰布五化宣平其氣端其性隨其用曲直其化生榮其政發散其候溫和其令風其類草木其應春其谷麻其果李其實核其蟲毛其畜犬其色蒼其味酸其音角其數八其物中堅其在人也其藏肝其主目其養筋其病裡急支滿此歲運之化也天地之氣上見陽明左間太陽右間少陽故天氣急而其政切下見少陰左間太陰右間厥陰故地氣明而其令暴陽專其令炎暑盛行物燥以堅淳風乃治風燥橫運流於氣交多陽少陰云趨雨府濕化乃敷燥極而澤清先而徑毛蟲乃死熱後而暴介蟲乃殃金火合德上應太白熒惑其谷白丹間谷命太徵者其耗白甲品羽蟄蟲出見流水不冰清熱之氣持於氣交民病咳嗌塞寒熱發暴振栗癃閉然陽明燥金在上少陰君火在下火能勝金天氣虛地氣盈天氣不足當資化源以助金氣運木既平天氣上商與正商同不必資也歲宜食白丹之谷以安其氣食間氣之谷以去其邪以苦辛溫調上以鹹寒調下以辛和調中汗之清之散之運同熱氣宜多天化初之氣自丙寅歲大寒日亥初終於是年春分日酉初凡六十日八十七刻半主位少角木客氣太陰土中見木運風濕相遇上應司天之陽明以行春令地氣遷陰始凝氣始肅水乃冰寒雨化民病中熱脹面目浮腫善眠鼽衄嚏缺嘔小便黃赤甚則淋然是歲木運統之又臨木位風木得位其氣和平濕化乃微其病亦少宜調太陰之客以甘補之以苦瀉之以甘緩之食白谷以安其氣食麻以去其邪雖有濕化不能為邪二之氣自春分日酉正至小滿日未正凡六十日有奇主位太徵火客氣少陽火中見木運木火相得上應陽明陽乃布民乃舒物乃生榮厲大至民善暴死是歲天氣歲運皆平厲疾自微宜調少陽之客以咸補之以甘瀉之以咸耎之食白谷以安其氣食豆以去其邪雖有火化不能為邪三之氣自小滿日申初至大暑日午初凡六十日有奇主位太徵火客氣陽明金中見木運天政布涼乃行燥熱交合燥極而澤民病寒熱宜調陽明之客以酸補之以辛瀉之以苦泄之食白谷以安其氣食黍以去其邪雖有燥化不能為邪四之氣自大暑日午正至秋分日辰正凡六十日有奇主位少宮土客氣太陽水中見木運寒雨降民病暴僕振栗譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿血便宜調太陽之客以苦補之以咸瀉之以苦堅之以辛潤之食丹谷以安其氣食稷以去其邪雖有寒化不能為邪五之氣自秋分自巳初至小雪日卯初凡六十日有奇主位太商金客氣厥陰木中見木運木運與厥陰相符是謂司氣名曰蒼化時令至此春令反行草乃生榮民氣和自無疾病然厥陰之客宜以辛補之以酸瀉之以甘緩之歲谷宜丹間谷宜稻雖有風化不能為邪是氣也司氣以溫用溫無犯所謂用溫遠溫也終之氣自小雪日卯正至大寒日醜正凡六十日有奇主位少羽水客氣少陰火中見木運水能生木木能生火而行順化當陽氣布候反溫蟄蟲來見流水不冰民乃康平其病溫宜調少陰之客以咸補之以甘瀉之以酸收之食丹谷以安其氣食豆以去其邪雖有熱化不能為邪是歲重遇平氣四時之氣皆德化政令之施而無淫邪勝復之變民乃和而物乃舒平之至也太陽寒水司天太陰濕土在泉中見太徵火運歲火太過氣化運行先天上見太陽左間厥陰右間陽明故天政所布其氣肅下見太陰左間少陽右間少陰故地氣靜而其令徐寒臨太虛寒政大舉陽氣不令澤無陽焰則火發待時少陽中治時雨乃涯止極雨散還於太陰云朝北極濕化乃布澤流萬物寒敷於上雷動於下寒濕之氣持於氣交水土合德上應辰星鎮星其谷玄黅民病寒濕發肌肉萎足痿不收濡瀉血溢是歲水為天氣土為地氣土勝水天氣虛當於年前九月先資化源以助水化扶其不勝歲宜以苦溫調上以甘溫調下以甘和調中燥之溫之無使暴過而生疾病食玄黅之谷以全其真避寒濕虛邪以安其正運異寒濕宜燥濕化此治之常也歲半之前太陽主之其化從本從標本寒而標陽即寒熱得中其氣乃和若寒淫所勝則寒氣反至水且冰血變於中發為癰瘍民病厥心痛嘔血血泄鼽衄善悲時眩僕運火炎烈雨暴乃雹胸腹滿手熱肘攣腋腫心淡淡大動胸脅胃脘不安面赤目黃善噫嗌乾甚則色炲渴而欲飲病本於心診其神門脈絶者死不治其法平以辛熱佐以甘苦以咸瀉之太陰之化從本其令濕今司歲半之後又火運統之其氣相得濕燥兼行則其氣和若濕淫於內即埃昏岩谷黃反見黑至陰之交民病飲積心痛耳聾渾渾焞焞嗌腫喉痹陰病血見少腹痛腫不得小便病沖頭痛目似脫項似拔腰似折髀不可以回膕如結腨如別其法治以苦熱佐以酸淡以苦燥之以淡泄之歲火太過炎暑流行金肺受邪民病瘧少氣咳喘血溢血泄注下嗌燥耳聾中熱肩背熱甚則胸中痛脅肢滿脅痛戊辰歲圖膺背肩胛間痛兩臂內痛身熱骨痛而為浸淫收氣不行長氣獨明雨水霜寒上見太陽名為上羽故赫曦之紀曰上羽與正徵同其收齊其病痓天氣刑運歲運既郁則火發待時其治宜發之經所謂火鬱發之也初之氣自丁卯年大寒日寅初至是歲春分日子初凡六十日八十七刻半主位少角木客氣少陽火中見火運歲之司氣名曰丹化地氣遷氣乃大溫草乃早榮民乃厲溫病乃作身熱頭痛嘔吐肌腠瘡瘍宜治少陽之客以咸補之以甘瀉之以咸軟之歲谷宜玄間谷宜豆是氣也用熱無犯以司氣熱故也所謂用熱遠熱者如此二之氣自春分日子正至小滿日戌正凡六十日有奇主位太徵火客氣陽明金火運統之火雖當位而陽明之清與天氣寒水相得故大涼反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜玄間谷宜黍三之氣自小滿日亥初至大暑日酉初凡六十日有奇主位太徵火客氣太陽水中見火運火當其位天政布寒氣行雨乃降民病寒反熱中癰疽注下心熱瞀悶不治者死宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜玄間谷宜稷四之氣自大暑日酉正至秋分日未正凡六十日有奇主位少宮土客氣厥陰木中見火運風濕交爭風化為雨乃長乃化乃成民病大熱少氣肌肉萎足痿注下赤白宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜黅間谷宜稻五之氣自秋分日申初至小雪日午初凡六十日有奇主位太商金客氣少陰火中見火運氣與運同而君火不司氣化所謂居氣為灼化也時令至此陽復化草乃長乃化乃成民乃舒宜調少陰之客以咸補之以苦瀉之以酸收之歲谷宜黅間谷宜豆終之氣自小雪日午正至大寒日辰正凡六十日有奇主位少羽水客氣太陰土中見火運土居水位地氣正濕令行陰凝太虛埃昏郊野民乃慘淒寒風以至反者孕乃死宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜黅間谷宜麻此治六氣之常也歲半之前有勝氣者歲半之後必有復氣水勝則太陰必復土勝則闕陰必復其治各依其勝復之法己巳歲圖厥陰風木司天少陽相火在泉中見少宮土運歲土不及氣化運行後天卑監之紀上角與正角同諸同正歲氣化運行同天風行於上左間少陰右間太陽天氣擾而其政撓火行於下左間陽明右間太陰地氣正而其令速風生高遠炎熱從之云趨雨府濕化乃行風火同德上應歲星熒惑歲谷蒼丹間谷言太商之谷其耗文角品羽風燥火熱勝復更作熱病行於下風病行於上風燥勝復行於中運同正角不資化源惟贊其運氣無使邪勝歲宜以辛涼調上以鹹寒調下以甘和調中歲半之前天氣厥陰主之厥陰所至為風府風淫所勝太虛埃昏雪物以擾寒生春氣流水不冰民病胃脘當心而痛上支兩脅膈咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉蟄蟲不去病本於脾診其足衝陽脈絶者死不治其治平以辛涼佐以苦甘以甘緩之以酸瀉之歲半之後地氣少陽主之少陽所至為炎暑火淫於內則焰明郊野寒熱更至民病注泄赤白少腹痛溺赤甚則血便其法宜治以鹹冷佐以苦辛以酸收之以苦發之土不及曰卑監之紀是謂減化化氣不令生政獨彰長氣整雨乃愆收氣平風寒並興草木榮美秀而不實成而秕也風化盛行四維有埃云潤澤之化則春有鳴條鼓拆之政若四維發振拉飄騰之變則秋有肅殺霖霪之復飄揚而甚民病飧泄霍亂體重腹痛筋骨繇復肌肉瞤酸善怒藏氣舉事蟄蟲早附咸病寒中復則收政嚴峻名木蒼雕胸脅暴痛下引少腹善太息蟲食甘黃氣客於脾黅谷乃減民病食少失味蒼谷乃損是歲上臨厥陰木氣傷脾民病飧泄治以甘和調歲運也初之氣自戊辰年大寒日巳初至是歲春分日卯初凡六十日八十七刻半主位少角木客氣陽明金土運統之以奉厥陰之政而行春令金土交司清化行寒始肅殺氣方至民病寒於右之下其法宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜蒼間谷宜黍則燥邪無害二之氣自春分日卯正至小滿日醜正凡六十日有奇主位太徵火客氣太陽水中見土運濕寒合德以行舒榮之化寒不去華雪水冰殺氣施化霜乃降名草上焦寒雨數至陽復化民病熱於中其法宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜蒼間谷宜稷則寒邪無害三之氣自小滿日寅初至大暑日子初凡六十日有奇主位太徵火客氣厥陰木中見土運木火同德土運統之土化不及風化兼行天政所布風乃時舉民病泣出耳鳴掉眩其法宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜蒼間谷宜稻則風邪無害四之氣自大暑日子正至秋分日戌正凡六十日有奇主位少宮土客氣少陰火中見土運土居其位上臨少陰溽暑至濕熱相薄爭於左之上民病黃疸而為胕腫宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆則熱邪無害五之氣自秋分日亥初至小雪日酉初凡六十日有奇主位太商金客氣太陰土中見土運氣與運同同氣為黔化燥濕更勝沉陰乃布寒氣及體風雨乃行宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜丹間谷宜麻則濕邪無害是氣也司氣以涼用涼無犯所謂用涼遠涼也終之氣自小雪日酉正至大寒日未正凡六十日有奇主位少羽水客氣少陽火中見土運火土相得畏火司令陽乃大化蟄蟲出見流水不冰地氣大發草乃生人乃舒其病溫厲法宜治少陽之客以咸補之以甘瀉之以咸軟之歲谷宜丹間谷宜豆則火邪無害治之常也歲氣大法風勝則有陽明之復火勝則有太陽之復其治各依勝復之法庚午歲圖少陰君火司天陽明燥金在泉中見太商金運歲金太過氣化運行先天堅成之紀曰上徵與正商同又經言太商下加陽明太過而加同天符蓋天符為執法平金之化也命曰審平之紀收而不爭殺而無犯五化宣明其氣潔其性剛其用散落其化堅斂其政徑肅其候清切其令燥其類金其應秋其谷稻其果桃其實殼其蟲介其畜雞其物外堅其色白其味辛其音商其數九其在人也在臟為肺在竅為鼻在體為皮毛在病為咳此歲運所主也天地之氣上見少陰左間太陰右間厥陰是以天政所布其氣明下見陽明左間太陽右間少陽是以地氣肅而其令切二歲交司之氣以寒交暑是歲天地之氣以熱加燥云馳雨府濕化乃行時雨乃降金火合德上應熒惑太白其谷丹白水火寒熱持於氣交而為病始熱病生於上清病生於下寒熱爭於中民病咳喘血溢血泄鼽嚏目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上歲半之前天氣少陰君火主之少陰有本標之化寒熱得中則其氣和歲半之後地氣陽明燥金主之陽明不從標本而以中氣為化燥濕相半則其化平是歲平金而無勝復不取化源惟資歲勝折其鬱氣無使暴過而生其病歲宜以鹹寒調其上以酸溫安其下以辛溫調其中食白丹之谷以全真氣食間氣之谷以闢虛邪運同地氣化宜多用溫熱司氣以涼用涼遠涼此其道也初之氣自己巳年大寒日申初至是歲春分日午初凡六十日八十七刻半主位少角木客氣太陽水中見金運風寒燥三氣奉少陰之政以行春令地氣遷燥將去寒乃始蟄復藏水乃冰霜復降風乃至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍此太陽之客也法宜以苦補之以咸瀉之以苦堅之以辛潤之歲谷用丹間谷用稷乃無寒邪之害二之氣自春分日午正至小滿日辰正凡六十日有奇主位太徵火客氣厥陰木中見金運風火燥同奉少陰之政以行舒榮之化木火相得陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目瞑目赤氣鬱於上而熱此厥陰之客也法宜以辛補之以酸瀉之以甘緩之歲谷用丹間谷用稻乃無風邪之害三之氣自小滿日巳初至大暑日卯初凡六十日有奇主位太徵火客氣少陰火中見金運天政之所布也火居火位大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤宜治少陰之客以咸補之以甘瀉之以酸收之歲谷用丹間谷用豆乃無熱邪之害四之氣自大暑日卯正至秋分日醜正凡六十日有奇主位少宮土客氣太陰土中見金運土得其位與金相和奉陽明之令而行順化溽暑至大雨時行寒熱互至民病寒熱嗌乾黃疸鼽衄飲發此太陰之客也法宜以甘補之以苦瀉之以甘緩之歲谷用白間谷用麻乃無濕邪之害五之氣自秋分日寅初至小雪日子初凡六十日有奇主位太商金客氣少陽火中見金運歲金雖得位而客氣少陽用事畏火臨暑反至陽乃化萬物乃生乃長榮民乃康其病溫宜調少陽之客以咸補之以甘瀉之以咸軟之歲谷用白間谷用豆乃無火邪之害終之氣自小雪日子正至大寒日戌正凡六十日有奇主位少羽水客氣陽明金中見金運氣運相符與水相得而為平氣亦歲之司氣故燥令行餘火內格民病腫於上咳喘甚則血溢寒氣數舉則霧霿翳病生皮腠內舍於脅下連少腹而作寒中宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷用白間谷用黍乃無燥邪之害是氣也司氣以涼用涼無犯是謂至治辛未歲圖太陰濕土司天太陽寒水在泉中見少羽水運歲水不及氣化運行後天涸流之紀曰上宮與正宮同是歲天氣平又少羽下加太陽不及而加同歲會凡歲會為行令此運化亦平也諸同正歲氣化運行同天歲運既平命曰靜順之紀藏而勿害治而善下五化咸整其氣明其性下其用沃衍其化凝堅其政流演其候凝肅其令寒其類水其應冬其谷豆其果栗其實濡其蟲鱗其畜彘其色黑其味鹹其音羽其數六其在人也其臟為腎其主二陰其養骨髓其病厥此歲運之所主也天地之氣上見太陰左間少陽右間少陰故地氣上騰而其政肅下見太陽左間厥陰右間陽明故天氣下降而其令寂陰專其政陽氣退闢大風時起原野昏霿白埃四起云奔南極寒雨數至物成於差夏濕寒合德黃黑埃昏流行氣交上應鎮星辰星其谷黅玄故陰凝於上寒積於下寒水勝火則為冰雹陽光不治殺氣乃行民病寒濕腹滿身䐜憤胕腫痞逆寒厥拘急故有餘宜高不及宜下有餘宜晚不及宜早土之利氣之化也民氣亦從之間谷命太徵太商之谷歲氣既平不取化源惟折其水鬱之氣無使邪勝食黅玄之谷以全其真食間氣之谷以保其精歲宜以苦熱調上以苦熱調下以苦和調中燥之溫之歲半之前天氣太陰主之太陰所至為雲雨其化從本當其時多行雨濕化者太陰之政也歲半之後地氣太陽主之太陽所至為寒氛其化從本從標當其時寒氣至而熱氣應者地氣之平也初之氣自庚午歲大寒日亥初至是年春分日酉初凡六十日八十七刻半主位少角木客氣厥陰木中見水運木當其位水運統之奉太陰之政而行春令地氣遷寒乃去春氣正風乃來生布萬物以榮民氣條舒風濕相搏雨乃後民病血溢筋絡拘強關節不利身重筋痿宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷用黅間谷用稻乃無客風之害二之氣自春分日酉正至小滿日未正凡六十日有奇主位太徵火客氣少陰火中見水運奉太陰之政以行舒榮之化大火正物承化民乃和其病溫歷盛行遠近咸若濕蒸相搏雨及時降宜治少陰之客以咸補之以甘瀉之以酸收之歲谷用黅間谷用豆乃無客熱之害三之氣自小滿日申初至大暑日午初凡六十日有奇主位太徵火客氣太陰土中見水運天政所布濕氣降地氣騰雨乃時降寒乃隨之感於寒濕民病身重胕腫胸腹滿宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷用黅間谷用麻乃無濕邪之害四之氣自大暑日午正至秋分日辰正凡六十日有奇主位少宮土客氣少陽火中見水運火土相得奉太陽之令畏火臨溽蒸化地氣騰天氣否隔寒風曉暮蒸熱相搏草木凝煙濕化不流則白露陰布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫宜治少陽之客以咸補之以甘瀉之以咸軟之歲谷用玄間谷用豆乃無熱邪之害五之氣自秋分日巳初至小雪日卯初凡六十日有奇主位太商金客氣陽明金中見水運慘令已行寒露下霜乃早降草木黃落寒氣及體君子周密民病皮腠宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷用玄間谷用黍乃無客燥之害終之氣自小雪日卯正至大寒日醜正凡六十日有奇主位少羽水客氣太陽水中見水運寒大舉濕大化霜乃積陰乃凝水堅冰陽光不治感於寒則病人關節禁固腰脽痛寒濕持於氣交而為疾也宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷用玄間谷用稷乃無客寒之害是歲行平氣之化歲會為行令無淫氣勝復惟行德化政令然土為天氣水為地氣水土雖睦而運化不及濕土在上天氣刑之或有濕邪害人其氣亦微內經所謂中行令者其病徐而持也壬申歲圖少陽相火司天厥陰風木在泉中見太角木運歲木太過氣化運行先天太角下加厥陰太過而加同天符天符為執法平木之化也命曰敷和之紀木德周行陽舒陰布五化宣平其氣端其性隨其用曲直其化生榮其政發散其候溫和其類草木其物中堅其應春其谷麻其果李其實核其蟲毛其畜犬其色蒼其味酸其音角其數八其在人也其藏肝其主目其養筋其病裡急支滿此歲運所主也天地之氣上見少陽左間陽明右間太陰故天氣正而其政嚴下見厥陰左間少陰右間太陽故地氣擾而其令擾風乃暴舉木偃沙飛炎火乃流陰行陽化雨乃時應火木同德上應熒惑歲星其谷丹蒼風熱參布雲物沸騰太陰橫流寒乃時至涼雨並起民病寒中外發瘡瘍內為泄滿聖人遇之和而不爭往復之作民病寒熱瘧泄聾瞑嘔吐上怫腫色變歲半之前天氣少陽主之少陽所至為炎暑其化從本當其時火化盛行風氣應之候乃和歲半之後地氣厥陰主之厥陰所至為風府其化不從標本而以中氣為化當其時風從火化者厥陰之中也是歲運化既平不取化源唯贊所不勝則暴過不生苛疾不起歲宜以鹹寒調上以辛涼調下以酸和調中滲之泄之漬之發之運同風熱宜多寒化司氣以溫用溫遠溫治之常也初之氣自辛未年大寒日寅初至是歲春分日子初凡六十日八十七刻半主位太角木客氣少陰火中見木運木火相得運當其位以奉少陽之政而行春令地氣遷風勝乃搖寒乃去候乃大溫草木早榮寒來不殺溫病乃起其病氣怫於上血溢目赤咳逆頭痛血崩脅滿膚腠中瘡宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆則熱不為邪二之氣自春分日子正至小滿日戌正凡六十日有奇主位少徵火客氣太陰土中見木運風濕之氣奉畏火之政以行舒榮之化火反郁白埃四起云趨雨府風不勝濕雨乃零民乃康其病熱鬱於上咳逆嘔吐瘡發於中胸嗌不利頭痛身熱昏憒膿瘡宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜丹間谷宜麻則濕不為邪三之氣自小滿日亥初至大暑日酉初凡六十日有奇主位少徵火客氣少陽火中見木運火當其位與木運之氣相得天政布炎暑至少陽臨上雨乃涯民病熱中聾瞑血溢膿瘡咳嘔鼽衄渴嚏缺喉痹目赤善暴死宜治少陽之客以咸補之以甘瀉之以咸軟之歲谷宜丹間谷宜豆則火不為邪是歲木氣適平不至橫暴四之氣自大暑日酉正至秋分日未正凡六十日有奇主位太宮土客氣陽明金中見木運涼乃至炎暑間化白露降民氣和平其病滿身重宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜蒼間谷宜黍則燥不為邪五之氣自秋分日申初至小雪日午初凡六十日有奇主位少商金客氣太陽水中見木運陽乃去寒乃來雨乃降氣門乃閉剛木早雕民避寒邪君子周密宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜蒼間谷宜稷則寒不為邪終之氣自小雪日午正至大寒日辰正凡六十日有奇主位太羽水客氣厥陰木中見木運太角下加厥陰之時運與氣符其化和平又居水位水木相得其化乃順地氣正風乃至萬物反生霿霧以行其病關閉不禁心痛陽氣不藏而咳氣有所承不能無侮所謂邪中執法也經曰中執法者其病速而危宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜蒼間谷宜稻則風不為邪此一氣司氣以溫用溫無犯是謂至治癸酉歲圖陽明燥金司天少陰君火在泉中見少徵火運歲火不及氣化運行後天伏明之紀曰上商與正商同言天氣平也六元正紀曰少徵下加少陰不及而加同歲會言歲運平也諸同正歲氣化運行同天上見天氣平下見運火平火氣之平命曰升明之紀正陽而治德施周普五化均衡其氣高其性速其用燔灼其化蕃茂其政明曜其候炎暑其類火其應夏其穀麥其果杏其實絡其蟲羽其畜馬其色赤其味苦其物脈其音徵其數七其在人也其藏心其主舌其養血其病瞤瘛此歲運所主也天地之氣上見陽明左間太陽右間少陽故天氣急而其政切下見少陰左間太陰右間厥陰故地氣明而其令暴陽專其令炎暑盛行物燥以堅淳風乃治風燥橫運流於氣交多陽少陰云趨雨府濕化乃敷燥極而澤其谷白丹間谷命太者其耗白甲品羽金火合德上應太白熒惑清熱之氣持於氣交民病咳嗌塞寒熱發暴振栗癃閉清先而徑毛蟲乃死熱後而暴介蟲乃殃歲運之化熱寒雨勝復同所謂邪氣化日也燥化四熱化二所謂正化日也歲半之前天氣陽明主之陽明以中氣為化當其時燥濕相半者陽明得中也歲半之後地氣少陰主之少陰有本標之化當其時寒熱得中者少陰之氣和也歲火適平不資化源惟安運氣無使受邪歲宜以苦心溫調上以鹹寒調下以鹹溫調中食白丹之谷以安其氣食間氣之谷以去其邪運同熱氣宜多天化治之常也初之氣自壬申年大寒日巳初至是歲春分日卯初凡六十日八十七刻半主位太角木客氣太陰土中見火運風濕熱三氣同奉陽明之政而行春令地氣遷陰始凝氣始肅水乃冰寒雨化其病中熱脹面目浮腫善眠鼽衄嚏缺嘔小便黃赤甚則淋宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜白間谷宜麻乃無濕邪之害二之氣自春分日卯正至小滿日醜正凡六十日有奇主位少徵火客氣少陽火中見火運三火相符以行舒榮之化陽乃布民乃舒物乃生榮厲大至民善暴死是歲火氣平厲雖至民亦無害宜治少陽之客以咸補之以甘瀉之以咸軟之歲谷用白間谷用豆乃無火邪之害是氣也司氣以熱用熱無犯三之氣自小滿日寅初至大暑日子初凡六十日有奇主位少徵火客氣陽明金中見火運金居火位天政布涼乃行燥熱交合燥極而澤民病寒熱宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷用白間谷用黍乃無燥邪之害四之氣自大暑日子正至秋分日戌正凡六十日有奇主位太宮土客氣太陽水中見火運寒濕之氣下奉少陰之令寒雨降病暴僕振栗譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿血便宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷用丹間谷用稷乃無寒邪之害五之氣自秋分日亥初至小雪日酉初凡六十日有奇主位少商金客氣厥陰木中見火運春令反行草乃生榮民氣和宜調厥陰之客以辛補之以酸瀉之以甘緩之歲谷用丹間谷用稻自無風邪之害終之氣自小雪日酉正至大寒日未正凡六十日有奇主位太羽水客氣少陰火中見火運少徵與少陰相加火氣符會而為行令陽氣布候反溫蟄蟲來見流水不冰民乃康平其病溫宜治少陰之客以咸補之以甘瀉之以酸收之歲谷用丹間谷用豆乃無熱邪之害是歲氣運適平若有邪氣則中行令中行令者其病徐而持也甲戌歲圖太陽寒水司天太陰濕土在泉中見太宮土運歲土太過氣化運行先天太宮下加太陰太過而加同天符又土運臨戌是謂歲會氣之平也平土之歲命曰備化之紀氣協天休德流四政五化齊修其氣平其性順其用高下其化豐滿其政安靜其候溽蒸其令濕其類土其應長夏其谷稷其果棗其實肉其蟲倮其畜牛其物膚其色黃其味甘其音宮其數五其在人也其臟脾其主口其養肉其病否此歲運所主也天地之氣上見太陽左間厥陰右間陽明故天政所布其氣肅下見太陰左間少陽右間少陰故地氣靜而其令徐水土合德上應辰星鎮星其谷玄黅寒臨太虛其政大舉陽氣不令澤無陽焰則火發待時少陽中治時雨乃涯止極雨散還於太陰云朝北極濕化乃布澤流萬物寒敷於上雷動於下寒濕之氣持於氣交民病寒濕發肌肉萎足萎不收濡瀉血溢歲半之前天氣太陽主之太陽有本標之化寒政大舉熱氣時應者天氣得中也歲半之後地氣太陰主之太陰之化從本雨濕甚者地氣之應也寒化六濕化五是為正化之日倮蟲育鱗蟲靜是為歲物所宜燥毒不生鱗蟲不成其味鹹其氣熱是為地氣所制平土之歲本不資化源運與地氣臨於戌歲土氣盛先資化源以助於水所謂抑其運氣扶其不勝無使暴過而生其疾也食玄黅之谷以全其真避歲之虛邪以安其正以苦熱調上以苦溫調下運土在中亦以苦溫調之運同寒濕化宜燥熱治之常也初之氣自癸酉年大寒日申初至是歲春分日午初凡六十日八十七刻半主位太角木客氣少陽火中見土運少陽中治以行春令地氣遷氣乃大溫草乃早榮民乃厲溫病乃作身熱頭痛嘔吐肌腠瘡瘍宜治少陰之客以咸補之以甘瀉之以咸軟之歲谷宜玄間谷宜豆則火不為邪二之氣自春分日午正至小滿日辰正凡六十日有奇主位少徵火客氣陽明金中見土運金土相和大涼反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜玄間谷宜黍則燥不為邪三之氣自小滿日巳初至大暑日卯初凡六十日有奇主位少徵火客氣太陽水中見土運天政布寒氣行雨乃降民病寒反熱中癰疽注下心熱瞀悶不治者死宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜玄間谷宜稷則寒不為邪四之氣自大暑日卯正至秋分日醜正凡六十日有奇主位太宮土客氣厥陰木中見土運歲土得位風氣居之風濕交爭風化為雨乃長乃化乃成民病大熱少氣肌肉萎足痿注下赤白宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜黅間谷宜稻則風不為邪五之氣自秋分日寅初至小雪日子初凡六十日有奇主位少商金客氣少陰火中見土運火能生土土能生金氣位相和陽復化草乃長乃化乃成民乃舒宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜黅間谷宜豆則熱不為邪終之氣自小雪日子正至大寒日戌正凡六十日有奇主位太羽水客氣太陰土中見土運氣與運符會地氣正濕令行陰凝太虛埃昏郊野民乃慘淒寒風以至反者孕乃死宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜黅間谷宜麻則濕不為邪是氣也不可犯涼司氣以涼故也歲氣雖平或有邪氣則中執法經日中執法者其病速而危也乙亥歲圖厥陰風木司天少陽相火在泉中見少商金運歲金不及氣化運行後天上角與正角同諸同正歲氣化運行同天厥陰在上左間少陰右間太陽故天氣擾而其政撓少陽在下左間陽明右間太陰故地氣正而其令速風生高遠炎熱從之云趨雨府濕化乃行風火同德上應歲星熒惑其谷蒼丹間谷言太宮太羽者其耗交角品羽風燥