body:
  text: 卷第八十八虛勞少氣論曰諸氣皆屬於肺肺處膈上主行陽氣而通呼吸虛勞之人內傷於肺陽氣虧虛故呼吸微弱少氣不足以息治宜補益肺臟以通陽氣治虛勞骨肉痠疼吸吸少氣少腹拘急腰背強痛心中驚悸咽乾唇燥面無顏色飲食減少憂愁嗜臥枸杞湯方枸杞根銼黃耆銼各三分甘草炙銼麥門冬去心焙桂去粗皮各半兩粳米一兩上六味粗搗篩每服五錢匕水一盞半生薑一分拍碎煎至一盞去滓空腹服夜臥再服治虛勞少氣脅下妨悶腹中拘急少腹㽱痛唇乾口燥不能食飲芍藥湯方芍藥黃耆銼桂去粗皮各一兩甘草炙乾薑炮各半兩熟乾地黃一兩焙阿膠炒燥半兩上七味粗搗篩每服五錢匕水一盞半煎至一盞去滓下飴糖少許再煎一沸食後分溫二服夜臥再服治虛勞少氣骨節熱痛麻仁湯方大麻仁五兩枸杞葉五兩乾薑炮一兩桂去粗皮半兩甘草炙銼二兩上五味粗搗篩每服三錢匕以水一盞煎取半盞去滓空腹溫服治虛勞少氣行動喘促小便過多地黃湯方熟乾地黃二兩黃耆銼桂去粗皮甘草炙當歸切焙各三兩芍藥黃精焙乾黃芩去黑心各一兩麥門冬去心焙五兩上九味粗搗篩每服三錢匕水一盞生薑半分拍碎棗兩枚去核煎至六分去滓空腹溫服日午夜臥再服治虛勞少氣喉咽不利唾如稠膠茯苓湯方白茯苓去黑皮麥門冬去心焙各一兩熟乾地黃焙人參前胡去苗桂去粗皮各半兩芍藥甘草炙各一兩上八味粗搗篩每服五錢匕水一盞半棗二枚去核煎至一盞去滓分溫二服如人行十里再服治虛勞少氣咳逆傷損鬱郁不足降氣通津液五補麥門冬湯方麥門冬去心焙二兩五味子人參桂去粗皮甘草炙各半兩地骨皮一兩小麥二合粳米一合上八味粗搗篩每服五錢匕水一盞半入薤白三寸切同煎至一盞去滓空腹溫服若口乾加竹葉一兩切治虛勞少氣羸困無力小便頻數不能飲食黃耆湯方黃耆銼二兩白芍藥去心焙桂去粗皮當歸切焙各一兩麥門冬去心焙一兩半龍骨熟乾地黃焙各一兩甘草炙半兩上八味粗搗篩每服三錢匕水一盞生薑半分拍碎棗二枚劈破同煎至六分去滓食前溫服治虛勞少氣四肢無力山芋丸方山芋二兩黃耆一兩遠志去心五味子牛膝去苗酒浸切焙各半兩柏子仁桂去粗皮各三分巴戟天去心一兩熟乾地黃焙二兩上九味搗羅為末煉蜜和杵三五百下丸如梧桐子大每服食前溫酒下三十丸虛勞上氣論曰虛勞上氣者肺氣虛弱邪氣盛實也氣聚於肺則肺布葉舉上焦不通氣滿胸中故為上氣之疾治虛勞上氣胸膈不利喘急咳唾稠黏不思飲食五味子湯方五味子訶黎勒皮前胡去蘆頭麥門冬去心焙各一兩人參枳殼去瓤麩炒紫蘇莖葉大腹皮甘草炙銼各三分陳橘皮湯浸去白焙半夏湯浸去滑七遍各半兩上一十一味粗搗篩每服三錢匕水一盞入生薑半分煎至七分去滓溫服不拘時候治虛勞上氣咳嗽兼肺勞涕唾稠黏及有膿血皮膚乾焦作則寒作熱飲食不下喘息不調日漸瘦悴坐臥不得半夏湯方半夏湯洗去滑焙桔梗銼各三分檳榔二枚煨銼桑根白皮炙銼百部焙貝母去心炒甘草炙銼款冬花吳茱萸水浸一宿焙乾炒紫菀去苗土各半兩澤漆葉旋覆花各一分上一十二味粗搗篩每服三錢匕水一盞入生薑半分拍碎棗二枚劈煎至七分去滓空腹溫服日午夜臥再服治虛勞上氣咳嗽喘息不得臥桑根白皮飲方桑根白皮銼木通銼桔梗銼炒紫蘇各一兩半檳榔二枚銼款冬花郁李仁炒去皮研各一兩上七味粗搗篩每服三錢匕水一盞煎至六分去滓食後溫服日再治虛勞上氣喘息不得安臥咳唾面目虛浮小便不利黃耆湯方黃耆三分桑根白皮炙柴胡去苗赤芍藥炒赤茯苓去黑皮各半兩陳橘皮湯浸去白焙麥門冬去心焙惡實微炒甘草炙各三分上九味各銼如麻豆大每服五錢匕水一盞半煎取八分去滓食後溫服夜臥再服治虛勞上氣咳嗽白茯苓丸方白茯苓去黑皮貝母去心五味子紫菀去苗土白朮百部根杜蘅麥門冬去心焙人參麻黃去根節湯煮掠去沫杏仁湯浸去皮尖雙仁熬陳橘皮湯浸去白焙桂去粗皮等分上一十三味搗羅為末煉蜜和丸如梧桐子大每服二十丸空腹米飲下加至三十丸日再服治虛勞上氣喘息語聲嘶嗄桑白皮湯方桑根白皮炙銼白茯苓去黑皮各一兩半麻黃去根節湯煮掠去沫一兩一分杏仁湯浸去皮尖雙仁別研甘草炙銼各一兩上五味粗搗篩每服三錢匕水一盞入生薑半分拍碎煎至七分去滓溫服不拘時候頓服治虛勞上氣喘促坐臥不安陳橘皮丸方陳橘皮湯浸去白焙二兩紫蘇子三分防己半兩桑根白皮銼赤茯苓去黑皮木通銼郁李仁湯浸去皮尖微炒甜葶藶微炒各一兩上八味搗羅為散煉蜜和丸如梧桐子大每服二十丸生薑棗湯下不拘時候治虛勞上氣胸中煩滿寒熱減食不得安臥紫菀湯方紫菀去苗土五味子前胡去蘆頭陳橘皮湯浸去白焙人參白朮麥門冬去心焙各一兩桂去粗皮三分甘草炙銼半兩上九味粗搗篩每服三錢匕水一盞入生薑三片棗二枚劈破煎取七分去滓溫服日三服治虛勞上氣心腹氣脹不能飲食嘔吐酸水白朮湯方白朮人參白茯苓去黑皮訶黎勒皮厚朴去粗皮生薑汁炙各一兩陳橘皮湯浸去白焙檳榔銼紫蘇莖葉桂去粗皮各三分半夏湯洗七遍去滑木香各半兩上一十一味粗搗篩每服三錢匕水一盞煎至七分去滓入生薑汁少許再煎至六分稍熱服不拘時候虛勞咳嗽論曰虛勞咳嗽者以肺傷胃弱營衛衰微氣不溫充故也肺主氣為五臟之蓋其脈環循胃口肺臟勞傷則令人咳嗽上氣或唾膿血寒熱潮作面赤口乾偏臥喜汗不能飲食肌膚消瘦是也治虛勞咳嗽胸滿氣急發熱羸瘦鱉甲湯方鱉甲去裙襴醋炙黃柴胡去苗杏仁湯浸去皮尖雙仁麩炒桃仁湯浸去皮尖雙仁麩炒款冬花甘草炙銼貝母去心知母焙各一兩皂莢去皮子酥炙一分上九味粗搗篩每服三錢匕水一盞入小麥五十粒烏梅一個煎至七分去滓溫服治虛勞咳嗽日久不瘥保命丸方蛤蚧一枚如丈夫患用雄者腰上一截女人患用雌者腰下一截酥炙皂莢不蚛者酥炙去皮子兩梃款冬花杏仁去皮尖童子小便浸一復時控干蜜炒木香天麻乾地黃熟者如黑餳研焙半夏湯洗去滑二七遍焙五味子各一分丁香半分上一十味搗羅為末煉蜜丸梧桐子大每服食後生薑湯下十五丸加至二十丸治虛勞咳嗽痰唾不利喘急胸滿呀呷有聲飲食不進蛤蚧湯方蛤蚧酥炙去爪一對人參一兩杏仁湯浸去皮尖研五兩白茯苓去黑皮一兩甘草炙銼四兩桑根白皮米泔浸一宿銼焙一兩上六味粗搗篩每服三錢匕水一盞入生薑三片同煎至六分去滓溫服空心夜臥各一治虛勞咳嗽喘急涕唾稠黏心膈滿悶驅勞湯方秦艽去苗土柴胡去苗白茯苓去黑皮鱉甲去裙襴醋炙各半兩貝母去心款冬花紫菀去苗土地骨皮人參麻黃去根節桂去粗皮半夏薑汁浸三日湯洗切焙各一分訶黎勒皮三枚杏仁湯洗去皮尖雙仁研一兩上一十四味粗搗篩每服五錢匕水一盞半入生薑五片同煎至八分去滓溫服治虛勞喘嗽寒熱盜汗秦艽湯方秦艽去苗土甘草炙銼各一兩桂去粗皮柴胡去苗當歸切焙各半兩上五味粗搗篩每服三錢匕水一盞入生薑二片烏梅並棗各一枚劈破同煎至七分去滓溫服治虛勞咳嗽白茯苓湯方白茯苓去黑皮五靈脂白芷微炒各一兩黃明膠兩片重一兩者炙令燥上四味粗搗篩每服三錢匕水一盞煎至八分去滓入蜜少許更煎兩沸放溫細呷服不計時治虛勞咳嗽腸鳴滑泄紫菀湯方紫菀去土半兩柴胡去苗一兩附子炮裂去皮臍半兩蒼朮米泔浸一宿切片焙乾赤芍藥各一兩肉豆蔻去殼人參各半兩上七味銼如麻豆每服三錢匕水一盞煎至六分去滓不計時溫服治虛勞咳嗽氣喘頰赤心忪煩躁兩脅脹悶肌瘦少力不思飲食柴胡飲方柴胡去苗半兩白朮赤茯苓去黑皮鱉甲去裙襴醋炙各一分半知母切焙犀角屑各一分枳殼去瓤麩炒一分半上七味粗搗篩每服三錢匕水一盞煎至半盞去滓溫服早晨日午夜臥各一服治虛勞發熱咳嗽七味湯方柴胡去苗厚朴去粗皮薑汁炙各二兩甘草炙桂去粗皮麻黃去根節陳橘皮湯浸去白焙半夏為末薑汁和作餅焙乾各一兩上七味粗搗篩每服三錢匕水一盞入生薑三片棗二枚同煎至七分去滓溫服治虛勞咳嗽不止時發寒熱涕唾稠濁秦艽飲方秦艽去苗土柴胡去苗貝母去心焙桔梗炒各一兩甘草炙銼三分訶黎勒煨去核一兩半陳橘皮湯浸去白焙麻黃去根節各一兩上八味粗搗篩每服三錢匕用童子小便一盞入烏梅一個同煎至七分去滓溫服空心食前服治虛勞咳嗽發熱羸瘦阿膠丸方阿膠炙令燥熟乾地黃焙山芋各一兩羚羊角屑柏子仁研茯神去木地骨皮五味子百合各半兩丹參遠志去心麥門冬去心焙人參各三分蛤蚧蜜炙一對上一十四味搗羅為末煉蜜和丸彈子大每服一丸水八分煎至六分放溫時時細呷服食後夜臥各一治虛勞咳嗽喘滿食少脅痛時發寒熱地骨皮丸方地骨皮白檳榔煨銼桔梗炒麥門冬去心焙各一兩半茯神去木百合訶黎勒煨取皮人參甘草炙銼各一兩熟乾地黃焙赤芍藥各二兩上一十一味搗羅為末煉蜜和丸梧桐子大每空腹煎黃耆湯下二十丸日三服虛勞痰飲論曰虛勞之人陽氣不足水飲下咽入於胃腑不能流傳致多痰飲其候胸膈痞悶倚息短氣怠惰嗜臥心下悸動咳嗽痰水不欲飲食是也治法宜調順三焦升降陰陽使氣道通流即痰飲自消治虛勞不足四肢羸瘦脾胃虛冷痰飲停積不欲飲食食即汗出黃耆湯方黃耆銼焙甘草炙銼當歸切焙細辛去苗葉五味子去莖葉人參桂去粗皮各半兩芍藥三分前胡去蘆頭一分白茯苓去黑皮一兩半夏湯浸去滑焙乾麥門冬去心焙各二兩上一十二味粗搗篩每服五錢匕水一盞半生薑半分拍碎棗三枚去核煎至一盞去滓分溫二服空心一服如人行三五里再服治虛勞寒熱進退痰飲不消四肢拘急手足時冷半夏湯方半夏湯洗去滑焙乾檳榔各半兩柴胡去苗桔梗炒人參赤茯苓去黑皮白朮各一兩陳橘皮去白三分上八味粗搗篩每服五錢匕水一盞半生薑一分拍碎煎至一盞去滓空腹分溫二服治虛勞氣逆嘔吐痰涎枇杷葉湯方枇杷葉刷去毛生薑汁浸炙前胡去蘆頭桔梗炒各三分藿香葉人參白朮各一兩一分白茯苓去黑皮五味子木香京三稜煨銼木通銼鱉甲去裙襴醋炙黃甘草炙厚朴去粗皮生薑汁浸炙白芷防風去叉各半兩當歸切焙芍藥牡丹皮知母焙枳殼去瓤麩炒各一分半夏一兩湯浸去滑七遍澤瀉大腹皮銼訶黎勒皮各三分上二十五味粗搗篩每服五錢匕水一盞半生薑一分拍碎棗二枚劈破同煎至八分去滓帶熱空心日午近夜服治五勞七傷脾胃氣弱痰飲不消胸滿氣逆嘔吐減食茯苓湯方赤茯苓去黑皮前胡去蘆頭人參附子炮裂去皮臍各半兩黃耆銼鱉甲去裙襴醋浸炙黃半夏湯洗七遍去滑炒乾各一兩陳橘皮湯浸去白焙木香各一分上九味粗搗篩每服三錢匕水一盞生薑半分拍碎棗兩枚去核煎至六分去滓空腹溫服日午臨臥再服治虛勞脾胃不調痰飲留滯心胸煩悶不思飲食嘔逆頭眩人參半夏湯方人參半夏湯洗二七遍去滑赤茯苓去黑皮各一兩大腹皮二枚前胡去蘆頭陳橘皮湯浸去白焙枇杷葉去毛炙鱉甲去裙襴醋炙黃柴胡去苗各三分芍藥半兩上一十味粗搗篩每服三錢匕水一盞生薑三片同煎至七分去滓溫服食後治虛勞痰飲不思飲食胸滿氣逆橘皮湯方陳橘皮湯浸去白焙三兩半夏湯洗七遍去滑麩炒黃