body:
  text: 卷第一百七十一小兒躽啼論曰小兒胞胎全仰母氣母將養失宜傷於風冷則邪氣入於胞胎既生之後冷氣停留復因乳哺不節邪氣與正氣相搏故腹痛躽張蹙氣而啼也治小兒躽啼腹痛牡蠣散方牡蠣燒過研伏龍肝研甘草炙銼蒼朮銼炒各一分麝香研分半上五味先於木臼內搗甘草蒼朮成末次與三味再同研令勻每服半錢匕研陳米泔澄清煎竹茹湯調下量兒大小增減治小兒躽啼脾胃傷風冷心下虛痞腹中疼痛胸脅逆滿白朮丸方白朮乾薑炮人參甘草炙銼各一兩上四味搗羅為末煉蜜和丸如緑豆大每服五丸沸湯化下量兒大小加減治小兒躽啼不止牛黃丸方牛黃研一分代赭煅過研三分麝香研一錢牡丹三分上四味搗研為末煉蜜和丸如緑豆大每服兩丸溫水下治小兒躽啼腹堅滿雀屎丸方雀屎一兩一分當歸切焙一兩上二味搗羅為末煉蜜和丸如麻子大五十日兒每服一丸以乳汁下空心午後各一服量兒大小以意加減治小兒躽啼及一切氣逆心腹刺痛紫蘇子丸方紫蘇子揀炒陳橘皮湯浸去白焙各一兩高良薑桂去粗皮人參各半兩上五味搗羅為末煉蜜和丸如緑豆大每服五丸米飲或溫酒化下不計時候乳母亦可加丸數服治小兒躽啼脾胃虛冷心腹㽱痛胸膈滿悶養脾丸方乾薑炮縮沙蜜去皮各一兩白茯苓去黑皮半兩甘草炙三分大麥糵炒人參各半兩白朮一分上七味搗羅為末煉蜜和丸如緑豆大每服五丸生薑湯化下不計時候乳母亦可加丸數服治小兒胎寒躽啼驚癇腹脹滿不嗜食大便青黃色或有實不可吐下馬齒礬石丸方馬齒礬石燒作灰二兩上一味細研以棗肉和丸如緑豆大每服三丸米飲下加至五丸以意增減以腹中溫暖為度治小兒躽啼方上取柏子仁末溫水調半錢匕服之小兒驚癇論曰小兒氣血微弱易為傷害若猝驚動傷亂精神心氣不定因驚而發則為驚癇凡養小兒當須持護或聞大聲或見異類必當安撫無令恐怖若初覺兒驚急保抱之其驚自止若忽因驚成癇宜按圖灸兼以摩膏不可大下蓋以心氣不足若下之則內愈虛手足抽掣者並不可持捉使氣血失道傷動樞紐也治小兒驚癇發動經年不斷根源鴟頭丸方鴟頭炙焦一枚蜣螂去足炙七枚桂去粗皮一兩一分芍藥一兩蚱蟬去翅足炙十枚蛇蛻炙五寸白茯苓去黑皮一兩一分露蜂房炙半兩甘草炙銼黃芩去黑心當歸切焙芎藭丹參各一兩麝香研一分牛黃研半兩莨菪子酒浸一宿曝乾蒸熟八合大黃濕紙裹煨二兩上一十七味搗羅為末煉蜜和丸如小豆或如黍米大臨時量小兒大小虛實與服用溫水下治小兒頻驚壯熱欲作癇柴胡煎方柴胡去苗升麻梔子仁芍藥各三分鉤藤一分凝水石研黃芩去黑心知母切焙各一兩生葛汁一合甘草炙一分蜜二合淡竹葉細銼三握杏仁湯浸去皮尖雙仁炒別研半兩上一十三味納十味粗搗篩以水三升入銀石銚內文武火煎至一升綿濾去滓再入鍋內下蜜並葛汁杏仁等煎如餳以瓷器盛百日兒每服如緑豆大一歲兒如杏仁大日三服更量大小加減並用溫漿水化破服治小兒驚癇體羸及五癇鉤藤煎方鉤藤一分半黃芩去黑皮知母切焙寒水石各一兩升麻三分沙參半兩蚱蟬去翅足炙二枚蜣螂炙二枚甘草炙三分蜜五兩上一十味除蜜外搗羅為末與蜜同入銀石鍋內慢火上熬成煎每服一杏仁大用水化下日三服量兒大小加減治小兒自一歲至大患癲癇發動無時口內沫出小便不覺呼喚不應真珠丸方真珠研一分虎睛左睛為上酒浸曝乾研一隻露蜂房麻黃去根節鉤藤各半兩鐵粉細研三分防葵一兩大黃銼炒黃芩各三分龍齒研一兩銀屑梔子仁各三分獨活去蘆頭半兩柴胡去苗升麻白蘚皮各三分雷丸一分沙參細辛去苗葉各半兩蛇蛻燒灰一分石膏研半兩牛黃研一分蚱蟬去翅足熬四枚上二十三味搗研為末煉蜜丸如麻子大一二歲兒每服五丸研破米飲下量兒大小加減服一方有羌活三分無獨活有丹參一兩無珍珠治小兒諸般癇驚惕瘛瘲及中客忤人參丸方人參牛黃細辛去苗葉各半兩蚱蟬去翅足炙七枚大黃濕紙裹煨銼一兩芍藥當歸切焙各半兩蛇蛻炙三寸甘草炙銼三分栝蔞根防風去叉各半兩巴豆去皮心膜別研如膏三十粒麝香研半兩上一十三味除巴豆牛黃麝香外搗羅為末研勻煉蜜和丸如麻子大初生至百日兒每服二丸一歲至五歲兒每服三丸五丸並用薄荷湯下若兒驚惕及客忤溫壯發熱腹滿增丸數服之以快利為度更量兒大小加減治小兒諸般癇及驚常服除熱芍藥丸方芍藥鐵粉研各三分蚱蟬去翅足炙四枚當歸切焙三分大黃銼炒一兩石膏碎三分桂去粗皮半兩人參一兩一分銀屑研芎藭龍骨研細辛去苗葉黃芩去黑心各半兩牛黃研一分上一十四味搗研為末煉蜜丸和麻子大每服三丸米飲下日三更量兒大小加減治小兒邪熱癇口噤人參湯方人參一兩木通銼黃芩去黑心升麻各半兩龍齒研三分犀角鎊炒赤茯苓去黑皮銼鐵粉研各半兩蜣螂十枚去足炙鉤藤半兩蚱蟬去翅足炙二七枚上一十一味粗搗篩三四歲兒每服一錢匕水一小盞煎至五分入竹瀝少許更煎三兩沸去滓分為三服日三更量兒大小加減治小兒諸驚癇兼壓驚鎮心臟丹砂虎睛丸方丹砂研一兩虎睛研一對牛黃研麝香研犀角末各一分鉤藤四兩白茯苓去黑皮銼黃芩去黑心人參梔子仁各一兩大黃濕紙裹煨熟銼二兩上一十一味搗研為末煉蜜丸如雞頭實大每服一丸至兩丸煎金銀湯化下人參湯亦得更量兒大小加減治小兒驚癇身熱手足瘛瘲目睛上視狀如中風保和丸方丹砂研一錢蠍梢二七個雄黃研二錢蘆薈研熊膽研各半錢蛇蛻燒灰一錢瓜蒂二七枚蟾酥一皂子大湯浸膩粉研龍腦研麝香研牛黃研各半錢上一十二味搗研如粉用浸蟾酥並麵糊同研為丸如黍米大每服用倒流水先化一丸滴鼻內良久嚏訖即用薄荷水下一丸治小兒驚癇丹砂牛黃丸方丹砂研雄黃研各半兩牛黃研乾蠍炒龍腦研輕粉水銀沙子硇砂研過水飛各一分上八味並研為末棗肉和丸如粟米大每服三丸至五丸量兒大小加減薄荷湯下治小兒驚癇手足瘛瘲頭項強硬狀如角弓安神散方蠍梢炒一錢半蜈蚣赤腳金者一條輕粉一字烏頭尖生用七個天南星用生薑同搗作餅子焙乾稱半錢麝香龍腦研各一字上七味搗研為散每服一字匕量兒大小加減金銀薄荷湯調下治小兒驚癇風癇手足瘛瘲口眼相引烏蛇牛黃散方烏蛇項下七寸酒浸一宿去皮骨炙稱一錢青黛研二錢蠍梢炒十枚牛黃研半錢麝香研一字硼砂研龍腦研水銀沙子各半錢烏蛇尾酒浸一宿去皮骨炙稱一錢金箔銀箔並研各十片蛇黃煅醋遍墨燒天南星用生薑同搗作餅子焙乾半夏用生薑同搗作餅子焙乾各一錢上一十五味並搗研為散每服半錢匕量兒大小加減金銀薄荷湯調下治小兒驚癇風癇掣動定後再作香耆散方雞舌香研一錢黃耆銼一分丹砂研二錢五靈脂半錢上四味搗研為散每服半錢匕量兒大小加減陳米飲調下治小兒驚癇掣瘲方虎睛一隻或一對生者尤佳上一味細研水調灌之量兒大小加減治小兒驚癇二砂散方夜明砂研一錢丹砂研一錢蠍梢炒七枚輕粉研半錢上四味搗研為散每服半錢匕童子小便並酒各少許調下更量大小加減服治小兒驚癇涎盛搐搦不定褊銀丸方天南星炮半錢青黛研一錢蠍梢炒四十枚粉霜研水銀滑石各一錢半夏七枚用生薑汁煮龍腦研麝香研各半字膩粉研半錢上一十味搗研為末用水浸炊餅和丸如梧桐子大捏作餅子每服一餅至二餅量大小加減服薄荷湯化下治小兒驚癇乳癖萬病丸方雄黃研丹砂麝香研龍腦研蘆薈研木香檳榔銼各一分牛黃研半兩胡黃連一分青黛研半兩巴豆去皮心膜研出油盡桂去粗皮人參各一分上一十三味搗研為末煉蜜丸如小豆大每服一丸至二丸溫水下更量大小加減十五歲以下常服永無諸疾治小兒驚癇腹中乳癖牛黃散方牛黃研一分人參半兩大黃銼炒當歸切焙芍藥甘草炙銼各一兩上六味搗研為散每服一錢匕以水七分煎取三分去滓量兒大小加減溫服微利為度治小兒驚癇積熱痰涎咳嗽青金煎方天南星牛膽內匱者半兩馬牙硝研天竺黃研各一分青黛研一兩龍齒研蟬蛻去土為末各半兩鉛白霜研硼砂研各一分甘草生末三分麝香研一錢龍腦研牛黃研各半錢上一十二味並研勻細煉蜜和為膏瓷合內收每服一小雞頭實大更量兒大小加減薄荷水化下治小兒癇疾鉤藤飲方鉤藤黃芩去黑心犀角鎊各半兩石膏碎龍齒各一兩升麻甘草炙銼各三分竹葉四十片上八味㕮咀如麻豆大每服一錢匕水一盞煎至半盞去滓入麝香少許溫服更量兒大小加減治小兒發癇壯熱大鉤藤飲方鉤藤黃芩去黑心麻黃去節各一兩一分當歸切焙三分龍齒研一兩石膏碎二兩半赤芍藥去黑皮桂去粗皮龍膽去土牛黃研各一兩杏仁去雙仁皮尖麩炒研半兩甘草炙銼一分上一十二味先粗搗篩十味每服三錢匕以水一盞煎至六分去滓下牛黃杏仁加白蜜竹瀝各少許煉如餪湯調服如人行五里再服治小兒驚癇搐搦涎潮昏塞歸魂丸方使君子兩枚以麵裹於慢火中煨候面黃為度去面不用水銀結沙子香墨蘆薈熊膽研臘茶研乳香研龍腦研各一錢蠍梢三七枚炒天竺黃研青黛研丹砂研各半錢輕粉二錢寒食麵一錢半上一十四味同研令勻細滴水和丸如緑豆大每服一丸薄荷蜜水化下如小兒稍覺驚著化半丸與吃若能常服永無驚疾量兒大小加減治小兒末滿月及出月壯熱發癇鉤藤湯方鉤藤一分蚱蟬一枚炙去足頭翅柴胡去苗升麻黃芩去黑心甘草炙銼大黃銼炒各半兩石膏三分碎蛇蛻皮二寸炙上九味粗搗篩每服一錢匕水六分煎至三分去滓入竹瀝數滴更煎一沸溫服治小兒驚癇邪氣身熱嘔吐下痢五色虎睛丸方虎睛一枚研牛黃研麝香研各半分升麻鉤藤生犀角鎊桂去粗皮各一分山梔子一兩蚱蟬炙去頭足翅蜣螂蛇蛻皮五寸燒灰大黃蒸度銼焙二兩上一十二味搗研為末煉蜜丸如梧桐子大每服三丸至五丸食後米飲研下日再治小兒驚癇鎮心丸方銀薄研一百片蜣螂三枚去頭足炙大黃銼炒丹砂研各一兩半升麻黃芩去黑心犀角屑山梔子仁龍齒麥門冬去心焙鐵粉各一兩上一十一味搗研為末煉蜜和丸如梧桐子大食後及乳後新汲水研一丸灌之三歲及五歲兩丸至三丸七歲至十歲五丸如大人患者溫漿水下十五丸如冬月以溫水研灌之治小兒驚癇體虛鉤藤子芩湯方鉤藤黃芩沙參各三分知母焙升麻犀角鎊各一兩蚱蟬二枚炙去翅頭足蛇蛻皮三寸炙柴胡去苗甘草炙銼白朮各半兩上一十一味粗搗篩以水二升煎去滓取六合入蜜二合竹瀝三合再煉如餳每服一錢匕微與服以意量之小兒風癇論曰諸癇之病本於風者名風癇此由乳養失宜氣血不和或汗出腠理開致風邪乘虛而入初得之時發熱身軟時作時省或先屈指如數乃發掣縮是也不可令人持促恐曲戾不隨若先身熱瘛瘲驚啼叫呼而後發其脈浮者為陽癇病屬六腑易治若先身冷不驚不啼而發其脈沉者為陰癇病屬五臟極則難治又有風痙如癇不可不知但身強直反張如尸不時省者宜當消息之治小兒風癇筋脈抽掣夜臥驚悸皮膚壯熱天竺黃散方天竺黃研牛黃研知母銼焙鉤藤銼芍藥犀角鎊微炒升麻龍膽去土柴胡去苗銼防風去叉銼人參各半兩桔梗炒大黃銼炒令香山梔子仁玄參各一兩雄蠶蛾炒白茯苓去黑皮銼蜣螂去足微炙龍骨別搗研如粉各