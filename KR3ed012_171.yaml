蟬丸方蚱蟬炙去翅足一枚大黃煨銼石膏碎柴胡去苗各一兩牛黃研龍齒碎梔子仁升麻芍藥沙參鉤藤各三分杏仁二十一枚湯浸去皮尖雙仁麩炒龍膽半兩丹砂研一兩半上一十四味搗研為末煉蜜和丸如梧桐子大一歲兒每服一丸與服治小兒一歲至十歲發癇成癲發動無時口吐白沫遺失大小便丹砂丸方丹砂研天麻露蜂房微炙麻黃去節黃芩去黑心鉤藤各半兩甘草炙銼防葵炒大黃銼炒蚱蟬去頭足炙龍齒研山梔子仁各一兩銀薄十片細研虎睛研一對羌活去蘆頭柴胡去苗白蘚皮升麻雷丸炒沙參各三分石膏研一兩一分蛇蛻皮炙黃麝香研細辛去苗葉牛黃研各一分上二十五味搗研為末煉蜜為丸如緑豆大一歲兒每服三丸用米飲下空心午間臨臥各一服治小兒諸般癇疾口出白沫黃芩丸方黃芩去黑心梔子仁犀角鎊各一分麝香研一錢虎睛研一隻上五味搗羅為末研細煉蜜和丸如緑豆大每服一歲至二歲兒三丸三歲至五歲兒五丸並米飲下日四服更量大小加減治五六歲兒壯熱發癇五癇湯方大黃銼炒石膏研各一兩蚱蟬微炙三枚柴胡去苗升麻梔子仁麻黃去節黃芩知母焙鉤藤芍藥杏仁去皮尖雙仁別研各半兩蛇蛻三寸炙黃露蜂房微炙一分上一十四味粗搗篩一二歲兒每服一錢匕水半小盞煎至三分入竹瀝半合更煎一兩沸去滓分溫三服至夜服盡隨兒大小以意加減治小兒六七歲發癇壯熱麻黃湯方麻黃去節一兩一分鉤藤皮一兩杏仁湯浸去皮尖雙仁麩炒芍藥桂去粗皮當歸切焙秦艽去苗土各三分石膏研一兩半上八味粗搗篩每服一錢匕水一盞煎至五分去滓分溫二服日四隨兒大小以意加減治小兒發癇手足掣瘲十指戰掉舌本腫強獨活湯方獨活去蘆頭人參各半兩大黃銼炒一兩麻黃去節一分上四味粗搗篩一二歲兒每服半錢匕水半小盞煎至三分去滓溫服連夜三四服隨兒大小以意加減治小兒諸癇石膏崇命湯方石膏研黃芩去黑心芍藥各一分桂去粗皮細辛去苗葉龍骨研當歸切焙乾薑炮大黃銼炒牡蠣煅研赤石脂白石脂各三分甘草炙一兩上一十三味粗搗篩一二歲兒每服半錢匕水半盞入棗一枚擘同煎至三分去滓溫服至夜三四服隨兒大小以意增減治小兒諸癇當歸湯方當歸切焙龍骨研各半分甘草炙三分大黃銼炒芍藥乾薑炮石膏碎桂去粗皮赤石脂黃芩去黑心細辛去苗葉各一分上十一味粗搗篩五歲兒每服一錢匕水一小盞入棗二枚擘同煎至五分去滓分溫二服日三服後瀉者加赤石脂一分若有熱驚者加黃芩去黑心半兩隨兒大小以意加減治小兒諸癇竹瀝湯方竹瀝一合黃芩去黑心一兩一分防己茵芋去粗莖桑寄生羚羊角鎊各一分大黃銼炒二兩甘草炙白薇麻黃去節白蘚皮各半兩上一十一味除竹瀝外粗搗篩每服一錢匕水一小盞煎至五分去滓入竹瀝半合分溫三服至夜服盡量兒大小以意加減治未滿月及出月兒壯熱發癇柴胡湯方柴胡去苗升麻黃芩去黑心甘草炙赤大黃銼炒令香各半兩石膏碎三分鉤藤一分蚱蟬去翅足微炙一枚蛇蛻皮二寸炙令黃色上九味粗搗篩每服一錢匕水一小盞煎至半盞去滓入竹瀝半合更煎一兩沸半月至一月兒斟酌與之稍大以意增加若連發不止加麻黃去節一分治小兒五十日發癇諸藥無效蚱蟬湯方蚱蟬去翅足微炙芍藥各三分鉤藤細辛去苗葉黃芩去黑心黃耆銼甘草炙令赤各半兩牛黃別研麝香別研一分大黃銼炒令香一兩一分蛇蛻二寸炙令黃色上一十一味粗搗篩九味入牛黃麝香拌勻每服半錢量兒大小以意加減治癲癇欲發目暗瘛瘲惡聲嚼舌吐沫雌黃丸方雌黃鉛丹微炒各一兩麝香一錢上三味同研令勻用牛乳半升熬成膏丸如緑豆大每服三丸溫水下日三如無牛乳羊乳亦得治小兒膈上有痰發癇掣瘲牛黃煎方牛黃研半錢人參半兩生犀末硼砂研白茯苓去黑心薄荷乳香研甘草炙銼井泉石研烏金石研生乾地黃焙天麻各一分上一十二味搗研為末用蜜於銀器內熬成煎每服皂子大煎人參湯化日三治時發驚風變成癇疾吐涎散方膩分一兩豬牙皂莢末一分上二味細研令勻每服半錢生油一橡斗水半盞同調勻分二服以吐為度治小兒吐利發癇病吐舌掣縮方鉤藤黃芩去黑心甘草炙各半兩石膏碎龍齒各一兩升麻三分蚱蟬去翅足炙一枚上七味粗搗篩每服一錢匕以水七分入竹葉三片同煎取四分去滓分溫三服至夜令盡七歲全劑三四歲只半劑治小兒五種癇牛癇即牛聲馬癇即馬嘶狗癇即狗吠羊癇則羊鳴雞癇則雞鳴瘥而復作雄黃丸方雄黃研水銀各二兩鉛熬成汁與水銀結作沙子三兩真珠末細研一兩丹砂研半兩上五味同細研為末煉蜜和丸如緑豆大每服四丸金銀薄荷湯下日再服治小兒五種癇手足動搖眼目反視口吐涎沫心神喜驚身體壯熱牛黃散方牛黃研丹砂研白蘞露蜂房微炒杏仁湯浸去皮尖雙仁麩炒黃各一分桂去粗皮半兩上六味搗研為散拌勻每服乳汁調下一字匕日四五服量兒大小加減治小兒諸癇退後不能言排關散方天南星炮上一味搗為細散每服一字匕賙賙豶豬膽汁調下咽入喉中即能言量兒大小加減
