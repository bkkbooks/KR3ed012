body:
  text: 卷第一百六十七小兒門小兒統論論曰小兒初生氣體稚弱膚革不能自充手足不能自衛保護鞠育蓋有所待自受氣至於胚胎由血脈至於形體以至筋骨毛髮腑臟百神漸有所就而後有生蓋未生之初稟受本於父母既生之後斷臍洗浴擇乳襁褓皆有常法謹守其法無所違誤猶或胎氣稟受有強弱骨胳所具有成虧而壽數之修短系焉是以昔人於字乳之法至纖至悉初生之時先去惡血去血之後次與丹蜜惡血在裡則吐利以除之氣有所虧則炙爇以助之或呵臍或衛囟然後飲乳用哺無令傷風無令驚恐庶幾其有成也苟失其養疾疢因之故解顱重齶連齦撮口重舌癲癇口噤躽啼之類得諸胎中驚啼客忤中惡鬾病之類得諸感襲乳哺不節則有癖結哺露丁奚傷飽之患肥甘過度則有諸疳之疾以至風寒暑濕致寇於外五臟六腑感傷於內無不成病者今集慈幼之法自初生至於成童凡證候可調者悉著於篇云小兒初受氣法凡小兒受氣在娠一月胚二月胎三月血脈生四月形體成五月動六月筋骨立七月毛髮生八月腑臟具九月穀氣入胃十月百神備而生生後六十日目瞳子成能咳笑識人百日任脈生能反復百八十日尻骨成能獨坐二百一十日掌骨成能匍匐三百日髓骨成能獨倚三百六十日為一期膝骨成乃能行此是定法若有不依期者必不壽也小兒初生法小兒始生肌膚未成不可暖衣暖即令筋骨緩弱不可不見風日不見風日即令肌膚脆軟衣被宜故絮勿用新綿天氣和暖令乳母與之俱戲日中數見風日則血凝氣剛肌肉硬密堪耐寒暑若常在幃帳重衣溫暖譬如陰地草木軟脆易傷又當薄衣薄衣之法當從秋習之勿於春夏猝然減去恐中風寒冬月常令衣適可禦寒則佳愛而暖之適所以害之也又當消息無令汗出即致虛損晝夜寤寐皆宜慎之其飲食乳哺不能無痰癖常當節適若微不進仍當將護凡不能進乳哺則宜下之不致寒熱也又小兒始生生氣尚盛無有虛勞微惡即須下之所損不足言其益多矣若不時下則疾成難治冬月下之最難將護然有疾者亦不可不下夏月下後腹中常小脹滿當節哺乳護之兒之乳哺宜令多少有常兒稍大食哺自能稍增若減少者是腹中已有小不調便當微與藥勿復哺之但乳之而已甚者十餘日輕者五六日自當如常若都不食哺而但飲乳者此是有癖不可不下不下即致寒熱或吐而發癇或致下痢若先治其輕則病速愈矣小兒有少病癇者母懷孕時役動骨血即令氣強若侍御多血氣微胎養弱即兒軟脆易傷故多病癇兒須多著項衣取燥菊花為枕枕之母乳兒時摸兒風池若壯熱即須熨使微汗微汗不瘥便灸兩風池及背第三椎第五椎每七椎第九椎兩邊各二穴與風池凡為十穴一歲兒七壯兒大者以意增之可至三十壯唯風池特宜多七歲以上多至百壯小兒常切慎護風池風池在頸項筋兩邊有病乃治之尋常不可妄施針灸亦不可輕於吐下緣針灸傷經絡吐下動腑臟故也但當以除熱湯浴之除熱散粉之除熱赤膏摩之又以臍中膏塗之令兒處涼時以新水飲之新生無疾慎不可逆針灸即忍痛動脈因而成癇河洛間土地多寒兒喜病痙其俗生兒三日多逆灸以防之又灸其頰以防噤又決舌下以去血江東吳蜀地溫無此疾古方雖傳有逆針灸之法今人不詳南北之殊便按方用之為害最多惟田舍小兒任其自然皆無此患又云春夏不可下以小兒腑臟軟弱易虛易實下之則下焦必虛上焦生熱熱即增痰自非當下之病不可下也論小兒初生將護法小兒新生出胎便以綿裹指拭口中及舌上青去其惡血此謂之玉銜若不急拭啼聲一發即入腹成血病矣若兒生下不作聲者當取冷水灌之須臾當啼又以蔥白細細鞭之即啼兒之初生速當舉之舉之差晚則令寒中腹內雷鳴仍先浴之後速斷臍不得用刀惟令人隔單衣咬斷兼將暖氣呵七遍然後結之所留臍帶令長至兒足若短即令兒腹中不調常令下痢若先斷臍然後浴者則臍中水而發腹痛其臍斷訖臍連帶中多有蟲宜急去之不爾入腹生疾又尿清者冷也與中水同此當令兒腹痛大啼呼面青黑是中水之過當灸之至八九十壯若輕者但臍腫出汁時時啼呼搗當歸末敷之或炙綿絮熨之有至百日乃愈者又法兒初生宜以父故衣裹之若生女宜以母故衣裹之勿與新帛切須依法令兒長壽小兒取吐胸中惡血法小兒洗浴斷臍䙀抱畢宜取甘草如中指一節許打碎以水二合煮取一合綿沾與兒吮之約得一蜆殼許入腹即止兒當吐去胸中惡汁如得吐余藥更不須與若不得吐可消息與之若更與而又不吐者但稍稍與之令盡一合止如得吐令兒智慧無病一合盡都不吐者是兒胸中無惡血耳勿復與之乃與朱蜜以鎮心神定魂魄也初生兒服朱蜜法小兒初生三日中須與朱蜜只不宜多多則令兒胃冷腹脹喜病陰癇氣急變噤則痙而死也惟以真飛煉丹砂如大豆許赤蜜一蜆殼和之綿沾與兒吮之得三沾止一日吮盡連三日與之則三豆也勿令過此與朱蜜訖可與牛黃如朱蜜多少牛黃益肝膽除邪熱定精神止驚悸避惡氣去百病小兒始哺法小兒新生三日後應開腸胃助穀神可研米作粥飲如乳酪厚薄以大豆許與咽之頻咽三豆許止三日滿七日方與哺凡兒生十日始哺如棗核又十日倍之五十日如彈丸百日如棗令兒無疾哺之太早而多者頭面身體生瘡愈而後發令兒尩弱難長揀乳母法乳母以血氣為乳汁五情善惡血氣所生凡擇乳母欲其喜怒不妄情性和善而已他亦不可求備形色不惡相貌稍通無胡臭癭瘻瘡瘑疥癬白禿癧瘍切唇耳聾齆鼻顛眩等疾便可飲兒乳小兒法凡乳兒不欲太飽飽則嘔吐若太飽者以空乳含之則消夏不去熱乳令兒嘔逆冬不去寒乳令兒咳痢凡欲乳兒先令乳母捏去乳汁挼散熱氣勿令乳汁奔出奔出即令兒噎若噎便出其乳候氣歇定良久復飲之又每侵早捏去宿乳母共兒臥當令兒頭與乳齊乃飲之若頭低乳高則咽飲不快又小兒初生一月內常與豬乳飲為佳乳母忌慎法小兒飲乳則乳母當知禁忌不爾令兒百病由之而生大忌之法春夏不得沖熱與兒乳令發熱疳並嘔逆秋冬不得以冷乳與兒令腹脹羸瘦乳母嗔怒次不得哺兒令患狂邪乳母醉不得哺兒令患驚癇天瘹急風等乳母有孕不堪哺兒令患胎黃及脊疳乳母有疾不得哺兒令患癲癇風病乳母吐後不得哺兒令嘔逆羸瘦乳母傷飽不得哺兒令多熱喘急乳母忌食諸豆及醬熱面生冷之類若兒患疳即不得食羊肉及魚凡乳母不得以褻衣蓋兒頭面及不得以口鼻吹著兒囟衣服忌著新綿百日內不得以油膩手䙀抱及不得令火炙襁褓令兒染熱病若冬中大寒以火炙乾衣被且置地上少時熟挼令冷暖得所然後用之如乳母行房氣息未定便哺兒亦致多病未滿月內所驅使人亦不得令有所犯到兒前恐惡氣觸兒小兒相法兒生枕骨不成者能言而死膝骨不成者能踞而死掌骨不成者匍匐而死踵骨不成者能行而死臏骨不成者能立而死又初生頭四破者不成啼聲散者不成汗不流小便凝如脂者不成此其大略也浴兒法凡新生兒浴法豬膽一枚投湯中令兒終身不患瘡疥湯中勿添生水浴訖斷臍新生兒三日浴法桃根李根梅根各二兩銼上三味以水八升煮二十沸去滓浴之去不祥令兒終身無瘡瘍一方煎成去滓後入麝香末少許治新生小兒驚辟惡浴金骨湯方金一斤虎頭骨一枚上二味以水一斗煮取七升適冷暖浴兒佳凡浴兒闢除惡氣令兒不驚不患瘡疥又浴兒主闢除惡氣兼令兒不驚不患諸瘡疥虎頭骨湯方虎頭骨五兩苦參四兩白芷二兩上三味以水一斗煮二十沸入豬膽汁少許適寒溫浴兒治兒少小身熱李葉湯方李葉不拘多少上一味以水煮熟去滓適寒溫浴兒又方白芷根苗煎湯浴兒良又方苦參煎湯浴兒良治新生兒猝寒熱不住不能服藥用六物莽草湯浴之方莽草丹參蛇床子桂各三兩菖蒲半斤雷丸一斤上六味銼碎以水五升煮三五沸適寒溫浴兒避日向陰處治小兒猝客忤吐下乳哺面青黃色變弦急浴之方錢七十文以水三升煮令有味適寒溫浴兒凡尋常浴兒法上以湯添水著少鹽浴兒後以粉敷之若無事勿數浴恐遇風冷令兒發驚成癇小兒口噤論曰夫小兒初生便得口噤不能飲乳者此由在胎時其母腑臟有熱熏蒸胞胎熱氣入兒心脾致初生後口中忽結熱於舌上如黍米大令兒不能吮乳名之曰噤也治小兒口噤瓜蒂散方瓜蒂七枚全蠍一枚微炒赤小豆二七粒上三味搗羅為散每服粥飲調下半錢匕服後以吐為效量兒大小加減服之治初生兒口噤不開舌不能飲乳方蜘蛛一枚去足及口炙令焦細研豬乳半合上二味將豬乳和蜘蛛末分為三服徐徐灌之治小兒初生口噤不開方上取赤足蜈蚣半枚去足炙令焦研為末以豬乳二合和分三四服與之瘥一方用人乳汁治小兒口噤其病在咽中如麻豆許令兒吐沫不能乳哺水銀方上以水銀如黍米大與兒服覺病不問早晚水銀下咽便愈以意量之不過小麻子許為度百日兒不可過如小麻子許治小兒口噤體熱方上取竹瀝一合令溫分三服瘥又方上取雀屎一枚為末著乳頭上與兒飲瘥又方上取鹿角粉大豆末各少許相和塗乳頭上與兒飲瘥又方上取驢乳二盞豬乳一盞相和煎得一盞半時取少許與兒服瘥又方上取牛口齝草絞汁塗口上瘥又方上取白牛尿塗口中瘥又方上取東行牛口沫塗口及額即止又方上取雞屎白如豆大三枚以水下差小兒撮口論曰小兒初生未滿七日面赤喘促啼聲不出乳哺艱難名為撮口蓋因胎中受風挾熱始生之時氣血未定洗浴當風䙀抱失宜遂成斯疾最為急切宜速治之治小兒初生胎熱撮口麝香散方麝香研丹砂研各一分蛇蛻皮一尺炙令赤為末上三味細研如粉每用半字匕津唾調塗兒唇上日五七次治小兒初生撮口不收乳方蜈蚣一條赤足者上一味去足炙微黃研為細末以乳汁一合調半錢匕分三四服溫灌之治初生小兒撮口不收乳飲烏蛇散方烏蛇酒浸去皮骨炙令黃熟半兩麝香一分研去筋膜上二味將烏蛇搗羅為末同麝香再研勻每服半錢煎荊芥湯調灌之治小兒撮口及發噤方晚蠶蛾二枚炙令黃上一味研為末蜜和塗兒口唇內治小兒初生撮口鉤藤湯方鉤藤升麻黃芩去黑心各半兩蜣螂二枚去翅足微炒上四味粗搗篩每服一錢匕水一小盞入蘆根半分煎取五分去滓放溫徐徐服量兒大小加減治小兒因剪臍傷風致唇青口撮保生散方蜈蚣一條赤足者炙令乾烏頭尖六枚生用麝香研一字上三味除麝香外搗為末同研極細每服半字匕煎金銀薄荷湯調下治小兒撮口方赤足蜈蚣一條棘剛子五枚上二味燒成灰飯和為丸如麻子大每服三丸至五丸乳汁下治小兒臍風撮口丹砂丸方丹砂研麝香研牛黃研各一分半夏湯洗七遍切焙丁香白附子鐵粉研天麻天南星各半兩上九味搗研為末用粳米飯丸如麻子大每服五丸荊芥湯下空心午後各一服量兒大小以意加減治小兒胎風熱撮口發噤牛黃竹瀝散方牛黃研一分淡竹瀝半合上二味每服牛黃一字匕用淡竹瀝調下一二歲兒服之三四歲兒每服半錢日三服量兒大小以意加減小兒鵝口論曰小兒初生口中有白屑如米粟狀鼻外亦有乃至舌上生瘡謂之鵝口此由胎中稟受穀氣偏多既生之後心脾氣熱上熏於口致成斯疾蓋心主舌脾之絡脈散舌下故也治小兒初生連舌下有膜如石榴子中隔連其舌下微微令兒語不發不轉方上以爪摘斷令微有血出無害若血不止可燒發灰作末敷之止治小兒鵝口方上取慄房以井華水濃煮汁以綿纏箸頭沾拭之如無慄房以慄木皮代治小兒鵝口方上取柘木根淨洗細銼五升無根只以弓材亦佳水一升煮取五合去滓更煎二合頻頻拭齒口即瘥治小兒鵝口不能飲乳牛黃散方牛黃一分為末上一味用竹瀝調勻瀝在兒口中治小兒鵝口不能乳方上取白鵝糞以水絞取汁瀝在口中又方上取黍米以水研取汁塗拭之治小兒鵝口並噤白礬散方白礬燒灰丹砂研各一分上二味和研極細敷兒舌上日三次以亂髮揩舌上垢令淨即瘥治小兒鵝口方上以指纏亂髮以溫水掠之三日忽絕甚效治小兒鵝口方上以馬牙硝細研為粉每用一豆大塗舌下日三次小兒重齶論曰小兒初生上齶有物脹起若懸癰或如蘆籜盛水之狀者名曰重齶此乃脾胃挾熱血氣不能收斂令口中舌下或在齶頰如吹小脬速宜以綿纏長針微露鋒芒刺腫處決去惡汁則其病可消若再生亦宜再刺不爾則脹滿口中妨害乳食呼吸不可緩也治小兒重齶重齦腫痛口中涎出牛黃散方牛黃龍腦丹砂各一分太陰玄精石一兩鉛霜半兩上五味各細研為散再和研勻每服半錢匕先於重舌上以鈹針針破出血用鹽湯洗拭口然後摻藥於口中神效又方驢乳豬乳各一合上二味相和煎至二合時時與兒服之又方玄明粉太陰玄精石各一分鉛霜半分上三味同研令細少少敷之又方上以蛇蛻皮燒灰研令細以少許敷之效又方上取露蜂房燒灰細研以水和塗口中立愈又方上取炱煤以水調塗之小兒臍風論曰新生小兒既斷臍之後臍瘡未愈不可外犯風邪及浴水入瘡濕冷䙀抱皆致臍風其候臍腫多啼甚則風行百脈口噤不乳身體反強乃致不救治小兒初生至七日臍風發腫欲落者錦灰散方錦帛燒灰微存性一錢雄鼠糞微炒七枚大棗去核三分麝香研少許上四味搗研為散看臍欲落不落即用藥封之切忌外風入治小兒初生斷臍了便敷此散免一臘內臍風天漿散方天漿子三枚亂髮燒灰存性半錢蜈蚣二寸燒灰羚羊角燒灰一錢麝香一小豆大上五味研令勻細才割臍了使用少許敷之治小兒臍風白龍散方天漿子有蟲者一枚白殭蠶直者炒一枚上二味搗羅為散入膩粉少許以薄荷自然汁調灌之取下毒物神效量兒大小分作二服亦得治小兒臍風腫神灰散方雄鼠糞七枚兩頭尖者是乾薑棗大一塊甑帶一團緋綿胡粉炒如金色白石脂各半兩上六味存性燒為灰相和細研加少許麝香為散看臍欲落不落即封臍便瘥如未患敷之終不患也燒藥時不得令有別灰入治小兒臍風久不瘥腫出汁者牡蠣散方牡蠣一枚蝦蟆一枚上二味並燒為灰細研如粉每以少許敷臍中甚驗治小兒著臍風汁出當歸散方當歸切焙半兩甘草炙銼一分鉛丹研半分上三味除鉛丹外搗為散入鉛丹合研令勻以敷臍中瘥治小兒臍風汁出不止黃柏散方黃柏去粗皮一兩半釜底黑煤研三分亂髮灰研一分上三味先搗黃檗為末入二味合研令勻敷臍中瘥又方當歸切焙上一味搗羅為末時敷之治襁褓中小兒臍風撮口法上視小兒上下齦當口中心處若有白色如豆大此病發之候也急以指爪正當中掐之自外達內掐令匝微血出亦不妨又於白處兩盡頭亦依此掐令內外斷應手當愈兒臍瘡論曰小兒初生當先洗浴然後斷其臍斷臍後便當以熟艾封裹之或灸數壯勿令犯濕若先斷臍後洗浴揩拭不幹或為邪氣所傷或為水入臍中皆致臍瘡也瘡過百日者雖瘥或風邪入里則變為癇矣治小兒臍不幹白礬散方礬石燒灰龍骨各一分上二味細研敷臍中取瘥為度治小兒臍風汁出甘草散方甘草炙銼螻蛄炙焦各一分上二味搗羅為散摻敷臍中瘥治小兒臍赤腫汁出不止白石脂散方白石脂一兩上一味研為散熬令溫撲臍中日三治小兒滿月臍不幹方蝦蟆五枚上一味燒灰撲臍日三治小兒臍中水濕腫赤汁出時時啼呼當歸粉方當歸末胡粉各半兩上二味相和研勻敷臍中仍炙絮熨之以啼呼止為候治小兒臍濕熨方上取鹽豉搗作餅子如錢大於新瓦上熬令熱更互熨之亦可以黃柏末敷之一方用鹽二兩豉二合同搗作餅熨之治小兒臍瘡久不差方干蝦蟆大者一枚燒灰白礬一分燒灰上二味研細每用少許敷之以瘥為度治小兒臍瘡汁出不幹黃柏散方黃柏去粗皮一兩半為末釜下墨研三分亂髮灰研一分上三味同研勻細少少敷之治小兒臍中汁出國老散方甘草炙銼一分當歸焙鉛丹研各半分上三味搗羅二味為散入鉛丹同研勻細撲臍中日三治小兒臍濕逾月不止三灰散方干蝦蟆燒白礬燒皂莢子燒各一分上三味細研少少著臍中治小兒臍久不幹赤腫膿出及清水當歸散方當歸焙上一味為末極細少少著臍中頻用之頃有小兒嘗病臍濕五十餘日用此一敷即干後因尿入瘡復病又一敷愈小兒解顱論曰腎主身之骨髓腦為髓海腎氣和平則骨髓充足骨髓充足則顱囟圓成若腎氣不足則骨髓不充年雖長大頭縫尚開故名解顱亦名囟解治小兒解顱囟大身有痼熱頭面汗出腹脹咳嗽上氣肩息足蹇脛交三歲不行鍾乳丸方鍾乳研粉防風去叉生乾地黃焙牛黃研甘草炙銼漆花各一分上六味搗羅為末以犬腦髓為丸如麻子大每服二丸至三丸米飲下早晨午時日晚各一服更量大小以意加減一方以豚腦丸治小兒解囟細辛散方細辛去苗葉桂去粗皮乾薑炮各一分上三味搗羅為散以乳汁和塗顱上治小兒腦長喜搖頭解顱牛黃丸方牛黃漆花甘草炙銼白朮防風去叉鍾乳粉生乾地黃焙各一分上七味搗羅為末用犬腦髓為丸如麻子大每服二丸至三丸溫水下早晨日午晚後各一服更量兒大小以意加減治小兒解顱囟門開解封囟散方柏子仁炒細辛去苗葉防風去叉白芨各一兩草烏頭炮半兩上五味搗羅為細散乳汁調塗囟開處治小兒解顱不合蟹足散方生蟹足骨焙乾白蘞各半兩上二味搗羅為散乳汁和塗囟上以瘥為度治小兒鼻多涕是腦門為風冷所乘甘菊花湯方甘菊花一兩甘草炙一分防風去叉半兩山茱萸七枚上四味粗搗篩每一錢匕水一盞煎至六分去滓分溫三服早晨日午晚後各一量兒大小以意加減治小兒鼻多涕是腦門為風冷所客細辛膏方細辛去苗葉半兩上一味用油一合同煎令黑色去滓下蠟少許煎化停凝每日三度薄塗囟上治小兒囟開不合合囟散方防風去叉白芨柏子仁各一兩上三味搗羅為散用乳汁調少許塗囟上以合為度治小兒腦長髮大囟開不合臂脛小不能勝頭半夏散方半夏湯洗去滑七遍焙芎藭桂去粗皮各一兩草烏頭十枚炮製去皮臍細辛去苗葉二兩上五味細銼以酒四升漬一宿煮令微熱漉出綿裹溫熨囟上朝暮二三十遍良治小兒腦長囟不合雞血塗方上取丹雄雞一隻將就小兒囟上割其冠使血滴囟訖以赤芍藥末粉血上治小兒解顱腦縫開不合防風丸方防風去叉鍾乳粉牛黃研白朮各半兩熟乾地黃焙甘草炙各三分上六味搗羅為末煉蜜丸如梧桐子大每服二丸溫水化下隨歲數加減服治小兒解顱囟縫不合塗敷膏方蛇蛻燒灰豬頰骨髓各少許上二味調和為膏塗囟上日再易小兒囟陷論曰人之沖氣內圍於胃上通囟頂小兒胃氣衝和則腦髓充成囟頂漸合若胃熱熏蒸腑臟則渴而引飲因致泄利令腑臟血氣虛弱不能上充髓腦所以囟陷也治小兒臟腑壅熱氣血不榮致囟陷者生乾地黃散方生乾地黃焙二兩烏雞骨一兩酥炙黃上二味搗細羅為散粥飲調下半錢匕不拘時候治小兒胃虛血氣不充囟陷當歸湯方當歸切焙白朮人參黃耆銼各一兩訶黎勒煨去核半兩甘草炙銼一分上六味粗搗篩每服一錢匕水七分煎至三分去滓分溫二服不拘時候治小兒氣血虛弱囟陷不平乾地黃丸方熟乾地黃焙芍藥當歸切焙白朮各半兩桂去粗皮一分上五味搗羅為細末煉蜜和丸如黍米大每服七丸粥飲下乳食前量兒大小加減治小兒囟陷方狗頭骨上一味炙令黃搗羅為末雞子清調塗之又方天靈蓋上一味炙令黃搗羅為末生油調塗之治小兒囟陷方豬牙車骨髓上一味煎如膏塗囟上小兒變蒸論曰小兒初生稟受陰陽之氣水為陰火為陽水火相逮而後陰陽變革由胚胎而有血脈由血脈而成形體以至腑臟具精神全無非陰陽水火之氣故三十二日一變六十四日再變且蒸變即上氣蒸即體熱三百二十日而十變五蒸是為小蒸畢又六十四日而一蒸凡四蒸總五百七十六日而變蒸足氣血就每當變蒸則情態異常輕者體熱微汗似有驚候耳髖皆冷重者壯熱脈亂或汗或否大率與溫壯相似特耳與髖不熱為異爾此乃血氣增長無用調治唯忌傍人或致驚動任之五日以上至十日自定或熱甚連數日者服黑散發汗熱不止者服紫霜丸小瘥便止勿夏服之亦有或早或晚不拘日數者亦有臨變蒸時為寒邪所加者寒熱交爭腹痛夭矯必啼呼不止但驗其耳與髖審得其證者或熨痛處後兼以治寒邪之藥治小兒變蒸中挾時行溫病或非變蒸時而得時行者黑散方麻黃去根節沸湯掠過半兩大黃銼炒一分杏仁湯浸去皮尖雙仁麩炒微黃半兩上三味先搗二味為末別研杏仁如脂和散又搗令調勻納密器中一月兒服小豆大一粒以乳汁和服抱令得汗汗出溫粉粉之勿使見風百日兒服如棗核許治小兒變蒸發熱不解紫霜丸方代赭搗研如粉赤石脂搗研如粉各一兩巴豆三十枚去心皮出油盡杏仁五十枚去皮尖雙仁麩炒黃上四味先以巴豆杏仁等別搗如膏和代赭二味末搗二千杵相得入少蜜搗之仍須密器中收三十日兒服如麻子一丸與少乳汁令下食頃後與少乳勿令多至日中當小下熱若未全除明旦更與一丸百日兒服如小豆一丸量兒大小加減小兒夏月多熱令發疹二三十日一服甚佳代赭須真者若無以左顧牡蠣代之治小兒初生血脈盛實寒熱溫壯四肢驚掣發熱大吐唄者若已能進哺飲食不消壯熱及變蒸不解中客人鬾氣並諸驚癇悉療龍膽湯方龍膽鉤藤柴胡去苗赤茯苓去黑皮桔梗炒黃芩去黑心芍藥大黃銼炒各一兩甘草炙銼蜣螂去翅足炙當歸切焙人參各一兩上一十二味粗搗篩一二歲兒每服一錢匕以水五分煎至三分去滓溫服三四歲兒每服一錢半匕水一小盞煎至五分去滓連夜三四服量兒大小加減服之治小兒變蒸經時不止挾熱心煩啼叫不歇骨熱面黃柴胡湯方柴胡去苗甘草炙銼人參玄參各一兩龍膽半兩麥門冬去心焙一兩半上六味粗搗篩每服一錢匕水八分盞煎至四分去滓溫服不拘時更量兒大小加減治小兒變蒸熱氣乘心煩躁啼叫不已及骨蒸煩熱前胡湯方前胡去蘆頭龍膽甘草炙銼人參麥門冬去心焙各一兩上五味粗搗篩每服一錢匕水七分煎至四分去滓食後量大小加減溫服
