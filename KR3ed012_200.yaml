body:
  text: 卷第二百神仙服氣上論曰神仙服氣之術古方不載黃庭內景玉函隱書雖有於世而學者莫得其要故服氣之法率多口傳心授或食從子至巳或飲玉池之津或吐故納新導引按蹺或餐日月或閉所通大抵氣以形載形以氣充氣形充符自然長久所謂保其委和合彼大和者也赤松子服氣序曰天道悠長萬品不齊人生為貴陰陽同階天道坦坦修之不迷世何專愚相隨徘徊生不及踵性命殞頽存亡相感哭泣悲哀何不服氣與仙同棲經曰福莫大生禍莫大死子欲長生腹中當清長生不死腸中無滓是以食谷者智食氣者神故曰休糧絶食為生道陰陽還精為重寶能常行之永壽考何為恣欲自使老神仙食氣常以春二月三月九日十八日二十七日若甲辰乙巳丙辰丁巳王相成滿日行之佳夫行氣欲于山林中幽寂處近東流之泉向陽之地沐浴蘭湯以丹書玉房為丹田方一寸玉房在臍下三寸是精念玉房內視丹田納氣致之於丹田又先去鼻中毛偃臥兩足相去五寸兩臂去身亦五寸瞑目握固握固如嬰兒之卷手蒲蒻為枕高三寸若胸中有病枕高七寸病在臍下可去枕既行氣不復食生菜辛臭物絶谷行氣法當食日減一口十日後可不食不食二日腹中或悁悁苦飢取好棗九枚方寸術餅九枚食之一日一夜不過此也不念食即勿啖也飲水日可五升亦可三升勿絶也口中常含棗核令人愛氣且生津液經曰道者氣也愛氣則得道得道則長生精者神也寶精則神明神明則長存行氣一名煉氣其法正臥徐漱醴泉咽之醴泉者華池也以鼻微微納氣徐引之勿令太極滿入五息已可吐一息屈指數之至九十息若身大煩滿者可頻伸頻伸訖復行之滿四九三百六十息為一周久久衆病自除吐氣既還欲吸之時先復小吐微微往來如是再三更鼻引之不爾令人氣逆凡納氣則氣上升吐氣則氣下流久自覺氣周於身中若行氣未定意中疲倦便煉氣以九十息為一節三九二百七十息為一周行氣令胓胓滿臟無令氣大出閉氣於內九十息一咽咽未足者復滿九十息三九自足無頓數也當念氣使隨髮際上極及流四肢四肢自熱下至三里經曰行氣常以月一日至十五日念氣從手十指出十六日至三十日念氣從足十趾出久自覺氣通手足行之不止身日輕強氣脈柔和榮衛調暢長生之道在於行氣靈龜所以長存服氣故也諸行氣之後或還欲食者初飲米汁粥日增一口以漸加之十日以後可食淖飯勿致飽也經曰行氣之法其初多不和謂令人咳迎四肢或冷既行之久日自益也四九三百六十息身如委衣骨節皆解久久乃覺氣行體中經營周身濡潤形體悅澤皮膚五臟六腑皆悉充滿百病除去凡初行氣之時先安身和體若氣未調身不安者且止和乃行之氣至則形安形安則鼻息調和鼻息調和則清氣來至清氣來至則自覺形熱形熱則頻汗出且勿便起安徐養氣務欲其久諸行氣無令意中有忿怒愁憂忿怒愁憂則氣亂氣亂則逆惟精思則正氣來至正氣來至則口中甘香口中甘香則津液自生而鼻息微長鼻息微長則五臟安五臟安則氣各順理如法為之長生久視也行氣之法以鼻微微引氣納之以口吐之此為長息納氣有一吸也吐氣有六呼也吹也嘻也呵也噓也呬也凡人之息一呼一吸無有此數行道之法時寒可吹時溫可呼吹以去熱呼以去風呵以去煩嘻以下氣噓以散滯呬以解極夫人之極率多噓呬噓呬者長息之忌道家行氣之所惡也夫欲長生三一當明上一在泥丸中中一在絳宮中下一在丹田中修真之土當知此夜半至日中為生氣日中至人定為死氣常以生氣時強臥瞑目握固閉口不息心數至二百乃口中微吐氣出之日增其數數得滿二百五十即絳宮守泥丸滿丹田成數得滿三百則華蓋明耳目徹身無疾邪不能幹長生不死也閉氣之法以鼻微微引納之數滿於口中微吐之小吐即更以鼻小引咽之如此再三可長吐之飢取食止絶谷長久若閉氣數得至千五百則氣但從鼻入通行四肢不復從口出也行之不止仙道成矣行五行氣法春以丙日時加巳食氣百二十致氣於心令心勝肺無令肺傷肝此養肝之時也春有九丙凡一千八十食氣夏以戊日時加未食氣百二十以助脾令勝腎使腎不傷心數亦如上季夏庚日時加申食氣百二十以助肺令勝肝使肝不傷脾月有三戊凡三百六十食氣秋以壬日時加亥食氣百二十以助腎令勝心使心不傷肺秋有九壬行亦加上冬以甲日時加寅食氣百二十以助肝令勝脾使脾不傷腎此五行食氣之要法也四時各有一千八十食氣各以養其臟周而復始令不相剋為之精者還自內見其五臟矣經曰道以精為寶施與則生人留己則生身身生則得仙生人則功遂天地有陰陽陰陽人所貴貴之合於道愛之慎無費故精者血脈之川流守骨之靈神也是以精去則骨枯骨枯則身斃人以身為國以神為君以精為臣以氣為民故氣變則為精精化則為神神化為嬰兒嬰兒上為真人夫天有三光日月星人有三寶三丹田兩眉間卻入一寸為明堂二寸為洞房三寸為丹田此為上元其一赤子字元先一名帝卿心為絳宮中丹田此為中元其一真人字子丹一名光堅臍下三寸下丹田此為下元其一嬰兒字元陽一名谷元此三一也行氣則常存念之神仙絶谷十二時食氣法始從夜半九九八十一咽日出六六三十六咽日中九九八十一咽日入六六三十六咽雞鳴八八六十四咽食時五五二十五咽日昳八八六十四咽黃昏五五二十五咽平旦七七四十九咽禺中四四一十六咽晡時七七四十九咽人定四四一十六咽黃庭經曰玉池清水灌靈根子能修之命常存飲食自然補命門自然者華池也呼吸如法咽之即不飢常以夜半食生氣九九八十一咽以次下周十二時為五百四十二咽不飢初絶谷三日小極七日又小極十四日復小極頭眩慎勿怪也三七二十一日則氣力日增神仙絶穀食五行氣法東方青牙服食青牙飲以朝華祝已舌撩上齒表舐唇漱口咽之三南方朱丹服食朱丹飲以丹池祝已舌撩下齒表漱口而咽之三西方明石服食明石飲以靈液祝已琢齒七漱口咽之三北方元滋服食元滋飲以玉飴祝已以鼻納氣而咽之三中央戊己仰望泰山服食精氣以醴泉祝已瞑目而咽之三食五行氣內附五臟青牙者肝也朝華者上齒根也朱丹者心也丹池者下齒根也明石者肺也靈液者唇里津也元滋者腎也玉飴者舌也泰山者精氣也醴泉在齒後懸雍前華池在舌本下齒名玉英舌名金梁夫食五行氣飢取飽止無時節也雖服五行當以六戊為主朝食三十暮食三十取飽而已日月短長增減在己服六戊法平旦早起正衣服先讀甲子至戊辰止向辰以金梁叩玉英滌華池漱醴泉吸靈液閉口周旋三至而一咽五咽止次甲戌至戊寅向寅行之如上法盡六戊凡百五十取氣而三十咽其精華也此是服三五之法要朝暮為之若飢者日中餉九宮餉九宮之法金梁叩玉英三五而一咽之便止下盡六戊皆如行三五七九引氣法諸避世入山欲絶谷不食先知引三五七九之氣又當知六甲六丁不爾者但坐家修身食三五七九氣口吐死氣日日不止可以長生爾引三五七九之法徐徐以鼻微引氣納之三以口一吐死氣勿令耳聞氣出入聲也久久便三氣次復引五氣以口一吐死氣久久便五氣次引七氣以鼻納之以口一吐死氣久久復便七氣者次引九氣鼻微入之以口一吐死氣久久盡便九氣者因三五七九而並引之以鼻二十四引氣納之復以口一吐死氣久久能皆便三五七九者因並引並引之者並行二十四氣常咽之也久久復便並引者因逆報之法逆報之法因從九數引氣咽之下到三乃以口一吐死氣也久久復便逆引者因可九九八十一納咽氣而一吐之以為節也口中以去死氣也但閉氣行三五七九之數如上引氣之法也閉氣之時當苦體中滿發煩閉以意推排令氣周布四肢上至頭中遍行一身意得之者手足皆熱常汗出此為行氣之中最妙者也若得其道病可立去不得其道則氣不來病亦隨至不可不慎以意消息令體中和平安穩乃可為之不爾則輕夭人命諸行氣取之勿令粗粗者使人心痛咳逆而又不得清微之氣但惡氣入身吹噓嘻呵亦務令細不細則傷人肺氣之出入勿令耳聞常欲向日吸之春月多懈極可嘻去之若氣逆可呵下之是以呵以去煩又以下氣也經曰行氣絶谷休糧一旬精氣微弱顏色萎黃二旬動作眩瞑肢節悵悵大便苦難小便赤黃或時下痢前剛後溏三旬身體消瘦重難以行四旬顏色轉悅心志安康五旬五臟調和精氣內養六旬體復如故機關調良七旬心惡喧譁志願高翔八旬恬淡寂寞信明術方九旬榮華潤澤聲音洪章十旬正氣皆至其效日昌修之不止年壽延長三年之後炙瘢除滅顏色有光行之六年髓填骨強豫知存亡經歷九年役使鬼神玉女侍旁腦實脅胼不可復傷號曰真人上佐上皇與天同壽日月齊光傳非其人身受其殃可傳當傳不可當止可傳而不傳為遏天道不可傳而傳為泄天寶遏道泄寶命不終老神仙服氣中神仙服氣法存心如嬰兒在母胎十月成就筋骨和柔以心息念和氣自至呼吸如法咽之不飢百毛孔開息無壅滯常取六陽時食生氣則氣力日增矣取陽時法半夜子服九九八十一平旦寅服八八六十四食時辰服七七四十九正中午服六六三十六晡時申服五五二十五黃昏戌服四四一十六夫服氣法須能去氣去氣須依門戶出入鼻為天門服氣魂魄歸天門口為地戶服氣魂魄歸地戶黃庭經云百穀之實土地精五味外美邪魔腥玉池清水灌靈根子能修之補命門從鼻口出入即為順氣依此不輟下卻三尸舍榮去愛日漸成功始近道矣真人本性幽閒發言合道心行無瑕漱咽靈津服之百味自足通三焦理正氣氣自周遍大通五臟骨髓堅溢夫道為萬氣之主道者氣也氣為精門能保精氣精氣兩足是名真人人有三丹田其中各有三神氣漏即精泄精泄即神傷精者物之真長生之根精全則氣全精泄則氣泄唯精與氣須保全之凡入氣為陰出氣為陽此二者服日月精華也外內自安靜安靜即神定神定即氣和氣和即元氣自至元氣自至即五臟滋潤五臟滋潤即百脈流通百脈流通即津液上應津液上應即不思五味絶飢渴氣化為血血化為髓一年易氣二年易血三年易脈四年易肉五年易髓六年易骨七年易發八年易筋九年易形為真煉九還通於仙矣真理六氣訣噓屬肝呵屬心呬屬肺吹屬腎呼屬脾嘻屬三焦六氣各有所理五臟有疾皆屬於心心主呵諸疾皆可愈初學人但食少淡粥或胡麻益氣生津液忌吃熱食悖亂正氣凡欲食先服三五咽氣與食作主人兼每早先服二十顆椒清酒一杯冬溫夏冷戒在過度切忌沖見新産死亡及食油膩肥鮮臭穢等物凡服氣靜定安坐寂然瞑目叩齒閉口鼓腹令氣滿口即咽至九下一息春夏服冷氣秋冬服暖氣每至五更兩掌掩口用力呵掌中津液生即摩拭面目令得光澤時時含棗蜜湯助之日日減食朝朝服氣氣即易成昔人謂飢食自然氣渴飲華池漿者此也神仙服氣下服氣法凡欲服氣即正腳臥先叩齒三十六下吐去濁惡氣即上下卷肚七下左右亦如之各七度此名煉氣除萬病即閉氣令內不出外不入鼓腹令氣滿及微閉三五咽以下為一歇咽多為佳每咽皆以意送至下丹田臍下三寸是亦名氣海至十歇以上氣漸通二十歇即腹中大轉如減食大妙從子至巳六時為陽氣生氣在外從午至亥六時為陰氣生氣在內凡吐去濁氣若陽時鼻微微引外氣長取之行下丹田飽閉之令極口中微微吐之任依常息若陰時但閉口內咽之以飽任依常息如有他疾即依六氣調適之若遇惡陰重霧雷電只得內咽不得取外氣凡服氣先導引為佳每日能咽得三五十咽津液勝服諸藥凡運氣如屋漏注連相續送至病處若患時疾瘴氣但能引外氣呵去之立效凡服氣飲一兩合暖水水是氣母又每食前飲少暖水久久耐寒暑飲多不妨凡為道者當淨盥漱勿任情性節減滋味不欲勞形疲體高聲叫呼嗔怒喜樂憂悲觸冒寒暑乃可返老還童凡初服氣必須心意坦然勿疑勿畏若有畏懼氣即難行若四體調和意自欣樂不羡一切事即日勝一日快樂無極不得思食若忽思食必須抑捺如不在意抑捺即邪干矣可用薜荔煮湯入生薑少許更煮一兩沸服其飢渴即姜蜜湯亦得若能自抑捺終日對嘉饌亦無所苦凡服氣但不失時節丹田當滿縱出人事亦不可廢行之日久雖失一時亦無所覺若服氣成者終日不服氣氣亦自足至妙不可窮盡服氣得臍下丹田常滿雖叫呼讀誦終日語言其氣力不少衰但可行步出入少時令氣下大妙凡服氣成欲食食亦不妨亦不障氣氣還作聲直至臍下一成以後兼食行氣皆無窒礙凡服氣欲得身中百物不食腸中滓穢既盡氣即易行能忍心久作自覺精神有異四體日勝腸中既淨即閉目內視五臟歷歷分明知其處所然後五臟可安神常自衛久可別人善惡視表如里亦能驅使五臟之神以治人病其內息法用氣日久即得多時若兼食飲酒漿等即內息不成其有宿患但用意並氣注之患處不過三五日必愈若四肢有患亦可想氣以攻之即其病隨散然初攻病時當利五色膿亦無足怪也凡服氣面腫者為飲淡水上衝氣壅不行所以如此食中尤忌胡荽藝臺邪蒿韭薤菠薐蔥蒜此物皆木之精能損脾亂氣大不可食夫恚怒傷魂猝哀驚魄哭泣之事至人不為必不得已而為之可登時於一淨處晏坐安心用氣排惡氣盡出然後依法服元氣使足又服丹田中氣使足凡腸長者氣易固腸短者難固如腸中攪轉作聲即須右脅著床以右手枝頭以左手牽腳令屈直身及直右腳咽氣令人右腳中出腸中即可久行氣每下作聲聲繞盤屈於腸屈處作聲皆自記得屈處其聲流轉呦呦然小聲即是流通腸中四緣又有節坎有二十四坎久行每氣下即覺在節坎坎數亦自記得元氣與外氣不相雜若咽生風須叟即從下泄出不得停腸中神仙煉丹論曰穀神論云含津煉氣吐故納新上入泥丸下注丹田謂之內丹陽龍陰虎木液金精二氣交會烹煉而成謂之外丹修真之士先成內丹後煉外藥內外相應則神仙可致然丹藥之妙自昔神仙不以語人故世之所傳者亦寡今掇其傳於世者載於篇云神仙中品黃龍丹方赤石脂十兩黃牛乳汁三升乳香通明者一斤白砂蜜一斤甘草三兩末白粳米三斗五升分作五次炊藥以熟為度上六味將赤石脂為末以生絹夾袋子貯之於甘水淨盆內浸半日以手揉擺在水中候澄下刮入紙箱中控干取五兩精細者入銀合內盛之第一次於上七日淘米七升如炊飯相似安藥在內炊之飯熟為度夜中去其合蓋露之星辰下一宿第二次於月望日依前法炊之亦去其合蓋夜露月明中一宿第三次於二十四日早辰依前法炊之去其合蓋於日中曝之要取日月星辰之氣足第四次先將牛乳三升入大合內於慢炭火上逼令如魚眼沸下乳香候化次入前三次炊者赤石脂末用柳木篦攪令勻傾於乳鉢內細研復入合依前用米七升安合在內炊之米熟為度第五次以蜜二斤入合內依前慢火逼之如魚眼沸即下前藥不住手用柳木篦攪勻入甘草末三兩同熬令帶濕便住再用米七升安藥合在內炊之米熟為度取合於新水盆內浸半日取出於淨處頓初服時選天德日欲明時空心焚香面東七拜以好酒調下一匙許此乃出世延年仙丹無金石之毒亦無誤生之理服食之後乃是四氣調和經絡無滯但許傳授度人不可規利則其效神速晉廣平中華嶽朱山人自幼慕道年六十餘遊鐘山遇異人授此丹信而服之至唐龍紀改元寓楊州開元觀時已數百歲矣復授道士周重興且曰此丹服之旬余自覺臟腑通快精神清爽凡風勞氣冷一切大病悉皆除去若及兩料腸變為筋可與天地齊久凡人須先養脾脾王則肝榮肝榮則心壯心壯則肺盛肺盛則元臟實元臟實則根本固是謂深根固蒂長生久視之道也修合用新潔器可盛一兩藥銀合一隻可盛伍鬥物銀合一隻新瓦盆三隻可盛一斗物木甑一隻蓋甑盆一隻新淨鍋灶一副新淨乳鉢一副銀匙一柄銀小杓兒一枚細竹小草籬兒一枚柳木篦一枚淨木柴一百斤起死扶衰延齡卻老神仙返魂丹方丹砂雄黃雌黃各三兩上三味先細研雄黃雌黃二味用竹筒盛埋北方地中三日取出先傾出一半當心置丹砂亦研令細卻用傾出一半蓋之又用雲母粉雲母粉用絹袋子揉洗出曝乾塞筒子口埋地內只露筒口用炭火於筒口畔圍之緩緩燒三七日養化成水為度傾藥水盛銅器內垂井中五日無井只用深盆中盛水三四寸更置大豆半升在內即安藥器於水上浸五日亦得然後逐夜於露下露之才日出收候藥水赤色可丸即丸如胡麻子大密收貯若有人猝死者安在口中即活生人服者終身無病每月旦日服一丸若中毒藥其毒自吐出凡有七名一曰返魂二曰再生三曰追命四曰固壽五曰來蘇六曰知命七曰得道其功不可具言此乃錢忠懿王所傳輕身卻老強力悅色長壽真人素丹砂方丹砂成塊者四兩青鹽半斤硇砂一兩別研分作三分磁石一斤大火煅四十九度逐度釅醋淬上四味先將磁石青鹽同為末醋拌令浥浥分作四分先一停鋪合底將丹砂如蓮子排一重同硇砂一分糝蓋了上有磁石青鹽蓋之又布丹砂如前都三層著餘一分藥末蓋之按令實先用瓦子一片蓋合更用淨磚一片安爐底灰四寸鋪磚上乃坐藥合於灰上更用灰蓋合上四面各及四寸切在子細用頂火四兩養七日待冷取出除瓦片卻用元合蓋蓋卻用赤石脂固口了更用鹽鉛丹白蚯蚓糞紙筋和搗遍固合四面令極牢了依前坐爐中磚上以灰蓋用生熟火三斤以上鍛通赤良久退火用灰五升罨卻待冷取輕輕鑿開取砂看伏火如灰色一塊塊除卻匱硃砂不折是第一轉也更用硇砂一兩青鹽半斤二味熟研如粉入少許水研如糊入前匱中和拌令乾濕得所准前法布砂鋪藥卻不固濟只合定入灰池中用火三兩養之一復時可五度添火勿令絶養七日息火待冷取出砂看紫色佳是第二轉也只是較脆即將搗研如粉入青鹽少許同研了即以重抄紙裹可半彈子大以線系定用醋磨京墨重重厚塗曬令徹里干坐丸子於合內定不固濟上以灰勻蓋只用三兩火養三復時大火五斤以上煅通赤冷取其砂丸當如雪色是第三轉也成矣取砂淘洗去鹽味焙乾用真牛乳一合並砂入有節青竹筒內以油絹裹筒口緊墜於井內七日取曬乾研如粉煮棗肉拌為丸如緑豆大甲辰日齊潔焚香服一丸每日加一丸至第七日卻減至一丸又加之如初至六十日有應效至一年身輕健三年行如奔馬力過百夫久服長生能運氣脈為地仙矣顏如童子齒落更生發白再黑忌羊血死肉魚鮓安心辟邪治一切惡氣太清四扇丹方丹砂四兩碎如麻豆上巳日採桃花二十兩真蜜一斤同入銀器中重湯煮至五月朔日以新井水淘滌淨取砂令童子面東研之騏驎竭四兩選真者五月二日入丹砂中研沒藥四兩透明者五月三日入丹砂研麝香四兩全以當門子五月四日入丹砂同研上四味先取上黨人參一兩甘草一分並細銼五月一日日未出時採露水一升真蜜三兩同浸之至端午日熬水至半去滓入大麥面作糊和藥稍硬劑之丸如楝實大每以沉香溫水二合嚼下一粒或半粒補心導血駐顏益氣調和百脈去邪氣尤闢時疫若疫歲即全家齊潔旦起面東以井華水各人嚼下一粒斷不染疫久服則心安無夢邪氣不犯面有紅光合時忌女人貓犬厭穢常於淨潔處藏之一名通神保明丹兼治婦人血氣衝心疼痛丈夫元氣及一切惡氣等並生薑酒下婦人炒姜醋湯下痁瘧臘茶下一粒或半粒量疾大小服輕身延年神仙太一火鍛丹方聖知子煎掠取白花焙乾研二斤絳礬細研五兩硝石五兩細研分作十分每一度煅入一分麻油一百兩分作十分第一度煅入一分上四味先將礬鹽入硝一分拌和研勻用麻油十兩和了入固濟五升瓶內以炭火十斤煅將瓦蓋瓶焰絶炭盡為度取出細研更入硝一分油一分准前用炭十斤煅盡如此十度計用炭一百斤足後取藥搗羅為末旋取少許細研湯浸蒸餅和丸如梧桐子大每服十丸加至二十丸空心冷水下久服衆疾皆愈髭發如漆筋骨輕健耳目聰明元方云服一年日行二百里五年通仙延年益壽悅顏色堅臟腑壯腰腳益血固精神仙靈砂丹方水銀四兩硫黃一兩半上二味先熔開硫黃即投水銀以鐵匙炒作青沙子稱定四兩如重再炒去盡黃乃已方用煅藥合子一隻口差小者入青沙在內用新茶盞一隻底差大平淨而厚者盛新汲水七分許安盛沙合上以細羅赤石脂末水拌作泥厚黏外縫令周密合下坐熟火猛炎得所微扇熁之盞中水耗旋添令常有約半日許令火自冷取起盞底成靈沙一簇打下稱得多少未盡者再用火依前熁之沙成以絹袋盛水煮三五沸或浸半日漉於細研如粉水煮半夏糊為丸如梧桐子大每服一丸空心井水下直到中脘旋下丹田當覺溫暖忌羊血補精育神延年悅色神仙伏火內固丹方丹砂一兩錫藺脂一兩上二味以漿水二碗同煮水盡為度用沙合子一枚將煮過沙用蜜滾過使白附子末再滾為衣卻用黑附子末水調裹砂在心中上下用蜀椒鋪底蓋滿合子又用油調蛤粉固濟口縫外用鹽泥紙筋封固俟乾用炭火五斤煅火盡候冷取出用紙裹丹砂入地竅埋一宿取出細研以糯米作糊丸如梧桐子大每日一粒清淨冷水下久服無毒神仙益壽二氣丹方丹砂二兩水銀一兩同研百合花夜合花干菊花槐花不拘多少同為末上六味用小瓷合將四花末於合下用一半次入丹砂水銀緊捺更用知母末蓋合定赤石脂固縫鹽泥固濟候乾一磚上用醋灰都裹定炭三五斤煅頂火炭盡為度候冷取出細研油單裹垂入井水中浸三宿出火氣次取出蒸三遍出水氣次用棗肉丸如緑豆大每服一丸二丸酒下延年兼治諸般氣疾久服身中更不出蟲蝨
