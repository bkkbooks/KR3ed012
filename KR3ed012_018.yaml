畢出藥罐方始泥合縫又加火至三斤仍舊去罐遠近亦三復時至滿日平明用火五斤簇藥罐子燒令通赤一食頃便去火用灰培罐子上次用濕土罯蓋令實至來日平明取出藥細研用重熟帛帶濕包裹藥置於淨新濕土內培罯三復時每日夜三次細灑水於土上常以大盆合蓋俟出火毒日足別密縫一夾絹袋貯藥於銀石器中用水二斗甘草一斤搗為末上垂藥袋不得到底煮一復時取出焙乾再研如粉與後十九味草藥末同研勻用蒸棗肉丸如櫻桃大每服一丸用苦參黃連浸酒三合磨下治一切毒風豆淋酒下半丸日二夜一其煮藥甘草水有瘡痍疥癬風熱毒聚淋洗即瘥一應癱瘓角弓反張身有𤸷痹急風渾身瘙癢走注疼痛破傷等風服訖蓋覆出汗遍身𤸷腫不散樺皮灰酒驚癇煎金銀湯腸風瀉血煎荊芥湯小兒天瘹煎薄荷湯酒相解磨一丸分五服小兒夜啼驚悸研丹砂水磨一丸分八服仍以半丸入緋袋與男左女右系在臂上唐新録云天台老人付此方於金仙道士進明皇帝至咸通時始傳於世治大風癩神效桑柳煎丸方東引桑枝十二月採東引柳枝正月採各二斤干槐子十月採一斤各銼如豆粒大上三味用童子小便二斗春秋夏浸經兩日冬浸七日別用長流水五斗泉水二斗同煎至一斗絞取汁更煎至五升入白蜜五合又煎如稠餳以瓷合盛經一宿後服余藥滓陰乾入熟絹袋收取桃仁吳茱萸各二兩生用與藥滓三兩半同入鍋內炒黃乘熱入瓷瓶重紙蓋口緊繫一復時擇去桃仁茱萸不用只用煎滓三兩卻加原蠶砂乾白椹仙靈脾牛膝防風各三兩同搗羅為末煉蜜丸如梧桐子大每服取前煎三錢至五錢匕用熱酒五合調化下二十丸空心食前夜臥各一服別更入紅雪或經火朴硝尤佳治大風惡疾滑泄精氣麋角散方麋角半斤先用桑柴灰二斗煎湯淋取汁三斗次截糜角入灰汁中慢火煮盡汁為度候乾取四兩用蘆薈赤箭蠍梢酒炒麝香研附子炮裂去皮臍各半兩乾薑炮一分上七味搗研為散每用五錢匕入好臘茶末七錢匕和勻凡患此疾鼻梁未倒語聲未轉精氣滑泄者取藥末一錢匕用荊芥薄荷湯如茶點熱服覺藥力緊每點入鹽少許要出汗即熱服厚衣覆出汗慎外風治大風疾四肢不收不能反復兩眉中疼痛身重腦急筋攣不可行履時發寒熱足踹似錐刀所刺此皆飲酒露臥傷於風濕從下上衝腹背強直𤸷痹營衛不足精氣虛弱血脈壅塞怵惕不樂囊下冷濕石斛散方石斛去根二兩半萆薢炒柏子仁各三分附子炮裂去皮臍一兩石龍芮炙杜仲去粗皮炙澤瀉牛膝去苗酒浸切焙芍藥雲母粉防風去叉山茱萸細辛去苗葉各三分菟絲子酒浸別搗一兩一分桂去粗皮一兩半上一十五味搗羅為散每服一錢至二錢匕空腹食前用溫酒下治大風癩天麻丸方天麻白茯苓去黑皮各二兩白附子炮一兩半白芷芎藭各二兩附子炮裂去皮臍一兩防風去叉二兩細辛去苗葉半兩獨活去蘆頭白殭蠶炒桔梗炒馬牙硝研各一兩丹砂研三分白龍骨一兩牛黃研一分麝香研半兩上一十六味除研外搗羅為末次將別研藥和勻煉蜜為丸如梧桐子大每服七丸至十丸溫酒下空心日午臨臥服治一切風要出汗即炒豆淋酒下厚衣蓋覆治大風癩面上生瘡身多盜汗腹痛黃耆丸方黃耆銼防風去叉丹參去苗土白朮白茯苓去黑皮芎藭枳殼去瓤麩炒山梔子去皮蒺藜子炒去角赤芍藥知母焙地骨皮黃芩去黑心柴胡去苗苦參生乾地黃焙各三兩上一十六味搗羅為末煉蜜為丸如梧桐子大每服二十丸空心日午夜臥用溫水下治大風癩白殭蠶丸方白殭蠶炒蛇蛻燒灰皂莢刺燒灰蝦蟆燒灰防風去叉薄荷根銼茵陳根銼蘭香根銼蜥蜴炙腰帶皮灰皮巾子灰各半兩上一十一味除為灰五味外搗羅為末拌和令勻用烏蛇卵為丸如梧桐子大每服二十丸空腹酒下無蛇卵用烏蛇肉為末酒煎如糊為丸亦得治大風癩病烏麻子丸方烏麻子一斗九蒸九曝別搗天麻去苗二兩丁香乳香別研各一兩蘇枋木黃櫨木各五兩內黃櫨木細銼以新汲水一斗瓷甕內浸二七日漉出焙其浸木水留之上六味搗研為末拌勻用赤黍米一升淨淘以浸木水煮為稠粥研膏熟杵為丸如梧桐子大每服二十丸至三十丸食後用漿水下日二夜一治大風耳穴鼻梁倒壞還肌煎方杜落崖一稱亦名克頗草無灰酒五斗上二味和根莖葉細銼置鍋內旋入酒煮令稠濾去滓再熬成膏入新瓷器盛更取桑東南根汁別收之有患者與前膏各一匙許以無灰熱酒調下厚衣被蓋出汗仍於密室內服藥至醉醒後以溫桑枝水洗其壞肉著綿衣勿令當風治大風癩及熱毒風瘑瘡疥癩苦參丸方苦參於九月末旬掘出根去黑皮曝乾用粉一斤枳殼去瓤麩炒六兩上二味搗羅為末煉蜜為丸如梧桐子大每服三十丸患冷者以溫酒下余以粟米飲或淡漿水下食後服日二夜一若苦參根皮薄者即連皮用但細銼搗取粉棄滓不可用治大風癩疾胡麻續肌散方胡麻半升天麻二兩乳香三分別研上三味搗羅二味為細散入乳香和勻每服二錢匕用荊芥臘茶調下慎房室鹽酒一百日服藥半月後兩腰眼中灸二七壯次常服補藥治大風癩病神虎丸方烏頭生去皮臍莨菪子吳茱萸湯洗七遍黑豆生去皮等分上四味搗羅為末滴水為丸如梧桐子大每服十五丸冷水下日三如瘡膿血潰爛甚者更用後藥蛇床子散治大風癩病蛇床子散洗方蛇床子莨菪子等分上二味搗羅為散每量多少濃煎汁洗瘡逐日服神虎丸十日瘡漸干半月後鬚眉漸生如風癩眼不見物病退更服後千金散治大風癩病千金散方皂莢刺燒灰大黃九蒸九曝乾上二味各為散每用大黃末一錢匕以水七分煎令沸調皂莢刺灰二錢匕食後臨臥服日三鼻壞指落者亦治治大風癩鱟魚膽散方鱟魚膽白礬緑礬各生用膩粉水銀麝香各半兩上六味一處細研時點少許水研水銀星盡為度每服一錢至二錢匕井華水空心調下至午未時腹空更一服後咳出稠黏涕唾或瀉下五色毒涎為效一月內可三度服若牙疼齒縫中涎出乃愈更量人虛實用之治大風癩疾黑豆方黑豆二升細粒者天雄去皮臍生用五兩烏頭去皮臍生用七兩上三味銼烏頭天雄如豆粒大用水二斗慢火煎至七升去滓浸黑豆二升一復時漉出曝乾更浸更曝以滲盡汁為度曝取干每服三枚至七枚空心食前用酒下日二服唇口不𤸷即夜深更一服治大風癩病身體面目俱有瘡痍惡汁自出艾蒿溫酒方白艾蒿十束每束如升許大淨擇水洗細銼上一味煮取濃汁拌曲米一如常醞法酒熟去糟取清酒稍稍飲之令常醺醺然治大風癩病天門冬丸方天門冬去心生用五斗研絞取汁上一味內瓷器中密蓋口以蠟封勿走藥氣於淨室中經一年取開其色赤如沙糖即入少苦參粉及乾地黃末為丸如梧桐子大每服十丸溫熟水下食後服治大風癩疾百花煎方白蜜二十兩石榴七顆甜者並皮用生薑去皮細切八兩上三味先研生薑石榴絞取自然汁更濾令淨入蜜盛於瓷瓶以蠟紙封口勿令通氣垂繫於釜中勿到底以重湯煎一復時成煎空心酒調二錢匕漸加至三錢匕日二夜一旬日內有惡物隨便而出是病根散矣治大風癩病面赤疹起手足攣急身發瘡痍及指節已落者黃精煎方黃精生者十二斤白蜜五斤生地黃肥者五斤上三味先將黃精生地黃洗淨細銼以木石杵臼搗熟復研爛入水三斗絞取汁置銀銅器中和蜜攪勻煎之成稠煎為度每用溫酒調化二錢匕至三錢匕日三夜一久服風癩痊平面如童子延年不老治大風疾鼻壞者神效方萆麻子去皮切為兩片黃連去須銼各五兩上二味用水一處浸七宿後空心日午臨臥只用浸藥水吞下萆麻一片子水盡旋添勿令乾治大風癩疾聖效散淋泄方馬棘葉三斤上一味搗為細末夏月取馬棘青葉與乾末同搗捏作餅子曝乾再為細末每用三兩水十五碗煎取沸濾入大盆淋泄遍身及偏泄肉損爛處日三次不過半月肌體復完治大風疾取五色蟲諸石丸方金星石銀星石雲母石禹餘糧石滑石自然銅磁石生乾地黃龍仙石出齊州又名龍涎石陽起石密陀僧凝水石各一兩上一十二味搗碎以罐子盛用炭火十斤煅以火盡為度取出搗研為末醋煎麵糊為丸如小豆大每服十五丸用後補藥下補藥茯苓散方白茯苓去黑皮人參天麻苗木香枸杞根狗脊去毛天麻芎藭蓬莪朮景天護火草是也青葙子海桐皮各一兩銼上一十二味各生用搗羅為散每服二錢匕白花蛇酒調下前丸藥日三服忌雞豬魚蒜一百日當見大效治大風疾愈風丸方白牽牛半生半炒虎骨炙醋淬各一兩山梔子仁甘菊花當歸切焙骨碎補白芥子各半兩草烏頭三兩內一兩童子小便浸三日餘二兩以桑柴燒為灰地龍去土硇砂研各一分牛膝酒浸切焙肉蓯蓉酒浸切焙麻黃去根節自然銅煅醋淬七遍萆薢地骨皮各一兩烏頭炮裂去皮臍楓香脂炒葫蘆巴炒各半兩上一十九味搗研為末醋煮麵糊和丸如梧桐子大每服三十丸溫酒下空心日中臨臥各一服加至五十丸第三日用淋泄藥淋泄藥方干茄子莖黍穰艾葉各一兩上三味細銼濃煎湯淋泄三日一次並常服墜涎丸墜涎丸方水銀半兩膩粉七錢匕巴豆去皮膜出油二七枚硇砂研一分半夏湯洗七遍白礬並半夏生薑二兩一處搗爛陰乾用五靈脂各一兩羌活去蘆頭半兩木鱉子去殼大黃煨熟銼各一兩茆香一分馬牙硝研二兩丹砂研一錢上一十三味搗研為末水浸蒸餅丸如緑豆大每服五七丸茶酒下日三服治癩病六神散方螻蛄一枚去肚腸蜜蜂七枚二味用泥半指厚裹遍以熟火一斤濕煅候泥干通紅去火放冷取出於乳鉢內細研不羅商陸根汁半盞生薑汁三分生蜜三分緑豆末一錢匕上六味一處和勻更用溫酒調下只作一服約半日許發動噁心涕唾汗出仍吐出涎渴時頻與溫米湯吃若是吐多瀉多或更有血勿疑是病出也切忌出風中如吐瀉後腹痛取下一塊大小如雞子有諸般顏色者此是病根也如不思食以甘草二寸黃連二條水一盞煎至半盞溫吃其藥即不以老少強弱都作一服若是半日已來未發動即更服樟柳根等汁投之尚未覺更與吃無妨面上如有紫㾦癗未消者用干斑蝥末以生油調成膏敷患上約半日許㾦癗脹起以軟帛子揩拭去藥以棘針挑破近下令水出自干即不得剝其瘡皮斑蝥不得令入口眼若面上有小尖㾦癗子者不用斑蝥卻以熟艾入膽礬少許紙杵作叉股大小艾炷灸之每個灸一炷如手腳上下有瘡未瘥煎甘草熱湯淋洗更以白藥子三兩甘草一分荊芥十穗一處搗羅為末干貼如澡豆使之亦好切忌房室事動風發氣鹽醋料物等物只得吃淡粥過一百日治大風疾塗敷方磁石煅醋淬玄精石研禹餘糧煅醋淬陽起石研礜石研代赭煅研金星石研銀星石研各一兩以上八味並用鹽泥固濟以四斤熟火簇定候通赤取出去泥乘熱杵碎為末水銀膩粉二味同於漆碗內研令無星子各半兩上一十味每用前藥末二錢匕及水銀膩粉二錢匕研大麻子三合麻油一兩半生絹取汁調塗身體以藥末盡為度鋪油單襯臥以被覆出汗及轉下惡物為度未轉再塗轉即服補藥在後治大風癩病凝水石塗方凝水石研為細末四兩水銀四兩膩粉一兩上三味滴水研如薄泥臥病人於密室先將一半藥遍身塗之除咽喉心上不塗以兩手摩令極熱次夜更將余藥准前塗摩或當夜或次日臟腑取下惡物但吃溫補藥忌一切動風物一月皮膚復舊兩月眉睫生甚者半歲必再發准前用藥則永安也治大風疾塗藥後轉服補藥異功散方天麻酒漬焙赤箭松黃鬼臼安息香研羌活去蘆頭款冬花楓香脂研天蓼花側柏葉蒼耳各一兩苦參一兩半何首烏炮去黑皮細辛去苗葉防風去叉蔓荊實去浮皮藁本去苗土牛膝切焙地骨皮去土甘草炙銼乳香研天門冬去心焙麥門冬去心焙丹砂研萆薢木香虎骨酒炙當歸切焙天南星炮乾蠍炒烏蛇酒浸去皮骨炙白花蛇酒浸去皮骨炙麻黃去根節雄黃研附子炮裂去皮臍芎藭白殭蠶直者炒桂去粗皮雞舌香研各半兩上三十九味搗研為散入雲母粉六兩研和勻每服一錢半匕臘茶或米飲調下日三服治大風癩病婁金丸方金箔五十斤研牛黃研麝香研龍腦研白附子炮天竺黃各半兩人參白芷細辛去苗葉芎藭天南星生用各三分天麻白花蛇酒浸取肉炙防風去叉各一兩半黃耆銼白殭蠶藁本去苗土羌活去蘆頭麻黃去根節白茯苓去黑皮犀角銼羚羊角銼芍藥甘草炙各一兩甘菊三兩上二十五味搗研為細末別用生地黃自然汁二升蜜半斤酒一升酥三分慢火同煎成膏放冷和藥末令勻丸如雞頭大每服三丸細嚼茶酒任下治諸癩膿潰體虛氣熱營衛不清風鼓於脈茯苓丸方白茯苓去黑皮石斛各一兩半人參蒺藜子炒去角羚羊角鎊屑枳殼去瓤麩炒五加皮各一兩酸棗仁五味子各一兩半菟絲子酒浸一宿別搗焙三兩雲母粉二兩黃耆細銼防風去叉細辛去苗葉獨活去蘆頭杜仲去粗皮炙銼一兩鹿角膠炙燥二兩檳榔煨銼二兩天雄炮裂去皮臍一枚續斷銼焙二兩澤瀉當歸銼焙一兩半熟乾地黃焙三兩甘草炙一兩肉蓯蓉酒浸去皴皮一兩半上二十五味搗羅為末煉蜜丸如梧桐子大每服三十丸空腹煎棗湯下日二服治大風疾及諸風疾神應酒方茵芋炙附子天雄並生用去皮臍丹參蜀椒去目並閉口炒出汗躑躅花甘草炙石菖蒲桂去粗皮乾薑生用烏頭生用去皮臍獨活去蘆頭地骨皮秦艽去苗土防風去叉芎藭人參當歸白芷藁本去苗土生乾地黃各二兩白蘚皮欒荊炙各二兩上二十三味並細銼以無灰酒二斗密器中浸經七日成每日空腹飲半盞漸漸加飲每飲了以飯三兩匙壓之每飲一盞即添一盞浸藥藥味盡即止忌熱肉面雞魚牛肉油膩果子陳臭豉汁等物治脾肺風毒攻頭面皮膚生瘡成大風疾紫參散方紫參防風去叉蘹香子微炒苦參何首烏炒去黑皮威靈仙去苗土天麻各一兩烏蛇白花蛇二蛇同酒浸七日和骨炙用各三兩丹參卷柏各一兩蒼朮去皮炒三斤上一十二味搗羅為散更用胡麻子不計多少先蒸熟後入鍋炒焦為末每胡麻子末一斤入藥末三兩一處拌勻每服三錢匕溫蜜水調下日三服吃藥三日後覺渾身疼是效及起止不得為驗仍不得住藥日三服治一切大風瘡化為水犀角丸方烏犀角屑一兩升麻黃芩去黑心防風去叉人參當歸切焙黃耆銼乾薑炮黃連去須甘草銼梔子仁各半兩大黃煨銼一兩巴豆去皮心炒研三十一枚上一十三味搗研為末煉蜜和杵二三百下丸如梧桐子大每服三丸溫湯下以利三兩行為度不利以意加之治癩疾神效丸方芎藭羌活去蘆頭各二兩豬牙皂莢五挺半生半炙何首烏炒去黑皮四兩杏仁湯浸去尖雙仁和皮研五十枚上五味除杏仁外搗羅為末膩粉半兩此粉須是得水銀真粉則效尋常賣者多是礬粉與杏仁同研極細用白羯羊肉四兩薄切作大片先鋪線子次鋪肉將上件藥裹了用線緊繫定入銀器內煮不可犯鐵器約用水一大碗於藥四面各余兩指許水方可用碗合定煮候泣盡水去線子不用和肉杵三五千下丸如梧桐子大每服五丸黑參湯下日三服初服五丸後逐日每服加五丸加至五十丸卻逐日每服減五丸減至五丸止次服補藥初服藥至第五七日頭痛牙縫中出涎是效服藥後只得吃淡粥候服補藥以次吃淡飯須是忌房室半年補藥地骨皮散方地骨皮去土白蒺藜炒苦參蒼耳原蠶砂微炒黃人參細辛去苗葉白茯苓去黑皮山梔子炒香山茱萸湯浸去浮者微炒小荊子各半兩卷柏一兩蔓荊實一兩丁香三錢木香三錢上一十五味搗羅為散每服一錢匕煎水調下如人行十里一服欲治此病須先擇密室不透風者然後服此藥服至五七日頭不痛無動靜者不可療若服此藥頭痛以次渾身疼痛則必愈之兆以次齒縫中涎出則牙齒俱動須是服粥不可食硬物至四十五日可全愈也若涎出則從足小指病退漸漸至身俱病退如是涎出大便必祕祕則可服大黃之類藥疏之也其補藥若服盡一料可更服一料無妨既服藥亦須令人常看人性急嫌牙縫中涎濁妨飲食及渾身疼痛不能忍耐乃自殘者也欲治此病必須自九月以後二月以前可也治大風癩疾癰疽骨肉脫敗百節疼眉落身體㿇㿇痛癢目痛煩躁耳聾齒齲痔瘻天雄散方天雄炮裂去皮臍細辛去苗土烏頭炮裂去皮臍莽草炙乾薑炮各一兩石南炙菖蒲防風去叉各二兩白朮獨活去蘆頭各三兩上一十味搗羅為散空腹溫酒調下三錢匕日一服治一切癩病黃靈先生天真百畏丸方丹砂研水銀桂末乾薑末烏頭末菖蒲末蜀椒末藜蘆末柏子仁研膏各一兩上九味再同研勻先用醇酒二升於銅器中熬令減半次下諸藥末並膏更添醇酒二升攪令得所丸如梧桐子大每服三十丸薄荷茶下日三服漸加丸數三十日眉毛復生又三十日復本也治一切癩病風瘙瘡癬遍身瘙癢百節疼痛眉毛墮落眥爛耳聾四肢𤸷痹百神散方天雄炮裂去皮臍附子炮裂去皮臍茵芋炙躑躅細辛去苗葉烏頭炮裂去皮臍乾薑炮菖蒲甘草炙石南葉各一兩防風去叉白朮獨活去蘆頭各二兩上一十三味搗羅為散每日空心溫酒下四錢匕日再服治大風癩疾黃耆丸方黃耆銼防風去叉丹參白朮白茯苓去黑皮芎藭山梔子赤芍藥枳殼去瓤麩炒細辛去苗葉各一兩半大腹銼一兩三分升麻秦艽去苗土各二兩蒺藜子炒去角獨活去蘆頭苦參各三兩上一十六味搗羅為末煉蜜和丸如梧桐子大空腹煎枳殼湯下二十丸日再治大風癩疾丹參散方丹參銼炒令黑黃六兩蒼耳銼四兩威靈仙去苗土仙靈脾玄參人參各二兩沙參紫參甘草一兩生銼羌活去蘆頭三分獨活去蘆頭各一兩黃芩去黑心半兩上一十二味搗羅為散食後溫熟水調服三錢匕臨臥時再服若五心無瘡目不斷瞳仁在鼻梁不塌服之一月便瘥治營氣不清久風入脈因而成癩鼻壞色敗皮膚癢潰服黃精法黃精根去皮洗淨二斤上一味日中曝令軟內粟米飯甑中同蒸之二斗米熟為度不拘時服治大風疾萆麻煎丸方萆麻子去皮十兩黃連去須五兩二味細銼以水一斗同煮令水盡控幹不用黃連將萆麻子細研為膏九節菖蒲三兩白附子一兩上四味除前膏外搗羅為末入萆麻膏中拌勻煉蜜和丸如梧桐子大每服三十丸薄荷茶下日三服治風疾瘥後肌肉𤸷痹遍體瘡癬或癮疹瘙癢摩風膏方防風去叉羌活去蘆頭芎藭白蘞細辛去苗葉蜀椒去目併合口者炒出汗當歸切焙躑躅花各三分白芨丹參苦參玄參桂去粗皮附子去皮臍烏頭去皮臍杏仁去皮尖雙仁皂莢去黑皮莽草各一分上一十八味細銼以米醋一升拌勻三宿後以火微炒令乾用臘月豬脂二斤再以文武火煎一日常小沸莫令火急以綿濾去滓於瓷瓶內盛忽令水汙如臘月煎可留十年每用以少許點於手上於患處摩令熱透治一切熱毒風惡瘡遍體膿水臭爛漸成大風浸洗方生地黃銼十五斤黃連銼一斤苦參銼二斤甘草銼一斤上四味於大鍋內用水七石煎取四石去滓以浴斛盛周回以煻灰火暖莫令冷從朝服治風丸散及飽飯後入斛內渾身浸之至日晚即出洗身上瘡膿水令淨才出便須以摩風膏揩摩甚者只一兩度浸瘥治大風疾洗浴方浮萍草上一味濃煎湯洗浴日再又方上以葛葎蔓一束許濃煮汁洗烏癩論曰烏癩初覺皮膚變異肌腠之間淫淫躍躍如蟲行動眼前有物如絲懸布時發驚恐言語錯亂皮肉癮疹如桃李實或赤或黑手足𤸷痹不知痛所或腳下痛不可踐地身體生瘡兩肘如縛此名黑癩皆由惡風日漸傷損血氣不榮所致也治烏癩蝟皮丸方蝟皮一枚炙令黃海蛤一枚大者炙蚺蛇頭一枚炙黃虻蟲五枚去翅足炒蠐螬二枚炙鯪鯉甲炙五片葛上亭長去翅足炒十五枚水蛭五枚炒斑蝥十五枚將水蛭亭長斑蝥虻蟲四件共用糯米少許同炒米熟為度去米不用蜈蚣一枚去頭足炙附子炮裂去皮臍二枚蜘蛛大者炙三枚雷丸十五枚巴豆七枚去皮心膜出油大黃銼如半栗醋炒半兩水銀半兩與丹砂同研點醋研令水銀星盡丹砂半兩研桂去粗皮半兩射罔半兩黃連去須半兩石膏研一兩蜀椒去合口者並目炒半兩芒硝生用別研一兩龍骨別研半兩滑石別研一分礬石枯研一兩甘遂一分與芝麻同炒麻熟為度棄麻不用上二十七味搗羅及別研同拌和令勻煉蜜丸如梧桐子大每服熟水下一丸至二丸空心臨臥各一服未效加一丸如小便時莖中覺痛是蟲已化如涕下也痛多即止一丸痛少即加至三丸治烏癩馬先蒿散方馬先蒿不計多少一名馬矢蒿一名爛石草細切焙乾用上一味搗羅為散每服一錢匕用荊芥薄荷湯調下治烏癩浸酒方苦參根白皮五斤上一味細銼如麻豆生絹袋貯好酒三斗冬浸七日夏浸四日每溫飲二合至三合日二夜一漸加至五七合治烏癩露蜂房酒方露蜂房五兩苦參四斤上二味銼細用水三斗煮取一斗五升去滓浸曲四斤半炊黍米二斗如常醞法酒熟每服三合至五合日二夜一稍增無妨治烏癩葛葎草浴方葛葎草二稱銼細淘益母草一稱銼細淘上二味葛葎取籬垣上者益母取近屋者用水二石五斗煮取一石五斗漉去滓盆甕中浸浴一時辰久方出著舊布袍用被衣覆之又再暖令熱復浸浴一時辰久方出入溫室著舊布袍被衣蓋復汗出勿令見風明日復作如入湯後舉身瘙癢不可忍令傍人捉手不令搔動食頃漸定後隔三日一浴其藥水經浴兩次即棄之治烏癩雌黃散塗方雌黃半兩研上一味以米醋和雞子清如膏塗瘡上干即更塗治烏癩大腹子膏敷方大腹生者二枚如無生者乾者亦得上一味用皮全者勿令傷動以酒一升浸緩火熬令酒盡藥干搗羅為末煉臘月豬膏調和如膏敷之白癩論曰白癩之候語聲嘶嗄目視不明四肢𤸷痹關節熱痛如火燔灼脊膂拘急肉如刀劈手足緩弱身體癮疹鼻生息肉目生白珠肉色斑白故謂之白癩也治白癩蝮蛇頭丸方蝮蛇頭炙焦蝟皮炙焦魁蛤炙蠐螬生用各一枚水蛭生用虻蟲去翅足生用葛上亭長去翅足生用各七枚蜈蚣炙二枚大蜘蛛炒三枚䗪蟲炙四枚雷丸炮四十枚附子炮裂去皮臍三枚水銀丹砂各一兩硝石一分與水銀丹砂同研水銀星盡滴醋炒大黃銼炒桂去粗皮滑石研如粉甘遂與芝麻同炒不用芝麻射罔各一兩石膏研如粉二兩蜀椒去目並閉口者炒出汗芒硝研如粉各半兩巴豆去皮心炒十五粒龍骨研三分礬石枯研如粉黃連去須各一分鯪鯉甲炙用七片上二十八味搗研極細同羅為末煉蜜和丸如梧桐子大每服二丸空心臨臥溫酒下加至三丸未覺小便澀痛更加一丸至二丸以知為度治白癩風天麻煎方天麻生用一斤半木天蓼生用三斤上二味銼如大豆粒用水三斗五升煎至一斗壓去滓於銀石器中慢火煎如稠餳每服半匙荊芥薄荷酒調下不拘時日二夜一一月見效治白癩苦參酒方苦參去土皮心銼二斤露蜂房銼五兩上二味用水三斗煮取一斗五升去滓浸法曲三斤經三宿炊黍米二斗醞如常法酒熟每食後飲一合日二夜一加至三合以瘥為度治遍身白點搔之屑落或癢或痛色白漸展世呼白癩苦參酒方苦參去土皮心銼五斤露蜂房銼五兩蝟皮銼一具上三味用水六斗煮取三斗去滓浸細曲四斤半炊黍米三斗醞如常法酒熟每飲三合至五合日二夜一以瘥為度治白癩大風眉須墮落八風十二痹筋脈拘急肢節緩弱手足痹𤸷商陸酒方商陸根削去皮銼二十五斤上一味用水一石五斗煮取八斗去滓浸細曲十五斤炊黍米一石醞如常法酒熟每溫飲三合至五合日二夜一重者服至三斗稍輕者至二斗若得藥發吐下為佳唯宜食鹿肉羹治白癩艾葉酒方干艾葉濃煮取汁每一斗米曲用艾葉五兩上一味隨曲米多少用煎濃汁拌浸醞如常法酒熟不拘時稍稍飲之常令酒勢相接醺醺然治白癩塗方葛上亭長四七枚去翅足與糯米同炒米熟為度不用米干蝮蛇一枚頭尾全者炙黃去鱗及腹中物上二味搗羅生絹袋貯以酒五升瓷瓶中慢火煅煮酒及一升以下將綿囊蘸藥汁摩塗癩上日二夜一如不急痛日夜可五七次塗之治白癩語聲嘶敗四肢𤸷痹瘙癢生瘡烏蛇散方烏蛇酒浸去皮骨炙葛根銼各一兩一分苦參紫參沙參人參芎藭天麻酒浸切焙黃芩去黑心木通銼地骨皮防風去叉防己莽草葉白朮蒴藋木蘭皮去粗皮黃連去須附子炮裂去皮臍烏頭炮襲去皮臍牛膝去苗檳榔煨銼熟乾地黃切焙葳蕤芍藥桂去粗皮玄參堅者龍骨研石膏研如粉升麻菊花未開者微炒蒺藜子炒去角秦艽去苗土細辛去苗葉天雄炮裂去皮臍各一兩當歸切焙甘草炙銼遠志去心巴戟天去心蒼耳花炒乾各三分吳茱萸湯洗焙炒麝香研各半兩上四十二味搗研細羅為散每服二錢匕空腹溫酒調下漸加至三錢匕晡時再服治白癩語聲嘶嗄目視不明四肢𤸷痹關節熱痛身體癮疹鼻生息肉白花蛇散方白花蛇酒浸去皮骨炙二兩天麻槐子微炒羌活去蘆頭防風去叉晚蠶砂微炒蔓荊實白蘚皮威靈仙去土枳殼去瓤麩炒各一兩甘草炙銼半兩上一十一味搗羅為散每服一錢匕溫酒調下不計時候
