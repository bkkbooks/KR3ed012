body:
  text: 卷第一十八癧瘍風論曰癧瘍之病其狀斑駁點點相連而圓大概似白駁而稍微也皆由風邪熱氣搏於脾肺經流散肌肉使然也治癧瘍風頸面斑駁烏蛇散方烏蛇酒浸去皮骨炙二兩秦艽去苗土芎藭各一兩半桂去粗皮羌活去蘆頭人參山梔子枳殼去瓤麩炒丹參沙參玄參犀角鎊各一兩升麻防風去叉木通銼白蘚皮黃芩去黑心蒺藜子炒去角各一兩二錢苦參二兩上一十九味搗羅為散每日溫酒調下三錢匕食後臨臥服治癧瘍風面頷頸項忽生斑駁其狀如癬雄黃散塗方雄黃硫黃白礬並研如粉各一分上三味合令勻以煉成豬脂調和塗瘡上治癧瘍風及赤白癜風硫黃散塗方硫黃研半兩砒霜研膩粉各一分蒼耳實一合為末上四味細研入生薑汁半合調令勻少少塗之勻令近口治癧瘍風身體斑駁附子散塗方附子一枚大者去皮生用硫黃研半兩蒼耳苗一握乾者上三味搗研為末以米醋調先以布巾揩瘍上即以藥塗之干更塗治癧瘍風狀似白癜烏蛇散方烏蛇一條酒浸去皮骨炙上一味搗羅為散炒黑豆半合以無灰酒浸去滓取豆酒調服三錢匕空心食前服治癧瘍風油麻酒方油麻不拘多少淨擇生用上一味取半合生細嚼用熱酒三合至五合下每空心午時夜臥各一服漸加至一合服一百日疾愈治癧瘍風面頰頸項忽生斑駁如癬巴豆塗方巴豆去皮生用一分釅醋一合上二味先以新布揩令赤於故沙盆內用醋磨巴豆如稀膏塗於患上治癧瘍遍身斑駁女葳膏摩方女葳一分附子一枚去皮臍生用雞舌香研半兩木香半兩白芷一分上五味搗研極細和勻以臘月豬膏七合於微火上煎熔去滓投前藥末煎三四沸入研麝香一分攪調復煎三上三下膏成瓷器收貯每用少許摩之治癧瘍風硫黃塗方硫黃一兩半雄黃半兩硇砂研附子生各一兩上四味搗研為細末以苦酒調塗之干即易白駁論曰白駁之病其狀斑駁如癬過於癧瘍但不成瘡爾皆由風熱搏於膚腠脾肺二經不利也治白駁舉體斑白經年不瘥菖蒲醞酒方菖蒲九節者去須節米泔浸切一斤天門冬去心一斤天雄炮裂去皮臍三兩麻子仁一升生用茵芋去粗莖一兩乾漆炒煙出生乾地黃切焙遠志去心各三兩露蜂房微炒一兩苦參一斤黃耆炙銼八兩獨活去蘆頭石斛去根各五兩柏子仁生用二升蛇蛻皮長三尺微炙天蓼木銼二兩上一十六味粗搗篩以水二石五斗煮菖蒲等取汁一石以釀一石二斗秫米蒸醞如常法用六月六日細曲於七月七日釀酒酒成去糟取清收於淨器中密覆每溫服四合至五合日二夜一更重煮菖蒲並藥滓取湯淋洗所患處佳治風頭項及面上白駁漸長如癬但白紅色白蘞散方白蘞炮當歸切焙附子炮裂去皮臍各半兩黃芩去黑心乾薑炮天雄炮裂去皮臍各一兩羊躑躅半兩蒸熟炒乾上七味搗羅為散每服半錢至一錢匕酒調下日三治白駁敷方雌黃石硫黃各一兩研如粉蛇蛻皮一條大者燒灰上三味同研勻細用醋調成膏先以巴豆一粒中截以平處磨令皮起然後敷藥三兩遍即瘥治頭項及面上白駁漸長如癬但不成瘡宜用此敷方桂去粗皮一兩上一味搗羅為末每用半錢或一錢匕以津唾和敷於白駁上日三治面項身體白駁敷方鮎魚一頭約重半斤去腸肚淨洗後一依鮓法用鹽椒蔥粳米飯勻拌即用青荷葉裹作三包各用蒲片系上一味更用荷葉重裹令大臭爛先以布拭白駁令赤次炙鮓包熱尉令汗出以綿衣包無令風冷所傷治周身白駁漸長似癬但不成瘡蛇蛻皮方蛇蛻皮一條大者上一味炒熱挼摩白駁上時時噀唾數百遍棄之田野草中瘥治面項身體白駁風塗淋方生木樹腔中汁柳樹為上上一味淨鍋煎熱洗淋之仍便搗桂牡蠣末津唾調塗日三夜一隔日淋洗治頭項及面上白駁浸淫漸長如癬狀但不成瘡鰻鱺魚塗方鰻鱺魚一頭肥者上一味炙令脂出先洗白駁用物揩拭之令小痛然後用熟魚脂塗治白駁礬石塗方礬石石硫黃各一分上二味同研如面用好醋調和如膏塗之治面項身體白駁風大蛇皮塗方蛇蛻皮一條大者燒作灰用石硫黃研槲皮燒作灰各二錢上三味研令極細以清熟漆調和勿令稠硬薄塗白駁處欲塗藥時先以巴豆一粒中截用平處摩令皮微起然後敷藥白癜風論曰白癜風之狀皮膚皴起生白斑點是也由肺臟壅熱風邪乘之風熱相併傳流營衛壅滯肌肉久不消散故成此也治白癜風身體𤸷麻烏蛇散方烏蛇酒浸去皮骨炙三兩白殭蠶微炒胡麻子獨活去蘆頭天麻各二兩烏頭炮裂去皮臍細辛去苗葉防風去叉桂去粗皮枳實去瓤麩炒蟬蛻去土白附子炮各半兩天南星炮一分上一十三味搗羅為細散每服溫酒調下二錢匕不計時候治肺臟久積風毒皮膚生白癜苦參散方苦參銼烏蛇酒浸去皮骨炙各三兩露蜂房微炙松脂附子炮裂去皮臍梔子仁木蘭皮各二兩上七味搗羅為細散每服溫酒調下二錢匕不計時候治風熱熏蒸皮膚白癜防風湯方防風去叉地骨皮王不留行山梔子仁微炒荊芥穗惡實炒各一兩甘草炙三分人參生乾地黃焙各半兩上九味粗搗篩每服三錢匕水一盞入惡實根二寸同煎至七分去滓溫服不計時候治白癜風玉粉膏方白礬石硫黃各半兩上二味研為末米醋調為膏塗患處治白癜風方杏仁去雙仁不去皮尖生用上一味每日晨爛嚼二七粒於白點處揩夜臥再用治白癜風方雞子兩枚和殼以米醋三升浸七日取白石硫黃研半兩附子去皮臍生用一枚重半兩者粟米二錢上四味將後三味搗羅為末以前雞子白調如稀糊臨用藥先以葛布揩患處令赤塗之治白癜風皮膚斑白毛髮亦變石硫黃膏方石硫黃墨各一兩半上二味搗研為細末先以布揩患處令赤醋調藥成膏塗之若作瘡瘥後再塗治白癜風苦參膏方苦參鹽各一分上二味搗羅為末先以酒一升煎至四合入藥二味攪勻慢火再煎成膏每用先以生布揩患處令赤塗之紫癜風論曰紫癜風之狀皮膚生紫點搔之皮起而不癢痛是也此由風邪挾濕客在腠理榮衛壅滯不得宣流蘊瘀皮膚致令色紫故名紫癜風治紫癜風大效酸石榴丸方酸石榴十顆去皮以瓷盆盛飯上蒸爛絞取汁梨二十顆去皮核研絞取汁羌活去蘆頭人參防風去叉干薄荷葉各一兩茺蔚子白附子炮苦參犀角鎊烏喙炮裂去皮臍各半兩上一十一味除二味汁外搗羅為末將汁熬成膏和丸如梧桐子大每服二十丸溫酒下不拘時治紫癜風白花蛇散方白花蛇酒浸去皮骨炙二兩麻黃去根節天麻何首烏去黑皮天南星炮白附子炮桂去粗皮萆薢白蘚皮羌活去蘆頭蔓荊實去皮白殭蠶炒防風去叉犀角鎊各半兩磁石煅醋淬研一兩原蠶蛾炒一分上一十六味將十五味搗羅為散入磁石研勻每服二錢匕食前溫酒調下治𤸷麻紫癜風烏蛇散方烏蛇酒浸去皮骨炙防風去叉羌活去蘆頭人參玄參沙參苦參丹參白附子炮蒺藜子炒去角各一兩上一十味搗羅為散每服一錢匕溫酒調下治紫癜風防風散方防風去叉蠍梢炒各一兩白花蛇頭二枚酒浸炙上三味搗羅為散每服一錢匕溫酒調下治紫癜風硫黃膏方石硫黃不拘多少上一味研末用生薑自然汁同煎成膏每浴罷以藥揩之令熱治紫癜風點點相連五倍子膏方五倍子一分搗為細末膩粉二錢砒霜研細半錢上三味同研勻細以醋調為膏盛以瓷合每浴罷勻揩患處速著衣慎風仍便洗手治紫癜風斑點附子硫黃散方附子生用去皮臍一枚石硫黃別研半兩上二味搗研為細散入胡粉一分膩粉少許同繁柳汁和勻臨臥揩三五遍早晨溫漿洗去不過三五夜瘥治紫癜風牡蠣散方牡蠣膽礬各半兩上二味生用為散釅醋調摩患處治紫癜風並白癜風胡桃塗方初結青胡桃一顆取外皮用石硫黃一皂子許研如粉上二味先取胡桃皮切研如膏入硫黃末和勻塗之治紫癜風灰藋塗方灰藋不拘多少燒灰用紙襯淋取汁煉令如膏約兩匙許雄黃丹砂膩粉麝香蝦蟆灰石硫黃礬石各一錢上八味將七味同研如粉與煉了灰藋濃汁攪煎如膏塗之干即易膏硬以醋潤之治紫癜風羊蹄根塗方羊蹄根搗絞自然汁半合生薑研絞自然汁半合石硫黃四錢研如粉上三味將二汁與硫黃末同研令黏塗患處一日不得洗不過兩上瘥惡風論曰惡風者皆五風厲氣所致也風有青白赤黑黃之異其毒中人五臟則生蟲亦有五種蟲生息滋蔓入於骨髓五臟內傷形貌外應故食肝則眉睫墮落食肺則鼻柱倒塌食脾則語聲變散食腎則耳鳴如雷鼓之聲心不受食食心則為不可治是故謂之惡風治惡風無問新久四肢不仁一身盡痛頭目眩倒口面喎僻白朮散方白朮微炒人參秦艽去苗土當歸切焙天雄炮裂去皮臍各三分附子炮裂去皮臍烏頭炮裂去皮臍各二兩乾薑炮裂一兩蜀椒去目並閉口者炒出汗一兩防風去叉桂去粗皮防己銼萆薢炒白蘞桔梗去蘆頭炒黃耆細銼各二兩山茱萸麻黃去根節先煮掠去沫焙乾用茵芋去粗莖甘草炙各三分細辛去苗葉半兩上二十一味搗羅為散每服二錢匕溫酒調下空心午時各一服未效漸加服之覺口唇𤸷痹即減服之治惡風殊聖散方天麻菖蒲九節者米泔浸焙乾何首烏乳香研菊花蔓荊實威靈仙去土地骨皮仙人骨胡麻防風去叉枳殼去瓤麩炒益母草烏蛇酒浸去皮骨炙小荊子蒼耳苦參丹參沙參人參玄參紫參荊芥各半兩上二十三味搗羅為散每服二錢匕溫酒調下食前後各一服隔宿先吃豬靨一枚早晨並服三服治惡風胡麻散方胡麻一升去浮者一半煮熟一半生用天麻乳香研何首烏蒼耳松花角蒿款冬花克頗草菖蒲人參苦參玄參沙參丹參威靈仙去土各二兩甘菊花三兩蔓荊實紫參二兩上一十九味搗羅為散每服二錢匕溫酒調下如病深漸加至三錢匕服至旬余若覺遍身疼痛是效治惡風五參散方人參沙參丹參玄參苦參木通銼蒺藜子炒去角烏蛇酒浸去皮骨乾蠍去土天麻赤箭何首烏去黑皮陳橘皮湯浸去白焙各一兩黃芩去黑心半兩原蠶蛾一分上一十五味並生用搗羅為散每服三錢匕熱茶調下服及半料即減服二錢匕初服三日後先覺頭項脊膂身上疼痛乃藥力與病相擊也當安臥兩復時許即無事如或身上有瘡腫服藥一日後便覺漸減治惡風天麻散方天麻防風去叉細辛去苗葉附子炮裂去皮臍藁本去苗烏蛇酒炙用肉羌活去蘆頭芎藭菊花未開者良桂去粗皮麻黃去根節先煎掠去沫焙乾乾薑炮裂獨活去蘆頭甘草炙阿膠炙令燥白蘚皮各半兩上一十六味搗羅為散每日空腹溫酒調服二錢匕漸加至三錢匕日二春夏煎當歸酒調下秋冬煎蒲黃酒調下治脾肺風並惡風等疾何首烏丸方何首烏石菖蒲荊芥穗蒼耳胡麻炒各一兩玄參沙參苦參白花蛇酒浸去皮骨炙烏蛇酒浸去皮骨炙各半兩上一十味搗羅為末煉蜜和丸梧桐子大每服十丸茶酒任下如要作散每服二錢匕溫酒調下不計時服治惡風豆蒸丸方原蠶蛾全者二十八枚炒羊靨二十八枚批開炙乾豬靨二十八枚如前炙安息香犀角屑沒藥研人參甘草炙銼何首烏大黃銼炒遠志去心各一兩角蒿蒲公草蒼耳地錦益母草土馬鬃枸杞自角蒿以下七味各一兩半治淨用黑豆蓋覆甑中蒸令黑豆軟熟不用黑豆將藥曝乾上一十八味搗羅為末入鵝梨汁並煉蜜同和丸如櫻桃大每服一丸不以時米飲嚼下治惡風白花蛇散方白花蛇一條酒浸炙取肉用三兩露蜂房微炙苦參銼防風去叉丹參梔子仁山芋各二兩半秦艽去苗土一兩一分上八味搗羅為散每日空心用溫酒調下二錢匕至三錢匕日再治惡風威靈仙散方威靈仙去土二兩丹參六兩羌活去蘆頭一兩獨活