body:
  text: 卷第一百二十四咽喉中如有物妨悶論曰咽者胃之系故咽主咽物天氣通於肺故喉主通氣咽喉中妨悶如有物者乃肺胃壅滯風熱客搏結於咽喉使然故聖惠謂憂愁思慮氣逆痰結皆生是疾治咽喉中如有物妨悶桔梗湯方桔梗炒二兩半夏湯洗七遍切焙一兩人參甘草炙銼各半兩上四味粗搗篩每服三錢匕水一大盞入生薑五片同煎至六分去滓溫服食後臨臥治咽喉中如有物妨悶噎塞胸膈痰滯防風散方防風去叉人參白朮獨活去蘆頭草豆蔻去皮各三分天麻芎藭白芷赤茯苓去黑皮各一兩細辛去苗葉高良薑青橘皮湯浸去白焙甘草炙各半兩京三稜炮銼一兩半厚朴去粗皮生薑汁炙三錢上十五味搗羅為散每服三錢匕溫酒調下棗湯亦得日三不拘時治咽喉噎滯如有物妨悶木香湯方木香陳橘皮湯浸去白焙厚朴去粗皮生薑汁炙半夏生薑汁浸一宿湯洗三遍切焙白朮甘草炙桂去粗皮大腹皮各半兩黃耆銼人參桔梗炒芍藥各三分上十二味粗搗篩每服三錢匕水一盞入生薑一棗大拍碎煎至六分去滓食後熱服日三治咽喉如有物噎塞人參湯方人參一兩訶黎勒皮各一兩甘草炙射干去毛陳橘皮湯浸去白焙桂去粗皮烏梅去核各半兩陳曲炒三分上八味粗搗篩每服三錢匕水一盞煎至六分去滓溫服不拘時候治咽喉如有物妨悶食即噎塞不下羚羊角湯方羚羊角屑赤茯苓去黑皮半夏湯洗七遍去滑炒木通銼射干各半兩倉粟米炒二合桔梗炒一分蘆根銼一兩上八味粗搗篩每服五錢匕水一盞半入生薑一棗大拍碎煎至八分去滓食後溫服日三治咽喉中如有物噎塞不下射干湯方射干升麻紫菀去苗土百合各半兩木通銼一兩桔梗炒赤茯苓去黑皮各三分上七味粗搗篩每服三錢匕水一盞煎至六分去滓食後溫服如要通利每服加朴硝末一錢匕去滓後攪勻服之治咽喉如有物噎塞黃芩射干湯方黃芩去黑心射干各一兩枳實去瓤麩炒半夏湯洗七遍去滑焙甘草炙銼各三分升麻一兩半桂去粗皮一兩一分上七味粗搗篩每服五錢匕水一盞半入生薑五片同煎至八分去滓溫服日三治咽喉中如有物噎塞絡石湯方絡石紫菀去苗土各半兩升麻射干各三分桔梗炒木通銼赤茯苓去黑皮各一兩上七味粗搗篩每服五錢匕水一盞半煎至八分去滓食後溫服如要通利即湯成加芒硝末一錢匕攪勻服之治咽喉如有物噎塞飲食妨悶半夏木通湯方半夏湯洗七遍去滑焙木通銼炒乾薑炮各半兩芍藥桑根白皮炙銼各一兩上五味粗搗篩每服三錢匕水一盞入鹽少許煎至六分去滓熱服一方搗羅為末煉蜜丸如梧桐子大每服十五丸食後生薑湯下漸加至二十丸治咽喉似有物噎胸中滿脅下氣上衝飲食減少黃耆甘草湯方黃耆甘草炙各一兩半桂去粗皮半兩人參一兩芍藥赤茯苓去黑皮各二兩上六味㕮咀如麻豆每服五錢匕水一盞半入生薑三片大棗二枚去核同煎至八分去滓內飴糖少許煎化熱服良久以稀粥投之治咽喉如有物妨塞氣噎飲食不下人參丸方人參一兩桂去粗皮甘草炙銼陳橘皮湯浸去白焙各半兩上四味搗羅為末煉蜜和丸如梧桐子大每服二十丸食後生薑湯下漸加至三十丸日再治咽喉中如有物咽吐不利四味湯方半夏生薑汁浸一宿湯洗切焙厚朴去粗皮生薑汁炙陳橘皮湯浸去白焙各一兩赤茯苓去黑皮二兩上四味粗搗篩每服三錢匕水一盞入生薑一棗大拍碎煎至六分去滓食後溫服治咽喉中如有物厚朴湯方厚朴去粗皮生薑汁炙赤茯苓去黑皮各二兩半夏湯洗七遍切焙一兩半紫蘇葉焙一兩上四味粗搗篩每服三錢匕水一盞入生薑三片同煎至六分去滓食後服日三治咽喉食即噎塞如有物不下杏仁丸方杏仁湯浸去皮尖雙仁炒半兩桂去粗皮人參枇杷葉拭去毛炙各一兩上四味搗羅為末煉蜜和丸如櫻桃大每服一丸含化咽津以瘥為度治咽喉如有物噎塞飲食不下石蓮湯方石蓮子炒取肉人參杵頭糠各一分上三味粗搗篩每服三錢匕水一盞煎至六分去滓溫服食後日三治咽喉中如有炙臠食即噎塞杵糠丸方碓杵頭細糠二合上一味搗羅為末煉蜜和丸如彈丸大空腹含化一丸微微咽津治肺胃壅滯咽喉中如有物妨悶杏仁煎方杏仁湯浸去皮尖雙仁炒黃桑根白皮銼炒貝母去心各一兩半生薑汁一合半地黃汁二合半酥半兩大棗六十枚去核紫菀去苗三分甘草炙桔梗炒五味子炒赤茯苓去黑皮地骨皮各一兩人參三分上十四味先研杏仁以水五升濾取汁將草藥細銼同煎至二升以綿濾去滓續下酥及地黃汁慢火煎成膏每食後含一匙頭細細咽津治風熱搏於咽喉如有物妨悶桔梗湯方桔梗炒半夏湯洗去滑十遍焙上二味等分銼如麻豆每服五錢匕水二盞生薑七片同煎至七分去滓溫服治肺胃氣壅風熱客搏咽喉妨悶麥門冬湯方麥冬去心焙三兩半夏湯洗七遍焙乾人參甘草炙各一兩食粳米炒一合上五味粗搗篩每服三錢匕以水一盞入棗一枚擘破煎至五分去滓溫服日三不計時候治咽喉中如有物妨悶半夏湯方半夏湯洗七遍切焙一兩人參甘草炙銼栝蔞根銼桂去粗皮各三分石膏一兩一分小麥一兩半赤小豆一分吳茱萸湯洗焙乾一兩半上九味銼如麻豆大每服五錢匕水一盞半入生薑三片大棗二枚擘破同煎至八分去滓溫服咽乾論曰脾肺不利上焦有熱則津液枯燥搏於喉咽故令乾痛甚則生瘡治上膈虛熱咽乾龍腦雞蘇丸方龍腦研一分雞蘇甘草炙烏梅用肉紫蘇葉各一兩麥門冬去心焙白梅用肉人參各半兩天門冬去心焙半分麝香研甜硝研各一錢上十一味搗研為末再同研勻煉沙糖和丸如雞頭實大每服一丸食後人參湯嚼下治咽乾涕唾如膠或腎氣不足心中悒悒目視䀮䀮少氣耳聾消渴黃疸一身悉癢骨中疼痛小腸拘急甘草湯方甘草炙半兩磁石煅醋淬三遍二兩玄參防風去叉各一兩半五味子牡丹皮桂去粗皮各一兩黑豆半合附子炮裂去皮臍半兩上九味粗搗篩每服五錢匕水一盞半入生薑半分拍碎煎至一盞去滓食後服日再治咽乾口瘡牙癰心肺熱盛射干膏方射干升麻梔子仁玄參小豆卷各一兩半黃柏去粗皮二兩赤蜜地黃汁各三合大棗去核十枚上九味除蜜並地黃汁外細銼如麻豆以水五升煎至一升半去滓下蜜與地黃汁慢火煎成膏細細含化咽津治咽乾口燥上焦虛熱咳嗽氣促痰壅貝母湯方貝母麩炒去心百合各三分紫菀去苗土桑根白皮炙銼桔梗銼炒各半兩麥門冬去心焙三分大黃炒銼一分甘草炙銼一兩半上八味粗搗篩每服五錢匕水一盞半煎至一盞去滓分溫二服食後治咽喉風氣干痛不能食乾地黃丸方生乾地黃焙一兩人參三分赤苓去黑皮三分天門冬去心焙一兩上四味搗羅為末煉蜜和丸如梧子大每服十丸米飲下日三治咽喉干痛心腹滿悶不能飲食厚朴湯方厚朴去粗皮生薑汁炙赤茯苓去粗皮各一兩半陳橘皮湯浸去白焙人參各一兩上四味粗搗篩每服五錢匕水一盞半入生薑半分拍破煎至一盞去滓分溫二服治膈熱咽乾風毒攻心狂悶如雪湯方朴硝黑豆皮生一兩木香一兩大黃生半兩上四味除朴硝外粗搗篩每服五錢匕水一盞半煎至一盞去滓下朴硝一錢攪令勻不計時溫服以微利為度治咽喉干痛吐咽不利桔梗湯方桔梗銼炒甘草生惡實炒各一兩上三味粗搗篩每服二錢匕水一盞入竹茹一彈丸大煎至六分去滓溫服不計時候治咽喉中干肺熱咳嗽多痰貝母丸方貝母去心一兩半甘草炙三分杏仁湯浸去皮尖炒一兩半上三味搗羅為末煉蜜丸如彈子大含化咽津治咽喉干肺壅咳嗽胸中滿而振寒脈數時時涕唾膿涎如聖湯方桔梗銼炒一兩甘草半兩上二味粗搗篩每服三錢匕水一盞煎至五分去滓溫服日二不拘時治上焦有熱津液燥少喉咽干痛雞蘇人參湯方雞蘇葉惡實炒玄參甘草炙銼各一兩防風去叉人參天門冬去心焙各半兩上七味粗搗篩每服三錢匕水一盞入梨二片同煎至六分食後去滓溫呷治喉熱乾燥津液不足龍腦散方龍腦研一錢雞蘇去梗焙乾荊芥穗一兩半白豆蔻去皮一分甘草炙銼一兩上五味搗羅為細散每用半錢匕溫水調下合時且各自貼之臨用旋合和取半錢匕服氣味尤全喉咽諸疾論曰喉嚨者氣之所上下若腑臟和平陰陽升降則呼吸去來無所滯礙一或不調病有寒熱之證熱則喉腫閉塞或連頷焮痛妨害飲食寒則語聲嘶嗄或喉中哽哽如有物狀其候甚衆不可不察治咽喉腫痛語聲不出痰唾稠濁苦參丸方苦參一分白礬燒枯半兩山梔子仁一兩木通銼杏仁湯浸去皮尖雙仁炒各半兩甘菊花三分大黃生銼一兩防風去叉半兩射干玄參甘草炙銼惡實炒白藥各一分馬勃二分上十四味搗羅為末煉蜜丸如酸棗大每服綿裹一丸夜後含化咽津如喉不閉者去白礬治咽喉不利肺藏風熱涕唾稠黏犀角湯方犀角鎊玄參枳實去瓤麩炒人參木通銼麥門冬去心焙射干馬兜鈴防風去叉防己各三分升麻一兩桃仁湯浸去皮尖雙仁炒甘草炙銼馬牙硝別研各三分上十四味粗搗篩十三味每服三錢匕以水一盞煎至五分去滓入馬牙硝少許再煎沸臨臥食後溫服日再治咽喉腫塞天門冬煎丸方天門冬去心焙麥門冬去心焙各一兩半款冬花半兩貝母去心炒紫菀去苗土各一兩赤茯苓去黑皮一兩半升麻一兩生地黃汁一升白蜜五兩酥一合上十味將前七味細銼以水三升煎取一升絞去滓納地黃汁再煎至一升納酥蜜於銀器中重湯上煎成膏丸如彈丸大每服一丸含化咽津治咽喉癢咳嗽紫菀湯方紫菀去苗土貝母去心炒桑根白皮銼炒桔梗炒柴胡去苗麥門冬去心焙赤茯苓去黑皮百部各三分甘草炙銼一分杏仁湯浸去皮尖雙仁炒一兩上十味粗搗篩每服三錢匕水一盞煎至七分去滓食後溫服日三治咽喉凝唾不出如膠塞喉茯苓湯方赤茯苓去黑皮桂去粗皮各二兩人參甘草炙銼生乾地黃焙芍藥前胡去蘆頭各一兩麥門冬去心焙五兩上八味粗搗篩每服三錢匕水一盞入棗二枚擘破同煎至七分去滓食後溫服日三治喉中有血肺痿咳嗽氣喘宜服犀角湯方犀角鎊半兩桔梗炒柴胡去苗各三分竹茹半兩天門冬去心焙一兩黃芩去黑心三分上六味粗搗篩每服三錢匕水一盞煎至七分去滓下朴硝末一錢匕攪勻溫服食後治咽喉中癢咳嗽狀如傷寒調中人參丸方人參青木香桂去粗皮羌活去蘆頭大麻仁酸棗仁去皮各一分上六味搗羅為細末煉蜜丸如梧子大每服二十丸食後生薑湯下日二治喉中熱塞及舌上齶生瘡大青煎方大青黃柏去粗皮蜜炙升麻射干薔薇根各半兩苦竹葉一握細切生地黃半兩玄參一兩白蜜二兩天門冬去心焙半兩上十味除蜜外細銼用水三升煎取一升去滓下蜜再煎成膏每服半匙頭含化咽津不計時治咽喉痛多痰涼膈甘露丸方硼砂研半兩丹砂研一分龍腦研一字甘草炙一兩半為末百藥煎椎碎焙乾研一兩上五味再研勻用糯米粥清和如梧桐子大非時含化一丸治咽喉痛桃紅散方龍腦研一錢丹砂研半兩硼砂研一錢馬牙硝研半錢寒水石煅研如粉半兩上五味再同細研為末每用一字摻咽喉中咽津治咽喉唇腫口舌糜爛口甘面熱瀉脾大青湯方大青升麻大黃銼炒各二兩生乾地黃切焙三兩上四味粗搗篩每服二錢匕以水一盞煎至七分去滓溫服利即愈治咽喉中如有物妨悶咯唾膿血肺氣上喘桔梗湯方桔梗銼炒一兩半甘草炙銼半兩上二味粗搗篩每服三錢匕以水一盞煎至七分去滓食後溫服治喉痹口噤水漿不下風邪恍惚如有