鯁處引之隨出治諸魚骨鯁在喉中雞足散方雞足二枚燒灰上一味研為散每服一錢匕酒調下立出治諸魚骨鯁在喉中艾蒿酒方艾蒿一握切上一味以水酒各一盞煎至八分去滓分溫二服治諸魚骨鯁在喉中揉筋引方鹿筋不拘多少上一味漬之令軟索如彈丸持一端吞之至鯁處徐徐引出大效治諸魚骨鯁在喉中薔薇根散方薔薇根不拘多少上一味搗為散每服一錢匕水調下日三亦療折箭刺入膜囊不出及鼠瘻等患服之十日皆穿皮出治諸魚骨鯁在喉中百合散方百合五兩上一味搗羅為散用蜜水調塗帛上匝項系之甚者不過三五上治諸魚骨鯁在喉中魚尾引方魚尾一枚上一味取置衣領中即瘥治諸魚骨鯁在喉中立竹湯方上取立死竹從地高二尺以上刮去皮細劈如算子三七莖用水二盞煎七分去滓頓服治鵝鴨及雞骨鯁在喉中桂香散方桂去粗皮半兩陳橘皮湯浸去白焙一分上二味搗羅為散每用一錢匕綿裹含咽十度其骨軟漸消治食肉鯁鷹灰散方鷹糞燒灰上一味細研為散每服一錢匕水調下虎狼雕糞皆可服之治諸獸骨鯁虎骨散方虎骨上一味搗研細每服一錢匕水調下貍骨亦得治食鯁咽不下雞翮散方白雄雞左右翅大毛各一枚上一味就銅器中燒作灰每服一錢匕米飲調下治食中發鯁不下繞喉血餘散方亂髮一團燒灰上一味研為細散每服一錢匕粥飲調下治鐵棘竹木諸鯁在喉中不下及刺在肉中拆不出半夏散方半夏湯洗七遍白蘞各二兩上二味搗羅為散每服半錢匕酒調下日三半夏戟人喉以生薑汁解之治諸鯁二白散方白芷白蘞各一分上二味搗羅為散每服一錢匕水調下治諸鯁半夏白芷散方半夏湯洗七遍白芷各半兩上二味搗羅為散每服一錢匕水調下即嘔出治諸鯁豬膏吞方豬膏上一味吞如杏核大未下再吞治諸鯁咽蜜方上以好蜜一匙稍稍咽下良治諸鯁並刺不出螻蛄散方螻蛄頭一枚上一味為散以綿裹咽津勿令鯁人知若刺不出者以塗刺瘡上自出耳治諸骨鯁在喉不出紅椹咽方椹子將紅者不拘多少上一味臥時細嚼先以咽津後盡咽滓用新水吞下如無新者只欲紅陰乾為末用之治諸鯁方上以木炭皮為末研令極細如無炭皮但堅炭亦可粥飲調下二錢匕日四五服以鯁下為度治魚骨鯁方象牙一兩上一味不以多少搗羅為末沙糖丸如雞頭實大每含化一丸咽津誤吞諸物論曰誤吞諸物若金銀針鉤之類雖非病之自內然無術以出之久則害人若舊梳治發磁石出針皆意為之主不特取其性味治療之工可謂用心精微者矣治咽物誤置喉中不出如聖散方栝蔞用瓤二枚杏仁去皮尖雙仁炒一兩半甘草炙三分皂莢炙一寸與甘草同為末上四味先研栝蔞杏仁爛次以甘草皂莢末和為餅子鐺中爆令乾重搗為細末每服一錢匕臘茶一錢匕調下黃臘少許水一盞同煎七分熱服亦得未效再服治誤吞金銀物或錢在腹內不下方石炭光明者一杏核大硫黃一皂子大上二味同研為末酒調下不拘時治誤吞鉤繩在喉中不出方若鉤繩在手中莫引之但益以珠璫薏苡子等就貫著繩稍稍推至鉤處小引之即出也治誤吞珠或銅錢鯁在喉中不下方弩銅牙上一味燒令通赤納酒中飲酒立下治誤吞針及箭鏃等方肥豬脂肉不以多少上一味煮令熟軟恣意飽食即下治誤吞針方磁石一彈大上一味口含之即出治誤吞錢不出方葵菜不以多少上一味絞取汁冷飲之即出
