body:
  text: 卷第一百九十食治婦人血氣治婦人血氣不調地黃粥方生地黃汁二合粟米一合粳米一合訶黎勒炮去核為末半兩鹽花少許上五味以水三升先煮二米將熟次入訶黎勒末地黃汁鹽花攪勻煮令稀稠得所分二服治婦人腹脅血癖氣痛沖頭面熻熻嘔吐酸水四肢煩熱腹脹白朮豬肚粥方白朮二兩檳榔一枚生薑切炒一兩半上三味粗搗篩以豬肚一枚治如食法去涎滑納藥於肚中縫口以水七升煮肚令熟取汁入粳米及五味同煮粥空腹食之治婦人血氣癖積臟腑疼痛泄瀉面棋子方小麥面四兩肉豆蔻去殼為末蓽茇為末胡椒末蜀椒去目並閉口炒出汗各一錢末上五味拌勻以水和作棋子用精羊肉四兩細切炒令乾下水五升入蔥薤白各五莖細切以常法煮肉以鹽醋調和候熟濾去肉將汁煮棋子空腹熱食之治婦人血積久憊冷氣少腹常疼豬腎棋子羹方小麥面四兩高良薑末蘹香子末肉蓯蓉去皮炙為末蜀椒各一錢末獖豬腎一對去脂膜切如緑豆大上六味除腎外以水和切作棋子先將腎以水五碗煮次入蔥薤白各少許候腎熟以五味調和如常法入藥棋子再煮令熟分三次空腹食之治婦人痃癖血氣口吐酸水半夏撥刀方大麥面四兩半夏湯洗去滑盡炒半兩為末桂去粗皮一錢為末上三味同以生薑汁並米醋少許和切作撥刀熟煮如常法空心食之食治妊娠諸病治妊娠傷動胎氣不安鯉魚羹方鮮鯉魚一頭理如食法黃耆銼炒當歸切焙人參生地黃各半兩蜀椒揀十粒炒生薑一分陳橘皮湯浸去白一分糯米一合上九味銼八味令勻細納魚腹中用綿裹合以水三升煮魚熟將出去骨取肉及取魚腹中藥同為羹下少鹽醋熱啜汁吃神效治妊娠四肢虛腫喘急脹滿鹿頭肉粥方鹿頭肉半斤蔓荊實去土一兩高良薑蘹香子炒令香各半兩上四味除鹿肉外搗羅為末每服四錢匕先以水五盞煮鹿肉候水至三盞去肉下白米一合同藥末候米熟下少五味調和得所分作三次服一日食盡治妊娠四肢虛腫喘急兼嘔逆不下食雞臛方黃雌雞一隻去頭足及皮毛腸胃等洗淨去血於沸湯中掠過去腥水高良薑一兩桑根白皮刮淨銼一兩半黃耆銼揀一兩上四味銼後三味與雞同煮候雞熟去藥取雞留汁將雞細擘去骨將汁入五味調和入雞肉再煮令滋味相入了隨性食之不計早晚食不妨別服藥餌治初妊娠惡阻擇食痰逆服諸湯藥並皆無效半夏撥刀方半夏以湯洗七遍後以生薑汁半盞煮半夏令汁盡再炒乾一兩人參半兩上二味搗羅為末入小麥面六兩以水搜作團切如撥刀以新生雞子二枚去殼湯內煮旋以箸剔破入蔥薤白各三五莖擘破以鹽醬調和候湯沸下撥刀煮令熟任意分三次熱食之治妊娠胎不安腹中疼痛宜常食苧麻粥方生苧麻根一兩淨洗煮取汁二合白糯米二合大麥面一合陳橘皮浸去白炒半兩末上四味一處以水煮似常式粥稀稠得所熟後方入鹽花少許平分作二服空腹熱食之治妊娠惡阻嘔逆及頭痛食物不下山芋面方生山芋一尺於沙盆內研令盡以葛布絞濾過苧麻根一握去皮爛研上二味研勻入大麥面三兩和搜細切如棋子法於蔥薤羹汁內煮熟旋食之又方木瓜一枚切大者蜜二兩上二味以水一處煮令木瓜爛於沙盆內細研入小麥面三兩搜令相入薄捍切為棋子每日空心用白沸湯煮強半盞和汁淡食之治妊娠胃反嘔逆不下食麥門冬粥方生麥門冬去心淨洗切碎研爛絞取汁一合白粳米淨淘二合薏苡仁揀淨去土一合生地黃肥者四兩淨洗切碎研爛絞汁三合生薑汁一合上五味以水三盞先煮煎粳米薏苡仁二味令百沸次下地黃麥門冬生薑三汁相和煎成稀粥空心溫服如嘔逆未定晚後更煮食之治妊娠常苦煩悶此名子煩竹瀝粥方淡竹瀝三合粟米三合上二味以水煮粟米成粥臨熟下竹瀝更煎令稀稠得所食之治妊娠數月未滿損動蔥粥方蔥三莖糯米三合上二味以蔥煮糯米粥食之效如産後血運用之亦效治妊娠漏胎血盡即子死小豆飲方赤小豆半升蜀椒去目並閉口炒出汗十四枚烏雌雞一隻理如食法上三味以水二升煮雞豆椒令熟取汁時時飲之未瘥更作服之治妊娠下血漏胎生地黃粥方生地黃汁一合糯米淘淨一合上二味先將糯米煮作粥熟後下地黃汁攪調勻服之每日空腹食之治妊娠血下不止名曰漏胎血儘子死方上取雞子五枚取黃以好酒一盞煎如稀餳頓服之未瘥更作服之以瘥為度治妊娠小便淋鯉魚汁方鯉魚一頭重半斤者治如食法葵菜六莖去根蔥白二莖細切上三味以水五盞煮令熟入少許鹽取卻魚菜等將汁飲之治妊娠胎不安雞子羹方雞子一枚阿膠炒令燥一兩上二味以清酒一升微火煎膠令消後入雞子一枚鹽一錢和之分作三服相次服治妊娠冷熱氣痛連腹不可忍陳橘皮粥方陳橘皮湯浸去白焙一兩苧麻根刮去土曬乾一兩高良薑末三錢白粳米擇淨半合上四味除粳米外搗羅為散每服五錢匕先以水五盞煎至三盞去滓入粳米半合鹽一錢煮作常式粥食之空心一服至晚更一服治諸種瘧疾往來寒熱豉心粥方豆豉心二合以百沸湯泡細研桃仁湯浸去皮尖研三十枚柴胡去苗三錢末上三味先將前二味以白米三合水似常式煮粥後欲熟時次入柴胡末三錢攪勻食之治妊娠安胎鯉魚粥方鯉魚一頭治如食法糯米一合蔥二七莖細切豉半合上四味以水三升煮魚至一半去魚入糯米蔥豉煮粥食之治妊娠胎動不安阿膠粥方阿膠一兩搗碎炒令黃燥搗為末糯米半升上二味先取糯米煮作粥臨熟即下膠攪勻溫食之治妊娠養胎臟及治胎漏下血心煩口乾丹雄雞肉索餅方丹雄雞一隻取肉去肚作臑白麵一斤上二味搜面作索餅和臑任意食之治妊娠傷寒頭痛蔥豉湯方豉一合蔥白一握去須切生薑一兩切上三味水一大盞煮至六分去滓分二服食治産後諸病論曰妊娠者十月既足百骨皆坼肌肉開解然後能生百日之內猶名産母時人將調一月便為平復豈不謬乎若飲食失節冷熱乖理血氣虛損因此成疾藥餌不和更增諸病今宜以飲食調治庶為良矣治産後乳汁不下鮑魚羹方鮑魚肉切細半斤麻子仁別研一兩半香豉別研半合蔥白切碎三莖上四味先取鮑魚肉以水三升煮熱後入麻仁豉蔥白等煮作羹任意食之治産後乳汁不下宜食豬蹄羹方母豬蹄淨洗銼兩隻木通銼作寸段一兩半上二味先將木通以水五升煎取四升去木通和豬蹄入五味如常煮法煮熟作羹任意食之治産後乳無汁牛肉羹方牛鼻肉洗淨切小片上一味以水煮爛後入五味如常羹法任意食之治産後乳無汁豬蹄羹方豬蹄洗銼一具粳米淨淘一合上二味水不拘多少以五味煮作羹任意食之作粥亦得治産後乳汁不下龜肉臛方龜肉洗切二兩羊肉洗切三兩獐肉洗切三兩上三味水不拘多少入五味煮作臛食之治産後乳無汁鹿肉臛方鹿肉洗切四兩上用水三碗以五味煮肉作臛任意服之治産後乳汁不下豬蹄粥方母豬蹄一隻治如食法以水三盞煮取二盞去蹄王瓜根洗切木通銼碎漏蘆去蘆頭各一兩上四味除豬蹄汁外粗搗篩每服三錢匕以煮豬蹄汁二盞先煎藥至一盞半去滓入蔥豉五味等並白米半合煮作粥任意食之治産後風虛勞冷百骨節疼身體煩熱豬腎臛方豬腎一對去脂膜薄切羊腎一對去脂膜薄切上二味以五味並蔥白豉作臛如常食之不拘時治産後惡血不利壯熱虛煩生藕汁飲方生藕汁半盞地黃汁半盞蜜一匙淡竹葉一握切以水一盞半煎取汁半盞上四味同煎沸熟溫分三服日二夜一治婦人蓐中好食熱面酒肉變成渴躁生藕汁飲方生藕汁半盞生地黃汁半盞上二味相和溫暖分為三服治産後寒熱狀如瘧豬腎粥方豬腎去脂膜細切一對香豉一合白粳米三合蔥細切三莖上四味以水三升煮豬腎豉蔥至二升去滓下米煮如常食以五味調和作粥食之未瘥更作治産後血壅消渴日夜不止宜食冬瓜撥刀方冬瓜研取汁三合小麥面四兩地黃汁三合上三味一處搜和如常面切為撥刀先將獐肉四兩細切用五味調和煮汁熟卻濾去肉取汁下撥刀面煮令熟不拘多少任意食之治産後積熱勞極四肢乾瘦食飲不生肌肉豬肚羹方獖豬肚一枚淨洗先以小麥煮令半熟取出肚細切令安一處黃耆銼碎半兩人參三分粳米三合蓮實銼碎一兩上五味以水五升煮豬肚入人參黃耆蓮實候爛濾去藥並肚澄其汁令清方入米煮將熟入蔥白五味調和作粥任意食之治産後心虛忪悸遍身疼痛脯雞糝方黃雌雞一隻去毛頭足腸胃淨洗以小麥兩合以水五升煮雞半熟即取出雞去骨蜀椒去目並閉口炒汗出取末一錢柴胡去苗二錢乾薑末半錢粳米三合上五味先取水再煮雞及米令爛入蔥薤椒薑柴胡末等次又入五味鹽醬煮取熟任意食之治産後七日後宜吃羊肉粥方白羊肉去脂膜四兩細切粳米淨淘三合生地黃汁三合桂去粗皮取末一分上四味以水煮肉並米熟後入地黃汁並桂末更得所以五味調和空心任意食之治産後無所苦欲睡而不得睡茯苓粥方白茯苓去黑皮取末半兩粳米二合上二味以米淘淨煮粥半熟即下茯苓末粥熟任意食之必得睡也治産後虛羸補益宜食黃雌雞飯方黃雌雞一隻去毛及腸肚生百合淨洗擇一顆白粳米飯一盞上三味將粳米飯百合入在雞腹內以線縫定用五味汁煮雞令熟開肚取百合粳米飯和雞汁調和食之雞肉食之亦妙治産後虛損黃雌雞羹方黃肥雌雞理如食法一隻蔥白五莖切粳米半升上三味依常法以五味調和為羹任意食之治婦人産後赤白痢腰腹㽱痛不能下食燒豬肝方豬肝四兩蕪荑末一錢上二味以豬肝薄切糝蕪荑末於肝葉中五味調和以濕紙裹煻灰火煨熟去紙食之治産前後赤白痢紫莧粥方紫莧葉細銼一握粳米三合上二味以水先煎莧葉取汁去滓下米煮粥空心食之立瘥治初産腹中惡血不下地黃粥方生地黃五兩搗絞汁三合生薑搗絞取汁二合粳米淨淘三合上三味先以米依常煮粥臨熟時下地黃及生薑汁攪令勻空腹食之治産後小便不利淋澀滑石粥方滑石半兩別研瞿麥穗一兩粳米三合上三味以水三升先煎瞿麥取二升半濾去滓將汁入米煮如常粥將熟入鹽少許蔥白三寸方入滑石末煮令稀稠得所分作三度食之治産後赤白痢鯽魚鱠方鯽魚一斤治如食法蒔蘿陳橘皮湯去白焙蕪荑乾薑炮胡椒各一錢為末上六味取鯽魚作鱠投熱豉汁中入鹽藥末攪調空腹食之治産後乳無汁鯽魚羹方鯽魚一斤蠐螬五枚上二味依常煮羹食後食之食治小兒諸病治小兒秋夏中暴冷忽下痢腹脹乍寒乍熱渴甚食雞子餅方雞子二枚去殼胡粉半兩炒令黃黃蠟一棗大上三味先下黃蠟於銚子內微火上熔次下雞子黃及胡粉調和候冷作餅與兒空心午後食之量兒大小增減治小兒久痢豬子肝方豬子肝一具上一味切片炙熟空心食之治小兒泄注四味粱米湯方粱米稻米黍米各三合蠟如半彈丸大上四味以東流水二升煮粱米三沸絞去滓以汁煮稻米三沸去滓用汁煮黍米三沸絞去滓置蠟於汁中候蠟消每服半合空心午後各一隨兒大小增減治小兒癖瘕病牡丹粥方牡丹葉漏蘆去蘆頭決明子各一兩半雄豬肝去筋膜切研二兩上四味以水三升煎牡丹葉等三味去滓取一升半入豬肝及入粳米二合煮如常粥空腹食之隨兒大小加減治小兒霍亂乳母食扁豆粥方扁豆莖切焙一升人參二兩上二味以水三升先煮扁豆莖令熟下人參煎至二升去滓取汁煮粟米三合為粥與乳母食臨乳兒時先挼去少許冷乳汁然後乳兒母常食此粥佳治小