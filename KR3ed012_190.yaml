砂糖三分上四味以水一碗煮石膏竹葉十數沸去滓下粳米半盞煮粥將熟入砂糖少許食之食治大腸諸疾治大便風澀郁李仁粥方郁李仁湯浸去皮二錢別研蜜一合生薑二錢拍碎粳米淘淨三合上四味先用米煮粥將熟下郁李仁等三味攪勻更煮五七沸空心頓食之微利為度治中風五臟壅熱言語謇澀精神昏昧大便澀滯麻子粥方麻子半升研爛生薄荷一握細切生荊芥一握細切白粱米淘淨三合上四味以水三升煮麻子等三味至一升半濾去滓下米煮粥空心食治大方壅澀檳榔粥方白檳榔一顆水磨盡生薑取汁半合蜜一合粳米淘淨三合上四味先以水三升煮米作粥將熟下檳榔等三味攪勻更煮五七沸空心頓食之治中風手足不隨言語謇澀大便難筋骨痛薏苡仁粥方薏苡仁搗如粟大三合麻子半升上二味以水三升爛研麻子生絹濾取汁煮薏苡仁作粥空心食之治肺痿勞嗽胸膈痛大便祕糯米粥方糯米淘淨兩合檳榔炮銼搗取末一分郁李仁湯浸去皮研成膏一分大麻子兩合上四味先研大麻子令爛以水三升與大麻仁攪勻生絹濾取汁煮糯米作粥將熟入檳榔末郁李仁膏攪勻空心食之治大便祕澀糯米粥方糯米淘淨大麻子各兩合上二味先以水三升研麻子生絹濾取汁煮米作粥空心食治大便壅澀面目虛腫牽牛粥方牽牛子炒熟搗取末半兩別取生者搗取末半兩同研勻旋用白粳米淘淨三合生薑細磨二錢上三味先用水三升煮粥次入牽牛末五錢匕併入生薑攪勻空心食須臾轉下滯物治大便不通燥結腸內脹痛桃花面方新桃葉二兩半或用乾者四兩搗末白麵半斤上二味水和勻薄切如常食煮熟空心淡食之至午時腹中鳴當下惡物三五日內忌熱毒炙爆治大腸風祕風毒下注腳膝煩疼檳榔粥方檳榔水磨盡一枚真酥半匙生薑自然汁半盞上三味相和以白粟米煮粥入蔥薤白更煮數沸入前三藥同煮至熟空心頓食未利晚食前再作治腸風瀉血胡荽餅方胡餅胡荽淨擇作齏上二味以胡餅裹胡荽食之治腸風祕結麻子粥方大麻子半斤附子二兩炮裂去皮臍別搗末上二味將麻子淘淨曝乾搗羅為末每服二兩水一升半研勻細布絞取汁入附子末一錢匕相和粟米一合同煮粥空心食不得用漆匙治久患腸風下血肛門疼痛食野豬肉方野豬肉二斤上一味切作炙臠入椒鹽蔥白串炙令熟空腹食之治腸風下血煩渴烏梅粥方烏梅椎碎七顆粟米淘淨不拘多少上二味以水八合浸一宿去烏梅取汁煮粥每日空腹頓食之治腸風五痔熱血馬齒菜方馬齒菜上一味每日作齏食之食治五淋治熱淋及小便出血莖中痛車前子葉羹方車前子葉擇取一斤細切蔥白一握細切粟三合淨淘上三味以豉汁五升煮令沸先下米煮熟次下車前葉蔥白和作羹入少鹽醋空腹食之或煮為粥亦得治熱病小便不利鳧葵粥方鳧葵擇取葉二斤細切即水中荇葉也粟米半升淨淘上二味先用鹽豉汁五升煎令沸下米煮十餘沸下鳧葵煮作粥空心任意量多少食之治小便不通粟酥粥法粟米一升淨淘酒一升酥無好酥以熟油一兩代之蔥白一握細切上四味用漿水五升煮米為粥候粥將熟下酒酥蔥更煮取熟令病人空腹恣意食之或腹痛無害但行三五十步即通治小便不通蔥白粥方蔥白去須葉一大握細切爛研生布絞取汁白粳米兩合淨淘上二味以水二升半煮米作粥候粥將熟下蔥汁更煮取熟空心溫食之良久即便治諸淋小便赤澀莖中疼痛葵菜粥方葵菜擇取葉並嫩心三斤細切粟米三合淨淘蔥白去須葉一握細切上三味先以水五升煮葵菜至三升絞去葵菜取汁下米並蔥白更入濃煎豉汁五合同煮為粥空心頓食之食不盡分作兩度一日取盡治熱淋小便不通真酥粥方真酥一兩粟米三合淨淘淡漿水三升上三味以漿水煮米作粥候粥將熟下酥更煮取熟適寒溫空腹恣意食之治小便淋瀝澀少疼痛青頭鴨羹方青頭鴨一隻淨去毛並腸肚骨等細切冬瓜去瓜瓤四兩細切萊蔔四兩細切蔥白四握細切上四味濃煎豉汁二斗煮鴨肉候熟入冬瓜等三味更煮取熟又入少許鹽醋空心任意食之治淋小腹結痛小便不通榆皮索餅方榆皮去粗皮細銼二兩白麵四兩上二味以水二升煮榆皮至五合絞去滓取汁和麵作索餅於濃煎鹽豉汁中熟煮空心食之續以熱蔥茶投之治小便淋痛酥粥方真酥一兩滑石三兩搗如麻子粒大白茯苓二兩搗如麻子粒大蔥白三七莖去須葉細切生薑一兩濕紙裹灰火煨細切上五味先以水四升煮後四味至二升以生絹濾去滓取清更入漿水一升添入粟米三合淨淘煮作粥候粥將熟方入酥攪勻取熟空心任意食之治久淋不瘥宜食粳酥粥方真酥三合蕪荑仁微炒別搗末三錢半上二味先取白粳米半升淨淘以水多少煮粥候熟下酥並蕪荑末攪勻任意食之食不盡分作兩度治五淋小便澀痛冬麻子粥方冬麻子一升爛研用水三升投以生絹濾取汁粳米三合淨淘上二味取麻子汁煮令沸下米煮將熟入蔥白並椒各少許煮熟空心食之治五淋小便不通紫蘇粥方紫蘇一兩糯米三合淨淘一方用粟米上二味以漿水二升煮紫蘇令沸去紫蘇下糯米煮粥空心任食之治五淋小便疼痛壯熱腹脹氣悶冬瓜羹方冬瓜去皮瓤一斤細切蔥白一握細切冬麻子一升洗研碎上三味以水三升漉麻子成漿生絹濾取汁煮冬瓜蔥白作羹候熟入少許鹽醋空心食之食治小便數治小便數下焦虛冷方羊肺細切一具羊肉切四兩上二味入五味作羹空腹食之治小便數下焦虛冷方生山芋半斤削去皮上一味拍碎慢火煎酒二升候酒沸旋下山芋入鹽椒蔥白空腹食之治小便數方生山芋削去皮半斤小豆葉嫩者一斤上二味豉汁中入五味煮羹食之治小便數方雞腸菜一斤上一味豉汁中入五味煮羹食之治小便數方生山芋半斤削去皮薤白切一握上二味以豉汁煮羹入五味如常法空腹食食治蛔蟲治蛔蟲檳榔粥方檳榔生用五枚酸石榴根皮東行者洗銼半斤上二味粗搗篩分作三度用每度以水一升半煎至一升絞去滓用粟米一合淨淘煮為粥平旦乘飢頓食得快利蟲出為效治蛔蟲緑豆汁方緑豆三升水五升煮爛絞取汁二升大麻子仁一升爛研入水半盞同研絞取汁上二味先取麻仁汁一半煎微溫後入緑豆汁一升同攪更煎微溫欲服時先吃炙羊肉乾脯一片吐滓只咽津五七度頓服藥汁須臾或吐或利即其蛔已消若未盡更服治蛔蟲心痛苦楝根粥方苦楝根洗去土取皮細銼半升上一味都以水二升半慢火煎至八合絞去滓以粟米三合淨淘量水多少並楝根汁同煮為稠粥隔宿不食平旦頓食之即蛔蟲盡下
