body:
  text: 卷第九十虛勞心腹痞滿論曰虛勞之人氣弱血虛營衛不足食飲入胃不能傳化故中氣痞塞胃脹不通使人心腹痞滿也治虛勞心腹痞滿不思飲食胸膈不利參苓煮散方人參白茯苓去黑皮丁香木香桂去粗皮益智去皮青橘皮湯浸去白焙芎藭蓬莪朮炮銼乾薑炮附子炮裂去皮臍各半兩遠志去心白朮厚朴去粗皮生薑汁炙黃耆銼炒半夏湯浸七遍用生薑汁製當歸切焙京三稜炮銼陳曲炒麥糵炒各一兩肉豆蔻去殼檳榔銼訶黎勒煨去核各五枚上二十三味搗羅為散每服三錢匕入鹽少許水一盞同煎至七分和滓溫服治虛勞心腹痞滿脅肋妨悶不思飲食訶黎勒湯方訶黎勒煨去核赤茯苓去黑皮陳橘皮湯浸去白焙前胡去蘆頭各一兩白朮紫蘇葉黃耆銼人參檳榔銼草豆蔻去皮各三分桂去粗皮桔梗炒木香甘草炙銼各半兩上一十四味粗搗篩每服三錢匕水一盞入生薑一分切碎煎至七分去滓溫服治虛勞冷氣上衝心腹痞悶腸鳴相逐或多刺痛嘔噦膨脹蓽澄茄丸方蓽澄茄一分沉香銼丁香木香蘹香子舶上者炒各半兩烏藥銼一兩白芷一兩一分葫蘆巴炒三分上八味搗羅為末煉蜜為丸如彈子大每服一丸生薑湯嚼下治虛勞心腹痞滿不思飲食柴胡飲方柴胡去苗枳殼去瓤麩炒白茯苓去黑皮京三稜煨銼厚朴去粗皮生薑汁炙各一兩白朮炒令黃色半兩上六味細銼如麻豆大每服五錢匕以水一盞半入生薑一分拍碎煎至八分去滓溫服治虛勞冷氣心腹痞悶腸鳴腹痛飲食減少木香煮散方木香白朮縮砂去皮益智去皮藿香用葉人參各一兩丁香半兩青橘皮湯浸去白焙陳橘皮湯浸去白焙各四兩桔梗炒三兩桂去粗皮厚朴去粗皮生薑汁炙各二兩高良薑一分甘草炙銼一兩半上一十四味搗羅為散每服三錢匕水一盞入生薑三片棗二枚劈破煎至七分和滓稍熱服如不及煎入鹽少許如湯點服治虛勞脾胃冷弱心腹痞滿不思飲食四肢怠惰補虛調胃建中丸方人參白朮厚朴去粗皮生薑汁炙乾薑炮陳橘皮湯浸去白焙枳殼去瓤麩炒各半兩訶黎勒三枚炮取皮上七味搗羅為末以煮棗肉和丸如梧桐子大每服二十丸生薑橘皮湯下不拘時候治虛勞心胸痞悶腹脅虛脹補虛進飲食人參煮散方人參鱉甲去裙襴醋炙各一兩附子炮裂去皮臍縮砂蜜去皮桂去粗皮陳橘皮湯浸去白焙乾薑炮柴胡去苗桔梗略炒當歸各三分切焙五味子甘草銼炒各半兩上一十二味搗羅為散每服三錢匕水一盞入生薑二片鹽少許同煎至七分去滓溫服每日空心午前日晚各一治虛勞下焦虛冷心腹痞滿吃食無味舌澀口乾四肢少力健脾胃茵陳煎丸方茵陳蒿三兩搗為末用醋一升煎為煎鱉甲去裙襴醋浸炙令黃色京三稜煨杵碎各一兩乾薑炮裂附子炮裂去皮臍枳殼皮瓤麩炒桂去粗皮青橘皮湯浸去白焙各半兩柴胡去苗一兩白朮半兩厚朴去粗皮生薑汁塗炙吳茱萸水浸一宿焙乾炒各一兩上一十二味除茵陳外搗羅為末用茵陳煎和為丸如梧桐子大每日空心生薑湯下三十丸如和不成更入熱蜜治虛勞胸膈痞悶氣逆煩滿脅肋虛脹前胡丸方前胡去蘆頭人參白茯苓去黑皮桂去粗皮陳橘皮湯浸去白焙白朮各一兩半杏仁去皮尖雙仁入麩炒研檳榔銼各二兩上八味搗研為末煉蜜丸如梧桐子大每服二十丸溫酒下日二治虛勞氣逆心腹痞滿四肢羸瘦腹脹不下食柴胡湯方柴胡去苗三兩枳殼去瓤麩炒二兩白茯苓去黑皮三分白朮二兩人參一兩麥門冬去心焙一兩半上六味粗搗篩每服三錢匕水一盞入生薑半分拍碎煎至七分去滓空腹溫服日午夜臥各一虛勞心腹痛論曰虛勞之人氣弱胃虛飲食傷動冷氣乘之邪正相干則腹痛不已上干心絡故令心腹俱痛也治虛勞心腹撮痛肌體羸瘦茱萸豬肚丸方吳茱萸湯洗焙炒一兩半食茱萸一兩山茱萸一兩附子炮裂去皮臍乾薑炮硫黃研陳橘皮湯浸去白焙各半兩青橘皮湯浸去白焙禹餘糧炭火煅赤各一兩上九味搗研為末以生豬肚一枚先將藥末用醋拌和令勻入在豬肚內縫合用水一斗以文武火煮爛砂盆內一處研令得所丸如梧桐子大每服二十丸空心食前鹽湯下溫酒亦可治虛勞冷氣攻擊心腹撮痛腰胯重疼硇砂附子丸方硇砂研一錢檳榔二枚木香一分乾蠍炒一錢附子炮裂去皮臍沉香鎊蘹香子炒桃仁去皮尖雙仁慢火炒自然銅火煅醋淬七遍各半兩上九味搗羅為末醋煮麵糊為丸如梧桐子大每服十五丸生薑熱酒下食前服治虛勞心腹疼痛泄瀉腸鳴面黃肌瘦脅肋脹滿不思飲食金花散方半夏湯洗七遍切焙烏頭炮裂去皮臍鬱金用漿水生薑皂莢三味煮半日令軟切作片子焙乾麩炒木香馬蘭花酒浸炒各一兩胡椒楝實取肉炒當歸生切京三稜蓬莪朮二味椎碎用巴豆半兩去殼同炒褐色為度不用巴豆大腹濕紙裹煨過蕪荑炒白朮黃連去須炒各半兩上一十四味搗羅為散每服三錢匕用羯羊肝一具去筋膜批作片子勻滲藥末在內更入鹽三錢乾薑末二錢蕪荑末二錢匕蔥白一寸細切攪拌勻和白麵作角子慢火燒令香熟空心吃溫米飲下治虛勞心腹撮疼胸膈痞滿和氣進食蘹香子散方蘹香子炒附子炮裂去皮臍桂去粗皮蜀椒去目並閉口者炒出汗木香胡椒陳橘皮湯浸去白焙巴戟天去心乾薑炮各半兩京三稜煨銼一兩上一十味搗羅為散每服二錢匕用獖豬腎一對去筋膜切作薄片子入藥末蔥絲少許鹽半錢濕紙裹煨熟食訖以酒或粥飯壓之須臾覺臍下暖甚妙治虛勞心腹撮痛補骨脂丸方補骨脂炒楝實麩炒去核各一兩高良薑微炒一兩半巴戟天去心一兩葫蘆巴半兩蘹香子炒一兩上六味搗羅為末酒煮麵糊為丸如梧桐子大每服二十丸溫酒下鹽湯亦得食前服治虛勞心腹疼痛補骨脂散方補骨脂炒牛膝酒浸切焙沒藥研各半兩乾薑炮陽起石研蘹香子炒白茯苓去黑皮山芋各一兩上八味搗羅為散每服一錢匕溫酒調下治虛勞邪氣攻擊心腹刺痛牛膝湯方牛膝酒浸切焙柴胡去苗荊芥穗桔梗炒陳橘皮湯浸去白焙青橘皮湯浸去白焙各一兩人參肉蓯蓉酒浸切焙白茯苓去黑皮秦艽去苗土知母焙各半兩烏梅十五枚去核甘草炙三分烏頭麩炒裂安地上用盞蓋出火毒去皮臍尖三枚黃連去須三分敗龜以醋一碗塗浸炙用一兩上一十六味㕮咀如麻豆每服三錢匕水一盞入肥棗一枚劈煎至六分去滓溫服治虛勞下元久冷心腹疼痛不思飲食桂附丸方桂去粗皮一兩乾薑炮半兩蘹香子炒二兩附子炮裂去皮臍一兩硫黃研半兩上五味搗研為末用白麵糊為丸如梧桐子大每服二十丸空心鹽湯下治冷勞心腹疼痛或時泄痢兼治婦人下經冷病帶下艾葉煎丸方艾葉炒四兩當歸切焙乾薑炮各一兩上三味搗羅為末用米醋三升入藥末一半熬成煎後入余藥末相和丸如梧桐子大每服三十丸溫粥飲下空心食前服之治虛勞元臟氣冷心腹㽲痛蘹香子丸方蘹香子炒胡椒附子炮裂去皮臍阿魏面和作餅子炙熟青橘皮湯浸去白焙硫黃研菖蒲牛膝酒浸切焙五味子等分上九味搗羅為末麵糊為丸如梧桐子大每服十五丸空心溫酒下治虛勞元臟虛冷心腹疼痛精神倦怠白芷散方白芷炒半兩巴戟天去心一兩高良薑一錢上三味搗羅為散每服一錢匕豬腎一對去筋膜入藥末煨熟細嚼溫酒下治虛勞心腹撮痛不思飲食補益元臟平和脾胃楝實丸方楝實炒白朮各一兩烏藥銼蘹香子微炒補骨脂水淘去浮者微炒木香各半兩厚朴去粗皮用生薑汁炙一兩上七味搗羅為末酒煮麵糊和丸如梧桐子大每服二十丸空心食前溫酒或鹽湯下日三服虛勞咳唾膿血論曰虛勞之人氣血久耗寒邪僭熱伏結上焦內傷心肺殘賊營衛心主血血為營肺主氣氣為衛營衛不調金火相剋其病難治則因咳嗽間有膿血者津液腐化也宜潤養上焦滋益營衛則病緩而可已治五勞咳嗽咯唾膿血言語聲嗄日漸羸劣不欲飲食鱉甲湯方鱉甲去裙襴酒浸炙一兩半柴胡去苗一兩人參白朮知母焙半夏湯洗去滑炒桔梗炒紫菀去苗土各一兩一分桑根白皮炙銼一兩半芎藭三分芍藥炒一兩一分當歸切焙秦艽去苗土地骨皮各一兩半甘草炙桂去粗皮各三分虎頭骨酒浸炙一兩生乾地黃焙赤茯苓去黑皮檳榔煨附子炮裂去皮臍各一兩半上二十一味銼如麻豆每服三錢匕水一盞入生薑一棗大拍碎煎至七分去滓空腹食前溫服日三如有寒熱小便赤澀者更加蔥白一莖豉四十粒治五勞七傷四肢少力肌瘦盜汗遺精心忪不思飲食咳嗽唾膿血柴胡湯方柴胡去苗一兩半鱉甲去裙襴醋炙秦艽去苗土知母焙桂去粗皮人參白茯苓去黑皮附子炮裂去皮臍黃耆五味子羌活去蘆頭木香沉香各半兩枳殼去瓤炒一分枸杞子一分檳榔炮銼二枚上一十六味銼如麻豆每服三錢匕水一盞煎至六分去滓溫服不拘時候治虛勞煩躁羸瘦發熱面紅頰赤咳吐膿血鱉甲湯方鱉甲醋炙黃桑根白皮銼甘草炙銼貝母去心炒麥門冬去心焙白朮人參陳橘皮去白焙各一兩胡黃連知母焙麻黃去根節黃芩去黑心百部紫菀去苗土山梔子仁栝蔞根柴胡去苗款冬花各半兩上一十八味粗搗篩每服三錢匕水一盞半煎至八分入杏仁七枚去皮尖再同煎至六分去滓臨臥溫服如嗽止不用杏仁只用生薑少許同煎治虛勞咳嗽咯唾膿血葳蕤湯方葳蕤百部各一分麥門冬去心焙阿膠炒令燥馬兜鈴各半兩白茯苓去黑皮人參甘草炙銼桑根白皮銼各一兩上九味粗搗篩每服三錢匕水一盞入烏梅一個生薑二片同煎至六分去滓不拘時候溫服治虛勞心肺俱傷咳唾膿血如聖黃耆湯方黃耆銼烏梅去核知母焙甘草炙銼款冬花秦艽去苗土貝母去心炒半夏湯洗七遍焙各一兩糯米桑根白皮銼各一分桃仁去皮尖麩炒鱉甲去裙襴醋炙黃各半兩人參一兩半柴胡去苗二兩上一十四味粗搗篩每服三錢匕水一盞半入生薑三片桃柳枝蔥白薤白各少許同煎至六分不拘時候去滓溫服治虛勞咳嗽咯唾膿血蛤蚧湯方蛤蚧酒浸一宿酥炙知母焙貝母去心炒鹿角膠炙燥甘草炙銼杏仁去皮尖雙仁麩炒枇杷葉拭去毛炙葛根銼人參各一兩桑根白皮炙銼三分上一十味搗羅為末每服二錢匕水一盞煎至八分去滓溫服治虛勞氣胸膈不利咳唾稠黏五味子散方五味子一兩訶黎勒皮一兩人參三分去蘆頭枳殼二分麩炒微黃去瓤前胡一兩去蘆頭陳橘皮半兩湯浸去白焙半夏半兩湯洗七遍去滑紫蘇莖葉三分大腹皮三分銼麥門冬一兩去心甘草三分炙微赤銼上十一味搗篩為散每服四錢匕水一中盞入生薑半分煎至六分去滓不計時候溫服日二治虛勞咳唾稠黏咽喉不利茯苓散方赤茯苓一兩去皮麥門冬一兩去心生乾地黃一兩人參一兩去蘆頭前胡二兩去蘆頭枳實一兩麩炒微黃赤芍藥一兩甘草半兩炙微赤銼射干一兩上九味搗篩為散每服三錢匕水一中盞煎至六分去滓不計時候溫服治虛勞上焦浮熱咳唾稠黏黃耆散方黃耆一兩銼赤茯苓三分麥門冬三分去心枳殼三分麩炒微黃去瓤桑白皮三分射干三分桔梗三分去蘆頭甘草半兩炙微赤銼上八味搗篩為散每服四錢匕水一中盞生薑半分煎至六分去滓不計時候溫服治虛勞冷氣心腹痞滿不思飲食四肢少力白朮散方白朮一兩人參三分去蘆頭訶黎勒一兩煨去核陳橘皮一兩湯浸去白焙草豆蔻一兩桂心三分上六味搗篩為末每服四錢匕水一中盞入生薑半分棗三枚煎至六分去滓不計時候稍熱服治虛勞體熱消瘦骨蒸阿膠散方阿膠碎炒人參去蘆頭茯苓去皮玄參去