麥門冬去心焙甘草炙各一兩一分上一十八味搗羅為末煉蜜丸如梧桐子大每空腹米飲下十丸日二服治虛勞精神恍惚悸動不安煩熱體痛靈寶丹方天靈蓋一枚塗酥炙鬼箭羽白朮炒虎頭骨塗酥炙各一兩上四味搗羅為末別入丹砂雄黃麝香各半兩同研勻煉蜜和丸如梧桐子大每服十丸至二十丸煎安息香湯下米飲亦得日二服虛勞不得眠論曰老人臥而不寐少壯寐而不寤者何也少壯者血氣盛肌肉滑氣道通營衛之行不失於常故晝日精夜不寤也老人血氣衰肌肉不滑營衛之道澀故晝日不能精夜不得寐也虛勞之人氣血衰少營衛不足肌肉不滑其不得眠之理與老人同蓋虛勞為病也治虛勞不得眠虛煩不寧酸棗仁湯方酸棗仁去皮微炒五兩知母焙乾薑炮白茯苓去黑皮芎藭各一兩甘草炙銼半兩上六味粗搗篩每五錢匕水一盞半煎至一盞去滓空腹分溫二服如人行四五里相次服之亦可加桂心一兩治虛勞煩躁不得眠茯苓湯方白茯苓去黑皮人參各二兩麥門冬去心焙陳橘皮去白焙杏仁湯浸去皮尖雙仁炒紫蘇微炒各一兩酸棗仁炒五兩上七味粗搗篩每五錢匕水一盞半生薑半分拍碎煎至一盞去滓空腹分溫二服相次服之治虛勞煩不得睡脅下氣逆人參湯方人參二兩酸棗仁微炒去皮五兩白朮陳橘皮去白焙五味子焙茯神去木各一兩桂去粗皮半兩上七味粗搗篩每服三錢匕以水一盞半生薑一分拍碎煎至七分去滓空腹溫服日再治營衛俱傷虛煩不得眠半夏湯方半夏湯洗七遍去滑白茯苓去黑皮各三分酸棗仁湯浸去皮炒二兩麥門冬去心焙甘草炙銼桂去粗皮黃芩去黑心遠志去心萆薢銼炒人參各半兩上一十味粗搗篩每五錢匕先以東流水二盞煮秫米一合令蟹目沸即下藥入生薑半分拍碎煎至一盞去滓空心分溫二服相次服之治虛勞不得眠黃耆湯方黃耆銼炒桂去粗皮芍藥各三分甘草炙銼當歸炙人參各半兩乾薑炮一兩上七味粗搗篩每服五錢匕以水一盞半入粳米一合棗二枚劈破煎至一盞去滓空腹分溫二服相次服之治虛勞驚恐不安夜不得眠桔梗湯方桔梗炒銼三分半夏湯洗七遍去滑薑汁炒一兩一分白朮三分甘草炙銼一分桂去粗皮芍藥各半兩玄參一兩半上七味粗搗篩每服三錢匕以水一盞入生薑半分拍碎煎至七分去滓下飴糖一分空腹溫服夜臥再煎服治虛勞煩擾氣奔胸中不得眠酸棗仁湯方酸棗仁湯浸去皮炒別研石膏各一兩桂去粗皮人參各半兩甘草炙銼一分知母銼焙白茯苓去黑皮各三分上七味粗搗篩每服五錢匕水一盞半入生薑半分拍碎煎至一盞去滓空腹分溫二服相次服之夜臥再煎服治虛勞氣滿不得眠手足疼痛茯苓湯方白茯苓去黑皮桂去粗皮乾薑炮甘草炙銼芍藥食茱萸各半兩熟乾地黃洗焙三分上七味粗搗篩每服五錢匕以水一盞半入棗兩枚去核煎至一盞去滓空腹溫服日再治虛勞煩躁不得睡茯神湯方茯神去木人參各一兩酸棗仁炒去皮別研五兩上三味粗搗篩每服三錢匕以水一盞入生薑半分拍碎煎至七分去滓空腹溫服日二夜一治虛勞發煩不得眠半夏湯方半夏湯洗去滑七遍炒乾二兩白茯苓去黑皮四兩糯米炒黃一合上三味粗搗篩每服五錢匕以東流水一盞半生薑半分拍碎煎至一盞去滓空腹溫服日二治虛勞煩躁夜不得眠少氣熻熻微熱口乾減食麥門冬湯方麥門冬去心焙前胡去蘆頭人參黃耆銼炒各半兩上四味粗搗篩每服五錢匕以水一盞半入生薑半分拍碎小麥半合煎至八分去滓溫服不計時治虛勞晝夜不得眠短氣食飲不下或大病後虛熱痰冷橘皮湯方陳橘皮去白焙一兩芎藭一分半甘草炙銼一分半夏湯洗去滑炒半兩上四味粗搗篩每服五錢匕以東流水一盞半入生薑半分拍碎生竹茹少許煎至八分去滓溫服夜臥再煎服治虛煩不得睡眠鱉甲丸方鱉甲去裙襴醋炙酸棗仁炒羌活去蘆頭黃耆銼炒附子炮裂去皮臍柴胡去苗白茯苓去黑皮肉蓯蓉酒浸切焙牛膝酒浸切焙知母焙五味子炒各一兩上一十一味搗羅為末煉蜜為丸如梧桐子大每服二十丸暖酒下治虛勞熱氣乘心憂懼不安不得眠睡麥門冬湯方麥門冬去心焙一兩半榆白皮銼苦參黃連去須地骨皮黃芩去黑心龍膽各一兩上七味粗搗篩每服五錢匕水一盞半煎至七分去滓入地黃汁半合食後頓服治不得睡酸棗仁煎方酸棗仁去皮五兩炒搗篩只取末二兩半乳香研二兩蜜四兩牛黃別研入一分糯米二合炒丹砂研半兩上六味用酒半升和蜜等一處慢火煎如稀餳每服一匙頭溫酒調下腹空時服治虛勞煩悶不得眠睡酸棗仁丸方酸棗仁炒地榆葉各半兩上二味搗羅為末煉蜜和丸如梧桐子大每服三十丸糯米飲下治虛勞煩悶不得眠睡方上取酸棗仁不拘多少炒令香熟搗羅為散每服三錢匕用水一盞煎取六分熱呷
