body:
  text: 卷第四十五脾疸論曰內經曰有病口甘者此五氣之溢也名曰脾疸夫食入於陰長氣於陽肥甘之過令人內熱而中滿則陽氣盛矣故單陽為疸其證口甘久而弗治轉為消渴以熱氣上溢故也治脾疸口甘中滿蘭草湯方蘭草一兩切上一味以水三盞煎取一盞半去滓分溫三服不拘時候治脾疸藏熱唇焦口氣引飲不止赤芍藥湯方赤芍藥生乾地黃焙各一兩大黃銼炒甘草炙各半兩上四味粗搗篩每服二錢匕水一盞煎至七分食後溫服去滓治脾疸面黃口甘煩渴不止葛根湯方葛根銼二兩半麻黃去根節一兩桂去粗皮三分石膏碎三兩芍藥一兩一分甘草炙一兩上六味粗搗篩每服三錢匕水一盞煎至七分去滓不拘時溫服治脾疸煩懊口甘咽乾煩渴竹葉湯方淡竹葉切一兩柴胡去苗二兩犀角鎊屑芍藥各一兩半黃芩去黑心大黃銼炒各半兩梔子仁七枚上七味粗搗篩每服五錢匕水一盞半煎至一盞去滓下朴硝半錢匕溫服治脾疸發黃口乾煩渴麥門冬湯方麥門冬去心生用三兩芍藥黃芩去黑心各一兩半梔子仁五枚石膏碎三兩犀角鎊屑一兩上六味粗搗篩每服五錢匕水一盞半煎至一盞去滓入朴硝半錢匕食後溫服治脾疸身熱口甘咽乾煩渴知母湯方知母一兩半石膏碎三兩升麻銼甘草炙銼各一兩竹葉一握白粳米一合枇杷葉拭去毛三分上七味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服治脾疸口甘煩渴不止前胡湯方前胡去蘆頭一兩半赤茯苓去黑皮二兩桂去粗皮三分犀角鎊屑一兩檳榔三枚銼芍藥一兩上七味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服治脾疸口甘咽乾煩渴茯苓湯方赤茯苓去黑皮厚朴去粗皮生薑汁炙銼各四兩甘草炙銼人參黃芩去黑心各二兩桂去粗皮五兩半夏湯洗七遍五兩上七味粗搗篩每服五錢匕水一盞半生薑三片煎至一盞去滓不拘時溫服治脾疸煩渴三和飲子方生薑半兩研取汁糯米半合淘研蜜一合上三味相和分為五服每服以新水一盞調下不拘時候治脾疸口甘內熱中滿羚羊角丸方羚羊角鎊枳殼去瓤麩炒大黃銼炒木通銼大麻子仁檳榔銼桑根白皮銼各一兩前胡去蘆頭赤茯苓去黑皮各半兩上九味為細末煉蜜丸如梧桐子大每服二十丸不拘時溫水下治脾疸內熱煩渴麥門冬煎方生麥門冬汁生地黃汁各半斤蜜半升栝蔞根二兩地骨皮黃耆銼葳蕤知母淡竹葉切犀角鎊屑升麻各一兩甘草炙半兩石膏碎研凝水石碎研各二兩上一十四味除前三味外粗搗篩以水七升煎藥取三升濾去滓次入前三味再以慢火熬如稀餳以瓷合盛每服一匙溫湯化下不拘時谷勞論曰胃受水穀其氣虛弱不能傳化則令人怠惰嗜臥肢體煩重腹滿善飢而不能食食已則發穀氣不行使然也故謂之谷勞治谷勞體重食已便臥快氣消食沉香湯方沉香銼一兩白豆蔻皮去草豆蔻去皮炒人參甘草炙銼白茯苓去黑皮半夏湯洗薄切生薑汁拌炒黃色木香各半兩厚朴去粗皮生薑汁炙一兩陳橘皮湯浸去白炒三分白朮銼炒一兩乾薑炮一分上一十二味粗搗篩每服三錢匕水一盞生薑三片棗二枚劈破同煎至七分去滓溫服空心日午各一服治谷勞嗜臥四肢怠惰丁沉丸方沉香銼陳橘皮湯洗去白焙訶黎勒煨熟取皮各一兩木香丁香各半兩肉豆蔻去殼炮二枚上六味搗羅為末煉蜜和丸如彈子大陳米飲或生薑鹽湯嚼下一丸不拘時治脾胃虛飲食不消勞倦氣脹嗜臥不樂人參散方人參檳榔銼白茯苓去黑皮陳橘銼厚朴去粗皮生薑汁炙麥糵炒白朮吳茱萸湯洗焙炒上八味等分搗羅為散每服二錢匕溫酒調下食後服日再治谷勞身重四肢少力食已好臥昏憒檳榔散方檳榔半兩人參白茯苓去黑皮各一兩木香陳橘皮湯浸去白炒五味子甘草炙各一兩上七味搗羅為細散每服二錢匕沸湯點服不拘時治谷勞身重食已好臥困倦嗜眠沉香湯方沉香銼白檀香銼各二兩乾薑炮二錢白茯苓去黑皮甘草炙肉豆蔻去殼炮人參木香各一兩上八味粗搗篩每服二錢匕水一盞煎至七分去滓不拘時溫服治谷勞身重食已因倦嗜眠木香湯方木香人參附子炮裂去皮臍甘草炙白茯苓去黑皮各二兩草豆蔻去皮半兩乾薑炮一分陳曲炒麥糵炒各一兩上九味銼如麻豆每服二錢匕水一盞煎至七分不拘時候去滓溫服治谷勞體重四肢煩倦食已便臥京三稜湯方京三稜煨銼五兩陳曲炒麥糵炒木香肉豆蔻去殼炮檳榔乾薑炮甘草炙杏仁湯去皮尖雙仁麩炒研厚朴去粗皮生薑汁炙各一兩上一十味粗搗篩每服三錢匕水一盞煎七分不拘時去滓溫服治谷勞體重食已好臥豆蔻丸方白豆蔻去皮一兩半枳殼去瓤麩炒半斤陳橘皮湯浸去白切炒訶黎勒煨去核桂去粗皮當歸切焙各一兩上六味搗羅為末用漿水煮棗去皮爛研丸如梧桐子大每服二十丸至三十丸生薑湯下不拘時治谷勞身重少力多困木香湯方木香陳橘皮去白炒人參陳曲炒甘草炙各三分大棗去核焙五十枚厚朴去粗皮生薑汁炙麥糵炒蓬莪朮煨各一兩上九味粗搗篩每服三錢匕水一盞煎至八分去滓溫服不計時候治谷勞嗜臥身體煩重分氣丸方京三稜煨銼蓬莪朮煨銼青橘皮銼用巴豆半兩打破同炒黃去巴豆不用各五兩胡椒半兩阿魏一兩醋面作餅炙乾上五味同為細末醋煮麵糊為丸如梧桐子大每服二十丸陳橘皮湯下日三服脾胃冷熱不和論曰體弱之人穀氣不足脾胃既虛冷熱之氣易為傷動蓋脾胃者倉廩之官布化精氣灌養四旁其氣虛弱則食飲或冷或熱多致不消使陰陽交爭冷熱相搏故令脾胃不和也治脾胃冷熱氣不和食毒脾胃中宿積沉香阿魏丸方沉香木香各三分芎藭當歸銼焙蓬莪朮炮陳橘皮去白焙延胡索檳榔銼吳茱萸醋浸一宿炒益智仁桂去粗皮白朮附子炮裂去皮臍乾薑炮草豆蔻去皮各半兩阿魏一兩半瓷器中醋浸一宿生絹濾去砂入面煮糊上一十六味搗羅十五味為細末用阿魏摻和糊杵三二百下丸如梧桐子大丹砂為衣生薑橘皮湯下五七丸血氣溫酒醋湯下治脾胃冷熱氣不和不思飲食或腹痛㽲刺勝金丸方山梔子仁烏頭各等分上二味生搗羅為細末以酒糊丸如梧桐子大每服十五丸炒生薑湯下如小腸氣痛炒蘹香子酒下十丸治脾胃冷熱相攻胸膈氣悶消痰進食快活丸方五味子微炒一兩枳殼去瓤微炒一兩半糯米炒香熟一兩半檳榔銼半兩京三稜炮半兩蓬莪朮炮半兩郁李仁湯浸去皮半兩青橘皮湯去白焙一兩上八味搗羅為細末用半夏一兩生薑二兩爛煮研細為糊丸如緑豆大每服十五丸至二十丸食後溫湯下治脾胃冷熱氣不和平胃前胡湯方前胡去蘆頭人參白茯苓去黑皮附子炮裂去皮臍半夏生薑汁浸一宿並生薑杵令勻焙乾白朮枇杷葉拭去毛厚朴去粗皮生薑汁塗炙透訶黎勒紙裹煨熟去核各一兩半檳榔銼肉豆蔻去殼陳橘皮湯去白焙乾薑炮甘草炙各三兩上一十四味銼如麻豆每服三錢匕水一盞入生薑一棗大切棗二枚劈同煎至七分去滓不計時候溫服治脾胃冷熱氣不和心腹虛脹痰逆不思飲食四肢無力丁香散方丁香乾薑炮白朮各半兩人參赤茯苓去黑皮木瓜去瓤切焙草豆蔻去皮訶黎勒煨用皮茅香花各三分甘草炙一分上一十味搗羅為細散不計時煎生薑棗湯調下一錢匕治脾胃氣冷熱不和胸膈氣滯不下飲食宜服大腹皮湯方大腹皮銼炒檳榔生銼桑根白皮銼各半兩訶黎勒皮煨陳橘皮湯浸去白焙赤茯苓去黑皮各三分上六味粗搗篩每服三錢匕以水一盞入生薑半分切煎至七分去滓不計時溫服治脾胃冷熱氣不和胸膈滿悶四肢無力痰逆不思飲食藿香湯方藿香葉半兩訶黎勒皮煨半兩人參三分陳橘皮湯浸去白焙三分半夏湯洗七遍去滑焙半兩赤茯苓去黑皮三分桂去粗皮三分白朮三分草豆蔻去皮一兩枳實去瓤麩炒半兩高良薑三分甘草炙銼半兩厚朴去粗皮塗生薑汁炙一兩上一十三味粗搗篩每服三錢匕水一盞入生薑半分切棗三枚劈破煎至七分去滓不計時稍熱服治脾胃冷熱氣不和寬中脘和中丸方附子炮裂去皮臍一兩乾薑炮三兩甘草炙一兩木香一兩蘹香子炒一兩青橘皮湯去白焙半兩沉香半兩炙藿香葉半兩上八味搗羅為細末湯浸炊餅和丸如櫻桃大每服一丸白湯化下食前服治脾胃冷熱氣不和止痰逆思飲食勻氣湯方厚朴去粗皮生薑汁炙一兩陳橘皮湯去白焙半兩白朮半兩甘草炙一兩白茯苓去黑皮半兩麥糵炒一分高良薑炒一分沉香一分甘松一分上九味粗搗篩每服三錢匕水一盞入生薑二片棗二枚劈同煎至七分去滓不計時溫服脾胃氣虛冷水穀不化論曰損其脾者調其飲食適其寒溫若食飲不節寒溫失宜致脾胃氣弱冷氣乘之則不能腐化水穀而四肢身體無所稟養也治脾胃虛冷氣上攻胸膈三焦不調不思飲食及飲食不消開胃進食八味厚朴丸方厚朴去粗皮生薑汁炙令紫二兩陳橘皮湯去白焙一兩訶黎勒取肉一兩生用桂去粗皮取肉一兩附子炮裂去皮臍一兩乾薑炮一兩白茯苓去黑皮一兩甘草炙一兩上八味搗羅為細末拌令勻煉蜜丸如梧桐子大每服三十丸空心晚食前溫酒或鹽湯下嚼破如大段膈氣進食不得即留一半散每服二錢匕以酒二合水二合同煎至二合和滓下丸藥三十粒治脾胃虛冷氣久不順中脘痞悶全不思食痰逆嘔噦水穀遲化穀神丸方小麥糵炒陳曲炒各一兩半烏梅肉炒一兩生薑切焙陳橘皮焙去白枳實去瓤麩炒各半兩上六味搗羅為末煉蜜丸如梧桐子大每服三十丸食後米飯下治脾胃虛冷一切病溫白丸方半夏湯浸切作片生薑汁浸焙二兩白朮一分丁香一分上三味搗羅為末生薑汁麵糊丸如梧桐子大每服十丸濃煎生薑湯下食前空心服如腹痛嘔逆食後服治脾胃虛冷食即嘔逆水穀不化或時泄利和胃丸方厚朴去粗皮生薑汁炙透四兩乾薑炮當歸切焙各一兩半人參檳榔銼各一兩一分陳橘皮湯去白焙白朮半夏湯洗七遍去滑焙各二兩桔梗焙一兩甘草炙半兩訶黎勒皮三分上一十一味搗羅為末酒麵糊和丸如梧桐子大每服十五丸至二十丸溫生薑棗湯下米飲亦得不拘時候治脾胃虛冷胸膈痞滯吐逆霍亂臟腑滑利水穀不消脹滿腸鳴白豆蔻丸方白豆蔻去皮木香乾薑炮枳實去瓤麩炒各一兩半夏湯洗去滑七遍焙一兩半桂去粗皮白朮細辛去苗葉各三分訶黎勒皮一兩一分當歸切焙半兩上一十味搗羅為末酒煮麵糊丸如梧桐子大每服二十丸以米飲鹽湯下空心食前服治脾胃虛冷臍腹疼痛吐瀉不定裡急後重腸中虛鳴水穀不消不下飲食七棗湯方厚朴去粗皮生薑汁炙透焙乾半斤乾薑炮三兩甘草炙三兩烏頭炮裂去皮臍蘹香子炒益智仁去皮縮砂去皮各四兩上七味銼如麻豆每服二錢匕水一盞入棗七枚劈破同煎至七分去滓空心食前溫服治脾胃虛冷水穀不化腹內㽲刺撮痛臟腑不調及因冷物傷脾吐瀉不止豆蔻湯方草豆蔻薄面里燒香熟面用二兩桂去粗皮陳橘皮湯去白焙四兩高良四兩甘草炙四兩陳粟米炒焦研末八兩上六味搗羅五味為末入粟米末拌勻再羅過每服三錢匕淘米清泔一盞半生薑三片棗五枚劈破同煎至八分去滓熱服空心食前治脾胃虛冷飲食不化嘔逆多痰半夏湯方半夏白礬水煮焙白扁豆各一兩人參枳殼去瓤麩炒各半兩上四味粗搗篩每服二錢匕水一盞生薑三片棗一枚劈破同煎至七分去滓溫服治脾胃虛冷大腸滑泄飲食不化胡椒丸方胡椒一兩烏頭炮裂去皮臍乾薑炮赤石脂各半兩上四味搗羅為末麵糊丸如梧