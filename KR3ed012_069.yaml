body:
  text: 卷第六十九嘔血論曰愁憂思慮則傷心恚怒氣逆上而不下則傷肝蓋心主血肝藏血二藏俱傷則血不循經隨氣上逆故因嘔而血出也內經曰怒則氣上甚則嘔血治嘔血唾血咳逆氣喘短氣款冬花丸方款冬花紫菀去苗土各三兩杏仁湯浸去皮尖雙仁炒豉炒各二兩半人參桂去粗皮各半兩天門冬去心焙甘草炙銼蜀椒去目併合口炒出汗柏葉去梗焙生乾地黃焙各三分上一十一味搗羅為末煉蜜和丸如彈子大每服一丸冷熟水嚼下日三夜二治傷中胸內急痛咳嗽嘔血時寒時熱小便黃赤澤蘭湯方澤蘭葉六兩大黃銼炒遠志去心各一兩人參三兩麻仁桑根白皮銼各四兩上六味粗搗篩每服五錢匕水一盞半煎至一盞去滓冷服不拘時治嘔血鬱金散方鬱金銼甘草炙銼各一兩上二味搗羅為散每服二錢匕井華水調下不拘時治吐血嘔血五靈脂餅子方五靈脂一兩蘆薈二錢上二味搗研為末滴水和丸如雞頭大捏作餅子每服二餅龍腦漿水化下不拘時治嘔血吐血及鼻衄血麥門冬汁方生麥門冬汁生地黃汁生藕汁冷熟水各一盞白藥一兩為末上五味合和勻每服二盞略煎沸溫服不拘時治卒嘔血羚羊角飲方羚羊角鎊一兩半桂去粗皮二兩大黃銼炒一兩上三味粗搗篩每服三錢匕水一盞半煎至一盞去滓冷服不拘時治嘔血不止荊芥飲方荊芥穗梔子仁黃芩去黑心蒲黃各一兩上四味粗搗篩每服三錢匕水一盞煎至七分去滓冷服不拘時治嘔血煩滿少氣胸中痛阿膠湯方阿膠炙令燥甘草炙各一兩半上二味粗搗篩每服三錢匕水一盞入生地黃汁三合同煎至七分去滓溫服不拘時治嘔血荊芥湯方荊芥穗一兩上一味粗搗篩每服三錢匕水一盞半煎至一盞去滓冷服不拘時治嘔血比金散方黃柏去粗皮蜜炙二兩上一味搗羅為散每服二錢匕麥門冬熟水調下治憂恚嘔血煩滿少氣胸中痛生地黃湯方生地黃半斤阿膠炙令燥甘草炙各一兩半上三味㕮咀如麻豆大每服五錢匕以水一盞半入大棗二枚劈破煎至七分去滓溫服日二夜一治虛勞內傷寒熱嘔逆出血堅中湯方芍藥半夏湯洗七遍甘草炙各一兩半桂去粗皮一兩上四味㕮咀如麻豆大每服四錢匕以水一盞半入生薑一棗大切棗二枚劈破同煎至八分去滓入飴糖一分再煎令沸放溫服日二夜一治嘔血伏龍肝湯方伏龍肝一兩半生竹茹銼一升芍藥當歸切焙黃芩去黑心芎藭甘草炙各二兩生地黃一斤上八味㕮咀如麻豆大每服五錢匕以水一盞半煎至八分去滓溫服日三唾血論曰邪熱熏於肺則損肺恚怒氣逆傷於肝則損肝肺肝傷動令人唾血如唾中有若紅縷者屬肺如先苦脅下痛而唾鮮血者屬肝可析而治之治肺氣內傷邪熱熏積咳唾有血紫菀散方紫菀去苗土款冬花當歸切焙桂去粗皮芎藭五味子炒附子炮裂去皮臍細辛去苗葉貝母去心柏葉炒白朮甘草炙銼生乾地黃焙杏仁湯浸去皮尖雙仁炒各一兩上一十四味搗羅為散每服三錢匕蜜湯調下日三服不拘時治肺傷唾血羊肺湯方鍾乳粉三兩半夏生薑同搗作餅曝乾半兩桂去粗皮白石英碎射干桃仁湯浸去雙仁皮尖炒貝母去心陳橘皮去白焙百部切五味子炒款冬花甘草炙銼厚朴去粗皮生薑汁炙各一兩上一十三味粗搗篩每服三錢匕先用水二盞煮羊肺一兩至一盞去肺入藥末煎取七分去滓溫服日三夜一治心肺有熱唾血不止石膏湯方石膏二兩碎厚朴去粗皮塗生薑汁炙麻黃去根節五味子炒一兩杏仁湯浸去皮尖雙仁炒各一兩半夏生薑汁製曝乾半兩小麥洗二合上七味粗搗篩每服三錢匕水一盞生薑三片同煎至七分去滓空心日午夜臥溫服治肺傷唾血前胡湯方前胡去蘆頭二兩小麥茅根銼麥門冬去心焙麻黃去根節石膏碎甘草炙銼各一兩上七味粗搗篩每服三錢匕水一盞入生薑汁生地黃汁各半合同煎至七分去滓溫服治憂恚氣逆肝氣不足唾血不止礬石丸方礬石熬令汁枯生乾地黃焙乾薑炮裂桂去粗皮皂莢炙剖去皮並子桔梗銼炒附子炮裂去皮臍各一兩上七味搗羅為末煉蜜和丸如梧桐子大每服二十丸溫水下日三治恚怒傷肝唾血煩滿脅下痛阿膠散方阿膠炙令燥二兩甘草炙銼一兩上二味搗羅為散每服三錢匕以水一盞入生地黃汁二合煎至七分和滓溫服不拘時治肺熱唾血白前湯方白前桑根白皮銼桔梗銼炒二兩甘草炙銼一兩上四味粗搗篩每服三錢匕水一盞煎至七分去滓不拘時溫服治肺肝內傷卒唾血生地黃飲方生地黃二十兩搗絞取汁阿膠二兩每片如兩指大上二味每以膠一片入地黃汁一盞內飯甑蒸之取出放溫旋服治憂恚傷肝唾血胸脅疼痛地黃煎方生地黃汁五升上一味於銀石器內慢火煎至三升入白蜜一盞酒一盞再煎至三升每食後溫服半盞治唾血不止蒲黃散方蒲黃一兩上一味研細每服三錢匕冷水調下不拘時候吐血後虛熱胸中痞口燥論曰上焦有邪則傷於藏藏氣傷則吐血人病吐血之後榮衛俱虛陰陽否隔陽氣不降故身體虛熱胸中煩痞而口舌乾也治吐血後胸中痞痛口燥不喜食補肺湯方黃耆細銼桂去粗皮生乾地黃焙赤茯苓去黑皮厚朴去粗皮生薑汁炙紫菀去苗土陳橘皮湯浸去白焙當歸切焙五味子各二兩遠志去心麥門冬去心焙甘草炙銼鍾乳研成粉白石英研成粉人參桑根白皮銼炒各一兩上一十六味除別研外粗搗篩再入研藥同和勻每服五錢匕以水一盞半大棗二枚劈破同煎至一盞去滓溫服日二夜一治心肺壅熱上焦不利吐血胸中痞口乾地黃湯方生乾地黃焙地骨皮赤茯苓去黑皮甘草炙銼大黃濕紙裹煨銼玄參黃芩去黑心當歸切焙麥門冬去心焙藿香取葉升麻紫菀去苗土桑根白皮銼各一兩上一十三味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服不拘時治吐血後身體虛熱胸中痞隔口舌乾燥茯苓湯方赤茯苓去黑皮黃連去須生乾地黃焙梔子仁杏仁湯浸去皮尖雙仁麩炒黃芩去黑心大黃銼炒各一兩桂去粗皮栝蔞根各三分上九味粗搗篩每服三錢匕水一盞煎至七分去滓不拘時溫服治吐血後胸中痞口乾柏葉散方柏葉焙蒲黃各一兩木香烏魚骨去甲炙棕皮當歸洗切焙婦人油發與棕皮二味燒灰各半兩阿膠炙燥一兩上八味搗羅為細散每服一錢匕用糯米粥飲入地黃汁少許暖合溫調下不計時候服治吐血後虛熱胸中痞口燥鹿角膠散方鹿角膠炙燥阿膠炙燥秦艽去苗土糯米炒黃烏梅去核炒各等分上五味搗羅為細散每服二錢匕溫糯米飲調下早晚食後臨臥服治男子婦人吐血後膈上虛熱抵聖湯方陰地蕨紫河車銼貫眾去毛土甘草炙銼各半兩上四味粗搗篩每服三錢匕水一盞煎至七分去滓食後溫服治吐血後上脘痞隔虛熱口燥阿膠散方阿膠炙燥生乾地黃焙黃柏去粗皮蜜炙各半兩甘草炙銼一分上四味搗羅為細散每服二錢匕用綿灰蜜湯調下日三服治吐血後虛熱胸中痞口乾人參散方人參二兩阿膠炙蜜一兩甘草炙銼半兩黃耆細銼一兩半上四味搗羅為細散每服二錢匕溫糯米飲調下不拘時候治吐血後虛熱躁渴及解毒茜草丸方茜草銼雄黑豆去皮甘草炙銼各等分上三味搗羅為細末井華水和丸如彈子大每服一丸溫熟水化下不拘時服治吐血後虛熱胸中痞口燥鹿角膠散方鹿角膠炙燥黃柏去粗皮蜜炙各十兩杏仁四十九枚湯去皮尖雙仁麩炒上三味搗羅為細散每服一錢匕用溫水調下不拘時服治肺臟壅熱吐血心膈煩悶天竺黃散方天竺黃人參側柏葉焙大黃銼炒犀角鎊黃耆銼焙赤茯苓去黑皮馬兜鈴焙各半兩鹿角膠炒燥一兩上九味搗羅為散每服一錢匕暖生地黃汁調下不拘時舌上出血論曰心主血在竅為舌若心臟蘊熱則血得熱而妄行或溢於心之竅故有舌上出血之證甚者出如湧泉治心臟有熱舌上血出如湧泉升麻湯方升麻銼茜根銼小薊根銼各一兩半艾葉去梗一握凝水石碎三兩上五味粗搗篩每服三錢匕水一盞同煎至七分入生地黃汁一合更煎一二沸去滓溫服治心臟熱盛舌上出血香參丸方人參生蒲黃麥門冬去心焙當歸切焙各半兩甘草炙銼一分生乾地黃焙一兩上六味搗羅為末煉蜜丸如小彈子大每服一丸溫水化下日三四服治心經煩熱血妄行舌上血出不止寸金散方新蒲黃三錢匕新白麵二錢匕牛黃研生龍腦各半錢匕上四味同研極細生藕汁調下一錢匕食後臨臥服日二治舌上血出不止阿膠散方阿膠炒燥蒲黃黃耆細銼各一分上三味搗羅為細散每服一錢匕生地黃汁調下並二服治心經蘊熱舌上血出及諸失血熟艾湯方熟艾用糯米半合炒松葉柏葉炙各半兩上三味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治舌上出血竅如簪孔紫霜丸方紫金沙即露蜂房頂上實處是研一兩蘆薈研二錢貝母去心四錢上三味搗研為末煉蜜和丸如櫻桃大每服一丸水七分一盞化開煎至五分溫服吐血衄血每服一丸酒半盞化開服治舌上忽然血出不止聖金散方黃藥子一兩青黛一分上二味搗研為細散每服一錢匕食後新汲水調下日二服治心臟積熱血脈壅盛舌上血出鬱金散方鬱金一兩當歸切焙半兩上二味搗羅為散每服一錢匕煎生薑烏梅湯調下治舌上血出地黃散方生乾地黃焙乾鹿角膠炒令燥各一兩上二味搗羅為散每服二錢匕食後糯米飲調下治舌上出血不止阿膠湯方阿膠炒令燥一兩搗末蒲黃半兩上二味合和勻每服二錢匕水一盞煎至六分入生地黃汁一合更煎一二沸溫服不拘時候治舌上出血清心散方刺薊一握上一味研絞取汁以酒半盞調服如無生汁只搗乾者為末冷水調下三錢匕兼治大衄治心臟熱極舌上出血黃蘗散方黃蘗二兩塗蜜慢火炙焦上一味搗羅為散每服二錢匕溫糯米飲調下汗血論曰內經言藏真通於心血脈之氣行焉又曰肝藏血人臥血歸於肝蓋血雖藏於肝而心則行之也若肝心二臟俱傷於邪故血隨心液為汗而出治肝心傷邪血汗人參湯方人參桂去粗皮甘草炙銼白𠼫赤芍藥各一兩黃芩去黑心芎藭當歸切焙淡竹茹各二兩上九味粗搗篩每服七錢匕水一盞煎至七分去滓溫服不拘時治血汗從膚腠出神白散方人中白上一味不拘多少刮在新瓦上用火逼干研令極細每服二錢匕入麝香少許溫酒調下治血汗如聖散方郁李仁去皮尖上一味研細每服一錢匕研鵝梨汁調下治血汗鼻衄不斷吹鼻散方人中白上一味瓦上焙乾研為細末每以少許吹入鼻中立瘥治吐血或汗血尿血竹茹湯方淡竹茹人參芍藥桔梗銼炒生乾地黃焙當歸切焙甘草炙銼桂去粗皮芎藭各一兩上九味粗搗篩每服五錢匕水一盞半煎至一盞去滓不拘時溫服
