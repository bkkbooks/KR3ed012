body:
  text: 卷第一百三目赤痛論曰內經謂心主血又曰肝受血而能視蓋肝開竅於目若肝氣壅盛心經熱實熱氣既熾血乃湧溢而上衝於目故令目赤痛也經所謂痛者為實宜散壅滯決邪實則病可已治目赤痛青葙子散方青葙子決明子炒黃連去須秦艽去苗土前胡去蘆頭大黃銼炒各一兩黃芩去黑心升麻梔子仁秦皮去粗皮枳殼去瓤麩炒地骨皮玄參赤芍藥各半兩羚羊角車前子各三分菊花甘草炙各半兩上一十八味搗羅為散每服二錢匕食後溫熟水調下臨臥再服春夏加白芷一兩秋冬加防風一兩治眼赤痛生障翳乍瘥乍發多淚羞明隱澀腫癢心神煩躁麥門冬散方麥門冬去心焙防風去叉玄參地骨皮遠志去心大黃銼炒車前子茺蔚子決明子炒蔓荊實去白皮細辛去苗葉黃芩去黑心黃連去須犀角屑甘草炙各一兩上一十五味粗搗篩每服三錢匕水一盞煎至七分去滓食後溫服治目昏赤痛宜服洗肝膽車前子散方車前子二兩石決明炒一兩半蕤仁去皮一兩半龍膽半兩青葙子一兩地膚子半兩前胡去蘆頭三分菊花甘草炙各半兩梔子仁一兩上一十味搗羅為散每服三錢匕空心以粟米飲調下食後臨臥再服治肝心風熱目赤痛羚羊角湯方羚羊角鎊蔓荊實去白皮菊花各三分防風去叉芍藥各一兩半黃芩去黑心一兩玄參半兩上七味粗搗篩每服三錢匕水一盞煎至七分去滓入馬牙硝半錢匕食後溫服臨臥再服治目赤痛黃芩湯方黃芩去黑心一兩梔子仁三分大青黃連去須決明子炒各半兩地骨皮一兩半木通銼秦艽去苗土各三分大黃銼炒兩半甘草炙半兩上一十味粗搗篩每服五錢匕水一盞半煎至一盞去滓入馬牙硝半錢匕食後溫服臨臥再服治目赤疼痛如脫視物不明前胡湯方前胡去蘆頭二兩決明子炒防風去叉車前子各一兩甘菊花黃連去須各半兩細辛去苗葉苦參各三兩枳殼去瓤麩炒升麻各二兩上一十味粗搗篩每服五錢匕水一盞半煎至一盞去滓入馬牙硝半錢匕食後溫服臨臥再服如已疏利即不用入硝治目赤澀疼痛梔子湯方梔子仁半兩黃連去須一兩半黃芩去黑心一兩枳實麩炒三分龍膽一兩甘草炙三分芍藥一兩大黃銼炒一兩半上八味粗搗篩每服五錢匕水一盞半煎至一盞去滓食後溫服臨臥再服治目赤痛旋覆花湯方旋覆花升麻秦艽去苗土防風去叉羚羊角鎊葳蕤各一兩黃連去須柴胡去苗各一兩半黃柏去粗皮甘草炙各半兩上一十味粗搗篩每服五錢匕水一盞半煎至一盞去滓食後溫服臨臥再服治目赤痛見明不得葳蕤湯方葳蕤黃連去須秦皮去粗皮決明子炒各一兩半甘菊花防風去叉梔子仁甘草炙各一兩上八味粗搗篩每服五錢匕水一盞半煎至一盞去滓食後溫服臨臥再服治風毒攻注眼目赤疼大退翳膜去瘀肉及能洗去風沙等洗輪散方仙靈脾去梗秦皮去粗皮黃連去須槐花炒等分生犀少許鎊上五味搗羅為細散每用半錢匕以新水調澄清洗之沙末等只三兩上自退在水中如風毒眼每用一錢水一盞煎至七分乘熱淋洗治赤眼腫痛黃連湯方黃連去須梔子仁馬牙硝各一兩甘草炙一分上四味粗搗篩每服一錢匕水一盞竹葉十片同煎至七分去滓溫服日三治目赤痛地骨皮湯方地骨皮茺蔚子各一兩半防風去叉黃芩去黑心玄參大黃銼炒細辛去苗葉各一兩芒硝二兩上八味粗搗篩每服三錢匕水一盞煎至七分去滓放溫食後臨臥服治目赤痛心躁口乾甘草湯方甘草炙一兩地骨皮五兩薺苨五兩葛根銼一兩上四味粗搗篩每服五錢匕水一盞半竹葉七片前至七分去滓放溫食後臨臥服治目赤痛瀉肝防風湯方防風去叉茺蔚子大黃銼炒桔梗銼炒各二兩上四味粗搗篩每服五錢匕水一盞半煎至一盞去滓入芒硝半錢匕食後臨臥溫服如已疏利即不用入芒硝治赤眼黃連丸方黃連去須一兩蒺藜子炒去角一兩半枳殼去瓤麩炒石決明炒各一兩豉炒一合上五味搗羅為末煉蜜丸如梧桐子大每服二十丸食後溫漿水下加至三十丸治赤眼腫痛退暈涼肝散方芎藭梔子仁槐蛾炒各一兩荊芥穗二兩甘草炙半兩上五味搗羅為散沙糖水調下一錢或二錢匕食後服治目赤痛蒼朮散方蒼朮一兩蟬蛻木賊銼黃芩去黑心各半兩上四味生搗為散每服一錢匕新汲水調下食前服服後仰臥少時治赤眼疼痛不可忍者當歸散方當歸切焙一分防己龍膽各半兩上三味搗羅為散每服一錢匕溫水調下食後服治赤眼腫痛玉柱膏方硼砂龍腦馬牙硝青鹽輕粉雄膽各一錢並研令極細杏仁湯浸去皮尖雙仁出油五枚蕤仁四十九粒去皮出油上八味一處再研細煉蜜為膏每點粟米大目眥上治目赤痛黃連煎點眼方黃連去須搗末半分大棗三枚劈破燈心劈碎一握上三味以水一盞半銀石器內煎至五分以新綿濾去滓內瓷閣中每用銅箸點少許目眥頭日三五上臨臥再點治目赤痛點眼竹葉煎方竹葉洗淨切二握大棗劈破五枚古字銅錢七枚黃連去須搗末半兩上四味合和內銅石器中以水一升煎至五合濾去滓又重煎取三合內瓷瓶中每以銅箸點少許目眥頭日三五次治赤眼腫痛退翳膜水龍膏方黃連去須一分當歸切焙乳香研青鹽研硼砂研各一錢硇砂皂子大一塊枯礬皂子大一塊龍腦上八味搗研為末一處和勻煉蜜四兩與藥共入竹筒內以蠟紙密封重湯內煮令蜜熟取出以綿濾過點粟米大目眥頭不拘時治目赤痛晝夜不定點眼枸杞煎方枸杞葉研取汁半升杏仁去皮尖雙仁七枚黃連去須搗末一分膩粉一錢青鹽研半錢上五味將後四味研為末以新綿裹內淨瓷閣中將枸杞汁調候至一復時絞去滓以鋼箸點少許目眥頭日三五度治肝熱眼目赤痛黃連丸方黃連一斤去須水洗淨細銼用水五升浸五宿用綿濾過銀石器熬成膏龍腦研一錢硼砂研一分上三味後二味細研入前黃連膏內旋丸如緑豆大每用一丸新汲水浸過點目眥內治肝熱目赤痛乳汁煎點眼方人乳汁半合古字銅錢十文上二味以乳汁於銅器中磨錢令變色稀稠成煎即止內瓷瓶中盛每以銅箸點少許目眥頭日三五度治赤眼昏澀腫痛神錦散方桑灰一兩黃連半兩上二味為末每用一錢匕沸湯浸澄清洗之治赤眼腫痛犀角膏方犀角末半兩秦艽去苗土二兩黃連去須滑石碎馬牙硝各一兩杏仁湯浸去皮尖雙仁半兩出油上六味搗研為末和勻以沙糖水入藥一處熬成膏每用皂子大沸湯化洗之治赤眼腫痛通頂散方苦葫蘆子四十九粒穀精草一錢瓜蒂十四枚燒灰乳香研半錢薄荷葉一錢上五味搗研為末入龍腦少許鼻內搐一字立效治目赤熱痛羞明淚出或生翳障青葙子丸方青葙子五味子菟絲子酒浸別搗為末地骨皮生乾地黃焙決明子炒葶藶子隔紙炒各三兩車前子麥門冬去心焙地膚子葳蕤赤茯苓去黑皮子芩澤瀉防風去叉各二兩半兔肝一具炙乾杏仁去皮尖雙仁炒研細辛去苗葉桂去粗皮各一兩上一十九味搗研為末煉蜜丸如梧桐子大每服二十丸食後米飲下日三服治目赤多眵磣痛寒冰散方馬牙硝三兩研入新竹筒中密封入地埋四十九日取出更研上一味每用一字同黑豆末少許以水調如糊後同藥調勻攤紙花子上貼太陽穴及半月其目必瘥治目赤熱痛障翳不退黃連點眼方黃連去須四兩鉛丹研二兩蜜四兩上三味同和先蒸一次再曝一日綿裹雞頭實大冷水浸點眼治目脈暴赤邪熱攻瞼膜隱腫瘀成瘡眥爛乍瘥乍發祛風退熱湯方防風去叉當歸銼焙乾去土芍藥甘草炙人參各一兩山梔子仁半兩大黃半兩炙柴胡去苗一兩上八味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不計時候治眼赤澀障翳侵睛磣痛馬牙硝點眼方馬牙硝研半兩蕤仁去皮研七粒杏仁去皮尖雙仁炒研三七枚石膽研兩緑豆大烏賊魚骨去甲研半分赤石脂研一緑豆大黃連去須為末象膽研各一分真珠十粒黃泥裹燒去泥研上九味同研極細瓷合內盛每取黍米許大旋用清水和點治上焦壅熱目赤口乾石膏散方石膏碎甘菊花羌活去蘆頭白附子炮白殭蠶炒玄參黃連去須上七味等分搗羅為散研勻每服二錢匕生薑茶清調下目赤腫痛論曰目赤腫痛者以心肺壅滯積熱不散風邪毒氣干於足厥陰之經風熱交作上攻於目及兩瞼間故其色赤腫痛宜祛風邪蠲熱氣疏淪壅滯治肝臟風毒上衝眼赤腫痛難開頭額偏疼羚羊角飲方羚羊角屑一兩細辛去苗葉一分甘菊花葳蕤芎藭人參各三分赤芍藥黃芩去黑心梔子仁防風去叉甘草生各半兩上一十一味粗搗篩每服三錢匕水一盞煎至六分去滓食後溫服治赤眼及目睛腫痛不得眠睡祛毒散方射干山梔子去皮當歸去苗切防己龍膽黃芩去黑心芎藭黃連去須石決明各一兩上九味搗羅為散每服一錢匕溫酒調下食後茶調亦得治肝經邪熱攻眼赤澀腫痛畏日羞明大黃湯方大黃銼炒山梔子去皮黃連去須龍膽鬱金黃柏各半兩甘草一兩上七味粗搗篩每服三錢匕水一盞入竹葉七片同煎至六分去滓放溫食後服治眼暴赤腫痛竹葉湯方柴胡去苗蛇銜去根各二兩黃連去須細辛去苗葉各一兩上四味粗搗篩每服五錢匕水一盞半入竹葉七片煎取七分去滓投芒硝一字食後溫服如利去硝治眼赤腫疼痛葳蕤湯方葳蕤去皮桔梗炒羚羊角屑木通銼碎黃芩去黑心黃耆銼碎各三分麥門冬去心焙一兩上七味粗搗篩每服五錢匕水一盞半煎七分去滓投芒硝一字空心放溫服食後再服得利去芒硝治眼赤腫痛前胡湯方前胡去蘆頭二兩芍藥青葙子決明子微炒細辛去苗葉車前子梔子仁各一兩上七味粗搗篩每服五錢匕水一盞半入竹葉七片煎取八分去滓入芒硝一字食後放溫臨臥再服取利為度既利即去芒硝治眼赤腫疼痛半夏湯方半夏湯洗七遍去滑細辛去苗葉各一兩枳殼去瓤麩炒令黃前胡去蘆頭各二兩烏梅肉細切半兩上五味粗搗篩每服五錢匕水一盞半入生薑一棗大拍碎同煎七分去滓食後臨臥再服治目赤腫痛車前子散方車前子決明子微炒菥蓂子枳殼去瓤麩炒各一兩上四味搗羅為散每服二錢匕溫水調下食後臨臥再服治目赤痛及澀腫通隔薺苨湯方薺苨四兩石膏地骨皮甘草微炙各二兩葛根銼三兩黃芩去黑心一兩上六味粗搗篩每服三錢匕水一盞入竹葉七片煎至六分去滓放溫食後臨臥再服治眼赤腫痛大黃湯方大黃銼炒令香細辛去苗葉甘草炙黃芩去黑心各一兩芍藥二兩上五味粗搗篩每服五錢匕水一盞半煎七分去滓食後臨臥再服治眼赤腫痛甘草湯方甘草炙甘竹茹細切各一兩蘆根二兩銼新粟米三合上四味粗搗篩每服五錢匕水一盞半煎七分去滓食後臨臥再服治風熱面赤腫痛地膚子散方地膚子二升焙過搗末生地黃十斤上二味搗地黃絞汁和地膚末日曝令乾更搗羅為散每服三錢匕空心酒調臨臥再服治目腫赤痛防風丸方防風去叉決明子人參車前子各一兩半黃連去須菊花槐實炒藍實各一兩上八味搗羅為末煉蜜和丸如梧桐子大每服食後溫漿水下二十丸臨臥再服漸加至三十丸治眼腫赤痛石決明丸方石決明刮削淨洗地膚子黃連去須青葙子大黃銼炒茺蔚子各一兩皂莢去黑皮塗酥炙人參黃芩去黑心甘草炙各三分上一十味搗羅為末煉蜜為丸如梧桐子大每服食後淡漿水下三十丸臨臥再服治眼赤腫熱疼痛秦皮湯方秦皮蕤仁各一兩半甘草炙細辛去苗葉各一兩梔子七枚去皮苦竹葉五十片青鹽一分上七味銼碎以淡漿水四升煎取二升去滓每用一合微溫洗眼避風少時治目赤腫痛翳膜遮障時多熱