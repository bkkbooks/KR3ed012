毒滑魚肉勿食治眼燥澀痛狀如眯磣決明湯方石決明洗淨焙細辛去苗葉防風去叉車前子人參白茯苓去黑皮大黃銼炒令香熟桔梗炒各一兩茺蔚子二兩上九味粗搗篩每服五錢匕以水一盞半煎至一盞去滓溫服食後臨臥日三服治肝腎虛熱氣壅攻衝眼磣澀赤脈羚羊角湯方羚羊角鎊屑半兩木通細銼玄參防風去叉各一兩山梔子仁三分枳殼去瓤麩炒半兩芍藥一兩馬牙硝研為末湯澄下甜竹葉洗上九味除硝並竹葉外粗搗篩每服五錢匕以水一盞半入竹葉十片煎取一盞去滓入硝末一錢匕放溫食後服臨臥再服治肝腎風熱目赤腫磣痛生胬肉車前子丸方車前子人參決明子微炒黃連去須黃芩去黑心大黃銼炒細辛去苗葉各一兩甘草炙銼半兩上八味細銼焙過搗羅為末煉蜜丸梧桐子大食後溫漿水下三十丸臨臥再服治脾胃熱眼赤澀疼痛中黃湯方犀角鎊屑一兩半石膏碎甘草炙各一兩淡竹葉五十片生地黃二合地骨皮二兩生麥門冬去心蘆根各一兩半上八味㕮咀如麻豆大每服三錢匕水一盞半煎至一盞去滓食前溫服煎藥不得犯鐵器治風毒沖眼赤痛干磣地骨皮湯方地骨皮去土甘菊花擇升麻黃連去須防風去叉決明子微炒細辛去苗葉各一兩竹葉洗上八味除竹葉外粗搗篩每服五錢匕以水一盞半入竹葉七片煎至一盞去滓溫服食後臨臥服治眼磣澀並針刺血痛昏暗龍煙湯方生麥門冬去心一兩半木通一兩熟乾地黃焙三兩旋覆花大青茯神去木各一兩黃連去須半兩上七味銼如麻豆大每服三錢匕水一盞半煎至一盞去滓入芒硝半錢匕攪勻食前溫服食後再服治風毒氣上攻兩眼磣澀疼痛及暴赤眼地骨皮散方地骨皮去土羌活去蘆頭防風去叉土蒺藜去刺微炒甘草炙銼各一兩上五味搗羅為細散每服二錢匕荊芥茶清調下如患暴赤眼濃煎甘草湯調下食後臨臥服治目熱赤痛磣澀洗眼蕤仁湯方蕤仁去皮秦皮去粗皮防風去叉各一兩甘菊花擇半分竹葉二握切山梔子仁葳蕤各半兩上七味銼如麻豆大以水五盞煎至兩盞半去滓熱淋如冷燉暖再洗痛止即住煎藥不得犯鐵器治肝經積熱上攻眼目赤腫疼痛洗眼黃連湯方黃連去須為末一字乳香研一字燈心五莖杏仁五枚去皮尖雙仁細研大棗二枚劈去核龍膽為末一錢膩粉半錢匕上七味用水二盞同煎至半盞臨臥時洗之治肝熱沖發於目赤腫磣痛點眼龍腦膏方山梔子去皮三錢甘草七錢生生乾地黃熟乾地黃一兩黃連去須青葙子各八錢當歸四錢決明子一合以上並搗為粗末馬牙硝六錢青鹽四錢密陀僧半兩朴硝一兩一錢石決明一枚米泔浸三日刮洗乳香一錢硇砂一字硼砂蕤仁各二錢以上並細研燈心半束切碎鉛丹一兩三分羅過大棗三十枚去核切白蜜三斤以上同拌勻入瓷瓶子內用箬葉葉油紙封定勿令透氣坐在鍋內重湯煮一日取出絹濾去滓丹砂研二錢龍腦研一錢麝香成顆者研膩粉各一字研上二十五味除前膏外將後四味同研令勻入前膏內攪令相得以干瓷器收之用銅箸如常法點眼其藥滓更以雪水二碗攪和入罐子依前法煮一日濾取清者點眼其滓焙乾後入蔓荊子惡實各二兩炒過同搗為末每服一錢匕食後荊芥臘茶調下如患眼只見一二分者百日見效治目赤翳膜磣痛熱淚不止決明子點方決明子為末蕤仁研各六分象膽研秦皮為末黃柏去粗皮為末各四分鹽緑研三分鯉魚膽去皮四枚馬珂研烏賊骨去甲研貝齒燒研各四分上一十味各研細先以水三大升煎後五味至一升濾去滓重煎至半升許即下前五味再以微火煎只取三合用密器盛每服一大豆許以人乳和少少點眼中良久閉目日二夜一臥即止以溫漿水洗之治眼熱磣痛赤腫淚出昏暗瀉肝飲方柴胡去苗決明子升麻苦竹葉朴硝研各二兩澤瀉一兩芍藥大黃蒸銼梔子仁黃芩去黑心各三兩上一十味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服以利為度治肝熱目赤腫磣澀痛點眼方黃連去須蕤仁各二兩秦皮去粗皮銼決明子馬牙硝研山梔子仁黃柏去粗皮銼各一兩鉛丹研一分龍腦研一錢上九味除鉛丹牙硝龍腦外並搗為粗末用蜜一斤四兩於瓷罐內拌和諸藥令勻將硝末滲於藥面上坐罐子於鍋內以水浸罐子令深莫使浮動慢火煮令牙硝耗盡湯少旋添湯勿令湯淺次入鉛丹更煮一日取出放冷入龍腦封閉地坑內窨著如要用旋以生絹絞濾少許點之如點久患障翳即五分藥膏別入淡竹瀝一分和勻點之妙治目赤障翳磣痛熱淚昏暗象膽煎方象膽研一兩防風去叉一兩半蕤仁去皮研二兩細辛去苗葉三分石蜜一兩一分黃連去須三兩龍腦研半兩鹽緑研一兩上八味除研外各細切以水三大升煎取七合綿濾去滓下龍腦鹽緑更煎一二十沸於密器內盛每取一二大豆許新汲水或人乳和點眼中良久閉目日夜各二出淚即止治目磣澀迎風淚出眥瞼赤爛生瘡癢痛不已蕤仁膏方蕤仁去皮研一兩胡粉研一錢黃連去須為末一兩龍腦研一錢膩粉研一錢貝齒燒研一分真牛乳三兩上七味各研勻先用銀石器熔乳訖然後下蕤仁等攪令勻煎數沸熟便以綿濾去滓用密器盛每取一麻子許大點目大眥中日二度以知為止治眼目暴赤磣澀疼痛點眼黃連煎方甘蔗汁二合黃連搗碎半兩上二味於銅器中以慢火養令汁涸去半以綿濾去滓每日兩度點
