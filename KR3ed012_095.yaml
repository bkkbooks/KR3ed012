body:
  text: 卷第九十五大小便門大小便統論論曰脾胃大小腸膀胱者倉廩之本營之居也名曰器能化糟粕轉味而出入者也蓋營受水穀之真精營衛之根源大小腸膀胱得以變化皆營為之本是以小腸為受盛之官水穀初未分也及其化物歸於膀胱而為溺傳於大腸而為糟粕必曰氣化則能出矣或陰陽之氣不平寒熱相勝或氣實塞而不通或氣虛損而遺泄或燥而結或熱而秘皆陰陽不和之病也治此者不概以寒熱為法寒劑盪滌熱劑枯燥反傷和氣耗其津液若關格不通三焦約病責以營衛之痞塞產後便難與夫老者秘澀之病又以津液不足止可滑以利之潤以滋之苟蕩以駃劑則糟粕不通真氣受弊不可不知也大小便關格不通論曰大小便不通者陰陽關格及三焦約之病也陰陽和平三焦升降則水穀糟粕以時傳導今陰陽偏盛氣痞於中則營衛因之以不行故氣結於腹內脹滿不通而大小腸俱閉塞也治關格不通妨悶大小便秘澀大黃散方大黃銼二兩桂去粗皮三分冬瓜子微炒一合滑石研三兩朴硝生鐵銚子炒乾刮出紙裹於黃土內窨一宿取出細研二兩半上五味先搗前三味細羅為散更與滑石朴硝同研勻細每服二錢匕濃煎白茅根湯調空腹服之至晚再服治大小便不通黃芩湯方黃芩去黑心二兩赤芍藥白茅根大黃生用各三兩瞿麥穗一兩半上五味粗搗篩每服五錢匕水一盞半煎至一盞去滓入朴硝末半錢匕更煎二沸空心溫服治關格不通脬腸妨悶大小便不通芒硝湯方芒硝研二兩半冬葵子微炒三合滑石碎三兩上三味除芒硝外㕮咀二味每服五錢匕水一盞半煎至一盞去滓入芒硝末半錢匕更煎二沸空心溫服治腹脅脹滿關格大小便不通茱萸湯方吳茱萸湯浸洗去涎曝乾微炒大黃銼炒當歸切焙桂去粗皮赤芍藥甘草炙銼芎藭各二兩人參細辛去苗葉各四兩桃白皮去粗皮一握乾薑炮一兩雄黃三分真珠末半兩與雄黃同研細上一十三味將一十一味粗搗篩每服三錢匕水一盞煎至七分去滓下雄黃真珠末一字酒半盞更煎三沸空心服之治大小便不通滑石湯方滑石一兩半茅根車前子各三分天門冬去心焙冬瓜瓤莨菪子淘去浮者煮令芽出曝乾微炒各一兩上六味㕮咀每服五錢匕水一盞半煎至一盞去滓食前溫服日三治大小便俱不通車前子湯方車前子五兩生用木通銼四兩黃芩去黑心郁李仁湯浸去皮尖雙仁研如膏各三兩上四味將前三味粗搗篩與郁李仁拌勻每服五錢匕水一盞半煎至一盞去滓入朴硝末半錢匕更煎二沸食前溫服日三治大小便俱不通榆白皮湯方榆白皮甘草炙銼各一兩半滑石三兩桂去粗皮一兩上四味㕮咀每服四錢匕水一盞半煎至一盞去滓食前服日三治大小便不通芍藥湯方赤芍藥桑根白皮銼各三兩瞿麥穗大黃銼炒榆白皮銼防葵去蘆頭麻子仁研如膏各二兩上七味將前六味粗搗篩與麻子仁拌勻每服五錢匕水一盞半煎至一盞去滓入芒硝末半錢匕更煎二沸空腹溫服日晚再服治大小便不通木通湯方木通銼二兩大黃銼生用滑石各三兩麻子仁一合研如膏上四味將前三味粗搗篩與麻子仁拌勻每服五錢匕水一盞半煎至一盞去滓入芒硝末半錢匕更煎二沸空心服之治大小便不通冬葵根汁方生冬葵根淨洗二斤搗絞取汁三合生薑四兩搗絞取汁一合上二味攪勻分作兩服空腹一服有頃再服服盡即通治氣痞心腹脹喘促大小便不利甘遂散方甘遂煨牽牛子炒續隨子去殼大戟葶藶子各等分上五味搗羅為散每服半錢匕濃煎燈心湯空心調服利下水為度治大小便不通紫金沙散方紫金沙不拘多少蜂房蒂也上一味搗羅為散每服一錢匕溫酒調下治大小便不通土馬鬃湯方土馬鬃不拘多少上一味走水陶火上用新瓦爆過為粗末每服二錢匕水一盞煎至七分去滓溫服治大小便不通豬脂酒方豬脂如半雞子大碎切上一味以酒一升微煮沸投豬脂更煎一二沸分為兩度食前溫服未通再服治大小便不通冬葵子湯方冬葵子微炒一兩上一味粗搗篩用水二盞煎至一盞去滓入人乳汁半合和勻空腹頓服治大小便不通發灰散方亂髮一兩淨洗燒為灰上一味細研每服三錢匕溫水調食前服日三以通利為度治下焦結熱腸胃燥澀大小便不利牽牛子丸方黑牽牛淘洗令淨炊令氣透便取出攤令微冷便杵取末三兩青橘皮焙和白用陳橘皮焙和白用桑根白皮銼炒芍藥焙各一兩栝蔞根一兩木通銼一兩上七味搗羅為末煉蜜拌和杵至三五千下丸如梧桐子大每服十五丸加至二十丸茶酒任下治下焦熱大小便不通氣脹滿悶木香飲方木香黃芩去黑心木通銼炒陳橘皮湯浸去白焙各三分冬葵子研瞿麥穗各一兩檳榔茅根赤茯苓去黑皮各半兩上九味㕮咀如麻豆大每服五錢匕水一盞半煎至八分去滓溫服治大小便不通茯苓丸方赤茯苓去黑皮芍藥當歸切焙枳殼去瓤麩炒白朮人參各五兩大麻仁大黃銼各二兩上八味搗羅為末煉蜜和丸如梧桐子大每服十五丸至二十丸空心煎茅根湯下治大小便不利芫花丸方芫花炒滑石碎各半兩大黃銼炒三分上三味搗羅為末煉蜜和丸如梧桐子大每服二十丸蔥湯下治中焦熱實閉塞關格不通吐逆喘急大黃湯方大黃銼微炒前胡去蘆頭半夏湯洗七遍炒人參各三分黃芩去黑心赤茯苓去黑皮木香檳榔銼各半兩上八味粗搗篩每服五錢匕水一盞半入生薑五片同煎至八分去滓溫服治大小便不通腹脅堅脹蒸下部方蓮葉三兩蔥三七莖並須用去葉切皂莢一挺炙銼生薑一兩切上四味以漿水一斗二升煮十餘沸並滓分兩度用旋旋盛入小口瓷缸中坐缸口上熏蒸冷則易之未通即傾藥於桶斛中添熱水坐蘸下部即通小便不通論曰腎臟不足氣不傳化膀胱有熱水道不宣故小便不通也令人少腹脹滿其氣上衝心腹膨痞甚則喘急不能升降內經曰膀胱不利為癃者如此治膀胱積熱小便不通通關瞿麥湯方瞿麥穗芍藥大黃銼炒當歸切焙葵子甘草炙榆白皮銼梔子仁木通銼石葦去毛大麻仁各一兩上一十一味粗搗篩每服五錢匕水一盞半入燈心少許煎至一盞去滓溫服治膀胱熱結小便不通立應散方井泉石車前子滑石各半兩葶藶紙上炒一分海金沙一錢上五味搗羅為散每服一錢匕新汲水食前調下未通再服治小便不通氣上衝心胸滿悶玉蕊丸方丹砂研硇砂研滑石研瞿麥穗海金沙各一分上五味搗研為末別研蓖麻子仁丸如梧桐子大每服十丸十五丸蔥白煎酒下小兒減丸數服治小便不通葵子飲方木通銼冬葵子甘遂瞿麥穗四味合半兩細銼都微炒滑石研二錢上五味粗搗篩每服二錢匕水一盞入燈心同煎至七分和滓溫服未通再服治小便不通蘹香子散方蘹香子炒馬藺花炒葶藶紙上炒等分上三味搗羅為散每服二錢匕溫酒調下食前服以通為度治小便不通瞿麥湯方瞿麥穗滑石木通銼各半兩海金沙冬葵子各一分上五味粗搗篩每服五錢匕水一盞半入燈心二十莖煎至七分去滓溫服不拘時治小便卒不通滑石散方滑石碎朴硝研木通銼各一兩上三味搗羅為散每服二錢匕溫水調下不拘時以通為度治小便不通臍腹脹痛不可忍諸藥不效者續隨子丸方續隨子去皮一兩鉛丹半兩上二味先研續隨子細次入鉛丹同研勻用少蜜和作團盛瓷罐內密封於陰處掘地坑埋之上堆冰雪惟多是妙臘月合至春末取出研勻別煉蜜丸如梧桐子大每服十五丸至二十丸煎木通湯下不拘時甚者不過再服要效速即化破服病急即旋合亦得治小便淋澀疼痛不通滑石散方滑石碎海金沙木通銼等分上三味搗羅為散每服二錢匕濃煎燈心湯調下空心服治小便不通或淋瀝疼痛滑石丸方滑石碎續隨子去皮研濕生蟲炒乾木通各一分上四味搗研為末麵糊丸如梧桐子大每服五丸煎燈心湯下不拘時治小便不通松煙散方墨好者水濃研汁半盞酒半盞蔥白三莖拍破膩粉研半錢匕上四味同煎至七分放溫去蔥白頓服即通治小便不通臍下滿悶海金沙散方海金沙一兩臘茶半兩上二味搗羅為散每服三錢匕煎生薑甘草湯調下不拘時未通再服治小便不通氣滿悶酸漿酒方酸漿草一握上一味研取自然汁與醇酒相半和服立通不飲酒用甘草三寸生薑一棗大銼同研用井華水五分盞濾取汁和服亦得治小便不通膀胱熱朴硝散方朴硝不拘多少上一味細研為散每服二錢匕溫蘹香酒調下不拘時服如熱躁以蜜水調服治小便不通諸藥無效螻蛄麝香散方螻蛄活者一枚上一味生研入麝香少許新汲水調下立通治飲水過多心悶著熱小便不通茯苓散方赤茯苓去黑皮三兩上一味搗羅為散冷水調下二錢匕如男子小便中有餘瀝漏精夢泄等用溫酒調空心服妙治小便不通獨蒜塗臍方獨顆大蒜一枚梔子仁三七枚鹽花少許上三味搗爛攤紙花子上貼臍良久即通未通塗陰囊上立通治小便不通通臍法上以白瓷瓶滿盛水以有字紙七重密封瓶口於患人臍內用鹽一捻倒置瓶口覆在臍上偃臥如覺大段冷小便即通治小便不通蜀葵子湯方上取黃蜀葵子三四十粒細研以湯沖絞取汁一小盞頓服效治小便澀痛不通蠶灰散方上用蠶蛻紙不拘多少燒灰研細入麝香少許和勻每服二錢匕米飲調下治小腸積熱小便不通葵根飲方葵根一大握胡荽二兩滑石一兩為末上三味將二味細銼以水二升煎取一升入滑石末溫分三服亦治血淋治小便不通久即成淋方上以琥珀搗研成粉每服二錢匕濃煎萱草根汁調下空心服治小便不通少腹急痛悶絕硝石湯方硝石碎瞿麥穗葵子滑石碎甘草炙銼大黃銼木通銼各半兩上七味粗搗篩每服五錢匕水一盞半蔥白三寸煎至七分入生地黃汁半合去滓不拘時溫服治卒不得小便杏仁散方杏仁去皮尖雙仁二七枚上一味炒黃細研米飲調下立瘥治小便不通莖中痛及女人血結腹堅痛牛膝湯方生牛膝根並葉一握黃芩去黑心半兩當歸焙一兩上三味細銼每服五錢匕水一盞半煎至七分去滓溫服日三治膀胱積熱小便不通防己散方防己一兩海蛤滑石木香各半兩上四味搗羅為散每服二錢匕濃煎木通湯調下治小便不通桑螵蛸湯方桑螵蛸炙三十枚黃芩去黑心二兩上二味細銼用水三盞煎至二盞去滓分溫二服相次頓服又方車前草半斤上一味細銼用水七盞煎至四盞分溫三服即通治小便不通葵石湯方葵菜根銼半升滑石為末半兩上二味除滑石外粗搗篩用水三盞煎至二盞去滓入滑石末分溫二服治小便不通秦艽散方秦艽去苗一分冬葵子一兩上二味搗羅為散每服三錢匕溫酒調下未通再服治膀胱積滯風毒氣脹小便不通方上取蔥津一蛤蜊殼許入膩粉調如泥封臍內以裹肚系定熱手熨須臾即通治氣壅關格不通小便淋結臍下妨悶石葦湯方石葦拭去毛炙三分徐長卿炙半兩茅根三分木通銼炒冬葵子各一兩滑石二兩瞿麥穗半兩檳榔一分上八味㕮咀如麻豆大每服五錢匕水一盞半煎至八分去滓下朴硝末一錢匕溫服空心食前日二治膀胱熱小便不通舌乾咽腫滑石散方滑石碎桑螵蛸炒桂去粗皮大黃銼炒各半兩黃芩去黑心防己瞿麥穗各三分木香一分上八味搗羅為散每服二錢匕煎木通湯調下治小便不通茯苓湯方赤茯苓去黑皮白芍藥瞿麥穗各一兩白朮三分上四味粗搗篩每服五錢匕水一盞半入蔥白五寸生薑一分拍碎同煎至七分去滓食前溫服治小便不通木通湯方木通石葦去毛瞿麥穗各二兩冬葵子一升上四味銼如麻豆大以水十盞煎取三盞去滓內滑石末