潤牙齒堅白除口氣揩齒變白髭槐枝散方槐枝無食子搗末馬齒莧生乾地黃烏賊魚骨搗末胡桃燒灰青橘皮去白地黃花皂莢槲葉蔥須各一分上一十一味並細銼入瓷瓶內蓋口火燒煙出細研為散每日三上揩齒揩齒髭鬢變白為黑芰實花散方芰實花陰乾糯米花陰乾黯子花陰乾各五兩烏菱三七枚麝香三分胡桃三七枚取油入內不蚛皂莢銼寸段兩挺上七味除麝香外搗羅為細末用糯米飯搜為團以炭火燒令通赤候冷入麝香三分都研令細每日早晨及夜臨臥先以漿水漱口後揩齒揩齒烏髭鬢及治牙齒諸疾若用此藥永不患牙病華山石刻散方雞腸草旱蓮草茜草根晚蠶砂白礬青鹽不蚛皂莢呵子以上各等分上八味㕮咀如麻豆入瓶子內外用鹽泥固濟口上留一竅如皂子大用木炭五升煅之煙盡為度杵為細末每日三二次揩牙熱氣微癊少時用漿水漱口內髭發黃白者皆黑揩牙烏髭及治牙疳出血久不瘥當歸散方當歸末鯽魚洗去腹中物留鱗內當歸末令滿上二味以紙裹泥固濟燒成黑灰入燒鹽同和揩牙如常漱之
