body:
  text: 卷第一百二十一口齒門齒間出血論曰風邪僭熱在上流傳於手陽明支脈注於齒間則令齒齦虛腫甚者齒間血出蓋血性得溫則宣流故也治齒齦血出乃腫癢風冷疼痛烏金散方槐白皮豬牙皂莢威靈仙去土生乾地黃酸石榴皮何首烏青鹽各一兩七味同入一瓶子外用泥固濟燒令通赤取出放冷細研入後藥細辛去苗葉升麻各半兩麝香細研一分上一十味搗羅二味為細末入前燒者藥並麝香同研令勻每用半錢匕揩牙良久以溫湯漱口如早作齒藥用尤妙治齒齦血出柳枝散方柳枝桑枝槐枝各一握燒灰丹砂研入一分皂莢不蚛者炙令赤一分麝香研一錢小薊根半兩凝水石研二兩生乾地黃焙半兩上九味搗研為細散每用揩齒良治牙齒搖動血出宣露口臭不能飲食棘刺散方棘刺燒灰當歸切焙細辛去苗葉菖蒲莎草根炒雞舌香各半兩青木香青黛研胡桐淚研乾薑炮各一分上一十味搗羅為細散以綿裹半錢匕含化有涎吐之治齒齦血出牙根有蟲鶴蝨散方鶴蝨半兩膩粉二錢麝香研一錢細辛去苗葉半兩露蜂房一枚燒灰研上五味除研藥外搗羅為細散入研藥和勻臨臥時以濕帛子摻藥半錢匕患處貼之瘥治齒痛宣露血出不止角蒿散方角蒿銼細辛去苗葉升麻各半兩地骨皮去土牛膝各一分上五味藏瓶內燒灰存性搗羅為散每用一錢匕摻濕紙上患處貼之治牙齒疼痛齦間血出去口氣闢風冷龍腦散方龍腦研一分蔓荊實細辛去苗葉升麻各一兩上四味搗羅三味為細散入龍腦拌勻每用半錢匕揩牙良久以溫湯漱口治酒後牙齒血湧出當歸湯方當歸焙乾一兩桂去粗皮甘草炙各半兩礬石一分熬枯上四味粗搗篩每用三錢匕水一盞煎五七沸去滓熱漱冷吐日三兩度即瘥治牙縫血出神效散方草烏頭青鹽皂莢各一分上三味瓦器內燒灰存性每用一字揩牙立效治齒齦出血生地黃湯方生地黃二兩切大豆三合炒香熟柳枝切一合上三味將豆及柳枝炒令焦以無灰酒四盞沃之即下地黃更煎五六沸去滓熱漱冷吐治牙宣血出不止胡粉散方胡粉半兩麝香研半錢上二味同研為細散臨臥淨揩牙漱口訖干貼兼能牢牙治牙痛肉爛血出不止細辛散方細辛去苗葉一兩草烏頭罐子內燒存性一兩上二味搗羅為細散用少許揩牙出涎又方草烏頭大者去皮臍高良薑等分為散先用溫鹽湯淨漱口了搵藥少許揩齒涎出立效治牙齒宣露及血出不止方莽草一斤銼碎上用水五升煮至三升去莽草熱漱冷吐齒齦宣露論曰牙齒雖為骨之所終髓之所養得齦肉而固濟可以堅牢今氣血不足揩理無方風邪襲虛客於齒間則令肌寒血弱齦肉縮落漸至宣露永不附著齒根也治牙齒宣露齦肉腐爛升麻散方升麻一兩半防風去叉三分藁本去苗土半兩白芷半兩細辛去苗葉一分地骨皮一分木香甘松去土丁香各一分露蜂房微炙三分沉香一分柳枝心切炒一兩上一十二味搗羅為散以一錢匕貼患處齒齦上咽津以瘥為度治齒齦宣露口臭血出茜根散方茜根升麻甘松去土牛膝銼細辛去苗葉羌活去蘆頭硫黃研槐白皮皂莢鹽花研地骨皮芎藭各一分上一十二味細銼同入瓶子內燒勿令煙盡取出去火毒後搗研為散揩齒甚妙治牙齒宣露口臭血出不能飲食雞舌香散方雞舌香當歸切焙青葙子乾薑炮裂菖蒲莎草根去毛木香青黛研胡桐淚研各一兩棘刺燒灰研半兩上一十味搗研為散每用綿裹半錢匕含化咽津更於患處可齒齦貼之亦得治口齒宣露𧈟蝕腫癢地黃散方生乾地黃二兩地骨皮一兩升麻三分牛膝酒浸切焙一兩半羌活去蘆頭芎藭藁本去土細辛去苗葉各一兩胡桐淚半兩研上九味搗羅為散先用溫鹽湯淨漱口次以藥揩之揩了更不漱早起臨臥用之治牙齒宣露疼痛並齒浮動紅綿散方柳絮一兩麋角鎊煮過焙半兩海蛤紅者半兩丹砂研半兩紫石英研半兩龍腦一兩白石英半兩凝水石研一兩上八味搗研為散每服半錢匕揩牙良久漱口不計時候用治牙齒浮腫宣露鮮血不止芎藭散方芎藭胡桐淚石律防風去叉白芷莽草各一兩上六味搗羅為散每用半錢匕揩牙鹽湯漱之治風牙腫疼宣露細辛湯方細辛去苗葉三分升麻芎藭荊芥穗木通銼各半兩莽草半兩莎草根去毛一兩上七味搗為粗末每用五錢匕水一盞煎至七分熱漱冷吐之日三兩次治牙齒宣露白楊皮湯方白楊皮一握地骨皮一兩防風去叉半兩蔓荊實一兩細辛去苗葉一兩杏仁去皮尖雙仁生用三十枚生乾地黃焙二兩上七味銼如麻豆每用五錢匕以水二盞煎至一盞去滓留八合入酒一盞更煎三五沸熱漱冷吐即瘥治牙齦宣露牢牙散方栝蔞根二兩用沙鍋子內甘草水煮軟取出令乾為末白芷半兩雞舌香七枚白檀香一兩麝香研一分上五味搗羅為散每用半錢匕揩牙久使牢牙誤咽無妨治齒齦宣露及骨槽風小兒急疳齦肉腫爛黃礬散方黃礬坩堝燒通赤研入一兩生乾地黃焙胡桐淚升麻各半兩干蝦蟆頭二枚炙焦上五味搗研為散每用半錢匕干貼良久吐津甘草水漱口一兩服立效治牙齦宣露疳𧈟蟲蝕芎藭散方芎藭木香乳香研丁香各一分燒鹽研半兩上五味搗研為散每用少許患處敷貼日三五上即瘥治牙齦宣露癢疼血出地黃散方生乾地黃二兩細辛去苗葉白芷皂莢不蛀者去皮子各一兩上四味同入藏瓶內以紙泥固濟曝乾用炭火燒令煙盡取出放冷研令極細次入白殭蠶末一分甘草末二錢再研令勻早晨或臨臥以少許揩牙齦良久以溫水漱口治牙齒浮動宣露疼痛細辛散方細辛去苗葉荊芥去梗莽草升麻各一兩胡桐淚半兩上五味同為粗末每用五錢匕水二盞入槐枝十數莖鹽二錢匕同煎令濃熱漱冷吐治牙齒宣露腫癢松節湯方松節銼一兩細辛去苗葉半兩胡桐淚研半兩蜀椒去目閉口者一分上四味銼如麻豆每用五錢匕以水二盞煎十餘沸熱漱冷吐以瘥為度治牙齒宣露海蛤散方海蛤一枚燒灰硫黃研半兩乾漆炒令煙盡研細半兩上三味更入麝香少許細研為散先用淨帛拭患處以藥敷之有涎吐卻即愈治風冷乘於齒間發歇疼痛口氣宣露雞舌香散方雞舌香射干各一兩麝香細研一分上二味搗羅為散入麝香再拌和令勻每用少許揩齒良久以溫湯漱口治齒齦宣露青黛散方青黛研樺皮燒灰蝦蟆取五月五日者燒灰各一兩研上三味於乳鉢中研令細每用少許敷齒宣露處立驗有津吐之治風毒壅滯齒齦虛腫出血宣露疼痛白殭蠶散方白殭蠶八兩溫水洗過入鹽末八兩逐旋入銀石器內趁潤炒令黃去鹽不用搗為細末麝香細研半兩上二味同研令勻每用少許揩齒良久以荊芥湯稍熱漱口冷吐去治齒齦宣露風癢牛膝散方牛膝燒灰半兩細辛生用為末一分上二味搗羅為散更於乳鉢中細研敷於宣露處日三五上即驗治齒疳蝕齒及唇鼻風疼齒齦宣露牢齒膏方豬脂五兩羊脂二兩野駝脂一兩黃蠟三分半鹽炒半兩雄黃研一兩莨菪子炒一分丁香二十枚白芷半兩黃柏去粗皮熬青木香三分細辛去苗葉一分蜀椒去目及閉口炒出汗桂去粗皮半分松節一分沉香半兩乳香研半兩麝香研一分芎藭三分藁本去苗土三分當歸銼焙半兩升麻三分莎草根半兩甘草炙半兩上二十四味除脂及研藥外搗羅為細散入研藥重研細如面然後取三般脂煎熔入藥匙攪勿住手待至欲凝即膏成以瓷器貯之臘日合妙當於靜處勿令雞犬婦人見之每取少許敷齒上良治風齒血弱齦肉縮漸至宣露地黃散方生乾地黃莽草乾漆豬牙皂莢生薑切作片焙乾菟絲子皂麻子胡麻亦可上七味各四兩入瓶內以黃泥固濟火煅一日後入地一尺二寸深窖卻三復時取出合子盛露三夜不得見日氣搗羅為散如齒藥用之治齒齲宣露去風散方升麻一兩半白芷藁本去苗土沉香銼細辛去苗葉丁香各一兩凝水石研二兩上七味搗羅為細散再研勻揩齒治牙齒風齲齦腫宣露膿出氣臭藁本散方藁本去苗葉升麻皂莢不蚛者燒灰存性各半兩石膏一兩半上四味搗羅為散臨臥時以手揩蘸揩搽齒上微漱存藥氣治牙齒齦宣露有膿血出乃小兒蟲疳蝕齦方葶藶胡桐淚各半兩上二味搗羅為散於患處摻之即瘥齒齲論曰齒齲之病由風熱邪氣客於手足陽明二經其狀齦腫或膿出而臭久則侵蝕齒齦宣露一名風齲治齒齲齦腫膿出疼痛獨活丸方獨活去蘆頭防風去叉黃芩去黑心零陵香芎藭細辛去苗葉當歸切焙各半兩沉香銼雞舌香升麻甘草炙銼各一兩上一十一味搗羅為末熔蠟和丸如小豆大用綿裹一粒於痛處含化咽津消盡即再用治齒齲疼痛蝦蟆散方干蝦蟆一枚燒灰麝香研半錢柑皮細辛去苗葉各半兩白雞屎燒灰青黛研乾薑炮雄黃研各一分上八味搗羅為散綿裹如黍米大納蟲孔中無蟲孔者貼一字於患處有涎即吐治牙齒風齲疼痛蟲蝕挺出礬石湯方白礬燒灰藜蘆去蘆頭乾薑炮白朮蜀椒去目並閉口者炒出汗附子去皮臍生用甘草炙銼各半兩防風去叉細辛去苗葉各三分蛇床子一分上一十味搗為粗末每用三錢匕清酒一升煎三五沸熱漱冷吐日二三度治牙齒風齲疼痛蜀椒湯方蜀椒去目並閉口者炒出汗芎藭細辛去苗葉升麻莽草防風去叉黃芩去黑心各一分上七味粗搗篩每用五錢匕水二盞煎三五沸去滓熱漱冷吐治牙齒風齲宣露疼痛疳慝藜蘆散方藜蘆去蘆頭莽草各半兩細辛去苗葉垣衣鹽各一兩棘刺四十九枚有鉤者上六味搗末水調成劑以蕎麥麵四兩和作餅子裹之燒令通赤於醋中蘸過焙乾再搗羅為散用柳杖子咬頭令軟搵散置齒間良久溫水漱早晨臨臥用之治齲齒痛及蟲蝕白附子散方白附子炮知母焙細辛去苗葉高良薑各一分芎藭三分上五味搗羅為散每用半錢匕量患處貼之有涎即吐日三五度治牙齒風齲疼痛麝香散方麝香研硇砂研各半錢細辛去苗葉青黛研升麻各一分上五味搗研為散先以針撥開風蟲處點藥於蟲孔中藥行痛即止治齲齒齦腫出膿汁白礬散方白礬一分燒灰蟾酥半分麝香半分雄黃半分干蝦蟆一枚焚灰熊蟾一分上六味搗羅為細末每用半錢敷牙根治牙齒風齲疼痛白附子散方白附子一分生使莽草一分細辛一分芎藭一分高良薑一分銼上五味搗羅為散以綿裹少許著齲齒上有汁勿咽治牙齒風齲疼痛解骨槽毒氣牛膝散方牛膝一兩燒為灰上一味搗羅為末以少許著齒間含之又方上取郁李根一握切水一盞煎至六分去滓熱含之吐出蟲長六分黑頭蟲出即瘥治牙齒風齲疼痛作臭血出膿雄黃煎方雄黃研葶藶紙上炒為末各一錢麝香研半錢蘆薈研半分上四味先以臘月豬脂三兩煎化去滓次下葶藶末煎少頃次下三味研藥攪勿住手候凝成煎瓷合盛先刮齒令淨針出惡血以綿拭乾塗煎仍用鐵篦子尉烙日三兩度次用後方芎藭升麻藁本去苗土各半兩獨活去蘆頭細辛去苗葉各一分上五味搗羅為散量患處貼之治牙齒風齲疼痛松脂湯方松脂二兩皂莢炙去皮子一挺鹽一分上三味粗搗篩每服五錢匕水二盞煎五七沸去滓熱滓冷吐治牙齒風齲疼痛烏頭湯方烏頭炮製去皮臍獨活去蘆頭郁李仁湯去皮各半兩上三味銼如麻豆每用五錢匕好酒一升綿裹藥於酒中浸一宿煎十餘沸熱漱冷吐治牙齒風齲疼痛烏頭丸方烏頭炮製去皮臍半兩五靈脂一兩上二味搗羅為末以醋一升煮大棗二十枚醋盡為度取棗肉和藥丸如緑豆大用綿裹一丸於痛處咬勿咽津治牙齒風齲腫痛膿汁不止細辛湯方細辛去苗葉附子去皮臍生用各半兩芎藭一兩上三味銼如麻豆每服五錢匕水二盞煎十餘