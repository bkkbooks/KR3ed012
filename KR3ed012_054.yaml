body:
  text: 卷第五十四三焦門三焦統論論曰三焦有名無形主持諸氣以象三才之用故呼吸升降水穀往來皆待此以通達是以上焦在心下主內而不出中焦在胃脘主腐熟水穀下焦在臍下主分別清濁出而不內統而論之三者之用又本於中焦中焦者胃脘也天五之沖氣陰陽清濁自此而分十二經絡所自始或不得其平則有寒熱偏勝虛實不同營衛滯澀清濁不分而生諸病矣故曰氣會三焦手少陽脈通於膻中膻中臣使之官為氣之海審此則知三焦者沖和之本三焦病論曰黃帝針經謂三焦病者腹脹氣滿不得小便窘急溢則為水水則為脹夫三焦者決瀆之官水道出焉上焦其治在膻中膻中為氣海中焦主腐熟水穀下焦當膀胱上口主分別清濁今三焦俱病故腹脹氣滿不得小便溢而為水脹也治宜升降氣道則腹滿自消水道自利矣治三焦病氣不升降水道不利漸成水脹三和湯方大腹皮炙黃紫蘇莖葉沉香銼木瓜切焙羌活去蘆頭各一兩白朮芎藭木香甘草炙銼陳橘皮湯浸去白焙檳榔麵裹煨熟去面銼各三分上一十一味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不計時候治三焦營衛不通氣滿水脹檳榔飲方檳榔五枚銼木香一兩生薑切焙青橘皮湯浸去白焙芎藭各半兩前胡去蘆頭一分丁香山芋各半兩上八味粗搗篩每服三錢匕水一盞煎至七分空心溫服腳腫加牽牛子半兩面目浮腫加郁李仁半兩治三焦病脹滿為水小便不利牽牛子丸方牽牛子微炒二兩烏臼木根皮五兩木香三兩蜚蠊大黃銼炒各二兩防己枳實去瓤麩炒陳橘皮湯浸去白焙羌活去蘆頭各一兩上九味搗羅為末煉蜜和丸如緑豆大日中及雞鳴後各用溫甘草湯下十丸稍增至二十丸以知為度治三焦病久欲成水腹脹不消小水不利徒都子補氣丸方海蛤牽牛子赤茯苓去黑皮防己犀角鎊訶黎勒去核苦葶藶紙上炒芎藭木通銼大戟炒防風去叉木香各一兩大黃炒二兩半生乾地黃焙一兩半桑根白皮炙銼陳橘皮湯浸去白焙郁李仁去皮細研各一兩上一十七味搗羅為末煉蜜和丸如梧桐子大空心米飲下十丸覺壅不快加至十五丸覺通利即減三五丸大小便不通服三十丸治三焦不調小便祕澀和營衛利臟腑淮南五柔丸方大黃銼炒一斤前胡去蘆頭二兩赤茯苓去黑皮細辛去苗葉半夏湯洗切焙肉蓯蓉酒浸去皴皮切焙葶藶隔紙炒當歸切焙芍藥各一兩上九味搗羅為末煉蜜和搜再搗千杵丸如梧桐子大每服五丸食後溫水下日三稍增之治陰陽不和三焦氣滯胸膈虛痞腹脅滿脹小便不利飲食不消人參香術散方人參甘草炙銼各一兩木香半兩白朮五兩五味子微炒三兩上五味搗羅為散每服二錢匕入姜及鹽各少許白湯點服不計時候治三焦病脹滿水道不利木香枳殼散方木香枳殼去瓤麩炒白芷蓬朮銼炒白朮甘草炙銼桂去粗皮各二兩益智子炒青橘皮湯浸去白焙各三兩陳曲炒京三稜炮銼各四兩上一十一味搗羅為散每服二錢匕生薑鹽湯點服不計時候治三焦病腹脹氣滿小便不利木香丸方木香二兩蓽澄茄四兩牽牛子二十四兩炒香別搗取末一十二兩檳榔四兩酸粟米飲裹濕紙包灰火中煨令紙焦去飯補骨脂炒香四兩上五味先搗羅四味為末入牽牛末令勻清水和令得所丸如緑豆大每服二十丸茶湯或熟水下食後服如酒食過傷可服五七丸小兒一歲可服一丸妊婦不可服三焦約論曰黃帝三部針炙經曰少腹腫痛不得小便邪在三焦病名曰三焦約內閉發不得大小便夫三焦者水穀之道路氣之所終始也上焦如霧中焦如漚下焦如瀆三者流行營衛致養則腐熟水穀分別清濁以時而下無復滯留若營衛不調風邪入客則決瀆之官約而不通所以不得大小便也刺法取足少陰太陽之經輔以湯劑則三焦疏導清濁判矣治調順三焦平勻氣脈消痰滯利胸膈祛風利大小腸枳殼丸方枳殼去瓤麩炒二兩牽牛子揀擇四兩一半炒一半生搗羅取粉一兩半余者不用陳橘皮湯浸去白焙半兩檳榔半兩銼木香一分上五味搗羅四味為末與牽牛粉拌勻再羅過煉蜜和丸如梧桐子大每服十五丸至二十丸食後生薑湯下欲利加丸數治三焦約大小便不通枳殼散方枳殼湯浸去瓤切作片子焙乾五兩厚朴去粗皮塗生薑汁炙二兩滑石研細一兩桂去粗皮二兩上四味搗研拌和每一兩藥末更入膩粉半錢和勻每服一錢匕用冷米飲調下腹空時服更量老少虛實加減治三焦約通導大小便順氣丸方木香二兩青橘皮湯浸去白焙人參赤茯苓去黑皮大戟用河水煮去皮焙各一兩郁李仁半兩麻仁半兩與大戟郁李仁同別搗細入藥內甘遂麩炒微煙生復於地上候冷出火毒一兩大黃銼炒二兩訶黎勒皮半兩上一十味除別搗三味外搗羅為末即入三味拌和再羅煉蜜和丸如豌豆大每服十丸煎車前子湯下不拘時候治三焦約少腹腫痛不得大小便郁李仁丸方郁李仁湯去皮研大黃銼炒各一兩赤茯苓去黑皮澤瀉銼葶藶隔紙上炒各二兩大麻仁一兩半研檳榔三兩銼杏仁去皮尖雙仁麩炒半兩研上八味搗研了和拌勻再研極細煉蜜和丸梧桐子大每服空心用甘草湯下三十丸日三炒鹽酒下亦得治三焦氣約大小便不通疏風散方牽牛子微炒一兩大黃銼炒一兩檳榔半兩銼陳橘皮湯浸去白焙一兩上四味搗羅為散每服二錢匕生薑蜜水調下食後良久服治三焦約大小便不通皂莢散方豬牙皂莢酥炙去皮子白蒺藜各等分上二味搗羅為末如大腸不通用鹽茶調下一錢匕小便不通溫酒調一錢匕三焦咳論曰內經謂久咳不已則三焦受之三焦咳狀咳嗽腹滿不欲食飲此皆聚於胃關於肺使人多涕唾而面浮氣逆也蓋三焦之氣以胃氣為本水穀之道路氣之所終始也今咳而久者以寒氣蘊結關播胃中故腹滿不食氣逆上行涕唾多而面目虛浮也治三焦咳腹滿心胸不利不思食乾薑湯方乾薑炮裂桂去粗皮款冬花各半兩細辛去苗葉白朮甘草炙銼五味子炒木香各三分附子炮裂去皮臍一兩上九味銼如麻豆每服三錢匕水一盞入棗二枚劈破煎至七分去滓溫服日三治三焦咳肺胃虛寒咳逆嘔吐腹脅脹滿不能飲食胡椒理中丸方胡椒蓽茇乾薑炮裂款冬花甘草炙銼陳橘皮湯浸去白焙高良薑細辛去苗葉各二兩白朮二兩半上九味搗羅為末煉蜜丸如梧桐子大每服十五丸溫水下日再服不拘時候治三焦咳腹滿不欲食半夏湯方半夏湯洗去滑七遍焙二兩半乾薑炮二兩麻黃去根節煮去沫焙枳實去瓤麩炒前胡去蘆頭澤瀉銼杏仁去皮尖雙仁炒各一兩半細辛去苗葉一兩上八味粗搗篩每服三錢匕入竹葉少許水一盞半煎至八分去滓溫服日三不拘時候治三焦咳嗽減食息高調脾肺養氣黃耆湯方黃耆銼人參白朮當歸切焙各三分赤茯苓去黑皮百合糯米桔梗銼炒桑根白皮銼各一兩枳殼去瓤麩炒一兩半上一十味粗搗篩每服三錢匕水一盞紫蘇五葉同煎至七分去滓食後稍熱服治三焦咳心胸滯悶四肢不和人參湯方人參一兩杏仁湯浸去皮尖雙仁麩炒乾薑炮麻黃去根節煮去沫焙乾桂去粗皮甘草炙銼五味子炒紫菀去苗土陳橘皮湯浸去白焙各三分上九味粗搗篩每服四錢匕水一盞半棗二枚劈破煎至七分去滓溫服日三治三焦咳腹滿不欲飲食半夏湯方半夏湯洗去滑七遍焙木通銼各四兩前胡去蘆頭白朮赤茯苓去黑皮陳橘皮湯浸去白焙檳榔銼各一兩半桂去粗皮枳殼去瓤麩炒旋覆花去萼各一兩一分上一十味粗搗篩每服三錢匕水一大盞生薑三片煎至八分去滓溫服不拘時候治三焦咳心胸不利不思飲食紫蘇子湯方紫蘇微炒陳橘皮湯浸去白焙各一兩甘草炙半兩乾薑炮桔梗銼炒杏仁湯浸去皮尖雙仁炒各三分上六味粗搗篩每服四錢匕水一盞半入棗二枚劈破煎至七分去滓溫服日三治三焦咳腹滿不欲食順氣五味子丸方五味子炒覆盆子去蒂仙靈脾各一兩上三味搗羅為末煉蜜丸如梧桐子大每服二十丸生薑臘茶下加至三十丸空心食前服治久咳傳三焦腹滿不欲飲食藿香湯方藿香葉人參赤茯苓去黑皮青橘皮湯浸去白焙細辛去苗葉益智子去皮微炒縮砂仁陳橘皮湯浸去白焙甘草炙各一兩木香白芷微炒各半兩上一十一味粗搗篩每服三錢匕水一盞入生薑木瓜各三片同煎至七分去滓稍熱服不拘時候治久咳傳三焦腹滿不思飲食及胃虛有痰玉液散方半夏湯浸去滑七遍焙一兩生薑去皮切焙陳粟米揀淨各二兩上三味搗研同羅為散每服一錢匕水一盞煎至六分溫服三焦脹論曰三焦脹者經所謂氣滿於皮膚殼殼然而堅不痛是也蓋脹有痛痞以別虛實若鼓脹之類內挾宿食按之堅痛是謂邪實今三焦皮膚殼殼然而堅不痛特以氣滿為虛脹而已治宜升降其氣則愈治三焦氣滿皮膚堅脹順氣白朮橘香湯方白朮四兩陳橘皮去白焙赤茯苓去黑皮甘草炙銼各二兩附子炮裂去皮臍一兩乾薑炮半兩上六味銼如麻豆每服三錢匕水一盞姜二片棗一枚同煎至七分去滓溫服如覺感寒入荊芥煎凡稍覺三焦不和並服即效治三焦虛脹心腹滿悶五香丸方沉香銼丁香白檀香銼蘹香子炒蓽澄茄青橘皮去白焙胡椒縮砂去皮赤茯苓去黑皮白芷牛膝酒浸切焙甘草炮各一兩木香一兩半麝香研三分蓬莪朮炮銼半兩枳殼去瓤麩炒半兩葛花一兩半肉豆蔻去殼五枚檳榔炮三枚銼半夏三兩湯洗七遍入生薑三兩同杵為末作餅焙乾人參半兩桂去粗皮半兩蓽茇半兩赤小豆花三兩葛根炒二兩上二十五味搗研為末拌勻煉蜜和丸櫻桃大每服一丸細嚼用淡生薑湯下不拘時候或飲酒多氣悶即含化一丸治三焦氣滿虛脹及一切臟腑氣疾檳榔湯方白檳榔四兩一半煨一半生用肉豆蔻去殼木香各一兩青橘皮去白焙厚朴去粗皮生薑汁炙透枳殼去瓤麩炒京三稜煨銼桂去粗皮人參白茯苓去黑皮陳曲炒麥糵炒乾薑炮白朮訶黎勒炮去核甘草炙銼各二兩上一十六味粗搗篩每服三錢匕入生薑一塊拍破棗二枚去核同煎至七分去滓溫服不計時候治三焦脹和養脾骨除積聚氣京三稜散方京三稜煨為末十兩陳曲微炒大麥糵微炒木香肉豆蔻去殼白檳榔銼乾薑炮去皮甘草炙銼杏仁去皮尖雙仁麩炒厚朴去粗皮生薑汁炙熟各一兩上一十味搗羅為散拌勻每服二錢匕入鹽少許沸湯點服不計時候治三焦虛脹丁沉丸方丁香沉香銼木香蘹香子炒各一分雞舌香半分胡椒半分阿魏少許細研醋調面和作餅瓦上爆熟為末上七味除阿魏外搗羅為末以阿魏末煮糊和丸如緑豆大每服五七丸細嚼鹽湯下如本藏氣弱炒蘹香子酒下婦人血氣醋湯下治三焦脹氣滿撞氣丸方蓽澄茄木香乾薑炮桂去粗皮各半兩胡椒一分白豆蔻去皮半兩蓽茇一分訶黎勒煨取皮半兩白朮半兩人參半兩白茯苓去黑皮半兩阿魏一錢研細以白麵半兩入醋同和作餅爆熟上一十二味搗羅為末煉蜜和丸如梧桐子大每服二十丸米飲下空心食前服治三焦脹滿消化滯氣小丁香丸方丁香沉香銼各一分乳香研一錢半蘹香子半兩炒桂去粗皮半兩檳榔二枚冬加二枚銼肉豆蔻二枚夏加二枚去殼蓽茇半兩阿魏研少許巴豆十五枚去皮心不出油別研上一十味除研者外搗羅為末次入乳香巴豆阿魏令勻煮白米粥和丸如緑豆大每服五丸生薑湯下如胸膈氣不和及元臟冷氣上攻迷悶加至十丸溫酒下常服熟水亦得要微動以意加服之治三焦虛脹通氣生薑丸方生薑去粗皮切作片焙厚朴去粗皮生薑汁炙熟各六兩半夏湯洗七遍一兩陳橘皮去白焙六兩人參白茯苓