補骨脂微炒各一兩甘草炙一分上九味搗為細末煉蜜和丸如小彈子大以丹砂為衣每服一丸嚼破以溫酒下鹽湯下亦得空心食前服治下焦虛寒臍腹㽲痛小便滑數補暖下元椒紅丸方蜀椒去目及閉口者炒出汗取紅附子炮裂去皮臍各二兩乾薑炮一兩上三味搗羅為末用豬腎三對去脂膜薄切攤於紙上去血然後鋪一重腎著一重藥末以盡為度卻以三五重濕紙裹於煻火內燒待香熟取出去紙爛研若稍硬更點少許煉蜜丸如梧桐子大每日空心以溫酒下二十丸漸加至三十丸治下焦不足腎虛脾弱上膈煩熱下元虛冷腹內雷鳴胸膈氣滯羸瘦無力蓽茇丸方蓽茇胡桃仁乾薑炮裂銼人參白茯苓去黑皮訶黎勒煨去核各一兩桂去粗皮一兩半上七味搗羅為末煉蜜和丸如梧桐子大每服空心以溫酒下二十丸漸加至三十丸治下焦虛冷腰膝疼痛肌肉消瘦漸加無力蘹香子丸方蘹香子炒桂去粗皮巴戟天去心附子炮裂去皮臍補骨脂微炒乾薑炮各一兩上六味搗羅為末用羊腎二對切去筋膜以酒二升煮令酒盡爛研和諸藥末更搗三二百杵丸如梧桐子大每日空心生薑酒下三十丸晚食前再服治下焦虛冷便利頻並羸瘦無力不思飲食厚朴丸方厚朴去粗皮銼五兩附子生去皮臍蜀椒去目及閉口者取紅各二兩上三味以漿水六升青鹽三兩生薑三兩切同於銀鍋中煮令水盡焙乾搗羅為末以水浸炊餅和丸如梧桐子大每日空心溫酒下三十丸治下焦虛冷氣溫脾胃思飲食訶黎勒丸方訶黎勒皮蓽茇桂去粗皮胡椒附子炮裂去皮臍沉香木香人參草豆蔻去皮檳榔銼各一兩上一十味搗羅為末煉蜜和搗三二百杵丸如梧桐子大每於食前以溫酒下二十丸治下元虛憊逐積冷暖脾腎沉香蓽茇丸方沉香蓽茇附子炮裂去皮臍肉豆蔻去殼木香蘹香子炒石斛去根銼訶黎勒皮山茱萸桂去粗皮乾薑炮補骨脂微炒巴戟天去心蓽澄加檳榔銼各一兩上一十五味搗羅為末煉蜜和搗三五百杵丸如梧桐子大每日空心及晚食前溫酒下三十丸治下元虛冷氣溫中強力暖胃補骨脂丸方補骨脂微炒木香附子炮裂去皮臍檳榔銼肉豆蔻去殼青橘皮湯浸去白焙桂去粗皮牛膝去苗酒浸切焙乾薑炮裂銼鹿茸去毛塗酥炙令微黃硫黃細研水飛過膃肭臍酒刷炙微黃肉蓯蓉酒浸一宿刮去皴皮炙乾蜀椒去目及閉口者微炒出汗各一兩上一十四味除研者外搗羅為末入硫黃研令勻用白羊腎五對去筋膜細研入前藥末相和拌了搜白麵裹煻火中燒令面熟為度取出藥搗五七百杵丸如梧桐子大每日空心以溫酒下三十丸漸加至四十丸治下元虛憊小便滑數虛損不足韭子丸方韭子二兩酒煮十餘沸炒令乾肉蓯蓉酒浸一宿刮去皴皮炙乾厚朴去粗皮塗生薑汁炙令香熟龍骨附子炮裂去皮臍鹿角屑山茱萸桂去粗皮車前子天雄炮裂去皮臍補骨脂微炒槐實黑大者炒令香各一兩上一十二味搗羅為末煉蜜和搗二三百杵丸如梧桐子大每日空心溫酒下四十丸治痼冷在內飲滯伏留陰盛陽虛穀氣衰微清濁不分腸胃虛弱寒濕相乘下利頻並飲食不入怠惰嗜臥煩悶不安常服溫益藏氣厚養腸胃溫內丸方厚朴薑汁製一斤乾薑炮甘草炙白朮草豆蔻去皮五味子訶黎勒皮陳橘皮去白各半斤上八味同搗羅為末水煮麵糊為丸如梧桐子大每服五十丸不計時候下焦熱結論曰下焦者在臍下當膀胱上口主分別清濁出而不內以傳導也又下焦如瀆司決壅泄其氣實而有熱則津液內燥傳導不利由是有氣逆便難胃脹嘔噦之證治下焦熱結大小便不通柴胡湯方柴胡去苗黃芩去黑心陳橘皮湯浸去白焙梔子仁石膏碎羚羊角鎊生乾地黃焙各一兩芒硝半兩上八味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日二夜一治下焦熱結嘔吐不止心腹滿悶香豉湯方豉炒生乾地黃焙白朮銼各二兩甘草炙一兩石膏碎三兩赤茯苓去黑皮一兩半上六味粗搗羅每服四錢匕水一盞半竹葉十片煎至一盞去滓溫服日二夜一治下焦熱結氣逆嘔吐不禁名曰走哺人參湯方人參梔子仁葳蕤黃芩去黑心知母切焙各一兩赤茯苓去黑皮白朮陳橘皮湯浸去白焙各一兩半石膏碎二兩上九味粗搗篩每服三錢匕水一盞生薑三片煎至七分去滓溫服日二夜一治下焦受病大腸菀熱伏瘕深固茵陳蒿丸方茵陳蒿五兩䕡茹三兩威靈仙去土太一餘糧煅柴胡去苗各二兩黃芩去黑心蒲黃赤茯苓去黑皮枳殼去瓤麩炒各一兩上九味搗羅為末煉蜜丸如梧桐子大每服二十丸木香湯下以知為度治下焦受熱大便難及多瘡瘍石長生丸方石長生五兩升麻三分雞舌香水銀粉硝石別研各二兩石膏碎葛根銼大黃銼炒射干各一兩上九味搗羅為末煉蜜和丸如緑豆大每服十丸早晚食前溫米飲下漸加至二十丸以知為度治下焦腸胃伏熱婦人胎熱産難酸漿丸方酸漿實五兩莧實三兩馬藺子炒焦大鹽別研榆白皮銼各二兩柴胡去苗黃芩去黑心栝蔞根銼䕡茹各一兩上九味搗羅為末煉蜜丸如梧桐子大不計時候用木香湯吞下二十丸至三十丸以知為度治下焦蘊熱結成毒痢血如鵝鴨肝升麻湯方升麻紫草去苗黃芩去黑心桔梗炒各三分犀角鎊地榆去苗蘘荷根銼碎芭蕉根銼焙梔子仁各一兩上九味粗搗篩每服三錢匕水一盞半煎至一盞去滓溫服日三夜一治下焦蘊熱痢下膿血煩痛㾓悶赤石脂湯方赤石脂烏梅炒各一兩梔子仁三分白朮一兩半乾薑炮半兩升麻一兩廩米微炒二兩上七味粗搗篩每服三錢匕水一盞半煎至一盞去滓不拘時候溫服治下焦蘊熱毒變赤血痢臍腹㽲痛不可忍香豉湯方豉微炒二兩梔子仁黃柏去粗皮銼地榆銼白朮茜根銼各一兩上六味粗搗篩每服三錢匕水一盞半同煎至一盞去滓溫服日二夜一