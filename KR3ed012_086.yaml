body:
  text: 卷第八十六虛勞門虛勞統論論曰虛勞之病感五臟則為五勞因七情則為七傷勞傷之甚身體疲極則為六極所謂七傷者一曰大飽傷脾脾傷則善噫欲臥面黃二曰大怒氣逆傷肝肝傷則少血目暗三曰強力舉重久坐濕地傷腎腎傷則少精腰背痛厥逆下冷四曰形寒飲冷傷肺肺傷則少氣咳嗽鼻鳴五曰憂愁思慮傷心心傷則苦驚喜忘善怒六曰風雨寒暑傷形形傷則膚髮枯夭七曰大恐懼不節傷志志傷則恍惚不樂此七者勞傷之因也故名七傷所謂五勞者一曰肺勞令人短氣面腫鼻不聞香臭二曰肝勞令人面目乾黑口苦目視不明三曰心勞令人忽忽喜忘大便苦難時或溏泄口中生瘡四曰脾勞令人舌本苦直不能咽唾五曰腎勞令人背難以俯仰小便黃赤時有餘瀝陰痛生瘡小腹滿急此五者勞氣在五臟也故名五勞所謂六極者一曰氣極令人內虛五臟不足邪氣多正氣少不欲言二曰血極令人無顏色眉發墮落忽忽喜忘三曰筋極令人數轉筋十指爪甲皆痛苦倦不能久立四曰骨極令人酸削齒苦痛手足煩疼不可以立不欲行動五曰肌極令人羸瘦無潤澤飲食不生肌膚六曰精極令人少氣吸吸然內虛五臟氣不足發毛落悲傷喜忘此六者勞傷之甚身體疲極也故名六極凡五勞六極七傷之外變證不一治法皆以補養為宜形不足者溫之以氣精不足者補之以味氣味相得合而服之以補精益氣此其要也肝勞論曰恚怒氣逆上而不下則傷肝肝勞則面目乾黑口苦精神不守恐畏不能獨臥甚則筋急而爪枯目盲無所見毛悴色夭者難治治肝勞脅痛氣急憂恚不常面青肌瘦筋脈拘急補肝湯方天門冬去心焙酸棗仁微炒柴胡去苗當歸切焙羌活去蘆頭防風去叉桂去粗皮細辛去苗葉赤茯苓去黑皮升麻秦艽去苗土黃耆銼杜仲去粗皮炙銼鱉甲去裙襴醋炙銼鹿茸去毛酥炙牛膝酒浸切焙天麻黃明膠炙燥山茱萸上一十九味等分粗搗篩每服三錢匕水一盞入生薑二片棗一枚劈煎至七分去滓溫服食前治肝勞關格不通精神不守氣逆上衝胸中煩悶調氣下熱柴胡湯方柴胡去苗黃芩去黑心澤瀉葛根炙銼升麻各一兩半玄參三兩生乾地黃切焙二兩上七味粗搗篩每用五錢匕水一盞半入竹葉七片煎至一盞去滓下芒硝一錢匕分為二服空心食後各一治肝勞虛寒兩脅滿筋脈急關格不通毛悴少色豬膏酒方豬膏二兩生薑汁三合上二味同用慢火煎候減半入酒一升相和濾過分溫三服空腹日午夜臥各一治肝勞寒脅下痛脹滿氣急眼昏視物不明檳榔湯方檳榔附子炮裂去皮臍各一兩白茯苓去黑皮桔梗炒陳橘皮湯浸去白焙桂去粗皮各半兩吳茱萸湯浸焙炒一兩白朮三分上八味銼如麻豆每五錢匕水一盞半入生薑一分拍碎煎至一盞去滓分溫二服空腹食後各一若氣喘加芎藭三分半夏一兩湯洗炒甘草半兩炙治肝勞實熱悶怒精神不守恐畏不能獨臥目視不明氣逆不下胸中滿塞下氣除熱半夏湯方半夏湯洗七遍切焙二兩麻黃去節煎掠去沫焙杜蘅芍藥枳實去瓤麩炒細辛去苗葉杏仁湯浸去皮尖雙仁炒烏梅肉炒各三分松蘿半兩淡竹葉切三兩上一十味粗搗篩每服五錢匕水一盞半入生薑一分拍碎煎至八分去滓溫服空腹食後各一治肝勞不足補虛芍藥飲方芍藥牡丹皮各三分熟乾地黃炮黃耆甘草炙白茯苓去黑皮青葙子白附子防風去叉山梔子仁炒各一兩半細辛去苗葉半兩枳實去瓤麩炒荊芥穗各三分上一十三味銼如麻豆大每服五錢匕水一盞半入竹葉七片煎至八分去滓空腹溫服食後夜臥再服治肝勞虛寒目眩喜忘咳唾痰涎憂恚內傷面青少色硫黃丸方硫黃研乾薑炮吳茱萸湯浸焙乾炒人參當歸切焙防風去叉各一兩白礬熬令汁枯烏頭炮裂去皮臍各一兩一分桂去粗皮天雄炮裂去皮臍甘草炙銼各三分蜀椒去目並閉口者炒出汗皂莢酥炙去皮子枳實去瓤麩炒各半兩細辛去苗葉甘菊花各一分上一十六味搗研為末再同研勻煉蜜和丸如梧桐子大每服二十丸空腹溫酒下夜臥再服漸加至三十丸治肝勞虛熱目赤難開煩悶宛轉熱氣上衝瀉肝除熱前胡湯方前胡去蘆頭乾薑炮大青細辛去苗葉秦皮銼決明子梔子仁黃芩各一兩車前子一合石膏二兩淡竹葉細切三兩上一十一味粗搗篩每五錢匕水一盞半煎至一盞去滓分溫二服空腹食後各一欲利加芒硝一兩研治肝勞虛寒脅痛脹滿氣悶目昏不思飲食赤茯苓湯方赤茯苓去黑皮一兩半桔梗炒陳橘皮湯浸去白焙各一兩白朮半兩鱉甲去裙襴醋炙二兩桂去粗皮三分上六味粗搗篩每服三錢匕水一盞入生薑三片同煎至七分去滓食前溫服治肝勞熱恐畏不安精神悶怒不能獨臥志氣錯越茯苓丸方白茯苓去黑皮遠志去心防風去叉人參柏子仁微炒研牡蠣燒令赤甘草炙銼各半兩龍骨三分上八味搗羅為末煉蜜並煮棗肉同和丸如梧桐子大每服空腹溫酒下二十丸漸加至三十丸夜臥再服治肝虛勞損口苦關節疼痛筋脈攣縮虎骨酒方虎骨塗酥炙三兩乾薑炮芎藭地骨皮各二兩白朮豬椒根五加皮各二兩半枳殼去瓤麩炒一兩半丹參四兩熟乾地黃焙一兩上一十味銼如麻豆大用生絹袋子貯以清酒三斗浸四宿每日空腹溫服半盞漸加至一盞治肝傷健忘目視不明面色青白常多恐懼青龍丸方龍骨研羌活去蘆頭秦艽去苗土各一兩茯神去木羚羊角鎊青葙子甘菊花白附子炮丹砂研如粉各三分上九味搗研為末煉蜜和丸如梧桐子大每服三十丸食後人參湯下心勞論曰心勞病者補脾氣以益之脾王則感於心人逆夏氣則手太陽不長心氣內洞順之則生逆之則死順之則治逆之則亂反順為逆是謂內格病則生矣其候令人喜忘不樂大便鴨溏口瘡久不瘥耳枯而鳴不能聽遠及毛焦色夭者死於冬治心勞多煩躁背髆妨悶面色數變乍赤乍黑或笑或歌遠志湯方遠志去心一兩赤茯苓去黑皮三分犀角屑一兩人參半兩知母焙半兩芍藥一兩黃芩去黑心三分前胡去蘆頭三分麥門冬去心焙一兩半上九味粗搗篩每五錢匕用水一盞半煎至一盞去滓食後分溫二服如人行三五里再服治心勞煩多熱喜笑無度四肢煩熱止煩下氣麻黃湯方麻黃去根節一兩半梔子仁一兩半赤茯苓去黑皮一兩半黃芩去黑心一兩白朮一兩半石膏一兩桂去粗皮一兩半生乾地黃焙五兩甘草炙一兩赤小豆一合上一十味粗搗篩每用藥末十錢匕雞子白一枚竹瀝半合水三盞煎至二盞去滓下芒硝一錢再上火令沸分溫三服空腹日午夜臥各一服治心勞因多言喜樂過度傷心或愁憂思慮而傷血血傷即不欲視聽心煩驚悸人參湯方人參一兩半木通銼一兩半茯神去木一兩麥門冬去心焙一兩半百合一兩龍齒一兩半柴胡去苗一兩上七味粗搗篩每五錢匕用水一盞半入棗三枚劈煎至一盞去滓分溫二服食後相次服之治心勞熱不止皮毛焦色無潤澤口舌乾燥心中煩悶麥門冬湯方生麥門冬去心三兩陳粟米一合雞子一枚取白淡竹葉三兩切上四味以水五盞先煮米並竹葉取三盞去滓澄清冷下雞子白再煎五七沸即下麥門冬煎至一盞半去滓分溫三服空心日午夜臥服之治心勞實熱口瘡心煩多笑少力小便不利地黃湯方生乾地黃焙柴胡去苗各一兩石膏二兩梔子仁三分赤小豆生三兩木通銼三分上六味粗搗篩每服三錢匕水一盞入竹葉二七片同煎取六分去滓溫服不計時候治心勞熱耳焦多鳴不能聽遠磁石湯方磁石燒令通赤醋中淬七遍赤茯苓去黑皮大青人參白朮菖蒲芍藥各一兩半赤石脂一兩上八味粗搗篩每五錢匕水一盞半入竹葉五片煎至一盞去滓分溫二服空腹夜臥服之治心勞潮熱肌瘦四肢煩疼竹茹湯方竹茹前胡去蘆頭白茯苓去黑皮人參各一兩甘草炙銼貝母去心炒各三分桑根白皮銼赤小豆各一兩半柴胡去苗麥門冬去心焙各半兩上一十味粗搗篩每服二錢匕水一盞入生薑竹葉各五片煎至七分不計時候去滓溫服治心勞多驚悸心氣不足補心麥門冬丸方麥門冬去心焙一兩半石菖蒲一兩遠志去心一兩半人參一兩白茯苓去黑皮一兩熟乾地黃一兩半桂去粗皮半兩天門冬心去焙一兩半黃連去須一兩半升麻一兩半上一十味搗羅為末煉蜜為丸如梧桐子大每日食後夜臥時用熟水下二十丸兼開心氣使人多記不忘治心勞熱傷心有長蟲名蠱蟲長一尺貫心為病貫衆丸方貫衆陳橘皮湯浸去白焙石蠶桃白皮炙令黃色各一兩一分狼牙一兩半雷丸炒白蕪荑炒令香青葙子蜀椒各一兩白殭蠶三七枚炒茱萸根皮炙令黃色一兩半亂頭髮如雞子大燒為灰上一十二味搗羅為末煉蜜丸如梧桐子大每日空心用米飲下七丸未瘥更加至二七丸夜臥再服之治心臟勞熱久積毒氣小腸氣癃結少腹急小便淋瀝白濁疼痛赤芍藥丸方赤芍藥一兩半苦參三兩黃芩去黑心山梔子仁車前子微炒瞿麥穗各一兩冬葵子炒令香一兩半大黃炒一兩半上八味搗羅為末煉蜜丸如梧桐子大每日食後溫水下三十丸夜臥再服治心勞熱胸膈聚痰頭目微頭手足時煩肌膚漸覺羸瘦獺肝丸方獺肝切碎炙黃一兩半胡黃連一兩鱉甲去裙襴醋炙一兩半柴胡去苗一兩半犀角屑一兩知母焙一兩天門冬去心焙一兩地骨皮一兩半升麻一兩茯神去木一兩紫菀去苗土一兩百合一兩杏仁湯浸去皮尖雙仁炒令黃色別研一兩黃連去須一兩半前胡去蘆頭一兩貝母去心焙一兩天靈蓋酥炙令黃一兩半檳榔銼三兩麻仁研一兩甘草炙一兩生乾地黃焙三兩上二十一味搗羅為末煉蜜丸如梧桐子大每日食後溫水下三十丸夜臥再服治心勞熱精神不安喜忘不樂不能獨臥耳不遠聽皮毛焦枯或言語錯亂茯苓丸方白茯苓去黑皮白龍骨遠志去心防風去叉人參柏子仁研各一兩半牡蠣煅棗肉焙各二兩甘草炙一兩上九味搗羅為末煉蜜丸如梧桐子大每服三十丸米飲下治心氣勞傷朱雀湯方雄雀一隻取肉炙赤小豆一合赤茯苓去黑皮人參大棗去核紫石英各一兩遠志去心紫菀去苗土丹參各半兩小麥一兩甘草炙銼一分上一十一味細銼拌勻每服三錢匕用水一盞煎取六分去滓溫服治憂愁思慮過傷心經舌本腫強王不留行湯方王不留行桂去粗皮桔梗炒大黃銼炒當歸切焙甘草炙銼各一兩雷丸延胡索白芨天雄炮裂去皮臍檳榔半生半煨熟各一兩半桑根白皮半兩上一十二味㕮咀如麻豆每服三錢匕生薑三片水一盞同煎至七分去滓溫服治心勞客熱煩躁頭目昏眩前胡麥門冬飲方前胡去蘆頭麥門冬去心焙葳蕤玄參升麻人參射干芍藥甘草炙各一兩上九味粗搗篩每服五錢匕水一盞半入生薑半分切赤小豆三十粒煎至八分去滓食後服治心勞煩悶虛滿胸膈痞塞飲食不下氣噎等疾人參湯方人參白茯苓去黑皮前胡去蘆頭麥門冬去心焙黃芩去黑心枳殼去瓤麩炒木通銼甘草炙銼生乾地黃焙防風去叉獨活去蘆頭各一兩陳橘皮湯浸去白焙旋覆花各一兩半上一十三味粗搗篩每服五錢匕水一盞半入生薑半分切煎至八分去滓食後溫服治心勞客熱毒氣上攻口中生瘡齒齦肉爛菊花湯方菊花升麻獨活去蘆頭防風去叉知母焙黃芩去黑心玄參藁本去苗土大黃銼炒梔子仁前胡去蘆頭桔梗甘草炙銼麥門冬去心焙生乾地黃焙各一兩上一十五味粗搗篩每服五錢匕水一盞半煎至八分去滓食後溫服治心虛勞損喜忘不樂麥門冬飲方麥門冬去心焙白茯苓去黑皮各二兩半人參二兩遠志去心一兩一分防風去叉赤芍藥各一兩半陳橘皮湯浸去白焙一