body:
  text: 卷第四十一肝臟門肝臟統論論曰肝與膽合故足厥陰之經與足少陽之經為表裡其象木其王春其脈弦其神魂其養筋其候目其聲呼其臭臊其液泣其味酸氣盛則為血有餘故目赤兩脅下痛引少腹善怒甚者氣逆頭眩耳聵頰腫皆肝實之證也氣虛則為血不足故目昏兩脅拘急筋攣不得太息爪甲枯面青善悲恐如人將捕之皆肝虛之證也實則瀉虛則補脈耎為不可汗脈弱為不可下耍當量其虛實審其平脈而施治法其大概如此肝虛論曰肝虛之狀其病面青善潔善怒臍左有動氣按之牢若痛不欲飲食悒悒不樂恐惕如人將捕之其脈見於左手關上陰虛者乃其候也治肝元氣虛面多青黃腹脅脹滿悒悒不樂口苦頭痛飲食減少沉香煎丸方沉香一兩附子炮裂去皮臍白附子炮裂巴戟天去心硇砂飛研各半兩補骨脂炒一兩肉蓯蓉半兩以上並先為末以酒二升煎成膏次入下藥乾蠍去土炒一分木香防風去叉當歸切焙各半兩桂去粗皮一分蘹香子炒牛膝去苗酒浸切焙各半兩楝實只取肉微炒青橘皮湯去白焙各三分上一十六味別搗後九味為細末入前膏中拌和入臼搗令勻如未成劑用蜜少許和丸如梧桐子大每服十五丸至二十丸空心溫酒下治肝元氣虛四肢勞倦飲食不消背痛頭旋或時寒熱肢節疼痛手足無力補順三焦通肝氣蓽茇丸方蓽茇洗沙三兩乾薑白者炮一兩半胡椒炒甘草炙各半兩人參桂去粗皮木香白茯苓去黑皮各一兩上八味搗羅為細末煉蜜和丸如梧桐子大每服空心食前鹽湯下三十丸治肝虛脅下堅腹滿不欲食眼昏氣濁瞻視不明檳榔湯方檳榔附子炮裂去皮臍各一兩白茯苓去黑皮桔梗炒陳橘皮湯去白焙桂去粗皮各半兩吳茱萸水浸去涎炒一兩白朮三分上八味銼如麻豆每服五錢匕水一盞半入生薑一棗大拍碎煎至一盞去滓食後溫服若氣喘加芎藭三分半夏一兩湯洗甘草半兩炙銼治肝元虛損臟腑不調泄瀉不止口內生瘡飲食進退燒肝散方茵陳蒿犀角鎊屑石斛去根白朮柴胡去苗紫參芍藥各三分人參桔梗炒防風去叉桂去粗皮吳茱萸洗焙炒蕪荑炒各半兩上一十三味搗羅為細末每用白羊肝一具分作二分將一分去筋膜細切如竹葉入藥末十錢匕蔥白一握細切與肝調和令勻以濕紙裹七八重煨熟空心服之治肝氣久虛四肢筋脈怠惰三焦氣不順上攻眼生黑花柏子仁丸方柏子仁一分防風去叉黑豆煮令爛研作膏用白蒺藜炒各半兩車前子一兩甘菊花半兩附子炮裂去皮臍羌活去蘆頭黃耆蜜塗炙細銼各半兩上九味除黑豆外搗羅為細末煉蜜同黑豆膏拌和為丸如梧桐子大每服十五丸空心食前鹽湯下治肝元虛冷多困少力口無滋味耳鳴眼暗面色青黃黃耆湯方黃耆防風去叉石斛去根當歸焙白芷藿香擇葉沉香白蒺藜炒去角桑寄生附子炮裂去皮臍芎藭白朮五味子桂去粗皮羌活去蘆頭各半兩木香一分上一十六味銼如麻豆每服三錢匕水一盞棗一枚劈破煎一兩沸去滓空心食前溫服治肝元氣虛鹿茸丸方鹿茸去毛酒浸焙肉蓯蓉去皴皮酒浸焙巴戟天去心白茯苓去黑皮附子炮裂去皮臍遠志去心桂去粗皮乾薑炮地骨皮去土黃耆細銼熟乾地黃焙牛膝去苗酒浸一宿焙柏子仁微炒覆盆子防風去叉磁石醋淬六七次研細各等分上一十六味除磁石外並搗羅為細末和勻煉蜜為丸如梧桐子大每服二十丸空心食前鹽湯下治肝元虛風上攻頭目昏眩肩背拘急兼治脾氣不和沉香煮散方沉香銼三分桂去粗皮一兩白豆蔻仁石斛去根各半兩巴戟天去心一兩附子炮裂去皮臍半兩赤茯苓去黑皮一兩半木香一兩人參三分芎藭一兩五味子三分白朮青橘皮湯去白焙各一兩厚朴去粗皮薑汁炙黃耆細銼各半兩藿香葉三分蓽澄茄肉豆蔻去皮各三兩上一十八味粗羅為細散每服三錢匕水一盞入薑棗煎七分食前溫服日二治肝元虛風上攻頭目昏悶腫疼背項緊急悒悒不樂羚羊角散方羚羊角屑芎藭各半兩羌活去蘆頭獨活去蘆頭各三錢人參防風去叉白蒺藜炒各半兩上七味同搗為細散每服一錢匕溫酒調下不計時候治腎氣虧損不能生肝肝乏生氣遂多虛冷肝若受病先診其脈若肝腎脈俱弱服此地黃丸方熟乾地黃焙山茱萸萆薢當歸洗焙續斷芎藭黃耆細銼五味子狗脊去毛各半兩細辛去苗葉一分白茯苓去黑皮牛膝去苗酒浸焙木瓜各半兩上一十三味搗羅細末煉蜜和丸如梧桐子大空心鹽湯下五十丸治肝臟虛客邪攻之真氣微弱不能主血脈氣微細大便失血蒼朮丸方蒼朮米泔浸去皮焙芎藭防風去叉各一分五味子黃耆細銼當歸切焙各半兩硫黃研一兩上七味先以六味搗羅為細末再入硫黃末研勻和丸如梧桐子大空心食前鹽米飲下三十丸治肝虛生寒冷氣上攻眼目肢體疼痛攻注蓽澄茄丸方蓽澄茄補骨脂炒附子炮裂去皮臍羌活去蘆頭芎藭遠志去心萆薢肉蓯蓉去皴皮酒浸一宿切焙山芋石斛去根人參各一兩上一十一味搗羅為細末醋煮麵糊丸如梧桐子大每服二十丸至三十丸空心溫酒下治肝臟虛風攻擊肢節疼痛及上攻眼目多淚穀精散方穀精草石決明木賊銼荊芥穗甘草炙銼羌活去蘆頭旋覆花甘菊花枸杞子晚桑葉各一分並生用蛇蛻半條炒蒼朮米泔浸去皮焙一分上一十二味焙乾搗羅為細散每服二錢匕茶清調下日三不拘時治肝臟虛風上攻通利七竅羚羊角散方羚羊角鎊屑半兩空青研一錢羌活去蘆頭半兩人參一分防風去叉白蒺藜炒各半兩決明子一分上七味並搗羅為細末每服一錢匕溫酒調下白湯點亦得不拘時候治肝臟虛風上攻頭旋項筋急眼有黑花耳內虛鳴乾蠍丸方乾蠍醋炒半兩巴戟天去心糯米炒候米赤黃去米不用附子炮裂去皮臍羌活去蘆頭白蒺藜炒各一兩上五味搗羅為細末煉蜜和丸如梧桐子大每服十五丸至二十丸空心鹽湯下食後臨臥米飲下治肝臟虛冷壯筋骨明耳目進飲食四聖散方白附子炮白蒺藜酒炒羌活去蘆頭黃耆銼各等分上四味搗羅為細末每服二錢匕用羊腰子一對去筋膜切開入藥用線纏用水一盞入粟米一匙頭同煮候粟米熟食之此藥亦治腎臟風攻注治肝元虛損上攻口內生瘡飲食不進犀角散方犀角鎊屑決明子人參各一分梔子仁龍膽白朮各半兩上六味搗羅為細散每服一錢半匕溫熟水調下食後良久服治肝虛目睛眩疼多淚羞明筋脈疼痛補肝散方夏枯草莎草根各一兩同炒過上二味搗羅為細散每服一錢匕臘茶調下不拘時候治肝虛筋急或霍亂轉筋手足麻痹人參飲方人參厚朴去粗皮薑汁炙各一兩白朮二兩上三味粗搗篩每服五錢匕水一盞蔥白五寸切碎同煎八分去滓不拘時溫服肝實論曰肝實之狀苦心下堅滿常兩脅痛或引小腹忿忿如怒頭目眩痛眥赤生息肉是也其脈見於左手關上陰實者乃足厥陰經有餘之候蓋肝實則生熱熱則陽氣盛故其證如此治肝臟壅實風熱客搏經絡動干心肺上膈痰壅喉嗌乾燥不利四肢淫濼或祕或壅犀角地黃湯方犀角鎊屑一兩一分熟乾地黃洗切焙三兩羌活去蘆頭獨活去蘆頭赤箭石菖蒲芎藭藁本洗焙沒藥研威靈仙洗焙黃耆銼烏藥銼甘草炙銼木香當歸切焙蟬蛻洗焙防風去叉各一兩大黃銼炒郁李仁去皮研各一兩半上一十九味粗搗篩每服三錢匕水一盞薄荷五葉煎至七分去滓溫服日三如膈有熱入生地黃汁少許如大腸祕澀加芒硝一錢匕治肝實風壅眼目昏澀上焦不利羌活丸方羌活去蘆頭三分木香蒺藜子炒去角黃耆青葙子甘菊花麥門冬去心枳殼去瓤麩炒青橘皮湯浸去白焙大黃銼炒各半兩上一十味為細末煉蜜丸如梧桐子大每服二十丸空心日午臨臥煎竹葉湯下治肝臟壅熱頭目不利胸膈煩躁體痛羚羊角散方羚羊角鎊柴胡各一兩去苗石膏二兩赤芍藥車前子川大黃銼微炒甘草炙微赤炒黃芩各一兩去腐上八味搗篩為散每服三錢以水一中盞煎至六分去滓食後溫服治肝臟壅熱心膈煩悶頭目不利大黃丸方川大黃銼碎微炒枳殼各一兩麩炒微黃去瓤甘草半兩炙微赤銼麥門冬去心焙羚羊角鎊川升麻生乾地黃犀角各三分鎊上八味搗羅為末煉蜜和搗百餘杵丸如梧桐子大每服二十丸食前竹葉湯下忌酒熱面等物治肝氣壅塞翳膜遮睛癮澀難視甘菊花散方甘菊花一兩白蒺藜木賊防風去叉甘草炙各半兩木香一分上六味為細散每服一錢匕沸湯點服不拘時治肝臟壅熱上攻頭目不利四肢拘倦柴胡湯方柴胡去苗一兩半石膏碎二兩黃芩去黑皮赤芍藥甘草炙各一兩上五味粗搗篩每服三錢匕水一盞同煎至六分去滓食後溫服治肝臟壅熱三焦不利胸膈滿悶睡臥不安郁李仁散方郁李仁湯浸去皮尖大黃銼炒各一兩梔子仁朴硝研乾荷葉甘草炙銼荊芥穗各半兩上七味為細散每服二錢匕溫熟水調下食後服治肝氣實壅上攻頭目筋脈拘急疼痛大小便赤熱秦艽散方秦艽去土當歸切焙羌活去蘆頭獨活去蘆頭荊芥穗連翹虎杖芎藭牡丹皮麻黃去根節各一兩上一十味為細散每服二錢匕煎薄荷湯下食後服治肝實兩脅脹滿氣急眼昏洗肝湯方柴胡去苗鱉甲醋炙去裙襴各二兩赤茯苓去黑皮一兩半桔梗檳榔銼桂去粗皮甘草炙銼五味子陳橘皮湯浸去白焙人參各一兩白朮一兩半半夏湯浸七遍去滑三分上一十二味粗搗篩每服二錢匕水一盞入生薑五片煎至六分食前去滓溫服治肝實熱兩眼赤澀疼痛頭重心煩上焦壅滯驅風湯方蔓荊實羌活去蘆頭防風去叉升麻決明子黃芩去黑心赤芍藥甘草炙車前子羚羊角甘菊花麥門冬去心各半兩柴胡去苗枳殼去瓤麩炒梔子仁各一兩上一十五味粗搗篩每服三錢匕水一盞煎至七分去滓食後溫服治肝臟實熱風氣上攻煩渴茯神湯方茯神去木黃耆銼麥門冬去心栝蔞根各一兩生乾地黃洗切焙三兩酸棗仁炒羌活去蘆頭葛根銼羚羊角鎊屑各半兩上九味粗搗篩每服五錢匕水一盞半煎至一盞去滓食後溫服治肝臟實熱上攻頭目昏眩兼治風化痰鎮心安神白茯苓丸方白茯苓去黑皮人參麥門冬去心酸棗仁炒各一兩甘草炙銼丹砂別研各三分龍腦別研一分上七味除別研外為細末和勻煉蜜丸如雞頭大每服一丸乳汁嚼下食後臨臥服治肝氣壅盛脅下結塊腹內引痛大小便赤澀飲食減少連翹散方連翹荊芥穗鱉甲酸炙去裙襴梔子仁射干羌活去蘆頭獨活去蘆頭當歸切焙大黃生惡實各半兩牽牛子炒一分上一十一味為細散每服二錢匕溫熟水調下食後臨臥服治肝氣壅實熱刑于脾食已即吐大便黃赤忽覺背寒唇皮焦赤羌活散方羌活去蘆頭雞蘇去梗獨活去蘆頭防風去叉蒺藜炒去角荊芥穗牡丹皮木香連翹茵陳蒿去梗麻黃去根節羚羊角鎊屑各一兩上一十二味為細散每服二錢匕溫熟水調下加至三錢匕早晚食後服治肝臟積熱氣昏血澀或因食酸物過多肝中血積不散氣血俱病兩脅下非時氣動每動左脅下有聲右脅相應日漸胃脘結塊使人心腹滿悶上衝咽喉頭目不利睡臥不安如蟲所齧瀉肝湯方荊芥穗連翹羌活去蘆頭牡丹皮黃芩去黑心杏仁去皮尖雙仁炒研當歸切焙芍藥梔子仁雞蘇去梗虎杖麻黃去根節大黃銼炒各半兩上一十三味粗搗篩每服三錢匕水一盞生薑二片煎至七分去滓溫服服此藥數日後如病勢不減卻進後方射干散肝中積血從大便下如腐爛瘀血之類若服前藥已瘥更不用服後方射干散方射干桂去粗皮牛膝酒浸切焙牡丹皮鱉甲醋炙去裙襴牽牛子炒大黃銼炒各半兩荊芥穗細辛去苗葉