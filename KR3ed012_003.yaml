body:
  text: 卷第三敘例治法汗下補瀉針灸湯醴各有所宜知其要者一言而終不知其要流散無窮善治病者隨其所宜適事為故然後施治則病不足治假令邪在皮膚當汗而發之其有邪者漬形以為汗中滿內實者瀉之形精不足者補之其高者因而越之為可吐也剽悍者按而收之為按摩也藏寒虛奪者治以灸焫脈病攣痹者治以針刺血實蓄結腫熱者治以砭石氣滯痿厥寒熱者治以導引經絡不通病生於不仁者治以醪醴血氣凝泣病生於筋脈者治以熨藥而況治有先後取標本不同者法有逆從用多少為制者藥性輕重奇偶制度必參其所用土地風氣高下不同當隨其所宜誠能參合於此為治療之法則萬舉萬全矣等差病有中風傷寒寒熱溫瘧之類各有等差今論方敘病特以中風為首以風者百病之長善行而數變故也其餘傷寒溫瘧雜病各從其重輕緩急而先後之至於九竅諸科與婦人小兒又宜析而次之藥品藥品有物異名同者有物同名異者稱呼既別性用不一修合之際多有疑貳今悉改正如通脫木木通二物皆名通草古方既不分別故用木通者不知與通脫木為異此物異名同者也古方用乾地黃不分蒸曝生干二者治療性用不同今以生熟為別此物同名異者也至如藥名中有從神農正經者有從諸家註解者蓋取世俗稱呼行用多者庶無所惑湯散古方湯法㕮咀謂銼如麻豆散法治羅謂治擇搗羅蓋卒病賊邪須湯以盪滌久病痼疾須散以漸漬近世一切為散遂忘湯法今以銼切㕮咀或粗搗篩之類為湯搗羅極細者為散又如丹丸膏煎之名不知異用之實蓋丹者烹煉而成有一陽在中之義丸者取其以物收攝而已膏者謂摩敷之藥煎者取其和熟為服食之劑今以火煉及色赤者為丹非煉者為丸以服食者為煎塗敷者為膏審此數者他可推類而知也煎煮凡煎藥當取新水令極清潔微火小沸若利湯欲少水而多取補湯欲多水而少取此古法也其湯劑大小古今升兩不同當依世俗現行之法大約每用藥三錢匕以水一盞煎取七分為率其餘多少增損當視病之輕重大小服餌病在胸膈以上者先食後服藥病在心腹以下者先服藥後食病在四肢血脈者服藥宜空腹而在旦病在骨髓者服藥宜飽滿而在夜此用藥之常法也若卒病受邪則攻治宜速豈可拘以常法凡服利湯貴在侵早仍欲稍熱若冷則令人吐嘔又須澄清若濁則令人心悶大約分為三服初與一服宜在最多乘病人穀氣尚強故也次與漸少又次最少若其疏數之節當問病人前藥稍散乃可再服凡服補益丸散者自非衰損之人皆可先服利湯瀉去胸腹中壅積痰實然後可服補藥應服治風湯散皆須三五劑若有久滯風病即須倍此乃至百餘日可瘥又當斟酌所宜傷寒時氣不拘旦暮當即亟治其服藥亦不可拘以常法庶使病易得愈不致傳變是以小兒女子得病益以滋甚者良由隱忍冀差不即治之也服藥多少凡服藥多少要與病人氣血相宜蓋人之稟受本有強弱又貴賤苦樂所養不同豈可以一概論況病有久新之異尤在臨時以意裁之故古方云諸富貴人驟病或少壯膚腠緻密與受病日淺者病勢雖輕用藥宜多諸久病之人氣形羸弱或腠理開疏者用藥宜少禁忌術忌桃李胡荽大蒜青魚酢等巴豆忌蘆筍黃連桔梗忌豬肉地黃忌蕪荑半夏菖蒲忌飴糖羊肉細辛忌生菜甘草忌菘菜牡丹皮忌胡荽商陸忌犬肉常山忌生蔥生菜空青丹砂忌生血物茯苓忌醋鱉甲忌莧菜天門冬忌鯉魚古方逐名下並載此禁忌謂如理中丸合忌桃李胡荽大蒜青魚酢菘菜等物即使服餌者多致疑惑自非單行久服餌者當依此法倉卒治病不必拘忌今除藥有相反者已行刪去外所有逐病通行禁忌法復具如左凡風病通忌五辛甘滑生冷油膩之類凡傷寒時氣忌羊肉雜食及病瘥後尤忌肉食凡熱病新瘥及大病之後食豬肉及腸血肥魚油膩等必大下痢醫不能療也又食餅餌粢黍飴脯鱠炙棗慄諸果及堅實難消之物必更結熱以藥下之則胃中虛冷大利不禁難救凡腳氣之病極須慎房室羊肉牛肉魚蒜蕺菜菘菜蔓菁瓠子酒面酥油乳麋豬雞鵝鴨有方用鯉魚頭此等並切禁不得犯之並忌大怒及生果子酸酢之食又特忌食瓠子蕺菜之類犯之一世治不愈凡癥瘕癖積忌生冷酥滑物凡吐逆下利等忌生冷酢滑膩物凡噎塞脹滿及痼冷諸氣並忌生冷凡積熱忌魚酒熱面等凡咳嗽咯血吐血忌諸熱物凡痰飲忌酒醋凡消渴忌房室凡水氣忌羊頭蹄及鹽一切咸物凡服藥不可食生胡荽諸滑物及果實肥豬犬肉油膩肥羹魚鱠腥臊等物又云服藥通忌見死屍及產婦淹穢事治擇凡藥有燥濕精粗不同必先治擇炮焙訖乃秤之若用巴豆則不然當先秤然後治擇其言巴豆霜者當依分兩用之修制古方修製法度多於敘例開述今欲臨方易為檢用兼有一藥修制不同故各於逐方下注釋秤兩吳人以貳兩為一兩隋人以三兩為一兩今以新法斤兩為則凡云等分者謂不拘多寡以分兩悉同也升合古今升斗大小不同蓋古之叄升為今壹升凡方中用水言升合者今以中盞為率庶與世俗相通無多少之惑其他如酒酢乳蜜之類凡言升合者亦合以盞為則婦人婦人之病除妊娠產後血風血氣門外余雜病及耳目口鼻諸疾與男子無異當於逐門中隨證用之小兒凡小兒之病與大人不殊惟用藥分劑瘥小耳除別立專治小兒門編次外有未詳盡處可於大人方中推類酌量用之食治人資食以為養故凡有疾當先以食療之蓋食能排邪而保沖氣也食療不已然後命藥者其不得已而用之歟針灸凡針灸腧穴並依銅人經及黃帝三部針灸經參定各隨經絡編次復撮其療病要穴分門開具又禁忌報針法附於卷末庶臨病易於討論符禁補遺醫方之論本自上古行用既久其間文理脫漏承疑傳謬習以為常比降詔命慮方書藥法有不如古遺失不完者如內經論鼻淵今為清涕以肉苛為不仁以勞風為風熱以飧泄為瀉利之類所謂事不如古內經治血枯以烏賊魚骨治陽厥以鐵落治鼓脹以雞矢醴治脾癉以蘭之類後世未嘗講明此所謂遺失不完今舉闕誤並行刊正具補遺於篇首仍列諸病方治於逐病門中按原書此處列有煎厥等種病候詳細名目見卷首目錄的總論補遺但後世復刻時已將上述各該病候的總論分別補入以下各卷的有關病候中故此處的補遺部分實際上與下文重複因刪
