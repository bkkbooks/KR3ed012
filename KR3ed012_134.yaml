body:
  text: 卷第一百三十四凍爛腫瘡論曰經絡氣血得熱則淖澤得寒則凝澀冬時嚴寒氣血凝聚不流則皮肉不溫瘃凍焮赤腫痛而成瘡輕則潰爛重則損壞肢節也治大人小兒凍手皴裂成瘡白蘞散方白蘞末三分白芨末半兩油麻二合生搗上三味用蒸萊蔔一個爛研與藥拌勻以酒調成膏先以童子小便洗瘡塗之治凍爛豬蹄膏方豬後懸蹄上一味至夜半時燒為灰研細以豬脂和敷之治凍面凍耳並諸凍瘡久不瘥年年發歇先癢後痛然後腫破黃水及血出不止雉腦膏方雄雉腦一枚搗爛黃蠟與腦等分清油比蠟減半上三味同於慢火上熬成膏去滓以瓷器收如面油逐旋塗摩治凍瘡手足指欲墮及耳欲落柏葉膏方柏葉炙乾為末四兩杏仁去皮研四十粒頭髮一拳大鹽研半兩乳香研一分黃蠟一兩油一升上七味先煎油沸次下五味藥以發銷盡為度次下黃蠟攪勻瓷器中收先以熱小便洗瘡以綿浥干後以藥塗即以軟帛包裹勿令寒氣侵入每日一洗一換如瘡漸瘥即三四日一換治冬月寒凍面目手足肉裂蜀椒湯洗方蜀椒去目及閉口者白芷防風去叉鹽各一分芎藭三分上五味銼碎以水三升煎至二升去滓溫洗冷即再暖頻洗治寒凍腫癢羊肉湯洗方羊肉蔥並細切各半斤上二味以水五升煎至三升去滓溫洗日三兩度又方蔥葉一握細切上一味以水三升煎至二升去滓溫洗日三兩度治寒凍足跟開裂血出疼痛牛膠散方牛皮膠燒灰上一味細研為末以唾調塗之治手足凍瘡腫爛車膏塗方車膏上一味熬令熱塗瘡上又以羊脂和蜜熬勻塗敷日三兩上又方冬瓜藤半斤細銼上一味以水三升煮汁浸洗日三兩次又方赤小豆半升上一味煮汁熱浸洗瘡日三五次治手足生逆臚及被凍瘃損痛疼真珠散方真珠末一分乾薑末半分上二味和勻塗敷瘡上日三五度又方蜀椒五兩揀淨上一味以水五升煎至四升去滓乘溫漬瘃痛處冷即將椒滓再溫依前漬之以瘥為度治人足無冬夏常皺裂名曰尸腳方雞糞一升上一味以水三升煮三五沸去滓乘溫漬腳冷即易用以瘥為度又方咸齏汁三升上一味熱暖浸洗日三兩次治寒凍手足破裂松葉湯洗方松葉一斤上一味爛搗以水五升煎至三升和滓溫洗又方生薑拍碎二兩上一味用淘飯飲三升和煎至二升乘熱熏洗患處日三五度又方茄子根半斤銼碎上一味以水五升煎至四升去滓溫洗瘡上日三五度又方白餳五兩上一味細研燒灰敷瘡上日三五度瘑瘡論曰瘑瘡者疥癬之類由風熱濕毒客搏皮膚變化生蟲其狀生於皮肉之間手足尤甚赤根白頭相對並生狀如小豆或若茱萸子浸淫癢痛抓之汁出拆裂成瘡此蓋脾肺壅滯風濕折之與熱相搏結聚而成治宜疏滌於內敷藥於外淋浴類次第以治之治瘑瘡樗雞膏方樗雞十二枚蜜蜂十二枚芫青八枚去翅足炒蜈蚣二條長五寸者無以野葛二兩代之斑蝥六十枚去翅足藜蘆去蘆頭䕡茹鉛丹各一兩附子炮裂去皮臍二兩巴豆六十粒去皮豬脂二斤上一十一味除豬脂鉛丹外銼碎先熬豬脂令沸下諸藥煎至半日漉去滓綿布絞濾過再煎下鉛丹以柳篦攪令勻以瓷合盛取塗摩瘡上日三五上以瘥為度治瘑瘡久不瘥杏仁膏方杏仁四十粒湯浸去皮尖雙仁黃連去須為末藜蘆去蘆頭為末各一兩水銀一分豬脂十兩巴豆四十粒去皮心研上六味先熬豬脂令沸下諸藥以柳篦攪下水銀令勻以瓷合盛先用鹽湯洗瘡去痂取塗摩瘡上日三五上以瘥為度治諸瘑瘡經年蟲生藜蘆膏方藜蘆去蘆頭末之礬石燒過研細松脂雄黃研各二兩苦參末一兩半豬脂半斤上六味除豬脂外和研令勻先熬豬脂令沸下諸藥末以柳篦攪令勻以瓷合盛取塗摩瘡上日三五上以瘥為度治瘑疥瘡有蟲胡粉膏方胡粉研三兩水銀二兩皂莢十挺椎以水浸挼濾取濃汁一升上三味先熬皂莢汁至五合下粉水銀以柳篦攪令勻以瓷合內盛先以鹽湯洗瘡取塗摩瘡上日三五次即瘥治瘑瘡雄黃膏方雄黃研黃連去須為末各一兩黃芩去黑心末之松脂各二兩亂髮灰一分末豬脂六兩上六味先熬脂令沸下松脂煎令熔盡即下藥末以柳篦攪令勻瓷合內盛取塗摩瘡上以瘥為度治久瘑瘡野葛膏方野葛黃連去須細辛去苗葉杏仁去皮尖莽草芍藥藜蘆去蘆頭附子去皮臍亂髮灰䕡茹芎藭白芷桂去粗皮藁本去苗土烏頭去皮臍白朮吳茱萸洗焙乾炒天雄去皮臍當歸各一兩蜀椒去目及合口黃柏去粗皮蛇床子各半兩豬脂三斤半雄黃研斑蝥去翅足巴豆去皮上二十七味除雌黃礬石和豬脂外銼碎先熬脂令沸下諸藥煎候白芷黃黑色漉出以綿布絞濾過即下雌黃礬石末以柳篦攪令勻以瓷合盛每日三五度取摩塗瘡上即瘥治諸瘑瘡經年瘙癢出白膿久則有蟲生藜蘆膏方藜蘆去蘆頭黃連去須苦參各一兩半雄黃研礬石研松脂各二兩豬脂一升上七味除雄黃松脂豬脂外銼碎搗羅為末先熬豬脂令沸下松脂熔盡即下諸藥末以柳篦攪令勻瓷合盛一切風瘡不同深淺經年不瘥或疽瘡肥汁出不生痂百藥療之不瘥悉主之瘑瘡痔疥瘡頭赤熱者起瘡便生白膿是也黃爛瘡者起瘡淺但出黃汁名肥瘡也浸淫者淺瘡搔之經年不止是也瘙瘡者初起如疥搔之轉甚瘡汁相連著者是也瘑瘡者初作亦如瘙瘡喜著手足相對痛癢春冬秋夏隨著是也並取塗摩日三五上以瘥為度治久瘑瘡毒五黃膏方雌黃研黃連去須黃柏去粗皮黃芩去黑心雄黃研木香白芷各一兩亂髮如雞子許雞舌香半兩狼跋四十枚豬脂一斤半上十一味除豬脂外銼碎先熬脂令沸下諸藥亂髮煎發盡漉出以綿布濾去滓瓷合盛取塗摩患上日三五度即瘥治三十年瘑瘡及小兒干瘑濕瘑瘡壞爛丹砂膏方丹砂研雄黃研雌黃研各一兩䕡茹三兩末亂髮灰半兩豬脂一斤上六味面向東先熬豬脂令沸下諸藥末以柳篦攪令勻瓷合盛先用鹽湯洗瘡取塗摩瘡上日三五上即瘥治濕瘑黃連膏塗敷方黃連去須黃柏去粗皮杏仁去皮尖蔓荊子胡粉水銀各一兩一分豬脂一斤豉心三合上八味除胡粉水銀豬脂外銼碎先熬脂令沸下諸藥煎候黃黑色漉出以綿濾過入粉水銀攪令勻以瓷合盛取塗摩瘡上日三五度即瘥治濕瘑藜蘆膏方藜蘆去蘆頭為末苦參末各一兩半礬石研松脂黃連去須為末雄黃各研二兩豬脂一斤上七味先熬豬脂令沸下諸藥末松脂煎以柳篦攪令勻瓷合內盛取塗敷瘡上每日三五度即瘥治濕瘑積年不瘥四邊肉青起亂髮灰膏塗敷方亂髮灰蛇蛻灰各一分豬脂一兩上三味細研二味以脂調如糊先用曲末一升石灰湯二升攪和令勻洗瘡了塗敷瘡上日三五度即瘥治瘑瘡燥濕沉香瀝塗敷方沉香半斤劈如指許大松節半斤劈如指許大上二味以布袋盛於麻油中浸半食久漉出取一口瓷坩穿底作孔大如雞子以松葉一小把鋪安孔上取藥袋入坩中以白鹽復之用泥固濟令厚五分藥上以火燒坩下著碗一口盛取瀝流入碗中候火盡即取瀝塗敷瘡上日三五度以瘥為度治瘑瘡水銀膏塗敷方水銀唾研入藥黃連去須為末胡粉研各一兩上三味和研令勻以乳汁調如糊塗敷瘡上日三五度即瘥治瘑瘡螺殼散塗敷方螺殼十四枚末亂髮灰研龍膽末胡粉研各半兩上四味和研令細以三年油澱腳調塗敷瘡處日三五度以瘥即止治瘑瘡韭塗敷方生韭一把細切醋一升上二味和煎令韭爛細研更熬如糊取塗敷瘡上日三五度瘥治卒得瘑瘡常攻在兩腳方人屎燒灰二兩水銀半兩上二味用生油調塗敷瘡上日三五度即瘥治卒得瘑瘡常攻在兩腳方亂髮燒灰頭垢各三分蝸牛殼二七枚燒灰上三味細研為末以豬脂調塗敷瘡上日三五度即瘥治卒得瘑瘡常攻在兩腳方吳茱萸洗焙赤小豆屋塵各二兩上三味搗羅為末用豬脂調如糊先用鹽湯洗瘡取糊塗瘡上日三五度即瘥治瘑瘡伏龍肝膏塗摩方伏龍肝一兩細研楮木白汁一合豬脂二兩小蒜去皮半兩細研上四味和調令勻取塗摩瘡上日三五度即瘥治卒得瘑瘡常攻在兩腳方上爛搗桃葉以醋調和塗敷瘡上日三五度即瘥治卒得瘑瘡常攻在兩腳方蜜中蜂不拘多少上一味取細研入醋調塗敷瘡上日三五度即瘥治卒得瘑瘡常攻在兩腳方上生刺蛇取血塗敷瘡上日三五度即瘥治卒得瘑瘡常攻在兩腳方苧根銼碎不拘多少上一味取爛搗令細入醋調塗敷瘡上日三五度即瘥治瘑瘡荊瀝塗洗方荊條一把上一味取燒瀝汁塗敷瘡上日三五度即瘥治瘑瘡躑躅花塗洗方躑躅花三斤上一味以水五升於瓷瓶內浸半月濾去滓取洗瘡上日三兩度更炙鮓塗摩瘡上蟲當出即瘥治濕瘑干蝦蟆灰塗敷方干蝦蟆一個燒灰上一味取細研為末以豬脂調塗敷瘡上日三五度即瘥治濕瘑胡燕窠塗敷方胡燕窠取大者曾抱子窠上一味搗羅為末先以漿水甘草鹽煎湯洗瘡了塗敷上日三五度即瘥若患惡刺以醋和調如糊塗里定三兩日刺易出即瘥治瘑瘡久不瘥豉塗敷方豆豉炒令乾上一味搗羅為末以米泔清先洗瘡以生油調如糊塗敷瘡上日三五度即瘥漆瘡論曰漆雖有毒性有所畏毒即中之亦有氣適然相忤者中毒輕者癢始於面而胸臂腓腨應之頭面腫起赤繞於目搔之隨手生㾦癗已而細瘡如粟重則遍身作瘡小如麻豆大如棗李腫焮痛楚旋瘥旋發如火焫之狀是也治漆毒傷人鐵漿方鐵漿濾上一味隨量飲之以瘥為度治漆瘡柳葉湯洗方生柳葉三斤細切冬用皮上一味以水一斗五升煮取七升適寒溫洗之日三湯漆瘡芒硝湯洗方芒硝五兩上一味研細以湯三升浸洗之治漆瘡黃櫨湯洗方黃櫨一斤銼鹽二兩上二味以水一斗煮取五升去滓洗之日三五度治漆瘡豬膏塗方豬膏五兩上一味熬去滓停冷塗之治漆瘡蟹黃塗方生螃蟹上一味取黃塗敷瘡上日三五度治漆瘡蜀椒湯洗方蜀椒去目及閉口者一兩上一味用水五升煎至三升去滓熱洗瘡上後嚼生糯米敷之治漆瘡荷葉湯洗方荷葉燥者一斤上一味以水一斗煮取五升洗了以貫衆末摻之干則以油和調塗治漆瘡薤汁塗方薤上一味搗取汁塗之煮薤葉洗亦佳治漆瘡地松塗方地松一兩上一味搗汁二合入芒硝一分和塗之治漆瘡雞子塗方雞子黃一枚上一味塗瘡上干則易之不過三次治漆瘡遍身焮赤疼痛四和膏方麻油松脂各二兩黃蠟桂去粗皮為末各一兩上四味同熬成膏塗之治漆瘡方上以水煎黃櫨湯頻浸洗之又方上生研糯米塗之湯火瘡論曰水火之氣當因其勢而利導之湯火誤傷毒熱方熾通導而泄其氣可也苟救目前痛楚遽以冷物淋拓則熱毒畏寒而內搏致有爛骨傷筋之患非熱氣本然也湯火之傷本非氣血所生病故治不及於湯液特在乎塗敷膏浴專治其外而已治湯火瘡除熱滅瘢臘鼠膏方臘鼠大者連毛一枚鉛丹研半兩琥珀研半兩乳香研蘆薈研石螺殼車螯殼蛤蜊殼一兩各種上八味除鼠外搗羅為末用清油一斤黃蠟並臘月羊脂豬脂各四兩並鼠入銀石器內同熬濃去滓次入麝香真珠各一分調勻盛入瓷瓶內密封沉於井中二七日欲急用只沉少頃取上用鵝毛掃五七次立愈治湯火傷皮肉未破爛只熱痛者塗敷止痛膏方朴硝研一兩爐星灰木炭爐內火正盛時退卻火取熱灰放冷細絹篩取二兩上二味搗為細末和勻冷水調如糊塗所傷處頻換即瘥治湯火所傷皮肉已破爛者立應膏方生柏葉焙乾二兩糯米焙乾三兩上二味搗為細末冷水調如糊塗腫處頻換即瘥治湯湯火燒熱痛焮腫龍泉散方井泉石赤石脂等分上二味研為細末散生油調塗治一切惡瘡及火燒湯湯自然銅散方自然銅密陀僧各一兩並煅研甘草黃柏各二兩併為末上四味一處研細收密器中水調塗或干敷取效治湯火所傷熱疼用之永無瘢痕薤葉膏方薤葉半和白用赤石子各一兩上二味搗研如泥敷瘡上治湯火所傷新瓦散方新瓦煅醋淬二七遍使過煉銀鍋子煅醋淬二七遍各五兩上二味搗研為散生油調敷治湯火傷柏葉膏方柏葉焙梔子仁各一兩胡粉研半兩上三味搗研為末以羊髓五大合火熔銷和藥以木捶研三五百遍一日三次塗之瘥治湯火所傷梔子散方梔子仁白礬灰上二味等分搗羅為散用黃膠熬膏調塗之又方用搗薤子塗立效治湯火傷拔毒膏方鉛丹炒過蛤粉研上二味不拘多少合研如桃花色為度以生油調作膏濕紙壓干攤貼治湯湯火燒瘡蛤蜊散方蛤蜊殼不拘多少上一味炙焦黃色搗羅為散以生油調如膏敷之治湯湯火燒瘡苦參散方苦參不拘多少上一味搗羅為散新水調如膏塗之治湯火所傷熱毒瘡癤神瑱散方赤石脂上一味研為散生油調塗之治湯火傷疼痛不可忍玄精石散方太陰玄精石不拘多少鍋子內大火煅紙襯於地坑內出火毒一宿上一味研細每看多少用冷水調雞翎掃之疼痛立止治湯火所傷黑神散方白麵不拘多少上一味炒令焦黑以紙傾在地上出火毒候冷取研細每用一匙頭新水調塗患處熱痛立止治湯火所傷清涼膏方生山芋上一味不拘多少去皮爛研成膏塗在瘡上疼痛立止不成瘢痕治火燒湯湯定痛膏方緑豆粉上一味不拘多少炒令微焦研細以生油塗瘡上痛即止治湯火及熱油傷成瘡雞黃膏方雞子兩枚取黃上一味炒取油入膩粉少許攪勻雞毛刷瘡上永無瘢痕治火燒瘡戊己散方干牛糞上一味燒灰研細生油調塗治湯火所傷臘脂塗方臘日豬脾脂不得經水細銼用乾淨器研爛上一味淨瓶盛以油單蓋埋幽陰地近水處深一尺許經夏取出用時以鵝毛掃所損處治湯潑火燒瘡方上搗柏葉末以脂和塗瘡上干即易治大人小兒把火炭爛手方鼠一枚上一味以烏麻油鐺中煎盡取脂塗瘡又方上以酪塗之干即易治火燒瘡方大黃末上一味以冷水調塗之治湯火瘡方上以大豆濃煮汁塗之干即易又方上以生蜜調側柏葉灰塗之日三五次又方石焦炒糯米以豬脂調塗治火燒瘡止痛令無瘢痕方上以釅醋傾淨地上磨取醋泥敷之昔有人抱孩子擁爐不覺落火上遽以醋泥敷之至曉不痛亦無瘢痕治湯潑火燒毒氣入腹即殺人宜利去之方白扁豆生末膩粉各二錢上二味同研熟水調服當瀉出毒小兒半服治火湯瘡並瘻瘡瘰癧惡瘡金瘡等冷金膏方油一升杏仁去皮尖雙仁半升炒焦搗碎亂髮灰五兩黃柏三兩末石灰半兩黃狗脂少許鼠一枚去皮切上七味先熬油次下鼠及發待鼠肉盡即去鼠骨又煎入諸藥更煎令黑色若稀下蠟三五兩候得所故帛或軟紙上攤貼患處
