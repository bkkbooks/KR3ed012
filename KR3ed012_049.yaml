body:
  text: 卷第四十九膈消論曰內經曰心移熱於肺傳為膈消夫心肺二臟皆居膈上心火既熾移以爍金二臟俱熱熏蒸膈間而血氣消爍也心主血肺主氣俱受邪熱宜不息而消故久則引飲為消渴之疾治膈消胸中煩滿津液燥少短氣多渴麥門冬飲方麥門冬去心二兩栝蔞根短母焙甘草炙五味子生乾地黃焙人參葛根茯神去木各一兩上九味㕮咀如麻豆每服五錢匕水二盞入竹葉數片煎至一盞去滓溫服日二夜一治膈消多渴栝蔞湯方栝蔞根五兩麥門冬去心焙茅根蘆根各一兩半小麥半升石膏研九兩上六味㕮咀如麻豆每服五錢匕水二盞煎至一盞去滓食後溫服治膈消煩渴津液燥少竹葉湯方竹葉一握麥門冬去心焙白茯苓去黑皮栝蔞實炒地骨皮生薑各二兩甘草炙三兩大棗五兩小麥淘六合上九味㕮咀如麻豆每服五錢匕水二盞煎至一盞去滓食後溫服治膈消胸中煩渴黃耆飲方黃耆茯神去木栝蔞根麥門冬去心焙甘草炙各三兩生乾地黃切焙四兩上六味㕮咀如麻豆每服五錢匕水二盞煎至一盞去滓食後溫服治膈消雞內金丸方雞內金洗曝乾栝蔞根炒各五兩上二味搗羅為末煉蜜為丸如梧桐子大每服二十丸食後溫水下稍加至三十丸日三治膈消栝蔞散方栝蔞根三兩墨一兩鉛丹半兩上三味搗研為細散和勻每服一錢匕新汲水調下日三不計時治膈消除熱地黃煎方生地黃汁生栝蔞汁各二升半牛脂三升蜜半升黃連去須一斤為細末上五味合煎取五升不津器收貯每服一大匙熱湯化通口服日三治膈消胸中煩渴知母湯方知母焙澤瀉白茯苓去黑皮黃芩去黑心生薑切各二兩小麥八合洗淨大棗十五枚去核甘竹葉切一升半甘草炙二兩上九味㕮咀如麻豆每服五錢匕水二盞煎一盞去滓食後溫服肺臟傷風冷多涕論曰肺臟虛弱為風邪所傷則清冷之氣上攻而鼻流清涕蓋肺開竅於鼻在液為涕故也治肺感風冷多涕麻黃湯方麻黃去根節先煮掠去沫焙一兩前胡去蘆頭白前去苗各三分桑根白皮銼炒一兩甘草炙半兩紫菀去土一兩杏仁湯浸去皮尖雙仁炒三分上七味粗搗篩每服三錢匕水一盞入蔥白三莖煎至七分去滓食後溫服日三治肺傷風冷鼻中多涕四肢疼倦不思飲食當歸人參湯方當歸人參乾薑炮白朮白茯苓去黑皮甘草炙銼芎藭陳橘皮湯浸去白焙細辛去苗葉白芍藥各半兩桂去粗皮七錢半上一十一味粗搗篩每服三錢匕水一盞入生薑一棗大拍碎棗三枚劈煎至七分去滓不計時候稍熱服治肺冷多涕杏仁麻黃湯方杏仁湯浸去皮尖雙仁炒一兩麻黃去根節先煮掠去沫半兩甘草炙銼五味子炒各一兩上四味粗搗篩每服三錢匕水一盞入生薑一棗大拍碎煎至七分去滓溫服治肺寒內外合邪清涕多語聲不出桂辛丸方桂去粗皮細辛去苗葉白芷防風去叉乾薑炮甘草炙芎藭各一兩上七味搗羅為末煉蜜和丸如梧桐子大每服三十丸溫米飲下食後服治肺寒痰逆鼻多清涕紫菀湯方紫菀去土升麻天門冬去心焙貝母麩炒黃各一兩上四味粗搗篩每服三錢匕水一盞入生薑三片大棗二枚同煎至七分去滓溫服不計時候肺痿論曰脈經謂熱在上焦因咳為肺痿其病之所得或因汗出或因嘔吐或因消渴小便利數或因便難數被快藥下利重亡津液故得之診其寸口脈數而虛其人胸煩多唾唇燥小便難或欲咳不得咳咳則出干沫胸中隱隱痛者是也治肺痿經年咳嗽不止唾成五色喘息促急食少羸瘦天門冬丸方天門冬去心焙半兩大麻仁紫蘇子炒別研入大黃銼炒厚朴去細皮生薑汁炙款冬花去梗貝母煨去心各半兩升麻銼麻黃去根節甘草炙銼桔梗銼炒五味子炒陳橘皮湯浸去白焙各一分杏仁四十九枚去皮尖雙仁炒研紫菀洗去苗土三分上一十五味搗研為末煉蜜為丸如梧桐子大食後蜜湯下二十五丸日再如利即減丸數治肺痿四肢煩熱涕唾稠黏杏子湯方杏仁去皮尖雙仁炒升麻各一分桔梗銼炒紫蘇莖葉三分馬兜鈴一錢半五味子炒麻黃去根節芍藥各半兩上八味細銼每服五錢匕水二盞煎至一盞去滓溫服日再治虛寒肺痿喘氣乾地黃湯方熟乾地黃焙芎藭各五兩桂去粗皮人參各三兩大麻仁一升炒研為脂桑根白皮銼炒二升上六味除麻仁外並細銼每服五錢匕水二盞煎至一盞去滓入麻仁少許更煎數沸溫服日三治肺痿咳嗽唾如稠涎羸瘦喘急盜汗旋覆花湯方旋覆花甘草炙牡蠣末各一分葳蕤紫菀洗去土桔梗銼炒半兩生地黃汁生薑汁各二合上八味除地黃生薑汁外並細銼每服五錢匕水二盞煎至一盞去滓次下地黃生薑汁少許再煎取八分食後溫服治肺痿嗽唾如牛涎日夜不已坐臥不安肋痛款冬花湯方款冬花赤茯苓去黑皮紫菀去苗土獺肝炙碾末甘草炙桔梗銼炒貝母煨去心各一分芍藥一錢半桑枝銼炒一兩半蛤蚧炙碾末三分上一十味除獺肝蛤蚧外細銼每服五錢匕水二盞煎至一盞去滓下蛤蚧獺肝末各少許食後溫服治肺痿咳嗽涕唾稠黏小便不利紫菀湯方紫菀去苗土桔梗銼炒木通銼白蒺藜炒去角桑根白皮銼赤茯苓去黑皮各三分甘草炙微赤銼茅根銼旋覆花各半兩上九味粗搗篩每服四錢匕水一盞煎至七分去滓不計時候溫服治肺痿唾膿血多咳嗽日漸羸劣紫菀湯方紫菀去苗土天門冬去心焙桔梗炒各半兩白茯苓去黑皮知母焙各一分生百合三枚生地黃汁不拘多少上七味除地黃外並細銼每服五錢匕水二盞煎至一盞去滓入地黃汁少許食後溫服要利加朴硝少許湯成下此疾利多為肺與大腸合故祕澀者少治肺痿咳嗽氣喘喉中有血犀角飲方犀角鎊竹茹各一兩桔梗炒紫胡去苗黃芩去黑心一兩半朴硝生天門冬去心各二兩上七味㕮咀每服五錢匕水二盞煎至一盞去滓下朴硝少許溫服治肺痿咳嗽日久喘急仰臥不安白前湯方白前木通銼各二兩防己麻黃去根節各一兩半白茯苓去黑皮厚朴去粗皮生薑汁炙紫色桑根白皮銼炒各三兩紫菀頭五十枚上八味細銼每服五錢匕水二盞煎至一盞去滓食後良久溫服日三胸中有膿者當得吐出治肺痿久嗽杏仁煎方杏仁去皮尖雙仁炒黃研阿膠炙燥各半兩栝蔞二兩銼人參一兩貝母去心焙丹砂研各一分上六味搗研為末入瓷器中同白餳三兩熬成煎每服皂子大食後夜臥時含化治傷中脈絶筋急肺痿咳嗽鹿髓煎方鹿髓半升蜜酥各一兩生地黃取汁五合杏仁桃仁各三兩湯浸去皮尖雙仁炒搗碎酒一升研濾取汁上六味先煎桃仁杏仁地黃汁減半次下鹿髓酥蜜煎如稀餳每服一匙頭許徐徐咽服空心食前日三治肺痿勞傷吐血補肺散方黃明膠炙燥二兩花桑葉陰乾二兩上二味搗羅為細散每服三錢匕用生地黃汁調下糯米飲亦得肺痿咽燥論曰熱在上焦因咳為肺痿其脈則寸口數其證則咳而口中有濁唾涎沫甚者咽中乾燥蓋以邪熱熏肺使然或因快藥下利重亡津液所致也治肺痿咳唾涎沫不止咽燥而渴生薑甘草湯方生薑切五兩人參三兩甘草炙銼四兩大棗十五枚上四味㕮咀如麻豆大每服六錢匕水二盞煎至一盞去滓溫服日三治肺痿咽乾煩躁痰壅咳嗽小便赤澀眠睡不安喉咽腫痛天門冬丸方天門冬去心焙二兩甘草炙銼杏仁湯浸去皮尖雙仁炒各一兩人參三分貝母去心焙五味子阿膠炙令燥桑根白皮炙銼各半兩上八味搗研為末煉蜜和丸如雞頭大每服一丸食後臨臥溫人參湯嚼下含化咽津亦得治肺痿咳嗽吐涎沫咽燥而渴者天門冬煎方生天門冬去心搗取汁醇酒各一升飴糖一斤紫菀去土為末四合上四味同入銀石器中重湯煎候可丸即丸如杏仁大每服一丸含化咽津日三五服治肺痿久嗽不已四肢煩熱頰赤咽燥柴胡湯方柴胡去苗竹茹桔梗炒紫菀去土知母炒貝母去心炒各二兩訶黎勒皮一兩上七味㕮咀如麻豆大每服五錢匕水一盞生地黃汁半盞烏梅一個拍碎煎至八分去滓溫服日再夜一治肺痿咳嗽及肺壅咽燥蛤蚧散方蛤蚧一對好者湯洗十遍慢火酥炙人參白茯苓去黑皮知母炒貝母去心焙桑根白皮銼各二兩杏仁湯浸去皮尖雙仁焙研六兩甘草炙銼五兩上八味搗羅七味為細末入杏仁拌勻每服一錢匕生薑二片酥少許沸湯點服日三夜一治肺痿喘嗽涕唾稠黏咽膈不利地黃紫蘇煎方生地黃三兩生薑二兩與地黃和研絞取汁生玄參一斤生天門冬去心半斤生麥門冬去心一斤紫蘇子炒研二兩生牛蒡四兩細切與玄參至紫蘇子四味爛研以水少許拌勻布絞取汁杏仁去皮尖雙仁三兩研別入上八味將兩等藥汁並杏仁和勻於銀石器中慢火煎令稍稠停火入白蜜五兩真酥二兩和勻於飯甑上蒸少時候冷以淨器盛每服一小匙含化不拘時日三治肺痿咽燥地黃湯方生乾地黃切焙赤茯苓去黑皮柴胡去苗各一兩射干甘草炙銼麥門冬去心焙各半兩半夏湯洗七遍麻黃去根節紫菀去苗土五味子黃芩去黑心桑根白皮銼各三分上一十二味粗搗篩每服三錢匕水一盞生薑一棗大拍碎棗二枚劈破煎至七分去滓溫服不拘時肺痿小便數論曰內經曰藏真高於肺又曰真氣奪則虛今肺中冷則肺之真氣不足而其人上虛矣虛則無以制下故上為肺痿下為小便數以至吐涎沫而欲咳不能者皆其證也治法當以溫藥和之治肺痿小便數甚者吐涎沫欲咳不能白茯苓湯方白茯苓去黑皮桂去粗皮附子炮裂去皮臍白芍藥各三分補骨脂炒黃耆銼各一兩蜀椒去目及閉口炒四十粒肉蓯蓉酒浸切焙一兩半上八味㕮咀如麻豆每服三錢匕水一盞煎至七分去滓溫服食前臨臥日三治肺痿吐涎沫欲咳不能小便數甘草乾薑湯方甘草炙四兩乾薑炮二兩上二味㕮咀如麻豆大每服三錢匕水一盞煎至七分去滓溫服服已小溫復之若渴者屬消渴治肺痿多涎唾小便數三味湯方甘草炙四兩乾薑炮白芍藥各二兩上三味㕮咀如麻豆大每服五錢匕水一盞半煎至一盞去滓溫服治肺痿小便數無力不進食黃耆湯方黃耆銼熟乾地黃焙各二兩桂去粗皮白芍藥當歸切焙各一兩麥門冬去心焙一兩半白龍骨甘草炙銼各半兩上八味粗搗篩每服五錢匕水一盞半入生薑五片大棗二枚劈破煎至八分去滓溫服空心食前日三治肺痿小便數熟乾地黃湯方熟乾地黃焙芎藭各五兩桂去粗皮人參各三兩桑根白皮二兩上五味㕮咀如麻豆大每服五錢匕水一盞半煎至八分去滓溫服治肺痿小便數漸覺氣弱龍骨湯方龍骨黃耆銼肉蓯蓉酒浸切焙各一兩白薇牡蠣煅附子炮裂去皮臍各三分甘草炙銼半兩上七味㕮咀如麻豆大每服三錢匕水一盞入生薑三片大棗二枚劈破煎至七分去滓溫服空心食前日三治肺痿小便數五味子湯方五味子款冬花去梗桂去粗皮人參各二兩麥門冬去心焙桑根白皮各三兩上六味㕮咀如麻豆大每服六錢匕水二盞入生薑和皮五片大棗二枚劈破粳米三十粒同煎至一盞去滓溫服空心食前日三肺臟壅熱論曰肺居膈上為四臟之蓋若將養過溫或多嗜五辛熱氣內搏肺經壅熱則令人咽乾舌燥胸膈煩熱咳嗽壅悶鼻內生瘡是為肺壅熱之候治肺壅熱咳嗽痰涎心胸煩悶咽膈不利調肺丸方天門冬去心焙麥門冬去心焙人參赤茯苓去黑皮百合桑根白皮銼紫菀洗貝母炒杏仁湯浸去皮尖雙仁麩炒各一兩前胡去苗五味子各三分甘草炙半兩上一十二味搗羅為末煉蜜和丸如龍眼大每服一丸溫水嚼下食後治肺壅熱吐血不止朝夕寒熱嘔吐漸成勞劣順中散方檳榔一枚大黃銼炒甘遂木香白牽牛子蘹香子炒青橘皮湯浸去瓤焙各半兩上七味搗羅