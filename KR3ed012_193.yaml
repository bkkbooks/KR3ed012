body:
  text: 卷第一百九十三治咳嗽灸刺法內經治咳之法治臟者治其俞治腑者治其合浮腫者治其經以穴考之各有定處諸咳而喘息有音甚則唾血者太淵主之浮腫則治在經渠咳而兩脅下痛不可轉者太衝主之浮腫則治在中封咳而右胠下痛陰陰引肩背甚則不可動者太白主之浮腫則治在商丘咳而腰背相引痛甚則咳涎者太谿主之浮腫則治在復溜咳而心痛喉中介介如鯁甚則咽腫喉痹者神門主之浮腫則治在靈道咳而遺矢者曲池主之浮腫則治在陽谿咳而失氣者小海主之浮腫則治在陽谷咳而遺溺者委中主之浮腫則治在崑崙咳而嘔嘔甚則長蟲出者三里主之浮腫則治在解谿咳而嘔苦汁者陽陵泉主之浮腫則治在陽輔久咳不已咳而腹滿者天井主之浮腫則治在支溝凡此五臟六腑之咳治之常也俞合之外別有遺法附之於後云上氣咳嗽短氣氣滿食不下灸肺募五十壯上氣咳逆短氣風勞百病灸肩井二百壯上氣短氣咳逆胸背痛灸風門熱府百壯上氣咳逆短氣胸滿多唾冷痰灸肺俞五十壯上氣氣閉咳逆咽冷聲破灸天突五十壯一名天瞿上氣胸滿短氣咳逆灸雲門五十壯上氣咳逆胸痹背痛灸胸堂百壯上氣咳逆胸滿短氣牽背痛灸巨闕期門各五十壯逆氣虛勞寒損憂恚筋骨攣痛咳逆泄注腹滿喉痹頸項強腸痔逆氣痔血陰急鼻衄骨痛大小便澀鼻中干煩滿狂走凡此諸病皆灸絕骨五十壯穴在內踝上三寸宛宛中上氣咳逆灸膻中三壯穴在兩乳間甲乙經云一名元兒在玉堂下一寸六分直乳兩間陷中任脈氣所發炷如半棗核大上氣灸三里二穴甲乙經云在膝下三寸胻外廉足陽明脈之所入也各灸三壯外臺秘要云人年三十以上若不灸三里穴令人氣上兩眼昏暗三里所以下氣也咳嗽灸心俞穴甲乙經云在背第五椎下兩邊各一寸半各灸五壯炷如半棗核大嗽灸手屈臂中有橫紋外骨捻頭得痛處十四壯嗽灸兩乳下黑白際各百壯又以薄當乳頭周匝圍身令前後正平當脊骨解中灸十壯又以繩橫量口中折繩從脊灸繩兩頭各八十壯三報之三日畢又灸從大椎數下行第五節下第六節上穴在中間隨年壯並主上氣此即神道穴治諸氣灸法中脘穴一名太倉胃募也在上脘下一寸居蔽骨與臍中灸一七壯主五臟積聚氣甲乙經云手太陽少陽足陽明所生任脈之會結氣囊里針藥所不及灸肓募隨年壯肓募二穴從乳頭斜度至臍中屈去半從乳下行度頭是穴下氣灸肺俞百壯又灸太衝五十壯凡臍下㽲痛流入陰中發作無時此冷氣灸闕元百壯穴在臍下三寸又鹽灸臍孔中二七壯短氣不得語灸天井百壯穴在肘後兩筋間又灸大椎隨年壯又灸肺俞百壯又灸肝俞百壯又灸尺澤百壯又灸小指第四指間交脈上七壯又灸手十指頭合十壯乏氣灸第五椎下隨年壯奔豚灸氣海百壯穴在臍下一寸半又灸關元百壯穴在臍下三寸奔豚搶心不得息灸中極五十壯中極一名玉泉在臍下四寸奔豚上下腹中與腰相引痛灸中府百壯穴在乳上三肋間奔豚灸期門百壯穴直兩乳下第二肋端旁一寸五分奔豚上下灸四滿二七壯穴挾丹田兩旁相去三寸即心下八寸臍下橫紋是也奔豚腹腫灸章門百壯章門一名長平二穴在大橫外直臍季肋端凡肺風氣痿絕四肢滿脹喘逆胸滿灸肺俞各二壯肺俞對乳引繩度之在第三椎下兩旁相去各一寸五分嘔吐上氣灸尺澤三七壯尺澤在腕後肘中橫紋腹中雷鳴相逐食不化氣逆灸上脘下一寸名太倉七壯肺脹氣搶脅下熱痛灸陰都隨年壯穴在挾胃脘兩邊相去一寸胃腕在心下三寸治唾血嘔血灸刺法胃庫房穴在氣戶下一寸六分陷者中仰而取之主唾血甲乙經云足陽明脈氣所發灸一七壯嘔血肩脅痛口乾心痛與背相引不可咳咳引腎痛不容主之唾血振寒嗌乾太淵主之嘔血大陵及郄門主之嘔血上氣神門主之心膈下嘔血上脘主之曲澤穴在肘內廉下陷者中屈肘得之各灸七壯主嘔血兼心痛血出甲乙經云手心主脈之所入也內傷唾血不足外無膏澤刺地五會治吐血灸法吐血灸巨闕穴在鳩尾下一寸甲乙經云心募也任脈氣所發灸七壯炷不必大箸頭為之吐血唾血氣咳逆灸肺俞隨年壯吐血酸削灸肝俞百壯吐血嘔逆灸手心主五壯千金翼云大陵是虛勞吐血灸胃脘三百壯亦主嘔逆吐血少食多飽多唾百病多唾一作多睡吐血唾血灸胸堂百壯不宜針吐血腹痛雷鳴灸天樞百壯治癥瘕灸法三焦俞二穴在第十三椎下兩邊各一寸半主癥瘕甲乙經云足太陽脈氣所發各灸七壯癥瘕灸內踝後宛宛中隨年壯又灸氣海百壯久冷及婦人癥瘕腸鳴泄利繞臍㽲痛灸天樞百壯三報之勿針穴在挾臍兩邊各二寸積聚堅滿灸脾募百壯穴在章門季肋端心下堅積聚冷脹灸上脘百壯三報之穴在巨闕下一寸胸滿腹脹積聚痞痛灸肝俞百壯三報積聚堅大如盤冷脹灸胃脘二百壯三報之穴在巨闕下二寸中極主少腹積聚如石小腹滿臟腑積聚脹滿羸瘦不能飲食灸三焦俞隨年壯治腳氣灸法凡腳氣初得腳弱宜速灸之並服竹瀝湯灸訖可服八風散無不瘥者惟速治之若人但灸而不能服散服散而不灸如此者半瘥半死雖得瘥者或至一二年復更發動覺得便依此法速灸之及服散者治十十俞初灸風市次灸伏兔次灸犢鼻次灸膝兩眼次灸三里次灸上廉次灸下廉次灸絕骨凡灸八處第一風市穴可令病人起正身平立垂兩臂直下舒十指掩著兩髀便點當手中央指頭髀大箸上是灸之百壯多亦佳輕者不可減百壯重者乃至一處五六百壯勿令頓灸三報之佳第二伏兔穴令病人累夫端坐以病人手夫掩橫膝上夫下傍與曲膝頭齊上傍側夫際當中央是灸百壯亦可五十壯第三犢鼻穴在膝頭蓋頭上際外骨邊平處以手按之得節解則是一云在膝頭下近外三骨箕踵中動腳以手按之得窟解是灸之五十壯可至百壯第四膝眼穴在膝頭骨下兩旁陷者宛宛中是第五三里穴在膝頭骨節下一夫附脛骨外是一云在膝頭骨節下三寸人長短大小當以病人手夫度取灸之百壯第六上廉穴在三里下一夫亦附脛骨外是灸之百壯第七下廉穴在上廉下一夫一云附脛骨外是灸之百壯第八絕骨穴在腳外踝上一夫亦云四寸是凡此諸穴灸不必一頓灸盡壯數可日日報灸之三日之中灸令盡壯數為佳凡病一腳則灸一腳病兩腳則灸兩腳凡腳弱病皆多兩腳又一方云如覺腳惡便灸三里及絕骨各一處兩腳惡者合四處灸之多少隨病輕重大要雖輕不可減百壯不瘥速以次灸之多多益佳一說灸絕骨最要人有患此腳弱不即治及入腹腹大上氣於是乃須大法灸隨諸腧及諸脘關節腹背盡灸之並服八風散往往得瘥覺病入腹若病人不堪痛不能盡作大灸但灸胸心腹諸穴及兩腳諸穴亦有得好瘥者凡量一夫之法復手並舒四指對度四指上中節上橫過為一夫夫有兩種有三指為一夫者此腳弱灸以四指為一夫也亦依支法存舊法梁丘犢鼻三里上廉下廉解谿太衝陽陵泉絕骨崑崙陰陵泉三陰交足太陰復溜然谷湧泉承山束骨等凡一十八穴舊法多灸百會風府五臟六腑俞募頃來灸者悉覺引氣向上所以不取其法氣不上者可用之其要病已成恐不救者悉須灸之其足十指去指奇一分兩足凡八穴曹氏名曰八沖極下氣有效其足十趾端名曰氣端日灸三壯並大神耍其八沖可日灸七壯氣下即止凡灸八沖艾炷須小作之治水腫灸刺法黃帝治水之腧五十七處尻上五行行五謂腎腧五十七穴積陰之所聚也水所從出入也尻上五行行五者此腎腧故水病下為胕腫大腹上為喘呼不得臥者標本俱病故肺為喘呼腎為水腫肺為逆不得臥分為相輸俱受者水氣之所留也伏兔上各二行行五者此腎之街也三陰之所交結於腳也踝上各一行行六者此腎脈之下行也名曰太衝凡五十七穴者皆臟之陰絡水之所客也身脹逆息不得臥風汗身腫喘息多唾天府主之四肢腫身濕豐隆主之風逆四肢腫復溜主之身腫皮痛不可近衣屋翳主之水腫臚脹食飲不下惡寒胃倉主之水腫腸鳴胃虛脹不嗜食繞臍痛沖胸不得息者水分主之穴在下腕下一寸神闕上一寸任脈氣所發甄權云日灸七壯至四百壯止水通身腫灸足第二趾上一寸隨年壯又灸兩手大指縫頭七壯脹滿水腫灸脾俞隨年壯三報水腫人中盡滿唇反死水溝主之水腫大臍平灸臍中腹無紋理者不治水腫水氣行皮中陰交主之水腹大及水脹水氣行皮中石門主之石水痛引脅下脹頭眩痛身盡熱關元主之石水刺氣街石水章門及然谷主之水天泉主之腹中氣盛腹脹逆不得臥陰陵泉主之水腫留飲胸脅支滿刺陷谷出血立已水腫脹皮腫三里主之風水膝腫巨虛上廉主之面胕腫上星主之先取譩譆後取天牖風池風水面胕腫衝陽主之風水面胕腫顏黑解谿主之治嘔吐灸法神藏二穴治嘔吐不止甲乙經云穴在彧中下一寸六分陷者中足少陰脈氣所發仰而取之各灸五壯炷用竹箸為之嘔吐氣逆不得下食灸心俞百壯吐嘔氣逆不得下食今日食明日吐者灸膈俞百壯吐逆不得下食灸胸堂百壯又灸巨闕五十壯又灸胃脘百壯三報吐逆飲食卻出灸脾募百壯三報章門穴也吐嘔宿汁吞酸灸神光一名膽募百壯三報甲乙亦在日月膽募經云期門下五分吐逆霍亂吐血灸手心主五十壯反胃食即吐出上氣灸兩乳下各一寸又灸臍上一寸二十壯又灸內踝下三指稍斜向前有穴三壯乾嘔不止粥食湯藥皆吐不停灸手間使三十壯若四肢厥脈沉絕不至者灸之便通此起死人法又灸心主尺澤亦佳治噦灸法少商二穴主噦甲乙經云在手大指內側去爪甲如韭葉手太陰脈之所出也各灸三壯炷如小麥大噦噫膈中氣閉塞灸腋下聚毛下附肋宛宛中五十壯噦噫嘔逆灸石關百壯噦灸承漿七壯炷如麥大又灸臍下四指七壯嘔啘灸心主各七壯在掌腕上約中吐不止更灸如前數嘔噦而手足逆冷者灸三陰交各七壯在足內踝直上三寸廉骨際未瘥更灸如前數治水飲不消灸刺法溢飲脅下堅痛中脘主之腰清脊強四肢解惰善怒咳少氣鬱郁然不得息厥逆肩不可舉馬刀瘻身瞤章門主之溢飲水道不通溺黃少腹痛裡急腫洞泄體痛京門主之一云髀痛引背飲渴身體痛多唾隱白主之寒中傷飽食飲不化五臟䐜脹心腹胸脅支滿脈虛則生百病上脘主之腹脹腸鳴氣上衝胸不能久立腹中痛濯濯冬日重感於寒則泄當臍而痛腸胃間遊氣切痛食不化不嗜食身腫一作重挾臍急天樞主之治骨蒸灸法取穴法先二穴令患人平身正立取一細繩蠟之勿令展縮順腳底直踏之男左女右其繩前頭與大𧿹趾端齊後頭當腳跟中心向後引繩循腳跟直上至曲䐐中大橫紋截斷又令患人解發分兩邊令見頭縫自囟門平分至腦後乃平身正坐取向所截繩一頭令與鼻端齊引繩向上正循頭縫至腦後垂下循脊骨引繩頭向下至繩盡處當脊骨以墨點記之墨點不是灸處又取一繩子令患人合口將繩子按於口上兩頭至兩吻卻鉤起繩子中心至鼻柱根下令如厶狀便齊兩吻截斷將此繩展令直於前來脊骨上墨點處橫量取平勿令高下繩子先中折當中心以墨記之卻展開繩子橫量以繩上墨點正壓脊骨上墨點為正兩頭取平勿令高下於繩子兩頭以朱點記朱點是灸穴以上是第一次點二穴次二穴令其人平身正坐稍縮髆取一繩繞項向前雙垂與鳩尾齊鳩尾是心岐骨人有無心岐骨者可從胸前兩岐骨下量取一寸即是鳩尾即雙截斷卻背翻繩頭向項後以繩子中停取心令正當喉嚨結骨上其繩兩頭夾項雙垂循脊骨直下至兩繩頭盡處合作一處當脊骨以墨點記之墨點不是灸處又取一繩子令其人合口橫量齊兩吻截斷還於脊骨上墨點處橫量如上法繩子兩頭以朱點記朱點是灸穴以上是第二次點二穴通前共四穴同時灸日別各灸七壯至三七壯累灸至一百或一百五十壯為妙候瘡欲瘥又依後法灸二穴又次二穴以第二次量口吻繩子於第二次雙繩頭盡處墨點上當脊骨直下直點令繩中停中心在墨點上於上下繩盡頭以朱點兩穴朱點是灸穴以上是第三次點兩穴謂之四花灸兩穴各灸百壯三次共六穴各取離日量度度訖即下火唯須三月三日艾最佳疾瘥百日內慎飲食房室安心靜處將息若百日後覺未瘥復初穴上再灸之凡骨蒸之候所起辨驗有二十二種並依上項灸之一胞蒸小便赤黃二玉房蒸男遺尿失精女月漏不調三腦蒸頭眩悶熱四髓蒸覺髓沸熱五骨蒸齒黑六筋蒸甲焦七血蒸發焦八脈蒸急緩不調九肝蒸或時眼前昏暗十心蒸舌焦或生瘡或時胸滿十一脾蒸唇焦坼或口瘡十二肺蒸口乾生瘡十三腎蒸耳乾焦十四膀胱蒸右耳焦十五膽蒸眼目失光十六胃蒸舌下痛十七小腸蒸眼目失光十八大腸蒸鼻右孔痛十九三焦蒸乍寒乍熱二十肉蒸別人覺熱自覺冷二十一皮蒸生雞皮粟肉起二十二氣蒸遍身躁熱不自安息用尺寸取穴法凡孔穴尺寸皆隨人形大小須男左女右量手中指中心一節兩橫紋中心為一寸艾炷大小法凡艾炷須令根足三分若不足三分恐復孔穴不備穴中經脈火氣不行即不能抽邪氣引正氣雖小兒必以中指取穴為準用火法黃帝曰松柏柿桑棗榆柳竹等木火用灸必害肌血慎不可用凡取火者宜敲石取火或水精照於日得者太陽火為妙天陰則以槐木取火亦良倉猝之際或用蠟燭或清油點燈或艾梗引火亦得治傳屍伏連骨蒸痃癖等諸穴傳屍伏連殗殜骨蒸痃癖鬼氣惡寒或如瘧狀宜灸大椎上一穴又灸大椎兩旁近下少許對椎節間各相去一寸五分二穴又灸兩肋下二穴名章門又灸當心脊骨上兩旁各相去一寸二穴以上七穴日別灸皆取正午時灸各七壯滿百壯漸瘥至五百壯病除又骨蒸痃癖灸兩肩井二穴若人面熱帶赤色者灸之即瘥取穴之法坐以手指從髆骨罅向項筋上捺之中指下即是也上廉二穴在膝外下三寸是一云三里下三寸是下廉二穴在上廉下三寸是當心脊骨上平立以物柱地當心點記回量脊上點即是穴以上七穴灸之如前法又骨蒸痃癖令患者於板上平身正立以杖拄板向上度當臍點杖記之又回杖量脊中點之又令患人合口別以物橫口兩吻當中折之以折處點灸又兩乳一夫肋間二穴總六穴灸之並如前法凡量皆取病者男左女右無名指中節屈之為寸又法取男左女右手中指以物從指本量至指端仍將此度於腳趺上系鞋處橫紋當脛面上量一度是穴治傳屍殗殜喜魘夢諸穴商丘二穴在足內踝下微前陷中灸七壯瘥乃止厲兌二穴在足大趾次趾之端去爪甲角如韭葉灸一壯大良二間二穴在手大指次指本節內側陷中灸三壯以上六穴商丘療多臥厲兌療嗜臥怠惰章門療賁豚氣脹治五勞七傷及山嵐瘴瘧背髆煩重心痛注忤氣羸食不生肌膚寒熱邪氣頭項強面色黑黃精神昏倦積年淋瀝積癖鬼氣傳屍骨蒸等諸穴胃俞二穴在第十二椎下兩旁各一寸五分日灸七壯止或至一百壯量病輕重加灸又腎俞二穴在第十四椎下兩旁各一寸五分灸七七壯病深者日灸七壯至百壯佳又章門二穴可灸七壯日灸漸至七七壯同前法又太衝二穴在足大趾間一寸本節後二寸陷中灸五壯漸加日灸如前法凡膏肓二穴令病人坐曲背伸兩臂著膝令直手大指與膝齊以物稽肘勿令臂動從髆骨上角摩捺至髆骨下頭其間當有四肋三間灸中間旋轉髆骨之裡去髆骨側容指許摩膂肉之表肋間灸處捺之自覺牽引胸肩中灸兩髆骨內各一處五百壯多至千壯氣下如水若無停痰宿水必有所下也此灸法無所不治若病困即令側臥挽臂令前取穴或正坐伸臂令人挽之使兩臂骨相遠不爾膊骨複穴即難取也其穴近五椎相望求之又肝俞二穴在第六椎下兩旁各一寸五分日灸七壯病深者至百壯佳又神堂穴在第五椎下兩旁各三寸陷中正坐取穴灸七壯至七七壯如前法以上七名總十四穴若不能遍灸當取緊者灸之其緊者即膏肓胃俞章門腎俞太衝是也若能依次第灸之各滿百壯尤善凡量穴法不拘肥瘦長短取病人男左女右手中指度兩橫紋為寸是為同身寸也凡灸皆取正午時佳若旦起空腹灸即傷人氣又令人血虛若日晚食後灸即病氣難去若治猝病風氣即不在此例治目疾灸刺法目中痛不能視上星主之先取譩譆後取天牖風池青盲遠視不明承先主之目瞑遠視䀮䀮目窗主之目䀮䀮赤痛天柱主之目眩無所見偏頭痛引目外眥而急頷厭主之目遠視不明惡風目淚出憎寒頭痛目眩瞢內眥赤痛遠視䀮䀮無所見眥癢痛淫膚白翳精明主之青盲無所見遠視䀮䀮目中淫膚白膜覆瞳子巨髎主之目不明淚出目眩瞢瞳子癢遠視䀮䀮昏夜無見目瞤動與項口參相引喎僻口不能言刺承泣目痛僻戾目不明四白主之目赤目黃顴髎主之𥌰目水溝主之目痛不明齦交主之目瞑身汗出承漿主之青盲𥌰目惡風寒上關主之青盲商陽主之𥌰目䀮䀮偏歷主之眼痛下廉主之睢目䀮䀮少氣灸五里右取左左取右目中白翳前谷主之目痛泣出甚者如脫前谷主之白膜覆珠瞳子無所見解谿主之眼暗灸大椎下數節第十當脊中安灸二百壯惟多為佳肝勞邪氣眼赤灸當容百壯兩邊各兩穴在眼小眥近後當耳前三陽三陰之會處以兩手按之有上下橫脈與耳門相對是也眼急痛不可遠視灸當瞳子上入髮際一寸隨年壯穴名當陽風翳患右目灸右手中指本節頭上五壯如小麥大左手亦如之肝虛目不明灸肝俞二百壯小兒斟酌可灸一二七壯風癢赤痛灸人中近鼻柱二壯仰臥灸之目猝生翳灸大指節橫紋三壯在左灸右在右灸左良絲竹空前頂主目上插憎風寒承泣主目瞤動與項口相引目不明淚出目眩瞢瞳子癢遠視䀮䀮昏夜無見口喎僻不能言三間前谷主目急痛太衝主下眥痛陽谷太衝崑崙主目急痛赤腫曲泉主目赤腫痛束骨主眥爛赤陽谿主目痛赤商陽巨髎上關承光瞳子髎絡卻主青盲無所見觀髎內關主目赤黃腋門主目澀暴變期門主目青而嘔二間主目眥傷治耳疾灸刺法聽會二穴在耳前陷中張口得之動脈應手各灸五壯主耳聾無所聞甲乙經云手少陽脈氣所發也下關二穴主聤耳甲乙經云在客主人下耳前動脈下空下廉合口有穴張口而閉足陽明少陽之會各灸三壯炷以小箸頭為之耳鳴百會及頷厭顱囟天窗大陵偏歷前谷後谿主之耳痛聾鳴上關主之刺不可深耳聾鳴下關及陽谿關衝腋門陽谷主之耳鳴聾頭頷痛耳門主之聾耳中顛颼顛颼若風者聽會主之耳聾無聞天窗主之耳聾䏆䏆無所聞天容主之耳中生風耳鳴耳聾時不聞商陽主之耳聾兩顳顬痛中渚主之耳渾渾淳淳聾無所聞外關主之猝氣聾四瀆主之作泥餅子厚半分復耳上四邊勿令泄氣以箸刺泥餅作一小孔以艾灸之百壯候耳中痛不可忍即側耳傾卻黃水出盡即瘥若泥干數易之治耳病又截箭簳二寸納耳中以面擁四畔勿令泄氣灸簳筒上七壯又搗豉作餅填耳內以地黃長五六分削一頭令尖納耳中與豉餅底齊餅上著楸葉蓋之剜一孔如箸頭透餅於上灸三壯治鼻疾灸刺法凡口鼻出血不止名腦衄灸上星五十壯入髮際一寸是涕出不止灸鼻兩孔與柱齊七壯鼻中息肉灸上星二百壯穴在直鼻入髮際一寸又灸兵上星兩旁相去三寸各一百壯鼻衄而癢灸足大趾節橫理三毛中十壯劇者百壯衄不止灸之並治陰卵腫又灸風府一穴四壯不止再灸又灸湧泉二穴各百壯衄而不衃血流取足太陽大衄衃取手太陽不已刺腕骨下不已刺膕中出血鼻鼽衄上星主之先取譩譆後取天牖風池鼻管疽發為厲鼻腦空主之鼻鼽不利窒涸氣寒喎僻多洟鼽衄有癰迎香主之鼽衄洟出中有垂癰宿肉窒洞不通不知香臭素髎主之鼻衄窒口僻清洟出不可止鼽有癰禾髎主之鼻鼽不得息不收洟不知香臭及衄不止水溝主之鼻中息肉不利鼻頭頞額中痛鼻中蝕瘡齦交主之治口齒灸刺法勞宮穴一名五里在掌中動脈灸三壯主口中腥臭甲乙經云手心主脈之所流也齒痛不惡清飲取足陽明惡清飲取手陽明舌緩涎下煩悶取足少陰重舌刺舌柱以䤵針上齒齲腫目窗主之上齒齲痛惡寒正營主之齒痛灸外踝上高骨前交脈上七壯風牙疼逐左右以繩量手中指頭至掌後第一橫紋折為四分以度橫紋後當臂兩筋間當度頭灸三壯隨左右灸之兩側患灸兩臂至驗頰車顴窌主口僻痛惡風寒不可以嚼水溝主唇吻不收喑不能言口噤不開重舌灸行間隨年壯穴在足大趾岐中二穴小兒重舌灸在足踝上七壯又灸兩足外踝上三壯緊唇灸虎口男左女右七壯又灸承漿三壯牙齒疼灸兩手中指背第一節前有陷處七壯下火立愈小腸俞主口舌乾食飲不下耳門主唇吻強上齒齲痛口僻刺大淵引而下之口中腥臭勞宮主之口中下齒痛惡寒䪼腫商陽主之齒齲痛惡清三間主之口僻偏歷主之口齒痛溫溜主之下齒齲則上齒痛腋門主之齒痛四瀆主之上牙齒齲痛陽谷主之一作陽谿齒齲痛合谷主之齒齲痛少海主之舌縱涎下煩悶陰谷主之喉腫胸脅支滿灸尺澤百壯關衝穴在手小指之端去爪甲角如韭葉灸三壯普濟針灸經云主喉痹舌卷口乾治失欠灸法完骨二穴在耳後入髮際四分各灸三三壯主失欠甲乙經云足太陽少陽之會也失欠頰車蹉灸背第五椎一日二七壯滿三日未瘥灸氣衝二百壯胸前喉下甲骨中是亦名氣堂通里二穴主數欠甲乙經云手少陰絡在腕後一寸走手太陽各灸五壯炷如半棗核大又灸足內踝上三寸宛宛中或三寸五分百壯三報此三陰交穴也
