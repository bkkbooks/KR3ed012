一十味搗羅八味為末與鐵粉丹砂同研令勻煉蜜丸如緑豆大每服五丸溫熟水下不拘時更量兒大小加減治小兒風熱身體溫壯利膈化涎安神鎮心牛黃丸方牛黃研龍腦研麝香研各半錢甘草炙銼雄黃研天竺黃研丹砂研人參遠志去心乾蠍去土炒山芋白殭蠶各一錢天南星漿水煮一日透軟切焙天麻各一分上一十四味搗研為末煉蜜和丸如雞頭大每服一丸分四服金銀薄荷湯化下不拘時候量兒大小加減服治小兒風熱及傷寒時氣瘡疹發熱等桔梗煮散方桔梗銼炒細辛去苗葉人參白朮栝蔞根甘草炙銼白茯苓去黑皮芎藭各等分上八味搗羅為散每服二錢匕水一盞生薑一片薄荷三葉同煎至六分三歲以下作四服五歲以上作二服凡小兒發熱不問傷寒風熱便與數服無不愈者治小兒風熱胸膈煩悶目澀多渴鬱金散方鬱金半兩蟬蛻四十枚龍膽白附子炮各半兩大黃炒乾蠍炒甘草炙各一分上七味搗羅為散每服一字至半錢匕量兒大小空心薄荷湯調下小兒熱渴論曰小兒血氣本自盛實腑臟之間易為生熱熱氣熏蒸則津液乾枯故令兒渴而引飲治小兒熱渴或虛熱吐下除熱止渴栝蔞飲方栝蔞根三分黃芩去黑心一分知母焙小麥粟米各半兩上五味除粟米小麥外餘三味並搗羅為粗末每二錢匕水一小盞入小麥粟米各一撮同煎至六分去滓分作三服一日吃盡更量兒大小以意加減治小兒夏天服藥大下後胃中虛熱渴唯飲水麥門冬飲方麥門冬去心焙龍膽各一兩甘草炙銼黃芩去黑心各三分葛根銼一兩半上五味粗搗篩每服一錢匕用水七分煎至四分去滓溫服量兒大小以意臨時加減治小兒壯熱兼嘔渴不止蘆根飲方蘆根銼麥門冬去心焙人參各半兩知母焙一兩粟米一合上五味粗搗篩每服二錢匕水一盞入生薑少許劈破同煎至五分去滓分溫三服更量兒大小以意加減治小兒多渴黃連飲方黃連去須半兩冬瓜瓤一分上二味細銼以水一盞半同煎至八分去滓分溫三服量兒大小臨時加減治小兒熱渴不止蓮實湯方蓮實三十枚炒黃椎碎浮萍一分上二味同用水一盞生薑少許煎五分去滓分溫三服量兒大小臨時加減治小兒上焦虛熱飲水不止枇杷葉湯方枇杷葉去毛炙葛根銼胡黃連甘草炙銼玄參麥門冬去心焙等分上六味粗搗篩每服一錢匕水一盞入生薑一片煎至六分後入蜜少許再煎至五分去滓放溫分二服食後治小兒上焦風熱熱渴引飲不止天麻人參煎方天麻人參白茯苓去黑皮各一分天竺黃研一錢甘草生用一錢鉛白霜研一錢龍腦研半錢丹砂研一錢上八味先將四味為細末再入研了四味和勻煉蜜煎為膏每服一大豆許用金銀薄荷湯化下治小兒熱氣熏蒸腑臟煩躁津液乾枯渴欲引飲方上取桑枝一握細銼以水一盞半煎至八分去滓分作三服如熟水與飲治小兒熱渴不止方黃連去須炒蘆根各一分上二味細銼以水一盞半煎取五分去滓旋與飲
