body:
  text: 卷第一百六十八小兒溫壯論曰足陽明胃之經主於肌肉若小兒胃有伏熱或挾宿寒皆令胃中不和其氣蒸郁發於肌肉故令兒體熱多睡名曰溫壯其證大便黃而惡臭者有伏熱也利下乃愈若便白而醋臭者有宿滯也當微利損谷乃愈古法去伏熱則用龍膽湯去宿滯則用紫霜丸當仿其法而治之治嬰兒出腹血脈盛實寒熱溫壯四肢驚掣發熱大吐唄者若已能進哺食實不消壯熱及變蒸不解客忤鬾氣並諸驚癇悉治十歲以下小兒皆服龍膽湯方第一此是新出腹嬰兒方若日月長大者以次依此為例若知是客忤及有鬾氣者可加人參當歸各如龍膽多少一百日兒加三銖二百日兒加六銖一歲兒加半兩余藥準此方龍膽鉤藤皮柴胡去蘆頭黃芩去黑心桔梗炒芍藥赤茯苓去黑皮甘草炙各一兩蜣螂炒二枚大黃銼炒一兩上一十味㕮咀如麻豆大以水一升煮取五合為劑兒生一日至七日分一合為三服兒生八日至十五日分一合半為三服兒生十六日至二十日分二合為三服兒生二十日至三十日分三合為三服兒生三十日至四十日盡以五合為三服皆得下即止治小兒變蒸發熱不解並挾傷寒溫壯汗後熱不歇及腹中有痰癖哺乳不進乳則吐唄食癇先寒後熱者紫霜丸方代赭搗研如粉赤石脂搗研如粉各一兩巴豆三十枚去心皮出油盡杏仁五十枚去皮尖雙仁炒上四味將巴豆杏仁別研為膏入二味相和更搗令相得若硬入少蜜同搗之密器中收三十日兒服一丸如麻子大與少乳汁令下食頃後再與少乳當小下熱氣若余勢未消明旦更與一丸百日兒服如小豆一丸以此準量增減丸數大小治小兒溫壯往來腹內有熱柴胡湯方柴胡去蘆頭三分黃芩去黑心人參甘草炙銼赤茯苓去黑皮麥門冬去心焙各半兩上六味粗搗篩每用一錢匕以水一盞入竹葉數片煎取五分去滓放溫量兒大小加減服之治小兒溫壯熱不瘥若舌寬不含乳胸中有痰口中瘡兼驚黃芩湯方黃芩去黑心一兩一分鉤藤細銼一分蛇蛻炙一寸甘草炙銼半兩芒硝一分大黃蒸三遍焙乾用一兩牛黃如大豆許三粒別研上七味粗搗篩三四歲兒每服半錢匕以水半盞煎至三分去滓食後溫服日三量兒大小以意增減治小兒壯熱及百病芍藥湯方芍藥甘草炙銼各半兩大黃蒸焙乾銼一兩上三味粗搗篩五六歲兒每服一錢匕以水半盞煎至三分去滓溫服食後日三服隨兒大小以意加減治小兒溫壯不解升麻湯方升麻柴胡去蘆頭麥門冬去心焙黃芩去黑心甘草炙銼各半兩黃耆銼人參各一分上七味粗搗篩每服一錢匕以水八分煎取五分去滓量兒大小加減服治小兒挾實溫壯惕惕微驚當歸湯方當歸切焙半兩柴胡去蘆頭三分黃芩去黑心半兩細辛去苗葉三分大黃銼炒一兩升麻半兩五味子半兩紫菀去苗土一兩牛黃研一分杏仁二十枚湯浸退去皮尖雙仁炒別研上一十味粗搗篩二三歲兒每服一錢匕以水七分煎至五分去滓分溫日三服隨兒大小以意加減治小兒有熱服藥大下後溫壯不解胸中結熱五味子湯方五味子黃芩去黑心柴胡去蘆頭芒硝麥門冬去心焙各半兩黃連去須一分甘草炙銼一分當歸切焙三分大黃飯上蒸過曝乾一兩石膏三分搗碎再細研入上一十味粗搗篩五六歲兒每服一錢匕以水七分煎至四分去滓食後溫服無痰三服若有痰即吐之量兒大小以意加減治小兒腹中伏熱溫壯往來柴胡湯方柴胡去蘆頭三分黃芩去黑心一兩人參半兩甘草炙半兩赤茯苓去黑皮半兩麥門冬去心焙半兩上六味粗搗篩每服一錢匕水七分入小麥五七十粒竹葉十片煎至四分去滓溫服量兒大小加減服之治小兒挾熱痰盛溫壯夜臥不穩天南星丸方天南星炮為末半夏湯洗七遍焙為末膩粉研滑石研各一錢巴豆二十四枚去心膜以水浸一宿研細不出油上五味先研巴豆令熟次下衆藥末以糯米粥和丸如緑豆大每服三丸更量兒大小加減瀉痢米飲下取食蔥湯下驚悸薄荷荊芥湯下治小兒熱疾後腹中不調飲食不節腹滿溫壯及中客忤兼乳冷消滯丸方雀屎白牛黃研各一分芎藭芍藥乾薑炮甘草炙各半兩麝香研小麥大黃銼炒當歸切焙人參各三分上一十二味搗羅為末煉蜜丸如麻子大溫熟水下三丸欲令下者服五丸治小兒風邪溫壯發熱壓驚止頭痛化痰涎生犀牛黃丸方犀角屑一分牛黃一錢研龍腦麝香各半錢研天南星牛膽匱內者研為末藿香葉為末各二兩甘草末雄黃末各半兩上八味合研如粉煉蜜和丸如雞頭大每服一丸不計時候煎薄荷湯化下小兒壯熱論曰小兒壯熱者由陰陽不和氣盛血實邪熱之氣客於腸胃蘊蓄日久熏發肌肉故令身體壯熱其脈三部俱實者是也亦有乳食不化及食物不消蒸鬱於外令兒壯熱口乾煩渴其脈見寸口浮而大按之反澀者是也治小兒百日以來結實壯熱兼驚祛熱湯方大黃銼炒朴硝甘草炙龍齒各一分枳殼去瓤麩炒一兩上五味粗搗篩每服半錢匕以水半盞煎至三分去滓放溫時與一分服日可三服乳母服之亦妙治小兒壯熱脹滿不飲乳龍膽飲方龍膽去根犀角鎊屑各半兩升麻天麻銼炒甘草炙鱉甲去裙襴醋浸炙黃色各三分檳榔煨銼一枚上七味粗搗篩每服一錢匕以水半盞煎至三分去滓分溫三服治小兒生四五十日服藥下後身體壯熱如火傷寒兼腹滿頭面丹腫此皆內有伏熱龍膽湯方龍膽去根冬葵子葳蕤大青柴胡去苗各一分赤茯苓去黑皮甘草炙各半兩上七味粗搗篩每服一錢匕以水半盞煎至三分去滓分為三服如人行十里以來一服隨兒大小加減治小兒期歲至三歲時時壯熱升麻湯方升麻柴胡去苗枳殼去瓤麩炒黃芩去黑心芍藥梔子仁知母焙杏仁去皮尖雙仁炒別研各三分大黃銼炒一兩一分石膏別搗研一兩半上一十味以八味粗搗篩入杏仁石膏拌勻每服一錢匕以水一中盞入青竹葉同煎至三分去滓食後相繼三服量兒大小加減治小兒壯熱不除犀角湯方犀角鎊半兩升麻一分大黃銼炒一分石膏搗研三分上四味以三味粗搗篩入石膏拌勻每服半錢匕以水半盞煎至三分去滓放溫相繼三服隨兒大小以意加減治小兒服藥吐利後身壯熱精神昏昧或微利而內有結熱大青湯方大青半兩大黃銼炒一分甘草炙半兩麻黃去根節半兩上四味粗搗篩二三歲兒每服半錢匕以水半盞煎至三分去滓食後相繼三服仍隨兒大小以意增減治小兒壯熱實滯不去及寒熱往來微驚大黃飲方大黃銼炒一兩黃芩去黑心栝蔞根甘草炙各三分牡蠣熬龍骨凝水石研白石脂各半兩滑石研硝石研人參桂去粗皮各二兩上一十二味以九味粗搗篩入研藥和勻五六歲兒每服一錢匕以水一中盞煎至五分去滓溫服食後相繼三服隨兒大小加減治小兒壯熱不安鉤藤飲方鉤藤升麻甘草炙人參各半兩上四味粗搗篩每服一錢匕以水一盞煎至五分去滓分溫二服空心午後各一服隨兒大小以意加減治小兒八九歲痰實壯熱山梔子湯方山梔子仁黃芩去黑心前胡去蘆頭甘草生用上四味等分粗搗篩每服一錢匕水一中盞煎至五分去滓溫服日三量兒大小加減不計時候治小兒蓐內及百日以來壯熱虎睛牛黃丸方虎睛一對研牛黃研麝香研丹砂研雄黃研各一分上五味再同研為末煉蜜和丸如小豆大以乳汁研一丸與服治小兒未百日壯熱結實兼驚龍齒湯方龍齒半兩大黃銼炒半兩山梔子仁一分枳殼去瓤麩炒一分朴硝三分甘草炙一分上六味粗搗篩每服一錢匕水七分煎至五分去滓溫服量兒大小加減治小兒壯熱面赤唇口焦乾大小便不通四肢掣動驚啼或時發渴人參湯方人參三分柴胡去苗一分大黃銼炒一分升麻半兩芍藥一分山梔子仁半兩甘草炙半兩鉤藤半兩上八味粗搗篩每服一錢匕水七分煎取四分去滓溫服治小兒壯熱不解及驚熱風熱龍腦散方龍腦研半錢馬牙硝一分入合子內固濟火煅通赤先掘一地坑子甘草水潑冷濕紙襯藥入坑子內蔭一宿取研丹砂研一錢乾蠍微炒研七枚上四味合研勻細每服半錢匕或一字煎人參茯苓湯調下驚熱冷水下熱甚者冷水研生地龍汁調下治小兒肌體壯熱夜多驚啼及發吐逆日久不解或瀉或祕變成慢驚或作疳疾定搐搦除疳氣墜痰涎鎮心神如聖青金丸方龍腦研一錢麝香研膩粉各一分香墨杵研蘆薈研各一錢半白麵三錢青黛二錢金箔銀箔各十片使君子四枚以麵裹煨令面香熟去面杵取末上一十味再同研令勻滴井華水為丸如雞頭實大患慢驚用冷薄荷水化下三歲以上服一丸已下則半丸服訖便睡覺後利動立愈後隔三五日更與一服如些小驚著或急驚及覺身體熱但服之取下青涎為效量兒大小加減服治小兒風熱壅滯壯熱煩渴時嘔麥門冬湯方麥門冬去心焙三兩栝蔞根知母焙人參藜蘆去蘆頭各一兩龍膽半兩粟米一合上七味粗搗篩每用三錢匕水一盞半煎至八分去滓分溫三服小兒潮熱論曰小兒潮熱者身體發熱作止有時故謂之潮熱由保養失宜風冷邪氣客於分肉之間每遇衛氣至則真邪相搏故令發熱欲知在何經絡當觀間甚之時屬何腑臟各循其經以調之治小兒潮熱盜汗心忪及骨蒸勞熱地骨皮飲方地骨皮白茯苓去黑皮瞿麥穗赤芍藥生乾地黃焙山梔子仁甘草炙各一兩大黃銼炒柴胡去苗木通銼各一兩半人參木香各半兩青橘皮湯浸去白焙一分上一十三味粗搗篩每服一錢匕水七分入竹茹少許同煎至四分去滓溫服不拘時候量大小加減治小兒潮熱青蒿湯方青蒿焙知母焙甘草炙各二兩半夏湯洗七遍薑汁製一兩常山銼焙二兩鱉甲醋炙黃去裙襴桂去粗皮枳殼去瓤麩炒秦艽去苗土各四兩上九味粗搗篩每服半錢匕水半盞入生薑一片烏梅肉少許同煎三五沸去滓溫服治小兒潮熱飲食不為肌肉黃悴夜臥不安時有虛汗柴胡地骨皮湯方柴胡去苗地骨皮桔梗炒各一兩甘草炙半兩上四味粗搗篩每服一錢匕水一小盞煎至五分去滓食後臨臥溫服量大小加減治小兒風虛潮熱齘齒譫言酸棗仁飲方酸棗仁一兩蛇蛻皮炙三條人參羌活去蘆頭各半兩甘草炙一分上五味粗搗篩每服二錢匕水一盞入薄荷三葉同煎七分去滓分溫三服量大小加減治小兒潮熱白蘚皮湯方白蘚皮人參白芷防風去叉黃芩去黑心知母焙沙參犀角鎊各半兩甘草炙一分上九味粗搗篩每服一錢匕水八分入薄荷三片煎取五分去滓分溫二服治小兒潮熱百一羌活餅方羌活去蘆頭芎藭白殭蠶炒雞蘇各一兩乾蠍全者十四枚炒上五味搗羅為末煉蜜和丸如雞頭大捏作餅子每服一餅荊芥湯化下治小兒潮熱柴胡飲方柴胡去苗人參知母焙羚羊角鎊甘草炙陳橘皮湯浸去白焙赤茯苓去黑皮半夏湯洗七遍去滑焙木通銼芍藥等分上一十味粗搗篩每服一錢匕水一盞入生薑一片同煎至五分去滓溫服日二治小兒潮熱連翹湯方連翹山梔子仁甘草炙防風去叉蟬殼去土焙乾上五味等分粗搗篩每服一錢匕水半盞煎三五沸去滓量大小加減溫服治小兒潮熱不解長肌膚進飲食人參柴胡湯方人參柴胡去苗白茯苓去黑皮芎藭各一兩知母焙升麻藁本去苗土甘草炙天門冬去心焙各半兩獨活去蘆頭柏子仁研各一分上一十一味粗搗篩每服一錢匕水半盞入生薑二片青蒿一穗同煎至三分去滓食後溫服五歲以上十五以下入醋炙鱉甲半兩每服二錢水一盞煎六分服治小兒潮熱肌瘦盜汗黃雞煎丸方黃連去須二兩鶴蝨蕪荑仁各半兩秦艽去苗土柴胡去苗知母焙使君子去皮各一兩上七味搗羅為末以黃雌雞一隻重一斤許