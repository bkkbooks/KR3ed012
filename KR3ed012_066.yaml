body:
  text: 卷第六十六咳嗽上氣論曰諸氣皆屬於肺肺氣和平則升降自若若為寒邪所傷則肺氣壅澀不得宣通故咳嗽而上氣其證喘咳多涕唾甚者面目浮腫久而不已肺氣虛極風邪停滯令人胸背痛以至唾膿血也治咳嗽上氣語聲不出心胸痞悶頭昏痰涎小便赤澀五味子湯方五味子炒人參桑根白皮炙銼麥門冬去心焙防風去叉麻黃去根節細辛去苗葉甘草炙銼白前杏仁湯浸去皮尖雙仁麩炒枳殼去瓤麩炒各半兩甜葶藶隔紙炒三分上一十二味粗搗篩每服三錢匕水一盞入生薑三片同煎至七分去滓食後臨臥溫服治上氣咳嗽百部丸方百部款冬花去梗天門冬去心焙貝母去心炒桔梗炒紫菀去苗土等分上六味搗羅為末煉蜜丸如梧桐子大每服二十丸食後煎甘草烏梅湯下治咳嗽上氣華蓋煮散方款冬花去梗知母焙貝母去心炒各一兩紫菀去苗土桔梗炒各三分木香甜葶藶微炒各半兩杏仁去皮尖雙仁炒三分防己半兩蟬殼一兩上一十味搗羅為散每服三錢匕水一盞入酥少許煎至七分食後溫服治咳嗽上氣蜀椒丸方蜀椒去目及閉口炒出汗烏頭炮裂去皮臍杏仁湯浸去皮尖雙仁炒皂莢酥炙去皮子銼白礬枯各半兩細辛去苗葉款冬花去梗紫菀去苗土乾薑炮各三分吳茱萸湯浸洗焙乾炒麻黃去根節各一兩上一十一味搗羅為末煉蜜為丸如梧桐子大每服二十丸臨臥用熟水下至三十丸治積年咳嗽上氣涎唾稠黏五心煩躁不思飲食心肺留熱潤膈丸方阿膠炒燥熟乾地黃焙白茯苓去黑皮山芋五味子各一兩麥門冬去心焙貝母去心炒百部柏子仁炒別研丹參茯神去木各半兩人參遠志去心防風去叉各一兩杜仲去粗皮炙銼半兩上一十五味搗羅為細末煉蜜和丸如彈子大每服一丸水一盞化破煎至六分時時溫呷治三十年上氣咳嗽膿血喘息不得臥款冬花丸方款冬花去梗乾薑炮蜀椒去目及閉口者炒出汗吳茱萸淨洗焙乾炒桂去粗皮菖蒲銼米泔浸半日炒乾各一兩一分人參細辛去苗葉芫花醋浸炒乾紫菀去苗土甘草炙銼桔梗炒白茯苓去黑皮皂莢炙去皮子各三分上一十四味搗羅為末煉蜜為丸如梧桐子大每服酒下五丸加至十丸三日服治肺寒咳嗽上氣五嗽丸方桂去粗皮乾薑炮皂莢酥炙去皮子各一兩上三味搗羅為末煉蜜和丸如梧桐子大每服十丸溫水下食後臨臥服治多年上氣咳嗽龍腦丸方龍腦細研一錢訶黎勒皮半兩皂莢炙令黃色去皮子一挺上三味先搗訶黎勒皮皂莢細羅為末次入龍腦同研令勻煉蜜為丸如梧桐子大每日空腹煎貝母湯下七丸日二夜一治三十年咳嗽上氣香豉丸方豉炒令香半兩細辛去苗葉一兩紫菀去苗二兩吳茱萸湯洗焙乾炒甘草炙銼杏仁去皮尖雙仁炒研如脂各一兩上六味除杏仁外搗羅為末與杏仁同研令勻煉蜜為丸如梧桐子大每服三丸含化日四五服治積年上氣咳嗽不得臥郁李仁煎方郁李仁去皮尖雙仁一兩上一味用水一升研如杏酪去滓煮令無辛氣次下酥一棗許同煮熟放溫頓服之治上氣腹脹胸滿咳嗽不下食檳榔湯方檳榔銼一十四枚蜜二合高良薑一兩枇杷葉刷去毛炙一握生薑切焙三兩酥三兩上六味先將四味粗搗篩以水三升煮取一升去滓下酥蜜煎三五沸分溫三服相去如人行八九里再服重者不過三劑治咳嗽上氣促急心躁寒熱四肢煩疼夜間甚者柴胡桑白皮湯方柴胡去苗桑根白皮天雄炮裂去皮臍羌活去蘆頭枳殼去瓤麩炒大腹連皮銼各一兩半黃連去須當歸切焙麻黃去根節桂去粗皮甘草炙銼各一兩白梅拍碎四枚黃芩去黑心旋覆花微炒各半兩上一十四味銼如麻豆每服五錢匕水一盞半入生薑三片同煎至八分去滓溫服治咳嗽氣促木香枳殼湯方木香枳殼去瓤麩炒黃連去須各一兩麻黃去根節貝母去心百合紫菀去苗土款冬花去梗桑根白皮天雄炮裂去皮臍白石脂昆布洗去咸焙各一兩半黃芩去黑心半兩旋覆花微炒三分杏仁湯浸去皮尖雙仁炒十枚上一十五味銼如麻豆每服五錢匕水一盞半入生薑三片同煎至八分去滓溫服治肺熱上氣喘逆咳嗽咯血馬兜鈴散方馬兜鈴黃芩去黑心知母切焙白茯苓去黑皮紫菀去苗土麻黃去根節甘草炙銼杏仁去皮尖雙仁炒黃貝母去心大黃銼炒各半兩上一十味搗羅為散每服二錢匕煎桑根白皮棗湯調下治咳嗽上氣胸膈煩悶紫菀丸方紫菀去苗土貝母去心人參赤茯苓去黑皮陳橘皮去白焙各一兩半桂去粗皮款冬花去梗百部各一兩一分甘草炙銼三分杏仁去皮尖雙仁炒研三兩上一十味搗羅為末煉蜜為丸如梧桐子大每日飯後熟水下十丸加至二十丸治咳嗽喘急胸腹脅肋脹悶疼痛紫菀湯方紫菀去苗土桔梗銼炒款冬花去梗枳殼去瓤麩炒各一兩陳橘皮去白焙半兩赤茯苓去黑皮赤芍藥百合各一兩半大腹二枚銼上九味粗搗篩每服三錢匕水一盞煎至七分去滓溫服食後日二服治咳嗽上氣語聲不出心中煩悶桂杏丸方桂去粗皮為末二兩杏仁去皮尖雙仁炒黃研膏三兩上二味同杵勻每用新綿裹如棗大含化不拘時治咳嗽喘悶背髆煩疼四肢無力白前湯方白前一兩半杏仁二七枚去雙仁尖皮炒紫菀去苗土黃芩各一兩麥門冬去心焙二兩紫蘇莖葉三分陳橘皮湯浸去白炒半兩大麻仁淨淘研細上八味除研大麻仁旋入外粗搗篩每服三錢匕水一盞入生薑五片煎至數沸入研麻仁半錢匕再煎至七分去滓食後溫服日二治咳嗽喘促杏仁丸方杏仁去雙仁皮尖炒研三兩麥門冬去心焙百合貝母去心知母焙甘草炙銼各一兩白茯苓去黑皮一兩半乾薑炮桂去粗皮各半兩上九味搗羅為末煉蜜和丸如彈子大每含化一丸咽津治肺氣不和上氣咳嗽四神散方款冬花去梗貝母去心白薇百部各一兩半上四味搗羅為散每日食後以蜜湯調下三錢匕治肺臟氣不和上氣咳嗽地黃煎方地黃汁一升半麥門冬汁生薑汁天門冬汁各五合玄參柴胡去苗赤茯苓去黑皮射干各一兩黃牛乳一升蜜二升黃牛酥五兩黃耆銼炒桂去粗皮人參五味子炒款冬花紫菀去苗土貝母去心各二兩杏仁去尖皮雙仁研五兩上一十九味搗羅余藥為末次將自然汁及酥乳蜜等入銅銀器中以文武火煎百十沸時時攪轉然後旋旋調下諸藥末攪令勻煎百餘沸來日封閉於甑上蒸兩炊久待冷以蠟紙緊封閉十數日時復一看莫令損動每日飯後服一匙頭便仰臥漸漸咽之令藥浸潤心肺至夜臨睡時如前再服咳嗽嘔吐論曰咳嗽嘔吐者肺與胃俱受寒邪也蓋肺喜溫而氣宣胃得溫而物化二者臟腑不同要之畏寒之性一也肺感微寒既為咳嗽寒流於胃又成嘔吐內經曰胃咳之狀咳而嘔又曰聚於胃關於肺是也治上氣咳嗽嘔逆不下食人參湯方人參杏仁去皮尖雙仁炒白茯苓去黑皮柴胡去苗各二兩陳橘皮湯浸去白炒紫菀去苗土各三兩上六味粗搗篩每服三錢匕生薑半分拍碎水一盞煎至七分去滓溫服日三患冷加乾薑炮二兩患熱加麥門冬去心三兩不能食加白朮二兩厚朴去粗皮生薑汁炙二兩治咳嗽嘔吐心胸滿悶不下飲食半夏湯方半夏湯洗七遍薑汁製焙前胡去蘆頭紫菀去苗土各一兩人參訶黎勒煨取皮杏仁去皮尖雙仁炒各三分上六味粗搗篩每服三錢匕水一盞生薑一棗大拍碎煎至六分去滓溫服不拘時治肺胃有寒咳嗽嘔吐半夏丸方半夏曲炒二兩白茯苓去黑皮一兩乾薑炮丁香礬石熬令汁枯各半兩上五味搗羅為細末生薑汁煮麵糊丸如梧桐子大每服二十丸溫米飲下日三治咳嗽嘔吐涎沫心胸不快飲食不下白朮湯方白朮一兩人參桔梗銼炒黎訶勒煨取皮桂去粗皮各三錢陳橘皮湯浸去白焙半夏湯洗七遍生薑汁製甘草炙銼五味子各半兩上九味粗搗篩每服三錢匕水一盞半生薑半分切煎取八分去滓溫服不拘時日二治一切喘嗽痰涎吐逆金華丸方滑石為末一兩款冬花四兩上二味以款冬花搗為粗末入沙合內鋪底蓋頭置滑石於中固濟合子令密用炭火五斤煨之通赤候冷取出不用款冬花灰只取滑石末研極細別以款冬花細末二兩白麵三錢匕水一碗化開慢火熬成稀膏入前滑石末和勻丸如梧桐子大臨臥以一丸於生油內滾過乾咽治一切涎嗽溫胃止吐逆分氣丸方藿香葉草豆蔻去皮半夏湯洗七遍焙各一兩丁香白礬枯各半兩上五味搗研為細末麵糊和丸如緑豆大每服二十丸橘皮湯下不拘時治咳嗽嘔吐寒熱不下飲食厚朴湯方厚朴去粗皮生薑汁炙半夏湯洗七遍生薑制各二兩白朮三分紫菀去苗土陳橘皮湯浸去白焙人參杏仁去皮尖雙仁炒各一兩甘草炙銼貝母去心各半兩上九味粗搗篩每服四錢匕水一盞半生薑一棗大拍碎煎至八分去滓溫服不拘時治咳嗽上氣胸滿嘔吐涎沫胡椒丸方胡椒蓽茇各三兩白朮桂去粗皮高良薑款冬花紫菀去苗土甘草炙銼各二兩人參一兩上九味搗羅為細末煉蜜丸如梧桐子大每服十五丸米飲下不拘時治咳嗽嘔吐膠飴煎方膠飴五斤蜀椒去目並閉口炒出汗二升杏仁去皮尖雙仁炒一升研成膏乾薑炮人參各一兩附子炮裂去皮臍五枚桂去粗皮一兩半天門冬去心焙二兩半上八味搗羅六味為細末與杏仁膏同搗千杵入膠飴和勻每服半匙含化日三夜二治咳嗽嘔吐橘皮五味子湯方陳橘皮湯浸去白焙五味子人參紫蘇子各五兩上四味粗搗篩每服五錢匕水一盞半生薑一棗大拍碎煎至一盞去滓溫服咳嗽唾膿血論曰咳嗽唾膿血者由肺感寒氣咳嗽傷於陽脈也心主血肺主氣血隨氣行氣上逆故咳而有血寒邪壅熱與肺間津液相搏凝滯蘊結故又為膿因咳而咯唾膿血也治肺寒外內合邪咳嗽語聲不出口中如含霜雪停飲寒痰咽喉妨悶狀若梅核噎塞不通膈氣痞氣服之並效相敷丸方天門冬去心焙麥門冬去心焙貝母去心焙紫菀去土百合桔梗炒人參杏仁湯浸去皮尖雙仁炒生乾地黃焙桂去粗皮半夏湯煮軟切焙乾甘草炙阿膠炒至沸陳橘皮湯浸去白各三兩上一十四味同搗羅為末煮糯米粉並黃蠟一兩成粥更入蜜再熬勻和前藥如櫻桃大每服一丸同生姜細嚼下嗽時服咳嗽膿血服之大效治積年咳嗽唾膿血喘急不得臥款冬花丸方款冬花石斛去根紫菀去苗土細辛去苗葉防風去叉芎藭人參當歸切焙藁本去苗土甘草炙銼蜀椒去目並閉口炒出汗白朮銼天雄炮裂去皮臍菖蒲切麻黃去根節湯煮掠出沫各二兩半夏湯洗七遍去滑焙生薑汁製二兩桂去粗皮獨活去蘆頭銼各半兩芫花醋浸炒乾鍾乳粉研桃仁湯浸去皮尖雙仁研各二兩上二十一味除別研外搗羅為末和勻煉蜜和丸如梧桐子大每服二十丸煎桑根白皮湯下日三夜一治咳嗽唾膿血及肺痿羸瘦涎涕稠黏蛤蚧丸方蛤蚧二對塗酥炙人參蕓薹子桔梗炒知母焙紫蘇莖葉豬牙皂莢酥炙鱉甲去裙襴醋炙檳榔銼白前各一兩半柴胡去苗二兩防己杏仁湯去皮尖雙仁炒羚羊角鎊郁李仁炒去皮紫菀去苗土豬苓去黑皮各一兩半甜葶藶隔紙炒半兩上一十八味搗羅為末煉蜜和丸如梧桐子大每服十丸至十五丸食後煎人參湯下日三治咳嗽上喘唾膿血胸膈不利咽喉腫痛百部丸方百部焙款冬花去梗天門冬切焙貝母去心桔梗炒紫菀去苗土各半兩上六味搗羅為末煉蜜和丸如梧桐子大每服二十丸甘草烏梅湯下食後臨臥服治咳唾膿血款冬花湯方款冬花一兩不蚛皂莢一挺去黑皮酥炙杏仁湯浸去皮尖雙仁麩炒二兩黃明膠炙令燥一片甘草炙銼貝母去心各一兩知母焙半兩麻黃去根節湯煮掠去沫三兩上八味粗搗篩每服三錢匕水