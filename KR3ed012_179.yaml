body:
  text: 卷第一百七十九小兒下痢煩渴論曰小兒腸胃虛弱水穀不分冷熱相交赤白相雜痢久不瘥則津液少而內煩虛陽上燥於胸膈故引飲而渴小便利者為欲愈小便不利者則濕歸胃土土氣衰弱不能制濕散溢皮膚而為胕腫久變水病治小兒下痢兼渴不止黃芩飲方黃芩去黑心栝蔞根黃連去須各三分烏梅肉一分焙訶黎勒煨去核樗皮炙各半兩當歸切焙三分上七味粗搗篩每服一錢匕水一小盞煎至五分去滓分溫徐徐令服更看兒大小以意加減治小兒痢渴不止甘草飲方甘草炙一分烏梅肉焙一分訶黎勒煨去核三枚上三味粗搗篩每服一錢匕水一小盞入生薑二片棗一枚擘破同煎至五分去滓徐徐溫服隨兒大小以意增減治小兒下痢虛熱煩渴知母飲方知母焙半兩栝蔞根黃連去須麥門冬去心焙各三分糯米炒半合蘆根銼半兩上六味粗搗篩每服一錢匕水六分煎至四分去滓溫服量兒大小加減治小兒下痢兼渴不止烏梅飲方烏梅去核焙三枚白茯苓去黑皮乾木瓜各一兩上三味粗搗篩每服一錢匕水六分煎四分去滓溫服量兒大小增減服治小兒下痢不止煩渴引飲栝蔞湯方栝蔞根一兩半銼冬瓜絞汁白茯苓去黑皮麥門冬去心焙知母焙各一兩粟米一合上六味除冬瓜外粗搗篩一二歲兒每服一錢匕水六分煎至四分去滓入冬瓜汁半合若渴即徐徐飲服隨兒大小以意加減治小兒熱痢煩渴茅根飲方茅根龍骨白茯苓去黑皮各三分人參半兩麥門冬去心焙三分厚朴去粗皮生薑汁炙一分上六味粗搗篩每服一錢匕水一盞煎至七分去滓分作二服令溫徐徐服量兒大小以意增減治小兒下痢兼渴櫸皮散方櫸皮炙一兩栝蔞根銼白茯苓去黑皮各三分人參半兩上四味搗羅為散每服半錢匕粟米飲調下徐徐令服隨兒大小增減治小兒下痢渴不徹腹脹不能食訶黎勒煮湯方訶黎勒煨去核一兩半桑葉二兩半切上二味㕮咀如麻豆每服一錢匕水一小盞煎至五分去滓分溫徐徐服量兒大小以意增減治小兒疳痢不知行數手足逆冷或下鮮血渴不止龍膽丸方龍膽地龍糞炒令乾烏梅去核炒令乾龍骨各一兩黃連去須二分上五味搗羅為末煉蜜為丸如麻子大一二歲兒每服三丸三五歲兒五丸並用新汲水下食後服日三隨兒大小以意增減治小兒久痢煩渴黃耆湯方黃耆銼人參各一兩上二味粗搗篩一二歲兒每一錢匕水一小盞煎至五分去滓分溫二服空心午後各一服隨兒大小以意加減治小兒久痢及腹痛兼渴人參湯方人參桔梗炒各半兩當歸切焙三分烏梅去核焙二枚艾葉微炙黃耆銼各半兩上六味粗搗篩一二歲兒每服一錢匕水半盞入生薑二片同煎至三分去滓分溫二服空心午後各一服更隨兒大小以意增減治小兒但渴多熱痢不止黑豆飲方黑豆炒令微熟半合甘草炙銼碎半兩上二味一處用水二盞同煎至一盞去滓分溫五服徐徐飲之治小兒夏秋患痢後渴不止變作疳人參飲方人參龍骨地龍糞各半兩烏梅七枚去核炒乾上四味粗搗篩一二歲兒每服半錢匕水七分一盞煎至四分去滓分為二服空心午後各一服更隨兒大小以意增減治小兒大熱痢兼渴增損黃柏湯方黃柏去粗皮炙半兩黃芩去黑心一兩枳殼去瓤麩炒半兩石膏先搗羅為末一兩櫸皮炙一兩一分竹葉人參各半兩上七味銼如麻豆一歲兒每服一錢匕水七分一盞煎至四分去滓分溫二服空心午後各一服量兒大小加減服之治小兒有熱不調渴痢不止栝蔞湯方栝蔞根銼一兩知母焙三分赤茯苓去黑皮半兩黃芩去黑心一兩甘草炙半兩人參三分黃柏去粗皮炙半兩上七味粗搗篩一二歲兒每一錢匕水七分煎至四分去滓分溫二服空心午後各一服量兒大小加減服治小兒渴痢黃耆飲方黃耆銼炒白茯苓去黑皮麥門冬去心焙黃芩去黑心各三分高良薑炮一分烏梅肉焙二枚去核白朮銼半兩上七味粗搗篩每服二錢匕水八分一盞煎去滓取三分空腹溫服治小兒渴痢不止壯熱黃連湯方黃連去須犀角屑甘草炙銼阿膠炙令燥各半兩烏梅二枚焙去核藍葉一分黃芩去黑心三分上七味粗搗篩每服三錢匕水一盞煎去滓取三分空腹溫服治小兒下痢煩渴胕腫桃皮湯方白桃皮黃連去須炒龍骨各一兩丁香一十四粒上四味粗搗篩每服三錢匕水一盞半煎至八分去滓分溫三服小兒胃風腹脹泄痢論曰小兒肌膚腸胃脆弱若解脫不時風邪易侵客於肌肉搏於胃經則為胃風其狀腹善滿食寒則泄診形瘦而腹大蓋足陽明胃之經其支者起胃下口循腹裡下至氣衝故風冷入中則腹善脹大又胃為水穀之海得寒則食物不化氣血虧損故泄痢而形瘦也治小兒胃風泄痢腹脹腸鳴胃風湯方人參白茯苓去黑皮芎藭桂去粗皮當歸切焙白芍藥白朮各一兩上七味粗搗篩每服一錢匕水七分盞入粟米半匙煎取三分去滓溫服空心食前日二更量兒大小加減治小兒胃風腹脹下痢黃耆湯方黃耆銼芎藭乾薑炮人參黃芩去黑心當歸切焙甘草炙銼各半兩桂去粗皮一分上八味粗搗篩每服一錢匕以水七分煎取四分去滓溫服量兒大小增減治小兒腸胃怯弱風冷入乘泄瀉飲食全少漸至羸瘦木香湯方木香白朮乾薑炮裂銼各一分厚朴去粗皮塗生薑汁炙令香熟龍骨當歸訶黎勒煨用皮各半兩上七味粗搗篩每服一錢匕以水七分入棗二枚擘破同煎至四分去滓食前量兒大小分減溫服治小兒胃風泄瀉兩脅虛脹腹痛不欲飲食訶黎勒散方訶黎勒煨用皮厚朴去粗皮塗生薑汁炙令香熟枳殼麩炒微黃去瓤當歸銼微炒赤芍藥各等分上五味搗羅為散每服半錢匕米飲調下日三更量小兒大小加減服之治小兒胃風腹脹得冷則泄痢訶黎勒湯方訶黎勒煨用皮當歸銼微炒黃連去須銼微炒各一兩甘草炙微赤銼木香乾薑炮裂各半兩上六味粗搗篩每服一錢匕以水七分煎至四分去滓放溫不計時候量兒大小分減服之治小兒腸胃風冷泄痢水穀腹脅脹滿不欲飲厚朴散方厚朴去粗皮塗生薑汁炙令香熟黃連去須微炒各半兩丁香肉豆蔻去殼當歸銼微炒木香龍骨白朮各一分上八味搗羅為散每服半錢匕以粥飲調下食前服日三量兒大小加減服之治小兒胃風腹脹泄痢脾胃氣不和羸瘦食少厚朴散方厚朴去粗皮塗生薑汁炙令香熟人參各三分肉豆蔻去殼一枚乾薑炮裂銼半兩訶黎勒煨用皮白朮黃連去須微炒地榆微炙銼各一分甘草炙微赤銼半分上九味搗羅為散每服以粥飲調下半錢匕食前日三四服量兒大小以意加減治小兒胃風下痢水穀不止羸瘦腹脹不欲飲食調中湯方厚朴去粗皮塗生薑汁炙令香熟黃連去須微炒各一兩木香半兩上三味粗搗篩每服一錢匕水七分煎至四分去滓不計時候量兒大小分減服之治小兒胃風泄痢不止腹脹羸瘦白朮湯方白朮三分赤茯苓去黑皮人參各一兩當歸切焙半兩厚朴去粗皮塗生薑汁炙令香熟半兩上五味粗搗篩每服一錢匕水半盞入生薑二片煎至三分去滓帶熱服至夜三四服隨兒大小以意增減小兒洞泄注下論曰小兒下痢不止食已即泄名為洞泄注下此由風邪客於腸胃所致蓋方春之時為風冷所傷藏在肌肉至長夏陰氣方盛或因飲食居處不慎覆被風冷入於腸胃其病下利冷盛則重故為洞泄注下俗謂之水穀痢是也病本於風若甚則變胃風證治小兒洞泄不止草豆蔻湯方草豆蔻二枚去皮高良薑人參甘草乾木瓜銼各一分白茯苓去黑皮桔梗炒各半兩上七味粗搗篩每服一錢半水七分生薑一片同煎至四分去滓分溫三服乳食前各一更量兒大小加減治小兒風冷乘虛入客腸胃水穀不化泄瀉注下腹脅虛滿腸鳴㽲痛胃風湯方人參白茯苓去黑皮芎藭桂去粗皮當歸切焙白芍藥白朮各一兩上七味粗搗篩每服一錢匕水半盞入粟米少許同煎至三分去滓空心食前熱服更量兒大小加減治小兒洞泄注下水穀不分粱米湯方粱米稻米黍米各三分蠟如半彈丸上四味以東流水二升煮粱米三沸去滓留汁煮稻米三沸去滓復以汁煮黍米三沸去滓置蠟於汁中和之候蠟消放溫每以半合分為二服空心午後各一更量兒大小加減治小兒洞泄不調人參茯苓湯方人參赤茯苓去黑皮各一兩半枳殼去瓤麩炒甘草炙各一兩黃苓去黑心二兩櫸皮二兩半梁州者佳上六味粗搗篩一二歲兒每服一錢匕水五分盞煎至三分去滓分溫二服空心午後各一兒大者稍增之治小兒洞痢晝夜不止乾薑丸方乾薑炮人參黃芩去黑心各半兩上三味搗羅為末煉蜜丸如緑豆大每服三丸米飲下空心日午夜臥各一更量兒大小加減治小兒泄痢不止厚朴湯方厚朴去粗皮生薑汁炙黃連去須各一兩上二味粗搗篩一二歲兒每服一錢匕水七分盞入生薑二片煎至四分去滓分溫二服空心午後各一更量兒大小加減治小兒春夏秋冬晨夕暴冷折其四肢熱不得泄發為壯熱冷氣入胃洞泄下痢或赤白頻數小腹脹痛脈洪大或數者調中葛根湯方葛根銼黃芩去黑心芍藥白朮藁本去苗土甘草炙銼各一分赤茯苓去黑皮半兩大黃銼炒一兩上八味粗搗篩一歲以下兒每服一錢匕水七分盞煎至四分去滓分溫三服食前日三更量兒大小增減治小兒脾胃冷氣洞泄注下腹痛嘔逆腸鳴脹滿大便青白大安丸方木香訶黎勒皮人參白茯苓去黑皮各半兩陳橘皮湯浸去白焙厚朴去粗皮生薑汁炙白朮烏藥各一兩上八味搗羅為末煉蜜丸如雞頭大每服一丸溫米飲化下歲數小者半丸治小兒洞泄心腹脹痛不思奶食和胃氣香橘丸方陳橘皮湯浸去白焙二兩丁香訶黎勒皮甘草炙青橘皮湯浸去白焙各半兩上五味搗羅為末煉蜜丸如梧桐子大每服一丸生薑湯化下三歲以上二丸治小兒洞泄不止草節丸方無食子肉豆蔻去殼各一枚吳茱萸湯洗焙乾炒黃連去須炒乾薑炮訶黎勒炮去核各一錢上六味搗羅為末湯浸蒸餅心和丸如緑豆大每服五丸草節湯下乳食前服更量兒大小加減治小兒洞泄下痢壯熱兼渴增損黃芩湯方黃芩去黑心枳殼去瓤麩炒櫸皮銼甘草炙銼黃柏去粗皮炙銼各一兩女萎石膏碎栝蔞根竹葉切各一兩半赤茯苓去黑皮一兩三分上一十味粗搗篩每服一錢匕水七分煎至四分去滓分溫二服空心晚後各一更量兒大小加減治小兒腸胃虛寒洞泄下痢腹痛香連丸方黃連去須炒半兩乾薑炮吳茱萸湯浸焙乾炒各一分肉豆蔻去殼二枚草豆蔻去皮一枚上五味搗羅為末燒粟米飯和丸如緑豆大每服七丸乳食前米飲下更量兒大小加減治小兒泄痢不止進食和氣木香豆蔻丸方木香草豆蔻去皮檳榔銼陳橘皮湯浸去白焙青橘皮湯浸去白焙各一兩京三稜煨搗碎四兩肉豆蔻去殼五枚上七味搗羅為末麵糊丸如小豆大每服五丸至七丸棗湯下更量兒大小加減治小兒洞泄不止豆蔻丸方草豆蔻三枚去皮烏頭三枚銼鹽水浸少時炒益智去皮青橘皮湯浸去白焙各一分上四味搗羅為末生薑汁煮麵糊丸如緑豆大每服七丸煎木瓜湯或生薑湯下乳食前服更量兒加減治小兒洞泄日夜數十行附子丸方附子炮裂去皮臍一枚訶黎勒皮一枚白礬三分燒令汁盡甘草炙半兩上四味搗羅為末飯丸如梧桐子大每服三丸至五丸空腹米飲研下治小兒洞泄白石脂丸方白石脂厚朴去粗皮生薑汁炙當歸銼炒各一兩乾薑炮赤石脂訶黎勒皮各三分陳橘皮去白焙半兩上七味搗羅為末飯丸如梧桐子大每服五丸空腹米飲下治小兒忽洞泄不止黃連湯方黃連去須一兩上一味粗搗篩用漿水三盞煎至一盞去滓分溫四服空心食前一日服