胡去苗木香青蒿去莖生乾地黃焙各一兩黃連去須炒二兩青橘皮去白焙半兩上七味搗羅為末用一枝嫩小豬肚淨洗入藥末在內系定蒸令極爛研和藥末丸如緑豆大每服十丸溫水下食前日午臨臥日三更看兒大小加減治小兒盜汗肌熱青蒿煎丸方青蒿切一斤甘草炙銼為末杏仁湯浸去皮尖雙仁炒研各一兩鱉甲去裙襴醋炙為末一兩半柴胡去苗為末一兩白蜜二分上六味用童子小便五升先煎青蒿取一升去滓更煎令如稀餳入酥少許及蜜諸藥末等熬成煎丸如緑豆大每服十五丸至二十丸空心熟水下更量兒大小加減治小兒骨蒸壯熱肌肉減瘦多困少力夜多盜汗地骨皮湯方地骨皮秦艽去苗土柴胡去苗枳殼去瓤麩炒知母焙當歸切焙鱉甲去裙襴醋炙上七味等分粗搗篩每服一錢半匕水八分入桃柳心各五枚姜二片烏梅半枚同煎至四分去滓溫服空心臨臥各一五歲以下分作二服治小兒骨蒸肌瘦盜汗鱉甲柴胡煎丸方鱉甲九肋者一枚去裙襴醋炙柴胡去苗二兩甘草炙杏仁湯浸去皮尖雙仁研桔梗炒各一兩胡黃連一分當歸切焙地骨皮赤芍藥各一兩木香半兩黃連去須一分桂去粗皮半兩人參一兩麝香少許研酥蜜各三兩上一十六味除酥蜜外搗研為末用青蒿一斤銼童子小便五升好酒一升熬蒿至二升去蒿入酥蜜再熬成煎候冷入藥末和丸如緑豆大每服十丸米飲下日二服如秋冬合時更入桃柳心各七枚宜與後方柴胡人參湯相間服治小兒骨熱盜汗肌瘦減食柴胡人參湯方柴胡去苗人參白茯苓去黑皮當歸切桔梗青橘皮去白芍藥芎藭麥門冬去心白朮升麻桑根白皮甘草各一兩上一十三味並生銼如麻豆大每服二錢匕水一盞煎至六分去滓分溫二服食後臨臥與前鱉甲柴胡煎丸相間服速效治小兒盜汗潮熱往來重湯丸方胡黃連柴胡去苗等分上二味搗羅為末煉蜜和丸如雞頭實每服二丸至三丸銀器內用酒少許化開更入水五分重湯上煮三二十沸放溫食後服量兒大小加減治小兒肌熱盜汗丹砂散方丹砂研一兩白礬熬汁枯研二錢上二味再同研勻細每服半錢匕薄荷自然汁調下治小兒心熱盜汗芎藭湯方芎藭大黃煨銼羌活去蘆頭甘草炙銼各一兩上四味粗搗篩每服二錢匕水一中盞入薄荷數葉同煎至六分去滓分溫二服量兒大小加減治小兒盜汗黃連散方黃連去須三分牡蠣燒研如粉貝母去心各半兩上三味搗研為末以米粉一升相和令勻如有汗粉兒身治小兒盜汗麻黃根散方麻黃根雷丸牡蠣火煅過各一兩半甘草炙一兩乾薑炮半兩粱米半升上六味搗羅為散以粉兒身體及頭甚驗小兒吐血論曰小兒陽氣盛壯上焦有熱伏於肝心二臟播流脈中血得熱則妄行下入胃中胃受之則脹滿與氣俱上衝擊故令吐血治小兒心肺熱吐血黃連飲方黃連去須一兩豉二百粒上二味將黃連粗搗篩每服半錢匕水七分入豉二十粒同煎取三分去滓溫服日三更量大小加減治小兒吐血不定方刺薊自然汁不計多少朴硝半兩上二味先研朴硝為末二百日兒及晬兒每服用刺薊汁調朴硝末一字至半錢匕日再服更量大小加減治小兒吐血大黃湯方大黃銼炒黃芩去黑心各一分上二味粗搗篩三四歲兒每服一錢匕水七分入黑豆三十粒同煎至四分去滓溫服日三更量大小加減治小兒積熱攻肺猝吐血方飛羅面二兩生地黃汁二盞上二味相和勻曝乾研為末每服半錢匕新汲水調下日三隨兒大小加減又方刺薊花曝乾不拘多少上一味搗羅為末每用黃牛乳調下一錢匕日三治小兒吐血地黃飲方地黃一升研取自然汁上一味一歲兒服半合二三歲每服一合量兒大小增減日三又方蛇蛻皮燒灰研細上一味乳汁調下一字匕日三服隨大小加減小兒鼻衄論曰小兒體本挾熱舍於經絡血脈揚溢則為鼻衄蓋血與氣循行經脈通於腑臟邪熱乘血血得熱則妄行隨氣上益出於鼻者為鼻衄血虛受熱散漫失度出於七竅者為大衄治小兒中熱積驚及時疾後鼻衄玉屑散方寒水石研馬牙硝研各一分貝母去心知母各一分半荷葉一兩水煮七沸焙乾上五味搗研為細散每服半錢匕蜜水調下食後治小兒鼻衄地黃煎方生地黃汁刺薊汁各二盞杏仁湯浸去皮尖及雙仁麩炒黃研一兩阿膠炙令燥碾為末半兩上四味同入銀器中慢火熬為煎每服一錢匕新汲水化下不計時候量兒大小加減治小兒猝熱毒氣攻腦鼻中衄血不止梔子散方梔子仁一兩一半生用一半微炒槐花半兩生用上二味搗羅為細散每服半錢匕加至一錢熟水調下日三量兒大小加減治小兒陽毒煩躁吐血衄血漸生赤斑絳雪丹方丹砂研半兩焰硝研一兩上二味各研令細再同研煉蜜和丸如梧桐子大每服一丸沙糖水調化服取下涎即安治小兒鼻衄不止刺薊散方刺薊焙蒲黃各半兩亂髮燒灰一分上三味搗羅為細散每服半錢匕以新汲水調下不計時候量兒大小加減
