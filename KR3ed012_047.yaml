body:
  text: 卷第四十七胃門胃虛冷論曰足陽明胃之經與足太陰為表裡其氣喜溫而惡寒得溫則能變化水穀若其氣不足寒冷之氣乘之則令脛寒不得臥惡風灑灑目急腹中常痛兩脅虛脹善鳴時寒時熱唇口乾面目浮腫食飲不下皆胃虛冷故也治胃氣虛冷不思飲食硇砂丸方硇砂研二兩陳橘皮湯浸去白焙桂去粗皮乾薑炮當歸切焙厚朴去粗皮生薑汁炙芎藭胡椒縮砂去皮甘草炙銼附子炮裂去皮臍各四兩白朮三兩五味子一兩半阿魏研半兩青鹽研二兩上一十五味除別研外搗羅為末用銀石鍋入好酒一升白蜜一十兩先下硇砂阿魏青鹽三味並好面一兩同煎煮稀稠成糊入藥末和成劑搗丸如梧桐子大每服二十丸生薑鹽湯下不拘時治胃氣虛冷腹脹食減四肢少力丁香丸方丁香半兩厚朴去粗皮生薑汁炙一兩乾薑炮半兩吳茱萸湯洙焙炒半兩干青橘皮湯浸去白焙一兩桃仁去皮尖雙仁炒一兩五味子訶黎勒去核檳榔銼各半兩木香一分上一十味搗羅為細末煮棗肉丸如緑豆大每服十丸橘皮湯下不拘時服治胃氣虛冷不思飲食及冷氣攻腹脅疼痛四肢少力口吐酸水吃食無味沉香湯方沉香一兩銼白豆蔻去皮一兩青橘皮湯浸去白焙一兩半高良薑半兩桂去粗皮一兩檳榔銼吳茱萸湯洗焙乾炒厚朴去粗皮生汁炙各三分上八味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不計時候治胃氣虛冷肌瘦少力不思飲食厚朴丸方厚朴去粗皮生薑汁炙陳橘皮湯浸去白焙訶黎勒去核桂去粗皮附子炮裂去皮臍乾薑炮白茯苓去黑皮甘草炙各一兩上八味搗羅為細末煉蜜和丸如梧桐子大每服二十丸溫米飲下治胃氣虛冷不思飲食脅肋脹滿胸膈不快臟腑不利烏頭湯方烏頭炮裂去皮臍三兩益智去皮炒三兩青橘皮湯浸去白焙一兩半木香訶黎勒去核各半兩山芋二兩粟米五兩白鹽炒一兩上八味粗搗篩每服三錢匕水一盞煎至七分去滓溫服食前治胃氣虛冷臍腹疼痛或滑泄下利不思飲食厚朴丸方厚朴去粗皮薑汁炙一兩乾薑炮二兩附子炮裂去皮臍一兩訶黎勒煨三分白朮銼一兩上五味搗羅為細末醋煮麵糊和丸如梧桐子大每服二十丸加至三十丸空心食前米飲下日三治胃氣虛冷腹脅脹滿痰逆不思飲食順氣湯方厚朴去末薑汁製薑餅炙半兩乾薑炮半兩甘草炙陳皮白朮半夏各一兩上六味粗搗篩每服三錢匕水一中盞入生薑三片棗一枚劈煎至七分去滓溫服不計時候治胃氣虛冷腹脹減食訶黎勒湯方訶黎勒五枚炮去核大腹銼五枚草豆蔻去皮一十四枚甘草炙白朮人參各半兩上六味粗搗篩每服三錢匕水一盞入生薑三片棗一枚劈同煎至七分去滓食前溫服治胃氣虛冷大便滑泄臍腹多痛蓽茇丸方蓽茇高良薑肉豆蔻去殼桂去粗皮縮砂去皮附子炮裂去皮臍白朮銼胡椒訶黎勒炮去核各一兩上九味搗羅為細末煉蜜丸如梧桐子大每服二十丸粟米飲下空心食前治胃中虛冷惡寒灑灑臥而不寐補胃煮散方細辛去苗葉一兩半柏子仁人參芎藭銼各一兩防風去叉桂去粗皮陳橘皮湯浸去白焙各半兩甘草炮吳茱萸漿水浸一宿淘焙乾炒各新水三分上九味搗羅為細散每服二錢匕水七分煎沸通口服治胃中虛冷霍亂吐瀉煩熱發渴或下利赤白丁香湯方丁香皮銼二兩白朮銼四兩甘草炙一兩乾薑炮半兩枇杷葉拭去毛二七片草豆蔻去皮五枚上六味粗搗篩每服三錢匕水一盞生薑三片同煎至七分去滓食前溫服治胃冷嘔逆厚朴湯方厚朴去粗皮塗生薑汁炙一兩白朮桂去粗皮各三分桃仁去皮尖雙仁麩炒丁香各半兩上五味粗搗篩每服三錢匕水一盞煎至七分入醋數滴去滓熱呷治胃寒胸膈虛滿面目浮腫飲食不化丁香湯方丁香藿香葉附子炮裂去皮臍各一分乾薑炮半分上四味銼碎用水一升煎取五合去滓徐徐呷盡治五飲酒癖忪悸動氣心下痞滿嘔逆吞酸背寒中冷身體寒戰心腹注痛不思飲食腹內虛鳴便往滑利胃虛氣弱心下有冷痰者最宜服餌新法半夏散方舊名湯生薑切作片子鹽醃一宿焙乾稱十二兩甘草八兩炙銼陳曲二十四兩炒草豆蔻去皮三兩陳橘皮湯浸去白三兩丁香二兩半夏曲一兩半上七味搗羅為散每服三錢匕入鹽少許沸湯點服不計時候治胃虛冷中脘氣滿不能傳化善飢不能食溫胃煮散方人參末二錢生附子末半錢生薑一分切碎上三味和勻用水七合煎至二合以雞子一枚取清打轉空心頓服治胃氣冷不思食人參附子湯方人參一兩附子炮裂去皮臍一兩桂去粗皮一兩乾薑炮三分甘草炙一分半半夏湯洗七遍焙一兩枳殼去瓤麩炒丁香陳橘皮去白炒白朮草豆蔻去皮各一兩上一十一味銼如麻豆每服三錢匕生薑如錢大二片水一盞煎至七分去滓溫服治胃冷不思食痰逆多吐茯苓湯方白茯苓去黑皮一兩半夏湯洗七遍焙一兩人參一兩陳橘皮湯去白焙一兩半丁香半兩木香半兩白朮一兩草豆蔻去皮二兩檳榔銼半兩桂去粗皮三錢厚朴去粗皮生薑汁炙一兩半枳殼去瓤麩炒半兩上一十二味銼如麻豆大每服三錢匕水一盞煎至七分不拘時去滓溫服治胃虛冷嘔逆豆蔻湯方草豆蔻去皮一兩半桂去粗皮生薑去皮切附子炮裂去臍皮各三分乾草炙銼丁香各半兩上六味細銼每服五錢匕水一盞半棗一枚劈破同煎至八分去滓溫服治胃冷嘔逆氣厥不通丁香湯方丁香母三粒椎碎陳橘皮一枚全者湯浸去白焙上二味用水一盞煎取半盞去滓熱呷胃實熱論曰胃氣盛實則壅澀不宣蘊積生熱令人口乾煩渴面目悉黃譫妄狂越身熱多汗腹脅堅滿大便祕難皆其證也治胃氣實熱唇焦口乾引飲不止赤芍藥湯方赤芍藥生乾地黃焙各一兩大黃銼炒草炙各半兩上四味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日再治胃氣實熱口舌乾燥頭痛煩渴黃芩湯方黃芩去黑心柴胡去苗各一兩葛根銼赤芍藥各三分甘草炙半兩石膏碎二兩上六味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治胃氣實熱煩躁多渴黃連丸方黃連去須赤茯苓去黑皮各三分麥門冬去心焙一兩苦參半兩上四味搗羅為末煉蜜丸如梧桐子大每服二十丸食後臨臥煎竹葉湯下治胃氣實熱頭痛寒熱狀如溫瘧唇口乾燥黃芩梔子湯方黃芩去黑心梔子仁犀角鎊赤茯苓去黑皮射干各一兩大黃銼炒半兩上六味粗搗篩每服五錢匕水二盞煎至一盞次入生地黃汁半合蜜一匙攪勻更煎數沸去滓食後溫服治胃氣實熱唇口乾燥頭昏體倦五心煩熱地骨皮湯方地骨皮二兩防風去叉甘草炙各一兩上三味粗搗篩每服三錢匕水一盞半煎至一盞去滓食後溫服治胃實熱嘔噦吐逆不食頭痛煩渴犀角飲方犀角鎊枇杷葉炙去毛葛根銼麥門冬去心焙各一兩上四味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治胃實熱氣盛消穀善飢頭目昏痛衄血煩渴黃連丸方黃連去須栝蔞根麥門冬去心焙知母焙茯神去木各一兩上五味搗羅為末煉蜜丸如梧桐子大每服三十丸溫熟水下不拘時治胃實熱煩渴咽乾吐逆葛根湯方葛根銼十兩甘草炙三兩半夏二兩生薑汁升同煮軟半盞漿水半切焙乾黃連去須一兩上四味粗搗篩每服三錢匕水一盞生薑二片竹茹少許同煎至七分去滓溫服不拘時治胃實熱乾嘔煩悶目黃燥渴前胡湯方前胡去蘆頭一兩半茅根銼二兩麥門冬去心焙甘草炙各一兩黃芩去黑心半兩上五味粗搗篩每服二錢匕水一盞煎至七分去滓溫服不拘時治胃實熱升麻梔子湯方升麻銼梔子仁射干赤茯苓去黑皮各三兩白朮五兩芍藥四兩上六味㕮咀如麻豆大每服五錢匕水一盞煎至八分入地黃汁一合赤蜜一匙更煎一二沸去滓溫服治胃中實熱吐逆心煩不下食飲薑蜜飲方生薑半兩取自然汁白蜜一合糯米半合淘淨細研上三味和勻入新汲水一盞調開分二服不拘時治胃氣盛實壅澀不宣蘊積為熱口乾煩渴地黃飲方生地黃汁生薑汁藕節汁生蜜各二合上四味調和令勻分作三服不拘時候治胃腑實熱發渴飲水漿不止茯神飲方茯神去木一兩栝蔞根麥門冬去心焙各二兩半葳蕤知母焙各二兩上五味粗搗篩每服先以水三盞煮小麥一合淡竹葉一合十餘沸去滓然後下藥末五錢匕生地黃半分切棗三枚劈破同煎至一盞去滓溫呷治胃氣實熱苦頭痛汗不出口中乾燥通熱湯方人參二兩白茯苓去黑皮一兩甘草炙一分柴胡去苗一兩葛根銼一兩麻黃去根節一兩黃芩去黑心半兩石膏碎三兩五加皮銼半兩上九味粗搗篩每服三錢匕水一盞生薑三片煎取七分去滓溫服食亦論曰內經曰大腸移熱於胃善食而瘦謂之食亦胃移熱於膽亦曰食亦夫胃為水穀之海所以化氣味而為營衛者也胃氣衝和則食飲有節氣血盛而膚革充盈若乃胃受邪熱消鑠穀氣不能變精血故善食而瘦也病名食亦言雖能食亦若飢也胃移熱於膽亦曰食亦以膽為陽木熱氣乘之則鑠土而消穀也治胃中結熱消穀善食不生肌肉參苓丸方人參赤茯苓去黑皮菖蒲遠志去心地骨皮牛膝酒浸切焙各一兩上六味為細末煉蜜和丸如梧桐子大每服二十丸溫水飲下日三不拘時治胃熱善食而瘦龍膽湯方龍膽黃連去須木通銼柴胡去苗麥門冬去心焙人參各一兩陳橘皮去白焙黃芩去黑心各半兩上八味粗搗篩每服三錢匕以水一盞煎取七分去滓溫服食後日二治胃熱善食不生肌甘露飲方生乾地黃焙熟乾地黃焙天門冬去心焙麥門冬去心焙枇杷葉去毛黃芩去黑心石斛去根甘草炙銼枳殼去瓤麩炒山茵陳各一兩上一十味粗搗篩每服三錢匕水一盞煎取七分去滓食後溫服日二治胃熱消穀善飢不為肌膚沉香湯方沉香人參麥門冬去心地骨皮生乾地黃焙小草甘草炙各一兩上七味粗搗篩每服五錢匕水一盞半同煎至八分去滓溫服日三不拘時治胃熱消穀善飢不生肌肉病名食亦升麻湯方升麻梔子仁射干赤茯苓去黑皮各三兩芍藥四兩白朮五兩生地黃汁蜜各一升上八味㕮咀六味如麻豆大每服五錢匕以水一盞半煎取一盞去滓下地黃汁半合再煎兩沸次下蜜半匙共煎取一盞溫服老小以意加減治胃熱善食而瘦病名食亦乾地黃湯方生乾地黃麥門冬去心焙栝蔞根各三兩甘草炙銼枳殼去瓤麩炒黃芩去黑心各一兩上六味粗搗篩每服五錢匕水一盞半煎至七分去滓溫服日二三胃反論曰脾與胃合主腐熟水穀今脾胃氣虛水穀不化與停飲相擊胃中虛脹其氣逆上食久反出故名胃反也其候朝食暮吐暮食朝吐寒熱時作心下痞結狀如覆杯治胃反吐逆不止心膈不利飲食減少生薑散方生薑切炒三兩蓬莪朮銼炒一兩陳橘皮湯浸去白炒甘草銼炒各二兩上四味搗羅為散每服一錢匕入鹽少許沸湯點服治胃反食下便吐人參湯方人參澤瀉甘草炙桂去粗皮各二兩陳橘皮湯浸去白切炒乾薑炮各一兩赤茯苓去黑皮四兩青竹茹三兩大黃銼炒二兩上九味粗搗篩每服五錢匕水二盞煎至一盞去滓溫服日三夜一治反胃吐逆虛氣上攻心疼腹痛多吐酸水藿香丸方藿香葉木香各一兩半半夏湯洗去滑二兩丁香檳榔銼各三分白朮一兩蓽澄茄紅豆蔻去皮各半兩上八味搗羅為末酒煮麵糊和丸梧桐子大每服二十丸橘皮湯下不拘時候治胃反噁心粥藥不下鎮脾散方京三稜炮一兩半丁香三分上二味搗羅為散每服一錢匕沸湯點不拘時候治反胃吐食日久不止大腸結燥丹砂丸方丹砂研鉛丹研陳橘皮去白炒各半兩半夏湯洗七遍去滑焙厚朴去粗皮生薑汁炙麥糵炒陳曲焙代