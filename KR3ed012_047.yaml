計時候治胃寒腸熱腹脹泄利香橘丸方丁香皮六錢青橘皮去白焙半兩硇砂研細水飛一分木香京三稜炮銼蓬莪朮炮銼縮砂仁桂去粗皮陳橘皮去白焙各半兩巴豆二十二枚和皮同烏梅一處搗令勻爛烏梅和核用二兩上一十一味搗羅為末麵糊和丸如緑豆大每服十五丸溫生薑橘皮湯下食後服治胃寒腸熱腹脹泄利當歸黃連丸方當歸銼焙黃連去須各二兩木香吳茱萸湯洗焙乾炒赤茯苓去黑皮厚朴去粗皮生薑汁炙訶黎勒炮去核各一兩上七味搗羅為末煉蜜和丸如梧桐子大每服三十丸食前米飲下日三治胃寒腸熱腹脹泄利大腹木香湯方大腹銼木香銼半夏湯洗七遍焙各二兩枳殼去瓤麩炒白朮銼前胡去蘆頭白芷銼桂去粗皮陳橘皮湯浸去白焙各一兩延胡索當歸切焙甘草炙銼旋覆花柴胡去苗芍藥各半兩乾薑炮人參各三分上一十七味粗搗篩每服三錢匕水一盞入生薑三片棗三枚劈破同煎至六分去滓稍熱食前服治胃寒腸熱腹脹泄利和胃丸方半夏湯洗十遍切作片子牽牛子炒各半分生薑一兩切作片子人參礬蝴蝶藿香葉各半兩丁香一錢上七味先將半夏牽牛生薑於銀石器內慢火煮候水盡焙乾與人參等藥同杵為末用生薑汁煮麵糊和丸如梧桐子大每服二十丸生薑米飲下空心食前治胃寒腸熱腹脹泄利調氣溫胃丸方半夏二兩湯洗七遍焙乾肉豆蔻去殼桂去粗皮人參各半兩訶黎勒皮高良薑各一分木香陳橘皮湯浸去白焙蜜棗肉各一兩生薑自然汁一盞入蜜棗熬為膏上一十一味將八味搗羅為末用薑蜜棗膏和丸如梧桐子大每服十丸米飲下生薑湯亦得治胃寒腸熱腹脹泄利厚朴丸方厚朴去粗皮薑汁炙一兩半龍骨訶黎勒去核乾薑炮附子炮裂去皮臍黃連去須白石脂吳茱萸湯洗焙乾炒各一兩上八味搗羅為末醋浸炊餅和丸如梧桐子大每服三十丸空心煎茱萸湯下米飲亦得日三治胃寒腸熱腹脹泄利妙應丸方烏頭去皮臍生用半兩梔子去皮一分乾薑生用一分上三味搗羅為末用生薑自然汁和丸如梧桐子大每服七丸溫酒下食前日二胃熱腸寒論曰黃帝針經曰腸胃相通疾病相連人因飲食不節寒溫失宜致腸胃受邪有冷有熱疾證俱見者則善飢小腹痛脹為胃熱腸寒之病胃熱則消穀故善飢腸寒則血凝脈急故小腹痛又寒則氣聚故痛而且脹治胃熱腸寒善飢小腹痛脹芍藥丸方芍藥人參赤茯苓去黑皮厚朴去粗皮薑汁炙各二兩陳橘皮湯浸去白焙木香桂去粗皮桔梗各一兩炒上八味為細末煉蜜和丸如梧桐子大每服二十丸食前米飲下日二治胃熱腸寒善食數飢小腹脹痛立通丸方京三稜炮銼黃連去須青橘皮湯浸去白焙蓬莪朮炮各一兩巴豆霜一分上五味為細末麵糊和丸如緑豆大每服五丸食後茶酒任下治胃熱腸寒食已善飢小腹痛脹沉香散方沉香銼白檀香銼烏藥銼山芋甘草炙銼白茯苓去黑皮京三稜炮銼前胡去蘆頭桔梗炒各一兩人參二兩上一十味搗羅為細散每服一錢匕入鹽少許沸湯點服不拘時治胃熱腸寒善食數飢少腹痛脹乾地黃湯方熟乾地黃人參白茯苓去黑皮麥門冬去心焙枇杷葉拭去毛地骨皮甘草炙銼石斛去根黃耆細銼上九味各等分粗搗篩每服一錢匕水一盞半煎至七分去滓一服不拘時治胃熱腸寒食已輒飢小腹痛脹調中湯方人參白茯苓去黑皮各十兩紫河車甘草各二兩生上四味粗搗篩每服三錢匕水一盞煎七分去滓空心食前溫服治胃熱腸寒食已復飢小腹痛脹京三稜煎丸方京三稜三兩杵末取二兩硇砂一兩飛過同三稜用米醋三升煎成膏當歸酒浸切焙大黃銼炒鱉甲去裙襴醋炙五靈脂炒木香沉香銼各半兩檳榔銼桂去粗皮乾漆炒令煙盡各三分沒藥馬藺花各一分蓬莪朮炮一兩上一十四味搗羅十二味為末入三稜前搜和丸如緑豆大每服七丸空心臨臥溫酒或鹽湯下治胃熱腸寒食已復飢小腹脹痛分氣黃耆湯方黃耆細銼半兩人參白朮白茯苓去黑皮京三稜銼各一兩芎藭陳橘皮湯去白焙麥門冬去心焙訶黎勒皮前胡去蘆頭桔梗炒柴胡去苗各半兩牡丹皮甘草炙銼芍藥各三分上一十五味粗搗篩每服三錢匕水一盞生薑二片煎至七分去滓溫服不拘時治胃熱腸寒食已復飢小腹脹痛前胡木香湯方前胡去蘆頭木香柴胡去苗秦艽去苗土桂去粗皮蘹香子炒各一兩檳榔三枚麵裹煨熟肉豆蔻去殼三枚芎藭甘草炙銼青橘皮湯浸去白焙甜葶藶隔紙炒各半兩上一十二味粗搗篩每服四錢匕水一盞半生薑三片煎至一盞去滓溫服治胃熱腸寒善食數飢少腹脹痛麥門冬湯方麥門冬去心焙甘草炙銼各二兩白茯苓去黑皮羌活去蘆頭旋覆花玄參白朮芍藥柴胡去苗人參升麻當歸切焙桑根白皮銼各一兩胡黃連一分熟乾地黃焙一兩半木香半兩上一十六味粗搗篩每服三錢匕水一盞入甘草一寸同煎至八分去滓溫服不拘時治胃熱腸寒冷熱不勻善食數飢入腹脹痛半夏湯方半夏湯洗七遍焙麥門冬去心焙人參白茯苓去黑皮桔梗炒青橘皮湯浸去白焙柴胡去苗防風去叉前胡去蘆頭細辛去苗葉白芷紫菀去土款冬花各一兩厚朴去粗皮生薑汁炙枳殼去瓤麩炒各一兩半上一十五味粗搗篩每服三錢匕水一盞半生薑三片煎至一盞去滓稍熱服
