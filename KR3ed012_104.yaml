body:
  text: 卷第一百四風毒沖目虛熱赤痛論曰風毒沖目之狀瞼眥赤腫癢悶難任隱澀羞明淚眵交下見風尤甚此由脾肺受風肝經不利不治則風邪熾盛傳而為熱多致連瞼赤爛宜速洗滌瘀爛清潔瞼膚兼餌以除風鎮肝之藥治風毒沖目虛熱赤痛甘菊花丸方菊花決明子車前子丹參防風去叉玄參蕤仁去皮升麻黃連去須黃芩去黑心大黃銼炒葳蕤細辛去苗葉甘草炙銼人參各一兩上一十五味搗羅為末煉蜜和丸如梧桐子大食後溫水下三十丸臨臥再服治風毒沖目虛熱赤痛羚羊角丸方羚羊角鎊防風去叉芍藥茯神去木蕤仁去皮麥門冬去心焙大黃銼炒地骨皮決明子甘草炙各一兩上一十味搗羅為末煉蜜和丸如梧桐子大食後溫水下三十丸臨臥再服治風毒沖目虛熱赤痛決明子丸方決明子一兩半防風去叉黃連去須各半兩車前子升麻黃芩去黑心大黃銼炒玄參葳蕤各一兩上九味搗羅為末煉蜜和丸如梧桐子大每服三十丸食後溫漿水下臨臥再服治風毒沖目虛熱赤痛甘菊花丸方甘菊花一兩決明子一兩半車前子二兩防風二兩去蘆頭蕤仁一兩半湯浸去皮黃連二兩去須川升麻一兩子芩一兩川大黃三兩銼炒玄參一兩葳蕤二兩上十一味搗羅為細末煉蜜和搗三二百杵丸如梧桐子大食後溫漿水下二十丸日三治風毒沖目赤痛暈翳不退宜點眼蕤仁散方蕤仁三分去皮細研膩粉半分龍腦半分上三味研令極細勻每早晚點之所忌酒面熱物治風毒沖目心胸煩悶通隔薺苨散方薺苨一兩石膏二兩地骨皮一兩葛根一兩銼甘草半兩炙柴胡一兩去苗黃芩一兩蕤仁半兩去皮上八味搗篩為散每服三錢匕水一盞煎取七分去滓食後溫服臨臥再服治肝虛風熱上衝目暗赤痛柴胡湯方柴胡去苗一兩升麻一兩半車前子決明子微炒梔子仁黃芩去黑心黃連去須甘草炙銼防風去叉羚羊角鎊馬牙硝各一兩上一十一味粗搗篩每服五錢匕水一盞半煎至八分去滓食後臨臥服治風毒沖目赤澀癢痛香芎丸方芎藭蒼朮米泔浸一宿切焙枸杞子荊芥穗各一兩莎草根炒去毛細辛去苗葉蟬殼洗焙菊花決明子旋覆花石膏碎甘草炙各半兩上一十二味搗羅為末煉蜜和丸如彈丸大每服一丸臘茶嚼下不拘時候治風毒沖目赤腫澀痛甘菊散方甘菊花旋覆花蜜蒙花青葙子石決明羌活去蘆頭木賊銼決明子炒蒼朮米泔浸一宿去皮切炒蟬殼洗荊芥穗甘草炙銼防風去叉芎藭人參黃芩去黑心各一兩上一十六味搗羅為散每服二錢匕米飲調下早晚食後服治風毒攻眼久成內外障及積年痛楚胬肉赤脈烏頭煎丸方烏頭一兩去皮生用雄黑豆小者二兩青橘皮湯浸去白半兩同烏頭黑豆以水一升三合浸一宿焙乾同為末慢火煎膏甘菊花一兩牛膝酒浸切焙枸杞子芎藭羌活去蘆頭地龍去土炒白蒺藜當歸切焙荊芥穗干薄荷各半兩上一十三味除烏頭膏外搗羅為細末入烏頭煎和勻內臼中搗三千杵丸如梧桐子大每服二十丸空心茶酒任下治腎臟風毒沖眼赤痛及紫色前胡湯方前胡三分去蘆頭防風一兩去蘆頭決明子一兩木通一兩銼茯神三分羚羊角屑三分玄參半兩川升麻三分地骨皮半兩川朴硝一兩上十味搗篩為粗散每服三錢匕水一盞煎至六分去滓食後溫服治風毒沖眼洗眼秦皮湯方秦皮二兩黃連二兩去須蕤仁一兩去赤皮研淡竹葉一握古錢十文上五味和錢細銼以水三大盞煮取一盞去滓適寒溫洗之日二三度治風毒攻眼磣痛不可忍甘菊花散方甘菊花四兩防風去叉二兩蒺藜子炒去角惡實炒各一兩甘草炙銼半兩上五味搗羅為散每服二錢匕熟水調下食後臨臥服治風熱攻目昏澀疼痛旋眩咽喉壅塞語聲不出薄荷散方薄荷葉惡實微炒各一兩甘菊花甘草炙各半兩上四味搗羅為散每服一錢匕生薑溫水調下食後臨臥服治風毒上攻頭目痛徹眉骨眼漸昏暗香甲散方青橘皮湯浸去白焙一兩甘草炙二兩芎藭四兩甘菊花半斤上四味搗羅為散每服二錢匕沸湯調下不拘時候治風毒赤眼昏澀癢痛翳膜瘀肉點眼雪花丸方杏仁湯浸去皮尖雙仁研四十九粒蕤仁去皮研一百粒青鹽皂子大五塊沙糖彈子大上四味研勻丸如黍米每用一丸人膩粉少許生絹包沸湯調去滓乘熱洗冷即止治風毒目赤痛點眼黃連煎方黃連去須三分甘竹葉一握烏梅二七枚古錢二七枚上四味除錢外搗碎入錢以水一碗半漬藥半日煎取七分綿濾密封勿泄氣日三點治風毒沖目赤痛點眼龍腦煎方龍腦研半錢鉛丹羅半兩白蜜綿濾二兩上三味同和勻瓷瓶內蜜封重湯煮一炊時取出點目眥治風毒沖目赤痛點眼丹砂膏方丹砂研半兩蕤仁去皮三分胡粉兩棋子大火上炒龍腦研半錢上四味合研以真酥調如膏再研勻瓷合盛勿令泄氣每點黍米許日三治風毒沖目瞼眥赤腫癢痛難任山芋散方山芋白芷桔梗炒防風去叉羌活去蘆頭石膏寒水石煅石決明當歸切焙赤茯苓去黑皮藿香葉零陵香大黃蒸三度曝乾牛膝酒浸切焙人參決明子鬱金梔子仁桑根白皮銼葛根銼狗脊去毛各一兩甘草炙銼生乾地黃焙木賊銼蒺藜子炒去角陳橘皮去白焙玄參沙參各二兩木香一兩蒼朮米泔浸一宿切焙四兩上三十味搗羅為散每服二錢匕用麥門冬熟水調下食後臨臥服治風熱上攻目赤腫痛點眼金絲膏方黃連去須二兩大黃龍膽黃柏去粗皮當歸山梔子仁各一兩以上同搗研青竹葉一百片切大棗二十枚去核切燈心切硼砂明者乳香研各一分上一十一味都用水五升不拘冬夏浸一時辰取出於銀器內慢火熬不令大沸候氣盡汁下火放冷用絹絞取汁於無風土處澄一時辰去滓於銀器內慢火熬令減半入白蜜半斤同攪不得住手候有蜜香以手挑起有絲即止放冷再以夾絹袋子濾過以瓷合盛之每取一茶腳許研龍腦一字級細入膏同研一二千遍令勻取少許點之治風毒沖目腫赤癢痛琥珀煎方乳香末二錢蕤仁研半兩滑石鉛丹各二兩木鱉子去殼一十枚黃連末秦皮各一兩柳枝槐枝並新青者各一十枝每枝長寸半白蜜黃芩去黑心各四兩上一十一味將槐柳枝秦皮黃芩滑石等粗杵碎以水三碗同煎至兩碗去滓其餘乳香蕤仁鉛丹木鱉子四味與蜜同熬如琥珀色卻共前項藥汁並黃連同煎至一碗半用熟絹濾去滓入瓷器內密封系垂在井底一夜出火毒每用銅箸點以目澀為度熬點不得犯鐵器治風毒沖目虛熱赤痛秦皮洗眼方秦皮去粗皮銼二兩上一味以漿水一碗煎三五沸浸一宿去滓洗眼日三兩度治熱毒風上攻目赤頭旋眼花面腫菊花散方菊花焙排風子焙甘草炮各一兩上三味搗羅為散夜臥時溫水調下三錢匕治積年赤眼撥雲散方楮實微炒令黃一兩荊芥穗半兩甘草炙一分上三味搗羅為散每服二錢匕臘茶調下食後臨臥服治風赤眼洗眼方光明鹽二錢柴胡去苗秦皮防風去叉蛇銜草各一兩生地黃決明子各一兩半上七味並細銼以漿水一升煎十餘沸綿濾過入銅器中洗眼避風治風毒沖目連瞼赤爛熱痛羚羊角湯方羚羊角鎊防風去叉芍藥茯神去木甘草炙銼羌活去蘆頭細辛去苗葉各一兩上七味粗搗篩每服五錢匕水一盞半煎至七分去滓食後溫服臨臥再服治五臟氣虛風熱乘之毒氣上攻眼目赤痛前胡湯方前胡去蘆頭一兩半防風去叉決明子微炒木通銼碎茯神去木羚羊角屑玄參升麻銼地骨皮各一兩上九味粗搗篩每服五錢匕以水一盞半煎至七分去滓食後溫服臨臥再服治熱毒上衝眼赤疼痛菊花湯方甘菊花一兩大黃銼炒半兩茯神去木玄參淡竹葉升麻犀角鎊決明子黃芩去黑心黃連去須各三分上十味搗篩為粗散每服三錢匕水一盞煎至六分去滓食後溫服治熱毒攻眼赤痛心神煩躁大小便難黃連散方黃連一兩去須木通一兩銼黃芩一兩去腐黃柏一兩銼甘草一兩炙銼朴硝二兩上六味搗篩為粗散每服三錢匕水一盞煎至六分去滓食後溫服治風毒攻眼赤澀疼痛視物不明心神煩躁車前子丸方車前子二兩牽牛子一兩微炒石決明一兩搗細水飛青葙子二兩甘菊花川升麻一兩木香一兩秦皮一兩石膏二兩細研水飛槐子二兩炒香麥門冬二兩半去心真珠末一兩犀角屑一兩芎藭一兩上一十四味搗羅為末煉蜜為丸如梧桐子大每服二十丸食後臨臥時溫熟水下加至三十丸目風赤論曰風毒內乘於肝則熱氣上衝於目故見風淚出瞼眥赤腫初患之時或癢或痛發歇不定甚則生瘡為風赤目也治風毒沖眼赤癢甘菊花湯方甘菊花地骨皮各一兩升麻一兩半黃連去須茯神去木皮葳蕤防風去叉木通銼各二兩上八味粗搗篩每服五錢匕水一盞半入竹葉十片同煎至八分去滓食後溫服日三治風熱氣衝目赤癢痛玄參湯方玄參黃芩去黑心各一兩菊花羚羊角鎊蔓荊實去皮各三分防風去叉芍藥各一兩半上七味粗搗篩每服五錢匕水一盞半煎至八分去滓入馬牙硝半錢匕食後臨臥溫服日再治肝虛風熱沖眼赤暗柴胡湯方柴胡去苗車前子決明子炒山梔子仁黃芩去黑心防風去叉羚羊角鎊各一兩大麻仁一兩半黃連去須甘草炙銼各半兩上一十味粗搗篩每服五錢匕水一盞半煎至七分去滓入馬牙硝末半錢匕食後臨臥溫服治風毒目赤腫痛昏暗年深者羚羊角湯方羚羊角鎊決明子炒犀角鎊石膏地骨皮各一兩玄參細辛去苗葉黃芩去黑心各半兩防風去叉芎藭柴胡去苗升麻各三分上一十二味粗搗篩每服五錢匕水一盞半入竹葉十片煎至七分去滓入芒硝末半錢匕食後臨臥溫服日再治目風赤熱痛黑豆湯黑豆二合生用羌活去蘆頭惡根實去莖洗銼焙上三味粗搗篩每服五錢匕水一盞半煎至七分去滓入乳糖一錢匕食後臨臥溫服治目風赤熱痛淚出秦皮散方秦皮去粗皮黃連去須露蜂房柴胡去苗蛇銜鉤藤紫蘇胡黃連丹砂別研各等分上九味除丹砂外搗羅為散與丹砂末拌勻每服二錢匕食後煎竹葉湯調下日三治風熱攻眼赤蔓荊實丸方蔓荊實去皮羚羊角鎊山梔子仁甘菊花各一兩半防風去叉二兩半葳蕤大麻仁研麥門冬去心焙朴硝研各三兩赤芍藥二兩上一十味搗研為末煉蜜丸如梧桐子大每服二十丸至三十丸食後臨臥溫熟水下治風熱目赤昏澀磣痛防風蔓荊丸方防風去叉二兩半蔓荊實去皮羚羊角鎊玄參山梔子仁各一兩半葳蕤大麻仁研芍藥朴硝研各三兩黃連去須枳殼去瓤麩炒各一兩菊花三分麥門冬去心焙二兩上一十三味搗研為末煉蜜和丸如梧桐子大每服二十丸食後臨臥溫漿水下稍加至三十丸治風赤眼點眼黃連膏方黃連去須打碎半兩馬牙硝研二錢上二味先將黃連以井華水浸於日內煎令色濃綿濾過次下硝末於汁中依前煎取干細研每以一豆許以新水化開點目眥暴赤眼論曰目暴赤者肝心壅熱散於血脈之中熱氣炎上攻衝眼目故令暴赤隱澀疼痛風氣加之則瞼眥皆癢悶也治暴赤目昏痛淚出隱悶槐枝湯方槐枝碎銼二兩秦皮銼黃連去須蕤仁去皮馬牙硝黃柏去粗皮銼山梔子去皮各半兩古字錢十四文食鹽一分淡竹葉一握細切上一十味除錢外粗搗篩每用五錢匕水一盞入錢煎取一盞半濾去滓放溫洗眼冷則重暖再洗治眼暴赤痛膜障瞳仁蕤仁膏方蕤仁去皮研鉛丹重羅各半兩井鹽研一分石膽研半錢黃連去須搗碎細羅一兩龍腦研麝香研各半錢蜜五兩上八味除龍麝蜜外先將蕤仁等重研如粉以水一升入蜜五兩同煎令稀稠得所新綿濾去滓入龍麝末調和令勻瓷器盛每以銅箸點少許治眼暴赤痛杏仁膏方杏仁湯去皮尖雙仁研如膏