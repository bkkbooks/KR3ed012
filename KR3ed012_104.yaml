故也治肝臟風熱目暴赤隱澀腫痛羚羊角丸方羚羊角鎊防風去叉甘菊花蔓荊實去白皮梔子仁各一兩半赤芍藥二兩葳蕤大麻仁研麥門冬去心焙朴硝研各三兩上一十味搗羅為末煉蜜丸如梧桐子大每服二十丸食後溫水下臨臥再服加至三十丸治眼暴赤熱痛大黃湯方大黃梔子仁各一兩茯神去木生麥門冬去心焙犀角鎊旋覆花各一兩半上六味銼如麻豆大以水六盞煎至三盞下芒硝一兩再煎至兩盞去滓食後分溫三服治肝心壅熱上攻眼目暴生赤腫隱澀疼痛犀角湯方犀角鎊黃芩去黑心瞿麥穗黃連去須各三分梔子仁車前子木通銼大黃銼炒柴胡去苗青葙子各一兩上一十味粗搗篩每服五錢匕水一盞半入竹葉七片煎取七分去滓入芒硝半錢匕食後放溫服臨臥再服治赤目艾煙丸方黃連去須一兩半杏仁湯浸去皮尖雙仁炒研十四粒膽礬研半豆許鉛丹研半兩膩粉一分上五味再同研勻入粟米粥和以艾煙燻之丸如雞頭大每用一丸以綿裹井華水浸點眼治風毒攻眼暴赤澀痛洗眼連竹湯方黃連去須竹葉各一分秦皮一分半蛇蛻皮半分上四味細銼用水一升半煎取五合綿濾去滓夜臥時白絹點藥汁洗眼治暴赤眼秦皮洗方秦皮銼半兩上一味漿水浸一宿洗眼
