body:
  text: 卷第七十六血痢論曰邪熱客於血脈之中腸胃虛弱血隨熱行流滲腸間因便血下故名血痢其脈見虛小者生身熱疾數者難治治痢下鮮血茜根湯方茜根黃連去須地榆各一兩山梔子仁十四枚犀角屑一分上五味粗搗篩每服五錢匕入薤白香豉各少許以水一盞半煎至六分去滓不拘時溫服日再治血痢腹痛芍藥湯方赤芍藥黃柏去粗皮炙地榆各一兩上三味粗搗篩每服五錢匕以漿水一盞煎至七分去滓不拘時溫服治血痢不止地榆湯方地榆二兩甘草炙銼半兩上二味粗搗篩每服五錢匕以水一盞煎取七分去滓溫服日二夜一治血痢晝夜不止黃柏湯方黃柏去粗皮炙黃連去須各二兩木香一兩上三味粗搗篩每服五錢匕以水一盞煎至七分去滓食前溫服日三治血痢茜根散方茜根貫眾槐花陳者椿根銼甘草炙銼上五味等分搗羅為散每服一錢匕米飲調下食前日再服治一切血痢腹痛人參散方人參三分肉豆蔻去殼炮烏賊魚骨去甲各二兩上三味搗為羅散每服一錢匕溫米飲調下食前治熱血痢不止日夜頻滑地榆散方地榆半兩酸石榴皮三分黃芩去黑心半兩枳殼去瓤麩炒三分赤石脂半兩甘草一兩炙銼上六味搗羅為散每服二錢匕以米飲調下食前治血痢不止枳殼散方枳殼七枚胡桃七枚皂莢半挺不蚛者上三味都盛一新瓦上炭火燒令煙盡研每服一錢匕臨臥時用荊芥茶下二更三更各一服治血痢腹中㽲刺日夜無度通聖散方大棗烏梅各七枚乾薑三塊如棗大甘草一尺各細銼上四味搗篩為散每服一錢匕水一盞生薑半棗大拍破同煎至六分去滓溫服治血痢久不止酸石榴皮散方酸石榴皮一兩枳殼一兩麩炒微黃去瓤當歸二分銼微炒上三味搗羅為細末每服二錢粥飲調下治血痢不止黃連丸方黃連去須微炒黃柏炙微赤銼黃芩各一兩上三味搗羅為細末煉蜜和丸如梧桐子大每服食前粥飲下十五丸治血痢裡急後重腸中疼痛當歸散方當歸三分銼微炒黃連一兩去須微炒龍骨二兩上三味搗羅為細散每服二錢匕粥飲調下不拘時候日二治血痢久不瘥臍腹刺痛肉豆蔻丸方肉豆蔻一兩陳米一兩半檔子一兩上三味先二味搗篩為粗散同米拌令勻同炒黃色去米一分單炒一分生用同焙搗為末研粟米粥和搗為丸如梧桐子大每服五十丸空心溫陳米飲下一二服效治血痢及婦人產後血痢葵子散方冬葵子不以多少上一味搗羅為散每服二錢匕入臘茶末一錢以沸湯七分一盞調服並三兩服瘥治瀉血血痢烏金丸方烏藥不以多少炭火燒存性上一味搗羅為末陳粟米飯丸如梧桐子大每服三十丸米飲下治丈夫婦人便血下痢地榆散方地榆一兩焙乾礬石燒汁盡細研半兩上二味搗羅為散用生豬肉二兩劈開滲藥一錢匕在肉上用炭火炙熟細嚼米飲下並兩服立效治血痢不止方木耳半兩燒作灰研細上一味以井華水一盞調空腹頓服之治腸胃虛熱血痢地榆散方地榆酸石榴皮焙銼木賊各一兩上三味搗羅為散每服一錢匕煎訶黎勒湯調下食前服治久虛撮痛後重下血不止烏頭丸方烏頭生用去皮臍蛤粉各半兩上二味搗為細末用麵糊為丸梧桐子大用鹽豉湯下十五丸食前治血痢腹中㽲痛犀角丸方犀角鎊地榆黃芩去黑心黃柏去粗皮甘草炙銼各一兩半茜根二兩柏葉炙三兩上七味搗羅為末煉蜜和丸如梧桐子大每服三十丸米飲下食前服治藏毒下血臟腑㽲痛日夜五七十行及血痢甚者黃連飲方黃連去須阿膠炙燥當歸切焙赤石脂各四兩附子炮裂去皮臍一兩龍骨白朮各二兩上七味㕮咀如麻豆每服五錢匕水二盞煎至一盞去滓溫服空心食前治血痢黃連丸方黃連去須龍骨禹餘糧煅醋淬伏龍肝各二兩代赭煅醋淬乾薑炮各一半上六味搗羅為末煉蜜和丸如梧桐子大每服三十丸米飲下空心食前日二服治血痢不止少腹㽲痛艾葉飲方艾葉焙當歸切焙黃連去須龍骨訶黎勒皮各一兩半上五味粗搗篩每服三錢匕水一盞煎至七分去滓溫服治久患血痢訶黎勒散方訶黎勒一枚不去核炮乾薑炮一塊高良薑一指節大炮甘草一寸炙白礬一塊燒灰如良薑一半大上五味搗羅為散先吃好茶一盞後用烏梅一枚椎破以水一盞煎至六分調藥二錢匕微利即瘥治血痢不止及積毒瀉血地榆湯方地榆銼焙樗根銼焙各一兩酸石榴皮乾者半兩上三味粗搗篩每服三錢匕漿水一盞煎至七分去滓溫服不拘時候治血痢方上取鹽水梅除核研一枚合臘茶加醋湯沃服之一服瘥治痢血三物散方胡黃連烏梅肉焙灶下土各等分上三味搗羅為散每服二錢匕臘茶清調下空腹服治血痢日夜數十行葛粉飲方葛粉白蜜各一兩上二味相和新汲水四合調空腹服之治痢下膿血裡急後重腸中疼痛磨化虛積丹砂礞石丸方丹砂研末四錢匕青礞石研末一錢匕砒霜研末二錢匕黃連搗羅末三錢匕肉豆蔻搗羅末二錢匕烏頭炮裂去皮臍搗羅為末一錢匕巴豆霜一錢匕上七味同研勻煮糯米粥和丸如麻子大每服十丸溫熟水下臨寢服妊婦不宜服治血痢不止蛇含散方蛇含二枚上一味煅醋淬十數度研如面每服三錢匕陳米飲調下兼止腸風瀉血婦人血傷等膿血痢論曰春傷於風邪氣留連夏為洞泄若遇熱氣乘之則血隨熱行滲入腸中又與腸中津液相搏積熱蘊結血化為膿膿血相雜故成膿血痢秋冬診脾脈微澀者是也其脈滑大或微小沉細虛遲者皆生若懸絕或實急或數大身熱者皆死治下痢膿血羸瘦黃連丸方黃連去須龍骨苦參厚朴去粗皮生薑汁炙各一兩熟艾葉炒白礬熬令汁枯甘草炙陳曲炒赤石脂乾薑炮各半兩上一十味搗羅為末煉蜜丸如梧桐子大每服三十丸空心米飲下治膿血諸痢及痢後腹痛阿膠散方阿膠炙令燥龍骨無食子各三兩桃葉炒柏葉去梗焙各一兩甘草炙肉豆蔻去殼炙半上七味搗羅為細散每服三錢匕米飲調下不拘時治下痢膿血腸胃虛滑米穀完出黃連湯方黃連去須一兩乾薑炮熟艾炒附子炮裂去皮臍阿膠炙令燥蜀椒去目並閉口炒出汗各半兩上六味銼如麻豆大每服五錢匕水一盞半煎至一盞去滓食前溫服治久痢膿血木香散方木香炮兩半阿膠炙令燥一兩半訶黎勒炮去核黃連去須各一兩上四味搗羅為散每服二錢匕空心用冷粥飲調服治伏熱下痢膿血貫眾丸方貫眾銼一兩黃連去須板藍根木香各半兩胡黃連一分訶黎勒皮肉豆蔻去殼各三分上七味搗羅為末煮麵糊丸如梧桐子大每服十五丸煎甘草湯下不拘時調臟氣止便泄治下痢膿血臍腹㽲痛虛氣痞滿腸鳴裡急香連丸方黃連去須三兩地榆銼赤石脂各二兩龍骨阿膠炙令燥木香赤芍藥艾葉炒黃芩去黑心各一兩肉豆蔻去殼各一兩半無食子三分上一十一味搗羅為末煮麵糊丸如梧桐子大每服三十丸米飲下不拘時治膿血久痢腹內疼痛柏葉丸方柏葉去梗黃連去須阿膠炙令燥地榆銼當歸焙各半兩上五味搗羅為末煉蜜丸如梧桐子大每服二十丸溫米飲下不拘時治膿血痢茱萸湯方吳茱萸湯浸焙炒一兩訶黎勒皮當歸切炒黃連去須各二兩乾薑炮半兩上五味粗搗篩每服五錢匕水一盞半煎至八分去滓食前溫服治膿血痢食已即注下不安烏梅丸方烏梅肉炒黃連去須各一兩附子炮裂去皮臍半兩乾薑炮三分上四味搗羅為末煉蜜丸如梧桐子大每服三十丸食前米飲下治膿血痢小腹痛龍骨丸方龍骨赤石脂黃連去須犀角鎊附子炮裂去皮臍羚羊角鎊當歸切炒白礬熬令汁枯龍膽甘草炙熟艾炒乾薑炮各半兩上一十二味搗羅為末煉蜜丸如梧桐子大每服二十丸溫米飲下空心食前治膿血痢日久不瘥乾薑丸方乾薑炮黃連去須黃柏去粗皮各一兩熟艾炒附子炮裂去皮臍烏梅肉炒各三分甘草炙半兩上七味搗羅為末煉蜜丸如梧桐子大每服三十丸食前米飲下治膿血下痢不禁女萎丸方女萎半夏湯洗七遍焙各一兩附子炮裂去皮臍三分藜蘆去蘆頭半兩上四味搗羅為末陳醋煮沸和藥末為丸如梧桐子大每服三十丸陳米飲下日午再服未止加至五丸治久痢膿血日夜不止白礬丸方白礬研鉛丹研硇砂研硫黃研各一分上四味先入礬於瓷合子內次入硫黃硇砂鉛丹復之用瓦片蓋面文武火煅赤傾地上候火氣絕再為末蒸餅丸如梧桐子大每服十丸米飲下治下痢膿血不止茱萸丸方吳茱萸湯浸焙乾炒乾薑炮訶黎勒皮各半兩胡粉白礬灰各一分上五味搗研為末醋煮麵糊丸如梧桐子大每服十丸食前米飲下治新久膿血痢橡實散方橡實二枚滿殼入蜜陀僧末炭火煅赤為末訶黎勒皮為末與前等分上二味共研細分作五服每服用溫米飲調下空心食前服治痢下膿血黃連湯方黃連去須一兩厚朴去粗皮生薑汁炙一兩半上二味粗搗篩每服五錢匕水一盞半生薑二片煎至八分去滓溫服不拘時治膿血痢二宜散方黃連去須吳茱萸湯浸焙炒各一兩上二味各搗羅為末每赤膿多用茱萸末一錢匕黃連末倍之白膿多即黃連末一錢匕茱萸末倍之空心食前米飲調下治膿血痢借氣散方黃連去須生薑並細銼各一兩上二味同用銀石器炒焦赤色去姜取黃連為細散每服二錢匕空心食前陳米飲下治膿血痢困極木香散方木香一塊方一寸黃連去須細銼一兩上二味先將木香一塊置銀石器中次下黃連蓋之以水二盞同熬水盡取木香切焙為散分三服第一服甘草湯下第二服陳米飲下第三服臘茶清下並食前服大妙其黃連別搗末專治赤痢每服二錢匕陳米飲下治膿血痢通神丸方沒藥研五靈脂研乳香研各一錢巴豆去皮心膜研出油五粒上四味合研令勻滴水丸如粟米大每服一丸生木瓜湯下不拘時治膿血痢腹痛滑泄胡粉丸方胡粉阿膠炙令燥烏賊魚骨去甲各半兩龍骨白礬熬令汁枯各一兩蜜陀僧一分上六味搗研為細末粟米粥丸如梧桐子大每服二十丸空心食前粟米飲下治膿血痢後重裡急日夜頻並赤石脂湯方赤石脂白芷天雄炮裂去皮臍龍骨當歸切焙各一兩半肉豆蔻去殼黃連去須厚朴去粗皮生薑汁炙銼地榆白朮桂去粗皮訶黎勒煨取皮木香各一兩吳茱萸湯洗焙乾炒黃芩去黑心各半兩上一十五味銼如麻豆每服五錢匕水一盞半入生薑五片煎至八分去滓溫服空心食前赤白痢論曰赤白痢者由腸胃虛弱冷熱相乘客於腸間變而為痢也蓋熱乘於血流滲腸內則赤冷氣入搏津液凝滯則白其候裡急後重數至圊而不能便膿血相雜故謂之赤白痢重者狀如膿涕而血雜之輕者白膿上有赤脈薄血狀如魚脂腦世謂之魚腦痢也治赤白痢腹中痛口乾或作寒熱黃連散方黃連三分去須微炒白朮半兩黃芩半兩當歸三分銼微炒烏梅肉半兩微炒乾薑半兩炮裂銼阿膠一兩搗碎炒令黃燥甘草半兩炙微赤銼上八味搗篩為散每服三錢匕水一中盞煎至五分去滓不計時候稍熱服治赤白痢日夜不絕赤石脂散方赤石脂一兩龍骨一兩阿膠一兩搗碎炒令黃燥地榆一兩厚朴一兩半去粗皮塗生薑炙令香熟訶黎勒一兩煨用皮當歸一兩銼微炒乾薑一兩炮裂銼黃連一兩去須微炒上九味搗羅為細末每服二錢匕以粥飲調下不計時日二治赤白痢及水穀冷熱氣痢白朮丸方白朮三分赤石脂三分犀角屑三分乾薑半兩炮裂銼厚朴一兩去粗皮塗生薑炙令香熟龍骨三分黃連一兩去須銼炒過烏梅肉三分微炒當歸三分銼微炒甘草半兩炙微赤銼上一十味搗羅為細末煉蜜和搗五百杵丸如梧桐子大每於食前粥飲下三十丸治痢白多赤少沒石子散方沒石子半兩黃連一兩去須微炒乾