炒龍骨地榆銼焙訶黎勒煨去核赤石脂各半兩草豆蔻去皮一分上六味搗羅為末水浸炊餅為丸如梧桐子大每服二十丸米飲下空心食前日三服治赤白痢臍腹㽲痛及久水瀉白濁如米泔馬蘭子飲方馬蘭子三合地榆艾葉炒各二兩赤石脂當歸切焙各四兩龍骨白茯苓去黑皮各二兩半上七味粗搗篩每服五錢匕水一盞半煎至八分去滓空腹溫服治赤白痢血多痛不可忍艾葉丸方艾葉炒黃連去須炒木香一半生一半炒肉豆蔻去殼各三分地榆銼一兩阿膠炙燥當歸切焙各半兩上七味搗羅為末煉蜜和丸如梧桐子大每服三十丸米飲下治赤白痢疼痛不止甘草湯方甘草炙地榆當歸切焙黃連去須炒芍藥炒各半兩上五味細銼每服三錢匕漿水一盞煎取六分去滓溫服治赤白痢龍骨黃連丸方龍骨黃連去須白石脂各一兩半胡粉炒黃白礬熬令汁枯各一兩上五味搗羅為末煉蜜丸如梧桐子大每服二十丸米飲下日三治赤白痢香連散方黃連去須炒一兩木香一兩丁香乾薑炮訶黎勒皮炒各半兩上五味搗羅為散每服三錢匕陳米飲調下日再治赤白痢腹痛不止阿膠丸方阿膠炒三兩黃連去須二兩當歸切焙胡粉研各一兩上四味搗研為末稀糊丸如梧桐子大每服三十丸食前米飲下治赤白痢無問遠近黃連丸方黃連去須黃柏去粗皮當歸切焙赤茯苓去黑皮等分上四味搗羅為末煉蜜丸如梧桐子大每服四十丸空腹飯飲下以瘥為度治赤白痢萬全茯苓散方赤茯苓去黑皮黃連去須阿膠炙燥黃柏去粗皮等分上四味搗羅為散每服二錢匕空腹甘草湯下日再以瘥為度如三歲以下小兒每服半錢匕五歲至十歲每服一錢匕治赤白痢肉豆蔻散方肉豆蔻去殼五枚鹿角屑炙一兩胡粉燒研蜜陀僧各三分燒過於冷地上出火毒上四味搗羅為散每服二錢匕米飲調下治赤白痢後重腸痛四神散方乾薑炮黃連去須炒當歸切焙黃柏去粗皮切炒各等分上四味為散每服二錢匕以烏梅三個煎湯調下赤痢加黃柏白痢加乾薑後重腸痛加黃連腹中痛加當歸各一倍並空心食前服大凡泄痢宣食酸苦蓋酸收苦堅故也治下痢赤白木香散方木香肉豆蔻去殼檳榔一半生一半炮各一兩乾薑炮半兩上四味搗羅為散每服二錢半匕米飲調下治赤白痢腹痛駐車丸方黃連去須炒一兩半乾薑炮當歸切炒阿膠銼炒碾末再炒再碾各一兩上四味各為細末以好醋調阿膠和丸如梧桐子大每服四十丸空心陳米飲下日再治冷熱赤白痢疾吳茱萸湯方吳茱萸湯洗焙炒半兩黃連去須炒赤芍藥各一兩上三味粗搗篩每服三錢匕水一盞煎至八分去滓溫服食前治冷熱痢腹痛裡急和中散方附子炮七度水淬去皮臍為末黃連去須各一兩為末乳香研一分上三味如患冷熱痢取黃連附子各半錢乳香一字以陳米飲調下未止再服以青橘皮湯調下如患赤痢附子末半錢黃連末一錢乳香一字如患白痢黃連末半錢附子末一錢乳香一字米飲調下未止以黑豆七粒煎湯止之治冷熱痢甘草飲方甘草大者二寸許一半生一半炙烏梅五枚拍碎訶黎勒皮五枚上三味細銼用水一盞煎取五分去滓一半冷服一半熱服治赤白痢並血痢梔子仁湯方山梔子仁四七枚銼上一味以漿水一升半煎至五合去滓空心食前分溫二服治赤白痢橘皮散方陳橘皮湯浸去白焙炒為末一兩冬瓜汁一合生薑汁一合上三味合調令勻每服一匙如赤多增瓜汁白多增薑汁和白湯調下治赤白痢不止豆蔻散方肉豆蔻去殼一分訶黎勒炮去皮二分上二味搗羅為散每服二錢匕米飲調下治赤白痢久不止白礬丸方白礬鉛丹各二兩二味拌勻用瓷瓶子固濟封卻頭以火燒令通赤候一兩炊久方可取出放冷杵碎於地上出火毒一宿研上二味研令極細用粟米飲和丸如梧桐子大每服三丸空心米飲下治赤白等痢巴豆丹砂丸方巴豆五粒去皮心麩炒杏仁七粒去皮雙仁炒黃上二味入丹砂一錢同研極細以蒸餅為丸如綠豆大每服一丸至二丸空心陳米飲下治赤白痢服諸藥不瘥者黑豆湯方黑石半升炒去皮揀淨者四合為末甘草一兩半炙半生為末上二味綿裹以漿水三升煎至一升去滓空心分溫二服治赤白痢香連丸方黃連去須炒木香各二兩上二味搗羅為末以麵糊和丸如梧桐子大每服五十丸空心陳米飲下日再
