body:
  text: 卷第一百六十六産後大小便不通論曰內經謂大腸與膀胱受五臟濁氣名曰傳化之腑此不能久留輸瀉者也婦人大小腸本挾熱者即産之後血氣暴竭津液內涸燥熱相搏大小腸祕澀不能傳導故大小便俱不通也治産後大小便不通茯苓丸方赤茯苓去黑皮赤芍藥當歸切焙人參枳殼去瓤麩炒白朮銼炒火麻仁別研如膏各半兩大黃銼炒三兩上八味搗羅七味為末與麻仁研勻煉蜜和丸如梧桐子大每服二十丸煎茅根湯下以利為度治産後風氣壅結大小便不通赤芍藥丸方赤芍藥一兩一分桂去粗皮一兩瞿麥取穗三分大黃銼炒一兩半檳榔銼當歸切炒羌活去蘆頭各二兩上七味搗羅為末煉蜜和丸如梧桐子大每服二十丸米飲下以利為度治産後因腫滿小腹急脹大小便不通木香丸方木香一兩炮牽牛子二兩微炒別搗羅為末入防己陳橘皮去白炒各一兩半檳榔銼訶黎勒炮去核羚羊角鎊各一兩上七味搗羅為末煉蜜和杵令熟丸如梧桐子大每服二十丸煎生薑橘皮湯下以利為度治産後大小便不通榆白皮湯方榆白皮銼碎四兩桂去粗皮當歸切炒甘草炙銼滑石各一兩上五味粗搗篩每服三錢匕水一盞煎至七分去滓食前溫服以利為度治産後大小便不通蔥膠湯方蔥白一握牛膠一片廣二寸長四寸上二味銼碎以水三升和煮消盡去滓頓服治産後冷熱不調大小便不通木香煮散方木香炮為末青黛研各一兩上二味再研令勻每服二錢匕水半盞麻油少許同煎十餘沸和滓溫服之少頃即通未通再服治産後臟腑壅滯腸胃燥澀大小便祕三脘散方大腹皮炙銼紫蘇莖葉沉香木瓜切焙羌活去蘆頭各一兩白朮芎藭木香甘草炙銼陳橘皮去白焙檳榔麵裹煨熟去面各三分上一十一味搗為粗散每服三錢匕水一盞煎至六分去滓溫服不拘時治産後大小便不通腹脹氣急芍藥湯方赤芍藥芒硝別研杏仁去皮尖雙仁麩炒各一兩火麻仁三分研如膏大黃銼炒當歸切炒各二兩上六味將四味粗搗篩入火麻仁同研令勻每服三錢匕水一盞半煎至八分去滓下芒硝末半錢匕溫服以利為度治産後大小便不通臍下妨悶兼痛石葦湯方石葦去毛赤芍藥各一兩當歸二兩銼炒赤茯苓去黑皮瞿麥取穗各一兩半冬葵子二分炒大黃半兩生銼上七味粗搗篩每服三錢匕水一盞煎至七分去滓溫服以利為度治産後關格閉塞大小便不通大黃丸方大黃二兩銼炒芒硝一兩別研黃芩去黑心赤芍藥杏仁去雙仁皮尖麩炒赤茯苓去黑皮生乾地黃焙各一兩半上七味搗羅為末煉蜜和杵丸如梧桐子大每服二十丸食前煎粟米飲下以利為度治産後大小便不通六七日腹中有燥屎寒熱煩悶短汗出腹滿濡藏湯方生葛根五兩切無生者用乾葛二兩大黃半兩銼炒上二味粗搗篩每服三錢匕水一盞煎至七分去滓溫服以利為度治産後內熱大小便不通柴胡湯方柴胡去苗黃芩去黑心陳橘皮湯浸去皮切炒澤瀉羚羊角鎊各三分梔子仁赤茯苓去黑皮各一兩石膏椎碎芒硝別研各一兩半上九味粗搗篩八味每服三錢匕水一盞半煎至八分去滓下芒硝末半錢匕更煎一沸溫服治産後大小便不通梔子仁湯方梔子仁石膏碎黃芩圓小者澤瀉柴胡去苗赤芍藥銼葳蕤各一兩半車前葉切半升上八味粗搗篩每服三錢匕水一盞煎至七分去滓食前溫服以利為度治産後胸膈噎塞心下痞堅行滯氣消飲食通大小便木香丸方木香二兩牽牛子二十四兩炒香別搗取末一十二兩蓽澄茄補骨脂炒檳榔酸粟米飯裹濕紙煨熟去飯各四兩上五味搗四味為末與牽牛末和勻漸滴井華水和丸如緑豆大每服四十丸茶湯熟水食後任下治産後大小便不通臍下疼痛兼腹滿急脹檳榔散方檳榔銼半兩桂去粗皮芎藭獨活去蘆頭木香各半兩大黃銼炒郁李仁去皮尖雙仁別研赤茯苓去黑皮各一兩上八味搗羅為散每服二錢匕食前溫水調下以利為度治産後大小便不通並服瀉藥腹脹氣喘方鹽半斤炒令變色上一味先以漿水一斗半煎沸下鹽末在湯中攪和傾盆中看冷熱通手即入盆中坐浸腰腹須臾便通湯或漸冷即入新熱湯投之常令稍熱人困即扶起少頃又浸治産後大小便祕澀木通飲方木通銼炒冬葵根銼各三分陳橘皮湯浸去白焙黃芩去黑心甘草炙銼當歸切焙蒲黃微炒瞿麥穗各半兩上八味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服日再産後乳汁不下論曰新産水血俱下暴傷津液氣脈未順所以乳汁不下也若能調其衝任治手太陰少陽之經不足則乳脈自然流行若其經虛氣脈閉而不通雖強治之亦無益也治産後乳無汁鍾乳湯方石鐘乳細研為粉白石脂各一分木通硝石一分桔梗炒二兩上五味銼碎如麻豆大每服三錢匕水一盞煎七分去滓溫服不拘時治産後乳不流行下奶如聖散方地膽草栝蔞根萵苣子上三味等分搗羅為散每服二錢匕溫蔥酒調下日三四服治産後乳無汁漏蘆湯方漏蘆去蘆頭木通各一兩鍾乳半兩上三味搗銼如麻豆大每服三錢匕水一盞黍米半合同煎候米熟濾去滓溫服不拘時治産後乳汁不下木通湯方木通鍾乳各一兩漏蘆去蘆頭二兩栝蔞根甘草各一兩上五味搗銼如麻豆大每服三錢匕水一盞半黍米一撮同煎候米熟去滓溫服不拘時治産後乳汁不下桔梗湯方桔梗一兩炒漏蘆去蘆頭鍾乳粉各半兩蠐螬三分炙乾上四味粗搗篩每服三錢匕水一盞煎六分去滓溫服不拘時治産後乳汁少或不下木通飲方木通銼一兩半甘草炙銼枳殼去瓤麩炒各半兩芍藥漏蘆去蘆頭桑根白皮銼黃芩去黑心各一兩淡竹葉一握切上八味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治産後乳汁少或不下豬蹄湯方豬蹄四隻以水五升煮汁三升澄清瞿麥去梗漏蘆去蘆頭木通銼各一兩上四味納三味粗搗篩每服三錢匕豬蹄汁一盞煎七分去滓溫服不拘時治産後乳無汁麥門冬散方麥門冬去心焙鍾乳粉理石研王瓜根各半兩蠐螬七枚炙乾干棗七枚去核炒上六味搗羅為散每服三錢匕濃煎木通湯調下不拘時服治産後因病乳汁少或不下豬蹄湯方母豬蹄一具細銼白油麻二合洗研細蠐螬七枚炙乾為末上三味先將豬蹄用水五碗煮令熟入研了油麻再煮俱熟卻入蠐螬末略煮便傾出細絹濾澄清時暖一盞飲之不拘時治乳汁不下王瓜酒方上以王瓜不計多少用酒煮至爛熟飲酒嚼王瓜下其乳脈自通治産後乳汁不下或汁少鬼箭湯方鬼箭羽五兩銼碎上一味粗搗篩每服二錢匕水一盞煎七分去滓溫服不拘時治産後乳汁不下寄生湯方桑寄生三兩握細銼上一味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時治産後乳汁不下或少栝蔞酒方栝蔞黃大者一枚銼碎上一味熟搗令爛用好酒五盞煎取三盞去滓每服一小盞暖服不拘時治産後乳無汁露蜂房散方露蜂房三枚銼碎略炒上一味搗羅為散每服二錢匕溫酒調下不拘時服治産後乳無汁栝蔞散方栝蔞根五兩切焙乾上一味搗羅為散每服二錢匕以白粥飲調下溫酒亦得早晨日午至夜各一治産後乳無汁魚灰散方鯉魚頭五枚銼碎瓦上燒灰上一味細研為散每服二錢匕以溫酒調下早晨午時夜臥各一治産後乳汁少或不下王瓜根湯方王瓜根五兩以水五碗同搗絞取汁三碗去滓不用上一味取汁每服一盞入酒少許同煎七分溫服不拘時治産後乳汁不下萵苣飲方萵苣子一合淘糯米粳米各半合淘上二味用甘草半兩煎汁一升研前三味濾去滓分作三服服之立下又方木通銼鍾乳細研為粉麥門冬去心焙各半兩上半味搗羅為散每服二錢匕食後溫酒調下日再治乳無汁下乳漏蘆散方漏蘆三分栝蔞根王瓜根各一兩木通銼二兩蠐螬研三枚上五味搗研勻每服二錢匕食後溫酒調下日再服又方母豬蹄一隻木通三兩上二味㕮咀如麻豆大每服五錢匕水一盞半煎至八分去滓食後溫服並取此汁作羹亦得産後妒乳論曰氣血流行則上為乳汁下為月水上下通達不失常度是謂平人宜通而塞則為痛熱氣復乘之則為腫向之流行者壅遏矣倘失調治則結硬成核身體壯熱甚則憎風遂為乳癰世傳氣結乳閉亦為妒乳者此也治産後乳汁不泄結滯腫痛連翹湯方連翹未開者射干杏仁湯去皮尖雙仁炒大黃銼炒柴胡去苗甘草炙銼升麻防己芍藥芒硝研各一兩上一十味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服不拘時治産後妒乳乳汁不泄結成癰腫玄參湯方玄參芍藥連翹去梗防己射干升麻銼芒硝白蘞大黃銼炒各一兩杏仁去皮尖雙仁炒四十枚甘草炙三分上一十一味粗搗篩每服三錢匕水一盞半煎一盞去滓溫服不拘時治産後妒乳汁不通疏腫痛漏蘆散方漏蘆去蘆頭地錦蔓荊實去白皮黃耆銼當歸切焙威靈仙去土各一兩上六味搗羅為散每服二錢匕溫酒調下不拘時服治産後乳汁不泄結成癰腫熱痛升麻湯方升麻玄參芍藥生乾地黃焙連翹瞿麥取穗各一兩射干半兩甘草炙一分上八味粗搗篩每服三錢匕水一盞煎至七分去滓不拘時溫服治産後妒乳塗敷方野葛芍藥薤白當歸木通各半兩附子一分春月不用此一味上六味各細銼如豆大用醋浸半日後同煎沸即先煎豬脂八分一碗令煙出次入亂髮一分洗去垢煎令消次入松脂一兩半蠟半兩再煎沸綿布濾去滓瓷合盛冷則以故帛敷乳上干則易之治産後妒乳乳汁不泄蘊結成癰連翹湯方連翹大黃略炒各半兩黃耆一兩銼犀角屑芍藥木通細銼升麻黃芩去黑心各三分竹葉一握切芒硝半兩上一十味粗搗篩每服三錢匕水一盞半煎至八分去滓溫服不拘時治産後妒乳壅結疼痛牡丹皮散方牡丹皮威靈仙洗焙黃耆銼桂去粗皮大黃酒蒸切焙當歸切焙各一兩上六味搗羅為散每服二錢匕溫酒調下不拘時服日三治産後妒乳鹿角散方鹿角一兩半故靴頭二枚上二味燒灰研細每服二錢匕煎當歸酒溫調下不拘時服治産後妒乳欲成癰鐵粉散方鐵粉研細辛去苗葉芎藭人參防風去叉乾薑炮黃芩去黑心桂去粗皮芍藥肉蓯蓉酒浸切焙各一兩當歸切焙甘草炙各二兩上一十二味搗羅為散每服三錢匕酒調下日四五服或膿血敗壞自出為效治産後妒乳成癰雞屎散方雞屎炒乾一兩麝香半錢細研上二味為細散每服一錢匕煎荊芥酒溫調下不拘時服治産後乳汁不泄結滯不消熱腫二灰散方蔓荊實燒存性皂莢刺燒存性各一兩上二味合研為散每服二錢匕溫酒調下不拘時治産後妒乳結腫不消熱痛敷乳方升麻木香檀香各半兩上三味各取成塊者逐味就沙盆內用酒少許帶濕磨三味相等即用鵝羽刷敷乳上如干以水潤之常令濕潤一日兩次敷之治産後妒乳結滯成癰腫發熱疼痛槲皮湯洗方槲皮三升細切上一味以水一斗煮取七升通手便洗不拘時頻暖洗之治産後妒乳成癰腫或已破膿血未散天麻草洗方天麻草五兩細切上一味以水一斗煮取七升去滓通手洗之不拘時頻頻暖洗産後乳結核論曰産後乳結核者以氣血虛弱風邪搏之乳脈凝滯故結而為核日久不瘥蘊積生熱熱勝則腫甚則成癰也治産後乳結核或成癰腫發熱疼痛枳殼湯方枳殼去瓤麩炒芍藥人參黃耆銼木通銼當歸切焙桂去粗皮蒺藜子炒去角雞骨醋炙大黃銼炒各一兩上一十味粗搗篩每服二錢匕水一盞煎七分去滓溫服不拘時治産後乳結核堅硬疼痛當歸散方當歸切焙芍藥黃耆銼蒺藜子炒去角雞骨炙附子炮裂去皮臍枳實去瓤麩炒各二兩桂去粗皮人參薏苡仁各一兩上一十味搗羅為散每服三錢匕酒調服