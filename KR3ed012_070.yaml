body:
  text: 卷第七十鼻衄門鼻衄統論論曰內經謂脾移熱於肝則為驚衄蓋脾土也肝木也土本畏木今脾移熱於肝則是土氣反盛熱往乘木肝所藏者血其神為魂虛熱勝之故驚而衄也從春至夏者為太陽衄從秋至冬者為陽明衄巢元方曰寸口微芤者衄寸脈微苦寒為衄寸脈微弱尺脈澀發熱而弱為無血必厥其人微嘔夫厥當眩不眩而反頭痛痛為實下虛上實必衄凡是之類皆其脈也孫思邈曰鼻頭白者亡血設令微赤非時者死病人色白皆亡血也凡時行衄不宜斷之如一二升以上恐多者即以龍骨末吹之凡是之類皆其候也以至九竅血俱出者謂之大衄膽移熱於腦熱盛則陽絡溢陽絡溢則衄血血汗者謂之衄衊治之各有方論鼻衄論曰脾移熱於肝則為驚衄蓋木剋土者也脾土熱氣移於肝木則神魂驚而血行不由其道肺主氣開竅於鼻血隨氣上今既妄行故出於鼻竅而為衄也治鼻衄伏龍肝湯方伏龍肝細辛去苗葉各半兩芎藭一分桂去粗皮白芷乾薑炮芍藥甘草炙銼吳茱萸湯浸一宿與大豆同炒去豆各一兩上九味粗搗篩每服三錢匕酒一盞煎至七分入生地黃汁一合更煎一二沸去滓溫服日三治鼻衄蒲黃散方蒲黃柏子仁研當歸切焙阿膠炙燥棕櫚燒存性研亂髮灰研各一錢上六味搗研為散每服二錢匕生藕節自然汁調下如肺損吐血用地黃自然汁調下腸風下血用樗根皮煎湯調下婦人帶下艾湯調下治邪熱上攻鼻衄煩悶比金丸方鬱金雪水煮令透切曝乾一兩紫石英白石英白茯苓去黑皮水銀各一分黑鉛半分與水銀同結沙子甘草生銼一分龍腦研半錢上八味除沙子外搗研為末用黃牛膽汁和丸如彈子大每服一丸煎甘草湯放冷磨下治鼻衄睡黃散方惡實一兩半雄黃研馬牙消研甘草生銼各半兩牛黃研一錢上五味搗研為散每服二錢匕用豬膽汁與新汲水調下相次便睡微有汗出為效如時氣黃髮舌脹咽喉腫及熱極者如前法斟酌多少服治鼻衄嗅鼻方駝糞上一味不以多少用新藏瓶一個打開底入糞在內燒成灰取出研細用麝香少許研勻隨衄血鼻嗅之治鼻衄防己散方防己生用三兩上一味搗羅為細散每服二錢匕新汲水調下老人小兒酒調一錢匕服更用熱湯調少許鼻中嗅氣佳治鼻衄烏沙散方細煙香墨二兩上一味為細散每服一錢匕臘茶清調下治鼻衄地金湯方生乾地黃焙生干藕節各二兩上二味細銼如麻豆每服三錢匕水一盞煎至六分去滓食後臨臥溫服治肺壅鼻衄玉塵散方白麵箬葉灰各三錢上二味研令勻分為二服食後井華水調下治鼻衄吹鼻方百葉石榴花上一味搗羅為細末每用少許吹鼻中治鼻衄札耳方延胡索上一味搗羅為末用綿裹札耳內左衄札右右衄札左左右俱衄則兩耳俱札治鼻衄貼鼻方鹿角膠不以多少上一味以沸湯浸軟貼鼻坳上更以酵面調令稀稠得處若左竅出血則塗右邊右竅出血則塗左邊治鼻衄貼背膏方京三稜大者一枚上一味以濕紙裹於慢火中煨熟乘熱椎碎搗羅為細末醋者面調糊貼背第三椎上治鼻衄克效湯方甘草炙銼桑耳焙各三分枳殼去瓤麩炒大黃銼炒半兩麥門冬去心焙槐實炒各一兩半白芷雞蘇葉百合黃耆銼白前連翹檳榔銼各一兩薑黃二兩上一十四味粗搗篩每服五錢匕水一盞半入生薑三片同煎至八分去滓溫服治鼻衄方燒亂髮灰一錢人中白半錢麝香一字上三味合研勻吹少許入鼻中立效又方羊脛炭皮拍碎炒令通赤一兩伏龍肝半兩麝香一錢上三味細研如粉每服二錢匕冷水調下或研小薊汁調下亦得治肺積熱極衄血吐血方黃明膠末一錢桑葉末二錢伏龍肝末一錢半上三味研勻為散糯米飲調下二錢匕治鼻衄刺薊湯方大薊根一兩相思子半兩上二味粗搗篩每服三錢水一盞煎至七分去滓放冷服治鼻衄血蔥白汁方蔥白上以一握搗絞取汁投酒少許點三兩滴入鼻瘥衄不止論曰營氣之行常與衛氣相隨則氣與血未嘗相離蓋肝臟血肺主氣營衛和平則氣血調順治若人腑臟有熱熱乘血氣血性得熱流溢妄行而肺開竅於鼻故其發為鼻衄鼻衄不止者臟虛血盛故也內經又云脾移熱於肝則為驚衄蓋脾土也肝木也今脾移熱於肝則木不能制土肝臟血其神魂故為驚衄之病治鼻衄不止紫參湯方紫參蒲黃生地黃各二兩黃芩去黑心赤茯苓去黑皮赤芍藥當歸切焙各一兩甘草炙一兩半上八味銼如麻豆大每服三錢匕水一盞入阿膠二片炙令燥同煎至七分去滓溫服不拘時候治鼻衄不止刺薊湯方刺薊黃芩去黑心大黃銼炒赤芍藥各三兩蒲黃二兩側柏葉四兩生乾地黃焙甘草炙銼各五兩上八味粗搗篩每服三錢匕水一盞煎至七分去滓溫服逐急以新汲水調下治鼻衄不止麝香散方麝香二錢滑石末人中白各半兩上三味同研為散每服二錢匕熱酒調下治鼻衄不止厚朴丸方厚朴去粗皮瓦礫並沙薑糞堆土瓜苗心等分上三味搗羅為末蜜丸如雞頭大每服三丸蔥一握細切面一匙鹽半錢同炒黃沸湯點下治鼻衄不止蒲槐散方蒲黃槐花各半兩防己人參各一分上四味搗研為散每服一錢匕新水調下食後服治鼻衄不止天竺黃散方天竺黃芎藭各一分防己半兩上三味搗研為散每服一錢匕新汲水調下肺損吐血用藥二錢匕生面一錢匕水調下並食後服治鼻衄不止千針散方刺薊木賊各一方白麵一錢上三味搗羅為散每服一錢匕研青蒿心七枚新水調下並二服治鼻衄日夜不止頭痛心煩玉粉散方石膏研牡蠣燒研如粉各一兩上二味研勻為散每服二錢匕新汲水調下候血滴間斷時再以水調藥如稀糊滴鼻內治鼻衄不止雞蘇散方雞蘇三兩防風去叉一兩上二味搗羅為散每服二錢匕溫水調下更以雞蘇葉於新水內揉軟內鼻竅即止治鼻衄不止二花散方酸石榴花一分黃蜀葵花一錢上二味搗羅為散每服一錢匕水一盞煎至六分不拘時候溫服治鼻衄不止欲死車前散方車前子末牛耳中垢等分上二味和成梃子塞鼻中立止治鼻衄不止柳枝散方寒食楊柳枝門傍插者一兩人參一分上二味搗羅為散每服一錢匕新水調下並二服治鼻衄不止參蓮散方人參一錢蓮子心一分上二味搗羅為散每服一錢匕新水調下治衄血不止心神煩亂頭旋欲倒通神散方亂髮燒灰伏龍肝等分上二味研為散每服三錢匕新汲水調下治鼻衄不止栗灰散方生栗宣州大者七枚上逐一微亂破皮連皮燒存性碗蓋候冷入麝香少許同研每服二錢匕溫水調下治鼻衄不止黃藥散方黃藥子一兩上一味搗羅為散每服二錢匕煎阿膠湯調下良久以新汲水調生面一匙投之治鼻衄血不止法紙散方上病人衄血時以紙接血候滴滿紙於燈上燒作灰每一張作一服新汲水調下不得令病人知治鼻衄不止燈心散方燈心焙一兩上一味搗羅為散入丹砂一錢研每服二錢匕米飲調下治鼻衄不止當歸散方當歸切焙上一味搗羅為散每服一錢匕米飲調下治血熱沖肺鼻衄不止蝸牛散方蝸牛爆幹一分烏賊魚骨半錢上二味搗研為散含水一口嗅一字入鼻內治鼻衄血不止吹鼻散方茆花十莖亂髮一小團上二味燒為末研勻每以少許吹鼻內治鼻衄不止諸藥不驗大蒜貼足方蒜一枚去皮細研上一味攤作餅子如錢大厚一豆許若左竅出血貼於左腳心下帛系定右竅即貼右腳心兩竅俱出即俱貼之血止急以溫水洗腳心令去蒜氣治衄血不止雞蘇飲方雞蘇白茯苓去黑皮射干各一兩半白芷桔梗天門冬去心焙當歸切焙大黃銼炒甘草炙各一兩桂去粗皮半兩上一十味㕮咀每服二錢匕以水一盞生薑三片煎取六分空腹去滓溫服治鼻衄不止方五月收刺薊曝乾為散每服三錢匕溫酒調下治鼻衄不止方玄明粉上臨臥以冷熟水調下二錢匕瘥又方上取楮葉搗絞取汁一二升旋旋飲之即止治鼻衄不止方糯米二合上一味搗羅為散冷水調下三錢匕治鼻衄不止欲絶者方茆花上取花無即以根代每服一大把細銼水兩碗煎濃至一碗分二服大衄論曰大衄者口耳皆血出是也蓋血為榮而藏於肝氣為衛而主於肺肺開竅於鼻三者相為流通若熱氣乘血而甚則氣血妄行與氣衝激錯溢於上竅故鼻衄不已而口耳皆出血也治大衄不止遠志湯方遠志去心天門冬去心焙麥門冬去心焙阿膠炙燥當歸切焙藕節洗淨甘草炙大黃銼炒芎藭各半兩桂去粗皮沒藥研麻黃去節桃核仁湯浸去皮尖炒令黃色各一分牡丹皮三分柴胡去苗一兩上一十五味粗搗篩每服三錢匕以水一盞煎至七分去滓空心溫服治血妄行九竅皆出服藥不住者南天竺飲方南天竺草生瞿麥者是拇指大一把銼山梔子三十枚去皮生薑一塊如拇指大大棗去核五枚甘草炙半兩燈草如小指一大把上六味銼水一大碗煮至半碗去滓通口服治大衄口耳皆血出不止苦參湯方苦參銼黃連去須各一兩大黃炒一兩梔子去皮七枚上四味粗搗篩每服三錢匕水一盞入生地黃汁一合煎至七分去滓溫服治大衄口耳皆出血不止阿膠湯方阿膠炙燥一兩蒲黃半兩上二味粗搗篩每服二錢匕水一中盞入生地黃汁一合煎至六分溫服急以帛系乳隨衄左右系之兩鼻竅俱出則盡系兩乳不計時候治鼻衄至一斗並大衄聖效方線五兩人中白一團如雞子黃大上二味燒為灰研細每服二錢匕溫水調下治大衄口耳鼻俱出血牡蠣散方左顧牡蠣燒赤一分石膏碎研一兩一分上二味搗羅為散每服一錢匕溫酒調下早晨日午晡時各一服亦可蜜丸如梧桐子大每服三十丸酒下治大衄不止萊蔔酒方萊蔔不拘多少用上一味每細銼一合用酒一盞先煎百沸次下萊蔔再煎一兩沸放溫濾去滓頓服治大衄玉漿散方白麵不拘多少上一味每服三錢匕用冷水調下治九竅出血刺薊飲方刺薊上一味每用一握絞取自然汁以酒半盞相和頓服之如無青汁只搗乾者為末冷水調下三錢匕治鼻中及耳皆出血不止黑神散方白刺蝟皮燒灰存性半兩人中白半錢上二味細研為散每用少許吹鼻中治大衄口鼻出血血上心胸氣急勞熱生地黃飲方生地黃四兩黃芩去黑心赤芍藥竹茹各三兩蒲黃三大合地骨皮五兩上六味除蒲黃外㕮咀如麻豆每服五錢匕水一盞半煎至八分去滓溫服食後日二治大衄不止方龍骨上為末用蘆管吹入鼻中立止久衄論曰肝臟血肺主氣今氣與血俱熱故氣溢則血妄行而為鼻衄衄久不瘥則面色不榮目昏眩冒治鼻久衄不止桑根白皮丸方桑根白皮炙銼山梔子去皮殼黃芩去黑心甘草炙銼羌活去蘆頭防風去叉當歸切焙訶黎勒煨去核胡黃連各一分地骨皮人參白茯苓去皮柴胡去蘆頭各半兩上一十三味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心食前溫酒下治鼻衄久不止諸藥不效榴花散方石榴花曝乾故帛灰各半兩人中白一分上三味同細研更入麝香一錢研勻少少吹入鼻中立止治鼻衄久不止血餘散方亂髮灰一錢人中白半兩麝香半錢上三味同細研勻每用吹一小豆許入鼻中治鼻久衄不止阿膠湯方阿膠炙燥二兩蒲黃一兩上二味粗搗篩每服三錢匕水一盞入生地黃汁二合同煎至七分去滓溫服治鼻久衄鉛丹散方鉛丹不拘多少上一味細研如粉每服二錢匕發時新汲水調下治鼻久衄積年或夜臥血流常數升衆療不瘥谷楮葉汁方谷楮葉五七把上一味搗捩取汁日飲一二盞不過四五劑愈治鼻衄久不止銀分散方定州白瓷器上一味搗研為細散每嗅一剜耳許入鼻中治鼻久衄吹鼻白礬散方白礬燒令汁盡半兩上一味細研羅為散以少許吹鼻中衄衊論曰內經謂膽移熱於腦則辛頞鼻淵傳為衄