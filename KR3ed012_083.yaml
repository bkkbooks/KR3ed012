body:
  text: 卷第八十三腳氣語言謇澀論曰風毒腳氣語言謇澀者脾腎氣虛風濕中其經絡也腎之經循喉嚨挾舌本脾之經挾咽連舌本散舌下二經為風濕所中故令舌本強硬語言謇澀也治腳氣上攻心脾語言謇澀大八風湯方當歸切焙大豆各三兩烏頭炮裂去皮臍黃芩去黑心芍藥遠志去心獨活去蘆頭五味子防風去叉芎藭麻黃去根節乾薑炮秦艽去苗土桂去粗皮石槲去根甘草炙杏仁去皮尖雙仁炒人參白茯苓去黑皮黃耆紫菀去土升麻各二兩上二十二味㕮咀如麻豆每服五錢匕水一盞酒半盞同煎至八分去滓溫服不拘時治風毒腳氣上攻身體發熱肢節不遂精神恍惚語言謇澀防風湯方防風去叉麻黃去根節秦艽去苗土獨活去蘆頭當歸切焙各三兩遠志去心木防己甘草炙人參黃芩去黑心升麻芍藥各二兩石膏碎一兩麝香研半字半夏湯洗去滑薑汁製焙四兩上一十五味除麝香外㕮咀如麻豆拌勻每服四錢匕水二盞生薑一棗大切煎至一盞去滓空心溫服日三治風毒腳氣麻痹不仁語言謇澀桂心湯方桂去粗皮三分麻黃去根節當歸切焙各一兩防風去叉檳榔各二兩黃芩去黑心升麻生犀角鎊赤茯苓去黑皮各一兩半上九味㕮咀如麻豆每服三錢匕棗二枚劈破水一盞煎至七分去滓溫服不拘時治風毒腳氣四肢麻痹筋脈攣急語言謇澀天麻丸方天麻生用二兩海蛤別搗白附子炮各一兩半天南星炮乾蠍去土酒炒丹砂研白殭蠶酒炒桂去粗皮羌活去蘆頭蔓荊實去皮各一兩白花蛇酒浸去皮骨炙四兩麻黃一斤去根不去節用水五升煎至二升去滓入酒二升同煎如膏麝香別研一分上一十三味將九味搗羅為末入海蛤麝香丹砂和勻以麻黃膏為丸如梧桐子大每服二十丸豆淋酒下日三夜一治風毒腳氣上攻心脾口不能語金牙酒方金牙細辛去苗葉茵芋防風去叉附子炮裂去皮臍乾薑炮地膚子蒴藋生乾地黃焙升麻人參各二兩牛膝石槲去根各三兩獨活去蘆頭六兩上一十四味㕮咀用生絹袋盛入淨甕中以清酒三斗浸蜜封春夏五日秋冬七日隨量飲之不拘時常令酒力相續腳氣風經五臟驚悸論曰心者生之本神之舍所以主治五臟者也腳弱之疾感於風多而濕證少則風行陽化其應在心令人神思不寧心多驚悸也治腳氣風經五臟夜臥不安心中驚悸志意不定小便頻數木香丸方木香升麻白朮芍藥枳殼去瓤麩炒各一兩白茯苓去黑皮銼大黃細銼微炒各三兩檳榔細銼二兩上八味搗羅為末煉蜜和丸如梧桐子大每服十丸空心溫酒下日午再服漸加至十五丸以微利為度治先有風證後患腳氣心悶憒憒驚悸不安食即嘔吐脹滿獨活湯方獨活去蘆頭赤茯苓去黑皮麻黃去根節炒陳橘皮湯浸去白炒各一兩半半夏湯洗去滑炒乾三兩檳榔銼射干桂去粗皮防葵生用各一兩上九味粗搗篩每服三錢匕用水一盞入生薑半分拍破同煎至七分去滓溫服若小便利兼汗即瘥如無防葵用龍骨代之治腳氣風經五臟心下堅滿驚悸不寧木香湯方木香羚羊角鎊赤茯苓去黑皮陳橘皮湯浸去白炒各一兩犀角鎊半兩半夏湯洗去滑獨活去蘆頭各一兩半龍骨碎研吳茱萸湯浸炒各一兩烏梅去核五枚上一十味粗搗篩每服三錢匕水一盞入生薑少許拍破同煎至七分去滓空心日午晡時各一服治腳氣風毒上衝心忪驚悸心下堅滿茯苓湯方赤茯苓去黑皮三兩木香半夏湯洗七遍去滑獨活去蘆頭各一兩半犀角鎊羚羊角吳茱萸湯浸炒各二兩人參陳橘皮湯浸去白焙各一兩龍齒搗碎二兩半貝母去心炮七枚上一十一味㕮咀每服三錢匕水一盞入生薑一棗大拍破同煎至七分去滓溫服不拘時候治兩腳腫至膝小腹引痛膀胱急宿水不宣時復心悶夜臥恍惚昏熱驚悸茯苓飲方赤茯苓去黑皮桑根白皮炙銼防己羚羊角鎊郁李仁湯浸去皮尖木香各二兩檳榔碎五枚紅雪二兩半旋入上八味除紅雪外粗搗篩每服五錢匕水一盞半煎取七分絞去滓內紅雪二錢匕空腹溫服當快利三兩行須隔日服之治風毒散攻下焦冷注四肢疼痛腳膝麻痹及風邪干臟心神恍惚筋脈拘急酸棗仁湯方酸棗仁炒二兩薏苡仁炒一兩半人參三分茯神去木一兩麥門冬去心焙半兩上五味粗搗篩每服四錢匕水一盞煎至七分去滓熱服不拘時日三治腳氣風經五臟驚悸羌活湯方羌活去蘆頭一兩一分半夏湯洗七遍去滑赤茯苓去黑皮麻黃去根節炒檳榔銼各一兩半陳橘皮湯浸去白炒乾三分防葵一兩一分桂去粗皮一兩杏仁湯浸去皮尖雙仁研四十枚上九味粗搗篩每服五錢匕水一盞半生薑半分拍碎煎至七分去滓空心溫服日午再服腳氣嘔逆論曰脾為倉廩之官胃為水穀之府五臟六腑之氣皆廩焉若風濕毒氣乘其經則脾弱不足以埤諸臟而胃虛氣上逆故令心胸妨滿食飲不下而為腳氣嘔逆治腳氣腫滿氣急上氣心悶煩熱嘔逆不下食茯苓湯方白茯苓去黑皮紫蘇葉杏仁去皮尖雙仁炒升麻陳橘皮湯浸去白焙柴胡去苗各三兩檳榔銼十二枚犀角鎊梔子仁各三兩上九味粗搗篩每服三錢匕水一盞入生薑一棗大拍碎同煎至六分去滓空心溫服晚食前再服治腳氣風毒冷痹腫滿胸膈噎塞嘔逆不下食兼去濕毒防己湯方防己一兩半白朮枳殼去瓤麩炒各二兩獨活去蘆頭防風去叉桂去粗皮各一兩芍藥一兩半葛根銼半夏湯洗去滑炒各二兩半上九味粗搗篩每服五錢匕水一盞半入生薑一分拍碎同煎至八分去滓空心食前溫服服訖良久吃粥日三治腳氣因熱頻服冷藥傷胃胃中痰冷嘔逆不下食心下堅滿半夏湯方半夏湯洗去滑炒一兩半陳橘皮湯浸去白炒一兩白朮一兩半人參羚羊角鎊各半兩吳茱萸湯浸三度焙乾炒二兩半白茯苓去黑皮一兩上七味粗搗篩每服三錢匕水一盞入生薑一棗大拍碎同煎至六分去滓空心食前溫服日三若氣未散者加檳榔五枚銼旋覆花三分治腳氣微覺疼痹或兩脛腫或上入腹皮膚不仁滿悶嘔逆不下食犀角湯方犀角鎊一兩旋覆花一兩半陳橘皮湯浸去白焙一兩紫蘇莖葉半握乾者白茯苓去黑皮一兩半上五味粗搗篩每服三錢匕水一盞半入生薑一棗大拍碎豉半合大棗二枚劈破同煎至八分去滓空心溫服日三若小便澀者加桑白皮炙銼二兩治腳氣攻腹脅脹滿嘔吐不能下食前胡湯方前胡去蘆頭三兩赤茯苓去皮一兩枳殼去瓤麩炒羚羊角鎊半夏湯洗去滑焙各三分大黃銼炒一兩上六味粗搗篩每服三錢匕水一盞入生薑一棗大拍碎同煎至七分去滓入芒硝末半錢匕再煎一兩沸空心溫服日三治腳氣嘔吐不下食口乾人參湯方人參二分陳橘皮湯浸去白焙半兩赤茯苓去黑皮厚朴去粗皮生薑汁炙熟各三分大腹並皮子用三枚上五味粗搗篩每服三錢匕以水一盞煎至六分去滓食前溫服日二治腳氣心腹妨脹嘔吐不下食木瓜湯方木瓜二兩切作片曝乾木香三分陳橘皮去白焙半兩人參銼三分大腹三枚並皮子用上五味除木瓜外粗搗篩每服三錢匕先將木瓜五片用水一盞半入生薑一棗大拍破同煎至一盞去滓方入前藥三錢匕更煎五七沸去滓空心服日三治風毒腳氣吐逆蓬莪朮散方蓬莪朮煨銼一兩半延胡索炮一兩蛤粉三兩陳橘皮湯浸去白焙一兩上四味搗羅為散每服炒黑豆五十粒生薑三片以水一盞同煎至六分去滓調藥一錢匕溫服不拘時候治腳氣嘔逆不下食行坐不安旋覆花湯方旋覆花半兩半夏湯洗去滑炒三兩陳橘皮湯浸去白焙三分杏仁去皮尖雙仁炒三十枚上四味粗搗篩每服三錢匕水一盞入生薑一棗大拍破同煎至六分去滓溫服空心日午近晚各一若腹中脹滿食不消者加檳榔三枚銼大便難堅者加大黃一兩不能食者加白朮一兩半胸中寒熱悶者加羚羊角犀角屑青木香各半兩心下堅者加鱉甲一兩醋炙去裙襴防葵芍藥各半兩以意斟酌加減服之治腳氣毒悶嘔逆吐沫心煩氣急不下食蓽茇丸方蓽茇麻黃去根節煎去沫焙獨活去蘆頭升麻吳茱萸湯浸三度焙炒各一兩半木香陳橘皮湯浸去白焙各三分射干白茯苓去黑皮乾薑炮各一兩昆布洗去鹹味曝乾二兩羚羊角鎊半兩杏仁去皮尖雙仁炒一兩一分上一十三味搗羅為末煉蜜和丸如梧桐子大每服一十五丸空心米飲下以利為度若利多者減至七丸若食不消化不能食者加白朮一兩一分陳曲二兩半炒令微黃若大便澀者加大黃一兩治腳氣嘔逆不下食白朮湯方白朮二兩木瓜一枚分為四片每服用一片銼碎臨煎時入甘草炙銼半兩上三味先將白朮甘草粗搗篩每服五錢匕水一盞半入前銼者木瓜並生薑一棗大拍破同煎至一盞去滓空心溫服日三治腳氣虛弱嘔逆惡寒膈食不下四肢不舉乍寒乍熱及大腸滑利訶黎勒湯方訶黎勒三枚煨取皮木香半分上二味粗搗篩每服五錢匕水一盞酒半盞同煎至一盞分為二服空心溫服取溏利為度若臟腑實只作一服治腳氣入夏取涼或飲漿酪停痰攻脾胃胸滿吐逆不下食或吐清水涎沫生薑湯方生薑和皮研五兩上一味絞取汁煎令熟每服半合以熟湯半盞調勻服之空心日午近晚各一治腳氣嘔逆心胸煩悶大通散方沉香銼木香白朮陳橘皮湯浸去白焙桑根白皮銼木通銼各一分胡椒一錢一字黑牽牛子三兩半生半炒搗取粉一兩半余者不用上八味除牽牛外別搗羅為細散每服一錢匕入牽牛末一錢匕五更初以沸湯點臘茶調熱服卻臥不住以熱茶及熱粥投取利為效少壯多用牽牛少用藥末老弱多用藥末少用牽牛治腳氣攻心嘔逆悶絶腳冷頭痛乾薑湯方乾薑炮木瓜各一兩吳茱萸湯洗去涎炒黃桂去粗皮各三分檳榔銼十枚木香二兩上六味粗搗篩每服三錢匕水一盞入生薑一棗大拍碎棗二枚劈破同煎至六分去滓溫服治腳氣衝心吐逆不止漸至困篤木瓜湯方乾木瓜去瓤銼吳茱萸洗焙乾炒陳橘皮湯浸去白焙高良薑各一兩一分檳榔五枚銼上五味粗搗篩每服五錢匕水一盞半煎至一盞去滓食前溫服如人行五里再服治腳氣咽塞胸滿不下食嘔噦射干散方射干木香赤茯苓去黑皮人參各一兩半陳橘皮湯浸去白一兩上五味粗搗篩每服三錢匕水一盞半入生薑五片煎至一盞去滓食前溫服如人行五里再服治腳氣衝心悶亂不識人嘔逆飲食不下紫蘇湯方紫蘇莖葉一兩半吳茱萸湯浸去涎炒黃橘皮湯浸去白焙各一分上三味粗搗篩每服三錢匕水一盞煎至七分去滓入童子小便一合溫服腳氣痰壅頭痛論曰風濕毒氣留滯經絡則陰陽不得升降氣脈閉塞津液凝滯停飲結聚是為痰壅風痰相引上衝頭目故又頭痛宜治腳氣兼以消風除痰之劑治風毒腳氣壅熱生痰頭項強痛旋覆花丸方旋覆花微炒薏苡仁炒升麻赤茯苓去黑皮地骨皮各一兩白檳榔煨銼五枚前胡去蘆頭微炙防風去叉芍藥羌活去蘆頭麥門冬去心焙大麻子仁別研如膏馬牙硝別研各一兩半枳殼去瓤麩炒羚羊角鎊黑參白蒺藜炒去角各三分上一十七味先將一十五味搗羅為末入馬牙硝大麻仁膏相和搗羅煉蜜和丸如梧桐子大食後溫漿水下二十丸日二夜一治腳氣上攻胸膈痰盛頭目眩痛羚羊角散方羚羊角鎊白蘚皮黃耆銼白檳榔煨銼山梔子仁各三分羌活去蘆頭甘草炙銼惡實炒茯神去木桂去粗皮海桐皮銼附子炮裂去皮臍郁李仁炒去皮大黃銼醋炒麻黃去根節湯煮掠去沫焙酸棗仁炒獨活去蘆頭芎藭防風去叉各一兩葛根取粉枳殼麩炒去瓤地骨皮車前子炒各三分上二十三味搗羅為散拌勻空心晚食前溫酒調下二錢至三錢匕治風毒腳氣痰厥頭痛百合湯方百