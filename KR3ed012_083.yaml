滓吞下治腳氣不瘥變成肺氣或上氣喘急夜臥不得奔豚氣頻發急喘漸成水氣防己丸方防己赤茯苓去黑皮牽牛子洗去黑汁焙乾白朮各一兩玄參杏仁湯浸去皮尖雙仁炒海蛤各一兩半澤瀉一兩一分郁李仁湯浸去皮尖二兩半上九味搗羅為末煉蜜和丸如梧桐子大每服三十丸空腹米飲下治腳氣水氣朴硝丸方朴硝二兩青白色者爛過細研芒硝一兩青白色者細研馬牙硝半兩細研烏頭生去皮臍椒目炒各一兩二味搗為散與三硝末同羅葶藶子紙上炒莨菪子炒各一兩杏仁去皮尖雙仁炒研二兩上八味搗研為末取大棗七枚煮熟取肉銚子內爆令水盡研爛與藥和勻更入熟蜜少許同搗千杵丸如梧桐子大每服十九至二十丸空心桑白皮湯下治風毒腳氣攻入五臟心腹氣脹喘急大小便不通漸成水腫大腹湯方大腹十枚和皮銼陳橘皮湯浸去白炒一兩吳茱萸三分炒木香郁李仁湯浸去皮尖雙仁各一兩半上五味粗搗篩每服三錢匕水一盞煎至六分去滓食前溫服日二治腳氣氣急大小便澀通身浮腫漸成水候麻仁湯方麻子仁五合炒熟研如膏大豆一升炒熟桑根白皮細銼炒三兩上三味將麻仁與桑白皮拌勻每服以水一盞半先煎大豆三合熟去豆下二味五錢匕煎至七分去滓溫服空腹日午臨臥各一治腳氣浮腫漸變成水心腹脹滿大小便不通氣急喘息檳榔散方白檳榔五枚銼大腹皮七枚木香一兩三分上三味大腹皮細銼木香檳榔各搗為末每服以童子小便一盞先煎大腹皮一枚木香末二錢匕至八分去滓次下檳榔末三錢匕更煎一兩沸和滓空心溫服日再治腳氣兼水氣膈氣通身腫滿氣急小便不通坐臥不得豬苓湯方豬苓去黑皮赤茯苓去黑皮防己各三分桑根白皮五兩炙郁李仁湯浸去皮尖炒澤瀉銼木香各二兩大腹七枚和皮子銼上八味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服當下小便立效日三治腳氣氣急大小便澀通身腫兩腳氣脹變成水者赤小豆湯方赤小豆半升桑根白皮炙銼二兩紫蘇莖葉一握銼焙上三味除小豆外搗羅為末每服先以豆一合用水五盞煮熟去豆取汁二盞半入藥末四錢匕生薑一分拍碎煎至一盞半空心溫服然後擇取豆任意食日再
