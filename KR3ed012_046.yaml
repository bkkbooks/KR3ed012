body:
  text: 卷第四十六脾氣虛腹脹滿論曰脾為倉廩之官胃為水穀之海脾氣虛弱宿寒留滯胃受水穀不能磨化故令脹滿治脾氣虛弱心腹脹滿嘔吐痰逆胸膈不利腹脅刺痛不思飲食大腹木香湯方大腹銼木香各一兩前胡去蘆頭肉豆蔻去殼人參白茯苓去黑皮各半兩京三稜炮銼一兩半乾薑炮青橘皮湯浸去白焙訶黎勒炮去核各半兩陳曲微炒一兩桂去粗皮大麥糵微炒各半兩厚朴去粗皮生薑汁炙一兩半夏湯洗七遍去滑焙半兩上一十五味粗搗篩每服三錢匕水一盞入生薑三片棗二枚去核同煎至七分去滓稍熱食前服治脾虛吞酸嘔逆腹痛泄瀉不思飲食腹脅膨脹吳茱萸丸方吳茱萸湯洗焙乾炒六兩附子炮裂去皮臍二兩半桂去粗皮四兩蓽茇厚朴去粗皮生薑汁炙乾薑炮蓽澄茄胡椒炒各二兩上八味搗羅為末煉蜜和丸如梧桐子大每服二十丸至三十丸米飲下治脾虛冷氣心腹㽱痛胸膈滿悶腹脹腸鳴紫桂大丸方桂去粗皮蘹香子炒白豆蔻仁去皮青橘皮湯浸去白焙高良薑附子炮裂去皮臍各一兩丁香木香甘草炙各半兩胡椒炒一分上一十味搗羅為末煉蜜和丸如彈子大每服半丸至一丸嚼破米飲下溫酒亦得治脾氣虛弱吞酸嘔噦胸脅脹滿不思飲食增損理中散方乾薑炮人參白朮各一兩甘草炙銼吳茱萸湯洗焙乾炒檳榔銼各半兩陳橘皮湯浸去白焙厚朴去粗皮生薑汁炙各一兩蓽茇半兩上九味搗羅為散每服一錢匕入生薑湯點服食前日三治脾氣虛弱中脘痞悶脅肋脹滿心腹刺痛嘔逆痰涎不思飲食小沉香丸方沉香鎊丁香木香枳殼去瓤麩炒人參赤茯苓去黑皮云藍根玄參焙各一兩訶黎勒去核白豆蔻去皮肉豆蔻去殼丁香皮銼桂去粗皮麝香研各半兩白朮四兩上一十五味搗羅為末煉蜜和丸如梧桐子大每服二十丸煎棗湯下米飲亦得空心食前服治脾虛止喘悶定嘔逆進飲食除腹脅脹痛白朮丸方白朮訶黎勒去核厚朴去粗皮生薑汁炙焙乾山芋丁香木香甘草炙白茯苓去黑皮青橘皮湯浸去白焙各一兩上九味搗羅為末煮大棗肉和丸如梧桐子大每服二十丸至三十丸煎粟米薑棗湯下食前早晚各一服治脾虛臟腑祕泄不常腰重頭昏舌乾眼澀食後多脹肢體疼倦和順三焦消化痰飲七氣湯方人參白茯苓去黑皮白朮甘草炙銼訶黎勒去核連皮大腹銼草豆蔻仁各一兩上七味粗搗篩每服三錢匕水一盞煎至七分去滓溫服如寒多者更加炮裂去皮臍附子一兩治脾氣虛弱腹脅膨脹吃食不消面色萎黃四肢劣弱育神湯方厚朴去粗皮生薑汁炙二兩丁香半兩附子炮裂去皮臍白朮各一兩木香半兩當歸切焙人參各一兩半訶黎勒煨去核一兩乾薑炮三分桂去粗皮一兩甘草炙半兩白茯苓去黑皮一兩上一十二味粗搗篩入淨瓷器中收貯每服五錢匕水一盞半入生薑半分大棗二枚劈破同煎至八分去滓食前溫服治脾氣虛弱飲食不美心胸膨脹脅肋痞滿噫氣不通滿悶噎塞積滯不消結聚癖瘕異效散方京三稜銼湯浸一宿焙乾白朮各三兩甘草炙銼二兩麥糵微炒陳曲微炒各一兩高良薑半兩肉豆蔻二枚去核青橘皮湯浸去白焙陳橘皮湯浸去白焙各一兩草豆蔻三枚去皮上一十味搗羅為細散每服二錢匕入鹽少許沸湯點服空心食前治脾虛腹脹止逆思食黑散子方人參丁香皮銼澤瀉附子炮裂去皮臍各半兩天仙藤白豆蔻去皮各一兩釜墨一分上七味都入瓶子內以泥蓋頭候乾用稻粳旋燒一日去火放冷細研為散每服三錢匕水一小盞入薑棗少許煎至六分溫服治脾氣虛弱腹內膨脹不思飲食豆蔻散方草豆蔻麵裹煨熟去皮取肉蘹香子炒各一兩木香半兩陳曲微炒麥糵炒各二兩厚朴去粗皮生薑汁炙乾薑炮陳橘皮湯浸去白焙各一兩上八味搗羅為散每服二錢匕先嚼煨生薑少許沸湯調下食前服治脾臟虛弱冷氣不和心胸不快腹肋膨脹氣刺氣痛不思飲食面黃口淡及治中酒蓽澄茄煮散方蓽澄茄炒半兩丁香皮炙銼二兩高良薑一兩一分厚朴去粗皮生薑汁炙一兩京三稜炮乘熱搗陳橘皮湯浸白焙甘草炙銼蘹香子炒桂去粗皮各二兩香附子炒三兩桔梗炒一兩白鹽炒研十二兩阿魏皂子大一塊麵裹煨熟去面別研上一十三味搗研為散再同和勻每服二錢匕入生薑二片水一小盞煎五七沸熱服一方更入木香半兩阿魏兩皂子大治脾胃冷氣腹內雷鳴冷氣入腹中脘痞悶脅肋脹滿飲食不下桔梗丸方桔梗炒二兩防風去叉禹餘糧醋淬研遠志去心萆薢鹿茸去毛酥炙橘皮湯浸去白焙蕪荑紫石英研桂去粗皮乾薑炮各一兩吳茱萸湯洗焙乾炒甘草炙銼各三分上一十三味搗羅為末煉蜜和丸如梧桐子大每日空心米飲下二十丸治脾胃久冷心腹脹滿宿食不消時作嘔逆日漸羸瘦兼癖瘕氣塊等疾京三稜鱉甲丸方京三稜炮銼鱉甲去裙襴醋炙黃耆銼焙白朮各一兩半厚朴去粗皮塗生薑汁炙熟二兩乾薑炮訶黎勒皮吳茱萸湯浸焙炒枳殼去瓤麩炒橘皮湯去白焙乾桔梗炒麥糵炒陳曲乾地黃焙桂去粗皮檳榔銼木香當歸切焙甘草炙銼人參白茯苓去黑皮各一兩上二十一味搗羅為末煉蜜和丸如梧桐子大空心米飲下三十丸加至四十丸溫酒下亦得治久患氣脹上壅心胸食物不化腸中切痛不止人參湯方人參陳橘皮湯浸去白焙半夏湯洗七遍去滑焙枳殼去瓤麩炒草豆蔻去皮各三分丁香木香芍藥甘草炙銼各一分赤茯苓去黑皮半兩上一十味銼如麻豆大每服五錢匕水一盞半入生薑一棗大切煎取八分去滓溫服治胃冷氣脹滿悶四肢急體重白朮散方白朮訶黎勒煨去核各三分甘草炙銼丁香厚朴去粗皮生薑汁炙各一分木香桂去粗皮人參檳榔半生半熟銼各三分陳橘皮去白麩炒草豆蔻去皮各一兩上一十一味搗羅為散每服二錢匕生薑木瓜煎湯調下治脾氣不足腹脹食欲嘔口舌乾澀四肢無力喜怒不常不欲見人心煩多忘咽喉閉塞面黃補脾湯方禹餘糧煅醋淬研入大麻仁研乾薑炮白朮甘草炙各二兩桑根白皮銼人參各三兩上七味粗搗篩每服三錢匕水一盞入大棗二枚劈破煎至七分去滓空心頓服治脾氣虛弱宿寒留滯胃受水穀不能磨化心腹脹滿橘紅散方陳橘皮去白二兩以生薑四兩取自然汁拌勻慢火炒乾陳曲炒麥糵炒杏仁湯浸去皮尖雙仁麩炒別研各二兩甘草炙一兩半人參草豆蔻去皮面裹煨熟去面山芋各一兩上八味搗研為細散每服二錢匕入薑錢二片鹽少許沸湯點服治脾胃氣虛風冷乘之腹內虛滿有妨飲食丁香湯方丁香一兩附子炮裂去皮臍乾薑炮胡椒青橘皮去白焙陳橘皮去白焙益智去皮高良薑紅豆甘草炙各半兩上一十味銼如麻豆每服三錢匕水一盞入生薑一棗大拍破同煎至七分去滓熱服脾胃氣虛肌體羸瘦論曰水穀精微化為血氣外榮形體內充臟腑脾胃氣和則能行其津液而充養肌肉若脾胃虛弱不能運化水穀則氣血減耗無以灌溉形體故肌肉不豐而羸瘦也治脾胃氣虛弱肌體羸瘦沉香丸方沉香銼附子炮裂去皮臍厚朴去粗皮生薑汁炙白朮芎藭肉豆蔻去殼蘹香子微炒令香胡椒陳曲炒桃仁去雙仁皮尖炒各一兩楝實取皮肉炒二兩阿魏硇砂無石者佳各半兩研上一十三味除硇砂阿魏外搗研為末將硇砂阿魏用好酒三升銀銅石鍋內熬成膏和上件藥丸如梧桐子大早晨晚間腹空時茶酒鹽湯嚼下二十丸治脾胃氣虛弱肌體羸瘦美飲食長肌肉去虛倦強心力黃耆煮散方黃耆銼二兩人參白茯苓去黑皮葛根銼厚朴去粗皮生薑二兩取汁塗慢火炙盡各一兩訶黎勒炮去核一兩半木香甘草炙各半兩半夏三分水洗七遍去滑生薑一兩半取汁浸一宿炒乾乾薑炮一分上一十味杵末每服二錢匕水一盞入生薑三片棗二枚劈煎至七分不以早晚溫服治脾胃氣虛弱肌體羸瘦補不足進飲食山芋丸方山芋銼一兩五味子淨揀三分黃耆細銼一兩白朮三兩人參一兩上五味搗羅為細末煉蜜和丸如梧桐子大每服二十丸或三十丸溫米飲下食前服治脾胃氣虛弱肌體羸瘦調中思食丸方陳曲搗碎炒黃色陳橘皮湯浸去白焙人參麥糵炒黃色鍾乳粉檳榔大者銼白朮半夏曲枳殼去瓤麩炒各半兩上九味除鍾乳別入外搗羅為細末拌勻煉蜜為丸如梧桐子大每服二十丸溫米飲下食前服治脾胃氣虛弱四肢倦怠肌體瘦弱臟腑受濕大便頻數全不思食粟附丸方陳粟米一升附子一兩共得二枚者上二味同於鍋銚內入水煮令附子透取出附子切作片焙乾又別取陳粟米半升水淘令淨控干文火炒令香熟同附子碾為末卻取元煮附子者粟米粥同和丸如梧桐子大每服三十丸至五十丸陳橘皮湯下空心食前治脾胃虛弱肌體羸瘦肉豆蔻丸方肉豆蔻去殼一分訶黎勒一兩面裹火炮取皮吳茱萸湯洗焙乾炒防風去叉厚朴去粗皮生薑汁炙芎藭蒼朮米泔浸一宿切焙藿香葉獨活去蘆頭各一分石硫黃一兩別研上一十味除硫黃外細搗羅為末同拌勻煉蜜丸如梧桐子大空心米湯下三十丸治脾胃虛弱肌體羸瘦及冷痢不止不能食厚朴散方厚朴去粗皮四兩附子炮裂去皮臍一兩乾薑三兩三味同艾滓三兩都杵為粗末同生薑四兩擦碎拌前三味一處炒令紫黑色入後藥肉豆蔻去殼一兩半訶黎勒煨去核一兩半吳茱萸湯洗七遍去涎焙乾一兩草豆蔻去皮一兩縮砂仁一兩陳橘皮湯浸去白焙一兩上一十一味都杵羅為細散每服二錢匕粟米飲調下食前服治脾胃氣虛弱面黃肌瘦小便頻數臍腹疼痛不能飲食香朴丸方沉香銼二兩蘹香子炒二兩厚朴去粗皮五兩附子去皮臍生用二兩蜀椒取紅二兩上五味除椒紅沉香蘹香子外二味用漿水六升青鹽三兩生薑三兩切作片子同於銀鍋中煮令水盡曝乾入椒紅沉香蘹香子搗羅為細末以水浸飲餅和丸如梧桐子大每服三十丸空心溫酒下治脾胃氣虛弱多困羸瘦面黃口淡不思飲食蜀椒丸方蜀椒去目及閉口者十兩厚朴去粗皮用十兩以生薑汁炙令香細銼鹽花拾兩附子炮裂去皮臍銼碎二兩上四味以水一斗於銀石器內以文武火熬候水盡為度焙乾同杵為末煉蜜並糯米粉同為糊和丸如梧桐子大每服二十丸至三十丸溫酒下空心服如大腸滑泄生薑米飲下治脾胃氣虛弱肌體羸瘦人參湯方人參半夏湯洗去滑生薑汁製草豆蔻去皮大腹皮銼前胡去蘆頭陳橘皮湯浸去白焙桂去粗皮芍藥當歸切焙白茯苓去黑皮上一十味各等分粗搗篩每服三錢匕水一盞半入生薑半分切大棗二枚劈煎至八分去滓稍熱服不計時候治脾胃氣虛肌體羸瘦團參丸方團參白朮山芋棗焙乾為末陳倉米炒黃色各一兩甘草炙一分草豆蔻去皮半兩上七味搗羅為細末煉蜜為丸如櫻桃大米飲嚼下一丸日三服治脾胃虛弱面黃肌瘦腰膝疼痛寒痰嘔逆腹脅痃癖氣痛陳橘皮煎丸方陳橘皮一斤用水浸去白焙乾杵為細末醋一斗熬為膏入後藥沉香銼二兩乾薑炮裂四兩桂去粗皮四兩附子炮裂去皮臍四兩萆薢銼二兩當歸洗切焙乾取二兩京三稜炮熟銼二兩厚朴去粗皮生薑汁炙令黑色四兩上九味杵羅八味為細末用陳橘皮膏和丸如梧桐子大每服二十丸溫酒下不嚼陳米飲下亦得空心食前服治脾胃虛冷不思飲食或發虛腫或日漸羸瘦四肢衰倦吐利無節一切脾虛候狀皆可服食椒朴丸方蜀椒去目並閉口者厚朴去粗皮生薑汁炙透蘹香子炒青鹽淘去砂取淨各二兩上四味以水二升煮令乾焙燥搗羅為末麵糊丸如梧桐子大每服三四十丸空心溫米飲及鹽湯下病深者日三服諸方集多載椒朴丸方有加附子者有加乾薑之