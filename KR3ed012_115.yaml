body:
  text: 卷第一百一十五耳疼痛論曰足少陰腎之經宗脈所聚其氣通於耳若風邪毒氣乘之與正氣相擊則令耳中疼痛治耳中策策疼痛生犀丸方犀角鎊屑牛黃研各一分防風去叉半兩白附子炮烏蛇酒浸去皮骨炙天南星半夏湯洗二十四遍乾薑炮丹砂研沒藥研龍腦研乳香研桂去粗皮各一分當歸銼焙半兩麝香研半兩上一十五味搗羅為細末煉蜜和丸如梧桐子大空心酒下二十丸治耳中疼痛香附膏方附子二枚去皮臍生用菖蒲礬石燒枯杏仁湯浸去皮尖雙仁炒各半兩麝香研二錢萆麻子六十粒去皮上六味先搗附子菖蒲礬石為細末次將萆麻杏仁搗膏次研麝香同拌勻丸如棗核大以蠟裹用大針穿透塞於耳中日再用治耳聾疼痛百合散方百合不拘多少上一味焙乾為細散食後溫水調下一錢匕日三服治耳內極痛方鬱金末上一味研細每用一字以淨水調傾入耳內卻急傾出治耳卒疼痛不能忍塞耳散方菖蒲附子炮裂去皮臍各一分上二味搗羅為細散麻油調綿裹棗核大塞耳中治耳風疼痛久聾不通木香散方木香上一味搗羅為細散用蔥黃心截了尖沾鵝脂在上蘸木香散深內耳中覺痛止待一時辰方取去日三五上治耳卒疼痛熨法鹽五兩上一味於飯上蒸過乘熱以軟布裹頻熨之耳腫論曰耳者腎之候心之寄竅若其經為風熱所客隨脈而上至於耳中氣聚不散邪熱攻衝結聚為腫甚則黃汁出而為暴聾之病也治兩耳腫木香散方木香防己芍藥玄參白蘞大黃銼炒芒硝黃芩去黑皮紫葛各一兩赤小豆三分上一十味搗羅為散每搗生榆白皮取汁和少許塗帛上貼腫處取消治兩耳腫時苦疼痛鹽花丸方鹽花四錢甜葶藶二兩用河水洗微炒杏仁去皮尖雙仁炒一兩臘月豬脂二錢上四味除脂外各搗研極細一處研勻次入豬脂和丸如棗核大每用綿裹內耳中日一易之初內藥後忽覺耳痛有惡水出四體不安勿疑治耳腫熱痛及暴覺腫者三物散方赤小豆大黃各半兩木鱉子仁一兩上三味各搗研為末再同研勻每用少許以生油旋調塗耳腫處治耳卒腫出膿礬石散方礬石熬令汁枯半兩上一味研細每以葦管吹少許入耳中日三四度或以綿裹如棗核大塞耳中亦得治耳卒腫栝蔞根塞耳方栝蔞根洗不拘多少上一味以刀削一頭令尖可入耳中以臘月豬脂煎之三沸候冷取塞耳中瘥治耳卒腫楝實塞耳方楝實五合上一味爛搗每用綿裹如棗核大塞耳中治耳腫商陸塞耳方商陸生者洗上一味以刀子削如棗核內耳中日二易之治耳腫杏仁膏方杏仁去皮尖雙仁上一味研成膏拈如棗核亂髮裹內耳中日二易之耳內生瘡論曰足少陰為腎之經經虛則風熱邪氣乘之與津液相搏故耳內生瘡世俗治耳瘡多以敷滲塞耳等藥以謂邪氣出外專為外醫殊不知服藥以治腎經之為善也治耳內生瘡菖蒲湯方菖蒲米泔浸一宿銼焙三分附子炮裂去皮臍五味子熟乾地黃白茯苓去黑皮防風去叉人參各半兩磁石醋淬七遍一兩一分木通玄參杜仲去粗皮銼炒各一分黃耆三分上一十二味㕮咀每服三錢匕以水一盞入生薑三片大棗二枚劈破同煎至七分去滓溫服治耳有惡瘡塞耳大黃散方大黃半兩黃連去須龍骨各一分上三味為細散每用少許綿裹棗核大塞耳中治耳有惡瘡黃連散方黃連去須半兩礬石三分燒汁盡研上二味搗研為細散每以少許綿裹內耳中兼療耳痛有膿治耳有瘡方羊屎曝乾上一味研為末每以少許綿裹塞耳中治米疽生耳中連頭腫疼不可忍香脂膏方鬱金地骨皮各一分礬石一錢研龍腦半錢研上四味搗研為細末用臘月豬脂油調塗之若用鼠腦調更佳治耳瘡土馬鬃塗方土馬鬃井中苔等分上二味搗研為末以燈盞內油調塗之耳耵聹論曰耳者腎之候心之寄竅風熱搏於經絡則耳中津液結聚如麩片之狀久則丸結不消或似蠶蛹致氣竅不通耵聹為聾治耵聹塞耳礬石膏方礬石熬令汁盡三分附子炮裂去皮臍一兩菖蒲半兩杏仁湯浸去皮尖雙仁炒黃三兩別研蓖麻仁二兩半別研松脂煙脂各三分上七味搗研令勻和如膏以綿裹棗核大塞耳中常令相續以瘥為度治耵聹塞耳聾強堅不可挑塞耳豬脂膏方生豬脂一合釜下墨半兩研上二味調和成膏捏如棗核大綿裹塞耳中治耵聹塞耳堅強不可挑灌耳蔥液膏方蔥汁三合細辛去苗葉附子炮裂去皮臍各一分上三味搗羅細辛附子為末以蔥汁調令稀灌入耳中治耵聹塞耳聾強堅不得出黃連散方黃連去根鬚半兩附子炮裂去皮臍一分上二味搗羅為散每以少許滲入耳中治耵聹塞耳聾強堅不可挑灌耳地龍汁方地龍濕者五七條上一味研取汁數滴入耳中挑即自出聤耳論曰腎氣通於耳耳者腎之候若其經為風邪所乘毒氣蘊結於耳中以至膿汁俱出妨悶疼痛謂之聤耳治聤耳通氣散方郁李仁去皮研半兩木香一分檳榔銼三枚大黃銼一兩芍藥半兩細辛去苗葉一分人參半兩山芋桂去粗皮各一兩甘草炙銼牡丹皮各一分上一十一味除郁李仁別研外搗羅為散和勻每服一錢匕空心溫酒調下治聤耳出膿血塞耳白蘞散方白蘞黃連去須龍骨赤石脂烏賊魚骨去甲各一兩上五味搗羅為散先以綿拭膿干用藥一錢匕綿裹塞耳中治聤耳癢膿汁不止塞耳菖蒲散方菖蒲銼焙狼毒磁石煅醋淬一七遍附子炮裂去皮臍礬石燒令汁盡各半兩上五味搗羅為散以羊髓和少許綿裹塞耳中治聤耳出膿水狼牙散方狼牙白蘞竹中蛀屑各一分上三味搗羅為散以少許滲入耳中治聤耳塞耳菖蒲散方菖蒲銼焙桂去粗皮野葛等分上三味搗羅為散以雀腦髓和綿裹棗核大先灸耳中宛宛者七壯後用藥塞耳中日一易治聤耳出膿久不瘥者有蟲塞耳鯉魚腸方鯉魚腸一具細切醋三合上二味合搗布裹棗核大塞耳中食頃痛即有蟲出著布即拔之更易新者蟲盡為度治聤耳出膿汁礬石散方礬石燒令汁盡研食鹽研各一分上二味各細研為散先以紙拈子拭去膿汁令乾次以鹽滲之次又以礬石滲之日再治聤耳耳中痛附子散方附子炮裂去皮臍一分黃連去須半兩上二味搗羅為散以少許滲耳中治聤耳出膿水紅花散方紅藍花一分礬石半兩燒灰上二味搗羅為散以少許滲耳中治聤耳出膿水黃連散方黃連去須半兩瓠子乾者一分上二味搗羅為散以少許滲耳中治聤耳耳中痛膿血出塞耳細辛散方細辛去苗銼附子炮裂去臍皮各一分上二味搗羅為散以蔥汁和一錢匕綿裹塞耳中治聤耳塞耳黃礬散方黃礬半兩上一味內瓶中火燒令汁盡細研為散綿裹一錢匕塞耳中治聤耳出膿血塞耳桃仁方桃仁湯去皮尖雙仁炒上一味搗如泥拈如棗核大谷葉裹塞耳中或以故緋帛裹亦佳治聤耳耳中痛膿血出塞耳桂膏方桂去粗皮半兩上一味搗羅為末以魚膏和拈如棗核大塞耳中治聤耳塞耳雀腦方五月五日雀腦上一味以綿裹少許塞耳中又方巴豆去皮心二七粒上一味以雞卵一枚破頭作小竅內巴豆盡以紙封之卻安雞窠中候雞抱卵日余卵雛出取藥綿裹少許塞耳中又方伏龍肝細研半兩上一味以豬膏和拈如棗核大綿裹塞耳中日再易夜一易又方釭中膏車脂也上一味綿裹棗核大塞耳中又方干蚯蚓一兩上一味搗羅為末綿裹棗核大塞耳中又方母鼠肝一具上一味旋取活鼠乘肝熱時以棗核大塞耳中又方鐺墨上一味細研先淨拭去耳中膿以少許糝耳中又方茶籠上蚛屑半兩上一味細研滲滿耳中又方蒲黃細研上一味以一豆大滲耳中又方生油一合上一味內蔥管內隔宿取出滴耳中治聤耳方松脂上一味為末滲耳中膿止即瘥治聤耳出膿杏仁膏方杏仁不拘多少上一味炒令赤搗如膏以綿裹塞耳中治聤耳方石首魚腦中枕子上一味為末滲耳中即瘥百蟲入耳論曰百蟲入耳其類不一古方或灌以藥或導以物皆以意出之也獨驢乳牛酪二物最為良法諸蟲之入耳者灌之即化為水其入腹者則連服數劑取瘥治蚰蜒入耳立驗散方芎藭天南星炮白芷夜明砂炒豬牙皂莢炙各三分白丁香百部藜蘆各四錢草烏頭半兩海金砂一分砒霜別研蓽茇各二錢上一十二味搗羅為散與砒霜合和研勻臨時更用鉛丹調色勻瓷合收如蚰蜒入耳取少許用醋一兩滴調化以細翎毛蘸藥入耳竅微吹令藥氣行立出藥不得多多即化蚰蜒成水不出如蠍螫先點少醋在螫處滲藥半字許擦令熱徹效治蚰蜒入耳烏頭散方烏頭三枚木鱉子去殼七枚礬石燒令汁盡一分白丁香一撮夜明砂一分烏雞屎三塊鉛丹一分豬牙皂莢三挺炙小兒衣帶一條如無鼻內血三兩滴亦得上九味同搗羅為散每服一字釅醋調灌入耳內少時蟲盡出治蚰蜒百蟲入耳備急散方芫菁斑蝥並去頭足米炒各二十一枚金星石銀星石並研各一錢柳絮礬二錢狼毒一錢青黛半分上七味搗研為散每用一字水少許調入耳立出治蚰蜒諸蟲入耳灌耳散方雄黃萵苣子蕪荑各一兩綠礬半兩板藍根一兩沒心草一兩麝香研一分臨時和入上七味於五月五日午時合和內瓷瓶中燒為灰入麝香研勻每用藥一字生薑一塊如棗大蔥白一莖同研取汁入藥末攪和勻更用清油一合調藥灌入耳中其蟲食頃淺者自出深者自死如入腹內者以羊肉半斤作羹除油不用以前藥入在羹盆內和勻令人於盆內浸一飯時其蟲自出治蚰蜒入耳灌耳麝香驢乳汁方麝香三分綠礬半兩米醋驢乳汁各少許上四味調和為汁以一蜆殼盛少許傾入耳內須臾耳傾出蟲化為水治蚰蜒入耳雄黃灌耳方雄黃綠礬礬石半夏各一分上四味同搗為末以醋調一字灌入耳兼治蜈蚣諸蟲入耳治蚰蜒入耳硇砂吹耳方硇砂研膽礬研各一分上二味研細用雞翎管子吹一字許入耳蟲化為水治蚰蜒入耳灌耳牛乳方牛乳一盞上一味少少灌入耳內即出若入腹者飲一二升當化為黃水出未出更飲治蚰蜒入耳驢乳灌耳方驢乳三合上一味側灌入耳中其蟲從左耳入即右耳出治蚰蜒入耳灌耳生油方生油三合上一味少少灌入耳中若入腹者空腹服酢酪一升不出更服仍以面和燒餅乘熱薄耳門須臾即出治蚰蜒入耳灌耳水銀方水銀一豆大上一味傾入耳中攲耳孔向下於耳上擊銅器物數聲其蟲即出治蚰蜒入耳灌耳小便方小便半盞上一味少少灌入耳中即出治蚰蜒入耳塗耳百部方百部切焙上一味搗羅為末以一字生油調塗於耳門上其蟲自出治蚰蜒入耳胡麻枕耳令出方胡麻半升炒令香上一味搗碎以葛袋盛側臥枕耳治蚰蜒入耳枕耳令出方麻油作煎餅上側臥以耳枕之須臾即出治蚰蜒入耳雞血方雞心血上用生油和滴入耳內蚰蜒即出治蜈蚣入耳桑葉掩耳方桑葉一握鹽一撮上二味以桑葉裹鹽炙令熱掩耳上冷即易治蜈蚣入耳豬肉掩耳方豬肉一兩片上一味炙令香掩耳上立出治蟻入耳灌耳醬汁方醬汁一兩合上一味灌耳中即出治蟻入耳灌耳小蒜汁方小蒜三兩握上一味研取汁灌入耳中治蟻入耳灌耳鯪鯉甲方鯪鯉甲一兩燒為灰上一味以水調濾過滴入耳中即出治蟻入耳豬脂枕耳方豬脂一片豬肉一片上二味將豬脂煎豬肉令香安耳孔邊枕睡即出治諸蟲入耳耳腫不聞語聲有膿血塞耳黃耆丸方黃耆銼一兩芍藥半兩當歸切焙半兩乾薑炮半兩蜀椒去目並閉口一分上五味搗羅為末入生地黃三兩切和杵令勻以棗核大薄綿裹塞耳中日夜易之治百蟲入耳塞耳令出方桃葉心二七枚胡麻一升炒令香上二味先以桃心葉塞耳中其蟲必出未出將胡麻以葛袋盛枕耳邊蟲自出治百蟲入耳蜀椒醋灌耳方蜀椒半兩為末醋半盞上二味以椒末投醋中