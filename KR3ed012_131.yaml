勿令合以出熱氣如未有膿當內消若已作頭當漸小若日久瘡甚肌肉損爛筋骨出露者即於布上多塗藥貼之瘡上干即再換但以膈中不穴無不瘥瘡切忌手觸宜慎之治發背癰疽一切瘡熱痛不可忍者百草霜膏方百草霜生蠐螬等分上二味同研細貼之如冰痛即止治發背初覺腫痛方赤小豆上一味搗羅為末和豬膽汁塗之干即易治發背及一切熱瘡腫方蕓薹一握上一味切和酥炒熱敷瘡上冷即易日三度癰疽發背發渴論曰癰疽煩渴之證由熱氣熏灼五臟津液不足於內也蓋營衛氣血腐化為膿血則津液不得不耗津液既耗熱氣復盛則心神內煩而引飲不止然或為嘔噦下利者以五臟虛熱飲水過度氣不足以勝之故氣逆於上則嘔噦腸胃不固則變下利也此屬癰疽惡證治諸瘡腫發渴托裡黃耆湯方綿黃耆十兩甘草一兩炙上二味並銼如麻豆每服五錢匕水二盞煎五七沸去滓溫熱隨意服不拘時候治癰疽虛熱大渴地黃湯方生地黃芍藥升麻木通甘草炙大黃銼微炒知母赤茯苓去黑皮人參當歸焙各一兩黃芩去黑心黃耆各一兩半小麥半升栝蔞根二兩前胡去蘆頭一兩半上一十五味㕮咀如麻豆每服五錢匕用水一盞半入竹葉七片煎至八分去滓空心溫服如小便利除木通大熱加人參晚再服以瘥為度治癰疽熱盛口燥發渴除熱止渴黃耆湯方黃耆栝蔞根生乾地黃焙升麻各一兩麥門冬去心焙一兩半梔子仁一兩芍藥一兩半黃芩去黑心一兩上八味銼如麻豆每服五錢匕水一盞半煎至八分去滓空心溫服日晚再服治發背癰疽熱渴悶亂枸杞湯方枸杞枝葉五兩石膏末栝蔞根黃連去須甘草炙各一兩上五味㕮咀如麻豆每服五錢匕用水一盞半煎至八分去滓空心溫服日晚再服治發背乾嘔吐此因先患熱渴飲冷太過胃寒所致宜服溫脾平胃陳粟湯方陳粟米微炒一合乾薑炮裂半兩甘草炙四兩上三味㕮咀如麻豆每服五錢匕用水一盞半煎至八分去滓空心溫服日晚再服以瘥為度治發背癰疽發大渴口乾不可止凝水石煎方凝水石石膏蜜各半斤上三味先搗二味石藥羅為末以水五升煎令稠即下蜜更煎成煎用瓷合盛每日空心取一棗大含化咽津日五七服治癰疽發背四肢虛熱大渴竹葉湯方竹葉一握淨洗銼煎取汁三盞生地黃二兩黃芩去黑心人參芍藥知母甘草炙赤茯苓去黑皮各一兩升麻黃耆栝蔞根麥門冬去心焙各一兩半上一十二味除竹葉外銼如麻豆每服三錢匕以竹葉汁一盞入棗三枚擘破同煎至七分去滓溫服一日三服早晨午時夜臥各一治癰疽發背兼渴竹葉黃耆湯方淡竹葉一握黃耆銼炒甘草炙銼麥門冬去心焙黃芩去黑心芍藥各三兩當歸切焙人參石膏椎碎芎藭半夏湯洗七遍去滑焙各二兩生地黃切焙八兩上一十二味粗搗篩每服五錢匕以水一盞半入生薑一分拍碎大棗五枚擘破竹葉七片煎取八分去滓溫服日三夜一治諸癰腫臟腑壅滯口乾腳冷寒熱頭痛嘔逆不下食煩渴引飲麥門冬湯方生麥門冬去心焙二兩葛根銼蘆根石膏碎生犀角鎊葳蕤薺苨芍藥淡竹葉切甘草炙銼各一兩上一十味粗搗篩每服五錢匕水一盞半煎至一盞入硝石一錢匕去滓溫服不拘時癰疽發背作寒熱論曰癰疽發背病為急切然五臟腧皆在背發於何部宜精詳之其作也邪毒內鼓寒熱交攻氣血壅滯陰陽相干故令人身熱而惡寒也當以療癰疽之法治之治癰疽發背時作寒熱疼痛不食解毒地黃丸方生乾地黃焙二兩黃耆銼栝蔞根黃芩去黑心麥門冬去心焙各一兩半桑螵蛸十五枚銼炒大黃銼炒人參梔子仁肉蓯蓉焙前胡去蘆頭升麻芍藥知母焙王不留行各一兩遠志去心敗醬地脈草各半兩干棗一十五枚湯浸去皮核以蜜一升和蒸成膏上一十九味搗羅十八味為末入棗膏和丸如梧桐子大每服三十丸加至五十丸空心米飲下日晚再服治癰腫初結頭痛寒熱氣急木香湯方木香藿香葉沉香薰陸香丁香各一兩上五味粗搗篩每服五錢匕水一盞半煎至八分去滓空心溫服取滓敷腫上日二治癰疽始作便敗壞發寒熱疼痛羊髓膏方羊髓甘草銼搗各二兩胡粉研大黃銼搗各一兩豬脂半斤上五味先熬脂髓令沸下甘草大黃煎候甘草黑色綿濾去滓入胡粉以柳篦攪勻瓷合盛每日三五度塗敷瘡上以瘥為度治發背癰疽一切瘡腫乳癰口乾腳冷發作寒熱頭痛嘔噦不下食葛根湯方葛根銼麥門冬去心焙各一兩犀角鎊半兩葳蕤薺苨芍藥甘草炙銼蘆根銼各三分石膏一兩半上九味粗搗篩每服五錢匕水一盞半煎至八分下竹瀝半合紅雪一分更煎三兩沸去滓空心日晚溫服治癰疽始作堅硬皮色紫赤惡寒壯熱一二日未成膿者升麻湯方升麻連翹大黃銼炒生地黃切焙木香各一兩白蘞玄參各三分上七味粗搗篩每服五錢匕水二盞煎至一盞入芒硝末半錢匕去滓空心溫服取利為度未利再服治發背癰疽一切瘡腫未穴時攻刺疼痛或發寒熱渴躁不食解毒勻氣犀角散方犀角鎊一分人參大黃銼炒栝蔞實焙甘草炙銼各半兩葛根銼赤茯苓去黑皮檳榔銼木香各三分芎藭一兩上一十味搗羅為散每服二錢匕空心晚間粥飲調下以瘥為度治發背未成膿身體寒熱人參散方人參當歸焙密陀僧煅沒藥研雄黃研各半兩丹砂研一錢栝蔞實二枚去瓤取皮子生用上七味搗研為細散每服二錢匕用甘草煎湯放溫調下日三治發背未潰身體寒熱黃柏散方黃柏煙燻壁土多年者各二兩上二味為細散每服二錢匕茅根煎湯調下仍用生薑汁調藥敷之治發背作寒熱車螯酒方車螯紫色光厚者以黃泥固濟煅赤候冷為末取三錢匕膩粉一錢匕甘草末二錢匕栝蔞實一枚銼上四味先將前三味和勻次將栝蔞用酒二盞煎至一盞去滓調下前藥三錢匕取下惡物瘥治發背未潰身體寒熱苦茄散方苦茄種甘草炙各一兩上二味為細散每服二錢匕甘草湯調下治熱毒癰腫血不散初覺憎寒乾渴四肢煩悶能令速消柴胡煎方柴胡去苗一兩知母焙一兩木通一兩半淡竹葉一百片瞿麥穗一兩連翹一兩防己二兩大黃生二兩細銼生麥門冬汁三合湯成下生藕汁三合湯成下甜硝四兩湯成下上一十一味先將八味銼如麻豆大以水三升煮取一升半去滓下甜硝令散次入麥門冬藕汁等共分為八服空腹兩服以溏利為度余藥食後緩緩服之治癰疽發腦發背腫焮寒熱疼痛忍冬飲方忍冬嫩苗一握葉尖圓蔓生莖葉皆有毛生田野籬落間多有之兩葉對生春夏新葉稍尖而色嫩緑柔薄秋冬即堅厚色深而圓得霜則葉卷而色紫經冬不凋四月開花極芬芳香數步初開色白則數日變黃每枝黃白相雜故一名金銀花花開曳蕊數莖如絲故一名老翁須一名金叉股冬間葉圓厚似薜荔故名大薜荔可移植庭檻間以備急花氣可愛似末利瑞香輩甘草半兩生銼上二味爛研忍冬同甘草入酒一升半沙瓶中塞口煮兩食頃溫服一日服盡若倉卒求不獲只用干葉為散每服三方寸匕甘草方寸匕酒煮服之亦可但不及生者耳發背潰後論曰發背已潰毒氣外泄或有逆證難治者蓋以腑臟之傷也有白睛青黑而眼小服藥而嘔腹痛渴甚膊項中不便音嘶色敗者是為五逆其餘熱渴利嘔與膿潰不愈皆以餘毒攻擊營衛傷壞津液未復惟當隨證治之治發背已潰去膿汁理虛勞內補黃耆湯方黃耆細銼麥門冬去心焙各一兩熟乾地黃焙人參白茯苓去黑皮甘草炙銼各三分當歸銼焙芍藥芎藭桂去粗皮遠志去心各半兩上一十一味粗搗篩每服三錢匕水一盞入生薑半分拍碎棗二枚擘破同煎至五分去滓空心溫服日晚再服治發背癰疽已潰排膿生肉當歸散方當歸銼焙桂去粗皮人參防風去叉各一兩芎藭厚朴去粗皮生薑汁炙甘草炙銼白芷桔梗銼炒各半兩上九味搗羅為細散每服二錢匕空心溫酒調下日晚再服治發背已潰痢下不住白石脂湯方白石脂炮龍骨炮各一兩當歸銼焙桔梗銼炒各半兩女萎白頭翁各一分黃連去須半兩乾薑炮裂甘草炙銼各三分上九味粗搗篩每服三錢匕水一盞煎至五分去滓空心溫服日午晚後各一服灸發背後服大黃湯方大黃朴硝各三錢上二味粗搗篩水一盞濃煎熱服即瀉出毒氣治發背先穿破出膿水不住傷外風冷毒焮痛淋洗當歸湯方當歸銼焙甘草炙銼芍藥葛根銼細辛去苗葉黃柏去粗皮麻黃去根節苦參白芷桂去粗皮蜀椒去目並閉口者炒防風去叉各一分上一十二味粗搗篩以水六升煎取三升濾去滓溫洗瘡上日再治發背癰疽已潰積毒惡肉未去豬蹄湯淋洗方豬蹄一隻黃耆黃連去須芍藥黃芩去黑心各一分狼牙根薔薇根各半兩上七味銼碎先以水煮豬蹄令熟取汁五升下藥煎至三升去滓放溫淋洗瘡候水冷即貼蓯蓉膏痛不止加當歸半兩甘草半兩和煎洗瘡治發背癰疽已潰不生肉暖肌干瘡蓯蓉膏方肉蓯蓉去皴皮半夏生銼熟乾地黃各一兩當歸蜀椒去目並閉口者炒出汗細辛去苗葉烏喙去皮蛇銜草白芷甘草桂去粗皮各半兩薤白七莖豬脂二斤上一十三味除豬脂外銼碎以醋半升拌藥一宿先熬脂令沸次下諸藥煎候白芷赤黑色漉出綿濾瓷合盛取塗瘡上日三次立效治發背潰後毒氣未散膿不絶露蜂房散方露蜂房二兩燒灰亂髮灰一兩蛇皮灰三分赤小豆二兩炒熟川大黃三兩半銼研微炒玄參一兩半子芩二兩半川芒硝三兩半上八味搗羅為細散每服二錢匕煎黃耆湯調下不計時候治發背潰後膿水不絶托裡生肌散方川芎二兩黃耆二兩銼白芷半兩赤芍藥一兩桂心三分人參半兩去蘆頭丁香半兩當歸一兩上八味搗篩為散每服二錢匕粥飲調下治癰腫發背惡瘡生肌後用力勞動努傷出血不止麒麟竭散方麒麟竭半兩黃連三分檳榔半兩黃柏半兩銼白芨半兩訶黎勒皮一分上六味搗羅為細散雞子白調塗瘡口上以白薄紙貼之藥干即換忌用力勞動治癰疽發背瘡腫或已潰或未潰連翹飲方連翹山梔子仁黃耆銼炒防風去叉升麻羚羊角鎊漏蘆去蘆頭甘草炙銼大黃銼炒枸杞根皮各一兩上一十味粗搗篩拌令勻每服五錢匕用水一盞半煎取八分去滓空心溫服治發背發腦疼痛侵潰黑錫煎方黑錫一斤先熔令浮乘熱研成泥以無灰酒一斗煎錫至三升瓷瓶中盛每服一盞調生甘草末二錢匕日三服甚者五七遍瘥
