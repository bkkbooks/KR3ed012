body:
  text: 卷第一百三十一癰疽發腦統論論曰癰疽者乳石之疾多發於陽部故在背則發腑俞之間在頭則發腦以頭者諸陽所會而足太陽之經絡腦故也然腦為髓海精血之所湊而腦戶風府啞門三穴不可妄行灸刺令人有喑啞之病灸刺猶不可況癰疽之所發乎古人謂五發之病背腦為重始發皮膚若黍米然赤腫傍焮耳項痛楚寒熱當急治之稍縱不治則毒氣深入銷鑠腦髓化為膿血不可及已故經曰癰疽不得頃時回發腦論曰發腦者六腑不和經絡否澀氣血不行壅結所成也此皆臟腑蘊積熱毒或乳石發動毒氣上攻於腦發於皮膚頭如黍米四畔焮赤腫硬遍於耳項寒熱疼痛若不急治毒氣傷於血肉血肉腐壞化為膿水從腦中出血肉既竭必致危殆治發腦及一切熱毒氣結硬腫痛通利臟腑壅滯大黃丸方大黃二兩銼醋浸一炊久慢火炒令熟枳殼去瓤麩炒一兩牽牛子二兩半微炒一半生用一半木香生銼青橘皮湯浸去白焙各半兩皂莢伍挺不蚛者椎碎酒一升浸挼取汁綿濾過上六味搗羅五味為末取皂莢汁於銀鍋內慢火煎成膏入藥末和搗百餘杵丸如梧桐子大食前蔥茶下三十丸快利為度治發腦成癰及熱毒瘡腫宜貼黃連餅子方黃連一兩乳香一兩薰陸香一兩雄雀糞四十九粒尖細者是上四味搗羅為細散用蔓荊根二兩洗淨漉去水細切搗如泥若腫甚即更用蜀葵根二兩入前藥四味合搗調勻即取出於瓷器中貯之可腫頭捻作餅子厚二分許貼之干即易之治發腦結腫止痛散方木香二兩紫葛一兩半銼檀香三分川朴硝二兩上四味搗羅為細散以溫漿水調如麵糊塗在絹上攤貼於腫痛處候乾即再貼以瘥為度治發腦已穴膿出後痛悶轉甚熱亂腦中若車馬走動痛楚不可忍犀角散方石膏碎犀角鎊升麻芍藥各一兩甘草炙半兩黃耆細銼二分木通銼一兩半上七味粗搗篩每服五錢匕水二盞煎至七分下朴硝一錢匕濾去滓空心溫服日晚再服未愈更入玄參三分去黃耆治發腦瘡腫焮赤疼痛煩躁沉香湯方沉香三分麥門冬去心焙赤芍藥玄參甘草生銼枳實麩炒升麻前胡去蘆頭大黃銼炒生乾地黃焙各一兩犀角鎊三分麝香研一分葳蕤黃耆細銼各半兩上一十四味除麝香外粗搗篩每服四錢匕水一大盞煎至七分去滓入麝香少許溫服不拘時治癰發腦拔去瘡中毒羊桃根散貼方羊桃根銼硝石研凝水石研各一兩天靈蓋慢火燒煙絶木香白蘞各半兩上六味搗羅為散清水調如糊攤於故帛上貼之干即易癢則瘥治發腦始結疼痛妨悶欲成癰疽熁之令內消方硝石研二兩木通銼紫檀香甜葶藶隔紙炒白蘞莽草各一兩大黃三兩上七味搗羅為末每用漿水旋調得所塗於腫上干即易治腦疽初生如黃枳實破後如盞底深半寸許乳石散方花乳石研赤石脂研滑石研爐甘石研密陀僧研各半兩乳香研一分上六味搗研為細散未破者醋調敷之已破者即干貼治癰疽腫疼發腦發背方柳樹上白木耳黃連去須乳香杏仁去皮尖各一分鹽花少許新蔓荊根一握不得用隔旬者如無以菘菜代之蛇床子少許上七味搗羅為末似覺有腫以溫水調敷干即易之發背論曰發背者熱毒之氣發於背俞為癰疽是也此內本於五臟外傳諸腑故熱氣攻發必生於腑俞之間得之乳石發動及肥甘滋味之過臟腑壅熱經絡為之不通毒氣凝滯必因俞穴而出是以服石之人於居處衣食嗜欲喜怒尤宜節慎一有過舉則毒氣乘隙而發初如芥粟治之稍緩則盈尺寸而難圖故始覺熱搏於分肉痛傷於經絡宜速治之蓋其脈不通則腫毒增甚經所謂營氣不從逆於肉理乃生癰腫是也血敗肉腐為患不一實則為癰浮則為腫深則為疽然發於背者兩胛間初起甚微或癢或痛往往忽之數日遂致不救昔人治此始則度其腫之正中而灸之壯數逾百使惡氣外出次以藥疏利腑臟決其邪毒則有可治之理治發背腫癰疽惡風結膿血連翹散方連翹子獨活去蘆頭木香射干各三分甘草炙銼桑寄生銼升麻雞舌香沉香乳香研大黃銼炒各一兩一分麝香研一分上一十二味粗搗篩每服五錢匕水一盞半煎至八分入淡竹瀝半合去滓空心溫服快利三五行為度未利再服治發背癰腫消膿桔梗散方桔梗去蘆頭炒木占斯防風去叉甘草炙銼敗醬厚朴去粗皮薑汁炙桂去粗皮人參細辛去苗葉乾薑炮各一兩上一十味搗羅為散每服二錢匕空心溫酒調下日三以瘥為度治初發背上似琴絃抽痛有頭射干湯方射干犀角鎊升麻玄參黃芩去黑心麥門冬去心焙大黃銼炒各一兩山梔子仁半兩上八味粗搗篩每服五錢匕水一盞半淡竹葉二七片煎至八分入芒硝末一錢匕去滓空心溫服快利三兩行為度未利再服治初發背上似琴絃抽痛有頭犀角湯方犀角鎊人參黃芩去黑心山梔子仁木通銼連翹升麻芍藥各三分甘草炙銼大黃銼炒各半兩上一十味粗搗篩每服五錢匕水一盞半煎至八分去滓空心溫服日晚再服治發背乳癰已服利湯後服此麥門冬湯方麥門冬去心焙黃耆銼芍藥生乾地黃各一兩前胡去蘆頭黃芩去黑心升麻遠志去心栝蔞去皮各三分當歸半兩小麥一合上一十一味粗搗篩每服五錢匕水一盞半棗二枚擘破生薑一棗大拍碎竹葉二七片同煎至八分去滓空心溫服日晚再服治發背人參當歸散方人參當歸密陀僧沒藥雄黃各半兩丹砂一錢栝蔞二個去瓤取子生用上七味搗研為散每服二錢匕用甘草煎酒放溫調下日三治五毒發背金星酒方金星草和根淨洗慢火焙乾四兩甘草一錢上二味搗羅為末分作四帖每帖用酒一升煎三兩沸後更以冷酒二升相和入瓶器中封卻時取飲之治發背癰疽一切惡毒瘡腫去毒散方車螯紫唇光厚者一個以鹽泥固濟煅赤去泥上一味為細末每服三錢匕入膩粉一錢匕甘草末二錢匕和勻別用栝蔞一枚細銼以酒二盞慢火煎及一盞去滓於五更初溫前酒調下取下黏滑惡物即是病根本也治發背金針散方皂莢針春時取一半青一半黑者上一味不拘多少曝乾搗羅為散先任意飲食訖用藥三錢匕酒調服之立瘥未退再服治發背鉛酒方黑鉛一斤甘草炙銼三兩上二味用酒一斗置一空瓶在旁先以甘草入酒中然後熔鉛投之卻濾出酒在空瓶內取鉛依前熔投如此九度並甘草去之留酒恣飲醉寢即愈治發背欲結不結四肢寒熱消毒散方車螯一個可盛二兩硝者朴硝二兩上二味以硝入車螯內濕紙裹黃泥固濟麻皮纏之煅赤候冷去泥同研如面將絹鋪地薄攤藥末於上盆蓋一食久入乳香地龍末各一分白殭蠶甘草末各半分和勻每服半兩酒調去滓服能飲酒者多與之其滓塗患處一食久即轉下惡物只兩服或消或破別服補藥治發背熱盛速用此止痛藥方金櫻根洗去粗皮銼搗一盞生甘草半兩同杵用水三碗煎至一碗半入酒一碗或一盞更煎至一碗又入童子小便一碗煎至八分碗去滓旋入銀盞內溫服取盡如心中覺逆食少白梅則止次服後藥大黃生甘草生各一兩麝香研一字木香一分丹砂研一錢鬼腰帶根洗銼金櫻根洗銼各半碗上七味都用水五碗煎至兩碗半入酒一碗半更煎至一碗去滓旋入銀盞內溫服令盡取下惡物如覺瘥即去甘草大黃余藥依前分兩入水四碗煎至兩碗入酒一碗更煎至一碗去滓旋入銀盞內溫服令盡如未瘥更依前方合一料服之無有不瘥者若瘡已破用生肌膏藥貼及摻後藥斂瘡口龍骨散方龍骨煅赤地上去火毒研赤芍藥為末各半兩鉛丹一分胡粉半錢上四味同研勻細先以蔥湯洗瘡後拭乾以藥摻之治發背瘡如葡萄破後瘡孔無數狼毒膏方狼毒藍根龍膽各半兩定風草一兩乳香一錢水銀粉抄一錢匕上六味為末蜜調成膏攤帛上貼瘡治背癰如𨫼底又如蒲扇疼痛不止藍根膏方板藍根黃芩去黑心黃連去須大黃各一兩白芨一分乳香半兩上六味搗研為末用新汲水調成膏量大小貼之日四夜二治一切發背救生膏方密陀僧碎炒黃柏傍根金州厚者用黃蠟一彈子大火炙塗盡為度各二兩烏賊魚骨白者去甲半兩以上三味搗研極細膩粉半錢上四味和勻每用新汲水調攤紙上先令患人口溫酸漿水洗瘡然後貼每日一換治發背疼痛日夜不可忍塗敷大黃膏方大黃銼雄黃研芎藭黃連去須白芷檳榔銼當歸切焙木香桂去粗皮黃柏去粗皮芍藥附子去皮臍乳香研麒麟竭各半兩雞舌香麝香各一分豬脂一斤上一十七味搗研十六味為末拌勻先於銀器內熬豬脂令沸去筋膜下諸藥末調成膏塗患處日三上以瘥為度治發背瘡神金膏方白及密陀僧研甘草黃柏去粗皮黃連去須膩粉各半兩麝香研一字上七味搗研為末用津唾調成膏以無灰白薄紙看瘡大小塗紙上貼之無力即換治發背金錢膏方楸葉五斤如無即用楸白皮銼馬齒莧二斤去根切上二味以水五升熬至一升去滓入鐺內以柳枝攪熬如餳盛在瓷器內先以荊芥湯洗瘡次用雞翎掃藥於瘡上令勻以薄紙貼之更用酒調二錢匕服之治發背癰瘡化毒散方白礬灰研鉛丹研密陀僧研木鱉子仁各一兩上四味同入瓷合煅赤放冷地上紙襯盆蓋一時辰細研以菜子油調貼其冷如水治發背瘡腫痛牛齒膏方水牛牙齒煅赤太陰玄精石各一分乳香一錢研上三味搗研為末每用緋絹量瘡大小剪以津唾調藥攤絹上貼之治發背瘡衝破疼痛不可忍麝香散方麝香研半錢蒺藜子紫背荷葉各半兩上三味搗研為散每量瘡大小臨時干貼瘡上治發背生肌肉止痛五倍子散方五倍子地龍去土黃連去須乳香研各一分木香半錢密陀僧檳榔銼各一錢上七味搗研為散每用少許干貼瘡上治發背熱毒結聚焮赤疼痛消腫解毒金花散方雌黃研細三分黃連九節者半兩檳榔銼麝香各一分鬱金大黃各半兩上六味搗羅四味為散入麝香雌黃同研勻細每取生油調如糊塗患處日二上即差治發背五靈脂散方五靈脂半兩烏賊魚骨去甲一兩上二味搗研為散凡患者初覺時以水調掃腫處如已大作者入醋面同調敷之治發背瘡黃石散方粗黃石如鵝卵大上一味猛火煅赤投醋中因有屑落醋中再煅再投石盡為度取屑曝乾搗散以醋調敷背上無不愈治發背成瘡龍葵根散方龍葵根銼一兩麝香研一分上二味先將龍葵根搗羅為末入麝香同研令勻水調塗於瘡上治發背癰疽瘡金粉膏方錫四兩用板瓦盛炭火安錫在上扇之候錫成灰研末密陀僧四兩入在罐子內以盞子蓋口鹽泥固濟勿令透氣用炭火煅不聞藥氣為度取出放冷上二味同研極細量瘡大小臨時入膩粉少許以雞子黃調如膏攤在瘡上以緋帛蓋治發背癰疽已潰未潰豉餅灸方豉上一味研細入水和熟如泥量腫大小捻餅子厚三分蓋於腫上當頂已有孔穴勿復之安艾炷於上灸令溫熱不可破肉痛急易之未潰者內消已潰者汁出瘥如不痛一日二日灸之治發背已結成膿栝蔞塗方生栝蔞根上一味細銼搗研如糊塗之日三五度即瘥治發背瘡癰疽桃花汁方桃花不拘多少上一味於平旦承露採取以釅醋研絞去滓取汁塗敷瘡上有蟲即出無花但桃葉亦得以臘月豬脂和塗亦佳治發背瘡腫方白麵上一味取泥拌和圍腫四畔令童子七人尿圍中浸腫處即瘥又方新馬糞上一味厚塗腫上干即易之亦療髮乳又方益母草上一味爛搗絞汁三合服之滓敷瘡上熱即易之治發背乳香貼方乳香研黃蠟好者上二味等分同入銚子熔化瀉入水內斟酌瘡大小取劑再於火上熔化攤於帛上或紙上貼之不住以手按令著肉為此藥易干故也一日三易腫消痛止如已有頭欲破者亦漸縮減治發背麥餅方大麥炒熟九兩甘草生用三兩上二味