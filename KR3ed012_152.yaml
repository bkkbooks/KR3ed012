body:
  text: 卷第一百五十二帶下論曰帶下有三十六種名雖不同所致則一蓋婦人衝任為經脈之海上為乳汁下為月事血氣和平則生育之道得矣苟乖保養風寒乘虛襲於胞絡衝任不能循流血氣蘊積冷熱相搏故成帶下也冷則色白熱則色赤冷與熱並則赤白雜下間有五色者各隨五臟虛損而應焉治婦人帶下漏血不止芎藭湯方芎藭當歸焙黃耆銼乾薑炮芍藥吳茱萸黑豆同炒甘草炙銼各一兩熟乾地黃焙二兩上八味粗搗篩每服三錢匕水一盞煎至六分去滓食前溫服日三治婦人帶下三十六種不同桑寄生湯方桑寄生炙芎藭艾葉炙各一兩當歸焙二兩白膠炙燥一兩半上五味粗搗篩每服三錢匕水半盞酒半盞同煎至七分去滓食前溫服日三若服此湯口乾渴者加茅根切二合生地黃一兩麥門冬去心一兩治月經不調變為帶下桂心飲方桂去粗皮芍藥各一兩虻蟲去翅足炒水蛭微炒硝石土瓜根面塵微炒大豆續斷牡丹去心當歸炙各半兩野狐肝焙乾一分桃仁去皮尖雙仁炒一百粒上一十三味粗搗篩每服三錢匕水一盞煎至七分去滓食前溫服日三治帶下久不差白馬蹄散方白馬蹄炙黃一兩半龜甲醋炙鱉甲醋炙去裙襴各二兩牡蠣煅三分上四味搗羅為散每服二錢匕食前溫酒調下日三治婦人帶下龍骨散方龍骨乾薑炮各一兩當歸燒禹餘糧煅醋淬五七遍阿膠炙燥續斷各二兩牛角䚡炙焦三兩上七味搗研為散每服三錢匕食前溫酒調下日三治婦人帶下腹痛柏葉散方柏葉炙黃二兩芎藭芍藥白芷乾薑炮牡丹去心各一兩當歸焙半兩上七味搗羅為散每服二錢匕食前溫酒調下治婦人帶下並腳弱補骨脂煎方補骨脂炒安息香研各一兩胡桃仁二兩上三味搗研極細煉蜜調如稀餳每服半匙空心溫酒調下治婦人帶下久不瘥引下惡水方乾薑炮末鹽藜蘆炙杏仁去皮尖雙仁炒研各一兩青礬煉汁盡半兩上五味搗研極細煉蜜和劑捻如梔子大以綿裹納陰中即惡水下治婦人帶下五色馬護干散方馬護干上一味燒灰細研每服一錢匕食前溫酒調下日三治婦人帶下赤白是虛損因風得之或房室無忌得之桑耳湯方桑耳微炒三分芍藥黃耆熟乾地黃焙阿膠炙燥各一兩蛇黃煅醋淬五遍燒末蒲黃微炒白堊煅赤各一兩半上八味粗搗篩每服三錢匕水一盞半入豉半合煎至八分去滓食前溫服日三治婦人白帶下茱萸散方吳茱萸湯洗焙炒半兩烏賊魚骨去甲炙芍藥銼炒桑寄生炙黃柏葉炙各一兩禹餘糧煅醋淬七遍桑耳炙各一兩半生乾地黃二兩上八味搗羅為散每服二錢匕空心清米飲調下治婦人五色帶下不止神效三良散方吳茱萸黑豆同炒寒食麵乾薑炮各一兩上三味搗羅為散每服二錢匕食前溫酒調下日三治婦人帶下若挾熱者多下赤膿黃連散方黃連去須灶突中煤各一兩上二味搗羅為散每服二錢匕食前溫酒調下日三治婦人白帶不止白薇丸方白薇揀一兩赤芍藥烏賊魚骨去甲各半兩上三味搗羅為末煉醋一盞熬成膏丸如梧桐子大每服二十丸食前熱水下日再治婦人赤白帶下經年不瘥漸漸黃瘦芍藥散方白芍藥牡蠣煅桂去粗皮附子炮裂去皮臍黃耆銼龍骨鱉甲醋炙芎藭各一兩乾薑炮三分白芷半兩熟乾地黃焙一兩半上一十一味搗羅為散每服二錢匕食前溫酒調下治婦人赤白帶下不止鹿角膠丸方鹿角膠炙燥桑耳微炒乾薑炮牛角䚡炙鹿茸去毛酥炙各一兩半赤石脂白龍骨附子炮裂去皮臍各一兩上八味搗羅為末煉蜜和丸如梧桐子大每服三十丸食前黃耆湯下治婦人白帶不止面黃體瘦繞臍冷痛當歸散方當歸銼炒桂去粗皮白龍骨白朮鹿角膠炙燥各一兩附子炮裂去皮臍二兩上六味搗羅為散每服二錢匕食前粥飲調下治婦人帶下五色久不止禹餘糧散方禹餘糧煅醋淬七遍鹿茸去毛酥炙牡蠣煅研赤石脂各二兩阿膠炙燥當歸銼炒白芍藥蒲黃各一兩烏賊魚骨燒赤一兩半上九味搗羅為散每服二錢匕食前溫酒調下治婦人赤白帶下久不止腰腿疼痛面黃體瘦四肢少力桑寄生散方桑寄生桑耳炙當歸銼炒各一兩白芍藥芎藭各三分烏賊魚骨燒灰柏葉炙各一兩鱉甲醋炙一兩半禹餘糧煅醋淬七遍二兩吳茱萸湯洗焙炒半兩上一十味搗研為散每服二錢匕食前溫酒調下漏下論曰漏下之病經血淋瀝不斷是也夫衝任之脈所至有時非時而下猶器之津泄故謂之漏下蓋由血虛氣衰不能約制又有瘀血在內因冷熱不調致使血敗其色或赤如豆汁黃如爛瓜黑如衃血青如藍色白如膿涕五色隨五臟虛損而漏應焉治婦人漏下血淋瀝不斷身體黃瘦不思飲食艾葉散方艾葉炒阿膠炒令燥赤石脂龍骨各一兩縮砂仁半兩附子炮裂去皮臍當歸切焙硫黃研各三分熟乾地黃焙一兩半吳茱萸湯浸焙乾炒半兩上一十味細搗羅為散每服二錢匕米飲調下不拘時治婦人血漏日久不止或經脈不斷或暴下血不止烏金散方烏賊魚骨去甲棕櫚羊角尖蠶蛻新綿各一兩白礬半兩乾薑一分上七味都入一瓶內用泥固濟候乾以大火煅通赤放冷取出細研入麝香一錢再研勻每服二錢匕溫酒調下空心食前服治婦人內挾瘀血經候淋瀝不斷或多或少四肢煩倦沉香牡丹丸方沉香銼一兩半牡丹皮赤芍藥當歸切焙桂去粗皮芎藭黃耆銼人參白茯苓去黑皮山芋白芷吳茱萸湯浸焙乾炒巴戟天去心陳橘皮湯浸去白焙木香牛膝去苗酒浸切焙枳殼去瓤麩炒肉豆蔻去殼厚朴去粗皮生薑汁炙乾薑炮白龍骨各一兩上二十一味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心日午臨臥溫酒下加至三十丸治婦人漏下淋瀝不止赤石脂散方赤石脂煅赤側柏微炙烏賊魚骨去甲燒灰各一兩上三味搗羅為散每服二錢匕溫米飲調服日二治婦人漏下淋瀝不絶槐蛾散方槐蛾不以多少燒灰上一味細研為散每服二錢匕溫酒調下食前治婦人赤白漏下淋瀝不止馬蹄湯方白馬蹄鎊炒令焦二兩禹餘糧煅醋淬七遍龍骨烏賊魚骨去甲炙各一兩半甘草炙銼牡蠣燒研白殭蠶炒赤石脂附子炮裂去皮臍熟乾地黃焙當歸切焙各一兩上一十一味粗搗篩每服三錢匕水一盞煎至一分去滓溫服食前治婦人血漏點滴不斷地黃飲方生地黃五兩細辛去苗葉二兩上二味銼如麻豆大每服三錢匕水一盞煎至七分去滓溫服日三食前治婦人猝漏下先多後少日久不斷庵䕡飲方庵䕡子微炒熟乾地黃焙蒲黃微炒當歸切焙各二兩上四味粗搗篩每服三錢匕水一盞煎至七分去滓溫服空心日午臨臥治婦人漏血不止日久虛損蒲黃散方蒲黃微炒二兩鹿茸酒浸去毛炙當歸切焙各一兩上三味搗羅為散每服二錢匕溫酒或米飲調下空心日午臨臥服治婦人血漏非時而下淋瀝不斷蒲黃阿膠湯方蒲黃微炒一兩鹿茸酒浸炙去毛當歸切焙各二兩阿膠炙令燥烏賊魚骨去甲各一兩半生地黃汁一碗上六味除地黃外粗搗篩每服二錢匕水一盞地黃汁半盞同煎取一盞去滓溫服空心治婦人漏下不止鹿茸散方鹿茸酒浸炙去毛阿膠炙燥烏賊魚骨去甲各一兩半當歸切焙蒲黃微炒各一兩上五味搗羅為散每服二錢匕溫酒或米飲調下日三服治婦人漏下不止或少或多遂致常漏身體虛瘦飲食減少困怠無力龍骨散方龍骨灶中黃土赤石脂牡蠣燒研烏賊魚骨去甲桂去粗皮禹餘糧煅醋淬五七遍各一兩上七味搗羅為散每服二錢匕溫酒或米飲調下空心日午臨臥治婦人漏下或赤或白鱉甲散方鱉甲醋炙牡蠣燒研各一兩上二味搗羅為散每服二錢匕溫酒或米飲調下日三服治婦人漏下赤白日久不止桑耳散方桑耳銼碎二兩鹿茸酒浸炙去毛一兩上二味搗羅為散每服二錢匕溫酒或米飲調下空心日晚各一治婦人赤白漏下日月浸久淋瀝不斷桑耳續斷散方桑耳炙續斷熟乾地黃焙各二兩阿膠炙燥柏葉微炙芎藭赤石脂各一兩半丹參一兩槲葉二兩半地榆銼碎二兩小薊根鹿茸酒浸炙去毛牛角䚡燒灰各一兩半鱉甲醋炙二兩當歸切焙牡蠣粉熟艾炒各一兩半上一十七味搗羅為散每服二錢匕溫酒調下米飲亦得不拘時治漏下黑色乾漆散方乾漆炒令煙盡大黃銼炒細辛去苗葉桂去粗皮各一兩甘草炙銼三分上五味搗羅為散每服二錢匕粥飲調下溫酒亦得食前服治婦人漏下赤白白朮散方白朮銼炒黃柏去粗皮炙各一兩半白薇半兩上三味搗羅為散每服二錢匕溫酒或米飲調下治婦人帶下白色續斷散方續斷柏葉芎藭禹餘糧煅醋淬三五遍熟艾炒阿膠炙令燥赤石脂牡蠣燒研生乾地黃切焙當歸切焙丹參鹿茸去毛酥炙鱉甲醋炙各一兩半鮀甲醋炙地榆銼各二兩上一十五味搗羅為散每服二錢匕米飲或溫酒調下不拘時治婦人漏下白色白蘞散方白蘞三分狗脊去毛半兩鹿茸酒浸炙去毛一兩上三味搗羅為散每服二錢匕米飲調下溫酒亦得日三五服治婦人漏下黃色黃連散方黃連去須三分黃芩去黑心生乾地黃焙䗪蟲炙焙各一分桂去粗皮大黃銼炒各半兩上六味搗羅為散每服二錢匕溫酒或米飲調下日三兩服治婦人漏下赤白淋瀝不斷黃耆湯方黃耆銼一兩半阿膠炙燥二兩甘草炙銼一兩大棗去核五十顆上四味粗搗篩每服三錢匕水一盞煎至七分去滓溫服空心食前經血暴下論曰婦人經血謂之月事者常以三旬而一見也血氣和平則所下應期若衝任氣虛則經血不能制約故令暴下乃至數升治婦人血傷不止腰腳痠重倦怠無力心煩渴燥面目虛浮生乾地黃散方生乾地黃焙陳橘皮去白炒甘草炙銼白芷酸石榴皮牛角䚡灰續斷人參地榆銼炙一兩上九味搗羅為散每服二錢匕米飲調下食前日二服以止為度治婦人經血不止心多驚恐紫石英湯方紫石英細研人參桂去粗皮白茯苓去黑皮各一兩甘草炙銼二兩赤小豆二百粒麥門冬去心焙三兩上七味粗搗篩每服三錢匕水一盞棗二枚擘同煎七分去滓溫服食前治婦人經血下不止臍下虛痛當歸湯方當歸切焙赤芍藥銼炒各一兩半禹餘糧醋淬五七遍麒麟竭黃柏微炙銼地榆銼碎炒各一兩生乾地黃焙二兩上七味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時日三服治婦人經血下不止劉寄奴湯方劉寄奴二兩半赤芍藥銼炒二兩白茯苓去黑皮一兩芎藭當歸切焙各一兩半艾葉炒四兩上六味粗搗篩每服三錢匕水一盞煎七分去滓溫服空心食前日再治婦人因月水來延引不止遂成血傷蒲黃湯方蒲黃輕炒當歸切焙柏葉炙令黃色艾葉炙焙各一兩伏龍肝一兩半生乾地黃焙黃芩去黑心各二兩上七味粗搗篩每服三錢匕水一盞煎七分去滓溫服空心食前日二治婦人月經過多或猝曝血傷不止或色如肝或成片者小薊根湯方小蘇根三兩當歸微炙阿膠炙令燥芎藭青竹茹續斷地榆根各一兩半伏龍肝二兩上八味粗搗篩每服三錢匕水一盞煎七分去滓溫服日三治婦人經血不止狗膽煎方狗膽一枚用汁鐺墨二錢鍋底尖上煤是上二味一處攪拌分作兩服煎當歸酒調下治婦人經血久不得止槲葉飲方槲葉脈二兩半炙銼地榆二兩銼阿膠炒令燥青竹茹各一兩上四味粗搗篩每服三錢匕水一盞煎七分去滓溫服日二夜一治婦人月候過多血傷漏下不止蒲黃丸方蒲黃三兩微炒龍骨二兩半艾葉一兩上三味搗羅為末煉蜜和丸梧桐子大每服二十丸煎米飲下煎艾湯下亦得日再治經血不止如聖散方棕櫚一兩燒黑灰烏梅一兩乾薑一兩並燒過存五分性上三味搗羅為散每服一錢匕烏梅湯調下食前服久患甚者不過三服治婦人經血不止防風散方防