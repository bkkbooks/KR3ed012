body:
  text: 卷第四十霍亂嘔噦論曰霍亂嘔噦者陰陽冷熱不調清濁相干胃氣不和風冷加之故嘔嘔不止則噦昔人謂嘔噦發於下焦之間是也此甚於嘔吐治宜降氣於下令上下通達升降無礙則病可愈治霍亂嘔噦手足冷脈絶四逆湯方人參乾薑炮甘草炙各三兩附子炮裂去皮臍二兩上四味㕮咀每服三錢匕水一盞煎至七分去滓溫服治霍亂嘔噦手足冷當歸湯方當歸切焙桂去粗皮吳茱萸湯洗焙乾炒各三兩細辛去苗葉木通銼甘草炙乾薑炮各二兩上七味粗搗篩每服五錢匕水一盞酒半盞大棗二枚去核煎至一盞去滓溫服治霍亂嘔噦不止橘皮湯方陳橘皮湯浸去白焙二兩甘草炙一兩枇杷葉拭去毛炙二兩上三味粗搗篩每服三錢匕水一盞生薑三片煎至七分去滓溫服如人行五七里再服治霍亂氣厥嘔噦不得息半夏湯方半夏湯洗七遍焙二兩甘草炙人參前胡去蘆頭桂去粗皮各一兩上五味粗搗篩每服五錢匕水一盞半生薑一分切豉五十粒煎至七分去滓溫服治霍亂心煩乾嘔蘆根湯方蘆根三兩人參一兩半薤白洗切七莖枇杷葉拭去毛一兩上四味銼如麻豆每服五錢匕水一盞半煎至一盞去滓空心溫服治霍亂猝噦枳實湯方枳實去瓤麩炒二兩上一味粗搗篩每服三錢匕羊乳一盞羊脂一彈子大煎至七分去滓熱服不拘時治霍亂猝噦糯米粉方糯米粉一升上一味每服三錢匕以井華水調下不拘時治霍亂嘔噦生薑飲方生薑二兩切上一味以水三盞煎取一盞半去滓分溫三服不拘時霍亂下利論曰霍亂者由冷熱之氣變亂於腸胃之間搏於陰經則腹痛而腸鳴故為霍亂下利之病然赤為熱白為寒冷熱相搏赤白交下寒甚則青黑不已則轉筋之證生焉治霍亂腹中冷氣下利木瓜丸方木瓜乾者一兩當歸切焙熟艾微炒桂去粗皮各半兩陳橘皮湯浸去白焙三分木香人參各半兩赤石脂二兩白朮厚朴去粗皮薑炙銼訶黎勒皮高良薑各三分上一十二味搗羅為末煉蜜為丸如梧桐子大每服三十丸米飲下空心服治霍亂下焦熱毒利血如鵝鴨肝片不止升麻湯方升麻三分犀角屑地榆去苗各一兩紫草去苗三分蘘荷根銼碎一兩黃芩去黑心三分芭蕉根銼碎焙乾一兩桔梗炒三分梔子仁一兩上九味粗搗篩每服三錢匕以水一盞煎至七分去滓溫服日三夜一治霍亂下焦虛寒大便洞泄小便自利黃柏皮湯方黃柏去粗皮一兩半黃連去須二兩半人參一兩半赤茯苓去黑皮二兩厚朴去粗皮薑汁炙二兩艾葉炒一兩地榆去苗銼一兩半櫸木白皮銼碎焙乾二兩阿膠炙令燥一兩半上九味粗搗篩每服三錢匕水一盞煎至七分去滓空腹溫服日三治霍亂後虛冷腹痛下利不止龍骨湯方龍骨當歸切焙乾薑炮裂甘草微炙人參各一兩附子炮裂去皮臍半兩上六味銼如豆每服五錢匕水一盞半煎至八分去滓熱服日三治霍亂下利不止而渴者白朮湯方白朮厚朴去粗皮塗生薑汁炙三遍當歸切焙人參乾薑炮裂甘草微炙各二兩上六味粗搗篩每服五錢匕水一盞半煎至七分去滓溫服如人行五六里再服治霍亂後水利不止白茯苓丸方白茯苓去黑皮黃柏去粗皮乾薑炮裂各三兩木瓜乾者去瓤一枚切焙上四味搗羅為末以粳米或粟米飲和為丸如梧桐子大曝乾米飲下三十丸日再老小加減亦治諸利治冷利洞泄及赤白滯利石榴湯方酸石榴一枚大者黃連去須一兩乾薑炮二兩上三味㕮咀每服五錢匕以水一盞半煎至一盞去滓入阿膠二片令煬頓服之不拘時治霍亂赤白冷熱等利及暴瀉病勢初發吐瀉不止食入不得並宜服藜蘆丸方藜蘆炙去苗皂莢酥炙去皮子巴豆各一兩去心皮膜炒出油上三味先搗前二味細羅為末與巴豆同研令勻煉蜜為丸如小豆大每旦米飲下一丸取利為度未利稍加之治霍亂下利陳橘皮湯方陳橘皮湯浸去白炒乾高良薑銼各三分厚朴去粗皮薑汁塗炙三遍一兩上三味粗搗篩每服三錢匕生薑半分拍碎水一盞煎至七分去滓溫服日四五服治霍亂水瀉腸胃冷滑訶黎勒丸方訶黎勒二兩以麵裹煨取皮並面為末乾薑炮龍骨赤石脂各一兩上四味搗羅為末以麵糊為丸如梧桐子大每服空心以米飲下二十丸治霍亂下焦虛寒或先血後便此為遠血成利伏龍肝湯方伏龍肝淨揀篩二兩甘草炙一兩乾薑炮裂生乾地黃焙各二兩半黃芩去黑心一兩半牛膝酒浸切焙乾一兩亂髮燒灰一分上七味粗搗篩每服三錢匕生薑一分拍碎水一盞煎至七分去滓溫服日三治霍亂下焦虛寒或便利後見血止血湯方續斷當歸切焙各三兩乾薑炮裂四兩甘草炙二兩生乾地黃焙四兩蒲黃二兩桂去粗皮三兩阿膠炙令燥二兩上八味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日三治霍亂下焦熱毒利如魚腦雜赤血並下臍腹㽱痛不可忍裡急後重香豉湯方香豉微炒二兩梔子仁一兩黃柏去粗皮半兩地榆銼一兩白朮茜根揀淨銼碎各三分上六味粗搗篩每服三錢匕用薤白四寸水一盞同煎至七分去滓溫服日三治霍亂下焦熱結或利下膿血煩痛赤石脂湯方赤石脂四兩烏梅去核炒乾一兩梔子仁半兩白朮一兩半乾薑炮裂一兩升麻一兩半陳倉米微炒半兩上七味粗搗篩每服五錢匕水一盞半煎至八分去滓空腹溫服日三霍亂轉筋論曰霍亂轉筋緣風冷傷於三焦傳於脾胃得冷則陽氣不得宣行致四肢筋絡不得舒緩此蓋中下不足其候冒悶不安脛筋攣結腨肉緊痛反急於上蓋足陽明之經虛膀胱之脈寒也然足陽明之脈其支者起胃下口循腹裡下至氣衝中而合以下髀關抵伏兔下入膝臏中下循髀外廉足太陽之經其脈循髀外後廉下合膕中下貫腨內是動則病髀不可回轉膕如結腨如裂治宜調胃腑而溫膀胱之經如此則小水得宣寒冷自下胃腑溫和霍亂可愈轉筋之疾無由作也治霍亂轉筋胡椒湯方胡椒吳茱萸湯洗淨炒肉豆蔻去殼各半兩人參桂去粗皮乾薑炮各一兩半上六味粗搗篩每服五錢匕以水一盞半煎至八分去滓溫服治霍亂轉筋蜀椒湯方蜀椒去目並閉口者炒出汗一分烏梅七枚去核熬上二味㕮咀以水二盞煎取一盞再入蜜一匙頭煎兩沸空腹頓服之老人亦可服治霍亂轉筋肉豆蔻湯方肉豆蔻去殼半兩人參二兩桂去粗皮吳茱萸湯洗淨炒各一兩半上四味粗搗篩每服三錢匕入生薑三片水一盞煎至六分去滓溫服治霍亂轉筋杜仲湯方杜仲去皮銼炒一兩一分桂去粗皮一兩甘草炙銼一分上三味粗搗篩每服三錢匕生薑三片水一盞煎至六分去滓溫服治霍亂轉筋悶絶欲死雞白湯方雞糞白一合熬胡椒二十粒高良薑桂去粗皮白朮各一兩一分木瓜二兩生薑切焙六分上七味銼如麻豆每服五錢匕水一盞半煎取八分去滓不拘時溫服治霍亂轉筋吐瀉不止木瓜湯方木瓜切一兩青銅錢四十九文烏梅五枚拍碎炒上三味以水二盞煎至一盞去滓分三服細呷治霍亂轉筋脈微而細風寒客於胃吐瀉不止厚朴湯方厚朴去粗皮塗生薑汁炙五度乾木瓜各一兩高良薑香薷陳橘皮湯浸去白焙紫蘇子各半兩上六味粗搗篩每服五錢匕生薑三片鹽少許水一盞半煎至八分去滓溫服治霍亂吐瀉轉筋煩悶蘹香子散方蘹香子炒木香陳橘皮湯去白焙人參各半兩菖蒲切米泔浸一日炒一兩甘草炙銼一分上六味搗羅為散以冷米飲調下三錢匕如人行三里再服治霍亂轉筋不止桃仁煎方桃仁一百枚泡去皮尖雙仁研如面上一味以牛乳五升解如漿水於銅器內盛在重湯內煎瓷器中盛每服空心溫酒調下兩匙治霍亂轉筋入腹欲死生薑酒方生薑五兩切上一味用無灰酒一升煎取八合頓服便瘥治霍亂轉筋入腹或腹中如欲轉雞白湯方雞糞白炒一兩上一味為粗末每服二錢匕以水七合煎三沸去滓頓服勿令病人知治霍亂轉筋淋足附子湯方附子去皮銼一枚蔥半斤拍碎生椒綿裹生薑切碎各一兩上四味以水一斗煎三兩沸入瓷盆中濾去滓以鹽漿水解之冷熱得所淋洗立瘥治霍亂轉筋入腹鹽拓方鹽三合上一味以水五升煎取三升浸青布拓轉筋上治霍亂轉筋苦酒絮裹足方苦酒一斤半上取衣絮納苦酒中煮令溫從轉筋處裹之治轉筋入腹裹足法木瓜二枚切破上以水五升煎取三升以故青布浸湯中用裹轉筋上如無木瓜煎枝二兩亦得治霍亂轉筋方木瓜汁一盞木香末一錢匕上二味以熱酒調下不拘時治霍亂轉筋諸藥不除方胡椒末一分木瓜汁一升硇砂研極細一錢匕上三味將木瓜汁浸椒砂二末攪勻微火熬令稠和丸如梧桐子大每服十丸香薷湯下治胃氣虛霍亂吐瀉轉筋腹痛神聖香薷飲方香薷穗經霜者一兩半厚朴去粗皮黃連去須各二兩扁豆一兩焙上四味先用生薑汁四兩一處搗黃連厚朴二味令細炒成黑色入香薷扁豆二味都粗搗篩每服五錢匕水一盞酒一盞共煎至一盞瓷瓶內蠟紙封沉入井底候極冷並服二服至死者亦可救治霍亂轉筋方糯米二兩為末乾薑炮裂為末甘草生用為末人參為末各二錢上四味拌勻冷水調下三錢匕不拘時霍亂心下痞逆論曰霍亂氣結心下不散則心氣不得下通故字書以痞為否言其不通也然痞為虛按之不痛氣雖妨悶不須駃利唯和調其胃升降其氣則痞氣自散霍亂自寧矣治霍亂心下痞滿半夏湯方半夏湯洗七遍去滑切焙三兩人參二兩赤茯苓去黑皮四兩上三味㕮咀如麻豆大每服三錢匕水一盞入生薑一棗大拍碎煎至六分去滓溫服治霍亂心下結氣連胸背痛及吐酸水日夜不止茯苓湯方赤茯苓去黑皮厚朴去粗皮生薑汁炙吳茱萸湯浸焙炒各一兩人參陳橘皮湯浸去白焙各二兩白朮三兩上六味粗搗篩每服五錢匕水一盞半入生薑三片煎至八分去滓溫服不拘時治霍亂心下痞滿煩嘔不止厚朴湯方厚朴去粗皮生薑汁炙四兩桂去粗皮枳實麩炒去瓤各三兩上三味粗搗篩每服三錢匕水一盞生薑三片煎至六分去滓溫服不拘時腹痛加當歸二兩治霍亂心下氣痞不通木瓜丸方木瓜去皮瓤切焙十枚木香三兩人參一兩半肉豆蔻去皮半兩陳橘皮湯浸去白焙二兩胡椒檳榔銼各三兩吳茱萸湯浸焙炒二兩草豆蔻去皮三兩厚朴去粗皮薑汁炙二兩桂去粗皮一兩蒼朮米泔浸一宿刮去皮焙二兩縮砂去皮高良薑各三兩生薑一斤搗絞取汁上一十五味除生薑汁外為細末取生薑汁拌勻用瓷瓶盛於鍋中以重湯煮一復時取出更搗令勻衆手丸如梧桐子大每服十丸熟水下治霍亂心下痞逆半夏湯方半夏湯洗七遍去滑切焙人參各三兩上二味銼如麻豆每服三錢匕入生薑三片白蜜半匙水一盞煎至六分去滓溫服不拘時治霍亂嘔吐酸水氣結心下吳茱萸湯方吳茱萸湯浸焙炒一兩白朮赤茯苓去黑皮各二兩陳橘皮湯浸去白焙一兩半蓽茇一兩厚朴去粗皮生薑汁炙二兩檳榔銼二兩半人參一兩半大黃銼炒二兩上九味粗搗篩每服五錢匕水一盞半竹茹彈子大生薑三片煎至一盞去滓溫服治霍亂心下痞滿飲食吐逆水穀不化半夏橘皮湯方半夏湯洗七遍去滑切焙陳橘皮湯浸去白焙厚朴去粗皮薑汁炙各一兩人參白朮高良薑各半兩上六味粗搗篩每服五錢匕水一盞半生薑五片大棗二枚去核煎至一盞去滓溫服治霍亂心下痞逆似中惡狀菖蒲湯方生菖蒲一握銼上一味以水同搗取汁一盞銀石器內煎熟分為三服不拘時治霍亂嘔吐涎沫醫反下之心下作痞小半夏湯方半夏湯洗七遍去滑切焙上一味㕮咀每服三錢匕水一盞生薑三片煎至六分去滓溫服霍亂後煩躁臥不安論曰霍亂後煩躁臥寐不安者胃虛余勢未盡穀氣鬱蒸津液內耗血虛氣