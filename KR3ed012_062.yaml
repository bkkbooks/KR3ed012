body:
  text: 卷第六十二膈氣門膈氣統論論曰胸中者氣之府呼吸升降之道也陰陽升降順理則氣道通調胸中乃治喜怒寒熱不調則氣聚於胸而為膈氣夫膈氣有五憂膈恚膈氣膈寒膈熱膈是也憂膈之病胸中氣結煩悶津液不通飲食不下羸瘦無力恚膈之病心下苦實滿噎輒醋心食不消心下痞澀積結在於胃中大小便不利氣膈之病胸脅逆滿咽塞不通噫聞食臭寒膈之病心腹脹滿咳逆膈上苦冷臍腹雷鳴食不生飢熱膈之病臟有熱氣五心中熱口爛生瘡骨煩四肢重唇口乾燥身體頭面手足或熱腰背疼痛胸痹引背水穀不消不能多食羸瘦少氣此五膈為病之證也蓋人之和氣憂思恚怒寒熱食飲悉能傷之致陰陽不和腑臟生病氣痞於胸府之間故曰膈氣諸方之論不一又有十膈證各不同大抵其發之源不越於此也五種膈氣論曰人之胸膈升降出入無所滯礙命曰平人若寒溫失節憂恚不時飲食乖宜思慮不已則陰陽拒隔胸脘痞塞故名膈氣曰憂曰恚曰氣曰寒曰熱五種雖殊其為膈病則一治陰陽氣不升降痞氣膈氣心痛腹痛咽喉噎悶氣道不勻嘔吐痰沫飲食不下大便祕利不定或裡急後重腹痛不可忍此藥養氣消痰溫中散滯緩氣丸木香半兩桂去粗皮半兩人參二兩白朮二兩吳茱萸二兩炒厚朴去粗皮薑汁炙二兩訶黎勒皮二兩附子炮裂去皮臍一兩半阿魏半兩和麵煨熟上九味搗羅為末煉蜜為丸如梧桐子大每服三十丸溫熟水下不計時候治五膈氣胸中煩滿痞塞不通心腹虛脹心下結實飲食不下訶黎勒湯方訶黎勒煨去核木香各一兩人參青橘皮湯浸去白焙各半兩厚朴去粗皮生薑汁炙一兩沉香銼益智去皮桂去粗皮檳榔銼枇杷葉炙去毛蓽澄茄赤茯苓去黑皮高良薑白豆蔻去皮白朮各半兩前胡去蘆一兩甘草炙銼半兩上一十七味粗搗篩每服三錢匕水一盞入生薑三片同煎至七分去滓熱服不以時候治男子婦人五種膈氣及一切氣不思飲食建中丸方白豆蔻去皮一兩胡椒一分蘹香子炒高良薑各三分甘草炙銼陳橘皮湯浸去白焙各一兩蒟醬人參紅豆蔻去皮乾薑炮芎藭藿香葉各半兩上一十二味搗羅為末煉蜜和丸如雞頭大每服二丸溫酒或生薑湯嚼下不計時候治五種膈氣豆蔻散方肉豆蔻去皮三個木香厚朴去粗皮薑汁炙人參赤茯苓去黑皮桂去粗皮各半兩甘草炙銼青橘皮湯浸去白焙各一兩訶黎勒三枚炮去核檳榔二枚銼上一十味搗羅為散每服二錢匕如茶點服若入薑棗同煎亦佳能治氣補勞通血脈益脾胃治五種膈氣通膈散方枳殼去瓤麩炒桂去粗皮甘草炙銼陳曲炒訶黎勒皮白朮陳橘皮湯浸去白焙赤茯苓去黑皮人參乾薑炮京三稜煨銼草豆蔻去皮檳榔半生半熟五味子炒厚朴去粗皮生薑汁炙半夏湯洗了用生薑同搗如泥卻攤在新瓦上用文武火爆令黃色木香郁李仁湯浸退皮麩炒黃各一兩上一十八味搗羅為散每服二錢匕入鹽少許如茶點服不計時候治霍亂吐瀉氣逆結胸膈氣刺痛不思飲食備急沉香散方沉香丁香半生半炒乾薑炮京三稜煨銼蓬莪朮煨銼各半兩藿香用葉木香肉豆蔻去皮桂去粗皮人參赤茯苓去黑皮各一兩高良薑胡椒甘草炮各一分上一十四味搗羅為散瓷合盛每服二錢匕入鹽少許如茶點服不計時候治五膈氣痞心胸噎塞漸致羸瘦五膈散方人參赤茯苓去黑皮厚朴去粗皮薑汁炙枳殼去瓤麩炒桂去粗皮甘草炙銼陳曲炒訶黎勒皮白朮陳橘皮湯浸去白焙乾薑炮京三稜煨銼各一兩檳榔銼木香各一分上一十四味搗羅為散每服二錢匕入鹽點服如脾氣腹脹心胸滿悶每服三錢用水一盞入生薑一塊切棗二枚劈破鹽少許同煎至八分不計時候和滓熱服治五膈氣痞悶腹脅脹滿豆蔻丸方肉豆蔻仁京三稜炮蓬莪朮炮青橘皮湯浸去白焙陳橘皮湯浸去白焙桂去粗皮各一兩檳榔銼木香各半兩牽牛子四兩半生半熟取末二兩上九味搗羅為末以棗肉和丸如梧桐子大每服二十丸食後生薑湯下治五膈氣喘促腹脅脹滿胸膈不快痰逆噁心不思飲食萊蔔木香散方萊蔔子二兩粟米一兩半陳橘皮湯浸去白焙一兩巴豆肥大者三十枚去皮於瓦石器內與上三味同炒候藥焦黑色揀去巴豆不用木香一分上五味搗羅為散用煮萊蔔湯調下二錢匕或以生薑汁煮麵糊和丸如梧桐子大萊蔔湯下十五丸亦得治五種膈氣利胸膈散積滯消腹脹進飲食京三稜丸方京三稜濕紙裹煨碎銼沉香各半兩青橘皮湯浸去白焙鱉甲去裙襴醋炙檳榔銼各一分巴豆五枚去油為霜上六味搗羅為末水煮白麵糊和丸如緑豆大每服五丸食後溫熟水下治五種膈氣胸腹脹悶不能飲食硇砂枳殼煎丸方硇砂無石者別研三分枳殼湯浸去瓤切作片子焙乾取末四兩烏頭炮裂去皮尖為末大黃生為末各一兩同三味末一處拌勻用醋四升銀器內慢火熬成膏入後藥末桂去粗皮五靈脂乾漆炒煙出蓬莪朮煨銼當歸切焙芍藥各一兩牽牛子炒取末三分上一十一味除前膏外搗羅為末入硇砂等膏中於臼內搗一千下和丸如梧桐子大每服二十丸生薑湯下婦人血氣醋湯下不嚼不計時候治一切膈氣妨悶不下食木香訶黎勒湯方木香訶黎勒去核陳橘皮湯浸去白焙各一兩五味子半夏湯洗七遍去滑人參桂去粗皮赤茯苓去黑皮蘆根枳殼去瓤麩炒各三分上一十味銼如麻豆每服五錢匕水一盞半入生薑一棗大切煎取八分去滓溫服治膈氣心腹痞滿全不思食蓽茇飲方蓽茇沉香銼草豆蔻去皮青橘皮去白焙丁香桃仁炒去皮尖大腹銼生薑切炒各一兩訶黎勒皮二兩甘草炙銼枳殼去瓤麩炒各半兩上一十一味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治五膈氣噎滿悶不下食五膈丸方白朮炒木香炮訶黎勒炮去核陳橘皮去白焙昆布洗去鹹水桃仁去皮尖雙仁炒各三分大黃銼桂去粗皮半夏湯洗去滑七遍檳榔銼枳實去瓤麩炒五味子各半兩琥珀研一分上一十三味搗羅為末煉蜜和丸如梧桐子大每服三十丸空心生薑棗湯下治膈氣紫金丹方桂去粗皮訶黎勒煨去核各一兩昆布洗去咸焙桃仁湯浸去皮尖雙仁炒各一兩半木香琥珀研陳橘皮去白焙各三分白朮沉香雞舌香各半兩丹砂別研一分木瓜根銼一兩上一十二味搗研為末再同研勻煉蜜和丸如櫻桃大每服一丸含化咽津或欲作小丸如梧桐子大每服二十丸溫酒下膈氣咽喉噎塞論曰膈氣噎塞者由憂思過甚氣結不通肺胃虛弱氣留肓膜則結滯於胸膈故升降痞塞蓋喉嚨者氣之所以上下若氣塞不通則咽喉噎悶狀若梅核咽納有妨故謂之膈氣咽喉噎塞也況肺氣上通於喉嚨胃脈外連於咽嗌若使上下升降肺胃和平則陰陽調順膈氣自散矣治諸膈氣心胸煩結噎塞不通飲食日減檳榔湯方檳榔銼訶黎勒皮炒蓽澄茄赤茯苓去黑皮人參青橘皮湯浸去白焙甘草炙銼沉香銼麥糵炒厚朴去粗皮生薑汁炙京三稜炮銼白朮等分上一十二味粗搗篩每服三錢匕水一盞生薑二片大棗二枚劈煎取七分去滓溫服日三夜一治膈氣咽喉噎塞咳嗽上氣痰盛喘滿氣道痞滯不得升降乾咽妙功丸方硼砂研抄末二錢匕丹砂研抄末四錢硇砂飛研抄末一錢巴豆霜抄末三錢匕桂末益智仁末各半兩上六味拌和令勻用糯米粥和丸如麻子大每服一丸或兩粒食後臨寢乾咽治膈氣咽塞憂結不散人參湯方人參赤茯苓去黑皮白朮桂去粗皮訶黎勒皮炒京三稜炮銼陳橘皮湯浸去白焙枳殼去瓤麩炒甘草炙銼檳榔銼各一兩木香半兩草豆蔻去皮半兩上一十二味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日二夜一治諸膈氣冷熱不調喜怒無度胸中咽塞不思飲食或憂思過甚不足之氣蘊積心臆日漸消瘦大腹湯方大腹皮切檳榔銼木通銼防己青橘皮湯浸去白焙紫蘇莖葉桑根白皮銼甘草炙銼枳殼去瓤麩炒各一兩草豆蔻去皮丁香皮銼大黃銼炒各半兩木香一分上一十三味粗搗篩每服三錢匕水一盞生薑二片大棗一枚劈同煎七分去滓溫服日三夜一治膈氣咽喉噎塞萬靈木香丸方木香一分附子炮裂去皮臍一枚檳榔銼一兩縮砂去皮乾薑炮桂去粗皮陳橘皮湯浸去白焙肉豆蔻去殼蘹香子炒各半兩上九味搗羅為末醋煮麵糊丸如梧桐子大丹砂為衣每服二十丸生薑湯下茶酒亦得不計時候治膈氣咽喉噎塞不下飲食丁香丸方丁香木香各一錢檳榔銼青橘皮去白醋浸半日控乾炒令黃色各一分京三稜炮銼芫花醋浸一宿控乾炒令黃色各半兩五靈脂一兩香墨燒令煙盡候通赤放冷稱一錢上八味同搗羅為末再羅過肥巴豆七粒去皮心膜細研如膏塗於新瓦上出油令盡細研與前藥末同研拌令極勻用水煮白麵糊和劑硬軟得所丸如大麻子大令乾每服五丸至七丸生薑湯下不計時候治膈氣咽喉噎塞心煩嘔逆不進飲食人參丸方人參厚朴去粗皮生薑汁炙枇杷葉去毛炙檳榔銼各一兩半夏淡漿水煮三二十沸切碎半兩上五味搗羅為末麵糊為丸如梧桐子大每服二十丸生薑湯下不拘時服治膈氣咽喉噎塞煩悶嘔吐心胸痞滿腹脅膨脹不思飲食安息香煎丸方安息香別研半兩木香沉香各一兩訶黎勒皮炮二兩桂去粗皮白茯苓去黑皮肉豆蔻仁縮砂仁芍藥蓽澄茄蘹香子微炒益智去皮炒五味子微炒白豆蔻仁芎藭當歸切焙丁香皮銼蓬莪朮炮銼京三稜炮銼莎草根去毛檳榔銼各一兩半硇砂別研半兩阿魏一分細研用白麵少許和作餅子炙令香熟上二十三味除別研外搗羅為末再同研勻用蜜三十兩煉熟和為丸如雞頭大每服一丸細嚼溫酒或生薑鹽湯下不拘時治膈氣噎塞不入飲食導氣散方虎頭王字骨酥炙蓽茇微焙人參厚朴去粗皮生薑汁炙銼羚羊角屑上五味等分搗羅為散每服二錢匕溫水調臨臥食後服治膈氣噎塞脾胃虛冷瘦劣不下食京三稜丸方京三稜炮銼訶黎勒煨去核木瓜焙鱉甲醋炙去裙襴玳瑁鎊各三分桃仁湯浸去皮尖雙仁炒枳實去瓤麩炒乾薑炮白朮昆布湯浸去咸焙赤茯苓去黑皮木香各半兩上一十二味搗羅為末陳曲糊和丸如梧桐子大每服二十丸煨生薑木瓜鹽湯下治膈氣咽喉噎塞胸膈填滿不思飲食通氣湯方半夏湯洗七遍去滑為末生薑細研和半夏作餅曝乾各一兩半陳橘皮湯浸去白焙桂去粗皮各三分上四味粗搗篩每服五錢匕水一盞半入生薑五片煎至八分去滓溫服治膈氣噎塞不下飲食撞氣丸方雌黃研附子炮裂去皮臍丹砂研木香寒水石研人中白研各半兩麝香研一錢上七味先以雌黃入銚子卻將寒水石蓋雌黃用油紙燭十二個燒盡為度次將衆藥為末和令勻以粟米飯和丸如雞頭大每服一丸用生蔥一二寸同嚼溫酒下婦人以當歸緑豆酒下治膈氣噎塞不思飲食附子丸方附子大者生去皮臍切破生薑汁煮透焙一兩丁香半兩上二味搗羅為末細研硇砂少許滲棗內蒸熟去皮核和藥丸如梧桐子大每服十五丸溫米飲下食前服治膈氣噎塞食物不下昆布丸方昆布洗去咸焙末一兩舂杵頭細粳一合上二味用老牛涎一合生百合汁一合二味慢火煎入蜜攪成膏搜前藥和丸如雞頭大含化咽津膈氣嘔逆不下食論曰膈氣嘔逆不下飲食者由胃氣不足風冷乘之或憂恚氣結不得宣通故令膈脘痞滿氣塞胸中縱能食而卒不下或入胃中多致不消與留飲相擊則變為嘔逆也治膈氣嘔逆不下食噁心心腹疼痛及脾積氣飲食進退面黃腹脹怠惰藏府不調水穀不化磨癥瘕積聚沉香煎丸方沉香銼丁香各一兩阿魏醋化開入面和作餅子慢火炙半兩木香胡椒沒藥研丹砂水飛研各一