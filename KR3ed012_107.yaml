刮去黑皮切細辛去苗葉蟬殼去土荊芥穗菊花各一兩蕤仁三分和皮上七味搗羅為末煉蜜和丸如彈子大每服一丸細嚼酒下或鹽湯下不拘時候治風毒上攻頭目荊芥散方干荊芥穗五兩干薄荷葉三兩木賊二兩蟬殼二兩洗去塵土焙乾蛇蛻皮一錢炒黃別研為細末上五味先搗前四味次入蛇蛻皮末拌勻每服一錢匕臘茶或酒調下不拘時候治風毒氣攻入頭系眼昏暗及頭目不利石決明散方石決明羌活去蘆頭草決明菊花各一兩甘草炙銼半兩上五味搗羅為散每服二錢匕水一盞煎至六分和滓食後臨臥溫服治風入系頭目風眼寒昏暗多淚常服犀角丸方生犀角鎊半兩玄參苦參銼各三分丹參沙參各半兩甘菊花三分旋覆花半兩車前子三分杏仁湯浸去皮尖雙仁炒一兩檳榔三分銼牽牛子炒令熟一兩芎藭三分大黃銼炒一兩前胡去蘆頭三分知母焙半兩黃柏去粗皮銼一兩白蘚皮三分槐子芍藥各一兩半上一十九味搗羅為末煉蜜為丸如梧桐子每服三十丸食後煎苦竹葉湯下臨臥再服治目風眼寒昏痛澀淚芎藭湯方芎藭石膏防風去叉芍藥絡石各一兩大黃銼炒半兩上六味粗搗篩每服五錢匕水一盞半煎至七分去滓放溫食後服臨臥再服治風攻頭目多淚昏澀身體痹皮膚風癢黃耆丸方黃耆銼蒺藜子炒去刺防風去叉柴胡去苗土白朮山芋甘菊花茯神去木甘草炙銼秦艽去苗土各三分山梔子仁枳殼去瓤麩炒羌活黃連去須各半兩上一十四味搗羅為末煉蜜和丸如梧桐子大每服三十丸茶下治眼衝風寒多淚防風散方防風一兩去蘆頭梔子仁三分黃芩一兩葳蕤一兩黃連一兩去須甘草一兩炙銼上六味搗羅為散煎竹葉湯調下一錢匕又方酸棗仁一兩五味子一兩蕤仁一兩上三味搗羅為末食後溫酒調下一錢匕治攀睛翳膜昏癢碧暈赤筋瘀肉風赤暴赤胎赤圓靈丹方蒼朮四兩甘草一兩荊芥穗二兩黃柏一兩黑牽牛四兩取一兩細末生用上五味搗羅為細末取熟蒸餅去皮以蜜水蘸令乾濕得所搜和為丸如彈子大每服一丸細嚼溫水下目風淚出論曰五臟六腑皆有津液肝開竅於目其液為淚肝氣既虛風邪乘之則液不能制故常淚出衝風則甚也治眼赤痛或生翳及多風淚決明散方決明子微炒菊花蔓荊實去皮車前子茺蔚子黃連去須防風去叉菥蓂子遠志去心白芷秦皮去粗皮玄參枳殼去瓤麩炒細辛去苗葉蕤仁赤茯苓去黑皮人參各一兩上一十七味搗羅為散每服二錢匕食後良久溫酒調下臨臥再服治肝腎風虛目昏久視無力涓涓淚下兼頭風目磣痛兔肝丸方兔肝兩具炙乾臘月收防風去叉黃連去須地骨皮麥門冬去心焙決明子微炒各一兩半茯神去木苦參銼秦皮去粗皮大黃銼炒甘菊花各一兩車前子二兩半龍齒搗研二兩枳殼去瓤麩炒半兩上一十四味搗研為末煉蜜丸如梧桐子大每服三十丸食後溫漿水下治目風冷淚久不瘥羌活散方羌活去蘆頭二兩木香艾葉焙桂去粗皮山芋升麻胡黃連各一兩白附子炮山茱萸牛膝酒浸切焙各三分上一十味搗羅為散每服二錢匕空心鹽湯調下午時用麥門冬熟水調下治目風淚出菊花散方菊花一兩蒼朮四兩肥者用銀石器入河水同皂莢一寸煮一日去皂莢取術以銅刀去黑皮曝乾取三兩荊芥穗草決明洗曝乾木賊新者旋覆花去萼甘草炙銼各一兩蟬蛻洗焙三分蛇蛻洗炙一分上九味搗羅為散用不津器盛每服一錢匕臘茶半錢同點空心臨臥服治目衝風淚出細辛丸方細辛去苗葉二兩五味子熟乾地黃焙各一兩半人參白茯苓去黑皮地骨皮山芋防風去叉各一兩上八味搗羅為末煉蜜丸如梧桐子大每服二十丸空心鹽湯下日再治目風冷淚去翳暈蟬蛻餅子方蟬蛻洗焙木賊新者甘菊花各一兩芎藭荊芥穗各二兩甘草炙銼半兩蒼朮米泔浸切焙三兩上七味搗羅為末煉蜜丸捏餅子如錢大每服一餅食後良久細嚼臘茶下日三治目虛冷風淚天南星丸方天南星炮半兩井泉石研豉炒甘草炙銼各二兩石決明洗三分上五味搗研為末以豬子肝細切拌和搗勻丸梧桐子大每服二十丸食後良久黃連湯下臨臥再服治風毒攻眼並內外障止冷淚五倍丸方巴戟天米泔浸一宿焙一兩干枸杞子生用二兩旋覆花生用三兩菊花生用四兩蜀椒去目及閉口醋二升慢火煮令醋盡為度焙五兩上五味搗羅為末煉蜜丸如梧桐子大每服二十丸至三十丸空心溫酒下或青鹽湯下治風毒冷淚隱澀疼痛仙靈脾散方仙靈脾射干晚蠶砂炒惡實炒甘草炙銼上五味等分搗羅為散每服一錢匕食後良久沙糖水調下日三治肝虛目風淚出點眼真珠散方真珠末丹參研各三分貝齒五枚灰火中燒為末乾薑末一分上四味合研勻細用熟絹帛羅三遍每仰臥點少許敷眼中閤眼少時治風淚澀癢點眼乳汁煎方人乳一升黃連去須為末三分蕤仁研爛一兩乾薑炮為末一分上四味除乳外再同研極細以乳漬之一宿明旦內銅器中微火煎取三合新綿濾去滓每以黍米大點眥中勿當風點治肝腎虛風多淚漸昏及生翳膜白芷丸方白芷細辛去苗葉五味子枳殼去瓤麩炒石決明洗各一兩茺蔚子二兩熟乾地黃蕤仁各二兩半上八味搗羅為細末煉蜜丸如梧桐子大每服二十丸食後溫水下每日三服治腎臟風毒沖眼赤痛淚出前胡散方前胡三分去蘆頭防風一兩去蘆頭決明子二兩木通二兩銼茯神三分羖羊角屑三分玄參半兩川升麻三分地骨皮半兩川朴硝一兩白芷一兩五味子二兩上十二味搗羅為粗散每服三錢匕水一盞煎至八分去滓溫服食後日二治風毒攻眼昏暗赤熱腫痛宜點眼龍腦膏方龍腦半分研細馬牙硝一分細研上二味藥以羊膽一枚內入龍腦等浸二復時於瓷合內摘破研勻成膏每日三度點之妙治心肝臟風熱攻眼淚出羌耆散方羌活去蘆頭黃耆炙銼各一兩甘草一兩半生半熟銼白蒺藜三兩水浸曝乾去角芎藭銼半兩上五味搗羅為散每服二錢匕鹽湯調下治風淚眼防風飲方防風去叉黃芩去黑心葳蕤黃連去須甘草炙銼各一兩竹葉洗三十片山梔子仁三分上七味銼如麻豆每服三錢匕水一盞煎取七分去滓食後服日再
