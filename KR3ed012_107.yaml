body:
  text: 卷第一百七目癢急及赤痛論曰肝經虛而風邪乘之則目癢心熱盛而血行湧溢則目赤二者各有所本今赤且癢而瞼又急則以風熱交作於內而又外冒寒冷之氣故其證如此亦有癢而復痛者蓋邪毒方熾氣血不得流通故時痛也治肝心風熱邪毒上攻目赤癢絳雪散方紅雪半兩生麥門冬去心葳蕤秦皮去粗皮赤茯苓去黑皮各一兩半升麻一兩淡竹葉五十片上七味除紅雪外搗羅為散每服三錢匕水二盞煎至一盞抄紅雪半錢匕調勻食後溫服治風熱眼赤痛癢不定防風湯方防風去叉甘菊花各三分芎藭赤芍藥各半兩黃芩去黑心一兩羚羊角鎊半兩細辛去苗葉三分枳殼去瓤麩炒半兩黃連去須三分甘草炙半兩石膏碎一兩人參半兩上一十二味粗搗篩每服五錢匕水一盞半煎至一盞去滓食後臨臥溫服治肝風邪熱沖眼色赤痛癢不定菊花湯方甘菊花擇地骨皮去土升麻防風去叉黃連去須赤茯苓去黑皮各半兩葳蕤柴胡去苗木通銼各一兩上九味粗搗篩每服五錢匕水二盞半入竹葉七片煎至一盞去滓入芒硝末一錢匕食後臨臥溫服如腹臟易利即少用芒硝治眼癢難任補膽前胡丸方前胡去蘆頭人參馬兜鈴赤茯苓去黑皮各一兩半桔梗炒細辛去苗葉柴胡去苗玄參各一兩上八味搗羅為細末煉蜜丸如梧桐子大每服三十丸米湯下治眼癢瞼急葛根湯方葛根銼木通銼桑根白皮地骨白皮各一兩半白蘚皮一兩上五味粗搗篩每服五錢匕水一盞半煎至一盞去滓食後臨臥溫服治眼風熱赤癢烏蛇湯方烏蛇酒浸去皮骨炙藁本去苗土防風去叉芍藥羌活去蘆頭各一兩芎藭一兩半細辛去苗葉半兩上七味粗搗篩每服五錢匕水一盞半煎取一盞去滓食後臨臥溫服治眼生翳目系急其翳生瞳仁上及瞼腫合痛如針刺防風丸方防風去叉山芋各一兩半葳蕤二兩赤芍藥一兩半車前子三兩秦皮去粗皮澤瀉各一兩芎藭二兩山梔子仁白茯苓去黑皮各一兩半獨活去蘆頭白檳榔煨銼甘菊花擇羚羊角鎊各一兩上一十四味搗羅為細末煉蜜丸如梧桐子大每服二十丸空心臨臥煎苦竹葉湯下治眼睛中如針刺痛目系磣痛澀多眵淚麥門冬湯方麥門冬去心焙旋覆花木通銼黃芩去黑心茯神去木各一兩大黃銼炒三分上六味粗搗篩每服五錢匕水一盞半煎至一盞去滓投生地黃自然汁少許更煎三兩沸放溫入朴硝末少許食後臨臥服治目昏下淚赤癢升麻散方升麻半兩山梔子仁決明子炒車前子地膚子茺蔚子各一兩黃芩去黑心龍齒搗研各二兩乾薑炮半兩上九味搗羅為細散每服二錢匕米飲調食後服日三治久患眼疾瞼緊難開視物不真羚羊角散方羚羊角鎊青木香檳榔煨銼茯神去木山芋生用前胡去蘆頭牛膝去苗切焙桂去粗皮芎藭犀角鎊大黃銼炒枳殼去瓤麩炒各一兩上一十二味搗羅為細散每服三錢匕空心食前溫酒調服日三治風毒眼退翳膜去風癢點眼石膽膏方石膽半錢烏賊魚骨半字乳糖一錢蜜一皂子大龍腦少許上五味合研勻入新汲水半盞相和以帛子濾過入瓷瓶內用新汲水浸瓶十日每用點眼點了用青鹽湯熱洗點時不得犯銅鐵箸只用雞翎瀝在眼內治風毒眼癢痛赤澀生瘀肉明水膏方烏頭去皮臍生用青鹽白礬各半兩附子一枚去皮臍生用銼乳香半分銅青硇砂各一分黃連去須一兩半上八味銼如麻豆大用井華水五盞入瓷石鍋子內以慢火熬至七分綿濾去滓入研了龍腦半錢臨臥點之治赤目癢澀及一切目疾湯器熨方上盛熱湯滿器銅器尤佳以手掏熨眼眼緊閉勿開亦勿以手揉眼但掬湯沃眼冷即已若有疾一日可三四為之無疾日一兩次沃令眼明此法最治赤目及瞼眥癢昔有人因少年夜書小字病目痛楚凡二十年用此法遂永瘥又有人苦目昏用此治逾年後遂能燈下觀細書大率血得溫則瑩澤目全要血養若衝風冒冷歸而沃之極有益於目點眼熊膽膏方古銅錢二十一文完用甘菊花四兩黃連去須鬱金黃柏去粗皮蜜炙各二兩以上五味菊花揉碎黃連以下三物細銼用水二升入銅錢同於銀石器中慢火熬至一升新布濾去滓入後藥鉛丹太陰玄精石井泉石龍骨不灰木蕪荑去皮代赭各半兩滑石烏賊魚骨去堅處各一兩蕤仁去殼半兩以上十味細研成粉入蜜六兩並前藥汁和勻銀器內重湯煮六時辰再以新綿絞濾去滓入後藥硼砂麒麟竭沒藥青鹽銅青各半兩馬牙硝乳香一分硇砂一錢半麝香龍腦各一錢熊膽一分雄雀糞七粒膩粉二錢上一十三味並細研羅過再研如面入前膏內再用重湯煮如稀餳如要丸即丸如梧桐子大每一丸水化並以銅箸點兩眥久患瘀肉瞼爛諸疾點此無不瘥者暴赤目風癢只點三兩上即瘥有人瘀肉滿眼用此亦消盡明如未病時治風毒乘於肝經上攻眼目赤癢急痛地骨皮散方地骨皮羌活去蘆頭防風去叉蒺藜子炒各一兩甘草炙半兩上五味搗羅為散每服一錢匕荊芥茶清調下如患暴赤眼濃煎甘草湯食後調下治眼癢急似赤不赤烏蛇湯方烏蛇酒浸去皮骨炙赤芍藥枳殼去瓤須炒黃耆銼各一兩半地骨白皮一兩上五味粗搗篩每服五錢匕水一盞半煎至八分下無灰酒一合更煎令沸空腹溫服服後眼中微覺痛即是酒氣所攻宜取葛根煎湯服治肝氣壅滯熱毒不得宣通目急癢痛荊芥散洗眼方荊芥穗當歸切焙赤芍藥各一兩半黃連去須一兩上四味搗羅為散每服二錢匕水一盞半煎至一盞濾去滓熱洗淚出為度治眼眥腫癢點眼方烏麻油三合上一味煉濾去滓內蠟二兩青柳枝一尺兩指大和皮攪油蠟勿停手候柳枝焦旋截去三寸余內油中煎良久去柳枝膏成用點眼眥治眼癢急及赤痛點眼方黃連去須銼碎半兩上一味以人乳浸點目眥中五臟風熱眼論曰凡人目中淚孔屬肝白睛屬肺赤脈屬心四眥屬脾瞳仁屬腎蓋目者五臟六腑皆相連屬若風熱毒氣攻搏臟腑壅滯經絡悉致目疾其候不一要當審其疾之所由起不可拘於肝也治五臟風熱氣壅眼乾澀痛赤犀角湯方犀角鎊木通銼玄參防風去叉芍藥青葙子大黃銼炒甘草炙各一兩山梔子仁三分枳殼去瓤麩炒半兩上一十味粗搗篩每服五錢匕水一盞半入竹葉七片煎至七分去滓再入馬牙硝一錢匕放溫食後臨臥服治五臟積熱目昏不見物夢靈丸方黃連粗者去須太陰玄精石石決明淨刮洗各一兩羊子肝七具去皮膜切並曝乾蕤仁去皮研半兩上五味搗羅為末粟米粥和丸如梧桐子大臨臥茶清下三十丸治五臟積熱眼乾澀難開青金散方青蒿花三月三日採陰乾上一味搗羅為散每服三錢匕空心井華水調下久服長生明目可夜讀細書治肝熱目乾澀昏痛車前子湯方車前子決明子微炒青葙子黃連去須防風去叉菊花甘草炙各一兩芎藭葳蕤各一兩半上九味粗搗篩每服五錢匕水一盞半煎至七分去滓溫服食後臨臥治肝風熱目赤乾澀磣痛難開檳榔湯方檳榔十枚煨銼赤茯苓去黑皮陳橘皮湯浸去白焙桔梗炒白朮各一兩桂去粗皮防風去叉各半兩上七味粗搗篩每服五錢匕水一盞半煎至七分去滓空心日晚溫服治肝心風熱目昏赤菥蓂子丸方菥蓂子一兩半兔肝一具細切炙細辛去苗葉蔓荊實車前子羚羊角鎊防風去叉黃連去須黃芩去黑心決明子炒各一兩上一十味搗羅為末煉蜜和丸如梧桐子大每服三十丸食後漿水下治肝肺熱毒風目昏決明子丸方決明子微炒蕤仁去皮研茯神去木桔梗炒麥門冬去心焙黃連去須各一兩青葙子枳殼去瓤麩炒防風去叉玄參犀角鎊檳榔煨銼升麻生乾地黃焙龍膽沙參紫菀去苗土各三分百合半兩上一十八味搗羅為末煉蜜和丸如梧桐子大每服三十丸食後米飲下治肝腎風氣久積客於目不散目乾澀痛防風湯方防風去叉白蘚皮獨活去蘆頭陳橘皮湯浸去白各一兩芎藭一兩半甘草炙銼細辛去苗葉各半兩上七味粗搗篩每服五錢匕水一盞半煎至七分去滓食後臨臥溫服治上焦壅熱一切眼疾如聖散方桂去粗皮鬱金各半兩馬牙硝二兩甘草一分上四味搗羅為散每服一錢匕臨臥新汲水調下服藥畢去枕臥少時令藥行到眼中覺痛淚出為度小兒十歲半錢匕五歲以下一字治心膈氣痰煩躁寒熱頭痛眼赤痛昏暗秦艽湯方秦艽去苗土枳實去瓤麩炒升麻柴胡去苗知母焙當歸切焙芍藥各一兩芎藭半兩上八味粗搗篩每服五錢匕水一盞半煎至七分去滓食後臨臥溫服治心經蘊熱眼乾澀痛心躁口乾滑石湯方滑石碎黃連去須芎藭芍藥羚羊角鎊梔子仁各一兩上六味粗搗篩每服五錢匕水一盞半煎至七分去滓食後溫服日三治心肺風熱目乾澀痛癢地骨皮湯方地骨皮一兩半甘菊花升麻黃連去須防風去叉木通銼葳蕤大黃銼炒甘草炙銼蕤仁去皮各一兩上一十味粗搗篩每服五錢匕水一盞半煎至七分去滓食後臨臥溫服治心肺風熱目乾澀赤痛人參湯方人參茺蔚子細辛去苗葉桔梗炒防風去叉黃芩去黑心大黃銼炒各一兩赤茯苓去黑皮半兩上八味粗搗篩每服五錢匕水一盞半煎至七分去滓食後臨臥溫服治脾胃熱毒眼生障翳犀角湯方犀角鎊蘆根銼大黃銼炒麥門冬去心焙各一兩半甘草炙一兩石膏碎一兩上六味粗搗篩每服五錢匕水一盞半入竹葉七片煎至七分去滓入芒硝一錢匕生地黃汁半合重煎三五沸食後臨臥溫服治脾肺熱熏目赤癢肉翳蘆根湯方蘆根銼木通銼各一兩半山梔子仁桔梗炒黃芩去黑心甘草炙各一兩上六味粗搗篩每服五錢匕水一盞半煎至七分去滓入生地黃汁半合再煎三兩沸食後臨臥溫服治肝肺實熱目生白翳羖羊角湯方羖羊角鎊葳蕤木通銼各一兩半甘菊花澤瀉大黃銼炒各一兩上六味粗搗篩每服五錢匕水一盞半煎至七分去滓入芒硝一錢匕空心臨臥溫服治五臟風熱眼赤並黑睛上生黃翳隱澀疼痛犀角飲方犀角鎊石膏蘆根大黃銼炒生麥門冬去心各一兩半甘草炙一兩淡竹葉五十片生地黃二兩上八味㕮咀如麻豆大每服五錢匕水一盞半煎至八分去滓下芒硝末半錢匕更煎令沸食後溫服治肝肺熱毒攻眼白睛腫起羚羊角湯方羚羊角鎊桑根白皮銼木通銼旋覆花葳蕤升麻各一兩半茯神去木一兩上七味粗搗篩每服五錢匕水一盞半煎至八分去滓下芒硝末半錢匕更煎令沸溫服不拘時候治風熱眼白朮菊花散方白朮一斤米泔浸一宿去皮切焙菊花焙半兩荊芥穗四兩威靈仙去土薄荷焙各二兩木賊去節焙黃連去須黃芩去黑心黃耆銼焙細辛去苗葉仙靈脾羌活去蘆頭獨活去蘆頭各一兩半上一十三味搗羅為散每服二錢匕食後夜臥米飲調下熟水亦得治五臟風熱毒氣攻目或赤或澀或昏或痛翳障不明等疾防風丸方防風去叉玄參決明子炒車前子茯神去木地骨皮枳殼去瓤麩炒龍齒甘菊花苦參大黃銼炒麥門冬去心焙各一兩上一十二味搗羅為末煉蜜和丸如梧桐子大每服二十丸食後溫漿水下臨臥再服治風熱上衝眼目或外受風邪眼痛視物不明決明子丸方決明子炒細辛去苗葉青葙子蒺藜子炒去角茺蔚子芎藭升麻獨活去蘆頭羚羊角鎊防風去叉各半兩菊花一兩黃連去須玄參枸杞子各三兩上一十四味搗羅為末煉蜜和丸如梧桐子大每服二十丸淡竹葉熟水下加至三十丸治五臟風毒上攻眼目障翳兼能生髮摩頂青蓮膏方生麻油二升酥曾青研各一兩大青梔子葉長理石葳蕤朴硝吳藍各一兩半槐子一兩一分淡竹葉一握空青研二兩鹽花三兩連子汁一升上一十四味除油酥汁外粗搗篩以綿裹之先於淨鐺中下酥油二味後下諸藥以文武火煎半日次下蓮