body:
  text: 卷第一百五十五妊娠猝下血論曰妊娠經血暴下少腹或痛者由冷熱之氣內擊於胞絡或舉重煩勞暴傷衝任之經其血忽下隨其經養而補之所下不已腰腹痛者其胎多墮治妊娠猝下血胎動腹痛保血安胎膠艾湯方阿膠炙令燥芎藭甘草炙各二兩艾葉炒當歸切焙各三兩芍藥生乾地黃焙各四兩上七味搗羅為粗散每服五錢匕水一盞半煎至一盞去滓稍熱服治妊娠猝下血不止胎上逼心手足逆冷欲死艾葉湯方生艾葉搗絞取汁一盞阿膠炙令燥半兩蜜一合上三味取艾葉汁一盞入阿膠及蜜一合煎取一盞去滓分為二服溫溫服之治妊娠猝下血令胎不安臍腹撮痛蒲黃散方蒲黃微炒當歸焙令香銼龍骨阿膠炙令燥生乾地黃焙各半兩牛角䚡黃牛角上者炙令焦一兩芎藭半兩上七味搗羅為散研勻細每服二錢匕用煎艾煮米飲調下食前服之治妊娠猝然下血令胎不安小腹疼痛杜仲湯方杜仲去粗皮銼炒二兩人參一兩阿膠炙令燥一兩芎藭一兩當歸微炙二兩艾葉一把焙上六味粗搗篩每服三錢匕酒一盞入棗三枚擘同煎至七分去滓溫服相次三服腹中當暖即血止治妊娠八九個月或胎動不安因用力勞乏心腹痛猝然下血面目清冷汗出氣息欲絶鉤藤湯方鉤藤茯神去木人參當歸微炙各一兩桔梗二兩炒桑上寄生一兩上六味粗搗篩每服三錢匕水一盞煎至七分去滓溫服治妊娠驚胎勞傷心腹急痛猝下血胎動不安桔梗湯方桔梗一兩炒茯神去木一兩人參半兩當歸炙銼半兩鉤藤皮一分桂去粗皮半兩獨活去蘆頭半兩芍藥銼炒半兩生乾地黃焙一兩桑上寄生微炒銼半兩石膏一兩甘草炙黃半兩上一十二味粗搗篩每服三錢匕水一盞煎至七分去滓空心溫服日三治妊娠八九月或臨月因用力勞乏便即胎動忽然下血心腹急痛面目青黑冷汗出氣息欲絶茯神湯方茯神去木一兩熟乾地黃焙一兩甘草炙半兩鉤藤一兩桔梗炒人參當歸切焙芍藥銼炒各一兩半上八味搗為粗散每服三錢匕以水一盞煎至七分去滓溫服治妊娠猝下血不止腹痛手足寒熱腰背痠疼半夏湯方半夏湯洗七遍二兩麥門冬去心焙二兩甘草炙銼當歸微炙黃耆銼各一兩半阿膠炙令燥二兩人參一兩黃芩去黑心一兩旋覆花一兩上九味粗搗篩每服三錢匕水一盞入蔥白二寸生薑半分切同煎至七分去滓空心溫服治妊娠胎動不安忽然下血寒熱往來腹痛如欲産手足煩悶麥門冬湯方麥門冬去心焙二兩甘草炙銼人參生乾地黃焙黃芩去黑心阿膠炙令燥各一兩上六味搗為粗散每服三錢匕水酒各半盞入生薑半分切棗三枚擘同煎至七分去滓食前溫服治妊娠猝下血致胎不安少腹疼痛人參湯方人參當歸切微炒阿膠炙令燥各二兩甘草炙令赤芎藭黃芩去黑心艾葉各一兩吳茱萸湯洗焙生乾地黃微炒各二兩上九味粗搗篩每服三錢匕水一盞入生薑一棗大切同煎至七分去滓空心溫服日三治妊娠猝下血胎動不安或連腰㽱痛甘草湯方甘草炙令赤阿膠炙令燥各一兩生乾地黃焙半兩上三味粗搗篩每服三錢匕水一盞煎至七分去滓溫服治妊娠卒下血胎不安少腹痛連腰人參湯方人參阿膠炙令燥芎藭各一兩當歸微炙切杜仲去粗皮銼炒各二兩上五味粗搗篩每服三錢匕以水酒共一盞煎至七分去滓食前溫服治妊娠已數月猝然下血不定芎藭湯方芎藭當歸焙各二兩艾葉焙一兩甘草炙半兩阿膠炙令燥一兩上五味粗搗篩每服三錢匕以水一盞煎至七分去滓溫服治妊娠猝下血不止方艾葉如雞子大以酒三升煮取二升去滓分為兩服不拘時溫服治妊娠無故猝下血不絶方阿膠二兩上一味以酒一升半煮膠令消分三服連並服之治妊娠猝下血不止四肢厥冷悶絶欲死方青竹茹拳大二枚艾葉阿膠炙令燥各二兩白蜜二合上四味以水六升煮三味取二升去滓納蜜又煎一沸分二服立瘥治妊娠猝下血不止腰腹疼痛地黃艾葉湯方熟乾地黃焙艾葉炒各二兩人參地榆乾薑炮裂阿膠炒燥當歸切焙各一兩上七味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服不拘時治妊娠卒下血腰腹疼痛當歸散方當歸切焙桑寄生續斷各半兩赤芍藥一分上四味搗羅為散每服三錢匕空心食前溫酒調下有冷加乾薑一兩腹痛加芎藭一兩妊娠胎萎燥論曰人由受氣至於有生十二經脈迭相滋養猶之物也得寒溫之正土地之宜無物不長凡胎處胞中或有萎燥者蓋由妊婦所稟怯弱不足自周陰陽血氣偏系非冷即熱胞胎失於滋利所以萎燥而不長也日月雖過不能生育亦有後時致此者惟宜資母血氣俾陰陽調通本末相應則胎從而有養矣治妊娠胎萎燥羸瘦不長熟乾地黃湯方熟乾地黃焙白朮甘草炙銼白茯苓去黑皮各三分阿膠炙燥木香各一兩細辛去苗葉人參防風去叉白芷各半兩上一十味粗搗篩每服三錢匕以水一盞煎至七分去滓溫服日三治妊娠胞中虛冷致胎萎燥不長艾葉湯方艾葉炒芎藭當歸炙銼乾薑炮白朮各一兩上五味粗搗篩每服三錢匕以水一盞煎至七分去滓溫服日三治妊娠胞中虛胎不榮長致令萎燥當歸湯方當歸切焙甘草炙銼乾薑炮芎藭各一兩白朮二兩上五味粗搗篩每服三錢匕以水一盞入大棗三枚擘破同煎至七分去滓空心溫服治妊娠胎萎燥漸覺羸劣面色黃黑腹臟虛冷白朮湯方白朮銼炒二兩厚朴去粗皮生薑汁炙芎藭芍藥當歸切焙人參甘草炙銼訶黎勒炮去核各半兩上八味粗搗篩每服三錢匕以水一盞入生薑一分煎至七分去滓溫服日三治妊娠胎萎燥當歸飲方當歸切焙一兩芎藭阿膠炙炮各三分白朮二兩上四味搗為粗末每服三錢匕以水一盞煎至七分去滓溫服日三治妊娠胎萎燥胎漏腹痛不可忍白朮當歸湯方白朮當歸切焙芎藭人參阿膠炙燥各二兩艾葉焙乾一兩上六味粗搗篩每用五錢匕以水一盞酒半盞入棗三枚拍碎同煎至一盞去滓分溫二服空心一服午食前一服治妊娠虛冷胎萎燥不長橘皮湯方陳橘皮湯浸去白焙厚朴去粗皮生薑汁炙各三分當歸切焙人參阿膠炙燥各一兩白朮二兩上六味粗搗篩每服三錢匕以水一盞入生薑一分切棗三枚擘破同煎至七分去滓溫服日三治妊娠胎萎燥不能轉動心中急痛桑寄生湯方桑寄生銼白茯苓去黑皮人參葳蕤各一兩白朮二兩上五味粗搗篩每服三錢匕以水一盞入粳米半合生薑一分切同煎至七分去滓溫服日三治妊娠胎萎燥養胎榮血芎藭湯方芎藭艾葉去梗炒當歸切焙白朮各一兩甘草炙銼半兩上五味粗搗篩每服三錢匕以水一盞煎至七分去滓溫服日三治妊娠胎萎燥過時未産滋氣血益胞臟熟乾地黃湯方熟乾地黃炒當歸切焙熟艾炒乾芎藭各一兩阿膠炙燥甘草炙銼各半兩上六味粗搗篩每服三錢匕以水一盞煎至七分去滓溫服日三治妊娠胎萎燥全不轉動阿膠湯方阿膠炙燥一兩半當歸切焙一兩甘草炙銼三分白朮二兩上四味粗搗篩每服三錢匕以水一盞煎至七分去滓溫服日三妊娠胎不長養論曰妊娠將理無方脾胃不足飲食減退不能行榮衛化精微養衝任故令胎臟內弱子氣不足生化稍虧巢元方謂母病療母則胎安是也若使脾胃和而能飲食水穀化而運氣血則何慮胎氣不長也治妊娠胎不長養白朮散方白朮二兩芎藭芍藥人參阿膠炙令燥各一兩甘草炙銼半兩上六味搗羅為散每服三錢匕以蔥粥飲調下日三治妊娠養胎芎藭散方芎藭白朮各一兩蜀椒去目及閉口炒出汗三兩牡蠣煅研為粉半兩上四味搗研為散每服二錢匕食前溫酒調下米飲亦得治妊娠氣血不足胎瘦不長乾地黃湯方熟乾地黃焙阿膠米炒沸芎藭當歸切米炒各二兩赤芍藥甘草炙銼人參各半兩上七味粗搗篩每服三錢匕水一盞入粳米少許同煎七分去滓溫服日三治婦人血衰不足經候慳澀致子宮不榮妊娠多病胎不長成地黃丸方熟乾地黃不拘多少上一味切焙搗為末煉蜜為丸如彈大每服一丸空心煎當歸酒嚼下溫酒亦得治妊娠氣血虛弱令胎不長和氣養胎地黃芎藭丸方熟乾地黃焙一兩芎藭三分白茯苓去黑皮半兩人參當歸切焙各三分柴胡去苗刺薊桑寄生焙乾各半兩厚朴去粗皮塗生薑汁炙一兩龍骨阿膠炒沸白石脂各三分黃耆銼半兩甘草炙銼一分上一十四味搗羅為末煉蜜和丸如梧桐子大每服三十丸不計時候粥飲下日三治妊娠胎不長安胎和氣思食黃耆湯方黃耆銼白朮人參麥門冬去心焙陳橘皮湯去白焙各三分芎藭半兩白茯苓去黑皮一分前胡去蘆頭三分甘草炙銼半兩上九味粗搗篩每服三錢匕以水一盞入生薑二片棗三枚煎至六分去滓食前溫服治妊娠胎不長養胎人參丸方人參白茯苓去黑皮當歸切焙柴胡去苗厚朴去粗皮塗生薑汁炙各一兩枳殼去瓤麩炒三分桑寄生焙刺薊阿膠炙燥各一兩甘草炙銼半兩上一十味搗羅為末煉蜜和丸如梧桐子大每服三十丸食前溫水下妊娠心痛論曰妊娠心痛者蓋因痰飲冷癖或風寒邪氣上乘於心之別絡致攻擊疼痛休作有時若傷心之正經而痛者旦發則夕死夕發則旦死所以然者心為五官之主不受外邪故也治妊娠心痛痰逆不思飲食沉香湯方沉香銼一兩白豆蔻去皮草豆蔻去皮各半兩白朮銼炒二兩人參白茯苓去黑皮各半兩厚朴去粗皮生薑汁炙一兩半夏半兩薄切生薑汁拌炒熟陳橘皮湯浸去白焙三分木香半兩乾薑炮一分甘草炙半兩上一十二味粗搗篩每服三錢匕水一盞生薑三片棗一枚擘同煎至七分去滓稍熱食前服治妊娠心痛煩悶地黃湯方生乾地黃焙淡竹茹銼各一兩桂去粗皮半兩上三味粗搗篩每服三錢匕水一盞半煎取一盞去滓溫服不拘時治妊娠心痛溫中調氣金粟湯方粟米半夏生薑汁浸五宿切焙各二兩甘草炙一兩人參半兩白朮桂去粗皮各一兩檳榔銼四枚上七味粗搗篩每服二錢匕水一盞生薑三片煎六分去滓溫服治妊娠心痛竹茹湯方青竹茹銼碎三兩上一味粗搗篩每服三錢匕水一大盞煎七分去滓溫服不拘時治妊娠心痛不思飲食橘皮湯方陳橘皮湯浸去白焙四兩甘草銼炒二兩厚朴去粗皮生薑汁炙銼白朮各四兩草豆蔻去皮二兩上五味將蔥一握細切拌藥罨一宿炒令黃色搗為粗末每服二錢匕水一盞煎至七分去滓溫服治妊娠心痛脅滿不思飲食枳實湯方枳實去瓤麩炒人參赤茯苓去皮銼柴胡去苗木香炮桂去粗皮草豆蔻去皮各半兩白朮三分檳榔生銼一兩上九味粗搗篩每服二錢匕水一盞煎取七分去滓溫服不拘時治妊娠心痛嘔逆不思飲食芎藭湯方芎藭甘草炒芍藥草豆蔻去皮檳榔銼各二兩上五味粗搗篩每服二錢匕水一盞棗一枚擘生薑三片煎至七分去滓溫服不拘時治妊娠心痛脹滿胎不安大腹湯方大腹皮銼芎藭赤茯苓去黑皮陳橘皮湯浸去白焙人參各三分當歸切焙苧麻根銼紫蘇莖葉各一兩上八味粗搗篩每服五錢匕水一盞半煎取一盞去滓溫服不拘時治妊娠心痛不可禁忍沉香湯方沉香銼厚朴去粗皮生薑汁炙一兩附子炮裂去皮臍尖陳橘皮湯浸去白焙甘草炙各半兩白朮芎藭各二兩上七味銼如麻豆每服二錢匕水一盞生薑三片棗一枚擘同煎至六分去滓溫服治妊娠心痛胸脘不利嘔吐冷痰七寶湯方半夏半兩生薑汁浸透切炒大腹皮銼甘草炙草豆蔻去皮訶黎勒炮去核白朮各一兩郁李仁去皮一分木香半兩乾蠍去土炒半兩人參白茯苓去黑皮芎藭各一兩上一十二味粗搗篩每服二錢匕水一盞生薑三片棗一枚擘同煎至七分去滓溫服治妊娠心脾痛嘔逆不下食