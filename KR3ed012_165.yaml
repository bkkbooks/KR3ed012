body:
  text: 卷第一百六十五產後下痢論曰冷熱不調則水穀之精不化不化則腸胃虛弱冷熱之氣乘虛入客故為痢也婦人產後血氣不足腸胃俱虛冷熱之氣易為傷動故冷則色白熱則色赤二者兼之則赤白俱下治產後赤白痢臍腹撮痛當歸湯方當歸切炒犀角屑黃芩去黑心各一兩黃連去須二兩上四味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時治產後冷熱痢腹痛駐車丸方乾薑二兩微炮黃連去須六兩阿膠炒別為末當歸銼各三兩上四味除膠外搗羅為末用多年陳醋消膠令熔和為丸並手丸如梧桐子大每服三十丸以陳米飲下日再服甚者加丸數治產後赤白痢久不止臍腹娼痛地榆飲方地榆銼焙乾酸石榴皮各一兩黃連去須三兩當歸銼炒二兩上四味搗為粗散每服三錢匕水一盞煎至七分去滓食前溫服治產後脾胃虛冷水穀不化脹滿或時寒極及下痢溫脾丸方乾薑炮人參桔梗炒甘草炙銼各三兩法曲五合炒桂去粗皮五兩附子炮裂去皮臍細辛去苗葉各二兩枳實三枚去瓤炙吳茱萸湯洗焙乾炒大麥糵炒各五兩上一十一味搗羅為末煉蜜和丸如梧桐子大每服二十丸溫酒下加至三十丸日三治產後下痢赤白腹痛煩熱當歸湯方當歸銼炒厚朴去粗皮生薑汁炙令香黃連去須各一兩半肉豆蔻去殼五枚炮甘草炙銼一兩上五味粗搗篩每服三錢匕水一盞煎至七分去滓溫服食前治產後下痢赤白心煩腹痛芍藥飲方芍藥二兩甘草炙銼阿膠炙令燥艾葉炙當歸銼炒各一兩生乾地黃焙二兩銼上六味搗為粗散每服三錢匕水一盞煎至七分去滓溫服不拘時治產後冷熱痢久下不止烏梅丸方烏梅三百枚當歸四兩銼乾薑微炮十兩桂去粗皮附子炮裂去皮臍各六兩黃連去須十六兩蜀椒去目並閉口者炒出汗四兩細辛去苗葉人參黃柏各六兩銼上一十味除烏梅外各搗羅為末再合和勻以苦酒漬烏梅一宿去核蒸之搗如泥盤中與藥搜令相得煉蜜和杵二千下丸如梧桐子大每服十丸食前米飲下加至二十丸日三治產後赤白痢日久不止腸痛阿膠丸方阿膠炒令燥黃連去須赤茯苓去黑皮當歸銼炒黃柏各一兩乾薑三分炮上六味搗羅為末煉蜜和丸如梧桐子大每服三十丸米飲下食前日再治產後赤白痢腸腹㽲痛烏梅黃連丸方烏梅去核炒黃連去須當歸銼炒阿膠炒令燥各一兩醋一兩半上五味除醋外搗羅為末煉醋乘熱和丸梧桐子大每服三十丸米飲下日三服治產後赤白痢腸鳴腹痛黃連丸方黃連去須當歸銼炒胡粉阿膠炒令燥各一兩半無食子二枚上五味搗羅為末煉蜜和丸如梧桐子大每服三十丸食前米飲下治產後赤白痢日久臍腹冷疼茱萸丸方吳茱萸一兩黑豆汁浸炒乾黃連去須一兩半上二味搗羅為末煉蜜和丸如梧桐子大每服二十丸煎芍藥湯下空心食前服治產後赤白痢膿血相兼㽲痛黃耆湯方黃耆銼一兩赤石脂一兩半阿膠炒令燥黃連去須各一兩黃銼三分白朮一兩銼炒龍骨一兩半火燒紅上七味粗搗篩每服二錢匕水一盞煎七分去滓溫服日二夜一治產後赤白痢臍腹㽲痛當歸芍藥湯方當歸銼炒芍藥地榆龍骨火燒紅黃連去須各一兩艾葉炙甘草炙銼黃芩去黑心乾薑炮厚朴去粗皮生薑汁炙各三分上十一味粗搗篩每服三錢匕水一盞煎七分去滓溫服食前日二治產後下痢赤白日久羸瘦黃連湯方黃連去須甘草炙銼熟艾炙芍藥乾薑炮當歸銼炒人參各一兩上七味粗搗篩每服二錢匕水一盞煎至七分去滓溫服食前日三治產後血痢結澀㽲痛當歸丸方當歸銼炒白朮甘草炙銼各一兩半桂去粗皮人參各三分桑根白皮銼乾薑炮細辛去苗葉各一兩上八味搗羅為末煉蜜和丸如梧桐子大每服三十丸米飲下空心食前日三服治產後痢赤如血煩熱渴燥腹疼阿膠散方阿膠炒令燥黃連去須黃柏芍藥地榆銼甘草炙銼虎杖酒浸炙銼艾葉各一兩半上八味搗羅為散每服二錢匕米飲調下食前日再服治產後血痢腹痛不止訶黎勒散方訶黎勒炮去核阿膠炒令燥黃柏地榆甘草炙銼上五味等分搗羅為散每服二錢匕米飲調下食前日三治產後血痢不止牛角䚡散方黃牛角䚡二兩半燒灰橡實一兩炒側柏葉半兩銼焙上三味搗羅為散每服二錢匕米飲調下空心食前服治產後腸胃氣虛泄痢水穀燥濕丸方黃連去須三分烏梅肉熬二分半酸石榴皮當歸銼焙赤石脂各半兩乾薑炮一分半上六味搗羅為末煉蜜丸如梧桐子大空腹米飲下二十丸加至三十丸治產後下痢赤白當歸湯方當歸切焙酸石榴皮炒地榆各三兩大豆黃炒五合糯米炒二合甘草炙銼半兩上六味粗搗篩每服三錢匕水一盞入薤白二寸切同煎至八分去滓空心食前溫服治產後下痢赤白久不瘥甘草散方甘草半生半炙黃連去須炒各二兩上二味搗羅為散每服二錢匕溫漿水調食前服治產後痢不止木香散方木香三分訶黎勒皮酥炒令黃一兩半上二味搗羅為散研勻每服二錢匕米飲調下治產後冷痢疾桂姜散方桂去粗皮以薑汁半合塗炙令薑汁盡阿膠炙令燥當歸切焙各半兩上三味搗羅為細散空心以陳米飲調下二錢匕日再服治產後痢疾春蕨散方上取新生蕨菜不限多少陰乾為細散每日空心陳米飲調下三錢匕治產後冷痢疾乳姜散方上以乾薑二兩炮搗羅為細末以人乳汁和作餅以慢火炙令黃熟研為細散每服空心陳米飲調下三錢匕治產後下痢久不止蕓薹食方蕓薹不拘多少淨洗上一味爛煮飽食佳治產後血痢不止樗皮丸方臭樗根皮銼炒上一味搗羅為末水和丸如棗核大以麵裹捏作小餛飩二七枚煮熟空腹吞之日再治產後冷痢不止黃連散方黃連去須炒乾薑炮訶黎勒麵裹煨去核地榆炙銼各一兩甘草炙銼半兩烏梅肉炒三分上六味搗羅為散每服二錢匕陳米飲調下食前服治產後氣痢不止腹痛木香散方木香三分訶黎勒半生半煨並去核一兩一分當歸切白朮肉豆蔻去殼各半兩上五味搗羅為散每服二錢匕陳米飲調下治產後水瀉不止厚朴湯方厚朴去粗皮生薑汁炙白茯苓去黑皮黃連去須各半兩當歸銼焙一分枳殼去瓤麩炒一分半上五味銼如麻豆大每服三錢匕水一盞煎至七分去滓空腹溫服治產後下痢赤白兼下血赤石脂湯方赤石脂黃連去須地榆各三分甘草炙一分半厚朴去粗皮生薑汁炙銼二分半乾薑炮裂一分半當歸切焙半兩上七味粗搗篩每服三錢匕水一盞入薤白三寸切同煎七分去滓食前溫服治產後下痢赤白久不止身面虛腫大豆飲方大豆炒一分小麥半升蒲黃半兩吳茱萸炒一兩上四味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服治產後心腹脹滿飲食不消時作水痢白朮湯方白朮厚朴去粗皮生薑汁炙草豆蔻去皮枳殼去瓤麩炒各三分白茯苓去黑皮木香人參各半兩上七味細銼如麻豆每服五錢匕水一盞半入生薑三片同煎至八分去滓溫服日二治產後冷痢臍下痛羸瘦不能食白朮散方白朮芍藥炒各三分木香半生半炒縮砂仁黃連去須炒各半兩陳曲炒一兩半厚朴去粗皮生薑汁炙一兩上七味搗羅為散每服三錢匕煎乾姜米飲調下治產後赤白痢臍下㽲痛當歸飲方當歸切焙赤芍藥艾葉炒地榆白龍骨黃耆銼各一兩厚朴去粗皮生薑汁炙黃芩去黑心乾薑炮甘草炙各三分上一十味粗搗篩每服三錢匕水一盞煎至七分去滓不拘時溫服治產後赤白痢黃連丸方黃連去須炒一兩阿膠炙燥當歸切焙乾薑炮各三分赤茯苓去黑皮半兩甘草炙銼一分上六味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心米飲下治產後冷痢臍下痛不能食白豆蔻散方白豆蔻白朮甘草炙銼肉豆蔻仁芍藥白茯苓去黑皮各三分桂去粗皮陳橘皮去白焙各半兩枳殼去瓤麩炒一分上九味搗羅為散每服二錢匕空腹米飲調下治產後血痢不止臍腹㽲痛地榆湯方地榆芍藥各三分木香當歸切焙甘草炙銼阿膠炙燥各半兩乾薑炮裂一分上七味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服治產後赤白痢芍藥丸方芍藥炒艾葉各一兩地榆炒當歸切焙白朮各三分龍骨碎乾薑炮各半兩上七味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服治產後痢疾紫桂丸方桂去粗皮甘遂丁香芫花醋炒焦木香巴豆去心皮勿去油硇砂各等分上七味搗羅為細末醋麵糊為丸小綠豆大每服二丸至三丸溫水下加減更量虛實此丸取積最勝不以久近皆能化逐產後逐積滯尤妙產後腫滿論曰產後氣血俱虛寒濕客搏致脾胃怯弱不能播散諸氣使水血不分流溢肌膚故為腫滿利其小水則病可愈治產後通身腫滿氣喘煩悶防已湯方防已枳殼去瓤麩炒桑根白皮銼芎藭葳蕤當歸切焙各一兩葶藶隔紙炒一分木香半兩上八味粗搗篩每服三錢匕水一盞棗二枚擘破煎至七分去滓溫服以疏利腫消為度治產後腫滿因宿有抑鬱滯氣留結不散變為浮腫煩悶咳逆惡血不行大腹皮湯方大腹皮赤茯苓去黑皮當歸切焙紫蘇莖葉青橘皮湯浸去白炒甘草炙銼木通銼各一兩桑根白皮銼木香檳榔銼大黃銼炒各半兩上一十一味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日三治產後浮腫煩悶羌活湯方羌活去蘆頭青橘皮去白麩炒各半兩枳殼去瓤麩炒芎藭生乾地黃焙白朮銼桑根白皮各一兩木香牽牛子略炒訶黎勒皮微炒赤茯苓去黑皮各半兩上一十一味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治產後腫滿喘咳防己枳殼湯方防己一兩枳殼去瓤麩炒二兩桑根白皮銼當歸切焙各一兩木香半兩紫蘇莖銼檳榔銼各一兩上七味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服不拘時治產後腫滿喘急咳嗽貝母湯方貝母去心桑根白皮銼紫菀赤茯苓去黑皮五味子各一兩杏仁去皮尖雙仁別研人參各一兩半葶藶隔紙炒半兩上八味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治產後遍身腫滿牽牛子丸方牽牛子半生半熟枳殼去瓤麩炒各一兩當歸切焙生乾地黃焙芎藭桑根白皮銼木香炮防己訶黎勒炮去核各半兩上九味搗羅為末煉蜜丸如梧桐子大每服二十丸煎桑根白皮湯下不拘時治產後腫滿心煩氣悶腸胃不利羚羊角湯方羚羊角屑延胡索枳殼去瓤麩炒芍藥劉寄奴檳榔銼桑根白皮銼等分上七味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治產後腫滿煩悶喘咳枳殼丸方枳殼去瓤麩炒防己各二兩訶黎勒皮半兩大黃炒一兩當歸切焙二兩郁李仁去皮別研半兩桑根白皮銼一兩上七味除研外搗羅為末拌勻煉蜜丸如梧桐子大每服二十丸生薑紫蘇湯下不拘時治產後通身暴腫煩悶不食商陸湯方商陸根銼二兩防風去叉一兩甘草炙半兩附子炮裂去皮臍一枚赤小豆二合麻子仁三合上六味㕮咀如麻豆每服五錢匕水一盞半煎取一盞去滓溫服不拘時治產後遍身頭面浮腫乾地黃湯方生乾地黃焙白朮芍藥赤茯苓去黑皮各一兩桑根白皮銼二兩甘草銼半兩赤小豆五合黃耆銼商陸根銼各二兩上九味並生用粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服不拘時治產後頭面四肢腫滿氣喘咳嗽貝母丸方貝母去心赤茯苓去黑皮各二兩紫菀桑根白皮銼五味子杏仁去皮尖雙仁炒別研膏人參各一兩大棗一十枚煮熟去皮核別研膏上八味除研二味外搗羅為末以杏仁棗膏拌如干更入煉蜜少許丸如梧桐子大每服二十丸至三十丸濃煎商陸根湯下不拘時治產後頭面浮腫兩脅痛枳殼丸方枳殼去瓤麩炒一兩一分訶黎勒煨去核二兩當歸切焙大