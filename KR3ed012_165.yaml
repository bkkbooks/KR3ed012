一兩上一十味粗搗篩每服二錢匕水一盞煎至七分去滓食前服治產後大便不通皂莢內藥方豬牙皂莢生杏仁湯退去皮尖生蛇蛻皮微炙乾薑炮各一分蜜半兩上五味先搗前四味細羅為末於銚子內熬蜜三兩沸後下藥末不住手攪候可丸即丸如棗核大每一丸用綿子裹藥以麻油潤藥上納下部中仰臥便通未通再納治產後熱毒氣結燥大便不通壅滯氣悶疼痛腰重脅脹大腹皮湯方大腹皮五枚細銼枳殼去瓤麩炒赤芍藥銼各一兩秦艽去苗土羌活去蘆頭各半兩天門冬去心焙乾三分生乾地黃焙一兩甘草炙三分郁李仁去皮半兩炒上九味粗搗篩每服三錢匕水一盞煎至七分去滓溫服得利為度治產後大腸結燥秘澀氣壅脹悶欲死宜蜜煎導方蜜半碗上一味銚內微火煎之攪令稠如餳取出搓如手指大小約長二寸納下部中須臾即通未通再納不妨治產後大便不通大腸結燥腹中壅脹納藥方皂莢不銼蚛者一梃去皮子酥炙搗為末鹽豉半合研細白蜜一合上三味先熬蜜令消次下鹽豉皂莢末慢火煎不住手攪候如餳即止丸如棗核大納一丸入下部中未通可納三五丸不妨藥在內自化如得通利即隨出治產後下部閉塞大便秘結不通以烏梅導方烏梅十四枚上一味溫湯浸取肉搗丸如小檳榔大每用一枚納下部中立通治產後大腸熱燥糟粕結硬藥勢不入大便不通宜以皂莢導方皂莢肥不蚛者去皮子一梃上一味搗羅為末煉蜜和丸如棗大取一丸納下部中須臾即通治產後大便不通七八日以上者溫中丸方硫黃用柳木細研飛過生用上一味用水浸炊餅和丸如梧桐子大每服二十丸或三十丸用木香少許煎湯吞下即效治大便不通不問老幼皆可吃中和散方附子一兩一半生一半炒大黃一兩一半生一半炒上二味同碾為散每服二錢匕溫米飲調下臨臥服
