壯三焦俞二穴在第十三椎下兩旁相去各一寸五分治腸鳴腹脹水穀不化腹中痛欲泄注目眩頭痛吐逆飲食不下肩背拘急腰脊強不得俯仰針入五分留七呼可灸三壯腎俞二穴在第十四椎下兩旁相去各一寸五分與臍平治虛勞羸瘦耳聾腎虛水臟久冷心腹䐜脹兩脅滿引少腹急痛目視䀮䀮少氣溺血小便濁出精陰中疼五勞七傷虛憊腳膝拘急足寒如冰頭重身熱振慄腰中四肢淫濼洞泄食不化身腫如水針入三分留七呼可灸以年為壯大腸俞二穴在第十六椎下兩旁相去各一寸五分治腰痛腸鳴腹脹繞臍切痛大小便不利洞泄食不化脊強不得俯仰針入三分留六呼可灸三壯小腸俞二穴在第十八椎下兩旁相去各一寸五分治小便赤澀淋瀝少腹㽲痛腳腫短氣不嗜食大便膿血出五痔疼痛婦人帶下針入三分留六呼可灸三壯膀胱俞二穴在第十九椎下兩旁相去各一寸五分足太陽脈氣所發治風勞腰脊痛泄利腹痛小便赤澀遺溺陰生瘡少氣足䯒寒拘急不得屈伸女子瘕聚腳膝無力針入三分留六呼可灸三壯中膂內俞二穴一名脊內俞在第二十椎下兩旁相去各一寸五分挾脊起肉治腸冷赤白痢腎虛消渴汗不出腰脊不得俯仰腹脹脅痛針入三分留十呼可灸三壯白環俞二穴在第二十一椎下兩旁相去各一寸五分足太陽脈氣所發治腰脊攣急痛大小便不利針如腰戶法同挺腹端身兩手相重支額縱息令皮膚俱緩乃取其穴針入八分得氣即先瀉訖多補之治腰髖疼腳膝不遂溫瘧腰脊冷疼不得安臥勞損風虛不宜灸慎房勞不得舉重物腰戶見督脈條中上髎二穴在第一空腰髁下挾脊陷中足太陽少陽絡治腰膝冷痛嘔逆鼻衄寒熱瘧婦人絕嗣陰挺出不收針入三分可灸七壯次髎二穴在第二空挾脊陷中治疝氣下墜腰脊痛不得轉搖急引陰器痛不可忍腰以下至足不仁背腠寒小便赤淋心下堅脹可灸七壯針入三分中髎二穴在第三空挾脊陷中厥陰少陽所結治丈夫五勞七傷六極腰痛大便難腹脹下利小便淋澀飧泄婦人絕子帶下月事不調針入二分留十呼可灸三壯下髎二穴在第四空挾脊陷中足太陽厥陰所結治腰痛不得轉側女子下蒼汁不禁寒濕內傷痛引少腹急疼大便下血針入二分留十呼可灸三壯會陽二穴一名利機在陰尾骨兩旁督脈氣所發治腹中冷氣泄利不止久痔陽氣虛乏陰汗濕針入八分可灸五壯附分二穴在第二椎下附項內廉兩傍相去各三寸手足太陽之會正坐取之治肩背拘急風冷客於腠頸項強痛不得回顧風勞臂肘不仁可灸五壯針入三分魄戶二穴在第三椎下兩旁相去各三寸正坐取之足太陽脈氣所發治背髆痛咳逆上氣嘔吐煩滿虛勞肺痿五屍走注項強不得回顧針入五分得氣即瀉又宜久留針灸亦得日可灸七壯至百壯止膏肓俞二穴在第四椎下兩旁相去各三寸主無所不療羸瘦虛損夢中失精上氣咳逆發狂健忘又取穴之法令人正坐曲脊伸兩手以臂著膝前令正直手大指與膝頭齊以物支肘勿令臂得動搖也從胛骨上角摸索至骨下頭其間當有四肋三間灸中間從胛骨之裡去胛容側指許摩𦛗去表肋間空處按之自覺牽引於肩中灸兩胛中一處至百壯多至五百壯當覺下嚨嚨似流水之狀亦當有所下出若得痰疾則無所不下也如病人已困不能正坐當令側臥挽上臂令前取穴灸之又以右手從左肩上住指頭所不及者是穴也左取亦然乃以前法灸之若不能久坐當伸兩臂令人挽兩胛骨使相離不爾即胛骨復其穴灸之無驗此灸訖後令人陽氣康盛當消息以自補養論曰昔在和緩不救晉侯之疾以其在膏之上肓之下針藥不能及即此穴是也神堂二穴在第五椎下兩旁相去各三寸正坐取之足太陽脈氣所發治肩痛胸腹滿灑淅寒熱背脊強急可灸五壯針入三分譩譆二穴在肩髆內廉挾第六椎下兩旁相去各三寸正坐取之足太陽脈氣所發以手痛按之病者言譩譆針入六分留三呼瀉五吸治腋拘攣暴脈急引脅痛熱病汗不出溫瘧肩背痛目眩鼻衄喘逆腹脹肩髆內廉痛不得俯仰可灸二七壯至百壯止膈關二穴在第七椎下兩旁相去各三寸陷中正坐取之足太陽脈氣所發治背痛惡寒脊強俯仰難食飲不下嘔噦多涎唾胸中噎悶可灸五壯針入五分魂門二穴在第九椎下兩旁相去各三寸陷中正坐取之足太陽脈氣所發治食飲不下腹中雷鳴大便不節小便赤黃可灸三壯針入五分陽綱二穴在第十椎下兩旁相去各三寸陷中正坐取之足太陽脈氣所發治腹滿䐜脹大便泄利小便赤澀身熱目黃可灸三壯針入五分意舍二穴在第十一椎下兩旁相去各三寸陷中正坐取之足太陽脈氣所發治腹滿虛脹大便滑泄背痛惡風寒食飲不下嘔吐不止消渴目黃可灸五十壯至一百壯針入五分胃倉二穴在第十二椎下兩旁相去各三寸足太陽脈氣所發治腹內虛脹水腫飲食不下惡寒背脊不得俯仰可灸五十壯針入五分肓門二穴在第十三椎下兩旁相去各三寸叉肋間與鳩尾相直治心下大堅婦人乳有餘疾可灸三十壯針入五分志室二穴在第十四椎下兩旁相去各三寸陷中足太陽脈氣所發治腰脊強痛食飲不消腹中堅急陰痛下腫失精小便淋瀝針入五分可灸三壯胞肓二穴在第十九椎下兩旁相去各三寸陷中伏而取之足太陽脈氣所發治腰痛惡寒少腹堅急癃閉下重不得小便澀痛腰背猝痛可灸五七壯針入五分秩邊二穴在第二十椎下兩旁相去各三寸陷中伏而取之足太陽脈氣所發治腰痛不能俯仰小便赤澀腰尻重不能舉五痔發腫針入五分可灸三壯承扶二穴一名肉郄一名陰關一名皮部在尻臀下股陰衝上紋中治腰脊相引如解久痔尻脽腫大便難陰胞有寒小便不利針入七分殷門二穴在肉郄下六寸治腰脊不可俯仰舉重惡血注之股外腫針入七分浮郄二穴在委陽上一寸展膝得之治小腸熱大腸結股外經筋急髀樞不仁可灸三壯針入五分委陽二穴三焦下輔腧也在足太陽之後出於膕中外廉兩筋間屈伸取之承扶下六寸足太陽脈之中治腋下腫痛胸滿膨膨筋急身熱飛屍遁注痿厥不仁小便淋瀝可灸三壯針入七分委中二穴土也在膕中央約紋中動脈足太陽脈之所入也為合治腰挾脊沉沉然遺溺腰重不能舉體風痹髀樞痛宜出血痼疹皆愈委中者血郄也熱病汗不出足熱厥逆滿膝不得屈伸取其經血立愈合陽二穴在膝約紋中央下二寸治腰脊強引腹痛陰股熱膝䯒酸重履歲難寒疝陰偏痛女子經血暴脫針入六分可灸五壯承筋二穴一名腨腸一名直腸在腨腸中央陷中治寒痹轉筋肢腫大便難腳腨酸重引少腹痛鼻鼽衄腰背拘急霍亂可灸三壯禁針承山二穴一名魚腹一名肉柱在兌腨腸下分肉之間陷中治腰背痛腳腨重戰慄不能立腳氣膝下腫霍亂轉筋大便難久痔腫痛可灸五壯針入七分飛揚二穴一名厥陽足太陽絡別走少陰在外踝上七寸治血痔歷節風足趾不得屈伸頭目眩逆氣鼽衄癲疾寒瘧可灸三壯針入三分付陽二穴在足外踝上三寸陽蹺隙太陽前少陽後筋骨間治痿厥風痹頭重䪼痛髀樞股䯒痛瘛瘲風痹不仁時有寒熱四肢不舉可灸三壯針入五分留七呼崑崙二穴火也在足外踝後跟骨上陷中足太陽脈之所行也為經治腰尻痛足腨腫不得履也鼽衄腳如結踝如裂頭痛肩背拘急咳喘暴滿陰腫痛小兒發癇瘛瘲炷如小麥大可灸三壯針入五分僕參二穴一名安邪在跟骨下陷中拱足得之治足跟痛不得履地腳痿轉筋屍厥如中惡狀霍亂吐逆癲癇狂言見鬼針入三分可灸七壯申脈二穴陽蹺脈所出在外踝下陷中容爪甲肉際治腰痛不能舉體足䯒寒不能久立坐若在舟車中癲疾針入三分金門二穴一名關梁在足外踝外足太陽之隙陽維所別屬也治霍亂轉筋膝䯒酸身戰不能久立癲癇屍厥暴疝小兒發癇張口搖頭身反折可灸三壯炷如小麥大針入一分京骨二穴在足外側大骨下赤白肉際陷中足太陽脈之所過也為原治膝痛不得屈伸目內眥赤爛瘧寒熱善驚不欲食筋攣足䯒酸髀樞痛頸項強腰背不可俯仰鼽衄血不止目眩針入三分可灸七壯束骨二穴木也在足小趾本節後陷中足太陽脈所注也為俞治腰如折腨如結耳聾惡風寒目眩項不可回顧目內眥赤爛可灸三壯針入三分通谷二穴水也在足小趾外側本節前陷中足太陽脈之所流也為滎治頭重目眩善驚引鼽衄頸項痛目䀮䀮甄權曰結積留飲胸滿食不化可灸三壯針入二分至陰二穴金也在足小趾外側去爪甲角如韭葉足太陽脈之所出也為井治目生翳鼻塞頭重風寒從足小趾起脈痹上下帶胸脅痛無常轉筋寒瘧汗不出煩心足下熱小便不利失精針入二分可灸三壯凡此足太陽之脈常多血少氣刺之當出血惡氣其經從頭走足審其經脈明其逆順而迎隨之以行補瀉氣盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之此治足太陽之法也足少陰腎經足少陽腎之經起於小趾之下斜趣足心出於然谷之下循內踝之後別入跟中以上腨內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中是動則病飢不欲食面黑如地色咳唾則有血喝喝如喘坐而欲起目䀮䀮如無所見心如懸病若飢狀氣不足則善恐心惕惕如人將捕之是為骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊臀股內後廉痛痿厥嗜臥足下熱而痛盛者氣口大再倍於人迎虛者氣口反小於人迎也足少陰之別名曰大鐘當踝後繞跟別走太陽其別者並經上走於心包下外貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所別也足少陰之筋起於小趾之下並太陰之筋斜走內踝之下結於踵與太陽之筋合而上結於內輔之下並太陰之筋而上循陰股結於陰器循脊內挾膂上至項結於枕骨與足太陽之筋合其病足下轉筋及所過而結者皆痛及轉筋病在此者主癇瘛及痙在外者不能俯在內者不能仰故陽病者腰反折不能俯陰病者不能仰治在燔針劫刺以知為數以痛為腧在內者熨引飲藥發數甚者死不治名曰仲秋痹也邪客於足少陰之絡令人猝心痛暴脹胸脅支滿無積者刺然骨之前出血如食頃而已不已左取右右取左病新發者取五日已邪客於足少陰之絡令人嗌痛不可納食無故善怒氣走賁上刺足下中央之脈各三痏凡六刺立已左刺右右刺左嗌中腫不能納唾時不能出唾者刺然骨之前出血立已左右互刺腎病者腹大脛腫喘咳身重寢汗出憎風虛則胸中痛大腹小腹痛清厥意不樂取其經少陰太陽血者腎熱病者先腰痛䯒酸苦渴數飲身熱熱爭則項痛而強䯒寒且酸足下熱不欲言其逆則項痛員員澹澹然戊已甚壬癸大汗氣逆則戊已死刺足少陰太陽腎熱病者頤先赤故熱病先身重骨痛耳聾好瞑刺足少陰病甚為五十九刺足少陰腎經從足走胸中長六尺五寸左右共一丈三尺凡五十四穴湧泉二穴一名地衝在足心陷中屈足卷趾宛宛中然谷二穴一名龍淵在足內踝前起大骨下陷中太谿二穴在足內踝後跟骨上動脈陷中大鐘二穴在足跟後沖中水泉二穴去太谿下一寸在內踝下照海二二穴在足內踝下陰蹺脈所生復溜二穴一名伏白一名昌陽在足內踝上二寸交信二穴在內踝上二寸少陰前太陰後築賓二穴在內踝上腨分中陰維之隙陰谷二穴在膝內輔骨後大筋下小筋上橫骨二穴在大赫下一寸大赫二穴一名陰維一名陰關在氣穴下一寸氣穴二穴一名子戶在四滿下一寸四滿二穴一名髓府在中注下一寸中注二穴在肓俞下一