足陽明脈氣所發治胸滿短氣唇腫乳癰寒熱臥不安可灸五壯針入四分乳中二穴當乳中是足陽明脈氣所發禁不可灸灸不幸生蝕瘡瘡中有清汁膿血可治瘡中有息肉若蝕瘡者死微刺一二分乳根二穴在乳下一寸六分陷中仰而取之足陽明脈氣所發治胸下滿痛臂腫乳癰悽慘寒痛不可按抑可灸五壯針入三分不容二穴在幽門兩旁各一寸五分去任脈二寸直四肋端足陽明脈氣所發治腹滿痃癖不嗜食腹虛鳴嘔吐胸背相引痛喘咳口乾痰癖脅下痛重肋疝瘕針入五分可灸五壯承滿二穴在不容下一寸足陽明脈氣所發治腸鳴腹脹上喘氣逆食飲不下肩息唾血可灸五壯針入三分梁門二穴在承滿下一寸足陽明脈氣所發治脅下積氣食飲不思大腸滑泄穀不化可灸五壯針入三分關門二穴在梁門下一寸足陽明脈氣所發治遺溺善滿積氣腸鳴猝痛泄利不欲食腹中氣遊走挾臍急痰瘧振寒針入八分可灸五壯太一二穴在關門下一寸足陽明脈氣所發治癲疾狂走心煩吐舌可灸五壯針入八分滑肉門二穴在太一下一寸足陽明脈氣所發治癲疾嘔逆吐舌可灸五壯針入八分天樞二穴大腸之募一名長溪一名谷門去肓腧一寸五分挾臍旁二寸足陽明脈氣所發療挾臍切痛時上衝心煩滿嘔吐霍亂寒瘧泄利食不化女子月事不時血結成塊腸鳴腹痛不嗜食可灸百壯針入五分留十呼外陵二穴在天樞下一寸足陽明脈氣所發治腹中痛心如懸下引臍腹痛可灸五壯針入三分大巨二穴在長溪下二寸足陽明脈氣所發治少腹脹滿煩渴㿗疝偏枯四肢不舉可灸五壯針入五分水道二穴在大巨下三寸足陽明脈氣所發治少腹滿引陰中痛腰背強急膀胱有寒三焦結熱小便不利可灸五壯針入二寸五分歸來二穴在水道下二寸治少腹賁豚卵縮莖中痛婦人血臟積冷可灸五壯針入八分氣衝二穴一名氣街在歸來下鼠鼷上一寸動脈應手宛宛中足陽明脈氣所發治腸中大熱不得安臥腹有逆氣上攻心腹脹滿淫濼月水不利身熱腹中痛㿗疝陰腫難乳子上搶心痛不得息氣衝腰痛不得俯仰陰痿莖中痛兩丸騫痛不可忍可灸七壯立愈炷如大麥禁不可針髀關二穴在膝上伏兔後交分中治膝寒不仁痿厥股內筋絡急針入六分伏兔二穴在膝上六寸起肉一本云膝蓋上七寸治風勞氣逆膝冷不得溫針入五分不可灸陰市二穴一名陰鼎在膝上三寸伏兔下若拜而取之治寒疝少腹痛脹滿腰以下伏兔上寒如注水針入三分不可灸梁丘二穴在膝上二寸兩筋間治大驚乳痛寒痹膝不能屈伸可灸三壯針入三分犢鼻二穴在膝臏下䯒上挾解大筋中治膝中疼痛不仁難跪起膝臏癰腫潰者不可治不潰者可治若犢鼻堅硬勿便攻先以洗熨即微刺之愈足三里二穴土也在膝下三寸䯒外廉兩筋間當舉足取之足陰明脈之所入也為合治胃中寒心腹脹滿胃氣不足惡聞食臭腸鳴腹痛食不化秦丞祖云諸病皆治食氣水氣蟲毒痃癖四肢腫滿膝䯒痠痛目不明華陀云療五勞羸瘦七傷虛乏胸中瘀血乳癰人年三十以上若不灸三里令氣上衝目可灸三壯針入五分足上廉二穴一名上巨虛在三里下三寸當舉足取之治飧泄腹脅支滿狂走挾臍腹痛食不化喘息不能行可灸三壯針入三分兼治臟氣不足偏風腲腿手足不仁可灸以年為壯條口二穴在下廉上一寸舉足取之治膝䯒寒痠痛足緩履不收濕痹足下熱針入五分可灸三壯足下廉二穴一名下巨虛在上廉下三寸當舉足取穴治少腹痛飧泄次趾間痛唇乾涎出不覺不得汗出毛髮焦脫肉少氣胃中熱不嗜食泄膿血胸脅少腹痛暴驚狂言非常女子乳癰喉痹䯒腫足跗不收針入八分可灸三壯豐隆二穴在外踝上八寸下廉䯒外廉陷中別走太陰治厥逆胸痛如刺腹中切痛大小便難澀厥頭痛面浮腫風逆四肢腫身濕喉痹不能言針入三分可灸三壯解谿二穴火也在衝陽後一寸五分腕上陷中足陽明脈之所行也為經治風水面浮腫顏黑厥氣上衝腹脹大便下重瘛驚膝股䯒腫轉筋目眩頭痛癲疾煩心悲泣霍亂頭風面目赤針入五分可灸三壯衝陽二穴在足跗上去陷谷三寸足陽明脈之所過也為原治偏風口眼喎斜肘腫齒齲痛發寒熱腹堅大不嗜食振寒久狂登高而歌棄衣而走足緩履不收針入五分可灸三壯陷谷二穴木也在足大趾次趾之間本節後陷中去內庭二寸足陽明脈之所注也為輸治面目浮腫及水病善噫腸鳴腹痛熱病汗不出振寒瘧疾針入三分留七呼可灸三壯內庭二穴水也在足大趾次趾外間陷中足陽明脈之所流也為滎治四肢厥逆腹脹滿數欠惡聞人聲振寒咽中引痛口喎齒齲痛瘧不嗜食可灸三壯針入三分厲兌二穴金也在足大趾次趾之端去爪甲如韭葉足陽明脈之所出也為井治屍厥口噤氣絕狀如中惡心腹脹滿熱病汗不出寒熱瘧不嗜食而腫足䯒寒喉痹齒齲惡風鼻不利多驚好臥針入一分可灸一壯凡此足陽明之脈血氣俱多刺當出血氣其經從頭走足順之為隨逆之為迎盛則瀉之虛則補之熱則疾之寒則留之陷中則灸之不盛不虛以經取之此治足陽明之法足太陰脾經足太陰脾之經起於大趾之端循趾內側白肉際過核骨後上內踝前廉上腨內循脛骨後交出厥陰之前上循膝股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛溏瘕泄水閉黃疸不能臥強欠股膝內腫厥足大趾不用為此諸病盛者氣口大三倍於人迎虛者氣口反小於人迎也足太陰之別名曰公孫去本節之後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則鼓脹取之所別也足太陰之筋起於大趾之端內側上結於內踝其直者上結於膝內輔骨上循陰股結於髀聚於陰器上腹結於臍循腹裡結於脅散於胸中其內者著於脊其病足大趾支內踝痛轉筋痛膝內輔骨痛陰股引髀而痛陰器扭痛上引臍兩脅痛引膺中脊內痛治在燔針劫刺以知為數以痛為腧名曰孟秋痹也邪客於足太陰之絡令人腰疼引少腹控䏚不可以仰息刺腰尻之解兩胛之上是腰俞以月死生為痏數髮針立已左刺右右刺左脾病者身重善肌肉痿足不收行善瘛腳下痛虛則腹滿腸鳴飧泄食不化取其經太陰陽明少陰血者脾熱病者先頭重頰痛煩心顏青欲嘔身熱熱爭則腰痛不可俯仰腹滿兩頷痛甲乙甚戊己大汗氣逆則甲乙死刺足太陰陽明脾之大絡脈別名曰大包出淵腋下三寸布胸脅實則一身盡痛虛則百節皆縱此絡若羅絡之血者皆取之足太陰脾經從足走胸中長六尺五寸左右共一丈三尺凡四十二穴隱白二穴在足大趾端內側去爪甲角如韭葉大都二穴在足大趾本節後陷中太白二穴在足內側核骨下陷中公孫二穴在足大趾本節之後一寸商丘二穴在足內踝下微前陷中三陰交二穴在內踝上三寸骨下陷中漏谷二穴在內踝上六寸骨下陷中地機二穴一名脾舍在別走上一寸空中膝下五寸陰陵泉二穴在膝下內側輔骨下陷中血海二穴在膝臏上內廉白肉際二寸箕門二穴在魚腹上越筋間陰股內動脈衝門二穴去大橫五寸在府舍下橫骨端府舍二穴在腹結下三寸腹結二穴一名腸窟在大橫下三分大橫二穴在腹哀下三寸五分腹哀二穴在日月下一寸五分食竇二穴在天溪下一寸五分天溪二穴在胸鄉下一寸六分胸鄉二穴在周榮下一寸六分周榮二穴在中府下一寸六分陷中大包二穴在淵腋下三寸九肋間隱白二穴木也在足大趾端內側去爪甲角如韭葉足太陰脈之所出也為井治腹脹喘滿不得安臥嘔吐食不下暴泄衄血猝屍厥不識人足寒不能溫針入三分若婦人月事過時不止刺之立愈大都二穴火也在足大趾本節後陷中足太陰脈之所流也為滎治熱病汗不出手足逆冷腹滿善嘔煩熱悶亂吐逆目眩可灸三壯針入三分太白二穴土也在足內側核骨下陷中足太陰脈之所注也為輸治身熱煩滿腹脹食不化嘔吐泄膿血腰痛大便難氣逆霍亂腹中切痛可灸三壯針入三分公孫二穴在足大趾本節後一寸別走陽明太陰絡治寒瘧不嗜食猝面腫煩心狂言腹虛脹如鼓可灸三壯針入四分商丘二穴金也在足內踝下微前陷中足太陰脈之所行也為經治腹脹腸中鳴不便脾虛令人不樂身寒善太息心悲氣逆痔疾骨疽蝕絕子厭夢可灸三壯針入三分三陰交二穴在內踝上三寸骨下陷中足太陰厥陰少陰之交會治痃癖腹中寒膝股內痛氣逆小便不利脾病身重四肢不舉腹脹腸鳴溏泄食不化女子漏下不止可灸三壯針入三分昔宋太子善醫術出遊見孕婦診之曰此一女也令徐文伯亦診之曰此一男一女也太子欲剖之文伯乃以針瀉足三陰交補手陽明合谷應針而落故妊娠不可刺漏谷二穴亦名太陰絡在內踝上六寸骨下陷中治痃癖冷氣心腹脹滿食飲不為肌膚濕痹不能久立針入三分地機二穴亦名脾舍足太陰郄別走上一寸空在膝下五寸治女子血瘕按之如湯沃股內至膝丈夫溏泄腹脅氣脹水腫腹堅不嗜食小便不利可灸三壯針入三分陰陵泉二穴水也在膝下內側輔骨下陷中伸足取之足太陰脈之所入也為合又曲膝取之治腹中寒不嗜食膈下滿水脹腹堅喘逆不得臥腰痛不得俯仰霍亂疝瘕小便不利氣淋寒熱不節針入五分血海二穴在膝臏上內廉白肉際二寸中治女子漏下惡血月事不調逆氣腹脹可灸三壯針入五分箕門二穴在魚腹上越筋間動脈應手在陰股內一云在股上起筋間治淋遺溺鼠鼷腫痛小便不通可灸三壯衝門二穴一名慈宮上去大橫五寸府舍下橫骨兩端約紋中動脈足太陰厥陰之會治腹寒氣滿積聚疼淫濼陰疝產難子上衝心不得息針入七分可灸五壯府舍二穴在腹結下三寸足太陰厥陰陰維之交會此三脈上下三入腹絡肝脾結心肺從脅上至肩此太陰郄三陰陽明支別治疝瘕脾中急痛循脅上下搶心腹滿積聚厥氣霍亂針入七分可灸五壯腹結二穴在大橫下三分一名腸窟治繞臍痛上衝搶心腹寒泄利咳逆針入七分可灸五壯大橫二穴在腹哀下三寸五分直臍旁足太陰陰維之會療大風逆氣多寒善悲可灸五壯針入三分腹哀二穴在日月下一寸五分足太陰陰維之會治大便膿血寒中食不化腹中痛針入三分食竇二穴在天溪下一寸六分舉臂取之足太陰脈氣所發治胸脅支滿膈間雷鳴滀陸滀陸常有小聲針入四分可灸五壯天溪二穴在胸鄉下一寸六分陷中仰而取之足太陰脈氣所發治胸中滿痛乳腫賁膺咳逆上氣喉中作聲針入四分可灸五壯胸鄉二穴在周榮下一寸六分陷中仰而取之足太陰脈氣所發治胸脅支滿引胸背痛臥不得轉側針入四分可灸五壯周榮二穴在中府下一寸六分陷者中仰而取之足太陰脈氣所發治胸脅支滿不得俯仰飲食不下咳唾稠膿針入四分大包二穴在淵腋下三寸脾之大絡布胸脅中出九肋間治腹有大氣氣不得息胸脅中痛內實則其身盡寒虛則百節皆縱可灸三壯針入三分凡此足太陰之脈常多氣少血刺之當出氣而惡血其經從足走腹自下刺而上者為隨自上刺而下者為迎病在衛取之氣病在營取之血病在筋劫刺之病在浮絡者繆刺之太陰之陰名曰關蟄視其部中有浮絡者皆太陰之絡也絡盛則入客於經其入於絡也則絡脈盛色變其入客於經也則感虛乃陷下其留於筋骨之間寒多則筋攣骨痛熱多則筋弛骨消肉爍䐃破毛直而敗矣凡十二經之病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之此治足太陰之法也手少陰心經手少陰心經起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目系其直者復從心系卻上肺下出腋下下循臑內後廉行太陰心主之後下肘內循臂內後廉抵掌後銳骨之端入掌內後廉循小指之內出其端是動則病嗌乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅痛臑臂內後廉痛厥掌中熱痛盛者氣口大再倍於人迎虛者氣口反小於人迎也手少陰之別名曰通里去腕一寸別而上行循經入於心中系舌本屬目系其實則支膈虛則不能言取之掌後一寸別走太陽也手少陰之經起於小指之內側結於銳骨上結肘內廉上入腋交太陰挾乳里結於胸中循賁下繫於臍其病內急心承伏梁下為肘網其病當所過者支轉筋筋痛治在燔針劫刺以知為數以痛為腧其成伏梁唾血膿者死不治經筋之病寒則反折筋急熱則筋弛縱不收陰萎不用陽急則反折陰急則俯不伸淬刺者刺寒急也熱則筋縱不收無用燔針名曰季冬痹也心病者胸中痛脅支滿脅下痛膺背肩胛間痛兩臂內痛虛則胸腹大脅下與腰相引而痛取其經少陰太陽舌下血者其變病刺隙中出血心熱病者先不樂數日乃熱熱爭則卒心痛煩悶善嘔頭痛面赤無汗壬癸甚丙丁大汗氣逆則壬癸死刺手少陰太陽手少陰心經從腹走手長三尺五寸左右共七尺凡一十八穴極泉二穴在臂內腋下筋間動脈入胸青靈二穴在肘上三寸少海二穴一名曲節在肘內廉節後陷中靈道二穴在掌後一寸五分或曰一寸通里二穴在腕後一寸陰郄二穴在掌後脈中去腕五分神門二穴一名兌沖一名中都在掌後兌骨端少府二穴在手小指本節後陷中直勞宮少衝二穴一名經始在手小指內廉端去爪甲如韭葉極泉二穴在腋下筋間動脈入胸治心痛乾嘔四肢不收咽乾煩渴臂肘厥寒目黃脅下滿痛可灸七壯針入三分青靈二穴在肘上三寸舉臂取之治肩臂不舉不能帶衣頭痛振寒目黃脅痛可灸七壯少海二穴水也一名曲節在肘內廉節後又云肘內大骨外去肘端五分手少陰脈之所入也為合治寒熱齒齲痛目眩發狂嘔吐涎沫項不得回顧肘腋脅下痛四肢不得舉針入三分可灸三壯甄權云屈手向頭取之治齒寒腦風頭痛不宜灸針入五分靈道二穴金也去掌後一寸五分或一寸手少陰脈之所行也為經治心痛悲恐相引瘛瘲肘𤼣暴喑不能言可灸三壯針入三分通里二穴在腕後一寸治熱病猝心中懊憹數欠頻伸悲恐目眩頭痛面赤而熱心悸肘臂臑痛實則支腫虛則不能言苦嘔喉痹少氣遺溺針入三分可灸三壯陰郄二穴在掌後脈中去腕五分治失喑不能言灑淅振寒厥逆心痛霍亂胸中滿衄血驚恐針入三分可灸七壯神門二穴土也一名兌沖在掌後兌骨之端陷中手少陰脈之所注也為輸治瘧心煩甚欲得飲冷惡寒則欲處溫中咽乾不嗜食心痛數噫恐悸少氣不足手臂寒喘逆身熱狂悲哭嘔血上氣遺溺大小人五癇可灸七壯炷如小麥大針入三分留七呼少府二穴火也在小指本節後陷中直勞宮手少陰脈之所流也為滎治煩滿少氣悲恐畏人掌中熱肘腋攣急胸中痛手卷不伸針入二分可灸七壯少衝二穴木也一名經始在手小指內廉之端去爪甲角如韭葉手少陰脈之所出也為井治熱病煩滿上氣心痛痰冷少氣悲恐善驚掌中熱胸中痛口中熱咽中酸乍寒乍熱手攣不伸引肘腋痛針入一分可灸三壯凡此手少陰之脈常少血多氣刺之當出氣惡血其經從臟走手審其逆順而迎隨之有餘則瀉不足則補熱則疾之寒則留之陷下則灸之不盛不虛以經取之此治手少陰之法也手太陽小腸經手太陽小腸之經起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩筋之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目銳眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴是動則病嗌痛頷腫不可以顧肩似拔臑似折是主液所生病者耳聾目黃頰腫頸頰肩臑肘臂外後廉痛盛者人迎大再倍於氣口虛者人迎反小於氣口也手太陽之別名曰支正上腕五寸內注少陰其別者上走肘絡肩髃實則節弛肘廢虛則生疣小者如指痂疥取之所別也手太陽之筋起於小指之上結於腕上循臂內廉結於肘內銳骨之後彈之應小指之上入結於腋下其支者後走腋後廉上繞肩胛循頸出足太陽之前結於耳後完骨其支者入耳中直者出耳上下結於頷上屬目外眥其病小指支肘內銳骨後廉痛循臂陰入腋下腋下痛腋後廉痛繞肩胛引頸而痛應耳中鳴痛引頷目瞑良久乃得視頭筋急則為筋瘻頸腫寒熱在頸者治在燔針劫刺其為腫者復而銳之本支者上曲牙循耳前屬目外眥上頷結於角其病當所過者支轉筋治在燔針劫刺以知為數以痛為腧名曰仲夏痹也小腸病者少腹痛腰脊控睪而痛時窘之後耳前熱若寒甚若獨肩上熱甚及小指次指之間熱若脈陷者此其候也邪在小腸者連睪系屬於脊貫肝肺絡心系氣盛則厥逆上衝腸胃動肝肺散於肓結於臍故取之肓原以散之刺太陰以與之取厥陰以下之取巨虛上下廉以去之按其所過經以調之手太陽之經從手走頭長五尺左右共一丈凡三十八穴少澤二穴一名少吉在手小指之端去爪甲下一分陷中前谷二穴在手小指外側本節前陷中後谿二穴在手小指外側本節後陷中腕骨二穴在手外側腕前起骨下陷中陽谷二穴在手外側腕中兌骨下陷中養老二穴在踝骨上一空腕後一寸陷中支正二穴在腕後五寸別走少陰小海二穴在肘內大骨外去肘端五分陷中肩貞二穴在肩曲胛下兩骨解間臑俞二穴在挾肩髎後大骨下胛上廉陷中天宗二穴在秉風后大骨下陷中秉風二穴在天髎外肩上小髎骨後