body:
  text: 卷第一百九十一針灸門骨度統論論曰凡用針當先明骨節骨節既定然後分別經絡所在度以身寸以明孔穴為施刺灸觀病所在或淺或深若在皮毛若在血脈是動者治其氣所生病者治其血在浮絡者取其浮絡之血在筋者以燔針劫刺之有餘則瀉不足則補不盛不虛以經取之治之大體也然人身骨節之數三百六十有五以應一期之日骨節所在大小長短廣狹厚薄或隱或顯有勢無勢有體無體有液無液皆有定體實刺法之先務也內經具載但有骨空去處其骨度之說徒有其名未載其法至於三百六十之數因亦泯然使用針之人妄意腧穴不知骨節本原徒為針灸未得其法枉傷肌肉良可惜也今摭自古醫經有骨度之數析骨之論凡三百六十五骨之法以此論骨胳其庶矣故著於篇以冠針法之首云骨空穴法人之周身總有三百六十五骨節以一百六十五字都關次之首自鈐骨之上為頭左右前後至轅骨以四十九字共關七十二骨巔中為都顱骨者一有勢微有髓及有液次顱為髏骨者一有勢微有髓髏前為頂威骨者一微有髓女人則無此骨髏後為腦骨者一有勢微有髓腦左為枕骨者一有勢無液腦右為就骨者一有勢無液枕就之中附下為天蓋骨者一下為肺系之本蓋骨之後為天柱骨者一下屬脊窳有髓蓋前為言骨者一言上覆合於髏骨有勢無髓言下為舌本骨者左右共二有勢無髓髏前為囟骨者一無勢無液囟下為服委骨者一俚人訛為伏犀骨是也無髓勢服委之下為俊骨者一附下即眉字之分也無髓勢眉上左為天賢骨者一無勢無髓下同眉上之右為天貴骨者一眉上直目睛也左睛之上為智宮骨者一無髓無勢右睛之上為命門骨者一無髓勢兩睛之下中則為鼻鼻之前為梁骨者一無髓無勢梁之左為顴骨者一無勢無髓梁之右為糺骨者一有勢無髓梁之端為嵩柱骨者一無髓勢其顴糺之後即耳之分也左耳為司正骨者一無髓無勢右耳為納邪骨者一無髓無勢正邪之後為完骨者左右共二無勢無液正邪之上附內為嚏骨者一無勢少液嚏後之上為通骨者左右前後共四有勢少液嚏上為齶骨者一無勢多液其㗁後連屬為頷也左頷為乘骨者一有勢多液右頷為車骨者一無勢多液乘車上下出齒牙三十六事無髓勢庸下則不滿其數乘車之後為轅骨者左右共二有液有勢復次鈐骨之下為膻中左右前後至蓧以四十字關九十七骨轅骨之下左右為鈐骨者二多液鈐中為會厭骨者一無髓勢鈐中之下為咽骨者左中及右共三無髓嚥下為喉骨左中及右共三無髓喉下為嚨骨者環次共十事無髓嚨下之內為肺系骨者累累然共十二無髓勢肺系之後為谷骨者一無髓谷下為鬲道骨者左右共二無髓嚨外次下為順骨者共八少液順骨之端為順隱骨者共八少液順下之左為洞骨者一女人無此順下之右為棚骨者一女人無此二骨洞棚之下中央為𩩲𩨗骨者一無髓俚人呼為鳩尾𩩲𩨗直下為天樞骨者一無髓鈐下之左右為缺盆骨者二有勢多液左缺盆前之下為下厭骨者一無髓右缺盆前之下為分膳骨者一無髓厭膳之後附下為倉骨者一無髓倉之下左右為髎骨者共八無液有勢髎下之左為胸骨者一男子此骨大則好勇髎下之右為蕩骨者一女人此骨大者多夫胸之下為烏骨者一男女此骨滿者鬢髮早白蕩之下為臆骨者一此骨高則使人多訛妄鈐中之後為脊窳骨者共二十二上接天柱有髓脊窳次下為大動骨者一上通天柱共成二十四顀大動之端為歸下骨者一道家謂之尾閭歸下之後為篡骨者一此骨能限精液歸下之前為蓧骨者一此骨薄者多處貧下復次缺盆之下左右至襯以二十五字關六十骨此下止分兩手臂至十指之端眾骨也支其缺盆之後為傴甲骨者左右共二有勢多液傴甲之端為甲隱骨者左右共二此骨長則至賢前支缺盆為飛動骨者左右共二此骨消則病痱緩次飛動之左為龍臑骨者一有勢多髓多液次飛動之右為虎沖骨者一有勢多髓液龍臑之下為龍本骨者一有勢多髓虎沖之下為虎端骨者一有勢多髓本端之下為腕也龍本之上內為進賢骨者一男子此骨隆則為名臣虎端之上內為及爵骨者一女人此骨高則為命婦腕前左右為上力骨者共八有勢多液次上力為駐骨者左右共十有勢多液次駐骨為搦骨者左右共十有勢多液次搦為助勢骨者左右共十左助外為爪右助外為甲爪甲之下各有襯骨者左右共十無勢有液復次𩩲𩨗之下左右前後至初步以五十一字關一百三十六骨此下自兩乳下分左右至兩足心眾骨所會處也𩩲𩨗之下為心蔽骨者一無髓𩩲𩨗之左為脅骨者上下共十二居小腸之分也左脅之端各有脅隱骨者分次亦十二無髓脅骨之下為季脅骨者共二多液季脅之端為季隱骨者共二無髓𩩲𩨗之右為肋骨者上下共十二處大腸之分也肋骨之下為䏚肋骨者共二各無隱骨唯獸有之右肋之端為肋隱骨者共十二無髓蓧骨之前為大橫骨者一有勢少髓橫骨之前為白環骨者共二有勢有液白環之前為內輔骨者左右共二有勢多液內輔之後為骸關骨者左右共二有勢多液骸關之下為楗骨者左右共二有勢多液楗骨之下為髀樞骨者左右共二有勢多髓髀樞下端為膝蓋骨者左右共二無勢多液膝蓋左右各有俠升骨者共二有勢多液髀樞之下為䯒骨者左右共二有勢多髓䯒骨之外為外輔骨者左右共二有勢有液䯒骨之下為立骨者左右共二有勢有液立骨左右各有內外踝骨者共四有勢少液踝骨之前左右各有下力骨者共十有勢多液踝骨之後各有京骨者左右共二有勢少液下力之前各有釋欹骨者左右共十有勢有液釋欹之前各有起僕骨者左右共十有勢起僕之前各有平助骨者左右共十有勢平助之前各有襯甲骨者左右共十無勢少液釋欹兩傍各有核骨者左右共二有勢多液起僕之下各有初步骨者左右共二有勢無髓有液女人無此骨凡此三百六十五骨也天地相乘惟人至靈其女人則無頂威左洞右棚及初步等五骨止有三百六十骨又男子女人一百九骨或隱或襯或無髓勢餘二百五十六骨並有髓液以藏諸筋以會諸脈溪谷相需而成身形謂之四大此骨度之常也昔黃帝問於伯高曰脈度言經脈之長短何以立之伯高對曰先度其骨節之大小廣狹長短而脈度定矣帝曰願聞眾人之度人長七尺五寸者其骨節之大小長短各幾何伯高曰頭之大骨圍二尺六寸胸圍四尺五寸腰圍四尺二寸發所復者顱至項尺二寸發以下至頤長一尺君子終折結喉以下至缺盆中長四寸缺盆以下至𩩲𩨗長九寸過則肺大不滿則肺小𩩲𩨗以下至天樞長八寸過則胃大不及則胃小天樞以下至橫骨長六寸半過則迴腸廣長不滿則狹短橫骨長六寸半橫骨上廉以下至內輔之上廉長一尺八寸內輔之上廉以下至下廉長三寸半內輔下廉下至內踝長一尺三寸內踝以下至地長三寸膝膕以下至跗屬長一尺六寸跗屬以下至地長三寸故骨圍大則太過小則不及角以下至柱骨長一尺行腋中不見者長四寸腋以下至季脅長一尺二寸季脅以下至髀樞長六寸髀樞以下至膝中長一尺九寸膝以下至外踝長一尺六寸外踝以下至京骨長三寸京骨以下至地長一寸耳後當完骨者廣九寸耳前當耳門者廣一尺三寸兩顴之間相去七寸兩乳之間廣九寸半兩髀之間廣六寸半足長一尺二寸廣四寸半肩至肘長一尺七寸肘至腕長一尺二寸半腕至中指本節長四寸本節至其末長四寸半項發以下至背骨長二寸半膂骨以下至尾骶二十一節長三尺上節長一寸四分分之一奇分在下故上七節至於膂骨九寸八分分之七此眾人骨之度也所以立經脈之長短也是故視其經脈之在人身也其見浮而堅其見明而大者多血細而沉者多氣也凡欲用針須明骨空所在及機關之節機關者內經曰輔骨上橫骨下為楗俠髖為機膝解為骸關俠膝之骨為連骸骸下為輔輔上為膕膕上為關頭橫骨為枕是也骨空者內經髓空在腦後三分在顱際銳骨之下風府穴也一在齗基下下頤是也一在項後中復骨下喑門穴也一在脊骨上空在風府上腦戶穴也脊骨下空在尻骨下空長強穴也數髓空在面挾鼻顴髎穴也或骨空在口下當兩肩大迎穴也兩髆骨空在髆中之陽近肩髃傳失其名臂骨空在臂陽去踝四寸兩骨空之間通間穴也股骨上空在股陽出上膝四寸承楗也胻骨空在輔骨之上端犢鼻穴也股際骨空在毛中動下經闕穴名尻骨空在髀骨之後相去四寸八髎穴也扁骨有滲理湊無髓孔易髓無空是也凡病屬巨陽少陰之經與衝脈任脈督脈之分者病本於骨各隨其要而灸刺之故風從外入令人振寒惡寒汗出身重頭痛或頸項痛者治在風府從風憎風刺眉頭攢竹穴也失枕在肩上橫骨間缺盆穴也折使揄臂齊肘正灸脊中陽關穴也䏚絡季脅引少腹而痛脹刺譩譆大風汗出則灸之腰痛不可轉搖急引陰卵刺八髎與痛上八髎在腰尻分間鼠瘻寒熱還刺寒府寒府在附膝外解營取膝上外者使之拜取足心者使之跪任脈為病男子內結七疝女子帶下瘕聚衝脈為病逆氣裡急督脈為病脊強反折此三脈生病者從少腹上衝心而痛不得前後為沖疝其女子不孕癃痔遺溺嗌乾督脈生病治督脈治在骨上曲骨穴也甚者在齊下營其上氣有音者治其喉中央在缺盆中者天突穴也其病上衝喉者治其漸漸者上挾頤也大迎穴也蹇膝伸不得屈治其楗坐而膝痛治其機立而暑解治其骸關膝痛痛及拇指治其膕委中穴也坐而膝痛如物隱者治其關膝痛不可屈伸治其背內大杼也連胻若折治陽明中俞髎三里穴也若別治巨陽少陰滎通谷及然谷穴淫濼脛酸不能久立治少陽之絡在外踝上五寸光明穴也經脈統論論曰經脈者其氣始從中焦注手太陰陽明陽明注足陽明太陰太陰注手少陰太陽太陽注足太陽少陰少陰注手心主少陽少陽注足少陽厥陰厥陰復會於中焦注手太陰此滎氣之序也營氣之行常循其經周身之度一十六丈二尺一日一夜行八百一十丈計五十度周於身衛氣則不循其經焉晝則行陽夜行於陰行陽者行諸經行陰者行諸臟凡刺之道須候衛氣所在然後迎隨以明補然營衛之行末始相從則血氣之分亦各有在一脈之間有所謂是動者有所謂所生病者此氣血之異也經曰刺營無傷衛刺衛無傷營針陽者臥針而刺之針陰者攝按氣散而內針茲其要妙營衛之外有浮絡者有經筋者又有別絡者其生病各不同刺法亦宜有異焉刺齊論所謂刺骨無傷筋刺筋無傷肉刺肉無傷脈刺脈無傷皮刺皮無傷肉刺肉無傷筋刺筋無傷骨是也知此乃知淺深之齊氣血之分故十二經立其常十五絡通其變邪在經則巨刺邪在絡則繆刺邪在營則調之血邪在衛則調之氣邪在筋則劫刺之夫然後原九針之宜行十二刺之節明五變之理審其部分刺道思過半矣今於逐脈之下載其經穴與其病證兼及浮絡經筋之病共為一編竅穴雖同而淺深各有部分在用針者以意審之手太陰肺經手太陰肺之經起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端是動則病肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者咳上氣喘渴煩心胸滿臑臂內前廉痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而欠氣虛則肩背痛寒少氣不足以息溺色變盛者氣口大三倍於人迎虛者氣口反小於人迎也手太陰之別名曰列缺起於腕上分間並太陰之經直入掌中散入於魚際其病實則手銳掌熱虛則欠㰦小便遺數取之去腕半寸別走陽明也手太陰之筋起於大指之上循指上行結於魚際之後行寸口外側上循臂結肘中上臑內廉入腋下出缺盆結肩前髃上結缺盆下結胸裡散貫賁合賁下抵季其病當所過者支轉筋痛甚則成息賁脅急吐血治在燔針劫刺以知為數以痛為腧名曰仲冬痹也肺病者喘咳逆氣肩背痛汗出尻陰股膝髀腨胻足皆痛虛則少氣不能報息耳聾嗌乾取其經太陰足太陽之外厥陰內血者肺熱病者先淅然厥起毫毛惡風寒舌上黃身熱熱爭則喘咳痛走胸膺背不得太息頭痛不堪汗出而寒丙丁甚庚辛大汗氣逆則丙丁死刺手太陰陽明出血如大豆立已手太陰肺經從腹走手長三尺五寸左右共七尺凡二十二穴中府二穴在乳上三肋間動脈應手去雲門一寸也雲門二穴在巨骨下挾氣戶旁各二寸陷中動脈應手舉臂取之天府二穴在腋下三寸舉臂取之俠白二穴在天府下去肘上五寸動脈中尺澤二穴在肘約紋中孔最二穴去腕上七寸列缺二穴在腕後一寸半經渠二穴在寸口脈中太淵二穴在掌後陷中魚際二穴在手大指本節後內側散脈中少商二穴在手大指端內側去爪甲角如韭菜中府二穴肺之募一名膺中腧在雲門下一寸乳上三肋間動脈應手手足太陰之會治肺系急胸中痛悚悚膽熱嘔逆上氣咳唾濁涕肩背痛風汗出腹脹食不下喉痹肩息膚骨痛寒熱針入三分留五呼可灸五壯雲門二穴在巨骨下挾氣戶旁各二寸陷中動脈應手手太陰脈氣所發治喉痹胸中煩滿氣上衝心咳喘不得息胸脅短氣肩痛不得舉臂可灸五壯針入三分刺深使人氣逆故不宜深刺天府二穴在腋下三寸動脈中舉臂取之治逆氣喘不得息目眩遠視䀮䀮猝中惡鬼疰不得安臥禁不可灸使人逆氣刺鼻衄血不止針入四分留三呼俠白二穴在天府下去肘五寸動脈中治心痛乾嘔煩滿針入三分可灸五壯尺澤二穴水也在肘中約紋上動脈中手太陰脈之所入也為合治風痹肘攣手臂不得舉喉痹上氣舌乾咳嗽唾濁四肢暴腫臂寒短氣針入三分可灸五壯孔最二穴在腕上七寸手太陰郄治熱病汗不出此穴可灸三壯即汗出咳逆臂厥痛針入三分灸五壯列缺二穴去腕側上一寸五分以手交叉頭指末筋骨罅中手太陰絡別走陽明療偏風口喎手腕無力半身不隨咳嗽掌中熱口噤不開寒瘧嘔沫善笑縱唇口健忘針入二分留三呼瀉五吸即可灸七壯經渠二穴金也在寸口陷中手太陰脈之所行也為經治瘧寒熱胸背拘急胸滿膨膨喉痹掌中熱咳嗽上氣數欠熱病汗不出暴痹喘逆心痛嘔吐針入二分留三呼禁不可灸灸即傷人神太淵二穴土也在手掌後陷中手太陰脈之所注也為腧治胸痹逆氣寒厥善噦嘔飲水咳嗽煩惋不得臥肺脹滿膨膨臂內廉痛目生白翳眼眥赤筋缺盆中引痛掌中熱數次喘不得息噫氣上逆心痛唾血振寒咽乾狂言口僻可灸三壯針入二分魚際二穴火也在手大指本節後內側散脈中手太陰脈之所流也為滎治灑淅惡風寒虛熱舌上黃身熱頭痛咳嗽汗不出痹走胸背痛不得息目眩煩心少氣腹痛不下食肘攣支滿喉中乾燥寒慄鼓頷咳引尻痛溺出嘔血心痹悲恐針入二分留三呼少商二穴木也在手大指端內側去爪甲角如韭葉手太陰之脈所出也為井治煩心善噦心下滿汗出而寒咳逆痎瘧振寒腹滿唾沫唇乾引飲不下膨膨手攣指痛寒慄鼓頷喉中鳴以三稜針刺之微出血泄諸臟熱氣唐刺史成君綽忽腮頷腫大喉中閉塞水粒不下三日針之立愈不宜灸凡此手太陰之脈常多氣少血刺之當出氣惡血其經從臟走手審而迎隨之氣盛則瀉氣虛則補熱則疾之寒則留之陷下則灸之不盛不虛以經取之此治手太陰之法也手陽明大腸經手陽明大腸經起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉上出於柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔是動則病齒痛䪼腫是主津液所生病者目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用氣有餘則當脈所過者熱腫虛則寒慄不復盛者人迎大三倍於氣口虛者人迎反小於氣口也手陽明之別名曰偏歷去腕三寸別入太陰其別者上肘循臂乘肩髃上曲頰遍齒其別者入耳會於宗脈實則齒齲耳聾虛則齒寒痹隔取之所別也手陽明之筋起於大指次指之端結於腕上循臂上結於肘外上臑結於髃其支者繞肩胛挾脊直者從肩髃上頸其支者上頰結於頄直者上出手太陽之前上左角絡頭下右頷其病當所過者支痛及轉筋肩不舉頸不可左右視治在燔針劫刺以知為數以痛為腧名曰孟夏痹也邪客於手陽明之絡令人氣滿胸中喘息而支胠胸中熱刺手大指爪甲上去端如韭葉各一痏左取右右取左如食頃已商陽穴也邪客於手陽明之絡令人耳聾時不聞音刺商陽立聞不已刺中指爪甲上與肉交者立聞其不時聞者不可刺也耳中生風者亦刺之如此數左刺右右刺左手陽明不已刺其通脈出耳前者熱病始手臂痛者刺手陽明太陰而汗出止手陽明大腸經從手走頭長五尺左右共一丈凡四十穴商陽二穴一名絕陽在手大指次指內側去爪甲角如韭葉二間二穴一名間谷在手大指次指本節前內側陷中三間二穴一名少谷在手大指次指本節後內廉側陷中合谷二穴一名虎口在大指次指骨間陽谿二穴一名中魁在腕中上側兩筋陷中偏歷二穴在腕中後三寸溫流二穴在腕後小士五寸大士六寸手下廉二穴在輔骨下去手上廉一寸輔兌肉其分外斜手上廉二穴在手三里下一寸其分獨抵陽明之會外斜手三里二穴在曲池下二寸曲池二穴在肘外輔骨屈肘曲骨之中肘髎二穴在肘大骨外廉陷中五里二穴在肘上三寸行向里大脈中央臂臑二穴在肘上七寸䐃肉端肩髃二穴在肩端兩骨間陷者宛宛中巨骨二穴在肩端上行兩叉骨間天鼎二穴在頸缺盆直扶突後一寸扶突二穴在人迎後一寸五分禾髎二穴一名長頻直鼻孔挾水溝旁五分迎香二穴一名衝陽在禾髎上鼻孔旁商陽二穴金也一名絕陽在手大指次指內側去爪甲角如韭葉手陽明脈之所出也為井治胸中氣滿喘咳支腫熱病汗不出耳鳴且聾寒熱痎瘧口乾頤頷腫齒痛惡寒肩背急相引缺盆痛目青盲可灸三壯右取左左取右如食頃立已針入一分留一呼二間二穴水也一名間谷在手大指次指本節前內側陷中手陽明脈之所流也為滎治喉痹頷腫肩背痛振寒鼻鼽衄血多驚口喎針入三分可灸三壯三間二穴木也一名少谷在手大指次指本節之後內側陷中手陽明脈之所注也為輸治喉痹咽中如鯁齒齲痛嗜臥胸滿腸鳴洞泄寒瘧唇焦口乾氣喘目眥急痛針入三分留三呼可灸三壯合谷二穴一名虎口在手大指次指岐骨間陷中手陽明脈之所過也為原療寒熱瘧鼻鼽衄熱病汗不出目視不明頭痛齒齲喉痹痿臂面腫唇吻不收喑不能言口噤不開針入三分留六呼可灸三壯若婦人妊娠不可刺刺則損胎氣陽谿二穴火也一名中魁在腕中上側兩筋陷中手陽明脈之所行也為經治狂言喜笑見鬼熱病煩心目風赤爛有翳厥逆頭痛胸滿不得息寒熱瘧疾喉痹耳鳴齒痛驚掣肘臂不舉痂疥針入三分留七呼可灸三壯慎如合谷法偏歷二穴手陽明絡也在腕後三寸別走太陰治寒熱瘧風汗不出目視䀮䀮癲疾多言耳鳴口喎齒齲喉痹嗌乾鼻鼽衄血針入三分留七呼可灸三壯溫溜二穴一名逆注一名蛇頭在腕後小士五寸大士六寸手陽明郄治口喎腸鳴腹痛傷寒身熱頭痛噦逆肩不得舉癲疾吐涎狂言見鬼喉痹面虛腫針入三分可灸三壯手下廉二穴在輔骨下去手上廉一寸輔兌肉其分外斜治頭風臂胛痛溺黃針入五分留五呼可灸三壯手上廉二穴在手三里下一寸其分獨抵陽陽之會外斜治腦風頭痛小便難黃赤腸鳴氣走注痛針入五分可灸五壯手三里二穴在曲池下二寸按之肉起兌肉之端治手臂不仁肘攣不伸齒痛頰頷腫瘰癧可灸三壯針入三分曲池二穴土也在肘外輔骨屈肘曲骨之中以手拱胸取之手陽明脈之所入也為合治肘中痛偏風半身不遂刺風癮疹喉痹不能言胸中煩滿筋緩捉物不得挽弓不開屈伸難風臂肘細而無力傷寒餘熱不盡皮膚乾燥針入七分得氣先瀉後補之可灸三壯肘髎二穴在肘大骨外廉陷中治肘節風痹臂痛不可舉屈伸攣急可灸三壯針入三分臂五里二穴在肘上三寸行向里大脈中央治風勞驚恐吐血肘臂痛嗜臥四肢不得動搖寒熱瘰癧咳嗽目視䀮䀮痎瘧心下脹滿可灸十壯禁不可針臂臑二穴在肘上七寸䐃肉端手陽明絡也治寒熱頸項拘急瘰癧肩背痛不得舉可灸三壯針入三分肩髃二穴在肩端兩骨間陷者宛宛中舉臂取之手陽明蹺脈之會療偏風半身不遂熱風癮疹手臂攣急捉物不得挽弓不開臂細無力筋骨痠疼可灸七壯至二七壯以瘥為度若灸偏風不遂可七七壯止不宜多灸恐手臂細若風病筋骨無力久不瘥當灸不畏細也刺即泄肩臂熱氣若患風痹手臂不得伸引刺之可使挽強習射如故巨骨二穴在肩端上行兩叉骨間陷中手陽明蹺脈之會治背髆痛胸中有瘀血肩臂不得屈伸而痛可灸五壯針入一寸五分天鼎二穴在頸缺盆直扶突後一寸手陽明脈氣所發治暴喑氣哽喉痹咽腫不得息飲食不下喉中鳴可灸三壯針入三分扶突二穴一名水穴在人迎後一寸五分手陽明脈氣所發治咳多唾上氣咽引喘息喉中如水雞鳴可灸三壯針入三分禾髎二穴在鼻孔下挾水溝旁五分手陽明脈氣所發治鼻衄血不止鼻清涕生瘡口噤不開針入二分迎香二穴在禾髎上一寸鼻孔旁五分手足陽明之會治鼻有息肉不聞香臭衄血偏風口喎面癢浮腫風動葉葉狀如蟲行或唇腫痛針入三分留三呼不宜灸凡此手陽明之脈多氣多血刺當出氣血其經從手走頭順之為隨逆之為迎盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之此治手陽明之法也足陽明胃經足陽明胃之經起於鼻交頞中旁約太陽之脈下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下膝臏中下循經外廉下足跗入中趾內間其支者下膝三寸而別下入中趾外間其支者別跗上入大趾間出其端是動則病洒洒振寒善呻數欠顏黑病至則惡人與火聞木音則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧溫淫汗出鼽衄口喎唇胗頸腫喉痹大腹水腫膝臏腫痛循膺乳氣街股伏兔䯒外廉足跗上皆痛中趾不用氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃氣不足則身以前皆寒慄胃中寒則脹滿盛者人迎大三倍於寸口虛者人迎反小於寸口也足陽明之別名曰豐隆去踝八寸別走太陰其別者循脛骨外廉上絡頭頂合諸經之氣下絡喉嗌其病氣逆則喉痹猝喑實則狂癲虛則足不收脛枯取之所別也足陽明之筋起於中三趾結於跗上斜外上加於輔骨上結於膝外廉直上結於髀樞上循脅屬脊其直者上循䯒結於膝其支者結於外輔骨合少陽其直者上循伏兔上結於髀聚於陰器上腹而布至缺盆而結上頸上挾口合於頄下結於鼻上合於太陽太陽為