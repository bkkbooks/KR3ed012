在腕後三寸兩骨之間陷中手少陽脈之所行也為經治熱病汗不出肩臂酸重脅腋痛四肢不舉霍亂嘔吐口噤不開暴啞不能言可灸二七壯針入二分會宗二穴在腕後三寸空中一寸治肌膚痛耳聾風癇針入三分可灸三壯三陽絡二穴在臂上大交脈支溝上一寸治嗜臥身體不欲動耳猝聾齒齲暴啞不能言可灸七壯禁不可針四瀆二穴在肘前五寸外廉陷中治暴氣耳聾齒齲痛可灸三壯針入六分留七呼天井二穴土也在肘外大骨後肘後上一寸兩筋間陷中屈肘得之手少陽脈之所入也為合甄權云曲肘後一寸叉手按膝頭取之兩筋骨罅治心胸痛咳嗽上氣唾膿不嗜食驚悸瘛瘲風痹臂肘痛捉物不得可灸三壯針入三分清冷淵二穴在肘上二寸伸肘舉臂取之治臑從肩臂不舉不得帶衣可灸三壯針入三分消濼二穴在肩下臂外開腋斜肘分下行治寒熱風痹項痛肩背急針入六分可灸三壯臑會二穴一名臑髎在肩前廉去肩頭三寸手陽明之絡治項癭氣瘤臂痛不能舉氣腫痓痛針入七分留十呼得氣即瀉可灸七壯肩髎二穴在肩端臑上陷中舉臂取之治肩重不可舉臂肘可灸三壯針入七分天髎二穴在肩缺盆中上毖骨之際陷中央手少陽陽維之會治肩肘痛引頭項急寒熱缺盆中痛汗不出胸中煩滿針入八分可灸三壯天牖二穴在頸筋間缺盆上天容後天柱前完骨下發際上手少陽脈氣所發治頭風面腫項強不得回顧針入一寸留七呼不宜補之亦不宜灸若灸之面腫眼合先取譩譆後針天牖風池其病即瘥若不先針譩譆即難廖其疾也翳風二穴在耳後陷中按之引耳中手足少陽之會治耳聾口眼喎斜失欠脫頷口噤不開吃不能言頰腫牙車急痛針入十分可灸七壯瘈脈二穴一名資脈在耳本後雞足青絡脈刺出血如豆汁不宜出血多治頭風耳鳴小兒驚癇瘛瘲嘔吐泄痢無時驚恐眵瞢目睛不明可灸三壯針入一分顱息二穴在耳後間青絡脈足少陽脈氣所發治身熱頭重脅痛不得轉側風痙耳聾小兒發癇瘛瘲嘔吐涎沫驚恐失精瞻視不明不宜針可灸七壯角孫二穴在耳郭中間上開口有空手足少陽之會治目生膚翳齒齦腫可灸三壯絲竹空二穴一名目髎在眉後陷中足少陽脈氣所發禁不可灸不幸使人目小又令人目無所見治目眩頭痛目赤視物䀮䀮風癇目戴上不識人眼睫毛倒發狂吐涎沫發即無時針入三分留三呼宜瀉不宜補和髎二穴在耳前兌發下橫動脈手少陽脈氣所發治牙車引急頭重痛耳中䐜䐜頷頰腫針入七分可灸三壯耳門二穴在耳前起肉當耳缺者治耳有膿汁出生瘡膣耳聤耳耳鳴如蟬聲重聽無所聞齒齲針入三分留三呼可灸三壯凡此手少陽之脈少血多氣刺當出氣惡血其經從手走頭順之為隨逆之為迎盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之此治手少陽之法也足少陽膽經足少陽膽之經起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目銳眥後其支別者別銳眥下大迎合於手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絕骨之端下出外踝之前循足跗上入小趾次趾之間其支者別跗上入大趾之間循大趾岐骨內出其端還貫爪甲出三毛是動則病口苦善太息心脅痛不能轉側甚則面微塵體無膏澤足外反熱是為陽厥是主骨所生病者頭角頷痛目銳眥痛缺盆中腫痛腋下腫馬刀挾癭汗出振寒瘧胸脅肋髀膝外至脛絕骨外踝前及諸節皆痛小趾次趾不用盛者人迎大一倍於氣口虛者人迎反小於氣口也足少陽之別名曰光明去踝五寸別走厥陰下絡足跗實則厥虛則痿躃坐不能起取之所別也足少陽之筋起於小趾次趾上結外踝上循胻外廉結於膝外廉其支者別起於外輔骨上走髀前者結於伏兔之上後者結於尻其直者上䏚乘季脅上走腋前廉挾於膺乳結於缺盆直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於頄其支者結於目外眥為外維其病小趾次趾支轉筋引膝外轉筋膝不可屈伸膕筋急前引髀後引尻上即䏚季脅痛上引缺盆膺乳頸維筋急從左之右右目不開上過右角並蹺脈而行左絡於右故傷左角右足不用命曰維筋相交治在燔針劫刺以知為數以痛為腧名曰孟春痹邪客於足少陽之絡令人脅痛不得息咳而汗出刺足小趾次趾爪甲上與肉交者各一痏不得息立已汗出立止咳者溫衣飲食一日已左刺右右刺左病立已不已復刺如法邪客於足少陽之絡令人留於樞中痛髀不可舉刺樞中以毫針寒則久留針以月死生為數立已熱病先胸脅痛手足躁刺足少陽補足太陰病甚者為五十九刺熱病先眩冒而熱胸脅滿刺足少陰少陽足少陽膽脈從頭走足長八尺左右共一丈六尺凡八十六穴瞳子髎二穴在目外眥五分聽會二穴在耳前陷中開口有空客主人二穴一名上關在耳前起骨上廉開口有空頷厭二穴在曲周下顳顬上廉懸顱二穴在曲周上顳顬中懸釐二穴在曲周上顳顬下廉曲鬢二穴在耳上髮際曲隅陷中鼓頷有空率谷二穴在耳上入髮際一寸五分天衝二穴在耳上如前三分浮白二穴在耳後入髮際一寸竅陰二穴在完骨上枕骨下完骨二穴在耳後入髮際四分本神二穴在曲差旁一寸五分入髮際四分陽白二穴在眉上一寸直目瞳子臨泣二穴當目上直入髮際五分目窗二穴一名至滎在臨泣後一寸正營二穴在目窗後一寸承靈二穴在正營後一寸五分腦空二穴一名顳顬在承靈後一寸五分挾玉枕骨風池二穴在顳顬後髮際陷中肩井二穴在肩上陷解中缺盆上大骨前手足少陽陽維之會淵腋二穴在腕下三寸宛宛中輒筋二穴在腋下三寸復前行一寸著脅日月二穴在期門下五分直乳第二肋下京門二穴一名氣府一名氣腧在監骨腰中季肋本挾脊帶脈二穴在季肋下一寸八分五樞二穴在帶脈下三寸水道旁一寸五分維道二穴在章門下五寸三分居髎二穴在章門下八寸三分環跳二穴在髀樞中中瀆二穴在髀骨外膝上五寸陽關二穴在陽陵泉上三寸陽陵泉二穴在膝下一寸外廉陷中陽交二穴一名別陽在外踝上七寸斜外丘二穴在外踝上七寸光明二穴在外踝上五寸陽輔二穴在外踝上四寸輔骨前絕骨端如前三分懸鐘二穴在外踝上三寸丘墟二穴在足外踝下如前去臨泣三寸臨泣二穴在足小趾次趾本節後間陷中去俠谿一寸半地五會在足小趾次趾本節後俠谿二穴在足小趾次趾岐骨間本節前竅陰二穴在足小趾次趾端去爪甲如韭葉瞳子髎二穴在目外眥五分手太陽手足少陽之會治青盲日無所見遠視䀮䀮目中膚翳白膜頭痛目外眥赤痛可灸三壯針入三分聽會二穴在耳前陷中上關下一寸動脈宛宛中張口得之手少陽脈氣所發治耳聾耳中狀如蟬聲通耳食牙車脫臼相離一二寸其穴側臥張口取之針入七分留三呼得氣即瀉不須補灸亦良日可灸五壯至二七壯止十日後依前報灸之即愈客主人二穴一名上關在耳前起骨上廉開口有空動脈宛宛中足陽明少陽之會治唇吻強耳聾瘛瘲口沫出目眩牙車不開口噤嚼食鳴偏風口眼喎斜耳中狀如蟬聲可灸七壯艾炷不用大箸頭作炷若針必須側臥張口取之乃得禁不可針深上關若刺深令人欠而不得㰦下關不得久留針即㰦而不得欠牙關急是故上關不得刺深下關不得久留針也頷厭二穴在曲周下顳顬上廉手足少陽陽明之交會治頭風眩目無所見偏頭痛引目外眥急耳鳴多嚏頸項痛針入七分留七呼可灸三壯懸顱二穴在曲周上顳顬中足少陽脈氣所發治熱病煩滿汗不出頭偏痛引目外眥赤身熱齒痛面膚赤痛針入三分留三呼可灸三壯懸釐二穴在曲周上顳顬下廉手足少陽陽明之交會治熱病汗不出頭偏痛煩心不欲食目銳眥赤痛針入三分可灸三壯曲鬢二穴在耳上髮際曲隅陷中鼓頷有空足太陽少陽之會治頰頷腫引牙車不得開急痛口噤不能言灸亦良可灸七壯針入三分率谷二穴在耳上入髮際一寸五分足太陽少陽之會治膈胃寒痰傷酒風發頭兩角強痛不能飲食煩滿嘔吐不止可灸三壯針入三分天衝二穴在耳上如前三分治頭痛癲疾風痙牙齦腫善驚恐可灸七壯針入三分浮白二穴在耳後入髮際一寸足太陽少陽之會治發寒熱喉痹咳逆痰沫胸中滿不得喘息耳鳴䐜䐜無所聞頸項癰腫及癭氣肩背不舉悉皆治之針入五分可灸七壯首竅陰二穴在枕骨下搖動有空足太陽少陽之會治勞疸發厲項痛引頭目痛針入三分可灸七壯完骨二穴在耳後入髮際四分治頭痛煩心癲疾頭面虛腫齒齲偏風口眼喎斜頸項痛不得回顧小便赤黃喉痹頰腫針入五分可灸七壯本神二穴在曲差旁一寸五分一曰直耳上入髮際四分足少陽陽維之會治目眩頸項強急痛胸脅相引不得轉側癲疾嘔吐涎沫針入三分可灸七壯陽白二穴在眉上一寸直目瞳子足少陽陽維之會治頭目痛目眵背腠寒慄重衣不得溫可灸三壯針入二分目臨泣二穴在目上直入髮際五分陷中足太陽少陽之會治卒中風不識人目眩鼻塞目生白翳多淚針入三分留七呼得氣即瀉目窗二穴在臨泣後一寸足少陽陽維之會治頭面浮腫痛引目外眥赤痛忽頭旋目䀮䀮遠視不明針入三分可灸五壯三度刺目大明正營二穴在目窗後一寸足少陽陽維之會治牙齒痛唇吻急強齒齲痛頭項偏痛針入三分可灸五壯承靈二穴在正營後一寸五分足少陽陽維之會治腦風頭痛惡風寒鼽衄鼻塞息不利可灸三壯腦空二穴一名顳顬在承靈後一寸五分挾玉枕骨下陷中足少陽陽維之會治腦風頭痛不可忍目瞑心悸發即為癲風引目眇勞疾羸瘦體熱頸項強不得回顧針入五分得氣即瀉可灸三壯魏公苦患頭風發即心悶亂目眩華佗當針而立愈風池二穴在顳顬後髮際陷中足少陽陽維之會治灑淅寒熱溫病汗不出目眩苦頭痛痎瘧頸項痛不得回顧目淚出欠氣多鼻鼽衄目內眥赤痛氣發耳塞目不明腰傴僂引項筋無力不收針入七分留七呼可灸七壯肩井二穴在肩上陷解中缺盆上大骨前一寸半以三指按取之當中指下陷者是一名髆井手足少陽陽維之會治五勞七傷頸項不得回顧背髆悶兩手不得向頭或因撲傷腰髖疼腳氣上攻可針入五分此髆井足陽明之會乃連入五臟氣若刺深則令人悶倒不識人即速須三里下氣先補不瀉須臾平復如故凡針肩井皆以三里下其氣若婦人墮胎後手足厥逆針肩井立愈若灸更勝針可灸七壯淵腋二穴在腋下三寸宛宛中舉臂得之治胸滿馬刀臂不舉禁不宜灸灸之不幸令人生腫蝕馬瘍內潰者死寒熱生馬瘍可治針入三分輒筋二穴在腋下三寸復前一寸著脅足少陽脈氣所發治胸中暴滿不得臥不能喘息可灸三壯針入六分日月二穴膽之募在期門下五分足太陰少陽陽維之會治太息善悲小腹熱欲走多唾言語不正四肢不收可灸五壯針入七分京門二穴腎之募一名氣俞一名氣府在監骨腰中季脅本挾脊治腰痛不得俯仰寒熱䐜脹引背不得息水道不利溺黃少腹急腫腸鳴洞泄髀樞引痛可灸三壯針入三分留七呼帶脈二穴在季脅下一寸八分治婦人少腹堅痛月脈不調帶下赤白裡急瘛瘲可灸五壯針入六分五樞二穴在帶脈下三寸一云在水道旁一寸五分治男子寒疝陰卵上入小腹痛針入一寸可灸五壯維道二穴在章門下五寸三分足少陽帶脈之會治嘔逆不止三焦不調水腫不嗜食針入八分可灸三壯居髎二穴在章門下八寸三分監骨上陷中陽蹺足少陽之會治腰引少腹痛肩引胸臂攣急手臂舉不至肩灸三壯針入八分環跳二穴在髀樞中側臥伸下足屈上足取之治冷風濕痹風疹偏風半身不遂腰胯痛不得轉側可灸五十壯針入一寸留十呼中瀆二穴在髀骨外膝上五寸分肉間陷中足少陽絡治寒氣客於分肉之間痛攻上下筋痹不仁可灸五壯針入五分留七呼陽關二穴在陽陵泉上三寸犢鼻外陷中治膝外痛不可屈伸風痹不仁針入五分不可灸陽陵泉二穴土也在膝下一寸外廉陷中足少陽脈之所入也為合針入六分得氣即瀉又宜灸留針治膝伸不得屈冷痹腳不仁偏風半身不遂腳冷無血色又以蹲坐取之日可灸七壯至七七壯即止陽交二穴一名別陽陽維隙在足外踝上七寸斜屬三陽分肉之間治寒厥驚狂喉痹胸滿面腫寒痹膝䯒不收可灸三壯針入六分留七呼外丘二穴在足外踝上七寸少陽所生治膚痛痿痹胸脅脹滿頸項痛惡風寒癲疾針入三分可灸三壯兼治猘犬所傷毒不出發寒熱速以三壯又灸所齧之處立愈光明二穴在足外踝上五寸別走厥陰足少陽絡也治身解寒淫濼䯒酸不能久立與陽輔療病法同熱病汗不出猝狂虛則痿痹坐不能起實則足䯒熱膝痛身體不仁善齧頰可灸五壯針入六分留七呼陽輔二穴火也在足外踝上四寸輔骨前絕骨端如前三分去丘墟七寸足少陽脈之所行也為經治腰溶溶如坐水中膝下膚腫筋攣諸節盡痛痛無常處腋下腫瘻馬刀喉痹膝䯒酸風痹不仁可灸三壯針入五分留七呼懸鐘二穴在足外踝上三寸動脈中足三陽之大絡按之陽明脈絕乃取之治心腹脹滿胃中熱不嗜食膝䯒痛筋攣足不收履坐不能起可灸五壯針入六分留七呼丘墟二穴在足外踝下如前陷中去臨泣三寸足少陽脈之所過也為原治胸脅滿痛不得息久瘧振寒腋下腫痿厥坐不能起髀樞中痛目生翳膜腿䯒酸轉筋猝疝少腹堅寒熱頸腫可灸三壯針入五分留七呼足臨泣二穴木也在足小趾次趾本節後間陷中去俠谿一寸五分足少陽脈之所注也為輸治胸中滿缺盆中及腋下腫馬刀瘍瘻善齧頰天牖中腫淫濼䯒酸目眩枕骨合顱痛灑淅振寒婦人月事不利季脅支滿乳癰心痛周痹痛無常處厥逆氣喘不能行痎瘧日發可灸三壯針入二分地五會二穴在足小趾次趾本節後陷中去俠谿一寸治內傷唾血足外皮膚不澤乳腫針入二分不可灸灸則使羸瘦不出三年卒俠谿二穴水也在足小趾次趾岐骨間本節前陷中足少陽脈之所流也為滎治胸脅支滿寒熱汗不出目外眥赤目眩頰頷腫耳聾胸中痛不可轉側痛無常處可灸三壯針入三分足竅陰二穴金也在足小趾次趾之端去爪甲如韭葉足少陽脈之所出也為井治脅痛咳逆不得息手足煩熱汗不出轉筋癰疽頭痛心煩喉痹舌強口乾肘不可舉猝聾不聞人語可灸三壯針入一分凡此足少陽之脈常少血多氣刺當出氣惡血其經從頭走足逆則為迎順則為隨氣盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之此治足少陽之法也足厥陰肝經足厥陰肝之經起於大趾聚毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股入陰毛中環陰器抵少腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目繫上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺是動則病腰痛不可以俯仰丈夫㿗疝婦人少腹腫甚則嗌乾面塵脫色是主肝所生病者胸滿嘔逆洞泄狐疝遺溺閉癃盛者氣口大一倍於人迎虛者氣口反小於人迎也足厥陰之別名曰蠡溝去內踝五寸別走少陽其別者循脛上睪結於莖其病氣逆則睪腫猝疝實則挺長熱虛則暴癢取之所別也足厥陰之筋起於大趾之上上結於內踝之前上循脛上結內輔之下上循陰股結於陰器絡諸筋其病足大趾支內踝之前痛內輔痛陰股痛轉筋陰器不用傷於內則不起傷於寒則陰縮入傷於熱則縱挺不收治在行水瀆之其病轉筋者治在燔針劫刺以知為數以痛為腧名曰季秋痹也邪客足厥陰之絡令人暴疝卒痛剌足大趾爪甲上與肉交者各一痏男子立已女子有頃已左取右右取左肝病者兩脅下痛引少腹令人善怒虛則目䀮䀮無所見耳無所聞善恐如人將捕之取其經厥陰與少陽氣逆則頭痛耳聾不聰頰腫取血者肝熱病者小便先黃腹痛多臥身熱熱爭則狂言及驚脅滿痛手足躁不得安臥庚辛甚甲乙大汗氣逆則庚辛死刺足厥陰足厥陰肝經從足走胸中長六尺五寸左右共一丈三尺凡二十六穴大敦二穴在足大趾端去瓜甲如韭葉行間二穴在足大趾間動脈應手太衝二穴在足大趾本節後二寸或一寸半動脈中中封二穴在足內踝前一寸仰足而取之蠡溝二穴在內踝上五寸中都二穴一名中郄在內踝上七寸膝關二穴在犢鼻下二寸陷中曲泉二穴在膝內輔骨下大筋上小筋下陷中陰包二穴在膝上四寸股內廉兩筋間五里二穴在氣衝下三寸陰股中動脈陰廉二穴在羊矢下去氣衝二寸章門二穴一名長平一名脅髎在大橫外直臍季肋端期門二穴在不容旁一寸五分直乳第二肋端大敦二穴木也在足大趾端去爪甲如韭葉及三毛中足厥陰脈之所出也為井治猝疝小便數遺溺陰頭中痛心痛汗出陰上入腹陰偏大腹臍中痛悒悒不樂病左取右右取左腹脹腫滿少腹痛中熱喜寐屍厥狀如死婦人經血暴脫不止可灸三壯針入三分留六呼行間二穴火也在足大趾間動脈應手陷中足厥陰脈之所流也為滎治溺難又白濁寒疝少腹腫咳逆嘔血腰痛不能俯仰腹中脹心痛色蒼蒼如死狀終日不得息口喎四肢逆冷嗌乾煩渴瞑不欲視目中淚出太息癲疾短氣可灸三壯針入六分留十呼太衝二穴土也在足大趾本節後二寸或一寸半陷中此穴有動脈診之可訣男子死生之候足厥陰脈之所注也為輸治腰引少腹痛小便不利狀如淋㿗疝少腹腫溏泄遺溺陰痛面目蒼色胸脅支滿足寒大便難嘔血女子漏血不止小兒猝疝嘔逆發寒嗌乾腑腫內踝前痛淫濼䯒酸腋下腫馬刀瘍瘻唇腫針入三分留十呼可灸三壯中封二穴金也在足內踝前一寸仰足取之陷中伸足乃得之足厥陰脈之所行也為經治痎瘧色蒼蒼振寒少腹腫食怏怏繞臍痛足逆冷不嗜食身體不仁寒疝引腰中痛或身微熱針入四分留七呼可灸三壯蠡溝二穴在足內踝上五寸別走少陽足厥陰絡治猝疝少腹腫時少腹暴痛小便不利如癃閉數噫恐悸少氣不足腹中痛悒悒不樂咽中悶如有息肉狀背拘急不可俯仰針入二分留三呼可灸三壯中都二穴一名中郄在內踝上七寸䯒骨中與少陰相直治腸澼㿗疝少腹痛婦人經血暴脫因產惡露不絕針入三分可灸五壯膝關二穴在犢鼻下二寸陷中治風痹膝內痛引臏不可屈伸喉咽中痛針入四分可灸五壯曲泉二穴水也在膝內輔骨下大筋上小筋下陷中屈膝取之足厥陰脈之所入也為合治女子血瘕按之如湯沃股內少腹腫陰挺出丈夫癲疝陰股痛小便難腹脅支滿癃閉少氣泄利四肢不舉實即身熱目眩痛汁不出目䀮䀮膝痛筋攣不可屈伸發狂衄血喘呼少腹痛引喉咽針入六分灸三壯又云正膝屈內外兩筋間宛宛中又在膝曲橫紋頭治風勞失精身體極痛泄水下利膿血陰腫䯒痛可灸三壯針入六分留十呼陰包二穴在膝上四寸股內廉兩筋間足厥陰別走治腰尻引少腹痛遺溺不禁針入六分可灸三壯足五里二穴在氣衝下三寸陰股中動脈治腸中滿熱閉不得溺可灸五壯針入六氣陰廉二穴在羊矢下去氣衝二寸動脈中治婦人絕產若未經生產者可灸三壯即有子針入八分留七呼章門二穴脾之募一各長平一名脅髎在大橫外直臍季肋端側臥屈上足伸下足舉臂取之足厥陰少陽之會治腸鳴盈盈然食不化脅痛不得臥煩熱口乾不嗜食胸脅支滿喘息心痛腰痛不得轉側傷飽身黃羸瘦賁豚腹腫脊強四肢懈墮善恐少氣厥逆肩臂不舉可灸百壯針入六分期門二穴肝之募在不容旁一寸五分直兩乳第二肋端足太陰厥陰陰維之會治胸中煩熱賁豚上下目青而嘔霍亂泄利腹堅硬大喘不得安臥脅下積氣女子產後余疾食飲不下胸脅支滿心中切痛善噫若傷寒過經不解當針期門使經不傳針入四分可灸五壯凡此足厥陰之脈常多血少氣刺之當出血惡氣其經從足走腹審其從逆以行迎隨虛則補之實則瀉之熱則疾之寒則留之陷下則灸之不盛不虛以經取之此治足厥陰之法也
