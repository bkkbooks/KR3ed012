body:
  text: 卷第四治法治神內經曰心者君主之官神明出焉又曰心者生之本神之變也四氣調神於起居動作之間每以志意順四時為急務逮其感疾亦察精神志意存亡得失以為治法蓋謂有生之本營衛氣血也諸血皆屬於心氣之升降舒結又因乎喜怒悲憂恐之變病有至於持久不釋精氣弛壞營泣衛除者豈特外邪之傷哉神不自許也是以黃帝論氣之行著必分勇怯論病之苦樂必異形志論芳草石藥必察緩心和人至於貴賤貧富異居男女離合異情又以不知為粗工之戒故扁鵲華他治病忌神明之失守叔和論脈辨性氣之緩急孫思邈之用藥則以精神未散為必活褚澄之問證則以苦樂榮悴為異品治目多矣而張湛以減思慮專內視為治目之神方至若陳藏器草木之論又以和養志意以禳去祟以言笑暢情懷以無為驅滯著豈專於藥石針艾之間哉蓋上古恬淡治病之法祝由而已逮夫憂患既攻巧詐復起邪之感人也深醫之用功也倍專恃毒藥而不問其情則精神不進志意不治故病不可愈內經所以有閉戶塞牖數問其情針經所以有臨病人問所便者不治其形治使其形者也且以病之一二言之隔塞閉絶氣窒之病也原其本則得於暴憂不治其氣而釋其憂可也女子不月血滯之病也原其本則得於心氣不得下通不治其血而通其心可也勞極驚悸者過傷之病也每本於心氣之不足使心氣內和則精神莫得而動也頸瘻者風毒之病也每得於愁憂思慮之不止使志意和適則氣血莫得而逆也然則陽盛夢火陰盛夢水五臟虛實皆形於夢寐之先而後病從之凡以形體之乖和神先受之則凡治病之術不先致其所欲正其所念去其所惡損其所恐未有能愈者也治宜人生天地中隨氣受病醫之治病從氣所宜統論之陰陽殊化有東南西北之異氣內經所謂地有高下氣有溫涼高者氣寒下者氣熱故曰氣寒氣涼治以寒涼氣溫氣熱治以溫熱又曰東方之民治宜砭石西方之民治宜毒藥北方之民治宜灸焫南方之民治宜微針中央之民治宜導引按蹺然則從氣所宜而治之固可知也至如嶺南多瘴江湖多濕山陰水野沙石之氣生病悉異為治之方安可一概又況內經論一州之氣生化壽夭各不同則知地有小大小者小異大者大異唯聖人能雜合以治各得其所宜平治昔人概舉萬病亦頗有不治自愈者蓋欲藥石無妄投針灸無妄用使五臟安平不相干擾無戀卷愴囊之偽為也姑托一二證之肝脈鶩暴有所驚駭脈不至若喑不治自已心脈搏堅而長舌卷不能言其耎而散者當消環自已脈至如數使人暴驚三四日自已重身而喑十月當復陽厥之病要在奪食則已是數者備見於經苟能緣類而知則不治而瘳者率皆瞭然於胸次倘不察此必以毒藥攻其內針石湯火鑠其外膠膠擾擾力不暇給奚足以議平治之道本標病有本標治有緩急知所先後乃得其宜凡言本標其説有三有氣之本標若六氣為本三陰三陽為標是也有病之本標若百病之生或生於本或生於標或生於中氣是也有治之本標若取本而得取標而得是也三者雖若不同要之皆以所因為本所應為標是故有病傷寒者因寒而得即以寒為本隨其變傳所在或客於陽或客於陰即以陰證陽證為標以至風暑燥濕飲食勞倦喜怒憂恐皆可類舉然邪氣所傷如風雨寒暑之類本自外至腑臟生病如喜怒憂懼之類本由內生及病成而變有先表后里者治法皆當治其本唯先病而後中滿及大小不利之病則治其標此無他以救里為急故也故曰病非其本得標之病治非其本得標之方審究逆從以施藥石標本相得邪氣乃服病者知此則病以許治為本治者能此則治以適當為工是以內經又言病為本工為標通類治寒以熱治熱以寒工所共知也治寒以熱而寒彌甚治熱以寒而熱彌熾殆未察五臟有陰陽之性各因其類而取之耳經不云乎寒之而熱者取之陰熱之而寒者取之陽假有病熱施以寒劑其熱甚者當益其腎腎水既滋熱將自除人有病寒施以熱劑其寒甚者當益其心心火既壯寒將自已此所謂察陰陽之性因其類而取之也經又曰有者求之無者求之盛者責之虛者責之於有無言求於盛虛言責何耶夫求者求其所以治與夫所以致益也責者責其所當瀉與夫所宜補也假有或熱或寒治須汗下此所謂有者求之寒甚而熱之或不熱則致益其心熱甚而寒之或不寒則致益其腎此所謂無者求之假有心實生熱必瀉其心腎強生寒必瀉其腎此所謂盛者責之假有心虛多寒必補其心腎虛多熱必補其腎此所謂虛者責之大抵五行之理互有盛衰而補瀉消長在通其倫類而已逆從病有小大則以感於邪者有淺有深治有逆從則以達於理者有正有權蓋微者逆之逆者正治此理之正也甚者從之從者反治此理之權也假有疾勢未亟要在折其氣而排去之惟能知治寒以熱治熱以寒則相為制伏者易為功假有疾勢過甚要在順其性而調和之惟能知熱因寒用寒因熱用則氣體相求者得其宜且逆者正治其為制伏自有差數從者反治則一同二異二同三異又有從少從多之不齊然則裁製方劑者固宜深思之熟計之也奇偶陽數奇陰數偶善用藥者性理有畏惡氣味有薄厚須其相當然後合而服之氣之高下病之遠近證之中外勢之緩急隨宜致用則所施無不當矣古人有奇偶之制君臣贊助之意也又有小大之殊或單行或復用數止一二者其制小一三五而成者其制中一三九而後備者其制大小則數多而氣味厚大則數少而氣味薄以奇治近以偶治遠順陰陽也汗者不以奇下者不以偶和陰陽也補上治上制以緩補下治下制以急治之常也近而奇偶必小其服遠而奇偶必大其服所以從權也用奇偶而至於從權則方制本奇而輕重之數偶者尤其所宜故曰奇之不去則偶之偶之不去則反佐以取之所謂寒熱溫涼從其病也輕重治法有以五毒攻其病者其用毒之約大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九是則有毒雖善曾不若無毒之為全也或不得已而用毒攻毒者亦在權其輕重而已故曰因其輕而揚之因其重而減之可汗可下不可妄施可越可引不可倒置制有奇偶雖在審其遠近然奇之不去則偶之偶之不去則反佐以取之猶不可執一也性有溫涼雖在適其寒熱然治寒以熱必涼而行之治熱以寒必溫而行之又欲其調和也以至服有小大用有多寡隨宜制權以適事為故惟通變者能之補益形不足者溫之以氣氣為陽天之所以食人者也精不足者補之以味味為陰地之所以食人者也人受天地之中以生陰陽不可偏勝有偏勝斯有不足於是有補養之法然必適平而止不可太過過則復為有餘亦非中道也常人之情知補養為益而不知陰陽欲其平均故言補者必專以金石灸焫為務名曰補之適以燥之也是豈知補虛扶羸之道哉夫男子腎虛水不足也凡補虛多以燥藥是不知腎惡燥也女子陰虛血不足也凡補虛多以陽劑是不知陽勝而陰愈虧也況補上欲其緩補下欲其急五臟之虛羸其補必於其母運氣之主客其補各有其味非通乎天地陰陽消息盈虛之道者未易語此湯醴邪之傷人有淺深藥之攻邪有輕重病之始起當以湯液治其微病既日久乃以醪醴攻其甚是故病人色見淺者湯液主治其見深者必齊主治其見大深者醪醴主治又有形數驚恐經絡不通病生於不仁者治以醪藥以此見受邪既深經脈閉滯非醪藥散發邪氣宣通血脈安能必愈然則湯液者取其蕩滌邪氣醪醴者取其宣通閉滯凡病始作多以湯液蓋取其蕩滌之功甚於丸散病久日深乃以醪醴其法衆多以夫受邪堅牢取差或遲是故服餌之方用酒醴者十常六七大法醪醴之方冬三月宜用立春後宜止服餌之家不問有疾冬三月宜常得酒藥兩三劑至立春勿服故能使百疾不生又況酒性酷熱主行藥勢所以病人素有血虛氣滯陳寒痼冷偏枯不遂拘攣痹厥之類悉宜常服皆取其漸漬之力也又古法服藥多以酒者非特宣通血氣而已亦以養陽也汗經曰其有邪者漬形以為汗其在皮者汗而發之又曰體若燔炭汗出而散又曰未滿三日可汗而已舉是四者蓋其在表不可使之深入要當以汗去之然汗有起於過用而為常者有忽於畏護而為患者有汗之太過遂漏不止者陽氣虛而表弱也有汗之不及者則邪氣復與正氣交爭昔人論汗出不徹因轉屬陽明是也如此則陰陽不得平均營衛不得調和矣雖然病有表裡汗有宜否若不須汗而強與汗之者將耗其津液須汗而不與汗之者使邪氣深而經絡傳變勢如風雨何可當也載諸方籍其類多矣大概可汗之證則身熱脈浮太陽與陽明證是也其不可汗之證在經則少陽與厥陰在病則厥與逆以至血衄瘡淋之屬皆為不可汗或邪氣在表而脈沉遲者雖汗之亦不能解矣非特此也太陽固可汗也有因發汗而為痙者脈浮體痛固當以汗解也假令尺中脈遲則亦不可汗是又不可不知也吐三焦為決漬之官升降沖氣而不息者也病在胸中上焦氣壅必因其高而越之所以去邪實而導正氣也況上脘之病上而未下務在速去不湧而出之則深入腸胃播傳諸經可勝治哉故若宿食有可吐者未入於腸胃者也痰瘧有可吐者停蓄於胸膈者也食毒忤氣可吐者恐其邪久而滋甚也肺癰酒疸可吐者為其胸滿而心悶也大抵胸中邪實攻之不能散達之不能通必以酸苦之藥湧之故得胃氣不傷而病易以愈古人大法春宜吐蓋以春氣高而在上上實下虛其治宜高故也又以寸口脈浮之類可吐蓋以病在膈上氣不下通其脈浮故也審此二者則吐法之用不可妄施下昔人論治療每以實實虛虛為戒誠能察此即可下不可下之理豈不較然大抵可下之法當以裡實為先謂如傷寒之病其滿三日者下之而愈為病在裡故也又大法秋宜下亦人氣在裡也故經曰中滿者瀉之於內又曰實則瀉之堅者削之留者攻之不知審此是益其有餘者也且下之法多矣有以湯液蕩滌者有以丸藥者近世又有蠟和劑者皆隨其緩急淺深而導利之爾諸病之中若水病之人百脈俱實腳弱之疾氣不欲上是二者尤宜於利下不可不知也漬浴漬浴法所以宣通形表散發邪氣蓋邪之傷人初在肌表當以汗解若人肌肉堅厚腠理致密有難取汗者則服藥不能外發須借湯浴疏其汗孔宣導外邪乃可以汗內經所謂其有邪者漬形以為汗是也有因大飲中酒恐毒氣內攻於臟者有服五石發動氣攻於陽者若此之類皆以浴法治之乃欲使邪毒外泄故也祝由上古移精變氣祝由而已蓋其俗淳其性朴其病微至誠不二推病由而祝之以通神明故精可移而氣可變也其或舍信愨為疑惑指祝由為無益之術而精氣不純邪毒深蓄雖有祝由不能已者非古今異術人心異也善醫者察病淺深雖不概以此治至於病有鬼神之注忤蟲獸之螫毒必歸於祝由是以周官瘍醫掌衆瘍祝藥劀殺之齊必先之以祝蓋醫之用祝尚矣瘍尤宜焉大抵意使神受以正驅邪則一也尉引因藥之性資火之神由皮膚而行血脈使郁者散屈者伸則尉引為力多矣引取舒伸之義以尉能然血氣形志論曰病生於筋治以尉引玉機真藏論曰痹不仁腫痛可湯尉及火灸刺之蓋病生於筋則拘急攣縮痹而不仁則經血凝泣二者皆由外有所感尉能溫之血性得溫則宣流能引凝泣也按摩可按可摩時兼而用通謂之按摩按之弗摩摩之弗按按止以手摩或兼以藥曰按曰摩適所用也血氣形志論曰形數驚恐經絡不通病生於不仁治之以按摩此按摩之通謂也陰陽應象論曰其剽悍者按而收之通評虛實論曰癰不知所按之不應乍來乍已此按不兼於摩也華他曰傷寒始得一日在皮膚當摩膏火灸即愈此摩不兼於按必資之藥也世之論按摩不知析而治之乃合導引而解之夫不知析而治之固已疏矣又合以導引益見其不思也大抵按摩法每以開達抑遏為義開達則壅蔽者以之發散抑遏則剽悍者有所歸宿是故按一也有施於病之相傳者有施於痛而痛止者有施於痛而無益者有按之而痛甚者有按之而快然者概得陳之風寒客於人毫毛畢直皮膚閉而為熱或痹不仁而腫痛既傳於肝脅痛出食斯可按也肝傳之脾名曰脾風發疸腹中熱煩心出黃斯可按也脾傳之腎名曰疝瘕少腹冤熱而痛出白一名為蠱斯可按也前所謂施於病之相傳有如此者寒氣客於脈外則脈寒寒則縮蜷縮蜷則脈絡急外引小絡卒然為痛又與熱氣相搏則脈滿而痛脈滿而痛不可按也寒氣客於腸胃之間膜原之下血不得散小絡急引是痛也按之則血氣散而痛止逮夫客於俠脊之脈其藏深矣按不能及故按之為無益也風雨傷人自皮膚入於大經脈血氣與邪並客於分腠間其脈堅大若可按也然按之則痛甚寒濕中人皮膚不收肌肉堅緊營血泣衛氣除此為虛也虛則聶闢氣乏惟按之則氣足以溫之快然而不痛前所謂按之痛止按之無益按之痛甚按之快然有如此者夫可按不可按若是則摩之所施亦可以理推矣養生法凡小有不安必按摩挼捺令百節通利邪氣得泄然則按摩有資於外豈小補哉摩之別法必與藥俱蓋欲浹於肌膚而其勢快利若療傷寒以白膏摩體手當千遍藥力乃行則摩之用藥又不可不知也導引一氣盈虛與時消息萬物壯老由氣盛衰人之有是形體也因氣而榮因氣而病喜怒亂氣情性交爭則壅遏而為患煉陽消陰以正遣邪則氣行而患平矧夫中央之地陰陽所交風雨所會其地平以濕其民食雜而不勞其病多痿厥寒熱故導引按蹺之術本從中央來蓋斡旋氣機周流營衛宣搖百關疏通凝滯然後氣運而神和內外調暢升降無礙耳目聰明身體輕強老者復壯壯者益治聖人謂呼吸精氣獨立守神然後能壽敝天地調和陰陽積精全神然後能益其壽命蓋大而天地小而人物升降出入無器不有善攝生者惟能審萬物出入之道適陰陽升降之理安養神氣完固形體使賊邪不得入寒暑不能襲此導引之大要也灸灸有補瀉不可輕議大率沉結寒冷之疾施之為宜蓋陰寒濕氣凝留血脈湯劑尉引不能獨治方是時唯火艾足以爍其勢豈非火能運行陽氣祛逐陰邪其效有速於藥石者耶然老壯不同強弱異稟灼治之法夫豈一端故多有逾於數百壯少或止於三五七九之數要皆詳審而行之若夫陽病灸之則為大逆是以論傷寒者謂微數之脈既汗之後脈浮熱甚三者悉不可灸唯少陰背惡寒吐利脈不足與夫脈伏手足厥之類三者為可灸焉通乎此觸類以往又安有灸焫之妄也故曰不須灸而強與灸之者令人火邪入腹干錯五藏重加其煩須灸而不與灸之者使冷結重冰久而彌固氣上衝心無地消散可不鑑哉刺其病攣痹其治宜微針形樂志苦病主於脈治以灸刺明九針之用經絡補瀉之法也故營衛異刺以分血氣之虛實井滎異刺以分五行之子母募俞異刺以分背腹之陰陽春夏異刺以分人氣之淺深大抵虛補實瀉無過不及之傷以輔其平者刺法之大要也然有病勢未深可刺而即愈者所謂病之始起可刺而已或痹不仁腫痛可灸刺而去之是也有病傳諸經必上下俱刺者所謂刺熱刺瘧病甚為五十九刺是也然刺之為言同於擊刺之刺以為利也害在其中黃帝謂徐而安靜手巧而心審諦者可使行針艾張機謂針能殺生人不能起死人凡以用之不可不慎也況九針異體取病有殊十二節異法用有輕重必明日月星辰四時八正之在天寒暑燥濕經水盈虛之在地肥瘠壯弱虛實盛衰之在人然後呼吸補瀉出入迎隨惟意之從豈特知募腧部分皮肉筋骸飢飽勞逸而已哉故曰見微得過用之不殆砭石上古針法垂布於天下制砭石有小大者乃隨病所宜用石代針一曰針石二曰砭石三曰鑱石其實一也破堅決肉砭射腫熱者則決之以砭石良由邪氣暴戾則微針不能及況又病有氣血盛實逆於肉理蓄結癰腫之類非砭石則不能射之此所謂血實宜決之又形樂志樂病生於肉者治之以砭石東方之民多病癰瘍其治宜砭石砭石之來始自於此扁鵲有云病在血脈者治以砭石是故一切腫疾悉宜鐮割足小指下橫文間腫在左則割左在右則割右血少出則瘥以至疔腫癰瘍丹毒瘭疽代指㾫病氣痛流腫之類皆須出血者急以石砭之大抵砭石之用其法必瀉若在冬時人氣閉塞則用藥而少針石所謂少針石者非癰疽之謂也癰疽不得頃時回苟緩於針石則毒氣內攻腐壞筋骨穿通腑臟矣治石疔瘡則忌瓦礫磚石之類治刀鐮疔瘡則忌鐵刃傷割若是者可以藥治也素問又曰人病頸癰或石治之或針灸治之而皆已此蓋同病異治也夫癰疽之氣息者宜針開除去之氣盛血聚者宜石而瀉之若然則砭石九針之用各有所利善治血脈之變癰腫之病者當審輕重而制之
