兒乳和如膏烈日中曝乾如此九度須揀好日色乃和蓋假太陽真氣也第九度即以棗肉丸之如梧桐子大曝乾每服三十丸溫酒下治五勞七傷精髓虛憊鹿茸丸方鹿茸去毛酥炙山茱萸杜仲銼炒絲斷桂去粗皮五味子炒各三分菟絲子酒浸蒸搗取粉一兩半肉蓯蓉酒浸炙山芋酸棗仁炒各一兩肭臍細切研一分用酒二升淘濾精細入銚子慢火煎成膏上一十味搗羅九味為末將膃肭臍膏杵和丸如梧桐子大每服三十丸空心用溫酒下治丈夫虛羸精髓衰憊不能飲食蓯蓉丸方肉蓯蓉酒浸去皴皮切焙牛膝酒浸切焙熟乾地黃焙麥門冬去心焙山茱萸枳殼去瓤麩炒五味子各三兩遠志去心一兩石斛去根人參各二兩上一十味搗羅為細末煉蜜丸梧桐子大溫酒下三十丸日再服空心食前治五勞七傷補益精髓四味丸方熟乾地黃焙天門冬去心焙白茯苓去黑皮遠志去心各三兩上四味搗羅為末煉蜜和丸如梧桐子大每服三十丸溫酒下王倪丹砂無所不主尤補心益精血愈瘻疾壯筋骨久服不死王倪者丞相遵十二代孫文明九年為滄州無棣令有一人善相見倪曰公死明年正月乙卯我有藥可以不死公能從我乎倪再拜稱幸乃出煉丹砂法餌之開元元年倪妻之弟亦遇異人授以杏丹法曰吾聞王倪能煉丹砂願以此易之倪以杏丹賜其子辨而倪與授杏丹者後皆仙矣刺史李休光表聞賜其第為道觀煉丹砂法丹砂二十八兩甘草遠志去心檳榔仁訶黎勒皮各一兩桂去粗皮八兩搗碎上甘草等四味銼以二大斗釜用細布囊盛丹砂懸於釜中著水和藥炭火煮之第一日兼夜用陰火水紋動第二日兼夜用陽火魚眼沸第三日兼夜用木火動花沫沸第四日兼夜用火火汩汩沸第五日兼夜用土火微微沸第六日兼夜用金火沸乍緩乍急第七日兼夜用水火緩緩調沸先期埿二釜一釜常暖水用添煮藥釜水涸即添暖水常令不減二斗七日滿即出丹砂於銀閣中盛其閣中先布桂肉一兩拍碎即勻布丹砂又以余桂一兩復之即下合置甑中先布糯米厚三寸乃置合又以糯米擁復上亦令上米厚三寸許桑薪火蒸之每五日換米桂其甑蔽可用完竹子為之不爾蒸多甑墮下釜中也甑下側開一小孔子常暖水用小竹子注添釜中勿令水減第一五日用春火如常炊飯兼夜每二五日兼夜用夏火猛於飲飯第三五日用秋火似炊飯乍緩乍急兼夜第四五日用冬火兼夜火緩於炊飯依五行相生用文武火助之藥成即出丹砂以玉椎力士鉢中研之當膩如面即可服之以楮實煎丸如梧桐子大每日食前服一丸每日三食計服三丸煉成丹砂二十兩為一劑二年服盡盡後每十年即煉服三兩仍取正月一日起服一月使盡即須每十年三兩不可旋合宜預煉取一劑補虛固精論曰腎主水受五臟六腑之精而藏之所謂天一在臟本立始也若腎臟衰精氣不固或因溲而出或因聞見而溢或因虛勞漏泄精氣或因邪氣乘虛客於陰為夢遺皆腎虛也宜補以固之故法宜以澀去脫治精氣不固諸虛百損太一金鎖丹方鍾乳粗搗淨淘淡竹葉一握地榆半兩銼同入沙銚內水煮一復時取乳石淨淘研細水飛取細者不住手研三日研無聲加面焙取二兩芡實和殼曝乾大豆黃卷微炒巴戟天去心附子炮裂去皮臍補骨脂炒熟鹿茸去毛塗酥炙各一兩肉蓯蓉酒浸一宿去皴皮切蒸爛研成膏三兩上八味除膏外搗羅為末入蓯蓉膏搗千百下如硬更入煉蜜同搗丸如梧桐子大每服十丸空心臨臥溫鹽酒下一月精祕還元補腦面目光精神爽百日肌膚充悅鬚髮光潤諸氣及積年傷憊冷疾皆愈常服補氣延年治虛損去風閉精固元陽九物金鎖丹方龍齒敗龜酥炙雄蠶蛾未對者巴戟天去心白蓮花葉各半兩蓮子心肉蓯蓉各一兩雄雞肝一分山芋二兩上九味搗羅為末麵糊和丸如梧桐子大每服十丸空心溫酒下祕精補腎元強志解虛煩韭子丸方韭子微炒巴戟天去心桑螵蛸銼炒菟絲子酒浸別搗牛膝酒浸焙牡蠣左顧者火煅熟乾地黃各一兩乾薑炮半兩上八味搗羅為末醋煮麵糊和丸如梧桐子大每服二十丸空心鹽湯下補虛固精丸方補骨脂炒末半兩蓮子心末安息香各一分將安息香湯化為水三味用無灰酒一升熬膏丹砂研沉香末山茱萸末礬蝴蝶枯如粉各半兩上七味除前膏外細研勻與前膏和丸如梧桐子大每服十丸煎桃仁酒下空心食前固精補元氣悅顏色實丹田還元丸方木香干蓮子去心各二兩沉香末天雄長大者湯浸一食久新水又浸兩食久去皮臍候乾文武火炮裂地坑子內碗合一復時各二兩龍骨為末研千遍用粗甘草半兩煎水一升飛過更研取二兩上五味搗羅為末研勻煮熟雞卵黃和丸如梧桐子大每日空心新水或溫酒下三十丸補中安神定魄去風濕勞氣治腰膝固元氣黑髭鬢悅顏色玉真丸方龍骨搗羅水飛三遍重研令細去水乾入熟絹袋盛縫合置五斗米下炊一遍了乾重研細菟絲子酒浸一宿酒煮一宿令爛去酒搗爛焙乾為末各八兩鹿茸新嫩帶血者去毛酥炙六兩韭子淨揀微炒四兩半上四味搗羅為末煉白蜜和搗千下丸如小豆大每日溫酒下七丸日再服治腎臟虛憊遺精盜汗夢交煨腎附子散方豶豬腎一隻附子末一錢上二味將豬腎批開入附子末濕紙裹煨熟空心稍熱服之即飲酒一盞送下治夢泄補骨脂丸方補骨脂炒四兩龍骨山茱萸巴戟天去心各一兩上四味搗羅為末煉蜜和丸如梧桐子大空心鹽湯或酒下三十丸治夢泄神效散方白茯苓去黑皮一兩豬苓去黑皮二錢上二味水煮合宜去豬苓將茯苓焙乾搗羅為散每服一錢匕溫酒調下空心夜臥各一服治夢泄除痰利胸膈半夏丸方半夏二兩湯洗七遍入豬苓四兩銼同炒令豬苓紫色去豬苓用半夏上一味搗羅為末酒麵糊和丸如梧桐子大每服十五丸空心溫粥飲下治因多飲積熱自𢦤致夢泄黃甘丸方黃柏去粗皮甘草等分上二味並生搗羅為末煉蜜和丸如梧桐子大每服二十丸空心夜臥溫熱水或麥門冬湯下治熱盛夢泄怔忪恍惚膈壅舌乾清心丸方黃柏去粗皮銼一兩上一味搗羅為末入龍腦一錢匕同研勻煉蜜和丸如梧桐子大每服十丸至十五丸濃煎麥門冬湯下治腎臟虛冷腰胯痠疼腿膝冷痹夜多小便夢寐遺泄日漸羸瘦面無顏色兼治女人惡露赤白帶下韭子丸方韭子七升淨揀上一味以醋湯煮千百沸取出焙乾旋炒令作油麻香搗羅為末煉蜜和丸如梧桐子大每日空心溫酒下二十丸加至三十丸補壯元陽論曰陰陽氣血之在人初無餘缺及勞動妄作嗜欲過度𢦤真太甚則有陰陽傷憊之疾氣血虛損之證法宜補之補益陽氣祕精還元豐肌駐顏太一金鎖丸方附子炮裂去皮臍巴戟天去心芡實和殼曝乾各一兩石鐘乳杵碎淨淘銼淡竹葉一握地榆半兩同入銚內水煮一復時只取鍾乳研細水飛不住手再研三日候無聲如面方止焙乾用二兩大豆黃卷微炒補骨脂炒香鹿茸塗酥炙去毛各一兩肉蓯蓉三兩酒浸一宿切蒸令爛研成膏上八味七味搗為細末入蓯蓉膏內杵一千下如硬更入少煉蜜丸如梧桐子大每服十丸空心臨臥溫酒下鹽湯亦得補壯元陽椒附丸方蜀椒去目及閉口者四兩醋浸一宿取出卻用酒一升炒乾為末白羯羊腎二對切焙乾為末附子炮裂去皮臍青鹽巴戟天去心蒺藜子炒去角肉蓯蓉酒浸切焙乾蘹香子炒各一兩上八味搗羅為細末用生羊腎二對去脂膜細切研如面搜藥末熟丸如梧桐子大每服三十丸溫酒下鹽湯亦得壯補元陽木香丸方木香半兩附子炮裂去皮臍巴戟天去心蘹香子慢火炒過蓮實一兩蛇床子炒黃一分搗羅為細末糯米粥丸梧桐子大空心食前鹽湯下十丸壯陽益氣暖元臟補虛乏輕腰膝止腹痛葫蘆巴丸方葫蘆巴半兩蘹香子炒香三兩王瓜巴戟天各一兩蒼朮麩炒黃刮去皮三兩上五味先將王瓜蒼朮二味同搗令勻焙乾後與諸藥同搗為末酒煮麵和丸如梧桐子大每服二十丸空心食前溫酒或鹽湯下補元臟益精氣利腰腳蓯蓉丸方肉蓯蓉酒浸切焙二兩天雄炮裂去皮臍一兩白馬莖酥炙二兩蠶蛾微炒一兩雀卵四十九枚菟絲子酒浸三日焙乾一兩上六味將五味為末以雀卵並煉蜜和丸如梧桐子大每服十丸空心溫酒或米飲下補真元壯腰膝進飲食祕精益氣草四神煎方蓯蓉半斤細切以酒爛煮細研為膏次將下三味都為細末入此膏中研令勻巴戟天去心炒補骨脂炒附子炮裂去皮臍胡桃仁各二兩杏仁湯去皮尖雙仁炒桃仁湯去皮尖雙仁各一兩上七味先將桃杏胡桃仁等三味同細研次用白蜜一斤濾過於銀器內煉熟入前藥一處和如膏每服一小彈子大以熱酒化下日進二服補元臟壯筋骨療積冷及一切氣疾令人輕健楮實丸方楮實半升去白微炒鹿茸去毛酥炙附子炮裂去皮臍牛膝去苗酒浸兩宿切焙巴戟天石槲去根各四兩乾薑炮桂去粗皮各二兩上八味搗羅為末棗肉和杵千餘下丸如梧桐子大每服三十丸鹽湯或溫酒下固丹田壯筋骨青鹽丸方青鹽細研一兩蜀椒去目並閉口者一兩半肉蓯蓉酒浸一宿切焙牛膝酒浸一宿焙巴戟天去心各二兩上五味為末用獖豬腎一對去脂膜細切研爛以浸藥酒熬為膏丸如梧桐子大焙乾每服五十丸空心食前溫酒或鹽湯下治陽衰下臟虛弱法制煨腎方巴戟天米泔浸去心蓽澄茄蘹香子炒附子漿水煮三二十沸控干泡裂去皮臍上四味各等分搗羅為末每服用羊腎一對各批開去白入藥末一錢半匕勻摻入蔥絲少許用濕紙裹慢火中煨熟食之補暖元臟駐顏麋角霜丸方麋角一副用水浸一七日刮去皴皮鎊為屑盛在一銀瓶內以牛乳浸一日如乳耗更添直候不耗於麋角屑上乳深二寸用油單數重密封瓶口別用大麥一斗安在甑內約厚三寸上安瓶更用大麥周圍填實露瓶口不住火蒸一復時如鍋內水耗即旋添熱湯須頻取角屑看爛加面相似即住火取出用細篩子漉去乳焙乾每料用干角屑八兩附子炮裂去皮臍山芋各三兩上三味搗羅為末以棗肉和丸梧桐子大每日空心溫鹽酒下十五丸至二十丸補虛益氣壯元陽菟絲子丸方菟絲子淘去浮者以酒浸七日爛杵焙乾三十兩蘹香子青鹽三兩上三味搗羅為末用浸藥酒煮麵糊丸如梧桐子大每用空心溫酒下二十丸至三十丸補益元氣悅澤肌體開心明目回陽丸方牡蠣煅通赤乾薑炮各半斤上二味為細末薑汁煮半夏和丸如梧桐子大空心溫酒下二十丸外固洗浴還童湯方藿香葉吳茱萸湯洗焙乾炒桂去粗皮乾薑炮肉蓯蓉去皴皮各半兩白附子蟬蛻天南星菟絲子酒浸一宿別搗為末莎草根各一分零陵香三分上一十一味粗搗篩每服五錢匕水半碗煎三五沸熱洗以軟帛干裛避風外固淋浴丁香湯方丁香桂去粗皮紫稍花頑荊蛇床子各一兩蒼朮杜仲細銼湯洗焙乾各二兩上七味粗搗篩每用半兩水三升同煎至二升連臍腹丹田淋浴補元陽淋洗方蛇床子炒令焦黃色百花窠燒煙盡為度各二兩零陵香藿香各一兩上四味粗搗篩每臨臥時用藥末五錢匕水五升同煎三五沸乘熱淋洗
