body:
  text: 卷第一百八十五補益門補益統論論曰黃帝難經曰一損損於皮毛皮聚而毛落二損損於血脈血脈虛少不能榮於五臟六腑三損損於肌肉肌肉消瘦飲食不為肌膚四損損於筋筋緩不能自收持五損損於骨骨痿不能起於床此損之為病也又曰損其肺者益其氣損其心者調其營衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精此補益之大法也夫人之血氣與天地同流不能無盈虛也有盈虛矣不能無損益也治療之宜損者益之不足者補之隨其緩急而已是故有平補有峻補或益其氣或益其精或益其血脈或壯其筋骨以至益髭發駐顏色其治不一要之隨宜適可無過不及之患斯為善矣平補論曰一陰一陽之謂道偏陰偏陽之謂疾不明乎道未有能已人之疾者世人貪餌藥石惟務酷烈非徒無益反傷和氣故方書論平補之法欲陰陽適平而已平補諸虛地黃煎丸方生地黃二十斤洗搗取汁熟乾地黃焙二斤生乾地黃焙二斤甘草炙銼半斤醇酒一斗用無灰者菟絲子酒浸別搗鹿角膠炙燥白蒺藜炒去角牛膝酒浸切焙乾漆末用酒拌和炒令煙盡白茯苓去黑皮白檳榔煨銼枳殼去瓤麩炒萆薢覆盆子去梗各四兩上一十五味除生地黃汁並酒外余並各細搗羅為末先取地黃汁與酒五升於銀鍋內慢火煎三二十沸次下鹿角膠攪勻消盡次下地黃末又次下諸藥添酒以柳枝不住手攪候堪為丸即分為二十劑余以蠟紙裹於寬瓷瓶內封貯遂一劑旋取丸如梧桐子大每服三十丸加至五十丸空心食前溫酒下余藥收經三月餘取於日中曝之依前收封此藥兼治虛勞諸風等疾牢牙齒榮鬚髮久服堅筋骨長肌肉悅顏色聰耳明目令人壯健萬病不生用地黃酒下尤佳平補諸虛久服輕身延年活血益氣潤澤肌膚石菖蒲丸方石菖蒲九節者佳一兩半柏子仁杜仲去粗皮炙銼百部山芋甘草炙銼五味子炒貝母去心丹參各一兩人參防風去叉白茯苓去黑皮茯神去木各一兩半生乾地黃焙麥門冬去心焙各二兩遠志去心半兩上一十六味搗羅為末煉蜜和丸如彈子大每服一丸空心食前熟水嚼下日三平補五臟治百病延年丸方菟絲子酒浸七日炒黃三兩枸杞子去梗覆盆子去萼車前子酒浸巴戟天去心遠志去心生乾地黃細辛去苗葉白朮炒菖蒲銼何首烏去黑皮地骨皮牛膝酒浸一宿續斷菊花去梗萼各一兩半上一十五味除菊花外以溫水和酒少許洗過焙乾杵羅為末煉蜜丸如梧桐子大每日空心常服三十丸丈夫鹽湯婦人醋湯下午食前更一服服至十服其人病卻有發時是藥動病本功應也平補心腎延年駐顏枸杞子丸方枸杞子湯洗菊花揀淨肉蓯蓉酒浸一宿切焙桂去粗皮黃耆塗酥炙銼牛膝酒浸一宿焙生乾地黃酒浸一宿焙遠志去心山芋各二兩柏子仁酒浸焙炒人參白茯苓去黑皮各一兩半上一十二味搗羅為末以浸藥酒煮麵糊丸如梧桐子大每服空心溫酒下三十丸鹽湯亦得平補壯氣活血駐顏輕身健骨神仙八味丸方牛膝去苗一斤威靈仙洗淨巴戟天去心各四兩天麻半斤切以上四味用好酒二斗浸兩宿焙石斛去根四兩肉蓯蓉去土二斤洗切用前浸藥酒同於銀石器內慢火熬成膏何首烏一斤去黑皮米泔浸軟切於黑豆中蒸爛焙乾海桐皮銼半斤上八味除蓯蓉膏外搗羅為末用蓯蓉膏和搗千杵丸如梧桐子大每服二十丸至三十丸空心食前溫酒下日三久服闢風邪調營衛順三焦烏髭發平補益顏色烏髭發令人肥健小地黃煎丸方生地黃十斤洗漉出一宿後搗絞取汁鹿角膠一斤紫蘇子炒二斤酥一斤半生薑半斤絞取汁蜜二升酒四升上七味先以文火煎地黃汁一二沸即以酒研紫蘇子濾取汁投之又煎二十沸下膠候膠銷盡下酥蜜薑汁等同煎稠如餳收於淨瓷器中每服取一匙暖酒調化飲之平補諸虛不足石斛丸方石斛去根遠志去心檳榔煨銼牛膝酒浸一宿焙桑螵蛸炙焦再炒桂去粗皮乾薑炮各半兩五味子炒覆盆子微炒肉蓯蓉酒浸去皴皮切焙巴戟天去心微炒枳殼去瓤麩炒柏子仁研陳橘皮湯浸去白焙各二兩鹿茸一對去毛酥炙澤瀉白蒺藜炒去角各三分天雄炮裂去皮臍菟絲子酒浸搗爛焙三日各二兩上十九味搗羅為細末和勻煉蜜丸如梧桐子大每服三十丸空心鹽湯下平補諸虛益氣血壯筋骨鹿茸丸方鹿茸去毛酥炙附子炮裂去皮臍續斷側柏葉厚朴去粗皮生薑汁炙黃耆銼各一兩阿膠炙燥二兩當歸切炒熟地黃焙麝香研各半兩上一十味為細末煉蜜丸如梧桐子大空心米飲下三十丸溫酒鹽湯皆可服平補諸虛百損山芋丸方山芋牛膝酒浸切焙菟絲子酒浸別搗白茯苓去黑皮巴戟天去心澤瀉赤石脂各二兩五味子杜仲去粗皮酥炙銼山茱萸各一兩上一十味搗羅為末煉蜜丸如梧桐子大每服三十丸空心溫酒下平補換骨延駐神仙三黃丸方生地黃三十斤木臼搗取自然汁生乾地黃焙熟地黃焙各一斤為末鹿角膠炙燥為末大麻仁研乾漆搗末點醋炒煙盡為度各四兩甘草炙銼杏仁去皮尖雙仁研蜜各半斤上九味各修制搗研七味為末先以無灰酒一斗與生地黃汁並蜜於銀器內用慢火煎以柳枝攪將欲成膏便入諸藥同熬候可丸如梧桐子大每服三十丸空心食前面東溫酒下加至五十丸平補諸虛百損五勞七傷頭痛目眩手足逆冷或煩熱有時或冷痹骨痛腰髖不隨飲食雖多不生肌肉或少食而脹滿體無光澤陽氣衰絶陰氣不行此藥能補經脈起陰陽安魂魄開三焦破積聚厚腸胃強筋練骨輕身明目除風去冷無所不治無比山藥丸方乾山藥二兩半杜仲去皮銼炒三兩五味子揀淨二兩半菟絲子酒浸三兩蓯蓉銼酒浸四兩牛膝銼酒浸一兩澤瀉一兩熟乾地黃一兩山茱萸一兩茯神去皮並心木一兩巴戟去心一兩赤石脂一兩上一十二味搗篩為末煉蜜和搜為丸如梧桐子大每服二十丸至三十丸食前溫酒下溫米飲亦得服之七日後令人身輕健四體潤澤唇口赤手足暖面有光悅消食身體安和音聲清響是其驗也十日後長肌肉此藥通中入腦鼻必痠疼勿怪平補下元治諸虛冷益陽道令人久立不倦年八十歲服之面不焦枯乳母服之令子肥白楮實丸方楮實一升淘去浮者焙炒牛膝去苗半斤銼洗桂去粗皮五兩附子炮裂去皮臍乾薑炮巴戟天去心麋角鎊酥炒石斛去根銼各二兩上八味杵羅為末煉蜜丸如梧桐子大每日空心溫酒下三十丸加至四十丸平補壯元陽附子蓯蓉丸方附子炮裂去皮臍一枚肉蓯蓉酒浸一宿切焙楮實酒浸一宿蒸熟蘹香子炒菟絲子酒浸一宿蒸熟研焙牛膝酒浸切焙補骨脂炒杏仁去皮尖雙仁炒白茯苓當歸切焙蓽茇炒桃仁去皮尖雙仁炒各半兩遠志去心山茱萸打破炒柴胡去蘆頭黃耆銼細巴戟天蕪荑炒山芋各一兩大蒜煨六顆蜀椒去目及閉口炒出汗黃蠟各二兩上二十二味除蓯蓉桃杏仁楮實蒜蠟外並搗羅為末先取精羊肉去皮骨一斤半細切用水煮熟次入好酒三升熬爛次入黃蠟候熔都取出細研入楮實桃杏仁蓯蓉蒜等一處爛研如膏入前藥末和丸如梧桐子大每服十五丸加至二十丸空心鹽酒鹽湯下平補諸虛大益氣血六神丸方石菖蒲洗銼焙地骨皮洗焙遠志去心牛膝去苗酒浸焙生乾地黃菟絲子酒浸七日炒別搗羅為末各等分上六味除菟絲子外並搗羅為末再與菟絲子一處和勻煉蜜丸如梧桐子大每服二十丸空心食前溫酒或鹽湯任下加至三十丸平補諸虛五補丸方人參白茯苓去黑皮地骨皮淨擇熟乾地黃焙牛膝酒浸一宿切焙各五兩上五味搗羅為末煉蜜丸如梧桐子大空腹以溫酒或粥飲下三十丸忌鐵器宜於石木臼內搗平補熟乾地黃丸方熟乾地黃焙枳殼去瓤麩炒地骨皮洗焙菟絲子酒浸別搗末牛膝酒浸切焙各五兩上五味杵羅為末煉蜜丸如梧桐子大每日空心鹽湯下二十丸加至三十丸平補蓯蓉四倍丸方蓯蓉酒浸一宿去粗皮切焙二兩牛膝酒浸一宿切焙四兩菊花六兩枸杞子八兩上四味搗羅為末煉蜜丸如梧桐子大每服三十丸空心溫酒下平補除風痰益年壽山芋四倍丸方山芋半兩枸杞子一兩甘菊花二兩熟乾地黃焙四兩上四味搗羅為末煉蜜丸如梧桐子大空心食前鹽湯下三十丸溫酒亦得平補五臟壯筋骨益顏色美飲食四金丸方肉蓯蓉酒浸一宿焙牛膝酒浸一宿焙天麻青鹽細研各三兩上四味除鹽外搗羅為末與鹽和勻用木瓜一枚除心蒸爛去皮入臼中與四味藥同搗丸如梧桐子大若干少少入酒丸每服五十丸空心夜臥暖酒吞下平補枸杞丸方石斛去根一兩鹿茸去毛酥炙地骨皮各一分上三味焙搗羅為末以紅枸杞子自然汁二合無灰酒一合白蜜半兩熬成膏丸如梧桐子大每服三十丸空心溫酒或生薑鹽湯下平補仙術丸方蒼朮三斤米泔浸一宿切炒為末枸杞子為末生乾地黃切焙為末各一斤上三味用好酒二升先調枸杞末成膏次將蒼朮地黃二藥同搗三百杵丸如梧桐子大每服三十丸空心新汲水下平補諸虛益精壯陽補骨脂丸方補骨脂炒松脂山芋白茯苓去黑皮各八兩杏仁湯浸去皮尖雙仁炒三升胡桃肉棗各一斤鹿角膠炙燥十兩桂去粗皮牛膝酒浸切焙澤瀉菖蒲薏苡仁萆薢檳榔煨銼獨活去蘆頭蒺藜子炒去角蛇床子各一兩生地黃二十斤取汁上一十九味除地黃汁外搗羅為末煎地黃汁成煎入藥點蜜和丸如梧桐子大每服空腹溫酒下三十丸補氣血強筋力麋角丸方昔道士戴寧古於城市中遇一醉人召飲訖送一詩曰尾閭不禁滄溟竭九轉靈丹徒用說惟有斑龍頂上珠可補玉堂關下血一本作闕約九月於峨眉山相見寧古如期而往果於太虛岩下見之授以修養之術曰子血氣動蕩虛且竭矣宜先服麋角丸使血氣有補筋力壯盛乃可行此術寧古始悟斑龍之句服之逾年體輕色潤用其術壽至一百七十留方以遺後人取大麋角五具或四具三具兩具為一劑如無麋角以大鹿角代之取當年新者為上須看角根有斫痕處即堪用退角根下平者不堪先去尖一大寸余各長七八寸截斷量令把鎊得即以物盛垂於長流水中浸十宿無流水淨盆中汲水浸亦得每夜易日滿取出削去皺皮以利鎊白處至心即止又以清米泔浸兩宿初經一宿即干握去舊水置新絹上曝乾擇去粗惡骨皮及鎊不勻者入無灰醇酒於瓷器中浸兩宿其酒隨藥多少浸之日滿並於淨釜中初武火煎一食久又著文火微煎如蟹眼沸以木萆不住手攪困則易人不得住時時添酒屑消似稀膠然後入牛乳五升酥一升以次漸下後藥秦艽去苗土人參甘草炙銼肉蓯蓉酒浸去皴皮焙檳榔銼木通銼菟絲子酒浸兩宿別搗各一兩上七味搗羅為細末投麋角膏中再煎得所放冷候可丸即衆手丸如梧桐子大新瓷器中盛空腹酒下三十丸日加一丸至五十丸為度日二服初服恐氣澀宜服檳榔湯後乃不用忌大黃大蒜余無所忌若丸時著手黏即用少酥塗手初服一百日忌房室服經一月腹內諸疾自去有微利勿怪後漸多泄氣能食明耳目補心神安臟腑填骨髓理腰腳能久立服至二百日面皺復展有光澤一年齒落更生強記身輕若風日行數百里二年常令人肥飽少食老者復少精力過倍合時淨室中不得令雞犬婦人見婦人服之亦佳峻補論曰陰陽之氣本自和平過則生患峻補之藥施於倉猝緣陽氣暴衰真氣暴脫或傷寒陰證諸疾急於救療者不可緩也蓋人之稟受有限嗜欲太過疾病橫生固當助陽氣以扶衰弱則峻補諸方經所謂補下治下制以急急則氣味厚者此之謂也峻補一切虛冷煅金液丹方硫黃好者研二十兩上一味入罐子內用蓋子蓋定採石龍芮