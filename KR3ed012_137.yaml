body:
  text: 卷第一百三十七諸癬論曰癬之字從鮮言始發於微鮮縱而弗治則浸淫滋蔓其病得之風濕客於腠理搏於氣血氣血痞澀久則因風濕而變化生蟲故風多於濕則為乾癬但有周郭皮枯瘙癢搔之白屑起者是也濕多於風則為濕癬周郭中如蟲行浸淫赤濕搔癢汁出是也風折於氣血則為風癬𤸷痹不知痛癢是也如錢形則為圓癬如雀目然則為雀目癬亦皆赤痛而瘙癢又或牛犬所飲刀刃磨淬之餘水取以盥濯毒氣傳人亦能生癬故得於牛毒者狀似牛皮於諸癬中最為𤸷厚邪毒之甚者俗謂之牛皮癬狗癬白點而連綴刀癬縱斜無定形凡此八者皆風濕毒氣折於肌中故痛癢不已久而不瘥又俱謂之久癬治多年諸癬醫治不效者烏蛇丸方烏蛇酒浸去皮骨炙天麻各二兩槐子半斤附子生去皮臍小便浸一宿白附子炮各一兩乾蠍炒白殭蠶炒羌活去蘆頭乳香研各一兩半苦參十兩上一十味搗羅為細末用生薑自然汁和蜜各一斤熬成膏入前藥和搗丸如梧桐子大每服二十丸空心溫酒下夜臥荊芥湯下治一切癬槐芽丸方槐芽曝乾皂莢芽曝乾各一斤苦參三兩使君子防風去叉羌活去蘆頭各一兩半烏蛇一條酒浸去皮骨炙上七味搗羅為末煉蜜丸如梧桐子大每服二十丸空心溫酒下至晚再服治一切乾溼癬三味烏蛇散方烏蛇酒浸去皮骨炙一兩乾荷葉半兩枳殼去瓤麩炒三分上三味搗羅為散每服一錢匕空心蜜酒調下日晚再服治一切風癬皮膚瘙癢苦參丸方苦參水浸一宿銼焙烏蛇酒浸去皮骨炙各四兩菖蒲二兩上三味搗羅為細末煉蜜丸如梧桐子大每服三十丸溫熱水下不拘時治一切癬三神丸方蒺藜子炒海桐皮銼草烏頭鹽炒熟去鹽不用各一兩上三味同搗為細末麵糊和丸如綠豆大每服十丸至十五丸溫水鹽湯任下治一切風癬煮腎散方附子炮裂去皮臍椒紅各半兩上二味同搗為細末用豬腎一對竹刀切開去筋膜每隻入藥末一錢匕鹽一捻相合布線纏縛以好酒一盞於瓷器內煮約七八分熟五更初不得漱口及語話去線旋旋嚼細呷煮藥汁送下食少白粥投之當晚微利次日煮熟吃須連日服服盡再作治一切癬防風散方防風去叉母豬肉各二兩上二味同煮數沸去豬肉取防風焙乾搗羅為散每服一錢匕白湯點服不拘時治一切癬苦參丸方苦參用皂莢十梃椎碎同以水煮皂莢爛為度揀出苦參切曝乾將皂莢汁濾去滓再熬成膏威靈仙洗澤曝乾各三兩上二味搗羅為末以皂莢膏和丸如梧桐子大每服二十丸空心溫酒下至三十丸治一切癬菖蒲酒方菖蒲細切五斗上一味以水一石五斗煮取三斗去滓入米二斗醞如酒法候熟旋取飲令極醉即愈治乾癬一抹散方天南星草烏頭各一枚生用上二味搗為細散用羊蹄根搗絞自然汁調塗不過三兩上瘥治一切乾溼諸癬歲久不瘥蛇床子湯方蛇床子白土羊蹄根葛根苦參菖蒲莽草各三分黃連去須半兩上八味細銼以水五斗煎至三斗濾去滓溫暖淋洗癬上三日後重暖藥湯更洗之不過三五度瘥治一切癬漏蘆膏方漏蘆地榆附子去皮臍杏仁湯浸去皮尖雙仁各一兩藜蘆去蘆頭木通莽草白芷吳茱萸細辛去苗葉各半兩蜀椒去目併合口蠟各二兩清油一斤上一十三味細銼十一味先熬油令沸下諸藥煎候白芷赤黑色停冷綿絞去滓拭鐺令淨再下油並蠟同煎候蠟熔盡瓷合盛收旋塗患處仍用後丁香散粉之日三五上差治一切癬塗漏蘆膏後宜敷丁香散方丁香搗末蝦蟆灰各一兩麝香研一分五倍子搗末白礬熬令汁枯冷膩粉各半兩上六味合和為散敷於癬上以瘥為度治一切癬抵聖散方草決明焙搗末半兩膩粉一分上二味合和為散先以布揩癬令赤次以醋調藥塗之當汁出痛解即瘥治乾溼癬風癬不拘年月定粉膏方澱粉水銀白蕪荑胭脂各一分上四味同研令勻用陳豬脂一兩同研成膏先用湯洗後以膏子臨臥塗之一上便瘥本法豬脂須用十年以上者今若無但陳者亦得仍用後方淋洗治一切新久乾溼癬楝實洗方楝實半升無實用根皮代楝葉及嫩枝銼凌霄葉及藤銼各一升丹參枳殼去瓤蛇床子地榆皂莢各三兩並細銼苦參三兩細銼上九味同煎濃汁熱洗患處治一切新久乾溼癬殭蠶散方白殭蠶炒去絲四十枚斑蝥二十枚全者生用膩粉一錢上三味搗研為細末乾癬用生油調塗濕癬只干揩貼之並候黃水出及數數癢痛永除根本亦無瘢痕治一切乾溼癬如聖散方風化石灰半兩鉛丹二錢膩粉一錢石硫黃半錢上四味同研如粉用生油調先以布揩破癬塗之末塗藥間煎蔥白甘草湯淋洗如換時亦依此治一切乾溼癬沉香瀝方沉香柏節杉節松節各半斤上四味銼如指面大以布囊盛置於漚麻水中浸一食久漉出瀝乾取一枚白坩穿底下作一孔如雞子大以松葉一枚安孔上以藥囊坐坩內以鹽一升蓋上以黃泥固濟坩令厚三五分以炭火於坩口燒之坩下安碗一口滴藥汁於碗中候煙盡即取碗中藥汁塗敷瘡癬上日三五次以瘥為度白禿疽疥惡瘡並治之治一切乾溼癬梅實膏方烏梅十四枚取肉大蒜十四頭去皮切屋塵細篩鹽各三合上四味先研烏梅次下大蒜屋塵鹽等和研令細以醋調成膏取塗癬上日三五度即瘥治一切乾溼癬癢痛不可忍龍腦膏方龍腦石硫黃斑蝥去翅足膩粉各半兩上四味細研為末用面油調成膏發癢痛時抓破塗之日三五度即瘥治一切乾溼癬胡粉膏方胡粉二兩水銀一分上二味和研令勻以醋調成膏塗之仍以紙貼日三五上又方蛇床子駝脂上二味先研蛇床子令細以駝脂調成膏塗之日三五上即瘥治一切癬不瘥水銀膏方水銀半斤臘月豬脂二斤半上二味先熬脂令熔次下水銀以馬通火熬七日七夜候冷取出去水銀只取豬脂每日三五度摩塗癬上令熱即瘥其水銀不妨他用又方乳牛尿一升羊蹄根半斤切上二味將羊蹄根先以米泔浸漬一宿曝乾次納牛尿中漬一宿曝乾再漬再曝尿盡為度搗羅為末以豬脂調塗癬上日三五次又方烏頭十枚上一味銼碎以水五升煮至二升溫洗癬上日三度即瘥治一切久癬積年不瘥四畔潛浸復變成瘡瘡色赤黑癢不可忍搔之血出黃連膏方黃連去須為末黃柏去粗皮為末豉研細蔓荊子為末杏仁湯浸去皮尖雙仁細研各半兩水銀一錢上六味先以水銀於掌中唾研如泥次入乳缽內下生油一合和勻次入藥末同研成膏瓷合盛日三五度取塗癬上即瘥治一切癬狼牙膏方狼牙搗雄黃研丹砂研硫黃研雷丸搗白礬熬令汁枯研藜蘆去蘆頭搗各一分上七味細羅為散蜜調成膏塗癬上日三遍取瘥為度治一切癬雀糞塗敷方雀糞醬瓣水洗令淨各半兩上二味合和細研塗敷癬上日三兩次治一切癬水銀膏方水銀一分蕪荑仁研末薑黃搗末各半兩酥二兩上四味先煎酥和水銀以柳椎研攪候水銀散即下蕪荑薑黃末攪勻瓷合盛旋取塗癬上日三兩次治一切癬雄黃膏方雄黃研末石硫黃研末羊蹄根濕者沙糖色白者荷葉新者各一兩上五味先以羊蹄根白糖荷葉於乳缽內細研如泥次入雄黃硫黃末同研成膏瓷合盛取塗癬上日三度如藥干旋添少許蜜調之治一切癬附子散方附子炮裂去皮臍半兩皂莢一梃去皮子炙吳茱萸湯洗焙炒一兩上三味搗羅為散用新布揩癬令濕然後塗藥日三兩上如干癬以醋調塗治一切癬獨活散方獨活半兩附子炮裂去皮臍一兩上二味搗羅為散以酒調和如糊先用皂莢水洗癬上然後塗之日二度治一切癬大黃散方大黃如棗大一塊斑蝥全者七枚上二味搗研為細散以釅醋調如糊先揩破癬瘡然後塗藥候乾洗之治諸癬七星散方乾蠍七節者白殭蠶直者各七枚上二味搗羅為散每服三字用好酒一盞入羊蹄根汁並蜜少許調服晡時一浴仍用羊蹄根滓揩浴治一切風癬及諸般癬瘙癢搔之不已者備急羊蹄根塗方羊蹄根草烏頭上二味淨拂多人行磚上滴好醋先磨草烏頭約一分次磨羊蹄根二分爬令發癢以指點藥抹之仍吃煮腎散相為表裡煮腎散方在前第六方治一切乾溼癬白礬塗方白礬一兩研為末上一味用醋調如糊塗摩癬上日三五度即瘥治一切乾溼癬炙魚塗方魚不問色目上一味火上炙皮微焦乘熱去皮骨取肉研塗癬上日三五度即瘥治一切癬半夏散方半夏二兩上一味搗羅為散以陳醬汁調和如糊塗摩癬上日兩三度即瘥治一切癬艾汁塗方艾一兩細銼上一味以釅醋半升煎取濃汁去滓塗摩癬上日三五度即瘥治一切癬蒿穗敷方蒿穗二兩黃燥者上一味搗羅為散以醋調和塗摩癬上日三兩度即瘥治一切癬楮汁塗方楮木白汁不拘多少上一味先以新布揩癬微破然後塗藥日二上即瘥治一切癬桃葉汁塗方桃葉一兩日中時採上一味研絞取汁塗摩癬上日三度即差治久患濕瘡不瘥蛇床子散方蛇床子黃連膩粉上三味等分為散用小油調塗之膩粉多入不妨治濕癬癢搔之有黃水殺蟲蘆薈散方蘆薈一兩研甘草半兩上二味為散和勻先用淡漿水洗後用藥不過三兩度治多年濕癬荊芥散方荊芥穗不拘多少上一味以瓦罐子盛鹽泥固濟只留一竅用炭火燒候出清煙便撥去火用濕泥塞了竅子放冷取出碾為細散每用末五錢匕入麝香一錢匕膩粉五錢匕同研勻細先以口含鹽漿水抓洗令破帛子搵了生油調藥塗之治濕癬英粉散方英粉炒黑細研二兩藜蘆去蘆頭為末馬腸根為末各一分上三味和研令勻用生油調如粉塗癬上日三度治濕癬癢不可忍黃柏散方黃柏去粗皮黃連去須胡粉研各一兩雌黃研細半兩上四味搗研為散先以米泔清洗淨拭乾敷藥日三兩度即瘥治乾癬積年痂厚搔之黃水出遇陰雨即劇方巴豆一枚上一味於炭火上燒之令脂出即於釜上以脂研之如杏仁沫薄塗之不過一兩度瘥治濕癬方上於日未出時取獨行羊蹄根不得令見風切搗如泥著少鹽於日中暴雨時久塗之又方上用鯽魚一頭淨拭並全使將石硫黃一兩粒如雞頭實大送入口中令深入魚腹然後用淨瓶一口安於灶下灰火中翻覆煿令魚乾焦黃色碾作末入膩粉二錢匕拌令勻生油調塗瘡疥治一切癢瘡方烏蛇半斤以酒浸一宿取肉炙乾羌活去蘆頭四兩麝香一錢研上三味搗羅前二味為散入麝香同研每服二錢匕空心溫酒調下日三服治疥癬苦參丸方苦參四兩玄參山梔子仁獨活去蘆頭各二兩黃連去須一兩半黃芩去黑心枳殼去瓤麩炒大黃銼炒防風去叉菊花各一兩上一十味搗羅為末煉蜜為丸如梧桐子大每服三十丸暖酒下治疥癬五參散方烏蛇去皮骨酒炙焦麻黃去節大黃各二兩白附子炮半兩漏蘆去蘆頭一兩半沙參玄參五加皮乾蠍去土炒丹參白殭蠶炒羌活去蘆頭甘草炙各一兩上一十三味搗羅為散每服二錢匕用薄荷湯調下治諸瘡癬疥防風散方防風去叉天麻陳橘皮湯浸去白焙一兩上三味搗羅為細散每服三錢匕空心酒調服治諸疥癬久不瘥者徐長卿散塗方徐長卿苦參附子生去皮臍吳茱萸洗焙乾炒旱蓮子細辛去苗葉石硫黃菖蒲半夏生用上九味等分搗羅為細散先以油煎蔥白色黃將油和藥末塗仍先以湯浴了手腿並用被複更將火桶子安被內蓋令熱兩上瘥治乾溼癬癢痛不可忍方羊蹄根一兩黃連去須二兩蛇床子半兩上三味搗羅為末用臘月豬脂調令稀塗癬上良治諸癬並面上風刺方上取葛勒蔓草頭一把勿令人知鹽挼塗瘡三五上永瘥面上瘡取子為末空心酒調下三錢匕治癬疥並白禿瘡荷葉湯方裹鹽荷葉藤瓤等分上二味銼碎水煎濃汁洗三五度瘥治一切癬疥山梔子散方上搗山梔子仁為細末炒過以蜜蒸三五度了五更酒調下一匙頭許治諸瘡癬黃麻散方大黃銼炒四兩天麻羌活去蘆頭各二兩上三味為細散酒煎三錢匕服代指論曰瘡髮指端爪甲脫落名曰代指蓋爪者筋之餘筋骨熱盛注於指端故其指先腫熱焮痛結聚成膿甚則爪甲脫落世或謂之遭指淪指又名代甲其實一也此病類於指疽然無蘊毒故色不黯黑雖久亦不殺人治代指筋骨臟腑中熱焮赤腫痛漏蘆湯方漏蘆去蘆頭升麻大黃銼炒黃芩去黑心各一兩玄參三分上五味粗搗篩每服五錢匕水一盞半竹葉二七片同煎至一盞下芒硝末一錢匕再煎一沸去滓空心溫服如已得利即去芒硝治代指腫痛藍花湯方藍花漏蘆去蘆頭大黃銼炒升麻黃芩去黑心各一兩上五味粗搗篩每服五錢匕水一盞半竹葉二七片煎至一盞下芒硝末一錢匕再煎一沸去滓空心溫服如已得利去芒硝治代指雖無蘊毒筋骨中熱氣尚盛升麻湯浸方升麻甘草各半兩上二味細銼以水二升煎至一升去滓下芒硝末半兩攪勻溫浸指上數十遍冷即再暖以瘥為度治代指疼痛欲脫豬脂湯方豬脂五兩鹽半兩上二味先熬脂令沸下鹽攪勻溫浸指上即瘥治代指硇砂餅方硇砂末一錢白麵一兩上二味研勻以唾和作餅子貼指上即瘥治代指掣痛醬蜜塗方醬汁一合蜜一兩上二味和煎令沸稍熱塗敷日五七上即瘥治代指梔子湯方梔子仁甘草各一兩上二味細銼以水二升煎至一升半去滓溫浸指上日三五度瘥治代指麻黃湯方麻黃去根二兩上一味細銼以水二升煎至一升半去滓溫浸患指日三五度瘥又方地榆二兩上一味細銼以水三升煎至二升去滓溫浸患指冷即再暖又方芒硝上一味煎湯浸之治代指腫痛漿水漬方漿水上取一升以鹽半兩和煎令沸溫浸患指日三五度瘥治代指地龍散方地龍乾者不拘多少上一味搗羅為散以豬膏調敷患指日三兩上瘥又方梅核仁不拘多少上一味細研以米醋調敷患指日三五度瘥治代指為五臟熱氣流注十二經脈熱沖手指熱湯蘸方上以熱湯急蘸五七度次以冷水浸之又復如此三度便塗羊膽即瘥未成膿者此方甚效或以豬膽盛代指纏之亦得治代指粟米粉方粟米粉不拘多少上一味入鐵鐺中熬赤以眾人唾調塗患指厚半寸日三上即瘥又方鹽不拘多少上一味以小便調塗患指上以故帛裹之一二日用鑱針刺血再塗即瘥治代指猝腫痛不可忍方酒糟不拘多少上一味取晝夜裹之即瘥治惡指疼腫諸治不瘥方楊䕡菌子不拘多少上一味以瓶子一枚先裝灰火了入菌子於上以紙裹瓶口作一孔子將指頭入熏瘡又方以濕泥厚裹於煻火中煨令燥去泥皮皺愈又方以羊膽塗之即不結膿又方以糯米炒令焦脂和為膏貼之干即易
