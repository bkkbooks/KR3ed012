body:
  text: 卷第一百九十四治泄痢灸刺法泄痢不禁食不化小腹㽲痛者灸丹田穴在臍下二寸日灸七壯至百壯止泄痢食不消不作肌膚灸脾俞隨年壯泄注五痢大便膿血重下腹痛灸小腸俞百壯泄痢久下失氣勞冷灸下腰百壯三報穴在八魁正中央脊骨上灸多益善忌針又灸臍中稍稍二三百壯又灸關元三百壯十日灸並治冷痢腹痛穴在臍下三寸久泄痢不瘥灸足陽明下一寸高骨之上陷中去大趾岐三寸隨年壯又屈竹量正當兩胯脊上點訖下量一寸點兩旁各一寸復下量一寸當脊上合三處一日灸三十壯灸百壯以上一切痢皆斷亦治濕䘌泄痢不嗜食食不消灸長谷五十壯三報穴在挾臍相去五寸四肢不可舉動多汗洞痢灸大橫隨年壯膿血痢不止灸幽門二穴在巨關旁各半寸各灸三壯兼主小腹堅逆泄痢赤白灸足太陰五十壯三報小腸泄痢膿血灸魂舍百壯小兒減之穴在挾臍兩邊相去各一寸腸中有寒泄注腸澼便血會陽主之便膿血寒中食不化腹中痛腹哀主之治脫肛灸法脫肛灸龜尾在脊盡端窮骨七壯中極穴下一寸毛際陷者動應手寒冷脫肛灸臍中隨年壯脫肛歷年不愈灸橫骨百壯治㿗疝灸法一切㿗當騎碓軸以莖伸置軸上齊陰莖頭前灸軸木上隨年壯陰卵大㿗病灸大敦隨年壯穴在足大趾三毛中又灸足大𧿹趾內側去端一寸赤白肉際隨年壯雙灸之又灸橫骨兩邊二七壯挾莖是陰㿗灸足大趾下理中十壯隨腫邊灸之肘後方云灸足大趾第二節下橫紋正中央五壯姚氏云足大趾本三壯陰卵偏大㿗病灸泉陰百壯三報在橫骨邊陰猝腫者令並足合兩𧿹趾以一艾丸灸兩爪端方角處每爪角各半丸七壯愈陰卵大㿗病灸足太陽五十壯三報之又灸足太陰五十壯在內踝上一夫卵偏大上入腹灸三陰交在內踝上三寸隨年壯卵偏大㿗灸肩井隨年壯穴在肩解臂接處又灸手季指端七壯病在右可灸左左者灸右卵偏大㿗病灸關元百壯卵偏大㿗病灸玉泉百壯報之穴在屈骨下治腰痛灸刺法腰痛之病皆本於腎蓋腎病者俞在腰脊也諸經各有腰痛不同當隨證治之凡腰痛引項脊尻背如重狀者病在足太陽脈也刺其隙中正經出血春無見血委中穴也腰痛如以針刺其皮不可俯仰不可以顧者刺少陽成骨之端出血夏無見血成骨在膝外廉之骨獨起者腰痛不可以顧顧如有見善悲者病在陽明也刺陽明於䯒前三痏上下和之出血秋無見血三里穴也腰痛引脊內廉者屬少陰刺內踝上二痏春無見血出血太多則不可復復溜穴也腰痛腰中如張弓努弦者屬厥陰刺腨踵魚腹之外循之累累然乃刺之蠡溝穴也腰痛引肩目䀮䀮然時遺溲者病在解脈刺膝筋肉分間隙之外廉出血血變而止亦太陽之隙也腰痛如引帶常如折腰狀善恐者亦解脈病也刺隙中結絡如黍粟刺之血射以黑見赤血而止委中穴也腰痛如以小錘居其中怫然腫者病在同陰之脈刺絕骨之端為三痏陽輔穴也腰痛痛上怫然腫者屬陽維之脈刺腨下去地一尺所承山穴也腰痛不可以俯仰仰則恐僕得之舉重傷腰衡絡絕血歸之刺隙陽筋之間上隙數寸沖居為二痏委陽穴也腰痛痛上漯漯然汗出汗乾令人慾飲飲已欲走者屬會陰之脈刺蹺上隙下五寸橫居視其盛者出血承筋穴也腰痛痛上怫怫然甚則悲以恐者病屬飛陽之脈也刺內踝上五寸少陰之前與陰維之會復溜及築賓穴腰痛痛引膺目䀮䀮然甚者反折舌不能言者病在昌陽之脈刺內踝上大筋前太陰後上踝二寸所交信穴也腰痛而熱熱甚生煩腰下如有橫木居其中甚則遺溲者病在散脈刺膝前骨肉分間絡外廉束脈為三痏地機穴也腰痛不可以咳咳則筋縮急者病在肉裡之脈刺太陽外少陽絕骨之後為二痏分肉穴也腰痛挾脊而痛至頭几几然目䀮䀮欲僵仆刺隙中出血腰痛上寒刺足太陽陽明上熱刺足厥陰中熱而喘刺足少陰刺隙中出血腰痛上寒不可顧刺足陽明大便難刺足少陰少腹滿刺足厥陰如折不可以俯仰不可舉刺足太陽痛引少腹控䏚不可以仰刺腰尻交者兩髁胂上以月死生為痏數髮針立已左取右右取左此治腰痛之法也眾穴之外又有遺法者附之於後腰痛不已者灸環俞二穴在第一十一椎下兩旁各一寸半足太陽脈氣所發伏而取之各灸七壯炷如半棗核大腎腰痛不可俯仰陰陵泉主之腰痛少腹痛陰包主之腰痛大便難湧泉主之腰痛不得反側章門主之腰痛控睪少腹及股猝俯不得仰刺氣街腰痛不已灸腰目窌七壯在尻上約左右是腰猝痛灸窮骨上一寸七壯左右一寸各七壯腰痛灸腳根上橫紋中白肉際十壯又灸足巨陽七壯巨陽在外踝下治虛勞失精灸刺法虛勞尿精灸第七椎兩旁各三十壯又灸第十椎兩旁各三十壯又灸第十九椎兩旁各二十壯又灸陽陵泉陰陵泉各隨年壯又灸三陰交二七壯在內踝上三寸虛勞陰中疼痛溺血泄精灸列缺五十壯又灸橫骨五十壯又云治五臟虛竭又灸大赫二十壯穴在屈骨端三寸失精膝脛冷疼灸曲泉百壯穴在膝內屈紋頭虛勞失精陰縮灸中封五十壯顏色焦枯勞氣失精肩臂痛不得上頭灸肩骨禹百壯穴在肩外頭近後以手按之有解宛宛中失精筋攣陰縮入腹相引痛灸下滿各五十壯老人加之小兒隨年壯又云此二穴喉腫厥逆五臟所苦鼓脹並主之治虛勞小便白濁灸法虛勞腰脊冷疼溺多白濁灸脾募百壯又灸三焦俞百壯又灸章門百壯虛勞小便濁難灸腎俞百壯治諸淋灸法關元一穴臍下三寸主諸淋甲乙經云小腸募也一名次門足三陰任脈之會灸三壯炷如半棗核大淋病不得小便陰上痛灸足太衝五十壯又灸足太陽五十壯血淋灸丹田隨年壯又灸復溜五十壯一云隨年壯五淋不得小便灸垂泉十四壯穴在內踝前一寸斜行小脈上是中封之別名又灸大敦三十壯猝淋灸外踝尖七壯氣淋灸挾玉泉相去一寸半三十壯又臍中著鹽灸三壯良石淋臍下三十六種病不得小便灸氣門三十壯石淋小便不得灸水泉三十壯足大敦是也勞淋灸足太陰百壯在內踝上三寸三報之治遺溺灸法灸遺溺挾玉泉五寸隨年壯又灸陽陵泉隨年壯又灸足陽明隨年壯又灸陰陵泉隨年壯小便失禁灸大敦七壯又灸行間七壯尿床垂兩手兩髀上盡指頭上有陷處灸七壯又灸臍下橫紋七壯小便餘瀝灸復溜二穴黃帝緘經云主小便餘瀝在內踝上二寸是穴各灸一七壯次灸臍下中極下屈骨穴七壯治小便數灸法腹中滿小便數灸玉泉下一寸名尿胞一名屈骨端灸二七壯小兒以意減之小便數而少且難用力輒失精者令其人舒兩手合掌並兩大指令齊急逼之令兩爪甲相近以一炷灸兩爪甲本肉際肉際方後自然有角令炷當角中小侵入爪上此兩指共用一炷也亦灸腳大趾與手同法各三炷而已經三日又灸之治小便赤黃不利灸刺法白濁附小腸實苦心下急熱痹小腸內熱小便赤黃刺手太陽治陽手太陽在手小指外側本節陷中小腹腫痛不得小便邪在三焦約取太陽大絡視其結脈與陰厥小絡結而血者腫上取胃脘及三里小便不利少腹脹滿大小腸俞隨年壯灸兩足內踝上大脈名三陰交各二十一壯治小便白濁治胞轉灸法關元穴臍下三寸灸一七壯主轉胞不得小便甲乙經云足三陰任脈之會腰痛小便不利苦胞轉灸玉泉七壯又灸第十五椎五十壯又灸臍下一寸又灸臍下四寸各隨年壯治中惡灸刺法猝死客忤屍厥等附胃脘穴主中惡甲乙經云一名太倉胃募也在上脘下一寸居蔽骨臍中手太陽少陽足陽明所生任脈之會宜灸三壯又千金翼治中惡欲死不知人灸足大趾橫紋隨年壯左右同猝死中惡灸兩足大趾爪甲聚毛甲中七壯此華佗法又云三七壯又灸臍中百壯猝死而張目及舌者灸手足兩爪後十四壯猝死而四肢不收失便者灸心下一寸臍上三寸臍下四寸各一百壯猝客忤死者灸人中三壯一名鬼客廳又治屍厥一云三十壯又橫度口中折之令上頭著心下灸下頭五壯又針間使各百餘息又灸手十指爪下各三壯余治同上方備急方云治猝死而張目反折者又灸肩井百壯又灸間使七壯又灸巨闕百壯屍厥者灸厲兌二穴甲乙經云穴在足大趾次趾之端去爪甲角如韭葉足陽明脈所出也各灸三壯炷如小麥大又灸陰囊下去下部一寸百壯若婦人灸兩乳中間又云爪刺人中良又針人中至齒立起又以繩圍其臂腕男左女右繩從大椎上度下行脊上灸繩頭五十壯此是扁鵲秘法又針百會當鼻中人髮際五寸針入三分補之又針足大趾甲下肉側去甲三分又灸膻中二七壯猝中惡飛屍遁注胸脅滿旁庭主之在腋下四肋間高下與乳相當乳後二寸陷中俗名注市舉腋取之刺入五分灸五十壯惡風邪氣遁屍內有瘀血宜取九曲中府在旁庭注市下三寸刺入五分灸三十壯治鬼魅諸邪病灸刺法上星穴直鼻入髮際一寸灸五壯普濟針灸法云主鬼魅驚恐哭泣又唇表中央弦弦者中灸三壯主邪鬼妄語猝中邪魅恍惚振噤灸鼻下人中及兩手足大指爪甲本令艾丸半在爪上半在肉上各七壯不止十四壯炷如雀屎大鬼魅灸入發一寸百壯又灸間使手心各五十壯狐魅合手大指縛指灸合間三七壯當狐鳴即瘥灸猝中鬼擊人中一壯立愈不瘥更灸又灸臍上一寸七壯及兩踵白肉際取瘥又灸臍下一寸三壯旁庭二穴甲乙經云穴在脅堂下二骨間陷者中舉腋取之各灸三壯主猝暴中飛屍遁屍胸脅支滿時上搶心嘔吐喘逆咽乾脅痛治猝魘寐不寤灸法灸胃脘一七壯又灸兩足大趾叢毛中各二七壯肘後方雲華佗法又救猝死中惡治猝中五屍灸法灸乳後三寸十四壯男左女右不止更加壯數又灸心下三寸六十壯又灸乳下一寸隨病左右多其壯數即瘥又以四指尖其痛處灸指下際數壯令人痛爪其鼻人中又爪其心下一寸多其壯取瘥猝注忤攻心胸灸第七椎隨年壯又灸心下一寸三壯又灸手肘紋隨年壯一切食注灸手小指頭隨年壯男左女右五毒注不能飲食百病灸心下三寸胃脘十壯水注日中湧水經云肺來乘腎食後吐水灸肺俞又灸三陰交又灸期門期門在乳下二肋間瀉肺補腎也各隨年壯一切注無新久先仰臥灸兩乳邊斜下三寸第三肋間隨年壯可至三百壯又治諸氣神良一名注市扁鵲曰百邪所病者針有十三穴凡針之體先從鬼宮起次針鬼信便至鬼壘又至鬼心未必須並針止五六穴即可知矣若是邪蠱之精便自言說審得其實不必盡穴求去與之男從左起針女從右起針若數處不言便遍穴針仍須依掌訣捻目治之萬不失一黃帝掌訣別是術家秘要其目在人兩手中十指節間已見符禁門中第一針人中鬼宮從左邊下針右邊出第二針手大指爪甲下名鬼信入肉三分第三針足大趾爪甲下名鬼壘入肉二分第四針掌後橫紋名鬼心入半寸即太淵穴也第五針外踝下白肉際足太陽名鬼路火針七鋥鋥三下即胂脈穴也第六針大椎上入髮際一寸名鬼枕火針七鋥鋥三下第七針耳前髮際宛宛中耳垂下五分名鬼床火針七鋥鋥三下第八針承漿名鬼市從左出右第九針手橫紋上三寸兩筋間名鬼路即勞宮穴也第十針直鼻上入髮際一寸名鬼堂火針七鋥鋥三下即上星穴也第十一針陰下縫灸三壯女人即玉頭名鬼藏第十二針尺澤橫紋外頭接白肉際名鬼臣火針七鋥鋥三下此即曲池第十三針舌頭一寸當舌中下縫刺貫出舌上名鬼封仍以一板扳橫口吻安針頭令舌不得動已前若是手足皆相對針兩穴若是孤穴即單針之治癭氣灸法癭惡氣灸天府五十壯癭勞氣灸衝陽隨年壯癭灸天衢三百壯橫三間寸灸之癭氣面腫灸通天五十壯癭上氣胸滿灸雲門五十壯癭灸中封隨年壯在兩足趺上曲尺宛宛中諸癭灸肩髃左右相對宛宛處男左十八壯右十七壯女右十八壯左十七壯或再三取瘥止又灸風池百壯挾項兩邊又灸兩耳後髮際百壯又將患人男左女右以繩量手中指從指端齊繩頭向下至指下橫紋上截繩頭中屈從橫紋直下點繩頭灸七壯五年以後量加壯數須三月三日午時下灸無不瘥者石癭難愈氣癭易治氣舍穴在頸直人迎挾天突後陷中灸三壯主瘤癭氣甲乙經云足陽明脈氣所發灸一七壯治瘰癧痔瘻灸刺法瘰癧頸有大氣灸天牖二穴在頸筋缺盆上天容後天柱前完骨下髮際上各灸五壯一切瘰癧灸兩胯里患癧處宛宛中日一壯七日止又灸五里人迎各三十壯又灸背兩邊腋下後紋上隨年壯又灸耳後髮際直脈七壯寒熱頸腋下腫申脈主之寒熱頸腫丘墟主之寒熱頸瘰癧大迎主之寒熱胸滿頸痛四肢不舉腋下腫上氣胸中有音喉中鳴天池主之寒熱痠痛四肢不舉腋下腫瘻馬刀喉痹髀膝脛骨搖酸痹不仁陽輔主之胸中滿腋下腫馬刀瘻善自齧舌頰天牖中腫寒熱胸脅腰膝外廉痛臨泣主之寒熱頸頷腫後谿主之諸瘻灸鳩尾骨下宛宛中七十壯九瘻灸肩井二百壯諸瘻灸瘻周四畔瘥諸惡瘻中冷息肉灸足內踝上各三壯二年者六壯治痔疾灸刺法久冷五痔便血灸脊中百壯五痔通攢竹主之五痔痛不得大小便會陰主之五痔便血失屎灸回氣百壯穴在脊窮骨上五痔骨蝕商丘主之痔䐈痛飛陽承筋及委中承扶主之諸痔疽灸回氣三七壯黃帝針經云穴在尾脆骨上一寸半又連崗穴主之在回氣穴兩邊相去三寸是也各灸三七壯治癰疽瘡腫灸刺法凡發背多於背兩胛間起初如粟米或痛或癢仍作赤色日漸長大不過十日遂至於死善養生者小覺背上癢痛急取淨土以水和作餅子厚二分闊一寸半以粗艾作炷連餅子貼著瘡上灸之一炷一易若粟米大時可灸七餅如榆莢大可灸七七餅如錢大可日夜灸之不限餅數仍服五香連翹湯及鐵漿等攻之凡癰疽始發或小或大或如米粒此皆微候急須攻之若無醫藥處即灸當頭百壯一方云七八百壯其大重者灸四面及中央二三百壯亦宜當頭以火針針入四分凡疽猝著五指筋急不得屈伸者灸踝骨中央數十壯或至百壯發背癰腫已潰未潰用香豉三升以水和搗作餅子厚三分有孔勿復之布豉餅以艾列其上灸之取溫熱勿令破肉如熱痛急易之一日兩度灸如有瘡以瘡孔中汁出為度腋癰大熱刺足少陽五刺熱不止刺手心主三刺癰疽不得頃時回癰不知所按之不應手乍來乍已刺手太陰旁三痏與纓脈各二治癰腫者刺癰上視癰小大深淺刺大者多而深之必端納針項腫不可俯仰頰腫引耳後完骨主之咽腫難言天柱主之䪼腫唇癰顴髎主之頰腫痛天窗主之頸項癰腫不能言天容主之胸下滿痛膺腫乳根主之馬刀腫瘻淵腋章門支溝主之面腫目癰腫刺陷谷出血立已癰疽竅陰主之頭大浸潭一作浸淫間使主之管疽商丘主之腸癰灸兩手後肘尖上各一七壯左右同又灸兩足大趾岐間各三壯兼主諸癰腫病腸癰屈兩肘正灸肘頭銳骨各百壯下膿血即瘥大人小兒癰腫灸兩足大𧿹趾奇中仍隨病左右治癬灸法日中時灸病處影上三壯灸之咒曰癬中蟲毛絨絨若欲治待日中又法八月八日日出時令病人正當東向戶長跪平舉兩手持戶兩邊取肩頭小垂際骨解宛宛中灸之兩火俱下各三壯或七壯十日愈疣目著艾炷疣目上灸之三壯即除治雜病灸法蠱毒灸足小趾尖上三壯當有物出酒上得者酒出飯上得者飯出肉菜上得者肉菜出神驗江南有射工毒蟲一名短狐一名蜮常在山間水中人行及浴此蟲口中橫骨角弩唧以射人形影則病若見身中有此瘡急灸之一處一壯百處亦百壯大良又切葫令薄以拓瘡上灸葫上千壯瘥中沙蝨毒已深者針挑取蟲子正如疥蟲著爪上見行動如挑不得便就上灸三四壯則蟲死病除蛇螫嚼鹽唾上訖灸三壯復嚼鹽唾灸瘡上猘犬咬先吮卻惡血灸瘡中十壯明日以去乃灸一壯滿百日止姚云忌酒治婦人諸疾灸刺法婦人血傷帶下赤白灸小腹橫紋當臍直下一百壯又灸內踝上三寸左右各一百壯炷如半棗核大女子下赤白腰俞主之乳癰寒熱短氣臥不安膺窗主之乳癰淒索寒熱痛不可按乳根主之絕子灸臍中令人有子絕子陰癢陰交主之腹滿疝積乳婦諸疾絕子陰癢灸石門千金云奔豚上䐜少腹堅痛下引陰中不得小便女子絕子衃血在內不下關元主之千金云胞轉不得溺少腹滿石水痛乳婦諸疾絕子內不足者中極主之女子血不通會陰主之婦人子臟中有惡血內逆滿痛石關主之月水不通奔氣上下引腰脊痛氣穴主之女子胞中痛月水不時天樞主之千金云腹脹腸鳴氣上衝胸少腹脹滿痛引陰中月水至則腰背痛胞中瘕子門有寒引臏髀水道主之千金引臏髀作大小便不通女子陰中寒歸來主之婦人少腹堅痛月水不通帶脈主之婦人下赤白裡急瘛瘲五樞主之婦人陰中痛少腹堅急痛陰陵泉主之婦人漏下苦血閉不通逆氣脹血海主之月事不利或下赤白陰寒行間主之女子疝及少腹腫溏泄遺溺陰痛面塵目下眥痛太衝主之女子漏血太衝主之女子不字經水暴下然谷主之婦人漏血腹脹滿不得息小便黃陰谷主之千金云漏血小腹痛脹滿如阻體寒熱腹遍腫婦人月事不調王月則閉男子失精尿有餘瀝刺足少陰經治陰在足內踝下動脈是也婦人足逆寒絕產帶下無子陰中寒刺足少陰經治陰婦人無子絕嗣灸關元七壯穴在臍下三寸甲乙經云小腸募也一名次門足三陰任脈之會炷如半棗核大婦人月水不利灸四滿二穴在丹田兩邊相去各一寸甲乙經云一名髓府在中注下一寸衝脈足少陰之會各灸五壯炷如半棗核大兼治婦人無子治小兒諸疾灸刺法癇驚脈五針手足太陰各五刺經太陽者五刺手足少陰經絡旁者一足陽明一上踝五寸刺三針小兒驚癇本神及前頂囟會天柱主之如反視臨泣主之加瘛瘲脊急強目轉運上插筋縮主之小兒癇瘛瘲脊強互相引長強主之小兒食晦頭痛譩譆主之小兒癇發目上插攢竹主之小兒臍風目上插刺絲竹空小兒癇痓嘔吐泄注驚恐失精視瞻不明眵䁾瘛脈及長強主之小兒癇喘不得息顱息主之小兒驚癇如有見者列缺主之並取陽明絡小兒口中腥臭胸脅支滿勞宮主之小兒羊癇會宗下空主之小兒咳而泄不欲食商丘主之小兒癇瘛手足擾目昏口噤溺黃商丘主之小兒癇瘛遺清溺虛則病諸瘕㿗實則閉癃少腹中熱善寐大敦主之小兒臍風口不開善驚然谷主之小兒腹滿不能食飲懸鐘主之小兒馬癇金門及僕參主之風從頭至足癇瘛口閉不得開每大便腹暴滿按之不下嚏一作噫悲喘崑崙主之小兒大小便不通灸口兩吻各一壯小兒㿗先將兒至碓頭祝之曰坐汝某甲陰囊㿗灸汝三七二十一枚祝訖便牽小兒令雀頭下向著囊縫當陰頭灸縫上七壯即消艾炷如蝟簪頭許灸刺禁忌論論曰凡用灸刺當先別其所宜有偏宜刺者若天柱素髎禾膠肩貞乳中周榮腹哀中衝陰陵泉條口犢鼻髀關申脈中門承扶等三十一穴是也有偏宜灸者若絡卻玉枕承靈角孫神道膏肓會陰橫骨青靈淵等一十六穴是也其他並欲通行灸刺亦有不宜灸刺者皆在所禁若神庭腦戶顱囟承泣膻中神闕氣衝五里三陽絡承筋之類皆不可刺腦戶風府啞門承光素髎攢竹睛明迎香頭維下關脊中心俞白環俞天牖人迎淵腋少商經渠天府陽池地五會陽關伏兔之類皆不可灸又有鳩尾雖在可刺更宜精詳之石門雖在可刺在婦女則為大禁肩髃本不禁灸亦不宜多灸四肢雖亦可灸在法唯宜少灸此數者皆灸刺之先務不可不知也若不當灸而灸不當刺而刺皆有所傷內經所謂刺禁其法曰刺頭中腦戶立死刺面中溜脈不幸為盲刺客主人內陷及刺目上陷骨中脈為內漏而聾刺舌下中脈太過血出不止為喑刺缺盆中內陷氣泄令人喘咳逆刺乳上中乳房為腫根蝕刺膺中陷中脈為喘逆仰息刺腋下脅間內陷令人咳刺脊間中髓為傴刺臂太陰脈出血多立死刺肘中內陷氣歸之為不屈伸刺手魚腹內陷為腫刺氣街中脈血不出為腫鼠溪刺少腹中膀胱溺出令人少腹滿刺足少陰脈重虛出血為舌難以言刺陰股中大脈血出不止死刺陰股下三寸內陷令人遺溺刺膝臏出液為跛刺隙中大脈令人僕脫色刺關節中液出不得屈伸刺腨腸內陷為腫刺跗上中大脈血出不止死刺足下布絡中脈血不出為腫刺中五臟皆死又有大禁二十五者即五里穴也所謂迎之五里中道而止是也其次無刺大醉令人氣亂無刺大怒令人逆氣故曰大醉無刺已刺無醉大怒無刺已刺無怒以至大勞新飽大飢大渴大警大恐皆在切禁若誤犯之各有可救之理具如後云誤傷禁穴救針法腦後喑門穴不可傷傷即令人啞宜針人中無突二穴可二分風府一穴在喑門上入髮際一寸五分針只可一寸以下過度即令人啞亦針人中無突穴救之兩腋外紋頭尖處上曲池穴不可傷傷即令人手臂不舉宜針大椎相夾腦骨縫四穴深半寸瞼池上下四穴針只可深一米許過深令人血灌黑睛視物不見不可治也眼小眥後一寸太陽穴不可傷傷即令人目枯不可治也兩目大眥二穴只可背睛斜飛不得直針直即傷睛致瞎不可治也囟會一穴只可針五分過即令人頭旋目暗急針百會及風府二穴救之承泣二穴只可針三分深即令人目陷陷即不治正營不可傷傷即令人神魂失次宜針大椎兩邊相去三寸後心一穴可入五分承筋不可傷傷即令人手腳攣縮凡針筋皮須重手按開而取正穴如傷即治手虎口及手腕上下膽池不可傷傷即令人目暗即乳下二穴是宜治肝俞肺俞不可傷傷即令人身心顫掉宜針後心囟門穴救之肺募不可傷傷即令人鼻塞不聞香臭白汗透流宜治囟門及心下一寸深可一寸半地戶湧泉不可傷傷即令人百神俱散宜治人中百會三里分白穴手心不可傷傷即令人悶倒眼直上宜治前後心可五分又治神庭穴大腋不可傷傷即令人心氣促宜治肺俞穴陰後神田不可傷傷即令人精神散亂屎尿不禁耳後宛處不可傷傷即令人口頰喎斜宜治人中承漿二穴水曹不可傷傷即令人尿血不止宜治臍上一寸及百會章門不可傷傷即令人氣絕宜治後心囟會腦戶不可傷傷即令人命絕亦宜治後心囟會神庭不可傷傷即令人命絕宜治百會至骨胸前諸穴不可傷傷即令人悶倒宜治人中命室不可傷傷即令人命絕宜治人中百會承漿頤下不可傷傷即令人舌根不轉宜治耳後宛宛處五分過之亦傷也委中不可傷傷即令人腳攣行履不遂宜治三里分白穴外踝上一寸不可傷傷即令人悶絕宜治分白穴命泉不可傷傷即令人行不得宜治三里乳首不可傷傷即令人命絕不可治也白氣不可傷傷即令人失音宜治無突
