body:
  text: 卷第一百六十三産後腰痛論曰産後腎氣不足或惡露所出未盡遇風寒客搏皆令氣脈凝滯留注於腰邪正相擊故令腰痛治産後腰痛沉重芎藭湯方芎藭牛膝去苗酒浸切焙當歸切焙萆薢銼桂去粗皮桃仁湯去皮尖雙仁炒芍藥各一兩上七味粗搗篩每服三錢匕水一盞入生薑三片棗二枚擘破同煎至七分去滓溫服不拘時候治産後氣血凝滯腰重痛芍藥湯方赤芍藥延胡索當歸切炒枳殼去瓤麩炒牛膝去苗酒浸炒石斛去根附子炮裂去皮臍各一兩上七味銼如麻豆大每服三錢匕水一盞入生薑三片棗二枚擘破同煎至七分去滓溫服不拘時候治産後腰痛不可忍附子丸方附子炮裂去皮臍人參當歸切焙熟乾地黃焙桂去粗皮延胡索威靈仙去苗土各一兩上七味搗羅為末煉蜜為丸如彈子大每服一丸細嚼溫酒下胡桃茶亦得不拘時候治産後虛損氣血不和腰痛難忍丹參丸方丹參銼續斷當歸切炒桂去粗皮牛膝去苗酒浸切焙鬼箭羽銼各一兩琥珀研沒藥用醋少許化開各半兩上八味除沒藥外並搗羅為末入沒藥拌勻再用煉蜜和丸如梧桐子大每服三十丸溫酒下不拘時候治産後腰重痛不可轉側續斷飲方續斷芍藥桂去粗皮生乾地黃焙黃耆細銼芎藭黃芩去黑心當歸切炒各一兩上八味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治産後腰痛舉動不得羚羊角飲方羚羊角鎊紅藍花牛膝酒浸切焙各二兩桂去粗皮芍藥各一兩生乾地黃焙四兩上六味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治産後腰痛沉重舉動艱難牡丹湯方牡丹皮柴胡去苗犀角鎊杜仲去粗皮銼炒當歸切焙桂去粗皮枳殼去瓤麩炒檳榔煨銼丹參桔梗銼炒郁李仁湯去皮尖各一兩上一十一味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治産後氣血凝滯攻腰痛熟乾地黃散方熟乾地黃焙二兩當歸切炒一兩半吳茱萸湯洗焙乾炒半兩細辛去苗葉三分甘草炙銼芍藥各一兩上六味搗羅為散每服二錢匕溫酒調下不拘時候治産後虛冷氣血不和腰痛人參湯方人參當歸切附子炮裂去皮臍厚朴去粗皮生薑汁炙檳榔生銼桂去粗皮甘草炙鬼箭羽各一兩乾薑炮木香各半兩上一十味銼如麻豆大每服三錢匕水一盞煎至七分去滓溫服不拘時候治産後腰腳痠疼轉側不得壯熱汗出氣短心怔當歸黃耆湯方當歸銼焙黃耆細銼芍藥各二兩生薑切焙五兩上四味粗搗篩分作八服每服水二盞半煎至一盞去滓溫服治一切産後風勞冷氣女人冷血氣腰痛等楮實丸方楮實二升炒牛膝酒浸切焙當歸切焙乾薑炮各一兩上四味搗羅為末煉蜜和丸如梧桐子大每服食前空心酒下二十丸産後嘔逆論曰産後氣血尚虛風冷之氣傷於脾胃令食飲俱不能運行則痞而不通其氣上衝故令嘔逆久不已則中焦虛而不能食強食亦令人噎塞也治産後嘔逆不進食人參湯方人參桂去粗皮陳橘皮去白焙厚朴去粗皮生薑汁炙半夏生薑汁製當歸切焙白朮藿香葉各一兩丁香半兩炒上九味粗搗篩每服三錢匕水一盞生薑三片煎至七分去滓溫服不拘時候治産後嘔逆飲食不下白朮湯方白朮枇杷葉炙去毛桂去粗皮當歸切焙枳殼去瓤麩炒人參甘草炙銼麥糵炒各一兩乾薑炮半兩上九味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治産後嘔逆不下食心腹虛脹藿香湯方藿香去梗訶黎勒炮去核甘草炙陳橘皮去白焙人參白朮各一兩白豆蔻去皮草豆蔻去皮曲各一兩上九味粗搗篩每服三錢匕水一盞生薑三片棗二枚擘破煎至七分去滓溫服不拘時候治産後嘔逆不進飲食厚朴湯方厚朴去粗皮生薑汁炙人參白朮白茯苓去黑皮沉香銼烏藥銼甘草炙銼藿香葉各一兩上八味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治産後嘔逆不止香薷湯方香薷藿香葉白豆蔻去皮甘草炙銼白朮麥門冬去心炒陳橘皮去白焙各一兩上七味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治産後胃冷嘔逆溫中散方陳橘皮去白焙一兩半乾薑炮半兩白朮麥門冬去心炒甘草炙銼人參各一兩訶黎勒炮去核半兩上七味搗羅為散每服二錢匕沸湯調下不拘時候治産後嘔逆日漸成吐木瓜湯方木瓜切焙白朮藿香葉甘草炙銼五味子白茯苓去黑皮陳橘皮去白皮草豆蔻去皮人參各一兩乾薑炮半兩上一十味粗搗篩每服二錢匕水一盞煎至七分去滓溫服不拘時候治産後胃氣虛冷嘔逆丁香丸方丁香炒半兩檳榔銼三分桂去粗皮當歸切焙厚朴去粗皮生薑汁炙人參半夏湯洗七遍去滑各一兩上七味搗羅為末生薑汁煮麵糊為丸梧桐子大每服二十丸生薑橘皮湯下不拘時候治産後胃氣虛嘔逆不止或吐食不納檳榔湯方檳榔銼白朮切當歸切焙桂去粗皮京三稜煨銼蓬莪朮煨銼厚朴去粗皮生薑汁炙陳橘皮去白焙各一兩上八味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治産後嘔逆不下飲食丁香丸方丁香吳茱萸醋炒各半兩白豆蔻去皮桂去粗皮各三分陳橘皮去白焙訶黎勒煨去核各一兩木香一分上七味搗羅為末研勻煉蜜和丸如梧桐子大每服二十丸桃仁醋湯下不拘時候治産後嘔逆大止方生薑汁蜜薄荷汁各一合上三味同煎一兩沸投酒二合再煎放溫分三服治産後嘔逆膈脘痞悶不思飲食丁香散方丁香枳殼去瓤麩炒芎藭各半兩草豆蔻去皮一兩厚朴去粗皮生薑汁炙銼白朮炒各三分上六味搗羅為散研勻每服二錢匕煎吳茱萸醋湯調下不拘時候治産後嘔逆不止方丁香半兩伏龍肝三分白豆蔻去皮一兩上三味搗羅為散研勻每服二錢匕煎桃仁吳茱萸湯調下又方肉桂去粗皮半兩桃仁去皮尖雙仁炒草豆