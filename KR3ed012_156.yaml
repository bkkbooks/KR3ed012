body:
  text: 卷第一百五十六妊娠嘔逆不下食論曰妊娠之人脾胃氣弱風冷乘之則中焦痞隔胃中虛滿其氣上溢氣不下降故雖食飲卒不得下甚則嘔逆治妊娠嘔逆不下食和調胃氣豆蔻丸方草豆蔻去皮白朮各一兩人參一兩半陳橘皮去白焙一兩半夏半兩入生薑半兩搗爛焙上五味搗羅為末用棗肉為丸梧桐子大每服二十丸生薑湯下不計時候服治妊娠嘔逆不下食和胃順氣生薑散方乾生薑一分薑黃陳橘皮去白焙白芷白朮甘草各半兩炙上六味搗羅為散每服二錢匕用粥飲調下不計時候治妊娠嘔逆不下飲食胸膈痞悶白朮散方白朮一兩銼炒木香青橘皮去白焙各半兩丁香麥蘹炒人參赤茯苓去黑皮各一兩甘草炙檳榔各半兩乾薑一分炮裂上一十味搗羅為散每服二錢匕入鹽少許沸湯點不計時候服治妊娠嘔逆不下食升降陰陽和調胃氣茯神湯方茯神去木黃耆炙銼人參白朮各半兩藿香葉甘草炙各二錢上六味粗搗篩每服二錢匕水一盞入生薑三片同煎至六分去滓食前溫服治妊娠嘔逆不下食和胃氣利胸膈人參湯方人參山芋白茯苓去黑皮陳粳米各一兩半夏半兩湯洗七遍薑汁炒上五味粗搗篩每服三錢匕水一盞入生薑五片棗三枚擘破同煎至六分去滓不計時候溫服治妊娠嘔逆不下食心腹滿悶脅肋疼痛枇杷葉湯方枇杷葉拭去毛炙黃半夏湯洗十遍薑汁炒陳橘皮湯浸去白焙高良薑丁香甘草炙檳榔銼各一兩上七味粗搗篩每服三錢匕水一盞入生薑五片煎至六分去滓稍熱服治妊娠嘔逆不下食飲保生湯方陳橘皮二兩湯浸去白瓤焙人參一兩去蘆頭白朮半兩麥門冬一兩去心厚朴一兩去粗皮塗生薑汁炙令香熟白茯苓一兩上六味搗篩為末每服四錢匕水一中盞入生薑三片淡竹葉二十片煎至六分去滓不計時候溫服治妊娠嘔逆不下食飲人參湯方人參三分去蘆頭前胡一兩去蘆頭白朮三分甘草半兩炙微赤銼麥門冬一兩去心陳橘皮一兩湯浸去白瓤焙白茯苓一兩葛根半兩銼半夏三分湯洗七遍去滑上九味搗篩為散每服三錢匕水一中盞入生薑五片棗三枚煎至六分去滓溫服治妊娠嘔逆食物不下藿香散方藿香葉一兩芎藭半兩半夏半兩湯洗七遍去滑當歸三分銼微炒茅香一握去土麥門冬三分去心上六味搗羅為細散每服三錢匕水一中盞加入生薑自然汁半分與藥一處同煎至六分並滓溫呷不計時候治妊娠嘔逆不下食厚朴湯方厚朴去粗皮生薑汁炙人參白茯苓去黑皮陳橘皮湯浸去白焙白朮炒竹茹半夏為末生薑汁製作餅曝乾各一兩上七味粗搗篩每服三錢匕水一盞生薑三片煎至七分去滓食前溫服治妊娠嘔吐惡食七物飲方淡竹茹一兩人參二兩桔梗炒前胡去蘆頭半夏湯洗七遍薑汁浸炒焙乾白茯苓去黑皮各一兩茅根三分上七味銼如麻豆大拌勻每服五錢匕水一盞半生薑三片棗兩枚擘破煎至八分去滓溫服妊娠痰飲論曰痰飲者由氣道澀滯水飲停積結聚而不散令人膈脘痞悶嘔逆噁心體重多唾不思食飲妊娠痰飲不可專以破痰逐飲之劑故昔人論諸病痰飲者當以溫藥和之治妊娠痰飲嘔逆噁心利膈丸方半夏三兩湯洗七遍去滑搗羅為細末生薑汁和作餅子焙乾用前胡去蘆頭一兩赤茯苓去黑皮檳榔銼碎百合陳橘皮湯浸去白焙乾訶黎勒煨去核桔梗炒枳殼去瓤麩炒微黃人參各半兩上一十味搗羅為細末水煮麵糊和丸如梧桐子大每服十五丸至二十丸食後溫生薑湯下治妊娠痰飲不消嘔逆不食半夏湯方半夏湯洗七遍去滑人參芎藭赤茯苓去黑皮桑根白皮炙銼生乾地黃焙芍藥各三分陳橘皮湯洗去白焙一兩甘草炙半兩上九味粗搗篩每服四錢匕水一盞入生薑半分煎取七分去滓溫服不拘時候治妊娠痰飲留滯不思飲食前胡湯方前胡去蘆頭銼一兩半夏二兩以生薑自然汁一升半漿水一升同於銀器內慢火煮令水與薑汁盡薄切焙乾人參木香各一兩銼厚朴塗生薑汁炙令香熟細銼枳殼去瓤麩炒旋覆花陳橘皮湯浸去白焙乾桔梗炒各半兩赤茯苓去黑皮銼白朮各一兩甘草三分炙微令黃銼上一十二味粗搗篩每服三錢匕水一盞入生薑五片同煎至七分去滓不計時候溫服治妊娠痰飲胸膈不利不思飲食旋覆花湯方旋覆花去萼枳殼去麩炒各半兩半夏湯洗七遍薑汁浸焙乾木通各一兩銼前胡去蘆頭二兩白朮赤茯苓去黑皮陳橘皮湯浸去白焙檳榔各六兩上九味粗搗篩每服五錢匕水一盞半入生薑五片煎至八分去滓空心服午前再服此藥利胸膈行滯氣消痰飲療脹滿極效有風痰人常宜服一方有甘草炙三錢治妊娠痰逆不思飲食止煩渴定咳嗽麥門冬湯方麥門冬去心焙半夏生薑自然汁浸一宿切炒貝母炮各半兩青橘皮去白焙乾薑炮甘草炙各一分上六味粗搗篩每服三錢匕生薑三片水一盞慢火煎至七分去滓通口空心食前服治妊娠痰飲不除胸脅支滿嘔逆不思飲食赤茯苓湯方赤茯苓去黑皮前胡去蘆頭白朮紫蘇各一兩半夏湯洗七遍大腹皮銼人參麥門冬去心焙各半兩上八味粗搗篩每服四錢匕水一盞半入生薑半分煎取八分去滓不計時候溫服治妊娠痰飲咳嗽嘔逆不思飲食木香丸方木香甘草白朮陳橘皮湯洗去白焙各一兩天南星半夏生薑汁浸一宿炒白芷各半兩乾薑一分炮上八味搗羅為末同粟米飯為丸如梧桐子大每服二十丸食後煎生薑棗湯下治妊娠痰飲膈脘痞悶嘔逆噁心天南星丸方天南星半夏二味並去臍用生薑自然汁浸三宿細切焙乾用人參白茯苓去黑皮各一兩白礬一兩半研細上五味搗羅四味為末入白礬和藥再研令勻用生薑汁煮麵糊軟硬得所和丸如梧桐子大每服十五丸熟水下空心日午晚食前各一治妊娠痰逆和脾胃思飲食黃耆湯方黃耆銼一兩半夏半兩湯洗七遍焙芎藭半兩甘草炙一分人參白朮陳橘皮去白焙赤茯苓去黑皮枳殼去瓤麩炒訶黎勒皮各三分上一十味粗搗篩每服二錢匕水一盞入生薑三片棗一枚擘同煎至六分去滓溫服不拘時治妊娠痰盛嘔逆噁心頭目旋運枳殼丸方枳殼去瓤麩炒黃四兩乾薑炮裂二兩白朮銼炒三兩半夏二兩湯洗去滑焙乾上四味搗羅為末生薑汁煮麵糊和丸如梧桐子大每服十五丸溫米飲下食前服漸加至二十丸治妊娠痰盛膈脘滿痞不思飲食丹砂沉香丸方丹砂別研如粉沉香銼細肉豆蔻去殼半夏各一兩湯洗七遍去滑切作片子焙人參三分丁香微炒三分白茯苓去黑皮銼陳橘皮湯浸去白焙甘草炙檳榔銼各半兩上一十味除丹砂外搗羅為末入丹砂研拌令勻煉蜜和丸如梧桐子大每服十五丸生薑湯下食前服治妊娠痰飲浸漬膈脘目運頭旋乾薑丸方乾薑炮裂白礬熬令汁盡芎藭半夏生薑汁同炒黃各一兩白朮二兩上五味搗羅為末煮棗肉和丸如小豆大每服十五丸溫淡生薑湯下不計時候服治妊娠痰盛調脾胃進飲食人參丸方人參高良薑白茯苓去黑皮陳橘皮湯浸去白焙厚朴去粗皮生薑汁炙令香熟各一兩半夏二兩湯洗七遍去滑炒令乾乾薑炮甘草炙各半兩上八味搗羅為末用生薑汁浸蒸餅心和劑為丸如梧桐子大每服三十丸食後臨臥生薑湯下治妊娠痰盛止嗽寬膈和氣進食白朮散方白朮一兩人參二兩白茯苓去黑皮三分黃耆微炙銼薑製半夏各一兩山芋桔梗炒桑根白皮微炙銼白芷五味子各半兩甘草一分微炙上一十一味搗羅為散每服二錢匕沸湯點食後臨臥服妊娠虛煩懊熱論曰妊娠虛煩懊熱者以陽氣偏勝熱氣獨作心下懊悶頭痛面赤小便黃澀甚則淋痛是也病源又謂之子煩治妊娠虛煩懊熱退熱湯方人參甘草炙黃芩去黑心各二兩當歸切焙芍藥梔子仁防風去叉柴胡去苗各一兩上八味粗搗篩每服三錢匕水一盞煎取七分去滓溫服食後治妊娠虛煩懊熱胎氣不寧手足煩倦柴胡飲方柴胡去苗桑上寄生知母切焙百合洗麥門冬去心焙升麻各一兩甜竹茹新竹刮用三兩上七味粗搗篩每服五錢匕水一盞半生薑三片同煎至一盞去滓食後溫服治妊娠虛煩懊熱心中悶亂頭運重嘔逆四肢倦怠茯苓湯方赤茯苓去黑皮防風去叉人參白朮銼炒枳殼去瓤麩炒甘草炙各一兩上六味粗搗篩每服三錢匕水一盞生薑三片煎至七分去滓溫服不拘時治妊娠虛煩懊熱知母湯方知母切焙防風去叉黃芩去黑心甘草炙麥門冬去心焙赤茯苓去黑皮銼升麻各一兩上七味粗搗篩每服三錢匕水一盞生薑三片同煎至七分入竹瀝少許攪勻去滓溫服不拘時治妊娠心下煩懊熱躁竹瀝湯方防風去叉麥門冬去心焙黃芩去黑心升麻石膏碎梔子仁各一兩上六味粗搗篩每服三錢匕水一盞竹瀝半合煎至七分去滓食後溫服日再治妊娠虛煩懊悶四肢疼痛不睡酸棗仁湯方酸棗仁炒二兩芍藥防風去叉赤茯苓去黑皮柴胡去苗犀角鎊五味子甘草炙人參檳榔銼各一兩上一十味粗搗篩每服五錢匕水一盞半煎至一盞去滓不拘時溫服妊娠咳嗽論曰妊娠咳嗽者以肺感寒氣故也經謂形寒飲冷則傷肺久咳不已則寒氣相移不惟孕育有傷而肺氣痿弱皮毛枯悴治法宜發散寒邪滋補胎氣則咳嗽自已治妊娠咳嗽喘滿短氣防己湯方防己白藥子各一兩上二味粗搗篩每服三錢匕水一盞煎七分去滓溫服未效再服治妊娠咳嗽胸滿氣急減食柴胡湯方柴胡去苗一兩桃仁去皮尖雙仁炒半兩天門冬去心三分麥門冬去心焙甘草炙白茯苓去黑皮山芋黃耆銼阿膠炙令燥人參各一兩上一十味粗搗篩每服三錢匕水一盞煎至六分去滓不計時候溫服治妊娠咳嗽及安胎氣槐豆散方槐豆炒當歸酒浸切焙貝母去心芎藭人參各一兩上五味搗羅為散每服二錢匕溫酒調下日三治妊娠咳嗽不止麥門冬飲方麥門冬去心焙一兩紫菀去土杏仁去皮尖雙仁炒桑根白皮銼各半兩桔梗炒三分甘草炙一分上六味粗搗篩每服三錢匕竹茹如雞子大水一盞半煎減半入蜜少許打轉去滓溫服日三治妊娠咳嗽人參散方人參陳橘皮湯浸去白焙甘草炙各三兩生薑五兩洗切作片子焙上四味搗羅為散每服二錢匕沸湯調下治妊娠咳嗽胸膈不利痰涎壅悶前胡湯方前胡去苗和皮大腹銼半夏為末生薑汁和作餅子陳橘皮去白炒甘草炙各一兩上五味粗搗篩每服三錢匕水一盞生薑三片同煎至六分去滓食後臨臥溫服治妊娠咳嗽不止消痰逆和胃氣丁香半夏湯方丁香炒木香炮半夏生薑汁拌炒各半兩人參白朮銼桔梗炒白豆蔻去皮陳橘皮湯浸去白焙甘草炙檳榔銼前胡去苗銼炒赤茯苓去黑皮各二兩上一十二味粗搗篩每服三錢匕水一盞生薑三片煎至六分去滓不計時候溫服治妊娠咳嗽痰盛嘔逆白朮湯方白朮二兩半夏一兩生薑汁浸一宿焙上二味粗搗篩每服三錢匕水一盞生薑三片同煎至半盞去滓食後溫服日三治妊娠咳嗽痰盛喘逆桑白皮丸方桑根白皮二兩銼半夏生薑汁浸一宿焙阿膠炒令燥上六味搗羅為末糯米粥為丸如雞頭實大每服一丸食後臨臥含化咽津治妊娠感風冷咳嗽痰壅頭目昏痛荊芥飲方荊芥穗旋覆花前胡去苗各三兩芍藥半夏生薑汁製去毒甘草各一兩炙麻黃去節煎掠去沫焙一兩半上七味粗搗篩每服三錢匕水一盞生薑三片煎至六分去滓不拘時溫服妊娠傷寒論曰妊娠感冒寒邪藏於皮膚灑然而寒熻熱而悶頭項痛腰脊強脈浮在表者當汗之在裡者下之汗下之理制方宜輕但非破血傷胎之劑皆通用之和其陰陽正其表裡使經不傳邪無深入斯無危殆矣治妊娠傷寒安胎出汗阿膠湯方阿膠炒令燥一分獨頭蒜一