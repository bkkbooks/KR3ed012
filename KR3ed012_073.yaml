癖者有癖積在脅下遇寒即痛是也此由飲冷過度停積不散能使氣道升降胃府和調則飲食消化陳寒癖積亦自去矣治寒癖積聚巴豆丸方巴豆三七枚去皮心研紙裹壓去油杏仁五十枚湯浸去皮尖雙仁炒令熟研如膏桔梗銼炒皂莢去黑皮子塗酥炙黃色藜蘆去苗微炒各二兩上五味除研者外搗羅為末入研藥拌勻煉蜜和丸如梧桐子大每服食前米飲下一丸日三服欲利者服二丸治久寒癖積胸脅痞滿心腹堅硬短氣嘔逆手足厥冷腰背引痛吳茱萸丸方吳茱萸湯洗七遍焙乾炒一兩附子炮裂去皮臍半兩厚朴去粗皮生薑汁炙透桂去粗皮白礬燒令汁盡研如粉人參半夏湯洗去滑七遍焙乾枳實麩炒乾薑炮各三分上九味搗研為末煉蜜和丸如梧桐子大每服二十丸空心溫酒下治久寒宿癖心腹刺痛痰逆嘔吐飲食不消下利羸瘦白朮丸方白朮吳茱萸湯洗七遍焙乾炒各二兩桔梗炒一兩當歸切焙赤茯苓去黑皮各一兩乾薑炮二兩桂去粗皮附子炮裂去皮臍生乾地黃焙細辛去苗葉椒去目並閉口者炒出汗甘草炙銼各一兩上一十二味搗羅為末煉蜜和丸如梧桐子大每日空心溫酒下二十丸治寒癖宿滯食飲不消千金丸方丹參去蘆頭半兩乾薑炮二兩附子炮裂去皮臍人參戎鹽研如粉各半兩半夏湯洗去皮焙乾一兩半大黃銼炒二兩苦參銼桂去粗皮各半兩石膏二兩研如粉巴豆三十枚去皮心紙裹壓去油別研上一十一味搗研為末再同研勻煉蜜和丸如小豆大每日食後溫酒下三丸治寒癖飲食不化心下虛滿如水狀枳實湯方枳實麩炒白朮各一兩半夏湯洗去滑曝乾前胡去蘆頭各二兩桂去粗皮甘草炙銼各一兩赤茯苓去黑皮二兩上七味粗搗篩每服五錢匕水一盞半生薑一小塊拍碎同煎至八分去滓溫服空心日午臨臥各一治寒冷癖積虛中積滯及下痢心腹疼痛木香丸方木香硇砂研各半兩附子去皮臍生用高良薑胡椒各一分硫黃研半分巴豆二十八粒去皮心膜出油研上七味搗研為末再同研勻用粟米飯和丸如緑豆大每服五丸煎乾柿湯下臨臥服治寒癖留滯不消葫蘆巴丸方葫蘆巴補骨脂各一錢木香蘹香子炒各一分楝實炒半兩硇砂研一錢銅緑研一錢五靈脂研膩粉研各一分巴豆三錢去皮心膜不出油研草烏頭半兩用麩和巴豆同炒黑色上一十一味搗研為末用樓蔥汁和丸如豌豆大看虛實炒鹽酒下三五丸空心服治寒癖積氣㽱痛下利大沉香煨薑丸方沉香一兩半硇砂研木香各半兩附子一枚炮裂去皮臍黑三稜炮銼雞爪三稜炮銼京三稜炮銼各半兩青橘皮湯浸去白焙當歸切焙各一兩上九味搗研為末酒煮麵糊和丸如小櫻桃大每服用生薑一塊剜作甕子入藥一丸以濕紙裹煨令香熟安地上出去火毒少時細嚼鹽湯下治寒癖虛冷久積成塊進食化痰解風祕皂莢丸方皂莢不蚛者去黑皮並子塗酥炙肉蓯蓉酒浸一宿薄切焙乾白芷附子炮裂去皮臍各一兩上四味搗羅為末煉蜜和丸如梧桐子大每服二十丸溫酒熟水任下空心食前服如關隔服暖藥不得者服此便通快治寒癖積塊丁香丸方丁香沉香附子炮裂去皮臍硇砂研各半兩陳曲末三兩上五味除硇砂陳曲外搗羅為末用木瓜一枚大者破開去瓤入硇砂於木瓜內甑上蒸爛次入諸藥末即研看軟硬次入陳曲末看得所為丸如梧桐子大每服五丸茶湯或溫酒嚼下如要疏轉可服十丸小兒一丸治冷癖氣因服熱藥發熱心驚虛悸下冷上熱頭風嘔逆白朮丸方白朮陳橘皮去白焙各一兩半白芷三分防風去叉吳茱萸湯洗七遍焙乾芎藭山芋厚朴去粗皮塗生汁炙熟桂去粗皮大麥銼炒乾薑炮防葵銼各一兩甘草炙銼茯神去木人參各一兩一分上一十五味搗羅為末煉蜜和丸如梧桐子大每日空心溫酒下二十丸酒癖論曰胃弱之人因飲酒過多酒性辛熱善渴而引飲遇氣道否塞酒與飲俱不化停在脅肋結聚成癖其狀按之有形或按之有聲脅下弦急脹滿或致痛悶肌瘦不能食但因酒得之故謂之酒癖治酒癖痰多脅脹氣喘大黃桃仁丸方大黃銼炒桃仁去皮雙仁炒研芎藭陳橘皮湯浸去瓤焙蜀椒去目並閉口炒出汗各一兩乾薑炮高良薑小草各三分上八味為細末煉蜜和搗三百杵丸如梧桐子大每服三十丸粥飲下日三治酒癖食塊痰積及血氣血刺血塊陰陽二毒水銀煎方水銀鉛各半兩結砂子膩粉半兩硇砂通用者硼砂各一兩礞石一分巴豆二粒去皮心膜出油研上七味除膩粉外合研勻用大棗八枚去核以水調膩粉分填於棗內以濕紙五重逐枚裹之灰火內煨熟去紙並棗皮將棗肉與前藥同研勻每服皂子大一丸安舌上勿嚼用薑棗湯吞下取下積滯效治酒毒發四肢黃腫積聚成塊行風順氣四神散方甜葶藶一兩湯浸炒令紫色海藻一兩洗去鹹味吳茱萸一兩湯浸七遍焙乾微炒陳橘皮一兩湯浸去白瓤焙上四味搗羅為末每服一錢匕水一盞生薑半棗大劈破同煎至六分和滓溫服治酒痃癖水飲不消兩脅脹滿時復嘔吐腹中水聲乾薑丸方乾薑一兩炮裂銼葛根一兩銼白朮枳殼一兩麩炒微黃去瓤陳橘皮三分湯浸去白瓤焙甘草半兩炙微赤銼上六味搗羅為細末煉蜜和搗三二百杵丸如梧桐子大每服三十丸粥飲下日二又方川芎一兩京三稜一兩炮裂銼上二味搗羅為末每服二錢蔥白酒調下治癖氣在兩脅結聚不散硇砂丸方硇砂三錢細研巴豆十二枚去心皮川烏頭半兩炮裂去皮臍芫花半兩醋拌炒令乾皂莢半兩去黑皮塗酥炙令燋去子五靈脂乾薑炮京三稜煨各半兩上八味搗羅後六味為末入前二味拌勻再羅每稱此藥末一兩入去皮心膜油煎黑色巴豆十二枚研和勻以醋煮麵糊丸如大麻子大每服五丸加至七丸茶酒熟水任下治酒癖至妙通神丸方乾薑炮知母焙烏頭炮裂去皮臍各一兩巴豆去皮心膜出油研半兩上四味搗羅前三味為末入巴豆同研勻以酒煮麵糊丸如緑豆大每服七丸加至十丸臨臥生薑湯下治酒癖食積逐痛氣紫金丸方代赭石末硇砂末巴豆霜各一分木香末丹砂末各炒二錢匕膩粉礞石末各炒三錢匕上七味合研勻細以燒粟米飵為丸如小豆大每服二丸至三丸冷橘皮湯下治酒癖脅下脹滿不能飲食栝蔞散方栝蔞實去殼焙乾一兩陳曲末微炒半兩上二味為細散每服二錢匕蔥白湯調下治宿食酒癖鱉甲大黃丸方鱉甲生末大黃生末吳茱萸末各二兩硇砂火枯半兩與上三味用米醋二升慢火煎成膏入後藥京三稜炮陳橘皮湯浸去白焙木香白朮肉豆蔻去殼枳殼去瓤麩炒各一兩上一十味搗羅後六味為末將前鱉甲煎搜和丸如梧桐子大每服二十丸酒飲任下空心服加至三十丸痃癖不能食論曰痃癖不能食者由脾胃虛弱為寒氣所乘蓋脾胃者倉廩之官其氣宜通則能傳化糟粕受納水穀痃癖之人本於寒氣久積腹內不能榮養府藏脾胃既弱邪氣停滯故但虛滿而不能食也治痃氣腹脹兩肋急滿不能飲食頭痛壯熱身體疼痛枳殼湯方枳殼去瓤麩炒一兩半桔梗去蘆頭炒人參前胡去蘆頭桂去粗皮各一兩檳榔微煨銼半兩鱉甲去裙襴醋炙一兩半上七味粗搗篩每服三錢匕水一盞半入生薑半棗大拍破同煎至七分去滓溫服日三治痃氣兩肋脹滿不能飲食白朮湯方白朮赤茯苓去黑皮枳殼去瓤麩炒各一兩半人參桔梗去蘆頭炒桂去粗皮各一兩上六味粗搗篩每服三錢匕水一盞半入生薑半棗大拍破同煎至七分去滓溫服日三治痃氣撮痛不能飲食人參湯方人參陳橘皮湯浸去白焙白朮各一兩桂去粗皮三分赤茯苓去黑皮一兩半上五味粗搗篩每服三錢匕水一盞半入生薑半棗大拍破同煎至七分去滓溫服日三治痃氣胃中寒癖不思飲食肉豆蔻散方肉豆蔻去殼枳殼去瓤麩炒各三分蕪荑仁吳茱萸陳者淘焙各二兩高良薑一兩銼木香半兩生薑一斤並皮薄切炒乾上七味搗羅為散用小麥麵裹之以煻灰火煨令面黃熟去面取散每服三錢匕空腹用冷生薑水調下午後再服治痃氣胃冷不入飲食木香丸方木香蜀椒去閉口及目炒令汗出乾薑炮裂各一兩上三味搗羅為末熔蠟和丸梧桐子大空心溫酒下七丸治痃癖冷氣積滯不消胸膈痞悶不思飲食京三稜湯方京三稜炮銼木香甘草炙銼蓬莪朮炮銼各一兩藿香葉一兩半烏藥銼蘹香子炒各半兩赤茯苓去黑皮三分上八味粗搗篩每服三錢匕以水一盞煎至七分去滓食前溫服治痃癖氣每發疼痛不能飲食白朮湯方白朮木香益智去皮各一兩京三稜微煨熟銼三兩檳榔銼一兩半上五味粗搗篩每服三錢匕水一盞煎至七分去滓不計時稍熱服治痃癖積氣不能飲食及五膈氣婦人血氣木香散方木香一分蓬莪朮炮銼六兩京三稜炮銼益智去皮各二兩陳橘皮去白焙四兩甘草炙銼三兩上六味搗羅為散每服二錢匕入鹽點不計時候治痃癖急痛不能飲食京三稜丸方京三稜五兩搗末以好醋一碗同熬成稠膏蓬莪朮炮銼益智去皮青橘皮去白焙各三兩冬用檳榔夏用木香各一兩半上五味納四味搗羅為末以京三稜膏和丸如緑豆大每服二十丸加至三十丸生薑湯下食後治腹內痃癖積聚心胸刺痛面無顏色鱉甲散方鱉甲去裙襴醋炙附子炮裂去皮臍木香白朮京三稜煨銼檳榔半生半熟銼各三分大黃微炒桂去粗皮高良薑炒芎藭各半兩上一十味搗羅為散每服二錢匕抄生薑湯或炒生薑酒調下治痃癖不能食心脅刺痛發作有時並膀胱小腸冷滯黑神丸方漆六兩半生用重湯煮半日令香陳曲蘹香子各四兩木香銼細椒紅丁香各二兩檳榔四枚銼除椒紅外五物皆半生半炒上七味內六味搗羅為末用漆和丸如彈子大取蘹香子末十二兩鋪蓋陰乾並蘹香收器中養藥極干乃去蘹香瓷合盛若腎餘氣小腸膀胱痃癖七疝下墜五膈血傷産後諸血漏下赤白並一丸分四服死胎一丸皆綿灰酒化下難産炒葵子四十枚搗碎酒煎濃汁化下一丸諸疾不過三服
