body:
  text: 卷第七十三結瘕論曰結瘕者積聚之類也結伏聚積久不散謂之結浮流腹內按抑有形謂之瘕結之證形體瘦瘁食不作肌膚遇陰寒冷濕之氣則發而脅塊硬隱隱然痛者是也瘕之證腹中氣痛動轉橫連脅下有如癖氣遇脾胃有冷陽氣不足而發動者是也治結癖瘕實腹滿如鼓食即欲吐喘息急其脈弦而緊防己散方防己煮訶黎勒煨去核郁李仁湯退皮研如膏白朮檳榔銼各一兩半吳茱萸陳者淘七遍炒三分上六味除郁李仁外搗羅為散入郁李仁同研令勻每服三錢匕水一盞煎至六分和滓空心溫服治結瘕脈弦腹滿坐臥不安食即欲吐喘息急檳榔湯方檳榔白者銼一兩半赤茯苓去黑皮芍藥陳橘皮湯浸去白焙吳茱萸陳者淘七遍炒郁李仁湯退去皮別研如膏訶黎勒煨去核各三分京三稜煨銼桑根白皮焙銼各一兩上九味粗搗篩每服五線匕水一盞半煎至八分去滓溫服食前後各一服若服後頻利即減檳榔郁李仁治結瘕氣積腹滿如石氣急少臥小便不利防己湯方防己百合乾者郁李仁去皮別研如膏各一兩木通銼一兩半吳茱萸陳者淘七遍炒半兩陳橘皮湯浸去白焙當歸切焙赤茯苓去黑皮各三分上八味搗羅為散每服三錢匕水一盞生薑半分煎至六分去滓空心溫服治結瘕喘嗽腹中㽱痛飲食減少四肢乏力防葵丸方防葵三分桂心半兩木香半兩吳茱萸半兩湯浸七遍焙乾微炒鱉甲一兩半塗醋炙令黃去裙襴桔梗三分去蘆頭川大黃一兩銼碎微炒當歸半兩銼微炒京三稜三分微煨銼赤芍藥三分五味子半兩檳榔一兩半郁李仁一兩湯浸去皮微炒上一十三味搗羅為細末煉蜜和搗三二百杵丸如梧桐子大每服二十丸溫酒下治結瘕久不瘥令人不思飲食羸瘦少力芎藭散方芎藭一兩桂心一兩川大黃二兩銼碎微炒鱉甲二兩塗醋炙令黃去裙襴京三稜一兩微炮銼檳榔一兩上六味搗篩為散每服三錢匕水一盞生薑半棗大拍破同煎至七分去滓溫服空心日午夜臥各一服治結癖氣塊飲食不消肺積氣發心胸痰逆氣喘卒中風毒腳氣大腸祕澀奔豚氣痛羌活丸方羌活去蘆頭桂去粗皮芎藭木香檳榔銼各一兩郁李仁湯浸去皮研如膏五兩大黃銼炒二兩上七味除郁李仁外搗羅為末與郁李仁研勻煉蜜和丸如梧桐子大每服二十丸空腹煎生薑湯或薑棗湯下氣痛溫酒下治結瘕腹脹堅硬如石肚上青筋浮起紫葛丸方紫葛一兩芍藥赤者桔梗炒紫菀去苗土木香訶黎勒皮各三分大黃銼熬一兩半牽牛子半兩半生半炒郁李仁湯浸去皮研一兩上九味搗研為末煉蜜和丸梧桐子大每服十五丸空腹煎木通及棗湯下老幼量減丸數治結瘕腹脹堅硬不消木通湯方木通銼赤茯苓去黑皮各一兩赤芍藥吳茱萸湯洗焙炒各三分檳榔白者煨一枚銼紫菀去苗土郁李仁去皮尖炒各半兩上七味粗搗篩每服三錢匕水一盞半煎取七分空腹服日再治積聚氣塊癖瘕乾柿丸方硇砂研砒霜粉霜乾漆燒煙出鱉甲去裙襴醋炙黃連去須各一分旋覆花炒京三稜炮各半兩杏仁去皮尖雙仁麩炒乾薑炮各一兩皂莢四挺不蚛者去皮酥炙巴豆四十九粒去皮心膜出油上一十二味各搗研為細末先將乾漆鱉甲京三稜三味末用粟米半盞不淘洗以釅醋五升同熬成粥入衆藥拌和丸如豌豆大每服三丸爛嚼乾柿裹藥臨臥溫水下治遠年虛實積聚瘕塊木香湯方木香一兩海馬子一對雌雄者雌者黃色雄者青色大黃銼炒青橘皮湯浸去白焙白牽牛炒各二兩巴豆四十九粒上六味以童子小便浸青橘皮軟裹巴豆以線系定入小便內再浸七日取出麩炒黃去巴豆只使青橘皮並余藥粗搗篩每服二錢匕水一盞煎三五沸去滓臨臥溫服治結瘕積聚血結刺痛木香煎丸方木香巴豆去皮心膜不出油細研大黃銼炒京三稜生銼筒子乾漆碎炒煙出青橘皮湯浸去白焙蓬莪朮炮銼附子炮裂去皮臍桂去粗皮乾薑炮裂各一分墨一指大研硇砂半兩好醋一盞化一宿去砂石上一十二味各搗研為細末先將大黃京三稜巴豆等三味同於銀石器內用醋一升煎一二沸次入硇砂同熬成膏次入諸藥末和勻再入臼杵千下丸如緑豆大每服五丸傷冷食冷酒冷水不消結聚成氣塊痛者乾薑湯或橘皮湯下冷麵黏食不消者煮麵湯下牛羊鱉肉等不消各以本肉煎淡汁下宿酒不消溫酒下婦人諸血氣當歸酒下妊娠不可服欲宣轉者茶下七丸小兒三丸痃氣論曰痃氣謂臍腹左右緊硬而痛橫連如臂取象如弓弦之急故謂之痃氣蓋因寒溫失宜房室過度真陽虛憊陰冷內生所以水飲入於胃而不能銷鑠流於脅下經久不去遂成痼疾若遇陰寒或食冷物則作痛久則不能飲食肌膚消瘦治痃氣急痛日漸黃瘦大黃湯方大黃銼炒芍藥各二兩桂去粗皮鱉甲醋炙去裙襴各一兩半甘草炙訶黎勒微煨去核防葵各一兩上七味粗搗篩每服三錢匕水一盞煎至六分去滓下朴硝一字攪勻溫服空心日晚各一以利下爛肉血為驗治痃氣口吐酸水醋心常似有物在胸膈間牽牛子丸方牽牛子生搗羅為末以生薑汁一升慢火熬如餳二兩硇砂湯中慢火熬取霜一兩桃仁湯退去皮尖雙仁炒黃別研一兩半附子炮裂去臍皮檳榔煨銼人參乾薑炮木香丁香各三分上九味除煎研外搗羅為末入硇砂桃仁研令勻同入牽牛子煎中和搜丸如梧桐子大每日空心食後煎生薑湯下一十丸漸加至二十丸以利下積滯物為度治痃氣胸臆多滿大腸常澀訶黎勒丸方訶黎勒煨去核大黃銼炒芍藥防葵桂去粗皮甘草炙烏梅各一兩鱉甲去裙襴醋炙二兩上八味搗羅為末煉蜜和丸如梧桐子大空腹煎生薑湯下二十丸日午臨臥再服治痃氣急痛嘔吐酸水食物多噎枳殼丸方枳殼去瓤麩炒搗末米醋二升別煎如膏木香薏苡仁黃連去須大黃銼炒人參白茯苓去黑皮附子炮裂去臍皮蠡實微炒郁李仁湯去皮尖別研各一兩上一十味除煎研外搗羅為末入郁李仁同研勻入枳殼煎中和搜如硬入少煉熟蜜丸如梧桐子大空腹煎黃耆湯下二十丸日晚再服治積冷痃氣口吐清水面色萎黃附子丸方附子炮裂去臍皮草豆蔻去皮各二兩桂去粗皮吳茱萸湯浸焙乾炒一兩丁香三分木香半兩桃仁湯去皮尖雙仁炒黃別研三兩上七味除桃仁外搗羅為末入桃仁同研勻別搗羅為末煮糊和丸如梧桐子大每服二十丸空腹煎生薑橘皮湯下日晚再服治痃氣搐痛吐酸水大便不通大黃丸方大黃二兩搗羅為末以酒二升慢水熬如餳檳榔煨銼丁香各三分訶黎勒煨去核桂去粗皮木香各一兩上六味除煎外搗羅為末入大黃煎中和搜丸如梧桐子大每服食後臨臥溫酒下二十丸漸加至三十丸治痃氣急痛多吐苦水日夜發歇無常木香丸方木香乾薑炮各一兩烏頭炮裂去皮臍一兩半桂去粗皮三分上四味搗羅為末用米醋三升慢火煎如稀糊和藥末杵丸如梧桐子大每服一十五丸空腹煎生薑湯下日晚再服治痃氣上攻心脾注痛嘔吐酸水醋心烏頭丸方烏頭生用去臍皮二兩附子生用去臍皮乾薑生用各一兩三味同搗羅為末阿魏研末入前三味末中研勻別取生地黃汁四升用銅銀器中慢火煎成膏木香肉豆蔻去殼龍膽去土干椿葉各三分當歸切焙一兩半桂去粗皮一兩上一十味將木香等六味搗羅為末入前煎中和為劑再入臼搗勻熟硬即入少蜜丸如梧桐子大每服空腹用溫水下二十丸日三若心脾有痛溫水調蛤粉湯下治痃氣心痛巴豆丸方巴豆三枚去皮心膜炒黃研杏仁七枚去皮炒黃研大黃一兩銼炒搗末上三味同研令勻煉蜜和丸如梧桐子大每日空心溫酒下兩丸治痃氣甘遂丸方甘遂微炒黃色芫花醋炒黃色桃仁湯去皮尖雙仁炒黃別研芎藭當歸切焙柴胡去苗蜀椒去閉口及目炒出汗吳茱萸湯淘七遍焙乾炒厚朴去粗皮薑汁炙桂去粗皮各一兩上一十味除桃仁外搗羅為末入桃仁搗令勻煉蜜和丸如梧桐子大每日空腹煎生薑湯下十丸日二治痃氣成塊在臍兩邊疼痛甘草丸方甘草炙桂去粗皮蘆薈別研蜀椒去目及閉口炒出汗豉微炒木香柏子仁蕪荑各一兩上八味除蘆薈外搗羅為末入蘆薈研令勻煉蜜和丸如梧桐子大每食後臨臥用溫酒下二十丸漸加至三十丸治痃癖氣塊鱉甲丸方鱉甲醋炙去裙襴稱二兩乾薑炮大黃銼炒硇砂去砂石各一兩半附子炮裂去皮臍檳榔銼桂去粗皮乾漆炒出煙京三稜煨木香訶黎勒皮水銀與諸藥末同研各一兩墨燒半兩上一十三味搗研為末用曲末三兩濃醋二升同煎成膏和上件藥丸如梧桐子大每服七丸加至十丸不拘時候日三丈夫溫酒下婦人醋湯下不嚼破取下血塊如雞肝是效治痃癖氣及兩脅積聚並婦人血刺疼痛檳榔煎丸方檳榔三兩銼搗為末酒一升熬成膏京三稜為末醋半升熬成膏硫黃巴豆各一兩去皮以絹袋子盛用水五升與硫黃同煮及一升將硫黃與巴豆同研木香白豆蔻去皮肉豆蔻去殼桂去粗皮陳橘皮湯浸去白焙青橘皮湯浸去白焙高良薑蓽茇訶黎勒皮白朮各一兩胡椒一分當歸切焙乾漆炒煙出各半兩草豆蔻去皮一兩上一十九味搗羅為末與前三味膏同搜丸如緑豆大每服生薑湯下三五丸食後服治痃癖氣塊冷物所傷消積丸方代赭火燒醋淬三七遍研青礞石研末各一兩桂去粗皮白茯苓去黑皮青橘皮湯浸去白焙巴豆去皮出油各半兩京三稜炮楝實各一分硇砂三分取霜上九味研杵為末拌令勻酒煮麵糊和丸梧桐子大每服一丸至二丸木香湯下量虛實加減治五積痃癖氣塊三稜丸方雞爪三稜石三稜京三稜煨木香青橘皮湯浸去白焙各半兩檳榔銼肉豆蔻去殼各二枚硇砂研三分上八味搗羅為末用生薑汁麵糊和丸如緑豆大每服十五丸空心臨臥生薑湯方治丈夫婦人痃癖氣一切積滯京三稜丸方京三稜椎碎芫花各三兩二味醋浸五七日炒黃蓬莪朮銼炒桂去粗皮各一兩巴豆三十個用硫黃一皂子大研細醋兩盞煎令醋盡為度只用巴豆上八味搗研令勻每用藥末二兩熔黃蠟一兩蜜少許同和丸如梧桐子大丹砂為衣生薑木瓜湯下二丸至三丸甘草生薑湯下亦得看虛實臨時用治痃癖結塊面黃肌瘦心腹引痛不欲飲食宿滯冷痰二香三稜丸方丁香木香各一兩京三稜煨銼雞爪三稜石三稜各三分硇砂研牽牛子炒大黃炮蓬莪朮炮各半兩檳榔銼一兩巴豆五十個去皮心出油七分細研烏梅肉焙乾二兩上一十二味搗研為末再研勻酒者麵糊和丸如緑豆大每服五丸至七丸陳橘皮湯下治痃氣急痛腹脹胃脘痛嘔逆不下食緩衝湯方乾薑炮檳榔甘草炙各一分鱉甲去裙襴醋炙附子炮裂去皮臍芍藥炒陳橘皮湯浸去白焙厚朴去粗皮生薑汁炙人參枳殼桂去粗皮半夏湯洗去滑七遍焙各半兩上一十二味銼如麻豆每服五錢匕水一盞半生薑五片煎取八分去滓溫服治痃氣胃中寒癖不思食肉豆蔻散方肉豆蔻仁枳殼去瓤麩炒各三分蕪荑炒二兩吳茱萸湯洗焙木香各半兩高良薑一兩生薑並皮用一斤上七味銼如麻豆拌勻麵裹煨令香熱去面取藥搗羅為散每服二錢匕冷生薑茶清調下治積冷痃氣口吐清水面色萎黃白朮丸方白朮蓬莪朮炮銼木瓜切焙桂去粗皮陳曲炒別為末木香蕪荑炒薑屑各半兩北亭湯研濾清入曲末同煎成膏益智各三分上一十味搗羅九味為末用北亭膏搜和丸如梧桐子大每服二十丸炒生薑鹽湯下治痃癖積聚腹脹氣逆煩滿嘔逆大通散方沉香銼木香白朮陳橘皮湯浸去白焙桑根白皮銼木通銼各一分胡椒一錢一字黑牽牛三兩半生半炒搗取粉一兩半余者不用上八味除牽牛外別搗羅為細散每服一錢匕入