body:
  text: 卷第一百八十九食治腰痛治腰背痛骨髓虛不能久立身重氣乏盜汗少食時復吐利生地黃雞方生地黃八兩飴糖五兩烏雞一隻上三味先將雞去毛及腸臟細切地黃與糖相和納雞腹中銅器貯之復置甑中蒸炊飯熟藥成取食之勿用鹽醋食肉盡即飲銅器中藥汁治虛勞腰痛咳嗽肺痿骨蒸食羊蜜方熟羊脂熟牛髓白蜜熟豬脂各五兩生薑汁一合生地黃汁五兩上六味先以豬羊脂煎一沸次下牛髓又煎一沸次下白蜜生薑地黃汁微火煎不住手攪膏成貯密器中每服一匙許空腹溫酒調下羹粥中服之亦得若食素者以酥代脂髓加麥門冬汁若不能食或多風者加白朮治虛勞食羊臟方羊肝肚腎心肺各一具湯洗細切胡椒蓽茇各一兩豉一合蔥白一握細切牛酥一兩上六味先以五味相和以水七升慢火煎取五升去滓和羊肝等並汁皆納羊肚中系肚口別用絹袋盛之煮熟乘熱出切肚食之並旋旋服盡藥汁又食羊骨粥方羊骨兩具碎之上以水二斗慢火煎取三升如常法作粥食作羹亦得治下元久冷羊脊羹方白羊脊骨一具全者椎碎上用梁米一合水四升煎骨熟入羊腎一對再煎候熟取出濾過將腎切入蔥白五味如常作羹食治久積虛損陽道虛弱腰腳無力白羊腎羹方白羊腎一對去脂膜切肉蓯蓉酒浸細切一兩上二味相和入蔥白鹽醬椒煮作羹如常法空腹食治腎虛勞損腰膝疼行動無力豬腎粥方豬腎去脂膜切一對米三合上二味以豉汁一升半煮粥入五味並酒調和如常法空腹食治陽氣衰腰腳疼痛五勞七傷枸杞羊腎粥方枸杞葉一斤羊腎一對細切米三合蔥白十四莖上四味細切加五味煮粥如常法空腹食食治心腹病治久患冷氣心腹結痛嘔吐不能下食椒面粥方蜀椒去目及閉口者一分炒出汗水浸一宿焙乾末之白麵三兩上二味將椒末於面內拌勻於豉汁中煮令熟空腹食治冷氣心腹脹滿不能下食紫蘇子粥方紫蘇子淨洗搗碎以水二大升研濾取汁粳米三合上二味以紫蘇汁和米煮作粥如常著姜豉鹽椒等末調和空腹食之治心腹冷氣㽲痛妨脹不能食蓽茇粥方蓽茇胡椒各一兩桂去粗皮三分上三味搗羅為末每服三錢匕水一碗半入蔥一握豉半合先煮蔥豉熟去滓次下米三合煮粥將熟入前藥末同煮少頃空腹食之治心腹積冷結痛高良薑粥方高良薑搗為末半兩白米三合上二味先以水二大升煎高良薑取一升半去滓下米煮熟入五味調和空腹食之治心腹冷氣衝脅肋痛吳茱萸粥方吳茱萸水浸去涎焙乾炒搗末半兩米三大合上二味先用水二升下米入蔥豉同煮熟後下茱萸末一分並鹽少許空腹食之治冷氣心腹痛妨悶桃仁粥方桃仁去皮尖雙仁搗以水二升研取汁米三大合上二味以桃仁汁煮粥空腹食之食治脾胃治脾胃氣弱見食嘔逆瘦劣羊肉索餅方白麵四兩雞子二枚取清生薑汁一合羊肉四兩炒臛上四味將雞子清生薑汁和麵作索餅煮熟入羊肉臛調和空腹食治脾胃氣弱食即嘔逆豆蔻撥刀方草豆蔻仁二枚煨高良薑細銼半兩生薑汁二合羊肉炒臛四兩面四兩上五味以水一升先煎豆蔻高良薑至二合去滓並生薑汁和麵作撥刀煮熟以羊肉臛調和空腹食治脾胃氣及骨蒸羸瘦不下食羊骨粥方羊脊骨一具椎破白米五合淨淘上二味以水一斗煮羊骨至三升去骨下米煮粥入鹽醬少許空腹食治脾胃氣虛不嗜食四肢無力漸羸瘦山芋撥刀方干山芋末二兩白麵四兩羊肉四兩炒臛生薑汁二合上四味先用生薑汁和麵並山芋末切作撥刀煮熟以羊肉臛調和空腹食治脾胃氣弱不下食四肢無力漸羸瘦蓴羹方蓴菜鯽魚紙裹燒熟去鱗切各四兩陳橘皮湯浸去白切生薑切各一兩蔥白十四莖擘破羊骨一斤熬汁去骨上六味將前五味就羊骨汁中作羹空腹食治脾胃氣虛不下食雖食米穀不化豬肝粥方豬肝一葉去脂膜薄切新瓦上曝乾上一味搗為細末煮白米粥空腹調食日再又方豬肝半斤野雞胸臆肉四兩上二味細切於新瓦上曝乾搗羅為末空腹粥內調下五錢匕日再治脾胃氣弱食不消化羸劣瘦弱薑汁索餅方白麵曲末各二合上二味以生薑汁三合和作索餅煮熟以羊肉臛調和空腹食治脾胃氣弱不下食蒸豬肚方豬肚一枚淨洗去脂人參陳橘皮湯浸去白焙各一兩粟米飯半升豬脾一枚切上五味搗人參橘皮為末以豬脾拌飯入二味末及鹽醬椒姜等末三錢匕相和納豬肚中縫合蒸熟空腹食治脾胃氣弱見食嘔吐瘦羸無力雞子索餅方雞子五枚取清白麵四兩上二味以雞子清和麵作索餅入豉汁中煮熟入椒薑蔥等空腹食或以羊肉臛和之又糯米飯方糯米二升淨淘曲末五合研如粉上二味蒸糯米熟以曲末拌和瓷器盛經宿每日空腹食半盞治脾胃氣弱常欲嘔吐虎肉方虎肉四兩切片上一味以竹箸貫炙熟放冷食治脾胃氣弱不下食米穀不化豬脾粥方豬脾一具豬胃一枚上二味淨洗細切入好米兩合如常法煮粥空腹食治脾胃氣弱不下食四肢無力日漸消瘦羊肉索餅方羊肉細切炒銼面各四兩上二味以生薑汁和麵作索餅以羊肉臛豉汁中熟煮空腹食治脾胃氣弱不下飲食四肢無力日漸羸瘦蓴菜羹方蓴菜鯽魚紙裹炮令熟研各四兩上二味入橘皮生薑蔥白煮羹空腹食之治脾胃氣虛冷不下食方鯽魚如常法作鱠半斤上一味煎豉汁熱投之入五味等末空腹食之食治反胃嘔吐治反胃嘔吐不下食生薑粥方生薑去皮細切研一兩枇杷葉拭去毛炙七片為末上二味以水二升煎至一升去滓用白粳米一合煮粥更入鹽醬汁五味等空心溫食之治反胃吐酸水人參粥方人參為末半兩生薑取汁半兩上二味以水二升煮取一升入粟米一合煮為稀粥覺飢即食之治反胃羸弱身不能動氣乏醋心生薑撥刀方生薑二兩研取汁白麵四兩上二味以薑汁和麵作撥刀煮食之治反胃朝食夜吐夜食朝吐諸藥不瘥羊肉生方羊肉去脂膜切作片五兩大蒜去皮細研一顆上二味先將蒜入鹽醋調和蘸羊生肉空腹任意食之治反胃朝食暮吐薄荷餺飥方紫薄荷新者一握搗取汁面四兩上二味和作餺飥煮熟空腹食之治反胃羸瘦四肢痿弱粳米粥方粳米淘一合薤白七莖細切豉二十五粒枳殼去瓤麩炒為末一分生薑汁半合大棗擘破二枚陳橘皮去白焙乾為末一分上七味除薤白米外以水三盞先煎諸藥至兩盞去滓下薤米再煮以熟為度空腹任意食之治反胃食羊肚方羊肚淨洗一枚陳橘皮湯浸去白切二兩豉半升蔥白十莖切鹽少許上五味將四味貯入羊肚內以繩系頭煮熟去藥滓將羊肚細切任意食之治反胃食羊肝方羊子肝三具切為條子硇砂半兩取霜上二味調和令勻以竹杖穿炙熟空腹食之又方蝟皮一枚炙令焦為末上一味先以水二盞綠豆一合煮粥入蝟皮末一錢匕和服之又方蒼耳不限多少嫩者端午日取上一味煮熟作菜茹食之治反胃食畢即吐出立效方白羊肝一具去脂膜上一味切作生入五味調和空腹食之治嘔吐豬肚羹方豬肚淨洗去脂膜一枚人參一兩陳橘皮去白細切三分生薑去皮細切一兩蘆根細切半兩上五味先以水一斗煮蘆根至七升去滓次用人參等三味貯在豬肚中以線縫合再用蘆根汁煮令爛熟去卻藥滓將豬肚細切作羹任意食之余汁勿棄作三五次飲盡治胃反方糯米半升布裹流水擺取清曝乾炒為末沙糖搜和旋吃立止治脾胃氣弱食即嘔逆豆蔻面方草豆蔻去皮二枚高良薑半兩生薑汁白羊肉四兩作臛上四味以前二味粗搗篩以水一升煎至半升去滓入生薑汁面四兩為撥刀熟煮以羊肉臛空腹食之治脾腎氣弱見食嘔逆白麵方白麵四兩雞子清二枚生薑汁少許上三味以雞子清生薑汁和麵作棋子熟煮入羊肉臛空腹食之食治久新咳嗽治久咳嗽不瘥食豬腎方豬腎二具每具上作十四孔蜀椒去目及閉口者二十八粒納腎孔中上二味以濕紙裹煨令勻熟去椒細嚼食之治一切肺病咳嗽唾膿血不止服醍醐方真酥不拘多少上一味煉三次取醍醐每服一合瘥治咳嗽久不瘥方豬𦚠一具上一味薄切入竹筒於煻火中炮令極熟食後吃之治積年咳嗽不瘥藥棗方棗七枚大者擘破酥一雞子大莨菪一錢水淘三遍上三味鐺中炒令酥盡去莨菪取棗去皮食之良日三五服治暴咳嗽麻子粥方大麻子仁一合生研上一味同白米作粥食之日三服治多年肺氣咳嗽藥肝方羊子肝一枚分為四片膩粉一錢麝香末兩錢上三味和麵裹燒熟空腹食之時以冷水更換浸兩手良久即住來日早晨轉下惡物有蟲如頭髮相似為驗治肺氣咳嗽上氣豬𦚠酒方豬𦚠細切二具大棗去皮核三十枚上二味以無灰酒三升同浸秋冬七日春夏一日布濾去滓隨性溫飲治上氣咳嗽胸膈妨滿氣喘桃仁粥方桃仁去皮尖雙仁搗碎研濾取汁三兩粳米二合上將米和桃仁汁煮粥空腹食治上氣咳嗽胸膈妨滿氣喘豬𦚠方豬𦚠細切一具生地黃搗碎六兩餳四兩上三味先炒豬𦚠即下地黃薑蔥鹽豉候熟下餳以瓷器盛每日吃半盞許食治泄痢治泄痢阿膠棋子方阿膠炙燥為末一兩乾薑炮裂為末半兩薤白煮爛細研七莖上三味以面五兩拌和薄切如棋子大熟煮空腹食之少入五味調和亦得治吐痢後大渴飲水不止陳米湯方陳倉米淘淨三合上一味用水二升半煎至六合空心食之日晚再煎食治冷痢寒結不散日夜無度粳米飲方倉粳米淨淘控干四合薤白七莖羊腎脂五兩豉用水四升煎取二升去滓澄清上四味熬腎脂煎薤白令熟入豉汁與米同煮空腹食之治冷痢白如鼻涕臍腹切痛六味鱠方鯽魚去鱗切鱠十兩乾薑炮蓽茇陳橘皮湯浸去白焙胡椒炒蒔蘿各一分上六味除魚外為細末先將豉汁八合煎令熟投魚鱠次入藥末五錢匕攪和煮熟乘熱空心頓服治冷痢不止赤石脂面方赤石脂細研雲母粉各半兩面五兩上三味以水拌和切作條子熟煮分兩服食之著鹽醋椒蔥亦得治冷痢瀉不止食物不消乾薑餅方乾薑炮為末一兩上一味用面五兩拌和作餅子燒熟空腹食之治水痢注瀉羊肉食方羊肉除皮膜六兩煮熟倉米淘淨炒香熟搗末三兩上二味薄切羊肉以倉米末拌摻隨意食之不拘時治水痢及赤白痢薤白餅方薤白細切一握雞子黃三枚蜜蠟一分上三味合和入面少許作煎餅空心食之治水痢食羊肝𩛩子方羊肝細切五兩蕪荑微炒少許薤白細切二七莖上三味入少五味以白麵裹依食法作𩛩子候熟空心食之治水痢臍腹㽲痛雞子餅方雞子三枚打去殼醋炒熟上一味入面少許和作餅子炙熟空腹食之治水瀉冷勞氣痢似魚腦獖豬肝方豶豬肝洗淨一具上一味以釅醋二升同煮極熟切作片入蕪荑末調和空心食之治氣痢胡椒餛飩方胡椒乾薑炮各半兩訶黎勒皮四枚上三味搗羅為末取精羊肉四兩細切和藥以麵裹作小餛飩子煮熟空腹食之以飽為度治氣痢炙肝散方訶梨黎勒皮一兩分為三服上一味搗羅為末取羊肝批作薄片勿使相離以藥末入肝葉中炙熟食之以瘥為度羸瘦加蕪荑末少許相和治諸痢疾水泄霍亂並泄血後困頓不識人宜補虛正氣粥飲方黃耆細銼二兩人參一兩米二合上三味銼二味如麻豆大以水三升同煎取二升去滓下米煮粥服食治赤白痢治赤白痢蠟薤餅方白蠟一兩一分雞子三枚取黃薤白五莖研細白麵三兩上四味以雞子黃與薤白麵等調作餅子用蠟代油煎取熟空心食之治赤白痢及水痢姜面方生薑細切碎濕紙裹煨半兩白麵治如食法三兩上二味拌和畢沸湯中下煮二十沸空心旋旋食之治赤白痢鯽魚鱠方小鯽魚一斤如常鱠法蒜醋椒姜鹽臨時用上先將魚切作薄片以蒜齏椒姜鹽拌和食之不用別物兼食治赤白痢羊腎方羊腎一對去膜淨洗切細如小豆大白麵三兩上羊腎以白麵拌和同煮熟入豉鹽醋等空心頓食之治赤白痢兼治腸胃滑木耳粥方白木耳洗細切二兩白粳米淘淨三合上二味相和以豉汁煮粥任下蔥椒鹽等空心食之治赤白痢蔥粥方蔥切碎二莖粳米淘淨三合上二味以水煮粥熟放溫空腹食之治赤白痢不止脾胃氣虛粥食不消小麥曲粥方小麥曲炒黃一兩粳米淘淨二合上二味合和用水煮作粥空心食之亦治小兒無辜痢加減多少食之治冷勞下痢膿血瘦怯不能食獖豬肝方豶豬肝一具水洗去筋膜令淨切作柳葉片鱉甲去裙襴米醋慢炙一兩柴胡去苗三分甘草炙銼烏梅肉炒人參各半兩白朮三分胡黃連一兩乾薑炮陳橘皮湯浸去白焙訶黎勒炮去核蕪荑炒各半兩上一十二味除肝外搗羅為末將肝與藥末拌和令藥在肝上即旋串慢火炙令香熟空腹食之如渴即將藥末煎湯服亦效治血痢馬齒莧粥方馬齒莧二握洗切上一味以粳米三合淘淨下莧和煮作粥不得入鹽醋空腹淡食之治脾胃氣弱大腸虛冷痢如白膿涕臍腹切痛魚鱠方鯽魚一斤如常法作鱠胡椒乾薑炮蓽茇陳橘皮去白焙蒔蘿各一分併為末上六味先用豉汁煮令熟傾出候微溫下藥末各少許納魚鱠多少任意空心食之治脾胃虛冷下白膿痢及水穀痢薤粥方薤白銼七莖粳米淨淘三合上二味相和煮粥任下姜椒等攪勻令熟空腹食之治赤白痢鯽魚方鯽魚肉薄切六兩上一味以蒜齏熟煮空心服之治脾胃氣虛下痢瘦弱豬肝方豬子肝一葉蕪荑仁研胡椒為末各一分乾薑炮為末半分上四味薄切肝糝三味藥麵裹更以紙裹水濕慢火灰中煨熟去面空腹食之食治休息痢治休息痢大蒜雞子方大蒜剝去皮兩顆雞子二枚上二味先將蒜於鐺中取雞子打破沃蒜上以盞子蓋合候蒜熟空腹食之不過再服效治休息痢食羊肉方羊肉去筋膜取精者薄切令作片子四兩胡粉胡黃連各半兩大棗煮去核並皮二十顆上四味除羊肉外先研棗如泥卻別碾胡黃連作末並胡粉一處和棗作團以濕紙包裹於煻火中煨令乾熟取出搗羅為末每服三錢匕勻糝羊肉片子中將濕紙裹煨令香熟食之不過三服效治脾胃氣虛兼下痢瘦弱豬子肝方豬子肝一具去筋膜切作柳葉片蕪荑微炒碾作末二錢半上二味取肝以蕪荑末糝令勻以麵裹入煻灰火中煨令熟去面只取肝空心頓食之治冷勞氣痢暖腰腹縮小便食羊肉方精羊肉八兩切作餡肉蓯蓉微炒碾末二錢半蒔蘿末半兩附子炮裂去皮臍細碾半兩乾薑炮裂二錢半胡椒蓽茇訶黎勒炮去核各一錢蕪荑微炒半兩上九味搗羅八味為末以肉並藥末等相和拌勻分作四劑每劑以麵裹之撮合微拍令扁用濕紙裹入煻灰火中煨令熟空心食之以飽為度治冷勞氣痢瘦甚豬肝饆饠方豬肝一具勿著水去筋膜切作柳葉片子乾薑炮裂蕪荑微炒陳橘皮湯浸去白炒令黃色各一錢訶黎勒炮去核縮砂仁各二錢上六味除豬肝外搗羅為末糝肝片上拌令勻用麵裹作饆饠以三重濕紙裹安於煻灰火中煨取熟空心飽食之治氣痢日夜不記行數豬肝方獖豬肝一具重十兩者縮砂仁二兩上二味搗羅縮砂為末取豬肝去筋膜薄切作片子排厚紙上滲血令乾後將縮砂末糝肝上以三重濕紙裹於煻灰火中煨令極香熟乘熱任意食之
