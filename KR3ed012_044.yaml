body:
  text: 卷第四十四脾臟門脾臟統論論曰足太陰脾之經與胃經相為表裡其屬土其神意與智其候肌肉其聲歌其液涎其臭香其色黃用事於長夏寄王於季月散百物氣澤埤諸臟腑以均化為功又謂之中州為孤臟以灌四旁者也其脈緩虛則補之實則瀉之以平為期而已脾虛論曰脾象土位處中焦主腐化水穀通行營衛脾氣和則可以埤諸臟灌四旁若虛則生寒令人心腹脹滿水穀不消噫氣吞酸食輒嘔吐霍亂泄利四肢沉重多思氣結惡聞人聲補養之法不可緩也治脾虛不思飲食氣逆渴泄米穀不消養脾散方陳曲炒白茯苓去黑皮附子炮裂去皮臍訶黎勒皮煨甘草炙人參草豆蔻去皮炮各一兩乾薑炮半兩麥糵炒一兩半白豆蔻去皮一分丁香大者五十粒上一十一味搗羅為散每服一錢匕入鹽少許白湯點服如中酒加生薑兩片煎服治脾虛腹脅脹滿不思飲食順氣煮散方厚朴去粗皮生薑汁炙透陳橘皮湯浸去白焙白朮半夏湯洗去滑十四遍各一兩乾薑炮甘草炙各半兩上六味搗羅為散每服三錢匕水一盞入生薑五片棗二枚劈破同煎至七分食前溫服治脾虛臍腹疼痛滑泄下利不思飲食厚朴丸方厚朴去皴皮生薑汁炙透三兩乾薑炮二兩附子炮裂去皮臍白朮各一兩訶黎勒皮煨取三分上五味搗羅為末醋煮麵糊為丸如梧桐子大每服二十丸至三十丸空心食前米飲下日再治脾虛脹悶喘息不勻涕唾稠黏不思飲食草豆蔻湯方草豆蔻去皮生用人參白茯苓去黑皮陳橘皮湯浸去白焙麥糵炒白朮各一兩肉豆蔻三枚去皮附子炮裂去皮臍甘草炙各半兩上九味銼如麻豆每服二錢匕水一盞半入蜜一匙頭煎取八分去滓溫服不拘時候治脾虛不思飲食冷氣攻腹脅四肢少力吐酸水沉香湯方沉香桂去粗皮白豆蔻去皮各一兩青橘皮去白焙一兩半高良薑檳榔銼吳茱萸湯浸一宿焙乾炒厚朴去粗皮生薑汁炙各三分上八味粗搗篩每服三錢匕水一盞煎至六分去滓溫服不拘時候治脾虛胃乏不思飲食草豆蔻散方草豆蔻去皮一兩青橘皮湯浸去白焙高良薑訶黎勒皮炮各半兩白朮三分甘草炙一分上六味搗羅為散每服二錢匕食前陳米飲調下日三治脾虛胸膈痞悶心腹撮痛不思飲食大理中丸方厚朴去粗皮生薑汁炙透桂去粗皮陳橘皮湯浸去白焙白朮甘草炙芎藭五味子縮砂去皮蘹香子炒各四兩檳榔銼硇砂各二兩乾薑炮三分胡椒丁香各半兩上一十四味搗羅為末煉蜜和丸如雞頭實大每服一丸細嚼溫酒或鹽湯下治脾虛不能飲食補暖厚朴丸方厚朴半斤去粗皮生薑半斤青州棗四兩水三升同煮水盡為度去生薑棗細銼焙附子水浸七日炮裂去皮臍桂去粗皮白朮米泔浸三日切焙各四兩青橘皮湯浸去白焙人參赤茯苓去黑皮各二兩甘草炙一兩上八味搗羅為末蒸棗肉和丸如梧桐子大每服三十丸至五十丸空心鹽湯下治脾虛飲食減少肌肉羸瘦大養脾丸方白朮蓽茇紅豆去皮胡椒桂去粗皮白茯苓去黑皮附子炮裂去皮臍陳橘皮湯浸去白焙訶黎勒炮去核各三兩厚朴去粗皮生薑汁炙透乾薑炮陳曲炒大麥糵炒各二兩上一十三味搗羅為末煉蜜和丸如彈丸大每服一丸細嚼米飲下食前服治脾虛脹悶嘔逆噁心順三焦化滯氣定腹痛進飲食烏藥沉香丸方烏藥銼沉香各一兩銼葫蘆巴炒白芷各半兩木香蓽澄茄各三分上六味搗羅為末煉蜜和搗丸如梧桐子大每服十五丸食前溫粟米飲下治脾虛不思飲食溫脾內補訶黎勒湯方訶黎勒煨去核五枚厚朴去粗皮生薑汁炙透三分人參一兩當歸切焙乾薑炮白茯苓去黑皮各半兩上六味粗搗篩每服三錢匕水一盞煎至六分去滓空心溫服日再治脾虛腹脹不能食白朮散方白朮厚朴去粗皮生薑汁炙透人參吳茱萸湯洗三度焙乾炒白茯苓去黑皮麥糵炒芎藭陳曲炒各三兩上八味搗羅為散每服二錢匕空心溫酒調下日三治脾久虛不下食痰逆噁心草豆蔻丸方草豆蔻去皮乾薑炮桂去粗皮各一兩訶黎勒皮焙半兩甘草炙白茯苓去黑皮人參各三分上七味搗羅為末煉蜜和丸如梧桐子大每服空心溫酒或生薑湯下二十丸治脾虛內寒外熱宿食不消泄痢不止霍亂煩滿厚朴丸方厚朴去粗皮生薑汁炙透赤石脂各一兩半白朮大麥糵炒乾薑炮人參白茯苓去黑皮當歸切焙陳橘皮湯浸去白焙甘草炙訶黎勒皮炮各一兩上一十一味搗羅為末煉蜜和丸如梧桐子大每服空心米飲下二十丸加至三十丸日再治脾虛嘔逆心腹痛面色青黃腰胯冷疼蓽茇丸方蓽茇木香附子炮裂去皮臍胡椒桂去粗皮乾薑炮訶黎勒皮焙各半兩厚朴去粗皮生薑汁炙一兩半上八味搗羅為末煉蜜和丸如梧桐子大每服空心粥飲下十五丸日三治脾虛身重如石食少腹脹腸鳴精神昏悶補脾人參湯方人參一兩石斛去根黃耆陳橘皮湯浸去白焙桔梗炒白朮各三分附子炮裂去皮臍桂去粗皮白茯苓去黑皮丁香草豆蔻去皮各半兩上一十一味銼如麻豆每服三錢匕水一盞入生薑半分切棗三枚劈破同煎至六分去滓稍熱服不拘時候治脾虛下焦冷胸中滿悶不思飲食脅下痛補脾白朮湯方白朮五味子白芍藥甘草炙訶黎勒皮煨各半兩桂去粗皮高良薑熟乾地黃焙各三分附子炮裂去皮臍一兩上九味銼如麻豆每服三錢匕水一盞入生薑半分切棗三枚劈破同煎至六分去滓稍熱服不拘時候治脾氣不足心腹脹痛食則欲嘔四肢少力補脾湯方厚朴去粗皮生薑汁炙透桂去粗皮訶黎勒煨去核各一兩當歸切焙人參丁香白朮白豆蔻去皮高良薑陳橘皮湯浸去白焙各半兩吳茱萸湯浸七次焙乾炒一分上一十一味搗篩每服三錢匕水一盞入生薑三片切棗二枚劈破同煎至六分去滓食前溫服治脾虛飲食易傷每至秋夏臟腑不調氣逆痰嘔腹脹虛鳴藿香湯方藿香葉縮沙仁面曲銼炒白朮草豆蔻去皮各二兩厚朴去粗皮銼生薑切棗各一斤半夏四兩以上四味同爛搗慢火炒乾甘草炙四兩人參一兩半陳橘皮湯浸去白焙高良薑各一兩上一十三味銼如麻豆每服三錢匕水一盞生薑三片同煎至八分去滓溫服不拘時候治脾虛心腹滯氣發歇疼痛胸膈痞悶兩脅脹滿不思飲食硇砂煎丸方硇砂二兩阿魏研一分陳曲炒訶黎勒皮各一兩丁香蓽茇附子炮裂去皮臍青橘皮湯浸去白焙白芥子蘹香子炒檳榔銼各半兩上一十一味先將硇砂末法酒一升煎少時次入阿魏再煎五七沸新綿濾再煎次下曲末慢火熬成膏和搜衆藥末搗三五百杵丸如梧桐子大每服十五丸至二十丸食前生薑湯或溫酒下治脾虛心腹刺痛四肢乏力不思飲食溫氣煮散方木香陳橘皮湯浸去白焙當歸切焙青橘皮湯浸去白焙益智去皮京三稜炮銼蓬莪朮炮各半兩蘹香子炒馬蘭花酒浸一宿炒甘草炙各一兩高良薑炒沉香銼丁香肉豆蔻去殼訶黎勒皮各一分檳榔三枚炮銼上一十六味搗羅為散每服三錢匕水一盞入鹽少許同煎至六分食前溫服治脾虛胸膈妨悶不思飲食四肢乏力臍腹撮痛大便滑泄香橘湯方青橘皮湯浸去白焙烏頭炮裂去皮臍乾薑炮白豆蔻去皮各半兩益智去皮甘草炙各一兩沉香一分蘹香子微炒一兩半上八味銼如麻豆每服三錢匕水一盞入鹽少許棗一枚劈破同煎至六分食前去滓溫服治脾氣久虛遍身浮腫四肢不舉腹脹滿悶及水病後氣虛未平人參湯方人參石斛去根白朮桂去粗皮澤瀉各一兩黃耆五味子陳橘皮湯浸去白焙白茯苓去黑皮各一兩半草豆蔻去皮三枚上一十味粗搗篩每服三錢匕水一盞入生薑三片棗一枚劈破同煎至六分食前去滓溫服治脾虛不能飲食時發虛腫胸脅脹滿夜睡不穩及傷寒瘴瘧後發浮腫溫中散方陳曲炒草豆蔻去皮麥糵炒各一兩陳橘皮湯浸去白焙甘草炙各半兩乾薑炮一分上六味搗羅為散每服二錢匕鹽湯點空心服如睡不穩疲倦臨臥再服治脾虛附子湯方附子炮裂去皮臍人參等分上二味銼如麻豆每服二錢匕水一盞入棗二枚劈破生薑三片煎至六分食前去滓溫服治脾臟久虛積冷不散及陰氣傷寒喘悶堅脹四肢厥逆蓽澄茄飲方蓽澄茄附子生去皮臍楝實酒浸取肉山茱萸麩炒蘹香子炒青橘皮湯浸去白焙乾薑炮益智去皮各三分天雄生去皮臍一兩半沉香半兩上一十味銼如麻豆每服三錢匕水一盞入生薑三片鹽半錢匕艾七葉同煎至六分去滓稍熱空心食前服治脾虛大便滑泄肌體羸瘦不能飲食厚朴散方厚朴去粗皮附子炮裂去皮臍各四兩乾薑炮三兩以上三味同艾滓三兩杵研為粗末用老生薑四兩擦碎拌前四味同炒令紫色入後藥肉豆蔻仁訶黎勒皮各一兩半吳茱萸湯洗七遍去涎焙乾炒草豆蔻仁縮砂仁陳橘皮湯浸去白焙各一兩上九味搗羅為散每服二錢匕食前粟米飲調下治脾虛不進飲食白豆蔻湯方白豆蔻去皮人參白朮芎藭白茯苓去黑皮陳橘皮湯浸去白焙各一兩厚朴去粗皮生薑汁炙二兩甘草炙三分乾薑炮丁香各半兩上一十味銼如麻豆每服一錢半匕水一盞入生薑三片棗一枚劈同煎至六分去滓不計時候稍熱服治脾虛嘔吐寒痰滑泄不能飲食丁香白朮飲方丁香半兩白朮一兩白芍藥桂去粗皮高良薑白豆蔻去皮陳橘皮湯浸去白焙乾薑炮桔梗炒各一兩半蒼朮湯浸去皮焙三兩丁香皮厚朴去粗皮生薑汁炙透烏頭炮裂去皮臍各一兩上一十三味銼如麻豆每服三錢匕水一盞入生薑三片棗三枚劈破同煎至六分去滓稍熱食前服脾實論曰脾臟盛實則生熱熱氣熏蒸則令人舌本腫脹語言謇澀腹脅堅硬涇溲不利四肢不舉身體沉重面目焦黃不得安臥而唇口乾燥也治脾實舌本強直或夢歌樂體重不能行瀉熱湯方前胡去蘆頭赤茯苓去黑皮龍膽去土細辛去苗葉芒硝各三兩杏仁湯浸去皮尖雙仁炒四兩黑參大青苦竹葉切各二兩上九味粗搗篩每服三錢匕水一盞煎至八分去滓不拘時候溫服治脾實熱面黃目赤季脅痛滿半夏湯方半夏湯洗七遍切焙枳實去瓤麩炒梔子去皮赤茯苓去黑皮芒硝各三兩細辛去苗葉五兩白朮杏仁去皮尖雙仁炒各四兩淡竹葉切二兩上九味粗搗篩每服五錢匕水一盞半入生地黃生薑各半分切同煎至一盞去滓不拘時候溫服治脾實咽乾口燥舌本腫強腹脅滿脹大便澀難射干湯方射干八兩大青三兩石膏碎十兩上三味粗搗篩每服五錢匕入蜜一匙頭水一盞半同煎至一盞去滓不拘時候溫服治脾實胸中滿悶腹脅壅脹身熱頰疼咽喉不利瀉脾大黃湯方大黃銼微炒一兩赤茯苓去黑皮三分枳殼去瓤麩炒半兩甘草炙銼黃芩去黑心各一兩陳橘皮湯浸去白焙半兩麥門冬去心焙一兩半夏湯洗去滑焙前胡去蘆頭各半兩上九味粗搗篩每服三錢匕水一盞入生薑一棗大拍碎煎至七分去滓不拘時候溫服治脾實熱頭痛胸滿腹脅壅滯不思飲食瀉脾赤茯苓湯下赤茯苓去黑皮三分旋覆花半兩大黃銼微炒石膏碎各一兩桑根白皮銼三分芍藥赤者半兩枳殼去瓤麩炒三分前胡去蘆頭甘草炙各半兩上九味粗搗篩每服三錢匕水一盞入生薑一棗大拍碎煎至七分去滓不拘時候溫服治脾臟壅實口內生瘡食少心煩瀉脾升麻湯方升麻羚羊角屑茯神去木黃連去須各一兩柴胡去苗一兩半黃芩去黑心三分麥門冬去心焙一兩大青三分甘草炙半兩上九味粗搗篩每服三錢匕水一盞煎至七分去滓食後溫服治脾實熱頭痛脅滿煩悶或渴唇口乾燥石膏湯方石膏碎一兩麥門冬去心焙一兩半柴胡去苗犀角屑栝蔞根地骨皮各一兩葛根銼二兩甘草炙半兩上八味粗搗篩每服三錢匕水一盞入竹葉二