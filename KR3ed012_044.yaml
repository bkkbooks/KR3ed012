末四兩芫花醋炒焦半兩青橘皮湯浸去白焙三分上一十六味除搗羅外將乳香沒藥丹砂硇砂別研與楝實末同入石器內用釅醋一升慢火熬成膏即入諸藥拌和令勻丸如緑豆大每服十五丸臨臥溫水下治脾胃虛寒宿食不消丁香丸方丁香硇砂木香桂去粗皮附子炮裂去皮臍乾漆炒煙出蓬莪朮煨銼乳香研青橘皮湯浸去白焙京三稜煨銼墨大黃銼炒搗末巴豆霜先稱了取霜芫花醋炒焦豬牙皂莢去皮子炙沒藥研乾薑炮各二兩上一十七味除硇砂大黃巴豆霜乳香沒藥外搗羅為末以釅醋一升化硇砂去滓入銀石器中慢火煎之次下巴豆霜攪勻兩食久次下大黃末熬成膏拌諸藥更入醋煮麵糊和搗一千杵丸如麻子大每服三丸至五丸溫酒或熟水下得微利佳更量人虛實加減治脾胃虛寒宿食不消壯熱憎寒頭目重痛大應丸方巴豆十五粒去皮漿水一盞煮乾為度大黃蒸熟一分五靈脂炒青橘皮湯浸去白炒各半兩上四味搗研為細末麵糊和丸如緑豆大每服七丸食後臨臥生薑湯下治宿食不消腹脹膨悶五香丸方丁香木香沉香安息香乳香硇砂丹砂研肉豆蔻去殼桂去粗皮京三稜煨銼當歸切炒陳橘皮湯浸去白焙檳榔銼蓽澄茄各一分附子炮裂去皮臍半兩巴豆十粒去皮心膜出油上一十六味先將安息香乳香硇砂三味細研用少酒浸良久餘十一味搗羅丹砂巴豆與前三味通研令勻酒煮麵糊丸如麻子大每服五丸至七丸熟水下生薑湯亦得治宿食不消丹砂丸方丹砂硇砂麝香各一兩雄黃鉛丹各半兩膩粉三錢匕巴豆二十粒去皮心膜出油細研用醋半盞熬成膏上七味將六味細研與巴豆膏和勻入白麵滴水丸如緑豆大每服三丸至五丸用水半盞煮一沸取出臨臥溫酒下治宿食不消心腹脹滿吐逆吞酸小三稜煎丸方京三稜蓬莪朮各四兩芫花一兩上三味同入瓷瓶內用米醋五升浸滿封瓶口慢火煨微干取出前二味杵碎仍用余醋炒芫花微焦並焙乾為末醋煮麵糊丸如梧桐子大每服三丸至五丸生薑湯下婦人醋湯下治心氣脹滿食不消化木香枳實丸方木香三分枳實去瓤麩炒三分赤茯苓去黑皮一兩人參三分訶黎勒皮炮一兩半大黃銼炒三兩郁李仁研二兩上七味搗羅為細末煉蜜和丸如梧桐子大每服三十丸空腹溫水下治脾胃不調宿食留滯腹脹發熱嘔逆酸水日漸羸瘦人參柴胡湯方柴胡去苗人參白朮赤茯苓去黑皮桔梗炒陳橘皮去白炒五味子當歸切焙細辛去苗葉半夏湯洗七遍去滑炒乾大黃銼炒各一兩厚朴去粗皮生薑汁炙香熟二兩半桂去粗皮黃耆銼各一兩半上一十四味粗搗篩每服四錢匕以水一盞入生薑一棗大拍破煎取七分去滓空心頓服日晚再服治脾胃不和胸膈痞悶飲食化遲小麝香丸方麝香半錢研丁香皮銼木香益智去皮甘松莎草根去毛蓬莪朮炮銼各一兩上七味除麝香外搗羅為細末入麝香拌勻以水浸炊餅心和丸小豆大每服七丸至十丸嚼破溫熟水下食後服治脾臟虛冷宿食不消陳曲丸方陳曲炒乾薑炮各二兩枳殼去瓤麩炒附子炮裂去皮臍人參蜀椒去目併合口炒出汗甘草炙各一兩上七味搗羅為末煉蜜丸如梧桐子大每服二十丸早晚食前服治脾元虛冷宿食不消心腹刺痛嘔逆醋心面黃痿弱吳茱萸丸方吳茱萸四兩陳者上一味用大萊蔔一枚剜空入茱萸在內以蓋復之用黃泥團裹溏灰火內熟煨取出別用慢火以醋炒令勻熟用葛布袋盛之每日空心米飲下七粒至十粒久服永無冷疾治三焦氣不升降脾臟衰弱胃氣虛滿不思飲食舊谷未消新谷又入脾胃氣弱不能磨化穀氣減耗肌肉瘦瘁面目萎黃寒濕結瘀飲氣下流漬傷肝腎足脛虛浮怠惰嗜臥四肢不收此藥服之並不耗氣可以剖判清濁交通上下使脾氣和實而能磨化水穀磨脾丸方補骨脂六兩炒令黃焦京三稜一斤大者炮細碾羅取粉四兩用蓽澄茄六兩黑豆一斤湯去皮焙乾炒令黃熟細碾羅取粉四兩檳榔四兩木香四兩上六味同為末水煮麵糊為丸如小豆大每服二十丸溫米飲下不計時候
