body:
  text: 卷第一百二十七諸瘰癧論曰瘰癧諸病皆由風熱毒氣蘊積臟腑搏於肝經所致蓋肝主筋毒氣攻於筋脈故隨肌肉虛處停結而為瘰癧多生頸腋間其狀結核累累相連或如梅李故謂之瘰癧治瘰癧諸病烏蛇丸方烏蛇酒浸去皮骨炙白殭蠶微炒大黃濕紙裹煨昆布細銼麩炒斑蝥糯米同炒令米黃去米不用連翹各半兩干蝦蟆一枚燒灰芫青三對斑蝥同炒雄鴿屎緊淨者一合皂莢子一百枚揀圓熟肥好者熨斗內燒存性上十味搗羅為末煉蜜丸如梧子大每服七丸加至十丸茶清下空腹晚後各一服成瘡者不過四十日內消干其效皆勝於轉瀉及小便內取者治諸瘰癧皂莢丸方豬牙皂莢七梃三梃炮二梃炙二梃生並去皮都一處椎破用溫水一碗浸七晝夜每日揉一遍日滿去滓絹濾熬至半盞如糊入藥用母丁香四十九枚龍腦研麝香研各半錢漏蘆去蘆頭紅娘子去頭翅足蘇枋木節銼木通銼滑石各一分粳米少許上十味除皂莢外搗研為末都入皂莢汁中更和寒食麵少許為丸如綠豆大每服十丸丁香水下空心食前日三四服服時不得見日此藥內消不吐不利治瘰癧神效追毒煎方丁香七枚麝香研一錢莨菪子五十粒雄鼠屎七粒兩頭尖者以面兩匙同炒令黃去面用檞皮三斤去粗皮椎碎細銼以水二斗煎取四升濾過重煎候成膏入諸藥斑蝥三枚去翅足以糯米半合同炒去米用上六味除檞皮外搗研為末暖檞皮煎令溫和諸藥攪勻貯瓷器內每服三匙許空心以溫酒一盞調下臨時更看人虛實及肥瘦加減斟酌用之服了仰臥須臾即吐出若病根年深者如蝦蟆衣魚腸相似近者若蜆肉吐了以溫水漱口吃粟米淡粥補粳米亦可治瘰癧鸛骨丸方鸛骨酥炙貍骨酥炙獺肝炙連翹射干玄參丹參木香沉香銼犀角鎊羚羊角鎊各一兩升麻甘草炙銼丹砂細研人參各半兩沙參一分上十六味搗研為末煉蜜和丸如梧子大每服二十丸空心米飲下加至三十丸治瘰癧六神散方斑蝥四十枚去頭翅足用糯米炒色黃去米用巴豆五枚去皮心膜研檳榔一枚銼硼砂研一分麝香研半錢膩粉研一分上六味搗研為散再同研勻用雞子清兩枚調和藥末勻傾藥入殼中濕紙糊合勿令透氣入飯甑內蒸候飯熟取出藥曝乾細研如粉虛人每服半錢匕實人一錢匕並用炒生薑酒調下五更初服至平明取下惡物如覺小腹內疼即時用𦯶實燒灰入沒藥等分為散茶調下一錢引前藥入大腸其取下惡物如爛肉是藥效驗治瘰癧皂莢丸方皂莢五梃去皮用酥二兩旋塗炙干薄荷葉大黃銼防葵各二兩膩粉研少許雞子二枚煮熟用黃上六味搗研為末別將皂莢五梃生椎碎以水一斗揉取汁羯羊肉半斤去筋膜以皂莢水熬成膏和藥末丸如梧桐子大每服十丸食前米飲下日二治瘰癧諸方不瘥連翹湯方連翹犀角鎊黃耆銼蔓荊實青葙子生等分上五味粗搗篩每服三錢匕水一盞煎至六分去滓溫服空心食前十日見效治瘰癧烏犀散方犀角鎊一分白花蛇酒浸去皮骨炙四兩青橘皮湯浸去白焙半兩牽牛子熟炒一兩生用半兩上四味搗羅為散每服二錢匕入膩粉一錢匕五更初以糯米粥飲調下至辰巳間胸膈內作聲勿怪相次如筋線連內結子下是病根也更候二十日再一服永瘥治瘰癧內消散方芎藭一兩白殭蠶直者炒甘草炙銼各半兩上三味搗羅為散每服一錢匕蜜水調下食後服日三治瘰癧神聖得效三神丸方斑蝥一分石決明一枚麝香研一分上三味先將前二味為末和粥面少許搗成劑入麝香再搗研丸如綠豆大每服五丸臨臥煎生薑湯下治瘰癧蓖麻子丸方蓖麻子一千顆半生用半瓦內炒令煙起礬石一兩瓦上熔三五沸放冷研黑豆六顆三粒生用三粒瓦上炒熟上三味並不得犯鐵器一處細杵勻爛丸如皂子大每服一丸鹽湯下婦人醋湯下不計時候治瘰癧皂莢針散方皂莢針一斗不生子者惡實半升上二味取皂莢針於盆中燒候火盛時撒惡實於火中燒候煙欲盡急以盆合之冷定取出搗羅為散每服三錢匕空心井華水調下數日後利下惡物如膠餳永除根本利了三五日只可吃軟粥飯治瘰癧內消牡蠣丸方牡蠣煅過為末三兩皂莢子二升取白水浸一宿上二味先將皂莢子以水三升煮令爛取出入瓷盆內研為膏入牡蠣末為丸如梧子大每服十五丸空心溫酒下日晚再服治瘰癧牡蠣散方牡蠣黃泥固濟煅取白為度三兩甘草炙銼一兩上二味搗羅為散每服二錢匕空心點臘茶清調下日三服仍用好皂莢一梃去皮分作兩截一截使米醋半盞刷炙以醋乾為度一截焙乾烏頭二枚內一枚炮一枚生炒糯米三十粒同為末再用醋半盞暖動和勻成膏貼之治項下生瘰癧不問新久有熱人可服清涼散方龍膽揀淨上一味搗羅為散每服一錢匕酒或米飲酒下食後夜臥服天陰日住服治瘰癧三物散方紅娘子六十枚不蚛者去翅足大黃半兩陳粟米一合無即以陳粳米代之上三味同炒令米黃為度共搗羅為細散初服一字匕每日空心溫酒調下第四日後服半錢匕及五七日覺臍下疼小便澀勿怪是藥驗也更服後藥青橘皮湯浸去白焙虎杖等分上二味搗羅為末以醋煮麵糊為丸如綠豆大每服五丸至七丸用青橘皮湯下與前散藥相間食後臨臥服日二次用貼藥貼瘰癧方砒黃信州者上一味細研滴濃墨汁為丸如梧子大於挑子內炒令乾後用竹筒子盛每用時於所患處灸破或針挑破將藥半丸敲碎貼之以自然蝕落為度覺藥力盡時更貼少許治瘰癧一宗先服輕粉丸方烏雞子一枚去黃取白盛於盞內用膩粉一錢半巴豆一七粒新者去皮心同入雞白內蒸熟取於乳缽內研令勻細別用膩粉三錢匕於手掌中以病人津唾調和合前藥為丸如綠豆大上每服五丸荊芥薄荷茶下黃昏時服至一更如未轉更以薄荷茶投之若腹痛先取下宿食一次第二次以水盛取見病根惡物出也或患年深只可三度轉出盡惡物其項漸小或大者先使線記轉了其項旋小為驗不得出風一月內將息後用補藥人參玄參白藥苦參各半兩上四味銼細焙乾搗為粗末每服一錢匕水一小盞煎三五沸去滓溫服如瀉不止用黃連乾薑各一錢為粗末煎服不過三五服便止永瘥如瘡口未合用後膏藥坐拿草半兩上一味搗羅為細末用粟米少許將酒煮成稀粥濾取濃汁入前藥調勻為膏塗於帛上貼之不得動換瘡口永瘥治瘰癧藥一宗先服托中散方黃耆切一兩甘草微炙半兩上二味搗羅為散每日食後湯點服一錢匕日二服次用取藥外取瘰癧方麝香研一錢蟾酥十枚如松子大砒霜研半錢斑蝥十枚去翅足炒龍腦研一錢上五味搗研為末用細白麵一錢以水和勻青黛為衣每用相度瘡大小仍須灸三壯候瘡發用藥切宜少使候取下病便用此藥淋洗瘡口方五倍子一兩礬石半兩上二味為末每用二錢匕沸湯一碗調勻淋洗湯溫即止每淋洗了用軟帛浥干用生肌藥摻於瘡口上治諸瘰癧方上用極薄紙剪成四寸許片子以水銀膩粉各一錢用雞子一枚破之取白和膩粉等攤在四方紙上看藥多少攤得若干片數仍於瓷碟中攤之藥勻為度於日內曬不得見火候八九分干和紙揭起細剪丸成梧桐子大每片藥作五十丸用皂子仁煎湯放溫下三丸日服三服空心日午臨臥服之至第三日取下如鱉卵或如爛杏小鼠之形者乃是病源卻不動氣治瘰癧柴胡湯方柴胡去苗荊芥穗秦艽去苗土知母焙當歸桂去粗皮藿香去梗甘松去土敗龜醋炙烏頭炮裂去皮臍地骨皮楓香脂白芍藥各半兩芎藭一兩苧根濕秤二兩碎切上十五味並淨洗曝乾搗為粗末每服三錢匕以水一盞入生薑三片大棗一枚擘同煎七分去滓溫服早晨午食後夜臥各一服治瘰癧散毒湯方連翹射干玄參芍藥木香升麻梔子仁前胡去蘆頭當歸切焙甘草銼微炙大黃銼微炒芒硝研各等分上十二味除芒硝外粗搗篩每服五錢匕水一盞半入芒硝半錢匕同煎至八分去滓溫服早晚食後各一治瘰癧繞項如連珠連翹丸方連翹防己羌活去蘆頭木香梔子仁芍藥各三兩玄參五兩大黃一兩上八味搗羅為末煉蜜丸如梧桐子大每服二十丸溫水下食後治熱結瘰癧繞頸項滋蔓連翹丸方連翹羌活去蘆頭各一兩芍藥木香防己大黃生銼梔子仁生犀角屑各一兩玄參一兩半上九味搗羅為末煉蜜和丸如梧子大每服二十丸食後米飲下治熱毒風毒結成瘰癧勝金散方斑蝥半兩去頭翅麩炒豆黃末炒一合糯米末炒一合甘草一中指節許半生半炙膩粉研一分上五味搗研為散拌勻空心以米飲調下五錢匕當吐瀉下惡物煮糯米粥補之治風毒瘰癧祛風丸方皂莢三十梃十梃火燒欲過十梃塗酥炙去皮子十梃水挼盡去滓取汁何首烏蒸干薄荷葉玄參各四兩為末精羊肉半斤上五味以皂莢水煮肉使爛細研和藥為丸如梧桐子大每服二十丸空心溫酒下薄荷湯亦得治瘰癧內消散方人參滑石各半兩丹砂研一分斑蝥四十九枚去頭足糯米炒麝香研半錢上五味搗研為散每服二錢匕溫酒調下治瘰癧禹餘糧飲方禹餘糧粉研一兩分作兩貼甘草一兩半生半炙椎碎膩粉研半分分作兩貼上三味先將甘草半兩以水一升煎取半升調禹餘糧末並膩粉各一貼空心頓服當瀉下惡物未愈再服瀉後以薤粥補之治風毒熱毒結成瘰癧內消羌活散方羌活去蘆頭一兩半白殭蠶一兩炒上二味搗羅為散每服四錢匕空心蜜酒調下臨臥再服治風熱毒氣結成瘰癧內消浸酒方仙人杖草根並苗一斤羌活去蘆頭二兩杏仁去皮尖研炒二兩上三味將前二味細銼入研杏仁以醇酒一斗於瓶內密封七日後取開每日空心暖服一盞臨睡再服治熱結瘰癧大薊根散方大薊根一斤上一味搗羅為散每服三錢匕食後溫酒調下日再服治瘰癧鯽魚丸方上取鯽魚長三寸者去腸以和皮巴豆填滿腹中麻皮纏以一束稈草燒煙盡研細粳米粥和丸如綠豆大每服一丸粟米飯飲下未利加一丸以利為度每日以此為準盡劑乃安病甚破者見效尤速治風熱毒氣結成瘰癧內消方小麥淘淨上一味煮三五升頻吃即愈諸瘻論曰瘻有九種曰狼瘻者由大怒傷陰氣上而不下所致也曰鼠瘻者由飲食之間有蟲鼠餘毒所致也曰螻蛄瘻者因食果蓏並蟲啖之所致也曰蜂瘻者因倦飲水即得蜂毒所致也曰蚍蜉瘻者因中寒毒腹中臚脹所致也曰蠐螬瘻者恐懼憂思哭泣不止所致也曰浮疽瘻者恚結馳思往返變化所致也曰轉脈瘻者大醉驚嘔轉側失枕所致也瘰癧瘻則瘰癧諸證論之為詳其名其證雖則不同然皆由飲食居處不慎憂思恚怒或沖冒寒暑或勞傷血氣邪毒蘊結留滯血脈久而不去故為瘻也巢氏又載三十六種之多而謂其方不可次第至其論病源則與九瘻亦大同小異故不復類今有可以一方兼治諸證者集之於前余各隨其病名附之於後治諸瘻蝟皮散方蝟皮炙焦半枚蜀椒去目並閉口炒出汗當歸切焙露蜂房炙焦地榆醋炙各三分斑蝥去足翅糯米炒蛇蛻銼炒烏賊魚骨去甲葛上亭長去足翅糯米炒各半兩鯪鯉甲炙焦四兩䕡茹一兩細辛去苗葉半兩樗雞四枚炒蜈蚣去頭足炙一枚蜥蜴去頭足炙一枚薏苡仁乾漆炒煙出蒺藜子炒去角桂去粗皮漏蘆去蘆頭木通銼附子炮裂去皮臍牡丹皮龍膽王瓜根各三分鶴骨酒炙貍骨酒炙雄黃研蛇床子炒大黃銼炒苦參各一兩半上三十一味搗羅為散每服二錢匕空心用溫酒調下日晚再服漸加至三錢匕治九種瘻芫青丸方芫青地膽斑蝥三味並去頭足翅糯米炒各十枚蜈蚣去頭足炙一枚生犀角屑牛黃研各半分豉心四十九粒黑豆黃十粒上八味搗研為末煉蜜丸如梧桐子大欲服藥隔宿少食物明旦空心酒服三丸須臾煮醋飯及漿水薄粥稍稍飲之其瘻蟲各有形狀從小便中出至日西時再煮粥食之若人強盛隔日一服怯弱隔二日一服以瘡瘥蟲出盡為度治諸瘻葛上亭長丸方葛上亭長地膽斑蝥三味並去頭足翅糯米炒各十枚衣中白魚四十枚鼠婦六十枚炙雄黃研一分真珠研一分檳榔銼二枚上八味搗研為末煉蜜丸如梧桐子大每日空心溫酒下三丸日晚再服漸加至五丸治諸瘻斑蝥散方斑蝥去足翅糯米炒七枚真珠研桂去粗皮水銀與眾藥研令星盡各半兩葛上亭長去足翅糯米炒七枚上五味搗研為散每服半錢匕米飲調下空心午後服小便有所出即瘥治諸瘻腫芫青散方芫青斑蝥葛上亭長三味並去足翅糯米炒各十枚桂去粗皮上四味搗羅為散每服半錢匕空心溫酒調下日晚再服更宜灸陽明絡脈在肩前甲頭二寸陷中有青脈是正向上臥交兩臂勿令開乃夾取之灸隨年壯即瘥治諸瘻久不瘥烏藥膏方烏藥末二兩豬膽三枚上二味以膽汁和烏藥末令勻以薄綿裹納瘡口日三五度治諸瘻檞皮膏方檞木白皮細切五斤上一味以水二斗煎至三升絞去滓重煎令成膏每日空心服半棗大漸加至一棗許日二服兼敷瘡上日三兩度治久冷瘻瘡瘰癧痔毒疼痛生肌丁香膏方丁香三分沒藥安息香麝香研臨了入當歸乳香附子去皮臍桂去粗皮各半兩雄雀屎四七粒蕪荑仁半兩鉛丹三兩油八斤上十二味除麝香外並銼碎先熬油令沸下諸藥煎候附子黃赤色以綿濾去滓下鉛丹柳篦攪候色黑滴水內成珠子得所入麝香攪勻以瓷合盛用故帛上攤貼日再換取瘥治諸瘻瘰癧陰偏腫堅或發潰膿血不絕蝟肝膏方蝟肝炙令熟二兩芍藥芎藭細辛去苗葉各半兩羊膒脂五兩當歸切焙蠟黃連去須黃芩去黑心松脂各一兩上十味除羊脂蠟松脂外搗羅為末先熬脂令沸下蠟松脂銷熔即下諸藥末攪令勻以瓷合盛塗瘡上日三度換治諸瘻浮核不盡及諸惡瘡癰疽息肉在肌中藜蘆塗敷方藜蘆以雞子三枚取白塗炙令乾䕡茹各一兩雄黃研二兩上三味搗研為末塗敷息肉上日三五度即瘥治瘻瘡腫地鱉散方乾地鱉末麝香各研少許上二味研勻乾摻或貼隨乾溼治之治一切冷瘻蛔蟲散敷方人吐出蛔蟲上一味燒灰細研為末先以甘草湯洗瘻後取末敷瘡上日三五度即瘥治鼠瘻黃耆散方黃耆銼白礬燒灰附子炮裂去臍各半兩當歸切焙防風去叉栝蔞根芎藭黃芩去黑心貍骨酒炙甘草炙各二兩大黃銼炒乾薑炮細辛去苗葉露蜂房炙各一兩斑蝥芫青二味並去翅足糯米炒各五枚上十六味搗羅為散每服一錢匕空心溫酒調下日再服治鼠瘻瘰癧寒熱貍骨散方貍骨酒炙一兩一分躑躅炒龍骨王不留行當歸切焙王瓜根鼠姑各半兩上七味搗羅為散每服二錢匕食後溫酒調下日晚再服治鼠瘻發起無頭尾如鼷鼠使人寒熱脫皮此得之大鼠毒不去其根在胃鯪鯉甲散方鯪鯉甲炙焦龜甲醋炙甘草炙桂去粗皮雄黃研乾薑炮貍骨酒炙各半兩上七味搗研為散每服二錢匕溫酒調下日晚再服又法以蜜為丸納瘡中日一度易之治鼠瘻犀角散方犀角鎊一兩半斑蝥去足翅糯米炒十四枚雄黃研桂去粗皮各一兩上四味搗研為散每服半錢匕溫酒調下空心日晚服治鼠瘻外正膏方死貓兒骨酒和醋炙一片三寸長皂莢去皮子醋炙一梃木鱉子去殼生用二七枚重粉半錢匕研上四味搗研為末每用三錢匕用米醋熬成膏敷之如一兩日未效即用溫酒調下二錢匕服畢衣被蓋出汗即瘥治鼠瘻仙人杖散方筍黑死者取一兩燒灰存性甘草炙為末三分麝香別研半分上三味一處研細分作六服每服臨臥時溫酒調下治鼠瘻方蜣螂燒存性細研上一味用醋調如糊先以鹽湯洗瘡塗敷日再易治諸瘻涓涓出膿血疼痛日夜不止漸加羸瘦宜服此方赤小豆白蘞牡蠣燒赤細研黃耆各等分上四味搗羅為散每服三錢匕酒一盞半煎至一盞去滓不計時候治諸瘻膿血不止方新生兒屎不以多少上一味取置密器中五六日取塗瘡孔中不四五上瘥治諸瘻下血不止肌體黃瘦四肢無力宜用雞子方雞子三顆上一味以米下蒸半日取出用黃炒令黑色先拭瘡汁令乾以藥納瘡孔中即瘥治蟻瘻鯷𩼓塗敷方鯷𩼓燒灰上一味研細以醋調如糊塗敷瘡上日三五度即瘥又方蟻蛄上一味以酒研細塗敷瘡上日三五度即瘥治蚍蜉瘻始發在項如患傷寒此因吃食中有蚍蜉其根在腎礬石散方白礬燒令汁枯半兩李白皮桃白皮獨活去蘆頭知母焙生乾地黃雌黃研各一分蝟皮炙焦白朮各三分蜀椒去目併合口炒出汗一百枚青黛研斑蝥去足翅糯米炒白芷柏枝芍藥海苔當歸焙各一分上十七味搗研為散每服一錢匕空心溫水調下日三治五瘻下血疼痛裡急不可忍蝟皮丸方蝟皮二兩炙令焦黃槐子仁二兩微炒龍骨二兩檞葉一兩微炙乾薑半兩炮裂銼熟乾地黃一兩當歸一兩銼微炒茜根三分銼附子一兩炮裂去皮臍芎藭半兩檳榔一兩黃耆一兩銼吳茱萸半兩湯浸七遍焙乾微炒上十三味搗羅為末煉蜜和搗五七百杵丸如梧桐子大食前以粥飲下三十丸至四十丸日三治五瘻出血疼痛久不瘥硫黃散方硫黃一兩蛇黃一兩金星者火燒令赤碎白礬研一兩鰻鱺魚頭一枚鯽魚大者一枚開肚取卻腸入四味藥安腹中以散麻皮纏縛泔泥裹之候乾入炭火上燒令煙盡取出去泥上五味細研如粉每服三錢匕食前以粥飲調下日三空青散方空青研當歸切焙各半兩細辛去苗葉干蝟肉一方用皮炙令焦枸杞根去黑皮斑蝥去足翅糯米炒白朮地膽去足翅糯米炒白礬燒令汁盡各一分干烏腦脂三大豆許上十味搗研為散每服一錢匕空心用漿水調下日晚再服病在項則舒臥令頭處低足後高使藥易行速效治蚯蚓瘻鴨脂膏方鴨脂三兩胡粉二兩巴豆去殼細研去油盡半兩上三味先熔脂入二味末調如膏每日三五度塗瘡上即瘥又方胡粉不限多少上一味用豬脂和調塗摩瘡上日再塗即瘥治蛇瘻蛇蛻膏方蛇蛻一條燒灰上一味細研用豬脂調塗日三上即瘥治浮疽瘻始發於頸如兩指使人寒熱欲臥得病之由因思慮憂怒其根在膽石中黃子散方石中黃子乾薑炮續斷決明子甘草炙地膽去頭足翅炒一分龍膽菴䕡根各半兩大黃半分細辛去苗葉半兩上十味搗羅為散敷瘡上日四五度即瘥治瘻瘡十餘年不瘥神助散敷方檳榔黃連去須上二味搗羅為末先用活鱔魚一條擲於地候鱔困盤屈以竹針五七枚貫之復瘡良久取視當有白蟲數十如針著鱔上取去複復之如此五六度即已用藥量多少復之
