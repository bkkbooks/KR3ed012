body:
  text: 卷第八十七冷勞論曰冷勞者由脾胃久積風冷之氣不能灌溉四旁潤養身體致腑臟俱虛陰陽衰弱其狀食不化心腹痞滿嘔吐吞酸面色萎黃甚者心腹常痛大腸泄痢手足逆冷骨節痠痛日漸羸瘠是也治冷勞嘔噦不能下食心腹脹滿面色萎黃蓽茇丸方蓽茇乾薑炮裂白茯苓去黑皮胡椒炒桂去粗皮各一兩檳榔二兩煨銼人參一兩一分訶黎勒煨去核一兩半上八味搗羅為末煉蜜為丸如梧桐子大每服空腹清粥飲下十丸甚者加至二十丸治冷勞臟腑虛弱心腹脹滿四肢羸瘦困乏無力不思飲食桂心散方桂去粗皮五兩柴胡去苗六兩青橘皮去白焙一兩桃仁湯浸去皮尖雙仁炒五兩紫葛去心微炙山茱萸益智去皮知母銼焙芎藭當歸炙銼五味子各三兩獖豬肚一具切焙上一十二味搗羅為散每服三錢匕空心用陳米飲調下治冷勞便利不調腹脹嘔逆羸困少力木香丸方木香肉豆蔻去殼陳橘皮湯浸去白焙乾薑炮裂附子炮裂去皮臍郁李仁去皮尖炒別研麥門冬去心焙各一兩熟艾炒鱉甲醋浸炙去裙襴陳曲炒柴胡去苗各二兩厚朴去粗皮塗生薑汁炙三兩鍾乳煉成粉者桂去粗皮各半兩上一十四味搗羅十三味為末入郁李仁相和研勻用豬肝一具去脂膜細切以頭醋三升同熬令醋盡爛研入藥末相和為丸如梧桐子大每服空心溫酒下二十丸米飲下亦得治冷勞腹痛下痢面色萎黃四肢無力煮肝丸方雄豬肝一具用米醋三升煮醋盡為度白礬燒研柴胡去苗各二兩厚朴去粗皮塗生薑汁炙透乾薑炮裂黃連去須陳橘皮去白焙各一兩桂去粗皮附子炮裂去皮臍各半兩上九味搗羅八味為末以醋煮豬肝極爛入白麵五匙相和煎三五沸入諸藥末一處於鐵臼內搗三二千下丸如緑豆大焙乾每服空心溫酒下七丸晚食後再服如不飲酒生薑鹽湯下重者不過三劑治冷勞補五臟通氣脈和脾胃止泄痢燒肝散方山茵陳石槲去根當歸切焙各一兩半木香桂去粗皮人參紫菀去苗土桔梗炒赤芍藥乾薑炮裂防風去叉白蕪荑犀角鎊吳茱萸湯洗焙乾炒各一兩白朮一兩一分上一十五味搗羅為散每用豬肝一具細切入藥末十五錢匕蔥白五莖細切入鹽三錢匕與肝拌和令勻分作三服每服用荷葉包更以濕紙三五重裹慢火燒肝令熟空心食前吃用米飲下如患冷勞面色萎黃不過吃十服愈治冷勞大便滑泄食飲不美有盜汗白朮散方白朮一兩白芷鱉甲去裙襴醋炙令焦蒼朮米泔浸一宿銼焙防風去叉厚朴去粗皮生薑汁炙銼桂去粗皮人參陳橘皮去白焙乾薑炮高良薑炮各半兩吳茱萸湯洗三遍焙乾柴胡去苗蜀椒去合口並目炒出汗芎藭白茯苓去黑皮白蕪荑縮砂去皮各一兩附子二枚炮裂去皮臍沉香銼丁香當歸炙銼木香各一分上二十三味搗羅為散每服五錢匕用豬肝三兩批開入蔥白鹽各少許滲藥在內濕紙裹慢火煨香熟為度空心食前米飲嚼下治冷勞大便不禁羸瘦困乏炙肝散方山芋柴胡去苗縮砂去皮高良薑炮陳橘皮去白焙桂去粗皮白芷各一兩木香一分吳茱萸湯洗焙赤芍藥洗焙厚朴去粗皮用生薑汁炙桔梗銼炒乾薑炮裂補骨脂炒青橘皮去白焙草豆蔻去皮各半兩上一十六味搗羅為散每服用豬肝四兩薄批片子滲藥五錢匕入蔥鹽各少許濕紙裹慢火內煨令香熟去紙細嚼米飲下治冷勞肌瘦盜汗少力時發寒熱不思飲食附子湯方附子炮裂去臍皮柴胡去苗各一兩秦艽去苗土一兩半上三味銼如麻豆每服二錢匕用豬𦚠子一兩切令細酒半盞水三分薤白三寸同煎令豬𦚠熟去滓溫服每日五更初服之治冷勞泄痢及婦人産後帶下諸疾漏蘆丸方漏蘆去蘆頭一兩艾葉去梗炒四兩上二味搗羅為末用米醋三升入藥末一半先熬成膏後入余藥和丸如梧桐子大每服三十丸溫米飲下食前服治冷勞羸瘦手足攣急目暗耳聾腹脹泄利不能納食食物無味面黃力弱積年腸風痔疾癖積氣塊一切勞病婦人血瘕赤白帶下子宮宿冷五種膈氣橘皮煎丸方陳橘皮湯浸去白焙一斤桂去粗皮乾薑炮當歸銼炒四味別搗羅附子炮裂去皮臍京三稜炮銼萆薢三味別搗羅陳曲炒各六兩烏頭炮水煮三五沸去皮臍焙木香蜀椒去目及閉口炒出汗各一兩大麥糵四兩厚朴去粗皮生薑汁炙六味別搗為末上一十三味用無灰酒四升於銀石器內先煎上四味如人行十里更下次三味如人行十里次入下六味又添酒兩碗煎成膏取出杵一千下丸如梧桐子大每服空心日午茶酒任下二十丸至三十丸治男子婦人一切冷熱勞疾寒熱時作豬肝丸方豬肝一具去皮膜切以童子小便二升煮爛柴胡去苗秦艽去苗土黃連去須炒木香蕪荑炒蜀椒去目並閉口者炒出汗青蒿當歸切焙各一兩上九味除肝外搗羅為末將豬肝於砂盆內細研入諸藥末以余小便和搗為丸如梧桐子大每服空心酒下三十丸加至四十丸治男子婦人冷勞身體羸瘦虎杖飲方虎杖柴胡去苗五味子炒熟乾地黃焙白茯苓去黑皮陳橘皮去白焙麥門冬去心焙黃芩去黑心甘草炙銼各一兩半人參一兩桂去粗皮黃耆銼芍藥當歸切焙各二兩上一十四味粗搗篩每服五錢匕水一盞半入生薑七片棗三枚劈同煎至八分去滓溫服不拘時熱勞論曰熱勞之證心神煩躁面赤頭疼眼澀唇焦身體壯熱煩渴不止口舌生瘡食飲無味肢節痠疼多臥少起或時盜汗日漸羸瘦者是也治熱勞頭痛四肢煩疼渾身壯熱夜多虛汗燥渴昏悶眼澀無力犀角湯方犀角鎊胡黃連各半兩柴胡去苗人參赤茯苓去黑皮羌活去蘆頭桔梗炒芎藭前胡去蘆頭白芷鱉甲去裙襴醋炙熟甘草炙各一兩上一十二味粗搗篩每服三錢匕水一盞半生薑竹葉各少許煎至八分去滓食後溫服大段躁熱頻服如是風氣發動入生薑荊芥煎溫服此藥治骨熱勞氣大驗治熱勞羸瘦盜汗壯熱煩渴鱉甲丸方鱉甲去裙襴童子小便炙黃為末柴胡去苗為末秦艽去土為末各二兩生薄荷汁生青蒿汁生地黃汁生薑汁各取自然汁一小盞子銀器內熬成煎上七味將前三味搗羅為細末入後四味煎中拌和再搗勻可丸即丸梧桐子大或干更入熟蜜少許每服二十丸食後溫熟水下日三治熱勞肢節痠疼吸吸少氣腰背強痛心中虛悸咽乾唇赤面色枯燥飲食無味悲憂慘戚多睡少起黃耆湯方黃耆銼焙地骨皮各一兩鱉甲一枚去裙襴塗醋炙黃甘草半兩炙銼麥門冬去心焙一兩半桂去粗皮半兩上六味粗搗篩每服五錢匕水一盞半生薑半分拍破粳米五十粒煎至八分去滓食前溫服治熱勞潮躁盜汗羸瘦減食柴胡湯方柴胡去苗白朮牡蠣燒令透各二兩桑根白皮炙黃知母銼焙水通銼甘草炙各半兩鱉甲去裙襴醋炙黃一兩半上八味粗搗篩每服三錢匕水一盞生薑半分拍碎竹葉三片煎至六分去滓空心溫服夜臥再服治熱勞及女子虛勞身體乾瘦不下飲食咳唾稠黏背膊疼痛手足並心背煩熱兼渴鱉甲湯方鱉甲去裙襴醋浸炙令黃生乾地黃焙天靈蓋塗酥炙黃紫菀去苗土貝母去心麥門冬去心焙杏仁湯浸去皮尖雙仁生研各一兩上七味將前六味粗搗篩入杏仁和勻每五錢匕用童子小便一盞半竹葉五片煎至一盞去滓分溫二服空心食後各一服治熱勞肌熱煩躁面紅頰赤人參湯方人參一兩地骨皮半兩青蒿二錢山梔子去皮半兩甘草炙一兩上五味粗搗篩每服三錢匕水一盞小麥少許煎至六分去滓不拘時候溫服治熱勞心神煩躁羸瘦發渴犀角散方犀角鎊方黃連各半兩遠志去心人參各一兩石葦去毛半兩酸棗仁一兩杏仁湯浸去皮尖雙仁麩炒半兩研秦艽一兩上八味搗研極細每服二錢匕煎蓮子心湯調下不拘時服治熱勞氣飲食漸少潮熱頻發咳嗽不止日加羸瘦盜汗心忪人參常山湯方人參常山乾漆炒令煙盡大黃銼炒黃耆銼焙石膏研飛過鱉甲去裙襴醋炙黃生乾地黃焙地骨皮各半兩柴胡去苗白茯苓去黑皮甘草炙各一兩上一十二味粗搗篩每服三錢匕水一大盞青蒿少許同煎至七分去滓溫服不拘時候治熱勞心忪肌熱夜有盜汗面黃肌瘦飲食減少骨節痠痛黃芩湯方黃芩去黑心柴胡去苗地骨皮人參乾漆炒令煙出鱉甲去裙襴醋炙黃甘草炙半夏湯洗七遍同生姜搗作餅子曝乾葛根銼干青蒿白茯苓去黑皮各半兩麥門冬去心焙一分上一十二味粗搗篩每服五錢匕先用水二盞小麥烏梅生薑各少許煎五七沸去小麥等入藥末煎至一盞去滓不計時候溫服治熱勞寧心志止咳嗽除肌熱柴胡丸方柴胡去苗紫菀去土各一兩白茯苓去黑皮雄黃研人參黃芩去黑心各一分牛膝生丹砂研馬兜鈴各半兩上九味搗研為末酒煮麵糊為丸如彈子大每服一丸燒綿灰溫酒化下不拘時服日三治熱勞心神不寧肌瘦煩渴葛根散方葛根銼黃芩去黑心各三分甘草炙柴胡去苗黃連去須牛黃研各半兩上六味搗研為散每服二錢匕新汲水半盞調下日二治熱勞肌瘦盜汗潮熱咳嗽大腹皮湯方大腹皮銼炒三分柴胡去苗二兩白茯苓去黑皮桂去粗皮半夏湯浸去滑生薑汁同炒乾青蒿童子小便浸一日曝乾白朮桔梗炒黃芩去黑心山梔子去皮各一兩上一十味粗搗篩每服五錢匕水一盞童子小便半盞煎至一盞去滓溫服如婦人服加虎杖當歸各少許治熱勞地骨皮散方地骨皮二兩柴胡去苗一兩上二味搗羅為散每服二錢匕用麥門冬去心煎湯調下不計時候治暴成熱勞心膈煩滿骨節壯熱唇乾煩渴小便赤色頭痛痰嗽並熱毒風攻擊等犀角湯方犀角鎊防風去叉柴胡去苗知母桔梗人參黃芩去黑心木通銼半夏湯洗七遍去滑焙玄參石膏各一兩麥門冬去心焙旋覆花各一兩半上一十三味粗搗篩每服五錢匕水一盞半入生薑五片同煎至七分去滓溫服不拘時治勞熱骨節煩疼心膈躁悶胡黃連丸方胡黃連犀角鎊鱉甲醋炙去裙襴訶黎勒皮半生半熟各一兩桔梗銼炒升麻銼地骨皮知母焙黃芩去黑心各一兩一分甘草炙銼白茯苓去黑皮人參各三分栝蔞一枚大者柴胡去苗一兩半上一十四味搗羅為末用豬膽二十枚取汁及蜜四兩攪和勻慢火煎成膏搜和丸如梧桐子大食後以烏梅煎童子小便下二十丸如腹痛用糯米飲下治一切熱勞咳嗽茯苓丸方白茯苓去黑皮地骨皮鐵精亦名輕鐵六兩天靈蓋盡童子小便二升煮各三兩上四味搗羅為末飯為丸如梧桐子大每食後煎湯下三十丸日二服治熱勞心神煩躁肢體痠疼不能飲食人參湯方人參赤芍藥栝蔞根白薇枳實去瓤麩炒知母焙茯神去木酸棗仁炒甘草炙銼生乾地黃焙各一兩上一十味粗搗篩每服三錢匕水一盞煎至七分去滓食後服治熱勞煩躁面赤口乾骨節痠痛夜多盜汗咳嗽痰壅力乏氣促蛤蚧丸方蛤蚧酥炙一對胡黃連知母切焙鱉甲去裙襴醋炙紫菀桑根白皮銼麥門冬去心焙人參黃耆銼甘草炙柴胡去苗地骨皮生乾地黃焙各半兩杏仁湯浸去皮尖雙仁炒細辛去苗葉各一分上一十五味搗羅為末煉蜜和丸如梧桐子大每服二十丸生薑湯下食後臥時服治熱勞身體壯熱咳嗽痰喘面赤頭痛肢節痠疼煩躁口乾盜汗瘦弱柴胡飲方柴胡去苗二兩桑根白皮防風去叉芍藥玄參黃芩去黑心甘草炙各一兩上七味銼如麻豆大每半兩水二盞入生薑半分切煎至一盞去滓溫分兩服如咳嗽咯血者每服入杏仁七枚湯去皮尖打碎同煎服之治五臟熱勞邪癖毒氣分氣散方旋覆花麻黃去根節款冬花甘草炙銼陳橘皮湯浸去白焙白朮前胡去蘆頭丹參桔梗銼炒大棗去核焙防葵黃耆銼五味子枳殼去瓤麩炒貝母去心桃仁去皮尖雙仁炒黃葳蕤葛根銼各一兩上一十八味搗羅為散每服