焙木通銼炒獨活去蘆頭各一兩人參半兩赤茯苓去黑皮一兩上九味搗羅為細散每服三錢匕空腹溫酒調下日三治風勞瘦疾七種冷氣六極等疾脾胃虛寒不思飲食疳痢休息或大小便澀兼纍年口瘡醫治不瘥者茵陳散方茵陳蒿犀角屑石槲去根紫參人參白朮柴胡去苗各三分桂去粗皮芍藥防風去叉各半兩吳茱萸湯洗焙乾炒一兩桔梗炒半兩白蕪荑仁炒一分上一十三味搗羅為散白羊肝一具細切分為三服淨去筋膜每服入藥末五錢匕蔥白五寸細切一處拌和用濕紙裹慢火煨熟空腹頓服治風勞面色青白肢節沉重膂間痛或寒或熱或躁或嗔每思食味食又不能被蟲侵蝕證狀多端三木節散方樟木瘤節皂莢木瘤節槐木瘤節三味銼搗羅為末各五兩天靈蓋塗酥炙搗末一兩牛黃研半兩人中白焙乾研一兩麝香二錢四味各研搗為末合和令勻上七味每服先將前三味末三錢匕以水一盞煎至半盞去滓調天靈蓋等末一錢匕五更頓服治風熱勞氣天仙藤湯方天仙藤二兩秦艽去苗土鱉甲去裙襴醋炙柴胡去苗麻黃去節芍藥甘草炙銼防風去叉前胡去蘆頭各一兩上九味粗搗篩每服三錢匕水一盞入烏梅一枚生薑二片同煎至七分去滓溫服如解傷寒不用烏梅入蔥白二寸煎熱服治風勞虛熱攻頭項急言語錯亂心膈煩悶四肢拘急手足痠痛排風酒方防風去叉升麻桂去粗皮獨活去蘆頭天雄炮裂去皮臍羌活去蘆頭各一兩仙人放杖草並根一斤上七味銼如麻豆大以醇酒三升浸五日後旋飲一盞日再服治風勞虛熱攻頭項急言語錯亂心膈煩悶四肢拘急手足痠痛排風飲方防風去叉當歸焙白朮白蘚皮芍藥桂去粗皮芎藭獨活去蘆頭麻黃去根節杏仁去皮尖雙仁炒黃甘草炙銼茯神去木各一兩上一十二味粗搗篩每服五錢匕以水一盞半生薑三片煎取八分去滓食後溫服
