body:
  text: 卷第一百八十二小兒諸丹論曰風熱發丹古方謂小兒得之最忌以其氣血未定肌膚柔脆無以勝悍毒故也是以諸丹不同其發無定處俗又謂之溜流走經絡散發肌表如塗丹之赤有法可劆泄去毒氣不爾則丹毒入腹近心即死但初發於心頭者不可劆爾治小兒丹毒赤腫壯熱百治不瘥者藍青湯方干藍青二兩凝水石碎石膏研山梔子仁各一兩半柴胡去苗犀角鎊黃芩去黑心杏仁湯浸去皮尖雙仁炒甘草炙銼赤芍藥羚羊角鎊葛根銼各半兩知母一兩上一十三味粗搗篩每一錢匕水半盞煎至四分下蜜半錢竹瀝少許再煎至三分去滓空心日晚分溫二服更量大小加減治小兒丹毒遍身黃芩湯方黃芩去黑心麻黃去根節秦艽去苗土升麻各一分大黃銼炒防風去叉各半兩上六味粗搗篩每服一錢匕水七分煎至四分下朴硝末半錢匕去滓空心分溫二服晚再服更量兒大小加減治小兒丹毒黃耆湯方黃耆銼蒺藜子炒去角黃芩去黑心大黃銼焙甘草炙銼各一分上五味粗搗篩每服一錢匕水七分煎至四分下朴硝末半錢匕去滓食前分溫二服更量兒大小加減治小兒丹若入腹及下部陰卵百藥不瘥麻黃散方麻黃去根節升麻各半兩硝石研一兩上三味搗羅為散每服半錢匕井花水調下空心日晚各一治丹入腹澤蘭湯方澤蘭芎藭附子炮裂去皮臍莽草藁本去苗土細辛去苗葉茵芋等分上七味銼如麻豆每服一錢匕水七分煎至四分去滓分溫二服空心日晚各一治小兒丹毒防入腹甘草散方甘草炙銼一分為末油麻半升上二味先取油麻去皮研細絞取汁一合調甘草末半錢匕服日再治小兒丹毒青藍汁方青藍汁一合竹瀝二合上二味和勻空心溫服一合日晚再服以瘥為度治小兒丹數十種大黃拓湯方大黃甘草炙銼當歸切焙芎藭白芷獨活去蘆頭黃芩去黑心芍藥升麻沉香銼木香木蘭皮各半兩芒硝三兩上一十三味粗搗篩拌勻每用二兩以水六升煎至四升去滓以綿二片蘸之更互溫拓丹上冷即易日五七度即瘥治小兒發丹毒熱痛吳藍湯拓方吳藍大黃槐白皮商陸榆皮各二兩上五味細銼每用三兩以水五升煎至四升去滓入朴硝半兩攪勻以綿二片浸於湯中更互拓丹上日三五度即瘥治小兒發丹苧麻根湯洗方苧麻根銼三兩小豆二合上二味都用水七升煎至四升去滓溫洗丹上冷即再暖日三五度即瘥治丹毒遍身絳色鯽魚塗方生鯽魚一頭三兩麻油二兩上二味搗魚令細入油研勻塗丹上日三五度即瘥治丹走行皮中浸廣者名丹火也入腹殺人蠐螬散塗方干蠐螬上一味碾末油調塗之以瘥為度治小兒野灶丹從膝起薺葉塗方干薺葉末香薷末赤小豆末各半兩生蒴藋葉莖一握細銼上四味細研蒴藋入諸藥末和調如糊塗丹干即易之以瘥為度治小兒胡吹灶丹從陰下起泥醋塗方上用磨刀水掤下泥和醋調膏塗之干即更塗以瘥為度治小兒胡漏灶丹從臍中起伏龍肝塗方伏龍肝上一味用屋漏水去清取澱和調如糊塗之干即再塗以瘥為度治小兒神氣丹從項起犬骨灰塗方犬枯骨上一味為末以青羊脂調如糊塗之日三五次治小兒飛灶丹從項起鐵槽水洗方上取淬鐵槽中水日洗三五度治小兒家火丹發如大指日長一寸遍著兩脅傍兩頰上梓木灰塗方梓木白皮蓼葉各一分上二味燒灰研末以雞子白調如糊塗之以瘥為度治小兒煙火丹從身起豬槽泥塗方豬槽下泥一合生麻油一兩上二味和調如糊塗之以瘥為度治小兒煙火丹從背上起或走兩臂足赤如火真珠塗方真珠細研如粉一兩慎火草研絞汁景天是也上二味和調如糊塗之以瘥為度治小兒神灶丹起兩額傍不出一日變為赤黑色慎火草汁塗方慎火草上一味絞取汁先以刀子微劆丹上令血出塗藥以瘥為度治小兒天灶火丹發尻間正赤流陰頭赤腫血出蔥薺苨塗方蔥五莖和須切研薺苨五莖生者和梗切研赤小豆末灶門上灰研各一合上四味合研勻細以青羊脂三兩調勻塗之以瘥為度治小兒地灶丹從陰下起入踝骨上廢磚塗方廢灶磚末屋四角茅燒灰令一兩上二味和研勻細以新汲水調如糊塗丹干即易治小兒私灶丹從背上起灶土塗方灶中黃土研上一味取打鐵磨刀槽中水和調如糊塗丹干即易以瘥為度治小兒廢灶丹從兩腳赤及從臂曲上起五加灰塗方五加葉根燒灰上一味研為細末取打鐵磨刀槽中水調如糊塗丹干即易之以瘥為度治小兒鬼火丹發兩臂赤起如李子及從面上起戎鹽塗敷方戎鹽一分附子一枚上二味燒過研細用雄雞血調塗丹上日五遍以瘥為度治小兒野火丹發遍身斑如梅李狀雌黃塗方雌黃研戎鹽研各一兩上二味以雞子白調塗丹上日三五次以瘥為度治小兒茱萸丹初從背起遍身如細纈一宿成瘡者雞子塗方雞子白赤小豆末上二味和調如糊塗之以瘥為度一方云治水丹治小兒螢火丹發灼灼在脅下正赤色而長初從額起而多痛伏龍肝塗方伏龍肝研細五合生麻油上二味和研如糊塗敷干即易之以瘥為度治兒小兒五色丹蒴藋塗方蒴藋葉上一味爛搗塗敷丹上干即易之以瘥為度治小兒白丹豬通灰塗方豬屎灰雞子白上二味調和如糊塗之以瘥為度治小兒火丹走皮中發赤如火燒狀須臾熛漿起醋豉塗方豉上一味研細入醋調塗丹上以瘥為度又芭蕉塗方芭蕉葉根上一味取搗汁塗之以瘥為度治小兒火丹熱如火繞腰須急救之蕓薹塗方蕓薹葉上一味爛搗和汁塗敷之以瘥為度又治火丹針挑方上於兒男左女右大拇指面螺紋上針挑有筋斷之即瘥治小兒伊火丹從兩脅下起青黑色羊脂塗方煅鐵下槽中鐵屎搗研為末半兩羊脂二兩豬糞燒灰一兩上三味研勻如糊塗之以瘥為度治小兒骨火丹初在臂起赤黑色二蒜塗方大蒜小蒜各一兩上二味爛搗厚塗敷之以瘥為度治小兒尿灶火丹發膝下從兩股起及臍間走入陰頭桑木根洗方桑木根五兩上一味細銼以水五升煎至三升去滓溫洗日五七度即瘥治小兒尿灶丹從踝及搊起茅灰塗方茅草屋四角者取燒灰研雞子白上二味和調如糊塗之以瘥為度治小兒朱田火丹先發背遍身一日一夜而成瘡棘根湯洗方棘根銼碎半斤上一味以水五升煎至三升去滓溫洗丹上三五度即瘥治小兒赤丹色純赤為熱毒搏於氣血馬齒莧汁方馬齒莧上一味爛搗絞取汁三合空心溫服一合午晚再服即瘥治小兒丹毒赤腫壯熱百醫不瘥者藍青煎方藍青切竹瀝各一升生葛根汁澄清四合蜜二升寒水石研四兩石膏研三兩山梔子仁二兩一分知母焙二兩半柴胡去苗犀角鎊黃芩去黑心杏仁去皮尖雙仁炒赤芍藥羚羊角灰研甘草炙銼各一兩一分上一十五味除研藥並汁外㕮咀以水五升並竹瀝先煎去滓取三升次納杏仁葛汁及蜜微火煎成煎每服半合至一合米飲化下日三治小兒月內發丹升麻黃芩湯方升麻黃芩去黑心犀角鎊大黃銼炒柴胡去苗山梔子仁各半兩藍葉切二合石膏三分甘草炙銼一分上九味粗搗篩每服二錢匕水一盞煎至半盞去滓食後分溫二服更量大小加減小兒遊腫赤痛論曰小兒遊腫由風熱客於經絡隨氣行移流走肌膚致赤腫疼痛治法當內服藥以滌其蘊熱外敷劑以散其焮痛則遊腫自消治小兒風熱遊腫色赤犀角飲方犀角鎊黃芩去黑心升麻山梔子仁黃耆銼牛黃研防己各一分朴硝三分上八味除牛黃外粗搗篩每服二錢匕以水一盞煎取六分去滓下牛黃一大豆許分作二服早晨日晚各一隨兒大小以意加減治小兒遊腫豬脂膏方豬脂煉過四合附子生去皮臍蜀椒生去目閉口者各一分食鹽研三分上四味搗研三味為末入脂內熬過候冷塗之以瘥為度治小兒頭及體赤遊毒腫痛升麻膏方升麻二兩犀角鎊射干黃芩去黑心梔子仁玄參各一兩一分芍藥大黃藍實羚羊角鎊各一兩大青半兩生乾地黃二兩三分上一十二味細銼以豬脂二斤半入鐺中於慢火上熬不住手攪煎成膏去滓瓷器中盛取摩腫處瘥不拘多少治小兒風熱赤遊腫栝蔞散方栝蔞銼上一味搗羅為散以釅醋和塗之治小兒赤遊腫行流於體若不急治入腹即死白豆散塗方上取白豆末水和塗之勿令乾瘥治小兒赤遊腫漸漸長引不止塗敷方牛膝銼甘草銼各二兩上二味搗羅為散每用二錢匕以水一盞煎至六分去滓調灶下黃土和塗之干即易治小兒風熱赤遊腫方上以麥面末水和塗之又方上取伏龍肝和雞子白塗之干即易小兒癰瘡論曰經謂六腑不和則留結為癰蓋小兒營衛痞澀不得通利逆於肉理致肌肉腫結皮薄而澤是癰之狀也癰既不得內消則膿潰穿穴而成瘡故謂癰瘡也治小兒癰腫成瘡犀角湯方犀角屑葳蕤升麻甘草麥門冬去心焙赤芍藥薺苨玄參各半兩上八味粗搗篩每服一錢匕水半盞煎至四分更入硝石末一字匕再煎熔去滓溫服量兒大小加減治小兒癰瘡臟腑壅熱心神煩躁大小便不利大黃湯方大黃銼炒升麻梔子仁朴硝別研枳殼去瓤麩炒黃耆銼各半兩上六味粗搗篩每服一錢匕水七分煎四分去滓溫服量兒大小加減治小兒癰瘡煩熱疼痛黃芩湯方黃芩去黑心梔子仁玄參升麻大黃銼炒黃耆銼連翹藍葉甘草木香川芎犀角屑各半兩上一十二味粗搗篩每服一錢匕水半盞煎三分去滓溫服量兒大小加減治小兒癰瘡腫痛益母草飲方生益母草不拘多少洗銼上一味搗取汁每取三二分服之更量大小加減以滓敷癰上干則易治小兒一切癰腫毒諸風熱神驗黃柏散方黃柏去粗皮蜜炙鬱金各一兩陳橘皮湯浸去白炒人參葛根銼各半兩上五味搗羅為散用溫水調下半錢匕量兒大小加減日三兩服治小兒癰瘡腫痛方上取豬腦塗紙上貼之干即易日數遍又方上用芥子爛研水和塗紙上貼之又方上用馬齒莧搗敷之又方上以地龍糞新汲水調塗之又方上用姜石末和蒜搗封上又方上用馬鞭草搗敷之即消又方上以蕓薹菜搗塗之治小兒癰有膿令潰方上取雞羽毛七根燒末服之即潰又方上用人乳和麵封上至晚膿血出盡小兒疽瘡論曰小兒因五臟不和寒邪壅滯營衛閉塞逆於膚肉遂生疽腫其狀腫結皮強上如牛領然疼焮堅硬深附筋骨既得膿後其疽可愈更須用排膿換肌之藥若餘毒未去封斂稍疾則源流復至或癢或痛肌汁不斷瘡竅不得合矣治小兒熱毒癰疽赤白諸丹毒熱瘡癤漏蘆湯方漏蘆去蘆頭連翹白蘞銼芒硝甘草炙銼升麻麻黃去根節湯煮掠去沫黃芩去黑心枳實麩炒黃各一分大黃銼炒一兩上一十味粗搗篩每服二錢匕水一盞煎至五分去滓分溫二服量大小加減治小兒熱毒腫色白或惡核瘰癧附骨癰疽節解不舉白丹走遍身中疹瘙五香連翹湯方木香薰陸香沉香銼雞舌香黃芩去黑心麻黃去根節湯煮掠去沫麝香研各一分連翹海藻洗去咸焙射干升麻枳實去瓤麩炒各半兩大黃銼炒二兩上一十三味粗搗篩每服二錢匕水七分煎至四分去滓入竹瀝一合更煎一兩沸分溫二服量大小加減治小兒癰疽瘡癤腫毒黃耆湯方黃耆銼連翹升麻惡實炒各半兩玄參丹參露蜂房炙枳殼去瓤麩炒甘草炙各一分上九味粗搗篩每服一錢匕水七分煎至四分去滓食後臨臥溫服量大小加減治小兒疽瘡藍葉湯方吳藍葉犀角鎊升麻黃耆銼山梔子仁連翹甘草炙各半兩黃芩去黑心大青玄參各一分大黃銼炒三分上一十一味粗搗篩每服一錢匕水七分煎至四分去滓食後臨臥溫服量兒大小加減治小兒疽瘡木通湯方木通銼升麻赤芍藥黃芩去黑心山梔子仁麥門冬去心焙各二分犀角鎊大黃銼炒各一兩枳殼去瓤炒半兩上九味粗搗篩每服