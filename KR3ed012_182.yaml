論曰小兒陰核氣結腫大者㿗疝也由稟受之初肝經虛弱因啼怒躽氣氣脈下墜擊於陰器則筋脈緩縱結聚不散是為㿗疝也若氣偏虛則其腫亦偏蓋足厥陰肝之經環陰器抵少腹是動則為㿗疝少腹痛之疾治小兒氣㿗土瓜根湯方土瓜根當歸切焙芍藥各半兩上三味粗搗篩一二歲兒每服一錢匕水半盞煎至三分去滓分溫二服空心日晚再服量兒大小加減治小兒㿗疝薏苡仁散方薏苡仁芍藥土瓜根蛇床子微炒黃芩去黑心桔梗炒蛇含各三分上七味搗羅為散一二歲兒每服半錢匕空心溫酒調下日午晚後再服量大小加減治小兒陰㿗狐陰丸方狐陰一具炙黃蜚生蟲十四枚微炙桂去粗皮附子炮裂去皮臍乾薑炮蒺藜子炒去角細辛去苗各三分桃仁湯浸去皮尖雙仁炒別研卷柏各一兩半上九味搗研為末煉蜜和丸如麻子大一二歲兒米飲下五丸空心日晚各一服量大小加減治小兒陰㿗氣疝發作有時芍藥丸方芍藥大黃銼炒各半兩赤茯苓去黑皮半夏湯洗去滑焙桂去粗皮蜀椒去目及閉口炒出汗各三分上六味搗羅為末煉蜜和丸如緑豆大三四歲兒食前米飲下五丸日三服量兒大小加減治小兒陰疝偏腫牡丹丸方牡丹皮豉炒防風去叉黃柏去粗皮微炙滑石別研桂去粗皮各一分上六味搗羅為末煉蜜和丸如麻子大一二歲兒每服五丸米飲下早晨日晚各一服量兒大小加減治小兒陰㿗韭子丸方韭子炒三兩半附子炮裂去皮臍三分狐陰一具炙黃上三味搗羅為末煉蜜和丸如麻子大一二歲兒每服五丸米飲下早晨夜臥各一服量兒大小加減治小兒陰㿗腫硬桂心散方桂心半兩地膚子一兩白朮一兩上三味搗羅為細末三歲兒每服以溫酒調下半錢匕日三服量兒大小以意加減治小兒㿗疝攻注連腎外囊腫脹或疼痛偏墜昆布丸方昆布三分洗去鹹味蘹香子半兩微炒木香甘草炙微赤銼黃柏銼丁香爛牡蠣生用銅青以上各一分上八味搗羅為末用熟棗肉為丸如麻子大每一二歲兒煎甘草湯下三丸量兒大小以意加減治小兒㿗疝腫痛方枳殼三兩微炒上一味搗羅為散每服一字匕煨蔥米飲調下不拘時候治小兒㿗疝萆麻丸方萆麻仁三十枚棘剛子去皮二十枚石燕子燒一枚滑石末二錢匕麝香研半錢匕上五味搗研勻稀麵糊和丸如緑豆大每服十五丸空心煎燈心湯下一服即消治小兒㿗疝發作疼痛木通散方木通銼膽礬研各一分上二味搗研為散每服半錢匕米飲調下治小兒㿗疝腫硬疼痛滑石丸方滑石碎澤蘭各二錢粉霜一錢續隨子去皮半兩上四味搗研為末白麵糊和丸如緑豆大五歲以下每服五丸五歲以上七丸豆蔻酒下空心臨臥服治小兒陰㿗偏大白頭翁根敷方上取生白頭翁根搗隨偏腫處敷一宿當作瘡二十日愈治小兒陰㿗莧菜根敷方上取莧菜根搗碎敷之立瘥馬鞭草敷亦佳治小兒陰核氣結腫大或偏腫疼痛漆燕散方漆燕一枚入瓦瓶子內用鹽泥固濟陰乾炭火燒令通赤為度放冷取出研令細續隨子去皮一分上二味搗研為細散每服半錢匕米飲調下治小兒肝經虛弱筋脈緩縱氣脈下墜陰器腫大久成㿗疝三應散方蘹香蟲一枚研汁膩粉二錢匕胡黃連末一分上三味同研令乾每服一字匕陳米飲調下不拘時
