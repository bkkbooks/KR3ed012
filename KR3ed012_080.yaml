每服三錢匕水一盞半生薑一棗大切煎至八分去滓溫服以小便利為度治水氣喘滿小便赤澀腰腿浮腫不得眠睡苦葶藶丸方苦葶藶紙上炒一兩三分杏仁湯浸去皮尖雙仁炒研三錢陳橘皮湯浸去白焙四錢防己一兩赤茯苓去黑皮紫蘇葉郁李仁湯浸去皮尖炒研各半兩上七味搗羅五味為末與二味研者和勻煉蜜丸如梧桐子大每服二十丸食後煎橘皮湯下日再治水腫胸滿氣急郁李仁湯方郁李仁湯浸去皮尖炒桑根白皮炙銼赤小豆炒各三兩陳橘皮湯浸去白炒二兩紫蘇一兩半茅根切四兩上六味粗搗篩每服五錢匕水三盞煎至一盞去滓溫服治十種水氣喘急坐臥不得小便淋澀葶藶散方苦葶藶紙上炒一兩半牽牛子炒一兩二錢豬苓去黑皮澤瀉各一兩椒目炒三分上五味搗羅為細散每用蔥白三莖切漿水一盞煎至半盞去滓調藥二錢匕空心臨臥服以大小便利為度治水腫胸中氣滿喘急茯苓湯方赤茯苓去黑皮杏仁去皮尖雙仁炒各四兩陳橘皮湯浸去白炒二兩上三味粗搗篩每服五錢匕水三盞煎至一盞去滓溫服日再病隨小便下飲盡更作水蠱論曰水蠱之狀腹膜腫脹皮膚粗黑搖動有聲此由脾腎氣虛濕氣淫溢久不瘥則害人如蠱之毒故謂之水蠱也治水蠱通身腫滿無比丸方京三稜煨銼牽牛子膽礬研檳榔銼芫花醋浸炒各一兩膩粉一分續隨子去皮硇砂研木香各半兩鐵粉研三分大棗三十枚湯內略煮過剝去皮核取肉爛研上一十一味除膽礬硇砂棗肉外同搗羅為末用釅醋二大升先下硇砂膽礬棗肉於銀石器內煎五七沸次下諸藥末一處攪勻慢火熬候可丸丸如豌豆大每服十丸丈夫溫酒下婦人醋湯下治水蠱腹脹消腫滿痞氣中膈丸方芫花醋浸炒黃甘遂炒黃為末大戟煨各一兩澤瀉青橘皮湯浸去白焙木香各半兩硇砂研乳香研各一錢巴豆去皮膜出油研二十一枚上九味搗研為末煉蜜和丸如緑豆大每服三丸至五丸溫酒下治水蠱水腫甘遂散方甘遂炒蓬莪朮炮青橘皮湯浸去白焙各一兩大戟微煨桂去粗皮各三分石菖蒲米泔浸炒乾木香各半兩上七味搗羅為散每服用蔥湯調一錢匕空腹漸加至二錢匕微吐瀉為度亦治腳氣治水蠱身體洪腫喘滿葶藶湯方葶藶紙上炒令紫色搗末一兩上一味以水二盞入葶藶五錢匕大棗十枚劈破同煎至一盞去滓分為二服以利為度後服葶藶丸葶藶丸方葶藶子紙上炒令紫色三兩牽牛子微炒一兩半海藻洗去咸炒昆布洗去咸炒豬苓去黑皮澤漆各一兩上六味搗羅為末煉蜜和丸如小豆大每服米飲下十五丸日再稍加至二十丸以知為度治水蠱腹腫利小便分氣散方甘遂炒商陸銼炒白牽牛炒各半兩檳榔炮銼一枚木香一分白丁香研五十枚膩粉研一錢上七味搗研為散每服半錢匕溫酒調下實者加至一錢匕治水蠱大小便不通急脹壅塞大黃湯方大黃銼碎醋拌炒乾一兩半麥門冬去心焙三分甘遂微炒茅根銼黃連去須各一兩貝母炮去心三分上六味粗搗篩每服二錢匕水一盞煎至七分去滓溫服治水蠱腹脹滿急小便不通縱有少而黃赤瞿麥湯方瞿麥穗車前子滑石碎茅根銼甘遂微炒苦參上六味等分粗搗篩每服二錢匕以水二盞煎至七分去滓溫服日三以利為度治水蠱腹脹喘嗽分水氣海蛤丸方海蛤燒灰半兩滑石研凝水石研各一兩白丁香研五十枚膩粉粉霜各一錢上六味一處研勻麵糊和作餅子以濕紙裹燒熟搗羅為末薄麵糊和丸如緑豆大溫酒下二十丸治水蠱內腫即冷外腫即熱氣急無力結水湯方黃連去須大黃銼碎醋拌炒乾各一兩甘遂微炒葶藶炒令紫各一兩上四味粗搗篩每服二錢匕水一盞半煎至七分去滓溫服日二治水蠱遍身洪腫椒目丸方椒目微炒出汗牡蠣煅葶藶紙上炒甘遂炒上四味等分搗羅為末煉蜜和丸如小豆大每服米飲下十丸取利利後服白米粥養之治水蠱水腫大戟湯方大戟去皮炒甘遂炒上二味等分粗搗篩每服一錢匕水一盞半入大棗三枚劈破煎至七分去滓溫服治水蠱鼠尾草丸方鼠尾草馬鞭草各五斤上二味用水五斗煮取二斗去滓再煎成膏為丸如小豆大以輕粉為衣每服米飲下三丸至六丸治水蠱身體洪腫惡實丸方惡實微炒一兩上一味為末麵糊和丸如梧桐子大每服十丸米飲下勿嚼破治水蠱遍體洪腫瓠瓤煎方瓠瓤一枚上一味以水二升煮一炊頃去滓煎堪丸即丸如小豆大每服米飲下十丸取小便利利後作小豆羹食之勿飲水治蠱病水腫楮枝煎方楮枝銼半升上一味以水五升煎至二升半去滓取汁入黑豆末半升煎成煎每用一匙空腹服之膜外氣論曰諸家方書論水病甚詳未嘗有言膜外氣者唐天寶間有徒都子者始著膜外氣方書本末完具自成一家今並編之然究其義本於肺受寒邪傳之於腎腎氣虛弱脾土又衰不能制水使水濕散溢於肌膚之間氣攻於腹膜之外故謂之膜外氣其病令人虛脹四肢腫滿按之沒指是也徒都子論病本膜外氣者或謂之水病起於他疾不可常定或因患瘧或因積勞或因腎臟中風或因肺腑傷冷或因膈上氣或因沖熱遠行或因酒肉中所得始於肺終於腎或因咳嗽或多涕唾或因蓄聚冷氣壅塞不散遂使肺臟熱氣攻心五臟冷氣下化為水流入膀胱在大腸膜外所以切脈不能知針灸不能及蓋人腎為命本不可虛也本固即葉茂本虛即易枯況四時衰旺皆乘腎臟之氣腎損即五臟皆衰是致胃閉而脾不磨氣結而小便澀輕重之候在大小便耳若小便不通則氣壅攻擊腹內衝出膜外化而為水使人手足頭面浮腫若大小便微澀則微腫極澀則極腫大小便俱不通三日即遍身洪腫至重則陰亦腫夫陰腫有二有腫而小便自出者有腫而小便出澀者又有莖頭連少腹臍皆腫者此併為死候宜速治之若患此疾腫亦不常定或先手足面目浮腫或先腰肋微腫或先手足小腫其候或消或甚三五日稍愈或三五日再發亦以小便通澀為候積漸變成洪腫婦人得之與此略同凡患此疾令人腹脹煩悶胸間氣急此由肺脹甚即喘如牛吼坐臥行立不得或中夜後氣攻胸心重者一年二年方死有一月兩月死者若將息失度誤食毒物十日五日即甚也愚醫多以針灸出水為功又以鯉魚赤小豆為藥又令病人飲黃牛尿服商陸根反有所損少有瘥者大抵此病尤忌針灸華他云患水病未遇良醫第一不得針灸言氣在膜外已化為水水出即引出腹中氣水盡則死扁鵲云水病在膜外常針不可及常藥不可療憔神針良藥可也有此疾者宜向陽行坐遇陰雨則愈覺壅滯房中常須存火服藥後夜臥覺胸間熱甚宜含紅雪與好茶之類慎勿飲酒及冷茶冷水若渴宜吃五靈湯方録在卷後尤忌鹽生冷醋滑治膜外氣水病不限年月深淺洪腫大喘須臾不可過朝服暮瘥防己湯方防己大戟木香赤茯苓去黑皮海蛤犀角屑胡椒白朮葶藶防風去叉木通桑根白皮紫蘇陳橘皮炙牽牛子訶黎勒去核郁李仁白檳榔各一兩大黃二兩麝香少許湯成下不用研上二十味等分唯大黃一味倍用並須新藥銼了稱為二劑以水三升宿浸明日五更用鐺文火煎減去一升絞取飲可三盞平旦空腹且服一盞如人行五里更服一盞又如人行五里更服一盞至第二第三服如藥冷用重湯暖之不可冷服若久病腹中虛服至第三盞即微利三兩行若腹中實者至日午即轉瀉宜用盆盛驗之必有惡濁黃水或青里惡物出三五升並氣化為之瀉若不甚困慎勿止之必自住若覺力乏即服漿水粥補之後隔三五日更服一劑還依此法服之按徒都先生云服第一劑則病減半至第二劑則去根本前後歷試絶重者朝服一劑而暮已瘥根本深者服藥當日腫消能起但覺小腹內有塊結則須後劑去之其藥滓慎勿拋棄布囊盛懸於風中他日或覺微有發動則更煎藥滓可更治兩人徒都先生云人家有此藥滓懸於戶上一家終不患疫氣此飲不獨治水氣凡是氣病皆治之若患肺氣不限年月深淺於此藥二十味中減去大黃及訶黎勒加貝母人參以童子小便煎每日空心服之當去病根有患肺氣困重者因逢患水氣人服此藥偶得一盞服之便當永瘥有人一生患腳氣時時衝心服此飲亦除根本以此推之但是氣皆治不獨治水氣而已産婦有娠人服之亦無妨小兒及老人隨意如減瘥後宜服順氣丸治水氣順氣丸方防己一兩半大黃二兩半犀角炙鎊訶黎勒皮牽牛子赤茯苓去黑皮葶藶炒海蛤芎藭乾地黃焙木通銼大戟桑根白皮銼陳橘皮去白防風去叉郁李仁去皮木香各一兩上一十七味搗羅為末煉蜜丸梧桐子大每服十丸空腹米飲下覺壅不快則加至十五丸覺通則減至三五丸大小便不通即加至三十丸此藥不獨治水氣其功與前飲相類若患水氣人服前飲後腫既消便服此順氣丸氣順血滑體氣輕健即止患腳氣人常合此藥備急服前飲瘥百日內即宜服五靈湯治水氣五靈湯方訶黎勒皮木通銼赤茯苓去黑皮防己銼陳橘皮湯浸去白焙各一兩上五味粗搗篩每服五錢匕水一盞半煎至一盞去滓渴即飲之覺熱即吃好茶治水氣牽牛五靈煮散方牽牛子炒檳榔銼木香赤茯苓去黑皮陳橘皮湯浸去白焙各一兩上五味搗羅為散如茶法煎三兩沸渴即飲之此藥兼治一切肺氣腳氣每覺心胸煩悶時服一盞即愈奔豚氣上築心胸不可忍者並三兩盞立效治水氣紫蘇煮散方紫蘇葉防風去叉桑根白皮切白朮銼碎等分上四味搗羅為散如茶法煎三兩沸覺熱即去白朮加甘草功效如前方所說又有蛇蠱狀與水病相似四肢如故小便不甚澀但腹急腫而蠱脹不下食凡醫多誤作水氣治之宜仔細詳審當服太上五蠱丸治百病及諸色蠱常合隨身備急五蠱丸方雄黃研椒目炒巴豆出油盡莽草真珠末研芫花醋浸炒焦鬼臼礬石燒令汁枯藜蘆去蘆頭獺肝各一分蜈蚣一寸附子炮裂去皮臍半兩斑蝥去翅足炒十枚上一十三味搗研為末煉蜜丸如小豆大瓷合密收每食後服一丸如未效日增一丸以利為度當有蟲出形狀不可具載蟲下後七日內切宜將攝凡服此藥一劑蠱不能侵百病盡除勿食五辛又蛇毒甚者合五蠱丸未及且以大豆漬酒絞汁服半升即瘥又酒服桔梗犀角末方寸匕日三服中毒甚不能自服干口開與之藥下心頭當煩悶須臾即穌如此服七日後宜食豬脾臟補養今所録蛇蠱方在卷末者緣蛇蠱狀似水病恐人不辨誤作水病治之且謂水藥不驗楊馨所傳地仙徒都先生神方一十五首皆治惡病而膜外水氣方具於首蛇蠱次之余方世人無有傳者楊馨云曾有親識患水病洪腫滿在床頃刻必死旦服此藥至暮獲安不忍棄其滓常以絹囊盛之凡煎防己湯須用舊鐺於火中燒令通赤揩磨取淨免有油膩又於藥名二十味中各取一字合成四句之歌庶使年久不忘胡牽犀藶海漢茯戟通桑青黃訶麝橘白郁紫防榔治膜外水氣神效牛李子丸方牛李子微炒牽牛子微炒吳茱萸水浸一宿炒乾青橘皮去白焙各半兩杏仁湯浸去皮尖雙仁生用十五枚葶藶紙上炒少許上六味搗羅為末用水浸蒸餅丸如小豆大每服三十丸夜後煎橘皮湯下以轉下氣為度治膜外水腫澤漆丸方澤漆微炒一兩水銀煉葶藶紙上炒大戟微煨郁李仁湯浸去皮炒枳殼去瓤麩炒各一兩半甘遂椒目微炒各一兩上八味搗羅為末煉蜜丸如小豆大每服十丸空腹米飲下未利加至十五丸治膜外水氣身腫十水丸方藁本去苗土澤漆微炒大戟微煨連翹葶藶紙上炒甘遂微炒芫花醋浸炒焦桑根白皮炙銼赤小豆微炒各三分巴豆去皮心膜麩炒出油盡一兩上一十味搗羅為末煉蜜丸如小豆大每服五丸空心米飲下不利加至十丸治膜外氣白牽牛散方白牽牛子炒青橘皮去白焙炒木通銼各一兩上三味搗羅為散每服一錢匕煎商陸湯調下大便下黃水為度忌鹽一百日治膜外水氣甘遂餅方甘遂大麥面各半兩上二味搗羅為末以水和作餅子燒熟熱服之如不利以熟飲投之如利以冷水洗手面即止
