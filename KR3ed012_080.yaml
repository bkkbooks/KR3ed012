body:
  text: 卷第八十水腫咳逆上氣論曰內經謂腎為水腫肺為喘呼氣逆不得臥蓋腎主水肺主氣腎虛不能制水水氣脹滿上乘於肺肺得水而浮故上氣而咳嗽古方有曰腫從腳起上氣而咳名曰白水其病在肺治水咳逆上氣通身腫滿短氣晝夜倚壁不得臥喉中水雞聲大小便不通飲食不下而不甚渴白前湯方白前三兩紫菀去苗土四兩半夏湯洗七遍五兩生澤漆根三兩桂去粗皮三兩人參一兩半白朮五兩乾薑炮二兩赤茯苓去黑皮四兩吳茱萸湯洗焙炒五兩杏仁三兩去雙仁皮尖研葶藶炒二兩栝蔞實三兩上一十三味細銼如麻豆每服五錢匕水一盞半棗三枚劈破同煎至八分去滓溫服小便微利氣下腫減治水腫上氣褚澄防己煮散方防己澤漆葉石葦去毛澤瀉五兩白朮丹參赤茯苓去黑皮陳橘皮湯浸去白焙桑根白皮銼木通銼各三兩郁李仁研五合上一十一味搗羅為散每服五錢匕水一盞半入生薑半分切煎至八分去滓頓服日三服以小便利為度治水氣咳逆上氣四肢浮腫坐臥不安防己湯方防己半兩桑根白皮銼木通銼赤茯苓去黑皮各一兩郁李仁湯浸去皮微炒澤漆甜葶藶炒令紫色各半兩陳橘皮湯浸去白焙二兩百合一兩上九味粗搗篩每服五錢匕以水一盞半棗四枚劈破同煎至七分去滓食前溫服治水腫腹大喘咳胸脅滿不得臥鯉魚湯方鯉魚一枚重三斤淨去鱗腸肚桂去粗皮紫菀去苗土各三兩防己黃芩去黑心硝石研如粉人參各二兩上七味除魚外粗搗篩用水一斗煮魚如食法取汁五升去魚每服藥末五錢匕汁一盞半煎至一盞去滓溫服日三治水腫盛滿氣急喘嗽小便澀赤如血者澤漆湯方澤漆葉微炒五兩桑根白皮炙黃銼三兩白朮一兩郁李仁湯浸去皮炒熟三兩杏仁湯浸去皮尖雙仁炒一兩半陳橘皮湯浸去白炒乾一兩人參一兩半上七味粗搗篩每服五錢匕用水一盞半生薑一棗大拍破煎至八分去滓溫服以利黃水三升及小便利為度治水氣身面腫滿氣急喘嗽小便赤澀郁李仁湯方郁李仁湯浸去皮炒乾一兩桑根白皮炙令黃銼半兩澤漆莖葉微炒切半兩葶藶炒令紫色二兩杏仁湯浸去皮尖雙仁一百枚炒熟赤茯苓去黑皮一兩半上六味粗搗篩每服三錢匕水二盞生薑一棗大拍破同煎至八分去滓溫服小便利佳可服三二料治胸中喘咳逆水氣身腫利小便白雌雞湯方白雌雞一隻去腸臟治如食法澤漆切碎二兩半夏湯洗七遍去滑三兩白朮一兩甘草炙令赤色一兩半上五味除雞外粗搗篩先用東流水五升煮雞令爛熟去雞內藥末五錢匕煮赤小豆一合大棗三枚劈生薑三片俟豆熟去滓溫服日三夜一治遍體浮腫腹脹上氣不得臥大小便澀先服大棗散後服海蛤丸取瘥瘥後三年不得食肉入房不爾病必重發大棗散方芫花微炒一分甘遂炙半兩大戟煨去皮一分上三味搗羅為散每服一錢匕以大棗十枚水一盞半煮棗二十沸去棗調藥空心頓服當利勿止如此三服後可服海蛤丸海蛤丸方海蛤別研赤茯苓去黑皮各一兩狼毒煨熟三分桑根白皮炙銼玄參微炙各一兩膩粉半兩薏苡仁陳橘皮湯浸去白焙防己葶藶炒紫色研杏仁湯浸去皮尖雙仁炒各一兩上一十一味除海蛤外搗羅為末同海蛤再研勻煉蜜和丸如小豆大每服空心橘皮湯下三十丸日三服五日後覺齒癢即住藥齒腫口瘡即是瘥候治水咳逆上氣通身洪腫短氣脹滿晝夜不得臥喉中鳴大小便不通不下食而不甚渴大白前湯方白前一兩半紫菀去土二兩半夏湯洗七遍去滑三兩生澤漆根微炒二兩上四味粗搗篩每服五錢匕水一盞半煎至一盞去滓又內後藥桂去粗皮一兩半人參三分白朮赤茯苓去黑皮吳茱萸水浸一宿焙乾炒各二兩杏仁湯浸去皮尖雙仁炒一兩半葶藶炒紫色栝蔞根各二兩上八味粗搗篩每服三錢匕入生薑一塊拍碎大棗三枚劈破同入前藥汁再煎至八分去滓溫服當得大小便微利即氣通腫減治水咳逆上氣通身浮腫短氣腸滿晝夜倚壁不得臥喉中水雞聲白前湯方白前去土三分紫菀去土一兩半半夏湯洗七遍去滑三兩澤漆根細切微炒三兩半桂去粗皮一兩半人參乾薑炮各半兩栝蔞一枚去皮白朮一兩吳茱萸水浸一宿焙乾炒二兩上一十味粗搗篩每服用五錢匕水三盞入棗二枚生薑一塊拍破煎至一盞半去滓分二服當小便利或微溏腫即減治水氣面體浮腫咳嗽氣促黃耆湯方黃耆銼三分桑根白皮炙銼柴胡去苗赤芍藥銼微炒赤茯苓去黑皮各半兩陳橘皮湯浸去白焙麥門冬去心焙惡實微炒甘草炙各三分上九味粗搗篩每服三錢匕水二盞煎至七分去滓溫服不拘時候治水腫上氣不得臥頭面身體悉腫大葶藶丸方葶藶一兩一分熬研如泥澤漆莖熬赤茯苓去黑皮陳橘皮湯浸去白焙各半兩甘遂牽牛子各三分郁李仁研半兩上七味搗研為末煉蜜和丸如梧桐子大每服五丸以赤小豆飲及大麻子飲下日再服稍加至七丸以大小便微利為度若渴即飲以小豆麻子等汁治水氣腫滿咳嗽喘痞痰涎不利眠睡不安杏仁半夏丸方杏仁湯浸去皮尖雙仁麩炒半夏湯洗七遍去滑各一兩椒目半兩貝母去心炒防己各一兩苦葶藶二兩隔紙微炒上六味搗羅為末煉蜜和丸如梧桐子大每服二十丸食後臨臥煎桑根白皮湯下治內虛外實久有積聚營衛不通甚者變為赤水此為病從心起入於皮膚腫滿皮厚體重上氣臥煩而躁葶藶丸方葶藶炒令紫半合防己椒目大黃銼碎醋拌炒各一兩半萆麻子去皮半兩郁李仁湯浸去皮炒一兩上六味搗羅為末煉蜜同棗肉和丸如小豆大每服十丸空心溫酒下如不動加至十五二十丸治水腫上氣大便澀牽牛子丸方牽牛子炒一兩半葶藶炒熟二兩杏仁去皮尖雙仁麩炒一百枚別研大棗煮去皮核十枚研芒硝半兩研牛酥半合上六味先搗前二味為末入杏仁等研勻次入牛酥更搗萬杵丸如緑豆大每服八丸至十丸空心粥飲下治水在肺令人咳喘上氣腹大腳腫目下如臥蠶微渴不得臥小便難少而數胸滿隱痛此水氣迫肺也宜利小便澤漆根湯方澤漆根生四兩麥門冬去心焙甘草炙人參赤茯苓去黑皮各一兩鯉魚一斤者一頭上六味將五味粗搗篩先用水三升煮魚取汁一升去魚每服三錢匕汁一盞煎至七分去滓溫服日三以小便利為度不利增服如大便利小便未利者增至四合初服一日氣即下得安臥有寒可加生薑二兩切焙水氣遍身腫滿論曰腎主水脾胃俱主土土剋水胃為水穀之海其氣虛不能傳化水氣使水氣浸漬腑臟又脾得水濕之氣土衰不能制之水氣獨歸於腎腎虛三焦不瀉經絡閉塞故水氣溢於皮膚傳流四肢所以通身腫也其候上氣體重小便黃澀腫處按之隨手而起是也治通身腫喘款氣丸方丁香木香沉香白檀香桂去粗皮肉豆蔻去殼檳榔銼蓽澄茄大戟炒甘遂炒各一分木通銼一兩續隨子去皮海蛤郁李仁去皮瞿麥甜葶藶炒桑根白皮銼炙牽牛子各一分膩粉一錢巴豆慢火炮過出油令盡一分上二十味搗為細末研白粳米飯為丸如緑豆大每服三丸至五丸煎橘皮湯下治遍身水腫木通湯方木通銼苦葫蘆子各一兩半澤瀉防己各三分豬苓去黑皮海蛤細研各一兩上六味粗搗篩每服五錢匕水七分酒七分入蔥白五寸切煎至八分去滓食前溫服當下小便數升腫消治水氣遍身腫滿皮肉欲裂心腹內氣脹小便不利飲食不消甘遂丸方甘遂一兩葶藶炒二兩半赤茯苓去黑皮一兩陳橘皮湯浸去白焙郁李仁各三分上五味搗羅四味為細末別搗葶藶如脂內散中蜜丸如梧桐子大空心飲下七丸日一服如不利稍加之以利為度治水病通身微腫腹大食飲不消小消化丸方芫花微炒甘遂微炒大黃銼碎醋拌炒乾葶藶炒令紫色各一兩巴豆去心皮麩炒研出油盡四十枚上五味搗羅為末煉蜜為丸如小豆大每服飲下三丸不知稍增至五丸以知為度治水病通身腫滿喘急大小便澀大豆散方大豆黃醋拌炒乾大黃微煨去皮各一兩上二味搗羅為散每服二錢匕臨臥時煎蔥橘皮湯調下平明以利大腸為度治水通身腫滿喘急小便澀一字湯方甘遂大戟去皮各一兩上二味銼用慢火炒令黃色粗搗篩每服一字匕以水半盞煎三五沸便須傾出不得煎過去滓溫服之不過十服大效治通身腫滿喘急小便澀大戟散方大戟去皮細切微炒二兩乾薑炮裂半兩上二味搗羅為散每服三錢匕用生薑湯調下良久糯米飲投之以大小便利為度治水氣通身黃腫葶藶丸方葶藶微炒防己陳橘皮湯去白焙郁李仁紫蘇子赤茯苓去黑皮各半兩上六味搗羅為末煉蜜為丸如梧桐子大麝香酒下二十丸日三服以小便利為度治水病通身洪腫鯉魚湯方鯉魚淨去鱗腸肚一頭一斤赤茯苓去黑皮一兩澤漆微炒一兩半甘草炙一兩澤瀉二兩半人參一兩半杏仁湯浸去皮尖雙仁麩炒半兩上七味將六味粗搗篩先以水三升煮魚取一升半每服以魚汁一盞入諸藥末三錢匕煎取七分去滓溫服日二三小便利乃止治水腫通身皆腫桑白皮湯方桑根白皮炙黃色銼五兩吳茱萸水浸一宿炒乾二兩甘草炙一兩上三味㕮咀如麻豆每服五錢匕用水二盞生薑一棗大切飴糖半匙煎至一盞去滓溫服日再治水病通身洪腫四肢無力喘息不安腹中虛脹澤漆湯方澤漆微炒三兩赤小豆微炒二兩甘草炙三分鯉魚淨去腸肚並鱗一頭重一斤者麥門冬去心焙三分赤茯苓去黑皮一兩人參三分上七味將五味粗搗篩先用水五升將鯉魚與小豆同煮至二升去滓內藥末五錢匕入生薑一分拍破煎一升去滓分二服弱人作三服日再以小便利腫氣減或小溏下為度若小便大利還從一合始大便利則止若水甚加澤漆至半斤渴加栝蔞根一兩治水腫遍身小便澀腹滿赤小豆湯方赤小豆微炒一升桑根白皮炙銼一兩澤漆莖葉切炒三分上三味將二味綿裹用水九升與小豆三味煮令熟去綿裹諸藥只留小豆飢則食小豆渴即飲汁以利為度治水氣通身腫麻黃湯方麻黃去根節二兩半白朮銼碎微炒二兩甘草炙一兩石膏碎三分赤茯苓去黑皮一兩上五味粗搗篩每服五錢匕水二盞半棗二枚劈破生薑一棗大拍碎同煎至一盞去滓溫服日三每服後蓋復令汗出瘥治水氣通身腫其脈沉遲芍藥湯方芍藥銼炒一兩桂去粗皮半兩黃耆銼三分上三味粗搗篩每服五錢匕用米醋一合水一盞半煎至一盞去滓溫服心當煩勿怪六七日即瘥勿食鹽治通身洪腫木香丸方木香肉豆蔻去皮青橘皮去白焙檳榔煨銼各一兩上四味搗羅為細末用棗肉丸如緑豆大每服空心溫酒下二十丸漸加至三十丸治水氣通身黃腫蒴藋酒方上用蒴藋根搗汁一盞酒一盞和之置暖處一宿旦起空心服之瘥治營衛不通遍身腫滿咳嗽足腫小便不利通治十水水銀丸方水銀水煮一日芒硝椒目微炒出汗各三分上三味搗羅為細末煉蜜丸如緑豆大每服十丸空心米飲下日二服小便利瘥治水氣腫滿氣息喘急小便不利並男子女人虛積及遍身黃腫白丸子方膩粉半兩粉霜滑石末各四錢匕硇砂寒水石火煅過為末白丁香直者末各三錢匕上六味先將膩粉滑石二味研勻紅紙裹更和白麵作餅子再裹合復用酒濕紅紙裹二十四重後用桑柴熟火燒以面熟為度取出與前藥四味一處研勻用水浸蒸餅心搦乾和為丸如豌豆大每煎生薑水下食前吃第一日三丸日三第二日四丸日三第三日五丸日三第四日六丸日三服後以小便無數取下水為度服四日病未下更加一日如服藥第二日覺口氣時便用後漱口藥漱之漱口齒貫衆湯方貫衆黃連去須各半兩上二味粗搗篩每用一錢