body:
  text: 卷第一百三十八諸丹毒論曰熱毒之氣暴發於皮膚間不得外泄則蓄熱為丹毒以其色如塗丹之赤又復陽氣伏於皮中故謂之丹也熱氣剽悍其發無常處大則如掌甚則周流四體不急治或至壞爛出膿血若發於骨節之間則肢斷如截毒氣入腹則能殺人治法用鐮割明不可緩故也治丹毒遊走及魚臍瘡硇砂丸方硇砂研雄雀屎桂去粗皮獺膽去膜砒黃丹砂研細各一分麝香研一錢白蠟一兩半天南星三分鵜鶘觜半兩上一十味除蠟外搗研為末先將蠟於瓷器內慢火上熔下藥調為丸如梧桐子大先用針撥破瘡口入一丸醋調面塗故帛貼兩宿痛止即揭去收藥丸可再用治丹毒遊走拓洗後服此漏蘆湯方漏蘆去蘆頭白蘞麻黃去根節湯煮掠去沫黃芩去黑心升麻白薇芍藥大黃銼甘草炙各一兩上九味粗搗篩每服五錢匕水一盞半煎至八分去滓食後溫服至晚再服以瘥為度治丹毒流移不定方生羊肉牛肉亦得上一味薄切作片貼丹上頻易治丹毒發背諸腫方馬齒莧上一味熟搗敷之頻易不止者得藍澱和之更佳治丹熱癰疽始發焮熱浸淫長大黃芩湯拓方黃芩去黑心升麻各一兩半黃連去須芎藭大黃各一兩甘草炙銼當歸切焙羚羊角鎊各半兩上八味細銼每用一兩以水五盞煎至三盞去滓下芒硝半兩攪勻以故帛三兩重浸藥汁溫拓患處數十遍早晚用之以瘥為度治丹毒吳藍湯拓方吳藍一兩生地黃三分升麻石膏黃芩去黑心犀角鎊白蘞梔子仁大黃各半兩上九味細銼每用半兩以竹瀝一盞水七盞同煎至四盞去滓以故帛浸拓患處日五七次治丹毒升麻湯拓方升麻二兩漏蘆黃芩去黑心各三兩梔子去皮一兩上四味細銼每用半兩以水五盞煎至三盞去滓下芒硝二錢匕攪勻以故帛三兩重浸湯中溫拓患處數十遍日兩次治風丹胡粉塗敷方胡粉赤小豆糯米山茱萸黃連去須各一兩水銀半兩上六味除水銀外搗羅為散生油調如糊後取水銀於掌中以津唾研如泥入藥內研勻先以椒湯洗丹上拭乾用藥塗敷日三兩遍治赤黑丹羚羊角散塗敷方羚羊角燒灰三兩上一味研為散以雞子白調如糊塗敷患處日三兩次治丹毒如手掌大身體赤發痛癢微腫赤小豆塗敷方赤小豆上一味搗羅為末以雞子白調如糊塗丹上干即易治赤黑丹鹿角散塗敷方鹿角燒灰五兩上一味細研為散煉豬脂調和塗患處日三次又方豬屎燒灰上一味細研為散以雞子白旋調如糊塗敷丹上日三五次又方豉一兩香薷蓼葉各半兩上三味合和入酒少許細研成膏塗患處干即易治丹毒遍身赤腫生蘿摩汁塗敷方生蘿摩上一味搗絞取汁塗丹上日三五次又方茺蔚草蛇銜草慎火草各一兩上三味銼搗令熟水調敷患處日數次又方惡實根五兩取時勻令見風及雞犬上一味銼搗令熟水調敷患處干即易治一切丹胗方生蛇銜草銼生地黃切慎火草五葉草水萍豉大黃生銼山梔子仁黃芩去黑心芒硝碎五葉藤上一十一味但得一味不拘多少搗貼之即瘥干即入雞子清少許調治諸丹毒方上取蕓薹汁入大黃末芒硝生鐵衣相和塗之佳治火丹熱毒之氣五色無定宜先宣轉然後用藥雞蘇塗方搗生雞蘇厚塗之又方搗苧麻根敷之又方赤小豆一升羊角一對同燒存性為末和蜜敷之又方研豉和屋塵等分以苦酒調敷之又方水磨羚羊角服之妙又方取連錢草以鹽挼敷之痱瘡論曰經謂汗出見濕乃生痤痱蓋熱盛汗出陽氣發泄而腠理疏反以寒水洗浴則熱氣內鬱於皮腠之間輕則為痱重則為痤也世俗通謂之痱子瘡其狀皮肉如毫針所刺遍體細瘡如麩片愈而復發者是也治痱子瘙癢楝花粉敷之方苦楝花不拘多少焙乾上一味搗羅為細末入蚌粉滑石末各少許研勻日頻敷之治痱子磨破成瘡宜用此止痛生肌赤石脂散方赤石脂細研黃柏去粗皮銼臘茶末各半兩白麵二兩龍腦半錢細研上五味搗研為細散每用時綿搵撲之治夏月痱子葛粉方葛粉三兩甘草生用為末一兩石灰微炒半兩上三味研細末每用時綿搵撲之治痱瘡癢痛龍腦粉方龍腦一錢粟米粉五兩上二味研細末先用棗葉湯洗後綿搵撲之治夏月痱瘡丹堊散方上取舊屋梁上刮取舊赤白皮羅末敷之治夏月痱盛滑石粉方滑石研綠豆粉研棗葉乾者為末各一兩上三味合研為細末遍敷之治暑月肌膚瘡爛或因搔成瘡者方取干壁土揉細末敷之隨手即瘥肉刺論曰肉刺者生於足指間形如硬胝與肉相附隱痛成刺由靴履急窄相磨而成俗呼為雞眼是也治肉刺方肥皂莢一挺無食子三枚上二味同燒令煙斷細研以釅米醋於砂盆中別磨皂莢如糊和末敷之治肉刺方熏陸香石硫黃上二味等分同研令勻塗肉刺上以燒釵烙之效治肉刺方豬𦚠楓香脂研細上二味先研豬𦚠令爛次入楓香脂末相和成膏挑剔刺處令淨以藥敷之治肉刺方柏木上白膠松脂各一兩黃蠟半兩上三味同於火上熔成膏候冷貼之用物系定治肉刺方蟾酥五片湯中浸濕膩粉一錢上二味將蟾酥於盆子中以膩粉同和令勻先用針撥破頭邊然後塗藥密裹之治肉刺久不瘥方松脂乳香各一分上二味同研令勻細先用針撥破後以藥敷之密封系治肉刺結硬方上用針挑破以雞子白點三兩度即落下治肉刺方上搗白芥子如粉以醋調敷之密封系經宿揭去自然落下治肉刺方上用羊腦髓敷之取肉刺方上搗烏梅肉和醋封之當日拔根出永除取肉刺方上以硇砂少許和膠令消勻貼之根即出惡脈論曰惡脈之病其狀赤絡忽起巃嵸而聚若死蚯蚓之狀又若水在脈中長短隨絡脈所生得之春冬惡風入於絡脈而不散則血脈瘀結而成是疾久不治則結脈變為瘻病治惡脈腫毒毒氣攻脈中猝腫痛結作核或似癰癤而非時使人頭痛寒熱氣急者數日不除五香湯加茱萸犀角湯方木香藿香葉沉香熏陸香雞舌香吳茱萸湯洗微炒犀角鎊各一兩上七味粗搗篩每服五錢匕水二盞煎至一盞去滓空心溫服日晚再服其滓熱拓腫上冷即易之治惡脈毒腫升麻湯方升麻一兩烏梅肉二兩山梔子仁二十枚上三味粗搗篩每服五錢匕水二盞煎至一盞去滓空心溫服日晚再服余滓熱拓患上治惡脈腫毒木香湯方木香吳茱萸洗焙微炒升麻熏陸香雞舌香雄黃甘草炙鱉甲醋浸炙去裙襴射干各半兩上九味粗搗篩每服五錢匕水二盞煎至一盞去滓空心溫服日晚再服治惡脈毒腫黃耆散塗敷方黃耆細銼四兩上一味搗羅為細散水調敷上日三五度又方漆頭䕡茹二兩上一味搗羅為細散水調敷上日三五度追蝕一切瘡腫論曰癰腫若寒多及毒深外證雖結聚𩊅硬不消疼痛難任未能潰化或已穿穴經久不瘥在外者須以藥蝕在裡者須以藥紝令毒氣發泄榮衛流通則癰疽得瘥矣所以有追引蝕癰之方治癰疽腫未有頭疼痛不可忍透肌丸方硇砂研斑蝥去翅足米炒烏頭尖上三味等分搗研為末醋煮麵糊丸如小豆大捻令扁貼在瘡上卻用膏藥花子蓋以透為度如惡物出盡次用後方生肌散合瘡口生肌散方白礬燒令汁盡一兩黃連末一分輕粉一錢上三味同研細不拘多少摻瘡口上候生肉膿水盡瘡口乾即止治癰腫癤毒出膿疼痛追膿散方濕生蟲五十枚瓦上爆干小麥五十粒麝香研半錢匕上三味搗研為末每用一字紝在瘡內治腫毒未成頭熱痛方蠐螬不計多少上一味生研細入少面並醋三兩滴調攤紙花子上中剪一眼子帖時以水潤覺藥力盡再用候癢揭去自然膿出治癰疽已潰蝕惡肉追毒丸方巴豆去皮心膜十四枚白丁香二十一枚豆豉二十一粒屁盤蟲七枚上四味同研細滴水丸捻如雀糞大紝瘡內追汁盡即止治瘡癤癰疽等無頭者通關膏方乳香輕粉各等分上二味研勻津唾調塗腫處以紙貼之治癰疽瘡癤未有頭射瘡壞膿丸方砒霜半錢白礬鉛丹各一字上三味同研細以麵糊丸如麻子大先於毒處安藥一丸外以膏藥花子掩定微覺癢痛即膿出治一切癰瘡未破敗毒丸方巴豆去皮心膜三枚鉛丹少許上二味同研入生面少許再研勻丸如麻子大每以一丸安瘡口外以膏藥貼之膿即出治癰癤多日不熟無頭者栝蔞酒方栝蔞一枚甘草二寸上二味銼碎用酒一盞水一盞量人虛實入膩粉少許煎三五沸去滓臨臥溫服夜半疏動一行其瘡自消治癰未有頭使必穴方茅錐十枚尖正全具者上一味以水煎十數沸服之立潰若兩莖即生兩孔或斷折一錐為二亦兩孔治癰疽發背熱毒攻焮肌肉赤色疼痛欲成膿令速潰丁香散方丁香赤小豆各半兩寒水石二兩羊桃根硝石研大黃各一兩木香白蘞榆皮銼防己各三分上一十味搗羅為散先以雄雀屎七粒乳香一小塊細研以醋調和塗瘡頭上以醋調藥末如糊攤故帛上貼之干則易治發背癰疽一切瘡腫未潰疼痛寒熱渴躁不食解毒犀角散方犀角鎊一分人參甘草炙栝蔞實大黃炒各半兩芎藭一兩赤茯苓去黑皮葛根銼檳榔生銼木香各三分上一十味搗羅為散每服二錢匕粥飲調下以差為度治腫毒及癰癤不穴蔥香塗敷方煨蔥一莖乳香如棗核大一粒上二味爛研塗腫上即潰治癰癤無頭咽葵子方葵子一合上以津咽三五粒多咽即頭出多假令咽一粒即穿一穴也隨癰癤大小不可過多治癰腫速穿壞雀糞塗敷方雄雀糞二十一枚上用醋研和如糊塗敷腫上膿便出未穴再塗即破治熱癰腫結熱振焮欲作膿地黃膏塗貼方生地黃三斤細切搗絞取汁上一味於銅器內慢火煎攪成膏取敷腫處以故帛塗貼之亦得日三五次易即潰
