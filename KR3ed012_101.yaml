body:
  text: 卷第一百一面體門頭風白屑論曰頭風白屑不問冬夏令人瘙癢世呼為頭風此本於肺熱也肺為五臟之蓋其氣上衝頭項肺寒則腦液下而多鼻涕肺熱則熏蒸而多白屑復以風熱鼓作故癢而喜搔治諸風及沐發未乾致頭皮腫癢多生白屑防風荊芥散方荊芥穗莎草根去毛各半斤甘草炙銼三兩半甘菊花揀半兩芎藭白芷羌活去蘆頭防風去叉各三兩上八味搗羅為細末煉蜜和勻每一兩分作三十餅每服一餅細嚼茶酒任下不拘時治諸風白屑長髮令黑龍腦丸方白龍腦二兩用鼎盛水五升入龍腦並糯米五十粒以石灰泥固濟鼎口交火煮半日候冷取出研如粉真珠二兩先用大紙二張以皂莢津漬過為貼盛之又用帛裹定入粟糠五斗安甑中蒸一晝夜後取捻得破即研如粉曝乾雄黃一兩研如粉丹砂二兩形如芙蓉者研如粉並雄黃粉同入銀鍋中用醋三升以文火煮一復時出之卻以溫水淘去醋味曝乾琥珀二兩拾得芥子者搗研如粉上五味共九兩和勻內留三兩每夜臨臥漱口了揩齒咽津餘六兩再用白麵四兩作餅子紙二張裹煨熟取出研細與前藥六兩煉蜜和搗丸如梧桐子大每日空心取兩丸含化咽津後飲溫酒三五合若年四十以上更加白龍骨一兩研如粉以水飛過曝乾帛裹蒸一飯久次入桑螵蛸一兩煨熟搗末並前藥末同以煉蜜丸治頭風白屑沐頭麻子湯方大麻子秦椒各一盞皂莢末半盞上三味熟研內米泔中漬一宿去滓木匕攪百遍煎沸稍溫沐頭良久別作皂莢湯濯之治頭風白屑沐頭菊花湯方菊花獨活去蘆頭茵芋防風去叉細辛去苗葉蜀椒去目併合口皂莢杜蘅莽草桂去粗皮各半兩上一十味為末每用一兩煮湯沐頭治頭風白屑長髮令黑旱蓮膏方旱蓮子草十斤搗絞取汁二升桐木白皮四兩松葉防風芎藭白芷辛夷仁藁本沉香秦艽商陸犀角屑青竹皮細辛杜若牡荊子零陵香各二兩甘松天雄白朮升麻柏木白皮楓香脂各一兩生地黃十斤搗絞取汁五升烏麻油四升馬脂一升熊脂二升豬脂一升蔓荊子油一升棗根白皮三兩上三十味除脂油外並細銼以旱蓮子地黃等汁入瓷瓶內浸一宿取出與脂油同入大鍋內微火煎候白芷黃色膏成去滓貯入不津器中先洗髮令淨候乾用藥塗摩明旦取桑根白皮二兩細銼以水一斗五升煮取一斗放溫洗髮每夜塗藥一次治頭風癢白屑長髮令黑龍腦膏方龍腦沉香白檀香蘇合香雞舌香零陵香丁香甘松木香藿香白芷白附子細辛當歸芎藭天雄辛夷甘菊花烏喙防風蔓荊實杏仁湯浸去皮尖秦椒去目及閉口各一兩烏麻油五斤上二十四味除油外並細銼以新綿裹內鍋中入油同煎候白芷黃色藥成去滓以瓷合收旋取以手摩頭頂髮際治頭風癢白屑長髮令黑松脂膏方松脂白芷各四兩天雄莽草躑躅花各一兩秦艽獨活烏頭炮裂辛夷仁甘松零陵香沉香牛膝木香各三兩松葉杏仁湯浸去皮尖研藿香葉莎草根甘菊花蜀椒去目並閉口芎藭各二兩上二十一味除杏仁外並細銼以醋三升都入瓷瓶內浸一宿取入大鐺用生麻油一斗與藥同以微火煎候醋氣盡膏成去滓貯入不津器中每日三度勻塗髮根治頭風白屑瘙癢發落蔓荊實膏方蔓荊實半升附子二兩生用羊躑躅花葶藶各二兩零陵香一兩旱蓮子草一握上六味㕮咀以綿裹用油二升漬七日每梳頭用之面䵟𪒟論曰䵟𪒟之狀點如烏麻斑如雀卵稀則棋布密則不可容針皆由風邪客於皮膚痰飲浸漬其形外著或飽食安坐無所作為若養生方所謂積聚不消之病使人面目黎皯是也散之固有常劑若乃塗澤蠲除朝夕從事者又安可已耶治面䵟𪒟令光白潤澤白瓜子丸方白瓜子炒令黃二兩藁本去苗土遠志去心杜蘅車前子炒白芷當歸切焙雲母粉各一兩天門冬去心焙二兩細辛去苗葉陳橘皮湯浸去白炒柏子仁栝蔞根鉛丹各半兩白石脂一分上一十五味搗研為細末煉蜜為丸如梧桐子大每服二十丸溫酒下早晚食後服治面䵟𪒟塗之能令光潤防風膏方防風去叉藁本去苗土辛夷芍藥當歸切焙白芷牛膝切焙商陸細辛去苗葉密陀僧細研芎藭獨活去蘆頭葳蕤木蘭皮蕤仁各二兩杏仁湯浸去皮尖丁香雞舌香零陵香真珠屑麝香各一兩油一斤獐鹿髓各一升如無豬骨髓亦得牛髓一升如無脂亦得蠟四兩煉過者上二十六味先將髓以水浸令白取出除真珠屑麝香外余藥並銼碎次將油髓蠟入鍋中熬令銷入諸藥用文火煎之若白芷黃色量稀稠得所以新綿濾去滓方將珍珠屑麝香別研為細末入前汁中熬成膏貯瓷器內臨臥塗面上旦起以溫水洗去避風日妙治面䵟𪒟令面白悅澤白附子膏方白附子青木香丁香各一兩商陸根一兩細辛三兩酥半兩羊脂三兩密陀僧一兩研金牙三兩上九味搗篩為散酒三升漬一宿煮取一升去滓內酥煎一升成膏夜塗面上旦起溫水洗不得見大風日差治面䵟𪒟方雞子一枚去黃硃砂末一兩上二味先研硃砂為末入雞子中封固口與雞卵同令雞伏候雞雛出即取塗面效治面䵟𪒟方沉香三分牛黃三分薰陸香三分雌黃各半兩丁香一分玉屑三分鷹屎半兩水銀一分上八味先將三味香搗羅為末次將玉屑雄黃雌黃入乳鉢中研令細方入水銀及諸藥同研令極細入白蜜調和令稀稠得所入瓷閣中盛每至臨臥時塗面䵟𪒟處治面䵟𪒟塗之令光白潤澤杏仁膏方杏仁湯浸去皮尖雙仁一兩半雄黃一兩瓜子一兩白芷一兩零陵香半兩白蠟三兩上六味除白蠟外併入乳鉢中研令細入油半升並藥內鍋中以文火煎之候稠凝即入白蠟又煎攪勻內瓷閣中每日先塗藥後敷粉大去䵟𪒟治面䵟𪒟塗之令光白潤澤羊髓膏方羖羊脛骨髓二兩丹砂研半兩雞子白二枚上三味先將髓並丹砂入乳鉢中研令極細以雞子白調和令勻入閣中盛每用時先以漿水洗面後塗之治面䵟𪒟塗之令光白潤澤丹砂方丹砂一兩研細上一味入白蜜少許更研如膏入閣中盛每至臨臥塗面明旦以漿水洗之治面䵟𪒟令光白潤澤益母草塗方益母草灰一升上一味以醋和為團以炭火煅七度後入乳鉢中研細用蜜和勻入閣中每至臨臥時先漿水洗面後塗之大妙點黶子方取落藜灰少許淋取灰汁於銅器中重湯煎如黑餳以針微撥破黶子令藥得發動點之大者不過一點點黶子方取糯米十餘粒於濕石灰中埋之以爛為度針挑破黶子敷之經宿即落面皯皰論曰面皯皰者面生齄疱細起如粟谷狀由風熱相搏而生蓋諸陽在於頭面風熱乘之結而不散故成皯皰養生方說醉不可露臥及飲酒熱未解冷水洗面令人面發瘡輕為齄疱正謂此也治面皯皰令光白黃連散方黃連去須十五兩木蘭皮十兩大豬肚一個去筋膜上三味將二味搗羅為末內豬肚中縫合口入五斗米甑內蒸令熟取出細切曝乾搗羅為散每服二錢匕溫水調空心臨臥服治面皯皰令光白冬葵子散方冬葵子炒研柏子仁別研白茯苓去黑皮各三兩上三味搗研為散每服二錢匕溫酒調下食後臨臥治面皯皰令光白塗面玉屑膏方玉屑珊瑚木蘭皮各三兩辛夷去毛白附子炮芎藭白芷各二兩冬瓜子牛脂豬脂臘月收者各十八兩商陸切碎五兩桃仁湯浸去皮尖別研五兩上一十二味除牛豬脂入鍋中化成油外諸藥同搗研為細末入脂油內以文火煎令稀稠得所濾去滓瓷閣中盛每洗面後塗藥大去皯皰治面皯皰令光白塗面麝香膏方麝香研半兩附子炮裂去皮臍當歸切焙芎藭細辛去苗葉杜蘅白芷芍藥各一兩臘月豬脂一斤以水浸去赤汁上九味先將豬脂入鍋中化成油余藥並銼如小麥大入脂油中以文火煎稀稠得所濾去滓入麝香攪勻傾入瓷閣中收每塗藥先以漿水洗面治面皯皰令光白塗面白芷膏方白芷白蘞各三兩白朮三兩半白附子炮一兩半白茯苓去黑皮一兩半白芨細辛去苗葉各三兩上七味搗羅為末用雞子白搜和勻丸如彈子大瓷閣中盛每臥時先洗面後取一丸以漿水研化塗面明旦並華水洗之不過七日大效治面皯皰令光白塗面礬石散方礬石燒令汁盡白石脂各一分白蘞三分杏仁湯浸去皮研半兩上四味並研為散以雞子白調令勻入瓷閣中盛臨臥時先用漿水洗面後塗藥明旦以井華水洗之治面皯皰令光白浮水膏方水萍曝乾五兩上一味搗羅為末以白蜜稠和稀稠得所入瓷閣中盛每臥時塗面面齄疱論曰諸陽皆會於面風邪熱氣客於膚革不能流通因發為齄疱形似米粟色有赤白亦有緣醉酒露臥及飲酒未解以冷水洗濯而得之者率由風熱在皮膚間外感冷氣擊搏而成治面齄疱柏子仁散方柏子仁研冬瓜子炒冬葵子炒白茯苓去黑皮各三兩上四味搗研為散每服二錢匕以溫酒調服食後日午臨臥各一服治面齄疱木蘭膏方木蘭皮防風去叉白芷留兩小塊子驗藥熟辛夷去毛木香牛膝酒浸切焙獨活去蘆頭藁本去土芍藥白附子炮杜蘅當歸切焙細辛去苗葉芎藭各一兩麝香研半兩臘月豬脂二斤以水浸去赤汁上一十六味除麝香豬脂外並銼碎先將豬脂入鍋中令銷下諸銼藥以文火煎三上三下候白芷塊子黃色膏成用新綿濾去滓入麝香攪勻稀稠得所瓷合盛每臨臥時先以溫漿水洗面後塗膏日三次治面齄疱白芷膏方白芷留兩小塊子驗所煎膏白蕪荑木蘭皮細辛去苗葉藁本去苗土白附子炮各三分芎藭半兩防風去叉半兩丁香零陵香松花麝香研各一分熊脂三斤如無以酥代上一十三味除麝香熊脂外並銼碎入淨器中以酒二升浸一宿先將熊脂入銅鐺中化令銷次下酒中諸藥以文火煎之三上三下候白芷黃色膏成用新綿濾去滓入麝香攪勻稀稠得所瓷合盛每臨臥時先以澡豆溫漿水洗面後塗膏大效治面齄疱杏仁膏方杏仁湯浸去皮尖研半兩硫黃研一分密陀僧研半兩硇砂研一錢白鵝脂煉成油二兩上五味除鵝脂外再同研如粉入鵝脂油更研令勻傾入瓷合子坐煻灰火中養之攪令稀稠得所成膏每臨臥以紙拭疱令乾塗之治肺藏風毒及過飲成齄疱防風散方防風一兩去蘆頭石膏二兩細研水飛過小荊子一兩梔子仁一兩薺苨一兩枸杞子一兩微炒白蒺藜一兩微炒去刺甘草半兩炙微赤銼上八味搗羅為末每服二錢匕溫水調下食後日二面齄論曰面齄者是粉刺也面上有齄如米粒此由膚腠受於風邪搏於津脈之氣因虛而作亦邪入虛肌使之然也治婦人面上粉齄赤膏方光明砂四分研麝香二分牛黃半分水銀四分以面脂和研雄黃三分上五味搗研如粉面脂一升內藥中和攪令勻如敷面脂法香漿水洗塗藥避風經宿粉齄如蔓荊子狀自落大效治麵粉齄白蘞膏塗方白蘞白石脂杏仁湯浸去皮尖雙仁研各半兩上三味搗羅為末更研極細以雞子白調和稀稠得所瓷合盛每臨臥塗面上明旦以井華水洗之良治麵粉齄如麻子丹砂散方丹砂研桃花陰乾各五兩上二味先將桃花研令如膏次入丹砂同研極細每服一錢匕空心井華水調下治麵粉齄菟絲汁塗方菟絲苗一握上一味搗絞取自然汁塗面上不過三五次效治麵粉齄㾦癗萱草膏塗方萱草花曝乾七兩白蜜三兩上二味搗羅萱草花極細與蜜調研令勻入瓷閣中每旦洗面後看多少塗面上治麵粉齄㾦癗土瓜膏塗方土瓜根二兩上一味搗羅為細散以漿水和研成膏入瓷閣中盛每臨臥以漿水洗面後塗少許治麵粉齄㾦癗如麻子石粟膏塗方石灰二兩粟米二合上二味將石灰羅細同粟米內瓶中以水浸經三宿取出研如膏曝乾重研如粉以面脂調勻入瓷閣中盛每洗面訖拭面塗之面體疣目論曰風邪入於經絡氣血凝滯肌肉弗澤發為疣目或在頭面或在手足或布於四體其狀如豆如結筋綴連數十與鼠乳相類故謂之疣目去疣目方松脂柏脂上等分合和塗之一宿失矣又方豬脂上一味於癢處揩之令少出血即瘥又方石灰二兩上一味以苦酒漬七日滴汁點疣上即落又方牛口中涎上一味數塗疣上自落又方艾上一味作炷於疣目上灸之三壯即除又方杏仁二十枚上一味燒令黑研如膏塗疣目上狐臭論曰陰陽之在人血與氣爾兩者調適則行流散徒莫或底滯達於形色暢於膚理無不得其和苟失其宜血氣從而凝積此所以有狐臭之病其候不一有曰狐臭有曰體臭有曰漏腋狐臭者指其腋間體臭者舉其大概漏腋則又言其濕而生瘡者不可不辨也治腋氣纍醫不退至效石緑散方石緑三錢細研膩粉一錢半上二味同研令勻先疏疏拔去腋下毛然後以醋和藥末熟摩令熱立效治丈夫婦人腋氣不可近者方上以開通錢四十九文用銅箸穿入炭火內燒赤醋浸四十九次碾羅為細末入麝香一分研和勻先用熱酒洗腋下後將藥末揩腋下七次永除臭氣治腋氣人不可近者方石灰二兩桑柴灰一兩炭灰一兩雌黃二兩上四味同研為末水調塗於腋下可一食久即以柳木篦子刮藥其腋下毛並落然後用四灰散治腋氣四灰散方粉霜艾人灰礬石灰鉛灰無即用胡粉密陀僧代之上四味唯艾人灰稍多余並等分研令極細先以醋漿水洗拭乾即敷之不過三五上永除臭氣如要試但敷藥蒜上良久自無臭兼治腳汗治血氣蘊積成狐臭蟬殼膏方蟬殼四十九枚烏梅七枚去核微炒緑礬一兩繭滷一合青古錢七文杏仁七枚湯浸去皮上六味除錢外搗羅極細人滷中調之先以皂莢水洗拭乾用錢腋下摩之候熱稍拔去腋下毛即以藥塗之仍用膩粉復其上三兩度便愈治腋下濕汗不止及足心手掌陰下股里常如汗濕臭者方干薔薇根銼干枸杞根銼甘草炙各半兩商陸銼胡粉研滑石研各一兩上六味先將四味搗羅極細即入研者二味拌勻以苦酒少許和塗當微出易衣復更塗之不過三敷愈治腋下手掌足心常如汗出而臭者銀粉膏方水銀胡粉各一分上二味研令極細以面脂研和塗之治七竅臭氣丁沉丸方沉香一兩丁香半兩甘草炙半兩白瓜子仁一兩藁本去土三分當歸切焙芎藭麝香研各半兩上八味搗羅七味為細末後入麝香拌勻煉蜜和丸如小豆大每服溫酒下二十丸日三含化令人遍體俱香十香丸方沉香銼白檀香銼木香零陵香甘松去土藿香白芷細辛去苗葉芎藭檳榔銼肉豆蔻去殼各一兩龍腦研麝香各一分別研丁香雞舌香各半兩上一十五味除別研外同搗羅為末入腦麝拌勻煉蜜和丸如雞頭大每日三四度用綿裹一丸含化咽津滅瘢痕論曰風熱諸毒留於腑臟發於肌肉而為瘡癤病折瘡愈餘毒未殄故瘡痂雖落而瘢痕不滅治法既有塗澤膏潤之劑亦須賴營衛平均肌溫氣應外宜慎風冷也治面上瘢痕塗之白殭蠶膏方白殭蠶炒半兩白魚十枚白石脂白附子炮鷹屎各一分臘月豬脂二兩上六味除豬脂外搗羅為細末研以豬脂和令勻瓷閣中盛旋取敷瘢痕上避風治面上瘢痕塗之辛夷膏方辛夷一兩鷹屎白杜若細辛去苗葉各半兩白附子三分上五味除鷹屎外並銼碎以酒兩盞浸一宿別入羊髓五兩銀石鍋中以文火煎得所去滓將鷹屎研如粉內膏中攪勻再以微火暖入閣中每日三塗瘡瘢上避風治面上瘢痕塗之當歸膏方當歸白芷烏雞糞以豬脂三斤飼雞三日令盡收其糞各一兩鷹屎白半兩與雞屎同研細上四味先將當歸白芷銼碎酒浸一宿別熔豬脂一斤消後入浸藥並酒文火煎之候白芷黃色去滓將雞屎鷹屎內膏中攪勻傾入瓷閣中每日三塗瘢痕上避風治面上瘢痕塗之臘脂膏方臘月豬脂四升大鼠一枚上二味入鐺中以文火煎之待鼠銷盡以新綿濾去滓入瓷合盛每用先以布拭令瘢痕色赤次以膏塗之三五度瘥避風治瘡瘢痕無問新舊塗之雞子膏方雞子五七枚上一味熟煮取黃於鐺中炒如黑脂膏以物先揩瘢痕然後塗膏日三久即自滅治面上瘢痕凸塗之麥麨散方上秋冬以小麥麨春夏以大麥麨細搗為散以酥和封瘢痕上治面上瘢痕真玉磨方真玉上取平處一面磨瘢痕久則無痕髭發門眉髯髭發統論論曰足太陽血氣盛則眉美足少陽血氣盛則髯美足少陰血氣盛則發美手陽明血氣盛則髭美夫經絡所至不同血氣各有所屬眉髯發髭率本於經絡之血氣或黑或紺或黃或白可以知盛衰蓋血氣在人猶水之津也髭發猶津之有彡也津之槁澤而彡隨之則髭發本血氣可知矣烏髭發論曰發本於足少陰髭本於手陽明二經血氣盛則悅澤血氣衰則枯槁容貌之間資是以賁飾則還枯槁為悅澤法烏可廢潤顏色烏髭鬢天麻丸方天麻二兩木香玄參地榆烏頭炮裂去皮臍附子炮裂去皮臍各半兩血竭一錢上七味搗羅為末用白沙蜜一盞河水一盞一處熬沸去沫蜜熟和藥丸如小豆大每服二十丸空心木香酒下治髭發枯槁桂心丸方桂去粗皮旱蓮子草香白芷菊花旋覆花巨勝子蓽澄茄牛膝酒浸去皮各一兩上八味搗為羅末煉蜜和丸如梧桐子大每服三十丸鹽湯下不拘時治髭發黃悴秦椒丸方秦椒去目及閉口炒出汗生乾地黃焙旋覆花白芷各一兩上四味搗羅為末煉蜜和丸如梧桐子大每服三十丸米泔水下染髭黑方蕎麵針沙醋炒為末各二錢上二味先用醋和漿水洗髭後用藥塗畢外用荷葉裹之約一更時卻洗去再用後方後方無食子訶黎勒皮各二兩上二味搗羅為末每用二錢大麥面二錢醋和漿水調塗髭上外以荷葉裹至曉洗去烏髭發地黃丸方生地黃汁一升生薑汁五合巨勝子熟乾地黃焙旋覆花干椹子各一兩上六味除二味汁外搗羅為末先將前二味汁用銀器煎熟看稀稠將藥末和丸如彈子大每夜飲酒半酣後含化一丸烏髭方晚蠶砂一升麻糝心七兩大栝蔞一枚去瓤肥皂莢一挺青鹽三兩半上五味以瓷罐子一枚盛藥鹽泥固濟頂上留一眼子出煙用炭十斤燒盡煙絶候冷取出入苦參末五兩同搗羅為末每洗漱及臨臥時用一錢揩牙烏髭鬢揩牙法升麻一兩訶黎勒二枚去核為末白鹽花半兩麻糝末四合取第一遍打者生乾地黃十二分肥者細切粟饙飯一合丹砂一兩研臨燒時以沙牛糞汁調之免飛上上七味拌勻於淨砂瓶中盛密封頭遍泥陰乾入爐中四畔以炭火周回燒半時辰收之研為末每用揩齒揩齒法欲使藥時先用生薑一塊如杏仁大爛嚼須臾即吐卻滓以左手揩三五遍就濕點藥末揩十數遍含津不得吐以兩手取津塗髭鬢待辛辣定細細咽之此藥兼治腳氣腸風駐顏益氣若能勤行一生白髭鬢一百日卻黑赤者五十日黑用藥二十日便見效若能空心三遍用食後更用之見效尤速揩牙烏髭方栝蔞實一枚大者杏仁以填實栝蔞為度上將栝蔞實於蒂畔切開不得切斷入杏仁填實用鹽泥固濟木炭火煅存性去泥細研早晨及臨臥揩齒良久用溫鹽湯漱口不必漱盡半年見功至老不復白揩牙烏髭方皂莢懷州者十條上以地黃自然汁生薑自然汁各半盞和勻旋刷皂莢於火上炙以二藥汁盡為度碾細為末入青鹽拌勻逐日如齒藥用經旬見功鬚髮黃白論曰足少陰血氣盛則發潤澤而黑足太陽血氣盛則須潤澤而黑二經血氣虛乏則鬚髮變為黃白然則還其潤澤復其紺黑雖有傳染之法曾不如益血補氣為常服劑蓋血氣調適則滋澤外彰其視敷染之功遠矣治髭發黃白可變令黑菟絲子丸方菟絲子酒浸三日別搗地骨皮各三兩枳殼去瓤麩炒八兩生牛膝搗絞取汁半升生地黃搗絞取汁半升上五味將前三味搗羅為末以牛膝地黃汁和作餅子曝乾再搗羅煉蜜丸如梧桐子大每服十五丸早食後溫酒下如心中熱米飲下治髭發白能變令黑人參丸方人參五兩熟乾地黃焙天門冬去心焙白茯苓去黑皮各十兩胡麻仁湯浸去皮炒五升上五味搗羅為末煉蜜丸如梧桐子大每服十丸早食後溫酒下治髭發白可變令黑胡麻丸方胡麻仁炒杏仁去皮尖雙仁炒研各三兩黑豆黃二兩桂去粗皮一兩生地黃搗絞取汁一升上五味先將地黃汁入銀鍋中煎三兩沸次入杏仁膏余藥並搗羅為末投入同煎令稠丸如梧桐子大每服十丸早食後溫酒下臨臥再服治髭發白可以變黑乾漆丸方乾漆炒令煙盡柏子仁微炒生乾地黃焙熟乾地黃焙各一兩上四味搗羅為末研糯米飯和搗三五百杵塗酥丸如梧桐子大每服二十丸空心溫酒下治髭發白可還黑色蜀椒丸方蜀椒去目並閉口者杏仁去皮尖雙仁各八兩熟乾地黃一斤上三味先銼地黃入淨瓷器中以酒一升浸一宿取出與杏仁同研如膏次用炭火燒地令赤以釅醋潑乘熱將椒置其上以盆復之四面泥塗令勿透風候冷取出搗羅為末合和前膏入糯米飯一升同搗三百杵丸如梧桐子大每服三十丸空心溫酒下治人年四十髭發俱白還黑地黃丸方生地黃肥者銼五斤五加皮銼牛膝酒浸焙各五兩上三味先將地黃入淨瓶中以酒五升浸一宿取出曝乾入甑中九蒸九曝後同後二味搗羅為末煉蜜丸如梧桐子大每服二十丸空心溫酒下治鬚髮黃白令還黑色酸榴漿方酸石榴上五月內於東南枝上揀平坐不側而大者一枚於頂上箸札眼子深一寸余用水銀半兩灌於眼子內不得封閉從風日雨露至十月葉落盡時取下殼內盡成水每用時以魚胞裹指頭點藥捻之治鬚髮黃白一宿烏方定粉石灰各一兩鉛丹半兩膩粉五錢匕上四味研極細臨臥以酒漿調塗仍以荷葉包平旦溫漿水洗治須黃白揩牙槐枝散方槐枝如箸大者青鹽胡麻子仁炒黑色生乾地黃各一兩皂莢不蚛者去皮子二挺上五味銼碎入瓷瓶中用瓦片蓋紙箸泥固濟仍蓋上留一穴如錢眼大候乾以文武火燒煙盡放冷為末每旦揩牙畢余藥塗須上少頃洗之治鬚髮黃白變令黑色倒行油方上取銀三兩作小合子盛汞一兩以乾水蛭七枚為末同入合內用蚯蚓泥固濟約半指厚深埋在馬糞中四十九日取出已化為黑油矣用魚胞裹指頭點藥捻之治須黃白揩牙栝蔞散方上取栝蔞實一枚開頂作蓋子取出瓤並子用青鹽一兩細研杏仁去皮尖三七粒同栝蔞瓤並子納入栝蔞內卻將頂蓋蓋了麻線系定鹽泥固濟炭火煅煙盡去泥取藥為末早夜揩牙榮養髭發論曰腎主骨髓腦為髓海發者腦之華髓之所養也衝脈為經絡之海其浮而外者循腹上行會於咽喉別絡唇口血盛則滲灌皮膚生毫毛此髭發所本也若髭發不生或生而黃悴則以腦虛沖脈衰無以榮養故也榮養髭發固牙齒補益血氣三倍丸方丹砂研一兩磁石煅研二兩陳曲炒研三兩上三味搗研為末細羅別以豬腎三隻去脂膜用濃酒二升熬腎爛去腎取酒和藥末丸如緑豆大空心溫酒或熟水下二十丸榮養髭發堅齒牙補血氣益顏色延年地黃丸方生地黃三十斤搗取汁杏仁三升去皮尖雙仁點地黃汁研如膏烏麻油一升點地黃汁研絞取汁胡桃瓤一斤同杏仁別研大麻油一升丁香木香牛膝切人參白茯苓去黑皮各三兩箋香沉香銼安息香搗如棋子水煮爛各二兩無食子訶黎勒皮各五兩柳枝皮炙乾鹽花各三兩松脂以布袋盛湯煮精好者自化出湯冷自凝如未白更換布袋煮極白取八兩龍腦研一分白蜜一升酥一斤上二十一味將搗研藥令極細同諸藥與地黃汁調如膏瓷瓶盛分三瓶每瓶約七分不欲令滿坐爐中磚上四面用火候瓶中藥沸即以柳枝攪欲干旋添地黃汁盡為度時時抄看可丸乃止候冷收藥以蠟紙蓋頭勿令泄氣每食後含化一丸如彈丸大咽津日三夜一十日覺百日大效初服藥處淨室一月忌萊蔔藕蒜常食少生薑即速效治腦虛髭發枯悴目暗槐實膏方槐實去皮取黑者炒搗末一合馬牙硝研三錢生地黃搗取自然汁一合酥煉一兩上四味以銀石器盛地黃汁文武火上先下槐實末次下馬牙硝不停手攪常令如魚眼沸候煎減一半即下酥更煎三二十沸傾出置瓷閣中每臨臥以棗核大內鼻中取去枕仰臥展足腦中出惡水勿怪榮養髭發槐桃膏方瓦松半生半燒灰鐵粉鏵鐵醋淬十遍搗研羊糞半生半燒灰槐枝細銼各一兩胡桃仁一斤上五味除瓦松等三味外將胡桃仁與槐枝搗作一團填小瓶中令實又取槐枝斫長二寸密插於瓶中與瓶口齊更取一瓶子須盛得前藥瓶子者勘合然後穿地坑陷空瓶子與地面齊其向上瓶子即擁馬糞火燒一宿候冷開之其向下瓶子中漏有油清則取此油調前三味塗頭每日淨洗再換藥榮養髭發汞蛭油方汞一兩乾水蛭七枚為末上二味以銀三兩作一小合盛汞與水蛭以蚯蚓土和泥固濟約半指厚深埋在馬糞中四十九日取出化為黑油用魚胞作指袋時蘸少許拈髭上其油自然倒行至髭根變黑榮養髭鬢牢牙烏金散方草烏頭四兩青鹽二兩上二味將青鹽為末同入藏瓶內用瓦子一片蓋瓦上鑽一竅外用紙筋泥固濟仍留元竅候乾用火煅黑煙盡青煙出為度以新黃土罨一宿取出為末逐日未洗面前揩牙候洗面了方漱日三榮養髭鬢石榴漿方每於五月內揀取新生酸石榴東南枝上平坐不側大者於頂上用箸札眼子深一寸以上用水銀半兩灌眼子內更不封閉從風日雨露直至十月葉落盡方取下殼內盡成水每用以小豬胞代指於汁內旋蘸捻之隨手以水濯其色不落可百日不變也榮養髭發三物膏方柳枝桑枝槐枝各銼一升上三味以水二斗同煮至一斗去滓入好鹽一斤熬成膏瓷合盛臨臥揩牙榮養髭發胡桃膏方新小胡桃三枚上一味和皮搗細用乳汁二盞於銀石器內文武火熬竹篦攪成膏每用時淨洗髭發以筆蘸點髭發上白禿論曰蟯之為害因血氣虛乘風而上則能生瘡疽癬瘑疥無不為也瘡痂不去而癢鬢髮禿落無復生榮是為白禿治頭瘡有蟲變成白禿細辛膏方細辛去苗葉烏喙莽草續斷石南辛夷仁皂莢澤蘭去苗白芷防風去叉白朮松葉竹葉各二兩豬脂半斤生麻油一斤上一十五味除脂油外細銼以醋五升入瓷瓶中水浸一宿取出用大鐺先下脂油微火煎一兩沸次下諸藥煎候白芷黃即膏成去滓以瓷合盛臨臥時先以熱漿水洗頭後用藥塗勻如癢勿搔動經宿即洗去再塗治白禿杜蘅膏方杜蘅雄黃研木蘭皮銼礬石研附子炮裂去皮臍大黃銼炒石南秦艽去苗土真珠研苦參水銀松脂各六兩豬脂去膜五斤上一十三味先將草藥搗羅為細末次將石藥及水銀合研如粉方熬豬脂松脂化次下諸藥文武火煎令稀稠得所以新綿濾去滓瓷合盛貯每用先以泔漿水洗頭淨後塗藥治白禿髮落五味子膏方五味子肉蓯蓉切焙松脂蛇床子遠志去心各三兩菟絲子五兩以酒浸一宿焙雄黃研雞糞白雌黃研白蜜各一兩豬脂二升上一十一味先將草藥搗羅為細末次將石藥及雞糞白再研令如粉下豬脂松脂入鍋中同熬化後下諸藥文火煎稀稠得所以新綿濾去滓瓷合盛每用先以桑柴灰汁洗頭令淨後塗藥不過三次發生治白禿髮落防風膏方防風去叉黃連去須生乾地黃焙各四兩蔓荊實九兩柑皮焙一兩半葳蕤二兩半茯神去木三兩半大黃銼炒甘草炙銼各二兩上九味搗羅為末煉蜜丸如梧桐子大每服二十丸空心粥飲下治白禿髮落升麻膏方升麻薺苨莽草各二兩白芷一兩防風去叉三兩蜣螂四枚別研馬鬐脂熊脂豹骨髓各半升上九味先將草藥搗羅為細末次將三味脂熬消後下諸藥以文火煎令稀稠得所綿濾去滓瓷合盛每用先以泔漿水洗頭淨後塗藥治白禿髮落桃皮湯沐發方桃皮去粗黑色者銼三兩面炒豉炒研各半兩白米研一合上四味以水一斗煮取八升去滓放溫沐頭每日用之治白禿髮落桃皮膏方桃皮去粗黑者五兩銼以水一斗煮取五升去滓先溫吃半盞餘留洗頭豉炒研半兩白麵炒半兩上三味先以桃皮汁洗頭並吃訖後以水調豉面末敷之赤禿論曰諸陽脈皆在於頭風熱乘之則陽邪熾盛發於頭皮腦絡之間細瘡遍密赤色有汁癢痛浸淫乃至發落故名赤禿治赤禿髮落塗旱蓮汁方旱蓮草三兩鐵粉一分上二味先將旱蓮草搗絞取汁次入鐵粉研令極細入閣中每用先以泔漿洗頭次塗之治赤禿髮落塗馬蹄灰方馬蹄燒灰上一味研如粉用臘月豬脂調塗之治赤禿髮落塗椹汁方黑椹二斗上一味內瓷瓶中密封於北檐下埋之一百日即變為水每用淨洗頭次塗發即生治赤禿髮落塗楸葉汁方楸葉一兩上一味搗絞取汁敷之
