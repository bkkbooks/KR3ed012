兩半紫菀蜀漆麥門冬去心焙甘草炙各一兩上八味搗羅為末煉蜜丸如梧桐子大每空腹米飲下二十丸日二服治傳屍勞骨蒸參連丸方苦參一兩半黃連去須三兩三分栝蔞根牡蠣煅知母焙麥門冬去心各一兩三分焙上六味搗羅為細末煉蜜丸如梧桐子大每食後米飲下十丸日二服傳屍勞論曰傳屍勞者骨蒸之病流傳五臟也其證殗殜半臥半起旦即醒然午後微熱情常不悅心多驚悸夜即盜汗夢與鬼交兩頰紅赤唇如血色欲睡不得眠欲食不能食或喘急咳嗽心胸滿悶背膊煩疼兩目精明四肢無力脊膂拘急膝脛痠疼兩肋虛脹時或微利鼻乾口燥漸至尪羸雖死在須臾精神尚爽是其候也治之若緩猶如水涸不覺其死治傳屍伏連殗殜骨蒸痃癖冷氣五屍注相染及蠱注溫瘧注忤心痛卒死疫癘大驗獺肝金牙散方獺肝一具炙乾金牙研丹砂水飛研貍骨炙搗研牛黃研麝香研龍膽白薇附子炮裂去皮臍當歸水洗切焙乾蒲黃炒鬼督郵銅照鼻燒醋淬碎苦參龍骨研沙參蜈蚣炙去足蜀椒去目及閉口者炒出汗丹參各半兩寒水石燒研禹餘糧燒紅醋淬硝石研玄參牡丹皮鬼臼各一兩人參鱉甲去裙襴醋炙乾薑炮裂各一兩一分菴䕡子三合上二十九味搗研為細散一處再研勻如粉每服一錢匕熟水調下空心夜臥各一服漸加至一錢半匕治傳屍勞殗殜喘急咳嗽心胸滿悶漸至羸瘦安息香湯方安息香麝香研各一錢天靈蓋酥炙黃二兩秦艽去苗土鱉甲去裙襴酥炙令黃當歸切焙柴胡去苗各一兩上七味粗搗篩每服四錢匕童子小便一盞半蔥白五寸桃柳枝各七寸生薑錢二片同煎至八分去滓不計時候服夜臥時再煎放患人床頭至五更形於夢寐此是藥效也治傳屍勞情思不悅心多驚悸盜汗羸瘦通神丸方兔糞七七粒胎髮二七人小兒胎髮人手指甲七七片人腳趾甲七七片天靈蓋一枚圓者穿山甲七七片硇砂半兩通明者紫河車一具以上八味入瓦器內鹽泥固濟穿一地竅方圓一尺將藥瓶在地竅內用槐木火圍定藥瓶燒一日取出細研再入後藥雄黃研鬼臼炒搗末鬼箭羽炒搗末麝香研丹砂各一兩研上一十三味將後五味末與前燒者藥合和再研勻煉蜜丸梧桐子大別用丹砂為衣每服十丸漸加至二十丸米飲下日進二服早晚食前服合用上寅日不令婦人雞犬見治五勞乾瘦及傳屍夢寐不祥日漸消瘦肌體困倦骨節疼痛不思飲食鱉甲湯方鱉甲去裙襴酥炙令黃色一兩天靈蓋酥炙黃色半兩柴胡去苗赤茯苓去黑皮各三分安息香半兩地骨皮三分山梔子仁人參各半兩貝母去心桃仁去皮尖雙仁麩炒各半兩麥門冬去心焙三分阿魏用麵裹煨令熟半分黃連去須半兩生乾地黃三分檳榔銼當歸銼焙各半兩上一十六味粗搗篩每服四錢匕童子小便一盞半蔥白五寸桃柳枝各七寸生薑二片同煎至八分不計時候去滓溫服夜後煎下放患人床頭至五更夢寐非常此是藥效也治傳屍勞病痿羸兩臉常赤喘急咳嗽心胸滿悶四肢無力夢與鬼交釣蟲丸方磁石細研生用硇砂湯熬令熟各二兩龍骨三兩膩粉半兩麝香取末七兩上五味為細末一處和勻以黃蠟四兩煉入諸藥丸如梧桐子大用線子五七寸一頭系錢一文一頭穿藥丸子令患人空心新水吞藥丸子其錢在口外候噁心時以手拽線子吐下藥並蟲吐出在藥上急用油炸蟲死立效治傳屍勞病胸滿短氣肌體羸瘦無力喘咳不已阿魏散方阿魏研安息香入胡桃仁相和研各一分甘草炒銼各半兩豬牙皂莢塗酥炙令黃去皮子一兩木香天靈蓋塗酥炙令黃色半兩豉一合麝香研半錢上八味除研藥外搗羅為散與研藥相和令勻每服五錢匕用童子小便一盞半入蔥白三寸明日五更煎至一盞空心任意服之日午夜食後再服服藥後良久或得吐亦佳有利下蟲如發或積聚五色穢惡物是病根出服藥數日如夢與人離別哭泣者瘥之兆也患甚三日一劑三劑瘥有患者但收拾藥物置病人床頭邊如有此夢瘥治傳屍面黑頭熱痛胸背氣結咯唾黏痰食少咳嗽喘息急心滿脅肋氣脹腰臍下疼四肢蒸熱痿困不安黃連丸方黃連去須二兩半獺肝炙令乾貝母去心大黃銼炒龍膽去蘆頭各一兩半紫菀去苗土旋覆花茯神去木各一兩天靈蓋塗酥炙令黃色檳榔微煨銼各二兩上一十味搗羅為細末煉蜜為丸如梧桐子大每日食後煎漿水下二十丸日午再服女子血閉加黃芩一兩治骨蒸傳屍出蟲下積惡物雄黃散方雄黃研雌黃研代赭石研各一兩丹砂研二兩以上四味以醋相和炒令乾後以水飛過去卻醋味焙令乾研如粉入後藥相和蝦蟆炙天靈蓋炙黃搗末麝香研青黛各半兩研巴豆七枚水煮一復時去皮尖心膜研上九味搗研後五味為末入前四味更研令勻以粟米飯為丸如梧桐子大每日空腹熟水下七丸若要下蟲即以砂糖水下二丸服至三日滿出蟲用茅香二斤煮湯沐浴一宿後看在水上或在水下澄之可驗治傳屍病遁注骨蒸伏連殗殜此病多因臨屍哭泣屍氣入腹連綿或三年五年有能食不作肌膚或三日五日有微勞即發大都當額頭間骨尋常熱熻熻然死後家中更易一人如此乃至滅門獺肝丸方獺肝一具炙令乾鱉甲一枚去裙襴醋浸炙黃野狐頭骨一枚炙令黃色防己一兩半紫菀去苗土蜀漆葉麥門冬去心焙甘草炙銼各一兩上八味搗羅為細末煉蜜丸如梧桐子大每服米飲下二十丸日午再服治傳屍多服冷藥旬月未愈或損脾臟致食少難消氣滿兼利溫脾陳曲丸方陳曲末炒令黃色五兩白朮一兩附子炮裂去皮臍三兩枳殼去瓤麩炒令黃色一兩甘草炙銼乾薑炮裂人參各二兩食茱萸水淨洗焙乾炒桔梗炒各一兩上九味搗羅為細末煉蜜為丸如梧桐子大每日空心米飲下二十丸夜臥再服漸加至三十丸治傳屍勞乏鬼注殗殜肌體羸瘦丹砂丸方丹砂研一兩麝香研三分桃仁湯浸去皮尖雙仁者生研十枚上三味相和研令細煉蜜丸梧桐子大每日空心粟米飲下七丸夜臥再服治傳屍勞氣滿喘咳大腸秘澀羸瘦無力祛邪飲方檳榔煨大黃銼炒各一兩阿魏研一錢丹砂研麝香研秦艽去苗土各一分上六味除麝香丹砂外細銼如麻豆大相和令勻分為五服每用東南桃柳梢各七枚各長一握細銼青蒿一握以童子小便一升半隔夜浸至來日五更雞鳴時並藥同煎十餘沸傾出將細絹濾過分為兩服空腹相次服之至明即轉下惡物似頭髮馬尾魚腦轉不止自住宜食軟飯粥將息七日後用勞藥補之治傳屍勞瘦骨蒸伏連殗殜命在須臾精神尚爽鉤藤湯方鉤藤黃芩去黑心升麻甘草炙令赤色銼各一兩鱉甲去裙襴醋浸炙令黃色丁香各半兩大黃銼微炒四兩上七味粗搗篩每五錢匕用水一盞半煎至一盞去滓每日食後分溫二服相去如人行七八里再服之治一切虛勞傳屍骨蒸盜汗牡蠣粉方牡蠣熬研粉麻黃為末不去節三兩白米粉各三合蒺藜子炒去刺為末二兩丹砂熟飛研半兩胡燕屎乾者一兩上六味同和研勻以生絹袋盛夜臥汗出以粉身時時用甚佳治肺痿客忤鬼氣傳屍伏連殗殜及卒得心痛霍亂吐利時氣諸瘧瘀血月閉痃癖疔腫驚邪氣狐魅瘴癘諸疾蘇合香丸方蘇合香白朮丹砂研沉香銼訶黎勒肉丁香木香莎草根白檀香乳香蓽茇犀角鎊安息香各一兩麝香研龍腦研各半兩上一十五味搗研為末煉蜜和丸如雞頭實大每服一丸溫酒或人參湯嚼下一名白朮丸此藥大能安氣血卻外邪凡疾自內作不曉其名者服此往往得效唯治氣注氣厥氣逆氣不和吐利營衛阻塞尤有神功人家不可無此藥以備急難闢疫尤驗倉卒求人參不得只白湯亦佳勿用酒古方雖云用酒下酒多不效昔有人病瘵日漸羸削至於骨立肌熱盜汗勞狀皆具凡服八九兩所苦都瘥一方有牛黃半兩古方本無乃後人加之治傳屍勞病並諸冷熱勞疾日月將久面色萎黃漸漸羸瘦等獺肝丸方獺肝一具生用柴胡去苗青蒿肉蓯蓉去皴皮酒浸切焙黃耆銼各二兩半黃連去須炒知母木香桃仁去皮尖雙仁炒地骨皮附子炮裂去皮臍桂去粗皮天靈蓋炙陳橘皮去白炒當歸切焙澤瀉生乾地黃焙甘草炙銼各一兩檳榔銼柏木脂研各一兩半上二十味搗羅為末煉蜜和丸如梧桐子大每服空心酒下四十丸治傳屍屍注心神錯亂狂言驚悸夢與鬼交阿魏丸方阿魏醋化去沙石面和作餅炙半兩安息香酒浸研如粉一兩甘草炙銼木香檳榔銼各半兩豉一合炒豬牙皂莢十四挺去皮子塗酥炙天靈蓋醋炙麝香研人中白研各一分上一十味搗羅為末煉蜜和丸如梧桐子大用童子小便浸烏梅三枚碎蔥白三莖切同煎下二十丸五更初服
