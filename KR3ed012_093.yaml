body:
  text: 卷第九十三骨蒸傳屍門虛勞五蒸論曰虛勞骨蒸者本熱勞之氣染著氣血深連骨髓侵傷五臟久不已各隨其臟氣之虛熏蒸而成疾也骨蒸者本於腎其證早涼晚熱煩躁寢不安食無味小便赤細喘無力腰疼腳冷手心常熱蒸盛之時蒸過傷內變為疳蝕入五臟脈蒸者本於心其證日增煩悶擲手出足渴欲飲水唾白沫睡語驚恐脈數蒸盛之時亦變為疳臍下悶或暴利不止皮蒸者本於肺其證大喘鼻乾口燥舌上白小便如血蒸盛之時胸滿兩脅下脹大嗽背胛疼臥不安毒傷臟則唾血肉蒸者本於脾其證體熱如火煩躁無汗心腹臌脹食即欲嘔小便如血大便秘澀蒸盛之時身腫目赤臥不安血蒸者肝氣虛也肝虛則血無所藏血無所藏血亦無所養使營氣涸竭虛陽內蓄其證外寒內熱亦名內蒸按之附骨即內熱甚骨肉自消食無味皮燥不澤蒸盛之時目暗善怒時驚四肢漸細足趺腫起凡此五蒸與熱勞之病大同小異其治法有不同者蓋蒸病內著骨髓蒸發皮膚也昔人論蒸有二十三證細而推之臟腑之病變態多端萬病皆生於虛不必拘之以二十三種說何其太略也治骨蒸虛勞傳屍肺痿咳嗽不止困重羸瘦壯熱或即憎寒腹內冷脹四肢煩疼飲食無味頭疼口乾涕唾稠黏渴不止者豬肚黃連丸方獖豬肚一具以童子小便煮令熟細切焙乾搗為末知母銼焙蕪荑仁炒各二兩紫菀去苗土大黃銼微炒鱉甲去裙襴醋浸炙檳榔煨蒼朮米泔浸切焙百部銼焙令乾地骨皮黃芩去黑心桔梗炒貝母去心柴胡去苗黃連去須龍膽去蘆頭人參白茯苓去黑皮黃耆銼各一兩上一十九味搗羅為末煉蜜為丸如梧桐子大每服空服溫酒下二十丸治心中煩熱唯欲露體復之即悶煩驚悸心忪面無顏色忘前失後婦人患血風氣者多成此疾乃心蒸之狀麥門冬湯方麥門冬去心焙茯神去木防風去叉地骨皮去土各三兩人參龍齒遠志去心甘草炙黃羚羊角屑石膏各二兩紫石英一兩上一十一味各銼如麻豆大每服三錢匕以水一盞半入棗兩枚煎取半盞去滓溫服服一劑未全安再作之以瘥為度甚益心力曾經吐血者服之尤佳若畏石藥不用紫石英亦佳治五蒸地骨皮湯方地骨皮白茯苓去黑皮麥門冬去心焙柴胡去苗各一兩半赤芍藥甘草炙令赤各一兩上六味粗搗篩每服五錢匕用水一盞半煎至一盞去滓食後分溫二服治五蒸葛根湯方葛根炙黃銼三兩石膏研五兩甘草炙令赤一兩知母銼焙乾黃芩去黑心麥門冬去心焙人參白茯苓去黑皮生乾地黃酒洗去土炙各二兩粳米一合上一十味粗搗篩每服五錢匕以水一盞半入竹葉五片煎至一盞去滓分溫二服亦可以小麥半升水三升煮取汁煎藥更佳治骨蒸身熱手足煩心中躁羸瘦漸漸不能食龍膽丸方龍膽一兩一分黃連去須黃柏去粗皮炙大黃銼微炒赤芍藥人參山梔子仁甘草炙各一兩黃芩去黑心三分上九味搗羅為末煉蜜為丸如梧桐子大食後米飲下十五丸日午再服治骨蒸熱勞肺痿咳嗽傳屍瘦病盜汗痿弱四肢痠疼鬼氣癖塊青蒿丸方青蒿童子小便浸七日曝乾三兩天門冬去心焙柴胡去苗地骨皮白茯苓去黑皮各二兩旋覆花紫菀去土貝母去心各二兩半秦艽去苗土枳殼去瓤麩炒龍膽去蘆頭大黃銼微炒各二兩杏仁湯浸去皮尖及雙仁六兩生別研如膏天靈蓋塗酥炙令黃六兩葳蕤鱉甲去裙襴醋浸炙令黃各三兩丹砂三分研麝香一分研上一十八味搗羅為末煉蜜為丸如梧桐子大每服空腹溫水下二十丸日午再服治心蒸苦心驚悚慄男子因讀書損心氣傷思慮過損心吐血心煩多忘失精神或身體癢瘙風癬或胸中氣滿茯苓湯方白茯苓去黑皮麥門冬去心焙款冬花獨活去蘆頭檳榔銼各六兩桂去粗皮防風去叉防己各五兩甘草炙枳殼去瓤麩炒各四兩地骨皮去土十兩上一十一味銼如麻豆大每服五錢匕以水二盞先煎山澤銀取水一盞半入藥並生薑半分切大棗三枚劈破同煎取一盞去滓溫服每早晨日晚各一治骨蒸熱羸瘦面目萎黃嘔逆上氣煩悶短氣喘急日晚便劇不能飲食龍膽散方龍膽去蘆頭一兩梔子去皮十枚黃連去須栝蔞根苦參芍藥青葙子各一兩大黃銼微炒黃芩去黑心芒硝研各半兩上一十味搗研為散每服二錢匕米飲調下日三治虛勞骨蒸身熱手中煩疼心胸懊憹羸困不能下食龍膽丸方龍膽一兩一分黃柏厚者去粗皮黃芩去黑心人參梔子仁黃連去須白芍藥甘草炙各一兩上八味搗羅為末煉蜜和為丸如梧桐子大粥飲下十五丸空心夜臥各一以知為度治心蒸心中煩躁手足熱疼欲露其體驚悸怵惕咽乾虛渴面色萎黃失前忘後婦人血氣衰弱多傳此疾麥門冬飲方麥門冬去心焙乾二兩白茯苓去黑皮人參龍齒遠志去心焙各三兩甘草炙一兩防風去叉地骨皮去土各三兩羚羊角鎊末一兩上九味銼如麻豆大每用五錢匕以水二盞入山澤銀一分棗二枚劈破同煎取一盞去滓分溫二服若大患煩熱渴躁者入淡竹瀝一合煎服若曾經吐血亦治余如上法一劑無不瘥治男子女人骨蒸熱勞皮肉消瘦面色萎黃不思飲食夜多咳嗽涕唾稠黏骨節疼痛憎寒壯熱心腹氣脹坐臥不安發如瘧狀女人血風勞一切勞疾鱉甲湯方鱉甲去裙襴醋炙令黃三兩秦艽去苗土二兩紫菀去土一兩半柴胡去苗三兩訶黎勒皮煨一兩半牡蠣煅麻黃去根節犀角鎊知母切焙升麻甘草炙梔子仁檳榔銼木香當歸切焙桔梗炒桑根白皮銼大黃炒黃連去須桃仁炒人參桂去粗皮葳蕤芎藭各一兩上二十四味粗搗篩每服三錢匕水一盞棗一枚劈烏梅一個生薑三片同煎三五沸去滓稍熱服不拘時治骨蒸熱勞秦艽湯方秦艽去苗土四兩青蒿子用童子小便浸一宿洗曬乾焙知母焙貝母去心常山洗焙甘草鹽水浸炙黃各二兩鱉甲去裙襴醋浸炙枳殼去瓤麩炒柴胡去苗半夏湯洗後用薑汁浸一宿曝乾陳橘皮去白焙肉桂去粗皮各四兩上一十二味粗搗篩每服二錢匕水一盞入烏梅一個拍破生薑三片煎七分去滓熱服如渾身壯熱並吃二服治虛勞骨蒸肌瘦盜汗潮熱咳嗽或即唾血肢體倦怠飲食不入及室女勞熱經血不行時發潮躁虛渴鱉甲湯方鱉甲九肋大者一枚醋浸一宿去裙襴脊骨更蘸醋炙令赤用二兩半人參柴胡去苗各二兩白茯苓去黑皮地骨皮牛膝去苗切焙芍藥百部牡丹去心枳殼去瓤麩炒生乾地黃焙貝母去心黃芩去黑心栝蔞根山梔子仁當歸切焙桔梗炒陳橘皮去白焙麥門冬去心焙天門冬去心焙紫菀洗焙白朮桂去粗皮桑根白皮銼檳榔銼各三分大黃銼細炒甘草炙各半兩京三稜一兩半炮銼草豆蔻五個去皮天靈蓋酥炙黃一兩上三十味搗為粗末每服五錢匕水二盞入生薑半分切棗三枚劈破同煎至一盞去滓稍熱服空心臨臥治童男室女骨蒸熱成勞不思飲食食即無味身體苦疼陽熱轉盛面色多赤青蒿丸方青蒿銼四兩甘草銼一兩桃仁杏仁各二兩去皮尖雙仁上四味以童子小便五升瓷瓶盛入藥於內磚搘其底以糠頭火燒一夜取出桃杏仁別研如泥別入芍藥知母天靈蓋炙車前子紫菀去土葳蕤當歸切焙枳殼去瓤麩炒生乾地黃焙檳榔銼黃連去須秦艽去苗土京三稜煨銼柴胡去苗續斷各一分麝香研三分犀角生用屑一兩獺肝炙半兩上二十二味除前四味外搗羅為末和桃杏仁同搗一二千下旋入所煎小便濕搗一二千杵如硬入熟蜜一兩半更搗眾手為丸梧桐子大不計時候每日熟水下三十丸咳嗽加貝母半兩婦人月候不通加牡丹延胡索各一分五心煩躁加地骨皮茯苓夜夢不祥加茯神羚羊角初患未傳諸臟酒下四服即愈腹中有塊及痃癖惡寒頭痛面黃色毛髮焦枯服畢便愈治骨蒸唇紅頰赤氣粗口乾遍身壯熱或多虛汗大腸秘澀小便赤黃飲食全少鱉甲豬肚丸方鱉甲去裙襴醋炙柴胡去苗木香青蒿生乾地黃焙各一兩黃連去須二兩青橘皮去白焙半兩上七味搗羅為末用豬肚一枚去脂膜淨洗入藥末在內系定蒸令爛熟入臼杵千百下為丸如綠豆大每服十五丸溫水下食前日午臨臥日三治骨蒸熱勞柴胡湯方柴胡去苗一兩胡黃連半兩紫菀去土知母各三分鱉甲小者半片小便浸一宿再用醋炙天靈蓋酥炙一兩秦艽去苗土半兩甘草炙黃半兩杏仁去皮尖雙仁炒一兩地骨皮三分上一十味粗搗篩每服二錢匕水一盞入青蒿少許同煎至七分露天處安一夜平旦去滓空腹溫服之治骨蒸癘疾溫疫寒熱瘧病五屍九注心腹絞刺蠱毒鬼魅一切熱毒腳氣悶亂攻衝煩熱口中生瘡狂易叫走及解諸毒兼金石草藥熱毒發黃躁熱疼痛一切熱病紫雪丸方金一十五兩銀一十五兩寒水石石膏磁石滑石各三斤上四石藥同搗碎後以金銀共六味一處以水一石煮取一斗去金銀並石滓入後藥末木香一兩犀角鎊五兩丁香四兩沉香五兩甘草炙八兩升麻玄參各一斤上一十三味除前六味外用水三斗煮取一斗絞去滓淨與前藥汁相和即內芒硝五升細研入藥汁慢火同煎手不住攪之可有一斗余即投於盆器內盛欲凝內水飛丹砂末三兩麝香末一兩一分同研如粉面和勻蓋復之二日成霜雪矣曝乾以新合或瓶內密封盛貯之有病即取強人服一錢匕冷水和服以意隨人強弱增損之腳氣病或曾服石藥發動毒悶者水和半錢匕服之如神凡服訖即仰臥以物搘腰令高使藥向胸腑間若患眼赤及熱痛者以冷水和之點眼大小眥初著微痛少時淚出自定日三五次用夜亦如之即無不效口內生熱瘡含如杏核許令消細細嚥之乃止治骨蒸腫氣每至日晚即惡寒壯熱頰色赤不下食日漸瘦香豉飲方香豉一分生地黃一兩蔥白三莖上三味細銼相和以童子小便二盞半浸一宿平旦煎至八分去滓分溫二服空腹日午服治男子婦人骨蒸勞氣肌體羸瘦四肢無力頰赤面黃五心煩熱困倦心忪或多盜汗腹脅有塊不欲飲食鱉甲湯方鱉甲去裙襴醋炙柴胡去苗各三兩桔梗炒甘草炙黃各一兩半秦艽去苗土一兩青蒿子二兩用童子小便浸一宿焙乾微炒上六味粗搗篩每服三錢匕水一盞入烏梅一個拍破同煎至六分去滓食後溫服治男子女人一切勞疾骨蒸風氣等隨四時加減青蒿丸此藥有七名一名杏仁丸能治嗽二名木香丸能治屍注鬼氣九種心痛三種蟲咬心痛三名犀角丸能治時行熱疾溫疫四名龍腦丸治小兒無辜疳痢五名萬病丸治一切虛損六名丹砂丸治毒邪痃癖氣等七名青蒿丸治男子女人一切勞氣若常帶行山林曠野坑阱塚墓前後鬼神不敢近若被毒蛇惡物所傷爛嚼一丸敷之立效青蒿心三枚細切童子小便三大斗生地黃三梃竹刀切搗東引桃枝半握細搗碎一二兩甘草四兩炙上五味以新甕子一口以小便浸一七日和小便並前件藥煮三五百沸漉出藥曬乾搗羅為末然後將小便清入釜中以桑柴火煉之以篦攪勿住手煉三斗小便至三升用不津器盛將和後藥杏仁桃仁並去雙仁及皮尖炒令黃桔梗炒葳蕤枳殼麩炒去瓤大黃焙升麻蒼朮炒一方用白朮白茯苓去黑皮地骨皮天靈蓋酥炙一兩無以虎骨代甘草炙貝母去心蕪荑炒當歸切焙黃耆銼桂去粗皮陳橘皮去白焙厚朴去粗皮薑汁炙防風去叉檳榔不得近鐵器吳茱萸湯浸炒丹砂別研麝香別研各一兩木香二兩半犀角屑一兩半羚羊角屑二兩一分上二十七味搗羅為細末用前小便煎都和了入臼搗五百下如未黏可入煉蜜搜和為丸如梧桐子大每食後溫水下三十丸疾重日再服通三焦安五臟四時常服永無虛勞之疾時行瘴瘧常不能害上氣咳嗽無問涕唾並干嗽嗽後有血此名肺熱熱毒氣壅轉成鼻塞聲破胸中結痛若不速