研三兩上一十味搗研為末和勻煉蜜丸如梧桐子大每服二十丸食後桃仁湯下治骨蒸腹中積癖脅下妨痛漸加羸弱大腹湯方大腹四枚芍藥赤茯苓去黑皮桔梗銼炒各一兩半木香訶黎勒皮各一兩桃仁湯浸去皮尖雙仁別研一兩半上七味粗搗篩每服五錢匕水一盞半煎至一盞去滓分溫二服空腹日晚各一服治骨蒸積癖鬼氣疰忤及男女虛損手足煩疼背膊酸重至夜病甚四肢消瘦顏色萎黃兩膝疼冷腹中雷鳴時多泄利飲食無味行步不能凡五臟虛勞悉皆治之七聖散方黃雌雞一隻料如食法淨去毛勿令著水於腹下開一小竅去腸肚令極淨卻再入心肝用蜀椒去目併合口者一分生地黃一升洗肥者生薑去皮一兩黃耆銼陳橘皮湯浸去白焙人參各一兩上七味除雞外各銼如麻豆大和勻入在雞腹內卻縫合以銀石器盛新布罩坐於甑中蒸甑一邊用碗盛米並水半碗同蓋復勿令透氣候碗內米並雞爛熟為度取出藥別焙乾搗羅為散每服一錢匕米飲調下日三服其雞劈碎滲少鹽令患人恣意食之飽即止良久厚衣被複取汗汗出多即以牡蠣燒搗為粉敷之勿冒風寒治傳屍飛屍注氣癖塊積氣上喘水病腳氣鬼注蠱毒宿食不消腹中如覆杯或九蟲婦人帶下赤白皮膚惡瘡腹大羸瘦黃疸諸疾延年養性黑鬚發陳漆丸方陳漆二升以綿絞去滓大黃六兩為末薏苡仁五兩為末無灰酒五升蔓荊子三升為末上五味先以清酒和蔓荊子末煎不住手攪至半日許濾去滓後用銀石器盛重湯煮之以竹篦子不住手攪一復時後下陳漆大黃薏苡仁等末更煮一復時候藥可丸丸如梧桐子大置於不津器中密封遇有患者經宿勿食明日清旦空心溫酒下十丸年高或冷疾者加至十五丸服之百日後鬚髮如漆色有積年瘡痕皆滅初服四五日至七日內瀉出宿食或魚黏膿血瘀惡物勿疑治傳屍骨蒸積癖冷氣及腰腳衰弱身體風癢並諸瘡癩疾惡瘡疥癬等此藥服之斷絕根源松脂丸方松脂二十斤以桑柴灰汁煉去苦汁傾入水盆中凝取之白茯苓去黑皮一斤白朮續斷各半斤白蜜牛酥麥門冬去心焙生乾地黃焙各二兩上八味搗羅五味為細末先以慢火煉蜜烊去沫次下牛酥次下松脂候烊訖即下藥末以竹篦攪勿住手可丸即丸如梧桐子大以溫酒或米飲下二十丸日二服漸加至五十丸治勞損羸瘦風虛疰氣積癖冷氣心痛方桃仁去皮尖雙仁一千二百枚上一味細研以好酒五升先用二升和研濾取汁次入二升再研令極爛又濾取汁更以一升再和研濾盡白汁以干瓷器盛密封以重湯慢火煮一復時候冷每服一匙用酒或米飲調下日再婦人服尤善治骨蒸積癖瘦病等方蒜去皮七瓣研雄黃杏核大研上二味研爛拌勻以清酒和服少時十指頭上當有毛出為驗治骨蒸癖積諸疾令絕根源浸浴方枯朽骨椎碎二斗不拘牛羊豬骨爛棘針刺三斗蒴藋莖葉根銼一斗嫩柳枝銼一斗上四味以水一石二斗煮取七斗漉去滓內大鹽三升候鹽銷熔盡於大盆中或瓷器中盛俟溫暖得所令患者浸之甕盆四畔用馬糞火煨暖令湯常溫勿使稍冷覺寒令進稀熱粥每浸身體可停一炊時出湯時拭體干或多汗以白米粉敷之只於密室中靜心或坐或臥勿令衝風每三日一次浴三次止其藥湯春秋冬停三五日夏一二日再暖用若患瘙癢者湯內入芒硝白礬末各一大升佳浸時須至項以下得全藥力又浸浴湯方上取桃柳蒴藋李株四般枝葉各銼一大斗冬月只用諸般根並以水八九斗同煮取五六斗去滓加鹽二大升浸之亦同前法治骨蒸腹中痃癖妨痛兼下利日夜數十行蒼朮丸方蒼朮訶黎勒皮各一兩半陳橘皮湯浸去白焙木香芍藥青橘皮湯浸去白焙白龍骨生薑切焙各一兩上八味搗羅為末煉蜜和丸如梧桐子大每服三十丸食前人參湯下日再治症癖氣壯熱咳嗽骨蒸柴胡茯苓湯方柴胡去苗二兩白茯苓去黑皮白朮枳殼去瓤麩炒各一兩半上四味粗搗篩每服三錢匕水一盞煎至七分去滓食後溫服日二骨蒸煩渴論曰骨蒸煩渴者營衛乏竭肌肉消瘦虛陽之氣熏發於上令津液枯燥胸中煩熱咽嗌焦乾故煩渴而引飲治骨蒸疼煩熻熻發熱骨節痠痛口乾煩渴麥門冬湯方麥門冬去心焙二兩黃芩去黑心柴胡去苗升麻芍藥甘草炙銼各一兩上六味粗搗篩每五錢匕水一盞半入苦竹葉三片煎至一盞去滓溫分二服空腹食後各一服治骨蒸唇乾口燥止渴麥門冬飲方麥門冬去心三兩枸杞根五兩小麥一合上三味細銼如麻豆大每服五錢匕水一盞半煎至小麥熟去滓溫服食後日二治骨蒸煩渴嘔不下食四肢發熱葛根湯方葛根銼赤茯苓去黑皮麥門冬去心焙甘草炙銼黃耆各半兩人參三分上六味粗搗篩每服五錢匕水一盞半入蘆根五枝竹三葉煎至一盞去滓分溫二服空腹食後各一服治骨蒸消渴消中熱中渴利心熱風虛熱傳屍苦參丸方苦參五兩黃連去須知母銼焙栝蔞根牡蠣粉麥門冬去心焙各三兩上六味搗羅為末以生牛乳和丸如梧桐子大曝乾每服十五丸或二十丸食後漿水下治骨蒸唇乾口燥止渴麥門冬湯方麥門冬去心焙三兩甘草炙銼二兩半夏湯洗去滑炒乾三兩上三味粗搗篩每服三錢匕水一盞入生薑半分拍碎棗三枚去核竹葉三片粳米四十九粒煎至七分去滓空腹溫服日午夜臥再服治骨蒸熱煩渴嘔逆不下食葛根湯方葛根炙一兩赤茯苓去黑皮麥門冬去心焙各一兩半甘草炙銼一兩上四味粗搗篩每用五錢匕水一盞半竹葉三片生蘆根三枚煎至一盞去滓分溫二服空腹食後各一服治虛勞骨蒸煩熱發渴地骨皮湯方地骨皮知母焙柴胡去苗當歸切焙秦艽去苗土鱉甲醋炙去裙襴甘草炙銼枳殼去瓤麩炒各一兩上八味粗搗篩每服二錢匕水一盞入烏梅生薑桃柳枝小麥各少許煎至七分去滓溫服治骨蒸潮熱煩渴引飲不思飲食秦艽散方秦艽去苗土柴胡去苗甘草炙銼烏梅取肉焙各二兩上四味搗羅為散每服一錢匕沸湯調下食後臨臥服治骨蒸虛勞熱氣上熏咽嗌焦乾津液枯燥煩渴引飲阿膠湯方阿膠炒燥人參白茯苓去黑皮玄參丹參防風去叉黃耆生乾地黃焙葛根柴胡去苗秦艽去苗土黃連去須龍膽枳殼去瓤麩炒地骨皮百合鱉甲去裙襴醋炙甘草炙桔梗炒知母焙貝母去心款冬花石膏碎麻黃去根節黃芩去黑心梔子仁麥門冬去心防己栝蔞根馬兜鈴大黃炒桑根白皮炙白藥子葶藶子隔紙炒杏仁湯去皮尖雙仁炒各一兩檳榔五枚上三十六味銼如麻豆大每服五錢匕水一盞半煎至八分去滓食後臨臥溫服傳屍骨蒸論曰傳屍之病由相剋而生毒氣內傳五臟漸至羸極死則復傳其家屬一人故曰傳屍其初得病半臥半起者名曰殗殜氣急嗽者名曰肺痿骨髓中熱者名曰骨蒸內傳五臟者名曰復連忽而不𤻲乃至絕後假如男子因虛損得之其源先從腎起初受屍氣兩脛痠疼腰脊拘急行步腳弱食減耳鳴夢泄陰汗腎病不已次傳於心則驚悸少氣夢見先亡時有盜汗食飲無味口瘡好睡唇頰赤色五心皆熱朝輕夕重心病不已次傳於肺則氣滿咳嗽喘急口燥四體微弱肌膚枯槁細起如麩或刺痛如蟲行鼻乾不聞香臭或聞惡氣欲吐肺病不已次傳於肝則面無顏色坐常顰眉視不及遠目昏睛黃或赤澀痛惟欲閤眼又不得睡肝病不已次傳於脾則兩脅虛脹食不消化時復渴利腹肚痛脹唇舌焦乾發無光澤上氣喘息利赤黑汁傳變至此則不可復救蓋傳五臟已盡故也治傳屍骨蒸肺痿殗殜及諸蠱注忤鬼魅野貍蟲蛇蜂蠍等毒或惡瘡腫瘤中惡卒心痛大小便不通心腹臌脹疫癘瘴毒積癖邪氣大金牙散方金牙曾青研飛雄黃研大黃銼炒丹砂研飛牛黃研凝水石煅研野葛皮龍骨朴硝研犀角鎊獺肝片切炙乾貍骨醋炙鸛骨炙黃各三分升麻一兩半附子去皮臍生用桂去粗皮鬼臼鬼督郵黃環青木香常山牡蠣煅研人參知母切焙徐長卿各半兩鬼箭羽桔梗炒代赭石莽草蜀漆當歸切焙白薇巴豆去皮心膜炒研露蜂房各一分蜀椒四十九粒去目及閉口炒出汗蜈蚣二條去足炙芫青去翅足炒斑蝥去翅足炒亭長去翅足炒各二十一枚上四十味搗研為散再和研細勿令穢汙觸犯並孝服人見當於淨室中焚香密蓋之勿透氣如傳屍骨蒸殗殜注癖冷氣積聚每服半錢匕熱湯調下日再病瘥即止仍以絳囊盛方寸匕帶之闢諸鬼氣如有諸邪病狂言妄見者帶二三錢若卒噁心痛注忤喘滿臌脹悶亂諸疾服四錢匕米飲調下吐利為應若蛇蟲毒瘡以津唾調敷之若溫疫瘴癘服如前法若蟲毒吐出即瘥若卒死中惡湯調一錢匕灌下即瘥卒中野道狐貍貓鬼魔魅邪毒眼戴上視狂言者亦用湯化三錢匕未瘥更服若忽有惡瘡腫以湯和敷之日一易瘥即止治男子婦人傳屍骨蒸冷熱五勞麝香散方麝香研半錢甘草如病人中指長男左女右東引桃枝青蒿東引柳枝石榴枝各一握犀角鎊半兩阿魏柴胡去苗各一兩蔥白薤白各七莖上一十一味除麝香外同銼碎用童子小便二升半浸一宿別入檳榔末三錢同煎至一升半去滓分溫三服男病女煎女病男煎勿令孕婦六畜見初服訖如人行五里又進一服恐噁心可含白梅病在上即吐在下即瀉各出惡物如蟲類及頭髮馬尾狀兼身上如蟻行瀉後以蔥粥及軟飯補之仍服後方茯神湯調和五臟避風一月若遠年重病不過兩劑其吐下蟲腹紅色者可治黑者或瘥或否白色者不可治也治傳屍骨蒸先服麝香散取蟲後次服補五臟茯神湯方茯神去木人參遠志去心甘草炙銼當歸切焙陳橘皮去白焙龍齒熟乾地黃焙各一兩五味子麥門冬去心焙桂去粗皮各一兩半黃耆銼二兩上一十二味粗搗篩每服五錢匕水二盞入棗七枚劈破生薑五片煎至一盞去滓空心溫服日三治鬼注傳屍骨蒸等疾鉛丹丸方鉛丹炒三兩安息香一兩入胡桃仁相和研白朮鬼督郵各一兩半木香柴胡去苗獺肝炙乾各一兩上七味搗羅為末煉蜜和丸如梧桐子大每服七丸粥飲下不拘時治傳屍骨蒸咳嗽上氣痰喘寒熱四肢瘦弱真珠丸方真珠末獺肝炙乾茯神去木貝母去心柴胡去苗龍膽黃連去須赤芍藥各一兩半白檳榔煨銼旋覆花各一兩上一十味搗羅為末煉蜜和丸如梧桐子大每服十五丸食後溫漿水下日再治傳屍骨蒸勞黑虎丸方干蝦蟆一枚去頭足分為兩段一半生一半酥炙黃蛤蚧一對各取一半並去頭泥塗酥炙黃蘆薈研天靈蓋酥炙白狗糞炒黃雄黃研麝香研各一分烏驢蹄炙乾二兩乳香研一兩半豬膽一枚取汁於碗中慢火煨如膏和藥上一十味搗研九味為末合研勻細以豬膽膏同粟米飯和丸如梧桐子大先吃熱面一碗次以茅香水沐浴次以砂糖麝香少許調冷水一盞投藥一丸於星月下浸一宿平旦空腹服之厚被蓋臥應是傳屍冷勞者脊骨中出白蟲或出赤蟲若骨蒸勞則汗出腰腳疼痛不遂腳下出汗如膠漆諸風氣水病並服一粒瘥小兒無辜可服半粒如前法有蟲出鼻內如線狀是效治傳屍骨蒸女人血氣月候經年不通痰嗽黃瘦四肢羸弱盜汗骨蒸或時憎寒飲食減少阿魏丸方阿魏細研當歸切炒蕪荑仁炒各一兩雌黃研豬牙皂莢去皮子酥炙各半兩麝香研蓬莪朮煨銼各三分柴胡去苗白檳榔銼各二兩上九味搗研為末和勻再羅用羊肉半斤去皮爛煮細切研如膏入諸藥末和搗三千杵如硬即添肉汁眾手丸如綠豆大每服五十丸五更溫酒下仍飲令醉以青絹被蓋之睡覺汗出通身必有細蟲在被間日光內看急須燒之或瀉下惡物並蟲等是效如小兒服以意加減治男子婦人虛勞骨蒸傳屍染著不能斷絕服前阿魏丸經脈猶未通或四肢虛羸飲食全少速服此通經脈補