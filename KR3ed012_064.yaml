body:
  text: 卷第六十四冷痰論曰氣為陽陽不足者不能銷鑠水飲遇脾氣虛弱氣道痞隔則聚飲而成痰浸漬腸胃上為嘔逆吞酸下為洞泄寒中久不已則令人消瘦倚息短氣妨害飲食昔人治痰飲多以溫藥和之正為此也治冷痰癖飲胸膈痞滿嘔逆不止半夏湯方半夏湯洗七遍切焙三兩白朮人參赤茯苓去黑皮桂去粗皮甘草炙附子炮裂去皮臍各二兩上七味銼如麻豆大每服五錢匕以水一盞半入生薑半分切煎取七分去滓溫服食前日三治胸中冷痰心下煩滿欲吐不下食吳茱萸湯方吳茱萸湯洗焙炒半夏湯洗七遍切焙桂去粗皮人參各二兩甘草炙一兩上五味㕮咀如麻豆大每服五錢匕以水一盞半生薑半分切大棗二枚劈破煎取一盞去滓溫服日三治胃冷有痰不思飲食丁香半夏丸方丁香一分半夏二兩水浸七日每日早換水日足取出切曝乾白礬研半兩上三味為細末薑汁和丸如小豆大每服二十丸生薑湯下食後治冷痰小半夏丸方半夏一兩熱漿水燙七遍濕透心為度切曝乾上一味為細末薑汁和丸如緑豆大每服二十丸生薑湯下食後服治冷痰溫胃利膈思食礬石丸方白礬枯研芎藭乾薑炮半夏銼碎生薑汁浸透同炒各一兩上四味為細末煮棗肉丸如梧桐子大每服十五丸或二十丸生薑湯下不拘時候治冷痰壅盛胸膈不利胃口冷脾氣弱嘔吐痰涎奇效湯方附子炮裂去皮臍二兩木香半兩半夏湯洗七遍切焙二兩上三味銼如麻豆每服三錢匕水一盞半生薑半分切大棗二枚劈破煎至一盞去滓空心溫服治冷痰飲食不下膈脘不快蓽茇丸方蓽茇炒一兩訶黎勒煨去核三分乾薑炮半兩上三味為細末煮麵糊丸梧桐子大每服二十丸生薑湯下不拘時候治冷痰嘔逆胸膈不利豆蔻湯方草豆蔻去皮半夏湯洗去滑切焙各半兩陳橘皮湯浸去白焙三分上三味粗搗篩每服三錢匕水一盞入生薑五片煎至七分去滓溫服不拘時候治冷痰消食溫胃止逆半夏湯方半夏湯洗去滑焙乾為末以薑汁和作曲焙乾杏仁去皮尖雙仁麩炒研各二兩木香半兩桂去粗皮陳橘皮去白炒二兩甘草炙銼一兩乾薑炮三分上七味粗搗篩每服三錢匕水一盞生薑三片煎至七分去滓溫服不拘時候治冷痰吞酸吐水胸中不快吳茱萸湯方吳茱萸湯洗七遍焙炒半夏湯洗七遍焙附子炮裂去皮臍各一兩上三味㕮咀如麻豆大每服三錢匕水一盞半生薑五片煎取七分去滓溫服不拘時候治胃虛氣寒飲食無味嘔吐冷痰噫時聞食氣白豆蔻湯方白豆蔻去皮半夏為末生薑汁和作餅焙乾檳榔銼丁香甘草炙銼青橘皮去白切焙各一兩上六味粗搗篩每服二錢匕水一盞生薑三片煎至七分去滓溫服治冷痰利胸膈和脾胃進飲食丁香半夏丸方半夏為末生薑汁作餅焙乾二兩木香丁香藿香葉人參陳橘皮湯浸去白焙乾各半兩肉豆蔻去殼二枚上七味為細末薑汁煮麵糊和丸如小豆大每服二十丸生薑湯下不拘時候治冷痰不消胸膈不利解酒食毒厚朴丸方厚朴去粗皮八兩切用生薑十兩細切同搗細焙乾慢火炒桂去粗皮五兩乾薑四兩炮蜀椒去目並閉口炒出汗二兩上四味為細末煉蜜丸梧桐子大每服二十丸溫熟水下治脾胃米飲下中酒吐逆生薑湯下治胸中冷痰上焦客熱心下停水時發醋心咽喉空唾或乾嘔而渴蓽茇散方蓽茇桂去粗皮麻仁高良薑各三兩人參白朮各一兩甘草炙銼半分乾地黃焙厚朴去粗皮生薑汁炙各一兩半上九味搗羅為散酒調一錢匕日再服如要丸即煉蜜丸如小豆大溫酒下二十丸治咯唾冷痰膈脘不利不思飲食人參丸方人參半夏湯洗去滑白礬燒令枯乾薑炮裂上四味等分搗羅為末將皂莢五挺去皮尖小挼濾汁煮成煎和上件藥為丸如梧桐子大每服二十丸溫水下不拘時治冷痰利胸膈一切諸痰悉治之法制半夏方半夏半斤湯洗四十九遍用法酒二升浸一日焙乾白礬四兩丁香皮為末三兩草豆蔻去皮二兩半為末上四味同入酒內浸春夏七日秋冬半月候日滿只取半夏於溫湯內浴過焙乾不計時候嚼下三五粒用臘茶下或酒亦得熱痰論曰熱痰者由氣道壅塞津液不通熱氣與痰水相搏聚而不散也若咽喉乾燥或塞或壅頭目昏重咳唾稠濁面目熱赤是其證也治熱痰利胸膈止煩渴化涎散方凝水石炭火煅一兩鉛白霜研馬牙硝雄黃研各一錢白礬熬令汁枯甘草微炙銼各一分上六味搗研為散別入龍腦少許更研勻每服一錢匕蜜水調下小兒風熱涎用沙糖水調半錢匕此藥大涼不得多吃治熱痰涼心肺利胸膈解熱毒補元益氣鵝梨煎丸方大鵝梨二十枚去皮核用淨布絞取汁皂莢不蚛者十挺去黑皮用漿水二升揉取濃汁生地黃半斤淨洗研絞取汁生薄荷半斤細研取汁蜜半斤以上五味同於銀石器中慢火熬成膏入諸藥末木香人參白茯苓去黑皮白蒺藜炒去角牛膝酒浸一宿切焙乾肉蓯蓉酒浸一宿切焙乾各一兩羌活去蘆頭防風去叉白朮青橘皮去白焙桔梗銼炒山芋各三分半夏湯洗七遍焙乾炒過一兩檳榔煨銼二兩甘草炙銼半兩上二十味除五味為膏外余搗羅末入膏拌和杵令硬軟得所丸如梧桐子大每服十五丸加至二十丸荊芥湯下食後服日二治熱痰壅盛咽膈不利千金散方半夏半兩用生薑一兩同搗爛作餅子曝乾滑石末三錢凝水石煅三錢青蛤粉末五錢甘草末三錢上五味同研如粉每服一錢匕齏汁一盞煎至六分臨臥溫服治熱痰咽乾煩渴龍腦丸方龍腦一字鉛白霜研一分甘草炙銼半兩凝水石用火燒令通赤研一分上四味搗羅細研令勻用燒飯為丸如梧桐子大每服含化三丸至五丸治熱痰寧神志去頭痛惡心解煩躁丹砂銀箔丸方丹箔細研水飛過三分牛膽制天南星二兩雄黃研龍腦各一分銀箔十五片馬牙硝研一錢上六味各研細再同研令勻煉蜜和丸如雞頭實每服一丸嚼破煎人參湯放冷下或竹葉湯新水下亦得食後臨臥服治熱痰導壅氣潤腸胃參黃湯方大黃煨銼三兩人參枳殼湯浸去瓤麩炒檳榔煨銼各一兩半夏湯洗去滑炒黃一兩半朴硝研二兩甘草炙銼半兩黃芩去黑心三分上八味粗搗篩每服二錢匕以水一盞入生薑半分拍碎同煎至七分去滓食後臨臥溫服治熱痰壅盛虛煩燥渴丹砂丸方丹砂研水飛過天南星炮白礬熬令汁枯各一兩莽草炙半兩上四味搗研為末更用半夏二兩湯洗七遍曝乾為末水煮作糊和前藥末為丸如梧桐子大每服七丸加至十丸薄荷茶或生薑湯溫水下不拘時候治熱痰壅滯咯唾如羊脂利咽膈墜痰涎烏龍丸方皂莢不蚛者四兩燒存性為末白礬好者半生半枯朴硝研鉛白霜研各一兩上四味合研勻醋煮麵糊為丸如梧桐子大每服十丸濃煎槐實湯下如咽喉腫痛上膈不利以甘草煎湯食後臨臥服治熱痰壅滯礬石丸方白礬熬令汁枯一兩丹砂研水飛過半兩上二味研勻薄麵糊和丸如梧桐子大爛嚼棗乾咽下五丸不拘時候治熱痰噎悶乾嘔頭疼目昏如醉犀角丸方犀角鎊半兩半夏漿水煮透天南星黃牛膽內浸三宿焙各二兩大黃用醋煮一復時焙乾稱白礬熬令汁枯丹砂研人參各半兩上七味搗羅為末用肥皂莢一十五梃水二碗慢火熬成膏入前藥為丸如梧桐子大每服二十丸食後生薑薄荷湯下治痰熱咽膈不利頭目錯痛麝香丹砂丸方麝香研一分丹砂研一兩麥門冬去心焙三分龍腦研一錢木香丁香犀角末甘草炙銼各一分人參藿香去梗天南星牛膽內製者防風去叉黃耆銼各半兩上一十三味搗研為末拌勻煉蜜和丸如雞頭實每服一丸嚼破以荊芥湯下食後臨臥服治胸間熱痰不思食麥門冬湯方麥門冬去心焙葛根人參前胡去蘆頭犀角鎊各一兩桔梗半兩蘆根二兩上七味銼如麻豆令勻每服五錢匕水一盞半煎取八分去滓溫服留飲宿食論曰人有留飲浸漬於胃胃受飲濕則飲食遲化或經宿不消令人噫氣吞酸嘔逆噁心腹脅脹滿不喜飲食皆其候也治脾胃氣不和留飲宿食不消及纍有傷滯食已腹痛嘔噦噁心胸脅脹悶大便祕利不定磨滯丸方木香青橘皮湯浸去白焙桂去粗皮各一兩吳茱萸湯洗焙乾炒三兩硇砂醋熬成霜研末一錢匕巴豆霜炒半錢匕上六味搗羅四味為末與硇砂巴豆霜拌勻醋煮麵糊為丸如緑豆大每服三丸加至五丸早晚食後臨臥服大便溏利時減丸數治留飲不散膈脘不利宿食不消嘔逆噁心小半夏丸方半夏二兩為末生薑汁作餅曝乾木香沉香各半分青橘皮湯浸去白炒一分檳榔大者一枚麵裹煨熟切焙上五味搗羅為末以生薑汁浸蒸餅為丸如梧桐子大每服十五丸生薑湯下不拘時治留飲宿食不消止逆溫胃大半夏丸方半夏二兩為末生薑汁作餅曝乾木香青橘皮湯浸去白焙丁香各一錢人參三分草豆蔻去皮檳榔銼各三枚上七味搗羅為末用生薑汁煮麵糊為丸如小豆大每服三十丸生薑棗湯下不拘時治留飲順氣消宿食溫胃散方生薑半斤洗切曝乾用鹽二兩淹一宿炒過續入陳曲末一兩同炒乾半夏為末生薑汁作餅曝乾陳橘皮湯浸去白焙各一兩草豆蔻大者三枚不去皮甘草炙銼二兩丁香一分上六味為散每服二錢匕如茶點服覺脾胃寒加附子半兩炮裂去皮臍半夏一兩湯浸去滑七遍切焙治留飲宿食不消寬胸利膈進飲食郁李仁丸方郁李仁湯浸去皮尖炒半兩半夏六兩去皮臍漿水五升生薑半斤切甘草並桑根白皮各一兩銼銀石鍋內慢火煮乾再添熱漿水二升煮乾去余藥只用半夏青橘皮湯浸去白焙木香檳榔銼各一分上五味搗羅為末麵糊丸如豌豆大每服十五丸至二十丸食後臨臥生薑湯下治留飲宿食不消枳殼木香丸方枳殼去瓤麩炒二兩木香大黃紙裹煨各半兩檳榔銼芎藭郁李仁湯浸去皮尖焙研各一兩上六味將五味搗羅為末入郁李仁拌勻煉蜜丸如梧桐子大每服十丸至十五丸食後臨臥溫生薑湯下治留飲宿食不消腹脅氣痛不思飲食硇砂丸方硇砂研一分狼毒醋炒芫花醋炒乾漆炒煙出鱉甲去裙襴醋炙各一兩京三稜煨銼一兩半巴豆仁三錢醋煮紫色焙研上七味將五味搗羅為末次入別研二味再同研勻麵糊丸如緑豆大每服三丸食後溫生薑湯下治留飲宿食不消大黃丸方大黃銼炒赤茯苓去黑皮各半兩朴硝研巴豆去皮心膜研出油各一分上四味將二味搗羅為末入別研二味再同研勻煉蜜丸如緑豆大每服五丸溫米飲下以利為度氣虛者不可服治留飲宿食不消肉豆蔻丸方肉豆蔻去核半兩面裹煨銼半夏三分與茱萸半兩同用水一升慢火煮乾只用半夏焙乾巴豆七枚去皮心膜研出油上三味搗研為末酒煮麵糊丸如梧桐子大每服三丸食後茶酒任下治留飲宿食不消止逆溫胃藿香湯方藿香葉厚朴去粗皮生薑汁炙甘草生銼半夏切片用生薑汁浸一宿取出以粟米炒黃去米各一兩陳橘皮湯浸去白焙半兩上五味粗搗篩每服二錢匕水一盞入生薑三片大棗一枚劈煎至七分熱服不拘時治留飲宿食不消豆蔻湯方草豆蔻去皮半夏湯洗七遍去滑各半兩陳橘皮湯浸去白焙三分上三味粗搗篩每服二錢匕水一盞入生薑五片煎至六分去滓溫服不拘時治留飲宿食腹脅脹滿吞酸嘔逆九寶丸方木香肉豆蔻去殼厚朴去粗皮生薑汁炙麝香研丹砂研各半兩檳榔銼二兩桂去粗皮三分半夏一兩半為末生薑汁和作餅曝乾乳香研一兩上九味搗研為末生薑汁和丸如豌豆大每服七丸橘皮湯下治留飲宿食腹脅脹滿不喜飲食香橘丸方木香一分青橘皮去白鹽炒檳榔銼各半兩半夏湯洗七遍去滑白礬熬令汁枯各一分牽牛子炒三分上六味為末煮棗肉丸如梧桐子大每服二十丸至三十丸生薑湯下不拘時治留飲宿食醋心吐沫氣逆脹滿高良薑丸方高良薑三兩半桃仁去皮尖雙仁炒大腹去皮檳榔生銼各三兩上四味將三味搗末與桃仁研勻煉蜜丸如彈子大每服實者一丸虛者半丸空心食前溫酒下治脾胃氣弱不能飲食肌膚瘦瘁心胸膨悶肋脅虛脹大便祕利不定小兒諸疳黃疸小麝香丸方吳茱萸二兩炒木香一兩桂去粗皮一兩陳粟米四兩用巴豆四十九枚去皮同炒令轉色去巴豆不用上四味搗羅為末醋煮麵糊為丸如緑豆大每服七丸或十丸食後溫熟水下治留飲宿食成癖草豆蔻散方草豆蔻一兩一分附子炮裂去皮臍五味子陳橘皮湯浸去白焙各三分白朮枳實去瓤麩炒桂去粗皮乾薑炮鱉甲醋炙去裙襴芍藥木香各半兩上一十一味搗羅為散煉蜜和丸如梧桐子大每服二十丸木瓜鹽湯下治留飲宿食成癖鱉甲散方鱉甲醋炙去裙襴附子炮裂去皮臍桂去粗皮各三分乾薑炮京三稜炮銼陳橘皮湯浸去白焙吳茱萸湯洗炒木香厚朴去粗皮生薑汁炙大黃銼炒各半兩上一十味搗羅為散每服二錢匕溫酒或生薑湯調下膈痰結實論曰膈痰者氣不升降津液否澀水飲之氣聚於膈上久而結實故令氣道奔迫痞滿短氣不能臥甚者頭目旋運常欲嘔吐是也治膈痰結實咽喉不利咳嗽喘息金箔丸方金箔研十五片牛黃研麝香研各半錢龍腦研真珠末研馬牙硝研硼砂各一錢丹砂研一兩甘草末二兩上九味合研令勻煉蜜丸如雞頭大每服一丸食後溫薄荷或人參湯嚼下治膈痰結實胸膈不利喘嗽嘔逆八珍丸方丹砂研半兩犀角鎊羚羊角鎊牛黃研茯神去木搗末龍腦研各一分天南星牛膽內製陰乾一錢半硼砂研一錢上八味合研令勻煉蜜丸如雞頭實大每服一丸食後人參荊芥湯嚼下治膈痰結實頭旋噁心肢節疼痛丹砂丸方丹砂研半兩半夏湯洗七遍焙天南星炮蠍稍炒白附子炮白殭蠶炒各一分硼砂研牛黃研各一錢上八味各搗研為末合研令勻麵糊丸如梧桐子大每服五七丸食後荊芥湯下治膈痰結實滿悶喘逆化痰銀粉丸方粉霜鉛白霜白礬熬令汁枯水銀鉛與水銀結砂子各半兩天南星炮一兩半半夏湯浸七遍焙丹砂研各一兩上八味各搗研為末合研令勻麵糊丸如梧桐子大每服三丸食後薄荷湯下小兒丸如麻子大治膈痰結實胸中痞悶咳嗽喘急半夏丸方半夏湯洗七遍焙五兩皂莢五挺去皮子椎碎水一升煮焙生薑切焙五兩上三味搗羅為末入生薑汁煉蜜和丸如梧桐子大每服二十丸食後炮皂莢子湯下治膈痰結實脅膈不利頭目昏眩不思飲食木香丸方木香一分牽牛子炒半夏湯洗七遍焙白礬熬令汁枯各一兩青橘皮湯浸去白入鹽炒檳榔各半兩上六味為細末煮棗肉和丸如梧桐子大每服二十丸至三十丸食後生薑湯下治膈痰結實氣不升降柴胡地骨皮湯方柴胡去苗地骨皮赤茯苓去黑皮芎藭大黃葛根銼芍藥茵陳蒿甘草炙當歸切焙升麻各等分如心躁加麥門冬一倍上一十一味粗搗篩每服三錢匕水一盞半煎至一盞食後臨臥服去滓治膈痰結實頭目昏運不思飲食咳嗽煩渴犀角湯方犀角鎊人參黃芩去黑心柴胡去苗各一分甘草炙半分白茯苓去黑皮麥門冬去心焙升麻各半兩上八味細銼每服半兩水二盞煎至八分去滓食後溫服治膈痰結實寬利胸膈四味半夏丸方半夏生用四兩白礬生用三兩牽牛子生搗取粉二兩粉霜研半兩上四味各搗研為末合研令勻生薑自然汁煮麵糊丸如梧桐子大以丹砂為衣每服七丸至十丸食後臨臥溫生薑湯下治膈痰結實咽喉不利龍腦丸方龍腦研三錢丹砂研一兩白礬熬令汁枯半兩半夏湯洗七遍去滑陰乾為末三兩上四味合研令勻生薑自然汁煮麵糊丸如豌豆大每服十五丸食後臨臥溫水下治痰實上焦有熱壅塞不利百合湯方百合枳殼去瓤麩炒麻黃去根節天雄炮裂去皮臍款冬花昆布洗去咸焙各一兩半貝母去心當歸切焙五味子紫菀去苗土白石脂黃連去須各一兩黃芩去黑心桂去粗皮旋覆花炒各半兩上一十五味㕮咀如麻豆大每服五錢匕水一盞半入生薑三片同煎至八分去滓溫服膈痰風厥頭痛論曰膈痰風厥頭痛者謂膈上有痰氣不下行復感風寒風痰相結其氣厥逆上攻於頭故令頭痛也亦有數歲不已連腦痛者蓋風寒在於骨髓也治風痰氣厥攻擊頭痛胸膈不利嘔逆食少玉露丸方半夏湯洗七遍為末用薑汁和作餅子焙白附子炮天南星炮各二兩龍腦研一分白礬研上五味以前三味搗羅為末研入白礬腦子令勻煮生薑汁麵糊為丸如豌豆大每服二十丸食後生薑湯下治風痰氣厥頭疼昏眩菊花散方菊花一兩白附子炮三分防風去叉半兩甘草炙一分枳殼去瓤麩炒三分上五味搗羅為散每服二錢匕以臘茶清調服不計時候治風痰氣厥頭痛心胸壅滯喘滿噁心牛黃鐵粉丸方牛黃研一錢鐵粉研一兩半水銀沙子半夏生天南星炮各一兩膩粉研一分粉霜研二錢丹參研三分乾蠍去土炒一分白附子半兩生上一十味搗研為細末拌勻煮棗肉和丸梧桐子大每服五丸至七丸以生薑湯下臨臥服如要動利服二十丸更看臟腑虛實加減治風痰氣厥頭痛利胸膈進飲食化痰丸方半夏湯洗去滑別搗取末二兩天南星炮白附子炮丹砂細研各一兩檳榔煨銼半兩丁香一分上六味除半夏外搗研為細末以生薑自然汁煮前半夏末作糊和丸如梧桐子大每服十五丸加至二十丸生薑湯下不計時候治風痰攻衝頭痛利咽膈和胃氣進飲食去風氣犀角半夏丸方犀角生鎊木香桔梗銼炒各半兩半夏湯洗七遍去滑焙二兩天麻人參各一兩丹砂細研檳榔煨銼青橘皮浸去白焙各三分上九味搗研為細末拌和勻以生薑自然汁煮麵糊和丸梧桐子大每服十五丸加至二十丸淡生薑湯下不計時候治風痰攻擊頭痛惡心胸膈煩滿咽乾多渴乳香丸方乳香一兩以薑自然汁一盞煮乳香令軟於乳鉢內研細濾去滓入面少許銀器內慢火熬成膏半夏湯洗七遍焙二兩鐵粉研水飛過丹砂研水飛過鉛白霜研各一兩天南星半兩生用皂莢根白皮銼二分上七味除乳香膏外搗研為細末拌和再研勻以乳香膏和丸梧桐子大每服十丸加至十五丸以生薑薄荷湯下食後服治風痰氣厥攻擊頭痛痰逆噁心退風壅化痰金犀丸方金薄三十片犀角鎊一兩龍腦研一錢麝香研一分丹砂研水飛過二兩膽南星一兩半夏二兩洗去滑焙天麻半兩白礬一兩枯過丁香一分上一十味搗研為細末拌和再研勻入煮棗肉和丸梧桐子大每服十五丸以溫生薑湯下不計時候治胸膈風痰氣厥上攻頭痛嘔吐痰飲芎藭湯方芎藭獨活去蘆頭旋覆花防風去叉藁本去苗土細辛去苗葉蔓荊實各一兩石膏碎甘草炙各半兩上九味粗搗篩每服三錢匕生薑二片荊芥三五穗水一盞同煎至七分去滓食後稍熱服之治風痰壅盛胸膈不利攻擊頭痛天南星丸方天南星炮半夏漿水浸三日切作片焙白附子炮各一兩木香一分上四味搗羅為末以生薑汁搜和為丸如緑豆大每服十丸食後生薑湯下治風痰氣厥頭痛目眩旋運欲倒四肢倦怠精神不爽多饒伸欠眠睡不寧麝香天麻丸方天麻酒浸一宿焙乾芎藭防風去叉各一兩甘菊花三分天南星一個及一兩者先用白礬湯洗七遍然後水煮軟切作片焙乾麝香研二錢上六味搗研為末拌勻煉蜜和丸如雞頭實大每服一丸細嚼荊芥湯下不拘時候治風痰氣厥頭痛嘔吐痰涎天南星丸方天南星用韭汁煮軟切作片焙乾半斤芎藭三兩香墨燒研半兩上三味搗研為末以白麵煮糊和丸梧桐子大每服二十丸荊芥湯下不計時候治痰飲嘔逆頭目不利前胡飲方前胡去蘆頭赤茯苓去黑皮陳橘皮湯浸去白焙人參半夏湯洗七遍去滑枇杷葉炙去毛旋覆花等分上七味銼如麻豆大每服五錢匕水一盞半入生薑七片煎取七分去滓溫服食後良久服
