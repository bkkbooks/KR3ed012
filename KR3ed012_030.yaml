body:
  text: 卷第三十傷寒吐血論曰傷寒吐血者熱在陽經邪盛於表應汗不汗熱毒入深結於五臟遂成瘀熱熏於上焦血隨氣行併入胃中胃得血則滿悶氣逆故吐血也治傷寒頭疼手足煩熱吐血不止麥門冬湯方麥門冬去心焙一兩半薺苨吳藍甘草炙銼黃芩去黑心茅根生乾地黃焙各一兩上七味粗搗篩每服五錢匕水一盞半入豉一百粒同煎至八分去滓食後溫服治傷寒疫病吐血不止面黃乾嘔心神煩躁蒲黃湯方蒲黃桑寄生犀角鎊甘草炙銼葛根各一兩上五味粗搗篩每服五錢匕用水一盞半煎至一盞去滓食後溫服治傷寒熱病當發汗而不發內有瘀熱鼻衄吐血不止地黃湯方生乾地黃焙芍藥犀角鎊各一兩牡丹皮三分上四味粗搗篩每服五錢匕用水一盞半煎至一盞去滓食後溫服治傷寒吐血不止喜忘如狂熱毒不散內有蓄瘀犀角湯方犀角鎊一兩大黃銼炒三分芍藥黃芩去黑心各一兩牡丹皮三分生乾地黃焙一兩半上六味粗搗篩每服五錢匕水一盞半煎至一盞去滓食後溫服治傷寒吐血心神煩悶黃芩湯方黃芩去黑心三分山梔子仁半兩遠志去心一兩桂去粗皮半兩黃連去須竹茹各三分上六味粗搗篩每服五錢匕水一盞半煎至一盞去滓食後溫服治傷寒吐血不止此由心肺積熱血得熱即妄行黃連湯方黃連去須一兩半荷葉微炙一兩艾葉微炒一兩柏葉三分上四味粗搗篩每服五錢匕水一盞半煎至一盞去滓下生地黃汁一合攪令勻食後溫服治傷寒後心氣不足吐血及衄血三黃湯方大黃銼炒黃連去須黃芩去黑心各一兩上三味粗搗篩每服五錢匕水一盞半煎至八分去滓食後溫服治傷寒吐血煩躁紫河車散方紫河車三分朴硝甘草各半兩生蛤粉一分上四味搗羅為散每服二錢匕沙糖新汲水調下不計時候日三服治傷寒吐血不止金花散方鬱金甘草炙銼青黛各半兩上三味搗羅為散每服二錢匕用雞子白調下治傷寒吐血不止地黃散方大黃銼炒搗末一兩龍腦研一錢上二味合研勻每服二錢匕用生地黃汁調下治傷寒吐血下血及血汗人參湯方人參芍藥桔梗銼炒芎藭當歸切焙桂去粗皮甘草炙銼各一兩竹茹三分上八味粗搗篩每服五錢匕水一盞半煎至八分去滓食後溫服治傷寒後餘毒不解心臟熱極吐血不止蜜汁方生藕汁二合生地黃汁三合惡實根汗二合刺薊根汁二合蜜一合上五味相和攪勻每服一二合不計時候頻頻服傷寒瘀血論曰傷寒病在表當汗不汗邪無所出熱結在裡皆成瘀血然太陽病不解熱結膀胱其人如狂者少腹硬滿小便自利下血乃愈又陽明病其人喜忘者木有瘀血大便雖硬反易其色必黑凡病人腹不滿其人自言滿者亦為瘀血在裡皆宜下之使瘀血得下即愈診其脈沉結者瘀血之病也治傷寒陽明證其人喜忘者必有蓄血所以然者本有瘀血故令喜忘大便雖硬反易其色必黑宜抵當湯方水蛭三十枚熬虻蟲三十枚去翅足炒桃仁二十一枚去皮尖麩炒大黃一兩酒洗銼炒上四味銼如麻豆大以水五盞煮取三盞去滓溫服一盞不下更服治傷寒太陽病不解熱結膀胱其人如狂血自下者愈其外不解者尚未可攻當先解其外外已解但少腹急結者乃可攻之宜桃仁承氣湯方桃仁湯去皮尖雙仁十二枚大黃銼一兩桂去粗皮半兩甘草炙半兩芒硝半兩上五味先銼四味如麻豆大以水三盞煎取一盞半去滓下芒硝再煎數沸分溫三服以微利為度未利移時再服治傷寒八九日至十二日病不解發熱如狂少腹滿悶其脈沉結內有瘀血桃仁丸方桃仁湯浸去皮尖雙仁微炒研細水蛭粳米同炒微焦用虻蟲各一分去翅足炒大黃生銼一兩上四味除桃仁搗羅為細末入桃仁同研勻煉蜜為丸如梧桐子大每服二十丸煎桃仁湯下如人行五七里瘀血下為效未下再服治傷寒太陽病隨經入里瘀熱內積蓄血喜忘如狂大黃芍藥湯方大黃銼炒半兩芍藥牡丹皮犀角鎊屑各一兩生乾地黃一兩半上五味銼如麻豆大每服五錢匕用水二盞煎取一盞去滓溫服治傷寒數日不得汗內有蓄血芍藥湯方芍藥牡丹皮各一兩生乾地黃一兩半犀角鎊屑一兩上四味粗搗篩每服三錢匕用水一盞半煎至八分去滓食後溫服治傷寒及溫病應發汗而不發內有蓄血及鼻衄吐血不盡內余瘀血面黃大便黑芍藥地黃湯方芍藥三分牡丹皮二兩犀角鎊屑一兩地黃二兩上三味銼如麻豆大每服三錢匕用水一盞煎至七分去滓下生地黃汁三合攪令勻食後溫服如狂者加黃芩一兩去黑心用治傷寒內有瘀血大便不利小腹急痛大黃湯方大黃銼炒一兩桃仁湯浸去皮尖雙仁麩炒黃研半兩水蛭米炒黃一分木通半兩銼上四味除桃仁外粗搗篩入桃仁同研令勻每服二錢匕以水一盞煎至七分去滓溫服不計時候傷寒口舌生瘡論曰傷寒口舌生瘡此脾受熱熏於口舌又或因冬時發汗吐利後重亡津液表裡俱虛熱勢不已毒氣攻於上焦致口中糜爛生瘡也治傷寒口舌瘡赤爛升麻湯方升麻一兩麥門冬去心焙三兩牡丹皮甘草炙銼各半兩上四味粗搗篩每服五錢匕水一盞半竹葉三七片棗二枚劈破煎至八分去滓食後溫服治傷寒少陰病咽中生瘡語聲不出苦酒湯方半夏湯洗七遍切十四枚雞子一枚去黃留白入苦酒在內上二味納半夏於苦酒內以雞子殼置剪刀環中安火上煮二沸去滓少少含咽治傷寒後下冷上熱口舌生瘡大青煎方大青升麻射干去毛苦竹葉山梔子仁各一兩黃葉去粗皮蜜炙半兩玄參堅者三分蓄薇根二兩生地黃汁白蜜各半斤上一十味將八味銼如麻豆大用水五升煎至一升去滓下蜜地黃汁攪勻再煎如稠餳以淨器盛每服半匙含化咽津不拘時治傷寒後心臟熱舌裂口生瘡黃柏湯方黃柏去粗皮蜜炙大青龍膽玄參堅者生乾地黃各半兩升麻一兩射干三分去毛上七味粗搗篩每服五錢匕水一盞半竹葉三七片煎至八分去滓入蜜一合攪勻食後含化咽津治傷寒熱病後餘熱上衝口舌生瘡羚羊角湯方羚羊角鎊射干去毛麥門冬去心焙蘆根各一兩升麻芍藥各三分木通銼一兩半上七味粗搗篩每服五錢匕水一盞半煎至八分去滓食後溫服治傷寒熱病後乍寒乍熱骨節痛口舌生瘡柴胡湯方柴胡去苗一兩升麻芍藥麥門冬去心焙甘草黃芩去黑心各三分知母焙黃連上八味粗搗篩每服五錢匕水一盞半生薑一棗大拍碎豉一百粒蔥白五寸煎至一盞去滓食後溫服治傷寒後口舌生瘡黃連湯方黃連去須炒一兩大黃銼炒大青升麻黃芩去黑心甘草炙銼各三分上六味粗搗篩每服五錢匕水一盞半煎至八分去滓食後溫服治傷寒後心熱口瘡久不瘥芍藥湯方芍藥黃芩去黑心羚羊角鎊甘草炙銼各一兩大青三分升麻二兩黃柏去粗皮蜜炙半兩上七味粗搗篩每服五錢匕水一盞半竹葉三七片煎至八分去滓入蜜半合更煎一兩沸食後溫服治傷寒後口內生瘡小便赤色手足煩熱秦艽湯方秦艽去苗土柴胡去苗大青各一兩升麻黃芩去黑心甘草炙銼各三分虎杖半兩上七味粗搗篩每服五錢匕水一盞半蔥白五寸切豉一百粒煎至八分去滓食後溫服治傷寒後心臟虛熱滿口生瘡犀角湯方犀角鎊玄參各一兩胡黃連黃芩甘草炙銼各半兩上四味粗搗每服五錢匕水一盞半竹葉三七片煎至半盞去滓食後溫服治傷寒後脾胃熱壅唇口常有瘡蒺藜散方蒺藜子炒去角白扁豆炒各一兩上二味搗羅為散每服一錢匕茶點不拘時治傷寒後心熱口瘡久不瘥黃柏煎方黃柏一兩上一味搗羅為末入蜜三兩和勻慢火煎如稀餳每取少許含化良久吐涎日三五度不拘時咽津亦得覺胸中似有瘡者即用蜜酒調下二錢匕治傷寒心熱口舌生瘡地黃煎方生地黃汁三合蜜五合上二味攪勻慢火煎如稠餳每服半匙含化徐徐咽津不拘時傷寒舌腫脹論曰傷寒舌腫脹者病在三陰也太陰之脈連舌本散舌下少陰之脈循喉嚨俠舌本厥陰之脈循喉嚨之後又手少陰心之經其氣通於舌凡此經絡為風熱所乘隨脈至舌熱氣留於血血氣壅澀故令舌腫脹診其脈數急者是其候也治傷寒熱病咽喉壅塞連舌根腫痛及乾嘔頭痛不下食升麻湯方升麻一兩木通銼黃柏去粗皮銼各半兩玄參三分麥門冬去心焙一兩青竹茹半兩前胡去蘆頭三分石膏碎一兩朴硝二兩上九味粗搗篩每服五錢匕用水一盞半煎至八分去滓食後溫服日再治傷寒心脾虛熱喉中有瘡連舌根腫涕唾不下食乾地黃湯方生乾地黃焙二兩青竹茹雞蘇赤茯苓去黑皮各一兩麥門冬去心焙一兩半玄參三分上六味粗搗篩每服五錢匕水一盞半煎至八分去滓食後溫服日再治傷寒脾肺虛熱毒氣壅塞喉咽連舌根腫滿疼痛犀角湯方犀角鎊屑當歸切焙白芷各一兩升麻甘草炙銼射干杏仁湯浸去皮尖雙仁炒黃各半兩上七味粗搗篩每服三錢匕水一盞煎至七分去滓食後溫服日再服治傷寒喉咽閉塞連舌腫疼小便赤澀馬藺根湯方馬藺根升麻各一兩瞿麥射干各三分犀角屑木通銼各半兩玄參一兩上七味粗搗篩每服三匕水一盞煎至七分去滓食後溫服日再治傷寒熱病喉咽閉塞連舌根腫痛熱毒氣聚於心胸木通湯方木通銼絡石碎各一兩升麻半兩射干半分犀角屑半兩玄參桔梗炒各三分山梔子仁半兩芍藥三分青竹茹半兩朴硝一兩上一十二味粗搗篩每服三錢匕水一盞煎至七分去滓食後溫服治傷寒心脾風熱舌腫口瘡喉咽中痛口吐涎沫羚羊角散方羚羊角屑黃柏去粗皮塗蜜炙大黃銼炒甘草炙各半兩玄參三分上五味搗羅為散每服一錢匕食後煎竹葉熱水調下治傷寒上焦虛熱毒氣壅塞喉咽連舌腫痛參歸湯方玄參射干當歸切焙一兩上三味搗羅為散每服三錢匕水一大盞煎至半盞不去滓食後溫服日再服治傷寒舌腫口內生瘡此是心脾積熱上衝所致青連湯方大青升麻各半兩黃連去須一分大黃銼炒半兩上四味粗搗篩每服三錢匕水一大盞煎至半盞去滓食後溫服治傷寒心脾有熱舌本腫痛生地煎方生地黃汁半斤蜜八兩上二味同攪和勻慢火煎如稠餳每服半匙含化咽津不拘時候日二三服治傷寒咽喉中痛舌根腫滿不能轉此上焦心脾虛熱宜先針舌下兩邊出血即消後服升麻湯方升麻車前子大黃銼炒甘草炙各半兩生乾地黃焙三兩朴硝三分上六味粗搗篩每服三錢匕水一盞半煎至八分去滓溫服日再傷寒咽喉痛論曰傷寒咽喉痛者少陰受邪邪毒壅遏於上焦微則咽喉發痛甚則痛而生瘡又傷寒過經邪熱內盛熏於上焦亦令人咽喉腫痛各隨其證以法治之治少陰病二三日咽痛者可與甘草湯方甘草炙銼一兩上一味以水三盞煎取一盞半去滓分溫二服治少陰病二三日咽痛服甘草湯不瘥者可與桔梗湯方桔梗半兩炒甘草炙一兩上二味各銼細以水三盞煎取一盞去滓分溫二服治少陰病咽中痛生瘡不能語言聲不出者苦酒湯方半夏十四枚湯洗七遍切焙生雞子一枚上二味將雞子破殼去黃入半夏在內並苦酒滿雞子殼置剪刀鐶中安火上令三四沸去滓少少含咽之不瘥更作服治少陰病咽中痛半夏湯方半夏湯洗七遍切焙桂去粗皮甘草炙銼上三味等分粗搗篩每服先以水一盞煎七沸納藥兩方寸匕更煮三沸下火放冷少少咽之治傷寒咽喉閉塞痛咳多腥氣射干湯方射干木通銼升麻各一兩桔梗玄參黃芩去黑心甘草炙銼各三分上七味粗搗篩每服五錢匕水一盞半煎至八分去滓食後溫服治傷寒咽喉痛塞不通小便赤澀羚羊角湯方羚羊角鎊升麻木通銼射干甘草炙銼各一兩芍藥半兩生蘆根銼三兩上七味粗搗篩每服五錢匕