劈破煎至一盞去滓溫服日三治氣逆怒狂陽氣暴厥竹瀝湯方竹瀝一升麻黃去根節三分石膏二兩生薑芍藥各一兩大青梔子仁升麻赤茯苓去黑皮玄參知母焙各三分生葛二兩上一十二味除竹瀝外㕮咀如麻豆大每服六錢匕水二盞煎至一盞去滓下竹瀝半合再煎三沸溫服日二治陽厥怒狂氣逆泄熱湯方半夏湯洗七遍切焙麻黃去根節煎掠去沫焙芍藥杜蘅枳實去瓤麩炒細辛去苗葉杏仁湯浸去皮尖雙仁炒烏梅去核椎碎各三兩松羅二兩上九味銼如麻豆每服五錢匕水一盞半入生薑半分切竹葉十片煎取八分去滓溫服治陽厥狂怒定神丸方白茯苓去黑皮遠志去心防風去叉人參柏子仁炒各一兩一分龍骨一兩半牡蠣煅棗去皮核取肉焙各二兩甘草炙銼一兩上九味搗羅為細末煉蜜和丸梧桐子大初服二十丸加至三十丸溫熟水下日再服治陽厥氣逆善怒狂妄不常羚羊角湯方羚羊角鎊五味子葳蕤茯神去木遠志去心沙參去蘆頭酸棗仁微炒各三分龍骨一兩上八味粗搗篩每服五錢匕水一盞半煎取八分去滓溫服不拘時候
