body:
  text: 卷第六十七諸氣門諸氣統論論曰陰陽雖大不離乎氣故通天地一氣耳人生其間大喜毗於陽大怒毗於陰一吐納一動靜何所逃哉與氣流通而已故氣平則寧氣不平則病內經曰百病生於氣喜則氣緩悲則氣消寒則氣收熱則氣泄恐則氣下憂則氣亂勞則氣耗思則氣結怒則氣逆蓋營衛通利則氣舒而不迫此喜所以氣緩也神情憔悴則氣虧而不全此悲所以氣消也經絡凝澀則氣積而不散此寒所以氣收也腠理通則氣升而汗出此熱所以氣泄也精卻上閉則氣還而不行此恐所以氣下也心多愁慮則氣散而無歸此憂所以氣亂也內外煩勞則氣喘而且汗此勞所以氣耗也身心有止則氣留而不行此思所以氣結也嗔恙傷甚則氣上而嘔血此怒所以氣逆也此九氣者證雖不同大概診寸口脈伏胸中逆氣是諸氣上衝胸中故上氣而胕腫喘息其脈浮大不治上氣脈躁而喘者屬肺肺脹欲作風水發汗而愈脈洪則為氣上脈虛牢伏匿者生牢強者死喘息低仰其脈滑手足溫者生澀而四末寒者死數者亦死謂形損也諸氣論曰內經云百病所生生於五臟肺之所主獨主於氣不足有餘蓋由虛實故所病不同其澄亦異怒則氣逆甚則嘔血及食故氣逆也喜則氣和營衛通利故氣緩也悲則心系急肺布葉舉使上焦不通營衛不散熱氣在內故氣消也恐則精卻則上焦閉閉則氣還還則下焦脹故氣不行而收聚也寒則膚腠閉拒氣道不行故氣收而不散也熱則腠理開營衛通故汗大泄也驚則心無所倚神無所歸慮無所定故氣亂形勞則喘且汗外內皆越故氣耗思則心有所止氣留不行故氣結治寒氣熱氣愁氣怒氣驚氣思氣恚氣七氣丸方大黃二兩半人參半夏湯洗七遍去滑吳茱萸湯洗微炒柴胡去苗乾薑炮細辛去苗葉桔梗菖蒲各半兩赤茯苓去黑皮芎藭甘草炙銼石膏桃仁去尖雙仁炒研蜀椒去目並閉口出汗各三分上一十五味搗羅為末煉蜜和丸如梧桐子大每服溫酒下三丸日三漸加至十丸一方加桂心半兩治諸氣積聚堅牢心腹脹痛蜀椒丸方蜀椒去目及閉口者炒出汗半兩人參半夏湯洗七遍去滑菖蒲柴胡去苗桂去粗皮桃仁去皮尖雙仁麩炒微黃木香吳茱萸湯洗微炒乾薑炮裂銼細辛去粗葉桔梗銼赤茯苓去黑皮芎藭各三分大黃銼炒二兩上一十五味搗羅為末煉蜜和搗五七百杵丸如梧桐子大每於食前以溫酒下十丸漸加至二十丸治一切氣調胃氣化冷痰姜魏丸方生薑一斤去皮切片鹽淹一宿焙乾阿魏一錢用白麵和作餅子炙黃青桐皮去白焙甘草炙銼陳橘皮去白焙各二兩當歸白芷胡椒蓬莪朮炮銼桂去粗皮各一兩丹砂研為衣木香丁香各一錢上一十三味除丹砂外搗羅為末煉蜜和搗三二百杵為丸如櫻桃大丹砂為衣每服一丸生薑湯嚼下婦人醋湯下空心食前服治一切虛冷氣腹脅脹滿胸膈滯悶嘔吐酸水不思飲食藏府滑泄臍腹疼痛均氣丸方木香胡椒乾薑炮烏頭炮裂去皮臍蘹香子炒蓽澄茄青橘皮湯浸去白焙陳橘皮湯浸去白焙蓬莪朮煨銼桂去粗皮各一兩牽牛揀淨半斤炒搗羅取末四兩餘者不用上一十一味搗羅為末生薑自然汁煮麵和丸如梧桐子大每服十五丸至二十丸炒生薑鹽湯下不計時候治一切氣飲食不消紅豆蔻丸方紅豆蔻去皮木香縮砂仁檳榔銼訶黎勒炮用皮藿香葉各一兩陳橘皮去二兩胡椒一分蓽澄茄半兩蘹香子炒香一兩半上一十味搗羅為末以酒煮糊和丸如梧桐子大每服十丸空心食前生薑湯下治一切氣逆胸膈痞悶中脘不快痰癖留滯嘔吐噁心肢體倦怠不思飲食麝香丸方麝香細研丹砂細研木香厚朴去粗皮生薑五錢同搗炒乾肉豆蔻去殼各半兩檳榔末半夏湯洗七遍去滑別搗末各二兩桂去粗皮三分乳香細研一分丁香一分上一十味除半夏末外搗研為細末再同研令勻將半夏末以生薑自然汁同煮為膏和丸如梧桐子大每服十五丸以陳橘皮湯下空心食前服治一切氣消食木香丸方木香丹砂研硫黃研硇砂研各一分檳榔銼半兩肉豆蔻仁三枚半夏漿水煮令透洗淨曝乾巴豆各一兩去皮心膜爛研出油盡上八味搗研和勻水浸蒸餅和丸如梧桐子大每服二丸溫棗湯下大人小兒以意加減治諸氣及産後氣病桂心丸方桂去粗皮當歸銼焙赤白芍炒延胡索炒芎藭生乾地黃炒各一兩硇砂半兩芫花根一斤冬日採洗了碎銼米醋五斤上九味先以醋煮芫花根三分減二去根入硇砂慢火煎又減半下諸藥末和如雞頭大産後血運煩悶童子小便煎赤馬通磨下一丸産後血敗腰腳腫痛生薑童子小便磨下血氣衝心痛薄荷汁熱酒磨下血氣腹脹及痛生地黃汁同熱酒磨下平常血氣蔥酒磨下治一切滯氣引氣丸方丹砂研安息香研麝香研各一分白芥子三百六十粒炒大戟末一錢匕牛黃研半錢匕牽牛末一錢匕五靈脂研乳香研沒藥研各一兩斑蝥二十七枚去翅頭足研巴豆一七粒去皮研出油上一十二味再研令勻用紅米飯為丸如大麻子大臨時隨意湯使下之治諸氣不調胸膈痞滯升降不勻藿香湯方藿香葉厚朴去粗皮生薑汁炙各一兩青橘皮湯浸去白焙甘草炙銼各三分桂去粗皮半兩乾薑炮枇杷葉炙去毛各一分上七味粗搗篩每服三錢匕水一盞入生薑三片棗三枚劈煎至七分去滓稍熱服上氣論曰人一日一夜凡一萬三千五百息呼隨陽出氣於是升吸隨陰入氣於是降一升一降陰陽交通氣乃亨融所謂上氣者蓋氣上而不下升而不降痞滿膈中胸背相引氣道奔迫喘息有聲者是也本於肺臟之虛復感風邪肺脹葉舉諸臟之氣又上衝而壅遏此所以有上氣之候也治上氣乏急地黃煎方生地黃汁一升半生薑汁半升白蜜一斤牛酥半升杏仁湯去皮尖雙仁炒研二兩半紫蘇子研令細二兩甘草炙銼一兩半貝母去心炒黃二兩赤茯苓去黑皮紫菀去苗土洗焙各一兩半竹葉半升上一十一味先搗後五味為細末以水四升半煎取二升去滓入紫蘇子地黃汁生薑汁淨濾同白蜜牛酥銅器中重湯煎攪勿住手候如稀餳以干器貯之時含一匙細細咽汁常令喉中藥不絶治上氣及諸氣逆神驗白前湯方白前去苗三分半夏湯洗去滑生薑汁製切焙一兩紫菀土苗去焙乾三分麻黃去根節一兩厚朴去粗皮塗生薑汁炙三度焙乾人參各三分甘草炙銼半兩桂去粗皮杏仁湯去皮尖雙仁炒各三分上九味粗搗篩每服五錢匕生薑半分拍碎棗二枚劈水二盞煎至一盞去滓溫服日三治上氣脈沉澤漆湯方澤漆去根半兩半夏湯洗去滑生薑汁製焙乾紫菀去苗土焙白前去苗各三分甘草炙銼黃芩去黑心桂去粗皮人參各半兩上八味粗搗篩每服五錢匕入生薑半分拍碎水一盞半煎至一盞去滓溫服日三治上氣咽中不利款冬花湯方款冬花去梗二兩麻黃去根節三兩五味子炒半夏湯洗去滑生薑汁製焙乾各二兩紫菀去苗土細辛去苗葉各一兩射干二兩上七味粗搗篩每服三錢生薑半分棗二枚劈水一盞煎至七分去滓溫服日三夜一治上氣喘急訶黎勒湯方訶黎勒皮半兩五味子炒一兩麻黃去根節杏仁湯浸去皮尖雙仁炒各半兩甘草炙銼一分上五味粗搗篩每服二錢匕水一盞入生薑三片煎至六分去滓熱服不計時候治上氣不得息喉咽不利沃雪湯方麻黃去根節二兩細辛去苗葉一兩五味子微炒二兩桂去粗皮一兩半夏湯洗去滑生薑汁製焙乾二兩上五味粗篩搗每服三錢匕生薑一棗大拍破水一盞半煎至七分去滓溫服日三治上氣倚息不得臥蓽茇丸方蓽茇昆布洗炒乾吳茱萸湯洗焙微炒葶藶隔紙炒紫色杏仁湯去皮尖雙仁炒研細各一兩上五味先搗前四味羅為細末與杏仁同研令勻煉蜜和丸如梧桐子大空腹粥飲下五丸稍加至十丸治上氣喘急馬兜鈴散方馬兜鈴根一兩木香楝實微炮各三分上三味搗羅為散每服二錢匕濃煎烏梅蜜湯調下食後臨臥服治積年上氣服藥不瘥旋覆花丸方旋覆花去梗焙一兩皂莢炙去皮子一兩一分大黃銼炒一兩半上三味搗羅為細末煉蜜丸如梧桐子大每服十丸至十五丸溫湯下日三服治上氣喘促涕唾稠黏久不瘥款氣丸方防己甜葶藶隔紙炒各半兩黑牽牛炒香熱一兩上三味搗羅為細末煉蜜和丸如梧桐子大每服二十丸食後臨臥濃煎桑白皮湯下治上氣喘急心胸滿悶降氣散方青橘皮湯浸去白焙半兩巴豆十四枚上二味同一處炒令巴豆焦赤取青橘皮搗為細末巴豆不用每服一錢匕濃煎丁香湯調下不計時候量虛實加減服治上氣酥蒜煎方酥半升蒜三顆去皮上二味先以酥煎蒜令蒜色黃去蒜別入生薑汁拌合同煎使熟空腹取半合溫服之日三治上氣喘急雙仁丸方桃仁杏仁並去雙仁皮尖炒各半兩上二味細研水調生面少許和丸如梧桐子大每服十丸生薑湯下微利為度上氣胸脅支滿論曰上氣胸脅支滿者肺臟虛寒邪氣實也肺為寒所客則氣收聚故肺葉舉而上焦不通令上氣奔迫痞滿支乘於胸脅也治上氣胸滿喘息氣絶痰水盛溢厚朴枳殼湯方厚朴去粗皮塗生薑汁炙枳殼去瓤麩炒甘草炙銼各三分秦艽去苗土一兩半陳橘皮湯浸去白焙三分半夏湯洗去滑生薑汁製一兩半桂去粗皮麻黃去根節杏仁湯去皮尖雙仁炒黃芩去黑心石膏碎赤茯苓去黑皮細辛去苗葉各半兩大戟去苗銼一分上一十四味粗搗篩每服三錢匕生薑三錢大棗二枚劈破水一盞煎至七分去滓溫服日三治上氣兩脅滿急杏仁丸方杏仁湯浸去皮尖雙仁炒赤茯苓去黑皮防葵各二兩吳茱萸湯洗焙乾炒陳橘皮湯去白焙桂去粗皮防風去叉澤瀉各一兩一分白朮射干芍藥紫蘇子微炒桔梗生蘆頭炒枳實去瓤麩炒各一兩上一十四味搗羅為細末煉蜜和丸如梧桐子大溫酒服十丸日二加至三十丸治上氣胸滿晝夜不得臥半夏丸方半夏湯洗去滑生薑汁製焙乾芎藭各半兩蜀椒去目及閉口者炒出汗一分附子炮裂半皮臍貝母去心微炒桑根白皮銼碎炒款冬花去枝梗焙細辛去苗葉各半兩紫菀去苗土焙一兩乾薑炮裂半兩鍾乳研一兩杏仁湯浸去皮尖雙仁研細半兩上一十二味先將前十味搗羅為細末與鍾乳杏仁同研令勻煉蜜丸如梧桐子大每服三丸至五丸粥飲下日三服不拘時候治上氣五臟閉塞不得飲食胸脅支脹乍來乍去虛氣在心滯氣在胃唇乾口燥肢體動搖手足冷疼夢寐恐怖此五臟虛乏不足所致柴胡當歸湯方柴胡去苗四兩當歸切焙一兩細辛去苗葉半兩防風去叉一兩麻黃去根節三兩桂去粗皮一兩半夏湯洗去滑生薑汁製焙乾二兩半人參半兩黃耆銼一兩黃芩去黑心半兩杏仁湯退去皮尖雙仁炒二十五枚上一十一味粗搗篩每服三錢匕生薑一棗大拍碎棗二枚劈水一盞煎至七分去滓溫服日三治上氣胸膈噎塞兩脅痞滿利痛消積氣止吐逆定咳嗽進飲食丁香丸方丁香五十枚芫花醋拌炒令紫色甘遂炒大戟去苗紫菀去苗土各一分白牽牛子微炒取粉半兩附子炮裂去皮臍一分巴豆五十枚去皮心膜醋煮黃色研硇砂膩粉各一錢研上一十味搗研為細末拌和勻煮棗肉和丸加雞頭大每服一丸嚼棗一枚同藥乾咽調順正氣消腹脅脹滿利胸膈木香丸方木香檳榔銼肉豆蔻仁大黃煨銼牽牛子生搗取粉用郁李仁湯去皮各一兩續隨子去殼木通銼胡椒各半兩上九味搗羅為細末煉蜜和丸如豌豆大食後生薑湯下五丸至七丸利胸膈行滯氣消脹滿療腹脅痛降氣丸方蘹香子微炒木香桂去粗皮檳榔銼桃仁湯去皮尖雙仁研各一兩萊蔔子京三稜煨銼青橘皮湯去白焙各三分厚朴去粗皮生薑汁炙香熟一兩上九味搗羅為細末拌勻酒煮麵糊和丸如