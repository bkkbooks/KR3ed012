body:
  text: 卷第一百四十八馬汗入瘡論曰諸瘡未愈而為馬汗淹漬者令人身體壯熱疼痛焮腫毒氣淫溢則嘔逆悶亂傳入腹中亦能殺人治馬汗入瘡腫痛方馬鞭梢燒灰上一味為末以豬脂和塗瘡上治馬汗入瘡疼痛方雞毛上一味燒灰每服一錢匕水調服治馬汗入瘡毒氣攻腫痛方馬鞭上手執處皮燒灰上一味研細和豬膏塗瘡上治馬汗入瘡腫痛方醇酒上以酒飲任意令醉醒必愈治馬汗入瘡方新汲冷水上以水不住洗瘡上水暖即易治馬汗入瘡遍身毒氣攻方莧菜上一味水煮熟取汁淋洗瘡上治馬汗入瘡方石灰燒赤上一味研細用少許敷瘡上治馬骨所刺毒氣攻人方大麻仁半升上一味研細以少水解去滓取汁每飲一盞頻頻服治馬骨刺肉中疼痛方馬齒莧上一味研細以水少許解去滓每次一盞更以此汁洗刺處治馬骨刺肉方雄黃乾薑各半兩上二味搗研為末調敷刺處治忽為馬骨刺肉方馬屎上一味塗刺處治馬骨刺肉中成瘡痛方小蒜細搗上一味炒乘暖塗瘡上治馬血汗入瘡方上嚼栗子肉爛塗之治馬汗血入瘡神仙膏方鉛丹三兩炒令紫色清麻油六兩杏仁四十個不去皮尖椎破綿裹當歸半兩切碎綿裹桃柳枝各二十一莖俱長一寸上六味先用慢火煎油藥三時辰即入杏仁當歸兩裹子候杏仁黃紫色漉出二味卻入桃柳枝煎亦如杏仁等時候漉出別用綿濾過再煎下鉛丹用柳木篦攪一向左轉不住手至稠取膏少許滴水中若直墜下水底不散在水面其膏成矣傾在瓷器中候冷卻以新汲水浸一宿來晨去水收貯勿令雞犬婦人見之每取少許攤貼瘡上治馬血汗入瘡方雄黃研硫黃研礬石研硇砂研各一分巴豆二十個去皮不出油附子去皮臍生用半兩上六味同搗研為末用醋飯和丸如雞頭大將一丸分為兩處用醋貼若瘡口合卻須微撥破紅色處磨出黃赤水瘥猘犬齧傷論曰犬不觸而傷人者謂之猘犬凡春末夏初犬多發狂邂逅被齧者法宜灸之百壯以後日灸一壯百日不闕者方得免若見瘡差痛定已平復者此毒在內旦夕必死此害至重世皆輕之凡狂犬所齧令人狂躁精神異別但看灸時著艾之初便覺心醒其驗可待又云猘犬齧人七日輒應一發不發則脫也經百日方得免耳每到七日須搗韭汁一升飲之切勿食犬肉蠶蛹食之即發不可救也瘡未愈又禁食生魚肥膩冷食落葵之物一年內不可飲酒余並依方藥治之治狂犬咬人重發者蟾蜍灰散方蟾蜍三個燒灰上一味搗羅為細散每服二錢匕溫水調下服時不得令人知治猘犬齧人方地榆二兩上一味搗羅為散每服二錢匕溫水調下更將末塗瘡上良治犬齧人痛悶口噤者蝟皮散方蝟皮燒存性頭髮各一兩上二味共燒為灰每服一錢匕溫水調下口噤拗開灌之治犬齧肉痛愈後復發並可服韭汁方韭不拘多少上一味搗取汁每服七分盞和溫水飲之日三服治猘犬咬人毒氣攻心悶亂方桃白皮三兩甘草半兩炙微赤銼桂心一兩杏仁三十枚湯浸去皮尖雙仁麩炒微黃研成膏上三味細銼以水三大盞煎取一盞去滓入杏仁膏攪令勻分為二服良久再服又方蝦蟆一枚燒灰上一味細研為末以粥飲調服之即愈又方梅子焙乾上一味細研為末每服二錢匕溫酒調下又方死蛇一條炙令焦上一味細研為末令以內孔中即愈治猘犬齧重發方乾薑二錢末上一味搗為細散每服二錢匕以溫水調下不拘時服治猘犬毒方虎骨燒灰上一味碾為細末每服一錢匕研杏仁湯調下又將虎骨灰和燈盞殘油調敷瘡上治猘犬毒方韭根三兩故木梳二枚上二味都用水二升煮一升旋旋飲之治猘犬傷毒入肉方東南桃枝白皮一握洗銼上一味用水二升煮取一升去滓分三服吐為效治狂犬咬人成瘡方莨菪根銼一兩上一味搗羅為末和鹽少許塗瘡上日三易治犬咬成瘡痛方石灰上一味細研為末以醋和塗瘡上治犬咬方上熬杏仁令黑色細研成膏敷之又方鼠糞上一味細研為末以臘月豬脂和敷之又方上取地龍爛搗封被咬處當有毛出或收得乾者搗末油調封之又方虎肉一兩燒灰上一味細研為末以醋調塗之又方枸杞葉少許鹽少許上二味同搗令熟後敷於瘡上即愈治狂犬咬人傷痛方杏仁四十枚去皮尖雙仁拍碎桃白皮切二升上二味以水二升先煮桃皮取汁一升去滓下杏仁再煮減半去滓溫分三服得吐乃效治狂犬咬人方以熱牛屎塗又熔蠟灌瘡皆瘥治狂犬咬人方以沸湯和灰擁瘡上又以地龍屎封之出犬毛皆驗諸蟲齧論曰諸蟲齧所傷其類不一然毒入皮膚非真氣正法不能移變故上古有移精變氣祝由之法今雖具存而逐惡去毒之劑亦不可廢也治百蟲齧毒氣內攻雄黃丸方雄黃研硃砂研各半兩藜蘆去苗微炒巴豆去皮心研去油鬼臼去須三味各一分上五味搗研為末煉蜜和丸如大豆大每服三丸空腹煎乾薑湯下當轉出惡物並蟲等當煩悶後以鴨為羹食之治沙蝨方麝香少許辰砂少許上二味細研為末以鹽和塗之瘥又方麝香大蒜各等分上二味搗研令勻以羊脂和著筒中帶之治沙蝨方上取鹽五合水一升煮一沸以漬洗瘡上治百蟲齧沙蝨蛇蠍蠱毒辰砂丸方辰砂雄黃研水飛赤足蜈蚣續隨子各一兩麝香一分上五味搗研為末粟米糊為丸如緑豆大每服一丸冷水下良久身上毛旋起處即是毒所傷卻用水調一丸於毛旋起處繞圍四畔磨塗其蝨自爆出治一切蟲齧地膽散方地膽地錦等分上二味曝乾搗羅為散每用一錢匕盞內用醋調卻用盞一隻合定慢火熬熱塗齧處如已齧得三兩日即先以牡蠣末一錢新汲水調下然後塗此藥治百蟲齧毒攻瘡痛塗方犀角一片上一味以井華水磨取濃汁塗瘡上治五毒蟲螫赤痛不止馬齒莧敷方馬齒莧葉洗切上一味爛研厚敷之治雜蟲齧雄黃敷方雄黃細研半兩上一味醋少許調敷之治一切蟲齧痛膩粉敷方膩粉一分上一味用生薑自然汁調敷之治鼠齧麝香敷方麝香細研一錢上一味封齧處帛縛之治守宮齧青麻心塗方青麻葉心七枚上一味以手挪碎取汁塗之治守宮齧硇砂散方雄黃半兩硇砂一分上二味細碾勻為散以少許敷之治蠶齧菟絲子散方菟絲子甜葶藶蛇床子仁鹽各半兩麝香一錢上五味搗羅為散以醋調塗之治毒蟻螫人雄黃散方雄黃一錢麝香半錢同研細上二味研勻以生麻油調敷之治蠔蟲齧豬牙垢塗方豬牙中垢上一味塗齧處頻易避蚊子樗皮散方臭樗皮細切阿魏芫花夜明沙炒羅木鎊上五味粗搗篩以慢火於房內爇之諸蛇螫論曰蛇火蟲也熱氣炎極為毒至甚五方所出名稱不同惟廣南尤多彼山崇地濕水火蒸郁所生最盛蘄黃之地蛇類稍衆南中有一山居水中當四五月之交群蛇吐毒氣凡高數丈蒸若雲霧每至中夏瘴氣盛行亦緣此也凡蛇類不可悉狀其毒極微不能殺人者惟花蛇烏蛇故入藥品凡見蛇不言正名但云蟲及地索之類以避之或入山及履深草宜帶雄黃麝香闢之蛇入人家者燒羚羊角令煙遍復即去矣治諸毒蛇咬毒氣攻心迷悶雄黃散方雄黃研麝香研乾薑炮為末各半兩巴豆一分去皮膜心出盡油研上四味一處和勻每服一字匕以新汲水調下才中便服得微利則毒氣消未利更一二服治諸毒蛇所傷解毒白礬散方白礬熬汁枯研羚羊角燒灰研各半兩射罔一分雄黃研麝香研乾薑炮各一兩上六味搗研為細散用敷瘡上凡蛇畏雄黃疑有蛇處於其下微火燒雄黃蛇並散走治諸蛇咬毒氣攻心桂香散方桂去粗皮栝蔞根各二兩上二味搗羅為細末以小竹筒盛密塞帶行猝為毒蛇所中即敷之治一切毒蛇咬迷悶椒黃敷方閉口椒一兩為末蒼耳苗五兩為末生薑汁二合硫黃半兩為末上四味相和敷之治諸蛇咬毒氣攻心迷悶二蟲膏方地龍五枚蜈蚣一枚端午日收赤足者上二味相和爛搗敷之治諸蛇咬痛腫椒蒜敷方椒合口蒜各等分上二味同搗令熟敷之瘥又方硇砂一兩上一味細研為末以園內生樓蔥就土取卻蔥角尖傾入硇砂末卻以角尖復一七日掘出蔥傾硇砂汁於一張薄紙上陰乾每有傷處取錢孔大紙貼之立愈又方黑豆葉五兩上一味細銼搗敷瘡上日四五度用之又方遠志不以多少上一味細嚼令爛以敷之並內一片子於所螫瘡孔中數易之治蛇咬人瘡已合而餘毒在內淫淫痛癢方紫莧不拘多少上一味搗絞取汁飲一盞以滓封瘡上治蛇咬出血去毒射罔散方射罔不拘多少上一味搗末以唾調敷腫上血出即愈治蛇咬敷瘡雄黃散方雄黃不拘多少上一味為末敷瘡上亦用銅青敷瘡中治蛇卒繞人不解方上以熱湯淋之即解治因睡臥地上被蛇誤入口內牽挽不出方以刀破蛇尾內生椒三二粒裹著須臾即出又割母豬尾瀝血著口中即出又以艾灸蛇尾即出又以刀周匝割蛇尾截令皮斷卻將皮倒脫即出治毒蛇咬毒氣攻心腹悶亂方豉四兩椒去目熏陸香各三兩白礬燒灰二兩上四味相和爛搗以唾調敷傷處治毒蛇並射工沙蝨等傷眼黑口噤手腳強直毒攻腹內逡巡不救白礬散方白礬生用一兩甘草生用半兩上二味搗為細末每服三錢匕冷水調灌下便以大蒜橫切錢子貼瘡口以艾炷於蒜錢上灸之不拘壯數如蒜錢焦即別換更灸痛定則止治蛇螫人竅出血虻蟲散方虻蟲初食牛血者二七枚上一味燒為灰以溫水調服治蛇咬蒜灸方獨頭蒜一顆上一味薄切安咬處以艾灸之熱徹即止又方麝香一分細研雄黃一分細研半夏末一分生用上三味細研令勻敷之即愈又方白礬二兩研大麻葉五兩銼蒼耳莖葉五兩銼上三味以水一斗煮至六升去滓下白礬末溫溫浸之又方貓兒糞三兩燒灰乾薑二兩銼牛角䚡二兩燒灰臰黃一兩上四味搗羅為散以津唾調敷於螫處又方黑豆五升礪碎上一味分為二分於盆中以水浸過三寸深令浸螫處良久去舊豆著新豆復浸不過三兩易愈兼以豆為末以調服之亦妙治毒蛇所傷方上用艾炷當齧處灸之引去毒氣即瘥其餘惡蟲所螫馬汗入瘡等用之亦效蠍螫論曰凡蠍螫人有雌雄之辨雄者痛止一處雌者流散無定世傳禁祝之法雖衆然湯尉塗敷之劑亦不可廢也治蠍螫吹鼻散方藜蘆去蘆頭豬牙皂莢酥炙去皮丁香蜀葵花蕊蓽茇各半兩上五味搗羅為末每用一字螫左邊吹右鼻螫右邊吹左鼻中治蠍螫尉痛丸方雄黃研礬石熬令汁枯各半兩上二味再同研消蠟和乘熱丸如彈子大以蠟紙收藏遇螫將藥火上炙令熱乘熱尉痛處冷又炙尉數次治蠍螫疼痛烏頭塗敷方烏頭不去皮臍上一味為細末每用少許以津唾調塗敷治蠍螫馬齒莧塗敷方馬齒莧生切大蒜生切二味各半兩共細研乾薑一分不炮為末上三味一處和勻塗敷螫處治蠍螫止痛出毒散方石榴花艾葉心蜀葵花等分上三味搗羅為末水和塗之治蠍螫疼痛不定鉛丹塗敷方鉛丹半兩上一味細研以醋調塗螫處治蠍螫猝疼藥末及者水洗方新汲冷水上一味若著手足以冷水漬之水微暖則易之又方蓽茇膩粉蕤仁木鱉子各等分上四味取五月五日午時面南搗羅為細末修合之時不可令婦人孝子見螫著右邊以少許點左眼螫著左邊點右眼又方蒼耳四月八日午時取之陰乾上一味搗羅為細末每用以醋調敷之又方虎頭骨炙板藍子蓽茇各一分上三味於五月五日午時搗羅為細末用燈心點藥少許於眼大眥男左女右點之神效如卒暴用不必重午日合
