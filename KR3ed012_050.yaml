body:
  text: 卷第五十肺癰論曰肺癰之病脈數而實蓋以風中於衛呼氣不入熱過於營吸而不出風熱凝滯蓄結為癰其證惡寒口乾胸中隱隱痛咳而胸滿時出腥唾者是也宜速治之久則吐膿如米粥始萌可救膿成難治治肺癰葦葉湯方葦葉細切二升桃仁五十枚去皮尖雙仁炒研瓜子薏苡仁各半升上四味以水一斗先煮葦得五升去滓納諸藥煮取二升再去滓分溫三服當吐如膿治肺癰甜葶藶丸方甜葶藶隔紙炒別研細羅過杏仁去皮尖雙仁麩炒別研如膏各一兩貝母煨令黃色去心別搗再研半兩上三味先使不蚛皂莢肥者二兩生椎碎入在無灰酒半升內熟挼濾去滓入淨銚子中慢火熬成膏次將前三味藥拌勻旋入皂莢膏和丸如梧桐子大每服二十丸溫水下如肺氣喘急濃煎桑白皮湯下不拘時候治肺癰防己葶藶丸方防己一兩葶藶隔紙炒三分杏仁去皮尖雙仁炒研如脂一分上三味先搗前二味細羅為末與杏仁同研令勻取棗肉和丸如梧桐子大每日空腹煎桑白皮湯下二十丸日三服治肺癰咳嗽防己丸方防己杏仁去皮尖雙仁麩炒貝母去心甘草炙銼各二兩甜葶藶四兩隔紙炒香上五味搗研為末麵糊和丸如緑豆大每服三十丸不拘時候溫水下治肺癰生地黃湯方生地黃汁一升當歸切焙甘草炙白石英碎綿裹人參各一兩附子炮裂去皮臍一兩白豆小者二十粒白雞一隻男用雌女用雄治如食法一作雉上八味除地黃汁雞外銼如麻豆以水一斗五升先煮雞取七升汁去雞納地黃汁諸藥等煮取三升去滓每服一盞日三夜二治肺癰薏苡仁湯方薏苡仁一升苦酒三升上二味同煮取一升去滓微溫頓服有膿血吐出驗治肺癰吐膿如粳米粥桔梗湯方桔梗銼炒一兩半甘草炙銼半兩上二味粗搗篩每服六錢匕水二盞煎至一盞去滓空腹溫服須臾吐膿數合瘥治肺癰涕唾涎沫吐膿如粥麥門冬湯方麥門冬去心焙二兩桔梗去蘆頭五兩甘草炙銼三分上三味粗搗篩每服三錢匕水一盞青蒿心葉十片同煎至七分去滓溫服稍輕者粥飲調下亦得不計時候治肺癰吐膿五心煩熱壅悶咳嗽四順湯方貝母去心桔梗炒紫菀去苗土各一兩甘草炙銼半兩上四味粗搗篩每服三錢匕水一盞煎五七沸去滓不拘時候稍冷服如咳嗽甚入去皮尖杏仁三枚同煎小兒量減治肺癰吐膿經時不瘥桔梗白朮湯方桔梗銼三分白朮生乾地黃焙薏苡仁甘草炙敗醬各二兩當歸切焙一兩桑根白皮銼一升上八味銼如麻豆以水一斗五升煮大豆四升取七升去豆納清酒三升合諸藥煮之去滓取三升每服一盞日三夜二肺癰喘急胠滿論曰內經謂肺之癰喘而兩胠滿蓋肺主氣而合於息其脈支別者從肺經橫出腋下故邪氣蘊積於肺則上為喘急下連兩胠滿治宜瀉其肺臟之邪毒也治肺癰氣逆喘咳平肺湯方黃耆一兩銼沉香半兩紫菀去土人參紫蘇去梗各二兩杏仁去皮尖雙仁麩炒橘皮湯去白焙各一兩上七味㕮咀如麻豆每服五錢匕水一盞半煎至八分去滓溫服日三治肺癰喘不得臥葶藶大棗瀉肺湯方葶藶五兩熬搗末取五錢匕上一味先以水三盞入大棗二十枚煮取二盞去棗入葶藶末五錢匕服之間日一服治肺癰喘急坐臥不得瀉肺湯方桑根白皮銼甜葶藶隔紙炒各一兩上二味粗搗篩每服三錢水一盞煎至六分去滓食後溫服微利為度治肺癰喘急杏仁丸方杏仁去皮尖雙仁麩炒研入甜葶藶隔紙炒皂莢刮去黑皮蜜炙各一兩上三味搗羅為末煉蜜和丸如梧桐子大生薑蜜湯下十丸至二十丸食後臨臥服治肺癰咳嗽上氣喘急不得臥涕唾稠黏胸膈不利方葶藶隔紙後炒紫色別研如膏桑根白皮微炙細銼大棗揀洗去核上三味用水三盞先煎桑白皮一兩棗十二枚取一盞半去滓入葶藶膏一彈子大攪化煎取八分溫服良久當吐惡物或微利三兩行其疾減後宜服補肺藥七日外病未退量人加減更一服治肺癰咳喘體有微熱煩滿胸前皮甲錯者夜合湯方夜合白皮一兩銼上一味以水三盞取一盞半分溫二服治肺癰上喘咳嗽胸膈滿悶口乾煩熱及吐血華蓋散方赤茯苓去黑皮甜葶藶隔紙炒桑根白皮銼各一兩大黃半兩濕紙裹煨熟上四味搗羅為散每服二錢匕生薑湯調下食後臨臥服肺氣面目四肢浮腫論曰肺氣面目四肢浮腫者其候咳嗽脹滿狀如水氣蓋肺主氣氣為陽陽體輕虛為寒所折攻發於外散於皮膚氣逆浮腫內經論久嗽不已則三焦受之三焦咳狀咳而腹滿不欲飲食此皆寒氣聚於胃關於肺使人多涕唾而面目浮腫氣逆也治肺氣咳嗽面目虛腫大便祕澀葶藶丸方甜葶藶隔紙炒二兩防己半兩桑根白皮銼炒三分郁李仁湯浸去皮炒二兩上四味搗羅為末煮棗肉和丸如梧桐子大每服二十丸生薑湯下不拘時候治肺盛上氣胸脅脹滿身面浮腫瀉肺湯方葶藶子隔紙炒搗如泥半兩大棗劈取肉二十枚桑根白皮銼一兩上三味先將棗並桑白皮用水二升煮取一升去滓次納葶藶子同煎取八合分溫水五服以利為效治肺氣面目浮腫咳嗽煩熱心腹壅滯胸膈氣促郁李仁湯方郁李仁湯浸去皮尖炒二兩赤茯苓去黑皮貝母炒防己商陸杏仁湯浸去皮尖雙仁麩炒紫蘇莖葉桑根白皮銼陳橘皮湯浸去白焙木香檳榔銼各一兩上一十一味粗搗篩每服四錢匕以水一大盞入生薑一棗大拍碎棗三枚劈煎至七分去滓不拘時候溫服治肺氣喘息面目浮腫葶藶丸方葶歷子隔紙炒陳橘皮湯浸去白焙柴胡去苗棗肉研各一兩上四味先搗前三味細羅為末煉蜜與棗肉為丸如梧桐子大每服空腹煎杏仁湯下二十丸日二治肺氣咳嗽面目浮腫涕唾稠黏不可喘息葶藶飲方葶藶隔紙炒研如泥一兩桑根白皮銼紫菀去土各一兩半檳榔銼三枚木通銼一兩半郁李仁炒研一兩上六味除研者外粗搗篩再和勻每服五錢匕水一盞半煎至一盞去滓食後溫服日二治肺臟虛實不調痰滯喘嗽面目浮腫頰赤虛煩馬兜鈴湯方馬兜鈴麻黃去節五味子炒甘草炙各一兩上四味粗搗篩每服三錢匕水一盞入沙糖少許同煎至六分食後臨臥去滓溫服治肺氣咳嗽面腫四肢浮獨聖餅子蛤蚧一對雌雄頭尾全者淨洗用法酒和蜜塗炙熟人參紫團參一株如人形良上二味搗羅為末熔蠟四兩濾去滓和藥末作六餅子每服空心用糯米作薄粥一盞投藥一餅趁熱細細呷之治肺氣胸脅通身腫脹方葶藶子隔紙炒令紫色三兩上一味搗碎先以水三升煮大棗三十枚取汁一升次納藥一棗大許同煎至七合頓服治肺臟積壅氣滯不通面目浮腫兩鼻生瘡杏仁散方杏仁葶藶隔紙炒馬兜鈴柴胡去苗麻黃去根節煎去沫射干貝母去心各一分皂莢半兩燒存性甘草炙一錢半上九味搗羅為末每服二錢匕食後以綿裹含化咽津肺臟痰毒壅滯論曰肺臟痰毒壅滯之病其證目眩頭旋胸膈痞滿常多痰唾不思飲食鼻聞腥臭蓋肺主氣居於膈上為四臟之蓋邪熱壅滯熏散胸膈與津液相搏故鬱結成痰也治肺臟壅熱咽喉腫痛頭目昏重煩滿引飲客熱痰毒大小便祕澀人參防己湯方人參半兩防己一分羌活去蘆頭芎藭檳榔銼連翹天麻玄參防風去叉犀角鎊木香各半兩惡實微炒甘草炙各一兩上一十三味粗搗篩每服三錢匕水一盞入生薑三片蔥白一寸煨熟同煎至六分不拘時候去滓溫服治肺臟痰毒壅滯六神散方人參百合白朮山芋白茯苓去黑皮各一兩甘草炙半兩上六味搗羅為散每服二錢匕白湯點服日三治肺熱胸中痰實咽喉不利化痰硝石半夏丸方硝石半夏湯洗七遍去滑焙各半兩上二味先搗半夏為末次入硝石同研令細再入白麵一兩三味拌勻更羅過滴水丸如緑豆大生薑湯下二十丸治肺熱痰實壅滯潤肺化痰利咽膈栝蔞湯方大栝蔞五枚去殼取瓤並子點剁令極勻細微以白麵同和作餅子焙乾搗羅為末稱三兩杏仁去皮尖雙仁麩炒令黃砂盆內研令極細山芋各三兩甘草炙取末一兩上四味將山芋與栝蔞同於銀石器中慢火炒令香熟取出與甘草杏仁末和拌勻更用鹽花三分細研同和勻每服一錢沸湯點服治肺熱咳嗽痰壅氣喘不安前胡飲方前胡去蘆頭一兩半貝母去心白前各一兩麥門冬去心焙一兩半枳殼去瓤麩炒一兩芍藥赤者麻黃去根節各一兩半大黃蒸一兩上八味㕮咀如麻豆每服三錢匕以水一盞煎取七分去滓食後溫服日二治肺臟多熱面上生瘡胸中積滯或痰唾稠黏或睡中口內有涎紫蘇散方紫蘇葉桔梗炒麻黃去根節煮去浮沫羌活去蘆頭牡丹皮連翹各一兩上六味粗搗篩每服三錢匕水一盞半煎一盞去滓溫服日三治肺臟壅盛心胸滿悶咳嗽煩喘咽膈痰滯不欲飲食大便多祕潤腸丸方桑根白皮銼甜葶藶隔紙微炒防己天門冬去心焙枳殼去瓤麩炒各半兩檳榔銼一分牽牛子白者炒香搗羅取細末一兩上七味搗羅為末煉蜜和丸如梧桐子大每服二十丸煎人參湯溫下不拘時治肺臟壅實痰嗽祕滯黑神丸方皂莢不蚛者一斤切長一寸於鐺子內炒令煙盡後依次序下杏仁以下四味炒杏仁去尖半夏知母貝母各一兩上五味同炒令黑色便入酥一兩攪勻後入巴豆霜半兩滲在藥上更不得攪動急著器物蓋令不得煙出四縫以濕紙固濟候冷出於地上以紙襯攤勻蓋復出火毒一宿杵羅為末以醋麵糊為丸如緑豆大每服三丸至五丸生薑湯或茶酒任下臨睡服治肺氣不調上膈痰滯喘滿氣促語聲不出款冬花丸方款冬花半兩焙馬兜鈴杏仁去皮尖雙仁炒各一分苦葶藶隔紙微炒半兩桂去粗皮一錢上五味搗羅為細末煮棗肉和丸如梧桐子大每服二十丸食後臨臥以溫水下治肺臟熱咽喉及口乾咳嗽氣促痰壅貝母飲方貝母去心百合各一兩半紫菀去苗桑根白皮桔梗炒各一兩麥門冬去心焙一兩半大黃蒸七錢半甘草炙半兩上八味㕮咀如麻豆每服三錢匕以水一盞煎取七分去滓食後溫服日二治久嗽肺熱咳唾稠濁胸滿痛悶木通湯方木通銼桔梗炒桑根白皮升麻黃芩去黑心各一兩半牽牛子炒一合生地黃切三兩上七味㕮咀如麻豆每服五錢匕以水一盞半煎取八分去滓溫服日二治肺臟積熱才食辛酸熱毒之物即喉中痰壅射干散方射干杏仁去皮尖雙仁炒麻黃去根節煮去浮沫紫蘇子炒羌活去蘆頭甘草桔梗牡丹皮柴胡去苗枇杷葉去毛上一十味等分粗搗篩每服二錢匕水一盞生薑兩片同煎取八分食後臨臥服治肺壅痰毒頭眩嘔逆柴胡湯方柴胡去苗甘草炙各一兩芎藭獨活去蘆頭羌活去蘆頭貝母去心款冬花各半兩麻黃去根節桑根白皮銼各一兩半上九味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不計時肺臟風毒生瘡論曰皮膚者肺之所合也肺臟有熱風邪乘之風熱相搏毒氣熏發皮膚之間微則生癮疹甚則癢痛搔之成瘡治肺臟風熱化痰涎除喘息皮膚生瘡骨痛筋急口面喎斜牛黃散方牛黃苦參丹砂研水飛麝香研各一分羌活去蘆頭當歸切焙人參獨活去蘆頭秦艽去苗土前胡去蘆頭枳殼去瓤麩炒各三分桂去粗皮茯苓去黑皮白朮白附子玄參丹參防風去叉蔓荊實乾薑炮沙參防己白芷半夏湯洗七遍薑製乾蠍酒浸一宿炒天南星炮各半兩牛膝酒浸一宿切焙附子炮裂去皮臍麻黃去根節湯煮掠去沫焙各一兩芎藭仙靈脾黃耆銼各一分烏蛇一條酒浸去骨炙上三十三味搗研為散每服一錢匕溫酒調下不拘時候如欲作丸即煉蜜和丸如彈丸大每丸分作六服豆淋酒或薄荷酒嚼下治積年肺臟風毒遍身生瘡大腸壅滯心神煩躁皂莢煎方不蚛皂莢二斤一斤生搗水浸一宿挼汁一斤去黑皮塗酥炙大鵝梨一十枚生薄荷葉生荊芥穗各一斤皂莢