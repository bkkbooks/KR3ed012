body:
  text: 卷第八十二腳氣上氣論曰風濕毒氣之中人多從下起足先受之故名腳氣毒氣循經上入於肺則氣道奔迫升降不順故令上氣喘滿治腳氣衝上入腹腹急氣上胸膈真氣欲絶半夏湯方半夏二兩湯洗去滑炒黃桂去粗皮三兩乾薑炮一兩蜀漆一兩半甘草炙銼人參附子炮裂去皮臍各半兩上七味銼如麻豆每服三錢匕水一盞煎至六分去滓溫服空腹日午晚間各一初服稍停藥力恐氣上不得下宜減之治腳氣上喘心下妨悶不能食茯苓湯方赤茯苓去黑皮銼桑根白皮炙銼白朮各二兩半陳橘皮湯浸去白焙防己各一兩半旋覆花三分檳榔銼大黃銼微炒杏仁湯浸去皮尖雙仁炒黃八十枚上九味粗搗篩每服三錢匕先別用麻黃一分水一盞半煎五七沸掠去沫下藥並生薑一分拍破同煎至六分去滓空腹服日晚再服治腳氣上喘心下妨悶桂苓湯方桂去粗皮三兩澤瀉銼赤茯苓去黑皮銼乾薑炮各二兩上四味粗搗篩每服三錢匕水一盞煎至七分去滓空腹日午日晚各一治風濕腳氣樂令黃耆湯方黃耆炙銼桂去粗皮芍藥各三兩細辛去苗葉麥門冬去心焙赤茯苓去黑皮當歸切焙陳橘皮去白焙人參前胡去蘆頭甘草炙銼各二兩半夏四兩湯洗去滑焙烏頭十五枚炮裂去皮臍蜀椒去目及合口者炒出汗一兩上一十四味銼如麻豆每服五錢匕水一盞半生薑三片大棗三枚劈同煎至一盞去滓溫服日三夜一治腳氣面目腫上氣眠臥不得氣欲絶桑白皮湯方桑根白皮炙黃三兩陳橘皮湯浸去白焙一兩葶藶子紙上炒令紫色別搗二兩上三味除葶藶別搗外粗搗篩入葶藶末再搗勻每服三錢匕先用棗五枚劈破水一盞半煎至一盞去滓入藥末再煎至七分去滓溫服如人行五里以來再服服後當利一二行腫氣下即瘥三五日服一劑治腳氣脹滿妨悶喘促大麻子湯方大麻子炒檳榔末一錢生薑汁一合上三味先以童子小便一盞研麻子取汁與檳榔末生薑汁銀器盛重湯上微煎三兩沸空心溫服治腳氣脹滿大腹湯方大腹連皮細銼四枚搗末杏仁湯浸退皮尖雙仁研碎三七枚上二味同拌再搗研勻以童子小便一盞藥三錢匕煎至七分去滓空腹日午各一服治腳氣肺氣不問冷熱一切氣紫蘇湯方紫蘇葉一兩半銼白茯苓去黑皮一兩陳橘皮湯浸去白焙半兩上三味粗搗篩每服三錢匕水一盞入生薑半分拍破同煎至七分去滓空腹溫服日晚再服若患人四體熱者加麥門冬一兩去心焙冷者加厚朴一兩去粗皮生薑汁炙小便澀少者加桑白皮一兩炙大便祕者加檳榔仁一兩銼霍亂腹脹加甘草一兩炙銼瘧加黃連人參皆隨病狀以意加減治腳氣兼上氣痹滿不能食牛膝散方牛膝細切酒浸焙乾硇砂研如粉細辛去苗葉丹參去蘆頭白朮郁李仁湯浸退皮尖別研各三兩上六味除研者外搗羅為散再入研藥拌勻每服兩錢匕食前以溫酒調服春秋冬三月宜服夏熱不可服之春秋服消腫利小便兼補益除風虛冷脹少食治腳氣上氣枳實散方枳實去瓤麩炒二兩桂去粗皮四兩赤茯苓去黑皮白朮各一兩一分上四味搗羅為散每服一錢匕食前溫酒調服漸增至二錢匕日午晚臥各一服治腳氣上衝頭目面浮腫咳嗽喘乏氣促心胸脹兩脅硬腰重小便澀胯冷腿膝疼腫無力海蛤丸方海蛤研如粉訶黎勒皮焙柴胡去苗赤茯苓去黑皮杏仁湯浸去皮尖雙仁麩炒赤芍藥牽牛子炒令熟各一兩半陳橘皮湯浸去白焙桑根白皮炙銼貝母去心焙白檳榔銼大黃銼炒郁李仁湯浸去皮別研枳殼去瓤麩炒各一兩上一十四味搗羅為末煉蜜和丸如梧桐子大每日空腹煎棗湯下二十丸日午再服治腳氣咳嗽貝母丸方貝母去心三分蛤蚧一對洗淨塗酥炙黃紫菀去苗土防己細銼桑根白皮銼炒人參赤茯苓去黑皮銼款冬花天門冬去心焙葶藶子隔紙炒大黃銼炒白檳榔銼百部紫蘇子炒各一兩木香杏仁湯浸去皮尖雙仁炒各半兩上一十六味搗羅為末煉蜜和丸如梧桐子大每服一十丸空腹米飲下日午再服治腳氣面目浮腫上氣眠臥不得若臥氣即欲絶桑白皮湯方桑根白皮炙銼六兩陳橘皮浸去白焙二兩葶藶隔紙炒一兩搗如膏大棗二十枚去核上四味先將前二味銼碎用水六升煮取二升去滓次下棗又煮取一升去棗內葶藶膏如大棗許再煮三分減一頓服當利三二行水氣下日一服治腳氣上氣悶絶者開胃口令人能食薑汁飲方生薑四兩上一味和皮搗取自然汁早晨取半合以溫湯半合和服之每如人行十里一服日三治腳氣上氣抬肩喘衝心痛烏豆湯泄腳方烏豆二斗上一味以水五斗煮取二斗五升分在兩故甕中盛每甕中浸一腳遣人從膝向下淋洗百遍以來久病者不過再浸即瘥泄腳後服加減木香丸方木香白芍藥枳殼去瓤麩炒各二分檳榔四枚細銼桂去粗皮半兩大黃銼炒二兩上六味搗羅為末煉蜜丸如梧桐子大空腹酒下十五丸日午再服漸加至三十丸以大便通利為度治腳氣上氣喘滿及毒氣衝心煩悶柴胡湯方柴胡去苗赤芍藥各一兩半旋覆花紫蘇莖葉各一兩桑白皮炙銼二兩大腹連皮銼二枚上六味粗搗篩每服三錢匕水一盞入生薑半分劈碎同煎至七分去滓下朴硝一字更煎一兩沸溫服治腳氣上氣喘滿嘔逆咳嗽減食萆薢湯方萆薢當歸切焙木香牛膝酒浸切焙桂去粗皮黃連去須各一兩延胡索芎藭天雄炮裂去皮臍檳榔銼代赭碎桑耳石葦去毛威靈仙去苗土射干各一兩半上一十五味粗搗篩每服五錢匕水一盞半入生薑五片煎取八分去滓溫服不拘時治腳氣乘肺上氣喘促杏仁煎方杏仁湯浸去皮尖雙仁一兩炒百合細劈洗令淨一分入水二升同研甘草生麻黃不去節射干各半兩上五味除百合外細銼入在百合汁中煎取一升去滓貯在淨器中每日不限早晚取一合服之此藥不得久停惟宜旋合治腳氣循經上乘於肺令人上氣喘滿旋覆花湯方旋覆花三兩羌活去蘆頭芎藭桑根白皮炙銼青橘皮去白焙附子炮裂去皮臍桂去粗皮赤小豆各一兩萊蔔子炒香一兩上九味銼如麻豆每服三錢匕以水一大盞煎至七分去滓空心溫服治腳氣腫滿上氣橘皮防己湯方陳橘皮湯浸去白焙防己桑根白皮銼各二兩吳茱萸湯洗焙乾炒檳榔銼各一兩大腹並子銼七枚生薑銼炒三兩甘草炙銼半兩上八味粗搗篩每服五錢匕水一盞半入蔥白三莖切同煎至八分去滓溫服空心食前治腳氣衝心煩悶上氣喘悶木香檳榔湯方木香三分檳榔半兩銼上二味粗搗羅每服三錢匕水一盞入蔥白二寸劈碎煎至七分去滓下紅雪二錢生薑汁半合童子小便一合再煎一兩沸溫服治腳氣抬肩喘豌豆湯淋泄方豌豆二升上一味用水五斗蔥白十莖劈碎椒三分煮取湯二斗傾入兩瓷甕以腳各安在一甕中浸遣人從膝上淋洗百遍如無瓷甕瓦甕亦得患極者不過兩次效腳氣腫滿論曰腳氣風濕毒氣客搏腎經腎者胃之關也關閉不利則聚水而生病水性就下故令腎氣不化小便不利濕寒之氣下注足脛腫脹不消故謂之腳氣腫滿治腳氣腫滿茯苓散方赤茯苓去黑皮三兩葶藶紙上炒半兩人參防風去叉澤瀉甘草炙銼桂去粗皮白朮狼毒銼醋炒蜀椒去目並閉口者炒出汗乾薑炮赤小豆炒各一兩大戟半兩肉蓯蓉酒浸切焙豬苓去黑皮女葳各三分上一十六味搗羅為散每服一錢匕溫酒調下日二夜一小便利為度治久患腳氣心腹煩滿木瓜丸方木瓜切六兩人參二兩桂去粗皮一兩半木香沉香各一兩厚朴去粗皮生薑汁炙陳橘皮湯浸去白焙柴胡去苗各一兩半高良薑吳茱萸湯浸焙炒各一兩赤芍藥二兩檳榔銼三兩上一十二味搗羅為末煉蜜丸如梧桐子大每服三十丸溫酒下不拘時治腳氣上攻身體腫滿小便赤澀茯苓湯方赤茯苓去黑皮桑根白皮銼防己陳橘皮湯浸去白焙各一兩半旋覆花半兩杏仁湯浸去皮尖雙仁炒麻黃去根節白朮紫蘇莖葉各一兩上九味粗搗篩每服五錢匕先以水煮黑豆取汁一盞半入生薑半分拍碎同煎至八分去滓溫服不拘時治腳氣腫滿行步艱難羌活丸方羌活去蘆頭天麻各一兩防風去叉白殭蠶炒白附子炮牛黃研各半兩犀角鎊羚羊角鎊丹砂研各三分雄黃研一分天南星水煮半日切作片子焙三分上一十一味搗研為末煉蜜丸如皂子大每服兩丸不計時候薄荷湯嚼下治腳氣腫滿或上攻心腹脹滿不思飲食續斷丸方續斷銼黃耆銼杜仲去粗皮銼炒牛膝酒浸切焙蘹香子炒羌活去蘆頭白附子炮木瓜切蒺藜子炒去角楝實銼陳粟米炒去米各二兩上一十味搗羅為末用醋煮麵糊丸如梧桐子大每服二十丸煎牛膝酒下日三夜一治腳氣腫上衝心腹旋覆花湯方旋覆花犀角鎊陳橘皮湯浸去白焙赤茯苓去黑皮紫蘇莖葉各二兩上五味粗搗篩每服五錢匕水一盞半生薑五片棗二枚劈破同煎至三盞去滓溫服更與後犀角丸相間服犀角丸方犀角鎊蒺藜子炒去角五味子牛膝酒浸切焙杏仁湯浸去皮尖雙仁炒枳殼去瓤麩炒甘草炙銼人參木通銼車前子桑根白皮各一兩上一十一味搗羅為末煉蜜和丸如梧桐子大每服二十丸溫酒下治腳氣虛腫氣滿不食檳榔湯方檳榔銼防風去叉防己桂去粗皮各一兩麻黃去根節二兩陳橘皮湯浸去白焙一兩半杏仁去皮尖雙仁炒秦艽去苗土附子炮裂去皮臍各半兩葛根銼二兩甘草炙銼一兩半上一十一味銼如麻豆每服五錢匕水一盞半生薑三片同煎至一盞去滓不拘時溫服治腳氣腫滿胸膈痞塞吐逆不下食芍藥湯方赤芍藥防己枳殼去瓤麩炒各二兩獨活去蘆頭防風去叉桂去粗皮葛根銼各一兩半半夏湯洗去滑薑汁製一兩上八味粗搗篩每服三錢匕水一盞生薑五片同煎至六分去滓空心日午近晚溫服治腳氣腫滿上衝心胸煩悶氣急旋覆花湯方旋覆花犀角鎊各一兩前胡去蘆頭桑根白皮紫蘇莖葉杏仁去皮尖雙仁炒赤茯苓去黑皮各一兩半上七味粗搗篩每服三錢匕水一盞生薑三片同煎至六分去滓不拘時候溫服治濕毒腳氣腫滿小便少檳榔湯方檳榔銼二兩桑根白皮三兩黑豆半升上三味粗搗篩每服五錢匕水一盞半煎取一盞去滓溫服日三夜一治腳氣腰脊膝浮腫茯苓湯方赤茯苓去黑皮乾薑炮澤瀉各二兩桂去粗皮三分上四味粗搗篩每服三錢匕水一盞煎至六分去滓空心日午近晚溫服治濕毒腳氣腫滿小便少桑根白皮湯方桑根白皮一兩檳榔五枚銼黑豆半升生薑洗切焙半兩上四味粗搗篩每服五錢匕水一盞半煎取一盞去滓不拘時溫服治腳氣腑腫桑白皮湯方桑根白皮二兩杏仁去皮尖雙仁炒一兩檳榔生三兩銼上三味粗搗篩每服五錢匕水一盞半煎至一盞去滓空心日午近晚溫服治腳氣足脛胕腫上氣遍身疼脹風引大豆湯方大豆一合半揀令淨炒香附子炮裂去皮臍三兩枳殼去瓤麩炒澤瀉陳橘皮去白各四兩甘草炙銼赤茯苓去黑皮防風去叉各二兩上八味除豆外銼如麻豆每以水兩盞先煎豆一合半至一盞去豆入藥三錢匕再煎至七分去滓食前溫服日三若腫疼止即去大豆澤瀉更服三兩劑瘥治腳氣腿膝腫急腰髀𤸷痹心煩氣喘茱萸飲方吳茱萸醋炒二兩人參赤茯苓去黑皮各三分桑根白皮銼陳橘皮湯浸去白焙大腹連皮銼大黃銼炒細辛去苗葉檳榔銼羌活去蘆頭杏仁湯浸去皮尖雙仁炒二兩蜀椒去目並閉口者炒出汁三兩上一十二味粗搗篩每服五錢匕水一盞半入生薑五片同煎八分去滓溫服空心食前日再微利為度治腳氣脾腎俱虛皮膚腫滿黑豆丸方黑豆一合炒令熟桑根白皮炙銼一兩半大腹三枚並皮細銼木通銼陳橘皮去白炒各一兩一分紫蘇莖細銼