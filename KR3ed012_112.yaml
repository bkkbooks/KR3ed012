body:
  text: 卷第一百一十二目青盲論曰龍木論稱內障有變青盲者初患之時昏暗不痛不癢亦無翳膜至於失明與不患者相似是知青盲之狀外無異證瞳子分明而不見物由肝腎氣虛精血衰弱不能上榮故目盲而無所見也經曰肝氣通於目目和則知白黑養生方乃以塞故井水瀆令人目盲豈其本哉治青盲障翳積熱但瞳仁未損即無不治還睛散方人參細辛去苗葉決明子炒車前子防風去叉芎藭丹參升麻覆盆子地膚子黃連去須遠志去心茺蔚子桂去粗皮蒺藜子炒厚朴去粗皮生薑汁炙銼槐實麥門冬去心焙柏子仁白芷蜀漆白茯苓去黑皮麻黃去根節湯煮掠去沫木通銼黃芩去黑心五味子附子炮裂去皮臍菥蓂子枸杞子禹餘糧煅醋淬各一兩上三十味搗羅為散每服二錢匕食前白米飲調下日再漸加至三錢匕治一切眼昏障翳將至青盲不問新久皆可治抵聖丸方家菊花去梗蒂取蕊焙四兩附子炮裂去皮臍切如指面大一兩蒺藜子炒去角二兩肉蓯蓉淨洗酒浸一宿切焙大黃銼紙裹煨各一兩上五味以無灰酒二升半同拌和入銀石器內盛貯蓋了於飯甑中蒸自早及晡取出焙乾搗羅為末如有浸藥剩酒煮黃粟米為糊丸如梧桐子大如酒少即添酒為糊日午夜臥濃煎槐枝湯下三十丸治內外障青盲雀目眼生黑花白翳十年以上不見光明者一月有效羊肝丸方羯羊肝一具切薄片文武火炙為末蕤仁一兩錦文斑鳩一隻去頭足腸胃取肉炙為末黃連去須細辛去苗葉防風去叉瞿麥子桂去粗皮蒺藜子炒去角甘菊花牡蠣燒為末各五兩蔓荊子二升蒸五七遍羌活去蘆頭三兩白茯苓去黑皮四兩決明子炒三兩上一十五味搗羅十二味為末入羊肝斑鳩牡蠣末乳缽內同研勻煉蜜和丸如梧桐子大每服二十丸食後臨臥茶清下治青盲不見物或有痰熱生翳如蠅翅復睛上決明散方石決明草決明青葙子蛇蛻炙細辛去苗葉井泉石甘草炙各等分上七味用木杵臼搗羅為散次用獖豬肝一具去膽膜淨洗瀝乾以竹刀子隨肝直切作縫用藥末一兩滲入線縛了入生絹袋內再縛定沙鍋內米泔煮更入青竹葉一握枸杞根一握黑豆三合同煮肝熟為度取出候冷食後用竹刀子逐片切食之用元煮汁送下患久者三兩具見效直須潔淨不可犯鐵器治眼見黑花飛蠅澀痛昏暗漸變青盲蕤仁丸方蕤仁去皮地膚子石決明淨洗別搗羅人參細辛去苗葉地骨皮去土白茯苓去黑皮白朮各二兩楮實三兩石膽研如粉半兩空青別研如粉防風去叉各一兩半熟乾地黃焙三分鯉魚膽五枚青羊膽一枚上一十五味除膽及研藥外細銼焙搗羅為末入研藥拌勻膽汁和煉蜜丸如梧桐子大每服二十丸食後臨臥米飲下日再治眼青盲並無赤痛但不見物補腎還睛丸方山芋巴戟天去心菟絲子酒浸別搗末人參陳面微炒黃杜仲去粗皮酥炙令煙絕熟乾地黃焙桑上寄生續斷各一兩牛膝去苗酒浸切焙山茱萸獨活去苗各三分肉蓯蓉湯浸洗焙一兩半上一十三味除面外搗羅為末入面煉蜜和丸如梧桐子大每服三十丸空心溫酒下治目昏暗眩轉倒僕或三兩日卻明發動無定久成青盲天雄散方天雄炮裂去皮臍山茱萸芎藭人參白朮遠志去心獨活去蘆頭桂去粗皮葛根銼茯神去木莽草各半兩防風去叉三分山芋三兩上一十三味搗羅為散每服一錢匕空心甘菊花酒調下食後再服日三漸加至二錢匕治頭旋眼暗欲成青盲羚羊角湯方羚羊角鎊二兩羌活去蘆頭黃芩去黑心防風去叉玄參各一兩半車前子人參升麻決明子各一兩細辛去苗葉半兩上一十味粗搗篩每服三錢匕水一盞煎至七分去滓食後臨臥服日二治肝臟熱沖目赤瞻視漠漠積年青盲不見物澤瀉湯方澤瀉升麻杏仁湯浸去皮尖雙仁研決明子微炒大黃銼炒黃芩去黑心甘草炙枳實去瓤麩炒芍藥各一兩梔子仁人參赤茯苓去黑皮黃柏去粗皮細辛去苗葉白朮各半兩柴胡去苗四兩桑根白皮銼炙二兩青葙子一兩上一十八味粗搗篩每服五錢匕水一盞半入生薑半分拍破同煎至一盞去滓入芒硝半錢匕放溫食後臨臥服日再治眼昏暗將成青盲茯神湯方茯神去木山芋遠志去心肉蓯蓉酒浸去皴皮切焙地骨皮蔓荊實青葙子羚羊角鎊甘草炙各半兩人參甘菊花各三分上一十一味粗搗篩每服三錢匕水一盞煎至七分去滓食後臨臥服日再治肝腎虛風沖目赤視物昏暗漸成青盲升麻湯方升麻麥門冬去心焙玄參白楊樹皮柴胡去苗梔子仁黃連去須各一兩犀角鎊一兩半決明子炒甘草炙各半兩黃芩去黑心二兩地骨皮三兩上一十二味粗搗篩每服三錢匕水一盞煎至七分去滓放溫食後臨臥服日再治眼欲變青盲百合湯方真珠末三分胡黃連三分石決明三兩搗碎細研水飛過地膚子一兩琥珀三分天靈蓋三分燒灰母豬肝半兩切炙乾上七味搗羅為散每服二錢匕食後溫水調下臨臥再服日二治眼青盲積年不瘥宜服牛肝散方黃牛肝一具細切曝乾土瓜根三兩羚羊角屑二兩蕤仁一兩湯浸去赤皮細辛一兩車前子二兩上六味搗羅為細散每服二錢匕空心溫酒調下治肝虛寒目青盲視物多不明漸生障翳防風補煎方防風去苗白蘚皮陳橘皮去白芎藭甘草炙獨活去蘆頭前胡去蘆頭細辛去苗葉各一兩上八味粗搗篩每服五錢匕水一盞半大棗二枚劈破同煎至一盞去滓放溫服治肝虛寒茫茫不見物點眼真珠煎方真珠細研一分鯉魚膽二枚白蜜二兩上三味合和銅器中微火煎取一半新綿濾過瓷瓶中盛每以銅箸點如黍米著目眥即淚出頻點取瘥治青盲及內外障或因幼小淚出或因久視傷明或因熱病瘥後兩目俱赤或因打損即有胬肉復睛或吃石藥熱發兩目作瘡或傷煙火兩目眇視或兩目畏日遠視不辨青赤或兩眥爛瘡填睛丸方石決明一枚淨洗別搗白陽起石飲上蒸五度研磁石飯上蒸五度研陳橘皮湯浸去白焙梔子花肉蓯蓉去皴皮切焙黑石飯上蒸五度研人參生薑切焙厚朴去粗皮生薑汁炙銼苦參白芷黃芩去黑心甘草炙銼白茯苓去黑皮桂去粗皮防風去叉杏仁去皮尖雙仁炒研各二兩升麻生乾地黃焙各八兩龍腦研一分黃連去須麥門冬去心焙槐子炒黃柏去粗皮車前子乳香研各四兩蕤仁青葙子各三兩烏賊魚骨去甲並鹹味一兩上三十味搗研為末煉蜜和搗三萬杵丸如梧桐子大每服六丸空心米飲下服訖即食食後更服十丸漸加至二十丸食後即加食前不加食後仍以牛乳煎湯下二年勿食五辛熱面陳物一年勿食羊頭肝肚驢馬兔肉毒魚治青盲內障翳暈無問冷熱風淚等但瞳子不破者悉治之空青決明膏方空青研極細一兩決明子馬蹄者炒乾薑炮各一分蕤仁黃芩去黑心各三分白蜜好者二升細辛去苗葉車前子黃柏去粗皮黃連去須各半兩上一十味搗研九味為末和蜜內銅器中蓋頭勿令透氣以米五升安藥器於上蒸飯熟為度乘熱以綿濾去滓瓷瓶子盛以銅箸點眼眥若多年青盲點二十日見物每點兩日即用摩頂膏治青盲眼瞳子分明亦無翳膜不痛不癢內障不見物蒼朮丸方蒼朮米泔浸知母黃芩去黑心玄參甘草人參細辛去苗葉芎藭白茯苓去黑皮木香貝母去心石決明刮洗淨茺蔚子各一兩上一十三味細銼焙過搗羅為末煉蜜和丸如梧桐子大每服三十丸食後溫水下臨臥再服治青盲烏雞丸方上用黃荊嫩頭春初取之九蒸九曝取半斤用烏雞一隻純黑者以米飼五日安淨版上飼以大麻子又一二日旋收糞曝乾取半淨瓷瓶子內糞熬令香黃然後和荊頭搗成末煉蜜和丸如梧桐子大每服十五丸陳米飲下加至二十丸日二服治青盲瞳子不壞者十得九瘥蔓荊子散方上以蔓荊子六升蒸透以熱湯於甑中淋之又蒸又淋三遍止焙乾搗羅為細散清酒服方寸匕日二治眼忽不見物如青盲狀方上令人爛嚼母姜以舌舓眼六七度即瘥治青盲目無所見五加皮湯方五加皮銼玄參桑根白皮銼麥門冬去心焙各一兩茯神去木半兩上五味粗搗篩每服五錢匕水一盞半煎取七分去滓入荊瀝半合再煎一兩沸放溫食後臨臥服治內障青盲風赤翳膜豬肝膏方豬肝一具於淨鐺中以水一斗同藥煮稹豆花槐花地黃花各一兩上四味將後三味搗羅為末和肝煮一時辰上有凝脂作片掠取於瓷缽中以火暖之上有似酥片者即收入瓷閤中以銅箸點眼治青盲槐芽散方槐芽胡黃連楊梅青各一兩龍腦研一錢上四味搗羅為散隨左右吹在鼻內候鼻中有黃水出數日即瘥將變內障眼論曰眼疾始於浮淺久而弗圖變為內障者非一端也龍木論內障皆有其漸蓋從一眼先患後乃相牽俱損是肝腎氣虛風邪熱毒上攻眼目氣血衰微久則為害但不疼不痛亦無眵淚目視如輕煙或如薄霧或見垂絲或見蠅翅或見飛蚊其初若無足慮至其成是障則漫不知省今以將變內障者敘之蓋圖難於易之意也治風高雀目漸成內障宜服還睛丸方人參細辛去苗葉石決明洗白茯苓去黑皮知母切焙芎藭木香各一兩茺蔚子二兩上八味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心茶清下治肝虛雀目恐變成內障先服卓肝湯後服瀉肺飲卓肝湯方大黃銼炒車前子細辛去苗葉各一兩黃芩去黑心茺蔚子玄參各二兩上六味粗搗篩每服三錢匕水一盞黑豆三七枚同煎至六分去滓放溫食後臨臥服瀉肺飲方防風去叉黃芩去黑心芍藥桔梗銼炒大黃銼炒各一兩上五味粗搗篩每服三錢匕水一盞半煎至一盞入芒硝半字去滓放溫食後臨臥服治眼疼痛浮花恐變成綠風內障羚羊角湯方羚羊角鎊二兩人參白茯苓去黑皮玄參細辛去苗葉黃芩去黑心車前子防風去叉桔梗銼炒知母焙各一兩上十味粗搗篩每服三錢匕水一盞煎至六分去滓放溫食後臨臥服治目暗浮花恐變成黑風內障補腎丸方澤瀉去苗葉菟絲子酒浸焙別搗各一兩五味子炒熟乾地黃焙茺蔚子各二兩山芋一兩半細辛去苗葉一兩上七味除菟絲子別搗外搗羅為末再和勻煉蜜和丸如梧桐子大每服二十丸空心鹽湯下治眼昏暗浮花恐變成烏風內障決明丸方石決明洗茺蔚子車前子防風去叉細辛去苗葉桔梗銼炒人參白茯苓去黑皮山芋各一兩上九味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心鹽湯下治眼漸昏及睹浮花恐變成青風內障羚羊角飲方羚羊角鎊地骨皮洗人參羌活去蘆頭車前子玄參各一兩上六味粗搗篩每服三錢匕水一盞煎至七分去滓放溫食後臨臥服治雷頭風恐成內障先服瀉肝飲後服磁石丸瀉肝飲方防風去叉二兩五味子炒細辛去苗葉黃芩去黑心車前子茺蔚子桔梗銼炒大黃銼炒芒硝研各一兩上九味粗搗篩每服三錢匕水一盞煎至七分去滓放溫食後臨臥服磁石丸方磁石二兩燒赤醋淬七遍五味子炒牡丹皮附子炮裂去皮臍玄參各一兩上五味搗羅為末煉蜜和丸如梧桐子大每服三十丸空心鹽湯下治肝虛勞兼膀胱久積虛冷目眩見花不明漸成內障黃耆丸方黃耆銼白茯苓去黑皮石斛去根各二兩鹿茸去毛酥炙一兩半五味子炒二兩防風去叉牡丹皮酸棗仁覆盆子生乾地黃焙各三兩上一十味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心溫酒下加至三十丸治眼目昏暗漸變內障空青丸方空青半兩別研飛過決明子炒菟絲子酒浸別搗為末各二兩茺蔚子五味子炒細辛去苗葉蔓荊實柏子仁別研防風去叉蒺藜子炒去角枸杞子石龍芮各一兩人參一兩去蘆頭上十三味搗羅為細末入空青研勻煉蜜和丸如梧桐子大食後以竹葉湯下二十丸日三治眼昏暗漸成內障宜服石決明丸方石決明一兩桂心半兩槐子一兩陽起石一兩酒煮半月細研水飛過磁石一兩半燒醋淬七遍細研水飛過菟絲子一兩酒浸三日曝乾別研為末肉蓯蓉一兩酒浸一宿刮去皴炙令乾熱乾地黃一兩上八味搗研羅為細末煉蜜和搗三二百杵丸如梧桐子大食前鹽湯下二十丸漸加至三十丸治眼昏暗將變成內障補肝丸方杏仁一兩茺蔚子一兩青葙子一兩枸杞子一兩五味子一兩茯苓一兩去皮乾地黃三兩菟絲子二兩決明子一兩山芋車前子地骨皮焙柏子仁大黃細辛去苗葉甘草炙銼人參黃芩去黑心黃連去須防風去叉各一兩半上二十味搗羅為末煉蜜和丸如梧桐子大每服二十丸食後米飲下臨臥再服加至三十丸治眼昏暈不以年月深淺恐變為內障秦皮散方秦皮去粗皮二兩瞿麥穗升麻枳殼去瓤麩炒黃連去須前胡去蘆頭梔子仁各一兩半菥蓂子車前子大藍實防風去叉決明子炒各二兩莧實羚羊角鎊黃柏去粗皮炙各一兩上一十五味搗羅為末煉蜜和丸如梧桐子大每服二十丸食後米飲下臨臥再服加至三十丸治眼昏暗漸成內障菊花丸方菊花二兩黃連去須一兩半槐子一兩半車前子茺蔚子青葙子地膚子決明子微炒菥蓂子苦參防風去叉黃芩去黑心蕤仁各一兩上一十三味搗羅為末煉蜜和丸如梧桐子大每服二十丸食後米飲下臨臥再服治眼生翳膜遮障睛瞳及內障青盲車前散方車前子菊花蛇蛻燒灰甘草炙銼京三稜炮銼石決明研草決明炒各一兩井泉石研二兩枳實麩炒一分上九味並搗羅為散每服一錢半匕食後用熟水調下不拘時候治內障青盲翳暈及時暫昏暗一切眼疾花鳩丸方花鳩一隻去毛腸觜足炙熟羊肝一具切炒細辛去苗葉防風去叉桂去粗皮黃連去須牡蠣熬甘菊花蒺藜子炒去角各五兩白茯苓去黑心瞿麥穗各四兩羌活去蘆頭三兩蔓荊子二升蒸三次蕤仁半斤決明子二合上一十五味搗研為末煉蜜丸如梧桐子大每服二十至三十丸空心日午臨臥茶酒任下半月見效治內外障眼蕤仁丸方蕤仁三兩黃連去須車前子各二兩人參麥門冬去心焙各三分青葙子湯浸焙乾防風去叉黃芩去黑心生乾地黃焙秦艽去苗土羚羊角末各一兩半甘草炙銼天門冬去心焙丹參炒升麻炒苦參炒羌活去蘆頭地膚子湯洗炒決明子炒地骨皮炒菊花焙玄參炒各一兩一分上二十二味搗羅拌勻煉蜜為丸如梧桐子大食後煎百合湯下二十丸加至三十丸但有瞳仁不拘內外障翳並治內障眼針後用藥論曰胬肉攀睛淫膚垂瞼之類皆為外障審其輕重則有服食點洗之劑鉤割熨烙之法以外去者蓋其勢微淺所以除治在皮膚之表爾內障之證異於是有不痛不癢者虛實特未定也有冰澀浮沉棗花偃月之翳淺深固不一也亦有清明無翳若未嘗縈疾苦者則患與未患又相似也是以論內障者每重於醫療必俟之歲月其翳成熟乃用針撥或一之而愈或再三而愈若披雲霧睹青天白日之快方且封閉綿密以待安寧而又服藥以攻其內所以掃除盪滌絕其本根復其自然而已世之專治者甚多載在方冊不可概舉大抵以龍木為師法龍木內障二十有三可以針者一十有二皆言針後用某湯某丸則知內障非針無以取效且治眼至於針誠出於不得已豈可輕用妄投耶針法具載別敘今姑以針後用藥先後次第列之於左治內障圓翳狀如冰水團圓一點不散針後羚羊角飲方羚羊角鎊三兩防風去叉二兩車前子細辛去苗葉人參知母焙黃芩去黑心各一兩上七味粗搗篩每服三錢匕水一盞煎至六分去滓食後臨臥溫服治內障圓翳眼針後及澀翳針後防風湯方防風去叉茺蔚子五味子知母焙桔梗炒玄參車前子大黃銼焙細辛去苗葉黃芩去黑心各一兩上一十味粗搗篩每服三錢匕水一盞煎至六分去滓溫服食後臨臥日二治內障冰翳如水凍堅結睛上撥之不下針後及橫關翳針後還睛丸方車前子防風去叉茺蔚子知母焙各二兩人參桔梗炒黃芩去黑心各一兩五味子細辛去苗葉各一兩半生乾地黃焙玄參各半兩上一十一味搗羅為末煉蜜和丸如梧桐子大空心茶清下十丸至十五丸治內障滑翳狀似水銀珠子針撥之時閉之不牢針後及散翳針後補肝湯方人參白茯苓去黑皮玄參黃芩去黑心各一兩防風去叉知母桔梗炒茺蔚子各二兩上八味粗搗篩每服三錢匕水一盞煎至六分去滓溫服食後臨臥治內障滑翳眼針後石決明丸方石決明車前子防風知母焙各二兩茺蔚子細辛去苗葉五味子黃芩去黑心人參白茯苓去黑皮大黃銼炒各一兩上一十一味搗羅為末煉蜜和丸如梧桐子大每服十五丸食前茶湯下治內障冰翳如水凍堅結睛上用針撥收之後及散翳七寶丸方石決明搗研二兩人參茺蔚子各一兩琥珀搗研三分真珠搗研半兩龍腦研一分熊膽半兩上七味搗研為末煉蜜和丸如梧桐子大每服十五丸食前茶清下加至二十丸治內障散翳狀如酥點潰爛以針撥如涎散亂針後及驚振內障眼針後還睛湯方人參白茯苓去黑皮細辛去苗葉五味子桔梗炒各一兩車前子防風去叉各二兩上七味粗搗篩每服五錢匕水一盞半煎至八分去滓夜臥溫服治內障浮翳或如棗花或若銀釘浮淺透外針後決明散方石決明刮洗細辛去苗葉防風去叉車前子人參白茯苓去黑皮大黃銼炒茺蔚子各一兩桔梗炒半兩上九味搗羅為散每服二錢匕粥飲調下食後臨臥服治內障浮翳針後及棗花翳針後墮翳丸方石決明刮洗人參知母焙各一兩細辛去苗葉半兩防風去叉生乾地黃焙各二兩五味子一兩半兔肝一具炙乾上八味搗研為末煉蜜和丸如梧桐子大每服二十丸空心茶湯下漸加至三十丸治內障沉翳隱隱伏藏黑睛向日即見針後服羚羊角湯方羚羊角鎊防風去叉茺蔚子各二兩車前子黃芩去黑心玄參各一兩大黃銼炒半兩上七味粗搗篩每服三錢匕水一盞煎至六分去滓溫服食前臨臥治內障沉翳針後空青丸方空青研如粉五味子細辛去苗葉石決明刮洗搗研車前子各一兩生乾地黃焙防風去叉知母焙各二兩上八味搗研為末煉蜜和丸如梧桐子大每服二十丸空心茶湯下治內障橫翳橫著瞳仁中心起如劍脊針後七寶湯方羚羊角鎊犀角鎊丹砂研各一兩胡黃連石決明刮洗搗研車前子甘草炙銼各半兩上七味除丹砂決明外粗搗篩每服三錢匕水一盞煎至七分去滓入丹砂末半錢匕決明末一字匕再煎兩沸溫服食後治內障偃月翳如凝脂一邊厚一邊薄狀如偃月針後及內障棗花翳針後四膽丸方象膽半兩鯉魚膽七枚熊膽一分牛膽半兩石決明搗研一兩麝香研一錢上六味搗研為末麵糊和丸如梧桐子大每服空心茶清下十丸治驚振內障眼針後鎮肝丸方山芋茺蔚子各二兩防風去叉一兩半石決明別搗研車前子細辛去苗葉人參白茯苓去黑皮柏子仁搗研一兩上九味搗研為末煉蜜和丸如梧桐子大每服二十丸食前茶清下治內障黑水凝結青白色成翳針後蘆薈丸方蘆薈人參各半兩柏子仁搗研一兩羚羊角鎊二兩細辛去苗葉一兩甘草炙銼牛膽乾者別研入各一分上七味除膽外搗研為末入研膽再和勻煉蜜為丸如梧桐子大每服二十丸空心茶清下治內障黑水凝翳針後通明湯方柏子仁搗研二兩防風去叉茺蔚子各一兩車前子桔梗炒各二兩人參白茯苓去黑皮玄參各一兩上八味粗搗篩每服三錢匕水一盞煎至六分去滓溫服食後臨臥治內障白翳病久毒氣不散中心變黃色針後決明車前散方石決明刮洗茺蔚子防風去叉各二兩甘菊花車前子人參各一兩上六味搗研為散再同和勻每服二錢匕以粥飲調下食後臨臥服外物傷目論曰目為外所傷輕者因物撞擊胞瞼腫痛重者或致目睛突出但眼帶未斷即內瞼中急搗生地黃綿裹以敷之仍以闢風膏摩四旁無使外風乘隙內服除熱治風鎮驚止痛藥以療之若治之失時惡血凝積腐瘀侵睛致生翳膜鉤割熨烙皆隨所宜也治外物撞刺目睛胞瞼腫痛除風散方防風去叉二兩車前子藁本去苗土細辛去苗葉五味子各一兩芎藭桔梗銼炒各一兩半上七味搗羅為散每日空心食前米飲調下一錢匕治外物撞刺目赤腫痛壓熱犀角飲方犀角鎊大黃銼炒知母焙人參白茯苓去黑皮黃芩去黑心玄參各一兩麥門冬去心焙一兩半甘草炙銼半兩上九味粗搗篩每服三錢匕水一盞煎至七分去滓食後溫服治目撞刺赤腫痛生障翳退熱人參湯方人參二兩玄參白茯苓去黑皮黃芩去黑心五味子羌活去蘆頭細辛去苗葉各一兩車前子一兩半上八味粗搗篩每服三錢匕水一盞煎至七分去滓食後溫服治目撞刺生翳茺蔚子散方茺蔚子二兩防風去叉芎藭桔梗銼炒知母焙各一兩藁本去苗土一兩一分白芷三分人參一兩上八味搗羅為散每日空心食前米飲調下一錢匕治目傷睛損木通湯方木通銼一兩半防風去叉一兩赤芍藥一兩半白芷三分山梔子仁一兩大黃銼炒一兩半上六味粗搗篩每服五錢匕水一盞半入苦竹葉七片煎至七分去滓入地黃汁一合更煎兩沸食後溫服臨臥再服治目為物所傷三膽汁點眼方羊膽二枚雞膽三枚鯉魚膽二枚上三味摘破將汁合勻每日點目三上治目為物所傷睛陷胬肉方生地膚去土洗二兩上一味絞取汁瓷合盛每取少許點目冬月將乾者煎取濃汁用又方杏仁湯浸去皮尖雙仁上一味爛研以人乳化開日三度點胬肉上又方精羊肉二兩薄切片上一味炙令微熱熨目勿令大熱
