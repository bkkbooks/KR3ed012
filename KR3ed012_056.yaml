body:
  text: 卷第五十六九種心痛論曰九種心痛曰蟲曰注曰風曰悸曰食曰飲曰冷曰熱曰去來者是也治病必求其本今九種心痛其名雖異而治療各有其法蓋正氣和調則邪不能入若或虛弱外邪乘之則種種皆能致疾善醫者惟明攻邪以扶正則九種之痛其治一也延齡至寶論曰鬼擊之氣須以牛黃麝香或氣滿相攻則生嚼桃仁若此之類又當隨宜治之理固然矣治九種心痛附子丸方附子炮裂去皮臍人參狼毒炙乾薑炮食茱萸各一兩巴豆半兩去皮心膜麩炒出油盡上六味搗研為末煉蜜為丸如麻子大每服十丸米飲下中惡心痛口不能言者日一服纍年積冷氣流注心胸者日再服之治九種心痛木香煮散方木香吳茱萸湯浸一宿炒陳橘皮湯浸去白炒柴胡去苗各一兩麝香別研半錢檳榔銼芍藥郁李仁湯浸去皮炒當歸切焙各半兩上九味搗羅八味為散入麝香和勻每服三錢匕水一盞煎至七分不拘時溫服治九種心痛厚朴湯方厚朴去粗皮用生薑汁塗炙檳榔銼食茱萸芍藥柴胡去苗當歸切焙各一兩郁李仁湯浸去皮炒三分上七味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服空心日午夜臥各一治九種心痛救生散方狼牙炙檳榔銼青橘皮湯浸去白炒鶴蝨雷丸各一兩當歸桂去粗皮各一兩半上七味搗羅為散每服三錢匕蜜酒調下空心日午服蟲下為度治九種心痛弭痛丸方五靈脂木香當歸切焙高良薑炮蓬莪朮炮各一兩上五味搗羅為末煉蜜和丸如梧桐子大每服二十丸至三十丸空心煎木香湯下治九種心痛冷熱吐逆㽱刺疼痛乾漆散方乾漆炒出煙蓬莪朮炮各一兩半桂去粗皮吳茱萸湯浸一宿炒乾各一兩上四味搗羅為散每服二錢匕溫酒或醋湯調下不計時候治九種心痛及諸滯氣和氣丸方附子一枚大者去皮臍切作四片入硇砂一錢麵裹煨香熟去面只用附子為末硇砂別研芫花醋炒牽牛子炒各一錢上三味杵研為末用醋麵糊為丸如梧桐子大每服十丸生薑湯下不拘時治九種心痛雙珍散方芫花狼毒各一兩上二味用醋一升半入砂石器中熬醋盡為度再焙乾搗羅為散每服半錢匕蔥酒調下治九種心痛烏頭散方烏頭炮裂去皮臍梔子仁生用各一兩上二味搗羅為散每服一錢匕醋湯調下治九種心痛換金煮散方延胡索蓬莪朮炮威靈仙去土鬼箭羽薑黃苦楝根洗銼各一兩上六味搗羅為散每服三錢匕水一盞酒少許同煎七分溫服日二夜一治九種心痛無比丸方高良薑炮縮砂仁桂去粗皮乾薑炮赤芍藥各三兩上五味搗羅為末醋麵糊為丸如小彈子大每服一丸生萊蔔一片和藥細嚼熱湯下不拘時治九種心痛及腹脅積聚滯氣乾漆丸方乾漆炒煙出二兩上一味搗羅為末醋麵糊丸如梧桐子大每服五丸至七丸溫酒下醋湯亦得不拘時候治九種心痛萬靈丸方石菖蒲二兩上一味搗羅為末醋麵糊丸如雞頭大以丹砂為衣每服一丸丈夫鹽湯婦人醋湯嚼下停飲心痛論曰心屬火其氣炎上飲為水其性趨下營衛平和腑臟調適則水液下行不能逆害心火若水飲停積於胸中火氣不得宣通則陽虛陰盛其病心中淡淡然欲吐而痛是為停飲心痛也治痰飲在心久不散痛不可忍半夏湯方半夏湯洗七遍曝乾乾薑炮各三分檳榔半生半炮銼桂去粗皮旋覆花微炒高良薑各半兩丁香木香各一分上八味粗搗篩每服五錢匕水一盞半入生薑一分拍破同煎至八分去滓溫服治痰飲在心不散痛不可忍旋覆花湯方旋覆花微炒桔梗銼炒各一兩半夏湯洗七遍曝乾一兩半柴胡去苗三分檳榔微煨銼二枚上五味粗搗篩每服五錢匕水一盞半入生薑一分拍碎同煎至八分去滓溫服如人行六七里再服治風痰心痛每食黏滑等物即吐清水痛連胸背不可忍枳殼湯方枳殼去瓤麩炒半兩苦參甘草生銼各一兩燈心兩小束切上四味粗搗篩每服三錢匕水一盞煎至六分入鹽半錢茶末半錢去滓溫服食後再服以篦子於喉中引令吐吐定更服以痰盡為度吐後宜服茯苓湯治停飲心痛服前藥吐後茯苓湯方白茯苓去黑皮一兩人參一分麥門冬去心焙一宿一分上三味粗搗篩每服五錢匕水一盞半入生薑一分拍碎同煎至八分去滓溫服良久煮淡漿粥補之治心痛多唾桂朴散方桂去粗皮厚朴去粗皮生薑汁炙令熟各三分吳茱萸湯浸一宿曝乾炒半兩上三味搗羅為散每服二錢匕溫酒調下蟲心痛論曰諸蟲在人身中若腑臟平調則自安其所若臟氣虛弱或因食肥甘過度致動腸胃間諸蟲其蟲往來上攻於心絡則令人心痛痛有休止腹中熱喜吐涎出是蛔心痛也宜速療之不療蟲貫心則能殺人治蟲動心痛不可忍勝金丸方貫衆白殭蠶炒蕪荑乾漆炒煙盡檳榔銼桂去粗皮各一兩厚朴去粗皮薑汁炙透雷丸各一兩半上八味搗羅為細末煉蜜丸梧桐子大每服十五丸空心食前溫漿水下初服三五日取下諸蟲乃效若蟲多即服藥十日以上方驗治心痛發作痛有休止喜涎出是為蛔蟲溫中當歸湯方當歸切焙一兩半芍藥銼碎微炒三兩黃芩去黑心朴硝桔梗炒柴胡去苗各二兩升麻一兩半上七味粗搗篩每服三錢匕水一盞煎至七分去滓溫服治蛔厥嘔逆心痛烏梅丸方烏梅三百枚細辛去苗葉六兩乾薑炮十兩黃連去須一斤當歸切焙四兩附子炮裂去皮臍六兩蜀椒去目及閉口者炒出汗四兩桂去粗皮人參黃柏蜜炙各六兩上一十味除烏梅外搗羅為細末以苦酒漬烏梅一宿取肉蒸熟搗如泥和藥令相得內臼中塗蜜搗二千下丸如梧桐子大食前服十丸日三稍加至二十丸治蟲心痛㽱刺不可忍檳榔湯方檳榔微煨二枚酸石榴皮微炒三分桃符銼碎一枚胡粉一分上四味粗搗篩每服二錢匕水一盞煎至半盞又下酒一合更煎取沸去滓空心溫服日晚再服治心腹㽱痛不止橘皮湯方陳橘皮去白焙當歸切焙細辛去苗葉各一兩鶴蝨微炒半兩甘草炙一兩大黃銼炒二兩上六味粗搗篩每服三錢匕水一盞入生薑半分切煎至七分去滓空心溫服日午臨臥各一服未瘥再服治蛔蟲心痛喜吐水衝刺痛不可忍或不能食面黃腹滿薑黃湯方薑黃一兩三分雚蘆銼一兩鶴蝨微炒一兩一分上三味粗搗篩每服三錢匕水一盞煎至七分又入酒一合更煎取沸空心服晚食熱飯即蟲下一服未盡更服治三蟲心痛面黃不下食木香湯方木香檳榔煨陳橘皮去白焙各三分東引石榴根炙銼一兩半吳茱萸水浸焙乾炒一分薏苡根炙一兩上六味粗搗篩每服三錢匕水一盞煎至七分去滓溫服如人行三四里再服治蛔咬心痛鶴蝨飲方鶴蝨微炒苦楝根有子者良焙各一兩硇砂研如粉一分上三味先以二味粗搗篩入研藥和勻每服三錢匕水二盞同煎至一盞下朴硝末一錢煎沸去滓空心服治蛔咬心痛檳榔散方檳榔銼蜀椒去閉口並目炒出汗各半兩上二味搗羅為細散每服二錢匕米飲調下空心日晚各一服治蛔心痛吳茱萸散方吳茱萸水浸一宿焙乾炒半兩鶴蝨微炒一兩半上二味搗羅為細散每服二錢匕空心溫酒調下治蛔蟲寸白等心腹㽱痛石榴根散方東引石榴根二兩膩粉一錢陳橘皮去白焙半兩芍藥銼炒三分檳榔萆薢各一兩上六味搗羅為細散每服二錢匕空心煎棗湯調服日晚再服治蛔心痛桔梗散方桔梗炒三分當歸切焙一兩芍藥銼炒雷丸各三分陳橘皮去白焙一兩人參三分貫衆半兩檳榔銼一兩半上八味搗羅為細散每服二錢匕空心煎薑棗湯調下日晚再服漸加至三錢匕治諸蟲攻心腹㽱痛麥糵散方大麥糵炒一兩鶴蝨炒三分白檳榔銼三分陳橘皮去白焙半兩糯米炒熬一合牽牛子一半生一半炒二兩楝根有子東南根以石灰汁浸兩宿炙乾二兩上七味搗羅為細散每服三錢匕空心米飲調下未幾更時呷熱薑蜜湯投之治蛔心痛乳香散方乳香研一分鶴蝨炒三分檳榔銼一兩半上三味搗研為細散每服三錢匕大麻子汁調下治蟲兼氣心痛檳榔丸方檳榔銼一兩半陳橘皮去白焙蕪荑牽牛子炒各一兩木香半兩上五味搗羅為細末煉蜜和丸如小豆大每服二十丸橘皮湯下空心日午臨臥各一服治蛔蟲心痛狗脊丸方狗脊去毛一分吳茱萸水浸一宿焙乾炒半兩陳橘皮去白焙三分蕪荑三分檳榔銼一兩半上五味搗羅為細末煉蜜和丸如小豆大每服二十丸食前橘皮湯下治心痛如蟲咬皂莢丸方皂莢炙黃去皮子杏仁去皮尖雙仁研各一兩上二味先搗羅皂莢為末次與杏仁相和搗為丸如小豆大每服七丸粥飲下發時吃治蟲咬心痛乾漆湯方乾漆炒煙盡一兩胡椒一分上二味粗搗篩每服一錢匕水一盞入蔥白一寸麝香少許煎七分去滓溫服冷氣心痛論曰風邪冷氣傷於心之絡脈皆能致痛若陽氣偏虛宿挾冷滯又因飲食傷動而致心痛則其病喜溫而惡寒其氣慘而不舒甚者四肢厥冷氣攻心而發痛也治冷氣心痛肋下鳴轉食不能消豆蔻湯方肉豆蔻去殼炮四枚赤茯苓去黑皮一兩半當歸切焙一兩陳橘皮湯浸去白焙厚朴去粗皮生薑汁炙各一兩半蓽茇桂去粗皮各半兩芍藥一兩白朮一兩半檳榔微煨銼訶黎勒煨去核各半兩桔梗銼炒一兩上一十二味粗搗篩每服五錢匕水一盞半入生薑一棗大切棗二枚劈破同煎至八分去滓空心日午夜臥溫服治冷氣衝心痛厚朴湯方厚朴去粗皮生薑汁炙三分人參當歸切焙陳橘皮湯浸去白焙各半兩麥糵微炒一分白檳榔微煨銼一枚上六味粗搗篩每服五錢匕水一盞半入生薑一棗大拍破同煎至八分去滓溫服治寒氣客於心心中妨痛脈來沉緊檳榔湯方檳榔微煨銼五枚桂去粗皮當歸切焙木香各一兩陳橘皮湯浸去白焙三分附子炮裂去皮臍一兩上六味銼如麻豆每服三錢匕水一盞入生薑一棗大拍破同煎至七分去滓空心日晚溫服治冷氣心痛不能食八味桂心丸方桂去粗皮一兩半桔梗銼炒吳茱萸湯浸焙炒人參白朮高良薑各三分陳橘皮湯浸去白焙半兩當歸切焙一兩上八味搗羅為末煉蜜丸如小豆大每服十丸溫酒下日午夜臥各一稍加至十五二十丸治宿患冷氣心痛時時發動芎藭丸方芎藭一兩桂去粗皮當歸切焙乾薑炮厚朴去粗皮生薑汁炙枳殼去瓤炒各三分檳榔微煨銼六枚上七味搗羅為末煉蜜丸如小豆大每服二十丸溫酒下加至三十丸如腹有結塊加附子鱉甲婦人加桃仁各一兩治冷氣心肋結痛食不下高良薑湯方高良薑當歸切焙各二兩陳橘皮湯浸去白焙一兩半厚朴去粗皮生薑汁炙二兩桔梗去蘆頭切炒一兩半桃仁去皮尖雙仁炒五十枚吳茱萸湯浸半日曝乾微炒一兩半訶黎勒皮微煨五枚上八味粗搗篩每服三錢匕水一盞生薑一棗大拍破同煎至六分去滓溫服日三治虛冷胸滿短氣心痛嘔吐防風茯苓湯方防風去叉赤茯苓去黑皮各一兩桂去粗皮三兩甘草炙銼一兩乾薑炮二兩人參一兩半半夏湯洗去滑二兩上七味粗搗篩每服五錢匕水一盞半入生薑一片棗二枚劈破同煎至八分去滓溫服空心日午夜臥各一治冷氣衝心痛三味桂心丸方桂去粗皮半兩當歸切焙三分吳茱萸湯浸一宿焙炒乾一兩上三味搗羅為末煉蜜丸如小豆大每服二十丸空心炒鹽酒下日晚再服治冷氣心痛干棗湯方干棗二七枚去核生薑切一兩白蜜一匙頭上三味以水二盞煎五六沸去滓熱服未瘥再作服治冷氣心痛蕪荑湯方蕪荑陳橘皮湯浸去白焙各一分上二味粗搗篩用水二盞煎取一盞去滓入炒鹽一字頓服未瘥再作服治心疼冷氣㽱刺痛不可忍桂薑散方桂去粗皮一兩生薑片切焙乾二兩上二味搗羅為散每服二錢匕溫酒調下中惡心痛論曰心者君主之官神明出焉心神安靜則邪無得而干