body:
  text: 卷第一百四十三久痔論曰久痔者以臟腑夙有風冷加之飢飽不常將攝乖宜或緣憂思恚怒致陰陽不和氣血凝滯故風毒乘虛時作時歇攻注肛腸痔孔有膿與血間下腫癢疼悶故謂之久痔治五痔瘻血日久衆藥不瘥者雷丸丸方雷丸三兩紫芝白芷紫菀各二兩貫衆五兩秦艽去苗土厚朴去粗皮生薑汁炙各一兩藁本去苗土二兩亂髮灰三兩䗪蟲炒石楠炙各半兩豬懸蹄炙焦十枚上一十二味搗羅為末煉羊脂和丸如梧桐子大每服二十丸空心煎米飲下日晚再服治久患腸風痔瘻諸疾安息香丸方安息香一分阿魏半分乳香一錢三味一處研丹砂一分雄黃龍腦麝香各二錢四味一處研砒霜一分研細更入緑豆末二錢同研密陀僧煅二錢巴豆三粒去皮心膜水一大碗浸一日六度換出細研出油上一十味先將安息香等三味一處入瓷器內用重湯煮或於飯甑上蒸一次再入淨鉢內爛研成膏入諸藥一處搜和丸如緑豆大每服一丸空心服腸風瀉血五痔漏膿血不止或生鼠乳並以好茶下猝心痛生薑湯食積陳曲湯心腹諸氣溫酒婦人心痛血氣當歸酒水瀉冷水諸痢飯飲瘧疾桃心湯下治十年痔如鼠乳膿出下血劇者白蘞散方白蘞二兩赤小豆一兩黃耆銼二兩芍藥三兩黃芩去黑心一兩桂去粗皮二兩附子炮裂去皮臍牡蠣煅各半兩上八味搗羅為散每服二錢匕空心溫酒調下日晚再服以瘥為度治五痔連年不止兼痔瘻龍骨丸方龍骨螺皮炙令焦各一兩黃耆銼當歸切焙枳殼去瓤麩炒乾薑炮各三分熟艾葉半兩附子炮裂去皮臍一兩上八味搗羅為末煉蜜丸如梧桐子大空心以黃耆湯下四十丸日晚再服治五痔十年不瘥槐子丸方槐實微炒一斤龍骨三兩白礬燒灰硫黃研各五兩沙糖十兩大黃銼炒三兩乾漆炒煙出三兩上七味除槐子沙糖外搗羅為末先將糖和槐子瓷器盛於飯甑上蒸一炊久以綿布絞取汁和前藥末丸如梧桐子大陰乾每服二十丸空心溫水下日晚再服治數十年五痔下血如雞肝肛邊結核如鼠乳肛中疼痛大黃湯方大黃銼炒五兩滑石三兩半芒硝研桑根白皮銼黃芩去黑心杏仁湯浸去皮尖雙仁炒各一兩上六味粗搗篩每服六錢匕以酒一盞水一盞棗二枚劈破同煎至一盞去滓空心溫服微利一兩行為度未利再服治丈夫婦人五痔年久不瘥蝟皮散方蝟皮一個燒灰研雄鱉頭三個燒灰研酸石榴皮地榆枳殼槐花各一兩上六味除二味燒灰外各細銼一處炒令黑色搗羅為末與灰研勻每服二錢匕溫酒調下食前服治腸風痔瘻久不瘥貫衆散方貫衆三兩雞冠花五兩甘草炙一兩烏梅去核炒黃連炒各二兩麝香當門子二個細研上六味搗研為末每服二錢匕米飲調下更分一半藥末以麵糊丸如緑豆大每服二十丸米飲下相間食前服之治腸風五痔久不瘥榼藤散方榼藤子燒存性茺蔚子炒各半兩地榆白礬燒令汁盡臭椿根蜜炙焦色各一兩上五味搗羅為末每服二錢匕溫酒一小盞入麝香一字同調下空心食前服治腸風痔瘻久不瘥芍藥丸方芍藥地龍去土炒大黃銼炒威靈仙各一兩木鱉子去殼研二兩上五味搗研為末三分中減一分末用醋一盞熬成膏和丸二分如梧桐子大每服五丸茶清下空心食前服一日二服治久患痔疾萬金散方椿根皮銼一兩楝實去核麩炒胡粉炒各半兩藁本去苗土一分臭橘皮去瓤切炒二兩上五味搗羅為散每服一錢匕熱酒調下半夜時服至天明再服後用續隨子不計多少搗為末煎湯淋洗三五上治痔疾積年不瘥或腸風瀉血黃連丸方黃連去須蕪荑仁榼藤子白礬灰各一兩皂莢炙去皮子一兩半上五味搗羅為末以粟米研糊丸如梧桐子大空心米飲下二十丸日晚再服以瘥為度治腸風痔瘻瀉血久不痊不換金散方槐實及時採炒臭椿根皮銼曝乾荊芥穗各一兩上三味搗羅為散每服一錢匕用粟米飲調下年深者服二錢匕日三治腸風痔瘻久不瘥槐白丸方槐白皮四兩用煮棗肉四兩火上旋塗慢火炙乾脆為度槐花炒白礬燒令汁盡各二兩上三味搗研為末煉蜜丸如梧桐子大每服十五丸米飲下空心服日三治五痔連年不差及瘻下膿血不止白礬丸方白礬燒灰赤石脂各一兩附子炮裂去皮臍一兩半上三味搗羅為末煉蜜丸如梧桐子大每服二十丸空心煎乾薑湯下晚食前再服治痔疾久不差大效丸方附子炮裂去皮臍白礬燒令汁盡各一兩上二味搗研為末煉蜜丸如梧桐子大每服二十丸早晚食前溫酒下以瘥為度治五痔年深不瘥乳香散方乳香二錢沒藥一錢二味同研上二味細研用烏雞子一枚打開去黃以清拌藥再入雞子殼中以紙封飯甑中蒸熟空心服盡一枚如年深者服十數枚全安治久痔及腸風下血疼痛諸藥不瘥者金針散方皂莢刺赤紅者不拘多少炙上一味搗羅為散每服三錢匕水一盞煎至七分去滓溫服一方用破故紙打碎紙上炒與皂莢刺等分為散每服三錢匕溫酒調下治年深痔疾不瘥獨聖散方黃土如石者半兩燒令紫色細研為末上一味以膩粉一錢匕藥末二錢半拌勻臨臥溫酒調下蟲出是效治久痔比金散方蜀葵葉夏月收者焙乾上一味搗羅為散每服二錢匕溫酒調下五服效治腸風痔瘻一二十年不瘥面色萎黃飲食無味及患臟腑傷積泄瀉暑月常瀉不止及諸般淋瀝久患消渴婦人月候不調赤白帶下多年不瘥凡是臟腑諸疾皆主之石燕散方石燕不拘多少淨洗上一味每日空心取一枚于堅鉢內溫水磨盡分三服晚食前再服欲作散搗研為細末水飛每服半錢至一錢匕清飯飲調下溫水亦得年久腸風等疾須常服及一月勿歇即愈治冷痔瘡久不瘥者追風毒去疼痛天雄膏方天雄去皮臍一枚天南星一枚天麻半兩丹砂研一錢黃蠟半兩上五味並生為末先用生油少許熔黃蠟次入諸藥熬成膏每使時用舊帛攤藥貼瘡甚驗治痔瘻久不瘥者熏痔立效方蛇蛻四兩細剪令碎蟬蛻四兩細剪令碎白礬生研一兩皂莢二梃為末上四味拌勻分為六帖每用一帖瓷碗內如燒香法盛入桶內燒令煙就上坐熏之煙盡即止治痔瘻久不瘥者熏痔必效散方黃牛角䚡四寸細銼鯪鯉甲二兩細銼鉛丹一兩研乳香一分研上四味搗研為末拌勻每用三五錢匕如燒香法安盆器內用板蓋上開竅坐就瘡熏之煙盡即止治痔瘻纍經熏洗未效者蜂窠膏方蜂窠燒灰稱半兩研蚰蜒一個大者研作膏水銀粉稱一錢研鉛丹稱一錢研上四味將三味研者和入膏內更入麝香半錢匕同研勻每用少許敷瘡上治痔瘻久不瘥除瘡口黑紙拈方密陀僧煨黃連去須瀝青等分上三味搗羅為末用紙作拈子以津唾蘸藥末拈入竅內覺微微癢即住不可盡拈也治久痔不瘥熏痔方臭椿皮曝乾二兩枳殼去瓤三兩蛇蛻半兩上三味粗搗篩用一小罐子盛以厚紙一張蓋口系定上剪一小眼子文武火煨熱氣從眼子內出便騎罐子熏之如熏得熱痛以燈盞內油塗如此熏三五度立效治久患痔瘡疼痛不可忍烏金散方烏驢乳屋上塵煤是也細研陳臘茶末各一分膩粉一字上三味同研細敷痔上乾者以油調塗之一兩上即銷治遠年痔疾有膿血出不可行坐麝香散方麝香半錢研田螺一個燒灰研上二味細研為末先用蔥湯洗次用藥敷之治痔瘻久不愈榼藤散方榼藤子不以多少上一味為散先以蜜調少許塗痔瘻瘡上次用溫酒調下一錢匕食前服痔瘻論曰五痔之疾或出鼠乳或發寒熱或生瘡或癢痛或下血其證不一治之不早勞傷過度則毒氣浸漬肌肉穿穴瘡口不合時有膿血故成痔瘻經曰痔久不瘥變為瘻是也治痔瘡傍穿數穴膿血不止並腸風脫肛等疾二礬丸方白礬燒令汁盡緑礬燒過栝蔞燒存性蝟皮燒存性訶黎勒煨去核枳殼去瓤麩炒白附子炮天南星薑汁浸一宿焙半夏薑汁浸一宿焙附子炮裂去皮臍各二兩雞冠花五兩胡桃燒灰十五個上一十二味搗羅為末以醋煮麵糊丸如梧桐子大每服二十丸空心臨臥溫酒下治痔瘻久不瘥肛邊穿穴時出膿血紫金丸方龍腦麝香乳香雄黃密陀僧並研各炒一兩砒霜半分丹砂阿魏安息香各一分上九味先將乳香安息香阿魏以熱水浸令通軟研如膏次將龍腦麝香丹砂密陀僧雄黃合研為末砒霜入緑豆粉二錢同研細更用巴豆三粒去皮心膜壓出油亦研細與前藥一處研勻卻入前乳香等膏和丸如緑豆大每服一丸空心清茶下兼治腸風等疾治一切痔瘻反花瘡等疾乳香丸方乳香研半兩生乾地黃瓦上煅醋浸焙乾雄黃研黃蠟各一兩麝香研龍腦研丹砂研沒藥研各一錢半上八味搗研為末熔蠟為丸如梧桐子大每服十丸麥門冬熟水下留少藥末貼欲貼時先用橘葉蔥湯洗之治痔瘻膿血不止六神丸方鯪鯉甲燒灰皂莢刺燒灰蝟皮燒灰雄黃研硫黃研鶴蝨為末等分上六味再一處研勻用麝香水煮麵糊丸如梧桐子大每服十五丸空心煎餳酒或湯下加至二十丸治痔瘻膿血不止積年不瘥鶴蝨丸方鶴蝨炒雷丸白礬灰各一兩皂莢刺硫黃研各半兩上五味搗研為末醋煮麵糊和丸如梧桐子大研雄黃為衣每服二十丸麝香溫酒下空心食前服治痔瘻及臟毒下血如聖餅方寒食麵鉛丹研白礬燒令汁盡研輕粉研硫黃研等分上五味同研令勻用倒流水拌和作餅如錢大每發時以慢火炙黃熟一餅分四服用溫熟水嚼下日午夜臥時服治痔瘻麝香散方麝香研三錢槐花半生半炒荊芥穗各一分千針草去枝根半兩硇砂研三錢上五味搗研為散每服二錢匕溫酒調下臨臥時服治痔瘻消腫疼當歸湯方當歸切焙大黃煨銼赤芍藥甘草炙各一兩上四味搗羅為粗末每服二錢匕水一盞煎至八分去滓稍熱服微利一行為效一方用乳香一錢硇砂半錢訶黎勒皮半兩同搗研為末以大棗一枚去核入藥末二錢匕棗肉用紙裹煨熟分作兩服茶清嚼下與前藥相間服亦得治諸痔瘻膿血不絶羸瘦榼藤散方榼藤子三個生油塗炙熟取肉續斷雞冠花炒烏賊魚骨去甲炙各一兩上四味搗羅為散每服二錢匕空心溫酒調下日晚再服治痔瘻不限年月深淺腫痛穿穴膿血不止蜀椒榼藤子丸方蜀椒去目並閉口炒出汗木杵輕搗取紅四兩榼藤子大者一個劈破炙上二味搗羅為末棗肉和丸如梧桐子大每服十五丸至二十丸空心溫酒下治諸痔疾有頭因穿破後成瘻膿水經年不幹麝香散方麝香研半兩鴿糞一升上二味先將鴿糞於淨地上火煅煙盡候冷與麝香同研為散每服二錢匕空心米飲調下晚再服治諸痔瘻有瘡膿出痛楚鯪鯉甲散方鯪鯉甲炙焦五兩麝香研一分上二味搗研為散每服二錢匕空心煎黃耆湯調下日晚再服治諸痔瘻出膿水疼痛不止韭根湯洗方韭根曝乾蜀椒去目並閉口炒出汗野李根蛇床子續斷蕪荑仁皂莢白皮松脂各一兩白礬半兩上九味細銼和勻每度以二兩用水三碗煎至二碗濾去滓乘熱於盆內先熏後洗日三治痔瘻有瘡成竅膿血不止丹粉散方鉛丹鹽豉各一兩膩粉半兩大蒜一顆去皮切上四味先搗蒜令爛後入余藥同搗作薄餅焙乾為細散每以少許貼之日三五次治諸痔瘻疽瘡丹砂塗敷方丹砂麝香蛇蛻燒灰各一分上三味同研令細先以鹽湯洗瘡拭乾後塗敷日三五度治痔瘻有頭或如鼠乳如聖膏方芫花根不計多少上一味洗淨陰乾木臼內搗入水少許絞取汁於銀石器內慢火煎成膏將絲線就膏內度過以線系痔頭初時微痛心躁候落以紙拈子膏藥納於竅內永除根本未落不得使水治五痔連年不瘥漸成痔瘻螺皮丸方螺皮炙焦龍骨各二兩黃耆細銼當歸銼焙枳殼去瓤麩炒乾薑炮各一兩半艾葉三分附子炮裂去皮臍二兩上八味搗羅為細末煉蜜和丸如梧桐子大每服三十丸食前煎黃耆湯下痔瘻疼痛不可忍論曰痔瘻蓋緣寒濕與夫房室醉飽間得之其作也肛邊腫癢甚則疼痛不可忍或蔓生數處或似螺蜆膿血與肌汁綿綿而下有孔不合故謂之痔瘻昔人論蟯蟲居胴腸間多則為痔方論有用熏法及化蟲之藥者不可不察治腸風痔疾遠年不瘥疼痛不可忍者萬金丸方安息香乳香丁香木香沉香銼無食子肉豆蔻去殼當歸切焙麒麟竭沒藥密陀僧煅阿魏各半兩巴豆去皮心膜醋煮砒霜入緑豆半兩同研各三分上一十四味先將乳香安息香阿魏麒麟竭沒藥等細銼水少許浸一宿來日細研如膏余藥搗羅為末與膏同研丸如黃米大每服一丸空心冷茶咽下治痔疾疼痛不可忍及下血比金丸方榼藤子附子炮裂去皮臍硫黃研白礬燒令汁盡螺皮炙焦枳殼去瓤麩炒豬牙皂莢酥炙各半兩上七味搗羅為末酒煮麵糊丸如梧桐子大每服十丸米飲或酒下不拘時候治痔疾疼痛如錐刀刺不可忍能消丸方威靈仙去苗土四兩一名能消卷柏去根防風去叉蝟皮燒灰存性阿膠炙燥各半兩糯米炒一合上六味搗羅為末煉蜜丸如梧桐子大每服十丸加至二十丸人參湯下日三不拘時治痔瘻疼痛行履不得栝蔞散方大栝蔞一枚開口豬牙皂莢白礬各半兩鯉魚皮鱉甲去裙襴刺蝟針各一分上六味除栝蔞外同為粗末入在栝蔞內用鹽泥固濟候乾用炭五斤煅令通赤放冷取出搗羅為散每服二錢匕研胡桃酒調下治痔疾疼痛不可忍及腸風下血祛痛散方皂莢子不蚛者一枚麩二升同炒麩焦黑去麩薄荷乾者三兩銼上二味搗羅為散每服二錢匕米飲調下空心服治五痔痛不可忍淋泄湯方黃芩去黑心木通銼梔子仁甘草炙銼太陰玄精石䚡蓄各二兩朴硝一兩上七味粗搗篩每用七錢匕水三碗煎沸傾盆內先坐熏之候通手即淋泄冷即止熏時令密復勿泄藥氣治五痔痛不可忍荊蘭湯淋泄方荊芥穗貫衆甘草蜀椒去目澤蘭芍藥各二兩上六味粗搗篩每用三大匙水三碗煎沸傾盆內先坐熏之覆令密勿泄出藥氣通手即淋泄治五痔痛甚試蟲散方臭椿根地骨皮景天陰乾各二兩護火草是也馬牙硝一兩上四味搗為細散用精豬肉一大片摻藥三錢匕在肉上就上坐一二時起看有蟲即去無即已治諸痔有頭疼痛不可忍熏洗方地菘一斤槐皮二兩蔥根一握韭根一握上四味細銼以水五升煎至三升盆內盛先坐乘熱熏通手即淋洗日三次用治五痔疼痛及陰濕癢荊芥湯洗方荊芥穗臭橘厚朴去粗皮各半斤上三味粗搗篩每用二兩水五升煎取三升避風處淋泄治諸痔有頭疼痛不可忍枳殼散尉方枳殼四兩訶黎勒皮二兩上二味粗搗篩同炒令熱以綿裹熱尉之冷即再炒治痔疼痛煙燻方白鱔魚骨熟艾等分上二味銼碎同和勻用新盆子一個盛藥在內以火燒藥候煙出盆上坐熏之煙盡即止治痔瘻出膿血疼痛不可忍白礬散方白礬飛研半兩木香炮一分為末上二味研勻每用少許以雞子白調塗痔瘻上治腸風痔瘻有頭下膿血疼痛不可忍止痛膏方莨菪子一合牛皮膠一兩上二味先研莨菪子為末次用膠清調成膏攤紙上貼之有頭者自消治腸風痔瘻肛邊鼠乳疼痛不可忍威靈仙丸方威靈仙淨洗焙乾二兩木香一兩上二味搗羅為細末煉蜜和丸如梧桐子大每服二十丸加至三十丸不拘時候煎荊芥湯下服藥後忌茶半日恐冷即腹痛男子婦人皆可服治大腸痔瘻脫肛疼痛方虎腳指兩節上一味以蜜二兩炙令赤搗羅為末炊餅丸如梧桐子大每服空心溫酒下二十丸腸風下血論曰腸風下血者腸胃有風氣虛挾熱血得熱則妄行滲入腸間故令下血昔人謂先血後便為近血先便後血為遠血遠近之別不可不辨也治腸風瀉血不止腹內疼痛阿膠丸方阿膠炒燥刺蝟皮炙焦當歸焙地榆龍骨碎研訶黎勒煨去核黃耆銼赤石脂研各一兩枳殼去瓤麩炒黃牛角䚡各二兩燒灰惡實炒三分槐實炒三兩上一十二味搗羅為末用軟飯丸如梧桐子大每服三十丸米飲下空心食前服治腸風七妙散方枳殼生去瓤椿木皮雷丸天麻白芨豬牙皂莢各半兩赤石脂一兩上七味搗羅為散每服一錢匕溫酒調下空心臨臥服治腸風病年深不效玉壺丸方青嫩皂莢針採半斤拍破用河水五升浸二七日入砂石器中煮去四升存一升又入藕汁半升白蜜一兩再用慢火熬成膏稀稠得所去盡火放冷枳殼一兩針扎於燈上燒存性入酒中浸過胡桃仁十個依前法沒藥二錢研陰地椿根白皮二兩焙乾取一兩末用乳香二錢研上六味除前膏外後五味同搗羅為末入在前膏內為丸如梧桐子大每服二十丸腸風煎木賊湯下痔疾荊芥湯下常時瀉血米飲下空心日三服治腸風瀉血及臟毒久不止玉屑丸方槐根白皮去粗皮苦楝根白皮去粗皮各三兩椿根白皮去粗皮以上三味採時春宜早秋宜晚取嫩新潤者為妙細銼同搗令爛極細更用後藥一處拌令勻天南星生末半夏生末各半兩威靈仙去土末一兩寒食白麵二兩上七味拌令勻滴水為丸如梧桐子大每服三十丸先用水一盞煎令極熱次下藥煮令浮上為度用煮藥湯下藥不嚼食前服治積年腸風瀉血穀食不化肌體黃瘦椿皮散方臭椿木白皮炙二兩乾薑炮甘草炙各三分雞冠花炙附子炮裂去皮臍槐鵝炙各一兩上六味搗羅為散每服二錢匕煎枳實湯調下空心食前服治腸風及一切血痢脾毒臟毒下血不止琥珀散方琥珀屑研鹿角霜赤小豆槐花枳殼去瓤麩炒白芷各一兩上六味除琥珀外並銼碎同炒令焦黑杵為散入琥珀研令勻每服二錢匕米飲調下空心食前各一服治腸風瀉血防風餅方防風去叉雞冠花續斷甘草炮天麻人參各半兩上六味搗羅為末以油餅劑三個入藥三錢匕分做三個油餅早晨日午近晚以淡粥下之治腸風不問年深日近木香丸方木香白芷乾蠍去土炒阿魏各一兩當歸炙半兩漏蘆去蘆頭二兩上六味各別搗以童子小便一升煎阿魏三十沸後下木香又煎三十沸後又下乾蠍當歸再煎如餳入白芷漏蘆末再和丸如梧桐子大每服五丸至十丸空心溫酒下治腸風瀉血不止疼痛釣腸丸方附子一個炮裂去皮臍石硫黃研雞冠花炒鯪鯉甲炒皂莢刺各一兩炒蝟皮二個燒灰上六味搗羅為末麵糊為丸梧桐子大槐花湯下二十丸日二服空心治瀉血不定貫衆五物散方貫衆去毛土槐花地榆黃連去須甘草各半兩上五味並生搗羅為散每服一錢匕米飲調下治腸風黑虎丸方白礬研二兩雞冠花乾者一兩烏龍尾屋下煙煤是半兩青橘皮洗去白焙五靈脂炒各四兩上五味搗羅為末分一半末用米醋二升慢火熬成膏候冷和一半末為丸如梧桐子大每服三十丸空心陳米飲下治腸風下血貫衆散方貫衆雞冠花焙黃連去須炒烏梅肉炒各一兩甘草三分炙銼上五味搗羅為散每服二錢匕溫米飲調下日三服不以時候治腸風下血抵聖散方椿根白皮焙蒺藜子炒枳殼去瓤麩炒防風去叉各一兩上四味搗羅為散每服一錢匕白湯點服治腸風四金散方貫衆荊芥穗白礬飛過豬牙皂莢醋炙各一兩上四味同燒存性為散每服一錢匕溫米飲調下空心食前日三服治腸風槐實散方槐實酥炒防風去叉枳殼去瓤麩炒焦黑為度各半兩黃耆銼炒一兩上四味搗羅為細散每服一錢匕茶清調下治腸風經久不瘥瀉血疼痛神應丸方水牛角䚡燒灰二兩葈耳頭二兩半槐耳一兩半乾漆酒浸一宿炒令斷煙取出用二兩上四味搗羅為末煉蜜和為丸如梧桐子大每空心熱酒下三十丸治腸風枳實丸方枳實麩炒黃槐莢麩炒黃皂莢豬牙者塗酥炙大黃炒令焦黃各一兩上四味搗羅為末用麵糊和丸如梧桐子大每服二十丸荊芥臘茶下空心食前服治腸風下血久不止下部腫痛礬石丸方白礬二兩飛過存一分性皂莢二梃去皮塗酥炙令焦黃附子三度炮不去皮臍每度炮入水蘸殺乾薑炮各一兩上四味搗羅為末用河水煮麵糊為丸如梧桐子大每服十丸鹽湯下空心食前服治腸風多年不差下血不止木賊散方木賊銼枳殼去瓤麩炒銼各二兩乾薑炮銼一兩大黃銼一分上四味同於銚子內炒黑色存三分性搗羅為散每服二錢匕溫粟米飲調下食前服治腸風烏魚骨丸方烏賊魚骨罐子內燒赤肉蓯蓉酒浸焙各半斤桑根白皮炒銼蕪荑各半兩上四味搗羅為末醋煮乾飯丸如梧桐子大空心米飲下五丸不嚼甚者不過五服治腸風瀉血如痢腹中㽲痛面色萎黃黃連飲方黃連去須一兩乾薑炮一分甘草炙半兩上三味搗為粗末每服三錢匕以水一盞生薑二片棗一枚劈同煎至五分去滓溫服治腸風防風散方防風去叉炙令黃黃耆炙銼各二兩甘草炙銼人參各半兩上四味搗羅為細散每服二錢匕食前粟米飲調下治腸風行步艱難黃耆丸方黃耆銼炒枳殼去瓤麩炒各一兩威靈仙去土二兩上三味搗羅為細末用爛飯為丸如小豆大每服三十丸至五十丸用溫水下並不損氣治瀉血烏梅丸方烏梅二十個醋煮去核白礬二兩飛過訶黎勒十一個炮過去核上三味將礬石訶黎勒為末與梅肉同搗為丸如梧桐子大每服七丸米飲下治腸風下血令不入食神驗膏方背蔭臭椿根鬚根不見日者撅剝取嫩處皮一斤銼黑豆半升槐花二兩上三味用水五升於銀石器內慢火熬令豆熟為度續入蜜二兩再煎候蜜熟傾出用淨瓷石器內盛過夜露兩宿每日食後臨臥各一服每服約半盞許用重湯燙溫熱得所旋旋服食治腸風瀉血大效丸方大薊根七截各長一寸又名刺芥白礬一兩細研麝香當門子七豆許上三味用不沾土大栝蔞一個割下蓋子並不去瓤入大薊根並礬當門子在內用篦子左攪七遭卻安蓋子在上以鹽一合和土為泥固濟陰乾用炭火煅候透赤便住直候冷打去泥細碾為末取一半為散一半以糯米粥為丸如梧桐子大每日空心將大薊苗煎湯調下半錢匕至日午臨臥又煎大薊苗酒下十丸服三兩日便住須是吃得三五個栝蔞永去根本治腸風瀉血不止獨活丸方獨活去蘆頭為末半兩黃蠟五兩於銀器中熔成汁生薑半斤取自然汁上三味先以薑汁入蠟中同熬候薑汁盡為度次入獨活末令勻衆手丸如梧桐子每服四十丸以濃陳米飲下空心臨臥服治腸風下血疼痛不可忍榮順散方枳殼去瓤麩炒荊芥穗各一兩槐鵝半兩炒黃上三味搗羅為細散每服二錢匕溫米飲調下不拘時候服如未效再服治腸風瀉血龍肝散方伏龍肝鉛丹牡蠣各半兩上三味各研為散再同研細每服陳米飲調下二錢匕不拘時候服治腸風臟毒下血不止方枳殼去瓤麩炒令黑無紋炭各一兩上二味搗為細散每服一錢匕用荊芥米飲調下治腸風下血烏金散方豬牙皂莢四兩並皂子銼胡桃三十枚並皮碎銼上二味同拌和勻以藏瓶一隻於頂上敲一圓竅入前項藥以圓瓦蓋之後用鹽泥固濟可厚一指許曝乾用炭火伍斤煅候碧煙出絶即去火略存性冷即出藥細研每服二錢匕入麝香少許溫酒或米飲調下食前服之治腸風瀉血礬附丸方緑礬四兩用瓶子盛蓋之火煅食頃候冷取出入鹽一合硫黃一兩同礬研依前入瓶子內燒食頃候冷取出細研附子一兩炮去皮臍杵為末上二味一處研令勻粟米粥為丸如梧桐子大空心用生地黃汁下三十丸當日止一月除根亦可久服助下元除風氣補益臟腑治腸風下血方栝蔞一個燒為灰赤小豆各半兩上二味杵羅為末空心酒調下一錢匕治腸風下血不止變成痔疾胡荽子散方胡荽子補骨脂各半兩上二味搗羅為散每服二錢匕陳米飲調下食前服治腸風瀉血棕艾散方棕櫚灰二兩熟艾搗羅成者一兩上二味用熟雞子兩個同研得所別炮附子去皮臍為末每服用水一盞附子末一錢煎數沸放溫調前藥二錢匕空心食前服治腸風瀉血二黃丸方黃耆炙銼黃連去須各一兩上二味搗羅為末以麵糊為丸如赤小豆大每服二十丸米飲下加至三十丸治腸風神效散方槐實皂莢子上二味各一兩以穀糠同炒令香熟去糠同搗羅為散每服一錢匕煎陳粟米飲調下空心食前服治腸風荊芥散方荊芥去莖枳殼去瓤麩炒各一兩上二味各搗羅為末每服逐味炒末一錢匕拌勻入臘茶末一錢以熱湯點服不計時候治腸風下血不止樗根散方樗根皮銼炒臭橘曝乾銼炒各三兩上二味搗羅為散每服一錢匕煎皂莢子湯調下米飲調亦得治腸風槐荊散方槐花輕炒令香一兩荊芥穗一分上二味搗羅為散每服二錢匕煎糯米粥飲調下血甚者一兩服效單使槐花亦妙食前服之治腸風病甚不瘥靈仙散方威靈仙去土雞冠花各二兩上二味銼劈碎以米醋二升煮乾更炒過搗為末以生雞子清和作小餅子炙乾再為細末每服二錢匕空心陳米飲調下午後更一服治腸風瀉血絮灰散方破絮燒灰枳殼去酥麩炒各半兩上二味搗羅為散每服二錢匕入麝香少許用陳米飲調下空心食前服治腸風下血久不瘥經效散方貫衆二兩去蘆頭燒為灰存性地上用碗合少頃去火毒研為細末上一味入麝香一字同前藥研令勻每服二錢匕米飲調下空心食前日三服治腸風下血不止如神丸方樗根皮上一味於臘月內日未出時取背陰地北引者不以多少用東流水淨洗銼碎於透風處掛令乾杵羅為細末每稱二兩入寒食麵一兩攪拌令勻再羅過新汲水和丸如梧桐子大陰乾每服二十丸先以水濕藥丸令潤後於碟子內用白麵滾過水煮五七沸傾出用煮藥水放溫下不拘時候服忌見日色見即無效此藥兼醫血痢如急要使不待臘月隨時依法採合亦得治飲酒過度腸風瀉血及風熱瀉血出如紅線立效散方揀新山梔子不拘多少去殼上一味焙乾搗破再焙又研細如油出成團劈開猛火焙乾手擦細羅取散瓷器盛之發時以新汲水調下二錢匕治腸風瀉血椿莢散方椿莢不以多少將一半生用餘一半燒存性上一味搗羅為散每服一錢匕溫米飲調下不拘時候治腸風瀉血諸藥不效保應丸方天南星不計多少用石灰炒令焦黃色上一味搗羅為細末煮酒麵糊為丸如梧桐子大每服二十丸溫酒下食前服治腸風下血久不止茄蒂灰散方茄蒂燒存性一兩上一味研為細散每服三錢匕米飲調下空心食前各一服治腸風瀉血烏金散方木鱉子上一味不拘多少用桑柴燒過微存性便用碗器合之候冷碾為散每服一錢匕用煨蔥白酒調下空心服治瀉血不止決效方巴豆一枚去皮上一味以雞子開一小竅納巴豆一枚入雞子竅中以紙塞定別以濕紙裹用火煨熟透去殼並巴豆只一味吃盡雞子其病即止不得稍生氣虛人分作二服治腸風下血黃耆湯方黃耆三兩槐實小薊桑耳乾地黃焙當歸炙銼黃連去須白芷各一兩半草豆蔻二枚去皮芎藭赤石脂天雄炮裂去皮臍龍骨各二兩黃芩去黑心半兩紅藍花訶黎勒皮延胡索厚朴去粗皮生薑汁炙桂去粗皮各一兩上一十九味㕮咀每服五錢匕以水一盞半入生薑一分拍碎煎取八分去滓溫服食前日二治大便下血並多年腸風食飲不得乾地黃湯方熟乾地黃焙赤石脂各二兩延胡索牡蒙桔梗黃耆銼龍骨各一兩半當歸切焙黃連去須白芷地榆木香紅藍花炒各一兩桂去粗皮三分乾薑炮黃芩去黑心各半兩上一十六味粗搗篩每服五錢匕水一盞半煎八分去滓溫服不拘時候治腸風下血積年不瘥黃耆丸方黃耆銼附子炮裂去皮臍白礬燒灰各二兩硫黃通明者生用蝟皮酥炙虎杖皮炙黃各一兩榼藤子二枚破開以酥蜜塗炙皂莢兩梃去皮子蒸曬乾酥蜜塗炙上八味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心米飲下如久瀉血加栝蔞根一兩燒灰入極妙治腸風瀉血面色萎黃纍服藥不差食鹽丸方食鹽研杏仁湯浸去皮尖雙仁炒別研當歸切焙乾薑炮皂莢去皮子酥炙各二兩附子炮裂去皮臍一兩上六味搗羅為末煉蜜和丸如梧桐子大每服三十丸空心陳米飲下治腸風下血痔瘻不止車螯散方車螯一合皂莢刺四十九枚硇砂丹砂乳香各一分三味同研上五味以四味末同放車螯合子內以地龍泥固濟用炭六斤煅火盡為度取出研為散空心溫酒調一錢匕服治腸風瀉血等側柏散方側柏葉二斤九蒸九曝黑豆緊小者一升炒甘草炙銼三兩白朮炒桂去粗皮各一兩上五味搗羅為散每服二錢匕熱湯調下日三不拘時治久患腸風瀉血大安散方礬石灰研二兩硫黃為末乳香研黃連去須炒為末各一兩蠟一錢細切上五味用大鯽魚一枚不去鱗只除腸肚入諸藥末於腹內以濕紙裹著鹽泥固濟入煻火煨熟取出卻以慢火炙焦搗羅為散每服三錢匕空心米飲調下或以糊為丸如梧桐子大每服七丸米飲下極妙治大腸風熱下血不止黃芩飲方黃芩去黑心黃柏去粗皮黃連去須槲葉炙各一兩半上四味粗搗篩每服三錢匕水一盞煎至七分入地黃汁半合去滓溫服不拘時治腸風痔瘻脫肛瀉血面色萎黃積年不瘥香術丸方白朮一斤糯米泔浸三日上一味細銼以慢火炒焦為末取乾地黃半斤淨洗用碗盛於甑上蒸爛細研入白朮末和搗一二千杵如硬滴好酒少許相和再搗衆手為丸如梧桐子大焙乾每服十五丸空心粥飲下加至二十丸治久患腸風瀉血茄子酒方茄子種大者三枚上一味先將一枚濕紙裹於煻火內煨熟取出入瓷罐子乘熱以無灰酒一升半沃之便以蠟紙封閉經三宿去茄子暖酒空心分服如是更作不過三度瘥又方黑豆小者三升淨揀曬退去皮上一味生搗羅為末煉蜜和丸如梧桐子大每服三十丸空心陳米飲下治腸風下血不止及脫肛蛇黃散方蛇黃兩顆煅醋淬七遍上一味搗研如面每服三錢匕陳米飲調下瀉血並脫肛甚者不過一兩服神驗食前服之又方牡蠣大者一枚煅醋淬七遍上一味細研每服三錢匕陳米飲調下日再
