丸溫酒下溫水亦可日二空心服治腎心痛如物從背觸心牽脊傴僂桃花散方桃花半升焙乾苦參一兩半上二味搗羅為散每服三錢匕以酒水各半盞煎沸調下空心日午夜臥各一服治腎心痛與背相引身體傴僂蜀椒丸方蜀椒去目並閉口炒出汗芍藥桔梗炒細辛去苗葉桂去粗皮乾薑炮裂各三分附子炮裂去皮臍一分上七味搗羅為末煉蜜和丸梧桐子大每服十五丸空心溫酒下日二服治腎心痛引脊背如物所觸巴戟丸方巴戟天去心蘹香子炒肉蓯蓉酒浸切焙人參附子大者炮裂去臍皮青橘皮湯浸去白焙各一兩檳榔銼半兩上七味搗羅為末別用羊腎二對細切去筋膜入鹽半兩同研細將藥末同研得所如干即入煉蜜丸梧桐子大每服空心鹽湯下二十丸治腎寒氣逆上乘心痛高良薑湯方高良薑厚朴去粗皮生薑汁炙桂去粗皮各三兩當歸切焙二兩上四味粗搗篩每服五錢匕以水一盞半煎取八分去滓食前溫服日二治腎心氣痛金鎖丸方附子炮裂去皮臍青橘皮湯浸去白焙桂去粗皮各一兩硇砂半兩研巴戟天去心一兩人參山茱萸吳茱萸湯洗焙乾炒各半兩上八味搗研為末酒煮麵糊丸梧桐子大別研丹砂為衣每服十五丸溫酒或鹽湯下空心日午夜臥服治腎心氣痛連背脊硇砂丸方硇砂別研一分蓽澄茄人參沉香銼桔梗炒各半兩木香一分檳榔大者銼肉豆蔻仁各一兩丁香大者二七枚上九味搗羅為末麵糊和丸如緑豆大每服五丸至七丸煎人參湯下空心日午臨臥服厥心痛論曰手少陰心之經也心為陽中之陽諸陽之所會合若諸陽氣虛少陰之經氣逆則陽虛而陰厥致令心痛是為厥心痛治厥心痛面色青黑眼目直視心腹連季脅引痛滿脹高良薑散方高良薑烏藥京三稜並銼各一兩吳茱萸水浸一宿曝乾二兩與上三味相和炒待茱萸焦即住火淨揀去茱萸不用將三味與後藥同搗丹參銼微炒沉香銼莎草根炒去毛當歸切焙桂去粗皮桃仁湯浸去皮尖雙仁麩炒令黃研檳榔微煨各半兩麝香一分別研入上一十二味搗研為散每服三錢匕煎茯苓湯調下或炒桃仁酒調下亦得治厥逆冷氣上攻心痛當歸散方當歸銼微炒陳橘皮湯浸去白焙桂去粗皮枳殼去瓤麩炒檳榔桔梗去蘆頭炒各一兩赤芍藥木香人參各半兩上九味搗羅為細散每服二錢匕煎生薑棗湯調下不拘時服治厥逆心痛嘔逆氣悶絶吳茱萸丸方吳茱萸湯浸一宿焙乾炒桂去粗皮白朮一兩二錢乾薑炮青橘皮湯浸去白焙檳榔木香乾漆搗碎炒令煙出當歸銼微炒桔梗去蘆頭炒附子炮裂去皮臍各一兩上一十一味搗羅為細末煉蜜和搗三五百杵丸如梧桐子大以熱酒下二十丸不拘時候治厥逆冷氣上攻心痛不食草豆蔻湯方草豆蔻去皮一兩半厚朴去粗皮薑汁炙二兩桂去粗皮高良薑當歸銼焙各一兩上五味粗搗篩每服四錢匕以水一盞煎取六分去滓稍熱服不拘時候治厥心痛及氣膈心痛吳茱萸散方吳茱萸水浸一宿炒乾三分蓽茇半兩胡椒一分高良薑半兩當歸切焙防葵銼碎白茯苓去粗皮各三分陳橘皮水浸去瓤微炒半兩檳榔二枚微煨上九味搗羅為細散每服二錢匕空心溫酒調下日晚再服治厥心痛麝香湯方麝香別研每湯成旋下木香一兩銼桃仁去皮尖雙仁麩炒三十五枚吳茱萸水浸一宿炒乾一兩檳榔煨三枚上五味除麝香桃仁外粗搗篩入桃仁再同和研勻每服三錢匕水半盞童子小便半盞同煎至六分去滓入麝香末半錢匕攪勻溫服日二服
