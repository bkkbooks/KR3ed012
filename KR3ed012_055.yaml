body:
  text: 卷第五十五心痛門心痛統論論曰心痛諸候皆由邪氣客於手心主之脈蓋手少陰心之經五臟六腑君主之官也精神所舍諸陽所合其藏堅固邪氣未易以傷是以諸邪在心多在包絡者心主之脈也其候不一有寒氣卒客於臟腑發卒痛者有陽虛陰厥痛引喉者有心背相引善瘛傴僂者有腹脹歸於心而痛甚者有急痛如針錐所刺者有其色蒼蒼終日不得太息者有臥則從心間痛動作愈甚者有發作腫聚往來上下痛有休止者或因於飲食或從於外風中藏既虛邪氣客之痞而不散宜通而塞故為痛也若夫真心不痛痛即實氣相搏手足厥冷非治療之所及不可不辨也心痛論曰心為君主之官神明之府正經不受邪其支別之絡脈為風寒邪氣所乘令人心痛蓋寒邪之氣痞而不散內干經絡則發為心痛乍間乍甚乃其證也治心痛吳茱萸丸方吳茱萸水浸去涎焙乾炒三分白朮一兩乾薑炮三分桂去粗皮陳橘皮去白焙附子炮裂去皮臍蜀椒去目及閉口者炒去汗甘草炙黃芩去黑心當歸切焙桔梗炒各半兩上一十一味搗羅為細末煉蜜丸如梧桐子大每服米飲下十五丸空心午間臨臥各一稍加至二十丸治心痛如刺或繞臍絞痛白汗出附子湯方附子大者炮裂去皮臍二枚芎藭乾薑炮厚朴去粗皮薑汁炙透吳茱萸水浸去涎焙乾炒甘草炙各一兩上六味銼如麻豆每服五錢匕水一盞半入棗二枚劈破同煎至七分去滓溫服如人行十里再服治心痛寒氣上逆心中妨悶脈沉而緊檳榔湯方檳榔微煨桂去粗皮郁李仁湯浸去皮尖炒熟附子炮裂去皮臍當歸焙各三分陳橘皮去白焙一兩上六味銼如麻豆每服五錢匕水二盞入生薑一分拍碎同煎至一盞去滓食前服治心痛如錐刀刺木香湯方木香當歸切焙桔梗炒各一兩吳茱萸水浸去涎焙乾炒一分鱉甲去裙襴醋炙黃一兩檳榔微煨一兩一分上六味粗搗篩每服三錢匕水一盞同煎至七分去滓食前溫服治心痛不可忍薑黃散方薑黃微炒當歸切焙各一兩木香烏藥微炒各半兩上四味搗羅為散每服二錢匕煎茱萸醋湯調下治心痛精神悶亂胡椒丸方胡椒高良薑烏頭炮裂去皮臍各一兩上三味搗羅為細末米醋三盞熬令硬軟得所丸如皂子大每服一丸鹽湯嚼下婦人醋湯下治心氣痛勝金丸方乾漆炒煙盡半兩桂去粗皮京三稜生用各一兩上三味搗羅為細末麵糊丸如梧桐子大每服一丸用新綿灰一錢匕熱酒調送下如有塊即下赤黃水或下血臨臥再服一丸治心痛不可忍三妙丸方巴豆一枚去皮心膜研出油斑蝥七枚去頭翅足炒胡椒四十九粒上三味搗羅二味為末入巴豆合研勻醋浸糊餅和丸如梧桐子大每服一丸用熟水滴熱油一兩點攪勻下治心痛不止檳榔散方檳榔生銼半兩薑黃半兩上二味搗羅為細散每服二錢匕熱酒調下治心痛薑桂散方薑黃一兩桂去粗皮三兩上二味搗羅為細散每服二錢匕醋湯調下治心痛桂心湯方桂去粗皮一兩半甘草炙黃一兩上二味粗搗篩每服五錢匕水二盞煎至一盞去滓溫服如人行五里再服治心痛莎草根散方莎草根炒去毛丁香炒等分上二味搗羅為細散每服半錢匕以酒煎三兩沸熱服治心痛人參湯方人參一兩半吳茱萸湯浸去涎焙乾炒一兩上二味粗搗篩每服三錢匕水一盞入生薑半分拍碎棗二枚劈破同煎至七分去滓溫服空心日晡各一治心痛五靈脂散方五靈脂二兩上一味搗羅為細散每服一錢匕男子熱酒調下婦人當歸酒調下治心痛蓬莪朮飲方蓬莪朮生用一兩上一味粗搗篩每服三錢匕水醋各半盞煎至七分去滓熱服治心痛及腹痛鉛丹丸方鉛丹白礬各一兩上二味同研內瓶中瓦蓋頭火煅通赤取出飯丸如緑豆大心痛生薑湯下腹痛醋湯下十丸細嚼治心疼氣刺痛不食厚朴丸方厚朴去粗皮生薑汁炙當歸切焙附子炮裂去皮臍陳橘皮湯浸去白焙各三分乾薑炮半夏湯洗七遍炒各半兩草豆蔻去皮一兩甘草炙銼一分上八味搗羅為末用陳曲煮糊為丸如梧桐子大每服二十丸至三十丸炒生薑鹽湯下治心疼不食兩脅刺痛壅悶豆蔻湯方草豆蔻仁半兩甘草炙銼三分上二味細銼如麻豆大每服五錢匕水一盞半煎至八分去滓緩緩呷治心疼不食兩脅刺痛壅悶參香散方人參木香蓽茇半夏湯洗七遍炒芍藥炒大腹銼各三分高良薑丁香桂去粗皮芎藭青橘皮湯浸去白焙各半兩上一十一味搗羅為散每服二錢匕炒生薑湯調下治心疼氣刺痛不能食木香湯方木香半兩桂去粗皮芍藥炒白朮陳橘皮湯浸去白焙枳殼去瓤麩炒各三分甘草炙一分上七味細銼每服五錢匕水一盞半入生薑五片煎至八分去滓溫服治心痛胸脅氣滿煩悶茱萸湯方吳茱萸湯浸焙乾炒桂去粗皮厚朴去粗皮生薑汁炙白朮芍藥炒陳橘皮湯洗去白焙各半兩五味子三分上七味粗搗篩每服五錢匕水一盞半入大棗二枚生薑三片同煎至八分去滓溫服空心午時服治心痛不可忍香桂丸方丁香乾薑炮各半兩芎藭三分桂去粗皮當歸切焙枳殼去瓤麩炒檳榔煨銼厚朴去粗皮生薑汁炙桃仁去皮尖雙仁炒各一兩上九味搗羅為末煉蜜和丸如梧桐子大每服三十丸炒生薑鹽湯下或溫酒亦可空心食前治心氣痛悶亂山杏煎方山杏仁炒令香熟去皮尖雙仁二兩吳茱萸湯洗焙乾炒為末十二錢上二味一處研勻丸如彈子大每服一丸溫酒化下如不飲酒即用熱湯發時服治九種心痛茱萸生薑湯方吳茱萸湯洗焙乾微炒生薑切焙各一兩人參三分上三味粗搗篩每服五錢匕水一盞半棗二枚劈破煎至一盞去滓熱服治心痛不能食丁香丸方丁香木香當歸切焙白豆蔻各半兩龍腦研一分上五味搗研為末再同研勻米醋煮蒸餅和丸如緑豆大每服七丸炒生薑鹽湯下甚者炒姜酒下十五丸不拘時治心疼氣痛客忤邪氣蠱毒鬼疰犀香丸方犀角屑半兩枳殼去瓤麩炒三分丁香麝香研各一分桂去粗皮檳榔銼乾薑炮當歸切焙各半兩牛黃研半分鬼箭羽一兩安息香二兩用胡桃四枚椎碎一處酒浸一宿濾去滓更入桃仁二兩炒去尖皮同研如泥酒煎成膏上一十一味除安息香外搗研為末用安息香煎和為丸如梧桐子大每服二十丸至三十丸炒生薑酒下治心疼中惡繞臍刺痛白汗出鬼箭羽湯方鬼箭羽桃仁去皮尖雙仁炒各一兩乾薑炮一分甘草炙銼半分厚朴去粗皮生薑汁炙當歸切焙桂去粗皮芎藭各半兩上八味細銼如麻豆大每服五錢匕水一盞半煎至八分去滓溫服治心痛不可忍桂心丸方桂去粗皮上一味搗羅為末煉蜜和丸如梧桐子大每服三十丸紫蘇酒下卒心痛論曰卒心痛者本於臟腑虛弱寒氣卒然客之其狀心如寒痛不得息千金治寒客心痛而用大黃黃芩治心痛徹背而用烏頭附子之類治療相反如此要在用之隨宜而已治卒心痛及九種心痛丹砂丸方丹砂研一分烏頭去皮臍生為末一兩巴豆去皮膜研如膏新盆內攤去油為霜一錢半上三味同研勻水煮陳曲糊為丸如黍米大每服三丸冷生薑湯下治卒心痛不可忍芎藭湯方芎藭桂去粗皮當歸切焙高良薑各半兩厚朴去粗皮生薑汁炙令透一分上五味粗搗篩每服三錢匕水二盞煎至七分去滓溫服空心日晚各一治卒心痛半夏丸方半夏湯浸七遍去滑曝乾細辛去苗葉各三分乾薑炮裂人參附子炮裂去皮臍各一分上五味搗羅為末醋煮麵糊和丸如小豆大每服五丸溫酒下治卒心痛烏頭丸方烏頭炮裂去皮臍蜀椒去目並閉口者炒出汗各三分乾薑炮裂桂去粗皮各半兩上四味搗羅為末煉蜜和丸如小豆大每服五丸溫酒下治卒心痛吳茱萸湯方吳茱萸水浸一宿曝乾微炒一兩半桂去粗皮一兩上二味粗搗篩每服一錢半匕酒一盞同煎至六分去滓頓服治暴心痛紫桂煮散方桂去粗皮高良薑當歸切焙各一兩吳茱萸半兩厚朴去粗皮生薑汁炙三分上五味搗羅為散每服一錢半匕水一盞入生薑三片棗一枚劈破同煎至六分不拘時候熱服治卒心痛不可忍三聖散方附子炮裂去皮臍蓬莪朮銼各一兩胡椒半兩上三味搗羅為散每服一錢匕熱酒調下婦人醋湯調下不拘時候治暴心痛危篤者神應丸方石灰風化者一錢乾薑一錢上二味搗羅為末滴水丸如豌豆大每服七丸取蔥白一寸刺開入開口椒七顆濕紙裹煨熟細嚼醋湯下治心腹卒痛脹滿口噤氣悶備急丸方大黃銼炒乾薑炮裂各半兩巴豆去心皮麩炒黃研一分上先將前二味搗羅為末入巴豆再搗千杵蜜和為劑瓷器盛勿透氣旋丸如梧桐子大每服二丸溫生薑湯下吐利為度治卒暴心痛如聖丸方豉七粒慢火微炒轉色傾出搓去皮斑蝥一枚去翅足微炒上二味同研飯和丸如豌豆大每服一丸溫酒或熱醋湯下治暴心痛高良薑散方高良薑芍藥等分上二味搗羅為散每服二錢匕溫酒調下不拘時久心痛論曰心為諸臟之長神之所舍也其正經不可傷傷之則旦發夕死夕發旦死是為真心痛不可復治其久成痛者由風冷邪氣乘於心之支別絡停滯不去發作有時故經久不瘥也治久心痛桂心丸方桂去粗皮一兩赤石脂半兩乾薑炮半兩蜀椒去目及閉口者炒出汗三分烏頭炮裂去皮臍三分上五味搗羅為末煉蜜和丸如小豆大每服五丸醋湯下空心日午夜臥各一治久患心痛不止及氣冷木香丸方木香炮鶴蝨微炒檳榔銼訶黎勒煨去核蕪荑炒附子炮裂去皮臍乾薑炮裂各一兩大黃銼醋拌炒一兩半上八味搗羅為末煉蜜和丸如小豆大每服三十丸食前生薑橘皮湯下治久心痛經年不止鶴蝨丸方鶴蝨炒木香檳榔銼陳橘皮湯浸去白焙蕪荑炒附子炮裂去皮臍乾薑炮裂各一兩上七味搗羅為末煉蜜和丸如小豆大每服三十丸食前橘皮湯下治久心痛不可忍薑黃散方薑黃炒當歸切焙各一兩木香烏藥銼各半兩上四味搗羅為散每服二錢匕煎吳茱萸醋湯調下治心痛久不瘥木香散方木香一半生一半炒吳茱萸湯浸焙乾炒當歸切焙甘草炙銼芍藥炒細辛去苗葉各一分檳榔銼乾薑炮桂去粗皮各半兩上九味搗羅為散每服二錢匕炒生薑鹽湯調下治心臟積冷疼痛久不瘥吳茱萸丸方吳茱萸炒一兩半附子炮裂去皮臍草豆蔻去皮各二兩桂去粗皮一兩桃仁湯浸去皮尖雙仁炒四兩丁香三分木香半兩上七味搗羅為末用煮陳曲糊和丸如梧桐子大每服二十丸米飲或煨生薑橘皮煎湯下治久心痛沉香湯方沉香銼雞舌香各一兩薰陸香半兩研麝香一分研去筋膜上四味搗為細末每服三錢匕水一中盞煎至七分去滓食後溫服治久患心痛不止丁香湯方丁香胡椒炒各一分陳橘皮湯浸去白焙桂去粗皮蘹香子炒甘草炙銼各一兩上六味粗搗篩每服三錢匕水一盞煎至七分去滓溫服治久心痛桂椒丸方桂去粗皮一分胡椒炒四十九粒巴豆七粒去皮膜研出油盡斑蝥七枚去頭足翅炒上四味搗羅為細末醋煮麵糊和丸如麻子大陰乾每服三丸溫酒下婦人醋湯下早晚食後臨臥有孕者不可服治久心痛二聖湯方厚朴去粗皮生薑汁炙大黃銼炒各一兩上二味粗搗篩每服二錢匕酒一盞煎至七分去滓溫服治久心痛遠志湯方遠志去心菖蒲細切各一兩上二味粗搗篩每服三錢匕水一盞煎至七分去滓不拘時溫服治久心痛桃仁煎方桃仁四十九枚去雙仁皮尖炒上一味細研如膏分作三服熟湯化下空心日午夜臥未瘥再作治久心痛吳茱萸湯方吳茱萸湯洗七遍半兩上一味以漿水一碗半煎至一碗去滓頻頻溫服肝心痛論曰肝心痛者色蒼蒼如死灰狀不得太息是也蓋肝在色為蒼足厥陰之脈貫膈布脅肋今肝虛受邪傳為心痛故色蒼蒼而不澤拘攣不得太息也