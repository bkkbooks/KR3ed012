body:
  text: 卷第一百四十毒箭所傷論曰箭鏃毒藥入皮膚肌肉間令人短氣悶絶口噤唇乾血雖止而腹滿不能言其人如醉者為難治若瘀血應時出其瘡溫而熱開口能言則可治也巢氏論毒箭有三種曰嶺南夷俚人用焦銅作箭鏃嶺北諸處以蛇毒螫物汁著管中漬箭鏃及有以𦬣藥為之者三種傷人皆不易治唯急飲糞汁可以御其毒小緩則毒氣深入不可救也治中毒箭解毒藍子散方板藍子五合生用升麻甘草炙王不留行各四兩上四味搗羅為散每服二錢匕溫水調下不拘時候日三更以水調少許塗於瘡上治箭鏃毒藥在內不出半夏散方半夏三兩以生薑三斤取汁浸三日白蘞三兩上二味同炒為末每服一錢匕酒下日三夜一不拘時淺瘡十日出深瘡二十日出治箭鏃毒藥入諸處不出牡丹皮散方牡丹皮為末二分白鹽半兩上二味同研勻為散每服二錢匕溫酒調下日三其箭鏃漸漸自出治金刃箭鏃瘡避風續筋骨止血石灰敷方風化石灰細末三兩生地菘苗生旋覆花生葛葉生青蒿苗生麥門冬苗各半兩上六味除石灰外研絞取汁和石灰作餅子曝乾搗羅為散用敷瘡口兼止血止痛避風水重午日合尤佳治毒箭服貝子散方貝子上一味搗羅為末每服一錢匕溫酒調下不拘時日三四服此方治中毒亦妙治毒箭乾薑散方乾薑末鹽上二味等分再同研勻敷瘡上毒自出治毒箭所傷煩亂欲絶飲麻子汁方大麻子三升上一味搗取自然汁每服半盞許日再服治毒箭雄黃敷瘡方雄黃上一味搗研為細末敷瘡上日四五度汁出便愈治毒蛇咬瘡亦妙又方上取蘆根自然汁每服半盞許日二夜一一方飲藕汁唯多為妙治毒箭甘草飲方甘草三兩上一味細銼用水二升煎取一升絞汁每服一小盞溫飲日三服仍淋瘡上治毒箭生薑飲方生薑半斤切上一味研如泥取自然汁飲五分一盞未退再服治毒箭旋覆根散方旋覆根不拘多少上一味搗羅為散每服二錢匕以溫酒調下日三服不拘時候仍用敷瘡中若無根花只子亦可用治毒箭地龍散方地龍糞上一味研為末熟水調服一錢匕日三服不拘時候治藥毒箭頭在身諸處未出雄黃散方雄黃細研一分粉霜半兩研蜣螂四枚為末生用巴豆三粒去殼別研如泥生用上四味再同研為散以銅箸頭取乳汁調點瘡上頻頻用之七日瘡熱箭頭自出箭鏃金刃入肉論曰凡箭鏃金刃入肉治宜速出之或有碎骨亦須去盡然後塗敷諸藥不然其瘡必不合縱復少愈亦常作疼痛若神驚血亂氣奪則死矣治金瘡箭頭在骨遠年不出牡丹散方牡丹去心白蘞各一兩桑根白皮銼二兩藿香葉丁香麝香研各一分上六味搗羅為散每服二錢匕溫酒調下日三淺者十日深者二十日箭頭自出治箭頭不出方磁石生搗研極細雄黃研各三分上二味同研令勻每服二錢匕緑豆汁調下空心十日後輕撥便出手足上用此藥貼之自出治金瘡止痛急風及破傷風出箭頭急風散方草烏頭三兩將一兩火燒存性醋淬令冷一兩依前法燒用新黃土罨令冷一兩生用生黑豆一分丹砂研一兩麝香研一分上四味搗羅二味為散入丹砂麝香同研細如出箭頭先以半錢匕酒調下後用藥點箭瘡如破傷風半錢匕或一錢匕酒調下小可病只一字量力加減治金瘡點藥箭頭令自出虎舌丸方干虎舌半兩用石臼杵搗為末生草烏頭尖末三錢磁石半兩性緊者石臼杵搗為末水銀三錢同磁石末一處研細令水銀星盡硫黃舶上者一錢硝石二錢同硫黃研楮實末二錢硇砂透明者二錢研丹砂一錢研金牙半兩石杵臼搗為末上一十味一處於乳鉢內更研極細石腦油為丸如黍米大用兩頭尖角合子盛貯每出箭頭一枚用藥一丸於竅內將銅箸點入箭瘡內即以好酒少許摩瘡四畔次將紅散子摩瘡須臾覺瘡極熱而癢其箭頭當日內自出次以生肌金華散摻瘡內以紫金膏封之治中箭頭摩瘡口上紅散子方曼陀羅子草烏頭尖騏驎竭茄子花萆麻子去殼細研各半兩上五味搗羅為細散以好酒調如膏於瘡口上塗摩之箭頭自出治金瘡刀箭入肉骨碎不出赤腫疼痛二灰散方馬韁灰一兩弓弦灰一兩上二味同研令勻每服一錢匕用蓼藍汁調下日三治箭頭入肉赤腫避風斂瘡當歸續斷膏方當歸續斷骨碎補桂去粗皮附子澤蘭芍藥白芨牛膝羌活芎藭木香騏驎竭生乾地黃白殭蠶白附子各一兩沉香丁香各半兩栝蔞二枚大者烏蛇肉白蘞白芷玄參各一兩杏仁桃仁各三分上二十五味並細銼入麻油四斤豬脂一斤半駝脂三兩用文武火煎三日後濾去諸藥入乳香三兩松脂六兩更煎一日用生絹濾卻粗滓再用五斗大生鐵鍋細羅鉛丹三斤炒令紫色旋旋入前藥油煎以柳枝子攪令紫色即旋退火以藥油滴少許水碗內成珠子為度以瓷石器密收依前法用治箭鏃不出雄黃丸方雄黃研獨角仙硇砂研不灰木威靈仙去土木槿花各一兩鼠一枚心頭取血研入衆藥上七味除鼠血外搗研為散和勻煉蜜丸如黃米大納在瘡內箭頭自出治箭鏃不出解骨丸方雄黃研蜣螂研象牙末三味各等分上三味搗研為散煉蜜丸如黍米大納瘡口內復細嚼羊腎脂摩貼之覺癢箭頭自出矣治箭鏃入骨不可拔無計得出巴豆膏方巴豆五粒去殼生研蜣螂一枚去足翅生用上二味同研勻如膏用時丸如緑豆大塗箭瘡內須臾痛定微癢且忍之待極癢不可忍撼動箭鏃即拔出其效如神治箭鏃不出方蜣螂五月五日取者佳斑蝥各七枚刺棘上曝乾細研砒黃細研半兩上三味和勻入青竹筒三寸內卷蠟紙塞口更以蠟紙封定廁中浸三七日取出洗曝乾每用一豆許待癢按之自出治箭頭不出白蘞散方白蘞二分牡丹去心三分上二味搗羅為散每服三錢匕溫酒調下空腹日午夜臥各一治金瘡及箭入肉不出腫痛馬韁灰散方馬韁灰弓弦灰各一兩上二味共研為散每服二錢匕用蓼藍汁調下日再服治箭鏃不出葛根飲方生葛根三斤銼上一味細研絞取自然汁每服半盞不拘時候日三治一切金瘡無不效者治箭頭入肉不出赤小豆飲方赤小豆半斤上一味以水五升煮令爛熟絞取汁每服一盞空腹日午夜臥服又方上用鼠肝五具細切爛研敷之兼以鼠腦髓塗並良亦治人針折在肉不出又方上取螻蛄腦十枚細研量瘡塗之即出又方上以生鼠皮一枚及前兩足燒作灰用豬膏和塗之即出又方上搗牛膝不限多少作末以熟水調塗箭瘡即出若火瘡灸瘡不能瘥者塗之亦效又方上細刮象牙屑不限多少以水和貼之及折針竹木刺不出皆療又方上以白頭蚯蚓十四枚納銅器中次入研細鹽一兩於日中曝並化作汁塗有箭鏃並刃傷處須臾癢則出又方上嚼杏仁不限多少塗之又方上搗烏梅不限多少為散水和塗之即出又方上取蠐螬不限多少細研取汁塗之血止即出治箭頭不出抵聖散方附子二枚重半兩者炮裂去皮臍檳榔二枚一生一熟大黃銼肉豆蔻去殼木香當歸銼焙吳茱萸洗焙黃連去須芎藭陳橘皮湯去白焙乾薑炮桂去粗皮蕪荑豬牙皂莢酥炙去黑皮並子各一分巴豆半兩去皮以漿水煮三二十沸麩炒黃研出油蒼鼠銼焙乾研末一兩上一十六味搗羅為細末沒藥酒調下一字匕只三服箭頭立出狐尿刺論曰狐尿刺者狐貍尿草棘上人有誤犯則發腫痛焮熱多在於手足指節然亦有端居不出而被此毒者蓋毒氣有相類之證亦不必狐尿乃爾也治狐尿刺久不差白蘞膏方白蘞羊糞栝蔞根各半兩上三味搗如膏封裹瘡上一復時其刺自出治狐尿刺發腫痛焮熱牛蒡根敷方牛蒡根薤根各二兩上二味同搗爛敷腫上其刺立出治狐尿刺棘人腫痛蠟滴方黃蠟半兩上一味熔汁看冷熱得所滴腫痛處即愈治狐尿刺日夜躁痛不得眠睡蒲公草塗方蒲公草連根莖葉四兩上一味搗爛絞取白汁頻塗之妙治狐尿刺疼痛不可忍栝蔞敷方生栝蔞根豉等分上二味搗作餅敷之干即易治狐尿刺在手足指節間腫痛豉敷方豉一兩上一味熟嚼敷之少頃看豉中當有毛不見更嚼敷之以毛出盡為度治狐尿刺人焮熱腫痛杏仁洗方杏仁二七粒上一味細研煮一兩沸乘熱以浸刺處數易之良治惡刺入肉桂蠟丸方桂去粗皮上一味搗為末熔黃蠟為丸看瘡大小置瘡內濕紙三五重搭蓋以火㶸候藥丸熔入肉其刺自出如無刺即所傷者亦平也治惡刺獨栗塗方獨顆栗不拘多少上一味爛嚼塗之裹以帛若有刺自出惡刺論曰惡刺初得以蛇虺毒氣經由草木水澤間有人染著忽似刺扎俄致腫痛其肉潰爛若手足上著往往指節墮落土人諳歷既多初覺刺時以艾灸數壯十愈七八灸弗愈者宜速以藥塗敷之治惡刺龍葵膏方龍葵根莨菪子胡燕窠獨顆蒜胡荽子鼠糞杏仁湯浸去皮尖雙仁麩炒豉各半兩上八味用漿水飯相和爛搗醋調封之每日一換經五七次瘥治惡刺蔥蒲膏方蔥白一握蒲公草五兩豉一合上三味爛搗塗瘡上用醋面紙封貼頭出即瘥治惡刺野狐膏方上用雄野狐唇爛搗和鹽封之治惡刺蒼耳洗方上用蒼耳搗汁洗之治惡刺木蟲塗方上取木中蟲和醋研封之治惡刺無心草塗方上用無心草根爛搗醋和封之治惡刺蔓荊牛乳敷方上五月五日收蔓荊子旋搗末以烏牛乳和調敷之人乳亦得治惡刺莨菪浸方上煮莨菪根水浸之冷即易治惡刺黑豆汁漬方上濃煮黑豆汁漬之治惡刺燕麥敷方上搗燕麥二三兩敷之治惡刺苦瓠浸方苦瓠一枚上開口納童子小便煮二三沸浸患處又方李葉棗葉上二味搗絞取汁塗之又方取白馬尿溫漬之又方取烏父驢尿漬之竹木刺傷肌肉不出論曰竹木刺所傷若為患淺然入人肌肉久不得出則損動榮衛而作瘡或中風水則腫痛成膿淹留歲月未易治也刺傷之初宜速去之加以塗敷無致風水之患治金瘡水毒及竹籤刺癰疽熱毒等方糯米三升入瓷盆內於端午前四十九日以冷水浸之一日兩度換水換時輕淘闢去水勿令攪碎浸至端午日取出曝乾生絹袋盛掛通風處上一味每用旋取少許炒令焦為散冷水調如膏藥隨大小裹定瘡口外以絹帛包縛候瘡愈解去若金瘡誤犯生水瘡口作膿漸甚者急以藥膏裹定良久其腫處即消更不作膿直至瘡合若癰疽毒瘡初發才覺焮腫赤熱急以此膏貼項下及腫處若竹木簽刺入肉者臨臥貼之明日揭看其刺出在藥內若貼腫毒干即換之常令濕為妙惟金瘡及水毒不可換恐傷動瘡口治竹木刺薔薇灰散方薔薇五斤上一味燒灰細研為散每服一錢匕溫酒調下空腹日午夜臥各一服治竹木刺不出鑿枘灰散方鑿枘上一味燒灰細研為散每服一錢匕溫酒調下治竹木刺久在肉中不出王不留行散方王不留行五兩上一味搗羅為散每服一錢匕溫酒調下空腹日午夜臥各一服治竹木刺不出瞿麥散方瞿麥五兩上一味搗羅為散每服一錢匕溫酒調下空腹日午夜臥各一服治竹木針刺入肉不出惡瘡蒜豆膏方大蒜一顆巴豆七枚去皮上二味同研成膏敷之日一易治竹木針刺入肉不出敷方羊糞上一味為細末豬脂和敷日三五上經宿自出治簽刺在爪甲中痛不可出梔子套方梔子殼半個填車脂滿殼中上套在指上如痛處稍癢刺自然出以鑷子取之鉗指亦依此法治一切金木竹所傷牛蒡葉散方牛蒡葉惡實葉是六七月收者上一味風乾為散每用量瘡口大小乾摻貼之不得犯別藥如經暑月蠅蟲下蛆在瘡上或因肌肉合生成有小竅子者即用杏仁研成膏手拈作條子入在竅內其蛆蟲自出治針折入肉不出象牙散方象牙屑上一味以鼠腦和敷之立出治竹木刺作膿皂莢灰貼方皂莢一梃膽礬一分上二味燒作灰細研干貼之治竹木刺入肉鹿角灰塗方鹿角上一味燒灰細研以豬膏和塗之治竹木刺入肉疼悶百治不瘥方松脂上一味取流出如稀乳頭香者敷瘡上以帛裹數日當自出
