body:
  text: 卷第一百一十八口舌生瘡論曰口舌生瘡者心脾經蘊熱所致也蓋口屬脾舌屬心心者火脾者土心火積熱傳之脾土二臟俱蓄熱毒不得發散攻衝上焦故令口舌之間生瘡腫痛治口舌生瘡烏犀湯方犀角屑三分羚羊角屑三分丹砂研三分黃耆銼半兩大黃銼一分升麻半兩生乾地黃焙一兩射干一分天門冬生者去心焙一兩玄參三分甘草炙銼一兩上一十二味粗搗篩每服三錢匕水一盞煎至六分去滓食後溫服治口舌生瘡升麻湯方升麻一兩大青去根三分射干三分黃柏去粗皮一兩山梔子仁半兩玄參三兩薔薇根銼三兩上七味粗搗篩每服五錢匕水二盞入竹葉七片煎至一盞去滓入蜜少許地黃汁一合更煎三五沸徐徐含咽治口舌生瘡麝香散方麝香研一分干蝦蟆燒灰研一兩黃柏去粗皮炙銼一兩甘草炙銼三分母丁香一分甜瓜蒂一分石膽研一分上七味搗研為散臨臥以一錢匕滲舌上有涎吐出治口舌生瘡防風散方防風去叉一兩龍膽一兩生地黃切焙二兩沉香銼半兩升麻半兩上五味搗羅為散每用二錢匕入鹽少許沸湯調勻揩齒含咽便睡治口舌生瘡齒動晚蠶蛾散方晚蠶蛾末二錢乾蟾半枚燒灰研益母草半兩人中白半錢白礬灰半錢上五味細研為散先以綿纏手指以溫漿水洗去白皮滲藥於瘡上日三五次治口舌生瘡密陀僧丸方密陀僧細研石膽細研白蜜各一兩生地黃一斤搗絞取汁上四味合和令勻以竹筒盛於飯上蒸候汽干即住以飯為丸如梧桐子大每含化一丸有涎即吐出治口舌生瘡杏仁丸方杏仁七枚湯去皮尖雙仁胡粉一錢上二味先研杏仁爛如膏次入胡粉和丸如梧桐子大每以綿裹三丸含化咽津治積年口舌瘡諸方不瘥茯神丸方茯神去木一兩白朮一兩旋覆花半兩縮砂蜜去皮三分大黃煨銼半兩芍藥半兩桂去粗皮三分郁李仁湯浸去皮一兩大麻仁別研二兩人參半兩枳殼去瓤麩炒三分訶黎勒去核一兩厚朴去粗皮生薑汁炙一兩白檳榔銼三分陳橘皮湯浸去白焙一兩白蘚皮銼半兩地骨白皮銼半兩上一十七味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心粥飲下漸加至三十丸治口舌生瘡久不愈玄參丸方玄參天門冬去心焙麥門冬去心焙各一兩上三味搗羅為末煉蜜和丸如彈子大每以綿裹一丸含化咽津治口舌生瘡久不瘥秦艽散方秦艽去苗土柴胡去苗各一兩上二味搗羅為散空心以豬子肝半具細切煎酒一盞投於肝中蓋定良久取酒調服三錢匕治口舌生瘡久不瘥金粉丸方緑豆粉半兩蓽茇半兩上二味搗羅為末糯米粥為丸如緑豆大先用冷水漱口後含化一丸咽津無妨治口舌生瘡衆藥不瘥密陀僧散方密陀僧研黃柏銼甘草炙銼各一兩蒲黃黃藥各半兩上五味搗研為散每用一錢匕敷於瘡上治傷寒後口生瘡咽喉腫塞大青飲方大青去根一兩吳藍去根半兩石膏研一兩芍藥一兩上四味粗搗篩每服三錢匕以水一盞入蔥白鹽豉各少許煎至六分去滓臨臥溫服治口舌瘡鬱金散方鬱金半兩白礬生研一分鉛霜研一分檳榔銼半兩上四味搗研為散每用半錢匕冷熟水調下食後日二服治口舌生瘡蘆薈散方蘆薈研半兩丹砂研一分丁香一分麝香半分牛黃研半分蟾酥半兩角蒿灰研半兩瓜蒂二十枚羊蹄花半兩干蝸牛研三枚熊膽研一錢細辛去苗葉一分馬牙硝研三分白礬灰研半分上一十四味搗研為散先以頭髮裹指於溫水內蘸揩之軟帛亠口𫩏𧘇卻膿水取少許藥末滲瘡上或輕可即去蟾酥蘆薈看病大小以意加減用之口臭論曰口者脾之候心脾感熱蘊積於胃變為腐臊之氣腑聚不散隨氣上出熏發於口故令臭也治口臭去熱毒五香丸方沉香丁香各一兩熏陸香三分麝香研半分木香三分甘草炙銼一兩羚羊角屑三分黃連去須三分鬼臼黃苓去黑心各半兩犀角屑三分梔子仁半兩上一十二味搗羅為末煉蜜和丸如梧桐子大每服七丸漿水下日二服加至十丸治口臭去熱毒雞舌香丸方雞舌香一兩藿香半兩零陵香一分甘松香一分當歸切焙桂去粗皮各三分木香半兩芎藭三分莎草根去毛一分草豆寇仁半兩檳榔銼五枚白芷半兩上一十二味搗羅為末煉蜜和丸如雞頭大綿裹含化咽津以瘥為度治口臭濕疳蝕齒欲落唇頰穿破青黛散方青黛研一兩雄黃研半兩丹砂炒莨菪子微炒青礬石燒令汁盡白礬石燒令汁盡附子炮裂去皮臍各一分苦參銼半兩甘草炙銼一兩細辛去苗葉半兩藜蘆去蘆頭麝香研各一分上一十二味搗羅為散先以綿拭令淨後用藥貼之治口臭豆寇散方肉豆蔻去殼紅豆蔻去皮草豆蔻去皮白豆蔻去皮各半兩細辛去苗葉一分丁香半兩桂去粗皮一兩甘草炙銼人參赤茯苓去黑皮各半兩上一十味搗羅為散每服一錢匕熟水調下日三不計時候治口臭生肌長齦升麻散方升麻二兩防風去叉一兩當歸切焙白芷各半兩芎藭藁本去苗土各三分麝香研一分甘草炙銼半兩木香細辛去苗葉各一分上一十味搗羅為散研細每用一錢匕敷齒根下甚者綿裹一錢含化咽津即效治口臭䘌齒下胸膈邪氣升麻散方升麻一兩地骨皮細辛去苗葉菖蒲地柏射干沉香草豆蔻仁各半兩續斷一分寒水石研一兩上一十味搗羅為散食後以指搵藥揩齒良久漱口治口及身臭七香丸方白豆蔻仁丁香藿香零陵香青木香白芷桂心各一兩香附子二兩甘松香當歸各半兩檳榔二枚沉香一兩上一十二味搗羅為末煉蜜和丸常含一丸如大豆大咽汁日三夜一亦可常含咽汁五日口香十日體香二七日衣被香三七日下風人聞香四七日洗手水落地香五七日把他人手亦香慎五辛下氣去臭治口氣臭穢常服含丁香丸方丁香半兩甘草三兩細辛桂心各一兩半上四味搗羅為末煉蜜和丸如彈子大每服二丸臨臥服含化治口臭揩齒方沉香升麻白芷藁本去苗土細辛去苗葉丁香各半兩寒水石研二兩上七味搗羅為散每日早取柳枝咬枝頭令軟托藥揩齒暖水漱復以綿揩令淨治口臭生瘡藁本散方藁本去苗土芎藭各半兩細辛去苗葉桂去粗皮當歸切焙杏仁湯浸去皮尖雙仁生用雄黃研各一分上七味搗研為散每用一錢匕敷瘡上日三度治口臭揩齒令香七寶散方鍾乳研丹砂研海水沫研白石英研真珠末研麝香研珊瑚研各一分上七味搗羅為散再研細以柳木篦子咬頭令軟托藥揩齒治口臭齒疳脫落漏齦膿出不止抵聖散方銅緑膽礬各一錢蟾酥七片膩粉兩筒子鉛丹半錢砒霜一錢上六味研勻先以熱湯漱口次貼一字表裡拭之候涎出盡別用鹽湯漱口治心虛寒口臭蟲蝕齒痛芎藭散方芎藭白芷各一兩甘草炙銼三分桂去粗皮杜蘅各半兩當歸切焙三分上六味搗羅為散食前暖酒調下一錢匕日二服三十日體皆香即瘥治口臭血不止細辛散方細辛去苗葉一分菖蒲三分乾薑炮裂棗肉焙乾各半兩雞舌香一分上五味搗羅為散每用半錢綿裹如杏仁含咽津日三治口臭䘌齒丁香散方丁香研二十枚白礬燒灰香附子各三分上三味搗羅為散先用揩齒次以散一錢敷之治口臭䘌齒礬石散方白礬燒灰一分麝香少許上二味細研為散貼患處日三五上治口臭椒桂散方蜀椒去目及閉口者炒去汗桂去粗皮各一兩上二味搗羅為散每用五錢水一盞煎五七沸和滓熱漱泄治心脾蘊熱隨氣上熏發為口臭草豆蔻丸方草豆蔻仁丁香各一兩麝香一分研藿香葉桂去粗皮零陵香莎草根去毛木香白芷當歸切焙檳榔銼各半兩上一十一味搗羅為末煉蜜為丸如雞頭實大每含化一丸咽津液日三丸治口臭闢除邪惡冷氣含香丸方零陵香一兩甘松洗淨焙二兩沉香銼三兩乳香四兩研木香五兩草豆蔻仁六兩檳榔銼七兩桂去粗皮八兩赤茯苓去黑皮九兩甘草炙銼十兩上一十味搗研為末煉蜜為丸如小彈子大臨臥及五更初含化一丸下注丹田能生津液語音清爽顏色悅澤鬢髮烏黑止小便明目益智補虛勞除冷氣久服一生無患治腑臟蘊熱上熏發為口臭方芎藭不以多少銼小塊子上一味含化咽津唇瘡論曰唇瘡者以脾胃有熱熱氣循經而外發於唇故生瘡也蓋足陽明之脈下循鼻外入上齒縫中還出挾口環唇內經謂脾之合肉也其榮唇也是故脾胃之經與唇相應熱氣乘經而沖發所以唇為之生瘡治脾胃客熱唇腫生瘡飲食妨悶琅玕散方寒水石細研成粉四兩青黛研半分馬牙硝細研一分硼砂細研一錢龍腦細研一分上五味再同研令極細每服一字或半錢喉咽中干滲食後臨臥治唇瘡白蘞膏方白蘞一兩白芨一兩白蠟三兩黃耆一分麝香研一分乳香研一分牡丹皮一分芍藥一分丁香一分上一十味除油並研藥外並細銼先用油煎十餘沸即下銼藥候黃耆赤黑色用綿濾過慢火煎十餘沸次下諸研藥攪不住手候凝成膏於瓷器中盛下麝香攪令勻每用少許塗貼患處日三五上即瘥治唇瘡生肌藁本散方藁本去苗土半兩芎藭半兩細辛去苗葉半兩桂去粗皮一分當歸焙乾半兩杏仁湯浸去皮尖雙仁一分雄黃研一分上七味搗羅六味為散入雄黃拌勻敷瘡上日三五次治唇瘡及緊唇瘡久不瘥硫黃膏方硫黃研白礬枯研丹砂研水銀麝香研黃柏為細末各一分上六味同研候水銀星盡用臘月豬脂和如泥先拭唇令淨後以膏塗之日三五上即瘥治口唇生瘡五倍子散方五倍子去心中蟲槐花擇上二味等分為細散每用蜜調敷唇上如瘡口乾以蔥涎調塗之治唇瘡方東壁上土上一味細研敷之瘥又方胡粉上一味敷瘡上瘥又方燕脂上一味以油調塗之瘥又方豉上一味湯浸一宿爛研塗之瘥又方白英去皮酥炙赤色上一味搗末貼瘡上蟲出即瘥又方大麻子燒灰上一味細研為末用井華水調塗唇上治唇邊生瘡年深不瘥方藍葉上一味取八月生者搗汁洗瘡上治唇瘡及緊唇瘡方雞子一枚煮熟上一味取白細研令勻貼瘡上瘥又方蟹腹底白皮一分上一味燒作灰細研為散貼之效治沈唇瘡方鯉魚血上一味取血磨墨相和塗之瘥又方亂髮露蜂房上二味各取少許並六畜毛少許同燒灰研令細以豬脂和塗之良又方白礬熬沸上一味細研為末和胡粉敷之瘥又方松脂上一味炙令軟捏作片子貼瘡上以瘥為度治沈唇瘡方蛇皮燒灰上一味細研為末先灸瘡令熱敷之即瘥又方葵根一握上一味燒灰細研為散敷之瘥又方乾蟾一枚燒灰上一味細研為末敷之瘥又方鯉魚膽一枚上一味取汁磨墨相和塗之瘥唇生核論曰唇生核之候大概與唇瘡緊唇相類然其腫至於生核者蓋足陽明與太陰為表裡臟腑俱有風熱風熱之氣沖發二經與血氣相搏而為唇腫外復為風冷所乘血氣凝結聚而不散故生核也治脾胃蘊積熱氣復為風冷相搏唇邊生核結硬疼痛防風湯方防風去叉半兩菊花一兩升麻獨活去蘆頭知母焙黃芩去黑心玄參藁本去苗土大黃銼炒梔子去皮前胡去蘆頭桔梗銼炒甘草炙銼麥門冬去心焙生乾地黃焙各半兩上一十五味粗搗篩每用三錢匕水一盞煎至七分去滓食後服日三治脾胃風熱唇生核地黃煎方生地黃汁一升生麥門冬去心生天門冬去心葳蕤各四兩細辛去苗葉甘草炙芎藭白朮各二兩黃耆升麻各三兩上一十味除地黃汁外並銼細以綿裹苦酒浸一宿取出更用豬膏三升煎濾過下地黃汁並綿裹者藥同煎以膏鳴水脈盡為度去滓盛貯每以少許細細含化緩咽之治脾胃有熱風冷相乘唇腫生核疼痛升麻飲方升麻前胡去蘆頭犀角鎊各半兩龍膽青竹皮葛根銼各一分薏苡仁甘草炙銼各半兩上八味粗搗篩每服五錢匕水一盞半煎至八分去滓食後服治脾胃積熱風冷乘之唇腫結核黃連散方黃連去須升麻龍膽各一兩上三味搗羅為散綿裹如彈子大臨臥以新汲水浸過含化咽津治唇腫生核惡實散方惡實炒烏梅去核各半兩甘草炙銼一分上三味搗羅為散每服三錢匕童子小便一盞煎至三五沸和滓乘熱含漱冷吐日三治唇生核腫痛如彈方牛膝燒灰存性研上一味先以針刺出惡血次用藥少許以新汲水調塗核上治唇黑腫生核痛癢不可忍方古銅錢青者四文上一味於石上以臘月豬脂磨取汁塗之緊唇論曰緊唇之候其本與唇瘡同瘡未及瘥熱積在胃復為風濕所搏故令口唇發腫瘡緊而痛濕潰出黃水久而不愈謂之緊唇脈經論足陽明之脈所生病則曰唇緊者蓋陽明胃之脈俠口環唇風熱所客則為緊唇之病方書謂緊唇亦為沈唇治緊唇順脾養肌散方山芋一兩人參三兩桂去粗皮白芷甘草炙銼白朮各一兩訶黎勒皮白茯苓去黑皮黃耆銼木香各半兩肉豆蔻兩枚去皮上一十一味搗羅為末每服一錢匕如茶點熱服治緊唇水銀膏方水銀研乳香研各一兩緑礬研半兩苦參銼二兩亂髮如雞子大細辛去苗葉一兩半上六味各搗研為末先以緋帛一片裹發麻油一斤蠟五兩先煎十餘沸次下苦參細辛以緋帛發消盡去滓又以水銀緑礬乳香一處細研投於膏中攪令勻慢火煎成膏每用少許塗唇上以瘥為度治緊唇刺薊汁方刺薊一握上一味搗汁日曝之令濃先揩口唇令血出以藥汁塗之兼療刺風甚驗治緊唇皂莢塗方皂莢末上一味每以少許水調塗之治緊唇大黃塗方大黃一分上一味搗為末每用少許醋調塗治緊唇牛膝灰敷方牛膝切一分上一味燒灰細研為末滲敷之治緊唇豬脂塗方臘月豬脂上一味每用少許塗之治緊唇蛇皮灰塗方蛇皮燒灰上一味研令細生油調塗瘡上治緊唇案垢灰塗方屠家肉案上垢上一味燒作灰塗之日三兩上瘥治緊唇馬齒莧塗方馬齒莧上一味搗汁塗之治緊唇色黑癢痛方青銅錢四文上一味於磨石上以臘月豬脂磨錢泥和豬脂如膏塗之驗
