body:
  text: 卷第十歷節風論曰歷節風者由血氣衰弱為風寒所侵血氣凝澀不得流通關節諸筋無以滋養真邪相搏所歷之節悉皆疼痛故謂歷節風也痛甚則使人短氣汗出肢節不可屈伸治歷節風身體骨節疼痛不可屈伸舉動不遂羌活湯方羌活去蘆頭三兩桂去粗皮芍藥熟乾地黃焙葛根銼麻黃去根節煎掠去沫焙各二兩甘草炙銼一兩半防風去叉當歸切焙芎藭各一兩上一十味粗搗篩每服五錢匕水一盞半酒半盞入生薑一棗大切同煎至一盞去滓溫服空心日午夜臥各一治歷節風日夜疼痛黃耆湯方黃耆四兩防風去叉附子炮裂去皮臍各一兩半芎藭一兩麻黃去根節煎掠去沫焙五兩當歸焙一兩甘草炙銼半兩芍藥一兩上八味銼如麻豆每服五錢匕水一盞半入棗二枚去核生薑一分劈碎煎至一盞去滓溫服空心日午夜臥各一治歷節風手足曲戾言語錯亂茯苓湯方赤茯苓去黑皮防風去叉當歸焙白前乾薑炮裂甘草炙銼各二兩獨活去蘆頭三兩遠志去心附子炮裂去皮臍人參各一兩上一十味銼如麻豆每服先用水三盞黑豆半匙棗二枚劈破生薑半分煎至一盞半去滓入藥末五錢匕煎至一盞去滓溫服空心日午夜臥各一治歷節風疼痛日夜不可忍附子湯方附子炮裂去皮臍一兩黃耆四兩甘草炙銼半兩麻黃去根節煎掠去沫焙五兩防風去叉半兩上五味銼如麻豆每服四錢匕水一盞半棗二枚去核生薑一棗大劈碎同煎至一盞去滓溫服日二夜一治歷節風疼痛不可忍紫桂湯方桂去粗皮防己赤茯苓去黑皮芍藥各四兩人參二兩烏頭炮裂去皮臍七枚白朮四兩甘草炙銼五兩防風去叉三分當歸焙一兩半上一十味銼如麻豆每服三錢匕水一盞酒少許生薑半分同煎至七分去滓溫服空心日午臨臥各一治歷節風舉體疼痛防己湯方防己白朮各四兩桂去粗皮赤茯苓去黑皮人參甘草炙銼各三兩附子炮裂去皮臍半兩上七味銼如麻豆每服四錢匕水一盞半生薑半分煎至一盞入醋少許攪勻去滓溫服當覺身熱痹未覺加藥末如前法煎空心並二服如人行五里再服用熱姜粥投汗出慎外風治歷節風疼痛日夜發歇不可忍人參湯方人參三兩白朮四兩桂去粗皮防己甘草炙銼各三兩烏頭炮裂去皮臍七兩防風去叉三分赤茯苓去黑皮二兩上八味銼如麻豆每服四錢匕水一盞半生薑三片同煎至一盞入醋少許更煎三四沸去滓溫服日二夜一當覺熱痹未覺加藥末並醋如前煎服覺熱痹即止治歷節風身體四肢疼痛如脫落或腫按之皮急頭眩身熱悶欲嘔吐知母湯方知母二兩防風去叉桂去粗皮各三兩白朮五兩芍藥甘草炙銼各三兩附子炮裂去皮臍二兩上七味銼如麻豆每服五錢匕水二盞生薑三片煎至一盞去滓溫服日三夜一治歷節風骨節疼痛日夜不可忍秦艽湯方秦艽去苗土防風去叉各二兩黃耆銼三兩附子炮裂去皮臍一兩麻黃去根節煎掠去沫焙四兩當歸切焙一兩上六味銼如麻豆每服五錢匕水一盞半生薑三片同煎至一盞去滓溫服空心並二服臨臥並二服厚覆微出汗慎外風治歷節風四肢疼痛不可忍白朮湯方白朮防己各三兩附子炮裂去皮臍半兩桂去粗皮人參各三兩甘草炙銼二兩半當歸焙芍藥各一兩上八味銼如麻豆每服四錢匕水一盞半生薑三片煎至一盞入醋少許更煎三四沸去滓溫服當覺體中熱痹未覺加藥末並醋如前煎服治歷節風周身百節疼痛腰腳痿弱防風湯方防風去叉二兩白朮一兩白蘚皮二兩桂去粗皮一兩三分黃耆銼二兩薏苡仁炒三兩上六味粗搗篩每服四錢匕水一盞半生薑三片煎至一盞去滓溫服日三夜一治歷節風附子湯方附子炮裂去皮臍一兩半黃耆四兩甘草炙半兩麻黃去根節煎掠去沫焙六兩防風去叉半兩小黑豆一兩微炒上六味銼如麻豆每服三錢匕水一盞生薑三片大棗一枚劈破煎至八分去滓溫服日三夜一治歷節風疼痛發歇不可忍麝香丸方蠐螬濕紙裹煨熟研三枚壁虎研三枚地龍去泥研五條乳香研一分草烏頭三枚生去皮木香半兩麝香研一錢龍腦研半錢上八味將草烏頭木香搗羅為末合研勻為丸如干入少酒煮麵糊如梧桐子大每服三十丸臨臥乳香酒下治歷節風筋攣骨痛不得屈伸烏頭丸方烏頭燒存性藿香去梗縮砂炒去皮白芷甘松去土酒浸乾薑炮各二兩芎藭天麻當歸切焙各一兩雄黃研一分上一十味搗羅為末煉蜜丸如小彈子大空心午時臨臥茶酒任嚼下一丸治歷節風百骨節疼痛晝夜不可忍沒藥散方沒藥研半兩虎脛骨酒炙三兩上二味搗研為末每服二錢匕溫酒調下日三服不計時候治歷節風四肢攣急疼痛難忍短氣汗出透關散方麻黃根五兩天南星炮威靈仙去土各半兩萆薢當歸切焙人參天麻各一兩赤小豆水浸去皮焙半升上八味搗羅為末每服半錢或一錢匕溫酒調下食後臨臥服治歷節風筋脈拘攣骨節疼痛古聖散方漏蘆去蘆頭半兩麩炒地龍去土炒半兩上二味搗羅為末先用生薑二兩取汁蜜二兩同煎三五沸入好酒五合以瓷器盛每用七分盞調藥末一錢半匕溫服不拘時治歷節風疼痛不可忍趁痛丸方草烏頭不去皮尖三兩生乾地黃焙天南星半夏與天南星薑汁浸一宿切焙白殭蠶炒烏藥銼各半兩上六味搗羅為末酒煮麵糊丸如梧桐子大曝乾每服五七丸空心臨臥溫酒下如顛撲腫痛用薑汁和酒研十數丸塗之如卒中倒僕以薑汁茶清研五七丸灌之即醒治風寒客搏血氣凝澀不通歷節疼痛甚者短氣汗出肢節不得屈伸錫藺脂丸方錫藺脂白殭蠶炒芎藭藿香葉天南星炮白芷甘松去土乳香研楓香脂研骨碎補去皮毛各半兩烏頭新汲水浸一宿去皮臍切焙乾羌活去蘆頭自然銅煅醋淬各一兩糯米炒令黑色二兩上一十四味搗研為末煮糯米粥為丸如梧桐子大每服五丸至七丸細嚼炒地黃酒下食後臨臥服治歷節風茯苓湯方白茯苓去黑皮防風去叉人參當歸焙白前乾薑炮甘草炙銼遠志去心各二兩獨活去蘆頭各三兩附子炮裂去皮臍一兩大豆去皮三合上一十一味銼如麻豆每服五錢匕水一盞半入生薑半分切棗二枚劈破同煎至七分去滓空腹溫服治歷節風獨活散方獨活去蘆頭一兩半玄參一兩生犀角屑二兩升麻三兩惡實根銼半兩豉二合生乾地黃銼半兩上七味搗羅為散每服三錢匕空腹煎米飲調下日二治氣血衰弱風毒攻注歷節疼痛乳香大丸方乳香研沒藥研各一兩五靈脂去砂石四兩烏頭炒裂去皮臍一兩半上四味各搗研為末再同和勻滴水和丸如小彈子大以丹砂為衣每服一丸研薄荷酒化下日三服中風百節疼痛論曰中風百節疼痛者由體虛受風風邪中於關節故令百節筋脈拘急疼痛寒熱更作不可屈伸此皆真氣怯弱不勝風邪真邪相搏所以痛也治中風手足拘攣百節疼痛煩熱心躁惡寒經數日不欲飲食加減三黃湯方麻黃去根節煎掠去沫焙一兩二錢獨活去蘆頭一兩黃耆半兩細辛去苗葉一分黃芩去黑心三分上五味㕮咀如麻豆每服六錢匕水二盞煎至一盞去滓空腹服一服小汗兩服大汗心躁加大黃半兩腹滿加枳實去瓤麩炒一枚氣逆加人參三分驚悸加炒牡蠣粉參分渴加栝蔞根參分先有寒加附子炮裂去皮臍一枚治中風身體百節疼痛四肢緩弱手足不遂及産後中風羌活湯方羌活去蘆頭桂去粗皮熟乾地黃焙芍藥葛根銼麻黃去根節煎掠去沫焙各一兩半甘草炙銼一兩生薑二兩半上八味㕮咀如麻豆大每服五錢匕水一盞酒一盞同煎取一盞去滓溫服日三夜一不拘時候治中風百節疼痛頭目昏眩及傷寒頭疼壯熱肢節疼痛肩背拘急羌活湯方羌活去蘆頭桂去粗皮防風去叉各半兩天麻甘菊花旋覆花白附子炮欒荊去葉俗謂之頑荊是也天南星水浸七日切作片子焙乾烏頭鹽水浸一日切作片子焙乾炒甘草炙麻黃去根節各四兩附子炮裂去皮臍蒼朮米泔浸一宿切炒各半斤威靈仙六兩牽牛子搗取粉三兩陳橘皮湯浸去白焙半斤上一十七味銼如麻豆每服三錢匕水一盞入薄荷七葉生薑三片同煎至七分去滓溫服治外傷風邪百節痠痛頭痛身重遍體發熱氣粗眼疼神術湯方蒼朮銼碎四兩甘草麻黃去根節各三兩豬牙皂莢四挺去皮子上四味並生用粗搗篩每服三錢匕水一盞煎至七分去滓不拘時溫服厚被蓋出汗或入蔥白三寸杏仁二枚碎豉七粒同煎服尤佳治中風身體筋脈骨節疼痛搜風趁痛散方白附子炮附子炮裂去皮臍赤小豆天南星炮去臍海桐皮銼狼毒自然銅煅醋淬地龍炒去土上八味等分搗羅為散每服半錢至一錢匕蔥酒調下豆淋酒亦得空心服治中風肢節疼痛言語謇澀白花蛇散方白花蛇酒浸炙去皮骨二兩何首烏去黑皮切牛膝三味用酒浸半日焙乾蔓荊實去白皮各四兩威靈仙去土荊芥穗旋覆花各二兩上七味搗羅為末每服一錢匕溫酒調下空心臨臥服治中風百節疼痛寒熱更作不可俯仰羌活散方羌活去蘆頭一兩天麻去蒂生用一兩芎藭半兩酸棗仁炒三分鹿角膠炙燥半兩蔓荊實揉去白皮一分羚羊角鎊屑三分人參半兩白附子炮半兩牛膝去苗三分桂去粗皮半兩薏苡仁微炒一分烏蛇酒炙用肉半兩犀角鎊屑一分白蘚皮炙銼半兩地骨白皮銼三分柏子仁生用三分上一十七味搗羅為細散每日空腹及夜臥各以豆淋酒調下一錢匕至一錢半匕治中風手足拘攣痰涎不利精神昏悶百節疼痛麝香丸方麝香研牛黃研蔓荊實去皮木香人參赤茯苓去黑皮芎藭獨活去蘆頭牛膝酒浸切焙羌活去蘆頭麻黃去根節海蛤附子炮裂去皮臍乾蠍炒去土防風去叉白殭蠶炒海桐皮銼龍齒煅敗龜酒浸炙萆薢酸棗仁炒赤箭酒炙甘菊花天南星炮桂去粗皮乾薑炮虎骨酒浸炙各一兩烏蛇酒浸去皮骨炙四兩上二十八味搗研為末再同研勻煉蜜和丸如彈子大每服一丸薄荷酒下治諸風痛攻四肢百節白頭翁酒方白頭翁草一握上一味爛研以醇酒投之頓服又方生惡實根摩酒服痛止即住又方黑豆炒去皮半升威靈仙二兩桑根白皮銼一兩上三味用醇酒一升半煎取八合去滓頓服又方杏仁湯浸去皮尖雙仁炒黃研半兩虎骨以酒塗炙黃取半兩為細末上二味用醇酒一升熱調頓服風身體疼痛論曰風身體疼痛者由寒邪風濕之氣時襲於體陽氣內弱為邪所勝在分肉之間不得發散往來攻擊故身體疼痛也治風氣身體疼痛筋脈拘急手足𤸷麻睡臥多涎及丹田虛冷至聖丸方附子炮裂去皮臍牛膝去苗酒浸焙乾海桐皮銼肉蓯蓉酒浸切焙防風去叉萆薢狗脊黑者去毛黃耆銼蒺藜子沙苑者炒蘹香子舶上者炒威靈仙續斷木香各一兩骨碎補四兩木鱉子去殼二兩乳香研沒藥研各半兩上一十七味除研者外為細末再同和勻以酒煮麵糊丸如梧桐子大每服二十丸空心嚼木瓜酒下治風氣身體疼痛狀如繫縛沒藥丸方沒藥研一分骨碎補威靈仙各二兩草豆蔻去皮半夏湯洗七遍焙各一兩地龍去土炒三分自然銅燒醋淬七遍研一兩上七味除研者外為細末飯丸如梧桐子大空心溫酒下三五丸治風氣身體疼痛血脈凝滯手足無力應正丸方熟乾地黃焙三兩烏藥甜瓜子各二兩沒藥研乳香研各半兩上五味除研者外為細末再同和勻酒煮麵糊丸如梧桐子大空心食前溫酒或荊芥湯下二十丸治風身體疼痛應痛丸方烏頭炮裂去皮臍草烏頭銼炒黑楓香脂研赤小豆天南星炮威靈仙去土地龍去土各半兩上七味除研者外為細末再同和勻用醋煮麵糊丸如梧桐子大每服冷酒下十丸治風身體疼痛頭目不利肩背拘急肌肉𤸷痹痰涎壅滯胸膈滿悶麝