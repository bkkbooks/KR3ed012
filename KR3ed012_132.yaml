body:
  text: 卷第一百三十二瘡腫門諸瘡論曰諸瘡皆緣風熱濕毒之氣種類甚多載之方書備矣然有俗名瘡方論未見收録考之皆不離於邪氣逆肉理害肌膚者今各隨其證以治法附之雖田野下俚取而用之判然可曉不必泥於沿襲也治一切風刺面上生無名瘡癤因飲酒食炙爆物得之劉混康先生當歸丸方當歸四兩青鹽二兩上二味先以水洗當歸乘潤用青鹽滲遍閣在高處三日取下去鹽以當歸曝乾為末滴水丸如緑豆大每服二十丸空心溫酒下治面露瘡作膿窠如香瓣柳絮散方柳絮搗末膩粉上二味等分研勻燈盞中油調塗之治大人小兒頭面上無名瘡黃水不止露蜂房散方露蜂房蛇蛻各一枚上二味同於碗內燒過為灰每看瘡口大小用膩粉少許和勻生油調雞翎掃之治髭鬚瘡有膿窠金粉餅方鬱金緑豆粉各半兩白蘞一分上三味搗羅為末用朴硝水和作餅貼之治肺風上攻眉額生瘡苦參散方苦參藍葉陰乾威靈仙去土蔓荊實去皮何首烏荊芥穗胡麻子烏藥銼天麻上九味等分搗羅為散每服二錢匕食後溫酒調下日三夜二治大人小兒蝕透腮頰初生如米豆名金腮瘡二金散方雞內金是肚內黃皮焙鬱金上二味等分搗羅為散先用鹽漿盥漱了貼之忌米食治鬈毛瘡在頭中初生如葡萄痛不止黃香餅方黃柏一兩鬱金半兩乳香一分上三味搗研為末用槐花水調作餅於瘡口貼之治髮際瘡初生如黃米大或癢或痛龍骨散方龍骨烏賊魚骨去甲胡粉各半兩鉛丹一錢炒紫色上四味研細先用鹽湯洗了貼之日三五上治咽漏瘡初生結喉上如癰腫破後有眼子雄黃散方雄黃密陀僧各一錢膩粉三錢匕麝香一字上四味研細如未破用白梅湯調塗已破挹去膿汁干貼治緣唇瘡海帶散方海帶不拘多少上一味為散臨臥貼一兩宿瘥治徹耳瘡井苔散方井中苔土馬鬃各半兩上二味搗羅為散燈盞中油調塗之治緊唇面腫馬莧塗方馬齒莧不拘多少上一味搗汁塗之冬用乾末水調塗治鼻疳瘡侵蝕鼻柱麝香散方麝香草烏頭燒灰上二味等分研細貼之治睛漏瘡目大眥出膿汁有孔子白龍散方龍腦馬牙硝各半錢緑豆粉一錢上三味同研極細用燈心蘸藥點之日四五上治頤頦瘡一名獨骨瘡百合散方百合黃柏各一兩白芨一分萆麻子仁五十粒研上四味搗研為散用朴硝水和作餅貼之日三五上治玉枕瘡生枕骨上如癰破後如筋頭石葦散方石韋原蠶蛾炒上二味等分搗羅為散干貼取瘥治腮頷腫痛或破成瘡芙蓉敷方芙蓉葉不拘多少上一味爛搗敷之以帛系定日一換治粉鈐瘡繞項赤爛多汁紅粉散方密陀僧煅龍骨各半兩胡粉二錢鉛丹一錢炒紫色上四味研細挹去膿汁用生油調塗日三夜一治天柱瘡生脊大椎上如錢大赤色出黃汁不止敗蹄散方驢蹄削二十片燒灰胡粉一分熬麝香少許研上三味合研未破以醋煮麵糊和成膏塗入已破干滲治吹乳葡萄酒方葡萄一枚上一味於燈焰上燎過研細熱酒調服治吹乳鯪鯉甲散方鯪鯉甲一兩炙黃又名穿山甲自然銅半錢生用木通一兩上三味搗羅為散溫酒下一錢匕不拘時治乳頭裂方丁子香不以多少上一味搗為末敷之立愈治乳癰方赤小豆末蛇蛻皮燒作灰上二味以雞子白和之敷上少干即易治諸惡瘡疼痛不可忍上諸藥不效者宜塗黃柏散方黃柏一分微炙黃丹一分炒令紫色密陀僧一分白狗糞半兩燒灰膩粉半兩麝香一錢細研麒麟竭一錢上七味搗羅為細散都研令勻先用甘草湯洗瘡口後用津唾調塗之又方熊脂不以多少上一味細研塗之良治乳汁不時泄蓄積於內遂成癰名妒乳漏蘆散方漏蘆一兩黃芩一兩去黑心米粉半兩上三味搗為細散水調如膏塗於乳上治吹乳癰腫疼痛寒熱發歇晝夜不可忍蛇蛻皮散方蛇蛻皮燒灰半兩麝香二錢上二味研令勻細每服一錢熱酒調下並三服不計時候治婦人乳癰汁不出蓄積內結成膿腫名妒乳方露蜂房不以多少燒為灰上一味研細每服二錢匕水一中盞煎至六分去滓溫服治婦人吹乳獨勝散方白丁香半兩上一味搗羅為細散每服一錢匕溫酒調下不計時候治乳癰黃連散方黃連一分去須大黃一分銼炒鼠糞末二分上三味搗羅為細散煮黍米粥飲調和如膏於乳四邊敷之治瘡破似蜂窠瘥而還發方胡粉硃砂各等分上二味細研為末以蜜和合塗於瘡上日三換之即愈諸惡瘡論曰內經云諸瘡瘍皆屬心諸濕腫皆屬脾蓋心主血脾主肉也由體虛受於風濕邪毒與氣血相搏故發瘡也甚者焮腫滿痛潰而多汁或形體為之壯熱稽緩不治則毒氣內攻固不可以常法治之治一切惡瘡久不瘥者麝香散方麝香當門子二個丁香木香紫檀香各一分乳香沒藥各半兩上六味搗研為散用雞子清和入殼內飲上蒸熟曝乾再研分作六服每用蠟茶清調下治惡瘡皂莢刺散方皂莢刺一兩乳香一分上二味搗研為散每服二錢匕以酒一盞煎一兩沸服熱酒調下亦得治遠年惡瘡乳香散方乳香膩粉各半錢麝香一字龍骨大黃銼黃柏去粗皮各三錢上六味搗研為散先用苦竹瀝洗瘡次滲藥貼之治諸惡瘡多出膿水不幹者龍葵散方龍葵俗名天茄子景天俗名慎火草黃連去須天靈蓋各一兩龍骨乳香木鱉子黃蜀葵花各半兩上八味搗研為散看瘡大小入膩粉少許蜜調攤紙上貼之治無名惡毒瘡似魚眼者獺骨散方獺骨生碾末一兩麝香一字上二味細研和勻用津唾調貼之治惡瘡生好肉去膿水風毒氣腫烏蛇膏方烏蛇去皮骨炙搗末二兩麻油一斤鉛丹二兩鼠一個臘月者尤佳蠟四兩上五味先用油煎鼠令消去滓次入鉛丹並烏蛇末微火煎沸後下蠟更煎十沸膏成以瓷器收每用封瘡日一易治一切惡瘡金柏散方黃柏去粗皮黃連去須白芨五倍子各一分膩粉二錢匕麝香半字上六味搗研為散冷水調敷瘡上紙花子貼之治一切惡瘡密陀僧散方密陀僧穀精草各一分雄黃半兩上三味搗研為散每用少許干滲瘡上治惡瘡烏頭散方烏頭一枚炮裂去皮尖為末膩粉二錢匕上二味研勻先用白湯洗瘡數遍次用鹽湯洗數遍後以唾調藥成膏敷瘡口治惡瘡久不瘥者檳榔黃葵散方檳榔一個生者木香黃蜀葵花黃連去須上四味將檳榔稱見分兩余藥與檳榔等分搗羅為細散先以溫漿水洗瘡淨看大小入膩粉少許蜜調塗於故帛上敷之二三日易之治久患惡瘡不愈者牛角散方黃牛角一分燒灰麋角屑一分白蘞一分炙令微黃麝香半分細研密陀僧半分微炒黃丹半分微炒蜣螂一分燒灰羌活一兩海桐皮一兩銼仙靈脾一兩乾地龍一兩微炒上十一味搗羅為細散每服二錢匕溫酒調下空心食前服治惡瘡人不識多年不愈者赤小豆散方赤小豆炒熟糯米微炒吳茱萸炒熟黃連去須黃柏銼乾薑蛇床子以上銼半兩上七味搗羅為細散以生油和如面脂先煎槐枝湯洗瘡令淨然後塗藥日再換之治惡瘡粉香散方膩粉二錢匕乳香一錢蔥一根煨熟去焦皮上三味同研如膏攤在帛上貼瘡三日一換治惡瘡金黃散方黃柏一兩蜜二兩將蜜塗黃柏炙蜜盡為度上二味搗羅為散入麝香半字同研勻細干滲瘡上治諸般惡瘡通聖散方穀精草炒天南星炮貫衆炒黃柏炙各一分麝香半錢上五味搗研為散用少許干滲瘡上治惡瘡久不效寸金散方雞子殼十個生卻子者檳榔一枚麝香研膩粉各半錢黃柏去粗皮密陀僧各一錢上六味搗研為散用溫鹽漿水洗瘡干貼治一切惡瘡熊膽膏方熊膽研一錢膩粉半分雄黃研麝香研各半錢檳榔末一字上五味研勻於臘月用豶豬膽一個取汁和藥卻入藥在膽內用綿繩系定揉勻以松明黑煙熏令遍黑掛於陰處如惡瘡有指面大者用黍米許貼之如錢大者用緑豆許貼之恐藥干難貼薄以津唾調如稀糊塗之仍用薄樺皮蓋貼以帛子系之藥不宜多用治一切惡瘡疼痛不可忍楓香散方楓香脂紙襯於地上食頃令脆研膩粉各一分上二味同研勻細每先含漿水令暖吐出洗瘡淨後以藥末干敷之以瘥為度治一切無名惡瘡硫黃膏方硫黃膩粉吳茱萸湯洗焙乾炒各一分礬石熬令汁枯牡蠣煅赤研各半兩上五味細研入小油半兩黃蠟一兩同熬成膏趁瘡大小攤於紙上以火炙熔貼之治一切不測惡瘡年深不愈大效血竭散方血竭一兩鉛丹半兩炒紫色上二味搗研為散先用鹽湯洗瘡後貼之治無名惡瘡年深不愈柏皮散方黃柏蜜炙榆蚛蟲炙乾各一錢麝香少許研上三味搗研為細末以鹽漿水洗瘡後唾調藥紙花子貼之治一切惡瘡二黃散方大黃銼黃連去須山梔子仁連翹白芨青黛各一兩上六味搗羅為散有膿干貼無膿水調敷又方黃柏去粗皮鬱金黃蜀葵花白蘞上四味等分搗羅為散百合水調貼之治諸惡瘡木香散方木香檳榔銼黃連去須上三味等分搗羅為散干滲瘡上如瘡口乾即用生油調敷之治諸惡瘡口不合牛齒散方牛齒三兩雞卵殼二兩上二味燒研為散入膩粉少許生油調塗之立愈治惡瘡黃連散方黃連去須胡粉黃蜀葵花各等分上三味搗羅為散用龍腦麝香膩粉各少許研細拌勻先以鹽漿水帛子搵干滲之治惡瘡瓜蒂散方瓜蒂四十九枚黃連去須三兩杏仁去皮尖雙仁炒二兩半膩粉一分麝香一錢研上三味搗為細末用膩粉麝香同調和令勻以津唾調塗在瘡上更用紙面糊覆在藥上貼三五日一度含鹽水洗過更貼是瘡只貼本丹子其餘自瘥又方樓蔥一斤和須葉細切曬乾以慢火炒令黃色硫黃二兩細研臭黃一兩細研麝香半兩細研上四味細研為散先以熱鹽漿水洗瘡拭乾以生油調貼逐日換之又方鉛丹一兩半炒令紫松脂三分麒麟竭二兩半細研亂髮一分細研緋帛灰四分細研上五味先用油四兩於猛火上熬令煙出即下松脂鉛丹等煎令色黑下亂髮緋帛灰麒麟竭末等攪令勻膏成塗故帛上貼日二易之治毒惡瘡蘹干散方密陀僧一分黃柏蜜炙半兩上二味懷中懷干搗羅為散先用蔥湯洗瘡候乾敷之治積年惡瘡及透掌漏瘡外廉瘡金黃散方大黃銼炒鬱金銼炒鯪鯉甲炙穀精草龍骨山梔子仁木鱉子去殼獨角仙皂莢株上黑蟲烏賊魚骨去甲黃柏去粗皮甘草銼鉛丹白蘞不灰木麒麟竭研黃芩各半兩膩粉藜蘆去苗各一分上一十八味搗研為散每看瘡大小滲之有膿水即用溫鹽漿水洗淨敷之透掌漏瘡以津調納於瘡內不過三五上治一切惡瘡疼痛久不瘥者白香散方楓香脂研膩粉防風各一分上三味細研令勻先以含漿水令暖吐出洗瘡令淨後以藥末干敷之疼痛立止貼至令瘥即易治一切惡瘡及瘻瘡等方蛇床子末硫黃膩粉各等分上三味同研為散以生麻油調如糊以鹽湯淨洗瘡拭乾即先以口脂塗之然後敷藥不過三五度瘥治一切惡瘡疼痛不可忍宜敷黃連散方黃連二兩去須檳榔一兩母丁香半兩麝香半錢細研上四味搗羅為細散入麝香研令勻先用鹽漿水洗候乾以藥摻之又方栝蔞一枚燒作灰上一味細研每用摻在瘡上治諸惡瘡腫等病黑龍丸方芎藭三錢大黃一分甘草炙一兩益智去皮藿香葉各四錢梔子六錢防風去叉半錢雄黃雌黃各二錢麝香半錢匕膩粉五錢匕水銀一分為沙子乳香半分上一十三味除研外搗羅為末先將水銀膩粉乳香同研入諸藥研細勻水浸炊餅和丸如小豆大每服五丸嚼破茶酒下此藥一半作丸子一半作散子每服酒調散子一字下丸子一方更入蓽茇一十個乳香少許作丸子每服五丸嚼破散子酒下若婦人吹奶用散子半錢蝸牛七枚熱瓦上爆煞令去殼黃色入龍腦麝香各少許同研酒調下合面臥若治頭面腋下赤瘤子以二藥相間服之半月軟爛自破出盡惡毒後以膏藥貼之外系瘤子自落方砒黃砒霜硇砂各半分巴豆五粒去皮心芫青去翅足七枚斑蝥去頭足翅七枚上六味研為末先取蜘蛛網及絲共搓為線子水濕塗藥末於上貼子中常以藥末養遇有患者以線系之留線頭如癢即緊之如痛即不用緊其瘤自黑干如胡桃大者三四日自落如茄子大者約半月落更大者不過二十八日如瓜者不過一月如血瘤系之血出者服定血藥兼服藥治之定血散方栝蔞大者一枚去瓤棕櫚皮一把當歸切碎半兩上二味入栝蔞中泥固濟燒細研為散每服一錢匕茶酒任調下治惡瘡神妙地骨皮散方上以地骨皮一物先刮取浮皮別收之次取皮下膩白粉為細散其白粉下堅赤皮細銼與浮皮一處為粗末每用粗末一合許煎濃汁乘熱洗瘡直候藥湯冷以軟帛浥干乃用細散敷之每日洗貼一次以瘥為期用之未瘥慎不可住但勤施之無不瘥者小可瘡腫疼痛只以枸杞生銼煎濃汁熱淋亦效治一切惡瘡六枝烏金膏方桑枝槐枝榆枝柳枝桃枝枸杞枝上六味各長一尺粗如小指俱一寸截劈四破用油四兩炒令焦黑濾去滓入鉛丹半兩蠟一兩復熬令黑色傾在瓷合內候冷以新汲水浸出火毒先以後法熏出蟲乃用此膏塗瘡治惡瘡熏藥方貓兒糞豬糞亂髮粳米糠上四味等分都置在一地坑內用火燒上以方磚復之其磚心鑽一竅令煙出瘡就煙燻之有蟲及惡物出盡以溫漿水淨洗然後塗前六枝烏金膏用帛復之治一切惡瘡痛不可忍者碧雲膏方石緑研不以多少乳香研麒麟竭研沒藥研各半錢膩粉二錢匕黃蠟三兩松脂一兩上七味先將石緑細研次下乳香麒麟竭沒藥膩粉同研細用瓷碗火上化黃蠟如油次入松脂亦化為油入少熟油用柳枝攪滴在水上硬軟得所次入前藥末以柳篦子攪看顏色深淺得所為度綿濾過瓷器中收於軟帛上攤貼日二換之治一切諸惡瘡烏膏方雄黃半兩細研雌黃半兩細研芎藭半兩銼川升麻半兩杏仁二十枚湯浸去皮尖雙仁胡粉一分巴豆二十枚去皮心黃連半兩去須銼黃柏半兩銼烏頭半兩銼亂髮如雞子大松脂如雞子大水銀半兩與胡粉入水同研星盡蠟一兩竹灰半兩上十五味以酒一盞拌一炊時久安鐺於火上先取煉了豬膏三升急煎發令消下諸藥以文武火煎攪候杏仁黃黑色以綿濾去滓入研了真珠末二錢雄黃胡粉等攪令相得收瓷閣中每日二三上塗之治一切惡瘡及沙蝨水弩甲疽疼痛不可忍者並皆治之方蜣螂十枚端午日收者佳上一味搗羅為細末以油調敷之即易治二十種惡瘡及風瘡痔瘻等瘡疣子黑疵瘡腫鵲面䵟𪒟痤癤塗敷烏頭膏方烏頭二十枚巴豆三十枚藜蘆二兩大黃三兩上四味同燒搗研為末細羅石灰一升以染青汁和成膏看病大小敷之日二三易治一切惡瘡方赤小豆糯米各一分黃連去須二兩吳茱萸一分水銀一兩半手內唾津研之上五味各搗研為末和勻胡麻油調膏淨洗瘡塗之反花瘡論曰瘡生惡肉久則反出於瘡外故謂之反花瘡其初如飯粒破之血出餘毒尚熾惡肉隨生根深而膿潰此皆風熱毒氣之所作也治反花瘡甘草塗敷方甘草半生半熟礬石灰人中白密陀僧各半兩上四味並搗羅為末入童子小便半盞以微灰火熬用竹篦攪成膏取塗瘡上日三五次治反花瘡胭脂塗敷方胭脂一兩胡粉一兩半上二味相和研令勻先以鹽湯洗瘡淨帛搵干用藥敷之日三五次治反花瘡久不瘥方鵓鴿糞二兩炒黃上一味搗羅為散先以溫漿水洗瘡搵干以藥敷之治反花瘡藜蘆敷方藜蘆末豬脂各二兩上二味相和調如糊塗瘡上日三五度治反花瘡並治積年諸瘡不瘥者惡實根塗敷方惡實根末四兩豬脂三兩上二味調和如糊塗瘡上日三四度治反花瘡馬齒莧塗方馬齒莧上爛搗令細塗瘡上日五度一方燒灰以豬脂調塗之治反花瘡方上取蜘蛛膜貼瘡上干即易之治反花瘡方柳枝葉二斤銼上一味用水五升煎至二升去滓再煎如餳塗敷瘡上日三五度一方以清油單煎柳枝令焦黃去滓候冷旋旋塗之治反花瘡方鹽炒上一味細研塗瘡上日三五度治反花瘡方蒼耳葉上一味搗絞取汁服三合併塗瘡日三五次治反花瘡方鼠尾草根細切上一味不拘多少熟搗和豬脂封貼瘡上
