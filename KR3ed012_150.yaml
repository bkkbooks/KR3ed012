body:
  text: 卷第一百五十婦人血風門婦人血風統論論曰氣憑血運血依氣行二者不可斯須離天和日溫則血氣淖溢天寒日陰則血氣凝泣苟風寒客於血府則變生諸病蓋風善行而數變或為寒熱或為疼痛或為拘攣或為偏枯其候不一當隨證而治之婦人血風勞氣論曰血風勞氣者經血所下不調或緣產蓐感於風邪久不瘥則變寒熱休作有時飲食減少肌膚瘦悴遇經水當至即頭目昏眩胸背拘急四肢痠痛身體煩熱足腫面浮或經水不通故謂之血風勞氣也治婦人血風勞氣頭目昏眩胸背拘急心煩體熱血脈不利肌肉枯悴牡丹皮湯方牡丹皮芍藥銼牛膝酒浸切焙生乾地黃焙柴胡去苗各二兩附子炮襲去皮臍當歸切焙芎藭銼細辛去苗葉乾薑炮白芷吳茱萸湯洗焙乾炒人參陳橘皮去白焙虎杖延胡索山茱萸各一兩上一十七味銼如麻豆每服五錢匕水一盞童子小便半盞同煎至一盞去滓溫服治婦人血風勞氣鱉甲湯方鱉甲去裙襴醋炙當歸切焙芍藥各一兩半柴胡去苗秦艽去苗土桔梗炒知母切焙枳殼去瓤麩炒黃耆銼桂皮粗皮芎藭前胡去蘆頭人參白茯苓去黑皮荊芥穗地骨皮羌活去蘆頭各一兩上一十七味粗搗篩每服三錢匕水一盞煎七分去滓溫服治婦人血風勞四肢疼痛心腹脹滿吐逆面無顏色經脈不調煨肝茵陳散方茵陳蒿犀角屑石斛去根人參芍藥桔梗炒防風去叉柴胡去苗細辛去苗葉白朮桂去粗皮吳茱萸湯洗焙乾炒當歸切焙各一兩上一十三味搗羅為散每服五錢匕用豬肝一具切作五段每服用一段薄切作小片子入藥末拌令勻以濕紙裹慢火煨熟取出細嚼以米飲下治婦人血風勞氣頭項筋急疼痛咽喉干臍腹痛四肢無力血臟經脈不調地黃丸方生乾地黃二兩地骨皮麥門冬去心焙柴胡去苗枳殼去瓤麩炒赤芍藥黃連去須羚羊角屑桃仁湯去皮尖雙仁炒百合桔梗炒各一兩一分郁李仁湯浸去皮炒玄參檳榔銼茯神去木各一兩上一十五味搗羅為末煉蜜和丸梧桐子大每服二十丸至三十丸煎茯苓湯下治婦人血風勞氣頭痛胸背氣注拘急筋脈骨節痛心煩悸腰腿無力肌肉瘦悴羚羊角丸方羚羊角鎊三分茯神去木肉蓯蓉酒浸切焙防風去叉赤芍藥人參柴胡去苗旋覆花桃仁湯浸去皮尖雙仁炒獨活去蘆頭郁李仁湯去皮炒熟乾地黃焙各一兩生乾地黃焙一兩半上一十三味搗羅為末煉蜜和丸梧桐子大每服三十丸煎黃耆湯下治婦人數經分娩血風痿積肌體羸瘦面無顏色半夏湯方半夏湯洗去滑生薑汁製曝乾一兩人參厚朴去粗皮生薑汁炙各一兩半陳橘皮湯浸去白焙細辛去苗葉白茯苓去黑皮枳殼去瓤麩炒檳榔銼各一兩上八味粗搗篩每服三錢匕水一盞生薑半分切同煎七分去滓溫服治婦人血風勞氣頭目昏眩胸背拘急四肢痠痛心躁煩熱氣滿腹脹腰膝無力經候不調柴胡丸方柴胡去苗黃連去須知母焙赤芍藥龍膽黃芩去黑心地骨皮麥門冬去心焙茯神去木甘草炙各一兩檳榔銼三分上一十一味搗羅為末煉蜜和丸梧桐子大每服二十丸溫酒下不拘時治婦人血風勞氣氣塊攻心日漸黃瘦經脈不行牡丹丸方牡丹皮二兩芍藥一兩貝母半兩當歸切焙芎藭桂去粗皮苦參大黃銼炒各一兩郁李仁湯去皮二兩上九味搗羅為末煉蜜和丸梧桐子大每服二十丸溫酒下日二治婦人血風勞氣四肢拘急百節疼痛身體煩熱經水不利虎骨丸方虎骨酥炙生乾地黃焙各三兩防風去叉延胡索芍藥枳殼去瓤麩炒丹參五加皮桔梗炒薏苡仁巴戟天去心各一兩半桂去粗皮當歸切焙茯神去木各一兩檳榔銼五枚大麻仁研羚羊角鎊郁李仁湯去皮各二兩上一十八味搗羅為末煉蜜和丸梧桐子大每服二十丸溫酒下治婦人血風勞氣骨節疼痛寒熱頭眩眼睛疼心虛恍惚驚悸芍藥湯方芍藥牡丹皮玄參芎藭白茯苓去黑皮熟乾地黃焙白蘞甘草炙銼當歸切焙五味子麥門冬去心焙人參各一兩上一十二味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治婦人血風勞氣肢體羸瘦飲食減少疼痛寒熱荊芥湯方荊芥穗一兩人參木香芍藥生乾地黃焙秦艽去苗土柴胡去苗當歸切焙半夏生薑自然汁制焙乾烏藥芎藭甘草炙各半兩上一十二味粗搗篩每服三錢匕水一盞生薑三片同煎至七分去滓空心日午臨臥服治婦人血風勞氣身體疼痛面色萎黃四肢無力大便秘澀口苦舌乾不思飲食延胡索丸方延胡索京三稜炮銼赤芍藥當歸切焙旋覆花各一兩騏驎竭烏賊魚骨去甲澤蘭葉滑石各半兩上九味搗羅為末煉蜜和丸梧桐子大每服二十丸溫酒下日三服治婦人血風勞氣肌瘦寒熱咳嗽盜汗減食人參湯方人參荊芥穗柴胡去苗白朮鱉甲去裙襴醋炙酸棗仁微炒紫菀去土黃耆銼厚朴去粗皮生薑汁炙各二兩木香桂去粗皮白茯苓去黑皮桔梗炒五味子炒陳橘皮去白焙枳殼去瓤麩炒細辛去苗葉大腹皮各一兩沉香銼半兩上一十九味粗搗篩每服三錢匕水一盞生薑三片烏梅半枚同煎至七分去滓溫服日三治婦人血風勞氣每至晚即壯熱憎寒肢節痠痛腹脹飲食無味日漸羸瘦羚羊角湯方羚羊角屑鱉甲去裙襴醋炙當歸切焙芍藥桂去粗皮牡丹皮陳橘皮去白焙芎藭防風去叉白茯苓去黑皮草豆蔻去皮獨活去蘆頭甘草炙人參白朮白芷天麻麻黃去根節蒲黃柴胡去苗益智厚朴去粗皮生薑汁炙乾荷葉延胡索各一兩上二十四味粗搗篩每服三錢匕水一盞生薑三片同煎至七分去滓空心食前溫服治婦人血風勞氣攻注四肢腰背疼痛嘔逆吞酸不思飲食日漸羸瘦面色萎黃手腳麻痹五加皮湯方五加皮銼烏頭炮裂去皮臍芍藥牡丹皮海桐皮銼桂去粗皮乾薑炮芎藭各一兩上八味銼如麻豆每服三錢匕水一盞入油浸錢一文同煎六分去滓溫服日二治婦人血風虛勞邪氣相乘肢節疼倦口苦舌乾不思飲食寒熱頭痛虛汗不止熟乾地黃湯方熟乾地黃焙黃耆銼人參麻黃去根節當歸切焙芎藭秦艽去苗土鱉甲去裙襴醋炙各一兩延胡索甘草炙銼赤芍藥桂去粗皮前胡去蘆頭地骨皮柴胡去苗各三分上一十五味粗搗篩每服三錢匕水一盞生薑二片大棗烏梅各一枚煎至六分去滓溫服日三治婦人血風勞氣血海虛冷經候不調肌膚黃瘦八風十二痹帶下三十六疾妊娠胎動不安或子死腹中產後諸疾大澤蘭丸方澤蘭去梗當歸切焙各二兩細辛去苗葉白朮炒人參桔梗銼炒防風去叉蜀椒去目併合口者炒出汗厚朴去粗皮生薑汁炙白芷藁本去苗土石膏碎各一兩半桂去粗皮乾薑炮烏頭炮裂去皮臍芍藥芎藭白薇蕪荑炒甘草炙銼柏子仁研吳茱萸湯浸焙乾炒各一兩上二十二味搗羅為末煉蜜和丸如彈子大每服半丸早晚食前溫酒嚼下死胎不出兒衣未下並服一丸至二丸用瞿麥煎湯下腹中痛血冷氣刺經脈不利用當歸煎酒下產後中風傷寒汗不出用麻黃一分去節煎湯並三服厚衣蓋覆取微汗即愈血臟久冷無子及數墮胎胎漏血下以熟乾地黃煎酒下治婦人血風勞氣四肢少力月候不調臍腹疼痛茯苓丸方白茯苓去黑皮當歸切焙防風去叉山芋黃耆銼覆盆子各一兩半牛膝酒浸切焙人參獨活去蘆頭山茱萸芎藭蜀椒去目並閉口炒出汗蕪荑熬厚朴去粗皮生薑汁炙藁本去苗土桂去粗皮各一兩澤蘭一兩三分熟乾地黃焙三兩上一十八味搗羅為末煉蜜和丸如梧桐子大每服三十丸溫酒下不拘時治婦人血風勞氣恍惚煩悶飲食減少日漸羸瘦赤箭丸方赤箭山茱萸枳殼去瓤麩炒防風去叉甘菊花沙參白茯苓去黑皮肉蓯蓉去皴皮酒浸切焙白芍藥熟乾地黃焙鱉甲醋炙去裙襴各一兩半大麻仁五兩上一十二味搗羅為末煉蜜和丸如梧桐子大每服三十丸米飲下不拘時治婦人血風勞瘦琥珀煮散方琥珀研沒藥研木香當歸切焙芍藥白芷羌活去蘆頭芎藭熟乾地黃延胡索各半兩土瓜根桂去粗皮牡丹去心白朮各一兩上一十四味搗羅為散每服二錢匕水一盞煎至七分益酒三分復煎少時並滓熱服治婦人血風勞寒熱進退百骨節痛食少力劣月事不時下紫桂湯方桂去粗皮當歸銼焙枳殼去瓤麩炒赤芍藥芎藭白芷各一兩荊芥穗馬鞭草銼焙各二兩上八味粗搗篩每服三錢匕水一盞煎至七分去滓空心溫服泄痢即加生薑三片同煎服婦人血風走注論曰婦人血風走注者血虛而風邪乘之也風氣善行而數變血得之則與榮衛俱行隨所留止而為病故走注不定也治婦人血風走注皮膚瘙癢或癮胗丹起筋脈肌肉疼痛海桐皮煎方海桐皮酒浸半日炙一兩桂去粗皮半兩附子炮裂去皮臍一兩牛膝酒浸切焙二兩甘草炙一兩大黃銼炒羌活去蘆頭獨活去蘆頭各半兩上八味搗羅為末每次秤三兩先用黑豆一盞生薑半兩切碎水五升同煎至三升絞去滓入前藥末煎如稀餳以瓷合盛每服一匙頭煎當歸酒調下治婦人血風在四肢走注疼痛丹參散方丹參人參苦參各一兩半雷丸牛膝酒浸切焙防風去叉白附子炮白花蛇酒浸一宿去皮骨炙各一兩上八味搗羅為散每服三錢匕煎甘草酒調下治婦人血風毒氣攻注遊走肢體疼痛麝香沒藥散方麝香別研一分沒藥別研半兩敗龜酒炙二兩牡丹皮芍藥骨碎補去毛各一兩騏驎竭研枳殼湯浸去瓤焙各半兩當歸切焙甜瓜子炒各一兩虎骨酒炙二兩自然銅煅醋淬七遍半兩上一十二味除麝香沒藥外搗羅為散和勻每服一錢匕豆淋酒調下日三治婦人血風走注隨所留止疼痛躑躅丸方躑躅花乾蠍炒全者烏頭炮炙去皮臍各半兩地龍陰乾二十條上四味搗羅為末煉蜜丸如小豆大每服五丸至七丸煎荊芥酒下日二治婦人血風榮衛氣澀經脈不調皮膚不澤肢體煩熱頭目昏眩骨節痠疼香桂丸方桂去粗皮芎藭肉豆蔻去殼人參赤茯苓去黑皮附子炮裂去皮臍木香白芷當歸切焙檳榔銼黃耆銼山芋澤瀉京三稜煨銼枳殼去瓤麩炒乾漆炒煙出楮實炒牛膝去苗酒浸切焙牡丹皮陳橘皮湯浸去白炒獨活去蘆頭各半兩防風去叉芍藥吳茱萸湯浸焙乾炒各三分上二十四味搗羅為末煉蜜和搗千百杵丸如梧桐子大每服二十丸溫酒下空心晚食前服治婦人血風走注攻頭目昏眩四肢疼痛皮膚癮疹當歸散方當歸切焙烏頭炮裂去皮臍芍藥延胡索京三稜煨銼蓬莪朮煨銼芎藭各一兩上七味搗羅為散每服二錢匕溫酒調下空心日午臨睡服治婦人血風每至天陰即先頭旋眼睛痛頭目昏躁悶怔忪手足熱疼吃食減少經候不勻有時腹痛或多便利蓬香散方蓬莪朮煨銼京三稜煨銼荊芥穗沉香銼厚朴去粗皮生薑汁炙桂去粗皮烏藥當歸切焙延胡索天麻附子炮裂去皮臍各一兩上一十一味搗羅為末每服二錢匕生薑自然汁少許和溫酒調下日三治婦人血風皮膚癮疹癢痛或有細瘡防風丸方防風去叉蒼耳炒苦參蒺藜子炒各二兩枳殼去瓤麩炒一兩上五味搗羅為末煉蜜丸如梧桐子大每服二十丸溫酒下荊芥茶下亦得不拘時候治血風走注上攻頭目疼痛口苦咽乾或發熱丹皮湯方牡丹皮赤芍藥防風去叉甘菊花各二兩芎藭羌活去蘆頭各一兩半半夏湯洗去滑七遍生薑汁炒甘草炙各一兩上八味粗搗篩每服二錢匕水一盞生薑三片薄荷三葉煎至七分去滓溫服治婦人血風攻注頭目不利不思飲食手足煩熱肢節拘急疼痛胸膈不利大腸不調陰陽相干心下忪悸或時旋運牡丹湯方牡丹皮一兩桂去粗皮半兩陳橘皮湯浸去白焙三兩芎藭一兩延胡索半兩木香三分白朮甘草炙芍藥各三分京三稜煨銼乾薑炮各半兩訶黎勒皮三分半夏湯洗去滑七遍生薑汁炒半