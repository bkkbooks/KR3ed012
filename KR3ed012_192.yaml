body:
  text: 卷第一百九十二奇經八脈論曰脈有奇常十二經者常脈也奇經八脈則不拘於常故謂之奇經蓋言人之氣血常行於十二經脈其諸經滿溢則流入奇經焉奇經有八脈督脈督於後任脈任於前挾任脈者衝脈能為諸脈之海陽維則維絡諸陽陰維則維絡諸陰陰陽更相維持故諸經常調維脈之外又有帶脈者束之猶帶也至於兩足蹺脈有陰有陽陽蹺得諸太陽之別陰蹺本諸少陰之別譬猶聖人圖設溝渠以備水潦斯無濫溢之患人有奇經亦若是也今總集奇經八脈所發者氣穴去處共成一編督脈督脈者起於少腹以下骨中央女子入系廷之端其絡循陰器合篡間繞篡後別繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎與太陽起於目內眥上額交巔上入絡腦還出別下項循肩髆內挾脊抵腰中入循膂絡腎其男子循莖下至篡與女子等其少腹直上者貫臍中央上貫心入喉上頤環唇上系兩目之中此生病從少腹上衝心而痛不得前後為沖疝其女子不孕癃痔遺尿嗌乾治在督脈督脈之別名曰長強挾膂上項散頭上下當肩胛左右別走太陽入貫膂實則脊強虛則頭重取之所別故難經曰督脈起於下極之腧並於脊裡上至風府入屬於腦上巔循額至鼻柱陽脈之海也如為病令人脊強反折督脈從頭循脊骨入骶長四尺五寸凡二十七穴素髎一穴在鼻柱上端水溝一穴一名人中在鼻柱下人中督脈手陽明之交會直唇取之兌端一穴在唇上端齦交一穴在唇內齒上縫督會二脈之會神庭一穴直鼻上入髮際五分督脈足太陽陽明參脈之會上星一穴在神庭後入髮際一寸囟會一穴在上星後一寸前頂一穴在囟會後一寸五分百會一穴一名參陽五會在前頂後一寸五分頂中央旋毛中陷容豆督脈足太陽之交會後頂一穴一名交沖在百會後一寸五分強間一穴一名大羽在後頂後一寸五分腦戶一穴一名匝風一名合顱在枕骨上強間後一寸五分督脈足太陽之會風府一穴一名舌本入頂髮際一寸腦戶後一寸半項大筋內宛宛中啞門一穴在風府後五分入髮際五分入系舌本仰頭取之大椎一穴在第一椎上陷中參陽督脈所發陶道一穴在項大椎節下間督脈足太陽之會俯而取之身柱一穴在第三椎節下間俯而取之神道一穴在第五椎節下間俯而取之靈臺一穴在第六椎下間俯而取之至陽一穴在第七椎下間俯而取之筋縮一穴在第九椎下間俯而取之脊中一穴在第十一椎下間俯而取之禁不可灸令人傴僂懸樞一穴在第十三椎節下間伏而取之命門一穴在第十四椎節下間伏而取之陽關一穴在第十六椎節下間伏而取之腰腧一穴在第二十一椎節下間長強一穴在脊骶端上自素髎至齦交四穴系鼻柱下神庭至百會五穴系額上後頂至啞門五穴屬頂後至項大椎以下一十二穴屬背脊以上為督脈所發二十七穴按內經督脈所發者二十八穴據法第十椎下一穴名中樞陰尾尻骨兩旁二穴名會陽共有二十九穴今多齦交一穴少中樞一穴會陽二穴則系督脈別絡與少陰會故只載二十七穴素髎一穴一名面王在鼻柱之端督脈所發治鼻塞息肉不消多涕生瘡針入一分不宜灸水溝一穴在鼻柱下一名人中督脈手足陽明之會治消渴飲水無度水氣遍身腫失笑無時癲癇語不識尊卑乍喜乍哭牙關不開面腫唇動狀如蟲行猝中惡針入四分留五呼得氣即瀉灸亦得然不及針若灸可小雀糞大為艾炷日可灸三壯或七壯即罷風水面腫針此一穴出水盡即頓愈兌端一穴在唇上端冶癲疾吐沫小便黃舌乾消渴衄血不止唇吻強齒齦痛針入二分可灸三壯炷如大麥齦交一穴在唇內齒上齦縫筋中治面赤心煩痛頸項急不得回顧兼治小兒面瘡久不除點烙亦佳鼻塞不利目淚眵汁內眥赤癢痛生白膚翳鼻中息肉蝕瘡針入三分可灸三壯神庭一穴在鼻直入髮際五分督脈足太陽陽明三脈之會治癲疾風癇戴目上視不識人頭風目眩鼻出清涕不止目淚出驚悸不得安寢可灸三七壯至七七壯止岐伯曰凡欲療風勿令灸多緣風性輕多即傷惟宜灸一壯至三七粒止禁不可針針即發狂上星一穴在鼻直上入髮際一寸陷中督脈氣所發治頭風面虛腫鼻塞不聞香臭目眩痰瘧振寒熱病汗不出目睛痛不能遠視以細三稜針刺之即宣泄諸陽熱氣無令上衝頭目可灸七壯不宜多灸若頻灸即拔氣上令人目不明囟會一穴在上星後一寸陷中可容豆督脈氣所發治目眩面腫鼻塞不聞香臭驚癇戴目上視不識人可灸二七壯至七七壯初灸即不痛病去即痛痛即罷灸若是鼻塞灸至四日漸退七日頓愈針入二分留三呼得氣即瀉頭風生白屑多睡針之彌佳針訖以末鹽生麻油相和揩髮根下頭風即永除若八歲以下即不得針蓋緣囟門未合刺之不幸令人夭前頂一穴在囟會後一寸五分骨陷中督脈所發療頭風目眩面赤腫小兒驚癇風癇瘛瘲發即無時鼻多清涕項腫痛針入一分可灸三壯至七七壯即止百會一穴一名三陽五會在前頂後一寸五分頂中央旋毛中可容豆督脈足太陽交會於巔上治小兒脫肛久不瘥風癇中風角弓反張或多哭言語不擇發即無時盛即吐沫心煩驚悸健忘痎瘧耳鳴耳聾鼻塞不聞香臭針入二分得愈即瀉可灸七壯至七七壯即止唐秦鳴鶴刺微出血頭痛立愈凡灸頭項不過七七壯緣頭頂皮膚淺薄灸不宜多後頂一穴一名交沖在百會後一寸五分枕骨上督脈氣所發治目䀮䀮頸項惡風寒目眩頭偏痛可灸五壯針入二分強間一穴一名大羽在後頂後一寸五分督脈氣所發治腦旋目暈頭痛不可忍煩心嘔吐涎沫發即無時頸項強左右不得回顧可灸七壯針入二分腦戶一穴一名合顱在枕骨上強間後一寸五分督脈足太陽之會禁不可針針之令人啞不能言治目暗痛不能遠視面赤目黃頭腫可灸七壯亦不可妄灸令人失音風府一穴一名舌本在項髮際上一寸大筋內宛宛中疾言其肉立起言休立下督脈陽維之會禁不可灸不幸使人失音治頭痛頸項急不得回顧目眩鼻衄喉咽痛狂走目妄視針入三分啞門一穴一作喑門一名舌橫一名舌厭在項中央入髮際五分宛宛中督脈陽維之會入系舌本仰頭取之禁不可灸灸之令人啞治頸項強舌緩不能言諸陽熱氣盛鼻衄血不止頭痛風汗不出寒熱風痙脊強反折瘛瘲癲疾頭重針入二分大顀一穴一本作椎今從頁作顀余皆仿此在第一顀上陷中手足三陽督脈之會𤻲五勞七傷溫瘧痎瘧氣疰背髆拘急頸項強不得回顧風勞食氣針入五分留三呼瀉五吸若灸以年為壯自大椎下至尾骶骨二十一椎長三尺折量取腧穴凡度周身孔穴遠近分寸以男左女右取中指內紋為一寸素問云同身寸是也又多用繩度量孔穴繩多出縮取穴不準今以薄竹片點量分寸療病準的陶道一穴在大椎節下間俯而取之督脈足太陽之會治頭重目瞑灑淅寒熱脊強汗不出可灸五壯針入五分身柱一穴在第三椎節下間督脈氣所發冶癲疾瘛瘲怒欲殺人身熱狂走譫言見鬼針入五分灸七七壯靈臺一穴在第六椎節下間俯而取之督脈氣所發至陽一穴在第七椎節下間俯而取之督脈氣所發治寒熱解㑊淫濼脛酸四肢重痛少氣難言可灸三壯針入五分筋縮一穴在第九椎節下間俯而取之督脈氣所發治驚癇狂走癲疾脊急強目轉上插可灸三壯針入五分脊中一穴在第十一椎節下間俯而取之督脈氣所發治風癇癲邪溫病積聚下利禁不可灸灸則令人腰背傴僂針入五分得氣即瀉懸樞一穴在第十三椎節下間伏而取之督脈氣所發治積氣上下行水穀不化下利腰脊強不得屈伸腹中留積針入三分可灸三壯命門一穴一名屬纍在第十四椎節下間伏而取之督脈氣所發治頭痛不可忍身熱如火汗不出瘛瘲裡急腰腹相引痛針入五分可灸三壯陽關一穴在第十六椎節下間伏而取之針入五分可灸三壯腰俞一穴一名背解一名腰柱一名腰戶在第二十一椎節下間宛宛中以挺腹舒身兩手相重支額縱四體然後乃取得其穴督脈氣所發治腰髖疼腰脊強不得回轉溫瘧痎瘧針入八分留三呼瀉五吸可灸七壯至七七壯甲乙經云針入二寸留七呼可灸七七壯長強一穴一名氣之陰郤督脈絡別在脊骶端足少陰少陽所結會治腸風下血五種痔疳蝕下部䘌針入三分抽針以大痛為度其穴伏地取之乃得灸亦得然不及針日灸三十壯至二百壯止此痔根本是冷慎冷食房勞甲乙經云針入二寸留七呼任脈任脈者與衝脈皆起於胞中循脊裡為經絡之海其浮而外者循腹上行會於咽喉別而絡唇口血氣盛則肌肉熱血獨盛則滲灌皮膚生毫毛婦人有餘於氣不足於血以其月事數下任沖並傷故也任沖之交脈不營其口唇故髭鬚不生是以任脈為病男子內結七疝女子帶下瘕聚故內經曰任脈起於中極之下以上毛際循腹裡上關元至喉咽上頤循面入目凡此任脈之行從胞中上注目長四尺五寸總二十四穴按內經任脈所發者二十八穴經闕一穴實有二十七穴內齦交一穴屬督脈承泣二穴屬足陰明蹺脈故載二十四穴自會陰至臍中為少腹之分共八穴會陰一穴在大便前小便後名屏翳兩陰間是曲骨一穴一名回骨在橫骨之上陰毛際中動脈應手任脈足厥陰之會中極一穴在臍下四寸一名氣原一名玉泉足三陰之會關元一穴在臍下三寸小腸募謂下紀也三陰任脈之會石門一穴在臍下二寸一名丹田三焦募也女子禁灸氣海一穴一名脖胦一名下肓在臍下一寸五分陰交一穴在臍下一寸神闕一穴在臍中禁不可針若刺使人臍中惡血出上少腹須以身寸度之若膀胱廣者少腹長膀胱狹者少腹短伹自臍中至橫骨有五寸以意度之自臍上至鳩尾為腹中之分共七穴水分一穴在下脘下一寸即臍上一寸下脘一穴亦名幽門在建里下一寸足太陰任脈之會建里一穴在中脘下一寸中脘一穴在臍上四寸胃募三陽任脈之會謂上紀也上脘一穴在巨闕下一寸五分去蔽骨三寸任脈手太陽足陽明之會巨闕一穴在鳩尾下一寸心之募鳩尾一穴在蔽骨之端言其骨垂下如鳩尾形故以為名臆前蔽骨下五分人無蔽骨者從岐骨下行一寸是上腹中七穴自鳩尾至臍中長八寸然胃有大小亦不可拘以身寸但自蔽骨至臍中以八寸度之各依部分取穴自鳩尾上至結喉下陷中為膺俞之分共七穴中庭一穴在膻中下一寸六分膻中一穴一名元兒在玉堂下一寸六分直兩乳間玉堂一穴一名玉英在紫宮下一寸六分紫宮一穴在華蓋下一寸六分華蓋一穴在璇璣下一寸璇璣一穴在天突下一寸陷中天突一穴在頸結喉下四寸宛宛中一名玉戶頤頷二穴廉泉一穴在頷下結喉上舌本下陰維任脈之會仰而取之承漿一穴一名天池在下唇下陷中足陽明之會會陰一穴一名屏翳在兩陰間任脈別絡挾督脈衝脈之會治小便難竅中熱皮痛穀道癢久痔相通者死陰中諸病前後相引痛不得大小便女子經不通男子陰端寒衝心很很可灸三壯曲骨一穴在橫骨之上毛際陷中動應手任脈足厥陰之會治少腹脹滿小便淋澀不通㿗疝少腹痛婦人赤白帶下惡露可灸七壯至七七壯針入二寸中極一穴一名玉泉一名氣原在關元下一寸膀胱之募足三陰任脈之會治五淋小便赤澀失精臍下結如覆杯陽氣虛憊疝瘕水腫賁豚搶心甚則不得息恍惚尸厥婦人斷緒四度針針即有子因産惡露不止月事不調血結成塊針入八分留十呼得氣即瀉可灸百壯至三百壯止關元一穴在臍下三寸小腸之募足太陰少陰厥陰三陰任脈之會下紀者關元也治臍下㽲痛小便赤澀不覺遺瀝小便處痛狀如散火溺血暴疝痛臍下結血狀如覆杯轉胞不得尿婦人帶下瘕聚因産惡露不止月脈斷絶下經冷針入八分留三呼瀉五吸灸亦良可灸百壯至三百壯止石門一穴一名利機一名精露在臍下二寸三焦之募任脈氣所發治腹脹堅硬水腫支滿婦人因産惡露不止遂結成塊經血暴脫灸亦良可灸二七壯至一百壯止婦人不可針針之終身絶子氣海一穴一名脖胦一名下肓在臍下一寸五分任脈氣所發治臍下冷氣上衝心下氣結成塊狀如覆杯小便赤澀婦人月事不調帶下經血暴脫因産惡露不止繞臍㽲痛針入八分得氣即瀉瀉後宜補之可灸百壯氣海者是男子生氣之海也治臟氣虛憊真氣不足一切氣疾久不瘥悉皆灸之陰交一穴一名橫戶在臍下一寸任脈氣所發治臍下㽲痛寒疝引小腹痛膝拘攣腹滿女子月事不絶帶下産後惡露不止繞臍冷痛針入八分得氣即瀉可灸百壯止神闕一穴一名氣合當臍中是也治泄利不止小兒奶利不絶腹大繞臍痛水腫鼓脹腸中鳴如流水聲久冷傷憊可灸百壯禁不可針水分一穴在下脘下一寸臍上一寸任脈氣之所發治腹堅如鼓水腫腸鳴胃虛脹不嗜食繞臍痛沖胸不得息針入八分留三呼瀉五吸若水病灸之大良可灸七壯至百壯止禁不可針針水盡即斃下脘一穴在建里下一寸足太陰任脈之會治腹痛六腑之氣寒谷不轉不嗜食小便赤腹堅硬癖塊臍上厥氣動日漸羸瘦針入八分留三呼瀉五吸灸亦良可灸二七壯至二百壯止建里一穴在中脘下一寸治心下痛不欲食嘔吐上氣腹脹身腫針入五分留十呼可灸五壯中脘一穴一名太倉胃之募也在上脘下一寸手太陽少陽足陽明所生任脈之會上紀者中脘也治心下脹滿傷飽食不化霍亂注泄不自知心痛溫瘧傷寒飲水過多腹脹氣喘因讀書得賁豚氣上攻伏梁心下狀如覆杯寒癖結氣針入八分留七呼瀉五吸疾出針灸亦良可灸二七壯至百壯止上脘一穴在巨闕下一寸當一寸五分去蔽骨三寸任脈足陽明手太陽之會治心中熱煩賁豚氣脹不能食霍亂吐利身熱汗不出三蟲多涎心風驚悸心痛不可忍伏梁氣狀如覆杯針入八分先補後瀉之神驗如風癇熱病宜先瀉後補其疾立愈灸亦良日可灸二七壯至一百壯未愈更倍之巨闕一穴心之募也在鳩尾下一寸人有鳩尾短者少饒分寸任脈氣所發治心中煩滿熱病胸中痰飲腹脹暴痛恍惚不知人息賁時唾血蛔蟲心痛蠱毒霍亂發狂不識人驚悸少氣針入六分留七呼得氣即瀉灸亦良可灸七壯至七七壯止鳩尾一穴一名尾翳一名𩩲骭在臆前蔽骨下五分治心風驚癇發痛不喜聞人語心腹脹胸中滿咳逆數噫喘息喉痹咽壅水漿不下不可灸灸即令人心力不足此穴大難針不然取氣多不幸令人夭針入三分留三呼瀉五吸肥人可倍之中庭一穴在膻中下一寸六分陷中任脈氣所發治胸脅支滿噎塞食飲不下嘔吐食還出可灸五壯針入三分膻中一穴一作亶一名元兒在玉堂下一寸六分直兩乳間陷中仰臥取之任脈氣所發治肺氣咳嗽上喘唾膿不得下食胸中如塞可灸七七壯又療膈氣嘔吐涎沫婦人乳汁少其穴禁不可針不幸令人夭折紫宮一穴在華蓋下一寸六分陷中仰頭取之任脈氣所發治胸膈支滿胸膺骨疼飲食不下嘔逆上氣煩心可灸五壯針入三分華蓋一穴在璇璣下一寸陷中仰頭取之任脈氣所發治胸脅支滿痛引胸中咳逆上氣喘不能言可灸五壯針入三分璇璣一穴在天突下一寸陷中仰頭取之任脈氣所發治胸皮滿痛喉痹咽腫水漿不下可灸五壯針入三分天突一穴在結喉下一寸宛宛中陰維任脈之會針入五分留三呼得氣即瀉治咳嗽上氣胸中氣噎喉中狀如水雞聲肺壅咯唾膿血咽乾舌下急喉中生瘡不得下食灸亦得然不及針下針須直下不得低手即傷五臟氣廉泉一穴一名舌本在頷下結喉上陰維任脈之會治舌下腫難言舌縱涎出咳嗽上氣喘息嘔沫口噤舌根急縮食難可灸三壯針入三分得氣即瀉承漿一穴一名垂漿在頤前唇下宛宛中足陽明任脈之會𤻲偏風口喎面腫消渴口齒疳蝕生瘡灸亦佳日可灸七壯至七七壯止灸即血脈通宣其風應時立愈其艾炷不用大一依小竹箸頭作炷脈粗細狀如細線艾炷破肉但令當脈灸亦能愈疾凡灸臍下久冷疝瘕痃癖氣塊伏梁積氣宜艾炷大故小品諸方云腹背宜灸五百壯四肢則但去風邪不宜多灸七壯至七七壯止不得過隨年數如巨闕鳩尾雖是胸腹之穴灸不過七七壯艾炷不須大以竹箸頭作炷正當脈上灸之若灸胸腹艾炷大灸多令人永無心力如頭頂穴若灸多令人失精神臂腳穴灸多令人血脈枯竭四肢細瘦無力既失精神又加細瘦即脫真氣針入三分得氣即瀉陽蹺脈陽蹺脈者起於跟中循外踝上行入風池其為病也令人陰緩而陽急兩足蹺脈本少陰之別合於太陽其氣上行氣並相還則為濡目氣不營則目不合男子數其陽女子數其陰當數者為經不當數者為絡也蹺脈長八尺所發之穴生於申脈在外踝下陷中屬足太陽經以付陽為郤在外踝上三寸本於僕參在跟骨下陷中與足少陽會於居髎在章門下八寸三分又與手陽明會於肩髃及巨骨肩髃在肩端兩骨間巨骨在肩端兩叉間又與手足太陽陽維會於臑俞在肩髎後甲骨上廉與手足陽明會於地倉口吻兩旁又與手足陽明會於巨窖鼻兩旁也又與任脈足陽明會於承泣目下也以上為陽蹺脈之所發凡二十穴陽蹺脈病者宜刺之陰蹺脈陰蹺者亦起於跟中循內踝上行至咽喉交貫衝脈此為病者令人陽緩而陰急故曰蹺脈者少陰之別別於然骨之後上內踝之上直上循陰股入陰上循胸裡入缺盆上出人迎之前入頄屬目內眥合於太陽女子以之為經男子以之為絡兩足蹺脈長八尺而陰蹺之郤在交信內踝上二寸少陰前太陰後凡陰蹺脈病治在交信衝脈衝脈者與任脈皆起於胞中上循脊裡為經絡之海其浮而外者循腹上行會於咽喉別而絡唇口故曰衝脈者起於氣衝並少陰之經挾臍上行至胸中而散此為病令人逆氣裡急在難經則曰並足陽明之經以穴考之陽明之經挾臍左右各二寸而上行少陰之經挾臍左右各五分而上針經所載衝脈與督脈同起於會陰二陰之間也其在腹也行乎幽門通谷陰都石關商曲盲俞中注四滿氣穴大赫橫骨凡二十二穴皆足少陰之分也然則衝脈並足少陰之經明矣陽維脈陽維維於陽其脈起於諸陽之會與陰維皆維絡於身溢蓄不能環流溉灌諸經者也若不能相維故為病則悵然失志溶溶不能自收持其脈氣所發別於金門在足外踝下太陽之隙以陽交為郤在外踝上七寸與手足太陽及蹺脈會於臑俞挾肩髎後胛上廉陷中與手足少陽會於天窖在缺盆中上毖骨際又會於肩井肩上岐骨端其在頭也與足少陽會於陽白在眉上一寸直瞳子上於本神及臨泣臨泣當直上入髮際五分本神在曲差旁一寸五分上至正營目窗後一寸循於腦空在正營後四寸五分下至風池在顳顬後髮際陷中其與督脈會則在風府及喑門風府在腦戶後一寸五分項後宛宛中喑門在風府後五分入髮際五分凡此陽維脈氣所發二十四穴也陰維脈陰維者亦維絡於身溢蓄不能環流灌溉諸經者也陰維則維於陰其脈起於諸陰之交其病與陽維同其脈氣所發者陰維之郤名曰築賓在足內踝上腨分中與足太陰會於腹哀及大橫腹哀在日月下一寸五分大橫在腹哀下一寸五分又與足太陰厥陰會於府舍及期門府舍在腹結下三寸期門在不容旁一寸五分與任脈會於天突及廉泉天突在結喉下宛宛中廉泉在舌本下凡此陰維脈氣所發共十一穴帶脈帶脈者起於季脅回身一周其為病也腰腹縱容如囊水之狀其脈氣所發在季脅下一寸八分正名帶脈謂其回身一周如帶也又與足少陽會於維道在章門下五寸三分凡此帶脈所發共四穴也九針統論論曰凡刺之要官針最妙九針之為各有所宜長短小大各有所施不得其用病弗能移疾淺針深內傷良肉皮膚為癰病深針淺病氣不瀉反為大膿病小針大瀉氣太甚必為後害病大針小大氣不瀉後亦為敗欲知九針之宜者一曰鑱針法天謂五臟之應天者肺也肺與皮毛合為之治針必大其頭而鋭其末令無得深入而陽氣泄故鑱針者取法於布針去末半寸猝鋭之長一寸六分以治熱在頭身也經曰病在皮膚無常處者取以鑱針二曰員針法地謂人之所以應土者肉也為之治針必筒其身而員其末令無得傷肉傷則氣竭故員針者取法於絮針筒其身而卵其鋒長一寸六分治肉分間氣經曰病在分肉間取以員針三曰匙針法人謂人之所以生成者血脈也為之治針必大其身而員其末令可以接脈勿陷以致其氣令邪氣獨出故匙針者取法於黍粟之鋭長三寸半以接脈取氣令邪出經曰病在脈氣小當補之者取以匙針四曰鋒針法時謂四時八風之客於經絡中為痼疾者也為之治針必筒其身而鋒其末令可以瀉熱出血發痼故鋒針者取法於絮針筒身鋒末長一寸六分治癰熱出血經曰病在經絡為痼痹者取以鋒針五曰鈹針法音謂冬夏之分分於子午陰與陽別寒與熱爭兩氣相合為癰膿者也為之治針必令其末如劍鋒可以取大膿故鈹針者取法於劍鋒廣二分半長四寸治大膿兩熱爭者經曰病有大膿者取以鈹針六曰員利針法律謂調陰陽四時而合十二經脈虛邪客於經脈而為暴痹者也故員利針者取法於釐針微大其末反小其身令可深內長一寸六分以取癰痹經曰病痹氣暴發者取以員利針七曰毫針法星謂人之七竅邪客於經而為痛痹舍於經絡者也為之治針令尖如蚊虻喙靜以徐往微以久留正氣因之真邪俱往出針而養故毫針者取法於毫毛長一寸六分治寒熱痛痹在經絡經曰病痹氣痛而不去者取以毫針入曰長針法風謂人之股肱八節也八正之虛風傷人內舍於骨解腰脊節腠理之間而為深痹者故長針者取法於綦針長七寸以取深邪遠痹經曰病在中者取以長針九曰大針法野謂人之節解皮膚間淫邪流溢於身如風水之狀而溜不能過於機關大節者為之治針令尖如梃其鋒微員以取大氣之不能過於關節者故大針者取法於鋒針其鋒微員長四寸以取大氣不出關節者經曰病為水腫不能過關節者取以大針諸病在五臟固居者取以鋒針瀉於井滎分輸取以四時此九針之數也刺節統論論曰刺有九變十二節九變者一曰輸刺謂刺諸經滎輸臟俞也二曰遠道刺謂病在上取之下刺腑俞也三曰經刺謂刺大經之結絡經分也四曰絡刺謂刺小絡之血脈也五曰分刺謂刺分肉之間也六曰大瀉刺謂刺大膿以鈹針也七曰毛刺謂刺浮痹皮膚也八曰巨刺謂左取右右取左也九曰淬刺謂燔針取痹也十二節者一曰偶刺以手直心若背直痛所一刺前一刺後以治心痹刺此者旁針之也二曰報刺刺痛無常處也上下行者直內無拔針以左手隨病所按之乃出針復刺之也三曰恢刺直刺傍之舉之前後恢筋急以治筋痹四曰齊刺直入一傍入二以治寒氣小深者或曰三刺治痹氣小深者也五曰揚刺正內一傍內四而浮之以治寒氣之博大者也六曰直針刺引皮乃刺之以治寒氣之淺者也七曰輸刺直入直出稀髮針而深之以治氣盛而熱者也八曰短刺以刺骨痹稍搖而深之致針骨所以上下摩骨也九曰浮刺傍入而浮之以治肌急而寒者也十曰陰刺左右率刺之以治寒厥取足踝後少陰也十一曰傍針刺直刺傍刺各一以治留痹久居者也十二曰贊刺直入直出數髮針而淺之出血是謂治癰腫也脈所居深不見者刺之微內針而久留之以致其空脈氣脈淺者勿刺按絶其脈乃刺之無令精出獨出其邪氣爾所謂三刺則穀氣出者先淺刺絶皮以出陽邪再刺則陰邪出者少益深絶皮至肌肉未入分肉間已入分肉間則穀氣出故刺法曰始刺淺之以逐邪氣而來血氣復刺深之以致陰氣之邪最後刺極深之以下穀氣也三刺之外又有五刺之法以應五臟一曰半刺淺內而疾髮針無針傷肉如拔毛狀以取皮氣此肺之應也二曰豹紋刺左右前後針之中脈為故以取經絡之血此心之應也三曰關刺直刺左右盡筋上以取筋痹慎無出血此肝之應也或曰淵刺一曰豈刺四曰合谷刺左右雞足針於分肉之間以取飢痹此脾之應也五曰輸刺直入直出深內之至骨以取骨痹此腎之應也既別刺法當順四時春夏秋冬各有所刺春氣在經脈宜取絡脈分肉所謂春刺散俞及與分理血出而止是也夏氣在孫絡宜取盛經分腠所謂夏刺絡俞見血而止是也秋氣在皮膚宜取經俞所謂秋刺皮膚循理神變而止是也冬氣在骨髓宜取井滎所謂冬刺俞竅於分理是也至於長夏氣在肌肉刺亦有分是乃淺深之分也又有春刺井夏刺滎長夏刺俞秋刺經冬刺合者是亦四時之分在穴腧也陰井木陽井金播五行於四時以此為宜苟非其部分而刺之皆病之招也審此數者然後用刺庶乎適當無或失矣灸刺統論論曰內經謂形樂志苦病生於血脈其治宜灸刺特用針灸之大略然九針本從南方來灸焫本從北方來謂南北者盛寒盛暑之域也人之血氣寒則脈凝泣熱則血淖澤皆為血脈之病故其治以灸刺為宜用刺之節已具在前用灸之理凡以溫之而已若病有因寒而得或陰證多寒或是風寒濕痹腳氣之病或是上實下虛厥逆之疾與夫勞傷癰疽及婦人血氣嬰孺疳疾之屬並可用灸亦有不可灸者近髓之穴陽證之病不可灸也凡用灸焫自有補瀉以火補者無吹其火須其自滅以火瀉者急吹其火而令其滅此灸之補瀉也在用灸者以意消息治五臟中風並一切風疾灸刺法肺中風者其人偃臥而胸滿短氣冒悶汗出視目下鼻上兩邊下至口色白者尚可治急灸肺俞百壯肝中風者其人但踞坐不得低頭繞兩目連額上色微青及唇青面黃者尚可治急灸肝俞百壯心中風者其人但得偃臥不得傾側悶亂冒絶汗出若唇正赤尚可治急灸心俞百壯脾中風者其人但踞坐而腹滿身通黃吐咸汁出者尚可治急灸脾俞百壯腎中風者其人踞坐而腰痛視脅左右未有黃色如餅粢大者尚可治急灸腎俞百壯大腸中風者臥而腸鳴不止灸大腸俞百壯猝中惡風心悶煩毒欲死急灸足大趾下橫紋隨年壯筋急不能行者內踝筋急灸內踝上四十壯外踝筋急灸外踝上三十壯若眼戴睛上視灸目兩眥後二七壯若不能語灸第三椎上百壯若不識人灸季肋頭七壯若眼反口噤腹中切痛灸陰囊下第一橫紋十四壯諸風發動不自覺知或心腹脹滿或半身不遂或口噤不言涎唾自出目閉耳聾或舉身冷直或煩悶恍惚喜怒無常或唇青口白戴眼角弓反張始覺發動即灸神庭一處七壯穴在當鼻直上髮際次灸曲差二處各一壯穴在神庭兩旁各一寸半次灸上關二處各七壯一名客主人穴在耳前起骨上廉陷中次灸下關二處各七壯穴在耳前下廉動脈陷中次灸頰車二穴各七壯穴在曲頰陷中次灸囟會一處七壯穴在神庭上二寸次灸百會一處七壯穴在當頂上正中央次灸本神二處各七壯穴在耳正直上入髮際二分又作四分次灸天柱二處各七壯穴在項後兩大筋外入髮際陷中次灸陶道一處七壯穴在大椎節下間次灸風門二處各七壯穴在第二椎下兩旁各一寸半次灸心俞二處各七壯穴在第五椎下兩旁各一寸半次灸肝俞二處各七壯穴在第九椎下兩旁各一寸半次灸腎俞二處各七壯穴在第十四椎下兩旁各一寸半次灸膀胱俞二處各七壯穴在第十九椎下兩旁各一寸半次灸曲池二處各七壯穴在兩肘外曲頭陷中屈肘取之次灸肩髃二處各七壯穴在兩肩頭正中兩骨間陷中次灸支溝二處各七壯穴在手腕後臂外三寸兩骨間次灸合谷二處各七壯穴在手大指虎口兩骨間陷中次灸間使二處各七壯穴在掌後三寸兩筋間次灸陽陵泉二處各七壯穴在膝下外尖骨前陷中次灸陽輔二處各七壯穴在外踝上絶骨端陷中次灸崑崙二處各七壯穴在外踝後跟骨上陷中次灸上星二百壯次灸前頂二百四十壯次灸腦戶三百壯次灸風府三百壯風耳鳴並百種風疾從耳後量八分半里許有孔灸又兩耳門前後各灸百壯猝病惡風欲死不能語及肉痹不知人灸第五椎名曰臟俞百五十壯心風腹脹滿食不消化吐血酸削四肢嬴露不欲食飲鼻衄目眴䀮䀮不明肩頭脅下痛小腹急灸心俞二百壯穴在第五節一云第七節對心橫三寸間風腹中雷鳴腸澼泄利食不消化小腹㽲痛腰脊疼強或大小便難不能飲食灸大腸俞百壯穴在第十六椎兩邊相去一寸半三日一報一切風灸腋門穴在腋下攢毛中一寸一名腋間灸五十壯風身重心煩足脛疼灸絶骨百壯穴在外踝上三寸肝風口不能言灸鼻下人中次灸大椎各隨年壯次灸肝俞五十壯眼暗灸之得明脾風聲不出灸手十指頭次灸人中次灸大椎次灸兩耳門前脈去耳門上下行一寸次灸兩大指節上下各七壯偏風宜針下項七處灸亦得風池肩髃曲池支溝五樞陽陵泉巨虛下廉風腰腳不遂不能跪起針上髎環跳陽陵泉巨虛下廉穴偏風不得挽弓針肩髃一穴風猥退半身不遂失音不語者灸百會隨年壯猝中風口噤不開灸機關二穴千金翼名頰車中風失音不能言緩縱不遂灸天窗五十壯風入臟使人喑啞猝口眼相引牙車急舌不轉喎僻者灸吻邊橫紋赤白際逐左右隨年壯報之至三日不瘥更報之猝中風口喎者取葦筒長五寸以一頭刺耳孔中四畔以面塞之勿令泄氣一頭納大豆一顆並艾燒之令燃七壯即瘥患右灸左患左灸右耳病亦灸之風眩心中恍惚不定以繩橫度口至兩邊既得口寸數便以其繩一頭度鼻盡其兩邊兩孔間得鼻寸數中屈之取半合於口之全度中屈之先覓頭上回發當回發灸之以度度四邊左右前後當繩端灸之前以面為正並依年壯多少一年凡三灸皆須瘡瘥又灸壯數如前若數處回發則灸其近當鼻者或回發近額亦宜灸中風眼上戴及不能語者灸第二椎並第五椎上各二七壯若猝中風灸兩足大趾下橫紋中五壯熱風灸兩乳頭各一七壯兼灸足外踝後一寸各三壯未損灸頂中旋毛一七壯頭風灸後頂穴穴在百會後一寸五分強間穴前一寸五分灸五壯兼治癲疾並搖頭口喎者風瘙身體癮疹灸曲池二穴甲乙經云穴在肘外輔骨屈肘曲骨之中手陽明脈之所入也各灸三壯風癮疹舉體癢如蟲行搔之成瘡宜灸曲池二穴隨年壯風猥退腳不遂灸巨靈上廉二穴在三里下三寸各灸三壯甲乙經云足陽明與大腸合在三里下三寸風口喎灸列缺二穴甲乙經云手太陰絡去腕上一寸五分別走陽明者灸三壯患左灸右患右灸左大風惡疾灸兩足虎口中各三壯又法灸膈俞二穴在第七椎下兩旁各一寸五分灸五壯主周身痹大風風失音不語灸合谷穴一名虎口在手大指次指兩骨間甲乙經云手陽明之所過也各灸三壯風十指筋攣不得屈伸灸兩手踝骨上各一七壯風癲灸兩乳頭各三壯次灸足大趾甲後聚毛中各七壯中風狂走欲斫刺入或欲自殺罵詈不息者灸兩口吻頭赤肉際各一壯又灸兩肘屈中五壯又灸背胛中間三壯三日報各三壯又云灸陰囊下縫三十壯中風口喎僻灸口吻口橫紋間覺火熱便去艾即愈勿盡艾盡艾則太過若口左僻灸右吻右僻灸左吻又灸手中指節上一炷中風眼上睛垂灸目兩眥後三壯中風不識人灸季脅頭各七壯中風眼反口噤腹中切痛灸陰囊下第一橫紋十四壯猝中急風悶亂欲死灸兩足大趾下橫紋中隨年壯風急不得行內筋急者灸內踝外筋急者灸外踝各二十壯風毒腳弱痹滿上氣先灸大椎穴在項上大節高起者灸其上面一穴若上氣可先灸百會五十壯穴在頭頂凹中次灸肩井各一百壯穴在兩肩上近頭凹處指捏之安令正得中穴次灸膻中五十壯穴在胸前兩邊對乳胸厭骨解間指按覺氣吸吸是也一云正胸中一穴次灸巨闕在心厭尖凹下一寸灸以上五穴亦足以順其氣若能灸百會風府胃腕及五臟俞益佳次灸風市百壯在兩髀外平倚垂手直掩髀上當中指頭大筋上捏之是穴次灸三里二百壯以病人手橫掩下並四指名曰一夫指至膝頭骨下指中節是穴次灸上林一百壯穴在三里下一夫次灸下林一百壯穴在上林下一夫次灸絶骨二百壯在外踝上三寸余指端取踝骨上際屈頭小凹下是白癜風灸左右手中指節去延外宛中三壯未瘥報之治風狂灸刺法先以針五枚納頭髻中以器盛水新布覆之橫大口於上乃矜莊呼視其人其人必欲起走慎勿聽因取水一噴之一呵視三次乃熱拭去水指彈額上近髮際問欲愈乎其人必不肯答如此二七彈乃答因仗針刺鼻下人中近孔內側空停針兩耳根前宛宛動中停針又刺鼻直上入髮際一寸橫針又刺鼻直上醒悟乃止猝狂鬼語針其足大拇趾爪甲下入少許即止狂走易罵灸八分隨年壯穴在陽明下五分狂癲驚走風恍惚嗔喜罵笑歌哭鬼語悉灸腦戶風池手陽明太陽太陰足陽明陽蹺少陽太陰陰蹺足跟皆隨年壯驚怖心忪少力灸大橫五十壯狂風罵詈撾斫人名為熱陽風灸口兩吻邊燕口處赤白際各一壯又灸陰囊縫三十壯仍勿近前中卵核恐害陽氣也狂走刺人或欲自死罵詈不息稱神鬼語灸口吻頭赤白際一壯又灸兩肘內屈中五壯又灸背甲中間三壯報灸之猝狂言鬼語以甑帶急合縛兩手大指便灸左右脅下對屈肋頭兩處火俱起各七壯須臾鬼自道姓名乞去徐徐問之乃解其手邪鬼妄語灸垂命下四壯穴在口唇里中央弦弦者是也一名鬼祿又用剛刀決斷絃弦乃佳邪病大喚罵詈走灸十指端去爪一分一名鬼城邪病鬼癲四肢重囟上主之一名鬼門邪病大喚罵走遠三里主之一名鬼邪邪病四肢重痛諸候尺澤主之一名鬼受邪病語不止及諸候人中主之一名鬼廳狂癇不識人癲病眩亂灸百會九壯狂走掣瘲灸玉枕上三寸一法頂後一寸灸百壯狂走癲疾灸頂後二寸十二壯狂邪鬼語灸天窗九壯狂癇哭泣灸手逆注三十壯穴在左右手腕後六寸狂走驚癇灸河口五十壯穴在腕後陷中動脈是狂癲風癇吐舌灸胃脘百壯狂走癲疾灸大幽百壯狂走癲癇灸季肋端三十壯狂言恍惚灸天樞百壯狂邪發無常灸間使三十壯穴在腕後五寸臂上兩骨間亦灸驚恐歌哭狂走悲泣灸臣覺一作臣攬隨年壯穴在背上胛內側反手所不及者骨芒穴上捻之痛者是狂邪鬼語灸伏兔百壯悲泣鬼語灸天府五十壯悲泣邪語鬼忙歌哭灸慈門五十壯狂邪驚癇病灸承命三十壯穴在內踝後上行三寸動脈上亦灸驚狂走狂癲風驚厥逆心煩灸巨陽五十壯狂癲鬼語灸足太陽四十壯狂走驚恍惚灸足陽明三十壯狂癲癇疾灸足少陽隨年壯狂走癲厥如死人灸足大趾三毛中五壯翼云灸大敦風邪灸間使隨年壯又灸承漿七壯治風癲灸刺法論曰黃帝問曰人生而病癲疾者安所得之岐伯對曰此得之在母腹中時其母有所大驚也氣上而不下精氣並居故令子發為癲疾病在諸陽脈且寒且熱諸分且寒且熱名曰狂刺之虛脈視分盡熱病已止病癲初發歲一發不治月一發不治四五日一發名曰癲疾刺諸分其脈尤寒者以針補之病已止癲疾始生先不樂頭重痛直視舉目赤甚作極已而煩心候之於顏取手太陽陽明太陰血變而止癲疾始發先反僵因而脊痛候之足太陽陽明太陰手太陽血變而止癲疾始作而引口啼呼甲乙作喘悸者候之手陽明太陽右強者攻其左左強者攻其右血變而止治癲疾者常與之居察其所當取之處病至視其有過者即瀉之置其血於瓠壺之中至其發時血獨動矣不動灸窮骨二十壯窮骨者尾骶也筋癲疾者身卷攣急脈大刺項大經之大杼嘔多涎沫氣下泄不治脈癲疾者暴僕四肢脈皆脹而縱脈滿盡刺之出血不滿挾項灸太陽又灸帶脈於腰相去三寸諸分肉本腧嘔多涎沫氣下泄不治猝癲疾灸兩乳頭三壯又灸足大趾本叢毛中七壯灸足小趾本節七壯大人癲小兒驚癇灸背第二椎及下窮骨兩處以繩度中折繩端一處是脊骨上也凡三處畢復斷繩作三折令各等而參合如某字樣以一角注中央灸下二角挾脊兩邊凡五處各百壯削竹皮為度勝於繩又灸足大趾上聚毛中七壯又灸囊下縫二七壯又灸兩乳頭三壯又灸督脈三十壯三報穴在直鼻中上入髮際又灸天窗百會各漸至三百壯炷惟小作又灸耳上髮際各五十壯治痹灸刺法骨痹舉節不用而痛汗注煩心取三陰之經補之風痹者厥氣上攻腹取陽之絡視主病者瀉陽補陰經也痹會陰及太淵消濼照海主之骨痹煩滿商丘主之足下熱脛疼不能久立濕痹不能行三陰交主之足大趾搏傷下車挃地通臂指端傷為筋痹解溪主之痹脛重足跗不收跟痛巨虛下廉主之脛疼足緩失履濕痹足下熱不能久立條口主之膝寒痹不仁痿不屈伸髀關主之膚痛痿痹外丘主之膝外廉痛不可屈伸脛痹不仁陽關主之髀痹引膝股外廉痛不仁筋急陽陵泉主之寒氣在分肉間痛上下痹不仁中瀆主之腰脅相引痛急髀筋瘛脛痛不可屈伸痹不仁環跳主之風痹從足小趾起脈痹上下帶胸脅痛無常處至陰主之治熱病灸刺法黃帝治熱之穴五十九腧頭上五行行五謂督脈所過者上星囟會前頂百會後頂共五穴為一行兩旁各一行謂五處承光通天絡卻玉枕各二共十穴又次兩旁各一行謂臨泣目窗正營承靈腦空等各二共十穴凡二十五穴以越諸陽之熱逆也大柱膺腧缺盆背腧此八者以瀉胸中之熱也大柱屬足太陽膺腧即中府屬手太陰缺盆在肩上屬手陽明背腧即風門熱府屬足太陽氣街三里巨虛上下廉此八者以瀉胃中之熱也八穴並屬足陽明經雲門髃骨委中髓空此八者以瀉四肢之熱也雲門系手太陰髀骨即肩𩪰系手陽明蹺脈之會委中在膕中央系足太陽髓空即腰俞系督脈五臟俞旁五此十者以瀉五臟之熱也謂魄戶神堂魂門意舍志室等各二系足太陽經也右五十九穴者皆熱之左右也故熱病則刺之又有刺熱之法肝熱則刺足厥陰少陽心熱則刺手少陰太陽脾熱則刺足太陰陽明肺熱則刺手太陰陽明腎熱則刺足少陰太陽凡熱病未發但見赤色來皆熱診也在顏為心熱在頤為腎熱在鼻為脾熱在左頰為肝熱在右頰為肺熱見赤當急色刺之審其井滎經俞補之分在則陰陽瀉陰在陽則補陰瀉陽刺熱之大法也熱穴之外別有遺法者備載於後熱病汗不出上星主之先取譩嘻後取天牖風池熱病汗不出而苦嘔煩心承光主之熱病汗不出天柱及風池商陽關衝液門主之傷寒熱盛煩嘔大椎主之身熱頭痛進退往來神道主之熱病汗不出上髓孔最主之千金云臂厥熱病汗不出皆灸刺之此穴可以出汗熱病頭痛引目外眥而急煩滿汗不出引頷齒面赤皮痛懸顱主之熱病偏頭痛引目外眥懸釐主之熱病胸中淡淡腹滿暴痛恍惚不知人手清少腹滿瘛瘲心痞滿不得息巨闕主之熱病煩心心悶而汗不出掌中熱心痛身熱如火浸淫煩滿舌本痛中衝主之熱病發熱滿而欲嘔噦三日以往不得汗怵惕胸脅痛不可反側咳滿溺赤大便血衄不止嘔吐血氣逆噫不止嗌中痛食不下善渴口中爛掌中熱勞宮主之熱病煩心善噦胸中淡淡善動間使主之傷寒寒熱頭痛噦衄肩不舉溫留主之傷寒餘熱不盡曲池主之熱病汗不出脅痛不得息頸頷腫寒熱耳鳴聾無所聞陽谷主之熱病滿悶不得臥太白主之千金云不得臥身重骨痛熱中少氣厥寒灸之熱去熱病汗不出善噫腹脹滿胃熱譫言解溪主之初得病或先頭痛身寒熱或澀澀欲守火或腰背強直面目如飲酒狀此傷寒初得一二日但灸心下三處第一處去心下一寸名巨闕第二處去心下二寸名上脘第三處去心下三寸名胃脘各灸五十壯然或人形大小不同恐寸數有異可繩度隨其長短寸數最佳取繩從心頭骨名鳩尾頭度取臍孔中屈繩取半當繩頭名胃脘又中屈半繩更分為二分從胃脘向上度一分即是上脘又上度取一分即是巨闕大人可灸五十壯小兒三壯亦隨年灸之大小以意斟量若病者三四日以上宜先灸胸上二十壯以繩度鼻正上盡髮際中屈繩斷去半便從髮際入發中灸繩頭又灸兩顳顬又灸兩風池又灸肝俞百壯余處各二十壯又灸太衝三十壯凡溫病可針刺五十九穴又身之穴三百六十有五其三十六穴灸之有害七十九穴刺之為災治寒熱灸法先灸項大椎以年為壯數次灸撅骨足窮骨也以年為壯數視背臉陷者灸之舉臂肩上陷者灸之𩩲髃穴也兩季脅之間灸之章門穴也外踝上絶骨之端灸之陽輔穴也足小趾次趾間灸之俠溪穴也腨下陷脈灸之承筋穴也外踝後灸之崑崙穴也缺盆骨上切之堅痛如筋者灸之經闕其名膺中陷骨間灸之天突穴也掌束骨下灸之陽池穴也臍下三寸灸之關元穴也毛際動脈灸之氣街穴也膝下三寸分間灸之三里穴也足陽明跗上動脈灸之衝陽穴也巔上一灸之百會穴也治瘧疾灸刺法足太陽瘧令人腰痛頭重寒從背起先寒後熱熱止汗出難已刺隙中出血足少陽瘧令人身體解㑊寒不甚熱不甚惡見人見人心惕惕然熱多汗刺足少陽足陽明瘧令人先寒灑淅寒甚久乃熱熱去汗出喜見日光火氣乃快然刺足陽明腳趺上足太陰瘧令人不樂好太息不嗜食多寒熱汗出病至則嘔嘔已乃衰即取之足少陰瘧令人吐嘔甚又寒熱熱多寒少欲閉戶而處其病難已足厥陰瘧令人腰痛少腹滿小便不利如癃狀非癃也數小便意恐懼氣不足腹中悒悒刺足厥陰諸瘧而脈不見者刺十指間出血血去必已先視身之赤如小豆者盡取之肝瘧刺足厥陰見血心瘧刺手少陰脾瘧刺足太陰肺瘧刺手太陰陽明腎瘧刺足少陰太陽胃瘧刺足太陰陽明橫脈出血尺澤二穴主五臟瘧穴在肘中約上動脈中甲乙經云手太陰之所入也各灸三壯炷如半棗核大發時灸凡灸瘧者必先問其病之所先發者先灸之從頭項發者於未發前預灸大椎尖頭漸灸過時止從腰脊發者灸腎俞百壯從手臂發者灸三間又灸上星及大椎至發時令滿百壯灸艾炷如黍米粒若覺小異即灸百會七壯若後更發又七壯極難愈者不過三灸以足踏地以線圍足一匝中折從大椎向百會灸線頭三七壯炷如小豆又灸風池二穴三壯又正仰臥以線量兩乳間中屈從乳向下灸度頭隨年壯男左女右痎瘧上星主之穴在鼻中央直髮際一寸陷容豆是也灸七壯先取譩嘻後取天牖風池瘧日西而發者臨泣主之穴在目眥上入髮際五分陷者灸七壯瘧實則腰背痛虛則鼽衄飛陽主之穴在外踝上七寸灸七壯瘧多汗腰痛不能俯仰目如脫項如拔崑崙主之穴在另外踝後跟骨上陷中灸三壯又大開口度上下唇以繩度心頭灸此度下頭百壯又灸脊中央五十壯過發時灸二十壯治霍亂灸法上脘一穴主霍亂甲乙經曰在巨闕下一寸五分去蔽骨下三寸任脈足陽明手太陽之會灸五壯炷如半棗核大霍亂心先痛及先吐者灸巨闕七壯穴在心下一寸不效更灸如前數霍亂先腹痛者灸太倉二七壯穴在心厭下四寸臍上一夫不止更灸如前數霍亂先下利者灸谷門二七壯穴在臍旁二寸男左女右一名大腸募不瘥更灸如前數霍亂吐下不禁兩手陰陽脈俱疾數者灸心蔽骨下三寸又灸臍下三寸各六七十壯霍亂下不吐者灸大都七壯穴在足大趾本節後內側白肉際霍亂下利煩悶欲死者灸慈宮二七壯穴在橫骨兩邊各二寸半橫骨在臍下橫門骨是霍亂乾嘔灸間使各七壯在手腕後三寸兩節間不瘥更灸如前數霍亂吐則灸兩乳連黑外近腹白肉際各七壯亦可至二七壯霍亂若吐止而利不止者灸臍約中一夫七壯又云臍下一寸二七壯霍亂手足逆冷灸三陰交各七壯不愈加壯數穴在內踝尖上三寸霍亂若啘者灸手腕第一約紋中七壯名心主當中指霍亂煩悶灸心厭下三寸七壯又以鹽納臍中鹽上灸二七壯霍亂繞臍痛急灸臍下三寸三七壯名關元霍亂欲死者以物橫度病人人中屈之從心鳩尾度以下灸先灸中央畢更橫灸左右又灸脊上以物圍令正當心厭又夾脊左右一寸各七壯霍亂危困諸治不瘥者捧病人腹臥之伸臂相對以繩度兩頭肘尖依繩下夾背脊大骨肉中去脊各一寸灸之百壯未愈者可灸肘椎灸畢即起治轉筋灸法轉筋脛骨痛不可忍灸屈膝下廉橫筋上三壯腹脹轉筋灸臍上一寸二七壯腰骨不便轉筋急痹筋攣灸第二十一椎隨年壯轉筋十指筋攣急不得屈伸灸腳外踝骨上七壯僕參二穴主轉筋急甲乙經云一名安耶在跟骨下陷者中拱足得之太陽陽蹺脈所發各灸七壯炷如半棗核大轉筋在兩臂及胸中者灸手掌白肉際七壯又灸膻中中府巨闕胃腕尺澤走哺轉筋灸踵踝白肉際各三七壯又灸小腹下橫骨中央隨年壯轉筋四厥灸兩乳根黑白際各一壯轉筋灸湧泉六七壯在足心下當拇趾大筋又灸足大趾下約中一壯轉筋不止灸足踵聚筋上白肉際七壯立愈轉筋入腹痛欲死四人持手足灸臍上一寸十四壯自不動勿復持之又灸股里大筋去陰一寸霍亂轉筋灸蹶心當拇趾大聚筋上六七壯名湧泉又灸足大趾下約中一壯又灸大趾爪甲際七壯治心腹灸刺法心痛短氣手掌煩熱或啼笑罵詈悲思愁慮面赤身熱其脈實大而數此為可治春當刺中衝夏刺勞宮季夏刺大陵皆補之秋刺間使冬刺曲澤皆瀉之此是手心主包絡經也又當灸巨闕五十壯背第五椎百壯腎心痛先取京骨崑崙針不已取然谷胃心痛取大都太白脾心痛取然谷太溪肝心痛取行間太衝肺心痛取魚際太淵心痛引腰脊欲嘔刺足少陰心痛引背不得息刺足少陰不已取手少陰心痛腹脹澀澀然大便不利取足太陰心痛少腹滿上下無常處溲便難刺足厥陰心痛短氣不足以息刺手太陰心痛不可按煩心巨闕主之心痛有三蟲多涎不得反側上脘主之心痛身寒難以俯仰心疝沖冒死不知人中脘主之心腹中猝痛石門主之心疝暴痛取足太陰心懊憹微痛煩逆灸心俞百壯心痛如錐刀刺氣結灸膈俞七壯心痛冷氣上灸龍頷百壯在鳩尾頭上行一寸半不可刺心痛惡氣上脅急痛灸通谷五十壯在乳下二寸心痛暴惡風灸巨闕百壯心痛堅煩氣結灸太倉百壯心痛灸臂腕橫紋三七壯又灸兩虎口白肉際七壯猝心痛灸手中央長指端三壯又橫度病人口折之以度心厭下灸度頭三壯心疝激痛難忍灸巨闕及左右一寸並百壯又以繩度頸及度脊如之令正相對凡灸六處猝心腹滿痛灸乳下一十七壯又灸兩手大拇指內邊爪後第一紋頭各一壯又灸兩手中央長指爪下一壯愈腹結主繞臍痛搶心腹痛針灸衝門主寒氣滿腹中積痛疼淫濼間使主寒中少氣隱白主腹中寒冷氣脹喘復溜主腹厥痛水分石門主少腹中拘急痛巨闕上腕石門陰蹺主腹中滿暴痛汗出中極主腹中熱痛行間主腹痛而熱上拄心心下滿太溪主腹中相引痛湧泉主少腹痛豐隆主胸痛如刺腹若刀切痛治胸痹灸刺法胸痹引背時寒間使主之胸痹心痛天井主之胸痹心痛不得息痛無常處臨泣主之胸痹心痛灸膻中百壯穴在鳩尾上一寸忌針胸痹滿痛灸期門隨年壯穴在第二肋端乳直下一寸半治脹滿灸刺法脹滿雷鳴灸大腸俞百壯三報脹滿氣聚寒冷灸胃脘百壯三報脹滿繞臍結痛堅不能食灸中守百壯穴在臍上一寸一名水分脹滿瘕聚滯下痛冷灸氣海百壯脹滿氣如水腫狀小腹堅如石灸膀胱募百壯穴在中極臍下四寸腹滿瘕聚泄利灸天樞百壯臚脹脅腹滿灸膈俞百壯三報腹中氣脹引脊痛食飲多身羸瘦名曰食亦先取脾俞後取季脅治消渴灸法渴飲病兼身體疼痛灸隱白二穴在足大趾內側去爪甲角如韭葉各三壯甲乙經云足太陰脈之所出也消渴咽喉干灸胃腕下腧三穴各百壯穴在背第八椎下橫三寸間中灸之消渴口乾不可忍者灸小腸俞百壯橫三寸間灸之消渴咳逆灸手厥陰隨年壯消渴咽喉干灸胸堂五十壯又灸足太陽五十壯消渴口乾煩悶灸足厥陰百壯又灸陽池十壯消渴小便數灸兩手小指頭及兩足小趾頭並灸項椎佳又灸當脊梁中央解間一處與腰目上兩處凡三處又灸背上脾俞下四寸當挾脊梁灸之兩處皆隨年壯又灸腎俞三處又灸腰目在腎俞下三寸亦挾脊骨兩旁各一寸半左右以指按取關元一處又兩旁各二寸二處陰市二處在膝上當伏兔上行三寸臨膝取之或三二列灸相去一寸名曰腎系者黃帝經云伏兔下一寸曲泉陰谷陰陵泉復溜此諸穴斷小便更佳不損陽氣亦云止遺溺也太溪中封然谷太白大都趺陽行間大敦陽白湧泉凡此諸穴各一百壯腹背兩腳凡四十七處其腎俞腰目關元水道此可灸三十壯五日一報之各得一百五十壯佳湧泉一處可灸十壯大敦隱白行間此處可灸三壯余者悉七壯皆五日一報之滿三灸止灸諸陰而不愈宜灸諸陽諸陽在腳表並灸肺俞募按流注孔穴壯數如灸陰家法治黃疸灸刺法寅門穴從鼻頭直入髮際度取通繩分為三斷繩取一分入髮際當繩頭針是穴治馬黃黃疸等病上齦里穴正當人中及唇針三鋥治馬黃黃疸等病上齶穴入口裡邊在上縫赤白脈是針三鋥治馬黃黃疸四時等病舌下穴挾舌兩邊針治黃疸等病唇里穴正當承漿裡邊逼齒齦針三鋥治馬黃黃疸寒暑溫疫等病顳顬穴在眉眼尾中間上下有來去絡脈是針灸之治四時傷暑傷寒所苦疸氣溫病等挾人中穴火針治馬黃黃疸通身並黃語音已不轉者挾承漿穴去承漿兩邊各一寸治馬黃急疫等病巨闕穴在心下一寸灸七壯冶馬黃黃疸急疫等病上脘穴在心下二寸灸七壯治馬黃黃疸等病風府穴在項後入髮際一寸去上骨一寸針之治頭中百病馬黃黃疸等病熱府穴在第二節下兩旁相去各一寸五分治馬黃黃疸等病肺俞穴從大椎數第三椎兩旁相去各一寸五分灸主黃疸通治百毒病腳後跟穴在白肉後際針灸隨便治馬黃黃疸寒暑諸毒等病耳中穴在耳門孔上橫梁是針灸之治馬黃黃疸寒暑疫毒等病手太陽穴手小指端灸隨年壯治黃疸擘石子頭穴還取病人手自捉擘從腕中大淵紋向上一夫接白肉際灸七壯治馬黃黃疸等病錢孔穴度乳至臍中屈肋頭骨是灸百壯治黃疸太衝穴針灸隨便治馬黃溫疫等病魚際二穴在手大指本節後內側散脈中各灸三壯主熱病惡寒舌上黃頭痛汗不出又灸黃疸法在臍兩旁各一寸半各灸五壯出普濟針灸經
