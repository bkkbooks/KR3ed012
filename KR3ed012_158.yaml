body:
  text: 卷第一百五十八妊娠墮胎後衣不出論曰胎氣內動不能自安非時而墮既墮而胞衣不出者以衣帶尚與母氣相屬血氣猶固傷墮之次復加風冷氣血凝澀遂致衣不出治法宜以破血溫氣之劑治妊娠墮胎胞衣不出當歸湯方當歸切炒牛膝酒浸切焙各一兩半木通銼滑石碎各二兩冬葵子炒二合瞿麥穗一兩上六味粗搗篩每服三錢匕水一盞半煎至八分去滓溫服未下再服以下為度治妊娠墮胎胞衣不出冬葵子湯方冬葵子炒牛膝酒浸切焙木通銼各二兩瞿麥穗一兩桂去粗皮二兩上五味粗搗篩每服二錢匕水一盞半煎至八分去滓溫服以下為度治妊娠墮胎胞衣不出令胞衣爛莽草湯方莽草滑石冬葵子炒各三兩瞿麥穗牛膝酒浸切焙當歸切炒各二兩上六味粗搗篩每服三錢匕水一盞半煎至八分去滓溫服以下為度治妊娠墮胎胞衣不出阿膠湯方阿膠炙令燥冬葵子炒牛膝酒浸切焙當歸切焙各三分上四味粗搗篩每服三錢匕水一盞半煎至八分去滓溫服以下為度治妊娠墮胎胞衣不下昏悶喘急者宜急救之雄黃散方雄黃研香墨研各一錢金薄三片馬牙硝一分研上四味研勻每服一錢匕以蜜少許與溫湯調服之未下更服治妊娠墮胎胞衣不出地黃酒方生地黃以銅竹刀切炒半兩蒲黃炒生薑切炒各一分上三味以無灰酒三盞於銀器內同煎至二盞去滓分溫三服未下更服治妊娠墮胎胞衣不下牛膝湯方牛膝酒浸切焙冬葵子炒各半兩上二味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服未下更服治妊娠墮胎胞衣不出澤蘭湯方澤蘭葉切碎滑石末各半兩生麻油少許上三味以水三盞先煎澤蘭至一盞半去滓入滑石末並油更煎三沸頓服之未下更服治妊娠墮胎胞衣不出蒲黃酒方蒲黃炒一合槐子十四枚為末上二味以酒三盞煎至二盞去滓分溫二服未下更服治妊娠墮胎胞衣不出方上取大豆一盞以酒三盞煎至一盞半去豆飲之又方上取雞子黃一枚吞之即出又方上取蒲黃如棗大溫酒化服之又方上取生地黃汁一合苦酒一盞煎三五沸頓服之即下妊娠墮胎後血不出論曰血性喜溫而惡寒溫則宣流寒則凝滯妊娠墮胎惡血不出者由妊娠宿有風冷在於胞臟冷搏惡血故令不下令人寒熱去來臍腹滿痛口乾燥渴手足苦煩若血隨氣逆上衝於心或語言狂妄或迷悶不省至其病變不可勝數宜速以破血下氣藥治之血下乃已治妊娠墮胎後惡血不出四肢無力體熱心胸滿悶及諸疾烏金散方墨二兩打折二寸挺子燒通赤用好醋一升蘸七遍又再燒通赤放冷別研為末沒藥研麒麟竭各一分麝香一錢上四味並研和為散每服溫酒調下一錢匕如血迷心用童子小便和酒調下二錢匕治妊娠墮胎後敗血不出方墨三兩用炭火燒紅以釅醋淬如此三遍以瓷碗於淨地上合令冷取出細研如粉沒藥一兩別研末上二味合研令極細再羅過每服二錢匕以煎醋調下不拘時治妊娠墮胎後惡血不出少腹㽲痛琥珀煮散方琥珀研一分沒藥研蒲黃當歸去苗切焙赤芍藥薑黃紅藍花土瓜根牛李子延胡索牡丹皮各半兩上一十一味搗羅為散每服三錢匕童子小便酒各半盞同煎至七分溫服心腹脹痛溫酒調下二錢匕治妊娠墮胎後血不出奔心悶絶不識人紅藍花散方紅蘭花微熬過男子發燒灰墨燒通紅麒麟竭研蒲黃隔紙炒各一分上五味搗研為散以童子小便三四分調二錢匕服之立瘥治妊娠墮胎後血不出大黃湯方大黃銼炒當歸微炙甘草炙銼牡丹去心吳茱萸湯洗炒黃芍藥各一兩上六味粗搗篩每服三錢匕水一盞生薑一分拍破同煎至六分去滓溫服相次再服治妊娠墮胎後惡血不出白蜜湯方白蜜二兩生地黃汁一盞酒半盞上三味將地黃汁與酒於銅器中煎五七沸入蜜攪勻分作兩服放溫相次再服服三劑百病可愈治妊娠墮胎後血不出往來寒熱腹痛桃仁湯方桃仁湯浸去皮尖雙仁麩炒黃色二十枚吳茱萸湯洗炒黃二兩當歸微炙黃耆微炙銼芍藥各一兩醍醐二兩上六味除醍醐外粗搗篩每服三錢匕生薑一分拍破水一盞酒半盞煎至六分去滓下醍醐半兩以來攪勻溫服治妊娠墮胎後血不出心腹疼痛鑑鼻湯方銅鑑鼻別搗細研如粉大黃銼微炒芍藥生乾地黃微炒各一兩甘草炙銼芎藭乾漆炒去煙各一分棗七枚去核焙亂髮雞子大燒灰上九味粗搗篩每服三錢水一盞煎至七分去滓投芒硝少許再煎一二沸溫服相次更服治妊娠墮胎後血不出上搶心痛煩憒豬膏飲方豬膏七合白蜜三合生地黃切二兩上三味先將豬膏地黃相和煎令赤色去卻地黃納蜜三合攪勻分溫二服相次再服治妊娠墮胎後血不出腹中㽲痛不可忍大黃飲方大黃銼炒芍藥黃芩去黑心當歸微炙桃仁湯浸去皮尖雙仁麩炒黃色各一兩生乾地黃焙一兩半桂去粗皮甘草炙赤各三分上八味粗搗篩每服三錢匕水一盞煎至七分去滓溫服食頃再服治妊娠墮胎後血不出當歸酒方當歸炙令香銼芍藥銼炒各二兩上二味粗搗篩每服三錢匕以無灰酒一盞入生地黃汁一合於銀器內慢火煎至七分去滓溫服以惡血下為度治妊娠墮胎後血不出寒熱腹痛牡丹丸方牡丹去心當歸炙令香銼芍藥白朮鬼箭羽桂去粗皮各一兩大黃銼炒三分上七味搗羅為末煉蜜和丸梧桐子大每服二十丸溫酒下時時一服漸加至三十丸治妊娠墮胎後血不出少腹滿痛方取羚羊角燒灰細研如面每服三錢匕不計早晚以豆淋酒調下妊娠墮胎後血出不止論曰胎不安而墮既墮而血出不止者以經養不周血投虛出甚則心神煩憒乃至昏冒也治妊娠墮胎後血出不止龍骨散方龍骨半兩生乾地黃焙地榆去苗細銼各一兩半當歸切焙芍藥各一兩乾薑炮裂蒲黃微炒阿膠炒令燥牛角䚡取黃牛角內者炙令焦勻錯取末各半兩艾葉末一分上一十味搗羅為散每服二錢匕煎生地黃酒調服治妊娠墮胎後血出不止地榆散方地榆去苗銼碎一兩當歸切焙龍骨艾葉搗成末蒲黃微炒各半兩牛角䚡炙令焦勻錯取末阿膠炒令燥生乾地黃焙各一兩上八味搗羅為散研勻每服二錢匕溫米飲調粥食前服治妊娠墮胎後血出不止胸脅心腹滿痛時復寒熱甚者桑根煎丸方桑根白皮銼二兩麻子仁淨淘五合研清酒五盞煮前二味藥至三盞絞汁去滓棗三十枚大者取肉飴糖二兩阿膠炙令燥一兩蜜五大合取棗糖膠同煎一大盞如膏乾薑炮裂厚朴去粗皮生薑汁炙七遍銼碎各半兩蜀椒去目併合口者炒出汗桂去粗皮甘草炙令赤黃柏銼碎生乾地黃焙玄參五味子各一分芍藥半兩上一十七味以前七味共煎成稀膏以後十味搗羅為末與前膏同和為劑塗酥更搗令勻熟丸如彈子以溫酒化一丸食前服治妊娠墮胎後血出不止形體虛羸地榆湯方地榆去苗刮淨細銼一兩當歸炙焙切碎二兩生薑去皮切碎陰乾者艾葉搗為末各半兩赤石脂一兩上五味粗搗篩每服三錢匕水一盞入新竹葉十片同煎至七分去滓食前溫服治妊娠墮胎後血出不止少腹滿痛地黃湯方生乾地黃焙當歸切焙芎藭去蘆頭各二兩阿膠炙令燥艾葉各半兩上五味粗搗篩每服三錢匕水一盞煎至七分去滓溫服空心服之晚後再服如腹痛加杜仲五加皮治妊娠墮胎後下血出不止榆白皮煮散方榆白皮刮淨銼碎當歸切焙各半兩上二味粗搗篩每服三錢匕水一盞入生薑三片同煎至七分去滓空心服治妊娠墮胎後血出不止腹痛艾葉湯方艾葉搗成末用一兩阿膠炙令燥半兩上二味粗搗篩每服三錢匕水一盞煎至五分去滓空腹服之未效更服治妊娠墮胎後血出不止小薊飲方小薊根葉銼碎益母草去根莖切碎各五兩上二味細切以水三大碗煮二味爛熟去滓至一大碗將藥於銅器中煎至一盞分作二服日內服盡治妊娠墮胎後血出不止方丹參去蘆頭二兩上一味粗搗篩每服四錢匕水一盞煎至六分去滓溫服食前治妊娠墮胎後血出不止方取生地黃汁半盞調代赭末一錢匕一日三五服以瘥為度妊娠諸瘡論曰妊娠之人若人經有熱播流血脈散於肌肉榮氣不從於肉理則生癰腫諸瘡之類內經謂諸痛癢瘡皆屬於心治法宜調經絡平腑臟則邪壅之疾自瘥治妊娠諸瘡利心經疏壅滯分氣湯方麥門冬去心焙檳榔生銼當歸切焙人參甘草炙木通銼羌活去蘆頭芎藭大腹皮銼桑根白皮銼各一兩大黃炒三分上一十一味粗搗篩每服三錢匕水一盞煎至六分去滓空心日午臨臥溫服治妊娠諸瘡地黃丸方生乾地黃焙黃耆銼人參荊芥去梗黃芩去黑心甘草炙梔子仁干薄荷葉各一兩上八味搗羅為末煉蜜丸如梧桐子大每服二十丸加至三十丸溫湯下不拘時治妊娠血氣壅滯身體生瘡心神不寧荊芥湯方荊芥穗芎藭細辛去苗葉威靈仙洗銼甘草炙各一兩皂莢半兩不蚛者去皮塗酥炙上六味粗搗篩每服二錢匕水一盞煎至六分去滓食後臨臥溫服治妊娠氣壅生瘡皂莢子散方皂莢子二百枚灰火炮熟去皮槐實麩炒四兩甘草炙干薄荷葉黃耆銼荊芥穗各一兩芎藭天麻各半兩上八味搗羅為散每服一錢匕溫酒調下沸湯亦得不拘時治妊娠氣血壅滯攻身體生瘡瘙癢薄荷丸方干薄荷葉二兩荊芥穗一兩半蔓荊實去白皮玄參洗銼甘草炙大黃銼炒人參麥門冬去心各一兩羌活去蘆頭二兩細辛去苗葉一兩半上一十味搗羅為末煉蜜丸如雞頭大每服一丸茶酒嚼下不拘時治妊娠氣血壅滯生瘡黃耆湯方黃耆銼苦參洗銼羌活去頭蘆獨活去蘆頭惡實炒甘草炙各半兩上六味粗搗篩每服三錢匕水一盞煎至七分去滓溫服治妊娠瘡疥煩熱瘙癢秦艽丸方秦艽半兩黃耆銼枳殼去瓤麩炒漏蘆去蘆頭防風去叉各一半兩黃連去須半兩上六味搗羅為末煉蜜丸如梧桐子大每服二十丸溫酒下空心日午夜臥服治妊娠風熱氣盛攻身體生瘡皮膚燥澀大便結滯祛風散方羌活去蘆頭二兩大黃濕紙裹煨半兩芎藭二兩黃耆銼三兩朴硝別研半兩當歸切焙一兩半上六味搗羅為散與朴硝和勻每服一錢匕日午夜臥用溫蜜水調下微利為效治妊娠風氣壅頭目不利身體生瘡白芷丸方白芷三兩芎藭天南星水煮各二兩羌活去蘆頭半兩藿香葉一兩菊花三分防風去叉半兩細辛去苗並葉一兩當歸切焙二兩上九味搗羅為末酒煮麵糊丸如梧桐子大每服二十丸薄荷湯下不拘時産婦推行年等法並安産圖産婦推行法文略其內容為按産婦年齡自十三歲至四十九歲推算安置産婦床帳睡臥便溺以及棄置汙水的忌宜方向日遊圖推日遊法圖文俱略其內容為推算産婦避忌日遊神的日子十二月産圖圖文俱略其內容十二個月中産婦安産藏胞衣的忌宜方位體玄子借地法文略其內容為咒語安産及藏衣法文略其內容為安産藏胞衣的吉利方位産婦衣色及首指並起日法文略其內容為生産時所宜的衣色和睡臥的所宜的吉利方向
