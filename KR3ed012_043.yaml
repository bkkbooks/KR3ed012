body:
  text: 卷第四十三心臟門心臟統論論曰心與小腸合故手少陰經與手太陽經為表裡其象火其王夏其脈洪在臟為神在志為喜在變動為憂在液為汗是故心氣虛則悲不已實則笑不休心氣虛則夢救火陽物得其時則夢燔灼心氣盛則夢喜笑恐畏厥氣客於心則夢丘山煙火心衰則健忘心熱則多汗不足則胸腹脅下與腰背引痛驚悸恍惚少顏色舌本強有餘則骨痛胸中支滿脅下及膺背肩胛兩臂痛不足則補有餘則瀉此治之大法也心虛論曰心虛之狀氣血衰少面黃煩熱多恐悸不樂心腹痛難以言時出清涎心膈脹滿善忘多驚夢寢不寧精神恍惚皆手少陰經虛寒所致其脈見於左手寸口人迎以前陰虛者乃其候也治心虛悸頭項熱痛狂走言語無度小腹氣壅石膏湯方石膏二兩麥門冬去心焙升麻各一兩半桔梗去蘆頭切炒甘菊花擇去梗黃耆薄切各一兩人參半兩上七味粗搗篩每服五錢匕水一盞半煎至一盞去滓食後溫服日三治心臟虛煩恍惚多忘神思不寧人參湯方人參半兩遠志去心石菖蒲各一兩上三味粗搗篩每服三錢匕水一盞生薑三片薄荷三葉煎至七分去滓溫服不拘時治心氣虛弱時發昏悶驚悸恍惚忘誤心忪安定神志補心不足丹砂茯神丸方丹砂別研茯神去木人參天麻白殭蠶微炒各一兩天竺黃研真珠末琥珀研菖蒲遠志去心各半兩鉛霜研麝香研水銀沙子乾蠍去肚泥炒牛黃別研各一分上一十五味為細末煉蜜丸如梧桐子大每服十丸至十五丸煎人參茯苓湯下食後臨臥服治心經邪熱虛煩懊躁頭目不利神思昏倦紫石英湯方紫石英別研麥門冬去心焙各二兩生乾地黃洗切焙人參紫蘇莖葉遠志去心茯神去木當歸切焙甘草炙銼防風去叉各半兩赤小豆一兩上一十一味粗搗篩每服三錢匕水一盞煎至七分去滓早晚食後溫服治精神恍惚或爽或昏意思不佳日多伸欠眠食不時補心益志菖蒲散方菖蒲銼人參生乾地黃洗切焙遠志去心白茯苓去黑皮山芋各一兩桂去粗皮半兩上七味為細散每服一錢匕粥飲調下食後臨臥服治思慮過多心氣不安驚悸恍惚煩倦神思不清人參遠志丸方人參遠志去心黃耆薄切酸棗仁各一兩桂去粗皮桔梗去蘆頭炒丹砂別研各半兩天門冬去心焙菖蒲白茯苓去黑皮各一兩半上一十味為細末煉蜜丸如梧桐子大每服十五丸至二十丸米飲下不拘時安鎮魂魄令人神爽氣清目明耳聰強記預知應真丸方琥珀研預知子遠志去心人參白茯苓去黑皮白朮菖蒲各二兩桂去粗皮一兩上八味為細末煉蜜丸如梧桐子大每服二十丸食前溫酒下治心氣虛弱驚悸夜臥不寧沉香散方沉香白茯苓去黑皮各三錢酸棗仁炒人參天麻芎藭陳橘皮去白切焙各二錢藿香葉甘草炙銼白殭蠶去絲酒炒各一錢上一十味為細散每服一錢匕食後生薑湯調下日二夜一治心氣不足茯苓菖蒲丸方茯苓去黑皮菖蒲遠志去心各一兩茯神去木二兩赤小豆半兩上五味為細末用炊餅浸稀丸如綠豆大每服三十丸至五十丸食後熟水下治心氣不足山茱萸丸方山茱萸杜仲去粗皮炒茯神去木枳殼去瓤麩炒甘草炙銼貝母去心炒天門冬去心焙各一兩白茯苓去黑皮麥門冬去心焙各一兩三分生乾地黃洗切焙百部各二兩防風去叉一兩半遠志去心半兩上一十三味為細末煉蜜丸如彈子大每服一丸嚼細食後麥門冬熟水下治心氣不足脾乏生氣脾既受邪先診其脈若心脾脈俱弱即宜先服補益心氣人參湯方人參藿香去梗遠志去心芎藭菖蒲白朮白芷陳橘皮去白切焙各等分上八味粗搗篩每服三錢匕水一盞煎至八分去滓食前服開心益智菖蒲散方菖蒲三分遠志去心一兩三分菖蒲白茯苓去黑皮龍骨碎研各一兩一分上五味為細散每服一錢匕平旦以新水調下服此藥宜以開日為始治心虛不足補心氣山芋丸方山芋熟乾地黃焙各一兩半柏子仁茯神去木人參防風去叉丹參各一兩貝母去心焙菖蒲石上者甘草銼遠志去心各半兩上一十一味搗羅為末研令勻用蜜和丸如彈子大每日食後將一丸含化咽津夜臥時再服治心虛驚悸睡臥不安龍齒湯方龍齒人參各三分芍藥淡竹茹當歸切焙半夏曲茯神去木羌活去蘆頭各半兩木香茅根各一分銀半斤用水三升煎取一升上一十一味除銀外粗搗篩每服五錢匕用銀水一盞半生薑五片煎至八分去滓食後溫服治心虛驚悸茯苓散方白茯苓去黑皮三分遠志去心人參麥門冬去心焙白殭蠶炒羚羊角鎊菊花各半兩甘草炙銼牛黃研鐵粉研各一分上一十味搗研為散每服二錢匕食後煎竹瀝湯調下或薄荷熟水下治心臟虛熱驚悸心忪虛乏氣短睡臥不安茯神丸方茯神去木二兩人參麥門冬去心焙龍齒防風去叉雲母粉各一兩半犀角鎊黃芩去黑心薏苡仁各二兩上九味搗羅為末煉蜜丸如綠豆大每服食後米飲下十五丸至二十丸治心虛言語錯謬精神恍惚多驚黃耆湯方黃耆銼麥門冬去心焙各二兩人參白茯苓去黑皮芍藥當歸切焙桂去粗皮甘草炙銼各一兩上八味粗搗篩每服五錢匕水一盞半棗二枚劈煎至一盞去滓不拘時溫服治心虛驚悸或因憂慮神氣不安鎮心丸方茯神去木人參甘草炙銼龍齒各一兩半升麻枳殼去瓤麩炒各一兩銀箔二百片麥門冬去心焙二兩上八味搗羅為末煉蜜和丸如梧桐子大每服十五丸至二十丸米飲下早晚食後服治心虛不足驚悸不安言語謬亂人參遠志散方人參遠志去心熟乾地黃焙各三分琥珀研白茯苓去黑皮各一兩甘草炙銼一分鐵粉研半兩上七味搗研為散每服二錢匕煎金銀湯調下治心虛不足驚悸不安言語謬亂人參湯方人參茯神去木羌活去蘆頭芍藥黃耆各三分龍齒桂去粗皮各半兩上七味細銼如麻豆每服五錢匕水一盞半入生薑三片同煎至八分去滓溫服日二治心氣不足或喜或悲或嗔或怒或時鼻衄眼目黃赤言語顛倒咽喉痛唇口乾燥冷汗自出驚悸心忪補心湯方人參白茯苓去黑皮桂去粗皮紫菀去苗土麥門冬去心焙各二兩紫石英研一兩上六味粗搗篩每服五錢匕水一盞半大棗二枚劈赤小豆三十粒煎至八分去滓食後溫服治心虛神氣不寧舉動多驚睡臥不安杏仁丸方杏仁一斗湯浸去皮尖雙仁用童子小便三斗煮一日以好酒二升淘洗然後爛研如膏再以清酒三斗並地黃汁三升和杏仁膏銀石器內重湯煮一復時稀稠如膏為度盛瓶器密封口遠志一兩去心焙乾秤茯苓去粗皮菖蒲各二兩麥門冬去心黃連各一兩上六味除杏膏外搗羅為末入前膏和為丸如梧桐子大每服三十丸人參湯下治心虛通治百病虛瘠羸乏牛髓丸方牛髓羊髓白蜜酥棗膏各一升茯苓麥門冬芎藭桂心當歸去蘆頭甘草羌活各一兩一分乾薑乾地黃各一兩半人參五味子防風各一兩細辛三分白朮一兩三分上一十九味先搗十四味為末取上五味銅石器內熬令消次入前藥末同熬如膏取出可丸即丸如梧桐子大溫酒下三十丸心實論曰左手關前寸口陰實者心實也上氣胸中滿膨膨與肩相引扁鵲曰心實熱則喘逆胸憑仰息此手少陰為熱所加故為心實之病甚則口苦引飲無度體背生瘡以至股膝踹脛皆痛法宜瀉之治心實熱茯神湯方茯神去木麥門冬去心焙各三分木通銼桂去粗皮知母紫菀洗切升麻各半兩竹茹如雞子大赤石脂一兩上九味粗搗篩每服五錢匕井華水一盞半入棗一枚去核煎至一盞去滓早晚食前臨臥溫服治心實熱夢多驚恐畏懼不安石膏湯方石膏四兩碎研人參知母焙赤石脂梔子去皮芍藥白朮茯神去木紫菀洗切各一兩半上九味粗搗篩每服五錢匕水一盞半煎至一盞去滓入竹瀝少許生地黃汁一合更煎一兩沸食後溫服若要利加芒硝一兩去芍藥治心實熱欲吐不出煩悶喘急瀉心湯方小麥三合豉炒一合石膏五兩地骨皮一兩梔子去皮七枚赤茯苓去黑皮三分上六味粗搗篩每服五錢匕水一盞半入竹葉十片細銼煎至一盞去滓食後溫服治心臟實熱煩躁喘急欲吐不出頭目昏眩麥門冬湯方麥門冬去心焙石膏地骨皮各二兩梔子仁甘草炙銼各半兩上五味粗搗篩每服三錢匕水一盞入小麥五十粒竹葉十片煎至七分去滓食後臨臥溫服治心壅痰實膈熱頭昏不思飲食咳嗽煩渴犀角湯方犀角屑柴胡去苗黃芩去黑心人參各一兩白茯苓去黑皮麥門冬去心焙升麻各半兩甘草炙銼半分上八味粗搗篩每服五錢匕水一盞半煎至一盞去滓食後溫服治心氣實熱火氣炎盛銷爍金精肺受心邪因而生疾若人患肺先審心虛實若心氣盛實則脈洪大或肺脈微得心脈即先服此抑心氣湯方黃芩去黑皮赤茯苓去黑皮玄參甘草炙銼麥門冬去心焙牡丹皮升麻桔梗去蘆貝母去心犀角屑各一分沉香木香各一錢上一十二味粗搗篩每服三錢匕水一盞煎至七分食後溫服治心實壅熱口苦舌乾涕唾稠黏胸膈煩悶不思飲食人參湯方人參赤茯苓去黑皮茯神去木龍骨遠志去心麥門冬去心焙生乾地黃洗切焙甘草炙銼各半兩丹砂別研天竺黃各一錢天門冬去心焙半兩上一十一味粗搗篩每服三錢匕水一盞棗一枚去核淡竹葉五片燈心十莖煎至七分去滓溫服治心實壅熱口苦舌乾涕唾稠黏胸膈煩悶不思飲食肢體倦怠或發煩熱狀似骨蒸茯神丸方茯神去木生乾地黃洗切焙各二兩鱉甲九肋者醋炙去裙襴桔梗去蘆頭切炒人參升麻大腹炮防風去叉黃芩去黑心白前各一兩枳殼去瓤麩炒赤芍藥柴胡去苗黃耆薄切各一兩半上一十四味為細末煉蜜丸梧桐子大每服十丸食後生薑湯下治心臟積熱口舌生瘡善怒言語不快舌強小便赤痛通心湯方麥門冬去心焙梔子去皮黃芩去黑心當歸酒灑切焙荊芥穗芍藥大黃生銼升麻木通各一分上九味粗搗篩每服三錢匕水一盞入蔥白三寸煎至八分去滓食後熱服治心經蘊熱頭目壅赤小便秘澀加減火府丸方生乾地黃洗切焙一兩木通一兩半黃連去須三分黃芩去黑心一分赤茯苓去黑皮半兩上五味為細末煉蜜丸梧桐子大每服七丸至十丸食後溫水下治心熱實忪悸恍惚痰壅昏倦上焦渴燥夜臥不穩鎮心丸方丹砂別研人參甘草炙銼黃芩去黑心栝蔞根各一兩凝水石碎研二兩牛黃研犀角鎊知母各半兩龍腦別研一錢上一十味為細末煉蜜丸雞頭大每服一丸人參湯嚼下治心臟大熱去煩悶潤腸胃山梔子湯方山梔子三兩大黃銼炒朴硝甘草生銼石膏各二兩黃芩去黑心大青各一兩竹茹三分鬱金一兩半上九味粗搗篩每服三錢匕水一盞入竹葉七片煎至七分去滓食後服治心實生熱驚悸化風痰解積熱冰壺丸方牛黃別研真珠別研人參白茯苓去黑皮安息香酒化胡黃連龍膽麥門冬去心焙遠志去心各半兩丹砂別研玳瑁鎊犀角鎊各一兩龍腦別研龍齒鐵粉別研甜硝別研各一分金箔別研銀箔別研各十五片上一十七味為細末煉蜜同安息香膏和丸如雞頭大每服一丸煎人參茯苓湯化下治心臟實熱驚怖痰壅不下食遠志湯方遠志去心生乾地黃洗切焙枳殼去瓤麩炒各一兩半夏為末生薑汁調作餅焙乾旋覆花各半兩麥門冬去心焙一兩半赤茯苓去黑皮甘草炙銼各三分上八味粗搗篩每服三錢匕水一盞生薑五片煎至六分去滓食後溫服治心臟實熱上焦壅滯口舌生瘡或多煩渴柴胡湯方柴胡去苗地骨皮犀角鎊麥門冬去心焙葛根銼黃連去須赤芍藥黃芩去黑心升麻各一兩甘草炙銼半兩上一十味粗搗篩每服三錢匕水一盞煎至七分去滓食後溫服治心實熱口乾煩渴夜臥不安羚羊角湯方羚羊角鎊三分茯神去