body:
  text: 卷第一百八十一小兒語遲論曰心為言肝為語其經屬手少陰足厥陰其氣上通於舌舌者聲之機若稟受之初母懷驚怖則子之心火不足而肝木弱故令機關不利氣不宣揚而語遲甚者有經數歲不能言者治小兒心氣不足舌本無力語遲芍藥湯方赤芍藥一兩黃耆銼三分犀角鎊檳榔銼甘草炙各半兩上五味粗搗篩每服一錢匕水一小盞煎至五分去滓量兒大小不計時候加減溫服治小兒諸病後六七歲不能語雞頭丸方雄雞頭燒灰一枚鳴蟬去翅足炒三枚甘草炙半兩大黃銼炒麥門冬去心焙各一兩半當歸切焙黃耆銼芎藭各三分遠志去心木通銼各半兩人參一兩上一十一味搗羅為末煉蜜丸如緑豆大每服以粥飲下五丸至七丸量兒大小加減不計時候治小兒五六歲不語菖蒲丸方菖蒲人參黃連去須各半兩丹參赤石脂各三分天門冬去心焙麥門冬去心焙各一兩上七味搗羅為末煉蜜丸如緑豆大每服五七丸溫水下不拘時候日三量兒大小以意加減小兒齒不生論曰牙齒者是骨之所終髓之所養手陽明足太陽之脈併入於齒若血氣充實則骨髓強盛雖其齒損落猶能更生也若虛弱者血氣衰耗風冷乘之致令齒久不生假令生者或齲或蟲落不能復生也治小兒齒不生或因落不生方牛糞中黑豆上一味取二七枚小開去頭上皮用此豆頭開處注齒根上時時用之當效治小兒牙齒不生方雄鼠糞二七枚上一味每日用糞一枚齒根上拭至二十一日其齒當生又方道傍遺稻粒上一味於齒落處點三七下其齒自生治小兒齒不生無問遠近皆得便生神效方雄雞糞二七枚頭尖者雌雞糞二七枚頭圓者上二味燒灰存性先用針挑開齒齗上以雞糞灰點之小兒咽喉諸病論曰咽喉者肺脾經所主也小兒肺脾有熱蘊積上焦熏發喉間故令咽喉赤腫吞吐不利或塞或壅憎寒壯熱咳嗽痰涎是其候也昔人謂臟熱則咽門腫而閉塞豈虛言哉治小兒咽喉中鳴咳嗽喘急款冬花丸方款冬花甘草炙紫菀去苗土麻黃去根節煎去沫焙乾各半兩貝母麩炒麥門冬去心焙各三分上六味搗羅為細末煉蜜丸如緑豆大每服三丸至五丸食後米飲下五歲以上以意加之日三治小兒咽喉舌腫脹咽氣不利朴硝散方朴硝一分衣中白魚炒三枚鹽少許上三味搗研為細散每服以指搵少許在舌下治小兒咽喉項腫啼聲不出牛黃散方牛黃研半分代赭三兩麝香研半錢玄參三分厚朴去粗皮生薑汁炙三分升麻一兩射干半兩大黃銼炒一兩一分木香三分白朮半兩犀角鎊屑三分甘草炙半兩上一十二味搗羅十味為細散入研藥和勻每服半錢匕以人乳汁一蛤蜊殼許調下空腹日一服三歲至五歲以上每服一錢匕棗湯調下米飲亦得日再治小兒咽喉中鳴咳嗽痰壅牽牛散方牽牛子炒半生半熟二兩杏仁去皮尖雙仁炒甘草炙吳茱萸湯洗焙乾炒陳橘皮去白焙各一分上五味搗羅為細散每服半錢匕空腹以沸湯調下微利出惡物即瘥量兒大小加減服治小兒咽喉腫熱肺脹氣急喉中似有物塞麻黃湯方麻黃去根節煎去沫焙乾桑根白皮銼桂去粗皮各半兩大黃生射干杏仁湯浸去皮尖雙仁各一分上六味粗搗篩每服一錢匕以水半盞煎至三分去滓溫服治小兒咽喉腫脹咽氣不利黃柏湯方黃柏去粗皮蜜炙甘草炙各一分上二味粗搗篩每服一錢匕以水半盞煎至三四分去滓溫服不計時候治小兒熱病口爛咽喉生瘡水漿不下當歸膏方當歸去蘆頭銼炒射干銼升麻銼各一兩附子半兩炮去皮臍銼白蜜四合上五味切以豬脂四兩先煎成油後納諸藥入於油中用文火熬令附子黃色濾去滓投蜜更熬一兩沸成膏以瓷器收每取杏仁大含化咽津無妨日三四用之治小兒咽喉腫痛毒氣熱極咽塞不利生薑湯方生薑二兩切升麻二兩銼射干二兩銼陳橘皮一兩湯浸去白上四味銼如麻豆每服三錢匕水一盞煎至七分去滓溫服治小兒咽喉腫痛壯熱躁渴不止升麻湯方升麻射干大黃銼炒各半兩上三味粗搗篩每服一錢匕水一盞煎至四分去滓分溫二服早晨日午各一治小兒膈熱唇口生瘡咽喉腫痛玉芝散方甘草銼作半寸許劈破湯浸一日微炒石膏研如粉各一兩山梔子去皮微炒二兩藿香葉半兩上四味搗研為細散每服半錢匕以新汲水調下量兒大小加減服治小兒風熱咽喉腫塞生瘡搖頭煩悶及蟲咬心痛龍腦丸方龍腦研半錢白礬銚子內煉沸泣盡汁為度研玄明粉一錢蟬殼三十枚去足炒研末牛黃研半字蛇蛻皮一條長二尺鐵器上爆焦研為末上六味再一處細研入沙糖少許和丸如梧桐子大冷水化破一丸服之治小兒咽喉腫痛苦藥子散方苦藥子白殭蠶等分上二味搗為細散每服半錢匕白礬水調下量兒大小加減治小兒忽腫毒著咽喉露蜂房散方露蜂房燒灰白殭蠶各一分上二味細研每服半錢匕用乳香湯調下看兒大小以意加減治小兒喉痹血氣結塞慎勿刺破但與藥通利升麻湯方升麻木通銼大黃生麻黃去根節各一分犀角鎊石膏碎甘草生銼各半兩朴硝研一兩上八味粗搗篩每服二錢匕水一盞煎至七分去滓量大小分減服小兒誤吞物論曰小兒多以珠璣錢鈈之類為玩弄之具或藏於口中因驚或啼遂誤吞咽倉猝不得出為害亦大當隨物所宣以方術治之治小兒誤吞錢在喉中不下方麩炭研為細末上一味以指彈少許入喉中少頃自吐出一方用羊脛炭研細為末治小兒誤吞針方磁石一塊小彈子大吸鐵緊者上一味入口內吸令針出或絲系定送咽喉引出亦得治小兒誤吞鉤繩方上凡吞鉤繩猶在手者莫伸引俱以珠璫若穿了薏苡子之類就其繩穿稍稍推至鉤畔即急推前入才鉤離刺處復緩緩引出治小兒誤吞珠璫方上燒銅弩牙令赤淬水一碗旋飲其物即出治小兒誤吞銀鈈及叉方上以飴糖隨兒大小多少食之若能多食叉鈈即隨出治小兒誤吞發方上用木梳燒灰細研粥飲調下半錢匕不下再服治小兒誤吞梅李核方上以溫水旋從小兒頭淋下卻接其水與兒飲之治小兒誤吞鈈方上以鵝毛半兩燒灰細研米飲調下半錢未效再服小兒緊唇論曰脾主肉其華在唇脾胃有熱熏發於口則令唇際生瘡又為風邪寒濕之氣搏於腫處故焮結不消濕爛汁出時發時瘥積久不愈謂之緊唇瘡又名沉唇也治小兒唇瘡未已覆被風冷所搏瘡口濕腫此名緊唇順脾散方山芋一兩人參三分桂去粗皮一分木香半兩甘草炙銼白朮各一分訶黎勒炮去核半兩肉豆蔻炮去殼二枚白茯苓去黑皮黃耆銼各半兩白芷一分上一十一味搗羅為散每服半錢匕沸湯點服量兒大小加減治小兒緊唇瘡二鉛散敷方鉛丹一分鉛霜研半分蛤粉研晚蠶蛾微炒各半錢麝香研一錢上五味各為散用蜜合調敷瘡上治小兒緊唇瘡腫皮急黃連散敷方黃連去須黃柏去粗皮銼甘草生銼凝水石碎各半兩檳榔生銼一分上五味搗羅為散用蜜調敷唇上頻換為效治小兒緊唇及脾熱攻唇瘡腫烏蛇散敷方烏蛇燒灰上一味細研以酥和敷唇上頻換為效治小兒唇瘡白芨膏敷方白芨白蘞白蠟各一兩黃耆銼乳香研牡丹皮芍藥丁香各一分麻油二兩上九味除油蠟外並細銼先煎麻油令沸次入前項藥以柳木枝不住手攪綿濾過去滓再煎入蠟膏成入銀石器中盛候冷不拘多少取敷瘡上治小兒唇瘡不合龍膽丸方龍膽大黃銼微炒各一分人參梔子仁朴硝郁李仁去皮別研入各半兩茵陳蒿一分上七味搗羅為末煉蜜和丸如麻子大每服五丸至七丸溫水下量兒大小加減治小兒唇瘡方黃柏去粗皮為細末上一味濃煎薔薇根汁調塗瘡上立效治小兒唇生瘡方桑根白皮細切上一味搗取汁塗瘡上大效治小兒唇瘡方藍葉細切上一味研取汁洗之日三上瘥小兒涎液不收論曰小兒因氣不升降膈脘否滯致令乳飲不化流入胃中隨氣上溢故令多涎其候胸悶短氣飲食遲化內經謂脾為涎當調脾胃升降其氣則病可愈治小兒脾風多涎心胸壅悶不下乳食昏昏多睡鉛霜散方鉛霜研牛黃研半夏生薑汁製焙乾龍腦研各半分白附子炮馬牙硝研防風去叉丹砂研天竺黃研犀角屑細辛去苗葉黃芩去黑心甘草炙銼各一分上一十三味搗研為散再同研勻每服一字用生薑蜜溫水調下更量兒大小以意加減不計時候治小兒脾肺風熱膈上多涎心神昏悶少欲乳食防風湯方防風去叉羚羊角屑黃芩去黑心人參枳殼去瓤麩炒甘草炙銼各一分半夏半分生薑汁製焙乾上七味粗搗篩每服一錢匕水八分入生薑少許煎至五分去滓不計時候量兒大小分減溫服治小兒脾熱乳食不下胸膈多涎半夏丸方半夏半分生薑湯洗七遍去滑皂莢子仁半兩上二味搗羅為末用生薑汁和丸如麻子大不計時候以溫水下三丸隨兒大小以意加減治小兒脾胃氣不升降氣溢於上涎液不收半夏丸方半夏微炒一兩白礬生研半兩上二味先以半夏為細末再入白礬和勻麵糊和丸如粟米大每服五七丸量輕重加減食後臨臥生薑湯下治小兒胃氣上溢氣不升降涎液不收清膈降氣丸方牛蒡子梔子仁甘草炙微赤銼川硝鬱金以上各半兩枳殼一分麩炒微黃去瓤龍腦半兩研上七味搗羅為末麵糊和為丸如麻子大用薄荷水化下二丸至三丸不計時候量兒大小加減服之治小兒脾熱乳食不下胸膈痞悶涎溢不收桑白汁方新桑根白皮不以多少細銼上一味取自然汁塗於兒口內立效如無新桑根白皮取干桑根白皮一兩細銼用水一盞煎至半盞放溫塗兒口內極妙小兒胎赤眼論曰小兒眼胎赤者是初生洗目不淨令穢汁浸漬於眥中使瞼赤爛至大不瘥故云胎赤眼也治小兒胎赤眥爛黃連丸方黃連去須一兩防風去叉龍膽去土大黃銼炒細辛去苗葉各半兩上五味搗羅為末煉蜜丸如緑豆大每服五丸至七丸溫熟水下日三更量兒大小加減治小兒眼胎赤風毒所攻腫痛升麻湯方升麻黃耆銼玄參甘草炙各半兩犀角屑防風去叉蕤仁湯浸去皮研各一分上七味粗搗篩每服一錢匕以水七分煎至四分去滓分溫二服更量兒大小加減治小兒眼胎赤腫痛上焦壅熱麥門冬湯方麥門冬去心焙犀角屑芒硝防風去叉甘草炙各半兩旋覆花一分上六味粗搗篩每服一錢匕水七分煎至四分去滓量兒大小分減溫服日四五治小兒眼胎赤久不瘥牛黃丸方牛黃一分細研黃連半兩去須決明子一分蕤仁一分湯浸去皮犀角屑半兩龍腦一錢細研上六味搗羅為末煉蜜和丸如麻子大每服以溫水下五丸日三四服更量兒大小以意加減治小兒眼胎赤及生瘡怕見風日方龍腦半錢細研蕤仁一分湯浸去皮研杏仁一兩湯浸去皮尖雙仁研上三味滴少水都細研如乳汁每日三四度點之治小兒眼胎赤癢痛方龍腦半錢細研桑葉五兩燒作灰上二味水一升半先煎桑葉灰取半升綿濾去滓後入龍腦攪令勻日三四上少點治小兒眼胎赤龍腦煎方龍腦一錢鹽緑半兩蕤仁湯浸去皮一分上三味都研令極細以蜜調似面脂用點眼日三兩上治小兒眼胎風赤爛不以年月發歇視物淚出澀痛不可忍黃連膏方黃連去須搗一兩蘆薈研一分龍腦一錢別研上三味先將黃連蘆薈搗研羅為末以新綿裹用水一盞於銀器中以重湯煮候藥汁三分減二即去藥綿入龍腦攪勻以瓷瓶收每日三兩上點之治小兒眼胎赤兼有翳膜杏仁膏方杏仁去皮尖雙仁研如膏一兩膩粉一錢鹽緑黃連末各一分上四味同研極細以真酥調如膏攤於銅碗內以熟艾如雞子大掘小坑子燒艾煙出便復銅碗熏之勿令氣泄候煙盡更研令勻每取少許以綿裹用人乳汁浸一宿日三四度點之治小兒眼胎赤經年月深遠者銅青散方銅青膩粉各一錢龍腦半錢乾地龍一條去土為末上四味同研極細每用半小豆許點目眥日一兩度小兒斑瘡入眼論曰小兒脾肺壅熱或緣時氣溫病表裡俱虛邪毒發於肌表致生斑痘甚者遍體斑如玳瑁頭作熛漿毒氣炎盛上攻眼目發於睛輪先須於瞼膚上用藥貼熁次可調利脾肺切不得用藥點眼點藥則令斑瘡潰爛穿壞睛輪不可不慎也治小兒斑瘡入眼連翹散方連翹去子芎藭黃柏去粗皮各一錢胡麻三錢去油甘草炙三分上五味搗羅為散用白湯調放冷食後服五歲以下半錢五歲以上一錢如眼內有白丁子者不日退去治小兒熱盛攻眼及斑瘡入眼井泉石散方井泉石為末再研飛過蟬殼去土蛇蛻皮炙甘草炙各一兩上四味搗研羅為散每服半錢至一錢匕蜜水調下治小兒斑瘡入眼柳絮散方柳絮穀精草石決明夜明砂各等分上四味搗羅為散每服一錢匕豶豬肝一片批開摻藥在內以線子扎定米泔一大盞煮至五分取出乘熱以湯熏眼良久服之日一服治小兒斑瘡入眼生翳膜遮睛烏龍散方烏魚骨貝齒豬趾甲各一兩上三味同入沙合子內用鹽泥固濟令乾燒通赤為度取出細研每服半錢匕用羊子肝一具批開摻藥在內麻縷扎定粟米泔一盞煮熟為度細嚼米飲下治小兒斑瘡入眼成疱瘡如聖散方蛇蛻皮一尺皂子十四枚馬勃一分上三味以蛇皮裹皂子更用馬勃裹蛇皮入罐子中瓦蓋黃泥裹合曝乾炭火煅候煙欲斷即止取出油單貼入地中出火毒一宿研細入麝香少許再研每服半錢匕蔥湯調下日三服忌一切發眼物治小兒斑瘡入眼及生翳通聖散方白菊花如無用甘菊花代緑豆皮穀精草各一兩上三味搗羅為散每服一錢匕用乾柿一枚生粟米泔一盞與藥同煎水盡為度只吃乾柿一日可二服不計時候若患十日以里三五服即瘥一月以里十數服瘥治豆瘡子入眼妙應散方蛇蛻皮一兩蟬殼二十五枚上二味用罐子泥固濟曝乾火煅過地上出火毒一宿研為末蜜水調下一字匕食後日三治小兒出瘡子後眼內生青膜翳暈蛤粉散方蛤粉一分甘草炙一握上二味將甘草搗羅為末與蛤粉同研令勻每服一錢匕新汲水調下不拘時候治小兒斑瘡入眼成白膜但不作丁子者服之必效螵蛸散方桑螵蛸二兩麝香少許研上二味搗研為細散每服一錢半匕生米泔調下臨臥服治小兒瘡疹入眼成翳膜蟬殼湯方蟬殼羊子肝上二味搗羅為末每服二錢匕用水煎羊子肝湯調下日三治小兒斑疹入眼生翳膜方穀精草細蛤粉以上各一兩上二味搗研為細末每用一錢匕豬肝二兩批開摻藥在內捲了用青竹葉裹麻縷扎定水一碗煮令熟入收口瓷瓶內熏眼後取肝食之服不過十日必瘥日二治小兒斑瘡入眼輕粉散方輕粉一兩用銀器內炒令黑色上一味如患左眼用紙拈纏左耳右耳亦如之以填滿為度如耳根痛其膜自落小兒眼生翳膜論曰眼者肝之候也五臟六腑精氣皆上注於目小兒體本挾熱將養過溫致腑臟積蓄邪熱熏漬肝經上衝於目始則赤痛若不即治蘊結變生障翳熱氣輕者生白翳如黍米大者如麻豆重者乃生兩三翳又甚則翳生白障侵遮瞳人滿目悉白遂致失明然障亦有輕者黑睛邊微有白膜來侵黑睛漸染散漫當急治之即免侵遮黑睛有瞽蒙之患治小兒熱毒氣盛翳膜侵睛兼赤眼疼痛蕤仁丸方蕤仁湯浸去皮別搗一兩半兔肝炙一具梔子仁黃芩去黑心黃連去須各半兩升麻決明子各三分細辛去苗葉一分上八味搗羅為末煉蜜丸如緑豆大每服三丸至五丸溫水下早晨日晚各一服更隨兒大小加減治小兒風翳散漫侵瞳人及風疳眼惡實散方惡實炒木通銼蒺藜子炒去角各一兩上三味搗羅為散每服半錢匕以水搗羊子肝汁調下早晨日晚各一服更量兒大小加減治小兒眼赤或生翳膜或眼常合不開決明子散方決明子車前子梔子仁防風去叉黃連去須各一兩半上五味搗羅為散每服一字至半錢匕搗生豬肝投熱湯取汁調下早晨日晚各一服更量兒大小加減治小兒肝受病目昏漸生翳膜散漫侵睛因此失明須內外治之龍膽飲方龍膽鉤藤土瓜根茯神去木各半兩甘草炙桑根白皮炙防風去叉各一分上七味粗搗篩每服一錢匕水一盞入棗半枚去核同煎至六分去滓分作二服量兒大小加減早晚服治小兒肝熱眼生翳膜或生血輪腫脹切宜急治車前子湯方車前子防風去叉甘菊花甘草炙銼人參菥蓂子青葙子各三分梔子仁黃連去須各半兩上九味粗搗篩每服一錢匕水一盞入淡竹葉七片煎至五分去滓溫服日三量兒大小加減治小兒疳眼翳膜沙澀煮肝散方黃連去須沙參玄精石決明子上四味等分搗羅為散每服半錢匕用羊子肝一片竹篦子切作縫子摻末在內線系入沙罐子內垂掛勿令到底以米泔煮熟淡食羊肝每一片分作兩服或三服量兒大小與食治小兒五歲以下肝臟熱毒目生丁翳黃芩湯方黃芩去黑心升麻甘草炙銼各半兩葳蕤玄參犀角鎊各一分上六味粗搗篩每服一錢匕水七分煎至四分去滓分溫二服量兒大小加減日三四服治小兒肝臟壅熱眼生瘡翳車前子丸方車前子甘菊花芎藭黃連去須當歸切焙各一分大黃濕紙裹煨黃芩去黑心各半分上七味搗羅為末煉蜜丸如緑豆大每服五七丸量兒大小加減煎桑枝湯下治小兒風熱疳氣攻眼赤痛障翳撥雲膏方桃仁杏仁各四枚並去皮尖雙仁蕤仁郁李仁各五枚並去皮上四味同生研細濾入蜜龍腦麝香膩粉各少許再研極勻點之治小兒因瀉痢日久眼生翳膜並疳眼退翳如聖散方蛇蛻兩條用紙燭燒灰研穀精草一兩蟬蛻去土一分附子生去皮臍二錢石決明刷淨一分胡粉研四錢上六味搗研為散每服一字半羊子肝一片批破摻末用麻皮線纏米泔煮熟先熏眼後與食量大小加減如未能食研汁灌之治小兒眼有障翳七八歲瞳子未堅不宜點藥用蝕翳珊瑚散方珊瑚半兩上一味細研如粉每點時取如黍米大納翳上日再點治小兒目睛有膜白礬膏方白礬熬令汁盡一分上一味以清水四合置熟銅器中煎取半合去滓入少許白蜜以綿濾過每日三度點如黍米大小兒目赤痛論曰目者腑臟之精華肝之外候也小兒臟腑有熱與膈間痰飲相搏氣不宣通熏漬於肝肝經受熱則血脈壅滯循經上衝於目故令目赤痛不即治熱甚則生障翳治小兒眼赤隱澀不開膈中有熱決明湯方決明子炒黃芩去黑心各一兩一分柴胡去苗大黃研炒各一兩半升麻石膏碎梔子仁各一兩甘草炙銼枳殼去瓤麩炒各半兩上九味粗搗篩每服一錢匕水七分入竹葉五片同煎至四分去滓分溫二服隨兒大小加減食後服治小兒赤眼黃芩飲方黃芩去黑心半兩寒水石一兩一分升麻甘草炙銼各一分上四味粗搗篩每服一錢匕水七分入竹葉五片同煎至四分去滓分溫二服食後臨臥隨兒大小加減治小兒赤眼決明丸方決明子牛黃別研蕤仁等分上三味搗研為末煉蜜丸如麻子大臨臥時乳汁下二丸隨兒大小加減如熱痛不可忍者用豬膽汁丸立瘥治小兒肝熱眼赤疼痛涼膈退熱白華散方蛤粉水飛研連翹甘草銼白藥子白附子炮等分上五味搗研為散每服半錢匕用麥門冬蜜熟水調下量兒大小加減治小兒目赤腫痛清肝散方芍藥防風去叉各一分大黃銼羌活去蘆頭甘草銼各半兩上五味搗羅為散每服一錢匕水半盞入燈心黑豆各少許煎五七沸去滓食後溫服量兒大小加減治小兒風熱眼赤痛敗毒湯方大黃銼碎麩炒甜硝別研甘草炙銼各二兩陳橘皮去白焙三兩上四味粗搗篩每服一錢匕水七分入薄荷三葉煎至四分去滓食後量兒大小加減服無薄荷入乳香亦得治小兒赤眼朴硝膏點方朴硝燒令乾一分黃連去須三分上二味搗為粗末綿裹以乳汁浸之點眼良治小兒眼爛眥癢痛淚出不能視物風傷則痛黃連膏方黃連去須三分大銅錢七文白礬燒灰一分上三味以水並白蜜各三合用銅器盛於飯上炊一次綿濾去滓貯瓷合內點眼治小兒眼赤痛不開洗眼生地黃湯方生乾地黃二兩決明子黃芩去黑心竹葉各一兩芍藥半兩上五味細銼以水二升煮五六沸去滓澄清洗眼一日三次大人通用治小兒赤眼黃柏湯洗方黃柏去粗皮銼秦皮各一兩銼蕤仁去皮半兩上三味粗搗篩每用兩匙頭以水一碗入干棗三枚同煎三五沸去滓適寒溫洗眼治小兒目暴赤痛鉛丹丸洗眼方鉛丹一兩再研上一味用白沙蜜調如稀糊同入銀器內攪勻妙候鉛丹紫色可丸即丸如皂子大每用一丸沸湯化乘熱淋洗治小兒目赤澀痛漸生翳膜昏暗大黃丸方大黃銼鬱金人參黃連去須各二錢上四味搗羅為末研鼠肝和丸如緑豆大每服三丸米泔下奶食後服量兒大小加減小兒聤耳百蟲入耳附論曰腎氣通於耳心寄竅於耳疏通不窒則其聽為聰小兒心臟熱實貫沖耳脈開竅者塞結而為腫或生膿汁故謂之聤耳或因沐浴水入耳內停積不化亦為聤耳久不治則致聾聵治小兒聤耳汁出不止礬石散方白礬熬令汁枯龍骨鉛丹炒各半兩麝香竹蚛末各一分上五味同搗研細先用綿杖子拭乾耳內以藥少許摻之治小兒聤耳出膿汁疼痛不可忍者竹蚛散方竹蚛糞一兩白礬熬令枯半兩雄黃二錢麝香一字上四味同研勻細先用綿裹杖子拭乾耳中次以藥少許摻之治小兒聤耳膿血塞耳赤石脂散方赤石脂白礬熬令汁枯黃連去須烏賊魚骨去甲各一分上四味搗研為散每取少許綿裹塞耳中大人可用一錢匕一方無赤石脂有龍骨治小兒聤耳夜明砂散方夜明砂二錢麝香一字上二味同研極細先以綿杖子拭去膿用藥半錢匕摻入耳中治小兒聤耳出膿螵蛸散方桑螵蛸須桑上者微炙末之上一味入麝香少許同研先用物拭膿淨然後摻藥治小兒耳聾膿出久不瘥者紅白散方白礬熬令汁枯染胭脂上二味等分研為細末先以綿杖子纏去膿極干用藥半錢匕摻之不過三兩次治小兒水入耳內膿出疼痛日夜不止如聖散方箭簳內蚛末如有蟲子同研令細用三錢膩粉麝香各一錢研上三味同研細先以綿杖子拭耳干取藥三剜耳子深摻入耳以綿塞定如覺刺扎即是惡物要出去綿側耳令出甚者三度瘥大人亦可用治聤耳有膿水狼牙散方狼牙白蘞竹蛀屑各一分上三味搗研細每用少許摻耳內治聤耳膿水不絶礬脂散方白礬熬令汁枯松脂木香花胭脂各一分上四味搗羅為散每用綿拭膿後滿耳填藥治小兒聤耳汁方黃連去須三分龍骨燒研半兩烏賊魚骨去甲一枚炙上三味搗研為末麻油調少許日三四度點耳中治小兒聤耳汁出漬外生瘡雄黃散方雄黃研一兩黃芩去黑心曾青研各半兩上三味搗研為散以少許摻外瘡更用綿裹一大豆許塞耳中日再換之治小兒蚰蜒入耳胡麻枕耳方胡麻不拘多少上一味先熬後搗貯以葛囊枕之即出治小兒飛蟲入耳雄黃油方雄黃一分上一味研細以麻油調抹耳中治小兒蟲入耳桃心塞耳方桃心葉二七葉焙胡麻子一升炒上二味先以桃葉塞耳中其蟲必出如不出以胡麻子炒令香以葛袋盛枕頭耳中蟲自出治蟻子入耳方炙肉上一味安在耳邊蟻子自出又方韭上一味搗絞取汁滴耳中又方藍青上一味搗絞取汁滴耳中又方蔥上一味取涎滴耳中
