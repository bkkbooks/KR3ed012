body:
  text: 卷第一百一十目內生瘡論曰目內生瘡者以脾臟毒熱熏蒸於上鬱而不散遂令瞼內瘡生其初患時或癢或痛發歇無常或多眵淚眥間如丹砂色於是漸有翳膜龍木論謂不宜點藥針灸惟宜服瀉脾清膈之劑蓋蕩滌本源當如是也治眼內生瘡爛赤癢畏風決明散方石決明刮洗淨二兩研麥門冬去心焙菊花各一兩白附子炮半兩枸杞子沉香銼秦皮去粗皮銼巴戟天去心桂去粗皮牛膝酒浸切焙梔子仁羌活去蘆頭各三分上一十二味搗羅為散每服三錢匕空心菊花湯調下臨臥再服治目生瘡疼痛赤腫心躁視物不明蕤仁丸方蕤仁去皮決明子微炒秦皮去粗皮銼車前子甘菊花黃連去須防風去叉藍實槐子各一兩半柴胡去苗人參白茯苓去黑皮山芋芎藭大黃銼炒令香各一兩甘草炙一兩半上一十六味搗羅為末煉蜜為丸如梧桐子大每服三十丸空心米飲下治肝肺熱毒氣攻兩眼生瘡赤痛決明子丸方決明子微炒菊花秦皮去粗皮銼黃連去須各一兩車前子地骨皮各一兩半羚羊角屑黃芩去黑心葳蕤山梔子去皮生乾地黃焙秦艽去苗土各一兩青葙子白茯苓去黑皮各一兩半升麻一兩上一十五味搗羅為末煉蜜為丸如梧桐子大每服三十丸食後溫水下臨臥再服治風熱上攻目瞼生瘡疼痛不止犀角湯方犀角屑黃連去須大黃銼炒令香甘草炙銼青竹茹各一兩秦皮去粗皮銼半兩上六味粗搗篩每服三錢匕水一盞煎至六分去滓投芒硝半錢匕放溫食後服臨臥再服治肝心熱毒目生瘡及磣痛梔子湯方梔子仁半兩犀角屑一兩木通銼黃芩去黑心各半兩大黃銼炒瞿麥穗各一兩黃連去須三分車前子一兩上八味粗搗篩每服五錢匕水一盞半入竹葉七片煎至八分去滓投芒硝半錢匕放溫食後服臨臥再服治風熱目赤生瘡點眼蕤仁膏方蕤仁去皮研如膏半兩青鹽末一錢龍腦少許上三味同研用兒孩子乳汁少許調和如膏每以麻子大日三五上點之治眼熱赤生瘡退翳清涼包子方黃連一分細為末宣州者上一味用新水一碗面東撲取倒流水些小將黃連末勻滲在碗內用熟艾一塊如雞子大安在古老錢七文上四面更用青銅錢四十文足作垛子復黃連碗在上點火燒艾候煙盡便掃下黃連末用夾絹袋子盛了取兒孩子奶汁浸時時點在眼中覺口中苦透為度如暴赤眼用之立效治赤眼生瘡腫痛搐鼻散方道人頭三兩細為末乳香一錢上二味為末每用一錢香餅子上燒煙搐鼻內治赤眼有瘡及生胬肉日夜難開痠痛點眼獖豬膽方獖豬膽乾者如棗許大杏仁湯浸去皮研七枚朴硝一錢龍腦一字上四味先將杏仁入乳鉢中研令細次下三味同研以合盛經一宿每點如黍米大內目眥中眼中冷淚出至一十日自瘥慎之其藥密復勿令見風治眼風赤澀隱腫疼生瘡點眼黃連散方黃連去須末蕤仁去皮各一分胡粉一錢上三味先將蕤仁去膜於銅器中用槐木杵研令極細如粉次入黃連末胡粉合和更研取細為度每夜臥點一黍米在目眥頭不過三兩上瘥治肝虛風癢生瘡淚多者點眼蕤仁膏方蕤仁去皮研一分胡粉如棋子許大於火上燒變赤如金色者佳龍腦一錢上三味先將胡粉蕤仁別研取好真酥如杏核許同研次入龍腦研令極細如膏用油帛裹或銅合子盛勿泄氣受風或有小兒胎赤並大人久患赤癢眼痛宜先取鹽花少許用酸漿水一升煎至五沸以綿濾取汁夜臥先以清水洗次以鹽花水洗眼拭令乾以爪甲挑取麻子許點眼眥任眼開合須臾淚出目中涼冷狀若人吹視物漸明目膿漏論曰目膿漏者緣血脈壅熱傳入於足太陽膀胱之經膀胱之脈起於目內眥則令人瞼眥腫癢久即成瘡膿汁時下綿綿不絶如器津漏故謂之膿漏不治則膿毒淹清穿壞白睛黑點相連即難治療治風毒上攻目輪眼爛肉瘡翳生眼睛肉臭若不醫療必不見物羚羊角丸方羚羊角鎊柏皮去粗皮炙防風去叉各一兩半玄參芎藭荊芥穗黃連去須槐子甘菊花防己石決明蕤仁去皮蔓荊子車前子秦艽去苗土各一兩大黃銼炒升麻麥門冬去心前胡去蘆頭人參白檳榔煨各一兩半梔子仁生乾地黃焙陽起石研真珠末研龍腦搗研薔薇根銼各一兩枸杞子一兩半上二十八味搗研為末煉蜜丸如梧桐子大每服三十丸晚食後熟水下治眼漏睛膿出防風湯方防風去叉二兩地骨皮遠志去心人參黃耆銼白茯苓去黑皮各一兩知母大黃銼碎炒各二兩上八味粗搗篩每服一錢匕水一盞煎至五分去滓食後臨臥溫服治睛漏瘡目大眥出膿汁有竅以龍腦散點方龍腦研馬牙硝各半錢緑豆粉一錢上三味同研極細用燈心黏藥點之日四五上治眼漏睛有膿出經年不絶馬齒散尉方馬齒子半合人莧子半合上二味搗羅為末入銀石器中於飯甑上蒸以綿裹尉眼大眥頭淚孔有膿水出處凡尉眼時須藥熱尉透睛三五十度膿水自絶目生珠管論曰目生珠管者風熱痰飲漬於肝血氣蘊積津液結聚所由生也肝藏血故肝受血而能視氣調血和則精華見於目今邪乘於肝肝氣受病為風熱熏蒸痰飲漸漬使血氣壅閼上衝於目津液結聚狀如珠管故以名焉治目生珠管及膚翳龍腦煎方龍腦研膩粉研各一錢馬牙硝秦皮防風去叉黃連去須各一兩上六味先搗後四味碎用新汲水兩碗浸藥兩復時煎取一小盞綿濾去滓澄清瓷瓶內盛之後入龍腦膩粉候一宿可點治目卒生珠管滑石散方滑石龍骨各一分手爪甲燒半分上三味細研如粉以新筆染藥點珠管上日三四次治眼生膚翳垂珠管銅青丸方銅青一兩細墨半兩上二味合研為末醋和丸如白豆大每用一丸以乳汁新汲水各少許浸化以銅箸點之治目生珠管貝齒散方貝齒燒研丹砂研各一分上二味重研勻細每用點珠管上日三四次治眼卒生珠管鉛丹膏方鉛丹半兩鯉魚膽汁量鉛丹多少用上二味合調如膏點注目眥中日三五次治目卒生珠管方白蜜上以少許點目中仰臥令淚出半日許洗之又方龍骨一兩上一味搗羅為散每點少許珠管上日三五次又方牛膝葉根不計多少上搗絞取汁點珠管上日三次兼治赤目良斑豆瘡入眼論曰傷寒熱毒氣盛發於肌肉作斑豆不已則上熏眼目腫澀而痛片見黃赤若玳瑁色或碎如粟粒是也點藥入眼必致損爛惟宜服利脾肺解熱毒之藥亦可敷藥於眼瞼上下稍削其勢治斑瘡後翳膜忽生及風毒暴赤等眼羚羊角飲方羚羊角一對鎊取細末車前子決明子微炒防風去叉升麻黃耆銼大黃銼炒黃芩去黑心芒硝各二兩上九味粗搗篩每服三錢匕水一盞煎至七分去滓傾入瓷瓶內用油單紙封系懸在井中一宿至次日取出微暖動臨時徐徐呷不得枕頭睡至明見效如勢不可緩急要服者空心日午各一服治斑瘡入眼決明散方決明子微炒一兩半秦皮銼甘菊花各一兩細辛去苗葉三分羚羊角鎊一兩赤芍藥一兩半麥門冬去心焙升麻黃芩去黑心黃連去須各一兩朴硝研一兩半甘草炙一兩上一十二味搗研為散每服二錢匕食後以溫米泔調服臨臥再服治斑瘡入眼茯神湯方茯神去木赤芍藥葛根銼各一兩升麻地骨皮銼黃芩去黑心各一兩半大黃銼炒一兩上七味粗搗篩每服四錢匕水一盞半煎至八分去滓溫服食後臨臥服治斑豆瘡入眼黃芩湯方黃芩去黑心梔子仁黃連去須葳蕤升麻蕤仁去皮甘草炙銼並等分上七味粗搗篩每服四錢匕以水一盞半煎至八分去滓溫服食後臨臥各一治斑豆瘡入眼宜服去脾肺熱毒氣柴胡湯方柴胡去苗黃芩去黑心梔子仁赤芍藥升麻麥門冬去心甘草炙銼等分上七味粗搗篩每服五錢匕水一盞半煎至一小盞去滓放溫食後臨臥服治眼內有瘡但睛不損者並可療蒺藜子丸方蒺藜子炒去角一兩兔糞喂黑豆後收者二兩焙蟬蛻去土炒蛇蛻炙木賊以合盛之略燒存性為末決明子微炒各一兩上六味搗羅為末用淡豆豉一兩白麵一匙先爛研豉入水和麵煮糊丸如梧桐子大每服用淡竹葉湯下十丸加至二十丸早晚食後治斑瘡入眼黃連湯方黃連去須細辛去苗葉紫菀去苗土決明子微炒車前子苦蕒根乾者銼碎等分上六味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服食後臨臥治豆瘡入目生翳纍醫不效者膩粉膏方膩粉水銀粉霜各一分上三味用瓷鉢令男子溺六十日後用銚子內鋪紙一重襯三味藥以濕紙冪銚面中心留一竅如指大以前瓷鉢復之用濕紙封縫更以濕沙厚擁四面鉢上置水一盞慢火熬候乾冷取鉢掃取水銀令患者就病目臥取藥半豆大內在耳中少時目癢揉之翳隨手落避風將息三兩日治麩豆瘡入眼宜外貼黃藥膏方黃藥子木香各一兩大黃三兩生用上三味搗研為細散更重研令勻細每用時以漿水調為膏攤生絹上貼眼瞼上下不得入眼內干即易治斑瘡入眼及諸般眼疾硇砂散方硇砂明淨者生用一字硼砂半錢龍腦一錢上三味各研為末再同研令勻細每以少許滲放翳上日三四次治豆瘡入眼睛上作白翳遮障不明刺痛不可忍者神聖粉方輕粉一分上一味用少炭灰滲地面如盎大次燒小木炭十數片簇定吹令火盛即傾粉其上以新大瓷盎一隻蓋之四下速撥灰塞縫勿令煙透更滴十數滴冷水於盎底候冷取起盎見粉煙飛黏盎內旋以指點水刮洗下用兩重楮紙裹盛絞出水銀珠子如赤豆大以指甲挑入不病眼邊耳內須側臥搖令藥到耳底以軟紙塞耳當時不痛即開得眼或未效次日再如前法煅取一豆大挑入病眼邊耳內立效雀目論曰晝而明視暮不睹物名曰雀目言如鳥雀不能有見於夜也夫衛氣晝行於陽夜行於陰陰血受邪肝氣不能上榮於目肝受血而能視今邪在於肝陰血澀滯至暮則甚故遇夜目睛昏不能睹物世謂之雀目治雀目防風煮肝散方防風去叉黃連去須穀精草黃芩去黑心甘草銼炙天南星炮各一兩蛤粉半分上七味搗羅為細散每服一錢匕用羊子肝一片銅竹刀批開滲藥在內以麻縷纏定研粟米飯一大盞銀石鍋內煮熟放溫臨臥嚼服切不得犯鐵器病甚者不過再服必效治雀目鬱金散方鬱金三兩新牛膽一枚豬膽二枚蛤粉研三兩大黃銼炒半兩黃連去須半兩雄黃研一分上七味將五味為細散並豬膽拌和入牛膽中填滿陰乾為細散每服大人一錢匕小兒半錢匕食後新汲水調下赤眼氣眼疳眼亦能治之治雀目年深不瘥鉛丹丸方鉛丹半兩黃芩去黑心一兩蛤粉一兩半上三味搗研為細末別熔黃蠟一兩入藥內同研勻更入薄麵糊丸如彈子大批豬肝作薄片裹藥米泔煮肝熟為度爛嚼用煮肝米泔湯下空心食前服臨臥再服治雀目及內外障眼風毒青盲暴赤眼等空青散方羊梅青好者水浴過控乾研胡黃連水浴過為細末各一分槐牙初出如雀舌時於日未出勿食不語摘之不計多少入一青竹筒內不令雞犬等見垂於天月德上候乾為末一錢半上三味同研勻細如粉入龍腦一字許更研勻密收每夜臥時先溫水淨漱口仰面臥用葦筒子吹藥一字入兩鼻中但令如常喘息便自睡著眼中覺涼冷為妙隔夜一次用之極效治雀目不拘年月遠近但黃昏不見物者蛤粉丸方蛤粉好者研極細黃蠟等分上二味先熔蠟入蛤粉拌和丸如梧桐子大用獖豬子肝一片以箸札作孔子捏藥丸入孔中以麻縷纏系周遍用清水煮熟取出切作薄片熱吃仍將煮藥湯熏眼百無所忌治雀目咫尺不見物煮肝散方紫芥菜子真者炒令黑色碾為細散用羊肝一具分作八服每用散三錢捻在肝上外托荷葉裹煮令熟放冷服以煮肝湯下不過一具肝永除根本臨臥時服治肝虛雀目夜不見物如聖散方蛤粉青葙子石決明各半兩上三味為細散用牛肝二兩批開滲藥