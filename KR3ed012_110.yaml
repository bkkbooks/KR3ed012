方大黃銼炒一兩半桔梗銼炒黃芩去黑心玄參羚羊角鎊人參白茯苓去黑皮各一兩上七味搗羅為散每服一錢半匕至二錢匕食後臨臥米飲調下日三治風熱客搏眼瞼腫硬洗眼秦皮湯方防風去叉秦艽去苗土甘菊花各二兩蕤仁湯浸去皮梔子仁葳蕤各半兩竹葉一握上七味細銼令勻每用一兩以水三盞煎取一盞半綿濾去滓每暖洗訖避風治眼瞼腫硬癢痛洗眼防風湯方秦皮黃連去須細辛去苗葉各二兩黃柏半兩青鹽一兩上五味銼令勻每用一兩以水三盞煎取一盞半綿濾去滓乘熱通手洗眼了避風日三再暖洗之倒睫拳攣論曰臟腑久積風熱內熏肝經沖發於目始則腫赤隱痛多淚日久津液澀少瞼眥皮急致睫拳倒刺隱磨瞳仁治法當起立毛睫又刺太陽經令出血及鈹鐮除其惡血仍服除風退熱之劑治眼瞼緊急倒睫拳攣犀角芎藭散方犀角鎊芎藭羚羊角鎊木香檳榔煨銼茯神去木山芋前胡去蘆頭牛膝去苗桂去粗皮枳殼去瓤麩炒大黃銼炒等分上一十二味搗羅為散每服三錢匕空心食前溫酒調下治倒睫拳攣眼如針刺目系急磣多生眵淚木通湯方木通銼麥門冬去心焙旋覆花黃芩去黑心茯神去木各一兩大黃銼炒三分上六味粗搗篩每服五錢匕水一盞半煎至八分投生地黃自然汁一合更煎取沸入朴硝末一字食後臨臥溫服治風熱沖肝目多倒睫防風湯方防風去叉甘菊花旋覆花決明子微炒麥門冬去心焙梔子仁葳蕤升麻秦皮去粗皮銼黃連去須甘草炙等分上一十一味粗搗篩每服五錢匕水一盞半煎至八分去滓食後臨臥溫服治目漸致倒睫隱澀疼痛菊花散方菊花羚羊角鎊蔓荊實各三分玄參半兩防風去叉芍藥各一兩半子芩一兩上七味搗羅為散每服二錢匕水一盞煎至六分不去滓入馬牙硝末一字打勻食後臨臥溫服治倒睫赤眼疼痛不開車前散方車前子二兩馬蹄決明微炒蕤仁各一兩半龍膽地膚子菊花甘草炙銼各半兩青葙子山梔子仁各一兩前胡去蘆頭三分上一十味搗羅為散每服二錢至三錢匕空心粟米飲調下食後臨臥再服治倒睫拳攣隱磨瞳仁決明丸方決明子微炒車前子山梔子仁枸杞子熊膽汁乾者亦得各半兩黃連去須牽牛子炒熟甘草炙銼各三分牛膽汁半合豬膽汁五枚上一十味搗羅七味為末及三味膽汁和丸如梧桐子大每服三十丸食後溫熟水下隨膽汁多少以丸得為度如硬入煉蜜少許不妨治風熱攻目磣澀疼痛致倒睫洗眼蕤仁湯方蕤仁秦皮去粗皮銼防風去叉各一兩菊花山梔子仁葳蕤各半兩竹葉二握上七味細銼以水三升煎取一升半去滓乘熱淋洗冷即再暖作三度使治倒睫拳攣目眥赤爛二黃丸方黃連去須一兩半大黃銼炒一兩細辛去苗葉龍腦各半兩上四味搗羅為末煉蜜和丸如梧桐子大每服二十丸食後臨臥溫熟水下日再小兒量減
