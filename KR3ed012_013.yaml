body:
  text: 卷第一十三漏風論曰內經曰飲酒中風則為漏風漏風之狀或多汗常不可單衣食則汗出甚則身寒喘息惡風衣常濡口乾善渴不能勞事又曰身熱解惰汗出如浴惡風少氣病名酒風夫酒所以養陽酒入於胃與穀氣相搏熱盛於中其氣剽悍與陽氣俱泄使人腠理虛而中風故其證多汗惡風不可單衣其喘息而少氣者熱熏於肺風客於皮毛故也口乾善渴者汗出多而亡津液故也解惰而不能勞事者精氣耗竭不能營其四肢故也謂之漏風者汗出不止若器之漏久而不治轉為消渴治酒風身熱解惰汗出如浴惡風少氣澤瀉散方澤瀉白朮各二兩半糜銜銼一兩一分上三味搗羅為散每服二錢匕沸湯調食後服治風虛汗出不止秦艽散方秦艽去苗土附子炮裂去皮臍石斛去根菖蒲白朮桂去粗皮各三分麻黃根防風去叉各五分上八味搗羅為細散每服一錢匕溫酒下日三治風虛多汗夜臥尤甚床蓆衣被盡濕黃耆湯方黃耆銼人參各二兩麻黃根牡蠣煅赤各三兩枸杞根白皮二兩半龍骨四兩上六味粗搗篩每服三錢匕水一盞大棗一枚劈破同煎去滓取六分空心服日三治風虛多汗惡風防風散方防風去叉一兩一分澤瀉牡蠣煅赤桂去粗皮各三分上四味搗羅為細散每服二錢匕溫酒調下空心服日再治風虛汗出不止桂心散方桂去粗皮白朮秦艽去苗土石斛去根附子炮裂去皮臍各三分上五味搗羅為細散每服二錢匕溫酒調下空心服治風虛多汗惡風寒顫澤瀉散方澤瀉防風去叉牡蠣煅赤蒼朮米泔浸去皮炒各一兩桂去粗皮三分上五味搗羅為細散每服二錢匕溫粥飲調下不計時治風虛汗出熱悶甚者人參散方人參二兩牡蠣煅赤一兩半石膏碎三兩甘草炙銼一兩上四味搗羅為細散每服二錢匕溫酒水下不計時候治風虛汗出不止石膏散方石膏碎甘草炙銼蒼朮米泔浸去皮銼炒微黃麻黃根各一兩上四味搗為細散每服二錢匕以漿水調下食前服日三夜再治風虛多汗夜臥尤甚杜仲散方杜仲去粗皮炙銼二兩黃耆銼牡蠣煅赤各三兩麻黃根五兩上四味搗羅為細散每服二錢匕煎敗扇湯調下食後服日二治大虛汗出欲死若自汗不止麻黃根散粉方麻黃根附子炮裂去皮臍牡蠣煅赤各等分上三味搗羅為細散每用一兩以白粟米粉一升拌和令勻以粉汗處治風虛多汗牡蠣散粉方牡蠣煅赤二兩麻黃根三兩上二味搗羅為細散以絹袋盛之粉身日三五次有汗即粉無汗即止治風虛多汗少氣牡蠣白朮散方牡蠣煅赤三兩白朮二兩一分防風去叉二兩半上三味搗羅為細散每服二錢匕溫水調下不計時惡風倍防風少氣倍術汗多面腫倍牡蠣治虛汗麻黃根散方麻黃根一兩半故敗扇燒灰半兩上二味搗羅為細散每服三錢匕以牛乳調下食後服治漏風汗出不止附子湯方附子一兩半炮裂去皮臍蜀椒去目並閉口炒出汗半兩杏仁去皮尖雙仁炒出汗半兩白朮二兩上四味銼如麻豆以水五升煮至二升去滓分溫四服日三夜一治漏風汗出不止四神散方附子一枚炮裂去皮臍乾薑炮半兩桂去粗皮一分甘草半兩半生半炙上四味搗羅為散拌勻以熱酒一升投之旋旋溫服令盡可均作一日服如飲酒不得用沸湯服之亦得風消論曰內經謂二陽之病發心脾有不得隱曲女子不月其傳為風消夫腸胃發病傳於心脾心主血心病則血不流脾主味脾病則味不化而精不足精血不足故其證不能隱曲女子不月既久則傳為風消也蓋精血已虧則風邪盛而真氣愈削也治心脾受病精血虛少風氣乘之日益消削黃耆羌活飲方黃耆一兩半羌活去蘆頭一兩石斛去根防風去叉枳殼去瓤麩炒人參附子炮裂去皮臍茯苓去黑皮五味子牛膝酒浸切焙各一兩續斷半兩地骨皮三分生乾地黃切焙二兩牡蠣熬一兩上一十四味銼如麻豆每服五錢匕水一盞半煎取一盞去滓溫服治風消肢體痠疼血脈枯耗排風湯方防風去叉當歸洗切焙白蘚皮白朮芍藥桂去粗皮芎藭獨活去蘆頭杏仁去皮尖雙仁炒別研枸杞根銼茯神去木麻黃去根節先煎掠去沫焙各一兩上一十二味除杏仁外粗搗篩入杏仁和勻每服三錢匕以水一盞生薑三片煎至七分去滓空腹溫服日晚再服治風消四肢無力胸膈煩悶薑黃湯方薑黃一兩沉香銼三分黃耆銼一兩桂去粗皮半兩延胡索人參厚朴去粗皮塗生薑汁炙芎藭防風去叉芍藥各三分杏仁湯浸去皮尖雙仁別研羌活去蘆頭訶黎勒煨去皮各半兩上一十三味除杏仁外粗搗篩入杏仁和勻每服三錢匕旋汲井華水一盞煎至七分去滓溫服不拘時治風消氣血虛弱黃耆湯方黃耆薄切犀角鎊各一兩白茯苓去黑皮人參各一兩半柴胡去苗升麻秦艽去苗芎藭木香桑根白皮銼枳殼去瓤麩炒防風去叉芍藥黃芩去黑心肉豆蔻去殼炒天麻鱉甲醋浸炙去裙襴地骨皮甘草炙銼各一兩羌活去蘆頭當歸切焙青橘皮去白切炒各三分檳榔銼桔梗去蘆頭炒各半兩上二十四味粗搗篩每服三錢匕以水一盞煎至七分去滓空腹溫服治風消五補人參丸方人參白茯苓去黑皮黃耆薄切地骨皮熟乾地黃焙乾各一兩上五味搗羅為末煉蜜丸如梧桐子大每服二十丸溫酒下夜臥時服治風消五勞七傷等太和湯方前胡去蘆頭枇杷葉拭去毛鱉甲醋炙白茯苓去黑皮桔梗去蘆頭炒白芷五味子白朮厚朴去粗皮生薑汁炙半夏湯洗去滑京三稜煨銼藿香去梗防風去叉各一兩人參三分柴胡去苗半兩桂去粗皮一兩半桑白皮銼當歸切焙芍藥枳殼去瓤麩炒牡丹皮甘草炙銼知母焙杏仁去皮尖雙仁麩炒各半兩上二十四味粗搗篩每服三錢匕水一盞生薑三片煎至七分去滓溫服治風消血氣虛損攻刺疼痛四肢無力多困黃瘁胸膈痞悶或大便多秘或時泄利人參荊芥湯方荊芥穗二兩芍藥天麻芎藭當歸洗切焙京三稜煨銼黃耆薄切鱉甲醋浸去裙襴炙牛膝去苗酒浸切焙各一兩木香半兩熟乾地黃切焙柴胡去苗各一兩半防風去叉牡丹皮大腹皮各三分枳殼去瓤麩炒三兩半夏為末生薑汁作餅曝乾一兩秦艽去苗土一分人參石膏碎研白朮羌活去蘆頭款冬花擇陳橘皮去白切炒各半兩上二十四味粗搗篩每服三錢匕生薑二片棗一枚去核同煎七分去滓空心日午臨臥服治風消經久不瘥漸成五勞七傷小腹拘急四肢痠疼面色黧黑唇口乾燥目暗耳鳴心忪氣短夜夢驚恐精神困倦喜怒無常悲憂不樂飲食無味舉動乏力心腹脹滿腳膝痿緩小便滑數房事不舉股內濕癢水道澀痛小便出血時有遺瀝菟絲子丸方菟絲子酒浸別搗桂去粗皮鹿茸去毛酥炙附子炮裂去皮臍澤瀉石龍芮各一兩肉蓯蓉酒浸切焙杜仲去粗皮銼炒白茯苓去黑皮熟乾地黃洗焙巴戟天去心防風去叉山茱萸補骨脂炒蓽澄茄沉香銼蘹香子炒石斛去根牛膝酒浸切焙續斷各三分桑螵蛸酒浸炒芎藭覆盆子擇五味子各半兩上二十四味搗羅為末以酒煮麵糊丸如梧桐子大每服二十丸溫酒或鹽湯下空心日午服如腳膝無力木瓜湯下熱毒風論曰熱毒風之狀頭面腫熱心神煩躁眼目昏暗時復語澀痰黏口乾皮膚壯熱肢節疼痛是也皆由臟腑虛弱風邪因入客於心胸或服熱藥與飲酒過度心肺壅滯熱積不散故其證如此治熱毒風發起即欲臥臥即欲起心神煩悶麥門冬丸方麥門冬去心焙地骨皮山芋山茱萸蔓荊實去白皮人參防風去叉沙參芍藥枳殼去瓤麩炒升麻赤茯苓去黑皮甘菊花玄參羌活去蘆頭各三兩龍膽半兩上一十六味搗羅為末煉蜜丸如梧桐子大每服二十丸至三十丸溫酒下治熱毒風頭面瘙癢狀如蟲行時發風疹蒺藜子丸方蒺藜子炒獨活去蘆頭白芷防風去叉枳殼去瓤麩炒山芋地骨皮各三分人參一兩葳蕤桂去粗皮黃連去須各半兩上一十一味搗羅為末煉蜜丸如梧桐子大每服二十丸空心溫酒下加至三十丸治熱毒風攻身體狀如蟲行頭面腫熱心神煩悶皮膚斑點旋生旋沒天南星丸方天南星炮天麻酒浸切焙白附子炮羌活去蘆頭白殭蠶炒白花蛇酒浸去皮骨炙麻黃去節先煎掠去沫焙各半兩犀角鎊三分槐實炒槐膠生用各半兩生梔子仁一兩羚羊角鎊三分上一十二味搗羅為末粟米飯丸如梧桐子大陰乾每服十五丸至二十丸空心臨臥用蔥白酒下治熱毒風皮膚壯熱心神煩躁口乾面熱肢節疼痛黑豆飲方黑豆半升炒熟防風去叉一兩羌活去蘆頭甘草炙銼各半兩上四味粗搗篩每服五錢匕水一盞半生薑三片煎取一盞去滓溫服食後臨臥治熱毒風心肺壅滯胸膈煩悶大小便難木香丸方木香芎藭羌活去蘆頭檳榔生銼桂去粗皮各二兩大黃銼炒郁李仁湯浸去皮尖麩炒研如膏各四兩上七味搗羅六味為末與郁李仁和勻煉蜜丸如梧桐子大每服二十丸漸加至三十丸用溫酒或生薑湯下空心臨臥治熱毒風攻注四肢𤸷痹皮膚瘙癢筋脈拘急言語謇澀天麻散方天麻白附子炮羌活去蘆頭防風去叉牛膝酒浸切焙麻黃去節先煮掠去沫焙芎藭獨活去蘆頭當歸切焙桂去粗皮各半兩蒺藜子炒一兩半白蘚皮黃芩去黑心秦艽去苗土升麻各一兩上一十五味搗羅為散每服二錢匕食後良久溫酒調下漸加至三錢匕治熱毒風上攻頭旋目痛耳鳴或頭面癮疹四肢不遂羚羊角湯方羚羊角鎊一分防風去叉羌活去蘆頭各半兩甘菊花未開者一兩半前胡去蘆頭藁本去苗土玄參黃芩去黑心杏仁去皮尖雙仁炒甘草炙銼菖蒲去須節切焙半兩上一十一味粗搗篩每服五錢匕以水一盞半煎取一盞去滓每食後良久服治熱毒風上攻頭旋倒僕或吐不止畏見日光不喜喧處不欲飲食時時發動旋覆花湯方旋覆花一兩前胡去蘆頭半兩甘菊花未開者一兩半防風去叉生乾地黃洗切焙羌活去蘆頭杏仁湯浸去皮尖雙仁炒各一兩玄參白殭蠶炒黃芩去黑心半夏為末薑汁作餅曝乾白朮藁本去苗土甘草炙銼當歸切焙人參赤茯苓去黑皮各半兩上一十七味粗搗篩每服五錢匕以水一盞半煎去一盞去滓食後良久服日二治熱毒風攻心煩悶犀角湯方犀角鎊白蘚皮黃芩去黑心玄參鉤藤各一兩半葛根二兩石膏碎三兩上七味粗搗篩每服三錢匕水一盞煎至七分去滓入竹瀝少許再煎一二沸食後服治熱毒風下攻腳膝及筋骨日夜煩疼不可忍者虎骨湯方虎酥炙一兩半桂去粗皮半兩生乾地黃洗切焙羌活去蘆頭赤芍藥各一兩上五味粗搗篩每服五錢匕水一盞酒半盞同煎至一盞去滓空腹溫服有頃再服治熱毒風瘡疥黃耆湯方黃耆銼黃連去須大黃銼炒芎藭甘草炙各一兩鶴蝨紅藍花炒各半兩連翹防風去叉羌活去蘆頭牽牛子炒各一兩半上一十一味粗搗篩每服三錢匕水一盞入生薑三片煎至七分去滓溫服治熱毒風攻頭面唇口腫痛咽喉腫塞或目澀疼羚羊角煎方羚羊角鎊菊花各半兩玄參牛膝去苗切焙防風去叉紫參各一分上六味搗羅為末以栝蔞汁一升酒半升並前六味煎成稀煎瓷合盛每服一匙頭酒調下日夜四五服治熱毒風腫遍身瘡大黃散方大黃銼二兩栝蔞根甘草生銼馬牙硝研各一兩上四味搗羅為散每服二錢匕食後熟水調下治熱毒風胸膈煩滿語澀痰盛筋脈攣急頭目昏痛肢節煩疼羚羊角湯方羚羊角鎊赤茯苓去黑皮細辛去苗葉半夏湯洗七遍生薑汁煮焙藁本去苗土各三分蔓荊實去皮芎藭旋覆花防風去叉甘草炙銼枳殼去瓤麩炒各一兩人參羌活去蘆頭前胡去蘆頭一兩半甘菊花半兩上一十五味粗搗篩每服三錢匕入生薑兩片水一盞半煎至七分去滓早晚食後稍熱服急則不拘時治熱毒風上攻頭旋目眩耳聾心煩手足𤸷痹皮膚瘙