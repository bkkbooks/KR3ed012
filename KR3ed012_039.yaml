body:
  text: 卷第三十九霍亂昏塞下利論曰霍亂昏塞下利者其人脾腎久虛陽氣不足因風冷之氣客於三焦傳於胃腑使水穀不化清濁相干吐利不止致令真氣暴虛陰陽離守神識不明大便遺利無所覺知治霍亂虛寒精神不守泄利不止語聲不出茯苓安心湯方白茯苓去黑皮人參乾薑炮桂去粗皮遠志去心各一兩半甘草炙一兩上六味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服日三不拘時治霍亂下焦虛寒洞泄不止黃柏皮湯方黃柏去粗皮人參地榆銼阿膠炙燥各一兩半厚朴去粗皮薑汁炙白茯苓去黑皮櫸木白皮各二兩艾葉一兩黃連去須二兩半上九味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日三不拘時治霍亂暴利不自知理中湯方人參白朮乾薑炮甘草炙各二兩上四味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服日三治脾胃氣冷霍亂下利不自知訶黎勒丸方訶黎勒皮黃連去須鍾乳粉五倍子白礬燒汁盡各一兩縮沙去皮厚朴去粗皮薑汁炙樗皮當歸切焙酸石榴皮各二兩木瓜切甘草炙橡實各一兩陳橘皮湯浸去白焙炒二兩肉豆蔻去殼炮五枚乾薑炮一兩半胡椒半兩上一十七味為細散先醋煎艾葉一兩去滓取汁煮麵糊丸如梧桐子大每服三十丸煎棗湯下不拘時治霍亂昏塞下利吳茱萸餅方吳茱萸湯洗焙炒厚朴去粗皮薑汁炙陳橘皮湯浸去白焙切炒人參各一兩高良薑胡椒各一分木瓜切香薷各一兩烏牛溺半升上九味先以八味為細末將牛溺捻作餅子曝乾臨用時炙燥再為細末每服二錢匕水一盞煎至七分溫服治霍亂暴利不禁腹中雷鳴烏梅散方烏梅肉炒黃連去須艾葉赤石脂別研當歸切焙甘草炙附子炮裂去皮臍阿膠炙燥二兩上八味為細散每服二錢匕覺冷則酒調下覺熱則熱水調下治霍亂昏塞下利或病後泄瀉黃白無度腹中虛痛黃連湯方黃連去須四兩黃柏去粗皮當歸切焙厚朴去粗皮薑汁炙乾薑炮各三兩地榆阿膠炙燥酸石榴皮各四兩上八味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服不拘時治霍亂下利手足逆冷昏塞不自知龍骨湯方龍骨燒附子炮裂去皮臍各一兩人參乾薑甘草炙各一兩半上五味銼如麻豆每服三錢匕水一盞煎至七分去滓溫服日三治霍亂暴利昏塞不自知吳茱萸散方吳茱萸湯洗焙炒一兩陳橘皮湯浸去白焙二兩上二味為細散每服三錢匕米飲調下不拘時乾霍亂論曰乾霍亂之狀中氣喘爭而不吐不利是也腸胃挾實與冷氣相搏正氣暴衰神志昏冒上下隔塞白汗自出治之稍緩則不可救治乾霍亂大小便不通手足心俱熱悶亂冬葵子湯方冬葵子滑石碎香薷擇各二兩乾木瓜細切去皮瓤一枚上四味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服大小便通利心中快立瘥日四五服治乾霍亂上不得吐下不得瀉但冷汗自出氣悶將絕鹽湯方鹽半匙熬童子小便一盞上二味溫和服少頃吐下愈治乾霍亂紫蘇丸方紫蘇桂去粗皮陳橘皮湯浸去白焙高良薑人參各一兩上五味為細末煉蜜丸梧桐子大才覺食不消氣滿噁心欲吐乾嘔每服二十丸溫酒下日再治乾霍亂厚朴湯方厚朴去粗皮生薑炙三分大黃銼炒二兩檳榔銼枳殼去瓤麩炒朴硝高良薑各三分上六味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服治乾霍亂人參湯方人參厚朴去粗皮生薑汁炙一兩高良薑桂去粗皮各半兩白茯苓去黑皮一兩甘草炙半兩上六味粗搗篩每服三錢匕水一盞生薑三片煎至七分去滓不拘時溫服治乾霍亂不吐不瀉但壅悶脹滿或㽲痛木香散方木香青橘皮湯浸去白焙檳榔生銼大黃銼炒各半兩桔梗銼炒一兩桂去粗皮白朮各三分人參二兩上八味搗羅為散每服二錢匕冷生薑湯調下加至三錢匕以瘥為度治乾霍亂不吐利大黃丸方大黃銼炒一兩乾薑炮半兩桂去粗皮三分巴豆十四枚去皮心膜炒研上四味先搗前三味為細末與巴豆同研令勻煉蜜丸如梧桐子大每服五丸至七丸溫水下服久未動更服三丸以溫粥飲一盞投之取利為效治乾霍亂上氣衝急欲悶絕大小便不通檳榔湯方檳榔七枚銼上一味粗搗篩每服五錢匕水一盞童子小便半盞煎至一盞去滓溫服日再治乾霍亂腹脅脹滿不吐利心胸悶亂不可忍陳橘皮湯方陳橘皮湯浸去白焙三兩蜀椒去目並閉口炒出汗四十粒上二味粗搗篩每服五錢匕水一盞半生薑三片煎至一盞去滓溫服不拘時治乾霍亂黍米飲方黍米二合水淘淨上一味水研澄取白汁呷盡即瘥治乾霍亂不吐利四肢煩疼身冷汗出水蓼飲方水蓼切香薷擇切各二兩上二味以水五盞煎取三盞去滓分溫三服治乾霍亂心腹脹煩滿氣痛不得吐下方鹽一合水一升上同煎令鹽消旋服之吐出便愈若不吐又飲之令吐必瘥治脾元虛損霍亂不吐瀉腹脹如鼓心胸痰壅活命飲方鹽一合生薑半兩甘草炙一分葛根半兩丁香七粒上五味細銼如麻豆用童子小便一盞半煎至一盞去滓分溫二服治乾霍亂不吐不利令人昏冒煩亂氣短上下隔塞冷汗自出二勝散方訶黎勒皮乾薑成塊者各二兩上二味不搗碎同用水二升於銚子內煎水盡為度取出重細切焙乾搗羅為散每服二錢匕陳米飲調下中惡霍亂論曰中惡霍亂者客邪內干正氣暴亂使胃中食物不化氣道否結不得宣通令人心腹猝痛吐利煩悶甚則精神冒昧靡所知識此得之鬼氣所作也治中惡霍亂不識人心痛腹脹不思飲食十香丸方丁香蘇合香白檀香沉香木香莎草根炒去毛白朮銼炒高良薑銼安息香研麝香研熏陸香研丹砂研龍腦研各半兩蓽茇炒訶黎勒煨取皮犀角鎊屑厚朴去粗皮薑汁炙各一兩上一十七味除別研外為細末與別研者藥同研令勻煉蜜丸如梧桐子大每服五丸溫酒下老少加減服之甚者溫酒研下收貯於瓷閤中日四五服以瘥為度治中惡霍亂心痛胸脅㽲痛喘急桃枝湯方桃東行枝白皮一握丹砂碎一兩梔子仁十四枚當歸焙桂去粗皮各三兩附子炮裂去皮臍豉吳茱萸淘炒各一兩上八味銼如麻豆每服四錢匕水二盞生薑三片煎至一盞去滓溫服日三夜一治中惡霍亂垂死丹砂丸方丹砂研半分附子炮裂去皮一分為末雄黃二豆許研上三味以巴豆七粒去心皮別研出油後入諸藥末研令極勻煉蜜丸如麻子大每服三丸米飲下若下利末止加三丸至五丸與少冷粥食之即定治卒中惡霍亂心腹刺痛去惡氣麝香散方麝香研一分犀角鎊屑木香各半兩上三味為細散空心熟水調一錢匕日三治中惡霍亂麝醋方麝香一錢細研上一味和醋半盞調分二服即瘥治中惡霍亂吐利手足麻痹或轉筋白朮湯方白朮銼木瓜去瓤切焙人參各一兩甘草炙乾薑炮各半兩上五味粗搗篩每服三錢匕水一盞生薑三片棗一枚劈同煎七分去滓溫服不拘時治中惡霍亂吐利心煩橘皮湯方陳橘皮湯浸去白焙木瓜切焙桂去粗皮草豆蔻去皮甘草炙各一兩上五味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時治中惡霍亂心腹痛煩悶木香散方木香炮三分檳榔生銼一兩青橘皮湯浸去白焙桂去粗皮桃仁去皮尖雙仁炒研人參各半兩上六味為細末每服二錢匕溫酒調下不拘時霍亂煩渴論曰經曰上焦如霧言五臟津液之所熏蒸其氣潤澤故能分布於諸脈也今霍亂吐利之人重亡津液則臟腑不和上焦熱津液不足故因霍亂而煩渴也治霍亂煩渴吐不止者緣吐利多津液虛少不至上焦故渴人參湯方人參三分烏梅去核二枚上二味粗搗篩每服五錢匕水一盞半竹茹彈子大煎至一盞去滓熱服日四治霍亂心煩渴吐利不下食草豆蔻湯方草豆蔻去皮一分黃連去須一兩上二味粗搗篩每服三錢匕水一盞烏豆五十粒生薑三片煎至七分去滓溫服日三治霍亂吐利四肢煩疼冷汗出多渴香薷湯方香薷二兩蓼子一兩上二味粗搗篩每服二錢匕水一盞煎七分去滓溫服日三治霍亂吐利不止渴甚麥門冬湯方麥門冬去心焙栝蔞仁人參陳橘皮湯浸去白焙各半兩厚朴去粗皮薑汁炙一兩上五味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日三治霍亂津液少渴甚青竹茹湯方青竹茹一雞子大人參半兩烏梅去核二枚上三味粗搗篩水三盞煎取一盞去滓分溫三服不拘時治霍亂吐利渴燥不止人參湯方人參三分葛根銼白朮桔梗去蘆頭銼炒赤茯苓去黑皮各半兩上五味粗搗篩每服三錢匕漿水一盞煎至七分去滓溫服治霍亂渴甚糯米飲方糯米淘二升上一味淘取泔飲之即定又方上研糯米取白汁恣意飲之治霍亂吐下大渴多飲粱米飲方黃粱米淘五升上一味以水一斗煮取五升澄清稍溫飲之糯米飲亦得治霍亂吐不止兼渴姜藕飲方生藕一兩洗切生薑一分洗切上二味研絞取汁分三服不拘時治霍亂吐瀉渴燥煩悶不止肉豆蔻丸方肉豆蔻去殼炮丁香甘草炙陳橘皮湯浸去白焙高良薑藿香葉各半兩上六味為細末用棗肉丸如梧桐子大每服二十丸至三十丸溫生薑米飲下不拘時治霍亂吐逆冷熱不調心膈煩滿咽乾多渴藿香湯方藿香葉三分枇杷葉炙去毛陳橘皮湯浸去白焙丁香各半兩厚朴去粗皮生薑汁炙二兩白茅根乾木瓜麥門冬去心各一兩甘草炙一兩半上九味粗搗篩每服三錢匕水一盞生薑三片煎至七分去滓早晚食前溫服治霍亂煩渴喘促無力食即嘔吐木瓜湯方木瓜一兩木香檳榔生薑各半兩甘草炙一分黑豆炒一合人參三分上七味銼如麻豆每服五錢匕水一盞半煎取一盞去滓早晚食前溫服治霍亂吐利煩渴不止木瓜湯方木瓜一枚無生者乾者亦得桂去粗皮二兩上二味㕮咀如麻豆大每服五錢匕水一盞半煎至八分去滓溫服一方以豆蔻代桂霍亂心煩論曰霍亂心煩者緣心下有水水害心火其氣不宣故令人心煩悶亂而不安也蓋胃土氣衰不能運化飲食氣鬱於中使清濁不分陰陽干擾故霍亂而神情煩躁也治霍亂心煩坐臥不安麥門冬湯方麥門冬去心焙茯神去木人參陳橘皮湯浸去白焙甘草炙各一兩上五味粗搗篩每服三錢匕水一盞入生薑半分小麥五十粒竹葉十片煎至七分去滓溫服不拘時治霍亂吐利後心煩亂髮湯方亂髮一團如雞子大燒存性吳茱萸湯浸焙乾三分甘草炙人參各一兩上四味粗搗篩每服五錢匕水一盞酒半盞煎至八分去滓溫服日三治霍亂心煩蘆根飲方蘆根銼焙一兩一分人參水萍紫者焙乾枇杷葉拭去毛各一分上四味粗搗篩每服五錢匕入薤白四寸拍破水一盞半煎至八分去滓溫服日三治霍亂吐後煩滿嘔逆橘皮湯方陳橘皮湯浸去白焙梔子仁各二兩上二味粗搗篩每服三錢匕入豉半合水一盞煎至七分去滓溫服日三治霍亂狂悶煩渴吐瀉無度氣欲絕者竹瀝飲方淡竹瀝一合粳米一合炒以水二盞同研去滓取汁上二味和勻頓服之治霍亂心煩不止厚朴湯方厚朴去粗皮薑汁炙四兩桂去粗皮三兩枳實去瓤麩炒二兩上三味㕮咀如麻豆大每服六錢匕水二盞入生薑一棗大拍碎同煎至一盞去滓溫服日三如腹痛加當歸二兩治霍亂心中煩悶香豉湯方豉七合綿裹梔子仁厚朴去粗皮薑汁炙各三兩上三味㕮咀如麻豆大每服六錢匕水二盞煎至一盞去滓溫服治霍亂心煩粱米飲方黃粱米半升上一味搗為粉每服六錢匕水二盞調頓服糯米亦得治霍亂已吐利心煩悶不止桑葉飲方桑葉一大握切上一味以水一盞煎取七分頓服立定治霍亂後心煩臥不安席蔥白大棗湯方蔥白二十莖去須大棗二十枚去核上二味以水三盞煎取一盞半去滓分溫二服治霍亂後脾胃尚虛穀氣未實津液內燥令人煩躁睡臥不安白