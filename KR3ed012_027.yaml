body:
  text: 卷第二十七傷寒陰毒論曰陰氣獨盛陽氣暴衰陽為陰所勝內外皆陰故成陰毒傷寒有初得病便成陰毒者有服湯藥經五六日以上不瘥變成陰毒者以病本屬陰因服寒藥過多或腑臟內外受寒陰氣轉盛陽氣不復所致其候四肢逆冷臍腹築痛身如被擊嘔吐下利其脈沉細而疾者是也治傷寒初得病一二日便結成陰毒或服藥經旬以上變成陰毒身重背強腹中絞痛咽喉不利毒氣攻心心下堅強短氣不得息嘔逆唇青面黑四肢厥冷其脈沉細身如被擊五六日可治至七日不可治宜陰毒甘草湯方甘草炙升麻當歸炙各半兩雄黃研蜀椒去目及閉口者炒出汗各一分鱉甲一兩半醋炙去裙襴桂去粗皮半兩上七味除研外銼如麻豆每服五錢匕水一盞半煎至八分去滓溫服治陰毒傷寒上氣喘促正陽湯方附子炮裂去皮臍一兩桂去粗皮三分乾薑炮半兩上三味銼如麻豆大每服五錢匕水一盞煎至半盞去滓食前溫服治陰毒傷寒心神煩躁四肢厥冷白朮飲方白朮烏頭炮裂去皮臍桔梗銼炒附子炮裂去皮臍細辛去苗葉各一兩乾薑半兩炮上六味銼如麻豆大每服二錢匕以水一盞煎至六分不計時候去滓熱服治陰毒傷寒回陽發表湯方附子炮裂去皮臍桂去粗皮人參澤瀉各半兩半夏湯洗七遍炒令乾乾薑炮天南星炮甘草炙各一分上八味銼如麻豆大每服三錢匕水一盞入生薑半分拍碎棗二枚劈破同煎至七分去滓食前溫服治陰毒傷寒唇青面黑身背強四肢冷附子湯方附子炮裂去皮臍三分桂去粗皮當歸切焙白朮各半兩半夏湯洗七遍去滑乾薑炮各一分上六味銼如麻豆大每服三錢匕以水一盞入生薑三片煎至六分去滓熱服不拘時治陰毒傷寒唇青面黑四肢逆冷脈沉細體生斑點身背強重及心下短氣嘔逆當歸湯方當歸切焙半兩椒去目及合口者炒令微汗一兩鱉甲醋浸炙去裙襴一兩一分甘草炙半兩升麻三分上五味粗搗篩每服五錢匕水一盞煎至半盞去滓食前溫服治陰毒傷寒目赤唇焦頭疼煩渴面色赫赤身惡寒定命湯方附子炮裂去臍皮二兩高良薑白朮乾薑炮各一兩上四味銼如麻豆大每服三錢匕用水一盞煎至五分去滓不計時候溫服未服藥前先飲酒使醺醺後服藥如思食即與酒粥吃不得妄食他物若小便出血是陰毒去矣治陰毒傷寒手足厥冷或生斑點氣壅喘悶方附子二枚炭火燒令黑色便取出盞子蓋就地出火毒上一味搗羅為細散每服沉香摩水煮米飲調下二錢匕不拘時治陰毒傷寒面青張口出氣心下硬身不熱額上有汗煩渴不止舌黑多睡四肢逆冷正陽飲方附子炮裂去皮臍一兩皂莢一梃去皮子塗酥炙令黃乾薑炮銼甘草炙銼各一分麝香一錢細研上五味除麝香外銼如麻豆大每服二錢匕以水一盞煎至五分去滓熱服不拘時治陰毒傷寒桂附湯方桂去粗皮一分附子去皮臍生用半兩丁香吳茱萸湯淘三遍焙乾炒各半分上四味銼如麻豆大每服二錢匕水一盞入生薑半分拍碎同煎至七分去滓溫服治陰毒傷寒面青手足逆冷心腹氣脹回陽丹方硫黃研木香研蓽澄茄附子炮裂去皮臍乾蠍去土炒吳茱萸湯浸七遍焙乾微炒各半兩乾薑一分炮上七味搗羅為細末酒煮麵糊為丸如梧桐子大以丹砂為衣每服三十丸生薑湯下不拘時並三服以熱酒一盞投之取汗治陰毒傷寒回陽散方硫黃一兩寒水石三分硝石半兩上三味入砂瓶子內盛以瓦蓋瓶口黃泥固濟陰乾用炭火五斤煅令火盡研如粉每服一錢匕溫水調下治陰毒傷寒黑神散方附子三兩去臍皮燒令煙盡麻黃去節一兩桂去粗皮半兩上三味搗羅為細散每服二錢匕蜜湯調下治陰毒傷寒面青手足冷身如被擊來蘇丹方太陰玄精石硫黃硝石白礬水銀各一分上五味同研令水銀不見星入瓷合子內燒通赤粟米飯和丸如小豆大每服三丸溫水下治陰毒傷寒手足厥冷脈息沉細面目多青正陽丹方硫黃硝石各二兩太陰玄精石一兩上三味細研入瓷瓶子內鹽泥固濟陰乾炭火煅赤放冷細研為末酒煮麵糊為丸如梧桐子大每服二十丸溫酒下不計時候治陰毒傷寒手足厥身冷脈細四逆散方太陰玄精石三分末硫黃一兩不灰木盆硝各一分上四味研為細末在銚子內以盞子蓋周回用濕紙閉縫安火上紙干為度取出細研入龍腦半錢乾薑末半兩拌勻每服半錢匕冷艾湯調下肌體暖是驗一方去不灰木加附子治陰毒傷寒手足厥面多青腹中㽲痛退陰湯方烏頭炮裂去皮臍乾薑炮各半兩上二味粗搗篩炒令轉色放冷每服二錢匕水一盞鹽一捻煎至半盞去滓溫服治傷寒陰毒四肢厥冷時有汗還陽湯方不灰木一兩延胡索半兩太陰玄精石一分上三味粗搗篩每服二錢匕水一盞入蔥白一寸同煎至六分去滓不計時溫服治傷寒伏陰氣手足厥冷肌膚不熱退陰丸方硫黃半斤生太陰玄精石煅三兩上二味用柳椎細研為末水浸炊餅和丸如梧桐子大每服五十丸熱艾湯下日三治傷寒陰毒四肢逆冷面青胸膈不利嘔噦虛煩夜光丹方硫黃研太陰玄精石研硝石研各一兩附子炮裂去皮臍者一兩生去皮者半兩上四味先將玄精硝石二味於鐵銚子中慢火熬候勻熱以匙於中心隱作坑子納硫黃候熔攪勻放冷研細別搗羅生熟附子為細末入研者藥合研勻以軟爛粳米飯和丸如梧桐子大每服五丸冷艾湯下治陰毒傷寒面青四逆及臍腹㽲痛身體如冰並療一切卒暴冷氣附子回陽散方附子二枚炮裂去皮臍上一味搗羅為細散每服三錢匕取生薑自然汁半盞冷酒攪勻共一盞調服更以冷清酒一盞送下相次更進一服良久臍下如火遍身和暖為度治傷寒陰毒四肢厥逆脈息微細太陽丸方硫黃研附子炮裂去臍皮各一兩上二味搗羅為末酒煮麵糊為丸如梧桐子大每服十丸至十五丸煎艾鹽湯下不計時候治陰毒傷寒四肢厥冷脈候微細心胸痞悶回陽煮散方天南星二兩酒浸七日取出銼炒令黃附子炮裂去皮臍一兩上二味搗羅為散每服二錢匕酒一盞半慢火同煎至六分溫服不計時候治陰毒傷寒定命丸方硫黃研吳茱萸湯浸焙乾炒搗為末硝石研各一分巴豆去皮心膜半分上四味一處研令勻軟飯和丸如彈子大每服先以椒煎湯浸手良久男左女右執一丸汗出即瘥治傷寒陰毒吳茱萸湯方吳茱萸湯洗炒乾一兩白附子天南星柴胡去苗鱉甲去裙襴醋炙前胡去蘆頭細辛去苗葉羌活去蘆頭黃耆銼乾薑炮枳殼去瓤麩炒陳橘皮湯浸去白焙赤芍藥厚朴去粗皮生薑汁炙白檀五味子桔梗各半兩蒼朮米泔浸一宿去皮莎草根當歸切焙芎藭麻黃去根節湯煮掠去沫各一兩甘草炙一兩半上二十三味銼碎入淨鍋內慢火炒令黃再粗搗篩每服三錢匕水一盞生薑三片同煎至七分去滓溫服不拘時候治陰陽二毒不省人事歸魂散方石膏八兩寒水石四兩陽起石三兩以上三味搗細研為末和入新罐內火煨一復時取出紙鋪地上出火毒入後藥附子炮裂去皮臍三兩乾薑炮麻黃去節各一兩杏仁二七枚去皮尖雙仁炒研上七味搗研令勻瓷合盛冷水調下二錢匕治傷寒陰盛裡寒脈細手足厥冷順元煮散方烏頭炮裂去皮臍二兩附子炮裂去皮臍天南星炮裂去皮臍各一兩木香半兩上四味搗羅為散每服一錢匕水一盞煎至六分溫服此散能溫里脈遲細沉伏手足冷毛髮恂栗皆傷寒里證之類大啜三兩杯當手足溫或汗出乃愈今世名醫多用此散和一切氣通利血絡人病脾瘧用紫金丸逐下仍服此散紫金丸用硫黃末針沙各三錢匕鐵粉五錢匕膩粉十五錢匕粟飯丸如皂莢子大每服一丸乳香湯下氣實服一丸半至二丸治陰毒傷寒出汗蔥薤湯方蔥白薤白荊芥穗竹茹各一握豉去皮半升生薑一分蜀椒去目並閉口炒出汗四十九粒上七味㕮咀如麻豆大每服五錢匕酒二盞煎十數沸去滓又別取此藥二十錢匕以沸湯一升沃之候通手淋背上了即服前藥酒蓋覆取汗仍煮蔥薤粥投之汗出即瘥治陰毒傷寒頭痛眼疼心中悶亂身體沉重四肢俱冷精神恍惚脈候沉細欲得冷水飲之必危宜服附子湯方附子炮裂去臍皮二枚桂去粗皮半兩當歸切焙半兩乾薑炮裂一分麻黃去節先煎掠去沫焙乾半兩上五味粗搗篩每五錢匕以水一盞半煎至七分去滓空心頓服以衣覆如人行五里再一服少頃以生薑煮熱稀粥投之身體四肢自然汗出須臾頭輕目明婦人病加赤芍藥半兩神效治傷寒頭痛壯熱不問陰陽二毒並宜服之附子丸方附子炮裂去皮臍半兩五味子一兩上二味搗羅為末研飯和丸如梧桐子大每服三十丸茶清下良久吐或汗即瘥傷寒陽毒論曰陽氣獨盛陰氣暴衰陰為陽所勝內外皆陽故為陽毒傷寒有初得病便成陽毒者有服湯藥經五六日以上不瘥變成陽毒者以病本屬陽或以火劫發其汗或因灸𤋲陽氣轉盛陰氣內消所致其候面赤發躁狂走妄言發斑如錦紋咽喉疼痛涕唾膿血或下利黃赤其脈洪實滑促是也治傷寒一二日便成陽毒或服藥吐下之後變成陽毒腰背痛煩悶不安面赤狂言或見鬼神或下利脈浮大數面赤斑紋如錦咽喉痛吐膿血五日可治七日不可治升麻湯方升麻犀角鎊射干黃芩去黑心人參甘草炙銼各一分上六味銼如麻豆大每服五錢匕水一盞半煎至八分去滓溫服食頃再服溫覆出汗未汗再服治陽毒傷寒未解熱結在內恍惚如狂者大黃湯方大黃銼炒一兩半桂去粗皮三分甘草炙銼木通銼大腹皮銼各一兩桃仁二十一枚湯浸去皮尖雙仁麩炒芒硝二兩上七味粗搗篩每服四錢匕水一盞半煎至八分去滓溫服不拘時以利為度治陽毒傷寒壯熱百節疼痛梔子仁湯方梔子仁赤芍藥大青知母銼各一兩甘草炙銼半兩石膏碎杏仁湯浸去皮尖雙仁麩炒升麻黃芩去黑心各二兩柴胡去苗一兩半上一十味粗搗篩每服四錢匕水一盞半生薑一棗大拍碎豉一百粒煎至八分去滓溫服不拘時治時行熱病六七日未得汗脈洪大或數面赤目張身體大熱煩躁狂言欲走渴甚又五六日以上不解熱在胸中口噤不能言心下尚暖灌藥下咽即活兼治陽毒及發斑黑奴丸方麥奴小麥未熟時叢中有不成者上有黑衣即麥奴也刮取一兩麻黃去根節煎掠去沫焙乾三兩釜底煤研黃芩去黑心芒硝灶突煤研梁上塵各一兩大黃二兩上八味搗研為細末煉蜜丸如彈子大每服一丸新汲水研下渴者但與冷水儘量飲之須臾當寒寒過汗出即瘥若日移五尺不汗再服一丸瘥即止須微利此藥須病人大渴倍常躁盛者乃可與之不爾不可與治傷寒七八日內熱不解葶藶苦酒湯方葶藶一合紙上炒研膏苦酒米醋是也一升半生艾汁半升無生艾煮熟艾汁或用艾根搗取汁上三味同煎取七合作三服治陽毒傷寒腰背疼痛煩悶面赤狂言妄走或見鬼下利無常赤斑如錦紋喉咽痛唾膿血升麻湯方升麻雄黃醋煮研各半兩當歸切焙桂去粗皮各一分甘草炙銼三分鱉甲醋炙去裙襴一兩上六味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服日二不拘時治陽毒傷寒頭痛壯熱狂言妄語似見鬼神瀉心湯方石膏一兩芍藥葛根銼黃芩去黑心各半兩大黃黃連去須各三分上六味粗搗篩每服五錢匕水一盞半生薑一棗大拍碎煎至八分去滓溫服日二不拘時治陽毒傷寒煩躁不解或下利危困大青湯方大青二兩秦艽去苗土一兩犀角鎊山梔子仁甘草炙銼黃連去須各半兩上六味粗搗篩每服五錢匕水一盞半入豉一百粒薤白七寸煎至八分去滓食前溫服治陽毒傷寒口舌乾燥解毒湯方麻黃去根節人參赤茯苓去黑皮桂去粗皮各半兩麥門冬去心焙葛根銼各三分杏仁湯浸