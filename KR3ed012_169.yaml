body:
  text: 卷第一百六十九小兒瘡疹論曰小兒稟受純陽腑臟蘊熱自內出外隨氣熏蒸散於榮衛肌肉之間留連肉腠或因飲熱乳或因遇時疫熱氣乘其肌肉嫩弱遂變瘡疹微者其邪在腑發為細疹狀如蚊喙所螫點點赤色俗號麩瘡甚者其邪在臟發為豆瘡狀如豌豆根赤頭白穴出膿水俗號疱瘡皆於未發之時先蒸熱如傷寒狀頭痛面赤目黃遍身皆熱腰背疼痛小便赤色大便或溏或澀煩渴引飲甚則譫言其脈浮大洪數審得其證速宜疏利臟腑然亦須詳審若大便已利或瘡已出者皆不可疏亦不可汗若發其表則瘡孔開泄更增斑爛倉公扁鵲常用油劑草劑其法最妙大率湯劑之用所以透肌和里開通中外使疹毒通快不致壅瘀去其邪毒乃得痊瘥然食乳嬰孩與童兒瘡疹治法不同嬰孩之病唯宜調節乳母令氣血清和乳汁通利最為要法若初斷乳小兒則以湯劑和其陰陽調其榮衛既瘥之後尤宜利其臟腑以去餘毒此治瘡疹之大法也治斷乳嬰孩並童兒患疹痘疾其候初覺多似傷寒面色與四肢俱赤壯熱頭痛腰脊疼足多厥冷眼睛黃色脈息多浮洪至數數大不定小便赤少大便多祕才覺四肢色候及脈息雖是疹痘疾未攻皮毛穴出者便可以服餌勻和臟腑疏泄遂下藥按倉公論云可服油劑不可用燥藥不可用冷藥若疹已結在皮毛穴處微微出即不可疏泄也或疹出太盛竇穴膿水者卻可疏利也或未與疏轉即宜急服紫草湯劑紫草湯方紫草二兩新者上一味細銼先以百沸湯浸便以物合定勿令紫草氣出放令如人體溫凡五十日至一百日嬰孩服半藥注子一百五十日至二百日嬰孩服一注子一歲至二歲兒服半合三歲至四歲兒服一合並於食前午後服此湯疹豆雖出勢亦輕耳常服無妨治小兒臟腑伏熱未成疹子疾候四肢微覺有熱食物似減頭髮干直或時額上微熱宜服生油湯劑法扁鵲及倉公用此謂之神劑生油一盞上令如人體溫將熟水一小盞旋旋入油碗內不住手以箸打攪候入熟水盡令勻如蜜即止夜臥時服周晬至三歲兒每服二蜆殼許五歲至七歲兒每服三蜆殼許十五歲每服三大蜆殼許直至大人每服五蜆殼許或三大合每日飯後良久與服服了令臥少時如三五服大小便利四肢熱退則疹痘不復發當自安也治疹豆欲令速出胡荽酒方胡荽半握上一味細銼先以酒二升煎令百沸浸胡荽便以物合定不令氣出候冷去滓微微從項以下噴背膂及兩腳胸腹令遍唯不可噴面治瘡疹將發證候已見當護面目勿令黏染欲用胡荽酒噴時當先用此方塗面上大人嬰孩有此疾悉宜護面黃柏膏方黃柏去粗皮一兩緑豆一兩半甘草炙四兩上三味搗羅為末再研令勻細以生麻油調如薄膏從耳門前及眼窠並厚塗晝夕三五上塗面後可用胡荽酒噴也如用此方塗面縱出疹痘亦少大人小兒瘡疹出護眼法上才覺患以鹽花少許湯浸了令溫洗兩眼晝夕可三兩度大人以指搵鹽花水點眼內旋以帛子拭之初用眼即多痛三上後即不覺痛不計大人小兒或患欲退時眼內有餘熱者亦宜用此法洗點治小兒未滿百日患痘瘡槐白皮湯浴方槐白皮一兩益母草五兩上二味以水五升煎至三升去滓浴兒了更取蕓薹菜濃煎汁再浴作蕓薹菜與乳母吃亦佳治小兒斑瘡豌豆瘡青黛散方青黛研如粉半兩鐵精漿一升上二味將青黛為散臨時斟酌鐵漿調之一百日兒至二百日兒每服一字匕乳前服一歲兒至二歲半錢匕食前午後各一服隨兒大小以意加減治小兒斑瘡豌豆瘡方上取熟煮大豆汁服之治小兒斑瘡豌豆瘡方頭髮一兩燒灰上一味研羅為末湯調服兩字隨兒大小以意加減治瘡疱將出未能勻遍透肌解毒必勝湯方惡實不拘多少炒熟上一味粗搗篩每服二錢匕入荊芥二穗水一小盞同煎至六分去滓放溫分作三服如瘡疹已出後與服亦妙治小兒瘡疱出不快或黑陷木通湯方木通枳殼去瓤麩炒甘草炙紫草茸上四味等分粗搗篩每服二錢匕水八分煎至六分去滓分溫三服治小兒瘡疹欲出不快四味散方大蝦乾者為末豶豬乾血惡實甘草炙等分上四味為散三歲以下半錢匕五歲以上一錢匕煎赤芍藥酒調下不拘時候日夜各一服治小兒斑瘡毒氣不快敗毒湯方紫草板藍根各半兩上二味粗搗篩每服二錢匕水八分煎至五分去滓分溫二服治小兒麩痘瘡欲出渾身壯熱情緒不樂不思飲食四妙湯方紫草升麻糯米各一兩甘草生一分上四味粗搗篩每服二錢匕水一小盞煎至六分去滓分溫二服日三治小兒瘡疹出遲發毒散方地龍去土防風去叉上二味等分搗羅為細散每服一字匕用酒水各少許調下不拘時候治小兒瘡痘將出人參湯方人參一錢葡萄苗一分林檎一枚木猴梨七枚上四味各銼碎以水兩盞煎至一盞去滓放冷時時令吃治小兒瘡疹不出青黛散方青黛螺兒者不拘多少上一味研為散每服半錢匕新汲水調服治小兒瘡疹毒氣出不快及觸犯穢氣黑色奪命煎法牛蒡子黑熟者上一味用八月九月內採不計多少沙盆內研生絹絞取汁銀石器內慢火熬成煎盛在瓷器內勿令透風煎杏膠湯化一皂子大與服如人行二十里更進一服其瘡自然紅色毒氣便慢杏膠只於七月內收治小兒瘡子不出煩悶驚悸浮萍丸方浮萍草陰乾晚蠶砂白薄荷葉各一分上三味搗研為末用薄荷自然汁煮麵糊和為丸如雞頭大每服一丸薄荷湯化下不拘時治發斑瘡千金散方石榴葉不拘多少上一味為散每服一字或半錢匕溫水調下治小兒出瘡子不透旋出旋焦者龍腦散方龍腦牛黃丹砂地龍去土取末麝香乳香雄黃各一錢研鯪鯉甲五片燒灰紫草半兩甘草生銼二兩木猴梨五十枚切焙上一十一味搗研為散用豬尾上血拌勻入在竹筒子內用油單封裹線纏定於深坑子內調稀豬糞浸二七日取出淨洗每服一皂子大龍腦水化下並三服見效治小兒瘡疹毒氣不出或出後乾黑色服此藥發出毒氣定命散方丹砂研半兩龍腦研乳香研馬牙硝研甘草為末各二錢上五味再同研勻用十二月新豶豬血半升同研勻取青竹筒長二尺留兩頭截開一頭作竅注藥在內黃蠟塞定以油絹緊裹封勿令透氣埋地坑中至一百五日取出水洗掛風中四十九日劈開取藥研為細散每服半錢匕新水調下治小兒瘡疹倒厭紫雪湯方紫草茸地龍去土等分上二味為粗末每服二錢匕用水酒共七分煎至四分去滓溫服治小兒瘡疹惡候不快及黑瘡子並一切惡候無比散方丹砂一兩牛黃麝香龍腦膩粉各細研一分上五味同研為散每服小兒一字大人半錢以水銀少許津唾研同小豶豬尾上血三兩滴新汲水少許同調服先寧穩得睡然後取轉下如爛魚腸葡萄穗之類臭惡涎物便安小兒用奶汁調下尤妙治小兒瘡疱欲出不出雖出不快及倒厭者神效散方上用抱雞子殼內白皮不拘多少以木炭火燒為灰出火毒研細以新汲水調下一錢匕治小兒斑毒倒厭發斑方人牙五枚上燒灰入麝香半字同研為細散分三服溫酒調下治小兒瘡痘蓄伏黑陷通神散方雄黃通明者研水飛麝香用當門子為末各半錢匕上二味同研細只作一劑一歲兒作三服溫酒調下治小兒瘡子倒陷方白殭蠶炒蟬殼去土上二味各三枚同為粗末水一盞半煎至半盞去滓分作二服微熱服立出治小兒瘡疹倒厭黑色及出不快丁香散方丁香鹿肉乾者各半兩紫草一分上三味搗為細散每服二錢匕酒一盞入麝香少許同煎至半盞放冷灌之如人行三二里再服立發紅色治小兒瘡子黑陷不出黑金散方豬懸蹄甲半兩蛇蛻皮三條鯪鯉甲一分蝟皮一枚鴉翅一對蛤粉一分上六味都入在藏瓶內用鹽泥固濟燒一宿研為細散一二歲每服半錢匕豬尾血溫湯調下不出再服治小兒瘡子黑色人參丸方人參一分為末上一味用牛李子汁瓷器內熬成膏和為丸如豌豆大每服一丸杏膠湯化下不拘時治小兒瘡子黑色及出不快神驗散方鯪鯉甲火炮黃色全者二十片地龍去土炒二十枚紫草五枚上三味搗羅為細散每服半錢匕溫酒調下後用衣蓋即紅色出治小兒觸著瘡子毒氣入里瘡變黑色須臾不救再蘇散方白礬熬令汁枯地龍去土炒各一分上二味研為細散每服半錢匕用豶豬尾上血一橡斗多同新汲水少許調下不拘時治小兒斑痘瘡退熱躁沖和散方白藥子甘草炙各一分雄黃一錢醋淬上三味搗研為散每服半錢匕量兒大小加減蜜湯調下治小兒斑毒不退南朱散方赤豆炒槐花炒各二錢麝香研少許上三味搗研為散每服一字匕溫酒調下量兒大小加減治小兒出瘡解熱丸方甘草生銼鐵粉研青黛研各半兩上三味搗研為末再研勻煉蜜和丸如雞頭大每服一丸熟水化下治小兒疹痘穴後滅瘢痕楝實膏方楝實去核炒槐子各一兩上二味並拍碎用豬脂鵝脂各四兩同於銅銚內以文武火煎一二十沸去滓入在瓷閣中候凝塗瘢痕日二度又方蜆子活者上一味以淮水或江水養五日旋取此水洗手面日漸生肉乃無瘢痕小兒驚熱論曰心藏神而惡熱熱則神氣不得安靜動作多驚手足掣縮精神妄亂熱氣盛者或變驚癇內經謂驚則心無所倚慮無所定故氣亂也速用鎮神臟調心氣之劑則病斯瘥又有變蒸熱氣盛者亦發微驚治法具變蒸門中治小兒驚熱眠睡不穩鉤藤飲方鉤藤三分蚱蟬去頭足翅炙二枚犀角屑微炒麥門冬去心焙升麻各半兩石膏搗碎三分柴胡去苗半兩甘草微炙一分上八味粗搗篩每服二錢匕水一小盞煎至六分去滓下竹瀝半合重煎三五沸分溫三服空心午後夜臥各一量兒大小加減治小兒驚熱神志不安雄黃散方雄黃研一分龍腦研半錢麝香研半錢丹砂研黃芩去黑心山梔子仁人參犀角屑大黃銼炒桂去粗皮甘草炙牛黃研各半兩虎睛微炙一隻上一十三味搗研為散再同研勻一二歲兒每服半錢匕三四歲兒每服一錢匕並用薄荷湯調下早晨午後各一量兒大小加減治小兒多驚身體壯熱吐乳不止犀角散方犀角鎊半兩牛黃研一錢青黛研熊膽研各一分上四味搗研為散再和勻每服一字匕乳汁調下日二隨兒大小增減治小兒驚熱心神躁悶胸膈不利痰涎嘔逆利膈鎮心鐵粉煎方鐵粉研丹砂研水銀沙子馬牙硝研龍腦研各一錢天竺黃研寒食麵各一分輕粉研半錢真珠末二錢檳榔二枚為末麝香研丁香末各一錢惡實一分微炒為末上一十三味搗研為末和勻以生蜜少許調如膏每服一小皂子大用金銀薄荷湯化下量兒大小加減治小兒驚風壯熱時氣瘡疹搖頭弄舌咳吐目澀多睡涎嗽兼治寒邪發熱及下利膿血金箔丸方金箔四十九片丹砂研水銀沙子麝香研膩粉研各一錢牛黃研青黛研犀角末白殭蠶炒蟬蛻去土麻黃去根節白附子乾蠍炒天麻酒浸炙天南星炮酒浸焙各一分上一十五味搗研為末再同研勻細生蜜和丸如梧桐子大或如雞頭大每服以一丸分三服不計時候煎人參薄荷湯化下更量兒大小加減治小兒驚熱鎮心化涎丹砂虎睛丸方丹砂研一兩虎睛微炙一對牛黃研龍腦研各一錢半麝香研一錢犀角屑人參白茯苓去黑皮山梔子仁黃芩去黑心各一兩大黃濕紙裹煨熟鉤藤各四兩上一十二味搗研為末再同和勻煉蜜為丸如梧桐子大每服半丸煎金銀湯化下量兒大小加減治小兒驚熱不安青金丹方青黛四兩甘草生取末二兩蟬蛻取末一兩麝香研一分牛黃研龍腦研各一錢半丹砂研一分龍齒搗研為末天竺黃搗研為末各半兩上九味再同研令勻細用膠飴搜和丸如雞頭大每一丸分作四服小兒驚啼薄荷湯研服兼塗頂及手足心此藥安和臟腑鎮心祛毒安魂安魄調暢三焦解煩除熱大