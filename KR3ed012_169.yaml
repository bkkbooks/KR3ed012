服得快利即不須再服治小兒驚熱身體溫壯小便澀少宜行小腸去心熱兒自少驚亦不成疾凝水石散方凝水石滑石水研令如泔漿蕩取細者瀝乾更研無聲乃止各二兩甘草生末一兩上三味研令勻每服半錢匕量兒大小加減熱月冷水調下寒月溫水調下凡被驚及心熱臥不安皆與一服加龍腦更良治小兒驚熱多涎身熱痰瘧久痢吐乳或午後發熱驚癇等疾丹砂丸方丹砂粉霜膩粉各一分生龍腦一錢上四味研令極細以軟粳米飯為丸如緑豆大一歲一丸甘草湯下余以意加減服小兒急驚風論曰小兒急驚之狀身體壯熱痰涎壅滯四肢拘急筋脈牽掣項背強直目睛上視牙關緊急謂其發動猝急故名急驚也此因心絡受邪所致蓋心藏神而主血小兒血氣不和宿有實熱若為風邪所乘則熱盛血亂血氣相併則神舍不安故猝然而驚古人所謂陽癇者是也治小兒急驚涎盛搐搦剪刀股丸方大戟漿水一盞略煮石燕子搗研粉霜研各二錢棘剛子連肉四十二枚蠍梢二十一枚全者炒蘆薈一錢研乳香研青黛研各二錢龍腦研牛黃研各半錢上一十味搗研羅為細末用湯浸雪糕為丸如梧桐子大每服一丸用剪刀股研破濃煎薄荷水化下如口噤即斡開灌之治小兒急驚涎潮昏塞發搐不定水銀丸方水銀半兩用黑鉛一分結沙子巴豆五十粒去皮心膜去油膩粉稱一錢研半夏生為末半分龍腦研半錢上五味同研勻入石腦油慢研如膏用油單密收每服量兒大小旋丸如緑豆大一歲兒二丸煎金銀薄荷湯下須臾利下稠涎驚搐立定更不須服治小兒急驚風四肢抽掣口噤上視雄黃丸方雄黃乳香丹砂牛黃各一分鉛霜熊膽蠍梢微炒為末麝香蟾酥枯礬各半分上一十味同研令極細以糯米飯和丸如緑豆大每服三丸溫水下不拘時候量兒大小加減治小兒急驚搐搦青金丸方龍腦膩粉青黛乳香天南星各一錢鉛白霜粉霜澱粉各半錢蠍梢微炒天漿子各七枚上一十味搗研為末石腦油和成劑旋丸如黑豆大每服一丸至二丸量大小加減並薄荷水化下治小兒急驚化涎鎮心神牛黃丸方牛黃研𧌴微炒天南星炮搗膩粉研半夏湯洗七遍焙麝香細研各一分天漿子三七枚丹砂研半兩上八味搗研為末燒粟米飯和丸如黍米大每服三丸五丸荊芥湯下不拘時候量兒大小加減治小兒急驚風及四時傷寒渾身壯熱唇口焦乾兩目翻露搐搦昏迷龍齒散方龍齒二錢丹砂半分鉛白霜三錢天南星水浸七日逐日換水薄切曝乾為末五錢龍腦少許上五味搗研為散每服一字匕蔥白金銀湯調下三服後汗出立愈治小兒急驚風喉中有涎呀呷有聲壞涎丸方雄黃丹砂鉛霜三味同研甘草炙為末水銀用棗瓤研令星盡為度上五味等分一處用糯米飯丸如黍米大每服二丸以梨汁下化盡涎為度更量大小加減治小兒驚搐丹砂散方丹砂一錢研膩粉一錢蜈蚣一條酒浸炙蠍梢四十九枚炒上四味搗研為細散每服一字匕薄荷汁調下治小兒急驚搐搦不定聖紅散方天南星一個重一兩者先炮裂於五月一日用好酒浸每日換酒浸至端午日用大蠍七七枚同蒸陰乾去蠍用天南星丹砂半兩細研與天南星同研令勻上二味再同研為散每服一字匕薄荷湯放冷調下治小兒急驚風必勝散方天南星炮輕粉研甘遂全蠍炒各一分巴豆去皮心膜出油七粒丹砂研一錢麝香研半錢上七味搗研為散每服一字匕要吐瀉酒調下取涎薄荷湯調下未周晬兒減之治小兒急驚並宣轉風熱龍腦水銀丸方龍腦研麝香研各一字豬牙皂莢炙甘遂各一分膩粉研一錢青黛研水銀結沙子各二錢巴豆去皮心膜研七粒不出油上八味搗研為末麵糊丸如麻子大一歲一丸更量病緊慢及兒大小加減用薄荷湯下治小兒急驚手足瘛瘲咽膈涎盛巨聖散方大黃乳香研各二錢麝香研半錢匕丹砂研一錢膩粉二錢匕研雄黃研半錢蠍梢炒白附子炮各一錢上八味搗研為散每服一字或半錢匕薄荷湯調下更量大小加減服治小兒急驚風銀硃丸方水銀結沙子半皂子大甘遂二錢搗丹砂研輕粉各一錢龍腦半錢研上五味同研細煉蜜和為劑子每服旋丸如半皂子大量大小加減煎薄荷湯化下治小兒驚積涎潮發搐青黛丸方青黛一錢研大戟半兩米泔水浸一宿用栝蔞根末一處炒黃色不用栝蔞末取大戟末一錢石燕子煅醋淬七遍取末一錢棘剛子生去殼十四枚續隨子去皮研天南星炮木香搗末麝香研乳香研粉霜研各一錢上一十味搗研為末水浸蒸餅心為丸如梧桐子大二三歲兒金銀薄荷湯下一二丸量大小虛實加減治小兒急驚定搐中分散方螳螂一箇中分蜥蜴一箇中分赤足蜈蚣一條中分上三味各隨左右一邊同為細末右治女子左治男子有患急驚搐者每用一剜耳吹入鼻內搐左即左定搐右即右定治小兒急驚及天瘹客忤白虎丸方青黛麝香白牽牛末甘遂末寒食麵大黃末各三錢膩粉龍腦粉霜各一錢上九味各研細和勻滴水丸如雞頭實大每服半丸一丸磨刀水化下量大小加減微利為度治小兒急驚風咽膈痰壅迷悶口噤手足搐搦水銀丸方水銀以棗肉一分同研令星盡膩粉研天南星炮乾蠍微炒各一分上四味搗研為末同研令勻再添棗肉丸如黍米大每服五丸乳香湯下薄荷湯亦得量兒大小加減治小兒急驚風壯熱吐涎鶴頂丹方丹砂細研蠍梢炒各半兩膩粉一錢巴豆去皮心膜出油七粒上四味搗研為末煮麵糊丸如黍米大每服一丸煎桃仁湯下量兒大小加減服之治小兒急驚佛手散方天南星一枚重一兩者用新薄荷一束搗碎同水浸七日七夜取出切作片子曝乾丹砂研半錢蜈蚣赤足全者一枚膩粉炒二錢匕研上四味搗研為散研勻每服一字匕薄荷熟水調下一歲以上漸加至半錢匕欲作丸用棗肉丸如萊蔔子大一歲十丸一歲以上加至十五丸亦薄荷熟水下治急驚碧霞丸方巴豆去皮心膜研出油盡三十粒硫黃研乳香研各一錢膩粉炒二錢匕青黛研半錢上五味各細研和勻用糯米飯丸如緑豆大每服二歲二丸冷薄荷湯下急驚風用棘剛子新薄荷研湯下治小兒急驚身熱涎壅拘急牽掣口噤上視軟紅丸方丹砂研膩粉各一分研龍腦半錢研蠍梢一錢搗末水銀二錢結沙子半夏三七枚湯洗七遍焙乾搗末硇砂研粉霜各一錢半研巴豆五十粒去皮心膜不出油研上九味為末煉黃蠟一兩入熟油少許同藥末研勻為膏旋丸如緑豆大每服二丸至三丸量兒大小虛實龍腦膩粉水下治小兒急慢驚風黑神丸方膩粉一錢半墨白麵蘆薈研各一錢麝香研龍腦研牛黃研青黛研使君子去殼麵裹炮熟各半錢上九味同研勻細麵糊丸如梧桐子大每服半丸薄荷湯研下要利即服一丸俗名睡驚丸少不同耳前後用之垂死兒一服即瘥治小兒急驚手足搐搦目睛直視軟金丸方胡黃連一錢使君子五枚天漿子炒七枚香墨麝香研青黛膩粉各一錢上七味搗研為末以寒食麵為糊和丸如小豆大每服一丸金銀薄荷湯化下量兒大小加減服治小兒驚風眠睡不穩牛黃丸方牛黃一錢研丹砂研二錢水銀用鉛結成沙子用雞頭許蠍梢去土炒二七枚為末天南星一枚如錢許大者為末膩粉二錢金箔五片麝香一錢細研上八味同研令勻煮棗肉和丸如芥子大每服三丸至五丸金銀薄荷湯下量兒大小加減服治小兒驚積鎮心化涎小丹砂丸方丹砂研一分巴豆去皮心膜出油盡三十粒半夏湯洗七遍為末炒二錢匕杏仁先炮過後湯浸去皮尖雙仁研五枚上四味搗研為末麵糊丸如緑豆大每服一丸荊芥薄荷湯下三歲二丸五歲三丸如驚伏在內即驚積行盡仍舊藥出如無驚積藥更不下治小兒急慢驚風蠍梢散方蠍梢七枚烏頭尖七枚半夏一枚漿水煮過丹砂研半字附子生去皮臍一分上五味搗羅為細散每服一字匕煎柳枝湯調下治小兒急驚體熱涎壅四肢拘急筋脈牽掣白花蛇丸方白花蛇頭一枚自開口者生用乾蠍全者炒半兩牛黃研龍腦研各半分丹砂研一分麝香研一錢半上六味搗研為細末煉蜜和為劑每服旋丸如一緑豆大薄荷溫水化下
