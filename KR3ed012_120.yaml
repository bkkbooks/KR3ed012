並閉口炒出汗附子炮裂去皮臍防風去叉各一兩藜蘆去蘆頭一分上九味搗羅為散每用一錢匕熱酒調熱漱冷吐日三治風疳蟲蝕齒痛升麻散方升麻當歸焙切防風去叉各一兩藁本去苗土甘草炙銼白芷細辛一兩芎藭一兩地骨皮一兩獨活一兩上一十味搗篩為粗散每用五錢以水二大盞煎至一盞去滓熱含冷吐治牙齒風疳血出疼痛揩齒散方細辛半兩白蒺藜半兩微炒露蜂房半兩微炒川升麻半兩槐柳枝如箸粗者長二寸各三七莖燒勿令過火黃柏半兩銼白礬半兩一半燒令汁盡一半生用研令細上八味搗羅為細散研令勻用瓷合盛用時先以熱鹽水漱口三五度後一如揩齒藥用之揩齦上微覺痛即止有津即吐之治牙齒風疳膿血出牙根有蟲鶴蝨散方鶴蝨半兩細辛半兩露蜂房半兩燒灰膩粉一分麝香一分細研上五味除麝香膩粉外搗羅為細末後入麝香膩粉在前藥中研令勻每臨臥時剪紙如柳枝葉樣塗藥貼於所患處治風疳宣露膿汁臭氣防風散方防風去叉羌活去蘆頭槐白皮黃芩去黑心地骨皮當歸切焙各三分升麻一兩上七味搗羅為散每用三錢匕水一盞入鹽少許煎三五沸熱漱冷吐以瘥為度治風疳癢痛侵蝕齦爛升麻細辛散方升麻細辛去苗葉藁本去苗土防風去叉芎藭凝水石研各一兩甘草炙銼半兩上七味搗研為散取少許貼齒癢處又取一錢匕綿裹含化咽津常令藥味相接為佳治風疳宣露口臭皂莢散方皂莢去皮炙一挺硇砂研白礬熬令汁枯甘松細辛去苗葉各一分鹽花研槐白皮銼各半兩上七味搗研為散先用鹽揩齒後用散一錢敷患處治風疳蟲蝕肉盡甘鬆散方甘松一分豬腎薄批炙乾一對蘆薈研半兩膩粉研一分上四味搗研為散臨臥時先以漿水淨漱口後以藥貼患處有涎即吐之治風疳出血及牙齒浮動牢牙散方皂莢五挺燒存性小者用十挺附子一枚生乳香研半兩麝香研少許上四味搗研為散如常揩齒良久嗽之頻用為妙治風蟲疳蝕牙齒疼痛藜蘆丸方藜蘆去蘆頭一分蜀椒去目並閉口者炒出汗半兩麝香研少許附子炮裂去皮臍一分上四味搗羅為末熔蠟和丸如麻子大每用綿裹一丸納蟲孔中吐津立效治風疳齒肉相離疼痛不得食枸杞湯方枸杞細銼槐枝細銼柳枝細銼各一握黑豆粗搗三合上四味同於鐺中微炒令黃每用五錢匕酒一盞水一盞同煎十餘沸去滓熱漱冷吐治齒癢風疳牛膝散方牛膝燒灰細辛去苗葉各一兩丁香三分上三味搗羅為散更研令細每用一錢匕可患處貼之日三治齒疳蝕頰骨破及下部疳痔亦主之青黛散方青黛研二兩雄黃研青礬研黃礬燒研白礬燒研莨菪子熬令香附子炮裂去皮臍苦參細辛去苗葉藜蘆去蘆頭麝香研甘草炙各一兩上一十二味搗羅為細散更研如面以綿裹貼齒若痔病綿裹納下部中若下部有蟲浸甘草苦參各一兩煎為湯和散半錢匕灌之便止治齒疳蟲蝕牙齒成片自落鹽緑散方鹽緑研黃連去須麝香研各一分石膽研半分上四味搗研極細用綿裹齒孔痛處咬之瘥不過十遍
