body:
  text: 卷第一百二十蟲蝕牙齒論曰字書謂凡動皆風蟲以風化蓋手陽明支脈入於齒其經虛損骨髓不榮風邪乘之攻入於齒毒氣與濕相搏而生蟲故云蟲蝕牙齒也其狀齒根有竅或作疼痛甚則搖動宣露浮腫作臭世俗亦呼為蚛牙治蟲蝕牙齒蛀蚛風癢搖動疼痛及牙宣出血氣息浮腫等疾玉池散方地骨皮白芷升麻防風去叉細辛去苗葉芎藭槐花當歸切炒藁本去苗土甘草炙銼上一十味等分搗羅為散常用揩牙良久以溫水漱次用藥二錢匕水一盞生薑三片黑豆三十粒同煎至七分熱含冷吐治風蚛牙疼及牙宣七香散方蔓荊實去皮荊芥穗地骨皮防風去叉莎草根炒去毛白芷各一分草烏頭三枚麝香研少許上八味搗研為散每用三錢匕水一盞煎沸熱含冷吐治久患牙疼及齒蚛附子散方附子一兩去皮臍生用胡椒蓽茇黃蠟各一分上四味搗羅三味為末熔蠟和丸如梧桐子大每用綿裹一丸以患牙咬之如蚛安在蚛竅內治牙齒蛀蚛牢牙祕精補益漱咽青鹽散方青鹽龍骨生各四兩濕雞頭一升以青鹽拌一宿炒令通黑上三味搗羅為散平旦及臨臥先漱口令淨以藥散如常揩齒良久以溫酒漱咽治風蚛牙疼烏頭散方烏頭二枚坐正角多者生去皮臍乾薑生用去皮甘草二十各用一棗子大上三味搗羅為散每用半字含水搐鼻左疼搐右右疼搐左以瘥為度治蚛牙疼痛不可忍者乳香丸方乳香研胡椒阿魏各等分上三味搗研為末煎皂莢子膠和丸如緑豆大每用綿裹一丸安在蚛牙內吐涎以瘥為度治牙齒痛有蟲蜂房湯方蜂房一枚炙劈碎豉四十九粒蜀椒去目併合口二七粒上三味以水二盞半煎十餘沸去滓熱含冷吐此藥若有腫尤易見效治牙齒蟲疼痛蜀椒湯方蜀椒去目並閉口者桂去粗皮各一兩白礬燒灰半兩上三味粗搗篩每用三錢匕水一盞煎三五沸去滓熱含冷吐以瘥為度治牙疼蛀蚛風虛上攻連腦疼痛乳香散方乳香一分補骨脂炒半兩上二味搗研為散每取少許揩疼處有蛀眼則用軟飯和藥作梃子塞蛀孔中其痛立止治蟲蝕牙齒片片自落麝膽散方麝香石膽各一分上二味細研為散每用一字摻敷患處日三以瘥為度治風蚛牙痛立止丸方肥皂莢去皮子取肉草烏頭不去尖各一兩乳香研一錢上三味搗研為末薄麵糊丸如梧桐子大每用一丸入蚛孔中涎出即吐治牙齒蟲痛地龍丸方乾地龍末三分麝香研一分上二味和勻熔蠟丸如麻子大每有牙蟲孔即以一丸納之候藥發熱蟲死立瘥治一切風蚛牙痛不可忍者白虎散方砒霜鉛丹各一分上二味先取砒研細入青蔥梢內輕輕扎定次入稈草內如縛粽子樣以草火燒透取砒如金色一梃子次取鉛丹同研勻細每用時以燈心點藥一米許入於耳內左則左用右則右用治牙疼不止去風蚛神仙功效比金散方雄黃不拘多少上一味研細隨左右疼處以剜耳子送入耳中立止治牙齒風蚛疼痛方烏頭炮裂去皮臍芎藭甘草炙銼地骨皮細辛去苗葉白芷高良薑等分上七味搗羅為散以指點藥揩於痛處出涎以溫水漱三五度即瘥治風蚛牙齒疼痛方豬牙皂莢炙去皮子露蜂房炒蜀椒去目併合口炒細辛去苗葉等分上四味搗羅為散每服一錢匕水一盞煎沸熱含冷吐不拘時治齒痛蚛孔二白丸方白殭蠶炒白礬熬枯各半兩上二味搗研為細末以臘月豬脂丸納於蚛孔中治蚛牙有孔疼痛方巴豆一粒去皮炒石亭脂少許研乾薑少許為末麝香研少許上四味同研為細末熔蠟和丸如芥子大每用綿裹一丸納蚛孔中治蚛牙疼痛方附子一枚生去皮臍搗為末上一味熔蠟丸如粟米大每用綿裹一丸納蚛孔中治蚛牙疼痛久不已方上搗莨菪子末納蚛孔中腎虛齒風痛論曰腎生骨髓齒者骨之餘而髓之所養也足少陰經虛氣血不能榮養骨髓故因呼吸風冷或漱寒水則令齒痛而不已治腎虛齒痛天雄散方天雄炮裂去皮臍當歸切焙細辛去苗葉附子炮裂去皮臍甘草炙銼乾薑炮生地黃切焙苦參藜蘆去苗各半兩上九味搗羅為細散揩貼齒痛處日三五上勿咽津每藥盡即以水漱治腎臟虛食冷熱物齒皆痛地黃丸方生地黃切焙一兩白茯苓去黑皮防風去叉獨活去蘆頭枸杞子山芋各半兩上六味搗羅為細末煉蜜丸如梧桐子大空心煎棗湯下十丸至十五丸治腎虛牙齒齦腫膈上熱柴胡湯方柴胡去苗一兩枳殼去瓤麩炒厚朴去粗皮生薑汁炙煙盡各三分黃連去須半兩上四味粗搗篩每用五錢匕水二盞煎至一盞去滓食後分二服治腎虛齒痛戌鹽湯方戎鹽一分地骨皮一兩細辛去苗葉半兩生地黃切焙一兩上四味粗搗篩每服五錢匕水一盞煎十餘沸去滓熱泄日三治腎虛氣攻牙齒血出牙齦癢痛揩齒骨碎補散方骨碎補炒黑色二兩上一味搗羅為細散盥漱後揩齒根下良久吐之臨臥再用咽津不妨治腎虛齒痛揩齒黑髭無食子散方無食子干馬齒莧蓮子草石榴皮巨勝子生地黃柳皮取白羌活去蘆頭訶黎勒皮牛膝去苗生薑皮生胡桃皮白芷各一分青鹽半兩皂莢一挺不蚛者去皮炙上一十五味銼如麻豆大瓷瓶子盛密蓋泥封頭炭火燒令赤候冷取出搗羅為細散更以濕紙攤用盆蓋一復時出火毒每用柳枝湯漱口畢揩齒治腎虛齒痛揩牙烏髭鬢駐顏雞草湯方雞腸草白礬碎訶黎勒皮蘹香子旱蓮子晚蠶砂青鹽茜根皂莢各一兩麻籸半兩上一十味除礬並青鹽蘹香蠶砂外各銼長半寸用藏瓶一枚開口入諸藥在內紙筋鹽泥固濟以炭火半稱煅盡火放冷取出研如粉早晨食後夜臥揩三兩上頃之漱口治腎虛齒痛烏髭鬢揩齒地黃散方生地黃沉水肥好者細切焙三兩升麻銼一兩訶黎勒搗二枚白鹽花半分麻籸末第一遍打者四合粟饙飯一大合丹砂一兩細研臨燒時以沙牛糞汁調之免飛上上七味拌勻以淨沙瓶中盛密封泥裹陰乾以炭火七斤燒炭盡取藥細研為散每欲用先以生薑一塊爛嚼吐卻以左手指揩三五遍就點藥揩十數遍含津不吐兩手取津塗髭發待辛辣定則咽之兼治腳氣腸風治腎虛齒痛揩齒烏髭莽草散方莽草生薑乾漆豬牙皂莢胡麻子烏麻是生地黃菟絲子上七味各四兩銼如麻豆大入藏瓶內鹽泥固濟火煅一日後入地一尺二寸深埋三復時取出露三夜不得著日氣研羅為細散用如齒藥法揩牙治腎虛齒痛三枝散方槐枝柳枝桑枝各七兩焙乾麻籸七兩將一枚取中心者晚蠶砂五兩青鹽三兩半上六味除蠶砂青鹽外銼如麻豆大鹽泥固濟一罐子曝乾後入諸藥在內敞口於地坑子內四面炭火簇燒令通赤食時用柳枝攪撥轉燒令均勻煙盡去炭火用濕紙三五重蓋罐口候冷出藥研為散瓷合盛每日揩齒日久良治腎虛齒痛揩齒麝香散方麝香研一分小豆麵微炒三兩蜀椒去閉口並目炒出汗為末一兩青鹽研一兩齒風腫痛論曰齒風腫痛者齒根虛浮牙齒疼痛或遇呼吸風冷其痛愈甚則齦槽腫赤乃至動搖此蓋手陽明經虛風客其脈流注齒間故為齒風腫痛之患也治風齒腫痛雄黃丸方雄黃研丹砂研麝香研桂去粗皮各一分檳榔一枚附子炮裂去皮臍一枚鹿茸酒炙去毛乾薑炮防風去叉天南星炮黃耆銼白茯苓去黑皮半夏洗去滑白附子炮白殭蠶炒各一分上一十五味搗羅為末煉蜜和丸如梧桐子大每服十丸空心酒下治牙齒風痛地骨皮湯方地骨皮去土一兩白楊皮切一握生地黃汁一合細辛去苗葉蜀椒去目並閉口者炒出汗各一分杏仁去皮尖雙仁炒二十枚鹽研二錢蒼耳半兩上八味搗篩七味為粗末每服五錢匕以水一盞半入生地黃汁半合煎至一盞去滓熱漱冷吐日三五度治齒痛風腫搖動發作不時兼蚛牙白礬湯方白礬燒令汁盡研乾薑炮各半兩藜蘆去蘆頭蛇床子各一分甘草炙細辛去苗葉各半兩蜀椒去目並閉口炒出汗一分防風去叉半兩上八味粗搗篩每用二錢匕以酒一盞調勻煎三五沸熱漱冷吐治牙齒風痛不得眠睡附子湯方附子生用一枚防風去叉一兩細辛去苗葉獨活去蘆頭甘草炙各三分莽草炒一分芎藭半兩上七味搗篩為粗末每用五錢匕以水二盞煎十餘沸去滓熱漱冷吐日三五度治風牙疼莽草散方莽草一兩白芷三分細辛去苗葉荊芥穗各一兩半芎藭半兩升麻一兩上六味搗羅為散揩齒良久以鹽湯漱口治風壅齒痛不可忍或牙齒動搖並口內生瘡者香芎湯方芎藭羌活去蘆頭細辛去苗葉防風去叉莽草郁李仁去皮研各半兩上六味搗為粗末每用五錢匕以水一盞半煎三五沸熱漱冷吐治風蚛牙疼不可忍者方白芥子胡椒各四十九粒白殭蠶七枚草烏頭尖七枚乾蠍七枚乳香一塊酸棗大上六味搗羅為散每用真酥調少許如膏點在疼處治風齒腫疼及頭面腫痛口急不開蒴藋湯方蒴藋二兩蜀椒去目及閉口者炒出汗一分吳茱萸湯浸焙半兩烏賊魚骨去甲一兩桂去粗皮半兩桃膠一兩上六味搗為粗末每用五錢匕以水一盞煎十餘沸去滓更入酒半盞又煎十餘沸熱漱冷吐治牙齒風痛不止當歸湯方當歸細辛去苗葉桂去粗皮甘草生用各半兩礬石生用一分上五味搗為粗末每用五錢匕以水二盞煎十餘沸去滓熱漱冷吐日三五度治風齒疼腫及口臭芎藭湯方芎藭當歸切焙乾獨活去蘆頭細辛去苗葉白芷各一兩上五味搗為粗末每用五錢匕以水一盞煎至七分去滓熱含冷吐如此三五易取瘥為度治風齒及蚛牙疼痛不可忍方狼牙草根半兩槐枝半兩柳蚛屑一兩皂莢一分去黑皮炙令焦黃莨菪子半分水淘去浮者炒令黑色上五味細銼和勻分為三度每度以漿水二大盞煎至七分去滓熱含冷吐治風齒疼痛不可忍蛇蛻皮散方蛇蛻皮一兩炙黃蠶砂一兩微炒柳枝一兩吳茱萸半兩洗三遍槐枝一兩上五味細銼每服五錢匕水一大盞煎至七分淨盥嗽稍熱含之冷則吐神效治風齒疼痛濕生蟲丸方濕生蟲一枚胡椒一顆巴豆一枚去皮上三味先研胡椒細次下巴豆濕生蟲研令勻用軟飯和丸如緑豆大以綿裹一丸咬之良久涎出遂旋吐立效治齒風疼腫芎附湯方芎藭二兩附子炮裂去皮臍一分上二味搗為粗末每用三錢七水一盞煎至八分去滓熱漱冷吐之治風牙齒疼痛獨活酒方獨活去蘆頭莽草切細辛去苗葉防風去叉各半兩附子一枚生去皮臍上五味細銼以酒一升半煎至一升熱漱冷吐治熱毒風攻牙齒疼痛方附子燒灰一枚礬石燒灰一分上二味同研為細末每用少許揩齒瘥治齒風腫痛呼吸風冷其痛愈甚齦槽腫赤郁李酒方郁李根細辛去苗葉各一兩椒去閉口及目炒出汗半兩槐白皮柳白皮各一把上五味除椒外細銼每用藥一兩酒升半煎三五沸去滓熱漱冷吐治諸陽氣虛風攻牙齒疼痛不任寒熱嚼物隱痛蓽茇散方蓽茇苦參防風去叉升麻各一兩藁本去苗土一分上五味搗羅為散每用三錢匕水一盞煎六七沸熱漱冷吐治一切風齒疼痛升麻湯方升麻一兩細辛去苗葉甘松去土防風去叉露蜂房去塵甘草生銼各二兩地骨皮去土八兩雞蘇葉去土四兩上八味同為粗末每服三錢匕水一盞同煎七分放溫漱冷吐治風齒痛不可忍蜀椒湯方蜀椒去閉口及目炒出汗三十粒莽草炙細辛去苗葉菖蒲牛膝去苗焙枳殼根皮銼焙各半兩上六味銼如麻豆大以水三盞煎三五沸熱漱冷吐治一切風齒疼痛巴豆丸方巴豆去皮心出油胡椒各十粒高良薑烏頭生用去皮桂去粗皮各一分麝香少許別研上六味搗研為細末煉蜜和丸如梧桐子大以綿裹置於痛處咬之勿咽津液治牙齒風熱腫痛方莽草雀李根獨活去蘆頭芎藭細辛去苗葉防風去叉等分上六味銼細以漿水煎數沸去滓遂旋溫漱冷吐治風腫牙疼疏風毒升麻丸方升麻細辛去