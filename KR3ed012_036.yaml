body:
  text: 卷第三十六足厥陰肝瘧論曰內經謂足厥陰肝瘧在經則令人腰痛少腹滿小便不利如癃狀非癃也數便意恐懼氣不足腹中悒悒在臟則令人色蒼蒼然太息其狀若死者俱刺足厥陰蓋足厥陰之脈循陰器邪氣客之則少腹滿小便不利也肝為將軍之官謀慮出焉故病則恐懼不足也蒼蒼者肝之色也宜察其經絡腑臟而治之治肝瘧顏色蒼蒼顫掉氣喘積年不瘥鱉甲丸方鱉甲去裙襴醋浸炙蜀漆葉烏梅取肉炒常山銼知母焙各一分甘草微炙細辛去苗葉苦參葳蕤各半分香豉一合微炒石膏半兩研上一十一味搗羅為末煉蜜丸如梧桐子大每服十丸未發前米飲下臨發再服治肝瘧木香犀角丸方木香犀角鎊屑羚羊角鎊屑各一兩半升麻玄參堅者豬苓去黑皮檳榔各二兩半鱉甲酥炙甘草炙各二兩豉五兩炒上一十一味搗篩為末煉蜜和丸如梧桐子大溫酒或米飲下三十丸日再服體熱即去甘草檳榔加大黃五兩治肝瘧顏色蒼蒼顫掉氣喘蜀漆丸方蜀漆烏梅取肉微炒常山銼各半兩石膏研鱉甲去裙襴醋炙各一兩豉一合炒甘草微炙銼知母苦參銼麝香細研桃仁湯浸去皮尖雙仁麩炒過各半兩上一十一味搗研為末同研令勻煉蜜和搗三二百杵丸如梧桐子大空心溫酒下二十丸晚食前再服治肝瘧久不瘥烏梅丸方烏梅取肉酒浸微炒常山銼各一兩知母犀角鎊屑丹砂研龍骨升麻豉炒桂去粗皮甘草微炙銼桃仁湯浸去皮尖雙仁麩炒過各半兩虎頭骨酥炙鱉甲去裙襴醋炙黃各一兩上一十三味搗研為末同研勻煉蜜和搗二三百杵丸如梧桐子大空心溫酒下二十丸晚食前再服治肝瘧上焦壅滯心煩頭疼寒熱不止肌肉消瘦不下食知母湯方知母地骨皮升麻各一兩鱉甲去裙襴醋炙黃犀角鎊屑人參麥門冬去心焙柴胡去苗石膏各二兩甘草生銼半兩虎頭骨酥炙過一兩半上一十一味粗搗篩每服四錢匕水一盞入香豉五十粒煎至六分去滓溫服不計時候治肝瘧小便不利如癃烏梅飲方烏梅取肉山梔子仁各半兩知母一兩芍藥木通銼生地黃升麻各三分上七味㕮咀如麻豆每服五錢匕水一盞半煎至一盞去滓下朴硝一錢匕食後未發前分溫二服手少陰心瘧論曰心瘧者內經謂令人煩心甚欲得清水反寒多不甚熱刺手少陰是也蓋心為神舍邪不可干邪氣干之故煩心其欲清水者以心火內熱故也其反寒多不甚熱者內熱而外寒故也治宜通心經利邪熱則愈治心瘧常山丸方常山別搗一兩桃仁取陳者去雙仁炒和皮搗一兩鉛丹八錢細研豉一合炒令煙盡手捻可碎攤冷別搗上四味搗研為末煉蜜和再搗千杵丸如梧桐子大每服十五丸雞鳴時空心酒下欲發時再服十五丸其日不得梳洗發過方可飲食治心瘧煩心甚欲得清水反寒多不甚熱常山湯方常山銼一兩梔子仁七攻石膏研碎一兩烏梅去核炒七枚鱉甲醋浸炙去裙襴一兩甘草炙銼一分豉微炒一合蜀漆三分上八味粗搗篩每服三錢匕水一盞入竹葉三片銼碎煎至七分去滓未發前溫服臨發再服治心瘧熊膽丸方砒霜研半兩丹砂研麝香研雄黃研熊膽各二兩上五味以熊膽和前四味為丸如緑豆大發日空心冷水下兩丸臨發時再服一丸皆以冷飯壓或當日便止或大作乃瘥如欲吐即以暖水下之當吐出痰涎即瘥治心瘧黃連散方黃連去須上一味搗羅為散發前以酒和三指撮服足太陰脾瘧論曰足太陰之經脾之脈也脾經之瘧令人不樂好太息不嗜食多寒熱汗出病至則嘔嘔已乃寒寒則腹中痛熱則腸中鳴鳴已汗出故謂足太陰瘧又名脾瘧治脾瘧寒熱時作肌瘦食減腸泄腹痛吳茱萸湯方吳茱萸湯洗焙乾炒蒼朮米泔浸一宿切焙鱉甲去裙襴醋炙防風去叉人參芎藭藿香葉柴胡去苗肉豆蔻去殼甘草炙各半兩上一十味粗搗篩每服三錢匕水一盞生薑二片煎至七分去滓未發前溫服治脾瘧不思食厚朴湯方厚朴去粗皮生薑汁炙三兩半夏為末薑汁作餅焙乾一兩陳橘皮湯浸去白焙二兩上三味粗搗篩每服三錢匕水一盞生薑三片棗一枚劈破煎至七分去滓空心日午臨臥各一服治脾瘧木香丸方木香附子炮裂去皮臍大黃銼炒厚朴去粗皮薑汁炙人參各一兩芍藥桂去粗皮京三稜煨獨活去蘆頭乾薑炮芎藭羌活去蘆頭甘草炙各半兩陳橘皮湯浸去白焙檳榔銼各二兩上一十五味為細末煉蜜丸如梧桐子大每服三十丸未發前溫水下日三治脾瘧寒熱檳榔湯方檳榔銼青橘皮湯浸去白焙前胡去蘆頭白朮菝葜各一兩上五味粗搗篩每服三錢匕水一盞煎至七分未發前去滓溫服治脾瘧無問遠近阿魏丸方阿魏研安息香入胡桃瓤同研萊蔔子炒各三錢蕪荑仁微炒為末一分上四味為細末煉蜜丸如緑豆大每服二十丸未發前溫水下得吐則瘥治脾瘧寒熱善嘔多汗青蒿湯方青蒿附子炮裂去皮臍桂去粗皮厚朴去粗皮薑汁炙甘草炙陳橘皮湯浸去白焙半夏為末薑汁和作餅曝乾麻黃去根節草豆蔻去皮白朮各半兩藿香葉一兩上一十一味銼如麻豆每服三錢匕水一盞生薑三片棗一枚劈破煎七分去滓溫服日三不拘時治脾瘧人參飲方人參甘草炙各一分陳橘皮湯浸去白焙半兩烏梅五枚去核焙草豆蔻七枚去皮上五味粗搗篩每服五錢匕用濕紙裹定熟水二盞生薑一棗大拍碎棗二枚劈破瓷器內煎至一盞去滓未發前溫服治脾瘧寒多熱少有汗頭目昏暗背胛拘急或胸膈痞悶嘔逆咳嗽心腹脹痛面黃肌瘦肢節疼倦柴胡湯方柴胡去苗葛根銼棗肉焙甘草炙檳榔銼常山烏梅去核焙草豆蔻去皮厚朴去粗皮薑汁炙各四兩上九味粗搗篩每服五錢匕酒半盞水一盞煎至一盞去滓未發前溫服治脾瘧無問新久鱉甲散方鱉甲去裙襴醋炙甘草炙各一兩三分常山一兩烏梅去核焙一兩一分陳橘皮湯浸去白焙松羅桂去粗皮各三分上七味為細散每服二錢匕未發前以酒調下日三治脾瘧硫黃丸方硫黃研桂去粗皮巴豆去皮心膜出油研乾薑炮各半兩藍澱研一分上五味搗羅二味為末入別研三味和勻麵糊丸緑豆大每用一丸綿裹未發前男左女右塞耳中瘥合時取五月五日午時面北先吸氣七遍卻於藥上呵七遍神驗治脾瘧橘皮散方陳橘皮湯浸去白焙常山乾漆炒煙出桂去粗皮各三分牡蠣燒赤一分上五味為細散每服三錢匕未發前溫酒調下三服必瘥治脾瘧半夏散方半夏為末薑汁調作餅焙乾阿魏研各一錢上二味研勻以溫酒半升未發前調勻旋旋服之治脾寒瘧疾七棗散方烏頭大者一枚炮良久移一處再炮凡七處炮滿去皮臍上為細末都作一服用大棗七枚生薑七片蔥白七寸水一碗同煎至一盞疾發前先食棗次溫服藥只一服瘥一方烏頭不炮用沸湯一盞泡以物蓋之候溫溫更泡滿四遍去皮切焙乾依上法作一服手太陰肺瘧論曰肺瘧者內經謂令人心寒寒甚則熱熱間善驚如有所見刺手太陰陽明是也蓋心肺獨居膈上其氣相通故瘧邪干肺內動於心則為寒熱善驚之候也治肺瘧心寒甚即發熱熱即驚如有所見常山秫米湯方常山一兩半秫米一分甘草炙銼半兩上三味粗搗篩每服三錢匕水一盞煎至七分去滓未發前溫服發時再服治肺瘧心寒熱善驚如有所見人參丸方人參鱉甲醋炙去裙襴桃仁去皮尖雙仁炒研常山甘草炙銼肉蓯蓉酒浸切焙升麻各三分杏仁去皮尖雙仁炒研桂去粗皮各半兩丹砂研阿魏研各一分烏梅肉炒龍齒研各一兩上一十三味為細末煉蜜丸如梧桐子大每服十五丸空心米飲下未發時並兩服治肺瘧及補心氣麥門冬湯方麥門冬去心一兩半升麻知母銼焙甘草炙銼鱉甲醋炙去裙襴柴胡去苗前胡去蘆頭桃仁去皮尖雙仁炒研枳殼去瓤麩炒各一兩梔子去皮蘆根銼烏梅肉炒各半兩人參三分上一十三味粗搗篩每服三錢匕水一盞半入桃柳枝各五寸銼生薑三片煎至八分去滓入石膏末半錢匕更煎沸未發前一二服治肺瘧心驚常山丸方常山搗末桃仁去皮尖雙仁炒研鉛丹研各一兩豉炒一合上四味為細末煉蜜和搗千杵丸如梧桐子大每服十五丸食前溫酒下未發時服治肺瘧杏仁丸方杏仁四十枚湯浸去皮尖雙仁炒黃常山三分丹砂別研半兩甘草生銼一分上四味為細末煉蜜丸如緑豆大每服十丸未發前米飲下日再服治肺瘧心寒熱善驚丹砂丸方丹砂別研阿魏醋化去沙石麩和作餅炙麝香研各一分鉛丹研一兩上四味合研細末取五月五日午時粽子尖三七枚與藥同研於北斗下露一宿丸如梧桐子大未發前熱水下一丸將一丸以緋帛裹安耳內男左女右治肺瘧心神驚悸二丹丸方丹砂別研鉛丹別研甘草炙銼各半兩當歸切焙常山各三分上五味為細末煉蜜丸梧桐子大每服三丸食前溫酒下未發時再服俟飢即以蔥豉粥與之治肺瘧烏梅丸方烏梅肉炒常山鱉甲去裙襴醋炙人參肉蓯蓉酒浸切焙知母焙桃仁去皮尖雙仁炒研各半兩上七味為細末煉蜜丸梧桐子大每服三十丸溫酒或米飲下未發前三服治肺瘧心虛黃連湯方黃連去須一兩半當歸切焙一兩乾薑炮半兩上三味粗搗篩每服三錢匕水一盞煎至七分去滓臨發時服足少陰腎瘧論曰內經謂足少陰腎瘧在經則令人嘔吐甚多寒熱熱多寒少欲閉戶牖而處其病難已在臟則令人灑灑然腰脊痛宛轉大便難目眴眴然手足寒刺足太陽少陰蓋腎脈入肺中肺脈環胃口故使人嘔陰虛則陽氣偏故熱多若夫酒淅腰脊痛大便難目眴手足寒特以臟氣內虛機關不利故為此證也治腎瘧令人灑灑然腰脊痛大便難目眴手足寒烏梅丸方烏梅肉炒一兩半常山銼三分豉一合炒桃仁湯浸去皮尖雙仁炒研一兩虎頭骨酥炙半兩附子炮裂去皮臍半兩肉蓯蓉酒浸切焙半兩知母切焙一分麝香研一錢桂去粗皮一分上一十味搗研拌勻煉蜜和丸梧桐子大每服空腹米飲下二十丸未發時服治腎瘧蓯蓉丸方肉蓯蓉酒浸切焙半兩烏梅肉炒半兩桃仁湯浸去皮尖炒研三分常山銼三分豉炒三分升麻半兩桂去粗皮半兩甘草炙半兩上八味搗研和勻煉蜜丸梧桐子大每未發日空腹溫酒下二十丸米飲亦得至發時更服二十丸治腎瘧天雄丸方天雄炮裂去皮臍一兩半鉛丹研三分人參三分上三味搗研和勻煉蜜丸如梧桐子大每服五丸未發日空腹米飲下日三五服治足少陰瘧嘔吐寒熱人參湯方人參常山銼各半兩甘草生銼三分燈心五十莖陳橘皮湯浸去白焙茶末各一分上六味粗搗篩每服五錢匕水一盞半煎至七分去滓入酒半盞相和未發前頓服以吐為效未吐再服治足少陰瘧嘔吐半夏散方半夏湯洗去滑為末生薑汁和作餅曝乾再為末阿魏細研各一兩上二味同研勻每服二錢匕溫酒一盞調下未發日頓服治足少陰瘧嘔吐半夏散方半夏湯洗去滑生薑汁製焙乾薑炮各半兩緑礬研一錢上三味搗研和勻每服半錢匕未發日以醋湯調下足少陽膽瘧論曰足少陽瘧之狀內經謂令人身體解㑊寒不甚熱不甚惡見人見人心惕惕然熱多汗出甚刺足少陽是也蓋膽為中正之官決斷出焉今瘧邪外中其氣不守故常心惕惕然邪盛故熱多有風故汗出治足少陽瘧身體解㑊見人心惕惕然熱多汗出升麻湯方常山一兩半升麻鱉甲醋炙去裙襴淡竹葉各一兩犀角屑麥門冬去心焙知母切各三兩甘草炙半兩上八味㕮咀如麻豆大每服五錢匕水一盞半煎至一盞去滓空心日午溫服治足少陽瘧清膽黃連丸方黃連去須一兩甘草炙銼半兩龍膽去苗鉛霜研定粉研人中白各三分馬牙硝研一兩上七味搗研為細末用豬膽汁和丸如梧桐子大每服二十丸用枇杷葉拭去毛煎湯下日三治