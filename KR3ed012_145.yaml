單子上攤貼患處急裹縛之其痛立定治折傷接骨貼挼靈龜膏方龜甲醋炙五兩大黃銼木鱉子去殼各三兩當歸切焙桂去粗皮各二兩上五味搗羅為末每用時先將好酒一升煎去一半停冷後入藥末一兩以柳木篦不住手攪成膏以油單子上攤貼傷損處立效治傷折皮肉破冷久不合宜用長肉合瘡口乳香膏方乳香研續斷當歸切焙莨菪子亂髮燒灰騏驎竭熏陸香各二兩桂去粗皮一兩麻油七兩松脂豬脂臘月者鉛丹各四兩上一十二味除麻油豬脂鉛丹外並搗羅為末先煎油並脂等令熱停冷下藥末以柳木篦攪令勻用慢火更煎半日後下鉛丹攪令勻候成膏瓷合盛每用故絹攤貼立效治傷筋骨腫痛不可忍摩痛膏方丁香別搗為末麝香別研羌活去蘆頭芎藭防風去叉細辛去苗葉牛膝去苗各半兩駝脂十兩臘月豬脂二十兩木鱉子去殼附子去皮臍生用栝蔞根各一兩上一十二味除駝脂豬脂丁香麝香外細銼以米醋二升拌勻經三宿入鐺中炒令乾下駝脂及豬脂等以慢火再煎候諸藥焦黃色即住火用綿濾去滓後下丁香麝香攪勻內瓷閣中盛旋取摩之諸骨蹉跌論曰凡墜墮顛撲骨節閃脫不得入臼遂致蹉跌者急須以手揣搦復還樞紐次用藥調養使骨正筋柔榮衛氣血不失常度加以封裹膏摩乃其法也治諸骨蹉跌補絶傷地黃散方生乾地黃焙桂去粗皮乾薑炮芎藭甘草炙銼當歸切炒芍藥各一兩上七味搗羅為細散每服二錢匕溫酒調下不拘時候治諸骨蹉跌補傷絶大豆湯方大豆炒去皮大黃生乾地黃焙桂去粗皮各一兩上四味粗搗篩每服三錢匕水酒共一盞煎至七分去滓溫服不拘時候治諸骨蹉跌血瘀腫熱疼痛大黃散方大黃蒸切大豆炒去皮各二兩桂去粗皮一兩上三味搗羅為細散每服二錢匕溫酒調下日三服治諸骨蹉跌脫臼疼痛烏頭膏方草烏頭去皮尖銼炒細辛去苗葉獨活去蘆頭蛇床子炒各半兩吳茱萸洗焙炒一兩蔥二十莖生薑四兩上七味搗羅前五味為末次將生薑蔥二味研細後入藥末同和令勻乘濕攤絹帛上裹所損處日一治骨節蹉跌不歸臼疼痛地黃膏方生地黃二斤洗細切上一味搗研細用好醋一斤煎得所和之乘熱攤絹帛上裹蹉跌處日一易治骨節蹉跌內傷疼痛地黃敷方生地黃二斤洗研芥菜子研四兩上二味細研和勻入酥四兩同煎沸乘熱敷損處或以帛子系之日一易治傷損骨蹉跌地黃罨方生地黃洗切研藏瓜薑內糟生薑洗切研各一兩上三味同以慢火炒乘熱罨損處以帛系之日一易治骨出臼蹉跌不復疼痛當歸膏摩方當歸洗切焙續斷銼細辛去苗葉木通銼白芷切芎藭銼甘草銼蜀椒去目及閉口者牛膝去苗附子去皮臍生切各一兩上一十味粗搗篩用豬脂半斤先煎取油次下諸藥煎如膏以絹絞去滓瓷合盛每用少許抹損處熱手摩之
