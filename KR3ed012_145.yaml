body:
  text: 卷第一百四十五打撲損傷論曰凡打撲損傷或為他物所擊或乘高墜下致傷手足腰背等處輕者氣血凝滯隨處疼痛重則聚為焮腫痛甚不可忍當察其內外輕重以治之治傷撲疼痛蓬莪朮湯方蓬莪朮煨白殭蠶炒各一兩蘇枋木銼二兩沒藥研半兩上四味粗搗篩每服二錢匕水一盞煎至七分去滓溫服日三若搗為細末熱酒調下亦得治打撲傷損筋骨疼痛地黃散方熟乾地黃焙當歸切焙各三兩羌活去蘆頭苦參各二兩續斷四兩上五味搗羅為散每服三錢匕溫酒調下不拘時服治打撲傷損疼痛乳香丸方乳香一兩桂去粗皮安息香沒藥各半兩地龍炒補骨脂炒各一兩當歸切焙白芷各半兩五靈脂二兩上九味各搗羅為末將乳香沒藥安息香三味用酒研如糊和余藥丸如龍眼大每服一丸酒磨溫服不拘時治打撲傷損疼痛延胡索散方延胡索桂去粗皮沒藥別研黃耆銼當歸切焙白蘞桑寄生熟乾地黃焙各一兩上八味搗羅為散每服三錢匕溫酒調下不拘時候服治打撲筋骨疼痛續斷丸方續斷二兩防風去叉黃耆乳香研沒藥研各半兩自然銅煅醋淬七遍一兩牛膝酒浸切焙一兩半上七味搗羅為末酒煮麵糊丸如梧桐子大每服三十丸溫酒下不拘時治打撲內損及墜馬等傷白附子散方白附子炮續斷防風去叉各一兩上三味搗羅為散每服二錢匕童子小便和熱酒一盞調下並三服不拘時治打撲內損疼痛海金沙散方海金沙二錢大黃生乳香研沒藥研各一錢騏驎竭一分上五味除研外搗羅為散和勻每服二錢匕乳香溫酒調下不拘時服治打撲損疼痛麻根汁酒方大麻根及葉生者去土三斤上一味細銼搗絞取汁每服半盞和溫酒半盞服不拘時無生麻根即用乾者酒煎服治打撲損疼痛木賊散方木賊銼炒三兩麻黃去根節一兩半甘草炙三分上三味搗羅為散每服五錢匕熱酒調下隨酒量飲至醉候醒折處覺不痛是效未服藥先整骨裹縛方可服之治打撲損傷手腳筋骨疼痛甘松丸方甘松去土黃荊實芥菜子陳者赤蓼花檔子炒白殭蠶炒螟蛉殼各半兩上七味搗羅為末煉蜜丸如彈子大每服一丸溫酒化下不拘時候治打撲傷損疼痛牡蠣散方牡蠣一斤半炭火燒紅細研水飛過取一斤鉛粉洛陽者炒黑細研半斤當歸切焙取末半兩硼砂研乳香研各一兩半上五味研勻先用醋煮小黃米粥攤紙上用藥末三錢匕勻摻粥上裹貼患處次用藥末二錢匕濃煎蘇枋木汁一盞調下不拘時候服治打撲傷損筋骨疼痛散方鉛粉炒半兩硼砂研二錢當歸切焙半兩上三味搗研勻每服二錢匕濃煎蘇枋木汁調下若傷損在腰以上先吃淡面少許後服藥如損處在腰下先服藥後吃淡面少許後只如常調藥服更用糯米或黃米作粥拌藥二錢攤在紙上以故紙竹夾封裹損處治打撲內損疼痛摩膏方萆麻子去皮研一兩半草烏頭生為末半兩乳香研一錢上三味一處和勻量多少入煉成豬脂研為膏每取少許塗傷處炙手摩令熱取效如痛甚不可摩即塗腫痛處治打撲損傷瘀血不散疼痛木鱉裹方木鱉子去殼研半兩桂去粗皮三分蕓薹子酒浸研二合丁香五十粒上四味將丁香桂為末與研者二味和勻次用生薑汁煮米粥攤紙上將藥末量多少摻入粥內看冷熱裹之一日一換治打撲傷損補骨脂裹方補骨脂微炒二兩上一味搗為末用醋煮黃米粥攤在紙上封裹損處治打撲損瘀熱疼痛天南星貼方天南星一兩黃柏去粗皮半兩上二味搗為末用生薑汁調貼腫痛處治筋骨傷折接骨知母裹方知母焙貝母去心白芨白蘞桂去粗皮乳香研各半兩上六味搗研為細末用好酒調如糊攤藥在新帛子上裹所傷處三五日一換治打損成瘡不合方萆麻子去殼上一味生研貼所患處如干以津唾潤之治破傷血出不止方上用燈心爛嚼和津唾貼之或用帛裹縛之治打撲損傷疼痛方蓬莪朮煨銼白殭蠶炒各一兩蘇枋木銼二兩上三味粗搗篩每服三錢匕水一盞煎至七分去滓不拘時溫服治打撲傷損止痛烏頭丸方烏頭七枚去皮生為末黃狗膽一枚上二味以膽汁和藥末丸如緑豆大每以冷酒一盞下三丸酒須飲盡治傷損血入四肢疼痛不可忍乳香散方乳香研白芷桂去粗皮沒藥安息香研地龍去土炒補骨脂炒當歸炙銼各半兩上八味搗研為散熱酒調下二錢匕治傷損止血白蘞熁藥方白蘞白芨白芷碧蘆皮炙黃各一兩上四味搗羅為末雞子清拌石灰炒乾後入前末研細傷損處封之腕折論曰凡舉動不慎為物所擊致腕折者筋骨損傷血氣蹉跌或留積成瘀焮腫疼痛宜速治之外則敷貼肌肉內加調養榮衛之劑則肢體可完矣治腕折手足熱腫疼痛骨碎補散方骨碎補去毛當歸切焙芎藭銼桂去粗皮蒲黃蜀椒去目並閉口炒出汗各一兩澤蘭葉沒藥研各半兩上八味搗羅為散每服二錢匕溫酒調下不拘時治腕折筋骨疼痛延胡索散方延胡索橘子仁蒲黃蕓薹子當歸切焙虎脛骨酥炙各一兩桂去粗皮半兩牽牛子三分一半生一半炒上八味搗羅為散每服二錢匕溫酒調下不拘時治腕折骨損筋傷疼痛地黃敷方上以生地黃不限多少熟搗用醋熬乘熱攤於所傷處以帛系定每日一換治腕折氣血瘀滯疼痛黃耆散方黃耆銼生乾地黃焙當歸切焙各二兩桂去粗皮烏頭炮裂去皮臍續斷銼附子炮裂去皮臍芍藥各半兩蜀椒去目併合口炒出汗一分乾薑炮裂大黃銼炒木通銼各一兩上一十二味搗羅為散每服二錢匕溫酒調下不拘時治腕折疼痛芍藥散方赤芍藥黃耆銼各二兩附子炮裂去皮臍當歸切焙續斷銼桂去粗皮羌活去蘆頭虎骨酥炙蜀椒去目並閉口炒出汗大黃生各一兩烏頭炮裂去皮臍半兩上一十一味搗羅為散每服二錢匕溫酒調下不拘時治腕傷骨折青金散方生龍腦別研麝香別研各一錢匕丁香炒為末虎脛骨白者燒灰各一兩鯪鯉甲燒灰二兩上五味將虎骨並鯪鯉甲灰丁香末同研極細次下龍腦麝香和研令勻用瓷合盛每服半錢匕用小黃米一合煮粥入醋少許攪勻下藥又取藥隨所傷多少用帛子攤裹之經宿一換治腕折傷損附子膏方附子生去皮臍為末二兩豬脂四兩上二味先煉豬脂去滓入附子末拌勻酒少許調如膏攤傷處日一易治腕折止疼痛內損沒藥散方沒藥研騏驎竭丁香炒虎脛骨酥炙各半兩乳香一分別研骨碎補一兩桑根白皮銼焙赤小豆各二兩上八味搗羅為散每服二錢匕熱酒調下治腕折活血丸方桑枝東南引雞子大粗者細銼一斗納鍋中入米醋炒黑存性為末雄黑豆三升入米醋炒焦存性為末栗子四百枚連皮燒入米醋內浸再燒再入醋內存性為末乳香半兩細研上四味搗研為末以醋煮糯米粥和搗千杵丸如彈子大陰乾勿見日後用米醋磨好香墨為衣候乾以布袋盛挂當風處每服一丸與乳香酒同煎令化溫服服訖向痛處臥日再疼痛自止治腕折筋骨疼痛黑散子方香墨半兩煅醋淬三遍烏頭燒灰留性芎藭敗龜醋炙各一兩木香二兩赤芍藥酒浸焙銼桂去粗皮沒藥研自然銅煅醋淬七遍當歸片切酒浸焙地龍去土炒乳香研骨碎補白芷各一兩半上一十四味搗羅為散每服二錢匕熱薑酒調下不拘時治腕傷折疼痛不可忍萵苣散方萵苣子一兩黑色者妙乳香半兩研上二味同為細散每服二錢匕熱酒調下不拘時服訖向痛處臥治腕折先用止痛白礬湯尉方白礬上一味為細末每用一匙沸湯一碗泡化以手帕子蘸乘熱尉傷處少時痛定排整筋骨次用貼藥雄鼠糞尖者是桂去粗皮為末上二味等分研勻量傷折大小以冷水調藥末攤軟帛上裹之須臾如火暖三日後損處極癢是筋骨生長切不可動搖搔抓其藥力常如火暖如一兩日後覺藥力不暖即換新藥裹之治腕傷折乳香膏方乳香三兩沒藥二兩二味銼如皂子大用生絹袋盛內黃米內蒸如膠候冷別研銅錢四十九文火煅醋淬數遍搗末密陀僧雄黃各半兩甜瓜子當歸切焙骨碎補虎骨酥炙黑狗頭骨牛骨人骨木鱉子騏驎竭各一分上一十四味搗研為末拌勻入絹袋子內蒸如餳以瓷器盛如有傷折者旋取丸如豌豆大每服二十丸溫酒下倒僕蹴損論曰或因乘車馬或登陟危險誤多倒僕輕則蹉跌筋脈蹴損不能伸屈甚者乃至踒折筋骨治宜速以養血脈續筋骨之劑服之則其效速矣治倒僕蹴損筋骨疼痛虎骨散方虎骨酥炙別為末一兩酒一升生地黃汁一升上三味將地黃汁並酒煎沸入虎骨末同煎數沸每服一盞溫服不拘時候治倒僕蹴損筋骨疼痛當歸湯方當歸切炒芎藭各二兩熟乾地黃焙四兩上三味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治倒僕筋脈蹴損芍藥散方赤芍藥黃耆附子炮裂去皮臍當歸切焙續斷銼桂去粗皮羌活去蘆頭虎骨酥炙蜀椒去目並閉口者炒出汗各一兩烏頭炮裂去皮臍半兩上一十味搗羅為散每服二錢匕溫酒調下不拘時候治墜墮倒僕蹴損筋脈芎藭湯方芎藭一兩半澤蘭取葉附子炮裂去皮臍牛膝酒浸切焙各一兩蜀椒去目及閉口者炒出汗生乾地黃焙各三分桂去粗皮半兩上七味銼如麻豆大每服三錢匕水酒共一盞煎至七分去滓溫服不拘時候治倒僕筋蹴不得舒展地黃酒方生地黃洗切研八兩酒三升上二味共煎數沸去滓每服一盞溫服不拘時候治倒僕諸筋蹴損槐子煎方槐子炒為末用酒一升浸一宿桂去粗皮秦艽去苗土白朮銼炒續斷附子炮裂去皮臍各一兩上六味除槐子外搗為粗末將槐子酒先煎次入豬脂半斤再煎沸即入藥末再煎熟絞去滓瓷合盛每服一匙溫酒調服不拘時候治倒僕蹴損筋脈地黃酒方生地黃汁一升酒一升桃仁去皮尖別研膏一兩上三味先將地黃汁並酒煎令沸下桃仁膏再煎數沸每服一盞溫服不拘時候被傷絶筋論曰凡肢體為物所傷致筋斷絶不相續者使榮衛失道血氣留瘀而為腫痛宜治以活血續筋之法治被傷筋斷益母草方益母草汁二升生地黃汁半升白蜜生用二兩上三味和勻以綿絹濾去滓入銀石器中慢火煎不住手攪候如稀餳以瓷合盛每服一匙用溫酒化下不拘時治被傷筋絶蟹髓方蟹髓取甲中並足中者不拘多少上一味略熬納筋斷處外以物帛繫縛即搗葛根汁飲之治骨折筋斷乾地黃散方熟乾地黃焙當歸切炒羌活去蘆頭苦參各二兩上四味搗羅為散每服二錢匕溫酒調下不拘時治被傷筋絶旋覆根敷方旋覆根洗不拘多少上一味細搗爛量所傷處多少敷之一日一換治筋傷骨損補接膃肭臍散方膃肭臍酒炙熟乾地黃焙蕓薹子研桑根白皮銼沒藥研當歸銼炒各一兩桂去粗皮半兩上七味搗研為散每服二錢匕溫酒調下不拘時治墜車落馬踠折筋斷疼痛黃耆散方黃耆銼赤芍藥各三兩蜀椒去目及閉口者微炒去汗乾薑炮大黃銼炒各一兩當歸銼炒續斷桂去粗皮附子炮裂去皮臍熟乾地黃焙木通銼各二兩烏頭炮裂去皮臍半兩上一十二味搗羅為散不拘時候以溫酒調下二錢匕治骨折筋斷傷損疼痛桂附散方桂去粗皮附子炮裂去皮臍白殭蠶微炒蒲黃茅根銼古銅銼末當歸銼炒各一兩上七味搗羅為散不拘時候以溫酒調下二錢匕治腕折筋傷地黃敷方生地黃不拘多少上一味熟搗用敷所傷處傷墮致損吐唾出血論曰凡墜墮打撲內動心氣榮衛氣血不至為患多矣若暴損胸脅氣留肓膜損血入胃停積不去甚則咳唾吐血治法當調其榮衛緩其中逐去損血治墜撲傷損肺氣咳唾血出甘草湯方甘草一兩炙白茯苓去黑皮一兩杏仁湯浸去皮尖雙仁炒研三分人參一兩上四味除杏仁外粗搗篩入杏仁拌勻每服三錢匕水一盞煎至七分去滓溫服不拘時治一切傷損吐唾出血日漸痿