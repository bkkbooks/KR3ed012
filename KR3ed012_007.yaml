如雞頭大每服一丸溫酒化下日三服不飲酒薄荷湯下如傷風三日豆淋酒下連三服以熱蔥粥投之衣被蓋出汗治癱瘓風不計深淺久在床枕天麻浸酒方天麻骨碎補各半兩松節銼敗龜醋炙各一兩龍骨虎骨酒炙烏蛇酒浸去皮骨炙白花蛇酒浸去皮骨炙惡實根切焙各半兩附子炮裂去皮臍一枚羌活去蘆頭獨活去蘆頭牛膝酒浸切焙各半兩當歸切焙芎藭各一兩大麻仁二兩干熟地黃焙半兩茄子根切焙二兩原蠶砂炒二兩上一十九味㕮咀如麻豆用酒二斗浸密封春夏三日秋冬七日每服一盞不拘時溫服治癱瘓風手足不遂口眼喎斜頭目昏重腰膝少力及風氣凝滯筋骨疼痛虎骨丸方虎脛骨酥煮半兩當歸切焙一兩安息香酒研半兩海桐皮銼獨活去蘆頭牛膝酒浸切焙各一兩赤箭半兩肉蓯蓉酒浸切焙一兩金毛狗脊去毛續斷各半兩萆薢烏頭炮裂去皮臍芎藭各一兩甜瓜子仙靈脾乳香研各半兩防風去叉天麻石斛去根各一兩酸棗仁去皮研黃松節銼酒炒細辛去苗葉各半兩上二十二味除別研外搗為細末酒煮麵糊丸如梧桐子大每服十五丸溫酒或荊芥湯下不拘時治一切風癱瘓卒中鐵彈丸方烏頭炮裂去皮臍五靈脂附子炮裂去皮臍各四兩狼毒半兩防風去叉地龍炒各二兩桂去粗皮一兩半虎骨燒存性一兩自然銅煅醋淬七遍三兩乳香研半兩沒藥研三兩半麝香研三錢龍腦研二錢發灰半兩當歸切焙芎藭各一兩乾蠍去土沙半兩海桐皮銼二兩天麻一兩白花蛇酒浸去皮骨炙半兩上二十味除研者外搗羅為末用生薑自然汁和杵三五百下丸如櫻桃大每一丸分作四服癱瘓風生薑熱酒化下𤸷麻薄荷酒下皮膚風毒結聚腫痛溫酒下偏頭疼夾腦風臘茶清下婦人血風攻注四肢或癢或痛心腹刺疼當歸酒下並早晚食後服治癱瘓中風及婦人血風等疾黑附子丸方附子生去皮臍烏頭生去皮臍虎脛骨塗酥炙五靈脂炒防風去叉桂去粗皮海桐皮銼地龍炒狼毒生去蘆頭用豬血浸一宿炙乾自然銅煅醋淬七遍各四兩上一十味搗羅為細末煉蜜丸如雞頭大每服一丸爛嚼溫酒下空心日午臨臥服治風氣癱瘓等疾天麻丸方天麻二兩玄參防風去叉干浮萍紫背者洗焙地榆干薄荷烏頭炮裂去皮臍牛膝酒浸切焙各一兩不蚛肥皂莢五挺就地坑內燒成黑灰以瓷碗合定候冷用半兩細研入諸藥牛黃龍腦各一錢別研入上一十一味除別研外搗羅為細末和勻煉蜜和杵百餘下丸如雞頭大每服一丸溫酒嚼下治癱瘓風金虎丸方天南星天麻白附子烏蛇酒浸去皮骨焙附子去皮臍乾蠍去土狼毒白殭蠶各二兩桂去粗皮一兩檳榔銼三兩五靈脂三兩烏頭去皮臍三兩牛黃麝香丹砂三味同細研各半兩上一十五味並生用除別研外搗羅為末共和勻煉蜜丸如雞頭大每服一丸茶酒下若用牛膽丸尤妙治癱瘓風天麻丸方天麻白附子附子去皮臍烏頭去皮臍羌活去蘆頭荊芥穗各一兩上六味並生用搗羅為末煉蜜和搗三五百杵丸如雞頭大每服半丸或一丸用生薄荷三葉同嚼茶酒任下治一切風及癱瘓言語謇澀搜風鎮心牛黃丸方牛黃一分龍腦一錢麝香一錢雄黃一分丹砂半錢五味同研天麻烏犀鎊乾蠍去土炒羚羊角鎊羌活去蘆頭獨活去蘆頭防風去叉細辛去苗葉白芷赤茯苓蟬蛻麻黃去根節牛膝酒浸切焙芎藭五加皮各半兩白附子炮一分烏蛇酒浸去皮骨炙一兩上二十二味搗羅為末煉蜜和杵一千下丸如雞頭大每服一丸嚼破溫酒或荊芥茶下日三治癱瘓風手足不遂骨筋疼痛麻黃丸方麻黃去根節白花蛇肉烏蛇肉各一斤巴豆一兩去皮心研如膏與前三味同於釜內用水一石緩緩煎兩復時熬水及三四斗以來漉出麻黃並蛇再以生絹濾過入鍋內以慢火熬令稀稠得所盛於淨器中入後藥末桂去粗皮乾蠍去土炒附子炮裂去皮臍防風去叉天麻犀角鎊沉香羌活去蘆頭天南星炮天雄炮裂去皮臍羚羊角鎊檳榔銼白附子炮白殭蠶炒當歸切焙各一兩牛黃龍腦麝香三味各半兩同研上二十四味除研藥並藥汁外搗羅為末同和勻與前煎汁和杵千百下丸如梧桐子大每服一丸二丸以豆淋酒嚼下日三治癱瘓並一切風口眼喎斜語言謇澀手足不便大通丹方雄黃硫黃丹砂三味同研水銀金銀二味用水銀結沙子鉛丹胡粉硝石白礬四味同研以上各二兩上一十味共一處和勻入固濟瓷瓶內瓶子上注一小眼用火養之漸漸加火若竅內有煙出便用鹽泥塞住更養一日鉛霜二兩龍腦研半兩麝香研一兩王屑半兩犀角鎊半兩烏蛇一條去皮骨炙白花蛇三兩去皮骨炙附子炮裂去皮臍二兩牛黃研半兩高良薑蟬蛻白殭蠶炒各一兩天竺黃蓽澄茄天麻白附子炮各二兩上一十六味搗研為末並前十味末再研勻糯米飯和丸如小彈子大陰乾若初得患先洗浴豆淋酒化下一丸心膈不煩津液俱生如人行十里以來用稀粥飲投之須臾汗出便解日三服一丸治癱瘓風腳膝無力行履艱難筋骨麻痹威靈仙丸方威靈仙去苗土五兩草烏頭炒銼七兩骨碎補去毛二兩半地龍去土炒天南星炮各三兩自然銅燒醋淬研一兩半蒼耳仙靈脾側子炮裂去皮臍防風去叉各四兩羌活去蘆頭蔓荊實揉去皮澤瀉藁本去苗土萆薢獨活去蘆頭各一兩上一十六味搗羅十五味為末合自然銅末研令勻用好酒煮麵糊和丸如梧桐子大每服五丸漸加至十五丸空心溫酒下才服後忌便吃熱物覺唇口麻者痹漸減也治中風癱瘓肢節沉重筋骨無力荊芥散方荊芥穗防風去叉桑寄生羌活去蘆頭獨活去蘆頭芍藥乾蠍去土炒白花蛇酒浸去皮骨炙天麻附子炮裂去皮臍半夏湯洗七遍炒麻黃去根節木香蔓荊實去白皮芎藭白殭蠶炒各半兩龍腦研沉香銼麝香研丹砂研各半錢牡丹皮桂去粗皮各三錢上二十二味搗研為散再同研勻每服二錢匕濃煎生薑薄荷湯調下食後服治癱瘓不收體重無力肢節緩弱運動不能沉香煎丸方沉香銼丁香葫蘆巴炒附子炮裂去皮臍牛膝去苗銼酒拌炒骨碎補炒蘹香子炒石斛銼酒拌炒芎藭木香青橘皮湯浸去白焙桂去粗皮肉蓯蓉各半兩上一十三味搗羅為細末煉蜜和杵數百下丸如梧桐子大每服二十丸炒生薑鹽湯下酒亦得治偏風癱瘓腳氣等疾羌活湯方羌活去蘆頭麻黃去根節湯煮掠去沫焙各一兩防風去叉三分木香檳榔銼附子炮裂去皮臍白朮烏頭炮裂去皮臍草豆蔻和皮陳橘皮湯浸去白焙牛膝酒浸一宿切焙當歸酒浸一宿切焙杏仁去皮尖雙仁生用人參白茯苓甘草芎藭桂去粗皮各半兩上一十八味銼如麻豆每服一兩水三盞生薑七片煎至一盞去滓取七分溫服大腸不通加大黃末一錢量老少加減久不通者加至三五錢小腸不通心腹脹加葶藶並滑石末各一錢滑石湯調下上膈壅滯咳嗽氣急加半夏升麻天門冬知母末各二錢服訖衣復取汗不過三五服瘥治中風癱瘓並柔風一切風疾通明赤丸方烏蛇去頭骨並皮不用麻黃去根節白殭蠶各一兩白附子生用半夏湯洗去滑乾蠍去土乾薑炮天南星附子去皮臍各半兩麝香研一分上一十味並生用搗為末以湯浸槐膠研和為丸如大麻子大以生絹袋盛不得置合內亦不得以火焙常服每日空心薄荷酒下三丸至五丸微嚼破服覺藥沖煨甘草含之如中風急以溫薄荷酒磨五丸或七丸服之小兒中諸風癇天瘹風等以母乳磨一丸或兩丸量力服之治中風癱瘓口眼喎斜青金丹方丹砂水銀胡粉雌黃曾青白礬鉛丹硫黃上八味等分各細研別盛用固濟瓶子一個先入丹砂次入硫黃次入水銀次入曾青次入鉛丹次入胡粉次入雌黃次入白礬遞相蓋之如法固濟瓶口候乾入爐漸漸以四兩火養一復時即以半斤火煅之令通赤漸漸退火以濕黃泥罨之待冷取出藥於地上出火毒更入白殭蠶末乾蠍末鉛霜等分研和令勻粟米飯為丸如緑豆大每服五丸空心薄荷湯下或溫酒亦得治癱瘓風手足不遂方椿皮如無用枝葉亦得干為末枸杞根細銼益母草苦參棗木皮生取銼各一斤五靈脂研五兩上六味搗研為末每用時約滲一人身長闊厚半指許於上更如魚鱗砌新好者牛馬驢骨於藥上面以草火勻燒直候骨透勻為灰卻急掃除去骨灰令淨就熱藥急鋪席薦看厚薄得所令患人臥欲臥時先服鎮心散一服治癱瘓風四肢緩弱無力鎮心散方白牽牛半生半炒防風去叉甘草銼各一兩上三味搗羅為細末每服二錢匕新汲水調下服了後便令患人就所患一邊臥於鋪上才上鋪便用追魂散三錢匕酒一盞煎沸和滓服盡當有汗出如膠水治癱瘓風追魂散方五靈脂三兩杵碎以水浸攪勻先傾去上黑濁者後去下沙石者取中間細者於灰盆中紙上浥乾用上一味搗研為末每服三錢匕酒一盞煎兩沸服繼服續命湯治癱瘓風續命湯方山茵陳一兩揀擇淨麻黃去節四兩上二味粗搗篩每服十錢匕水三盞煎至二盞入好酒一盞半更煎三五沸去滓服盡不得離臥床上避風三七日須服六十一日乃無後患也寢室須是不透風從十月後二月以前可用此法治之過此時勢難用也治癱瘓風烏靈丸方烏頭削去皮臍一兩五靈脂炒二兩上二味搗羅為末於五月五日日未出時以東南井華水拌和面南坐入臼杵一千下丸如彈子大每服一丸分作四服用溫生薑酒磨下服後蓋衣被出汗隔一日再服稍愈即止治中風手足無力口中涎出多在右邊枳殼散方枳殼去瓤麩炒二兩牛黃研白芷各一兩上三味搗研為散每服三錢匕空心溫酒調下治癱瘓風久服山梔子丸方山梔子去皮草烏頭炮乾薑炮各半兩上三味搗羅為末煮棗肉和丸如緑豆大每服三丸漸加至七丸常服二丸不嚼茶酒任下治中風癱瘓排風散方白附子麻黃去根節天麻骨碎補去毛白殭蠶羌活去蘆頭各一兩上六味並生用搗羅為散每服五錢匕溫酒調下不拘時風嚲曳論曰人假水穀之精化為氣血周流一身使四肢相隨筋脈相續猶挈裘領無所不從若脾胃虛弱水穀不化筋脈無所稟養復遇風邪外搏膚腠流傳筋脈筋脈縱緩則肢體嚲曳其嚲則偏而不舉曳則弛而不隨是皆不能收攝也治中風手足嚲曳不能言獨活湯方獨活去蘆頭二兩甘草炙桂去粗皮生葛根芍藥栝蔞實各一兩上六味銼如麻豆每服五錢匕以水一盞半生薑三片煎取一盞去滓溫服日三夜一治中風嚲曳攣躄不能起百部散方百部一兩烏頭炮裂去皮臍一分牛膝去苗切酒灑焙白朮各半兩上四味搗羅為細散每服一錢匕溫酒調下漸加至二錢匕日三夜一治中風手顫嚲曳語澀羚羊角丸方羚羊角鎊一兩犀角鎊三分羌活去蘆頭防風去叉各一兩半薏苡仁炒秦艽洗各二兩上六味為細末煉蜜丸如梧桐子大每服二十丸煎竹葉湯下漸加至三十丸治中風手腳顫掉嚲曳敗龜丸方敗龜塗酥炙五兩上一味為細末研飯為丸如梧桐子大每服二十丸溫酒下不拘時治中風手足嚲曳口眼喎斜語言謇澀步履不正神驗烏頭丸方烏頭生去皮臍五靈脂各五兩麝香研一分上三味先以二味為細末入麝香同研令細勻滴水為丸如杏核大每服一丸先用生薑自然汁研化次以暖酒調下早晚食後服五七丸便能行步十丸可以舉手治風嚲曳肢體不能收攝獨活湯方獨活去蘆頭一兩桂去粗皮一兩半生葛根洗切二兩甘草炙防風去叉當歸酒浸切焙各半兩芍藥附子炮去皮臍各三分生薑洗切二兩半夏為末薑汁調作餅曝乾一兩上十一味銼如麻豆每服五錢匕水一盞半生薑三片煎至一盞去滓溫服日二治風嚲曳肢體緩弱不相繼續薑附湯方乾薑炮附子炮裂去皮臍各二兩麻去根節芎藭桂去粗皮各一兩上五味銼如麻豆每服三錢匕水一盞煎至七分去滓溫服日三治風嚲曳手足不遂身體不能俯仰附子湯方附子炮裂去皮臍乾薑炮甘草炙防風去叉獨活去蘆頭各一兩半石膏碎白茯苓去黑皮白朮芎藭柴胡去苗當歸酒浸切焙人參各一兩杏仁去皮尖雙仁炒研二十枚細辛去苗葉一兩上一十四味銼如麻豆每服五錢匕水酒共一盞半煎至一盞去滓溫服日三人羸弱者只用水煎服治風嚲曳及癱瘓不遂等疾羚羊角湯方羚羊角鎊防己杏仁去皮尖雙仁炒研各一兩半側子炮裂去皮臍半兩五加皮二兩磁石生杵碎八兩乾薑炮芍藥麻黃去根節各一兩半薏苡仁二兩防風去叉芎藭秦艽去苗土甘草炙各半兩上一十四味㕮咀如麻豆每服三錢匕水一盞煎至七分去滓溫服日三夜一治一切風手足嚲曳肢體不仁及骨節痠疼口面偏斜痰涎語澀心忪驚悸生犀天麻丸方犀角鎊一兩天麻酒浸二兩獨活去蘆頭人參丁香木香烏藥麻黃去根節各一兩牛黃研龍腦研琥珀研乳香研真珠研麝香研各一分天南星牛膽匱者防風去叉各半兩白花蛇酒浸去皮骨炙三分蠍梢炒一分芎藭一兩安息香一兩酒化研去沙石熬成膏上二十味除研者外為細末再研令勻入安息香膏並煉蜜和丸如梧桐子大每服二十丸溫酒下荊芥湯亦得不拘時治一切風手足麻痹嚲曳或即腫癢疼痛天南星丸方天南星臘月牛膽匱者三分白芷一兩半麻黃去根節一兩防風去叉一兩半羌活去蘆頭獨活去蘆頭芎藭天麻白芍藥桔梗銼炒細辛去苗葉白殭蠶炒各半兩甘草炙一分半乾薑炮一分龍腦研一錢麝香研一分上一十六味除研外為細末和令勻煉蜜丸如杏核大丹砂為衣每服一丸細嚼以薄荷溫酒下不計時候傷寒頭目昏痛肢節疼者薄荷茶下並吃三兩服尤妙治中風嚲曳手足不收口眼不正語言謇澀大治筋骨疼痛天麻丸方天麻附子炮裂去皮臍乾蠍全者炒白殭蠶直者炒芎藭牛膝去苗酒浸切焙各一兩乾薑炮甘草炙各半兩上八味為細末煉蜜丸如梧桐子大每服二十丸溫酒下治一切風手足嚲曳肢體麻痹不仁及骨節疼痛口面偏斜痰涎語澀心忪驚悸並宜服之生犀天麻丸方犀角鎊一兩天麻酒炙二兩地榆去苗玄參丁香烏頭炮裂去皮臍烏藥木香丹砂研各一兩乳香研龍腦研麝香研牛黃研真珠研琥珀研自然銅火煅醋淬各半兩安息香酒浸一宿去皮骨炙熬綿濾去沙石再熬成膏麻黃去根節一兩白花蛇酒浸一宿去皮骨炙一兩蠍梢炒一分天南星用牛膽內匱者半兩防風去叉半兩上二十二味除別研膏外為細末再合研令勻將安息香膏更別煉蜜和為丸如櫻桃大每服一丸以溫酒或荊芥薄荷湯嚼下丸如梧桐子大二十丸溫酒下亦得賊風論曰邪之中人有四從所不勝來者謂之賊邪與冬至之日疾風南來名曰賊風其義一也聖人於虛邪賊風避之有時以邪從所不勝來故謂之虛邪以其竊害中和之氣故謂之賊風其證痛而不熱痛則不能按抑轉動不熱則身內索冷欲得熱尉即小寬也加以風冷則骨解深痛按之徹骨或遇冷氣相搏則結瘰癧或偏枯風熱相搏則變附骨疽治中賊風急強大呼身體疼痛大續命湯方麻黃去根節煎掠去沫焙三兩石膏碎防風去叉各二兩乾薑炮一兩半黃芩去黑心芎藭甘草炙白朮遠志去心獨活去蘆頭各一兩紫石英半兩杏仁三十五枚去皮尖雙仁炒上一十二味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服不拘時良久再服治中賊風急強大呼不自覺知身體盡痛麻黃湯方麻黃去根節煎掠去沫焙黃芩去黑心芎藭當歸切焙紫石英甘草炙銼桂去粗皮遠志去心獨活去蘆頭桔梗炒各一兩防風去叉石膏碎各二兩乾薑炮一兩半杏仁二十五枚去皮尖雙仁炒上一十四味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服不拘時日三夜一治中賊風急強大呼不自覺知身體強直桂枝湯方桂去粗皮乾薑炮黃芩去黑心芎藭遠志去心獨活去蘆頭防風去叉紫石英甘草炙各一兩麻黃去根節煎掠去沫焙三兩杏仁二十五枚去皮尖雙仁炒石膏二兩上一十二味粗搗篩每服五錢匕水二盞煎至一盞去滓溫服日三夜一治中賊風半身不遂口面喎僻言語不便葛根湯方生葛根切半夏湯洗七遍各四兩生薑五兩與半夏同搗炒乾獨活去蘆頭二兩桂去粗皮二兩半防風去叉當歸切焙芍藥甘草炙各一兩附子炮裂去皮臍半兩上一十味銼如麻豆每服五錢匕水一盞半入生薑一棗大拍碎煎至八分去滓溫服日二夜一治賊風入腹角弓反張口噤舌強目視不明不能言語舉體不仁心腹㽱痛甘草飲方甘草炙黃芩去黑心各二兩附子一枚炮裂去皮臍人參芎藭防風去叉麻黃去根節防己各一兩上八味銼如麻豆每服五錢匕水一盞半入生薑三片煎至八分去滓空心食前溫服治賊風入五臟四肢心脅急痛咽乾口噤麻黃飲方麻黃去根節二兩當歸切焙芎藭甘草炙乾薑炮各二兩黃芩去黑心一兩杏仁三十枚去皮尖雙仁炒上七味粗搗篩每服五錢匕酒半盞水一盞煎至一盞去滓空心溫服治賊風入腹腹中拘急煩亂恍惚妄語迷惑不知人事口噤不開臥則驚怖口乾惡風時時失精茵芋飲方茵芋烏頭炮裂去皮臍乾薑炮細辛去苗葉黃芩去黑心桂去粗皮天雄炮裂去皮臍防己白茯苓去黑皮各一兩秦艽去苗土防風去叉當歸焙甘草炙各二兩上一十三味銼如麻豆每服五錢匕水一盞半入䈽竹瀝少許煎至八分去滓溫服治中賊風肢體不收不知痛處卒語不得手足拘急腰痛引頸目眩欲倒臥即反張脊不著席脈動不安恍惚恐懼上氣嘔逆杏仁飲方杏仁三十枚去皮尖雙仁炒芎藭石膏碎桂去粗皮當歸焙麻黃去根節乾薑炮黃芩去黑心甘草炙各一兩上九味粗搗篩每服五錢匕水一盞半煎至八分去滓空心溫服日再治賊風口噤角弓反張當歸飲方當歸焙防風去叉各三兩獨活去蘆頭麻黃去根節煎掠去沫各一兩半細辛去苗葉一兩附子一枚炮裂去皮臍上六味銼如麻豆每服五錢匕酒半盞水一盞入生薑一棗大拍碎煎至八分去滓空心溫服
