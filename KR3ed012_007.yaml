body:
  text: 卷第七中風失音論曰喉嚨者氣之所上下也會厭者音聲之門戶其氣宣通則聲音無所阻礙若風邪搏於會厭則氣道不宣故令人失音入臟則不能言語矣治中風失音不語羌活湯方羌活去蘆頭二兩半甘草炙人參各半兩附子炮裂去皮臍一枚荊瀝竹瀝生地黃汁各半盞上七味將前四味銼如麻豆每服五錢匕以水一盞入三件汁瀝半盞共煎至一盞去滓溫服日三夜一治中風失音不語地黃湯方生地黃汁淡竹瀝各半盞獨活去蘆頭一兩附子炮裂去皮臍半兩上四味將二味銼如麻豆每服三錢匕以水一盞入竹瀝地黃汁少許同煎一盞去滓溫服空心日午夜臥各一治中風失音不語薑附湯方乾薑炮附子炮裂去皮臍甘草炙桂去粗皮當歸酒浸切焙白朮細辛去苗葉杏仁去皮尖雙仁炒研各一兩麥門冬去心焙二兩上九味銼如麻豆每服三錢匕水一盞煎至七分去滓溫服治中風失音手足不遂羚羊角湯方羚羊角鎊芎藭細辛去苗葉木香防風去叉麻黃去節獨活去蘆頭羌活去蘆頭當歸酒浸切焙附子炮裂去皮臍桂去粗皮天麻各一兩上一十二味銼如麻豆每服三錢匕水一盞煎至七分去滓溫服不拘時治中風失音不語羌活湯方羌活去蘆頭二兩半人參二兩附子炮裂去皮臍一枚甘草炙二兩桂去粗皮一兩獨活去蘆頭三分菖蒲切半兩上七味銼如麻豆每服五錢匕水一盞入荊瀝竹瀝地黃汁共半盞同煎至一盞去滓溫服空心日午夜臥各一治中風失音不語羌活湯加防風方羌活去蘆頭二兩甘草炙人參各一兩半防風去叉二兩附子炮裂去皮臍二枚生地黃汁荊瀝竹瀝各半盞上八味將前五味銼如麻豆每服五錢匕水一盞入地黃汁並瀝汁各半盞同煎一盞去滓溫服空心日午夜臥各一治中風失音不語昏沉不識人竹瀝湯方竹瀝荊瀝梨汁各二合陳醬汁半合上四味相合微煎一兩沸再濾一遍令溫細細灌入口中口噤斡開口灌之治中風失音不語半身不遂柏子仁散方柏子仁生研細二兩桂去粗皮為末一兩上二味共和勻別用大豆一升雞糞白三合同炒令黃投酒三升乘熱濾去滓每用酒一盞溫調藥二錢匕空心日午夜臥服治中風失音不語紫桂湯方桂二兩去粗皮上一味粗搗篩每服三錢匕水一盞煎取七分去滓空心日午夜臥服次日如不退連進三服衣被復取汗為效治中風失音不語竹豆湯方新青竹碎如算子四十九莖烏豆二升上二味以水八升相和煮令豆爛去滓再煎取一升每服二合灌之或口噤不開者即斡口灌之治中風失音不語紫桂散方桂五寸去粗皮為細末亂髮灰比桂末一半上二味同研勻分四服日夜各二服每服內舌下良久以溫水衝下治中風失音不語大豆煎方大豆緊小者二升洗淨生薑汁一合上二味先用水五升煮豆至二升絞去豆入薑汁慢火煎如稀膏空心食後夜臥時各用一匙細細含咽甚者用竹瀝二合調服治中風失音不語柏子仁酒方柏子仁生研二兩雞糞白炒二兩桂去粗皮二兩生薑不去皮切一兩上四味粗搗篩共炒令焦色乘熱投酒六升候冷濾去滓每服一七分盞空心日午夜臥服治中風失音立效菖蒲飲方菖蒲石上者一分桂去粗皮一兩上二味粗搗篩每服二錢匕水一盞前至七分去滓溫服不計時服治卒中風不語失聲及聲噎不出白礬丸方白礬生研陳橘皮去白炒桂去粗皮各一兩上三味為細末棗肉和丸如彈子大每服一丸含化咽津不計時候中風舌強不語論曰中風舌強不語者蓋脾脈絡胃俠咽連舌本心氣所通今風邪客搏則氣脈閉塞不利所以舌強不能舒捲有害於言語也治中風舌強不得語面赤欲絶身體緩急目視不停黃芩湯方黃芩去黑心桂去粗皮芎藭人參防風去叉防己麻黃去根節先煎掠去沫焙甘草炙芍藥白朮各半兩附子炮裂去皮臍一枚上一十一味銼如麻豆每用六錢匕以水三盞入生薑三棗大拍碎煎取一盞半去滓分溫二服空心臨臥各一服治中風舌強不得語身體緩急口目不正奄奄忽忽神情悶亂凡中諸風者服之皆驗不令人虛麻黃湯方麻黃去根節先煎掠去沫焙防己黃芩去黑心桂去粗皮芍藥甘草炙各一兩防風去叉人參各一兩半附子炮裂去皮臍一枚上九味銼如麻豆每用藥十錢匕水三盞入生薑三棗大拍碎煎取一盞半去滓分三服空心並二服相去如人行五里再服衣復汗出慎外風治中風舌強不得語兩目不開短氣欲死防風湯方防風去叉甘草炙黃芩去黑心白茯苓去黑皮當歸切焙各半兩杏仁湯退去皮尖雙仁炒五十枚秦艽去苗土一分麻黃去根節先煎掠去沫焙一兩上八味粗搗篩每用藥十錢匕水二盞清酒一盞入棗三枚去核生薑二棗大拍碎同煎取一盞半去滓分三服空心並二服相去如人行五里更一服治中風舌強不得語附子湯方附子炮裂去皮臍三分麻黃去根節先煎掠去沫焙一兩半芎藭二兩細辛去苗葉三分白蘚皮茯神去木杏仁湯退去皮尖雙仁炒羌活去蘆頭防己桂去粗皮甘草炙各二兩上一十一味銼如麻豆每用藥十錢匕以水三盞入生薑三棗大拍碎煎取一盞半去滓分三服空腹並二服相去如人行五里更一服治中風舌強不得語手足舉動不得羌活湯方羌活去蘆頭一兩羚羊角鎊半兩麻黃去根節先煎掠去沫焙用一兩防風去叉半兩獨活去蘆頭半兩旋覆花炒一兩人參白茯苓去黑皮當歸切焙麥門冬去心龍齒搗各半兩上一十二味粗搗篩每用藥十錢匕以水三盞煎取一盞半去滓溫分三服空心日午夜臥各一服治中風舌強不得語心神煩悶竹瀝湯方淡竹瀝五合人乳汁二合三年醬汁半合上三味相和調勻分三服溫服口噤斡開灌之立瘥治中風不得語舌根澀硬陳醋方陳醋二合三年醬汁人乳汁各五合上三味相和研以生絹濾絞取汁分為三服日夜服之服盡能語治中風舌強不得語白礬散方白礬生用桂去粗皮各二兩上二味搗羅為散每服一錢匕安舌下有涎吐出即語治中風不得語舌根強桂心散方桂去粗皮搗羅為末半兩上一味炒半錢匕安舌下辛辣痛甚為效勿以水漿漱去有涎即吐之治中風不語精神冒悶玳瑁丸方玳瑁鎊丹砂研雄黃研白芥子各半兩麝香研一分上五味搗羅為末再同研勻別以銀石器酒煎安息香一兩為膏和丸如緑豆大每服十丸溫童子小便下不拘時候服兼治忽中惡不語治中風舌強不語手足拘急發歇有時羚羊角湯方羚羊角鎊麻黃去根節防風去叉升麻桂去粗皮芎藭薏苡仁各一兩羌活去蘆頭杏仁去皮尖雙仁炒各二兩上九味粗搗篩每服三錢匕水一盞入木通竹葉煎至七分去滓不拘時溫服治中風舌強不語獨活酒方獨活去蘆頭銼一兩上一味以酒二升煎取一升別炒大豆五合將藥酒熱投良久溫服三合未瘥再服治中風舌強不語三聖散方沒藥研琥珀研各一分乾蠍七枚全者炒上三味搗研為末每服三錢匕用鵝梨汁半盞皂莢末一錢匕濃煎湯一合與梨汁相和調下須臾吐出涎毒便能語治心脾中風舌強不語涎潮昏塞不省人事雄黃丸方雄黃研丹砂研牛黃研天南星牛膽內製者白殭蠶生用天麻生用各半兩麝香一分金薄銀薄各十五片與麝香同研上九味搗研為細末煉蜜丸如雞頭實每服二丸溫薄荷汁化下不拘時柔風論曰柔風之狀四肢不能收裡急不能仰蓋以血氣俱虛風邪併入在陽而搏於外則皮膚緩在陰而乘於內則腹裡急故也治柔風身體疼痛四肢緩弱欲起不隨並治産後中風四肢不能收攝羌活湯方羌活去蘆頭熟乾地黃焙桂去粗皮葛根銼芍藥麻黃去根節先煮掠去沫焙甘草炙各一兩半上七味粗搗篩每服五錢匕清酒一盞水一盞入生薑半分切碎煎取一盞去滓溫服日二夜一治柔風四肢不能收攝並風毒腳氣行履不得檳榔湯方檳榔煨七枚銼黑豆小者炒二升桑根白皮炙銼二兩郁李仁去皮尖微炒半兩上四味粗搗篩每服五錢匕水一盞半入生薑半分切碎煎至一盞去滓空心臨臥溫服治柔風身體疼痛自汗出石膏散方石膏別研如粉一兩甘草炙銼三分上二味搗羅為散每服一錢匕溫酒調下日四服不拘時治柔風四肢不收腹內拘急兼治婦人産後中風紫葛散方紫葛銼防風去叉羌活去蘆頭各一兩甘草炙銼黃連去須各半兩上五味搗羅為散每服二錢匕溫酒調下治柔風肢體弛緩不收裡急不能仰息兼治婦人産後中風地膚子散方地膚子炒二兩紫葛銼一兩半白頭翁銼炒一兩上三味搗羅為散每服二錢匕加至三錢匕溫酒調下治柔風舉體無力四肢緩弱不能行立蓯蓉丸方肉蓯蓉酒浸切焙牛膝去苗酒浸切焙菟絲子酒浸別搗各一兩上三味搗羅為末用白麵二兩附子生去皮臍為末一兩共用酒煮為糊丸如梧桐子大每服二十丸食前溫酒下治柔風腳膝痿弱久積風毒上衝肩膊胸背疼痛婦人産後中風仙人杖浸酒方仙人杖根一斤四兩刮洗去土皮銼枸杞根白皮是也上一味用生絹囊貯以酒二斗浸七日每日溫飲一盞至兩盞不拘時酒欲盡再入五升依前浸服兼治一切熱毒風治柔風肢體緩弱腹內拘急不得俯仰五枝煎方桑枝桃枝槐枝百靈藤枝柳枝各細銼二升黑豆洗三升防風去叉羌活去蘆頭各二兩上八味五枝各取東南向者細銼如豆粒羌活防風搗羅為末先將豆鋪甑中攤平即將五枝攤於豆上蒸之及一飯頃卻取釜中湯約一斗五升淋過凡三五度淋收取汁又別著鍋煎湯旋添入釜中再蒸以豆爛熟即下甑看釜中湯約一斗淨鍋中煎三分減二入防風羌活二味末同煎如稠餳每日空心夜臥時溫酒調半匙許加至一匙若婦人血風及風手足攣跛半身不遂即入桂並當歸末各一兩地黃汁七合及生薑汁三合同和前藥煎神效其滓即乘熱分作三處以帛裹之每夜服藥後尉不遂處速效冷即用酒拌炒熱用之治柔風身體疼痛行履不得酸棗仁煎方酸棗仁生用三兩敗龜醋炙一兩海桐皮銼二兩仙靈脾去粗莖赤石脂萆薢炒各一兩羌活去蘆頭二兩虎骨塗酥炙一兩半蒺藜子炒去角石斛去根牛膝去苗酒浸切焙巴戟天去心附子炮裂去皮臍木香杜仲去粗皮炙銼熟乾地黃焙乾各一兩白蜜次入四兩牛酥次入一兩半桑枝一握長五寸銼上一十九味將十六味搗羅為末後用清酒一斗先煎桑枝令色黃濾去桑枝卻下藥末更煎取沸次下白蜜牛酥煎如稀膏用瓷合盛每服半匙許溫酒調下空心日午夜臥服治柔風血氣俱虛邪中內外皮膚緩縱腹裡拘急白花蛇散方白花蛇用頭項肉酒浸去骨慢火炙令焦藁本去苗土五加皮銼牛膝酒浸切焙萆薢桂去粗皮熟乾地黃焙木香蕓薹子炒當歸切焙各半兩甘草炙一兩威靈仙去苗土白附子炮甘菊花各半兩蔓荊實去白皮一兩郁李仁去皮半兩羌活去蘆頭虎骨酥炙一兩乾蠍微炒半兩白芷防風去叉各一兩上二十一味搗羅為散每服二錢匕空心溫酒調下不拘時候亦得治柔風四肢不收裡急不能仰乳香煎丸方乳香研一兩麝香研半兩天麻二兩沒藥研地榆玄參烏頭生去皮臍甜瓜子各一兩上八味將五味搗羅為細末入研藥和勻別用麻黃去根節二兩搗羅為末以酒一升慢火熬為膏更入煉蜜同和藥丸如梧桐子大每服十五丸至二十丸溫酒下荊芥湯亦得治柔風四肢不收腹中拘急附子煎方附子炮裂去皮臍五兩黑豆洗一升天雄炮裂去皮臍五兩防風去叉三兩以上四味將三味細銼並豆用酒一斗五升煮候豆爛去滓取汁更用天麻芎藭各五兩上共六味將此二味搗羅為散與前豆藥汁同煎如稀餳每日空心熱湯或溫酒調服一匙頭治柔風筋骨緩弱不能行立附子湯方附子炮裂去皮臍一兩上一味㕮咀如麻豆以水五