body:
  text: 卷第一百八丹石毒上攻目論曰丹石毒氣上攻於目者熱氣內乘於肝也在竅為目本受血而能視服石之人將適失宜其毒流於肝則營血否澀沖發於目故令兩目赤痛或生胬肉治不宜緩緩則石勢穿發睛瞳目睛高突損爛難療治丹石熱毒上攻目生翳心躁面赤頭痛大黃湯方大黃銼炒當歸生乾地黃焙芎藭葛根銼甘草炙銼紫葳根凌霄花根是也焙麥門冬去心焙天門冬去心焙各半兩山梔子仁地骨皮黃連去須各一兩上一十二味粗搗篩每服五錢匕水一盞半入竹葉十片煎至八分去滓食後臨臥服治丹石毒上攻目赤煩悶熱氣胸中淡淡前胡瀉肝湯方前胡去蘆頭大青秦皮銼干藍黃芩去黑心細辛去苗葉決明子各三兩梔子仁二兩石膏四兩碎上九味粗搗篩每服五錢匕水一盞半入竹葉十片車前葉七片細切煎至八分去滓入芒硝一錢匕放溫食後臨臥服治風熱眼兼丹石發動目赤痛瀉肝大黃湯方大黃銼炒黃芩去黑心決明子炒山梔子仁桑根白皮銼前胡去蘆頭甘草炙銼羚羊角鎊枳殼去瓤麩炒各二兩黃連去須大青細辛去苗葉各半兩上一十二味粗搗篩每服五錢匕水一盞半煎至八分去滓食後臨臥溫服治丹石毒及客熱沖眼赤痛淚出決明子湯方決明子微炒枳殼去瓤麩炒柴胡去苗黃芩去黑心芍藥甘草炙銼車前子葉干各一兩升麻梔子仁各半兩上九味粗搗篩每服五錢匕水一盞半入竹葉十片煎至七分去滓入芒硝一錢匕放溫食後臨臥服治金石發動眼痛欲裂葛根湯方葛根銼黃連去須木通吳藍甘草炙銼各二兩升麻黃芩去黑心大黃銼炒各一兩半石膏四兩上九味粗搗篩每服五錢匕水一盞半煎至六分去滓入硝一錢匕地黃汁半合更煎三兩沸放溫服食後臨臥服治熱毒眼及丹石發動躁渴睛痛赤熱淚羚羊角湯方羚羊角鎊子芩山梔子仁麥門冬去心焙桔梗銼炒知母貝母去心炒甘草白檳榔銼各一兩前胡去蘆頭半兩上一十味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服治乳石發動頭痛太陽兩脈掣熱痛目赤睛疼若毒不解當睛破前胡湯方前胡去蘆頭麥門冬去心焙山梔子仁各半兩葛根銼三分漏蘆銼三兩葳蕤甘草炙銼各一兩上七味粗搗篩每服五錢匕水一盞半入竹葉十片煎至八分去滓食後臨臥服治諸石毒眼睛疼寒熱時作麥門冬湯方麥門冬去心焙二兩甘草炙銼黃芩去黑心大黃銼炒梔子仁各一兩上五味粗搗篩每服五錢匕水一盞半煎至八分去滓下芒硝一錢匕食後臨臥溫服治諸石毒盛熱不除腹滿小便赤大便澀不利吐逆氣衝胸口焦目赤三黃湯方黃連去須二兩大黃銼炒一兩黃芩去黑心三兩甘草炙銼一兩上四味粗搗篩每服五錢匕水一盞半煎至八分去滓下芒硝一錢匕溫服以利為度治丹石發動發熱心腹脹滿小便赤大便難胸中煩躁目赤痛黃芩湯方黃芩去黑心大黃銼炒各二兩梔子仁一兩豉炒三合上四味粗搗篩每服三錢匕水一盞煎至六分去滓食後臨臥溫服治服丹石過多熱毒上乘兩目赤痛或生胬肉或即腫爛羚羊角湯方羚羊角鎊茯神去木防風去叉羌活去蘆頭芎藭地骨皮菊花各一兩甘草炙銼三分麥門冬去心焙一兩半枳殼去瓤麩炒犀角鎊各三分上一十一味粗搗篩每服三錢匕水一盞煎至七分去滓早晚食後溫服時氣後患目論曰時氣後忽目赤腫痛或生翳膜者肝心肺餘熱上攻於目故也蓋目受五臟精華不獨專屬於肝心肺之熱亦能乘之故時氣之後臟腑餘毒未盡熏發於目或因體虛未實多食熱毒之物皆令目病輕者亦痛重者或致翳暈輕者眼見黑花治法尤在慎飲食戒房室以就痊平不然湯劑交攻無益也治時氣患後起早勞發風眼赤痛人參湯方人參地骨皮羚羊角鎊防風去叉赤茯苓去黑皮各三分升麻玄參黃芩去黑心各半兩決明子微炒一兩上九味粗搗篩每服五錢匕水一盞半煎取八分去滓食後臨臥各一服治時氣病後眼忽失明地膚子丸方地膚子草決明微炒沙參秦皮去粗皮人參甘菊花羚羊角屑各三分枳殼去瓤麩炒半兩大黃銼炒令香一兩上九味搗羅為末煉蜜和丸梧桐子大漿水下三十丸臨臥再服治時氣後服補藥過多眼忽失明頭痛憎寒天陰即甚前胡湯方前胡去蘆頭三兩生麥門冬去心焙乾五兩甘草炙二兩梔子仁葛根銼漏蘆各一兩葳蕤二兩上七味粗搗篩每服五錢匕水一盞半入竹葉十片煎取八分去滓食後臨臥服後用蚡鼠土膏其方在後治時氣後服補藥過多致眼忽失明兩鬢脈掣頭痛憎寒蚡鼠土膏方田中蚡鼠土三升木香一兩大黃銼炒五兩白蘞一兩凝水石六兩上五味搗羅為末用酒和調如稠餳當痛掣處摩之如手掌許敷之干即易不住頻頻貼痛處即止治時氣病後目赤澀痛栝蔞根湯方栝蔞根二兩銼茅根銼麥門冬去心焙黃連去須石膏碎知母焙甘草炙各一兩上七味粗搗篩每服五錢匕水一盞半煎取八分去滓溫服食後臨臥治時氣病後客熱暴躁目赤澀痛冷淚壯熱葛根湯方葛根三分銼地骨皮一兩薺苨生者切焙一兩車前子三分甘草炙半兩上七味粗搗篩每服五錢匕水一盞半煎取八分去滓溫服食後臨臥治時氣病後眼生翳赤痛決明湯方決明子鉤藤各一兩牡丹皮升麻各三分羚羊角鎊芍藥大黃銼炒各一兩上七味粗搗篩每服五錢匕水一盞半煎取八分去滓溫服食後臨臥治時氣病目暗黃耆湯方黃耆銼三分枳殼去瓤麩炒半兩人參三分當歸切焙一兩黃柏去粗皮蜜炙一兩黃連去須三分上六味粗搗篩每服三錢匕水一盞煎至六分去滓食後溫服日三治時氣病後目赤澀痛竹葉湯方黃芩去黑心黃連去須各一兩升麻一兩半甘草炙半兩上四味粗搗篩每服五錢匕水一盞半入竹葉十片煎至八分去滓入芒硝半錢匕溫服如人行五里再服通利即止治時氣病後風毒眼熱痛大黃湯方大黃銼炒二兩枳殼去瓤麩炒黃芩去黑心菊花梔子仁各一兩上五味粗搗篩每服五錢匕水一盞半煎取八分去滓食後溫服得利即止治時氣病後目赤痛黃連湯方黃連去須四兩芍藥二兩黃芩去黑心秦艽去苗各一兩上四味粗搗篩每服五錢匕水一盞半煎取八分去滓食後臨臥服治時氣病後眼忽失明但瞳仁不損者蔓荊子散方蔓荊子六升上一味以布袋盛急水中洗於甑中先鋪茅茅上安布布上著蔓荊子蒸令勻透即取釜中湯淋曝乾如此三度搗為細散每食後煎湯調三錢匕溫服臨臥再服治時氣病後目赤痛不開昏暗洗眼秦皮湯方秦皮去粗皮銼黃連去須各一兩半梔子仁大黃銼炒細辛去苗葉蛇銜草苦竹葉鹽各一兩上八味細銼於臼中搗令碎爛如眼赤及痛每用五錢匕以水二盞煎取一盞濾去滓頻頻洗眼治時氣病後毒氣攻目赤爛洗眼升麻湯方升麻三分秦皮去粗皮銼黃連去須葳蕤各一兩上四味粗搗篩作三次用每次以水一升煎取半升綿濾去滓洗眼治時氣病後餘毒不盡上攻目赤澀痛或生障翳防風散方防風去叉菊花甘草炙銼威靈仙去苗土黃連去須惡實等分微炒上六味搗羅為末每服一錢匕沸湯調下目赤新汲水調下治時氣後眼暗及有翳膜茺蔚子丸方茺蔚子澤瀉各一兩半枸杞青葙子生乾地黃焙枳殼去瓤麩炒各一兩石決明細辛去苗葉麥門冬去心焙車前子各二兩黃連去須三兩上一十一味搗羅為末煉蜜丸如梧桐子大每服三十丸食後漿水下治傷寒後兩目昏暗或生浮翳前胡犀角湯方前胡去蘆頭犀角屑菊花羌活去蘆頭防風去叉細辛去苗葉甘草炙銼梔子仁麥門冬去心焙生乾地黃焙蔓荊實青葙子決明子微炒車前子微炒各一兩黃耆銼一兩半上一十五味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服食後日二目暈論曰靈樞經曰瞳子黑睛法於陰白睛赤脈法於陽陰陽俱轉則精明矣若陰陽不和肝虛血弱風邪毒氣乘虛而搏於睛氣故令二氣聚生於白睛之上繞於黑睛之際水輪昏濁黑白不明是為目暈之候治風熱乘虛搏於精氣令目乾澀磣痛兼暈翳九味犀角湯方犀角鎊一兩半梔子仁木通銼黃芩去黑心大黃銼炒黃連去須甘草炙銼芎藭各一兩車前子二兩上九味粗搗篩每服五錢匕水一盞半竹葉七片煎至八分去滓入朴硝末一錢匕食後臨臥溫服治肝血不足風邪乘虛搏於精氣兩目暈翳疼痛不可忍芎藭丸方芎藭枸杞子荊芥穗甘草炙銼蒼朮米泔浸一宿切焙各一兩細辛去苗葉蟬蛻洗焙石膏研水飛旋覆花菊花羌活去蘆頭各半兩上一十一味搗研為細末煉蜜和丸如彈子大每服一丸食後臨臥細嚼茶清下日三治風邪攻眼磣痛暈翳七味犀角湯方犀角鎊三分車前子梔子仁各一兩木通銼黃芩去黑心大黃銼炒黃連去須各半兩上七味粗搗篩每服五錢匕水一盞半竹葉七片煎至七分去滓投芒硝末一錢匕食後臨臥溫服治肝血不足虛熱生浮翳暈上黑睛疼痛磣澀犀角湯方烏犀角鎊二兩黃連去須甘草炙銼秦皮去粗皮銼青竹茹梔子仁各一兩大黃銼炒半兩上七味粗搗篩每服五錢匕水一盞半煎至八分去滓食後臨臥溫服治眼暈翳及頭目昏疼芎術丸方芎藭蒼朮米泔浸三日竹刀刮去黑皮切焙細辛去苗葉蟬蛻去土荊芥穗菊花各一兩蕤仁研三分上七味搗羅為末煉蜜和丸如彈子大每服一丸細嚼鹽酒鹽湯下不拘時治眼暗暈生翳膜纍年不愈兼乾澀痛點眼雄黃膏方雄黃研乾薑炮搗末黃連去須搗末礬石燒令汁盡研丹砂研各一分麝香研一錢上六味用雪水二盞調和入瓷瓶子內重湯煮一日藥成候冷用綿濾過點少許於目眥頭治風邪乘虛令目睛生暈洗肝散方蒺藜子炒去角一兩半羌活去蘆頭防風去叉各半兩甘草炙銼一分馬牙硝研一兩上五味搗羅為散每服二錢匕食後臨臥溫熟水調下治眼生翳暈昏暗隱澀瘀肉疼痛還明散方蚛栗子一百九十六枚並皮用甘草炙銼水蛭揀細者炒各二兩虻蟲一百二十枚炒去翅足白芷烏梅去核各五兩上六味搗羅為細散每服一錢匕食後熱酒調下續更飲酒半盞壓之日三治肝虛風邪攻目目暈瞻視不明蔓荊散方蔓荊子四兩洗蛇蛻二兩上二味先用瓷罐盛蔓荊子火燒黑焦無聲後鈐出入蛇蛻在內又輕燒蛇蛻成灰候冷細研每服半錢匕食後溫酒調下日三治眼睛上生暈不問久新光明散方鯉魚一頭長一尺二寸者取膽用上一味刺破滴汁在銅照上陰乾用竹刀子刮下為細末每用少許時時點眼治白膜暈赤侵黑睛遂生翳橫衝瞳仁成丁翳痛黃芩湯方黃芩去黑心黃連去須木通銼柴胡去苗赤芍藥各二兩地骨皮山梔子仁各一兩半葳蕤大黃蒸過切炒甘草炙銼各二兩半石膏六兩半上一十一味粗搗篩每服三錢匕水一盞煎取七分去滓入朴硝半錢匕食後良久溫服日再治目暈昏澀視物不明芎藭散方芎藭地骨皮何首烏去黑皮荊芥穗菊花旋覆花甘草炙石決明刷淨草決明各一兩蟬蛻去土青葙子木賊各半兩白芷一分上一十三味搗羅為散每服一錢匕米泔水調下食後服治肝虛血弱風邪毒氣乘虛客搏眼輸昏濁黑白不明發為目暈山芋散方山芋防風去叉細辛去苗葉各一兩山茱萸蔓荊實去白皮各三分芍藥升麻各半兩上七味搗羅為散每服二錢匕溫酒調下治風毒客搏目生翳暈黑白睛昏濁不明蒼朮散方蒼朮半泔浸一宿切焙四兩木賊童子小便浸一宿淨洗銼焙二兩甘草炙一兩半旋覆花蟬蛻去土各一兩上五味搗羅為散每服一錢匕食後麥門冬熟水調下目昏暗論曰目昏暗之疾其候有二肝氣不足則血弱腎氣不足則精衰血弱精衰不能營養於目漸致昏暗又病源云夫眼者五臟六腑陰陽之氣皆上注於目若血