body:
  text: 卷第一百諸屍門諸屍統論論曰人身中有三尸諸蟲與人俱生常忌善而好惡能與鬼神通每接引外邪與人為害謂之屍病其狀沉沉默默不的知所苦而無處不惡或心腹痛脹或磥塊踴起或攣引腰脊或精神錯雜變狀不一有飛屍者有伏屍者復有遁屍沉屍風屍之異久不已停注留滯及死又注易傍人則為屍注之病矣諸屍論曰諸屍為病固不一其最重者唯五屍若得之疾速如飛走狀者名飛屍停遁不消者為遁屍沉痼在人臟腑者為沉屍衝風則發者為風屍隱伏積年不除者為伏屍唯此五屍之氣變態多端各各不同大率皆令人沉沉默默痛無常處五屍之外復有屍氣雖各有證然其為病大同小異而已治法亦可通過一法治之治五屍瘕積及中惡心痛蠱注鬼氣雄黃丸方雄黃研丹砂研礜石煅牡丹皮巴豆去皮心膜麩炒研出油盡藜蘆去蘆頭炙附子炮裂去皮臍各一兩蜈蚣去足炒一枚上八味搗研為末煉蜜丸如小豆大每服二丸米飲下食前服治五屍蠱注中惡客忤心腹刺痛丹砂丸方丹砂研一兩巴豆去皮心麩炒出油盡三十枚乾薑炮芎藭芫花醋炒烏頭炮裂去皮臍各一兩赤芍藥桂去粗皮各一兩半野葛吳茱萸湯浸焙炒各三分上一十味搗研為末煉蜜丸如小豆大每服二丸米飲下空心服治五屍蠱注中惡客忤心腹刺痛丹參丸方丹參微炒一兩芍藥一兩半芎藭芫花醋炒烏頭炮裂去皮臍乾薑炮各一兩桂去粗皮一兩半野葛皮炙黃半兩吳茱萸湯浸焙炒半兩蜀椒去閉口並目炒出汗梔子仁各一兩巴豆去皮心麩炒研出油盡一十枚上一十二味搗研為末煉蜜丸如小豆大每服三丸米飲下日三服治五屍注百毒惡氣飛屍客忤無所不治雄黃丸方雄黃研鬼臼去毛炙莽草各二兩蜈蚣去頭足炙一枚巴豆去皮心膜炒研出油盡六十枚上五味搗研為末煉蜜丸如小豆大每服一丸至二丸米飲下得利即愈治卒中飛屍遁屍沉屍風屍腹痛脹急不得氣息上衝心胸及攻兩脅或磥塊踴起或攣引腰脊雄黃丸方雄黃研大蒜各一兩研上二味爛搗和丸彈子大每服一丸熱酒化下須臾未瘥更服有屍疹者常宜預收此藥治五屍鬼注百毒惡氣散方桂去粗皮乾薑炮各一兩上二味搗羅為散每服三錢匕用炒鹽半錢匕溫水同調服之治中五屍腹痛脹急不得喘息上衝心胸及攻兩脅或磥塊踴起攣縮引腰脊蒺藜子丸方蒺藜子炒去角二兩上一味搗羅為末煉蜜丸如小豆大每服二十丸食熟水下日三服遁屍論曰遁屍謂屍埋伏染注連滯在於胸腹肓膜之間尋常如無病人若因喜怒不節飲食傷動其隱伏之疾發則心腹脹痛連及胠脅氣喘促急不得安臥者是其證也治遁屍注在傍人或入腹中化為蠱毒有聲或在咽喉或入諸脈不在一處入人腹內蠱成蝕入五臟入心令人面赤入肺令人面白少氣入肝令人面青善怒轉筋入腎令人呻吟面黑腰痛耳聾入脾令人面黃不嗜食飲羸瘦小便數胸中噎塞嗔喜無常及妖魅百注為病天雄散方天雄炮裂去皮臍一兩蜈蚣去足微炒一枚莽草微炒一兩雄黃研如粉二兩乾薑炮裂二兩烏頭炮裂去皮臍一兩半真珠研如粉一兩半桂去粗皮二兩蜀椒去目並閉口微炒出汗一兩半細辛去苗葉一兩半芫青去足翅微炒四十九枚丹砂研如粉一兩半防風去叉一兩半斑蝥去翅足微炒三十五枚犀角鎊一兩鬼臼去毛微炒一兩上一十六味搗羅為散每服一錢匕空心以清酒調下日再服治初得遁屍及經年不瘥心腹短氣鸛骨丸方鸛骨炙三寸羊鼻炙微焦二枚乾薑炮裂一兩麝香研半兩蜥蜴去頭足炙微焦一枚斑蝥去翅足微炒十四枚雞屎白微炒一兩巴豆去皮心麩炒出油盡二十枚芫青去翅足微炒二十枚藜蘆去蘆頭微炙一兩上一十味搗研為末拌勻煉蜜和丸梧桐子大每服空心米飲下二丸以吐利為度治遁屍經年不瘥心腹刺痛短氣麝香丸方麝香研半兩蜥蜴去頭足微炙一兩鸛骨微炒三寸羖羊鼻炙令焦黃二枚乾薑炮裂一兩雞屎白微炒二兩巴豆去皮心麩炒出油盡五枚芫青去翅足微炒二十枚藜蘆去蘆頭微炙一兩鬼臼去毛微炙一兩丹砂研如粉一兩桂去粗皮一兩上一十二味搗研為末拌勻煉蜜和丸如小豆大每服空心以米飲下二丸日二服稍加至五丸以吐利為度治初得遁屍鬼注心腹中刺痛不可忍木香湯方木香三分鬼箭羽一兩桔梗銼炒一兩丁香三分桃仁湯浸去皮尖雙仁炒黃色十四枚陳橘皮湯浸去白微炒一兩紫蘇莖葉微炒一兩當歸焙乾一兩白檳榔慢火煨十四枚銼上九味粗搗篩每服五錢匕以水二盞煎至七分去滓溫服日二服不計時候治初得遁屍鬼注心腹中刺痛不可忍木香湯方木香一兩鬼箭羽桔梗銼炒紫蘇莖葉炒令焦當歸焙乾各一兩半白檳榔微煨銼二兩上六味粗搗篩每服三錢匕水二盞入生薑一分拍破同煎至七分去滓空心溫服日三治遁屍鬼注腹中刺痛不可忍桃梟湯方桃梟微炒十四枚鬼箭羽木香丁香各一兩桔梗銼炒陳橘皮湯浸去白微炒紫蘇莖葉微炙當歸焙乾各一兩半檳榔慢火煨銼十四枚上九味粗搗篩每服五錢匕水一盞半生薑一分拍碎同煎取一盞去滓分溫二服相去數刻服之治遁屍飛屍及暴風毒腫流入頭面四肢蒸熨方芥子蒸熟焙一升上搗羅為末以鉛丹二兩拌之分作兩處用疏布袋盛之更換蒸熟以熨痛處飛屍論曰飛屍者其狀令人心腹刺痛氣息喘急脹滿上衝心胸是也此病發無由漸忽然而至疾如飛走故謂之飛屍治一切飛屍鬼注風痹身體皆痛如針刀刺嘔逆痰癖除五勞七傷萬病附子散方附子炮裂去皮臍烏頭炮裂去皮臍芫青去足翅微炒雄黃研丹砂研乾薑炮裂細辛去苗葉人參莽草微炙鬼臼去毛微炒蜀椒去閉口並目微炒出汗各一兩蜈蚣去頭足微炙一枚蜥蜴去頭足微炙一枚上一十三味搗研為散再羅令勻每服空心溫酒調下半錢匕日再服治飛屍入腹脹滿刺痛氣息喘急走馬湯方巴豆二枚去皮心杏仁二枚去皮尖雙仁上二味以綿纏椎令極碎投熱湯二合指捻取白汁分三服飲之食頃當下老小量減之治一切飛屍鬼注身痛如刺雄黃散方雄黃研甘草炙銼黃芩去黑心各半兩梔子去皮芍藥銼碎微炒各一兩上五味搗羅為散每服以溫酒調下二錢匕日再服不拘時候治飛屍在人皮膚中又名惡脈亦名賊風發時急頭痛不在一處針灸則移發時一日或半日微瘥須臾復發細辛散方細辛去苗葉一分桂去粗皮三分附子炮裂去皮臍一兩雄黃研半兩烏頭炮裂去皮臍一兩天雄炮裂去皮臍一分乾薑炮一兩莽草微炒一分真珠末研三分上九味搗研為散每服空心米飲調下一錢匕日二服一方酒服治飛屍病腫光如油色無常定處三黃散方黃連去須黃柏去粗皮微炙陳橘皮湯浸去白炒各一兩上三味搗羅為散入丹砂少許合研令勻每服二錢匕沸湯點服不拘時候治飛屍腹痛脹急衝心攻脅方上取雞子一枚破取白生吞之困者搖頭令下治飛屍心痛氣急胸滿宜取吐瓜蒂散方瓜蒂赤小豆雄黃各一分研上三味搗研為散拌勻每服空心溫酒調一錢匕取吐惡物屍注論曰屍注者屍病注易於人也多因哭泣感染屍氣流注身體令人寒熱淋瀝沉沉默默不的知所苦而無處不惡或腹痛脹滿喘急不得息上衝心胸傍攻兩脅或磥塊踴起或攣引腰脊或舉身沉重精神不爽每更節令愈加頓滯不治者死死則注易傍人故名屍注治屍注發作無時腹脹喘急上衝心胸傍攻兩脅茯苓湯方赤茯苓去黑皮桂去粗皮各三分芍藥當歸切焙生乾地黃焙木香芎藭各半兩鬼箭羽桃仁去皮尖雙仁炒各三分上九味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治屍注心亂如醉狂言驚悸夢與鬼交精神錯謬疾勢數變阿魏丸方阿魏半兩醋化去砂石面和作餅炙研安息香一兩酒化細研木香甘草炙銼檳榔銼各半兩皂莢十四梃如豬牙者酥炙去皮子天靈蓋酥炙麝香研人中白研各一分豉微炒一合上一十味將六味搗為細末與別研四味和勻煉蜜丸如梧桐子大用童子小便一盞入烏梅三枚蔥白三寸浸一宿煎數沸五更初下二十丸治屍注發歇無時心腹切痛桂香湯方桂去粗皮芍藥木香柴胡去苗各一兩芎藭鱉甲去裙襴醋炙乾薑炮吳茱萸湯浸焙乾炒常山各三分上九味粗搗篩每服三錢匕水一盞半煎至八分去滓溫服不拘時治屍注寒熱不思食味心腹刺痛虎掌丸方虎掌丹砂研各半兩白茯苓去黑皮龍齒各一兩當歸焙蓬莪朮煨銼各三分上六味搗羅為末用酒煮阿魏麵糊丸如梧桐子大每服二十丸生薑烏梅湯下治屍注惡氣兼治百病鸛骨丸方鸛骨一寸炙桂去粗皮半兩虻蟲斑蝥各十四枚去翅足炒巴豆三十枚去皮心膜炒上五味搗研為細末煉蜜丸如小豆大每服二丸溫水下日三治屍注鬼邪日漸沉頓獺肝散方獺肝一具陰乾上一味搗羅為散每服一錢匕水調下日三如一具未瘥更作服治屍注鬼注變動多端丹砂丸方丹砂研雄黃研各一兩鬼臼莽草各半兩蜈蚣二條赤足者生用巴豆四十粒去皮心膜不出油研上六味將三味搗羅為末與別研三味和勻煉蜜丸如梧桐子大每服二丸溫酒下不拘時治臨屍哭泣屍氣入腹沉滯臟腑有時發動取勞積神效密陀僧散方密陀僧半斤煅醋淬淘研控干取六兩京三稜煨搗末二兩訶黎勒不去核生用搗末一兩上三味合研令勻每服二錢匕用煮麵濃湯調下當晚不食臨臥一服余時勿服並服三夜次夜當下惡物不下第三夜加生牽牛子末一錢匕同調下治屍注杏仁丸方杏仁去皮尖雙仁炒研亂髮灰各一分上二味研勻和丸如小豆大每服五丸豬膏酒調下治屍注蜀椒熨方蜀椒一斤上一味帛裹於註上以熨斗盛火熨椒令熱汗出神效治五屍蠱注中惡客忤心腹刺痛丹砂丸方丹砂研乾薑炮芎藭烏頭炮裂去皮臍各一兩赤芍藥桂去粗皮各二兩野葛吳茱萸湯浸焙炒各三分巴豆去皮心熬出油二十粒芫花醋浸半日炒焦色半兩上一十味搗研為末煉蜜丸如梧桐子大每服五丸米飲下日二服治屍注邪氣流傳忽然悶絕時發寒熱淋瀝或腹痛脹滿鸛骨丸方鸛骨酒炙雄黃研各一兩桂去粗皮大黃銼炒各三分麝香研半兩丹砂研一分赤足蜈蚣酒浸炙一條上七味搗羅為末煉蜜和丸如梧桐子大每服二十丸桃枝煎湯下諸注門諸注統論論曰諸注者邪氣所注也皆因精神衰弱經絡空虛傷於風寒暑濕飲食勞倦或感生死之氣或挾鬼物之精初為中惡客忤卒死諸屍之類雖或暫瘥必有邪氣伏於經脈流傳腑臟深挾骨髓經久不已皆成注病變狀多端時發時瘥令人昏悶無不病處若因風寒暑濕之邪所注者則為風注寒注涼注冷注溫注濕注之病若因飲食勞倦之邪所注者則為食注飲注酒注水注之病若因感生死之氣而為其邪所注者則為喪注哭注轉註之病若因挾鬼物之精而為其邪所注者則為鬼注邪注屍注殃注之病犯土禁成注者為土注產後得注者為產注虛勞所成者為勞注邪氣外侵為邪注凡此諸注以受病之因為名也邪注於肺則為氣注邪注於營則為血注久注不已傷損骨髓則為骨注凡此諸注以病之所在為名也又有石注者言其牢強如石走注者言其遊走無常凡此諸注以病之形變為名也名類雖多各有形證合而言之皆注病也治注病者欲辨是非但復紙於痛處燒發令焦投於紙上若發黏紙者注氣引之也不黏者非注也審知其因隨證治之無專門者通用諸注法調之諸注之脈浮大者可治細而數者難治諸注論曰諸注者邪氣停住而為病也蓋由經絡空虛傷於風寒暑濕或因飲食勞倦或因大病後氣虛邪氣流注或感死氣或犯鬼邪皆致是疾其狀變易不同各循其本而治之治五注卒中賊風遁屍鬼邪心腹刺痛脹急大黃飲方大黃煨桂去粗皮各一兩半赤芍藥甘草炙銼各一兩烏頭炮裂去皮臍五枚上五味銼如麻豆每服五錢匕水一盞半入生薑一分拍碎蜜一匙頭同煎至七分去滓空腹溫服治中惡五注五屍入腹胸脅急痛鬼擊客忤停屍垂死者此藥入喉即愈若口噤則斡開不可斡者扣一齒折以竹管下藥先以少許湯或水內藥竹管瀉喉中五注丸方丹砂研甘遂微煨附子炮裂去皮臍雄黃研各一兩豆豉曝乾巴豆去皮心壓出油盡各六十枚上六味除巴豆外搗研為末將巴豆同研勻煉蜜丸如梧桐子大密器貯之每服二十丸米飲下以知為度未知加丸數服若不發者以粥飲投之利不止者與酢飯一兩匙止之治五屍注赤芍藥丸方赤芍藥銼一兩吳茱萸湯浸焙乾炒丹砂研蜀椒去目並閉口者炒出汗烏頭炮裂去皮臍各半兩乾薑炮三分桂去粗皮一兩上七味搗羅為末煉蜜丸如小豆大每服十丸空腹溫酒下日三治五注瘦病伏連諸鬼氣丹砂丸方丹砂研一兩麝香研三分桃仁湯浸去皮尖雙仁炒研七十枚上三味各研細再和研勻入少煉蜜丸如小豆大每服十丸米飲下日三治諸注令人沉默不知所苦累年積月以至全家流注備急獺肝散方獺肝一具陰乾上一味搗羅為散每服一錢匕熟水調下日三服治五注伏連及親近死屍致惡氣入腹終身不愈者方阿魏研一分上一味以頭醋和麵半兩入阿魏裹作小餛飩熟煮作三次吞之一日令盡服滿三七日永瘥治五注積年心痛鬼氣蠱毒百病悉療麝香丸方麝香研三分牛黃研藜蘆炙赤朱鬼臼去毛炙各半兩當歸切焙三分蜈蚣炙去頭足一枚芍藥銼雄黃研各半兩白茯苓去黑皮桔梗炒金牙碎桂去粗皮人參各三分乾薑炮吳茱萸湯浸焙炒貫眾各半兩丹砂研三分鬼箭羽半兩巴豆去皮心膜出油一兩蜥蜴炙去頭足一枚獺肝炙熟一具上二十二味搗研為末煉蜜丸如小豆大每服五丸空心米飲下日再服稍加至七丸治五注伏屍等病殺鬼丸方虎頭骨酒炙三兩藜蘆六兩豬牙皂莢炙鬼臼雄黃研蕪荑仁天雄炮裂去皮臍各一兩上七味搗研為末煉蜜丸如小彈子大每夜燒一丸五月五日午時合佳治五勞七傷屍注所侵心腹㽲痛飲食不化兩脅鼓脹皮膚攣縮等病萬病丸方遠志去心澤瀉石槲去根柏子仁別研雲母水飛石葦去毛杜仲去粗皮炙天雄炮裂去皮臍牛膝去苗酒浸切焙白茯苓去黑皮菖蒲山芋熟乾地黃焙肉蓯蓉酒浸切焙續斷乾薑炮甘菊花桂去粗皮五味子蛇床子炒山茱萸各半兩桔梗炒防風去叉白朮各一兩附子炮裂去皮臍四枚天門冬去心焙一兩半細辛去苗葉三分上二十七味搗羅為末煉蜜和杵千下丸如梧桐子大每服二十丸空心溫酒下春秋日再服夏季日一服冬季日三服如久服即減天雄附子各一半治諸注麝香散方烏雌雞一隻籠罩勿與食三日只與水吃至第四日後日以活蜣螂與雞食之飽後便下糞焙乾取一兩麝香一分獺肝炙熟乾一兩上三味以獺肝搗羅為散次入麝香雞糞再研極細每服三錢匕以米飲調下日三治五注與鬼神狐貍精魅鬼疰交通野狐丸方野狐鼻七枚豹鼻七枚炙貍頭骨一枚炙雄黃一兩阿魏二兩鬼箭羽一兩露蜂房一兩炙白朮一兩大蟲頭骨一兩炙驢馬狗駝牛毛各四分燒作灰若用骨加妙故人腦骨一兩炙上一十五味搗羅為末攪和令調勻又以水煮松脂候烊接取以和之時勿以手攪將大蟲爪和攪為丸用水磨下一丸分一半別搗雄黃末為衣以床下火燒之衣被覆之勿令泄藥煙並氣未汗出水磨二丸分飲一半須臾候等時如汗不通約行十里再暖餘一服溫吃服後平身坐少時平身臥熱烘衣被和頭通身蓋臥令厚暖服藥處須在暖房中無令風入如汗出以燈燭照手足指及節間當有毫毛生出如青黃白色即一服見效如赤色須三次服如毛黑色必死之證如汗出以青絹拭遍身日出時於黑漆盆內洗當有蟲如麩片是驗大腸取下黑水紫黯惡黃白膿涎如諸般蟲等物是效次即服和氣藥治屍注傳屍服逐下藥後補虛防己散方防己人參白茯苓去黑皮鬼臼鬼箭羽附子炮裂去皮臍曲炒各一分上七味搗羅為散每服二錢匕以桃仁研泔一盞煎至六分溫服日五服治諸注皂莢丸方豬牙皂莢去黑皮酥炙研白馬夜眼炒令黑色研安息香炒令黑色研斑蝥以糯米炒令米黑色去米並翅足不用余即研之蜈蚣一條炙令黃色蛇蛻一條炒令黑焦研粉霜二錢面二錢水滴和為餅子煨令黃色研以上各秤二錢雄黃研丹砂研硇砂研牛黃研犀角屑胡黃連各一錢上一十三味同研令勻以黃狗膽汁為丸如梧桐子大別以丹砂末為衣每服五十丸四更盡以桃仁煎湯下風注論曰風注者由體虛風邪之氣客於營衛邪氣行遊連滯停住故名風注其狀皮肉掣振痛無常處一年之後則有頭髮墮落頸項掣痛骨拉解鳴目疼鼻酸牙蚛之證又十二風所注不同溫風所注頭痛欲解發汗風所注頭痛體熱骨節兩強柔風所注遊腫在腹或在手腳水風所注啖食眠臥汗出九風所注腦轉肉裂目系痛惡聞人聲絕風所注暴倒僕口有白沫癲風所注被髮狂走遇物擊破狂風所注叫呼罵詈獨語談笑寄風所注口噤面喎四肢不遂糾風所注體生瘡眉毛墮落蠔風所注𤸷痹如蠔螫瘡或癢或痛罩風所注舉身戰動或鼻塞其狀雖異其為邪氣停注則一也治一切風注痛安息香丸方安息香研乳香研各一分白膠香研地龍去土炒搗為末各半兩桃仁湯浸去皮尖雙仁研二七枚沒藥研一分胡桃仁研三枚上七味同研勻為細末酒煎為丸如彈丸大每服一丸溫酒化下治風邪注氣及南方百毒瘴氣疫毒腳弱腫痛濕痹金牙散方金牙碎一兩芫青去翅足炒二七枚斑蝥去翅