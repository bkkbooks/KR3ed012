自寤治卒魘寐不寤魂魄外遊為邪所執錄欲還未得切忌火照治之方皂莢一兩去皮子生用上一味搗羅為散每用一字許吹兩鼻竅中魘至死三四日猶活治卒魘死方上以井底泥埿死人目令垂頭就井呼姓名即活此法靈異莫測又方勿以火照但痛齧其足後跟及足大趾爪甲即活齧其踵不覺者宜用礜石散方見鬼擊門中惡論曰志弱心虛精神失守忤犯邪惡令人心腹暴痛悶亂如死無所覺知故曰中惡又曰卒忤蓋陰陽痞隔氣道厥逆上下不通陽氣散亂故令不知人也氣還則生不還則死久不已則變注治卒中惡客忤五屍入腹鬼刺鬼排及中蠱毒注吐血下血及心腹卒痛腹滿寒熱毒病備急散方雄黃研二兩丹砂研一兩附子炮裂去皮臍一兩一分桂去粗皮藜蘆各一分巴豆仁三十五個去心熬蜀椒去目並閉口炒出汗半兩野葛三分芫花醋炒四錢上九味將巴豆別治如脂余為細散以巴豆合搗令勻瓷器貯之密封勿泄氣遇急病水服一字許加至半盞匕老幼減半病在頭當鼻衄在膈上則吐在膈下則利在四肢則汗出而愈治中惡心痛胸脅㽲刺喘急桃皮湯方桃東行枝白皮銼一握丹砂研一兩梔子仁十四枚當歸切焙三兩桂去粗皮三兩附子炮去皮臍一兩香豉炒吳茱萸湯洗焙乾炒各五兩上八味除丹砂外銼如麻豆和勻每服五錢匕水一盞半入生薑半分切碎煎取七分去滓入丹砂末半錢匕溫服治卒中惡心腹刺痛去惡氣麝香散方麝香研一分犀角屑木香各半兩上三味搗研為散拌勻每服二錢匕空心熟水調下日再未止更服又方韭根一握切烏梅十四枚碎吳茱萸湯洗焙乾炒二兩半上三味以潦水五升煮之以病人櫛內其中三沸櫛浮者生沉者死煮取三升時飲之治中惡心腹痛欲絕方伏龍肝五合鹽一撮上二味和研每服一錢匕水一盞調下治中惡喘急桃皮湯方桃皮白楊皮各一握梔子仁十四枚真珠研當歸切焙桂去粗皮各三兩附子炮裂去皮臍一兩吳茱萸湯洗焙炒香豉各半兩上九味除真珠末外銼如麻豆每服五錢匕水一盞半入生薑一棗大切煎至一盞去滓內真珠末半錢匕攪勻溫服治中惡遁屍心腹及身體痛甚者短氣不語以手按之得其痛處則病人色動恐人近之宜艾葉敷方取生艾小葉挼碎敷痛上厚寸余以沸湯和灰作泥令熱敷艾上冷則易之不過再敷愈治中惡氣欲絕不省方皂莢生為細末內鼻孔中一方用細辛等分取屑如胡豆大吹兩鼻中治中惡氣欲絕方取新牛糞絞汁服無新者即以乾者浸汁服又方仰臥以物塞兩耳以兩竹筒內病人鼻中使兩人吹之塞口傍無令氣得出半日病人即噫噫則勿復吹也卒死論曰卒死者緣人有三虛一謂乘年之衰二謂逢月之空三謂失時之和賊風鬼邪之氣乘虛而入故令陰氣偏竭於內陽氣阻隔於外二氣壅閉不得升降厥氣上行而暴絕也氣還時復生不還則死內經曰出入廢則神機化滅升降息則氣立孤危蓋謂是也治卒死及中惡屍躄蔥刺耳方上以蔥中央心刺耳中令入七八寸無苦使目中血出立活亦可男左女右刺鼻內一云耳中血出佳又方令二人以衣擁口以筆管強力吹兩耳困即易人吹之又方以綿漬好酒手挼令入鼻中並持兩手勿令驚動扁鵲治卒死方濕牛馬糞絞取汁灌口中令入喉若口噤者斡開灌之不可斡者扣折一齒下之若無新馬糞以水或人尿和乾者絞取汁用之又方半夏末如大豆許吹鼻中又方搗薤若韭取汁以灌口鼻中又方豬膏如雞子大苦酒一升煮沸灌喉中治卒死而壯熱者方白礬半斤煮令消漬腳令沒踝治卒死而目閉者方騎牛臨其面搗薤汁灌耳中又末皂莢吹鼻中治卒死四肢不收失便者方馬糞一升以水三斗煮取二斗洗足又取牛糞一升溫酒和絞去滓灌口中屍厥論曰內經謂邪客於手足少陰太陰足陽明之絡五絡俱竭令人身脈皆動而形無知其狀若屍故曰屍厥蓋五絡皆會於耳中苟為邪所客則其氣逆厥上下暴隔五絡閉結而不通故俱竭而令人狀若屍焉治法當先刺其足大趾內側爪甲上去端如韭葉後刺足心後刺足中指爪甲上各一痏後刺手大指內側去端如韭葉後刺手心主少陰銳骨之端各一痏立已不已以竹管吹兩耳使氣脈疏通內助五絡然後以藥石治之治五絡閉竭病發屍厥不知人通微丸方營實根五兩薔薇根是也白薇三兩虎骨獺肝微炙五靈脂各二兩丹砂別研硝石別研雄黃別研代赭別研各一兩上九味搗羅為末煉蜜和丸如彈子大溫木香酒化下一丸日三以知為度不計時治屍厥之病卒死而脈猶動聽其耳中循循有如嘯聲而股間暖是也耳中雖無嘯聲而脈動亦當以屍厥救之方上以竹管吹其左耳極三度復吹其右耳三度即起又方搗菖蒲末如棗核大著舌下又內下部中治屍厥脈動而無氣氣閉不通故冥然如死方上以菖蒲末吹入兩鼻孔中又以桂末著舌下治屍厥方鬄左角發方寸燒灰以醇酒一杯飲之不能飲者灌之立已又方以繩圍兩臂腕男左女右伸繩從大椎度下行當脊上灸繩頭五十壯即活治屍厥方熨兩脅下又取灶中墨如彈丸以漿水和飲之須臾可三四度又取梁上塵如小豆許竹管吹入鼻孔中鬼魅論曰心者精之合神之舍也心氣不足精神衰弱邪氣乘虛而感則為鬼魅其狀令人喜怒不常情思如醉或狂言驚怖向壁悲啼夢寐多魘與鬼交通病苦乍寒乍熱腹滿短氣不能食診其脈人迎氣口乍大乍小乃鬼魅所持之候也治感鬼魅邪氣驚怖悲啼休作有時九精丸方牛黃研荊實曾青研玉屑研雄黃研空青研赤石脂研玄參龍骨各一兩上九味搗研為末煉蜜丸如小豆大每服一丸食前溫酒下日三以知為度治邪氣鬼魅所持妄言狂走恍惚不識人煞鬼五邪丸方丹砂研雄黃研龍骨鬼臼去毛炙鬼箭羽去莖各二兩半赤小豆一兩半芫青炒去翅足三十枚桃仁湯浸去皮尖雙仁炒研五十枚上八味除研者外搗羅為細末入雄黃丹砂再研拌勻熔蠟和丸如彈子大囊盛之男左女右繫於臂上小兒繫於頭上合藥時勿令婦人雞犬見亦可用蜜和為丸梧桐子大每服一丸米飲下日三治邪氣鬼魅脈見人迎氣口時大時小黃環丸方黃環五兩琥珀研三兩丹砂研生銀水磨細龍膽各二兩白頸蚯蚓微炒玄參去心大黃銼炒閭茹各一兩上九味為細末酒煮麵糊和丸如綠豆大雞鳴及日中時用溫麝香酒下十丸稍加至二十丸以知為度治鬼魅四物鳶頭散方東海鳶頭湯洗七遍焙乾由跋是也莨菪炒金牙石研防葵炒各一兩上四味搗羅為細散每服一錢匕溫酒調下治妖魅病人不言鬼方鹿角鎊屑上一味搗羅為細散水服方寸匕自言則瘥治精魅感著語言狂亂悲怖不常不飲食方水銀一兩上一味入漿水一盞炭火上煎取三分去火取水銀如豌豆大空腹溫水下三丸晚再服一丸日三闢鬼魅方虎爪燒二兩丹砂研細雄黃研細蟹爪燒各一兩上四味除研者外搗羅為細末再入研者拌勻熔蠟為丸如梧桐子大每至正旦及有狐魅處焚之甚效以熏巫人即神去治鬼迷不寤方雄黃研如粉上一味吹入病人兩鼻中瘥闢諸邪祟附著及小兒驚哭恐悸方安息香上一味取一皂子大焚燒令煙起邪自去鬼擊論曰精全則神王精耗則神衰精神耗衰血氣虛弱則邪氣易襲故邂逅鬼邪相遇則為鬼擊之病其得之無漸卒著人如矛戟所傷令人胸脅腹滿急痛不可按抑或即吐血或衄或下血輕者獲免重者或至不救治宜符禁之法兼以辟邪安正之劑治鬼氣排擊心腹刺痛吐下血死不知及臥魘齧踵不覺者礜石散方特生礜石煉皂莢去皮子炙雄黃研如粉藜蘆去蘆頭微炒各一兩上四味搗羅為散以竹筒吹大豆許入鼻中得嚏則氣通氣通則活未嚏者復吹之又一方加丹砂麝香各半分治卒得鬼擊如刀刺胸脅腹內急痛不可按抑或即吐血或鼻中出血或下血升麻散方升麻獨活去蘆頭桂去粗皮各半兩上三味搗羅為散每服一錢匕溫酒調下一方去桂加犀角屑半兩又一方去獨活加大黃半兩治鬼排擊方熟艾雞子大三枚上一味以水五盞煎取兩盞去滓頓服之又方以濃酒吹灌鼻中又方以鹽一兩水二盞和攪飲之並以冷水潠之須叟得吐即瘥治卒中鬼擊及刀兵所傷血漏腹中不出煩滿欲絕雄黃散方雄黃一兩上一味研為散溫酒調一錢匕服日三血化為水治卒鬼擊如中箭忽然一點痛如注不可忍方上以桃皮一片將裡面濕處貼痛上取一匙頭安桃皮上緊搓艾一團如胡桃大安匙頭上灸之須叟痛微徹治卒中鬼擊方雞冠血上一味瀝口中令下咽仍破此雞以拓心下冷即棄於道傍得烏雞佳又方豬脂上一味取雞子大服未瘥再服又方雞屎白微炒一兩青花麻一握上二味以酒三升煮取一升去滓熱服須叟汗出若不汗即以火灸兩脅下使熱得汗乃愈
