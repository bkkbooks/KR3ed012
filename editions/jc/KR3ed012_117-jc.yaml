body:
  text: 卷第一百一十七口齒門口齒統論論曰足太陰脾之經其氣通於口足陽明胃之經手陽明大腸之經其脈並夾於口故其腑臟風邪濕熱發於經脈則於是有口吻之疾牙齒者骨之所終髓之所養也又手陽明之支脈入於齒故骨髓之氣不足與夫陽明之脈虛不能有所滋養則於是有牙齒之疾牙齒之疾其候甚多治療之法固不得略也養生方云雞鳴時常叩齒三十六下食畢令啄齒皆宜長行之令齒不蛀蟲又云早朝未起漱口中玉泉令滿口咽之啄齒二七過去蟲而牢齒千金又曰每旦以鹽一捻內口中以暖水揩漱及叩齒百遍為之不絕不過五日即牢密若此之類皆簡易可行行之有效不可忽也口瘡論曰口瘡者由心脾有熱氣衝上焦熏發口舌故作瘡也又有胃氣弱穀氣少虛陽上發而為口瘡者不可執一而論當求所受之本也治熱毒發動口瘡心煩躁玄參煎方生玄參汁生葛汁各三升銀十兩寒水石搗末石膏搗末滑石搗末磁石煅醋淬七遍搗末各一斤升麻羚羊角鎊犀角鎊甘草銼各二兩芒硝一斤牛黃研為細末二兩上一十三味除銀玄參生葛芒硝牛黃外並粗搗篩以水三斗煎銀寒水石石膏滑石磁石取汁二斗去滓別以水五盞煎升麻羚羊犀角甘草至二盞去滓與玄參並生葛汁一外都和再煎如稀餳然後下芒硝攪勻傾入瓷器中盛卻入牛黃末再攪取勻停令黃黑色每取兩大匙入蜜一合和勻分四服熱湯調下不拘時候治口瘡槐枝煎方槐枝二三月採好者銼桑枝銼柳枝銼各一斗三味以水五斗隔宿浸次日入鍋文武火煎約得一斗去滓再入銅鐺煎至五升入後藥槐蛀蟲一兩細辛去苗葉半兩藁本去苗土一兩胡桐淚升麻莽草各半兩麝香研一分上一十味將後七味搗羅為末入前藥汁內更煎如餳臨臥淨漱口以藥半匙敷痛處有涎即吐之臨臥再用治口爛生瘡水漿不下當歸膏方當歸一兩射干升麻附子去皮臍切各半兩白蜜四合豬脂五兩上六味除蜜脂外並銼先煎脂化去滓入諸銼藥慢火煎候附子色黃又去滓入蜜更煎如膏以瓷器盛每服如杏核大含之日三五度咽津不妨治口瘡及喉閉吹喉朴硝散方朴硝硝石膽礬白礬芒硝五味皆枯乾寒水石燒白殭蠶直者炒甘草炙銼青黛研各等分上九味搗研為細散和勻每用少許滲瘡上遇喉閉用筆管吹一字在喉中立破治口瘡並咽喉塞黃連膏方黃連去須銼三兩豬脂一斤白蜜四兩羊髓研二兩上四味先以慢火煎豬脂取油去滓入黃連又煎令黑色下羊髓髓化以綿濾去滓入蜜更煎數沸成膏瓷合盛候冷每含如棗大日三五度咽津不妨治口瘡多年不瘥風熱上攻薔薇膏方薔薇根郁李根水楊皮牛蒡根並細切各一斤蒼耳一升露蜂房碎劈三枚生地黃切升麻當歸洗切各一兩地骨皮白芷石膽研各半兩熟銅粉研麝香研各一分上一十四味先以前六味細切水二斗煎至五升葛布絞去滓次入地黃升麻當歸地骨皮白芷再煎至二升綿濾去滓慢火又煎成膏乘熱下後三味研藥攪令勻瓷器盛每含如彈丸大吐津治口瘡積年不瘥丹砂膏方丹砂研一分豬脂蜜各三兩杏仁湯浸去皮尖雙仁研三十七粒膩粉白礬研胡粉各一分生地黃半兩切焙麝香研一分上九味搗研七味為末先煎脂蜜令化去滓次下諸藥更煎十餘沸以綿濾去滓更煎待膏就瓷合盛每用如杏仁大綿裹含吐津治久患口瘡不任食物雞舌香丸方雞舌香末松脂研各一分胡椒為末三七粒細辛為末三分上四味用蘇木濃煎汁和藥丸如梧桐子大每以暖水研一丸塗瘡上治口瘡久不瘥燒肝散方茵陳蒿犀角屑石斛去根白朮柴胡去苗各半兩芍藥紫參桔梗銼炒防風去叉桂去粗皮吳茱萸湯浸三遍焙炒人參白蕪荑各一分上一十三味搗羅為散每服五錢匕以白羊肝五兩細切去筋膜入蔥白三莖細批相和濕紙三五重裹慢火煨熟空腹頓服米湯下治口瘡經年歇發飲食艱難薔薇根散方薔薇根銼一握蜀椒去目並閉口炒出汗四十九粒上二味搗羅為散以漿水二盞煎五七沸去滓熱含冷吐治牙疼口瘡積年不瘥蟾酥丸方蟾酥一片水浸令軟麝香研少許上二味細研丸如粟米大以綿裹一丸於病處咬之有涎即吐治口瘡久不瘥方薔薇根一握上一味銼用水一升煎至半升候冷含稍咽之冬用根夏用莖葉又宜同角蒿灰塗有涎吐之治元臟虛冷上攻口瘡巴戟散方巴戟天去心一兩白芷半兩高良薑為末一錢匕上三味搗為細散用豬腰子二隻去筋膜每一隻入藥散一錢匕用濕紙裹煨熟乘熱去紙以口吸熱氣有涎即吐候冷細嚼服之治口瘡杏仁丸方杏仁湯浸去皮尖雙仁十粒蛇床子燒灰白芷燒灰膩粉各一分上四味研杏仁如膏和三味為丸如雞頭實大每細嚼五丸不得咽津吐涎出立效治口瘡甘草煎方甘草炙為末半兩豬膏四兩白蜜二兩黃連去須為末一兩上四味先煎脂令沸去滓下蜜並藥等慢火熬成煎每服一匙頭含咽津以瘥為度治口瘡白礬煎方白礬末鉛丹研各一兩附子去皮臍生為末屋下火煤各半兩上四味搗研為末入白蜜三兩煎為煎入竹筒盛飯上炊一次每用少許含吐涎出效治口瘡黃柏煎方黃柏末一兩亂髮洗去二三兩硫黃研一分黃連末一兩麻油半斤上五味先將油煎發銷然後下黃柏等末重煎待凝成煎每含如杏仁大吐津不得咽治口瘡疼痛石膽煎方石膽半錢燒研末蜜一合黃柏末一錢匕蟾酥研半錢上四味先於鐺中慢火煎蜜次下藥末煎如餳每含如杏核大吐津不得咽治口瘡杏仁煎方杏仁去皮尖雙仁研二七粒胡粉研鉛丹研各一分上三味用蜜五合調和用竹筒盛蒸一炊久旋含之吐津不得咽治口瘡麝香散方麝香研一字胡黃連一錢檳榔生銼一枚上三味搗研為細散旋敷之治口瘡滑石散方滑石膽礬各一兩上二味搗研為散每用一錢匕以綿裹含吐津治口瘡疼痛生薑煎方生薑取汁一盞白沙蜜三兩上二味同煎十餘沸用瓷器盛時時以熟水調一匙頭含咽之治口瘡柳花散方黃柏一兩澱花半兩上二味為散臨臥干糝誤咽亦不妨治口瘡麝香散方麝香少許人中白一錢上二味研細綿裹如綠豆大含之咽津治口瘡二物散方白殭蠶黃連各等分上二味為末臨臥糝口內治口瘡諸藥不效碧玉散方膽礬半兩鍋子內燒通赤地上出火毒上一味細研每取少許敷瘡上有清涎吐之治口瘡附子塗腳方附子一枚生為末上一味以薑汁和勻攤腳心治口瘡蘘荷根湯方蘘荷根二兩上一味細銼分為三分以水二盞煎三五沸去滓熱含冷吐治口瘡升麻含汁方升麻不拘多少上一味含一塊咽津治口瘡薺苨煎方薺苨三十枚上一味以薄綿裹酒煮二十沸許取出每含一枚良久嚼咽之日三五度治口瘡豆豉散方豆豉四兩炒上一味搗羅為散每用綿裹一錢匕含之日五七次治口瘡乾蟾散方乾蟾炙一枚上一味搗研為散綿裹半錢匕含吐津治口瘡胡粉膏方胡粉炒研一兩上一味以牛酥調如膏每含如杏仁大咽津治口瘡馬牙硝散方馬牙硝研末一兩上一味每含一錢匕咽津日三五度治口瘡檳榔散方檳榔銼上一味為散每取半錢匕塗舌及唇上治口瘡桑汁塗方桑條汁一合上一味早晨塗口舌上治口瘡蒲黃散方蒲黃一兩上一味每用一錢匕敷口舌上咽之治口瘡無食子散方無食子燒灰細研一兩上一味每取一錢匕敷舌上日三五次治口瘡楸木汁方楸木白汁五合上一味每取一匙頭含咽治口瘡蟾酥線方蟾酥二片上一味以水半盞浸化為水更入牛黃末一錢匕攪勻以絲線五十條就藥中浸一宿陰乾每取一條含吐津治口肥瘡方灶上飲食上一味炒令焦研末敷之治下冷口瘡神聖膏方吳茱萸一兩上一味搗羅為末用酸醋一大盞調熬成膏後入地龍末半兩攪勻每臨臥時先用蔥椒湯洗足拭乾用藥遍塗兩腳底心或以手帛子系定次日必減未減再塗治口內生瘡齒齦肉爛升麻飲方升麻黃連去須羚羊角鎊玄參黃芩去黑心麥門冬去心焙葛根銼大黃銼羌活去蘆頭防風去叉甘菊花各半兩人參三分甘草炙銼知母各一分上一十四味粗搗篩每服三錢匕水一盞煎至七分去滓溫服食後治口瘡眾藥不瘥者密陀僧散方密陀僧黃柏去粗皮甘草各一兩並以蜜塗炙香蒲黃黃藥子各半兩上五味搗研為散時時敷之治久患口瘡黃連膏方黃連去須升麻槐白皮大青苦竹葉各一兩上五味細銼以水二升煎至半升去滓取汁入龍腦蜜攪令勻煎成膏塗瘡上日三度治舌上生瘡鉛丹膏方生地黃汁三合蜜三合鉛丹一兩半杏仁去皮尖雙仁別研如面七十枚上四味合和一處調勻銀器內煮用槐枝攪不得住手看色紫即成取少許口內含化吐津治口瘡久不瘥蟾酥線方真蟾酥五皂子大硼砂龍腦麝香各一皂子大上四味同研極細以溫湯半盞化令勻入緋線秤半錢蘸藥汁曬乾再蘸再曬候藥汁盡將線寸截每用一條貼於患瘡處有涎即吐一日三五次易之取瘥為度治大人小兒卒患口瘡鉛霜散方鉛白霜研細不拘多少上取少許塗敷痛處一兩度瘥治卒患口瘡升麻湯方升麻銼黃柏去粗皮銼大青各一兩上三味粗搗篩每服五錢匕水二盞煎取一盞熱漱冷吐治口舌生瘡久不瘥白芷散方白芷末一錢銅綠一錢白殭蠶四枚干胭脂半錢上四味搗研為末每用少許以雞翎子掃瘡有涎吐之不得咽津治虛勞口瘡久不瘥秦艽散方秦艽去苗土柴胡去苗各一兩上二味搗羅為散每服三錢匕割豬肝三兩片用酒煮之去肝取酒調藥溫服十服當愈治心肺壅熱口內生瘡胸膈痰逆玄參湯方玄參茅根銼羌活去蘆頭竹茹木通銼羚羊角鎊升麻各半兩黃連去須人參苦竹葉半夏湯洗去滑各三分甘草銼一分上一十二味粗搗篩每服三錢匕水一盞入生薑三片煎至六分去滓溫服食後治口瘡久患不瘥銅綠散方銅綠研一錢鉛丹炒研半兩白芷焙一分為末上三味合研令勻取少許滲舌上即瘥治口瘡痛茯苓湯方赤茯苓去黑皮人參各一兩上二味粗搗篩分作四服每服水二盞煎至一盞去滓溫服日三不過二劑治口瘡玄參丸方玄參天門冬去心焙麥門冬去心焙各一兩上三味搗羅為末煉蜜丸如彈子大每用一丸綿裹含化咽津治口常有瘡蒺藜子散方蒺藜子炒去角扁豆炒各三兩上二味搗羅為散如茶點吃口糜論曰膀胱移熱於小腸膈腸不便上為口糜夫小腸之脈絡心循咽下膈抵胃陰陽和平水穀入胃小腸受之通調水道下輸膀胱今熱氣厥逆膀胱移熱於小腸胃之水穀不得傳輸於下則令腸膈塞而不便上則令口生瘡而糜爛也大抵心胃壅熱則必熏蒸於上不可概以敷藥當求其本而治之治小腸熱脹口糜生瘡柴胡澤瀉湯方柴胡去苗澤瀉陳橘皮浸去白焙黃芩去黑心枳實麩炒旋覆花升麻芒硝別研各三兩生地黃一升上九味除芒硝外㕮咀如麻豆大每服五錢匕水二盞煎取一盞去滓下芒硝末半錢匕攪勻食後溫服治口糜生瘡久不瘥及心脾中熱乍發乍退大青丸方大青去根甘草炙銼枳殼去瓤麩炒苦參銼各三分黃連去須生乾地黃焙升麻各一兩上七味搗羅為末煉蜜和丸如梧桐子大每服二十丸食後熟水下日二服治口糜生瘡久不瘥大黃散方大黃煻灰火煨銼甘草炙銼黃柏炙銼各一兩密陀僧研滑石研各一分上五味搗研為散每用一錢匕綿裹含有涎即吐治口糜生瘡升麻丸方升麻黃連去須黃柏炙銼杏仁湯浸去皮尖雙仁各一兩上四味將上三味搗羅為末次研杏仁如膏煉蜜三兩以藥末並杏仁膏合和為丸如彈子大每服一丸含化咽津治大人小兒口糜生瘡紫金散方黃柏蜜塗慢火炙令紫色半兩訶黎勒一枚煨熟去核麝香研膩粉研各少許上四味搗研為散再同研勻每用半錢許糝瘡上治口糜生瘡大黃湯方大黃銼一兩芒硝研黃連去須黃柏炙各半兩上四味粗搗篩每服三錢匕水一盞煎至六分去滓入蜜半匙酥少許細呷含咽治口糜生瘡痛不得食甘草丸方甘草一寸炙赤色杏仁二十枚湯浸去皮尖雙仁研黃連末一分上三味搗研為末和勻每服綿裹如杏仁大含化咽津治口糜生瘡柴胡湯方柴胡去苗地骨皮各一兩上二味粗搗篩每服三錢匕水一盞煎至六分去滓細含咽之治口糜生瘡黃柏散方黃柏蜜塗炙乾去火毒白殭蠶直者置新瓦上下以火爆蠶絲絲斷出火毒上二味等分搗為細散糝瘡及舌上吐涎治口糜生熱瘡杏仁餅子方杏仁湯浸去皮尖雙仁十四枚別研細膩粉一錢上二味和研勻如膏每餅如錢眼大鉛丹為衣先用鹽湯漱口含一餅涎出即吐治口糜生瘡大黃蜜煎方大黃一兩切如指頭大上一味以蜜煎五七沸候冷取出每含一塊咽津治口瘡糜爛生蜜塗方蜜生使上一味頻用塗瘡上三五次即愈口吻瘡論曰口吻瘡者其瘡發於唇吻之間疼痛微腫濕爛有汁世名燕口又名肥瘡此由脾胃有熱隨氣熏發上攻於口唇與津液相搏所致治口吻瘡芎藭丸方芎藭二兩白芷陳橘皮湯浸去白焙黃連去須各半兩上四味搗羅為末煉蜜丸如梧桐子大每服二十丸甘草湯下不拘時治口吻生瘡亂髮灰散方亂髮灰黃連去須故絮灰各一兩乾薑炮半兩上四味搗研為散再研勻不拘多少敷瘡上日三五次以瘥為度治口吻瘡久不瘥麝香散方人中白研麝香研各一錢上二味再研勻塗瘡上治口吻瘡楸木皮敷方上取楸木白皮濕貼之日三五度瘥治口吻瘡葵根散方上取經年葵根一握燒作灰研為散敷之治口吻瘡楊木汁塗方上取楊木嫩枝放鐵上燒取汁塗之日三五上瘥治口吻瘡檳榔散方上用白檳榔燒灰細研為散敷之日三五度治口吻瘡馬齒莧汁塗方上搗馬齒莧取汁塗之治口吻瘡烏金散方上取蜣螂三枚燒灰細研為散敷之口舌乾焦論曰心主舌脾主口口舌乾焦者以心經蘊熱傳之於脾二臟俱受邪熱故口舌之間津液燥而乾焦也亦有多食五辛飲酒過度熱積上焦不能滋潤於口舌而致乾焦者治宜詳之治口舌乾焦葛根湯方葛根銼甘草炙各半兩人參三分赤茯苓去黑皮一兩天門冬去心焙三分黃耆銼一兩桂去粗皮三分犀角屑生乾地黃芎藭各半兩麻黃去根節一兩牛黃研一分地骨皮銼半兩麥門冬去心焙一兩上一十四味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治口舌乾焦干棗湯方干棗去核焙貝母去心各一兩半生乾地黃焙胡桃瓤各二兩陳橘皮去白焙一兩牛膝酒浸切焙葛根銼鱉甲去裙襴醋炙柴胡去苗桑根白皮各一兩上一十味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服不拘時治心脾客熱口舌乾焦生瘡桂心散方桂去粗皮半兩赤茯苓去黑皮三分黃連去須梔子仁杏仁去皮尖雙仁研各半兩黃芩去黑心甘草炙銼大黃銼炒各三分栝蔞根半兩薔薇根切三分上一十味搗研為散食後以溫漿水調下二錢匕日三服治口乾燥渴栝蔞根湯方栝蔞根二兩石膏碎三分鉛丹研三分赤石脂白石脂各半兩澤瀉三分上六味粗搗篩每服五錢匕水一盞半煎至一盞去滓入胡粉半錢匕分溫二服不拘時治心熱舌乾煩躁茯苓湯方白茯苓去黑皮大黃銼炒升麻麥門冬去心焙遠志去心人參葛根銼甘草炙銼各半兩上八味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治口乾酸石榴湯方酸石榴子一兩酸棗去核麥門冬去心焙各二兩覆盆子一兩半葛根三兩烏梅去核五十枚甘草炙銼一兩栝蔞根一兩半上八味粗搗篩每服五錢匕水一盞半煎至一盞日三服不拘時治口乾舌上生瘡五參丸方玄參沙參丹參苦參人參秦艽去苗土各一兩乾薑炮半兩酸棗仁一兩上八味搗羅為末煉蜜丸如梧桐子大每服二十丸至三十丸米飲下不拘時治口乾心熱甘草丸方甘草炙銼人參烏梅肉炒棗肉焙石膏碎各一兩半夏湯洗去滑生薑汁製一分上六味搗羅為末煉蜜丸如彈丸大每服一丸含化不拘時治口中乾燥心膈痰壅柴胡散方柴胡去苗一兩地骨皮赤茯苓去黑皮枳殼去瓤麩炒旋覆花各半兩上五味搗羅為散每服二錢匕生薑湯調下日三服不拘時治口熱舌焦乾杏仁煎方杏仁去皮尖雙仁研半兩生薑汁一合甘草炙銼為末半兩棗去皮核研三十枚蜜五合上五味先下薑汁與蜜煎令烊後入諸藥煎赤色如餳每取一丸如棗核大含化治口舌乾燥干棗杏仁丸方干棗肉焙杏仁去皮尖雙仁研烏梅肉焙甘草炙銼各一兩上四味搗研為末煉蜜丸如彈子大每服一丸不拘時含化治口舌乾除熱下氣石膏煎方石膏搗碎綿裹三兩蜜五兩上二味先用水三盞煎石膏至二盞內蜜更煎令稠每用一匙頭含化溫湯調下亦得治口舌乾燥心熱麥門冬湯方麥門冬去心焙栝蔞根各一兩上二味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治口舌乾燥生瘡心脾腸熱扁豆湯方扁豆炒蒺藜子炒各二兩上二味粗搗篩每服五錢匕水一盞半煎至一盞去滓日三服不拘時
