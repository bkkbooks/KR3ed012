body:
  text: 卷第一百九十九神仙去屍蟲上論曰三尸之為害托陰氣以成體感私欲而致用凡使人貪聲色嗜貨利喜怒好憎感於中發於外至死而不悔者皆此蟲也是以修真之士務去三尸然後服藥以求延年修為之序也黃庭五臟論曰上士修德以伏之下士餌藥以除之今具列云潁陽書曰人之腹中盡有三尸為人大害三尸者托陰氣以成靈感私欲而致用邪蘊臟腑非天機清明至難沉濁者鮮不易其心矣欲生則三尸生欲滅則三尸滅故至人云欲者不欲不欲者欲反復自明之謂也成道之速者欲去三尸先外製色味名利內平喜怒愛惡寂然虛靜屍乃無處潛留則遁跡而逝矣又曰每至夜半起端坐私誦妙靈名彭倨彭質彭矯七遍無令耳聞依守清淨法動用消息之宜繼晝不睡甲子庚申日守之亦爾則妙靈飛去心神凝定五方秀氣入於靈臺滋於童子童子者人神至精也精則成聖蕩則成愚是故聖人修之以真行之以勤若能克己勵志不出三年其道成矣心生光明久習彌廣南華謂之虛室生白秀髮靈臺即布日積數並三元六甲本命算以次扣之乾坤六甲天人玉女獻五方色數於童子合於天地天地不違合於萬象萬象不卻所求隨意而應知來藏往出有入無不可得而名心有進綱退紀之法變奇乘除之數五音六律消息加減剖析神明天道隱故不言而行自彰玄門之能事長生之妙術盡於此矣又曰妙靈三尸也常以庚申之夜上告天帝記人罪過絕人生籍令人早亡魂則昇天魄入於泉唯上屍獨在地上游行相承而為鬼崇或四時八節三牲祭祀不精則與人作禍苦心痛注忤伐人生命上屍彭倨在人頭中專伐人眼故目暗面皺口臭齒疼脫落中屍彭質在人腹中伐人五臟令人少氣力多忘好作惡事啖食眾生血肉或為惡夢驚恐不安流汗不止下屍彭矯在人足中令人下關搔擾五情踴動不能自禁若三尸為崇則害於子孫傳注不絕如學道之人不先去屍蟲徒服良藥斷谷絕味勤於吐納以求長生終不可得將知至道須究斯害每至庚申日其夜不寐守之至明若覺體重疲倦宜可少眠須令數覺此三尸蟲即不得上告天帝太上科律云六月八日及庚申日夜北帝開諸罪門聽群鬼物下詢訴訟其人罪滿五千則當死一守庚申三尸振伏七守庚申三尸永絕乃得精神安宅骸室長存五神恬靜不復搔擾迷亂又每夜欲臥時扣齒三七通左手撫心呼三尸名三遍則不復為害又常以寅日去手爪甲午日去足爪甲年中七月十六日去手足爪甲燒之作灰和水服之三尸九蟲永自消滅又江南芒草香三尸所惡之草煎作湯沐浴三尸自去矣又以三月四日取桃葉五升熟搗脫衣避風密室中坐其上令氣入腹中從旦至暮屍蟲悉出且疾中難療者莫過於癩次是勞瘦一染之後子孫相傳時呼傳屍欲斷此疾須禁絕三尸九蟲邪氣伏盡即入諸藥世人得此疾自言宿業甘心受斃豈不惑哉是故上士修德以伏之中士守庚申以制之下士餌藥以除之治屍蟲能作萬病癰疽痔瘻疥癬蚤蝨等疾宜速去之貫眾丸方貫眾一兩一分主伏蟲白藿蘆三兩主蛔蟲蜀漆三分主白蟲蕪荑一兩一分主肉蟲雷丸一兩半主赤蟲白殭蠶一兩主膈蟲石蠶一兩一分主蟯蟲厚朴一兩一分炙焦主肺蟲狼牙子一兩主胃蟲上九味並切熬令黃搗羅為末煉蜜和丸如梧桐子大粉漿服五丸日再服漸加至十丸經十五日積聚下六十日百病瘥婦女服之絕孕者還生子服藥須先齋戒即屍蟲奔散神靈來輔又方青木香一分白檳榔一枚銼桂去粗皮一分上三味粗搗篩每服三錢匕水一盞煎至七分去滓溫服真人去三尸方狗脊去毛七兩乾漆二兩蕪荑三兩上三味同熬搗羅為末煉蜜和丸如梧桐子大每服七丸米飲下三七日三尸自去或下形如小兒收以綿帛裹之拋東流水哭之三聲咒曰汝是地鬼我是天仙急急如律令迴歸易道慎勿反顧太上科儀以甲子日掃灑庭中以夜半時敷案案上安新汲水三杯一東一中一西燒降真白膠乳頭香至心面北三拜稱位郡鄉里曾孫臣某稽首再拜長跪曰奉請上皇神人上皇真人北極三臺君南鬥北斗中鬥東鬥西鬥君司命司錄司非司危君中宮戊己金紫黃老君日元君月元君三光四時五行王相尊神天師六甲父母願垂玄感降臨坐席即伏存思諸神來降定訖乃起再拜曰諸神水除去身中三尸九蟲令臣某學道登仙長生度世伏受神恩言訖長跪願諸神明日君月夫人乞賜神水除臣某頭中屍彭倨便取東杯水飲畢又言諸神明日君月夫人真氣賜神水除臣某腹中屍彭質取中央杯水飲畢又言諸神明日君月夫人賜神水除臣某足中屍彭矯便取西杯水飲之飲訖再拜畢右回入室寢當自有夢應見人啼泣謝去或不啼泣但謝而去者皆是驗也若無應即後甲子再為之應乃止夫覺與陽合寐與陰並覺多即魂強寐多則魄壯魄強為生之徒魄壯為死之路常須拘制之上魂名爽靈字浮游中魂名脂光字合明下魂名幽精字黨形魂欲上天魄欲入泉魂魄還觀其道自然生隨魂死隨魄魂好升魄好沉但虛心任氣五神無淫役自然神真契道太微靈書曰每月三日十三日二十三日夕三魂離其身當須攝之法去枕仰眠交足左壓右交手心上瞑目閉氣三息存心中赤氣如雞子從心內出上咽中相次覺體小熱則呼三魂名叩齒微呼爽靈延年胎光益祿幽精絕死三呼訖即微咒叩齒三通曰太微元宮中黃始清內煉三魂三神安寧神寶玉室與我俱生不得妄動監者天靈若欲飛行唯詣上清欲不飢渴自飲玉津每月晦朔弦望七魄不守尤須作意制之叩齒七通一呼之女即十四通二呼之屍苟伏矢雀陰夭賊飛毒除穢魄師呼訖咒曰太上高尊上皇至真萬神安鎮七魄佩身不得越錯與惡為群長居室後俱化成仙永守身形保我得真遊行上宮同為皇賓夏禹去三尸法木香柏子香松香蘹香子各一兩上四味木臼杵為末蜜丸瓷器中收淨室存神安住之處燒之合時向王方和之亦可服神仙去屍蟲下鎮固腸胃不生飢渴守煉五臟消滅九蟲綿永胎息安神妙香丸方丹砂半兩研如粉松脂三兩煉十次取一兩半鶴蝨人參白茯苓去黑皮狗脊去毛貫眾雄黃研如粉各半兩蠟二兩蜜煉乳香研如粉禹餘糧燒三度研如粉各一兩上一十二味各搗研為末取十五日合和先入蜜蠟松脂三味於銚子內化為汁和九味丸之如皂子大至誠祝曰願闢除穀氣咽息沖和便用糯米一升杏仁二合去皮尖雙仁細研白蠟一兩相和煮粥飽食一頓須臾服大豆一合熟者仍服藥一丸得十八日續更服一丸得三十四個月又服一丸即終身永無飢渴戒五辛色欲鹽醋等物若慮無力吃棗肉三七枚助之一月後更不服服時用乳香湯下渴即吃茯苓湯若要開食時吃葵菜湯一盞其藥自下收取用乳香水洗三五次於土坑內焙三七日留待再服轉加靈效開食時煮淡面飯一小碗許合藥了用雲母粉收之辟穀固氣卻滅三尸消蕩九蟲安和五臟鎮守三田輕身強志拘魂制魄延永胎根金簡煎方乳香四兩牛乳一斗銀石器中盛並乳香於重湯內煮旋旋澆牛乳汁以乳香化為度赤石脂半斤細研水飛過於紙箱內沙上滲干入夾絹袋盛於飯上炊九次每次出焙乾又炊以飯熟為度丹砂四兩研水飛過紙箱內盛汽干秤甘草半斤為末蜜銀器盛重湯內熬以絹袋濾過秤取四斤上六味將蜜分作九分每一分拌乳香等入新竹筒內盛大竹可三四枚盛了次用新桑白皮扎塞定筒口令密以黑豆大麥水拌鋪在大甑底上坐竹筒次又以豆麥蓋覆過竹筒再蓋覆如法慢火炊一日三四次添水炊至夜取出筒傾藥出以瓷器盛了入焙籠內火焙一夜或未乾又焙令極干再取蜜一分拌藥令勻又以新桑白皮塞口了再入水灑拌豆麥令勻又依前再炊一日如前用熱水灑三四次炊一日至夜依前取焙之如此九炊九焙放幹成煎每服抄一大匙許仍須先均作一百二十服須先服藥床如要服藥床即忌鹽醋如要治中風癱緩半身不遂口眼喎斜語澀神昏者分作一百四十服亦須先服藥床住食藥床法白茯苓去黑皮一兩大麥面半斤桑根白皮一兩上三味同搗羅為末拌勻和作面劑煮作棋子淡吃服此一斤四兩是早晚兩次服半月計面一秤藥計六十兩充為藥床半月後方得吃金簡煎金簡煎每用溫酒調服如日內飢即得服酒一盞或兩盞如渴即飲一兩盞溫水睡眠自在去三尸亡蟲丸方紫菀去苗上醋煮熟焙半斤射干一錢白龍骨半兩上三味先將紫菀搗末次搗射干白龍骨和勻為散每日服一錢匕空心甘泉水調下念三尸名即屍亡矣去三尸潔腑臟鎮七魄明耳目廣福延齡丹方丹砂研如粉雄黃研如粉人參白茯苓去黑皮各二兩白朮乳香研細各四兩上六味各搗研為末和勻入銀器中用蜜和如稀膏以油單封口又以水和白麵裹器物外厚兩指許每日於飯上炊候飯熟取下如此半月如藥干更入蜜丸如梧桐子大空心溫酒下二十丸忌羊血其功甚大輕身壯陽卻老還童去三尸下九蟲除萬病神仙巨勝丸方巨勝酒浸一宿九蒸九曝牛膝酒浸切焙巴戟天去心天門冬去心焙山芋熟乾地黃焙柳桂去粗皮酸棗仁覆盆子菟絲子酒浸別搗焙乾遠志去心菊花人參白茯苓去黑皮各一兩上一十四味揀擇淨搗羅為末煉蜜為丸如梧桐子大每日空心溫酒下二十丸服一月身輕體健萬病不侵輕身延年除百病去三尸青元子返童散方天門冬去心焙人參白茯苓去黑皮麥門冬去心焙白菊花各六兩上五味搗羅為散每日溫酒或飲調下三錢匕不拘時候服三年覺身輕去三尸百蟲美顏色明耳目神仙雄黃丸方雄黃松脂等分上二味擇雄黃如雞冠色不雜砂石者先搗研羅極細次以松脂和杵為丸如彈子大每旦以酒研下一丸服至十日腹中三尸百蟲自下面上紫黑皆除服及一月百病自瘥耳目聰明久服致神仙常須潔淨勿損藥方神仙導引上論曰人之五臟六腑百骸九竅皆一氣之所通氣流則形和氣盩則形病導引之法所以行血氣利關節闢除外邪使不能入也傳曰戶樞不蠹流水不腐人之形體其亦由是故修真之士以導引為先夜半子少陽之氣生於陰分修生之士於子時修煉古人一日行持始於子一歲功用起於復轉脅舒足混元經云戌亥子三時陽氣生而人寐寐則氣滯於百節養生家睡不厭縮覺不厭伸故陽始生則舒伸轉掣務令榮衛周流也鼓腹淘氣淘氣訣閉目仰面舉腰脊鼓氣海中氣使內外轉吐而去之不使耳聞一九二九止若五臟三焦壅即以六氣治之所謂噓呵呼呬吹嘻是也噓屬肝呵屬心呼屬脾泗屬肺吹屬腎嘻屬三焦導引家不經師授大月從噓為順行小月從嘻為逆行以理推之不應如是大抵六字瀉而不補但覺壅即行本臟疾已即止豈可逐日行之古人有言六氣出不可過過則傷正氣導引按蹺踴身令起平身正坐兩手叉項後仰視舉首左右招搖使項與手爭次以手拔腳梢閉氣取太衝之氣太衝穴在大趾本節後二寸骨罅間陷者是左挽如引弓狀右挽亦如之左洞真經按摩篇云叉兩手乃度以掩項後仰面視上舉首使項與手爭為之三四令人精和血通風氣不入能久行之無病畢又屈動身體伸手四極反張側挈宣搖百關為之各三華佗別傳云人身欲得勞動但不當自極爾體常動搖穀氣得消血脈流通戶樞不蠹流水不腐形體亦然真人按蹺蓋取諸此元道經云元氣難積而易散關節易閉而難開捏目四眥太上三關經云常欲以手按目近鼻之兩眥閉氣為之氣通即止終而復始常行之眼能洞見又云導引畢以手按目四眥三九遍捏令見光明是檢眼神之道久為之得見靈也摩手熨目捏目四眥畢即用兩手側立摩掌如火開目熨睛數遍對修常居內景經云常以兩手按眉後小穴中二九一年可夜書亦可於人中密行之勿語其狀眉後小穴為上元六合之府主化生眼暈和瑩精光長珠徹瞳保煉目睛是真人坐起之道一名真人常居真人所以能旁觀四達使八遐照燭者實常居之數明也紫微夫人曰仰和天真俯按山源天真是兩眉之角山源是鼻下人中也兩眉之角是徹視之律梁鼻下人中是引靈之上房俯按山源紫微夫人云俯按山源是鼻下人中之本側在鼻下小谷中也楚莊公時市長宋來子灑掃一市常歌曰天庭發雙華山源障陰邪清晨按天馬來指太清家真人無那隱又以滅百邪常歌此乞食一市無人解其語者宋來子西嶽真人馮延壽周宣王時史官也手為天馬鼻為山源每經危險之路廟兒之間心中有疑忌之意者乃光反舌內向咽津一二遍畢以左手第二第三指捏兩鼻孔下人中之本鼻中隔孔之內際也鼻中隔孔之際一名山源一名鬼井一名神池一名魂臺捏畢因叩齒七遍又以手掩鼻手按山源則鬼井閉門手薄神池則邪根分散手臨魂臺則玉真守闕於是感激靈根天獸來衛千精震伏莫幹我氣此自然之理也鼻下山源是一身之武津真邪之通府守真者所以遏萬邪在我運攝云耳營治城郭消魂經云耳欲得數按抑左右令無數使人聽徹所謂營治城郭名書皇籍擊探天鼓天鼓者耳中聲也舉兩手心緊掩耳門以指擊其腦戶常欲其聲壯盛相續不散一日三探有益下丹田或聲散不續無壯盛者即元氣不集也宜整之拭摩神庭真誥云面者神之庭發者腦之華心悲則面焦腦減則發素太素丹經云一面之上常欲得兩手摩拭之使熱高下隨形皆使極匝令人面色有光澤皺斑不生行之五年色如少女所謂山澤通氣勤而行之手不離面乃佳也穎陽書云發宜多櫛齒宜數叩液宜常咽氣宜常煉手宜在面此五者所謂子欲不死修崑崙矣上朝三元真誥云順手摩發如理櫛之狀使發不白以手乘額上謂之手朝三元固腦堅發之道也頭四面以手乘順就結唯令多也於是頭血流散風濕不凝黃庭經云一面之神宗泥丸泥丸九真皆有房方圓一寸在其中下摩生門黃庭經云面部水王對生門生門者臍也閉內氣鼓小腹令滿以手摩一周天櫛發穀神訣凡梳頭勿向北梳欲得多多則去風多過一千少不下數百仍令人數太極經云理髮欲向王地櫛之取多而不使痛亦可令待者櫛也於是血液不滯髮根常堅太素經云櫛頭理髮欲得多過通流血氣散行風濕也數易櫛更番用之亦可以梳就結不須解發也運動水土真誥云食勿過多多則生病飽慎便臥臥則心蕩學道者當審之登真秘訣云食飽不可睡睡則諸疾生但食畢須勉強行步以手摩兩脅上下良久又轉手摩腎堂令熱此養生家謂之運動水土水土即脾腎也自然飲食消化百脈流五臟安和養生論云已飢方食才飽即止每食後常服三黃丸又曰他人須絕欲節晚食道引般運行之三年自無疾病然後減穀食面以遣穀氣漸漸胎息休糧從粗入細不可頓也申未之間時飲酒一杯止飢代食酒能淘蕩陰滓得道之人熟谷之液皆所不廢酒能煉人真氣靈劍子服氣經云酒後行氣易通然不可多及大吐反有所損神仙導引下太上混元按摩法兩手捺䏶左右捩肩二七遍兩手捻䏶左右扭身二七遍兩手抱頭左右扭腰二七遍左右挑頭二七遍一手抱頭一手托膝三折左右同兩手托頭三舉之一手托頭一手托膝從下向上三遍左右同兩手攀頭下向三頓足兩手相捉頭上過左右三遍兩手相叉托心前推卻挽三遍兩手相叉著心三遍曲腕築肋挽肘左右亦三遍左右挽前後拔各三遍舒手挽項左右三遍反手著膝手挽肘覆手著膝上左右亦三遍手摸肩從上至下使遍左右同兩手空拳築三遍外振手三遍內振三遍復手振亦三遍兩手相叉反復攪各七遍摩扭指三遍兩手反搖三遍兩手反叉上下扭肘無數單用十呼兩手上聳三遍兩手下頓三遍兩手相叉頭上過左右申肋十遍兩手拳反背上掘脊工下亦三遍掘揩之也兩手反捉上下直脊三遍覆掌搦腕內外振三遍覆掌前聳三遍覆掌兩手相叉交橫三遍覆手橫直即聳三遍若有手患冷從上打至下得熱便休舒左腳右手承之左手捺腳聳上至下直腳三遍右手捺腳亦爾前後捩足三遍左捩足右捩足各三遍前後卻捩足三遍直腳三遍扭䏶三遍內外振腳三遍若有腳患冷者打熱便休扭䏶以意多少頓腳三遍卻直腳三遍虎據左右扭肩三遍推天托地左右三遍左右排山負山拔木各三遍舒手直前頓伸手三遍舒兩手兩膝亦各三遍舒腳直反頓伸手三遍捩內脊外脊各三遍天竺按摩法兩手相捉扭捩如洗手法兩手淺相叉翻覆向前兩手相捉共按䏶左右同兩手相重按䏶徐徐捩身左右同以手如挽五石力弓左右同作拳向前築左右同如托石法左右同作拳卻頓此是開胸左右同大坐斜身偏敧如排山左右同兩手抱頭宛轉䏶上此是抽脅兩手據地縮身曲脊向上三舉以手反椎背上左右同大坐伸兩腳即以一腳向前虛掣左右同兩手據地回顧此是虎視法左右同立地反拗身三舉兩手急相叉以腳踏手中左右同起立以腳前後虛踏左右同大坐伸兩腳用相當手勾所伸腳著膝中以手按之左右同上十八勢但逐日能依此三遍者一月後百病除行及奔馬補益延年能食眼明輕健不復疲乏
