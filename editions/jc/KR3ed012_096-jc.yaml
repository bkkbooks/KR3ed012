body:
  text: 卷第九十六小便利多論曰腎者主水膀胱為府今腎氣不足膀胱有寒不能約制水液令津滑氣虛故小便利多久不瘥則腎氣傷憊真元耗損腰脊痠疼身體寒顫羸乏之病生焉治腎臟虛憊骽膝無力小便利多山茱萸丸方山茱萸山芋覆盆子菟絲子酒浸一宿搗焙巴戟天去心人參楮實五味子微炒各一兩半萆薢銼炒牛膝酒浸切焙桂去粗皮天雄炮裂去皮臍各一兩熟乾地黃焙二兩半上一十三味搗羅為末煉蜜和搗五百杵丸如梧桐子大每服三十丸空心食前溫酒下治腎虛小便多阿膠湯方阿膠炙令燥別搗末人參各一兩乾薑炮二兩遠志去心四兩附子一枚炮裂去皮臍甘草炙銼三兩大麻仁爛研一升上七味粗搗篩五味與麻仁拌勻每服六錢匕水二盞煎至一盞去滓入阿膠末半錢匕更煎兩沸食前溫服日三治小便利飲水多者又非淋疾黃耆丸方黃耆銼三兩土瓜根乾薑炮各二兩菝葜漏蘆去蘆頭地骨皮去土各一兩半栝蔞根二兩半桑螵蛸半兩中劈破慢火炙上八味搗羅為末以濕紙裹粟米飯於煻火內燒過和搗令勻丸如梧桐子大每服二十丸微溫牛乳汁下早晚兩服漸加至三十丸多飲乳汁為妙治元氣虛冷小便頻滑腰脊疼痛益氣紫金丸方沉香銼木香肉豆蔻仁芎藭沒藥研烏藥蓽澄茄檀香銼各一兩檳榔銼蘹香子炒各二兩膃肭臍酒浸炙銼麝香研桂去粗皮各半兩丹砂研二兩半蘇合香三分酒研上一十五味除蘇合香外搗研為末合和酒煮麵糊和丸如梧桐子大每服二十丸至三十丸食前溫酒下米飲亦得治元臟虛弱臍腹㽲痛膝脛少力百節痠疼昏倦多睡小便頻濁頭旋痰唾背脊拘急飲食無味溫順臟氣補益下經覆盆子丸方覆盆子肉蓯蓉酒浸切焙黃耆炙銼五味子補骨脂炒烏藥石槲去根澤瀉蓽澄茄沉香銼巴戟天去心各一兩熟乾地黃焙一兩半芎藭當歸切焙赤芍藥山茱萸各三分菟絲子酒浸三日搗焙二兩上一十七味搗羅為末煉蜜和丸如梧桐子大每服二十丸加至三十丸食前溫酒下米飲鹽湯亦得治固真氣止臍腹疼痛臟腑不調小便滑數沉香蓯蓉煎丸方沉香銼五味子微炒雞頭實和皮用桑螵蛸炒金櫻子薰草去根用莖葉鹿茸去毛酥炙菟絲子酒浸三日別搗附子炮裂去皮臍銼以青鹽黑豆同煮透焙乾去鹽豆牛膝酒浸切焙各一兩肉蓯蓉酒浸切焙別搗末八兩上一十一味搗羅十味為末先將肉蓯蓉末以好酒一升慢火熬成煎和前藥丸如梧桐子大每服三十丸空心食前生薑鹽湯下溫酒亦得治小便滑數八味補骨脂丸方補骨脂炒巴戟天去心桑螵蛸炒菟絲子酒浸三日別搗牛膝酒浸切焙熟乾地黃焙各一兩乾薑炮半兩枳殼麩炒去瓤三分上八味搗羅為末酒煮麵糊和丸如梧桐子大每服二十丸空心食前溫酒下粟米飲亦得補水臟壯筋骨止小便腹中雷鳴臍下㽲撮疼痛烏術丸方蒼朮東流水浸十日去黑皮切片焙半斤烏頭米泔浸五日逐日換泔炮裂去皮臍蜀椒口開者燒磚令紅以醋潑磚安椒蓋出汗取紅用青橘皮湯浸去白焙各三兩青鹽一兩研上五味搗羅四味為末與鹽拌勻煉蜜和丸搗一千杵丸如梧桐子大每服二十丸空心食前鹽酒下治下經虛寒小便滑數不欲飲食腹脅脹滿或時疼痛補虛沉香丸方沉香銼訶黎勒皮人參赤茯苓去黑皮肉豆蔻仁蓽茇乾薑炮胡椒桂去粗皮葫蘆巴炒各一兩上一十味搗羅為末煉蜜和丸如梧桐子大每服二十丸加至三十丸空心食前溫鹽湯下木香湯亦得治小便利多吳茱萸丸方吳茱萸湯洗焙乾炒三兩蜀椒去目並閉口炒出汗二兩乾薑炮一兩上三味搗羅為末酒煮麵糊和丸如梧桐子大每服二十丸加至三十丸空心溫酒下治小腸虛冷臍下急痛小便滑數厚朴湯方厚朴去粗皮薑汁炙一兩半附子炮裂去皮臍芎藭各三分白龍骨當歸切焙各一兩上五味㕮咀如麻豆每服三錢匕水一盞入生薑三片棗二枚劈破煎至七分去滓食前溫服治小便多利五味補骨脂丸方補骨脂炒研五兩附子炮裂去皮臍桂去粗皮各二兩胡桃仁湯去皮膜研三兩安息香二兩酒化濾去滓熬成膏上五味搗羅二味為末與補骨脂胡桃仁合研勻用安息香膏和搗千杵丸如梧桐子大每服二十丸空心食前溫酒下鹽湯亦得加至三十丸治小便滑數雌黃丸方雌黃研如粉一兩半乾薑半兩銼入鹽四錢匕同炒黃色上二味搗研為末用干蒸餅為末入水內拌和搗熟丸如綠豆大每服十丸加至二十丸空心鹽湯下治小便滑數腰膝少力石菖蒲丸方石菖蒲米泔浸半日切片焙五兩肉蓯蓉酒浸半日切焙附子炮裂去皮臍蜀椒取紅各二兩上四味搗羅為細末酒煮麵糊和丸如梧桐子大每服二十丸加至三十丸空心食前溫酒下鹽湯亦得治元臟虛冷腹內雷鳴夜多小便白朮散方白朮二兩米泔浸一宿炒芍藥厚朴去粗皮薑汁炙吳茱萸湯洗焙炒陳橘皮湯浸去白焙細辛去苗葉各一兩上六味搗羅為散每服二錢匕入鹽沸湯點服治下元虛冷少腹疼脹小便滑數婦人血海虛冷經候不調正氣丸方楝實麩炒蒼朮米泔浸一宿炒蘹香子炒蜀椒去目並閉口者炒出汗各一兩石菖蒲知母焙各半兩附子一枚大者炮裂去皮臍上七味搗羅為末醋煮麵糊和丸如梧桐子大每服三十丸空心食前溫酒下婦人醋湯下補益下元壯強真氣療膀胱虛冷小便頻數蓯蓉牛膝丸方肉蓯蓉酒浸一宿切焙牛膝酒浸一宿切焙補骨脂酒浸一宿炒巴戟天去心羌活去蘆頭附子炮裂去皮臍蜀椒去目並閉口炒出汗各一兩上七味搗羅為末用豶豬腎一隻去筋膜細切研爛取浸牛膝酒同面煮糊和丸如梧桐子大每服三十丸空心臨睡溫酒下治膀胱久冷小便數泄精不止肉蓯蓉丸方肉蓯蓉酒浸切焙鹿茸去毛酥炙附子炮裂去皮臍各二兩萆薢龍骨煅醋淬山茱萸各一兩補骨脂炒一兩半上七味搗羅為末煉蜜和丸梧桐子大每服三十丸薑湯下空心食前治膀胱虛寒小便數牡蠣丸方牡蠣火煅獨活去蘆頭狗脊去毛各三分肉蓯蓉酒浸切焙一兩龍骨半兩上五味搗羅為末煉蜜和丸如梧桐子大每服三十丸鹽湯下空心食前治小便頻數及引飲不止糯米糍方上取純糯米糍一手大臨臥炙令軟熟啖之以溫酒送下不飲酒人溫湯下多啖彌佳行坐良久待心空便臥一夜十餘行者服之即止或言假火氣溫水道不然也大抵糯稻工縮水凡人夜飲者夜輒不溺此糯米之力也昔有人病渴殆死有人用糯稻稈斬去穗及根取其中心淨器中燒作灰每用一合許湯一碗沃浸良久澄去滓嘗其味如薄灰汁乘渴令頓飲之是夜減飲水七八升此亦糯稻縮水之一驗也小便赤澀論曰膀胱者津液之府與腎合而主水共為表裡行於小腸入於胞為溲便今胞內有客熱入於膀胱致水液不利故小便赤澀也治小腸客熱小便淋澀赤痛木通湯方木通銼冬葵子各半兩冬瓜子滑石各一兩半瞿麥穗黃芩各一兩白茅根一握銼上七味粗搗篩每服三錢匕水一盞入竹葉七片煎至七分去滓食前溫服治心與膀胱俱熱小便赤澀不利石葦湯方石葦去毛瞿麥穗虎杖海金沙各半兩滑石一兩上五味粗搗篩每服二錢匕水一盞入燈心半握煎至七分去滓溫服治心熱小便赤澀不利石燕子散方石燕子一個滑石末一分冬葵子續隨子去皮別研海金沙別研各一兩上五味搗羅為散與別研者和勻每服二錢匕煎木通湯放冷調下通利小腸治小便赤澀透泉散方滑石末一兩甜硝研甘草末各半兩琥珀研一分上四味同研勻細每服二錢匕煎燈心湯調下空心食前服治心脾熱壅小便赤澀皮肉發黃目黃色白茅根湯方白茅根銼三兩秦艽去苗土茵陳蒿犀角鎊黃芩去黑心各一兩半朴硝研赤芍藥各二兩大黃一兩麥門冬去心生用二兩半上九味粗搗篩每服三錢匕水一盞半煎至一盞去滓空腹服日二夜一治小便赤澀額上汗出手足煩熱龍膽湯方龍膽去苗洗犀角鎊生地黃洗切各一兩麥門冬去心生用三分升麻銼甘草炙各半兩牡蠣慢火炒一兩半上七味㕮咀每服四錢匕水一盞半煎至八分去滓不拘時溫服治膈上虛熱喉咽噎塞小便赤澀神困多睡酸棗仁丸方酸棗仁生用薏苡仁炒木通銼黃耆銼枳殼去瓤麩炒升麻銼大黃銼炒麥門冬去心焙木香赤茯苓去黑皮坐拿草各一兩上一十一味搗羅為末煉蜜和丸如梧桐子大每服二十丸加至三十丸煎麥門冬湯下治因有客熱積在臟腑變為熱勞小便赤澀四肢煩疼心膈壅悶面黃目赤遍身壯熱骨節痠疼飲食無味犀角湯方犀角鎊鱉甲去裙襴醋炙柴胡去苗山芋續斷銼熟乾地黃焙黃芩去黑心紫菀洗焙甘草炙銼秦艽去苗土防風去叉各半兩厚朴去粗皮薑汁炙銼三分上一十二味粗搗篩每服四錢匕水一盞半生薑三片煎至八分去滓食前溫服治風熱小便赤澀滑石散方滑石二兩梔子仁微炒木通銼豉微炒各一兩上四味搗羅為散每服二錢匕煎蔥白湯調下早晚食前夜臥各一服治小便不利赤澀疼痛滑石散方滑石木通銼冬葵子微炒各一兩上三味搗羅為散每服一錢匕至二錢匕食前蔥白湯調下以小便利為度治頭面浮虛心胸膨脹小便赤澀欲作水候檳榔湯方檳榔銼枳殼去瓤麩炒桔梗炒各一兩木香半兩上四味粗搗篩每服二錢匕水一盞生薑三片棗二枚劈煎至七分去滓溫服不拘時治小便赤澀疼痛蠶蛻散方蠶蛻紙燒灰上一味細研入麝香少許和勻每服一錢匕米飲調下治小便赤澀疼痛酸漿飲方酸漿草上一味採嫩者洗研絞取自然汁每服半合酒半盞和勻空心服之未通再服治膀胱積熱小便赤澀榆白皮湯方榆白皮車前子冬葵根木通炙各一兩瞿麥穗茅根桑螵蛸炙各半兩上七味細銼每服五錢匕水一盞半煎至八分去滓溫服治小便淋澀不通葵子湯方冬葵子一合朴硝半兩上二味同研勻以水三盞煎葵子至一盞半去滓下朴硝空腹分溫二服治小便淋澀不通紫草散方紫草三分上一味搗羅為散和井花水一盞半頓服小便出血論曰內經謂悲哀太甚則胞絡絕陽氣動中數溲血又曰胞移熱於膀胱為癃溺血二者皆虛熱妄溢故溲血不止也治宜去邪熱調心氣治小便出血水道中澀痛榆白皮湯方榆白皮銼三兩冬葵子一合滑石二兩石葦去毛瞿麥用穗生乾地黃各一兩上六味粗搗篩每服五錢匕水一盞半煎至六分去滓入筆頭灰半錢匕攪勻食前溫服治小便出血水道中澀痛金黃湯方鬱金銼瞿麥穗生乾地黃車前葉芒硝滑石各一兩上六味粗搗篩每服五錢匕水一盞半同煎至七分去滓溫服不拘時候治小便失血面色萎黃飲食不進木通湯方木通銼冬葵子各半兩燈心切一握上三味粗搗篩每服五錢匕水二盞煎至一盞去滓溫服不拘時候治小便出血槐金散方槐花炒鬱金銼各一兩上二味搗羅為散每服二錢匕煎木通湯調下不拘時候治小便出血疼痛滑石丸方滑石車前子海蛤各一兩瞿麥穗牡蠣燒海金沙木通銼甘草炙各半兩上八味搗羅為末煉蜜和丸如梧桐子大每服二十丸小薊湯下不拘時候治小便出血車前葉湯方車前葉乾者茜根洗銼黃芩去黑心阿膠炒燥地骨皮洗紅藍花炒各一兩上六味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治小便出血人參湯方人參生乾地黃銼芍藥銼桔梗銼當歸切焙甘草炙銼桂去粗皮芎藭銼各一兩淡竹茹二兩上九味粗搗篩每服四錢匕水二盞煎至一盞去滓溫服不拘時候治小便出血木通飲方木通銼一兩半冬葵子炒半兩滑石碎二兩石葦去毛炙一兩上四味粗搗篩每服五錢匕水二盞煎至一盞去滓溫服不拘時候治腎客熱連心小便出血疼痛阿膠湯方阿膠炒燥黃芩去黑心各三分甘草炙半兩生地黃絞取汁車前葉生者絞取汁藕節絞取汁各四合生蜜一盞上七味將前三味粗搗篩同後四味攪勻每服一大匙水一盞煎至七分去滓溫服不拘時候治小便出血木通散方木通銼白茯苓去黑皮銼各一兩葶藶隔紙炒一分上三味搗羅為散每服二錢匕煎粟米飲調下不拘時候治小便出血不止柏葉湯方柏葉去梗焙甘草炙銼阿膠炒燥黃芩去黑心銼竹茹切生乾地黃切各一兩上六味粗搗篩每服四錢匕水一盞半同煎至八分去滓溫服不拘時候治小便出血地黃丸方生乾地黃焙菟絲子酒浸一宿曝別搗白芷牡荊實去萼冬葵子炒當歸切焙芎藭赤茯苓去黑皮敗醬蒲黃各一兩上一十味搗羅為末煉蜜和丸如梧桐子大每服二十丸煎粟米飲下日三治小便出血不絕雞蘇湯方雞蘇去土石膏各二兩竹葉銼一兩上三味粗搗篩每服四錢匕水一盞半煎至一盞去滓溫服不拘時候治膀胱熱小便血不止蒲黃散方蒲黃微炒二兩鬱金銼三兩上二味搗羅為散每服一錢匕粟米飲調下空心晚食前服治小便赤色或小便鮮血車前子散方車前子木通銼澤瀉當歸切焙桑螵蛸炙桂去粗皮滑石等分上七味搗羅為散每服二錢匕煎冬葵根湯下治小便出血黃芩湯方黃芩去黑心阿膠炒燥甘草炙銼各二兩柏葉一把銼上四味粗搗篩每服五錢匕水一盞半入生地黃一分拍碎同煎至八分去滓溫服食前治小便血日夜不止鹿茸散方鹿茸酥炙去毛當歸銼焙生乾地黃焙各二兩冬葵子炒四兩半蒲黃一合上五味搗羅為細散空腹溫酒調三錢匕服日二治小便出血地黃飲方地黃汁一升生薑汁一合上二味並取自然汁相和分作三服每服煎一沸溫服自早至日中服盡治小腸尿血方指甲半錢頭髮一分上二味燒灰研勻空心溫酒調一錢匕頓服大便不禁論曰大腸為傳導之官掌化糟粕魄門為之候若其臟寒氣虛不能收斂致糟粕無所制約故遺失不時治之宜澀固津液方論所謂澀可去脫是也治大便失禁手足厥冷面色青白救陽丸方吳茱萸湯浸焙乾炒乾薑炮赤石脂龍骨蜀椒去目並閉口者炒出汗桂去粗皮附子炮裂去皮臍天雄炮裂去皮臍硫黃飛研陽起石煅醋淬研上一十味等分搗研為細末稀糊丸如梧桐子大每服十五丸米飲下空心食前漸加丸數鹽湯亦得治虛損泄瀉大便失禁朝真丸方硫黃一兩研飛晉礬熬令汁枯研一兩青鹽一錢研上三味合研勻水浸炊餅丸如綠豆大每服十五丸至二十丸溫酒下空心食前或用丹砂為衣亦得治大便失禁並腸鳴福庭丸方附子去皮臍銼一兩厚朴去粗皮二兩同附子用生薑汁浸一宿於瓷器內炒上二味搗羅為末用酒煮陳曲末為糊丸如梧桐子大每服十五丸至二十丸生薑鹽湯下空心食前治大便不禁真氣羸弱龍骨湯方龍骨阿膠炙令燥乾薑炮黃連去須炒各一兩粳米三合炒熟石榴一枚大者切別搗入附子炮裂去皮臍甘草炙銼芍藥黃芩去黑心各三分上一十味㕮咀如麻豆每服五錢匕以水一盞半煎至一盞去滓空心溫服日再治虛冷大便不禁氣脫神昏石硫黃湯方石硫黃明者細研紫筍茶微火焙乾研末各一兩上二味以水一盞下硫黃末半錢匕茶一錢匕煎至六分去滓溫服不拘時候日三治大便不禁地榆丸方地榆一兩白龍骨赤石脂沒石子熟艾去梗微炒橡實殼炒令黃色各半兩黃柏去粗皮炙三分上七味搗羅為細末煉蜜和丸如梧桐子大每服三十丸空心米飲下日再治大便不禁腹內㽲痛陳曲丸方陳曲末炒白茯苓去黑皮黃連去須微炒黃柏去粗皮炙乾薑炮附子炮裂去皮臍龍骨各一兩赤石脂甘草炙銼人參當歸切焙各半兩上一十一味搗羅為細末煉蜜為丸如梧桐子大每服十五丸空心米飲下日再治虛寒客於下焦腸滑洞泄困極欲死石榴皮湯方酸石榴皮微炒乾薑炮各一兩黃柏去粗皮炙阿膠炙令燥各三分上四味粗搗篩每服四錢匕用水一盞煎至四分去滓空心溫服或無黃柏用黃連亦得治下焦虛寒大便不禁附子湯方附子炮裂去皮臍半兩黃連去須炒二兩阿膠炙令燥三分甘草炙銼乾薑炮各半兩赤石脂厚朴去粗皮生薑汁炙各一兩上七味㕮咀如麻豆每服五錢匕用水一盞半煎至一盞去滓空心溫服日再治大便不禁厚朴豆蔻湯方肉豆蔻去殼炮半兩龍骨白朮銼炒三分厚朴去粗皮生薑汁炙銼一兩上四味銼如麻豆每服五錢匕以水一盞半入生薑三片同煎至一盞去滓空心溫服日再
