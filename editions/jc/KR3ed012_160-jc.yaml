body:
  text: 卷第一百六十產後門產後統論論曰凡產婦胞胎既辨無問是男是女或有欲男得女欲女得男者知之則不快致生他病其惡血下少者即與滑血湯惡血下多者即與和氣湯劑不得飲酒恐引惡血流散四肢而發昏冒也又不欲便睡當候氣血調定須臾立膝仰臥高枕床頭厚鋪裍褥密塞四壁無引隙風時用釅醋一器就帳內用炭火淬之以壓血運又時令人以暖手從心上捍至臍下以逐敗血三日內只食白粥間服滑血和氣之劑三日後時飲少醇酒並食軟飯旬日以後漸可滋味或以醋煮雞卵為能破血然食之日久奪人顏色一月之內慎不可出房縱步及女工之勞百日之內慎無犯房室及諸飲食忌慎之類又戒喜怒憂恚悲愁恐致疾患凡產婦一月之內寢臥常須覆衣被縱值暑月亦不得露身體尤避風冷陰濕之氣若沐浴又須出三月外縱不能依此示須六十日後方可沐浴楊氏曰凡言滿月者謂滿三月非三十日也產後血運論曰產後血下或多或少皆致運悶者血隨氣行血多者氣虛血少者氣逆故也其候目旋轉精神昏憒甚者沉默不知人治法虛弱者宜調氣而益血氣逆者宜調氣而下血則思過半矣治產後惡血少氣逆頭目旋運眼花心悶頭重不舉當歸湯方當歸洗切微炒芎藭桃仁去皮尖雙仁炒大黃略炮銼桂去粗皮芍藥牡丹皮各半兩上七味粗搗篩分作三劑每劑用水五盞生薑五片棗五枚擘同煎取三盞去滓時服一盞放溫服治產後惡血下多氣虛頭目旋運沉沉默默不省人事調氣益血陳橘皮湯方陳橘皮去白炒白朮切炒人參甘草黃耆酸石榴皮洗切熟乾地黃各半兩上七味粗搗篩分作三劑每劑用水五盞生薑五片棗五枚擘同煎至三盞去滓時服一盞稍熱服治產後敗血不盡衝心迷悶旋運不語當歸湯方當歸切炒半兩芎藭芍藥桂去粗皮生乾地黃微炒各一分牛膝去苗酒浸切焙獨活去蘆頭劉寄奴各半兩上八味粗搗篩每服三錢匕水一盞入生薑五片煎至七分去滓溫服不拘時候治產後敗血不下上衝心悶腹痛玳瑁散方玳瑁鎊三分蒲黃琥珀別研如粉好墨牡丹去心各半兩赤龍鱗燒灰即鯉魚皮也芎藭延胡索當歸微炙各三分上九味搗羅為散每服二錢匕用暖生薑酒調下淡醋湯亦得不拘時服治產後血運悶絕唇口青色不省覺者宜先用生雞子清一枚打勻灌入口即定卻服荷葉湯方荷葉蒂七枚蘇枋木銼碎三分牛膝切焙去苗芍藥延胡索各半兩上五味粗搗篩每服三錢匕水酒共一盞煎至六分去滓溫服如運甚不省拗開口灌之治產後血運悶絕丹參湯方丹參去蘆頭芍藥甘草炙令赤各半兩蜜一兩生薑三合生地黃汁一盞上六味除地黃蜜生薑汁粗搗篩每服五錢匕以水一盞煎至六分去滓入地黃汁一合蜜一匙頭生薑汁半合更煎令沸溫分三服治產後惡血結聚血氣衝心運悶垂死敗醬湯方敗醬羌活去蘆頭當歸微炙切芍藥芎藭瞿麥用穗子各一兩枳殼去瓤麩炒黃桂去粗皮各三分桃仁湯浸去皮尖雙仁麩炒黃色三十枚上九味粗搗篩每服三錢匕水一盞煎至六分去滓下馬牙硝末半錢匕更煎數沸溫服空心相次再服利三二行惡血下為效治產後血上衝心運悶腹脅㽲痛不可忍惡血不下或成塊者可服活血冬瓜子湯方冬瓜子微炒別研二兩桃仁湯浸去皮尖麩炒令赤色五十枚牡丹去心二兩芒硝半兩大黃銼碎炒令熟三兩上五味粗搗篩每服三錢匕水一盞煎至六分去滓溫服早晨日晚各一如口噤拗口灌之必效治產後血運延胡索湯方延胡索芎藭各一兩牛膝去苗當歸切焙人參各一兩半生乾地黃二兩上六味粗搗篩每服三錢匕水一盞煎至七分去滓入白蜜一匕頭更煎令沸溫服相次再服治產後血運無問冷熱悉主之琥珀煎方琥珀一兩別研末生地黃汁一盞生薑汁一盞上三味先取地黃生薑汁二味相和緩火煎去一半別下無灰酒一盞又煎候如稀餳方取琥珀末入煎中熟攪置於瓷器中每空心取半匙溫酒調服治產後血運心煩悶亂恍惚如見鬼神生益母草方生益母草汁半盞如無以土瓜根汁代生地黃汁半盞生藕汁半盞雞子白三枚童子小便半盞上五味先將汁四味相和煎令沸次下雞子白攪勻分作三服治產後血下少運悶嘔逆紅藍花湯方紅藍花蘇枋木各半兩銼上二味粗搗篩每服三錢匕水一盞煎取七分去滓溫服相次再服治產後血運煩悶地黃飲方生地黃汁童子小便上二味各半盞相和煎七分溫服相次更煎服之治產後惡血上掩心如見神鬼欲死生薑飲方生薑汁生地黃汁上二味各取汁半盞相和一處煎取七分後下酒少許相和溫服之治產後血運迷悶不省人事唇口冷麵青醋雞子方釅醋生雞子上二味先以醋半盞煎數沸打破雞子一枚投於醋中熟攪令勻頓服之立效治產後血運心悶不識人言語錯亂少氣芍藥湯方芍藥一分生乾地黃焙甘草炙令赤各一兩丹參半兩上四味粗搗篩每服三錢匕水一盞生薑一分切碎同煎至七分去滓下白蜜少許再煎令沸溫服相次更服治產後血運欲絕當歸飲方當歸微酒一兩鬼箭羽二兩上二味粗搗篩每服三錢匕酒一盞煎至六分去滓溫服相次再服治產後血運不識人延胡索散方延胡劉寄奴當歸微炙各一兩上三味搗羅為散以溫酒調三錢匕服之須臾更服治產後血運絕不識人芍藥散方芍藥半兩搗末亂髮一分燒灰上二味相和研令勻每服二錢匕以熱酒調溫服之須臾再服治產後血運氣乘虛上衝心悶絕紅藍花湯方紅藍花生乾地黃焙各一兩訶黎勒皮煨黃色五枚上三味粗搗篩每服二錢匕以水酒共一盞煎至七分去滓溫服如人行三二里再服治產後血運煩悶益母草湯方益母草乾者一兩藕節乾者人參各半兩上三味粗搗篩每服二錢匕水一盞生薑三片煎至七分去滓溫服治產後血塊攻築頭目昏運桂心散方桂去粗皮薑黃各一兩上二味搗羅為散每服二錢匕以炒生薑酒調下不拘時服治血運心中煩悶兼腹痛羚羊角散方羚羊角燒灰枳實去瓤炒黃色各一兩芍藥一兩半上三味搗羅為散煎酒令溫調一錢匕空心日晚各一服童子小便及湯調下亦得治產後血運天麻湯方天麻訶黎勒炮過用皮木香各一兩蕓薹子半兩微炒上四味粗搗篩每服二錢匕水一盞煎至七分去滓溫服相次再服治產後血運及腹痛沒藥酒方沒藥半兩上一味用酒三盞將沒藥磨盡每服一盞煎沸溫服治產後血運心腹硬乍寒乍熱續斷湯方續斷三兩上一味粗搗篩每服二錢匕以水一盞煎至七分去滓溫服治產後血運心悶氣絕地黃飲方生地黃肥嫩者半斤上一味搗取自然汁每服半盞煎令沸服之未效再服治產後血運不識人狂言亂語蓮葉飲方蓮葉三個炙焦揉碎甘草炙二兩銼如麻豆大生蜜一匙生地黃汁三合蒲黃二兩湯成下上五味以前二味用水五盞煎取兩盞去滓下蜜並地黃汁再煎三五沸入蒲黃攪勻分溫五服又方上以童子小便磨黃狗膽灌之最妙治婦人產後血運九竅血出欲死者蕓薹散方蕓薹當歸銼焙一兩芍藥桂去粗皮各半兩上四味搗羅為細散每服三錢匕以酒並童子小便各半盞調灌下立差治產後血運煩悶不識人狂亂紅雪湯方紅雪三分赤馬通三塊童子小便五合生地黃汁一合上四味以小便地黃汁浸馬通絞取汁下紅雪煎令消分溫二服治產後下血過多氣虛血運衝心悶亂不知人事地黃散方生地黃散切焙白芷延胡索白膠炙燥赤芍藥桂去粗皮白朮劉寄奴龜甲醋炙丹參當歸切焙各一兩荷葉二片上一十二味搗羅為散每服三錢匕溫酒調下不拘時服治產後敗血衝心運悶及腹痛麝香散方麝香研半兩丹砂研一兩烏鴉毛臘月者燒灰研半兩墨研半梃蘇枋木銼一兩半豬胞子燒為灰五枚鯉魚鱗燒灰四兩油頭髮燒灰二兩上八味除前四味外搗羅為散每服二錢匕暖酒調下治產後血運悶亂恍惚不語方生益母草汁一合地黃汁二合童子小便一合紅藍花紫葛細銼各半兩上五味同煎五七沸去滓溫分三服又方童子小便五合地黃汁二合當歸切焙搗末半兩赤馬通七塊上四味用小便地黃汁浸馬通絞去滓調下當歸末分三服治產後血運腹痛氣喘急欲死蘇枋飲方蘇枋木末二兩荷葉炙一枚芍藥一兩半桂去粗皮一兩鱉甲去裙襴醋炙一兩半上五味銼如麻豆大以水五盞藕汁一合同煎取二盞去滓入紅雪一兩分溫二服粥食前如人行三五里再服治產後百病血運劉寄奴湯方劉寄奴甘草上二味等分銼如麻豆大每服五錢匕先以水二盞入藥煎至一盞再入酒一盞再煎至一盞去滓溫服治產後血運心煩悶紅藍花湯方紅藍花二兩紫葛一兩芍藥一兩上三味粗搗篩每服五錢匕水一盞半煎至八分去滓再入生地黃汁半合更煎六七沸溫服不拘時治產後血運惡血不行腹脹滿迷悶方赤馬通五塊童子小便酒各五合上三味和攪馬通調絞取汁熱暖分溫服之治產後惡血不下血運不識人紅藍花散方紅藍花荷葉蒂等分上二味搗羅為散每服二錢匕用生藕汁調下治產後血運悶及惡血不下牛膝散方牛膝去苗酒浸切焙當歸切焙芎藭各二兩劉寄奴一兩半芍藥桂去粗皮蒲黃紅藍花各一兩琥珀研生薑切炒乾各半兩上一十味搗羅為散每服三錢匕溫酒調下或以水一盞煎七分溫服亦得治產後血運眼花黑暗不見物黑神散方赤龍鱗炒亂髮燒灰烏賊魚骨燒灰各三分桂去粗皮乾薑炮延胡索牡丹皮芍藥訶黎勒皮芎藭各半兩當歸切焙生乾地黃焙各一兩水蛭炒一分上一十三味搗羅為散每服二錢匕炒生薑酒調下或炒生薑黑豆小便調亦得治產後血運血塊及傷折內損血瘀大黃散方羊脛炭燒赤酒淬十遍五兩巴豆去殼漿水煮黃色焙各二兩半半兩錢燒赤醋淬為粉新水淘過取細者三兩一分上四味搗研為散研令勻每服半錢匕當歸一分童子小便煎濃稍溫調下產後血運當逐血下口噤者斡開灌下候識人更一服累經生產有血積堅癖血塊及敗血風勞寒熱諸疾當下如爛肝片永無他疾墜擊內損當歸酒下一字治產後血氣運悶或身體腫滿發狂瀉痢寒熱等疾惟瀉而喘者難差黑桂散方黑豆炒熟去皮一兩肉桂去粗皮當歸酒浸切焙芍藥乾薑炮生乾地黃焙甘草炙銼蒲黃紙上炒各一兩上八味搗羅為散每服二錢匕溫酒調下日三服治產後血運方上以童子小便濃磨好墨量多少溫服又方上預浸紅藍花汁一升煎十數沸頻服之又方取極釅醋和所產血一棗大服之並噀面又方上以童子小便磨安息香服亦妙又方上以童子小便調蒲黃一兩服亦用釅醋熏面口吸氣產後語言妄亂論曰愁憂思慮則傷心心虛故邪從之新產之人內亡津液而血虛志弱使人精神昏亂語言錯謬恍惚不寧甚者變狂癲之證治宜補血益心安神定志則病自愈治產後血氣虛精神不安言語錯謬茯苓丸方白茯令去黑皮一兩半澤瀉人參各一兩桂去粗皮菖蒲各一兩半麥門冬去心焙半兩當歸切焙熟乾地黃焙各一兩遠志去心一兩一分上九味搗羅為末煉蜜丸梧桐子大每服二十丸煎人參湯下不拘時服治產後血虛受邪語言失度精神恍惚茯神湯方茯神去末一兩人參龍齒琥珀赤芍藥黃耆銼牛膝酒浸切焙各三分生乾地黃一兩半桂去粗皮半兩上九味粗搗篩每服三錢匕水一盞煎取七分去滓溫服不拘時治產後血虛狂語臥起不安妄有所見人參丸方人參茯神去木各一兩枳殼去瓤麩炒一兩半羚羊角鎊炒芎藭各一兩檳榔銼三枚桃仁湯去皮尖雙仁炒三十枚遠志去心桂去粗皮木香白芷各半兩訶黎勒皮一兩上一十二味搗羅為末煉蜜丸如梧桐子大每服二十丸煎