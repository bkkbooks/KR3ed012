body:
  text: 卷第一百四十六雜療門雜療統論論曰人之一身無尺寸之膚不愛無尺寸之膚不養食飲不可以不節起居不可以不常藥石蔬茹禽獸蟲魚有失味之和蜘蛛蜈蚣蚊虻蜂蠍有咂膚之患至於飲水涉溪穿井入塚一有不慎適中其毒有害生理雜療之方蓋不可闕今隨證編集於後云中藥毒論曰神農嘗百草一日而七十毒以辨相得相反相惡相畏至於有毒無毒各有制治然藥無毒則疾不瘳內經所謂知毒藥為真者乃用藥之要也昧者誤有服食當究其毒以制治之猶巴豆之用黃連半夏之用生薑是也解一切藥毒椿皮飲方椿白皮東柳枝並細銼各二合阿魏好者少許上三味以水三盞同煎取一盞去滓空心頓服吐出惡物即瘥吐後服蜂窠散治藥毒吐後蜂窠散方土蜂窠炒研末一兩赤小豆糯米粟米藍實四味並生用各二兩豬苓去黑皮薺銼各銼半斤馬藺乾者二兩上八味搗羅為散每服三錢匕溫水調下空心日晚服一方入豬糞炒焦治中藥毒心腹切痛不可當欲死者有救療不及者死後身黑是中毒之證解毒丸方大棗二枚去皮核巴豆三七粒去皮心膜不出油上二味共研勻只作四丸逐丸以大針穿就麻油燈上熏令黑用瓷合貯遇中毒者每服只一丸隨所中毒物汁嚥下不得嚼破一二時辰取下毒其毒即包裹所服藥下或不知所中毒物即以茶清一大盞放溫嚥下治中藥毒心膈煩悶甚者如錐刺痛宜速吐之甘草湯方甘草生用二兩白藥一兩上二味細銼以水三盞同煎至二盞去滓候冷頓服以吐出惡物為度吐了後再單煎甘草一味服尤佳治一切藥毒發不問草石始覺噁心麥門冬飲方生麥門冬去心二兩蔥白切二兩豉二兩半上三味銼如麻豆大以水七盞煎取三盞半去滓分三服如食頃再服治中藥毒心痛煩悶甘草飲方甘草生銼二兩葛粉研一兩白蜜半兩上三味以水六盞先煎甘草減半納葛粉並蜜更煎三兩沸去滓溫分三服如食頃再服解毒藥藍根飲方藍根銼一握蘆根銼一握綠豆研一分澱腳研一合上四味先將藍根蘆根以水一碗煎至七分去滓次將後二味和勻分三服或一二服利下惡物不用再服解中一切毒藥唇口麻目暗心腹如刀刺或吐出血解毒散方石綠不計多少上一味研細每服一錢匕研萊菔子汁調下立吐吐得毒出即服和氣藥調補治藥毒吐出升麻散方升麻半兩上一味為散食後及夜臥溫水調下一錢匕服半月後一切毒藥入口即便吐出宜常服解中藥毒吐血腹內如錐刺者歸魂散方白礬草茶各一兩上二味搗羅為散用水一盞半煎至八分放溫臨臥頓服明日取下惡物為效解藥毒太白散方山芋三兩上一味為散每服二錢匕新汲水調下日三服治一切毒及藥毒辨毒散方阿魏研青鹽研甘草各一兩上三味搗研為散如遇有毒物處每日空心沸湯點服一錢匕若食著毒物立便吐出解一切藥毒殭蠶散方白殭蠶直者炒黃牛膽大者一枚取汁上二味和丸如雞頭大陰乾遇中毒者洗汗襪水澄清半盞入鹽少許磨下一丸或吐或利即瘥如吐利後氣滿即服平胃散助之此藥但頭腹未裂並可治治百藥毒方甘草二兩生銼上一味以水三盞煎至一盞半去滓停冷每服半盞細細飲之未效更服解一切藥毒薺苨飲方薺苨銼碎二兩上一味以水三盞煎至一盞半停冷細細飲之解一切藥毒大豆飲方大豆一升上一味以水二升煮至一升去豆停冷細細飲之解一切藥毒麻仁飲方大麻仁五合上一味研如膏入水二盞攪令勻取汁細細飲之解巴豆毒方黃連去須一兩上一味搗為細散每服一錢匕溫湯調冷服之解半夏毒方生薑細切四兩上一味細研取自然汁和冷水旋旋飲之解躑躅毒方梔子仁四兩上一味為散冷水調下二錢匕未效再服解藜蘆毒方雄黃一兩上一味細研煎蔥汁調下一錢匕未效再服解甘遂毒方大豆不拘多少去皮上一味以水研取汁每服一盞未效再服解蜀椒毒方葵子汁桂汁豉汁各一盞上三味同和每服一盞未效再服解礬石毒方白鵝膏不拘多少上一味研細每服一匙大豆汁調下解芫花毒方防己防風去叉甘草生銼桂去粗皮各一兩上四味搗羅為散每服二錢匕冷水調下連並三服解烏頭附子天雄毒方遠志去心防風去叉各一兩上二味搗羅為散每服二錢匕大豆汁調下連進三服解莨菪毒方薺苨犀角屑甘草生銼各一兩上三味搗羅為散每服五錢匕溫湯調下解大戟毒方菖蒲一兩上一味搗羅為散每服二錢匕溫湯調下解桔梗毒方粳米二合上一味洗淨煮白淡粥食之解杏仁毒方藍實不拘多少上一味研取汁水和服之解斑蝥芫青毒方上用豬脂大豆汁服之或戎鹽汁同服解之或以藍湯煮豬脂停冷服並服之解狼毒毒方杏仁一兩去皮尖研細上一味每用一匙以藍汁調服解藥毒蠱毒等疾丹砂丸方丹砂研雄黃研附子炮裂去皮臍為末各一兩豉六十粒炒巴豆六十粒去皮心膜麩炒去油上五味細研巴豆並豉入前三味煉蜜和搗數百下丸如胡豆大瓷瓶密收每服二丸暖蜜酒下治中金石藥毒黑鉛酒方黑鉛一斤上一味以坩鐺熔作汁投酒一升如此十數回候酒至半升去鉛頓服之食毒論曰五穀五菜五畜五果以至藥石皆能養性益壽延年卻老療疾蠲邪然有損有益有利有害不可不察飲食之間可不慎哉本草論物性味有相須相得相畏相惡相得則良相須則用相畏則制其毒相惡則置而不用然則飲食有毒宜有解散除治之法也辨飲食毒法上凡飲食傾澆於地地土湧起者不可食食之皆殺人治新中雜食瘀實不消心腹堅者方白鹽二兩上一味以水二大盞同煎至一盞半分三服連並服取吐為效治因食中毒黃龍湯方上取灶底當釜直下掘取赤土搗羅為細末以冷水調隨多少服之或犀角水摩取汁飲大效又方上取赤馬溺不計多少每服飲一兩盞又方上取苦參一兩半以醇酒二升同煎一升去滓令溫飲之得吐即愈或取甘草汁藍汁飲之又方上取桑上蕈破作段著釜中以水五升煮取二升漉出澄清以慢火再煎沸經宿不食來晨空腹服三合則吐食瘕每日服三合瘥羸者減服之治食諸餅臞百物中毒方貝齒一枚生上一味含之須臾吐出所食之物即瘥方又甘草生薺苨各二兩上二味細銼以水五盞同煎取二盞停冷去滓分三服外臺秘要論曰嶺南俚人毒藥皆因食得之即覺漸不能食或五更心中滿脹並背急悶似瘴微覺即急取一片銀方寸余許含之一宿其銀變色即是著毒藥也銀色青是藍藥若黃是菌藥俚人有解療者畏人得法在外預合藥防之或名三百頭牛藥或言三百兩銀藥並是常用俚人不識本草乃妄言之其方如後未得此藥先以余藥治之且令定解毒飲方生薑甘草炙各一兩上二味各拍碎以水三盞煎取一盞半平旦空腹分二服服訖然後以別方治又方常山四兩白鹽二錢上二味以水一斗浸之一宿以月盡日浸之月一日五更用土釜中煎之勿令奴婢雞犬見煎取二升於平旦分為三服服少時即吐以銅盆盛之看色青以杖舉得五尺不斷者即是藥未盡候一日二日後更進一劑乃良又方都惏藤十二兩此藥嶺南有之土人皆識呼為三百兩銀藥甚細長其藤有高三尺者生切碎上一味以水一升酒二升同煎取二升分三服如人行十里進一服服進三服訖其藥毒逐從大小便出十日慎吃壅毒諸食不瘥更服以差為度治解腹內諸毒二藤酒方都惏藤黃藤各握取二虎口長三寸並細銼上二味以酒三大升都入小罌罐中密封用慢火圍四邊燒之令沸伺溫出之溫服常有酒色無禁忌若不獲已欲食俚人食者先取甘草一寸炙令熟嚼咽汁若食著毒藥即吐依前法治之若經含甘草而不吐者非也宜常取甘草十數截隨身帶之以自防嶺南人將生熟食物並於火上炮炙食之永無慮若席上撒藥臥著因汗入肉最難治可常自將淨席隨身及匙著甘草解毒藥行為妙食諸菜蕈菌中毒論曰朽木生蕈腐土生菌二者皆陰濕之氣蒸郁所生也既非沖和所產性必有毒若誤食之令人吐利不已心腹切痛甚者身黑而死菜亦生於陰濕食之過多或與菌蕈同食性有反惡悉能害人可不慎哉治食諸菜蕈菌中毒甘草散方甘草炙銼貝子胡粉各一兩上三味搗羅為散每服二錢匕水調下治食諸菜中毒方童子小便人乳汁各半盞上二味並和勻微煎過分溫二服連並服之治食諸菜蕈菌中毒方雞屎燒灰上一味碾為細末每服半錢匕用好豆醬半匙細研和藥溫酒調下連三服立解治食諸菜中毒方雞毛燒灰一分雞屎燒灰一分上二味細研和勻每服一錢匕用豆醬少許研酒調下三服效治食諸菜中毒方豆醬不拘多少上一味逐旋量多少食之大解菜毒治食苦瓠中毒方黍瓤銼半斤上一味用水三升煮取一升時時服之治食諸蕈並菌中毒方生薑切研細四兩豆醬四兩麻油二兩上三味和研勻碟盛甑上蒸一炊許時取出不拘時候時時食之諸毒立解治食蕈並菌中毒方上掘地作坑用新水投坑中攪之乘混濁取出以絹濾過用瓷器盛每服時打轉飲一盞至三盞當效飲酒中毒及大醉不解論曰酒者熟谷之液也其性剽悍急疾後食而入先食而出能通關節而走膚腠上古作湯液醪醴為而不用後世嗜之無節或飲過度停積不散蘊滯於胃散流諸脈熏蒸腑臟令人志亂乃至不醒有連日而無所覺知者甚則中毒而為酒疸諸熱之病也治飲酒中毒不醒方大豆三升上一味以水三升煮取二升去滓每服一盞不拘時溫服治飲酒大醉不得安臥必須使人搖動不爾恐酒毒腐傷腸胃方上以生茅根搗絞取汁每服一小盞頻服之治酒毒昏悶煩渴或醉不醒柑皮煮散方柑子皮二兩洗焙乾上一味搗羅為散每服三錢匕水一盞煎三五沸溫服或入少鹽末沸湯點未效再服治飲酒中毒方干桑椹二合上一味用酒一升浸一時久取酒旋飲之即解治酒醉不醒方菘菜子不以多少上一味每研半合以井華水一盞調服治飲酒中毒葛花散方葛花一兩上一味搗為散沸湯點一大錢匕不拘時候亦可煎服治飲酒過度不醒葛根湯方葛根細銼二兩上一味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時候治飲酒過多大醉不醒石膏湯方石膏五兩葛根銼生薑細切各三兩上三味銼如麻豆大每服五錢匕水二盞煎至一盞去滓溫服不拘時候治飲酒太過內熱煩躁言語錯謬人參湯方人參二兩芍藥栝蔞實枳實去瓤麩炒茯神去木生地黃洗切甘草炙銼葛根銼酸棗仁各一兩上九味銼如麻豆大每服三錢匕水一盞煎至七分去滓溫服不拘時候治飲酒大醉心悶腹脹吐逆喘急豆蔻湯方草豆蔻去皮三分丁香小豆人參木香高良薑檳榔銼陳橘皮湯浸去白炒各半兩上八味粗搗篩每服三錢匕以水一盞入生薑半分切煎取七分去滓不計時候溫服治飲酒過度酒毒積在腸胃或嘔吐不食渴多飲橘皮湯方陳橘皮湯浸去白焙葛根銼甘草炙銼石膏打碎各一兩上四味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治飲酒發渴又欲飲酒栝蔞湯方栝蔞根桑根白皮細銼各三兩麥門冬去心焙一兩葛根銼二兩上四味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治飲酒後酒氣襲人方干蔓荊根不拘多少蒸一次切焙乾上一味搗羅為散每服二錢匕飲酒後用新汲水調下服藥過劑論曰唯動與過疾所由生故所守不固則邪得以干之以五藥內攻使邪不勝正而已然毒藥攻邪不必過劑過則反傷正氣猶以五味致養稍過亦能為害此理之必至也治服藥過劑反傷正氣致八邪干心或三蟲變蠱或乘虛中惡或變為五淋或致子為驚癇或筋攣脈結或產婦血運或胸停客熱花光散方玳瑁屑二兩半藍實炒一兩半安息香別研丹砂別研琥珀各一兩牛黃別研人參麝香別研貫眾各半兩上九味除別研外搗羅為細末拌勻每服一錢匕溫酒調下早晚食後服小兒半錢匕日再服治因寒藥內攻大腸急痛或胸藏冷氣或為血蠱或霍亂或心脹短氣或羸瘦或腹痛不解或虛滿遺精或水腫或中惡充德丸方艾去梗炒二兩半雚菌一兩半丁息訶黎勒煨去核桑根白皮炙各一兩肉豆蔻去殼炮益智子去皮熏陸香別研麝香別研各半兩上九味除別研外搗羅為末同拌勻酒煮麵糊和丸如梧桐子大每服二十丸早晚食前溫酒下治中蠱不深久變為鬼瘧或中氣結邪或胸藏痰癖或目中血出或中惡或驚魘或八邪互變或產婦胎衣不下或致馬刀癰腫或處女不月宜真丸方女青二兩半蘭草一兩半白菟藿丹砂別研各一兩犀角鎊馬先蒿皂莢酥炙去皮子䕡茹各半兩巴豆十粒去皮心膜存油炒紫色研上九味除別研外搗羅為末煉蜜為丸如綠豆大每服七丸夜半冷茶清下治服諸藥過劑心中悶亂方上搗生葛根取汁半盞或一盞飲之或以葛根一兩細銼水二盞同煎至一盞去滓溫服亦良又方上於屋溜下作坑廣二尺深三尺以水七盞灌坑中攪揚之令沫出取沫五盞飲之未解更作又方上搗蘘取汁飲一二升良冬用根夏用莖葉又方上燒犀角灰研細每服二錢匕水調服又方上刮東壁土以水調服又方上以粳米水研取清汁五升細細飲之又方上以雞子三枚取吞之又方上取板藍根七枚細切水一盞半同煎至一盞放冷細細飲之又方上以豉汁一盞飲之又方上以黃連末一錢匕溫水調服
