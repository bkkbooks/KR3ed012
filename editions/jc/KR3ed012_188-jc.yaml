body:
  text: 卷第一百八十八食治門食治統論論曰天產動物地產植物陰陽稟貸氣味渾全飲和食德節適而無過則入於口達於脾胃入於鼻藏於心肺氣味相成神乃自生平居暇日賴以安平者兼足於此一有疾疢資以治療者十去其九全生永年豈不有餘裕哉是以別五肉五果五菜必先之五穀以夫生生不窮莫如五穀為種之美也辨為益為助為充必先之為養以夫五物所養皆欲其充實之美也非特如此精順五氣以為靈若食氣相惡則為傷精形受五味以成體若食味不調則為損形陰勝陽病陽勝陰病陰陽和調人乃平康故曰安身之本必資於食不知食宜不足以存生又曰食有成敗百姓日用而不知苟明此道則安腑臟資血氣悅顏爽志平痾去疾夫豈淺淺耶孫思邈謂醫者先曉病源知其所犯以食治之食療不愈然後命藥又以藥性剛烈猶兵之猛曝信斯言也今對病藥劑悉已條具茲復別敘食治蓋先食後藥食為民天之謂也食治諸風治中風狂邪驚走心神恍惚言語失志者葛粉飯方葛根搗取粉四兩粱粟米飯半升上二味以漿水浸飯漉出入葛粉拌勻於豉汁內急火煮熟著五味蔥白食之日三仍勿雜食治中偏風胃悶煩躁食飲不得人參粥方人參一兩銼如粟以水四升煮至二升去滓下米粟米五合薤白切一合雞子去黃一枚上四味先用參汁煮粟米粥將熟下雞子清薤白候熟食之如食不盡可作兩次治中風半身不隨腰背反張天蓼粥方天蓼木三升細研上一味以水一石煮取二斗去滓每取汁一升納粳米一合煮粥稍熱食之一方用糯米治癩疾治中急風背強口噤舌直不得語目睛不轉煩熱苦渴或身重或身癢烏雞酒方烏雌雞一隻去毛嘴腳上一味破開去腸肚以酒五斗煮取二升去滓分溫三服相繼服盡汗出即愈不汗者用熱生薑蔥白稀粥投之蓋復取汗又雞腸肚勿去中屎緊結兩頭勿傷動煮汁服之治中風驚恐虛悸如人將捕之四肢沉重補益大棗粥方大棗七枚去核青粱粟米二合上二味以水三升半先煮棗取一升半去滓投米煮粥食之治中風羊肝食方羊肚淨治如食法一枚粳米淨淘一合蔥白七莖豉半合蜀椒去目併合口者炒出汗三十枚生薑切細一分上六味將五味藥拌勻入於羊肚內爛煮熱切如常食法淡入五味日食一枚十日止治中風心脾風熱言語謇澀精神惛憒手足不隨葛粉索餅方葛根半斤搗取粉四兩荊芥穗一握銼豉三合上三味先以水四升煮豉並荊芥六七沸去滓取汁次將葛粉和作索餅於二味汁中煮熟每空腹少入滋味食之治中風言語謇澀精神惛憒口面喎斜荊芥粥方白粟米淨淘二升半荊芥穗銼薄荷葉各一握豉三合上四味先將三味以水三升煮至二升去滓取一升半投米煮粥空腹食之一方用白粱米治中風五臟風熱言語謇澀手足不隨大腸滯壅冬麻子粥方冬麻子炒搗研半斤白粟米淘淨三合薄荷葉荊芥穗各一握上四味先以水三升煮薄荷荊芥二味去滓取汁二升以此汁研麻子仁濾過下白粟米煮粥空腹食之一方用青粱米治中風不語惡實根粥方惡實根去黑皮切一升生薑切三兩陳橘皮去白切二兩青粱米淨淘三合上四味以水五升先煮三味至二升去滓下米煮粥空腹食之治中風煩躁口乾手足不隨及皮膚熱瘡惡實葉菹方惡實葉嫩肥者一斤切酥半兩上二味先以湯煮惡實葉三五沸取出以新水淘過布絞去汁入於五味汁中略煮點酥食之治中風皂莢芽菹方皂莢嫩芽不限多少上一味先煮熟絞去汁炒過入五味與紅粳米飯隨意食之又不可過多治中風手足不隨骨節煩疼心躁口乾面目喎偏蒸烏驢皮食方烏驢皮一張撏洗如法上一味蒸令極熟條切於豉汁中著五味調和更煮過空腹食之治風熱風癇心煩驚悸竹葉粥方甜竹葉一握細切粟米二合淨淘上二味以水二升煮竹葉取一升去滓投米作粥食或作白粥即入竹瀝二合攪勻食之亦得治風癇驚癇憂恚虛悸氣逆及婦人產後中風驚邪恍惚豬心羹方豬心一枚枸杞葉半斤上二味各細切於豉汁中調和作羹食之作粥及蒸炒食之亦得治驚癇風癇神情恍惚言語錯謬歌笑無度兼五臟積冷蠱毒寒熱野狐肉方野狐肉一斤及五臟料治如食法上一味於豉汁中作羹調以五味食之或作粥臛炙蒸並得或以羊骨或鯽魚汁替豉汁亦得然不如用豉汁病人吐出清涎為效治中風四肢拘攣不得屈伸言語謇澀大腸壅滯筋骨疼痛薏苡仁粥方薏苡仁冬麻子搗碎上二味等分以水三升研麻子取汁用煮薏苡仁粥空腹食之治中風頭眩羸瘦手足無力羊頭鱠方上一味蒸令熟細切以五味汁調和作鱠食之治中風手足不隨及風痹不仁筋急熊肉羹方熊肉一斤去筋膜熟煮上一味細切如常法調和作羹或五味鹽醋任意食之食治傷寒後諸病治傷寒後水穀痢薤白麵方薤白切生薑切各半兩面一匙上三味以醋煮薤白生薑拌麵次用水同煮令熟空腹溫食治傷寒後水穀痢小豆食方小豆揀擇淨洗一升黃蠟三兩上二味以水二升旋旋下水煮令極爛隨意食之不拘食前後治傷寒後小便赤澀臍下急痛蔥粥方蔥白十四莖細切牛酥半兩上二味先以酥微炒蔥次入粳米二合用水依尋常煮粥令稍稀空心食之未瘥更作治傷寒吐下發汗後虛羸喘急咳嗽不思飲食杏仁粥方杏仁一兩湯浸去皮尖雙仁細研後入黃牛乳三合攪和濾取汁大棗去核七枚桑根白皮銼人參各一兩生薑切片半兩粳米淨洗三合上六味先用水三升煎人參棗生薑桑白皮至二升去滓澄清下米煮粥欲熟即下杏仁汁攪令勻空心任意食之治傷寒後脾胃虛冷嘔逆不下食豆蔻粥方肉豆蔻去殼一枚別作末粳米淨洗二合上二味先將粳米如常煮作稀粥熟後下肉豆蔻末攪勻頓服治傷寒後腳膝無力四肢羸劣地黃散方熟乾地黃焙地骨皮五味子各一兩桂去粗皮半兩黃耆銼一兩半上五味搗羅為散每服五錢匕用水三盞將羊腎一隻去筋膜片切同煎至一盞半先取出羊腎食之次去滓服藥空心食前治傷寒後氣虛羸劣薤白粥方薤白七莖切生薑切三錢半羊腎去脂膜細切一隻粳米淨洗二合上四味先將米用水煮作粥候欲熟下羊腎生薑薤白鹽少許攪和令勻空心食之治傷寒後虛羸勞熱背膊煩痛枸杞粥方枸杞苗四兩切蔥白七莖切薤白十四莖切豉炒一合粳米淨洗三合上五味用水三升先煎枸杞蔥薤豉等取一升半去滓下米煮作粥空心食之治傷寒後虛勞四肢煩疼口乾壯熱牛膝粥方牛膝苗葉龍葵葉生地黃切焙各一兩粳米淨洗二合上四味用水二升先煎牛膝龍葵地黃取一升去滓下米煮粥空心食之又方豬腎去脂膜細切二隻生地黃三兩研取汁粳米淨洗二合豉炒一兩上四味先將豉並豬腎用水二升煎至一升去滓下米及生地黃汁煮作粥入五味調和食之不計時候又方羊腎去脂膜細切二隻薤白七莖切黃耆銼一兩生薑切三錢半上四味先將黃耆生薑用水二升煎至一升去滓下羊腎及薤白煮作羹入五味調和食之不計時候治傷寒胃氣不和全不思食日漸虛羸參苓粥方人參銼一兩白茯苓去黑皮銼半兩粳米淨洗二合生薑切二錢上四味先將人參茯苓生薑用水三升煎至一升去滓下米煮作粥臨熟時下雞子白一枚及鹽少許攪令勻空心食之食治虛勞治虛損豬肚糜方豬肚腎各一具去脂膜人參麥門冬去心各三分地骨皮三兩上五味除肚腎外細銼用綿裹與肚腎同入水一斗煮熟棄藥取肚腎內汁中入蔥白一莖切粳米一升同用微火煮熟隨意飲汁食肉治虛勞補益人參煮羊肉法人參一兩枸杞白皮三兩肉蓯蓉酒洗去土三分上三味細銼先以水三升浸藥經再宿煎之去滓取汁一升細擘蔥白一握鹽少許同羊肉半斤豉一合於藥汁中和勻入羊肚內從五更初煮至平旦細切食之至飽如不盡續食之補藥一本作治補虛勞羊肝煎方羊肝細切一具羊脊膂肉細切一條陳曲末三兩枸杞根五兩切以水一斗二升煮取九升去滓上四味先以枸杞根汁重煎令沸次入肝肉曲末並蔥豉汁調和漸漸煎如稠糖分作三服空腹日午夜臥食之治腎勞風虛面氣黃黑鬢髮乾焦蓯蓉羊腎粥方肉蓯蓉酒洗去土一兩半羊腎一具去脂膜細切羚羊角屑二兩磁石炮赤醋淬搗末薏苡仁各三兩上五味除羊腎磁石薏苡仁外銼細分為三服每服用水三升半煎至二升去滓下磁石薏苡仁各一兩羊腎一具煮粥空心任意食之治虛勞補益食紫菊法上正月以後五月以前採黃花紫莖菊葉食之九月採花陰乾搗末酒粥羹任和服之治虛勞補益食麻子法上用麻子一升炒香研爛以熟湯調濾取汁煮羹食之作粥亦得臟腹稀溏入勿食治虛勞補益澤瀉羹方生澤瀉花葉切五兩上一味以水三升煮至一升半去滓下羊肚蔥豉等於汁中煮羹香熟任意食之老羊肚佳治虛勞補益薏苡餅方上取薏苡仁熟水淘搗羅如作米粉法以棗肉乳汁拌和作團如蒸餅大依法蒸熟隨性食之夏用粉不得留經宿恐酸壞治虛勞輕身益氣嗜食薏苡羹方上薏苡仁同羊肉作羹甘酸隨性如常法下蔥豉煮令香熟食之治腎勞虛損精氣竭絕補腎羹方羊腎一雙去脂切蔥白一分切生薑一分切上三味細切羊腎入五味蔥姜如常法作羹食之治久積虛冷陽氣衰乏蓯蓉粥方白羊肉四兩切肉蓯蓉水洗切一兩粳米三合鹿角膠炒燥三分蔥白切七莖雞子二枚上六味以五味汁中煮粥臨熟下膠雞子空腹食之治虛勞羸瘦枸杞羹方枸杞葉一斤羊腎一對切羊肉切三兩蔥白七莖切上四味以五味汁煮作臛空腹食之治諸虛羸益氣豬腎羹方豬腎一對切枸杞葉切一斤豬脊膂一條去脂膜切蔥白切十四莖上四味以五味汁作羹空腹食之食治吐血治吐血白蜜飲方白蜜二兩生地黃汁一升上二味攪勻用銀石器慢火煎至半升放令極冷再於重湯內溫過頓飲治肺損吐血紫黑色不止蠟酥煎方黃蠟先熔令銷傾入水內撥去滓酥牛乳各四兩上三味同和於銚內煎以柳木篦攪勻傾瓷合內每服一匙含化不拘時候治吐血救急大豆汁方大豆五合上一味以水煮濃汁一升去滓溫飲之不拘時候治吐血撥刀面方生地黃汁五合生薑汁一合雞子五枚取白上三味和白麵作撥刀煮熟入鹽醋蔥等調和如常食之治吐血不止心悶粳米飲方粳米泔一升上一味頓飲之立止治吐血鼻衄心煩悶飲醋方釅醋一大盞上一味煎令溫旋服三兩呷即止若悶絕不省人事令人含醋噀面數次以開眼為度眼不開者難治食治消渴治消渴羊骨湯方羊脊骨一具連喉者豉白粟米各一升薤白切一把上四味各分作兩度煮每度用水六升煮至三升去滓渴即溫汁量意飲之以瘥為度治消渴小便如常綠豆汁方綠豆二升上一味淨淘用水一斗煮爛研細澄濾取汁早晚食前各服一小盞如覺小便濃即瘥治消渴胡豆汁方胡豆二合上一味煮取汁勿用鹽隨意飲之治消渴粱米粥方青粱米半升淨淘上一味以水三升煮稀粥飲之以瘥為度一方用米半升水三升爛研取泔飲之治消渴心悶葵齏汁方葵菜一束洗上一味於湯內略煮過別煮粟米汁置葵於汁中如淹齏法候熟渴即飲汁以瘥為度治消渴地黃花粥方上取地黃花陰乾搗羅為末每用粟米兩合淨淘煮粥候熟入末三錢匕攪勻更煮令沸任意食之治消渴麥豆飲方大麥仁綠豆水浸退去皮各半升上二味淨淘於星月下各貯一鐺中用水二升慢火煮熟次取綠豆過麥仁鐺內同煮令爛並汁收在瓷瓶內渴即飲食後仍吃三兩匙麥仁綠豆尤妙治猝患消渴小便利數田螺飲方田螺活者一升上一味以水一斗煮至二升不問食前後稍稍飲汁一方用螺五升水一斗半浸之經宿渴即飲浸螺汁每日一度易水並螺治消渴口乾胸中伏熱心煩躁悶葛粉飯方葛粉四兩粟米飯半升上二味先以水浸飯濾出於葛粉中拌勻再蒸一炊飯久取出任意食之治消渴口乾心中煩熱藕蜜漿方生藕去皮節切煉蜜各半斤上二味新汲水一升半化蜜令散納藕於蜜水中浸半日許渴即量意食藕並飲汁治消渴口乾菇蔣根羹方菇蔣根生嫩者洗細切冬瓜去瓤細切各半斤上二味以水六升入鹽豉半升煎至五升去豉下前二味入醋作羹分三度食之治消渴鹽豉飲方上濃煎鹽豉汁停冷渴即飲之又方上取粟米炊飯一本作飲頻食之佳又方上取大麥仁炊飯一本作炊汁飲或煮粥食之佳小麥亦得又方上取青小豆淨淘煮粥食之和飲食亦得又方上取牛乳飲一小盞馬乳亦得治消渴口乾方鹿頭一具治如食法上一味蒸熟以醬醋食之治消渴煩躁狂言目眩方藕實去皮半斤薄荷一握蓴菜半斤上三味於豉汁中作羹入五味食之食治水病治水氣商陸粥方商陸去皮銼二兩上一味以水三升煮取一升去滓入細粟米一合煮成粥空腹食之微利為度治水腫羊肉臛方羊肉細切三兩商陸去皮切半升上二味先以水三升煮商陸至二升去滓下肉煮入蔥豉鹽等作臛如常法任意食之商陸赤者有毒慎不可用治腹大水腫利小便白雞湯方白雞一隻赤小豆一升上二味治如食法以水三升煮小豆並雞候熟食之其汁稍稍飲令盡治風水腹大臍腫腰痛不可轉動麻子粥方冬麻子搗取汁半升粳米三合上二味以麻子汁和米入薑蔥豉椒等煮作稀粥空腹食之又方郁李仁一兩半搗研以水和取汁薏苡仁二合搗研如粟米粒上二味以郁李仁汁煮薏苡仁作粥空腹食之未愈更作治猝腫滿身面皆洪大燒冬瓜方上以黃土厚泥冬瓜火燒令熟去土食之治水氣面及腹微腫未曾服藥者郁仁餅子方郁李仁湯浸去皮炒熟二兩甘遂酥炒令熟三分上二味搗羅為末用大麥面一兩藥末一兩水和作餅子濕紙裹煨熟空腹服食須臾快利即止治水氣頭面浮腫坐臥不安或嗽喘者海蛤索餅方海蛤搗研如面一兩甘遂三分為末絹羅如面用白麵和作劑郁李仁湯浸去皮微炒研一兩一分上三味以桑根白皮一兩用水二升煮如嗽即加干棗三十枚擘破同煮取一升去滓取入前件藥和如作索餅法煮令熟看冷暖得所空腹服食須臾快利小便甚多勿怪治浮腫脹滿不下食心悶方豬肝一具上一味切作胾臠著蔥豉姜椒鹽等令熟食之治浮腫脹滿不下食心悶方紫蘇子半升搗極碎以水研濾取汁粳米三合上二味以紫蘇子汁煮米作粥入蔥椒姜等空腹食之治水氣浮腫小便澀方鯉魚一頭重一斤者治如食法上一味煮令熟取汁入冬瓜蔥白作羹食之一日盡再作食治水氣浮腫腹脹小便澀方水牛蹄一隻治如食法上一味煮熟銼碎作羹空腹食之治水氣浮腫腹脹小便澀方水牛皮上一味蒸熟細切於姜醋中食之食治腳氣治風濕下注腰膝無力疼痛牛膝粥方牛膝葉切一斤粟米五合上二味於豉汁中相和煮作粥入少五味調和空腹食之恐食不盡兩度食之治腳氣浮腫脹滿不下食紫蘇子粥方紫蘇子三合上一味以水三盞研取汁去滓入淨淘粳米一合煮粥初熟時入豉椒姜各少許攪和空腹食之治腳氣頭面浮腫心腹脹滿小便澀少馬齒莧方馬齒莧淨洗四兩粳米一合醬汁半合上三味以水三盞先煮粳米次下馬齒莧俟菜熟入醬汁調和食之日宜一次治腳氣風痹不仁五緩六急食熊肉方熊肉細切半斤上一味以水四升煎豉三合七沸去滓下熊肉煮熟次下姜椒蔥白鹽等作羹空腹食之治腳氣楮皮粥方楮白皮微炙銼切三升上一味以水三升煎取一升半去滓澄清入白粳米一合淘淨煮粥空心溫食治腎虛腳弱豬腎粥方豬腎兩具治研如法粟米一合研如法蔥白切生薑切各少許上四味於豉汁中煮作粥空腹食之治腳膝痹氣大便風澀郁李仁粥方郁李仁二十一顆湯退去皮研如膏粳米三合淨揀淘蜜一合生薑汁半合上四味以水一升煮粳米令熟次入郁李仁姜蜜等空腹食之如食不盡即俟日中再食治腳氣喘悶大腸壅澀檳榔粥方白檳榔熟水磨一顆粳米淘淨一合生薑汁半合蜜一合上四味以水半升煮米令熟次下蜜並檳榔生薑等汁同煮為粥空腹食之治腳氣風冷濕痹四肢攣急腳痛不可踐地鹿蹄方鹿蹄一具淨淨洗銼碎牛膝葉銼碎半斤上二味以豉汁五升先煮鹿蹄令熟次入牛膝葉及蔥白五寸拍破兼入椒薑末各一錢同煮至二升調和旋旋食之治腳氣冬麻子粥方冬麻子三合炒令香搗令細以水一升同研取汁粳米淨淘三合上二味取麻子汁煮米為粥空腹食之治下焦風冷腰腳疼痛炙肚方豬肚一枚治如食法切為臠酒半升蔥白七莖細切上三味以五味醬等汁拌炙熟空腹食之治丈夫久積虛損陽氣衰腰腳疼痛無力蓯蓉羹方肉蓯蓉溫水洗去土細切一兩白羊腎一對去脂膜切蔥白七莖擘羊肺二兩切上四味入五味汁作羹空腹食之治腰痛腳膝無力羊髓粥方羊髓三合羊脊骨一具椎碎米五合上三味以水五升煮骨取二升去骨著米入五味煮粥熟入羊髓攪空腹食之治腳氣腫從足轉衝上入腹方豬肝一具細切水洗布拭上一味以大蒜齏食之如食不盡分為三兩頓食治腳氣衝心煩躁言語錯謬方鯉魚一枚治如食法蓴菜四兩蔥白二合上三味調和豉汁煮作羹食之
