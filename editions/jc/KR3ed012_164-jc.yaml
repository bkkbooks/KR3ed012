body:
  text: 卷第一百六十四產後咳嗽論曰內經謂五氣所病在肺為咳產後臟腑俱弱風寒乘虛而客於肺肺為華蓋位處於上其俞在背外合皮毛寒氣客之則先乘於肺肺感微寒故為咳嗽治產後咳嗽痰壅煩悶百部湯方百部款冬花紫菀去苗土貝母去心知母焙白薇杏仁去皮尖雙仁炒上七味等分粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時治產後咳嗽痰盛頭目不利皂莢丸方皂莢七挺不蚛者水浸挼取汁濾去滓丁香桂去粗皮各半兩訶黎勒炮取皮十枚杏仁八十枚去皮尖雙仁炒上五味將四味搗為細末以皂莢水就銀石銚內煎如膏即將藥和搜為丸如梧桐子大每服十丸烏梅湯下不拘時服治產後咳嗽痰壅半夏湯方半夏半兩生薑汁淹浸一宿切焙貝母去心一兩柴胡去苗一兩豬牙皂莢炙去皮甘草炙各半兩上五味粗搗篩每服三錢匕水一盞生薑五片同煎七分去滓溫服不拘時治產後咳嗽痰涎壅悶紫菀湯方紫菀去苗土一兩半貝母去心一兩白茯苓去黑皮二兩人參一兩陳橘皮去白焙半兩杏仁去皮尖雙仁炒一兩半上六味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時治產後肺氣虛寒咳嗽喘悶黃耆湯方黃耆銼桔梗炒人參白茯苓去黑皮山芋各半兩上五味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時治產後咳嗽喘急煩悶柴胡湯方柴胡去苗麻黃去根節煎掠去沫焙紫蘇莖葉陳橘皮去白焙杏仁去皮尖雙仁麩炒上五味等分粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時治產後咳嗽連聲不絕痰涎壅盛百部丸方百部焙半兩細辛去苗葉三兩貝母去心甘草炙紫菀去苗土桂去粗皮各二兩白朮麻黃去根節五味子各三兩杏仁去皮尖雙仁炒四兩上一十味搗羅為末和勻煉蜜為丸如梧桐子大每服二十丸生薑蜜湯下不拘時服治產後肺感寒咳嗽上氣咽嗌不利聲重鼻塞十味丸方當歸切焙細辛去苗葉各一兩桂去粗皮三分蜀椒去目並閉口炒汗出一分甘草炙陳橘皮去白焙各一兩吳茱萸湯洗去涎焙炒半兩人參三分桑根白皮銼二兩乾薑炮半兩上一十味搗羅為末煉蜜為丸梧桐子大每服二十丸溫酒下生薑酒亦得不拘時治產後咳嗽黃耆湯方黃耆銼二兩人參茯神去木麥門冬去心焙桂去粗皮陳橘皮去白焙當歸切焙天門冬去心焙甘草炙生乾地黃焙五味子各一兩上一十一味粗搗篩每服三錢匕水一盞半生薑二片棗一枚擘同煎一盞去滓溫服不拘時治產後傷風咳嗽壯熱憎寒白前湯方白前桑根白皮銼生乾地黃焙各一兩半白茯苓去黑皮二兩半地骨皮二兩麻黃去根節一兩半上六味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時治產後肺寒咳嗽前胡湯方前胡去蘆頭升麻桂去粗皮紫菀去苗土白茯苓去黑皮五味子麥門冬去心炒杏仁去皮尖雙仁炒各一兩半上八味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時治產後肺氣寒壅咳嗽地骨皮湯方地骨皮銼焙二兩半白朮二兩石膏碎三分桑根白皮銼二兩杏仁去皮尖雙仁炒一兩半上五味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時治產後肺感寒咳嗽不已吳茱萸湯方吳茱萸湯洗焙乾炒三分桂去粗皮一兩細辛去苗葉一兩一分當歸切焙三分杏仁去皮尖雙仁半兩炒上五味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時產後虛羸論曰血為榮凡所滋養者皆血也氣為衛凡所充盈者皆氣也產後氣血俱虛衝任不足未滿百日失於將理致血氣愈虧不能充養故肌膚瘦瘁而虛羸也治產後虛羸瘦瘁肌肉不澤氣血不充或寒或熱芍藥湯方芍藥五味子各一兩芎藭牡丹去心玄參當歸切炒人參麥門冬去心微炒白茯苓去黑心生乾地黃焙白薇去苗甘草炙各三分上一十二味粗搗篩每服三錢匕水一盞生薑三片棗二枚擘同煎至七分去滓溫服不拘時日三治產後虛羸不足臟腑虛冷肢體疼痛時或惡露臍腹刺痛當歸湯方當歸切炒一兩半芍藥吳茱萸湯淘去涎輕炒各二兩麥門冬去心焙甘草炙令赤白芷各一兩生乾地黃焙三兩桂去粗皮續斷芎藭乾薑炮裂各一兩半上一十一味粗搗篩每服三錢匕水一盞煎至七分去滓溫服食前日二夜一治產後血氣衰弱日漸虛羸補不足烏雞湯方烏雌雞一隻除翅羽腸足以水五升煎取汁三升當歸切炒人參甘草炙桂去粗皮芎藭芍藥銼黃耆麥門冬去心炒各一兩上九味除雞外粗搗篩每服三錢匕煮雞汁一盞生薑三片棗一枚擘破同煎至七分去滓溫服不拘時日三服治產後虛羸補中益血羊肉黃耆湯方羊肉一斤去脂膜細切以水八盞煮取肉汁五盞澄清白茯苓去黑皮甘草炙令赤當歸切炒桂去粗皮芍藥麥門冬去心焙各三分生乾地黃焙黃耆微炙銼各一兩上九味除羊肉外粗搗篩每服三錢匕用肉汁一盞生薑三片棗一枚擘同煎至七分去滓溫服不拘時治產後虛羸困乏肌肉不生血脈不榮人參湯方人參芎藭黃耆銼甘草炙令黃生乾地黃焙各二兩桂去粗皮一兩乾薑炮裂半兩上七味粗搗篩每服三錢匕用煮羊肉汁一盞煎七分去滓溫服不拘時治產後血氣不調日漸羸瘦肢節煩疼面無顏色當歸丸方當歸切焙生乾地黃焙澤蘭取葉各二兩防風去叉黃耆銼續斷桂去粗皮各一兩人參地骨皮芍藥各一兩半上一十味搗羅為末煉蜜為丸梧桐子大每服二十丸溫酒或米飲下不拘時治產後虛羸短氣不能飲食熟乾地黃湯方熟乾地黃焙二兩人參五味子白茯苓去黑皮鹿角膠碎搗炒令燥白朮石斛去根附子炮裂去皮臍各一兩芎藭澤蘭續斷黃耆當歸切炒桂去粗皮各三分上一十四味銼如麻豆每服三錢匕水一盞入生薑半分切棗二枚擘同煎至六分去滓不計時候溫服治產後體虛力乏四肢羸瘦不思飲食黃耆湯方黃耆熟乾地黃焙麥門冬去心焙各一兩白朮續斷人參茯神去木當歸銼炒五味子白芍藥赤石脂陳橘皮去白焙乾薑炮各半兩附子炮裂去皮臍桂去粗皮各三分甘草一分炙上一十六味銼如麻豆每服三錢匕水一盞入生薑半分棗三枚擘破同煎六分去滓溫服不計時候治產後虛羸不思飲食多臥少起續斷湯方續斷熟乾地黃焙各一兩芎藭防風去叉人參黃耆銼羌活去蘆頭五味子當歸銼炒酸棗仁微炒各半兩白茯苓去黑皮三分甘草一分炙上一十二味粗搗篩每服四錢匕水一盞入生薑半分棗二枚擘破煎至六分去滓溫服日三治產後虛羸血氣不調四肢瘦弱面色萎黃飲食減少補益澤蘭丸方澤蘭赤石脂牛膝去苗酒浸切焙人參黃耆銼各一兩熟乾地黃焙一兩半白茯苓去黑皮木香萆薢附子炮裂去皮臍續斷桂去粗皮各三分芎藭白朮乾薑炮當歸銼炒甘草炙各半兩上一十七味搗羅為末煉蜜和更杵五七百下丸如梧桐子大每於空心食前溫粥飲下三十丸日三治產後虛羸血氣不調顏色萎黃四肢無力調補氣血澤蘭丸方澤蘭葉一兩蕪荑仁炒黃色石膏火煅蜀椒去目併合口者炒出汗白芷乾薑炮裂藁本去苗土人參白朮厚朴去粗皮生薑汁炙細辛去苗葉防風去叉桂去粗皮當歸切炒芎藭甘草炙赤柏子仁炒令黃各半兩上一十七味搗羅為末煉蜜為丸梧桐子大每服三十丸溫酒或米飲下不拘時服治產後虛勞骨節疼痛寒熱往來精神恍惚夢寐驚悸芍藥湯方芍藥牡丹皮玄參芎藭白茯苓去黑皮乾薑炮甘草炙白薇各二兩麥門冬去心焙一兩半上九味粗搗篩每服五錢匕水二盞煎至一盞去滓溫服日三治產後虛羸寒熱骨節疼痛四肢無力柴胡湯方柴胡去苗附子炮裂去皮臍黃耆秦艽去苗土鱉甲醋炙去裙襴各一兩芎藭桂去粗皮牡丹皮白茯苓去黑皮知母焙當歸切焙桃仁去皮尖雙仁炒芍藥炒各三分上一十三味銼如麻豆每服三錢匕水一盞入生薑五片同煎至七分去滓溫服不拘時治產後虛羸補虛排風散血止痛羊肉湯方白羊肉切一斤黃耆銼防風去叉銼桂去粗皮銼當歸切焙芎藭各半兩銼大棗擘破七枚生薑切三分上八味先以水五升煮羊肉取三升澄去脂後納諸藥煎取一升半去滓食前分溫四服如人行三五里再服治產後虛羸寒熱往來補虛湯方附子炮裂去皮臍熟乾地黃焙當歸切焙肉蓯蓉酒浸切焙柴胡去苗黃耆各一兩芍藥炒人參白茯苓去黑皮芎藭各三分上一十味銼如麻豆每服五錢匕水一盞半入生薑五片棗三枚擘同煎至八分去滓溫服不拘時治產後諸疾愈後虛羸無力宜服澤蘭丸補益方澤蘭葉炒一兩一分黃耆細銼一兩半藁本去苗土一兩當歸銼焙一兩半白芷一兩防風去叉一兩半芍藥一兩半芎藭一兩桂去粗皮三分柏子仁一兩細辛去苗葉半兩麥門冬去心焙二兩熟乾地黃焙一兩一分甘草炙銼一兩五味子一兩石膏研如面一兩三分上一十六味搗研為細末煉蜜丸如梧桐子大空腹酒下二十丸漸加至三十丸日再服產後汗出不止論曰產後汗出不止者亡血陰虛故也蓋榮弱衛強陽加於陰氣散於表故令多汗汗不止致虛乏短氣口舌乾燥津液耗竭則變經水斷絕遇風則變痙病昏冒不知人矣治產後榮血虛損汗出日夕不止形體困怠附子湯方附子炮裂去皮臍半兩桂去粗皮二兩生乾地黃焙三兩甘草炙令黃芍藥各一兩上五味銼如麻豆每服三錢匕水一盞生薑三片棗二枚擘破煎至七分去滓溫服不計時治產後亡陰血虛汗出不止地髓湯方生乾地黃焙芍藥當歸切焙芎藭各一兩上四味粗搗篩每服三錢匕水二盞煎至一盞去滓溫服日三治產後血虛汗出不止甘草湯方甘草炙三分當歸切焙人參各一兩羊肉一斤去脂切碎水四大碗煮取汁三碗去肉澄清芎藭一兩桂去粗皮三分芍藥一兩半生乾地黃焙四兩上八味除肉外粗搗篩每服三錢匕以肉汁一盞煎至七分去滓溫服不拘時治產後虛汗不止心悸恍惚怵惕多驚茯苓湯方白茯苓去黑皮一兩半甘草炙黃一兩芍藥銼炒一兩桂去粗皮一兩當歸切炒一兩麥門冬去心焙一兩黃耆一兩半銼上七味粗搗篩每服五錢匕水一盞半入生薑半分切棗二枚擘煎至八分去滓溫服不拘時治產後汗出不止腠理虛疏粉汗牡蠣散方牡蠣一斤燒研如粉麻黃根四兩上二味搗羅麻黃根為細末同牡蠣粉拌勻粉汗孔令密妙治產後虛汗不止虛煩憒悶芍藥湯方芍藥銼炒一兩當歸切炒三分生乾地黃焙二兩黃耆銼一兩白茯苓去黑皮一兩石斛去根銼一兩上六味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日三治產後榮血虛損汗出不止黃耆湯方黃耆銼白朮銼炒牡蠣熬為粉白茯苓去黑皮防風去叉生乾地黃焙麥門冬去心焙各一兩上七味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治產後虛汗不止煩倦少力二聖散方麻黃根二兩故敗扇燒取灰秤半兩上二味搗羅為散每服二錢匕煎人參湯調下不拘時治產後虛汗不止麻黃根湯方麻黃根二兩牡蠣燒赤一兩半黃耆銼一兩人參一兩龍骨一兩枸杞根皮二兩上六味粗搗篩每服三錢匕水一盞半棗二枚擘破同煎至一盞去滓溫服不計時候治產後虛汗不止煩熱體痛渴燥引飲人參散方人參芍藥銼甘草炙龍骨各一兩上四味搗羅為散每服二錢匕麝香溫酒調服日三治產後虛熱汗出不止石斛湯方石斛去根附子炮裂去皮臍切白朮銼炒秦艽去苗土桂去粗皮各一兩上五味銼如麻豆每服三錢匕水一盞小麥五十粒同煎至七分去滓溫服不拘時產後蓐勞論曰產蓐之後食飲起居失於常度使血氣不得其養若血虛則發熱氣虛則發寒血氣俱虛則寒熱更作日漸羸瘦故為蓐勞又產後惡露不盡亦令致此則時寒時熱腰腹刺痛甚