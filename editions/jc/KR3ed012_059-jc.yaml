body:
  text: 卷第五十九虛熱渴論曰人因勞傷腑臟或大病後未復營血不足陰虛於內則生內熱熱則津液燥少故渴而引飲飲不能多多則腹滿不消氣虛不勝於水故也治臟氣不足內燥發渴腎瀝湯方生乾地黃洗銼焙澤瀉遠志去心桂去粗皮當歸切焙龍骨甘草炙銼五味子赤茯苓去皮芎藭人參黃芩去黑心麥門冬去心焙各一兩上一十三味粗搗篩每用羊腎一隻去筋膜切開先用水一盞半煮羊腎取一盞去腎入藥末三錢匕再煎七分去滓溫服不拘時治氣虛燥渴引飲黃耆湯方黃耆細銼栝蔞根銼麥門冬去心焙赤茯苓去黑皮人參甘草黃連去須知母銼焙生乾地黃焙菟絲子酒浸一宿焙乾肉蓯蓉酒浸一宿去皴皮銼焙石膏煅赤各一兩上一十二味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時治虛渴飲水過多身體浮滿人參湯方人參黃耆細銼各二兩旋覆花桑根白皮銼各一兩紫蘇葉犀角鎊屑各半兩赤茯苓去黑皮陳橘皮湯去白焙五味子去梗澤瀉各一兩半上一十味粗搗篩每服三錢匕水一盞半煎至一盞去滓溫服不拘時治臟虛乾燥發渴飲水麥門冬丸方麥門冬去心焙菟絲子酒浸一宿焙乾各一兩半土瓜根山茱萸鹿茸去毛酥炙黃連去須龍骨各一兩牛膝去苗酒浸一宿焙狗脊去毛銼茯神去木人參牡蠣熬各三分上一十二味搗羅為細末煉蜜丸如梧桐子大每服三十丸溫水下不拘時服治虛渴飲水不已心腹脹滿木香湯方木香枳殼去瓤麩炒芍藥檳榔生銼各半兩桑根白皮銼炒黃耆細銼草豆蔻去皮枇杷葉拭去毛炙黃連去須各一兩桂去粗皮三分人參一兩半上一十一味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時治虛燥渴不已黃耆丸方黃耆細銼五味子各二兩烏梅取肉炒麥門冬去心焙各一兩乾薑炮半兩茯神去木一兩半附子炮裂去皮臍大者二枚醋石榴皮銼生乾地黃焙澤瀉各半兩上一十味搗羅為細末煉蜜丸如梧桐子大每服三十丸漿水下不拘時服治虛渴飲水無節人參湯方人參二兩五味子大腹皮各三分赤茯苓去黑皮桑根白皮銼炒黃耆細銼各一兩半芍藥黃芩去黑心葛根銼各一兩枳殼去瓤麩炒三分上一十味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治臟虛舌本燥渴飲不已地黃丸方熟乾地黃銼焙山茱萸山芋澤瀉牡丹皮白茯苓去黑皮附子炮裂去皮臍各一兩桂去粗皮一分上八味搗羅為細末煉蜜丸梧桐子大每服三十丸溫水下不拘時服治虛渴不止薏苡仁湯方薏苡仁五味子各一兩半覆盆子生乾地黃銼焙枸杞子各二兩紫蘇莖葉黃耆細銼木通各一兩白茯苓去黑皮三兩上九味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時候治虛渴煩躁不利鹿茸丸方鹿茸去毛酥炙黃耆細銼人參土瓜根山茱萸杜仲去粗皮切炒桑螵蛸炙各一兩栝蔞根菟絲子酒浸一宿別搗肉蓯蓉酒浸一宿去皴皮各一兩一分雞膍胵十枚炙乾上十一味搗羅為細末煉蜜丸如梧桐子大每服三十丸酒下不拘時服溫水亦得暴渴論曰暴渴緣熱甚腠理開汗大泄而津液暴燥故渴而引飲小便利者不能為害若三焦不和心肺壅熱胃中乾燥渴而小便不利者須防變飲證不可不察治心脾壅滯暴渴引飲茯苓湯方赤茯苓去黑皮澤瀉白朮黃連去須桂去粗皮甘草炙銼各一兩大黃生用半兩上七味粗搗篩每服三錢匕水一盞半入小麥半匙煎至一盞去滓溫服不拘時治內熱暴渴不止枳實湯方枳實去瓤麩炒茯神去木葛根銼石膏各二兩半上四味粗搗篩每服三錢匕水一盞半煎至一盞去滓溫服不拘時治心脾壅盛暴渴飲水黃連散方黃連去須葛根銼各二兩大黃銼炒半兩枇杷葉拭去毛炙一兩麥門冬去心焙一兩半上五味搗羅為散每服二錢匕溫水調下不拘時治心脾虛熱暴渴不已地骨皮湯方地骨皮栝蔞根黃連去須麥門冬去心焙黃芩去黑心各一兩茯神去木遠志去心各三分甘草炙銼半兩石膏碎二兩上九味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治暴渴煩躁飲之麥門冬湯方麥門冬去心焙四兩知母焙三兩凝水石一兩半青竹茹揉如雞子大兩塊碎切上四味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治暴渴咽燥口乾引飲秦艽湯方秦艽去苗土二兩甘草炙半兩上二味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治暴渴地骨皮湯方地骨皮栝蔞根各一兩半黃連去須土瓜根麥門冬去心焙車前子各一兩知母焙半兩上七味粗搗篩每服三錢匕水一盞半入生地黃半分切煎至八分去滓溫服不拘時治虛躁暴渴烏梅散方烏梅肉焙麥門冬去心焙各一兩半生乾地黃焙三兩甘草炙一兩上四味搗羅為散每服二錢匕溫熱水調下不拘時治暴渴黃耆湯方黃耆銼栝蔞根各一兩赤茯苓去黑皮甘草炙各半兩麥門冬去心焙一兩半上五味粗搗篩每服三錢匕水一盞半煎至八分去滓溫服不拘時治暴渴飲水不止頭面虛浮桑根皮湯方桑根白皮銼麥門冬去心焙石膏碎各二兩赤茯苓去黑皮黃芩去黑心栝蔞根各一兩半梔子仁半兩土瓜根一兩上八味粗搗篩每服三錢匕水一盞半煎至八分去滓溫服不拘時治暴渴煩熱蘆根湯方蘆根銼麥門冬去心焙栝蔞根地骨皮各一兩白茅根銼石膏碎各一兩黃芩去黑心人參各三分甘草炙半兩上九味粗搗篩每服五錢匕水一盞半生薑一棗大拍碎小麥半合竹葉二七片煎至八分去滓食後溫服治暴渴心煩口舌乾燥柴胡湯方柴胡去苗烏梅肉炒各二兩甘草炙一兩麥門冬去心焙一兩半上四味粗搗篩每服四錢匕水一盞半煎至八分去滓溫服不拘時胃熱渴論曰胃氣實則生熱熱則土氣內燥津液不通咽膈煩滿故渴而引飲內經謂脾氣熱則胃干而渴蓋藏真濡於脾脾合為胃行其津液者也脾既受熱津液不濡於胃胃干則渴不止也治胃乾渴不止飲水枸杞根湯方枸杞根栝蔞根麥門冬去心生黃連去須各一兩半土瓜根乾者知母車前子去土各一兩上七味銼如麻豆每服五錢匕水一盞半入生地黃半分切同煎至八分去滓溫服日三治胃熱渴豬肚丸方豬肚一枚淨洗去脂膜滓穢黃連去須五兩栝蔞根四兩茯神去木麥門冬去心焙各二兩知母銼三兩白粱米淨洗五兩上七味先搗羅下六味為末內豬肚中線縫口安甑中蒸蓋甑無令泄氣候極爛乘熱細切肚並藥木臼內搗勻可丸即丸若硬即入煉蜜同搗丸梧桐子大每服三十丸煎粟米飲下不拘時候日再服漸加至四十丸治脾胃有熱煩渴不止黃連羊乳丸方黃連去須別搗四兩生栝蔞根去皮半斤研生布絞汁生地黃半斤淨洗研生布絞汁羯羊乳兩合上四味取地黃栝蔞汁羊乳和黃連末丸如綠豆大每服三十丸煎小麥湯下治胃熱乾渴甘草湯方甘草炙銼栝蔞根各二兩麥門冬去心焙二分半夏湯洗去滑七遍曝乾麩炒二兩半上四味粗搗篩先以水二盞淘小麥半合煎至一盞半去麥下藥末五錢匕大棗二枚劈破生地黃半錢生薑一棗大拍破再煎至八分去滓溫服日再治胃中乾渴栝蔞根湯方栝蔞根三兩知母焙二兩甘草炙銼人參各一兩上四味粗搗篩每服三錢匕水一盞煎至七分去滓下白蜜少許攪勻不拘時候服日可數服治胃渴引飲泄熱茯神湯方茯神去木二兩栝蔞根麥門冬去心焙各五兩知母銼葳蕤各四兩上五味粗搗篩先以水三盞淘小麥一匙淡竹葉五十片洗切同煮至一盞半去滓下藥末四錢匕棗二枚劈破生地黃半分同煎至一盞去滓溫服日三治胃乾渴黃耆湯方黃耆去苗銼茯神去木栝蔞根甘草炙麥門冬去心焙各一兩半生乾地黃焙二兩半上六味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日三久渴論曰消渴之病本於腎氣不足下焦虛熱若病久不愈者邪熱蘊積營衛澀滯精血衰微病多傳變宜知慎忌凡忌有三一飲酒二房室三鹹食及面又消渴病經百日以上者當忌灸刺若灸刺則瘡上漏水變成癰疽矣治久消渴飲水不絕腎瀝湯方遠志去心人參澤瀉熟乾地黃焙桂去粗皮當歸切焙赤茯苓去黑皮龍骨黃芩去黑心芎藭各二兩五味子三分麥門冬去心焙二兩半上一十二味粗搗篩每服五錢匕水三盞先煮羊腎一具取二盞去腎入藥並大棗三枚劈破生薑半分切同煎取一盞半去滓分溫二服不拘時候治久消渴麥門冬丸方麥門冬去心焙赤茯苓去黑皮黃連去須黃芩去黑心石膏煅葳蕤人參升麻龍膽栝蔞根枳殼去瓤麩炒生薑切焙枸杞根皮洗切各一兩上一十三味搗羅為末煉蜜和丸梧桐子大每服三十丸粟米飲下不拘時候治久消渴不止升麻丸方升麻黃芩去黑心麥門冬去心焙各五兩生乾地黃焙三兩栝蔞根七兩苦參八兩人參三兩黃連去須黃柏去粗皮銼各五兩上九味搗羅為末以生牛乳汁和眾手速丸梧桐子大曝乾每服三十丸粟米飲下不拘時服漸加至五十丸治久消渴內燥引飲不已黃連散方黃連去須白石脂研各一兩半鉛丹研一兩栝蔞根三兩上四味搗研羅為細散每服二錢匕漿水調下日三服治腎虛燥久消渴不止澤瀉丸方澤瀉肉蓯蓉酒浸切焙五味子禹餘糧煅醋淬七遍巴戟天去心當歸切焙地骨皮洗焙各一兩磁石煅醋淬二七遍人參赤石脂韭子白龍骨甘草炙銼牡丹皮各一兩一分生乾地黃焙二兩半上一十五味搗研羅為末煉蜜丸如梧桐子大每服三十丸以牛乳汁下不拘時候治消渴經年飲水不止白石英丸方白石英別研芒硝別研凝水石別研各二兩赤茯苓去黑皮人參地骨皮澤瀉苦參甘草炙銼麥門冬去心焙各三兩上一十味除別研外搗羅為末合研勻煉蜜丸如梧桐子大每服三十丸溫水下不拘時服治久消渴飲水不絕葵根湯方經霜冬葵根皮不拘多少細切焙上一味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治久消渴經年飲水無度水銀丸方水銀鉛醋碎各半兩柳絮礬三分先細研次入水銀並鉛三味和研勻以瓷合盛外用紙筋泥固濟安灰火內養半日取出候冷再研細豉炒鉛丹研白殭蠶炒黃連去須各半兩上七味將四味為末與前三味再研勻用糯米糊丸如梧桐子大每服二十丸溫水下空心日午夜臥服治久消渴飲水不絕苦參丸方苦參二兩黃連去須栝蔞根知母焙麥門冬去心焙人參牡蠣煅黃耆銼生乾地黃焙各一兩上九味搗羅為末以牛乳汁和眾手速丸如梧桐子大每服三十丸漿水下不拘時候渴利論曰消渴小便利多隨飲而出故名渴利此蓋少服乳石房室過度致腎虛精耗熱氣獨留腎為之燥故渴而引飲腎虛不能制水則飲隨小便利也病久津液耗竭經絡痞澀營衛不通熱氣留滯必變癰膿也治消渴日夜飲水不止飲下小便即利麥門冬湯方麥門冬去心焙黃連去須冬瓜乾者各二兩上三味粗搗篩每服三錢匕水一盞煎至七分去滓溫服治渴利虛熱引飲不止消熱止渴石膏湯方石膏四兩地骨皮三兩栝蔞根二兩半麥門冬去心焙三兩茯神去木知母焙葳蕤各二兩上七味粗搗篩每服四錢匕水二盞竹葉二十片生地黃半分切生薑三片棗二枚劈破同煎至一盞去滓食後溫服日三治渴利日飲水數斗小便頻數栝蔞散方栝蔞根黃連去須防己鉛丹炒紫色研各一兩上四味搗羅三味為散與鉛丹研勻每服二錢匕酒調食後服日三服藥後即強飲水須臾自惡水必不欲飲治渴利患十年者服之即瘥千金散方澤瀉栝蔞根甘草炙各一兩一分白石脂研赤石脂研鉛丹炒研各一分胡粉炒研三分石膏碎研一兩上八味搗前三味為散更與研者和勻每服一錢匕煎菝葜湯調下不拘時日三治渴利有熱小便澀難欲下之前胡湯