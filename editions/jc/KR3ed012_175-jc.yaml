body:
  text: 卷第一百七十五小兒宿食不消論曰小兒腸胃嫩弱飲食易傷若將養失宜乳哺不節致脾胃不能傳化水穀之氣故令乳食宿夕停滯不消其候腹滿壯熱眠寐不安診其三部脈俱沉者乳不消也治小兒宿食不消體熱多眠嘔噦氣上消穀丸方陳曲炒木香人參乾薑炮麝香研甘草炙銼枳殼麩炒去瓤上七味各等分搗研為細末煉蜜為丸如黃米大每服二十丸溫米飲下治小兒宿食不消心腹脹滿嘔吐壯熱木香化滯丸方木香京三稜炮青橘皮去白各一兩補骨脂二兩炒黑牽牛四兩炒令黑羅取面二兩上五味搗羅為末滴水和丸如黃米大每服二十丸溫水下不計時候治小兒宿食不消腹痛驚啼牛黃丸方牛黃研杏仁去皮尖雙仁麩炒研各一分巴豆去皮心出油盡研真珠末研各一兩附子炮裂去皮臍半兩上五味各搗研和勻煉蜜丸如麻子大三四歲兒空心溫熟水下兩丸日晚再服更量兒大小加減治小兒驚熱腹脹宿食不消積年瘦弱代赭丸方代赭搗研一兩丹砂別研麝香別研犀角鎊各一分大黃銼炒牛黃研各三分當歸切焙鱉甲酥炙去裙襴巴豆去皮心出盡油別研枳殼去瓤麩炒各半兩上一十味搗羅九味為散入巴豆再同研勻煉蜜和搗一二百杵丸如麻子大二三歲兒空腹熟水下二丸四五歲兒以上量大小加之治小兒不生肌膚腹大食不消化芍藥丸方芍藥大黃銼炒各一兩一分桂去粗皮赤茯苓去黑皮各三分柴胡去苗一兩上五味搗羅為末煉蜜和搗三二百杵丸如麻子大五六歲兒空腹米飲下三丸日晚再服量兒大小加減治小兒宿食不消心腹脹滿止痰逆利胸膈進乳食犀角丸方犀角鎊青橘皮去白焙京三稜炮銼木香各半兩巴豆去心膜出油盡取霜抄半錢皂莢三挺不蚛大者銼炭火內燒煙絕為度淨水內蘸去火毒黑牽牛炒二兩上七味搗六味為細末與巴豆研勻麵糊丸如麻子大每服七丸至十丸食後生薑橘皮湯下量兒大小加減治小兒乳食不消紫霜丸方代赭二兩搗末杏仁去皮尖雙仁炒研一錢一字巴豆七枚去皮心膜出油盡研上三味再研勻細水浸炊餅和丸如黃米大每服三丸溫米飲下量兒大小加減治小兒宿滯不消止吐逆利關膈溫脾胃進乳食定心腹痛小丁香丸方丁香四十九枚肉豆蔻大者一枚去殼五靈脂不夾石者二錢木香一錢半巴豆去皮膜研出盡油為霜抄一字上五味將前四味搗為細末後入巴豆霜令勻滴水丸如芥子大每服量兒大小加減五七丸至十丸煎桃葉湯下不拘時治小兒乳食不化腹急氣逆順氣丸方巴豆十粒去皮分作二十片胡椒二十粒丁香二十粒青橘皮二十枚全者湯浸去白每枚入巴豆半粒胡椒丁香各一粒用線纏之上四味用米醋一升煮俟醋盡取出焙乾為末爛飯丸如粟米大每服二丸米飲下更量兒大小加減治小兒胃虛宿食不消人參湯方人參赤茯苓去黑皮白朮半夏各半兩湯浸過生薑汁炒乾甘草炙一分上五味粗搗篩每服二錢匕水一盞生薑二片煎至五分去滓溫服不計時候日三量兒大小加減治小兒脾胃氣弱乳食遲化宿昔成積久而不消香樸散方厚朴去粗皮生薑汁炙銼一兩木香麥糵炒陳曲炒青橘皮去白焙陳橘皮去白焙各一分上六味搗羅為細散每服半錢匕湯調下小兒腹脹論曰小兒腑臟怯弱氣血未定風冷客之搏於正氣升降不調故令兒心腹脹滿遇胃氣虛則食不消腸虛則為注泄矣治小兒腹虛脹脾氣不調理中茯苓湯方赤茯苓去黑皮犀角鎊赤石脂黃連去須龍骨厚朴去粗皮生薑汁炙陳橘皮湯去白焙人參乾薑炮各一兩桂去粗皮甘草炙各二兩上一十一味粗搗篩五六歲兒每服一錢匕水一盞煎至四分去滓溫服量兒大小加減一方去龍骨加麥門冬一兩治小兒腹脹虛熱不能食白朮湯方白朮人參甘草炙枳殼去瓤麩炒當歸切焙各一兩牡蠣熬半兩上六味粗搗篩一二歲兒每服一錢匕水七分煎至四分去滓分溫二服更量兒大小加減治小兒胸膈痞塞心腹脹滿木香丸方木香二兩黑牽牛二十四兩炒香別搗取末一十二兩補骨脂炒蓽澄茄檳榔酸粟米飯裹濕紙裹煨熟去飯各四兩上五味搗四味為末與牽牛末和勻漸滴清水和丸如綠豆大每服三丸或五丸食後茶湯熟水任下更量兒加減治小兒心腹脹滿下利乾嘔不止人參湯方人參陳橘皮去白焙各一分甘草炙半兩上三味粗搗篩五六歲兒每服一錢匕水七分生薑二片煎至四分去滓溫服日再更量兒大小加減治小兒腹脹通氣散方青橘皮湯去白焙木香檳榔各一分上三味細銼用巴豆三十粒同炒令赤色為度不用巴豆只搗三味為細散每服半錢匕煎紫蘇木瓜湯調下更量兒大小加減治小兒腹脹胡椒丸方胡椒蠍梢炒甘遂炒上三味等分搗羅為末用燒飯丸如黍米大每服二丸陳米飲下乳食前服並理脾積氣更量兒大小加減治小兒心腹氣脹喘粗不下食款氣湯方牽牛子炒熟一兩馬兜鈴一兩木香半兩上三味粗搗篩每服一錢匕水七分煎至四分去滓溫服更量兒大小加減不拘時候治小兒腹脹消氣丸方續隨子去殼研胡椒各五十粒丁香二十一枚木香一錢蠍梢十四枚炒阿魏一字研上六味搗羅四味為末入研藥合研勻燒粟米飯丸如麻子大淡醋湯下五丸至七丸治小兒胃虛腹脹豆蔻散方肉豆蔻一枚去殼青橘皮湯去白焙半分木香一分陳粟米一合上四味將陳粟米同巴豆三七枚炒巴豆每枚刺作竅子候色焦去巴豆不用將粟米並余藥為細散每服半錢匕生薑湯下更量兒大小加減治小兒發歇寒熱心腹脹滿調中丸方人參赤茯苓去黑皮各一兩桂去粗皮三分柴胡去苗大黃銼炒各二兩枳殼麩炒去瓤木香各半兩上七味細搗羅為末煉蜜丸綠豆大一二歲每服二丸至三丸溫熟水下更量大小加減治小兒胃虛腹脹硬橘紅丸方陳橘皮湯去白焙半兩胡椒黑牽牛各一百粒巴豆三十粒去皮通前三味同炒令焦去巴豆不用木香一分上五味除巴豆外為細末用蔥白汁丸綠豆大每服三丸至五丸萊菔子湯下乳食後臨臥服更量兒大小加減治小兒腹脹硬款氣丸方巴豆十五枚燈上燒成灰細研丁香二錢木香一分麝香半錢上四味為細末麵糊丸粟米大每服三丸煎萊菔子湯下乳食後服更量兒大小加減治小兒腹脹手足漸細精神昏冒不欲乳食縮沙散方縮砂仁木香丁香牽牛炒一半熟一半生用各一兩膩粉一分上五味搗羅為散每服一字匕酒調下治小兒氣脹胸膈腹滿丁香湯方丁香甘草炙人參各一分上三味粗搗篩周歲內兒每服半錢匕水半盞煎至三分去滓溫服日三三四歲兒漸加至一錢匕治小兒腹脹冷氣結塊疼痛黃連飲方黃連去須炒一兩人參黃芩去黑心當歸炙銼桂去粗皮高良薑各半兩上六味細銼如麻豆大每服一錢匕以水七分煎取四分去滓溫服治小兒腹脹欲死方上取半夏不拘多少湯洗去滑炮熟切酒服如米粒大五塊一日三服又方上搗薤根以豬脂為膏煎服之治小兒哺露論曰哺露之病與傷飽丁奚之病本同皆本於乳哺不調傷於脾胃致氣血減損不榮肌肉故柴闢羸露謂之哺露甚則腑臟之氣不宜熻熻苦熱是其候也治小兒哺露化腸胃食滯疳氣腹滿發熱破積丸方木香一兩青橘皮湯浸去白焙一兩桂去粗皮一兩吳茱萸湯洗焙乾炒三兩硇砂醋熬成霜研末抄一錢匕巴豆霜抄半錢匕上六味搗羅前四味為末與硇砂巴豆霜同拌研勻醋煮麵糊為丸如綠豆大每服三丸加至五丸早晚食後臨寢服大便溏為度量兒大小虛實以意加減治小兒哺露傷飽煩熱羸瘦雞骨丸方雞骨煮熟黃雌雞左右肋骨一兩炙黃赤芍藥半兩川大黃半兩銼微炒紫菀半兩洗去苗土赤茯苓半兩細辛一分黃芩一分桂心一分柴胡半兩去苗上九味搗羅為末煉蜜丸如綠豆大每服溫水下五丸早晚各一服量兒大小加減治小兒哺露失衣當風水浴腹大時痢寒熱如瘧不欲飲食縱食難消化四肢羸瘦人參黃耆丸方人參去蘆頭黃耆銼麥門冬去心焙半夏湯洗七遍去滑川大黃銼碎微炒白茯苓柴胡去苗黃芩以上各三分訶黎勒一兩煨用皮甘草半兩炙微赤銼鱉甲一兩塗醋炙令黃去裙襴芎藭半兩上一十二味搗羅為細末煉蜜為丸麻子大每服三丸溫粥飲下五歲服五丸量兒大小加減治小兒寒熱久不解仍不能食飲若食不消哺露堅痞腹大下痢不止芍藥丸方芍藥三分桂去粗皮半兩柴胡去苗大黃銼炒各一兩赤茯苓去黑皮鱉甲去裙襴醋炙半兩上六味搗羅為末煉蜜丸如麻子大一歲以上每服三丸米飲下早晨日午夜臥各一治小兒哺露脅下痞堅腹滿虛脹手足煩熱往來無時大黃丸方大黃銼炒二兩乾薑炮半兩人參二兩丹參去蘆頭沙參苦參防風去叉各一兩桂去粗皮半兩玄參一兩半䗪蟲炙焦八枚附子炮裂去臍皮半兩白朮赤茯苓去黑皮各一兩葶藶紙上炒半兩杏仁去皮尖雙仁麩炒研蜀椒去目並閉口者炒出汗各一分巴豆十枚去皮膜研出油盡上一十七味搗羅十五味為末與巴豆杏仁同研煉蜜丸如麻子大每服二丸至三丸米飲下量兒大小加減治小兒哺露腹脹身熱下痢不止鱉甲丸方鱉甲去裙襴醋炙常山銼肉蓯蓉酒浸切焙各一分上三味搗羅為末煉蜜丸如麻子大一二歲每服三丸三五歲五丸米飲下空心午後各一服更量兒大小加減治小兒哺露腹脹體瘦訶黎勒丸方訶黎勒皮三分肉豆蔻去殼一枚青黛研麝香研蘆薈研熊膽研丹砂研各一分上七味搗研為末和勻酒煮粳米飯丸如黍米大每服三丸粥飲下日二更量兒大小加減治小兒哺露腹脹體瘦代赭丸方代赭研赤石脂丹砂研各一分巴豆十粒去皮心研紙壓去油盡杏仁二七粒針穿燈上燎作聲為度上五味先別研細再合研勻爛飯丸如粟米大每服一丸乳汁或粥飲下更量兒大小加減治小兒哺露腹脹體瘦檳榔丸方檳榔銼丹砂研阿魏麵裹煨面熟為度去面代赭搗研乳香研木香五靈脂麝香研肉豆蔻去殼各一分蟾頭一枚炙焦巴豆七粒去皮心膜紙壓去油盡研上一十一味搗研為末麵糊丸如黍米大每服二丸溫生薑湯下更量兒大小加減小兒丁奚腹大論曰小兒病腹大頸小黃瘦者名曰丁奚此由哺食過度脾胃氣弱不能消化內成痼滯故令津液減損不能榮其氣血豐其肌體久而不瘥變谷堅之病治小兒骨中微熱腹內不調食不為肌或苦寒熱丁奚腹大雞骨丸方雄雞骨一具炙黃赤茯苓去黑皮石膏搗末研芍藥大黃銼炒紫菀去苗土陳橘皮湯浸去白焙礬石燒令汁盡研細辛去苗葉附子炮裂去皮臍各半兩黃芩去黑心桂去粗皮葶藶子炒各三分上一十三味搗羅為末煉蜜丸如麻子大每服五丸米飲下早晨日午夜臥各一服更量大小加減治小兒新生客忤所中驚癇發熱哺乳不消中風掣縮蹙口吐舌猝注面青目上搖腹滿丁奚羸瘦脛交三歲不能行麝香紫霜丸方麝香研牛黃研雄黃研丹砂研各一兩黃連去須桂去粗皮烏賊魚骨各半兩特生礜石煉成者一分赤足蜈蚣半枚炙附子炮裂去皮臍一兩巴豆三十枚去皮心絹袋貯灰汁煮半日別搗如泥上一十一味並搗研為末煉蜜和成劑密器盛勿令泄氣每用旋丸兒生十日至三十日服如黍米大二丸乳汁下四十日至百日服如麻子大三丸米飲下一歲至三歲以意增之兒雖小而宿實甚者亦當增丸數治小兒丁奚堅癖黃瘦發脫代赭丸方代赭碎大黃銼炒丹砂研各一兩鱉甲醋炙黃去裙襴三分芍藥木香杏仁湯浸去皮尖炒黃別搗如膏知母焙巴豆去皮心研紙裹出油七遍各一兩上九味搗研為末煉蜜為丸百日兒如綠豆大一丸二百日兒二丸二歲兒三丸米飲下以溏利為度治小兒丁奚腹