body:
  text: 卷第七十四泄痢門泄痢統論論曰脾與胃合俱象土外榮肌肉腐熟水穀風寒暑濕襲於外則留連肌腠傳於脾胃食飲不節害於內則腸胃乃傷不化糟粕皆能為病所得之源不一故立名多端且久風入中則為飧泄濕勝則為濡寫寒中則為洞泄暑勝則為毒痢而又或冷或熱或赤或白或色雜或腸垢或滯下或休息或疳或蠱之類種種不同悉由將攝失宜飲食不慎致腸胃不調邪氣交攻施治之方則有宜調補宜攻化宜收斂宜滲泄各隨所宜以用之水瀉論曰內經謂諸厥固泄皆屬於下暴注下迫皆屬於熱蓋為冷熱不調氣不相濟也脾胃怯弱水穀不分濕飲留滯水走腸間禁固不能故令人腹脹下利有如注水之狀謂之注泄世名水瀉治水瀉不止木香散方青木香黃連去須炒各一兩訶黎勒皮微炒三分龍骨半兩厚朴去粗皮生薑汁炙令紫銼三分上五味搗羅為散每服三錢匕空心以粥飲調下日午再服以瘥為度小兒以意加減服之治一切水瀉及冷痢厚朴散方厚朴去粗皮生薑汁炙令紫銼一兩乾薑半生半炮裂一兩陳橘皮湯浸去白焙三分白朮一兩甘草半生半炙半兩上五味搗羅為散每服三錢匕空心米飲調下如霍亂吐瀉新汲水調下日晚再服治水瀉腸鳴臍腹撮痛代赭丸方代赭煅赤乾薑炮龍骨各一兩附子炮裂去皮臍三分上四味搗羅為末研軟飯和丸如梧桐子大每服三十丸空心米飲下日午再服治水瀉無度腸鳴腹痛肉豆蔻散方肉豆蔻去殼為末一兩生薑汁二合白麵二兩上三味將薑汁和麵作餅子裹豆蔻末煨令黃熟研為細散每服二錢匕空心米飲調下日午再服治水瀉不止硇砂丸方硇砂研石硫黃研各一分鉛丹研半兩巴豆去皮心出油盡一十四枚上四味先將巴豆霜研細入諸藥同研細用糯米飯為丸如小豆粒大水瀉新汲水下一丸赤白痢煎乾姜甘草湯放冷下一丸吐瀉煎生薑木瓜湯放冷下一丸白痢煎乾薑湯放冷下一丸不拘時候治暴注水瀉日夜無度斗門散方橡斗子去刺訶黎勒煨去核黃連去須上三味等分搗羅為散每服一錢匕米飲調下食前治水瀉不止木香丸方木香一錢草烏頭生去皮臍半兩肉豆蔻一枚大者去殼胡粉半兩研巴豆大者七枚去皮心膜出油盡研上五味搗羅為細末合研勻糯米軟飯和丸如黍米大每服三丸小兒一丸並用冷萊菔湯下治水瀉不止黑神丸方巴豆一枚去皮心膜不出油杏仁七枚去雙仁皮尖炒鐺墨一錢上三味同研極細以糯米粥和丸如秫米大每服一丸冷水下立止甚者再服一丸治水瀉不止立效丸方鉛丹炒半錢草烏頭一枚炮裂去臍皮巴豆三粒去皮心膜出油盡研上三味先搗烏頭為末與二味同研極勻以麵糊和丸如綠豆大每服一丸煎陳粟米甘草烏梅湯放溫冷下治水瀉杏仁丸方杏仁湯浸去雙仁皮尖七粒砒霜末鐺墨巴豆霜各一錢上四味同研棗肉和丸如粟米大臨臥新汲水下一丸治水瀉白痢小腹疼痛玉霜丸方砒霜研細如粉二兩黃蠟一兩上二味以瓷碗盛重湯煮熔開以東南柳枝二七莖各長七寸粗細如箸每用兩莖攪藥又轉一頭攪候兩頭並黑黃色乃已又取兩莖依前攪七次了將出藥趁軟作條子收遇病旋於火上烘軟丸如梧桐子大小兒綠豆大空心新汲水下一丸治水瀉腸鳴針頭丸方巴豆一枚去皮膜杏仁一枚去皮尖二味皆針扎火上燎令存性上二味同細研約三百轉入大豆末一字再研一百轉麵糊和丸如針頭大每服一丸新汲水下治水瀉並赤白痢如聖丸方烏頭端正大者炮裂去皮臍綠豆上二味等分搗羅為末新水和丸如綠豆大以丹砂為衣每服五丸白痢煎乾薑湯下赤痢煎甘草湯下赤白痢煎乾姜甘草湯下水瀉用新汲水下小兒一兩丸不計時候治水瀉方上用青州干棗十枚去核入莨菪子填滿以麻纏卻用炭火燒令煙盡研令細每服一錢半匕煎陳粟米稀粥飲調下治水瀉腸滑氣虛久冷如聖丸方乾薑炮高良薑胡椒蜀椒去目並閉口炒出汗上四味等分搗羅為末醋煮麵糊和丸如梧桐子大每服三十丸早晨空心食前粥飲下治水瀉不止傷冷虛極黃蠟丸方硫黃一兩上一味研細先熔黃蠟入硫黃末打勻丸如梧桐子大每服五丸新汲水下治水瀉訶黎勒丸方上取訶黎勒不拘多少以麵裹灰火內炮令赤黃剝去面取訶黎勒皮搗羅為末軟飯和丸如梧桐子大每服二十丸米飲下空腹食前治暴水瀉不止厚朴散方厚朴去粗皮生薑汁炙銼訶黎勒皮各一兩甘草炙銼黃連去須微炒肉豆蔻去殼白朮銼炒乾薑炮赤茯苓去黑皮各三分上八味搗羅為散每服二錢匕溫米飲調下治脾胃虛冷腸滑水瀉如休息痢不止木香丸方木香白堊火煅肉豆蔻仁丁香各半兩乾薑炮訶黎勒煨取皮龍骨各一兩黃連去須三兩上八味搗羅為末煉蜜和丸如梧桐子大每日空心米飲下三十丸日晚再服治水瀉蕪荑丸方蕪荑炒黃連去須炒吳茱荑湯洗焙乾炒各三兩乾薑炮一兩枳殼去瓤麩炒半兩縮砂蜜二兩上六味搗羅為末煮漿水飯和丸如梧桐子大每服二十丸溫米飲下治水瀉腸滑不禁訶黎勒丸方訶黎勒二兩以麵裹煨去核取皮並面為末乾薑炮龍骨赤石脂各一兩上四味搗羅為末以稀麵糊丸如梧桐子大每服空心以米飲下二十丸治水瀉吐噦遍身疼痛訶黎勒丸方訶稱勒煨去核鹿茸酥炙去毛桑根白皮銼地榆赤石脂天雄炮裂去皮臍龍骨各一兩半白芷黃連去須桂去粗皮厚朴去粗皮塗生薑汁炙白茅根當歸切焙各一兩黃芩去黑心乾薑炮裂各半兩肉豆蔻去殼四枚上一十六味搗羅為末爛飯為丸如梧桐子大每服三十丸溫米飲下治水瀉腹痛日夜不止正氣散方縮砂蜜去皮炒附子炮裂去皮臍赤石脂肉豆蔻去殼龍骨石榴皮焙甘草炙銼人參地榆白朮吳茱萸湯浸焙乾炒乾薑炮各一兩上一十二味搗羅為散每服三錢匕煮粳米飲調下不拘時以止為度治水瀉米穀不化晝夜不止白堊丸方白堊一兩火煅過乾薑炮一兩楮葉二兩生細研上三味搗研為末麵糊和丸如綠豆大空心米飲下二十丸又方取黃荊葉不限多少陰乾搗羅為散每服以米飲調下三錢匕又方取羊蹄根曬乾刮去皮搗羅為散每服以米飲調下三錢匕又方取熟艾半斤慢火炒令熱布裹坐之冷再炒坐濡瀉論曰內經曰濕勝則濡瀉甲乙經曰寒客下焦傳為濡瀉夫脾為五臟之至陰其性惡寒濕今寒濕之氣內客於脾則不能埤助胃氣腐熟水穀致清濁不分水入腸間虛莫能制故洞泄如水隨氣而下謂之濡瀉治腸胃受濕濡瀉不止肉豆蔻散方肉豆蔻去殼炮黃連去須炒訶黎勒炮去核各三分甘草炙銼白朮乾薑炮赤茯苓去黑皮各半兩厚朴去粗皮生薑汁炙一兩上八味搗羅為散每服二錢匕空心食前米飲調下日三治脾胃傷濕濡瀉不止豆蔻散方肉豆蔻去殼炮五枚甘草炙銼一兩厚朴去粗皮生薑汁炙一兩半上三味搗羅為散每服二錢匕米飲或湯調下食前溫服治腸胃寒濕濡瀉腹內㽲刺疼痛當歸散方當歸切焙木香乾薑炮肉豆蔻去殼炮各半兩訶黎勒炮去核黃連去須炒各三分上六味搗羅為散先用水四盞入甘草生薑各一分黑豆一合並半生半炒同煎至二盞去滓分作二服每服用調散三錢匕空心日午服治濡瀉水痢久不止桂附丸方桂去粗皮附子炮裂去皮臍乾薑炮赤石脂各一兩上四味搗羅為末煉蜜丸如梧桐子大每服二十丸空心食前米飲下日三治腸胃寒濕濡瀉無度嗜臥不食豬苓丸方豬苓去黑皮半兩肉豆蔻去殼炮二枚黃柏去粗皮炙一分上三味搗羅為末米飲和丸如綠豆大每服十丸食前熟水下治寒濕傷脾濡瀉訶黎勒散方訶黎勒炮去核吳茱萸湯浸焙炒木香蕪荑炒各半兩黃連去須炒一兩上五味搗羅為細散每服二錢匕空腹陳米飲調服日再治腸胃受濕濡瀉無度腹痛飲食不化白豆蔻湯方白豆蔻去皮訶黎勒炮去核陳橘皮湯浸去白焙炒乾薑炮各半兩厚朴去粗皮生薑汁炙三分上五味粗搗篩每服五錢匕切薤白三寸水一盞半煎至七分去滓空心溫服日再治濡瀉暴下不止枳殼湯方枳殼去瓤麩炒三分黃連去須炒厚朴去粗皮生薑汁炙各一兩甘草炙銼阿膠炙燥各半兩上五味粗搗篩每服五錢匕水一盞半煎至一盞去滓空心溫服日再治腸胃寒濕濡瀉不止及冷痢色白食不消化附子湯方附子炮裂去皮臍甘草炙銼阿膠炙燥各半兩黃連去須炒一兩上四味銼如麻豆每服五錢匕水一盞半煎至一盞去滓空心溫服日再治脾胃受濕濡瀉不止健脾白朮丸方白朮乾薑炮各三分厚朴去粗皮生薑汁炙一兩人參三分上四味搗羅為末煉蜜丸如梧桐子大每服三十丸空心米飲下日再治寒濕濡瀉久不瘥附子丸方附子炮裂去皮臍一兩甘草炙銼二兩上二味搗羅為末煉蜜丸如梧桐子大每服二十丸空心生薑湯下日再治傷濕濡瀉不定厚朴湯方厚朴去粗皮生薑汁炙一兩半黃連去須炒一兩上二味粗搗篩每服五錢匕水一盞半大棗二枚劈破煎至一盞去滓空心溫服日再如腹痛加當歸三分治濡瀉不止或冷痢無度附子丸方附子炮裂去皮臍高良薑各一兩甘草炙銼一分上三味搗羅為末陳米煮糊丸如梧桐子大每服二十丸米飲下不拘時服治濡瀉裡急後重數至圊樗根散方樗根皮銼一兩枳殼去瓤麩炒半兩甘草炙銼一分上三味搗羅為散每服二錢匕粥飲調下食前一服止治胃虛泄瀉老人冷瀉健脾湯方烏頭炮裂去皮臍三分厚朴去粗皮生薑汁炙甘草炙銼乾薑炮各一分上四味銼如麻豆每服三錢匕水一盞生薑二片煎至七分去滓熱服並二服止治久患脾泄瀉姜連散方生薑四兩黃連去須一兩上二味㕮咀如麻豆一處慢火炒令姜赤色去姜取黃連為細散每服二錢匕空腹臘茶清調下不過二服瘥飧泄論曰內經曰清氣在下則生飧泄又曰久風為飧泄夫脾胃土也其氣衝和以化為事今清濁交錯風邪之氣得以干胃故沖氣不能化而食物完出夕食謂之飧以食之難化者尤在於夕故食不化而泄出則謂之飧泄此俗所謂水穀痢也治風冷入中飧泄不止脈虛而細日夜數行口乾腹痛白朮湯方白朮厚朴去粗皮生薑汁炙當歸切焙龍骨各一兩熟艾炒半兩上五味粗搗篩每服四錢匕水一盞入生薑二片同煎至七分去滓空心日晚溫服治腸胃受風飧泄無度或下黃水腹脅痛悶地榆湯方地榆厚朴去粗皮生薑汁炙當歸切焙各三分艾葉炒吳茱萸湯浸焙乾炒高良薑各半兩上六味粗搗篩每服四錢匕水一盞半煎至八分去滓空心日午溫服治腸胃風冷飧泄注下腹痛不止乾薑丸方乾薑炮厚朴去粗皮生薑汁炙當歸切焙各三分阿膠炙燥龍骨各一兩上五味搗羅為末煉蜜丸如梧桐子大每服三十丸空心棗湯下日午再服治飧泄米穀完出茯苓湯方赤茯苓去黑皮厚朴去黑皮生薑汁炙黃連去須炒各一兩乾薑炮半兩上四味粗搗篩每服四錢匕以水一盞半煎至八分去滓空心日午溫服治飧泄水穀不化及諸色痢茱萸湯方吳茱萸湯浸焙乾炒黃連去須炒等分上二味粗搗篩每服四錢匕以水一盞半煎至八分去滓空心溫服未止再服治飧泄色白食不消化乾薑丸方乾薑炮黃連去須炒各一兩半上二味搗羅為末先以酒一升微火煎候可丸即丸如梧桐子大空心米飲下三十丸日午再服治飧泄氣痢腹脹滿不下食蓽茇散方蓽茇半兩肉豆蔻去殼半生半煨一兩乾薑炮半兩訶黎勒半生半炮去核一兩白朮三分甘草半生半炙銼半兩木香半生半炒一兩上七味搗羅為散每服二錢匕空心米飲調下日晚再服治脾胃氣虛飧泄不止飲食不消雷鳴腹內㽲痛桂心丸方桂去粗皮赤茯苓去黑皮赤石脂各三分黃連