化飲食無味肌肉瘦瘁心多嗔恚及婦人產後虛冷下痢一切水瀉冷痢木香散方木香補骨脂各一兩高良薑縮砂仁厚朴去粗皮生薑汁炙各三分陳橘皮去白焙桂去粗皮白朮各半兩胡椒吳茱萸湯洗三五遍各一分赤芍藥半兩肉豆蔻四枚去殼檳榔銼一枚上一十三味搗羅為散每服三錢匕用不經水豬肝四兩去筋膜批為薄片重重滲藥置一鼎中入漿水一碗醋半合蓋復煮肝熟入鹽一錢蔥白三莖細切生薑彈子許拍破同意水欲盡空心為一服冷食之初服微瀉不妨此是逐下冷氣少時自止渴即飲粥湯治洞泄大腸切痛腸鳴食不化木香訶黎勒丸方木香半生半炒共一兩訶黎勒煨去核三分白朮一兩桂去粗皮蕪荑炒各一兩半附子炮裂去皮臍厚朴去粗皮生薑汁炙焦各二兩高良薑炒肉豆銼去殼各一兩甘草炙銼半兩乾薑炮一分上一十一味搗羅為末用陳曲末煮糊為丸如梧桐子大每服三十丸煨生薑鹽湯下治因傷水飲後變成暴泄白芷黃連湯方白芷一兩半黃連去須一兩地榆一兩半當歸銼焙一兩附子炮裂去皮臍一兩半木香一兩赤石脂一兩半黃芩去黑心半兩芎藭一兩半訶黎勒皮煨一兩肉豆蔻一枚煨去殼白朮一兩桂去粗皮一兩上一十三味銼如麻豆每服五錢匕水一盞半入生薑五片煎至八分去滓空心溫服日三治大腸洞泄水穀入即注下烏梅丸方烏梅肉炒四兩附子炮裂去皮臍一兩乾薑炮二兩黃連去須炒五兩肉豆蔻去殼五枚上五味搗羅為末煉蜜和丸如梧桐子大每服三十丸米飲下治洞泄水穀注下黃連阿膠湯方黃連去須阿膠炙燥烏梅肉炒各二兩山梔子仁三十枚黃蘗去粗皮銼一兩上五味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服空心食前日二治五臟泄痢訶黎勒丸方訶黎勒半生半煨並去核肉豆蔻去殼木香各三分乾薑炮甘草炙銼各半兩上五味搗羅為末煮醋糊和丸如梧桐子大每服二十丸至三十丸米飲下治洞泄寒中水穀不化黃連當歸湯方黃連去須當歸切焙甘草炙銼各二兩酸石榴皮銼炒四兩上四味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服空心食前鶩溏論曰脾氣衰則鶩溏蓋陰中之至陰脾也為倉廩之官若脾胃氣虛弱為風冷所乘則陰氣盛陰氣盛則藏寒糟粕不化故大便色黑狀如鶩溏也又大腸有寒亦曰鶩溏治脾氣不足鶩溏青黑茱萸丸方吳茱萸湯浸焙炒乾薑炮赤石脂陳曲炒當歸切焙各三分厚朴去粗皮生薑汁炙銼一兩上六味搗羅為末煉蜜丸如梧桐子大每服三十丸空心食前米飲下日三治大便青黑狀如鶩溏龍骨散方龍骨黃連去須炒各一兩白礬熬令汁枯阿膠炙燥乾薑炮白石脂研當歸切焙胡粉炒赤石脂研牡蠣煅各三分研甘草炙銼附子炮裂去皮臍各半兩上一十二味搗研為散每服三錢匕食前米飲調下日再治大便滑泄色如鶩溏龍骨黃連湯方龍骨碎一兩黃連去須炒三分當歸切焙乾薑炮甘草炙銼各半兩上五味粗搗篩每服五錢匕水一盞半煎至八分去滓食前溫服日再治鶩溏所下瘀黑木香丸方木香烏頭生去皮臍當歸切焙各三分烏梅肉炒乾半兩上四味搗羅為末用粟米一合醋一升半慢火煎調和丸如梧桐子大每服十丸至十五丸食前米飲下日三治大便鶩溏滑利不止附子散方附子炮裂去皮臍三分乾薑炮龍骨各一兩上三味搗羅為散每服三錢匕食前煎烏梅湯調下日再治腸胃久寒大便鶩溏蓽茇丸方蓽茇附子炮裂去皮臍乾薑炮厚朴去粗皮生薑汁炙肉豆蔻仁各一兩龍骨訶黎勒皮縮砂仁各半兩上八味搗羅為末麵糊和丸如梧桐子大每服二十丸食前米飲下日再
