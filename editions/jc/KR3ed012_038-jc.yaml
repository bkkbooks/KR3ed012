body:
  text: 卷第三十八霍亂門霍亂統論論曰三焦者水穀之道路氣之所終始也因風冷或飲食傷胃致中焦不和則正氣不守而邪得以干揮霍之間便致撩亂故名霍亂蓋清濁相干於腸胃之間心痛則吐腹痛則利甚者吐利俱發其不吐不利俗謂之乾霍亂亦以冷氣曝爭於中而不得出也然脈必代者以氣不足也脈大能言者為可治若其脈微氣劣而不欲言者為難治霍亂吐利論曰霍亂吐利者以三焦氣不升降而清濁相干於腸胃間若先心痛則吐先腹痛則利心腹並痛則吐利俱發治此者當以中焦為本中焦既和則清濁自分而吐利止矣治霍亂吐利不止藿香湯方藿香去梗半兩白芷縮砂去皮各一兩丁香一分上四味粗搗篩每服二錢匕水一中盞煎至六分去滓熱呷不計時候治霍亂吐利不止正胃湯方枇杷葉拭去毛炙桂去粗皮厚朴去粗皮薑汁炙陳橘皮去白焙各半兩上四味搗羅為粗末每服二錢匕水一盞入生薑三片煎至六分去滓熱服不計時候治霍亂吐利白朮湯方白朮三兩甘草炙附子炮裂去皮臍人參各一兩桂去粗皮當歸切焙陳橘皮去白焙各二兩上七味銼如麻豆每服五錢匕煮小麥汁一盞半入竹葉一握生薑半分拍碎煎至八分去滓溫服日三治霍亂吐利陳橘皮湯方陳橘皮去白焙二兩甘草炙一兩白朮三兩上三味粗搗篩每服五錢匕水一盞半入竹葉十片生薑半分小麥汁半盞煎至八分去滓溫服日三治霍亂大豆飲方大豆香薷蘆根枇杷葉拭去毛炙竹茹前胡去蘆頭陳橘皮去白焙上七味等分㕮咀每服五錢匕以水一盞半入生薑一分切煎取一盞去滓溫服治霍亂吐利不止理中湯方人參白朮各三兩甘草炙乾薑炮各二兩上四味粗搗篩每服五錢匕以水一盞半煎取一盞去滓溫服若胸滿腹痛吐下者加當歸二兩切焙厚朴二兩去粗皮薑汁炙透治霍亂吐下虛冷厥逆腹痛乾嘔四逆湯方乾薑炮甘草炙人參各二兩附子一枚炮裂去皮臍上四味銼如麻豆每服五錢匕以水一盞半煎取一盞去滓溫服一方下甚加龍骨二兩腹痛不止加當歸二兩切焙治霍亂吐瀉不止蒲飲方菖蒲切焙高良薑青橘皮去白焙各一兩白朮甘草炙各半兩上五味搗為粗末每服三錢匕以水一盞煎十數沸傾出放溫頓服治冷熱不調霍亂吐瀉香薷丸方香薷一兩半白扁豆炒木香各一兩丁香皮二兩藿香去梗零陵香各半兩益智仁一分上七味搗羅為末麵糊和丸如梧桐子大每服二十丸食前溫紫蘇湯下治霍亂吐下人參湯方人參乾薑炮陳橘皮去白焙桂去粗皮各一兩甘草炙半兩上五味粗搗篩每服三錢匕水二盞入棗三枚劈煎取一盞去滓熱服連進三服治霍亂不止丁香散方丁香木香肉豆蔻去殼各一兩上三味搗羅為細散每服二錢匕白粥飲調下熱服治霍亂吐逆腹痛或便利數多冷熱不調訶黎勒丸方訶黎勒皮微炒陳橘皮去白焙各一兩乾生薑切三分甘草炙半兩上四味搗羅為末煉蜜丸如梧桐子大每服二十丸煎生薑米飲下不計時候治飲食過多當風履濕薄衣露坐或夜臥失復霍亂吐利人參丸方人參高良薑炮各一兩上二味搗羅為末煉蜜和丸如彈子大每服一丸溫米飲嚼下不計時候治霍亂吐利不止正元湯方枇杷葉拭去毛炙桂去粗皮厚朴去粗皮薑汁炙陳橘皮去白焙各半兩上四味粗搗篩每服三錢匕水一盞入生薑三片煎至六分去滓熱服不以時候治霍亂吐瀉四肢厥冷香薷飲方香薷去梗二兩半草烏頭浸切去皮臍曝乾二兩入鹽三兩同炒烏頭黃褐色去鹽不用藿香去梗焙二兩黃連去須以吳茱萸二兩同炒黃連去茱萸不用取二兩上四味搗羅為粗末每服三錢匕以水二盞酒半盞同煎至一盞去滓用新汲水沉冷頓服相次四肢暖吐瀉定病輕每服一二錢匕治霍亂吐逆不定手足厥冷麵青諸藥不效青金散方硫黃一兩熔作汁水銀一兩隨硫黃汁結作沙子上二味研為散每服二錢匕冷木瓜湯調下冷米飲亦得治霍亂吐瀉冷熱不調和氣煮散方胡椒綠豆各一兩人參一分上三味生搗羅為散每服三錢匕水一盞同煎五六沸去滓熱服治食飲過傷霍亂吐瀉丁香丸方丁香白朮縮砂仁木香肉豆蔻去皮乾薑炮桂去粗皮各三分陳橘皮去白焙一兩枳殼去瓤麩炒紅豆蔻去皮各半兩上一十味搗羅為末煉蜜和丸如梧桐子大每服二十丸煎生薑木瓜湯嚼下治霍亂吐利心腹疼痛氣逆手足冷乾薑湯方乾薑炮甘草炙桂去粗皮附子炮裂去皮臍草豆蔻去皮肉豆蔻去殼麵裹煨木香高良薑炒乾木瓜各半兩上九味銼如麻豆每服三錢匕水一盞煎至七分去滓溫服霍亂嘔吐不止論曰霍亂嘔吐不止者胃氣逆故也胃氣逆則氣上而不下故嘔吐不止也若上下升降陰陽和平而吐自止矣治霍亂吐逆不定手足厥冷面青不樂青金散方硫黃一兩盞子內熔作汁水銀一兩二味結作沙子上二味為細散每服一錢匕冷木瓜湯調下冷米飲亦得治霍亂定嘔逆止心腹刺痛進飲食化痰益氣人參藿香湯方藿香葉厚朴去粗皮薑汁炙各二兩人參白茯苓去黑皮乾薑炮青橘皮湯浸去白焙枇杷葉拭去毛半夏為末生薑汁和作餅子曝乾各一兩甘草炙三分丁香半兩草豆蔻去皮六枚上一十一味粗搗篩每服三錢匕水一盞生薑三片煎至七分去滓熱服不拘時治霍亂心腹痛嘔吐不止吳茱萸湯方吳茱萸湯浸焙炒乾薑炮各一兩甘草炙一兩半上三味粗搗篩每服二錢匕水一盞煎至七分去滓溫服不拘時治霍亂吐逆不止煩悶香薷湯方香薷經霜後收陰乾一斤厚朴去粗皮薑汁炙扁豆各半斤上三味粗搗篩每服五錢匕水一盞酒半盞同煎至一盞去滓放冷並二服未效再服治下虛陰陽錯逆霍亂吐逆粥食不下正氣丹方硫黃盞內熔成汁三分半夏為末薑汁作餅曝乾藿香葉各一兩水銀入硫黃汁內結沙子一分附子炮裂去皮臍半兩上五味為細末酒煮麵糊丸如梧桐子大以丹砂為衣每服二十丸至三十丸米飲下不拘時治霍亂嘔吐不止冰壺湯方高良薑生銼上一味粗搗篩每服三錢匕水一盞棗一枚去核煎至五分去滓用水沉冷頓服立定治冷熱氣不調霍亂吐逆不定腹脅脹滿高良薑湯方高良薑桂去粗皮人參各一兩甘草炙半兩上四味粗搗篩每服三錢匕水一盞棗一枚去核煎至七分去滓溫服不拘時治霍亂嘔吐不思飲食厚朴湯方厚朴去粗皮薑汁炙二兩人參白朮各一兩半半夏為末生薑汁調作餅曝乾陳橘皮湯浸去白焙各一兩上五味粗搗篩每服三錢匕水一盞生薑三片棗一枚去核煎至七分去滓溫服不拘時治一切霍亂嘔逆手足厥冷返魂湯方鹽一分生薑洗切一兩上二味用童子小便一碗半煎取一碗去滓分溫三服治脾臟有積霍亂吐逆乾薑散方乾薑炮訶黎勒去核白礬燒汁盡丁香甘草炙各半兩上五味為細散每服一錢匕飯飲調下不拘時治霍亂下焦熱氣逆上嘔吐不止名曰走哺人參湯方人參梔子仁葳蕤黃芩去黑心知母各一兩白茯苓去黑皮白朮陳橘皮湯浸去白焙各一兩半石膏碎一兩半上九味粗搗篩每服三錢匕生薑三片水一盞煎至七分去滓溫服日三治霍亂走哺嘔吐不止或噎塞心熱滿悶香豉湯方豉炒二兩生乾地黃洗切焙一兩白朮二兩甘草炙一兩石膏碎三兩白茯苓皮一兩半上六味粗搗篩每服五錢匕水一盞半竹葉十片蔥白二寸煎至一盞去滓溫服日三治霍亂走哺嘔吐不止噎塞滿悶芒硝湯方芒硝別研生乾地黃洗切焙白朮甘草炙各一兩豉炒白茯苓去黑皮各一兩半石膏碎二兩上七味粗搗篩每服五錢匕水一盞半竹葉十片蔥白二寸煎至一盞去滓溫服日三治霍亂吐嘔四汁煎方生藕汁生葛汁木瓜汁各一合生薑汁半合上四味銀器中慢火熬如餳每服兩匙頭許含化徐徐咽津治嘔吐煩悶及霍亂雞子湯方人參一兩上一味粗搗篩用水三盞煎至一盞半去滓重煎令沸投入雞子白一枚打轉掠去沫頓服治冷熱不調霍亂吐利宿食不消理中丸方人參白朮高良薑各八兩乾薑炮桂去粗皮各六兩上五味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心米飲下日再治霍亂吐逆開胃和氣藿香散方藿香葉焙一兩訶黎勒皮焙十枚人參丁香各半兩糯米三百粒石蓮心二百枚甘草炙銼一分上七味搗羅為散每服二錢匕煨和皮生薑一塊棗兩枚同煎濃湯調下食前空心治脾胃虛冷嘔逆霍亂瀉痢脹滿訶黎勒丸方訶黎勒皮五倍子黃連去須鍾乳粉白礬熬令汁枯各四兩縮砂蜜去皮厚朴去粗皮生薑汁炙當歸切焙酸石榴皮銼炒胡椒樗根皮銼各二兩半乾薑炮一兩半乾木瓜銼烏梅肉炒橡實微炒各五兩肉豆蔻煨去殼五枚陳橘皮湯浸去白焙二兩上一十七味搗羅為末醋並艾葉汁煮麵糊和丸梧桐子大每服五十丸棗湯下空心食前日二服治冷熱不調霍亂吐利宿食不消五味理中丸方甘草炙銼人參桂去粗皮乾薑炮高良薑上五味各等分搗羅為末煉蜜和丸如梧桐子大每服三十丸溫酒下空心食前日再服霍亂四逆論曰四肢為諸陽之本陽氣之所通也霍亂吐利陽氣曝厥故四肢逆冷而脈微欲絕也古法治四逆專於通脈蓋營衛流行氣道升降則手足自和逆者順矣治霍亂多寒手足厥冷脈絕四逆茱萸湯方吳茱萸洗炒四兩當歸切焙桂去粗皮芍藥各三兩細辛去苗葉木通銼甘草炙各二兩上七味粗搗篩每服五錢匕生薑一棗大拍碎棗三枚劈破水一盞酒半盞煎至八分去滓溫服治霍亂嘔逆四肢厥冷煩悶流汗飲食不化心腹虛滿拘急短氣理中湯方麥門冬去心焙六兩人參白朮各五兩乾薑炮六兩甘草炙五兩附子炮裂去皮臍白茯苓去黑皮各三兩上七味銼如麻豆每服三錢匕水一盞煎至五分去滓溫服治霍亂四逆吐下煩嘔轉筋肉冷汗出體痹氣急垂死音聲不出脈不通者附子湯方附子炮裂去皮臍人參厚朴去粗皮生薑汁塗炙乾白茯苓去黑皮甘草炙陳橘皮去白炒當歸切焙葛根銼桂去粗皮乾薑炮各一兩上一十味銼如麻豆每服五錢匕水一盞半煎至八分去滓溫服隨藥吐者更服勿止治霍亂脈微欲絕或惡寒四肢拘急手足厥逆或吐利已定汗出而厥四逆不解通脈四逆湯方甘草炙二兩附子炮裂去皮臍二枚乾薑炮三兩上三味銼如麻豆每服五錢匕水一盞半煎至八分去滓溫服脈出即愈面色赤者加蔥白二莖同煎腹痛去蔥白加芍藥二兩嘔加生薑一分切同煎咽痛去芍藥加桔梗並人參二兩以吐利止為度治霍亂吐利手足逆冷龍骨湯方龍骨白者碎附子炮裂去皮臍各一兩乾薑炮甘草炙人參各一兩半上五味銼如麻豆每服三錢匕水一盞煎至七分去滓溫服治霍亂吐利已定汗出厥冷四肢拘急腹中痛不解脈欲絕桔梗湯方桔梗銼炒一兩甘草炙附子炮裂去皮臍各二兩乾薑炮一兩上四味銼如麻豆每服三錢匕水一盞煎至七分去滓溫服治霍亂吐下虛冷厥逆乾薑湯方乾薑炮甘草炙人參各二兩附子炮裂去皮臍一枚上四味㕮咀如麻豆每服六錢匕水二盞煎至一盞去滓溫服下甚者加龍骨搗研二兩腹痛不止加當歸二兩切焙霍亂欲死論曰霍亂欲死者真氣厥而邪氣盛也或邪氣暴爭而未得吐利或吐利雖極而邪氣猶勝故真氣為之困乏其證煩悶痞滿四逆自汗脈微若絕者是也此由陰陽痞隔不得升降內經所謂出入廢則神機化減升降息則氣立孤危也治霍亂吐利已止汗出而厥四肢拘急不解脈微欲絕通脈四逆湯方附子炮裂去皮臍一枚甘草炙一兩半乾薑炮三分上三味銼如麻豆每服三錢匕水一盞半煎至一盞去滓溫服脈出即愈若面色赤者每服加蔥白三寸腹中痛者每料加芍藥二兩仍去蔥白嘔逆者每服加生薑