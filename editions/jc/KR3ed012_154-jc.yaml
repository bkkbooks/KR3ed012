body:
  text: 卷第一百五十四妊娠門妊娠統論論曰妊娠一月謂之始形二月謂之始膏三月謂之始胎當是之時血脈不流形象始化男女於此儀則未分緣感而應所以孕婦欲令見榮貴端正之人不欲見傴僂侏儒之輩及猿猴犬馬怪禽異獸夜臥仍宜息心靜意慎勿亂思恐形異夢而感不祥也妊婦所以擇食者蓋假五氣五味生成五臟氣味各隨所喜而歸之陰陽應象論曰酸生肝苦生心甘生脾辛生肺咸生腎此五臟假五味以生也六節臟象論曰臊氣湊肝焦氣湊心香氣湊脾腥氣湊肺腐氣湊腎此五臟假五氣以成也若形臟未備則隨其不足而孕婦不欲其氣味食之蓋陽為氣陰為味氣化則精生味化則形長誠以人之生也氣本於天形本於地內經謂天食人以五氣地食人以五味正此之謂若夫天合既分形質不完者皆孕婦擇食之時不得其氣味故視斜覷短偏瞽雙盲手攣足跛腰傴背僂此肝形之不備也言遲語吃或啞或聵神氣昏塞此心形之不備也胸背凸凹舌短唇缺此脾形之不備也毫毛疏薄髮鬢禿落或毫毛通白皮膚遍赤此肺形之不備也毛髮焦黃形體黑小五硬五軟數歲不能行此腎形之不備也由是孕婦擇食假其氣味生成五臟一有不備病輒隨之譬猶陶冶成器一或苦窳是水火之劑不謹豈曰工之良哉妊娠惡阻論曰婦人所食穀味化為血氣下為月水凡妊娠之初月水乍聚一月為腜二月為胚三月為胎胎成則男女分方食於母而口以焉在腜胚之時血氣未用五味不化中氣壅實所以脾胃不思穀味聞見於物故噁心有所阻也其病心中憒悶頭重目眩四肢怠惰惡聞食氣是矣治妊娠惡阻嘔逆噁心四肢疼頭痛惡聞食氣心忪煩悶多損墜宜安胎調勻血脈茯苓湯方白茯苓去黑皮旋覆花生乾地黃微炒各二兩陳橘皮湯浸去白焙細辛去苗葉芎藭人參芍藥桔梗去蘆頭炒甘草炙令赤色各一兩半上一十味粗搗篩每服三錢匕以水一盞入生薑一分拍碎同煎至六分去滓溫服日二治妊娠惡阻病心中憒悶見食嘔吐惡聞食氣肢節煩疼身體沉重多臥黃瘦麥門冬湯方麥門冬去心焙人參各三分白茯苓去黑皮陳橘皮湯浸去白焙各半兩甘草炙銼一分上五味粗搗篩每服三錢匕以水一盞入生薑一分拍破棗二枚劈同煎至六分去滓溫服食前治妊娠一兩月惡食手足煩悶人參湯方人參知母焙枳殼去瓤麩炒令黃黃芩去黑心各一兩大腹一枚並皮子用銼碎上五味粗搗篩每服三錢匕以水一盞入生薑半分切煎至七分去滓溫服食後日二治妊娠阻病心中憒悶頭目眩四肢沉重懈怠惡聞食氣好吃酸鹹果實多臥少起三月四月皆多嘔逆百節不能自舉者人參飲方人參二兩白茯苓去黑皮厚朴去粗皮塗生薑汁炙七遍白朮各一兩半陳橘皮湯浸去白焙葛根銼各一兩上六味粗搗篩每服三錢匕以水一盞入生薑五片同煎至六分去滓溫服日再治妊娠阻病心中憒悶虛煩吐逆惡聞食氣頭目眩重四肢百節疼煩沉重多臥少起汗出疲極黃瘦半夏湯方半夏湯洗去涎滑七遍焙陳橘皮浸去白炒芍藥桔梗銼炒人參各一兩旋覆花甘草炙細辛去苗葉芎藭熟乾地黃焙各三分白茯苓去黑皮一分上一十一味粗搗篩每服三錢匕以水一盞入生薑半分切棗二枚擘同煎至六分去滓溫服兩劑後宜服橘皮丸以間之治妊娠惡阻病心中煩悶頭眩惡聞食氣聞便嘔吐悶亂顛倒四肢怠惰不自勝舉先服半夏湯兩劑後次服此陳橘皮丸方陳橘皮湯浸去白炒乾白茯苓去黑皮各一兩白朮甘草炙乾薑炮半夏溫水洗去滑七遍枳實去瓤麩炒各二兩上七味搗羅為末煉蜜和塗酥為劑搗令勻熟丸如梧桐子大每服二十丸生薑湯下食前服治妊娠阻嘔吐不下食宜服橘皮湯方陳橘皮湯浸去白焙竹茹人參白朮各三兩厚朴去粗皮塗生薑汁炙七遍二兩上五味粗搗篩每服三錢匕以水一盞生薑五片同煎至七分去滓溫服不拘時候治妊娠惡阻病頭疼肩背煩疼氣脹不思飲食宜白朮丸方白朮厚朴去粗皮塗生薑汁炙煙出七遍當歸微炒陳橘皮湯浸去白焙各一兩白茯苓去黑皮熟乾地黃微炒各一兩半上六味搗羅為末煉蜜搜和塗酥為劑搗令勻熟丸如梧桐子大每日空心米飲下二十丸早晨日晚各一服治初妊娠阻食即吐逆頭痛顛倒寒熱前胡飲方前胡去蘆頭細辛去苗葉白茯苓去黑皮甘草炙厚朴去粗皮塗生薑汁炙煙出七遍各半兩上五味搗羅為粗末每服二錢匕水一盞生薑一分切同煎至六分去滓溫服不拘時日二服治妊娠阻病頭疼四肢羸弱不思食飲唯思眠睡柴胡飲方柴胡去苗赤芍藥麥門冬去心焙人參黃耆微炒銼甘草炙各半兩生地黃一兩半研絞取汁上七味搗羅六味為粗末每服三錢匕以水一盞入地黃汁一分同煎至六分去滓溫服日再治妊娠阻病胎不安寒熱嘔逆氣滿不思飲食宜服麥門冬飲方麥門冬去心焙人參白茯苓去黑皮阿膠炙令燥各一兩甘草炙銼三分上五味搗為粗末每服三錢匕以水一盞入生薑一分拍破棗二枚擘同煎至六分去滓食後溫服日二治妊娠阻病心中憒悶虛煩吐逆惡聞食氣頭眩體重四肢疼痛煩熱多臥少起惡寒汗出羸瘦桔梗湯方桔梗銼炒半夏湯洗七遍去滑白茯苓去黑皮細辛去苗葉芎藭人參甘草炙銼各二兩芍藥一兩熟乾地黃微炒三兩上九味粗搗篩每服五錢匕水一盞半生薑五片同煎至六分去滓溫服食後日二服治妊娠惡阻心中煩悶頭眩體重惡聞食氣聞便嘔吐憒悶顛倒四肢怠惰不自勝舉茯苓丸方白茯苓去黑皮人參各一兩桂去粗皮乾薑炮半夏湯浸洗七遍陳橘皮去白焙乾白朮葛根銼碎甘草炙銼枳實去瓤麩炒各三兩上一十味搗羅為末煉蜜為劑搗令勻熟丸如梧桐子大每服二十丸米飲下漸加至三十丸日再服治妊娠惡阻嘔吐涎痰不能食姜橘湯方生薑母一兩一分陳橘皮去白焙青竹茹各半兩前胡去苗三分檳榔銼二枚上五味銼如麻豆每服三錢匕水一盞煎至七分去滓溫服不拘時候治妊娠阻病心中煩悶嘔噦吐逆惡聞食氣頭眩重四肢百節疼酸嗜臥汗出疲極黃瘦人參飲方人參麥門冬去心白茯苓去黑皮生薑各三分陳橘皮湯浸去白焙甘草炙各半兩大棗五枚上七味銼如麻豆大分為二劑每劑以水五盞煎取二盞去滓食前分為三服如人行三五里再服治妊娠惡阻見食吐逆頭痛前胡湯方前胡去蘆頭細辛去苗葉白茯苓去黑皮人參厚朴去粗皮生薑汁炙甘草炙銼各一兩上六味粗搗篩每服五錢匕水一盞半入生薑五片煎至八分去滓溫服不拘時治妊娠惡阻頭旋嘔吐腰腹娼痛胎動不安桑寄生飲方桑寄生阿膠炒燥柴胡去苗麥門冬去心焙人參大薊各一兩郁李仁去皮炒半兩上七味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治妊娠惡阻心中憒悶聞食氣即吐逆肢節痠疼多汗黃瘦半夏飲方半夏湯洗去滑生薑汁製過白茯苓去黑皮各三分細辛去苗葉旋覆花桔梗赤芍藥陳橘皮去白焙甘草炙各半兩熟乾地黃焙一兩一分上九味粗搗篩每服三錢匕水一盞入生薑五片同煎至七分去滓溫服空心食前治妊娠阻病心中煩悶頭眩重憎聞食氣聞便嘔逆四肢不自持茯苓飲方白茯苓去黑皮防風去叉人參白朮枳殼去瓤麩炒生薑各半兩甘草一分炙上七味銼如麻豆大分為二劑每劑以水四盞煎取一盞半去滓食前分溫二服如人行三五里再服治妊娠惡阻憒悶頭旋聞食氣便嘔逆四肢多熱茯苓丸方白茯苓去黑皮人參陳橘皮去白焙乾薑炮裂白朮半夏湯洗去滑生薑汁製過葛根銼麥門冬去心焙一兩甘草炙銼各一兩枳實去瓤麩炒三分上一十味搗羅為末煉蜜和丸如梧桐子大每服三十丸空腹米飲下妊娠漏胎論曰妊娠將理失宜經血時下謂之漏胎由衝任虛弱不能固養胞胎故令經血時下如器之漏也久漏不已則胎氣無所稟養心致萎燥矣治妊娠漏胎下血不止腹內疼痛續斷丸方續斷附子炮裂去皮臍蒲黃乾薑炮芍藥芎藭山茱萸各一兩半白朮肉蓯蓉酒浸切焙菟絲子酒浸別搗黃耆炙銼山芋熟乾地黃焙各二兩上一十三味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心日晚溫酒下治妊娠漏胎下血不止臍腹疼痛續斷飲方續斷銼二兩艾葉去梗焙乾熟乾地黃焙當歸切焙各一兩竹茹新者阿膠炙燥雞蘇去根莖各半兩上七味搗為粗末每服三錢匕用水一盞煎至七分去滓空心溫服早晚各一治妊娠漏胎淋瀝不止艾葉飲方艾葉陳者半兩乾薑炮當歸炙銼各三分芎藭一兩上四味搗為粗末每服三錢匕以水一盞入生薑一棗大拍碎同煎至七分去滓熱服空心日午晚後各一治妊娠漏胎淋瀝下血臍腹疼痛桑寄生湯方桑上寄生炙令黃銼碎半兩當歸炙銼一兩半芎藭銼一兩上三味粗搗篩每服三錢匕以水半盞酒半盞同煎取六分去滓溫服早晨午時晚間各一治妊娠漏胎下血過多膠艾湯方阿膠炙燥半兩艾葉焙乾一兩上二味粗搗篩每服三錢匕以水一盞煎至七分去滓溫服早晨午時晚間各一治妊娠漏胎下血過多腹中刺痛止血安胎芎藭飲方芎藭當歸切焙竹茹各一兩阿膠炙燥三分上四味粗搗篩每服三錢匕水一盞煎至七分去滓溫服早晨午時至晚各一服治妊娠胎漏下血不止腹痛薑黃湯方薑黃當歸切焙熟乾地黃焙艾葉焙乾鹿角膠炒燥各一兩上五味粗搗篩每服五錢匕水一盞半入生薑半分切棗三枚擘破煎至八分去滓食前溫服治妊娠胎動不安及漏胎腹中痛阿膠湯方阿膠炒燥白朮當歸切焙甘草炙各一兩桑上寄生銼炒熟乾地黃焙各一兩半白茯苓去黑皮龍骨研芎藭各三分乾薑炮半兩上一十味粗搗篩每服五錢匕水一盞半棗三枚擘破煎至八分去滓不計時候稍熱服治妊娠五月六月下血不止黃耆湯方黃耆炙銼一兩半桑寄生炙銼地榆銼熟乾地黃焙各一兩艾葉焙乾龍骨研各三分上六味粗搗篩每服五錢匕水一盞半生薑半分切棗三枚擘破同煎至六分去滓食前溫服治妊娠胎漏下血不止腹痛地黃散方熟乾地黃焙乾薑炮各三分上二味搗羅為散每服二錢匕食前溫酒調下治妊娠胞漏月水時下此由衝任脈虛不能制約太陽少陰之經故令血下蓋衝任之脈為經絡之海皆起於胞內今不能制其經血故為漏胎血乾即死黃耆飲方黃耆銼地榆桑寄生各一兩半艾葉半兩白龍骨研二兩生地黃二兩生薑半兩上七味銼如麻豆大每服五錢匕水一盞半煎取八分去滓食前溫服如人行三五里再服治妊娠漏胎心腹㽲痛或時下血竹茹寄生湯方竹茹桑寄生阿膠炙燥艾葉芍藥白朮各等分上六味銼如麻豆大拌勻每服三錢匕水一盞煎至七分去滓溫服治妊娠胎漏下血不止阿膠湯方阿膠炒燥劉寄奴赤石脂黃連去須白龍骨各一兩半烏梅五枚碎焙桑寄生甘菊花當歸切焙旋覆花炒地榆白朮各一兩枳殼去瓤麩炒一兩一分艾葉炒半兩石膏碎二兩上一十五味粗搗篩每服五錢匕水一盞半入生薑五片同煎至八分去滓溫服不拘時治妊娠胎漏下血艾葉湯方艾葉炒黃芩去黑心各半兩黃連去須茯神去木桑耳代赭厚朴去粗皮生薑汁炙銼白茅根切白芷阿膠炒燥各一兩白朮三分上一十一味粗搗篩每服五錢匕水一盞半入生薑五片同煎至八分去滓溫服不拘時治妊娠胎漏方生地黃汁二合清酒二合上二味相和煎三四沸空腹分溫二服治妊娠胎漏下血不止地黃散方熟乾地黃焙乾薑炮赤石脂各二兩上三味搗羅為散酒服方寸匕日二三服治漏胎下血不止當歸阿膠散方當歸切焙阿膠炙燥各半兩龍骨二分半地榆蒲黃炒各三分熟乾地黃焙黃牛角䚡炙