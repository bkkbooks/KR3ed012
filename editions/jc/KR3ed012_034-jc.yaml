body:
  text: 卷第三十四中暍門中暍統論論曰盛夏炎熱人多冒涉路途熱毒易傷微者客於陽經令人嘔逆頭眩心神懊悶汗出惡寒身熱發渴即時不治乃至熱氣伏留經絡歲久不除遇熱即發俗號暑氣甚者熱毒入內與五臟相併客邪熾盛郁瘀不宣致陰氣猝絕陽氣曝隔經絡不通故奄然悶絕謂之中暍此乃外邪所擊真臟未壞若遇救療氣通則蘇但治熱暍不可以冷物得冷則不救蓋外以冷觸其熱蘊積於內不得宣發故也中熱暍論曰熱暍之病由冒犯暑熱邪氣也其脈弦細芤遲其狀汗出惡寒身熱而渴體重疼痛小便已則洒洒然毛聳四肢厥冷微勞動即熱口開齒燥經所謂脈虛身熱是為傷暑此不可汗下汗之則惡寒甚加溫針則發熱甚數下之則淋甚宜以去熱邪之藥治之治中熱暍頭痛汗出惡寒發熱而渴白虎湯方知母六兩石膏碎一斤甘草二兩粳米六合上四味㕮咀如麻豆大每服五錢匕水一盞半煎米熟湯成去滓溫服日三一方加人參三兩治伏暑吐逆小香薷湯方香薷二兩人參一兩白扁豆半兩上三味粗搗篩每服三錢匕水一盞煎至六分去滓溫服不拘時候治傷暑中暍解毒丸方半夏醋浸一宿漉出曝乾甘草炙銼各一斤赤茯苓去黑皮二兩上三味搗羅為細末生薑自然汁和丸如梧桐子大每服四丸加至八丸新汲水下如昏悶不省者生薑自然汁下治傷暑煩渴不止竹茹湯方竹茹一合新竹者甘草一分銼烏梅兩枚椎破上三味用水一盞半煎取八分去滓放溫時時細呷治伏暑頭痛心胸煩悶旋運噁心不思飲食小抱龍丸方半夏醋浸一宿銀石器中煮醋盡焙甘草炙銼各等分上二味搗羅為細末生薑自然汁煮稀麵糊丸如梧桐子大陰乾每服十丸新汲水下食後臨臥服治中暑煩躁香薷散方香薷二兩上一味搗羅為散每服二錢匕水一盞煎取七分不去滓溫服不拘時候治中暑煩躁多困乏力消暑散方人參搗末白麵等分上二味和勻每服二錢匕新水調下不拘時候治暑氣每到夏月即發四肢無力不思飲食檳榔餅方檳榔銼瞿麥穗蘹香子炒荊芥穗麥藍子大黃煨銼各一分上六味搗羅為末用面三錢和作六餅慢火燒熟每日空心爛嚼一餅溫酒下治暑氣甘露散方黃連去須銼一兩吳茱萸半兩上二味同炒以茱萸黑色為度放地上出火毒不用茱萸將黃連搗羅為細散每服半錢匕食後茶清或新水調下治一切伏熱煩躁困悶菝葜散方菝葜貫眾摘碎刮去毛各一兩人參甘草炙銼各半兩上四味搗羅為散每服二錢匕水一盞煎至七分溫服如熱渴即冷作飲治傷暑胸膈躁悶昏運倒僕欲死解毒散方商陸根切開如血色者陰乾上一味搗羅為散每服一錢匕新汲水調下牛馬驢騾喘急熱發倒僕調三錢灌之立止治暑毒及心經積熱大黃丸方大黃銼炒甘草炙銼黃連去須惡實微炒荊芥穗等分上五味搗羅為末煉蜜丸梧桐子大每服二十丸溫水下食後服若為散水調亦得治暑毒躁悶甘露丸方寒水石火煅候冷夾絹袋盛井底浸七日取出令乾研四兩天竺黃半兩馬牙硝研二兩甘草銼一兩龍腦半錢上五味為末糯米粥丸雞頭大每服一丸生薑蜜水磨下治暑毒抱龍丸方黃芩去黑心大黃銼炒黃藥子生乾地黃焙藍根甘草炙銼各一兩雄黃研半兩龍腦研麝香研各一錢上九味為細末牛膽汁和丸如彈子大每服一丸冷鹽湯嚼下治暑毒煩渴狂躁嘔吐頭疼困倦不灰木散方不灰木二兩滑石寒水石甘草銼各一兩蓼藍根一兩半上五味並生搗羅為散每服二錢匕用生粟米泔入沙糖一棗大同化服不拘時候合時避日色火氣治暑毒救生散方脂麻新者三兩上一味炒令黑色取出盤內攤冷碾為細末新汲水調下三錢匕或丸如彈子大新水化下一丸凡暑熱外不得以冷物逼之得冷即斃治中暍解暑毒煩躁冰壺散方不灰木燒玄精石生研金星石銀星石馬牙硝生各半兩甘草炙銼一兩硝石一分上七味各搗研為散先將甘草鋪在銚內次入諸藥炒良久移放地上以銚冷為度重研過每服一錢匕新汲水調下或生薑汁水調下治中熱暍方上用生面一匙沸湯調及半碗紙蓋碗口少時微熱呷之大效中暍悶絕論曰中暍之病令人悶絕者熱毒傷臟也蓋心臟神而惡熱若冒觸暑毒蘊蓄於五臟則陰陽不能升降經絡不得宣通故奄然悶絕然真臟未壞救療有方得氣宣通即蘇亦不可待其自蘇又不可犯冷若外犯冷則與熱氣相拒氣愈不通而斃矣治熱暍欲死悶亂方生地黃洗搗取汁一盞上一味旋旋灌之治中暑毒熱暍不省方白麵不拘多少上一味用熱湯調二錢匕灌之治中熱暍不省方大蒜不拘多少去皮搗爛上一味用新水調勻灌之治中熱暍不省方上以泥周繞暍人臍使三四人溺其中亦可屈革帶或扣漆碗底或脫車釭安著臍上令溺不使流去然此謂路途無湯可用乃令人溺取溫若有湯不必溺也仲景云泥及車釭蓋此物必冷暍人忌冷若得熱湯和泥及火燒車釭方可用也又方上取生菖蒲不拘多少搗絞取汁微溫一盞灌之又方上先掘地作坑取蜜半盞傾坑中以新汲水兩盞投之攪勻澄取漿一盞灌之又方上以物斡開口暖湯徐徐灌之仍少舉其頭令湯入腹即蘇又方上取生蓼不拘多少用水濃煮絞汁一二盞灌之治中熱暍死方上取路上熱塵土以壅其心冷復易候氣通乃止治熱暍欲死悶亂方上以口噓其心上便搗地黃汁一盞灌之仍灸兩乳頭各七壯治中熱暍垂死陳橘皮湯方陳橘皮湯浸去白焙乾薑炮甘草炙上三味各等分粗搗篩每服三錢匕以水一盞煎五七沸去滓稍稍令咽勿頓與之以蘇為度治中暍垂死備急救生丸方乾薑炮甘草炙黃藥子板藍根各四兩犀角鎊一兩上五味為細末煉蜜丸如彈子大每服一丸熱湯化服立效治中熱則精神冒悶黃連散方黃連雞爪者不拘多少去須上一味為細散每服二錢匕濃煎燈心湯調下得溲則愈蓋心惡熱苦入心熱傳小腸則氣下通故得溲則愈燈心通利小便故也治中暑暍毒悶亂昏沉凝水石丸方凝水石瓶子內燒過如粉乾薑燒灰各一兩甘草炙三錢甜硝半兩上四味搗羅為末煉蜜丸如彈子大每服一丸生薑湯化下治中暑毒悶亂不省人事萬金散方硫黃研蛤粉各一兩上二散研為細末每服一錢匕新汲水調下治中暍冒悶吐逆頭痛出冷汗玉珠散方硫黃舶上者滑石色白者凝水石燒各一兩上三味搗研為散每服二錢匕艾湯調下瘧病門諸瘧統論論曰夏傷於暑秋成痎瘧該於時而作也方夏之時陰居於內暑雖入之勢未能動候得秋氣陽為之變動汗出遇風乃成此疾故曰痎瘧皆生於風蓄作有時其氣陰陽上下交爭虛實更作陰陽相移也陽並於陰則陰實而陽虛陽明虛則寒慄鼓頷巨陽虛則腰背頭項痛三陽俱虛則陰氣勝陰氣勝則骨寒而痛寒生於內故中外皆寒陽盛則外熱陰虛則內熱內外皆熱則喘而渴故欲冷飲皆得之夏傷於暑熱氣盛藏於皮膚之內腸胃之外此營氣之所舍也令人汗孔疏腠理開因得秋氣汗出遇風及得之於浴水氣舍於皮膚之內與衛氣並居衛氣者晝行於陽夜行於陰此氣得陽而外出得陰而內薄內外相薄是以日作其間日作者其氣之所舍深也其作之早晏者隨風府日下一節也是以或先寒後熱或先熱後寒或但熱無寒又或本於痰或本於瘴或本於鬼神或本於邪氣大概外傳經絡內入五臟證既不同治法亦異治瘧者不辨陰陽虛實概以吐藥投之有非痰實而真氣受弊者固多矣內經論五臟諸經之瘧本以刺法補瀉其寒熱先後與夫發止早晏又皆不同明邪氣所傳不可一概論今備載諸證參以治法之輕重要在隨證而治庶乎無一曲之蔽也寒瘧論曰寒瘧之狀內經所謂先寒後熱病以時作是也蓋傷暑汗出腠理開發因遇夏氣淒滄之水寒其氣藏於腠理皮膚之中秋傷於風則病成矣其證先起於毫毛伸欠乃作寒慄鼓頷腰脊俱痛寒去則內外皆熱頭痛飲冷是也治寒瘧先寒後熱頭痛不可忍熱極即汗出煩渴吳茱萸湯方吳茱萸湯浸焙炒一兩羌活去蘆頭半兩甘草炙銼半夏湯洗七遍焙乾薑炮芎藭細辛去苗葉麻黃去根節高良薑藁本去苗土桂去粗皮各一分上一十一味粗搗篩每服三錢匕水一盞煎至七分去滓未發前溫服治寒瘧神效檳榔湯方檳榔銼桂去粗皮常山陳橘皮湯浸去白炒甘草炙銼各等分上五味粗搗篩每服三錢匕酒半盞水一盞煎至一盞去滓未發前溫服治寒瘧不瘥橘皮散方陳橘皮湯浸去白焙一兩牡蠣熬三分桂去粗皮常山各半兩上四味為細散每服三錢匕溫酒調下未發前並三服治瘧先寒戰寒解即壯熱鱉甲常山酒方鱉甲去裙襴醋炙一分淡竹葉一兩常山甘草炙銼各三分上四味粗搗篩每服五錢匕酒半盞浸藥蓋於地上一宿次日添水一盞煎至七分去滓未發前溫服得吐為驗治瘧寒多熱少柴胡桂薑湯方柴胡去苗四兩桂去粗皮黃芩去黑心各一兩半栝蔞根牡蠣熬甘草炙銼乾薑炮各二兩上七味粗搗篩每服三錢匕水一盞半煎至一盞去滓溫服初服微煩汗出即愈治寒瘧蜀漆散方蜀漆洗去腥焙雲母燒一晝夜龍骨各一兩上三味為細散每服半錢匕未發前漿水調下治寒瘧草豆蔻飲方草豆蔻去皮高良薑常山青橘皮湯浸去白焙陳橘皮湯浸去白焙各一分生薑半分淡竹葉一握黑豆五十粒上八味㕮咀如麻豆即用水三盞煎至一盞半去滓未發時通口分溫二服治寒瘧牡蠣湯方牡蠣熬麻黃去根節各四兩甘草炙銼二兩蜀漆洗去腥焙三兩上四味粗搗篩每服四錢七水一盞半煎至一盞去滓未發前溫服治寒瘧胸滿人參湯方人參半兩蜀椒去目及閉口者出汗一分乾薑炮一兩阿魏三分酒浸去砂石面和作餅炙上四味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治寒瘧烏梅丸方烏梅肉炒桃仁去皮尖雙仁炒研常山豉炒各三分升麻肉蓯蓉酒浸切焙桂去粗皮人參甘草炙銼各半兩上九味為細末煉蜜丸如梧桐子大每服二十丸空心未發前溫酒下日二加至三十丸治寒瘧先寒後熱常山湯方常山甘草生銼乾薑炮各一分附子炮裂去皮臍柴胡去苗各半兩上五味㕮咀如麻豆每以五錢匕酒一盞半煎至一盞去滓分為二服空心未發前並食後各一服治寒瘧無問遠近虎骨丸方虎頭骨酥炙烏梅肉炒桂去粗皮甘草炙銼人參各半兩桃仁去皮尖雙仁炒研常山升麻肉蓯蓉酒浸切焙各三分附子炮裂去皮臍半兩麝香研一錢豉炒一合上一十二味除桃仁外搗羅為末和勻煉蜜丸如梧桐子大每服三十丸未發前米飲下治寒瘧不瘥二姜散方乾薑炮高良薑各三分上二味炒令黑色搗羅為散每服一錢匕未發前溫酒調下日三不拘時治寒瘧鱉甲酒方鱉甲去裙襴醋炙半兩烏賊魚骨去甲附子炮裂去皮臍切甘草炙銼常山各一兩上五味搗羅為末每服五錢匕酒一盞半煎十數沸留一宿次日以酒先塗手足井背上如不發即止如發即飲此酒一盞治寒瘧塗之方附子一枚生去皮臍上一味搗羅為末未發時用苦酒和塗病人背上佳溫瘧論曰溫瘧之狀內經所謂先傷於風後傷於寒其證先熱後寒病以時作是也蓋風為陽氣寒為陰氣風氣先勝故先熱而後寒得之冬中於風寒氣藏於腎內至骨髓至春陽氣大發邪氣不能自出至夏大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗俱出故氣從內之外其法宜先治其陽後乃治其陰也治溫瘧初發身熱頭痛不可忍臨醒時即寒慄戰動麻黃湯方麻黃去根節煎掠去沫焙羌活去蘆頭牡丹去心獨活去蘆頭梔子去皮柴胡去苗桔梗銼炒升麻荊芥穗大黃銼炒半夏洗去滑焙木香知母焙黃芩去黑心各半兩上一十四味粗搗篩每服三錢匕水一