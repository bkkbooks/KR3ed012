陽氣盛不及於陰故但熱不寒氣內藏於心外舍於分肉之間令人銷鑠肌肉名之曰癉瘧以單陽無陰故也治癉瘧發作有時但熱不寒頭痛不安通身俱黑大腸秘結小便黃赤茵陳蒿湯方茵陳蒿山梔子去皮柴胡去苗黃芩去黑心桔梗炒牡丹皮貝母去心荊芥穗去梗升麻杏仁湯浸去皮尖雙仁炒半夏湯洗七遍去滑切焙羌活去蘆頭獨活去蘆頭麻黃去根節煎去沫焙各半兩細辛去苗葉一分上一十五味粗搗篩每服三錢匕水一盞生薑二片煎一沸急瀉出臨發熱頭痛時去滓熱服仍須食後但此瘧止發熱並初發時先壯熱者可服治癉瘧上焦熱身重目黃茵陳枳殼湯方茵陳蒿取葉枳殼去瓤麩炒各一兩桔梗銼炒三分大黃銼微炒甘草炙令黃各半兩上五味粗搗篩每服三錢匕水一盞煎至六分去滓溫服不計時候治癉瘧陰氣孤絕陽氣獨發脈微其候少氣煩滿手足熱欲嘔但熱而不寒邪氣內藏於心外舍於分肉之間令人銷鑠肌肉白虎加桂湯方石膏碎一兩六錢知母六錢甘草炙二錢粳米半合上四味除粳米外㕮咀拌勻以水一升煮藥五錢匕以米爛為度去滓加桂末三錢匕煎取四合作一服復令汗先寒發熱汗出者愈治癉瘧但熱不寒嘔逆不下食香豉飲方豉半合蔥白七莖切常山三分升麻一兩鱉甲醋炙令黃去裙襴知母焙生地黃各一兩半檳榔煨三分上八味銼如麻豆每以十錢匕以水三盞於星月下浸一夜橫刀一口安在藥上早晨煎取一盞半去滓空腹分為二服重者不過兩劑瘥治癉瘧積熱痰盛寒少熱多但熱不寒煩躁引飲大青飲方大青一兩莖葉紫者是不紫即是遠志不可用也如無真者以青黛代之大黃醋炒赤芍藥常山細銼炒甘草炙龍膽去土各半兩上六味粗搗篩每服五錢匕用水一盞半煎至八分去滓溫服氣盛熱多宜服得利或熱稍退即止人素有冷疾年四十以上者雖有熱證不宜多服治癉瘧發熱不止常山散方常山銼一兩升麻三分鱉甲去裙襴銼生用山梔子去皮各半兩上四味搗羅為散每服三錢匕未發前用溫水調下取吐即瘥治癉瘧豉心飲方豉心一合雄鼠糞末炒二兩匕童子小便三升五合甘草炙半兩鱉甲醋炙去裙襴柴胡去苗各一兩一分山梔子去皮三分烏梅七枚去核桃心一握柳心一握生地黃汁二合生薑一分上一十二味除鼠糞地黃汁小便外余並細銼入小便中浸一宿明日煎取八合去滓下鼠糞並地黃汁分為三服空心一服食後再服治癉瘧熱甚不瘥梔子湯方梔子仁一兩常山銼三分車前葉炙乾半兩粳米四十九粒上四味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服未發前一服臨發一服以吐利為度利若不止以冷飯止之治癉瘧石膏湯方石膏碎二兩白秫米五十粒常山銼三分上三味粗搗篩每服五錢匕以水一盞半入淡竹葉七片細銼煎至一盞去滓空腹溫飲一服欲發時一服正發時一服三服訖淨室中臥勿與人語過發時後即得洗手面及飲食七日內禁房室及酒面久瘧不過再劑一方加烏梅肉二七枚治癉瘧麻黃丸方麻黃去根節一兩常山銼知母銼焙乾甘草炙大黃生銼各半兩上五味搗羅為細末煉蜜和丸如梧桐子大每服五丸溫水下未發前服日二服不瘥稍增之治癉瘧壯熱不止渴欲飲水車前草湯方車前草常山銼升麻豉炒甘草生各半兩白粳米半合上六味粗搗篩每五錢匕以水二盞浸藥於星月下露一宿橫一小刀於藥上入五更煎取一盞去滓分溫二服空腹及未發前各一服良久即吐吐定食少漿粥治癉瘧但熱不寒煩渴不止常山飲方常山銼炒半兩甘草銼炒一分烏梅七枚椎碎去核焙青蒿焙一分上四味粗搗篩即以小便一盞水一盞酒一盞煎至一盞去滓當發日空心服
