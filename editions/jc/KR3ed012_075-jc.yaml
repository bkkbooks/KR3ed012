body:
  text: 卷第七十五白滯痢論曰白滯痢者冷痢之類蓋腸虛受冷留而不去與津液相搏結滯如膿或如凝脂腹痛而下故為白滯痢治白滯痢及小便白人參湯方人參龍骨當歸切焙乾薑炮裂白茯苓去黑皮各半兩甘草炙銼半兩厚朴去粗皮塗生薑汁炙熟一兩上七味粗搗篩每服五錢匕水一盞半煎至一盞去滓空心服日晚再服如小兒患量大小以意加減治白滯痢及食不消化黃柏丸方黃柏去粗皮炙三分烏梅肉炒乾一兩熟艾微炒一兩甘草炙銼半兩上四味搗羅為末煉蜜和丸如梧桐子大每服一十五丸空心米飲下日午再服治白膿痢赤石脂散方赤石脂碎一兩乾薑炮三分上二味搗羅為末每服兩錢匕空心米飲調下日晚再服治白膿及諸痢當歸丸方當歸切焙黃連去須炒各三分烏梅肉炒乾阿膠炙燥各半兩右四味搗羅為末熔蠟和丸梧桐子大每服空心溫粥飲下二十丸日午再服治白滯痢及腹痛不止陳曲湯方陳曲炒黃半兩黃連去須炒厚朴去粗皮塗薑汁炙紫色各一兩附子炮裂去皮臍乾薑炮各半兩上五味銼如麻豆每服五錢匕水一盞半煎至八分去滓空心服日晚再服治白滯痢心腹脹滿不下食豆蔻湯方肉豆蔻去殼甘草炙銼各半兩厚朴去粗皮塗生薑汁炙紫色一兩半乾薑炮半兩上四味粗搗篩每服三錢匕水一盞煎至七分去滓空心溫服日午再服治白滯痢及水痢日夜一二十行心下痛白朮湯方白朮三分甘草炙銼半兩厚朴去粗皮塗生薑汁炙令紫色一兩黃柏去粗皮炙龍骨各半兩上五味粗搗篩每服五錢匕水一盞半生薑三片同煎至八分去滓空心溫服日晚再服治冷白滯痢及腹痛附子湯方附子炮裂去皮臍一兩半赤石脂一兩乾薑炮一兩半芍藥甘草炙銼各半兩當歸切焙龍骨各一兩半白朮二兩人參三分牡蠣熬一兩半上一十味銼如麻豆每服五錢匕水一盞半煎至八分去滓空心溫服日晚再服有膿加厚朴一兩去粗皮薑汁塗炙紫色若嘔加陳橘皮一兩湯浸去白焙治白滯痢龍骨丸方龍骨一兩半乾薑炮半兩附子炮裂去皮臍一兩半上三味搗羅為末醋煮麵糊丸如梧桐子大食前米飲下十五丸治脾胃氣虛滑泄下痢白膿厚朴湯方厚朴四兩去皮塗薑汁炙令紫乾薑炮二兩上二味粗搗篩每服三錢匕漿水一盞煎至六分去滓溫服食前治丈夫婦人久患白滯痢如魚腦阿魏丸方阿魏別研一分桂去粗皮為末半兩木香為末半兩安息香一分酒浸別研獨頭蒜二顆煨熟去皮研爛上五味再同研極細溫酒和丸如梧桐子大每服三十丸空心陳米飲下日午再服治白滯痢腹藏撮痛豆蔻丸方肉豆蔻麵裹煨熟為末草豆蔻麵裹煨熟為末縮砂仁母丁香各一兩木香沉香銼墨燒紅為末各半兩地榆二兩枇杷葉去毛炙一兩上九味搗羅為末燒粟米飯和丸如櫻桃大每服二丸米飲化下食前服治白痢多膿腹中㽲痛黃芩丸方黃芩去黑心黃連去須黃柏去粗皮各一兩半吳茱萸湯洗焙乾炒一兩訶黎勒皮炒二兩半上五味搗羅為末煉蜜和丸如梧桐子大每服四十丸食前橘皮湯下日再治臟寒下痢白膿心腹㽲痛姜附散方乾薑炮附子炮裂去皮臍訶黎勒煨取皮龍骨各一兩上四味搗羅為散每服三錢匕煎烏梅湯空心調下治白滯痢久不瘥黃連湯方黃連去須炒厚朴去粗皮生薑汁炙各二兩上二味粗搗篩每服五錢匕水一盞半煎至八分去滓食前服痢論曰下痢或青或白或黑者皆冷痢也此因腸胃虛弱寒氣乘之故令人大便痢下青黑若其痢色白而食不消者寒中也當診其脈沉則生浮則死其人素有積寒即成久冷痢有膿也治冷痢肉豆蔻湯方肉豆蔻去殼甘草炙銼各一兩上二味粗搗篩每服五錢匕水一盞半煎至八分去滓空心日午溫服治久冷痢枳殼湯方枳殼去瓤麩炒一兩甘草炙銼半兩厚朴去粗皮薑汁炙一兩半乾薑炮赤茯苓去黑皮各一兩上五味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服空心日午二服治冷白滯痢腹痛牡蠣湯方牡蠣煅三分赤石脂一兩乾薑炮當歸切焙龍骨白朮各三分附子炮裂去皮臍甘草炙銼人參芍藥各半兩上一十味銼如麻豆每服五錢匕水一盞半煎至八分去滓空心食前溫服日三服或下膿加厚朴去粗皮以薑汁炙一兩或嘔逆加陳橘皮湯浸去白焙一兩治冷痢不調水痢不止黃連散方黃連去須炒無食子燒令煙盡存性黃柏去粗皮炙酸石榴皮炒乾薑炮各一兩上五味搗羅為散每服三錢匕空心日午米飲調服治冷痢及赤白滯下附子湯方附子炮裂去皮臍半兩黃連去須炒一兩阿膠炙令燥三分甘草炙銼乾薑炮各半兩赤石脂厚朴去粗皮薑汁炙各一兩上七味銼如麻豆大每服五錢匕水一盞半煎至八分去滓溫服空心食前日三治冷痢㽲痛腸滑不差黃連湯方黃連去須炒半兩阿膠炙令燥鼠尾草洗淨慢火焙乾當歸切焙乾薑炮各三分上五味粗搗篩每服四錢七若冷甚白多以酒一盞半煎至八分去滓空心溫服日午再服若熱及不痛即去乾薑當歸用水煎依前服治冷痢熟艾湯方熟艾炒附子炮裂去皮臍各半兩黃連去須炒一兩阿膠炙令燥三分甘草炙銼乾薑炮赤石脂各半兩上七味銼如麻豆每服三錢匕水一盞煎至七分去滓空心食前溫服日三治冷痢厚朴飲方厚朴去粗皮薑汁炙一兩肉豆蔻去殼半兩龍骨白朮各三分上四味銼如麻豆每服四錢匕水一大盞入生薑三片同煎至七分去滓空心食前溫服日三治冷痢下色白食不消甘草湯方甘草炙銼半兩黃連去須炒附子炮裂去皮臍各三分阿膠炙令燥半兩上四味銼如麻豆每服五錢匕水一盞半煎至八分去滓空心日午溫服日二治冷痢訶黎勒湯方訶黎勒炮去核三分高良薑白芍藥枳殼去瓤麩炒白茯苓去黑皮各半兩厚朴去粗皮薑汁炙三分上六味㕮咀如麻豆每服五錢匕水一盞半入生薑三片煎至八分去滓空心食前溫服日三如腹脹加人參半兩甘草半兩炙治冷白滯痢腹痛龍骨湯方龍骨一兩半當歸切焙厚朴去粗皮薑汁炙各一兩赤石脂一兩半上四味粗搗篩每服五錢匕水一盞半煎至八分去滓空心食前溫服日三或熱加白頭翁三分水洗曬乾牡蠣一兩燒令赤治一切冷痢附子丸方附子炮裂入水少時去皮臍乾薑炮熟艾微炒為末各一兩上三味搗羅為末以新汲水調面拌和為丸如彈子大每服二丸用面一錢匕以水一盞半化開煎三五沸空心服之服後覺熱以飯壓之或患冷病丸如梧桐子大空心米飲下三十丸至五十丸治大腸積冷下痢不止裡急後重疼痛五神散方附子炮裂去皮臍半兩乾薑炮訶黎勒炮去核延明索各一兩烏梅去核半兩上五味為粗散和白麵裹慢火內燒令面熟為度去面焙乾搗羅為細散每服一錢匕空心食前米飲調下治冷極泄瀉久作腸滑不禁不欲飲食玉粉散方附子炮裂去皮臍紅豆乾薑炮各一兩三味同搗羅為末硫黃研如粉一兩上四味再同研令極細每服一錢匕稀粟米粥調候溫冷得所服之治大腸虛滑冷痢日夜不止火輪散方附子炮裂去皮臍一兩肉豆蔻去殼半兩乾薑炮一分上三味搗羅為散每服一錢匕陳粟米飲調下空心食前服治脾胃虛冷下痢滑泄不思飲食治一切冷氣訶黎勒湯方訶黎勒炮去核厚朴去粗皮薑汁炙甘草炙銼白朮草豆蔻去皮陳橘皮湯浸去白焙各一兩上六味粗搗篩每服三錢匕水一盞入生薑三片棗二枚劈破同煎至七分去滓食前溫服治脾臟冷滑不止腹痛㽲刺和陰氣進飲食烏頭湯方烏頭生去皮臍四兩切作片子益智去皮三兩乾薑生青橘皮湯浸去白焙各二兩蘹香子炒一兩上五味銼如麻豆每服二錢匕水一盞入鹽少許煎至六分去滓溫服如小腸氣攻刺急煎一兩服熱服治冷痢久不差乾薑丸方乾薑炮附子生去皮臍赤石脂黃連去須各一兩上四味搗羅為末麵糊和丸如梧桐子大米飲下二十丸加至三十丸日三服治冷痢不消化食已腹中脹痛氣滿地榆丸方地榆六兩赤石脂龍骨各一兩三分厚朴去粗皮生薑汁炙烏梅肉炒乾薑炮各一兩半黃連去須二兩半白朮當歸切焙艾葉炒各一兩一分甘草炙銼一兩上一十一味搗羅為末煉蜜和丸如梧桐子大每服三十丸米飲下空心食前日二服治冷痢久不瘥臍腹㽲痛時下白膿食物不消茱萸人參丸方吳茱萸炒人參芎藭桔梗炒枳實炒甘草炙銼各一兩乾薑炮陳曲炒各四兩附子炮裂去皮臍二兩上九味搗羅為末煉蜜和丸如梧桐子大每服三十丸米飲下空心食前治冷痢下膿血臍腹㽲痛脹滿食不消化吳茱萸丸方吳茱萸湯洗焙乾炒乾薑炮各一兩半赤石脂陳曲炒各二兩厚朴去粗皮生薑汁炙當歸切焙各四兩上六味搗羅為末煉蜜和丸梧桐子大每服三十丸米飲下空心食前日二服治冷痢腹痛不止黃連散方黃連去須炒厚朴去粗皮生薑汁炙各一兩乾薑炮木香一半生一半炒甘草炙銼阿膠炙燥陳曲炒各三分訶黎勒皮一半生一半煨一兩上八味搗羅為散每服二錢匕米飲調下治遠年冷痢食物不化或青或黃四肢沉重起即目眩兩足逆冷時苦轉筋赤石脂丸方赤石脂艾葉炒各一兩乾薑炮三兩蜀椒去目並閉口者炒出汗三百粒烏梅肉炒五兩上五味搗羅為末煉蜜和丸梧桐子大每服二十丸米飲下空心食前日三服治冷痢四白散方龍骨白石脂胡粉熬令黃白礬燒成灰各半兩上四味搗研為散每服二錢匕米飲調下熱痢論曰凡痢色黃色赤並熱也甚則下血汁此由腸胃虛弱邪熱之氣乘虛入客於腸間故其證下痢黃赤或血雜下腹間熱痛小便赤澀身熱煩渴故謂之熱痢治熱痢不止生地黃湯方生地黃半兩甘草炙一分地榆三分上三味㕮咀如麻豆大水二盞煎至一盞去滓分溫二服空心日晚再服治熱毒痢注下赤黃苦參丸方苦參陳橘皮湯浸去白焙獨活去蘆頭阿膠生用藍青黃連去須鬼臼黃柏去粗皮甘草炙上九味等分除阿膠外為末以水煮阿膠和並手丸如梧桐子大每服十丸米飲下日三服治卒下痢大良治諸熱痢不差烏梅丸方烏梅肉炒黃連去須各四兩上二味搗羅為末煉蜜和丸如梧桐子大每服二十丸米飲下日二夜一服治熱痢無度黃連散方黃連去須一兩雞子二枚上二味搗羅黃連為散取雞子白和藥為餅子燒令黑再搗羅為細散每服三錢匕空心粥飲調下日晚再服治一切熱痢黃連丸方黃連去須二兩半羚羊角鎊黃柏去粗皮各一兩半赤茯苓去黑皮半兩上四味搗羅為末煉蜜為丸如梧桐子大每服二十丸姜蜜湯下暑月下痢用之尤驗治挾熱痢多下赤膿黃連散方黃連去須灶突中黑塵各一兩上二味搗羅為細末每服二錢匕溫酒調空心服日再治夏月暴下熱痢甘草湯方甘草炙銼半兩生薑切一分生蜜一合上三味用漿水五合同煎至四合去滓空心溫分二服治熱痢腹內㽲痛日夜百行氣欲絕黃連湯方黃連去須一升附子炮裂去皮臍一兩龍骨白朮各二兩阿膠炙燥乾薑炮當歸焙赤石脂各三兩上八味㕮咀如麻豆大每服五錢匕水一盞半煎至八分去滓溫服治熱痢蒲根湯方蒲根銼二兩粟米淘二合上二味以水三盞煎取一盞半去滓分溫二服空心日午再服赤痢論曰熱痢之甚者為赤痢本由腸虛為風邪所傷又挾邪熱血得熱而妄行乘虛必湊滲入腸中與痢相雜其色純赤名為赤痢若腸虛不復則為久赤痢變成嘔噦疳䘌之候矣治痢下黃赤水或黃赤膿四肢煩皮膚冷者黃柏丸方黃柏去粗皮一兩黃連去須炒二兩熟艾半兩黃芩去黑心一兩一分上四味搗羅為末用白蜜三兩煉熟入蠟一兩熔化入前藥末和搗丸如梧桐子大每服三十丸空心米飲下日晚再服治諸熱毒痢下黃汁及如赤爛豆汁如赤帶狀又如魚腦壯熱牡蠣湯方牡蠣煅過研白頭翁焙當歸切焙犀角鎊艾葉炒甘草炙銼桑寄生銼各半兩黃柏去粗皮蜜炙柏黃連去須炒黃芩去黑心升麻酸石榴皮炙各三分上一十二味粗搗篩每服五錢匕水一盞半煎至一盞去滓空心溫服日午再服治赤痢腹痛四肢羸困伏龍肝丸方伏龍肝艾葉炒木香地榆阿膠炙令燥當歸切炒黃連去須炒赤芍藥黃芩去黑心各一兩上九味搗羅為末煉蜜丸如梧桐子大每服三十丸溫粥飲下不拘時治暴赤痢如鵝鴨肝其痛不可忍黃連湯方黃連去須炒黃芩去黑心各二兩上二味粗搗篩每服三錢匕水一盞煎至七分去滓熱服不拘時治赤痢腹內疼痛無食子丸方無食子地榆各半兩黃連去須炒一兩半黃柏去粗皮蜜炙二兩酸石榴皮一兩上五味搗羅為末醋煮麵糊丸如梧桐子大每服十五丸食前溫米飲下治赤痢及赤白等痢茯苓丸方赤茯苓去粗皮當歸黃連去須炒黃柏去粗皮各一兩上四味搗羅為末煉蜜丸如梧桐子大每服二十丸空心米飲下赤白痢加阿膠末一兩治熱痢香連丸方木香黃連去須炒甘草炙銼肉豆蔻去殼上四味等分搗羅為末沙糖和丸如梧桐子大每服十五丸空心米飲下更以意加減治諸痢久不瘥黃連丸方黃連去須炒一兩烏梅肉炒乾一兩半爛發灰汁洗淨燒灰三兩上三味搗羅為末用蜜二兩半煉熟入蠟一兩醋二合羊脂一兩煎令蠟化入前藥末於銅器中重湯熬令可丸即丸如梧桐子大每服三十丸空心米飲下日再治一切痢二黃丸方黃柏去粗皮一兩黃連去須炒一兩半羚羊角鎊赤茯苓去黑心各半兩上四味搗羅為末煉蜜丸如梧桐子大每服三十丸空心米飲下日再薑湯亦得治赤痢兼大腸下血黃連散方黃連去須炒黃柏去粗皮蜜炙厚朴去粗皮生薑汁炙木香各一兩上四味搗羅為散每服三錢匕空心粥飲調下日午再服治一切痢疾地榆湯方地榆樗皮去粗皮炙黃連去須炒各一兩當歸切炒陳橘皮湯浸去白炒枳殼去瓤麩炒桂去粗皮桔梗炒各三分大腹皮一兩半甘草炙銼半兩上一十味粗搗篩每服五錢匕水一盞半生薑五斤煎至一盞去滓空心溫服治赤痢不止枳殼散方枳殼胡桃各七枚皂莢不蚛者一挺上三味就新瓦上以草火燒令煙盡取研極細分為八服每臨臥及二更五更時各一服荊芥茶調下治赤痢腹痛紫參散方紫參三分肉豆蔻去殼一兩烏賊魚骨去甲二兩上三味為細散每服一錢匕食前溫米飲調下治因冷飲食變成赤痢黃連湯方黃連去須一兩桂去粗皮一兩白芷一兩半赤石脂一兩半肉豆蔻一枚煨火殼地榆一兩訶黎勒皮煨一兩半黃芩去黑心半兩附子炮裂去皮臍一兩半當歸焙一兩黃耆一兩半吳茱萸洗炒一兩上一十二味銼如麻豆每服五錢匕水一盞半入生薑五斤煎至一盞去滓空腹溫服日三治赤痢腹痛或下純血六神湯方黃連去須炒車前子各二兩地榆山桅子仁甘草炙銼各半兩陳橘皮湯浸去白焙一兩上六味粗搗篩每服五錢匕以漿水一盞半煎至八分去滓空心服
