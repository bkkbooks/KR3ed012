body:
  text: 卷第六十三嘔吐門嘔吐統論論曰人之陰陽升降三焦調順脾胃和勻乃能腐熟水穀變化糟粕傳瀉行導下走腸間若脾胃虛冷水穀不化則陰陽痞隔三焦不調濁陰之氣不能下行奔衝於上故發為嘔吐然吐逆之病有得之於隔實者有生於中滿者有發於下焦者種種雖不同悉本胃氣逆則嘔吐蓋胃者水穀之海三焦者水穀之道路胃氣宣通則上焦如霧中焦如漚下焦如瀆命曰平人胃既虛弱水穀停滯致三焦格拒升降不勻其氣虛滿得食則嘔而又有朝食暮吐暮食朝吐者有食已即吐者有嘔吐谷不得前者有但嘔而無所出者有先嘔卻渴者有先渴卻嘔者有嘔家本渴而反不渴者其本其治各各不同假令內格嘔逆食不得入是有火也病嘔而吐食久反出是無火也舉此二者乃知嘔吐之名則一治療之法各異雖治法有冷熱虛實之別要當以安其胃氣為本使陰陽升降平均嘔逆之病順而愈矣嘔吐論曰嘔吐者胃氣上而不下也譬之通瓶小口頓溉不入乃升氣所礙人病嘔吐其理如此蓋脾胃氣弱風冷干動使留飲停積飲食不化胃氣虛脹心下澹澹其氣上逆故令嘔吐也治嘔吐除中滿痞氣痰逆噁心宿昔成積面黃腹脹臟腑不調水穀不化調順脾胃沉香煎丸方沉香銼丁香木香胡椒沒藥研丹砂別研水飛高良薑檳榔麵裹煨熟去面硇砂明淨者別研水飛用石器慢火熬干青橘皮去白焙硫黃別研水飛各一兩阿魏醋浸開白麵同作餅子炙令焦熟縮砂去皮吳茱萸取陳久者湯浸取沉者炒各半兩巴豆去皮心膜研細新瓦上攤去油盡一分上一十五味除研藥外搗羅為末再入研藥研勻煉蜜丸如綠豆大瓷盒貯封每服二丸食前臨臥溫生薑橘皮湯下更量虛實大小加減治脾胃虛寒痰飲停滯嘔吐不止豆蔻湯方肉豆蔻三枚去殼桂去粗皮零陵香芎藭各一兩莎草根二十一枚炮陳橘皮去白炒一兩甘草炙三分上七味粗搗篩每服二錢匕水一盞入生薑三片棗二枚劈煎至六分去滓溫服治脾胃虛寒痰盛嘔吐厚朴丸方厚朴去粗皮薑汁炙一斤半夏洗去滑焙切半斤棗生絹袋盛三斤生薑三斤研取汁盡更入水二碗絞取汁上四味銀器內用文武火煮盡薑汁取厚朴半夏焙乾搗羅為末棗去皮核入前藥於臼中再搗為末如梧桐子大每服空心臨臥溫酒下二十丸治脾胃虛寒痰盛嘔吐不止飲食不化藿香飲方藿香葉厚朴去粗皮薑汁炙令熟各一兩青橘皮湯浸去白切麩炒三分甘草炙三分桂去粗皮半兩乾薑炮一分半枇杷葉拭去毛炙一分上七味粗搗篩每服三錢匕水一盞生薑三片棗二枚劈破煎至七分去滓溫服不計時候治脾胃虛冷嘔吐痰涎胸膈痞悶不思飲食七寶湯方人參白茯苓去黑皮甘草微炙連皮大腹各一兩訶黎勒五枚煨去核草豆蔻四枚麵裹煨去皮半夏一分生薑自然汁炒黃上七味粗搗篩每服三錢匕水一盞生薑三片棗二枚劈破同煎至六分食前去滓溫服治脾胃虛寒痰盛嘔吐不定藿香半夏丸方藿香葉半兩半夏一兩搗碎炒丁香皮舶上者丁香各半兩水銀沙子一分研上五味搗羅為末同水銀研勻酒煮麵糊和丸如梧桐子大每服七丸至十丸生薑人參湯下不拘時候治脾胃虛寒嘔吐不止桂心湯方桂去粗皮乾薑炮半夏湯洗去滑炒各一分上三味粗搗篩每服三錢匕水一盞入生薑三片煎至六分去滓空心溫服治脾胃虛寒痰飲留滯嘔吐不止濟急散方附子一枚切下蓋取出肉內丁香在內丁香四十九枚上二味用生薑自然汁略浸附子於瓷瓶中重湯煮之令乾搗羅為細散每服一錢匕含化咽津治脾胃虛寒痰涎壅滯嘔吐不止半夏飲方半夏三分薑汁浸炒白朮一兩檳榔五枚生銼甘草生銼半兩上四味粗搗篩每服五錢匕水一盞煎至八分去滓熱服不計時候治脾胃虛寒痰盛嘔吐不食半夏橘皮飲方半夏洗去滑焙陳橘皮去白焙甘草炙桂去粗皮各三分人參一兩一分大腹一枚銼上六味粗搗篩每服五錢匕水二盞入生薑三片煎至一盞去滓溫服不拘時候治嘔吐不止消痰下氣厚朴散方厚朴去粗皮銼薑汁浸一宿炒四兩生薑二斤淨洗切片熬乾炒令紫色甘草銼炒二兩陳橘皮湯去白炒六兩草豆蔻去皮銼細炒二兩上五味搗羅為散每服二錢匕沸湯入鹽點服脾氣等疾每服三錢匕水一盞姜二片棗二枚劈破煎至六分溫服治嘔吐軟紅丸方丹砂研砒霜研各半錢胭脂一錢巴豆七粒取霜上四味研細熔蠟少許入油三兩滴和藥為劑以油單裹之大人旋丸如綠豆大小兒如芥子濃煎槐花甘草湯放溫下一丸勿熱食半時久治食飲不下嘔逆清水面目虛腫和胃湯方人參二兩赤茯苓去黑皮一兩半茅根一兩甘草炙半兩竹茹三分半夏湯洗七遍焙一兩木通銼三分上七味粗搗篩每服三錢匕水一盞生薑三片棗二枚劈破煎至七分去滓溫服治嘔吐不下食前胡湯方前胡去蘆頭麥門冬去心焙人參淡竹茹芍藥陳橘皮湯去白焙半夏湯洗七遍焙等分上七味銼如麻豆大拌勻每服三錢匕水一盞生薑三片煎至七分去滓食前溫服治嘔吐不下食頭痛身熱柴胡知母飲方柴胡去苗一兩知母焙半兩蘆根銼三分檳榔一兩人參半兩陳橘皮半兩上六味搗篩為散每服三錢匕水一盞生薑五片同煎至六分去滓熱服治膈氣脾胃虛冷多嘔吐酸水人參散方人參一兩去蘆頭檳榔一兩高良薑半兩銼陳橘皮一兩湯浸去白瓤焙蓽茇一兩白朮一兩上六味粗搗為散每服三錢匕水一盞生薑五片同煎至六分去滓熱服治胸滿氣逆食不消化嘔吐陳橘皮散方陳橘皮一兩湯浸去白瓤焙白朮二兩人參一兩去蘆頭胡椒半兩肉豆蔻一兩甘草半兩炙微赤銼上六味搗羅為散每服四錢匕水一盞生薑五片同煎至六分去滓稍熱服治脾胃虛弱不思飲食嘔吐茯苓湯方茯苓去粗皮知母白朮枳殼麩炒去瓤人參去蘆頭甘草微炙赤銼蘆根切半夏湯洗去滑各一兩上八味粗搗篩每服三錢匕水一盞半入生薑七片薤白二寸切同煎至七分去滓不拘時溫服治嘔吐厥逆不思飲食白朮湯方白朮丁香甘草炙銼陳橘皮去白焙木香各半兩大腹銼枳殼去瓤麩炒訶黎勒炮去核各三分草豆蔻去皮一兩上九味粗搗篩每服三錢匕水一盞入生薑五片同煎至七分去滓空心溫服治上焦壅熱食飲不下嘔吐兩脅痛半夏湯方半夏湯洗七遍焙人參柴胡去苗麥門冬去心焙各三分赤茯苓去黑皮竹茹桂去粗皮蘆根銼各半兩甘草炙銼一分上九味粗搗篩每服五錢匕水一盞半入生薑五片同煎至八分去滓溫服治上焦壅熱見食嘔吐頭痛目赤石膏竹茹湯方石膏二兩竹茹焙人參白茅根半夏湯洗七遍炒各一兩玄明粉桔梗炒甘草炙銼葛根銼各半兩上九味粗搗篩每服五錢匕水一盞半入生薑五片同煎至八分去滓溫服治胸滿氣逆嘔吐不思食白朮散方白朮銼炒人參各二兩丁香甘草炙銼各三分白茯苓去黑皮一兩半草豆蔻去皮陳橘皮去白焙乾薑炮裂各一兩桔梗炒半兩上九味搗羅為散研勻每服二錢匕生薑棗湯調下治脾胃氣虛弱嘔吐不食腹中虛鳴陳橘皮丸方陳橘皮去白焙四兩厚朴去粗皮生薑汁炙銼一兩肉豆蔻去殼乾薑炮裂木香吳茱萸醋炒焙白朮銼炒訶黎勒皮桂去粗皮各三分甘草炙銼一分枳殼去瓤麩炒沉香銼芍藥炒丁香阿魏各半兩酒煮後細研更用酒煎入少陳曲末同煎成膏丸諸藥末上一十五味搗羅十四味為末用阿魏煎和丸梧桐子大每服二十丸空心米飲下治冷氣嘔吐及吐食附子散方附子生去皮臍一枚上一味切作四片用生薑汁五合浸一宿取出火上炙乾入生薑汁浸良久又蘸薑汁炙直候薑汁盡搗羅為散每服二錢匕米飲調下治嘔吐不下食紫粉丸方針沙上以醋浸一夜去醋便帶醋炒直候銚子紅色無煙乃止放冷細研更用醋團火燒通赤取候冷再研極細麵糊丸如梧桐子大每服四十丸粥飲下服訖便啜一盞粥已不吐如未定再服決定小兒小丸之隨兒大小與之治嘔吐不下食頭痛人參丸方人參三兩半夏湯洗七遍焙二兩前胡去蘆頭一兩鉛丹研半兩上四味搗羅為細末煮棗肉丸如梧桐子大每服二十丸生薑湯下食後乾嘔論曰嘔而欲吐吐而無所出故名乾嘔此由陰陽不和胃中虛氣逆上行不能下故有乾嘔之證治胃氣逆乾嘔噁心參苓散方人參白茯苓去黑皮藿香葉各一兩丁香枝甘草炙銼各半兩葛根銼一兩上六味搗羅為散每服二錢匕沸湯點服不拘時候治心胸痞悶痰逆噁心吞酸噫食腹脅疼痛肢體倦怠和益脾胃思進飲食闢除邪氣麝香平氣丸方麝香別研木香沉香丁香肉豆蔻去殼丹砂別研各半兩檳榔焙銼桂去粗皮厚朴去粗皮塗薑汁炙乳香生薑汁內煮軟候冷別研如膏各一兩半夏湯洗七遍切焙乾搗為末薑汁和作餅子焙乾別搗為末一兩上一十一味除別搗研外並搗羅為末次入丹砂麝香再研勻將乳香半夏末入生薑汁煮作薄糊和前藥硬軟得所丸如梧桐子大每服十五丸至二十丸食後溫米飲下治胃氣不和乾嘔噁心大補虛損四倍散方訶黎勒煨去核一兩人參二兩白茯苓去黑皮四兩白朮半斤上四味搗羅為散每服二錢匕鹽少許沸湯點服如欲煎每服三錢匕水一盞生薑五片棗兩枚劈破同煎至七分溫服空心食前治乾嘔噁心益津液和胃氣生薑丸方生薑二斤和皮切作片子以鹽三兩淹一宿慢火焙乾甘草炙銼陳橘皮湯浸去白焙各四兩香白芷縮砂去皮胡椒各一兩蓬莪朮炮二兩上七味搗羅為末以麵糊和丸如小彈子大細研丹砂為衣每服細嚼一丸溫酒下食前治乾嘔和胃氣養津液生薑湯方生薑細切絲十二兩草豆蔻去皮四兩甘草生銼半斤上三味先搗草豆蔻甘草為末同薑絲爛研勻捏作餅子焙乾再搗羅為末每服一大錢鹽湯點服空心食前治乾嘔除邪熱和胃進食安中散方小麥炒黃四兩乾薑銼炒一兩甘草炙陳曲炒各半兩上四味搗羅為散每服二錢匕棗湯調下治乾嘔和胃順氣厚朴散方厚朴去粗皮一斤生薑半斤去粗皮切焙大棗一升去核焙甘草四兩上四味用水三斗煮盡水為度爛搗拍作餅子焙乾再搗為散每服一錢沸湯點服治乾嘔和胃氣青橘散方青橘皮湯浸去白甘草銼各一兩木香半兩白芷一分桂去粗皮枳殼去瓤麩炒各半兩上六味先將甘草炒微黃色後入諸藥同炒褐色搗羅為末每服二錢匕入鹽沸湯點治乾嘔和胃下氣木香散方木香丁香檀香各半兩銼人參沉香銼白茯苓去黑皮各一兩甘草檳榔銼各一分上八味約水多少慢火熬水盡焙乾搗羅為細末每服一錢匕入鹽沸湯點治乾嘔和調胃氣小丁沉丸方丁香半兩沉香甘草炙縮砂仁白芷炒黃益智去皮各一兩木香蘹香子炒各半兩陳橘皮湯浸去白焙一兩生薑一斤細切入青鹽四兩拌勻淹一宿焙乾阿魏一分用醋半升煎為膏上一十一味除阿魏外搗羅為末入阿魏膏拌勻醋煮麵糊和丸如雞頭實大研丹砂麝香各少許同為衣空心姜鹽湯嚼下一丸治乾嘔和胃下氣草豆蔻湯方草豆蔻去皮藿香用葉各半兩丁香一分白朮半兩桂去粗皮一分枳殼去瓤麩炒陳橘皮湯浸去白焙山芋各半兩上八味粗搗篩每服三錢匕水一盞棗二枚劈破粟米少許同煎至六分去滓食前溫服治胃腑虛寒其氣上逆乾嘔不止人參湯方人參陳橘皮湯浸去白焙附子炮裂去臍皮草豆蔻去皮各一兩半夏湯浸去滑生薑汁製白朮炒甘草炙銼前胡去蘆頭各三分乾薑炮桂去粗皮各半兩上一十味銼如麻豆每服三錢匕水一盞半生薑五片煎至八分去滓溫服治乾嘔煩悶不入飲食桂參湯方桂去粗皮人參各半兩厚朴去粗皮薑汁炙縮砂仁各一兩白朮半兩陳橘皮湯浸去