body:
  text: 卷第六十黃疸門黃疸統論論曰疸病正有五種一曰黃疸二曰黃汗三曰谷疸四曰酒疸五曰女勞疸一黃疸者遍身面目悉黃如橘二黃汗者身體洪腫汗出如黃柏汁不渴狀如風水三谷疸者食畢頭眩心中怫鬱不安而發黃四酒疸者心中懊痛足腫滿小便黃面發赤斑黃黑由大醉當風入水所致五女勞疸身目皆黃發熱惡寒小腹滿急小便難由大勞大熱房室過傷此五者證狀雖異大率多因酒食過度水穀相併積於脾胃復為風濕所搏熱氣鬱蒸所以發黃為疸其證食已如飢曰胃疸額上黑足下熱曰黑疸其因傷寒時氣後變成黃者緣陽明病無汗小便不利熱瘀在裡心中懊憹身必發黃若被火額上微汗出而但小便不利亦發黃其狀如橘色腹微滿此亦由寒濕不散瘀熱在於脾胃故也然又有九疸三十六黃其證其名悉各不同治皆有法具如後章凡黃病當利其小便疸而渴者其病難治疸而不渴者其病可治黃疸論曰內經謂目黃者曰黃疸又曰安臥脈盛謂之黃疸其外證身體面目及爪甲小便盡黃其內證食已如飢此由酒食過度脾胃有熱復為風濕所搏瘀結不散熱氣鬱蒸故發是疾若面色微黃身體或青赤黑色皆見者與純熱之證不同當於濕家求之諸黃疸發於陰部其人必嘔發於陽部其人振寒而微熱疸而不渴者可治其渴而疸者難治治黃疸目黃小便如血心煩躁悶口苦頭痛茵陳湯方茵陳蒿山梔子仁各三分甘草炙半兩木通銼栝蔞根柴胡去苗各一兩麥門冬去心焙一兩半上七味粗搗篩每服五錢匕水二盞入竹葉三七片同煎至一盞去滓食後溫服治黃疸脾胃積熱皮肉皆黃煩躁口苦小便赤澀木通湯方木通銼瞿麥穗各一兩赤茯苓去黑皮白茅根大青秦艽去苗土各三分生乾地黃上七味粗搗篩每服五錢匕水一盞半煎至八分去滓食前溫服治黃疸遍身面目皆黃黃連湯方黃連去須大青山梔子仁茵陳蒿柴胡去苗地骨皮人參黃芩去黑心芒硝各一兩大黃細銼醋炒二兩上一十味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服不拘時候治黃疸通身並黃柴胡湯方柴胡去苗茵陳蒿各一兩升麻龍膽各三分上四味粗搗篩每服五錢匕水一盞半煎至八分去滓入地黃汁一合攪勻食後溫服治黃疸面黃眼如金色四肢羸弱或時煩渴雞舌香湯方雞舌香秦艽去苗土各三分胡黃連丁香芎藭各半兩柴胡去苗一兩上六味粗搗篩每服三錢匕水一盞煎至六分去滓食前溫服治黃疸身眼皆如金色及諸黃桃根湯方東引桃根一握細切如釵股者佳取時勿見風及避婦人雞犬上一味以水一盞半煎至七分去滓空心溫服如眼中黃色未退可時飲酒一盞治黃疸身體面目皆黃茵陳丸方茵陳蒿三分大黃銼炒黃連去須黃芩去黑心各一兩上四味搗羅為末煉蜜和丸如梧桐子大每服十五丸食後臨臥溫水下治黃疸心中懊憹煩熱梔子湯方山梔子仁半兩枳殼去瓤麩炒一分大黃銼炒一兩上三味粗搗篩每服三錢匕水一盞入豉二十粒同煎至七分去滓溫服不拘時候治諸黃皮肉如金色小便赤黑口乾煩渴白蘚皮散方白蘚皮二兩黃連去須土瓜根芍藥大青梔子仁茵陳蒿栝蔞根柴胡去苗各一兩半芒硝三兩半研入黃芩去黑心一兩貝珠三十枚燒赤研入大黃三兩上一十三味搗羅為散每服三錢匕煎茅根汁調下空腹頓服取利至晚不利再服服了以少蔥豉粥投之治黃疸面目身體皆黃口乾煩躁發熱狂悶茵陳丸方茵陳蒿常山各半兩大黃銼炒三分朴硝研一分豉炒一合上五味搗羅為末煉蜜和丸如梧桐子大每服二十丸食後溫竹葉湯下治中熱黃疸寒熱往來脈數煩困四肢勞倦知母散方知母焙赤茯苓去黑皮常山茵陳蒿黃連去須犀角鎊羚羊角鎊人參各一分柴胡去苗鱉甲醋炙去裙襴甘草炙各半兩龍膽半分上一十二味搗羅為散別入丹砂末半分合研勻瓷合收貯每服二錢匕食前人參湯調下日再治黃疸柴胡湯方柴胡去苗半兩甘草炙一分上二味細銼以水一碗白茅根一握同煎至七分去滓溫服治黃疸面目黃瓜蒂散方瓜蒂一十四枚丁香大者一枚黍米四十九顆上三味研為細散每服一字先含水一口以鼻㗜藥取下黃涎為效治黃疸大小便難喘息促甜葶藶丸方甜葶藶炒二兩大黃銼炒一兩上二味搗羅為末煉蜜和丸如梧桐子大每服二十丸溫米飲下食後臨臥服治黃疸身體面目皆黃大小便秘澀臟腑壅熱黃連散方黃連去須大黃細銼醋炒各二兩黃芩去黑心甘草炙各一兩上四味搗羅為散每服二錢匕食後溫水調下日三治黃疸面黃肌瘦大黃丸方大黃銼一斤芎藭半斤上二味搗羅為末用蜜和成劑甑上炊七遍丸如梧桐子大每服三十丸熟水下空心食前臨臥日三服治身面悉黃大便如濃梔子汁茵陳丸方茵陳蒿柴胡去苗梔子仁各四兩龍膽枳殼去瓤麩炒各二兩黃芩去黑心升麻大黃銼炒各三兩上八味搗羅為末煉蜜丸如梧桐子大每服三十丸飲下以利為度日再治黃疸身體面目爪甲小便俱黃病甚者秦艽煮散方秦艽去苗土一兩上一味搗羅為末用牛乳二盞半煎至一盞半分溫二服空心食前治一切黃病茵陳蒿丸方茵陳蒿四兩大黃銼黃芩去黑心梔子仁各三兩上四味生用為末煉蜜和丸梧桐子大每服米飲下二十丸一日二服量病與之小便金色身皮皆黃並治治黃疸身腫發熱汗出而渴汗出著衣正黃吳藍飲方吳藍芍藥麥門冬去心焙桑根白皮銼防己白蘚皮梔子仁各一兩上七味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服不拘時候急黃論曰諸發熱心戰定必發為急黃謂其卒然發黃心滿氣喘命在頃刻故名急黃也有初得病即身體面目發黃者有初不知是黃死後變黃者但先見其證當急治之此由脾胃有蓄熱穀氣鬱蒸因熱毒所加故有斯病治急黃目如梔子色小便赤心煩悶茵陳湯方茵陳蒿梔子仁黃苓去黑心大黃銼炒白蘚皮黃連去須各一兩朴硝研貝齒煅各半兩上八味除朴硝外粗搗篩每服五錢匕水一盞半煎至一盞去滓入朴硝末一錢匕再煎令沸食後溫服治急黃熱毒攻發舌急眼黃犀角湯方犀角屑三分茵陳蒿梔子仁升麻各半兩黃芩去黑心三分大黃銼炒一兩朴硝研一兩半甘草炙銼半兩上八味粗搗篩每服五錢匕水一盞半入竹葉三七片同煎至一盞去滓食後溫服治天行急黃身如金色茵陳黃連湯方茵陳蒿黃連去須黃芩去黑心大黃銼炒各一兩甘草炙銼人參各半兩上六味粗搗篩每服五錢匕水一盞半煎至一盞去滓食後溫服治急黃煩熱口乾皮肉悉黃赤小豆湯方赤小豆一合丁香秫米瓜蒂薰陸香別研各一分青布五寸燒作灰研麝香別研一錢上七味除研外搗羅為散入研者和勻每服一錢匕米飲調下食後服服後當吐下黃水即瘥治急黃面目如金色渴欲飲水龍膽湯方龍膽一兩木通銼土瓜根各一兩半石膏二兩碎犀角屑一兩梔子仁半兩大黃銼炒一兩半白茅根銼朴硝各一兩上九味粗搗篩每服三錢匕用水一盞煎至七分去滓食後溫服治急黃面目如金色煩渴飲水升麻湯方升麻三分秦艽去苗土一兩凝水石一兩半碎栝蔞根三分朴硝一兩上五味粗搗篩每服三錢匕用水一盞煎至七分去滓食後溫服日三治急黃小便赤黑口乾煩躁白蘚皮散方白蘚皮一兩黃連去須芍藥茵陳蒿大青土瓜根各三分梔子仁半兩柴胡去苗三分黃芩去黑心半兩栝蔞根銼三分大黃銼炒一兩半朴硝一兩貝齒燒一兩半上一十三味搗羅為散每服二錢匕煎茅根湯調下空心服取利為度未利以蔥豉粥投之治急黃煩熱口乾遍體悉黃黑豆煎方黑豆一升上一味用水五盞煎至二盞去豆取汁再煎一盞然後下蜜生地黃汁麥門冬汁生藕汁各二合酥半兩相和慢火煎成膏瓷器盛候冷每服半匙或一匙食後含化日三服治急黃小便赤黑口乾煩躁方蔓荊子取油上一味不計時候頓服如無油即以蔓荊子搗水和絞取汁一盞服之亦得未效再作服治急黃疸方大黃二兩上一味銼碎水三盞生浸一夜平旦取汁入朴硝二兩攪和分作四服每日一服取快利為度陰黃論曰陰黃者面色黃頭痛不發熱不欲聞人聲此由陽伏於陰邪熱沉潛散於肌肉身黃如橘故謂之陰黃昔人有說下之後身目發黃者當於寒澀中求之此其類也治陰黃不欲聞人言小便不利秦艽湯方秦艽去苗土一兩旋覆花半兩赤茯苓去黑皮半兩甘草炙銼半兩上四味粗搗篩每服四錢匕以牛乳一盞煎取六分去滓溫服不拘時候治陰黃身如橘色小便不利茵陳散方茵陳蒿二兩桂去粗皮半兩澤瀉一兩一分赤茯苓去黑皮白朮豬苓去黑皮各三分上六味搗羅為散每服二錢匕溫水調下日三服治陰黃龍膽湯方龍膽秦艽去苗土各一兩半升麻一兩上三味粗搗篩每服五錢匕水一盞半浸藥一宿平旦煎至八分入黃牛乳五合再煎至一盞去滓空心分溫二服日再取利為度治陰黃赤小豆散方赤小豆丁香各三七粒麝香細研一錢瓜蒂二七枚青布灰二錢上五味搗研為散每服一錢匕熟水調下日再服以吐為度更取少許吹鼻中即有黃水出為效治陰黃小便色不變欲自利腹滿而喘者必噦宜半夏湯方半夏湯洗七遍去滑焙一兩人參二兩葛根二兩上三味銼如麻豆每服四錢匕以水一盞入生薑半分切煎取七分去滓不計時候溫服酒疸論曰胃虛谷少醉以入房冒犯風邪胃中熱毒隨虛入里小便黃赤熱毒內聚心下懊痛熏發肌肉則身目發黃或發赤斑足脛浮腫或下之早則變為黑疸令人心如病飢大便黑瘀皮膚不仁治法概宜先去濕毒後分小水余隨證治之治酒疸心中懊痛小便黃赤茵陳湯方茵陳蒿赤茯苓去黑皮葛根銼各半兩梔子仁半分栝蔞根三分秦艽去苗土升麻各一兩上七味粗搗篩每服三錢匕水一盞煎至七分去滓食後溫服日三治酒疸心懊痛足脛滿小便黃面發赤斑或黃黑色此由飲酒大醉當風入水所致黃耆木蘭散方黃耆銼二兩木蘭皮銼一兩上二味搗羅為散每服二錢匕食前熱酒調下日三治酒疸身目俱黃心中懊痛艾葉湯方生艾葉一握無生者乾者亦得麻黃去根節二兩大黃銼炒一兩半上三味銼如麻豆大每服四錢匕以酒一盞半入大豆半合同煎至八分去滓食前溫服治酒疸小便不利或飲少溲多如白泔色凝水石散方凝水石燒令通赤白石脂栝蔞根各一兩一分菟絲子酒浸別搗炒乾知母焙桂去粗皮各三分上六味搗羅為散每服二錢匕煮大麥粥飲調下日三治酒疸小麥飲方生小麥二合上一味以水一盞研絞取汁食後頓服治酒疸腹滿如水狀心中懊憹不能下食時時欲吐桔梗湯方桔梗銼炒百合赤茯苓去黑皮桑根白皮枳殼去瓤麩炒各一兩半檳榔五枚木通二兩上七味銼如麻豆大每服三錢匕水一盞煎至七分去滓食前溫服良久再服治酒疸身面黃心懊痛小便黃赤不利黃連丸方黃連去須黃柏去粗皮黃芩去黑心大黃銼炒梔子仁黃藥子鬱金秦艽去苗土貝母去心甘草炙銼款冬花黃明膠炙令燥白芥子各半兩上一十三味搗羅為末研粳米飯丸如梧桐子大每服十丸煎麥門冬湯下治酒疸通身黃腫木通散方木通銼甘草炙銼木香檳榔銼麻黃去根節秦艽去苗土瞿麥穗乾薑炮上八味等分搗羅為散每服一錢匕白湯點服空心食前日三病甚者用豬膽一枚去汁一半入巴豆一粒薤白二寸在膽內以線系定同青橘皮少許水一盞半煎熟濾去膽取藥湯調下一錢匕治酒疸遍身發黃追毒飲方狗脊去毛一兩白芥子一錢甘草一分上三味細銼用酒一升煎取半升去滓分溫二服利下為度治酒疸心下懊痛身目發黃乳香硇砂丸方乳香研硇砂研安