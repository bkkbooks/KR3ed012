十粒茯苓一分水一盞煎至六分去滓調服須臾當吐吐止即愈治黑疸身體黯黑小便澀茵陳蒿丸方茵陳蒿赤茯苓去黑皮葶藶子微炒各一兩枳殼去瓤麩炒白朮各一兩一分半夏湯洗去滑七遍焙大黃細銼醋炒杏仁湯浸去皮尖雙仁炒各三分蜀椒去閉口及目炒令出汗當歸切焙乾薑炮過各半兩甘遂炮一分上一十二味搗羅為末煉蜜和搗三五百杵丸如綠豆大每服空心米飲下一十丸日三女勞疸論曰脾胃素有濕熱或緣大暑醉飽房勞過度引熱歸腎濕氣交攻小水不利少腹堅脹濕毒流散於肌肉之中則四肢身面發黃故謂之女勞疸然其證又有額上黑微汗出手足心熱薄暮即發膀胱急小便自利者宜各隨其證以治之治女勞疸手足煩熱肢節疼痛小腹拘急時有虛汗鱉甲湯方鱉甲去裙襴塗醋炙一兩半柴胡去蘆頭茵陳蒿地骨皮赤芍藥梔子仁黃耆銼麥門冬去心焙各三分上八味粗搗篩每服三錢匕水一盞煎至七分去滓不拘時候溫服治女勞疸苦參丸方苦參三兩龍膽二兩半梔子仁三兩半上三味搗羅為末以牛膽汁和為丸如梧桐子大每服二十丸溫水下日二夜一稍加至四十丸治女勞疸身目皆黃發熱惡寒小腹滿急小便難由大勞大熱房室傷損得之滑石散方硝石礬石熬令汁枯各一兩上二味合研為散每服一錢匕用大麥煮稀粥飲調下蓋衣出汗其病隨小便出者色黃大便出者色黑治女勞疸及勞氣熱渴額上汗出手足俱熱小便亦澀犀角湯方犀角鎊龍膽各一兩升麻甘草炙各半兩麥門冬去心焙三分上五味粗搗篩每服三錢匕水一盞入生薑一棗大拍碎同煎至七分去滓入生地黃汁一合食後溫服治黃疸病日晡即發熱惡寒小腹滿急體黃額黑大便黑溏泄足下熱此為女勞疸腹滿者難治二石散滑石石膏各一兩碎上二味同研令極細每服一錢匕用大麥煮稀粥調下日三小便利即瘥治女勞疸身目俱黃惡寒發熱少腹滿急小便難滑石散方滑石一兩半礬石熬令汁盡一兩上二味研羅為散每服二錢匕以大麥粥飲調下不拘時候小便出黃水為度又方亂髮如雞子大豬脂半斤上二味同於鐺內以微火煎令發消盡不計時候以溫水調下一匙匕以小便利為度治女勞疸額上黑汗出手足中熱四肢煩疼薄暮發熱小便自利龍膽湯方龍膽去蘆頭甘草炙銼麥門冬去心焙柴胡去蘆頭升麻犀角鎊各三分牡蠣一兩燒研如粉上七味粗搗篩每服三錢匕水一盞煎至七分去滓入生地黃汁半合更煎一兩沸不拘時候溫服治女勞疸額上汗出四肢虛煩日晡發熱小便自利牡蠣湯方牡蠣燒令通赤龍膽升麻麥門冬去心焙甘草炙各三分犀角鎊半兩藁本桂各半兩上八味搗篩為散每服四錢匕水一大盞煎至八分去滓熱服溫復即避風寒
