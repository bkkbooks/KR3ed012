body:
  text: 卷第八十一腳氣門腳氣統論論曰風毒中人隨處悉能為病偏著於腳何耶蓋五臟經絡心肺起於手十指肝腎脾起於足十趾地之蒸濕毒氣足先受之久而不瘥漸及四肢腹背頭項古人所謂微時不覺痼滯乃知所以謂之腳氣也其證不一或見食嘔吐憎聞食臭或腹痛下利或大小便秘澀不通或胸中衝悸不欲見明或精神惛憒或善忘語錯或壯熱頭疼或身體冷痛或時覺轉筋或小腹不仁或髀腿頑痹或緩縱不遂或腫或不腫或百節攣急凡是之類皆腳氣候也巢元方止論緩弱上氣等八證今詳考方籍有陰陽乾溼之異證江東嶺南之異地以至痰壅語澀變成水氣與夫膏藥漬浴等方法匪一故兼明而具載之治法固多矣唯孫思邈云不得大補亦不可大瀉終不得畏虛故預止湯劑此當為治法之最學者宜加意焉風毒腳氣論曰內經謂暑勝則地熱風勝則地動濕勝則地泥寒勝則地裂寒暑風濕之氣皆本乎地人或履之所以毒易中於足也因病從腳起故謂之腳氣又況五臟流注脾與腎肝之經絡皆起足趾故有風毒腳氣之病其證或見食嘔吐或腹痛下痢或便溲不通或胸中驚悸不欲見明或語言錯忘或頭痛壯熱或身體冷疼轉筋脛腫𤸷痹緩縱其狀不一治療不可緩也凡小覺病候有異即須大怖畏決意急治之稍緩氣上入腹或腫或不腫胸中逆滿上氣肩息者死不旋踵寬者數日必死不可不急治也但看心下急氣喘不停或自汗數出或乍寒乍熱其脈促短而數嘔吐不止者死故不可緩也治腳氣痹攣風毒攻注腰腳疼痛風引湯方獨活一兩防風一兩去蘆頭當歸三分赤茯苓一兩大豆二合炒熟人參一兩去蘆頭乾薑三分炮裂附子一兩炮裂去皮臍石槲一兩去根銼上九味搗篩為散每服四錢匕以水酒各半盞煎至六分去滓不計時候溫服治風濕腳氣上攻胸腹壅悶痰逆木瓜丸方木瓜一兩乾者陳皮一兩湯浸去白瓤焙人參一兩去蘆頭桂心半兩丁香半兩檳榔二兩上六味揀淨搗篩為細末煉蜜搜和成劑更搗五百杵丸如梧桐子大每服十五丸煎陳橘皮湯下空心午後日可二三服漸加至三十丸治風毒腳氣疼痛少力筋脈拘急行步艱難木瓜虎骨丸方木瓜宣州者一枚去皮瓤焙麒麟竭研沒藥研各一兩乳香半兩研以上三味同研令勻入在木瓜中卻以元蓋子蓋定用黑豆一斗水淘過安木瓜在內都用豆蓋令蒸爛取出沙盆內研成膏虎脛骨一兩塗酒炙木香自然銅醋淬七遍楓香脂敗龜醋炙去裙襴骨碎補去毛甜瓜子桂去粗皮當歸切焙各一兩地龍去土二兩安息香一兩重湯內酒熬去滓上一十五味除前四味外都搗羅為末並安息香同入木瓜膏內搜和更入臼搗一二百下如藥稍干入少好酒丸如梧桐子大每服三十丸空心木瓜湯下日二治腳氣痹攣不遂風毒攻四肢壯熱如火頭項攣急氣衝胸中大續命湯方當歸二兩芎藭一兩桂心二兩麻黃二兩去根節赤芍藥一兩石膏二兩人參一兩去蘆頭防風二兩去蘆頭黃芩一兩甘草一兩炙微赤銼杏仁一兩湯浸去皮尖雙仁麩炒微黃上一十一味搗篩為散每服四錢匕水一盞生薑半分煎至六分去滓溫服不拘時治風毒腳氣痹攣行步不遂越婢湯方麻黃三兩去根節石膏四兩白朮二兩附子一兩炮裂去皮臍甘草一兩炙微赤銼上五味搗篩為散每服四錢匕水一盞生薑半分煎至六分去滓溫服不拘時治腳氣緩弱皮肉頑痹肢節疼痛木香散方木香三分萆薢一兩銼車前子半兩牛膝細銼酒浸焙乾羚羊角鎊陳橘皮湯浸去白焙杏仁湯退去皮尖炒獨活去蘆頭丹參桂去粗皮杜仲去粗皮細銼炒秦艽去苗土各一兩上一十二味粗搗篩每服三錢匕以水一盞入生薑半分拍破同煎至七分去滓空心溫服日午近晚各一治風毒腳氣上衝臟腑散入四肢虛腫無力沉香丸方雄黑豆一升小圓者淘附子二兩炮裂去皮臍吳茱萸湯浸焙炒青橘皮湯浸去白焙各八兩生薑四兩切碎以上五味用葛布作袋盛內大鍋中以水一斗煮令水盡泣干取袋中豆曬焙乾搗羅為末其餘四味並不用更入後藥沉香銼肉蓯蓉去粗皮切焙白附子炮巴戟天去心各二兩牛膝銼酒浸焙海桐皮銼炙獨活去蘆頭芎藭澤瀉銼山芋生乾地黃切焙羌活去蘆頭各一兩上一十七味除不用四味外搗羅為末拌令勻煉蜜為丸如梧桐子大每服二十丸空心以溫酒下近晚再服治風毒腳氣上衝散入四肢虛腫無力犀角丸方犀角鎊二兩檳榔銼白朮芎藭羌活去蘆頭人參赤茯苓去黑皮木香防風去叉石槲去浮皮及根銼焙牛膝銼酒浸焙乾各一兩上一十一味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心溫酒下日晚再服治風毒上攻下注腳氣等馬藺花煎丸方馬藺花附子炮裂去皮臍切同馬藺花以水一升半煮水乾焙芫花醋炒各一兩巴豆春夏二十二粒秋冬三十八粒拍破和殼同芫花用醋一升半煮醋乾焙白附子炮陳橘皮湯浸去白焙羌活去蘆頭破故紙各一兩牽牛子檳榔銼各半兩上一十味搗羅為末醋煮麵糊為丸如梧桐子大每食前或臥時空心加減自五丸加服丈夫艾鹽湯下婦人橘皮湯下治風毒腳氣攻手腳緩弱沉重木香丸方木香沒藥研附子去皮臍生用烏藥銼蒺藜子炒天南星湯浸一七度焙白附子炮各一兩硇砂研一分木瓜一枚去頭蒂核作甕子上九味先將硇砂研細入木瓜內濕紙五七重裹煨熟爛研成膏次將餘八味搗羅為末以木瓜膏和為丸如桐子大每服十丸空心冷酒下治腎虛冷腎風或頭風兼風毒腳氣等五柔丸方大黃一斤蒸三度前胡去蘆頭二兩半半夏湯洗去滑焙肉蓯蓉去粗皮切焙芍藥赤茯苓去黑皮銼細辛去苗葉葶藶子銚子內隔紙炒微紫當歸銼炒各四兩上九味搗羅為末煉蜜搜和再入臼搗三千杵丸如梧桐子大每服五丸空腹以米飲下加至七丸以大便通利為度日三治風毒腳氣無力𤸷痹四肢不仁失音不語毒風衝心檳榔湯方檳榔銼半兩防風去叉桂去粗皮當歸切焙赤茯苓去黑皮各一兩犀角屑一分麻黃上七味除麻黃外並粗搗篩每服先取麻黃末二錢匕水一盞半煎至十餘沸掠去沫入藥末五錢匕用大棗三枚拍碎同煎至七分去滓空心溫服近晚再服治風毒腳氣昏煩壯熱頭痛嘔吐口乾蘆根湯方生蘆根銼一兩半赤茯苓去黑皮細銼葛根銼知母焙乾麥門冬去心焙淡竹葉炙各三分甘草炙半兩銼上七味粗搗篩每服五錢匕用水一盞半煎至八分去滓食後溫服近晚再服治風毒腳氣上衝散在四肢虛腫無力丁香湯方丁香陳曲炒令黃沉香銼木香各二兩紫蘇子炒三兩乾木瓜焙乾五兩吳茱萸浸洗焙乾炒黃一兩上七味粗搗篩每服三錢匕以水一盞煎至七分去滓空心溫服近晚再服治腳氣並諸風毒黑豆煎方黑豆五升雄者桑根白皮五兩銼以上用水二斗煮令豆爛取淨汁更入後藥羌活去蘆頭為末蒺藜子炒為末海桐皮為末吳茱萸湯洗焙炒乾為末各半兩上六味除前二味取汁外入後四味末一處和勻銀石銚內文武火熬成煎每日空心溫酒半盞調一匙飲之治一切風毒腳氣軟腳等黑豆飲方黑豆三升檳榔煨七枚桑根白皮炙二兩生薑郁李仁湯浸去皮尖炒各一兩上五味銼如麻豆每服五錢匕以水一盞半煎取一盞去滓溫服不拘時治風毒腳氣心胸妨悶多痰咳嗽背髆痛大腸澀芍藥丸方芍藥木香枳殼去瓤麩炒各三分檳榔細銼大黃銼炒各半兩上五味搗羅為末煉蜜為丸如梧桐子大食後溫水下二十五丸加至三十丸治腳氣上攻及風毒走注疼痛趁痛丸方白芥子甘遂大戟以上三味並生為末各一兩半上三味用白麵一兩半滴水同和作餅子爆令焦黃勿令黑色細碾為末用醋煮麵糊為丸如梧桐子大每服一十丸冷酒下不得嚼破量虛實加減服治腳氣吃食不下及一切風毒橘皮丸方陳橘皮一斤以童子小便浸一日去白用炭火半秤燒地令赤以酒一升灑於熱地上將橘皮鋪在地上著盆合一復時朴硝一斤漿水二升煎令水盡白茯苓去黑皮四兩上三味搗羅為末再研細煉蜜為丸如梧桐子大每服三十丸空心米飲下以微利為度如利多即減服治風毒腳氣吳茱萸湯方吳茱萸湯浸三度焙乾炒桂去粗皮各半兩上二味粗搗篩每服三錢匕水一盞入生薑半分拍破同煎至六分去滓食前溫服日晚再服治風毒腳弱痹滿上氣豉酒方豉一斗三蒸三曝上一味以清酒二斗內甕中浸經三宿隨意多少飲之若急待飲即以酒煮豉飲之治風毒腳氣手足拘攣白楊皮酒方白楊皮東南西去地三尺者取一斤半勿令見風去皮細銼熬令黃赤上一味以清酒一斗內不津器中漬之蜜封頭勿令泄氣冬月二七日春夏一七日開取飲量人酒性多少服之日五六服常令酒力相續取瘥為度白楊皮須白色者佳不要近塚墓者治風毒腳氣不仁摩敷神明膏方附子十四枚小者三十枚炮裂去皮臍吳茱萸一兩生用蜀椒去目及合口者炒汗出一兩半白芷銼前胡去蘆頭芎藭銼白朮桂去粗皮當歸切焙各三兩細辛去苗葉二兩防己三兩上一十一味搗碎以新綿裹內淨器中以酢五升浸一宿用臘月豬膏一斗內鍋中煉去筋膜入前酢中與所浸藥以文火煎三上三下候變色稀稠得所濾去滓攪勻成膏瓷器中盛蜜封頭每有患風痹不仁旋取以手揩摩令入皮肉若多腫即去細辛以牛酥代豬膏亦佳治風痹不仁風毒摩前紫膏內有巴豆若用多恐損皮肉莽草膏方莽草用葉當歸白芷防己蜀椒出汗去目及合口者各三兩吳茱萸湯洗焙乾炒丹參芎藭商陸根切焙各四兩沉香木香零陵香雞舌香犀角屑二兩附子去皮臍生使八兩上一十五味銼碎以新綿裹內淨器中以苦酒三升浸經一宿取出用真酥三斤同入鍋中以文火煎三上三下候變色稀稠得所濾去滓裹攪勻傾入瓷器中蜜封頭每有患旋取以手塗摩敷之揩令入皮肉治風毒腳氣骽膝𤸷痹腫行履不得皮膚如小蟲行宜淋渫方羊桃蒴藋蒺藜子蒼耳海桐皮柳木蠹末柴胡茯苓皮水葒各一兩上九味銼細以水五斗煎取三斗去滓淋渫慎避風冷治腳氣妨悶不下食瘦弱腹痛二香丸方木香檳榔銼各二兩雞舌香吳茱萸湯洗焙乾炒當歸銼焙陳橘皮湯去白焙訶黎勒皮煨生薑切焙各一兩半上八味搗羅為細末煉蜜和丸如梧桐子大食前煎橘皮湯下三十丸治腳氣初覺風毒攻作腳膝虛腫筋骨疼痛或𤸷痹不知痛癢或氣喘煩悶宜速服大腹飲方大腹並子銼十枚杏仁湯浸去皮尖雙仁者木瓜切焙生薑切片桑根白皮銼各二兩吳茱萸湯洗再焙乾炒二分黑豆五升上七味先將豆並生薑以水五盞煎令浮去豆即將余藥粗搗篩入湯內同煎至三盞去滓分溫二服空心服良久再服取利為度治風毒腳氣骽膝𤸷痹腫行步不得皮膚如蟲行宜淋渫方露蜂房水葒茵芋附子生各二兩蒴藋四兩蜀椒去目並閉口一兩上六味銼碎以水五斗煎去滓取三斗淋渫慎避風治風毒流注腳膝腫滿不消順氣丸方木香青橘皮湯去白焙乾檳榔銼各半兩黑牽牛炒一兩半郁李仁一分麻仁三分別研入上六味搗羅五味為細末入麻仁煉蜜和丸如梧桐子大每服二十丸麻仁湯下腳氣緩弱論曰腳氣緩弱者由腎臟虛風入其經故筋弛縱而酸弱內經謂緩風濕痹是也古方載蘇氏論亦云不腫而緩弱行攣屈倒漸至不仁蓋風濕毒氣之感人多不即覺或因他疾乃始發動初若不足畏馴察其狀自膝至腳已有不仁或痹痛或如蟲喙或足趾及脛痠痛或屈弱不能行皆緩弱之證也治腳氣手足緩弱膝疼痹上熱下冷或時心悶或即嘔逆牛膝湯方牛膝去苗酒浸焙銼萆薢麥門冬去心焙乾赤茯苓去黑皮黃耆銼炒芎藭防風去叉丹參各一兩半陳橘皮湯