body:
  text: 卷第一百二眼目門眼目統論論曰內經曰肝主目又曰在臟為肝在竅為目難經曰肝氣通於目目和則知五色矣內經又曰心者五臟專精也目者其竅也夫目既為肝之竅矣又為心之竅何也曰目者五臟之精華固不專於肝也所謂骨之精為瞳仁筋之精為黑睛血之精為絡窠氣之精為白睛肉之精為約束是也析而言之則通乎五臟合而言之則主於肝夫惟通乎五臟故曰精明五色者氣之華於此乎觀五臟有餘不足六腑強弱形之盛衰以此參伍決死生之分夫惟主於肝故肝虛寒則目䀮䀮視物生花肝實熱則目痛如刺肝中寒則目昏而瞳子痛肝熱沖睛則目眥赤痛生息肉不特如此神志俱悲而泣下則以水火相感故也一水不勝五火而目盲則以陰陽各並故也夫五臟陰陽其變動俱感於目又況攝養失宜動過生疾者耶或多熱食或嗜五辛或喜怒不時或房室不節以至凌寒冒暑處濕當風哭泣不寐凡過用目力皆致疾病其候不一養生者不可不知也肝虛眼論曰肝虛眼其證不一巢氏析之有忽然發腫者有淚出不止者有睛生翳暈者有視物漠漠不能遠視者有精彩昏濁黑白不明而暈者蓋肝開竅於目腑臟精華之所聚也氣血既衰不足以榮養故證狀之異如此龍木論有肝臟虛熱外障謂其證忽發昏澀淚出癢痛摩隱瞳仁黑睛漸生翳障視物不明者宜審治之治肝腎久虛積熱風毒攻注兩眼內惡翳遮睛瞼赤癢痛風淚隱澀難開聖餅子方川芎四兩香附子三兩藁本茸甘草炙小椒出汗各二兩去目蒼朮一斤米泔浸切炒乾末薄荷葉四錢蟬殼一兩蛇蛻皮一兩上九味搗篩為散煉蜜和勻杵一千下丸如彈子捻作餅每服一餅芝麻一捻同細嚼茶酒送下一日三服一月必效治肝虛風毒氣眼目昏多淚澀痛菊花散方菊花半兩牛蒡子半兩炒甘草半兩炙微赤銼上三味搗羅為末每服二錢匕溫水調下治肝腎久虛眼目昏暗五倍丸方紫巴戟去心一兩枸杞子二兩菊花三兩旋覆花四兩蕤仁五兩湯浸去皮別研細上五味搗研為末用陳粟米粥和丸如梧桐子大臨臥好茶下二十丸冷淚多赤目翳膜昏暗可一兩服效氣暈不睹物可半劑治肝虛眼昏澀淚出翳生或散或聚初時即輕青葙子丸方青葙子二兩車前子細辛去苗葉生乾地黃焙澤瀉菟絲子酒浸別搗各一兩半防風去叉赤茯苓去黑皮茺蔚子五味子人參各一兩上一十一味搗羅為末煉蜜丸如梧桐子大每服空心茶湯下十五丸加至二十丸治積熱不散目赤腫痛或生障翳瀉肝湯方柴胡去苗芍藥決明子微炒青葙子桂去粗皮升麻各二兩梔子仁一兩上七味粗搗篩每服五錢匕水一盞半入竹葉七片煎取七分去滓入芒硝半錢匕放溫食後服取利為度治肝氣不足兩脅拘急痛寒熱目不明甘草湯方甘草炙銼防風去叉各一兩烏豆一合桂去粗皮細辛去苗葉各半兩柏子仁白茯苓去黑皮各二兩蕤仁去皮一兩爛研上八味粗搗篩每服五錢匕水一盞半棗二枚劈破同煎至七分去滓食後臨臥服治肝虛風眼睛疼風眩目如欲脫視物不得眉間疼重前胡湯方前胡去蘆頭防風去叉決明子炒黃連去須枳殼去瓤麩炒細辛去苗葉車前子升麻各一兩苦參二兩菊花三分上一十味粗搗篩每服五錢匕水一盞半煎至八分去滓食後臨臥服治肝虛受風筋脈拘急手足𤸷痹目視不明五加皮湯方五加皮銼玄參獨活去蘆頭桑根白皮銼各一兩茯神去木麥門冬去心焙各二兩上六味粗搗篩每服五錢匕水一盞半煎至八分去滓投荊瀝半合再煎三兩沸空心晚食前溫服治肝虛中風頭痛目眩昏暗胸中客熱心煩悶升麻湯方升麻羚羊角鎊葛根銼前胡去蘆頭酸棗仁地骨皮各一兩上六味粗搗篩每服五錢匕水一盞半煎至七分去滓入竹瀝半合食後臨臥溫服治肝虛寒眼目昏暗脅下痛脹滿氣急檳榔湯方檳榔銼生用陳橘皮湯浸去白桔梗各一兩白茯苓去黑皮一兩半附子炮裂去皮臍吳茱萸湯洗焙乾炒桂去粗皮各半兩白朮二兩上八味粗搗篩每服五錢匕水一盞半入生薑一棗大拍碎煎至八分去滓溫服不拘時候若氣喘急加半夏半兩薑湯洗去滑芎藭甘草各一兩治腎虛眼目昏暗及風毒上衝腦脂流下變為內障摩頂膏方生麻油二大升酥三兩蓮子草汁一大升七八月採淡竹葉一握長石別研一兩半一名理石槐子一兩一分曾青研一兩鹽花三兩梔子葉朴硝碎葳蕤大青吳藍各一兩半上一十三味除油酥外細銼以厚綿裹先下油並酥在鐺內煎後下綿裹藥並蓮子草汁文火養經三日漸加火急煎以蓮子汁盡為度膏成絞去滓用瓷瓶盛每夜臥時取半匙許塗頂上漸漸不住手摩令消散入發內覺腦中清涼為度輕者不過五六度瘥重者半劑即愈治肝虛視物漠漠不能遠見睛輪昏暗澀痛翳暈時聚時散補肝元柏子仁丸方柏子仁研薏苡仁烏麻仁車前子枸杞子庵䕡子菟絲子酒浸別搗末各一兩牡荊子青葙子五味子蛇床子桂去粗皮菊花山芋各半兩熟乾地黃焙肉蓯蓉酒浸切焙白茯苓去黑皮各一兩上一十七味搗羅為末煉蜜和丸如梧桐子大每服二十丸空心溫酒下治肝虛血弱目久昏暗石決明丸方石決明菟絲子酒浸一宿別搗末五味子各一兩熟乾地黃焙細辛去苗葉知母焙山芋各一兩半上七味搗羅為末煉蜜和丸如梧桐子大每服三十丸空心米飲下治肝虛淚出不止翳暈侵睛視物不遠或睛昏濁黑白不明乾地黃丸方熟乾地黃焙五味子菟絲子酒浸一宿別搗蕤仁去皮研車前子各一兩細辛去苗葉甘草炙銼防風去叉白茯苓去黑皮柏子仁研各半兩上一十味搗研為末煉蜜和丸如梧桐子大每服二十丸空心溫酒下治肝臟虛血弱不能上助目力視物昏暗還睛丸方茺蔚子防風人參細辛決明子車前子芎藭各一兩上七味搗羅為末煉蜜為丸如梧桐子大空心茶下十丸治肝臟風虛時多冷淚眼目昏暗龍腦青葙子丸方龍腦半兩細研青葙子一兩人參一兩去蘆頭車前子一兩牛黃半兩細研白茯苓一兩旋覆花三分芎藭一兩羌活一兩細辛一兩天麻一兩麝香一分細研防風一兩去蘆頭黃耆一兩銼石決明一兩細研水飛曾青半兩燒細研上十六味搗羅為末入研了藥都拌令勻煉蜜和搗三二百杵丸如梧桐子大每於食後煎羌活湯嚼下十丸肝實眼論曰肝氣通於目其氣和平則諸疾不生過實則生患乃有肝實眼之證令人目痛如刺久不已則目赤而生淫膚息肉治宜瀉之又當視其老壯凡人五十以前可服瀉肝湯過五十則不可或有是疾當不得已而用之治肝臟風熱目赤癢痛宜服鎮肝丸方決明子地膚子赤茯苓去黑皮遠志去心茺蔚子防風去叉蔓荊實去皮人參各一兩青葙子山藥玄參車前子地骨皮柏子仁甘草炙銼甘菊花柴胡去苗各半兩細辛去苗葉一分上一十八味搗羅為末煉蜜丸如梧桐子大每服二十丸食後米飲下治肝實熱目赤乾澀瀉肝前胡湯方前胡去蘆頭秦皮去粗皮細辛去苗葉梔子仁決明子微炒黃芩去黑心枳殼去瓤麩炒升麻蕤仁甘草炙銼各一兩上一十味粗搗篩每服五錢匕水一盞半煎至八分去滓食後臨臥溫服治一切眼疾肝熱上攻羞明畏日淚出菊花散方菊花一兩密蒙花甘草生梔子仁芎藭大黃各半兩蒺藜子炒去角防風去叉當歸切焙各一兩上九味搗羅為散每服二錢匕食後臨臥麥門冬熟水調下治肝實熱眼熱痛不止生地黃湯方生地黃汁蜜車前汁三味各二盞和勻玄參升麻梔子仁各一兩細辛去苗葉半兩芍藥一兩半上八味搗羅五味為末每服五錢匕水一盞半煎至一盞入前三汁共半盞再煎沸去滓溫服治肝氣實脅下妨痛筋脈痠疼眼常昏濁視物不明秦皮湯方秦皮去粗皮羚羊角鎊各一兩半桔梗炒細辛去苗葉各半兩薏苡仁伏翼炙乾各一兩上六味粗搗篩每服五錢匕水一盞半大棗二枚劈破煎至七分入荊瀝半合再煎三兩沸食後臨臥服治肝實熱目暗不明升麻湯方升麻大青薔薇根皮去黑皮各一兩黃柏去粗皮三分射干玄參各二兩上六味粗搗篩每服五錢匕水一盞半煎至八分去滓入蜜半合再煎三兩沸食後臨臥溫服治目赤瀉肝熱大麻仁湯方大麻仁人參決明子微炒車前子黃連去須各三分訶黎勒皮秦皮去粗皮大黃銼炒各一兩上八味粗搗篩每服五錢匕水一盞半煎至七分去滓食後臨臥服治肝實熱目眥熱痛點眼煎方梔子仁蕤仁去皮決明子微炒各一兩石膏二兩研竹葉二握洗車前葉切三合秦皮去粗皮三分白蜜三兩後入上八味銼碎七味以井華水五升煎取汁一升去滓入蜜調勻瓷器中重湯煮如稀餳每點如大豆許治肝實熱多食壅物毒氣傷眼昏暗苦參丸方苦參洗車前子洗枳殼去瓤麩炒各二兩上三味搗羅為末煉蜜丸如梧桐子大每服三十丸空心米飲下治積熱不散目赤腫痛或生障翳瀉肝湯方柴胡去苗芍藥決明子微炒青葙子桂去粗皮升麻各二兩梔子仁一兩上七味粗搗篩每服五錢匕水一盞半入竹葉七片煎取七分去滓入芒硝半錢匕放溫食後服取利為度治肝臟實熱眼目昏暗時多熱淚羚羊角散方羚羊角鎊羌活去蘆頭玄參車前子黃芩去黑心栝蔞山梔子去皮各半兩胡黃連菊花各三分細辛去苗葉一分上一十味搗羅為散每服二錢匕食後竹葉熟水調下治肝臟實熱目眥生赤肉澀痛決明子湯方決明子炒柴胡去苗黃連去須防風去叉升麻苦竹葉各三分甘草炙銼菊花各半兩細辛去苗葉一分上九味粗搗篩每服五錢匕水一盞半煎至八分去滓食後溫服治肝臟實熱目痛如刺漸生淫膚息肉石膏散方石膏碎菊花各二兩牛黃研枳殼去瓤麩炒獨活去蘆頭柴胡去苗白附子炮大黃銼炒漏蘆去蘆頭各一兩木香乾蠍炒檳榔銼各半兩上一十二味搗羅為散每服二錢匕薄荷湯調下治肝實眼目生淫膚息肉腫痛石決明丸方石決明一兩黃連去須車前子細辛去苗葉梔子仁大黃銼炒子芩各半兩菊花一兩半上八味搗羅為末煉蜜和丸如梧桐子大每服三十丸食後淡漿水下臨臥再服治肝實目生赤脈息肉磣痛決明子丸方決明子車前子苦參黃連去須黃芩去黑心大黃各一兩半菥蓂子人參各一兩上八味搗羅為末煉蜜和丸如梧桐子大每服二十丸食後以淡漿水下臨臥再服治肝臟實熱眼赤疼痛竹葉湯方淡竹葉犀角屑木通銼炒黃芩去黑心各一兩玄參黃連去須車前子各一兩一分大黃微炒梔子仁各一兩半芒硝二兩上一十味粗搗篩每服五錢匕水一盞半煎至八分去滓食後溫服日二治肝實眼洗肝湯方人參赤茯苓去黑皮山梔子仁黃芩去黑心菊花地骨皮芎藭柴胡去苗桔梗炒各一兩黃連去須甘草炙銼各半兩上一十一味粗搗篩每服三錢匕水一盞入苦竹葉七片煎至七分食後臨臥溫服治肝氣壅實目痛如刺黃連丸方黃連去須大黃銼炒令香熟各一兩防風去叉龍膽去土人參黃芩去黑心各三分細辛去苗葉半兩上七味搗羅為末煉蜜為丸如梧桐子大每服三十丸食後溫水下臨臥再服治肝實熱毒氣上熏目赤痛癢麥門冬湯方生麥門冬去心葳蕤秦皮去粗皮赤茯苓去黑皮各一兩半大黃生用升麻各一兩上六味銼如麻豆大每服五錢匕水一盞半入竹葉十片煎至八分去滓下朴硝末一錢匕更煎令沸空腹溫服治肝實眼黃連丸方黃連去須三兩上一味椎碎用新汲水一碗浸至六十日綿濾去滓於重湯上熬不住手以匙攪候乾即穿地坑子深一尺以瓦鋪底將熟艾四兩安瓦上火然如炙法然後以藥碗復之四畔泥封開竅令煙出盡即止取出刮下丸如小豆大每服十丸煎甜竹葉湯下腎肝虛眼黑暗論曰天一生水在臟為腎天三生木在臟為肝腎藏