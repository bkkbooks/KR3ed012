點如黍米在目眥頭臨臥點之甚妙治胎赤眼連睫赤爛昏暗服藥久無應者妙應膏方蠍虎活者數枚上一味用一水罐盛黃土按令實入蠍虎在罐內不令損傷仍愛護其尾用紙系罐口於紙面上著箸扎數眼子令出氣後有糞數粒不要糞上一頭黑者只要一頭白者如有病每用津唾研成膏塗在眼睫毛周迴不得揩拭候來日早以溫漿水洗過眼使三次立效治胎赤眼點眼梨汁煎方梨汁絞汁一盞古字銅錢二七文胡黃連末二錢青鹽半兩龍腦一錢上五味先將古錢二七枚重重著青鹽隔每一重錢著一重鹽迭之填滿錢孔中入火燒令通赤去灰塵投入前梨汁中浸一復時去錢將汁煎三五沸以新綿濾入瓷瓶內入胡黃連末浸七日去黃連滓內龍腦末令勻每用以銅箸點少許在目眥頭治風赤胎赤眼年月深遠點眼銅青散方銅青一錢膩粉一錢龍腦半錢乾地龍細研一條上四味研令細如粉每用半小豆大點在目眥頭日一兩度點即瘥治眼風胎赤爛蕤仁膏方蕤仁去皮半兩研石膽研末一錢膩粉半錢黃蠟半兩上四味除蠟外研如粉後以蠟入油少許煎如面脂內藥三味攪為膏每日點兩眥上如小豆大治風赤及胎赤烏梅煎點眼方烏梅七枚漿水一升古字銅錢二七文青鹽半兩上四味先將烏梅入漿水內浸七日次將古錢每一重錢著一重青鹽迭錢重重填錢孔中令滿足將入火中燒之通赤取出去灰塵投入前烏梅漿內入瓷瓶子中盛用油紙封瓶頭掘地中埋三七日後取出以新綿濾去滓每以銅箸點少許在目眥頭日三度治胎赤眼點眼龍腦膏方龍腦研一錢蕤仁去皮一分研杏仁七枚湯浸去皮尖雙仁研上三味研如膏用人乳汁調和令勻瓷閤中盛每用以銅箸點少許在目眥頭日兩度治胎赤兼暈疼痛不可忍點眼秦皮煎方秦皮去粗皮一兩黃連去須二兩升麻一兩上三味細銼以水一升煎取二合澄取一合半綿裹銅箸點入眼中日三兩度治胎赤不計久近無不瘥者鉛丹膏點眼方鉛丹四兩杏仁二七枚湯浸去皮尖白蜜四兩上三味先將杏仁研如膏次入鉛丹及蜜更研令極細用絹袋盛入瓷瓶子內盛坐在湯中煮如人行五里許為度去滓臨點時以少許井華水於碗中蘸銅著少許在目眥頭治積年赤眼胎赤點眼古字錢煎方古銅錢三十文食鹽末二分釅醋一升上三味將錢重以食鹽末填孔中令滿以五月五日午時於石上用炭火燒令極赤然後投醋中候冷傾向小瓷瓶中盛用紙三十九重封瓶口一日去一重去盡每以銅箸蘸如黍米點目眥中治眼胎赤點眼杏仁膏方杏仁油半雞子殼許食鹽末一錢上二味用銀石器著鹽末並杏仁油相和以柳枝一握緊束縛一頭研三日色黑又取熟艾如雞子大掘地作坑子置瓦於坑上安艾燒令通氣火盡即成更和令勻常蓋頭每以綿纏杖頭點少許在兩眥頭夜臥時點頻用甚效治久患胎赤眼點眼胡粉膏方胡粉一兩半蕤仁去皮一兩上二味先將蕤仁研令爛次下胡粉更研熟又搗生麻子為燭然著別取豬肪脂於燭焰上燒使脂流下滴入蕤仁胡粉中更同研令勻如餳以綿纏細杖子頭內藥中乘溫點目兩眥頭藥須夜用如冷還放燭焰上暖之治目胎赤痛點眼鹽綠膏方鹽綠一分蜜半兩上二味於蚌蛤殼內相和每夜臨臥時於火上炙令暖點目眥頭立瘥
