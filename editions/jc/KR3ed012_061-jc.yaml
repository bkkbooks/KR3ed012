body:
  text: 卷第六十一黃汗論曰黃汗者汗出如柏汁沾衣黃色故謂之黃汗由脾胃有濕瘀熱伏留熏發肌肉散而為汗其證使人身體虛浮骨節疼痛發熱汗出而不渴者是也治黃汗身體腫發熱汗出而不渴狀如風水汗沾衣色黃如柏汁脈自沉此由汗出水入汗孔水從外入而得之黃耆苦酒湯方黃耆銼五兩芍藥桂去粗皮各三分上三味銼如麻豆大每服五錢匕苦酒一盞半同煎取七分去滓溫服服之當心煩苦酒阻故也治黃汗兩脛冷又從腰以上汗出腰髖弛痛如蟲行皮中不能食身疼重煩躁小便不利者名曰黃汗桂枝加黃耆湯方桂去粗皮芍藥各三兩甘草炙二兩黃耆銼五兩上四味銼如麻豆每服五錢匕水一盞半入生薑半分切大棗二枚劈破同煎取七分去滓溫服復取微汗須臾不汗者食稀熱粥以助湯力治黃汗身腫發熱汗出而不渴狀如風水汗出著衣皆黃吳藍湯方吳藍芍藥麥門冬去心桑根白皮銼防己白蘚皮山梔子仁各一兩半上七味銼如麻豆每服三錢匕水一盞煎至八分去滓空心溫服未效再服治黃汗身體重汗出不渴汗沾衣黃如柏染黃耆湯方黃耆銼赤芍藥茵陳蒿各二兩石膏四兩麥門冬去心焙一兩豉二兩上六味銼如麻豆每服半兩水一盞半入竹葉十四片煎至八分去滓溫服日四五服治黃汗身體熱不退大小便不利茵陳蒿湯方茵陳蒿赤芍藥甘草炙銼木通銼赤茯苓去黑皮黃耆銼各一兩大黃銼炒二兩上七味銼如麻豆每服五錢匕水一盞半煎至八分去滓溫服如人行十里再服以大小便通利為度又方梔子仁栝蔞銼炒苦參各一兩上三味搗羅為末醋漬雞子全用二枚丸如梧桐子大每服三十丸溫水下日四五服治黃汗汗出如柏汁沾衣身體虛浮蔓荊子散方蔓荊子二兩上一味搗羅為散每服二錢匕井花水調下空心食前日三服三十六黃論曰黃病有三十六種所載名數雖同而證候各異皆非黃疸之比求之於經無所稽考然此病中原之人未曾識惟東南方往往有之其狀與熱病相似俚俗能辨之先看其口中血脈即知是黃乃施點烙針灸多致痊安者大抵東南之域其地濕其氣熱濕熱相蒸易成瘴毒人感其邪有此黃病療不及時則傷害至速灸烙方治不可緩也心黃第一病人面赤口張氣喘多驚饒睡手腳煩疼舌上瘡生心下急悶不欲飲食舌縮口乾七八日內必發狂走即是心黃先烙上脘穴次烙關元及灸十八壯若不瘥再灸七壯次烙背心下廉及天窗如不瘥者宜服柴胡湯方柴胡去苗枳殼去瓤麩炒升麻黃連去須各一兩麻黃去根節一兩半甘草炙銼知母切焙梔子仁各三分上八味粗搗篩每服五錢匕水一盞半煎至七分去滓食後溫服日三後飲少熱粥以助藥力汗出為度肝黃第二病人齒黃目如丹赤口燥熱渴氣力虛劣身體青黃即是肝黃眼中血出氣息急者不堪醫先灸肝俞次烙心俞及上囟灸下廉次烙臍下三寸次烙中脘陽明二穴若不瘥灸天窗及心俞各百壯又不瘥即作土漿服之又不瘥宜服知母湯及灸烙百會土漿方人糞半盞用新汲水三升調入地坑中攪百遍濾取汁二合青蒿汁一合如無汁乾者搗末二錢匕生薑汁半合上三味和勻頓服不拘時治肝黃知母湯方知母焙半兩柴胡去苗茵陳蒿甘草炙銼常山炒鱉甲去裙襴醋炙各三分上六味粗搗篩每服五錢匕水一盞半入豉一百粒同煎至七分去滓投入煉了豬脂半合攪勻食前溫服吐利為度脾黃第三病人兩頰生青脈起目黃齒齦皆青唇黑生瘡通身黃色鼻中煤生心腹脹滿不下飲食大便不通即是脾黃先烙頰上青脈次烙脾俞及胃脘陰都穴不瘥灸脾俞百壯宜服豬苓湯方豬苓去黑皮黃芩去黑心大黃銼炒梔子仁朴硝各一兩上五味粗搗篩每服五錢匕水一盞半煎至七分去滓空心溫服治脾黃脹滿氣衝胸膈大腸不通宜用鹽蜜煎方鹽搗末半兩蜜二合皂莢搗末一分上三味先將鹽入銚子內次下蜜皂莢末慢火煎可丸候冷丸如棗核大以膩粉滾為衣內下部中良久大便通利肺黃第四病人口乾舌縮目赤鼻血出先烙足心次烙心俞百會天窗裡廉肺俞丹田等穴若不瘥即灸肺俞期門氣海穴百壯若煩渴欲得飲水及大便不利宜服黃硝湯方大黃銼炒硝石碎各半兩上二味和勻用水二盞煎至一盞去滓空心分溫二服腎黃第五病人腳冷面目俱青身上冷臍下結硬氣急衝心先烙腎俞次烙期門氣海足陽明兩手心天窗百會等穴若不瘥灸氣海期門下廉腎俞百壯候之如語聲重呼吸勻即堪醫若氣連呼三聲吸氣不入者不堪醫也即宜灸兩乳下三七壯不瘥宜服雞參飲方雞子去殼一枚人參一兩蜜一合生薑汁半合朴硝一分與雞子同研勻上五味先將人參姜蜜用水一升煎至七合去滓入雞子朴硝攪和更煎五七沸空心頓服治病人手足拘急眠臥艱難蕓薹飲方蕓薹子萵苣子各一兩上二味同研如泥入新汲水一盞攪和後以生絹濾取汁頓服之鬼黃第六病人汗不出漸加困重惙氣心脹唇黑遍身黃妄見鬼物道得古人名字此是鬼黃宜烙中脘穴更灸二七壯次烙背心及灸上囟一七壯又烙心俞肝俞腎俞如瘥即遍身赤色汗流如雨喘氣調勻此為可治如身體青脈息漸微胃脈絕者此不堪治也如無此候宜服龍齒湯方龍齒麥門冬去心焙人參各一兩遠志去心三分甘草炙銼一分上五味粗搗篩每服五錢匕水一盞半煎至七分去滓食後溫服奸黃第七病人嚮明臥多愛索鞋擬起身體全冷肉色蒼黑睡中啼泣或狂言妄語此是奸黃先烙手心次烙第三指間又灸一七壯次烙氣海上脘人中神庭等穴不瘥灸背心下廉穴百壯候之如心腫腳腫驀回窺人者不堪醫也如無此候宜服茯神湯方茯神去木酸棗仁炒人參各一兩附子炮裂去臍皮半兩乾薑炮一分上五味㕮咀如麻豆每服五錢匕水一盞半煎至七分去滓食前溫服血黃第八病人三日鼻中出血大小便赤下血心間煩悶腹中有塊痛如蟲咬吐逆喘粗此是血黃先烙丹田穴次烙後心上囟如不瘥者宜服續隨湯方續隨子十四粒細研上一味用水一盞煎至六分去滓放冷頓服當吐瀉愈看鼻衄及下血其血鮮者堪醫如齒及鼻黑髮直者死治血黃頭悶心中痛結塊心煩吐逆茅根湯方生茅根銼一握生地黃拍碎一兩刺薊銼半兩上三味以水三盞煎至一盞半去滓食後分溫二服人黃第九病人面青掩口惡聞人聲或似顛狂此是人黃急宜灸烙先烙承漿穴次烙第三椎次烙下脘次烙期門不瘥灸肺俞後心百壯若脈息動止常共鬼語此不堪治若無此證宜服赤箭散方赤箭一兩天竺黃半兩牛黃一分鉛白霜一錢上四味各搗研為散和勻每服一錢匕食後煎金銀湯調下髓黃第十病人四肢疼痛無力好眠冷地身體遍黃次便青綠色起唇齒俱白眼帶微腫宜灸下廉及兩手陽明穴百會等每處各三五十壯若身體赤色宜服黃耆散方黃耆銼黃連去須甘草生銼各半兩黃芩去黑心一兩上四味搗羅為散每服三錢匕粳米泔調下不拘時癊黃十一病人色青次卻色赤或經下後頭髮自落吃食漸少吐逆心煩睡則夢與鬼交氣力虛乏或食物難消宜灸臍下百壯得力者肉色漸變如是小便赤澀鼻中煤生齒焦眼黑不堪醫也若無此候宜服桑螵蛸湯方桑螵蛸銼炒白朮黃耆銼赤茯苓去黑皮人參各一兩甘草炙半兩上六味粗搗篩每服五錢匕水一盞半入生薑一棗大拍碎同煎至七分去滓食前溫服急黃十二病人心腹急悶煩躁身熱五日之間便發狂走體如金色起臥不安此是急黃先烙百會次烙下廉次烙肝俞更灸三十壯不瘥灸神庭天窗後心百壯次宜用吹鼻方瓜蒂七枚搗末亂髮灰一錢上二味同研令勻每用少許吹鼻中又方惡實一兩黃芩去黑心半兩上二味粗搗篩用水一盞半煎至一盞去滓入馬通汁一合攪勻更煎一兩沸食前分溫二服若是齒如熟豆色惙氣心頭硬者不可活也氣黃十三病人初得先從兩腳黃腫大小便難心中戰悸面目虛黃不能食宜服葫蘆飲方苦葫蘆瓤不拘多少上一味以水研服少許須臾吐瘥癇黃十四病人身如金色不多言語四肢無力好眠臥口吐黏涎者宜服茵陳湯方茵陳蒿白蘚皮各一兩上二味粗搗篩每服三錢匕水二盞煎至六分去滓食前溫服日三白黃十五病人顏色乾枯目下赤口乾舌縮心中恍惚四肢煩重此是白黃先烙舌上青脈次烙上脘魂門二穴灸二十壯不瘥灸百會氣海百壯及宜服地黃當歸湯方地黃汁五合如無用生乾地黃三兩水漬研汁代之蜜三合當歸細銼白朮細銼各一兩上四味先將當歸白朮用水二盞煎至一盞去滓下地黃汁並蜜和勻分作三服相繼服盡若患人言語錯亂者十死不治也陰黃十六病人寒熱並十指疼痛鼻中煤生此是陰黃先烙上脘穴更灸二十壯次烙氣海下廉內乳等穴不瘥灸氣海天窗百壯更宜服麻黃梔子湯若人中反者不可治也麻黃去根節半兩梔子仁七枚甘草炙三分上三味各細銼用水二盞煎至一盞去滓食後分溫二服膽黃十七病人體上黃綠色胸中氣滿或硬不下飲食此是膽黃先烙膽俞下脘穴次烙手足心並十指次烙心俞百會神庭風門穴不瘥灸膽俞並後心百壯及宜服黃芩湯方黃芩去黑心三分芍藥一兩半上二味粗搗篩每服五錢匕水一盞半煎至七分去滓食後溫服日三驚黃十八病人面青身黃心中煩亂起臥不安唇里瘡生目視䀮䀮此是驚黃先烙上脘次烙風池心俞下廉穴如不瘥灸後心兩傍一寸半各二十壯宜服牡荊湯方牡荊子白朮各半兩芒硝一分研湯成下上三味二味細銼用水二盞煎至一盞去滓下芒硝攪勻食後溫服如病人望之色青近之色白身體涼冷言語帶邪氣急衝心汗出不多此是死候也風黃十九病人愛笑腰背急手足強口乾舌上生瘡三部脈亂此是風黃先烙肺俞次烙第三椎風門兩傍相去各三寸又烙手心及足陽明氣海陰都百會下廉腎俞不瘥更灸神庭天窗氣海後心下百壯及服麻黃湯方麻黃去根節葛根銼白朮各一兩上三味粗搗篩每服五錢匕水一盞半煎至七分去滓食後溫服走精黃二十病人昏昏饒睡四肢疼痛面目俱黃舌上紫色甚則舌面坼裂及加黑色此是走精黃宜用藥烙之牛脂一兩豉半兩上二味煎過牛脂以綿裹作包子於舌上烙去一重黑皮濃煎豉湯一盞飲之不瘥者灸上囟穴百會穴後心氣海百壯若爪甲黑者不可治若得睡喘息勻者生酒黃二十一病人五臟積熱面赤言語帶邪昏沉錯亂目中黃色此是酒黃灸後心百會下廉三處百壯若惙氣上喘脈如屋漏此候不治如只大便下血宜服澤瀉湯方澤瀉銼黃芩去黑心白蘚皮茵陳蒿阿膠炒燥一兩甘草炙銼三分上六味搗羅為散每服一錢半匕空心米飲調下日二雞黃二十二病人面目俱青好向暗處眠臥不欲見明手舁衣服狀如鬼神望見黃花生者此是雞黃六日堪醫七日難治宜先烙大椎次烙風府及手心更灸後心天窗百壯即瘥若腳冷腰疼搐掣左足眼睛忽陷不可治也如無此狀宜服地黃飲方地黃半斤肥嫩者洗劈碎黃雌雞一隻去皮毛腸胃細銼上二味用水一斗煮至三升去滓一日內徐徐服盡蚰蜒黃二十三病人身體涼冷舌上黑脈及兩頰有青脈起目黃時時變異腦如針刺頭旋欲倒者是蚰蜒黃宜先烙青脈令斷次烙舌上黑脈及舌根兩旁更烙章門百會不瘥即灸氣海下廉百壯宜服驢乳方上宜取驢乳一二升頓服若舌上更有黑黃色鼻乾不得睡面帶青色不可治也火黃二十四病人先體熱身赤午後卻涼遍身有赤點起宜烙腳心背心手心百會下廉即瘥如生黑點不可療也如無黑點宜服紫草湯方紫草去苗吳藍各一兩木香黃連去須各半兩上四味粗搗篩每服五錢匕水