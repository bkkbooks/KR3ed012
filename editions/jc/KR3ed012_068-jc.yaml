body:
  text: 卷第六十八吐血門吐血統論論曰古人論吐血有三一曰內衄二曰肺癉三曰傷胃內衄者近從心肺間津液出還流入胃色如豆汁凝留胃中滿悶即吐如衄血狀是也肺癉者飲酒滿悶即吐血從吐出少或一合多至一升是也傷胃者食飲過度胃冷不化煩悶強嘔食物與氣俱上衝蹙胃脘因致傷損吐血鮮赤是也三者證雖不同要之皆由大虛損及飲酒勞傷所致巢元方曰肺者五臟之蓋也心肝又俱主血上焦有邪則傷諸臟臟傷血下入於胃胃得血則悶滿氣逆氣逆故吐血也孫思邈又曰吐血之後體中但自讝讝然心中不悶者輒自愈凡是之類學者宜審吐血論曰吐血病有三種一則緣心肺蘊熱血得熱則妄行下流入胃胃受之則滿悶氣道賁衡故令吐血二則虛勞之人心肺內傷恚怒氣逆肝不能藏血乘虛而出因怒氣逆甚則嘔血三者緣酒食飽甚胃間不安或強吐之氣脈賁亂損傷心胃血隨食出此名傷胃各隨證以治之治吐血羚羊角湯方羚羊角鎊三兩伏龍肝五兩熟艾炒一兩地榆去土牛膝去苗酒浸焙牡丹去心各二兩芍藥銼四兩阿膠炒令燥一兩柏葉炙大薊根各三兩雞蘇葉一握蠐螬慢火炙黃五枚上一十二味粗搗篩每服三錢匕水一盞入生薑半分拍碎同煎至七分去滓溫服治吐血乾地黃湯方生乾地黃焙八兩伏龍肝六兩芎藭一兩當歸酒浸切焙三兩桂去粗皮赤芍藥白芷乾薑炮裂各二兩細辛去苗葉半兩甘草炙銼一兩吳茱萸湯浸去涎大豆同炒去豆用二兩上一十一味粗搗篩每服三錢匕水酒各半盞同煎至七分去滓溫服空心食前服治肺損吐血嗽血通聖散方金星石銀星石太陰玄精石雲母陽起石不灰木上六味等分以砂鍋子一枚先入羅過紫冬灰水牛糞是也可厚一二寸鋪藥一重以灰一二寸築令實又鋪藥一重准前以灰蓋後鋪藥為度上下以灰封蓋以鹽泥固濟不限藥多少皆用炭一秤於靜室中周密不通風處火煅一日一夜候冷取出於淨地掘一坑子深一尺許埋鍋子一宿取出先揀出藥塊子余以粗羅羅去灰取藥碾為末更入乳缽研令極細即入罐子內收之每藥末一兩入龍腦麝香各半錢阿膠一分炒同研入前件藥末一兩內合和令勻每服一錢或半錢匕以糯米少許研細入薄荷汁蜜各少許同煎為飲候溫調下空心日午臨臥各一服治吐血五通散方巴豆五十枚去皮白麵一兩郁李仁三百五十枚鹽豉三百五十粒伏龍肝二兩上五味鍋子內炒熟不住手攪以煙青為度傾出放濕地出火毒搗羅為散每服半錢匕溫蜜水調下如患咯血用前件藥末一兩鄆州蛤粉二兩同研羅細每服一錢匕薤汁半盞生油兩點食後調服治吐血及一切血病諸藥不效者烏金散方鯪鯉甲犀角鎊黃明膠赤鯉魚皮各一兩胎髮一兩半獨角仙一枚去翅頭足上六味用瓦瓶一枚底下開竅納藥以紙筋泥固濟曝乾用炭五斤簇燒候煙絕撥去火放冷取出細研為散每服一錢匕旋入膩粉少許吐血鼻衄不止新汲水調下產後血運昏迷悶亂不知人冷醋湯下血氣溫酒調下咯血及血積藏毒下血赤痢血痢蠱毒痢腸風及五痔下血並米飲調下臨臥空腹服更相度虛實可加至二錢匕服藥後取下積聚物為效治男子婦人咯血吐血阿膠散方阿膠炒令燥白芨白芷白蘞黃柏去粗皮蜜水浸炙赤色各一兩上五味搗羅為散每服三錢匕糯米粥飲調下空心食前日三小兒量減治飲食傷肺吐血並嗽血五勝湯方木香蜜陀僧蟬殼去足甘草炙銼各半兩黃明牛膠兩片將一片酥炙一片生銼上五味粗搗篩每服三錢匕水一盞煎至五分去滓食後良久溫服治吐血黃耆散方黃耆銼白芨白蘞黃明膠炒令燥各二兩上四味搗羅為散每服二錢匕糯米飲調下治吐血綠雲散方柏葉百合人參阿膠炙令燥各二兩上四味搗羅為散每服二錢匕用糯米粥飲調下治吐血神效金朱丸方丹砂半兩金箔四片蚯蚓三條上三味先將丹砂金箔研細後將蚯蚓同研和前二味為丸如小皂子大每服一丸冷酒下不嚼治吐血咯血神效散方鹿角膠炙令燥黃柏去粗皮各半兩杏仁四十九枚湯去皮尖麩炒黃上三味搗羅為散每服一錢匕用白麩一錢溫水同調下食後再服治吐血金粉湯方熟乾地黃焙蒲黃各一兩芎藭半兩上三味粗搗篩每服三錢匕水一盞半入糯米十四粒同煎至七分去滓溫服治吐血咯血綿灰散方新綿一兩燒灰黃明膠炙令燥黃柏去粗皮蜜炙為末各一兩上三味細研每服一錢匕地黃汁糯米飲相和調下食後臨臥服治吐血咯血金沙湯方紫金沙野蜂窠帶是半兩貝母去心二錢生用蘆薈一錢上三味粗搗篩每服二錢匕水半盞入蜜少許煎一兩沸去滓細呷空心食後臨臥服治熱極吐血紫參散方紫參阿膠炒燥各二兩甘草炙銼一兩上三味搗羅為散每服二錢匕溫糯米飲調下不計時候治吐血杏蜜膏方豬𦚟一具用瓷器煮爛冷水浸去膜杏仁去皮尖雙仁炒蜜熬熟各二兩上三味同研飯上蒸入木香附子末各二錢和勻成膏每服半匙酒一盞調下日三治吐血藕汁散方白茯苓去黑皮生乾地黃焙蒲黃上三味等分搗羅為細散每服二錢匕生藕汁半盞調勻頓服立止治吐血獨聖散方晚桑葉微焙不計多少上十一味搗羅為細散每服三錢匕冷臘茶調如膏入麝香少許夜臥含化咽津只一服止後用補肺藥治吐血補肺煮肺散方杏仁一百二十粒去皮尖新瓦上焙研百合四兩糯米一合蔥白三莖並同杏仁法上四味和勻豬肺一具入藥在內麻線系沙鍋內煮水去一半翻轉令熟竹片切連藥細嚼蜜湯下服至五具為度治暴吐血嗽血貫眾散方貫眾一兩黃連去須年老者半兩年少者三分上二味搗羅為細散每服二錢匕濃煎糯米飲調下立止治吐血云雪散方云雪寒食麵是蒲黃各一兩上二味並生用研勻每服二錢匕冷水調下治吐血香草湯方莎草根去毛五兩甘草一兩銼炙上二味粗搗篩每服二錢匕水一盞煎取七分去滓溫服治吐血鹿角膠丸方鹿角膠炙令燥黃柏去粗皮各一兩上二味搗羅為末入杏仁四十九枚湯浸去皮尖雙仁炒黃研細拌勻煉蜜和丸櫻桃大每服一丸含化咽津治諸般吐血朱粉散方丹砂研飛蛤粉上二味等分研細合和令勻每服二錢匕溫酒調下治吐血黃藥散方黃藥子防己上二味等分搗羅為散每服一錢匕煎小麥湯調下吐甚者一服減二服止治吐血異功散方人參一兩上一味搗羅為散以密絹再羅令極細五更雞鳴時打雞子清調和稀糊匙抄服若服一兩人參盡甚好不盡半兩亦可服訖卻臥治吐血槲葉散方槲葉不拘多少上一味搗羅為散每服二錢匕水一盞煎五七沸和滓溫服不拘時候治肺損吐血糯米飲方薜荔上一味每一二十葉用紙貼放著陰處切不可曬至干收貼起如有患旋碾羅作細末每服先研糯米煎濃飲若煎餅面稀稠可八分一盞抄藥末一匙頭同攪調勻臨臥溫服治吐血咯血青金散方荷葉不拘多少上一味焙乾搗羅為散米飲調下二錢匕治吐血黑神散方栝蔞取端正者紙筋和泥包裹於頂間留一眼子煅存性地坑內放一宿上一味去泥搗羅為散每服三錢匕糯米飲調下再服止治吐血艾灰散方艾不拘多少上一味燒灰細研每服二錢匕新汲水調下治忽吐血一兩口地黃飲方生乾地黃焙五兩王不留行牡丹皮各二兩赤芍藥萆薢各四兩麥門冬去心焙續斷牛膝切焙阿膠炙燥各三兩蠐螬研五枚上一十味除蠐螬外粗搗篩以生地黃汁三升赤馬通汁三升並蠐螬同煎至三升半去滓分溫六服空心食前治吐血衄血大小便出血竹葉芍藥湯方竹葉六合赤芍藥甘草炙銼各一兩阿膠炙燥三兩當歸切焙一兩半上五味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服食後日二服治心肺熱極喘滿吐血地黃飲方地黃汁生藕汁小薊根汁牛蒡汁各二合生蜜生薑汁各一兩上六味和勻徐徐呷之以瘥為度治吐血唾血赤芍藥散方赤芍藥當歸切焙附子炮裂去皮臍黃芩去黑心白朮甘草炙銼各一兩阿膠炙燥二兩生乾地黃焙乾四兩上八味搗羅為散每服三錢匕空腹溫酒調下日三服治肺損吐血綿膠散方新綿燒灰研黃明膠炙燥搗末上二味等分研勻每服一錢匕臨臥糯米飲調下治吐血溺血衄血竹茹湯方青竹茹銼一升芍藥二兩芎藭當歸切焙桂去粗皮甘草炙銼各三兩黃芩去黑心三分上七味粗搗篩每服三錢匕水一盞煎至八分去滓溫服不拘時治吐血及大小便血三物湯方生地黃七兩半阿膠炙令燥三分白蘞八兩上三味㕮咀如麻豆每服七錢匕水二盞煎至八分去滓空腹溫服治吐血方蛇蛻燒灰上一味研細每服一錢匕冷熱水調下不拘時候治吐血天南星散方天南星一兩銼如骰子大上以炭汁浸一宿漉出湯洗焙乾搗羅為散每服一錢匕酒磨自然銅調下治肺損吐血不止地黃飲方生地黃八兩研取汁鹿角膠一兩炙燥碾為末上二味先以童子小便五合於銅器中煎次下地黃汁及膠末打令勻煎令熔十沸後分作三服當止又方地黃汁六合牛皮膠一兩細研生薑一塊如大拇指椎碎上三味先以二味於銅器中煎十數沸次下牛皮膠煎令消濾去生薑分作兩服吃便止或微轉一行不妨又方訶黎勒生為末白麵炒上二味等分每服二錢匕糯米粥調下又方白芍藥四兩燒存性以盞蓋地上出火毒為末每服三錢匕糯米飲調下吐血不止論曰藏真高於肺而主氣藏真通於心而主血藏真散於肝而藏血是三者或因愁憂思慮與夫恚怒氣逆傷之則氣亂而血妄行下入於胃胃受之則滿脹其氣賁衝於上故吐血不止也治吐血極者不止大聖散方金星石銀星石禹餘糧寒水石以上並碎不灰木半夏湯洗七遍去滑生薑汁製焙大黃銼蛤粉上八味等分搗羅為散每服一錢匕新汲水調更入龍腦少許佳兼解五毒治吐血不止阿膠散方阿膠炒令燥半兩生乾地黃焙一兩人參一分黃柏去粗皮蜜炙蟬殼去土甘草生銼黃耆銼各半兩上七味搗羅為散每服一錢匕糯米飲調下不拘時候服治吐血不止苧根散方苧根人參白堊蛤粉各一分上四味搗羅為散每服一錢匕糯米飲調下不拘時候治吐血不止金散方黃柏去粗皮塗蜜炙令赤二兩寒食麵微炒一兩黃明膠炙令燥一兩上三味搗羅為散每服三錢匕冷熟水調下食後臨臥服治吐血不止鱉甲散方鱉甲一兩銼作片子蛤粉一兩鱉甲相和於銚內炒香黃色熟乾地黃一兩半曝乾上三味搗為細散每服二錢匕食後臘茶清調下服藥訖可睡少時治吐血不止鬱金散方鬱金一兩蓮實去皮黃耆銼各一分上三味搗羅為散每服一錢匕冷水調下不計時候服治吐血不止二黃湯方生乾地黃焙蒲黃各一兩上二味粗搗篩每服二錢匕水一盞入竹葉七片煎七分去滓放冷細呷食後治吐血不止調胃散方紫背荷葉焙半兩黃耆銼一分上二味搗羅為細散每服一錢匕生薑蜜水調下不拘時候治吐血不止白蘞湯方白蘞三兩阿膠二兩炙令燥上二味粗搗篩每服二錢匕酒水共一盞入生地黃汁二合同煎至七分去滓溫服如無地黃汁入生乾地黃一分同煎亦得治吐血肺損不止白金散方白麵九節菖蒲末各一兩上二味再研勻每服二錢匕新汲水調下未止再服如中暑毒氣生薑蜜水調下治吐血似鵝鴨肝晝夜不止生犀散方犀角二兩鎊屑生用桔梗二兩生用上二味搗羅為散暖酒調下二錢匕治吐血成塊不止箬葉散方箬葉半兩燒灰楓香脂一兩上二味研為散每服一錢匕煎黃牛皮湯調下不計時候服治吐血不止人參散方人參一分天茄子苗半兩上二味搗羅為散每服二錢匕新水調下不拘時治血妄行入胃吐血不止黃耆散方黃耆半兩細研五靈脂一兩