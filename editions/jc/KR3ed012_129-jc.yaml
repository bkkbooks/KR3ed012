body:
  text: 卷第一百二十九腸癰論曰腸癰由恚怒不節憂思過甚腸胃虛弱寒溫不調邪熱交攻故營衛相干血為敗濁流滲入腸不能傳導蓄結成癰津液腐化變為膿汁其候少腹硬滿按之內痛小便淋數汗出惡寒身皮甲錯腹滿如腫動搖轉側聲如裹水或繞臍生瘡膿從瘡出或膿出臍中或大便下膿血宜急治之不爾則邪毒內攻腐爛腸胃不可救矣診其脈洪數者膿已成設脈遲緊雖膿未就已有瘀血也治腸癰少腹堅腫大如掌而熱按之則痛其上色或赤或白小便稠數汗出憎寒其脈遲緊者未成膿如脈數則膿已成大黃湯方大黃銼炒牡丹皮硝石研桃仁湯浸去雙仁皮尖炒芥子各半兩上五味粗搗篩每服五錢匕水二盞煎至一盞去滓空心溫服以利下膿血為度未利再服治腸癰木占斯散方木占斯厚朴去粗皮生薑汁炙甘草炙銼細辛去苗葉栝蔞去皮防風去叉乾薑炮人參桔梗銼炒敗醬各一兩上十味搗羅為散每服二錢匕空心日晚溫酒調下治腸癰牡丹湯方牡丹皮一兩芍藥丹參生乾地黃切焙各二兩薏苡仁桔梗銼炒麥門冬去心焙各一兩半甘草炙銼赤茯苓去黑皮敗醬各一兩上十味粗搗篩每服五錢匕水二盞入生薑五片煎至一盞去滓空心日晚溫服治腸癰犀角丸方犀角屑一兩半巴豆十粒去心皮炒研去油大黃三分蒸三度銼蜀椒去目並閉口者炒出汗黃芩去黑心防風去叉人參當歸切焙黃耆細銼藜蘆去蘆頭山梔子去皮黃連去須甘草炙銼升麻各半兩上一十四味搗羅為末煉蜜丸如梧桐子大每服三丸空心米飲下加至四五丸利下黃水為度治腸癰裡急隱痛大便秘澀梅仁湯方梅核仁四十九個去皮尖大黃三兩牡丹皮一兩三分冬瓜仁四兩犀角鎊一兩半芒硝二兩半上六味㕮咀如麻豆大每服五錢匕水二盞煎至一盞去滓溫服以下膿血三兩行為度治腸癰附子湯方附子炮裂去皮臍敗醬各三分薏苡仁一兩半上三味㕮咀如麻豆每服三錢匕水一盞煎至六分去滓空心日晚溫服下膿血即瘥治腸癰雞毛散方雄雞項上毛燒灰雄雞屎燒灰各一兩上二味細研為散空心溫酒二合調下一錢匕日晚再服又方上截檐頭尖少許燒成灰水調服即穴出膿治腸癰壯熱惡寒微汗氣急少腹痛小便澀或大便如刀錐刺痛或有膿腹中已成膿瓜子仁汁方瓜子仁三合與水陸合同研絞取汁當歸切焙一兩搗末蛇蛻一條燒灰研上三味將二味末和勻分作二服用瓜子汁調下空心日午服下膿血即瘥治腸癰大黃牡丹湯方大黃銼炒牡丹皮各二兩桃仁湯浸去皮尖雙仁炒半兩芒硝研一兩冬瓜仁三合上五味粗搗篩每服五錢匕水一盞半煎至八分去滓空心溫服以利下膿血為度治腸癰薏苡仁湯方薏苡仁一兩牡丹皮桃仁湯浸去皮尖雙仁炒各一兩半瓜子仁半兩上四味粗搗篩每服五錢匕水一盞半煎至七分去滓空心日晚溫服胃脘癰論曰內經謂人病胃脘癰者當候胃脈其脈沉細者氣逆氣逆者人迎甚盛甚盛則熱人迎者胃脈也逆而盛則熱聚於胃口而不行故胃脘為癰也夫陰陽升降則營衛流通氣逆而隔則留結為癰胃脘癰者由寒氣隔陽熱聚胃口寒熱不調故血肉腐壞以氣逆於胃故胃脈沉細以陽氣不得下通故頸人迎甚盛令人寒熱如瘧身皮甲錯或咳或嘔或唾膿血觀伏梁之病亦有挾胃脘內癰者以其裹大膿血居腸胃之外故也治熱聚胃脘留結為癰連翹升麻湯方連翹升麻射干去毛獨活去蘆頭桑寄生木通銼各二兩半大黃銼微炒二兩以上搗為粗末木香沉香鎊薰陸香丁香麝香各等分以上搗研為細末上十二味每抄前藥五錢匕水二盞煎至一盞半去滓入後五香末二錢匕再煎至一盞溫服日三服以快利為度治胃腑實熱留結為癰陽氣不得下胃脈沉細者犀角湯方犀角鎊梔子仁赤芍藥赤茯苓去黑皮黃芩去黑心射干去毛大黃銼炒各一兩上七味粗搗篩每服五錢匕水一盞半煎至一盞去滓入蜜一匙攪勻再煎一兩沸食後溫服治營衛不流熱聚胃口血肉腐壞胃脘成癰射干湯方射干去毛梔子仁赤茯苓去黑皮升麻各一兩赤芍藥白朮各一兩半上六味㕮咀如麻豆大每服五錢匕水一盞半煎至八分去滓入生地黃汁一合蜜半合再煎三沸溫服不拘時候日二服治熱氣留聚胃脘內結成癰麥門冬湯方麥門冬去心焙犀角鎊葳蕤薺苨赤芍藥石膏各一兩半甘草炙銼紅雪各一兩上八味粗搗篩每服五錢匕水一盞半煎至八分去滓入竹瀝一合再煎三兩沸溫服治胃脘蓄熱結聚成癰芍藥湯方赤芍藥犀角鎊木通銼石膏碎升麻各二兩甘草生銼朴硝玄參麥門冬去心焙各一兩上九味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服不計時候緩疽論曰緩疽者以寒氣客於經絡營衛凝澀其寒氣盛則腫痛深伏其狀無頭尾大如拳小如桃李與皮肉相附著其腫與肉色相似亦不甚赤積日不潰久乃變紫黯色皮肉俱爛如牛領瘡以其初勢緩慢故名緩疽以其腫色與肉色相似故亦名肉色疽治緩疽木占斯散方木占斯乾薑炮裂桂去粗皮細辛去苗葉敗醬防風去叉桔梗炒栝蔞去皮各半兩甘草炙一分人參一兩厚朴去粗皮薑汁炙銼三分上十一味搗羅為散每服二錢匕空心溫酒調下日晚再服治緩疽芍藥湯方芍藥當歸各一兩黃耆銼生乾地黃焙赤茯苓去黑皮各一兩半人參甘草炙各三分上七味粗搗篩每服五錢匕水一盞半入生薑半分拍碎棗二枚劈破同煎至八分去滓空心溫服晚再服治緩疽及諸癰腫膿血結聚皮肉堅厚日久不潰疼痛黃耆湯方黃耆沉香薰陸香連翹各三分羚羊角屑一兩雞舌香漏蘆去蘆頭黃芩去黑心梔子仁甘草生銼防風去叉栝蔞根各半兩上十二味粗搗篩每服五錢匕水一盞半煎至八分去滓不計時候溫服治緩疽日久穿潰出膿水不盡排膿散方貝齒一兩黃耆銼當歸銼微炒赤芍藥生乾地黃焙黃連去須升麻桂去粗皮白蘞犀角屑各三分甘草半兩生銼麝香一分細研上十二味搗研為散拌勻再羅每服溫酒調下二錢匕不計時候治緩疽初結微腫疼痛塗貼莽草散方莽草鹿角屑白蘞白芨半夏天南星附子生去皮臍各一兩蛇蛻皮一條炙皂莢兩梃去黑皮及子上九味搗羅為散用醋面薄糊調為膏塗貼腫處干即再上以腫散為度治緩疽蛇床散方蛇床子末杏仁湯浸去皮尖雙仁研細入黃連去須搗末乳香細研各半兩鹽一分研蔓荊根三兩切爛研上六味以蔓荊根和藥末細研令勻塗敷腫上干即易之治緩疽惡瘡蝕惡肉飛黃散方丹砂雌黃磁石曾青白石英礜石石膏石鐘乳雄黃各二兩雲母粉三兩上十味各細研為散用瓦盆一口丹砂安南雌黃安中磁石向北曾青在東白石英在西礜石當上石膏次更下鍾乳雄黃雲母覆蓋更用一盆覆蓋定以泥封厚一寸於灶底以陳葦燒一日取出看取飛上者研細敷瘡上日二度即瘥治緩疽以飛黃散蝕惡肉盡用雄黃散熏方雄黃乾雞屎白藜蘆去蘆頭丹砂細研干鰻鱺魚炙焦各一兩上五味搗羅為散以青布裹之安小土灶內燒熏患處如是熏三日即止後用黃耆散常法敷之治緩疽黃耆散方黃耆二兩上一味細銼搗羅為散敷瘡上日一度又方漆頭䕡茹二兩上一味搗羅為散敷瘡上日二度石疽論曰石疽與石癰之證同比石癰為深以寒客經絡氣血結聚而不得散隱於皮膚之內重按如石故謂之石疽癰疽皆熱氣所作今寒氣為梗故凝結不化其毒內著結硬如石治宜溫其經絡使熱氣得通其毒外泄故能腐熟而發散化膿血而出也治石疽堅硬皮色深赤惡寒壯熱一二日未膿者下之升麻湯方升麻連翹玄參大青大黃銼微炒各一兩敗醬絡石白蘞各半兩生地黃二兩上九味銼如麻豆大每服五錢匕水一盞半煎至七分入芒硝一錢去滓空心溫服微利三兩行未利再服治石疽結堅若壞若未壞或已成疽者占斯散方木占斯厚朴去粗皮薑汁炙生乾地黃焙栝蔞乾者去皮敗醬防風去叉桔梗炒人參細辛去苗葉各一兩桂去粗皮半兩上十味搗羅為散每服二錢匕溫酒調下食前治石疽腫毒結硬口乾煩熱四肢拘急不得臥沉香湯方沉香防風去叉木香各三分地骨皮麥門冬去心焙當歸切焙升麻玄參枳殼去瓤麩炒羚羊角屑獨活去蘆頭甘草生銼赤芍藥各一兩大黃銼炒二兩上十四味粗搗篩每服四錢匕水一盞半煎取七分去滓不計時候溫服治石疽堅硬不消地黃煎方生地黃淨洗三斤上一味銼碎細研以布絞取汁入銅器內盛重湯上煮柳篦攪勻如糖以瓷合盛每日空心取一丸如彈子大溫酒調下日午晚間再服即瘥治疽發堅如石覈覆大色不變鹿角散方鹿角燒過二兩白蘞一兩粗理黃石五兩燒令赤色投醋中再燒入醋七遍上三味搗羅為散以釅醋調如糊塗敷腫上干即再敷以瘥為度治石疽堅如石不作膿商陸根貼方生商陸根半斤上一味爛搗如泥於故帛上塗貼干即易之治石疽狀如痤癤而皮厚者楮實塗方楮實不以多少上一味搗羅為末以醋調如糊塗患上干即易之治石疽堅硬皮色紫赤惡寒壯熱一二日未成膿者下之後宜用木香散貼方木香大黃生升麻白蘞芒硝赤小豆各半兩上六味搗羅為散以榆白皮汁入水少許調和如糊以故帛上塗貼日二上即瘥又方鹿角上一味於石上水磨如泥塗患上日三五度即瘥又方半夏一兩上一味搗羅為末以水調如糊塗患上日三五度即瘥治石疽塗敷方蜀漆乾者半兩桑根白皮二兩上二味搗羅為末熔牛膠更以酒調和塗敷腫上日三五度即瘥又方茛菪子二兩上一味搗羅為散以醋調和如糊塗敷腫上干即再塗取瘥又方梁上塵葵莖灰各一兩上二味搗羅為散以醋調如糊塗敷腫上日三兩度即瘥又方蛇蛻皮上一味燒灰細研以醋調如糊塗腫上干即易之附骨疽論曰骨疽者由風入骨解與熱相搏復為冷濕所折風熱伏結不得發散蘊積成毒故附骨而為疽喜發於大節解間按之應骨皮肉微急洪洪如肌而不外見是也治之宜急稍緩則膿不得潰而肢體變青黯者不可治治附骨疽漏蘆湯方漏蘆去蘆頭升麻連翹麻黃去根節各一兩大黃銼炒一兩半防己木香白蘞沉香各三分上九味粗搗篩每服五錢匕水一盞半入竹葉一七片煎至八分再入芒硝一錢攪勻去滓空心溫服取利三兩行未利再服治附骨疽連翹湯方連翹射干升麻防己黃芩去黑心大黃銼炒甘草炙芍藥杏仁湯浸去皮尖雙仁各一兩柴胡去苗二兩上十味粗搗篩每服五錢匕水一盞半煎至七分入芒硝一錢匕去滓空心溫服治附骨疽敗醬湯方敗醬二兩大黃銼炒一兩桃仁二兩上三味粗搗篩每服五錢匕先取皂莢刺一兩銼碎以水二盞煎至一盞半漉出下藥及朴硝一錢同煎至八分去滓空心溫服治附骨疽亂髮湯洗方亂髮灰半兩杏仁椎碎二十一粒甘草銼五寸鹽花半兩上四味以漿水五升煎至三升濾去滓通手洗疽上若有膿血洗取淨後以絹帛縛定每日三兩遍洗治附骨疽瘡及陰瘡久不瘥天靈蓋散塗敷方天靈蓋酥炙一兩狗骨燒灰一兩半白礬燒灰一兩半麝香研一錢上四味搗研為散干敷瘡口日三五上以瘥為度治附骨疽天南星散塗敷方天南星炮附子炮裂去皮臍黃柏去粗皮各半兩鉛丹研一分麝香研半分上五味除麝香鉛丹外搗羅為散入二味和勻干敷瘡上日三五度治附骨疽久不瘥麝香散塗敷方麝香研一分騏麟竭密陀僧煅各一兩上三味細研為散先用鹽湯洗瘡拭乾取活鱔魚一條銼細研拓瘡上一宿明旦揭看有蟲即去再拭乾塗敷散子日三五度即瘥治附骨疽內消小豆散方赤小豆一合糯米炒黑五合上二味搗羅為散水調如糊攤故帛上塗貼干即易之治附骨疽騏驎竭散塗敷方騏驎竭檳榔銼黃連去須馬腸根各一兩上四味搗羅為散先以油炒蔥豉入膩粉半錢和搗捻作餅子一片用鹽漿水洗瘡後用餅拓瘡上以生帛縛定三日後再用鹽湯洗即塗敷散子日三五次治附骨疽久不瘥骨從瘡口出烏雞散塗敷方烏雌雞骨燒灰牛棓木刮燒灰三塚者炊單燒灰三家者各一兩上三味合和研細塗敷瘡上日三五度碎骨出即瘥治附骨疽久不瘥或瘥年歲再發秦艽散塗敷方秦艽去苗土上一味搗羅為散塗敷瘡上以帛縛定日二三次治附骨疽積年發膿骨出不瘥牛膠散塗敷方水牛皮膠炙焦上一味細研為散塗敷瘡上用生鯉魚破開外面貼定時看有小蟲出更以鹽湯洗敷上藥再以魚貼蟲出盡更敷藥治附骨疽楸葉塗敷方楸葉陰乾一兩豬膽半兩上二味相和搗爛塗於瘡上封之即瘥又方黃丹研細膩粉各三錢研雞子五枚煮熟去白用黃上三味先將雞子黃於銚子內以慢火炒令黑候自然為膏瀝於盞內入黃丹膩粉和勻用時先以米泔煎湯洗患處拭乾用藥敷之妙又方新枸杞子自然汁白礬枯別研上二味先將枸杞汁慢火熬成煎後入白礬團令堅實陰乾搗羅為末每用時以甘草水洗之拭乾先唾塗瘡上次用藥末周匝敷之治附骨疽久不愈及碎骨皆從瘡孔中出者雞骨散方一歲烏雌雞骨一兩燒灰三家桐材屑一兩燒灰三家炊單一兩燒灰上三味都研令細每用少許納於瘡中碎骨當出即愈治附骨疽及魚眼瘡方杏仁五十枚燒為灰亂髮灰一兩膩粉一分上三味同研令細入油三合蠟半兩煎攪令勻入瓷合盛淨洗貼之治附骨疽腫痛有膿久不瘥天靈蓋散方天靈蓋一兩燒灰狗頭骨半兩燒灰白礬半兩燒令汁盡麝香一錢細研黃連一分去須黃柏一分上六味搗羅為細散入麝香令勻每用先煎甘草湯洗拭乾用生油調塗之風疽論曰風疽者本由風濕之氣入於腠理流注血脈凝澀不利攣曲腫起發作瘡疽所以疼痛經久不瘥者是也蓋風勝則動故其疽留止無常得之醉臥汗出當風風入膚腠客於經絡與營衛相搏而成治風毒結腫聚為惡膿瘀血毒壅不散發作成疽五香連翹湯方連翹射干獨活去蘆頭桑寄生木通升麻各二兩大黃三兩丁香一兩木香沉香薰陸香麝香各二兩上十二味㕮咀如麻豆大每服五錢匕水二盞煎至一盞入竹瀝半合再煎取沸去滓溫服未瘥再服治風毒中人留血脈不散與營衛相搏結成風疽身體煩熱昏冒腫痛防風湯方防風去叉柴胡去苗白芷桔梗炒木通銼當歸切焙各一兩半羌活去蘆頭麻黃去根節煎掠去沫焙附子炮裂去皮臍甘草炙銼各一兩上十味㕮咀如麻豆每服五錢匕水一盞半煎至八分去滓溫服食後臨臥各一如欲出汗空心並兩服後以熱姜稀粥投蓋復取汗慎外風治熱毒風結成疽腫痛行履不得海桐皮浸酒方海桐皮銼五加皮銼獨活去蘆頭防風去叉乾蠍炒杜仲去粗皮切牛膝去苗酒浸切焙薏苡仁炒各一兩生乾地黃焙三兩上九味粗搗篩生絹囊貯以好酒一斗五升浸於瓷瓶中密封秋夏三日春冬七日開取食前溫酒三合加至四五合不拘時甚者常令酒氣相續治熱毒風腫成疽日夜熱痛大豆酒方大豆緊小者三升麻子仁研碎三升烏蛇一條去頭尾皮骨重四兩椎碎上三味相和令勻就甑內蒸臨熟去甑底湯將好酒一斗五升就甑中淋候酒熱又淋凡七八遍入瓷瓶內密封候冷量性飲之常帶酒氣佳治醉酒汗出風入經絡成風疽麻黃湯方麻黃去根節三兩五加皮一兩半防風去叉獨活去蘆頭桂去粗皮當歸切焙芎藭乾薑炮各二兩附子生去皮臍一枚牛膝二兩半杏仁去皮尖雙仁八十枚上十一味各細銼以水九升先煎麻黃掠去沫納諸藥煎取三升絞去滓每用一盞溫服並三服溫復微汗慎外風治風毒氣客經絡成風疽秦艽丸方秦艽去土苦參升麻黃芩去黑心枳殼去瓤麩炒防風去叉惡實炒各四分烏蛇酒浸去皮骨炙蒺藜炒各五分上九味搗羅為末煉蜜和丸如梧桐子大早晚食後以蒺藜子煎湯下二十丸治酒醉汗出風入經絡久成風疽黃耆丸方黃耆銼犀角鎊各三兩黃連去須茯神去木當歸切焙防風去叉芍藥升麻黃芩去黑心各五分木通八分甘草生銼三分麝香別研半分上十二味搗研為末拌勻煉蜜丸如梧桐子大每服二十丸空腹生薑湯下食後再服即煎麥門冬湯下治風疽搔之黃水出大豆汁塗方大豆一升馬尿二升白蜜半斤上三味拌勻用青竹筒盛築實架在炭火上當中慢燒將瓷碗兩頭盛取汁先用泔清入鹽少許和溫洗瘡上拭乾後以藥汁塗日三五度又方胡麻子上一味細嚼塗敷疽上以綿裹縛之日三兩上以瘥為度甲疽論曰足三陰經皆起於足氣血沮而不行潰於指甲之間能成甲疽凡以經絡之所流注非特肌肉之病也故或得於剪甲傷肌或得於甲長侵肉或得於屨鳧之不適使血氣沮遏不通故腐潰為疽久則浸淫爛指上引於腕膝之間而瘡疱者是已然病在四末不必治其內惟塗敷滌濯去惡而除穢及適其行履則愈治甲疽日夜倍增赤肉生甲邊裹甲者䕡茹膏方䕡茹黃耆各二兩豬脂半斤上三味先㕮咀如豆以苦酒浸一宿與豬脂一處微火上煎取三合絞去滓以塗瘡上日三兩度其赤肉即消散治甲疽腫爛生腳指甲邊赤肉努出時瘥時發方雄黃半兩蛇蛻皮燒灰一分上二味同研如粉每用先以溫泔洗瘡令軟以尖刀子割去甲角拭乾以藥敷之用軟帛裹之半日許藥濕即易之一日即除其痛便止治甲疽及諸癰疽惡瘡有息肉豬蹄湯方豬蹄一隻生者白蘞白芷狼牙芍藥各三兩黃連黃芩大黃獨活各二兩上八味㕮咀如豆先以水三斗煮豬蹄水至一斗二升去蹄後入藥更煮至五升候溫洗瘡日三度治甲疽胬肉裹甲膿血疼痛不瘥乳香散敷方乳香研膽礬燒灰研上二味等分再同研極細時時敷之大凡此疾須是剔去甲不療亦愈或已成瘡久不瘥即用此方治甲疽綠礬散敷方綠礬二兩上一味熨斗內以炭火燒令通赤去火研令極細先以鹽湯洗瘡拭乾旋敷瘡上將軟帛裹縛如瘡急痛即以酥塗瘡上令潤日三五度用治甲疽胬肉疼痛膿血不止石膽散敷方石膽半兩上一味煅過細研敷瘡上日三兩度治甲疽白礬散敷方白礬燒灰一兩麝香蘆薈蚺蛇膽各半分上四味合研極細先以漿水洗瘡拭乾敷之日三兩上以瘥為度治甲疽多年不瘥胬肉膿血疼痛烏梅散敷方烏梅十枚燒灰上一味研為散敷瘡上日三易治甲疽黃耆散敷方黃耆銼蛇蛻皮炙令焦各一兩上二味搗羅為散敷瘡上日三五度治甲疽馬齒散敷方牆上馬齒菜陰乾一兩木香丹砂研細鹽研細各一分上四味除丹砂鹽外銼碎拌令勻於熨斗內以炭火燒過取出細研即入丹砂鹽末再研勻旋取敷瘡上日三兩度瘭疽論曰字書凡字從票皆有疾轉之義瘭疽為病毒發疾轉不旋踵而害人故其字從票音同於飄風之飄治之不可稍緩也古人謂人受惡風入於肌脈變成斯病蓋厲氣蘊伏初未知覺毒郁既發則若火之熾烈不可響邇是以其狀隱小而實深黯黑而不明其痛復應於心毒氣已深故其證如此惟痛取利可以僅存欲頓飲藍青升麻葵根竹瀝之類以沃其熱毒甚則斷指刳肉灼肌以除之凡以毒氣疾轉稍緩則入臟故也治瘭疽枳實湯方枳實炒射干升麻生乾地黃焙黃芩去黑心前胡去蘆頭犀角屑大黃銼炒甘草炙銼各一兩上九味粗搗篩每服五錢匕水二盞煎至一盞去滓入麝香半字攪勻空心溫服日三治瘭疽初覺宜速取利犀角丸方犀角屑一兩半大黃銼炒黃芩去黑心各三分防風去叉人參當歸黃耆銼梔子仁黃連去須干藍甘草炙銼各半兩巴豆十二粒去皮心研上十二味除巴豆外搗羅為末研入巴豆令勻煉蜜丸如梧桐子大每日空心米飲下三丸如未利加五七丸以利為度治瘭疽漏蘆湯方漏蘆去蘆頭白蘞黃芩去黑心麻黃去根節白薇枳實炒升麻芍藥甘草炙銼大黃銼炒各一兩上十味粗搗篩每服五錢匕水二盞煎至一盞去滓空心溫服日三治瘭疽諸疽十指頭焮赤痛而癢豬蹄湯方白芷大黃銼炒芎藭黃芩去黑心黃連去須甘草炙細辛去苗葉藁本去苗土當歸切焙藜蘆莽草各一兩上十一味㕮咀如麻豆每用水二斗煮豬蹄一具取一斗入藥三兩再煮取五升浸淋瘡處治瘭疽手足累累如米起色白刮之汁出愈後復發款冬花散方款冬花半兩黃耆銼一兩半升麻一兩赤小豆附子炮裂去皮臍苦參各一兩一分上六味搗羅為散每服一錢匕空心溫酒調服日再加至二錢匕治瘭疽浸淫多日漸長大黃連散方黃連去須一兩胡粉甘草炙銼䕡茹各半兩上四味除胡粉外搗羅為散入胡粉令勻塗敷瘡上日三五度治瘭疽丹砂膏方丹砂細研犀角屑射干大黃銼炒芎藭黃芩去黑心升麻前胡去蘆頭沉香木香各一兩豬脂二斤半生地黃二兩麝香半分研上十三味除丹砂麝香豬脂外銼碎以醋半升和勻浸一宿先熬脂令沸次下諸藥煎候地黃赤黑色以綿絞去滓入丹砂麝香末以柳篦攪勻瓷合盛敷患處日三五上又取棗大以溫酒調下空心日午服治瘭疽熾甚消毒散方藜蘆大黃銼炒黃柏去粗皮黃連當歸甘草各一兩上六味㕮咀如麻豆以水一斗煮至五升去滓浸淋瘡處即瘥治瘭疽方灶室塵灶突中墨灶釜下土各一升上三味以水九升煮三沸取汁以洗瘡口三四度又方胡粉二兩青木香滑石龍骨各二兩半米粉一兩上五味搗羅為細末稍以粉瘡上日三治瘭疽著手足肩背忽發累累如赤豆剝之汁出者方麻子不以多少上一味細研用水煎取沫摩於瘡上即瘥治瘭疽潰後皂莢散方皂莢二梃去皮子燒為灰上一味細研為散用鹽湯洗瘡令淨乾摻敷日三治瘭疽似癰小異去膿明旦還滿血如小豆汁者蕓薹熨方蕓薹葉不拘多少上一味爛搗炒熱以布袋二枚盛更互熱熨之冷即換冬用乾者又將甘草湯洗瘡令淨干以黃柏末塗敷熨了即用以瘥為度
