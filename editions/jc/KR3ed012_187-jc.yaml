body:
  text: 卷第一百八十七補虛進飲食論曰脾播百物氣澤以埤諸臟腑者也真氣強盛則可以腐熟水穀播諸臟腑滋養營衛充實肌膚若中下氣虛內生寒冷陽氣不足則不能腐熟水穀故虛而不嗜食當補虛以助其陽氣也治脾腎虛冷不思飲食蕪荑丸方蕪荑炒六兩烏梅肉炒二兩黃連去須半兩厚朴去粗皮生薑汁炙五兩補骨脂炒肉蓯蓉酒浸切焙巴戟天去心附子炮裂去皮臍鹿茸去毛酥炙陳橘皮去白切焙各四兩上一十味搗羅為末粟米粥丸如梧桐子大每服三十丸空心日午溫米飲下補脾腎止心腹痛進飲食沉香丸方沉香銼二兩鹿茸去毛酥炙厚朴去粗皮生薑汁炙烏藥銼楝實銼炒白茯苓去黑皮石槲去根白朮訶黎勒炮去核人參各一兩上一十味搗羅為細末酒煮麵糊丸如梧桐子大每服二十丸至三十丸溫酒或米飲下空心食前治元臟虛冷脾胃不和不進飲食肌膚瘦瘁面黃腹脹四肢怠惰精神不樂兼療膀胱積冷氣痛蓬莪朮丸方蓬莪朮京三稜各四兩同煨乘熱椎碎搗羅為末以米醋於銀石器煮入獖豬胰一枚去脂膜爛研細與硇砂末半兩同熬成膏醋不拘多少約藥末為數硇砂飛研半兩楝實炮舶上蘹香子炒山芋檳榔煨銼附子炮裂去皮臍枳殼去瓤麩炒各二兩上九味除前三味制了外六味搗羅為末以前膏和搗三五百杵丸如梧桐子大每服二十丸至三十丸溫酒或鹽湯下空心食前服治脾元虛冷飲食減少面黃腹痛蓽澄茄湯方蓽澄茄石槲去根附子炮裂去皮臍桂去粗皮巴戟天去心各一兩白朮銼炒五味子芎藭各三分人參白茯苓去黑皮木香檳榔白豆蔻去皮各半兩上一十三味銼如麻豆每服三錢匕水一盞生薑二片棗二枚擘破煎至七分去滓空心日午近晚溫服治脾元虛弱冷氣上攻飲食減少硇砂丸方硇砂水煎飛成霜木香桂去粗皮肉豆蔻去殼炮附子炮裂去皮臍蘹香子炒青橘皮去白焙陳橘皮去白焙各半兩山芋半斤木瓜二枚上一十味納八味搗羅為末先以木瓜切蓋出瓤如小甕子樣存取元蓋逐個木瓜共入硇砂末半兩以元蓋緊縛用無灰酒三升於銀石器內以慢火煮候酒欲乾木瓜爛取出入前八味藥末相和杵丸如梧桐子大每服二十丸至三十丸鹽湯或鹽酒下治脾元虛冷心胸滿悶飲食減少臍腹撮痛面色黃黑耳焦枯陽事弱正陽丹方硫黃研菖蒲切天雄炮裂去皮臍阿魏醋調面和餅子炙各一兩沉香銼厚朴去粗皮生薑汁炙草豆蔻去皮乾薑炮桃仁去皮尖雙仁炒檳榔銼各半兩上十味搗羅為末再研令勻麵糊為丸如梧桐子大鹽湯下十五丸至二十丸治脾氣虛心腹脹滿少思飲食陳橘皮散方陳橘皮一兩半湯浸去瓤焙胡椒半兩桂心三分附子一兩炮裂去皮臍高良薑一兩銼甘草半兩炙微赤銼厚朴二兩去粗皮塗生薑汁炙令香熟訶黎勒一兩煨用皮上八味搗為末清粥飲調下一錢匕忌油治元氣虛損腹脅雷鳴中脘脹滿或發冷疼葫蘆巴湯方葫蘆巴炒川芎木香京三稜煨白朮官桂去皮白蒺藜微炒當歸益智陳橘皮去白以上各一兩沉香附子炮去皮臍舶上蘹香微炒各一兩半乾薑半兩炮甘草三分炙令黃苦楝子三兩取肉不用核上一十六味搗羅為細末每服二錢匕煎沸湯點不拘時服補虛進食正脾元豆蔻丸方肉豆蔻去殼炮檳榔銼桂去粗皮青橘皮去白焙半夏薑汁製附子炮裂去皮臍乾薑炮各一兩白朮二兩京三稜煨銼一兩半上九味搗羅為末醋煮麵糊丸如梧桐子大每服二十丸至三十丸空心鹽湯或溫酒下治男子婦人患後不思飲食補虛理中湯方檳榔銼白茯苓去黑皮益智去皮炒桂去粗皮陳橘皮去白焙半夏薑汁製沉香各一兩銼上七味粗搗篩每服三錢匕水一盞生薑二片棗二枚擘破煎至七分去滓溫服不拘時治脾臟虛冷臍腹疼痛胸脅痞悶不思飲食人參丸方人參白茯苓去黑皮厚朴去粗皮生薑汁炙青橘皮去白焙各一兩高良薑炒半夏湯浸七遍焙桂去粗皮各半兩甘草炙三分上八味搗羅為末生薑汁煮麵糊丸如梧桐子大每服二十丸生薑湯下不拘時候補脾胃悅顏色長肌進食大棗丸方大棗四升蒸熟去皮核研膏熟艾葉濃者粳米粥拌勻焙乾六兩杏仁去皮尖雙仁炒半夏薑汁浸一宿炒各二兩人參四兩上五味搗羅四味為末以棗膏丸如梧桐子大每服二十丸空心溫酒或米飲下治脾胃虛冷不進飲食硇砂丸方硇砂水煎成霜別研半兩人參白朮蓬莪朮煨銼吳茱萸湯浸焙炒白茯苓去黑皮青橘皮湯浸去白焙陳橘皮湯浸去白焙蓽茇各一兩半上九味除硇砂外搗羅為末同和勻酒煮麵糊丸如梧桐子大每服二十丸鹽湯下不拘時候補虛駐顏進飲食治一切冷氣少陽丹方蒼朮四兩去黑皮銼成塊子用漿水浸一宿取出用井水洗七遍焙乾炒蘹香子三兩炒附子二兩去皮臍漿水浸一復時取出別用漿水沙鍋子內煮切成片子焙乾丹砂半兩研細為衣上四味除丹砂外搗羅為末酒煮麵糊丸如梧桐子大以丹砂為衣每服二十丸空心夜臥溫酒或鹽湯下治脾元不和中焦痞悶氣滯噎塞不進飲食補虛沉香煮散方沉香銼木香青橘皮湯浸去白焙陳橘皮湯浸去白焙人參郁李仁湯浸去皮研甘草炙各一兩檳榔銼草豆蔻去皮桂去粗皮乾薑炮各半兩上一十一味搗羅為散每服三錢匕水一盞煎至七分去滓溫服不拘時補虛調腹臟論曰脾者倉廩之官胃為水穀之海其氣和平布散精微上注於心肺下流於腎肝虛損之人倉廩不足穀氣衰弱腹臟不調治法宜以調和脾胃為先補虛治氣調順三焦安和臟腹進飲食沉香湯方沉香一兩肉豆蔻仁桂去粗皮木香厚朴去粗皮生薑汁炙檳榔青橘皮湯浸去白焙訶黎勒皮白朮當歸焙京三稜醋浸一宿煨銼人參枇杷葉炙刷去毛芎藭乾薑炮蓬莪朮煨銼黃耆郁李仁湯浸去皮並雙仁附子炮裂去皮臍白茯苓去黑皮石槲去根酒浸微炙前胡去蘆頭枳殼去瓤麩炒甘草炙各半兩上二十四味銼如麻豆每服五錢匕水一盞半入生薑三片大棗三枚擘破煎至八分去滓稍熱食前服治臟腑虛弱眼目昏暗腰膝無力或多腦冷痠痛飲食減少補暖木瓜煎丸方木瓜宣州者兩枚去子蒸令熟黑豆揀細緊者一升陳橘皮湯浸去白吳茱萸各四兩上先煮黑豆令熟浥干卻入三味拌勻用好酒一斗入豆內同煎泣干漉出令爛研似麵糊然後入下項藥末附子炮裂去皮臍桂去粗皮芎藭羌活去蘆頭肉豆蔻去殼檳榔銼各一兩上一十味搗羅六味為末入在前膏內搜和令勻再杵得所為丸如梧桐子大每服十五丸至二十丸空心夜臥鹽湯下候見效即減五丸甚妙補元氣調臟腹解二毒傷寒除腰膝疼痛及治真陽傷憊霍亂吐瀉偏風𤸷麻痹痛腳氣注腫行履不得十華湯方附子炮裂去皮臍黃耆銼羌活去蘆頭白朮炒青橘皮湯浸去白桔梗炒乾薑炮桂去粗皮甘草炙五加皮用吳茱萸一兩以水一碗同五加皮煮之水盡為度去茱萸細銼皮焙乾用上一十味等分銼如麻豆每服三錢匕水一盞入生薑三片棗二枚擘破煎至六分去滓溫服治真臟氣弱洞泄寒中腹內雷鳴時多便泄飲食減少多困嗜臥石槲黃耆丸方石槲去根二兩肉蓯蓉酒浸切熔幹一兩半五味子黃耆微炙銼枳殼去瓤麩炒熟乾地黃焙各一兩訶黎勒皮半兩木香山芋蒼朮切碎炒澤瀉各一兩上一十一味搗羅為末以酒煮麵糊和丸如梧桐子大每服二十丸至三十丸溫酒或鹽湯下空心食前治元臟冷氣臍腹疼痛衝心及久瀉痢諸藥不瘥者歸命丸方青橘皮湯浸去白焙桂去粗皮半夏洗七遍去滑焙烏頭去皮臍附子去皮臍乾薑硫黃舶上者各半兩檳榔銼二枚胡椒四十九粒肉豆蔻去殼二枚上一十味並生為末唯硫黃別研極細為度入眾藥末中令勻以米醋麵糊更入鹽少許同和丸如綠豆大每日空心溫酒下十五丸疾甚不可救者煎鹽艾湯下二十丸治脾元虛冷泄痢不思飲食時多幹噦補益枳殼煎丸方枳殼去瓤麩炒四兩厚朴去粗皮生薑汁炙杏仁去皮尖雙仁炒吳茱萸洗乾薑炮附子炮裂去皮臍各半兩艾葉伏道者四兩揉如綿上七味搗羅六味為末以釅醋一斗於銀石器內煎艾得所次入藥末同煎再入臼杵千百下為丸如梧桐子大每服空心溫酒或生薑湯下二十丸加至三十丸補中益氣調順脾元治心胸滿悶不思食上熱下冷白豆蔻湯方白豆蔻仁半兩肉豆蔻仁三枚白朮一兩桂去粗皮半兩青橘皮湯浸去白半兩厚朴去粗皮生薑汁炙半兩甘草炙三分上七味粗搗篩每服二錢匕水一盞入生薑二片粟米少許棗二枚擘同煎至七分去滓熱服治一切冷氣積年氣痢補暖莨菪子丸方莨菪子水浸石灰清汁煮一復時掬出芽曝乾炒附子炮裂去臍皮乾薑炮陳橘皮湯浸去白焙桂去粗皮厚朴去粗皮生薑汁炙各半兩上六味搗羅為末水煮麵糊和丸如梧桐子大每服二十丸食前米飲下加至三十丸如覺熱發以綠豆汁解之補暖下元止泄痢雪粉丸方陽起石狼牙者半兩杵研如粉鍾乳研半兩砒霜細研半兩黃蠟用漿水煎煉三五遍令白半兩羊腎胠脂水洗過二兩上五味合研三味令勻粗瓷碗中炭火上熔蠟脂成汁下藥末攪勻拈下乘熱丸就如梧桐子大每服三丸空心新汲水下散宿冷調臟氣治腰膝疼痛調中丸方阿魏三錢用醋化成膏入白麵和作餅子焙乾厚朴搗作粗末用生薑自然汁拌勻慢火銚子內炒乾秤一錢白附子搗作粗末用醋拌勻慢火銚子內炒乾秤一錢草豆蔻和皮搗作粗末秤一錢入青鹽二錢入銚子內同炒黃色上四味搗羅為末酒煮麵糊丸如綠豆大以丹砂為衣每服二十丸至三十丸空心食前米飲下補虛厚腸胃美飲食樸附丸方厚朴去粗皮一斤生薑一斤同厚朴於木臼內搗勻取出曬乾附子炮裂去皮臍二兩乾薑炮半斤上四味搗羅為末熟棗肉並麵糊丸如梧桐子大空心食前溫酒或米飲下五十丸至七十丸治臟寒補下元內灸丸方艾葉一斤上於五月五日採取用米醋灑濕壓一宿以文武火焙乾為末卻用五日煮粽汁七升於鍋內熬成膏搗數百杵丸如梧桐子大每服二十丸空心鹽湯下補虛消痰論曰脾胃者倉廩之官播百物氣澤以埤諸臟腑者也脾土也土能制水則水不溢虛損之人脾胃氣弱故於水穀不能克消土氣不能勝水津液停積結聚上膈是為痰也今補虛兼以助脾之藥則痰自消矣補益五臟去痰飲三焦虛熱風勞毒氣攻手足寒熱煩躁枇杷前胡湯方枇杷葉去毛前胡去蘆頭白茯苓去黑皮木香澤瀉五味子訶黎勒皮桔梗炒各三分白芷防風去叉鱉甲醋炙去裙襴木通銼大腹皮銼京三稜炮銼厚朴去粗皮生薑汁炙各半兩當歸切焙芍藥牡丹皮枳殼去瓤銼炒甘草炙知母焙各一分人參藿香白朮各一兩一分半夏湯洗十遍米炒微黃一兩上二十五味粗搗篩每服五錢匕入生薑半分拍破棗二枚擘水二盞煎至一盞去滓稍熱服空心晚食前各一治身體勞倦四肢拘急腹內刺痛體弱風痰頭疼腎臟傷憊胸臆噎塞久積冷氣婦人血海冷滯補不足附子湯方附子炮裂去皮臍烏頭炮裂去臍皮柴胡去苗土前胡去蘆頭黃耆芎藭白朮人參木香當歸切焙羌活去蘆頭甘草炙桔梗炒白芷地榆桂去粗皮各一兩上一十六味銼如麻豆大每服三錢匕水一盞生薑二片棗二枚蔥白一寸同煎至七分空心服治肝腎久積風冷痰滯氣上攻眼目腫澀疼痛肌肉瞤動心神多倦去痰涎壯筋骨補元氣益心利肺天麻煎丸方天麻半斤淨洗焙乾搗末牛膝酒浸切焙一斤搗為末杏仁湯浸去皮尖雙仁細研四兩生地黃五斤好者淨洗於木臼內杵取汁三斤上四味一處於銀器內以水三斗煎至五七升以布絞取汁卻將滓於木臼內搗令極細後以水三五升浸取