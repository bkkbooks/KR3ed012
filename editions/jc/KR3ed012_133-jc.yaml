body:
  text: 卷第一百三十三浸淫瘡論曰心惡熱風熱蘊於心經則神志躁鬱氣血鼓作發於肌膚而為浸淫瘡也其狀初生甚微癢痛汁出漸以周體若水之浸漬淫泆不止故曰浸淫其瘡自口出流散四肢者輕毒氣已外出故也從四肢反入於口則重以毒復入於內故也治心有風熱生浸淫瘡遍體升麻湯方升麻大黃銼微炒黃芩去黑心枳實去瓤麩炒令黃芍藥各一兩甘草炙當歸切焙各半兩上七味粗搗篩每服五錢匕用水一盞半入燈心一握煎至一盞去滓空心晚食前溫服治浸淫瘡苦瓠散塗敷方苦瓠一兩蛇蛻炙焦蜂房炙焦各半兩大豆半升梁上塵一合上五味為細末以粉粥調塗敷瘡上以紙貼之日三五度治瘡癬浸淫鯽魚塗敷方生鯽魚長三寸豉一合上二味合搗令細塗敷瘡上日三治浸淫瘡戎鹽塗敷方戎鹽半兩大黃一兩䕡茹心一分上三味為細末以酒調塗敷瘡上日三五度治卒得浸淫瘡不早治則繞身周匝能殺人雞冠血塗方雄雞冠上刺血上一味塗敷日三五度治浸淫瘡牛屎汁塗方牛屎新者絞汁上一味敷之或取乾者燒煙燻之亦佳治浸淫瘡胡燕窠敷方胡燕窠上一味搗羅為末敷瘡上日三五度治浸淫瘡苦楝敷方苦楝枝及皮上一味燒灰研細濕即敷之干即豬脂調塗瘡上下注瘡論曰足三陰之脈脾腎肝之三經也並起於足大指小指之內循足跗內踝前廉膝脛中若風濕毒氣乘之則營衛凝澀稽留不行氣脈下注於腳膝脛間故令皮膚腫硬結核成瘡膿水不絕綿歷歲年愈而復發以毒氣自上而下如水之注故名下注瘡治腳膝生瘡風毒下注羌活煎丸方羌活去蘆頭天麻各二兩白花蛇寸截漿水煮熟去皮骨再用酒浸一宿安柳杖子上慢火炙乾四兩上三味搗羅為末酒煮麵糊和丸如梧桐子大每服二十丸溫酒下空心日午臨臥服治腳膝下注生瘡熱腫痛如聖丸方草烏頭去皮尖銼油煎令焦楓香脂研赤小豆躑躅花威靈仙地龍去土用火燒地赤色將醋澆過放地龍在上用碗蓋一時許取用仙靈脾蒺藜子炒去角乾蠍去土炒白殭蠶瓦上炒天南星炮防風去叉各半兩上十二味搗研為末醋煮麵糊和丸如綠豆大每服十丸至十五丸空心溫酒下治毒氣下注腳膝腫赤作瘡枳殼丸方枳殼去瓤麩炒三兩生乾地黃焙防風去叉五加皮銼各二兩羌活去蘆頭一兩黃耆銼三兩上六味搗羅為末煉蜜和丸如梧桐子大每服二十丸加至三十丸早晚食前溫酒下治腎臟風虛下注腰腳生瘡行步艱難筋脈拘攣不得屈伸腰腿冷痛黃耆丸方黃耆銼蘹香炒烏頭炮裂去皮臍楝實去皮防風去叉蒺藜子炒去角赤小豆地龍去土炒烏藥各等分上九味搗羅為末酒煮麵糊和丸如梧桐子大每服二十丸溫酒下鹽湯亦得婦人醋湯下空心日午服治下注熱毒瘡苦參散方苦參白花蛇酒浸去皮骨炙白芷蒺藜子炒去角各一兩上四味搗羅為散每服一錢匕加至二錢匕溫酒調下治下注瘡累年不已去息肉生好肉排膿止痛露蜂房散敷方露蜂房三枚燒灰黃柏去皮甘草銼黃連去須松脂細研各一兩上五味搗研為散再同和勻每用時以水銀粉少許同麻油調勻入前藥散再和敷瘡口日三次治一切風毒惡瘡及下注瘡或痛或癢蘭香散敷方白蘭香葉陰乾百合黃柏蜜炙銼胡粉研黃蜀葵花焙各一兩上五味搗研為散以醋調塗瘡上如有汁即干敷治下注並惡瘡多年不效者勝金散敷方黃連一兩半半炒半生用鬱金生用半兩天南星一枚紫鉤藤白蘞白芨各一分膩粉少許上七味搗研為散每用時先濃煎蔥椒湯淋洗去瘡皮拭乾次以津唾調藥散敷或用紙花子蓋之亦得如瘡濕即乾摻治下注瘡蚓泥散敷方韭菜地蚯蚓糞燒通赤一兩膩粉一分麝香半錢上三味各研為散再同和勻每用先煎蔥湯洗了將藥干敷治下注生瘡黃白散敷方黃柏蜜炙白堊蕪荑併為末各一分杏仁去皮尖雙仁研膏七枚膩粉研二錢匕上五味再同研勻先以鹽漿水洗候乾以藥散敷之又方白礬燒枯一分黃連去須半兩膩粉一錢烏雞子取白一枚上四味將前三味搗研為末以雞子白調塗如有膿即用鹽蔥湯洗後敷治下注瘡鯽魚散敷方鯽魚去肚腸一枚黃連去須半兩鉛丹密陀僧碎胡粉研各一錢上五味將前三味入鯽魚肚內卻纏合固濟了燒通紅取出候冷同粉研為細末用豬膽汁調敷瘡上治腎臟風毒下注生瘡驢蹄散敷方驢蹄二十片燒灰密陀僧研一分輕粉一錢匕麝香半錢匕上四味再同研勻先拭去膿汁次用藥乾摻日三四次瘥治下注瘡豆連散敷方赤小豆黃連去須等分上二味搗羅為散先用溫鹽漿水洗令淨次將藥散用豬膽汁調塗之日三換治下注瘡爛肉陷必效散敷方鯽魚一頭去腸入頭髮不拘多少燒為灰上一味碾為散先用蔥湯洗瘡口次以藥敷之治諸惡瘡下注氣血冷新肉不生蒜灰散方蒜一百顆上一味去根苗切曝乾鐵鍋內露地燒令通熱扇去灰入蒜在內用一淨盆蓋之周圍以淨土護縫不令透風經一宿取出扇去灰土搗研令極細不拘多少干敷瘡上此治冷惡瘡最妙熱毒惡瘡不可敷令人肉轉爛故也治下注腳膝生瘡不可垂腳腫疼豆粉散方綠豆粉石器內炒黃濕地上出火毒研細先以溫水洗瘡干敷甚者再敷即愈治裡外廉瘡遠年不瘥者檳榔散方檳榔銼半兩干豬糞半兩燒存性龍骨一分膩粉二錢匕上四味搗羅三味入膩粉研勻先以鹽湯洗瘡熟絹浥干以生油調藥如膏貼瘡三日一易三五易定瘥忌無鱗魚酢熱面凡脛內外瘡世謂之裡外廉瘡最難得藥此方神妙治下注腳瘡火府丹方甘遂肥實連珠者一兩切疏布囊盛芎藭一分銼如豆上二味以大紙籠罩香爐令至密不漏煙頂留一竅垂甘遂囊於竅間其下燒芎藭一塊令煙燻甘遂欲過更燃以芎藭盡為度取甘遂搗末三十歲以上氣盛者每服三錢匕虛者二錢羯羊腎一對批開勻分藥末在內淨麻纏定炭炙熟臨臥爛嚼溫酒下隨人酒量能飲一斗者可飲五升也以高物支起雙腳一服即瘥諸瘡水毒焮腫論曰內經謂濕傷肉以脾主肌肉而惡濕也諸瘡未合或中於水則水毒發腫能為焮痛膿潰不止是為濕傷肌肉治宜敷藥使水盡出則肌肉溫平瘡可愈治水毒入諸瘡腫痛不止追水散方真炭灰四兩獖豬膽一枚蛤粉二兩上三味細羅灰以紙一幅鋪地上攤灰可兩指厚取豬膽汁傾灰上經宿取濕著者灰曝乾入蛤粉同研勻每用少許摻瘡上如瘡口合者以針挑破摻之水即出治水毒入瘡腫痛或刺入骨者皂子散方皂莢子不蚛者七枚大蝦蟆乾者一枚胡椒十五粒上三味用坩鍋入藥在內瓦蓋鍋口慢火燒煙盡取出研細每用藥先以溫漿水洗瘡口拭乾摻藥次以別膏藥貼之良久水盡出有刺者即自見治一切瘡或外傷肌肉水入作膿焮腫久不瘥寸金散方蝦蟆自死者新磚等分上二味同搗勻捏作餅子曝乾為細散摻瘡口上即撮出毒水盡以別藥敷貼治破傷水入腫潰不愈鉛丹散方鉛丹蛤粉等分上二味同炒令變色摻瘡上水即出治諸瘡水毒腫痛烏梅散方烏梅皂莢子等分上二味各燒存性研勻貼瘡上毒汁即出治皂莢水及惡水入瘡熱痛不止烏犀膏方皂莢子燒存性一分沙糖半兩上二味先研皂莢子灰令細續入沙糖和勻如膏貼瘡上治一切水毒入瘡腫及驢涎馬汗天雄散方天雄去皮上一味用瓷瓦子刮細末貼瘡口治諸瘡水毒或中風反張腫入腹者殺人亂髮熏方亂髮一兩雞糞三兩大麻子黑豆各三兩青布一尺以蠟三兩於火上攤令盡上五味以發散青蠟布上次摻雞屎麻豆等令勻卷如餅纏縛之以筒瓦一口仰慢火上安藥復以一瓦復定塞一頭令煙出一頭於煙上熏之瘡中即黃水出煙盡乃止或汗出勿見風熏干余蠟滴瘡口內治諸瘡中水毒攻腫胡粉塗方胡粉石灰研羅各三分上二味煉豬脂調如糊塗瘡上水即出冷瘡論曰形不足者溫之以氣氣能養形故也周官瘍醫掌腫瘍潰瘍金瘍折瘍有五氣養之之法蓋以氣不足則血不行血不行則經久不瘥所謂冷瘡是也蓋諸瘡既潰風冷之氣客於營衛傷於肌肉故令瘡冷而不痛癢俗謂之冷瘻治宜溫肌養血滌汙除膿則愈治冷瘡或在項上或在脅間年深未瘥木香散方木香乳香各一分母丁香一枚麝香當門子三豆大上四味搗研為散用雞子一枚打作眼子取清和藥二錢匕卻入在空殼內濕紙蓋了飯上炊熟分作四服每日空心午間臨臥各一服爛嚼臘茶下治冷瘡長肌肉止疼丹砂散方丹砂一分麝香半錢陳石灰煅過一分鋁丹炒一分豬筒骨一枚煅過上五味並搗研羅為散每用一錢匕干敷之治諸瘡口氣冷不瘥豬骨膏方豬筒骨二個取髓松脂通明者研用二錢乳香研黃連去須為末白芨為末各一分鉛丹別研黃蠟各半兩上七味搗研熔蠟和為膏不拘時敷之治一切瘡久冷葶藶膏方葶藶一兩蜣螂乾者五枚馬銜蟲乾者五枚蟬殼炙五枚斑蝥炒五枚麝香細研一錢上六味搗研為末煉蜜和為膏以故帛上攤貼日二次瘥為度治冷瘡經久不愈金黃散方雌黃栝蔞根五倍子各等分上三味為散先用溫漿洗瘡了干貼如瘡口久不合者洗了用巴豆一米許納瘡內待血出後敷此藥治冷瘡及膝脛生瘡年深筋骨攣躃膿血不瘥乳香散方乳香一錢紫藤香末一錢安息香灰半錢人指甲灰半錢硇砂一字上五味細研令勻用油單裹角令人懷中貼肉懷十日取再研令勻患者先以溫水洗瘡以紙拈子尖上點藥少許深納瘡中外面以帛子裹縛令定一夜當取出惡物如魚腸之類自然生肉治冷瘡不愈二黃散方雌黃研雄黃研密陀僧煅研定粉膩粉各一分上五味研細入乳香少許蜜調貼之治冷瘡暖瘡口雄黃散方雄黃研百合乳香研黃柏去皮炙牆上爛白蜆子是小蚌蛤子各一分治五味為細散先用漿水煎甘草濕柳枝湯溫洗拭乾敷之治諸冷瘡久不瘥乳香膏方乳香末一兩食鹽末松脂杏仁湯浸去皮尖研各一兩半生地黃汁三合白羊腎膒脂半斤蠟三兩上七味先熬脂令沸下杏仁生地黃汁蠟煎候蠟熔盡入香鹽松脂煎以柳篦攪令勻稀稠得所瓷合盛取敷瘡上日三兩度治諸冷瘡紫肉久不瘥六灰煎膏方石灰五升蒺藜灰白頭翁灰桑新灰白柞木灰如無以腐蒿灰代之藜蘆灰各半升上六味相和於瓦甑內蒸一復時取釜中湯淋下灰汁二升於銅器中煎熬成膏以瓷合盛先以鹽湯洗瘡後取塗敷患上日三五度即瘥治冷瘡諸瘡中風冷氣膿出痛急灸藥餅方薤白切二合商陸切一合上二味以鹽半兩相和熟搗令細捻作餅厚如錢安瘡口上以艾炷灸令熱氣射瘡中即水出再灸水出盡即止餅子干頻頻換之以瘥為度治諸瘡風冷腫痛皆因瘡腫坐於水中及風冷所致或致反張腫入腹則能殺人蔥白湯蒸方蔥白切蜀椒去目及合口者薤白切合半升香豉二合防風去叉二兩芎藭一兩半上六味銼碎取一長項瓷罌納藥於罌中下水二升以故帛及紙三兩重密封罌口以繩縛之然後納罌放釜中以水煮之罌中氣沸盛穿破紙帛當中通氣以瘡當氣上射之瘡中黃水出盡即止日三兩度再煮罌令熱用之以瘥為度治冷瘡亂髮熏方亂髮雞糞蠟各二兩大麻子大豆各二合青布一尺二寸上六味先鋪發安青布上次鋪雞糞蠟麻豆等如裹餅角可粗如臂長一尺以來以繩縛之取一瓦著煻灰火置藥於瓦中更以一瓦復上以繩縛定塞一頭孔其煙只一頭出以瘡當煙上射之令瘡中黃水出盡乃止或汗出勿觸風熏了熔熱蠟注瘡中即瘥治冷瘡暖瘡口止疼痛乳香散方乳香研麝香研黃蜀葵花搗白小豆搗黃柏搗等分上五味搗羅為細散干敷瘡口治冷瘡桑灰洗方上以水淋桑柴灰汁溫浸洗日三五度即瘥治冷瘡久不瘥棗肉浸洗方棗肉二斤上一味以水五升煮取三升浸之洗瘡以瘥為度治一切瘡口氣冷不合生肌散方秦艽淨洗焙乾上一味為細末貼之便生肌肉熱瘡論曰熱瘡本於熱盛風氣因而乘之故特謂之熱瘡蓋陽盛者表熱形勞則腠疏表熱腠疏風邪得入相搏於皮膚之間血脈之內聚而不散故蘊結為瘡赤根白頭輕者瘭漿汁出甚者腐為膿血熱少於風則癢熱盛於風則痛而腫治瘡退風熱黃耆湯方黃耆銼一兩半生地黃四兩甘草炙銼芍藥麥門冬去心焙黃芩去黑心各一兩半石膏碎芎藭大黃銼炒人參當歸切焙各一兩半夏薑汁製半兩上一十二味銼如麻豆大每服五錢匕用水一盞半竹葉七片煎至一盞去滓空心溫服日晚再服治表熱實身體生瘡或發瘡癤大小便不利梔子湯方梔子仁半兩知母焙甘草炙銼黃芩去黑心各一兩大黃銼炒二兩上五味粗搗篩每服五錢匕水一盞半煎至一盞去滓入芒硝一錢匕空心溫服以利為度未利再服治體卒生熱瘡麥門冬湯方麥門冬去心焙二兩豉炒一分人參三分桑根白皮銼一兩半桂去粗皮半兩甘草炙銼一兩上六味粗搗篩每服五錢匕用水一盞半蔥白三寸切同煎至一盞去滓空心服晚再服治熱瘡二參丸方玄參烏頭裂炮去皮臍何首烏各二兩苦參二兩丁香一分上五味搗羅為末麵糊丸如梧桐子大每服二十丸至三十丸空心鹽湯下日三治熱毒瘡腫大黃散塗敷方大黃銼炒赤小豆各二兩石灰一兩上三味搗羅為散用釅醋調塗敷瘡上日三五度即瘥治熱瘡木蘭皮膏方木蘭皮芍藥射干蛇床子各一兩白芷黃連去須各一兩半黃柏去粗皮黃芩去黑心狼牙山梔子各一兩豬脂二斤上十一味除脂外細銼如麻豆大先熬脂令沸下藥煎候白芷黃赤色以綿濾去滓瓷合盛塗瘡上日三五度即瘥治熱不散體生細瘡並熱不已黃連湯洗方黃連去須四兩芒硝四兩上二味先將黃連以水一斗煎取七升去滓下芒硝乘溫洗瘡上冷即再暖洗日三五遍以瘥為度治熱瘡多膿汁芎藭散塗敷方芎藭大黃生白蘞芍藥黃連去須槐皮銼龍骨火燒各半兩上七味搗羅為散塗敷瘡上日三五度治熱瘡蛇床子散塗敷方蛇床子乾地黃各半兩苦參洗大黃生木通銼白芷洗黃連去須各一兩狼牙半兩上八味搗羅為散旋取臘月豬脂調塗敷瘡上日三五度治熱瘡大黃散塗敷方大黃生為末硝石研各半兩黑膠一分上三味先搗大黃硝石為末用醋半合熔膠烊調散子如糊塗敷患上日三五度即瘥治熱瘡疼痛不可忍硝石水漬方硝石研末上以紙拈作繩如指大累起團腫上取硝石填令滿以匙抄新汲冷水澆令濕候覺寒冷不痛即止日三四遍瘥為度治熱毒瘡腫水射注方上以瓦瓶底鑽孔盛水射注患上覺寒即止便用雞子白塗敷日三五上腫瘥為度治熱瘡茄子角方上取生茄子一枚割去二分令口小去瓤三分似一罐子將合於腫上角即消如已出膿再用取瘥為度治熱瘡生地榆根湯洗方生地榆根二斤洗切上一味細銼以水一斗煎取五升去滓溫洗瘡上冷即溫日二度即差治大瘡熱退膿血不止瘡中肉虛疼痛排膿內塞散方防風去叉白茯苓去黑皮白芷桔梗銼炒遠志去心甘草炙銼人參芎藭當歸切焙黃耆銼炒各一兩桂去粗皮半兩附子二個炮裂去皮臍厚朴去粗皮生薑炙三分赤小豆五合酒浸熬之上一十四味搗羅為散酒調下二錢匕日三夜一月蝕瘡論曰月蝕瘡小兒多有之蓋由嗜甘肥營衛不清風濕毒熱之氣蘊蓄腑臟其瘡多生於兩耳及鼻面間並下部諸孔竅側侵蝕之甚則潰爛黃赤汁流達於筋骨月初則瘡盛月晦則瘡衰以其隨月盈虛故名月蝕或謂小兒以手指月而生未必然也治月蝕瘡多在兩耳上及竅傍隨月盈虛水銀膏塗敷方水銀一分胡粉研黃連去須為末松脂各半兩豬脂四兩上五味先熬脂令沸下松脂諸藥末水銀攪令勻瓷合盛先以鹽湯洗瘡塗敷日三五度又方虎頭骨末豬脂各二兩上二味和調如糊先用鹽湯洗瘡塗敷瘡上日三五度治月蝕瘡甘草散塗敷方甘草末青蛙自死者燒作灰母豬蹄甲燒作灰救月杖燒作灰一兩上四味搗羅研細拌勻以蜜調塗敷瘡上日三五度治月蝕瘡入鼻口及九竅孔並諸瘡豉塗敷方豉蝦蟆五月五日取一枚自死者上二味將鹽豉不以多少填滿蝦蟆腹掛於屋北令乾燥以紙泥裹之埋釜鍋底三炊久燒之取出去泥搗細研為末塗敷瘡上干即以豬脂和七月七日修合亦得日三五度治月蝕瘡鼓皮醋塗方鼓皮如手掌大醋二升上二味以醋浸皮經一宿取汁塗敷瘡上日三五度治月蝕瘡息肉硫黃塗敷方石硫黃細研䕡茹末各一兩斑蝥去足翅半兩細研上三味搗研和勻先用鹽湯洗瘡後塗敷瘡上如干者以豬脂調和塗敷日三度治月蝕濕蟲瘡䘌半夏根散方半夏根五月五日取一兩木瓜根烏頭各一兩上三味陰乾並細銼搗羅為散每取棗核許大以綿裹納穀道中日二度治月蝕瘡礬石塗敷方礬石研石硫黃研各半兩五月五日蝦蟆自死者一枚燒作灰上三味細研為末先以鹽湯洗瘡塗敷日三五度以瘥為度治月蝕瘡茱萸湯洗方茱萸根地榆根薔薇根各一兩上三味細銼以水五升煎至二升半去滓溫洗瘡冷即止日三兩度洗之敷以他藥治月蝕下部濕䘌兔頭散方臘月兔頭一枚燒過五月五日蝦蟆自死者一枚燒灰代赭一兩地黃葉灰半兩虎頭骨炙令赤黑色二兩貝子燒過七枚小薊灰半兩上七味搗羅為散以綿裹如棗核大納下部中兼每日空心新汲井水調下半錢匕服以瘥為度治月蝕瘡酥粉塗敷方酥二兩胡粉一兩細研上二味調和如糊塗敷瘡上日三五度治卒得月蝕瘡塗敷方上取羅摩草研絞取汁塗敷日三五度又方射干三兩甘草炙一兩上二味粗搗篩每服五錢匕用水一盞半煎至五合濾去滓空心溫服午時晚間再煎服治卒得月蝕瘡塗敷方蝦蟆一枚自死者兔糞月望夜取上二味破蝦蟆腹納兔糞滿合定於炭內燒過細研為末塗敷瘡上日三五度又方地龍糞燒通赤為末豬脂各三兩上二味調塗敷瘡上日三五次以瘥為度
