body:
  text: 卷第九十二虛勞小便白濁論曰虛勞小便白濁者腎氣勞傷胞絡內冷氣道不宣通也腎主水腎虛則胞冷而津液停滯故令小便白濁如米脂而下治虛勞小便白濁少腹拘急夢寐失精陰下濕癢五味子丸方五味子石龍芮炒烏頭炮裂去皮臍石槲去根萆薢菟絲子酒浸別搗防風去叉棘刺小草山芋牛膝去苗酒浸切分枸杞根銼細辛去苗葉各一兩桂去粗皮葳蕤麥門冬去心焙乾薑炮厚朴去粗皮薑汁炙銼各半兩上一十八味搗羅為末煉蜜和丸如梧桐子大空心溫酒下三十丸夜臥再服漸加至五十丸治虛勞小便白濁夢泄韭子散方韭子炒菟絲子酒浸一宿別搗車前子各一兩附子炮裂去皮臍一分當歸切焙芎藭礬石燒令汁盡各三分桂去粗皮二兩上八味搗羅為散每服二錢匕空心溫酒調下不欲調服者煉蜜和丸如梧桐子大空心溫酒下二十丸治大虛損內傷腎氣小便白濁澤瀉散方澤瀉龍骨桑螵蛸炙車前子狗脊去毛各一兩上五味搗羅為散每服二錢匕空心溫酒調下夜臥服亦佳治虛損大勞驚恐失精莖中痛小便白濁或赤或如豆汁或遺瀝澤瀉湯方澤瀉一兩黃耆銼三分乾薑炮甘草炙銼桂去粗皮牡蠣煅令赤芍藥各半兩上七味粗搗篩每服五錢匕水一盞半煎至一盞去滓空心分溫二服如小便淋即以熱酒調三錢匕去滓澄清服日三治虛勞腎氣不足小便白濁補下元益精氣久服駐顏補虛長肌肉鹿茸丸方鹿茸去毛酥炙黃磁石燒醋淬七遍研水飛各二兩山芋遠志去心牛膝去苗酒浸切焙白茯苓去黑皮熟乾地黃焙桂去粗皮巴戟天去心續斷肉蓯蓉酒浸一宿去皴皮炙澤瀉五味子人參山茱萸菟絲子酒浸三日焙別搗補骨脂炒杜仲去粗皮炙黃銼附子炮裂去皮臍各一兩上一十九味除磁石外搗羅為末入磁石拌勻煉蜜和丸如梧桐子大每服三十丸空心溫酒下治虛勞下元虛冷小便白濁精滑不禁七聖丸方原蠶蛾炒牛膝酒浸一宿焙銼龍骨白石脂桑螵蛸炒各半兩肉蓯蓉酒浸一宿切焙山芋各一分上七味搗羅為末酒煮麵糊和丸如梧桐子大每服二十丸溫酒下空心食前治虛勞腎氣衰弱小便白濁陰囊濕癢羸瘦多忘面無顏色巴戟丸方巴戟天去心一兩半肉蓯蓉酒浸去皴皮切焙二兩牛膝去苗同蓯蓉酒浸山芋各一兩杜仲去粗皮炙銼一兩半續斷蛇床子各一兩菟絲子酒浸焙別搗一兩一分白茯苓去黑皮一兩山茱萸五味子各一兩一分遠志去心一兩上一十二味搗羅為末煉蜜和杵數百下丸如梧桐子大每服三十丸空心溫酒下日晚再服服藥五十日後筋骨健壯百日後面如童顏久服令人精滿充溢如精澀更加柏子仁三分如精虛加五味子一兩半陽弱加續斷一兩半治虛勞下元不足小便白濁補益椒紅丸方蜀椒去目並閉口炒出汗取紅巴戟天去心上二味等分搗羅為末醋麵糊和丸如梧桐子大每服十五丸加至二十丸空心溫酒或鹽湯下治虛勞有熱虛煩口乾腰胯疼痛小便白濁如米泔黃耆丸方黃耆銼一兩半栝蔞二兩苦參二兩半羚羊角鎊一兩半黃連去須二兩茯神去木一兩半澤瀉一兩半桑螵蛸十枚炙牡蠣粉一兩半雞膍胵里黃皮五枚炙甘草炙一兩半上一十一味搗羅為末煉蜜和丸如梧桐子大每服三十丸空心米飲下治虛勞腎虛引飲小便白濁羸瘦腰疼人參湯方人參遠志去心澤瀉五味子桂去粗皮當歸切焙芎藭桑螵蛸炙熟乾地黃焙各一兩黃芩去黑心白茯苓去黑皮芍藥雞膍胵里黃皮炙各半兩麥門冬去心焙二兩上一十四味粗搗篩每服五錢匕水一盞半入羊腎一枚切生薑半分棗三枚劈同煎至一盞去滓溫服空心食前治虛勞小便白濁失精菟絲子丸方菟絲子酒浸一宿搗末麥門冬去心焙萆薢厚朴去粗皮生薑汁炙柏子仁研肉蓯蓉酒浸切焙桂去粗皮石槲去根遠志去心細辛去苗葉杜仲去粗皮炙銼牛膝酒浸切焙防風去叉各一兩棘刺二兩石龍芮三兩烏頭炮裂去皮臍半兩上一十六味搗羅為末以雞子黃和為丸如梧桐子大每服三十丸米飲下空心日午服虛勞小便餘瀝論曰虛勞小便餘瀝者腎氣虛弱而膀胱不利故也膀胱不利則氣不能化氣不化則水道不宣故小便後有餘瀝治虛勞腎氣內傷小便餘瀝陰下濕癢四肢羸極夢寐失精夜有盜汗磁石丸方磁石燒令赤醋淬五遍水飛半兩五味子人參各一兩白茯苓去黑皮半兩桂去粗皮一分黃耆銼赤芍藥防風去叉地骨皮各半兩甘草炙銼一分上一十味搗羅為細末煉蜜和丸如梧桐子大空腹米飲下二十丸治虛勞腎氣內損夢泄盜汗小便餘瀝陰痿濕癢欲成骨蒸名曰勞極黃耆湯方黃耆銼人參各半兩牡蠣燒研如粉一分赤芍藥桂去粗皮地骨白皮五味子白茯苓去黑皮防風去叉陳橘皮湯浸去白焙各半兩甘草炙銼磁石煅醋淬五遍各一分上一十二味粗搗篩每服三錢匕水一盞入生薑半分劈碎棗兩枚去核煎至七分去滓空腹溫服日午晚食前再服治虛勞胸中客熱目視𥉂𥉂恍惚發熱臥不得安少腹拘急小便餘瀝臨事陽弱陰下濕癢小便白濁平補湯方黃耆銼芍藥各二兩甘草炙銼人參各一兩桂去粗皮二兩當歸銼炒一兩上六味粗搗篩每服三錢匕水一盞入生薑半分劈碎棗二枚去核煎至七分去滓空腹溫服日午夜臥再服如寒加厚朴二兩去粗皮生薑汁炙治五勞七傷陰衰小便餘瀝陰中痛精清囊下濕胸脅痛兩膝厥冷不欲行胃中熱遠視淚出口乾腸鳴蛇床子丸方蛇床子炒肉蓯蓉酒浸去皴皮切焙細辛去苗葉石葦去毛山茱萸礜石煅研防風去叉遠志去心赤石脂白茯苓去黑皮澤瀉柏子仁炒別搗末菖蒲栝蔞根天雄炮裂去皮臍牛膝去苗酒浸銼焙續斷山芋杜仲去粗皮酥炙細銼各一分上一十九味搗羅為細末煉蜜丸如梧桐子大空腹溫酒下三十丸夜臥再服治虛勞腎氣冷弱小便餘瀝黃耆丸方黃耆銼三兩肉蓯蓉酒浸去皴皮切焙鹿茸酥炙去毛各一兩半菟絲子酒浸一宿別搗三分石槲巴戟天去心各一兩山芋一兩半遠志去心柏子仁炒別研各三分白茯苓去黑皮一兩澤瀉三分山茱萸一兩熟乾地黃洗去土切焙六兩續斷一兩桂去粗皮三分上一十五味搗羅為細末煉蜜丸如梧桐子大每日空心煎棗湯下三十丸午食前再服治虛勞腎氣不足下焦冷弱小便遺瀝腰膝疼重鹿茸丸方鹿茸去毛酒浸三宿焙二兩菟絲子淘酒浸三宿焙別搗紫菀去苗土肉蓯蓉酒浸三宿去皴皮切片焙乾黃耆細銼桑螵蛸銼炒陽起石燒令赤白茯苓去黑皮白蒺藜揀炒別杵桂去粗皮附子炮裂去皮臍蛇床子揀淘浸三宿焙乾各一兩上一十二味搗羅為細末煉蜜和丸如梧桐子大每服三十丸空心溫酒下治虛勞不足小便淋瀝少腹㽲痛臍腹脹滿茯苓丸方白茯苓去黑皮二兩食不消多飲者加一倍附子炮裂去皮臍二兩有風者三分加一倍山茱萸二兩腹痛者三分加一倍杜仲去粗皮酥炙銼二兩腹中游氣者三分加一倍澤瀉二兩有水氣者三分加一倍山芋三兩頭風者加一倍桂去粗皮六兩顏色不足者三分加一倍細辛去苗葉三兩目視𥉂𥉂者三分加一倍石槲二兩陰濕癢者三分加一倍肉蓯蓉酒浸去皴皮炙三兩身痿加一倍黃耆銼四兩體疼者加一倍熟乾地黃二兩焙色萎黃者三分加一倍上一十二味搗羅為細末煉蜜和丸如梧桐子大每服十五丸溫酒或米飲空腹服日晚再服治虛勞陽氣不足陰氣痿弱囊下濕癢小便餘瀝天雄散方天雄炮裂去皮臍一兩五味子半兩山芋熟乾地黃焙各三分巴戟天去心一兩續斷三分蛇床子炒一兩遠志去心三分桂去粗皮一分上九味搗羅為細散每服二錢匕食前溫酒調下治虛勞腎氣衰弱小便餘瀝陰痿失精腰膝無力石槲丸方石槲去根銼一兩半巴戟天去心一兩杜仲去粗皮細銼炒牛膝去苗酒浸焙各一兩半桑螵蛸銼炒一兩鹿茸去毛酥炙黃一兩半補骨脂炒龍骨各一兩上八味搗羅為細末煉蜜和搗五百下丸如梧桐子大食前溫酒下三十丸治虛勞小便餘瀝尿精二參丸方人參半兩桂去粗皮牡蠣煅研成粉山芋黃柏去粗皮蜜炙銼細辛去苗葉附子炮裂去皮臍苦參各三分麥門冬去心焙澤瀉各一兩乾薑炮生乾地黃焙各一分菟絲子酒浸一宿別搗半兩上一十三味搗羅為細末煉蜜和丸如梧桐子大每服三十丸空腹溫酒下如𤸷痹加附子炮裂去皮臍一分婦人血傷加乾地黃焙半兩黃柏去粗皮蜜炙一分治虛勞小便餘瀝及失精車前草飲方車前草一握上一味搗取汁和蜜等分空腹溫服虛勞小便利論曰腎主水開竅於二陰位處下焦與膀胱為表裡膀胱者津液之府臟腑和平則能制津液使溲便有常若勞傷腎氣不足膀胱經寒則津不能自制故小便利而多也治虛勞小便利菟絲子丸方菟絲子酒浸別搗鹿茸去毛酥炙肉蓯蓉酒浸去皴皮切焙五味子各二兩上四味搗羅為末醋煮麵糊和丸如梧桐子大每服五十丸空心米飲下治虛勞不足四肢沉重口燥吸吸少氣小便利黃耆湯方黃耆銼半夏湯洗去滑焙各一兩半白茯苓去黑皮桂去粗皮芍藥甘草炙各一兩當歸切焙人參各半兩桑螵蛸切破炙十枚上九味粗搗篩每服三錢匕水一盞入生薑半分拍碎棗兩枚劈破煎至七分去滓溫服空腹日午夜臥各一治虛勞下焦虛冷不渴小便自利建中湯方黃耆芍藥各二兩桂去粗皮人參當歸切焙各一兩上五味銼如麻豆大每服三錢匕水一盞入生薑半分劈碎棗二枚劈破煎至七分去滓下餳一分攪令消溫服早晨日午夜臥服若失精加龍骨白薇各一兩治虛勞不足小便利數呼吸短氣煩渴引飲膀胱滿急腎瀝湯方遠志去心人參五味子石槲去根澤瀉當歸切焙桂去粗皮甘草炙銼白茯苓去黑皮桑上寄生各一兩麥門冬去心焙三兩熟乾地黃焙栝蔞根地骨皮各一兩半上一十四味粗搗篩每服三錢匕水一盞半入羊腎一分細切先煎一兩沸次入生薑半分拍碎棗二枚劈破煎至七分去滓空腹溫服食後再服治勞傷小便利數加減阿膠湯方阿膠炙令燥遠志去心各二兩乾薑炮人參各一兩麻子仁研三兩附子炮裂去皮臍一枚甘草炙一兩半上七味銼如麻豆每服三錢匕水一盞煎至七分去滓空腹溫服治虛勞傷憊舉體無力四肢煩疼腰膝冷痛夜多小便面色青黑寢臥盜汗厚朴丸方厚朴去粗皮薑汁炙胡黃連補骨脂微炒秦艽去苗土防風去叉桂去粗皮附子炮裂去皮臍乾薑炮柴胡去苗各一兩上九味搗羅為末無灰酒一升半相和銀石器內文武火煎成膏可丸以少酥和勻臼中搗千杵丸如梧桐子大每服空腹鹽湯下二十丸夜臥再服治虛勞下焦傷憊目昏耳聾腰膝冷痛小便滑數日漸瘦悴杜仲丸方杜仲去粗皮炙銼肉蓯蓉酒浸去皴皮切焙巴戟天去心楮實五味子蘹香子炒遠志去心山茱萸白茯苓去黑皮各一兩山芋牛膝酒浸切焙各三分上一十一味搗羅為末煉蜜和丸如梧桐子大每服十五丸加至三十丸空心溫酒下治虛勞元臟久冷小便利數精神恍惚四肢無力骨節痠痛椒紅丸方蜀椒取紅補骨脂炒楝實去皮核炒等分上三味搗羅為末煉蜜和丸如梧桐子大每服十丸至二十丸空心溫酒下治虛勞極冷陽氣衰弱小便數滑遺瀝堅固丸方烏頭炮裂去皮臍蘹香子炒等分上二味搗羅為末薑汁煮糊和丸如梧桐子大每服十五丸空心溫酒下婦人赤白帶下醋湯下加至三十丸治虛勞小便不禁菟絲子散方菟絲子酒浸三日曝乾搗末肉蓯蓉酒浸一宿去皴皮切焙各二兩牡蠣熬為粉附子炮裂去皮臍五味子各一兩雞䏶胵微炙三兩上六味搗羅為散每服二錢匕米飲調下空腹食前治虛勞下焦冷氣少腹疼痛小便滑數天雄丸方天雄炮裂去皮