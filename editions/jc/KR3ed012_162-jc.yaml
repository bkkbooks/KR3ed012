body:
  text: 卷第一百六十二產後中風偏枯論曰人之氣血環周一身無或偏廢產後中風偏枯者由新產之後氣血俱耗不能周榮於肌肉致體或偏虛風邪乘虛入客於半身日加痿瘁而為偏枯也治產後中風偏枯手足不遂痿弱無力天雄散方天雄炮裂去皮臍附子炮裂去皮臍五味子炮白朮人參白芷細辛去苗葉各一兩烏頭炮裂去皮臍柴胡去苗麥門冬去心焙乾薑炮各三分麻黃去根節山茱萸蜀椒去目並閉口炒出汗桔梗銼炒各半兩當歸切焙一兩半防風去叉二兩上一十七味搗羅為散每服二錢匕溫酒調下不拘時治產後中風手足偏枯筋脈弛緩疼痛無力椒附湯方蜀椒去目並閉口者炒出汗半兩附子炮裂去皮臍防風去叉桂去粗皮白茯苓去黑皮甘草炙銼麻黃去節煎去沫焙杏仁去皮尖雙仁炒石膏碎各一兩人參芍藥各一兩半當歸切焙芎藭各二兩乾薑炮黃芩去黑心各半兩上一十五味銼如麻豆每服三錢匕水一盞入生薑三片棗一枚擘煎至七分去滓溫服不拘時治產後中風偏枯手足不仁或筋脈無力不能自舉心下多驚菖蒲湯方菖蒲洗銼遠志去心木通銼白茯苓去黑皮人參石決明當歸切焙防風去叉桂去粗皮各一兩上九味粗搗篩每服三錢匕水一盞生薑三片棗一枚擘同煎七分去滓溫服不拘時治產後中風偏枯手足不遂痿弱無力或癡或痛獨活湯方獨活去蘆頭二兩桑寄生一兩一分杜仲去粗皮切炒牛膝酒浸切焙細辛去苗葉秦艽去苗土白茯苓去黑皮桂去粗皮防風去叉甘草炙銼芎藭人參各一兩半當歸切焙一兩三分芍藥熟乾地黃焙各二兩上一十五味粗搗篩每服三錢匕水一盞生薑三片棗一枚擘同煎七分去滓溫服不拘時治產後中風偏枯疼痛拘攣言語謇澀防風湯方防風去叉一兩半芎藭一兩吳茱萸湯浸焙乾炒一分天雄炮裂去皮臍人參山芋秦艽去苗土各三分狗脊去毛銼炒白蘞乾薑炮乾漆炒煙出桂去粗皮各半兩上一十二味銼如麻豆每服三錢匕水一盞生薑三片棗一枚擘破煎七分去滓溫服不拘時治產後中風偏枯地黃湯方熟乾地黃焙一兩一分萆薢附子炮裂去皮臍各三分乾漆炒煙出麻黃去節根細辛去苗葉防風去叉羌活去蘆頭當歸切焙各一兩蜀椒去目並閉口者炒出汗半兩上一十味銼如麻豆每服三錢匕水一盞煎至七分去滓溫服不拘時治產後中風偏枯半身不遂言語不利疼痛無力黃耆酒方黃耆蜀椒去目並閉口者炒出汗白朮牛膝去苗銼葛根各三兩防風去叉四兩芎藭甘草炙銼細辛去苗葉山茱萸附子炮裂去皮臍秦艽去苗土乾薑炮當歸切焙烏頭炮裂去皮臍人參各二兩獨活去蘆頭桂去粗皮三分上一十八味銼如麻豆用生絹袋盛於四鬥醇酒內浸三日每溫服一盞不拘時治產後中風偏枯半身不收麻痹不仁獨活飲方獨活去蘆頭杜仲去粗皮切炒牛膝去苗酒浸焙桂去粗皮細辛去苗葉芎藭附子炮裂去皮臍芍藥當歸切焙秦艽去苗土麻黃去根節各一兩上一十一味銼如麻豆每服三錢匕水一盞煎至七分去滓溫服不拘時治產後中風偏枯芍藥湯方芍藥當歸麻黃去根節防風去叉獨活去蘆頭白殭蠶炒牛膝酒浸切焙附子炮裂去皮臍桂去粗皮各一兩上九味銼如麻豆每服三錢匕水一盞生薑三片煎七分去滓溫服不拘時治產後中風手足偏枯言語遲澀恍惚多忘當歸飲方當歸切焙防風去叉桂去粗皮人參芎藭玄參各一兩獨活去蘆頭一兩半上七味粗搗篩每服五錢匕水一盞半煎至一盞去滓不拘時溫服產後中風角弓反張論曰背為陽腹為陰陰陽之脈交相維持產後血氣不足風邪中於陽經使陽脈拘急反引腰背如弓反張故以角弓反張為名焉治產後中風角弓反張不得俯仰筋脈急痛大黃湯方大黃銼碎醋少許炒當歸切焙熟乾地黃焙桂去粗皮芍藥各半兩吳茱萸浸洗焙乾炒雄黃研各一分上七味粗搗篩每服三錢匕水一盞入羊脂一棗大同煎七分去滓溫服不拘時治產後中風角弓反張及賊風入腹腹中拘痛煩亂惚恍忘誤迷惑不知人事口噤不開手足緩縱產後余病體虛受風煩憒欲死竹瀝湯方秦艽去苗土甘草炙防風去叉當歸切焙各一兩茵芋去粗莖烏頭炮裂去皮臍乾薑炮細辛去苗葉人參黃芩去黑心桂去粗皮天雄炮裂去皮臍防己白茯苓去黑皮白朮各半兩上一十五味銼如麻豆每服三錢匕竹瀝並水合一盞煎取六分去滓溫服不拘時治產後中風角弓反張筋急疼痛當歸湯方當歸切焙二兩大黃銼微炒乾薑炮各一兩吳茱萸炒雄黃研各半兩桂去粗皮芍藥甘草炙細辛去苗葉生乾地黃焙各二兩上一十味粗搗篩每服五錢匕水一盞半羊脂一棗大同煎七分去滓溫服不拘時治產後中風腰背反折強急疼痛麻黃湯方麻黃去根節煎掠去沫焙防風去叉桂去粗皮白朮銼炒人參芎藭當歸銼炒甘草炙各一兩杏仁去皮尖雙仁炒四十枚附子炮裂去皮臍乾薑炮各半兩上一十一味銼如麻豆每服五錢匕水二盞煎至一盞去滓溫服不拘時治產後中風角弓反張口噤發痙獨活湯方獨活去蘆頭一兩半當歸銼炒防風去叉各三分麻黃去根節煎掠去沫焙一兩附子炮裂去皮臍一枚細辛去苗葉半兩上六味銼如麻豆每服五錢匕水酒共一盞半同煎一盞去滓溫服不拘時治產後中風身如角弓反張口噤茯苓湯方白茯苓去黑皮芎藭銼當歸銼炒甘草炙梔子仁各半兩桂去粗皮吳茱萸炒細辛去苗葉乾薑炮熟乾地黃焙各一兩上一十味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服不拘時治產後中風身體強直如弓反張芎藭湯方芎藭防風去叉桂去粗皮人參各一兩麻黃去根節煎掠去沫焙一兩半附子炮裂去皮臍甘草炙各半兩石膏打碎二兩杏仁去皮尖雙仁炒八十枚上九味銼如麻豆每服五錢匕水二盞入生薑半分切煎取一盞去滓溫服不拘時治產後中風角弓反張筋急口噤犀角散方犀角屑烏蛇酒浸去皮骨炙細辛去苗葉芎藭獨活去蘆頭黃耆銼蜀椒去目並閉口炒汗出升麻天麻酒浸焙羌活去蘆頭苦參各一兩龍骨火燒酸棗仁炒蔓荊實各三分枳殼去瓤麩炒半兩上一十五味搗羅為散每服三錢匕溫酒調下或二三服後於溫暖浴室內澡浴一次令身內外和暖浴後再服每日一次佳不可太汗出慎風冷治產後中風角弓反張筋脈強急天麻丸方天麻酒炙白附子炮天南星炮桂去粗皮烏蛇酒浸去皮骨炙麻黃去根節沸湯掠去沫焙獨活去蘆頭白殭蠶炒乾蠍去土炒吳茱萸炒各一兩丹砂別研半兩麝香別研一分上一十二味除丹麝外搗羅為末共和勻煉蜜為丸如梧桐子大每服二十丸溫酒下不拘時服治產後中風腰背反折筋急口噤黑豆酒方黑豆二升小者打碎酒四升上將黑豆鐺中慢火炒令香熟即以酒投之取出以絹濾去豆將酒瓷器盛每服一盞溫服不拘時治產後服豆酒已再服地黃酒方生地黃汁二升清酒三升生薑汁二合上三味煮地黃四五沸入姜酒更煎三沸任性細細飲冷多加桂末二兩熱多加生藕汁二合治產後腰背反折四肢不遂黑豆酒方酒五升雞屎白半盞黑豆一升打碎上先將黑豆鐺中炒令香熟即入雞屎白同炒良久以酒投之取出以絹濾去滓將酒瓷器盛每服一盞溫服不拘時治產後中風四肢拘急筋節掣痛不得轉側角弓反張麻黃湯方麻黃去根節三分桂去粗皮白朮防己各半兩防風去叉芎藭芍藥各二分半上七味銼如豆大每服五錢匕水二盞入生薑半分切煎至一盞下竹瀝半合和煎三兩沸去滓食後良久溫服服訖衣覆取汗為度治產後中風口噤四肢𤸷痹不仁或角弓反張排風酒方羌活去蘆頭防風去叉各一兩大豆拭去土熬令皮拆聲出半升上三味以醇酒三升浸羌活防風經一宿即炒大豆令有聲乘熱投於酒中攪勻封蓋經半日於鐺中重湯文火煮一時即乘熱儘量頓服被衣覆蓋當有微汗如不能飲即量性服之使令微似醉狀若要急用即以酒煎羌活防風汁淋豆服之亦得服不盡一劑即瘥治產後中風角弓反張口不能言大蒜湯方大蒜上一味每取兩瓣拍碎水一盞半煎至七分去滓灌之又方上頓服竹瀝一升即愈產後傷寒論曰產後氣血俱弱邪氣易襲藏於膚腠之間與正氣相搏則令頭痛體疼發熱惡寒是為產後傷寒之證汗下之方比常人用之宜輕不可一概也治產後傷寒頭目昏痛體熱煩悶桂枝湯方桂枝去粗皮麻黃去根節煎掠去沫焙前胡去蘆頭芍藥柴胡去苗人參當歸甘草炙芎藭石膏各一兩上一十味粗搗篩每服三錢匕水一盞生薑三片棗二枚擘煎七分去滓溫服不拘時候治產後傷寒發熱頭疼體痛咳嗽痰壅前胡湯方前胡去蘆頭麻黃去根節煎掠去沫焙柴胡去苗人參桔梗芎藭細辛去苗葉枳殼去瓤麩炒甘草炙各一兩半夏半兩洗七遍去滑薑汁炒上一十味粗搗篩每服三錢匕水一盞入生薑一棗大切煎至七分去滓溫服不拘時治產後傷寒頭目昏痛咳嗽痰壅肢節疼痛荊芥湯方荊芥穗麻黃去根節煎掠去沫焙乾薑炮五味子石膏甘草炙人參芍藥各一兩上八味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治產後傷寒頭痛項強壯熱惡寒身體煩疼寒壅咳嗽鼻塞聲重人參湯方人參赤茯苓去黑皮當歸切炒前胡去蘆頭芎藭銼羌活去蘆頭白朮柴胡去苗枳殼去瓤麩炒桔梗甘草炙獨活去蘆頭各一兩上一十二味粗搗篩每服三錢匕水一盞生薑三片薄荷五葉煎至七分去滓溫服不拘時候治產後傷寒時氣發熱惡風頸項強急胸滿脅痛嘔逆煩渴寒熱往來大小便不利或骨內煩熱傷寒過經不解或病瘥勞復百節疼痛小柴胡湯方柴胡去苗四兩黃芩去黑心人參甘草炙半夏湯洗去滑各一兩半上五味粗搗篩每服三錢匕水一盞半生薑五片棗二枚擘破同煎八分去滓溫服不拘時候治產後傷寒時行溫疫壯熱惡風頭疼體痛鼻塞咽乾心膈煩滿寒熱往來咳嗽痰壅石膏湯方石膏二兩黃芩去黑心一兩半前胡去蘆頭葛根各二兩半升麻桑根白皮銼荊芥穗各一兩半赤芍藥柴胡去苗各二兩半上九味粗搗篩每服三錢匕水一盞生薑三片豉十粒同煎七分去滓溫服不拘時候治產後傷寒肢體疼痛乾嘔頭昏煩躁潮熱芍藥湯方赤芍藥葛根各一兩銼麻黃去根節煎掠去沫焙甘草炙石膏人參當歸切炒各半兩上七味粗搗篩每服三錢匕水一盞煎七分去滓溫服不拘時候治產後傷寒煩躁迷悶熱渴頭痛竹葉湯方淡竹葉半兩切人參芍藥黃芩去黑心石膏麥門冬去心焙甘草炙各一兩上七味粗搗篩每服三錢匕水一盞生薑三片棗二枚擘破同煎七分去滓溫服不拘時候治產後傷寒咳嗽痰壅氣短麻黃湯方麻黃去根節煎掠去沫焙前胡去蘆頭白前桑根白皮銼杏仁炒去皮尖雙仁甘草炙貝母去心當歸切炒各一兩上八味粗搗篩每服三錢匕水一盞生薑三片蔥白三寸同煎七分去滓溫服不拘時候治產後傷寒嘔逆煩躁熱盛頭疼柴胡湯方柴胡去苗芍藥黃芩去黑心枳殼去瓤麩炒人參當歸切炒各一兩半夏半兩湯洗去滑薑汁炒上七味粗搗篩每服三錢匕水一盞生薑三片棗二枚擘破同煎七分去滓溫服不拘時候治產後傷寒發熱咳嗽頭疼壅悶羌活湯方羌活去蘆頭當歸切炒麻黃去根節煎掠去沫焙陳橘皮去白焙杏仁去皮尖雙仁炒人參甘草炙各一兩桂去粗皮紫菀去苗土各三分吳茱萸一分湯洗炒半夏半兩洗七遍去滑薑汁炒上一十一味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治產後傷寒煩熱頭痛表未解麻黃湯方麻黃去根節煎掠去沫焙半兩桂去粗皮芍藥葛根細銼甘草炙石膏碎各一兩上六味粗搗篩