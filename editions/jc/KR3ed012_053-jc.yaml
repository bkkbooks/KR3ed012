body:
  text: 卷第五十三腎虛多唾論曰水飲非升降不能傳導非陽氣不能銷鑠腎虛多唾者緣腎藏不足陽氣虛微而又陰寒凝結停滯於胸膈之間不能銷鑠水飲上溢於齒牙故喜唾也治腎虛使人痰唾不休五味子丸方五味子白茯苓去黑皮前胡去蘆頭各一兩半夏湯浸七遍去滑焙麥門冬湯浸去心焙山茱萸各半兩貝母三分上七味搗羅為末煉蜜丸如梧桐子大每服三十丸食前生薑湯下日二服治腎虛多唾乾地黃湯方熟乾地黃焙麝茸去毛酥炙巴戟天去心枸杞子丹參五加皮各二兩車前子一兩桂去粗皮三分防風去叉一兩上九味㕮咀如麻豆每服四錢匕水二盞煎取一盞去滓通口服治腎臟壅塞唾液不休心胸痞悶半夏丸方半夏湯洗七遍去滑搗羅為末用生薑自然汁和作餅焙乾三兩前胡去蘆頭一兩赤茯苓去黑皮檳榔銼碎陳橘皮湯浸去白焙訶黎勒皮枳殼去瓤麩炒人參桔梗炒五味子各半兩附子炮裂去皮臍一兩上一十一味搗羅為末水煮麵糊丸梧桐子大每服二十丸至三十丸食後溫生薑湯下治腎臟虛壅多唾頭目昏眩順三焦氣利胸膈進飲食前胡湯方前胡去蘆頭一兩白茯苓去黑皮三分木香半兩大腹一兩附子炮裂去皮臍三分桔梗半兩炒枳殼去瓤麩炒半兩五味子一兩甘草炙銼半兩半夏半兩生薑自然汁四兩漿水一升於銀器內慢火煮令水盡切焙上一十味銼如麻豆每服五錢匕水二盞入生薑三片同煎至一盞去滓稍熱食前服治腎臟虛損冷氣所攻下焦虛寒上焦壅滯唾液稠黏人參湯方人參一兩五味子白朮銼炒附子炮裂去皮臍細辛去苗葉半夏湯浸七遍切焙前胡去蘆頭黃耆桂去粗皮各三分枳實去瓤麩炒甘草炙銼各半兩上一十一味㕮咀如麻豆每服三錢匕水一盞生薑三片煎至七分去滓溫服治腎虛多唾訶黎勒丸方訶黎勒炮去核半夏湯洗七遍去滑焙杏仁去皮尖雙仁炒別研取膏入陳橘皮湯浸去白焙桔梗炒澤瀉銼五味子檳榔生銼各一兩上八味搗羅七味為末入杏仁和勻生薑汁煮麵糊丸如梧桐子大每服二十丸淡生薑湯下治虛損短氣咽喉凝唾不出如膠塞喉茯苓湯方白茯苓去黑皮人參各二兩前胡去蘆頭三兩甘草炙一兩麥門冬去心五兩生乾地黃桂去粗皮芍藥各一兩上八味㕮咀如麻豆大每服五錢匕以水二盞入大棗二枚劈破煎取八分去滓溫服日二骨虛實論曰腎生骨髓骨髓者腎氣之餘其氣虛則骨弱痠疼倦而無力其氣實則骨熱苦煩津液內燥當隨證以治之治骨虛痠疼多倦補骨脂湯方補骨脂炒附子炮裂去皮臍人參肉蓯蓉酒浸切焙五味子去梗各一兩上五味㕮咀如麻豆每服三錢匕水一盞煎至七分臨熟入酒二分攪勻去滓溫服食前治骨髓虛冷痠疼蓯蓉湯方肉蓯蓉酒浸切焙菟絲子酒浸一宿焙乾別搗人參黃耆銼木香附子炮裂去皮臍補骨脂炒各一分上七味㕮咀如麻豆每服三錢匕水一盞煎至七分去滓溫服食前治骨髓虛冷疼痛無力地黃散方生地黃八斤洗銼豉二斤上二味同於甑上炊兩次曝乾為散每服二錢匕溫酒調下不拘時治骨髓虛冷疼痛倦怠芍藥虎骨散方芍藥一斤生地黃五斤洗虎骨四兩上三味㕮咀以清酒一斗漬三宿曝乾復入酒中漬一宿曝乾再漬再曝酒盡即止曝乾搗羅為散每服二錢匕溫酒調下不拘時治骨髓虛冷痛地黃酒方生地黃一石洗切上一味木臼中搗取自然汁絞去滓用酒二斗和勻同於瓷石器中煎熟為度瓷器盛貯每服溫飲一盞不拘時候治骨實苦疼煩熱四物湯方葛根取汁生地黃取汁麥門冬取汁蜜上四味各半盞和勻分三服每服用水半盞同煎至六分溫服食前治骨實熱煩痛地骨皮湯方地骨皮柴胡去苗甘草炙銼各一兩胡黃連一分上四味粗搗篩每服三錢匕水一盞煎至七分去滓溫服治骨實煩熱秦艽湯方秦艽去苗土半兩甘草炙銼前胡去蘆頭柴胡去苗各一兩上四味粗搗篩每服三錢匕水一盞煎至七分去滓溫服食前治骨極虛寒面腫垢黑腰脊痛不能久立屈伸夢寐驚悸上氣小腹急痛腰背四肢常冷小便白濁人參飲方人參五味子熟乾地黃焙赤芍藥麥門冬去心焙甘草炙銼當歸切焙各一兩半乾薑炮芎藭黃芩去黑心遠志去心白茯苓去黑皮桂去粗皮各一兩上一十三味粗搗篩每服五錢匕水一盞半羊腎一隻去筋膜切同煎至八分去滓不拘時溫服髓虛實論曰骨髓之病應肝膽若其腑臟有病皆從髓生熱則應臟寒則應腑故髓虛者腦痛不安身常清慄髓實者身體煩躁勇悍驚熱當隨證以治之治髓虛寒腦痛不安補髓羌活丸方羌活去蘆頭芎藭當歸切炒各一兩半桂去粗皮一兩人參二兩大棗三十枚取肉研大麻仁研羊髓酥牛髓各一合上一十味搗羅五味為末與棗肉麻仁酥髓相和入銀瓷器中重湯煮之候稠可丸即丸如梧桐子大每服三十丸空腹溫酒下加至四十丸治髓虛寒地黃煎方生地黃五斤洗焙補骨脂人參各五兩上三味搗羅為末每用酒二升藥末二兩羊髓一具去筋膜一處細研慢火熬稠瓷器盛之每服一小匙溫酒化下空心日午臥時各一治髓虛骨寒溫髓湯方附子炮裂去皮臍人參黃耆細辛去苗葉桂去粗皮各一兩上五味銼如麻豆每服三錢匕水一盞煎至七分去滓空心食前溫服治髓實勇悍髓熱生煩柴胡湯方柴胡去苗升麻黃芩去黑心細辛去苗葉枳實去瓤麩炒梔子仁各三分澤瀉淡竹葉細銼生地黃切焙各一兩上九味粗搗篩每服五錢匕水一盞半煎至一盞下芒硝半錢再煎一沸去滓分二服早食後日中服治髓實氣勇悍煩熱枳實湯方枳實去瓤麩炒柴胡去苗當歸切焙芎藭甘草微炙銼各一兩上五味粗搗篩每服三錢匕水一盞煎至七分去滓溫服食後夜臥治髓實使人強悍驚熱地骨皮湯方地骨皮洗二兩胡黃連柴胡去苗當歸切焙澤瀉黃芩去黑心甘草炙銼枳實去瓤麩炒各一兩上八味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日二夜一膀胱門膀胱虛冷論曰膀胱者津液之府也氣化則能出矣其氣不足則虛虛則寒氣乘之致津液滑利不能制約故其證小便利多小腹痛甚項背腰尻膕腨痛內經曰膀胱不約為遺溺者以此治膀胱虛冷小便頻數五味子丸方五味子磁石煅醋淬七遍杜仲去粗皮炙銼附子炮裂去皮臍各一兩木香半兩青橘皮湯浸去白炒蘹香子炒各一兩龍骨煅半兩上八味搗羅為末酒煮麵糊丸如梧桐子大每服三十丸溫酒下治膀胱經虛小便不禁少腹冷痛蓽澄茄散方蓽澄茄木香沉香桂去粗皮各半兩蘹香子炒三分菟絲子酒浸一宿別搗白茯苓去黑皮各一兩上七味搗羅為散每服二錢匕溫酒或鹽湯調下治膀胱虛小便冷滑少腹虛脹腰背相引疼痛遺精鹿茸丸方鹿茸去毛酥炙肉蓯蓉酒浸切焙石斛去根蘹香子炒各一兩龍骨煅鍾乳粉各半兩上六味搗研為末酒煮麵糊丸如梧桐子大每服三十丸溫酒下空心食前治膀胱久虛便溲不禁腹脅虛滿少腹㽲痛補骨脂散方補骨脂炒蘹香子炒葫蘆巴炒各一兩檳榔銼半兩青橘皮去白炒三分沉香銼半兩上六味搗羅為散每服二錢匕鹽酒或鹽湯調下治膀胱虛寒小便頻數腰背及腹痛石斛湯方石斛去根附子炮裂去皮臍五味子澤瀉肉蓯蓉酒浸切焙黃耆白茯苓去黑皮人參各一兩檳榔半兩上九味銼如麻豆大每服五錢匕水一盞半煎至八分去滓溫服食前治膀胱虛冷小便利多少腹冷痛腳筋拘急鍾乳丸方鍾乳粉沉香銼桑螵蛸炙龍骨煅各半兩白茯苓去黑皮一兩上五味搗羅為末煉蜜丸如梧桐子大每服三十丸溫酒下空心食前服治膀胱虛冷小便數乾地黃散方熟乾地黃焙三分赤雄雞腸兩具雞膍胵兩具桑螵蛸炒牡蠣煅龍骨煅黃連去須各一兩白石脂肉蓯蓉酒浸切赤石脂各五分上一十味粗搗篩八味入雞膍胵並雞腸中密縫於甑內蒸令熟銼碎焙乾搗羅為末每服二錢匕溫酒調下膀胱實熱論曰膀胱者州都之官津液藏焉氣化則能出矣其氣有餘則實實則熱氣留之故壅閼而不通其內證胞閉不得小便煩滿而躁其外證體熱腰中痛頭眩是也內經曰膀胱不利為癃者以此治膀胱實熱小便癃閉舌燥引飲煩悶石膏湯方石膏碎山梔子去皮赤茯苓去黑皮甘草炙銼木通銼各一兩上五味粗搗篩每服三錢匕水一盞煎至七分去滓溫服治膀胱實熱小便不通壅悶煩躁瞿麥飲方瞿麥穗黃芩去黑心甘草生銼木通銼各一兩葵根洗銼車前子各半兩上六味粗搗篩每服四錢匕水一盞半煎至一盞去滓溫服順膀胱利小便解煩熱車前子散方車前子海金沙井泉石滑石碎各一兩葶藶紙上炒一分上五味搗羅為散每服二錢匕蜜熟水調下未利再服治胞囊實熱溲便癃閉日夜不通檳榔飲方檳榔生銼羚羊角鎊大黃銼各半兩甘草炙銼赤茯苓去黑皮防己銼各一兩上六味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服治膀胱實熱小便不通腰腹重痛煩躁豬苓散方木豬苓去黑皮防己銼梔子仁各一兩滑石碎車前子檳榔生銼大黃生銼各二兩上七味搗羅為散每服二錢匕溫熟水調下水煎至七分溫服亦得治膀胱熱結不通芒硝散方芒硝別研半兩赤茯苓去黑皮為末一兩上二味搗研和勻每服二錢匕蜜熟水調下心熱煩躁者以冷蜜水下治膀胱熱小便不通舌乾咽腫升麻飲方升麻大青各三兩射干玄參黃柏去粗皮薔薇根白皮各四兩上六味㕮咀如麻豆大每服五錢匕水一盞半煎至一盞臨熟入蜜一匙打勻去滓服治膀胱實熱小便不通煩悶不解梔子仁湯方梔子仁二兩石膏四兩赤茯苓去黑皮知母焙各二兩生地黃淡竹葉各切半升芒硝一兩上以水煎四錢去滓入芒硝五分沸服日二胞痹論曰內經謂胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕夫膀胱為州都之官津液藏焉氣化則能出矣今風寒濕邪氣客於胞中則氣閉不能化出故胞滿而水道不通其證少腹膀胱按之內痛若沃以湯澀於小便以足太陽經不得下流故熱而痛也上為清涕以足太陽經其直行者從巔入絡腦腦氣下灌出於鼻竅則為清涕矣治胞痹小便不利腎著湯方赤茯苓去黑皮白朮各四兩乾薑炮二兩甘草炙三兩上四味㕮咀每服五錢匕水二盞煎至一盞去滓溫服空心食前各一治胞痹小便不利腰脊疼痛腹背拘急絞痛溫腎湯方赤茯苓去黑皮白朮澤瀉乾薑炮各四兩上四味㕮咀每服四錢匕水二盞煎至一盞去滓溫服空心食前各一治胞痹少腹內痛茯苓丸方赤茯苓去黑皮防風去叉細辛去苗葉白朮附子炮裂去皮臍桂去粗皮各半兩紫菀去苗土栝蔞根各三分澤瀉半兩山茱萸生乾地黃焙各一分芍藥牛膝去苗酒浸切焙各三分山芋一分黃耆銼三兩甘草炙三分半夏湯洗去滑炒獨活去蘆頭各一分上一十八味搗羅為末煉蜜和丸如梧桐子大每日空心溫酒下十丸日再未瘥稍加丸數治胞痹臍腹痛小水不利巴戟丸方巴戟天去心一兩半桑螵蛸切破以麩炒令麩黑色為度一兩遠志去心三分肉蓯蓉酒浸去皴皮切焙一兩杜仲去粗皮塗酥銼炒石斛去根各三分山芋附子炮裂去皮臍續斷各一兩鹿茸塗酥炙去毛龍骨菟絲子酒浸一宿別搗各三分生乾地黃焙別於木臼內搗一兩五味子山茱萸桂去粗皮各三分上一十六味除別搗二味外搗羅為末然後入別搗者相和再羅煉蜜和丸如梧桐子大每日空腹用溫酒下三十丸日再治胞痹少腹膀胱按之內痛黃耆湯方黃耆銼當歸切焙甘草炙黃芩去黑心遠志去心五味子芍藥人參赤茯苓去黑皮麥門冬去心焙澤瀉生乾地黃焙桂去粗皮防風去叉各一兩乾薑炮半兩上一十五味粗搗篩每服五錢匕水二盞入羊腎一