body:
  text: 卷第一百三十九金瘡門金瘡統論論曰金刃所傷瘡有微甚生死所繫要在原經絡所在觀變動之形察微妙之脈昔人謂天窗眉角腦戶臂里跳脈髀內陰股兩乳上下心鳩尾小腹及五臟六腑腧皆不可傷此所謂原經絡所在也腦破出血戴眼直視不能語言咽中沸聲口急唾出兩手妄舉肌肉不生按之乾急或青黃汁出或瘡邊寒清肉消臭敗或前出赤血後出黑血或血出不止白汁隨出此所謂觀變動之形也診其脈虛細小者生微緩而遲者生反此為難愈此所謂察微妙之脈也三者兼得則治療庶幾矣至於忌嗔怒及大言笑思想陰陽行動作勞勿食酸鹹熱酒羹臛之類此乃人所易為者今兼敘之金瘡血不止論曰血行脈中周行灌溉而無窮已金刃所傷者深則其流湍激若海泄河決御之至難要在杜其沖溢之勢外觀其形內診其脈之何如若血出不斷其脈大而止者為難治若血出不止前赤後黑或黃或白肌肉腐臭寒冷硬急者亦為難治不可不察也治金瘡止血悶及疼痛麻黃散方麻黃去節一兩半甘草炙白芷附子炮裂去皮臍乾薑炮當歸切焙續斷黃芩去黑心芍藥芎藭桂去粗皮各半兩上一十一味搗羅為散每服二錢匕溫酒調下空腹日午夜臥各一服可加至三錢匕治刀斧所傷並箭傷血出不止諸藥貼不住者神奇散方麒麟竭研沒藥研自然銅煅令紫天南星炮乾薑燒灰鉛丹炒黑膩粉瓦蘚各一分麝香研少許上九味搗研為散拌勻每用藥貼瘡先以鹽水洗過燒蔥研汁塗瘡上然後乾摻藥貼之治金瘡定痛止血滅瘢麒麟竭散方麒麟竭別研突厥白別研各二兩密陀僧別研如面一兩石灰以小便一斗浸三五日後淘極細曝乾秤一斤上四味合研令細但是金刃所傷厚以散敷之以帛封裹勿令著外風及露水三日後開不見瘢痕治刀刃所傷血出不止南星散方天南星三枚切焙鉛丹半錢上二味搗羅為散干貼立定治金瘡血出痛甚檳榔散方白檳榔銼黃連去須各一兩上二味搗羅為散敷之血斷痛止治一切刀斧所傷血出不止並久患惡瘡如神散方龍骨研虎骨炙研鉛丹以火燒令通赤各半兩丹砂研膩粉各一錢麝香研少許乳香一塊皂子大研上七味同研極細一切瘡以黃連湯或鹽湯洗拭乾摻藥在瘡上不得以衣沾著瘡口治金刃所傷血出不止黃連散方黃連去須檳榔銼生用木香白芷各半兩上四味搗羅為散摻所傷處血即止如婦人血運以童子小便調下一錢匕如臟毒瀉血以水煎服治金瘡或竹木所刺出血不止及疼痛桃紅散方乾葛粉染胭脂各一兩上二味研細乾摻在瘡上又用青絹以雞清塗絹可瘡口大小貼之仍先用篦子按去血令藥與肉平方以青絹蘸雞清貼之治金瘡止血方重午日日未出時採百草頭唯藥苗多即尤佳不限多少搗取濃汁又取石灰三五升相和搗作餅子曝乾為末治一切金瘡血出立止兼治小兒惡瘡治金瘡血不止刀箭藥方石灰遠年船上者燒一兩龍骨研半兩鉛丹炒三錢狗腦骨燒灰半兩上四味搗羅為末敷瘡上治金瘡止血生肌白芷膏方白芷熟乾地黃焙當歸切焙各一兩半白蘞一兩芎藭一兩一分蜀椒去目並閉口炒出汗三合附子炮裂去皮臍三分甘草炙半兩上八味細銼以豬脂五斤合和煎三上三下藥成膏去滓軟硬得所每日塗瘡上頻塗即效治金瘡止血定痛風化散方風化石灰末一升乾薑三分生用生栗子末白藥末各五兩上四味取端午日搗羅為散凡有金瘡即敷之治金瘡石榴花散方石榴花曝乾半兩石灰炒一升半上二味搗羅為散取少許敷瘡上捺少時血斷便瘥治刀斧傷止血生肌蠶蛾散方晚蠶蛾生為細散上一味以藥散摻絹帛上裹之效治金瘡血不止五倍散方五倍子生為細散上一味干貼血立定治金瘡止血定痛生肌石灰膏方石灰末炒杏仁湯去皮尖雙仁炒各二兩豬膏半斤切上三味合煎令杏仁黃藥成絞去滓塗瘡上日夜五六度治金瘡止血桑皮汁方上急研桑白皮汁塗之血便止如不止更取白皮裹瘡上令汁得入瘡中冬月用桑根皮亦佳治金瘡止血灰礦散方古窯石灰紫礦各半兩上二味同為散敷之治金瘡血出腹脹欲死蒲黃散方蒲黃生乾地黃焙各一兩半甘草炙銼三分黃耆銼當歸切焙芎藭白芷續斷各一兩上八味搗羅為散每服三錢匕空心酒調下日三四服血化為水下若口噤斡開口與之仍加大黃一兩半治金瘡血不止疼痛生肉速瘥石杏膏方石灰杏仁湯浸去皮尖雙仁炒各二兩研上二味都用豬脂一升煎去筋膜調塗治刀斧傷瘡或至筋斷葵根敷方上取葵菜根搗敷之金刃傷中筋骨論曰金刃所中至於筋骨所傷深矣然折骨絕筋亦可接續要在乘血氣未寒急施治法若不乘熱則風冷易入瘡縱暫愈後必不仁亦致痛煩而終身不完至於小碎之骨即當出之不爾則膿血不絕肌亦不斂矣治金瘡傷中筋骨續斷散方續斷生乾地黃焙地榆芍藥蛇銜甘草炙銼當歸切焙芎藭附子炮裂去皮臍人參杜蘅肉蓯蓉酒浸切焙各二兩乾薑炮細辛去苗葉各一兩桂去粗皮一兩半蜀椒去目並閉口者炒出汗半兩牡蠣煅研一兩上一十七味除研者外搗羅為散再拌令勻每服三錢匕以溫酒調下空腹日午夜臥各一服治一切金刃傷及筋骨風冷所中疼痛骨碎補丸方骨碎補炙去毛三兩敗龜醋炙虎骨酒炙澤蘭葉山芋白薇各一兩自然銅煅醋淬七遍山茱萸桂去粗皮各一兩當歸切焙熟乾地黃焙五味子乾薑炮各半兩肉蓯蓉切焙三分白檳榔生銼附子炮裂去皮臍各一兩肉豆蔻去殼二枚上一十七味搗羅為末煉蜜丸如梧桐子大每服二十丸空心溫酒下欲作散每服一錢匕溫酒調下並空心日午臨臥服治金刃弓弩所中筋急不得屈伸敗弩筋散方敗弩筋燒作灰秦艽去苗土熟乾地黃焙各半兩附子炮裂去皮臍一兩大棗三枚取肉焙杜仲去粗皮炙半兩當歸切焙一兩上七味搗羅為散每服二錢匕溫酒調下空腹日午夜臥各一服治金刃傷筋骨止血地菘苗散方地菘苗石灰末旋覆苗葛葉青蒿苗麥門冬苗各五兩上六味除石灰外切碎搗絞取汁和石灰作餅子曝乾再搗羅為散敷瘡上五月五日合佳治金瘡續筋骨斂血止痛葛葉散方葛葉地菘苗續斷石灰末旋覆花地黃生用益母草麥門冬去心各五兩上八味搗絞七味取汁和石灰調作餅子曝乾再搗為散敷所傷處治金瘡接筋補骨檳榔散方檳榔銼黃連去須並生用上二味等分搗羅為散干敷之治金瘡續筋骨百草散方上五月五日取百草心和石灰搗熟成塊鑿桑木北面近下作孔團藥在內外又以桑木補孔並皮復釘四畔令固至七月七日取出曝乾為散敷瘡大良治金瘡續筋骨旋覆汁方上以旋覆根搗汁滴瘡中仍以滓封瘡上至半月筋自續更不用易又方上以石灰細篩以麻油和之作團如栝蔞許大以炭火燒赤放冷搗篩為末又以油和燒凡如此十遍為細散敷瘡神效又方上取葵菜根爛搗敷之立瘥金瘡煩悶及發渴論曰金瘡煩悶者以血出太甚經絡空虛而發熱躁也經所謂陰虛生內熱陽虛生外寒者如此其有發渴者亦以經絡乏竭津液枯燥故欲引飲治金瘡煩悶疼痛不止白薇散方白薇栝蔞枳實去瓤麩炒辛夷去毛甘草炙銼石膏研如粉各一兩厚朴去粗皮生薑汁炙酸棗仁炒各半兩上八味搗羅為散每服二錢匕溫酒調下空心日午臨臥半夜各一服治金瘡煩悶欲死大小便不通消石散方硝石煉寒水石研栝蔞根澤瀉白蘞芍藥各一兩上六味搗羅為散每服二錢匕溫水調下空心日午臨臥半夜各一服治金瘡煩悶及渴內補瞿麥散方瞿麥穗芍藥細辛去苗葉桔梗炒芎藭當歸切焙甘草炙銼乾薑炮熟乾地黃焙防風去叉續斷蜀椒去目並閉口者炒出汗人參辛夷去毛牡蠣煅栝蔞根白蘞各半兩桂去粗皮厚朴去粗皮生薑汁炙各一兩上一十九味搗羅為散每服二錢匕熟水調下空心日午臨臥半夜各一服筋骨斷者加續斷三分治金瘡煩悶白芷散方白芷甘草芎藭各一兩上三味細銼炒令變色搗羅為散每服一錢匕溫熟水調下空心日午臨臥半夜各一服治金瘡煩悶止煩石膏散方石膏研甘草炙銼各二兩上二味搗羅為散每服二錢匕溫熟水調下空心日午夜臥半夜各一服治金瘡煩悶疼痛大便不利大黃丸方大黃銼碎微炒黃芩去黑心各一兩上二味搗羅為末煉蜜和丸如梧桐子大每服十五丸加至二十丸熟水下空心日午臨臥各一治金瘡煩悶苦酒煮豆方赤小豆半升上以苦酒二升熬至一升去滓色黑始服每服二合空心日午夜臥各一治金瘡煩痛磁石散方磁石五兩上一味搗羅重研為細散量瘡口大小以意敷之止痛斷血治金瘡出血必渴當忍啖燥食不飲粥若犯房即殺人方雄黃不計多少上一味研為細末量瘡口大小敷之瘡中惡汁出即瘥金瘡中風水及痙論曰金瘡中風水者以封裹不密所致也中風之候其瘡卒無汁中水之候則出青黃汁而又疼痛發作肌肉腫硬將為痙狀可急治之凡痙狀口急背直搖頭馬鳴腰為反折須臾又發氣息如絕汗出如雨治不可緩緩則不救治金瘡闢風水續筋骨止血痛八仙散方石灰風化者十兩地菘苗新者切研半兩細辛去苗葉旋覆根切研新葛葉切研無即用葛粉青蒿新者切研麥門冬苗各半兩豬膏去筋膜半斤上八味除石灰豬膏外將六味搗研絞取汁和石灰並豬膏搜研作餅子曝乾搗羅為散再研之如粉以敷瘡口上止血定痛生肌五月五日合之治遠年傷折忽因風氣不和於舊傷處疼痛不可忍者熟乾地黃丸方熟乾地黃焙乾四兩杏仁湯退去皮尖雙仁炒別研牛膝去苗酒浸焙各一兩半苦參細銼焙乾菟絲子酒浸焙搗肉蓯蔻酒浸切炒黃耆炙銼萆薢炒各一兩桂去粗皮青木香生用各一分訶黎勒煨熱去核半兩升麻三分上一十二味除杏仁外搗細羅為末入杏仁別搗再羅勻煉蜜和搗三千下丸如梧桐子大每服空心溫酒下二十丸至三十丸治金瘡止血黑散子方大黃三兩半童子小便浸三日後用紙裹煨巴豆一兩半漿水浸七日炒令黃半兩錢四十九文以銅線系燒紅以酒五升淬盡羊脛炭一握七莖米醋五升淬盡用之上四味搗研為細散隨傷損大小貼之疼痛立止更無瘢痕及能出箭頭止血大效婦人一切敗血極者可服一字溫酒調下治金瘡中風及破傷風急風散方草烏頭三兩將一兩半以火燒灰存性於醋內蘸令冷餘一兩半銼生用生黑豆一分同烏頭一處杵為末丹砂研一兩麝香研一分上四味再合研令勻如出箭頭先用酒一盞調藥半錢服之後以藥點箭瘡上如破傷風以酒一盞調半錢服治因金瘡中風反張者雞屎白豆淋酒方雞屎白一合大豆六合上二味炒令大豆焦黑次入雞屎白同炒乘熱瀉於三升酒中密蓋良久濾去滓每服五合如人行五里更一服汗出佳未瘥即更作服之以汗出為度服後宜吃熱生薑稀粥投之治金瘡中風角弓反張塗封方生雞子一枚烏麻油三兩上二味先將雞子打破與麻油相和煎之稍稠待冷即塗瘡上封之治傷折折骨諸瘡腫者慎不可當風臥濕及取涼若為風濕所傷則發痙口噤殺人若已中風覺頸項強身中拘急羌活飲方羌活去蘆頭一兩竹瀝三盞上二味將羌活粗搗篩以竹瀝同煎去一半去滓分溫三服若口噤者發口灌之作瀝法可將十餘莖新竹青每莖一尺五寸截斷用火炙逼中央使兩頭取其汁瀝亦可別作數束燒取汁可救急立驗日夜可五六服治金瘡中風發痙浸酒方雞屎白三升炒黃上一味以生絹袋盛入瓷瓶中與酒六升火煨浸半日去滓溫服五合日三夜一並取莨菪根搗作餅子當瘡上安著以炙上熱徹黃水出取差治金瘡中風必效酒方蒜四破去心頂一升上一味以無灰酒四升煮蒜令極爛每服取五合並滓頓服之治金瘡或打擊破瘡等風入口閉牙噤身強欲死宜浸酒方雀屎炒研半合上一味以酒七合煮至五合濾去滓令溫頓服腹中轉動當時愈若不能開口發開灌之治金瘡中風角弓反張杏仁酒摩方杏仁碎研生用不去皮尖三斤上一味蒸令一饙久更研令極細入酒三升絞取汁每服五合日二夜一汗出慎外風即愈兼將杏仁酒汁摩瘡上治金刃傷破見骨中風口噤豆淋酒方大豆炒去腥半熟勿使太熟五升上一味粗搗篩蒸一饙頃傾出盆中以酒一斗五升淋之絞去滓每溫服五合至七合日二夜一衣覆微汗出別研生杏仁膏敷於瘡上若腦髓出者難救治被打傷損因瘡中風蘇木酒方蘇木椎令爛碎二兩上一味用酒二升煎取一升分三服空心午時夜臥各一治被打傷損因瘡中風蠶子酒方蠶子不拘多少上一味將刀子於紙上量剚刮取約一錢匕細研暖酒三合至五合調服之如人行十里更一服治金瘡中風蜀椒罨方蜀椒生完用去目三兩上一味量瘡口大小用面作餛飩煻灰中炮令熟及熱開一孔當瘡上罨之劫引風出可作數十枚更番用之溫冷即換治因金瘡中風口噤不能語法灸方蔓荊子淨洗一升上一味搗令極爛捏為炷灸瘡上三兩炷熱徹即瘥治金瘡中風搐搦角弓反張莨菪根塗方莨菪根上一味量瘡大小截令平如無大者並縛數根以稱瘡為度別以豬脂一合鹽末一雞子黃大相和熟煎令如膏將莨菪根平處蘸膏溫坐瘡上冷即易之以瘥即止宜避外風治傷折不能慎避令人中風發痙口噤若已覺中風頸項強直身中拘急者先服此竹瀝飲方竹瀝三升上一味先溫暖分作五六服發口灌之治金瘡中風骨痛不可忍麻根飲方大麻根葉無問多少上一味搗研絞取汁飲三合至四合無青者以乾者煎取汁服亦主墮墜打損有瘀血在心腹令人脹滿短氣也治金瘡中風寒水腫胡粉膏方胡粉炭灰各半兩上二味以豬膏量藥調和塗瘡孔上出水便瘥治金瘡中風水痙欲死兼治一切金刃箭鏃等瘡葛根湯方生葛根一斤上一味銼搗以水一斗煮取五升去滓每服一盞空腹日午夜臥各一服無生葛即用乾者搗為散溫酒調下二錢匕若口噤強開之更宜以竹瀝三合灌之治金刃一切傷損避風水等方五月五日平旦使四人出四方各於五里內採一方草木莖葉每種各半把勿令漏脫一事於正月元日午時細切椎搗並石灰極令爛熟一石草一斗石灰先鑿大實中桑木令可受藥取藥納孔中實築令堅仍以桑木皮蔽之以麻搗石灰極稠泥之令不泄氣又以桑皮纏之使牢至九月九日午時取出陰乾百日藥成搗之曬曝令乾更搗絹篩貯之凡一切金瘡傷折出血以藥封裹治使牢勿令動轉不過十日即瘥不腫不膿不畏風若傷後數日始得藥須暖水洗之令血出即敷之良平生無事宜多合之以備倉卒金瘡之藥無出於此它藥不能比也治金瘡腫痛因中水及中風仍沖寒露濕氣其腫入腹則殺人宜熏之方上取黍瓤並牛馬乾糞及桑條輩多煙之物於坑中都燒令煙出乃以板蓋坑上開板作小孔以瘡口痛處安孔上熏之令瘡上出汁乃瘥治金瘡中風疼痛不可忍芎藭湯方芎藭防風去叉當歸焙羌活去蘆頭各一兩甘草炙三分上五味㕮咀如麻豆大每服六錢匕水二盞煎至一盞去滓熱服蓋復出汗若不汗加麻黃去節一兩桂去粗皮三分湯成又加竹瀝半合治金瘡因風水腫鹽韭敷方上取韭並鹽各等分搗置瘡上以火炙藥上熱徹即愈又方上取櫟木根皮三斤細銼用水二斗煮沸納鹽一合時以漬瘡腫膿血當出便瘥又方上取蠟不計多少熔了入鹽少許滴在瘡中大驗又方上取鹿角不限多少燒灰細研以臘月豬脂和塗之久不瘥者不過五七上瘥又方上取白茅根不限多少燒為灰湯和敷瘡上取瘥又方上取牛膝末不限多少水調塗之取效金刃腸出論曰金刃所傷有腸出者有腸出已斷者視其輕重之證可決死生腸有一頭見者不可續也若腹痛不可忍短氣不能食近則一日遠則三日治無及已腸有兩頭見者可速以桑白皮挼為線或以麻縷續之仍取雞血塗隙勿令氣泄推內之更以前線縷綴縫瘡口亦以雞血塗之腸有出而不斷者當以大麥粥取其汁洗腸而納之綴縫瘡口如前法然後作研米粥飲二十餘日稍作強糜百日後始得飯食不可飽飽則腸痛宜常以湯散助之治一切金刃箭鏃傷中及打撲傷損貓犬咬傷或至死者急於傷處摻藥其血化為黃水再摻藥便活更不疼痛如內損血入腑臟熱煎童子小便入酒少許調一大錢匕服之立效若牛抵腸出不損者急內入取桑白皮尖茸挼為線縫合腹皮縫上摻藥血止立活如無桑白皮用生麻縷亦得並不得封裹瘡口恐作膿血如瘡干以津潤之然後摻藥婦人產後敗血不盡血迷血運惡血奔心胎死腹中胎衣不下至死者但心頭暖急以童子小便調一錢匕取下惡物如豬肝片終身不患血風血氣若膈上有血化為黃水即時吐出或隨小便出立效花蕊石散方花蕊石搗為粗末一斤上色硫黃搗為粗末四兩上二味拌和令勻先用紙筋和膠泥固濟瓦罐子一枚候泥干入藥在內密封口曝乾安在四方磚上磚上書八卦五行字用炭一秤籠匝自巳午時從下生火令漸向上經宿炭消盡放冷細研羅過瓷合盛依法用治金瘡腸出宜入之磁石散方磁石煅研滑石研上二味等分同研極細每服一錢匕以溫酒調下空腹日午晚間各一服夜臥二服及以針砂塗腸上其腸自收入治金瘡腸出鐵精散方鐵精末研磁石研滑石研上三味等分同研極細粉腸上後以溫酒調下一錢匕空腹日午夜臥各一服夜半再一服治金瘡腸出不能入小麥飲噀瘡方上以小麥三升用水九升煮取五升綿濾過候冷含噴瘡上漸入以冷水噴其背不宜多令人見亦不欲令傍人語又不可令病人知或尚未入取病人臥席四角令病人舉身搖須臾腸自入十日內食不可飽頻食而少勿使病人驚驚則殺人治金瘡腸脫出令卻入方上取人干屎末不以多少摻腸干取濃麵漿濕腸上即入腸以冷水噀面令吸氣即易入
