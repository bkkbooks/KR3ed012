各一分上一十三味合研令勻用酒煎豶豬膽膏和丸如綠豆大每服五丸至七丸奶疳臘茶下氣疳丁香湯下腦疳黃連湯下肺疳橘皮湯下急疳干筍湯下食疳生薑湯下脾疳棗湯下肝疳鹽湯下治小兒疳䘌口瘡齒齦宣露黃柏散方黃柏根皮炙銼黃連去須黃芩去黑心升麻銼各三分大青半兩干蝦蟆酥炙一兩上六味搗羅為散以綿裹貼齒齦上吐涎治小兒疳䘌或口齒生瘡或肛門傷爛黃連丸方黃連去須一兩白蕪荑去皮炒半兩麝香研一錢上三味搗研為末麵糊和丸如麻子大一二歲每服十丸溫米飲下日三小兒五疳出蟲論曰諸疳之病皆因肥甘所致蓋人之腑臟氣血更相榮養逢甘則中緩中緩則營衛行遲故腑臟之間化生諸蟲狀如絲髮或如馬尾蝕於腑臟令兒病疳以藥治之其蟲自出或出頭項或出腹背其蟲色黃白赤者可治青黑者不可治治小兒諸疳青黛丸方青黛研蘆薈研干浮萍草蝦蟆燒灰蟬蛻去土綠豆故皮子巾燒灰研豉炒白礬燒研丹砂研麝香研各一分上一十一味搗研為末和勻用粟米飯為丸如麻子大一歲兒每服一粒用溫熟水下先以桃柳湯浴兒後與藥服服藥後得睡復面看脊骨間必有蟲出形狀不定甚者吐出或嚏出即愈治小兒疳定命夜明砂丸方夜明砂炒青黛研蛇蛻炒蟬蛻去土麝香研地龍去土炒干蝦蟆燒灰研各一分蚱蟬炙四十枚上八味搗研為末和勻粟米飯丸如麻子大一二歲兒每服三丸三四歲兒五丸並用米飲下空心日午各一服更水化一丸滴兩鼻中又以桃柳湯浴兒以青布裹良久蟲出青布上治小兒諸疳麝香丸方麝香研熊膽研丹砂研牛黃研蚺蛇膽研瓜蒂各一分赤小豆七粒蟾酥二片如柳葉大上八味搗研為末和勻麵糊和丸如麻子大每服三丸至五丸米飲下空心日午近晚各一更量兒大小加減服後以桃柳湯浴兒即以青衣蓋復當有蟲出治小兒疳出蟲瓜蒂丸方瓜蒂燒灰麝香研蟾酥各半兩烏蛇尾酒浸炙黃連去須各一分蛇蛻燒灰熊膽各半分研上七味搗研為末用粟米飯丸如麻子大溫熟水化破二丸滴於鼻中蟲出為效治小兒諸疳氣麝香散方麝香研白礬灰膽礬燒過皂莢燒灰各一分豬膽一枚去膜熬干膩粉研十錢上六味再同研令極細每服一字匕米飲調下服藥後以青衣蓋兒身上良久有蟲出即瘥治五疳吐蟲腹脹羸瘦除疳散方丁香生犀角末各半錢苦楝根有子者良赤者不用陰乾為末鶴蝨各半兩密陀僧白檳榔炮銼各一分上六味搗羅為散每服一錢匕米湯調下日三蟲自出更量大小加減治小兒五疳眼鼻多癢寒熱往來腑臟不調或瀉膿血肌體瘦弱飲食不化多困少力眼澀饒睡兼治驚風月蟾丸方乾蟾一枚大者端午取蛇蛻皮大者一條穀精草二兩三味同入一瓶子內以鹽泥固濟燒灰胡黃連甜瓜蒂丁香各一分熊膽研蘆薈研天竺黃研牛黃研丹砂研龍腦研麝香研雄黃研各一分青黛研半兩上一十五味搗研為末再研勻用豶豬膽汁煮麵糊丸如綠豆大每服三五丸米泔下量兒大小加減服藥後以桃柳湯浴兒著青衣蓋疳蟲出衣上治小兒疳殺蟲蘆薈丸方蘆薈研蕪荑炒木香鶴蝨炒各半兩上四味搗研為末水浸炊餅丸如黃米大每服十丸米飲下更量兒大小加減治小兒疳蛔定粉丸方定粉豬膽各一分上二味研和為丸如綠豆大每服二丸米飲下治小兒疳殺蟲雄黃散方雄黃研黃連去須木香各一分麝香研半分上四味搗研為散每服半錢匕米飲調下量兒大小加減小兒諸疳論曰小兒疳疾皆以肥甘而得之故名諸疳五臟所受各各不同在肝為風疳其狀搖頭揉目白膜遮睛色青黃毛焦發立筋青腦熱復面而臥腹有積聚時下痢身體自汗久不愈轉加羸瘦是為肝疳若目睛帶青脈左脅下硬吐涎眼角有黑氣者不可治在心為驚疳其狀渾身壯熱吐痢無常頰赤面黃胸膈煩滿鼻乾心躁口舌生瘡時有盜汗或發虛驚久不愈則下痢膿血是為心疳若驚啼多渴偏食辛味耳邊有脈舌上有黑靨者不可治在脾為食疳其狀腹多筋脈啼促氣粗乳食不多心腹脹滿多啼咳逆面色萎黃骨立毛焦形枯力劣胸膈壅悶乳食難消腸胃不和下痢酸殠鼻乾口燥愛暗憎明情意不佳好吃泥土是為脾疳若腹大唇無血色人中平滿下痢不禁皮枯骨露者不可治在肺為氣疳其狀咳嗽氣逆皮毛乾焦饒涕多啼咽喉不利揉鼻咬甲壯熱憎寒口鼻生瘡唇邊赤癢腹中氣脹食減下痢皮上粟起是為肺疳若咳逆氣促下痢白沫身有斑紋黑色如粟米者不可治在腎為急疳其狀肌骨消瘦齒齦生瘡逢寒遇熱則鼻乾口燥腦熱如火腳冷如冰食少吐逆時或下痢下部生瘡肛門脫出是為腎疳若嗜酸鹹飲乳無度小便白濁牙齒青黑耳腦幹燥肩聳骨枯者不可治凡此五疳又有五絕之候一掐著腳中趾底不覺疼二抱著手足垂嚲無力三病未退遍身不暖四臟腑瀉青涎及沫不止五項筋舒展無力如此皆不可治也五疳之外隨十二經脈血氣所受變狀不一故曰諸疳治小兒二十四種疳熊膽散方熊膽牛黃雄黃五靈脂丹砂麝香各半兩蚺蛇膽以上細研黃連去須乾蠍去土天麻蝸牛炒馬兜鈴根乾者大黃銼碎炒各一分上一十三味熊膽等七味研令如粉黃連等六味搗羅為散再同研令極細每服一字至半錢匕用米飲調下早晨午間臨臥各一服量兒大小加減服之或以蜜為丸如麻子大每服三丸至五丸治小兒五疳無食子丸方無食子三枚大者煨熟用牛黃研麝香研丁香雄黃研水飛青黛研木香丹砂研水飛各一分蟾酥三片如柳葉大焙過研熊膽半兩研蝸牛殼乾者去土二十枚上一十一味搗研為末更同研令細水浸蒸餅為丸如黍米大一二歲兒臨臥乳汁下一丸三四歲二丸五六歲三丸七八歲五丸米飲下亦得日再服之治小兒五疳羸瘦腹脹下利不思飲食使君子丸方使君子用水和生面裹炮以面熟為度只取使君子用丁香無食子熊膽研胡黃連夜明砂微炒青黛研肉豆蔻仁黃連去須微炒蘆薈研各一兩蟾頭乾者一枚炙黃蟾酥一皂子大麝香一錢研龍腦半錢研上一十四味搗研為細末拌令勻濕紙裹粟米燒飯和丸如麻子每三歲服五丸至七丸用溫米飲下日三服不計時候大小以意加減治小兒疳氣蘆薈丸方蘆薈研鉤藤別搗末各一兩雄黃青黛各半兩研蟾酥研熊膽研麝香研三味各一分上七味同研勻入豬膽汁和丸如綠豆大每日空心臨臥煎荊芥湯下三丸至五丸二歲以下兩丸治小兒疳氣蝦蟆煎丸方蝦蟆一枚用頭炙黃為末胡黃連地龍去土炒木香各一分肉豆蔻一枚去殼麝香研黃連去須各一錢半夜明沙白蕪荑各一錢為末丹砂二錢研上一十味用蝦蟆蕪荑末豶豬膽二枚法酒一盞煎成膏和其餘藥末為丸如粟米大每服五丸至七丸米飲下日三兩服治小兒一切疳四膽丸方龍膽去土虎膽熊膽研豬膽蘆薈研麝香研白礬灰荊芥穗各一分上八味搗研為末先取東引石榴根半斤銼碎以水三碗煮至半碗去滓以慢火煎如膏下諸藥末又熬令可丸即丸如綠豆大用瓷器收之如遇諸疳有蟲或揩鼻眼手剜指甲及下部者取一丸以荊芥湯化為汁候兒睡後點少許於鼻中腦上十指下部蟲聞藥氣皆化為水治小兒一切疳吹鼻青黛散方青黛研細辛去苗葉各半兩瓜蒂麝香研地龍微炒蘆薈研黃連去須各一分上七味搗研為細散每用少許吹鼻中得嚏噴多即易治嚏噴少難治不嚏噴不可治治小兒五疳心臟驚疳肝臟風疳肺臟氣疳脾臟滑疳腎臟急疳皆治之常服金蟾丸方蟾酥一字胡黃連使君子熊膽研各一分木香一錢麝香研少許牛黃研半錢丹砂研二錢飛大黃半兩虎睛研一對上一十味搗研為末燒粟米飯丸如麻子大荊芥湯下三丸至五丸量兒大小加減服之治小兒一切疳腦悶昏沉宜先用吹鼻散方青黛研躑躅花各一分黃連去須瓜蒂地龍微炒麝香研各半分上六味搗研為細散每用少許吹在鼻中看嚏噴多少嚏噴多即病輕嚏噴少即病重治小兒疳氣面黃肌瘦發熱多困好吃泥土撏眉咬甲時好伏地香蟾丸方乾蟾一枚炙焦麝香研半錢胡黃連半兩丹砂研牛黃研蛇蛻燒灰雄黃研天竺黃研熊膽研蟬蛻炙各一分天仙子半合水浸出芽子為度焙乾為細末肉豆蔻一枚去殼上一十二味搗研為細末糯米飯和為丸如黃米大每服七丸至十丸米飲下不拘時候一日三服治小兒疳氣身體壯熱毛髮焦黃目常有淚滿口生瘡腳手細弱腹脅脹滿好吃泥土使君子丸方使君子去皮夜明沙炒白蕪荑炒各半兩胡黃連一兩麝香半錢研細辛去苗葉蘆薈研雄黃研蟾酥檳榔銼蟬蛻去翅足炒各一分蝸牛十枚干蝦蟆二枚用溫水洗去腸肚惡物併骨爪後慢火炙黃色為度搗羅為末用酒一升同熬成膏上一十三味除蝦蟆外搗研為細末入膏子和為丸如麻子大每服五丸至七丸米飲下不拘時候一日三服治小兒腦脊疳口生白瘡齒疳並諸般疳疾悉主之熊膽膏方熊膽蚺蛇膽蘆薈牛黃麝香龍腦各一分上六味並研如粉用新汲水兩盞入藥末攪令勻以瓷器盛重湯煮之水只可及瓷器五分以來慢火煮旋添暖水煮至半日更投三五粒粳米同煮米爛藥即成以篦子攪令勻勿令藥干欲點鼻中時先七日孩子與乳母忌生冷醬豉五辛熱面魚肉並少食鹽然後取藥少許漸漸吹鼻中及塗口瘡上頻使兩日即停一日看兒發變青即止至七度停藥後還須慎口治小兒一切疳病鶴蝨丸方鶴蝨輕炒胡黃連蘆薈研丹砂研各一分青黛研三分上五味搗研為末更入乳缽內研令細用米泔煮豬膽令熟取汁和為丸如麻子大每服三丸至五丸米飲下早晨午間日晚各一服量兒大小加減治小兒五疳瘦弱不思乳食黃連豬膽丸方黃連去須蘆薈研蕪荑青黛研檳榔銼各一分蟬蛻二十一個去土胡黃連半兩麝香研半錢上八味搗研為末以豬膽丸如麻子大每服五七丸量兒加減米飲下治一切疳氣青金定命丸方胡黃連一兩為末蘆薈研青黛研各三分肉豆蔻二枚去殼為末訶黎勒五枚煨去核為末檳榔一枚為末麝香研丹砂研密陀僧為末木香為末丁香為末各半兩紅雪研鶴蝨為末各一分上一十三味再同研令勻用酒煎豶豬膽膏丸如綠豆大每服五丸至七丸奶疳臘茶下氣疳丁香湯下腦疳黃連湯下肺疳橘皮湯下急疳干筍湯下食疳生薑湯下脾疳棗湯下肝疳鹽湯下治五疳殺蟲化食長肌肉退風熱青黛丸方青黛別研留一半為衣使君子肉檳榔銼夜明砂白蕪荑醋炒令紫各半兩蛇蛻一條炙肉豆蔻麵裹煨去殼一分巴豆半分用麩炒令紫去殼別研麝香一錢研黃連去須炒一分半蝦蟆一枚酒浸炙令黃紫色去骨上一十一味先研巴豆令細次用豬膽一枚取汁同研令勻旋入其餘藥末搜和為丸如未就更用少軟飯再研得所丸如麻子大每服三歲以下者一丸五歲兩丸十歲三丸食後用熟水下日三服如風熱大便澀用蔥湯下五丸至七丸以通利為度治小兒諸疳常服殺疳蟲天漿子丸方天漿子七枚去殼青黛研烏蛇酒浸去骨炙熱丹砂研麝香研各一分葶藶隔紙炒過龍腦研雄黃研膩粉各半分白附子炮獨角仙去翅足炙各一枚乾蠍五枚炒蟬蛻十枚去足蟾酥一分上一十四味各搗研為末用生豬膽為丸如黃米大每服一粒早晨日晚各一服治小兒五疳胡黃連丸方胡黃連蛤蚧酥炙牛黃研犀角屑天麻人參肉豆蔻仁大黃研細炒各半兩雄黃研如粉一分上九味搗研為末煉蜜為丸如麻子大每服五丸空心午後各一服溫水下治小兒諸疳壯熱黃連丸方黃連去須黃柏去粗皮甘草炙銼青橘皮去白焙各等分上四味搗羅為細末研麝香少許和勻入豶豬膽內用線系定於石器內漿水煮五七沸取出當風掛一宿去膽皮研熟丸如綠豆大每服五七丸米飲下漸加至十丸治小兒諸疳諸痢食傷氣脹頭大體羸頭髮作穗壯熱不食多困齒爛鼻瘡丁奚潮熱等疾牛黃煎方蝦蟆一枚去皮骨腸胃炙焦搗末以無灰酒一盞豶豬膽一枚取汁同熬成膏訶黎勒皮炮使君子去殼胡黃連蟬蛻無食子蘆薈研蕪荑仁熊膽研夜明砂丹砂研雄黃研木香各一分肉豆蔻去殼春夏半分秋冬一分牛黃研二錢麝香研一錢龍腦半錢上一十七味搗研十六味為末入前膏丸如麻子大每服五七丸米飲下驚疳金銀薄荷湯下乾疳腹脹桃仁蘹香湯下疳蟲東引石榴苦楝根湯下此丸尤治疳痢若挾熱而痢者不可服治小兒諸疳肢體羸弱臟腑虛滑不思乳食三和丸方胡黃連一兩木香半兩麝香研一錢上三味搗研為細末麵糊和丸如麻子大一二歲每服十丸溫粥飲下日三
