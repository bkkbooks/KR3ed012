body:
  text: 卷第一百七十三小兒疳痢論曰小兒疳痢者由乳哺不節生冷過度傷於脾胃冷熱相搏致腑臟不調久而不瘥即變諸疳若大腸虛弱水穀不化下痢無度是為疳痢其證面色萎黃肌體羸瘦盜汗壯熱皮毛焦枯嗜好酸鹹心腹虛脹痢下蘊瘀日夜無度是也治小兒一切疳痢熊膽散方熊膽研雄黃研青黛研丹砂研黃礬燒令汁枯細辛去苗葉莨菪子炒各半兩蘆薈研龍膽當歸切焙白礬燒令汁盡蟬蛻炒蝦蟆炙焦各三分麝香研黃連去須黃柏去粗皮甘草炙各一兩上一十七味搗研為散六十日至百日孩子每服一字匕一二歲半錢匕三四歲一錢匕並米飲調下早晚食前服治小兒疳痢赤白及一切痢桃皮散方桃白皮炙半兩黃連去須胡粉炒赤茯苓去黑皮各一兩黃柏去粗皮炙半兩丁香七粒上六味搗羅為散每服半錢匕米飲調下早晚食前服量兒大小加減治小兒疳痢定命丸方青黛研三分烏蛇去皮骨酒浸炙一分白附子一枚乾蠍炒七個膩粉研一分獨角仙去足炙一枚棘剛子去殼七枚麝香研一分上八味各搗研為末用豬膽汁丸如黍米大每服三丸早晨晚後溫水下治小兒急疳痢不止或膿或血或青或黃髮結成穗或發墮落鼻乾咬指好吃土炭金髓丸方金牙一分烏頭生去皮臍半兩黃連搗末用雞子一枚取清和末作餅炙乾一兩肉豆蔻去殼一枚訶黎勒煨去核用二枚石中黃如無禹餘糧代麝香研丹砂研各一分上八味搗研為末煉蜜丸如綠豆大每服五丸空心米飲下日晚再服量兒大小加減治小兒三歲以上疳痢口瘡身體腳手心熱龍骨湯方龍骨一兩黃連去須黃柏去粗皮炙地榆炙各三分白頭翁乾薑炮當歸切焙酸石榴皮白朮各半兩上九味粗搗篩一二歲兒每半錢匕水半盞生薑三片同煎至三分去滓分溫二服早晚食前服量兒大小加減口瘡取蘆薈赤地利末敷之下部生瘡取蚺蛇膽黃連麝香等分為末塗敷之治小兒疳痢嘔逆厚朴丸方厚朴去粗皮生薑汁炙三分龍骨半兩白茯苓去黑皮人參各三分白石脂半兩陳橘皮去白切焙一分當歸切焙三分肉豆蔻去殼一枚烏梅肉炒乾木瓜各半兩上一十味搗羅為末煉蜜丸如麻子大每服五丸七丸煎生薑棗湯下食前服治小兒一切疳痢龍骨丸方白龍骨一分白石脂一兩半雞屎礬燒灰黃連去須胡粉炒赤茯苓去黑皮阿膠炙燥各一兩上七味搗羅為末煉蜜丸如麻豆大每服五丸七丸空心食前米飲下更量兒大小加減治小兒氣疳下痢腹脹胡黃連丸方胡黃連半兩蛇蛻炙一分蝦蟆炙半兩青黛研一分蝸牛炒半兩木香一分訶黎勒皮半兩麝香一分上八味搗研為末用飯為丸如綠豆大每服三丸五丸米飲下蟲出為度治小兒無辜疳痢無食子丸方無食子煨甘草炙龍骨當歸切焙黃連去須人參各一兩上六味搗羅為末煉蜜丸如麻子大每服三丸五丸米飲下早晨日午服以瘥為度治小兒五疳下痢砒霜丸方砒霜研一錢凝水石燒附子炮裂去皮臍各一分定粉炒半兩上四味搗研為末用粟米飲丸如麻子大每服三丸五丸米飲下更量兒大小加減治小兒疳痢鉛丹散方鉛丹炒研澱粉炒研各一兩蛇蛻炙焦二條夜明砂炒蘆薈研臨時入各一分上五味以前四味搗研為散用醋拌和為餅就熱銚上爆熟細研為散後入蘆薈和勻每服一字匕以米飲調服早晨日午服量兒大小加減治小兒一切疳痢青金散方鉛丹莨菪子胡粉各半兩大棗二十枚上四味一處杵作團燒令通赤取出候冷研細每服半錢匕空腹米飲調下晚後再服治小兒疳痢百中湯方樗皮炙黃連去須枳殼去瓤麩炒蕪荑各半兩生薑一分豉半兩蔥白三莖上七味各細銼以水五合浸經宿平旦煎取三合量兒大小空腹服之初服經日昏沉後漸漸蘇未全效更作一劑熱渴與竹瀝飲之治小兒疳痢久服藥不瘥訶黎勒散方訶黎勒炮去核龍骨赤石脂密陀僧煅酸石榴皮焙麝香研各一分上六味搗研為散每服半錢匕米飲調下空心食前服若是膿血痢黃連湯調下量兒大小加減治小兒疳痢兼渴不止定粉散方定粉炒研半兩雞子一枚取白上二味將定粉與雞子白相和更研如膏一二歲每服半錢匕水七分煎至三分放溫服之更量兒大小加減治小兒疳痢日夕不止手足逆冷或下鮮血虛渴不止烏梅丸方烏梅肉炒龍膽龍骨各一兩黃連去須一兩半地龍糞炒一兩一分上五味搗羅為末煉蜜丸如麻子大一歲兒米飲下三丸食前服以瘥為度治小兒疳痢及吐豆蔻丸方肉豆蔻去殼一枚木香半兩丹砂研人參訶黎勒煨去核麝香研各一分上六味搗研為末用飯丸如麻子大每服二丸空心米飲下日再服更量兒大小加減治小兒一切痢久成疳阿膠丸方阿膠炙令燥白龍骨黃連去須白石脂雞屎白炒胡粉炒赤茯苓去黑皮各一兩上七味搗羅為末煉蜜丸如麻子大每服米飲下三丸食前服更量兒大小加減治小兒疳痢龍骨散方龍骨胡粉炒白礬燒令汁盡各一分黃連去須半兩上四味搗研為散每服半錢匕米飲調下空心服量兒大小加減治小兒疳痢或口內生瘡龍齒散方龍齒半兩丁香一分黃連去須胡粉炒赤茯苓去黑皮各半兩枳殼去瓤麩炒一分上六味搗羅為散每服半錢匕粥飲調下食前服量兒大小加減或加牛黃一錢亦得有鮮血加蕪荑一分治小兒五疳八痢丹砂丸方丹砂研青黛研各一分丁香半分肉豆蔻去殼一枚無食子一枚麝香研一錢干蝦蟆去頭足酥塗炙一枚上七味搗研為末麵糊丸如黃米大每服三丸五丸空心米飲下治小兒疳痢氣下痢腹大肌瘦常服熊膽丸方熊膽研胡黃連夜明砂炒青黛研黃連去須各一分肉豆蔻去殼一枚蘆薈研一分龍腦研一錢蟾頭酥炙一枚麝香研二錢使君子去殼一分丁香半分無食子一分上一十三味除研外搗羅為末粟米飯為丸如綠豆大每服七丸至十丸米飲下日三治小兒脾疳臟腑滑瀉或痢肉豆蔻丸方肉豆蔻去殼一枚訶黎勒炮去核二枚黃連去須一分赤石脂研一錢木香一分蟾頭生薑汁炙一枚上六味搗研為末用蝸牛肉研為丸如黍米大焙乾每服三丸至五丸溫粥飲下食前服治小兒五疳瀉痢肌膚黃瘦多困好吃泥土五心常熱煩渴引飲夜多上竄虛汗使君子丸方使君子去殼麵裹煨銼無食子各五枚木香赤芍藥蘆薈研各一分肉豆蔻去殼檳榔煨銼各一枚黃連去須麒麟竭研麝香研各一分上一十味搗研為末粟米飯丸如麻子大每服五丸至十丸米飲下不拘時服夏秋宜常服治小兒疳痢羸瘦飲食減少引飲六神丸方丁香木香肉豆蔻去殼秤各半兩三味同以麵裹慢火煨蘆薈研一兩使君子去殼訶黎勒皮各半兩上六味搗羅為末棗肉和丸如綠豆大每服三丸至五丸米飲下空心服治小兒疳痢下痢腹脹不思飲食厚朴丸方厚朴去粗皮生薑汁炙半兩陳橘皮去白切焙一分使君子去殼麵裹煨甘草炙銼訶黎勒皮半生半炮各半兩上五味搗羅為細末煉蜜丸如小雞頭大兒三歲以上每服一丸米飲化下百日兒每服作四服乳汁或清米飲化下治小兒疳痢不止麝香丸方麝香研一錢使君子去殼半生半炮無食子半生半炮各二枚上三味搗研為末以薄麵糊丸如小綠豆大每服三丸五丸米飲下治小兒一切疳痢蘭香散方蘭香人糞白狗糞蝦蟆白礬蜘蛛蚯蚓蝸牛子八味並燒灰蘆薈研蚺蛇膽研各一分上一十味搗研為散以葦管斜批吹少許入鼻中及齒上更以蜜和塗紙上貼之如下部即納之治小兒疳痢羸瘦大疳丸方白礬枯綠礬各一兩膽礬二錢干蝦蟆一枚去腸肚炙莨菪子葶藶炒各一分蝸牛四枚以上七味入在瓶內鹽泥固濟候乾火燒通赤取出研為細末胡黃連一分生蝸牛研三枚麝香研丹砂研雄黃研牛黃研各一錢熊膽研訶黎勒皮細辛去苗葉各二錢青黛半錢上一十七味搗研為末和令勻燒粟米飯和丸如麻子大每服三丸至五丸薄荷湯下不拘時候量兒大小加減服治小兒疳痢腹脹肌瘦泄瀉不止至聖丸方使君子去殼二十枚肉豆蔻去殼一枚丁香陳曲炒雄黃研熊膽研各一錢麝香研半錢訶黎勒皮一分上八味搗研為末白麵糊和丸如綠豆大每服十丸米飲下乳食前量兒大小加減服治小兒疳痢無常色黃連木香丸方黃連去須木香各半兩麝香研一錢定粉一分狗肝一具切蝦蟆一枚大者切上六味先搗研四味為末將狗肝蝦蟆用酒三升煮爛至一升去滓煎成膏丸前末如綠豆大每服三丸空心米飲下更量兒加減治小兒疳痢煩渴肌體羸瘦安神散方黃耆椎碎蜜水炙銼半兩甘草炙銼二錢白茯苓去黑皮人參石蓮肉去心炒各一分上五味搗羅為細散每服半錢匕水半盞棗一枚煎三五沸量兒大小加減溫服治小兒疳痢黃瘦焦枯壯熱脹滿沉香煎方沉香銼丁香酸石榴皮各二錢木香肉豆蔻去殼訶黎勒炮去核無食子縮砂仁各三錢使君子去皮半兩上九味搗羅為末煉蜜調成煎每服一豆大米飲化下治小兒疳痢皮毛焦枯肌體羸瘦喜食酸鹹心腹脹發熱胡黃連丸方胡黃連一分芎藭莪朮煨銼青橘皮去白焙陳橘皮去白焙各半兩乾薑炮一錢京三稜煨銼三分上七味搗羅為末每抄一錢匕入巴豆十粒去皮心膜入冷油內慢火煎黑色研細煮醋麵糊丸如黍米大一歲一丸薄荷湯下治小兒疳痢面黃體瘦盜汗壯熱心腹虛脹皮毛焦枯莨菪丸方莨菪子一兩醋浸一宿炒黑色木香胡黃連蘆薈研各一錢訶黎勒皮二枚肉豆蔻大者一枚去殼上六味搗研為末用燒粟米飯和丸如黃米大每服五丸至十丸空心米飲下治小兒乳哺不節生冷過度下痢不止面黃肌瘦腹脹發熱名曰疳痢胡黃連丸方胡黃連末白蕪荑仁末蘆薈研麝香研各一分巴豆五粒去皮心膜出油研上五味合研勻細煮麵糊和丸如粟米大每服五丸至七丸柳枝湯下不拘時治小兒疳痢方丹砂半兩研麝香研熊膽研丁香為末蟾酥各一錢上五味將四味細研如面取蟾酥和為丸如黍米大一歲兒一丸米飲或乳汁相和下勿令碎吃藥後以水濃煎桃柳枝淋洗兒取一丸吹兒鼻中以濕青衣蓋復體其蟲便出以疾退為度治小兒疳氣腹脹泄痢小便赤澀鱉甲散方鱉甲去裙襴醋炙訶黎勒木香赤茯苓去黑皮蒼朮米泔浸一宿切焙各一兩牽牛子熬一兩半上六味搗羅為散食前溫水下半錢匕日再服量大小加減治小兒疳痢日夜無數脫肛身體瘦羸丁香丸方丁香三枚麝香研少許青黛研一分蝦蟆一枚去肚足炙令黃色上四味搗研為末煮漿水飯為丸如粟米大溫水下三丸量兒大小加減服小兒疳痢久不瘥論曰小兒宿挾疳氣加以乳食不節冷熱相乘腸胃虛弱遂令下痢甚則嘔噦變成疳䘌治小兒疳痢久不瘥食物即嘔豶豬膽丸方豶豬膽瓦上爆干二兩胡椒乾薑炮蕪荑炒陳橘皮去白焙各一分蒔蘿微炒半兩倉米炒三分上七味搗羅為末用稀糊和丸如麻子大每服五丸米飲下早晨晚後各一量兒大小加減治小兒疳痢久不瘥黃連散方黃連去須白茯苓去黑皮銼阿膠炒燥黃柏去粗皮銼人參丁香各半兩訶黎勒三枚炮去核桃白皮炙銼三分無食子無孔者二枚上九味搗羅為散每服半錢匕米飲調下空心日午近晚各一更量兒大小加減治小兒疳痢經年不止進退不定狀如白膠雄黃丸方雄黃研凝水石燒研白礬枯研水蓼銼丹砂研各半兩砒霜研半錢鉛丹研雞子皮燒灰各一分大黃炒銼一兩上九味除別研外搗羅為末和勻以蟾酥和丸如綠豆大每服一丸至二丸石榴皮湯下生薑湯亦得早晚食前各一更量兒大小加減治小兒疳痢或黃或青項細腹脹口鼻生瘡日加羸瘦蟬蛻丸方蟬蛻去足麝香研各一分青黛研阿膠炙燥各半兩蛇蛻皮一條燒灰瓜蒂七枚上六味