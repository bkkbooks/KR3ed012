body:
  text: 卷第一百二十二咽喉門咽喉統論論曰咽門者胃氣之道路喉嚨者肺氣之往來一身之中氣之升降出入莫急乎是詳考經絡流注則咽喉所繫非特肺胃為然故孫思邈曰應五臟六腑往還神氣陰陽通塞之道也人之氣血與天地相為流通咽喉尤為出納之要故內經曰喉主天氣咽主地氣若臟熱則咽門閉而氣塞若腑寒則咽門破而聲嘶以致腫痛喉痹生瘡懸癰之屬與夫哽哽如有物妨悶痛癢多涎唾其證不一不可概以實熱為治大率熱則通之寒則補之不熱不寒依經調之湯劑盪滌之外復有針刺等法要皆急去之不可緩非若臟腑積久之病磨化調養有非一朝一夕之功也咽喉閉塞不通論曰咽喉閉塞不通者由脾肺不利風邪熱毒攻衝咽喉故令腫痛甚則閉塞不通宜急治之蓋咽喉者呼吸之道路氣之所出入也治心肺蘊熱咽喉閉塞不通二參湯方玄參紫參白藥大黃銼炒山梔子去皮地骨皮洗焙甘草炙銼柴胡去苗桑根白皮銼炒防風去叉各一兩上一十味粗搗篩每服三錢匕水一盞煎至七分食後去滓溫服治咽喉閉塞不通泄熱湯方大黃炮甘草炙各一兩芒硝研防風去叉各半兩上四味粗搗篩每服三錢匕水一盞煎至八分去滓溫服不計時候治喉中痛閉塞不通升麻湯方升麻銼木通各一兩射干絡石羚羊角鎊各三分芍藥淡竹葉洗杏仁湯浸去皮尖雙仁炒各半兩上八味除竹葉外粗搗篩每服三錢匕水一盞入竹葉七片煎至六分去滓溫服日三治心肺客熱虛煩多痰咽喉不利真珠丸方真珠研如粉半兩甘草生末一兩一分龍腦研三錢硼砂研半兩凝水石六兩煅令赤候冷以紙裹埋地坑內一宿出火毒研取四兩馬牙硝二兩用膩粉半兩於紙內同拌勻裹定安在一新磚上以火煅煙盡放冷入在瓷合子內埋地坑入地可一尺深候一宿研半兩上六味再研令勻煮糯米粥和丸如雞頭實大每服一丸食後臨臥含化咽津治咽嗌閉塞硼砂散方硼砂研膽礬研各一分龍腦一錢鉛白霜三錢馬牙硝研半兩上五味研令細每以箸頭點於懸癰子兩邊如開口不得以筆管吹之立效治喉咽閉塞不利茯苓湯方赤茯苓去黑皮前胡去蘆頭二兩生乾地黃人參桂去粗皮芍藥甘草炙銼各一兩麥門冬去心焙三兩上八味粗搗篩每服三錢匕水一盞入棗二枚劈煎至六分去滓溫服日三不計時候治咽喉閉塞不通比金散方白殭蠶直用生者蛇蛻皮燒灰上二味等分細研為散每用半錢匕摻咽內咽津無妨不計時候治一切喉風閉塞咽喉諸疾去毒丸方青綠信州者煅微赤胡粉上二味等分研為末醋煮麵糊為丸如皂子大每服一丸薄荷暖酒磨化下如口不開用白殭蠶末一字吹入鼻內口即開吐下毒立止治咽喉閉塞不通方馬藺根不拘多少上一味搗取自然汁熱服三合即通治咽喉閉塞不通方紅藍花不拘多少上一味搗取自然汁每服三合旋旋嚥下無生花以乾者浸攪濃汁溫服亦通治咽喉閉塞不通立通散方蚰蜓陰乾二七條礬石半生半燒一分白梅肉炒燥二七枚上三味搗羅為散每用半錢匕吹入喉內或水調下得吐立通治咽喉閉塞不通方桑上白耳不拘多少上一味搗羅為末以生蜜浸每用半匙綿裹含化旋旋嚥下須臾即通喉痹論曰喉痹謂喉里腫塞痹痛水漿不得入也治稍緩殺人蓋由脾肺不利蘊積熱毒外犯寒邪二經壅熱結於喉間痹而不通其狀身熱惡寒治法有先針而後藥者可謂知急先務矣治喉痹腫塞射干丸方射干一兩豉一合杏仁湯浸去皮去雙仁炒芎藭犀角屑各半兩升麻一兩甘草炙半兩上七味搗羅為末煉蜜和丸如小彈丸大每服一丸含化咽津日可三五服瘥治纏喉風及喉痹如聖丸方大黃末一分蝸牛二七枚白礬末馬勃陳白梅皮各一分上五味於五月五日午時用白梅皮蝸牛同研和丸如棟實大如患者開口不得即以水磨用竹管子吹下入喉中立瘥如輕者以綿裹含化一丸治走馬纏喉風及喉痹開關散方硝石六兩鉛丹四兩白礬砒霜各半兩上四味各細研用瓷罐子一個先入硝石二兩鋪底次下砒霜又入硝石二兩方下白礬更入硝石二兩方下鉛丹後用圓瓦一片蓋口於淨地上用方磚一片襯藥罐子以炭火五斤煅令通赤罐子固濟熔成水以炭條子攪令徹底勻方去火放冷於地上經宿打罐子取藥研如粉患者用箸頭蘸冷水惹藥深點咽喉內漸漸咽津至甚者不過三兩度點治喉痹伏龍肝散方伏龍肝半兩白礬煅過白殭蠶直者炒甘草生各一分上四味搗羅為散每服一錢匕如茶點服吐出涎立效未吐更進一服治喉痹比金丸方鉛白霜半兩青黛一兩甘草半兩上三味搗羅為末醋糊為丸如雞頭實大含化咽津痰出立效治男子婦人喉痹口噤牙關緊透關散方雄黃研豬牙皂莢蜜炙去皮藜蘆各一分上三味搗研為細散每用一字分彈入兩鼻中關透涎出瘥治急喉痹丹砂酒方丹砂研桂去粗皮絳礬各一錢上三味搗研為末以綿裹用好酒少許浸良久含飲即瘥治喉痹如聖散方白殭蠶直者炒天南星炮各半兩上二味搗羅為散每服一字以生薑自然汁調下如咽喉大段不通即以小竹筒灌之涎出後用生薑一片略炙含化咽津治纏喉風喉痹烏頭散方烏頭尖生膽礬各一分上二味搗羅為散每以一字酒少許調服良久即愈如口噤即於鼻內吹一字立效治纏喉風一切喉痹急危殭蠶散方白殭蠶三枚枯礬一分上二味搗羅為散生薑蜜水調下一錢匕細呷治咽喉卒腫喉痹勝金散方戎鹽一兩青黛半錢上二味同研勻每服半錢匕或一字用小竹筒吹入喉咽咽津效治喉痹危急者萬金丹方巴豆一枚和皮以紙裹當中腰截斷上一味以綿系分塞左右鼻竅中熏之須臾喉通即取出治纏喉風一切喉痹危急如聖散方白殭蠶不拘多少直者新瓦上炒上一味為末用生薑自然汁和丸如雞頭實大含化急者生薑汁調一大錢以竹筒子灌入喉中立效治急喉痹逡巡不救方皂莢去皮子生半兩上一味搗為末每服少許箸頭點在腫處更以醋調藥末厚塗項下須臾便破少出血即愈治急喉痹方蠡蟲膽臘月收陰乾上一味為末每取少許點患處藥至即瘥病在深處則水化灌之治喉痹方蛇蛻皮不以多少上一味揉碎以香爐一個燒煙令患人用竹筒子吸入喉咽內熏破治急喉痹方生油一合上一味急灌之立愈若未瘥急解發令散當頂心取方寸許急捉痛拔之少頃當通如更急則喉下當咽管口灸一壯如麥粒大火至即瘥氣雖似絕但心下暖者亦可救此數法皆神驗治咽喉痹痛不能喘息水漿不得入金硝丸方鬱金銼馬牙硝研甘草銼山梔子去皮栝蔞根各二兩大黃銼玄參白礬研硼砂研各一分上九味搗研為末煉蜜和丸如雞頭實大每用一丸綿裹含化咽津治喉痹咽塞熱痛二砂丸方沙參丹砂研硇砂研人參玄參丹參上六味等分搗研為末煉蜜丸如雞頭實大食後臨臥含一丸化之治纏喉風方馬牙硝半兩丹砂一錢龍腦麝香各一字上四味細研如粉用鯇魚膽和丸如綠豆大每邊鼻內深送一丸良久兩牙關出涎瘥又方白殭蠶玄參白礬研各一錢甘草半錢上四味搗研為末用鯇魚膽和丸如赤小豆大每服十丸冷生薑湯下治喉痹方蛇蛻白梅白殭蠶甘草各等分上四味搗羅為末綿裹含化咽津治喉痹方白礬燒令汁枯研白附子搗末各等分上二味研令勻塗在舌上咽津治喉痹方上用黃顙魚頰骨不計多少燒灰出火毒以茶清調下三錢匕又方上用大鹽球子搗為末以赤糖為丸如彈子大含之治喉痹腫塞散毒湯方桔梗微炒甘草微炙銼各二兩上二味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服治喉痹水漿不入方上取石蟹冷水磨飲之兼塗喉上瘥又方上取生惡實莖葉研塗喉上兼椎一莖令頭破納喉中瘥又方上生研糯米入蜜飲之又方上以糯米半升炒焦碾末水調成膏貼喉上再換腫即消治喉痹射干湯方射干上一味細銼每服五錢匕水一盞半煎至八分去滓入蜜少許旋旋服馬喉痹論曰馬喉痹之狀勢如奔馬喉間痹痛腫連頰骨壯熱煩滿數數吐氣者是也此蓋脾肺不利熱毒攻衝發於咽喉所致治熱沖喉間連頰腫數出氣煩滿生犀丸方犀角鎊枳實去瓤麩炒射干海藻洗去咸焙升麻各一兩白附子炮半兩百合胡黃連蒺藜子炒各三分杏仁湯浸去皮尖雙仁研三分上一十味搗羅為末煉蜜丸如彈子大每服一丸綿裹咽津不計時治咽喉腫痛連舌頰牙根赤腫心煩咽乾多渴眠睡不穩龍腦丹砂丸方龍腦研一錢丹砂研半兩人參白茯苓去黑皮各一兩羚羊角鎊犀角鎊甘草炙銼升麻惡實炒各半兩麥門冬去心焙一兩半馬牙硝研黃藥各一分上一十二味搗研為末再同和勻煉蜜丸如雞頭實大每服一丸含化咽津食後臨臥治咽喉連頰頷腫日數深遠咽津液熱發歇疼痛龍腦丸方龍腦研升麻甘草馬牙硝研各一分玄明粉研三分麝香研石膏碎大黃銼黃耆銼各一分生地黃二兩絞取汁上一十味除地黃汁外搗羅為末以地黃汁和如干更入煉過蜜少許為丸如小彈子大用綿裹含化咽津日四五次不計時治馬喉痹咽喉腫痛唇焦舌乾腮頰連腫天門冬丸方天門冬去心焙玄參惡實炒各一兩百藥煎紫蘇葉各半兩甘草炙銼一兩半人參硼砂研龍腦研各一分上九味搗研為細末煉蜜和丸如皂子大每服一丸食後臨臥細嚼溫熟水下治口乾咽腫喉頰脹痛生銀丸方人參半兩丹砂研鉛霜研錫藺脂朴硝研升麻各一分硼砂研三錢龍腦研一錢上八味搗研為末和勻煉蜜為丸如皂子大每服一丸含化咽津治馬喉痹咽頰腫痛吐氣不快七聖散方白礬二錢馬牙硝五錢硝石一兩鉛丹三錢硇砂一錢蛇蛻半條巴豆兩枚去殼上七味先研白礬牙硝硇砂三味入罐子內次入硝石次摻鉛丹於上面只用平瓦一小片蓋以慢火燒成汁便用竹片子夾蛇蛻攪五七度又入巴豆更攪五七度取出候冷研為散如小可咽喉腫痛咽津妨礙及口瘡只乾摻一字或大段喉痹及馬喉痹或腮頤生瘀肉侵咽喉即乾摻半錢安穩仰臥其喉癰腫處自破立瘥治熱結喉間連頰腫不消心膈煩滿絳雪散方木通銼桔梗銼炒檳榔各二兩枳殼去瓤麩炒犀角鎊各一兩半柴胡去苗升麻木香赤茯苓去黑皮各二兩桑根白皮銼山梔子仁各四兩桂去粗皮人參各二兩蘇枋木五兩朴硝研一斤丹砂炒一兩麝香研一分訶黎勒去核五枚上一十八味除朴硝丹砂麝香外各細銼以水二斗於銀器內慢火熬至七升以生絹濾去滓再煎至五升下朴硝以柳木篦攪勿住手候稍凝即去火傾入盆中將丹砂麝香末拌令勻瓷器盛之勿令透氣每服一錢或二錢以冷蜜湯調下食後臨臥看老少加減治馬喉痹喉中連頰焮腫犀角湯方犀角鎊甘草炙銼升麻各半兩射干桔梗炒馬藺根銼各三分上六味粗搗篩每服三錢匕水一盞入竹葉七片煎至七分去滓入馬牙硝末半錢匕攪令勻細細呷服治毒氣壅塞咽喉不利頰頷連腫玉液丸方百藥煎一兩麝香研朴硝各半錢丹砂二錢研龍腦研甘草末各一錢上六味各研為末再同研勻細以水浸蒸餅心為丸如梧桐子大更用丹砂為衣陰乾含化一丸治咽候中壅塞如核連頰腫痛胡黃連散方胡黃連一分升麻半兩鉛霜研一分上三味除鉛霜外搗羅為散再同和勻每服半錢匕綿裹含化咽津日三五度不計時候治馬喉痹腫連頰吐氣方馬銜鐵一具上以水三升煎至一升細細含咽又方馬鞭草根一握上截去兩頭搗取汁服之愈又方生薑二斤取汁蜜三兩上二味以微火煎令得所每服一合日四五服含咽治馬喉痹頰咽痛龍腦散方白龍腦細研牛黃細研犀角屑羚羊角屑馬牙硝細研玄參沉香硃砂細研甘草炙微赤銼以上各一分川升麻半兩硼砂一錢細研上一十一味除龍腦牙硝搗篩為散每服三錢匕水一盞竹葉七片煎至六分去滓溫入龍腦馬牙硝一錢攪令勻細細含咽又方五倍子半兩黃柏半兩銼川升麻三分射干半兩甘草一分炙微赤銼上五味搗篩為散每服三錢匕水一小盞煎至四分去滓不計時候溫服煙方乳香一分白殭蠶三七枚直者上二味搗羅為末每用一錢匕香爐上燒開口令煙燻入喉中涎出效治馬喉痹勢如奔馬腫痛煩滿數數吐氣橘皮湯方陳橘皮湯浸去白焙青竹茹生地黃切焙黃芩去黑心山梔子仁各三兩桂去粗皮一兩白朮三兩芒硝研湯成下赤茯苓去黑皮二兩上九味除芒硝外粗搗篩每服三錢匕以水一盞入生薑半分拍碎棗二枚擘破煎至五分去滓下芒硝末一錢匕攪勻溫服食後日三治纏喉風卒然喉痹急如奔馬喉頰俱腫名為馬喉痹凝水石散方凝水石甜硝各半兩並用無油瓷合盛火煅通赤合於地上出火毒一宿白殭蠶麩炒黃研如粉一兩上三味同研令勻每取少許摻咽喉中病甚每服二錢匕溫水調下若牙關緊急只於鼻中吸入咽喉腫痛論曰足太陰之脈屬脾絡胃上膈挾咽連舌本足陽明之脈其支者從大迎前下人迎循喉嚨是知喉咽者脾胃之候也脾胃有熱風毒乘之其氣上衝經絡胥應故喉咽為之腫痛甚則水漿不下便能殺人其候有使人寒熱似傷寒者宜急治之治喉咽腫痛熱毒氣上攻絡石湯方絡石木通銼升麻射干各一兩犀角鎊玄參竹茹梔子仁各半兩桔梗炒赤芍藥各三分上一十味粗搗篩每服三錢匕水一盞煎至六分去滓內馬牙硝一錢攪勻食後細細含咽日三五服治脾胃有熱風毒相乘上攻咽喉腫痛丹砂玫瑰丸方丹砂二兩研人參硼砂研半夏為末生薑汁餅曝乾雄黃研各半兩麥門冬去心焙一兩半甘草生銼烏梅肉各一兩赤茯苓去黑皮白梅肉各三分麝香研龍腦研紫雪各一分上一十三味搗研為末以乳糖和丸如雞頭大金箔為衣每服一丸紫蘇熱水嚥下含化咽津亦得食後臨臥服治脾胃毒熱上攻咽喉腫痛化涎生津消毒丸方五倍子馬牙硝各一兩甘草三分生銼硼砂白礬熬令汁枯升麻馬勃各半兩丹砂研麝香研龍腦研各一分上一十味搗研為末糯米飯為丸如雞頭大每服一丸含化不拘時治喉腫熱塞不通脾熱上衝射干膏方射干三兩芍藥羚羊角鎊木通各一兩薔薇根升麻生地黃切焙各二兩艾葉一分豬脂一斤臘月收者上九味將八味細銼綿裹以醋二盞浸一宿納豬脂微火煎醋盡為度去滓每服如杏仁許綿裹內喉中細細嚥之治咽喉腫痛知母飲方知母麥門冬去心焙山梔子仁人參各半兩黃芩去黑心赤茯苓去黑皮各一分甘草炙銼三分天門冬去心焙一兩上八味粗搗篩每服三錢匕水一盞煎至六分去滓溫服病甚者倍之治咽喉腫痛風毒衝心胸犀角湯方犀角鎊杏仁湯浸去皮尖雙仁炒甘草炙銼射干各一兩羚羊角鎊三分芍藥一兩半梔子仁四枚升麻二兩上八味粗搗篩每服五錢匕水一盞半煎至八分下豉二十粒再煎一二沸去滓溫服治咽喉腫痛解臟腑諸毒化涎丹砂牛黃丸方丹砂研硼砂研各半兩生甘草末一分牛黃研礬蝴蝶研龍腦研各三錢印子鹽二十粒細研凝水石燒赤出火毒研半兩上八味將七味同研令勻用甘草末熬煎和丸如雞頭大每服一丸食後含化咽津治脾熱喉中腫痛熱塞不通羚羊角湯方羚羊角鎊一兩射干絡石碎大黃銼升麻各三分木通銼芍藥各一兩半生地黃二兩切焙上八味粗搗篩每服五錢匕水一盞半煎至八分去滓下芒硝末一錢匕攪勻溫服得利即瘥治上膈壅實咽喉腫痛天門冬丸方天門冬去心焙玄參焙惡實炒各一兩甘草炙銼一兩半人參硼砂研龍腦研各一分上七味搗羅五味為細末與別研二味拌勻煉蜜和劑搗三百杵丸如皂子大每服一丸食後臨臥淡生薑湯嚼下治咽喉痛舌上結熱此是心脾壅積宜服地骨皮湯方地骨皮黃耆銼桔梗銼炒山梔子仁竹茹犀角鎊各半兩甘草炙銼一分上七味粗搗篩每服三錢匕水一盞生薑一棗大拍碎煎至五分去滓食後溫服日三治喉中腫痛竹茹湯方竹茹桂去粗皮甘草炙銼各一分桔梗銼炒犀角鎊黃耆銼栝蔞根各半兩上七味粗搗篩每服三錢匕水一盞煎至六分去滓食後溫服日三治咽喉腫痛胸滿心下堅妨悶刺痛坐臥不安木通湯方木通銼一兩赤茯苓去黑皮桑根白皮銼射干百合各三分大腹三枚上六味粗搗篩每服三錢匕水一盞煎至六分去滓下朴硝一錢匕攪勻食後溫服良久再服治咽喉腫痛咽物不得絡石射干湯方絡石三分射干一兩半芍藥升麻各一兩一分露蜂房炙蒺藜子炒去角各一兩上六味粗搗篩每服三錢匕水一盞煎至六分去滓入馬牙硝一錢匕攪勻食後臨臥溫服細細含咽亦得治咽喉腫痛五香飲方沉香木香雞舌香熏陸香各一兩麝香三分研連翹二兩上六味除五香各搗研為末外粗搗篩每服三錢匕水一盞半煎至一盞去滓入五香末一錢半匕再煎至八分溫服不拘時治咽喉腫痛及走馬喉痹硼砂丸方硼砂馬牙硝各一分丹砂半分斑蝥二枚去頭翅足炒上四味同研為末以生薑自然汁煮麵糊和丸如梧桐子大臘茶為衣每服二丸臘茶下治手足心煩熱壅悶咽喉腫痛真珠丸方真珠末一錢匕太陰玄精石煅赤研末四兩不灰木用牛糞燒赤取末四兩上三味同研勻細用糯米粥為丸如雞頭大每服一丸食後用生地黃汁粟米泔研化下日二治咽喉腫痛及纏喉風粥飲難下者龍膽膏方龍膽一兩膽礬研乳香研各一分上三味搗研令勻煉沙糖和丸如豌豆大每服一丸綿裹含化咽津未瘥再服治脾肺壅熱咽膈腫疼不利三解湯方甘草炙銼一分荊芥穗半兩惡實隔紙炒香一兩上三味粗搗篩每服三錢匕水一盞煎至七分去滓溫服治咽喉腫並喉閉附子散方附子一枚炮裂去皮臍作四片酥炙惡實炒三分馬藺子一兩上三味搗羅為散每服一錢匕空心溫水調下漸加至一錢半治咽喉腫痛咽物不得蛇蛻散方蛇蛻皮一條燒令煙盡馬勃一分上二味搗羅為散每服一錢匕以綿裹含徐徐咽津立瘥治咽喉腫痛咽物妨悶丹砂散方丹砂一分研水飛芒硝一兩半研上二味再同研勻每用一字時時吹入喉中治咽喉痛方射干洗上一味銼如大豆許每含一粒咽津時時大開口吐氣頻拽兩耳即瘥治喉咽卒腫食飲不通搗薤膏方薤一握上一味爛搗醋和敷腫上冷復易佳又方薏苡仁七枚上以水吞之即瘥治大人小兒喉咽腫痛鶴頂丹方甜硝四兩上一味炒過研細先掘地作坑子揩淨入甜硝在內一時辰出火毒取出入熟甘草末半兩麝香生龍腦各一錢硼砂二錢半馬牙硝一兩丹砂一錢半一處細研滴水丸如雞頭大每服一丸含化咽津小兒只作散新汲水調下半錢匕治咽喉腫痛甘露散方白殭蠶炒天南星上二味等分為細散每服一錢匕生薑薄荷湯調下治風熱上攻咽喉腫痛通喉散方黃連去須礬石豬牙皂莢去皮子上三味等分於瓦器內煅過成細散每用一字匕吹在喉中取出涎瘥甚者半錢匕合時勿令婦人雞犬見治男女長幼咽喉腫痛氣息難通絳雪散方硇砂研白礬研各一錢硝石研四兩鉛丹研半兩馬牙硝研一分巴豆去皮六枚上六味將五味入罐子內燒候有火焰乃入巴豆良久又入蛇蛻皮一條煅熟取出放冷研末每用少許吹入喉中合時勿令婦人雞犬見臘月合尤佳治咽喉卒腫痛不治殺人如聖丸方大黃末白礬末馬勃末陳白梅肉各一分蝸牛二七枚上五味於五月五日午時取白梅肉蝸牛同研極爛與三味末和勻丸如楝實大每用一丸輕者綿裹含化重者水磨用竹管子透入喉中治咽喉緊腫疼痛硼砂散方硼砂甘草銼一分馬牙硝人參各半兩上四味搗研為細散每服半錢匕含化咽津不拘時候治咽喉風毒腫痛熱毒氣攻心胸滿悶絡石葉飲方絡石葉赤芍藥桔梗銼炒各一兩半射干玄參升麻青竹茹各一兩木通銼馬牙硝各二兩生犀角鎊梔子仁各三分上一十一味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服以通利為度治脾肺熱毒上衝咽喉腫痛不利桔梗湯方桔梗一兩銼炒甘草半兩炙銼上二味粗搗篩每服五錢匕水一盞半煎至七分去滓食後溫服治風熱客於肺經上搏咽喉氣壅腫痛語聲不出黃芩湯方黃芩去黑心一兩半升麻一兩木通銼一兩芍藥一兩枳實去瓤麩炒一兩半柴胡去苗一兩羚羊角鎊一兩石膏碎二兩杏仁湯浸去皮尖雙仁炒一兩上九味粗搗篩每服三錢匕以水一盞煎至五分去滓溫服熱毒大盛加大黃一兩治咽喉腫痛水漿不入射干丸方射干半兩柑皮半兩山大豆一分苦藥子一分升麻半兩硝石研一分甘草炙銼一分上七味搗羅為細末煉白餳和丸如彈丸大每取一丸含化咽津不計時候治咽喉腫痛喉痹及咽喉諸疾乳香丸方乳香研石亭脂研阿魏密陀僧安息香各一分砒霜研半分麝香研半兩上七味除安息香外搗研為末酒煮安息香和丸如綠豆大每服五丸茶清下空心服良久以熱茶投令吐更欲服只用薑湯治風熱客搏於肺脾經血脈壅遏喉間腫痛語聲不出射干湯方射干紫菀去苗土款冬花各一兩半麻黃去根節二兩細辛去苗葉五味子炒各一兩半夏湯洗七遍半分上七味粗搗篩每三錢匕以水一盞入棗二枚劈破煎至五分去滓入地黃汁半合分溫二服食後臨臥治風熱咽喉腫痛飲食妨悶一捻金散方惡實炒馬牙硝研礬蝴蝶研各一分甘草炙銼半兩上四味搗研為散每摻一字匕於舌上治脾胃風熱咽喉腫痛五香湯方薰陸香半兩麝香研一分木香雞舌香沉香銼各一兩上五味除麝香外粗搗篩每服二錢匕以水五分煎至三分去滓入麝香末半錢匕溫服日三治風熱客於脾肺經喉間腫痛語不出麻黃湯方麻黃去根節乾薑炮各二兩細辛去苗葉一兩半五味子炒一兩桂去粗皮半兩半夏湯洗七遍一分上六味粗搗篩每服三錢匕用水一盞煎至七分去滓溫服食後日三
