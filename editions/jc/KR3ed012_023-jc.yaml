body:
  text: 卷第二十三傷寒譫語論曰傷寒不應發汗而汗之遂致亡陽津液內竭胃中燥實則令譫語此病或由津液不和內有燥屎或三陽合病或瘀熱蓄血在裡或婦人熱入血室皆使譫語也然譫語屬胃胃者足陽明經也陽明為病主身熱故譫言妄語則身當有熱脈當洪大而洪大亦陽脈也故其病為順若譫語而手足厥脈反沉細而微者為逆也然又有鄭聲者取其鄭重之意與譫語相類蓋古人以此分虛實醫者當以脈證參合別之不可不慎故謂虛則鄭聲實則譫語治傷寒陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語宜小承氣湯若一服譫語止更莫服小承氣湯方大黃四兩厚朴去粗皮薑汁炙二兩枳實大者麩炒三枚上三味銼如麻豆大每服五錢匕水一盞半煎至七分去滓溫服治傷寒陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而寫之濈然汗出則愈汗出譫語者以有燥屎在胃中此為風也須下者過經乃可下之下之若早語言必亂以表虛里實故也下之愈宜大承氣湯方大黃酒洗四兩厚朴去粗皮生薑汁炙半斤枳實麩炒五枚上三味銼如麻豆每服五錢匕水一盞半煎至七分去滓入芒硝一錢匕更上微火一兩沸溫服治傷寒三陽合病腹滿身重難以轉側口不仁面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗出者白虎湯主之方知母六兩石膏碎一斤甘草炙二兩粳米六合上四味粗搗篩每服五錢匕水一盞半煎至七分去滓溫服治傷寒熱實得汗不解腹滿脹痛煩躁譫語柴胡湯方柴胡去苗一兩大黃銼微炒黃芩去黑心芍藥半夏湯洗七遍焙乾各三分枳殼去瓤麩炒半兩上六味㕮咀如麻豆每服五錢匕水一盞半入生薑一分拍碎煎至七分去滓溫服治傷寒邪熱在胃譫言妄語身體壯熱犀角湯方犀角鎊大青人參各三分遠志去心一分升麻一兩半柴胡去苗黃芩去黑心各一兩甘草炙銼半兩上八味粗搗篩每服五錢匕水一盞半入生薑半分拍碎蘆根茅根各五寸同煎至半盞去滓溫服治傷寒脈沉在裡而反發汗津液越出大便難表虛里實遂發譫言其人如狂枳實湯方枳實去瓤麩炒木香各一分朴硝三分大黃銼微炒一兩甘草炙半兩上五味粗搗篩每服五錢匕水一盞半煎至七分去滓溫服治傷寒裡實譫語狂妄芎藭湯方芎藭三分大黃銼炒一兩甘草炙銼半兩上三味粗搗篩每服五錢匕水一盞半煎至七分去滓溫服治傷寒熱病譫言妄語四肢煩熱犀角湯方犀角鎊柴胡去苗吳藍馬牙硝各一兩升麻葛根銼各一兩半甘草炙半兩上七味粗搗篩每服五錢匕水一盞半煎至七分去滓食後溫服日再治傷寒熱實煩躁譫語柴胡湯方柴胡去苗人參黃芩去黑心各一兩犀角鎊朴硝茯神去木各三分甘草炙銼半兩上七味粗搗篩每服五錢匕水一盞半煎至七分去滓溫服治傷寒經六七日不解默默煩心腹中乾燥大腸結澀譫言妄語人參柴胡湯方人參三分柴胡去苗一兩芍藥知母黃芩去黑心大黃銼微炒葳蕤半夏湯洗七遍焙甘草炙各半兩上九味粗搗篩每服五錢匕水一盞半入生薑一分拍碎同煎至七分去滓溫服治傷寒煩熱不解譫言妄語欲發狂走黃芩散方黃芩去黑心甘遂麩炒黃龍膽去蘆頭各一兩上三味搗羅為散每服一錢匕冷水調下更令病人飲水三兩盞腹滿則吐此方療積熱甚效治傷寒發熱煩躁言語譫妄目赤口乾心神恍惚栝蔞散方栝蔞根二兩鬱金甘草生各一兩上三味搗羅為散每服一錢生薑蜜水調下不拘時候治傷寒發汗多亡陽譫語者不可下與柴胡桂枝湯和其營衛以通津液後自愈方柴胡去苗四兩桂去粗皮黃芩去黑心芍藥人參各一兩半半夏湯洗七遍焙甘草炙各一兩上七味銼如麻豆每服五錢匕水一盞半入生薑半分拍碎大棗兩枚劈破同煎至七分去滓溫服日三傷寒潮熱論曰傷寒潮熱者謂潮作有時由邪氣入里故病有日晡所發潮熱已而微利者有微發潮熱而大便溏者有潮熱而咳逆者有結胸而潮熱者大凡潮熱皆以邪氣內實也制方者宜酌其輕重治傷寒陽明病發潮熱大便溏小便自可胸脅滿不去者小柴胡湯方柴胡去苗八兩黃芩去黑心甘草炙人參各三兩半夏二兩半湯洗七遍上五味細銼如麻豆大拌勻每服四錢匕水一盞半生薑半分切大棗二枚劈破煎至八分去滓溫服日三治傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒硝湯主之方柴胡去苗二兩黃芩去黑心人參甘草炙各一兩半夏八錢湯洗七遍芒硝研二兩上六味除芒硝外細銼如麻豆大每服四錢匕水一盞半生薑半分切大棗二枚劈破煎至八分去滓入芒硝末一錢匕再煎令沸溫服治陽明病譫語潮熱脈滑而疾者小承氣湯方大黃酒洗銼炒四兩厚朴去粗皮薑汁炙二兩枳實麩炒一兩上三味細銼如麻豆大拌勻每服四錢匕水一盞半煎至八分去滓溫服初服當利不爾再服治傷寒陽明病潮熱大便微硬者大承氣湯方大黃酒洗銼炒四兩厚朴去粗皮薑汁炙半斤枳實麩炒芒硝研各二兩上四味㕮咀如麻豆大每服四錢匕水一盞半煎至七分去滓溫服以利為度熱不潮者不可與之治傷寒十日以上潮熱不解日晡即發發即壯熱如火胸滿嘔逆六味柴胡湯方柴胡去苗一兩桂去粗皮栝蔞根各半兩黃芩去黑心三分牡蠣燒赤甘草炙各一分上六味粗搗篩每服五錢匕水一盞半生薑半分拍碎煎至七分去滓溫服治傷寒後潮熱不退或時頭痛目眩此是腹中有結燥柴胡厚朴湯方柴胡去苗厚朴去粗皮薑汁炙朴硝研各一兩大黃銼炒一兩半枳殼去麩炒三分上五味粗搗篩每服五錢匕水一盞半煎至七分去滓溫服以利為度治傷寒十日以上潮熱不退柴胡石膏湯方柴胡去苗石膏碎赤茯苓去黑皮白朮葳蕤羚羊角鎊各一兩梔子仁一分桑根白皮銼三分上八味粗搗篩每服五錢匕水一盞半煎至七分去滓溫服治傷寒瘥後已經十餘日潮熱不退身體沉重昏昏如醉前胡湯方前胡去蘆頭百合葛根銼各一兩麥門冬去心焙半兩石膏碎麻黃去根節各三分上六味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服治傷寒過經潮熱不解或時作寒如瘧狀柴胡鱉甲湯方柴胡去苗鱉甲去裙襴醋炙赤茯苓去黑皮各一兩黃芩去黑心知母焙桑根白皮銼各三分甘草炙半兩上七味粗搗篩每服五錢匕水一盞半生薑半分拍碎煎至七分去滓溫服不拘時治傷寒後潮熱不退發歇無時秦艽湯方秦艽去苗土鱉甲醋炙去裙襴各一兩甘草炙半兩上三味粗搗篩每服五錢匕水一盞半生薑半分拍碎豉一百粒蔥白五寸煎至七分去滓溫服治傷寒汗下後潮熱不退口乾煩躁柴胡人參湯方柴胡去苗人參知母焙石膏碎葛根銼赤茯苓去黑皮各一兩甘草炙半兩上七味粗搗篩每服五錢匕水一盞半生薑半分拍碎煎至七分去滓溫服不拘時治傷寒餘毒潮熱不解秦艽柴胡湯方秦艽去土柴胡去苗知母焙青蒿各一兩大黃銼炒鱉甲醋炙去裙襴鬼臼常山各半兩上八味粗搗篩每服三錢匕水一盞煎至半盞去滓溫服不拘時治傷寒潮熱不退常山湯方常山銼三分烏梅肉炒鱉甲去裙襴醋炙黃耆銼各一兩大黃銼炒甘草炙各半兩柴胡去苗二兩上七味粗搗篩每服三錢匕水一盞半入小麥一匙生薑三片煎至七分去滓熱服不拘時日三傷寒煩渴論曰腎者水臟膀胱者津液之腑二經為表裡傷寒熱入於臟流於少陰之經則腎受病矣腎水惡燥熱盛則燥故渴而引飲又傷寒邪氣非發汗吐下則不能除若發汗吐下過甚則亡津液津液耗多熱氣內生亦令渴也治傷寒服桂枝湯大汗出大煩渴不解脈洪大者白虎加人參湯方知母焙三兩石膏碎八兩甘草炙一兩糯米三合人參一兩半上五味㕮咀如麻豆大每服五錢匕水一盞半煎至米熟去滓溫服治傷寒發熱六七日不解煩渴飲水水入則吐此為水逆五苓散方豬苓去黑皮赤茯苓去黑皮白朮各二兩澤瀉一兩一分桂去粗皮半兩上五味搗羅為散每服一錢匕半溫熟水調下不拘時日三服多飲暖熟水汗出愈治傷寒脈浮發熱渴欲飲水小便不利豬苓湯方豬苓去黑皮赤茯苓去黑皮阿膠銼炙澤瀉滑石各一兩上五味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服治傷寒數日不解心躁煩亂小腹脹急臍下悶痛大渴喘乏八味知母湯方知母焙芍藥麥門冬去心焙柴胡去苗澤瀉各三分石膏一兩半黃芩去黑心甘草炙各半兩上八味粗搗篩每服三錢匕水一盞入生薑一棗大拍碎竹葉三七片同煎至七分去滓食後溫服治傷寒燥渴頭痛不得眠睡四肢煩痛葛根飲方葛根銼黃芩去黑心大青石膏碎人參各一兩甘草炙半兩上六味粗搗篩每服三錢匕水一盞煎至六分去滓溫服治傷寒六七日煩渴不止麥門冬飲方麥門冬去心焙土瓜根枇杷葉拭去毛炙黃各一兩甘草炙半兩上四味粗搗篩每服三錢匕水一盞煎至六分去滓溫服不拘時治傷寒煩渴不止枯蔞湯方栝蔞根一兩上一味細銼每服五錢匕水一盞半煎至八分去滓溫服不拘時治傷寒下後除熱止煩渴人參湯方人參麥門冬去心焙五味子炒石膏碎各一兩甘草炙半兩上五味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服不拘時治傷寒下後頭疼口乾煩渴葛根石膏湯方葛根銼麥門冬去心焙黃芩去黑心升麻各一兩石膏碎一兩半甘草炙半兩上六味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治傷寒吐下後內外有熱煩渴不止黃芩蘆根湯方黃芩去黑心蘆根人參赤茯苓去黑皮各一兩桂去粗皮半兩上五味粗搗篩每服五錢匕水一盞半入生薑一棗大拍碎棗三枚劈破同煎至八分去滓溫服不拘時治傷寒溫病吐下後餘熱未盡頭痛口乾煩渴麻黃葛根湯方麻黃去根節甘草炙各一兩知母焙葛根銼石膏碎各一兩半上五味粗搗篩每服五錢匕水一盞半煎至七分去滓食後溫服治傷寒溫病吐下後有餘熱煩渴不止芍藥黃連湯方芍藥黃連去須麥門冬去心焙各三分栝蔞根半兩甘草炙一分黃芩去黑心一兩上六味粗搗篩每服三錢匕用水一盞煎至六分去滓食後溫服治傷寒吐利後煩渴不止竹茹湯方青竹茹雞子大人參半兩烏梅兩枚去核上三味細銼每服三錢匕水一盞煎至八分去滓溫服不拘時治傷寒熱氣熏蒸臟腑煩渴飲水不休葛根鬱金湯方葛根銼鬱金銼石膏碎荊芥穗各一分甘草炙一錢上五味粗搗篩每服三錢匕水一盞煎至七分去滓食後臨臥溫服治傷寒煩躁大渴飲水不休升麻飲方升麻銼黃芩去黑心葛根銼柴胡去苗山梔子仁荊芥穗牡丹皮黑牽牛各一分黃連去須硝石研各一錢上一十味粗搗篩九味拌和研者每服三錢匕水一盞煎至七分去滓溫服食後臨臥治傷寒時氣煩渴飲水不止黃連丸方黃連去須栝蔞根各一兩葛根半兩上三味搗羅為末煉蜜丸如梧桐子大每服三十丸煎大麥湯溫下不拘時治傷寒後胃熱引飲煩渴不止茯苓地黃湯方赤茯苓去黑皮生乾地黃焙栝蔞根各一兩知母焙半兩麥門冬去心焙一兩半上五味粗搗篩每服五錢匕水一盞半入小麥一百粒淡竹葉三五片棗三枚劈破同煎至八分去滓溫服不拘時治傷寒後毒氣上攻津液燥少大渴引飲土瓜根湯方土瓜根甘草炙各半兩豉半合上三味並細銼分作三服每服用水一盞半入大棗二枚劈破同煎至七分去滓食後溫服治傷寒後體虛心脾積熱口乾煩渴栝蔞丸方栝蔞根黃連去須茯神去木麥門冬去心焙各一兩桑根白皮銼犀角屑人參地骨皮