林檎絞取汁新汲水相和調服如心煩躁熱及欲發黃即別入龍腦少許和雞子清調服小兒服一錢或半錢匕治傷寒三日後心煩躁熱狂言鉛霜散方鉛白霜一分馬牙硝一兩上二味研勻每服半錢匕生薑蜜水調下小兒一字匕治陽毒傷寒五六日以上但胸中煩熱乾嘔躁悶蘆根湯方蘆根一兩知母焙栝蔞根柴胡去苗黃芩去黑心甘草炙銼各一兩半上六味粗搗篩每服二錢匕水一盞生薑三片煎至七分去滓溫服不拘時治傷寒溫病後煩躁龍膽湯方龍膽葳蕤芍藥黃芩去黑心石膏麻黃去根節升麻甘草炙銼各三分葛根銼一兩桂去粗皮大青各半兩上一十一味粗搗篩每服三錢匕水一盞生薑一棗大拍碎煎至六分去滓溫服治傷寒七八日汗後心煩躁渴人參湯方人參黃芩去黑心柴胡去苗葛根銼各一兩山梔子仁甘草炙銼各半兩上六味粗搗篩每服五錢匕水一盞半生薑一棗大拍碎煎至七分去滓不拘時溫服治傷寒陽明病脈浮而緊咽燥口苦腹滿而喘汗出不惡寒反惡熱身重若發汗則躁心憒憒而反譫語若加溫針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上胎者屬梔子豉湯方梔子仁肥者四枚擘豉半兩上二味以水二盞煎梔子取一盞入豉再煎取七分去滓溫服一服得吐者止治傷寒火逆下之因燒針煩躁者屬桂枝甘草龍骨牡蠣湯方桂去粗皮一兩甘草炙銼龍骨牡蠣熬各二兩上四味㕮咀如麻豆大每服五錢匕水一盞半煎至七分去滓溫服日三治傷寒煩躁身熱譫妄硝石丸方硝石半兩丹砂一分上二味細研糯米粥和丸如櫻桃大每服一丸生糯米汁入油一兩點化藥青柳枝打勻服治傷寒陰陽不順發躁悶亂氣虛嘔逆神應散方丹砂研石硫黃研各一錢土硝二錢蛤粉三錢半人參白茯苓去黑皮各一分上六味搗羅為散每服一錢匕用脂麻水調下不計時候服傷寒厥論曰傷寒病手足逆冷其名曰厥此因陽氣衰陰氣盛陰勝則陽脈逆而不通於四肢所以逆冷其證令人惡寒不飲水下利清穀或清便自調或小便數外證默靜是其候也宜溫之灸之若灸之而手足不溫者為難治然厥亦有熱者先發熱而後厥熱深厥亦深熱微厥亦微脈雖沉伏按之當滑若或畏熱或飲水或揚手擲足煩躁不得眠大便秘小便赤外證昏憒者雖厥不可溫也宜下之治傷寒手足厥逆微喘脈不出通脈四逆湯方附子炮裂去皮臍半兩乾薑炮裂一兩半人參一兩甘草一兩炙上四味各銼如麻豆每服五錢匕水一盞半煎至八分去滓溫服治傷寒手足厥寒脈細欲絕當歸四逆湯方當歸切焙桂去粗皮芍藥細辛去苗葉各一兩木通甘草炙各七錢上六味銼如麻豆每服五錢匕水一盞半棗二枚劈破煎至八分去滓溫服治傷寒下利清穀裡寒外熱汗出而厥腹痛兼嘔芍藥湯方芍藥一兩附子炮裂去皮臍三分人參甘草炙各半兩上四味銼如麻豆每服五錢匕水一盞半入生薑半分拍碎同煎至八分去滓溫服日晚再服治傷寒手足厥冷脈細欲絕者吳茱萸湯方吳茱萸湯淘三遍焙乾炒當歸切焙芍藥各一兩甘草炙三分乾薑炮裂半兩桂去粗皮一兩辛去苗葉三分上七味粗搗篩每服五錢匕水一盞酒半盞棗三枚劈破同煎至八分去滓溫服治傷寒手足厥冷汗出脈微白朮湯方白朮一兩人參三分桂去粗皮乾薑炮裂附子炮裂去皮臍各半兩甘草三分炙上六味銼如麻豆每服五錢匕水一盞半煎至一盞去滓溫服治傷寒四肢厥冷又下利惡寒附子湯方附子炮裂去皮臍半兩甘草炙乾薑炮裂芍藥各一兩上四味銼如麻豆每服五錢匕水一盞半煎至一盞去滓溫服治傷寒裡寒外熱手足多厥人參湯方人參白朮各一兩細辛去苗葉乾薑炮裂各三分甘草半兩炙上五味粗搗篩每服五錢匕水一盞半煎至一盞去滓食前溫服治傷寒四逆陽起石丸方陽起石太陰玄精石硝石附子炮裂去皮臍等分上四味搗研為細末湯浸蒸餅和丸如梧桐子大每服五丸至十丸新汲水下汗出解治傷寒手足厥冷脈沉細正陽丸方硫黃一兩硝石一兩太陰玄精石半兩上三味細研入瓷瓶子內瓦子塞口黃泥固濟陰乾以炭火一斤養令火盡放冷出藥研如粉酒煮麵糊和丸如梧桐子大每服十五丸至二十丸熱酒下不計時候治氣虛陽脫體冷無脈氣息欲絕不省人事及傷寒陰厥百藥不效者蔥熨法蔥一斤水洗淨上以麻縷纏如盞許大切去根及葉惟存白長二寸許如大餅餤先以火熁一面令通熱乃以熱處放在病人臍中連臍下其上以熨斗滿貯火熨之令蔥餅中熱氣入肌肉中須預作三四餅子一餅壞不可熨又易一餅良久病人當漸醒手足溫有汗更服四逆湯輩溫其內即瘥
