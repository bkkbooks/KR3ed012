body:
  text: 卷第一百四十四傷折門傷折統論論曰諸脈從肉諸筋從骨骨三百六十有五連續纏固手所以能攝足所以能步凡厥運動罔不順從若乃倉猝之際墜墮倒僕折傷蹉跌患生不測詎可殫舉究圖療治小則消腫而伸攣大則接筋而續骨各有方劑存焉從高墜下傷損腫痛論曰凡墜墮傷損腫痛輕者在外塗敷可已重者在內當導瘀血養肌肉宜察淺深以治之治墜墮損傷筋骨皮肉發熱疼痛沒藥散方沒藥研澤瀉當歸切焙桂去粗皮檳榔銼甘草炙銼白芷蜀椒去目並閉口者炒出汗附子炮裂去皮臍芎藭各一兩上一十味搗羅為散每服三錢匕溫酒調下不拘時治從高墜墮傷損筋骨發熱腫痛續斷散方續斷銼生乾地黃焙當歸切焙芎藭附子炮裂去皮臍桂去粗皮各一兩澤蘭葉蜀椒去目並閉口炒出汗甘草炙銼各半兩上九味搗羅為散每服三錢匕溫酒調下不拘時治從高墜墮傷損肢體發熱疼痛當歸湯方當歸切焙四兩大黃生銼二兩生乾地黃焙五兩上三味粗搗篩每服五錢匕水一盞半煎至七分去滓溫服不拘時微利為效治墜墮傷損煩悶荊芥湯方荊芥穗淡竹葉切當歸切焙各半兩上三味粗搗篩水一碗都煎取半碗去滓入地黃汁一盞再煎三五沸分溫三服連服治墜墮傷損氣血瘀滯疼痛阿膠湯方阿膠炙燥艾葉各二兩乾薑炮半兩芍藥一兩上四味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治從高墜墮傷折肢體瘀血不行發熱腫痛硝石湯方硝石研桃仁去皮尖雙仁研大黃生銼甘草炙銼各一兩蒲黃一兩半大棗去核十枚上六味粗搗篩每服三錢匕水一盞煎至七分去滓溫服利瘀血為效治從高墜墮傷折手足疼痛阿膠湯方阿膠炙燥芍藥各一兩半生乾地黃焙芎藭當歸切焙艾葉各一兩乾薑炮甘草炙銼各半兩上八味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治一切傷折及驢馬墜墮打撲閃肭疼痛不可忍者五傷接骨丸方沒藥研一兩乳香研分蜀椒去目閉口炒出汗芍藥芎藭當歸切焙各一兩自然銅煨醋淬七遍一兩半上七味搗研為末用黃蠟三兩半熔為汁次入藥末不住手攪令勻丸如彈子大每服一丸用好酒一盞煎藥化溫服就疼處臥少時治從高墜下傷折有瘀血不散脅肋疼痛牽子牛散方牽牛子生取末當歸切焙各一兩檳榔銼桂去粗皮木香炮各半兩郁李仁湯浸去皮細研青橘皮湯浸去白焙各一兩上七味搗羅為散和勻每服一錢匕溫酒調下空心服取下瘀血為效外以敗龜膏貼敗龜膏方敗龜醋浸炙二兩半大黃生銼一兩木鱉子去殼研二兩當歸切焙一兩桂去粗皮二兩上五味搗羅為末先用好酒一升煎至半升住火候酒稍冷入藥末半兩以匙不住手攪成膏紙上攤貼損處治驢傷馬墜及他物傷折痛楚不可忍當歸散方當歸切焙三分芎藭一兩半桂去粗皮半兩甘草炙銼三分附子炮裂去皮臍澤蘭葉蜀椒去目並閉口炒出汗各一分上七味搗羅為散每服二錢匕溫酒調下不拘時治墜墮撲損筋肉疼痛瘀血凝滯腫熱不消地黃糟裹方生地黃洗切細杵酒糟各一斤上二味拌和令勻隨腫處用藥遂旋以大碗盛甑上蒸熱用布絹之類裹腫處日一易治一切打撲驢傷馬墜脫臼損折兼定痛疼接骨膏方續斷一兩桂去粗皮附子炮裂去皮臍白芨白蘞當歸切焙桑根白皮銼獨活去蘆頭黑狗脊骨燒作灰用各半兩黃米炒三合上一十味搗羅為末或打撲閃肭及骨折碎用藥末三錢匕酒半盞白麵二錢匕生薑自然汁少許同以慢火熬成膏攤帛上貼之三日一換冬月用沙木篦子綿繩夾縛夏月柳枝子五條夾縛雖緊不妨治男子婦人內外損傷止諸疼痛接骨和血一切傷折毒蟲咬陰氣入腹消諸水腫血脈不通左右攤緩熱疾等欲死及腹中有瘀血刺兩脅痛氣築心悶亂婦人乳癰産後敗血灌注四肢積年痔瘻但是疼痛並宜服之極痛者只一丸輕可者只半丸用無灰酒半升乳香一皂子大先磨乳香盡次磨活血丸同入銚子內煎五六沸臨臥時溫服服了就痛處臥如要出汗衣被蓋之即汗出若婦人諸疾服時更用當歸末一錢匕依前法用乳香酒煎之此藥神驗不可言有孕婦人不可服活血丸方花桑枝於五月五日正南採南枝如臂膊粗可十枝以炭燒煙盡旋旋投入釅醋中取出焙乾為末雄黑豆淘浸去皮曝乾三升用袋子盛乳香半斤旋研入墨半斤旋研入生栗屑栗包中間一片子號曰栗屑雙者不用不拘多少去皮取肉曝乾用袋子盛每料用藥如後花桑枝末一兩半黑豆末一兩栗屑末一兩半墨末半兩乳香半兩上五味於五月五日合忌雞犬婦人見先研乳香以釅醋調與四味相和稀稠得所拌和成劑於淨臼中搗三五百杵可丸即丸如小彈子大焙乾以紗葛袋盛入瓷合內封夜間面北極燒香禱祝云若男若女諸疾服之病除悉愈本法合成輕干後水上浮為妙凡傷折已損猶有敗血宜服之服畢次服敗血散大黃以生薑自然汁二兩塗炙汁盡焙乾搗末一兩杏仁湯浸去皮尖雙仁研如面一兩上二味和勻分作八服每服用童子小便二盞煎三五沸臨臥時去滓溫服其敗血一時取下從大小腸中出續骨丸方臘月豬脂十兩蠟煉過半斤鉛丹重羅自然銅煅醋淬七遍研密陀僧研細各四兩白礬十二兩麒麟竭沒藥乳香丹砂各一兩研上一十味新鼎中先熔脂冷下蠟出鼎於冷處入密陀僧鉛丹自然銅緩火再煎滴入水中不散更出鼎於冷處下諸藥用柳篦攪勻瀉入瓷盆內不住手攪至凝丸如彈子大再用筍皮之類襯之極冷收貯凡折傷用一丸入少油火上化開塗傷痛處以油紙帛護之甚者以燈心裹木夾之更取一丸分作小丸熱蔥酒下痛即止如藥力盡再覺痛更一服痛止即已骨折者再上便安牙痛甚者貼之即止治傷折疼痛黃耆散方黃耆銼赤芍藥乾薑炮大黃銼附子炮裂去皮臍當歸切焙續斷桂去粗皮木通銼各二兩烏頭炮半兩蜀椒去目併合口炒出汗一分熟乾地黃焙一兩上一十二味搗羅為散每服二錢匕溫酒調下不拘時治傷折疼痛筋骨未合肌肉未生延胡索飲方延胡索鹿藥黃耆熟乾地黃各一兩半桂去粗皮當歸切焙白蘞桑寄生各一兩上八味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服不拘時傷折惡血不散論曰脈者血之腑血行脈中貫於肉理環周一身因其肌體外固經隧內通乃能流注不失其常若因傷折內動經絡血行之道不得宣通瘀積不散則為腫為痛治宜除去惡瘀使氣血流通則可以復完也治傷折惡血凝滯腫痛黃耆湯方黃耆芍藥生乾地黃焙附子炮裂去皮臍當歸切焙續斷桂去粗皮各半兩乾薑炮椒去目並閉口者炒出汗大黃生各一兩上一十味銼如麻豆每服三錢匕水一盞煎至七分去滓溫服不拘時候治傷折惡血瘀結不散芎藭湯方芎藭大黃生桂去粗皮庵䕡子朴硝各一兩荷葉十片燒灰上六味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時候治傷折血瘀不散虎杖散方虎杖銼二兩赤芍藥銼一兩上二味搗羅為散每服三錢匕溫酒調下不拘時候治傷折瘀血留結不散腫痛桃仁散方桃仁去皮尖雙仁炒別研大黃生芒硝別研各一兩桂去粗皮當歸切焙各三分甘草炙銼半兩虻蟲去翅足炒水蛭炒各十枚上八味搗羅為散每服二錢匕溫酒調下不拘時候治傷折惡血不散腫痛不消芍藥湯方赤芍藥黃耆附子炮裂去皮臍當歸切焙續斷桂去粗皮羌活去蘆頭蜀椒去目並閉口者炒出汗各一兩上八味銼如麻豆大每服三錢匕水一盞煎至七分去滓溫服不拘時候治傷折血瘀不散大黃湯方大黃生桂去粗皮桃仁去皮尖雙仁炒各半兩上三味粗搗篩每服三錢匕水一盞煎至七分去滓溫服治傷折惡血瘀滯腫痛塗敷方生地黃切研藏瓜姜糟生薑洗研各一斤上三味和研隨所患處多少旋抄塗敷日三易治傷折惡血不散蠶沙膏方原蠶沙二升炒研麥麩三升上二味和勻米醋四升煮稠瓷器盛量損處多少塗敷以絹帛裹之日再易治傷折惡血不散疼痛糟米塗方酒糟二斤糯米半升上二味相和酒煮稀稠得所取出乘溫塗患處外封裹之日再易治傷折惡血結滯不散腫痛草烏頭膏方草烏頭細辛去苗葉蛇床子獨活去蘆頭吳茱萸各半兩蔥切研二十莖生薑切研四兩上七味除薑蔥別研外搗羅為末和勻再研量患處多少熱酒調為膏塗之以帛裹日再易治傷折惡血不散煨蔥方蔥青白俱用去根不切三十莖上一味灰火中煨透衆手乘熱木椎椎碎裹患處以軟帛縛之冷即易治傷折惡血結滯腫痛地黃膏方生地黃細切三斤烏雞一隻去毛腸肚並足和骨細銼上二味相和搗一二千杵量患處多少攤帛上縛之日再易治傷折惡血瘀滯不散外塗膏方鼠屎三兩燒存性生地黃半斤切焙上二味搗羅為末豬脂油和塗患處日三易治傷損腹內瘀血不散不欲聞人聲胸中氣塞便利出血等蒲黃散方蒲黃一合當歸切焙桂去粗皮續斷白芷各一兩甘草炙銼半兩生乾地黃焙二兩上七味搗羅為散空心溫酒調服一錢匕日再服治一切墜落打撲及腫毒疼痛白膏方柳白皮切半兩白蠟四錢鉛丹二錢胡粉三兩油四兩商陸根切三分上六味先以熟油入柳白皮商陸根煎候變色去滓入諸藥數攪良久膏成每用看腫大小以故帛或軟紙攤貼筋骨傷折疼痛論曰人之一身血榮氣衛循環無窮或筋肉骨節誤致傷折則血氣瘀滯疼痛倉猝之間失於調理所傷不得完所折不得續輕者肌膚焮腫重者髀臼挫脫治法宜先整其骨裨其所折後施貼燲封裹之劑治筋骨損傷疼痛麒麟竭散方麒麟竭沒藥研自然銅煅醋淬七遍研赤芍藥當歸切焙白芷蒲黃大黃生用各半兩桂去粗皮細辛去苗葉各一兩骨碎補去毛炒二兩乾荷葉三分上一十二味搗研為散每服二錢匕溫酒調下不拘時治傷折定痛敗龜散方敗龜酥炙去裙襴一兩沒藥研桂去粗皮自然銅煅醋淬七遍研骨碎補去毛炒當歸切焙白芷防風去叉各半兩上八味搗研為散每服二錢匕溫酒調下不拘時日二治傷折腫痛氣血不散芎藭散方芎藭甘草炙銼蜀椒去目及閉口者炒出汗澤蘭附子炮裂去皮臍桂去粗皮各一兩當歸切焙大黃醋炒各半兩上八味搗羅為散每服二錢匕溫酒調下不拘時治閃肭打撲傷損疼痛不可忍附子散方附子炮裂去皮臍敗龜醋炙去裙襴虎腦骨醋炙栗楔千金藤銼炒補骨脂白芷骨碎補去毛炒自然銅煅三遍醋淬研續斷赤芍藥當歸切米炒桂去粗皮牛膝酒浸一宿焙烏藥各半兩沒藥研乳香研各一分上一十七味搗研為細散每服二錢匕蘇枋木酒調下日進三五服治傷折筋骨接骨散方自然銅一兩火燒三度醋淬研木炭半斤火燒醋蘸二度白絲三兩燒灰上三味搗研為細散每服一錢匕煎蘇木酒調下病甚損傷折骨者服訖綿衣包裹了次服沒藥丸沒藥丸方沒藥研丹砂研牛膝酒浸焙搗羅為末各一兩上三味研勻麵糊為丸如梧桐子大每服二十丸木瓜湯下日一服午間服之服五日後漸減丸數治傷折筋骨痛沒藥散方沒藥研虎骨酒浸炙當歸切炒白芷補骨脂敗龜酒炙各半兩自然銅火燒醋淬七遍研騏驎竭研各一分炭內實者火燒一次酒淬取三分上九味搗為細散每服一錢匕溫酒調下不計時治打撲傷折筋骨損痛牛膝散方牛膝去苗酒浸一宿烘四兩黃耆續斷當歸切焙各一兩滴乳香別研沒藥別研琥珀各半兩上七味搗研為細末用黃米粥微熱攤紙上將藥末兩匙摻在粥上裹之已減痛更將此藥每服溫酒調下一錢匕日三五服治傷折筋骨五仙丸方自然銅四兩火燒醋淬二七遍大栗一百枚去皮生用黑豆一升湯浸去皮白桑柴灰二升接骨木灰一升上五味一處大臼內