body:
  text: 卷第一十九諸痹門諸痹統論論曰飲天和食地德皆陰陽也然陽為氣陰為血氣為衛血為營氣衛血營通貫一身周而復會如環無端豈鬱閉而不流哉夫惟動靜居處失其常邪氣乘間曾不知覺此風寒濕三氣所以雜至合而為痹淺則客於肌膚深則留於骨髓陽多者行流散徙而靡常陰多者凝泣滯礙而有著雖異狀殊態然即三氣以求之則所謂痹者可得而察矣且痹害於身其為疾也初若無足治至其蔓而難圖則偏廢弗舉四體不隨皆自詒伊戚者也可不慎哉肝痹論曰內經謂風寒濕三氣雜至合而為痹又曰以春遇此者為筋痹又曰筋痹不已復感於邪內舍於肝蓋五臟皆有合病久而不去者內舍於其合肝之合筋也故筋痹不已復感於邪則舍於肝也其證夜臥則驚多飲小便數上為引如懷者是也治肝痹筋脈不利拘攣急痛夜臥多驚上氣煩滿薏苡仁湯方薏苡仁羌活去蘆頭蔓荊實荊芥穗各二兩白朮木瓜去核防風去叉牛膝酒浸切焙甘草炙各一兩上九味銼如麻豆每服五錢匕水一盞半入生薑五片煎至一盞去滓稍熱服治肝痹氣逆胸脅引痛眠臥多驚筋脈攣急鎮肝去邪人參散方人參二兩酸棗仁微炒杜仲去皮銼微炒黃耆蜜炙銼茯神去木各一兩五味子熟乾地黃芎藭細辛去苗葉秦艽去苗土羌活去蘆頭丹砂飛研各半兩上一十二味除丹砂外同搗羅為散入丹砂研勻每服一錢匕溫酒調下不拘時候日三治肝痹緩筋脈去邪毒調營衛萆薢丸方萆薢羌活去蘆頭天麻酒浸一宿切焙各一兩附子炮裂去皮臍半兩沒藥研乳香研各一分上六味將四味搗羅為末入沒藥乳香同研勻煉蜜和丸如彈丸大每服一丸空心溫酒化下日再治肝痹兩脅下滿筋急不得太息疝瘕四逆搶心腹痛目不明補肝湯方白茯苓去黑皮一兩二錢烏頭四枚炮裂去皮臍薏苡仁獨活各一兩附子二枚炮裂去皮臍柏子仁研防風去叉細辛去苗葉各二兩山茱萸桂去粗皮各三分炙銼半兩上一十一味銼如麻豆入研藥拌勻每服五錢匕水一盞半大棗二枚劈開同煎數沸去滓取一盞服不計時候治肝虛氣痹兩脅脹滿筋脈拘急不得喘息四肢少力眼目不明細辛湯方細辛去苗葉防風去叉白茯苓去黑皮柏子仁研桃仁湯浸去皮尖雙仁麩炒微黃山茱萸甘草炙銼各三分蔓荊實枳殼去瓤麩炒各半兩木瓜去核萆薢五加皮各一兩上一十二味銼如麻豆每服三錢匕水一盞大棗三枚劈破同煎數沸去滓取七分溫服不計時候治肝痹頭目昏塞四肢不利胸膈虛煩防風湯方防風去叉一兩芎藭黃耆銼五味子人參茯神去木獨活去蘆頭羚羊角鎊屑前胡去蘆頭各三分細辛去苗葉酸棗仁微炒甘草炙各半兩上一十二味粗搗篩每服三錢匕水一盞大棗三枚劈破同煎取七分去滓溫服不計時候治肝痹筋攣肢體不隨牛膝湯方牛膝銼焙防風去叉丹參前胡去蘆頭各二兩石斛去根二兩半杜仲去粗皮塗酥炙銼秦艽去苗土續斷各一兩半陳橘皮湯去白焙一兩大麻仁研一合上一十味除大麻仁外粗搗篩每服五錢匕水一盞半煎五七沸別下麻仁少許煎至一盞去滓空腹服日二治肝痹多驚悸神思不安茯神散方茯神去木酸棗仁微炒黃耆銼人參各一兩熟乾地黃焙遠志去心五味子各半兩白茯苓去黑皮一兩丹砂別研半兩上九味除丹砂外搗羅為散入丹砂末再研勻每服一錢匕以溫酒調下不計時候心痹論曰內經言風寒濕三氣雜至合而為痹又曰以夏遇此為脈痹脈痹不已復感於邪內舍於心是為心痹其狀脈不通煩則心下鼓曝上氣而喘嗌乾善噫厥氣上則恐蓋淫氣憂思痹聚在心經所謂諸痹不已亦益內者如此治心痹神思昏塞四肢不利胸中煩悶時復恐悸茯神湯方茯神去木羌活去蘆頭龍齒麥門冬去心焙麻黃去根節各一兩蔓荊實人參薏苡仁防風去叉遠志去心犀角屑各三分赤芍藥甘草微炙各半兩上一十三味粗搗篩每服三錢匕水一盞生薑五片同煎至七分去滓溫服不計時候治心痹胸中滿塞心中微痛煩悶不能食赤茯苓湯方赤茯苓去黑皮人參半夏湯浸洗七遍去滑焙柴胡去苗前胡去蘆頭桂去粗皮桃仁湯浸去皮尖雙仁炒各三分甘草微炙一分上八味粗搗篩每服三錢匕水一盞生薑五片棗二枚劈破同煎至七分去滓熱服不計時候治心痹邪氣乘虛恍惚不樂身體強直面目變色秦艽湯方秦艽去苗土菖蒲桂去粗皮當歸切焙蔓荊實人參附子炮裂去皮臍黃芩去黑心甘草炙遠志去心防風去叉各半兩龍骨赤石脂白茯苓去黑皮白芍藥芎藭防己各三分上一十七味銼如麻豆每服三錢匕水一盞同煎至七分去滓溫服不計時候治心痹憂思恍惚惕惕然驚畏紫石英散方紫石英別研細水飛過一兩遠志去心赤小豆炒附子炮裂去皮臍桂去粗皮人參乾薑炮裂防風去叉龍骨別研菖蒲熟乾地黃焙各半兩白茯苓去黑皮白朮黃耆銼各一兩上一十四味除別研外搗羅為散同拌勻再研細每服食前溫酒調下二錢匕治心痹精神恍惚恐畏悶亂不得睡臥志氣不定言語錯誤犀角散方犀角屑牛黃別研麝香別研羚羊角屑各一分丹砂別研半兩防風天麻獨活去蘆頭人參茯神去木沙參去蘆頭天竺黃別研升麻龍齒各一分麥門冬去心焙半兩白蘚皮一分遠志去心一分龍腦別研半分甘草微炙一分上一十九味除別研者外搗羅為散同研藥一處拌勻再研細每服三錢匕煎麥門冬湯調下不計時候脾痹論曰風寒濕三氣雜至合而為痹又曰以至陰遇此者為肌痹肌痹不已復感於邪內舍於脾是為脾痹其狀四肢懈惰發咳嘔汁上為大塞經所謂諸痹不已亦益內者如此治脾痹肌肉消瘦心腹脹滿水穀不化食即欲嘔飲食無味四肢怠惰或時自利黃耆丸方黃耆銼石斛去根附子炮裂去皮臍肉蓯蓉酒浸切焙益智去皮白朮人參各一兩桂去粗皮厚朴去粗皮生薑汁炙各一兩半訶梨勒煨去核二兩五味子當歸切焙白豆蔻去皮沉香銼高良薑枳實去瓤麩炒各三分吳茱萸湯浸焙炒丁香各半兩上一十八味為細末煮棗肉和搗五百杵丸如梧桐子大每服三十丸食前溫酒下治脾痹心腹脹滿不欲飲食食則氣滯體重四肢無力白朮湯方白朮人參蓽澄茄各一兩訶梨勒煨去核二兩丁香草豆蔻去皮黃耆附子炮裂去皮臍白茯苓麥糵微炒沉香陳橘皮湯浸去白焙木香各三分枳實去瓤麩炒甘草炙各半兩上一十五味銼如麻豆每服三錢匕水一盞生薑五片棗二枚劈破煎至七分去滓溫服不拘時治脾痹肉極虛寒體重怠惰四肢不欲舉動關節疼痛不嗜飲食黃耆酒方黃耆桂去粗皮巴戟天去心石斛去根澤瀉白茯苓去黑皮柏子仁乾薑炮蜀椒去目並閉口炒出汗各三兩防風去叉獨活去蘆頭人參各二兩天雄炮裂去皮臍芍藥附子炮裂去皮臍烏頭炮裂去皮臍茵芋半夏湯洗七遍去滑細辛去苗葉白朮黃芩去黑心栝蔞根山茱萸各一兩上二十三味㕮咀絹袋盛以清酒三斗漬之秋冬七日春夏三日初服三合漸加之以微麻木為效日再治脾痹四肢怠惰發咳大半夏湯方半夏為末生薑汁和作餅曝乾五兩白朮白茯苓去黑皮人參甘草炙附子炮裂去皮臍陳橘皮湯浸去白焙各二兩桂去粗皮三兩上八味銼如麻豆每服五錢匕水一盞半生薑五片煎至一盞去滓溫服日三治脾痹四肢懈惰肉極肌熱麻黃湯方麻黃去根節枳實去瓤麩炒防風去叉白朮細辛去苗葉各三兩石膏碎八兩附子炮裂去皮臍四兩甘草炙桂去粗皮各二兩上九味銼如麻豆每服五錢匕水一盞半生薑五片煎至一盞去滓溫服日三治脾痹四肢懈惰皮膚不通外不得泄風引湯方獨活去蘆頭四兩當歸切焙白茯苓去黑皮各三兩乾薑炮甘草炙人參黃耆防風去叉各二兩桂去粗皮附子炮裂去皮臍各一兩大豆二升熬去皮上一十一味銼如麻豆每服五錢匕水一盞酒半盞煎至一盞去滓溫服日三夜一治脾痹發咳嘔汁溫中法曲丸方法曲炒吳茱萸湯浸焙炒小麥糵微炒各五合枳實去瓤麩炒甘草炙桂去粗皮厚朴去粗皮生薑汁炙當歸切焙白茯苓去黑皮各三兩細辛去苗葉乾薑炮麥門冬去心焙人參桔梗炒附子炮裂去皮臍各一兩上一十五味為細末煉蜜丸如梧桐子大每服七丸食前熟水下日三肺痹論曰風寒濕三氣雜至合而為痹以秋遇此者為皮痹皮痹不已復感於邪內舍於肺是為肺痹其候胸背痛甚上氣煩滿喘而嘔是也治肺痹上下痞塞不能息橘皮丸方陳橘皮湯浸去白焙桔梗銼炒乾薑炮裂厚朴去粗皮生薑汁炙枳實去瓤麩炒細辛去苗葉各三分胡椒蜀椒去閉口及目炒出汗烏頭炮裂去皮尖各二兩蓽茇二兩半人參桂去粗皮附子炮裂去皮臍白茯苓去黑皮前胡去蘆頭防葵芎藭各一兩甘草炙當歸切焙各二兩白朮吳茱萸湯洗焙乾炒各一兩半大黃濕紙裹煨香熟半兩檳榔銼一兩葶藶隔紙炒一分紫蘇子炒二兩上二十五味搗羅為末煉蜜丸梧桐子大每服十丸溫酒下日三覺有熱者空腹服之治肺痹復感風冷胸脅滿急杏仁丸方杏仁湯浸去皮尖雙仁微炒赤茯苓去黑皮防葵各二兩吳茱萸湯洗焙乾炒陳橘皮湯浸去白焙桂去粗皮防風去叉澤瀉各一兩白朮射干芍藥紫蘇子微炒桔梗銼炒枳實去瓤麩炒微黃各一兩半上一十四味搗羅為末煉蜜丸如梧桐子大每服十丸食前溫酒下漸加至三十丸日再治肺痹上氣閉塞胸中脅下支滿乍作乍止不得飲食唇乾口燥手足冷痛當歸湯方當歸切焙防風去叉黃耆細銼各二兩柴胡去苗八兩細辛去苗葉麻黃去根節煮一二沸掠去沫控干人參各一兩杏仁去皮尖雙仁炒黃五十枚桂去粗皮三兩半夏湯浸去滑七遍五兩黃芩去黑心一兩上一十一味粗搗篩每服四錢匕水一盞入生薑七片棗二枚劈破同煎至六分去滓溫服不計時候日三夜二治肺痹上氣發咳五味子湯方五味子三兩紫蘇子炒八兩麻黃去根節細辛去苗葉紫菀去苗土黃芩去黑心甘草炙各二兩人參桂去粗皮當歸焙各一兩半夏湯洗去滑七遍三兩上一十一味粗搗篩每服四錢匕水一盞入生薑五片同煎至六分去滓溫服不計時候上氣病亦單煮紫蘇子及生紫蘇葉冬月煮乾枝莖葉服治肺痹胸心滿塞上氣不下紫蘇子湯方紫蘇子炒八兩半夏湯洗去滑七遍五兩陳橘皮湯浸去白焙桂去粗皮各三兩甘草炙人參白朮各二兩上七味粗搗篩每服四錢匕水一盞入生薑五片棗二枚劈同煎至六分去滓溫服不計時候腎痹論曰內經謂風寒濕三氣雜至合而為痹又曰以冬遇此者為骨痹骨痹不已復感於邪內舍於腎是為腎痹其證善脹尻以代踵脊以代頭蓋腎者胃之關關門不利則胃氣不行所以善脹筋骨拘迫故其下攣急其上蜷屈所以言代踵代頭也治腎臟虛乏久感寒濕因而成痹補損益氣遠志丸方遠志去心山芋肉蓯蓉去皴皮酒浸切焙牛膝去苗酒浸切焙各一兩石斛去根天雄炮裂去皮臍巴戟天去心人參山茱萸澤瀉菟絲子酒浸一宿別搗茯神去木覆盆子續斷生乾地黃焙桂去粗皮鹿茸酒炙去毛甘草炙銼附子炮裂去皮臍牡丹皮白茯苓去黑皮五味子杜仲去粗皮炙銼各一分蛇床子楮實微炒黃耆各一兩上二十六味搗羅為末煉蜜和搗數百下丸如梧桐子大每服空心溫酒下二十丸加至三十丸治腎臟虛冷邪氣乘虛身體冷痹不仁手足牽強舉動艱難或肌肉瞤動引腰脊及左右偏急不能飲食或因房室發動防風丸方防風去叉白茯苓去黑皮細辛去苗葉白朮附子炮裂去皮臍桂去粗皮澤瀉各半兩甘草炙銼紫菀去苗芍藥牛膝去苗酒浸切焙栝蔞根各三分山茱萸熟乾地黃焙半夏湯洗七遍去滑焙獨活去蘆頭山