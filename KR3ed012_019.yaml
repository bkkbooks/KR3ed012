如賊風所中黃耆湯方黃耆銼芍藥各一兩桂去粗皮三分上三味粗搗篩每服五錢匕以水一盞半棗二枚劈破生薑一棗大拍碎同煎至八分去滓溫服早晨午間近晚各一服治血痹及諸痹甚者四肢不隨黃耆酒方黃耆獨活去蘆頭防風去叉甘草炙蜀椒去目並閉口者炒出汗附子炮裂去皮臍白朮牛膝芎藭細辛去苗葉各三兩乾薑炮三兩半當歸切焙桂去粗皮各二兩半葛根秦艽去苗土烏頭炮裂去皮臍山茱萸各二兩大黃一兩生銼上一十八味銼如麻豆用夾絹囊盛貯以清酒一斗浸之春夏五日秋冬七日初服一合日再夜一漸增之以知為度虛弱者加蓯蓉二兩下利者加女萎三兩心下有水加茯苓二兩一方加石斛菖蒲各二兩治血痹及五臟六腑皮膚骨髓肌肉筋脈等疾不問新久萆薢酒方萆薢防風去叉菟絲子杜仲去粗皮銼炒黃耆菊花天雄炮裂去皮臍石斛去根生乾地黃焙地骨皮續斷金牙煅醋淬石南肉蓯蓉酒浸切焙蜀椒去目及閉口者炒出汗各一兩上一十五味㕮咀如麻豆夾絹囊盛貯以無灰酒五升浸二七日每日任性服候減一升即旋添酒一升藥力薄即別制年老者亦可服治風血痹肌體手足痿弱四肢拘攣茵芋酒方茵芋去粗莖附子炮裂去皮臍天雄炮裂去皮臍烏頭炮裂去皮臍秦艽去苗土女萎防風去叉羊躑躅防己石南細辛去苗葉桂去粗皮各一兩上一十二味㕮咀如麻豆夾絹囊盛貯以清酒五升浸之冬七日夏三日春秋五日初服一合日三漸增之治風邪遊走無定處名曰血痹萆薢丸方萆薢銼炒令黃山芋牛膝切焙澤瀉各一兩白朮三分地膚子半兩山茱萸炒一兩一分狗脊細銼去毛三分茵芋用葉炙過一分熟乾地黃焙二兩半上一十味搗羅為末煉蜜和丸如梧桐子大每服十丸溫酒下不拘時稍加至十五丸豚痹論曰血性得溫則宣流得寒則凝澀凝澀不行則皮毛萎悴肌肉𤸷痹內經謂風寒濕三氣雜至合而為痹又曰夏遇此者為脈痹痹則血凝不流可知也治脈痹血道壅澀導痹湯方黃耆銼四兩當歸切焙人參白茯苓去黑皮龍齒遠志去心甘草炙各三兩桂去粗皮半夏湯浸洗七遍焙各五兩枳實去瓤麩炒桔梗去蘆頭銼炒茯神去木各二兩上一十二味粗搗篩每服先以水二盞煮粳米半合米熟去米即入藥五錢匕生薑五片大棗二枚劈破同煎數沸去滓取一盞溫服不計時候治脈痹通行血脈人參丸方人參麥門冬去心焙茯神去木龍齒遠志去心黃耆銼菖蒲赤石脂各一兩熟乾地黃焙二兩上九味搗羅為末煉蜜和搗三二百杵丸如梧桐子大每服食後良久以清粥飲下三十丸治脈痹身體不仁黃耆湯方黃耆銼芍藥桂去粗皮各三兩當歸切焙白茯苓去黑皮菖蒲人參各二兩上七味粗搗篩每服五錢匕水一盞半生薑五片大棗二枚劈破同煎去滓取一盞溫服不計時治脈痹面顏脫色脈空虛口唇色赤乾燥消痹蠲熱潤悅顏色升麻湯方升麻射干芎藭人參各三兩赤小豆五合生薑二兩半麥門冬去心焙葳蕤各四兩生地黃二兩半甘草炙二兩竹葉切一升上一十一味銼如麻豆每服五錢匕水一盞半煎至一盞去滓溫服不計時日三治風濕脈痹皮膚不仁防風湯方防風去叉當歸切焙秦艽去苗土赤茯苓去黑皮茵芋去粗莖甘炙杏仁去皮尖雙仁麩炒桂去粗皮獨活去蘆頭各一兩上九味粗搗篩每服五錢匕以酒水各半盞入生薑半分切煎取八分去滓溫服不拘時候治脈痹營衛不通四肢疼痹芍藥湯方芍藥熟乾地黃焙當歸切焙各二兩防風去叉秦艽去苗土羌活去蘆頭防己芎藭白朮各一兩桂去粗皮甘草炙各三分上一十一味粗搗篩每服五錢匕以水一盞半煎至八分去滓溫服日二服
