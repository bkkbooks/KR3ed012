body:
  text: 卷第二十八傷寒發黃論曰傷寒發黃之狀身體盡變或如熏黃或如橘色是也凡陽明中風太陽中濕皆令人發黃蓋由得病無汗小便不利寒濕不散則熱結脾胃腠理閉塞瘀熱之氣與宿谷相搏而鬱蒸不能消散故大小便結澀不通令人身體面目皆變黃色其病腹滿一身盡疼發熱若其人小腹滿急眼澀疼鼻骨痛兩膊及項強腰背急者是也但得小便快利即漸愈仍不用大便多多即令人心脹又有急黃者身體黃甚猝然而發心滿氣喘命在須臾故名急黃有初得病便黃者或初不知是黃死後方變黃者此病亦因脾胃瘀熱本天行時氣所作也宜細辨之但發熱心戰者乃是急黃之候治陽明病發熱汗出此為熱越不得發黃也但頭汗出小便不利渴引水漿者此為瘀熱在裡身必發黃下之宜茵陳蒿湯又傷寒七八日身黃如橘皮小便不利腹微滿者宜茵陳蒿湯方茵陳蒿六兩梔子十四個大黃生三兩上三味㕮咀如麻豆大每服五錢匕水二盞煎取一盞去滓分溫三服後小便當利如皂莢汁者其黃乃愈治傷寒瘀熱在裡身必發黃麻黃連翹湯方麻黃根節湯煎沫二兩連翹二兩杏仁皮尖雙四十枚棗十二枚生梓白皮切一升生薑二兩甘草一兩上七味㕮咀如麻豆大每服五錢匕用潦水二盞煎取一盞去滓溫服不拘時治傷寒身黃髮熱梔子柏皮湯方梔子十五個黃柏去粗皮炙二兩甘草炙一兩上三味㕮咀如麻豆大每服三錢匕水一盞半煎取一盞去滓溫服治太陽病身黃脈沉結小腹硬小便利者為無血也小便自利其人如狂者血證諦也宜服抵當湯方水蛭三十枚炒虻蟲三十枚炒桃仁去皮尖雙仁炒一十枚大黃三兩上四味㕮咀如麻豆大每服三錢匕水一盞半煎至七分去滓溫服治傷寒瘀熱在內濕氣鬱而不散熏發肌肉小便不利身體發黃利水道消濕散方牽牛子炒半斤只取末二兩赤茯苓去黑皮木香陳橘皮湯浸去白焙各半兩上四味為散每服二錢匕煎蔥白湯調下不計時候治傷寒心胸堅硬腳手心熱即變為黃秦艽湯方秦艽去苗土紫草去苗土白蘚皮黃芩去黑心梔子仁大黃銼炒各一兩上六味粗搗篩每服五錢匕用水一盞半煎至一盞去滓溫服日三夜一治傷寒發黃服藥瘥後未全除餘熱發動三黃散方大黃銼炒黃芩去黑心黃連去須梔子仁苦參各一兩上五味搗羅為細散每服用米飲調下二錢匕日三服治傷寒發黃煩熱皮肉皆黃小便赤不利龍膽湯方龍膽枳殼去瓤麩炒柴胡去苗梔子仁知母切焙地骨皮木通銼芍藥甘草炙羚羊角鎊麥門冬去心焙升麻各半兩上一十二味粗搗篩每服五錢匕用水一盞半煎至一盞去滓不拘時溫服治傷寒發黃或先服利藥未瘥者宜以內消湯以折熱氣黃芩湯方黃芩去黑心茵陳蒿升麻各一兩梔子仁柴胡去苗龍膽各半兩犀角鎊一兩上七味粗搗羅每服五錢匕用水一盞半煎至一盞去滓入生地黃汁一合攪令勻不拘時溫服治傷寒發黃面目悉黃小便赤宜服茵陳蒿大黃湯方茵陳蒿梔子仁柴胡去苗柏皮蜜炙各半兩黃芩去黑心升麻大黃銼炒各一兩龍膽半兩上八味粗搗篩每服五錢匕用水一盞半煎至一盞去滓早晚食後溫服治傷寒發黃通身如金色者茅根湯方茅根洗銼梔子仁茵陳蒿地骨皮甘草炙各半兩上五味粗搗篩每服五錢匕用水一盞半生薑三片豉三七粒同煎至一盞去滓早晚食後溫服治傷寒發黃壯熱骨節煩疼兩脅下氣脹急硬痛不能食宜服柴胡枳殼湯方柴胡去苗枳殼去瓤麩炒黃芩去黑心梔子仁茵陳蒿龍膽大黃銼炒甘草炙各半兩上八味粗搗篩每服五錢匕用水一盞半煎至一盞去滓早晚食晚溫服治傷寒熱毒熾盛熏炙三焦攻擊皮膚通身發黃茵陳蒿黃芩湯方茵陳蒿黃芩去黑心梔子仁升麻秦艽去苗土牡丹皮荊芥穗麻黃去根節細辛去苗葉石膏碎知母焙各半兩黃連去須大黃銼炒各一分上一十三味粗搗篩每服三錢匕水一盞煎至七分去滓食後臨臥溫服治傷寒時氣發黃葶藶丸方甜葶藶隔紙炒一分大黃銼炒半兩人參一兩上三味搗羅為末煉蜜和丸如梧桐子大每服溫水下二十丸以利為度治傷寒熱毒所加猝然心中滿氣喘急發熱心戰急黃丸方大黃半兩生銼朴硝一分別研上二味用水二大盞漬大黃一宿次旦煎至一盞去滓下朴硝攪令勻不計時候溫分三服快利即瘥治傷寒急黃梔子仁湯方梔子仁柴胡去苗朴硝別研茵陳蒿各半兩上四味除朴硝外各細銼用水三大盞煎二大盞去滓下朴硝攪令勻不拘時候分溫三服取利為度治時氣急黃疼痛茵陳蒿散方茵陳蒿黃芩去黑心梔子仁大青各一兩大黃銼朴硝各五兩白蘚皮葛根銼升麻各一兩半上九味搗羅為散每服二錢匕新汲水調下得利即瘥治時氣面黃腹堅氣急言語錯亂茵陳黃芩湯方茵陳蒿大黃蒸過生麥門冬去心梔子仁各四兩青黛升麻各三分黃芩去黑心二兩上七味㕮咀如麻豆大每服五錢匕水一盞半煎至八分去滓下芒硝末半錢匕更煎一二沸溫服傷寒發豌豆瘡論曰凡傷寒熱毒內盛多發疱瘡者以病人裡實表虛故也裡實則毒氣不能內消表虛故乘虛發於肌肉而成瘡也其瘡大小形如豌豆其色或白或赤若頭作瘭漿戴白膿者其毒則輕若紫黑色作根隱隱在肌肉裡者其毒則重甚者周匝遍身五臟七竅皆有也治傷寒天行壯熱頭痛發瘡如豌豆石膏湯方石膏碎二兩柴胡去苗虎杖各一兩知母焙半兩芍藥一兩山梔子仁三分上六味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服治傷寒熱病生豌豆瘡並疱瘡煩悶昏迷參麻湯方玄參一兩升麻三分犀角鎊半兩干藍葉一兩甘草炙銼三分上五味粗搗篩每服五錢匕水一盞半入蔥白三寸豉一百粒同煎至一盞去滓溫服日二治傷寒天行熱病毒氣盛生豌豆並疱瘡煩躁迷悶二黃湯方大黃銼炒半兩黃芩去黑心麥門冬去心焙芍藥各一兩甘草炙銼三分大青半兩上六味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服治傷寒發豌豆瘡四邊赤腫胡荽湯方胡荽一握生地黃一兩上二味細切搗絞取汁空心頓服一盞許治傷寒熱盛發豌豆瘡升麻湯方升麻半兩大黃銼炒一兩黃連去須甘草炙銼各三分山梔子仁一兩上五味粗搗篩每服三錢匕水一盞煎至七分去滓溫服日二治傷寒熱病發豌豆瘡未成膿者黃連湯方黃連去須一兩半上一味細銼水一盞煎至七分去滓食後溫服治傷寒熱毒氣盛發瘡如豌豆犀角湯方犀角鎊二兩麻黃去根節黃連去須各一兩半木香一兩上四味粗搗篩每服五錢匕水一盞半煎至八分去滓溫服治傷寒天行壯熱頭痛發瘡如豌豆遍身大青湯方大青一兩山梔子仁犀角鎊各半兩上三味粗搗篩每服三錢匕水一盞入豉一百粒煎至七分去滓溫服治傷寒熱毒發瘡如豌豆牡丹湯方牡丹皮山梔子仁黃芩去黑心大黃銼炒木香麻黃去根節上六味等分銼如麻豆大每服三錢匕水一盞煎至七分去滓溫服治傷寒發斑豆瘡欲出化毒湯方甘草微炙一兩黃連去須微炒一分上二味銼如麻豆大每服五錢匕水一盞半煎至八分去滓溫服不計時候治傷寒時行熱毒發瘡頭面及身須臾周匝狀如火瘡皆帶瘭漿隨沒隨生方葵菜煮爛蒜齏各不以多少上二味拌勻初患急食之不早治殺人既瘥後瘡瘢色黑彌歲方滅此是惡毒時氣也治傷寒熱病欲生豌豆瘡毒未出令不成內消散方墨燒去煙一分上一味用酒三合磨令盡頓飲之治傷寒熱病生疱瘡煩躁迷悶紫草飲方紫草並根細銼二兩上一味粗搗篩每服三錢匕水一盞煎至七分去滓不計時候溫服治傷寒時氣發瘡如豌豆煩悶竹葉湯方苦竹葉切小麥各二兩石膏碎二兩上三味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服不計時候治傷寒時疾發豌豆瘡及赤瘡子未透心煩狂躁氣喘妄語或見神鬼龍腦丸方龍腦一錢上一味細研旋滴豬心血和丸如雞頭實大每服一丸紫草湯化下治傷寒熱病初出豌豆瘡三五個便服此令瘡不出黑散子方臘月豬糞不拘多少上一味以新砂瓶子盛瓦蓋口炭燒令通赤取出安地上出火毒入乳鉢研細每服空心新汲水調下二錢匕又方青黛一分上一味研細每服新汲水調下一錢匕不拘時候治傷寒發斑疹豆瘡紫方紫草荊芥穗惡實等分上三味粗搗篩每服三錢匕水一盞煎至七分去滓溫服傷寒發狂論曰重陽者狂謂陽氣獨盛也傷寒熱毒既盛內外皆熱則陽氣憤嗔而發為狂越其病使人狂走妄言或罵詈不避親疏或妄見妄聞甚則至於棄衣而走登高而歌或數日不食逾垣上屋者蓋四肢諸陽之本也熱盛而四肢實是為重陽故所上之處皆非素所能而病乃能也若乃因火為邪而發為驚狂及內有瘀血外證如狂其為病雖不同然其為陽氣有餘則一也治傷寒欲發狂解毒止躁苦參散方苦參一兩黃芩去黑心二兩甘草炙半兩上三味搗為粗末每服三錢匕水一盞煎至七分去滓入生地黃汁約半合攪勻去滓溫服不計時候治傷寒熱結在內心神恍惚狂妄大黃湯方大黃銼炒芒硝各一兩半桂去粗皮三分大腹皮銼甘草炙銼木通銼各一兩桃仁二十一枚去皮尖雙仁麩炒上七味粗搗篩每服四錢匕水一盞煎至六分去滓溫服不計時候以通利為度治傷寒九日至十日頭戰掉大汗出恍惚狂走眼見神鬼犀角湯方犀角屑半兩茵陳蒿三分茯神去木芍藥麥門冬去心焙生乾地黃焙各一兩半梔子仁半兩上七味粗搗篩每服五錢匕用水一盞半入竹葉三七片同煎至八分去滓食後溫服治傷寒心熱狂妄精神不安龍齒散方龍齒研丹砂研各半兩牛黃一分馬牙硝地龍炒各一兩麝香一錢研上六味搗研為散每服一錢匕以生薑蜜水調下不計時候治陽毒發狂及癲邪狂走千金丸方豬血一盞生用不灰木為末藍根連葉為末各一兩水銀一錢以錫結沙子雞子三枚只用清膩粉半錢上六味除豬血雞子清外細研入豬血雞清拌合令勻入瓷罐子內封閉臘日合之掘地坑一尺藏埋候端午日取出旋丸如雞頭大每服一丸生薑汁及新汲水化破服治傷寒脈浮醫以火劫之亡陽必驚狂救逆湯方桂去粗皮蜀漆各一兩半甘草炙一兩牡蠣熬二兩半龍骨二兩上五味銼如麻豆大每服五錢匕以水一盞半入生薑半分切大棗二枚劈破同煎取七分去滓溫服治傷寒後狂言欲走口乾或時吐逆人參湯方人參羚羊角屑葛根銼竹茹前胡去蘆頭麥門冬去心焙各半兩甘草炙銼一分半夏湯洗去滑炒乾半兩上八味粗搗篩每服五錢匕水一盞半入生薑一分拍碎棗三枚劈破同煎至八分去滓食後溫服治傷寒過經不解熱結在裡狂言不定煩躁欲走柴胡湯方柴胡去苗大黃銼炒朴硝枳殼去瓤麩炒各一兩甘草炙銼半兩上五味粗搗篩每服三錢匕以水一盞煎取六分去滓溫服未利再服治傷寒發汗後熱毒未盡因有所驚狂言欲走羚羊角湯方羚羊角屑犀角屑防風去叉茯神去木黃芩去黑心玄參升麻各半兩龍齒研一兩甘草炙一兩竹茹地骨皮洗焙人參各三分上一十二味粗搗篩每服五錢匕用水一盞半煎至八分去滓溫服治傷寒心狂欲走緣風熱毒氣內乘於心所致香豉湯方豉炒令香熟三兩芒硝燒令白於濕地上用紙襯出火毒四兩上二味每取豉半兩先以水一盞煎取七分去滓下芒硝末三錢匕再煎三兩沸空腹分溫二服如人行三里更一服日夜可四服但初看是風狂者宜暫縛兩手足三服之後解之即無不愈者治傷寒太陽病六七日表證仍在脈微沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯方水蛭十枚熬虻蟲十枚去翅足熬