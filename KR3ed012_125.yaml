body:
  text: 卷第一百二十五癭瘤門諸癭統論論曰憂恚勞氣鬱而不散若或嬰之此癭所為作也亦有因飲沙水隨氣入脈留連頸下而成又山居多癭頸處險而癭也其始作咽喉噎塞遊氣往來漸至停止其證則有垂核椎椎而無脈者亦有有核無根浮動皮中者治療方劑雖已條具然有可破可割可針之法則如血癭息肉癭氣癭不可不辨又此疾婦人多有之緣憂恚有甚於男子也氣癭論曰癭之初結胸膈滿悶氣築咽喉噎塞不通頸項漸粗囊結不解若此之類皆癭初結之證也治氣癭初作白前湯方白前昆布洗去咸炙乾厚朴去粗皮生薑汁炙陳橘皮湯浸去白切炒附子炮裂去皮臍海藻洗去咸炙乾半夏湯洗七遍杏仁湯浸去皮尖雙仁炒甘草炙銼各一兩小麥醋浸一宿曝乾三合上十味銼如麻豆每服三錢匕水一盞半生薑一棗大拍碎煎至八分去滓食後溫服日三治氣癭初作海藻散方海藻洗去咸炙乾龍膽海蛤研木通銼昆布洗去咸炙乾礜石煅研松蘿各半兩小麥面一兩半夏湯洗七遍半兩上九味搗羅為散每服一錢匕溫酒調下日三不拘時治氣癭初結昆布散方昆布洗去咸炙乾海藻洗去咸炙乾各三兩松蘿一兩海蛤木通銼白蘞桂去粗皮各二兩上七味搗羅為散每服二錢匕溫酒調下日三不拘時治癭氣二靨散方豬羊靨各十對水洗去脂膜切焙海藻洗去咸炙乾海帶各一兩丁香木香琥珀麝香研各一兩真珠半兩研上九味搗羅為散每服一錢匕熱酒一盞調下垂頭臥少時治咽喉不利項頸漸粗將成癭瘤羊靨丸方羊靨二七枚炙黃切人參一兩半昆布洗去咸炙乾三兩木通銼海藻洗去咸炙乾各一兩海蛤研杏仁湯浸去皮尖雙仁炒惡實微炒各二兩上八味搗羅為末煉蜜和丸如梧桐子大每服十五丸至二十丸米飲下日再治咽喉氣悶胸膈滿塞項頸漸粗通氣丸方木通銼海藻洗去咸炙乾海蛤研各一兩昆布洗去咸炙乾三兩羊靨二七枚炙黃切上五味搗羅為末煉蜜和丸如彈子大每服一丸含化治咽喉噎塞冷氣上築妨悶漸成癭氣昆布丸方昆布洗去咸炙乾杏仁去皮尖雙仁炒研犀角鎊吳茱萸湯洗焙乾炒海藻洗去咸炙乾各二兩人參二兩半乾薑炮葶藶子紙上炒各一兩上八味搗研為末煉蜜和丸如梧子大每服二十丸米飲下日三治咽喉噎悶成癭海藻丸方海藻洗去咸炙乾檳榔銼昆布洗去咸炙乾訶黎勒皮文蛤研各三兩半夏湯洗七遍生薑切焙各二兩小麥米醋浸三宿曝乾三合海蛤研二兩上九味搗研為末煉蜜和丸如彈子大每服一丸含化日三治咽喉氣噎塞成氣癭紫蘇膏方紫蘇子炒桂去粗皮大黃銼炒當歸切焙乾薑炮各半兩陳橘皮湯浸去白焙一兩蜀椒去目並閉口炒出汗一分豬脂臘月者煎去滓半斤上八味㕮咀七味如麻豆大先以水六升煎至二升綿濾去滓納豬脂再煎成膏取塗癭上日二夜一以瘥為度治咽喉噎塞冷氣妨悶結成癭氣海藻酒方海藻洗去咸二兩上一味細銼以清酒四升浸二宿漉去滓每取半盞細細含咽日三不拘時以瘥為度治癭氣初結喉中壅悶漸漸腫大琥珀丸方琥珀研大黃銼炒各一兩昆布洗去咸焙半兩上三味搗羅為細末煉蜜和丸如梧子大每日空心及晚食後以溫酒下二十丸治癭氣胸膈壅塞咽喉漸粗宜服大效羚羊角丸方羚羊角屑一兩昆布一兩洗去咸桂心一兩木通一兩銼川大黃一兩銼碎微炒上五味搗羅為末煉蜜和丸如梧子大每服不計時候以粥飲下二十丸又方羊靨一百枚去脂炙大棗二十枚去皮核上二味同杵作丸桐子大每服水下七丸癭病咽喉噎塞論曰癭病咽喉噎塞者由憂恚之氣在於胸膈不能消散搏於肺脾故也咽門者胃氣之道路喉嚨者肺氣之往來今二經為邪氣所乘致經絡否澀氣不宣通結聚成癭在於嚥下噎鬱滯留則為之出納者噎塞而不通病癭者以是為急也治癭氣咽喉腫塞桂心散方桂去粗皮昆布洗去咸焙海藻洗去咸焙甘草炙銼白麵微炒各一兩龍膽海蛤王瓜根半夏為末生薑汁和作餅曝乾吳茱萸湯浸去涎焙炒牡蠣燒各一兩半上十一味搗羅為散每服二錢匕酸漿水調下食後臨臥治癭病咽喉噎塞連翹散方連翹木通銼乾薑炮半夏為末生薑汁和作餅曝乾各一兩羊靨炙七枚昆布洗去咸焙一兩杏仁去皮尖雙仁炒十七枚車前子微炒一兩上八味搗羅為散每服二錢匕米飲調下日二服食後臨臥治年深癭氣噎塞訶黎勒丸方訶黎勒煨去核檳榔銼海藻洗去咸焙各一兩枳殼去瓤麩炒白茯苓去黑皮乾薑炮熊膽桂去粗皮昆布洗去咸焙一兩上九味搗羅為末煉蜜為丸如酸棗大每服一丸含化不拘時治癭氣腫塞蛤蚧丸方蛤蚧全者酥炙一對琥珀研半兩真珠末海藻洗去咸焙各一分肉豆蔻去殼一枚大黃銼碎醋炒一分昆布洗去咸焙半兩上七味搗羅為末棗肉為丸如梧桐子大每服二十丸木通湯下治癭腫悶麥門冬丸方麥門冬去心焙昆布洗去咸焙各三分黃耆焙大黃銼蒸陳橘皮湯浸去白焙杏仁湯浸去皮尖雙仁炒甘草炙銼各一兩上七味搗羅為末煉蜜為丸如彈子大每服一丸含化治癭氣咽喉腫塞毒氣壅悶不通通氣丸方木通銼射干杏仁湯浸去皮尖雙仁炒惡實微炒昆布洗去咸焙訶黎勒煨去核海藻洗去咸焙黃耆銼各一兩白茯苓去黑皮三分上九味搗羅為末煉蜜為丸如彈子大每服一丸含化日晚再服治癭氣咽喉腫塞茯苓湯方白茯苓去黑皮人參各一兩海藻洗去咸焙二兩海蛤半夏為末生薑汁和作餅曝乾甘草炙銼菴䕡子各一兩上七味粗搗篩每服三錢匕水一盞煎至七分去滓溫服治癭病咽喉腫塞海藻散方海藻洗去咸焙龍膽昆布洗去咸焙王瓜根半夏為末生薑汁和作餅曝乾小麥面微炒各半兩上六味搗羅為散每服一錢匕溫酒調下日三服治癭病咽喉腫塞檳榔丸方檳榔銼海藻洗去咸焙昆布洗去咸焙各三兩上三味搗羅為末煉蜜為丸如彈子大每服一丸含化五癭論曰石癭泥癭勞癭憂癭氣癭是為五癭石與泥則因山水飲食而得之憂勞氣則本於七情情之所至氣則隨之或上而不下或結而不散是也治五癭海藻湯方海藻洗去咸汁炙半斤小麥面半兩特生礜石煅五兩上三味以經年陳醋一升拌小麥面焙乾再蘸醋焙以醋盡為度入二藥粗搗篩每服二錢匕水一盞煎至七分去滓溫服日再不拘時候治五癭海藻散方海藻洗去咸焙海蛤各三兩昆布洗去咸半夏湯洗七遍焙細辛去苗葉王瓜根松蘿各一兩木通銼白蘞龍膽草各二兩上十味搗羅為細末每服一錢匕酒調服日再不得作勞用力治五癭昆布散方昆布洗去咸焙三兩木通銼白蘞海蛤研松蘿各二兩桂去粗皮海藻洗去咸焙各三兩上七味搗羅為細散每服溫酒調下二錢匕日二服不拘時候治諸癭瘤海藻丸方海藻洗去咸焙乾薑炮裂各二兩昆布洗去咸焙桂心逆流水柳須各一兩上六味搗羅為細末煉蜜和丸如小彈子大每含一丸咽津不拘時候但服藥時須忌五辛濕面熱物之類又方菖蒲二兩海蛤白蘞續斷海藻松蘿桂心蜀椒倒掛草各一兩神麯三兩齊州半夏一兩湯浸七次焙乾取末羊靨一百枚焙乾上十二味搗羅為細末以羊牛髓和為丸如梧子大每服三十丸酒下不拘時候治氣癭方羊靨上一味去脂生含汁盡去日一枚七日瘥五癭丸方鹿靨不拘多少上一味以酒浸炙乾再納酒中更浸炙令香含咽汁盡更易盡十枚愈治五癭昆布方昆布洗去咸焙二兩上一味切如指面大醋漬含咽汁盡為度治癭瘤海藻散方海藻洗去咸焙一兩一分昆布洗去咸焙一兩半海蛤研木通銼桂去粗皮白茯苓去黑皮半兩羊靨十枚去脂炙令黃上七味搗研為散非時溫酒下三錢匕夜再一服治癭瘤海蛤散方海蛤研人參海藻馬尾者湯洗去咸焙白茯苓去黑皮半夏水煮一兩沸去滑切焙各半兩上五味搗羅為散每服一錢匕入豬靨子末一錢匕甜藤一尺去根五寸取之甘草一寸水五盞同煎取一盞半分三次每次調散二錢匕臨臥服女人四服婦人八服永除次用丸藥宣下治積年癭瘤骨瘤石瘤肉瘤膿瘤血瘤大如杯盂或漏潰骨消肉盡或堅或軟驚惕不安身體掣縮者陷脈散方烏賊魚骨去甲琥珀石硫黃各一分白石脂紫石英鍾乳各半兩丹參三分大黃乾薑附子各一兩上十味搗羅為散貯以韋囊勿令泄氣若瘡濕日三四敷無汁以豬膏和敷之以干為度若汁不盡者至五劑著藥不令人疼痛若不消加芒硝二兩治氣結喉中蓄聚不散成癭茯苓丸方白茯苓去黑皮三兩半夏湯洗去滑生薑切焙二兩昆布洗去咸焙海藻洗去咸焙各五兩桂去粗皮陳橘皮去白焙各一兩上七味搗羅為末煉蜜丸如杏仁大常含化一粒細細嚥津令藥氣不絕治氣結頸項蓄聚不散成癭杏仁丸方杏仁去皮尖雙仁者炒令黃連翹各一兩半海藻洗去咸焙一兩一分昆布洗去咸焙木香各二兩蔓荊實揉去皮羊靨炙各一兩訶黎勒煨去核二兩半檳榔銼陳橘皮去白焙各半兩上十味搗羅為末煉蜜丸如梧子大每服三十丸空心米飲下仍常含化一丸瘤論曰瘤之為義留滯而不去也氣血流行不失其常則形體和平無或余贅及鬱結壅塞則乘虛投隙瘤所以生初為小核寢以長大若杯盂然不癢不痛亦不結強方劑所治與治癭法同但癭有可針割而瘤慎不可破爾治瘤腫悶昆布黃耆湯方黃耆銼昆布洗去咸炙麥門冬去心焙大黃銼炒各一兩陳橘皮湯浸去白焙甘草炙銼杏仁去皮尖雙仁麩炒各半兩上七味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不拘時治氣瘤龍膽丸方龍膽去蘆頭炙一兩昆布洗去咸炙海藻洗去咸炙各二兩馬刀研海蛤研香草各半兩大黃炒銼一分上七味搗羅為末煉蜜丸如梧子大用破除日綿裹一丸朝暮含咽之治氣瘤白頭翁丸方白頭翁玄參連翹微炒海藻洗去咸炙各一兩桂去粗皮白蘞木通銼各三分昆布洗去咸炙一分上八味搗羅為末煉蜜丸如梧子大每服十五丸食後米飲下日三加至三十丸酒服亦得治骨瘤石瘤肉瘤膿瘤血瘤大如杯盂升斗者二三十年不瘥致有膿潰令人骨消肉盡或堅或軟或潰令人驚惕寤寐不安體中掣縮陷腫散方烏賊魚骨去甲硫黃研各一分白石英研紫石英研鍾乳研各半兩乾薑炮琥珀研大黃銼炒附子炮裂去皮臍胡燕屎各一兩丹參三分上十一味搗研為散貯以韋囊勿令氣泄若瘡濕即傅之若瘡干無汁者以豬膏和敷日三四易之以干為度若汁不盡者至五劑十劑止著藥令人不疼痛若不消加芒硝二兩治氣瘤或癭連翹丸方連翹微炒二兩酸石榴皮焙乾薑炮各三分枳殼麩炒去瓤一兩上四味搗羅為末更入百草霜一兩麝香少許各細研醋麵糊為丸如小豆大每日空心用胡椒米飲湯下三十丸至五十丸治氣瘤癭豬靨散方豶豬靨二七枚炙半夏湯洗去滑二十二枚人參一兩上三味搗羅為散每服溫酒調一錢匕臨臥垂頭吃治瘤蔓荊實丸方蔓荊實去白皮炒一分甘草炙銼一兩羊靨二十枚去脂膜炙別搗白蘞半兩椒目一分小麥面微炒一兩上六味將五味搗羅為末與羊靨末相和以好醬更搗丸如梧桐子大每服酒下五丸稍稍加之治頭面及皮膚生瘤大者如拳小者如慄或軟或硬不疼不痛不可輒用針灸天南星膏方生天南星一枚洗切如無生者以乾者為末上一味滴醋研細如膏先將小針刺病處令氣透將膏攤紙上如瘤大小貼之覺癢即易日三五上治毒氣項下結核或為瘤者消毒散方皂莢子五百枚慢火炒裂薄荷乾者二兩檳榔銼半兩甘草炙銼連翹各一兩上五味搗羅為散每服二錢匕食後臨臥米飲調下臘茶調亦得治大人小兒項下結核漸成瘤病蓖麻子方蓖麻子炒黃風中吹乾上一味每服溫湯下一枚不拘時候日服三五枚服之五日後搗玄參為散食後溫米飲調下一錢匕與蓖麻相間服三日後依前只服蓖麻五日後卻與玄參同服三日周而復始治頸下卒結核漸大欲成瘤癭海藻酒方海藻洗去咸一斤上一味用酒二升漬一宿取酒一二合飲之酒盡將海藻曝乾搗末酒調一錢匕日三治瘤癭柳根酒方柳根三斤須水所經露出者銼上一味用水一斗煮取五升用米三升釀之酒成每服飲半升空心日午夜臥各一服治諸瘤血出黃芩散貼方黃芩去黑心黃柏去粗皮銼黃連去須鬱金各半兩上四味搗羅為散入寒食麵五錢匕水調貼之治一切腫赤皮膚毒氣及瘤子二色丸方天南星半夏甘遂大戟各三錢乾薑胡椒桂蓽茇各二錢代赭石一兩大黃生用原缺分量上十味取前四味以漿一升煮水盡為度曬乾餘六味同搗為末每用一錢用巴豆三枚燒得焰起盞合卻候冷與一錢藥一處研更用醋一盞煎成膏共藥末同丸如綠豆大分兩處一用丹砂為衣一用膩粉為白衣此兩等顏色白者或捏作餅子亦可用治瘤子每服一丸嚼生薑酒下早晚各一丸如小腸氣三丸切生薑三錢炒焦酒下如傷酒二丸飛白礬生薑自然汁調下婦人心氣痛醋湯下二丸治項氣瘤結附贅日漸增長神效散方豬羊靨各三十枚旋入鹽膽內蘸過令乾只用鹽亦得陳橘皮去白焙一兩上三味搗羅為散每服二錢匕空心米飲調下初結不過數服覺消不用久服治癭瘤服海蛤散後宜除毒丸方巴豆鐵串穿燈上燒去心大黃末各半兩上二味研端午日粽子丸如綠豆大空心冷茶下三丸良久熱茶投之下多以冷粥止之系瘤法上取稻上花蜘蛛十餘枚置桃李枝上候絲垂下取東邊者拈為線子系定瘤子七日候換瘤子自落昔有人病瘤如拳大以此法系之至三換瘤子遂干一夜忽失所在天明於枕邊得之如一干慄治項氣成瘤紫蘇子膏方紫蘇子炒半兩豬膏臘月者一升桂去粗皮大黃銼炒當歸切焙乾薑炮陳橘皮湯浸去白焙蜀椒去目及閉口炒出汗各半兩上八味搗羅為末都用水六升煮取二升去滓內豬膏煎盡水每敷之取膏盡瘥
