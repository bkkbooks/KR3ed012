桔梗銼炒羌活去蘆頭銼秦艽去苗土焙石菖蒲九節者銼各二兩上一十三味以夾絹袋盛用好法酒三斗浸密封閉勿令通氣七日方開開時不得面對瓶口每服一盞溫過空心食前臨睡服常令有酒容久病風疾不過一月瘥治中風身如角弓反張當歸酒方當歸細辛去苗葉防風去叉各一兩半麻黃去根節煎掠去沫焙二兩半獨活去蘆頭三兩附子炮裂去皮臍四枚上六味銼如麻豆以酒三升煮取二升去滓每溫服一盞食前治中風身如角弓反張驢皮膠酒方驢皮膠炙燥二斤清酒一斗上以酒煮膠令化取六升分十二服空心細細服之
