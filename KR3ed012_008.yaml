body:
  text: 卷第八中風身體不遂論曰中風身體不遂者以機關縱緩筋脈不收故四肢皆不用也此由腠理開疏風邪傷脾胃之經脾胃既虛不能傳化氣澤故四肢無所稟養此內經所謂脾病四肢不用也治中風身體不遂不能言語精神恍惚附子湯方附子炮裂去皮臍一枚重半兩者桂去粗皮半兩葛根銼一兩半犀角鎊地骨皮白朮獨活去蘆頭芎藭各一兩石膏碎三兩上九味銼如麻豆每服五錢匕水二盞入生薑五片煎至一盞去滓溫服空心並二服夜一服或夜並二服空心一服服訖以熱薑粥投衣復微汗出慎外風不欲汗即不必食粥治中風手足不遂犀角湯方犀角鎊半兩防風去叉銼三分枳殼去瓤麩炒獨活去蘆頭桂去粗皮各半兩秦艽去苗土當歸切焙芍藥白茯苓去黑皮牛膝酒浸切焙各三分黑豆炒熟一合半仙靈脾葛根銼人參各三分上一十四味粗搗篩每服六錢匕水二盞入生薑五片煎至一盞去滓溫服上焦虛煩肝心風熱加竹瀝半合同煎食後臨臥各一服治中風手臂不遂口面偏斜附子散方附子炮裂去皮臍桂去粗皮各二兩半細辛去苗葉一兩半乾薑炮防風去叉各二兩半甘草炙銼三分上六味搗羅為散每用溫酒調服一錢至二錢匕空心午時各一服治中風手足不遂口面喎僻烏雞散方烏雌雞肉炙乾二兩半桂去粗皮一兩三分細辛去苗葉三兩防風去叉銼二兩半乾薑炮二兩半上五味搗羅為散每服半錢加至一錢匕食後良久溫酒調下日二夜一未覺效稍增至一錢半匕以效為度治中風手足不遂或拘攣屈伸不得口眼喎斜偏風疼痛或𤸷痹沉重病在筋骨生地黃煎方生地黃五斤搗研絞取汁令盡黑豆一升以水三升煎至一升絞去豆大甜石榴三顆去蒂萼和子皮同搗研取汁晚蠶砂炒二兩海桐皮炙銼三兩桂去粗皮山芋各二兩上七味先㕮咀四味如大麻粒於銀石鍋中先煎地黃汁三二十沸次下石榴黑豆汁又煎三二十沸即下㕮咀四味勿停手攪慢火煎至濃用生帛絞去滓次下好酥二兩再煎勻攪如稠膏即收於不津器中每日空腹以無灰酒一盞調煎半匙頭攪和服之如疾甚者加至一匙頭每日三服切慎房室此方兼治婦人産後風血惡疾治中風手足不遂羚羊角煎方羚羊角鎊荊芥穗羌活去蘆頭熟乾地黃焙各一兩防風去叉銼二兩黑豆二盞小者和防風炒熟勿令焦酒五升乘防風黑豆熱淋之上七味先以四味㕮咀如麻豆每服五錢匕用前豆淋酒一盞半同煎至八分去滓重煎如膏每空心溫酒調服日三夜一不拘時治中風手足不遂蒴藋煎方生蒴藋根汁生地黃汁各一升附子炮裂去皮臍別搗密絹細羅為末一兩酥四兩生薑汁二合蜜四兩上六味先取蒴藋地黃汁並附子末同煎煉成稀膏後入酥蜜薑汁更煎令稠入瓷器中每日空腹及夜臥溫酒調半匙服治中風手足不遂身體疼痛肩背拘急海桐皮丸方海桐皮二兩細銼石斛去根三分羌活去蘆頭半兩赤箭一兩半牛膝酒浸切焙白附子生防風去叉各一兩木香山芋各三分菊花牡荊子各半兩丹砂一兩研上一十二味為細末以天南星末二兩半同好酒煮為膏和丸如梧桐子大每服十五丸茶酒任下治中風手足不遂肢體疼痛天麻丸方天麻地榆各一兩烏頭炮裂去皮臍二兩玄參一兩胡蜂蛹子三十枚焙乾上五味搗羅為末煉蜜和丸如梧桐子大每服三丸至五丸食前薄荷酒嚼下治中風手足不遂涎涕膠黏青龍丸方附子炮裂去皮臍芎藭白朮米泔浸三日每日換泔取出焙乾獨活去蘆頭蒲黃用紙襯炒過各一兩藁本去苗土一分麻黃去根節百沸湯中急煮過焙三分丹砂研牛黃研龍腦研各一分麝香研半錢熊膽一分滴水一兩點令化入藥內上一十二味研杵為細末別用水銀三兩以蒸棗五十枚去皮核同研水銀星盡為度次入諸藥更入少許熟蜜和丸如雞頭大每服半丸或一丸臨臥以熟水化下其患甚者每夜研二丸如小兒驚涎每丸分作三服用薄荷湯化下治中風手足不遂筋骨疼痛行步艱難腰膝沉重天麻丸方天麻二兩地榆一兩沒藥三分研玄參烏頭炮裂去皮臍各一兩麝香一分研上六味除麝香沒藥細研外同搗羅為末與研藥拌勻煉蜜和丸如梧桐子大每服二十丸溫酒下空心晚食前服治中風手足不遂肢體𤸷麻骨節疼痛赤箭丸方赤箭獨活去蘆頭各一兩麻黃去節半兩烏頭炮裂去皮臍二兩芎藭三分乾蠍去土炒當歸切焙各半兩上七味搗羅為末煉蜜和丸如梧桐子大每服三十丸薄荷酒下不拘時治中風手足不遂攣縮屈伸艱難夜合枝醞酒方夜合枝桑枝槐枝柏枝石榴枝各生用銼五兩羌活去蘆頭別搗二兩黑豆用緊小者生用五升糯米五升細曲七斤半防風去叉別搗五兩上一十味先以水五斗將五枝同煎取二斗五升去滓浸米黑豆兩宿蒸熟入曲與防風羌活二味拌和造酒依常法醞封三七日壓去糟滓取清酒三合至五合時飲之常令有酒氣無令過醉恐至吐即悖亂正氣治中風手足不遂神識冒昧補心定氣白朮醞酒方白朮生用切地骨皮荊實生用各五升菊花未開者生用三升上四味粗搗篩以水三石同煮取一石五斗去滓澄清取汁釀黍米二石用曲如常醞法酒熟壓去糟滓取清酒於瓷器中收密封每服三合至五合續續飲之有能飲者常令半醉但勿至吐凡心風虛寒者亦宜服此酒後灸心俞兩邊各一寸五分並五十壯治中風手足不遂黑豆浸酒方黑豆一升揀緊小者淨淘上一味用酒五升同入瓶中密封用灰火煨常令熱約至酒減半即去豆取酒每服空心及臨臥時各飲二合至三合中風四肢拘攣不得屈伸論曰藏真散於肝肝藏筋膜之氣筋為肝所養筋得其養則俯仰屈伸莫或乖戾若經絡偏虛風邪侵乘客於機關則筋脈縮急干於陽絡則肩背從而拘攣此皆邪氣內盛正氣不能榮養諸筋故為四肢拘攣不得屈伸久而不已重感於邪則夜臥不寧小便滑數凡以肝藏魂其病為驚駭又腎之脈絡膀胱其直者從腎上貫肝膈而致然也治中風四肢拘攣百節疼痛心煩惡寒淅淅不欲飲食麻黃湯方麻黃去根節先煎掠去沫焙乾一兩半獨活去蘆頭一兩細辛去苗葉黃芩去黑心各半兩上四味粗搗篩每服五錢匕以水二盞煎至一盞去滓空心溫服相去如人行五七里再服微汗即愈病在四肢者並服有熱加大黃二分銼如麻豆用醋炒令紫色腹滿加枳殼二分去瓤麩炒氣逆加人參二分脅下悸滿加牡蠣灰二分渴加栝蔞根二分素有寒加附子一枚炮裂去皮臍治中風四肢拘攣筋急浮腫防己湯方防己一兩半銼白茯苓去黑皮桑根白皮炙銼各二兩桂去粗皮芎藭各一兩半甘草炙銼三兩芍藥一兩麻黃去節先煎掠去沫焙乾一兩半上八味粗搗篩每服五錢匕水二盞入大棗二枚劈破煎至一盞去滓溫服相去如人行十里再服中間吃熱生薑稀粥投之衣復取汗候汗解以粉粉之慎觸外風病在四肢者宜並服在晚食後良治中風四肢拘攣筋急風行在皮膚身體牢強服之令人不虛麻子仁湯方麻子仁一升搗研防風去叉一兩麻黃去節先煎掠去沫焙乾一兩半陳橘皮湯浸去白焙半兩桂去粗皮石膏搗碎各一兩豉一合炒上七味粗搗篩每服五錢匕水二盞入竹葉七片生薑半分切蔥白一寸同煎至一盞去滓溫服空心一服在夜即並二服相去如人行十里更一服又相去如人行五里吃熱生薑蔥稀粥投之衣復取汗密室慎外風為佳治中風四肢拘攣舌強不能語精神恍惚人參湯方人參三分麻黃去節先煎掠去沫焙乾一兩半石膏二兩半搗碎芍藥三分芎藭防己銼桂去粗皮防風去叉一兩附子炮裂去臍皮一枚重半兩杏仁湯退皮尖雙仁炒四十九枚上一十味銼如麻豆每服五錢匕水二盞入生薑半分切煎至一盞去滓溫服空心一服相去如人行五里再一服衣復微汗勿觸外風如體中覺熱每服更入竹瀝一合同煎三沸服治中風四肢拘攣筋急或緩縱不隨骨肉疼痛羸瘦眩悶或腰背強直或心忪虛悸怵惕不安服諸湯汗出後又覺虛困病仍未痊急服羌活湯方羌活去蘆頭三兩防風去叉三分人參三兩白茯苓去黑皮四兩芎藭二兩遠志去心二兩半薏苡仁炒三兩附子炮裂去臍皮麻黃去節先煎掠去沫焙乾桂去粗皮各二兩磁石煅醋淬五兩秦艽去苗土二兩五加皮二兩半丹參二兩生乾地黃焙杏仁湯退去皮尖雙仁炒各半兩上一十六味銼如麻豆每服五錢匕水二盞棗二枚劈破生薑半棗大切同煎至一盞去滓溫服空心晚食前各一服若病者有熱即去桂加葛根一兩銼白蘚皮一兩炙銼四肢疼痛痿弱攣急加當歸切焙細辛去苗葉各二兩治中風四肢拘攣急強疼痛口燥咽乾舌上白屑兼理寒冷風濕風毒肢節攣急及胸脅腰背心腹暴痛不可轉側防己麻黃湯方防己一兩一分麻黃去節先煎掠去沫焙乾一兩厚朴去粗皮塗生薑汁炙五遍一兩半獨活去蘆頭一兩芎藭三分石膏一兩一分搗秦艽去苗土三分牛膝酒浸切焙一兩一分桑寄生三分桂去粗皮一兩葛根銼三分甘草炙銼三分上一十二味粗搗篩每服五錢匕水二盞煎至一盞去滓溫服日三夜一服不拘時候咳嗽者加杏仁一兩湯退去皮尖雙仁同搗治中風筋脈攣急腰膝無力杜仲飲方杜仲去粗皮炙銼一兩半芎藭一兩附子炮裂去皮臍半兩上三味銼如麻豆每服五錢匕水二盞入生薑一棗大拍碎煎至一盞去滓空心溫服如人行五里再服汗出慎外風治中風四肢拘攣屈伸不得附子飲方附子兩枚大者一枚炮裂去皮臍一枚生用桂去粗皮二兩麻黃去節先煎掠去沫焙乾四兩甘草炙銼杏仁湯退去皮尖雙仁炒各二兩上五味粗搗篩每服五錢匕以水二盞煎至一盞去滓溫服相去如人行五里再服以衣被蓋之通體有汗即愈末汗用熱生薑蔥豉稀粥投之常服空心臨臥服三合甚佳治中風四肢攣急屈伸俯仰甚難杏仁飲方杏仁湯退去皮尖雙仁炒半兩附子炮裂去皮臍三分蜀椒去目並閉口者炒出汗一分上三味銼如麻豆每用五錢匕以水二盞煎取一盞去滓空心分溫二服相去如人行五里再一服以衣被蓋之取汗通身瘥或只在夜並服亦佳治中風四肢筋脈拘攣骨節疼痛少力天麻丸方天麻半兩蠍梢微炒沒藥各一分研麻黃去根節地龍去土炒各半兩丹砂研麝香各一分研防風去叉半兩烏頭去皮臍生用乳香研自然銅煅醋淬各半兩安息香一兩酒化入蜜同熬成膏上一十二味除安息香外搗研為末再同研勻以安息香膏和劑丸如梧桐子大每服不計時候以薄荷酒下二十丸忌羊血有人患手臂不遂又有患腿膝無力行步輒倒服之並效素有熱人減烏頭一半治中風四肢拘攣筋骨疼痛乳香丸方乳香細研一兩烏頭炮裂去皮臍半兩羌活去蘆頭一兩雄黃細研水飛過半兩白附子炮羚羊角屑各一兩附子炮裂去皮臍半兩原蠶蛾微炒防風去叉烏蛇酒浸去皮骨炙白殭蠶炒虎脛骨酥炙各一兩膩粉麝香細研各一分赤箭牛膝酒浸切焙沒藥研各半兩上一十七味搗研為末再同和勻煉蜜丸如梧桐子大每服用豆淋熱酒下十丸如人行十里再服治中風手足筋急拘攣疼痛地龍餅子方地龍炒海蛤硫黃研烏頭炮裂去皮臍各半兩鯪鯉甲炙一兩上五味搗研為末醋煮麵糊為丸如雞頭大捏作餅子曝乾每用一餅以蔥白裹安在手足節上以手帛繫住閣在一杉木桶上用熱湯淋之候覺骨中熱極方解去帛子後看手足未得舒展時再用熱湯淋之每一餅可用三次如用藥畢且著衣服蓋之不得透風治中風四肢攣急不得屈伸身體沉重行步艱難骨節煩疼附子湯方附子炮裂去皮臍桂去粗皮白朮各二兩甘草炙一兩上四味㕮咀每服三錢匕水一盞入棗二枚劈破生