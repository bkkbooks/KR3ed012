忌觸外風並治上氣咳逆若面目大腫但得坐不得臥凡産婦並病人已曾大汗者不可服若虛羸人但當少服治風痱言語謇澀四肢不收獨活散方獨活去蘆頭天麻各三兩白蘚皮地骨皮麥門冬去心焙薏苡仁防風去叉人參惡實炒赤芍藥甘草炙各一兩阿膠炙令燥蟬殼炒羚羊角屑附子炮裂去皮臍桑根白皮銼各半兩上一十六味搗羅為細散每服溫酒調下二錢匕不拘時候治風痱身體不痛四肢不收神智不亂天麻地榆丸方天麻地榆玄參金鈴子烏頭去皮臍生用烏藥銼防風去叉乳香研麝香研龍腦研丹砂研水飛沒藥研各一兩自然銅研一復時極細為度半兩上一十三味除乳香等別研外余藥焙乾搗羅為細末入前研藥拌勻煉蜜和杵千下丸如雞頭大每服三丸至五丸空心日午臨臥茶酒化下嚼吃亦得治風痱身體不痛四肢不收神智不亂時能言者保壽丸方牛黃研丹砂研雄黃研犀角鎊屑天麻蟬殼去土乾薑炮白殭蠶炒半夏湯洗十遍焙烏蛇酒浸去皮骨炙天南星炮白附子炮當歸切焙麝香研各半兩膩粉一分上一十五味搗研為細末用槐膠三兩以長流水浸三日取搗令爛入藥末不語搜和丸如雞頭大常服一丸茶酒嚼下小有風疾用槐柳桃蔥白各十莖細銼同鹽漿水濃煎下二丸浴後更服二丸衣被蓋汗出立瘥産後中風或中急風豆淋酒及梨汁薄荷汁化下五丸立效風痰酒痰偏宜服之治風痱卒不能語口噤手足不遂而強直者伏龍肝湯方伏龍肝二升上一味以冷水四升和攪取汁去滓澄清一升分溫飲之作兩服肉苛論曰內經謂人之肉苛者雖近衣絮猶尚苛也以營氣虛衛氣實夫血為營氣為衛氣血均得流通則肌肉無不仁之疾及榮氣虛衛氣實則血脈凝澀肉雖如故而其證𤸷重為苛也治營虛衛實肌肉不仁病名肉苛白殭蠶丸方白殭蠶炒半兩天南星炮裂湯洗半兩附子炮裂去皮臍一兩白附子炮裂湯洗一兩乾薑炮裂切一分膩粉半兩麝香一分與膩粉同研為細末上七味搗研為細末煉蜜為丸如梧桐子大每服空心溫酒下三丸至五丸治營虛衛實肌肉不仁病名肉苛苦參丸方苦參二兩銼搗取粉丹參去土微炙沙參去塵土人參一兩五加皮銼防風去叉銼蒺藜子炒角黃烏蛇酒炙用肉蔓荊實去白皮敗龜塗酥炙令黃虎骨塗酥炙令黃玄參堅者各一兩上一十二味搗羅為末別以不蚛皂莢一斤以水三升挼取汁去滓於無油鐵器內煎成膏煉蜜四兩拌和為丸如梧桐子大每食後良久及夜臥共三服各用荊芥薄荷酒下十五丸至二十丸治營虛衛實肌肉不仁遍身𤸷麻羌活散方羌活去蘆頭獨活去蘆頭防風去叉蔓荊實去白皮人參蒺藜子炒去角白茯苓去黑皮芍藥枳殼去瓤麩炒芎藭木天蓼阿膠炙令燥威靈仙去苗土各半兩上一十三味搗羅極細每服二錢匕空心豆淋酒調下溫酒亦得或煉蜜丸如梧桐子大豆淋薄荷酒下十五丸至二十丸治營虛衛實血脈凝澀肌肉不仁白花蛇丸方白花蛇酒浸去皮骨炙乾蠍去土炒仙靈脾天雄炮裂去皮臍天麻桂去粗皮麻黃去根節鹿角膠炙令燥萆薢各一兩桑螵蛸炒茵芋烏頭炮裂去皮臍天南星炮各半兩雄黃研麝香研各一分上一十五味為細末外又用大麻仁三兩為細末入無灰酒浸火熬成膏與前末和搗五百杵丸如梧桐子大每服二十丸薄荷酒下不拘時治營虛衛實肌肉不仁遍身𤸷重牛膝天麻丸方牛膝酒浸切焙一兩天麻酒浸切焙一兩半麝香研桂去粗皮各一分乾蠍炒去土白花蛇肉酒炙各半兩檳榔銼獨活去蘆頭各三分防風去叉一兩上九味為末煉蜜和丸如梧桐子大每服十五丸薄荷酒下荊芥湯亦得不拘時治肉苛肌肉不仁升麻湯方升麻秦艽去土連翹芍藥防風去叉羚羊角鎊木香枳殼去瓤麩炒薏苡仁各半兩上九味細銼分為十服每服以水二盞生薑五片煎取一盞去滓徐徐溫服治肉苛肌肉不仁遍身𤸷重獨活酒方獨活去蘆頭一斤金牙細辛去苗葉地膚子莽草熟乾地黃切焙蒴藋根防風去叉附子炮裂去皮臍續斷蜀椒去目並閉口炒出汗各四兩上一十一味除金牙外並細銼盛以絹囊清酒五升漬之密泥器口夏三宿冬五宿酒成溫二合服日三漸增之其金牙別搗為末別以練囊盛內大囊中治營虛衛實肌肉不仁病名肉苛防風酒方防風去叉二兩白朮一兩半山茱萸並子用一兩半山芋乾者一兩半附子炮裂去皮臍一兩半天雄炮裂去皮臍一兩半細辛去須葉輕炒一兩半獨活去蘆頭一兩半秦艽去土一兩半茵芋去粗莖一兩半杏仁湯浸退去皮尖雙仁炒一兩半紫巴戟去心二兩桂去粗皮二兩麻黃去節先煎去沫焙乾用二兩生薑切焙二兩磁石生捶碎如大豆粒浸去赤汁半斤薏苡仁炒三兩生地黃淨洗細切焙二兩半上一十八味銼如麻豆生絹囊盛以無灰清酒三斗浸六七日空心溫飲四合至五合以知為度治營虛衛實肌肉不仁病名肉苛五味子酒方五味子一兩防風去叉一兩枸杞子用根白皮銼一兩牛膝一兩牡丹去心一兩肉蓯蓉切炒一兩黃芩去黑心一兩白朮一兩丹參去土苗微炙一兩當歸切焙一兩甘草炙銼一兩枳殼麩炒去瓤一兩桂去粗皮一兩厚朴去粗皮塗薑汁炙五遍一兩五加皮銼一兩澤瀉一兩知母焙一兩細辛去須葉輕炒一兩白芷炒一兩上一十九味銼如麻豆生絹囊盛用好酒二斗密封浸經七日每空心午時夜臥各溫服五合久服漸加至七合一升勿令醉吐治榮虛衛實肌肉不仁病名肉苛前胡膏方前胡去蘆頭三兩白朮生用三兩白芷銼三兩留一枚不銼以驗膏成芎藭三兩椒去目並閉口生用二兩吳茱萸湯洗焙乾炒二兩附子去臍皮生用五兩當歸細切五兩細辛去苗葉三兩桂去粗皮三兩上一十味銼搗別以苦酒三升勻拌同窨一宿以煉成豬膏五斤入藥微煎之候白芷黃紫色去滓膏成病在外