body:
  text: 卷第九偏風論曰人身所養者惟血與氣血氣均等則無過不及之害稍至衰微則所運不周遂致體有偏虛復因風客身一邊者謂之偏風其狀半體不知痛癢或𤸷痹不仁或縱緩或痹痛是也治偏風手足一邊不遂心神恍惚不知人舌強不能言才覺中風先服竹瀝湯方竹瀝二盞生葛汁一盞生薑汁三合上三味相和煎至五七沸濾去滓每宜微熱服三合日可三服夜一服若覺四體稍快宜服後方麻黃湯治偏風半身不遂麻黃湯方麻黃去節煎掠去沫焙一兩半防風去叉一兩半芎藭一兩防己一兩黃芩去黑心一兩芍藥一兩人參一兩附子炮裂去皮臍一兩杏仁去皮尖雙仁炒四十九枚羚羊角鎊一兩桂去粗皮一兩石膏研一兩半甘草炙銼一兩上一十三味銼如麻豆每用十錢匕以水三盞煮取一盞半入竹瀝一合生薑汁半合再煮取一盞半去滓分三服空心日中夜臥各一服熱服取汗慎外風漸覺病勢少損仍服後防風湯治偏風不遂防風湯方防風去叉一兩芎藭一兩半麻黃去節煎掠去沫焙乾一兩半獨活去蘆頭一兩半升麻一兩羚羊角鎊一兩上七味粗搗篩每用十錢匕水三盞煮取二盞入竹瀝一合更煎三沸去滓分三服日二夜一微熱服之若手足冷加生薑三兩若未即除更服後人參湯方治偏風半身不遂手足常冷人參湯方人參一兩麻黃去節煎掠去沫焙一兩半甘草炙銼一兩白朮一兩防風去叉一兩半羚羊角鎊二兩獨活去蘆頭一兩芎藭一兩升麻一兩石膏二兩防己一兩芍藥一兩半桂去粗皮一兩黃芩去黑心一兩附子炮裂去皮臍三分上一十五味銼如麻豆每用十錢匕以水三盞入生薑十片煮取一盞半入竹瀝一合更煎三沸去滓分三服日二夜一微熱服之若有冷氣加陳橘皮湯浸去白焙牛膝去苗五加皮細銼各一兩若風退後服獨活湯治偏風半身不遂肌肉偏枯獨活湯方獨活去蘆頭二兩芍藥二兩遠志去心一兩半薏苡仁炒半升甘草炙銼二兩麻黃去節煎掠去沫焙一兩丹參二兩陳橘皮湯浸去白焙一兩半熟乾地黃焙三兩桂去粗皮一兩甘菊花半升未開者良微炒人參防風去叉茯神去木山茱萸天門冬去心焙厚朴去粗皮生薑汁炙銼牛膝去苗酒浸切焙五加皮銼羚羊角鎊麥門冬去心焙山芋白朮秦艽去苗土黃耆銼芎藭各二兩附子炮裂去皮臍一兩半石膏三兩升麻二兩防己二兩地骨皮二兩石斛去根二兩上三十二味銼如麻豆每用十錢匕以水三盞入生薑十片煎取一盞半去滓分溫二服空心臨臥各一取汗微有汗慎外風若心中熱者每日平旦臨臥服此湯午時服後方荊瀝湯治偏風不遂心中煩悶言語謇澀荊瀝湯方荊瀝五合竹瀝五合生薑汁三合上三味相和再暖每服三合以酒調下治偏風半身不遂口眼喎斜不能言語筋脈拘急不得轉側防己湯方防己麻黃去根節煎掠去沫焙附子炮裂去皮臍芎藭桂去粗皮黃芩去黑心芍藥人參甘草炙銼防風去叉各一兩杏仁去皮尖雙仁炒四十枚上一十一味銼如麻豆每用十錢匕以水三盞入生薑十片煮取二盞去滓分溫三服日二夜一治偏風手足不遂四肢𤸷痹羚羊角湯方羚羊角鎊一兩獨活去蘆頭二兩烏頭炮裂去皮臍三分防風去叉一分上四味銼如麻豆每服五錢匕以水二盞煎取一盞去滓分溫二服空腹夜臥各一治偏風手足一邊不收口目喎戾言語謇澀此湯不虛人老小並可服之生地黃湯方生地黃汁竹瀝荊瀝各一升五合上三味別將羌活防風各一兩去蘆頭並叉銼附子一枚重半兩者去皮臍生用作八九片入前三汁中慢火煎取一升半去滓每服用醇酒三合調化藥汁二合暖服之日二夜一無問冬夏並得服之治偏風一邊手足嚲曳行履不得肌肉𤸷痹百日內能起羌活湯方羌活去蘆頭一兩半桂去粗皮一兩葛根一兩附子一枚及半兩者炮裂去皮臍上四味銼如麻豆每用五錢匕以水一盞半煮取一盞去滓分溫二服空心臨臥各一治偏風手足一邊不遂筋骨煩痛枳殼丸方枳殼去瓤麩炒一兩半防風去叉一兩人參一兩半羌活去蘆頭一兩半羚羊角鎊一兩半升麻二兩甘菊花未開者良微炒一兩葛根銼一兩薏苡仁炒一兩桂去粗皮一兩黃連去須二兩熟乾地黃切焙二兩上一十二味搗羅為末煉蜜和丸如梧桐子大每服二十丸漸加至三十丸空心溫酒下日再治偏風卒中風鐵彈丸方五靈脂烏頭去皮臍並尖並生用各取淨末上二味等分合研令勻滴新水和入臼中杵一千下丸如彈子大生絹袋子內盛之懸透風處每丸分四服爛嚼溫酒下吃十服後一丸分二服更十日後卻一丸分四服一月內必瘥如不吃酒薄荷茶下亦得然不如酒服治偏風才得冒悶不知人手足嚲曳便速服此神效羌活酒方羌活去蘆頭半兩獨活去蘆頭半兩芎藭半兩大麻子仁炒研一合黑豆去塵土一合不搗上五味納四味粗搗篩以黍米酒四升浸夏月三日秋冬七日日滿更煎十餘沸炒黑豆令煙起乘熱傾於酒中窨經少時淨絞去滓每服二合至三合日二夜一治偏風手足一邊拘攣經年不瘥半身不遂女貞葉蒸法女貞葉一石楸葉一石上二味可東西掘地方五尺深二尺為坑坑內先燒黃蒿蒼耳令坑中赤熱方出灰灑薄醋後入二件葉欲滿令勻即將病人就偏風不遂及疼痛處臥於葉上以衣厚蓋令汗出為度經三兩遍即瘥治偏風手足一邊攣縮不遂百醫未效已經數歲茯苓浸酒方赤茯苓去黑皮五兩甘菊花未開者良微炒二兩山茱萸一兩熟乾地黃切焙三兩栝蔞根二兩防風去叉二兩菟絲子酒浸別搗三兩天雄炮裂去皮臍一兩肉蓯蓉酒浸切焙半兩牡丹去心二兩人參一兩白朮一分牡蠣熬半兩黃耆二兩紫菀去土三分菖蒲米泔浸刮去皮節二兩石斛去根銼一兩一分柏子仁生用半升杜仲去粗皮銼炒三分蛇床子炒三分遠志去心二兩附子炮裂去皮臍一兩乾薑炮二兩芍藥三分牛膝去苗酒浸切焙三分萆薢炒三分狗脊去毛一分蒼耳炒一兩虎骨酒炙半兩惡實炒三分桔梗去蘆頭炒一分羌活去蘆頭半兩惡實根刮去土皮銼半兩枸杞子炒半斤原蠶砂炒三兩續斷五兩上三十六味銼如麻豆每斤藥以生絹袋盛須稍寬即可用無灰酒二斗干瓷瓶中浸封頭蠟紙並白紙十重封系至二七日藥成方開封不得面當瓶口藥氣衝人每日平旦日中晚後各一每服四合不得過多若病深常令有酒容不得醉吐如患經數年不過一料諸疾稍輕入口見效如有丈夫女子骨節痠疼腫痛行履不得四肢不收脊背傴僂言語謇澀口面喎斜中風不語手足不遂頭旋眼暗冷淚下流清涕常出四肢跳躑筋脈牽抽遍身瘙癢毒風刺風赤癜白癜並宜服之不論年月久新皆療或手足冷痛並臟腑㽲痛腸鳴嘔逆痰水夜常不睡顏貌漸衰小便失精氣力微細纍年心痛丈夫風冷勞女子血風勞赤白帶下五種痔疾依法服之並皆得瘥酒藥若盡即絞滓陰乾搗為末以煉蜜和丸如梧桐子大每空心服三十丸如患諸風用酒下冷氣以米飲下諸風若為散即酒調下三錢匕服之治偏風手足不遂口面喎斜麻子仁酒方麻子仁二合炒黑豆二合緊小者炒鴿糞二合炒垂柳枝二握銼半寸長上四味先以酒七升煮柳枝及五升炒鴿糞麻仁黑豆等令黃乘熱便投於柳枝酒內須臾去滓令淨每服旋取溫服二合至三合空心臨臥各一服治偏風一邊不遂口眼喎斜獨活酒方獨活去蘆頭三兩大豆一升緊小者炒熟上二味粗搗篩以清酒五升煎十餘沸去滓每服飲五合至一升日二夜一治體有偏虛風客半體不自收持𤸷麻痹痛烏蛇丸方烏蛇尾酒浸去皮焙乾和骨用天南星炮天麻羌活去蘆頭獨活去蘆頭白附子炮白殭蠶炒烏頭炮裂去皮臍乳香研各一兩丹砂研半兩龍腦研麝香研牛黃研各一分上一十三味八味各搗羅為細末五味各研先將烏蛇丹砂研末與蜜同熬成膏和諸藥為丸梧桐子大每服七丸至十丸薄荷酒下日三治偏風半身不遂熱悶語澀續命獨活湯方獨活去蘆頭防風去叉人參芍藥各二兩防己一兩半桂去粗皮一兩羚羊角鎊三分上七味㕮咀如麻豆大每服五錢匕水一盞半煎至八分去滓入竹瀝半合更煎一二沸溫服治偏風半身不遂筋脈抽牽行履不得防風飲方防風去叉白朮芎藭白芷牛膝切酒浸焙狗脊去毛萆薢葛根銼人參羌活去蘆頭薏苡仁各一兩杏仁去皮尖雙仁炒二兩麻黃去節先煮去上沫焙石膏桂去粗皮各三兩上一十五味粗搗篩每服五錢匕以水一盞半入生薑半分切煎取八分去滓空腹溫服治偏風半體不仁縱緩不收或即痹痛安息香丸方安息香研一兩乳香研一兩麻黃去根節二兩胡桃仁湯浸去皮研一兩半干浮萍草去土一兩半上五味先搗麻黃浮萍草為末與研藥拌勻煉蜜和丸如彈丸大每服一丸溫酒化下以汗出為效治偏風不遂枳殼丸方枳殼去瓤麩炒羌活去蘆頭防風去叉人參羚羊角鎊各一兩半白茯苓去黑皮升麻熟乾地黃焙黃連去須各二兩甘菊花乾薑炮薏苡仁炒桂去粗皮各一兩上一十三味搗羅為末煉蜜丸如梧桐子大每空腹暖酒下三十丸日二服治偏風半身不遂不知痛癢擬金丸方草烏頭生去皮臍二兩半骨碎補去毛一兩半狗脊去毛一兩五靈脂一兩馬藺花一兩半地龍去土半兩乳香研一兩楓香脂研一兩萆薢一兩半上九味將七味搗羅為末入研者二味和勻醋煮麵糊和丸如小豆大每服三丸至五丸荊芥湯下空心臨臥各一服風偏枯論曰氣血不足腠理開疏風濕客於分肉之間久而不瘥真氣去邪氣獨留乃為偏枯之疾其狀肢體不遂肌肉偏枯細小而痛言語不變神智不亂乃可治也宜溫臥取汗益不足而損有餘診其胃脈沉而大心脈小而牢急皆偏枯之脈也治中偏風積年不瘥手足枯細口面喎斜精神不守言語倒錯甘草湯方甘草炙銼側子炮裂去皮臍桂去粗皮防己附子炮裂去皮臍芎藭人參麻黃去根節煎掠去沫焙乾當歸切焙赤芍藥各一兩秦艽去苗土三分茯神去木二兩防風去叉三分白朮半兩黃芩去黑心半兩細辛去苗葉微炒半兩甘菊花未開者一兩上一十七味銼如麻豆每服六錢匕以水二盞入生薑半分切煎至一盞去滓入竹瀝半合更同煎沸溫服空心日晚近夜服治中風手足偏枯口面喎斜疼痛一目不能合當歸湯方當歸切焙白芷防風去叉白蘚皮白朮芎藭杏仁湯浸去皮尖雙仁炒甘草炙銼甘菊花天雄炮裂去皮臍各一兩人參半兩上一十一味銼如麻豆每服五錢匕以水二盞入生薑半分切煎至一盞去滓溫服日三夜一與食相間服之治中風偏枯骨酸無力磁石湯方磁石燒赤醋淬七遍三兩防風去叉三兩五味子二兩甘草炙銼一兩玄參二兩附子炮裂去皮臍一兩牡丹去心二兩上七味銼如麻豆每用五錢匕以水二盞入黑豆三十五粒同煎至一盞去滓空心日午夜臥服治中風偏枯手足不遂言語謇澀心神恍惚金箔丸方金箔研二錢丹砂研一兩阿膠炙燥二兩丁香一兩麝香研一兩龍腦研一兩墨燒過研半兩牛黃研一兩雄黃研一兩天南星炮半兩上十味除別研外搗羅為細末再將研藥拌研勻煉蜜丸如梧桐子大每服二丸細嚼溫酒下此藥兼療婦人血風頭目昏眩胸膈諸疾治中風偏枯氣痹手足不能舉動沒藥丸方沒藥研一兩乳香研一兩麻黃去根節三兩草烏頭銼炒黑存性一兩自然銅醋淬七遍研一兩木鱉子去殼一兩乾蠍去土炒二兩虎骨醋炙黃一兩白附子炮一兩上九味除別研外搗羅為細末再入研者拌勻以酒磨濃墨汁和先分作十塊每塊更分作二十丸每服一丸溫酒磨下日三五服不拘時候治中風偏枯不遂口不收涎三靈丹方丹砂研三兩雌黃研一兩半硫黃研半兩上三味先將