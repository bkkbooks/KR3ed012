細末滴水為丸分作四十九丸每服一丸如脾寒取東南枝上桃心柳心各七枚煎湯放冷面南吞之尋常瘧發時面北新汲水下治鬼瘧祓除丸方雄黑豆小者是一百二十粒醋浸三日去皮研為膏砒霜研一錢雄黃研半兩上三味除黑豆外研令極細與黑豆膏同研丸如梧桐子大丹砂為衣用素絹袋子盛挂於神室前有患者取二丸未發時服一丸面東新汲水下臨發時更服一丸婦人患即男子與藥男子患即婦人與藥仍令患者閉目服須是端午日合若緩急即八節日合亦得合藥時不得見雞犬婦人服了藥不得食熱物一日治鬼瘧鬼臼丸方鬼臼常山甘草炙銼緑豆粉各一兩鱉甲醋炙去裙襴三分雄黑豆二百五十粒湯浸去皮焙砒霜半兩研生使上七味搗羅為細末醋煮麵糊丸如梧桐子大丹砂為衣每服一丸日未出面東用桃心七枚同新汲水下治鬼瘧一字散方鬼箭羽鯪鯉甲燒存性各一分上二味搗羅為細散每服一字嗅在鼻中臨發時用治鬼瘧寒熱日發鬼箭羽散方鬼箭羽一分為細末砒霜研一錢五靈脂研一兩上三味再同研為細散每服半錢匕臨發時冷茶清調下治鬼瘧輔正丸方天靈蓋酥炙砒霜研丹砂研麝香研虎頭骨酒炙鉛丹研猢猻頭骨酒炙緑豆粉各半兩上八味搗羅為細末用粟飯和研丸如梧桐子大每服一丸未發前新汲水下或以手握之瘥有孕婦人不得食小兒只可半丸以緑豆汁下其藥以五月五日合面東搗之治鬼瘧虎睛丸方虎睛一對酒浸炙丹砂研麝香研雄黃研砒霜研安息香入胡桃仁和研阿魏研天靈蓋酥炙各一分上八味搗二味入研藥再研為細末用燒飯和研丸如小豆大每用一丸未發前男左女右手把之一丸可療十人瘧母論曰瘧母者病瘧不瘥結為癥瘕是也邪伏於陰故久而成形不治其母雖或時瘥已而復發其本未除故也治宜以破結削瘕之劑除其病本治瘧久不瘥結為癥瘕名曰瘧母鱉肉煎丸方生鱉肉半斤治如食法黃芩去黑心柴胡去苗蜣螂去翅頭足炒各半兩鼠婦炒去足乾薑炮大黃生銼海藻洗去咸汁焙葶藶子紙上炒桂去粗皮牡丹皮厚朴去粗皮生薑汁炙銼紫菀切焙瞿麥去梗半夏湯洗去滑焙人參大戟銼蟅蟲炒射干炮阿膠炙燥桃仁湯浸去皮尖雙仁別研石葦去毛赤芍藥各一分桑螵蛸炒一兩上二十四味搗羅為細末取灶下灰三升酒二升淋灰取灰汁先煮鱉肉令爛絞去鱉肉後入諸藥末納鱉肉汁更煎成膏可丸即止丸如梧桐子大每服二十丸未發前溫酒下治一切遠年瘧結成癥瘕雄黃丸方雄黃研丹砂研麝香研各半兩木香龜甲醋炙鱉甲醋炙去裙襴虎骨頭酒炙羚羊角鎊屑犀角鎊屑白薇玄參當歸切焙知母焙防風去叉麻黃去根節龍膽去苗牡蠣燒赤豬苓去黑皮柴胡去苗茯神去木升麻檳榔銼地骨皮赤芍藥梔子仁黃連去須烏梅肉炒阿魏研桃仁湯浸去皮尖雙仁炒研安息香研葳蕤龍齒各三分上三十二味除別研外搗羅為細末合研勻煉蜜丸如梧桐子大每服二十丸白粥飲下未發前服治瘧母二黃丸方上以生砒黃豆黃末各一兩以釅醋二升一處煎成膏可丸取出別入丹砂雄黃麝香各一錢研細和勻衆手為丸如緑豆大每服五丸未發前煎生薑湯下治瘧母至妙丹方砒霜研半兩寒水石研一兩上二味先用研了砒在生鐵銚內用寒水石末圍之以瓷碗合定濕紙封於碗上燒候煙出熏紙黃色即止取出以紙襯於地上出火毒須臾細研為末入研了丹砂龍腦麝香各半錢許和勻湯浸炊餅丸如梧桐子大以丹砂作衣每服一丸於未發前早晨面北用井華水下忌吃熱物一時辰治瘧母丹砂丸方丹砂研緑豆去皮研粉砒霜研各半兩上三味於端午日靜室內面向東南用乳鉢先將緑豆研細次入砒霜丹砂研一千遍用稀米粥丸如梧桐子大陰乾每服一丸未發前五更時井華水面北咽下少頃方可食治瘧疾結成癥瘕如聖丸方巴豆三粒去殼黑豆四十九粒砒霜研半兩上三味將巴豆黑豆用米醋浸一宿去皮膜入乳鉢內順研一百匝入砒又逆研一百匝丸如小豆大用丹砂為衣每服一丸取嫩桃葉七片水一盞煎數沸傾入盞內用醋一二滴打勻通口令病人面向東方吞下如無桃葉以桃枝七寸煎湯代之
