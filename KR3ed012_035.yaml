body:
  text: 卷第三十五間日瘧論曰間日瘧者邪氣著於陰不得與陽氣俱出也衛氣晝行於陽邪氣不得出故必再會而後發是以間日乃作也治間日瘧先寒戰後壯熱常山湯方常山甘草炙各三兩鱉甲去裙襴醋炙一兩淡竹葉切三升洗上四味㕮咀以酒三升漬之上覆頭安露地明旦以水七升重湯內煮水過半為度其酒分五服未發飲之當吐吐已不必盡劑治間日瘧醇醨湯方大黃銼炒三分甘草炙常山各一分半上三味㕮咀以水三盞煎取一盞去滓更以水一盞煎滓取七分未發先服醨藥是後煎者相次服醇藥是前煎者瘥治間日瘧常山酒方常山一兩蒜獨頭者一顆去根莖橫切糯米黑豆各一百粒上四味㕮咀以清酒一升病未發前一日以酒浸藥於碗中以白紙復之碗上橫一刀欲發時分三分先飲一分如未吐更服一分得吐則瘥治間日瘧備急一元散方上燒黑牛尾作灰酒服方寸匕日三治間日瘧發寒熱常山湯方常山竹葉細銼各三分秫米五十粒糯米亦得石膏碎二兩上四味粗搗篩每服五錢匕以水一盞半浸藥一宿明旦煎至一盞去滓溫服未發前一服臨發再服當日勿洗漱勿飲食並用余藥汁塗五心及胸前頭面藥滓置枕邊治間日瘧糯米煮散方糯米四十粒常山銼烏梅肉炒竹葉銼甘草炙各半兩石膏一兩半碎上六味搗羅為散每服五錢匕以水一盞半煎至七分去滓未發前溫服治瘧間日發大黃湯方大黃生半兩甘草炙銼常山銼桂去粗皮各一分上四味粗搗篩每服五錢匕水一盞半煎至七分去滓未發前溫服治間日瘧神聖丸方黑豆小者二十一粒水浸去皮砒霜研一錢大棗一枚煮去皮核上三味須於重午七夕日修合同研丸如豌豆大以丹砂為衣合時忌婦人雞犬見於發日早晨將藥一丸面北香上度過用冷茶清下忌熱物一復時痰瘧論曰痰瘧之狀胸中不利頭痛振寒怢栗而不能食食即嘔寒去則內外皆熱寒熱更作心下支滿痰積胸中氣逆煩嘔故謂之痰瘧治痰瘧發作有時熱多寒少頭痛額角並胸前肌肉瞤動食才入口即吐出面色帶赤半夏散方半夏湯洗去滑為末生薑汁和作餅曝乾藿香去梗羌活去蘆頭芎藭牽牛各半兩上五味搗羅為細散每服三錢匕食後白湯調下以吐為度未吐再服治一切痰瘧石膏飲方石膏碎淡竹葉各三兩常山甘草生銼烏梅各二兩粳米半合上六味粗搗篩每服五錢匕水一盞半煎至一盞去滓溫服吐痰即瘥如熱盛加大黃一兩治一切瘧及吐一切痰疾胡粉丸方胡粉研砒霜研寒水石煅研各一兩上三味合研勻滴水丸如雞頭大發前新汲水吞下一丸即大吐至來日困睡為驗治痰瘧吐膈細辛湯方細辛去苗葉松蘿犀角屑甘草生各三分常山升麻各一兩一分梔子仁玄參各一兩上八味粗搗篩每服三錢匕水一盞煎七分去滓溫服以吐為度治痰瘧吐痰犀角飲方犀角屑鎊升麻玄參常山各半兩松蘿甘草生銼細辛去苗葉山梔子仁各一分上八味粗搗篩每服五錢匕水一盞半煎至八分去滓空心徐徐溫服取吐為度治痰瘧寒熱瘟疫等防葵飲方防葵鱉甲醋炙去裙襴松蘿甘草生各半兩常山三分上五味粗搗篩每服五錢匕水一盞半煎至八分去滓未發前徐徐溫服取吐為度治痰瘧豉心丸方豉微炒一合大黃生用一兩半常山三分升麻半兩附子小者炮裂去皮臍一枚上五味搗羅為細末煉蜜丸如梧桐子大每服七丸發前米飲下吐後更乾咽七丸治痰逆多時久瘧不瘥及面目四肢黃腫蜀漆丸方蜀漆葉牡蠣燒赤黃芩去黑心各一兩大黃生銼甘草炙銼犀角屑各三分知母焙半兩上七味搗羅為末煉蜜丸如梧桐子大每服二十丸空心溫水下治痰實瘧發歇不止常山酒方常山三分烏梅肉生用甘草生用各半兩上三味細銼以酒二盞浸一宿早晨去滓煎溫服一盞良久以箸入喉中引之吐痰即瘥治痰瘧發作無時升黃常山湯方升麻一兩常山二兩蜀漆葉一兩半上三味粗搗篩每服四錢匕井華水一盞半煎至一盞空心頓服良久即吐吐定食漿水粥和之治痰瘧吐不出烏頭湯方烏頭炮裂去皮臍半夏湯洗去滑焙桂去粗皮芫花醋炒常山各半兩豉炒一合上六味銼如麻豆每服三錢匕酒一盞煎至七分去滓發前溫服相次再服取吐為度治痰瘧寒熱常山甘草飲方常山甘草炙銼大黃銼炒各一兩桑根白皮銼一兩半烏梅五枚去核杏仁湯去皮尖雙仁炒十枚黃連去須一兩羌活去蘆頭一兩半黃芩去黑心半兩芎藭枳殼去瓤麩炒赤茯苓去黑皮各一兩旋覆花熬半兩柴胡去苗一兩半附子炮裂去皮臍一兩牽牛子炒一兩半桂去粗皮一兩虎頭骨牙齒酥炙苗一兩半上一十八味銼如麻豆每服五錢匕水一盞半煎至八分去滓溫服痎瘧論曰痎瘧者以瘧發該時或日作或間日乃作也人衛氣流行合於晝夜陰陽邪氣內舍於營隨衛氣以出入而應於風府其作早晏皆以時發也寒溫疸瘧動皆該時故內經統謂之痎瘧其狀伸欠乃作寒栗鼓頷腰脊痛寒去則內外皆熱頭痛如破渴欲冷飲治痎瘧寒瘧溫瘧疸瘧悉治之丹砂丸方丹砂研一分常山搗末三分上二味研令勻煉蜜和丸梧桐子大午時發者平旦米飲服三丸辰時巳時及臨發時各服三丸至夜然後得食治痎瘧連年不瘥蜀漆丸方蜀漆葉烏梅肉炒白薇升麻地骨皮知母焙麥門冬去心各半兩常山銼鱉甲醋炙各三分葳蕤半分豉一合微炒石膏研一兩甘草炙一兩上一十三味搗羅為細末煉蜜丸如梧桐子大每服十丸未發前米飲下臨發再服加至二三十丸醋湯下亦得治痎瘧麻黃丸方麻黃去根節湯掠去沫焙一兩常山銼知母焙甘草炙大黃生用各半兩上五味搗羅為細末煉蜜丸如梧桐子大每服五丸未發臨發各一服未瘥漸增丸數治痎瘧以時發鱉甲漬酒方鱉甲醋炙半兩烏賊魚骨去甲常山各二兩附子炮裂去皮臍甘草炙各一兩上五味銼如麻豆每服五錢匕以酒一盞半漬藥一宿明日以酒先塗五心過發時瘧斷若不斷可飲藥酒一二盞即瘥治痎瘧先寒戰動寒解壯熱日發及間日發常山酒方常山淡竹葉切洗一兩鱉甲去裙襴酥炙一分甘草炙銼三分上四味粗搗篩每服五錢匕以酒半盞浸藥復安露地一宿明旦以水一盞煎至七分去滓未發前溫服盡當吐既效不必盡劑過發時良久方可食治痎瘧霜墨丸方砒霜一錢墨蓐草灰各半錢緑豆粉一分上四味一處細研為末用糯米粥和丸如小豆大每服兩丸未發前一時辰醋湯下端午日未出時面東修合不得言語勿令婦人雞犬見治瘧及有孕婦人患者無不愈如聖飲方甘草炙柴胡去苗常山烏梅去核各半兩上四味銼碎用銀器或沙石銚當發日絶早以好酒二升慢火熬至一盞濾去滓放溫作一服飲盡良久吐涎即愈如尚覺有寒氣未退候五七日再服治一切瘧疾五行神驗丸方澱花二兩東方桂一兩南方乾薑一兩西方巴豆一兩北方硫黃一兩中央麝香少許上六味將五般藥於盤內據五方排定取四月二十八日夜安卓子上於中庭露以香一爐當虔心啓請地上五方神天上五星神人間一切主藥神請加備此五行法瘧丸露後取端午日修合當啓祝云廣施功德無所希求須夜夜志心再三啓祝至天明早收莫令雞犬飛鳥見安於高淨處亦依五方安著如是露七夜至五日將巴豆去殼湯煮三五十沸搗研余藥為散入麝香以薄麵糊調澱花末為丸如櫻桃大合時忌女子等見丸了焙乾於合內盛不得觸汙莫令香歇唯在心法不得容易此方帶之無不神驗修合人當月忌眼見一切濁汙若俗人須信解之宜加淨潔專志不然則藥無神效發日淨手取以綿裹香火炙令熱男左女右預安耳中便利時除卻淨手後再安耳中不得女子捻觸女子患男子為安忌一切葷辛果子每一丸男度十人女度三人此方極神驗須將廣施若有希取即無效驗也治諸瘧知母丸方知母焙烏梅肉炒各二兩半肉蓯蓉切焙常山豉炒各二兩甘草炙銼人參桂去粗皮各一兩半上八味搗羅為末煉蜜和丸如梧桐子大每服二十丸溫酒下治一切瘧生地丸方地黃汁一升砒霜研半兩蠟少許上三味先將地黃汁於瓷器中暖候沸入砒霜不住手攪煎令稠次入蠟相和丸如緑豆大每發時用井華水下一丸未瘥發前更服一丸治瘧知母飲方知母焙鱉甲醋炙去裙襴桃仁去皮尖雙仁炒附子炮裂去皮臍常山狼牙各半分烏梅去核一枚上七味銼如麻豆每服五錢匕糯米四十九粒隔夜浸至五更初同煎取七分去滓乘熱分作兩服未發時一服發時一服治一切瘧無問遠近烏梅丸方烏梅肉炒桂去粗皮甘草炙銼虎頭骨酥炙各二兩桃仁去皮尖雙仁炒研常山升麻肉蓯蓉酒浸切焙各三兩附子炮裂去皮臍一枚麝香研一分人參三兩豉一升炒上一十二味搗研為末煉蜜丸如梧桐子大每服三十丸空腹飲下如虛勞加鱉甲三兩治瘧常山酒方常山鱉甲醋炙去裙襴各三分虎頭骨炙半兩豉炒半分桃枝一握柳枝一握桃仁三七枚去皮尖雙仁炒干棗三枚去核烏梅炙七枚上九味細銼以酒一升浸一宿明日入生薑五片煎取五合去滓空心分為二服治痎瘧扼虎膏方煙脂阿魏各一大豆許同研上二味同研以大蒜肉研和為膏用大桃核一枚劈開去仁取一片以藥膏子填在核內瘧發時用藥桃核覆在手虎口上男左女右令藥著肉以緋帛系定經宿乃去疾更不發勞瘧論曰勞瘧者以久瘧不瘥氣血俱虛病雖間歇勞動則發故謂之勞瘧邪氣日深真氣愈耗表裡既虛故食減肌瘦色悴力劣而寒熱如故也治勞瘧毛髮枯焦寒熱不定飲食減少肌肉消瘦面色青黑兩足無力非時足冷小便頻數大便不調夜夢泄精鱉甲煮散方鱉甲去裙襴醋炙半兩羌活去蘆頭獨活去蘆頭柴胡去苗各一分黃耆銼半兩赤茯苓去黑皮生乾地黃焙木香各一分牛膝酒浸切焙天靈蓋酥炙續斷菟絲子酒浸別搗各半兩芎藭藿香葉陳橘皮湯浸去白焙山茱萸各一兩麝香研一錢上一十七味搗羅為散每服三錢匕水一盞入鹽少許同煎七分空心和滓服或煉蜜丸如梧桐子大空心鹽湯下四十丸亦得治勞瘧秦艽酒方秦艽去苗土柴胡去苗甘草炙鱉甲去裙襴醋炙各半兩常山蔥白各二兩豉一分上七味銼如麻豆用無灰酒三升浸一宿於近火處安頓常令微溫每服一盞未發時不拘時服既服又添酒一盞於藥中添至三升即止治勞瘧久作不已日致憔悴勢漸危困鱉甲散方鱉甲去裙襴醋浸炙常山銼蜀漆葉烏賊魚骨去甲附子炮裂去皮臍各半兩知母切焙蜀椒去目及閉口炒出汗各一分黃耆銼柴胡去苗各三分上九味搗羅為散每服三錢匕以酒一盞漬一宿平旦溫服未發前再一服治勞瘧柴胡湯方柴胡去苗一兩人參栝蔞根黃芩去黑心甘草炙銼黃耆銼各半兩上六味粗搗篩每服五錢匕水一盞半生薑半分切棗兩枚去核煎至一盞去滓溫服空腹欲發前各一服治勞瘧經年不瘥寒熱痿瘦祛勞湯方柴胡去苗常山銼鱉甲去裙襴醋浸炙知母切焙青蒿乾者甘草炙銼枳殼去瓤麩炒桂去粗皮各一兩木香半兩上九味粗搗篩每服五錢匕水一盞半入柳枝心七枚蔥白三寸煎至一盞去滓空腹溫服治勞瘧寒熱萎黃渴燥煩悶甘草湯方甘草炙三分蜀漆葉半兩天靈蓋酥炙一兩黑豆生桃仁湯浸去皮尖研烏梅肉炒各一分上六味粗搗篩每服三錢匕水一盞入竹葉三片煎至七分去滓空腹未發前一服臨發時再服治勞瘧久不瘥熻熻發熱骨節痛不下食小便赤漸加瘦弱柴胡枳殼湯方柴胡去苗枳殼去瓤麩炒升麻麥門冬去心焙鱉甲醋浸炙令黃去裙襴甘草炙銼桃仁湯浸去皮尖雙仁別研各三分上七味粗搗篩每服三錢匕水一盞煎至七分去滓未發前不拘時溫