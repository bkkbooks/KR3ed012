body:
  text: 卷第二十四傷寒頭痛論曰傷寒頭痛者邪氣循陽脈上攻於頭也是以傷寒傷風溫病熱病風溫病皆有頭痛證者蓋頭痛皆陽證也故太陽頭痛必發熱惡寒陽明頭痛不惡寒反惡熱少陽頭痛脈弦細而發熱至於三陰脈從足至胸皆不至頭惟厥陰脈挾胃屬肝絡膽循喉嚨上頏顙連目出額故仲景止有厥陰頭痛一證治以吳茱萸湯者是也治傷寒太陽病頭痛發熱汗出惡風桂枝湯方桂枝去粗皮芍藥各三兩甘草炙二兩上三味㕮咀如麻豆每服五錢匕水一盞半入生薑一棗大拍碎棗三枚去核同煎至八分去滓溫服以熱稀粥投之助藥力治傷寒後不大便六七日頭痛有熱承氣湯方大黃四兩厚朴去粗皮生薑汁炙二兩枳實去瓤麩炒三個上三味㕮咀如麻豆每服三錢匕水一盞半煎至八分去滓溫服治傷寒太陽病頭痛發熱身疼腰痛骨節疼惡風無汗而喘者麻黃湯方麻黃去根節煮去沫三兩焙桂去粗皮二兩甘草炙一兩杏仁七十個去皮尖雙仁上四味㕮咀如麻豆每服五錢匕水一盞半煎至八分去滓溫服取汗治傷寒已發汗或未發汗頭疼如破連須蔥白湯方連須蔥白寸切三莖生薑切二兩上二味分作三服每服以水二盞煎至一盞去滓通口服此湯不瘥者服葛根蔥白湯治傷寒頭疼不止葛根蔥白湯方葛根銼芍藥知母各半兩芎藭三分上四味㕮咀如麻豆大每服五錢匕水一盞半入蔥白三寸生薑一棗大各拍碎同煎至一盞去滓通口服治傷寒脈弦細頭痛發熱者屬少陽也少陽不可發汗宜用小柴胡湯方柴胡去苗二兩黃芩去黑心人參甘草炙各三分半夏六錢洗去滑上五味㕮咀如麻豆大每服五錢匕水一盞半生薑一棗大棗三枚去核同煎至八分去滓溫服治傷寒厥陰證乾嘔吐涎沫頭痛吳茱萸湯方吳茱萸三兩洗焙人參一兩半上二味㕮咀如麻豆大每服五錢匕水一盞半入生薑一棗大拍碎棗三枚去核同煎至八分去滓溫服治傷寒頭痛痰盛石膏丸方石膏細研水飛過四兩烏頭去皮臍生用一兩硝石研一兩半太陰玄精石研二兩上四味搗研為末和勻如粉以生薑自然汁煮麵糊和丸如梧桐子大每服十丸至十五丸荊芥茶下甚者不過三服治傷寒頭疼壯熱化痰發汗聖白散方附子一枚大者炮裂去皮臍白附子生天南星炮半夏洗去滑為末生薑汁和作餅焙乾麻黃去根節各半兩石膏碎研一兩麝香研半錢白芷一分上八味搗羅六味為末入石膏麝香末同研令勻每服半錢匕熱蔥茶調下甚者連進三服治傷寒頭痛太一散方附子大者炮裂去皮臍一兩甘草生石葦去毛各半兩石膏研滑石研各二兩上五味搗羅三味為細散入石膏滑石末同研勻每服二錢匕蔥白薄荷茶調下治傷寒頭痛白蘚皮湯方白蘚皮菊花石膏研荊芥穗各一兩桂去粗皮一分甘草炙半兩麻黃去節二兩上七味粗搗篩每服三錢匕水一盞煎七分去滓溫服治傷寒頭痛不止茶調散方石膏碎研二兩羌活去蘆頭生用蒼朮去皮甘草半生半炙芎藭茵陳蒿荊芥穗各一兩桂去粗皮半兩上八味搗羅為散每服一錢匕用臘茶末一錢匕同蔥白煎湯點熱服治傷寒頭痛目眩汗出麝香丸方麝香研龍腦研各一分丹砂一兩半研雄黃研木香赤箭各一兩牛黃研白花蛇肉烏蛇肉各酒浸炙乾蠍炒去土羚羊角鎊各半兩天南星炮麻黃去根節各二兩白附子生天麻酒浸焙防風去叉零陵香葉藿香葉天雄炮裂去皮臍各三分上一十九味搗羅十四味為末入麝香等五味研勻煉蜜丸如小雞頭實大每服二丸細嚼溫酒下不拘時候治傷寒頭痛天南星丸方天南星末二兩石膏末一兩水飛過上二味填牛膽中用薄荷包更用荷葉外包於風道中挂以清明節候入龍腦少許滴雪水丸如雞頭大每服一丸爛嚼薄荷湯下治傷寒頭痛不止黃芩湯方黃芩去黑心石膏碎茵陳蒿柴胡去苗桔梗銼炒牡丹皮荊芥穗梔子仁各一分麻黃去根節半兩上九味粗搗篩每服三錢匕水一盞煎至七分去滓食後溫服治傷寒頭疼不可忍石膏湯方石膏碎麻黃去根節各一兩何首烏去黑皮半兩葛根銼三分上四味粗搗篩每服三錢匕生薑三片水一盞同煎至八分去滓溫服治傷寒頭痛石膏煮散方石膏研水飛過一兩半旋覆花一兩白蒺藜炒甘菊花山梔子仁茵陳蒿太陰玄精石研芎藭各半兩上八味搗羅六味為細末入石膏等研勻每服三錢匕水一盞入荊芥少許同煎至七分不去滓溫服不拘時候治傷寒頭疼不止芎藭飲方芎藭半兩馬牙硝研石膏研各一兩上三味粗搗篩每服二錢匕水一盞入生薑三片好茶一錢匕同煎至六分去滓溫服不拘時候治傷寒頭疼鼻塞一字散方芎藭一兩草烏頭炮裂去皮尖一兩半石膏研一兩雄黃二錢醋浸一宿焙研上四味搗羅三味為散入雄黃末研勻每服一字入臘茶半錢匕蔥白一寸煎湯點服治傷寒頭疼胸中滿及發寒熱脈緊而不大者是膈上有涎宜用瓜蒂散方瓜蒂一兩上一味搗羅為散每服一錢匕溫熟水調下吐涎愈治傷寒頭痛自汗壯熱身體拘急喘粗骨節痠疼人參湯方人參甘草炙各二兩桂去粗皮陳橘皮湯浸去白焙白茯苓去黑皮防風去叉五味子柴胡去苗各一兩附子炮裂去皮臍半夏生薑汁浸一復時各半兩上一十味銼如麻豆大每服三錢匕水一盞入生薑二片棗二枚劈破同煎至七分去滓熱服不拘時候治風氣不和頭昏目眩鼻塞聲重語聲不出身體倦肢節疼痛痰壅咳嗽寒熱往來消風羌活湯方羌活去蘆頭甘菊花麻黃去根節芎藭防風去叉石膏研前胡去蘆頭黃芩去黑心各三兩甘草炙銼枳殼麩炒去瓤四兩白茯苓去黑皮蔓荊實各半斤細辛去苗葉半兩上一十三味粗搗篩每服三錢匕水一盞煎至七分去滓溫服不計時候治傷寒解表止頭痛兼治破傷風及一切諸風麻黃丸方麻黃去根節湯煮掠去沫焙乾烏頭水浸三日日一易曝乾炮裂去皮臍天南星炮搗末半夏湯洗去滑七遍石膏泥裹火煅通赤研各四兩白芷三兩甘草炙銼一兩龍腦研半兩麝香研一分上九味將八味搗研為末水煮天南星和丸如小彈子大每服一丸蔥茶或蔥酒嚼下薄荷茶亦得連二三服此本白龍丸後又加麻黃寒水石用石膏末為衣治傷寒至佳小傷風服之立瘥解表藥中此尤神速治傷寒頭痛三日以里可服白雪丸方烏頭去皮臍附子去皮臍白附子天南星天麻麻黃去根節甘草並生用等分上七味搗羅為末水浸宿炊餅和丸如櫻桃大火煅寒水石粉為衣每服一丸熱酒或蔥茶嚼下良久以熱粥投之治初得傷寒頭痛壯熱前胡湯方前胡去蘆頭半夏湯洗七遍去滑生薑汁炙切焙玄參堅者旋覆花甘草炙銼桂去粗皮黃芩去黑心桔梗銼炒生乾地黃焙各一兩上九味粗搗篩每服五錢匕水一盞半生薑五片煎至八分去滓熱服不拘時候治傷寒頭痛身熱百節疼痛四白散方蒺藜子炒去角白芷白附子炮白殭蠶炒等分上四味搗羅為散每服二錢匕茶清或酒調下不拘時候傷寒喘論曰傷寒喘其證不一有邪氣在表表未解無汗而喘者有邪氣在裡汗出不惡寒腹滿而喘者有潮熱者有心下有水而喘者古人治之亦各求其本故在表者當汗在裡者宜下至於心下有水而喘則又當利其小便也若乃陰證發喘是為無陽非灸之不可治傷寒心下有水氣咳而發喘小青龍去麻黃加杏仁湯方芍藥桂去粗皮甘草炙細辛去苗葉五味子炒乾薑炮裂杏仁湯浸去皮尖雙仁炒各三兩半夏湯浸七遍切焙二兩半上八味銼如麻豆大每服五錢匕水一盞半煎取七分去滓溫服治傷寒下後不可更行桂枝湯汗出而喘無大熱者屬麻黃杏子甘草石膏湯方麻黃去根節沸湯掠去沫焙四兩杏仁去皮尖雙仁炒五十枚甘草炙二兩石膏半斤碎上四味銼如麻豆大每服五錢匕水一盞半煎取八分去滓溫服治傷寒太陽與陽明合病喘而胸滿者不可下屬麻黃湯方麻黃去根節先以沸湯掠過焙乾三兩桂去粗皮二兩甘草一兩炙杏仁湯去皮尖雙仁七十枚炒上四味銼如麻豆大每服五錢匕水一盞半煎至六分去滓溫服取微汗不須啜粥余如桂枝將息法治傷寒心下有水氣肺氣虛脹喘急咽燥茯苓湯方赤茯苓去黑皮石膏各一兩半芍藥三分半夏一兩湯浸七遍炒令乾細辛去苗葉桂去粗皮五味子各半兩麻黃去根節沸湯掠去沫焙桑根白皮銼各一兩上九味銼如麻豆大每服五錢匕水一盞半入生薑一分拍碎同煎至八分去滓溫服治傷寒表不解心下喘滿及大小便難豬苓湯方豬苓去黑皮赤茯苓去黑皮白朮炒麻黃去根節桂去粗皮葶藶微炒澤瀉上七味等分粗搗篩每服三錢匕水一盞生薑三片同煎至七分去滓溫服治傷寒後肺氣喘促馬兜鈴湯方馬兜鈴一分木通銼一兩陳橘皮湯浸去白焙半兩紫蘇莖葉一分上四味粗搗篩每服五錢匕水一盞半入燈心十五莖棗三枚劈破同煎至七分去滓食後溫服日二治傷寒後肺氣上喘咽喉噎塞頭面虛浮木香丸方木香一兩昆布湯洗去鹹味焙令乾海藻湯洗去鹹味焙令乾乾薑炮裂各三分細辛去苗葉海蛤別研如粉蜀椒去目及閉口微炒令汗出各半兩上七味將六味搗羅為末入海蛤同研令勻煉蜜和更搗三五百杵丸梧桐子大每服空心米飲下十五丸治傷寒汗後發喘壯熱不除大腹皮湯方大腹皮銼柴胡去苗各一兩赤茯苓去黑皮三分桑根白皮微炙銼半兩上四味粗搗篩每服三錢匕水一盞入生薑三片同煎至六分去滓不計時溫服治傷寒後喘咳不得臥臥則氣壅心胸滿悶蕓薹子丸方蕓薹子一兩微炒葶藶微炒杏仁湯浸去皮尖雙仁炒令黃細研各一兩半紫菀去土馬兜鈴皂莢酥炙令黃去皮子甘草各半兩炙令微赤白前防己人參各三分上一十味搗羅九味為末入杏仁同研令勻煉蜜和搗三五百杵丸如梧桐子大每服食前童子小便煎烏梅湯下二十丸日二治傷寒後脾胃虛冷上攻氣喘木香丸方木香肉豆蔻去殼各半兩人參白茯苓去黑皮各三分桂去粗皮檳榔銼各一兩阿魏用酒研如泥入面少許拌和作餅子炙令黃熟丁香各一分上八味搗羅為末煉蜜和更搗三五百杵丸如梧桐子大每服食後米飲下二十丸治傷寒太陽病下之微喘者表未解故也屬桂枝加厚朴杏子湯方桂去粗皮芍藥各三兩甘草厚朴去粗皮生薑汁炙各二兩杏仁五十枚去皮尖上五味銼如麻豆大每服五錢匕水一盞半入生薑一棗大切大棗二枚劈煎取八分去滓溫服治傷寒陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令至大泄下大承氣湯方大黃酒洗四兩厚朴去粗皮生薑汁炙半斤枳實炙五枚上三味銼如麻豆大每服五錢匕水一盞半煎取八分入芒硝一錢匕再上火一兩沸溫服得下止後服傷寒上氣論曰傷寒上氣者肺主氣手太陰是其經也病人肺氣夙有不調又遇寒熱邪氣傷於其經則脹而氣逆不下故令上氣治傷寒後上氣喉咽不利胸膈多痰氣逆半夏湯方半夏湯洗七遍炒乾一兩桂去粗皮半兩甘草炙一分檳榔銼三分陳橘皮湯浸去白焙枳殼去瓤麩炒各半兩上六味粗搗篩每服五錢匕用水一盞半生薑一分拍碎同煎至八分去滓食後溫服治傷寒後上氣煩滿客熱在臟乾嘔口中生瘡不得飲食竹茹湯方青竹茹葛根各一兩半夏湯洗七遍焙乾麥門冬去心焙各三分甘草陳橘皮湯洗去白焙各半兩上六味粗搗篩每服五錢匕水一盞半生薑一分拍碎同煎至八分去滓食後溫服治傷寒後飲水多卒上氣發熱貝母湯方貝母炮去心桑